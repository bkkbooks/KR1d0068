body:
  text: 月令第六之五仲秋之月日在角昏牽牛中旦觜觽中觜音兹觽音攜夏小正有辰則伏參中則旦日在角淮南子作招搖指酉正義鄭氏康成曰仲秋者日月會於夀星孔疏夀星辰次之號而斗建酉之辰也髙氏誘曰角東方宿鄭之分野孔氏頴達曰八月建酉酉留也律厯志云留執於酉三統厯八月節日在軫十二度昏斗二十六度中旦井二度中八月中日在角十度昏女三度中旦井二十一度中元嘉厯八月節日在翼十七度昏斗十四度中旦畢十六度中八月中日在軫十五度昏斗二十四度中旦井九度中案此謂白露後三十日也月建酉而日在辰酉與辰合也觜觽西方火宿三星如蕊其度最狹漢魏猶二度至眀止半度今時憲書乃十度者蓋觜在上參在下二星同體古法先觜後參則以觜度屬參今參足更展觜已無度而二十八宿不可缺其一故先參後觜則以參度屬觜其實一也唐月令作八月之節日在翼昏南斗中曉畢中斗建酉位之初八月中氣日在軫昏南斗中曉東井中斗建酉位之中通書白露日在翼五度秋分日在軫一度今時憲書白露日在張十二度秋分日在翼九度夀星古法初軫十二度終氐四度今法初翼十一度終角九度其日庚辛其帝少皞其神蓐收其蟲毛其音商律中南吕正義鄭氏康成曰南吕者大蔟之所生三分去一律長五寸三分寸之一仲秋氣至則南吕之律應周語曰南吕者贊陽秀物孔疏贊佐也隂佐陽秀成物也漢志南任也隂氣旅助夷則任成萬物也班氏固曰陽猶任事隂故拒之韋氏昭曰八月南吕坤六二也管長五寸三分隂任陽事助成萬物不榮而實曰秀髙氏誘曰陽氣內藏隂吕於陽任其成功也陳氏祥道曰南吕酉律酉正西也氣至南而化行於西而成西所以成南而行耳朱子曰南吕正律五寸三分變律五寸二分三釐一毫六絲零一初六杪存疑王氏喬桂曰南吕長六寸六分自夷則降九分其數九其味辛其臭腥其祀門祭先肝盲風至鴻雁來玄鳥歸羣鳥養羞盲亡庚反夏小正有鹿人從鴽為鼠正義鄭氏康成曰皆記時候也盲風疾風也孔疏皇氏云秦人謂疾風為盲風玄鳥燕也歸謂去蟄也凡鳥隨隂陽者不以中國為居孔疏玄鳥不為仲春之候由别與郊禖為候且仲春時候非一也玄鳥之蟄不逺在四夷但必於幽僻之處非中國所常見也羞謂所食也孔疏若食之珍羞相似夏小正曰丹鳥羞白鳥傳曰丹鳥者謂丹良也皇氏曰丹良是螢火白鳥者謂蚊蚋也其謂之鳥者重其飬者也有翼者為鳥羞也者進也不盡食也孔疏是蟲乃謂之鳥者重其所養之物不盡食之故蟲而謂之鳥以上皆小正文二者文異未知孰是髙氏誘曰候時之鴈從北漠中來南過周雒之彭蠡燕春分而來秋分而去歸於蟄所傳曰玄鳥氏司分者也方氏慤曰盲者閉暗之稱西闔户故其風謂之盲風又謂之閶闔玄鳥至以陽中故歸以隂中也陸氏佃曰鴻鴈何不言南鄊非其居也羣鳥丹鳥也養羞養白鳥焉凡欲羞之必先養之養在八月羞在九月養之仁也羞之義也存疑髙氏誘曰寒氣將至羣鳥養進其毛羽以禦寒也故曰羣鳥養羞方氏慤曰羞謂所美之食養之所以備冬藏也項氏安世曰羣鳥至秋與百榖俱成人始取之以為養羞如雉鷃鶉鳩雁鶩今人皆至秋食之案羣鳥養羞夏小正作丹鳥羞白鳥陸氏所謂先養之後羞之養之者仁羞之者義正謂此也陳氏集説亦主方氏若如髙説當云羣鳥養羽羞字之訓未眀如項説當云羞以羣鳥與以犬嘗麻相次矣天子居總章大廟乘戎路駕白駱載白旗衣白衣服白玉食麻與犬其器亷以深正義鄭氏康成曰總章大廟西堂當大室也張氏虙曰當酉上八月位也案總章兼祀五帝則祀金德之帝於此故亦謂之大廟其不言堂班布時政則八月涖之若大朝諸侯則必南面於眀堂也居亦於大廟之大室開其西閉其東南北之户是月也養衰老授几杖行糜粥飲食正義鄭氏康成曰助老氣也行猶賜也髙氏誘曰隂氣發老年衰故共養之授其几杖賦行糜粥飲食之事周禮大羅氏掌獻鳩杖以養老又伊耆氏掌共老人之杖今之八月比户賜髙年鳩杖粉餈是也張子曰老人氣衰津液自少不能乾食故糜粥為養老之具養老有祝鯁祝噎正宜如此方氏慤曰几杖以養其體糜粥以養其氣授特授之行遍行之也几杖之禮為重非庶人之老可與故與糜粥言行焉彭氏亷夫曰几以安其體杖以助其力糜粥所以滋養也通論方氏慤曰飲養陽氣也食養隂氣也養陽非無食養隂非無飲特各有主耳故此兼言飲焉張氏虙曰養老古之盛禮也若衰老之人則其禮不同矣然授以几杖與致仕者同則其禮亦不薄為之糜粥憫其不能食也此與祝鯁祝噎之意同止未可輕視也存疑徐氏師曾曰杖以賜國老非庶人之老可與故特言授案此養衰老與養老禮不同養老是大禮此是通行之令彭氏謂養老於學有國常禮於是月申令之非也王制五十杖於家六十杖於鄊安見庶人之老不可杖五十養於鄉六十養於國安見庶人之老不可授杖乎徐説亦非也乃命司服具飭衣裳文繡有恆制有小大度有長短衣服有量必循其故冠帶有常淮南子作文繡有恆衣服冇量冠帶冇常必循其故正義鄭氏康成曰文繡謂祭服文畫也祭服之制畫衣而繡裳孔疏書日月星辰山龍華蟲作會宗彛藻火粉米黼黻絺繡是衣會而裳繡也畫色輕故在衣以法天繡色重故在裳以法地衣服則謂朝燕及他服孔疏戰伐田獵等之服凡此為寒益至也詩云七月流火九月授衣於是作之可也冠帶因制衣服而作之髙氏誘曰司服主衣服之官將飭正命服故命之也上曰衣下曰裳五色備謂之繡周禮司服掌王之吉服凡兵事韋辨服視朝皮辨服冠服者素幘也孔氏穎逹曰飭正也具飭備具正理祭服裳繡而衣畫朝燕等之衣服小大長短及制度采色皆有度量必循故法也存異方氏慤曰青赤為文赤白為章言文則章可知作繪於衣刺繡於裳言繡則繪可知衣裳之制大至衮冕之九章小至玄冕之一章衣在上而長裳在下而短變裳曰服見必服乎其事焉正言冠帶以男子重首婦人重要亦男女之異尚也胡氏銓曰鄭以具飭衣裳文繡有恆為祭服者以禹致美黻冕也以衣服有量為朝燕服者以禹惡衣服也黃氏震曰小大長短皆主衣裳言之禮服也衣服則主燕服及他服言之案具飭衣裳句提其綱下詳其目具飭者朝祭燕私之服無不飭正之也衣裳以命服為重故先舉文繡至於小大若袼之可以運肘長短若短毋見膚長毋被土其制度當各隨其人以為量無定數而有定式當必循其故也詩以其帶伊絲其辨伊騏明君子用心之一所謂有常也若子臧之鷸冠子玉之瓊辨則非常矣人之變常棄禮每於衣服見端具飭而正之亦辨上下定民志之一事也時將授衣亦以順秋令眀肅之義鄭氏訓文為繪得之方以青赤合為文與言冠帶以别男女皆鑿乃命有司申嚴百刑斬殺必當毋或枉橈枉橈不當反受其殃當去聲橈女教反正義鄭氏康成曰申重也當謂值其罪髙氏誘曰有司理官刑非一故言百軍刑斬獄刑殺人命至重故必當凌弱為枉違強為橈反還殃咎也孔氏頴逹曰枉謂違法曲斷橈謂有理不申應重乃輕應輕乃重是其不當也方氏慤曰孟秋既命嚴斷刑矣至此又申之酉為隂中故申命止於是月斬者必殺殺者不必斬必當慮其及無辜也大辟尤人所重故特申之斬殺不當則以枉橈故也先王奉天如此而有司或枉橈焉是逆天也逆天則天災適當之矣徐氏師曽曰反受其殃言殃在有司也餘論張氏虙曰吕刑一書反覆用刑之道謂苗民殺僇無辜上帝降咎乃絶厥世反受其咎信不誣也夫人臣任用刑之責以枉橈受殃固其自取惟國家以若人掌刑使一婦銜寃三年大旱一夫茹苦六月隕霜怨恨所鍾乖氣成象至於促國之脈銷國之福殃在一人而並毒流四海掌刑之責可輕付哉案抑彼聽我曰枉屈己就彼曰橈考工記惟轅直且無橈也髙注凌弱違強於義甚明蓋於弱者而但據法以斷不得其情則彼必受枉矣於強者而遂屈法以就不正其理則我之法橈矣方謂枉在上不直橈在下不申黃謂枉以直為曲橈以是為非於枉字可通而橈字不甚明確是月也乃命宰祝循行犧牲視全具按芻豢瞻肥瘠察物色必比類量大小視長短皆中度五者備當上帝其饗行中當並去聲正義鄭氏康成曰於鳥獸肥充之時宜省羣牲也宰太宰祝太祝主祭祀之官孔疏周禮太宰職納亨贊王牲事養牛羊曰芻犬豕曰豢孔疏食草曰芻食榖曰豢五者謂所視所按所瞻所察所量皆得其正則上帝饗之上帝饗之而無神不饗也王氏肅曰純色曰犧體完曰全髙氏誘曰養祭祀之犧牲繫於牢芻之三月祝大祝以騂牷事神祈福祥也循行犧牲視其全具恐毁傷也案所芻豢察其肥瘠恐失養也孔氏頴達曰物色騂黝之别周禮陽祀用騂隂祀用黝望祀各以其方之色已行故事曰比品物相隨曰類如五方各異其色是比也太皞配東亦用青是類也大謂牛羊豕成牲者小謂羔豚之屬長短謂天地之牛角繭栗宗廟之牛角握之屬上帝天也方氏慤曰季夏之養牲蓋授充人而芻之也至此特命宰祝循行之而已全者純而不雜若毁事用駹非全也具者完而無傷若鼷鼠食郊牛角非具也物色毛物之色比類者各比其隂陽之類也吳氏澄曰一全具二肥瘠三比類四小大五長短五者皆中其度是謂備當徐氏師曽曰季秋將饗帝故豫命宰祝循行之存異髙氏誘曰宰於周為充人掌養牲方氏慤曰宰以宰牲為事者芻者豢之物豢者芻之事案養牲者充人之事此又命宰祝循行之重其事也髙謂宰即充人非是天子郊禘之事必自射其牲豈有以宰牲為事者而命循牲哉方説尤非也芻豢説亦不的天子乃難以達秋氣難儺同吕氏春秋難下有禦佐疾三字正義鄭氏康成曰此難難陽氣也孔疏季冬及季春皆難隂氣恐此亦難隂氣故云難陽氣陽暑至此不衰害亦將及人孔疏秋涼之後陽氣應退當涼反熱故亦害人所以及人者陽氣在行此月宿值昴畢亦得大陵積尸之氣氣佚則厲鬼亦隨而出行孔疏季春隂氣右行日在昴畢此月陽氣左行斗建昴畢于是亦命方相氏帥百隸而難之王居眀堂禮曰仲秋九門磔攘以發陳氣禦止疾疫孔疏涼氣新至發去陽之陳氣引明堂禮磔攘則此亦磔攘文不具耳髙氏誘曰通達秋氣使不壅閉也成氏伯璵曰天子難陽氣諸侯不得難陽氣避天子也吳氏澄曰難以消去殘暑煩鬱之氣而達秋月清涼之氣于民間陳氏澔曰暑氣退則秋之涼氣通故曰以達秋氣也通論孔氏頴達曰季冬稱大難貴賤皆為也十一月陽氣至虛危而不難十二月隂氣至虛危而難者十一月陽氣初起未能與隂氣相競十二月亦陽初起而隂在虛危又是一嵗之終總除疫氣故為難也六月宿值栁鬼亦不難以隂至微未能與陽相競也其磔之牲大難用牛餘以羊犬及雞成氏伯璵曰方相氏官嵗有三時率領羣𨽻驅索厲疫之氣於宫中禳送之義也天以氣化物五帝各行其德餘氣留滯則時為之不和而災疫興焉大難者貴賤至於邑里皆行之國難但於國城中行耳季春日在昴畢仲秋斗建昴畢俱當大陵有積尸之氣季冬日在虛危又有墳墓之星天之道曰隂陽相沴則淫厲慿之而出助天行虐也張氏虙曰聖人有以順隂陽之氣深慮夫邪之得以干正春氣發生有不正者干之則發生之功不遂故難曰以畢春氣令春氣使畢出也秋氣告成有不正干之則氣必抑塞故難曰以達秋氣令秋氣得以行也夏不難陽氣極盛邪氣自消不待難也存疑孔氏頴達曰季春云國難惟天子諸侯有之此云天子以其難陽氣陽是君象諸侯以下不得難陽氣也張氏虙曰至冬大難則磔牲秋則不磔蓋達秋氣有輔相裁成之意焉惟天子能之不假有所磔也案仲秋四隂之月秋氣漸逹而當涼反暑則亢陽不正之氣從而撓之達者亦塞矣聖人扶陽抑隂而鄭以儺為逐陽氣者蓋逐陽氣之不正者耳不正之氣既逐則秋氣無所撓所謂逹之者如此孔氏乃以陽為君道言之是誤以此陽為正氣也夫陽之正氣而顧可逐乎不若成氏避天子説為確又按季春季冬俱言磔此獨不言磔故張説如此但注疏本王居明堂禮言不為無據也姑存張説以備一義以犬嘗麻先薦寢廟正義鄭氏康成曰麻始熟也髙氏誘曰犬金畜也麻始熟故嘗之是月也可以築城郭建都邑穿竇窖修囷倉竇音豆窖音教吕氏春秋作􅐎囷丘倫反正義鄭氏康成曰為民將入物當藏也穿地隋曰竇方曰窖孔疏似圎非圎似方非方曰隋王居眀堂禮曰仲秋農隙畢入於室曰時殺將至毋罹其災孔疏此時耘鋤既了乘時入室以避隂災然末盡成熟尚須出野收斂至十月之後又入室避寒詩曰入此室處是也髙氏誘曰穿窖以盛榖也仲秋大內榖故修囷倉圎曰囷方曰倉方氏慤曰此皆斂藏之事故於建酉闔户之月言之朱氏申曰城郭崇土為之故曰築都邑畫地為之故曰建吳氏澄曰築城郭建都邑以居民也穿竇窖修囷倉以藏物也徐氏師曽曰農事畢故可以興土功城郭都邑功之作於上者竇窖囷倉功之作於下者通論董氏應㿩曰左傳凡土功水昏正而栽日至而畢則冬至以前皆土功之時也孫氏謂此仲秋築城郭建都邑是秦法乃命有司趣民收斂務畜菜多積聚趣音促積子賜反畜菜吕氏春秋淮南子皆作蓄采正義鄭氏康成曰始為禦冬之備也髙氏誘曰有司於周禮為場人方氏慤曰趣民急趣之也孟秋言命百官始收斂以其物初成至此則其物既成而收斂不可緩故趣之焉又曰詩言我有旨蓄亦以禦冬不特菜而已吳氏澄曰言菜之外他物皆當積聚而蓄之以備御冬也乃勸種麥毋或失時其有失時行罪無疑夏小正樹麥在九月正義鄭氏康成曰麥者接絶續乏之榖尤重之孔疏前年秋榖至夏絶盡後年秋榖未登是其絶也夏時人民糧食缺短是其乏也麥此時熟乃接續其絶乏黍稷百榖不言勸麥獨言勸是尤重之也髙氏誘曰罪罰也孔氏頴逹曰蔡氏云陽氣初胎於酉故八目齊麥應時而生方氏慤曰麥以秋稼至夏乃穡其牟利遲慮民惰而不種故勸之案南麥多種於仲冬北麥且有種於仲春者不惟秋也然惟秋種者得四時之氣為全故食之最有益北麥秋種者至冬盡萎而根力已厚其收視春種者倍之是月也日夜分雷始收聲蟄蟲壞户殺氣浸盛陽氣日衰水始涸壞步回反涸户角反正義鄭氏康成曰又記時候也雷始收聲在地中動內物也壞益也蟄蟲益户謂稍小之也涸竭也此甫八月中雨氣未止孔疏八月宿值昴畢畢主雨故云雨氣未止而曰水竭非也周語曰辰角見而雨畢天根見而水涸又曰雨畢而除道水涸而成梁孔疏引周語以下證九月水始涸不得在八月也辰角見九月本也天根見九月末也孔疏辰角大辰蒼龍之角朝見東方天根亢氐之間寒露後五日天根朝見王居明堂禮曰季秋除道致梁以利農也孔疏農既收便其運轉髙氏誘曰是月秋分晝夜漏各五十刻雷始收藏其聲不震孔氏頴達曰雷是陽氣主於動十一月其卦名復是雷動地中也時氣尚溫蟲猶須出入但益戶使小十月寒甚乃盡閉之方氏慤曰隂主殺陽主生浸若水之浸言與日加益隂之夷物至此而酷也陽盛於夏至此而衰矣朱氏申曰雷發聲於陽中之時故收聲於隂中之時蟄蟲啓户於雷發聲之時故壞户於雷收聲之時陳氏澔曰水本氣之所為春夏氣至故長秋冬氣返故涸彭氏亷夫曰隂氣吸故水涸日夜分則同度量平權衡正鈞石角斗甬正義方氏慤曰鈞三十斤石四鈞之稱以其尤重而內實故謂之石吳氏澄曰度量權衡總言之下二句分言之鈞石五權之二斗甬五量之二舉二而他可知正之角之所以同之平之也通論張氏虙曰霜降水涸天地間肅肅乎嚴矣度量權衡亦以此時而一其制聖人所為一道德而同風俗乃自器用始也舜講於朝守之日而月令於春秋分後世之政治又詳於古矣周禮質人同其度量一其淳制犯禁有罰其所以重之則一也漢志律度量皆用銅謂銅同也所以同天下齊風俗也未知舜亦用銅否是月也易關市來商旅納貨賄以便民事四方來集逺鄉皆至則財不匱上無乏用百事乃遂易去聲匱其位反正義鄭氏康成曰易關市謂輕其稅使民利之商旅賈客也匱亦乏也遂猶成也髙氏誘曰易關市不征稅也市賤鬻貴曰商旅者行旅也以所有易所無民得其求是便也上無乏用所求得也遂成也孔氏頴達曰易輕其賦稅不為節礙也關市既易則商旅自來商旅既來則貨賄自入以此便利民人之事四方總來聚集逺鄉於是皆至貨賄既多則庫財不匱所須皆供上下豐足故百事成也方氏慤曰入以為利者商也行而從人者旅也易關市所以來商旅來商旅故貨賄可得而納也貨賄以時而納待時而出出納皆以便民耳四方散而不一故言來集逺鄉邈而在外故言皆至財貨賄之總名財以待用用以作事遂言遂其志之所欲為大傳曰財用足故百志成正謂是矣朱氏申曰關者貨之所入市者貨之所聚易謂無重征以致其難也貨謂化之以為利賄謂有之以為利凡此皆以便民事也彭氏亷夫曰上下兼足皆由關市寬征以總結上文餘論張氏虙曰仲夏關市毋索矣至秋則萬寶告成焉先王之制關譏而不征市廛而不稅此來商旅之至要其道未嘗不易此商旅所以願藏於王之市願出於王之塗也夫四方之集逺方之至豈有以號召之哉成周之時司關司市設官分職無非為民也以此理財財若無由而足而君有餘財民有餘力其道乃自易中得之後世設關則為暴於市則罔利豈知易之義哉存疑方氏慤曰四方來集逺鄉皆至則貢賦之職修矣案本文止言商旅耳下半乃極言易關市之效未嘗别言諸侯之職貢也分為二事非凡舉大事毋逆大數必順其時慎因其類正義鄭氏康成曰大事謂興土功合諸侯舉兵衆也季夏禁之孟秋始征伐此月築城郭季秋教田獵是以於中為之戒焉髙氏誘曰數天道時天時類事類順其事類不干逆也孔氏頴達曰興舉大事毋逆天之大數必順其隂陽之時謹慎因其事類不可煩亂妄為方氏慤曰凡物有數皆出陽而入隂所謂大數不過隂陽之出入而已事之作止豈可逆此哉數之所運而為時時之所從而為類時方來故欲順之而無違類有守故欲因之而無變然順之而或苟猶失時也故曰必因之而或妄猶非類也故曰慎此亦四時所同以當闔户尤不宜妄舉故申戒之通論張氏虙曰季夏戒之言舉大事之殃仲秋教之言舉大事之道仲秋行春令則秋雨不降草木生榮國乃有恐行夏令則其國乃旱蟄蟲不藏五榖復生行冬令則風災數起收雷先行草木蚤死復扶又反數音朔淮南子下有八月官尉其樹柘正義鄭氏康成曰行春令則卯氣乘之行夏令則午氣乘之行冬令則子氣乘之也卯宿直房心心為大火故雨不降草木生榮應陽動也有恐以火訛相驚也孔疏仲秋為金金剋春木又仲秋雨水水又剋火火不能為害故但以訛言相驚也北風殺物故災先猶蚤也冬主閉藏故蚤收聲草木蚤死寒氣勝也髙氏誘曰秋陽而行溫仁之令故雨不降尚生育故草木榮金木相干有兵象故民大恐行夏令夏氣盛陽故旱使蟄伏之蟲不潛藏而五榖萌生也於洪範為恆燠之徴冬氣寒猛故風災數發收藏之雷先動行未當故曰先也方氏慤曰春雨生物秋雨成物雨非不降所降非成物之雨故草木不枯而榮也國有恐少陽之所動也國乃旱陽亢故也蟲不藏隂欲執之而不勝也五榖復生盛陽作故也風災數起以非時動也雷以陽中發聲隂中收聲收雷先行則愆於陽故也雷風不莭故草木蚤死張氏虙曰雨不降則無以助隂氣之肅所以草木榮國之有恐殺氣不行人有玩心也蟲當藏而不藏榖不當生而生皆非正也雷已收聲謂之收雷先行者非時而發也草木未當死而死亦失正也陳氏澔曰行春令為卯木之氣所仇行夏令為午火之氣所克行冬令為子水之氣所泄也季秋之月日在房昏虛中旦栁中夏小正九月內火日在房淮南子作招搖指戌正義鄭氏康成曰季秋者日月會於大火孔疏大火卯次之號而斗建戌之辰髙氏誘曰房東方宿宋之分野孔氏頴達曰九月建戌戌畢也畢入於戌三統厯九月莭日在氐五度昏虛二度中旦張初度中九月中日在房五度昏危三度中旦張十八度中元嘉厯九月節日在亢一度昏牛八度中旦井二十九度中九月中日在氐七度昏女十一度中旦栁十二度中案此謂寒露後三十日也房東方陽宿四星直下微曲廣六度月建戌而日在卯戌與卯合也虛北方陽宿二星正直廣九度唐月令作九月之節日在角昏牽牛中曉東井中斗建戌位之初九月中氣日在氐昏須女中曉栁中斗建戌位之中通書寒露日在軫十六度霜降日在角十度今時憲書寒露日在軫七度霜降日在角九度大火古法初氐五度終尾九度今法初亢初度終房初度其日庚辛其帝少皞其神蓐收其蟲毛其音商律中無射射音亦正義鄭氏康成曰無射者夾鍾之所生三分去一律長四寸六千五百八十一分寸之六千五百二十四季秋氣至則無射之律應周語曰無射所以宣布哲人之令德示民軌儀孔疏哲人謂后稷布其德教示以法儀當及時銍穫而收藏之漢志射厭也言陽氣究物而使隂畢剝落之終而復始亡厭已也班氏固曰射終也言萬物隨陽以終復隨隂以始無厭射也陳氏祥道曰無射建戌之律隂至戌而盛陽至戌而不厭故謂之無射朱子曰無射長四寸八分八釐四毫八絲存疑韋氏昭曰九月無射乾上九也管長四寸九分陽氣上升隂氣收藏萬物無射見者故可遍布前哲之令德使民道法也髙氏誘曰射出也隂氣大升陽氣下降萬物隨陽而藏無射出著見者也王氏喬桂曰無射五寸七分自南吕降九分案曰無射者九月之卦為剝剝窮上反下無有厭斁上陽甫終下陽即始所謂不逺復也一陽在上為哲人其下五隂仰而戴之故曰哲人之令德示民軌儀所謂君子得輿民所載也其數九其味卒其臭腥其祀門祭先肝鴻鴈來賓爵入大水為蛤鞠有黃華豺乃祭獸戮禽蛤古答反鞠菊同華花同夏小正作遰鴻雁爵入於海為蛤榮菊樹麥又有陟玄鳥蟄熊羆貊貉鼬鼪則穴豺祭獸夏小正在十月正義鄭氏康成曰皆記時候也來賔言其客止未去也孔疏仲秋初來則過去故不云賔此留正未去猶賔客之暫留大水海也孔疏國語云雀入於海為蛤戮猶殺也孔疏戮直殺之不以祭也後得者皆殺而不祭言獸禽互文耳髙氏誘曰候時之鴈從北方來南之彭蠡八月來者其父母也其子羽翼稚弱未能及之故於是月而過商雒方氏慤曰萬物皆華於陽獨鞠華於隂故特言有又獨言其色以華於隂中其色正應隂之盛也豺所祭之獸惟可狩而獲者爾其餘凡可禽而獲者皆戮之陸氏佃曰來賔言寓中國如賓客也曰黃華以黃為美也祭言獸以大者祭也張氏虙曰來賓言來而得所如賓之授館也草木雕零而鞠始茂盛物皆黃而落鞠獨黃而華記異也豺性貪祭獸知有先矣以為未足又用禽而戮之戒貪也朱氏申曰爵入大水為蛤亦飛物化為潛物也彭氏廉夫曰獸言其大禽言其小陳氏澔曰鴈以仲秋先至者為主季秋後至者為賓如先登者為主人從之以登者為客也鳥不可曰獸獸亦可曰禽故鸚鵡不曰獸而猩猩通曰禽也考工記天下之大獸五鱗羽皆在內是禽亦可言獸也存異髙氏誘曰賔爵老雀也棲息於人房户之間有似賔客故謂之賔雀案鴈非中國之鳥也月令紀鴈為詳以生於隂而能從陽非中國而知有中國故重之重之故詳之十二月鴈北鄊則七月鴈南鄉可知鄉之未啓行也正月鴻鴈歸啓行未至北也八月鴻鴈來啓行未至南也九月則若賔之至矣九月來賓則三月至其鄉可知而詳於南其所見也略於北其所不見也於北曰鄉曰歸鄉其鄉歸其鄉也於南曰來曰來賔客之也以鴈固非中國之鳥也爵亦號嘉賔髙氏賓爵之訓不為無據而春秋孟仲皆言鴻鴈來則詞復不若來賔之義正也爵不言化蛤不復為爵與鷹鳩之相復異也蛤無隂陽牝牡而能生珠一於隂也一於隂者須陽化也雉化蜃亦陽化隂而蜃五百年而化蛟蛟五百年而為龍隂老復化陽也祭仁者之事也豺獺鷹不仁之物也其皆言祭貴仁也獺言祭不言戮春生仁也仁不忍言殺也秋殺義也戮於是始可用也於鷹言戮猶不言禽豺乃明言戮禽於殺不忍遽盡其辭也其曰乃如不得已之辭也大曰獸小曰禽戮言禽終不忍盡其辭焉爾天子居總章右個乘戎路駕白駱載白旗衣白衣服白玉食麻與犬其器亷以深正義鄭氏康成曰總章右個西堂北偏也張民虙曰當戌上九月位也是月也申嚴號令命百官貴賤無不務內以會天地之藏無有宣出內納通正義鄭氏康成曰申重也內謂收斂入之會猶聚也髙氏誘曰秋季物成故務入也會合也孔氏頴逹曰會猶趣也言人心皆趣向天地所藏之事以物皆收斂時又閉藏無得有宣露出散其物以逆時氣馬氏睎孟曰申嚴號令天地方肅欲其聽命悉也陳氏澔曰専務收斂諸物於內以合天地閉藏之令也宣出則悖時矣通論方氏慤曰藏冬事也內以會之則存乎秋矣不先會於秋則冬無所藏也季春言不可以內季秋言無不務內季春言發倉廩季秋言無有宣出皆所以順隂陽之理而已張氏虙曰天地之氣有發亦有藏人豈能自異於天地哉藏則不復宣出矣會猶參也人之一身與天地並頃刻之中或呼或吸皆有隂陽一日之中或作或息必須晝夜則一嵗之中或出或內豈能離春秋之舒慘乎案申至於再也嚴在必行也號令由百官以布貴賤則自上而下盡乎人也乃命冡宰農事備收舉五榖之要藏帝籍之收於神倉祗敬必飭正義鄭氏康成曰備猶盡也舉五榖之要㝎其租稅之簿也帝籍所耕千畝也藏祭祀之榖為神倉重粢盛之委也孔疏委謂委積之物重此粢盛委積之物故內之於神倉祗亦敬也孔疏恆以祗敬為心不有怠慢也髙氏誘曰冡宰於周禮為天官主治萬事故命之飭正也不有傾邪孔氏頴達曰帝籍供上帝之籍田也祭義云天子為籍千畝以其供神之物故曰神倉當敬而又敬必使飭正方氏慤曰仲秋趣民收斂猶未備也至於備收然後五榖可舉其多少之總數將以制國用也舉要猶宰夫之治要司會之月會與此皆命之冡宰者以國用制於冡宰而甸師之耕耨王籍又隸於天官故也馬氏睎孟曰敬在內祗外見言內盡志外盡力也徐氏師曽曰此養人事神之大禮皆不可苟故必謹其事而祗焉一其心而敬焉各致其力而飭焉餘論張氏虙曰冡宰將以制國用不舉其要國用何由而制然此特舉其要而已漢文帝問宰相一嵗錢榖出入之數幾何周勃辭以不知是失舉要之職陳平辭以有主者又失舉要之義唐以宰相領度攴領鹽鐡失之益逺矣是月也霜始降則百工休正義鄭氏康成曰寒而膠漆之作不堅好也朱氏申曰霜始降隂始凝也以將效功故休息也張氏虙曰將休老勞農凡終嵗勤動者無不休矣百工之役使之少息亦聖人順時之政也通論方氏慤曰雨露生物霜成物季秋則天地成物之功極矣人工其可不休乎季春百工咸理創始之時也孟冬工師效功成終之時也將效功於孟冬矣休之於季秋不亦宜乎然亦有不休者若弓人冬析幹寒奠體也經之所言亦大致然耳乃命有司曰寒氣總至民力不堪其皆入室正義鄭氏康成曰總猶猥卒也髙氏誘曰有司於周禮為司徒司徒主衆故命之使民入室也詩云穹窒熏鼠塞向墐户嗟我婦子曰為改嵗入此室處此之謂也陳氏澔曰總至凝聚而至也通論方氏慤曰陽氣散而成暑隂氣聚而成寒寒氣總至則民力或有所不堪故命入室以禦之書言厥民隩謂是矣然寒氣者冬之時入室者冬之事此蓋先期而命之也夏言處臺榭此言入室亦順隂陽之理爾張氏虙曰聖人視民猶父母之于子疾痛苛癢甚於在已民未嘗以力不堪告而上之人探其情為是恩勤之教嗚呼仁哉上丁命樂正入學習吹吹去聲正義鄭氏康成曰為將饗帝也春夏重舞秋冬重吹髙氏誘曰周禮籥師掌教國子舞羽吹笙竽籥詩云吹笙鼓簧此之謂也陸氏佃曰此與孟春習舞相備孟春亦習吹季秋亦習舞釋菜上下比義可知張氏虙曰以季冬大合吹故也案吹有聲無歌如南陔六萹本無辭而以笙吹之所謂笙吹也象武有辭而不歌以管吹之所謂管吹也饗帝不止用吹言吹則歌舞從可知矣是月也大饗帝嘗犧牲告備于天子鄭陳並以嘗字為句今不從正義吳氏澄曰大饗帝者以周禮言祀上帝於明堂而以文王配也張氏虙曰仲秋告全具矣至此又告備焉古人於祭祀誠篤如此不厭其煩也存疑吳氏澄曰嘗宗廟秋祭之名將舉二祭其所用犧牲當前期告備于天子方氏曰以宗廟秋祭之犧牲告備於天子則以物成可嘗之時尤所重故也嘗如此則大饗可知然周之嘗以仲月而此於季月者彼取時之中此取時之盛存異蔡氏雍曰嘗犧牲使有司展其犧牲而告備具也鄭氏康成曰大饗遍祭五帝也曲禮大饗不問卜謂此也嘗謂嘗羣神也天子親嘗帝使有司祭羣神禮畢而告焉孔氏頴達曰嘗犧牲謂嘗祭羣神以犧牲也知非饗帝時使有司展犧牲告其備具而曰嘗羣神者以四月雩上帝後雩祀百辟卿士眀九月大饗帝外亦當饗羣神也有司祭羣神畢乃告備於天子案五帝説無考案嘗本秋祭言四時之祭者或以為孟月或以為仲月季月則未之聞也此季秋之月而言嘗故蔡鄭二家並舍時祭而别為之説然展牲既不可以嘗名群神亦不可言嘗祭二家憑臆言之其不足訓固不必言矣惟吳氏説較為近似蓋秦不師古其為嵗也既可以十二辰之末為首則其為祭也又何不可以三秋之末而嘗但于古無據又季月秋氣漸衰亦不可以言盛也惟是記文費解舍此别無稍合者姑以疑存之以俟之知禮者合諸侯制百縣為來嵗受朔日與諸侯所稅於民輕重之法貢職之數以逺近土地所宜為度以給郊廟之事無有所私上為去聲正義鄭氏康成曰秦以建亥之月為嵗首此為嵗終孔疏史記秦文公獲黑龍自為水瑞命河為德承以十月為嵗首使諸侯及鄉遂之官受此法焉貢職所入天子凡周之法以正月和之正嵗而縣于象魏孔疏周禮太宰職正月之吉始和布治于邦國都鄙小宰職正嵗縣治象之法于象魏髙氏誘曰百縣畿內之縣也五家為鄰五鄰為里四里為鄼五鄼為鄙五鄙為縣縣二千五百家也逺者貢輕近者貢重各有所宜郊祀天廟祀祖取共事而已無多少不如法制也孔氏頴達曰天子有朔日政令諸侯稅民輕重之法貢職之數皆天子制之言與者兼事之辭諸侯謂畿外國百縣謂鄉遂稅于民者是積貯本國貢職之數是輸納天子方氏慤曰合合而同之制裁而制之合自內以合外制自上以制下諸侯有君道故合之而已百縣全乎臣則必制之焉然通而言之其實一也輕重之法取乎下貢職之數共乎上法以定數數以成法亦互相備也或以逺近所宜之事為度以詳責近以略責逺也或以土地所宜之物為度取其所有不責所無也應氏鏞曰稅取於秋貢集于春稅之輕重所謂用地小大視年豐耗也貢職之數所謂旅幣無方節逺邇之期而別土地之宜也稅法不于是亟頒之則諸侯之取于民者無制貢法不于是早㝎之則諸侯之貢于上者無準故于季秋頒之也張氏虙曰逺近所宜若周禮男服貢器物衛服貢財物之類土地所宜如禹貢徐州貢土五色揚州貢金三品之類馬氏睎孟曰陽終于戌嵗功終焉故于厯以自戌至戌為嵗終戌之月而來嵗受朔日終則有始也存疑鄭氏康成曰合諸侯制者㝎其國家宫室車旗衣服禮儀也孔疏據周官典命文諸侯言合制百縣言受朔互文孔疏百縣亦合制諸侯亦受朔劉氏敞曰合諸侯總命諸侯之國也制猶敕也百縣諸侯所統之縣天子總命諸侯各􅎁百縣為來嵗受朔日與稅法貢數辨正吳氏澄曰合諸侯是一句制百縣是一句舊注非也案受朔日內而百縣外而諸侯之所同若百縣則畿內之地有賦無貢而賦法亦掌于冡宰其法縣之象魏不待頒也故别言諸侯若如鄭説則宫室車服若典命之等于夲文為增添如劉説則百縣為諸侯之縣而畿內無有亦太詳外而略內矣皆似不可從是月也天子乃教於田獵以習五戎班馬政正義鄭氏康成曰教于田獵因田獵之禮教民以戰法也五戎謂五兵弓矢殳矛戈戟也孔疏周禮五兵鄭司農云戈殳戟夷矛酋矛鄭又注云步卒五兵無夷矛而有弓矢馬政謂齊其色度其力使同乘也孔疏毛詩傳曰宗廟齊毫尚純也戎事齊力尚強也田獵齊足尚疾也校人職曰凡軍事物馬而頒之孔疏物馬齊其力也亦須齊其色詩駟騵彭彭髙氏誘曰五兵刀劔矛戟矢也為將田獵故習肄五兵選擇田馬取堪乘也方氏慤曰上言習下言教我教之故彼習之也馬氏睎孟曰仲夏班馬政以馬為主此班馬政以御為主通論方氏慤曰田獵所以得利軍旅所以致死人之所欲莫甚于利所惡莫甚于死以所惡寓所欲而習焉先王之深意也大司馬秋獮治兵其以是與陳氏祥道曰夷矛雖不施于步而弓矢未嘗不設于車故兵車射者居左廬人攻國之兵欲短守國之兵欲長司馬法弓矢圍殳矛守戈戟助蓋以殳對矛則殳可攻矛可守以弓矢對殳矛則殳矛可以守弓矢可以攻而五兵之用莫便于戈其柲短而易持其胡援廣而易入觀富父終甥摏長狄僑如狼瞫斬秦囚子南擊子晳長魚矯殺郤犨皆以戈可見總之五兵之用長以衛短短以救長人持其一足矣若盾則夫人有之命僕及七騶咸駕載旌旐授車以級整設于屛外司徒搢撲北面誓之正義鄭氏康成曰僕戎僕及馭夫也孔疏周禮戎僕掌馭戎車以其教戰故不用田僕馭夫掌馭從車使車從車戎車之副使車驅逆之車也七騶謂趣馬主為諸官駕説者孔疏趣馬職掌駕説之頒頒謂貴賤等列也既駕之又為之載旌旗司馬職曰仲秋教治兵如整旅之陳辨旗物之用王載太常諸侯載旗軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟是也孔疏日月為常交龍為旗熊虎為旗通帛曰旜雜帛曰物龜蛇曰旐鳥隼為旟級等次也整正列也設陳也屛所田之地門外之蔽司徒誓衆以軍法也孔疏春搜用田獵之誓曰無干車無自後射冬大閲羣吏聽誓于陳前斬牲以左右徇曰不用命者斬之此以軍法誓者必斬殺也髙氏誘曰僕于周禮為田僕掌馭田輅七騶于周禮為趣馬田獵掌佐車之政級屛樹垣也衆當受田車者各以等級陳于屛外搢插也撲所以教也插置帶間誓告其衆孔氏頴達曰大閲王建太常諸侯建旗孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐道車載旞斿車載旌鄭注空辟實也謂大閲空象治民之事故所建旌旗不如仲秋治兵實出軍之事也孔疏軍吏諸帥師都遂大夫鄉遂鄉大夫郊鄊遂之州長縣正以下野公邑大夫州里鄉中州長黨正族師遂中里宰縣鄙遂中縣正鄙師鄼長及鄉之閭胥比長方氏慤曰僕主車騶主馬載旌旐所以表識也旗物有九此止言二舉其略耳戎車以革車為正倅車為副田車以木車為正佐車為副各有等級故授之以級也掌次師田張幕故亦有屛王雖在野亦有內外之辨也朴夏楚也書言撲作教刑插之于帶示有事于教無事于刑也誓之欲其不犯令必北面以田主殺隂事故也馬氏睎孟曰為天子御者僕也為諸侯羣臣御者七騶也以帛為之者始于太常終于旐以羽為之者始于旞終于旌言旌旐則他可知存疑徐氏師曽曰周禮有司表貉誓民鄭據此以有司為大司徒案大司徒不可謂之有司而搢撲示衆亦非大司徒之職司徒二字恐有誤存異皇氏侃曰七騶種馬駕玉輅齊馬駕金輅道馬駕象輅戎馬駕戎輅田馬駕田輅駑馬駕宫中役車并總六騶者為七案田以習戎金輅玉輅象輅非所當駕且尚強尚疾駑馬又安用之恐是天子六軍分别左右親軍虎賁居中故為七也天子乃厲飾執弓挾矢以獵命主祠祭禽于四方正義鄭氏康成曰厲飾為戎服尚威武也今月令獵為射熊氏曰戎服韋辨服若春夏則冠辨服以所獲禽祀四方之神司馬職曰羅弊致禽以祀祊髙氏誘曰是月天子尚武容服猛厲周禮司服凡田冠辨服戎服垂衣也主祠掌祀之官祭禽四方報其功也孔氏頴達曰秋田主祭四方報成萬物詩以社以方方氏慤曰厲其容飾介胄則有不可犯之色也祭禽報成功于百神且示非専為一人之養也李氏覯曰先王之田外以彰事神通論孔氏頴達曰四時田獵皆祭宗廟而分時各以為主春時土方施生獵則以祭社為主夏時隂氣始起象神之在內獵則以祭宗廟為主秋時萬物以成獵則以報祭社及四方為主冬時萬物衆多獵則主用衆物以祭宗廟而亦報于物有功之神于四方也案僕及七騶咸駕此班馬政之事執弓挾矢以獵此習五戎之事獲獸必資于兵駕車必資于馬咸駕是未獵之時先備事而致戒厲飾是方獵之時必親事而行禮習武之事皆在其中天子獵後諸侯百姓皆以次而獵習與班之政行矣是月也草木黃落乃伐薪為炭正義鄭氏康成曰伐木必因殺氣髙氏誘曰仲夏草木未成故禁燒炭至是斧斤入林乃燒之方氏慤曰黃者土之色百昌皆主於土反于土以其將反于土故黃黃故落也落則反于土矣伐薪為炭以禦冬寒故也張氏虙曰炭以禦寒人之所資非不急也然必待草木黃落之後始取之物既歸根用隨宜斧斤以時亦王政之一事也蟄蟲咸俯在內皆墐其户乃趣獄刑毋留有罪收祿秩之不當供養之不宜者趣音促當去聲正義鄭氏康成曰墐為塗閉之辟殺氣也殺氣已至有罪者即決之祿秩不當恩所增加供養不宜欲所貪嗜若熊蹯之屬非常食者天氣殺而萬物咸藏可以去之也孔氏頴達曰前月但藏而壞户至此月既寒故垂頭嚮下以隨陽氣陽氣稍沉在下也又塗塞其户穴以辟地上隂殺之氣春夏陽氣寬舒故雖不當亦所權許今秋隂氣急斂禁罰必當故悉收停之黃氏震曰因蟄蟲咸俯而趣刑殺氣已至不敢留獄也收祿秩之不當謹于養人收供養之不宜莭于奉已凡以順斂藏之義而已通論張氏虙曰為政無取乎督促獄刑則惡乎留滯入秋以來孟則嚴之仲又申嚴之至季乃趣之桎梏之苦箠椘之痛望而畏之此豈可留者易曰山上有火旅先王以眀慎用刑而不留獄旅不處也聖人以不留獄象之信夫黃氏應㿩曰漢陳寵奏月令孟冬之月趣刑獄毋留罪眀天刑畢于立冬也仲冬身欲寧事欲靜若以降威怒不可謂寧以行大刑不可謂靜且子丑之月行刑則殷周嵗首流血所必無也魯恭言中孚十一月之卦君子以議獄緩死則至十一月宜緩死矣漢世斷死盡三冬至酷吏謂冉展一月足吾事何哉此後世決囚所以常在秋後冬至前也黃氏乾行曰祿秩濫恩供養僣踰若必待時而收豈非失政哉先王重爵祿之典眀貴賤之等自無此失縱或有之亦必隨即修改以正紀綱記者之説恐未然也是月也天子乃以犬嘗稻先薦寢廟正義鄭氏康成曰稻始熟也髙氏誘曰稻始升故嘗之先薦寢廟孝敬親也季秋行夏令則其國大水冬藏殃敗民多鼽嚏行冬令則國多盜賊邉竟不寧土地分裂行春令則暖氣來至民氣解惰師興不居鼽音求嚏音帝解懈同又嚏吕氏春秋作窒淮南子下有九月官候其樹槐正義鄭氏康成曰行夏令則未氣乘之行冬令則丑氣乘之行春令則辰氣乘之也六月宿直東井氣多暑雨極隂為外邊竟之象孔疏十二月二陽伏地下四隂在地上故曰極隂為外大寒之時地隆坼也巽為風孔疏辰卦直巽角主兵孔疏辰宿直角不居者象風行不休止也髙氏誘曰秋金氣水之母也夏陽布施多霖雨二氣相并故大水火干金故肺氣不通冬令純隂姦謀所生之象故多盜賊使邉竟之人不寧而土地為鄰國所分裂也春陽仁故暖風至而民懈惰木干金故師旅並興方氏慤曰水潦盛昌在季夏故大水大水故冬藏殃敗金數窮而氣窒則鼽金氣逆而彂聲則嚏皆肺疾也肺屬金金生水反為水所勝則是疾生焉土地分裂嚴凝之氣所坼也氣暖則解緩寒則縮栗師興不居以少陽作之而動也陳氏澔曰行夏令則為未土之氣所應行冬令則為丑土之氣所應行春令則為辰土之氣所應也欽定禮記義疏卷二十四
