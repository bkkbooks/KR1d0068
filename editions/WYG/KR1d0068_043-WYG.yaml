body:
  text: 玉藻第十三之三凡侍於君紳垂足如履齊頤霤垂拱視下而聽上視帶以及袷聽鄉任左齊音咨本又作齋頤以支反霤力救反袷居業反鄉許亮反正義鄭氏康成曰紳垂則磬折也齊裳下緝也袷交領也孔氏穎達曰謂臣侍君法也凡者臣無貴賤皆然紳大帶也身直則帶倚磬折則帶垂身折則裳前下緝委地故行則足恒如踐履裳下也霤屋簷身俯故頭臨前垂頤如屋霤垂拱者拱沓手也身俯則宜手沓而下垂也視下者視高則傲故下矚也聽上謂聽尊者語宜諦聽視帶以及袷者視尊者之處也視君之法下不過帶髙不過祫故曲禮云凡視上於面則傲下於帶則憂是也聽上及聽鄉任左皆備君教使也鄭注少儀曰立者尊右則坐者尊左也侍君之時君坐故侍者在右是以聽鄉皆以左爲任謂以左耳近君也輔氏廣曰垂而必拱不盡垂也存異孔氏穎達曰仰頭而面鄉上以聽之案視下聽上只承頤霤垂拱總言其身容之俯蓋人之耳目本平頭俯則見其目卑而耳髙視下而聽上矣孔反謂仰面非也凡君召以三節二節以走一節以趨在官不俟屨在外不俟車正義鄭氏康成曰節所以明信輔君命也使使召臣急則持二緩則持一周禮曰鎮圭以徵守孔疏典瑞文謂徵召守國諸侯以鎮圭其餘未聞今漢使者擁節案周禮地官掌節掌守邦節而辨其用以輔王命必有執隨授之者官謂朝廷治事處案考工記外有九室九卿治之此其地也不俟者趨君命也孔氏穎達曰此論臣被君召之儀節以玉爲之君使召臣隨事緩急急則二節臣故走緩則一節臣故趨也外謂其室及官府也在官近不須車故言屨在外逺故云車庾氏曰謂急緩不出於三耳不謂節盡於三也應氏鏞曰豈終跣足而徒歩哉倉猝承命而屨與車隨之而後耳余氏心純曰以趨以走一節二節之所異不俟屨不俟車一節二節之所同皆敬承君命也通論方氏慤曰孟子言旌以招大夫旂以招士皮冠以招虞人皆召以節之義也凡趨疾於行走又疾於趨案君召以節為信節以三為度禮也然臣之奉君命弗遑不待三也雖二節以走矣不惟二也即一節以趨矣士於大夫不敢拜迎而拜送士於尊者先拜進面答之拜則走正義鄭氏康成曰不敢拜迎者禮不敵始來拜則士辟也孔疏大夫詣士禮既不敵故士不敢迎而先拜大夫雖拜士則辟之士往見卿大夫卿大夫出迎答拜亦辟也孔氏穎達曰此明士於尊者之法而拜送者按儀禮鄉射鄉飲酒公食聘禮但是主人送賓皆再拜賓不答拜鄭注云禮有終故也士於尊者謂士詣卿大夫即先於門外拜之拜竟乃進面親相見也答之拜則走者若大夫出門而答拜士士走辟之也輔氏廣曰拜迎則勞尊者之答已拜送則盡己之敬存疑方氏慤曰尊者不必大夫凡在己上者皆是士於君所言大夫歿矣則稱諡若字名士與大夫言名士字大夫正義鄭氏康成曰君所大夫存亦名孔氏穎達曰此論士於君及大夫之所言羣臣之法君前臣名若大夫已歿而士於君前則稱諡無諡則稱字士賤雖已死猶呼名若士與大夫言及他大夫士士呼名大夫呼字若大夫士卒則字士諡大夫應氏鏞曰大夫歿而舉諡與字所以體君尊賢貴貴隱卒崇終之心也陸氏佃曰春秋書孔父夷伯此歿矣則稱字之證案君所與大夫所異其地也言大夫言士異其人也言大夫同而或歿或生異其時也禮即因之異惟其宜與稱耳士與君大夫言名士自卑其類也與大夫言不名大夫敬大夫之類也於大夫所有公諱無私諱凡祭不諱廟中不諱敎學臨文不諱正義鄭氏康成曰公諱若言語所避先君之名祭廟不諱謂祝嘏之辭中有先君之名者凡祭羣神廟中上不諱下孔疏有事於祖則不諱父有事於父則諱祖教學臨文不諱為惑未知者孔氏穎達曰士及大夫言但諱君家不自私諱父母敬大夫故不重敬也教學即師長也若諱則疑誤後生臨文謂簡牒及讀法律之事諱則失於事正通論方氏慤曰曲禮言君所此止言大夫舉卑以見尊也此言教學曲禮不言以詩書見之也凡祭則廟在其間而重言之者廟中上不諱下與凡祭異也曲禮不言凡祭舉親以見疏也案禮入門而問諱敬人之親猶已之親以廣孝也是入大夫之門必諱大夫之諱即入士之門亦必諱士之諱矣而於君所無私諱者當君之前稱己之祖父必曰先臣某雖已易名不敢稱諡以尊君也若他大夫既歿則稱諡若字矣在大夫之所當大夫之諱而曰於大夫所有公諱者君之諱必諱之君之尊無往而不在也至他大夫之諱似可不諱然大夫尊亦不斥其名故曰於大夫所字大夫也若士之所則亦諱士之諱若於君於大夫所雖此士在不諱之士卑也孔釋私諱為自父母甚明而宋元諸儒必曰大夫之諱皆不諱何耶存異孔氏穎達曰崔云無私諱謂伯叔之謂耳若至親則不得言古之君子必佩玉右徵角左宫羽趨以采齊行以肆夏周還中規折還中矩進則揖之退則揚之然後玉鏘鳴也故君子在車則聞鸞和之聲行則鳴佩玉是以非辟之心無自入也徵張里反趨七須反本又作趣齊鄭作薺疾私反還旋通中竹仲反折之設反鏘七羊反辟僻通正義鄭氏康成曰君子士已上也玉比徳焉孔疏詩秦風言念君子温其如玉聘義温潤而澤仁也至孚尹旁達信也是玉以比徳也徵角宫羽謂玉聲所中也齊當為楚薺之薺采齊路門外之樂節孔疏路寝門外至應門謂之趨於此趨時歌采齊詩為節至應門謂之趨孔疏爾雅宫中謂之時堂上謂之行堂下謂之歩中庭謂之走大路謂之奔此對文耳若總言之門内謂之行門外謂之趨肆夏登堂之樂節孔疏路門内至堂謂之行於此行時歌肆夏詩為節周還反行也宜圜孔疏反行謂到行反而行假令從北嚮南或從南嚮北折還曲行也宜方孔疏曲行謂屈曲而行假令從北嚮曲折而東嚮西嚮也揖之謂小俛見於前也孔疏行前進則身小俯揚之謂小仰見於後也孔疏郤退遷行則身微仰鏘聲貌鸞在衡和在式孔疏韓詩外傳文此謂平常所乗之車若田獵之車則鸞在馬鑣故秦詩注云置鸞於鑣異於乗車自由也孔氏穎達曰自此以下廣明佩玉之事聶氏崇義曰舊圖上有雙衡長五寸博一寸下有雙璜徑二寸衝牙長三寸朱子曰上橫曰珩下繫三組貫以蠙珠中組之半貫一大珠曰瑀末縣一玉兩端皆銳曰衝牙兩旁組半各縣一玉長博而方曰琚其末各縣一玉如半璧而内向曰璜又以兩組貫珠上繫珩兩端交貫於瑀而下繫於兩端行則衝牙觸璜而有聲也方氏慤曰中規仁也中矩義也環佩以玉為之陽精之所生鸞和以金為之隂精之所成陽主仁隂主義君子存心以仁故行則鳴佩玉制事以義故在車則聞鸞和之聲有仁義則所習者是所從者正是以非辟之心無自入也心内也而言入何哉蓋心雖在内有物探之而出及其久也則與物俱入矣朱子曰周還是直去却回來其回轉處欲其圜如規也折還是直去了復橫去如曲尺相似其橫轉處欲其方如矩也又曰五音無一則不成樂非無商音但無商調先儒謂商調是殺聲也吳氏澄曰徵謂聲中林鐘角則中姑洗也宫謂聲中黃鐘羽則中南吕也林鐘為徵隂聲之首故居右徵三變生角角間二律與徵近故以徵配角黃鐘為宫陽聲之始故居左宫三變生羽羽間二律與宫近故以羽配宫通論孔氏穎達曰鄭注樂師云行謂於大寢之中趨謂於朝廷然則王出既服至堂而肆夏作出路門而采薺作其反入至於應門路門亦如之此謂歩迎賔客王如有車出之事登車於大寢西階之前反降於阼階之前陳氏祥道曰書傳曰天子左五鐘右五鐘出撞黃鐘右五鐘皆應然後大師奏登車告出也入撞蕤賓左五鐘皆應然後少師奏登堂就席告入也周禮樂師行以肆夏趨以采齊自其出言之出撞陽鐘而隂鐘應之動而節之以止則無過舉入撞隂鐘而陽鐘應之止而濟之以動則無廢功所謂禮樂不可斯須去身者此也古之君子必佩玉其色有蒼白赤之辨其聲有角徵宫羽之應其象有仁智禮樂忠信道徳之備或結或垂所以著屈伸之理或設或否所以適文質之儀此所以純固之徳不内遷非僻之心無自入也存疑鄭氏康成曰徵角在右事也民也可以勞孔疏樂記角為民徵為事宫羽在左君也物也宜逸孔疏樂記宫為君羽為物案歩之中節與射之中節不同射必歌詩為節故曰何以聽何以射歩不必有人隨之歌詩也孔謂於趨歌采齊行歌肆夏之詩天子容有之而鄭謂君子士以上亦概言君子無故玉不去身耳士以上之君子無不佩玉者其佩玉必無不中徵角宫羽之節者趨行雖不必如天子之歌詩其歩之疾徐要無不中兩詩之節者玉之鏘鳴因其周折揖揚而孔尤畫地以計二節以走一節以趨而執玉不趨執龜不趨則異其事也君行一臣行二大夫繼武士中武則異其人也孔謂寢門外至應門趨寢門内至堂行則異其地也至右徵角左宫羽則大約言玉聲所中以起下鏘鳴之意必以左右分尊卑勞逸似迂又言玉最厚者宫最薄者羽則衝牙所觸而有聲者止兩璜無四璜也諸儒論音不已且進而論律以兩璜而中十二律恐無是理其説每有求之太過者姑存而附論之君在不佩玉左結佩右設佩居則設佩朝則結佩齊則綪結佩而爵韠齊側皆反綪側耕反正義鄭氏康成曰謂世子也孔疏臣之朝君備以盡飾當佩玉今云君在不佩玉故知非臣下云世子佩瑜玉是以知世子也出所處而君在焉孔疏下云朝則結佩謂朝時明此出所處與君同在一處非朝處也則去德佩而設事佩辟徳而示即事也孔疏去玉佩示已無徳設事佩示有勞役之事以奉於上也結其左者若於事有未能也結者結其綬不使鳴焉居則設佩謂所處而君不在焉朝則結佩朝於君亦結左也綪屈也結又屈之孔疏謂結其佩又屈上之也思神靈不在事也爵韠者齊服𤣥端孔氏穎達曰右設佩者謂事佩木燧大觿之屬也朝結佩及設佩亦皆謂世子齊則綪結佩則謂凡應佩玉之人非唯世子也又曰熊氏皇氏並謂諸侯以下皆以𤣥端齊而以爵韋為韠同士禮以其齊故不用朱韠素韠義或然也方氏慤曰言君在不佩玉又言左結佩右設佩則知所結所設者非徳佩也事佩而已居則設佩者此言徳佩也居謂燕居朝謂朝於公侯之時居則設以示徳音孔昭雖燕而有所不忘朝則結以貊其徳音自謙而有所未發也既曰君在不佩玉又曰朝則結佩者所謂朝則在朝之時所謂在則退朝之所也退朝之所父子之道也在朝之時君臣之義也子有代父之嫌而臣無代君之禮故退朝不佩玉者子避嫌於父也在朝必佩玉者臣盡禮於君子亦臣也蓋各有所主而已朝雖佩玉然猶結之則又有别於羣臣焉齊則綪結佩而爵韠凡致齊者皆如是當是時君不得以朱大夫不得以素佩之聲則静而不譁服之色則幽而不著凡以隂幽思而已陳氏祥道曰齊所以著精明之徳佩既結矣又從而屈之不以徵角宫羽之聲散其志也存疑陳氏祥道曰古者有徳佩有事佩徳佩則左右皆玉事佩則左紛帨右玦捍之類先設事佩次加徳佩以事成而下徳成而上故也詩言佩觿佩韘乃言容兮遂兮是先設事佩後徳佩也孔氏穎達曰去徳佩非全去也結之使不鳴焉爵韠者謂士𤣥端齊故爵韋為韠也案佩有三徳佩一玉在中事佩二所謂左佩紛帨刀礪右佩玦捍管遰也玉佩無有左右者陳用之謂加徳佩於事佩之上誤也世子居常毓徳為要故設瑜玉而習其聲朝則雖設而結之無聲示徳未成也燕居侍父則并不設而去之并不敢言有徳也左右兩事佩恒結其左并於事有未能也鄭注本明孔疏以左之結佩為君在不鳴玉誤矣先儒惟方氏最悉又案齊服之韠無考鄭因春官司服有齊服𤣥端士冠禮有𤣥端爵韠此記言齊爵韠故以齊服𤣥端言之孔疏因𤣥端爵韠為士冠之服故據士言之然據士冠禮疏引大戴禮公冠四加合緇布冠皮弁爵弁𤣥冕而不言與士異韠則士以上凡服𤣥端皆用爵韠明矣又司服言諸侯孤卿大夫士之服而繼之以齊服𤣥端素端則𤣥端素端不特士之齊服矣或謂天子𤣥冕齊又樂記明言魏文侯端冕而聽古樂則冕亦用端也凡帶必有佩玉惟喪否佩玉有衝牙君子無故玉不去身君子於玉比德焉衝昌容反正義鄭氏康成曰凡謂天子以至士喪主於哀故去飾衝牙居中央以前後觸也故謂喪與災眚孔氏穎達曰衝牙前後觸璜而為聲所觸之玉其形似牙故曰衝牙天子佩白玉而𤣥組綬公侯佩山𤣥玉而朱組綬大夫佩水蒼玉而純組綬世子佩瑜玉而綦組綬士佩瓀玟而緼組綬孔子佩象環五寸而綦組綬綬音受純讀為緇側其反瑜羊朱反綦音其瓀而兖反徐又作礝同玟武巾反又作砇同緼音温正義鄭氏康成曰玉有山𤣥水蒼者視其文色所似也孔疏玉色似山之𤣥而雜有文似水之蒼而雜有文也綬者所以貫佩玉相承受者也純當為緇綦文雜色也孔疏顧命綦弁注云綦青黒色鄭風縞衣綦巾注云綦蒼艾色是綦為雜色緼赤黃孔氏穎達曰尊者玉色純公侯以下玉色漸雜世子及士惟論玉質不論玉色則玉色不定也瑜是玉之美者故世子佩之承上天子諸侯則世子天子諸侯之子也然諸侯世子雖佩瑜玉亦應降殺天子世子也瓀玟石次玉者賤故士佩之陳氏祥道曰玉之貴者莫如白賤者莫如瓀玟山𤣥以象君徳之静水蒼以象臣職之動山𤣥水蒼其文也瑜與瓀玟其質也世子佩瑜則士佩瓀矣士佩瓀則世子而上佩瑜矣瓀或作礝以其多石故也玟或作珉以其賤故也組綬之佩謂之綬以其貫玉相承受也方氏慤曰君以無為而體道道則純臣以有為而用事事則雜諸侯雖有君道以對天子則為臣故綬以朱之純而山𤣥則雜之矣世子亦有君道以有父在則為臣故玉以瑜之純而綬以綦則雜之矣此非隆殺之辨歟陳氏澔曰象環五寸燕居佩之非謂禮服之正佩也存疑鄭氏康成曰孔子佩象環謙不比徳亦不事也象有文理者也環取可循而無窮孔氏穎達曰象環五寸法五行也童子之節也緇布衣錦縁錦紳并紐錦束髪皆朱錦也并必正反紐女丑反正義鄭氏康成曰童子未冠之稱也冠禮曰將冠者采衣紒也孔氏穎達曰此以下論童子之儀童子之節謂未成人之禮節用緇布為衣尚質故也用錦為緇布衣之縁又紳帶及約帶之紐皆用錦并以錦為總而束髪其錦皆用朱色之錦示將成人有文徳一文一質之義也徐氏師曽曰前言弟子縞帶則此亦縞帶以錦為紳并紐也肆束及帶勤者有事則收之走則擁之正義鄭氏康成曰肆讀為肄餘也餘束約紐之餘組勤謂執勞辱之事也此亦亂脱在是宜承無箴功孔氏穎達曰身充勤勞之事則收斂在手須趨走則擁抱之於懐童子不裘不帛不屨絇無緦服聽事不麻無事則立主人之北南面見先生從人而入絇其俱反見賢遍反正義鄭氏康成曰皆為幼小不備禮也絇屨頭飾也雖不服緦猶免孔疏問䘮云免者不冠者之服故知未成服童子雖不當室猶著免也童子不當室不免而此注云猶免者崔氏熊氏並云不當室而免者謂未成服而來也問䘮云不當室不免者謂據成服之後也深衣無麻往給事也孔氏穎達曰不裘不帛為大温傷壯氣也不屨絇未成人不盡飾為節也童子唯當室與族人有恩相接之義故遂服本服之緦若不當室則情不能至緦故不服也主人喪主也此童子来聽事若有事則使之若無事則立主人之北南面而立先生師也童子不能獨為禮若徃見師則隨成人而入也方氏慤曰不裘即不衣裘裳是也不帛即不帛襦袴是也陸氏佃曰童子於有喪者之家當事則不麻為其幼也故謂之聽事而已少儀曰童子曰聽事陳氏澔曰童子未能習禮且緦輕故父在不緦父歿則本服不可違矣從人而見先生不敢以卑小煩長者為禮也侍食於先生異爵者後祭先飯客祭主人辭曰不足祭也客飧主人辭以疏主人自置其醬則客自徹之一室之人非賓客一人徹壹食之人一人徹凡燕食婦人不徹飯扶晚反飧音孫正義鄭氏康成曰後祭先飯謙也客祭者盛主人之饌也客飧者美主人之食也疏之言麤也客自徹敬主人也徹奠於序端一室之人同事合居者也賓客則各徹其饌壹猶聚也為赴事聚食也婦人不徹質不偹禮孔氏穎達曰此論侍食及徹饌之節異爵謂尊於已者饌不為已故後祭先飯示為尊者嘗食也客飧者若食竟作三飯飧也主人敬客自置其醬則客宜報敬故自徹之曲禮主人親饋是也同事而合居一室既無的賓主故必少者一人徹饌赴事壹聚共食則亦不人人徹亦推一人徹也方氏慤曰先生尊者異爵貴者也存疑輔氏廣曰徹亦徹醬也曲禮卒食客自前跪徹飯齊以授相者鄭云齊醬屬也公食大夫禮賔卒食北面取粱與醬以降然則主人不自置醬則客猶徹飯與食􅀥桃李弗致於核瓜祭上環食中棄所操凡食果實者後君子火孰者先君子有慶非君賜不賀有憂者核行隔反操匕刀反後胡豆反先悉薦反正義鄭氏康成曰弗致於核恭也上環頭忖也孔疏忖切謂切瓜頭切去疐果實隂陽所成非人事故後君子火孰偹火齊不得故先君子非君賜不賀者惟君賜為榮也有憂者下絶亡非其句孔氏穎達曰弗致於核謂懐核不置於地也食瓜亦祭先環者橫斷形如環也斷則有上下環上環是疐間下環是脱華處祭時取上環祭之而食中操謂手所持者棄之不食有慶謂或宗族親戚燕飲聚㑹雖吉不相賀唯受君賜為榮故相賀拜朱子曰注云頭忖謂疐頭所切一環也以其所生之本味最甘美又先斷而不汙故以為祭中者中環也亦甘且潔故以奉尊者所操下環為手所持處以其味薄而不潔故棄之而不食也通論方氏慤曰自然之味以先食為新使然之味以後食為慎周官膳夫品嘗食王乃食而不及果實者亦此之意存疑陸氏佃曰有慶非君賜不賀言有憂者有慶惟君賜然後賀案有憂者三字陸氏連上文不賀為句不如鄭氏下闕亡為正勤者有事則收之走則擁之正義鄭氏康成曰此補脱重孔子食於季氏不辭不食肉而飧正義鄭氏康成曰以其待已及饌非禮也孔疏凡客將食興辭而孔子不辭者必是季氏進食不合禮也凡禮食先食胾次食殽乃至肩至肩則飽乃飧孔子不食肉仍為飧者是季氏饌失禮故也通論應氏鏞曰聖人待陽貨之禮婉而深待季氏之禮直而簡意者季氏猶可以微意警而陽貨不可與語與總論范氏鍾曰食之節俎豆庶羞非不備禮也而置與徹惟以醬貴食味之主也左右給使非無以供役也而賓主必自置與徹蓋取親於其身之為敬且重也尊者逸卑者勞少長有禮矣男子徹婦人不徹男女有别矣一食之間曲盡如此古人非為飲食也為行禮也賜果懐核敬君也瓜祭上環敬先也薦新與火孰異尊賢也一果之微皆有法安敢肆情於禮節之外乎君賜車馬乘以拜賜衣服服以拜賜君未有命弗敢即乘服也君賜稽首據掌致諸地酒肉之賜弗再拜正義鄭氏康成曰乘服以拜敬君惠也稽首致首於地據掌以左手覆按右手也酒肉之賜弗再拜輕也受重賜者拜受又拜於其室也孔氏穎達曰凡受君賜賜至則拜至明日更乗服所賜往至君所又拜重君恩也酒肉但初賜至時則拜明日不重往拜也馬氏睎孟曰車服之賜庸賜也是故乘服而再拜酒肉之賜斯須之賜也是故有拜而不再存異鄭氏康成曰君未有命謂卿大夫受賜於天子者歸必致於其君君有命乃服之孔疏卿大夫為使臣辨正陸氏佃曰謂非輕賜雖有車馬衣服不敢輙乘服也若後世三品雖應服紫五品應服緋必君賜而後服應氏鏞曰凡君之賜服有命矣而曰君未有命者蓋車馬衣服皆視爵命以為賜臣聞君命則必謙遜而致辭詩所謂受爵不讓至于已斯亡者正以受而不辭也辭焉而又再命之然後乘服以拜況車馬重賜為人子者三賜不及焉則其必辭以待命可知王氏圻曰必待君命自是人臣敬慎之禮若依注作諸侯之卿大夫為使臣説則其方受天子賜時已乘服拜賜而歸又獻於其君待君命之而後乘服是二天子矣此説難通凡賜君子與小人不同日正義鄭氏康成曰慎於尊卑也方氏慤曰王者之賜與於其賢足以爵則賜之爵以馭其賢庸足以禄則賜之禄以馭其庸至於其賢不足爵庸不足禄而恩私施焉則與之以馭其幸而已謂之君子則於賢庸為有餘小人則於賢庸為不足此君子小人賜與之别也周氏諝曰賜君子以徳與小人以力賜與均之者恩也不同日者義也通論陳氏祥道曰事不同不可同日語人不同不可同日賜故詩勞還率則歌出車勞還役則歌杕杜凡以明貴賤辨等列也昔虢公晉侯之朝於周也同賜以五瑴之玉君子猶以位之不同為譏秦后子楚子干之寓晉也同食以百人之餼君子猶以富之不同為譏况君子與小人乎凡獻於君大夫使宰士親皆再拜稽首送之膳於君有葷桃茢於大夫去茢於士去葷皆造於膳宰大夫不親拜為君之答己也葷許云反茢音列去起呂反為于蒍反正義鄭氏康成曰再拜稽首送之敬也葷桃茢辟凶邪也大夫用葷桃士桃而已葷薑及辛菜也茢菼帚也造於膳宰皆致命而授之葷或作焄大夫不親拜者不敢變動至尊孔氏穎達曰此論臣獻君物及致膳於尊者之儀大夫尊恐君拜已之獻故自不往而使已膳宰往獻士賤不嫌君拜案下記言士待諾而退又拜弗答拜疏為君不答士拜所謂不嫌君拜者以此故身自親送皆再拜稽首者雖大夫使人初於家亦自拜送而宰將命及士自送之君門付小臣之時宰及士皆再拜而送之也天子諸侯之臣獻孰食於君恐邪氣干犯故用辟凶邪之物覆之大夫之臣以食獻大夫則除茢士之臣吏以食獻士又去葷桃桃枝也皆皆於君大夫士也造至也膳宰主飲食官也獻孰食者操醬齊以致命致命竟而以所獻之食悉付主人之食官也大夫自獻則屈君答己解所以不自獻義也方氏慤曰桃以其性葷以其氣茢以其形形不如氣氣不如性故貴賤多少之數去其一者去茢去其二者又去葷惟桃為不可去無貴賤一也皆造於膳宰者則以不敢専達必待主膳之人達之也存疑鄭氏康成曰膳美食也辨正陳氏祥道曰膳於君大夫士者致福之膳也非致福之膳則無事於桃茢案少儀有為己祭而致膳於君子曰膳之文則陳説為是不然而大夫士以美食進君不㡬於謟且䙝乎存異徐氏師曾曰造於膳宰不言拜恐授小臣時不必拜案士拜送在家拜送其所獻以往也其造於君所則又拜大夫則惟拜於家至造於膳宰時則使者代拜徐謂造於膳宰不必拜未然大夫拜賜而退士待諾而退又拜弗答拜大夫親賜士士拜受又拜於其室衣服弗服以拜敵者不在拜於其室敵音狄正義鄭氏康成曰大夫拜賜小臣受大夫之拜復以入告大夫拜便辟也孔疏大夫往拜至門外告小臣小臣入白大夫乃拜拜竟乃退士拜受又就拜於其家是所謂再拜也衣服弗服以拜異於君惠也拜於其室謂來賜時不見也見則不復往徐氏師曽曰於士言弗答拜則大夫為答拜而退可知凡於尊者有獻而弗敢以聞士於大夫不承賀下大夫於上大夫承賀親在行禮於人稱父人或賜之則稱父拜之正義鄭氏康成曰有獻而弗敢以聞謂獻辭也少儀曰君將適他臣若致金玉貨貝於君則曰致馬資於有司是其類也承受也士有慶事不聽大夫親來賀己不敢變動尊也稱父事統於尊孔氏穎達曰凡謂賤者也謂臣有獻於君士有獻於大夫其辭不敢云獻聞於尊者但當云贈從者之屬不承賀不受賀也下大夫於上大夫尊卑近故受也輔氏廣曰有獻致其誠也弗聞恐其瀆也方氏慤曰行禮於人稱父不敢私交也人或賜之稱父拜之不敢私受也徐氏師曽曰有獻而弗敢以聞即造於膳宰之義禮不盛服不充故大裘不裼乘路車不式正義鄭氏康成曰禮盛者服充大事不崇曲敬也大裘路車謂祭天也周禮王祀昊天上帝則服大裘而冕乘玉路或曰乘兵車不式孔氏穎達曰充猶襲也服襲是充美於内唯盛禮乃然聘及執玉龜皆襲也禮盛服充不見美也路車謂玉路郊天車過門閭不式亦禮盛不為曲敬也周氏諝曰以文為敬則不敢充其美以質為敬則不敢見其美大裘不裼以質為敬也乘路車不式所敬不貳也馬氏睎孟曰充其服者内心也以徳將者也然則致其飾者非禮之盛者也禮不足然後致其飾陸氏佃曰大裘不裼則襲可知通論方氏慤曰執玉有藉者裼無藉者襲圭璋則無藉以之聘璧琮則有藉以之享聘禮在先享禮在後因聘而後有享故也則聘禮固盛矣呉氏澄曰此章前後有四充字記者雜取非必出於一人一時之言然其意亦不異蓋充者偹也滿也偹滿有盛之義焉不充其服如衛文公大布之衣大帛之冠自抑損而不充盛其服也服之襲也充美也使美藏於内而不露美之在内偹滿充盛也若露裼衣而見其美則不得為盛矣臣之於君不敢以充盛自處惟自抑損乃為敬君故臣以見美不充為敬也不敢充服不充亦同此義存異孔氏穎達曰郊禮盛服大裘則無别衣裼之是不見美也案此不裼謂充美其為襲無疑孔子曰至泰壇服衮戴冕璪十有二旒而孔疏云無别衣裼之是表裘也表裘則裘全露不惟見美而已而反以為充美可乎父命呼唯而不諾手執業則投之食在口則吐之走而不趨親老出不易方復不過時親癠色容不盛此孝子之疏節也唯于癸反徐以水反癠才細反正義鄭氏康成曰不諾不趨至敬也易方為其不信已所處也復反也不易方不過時不可以憂父母也疏節言非至孝也癠病也王季有疾文王色憂行不能正履是也孔氏穎達曰此明子事親之禮父命呼父召子也命謂遣人呼應之以唯而不稱諾唯恭於諾也急趨父命故投業吐食也趨疾趨也但急走往而不暇疾趨也案趨則有容走則無容不暇疾趨謂不暇為容也方常也若啓往甲則不得往乙若覓不見則老人易憂愁也復還也旦啓云日中還不得過中方氏慤曰出不易方有定所也復不過時無愆期也孝子事親豈必老而後如是以親老者尤不可不知也孝子之事親也飬則致其樂病則致其憂故親癠色容不盛存疑孔氏穎達曰親之病孝子當憂愁危懼行不能正履也今親病唯色容不充盛而已不能顦顇憂愁危懼此乃是孝子疏簡之節言孝心不篤也案疏通也疏節猶言通禮如此鄭引文王色憂証色容不盛而云非至孝正使人由可見處思其至處而孔疏分為二等失鄭義矣父沒而不能讀父之書手澤存焉爾母沒而杯圈不能飲焉口澤之氣存焉爾圈起權反正義鄭氏康成曰圈屈木所為卮匜之屬見親之器物哀惻不忍用也孔氏穎達曰手澤謂父平生所持手之潤澤在焉口澤謂母平生口飲潤澤之氣在焉不能謂不能忍為此事也方氏慤曰書謂書冊君子所執以誦習故於父言之杯圈飲食器也婦人惟酒食是議故於母言之手澤汗之所漬也口澤津之所漬也口有氣焉故又以氣言之輔氏廣曰於其疏者苟不及焉則其餘不足觀矣親亡而澤猶存惟篤於孝者覺之上為疏節而此為至性也總論范氏鍾曰孝子之事親也聽於無聲視於無形況父之所命呼乎父母在不逺遊遊必有方一舉足不敢忘況敢易方過時此生而盡其情也及其疾病色憂不滿容中心達於面目不自知此病而致其憂也然皆疏節爾致愛則存致慤則著思其居處思其所嗜覩物動心有不忍焉此終身不能忘沒而致其思也君入門介拂闑大夫中棖與闑之間士介拂棖賓入不中門不履閾公事自闑西私事自闑東闑魚列反棖直衡反閾音域正義鄭氏康成曰君入門謂兩君相見也棖門楔也君入必中門上介夾闑大夫介士介鴈行於後示不相沿也孔疏鴈行參差節級崔氏皇氏並云君必中門者當棖闑之中主君在闑東賓在闑西主君上擯在君之後稍近西而拂闑賓之上介在賓之後稍近東而拂闑大夫擯介各當君後在棖闑之中央義或當然今依用之君若迎聘客擯者亦然不中門不履閾辟尊者所從也閾門限此謂聘客也公事聘享私事覿面也孔氏穎達曰此明兩君朝聘卿大夫入門之儀入門謂入大門此謂兩君相見主君在闑東賓君在闑西皆當棖闑之中介謂上介稍近君故拂闑大夫之介微逺於闑故當棖與闑之間士介卑去闑逺故拂棖闑謂門之中央所豎短木也棖謂門之兩旁長木所謂門楔也介者副也此明朝又明聘賓入者謂聘賓也不中門謂不當闑西棖闑之中央不履閾足不履踐門限之上也聘享是奉君命而行故謂之公事自闑西用賓禮也私覿私面非行君命故謂之私事自闑東者從臣禮也通論方氏慤曰入門左而自闑西以就西階故也入門右而自闑東以就東階故也公事為國而與主君敵故自西焉私事為己則從主君而已故自東焉曲禮又言大夫士出入君門由闑右則一自東而已與此異者彼言為臣此言為賓故也朱子曰案此云門只有一闑賈氏儀禮疏獨云門有二闑故中庭之處及君與賓介行之次第皆有不同未知孰是當更攷之案聘禮行聘時納賓賓入門左介皆入門左是公事自闑西禮畢而請覿賓覿入門右北面奠幣擯者辭則承幣入門左介皆入門左其上介請覿奠幣奉幣禮亦如之惟士介初入門右擯者辭士介終不敢入門左是私事自闑東者從其初之入門右而奠幣言之君與尸行接武大夫繼武士中武徐趨皆用是疾趨則欲發而手足毋移圈豚行不舉足齊如流席上亦然端行頤霤如矢弁行剡剡起屨執龜玉舉前曵踵蹜蹜如也毋音無圏舉逺反豚徒渾反説文從彖篆文從肉豕作豚齊音咨頤音移霤力救反剡以漸反蹜色六反正義鄭氏康成曰接武尊者尚徐蹈半迹孔疏二足相躡每蹈於半未得各自成迹繼武迹相及孔疏兩足迹相接中武迹間容迹也孔疏中猶間也毎徙足間容一足地乃躡之也徐趨謂君大夫士之徐行皆如與尸行之節也疾趨謂直行也疏數自若發謂起屨也孔疏屨頭恒起無復繼迹之異移之言靡迤也孔疏靡摇動也毋移欲其直且正孔疏雖屨恒欲起而手足猶宜直正不得邪低摇動欲或為數圈轉也豚之言若有所循孔疏轉足循地而行不舉足曳踵孔疏足不離地則衣之齊如水之流矣孔子執主則然此徐趨也席上亦然尊處亦尚徐也端直也頤或為䨨此疾趨也執龜玉舉前曳踵著徐趨之事孔氏穎達曰君天子諸侯也武迹也徐趨遲行也皆皆於君大夫士也圈豚行者釋上徐趨之形齊裳下緝也足既不舉身又俯折則裳下委地曳足如水流狀也端行覆上疾趨之節端行謂直而行頤霤者行既疾身乃小折而頭直俯臨前頤如屋霤之垂也矢箭也身趨前進不邪如箭也弁急也剡剡身起貌疾行欲速而身屨恒起也踵謂足後跟也執龜玉徐趨之時初舉足前後曳足跟行不離地蹜蹜言舉足狹數也方氏慤曰凡行歩廣則疾而勞狹則緩而逸尊者逸而卑者勞故君至於士尸行之節其别如此圈豚行不舉足者謂回旋而行也席雖以坐其行而就坐之時亦以是為節焉剡剡則如火之趨上固異乎流之趨下矣輔氏廣曰趨雖疾而布武未改故曰足毋移併言手者亦不改其拱也故曰張拱而趨舉前曳踵若所謂不舉足則前亦不舉矣存疑陸氏佃曰豚行盖言冕行知然者以端行弁行知之也端行謂服𤣥端而行弁行謂服爵弁皮弁而行案武専以足跡言行兼以身容言就足而視其跡則有接武繼武中武三者之異而君大夫士之貴賤以殊此各人尋常行歩之法也就身而視其容則有圈豚行端行弁行三者之異而趨之徐疾亦見此臣與君行之法也尊君故行舒緩惟有接武一法臣恭君命故有徐趨疾趨二法盖君行一臣行二徐趨二歩而始如繼武之一歩疾趨二歩而始如中武之一歩總以反覆形容行歩之節爾其言尸者君不迎尸而事尸於堂禮堂上接武故因言君而並及之恐不當謂大夫與尸行繼武士與尸行中武也凡行容愓愓廟中齊齊朝廷濟濟翔翔愓音傷又音陽齊才兮反賀在啟反正義鄭氏康成曰愓愓直疾貌凡行謂道路也孔疏道路雖速疾不忘於直故其容疾而直齊齊恭慤貌孔疏齊齊自收持嚴正以對神不敢舒散也濟濟翔翔莊敬貌孔疏濟濟有嚴儀矜莊翔翔行而張拱並朝廷所需也君子之容舒遲見所尊者齊遫足容重手容恭目容端口容止聲容静頭容直氣容肅立容徳色容莊坐如尸燕居告温温齊音咨又側皆反遫音速正義鄭氏康成曰齊遫謙慤貌遫猶蹙蹙也足容重舉欲遲也手容恭髙且正也目容端不睇視也口容止不妄動也聲容静不噦欬也頭容直不傾顧也氣容肅似不息也色容莊勃如戰色坐如尸尸居神位敬慎也告謂教使也詩云温温恭人孔疏詩小雅小宛之篇孔氏穎達曰舒遲閑雅也雖尋常舒遲若見所尊之人則自斂持迫促不敢自寛奢也燕居謂私燕所居色尚和善教人使人之時惟須温温不欲嚴慄應氏鏞曰立容徳中立不倚儼然有徳之氣象輔氏廣曰莊有不動之意謂不輕喜易愠通論方氏慤曰舒遲所以脩容也若夫父黨無容則無事舒遲矣故曰見所尊者齊遫齊則不舒遫則不遲告温温則所謂載色載笑匪怒伊教是也陸氏佃曰口容止足容重則言行可知後言燕居則以上非燕處之容也孔子曰居不容總論朱子語類問禮記九容與論語九思一同本原之地固欲存飬於容貌之間又欲隨事省察朱子曰即此便是涵飬本原這裏不是存飬更於甚處存飬存疑鄭氏康成曰立容徳如有予也孔疏徳得也如人授物於己巳得之已授物於人人得之形徐氏邈曰德音置凡祭容貌顔色如見所祭者正義鄭氏康成曰如覩其人在此孔氏穎達曰凡祭謂諸祭也容貌恭敬顔色温和如似見所祭之人謂祭如在也案容貌見於一身顔色獨見於面致誠信與忠敬則視無形於有形聽無聲於有聲矣喪容纍纍色容顛顛視容瞿瞿梅梅言容繭繭纍良追反顛音田視又作目瞿紀具反繭古典反正義鄭氏康成曰纍纍羸憊貌顛顛憂思貌瞿瞿梅梅不審貌繭繭聲氣微也孔氏穎達曰顛顛謂顔色不舒暢也瞿瞿驚遽貌梅梅謂微昧也輔氏廣曰纍纍顛顛皆隕落崩壊之貌繭繭鬱結而未有緖也陸氏佃曰張則瞿瞿收則梅梅經曰見似目瞿戎容暨暨言容詻詻色容厲肅視容清明暨其記反詻五格反正義鄭氏康成曰暨暨果毅貌詻詻教令嚴也厲肅儀形貌清明察於事也孔氏穎達曰厲嚴也肅威也視容清明瞻視之容須清察明審也立容辨卑毋讇頭頸必中山立時行盛氣顛實揚休玉色辨讀為貶彼檢反又方犯反讇音諂舊又音鹽正義鄭氏康成曰讇謂傾身以自下也頭頸必中頭容直山立不摇動也時行時而後行也詩云威儀孔時顛讀為闐玉色色不變也案立容辨者賈子􅁩曰固頤凝視平肩正背端股整足體不摇肘是謂經立因以微磬曰拱立因以磬折曰肅立因以垂佩曰卑立經立天子宜之拱立國君宜之肅立大夫宜之卑立士宜之所當辨也立至於卑則易讇故又戒之頭頸必中即平肩正背之意統言之也下又合行容言之言人立則静行則動其静如山之凝其動如時之運此必有盛徳之氣闐實於中故休美之光著揚於外如玉有温潤縝宻之徳自有孚尹旁達之色非有意為之也存疑鄭氏康成曰辨讀為貶自貶卑謂磬折也揚讀為陽盛身中之氣使之闐滿其息若陽氣之休物也存異孔氏穎達曰立容謂軍中立之容山立者立則嶷如山之固樂記總干而山立輔氏廣曰山立重也時行敏也兵法曰來如處女去如脱辨正吳氏澄曰舊注以立容辨止玉色合上戎容四句共為一節今案上文記喪容先總一句乃分三句記喪之色喪之視喪之言記戎容亦先總一句乃分三句記戎之言戎之色戎之視喪容之哀先觀顔色故色容先於視言戎容之嚴先在號令故言容先於色視立容以下五句於戎容無所當宜别為一節黄氏曰立容辨謂所立之容明辨尊卑左右之分無僣上也又慮其卑退失分則近乎諂媚故云卑無讇案鄭訓辨卑為貶卑謂磬折孔謂在軍當貶損卑退不驕士卒又引樂記總干山立以釋山立不貶卑與上異訓矣輔氏黄氏皆指為戎容吳氏别為一節黄氏於立容辨斷句辨字不改讀得之凡自稱天子曰予一人伯曰天子之力臣諸侯之於天子曰某土之守臣某其在邊邑曰某屏之臣某其於敵以下曰寡人小國之君曰孤擯者亦曰孤守手又反正義鄭氏康成曰予一人謙自别於人而已伯上公九命分陜者邊邑謂九州之外大國之君自稱曰寡人擯者曰寡君孔疏春秋大夫出使之時稱己君為寡君孔氏穎達曰此以下明天子至士自稱及擯者傳辭之法天子與臣下言及遣擯者接諸侯皆稱予一人言我於天下祇是一人而已若臣下稱一人則謂率土之内惟有此一人尊之也伯目稱於諸侯言已是天子運力之臣曲禮謂二伯擯於天子則云天子之吏也諸侯身對天子自稱曰某土之守臣某若諸侯之上介致辭於天子之擯者亦當然其天子之擯告天子則曰臣某侯某其在九州之外邊鄙之邑自稱於天子曰某屏之臣某若使上介告天子之擯亦當然其天子之擯告天子則曰臣某子某某男某曲禮云其在東夷北狄西戎南蠻雖大曰子男者亦曰男也諸侯於敵以下自稱曰寡人言以下通及民也小國謂夷狄子男之君自稱及介傳命云某土之孤某擯者告天子亦應云某孤也其在國自稱亦曰孤方氏慤曰於後言小國則前所言皆大國也存異陸氏佃曰予一人求助之辭伯言力而已亦謙也不言之於天子著其於敵以下自稱如此據諸侯之於天子曰某土之守臣某且言天子言伯以臨下之辭稱之亦言之法諸侯言之於天子則非是也若後世上表與據諸侯見天子曰臣某侯某且曰某土之守臣某則在國可知其在邊邑自兹以往非王土且非守也為屏而已故曰某屏之臣某其於敵以下同姓異姓小邦諸侯自稱如此知然者以天子同姓異姓大國自稱於諸侯曰天子之老知之也然則小國之君即前所謂庶邦小侯是也案某屏之臣某依疏為自稱於天子之辭其在邊邑云者緊承上語也陸氏據諸侯見天子曰臣某侯某而疑此為非謂若後世上表非也據鄭注曲禮謂臣某侯某為嗇夫承命告天子辭則此為自稱於天子可知且邊邑何嘗不是守土屏亦有守衛之義虞書外薄四海安見邊外即非王土上大夫曰下臣擯者曰寡君之老下大夫自名擯者曰寡大夫世子自名擯者曰寡君之適適丁歴反正義鄭氏康成曰擯者之辭主謂見於他國君下大夫自名於他國君曰外臣某孔疏如此言下大夫自名為對己君則經云上大夫曰下臣亦對己君也孔氏穎達曰上大夫卿也自於己君之前稱曰下臣若出使他國在於賓館主國致禮上大夫設擯禮待之此擯者稱大夫為寡君之老雖以擯為文其實為介接主君之辭亦當然擯介通也下大夫對己君稱名而已不敢稱下臣卑逺於君也出使設擯者以待主國此擯者稱下大夫云寡大夫不敢稱寡君之老世子對己國之君稱名擯者曰寡君之適謂對他國之辭也輔氏廣曰上大夫既曰下臣矣下大夫非名則無稱方氏慤曰世子亦公子爾以為適而傳世故名世子而擯者亦曰寡君之適通論孔氏穎達曰出使之臣在客曰介當云介而云擯者謂出使他國在於賓館主國致禮己為主人故稱擯也且擯介散則通案孔氏據君前臣名謂宜曰下臣某是也經其省文與抑與下大夫自名互偹與公子曰臣孽士曰傳遽之臣於大夫曰外私大夫私事使私人擯則稱名孽音枿五葛反徐五列反傳陟戀反遽其庶反使色吏反正義鄭氏康成曰孽當為枿聲之誤孔疏枿是樹生之餘故盤庚云若顛木之有由孽是也子方氏慤曰世子為適則知公子為庶庶子孽也適本也故公子曰臣孽謂之孽者以其自本旁出若木之有孽故也傳遽以車馬給使者也孔疏士位卑給車馬役使故稱傳遽遑方氏慤曰周官行夫下士掌𫝊遽之小事急而不曰遽士以事人為事故自言服傳遽之賤役類案傳遽特謙辭如下走及牛馬走之非必盡掌傳遽也士臣於大夫者曰私人孔疏此下文云大夫私事使私人擯故知大夫之臣曰私人也孔氏穎達曰公子曰臣孽謂對已君也若對他國當云外臣傳遽亦謂對已君也大夫家臣稱私此士既不與大夫為臣故對大夫稱曰外私私人擯則稱名者謂以己之屬臣為擯相雖是上大夫及下大夫擯者則皆稱大夫之名以其非公事正聘故降而稱名也輔氏廣曰公子曰臣孽常使其自别於適也案大夫得臣士而士稱於他大夫不敢曰外臣辟君也方氏慤曰公子與士皆不言擯則以卑而畧之存疑鄭氏康成曰私事使謂以君命私行非聘也若魯成公時晉侯使韓穿來言汶陽之田歸之於齊之類辨正劉氏敞曰鄭説非也此乃謂若趙襄子使楚隆弔吳夫差之類爾凡大夫聘而傳命則當稱寡君至於私臣擯於君命不得言主故名之也楚隆之辭曰寡君之老無䘏使陪臣隆敢展謝之此則名者也案此言私事所以别於公也若奉君命則公矣故不曰君事而曰大夫私事然大夫交不出竟兹記固春秋之變禮與公士擯則曰寡大夫寡君之老大夫有所往必與公士為賓也賓必刃反正義鄭氏康成曰謂聘也大聘使上大夫孔疏案聘禮及竟張旜周禮孤卿建旜故知大聘使卿小聘使下大夫孔疏聘禮小聘曰問其禮如為介案大聘大夫為上介今云如其為介故知小聘是大夫公士為賓謂作介也往之也孔氏穎達曰正聘之時則用公家之士為擯不用私人稱下大夫曰寡大夫上大夫曰寡君之老大夫正聘者有所往適之時必與公士為賓賓介也言使公士作介也輔氏廣曰寡大夫官也寡君之老君之所尊也私事使固不可稱矣案非正聘降其所稱用臣禮也正聘隆其所稱用賓禮也大夫正名於他國重本國之體以不辱君命也使公士擯則稱寡君之老寡大夫而此擯者亦得受賓禮使私人擯則稱名而此擯者亦不得受賓禮也公私之辨其嚴如此總論范氏鍾曰凡自稱孤寡不穀純乎謙也稱人與擯贊雖謙而有體如寡君之老之適曰寡謙也曰老曰適未嘗不明徳與序矣對尊者極其謙如某守臣屏臣曰孽曰傳遽是也對敵之辭謙不失已案戴記如曲禮少儀雜記諸篇多係掇拾不甚條貫又有後來爛脱者元熊氏朋來吳氏澄各有考定本不妨互觀猶大學有古本二程子本朱子本石經本也欽定禮記義疏卷四十三
