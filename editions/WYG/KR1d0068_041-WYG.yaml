body:
  text: 玉藻第十三之一正義孔氏穎達曰案鄭目錄云名曰玉藻者以其記天子服冕之事也冕之旒以藻紃為之貫玉為飾此於别録屬通論通論范氏鍾曰玉藻一篇巨細兼舉文若不類然錯綜而觀固雜而不越也天子受命於天羣臣受命於君身者天下之本元首又身之本冕以莊其首服以章其身祭極敬朝極辨各有常儀一飲食一言動各有常度及天時少愆遽為之變禮深自抑損故涖卜之嚴齊車之式所以敬天也居寢有常風雷必變所以畏天也將適公所齊戒沐浴事君如事天惟能事上斯能臨下矣君子者通上下而言之也鳴玉搢笏比徳之意雖同然隆殺屈伸理一而分殊矣自侍坐之始至禮成而退中間賜食侑食賜爵受爵醬齊之授尊罍之設皆有節法冠一也而品彚有差服一也而名制有别動容周旋於禮之中行有環佩之音車有鸞和之聲禮之所興衆之所治外朝濟濟矣而内之命服皆有章百僚師師矣而童子之飾亦有節殽核之微而少長賓主無敢慢賜獻之頃而車馬服食不敢輕交際㑹盟各有攸當愛親事上而命呼門閾之必謹君大夫士而歩武几席之必中曲務細行無一物不在禮此禮義所以養人之欲也凡行容以下乃總結上文條目舉凡言例必汲汲於廟與朝蓋先立乎其大者餘可槩見也舉踵行坐莫非足容拱揖秉持莫非手容稱謂擯詔莫非言容其言曲而中其事肆而隱其委蛇繁密略與少儀曲禮相似而玉藻閎深矣案玉藻者特取首二字以名篇耳其義固不止此劉向别錄與曲禮少儀並屬制度得之天子玉藻十有二旒前後邃延龍卷以祭藻本又作璪音早旒力求反邃雖醉反深也延如字又作綖卷音衮正義鄭氏康成曰祭先王之服也孔疏司服云享先王則兖冕雜采曰藻孔疏藻謂雜采之絲繩以貫於玉以玉飾藻故云玉藻也天子以五采藻為旒旒有十二孔疏前後各十二旒前後邃延者言皆出冕前後而垂也孔疏十二旒在前後垂而深邃以延覆冕上也天子齊肩孔疏旒十有二就每一就貫以玉就間相去一寸則旒長尺二寸故垂而齊肩言天子齊肩則諸侯以下各有差降則九玉者九寸七玉者七寸以下皆依旒數垂而長短為差延冕上覆也孔疏以三十升布染之為𤣥覆於板上相著為一弁師注延冕之覆在上是也𤣥表纁裏孔疏周禮三入為纁四入為朱朱纁同類龍卷畫龍於衣字或作衮孔疏卷謂卷曲畫此龍形卷曲於衣以祭宗廟司服及覲禮卷皆作衮周氏諝曰十二者天之數變化者天之道十有二旒則天數也龍衮體天道也則天數體天道然後為可以祭然服有六冕止於五内大裘而外衮衣則雖祭天可也特以其對𤣥端而祭故龍衮為祭先王而𤣥端為祭先君陳氏祥道曰表之𤣥也地道之所以升裏之朱也天道之所以降聖人南面而聽天下方而昂之以象其升於北圎而俛之以象其降於南乃其所也然名之曰冕象其與萬物交者為主故也方氏慤曰冕必旒所以蔽明而示内視也後亦設之者有戒慎乎其所不覩之意旒以十二為節惟天子為能備天數也馬氏睎孟曰冕之為物後方而前圎後仰而前俛有延在上有旒在下視之則延長察之則深邃通論賈氏公彦曰𫝊曰天子升龍諸侯降龍以此言之上得兼下下不得僭上則天子升降俱有諸侯直有降龍而已此據衣服若諸侯建旂則畫交龍升降俱有馬氏睎孟曰冕止於五則大裘而冕與衮冕一矣盖祀昊天則大裘而加冕享先王則服衮而已周官於祀昊天不言衮則用衮可知也記於龍衮言以祭不言所祭則昊天先王可知也先儒有云大裘無衮而其冕無旒不知何據馬氏端臨曰冕無旒者乃一命之服盖子男之國為大夫者服之其秩至卑以天子祀天之冕而下同於子男之大夫乎楊氏復曰祀天祀先王皆十二旒旒十二玉祀先公鷩冕則九旒旒十二玉祀四望山川毳冕則七旒旒十二玉體有輕重則繅旒有隆殺惟祀天祀先王皆致其隆不容有所輕重也總論孔氏頴達曰自此至食無樂一節總論天子祭廟朝日及日視朝并饌食牲牢酒醴及動作之事并明凶年貶降之禮案冕五則服亦五天子服五陽也王后服六隂也周禮天子無六服名鄭氏加以大裘故謂之六其實冬内必用裘夏内必用葛司裘言為大裘以共王祀天之服司服言祀昊天上帝則服大裘而冕總言冬至祭天必服大裘而加衮服耳非以大裘别為一服也𤣥端而朝日於東門之外聽朔於南門之外端鄭讀冕馬如字下諸侯𤣥端同朝直遥反下並同正義鄭氏康成曰朝日春分之時也東門南門皆謂國門也孔疏朝事儀云帥諸侯朝日於東郊故知東門是國城東門孝經緯云明堂在國之陽故知南門亦謂國城南門也天子廟及路寢皆如明堂制孔疏考工記云夏后氏世室注云謂宗廟殷人重屋注云謂正寢周人明堂鄭云三代各舉其一明其制同也又周書亦云宗廟路寝明堂其制同明堂在國之陽毎月就其時之堂而聽朔焉孔疏月令孟春居青陽左个仲春居青陽太廟季春居青陽右个以下所居各有其䖏是也卒事反宿路寢亦如之孔疏亦如明堂每月異所方氏慤曰日生於東故朝日於東門之外日月合於朔陰陽交於南故聽朔於南門之外即明堂是也必曰門之外者亦猶迎氣之於郊歟通論孔氏穎達曰每月以朔告神謂之告朔論語告朔之餼羊是也於時聽治此月朔之事謂之聽朔此玉藻文是也聽朔又謂之視朔文十六年公四不視朔是也告朔又謂之告月文六年閠月不告月是也又謂之朝廟文六年云猶朝於廟是也又謂之朝正襄二十九年釋不朝正於廟是也張子曰據玉藻天子聽朔於明堂諸侯則於太廟就告朔之處告祖而行馬氏睎孟曰覲禮天子拜日於東門之外祀日於南門之外祀月於北門之外祭日於東祭月於西然朝日非不於南不載於記夕月非不於西不見於覲禮日陽也以始事爲功而主於東月隂也以終事爲功而主於北故也又曰告朔告於廟聽朔聽其事天子告朔於廟明其受之於祖也存疑鄭氏康成曰端當為冕字之誤也孔疏凡衣服皮弁尊次以諸侯之朝服次以𤣥端案下諸侯皮弁聽朔朝服視朝是視朝之服卑於聽朔今天子皮弁視朝若𤣥端聽朔則是聽朔之服卑於視朝與諸侯不類且聽朔大視朝小故知端當為冕𤣥衣而冕冕服之下孔氏穎達曰案宗伯實柴祀日月星辰則日月爲中祀而用𤣥冕者以天神尚質故也方氏慤曰經有曰𤣥冕有曰𤣥冠何也蓋𤣥端者祭服燕服之總名衣𤣥衣而加𤣥冕則爲祭服衣𤣥衣而加𤣥冠則爲燕服或冠冕通謂之端𤣥端而朝日則是加𤣥冕者也𤣥端而居則是加𤣥冠者也馬氏睎孟曰周之朝日王搢大圭執鎮圭而圭之藻藉有五采五就乗龍載大旂而旂之象有日月交龍其壇曰王宮其燎則實柴其牲幣則尚赤其樂則黄鍾大呂雲門而與祀天神上帝者大槩同矣服不以衮冕而以齊燕之𤣥端祀羣小祀之𤣥冕豈禮所謂稱也國語曰天子大采朝日虞以大采為五色之繅藉而其服則衮其説是也然記稱朝日以𤣥端蓋非周禮也鄭氏易𤣥端以𤣥冕誤㑹周禮也案𤣥端以方幅為名朝祭之服亦然其别者不畫則止謂之端畫則曰衮曰鷩曰毳曰希曰𤣥而無端名此記言𤣥端鄭氏由下皮弁視朝推之而以爲冕然朝日爲中祭不應服祭羣小祀之𤣥冕故又疑𤣥端朝日非周禮謂鄭不當改端爲冕方氏又即鄭説而小變之以爲𤣥端而加𤣥冕則亦鄭説耳或又謂𤣥端即指有畫者言以為𤣥端即衮冕此與周禮言衮言鷩之例不符要惟鄭孔為近似但朝日𤣥冕究未敢安特並存之以備考云存異鄭氏康成曰凡聽朔必以特牲告其帝及神配以文王武王孔疏以告朔禮略故用特牛月令每月云其帝其神故知皆告以在明堂中故知配以文武或以武王配五神於下非也案天子聽朔於明堂告朔亦必於廟則告朔時其帝及神不與也且明堂饗帝配以文王故孝經云宗祀文王於明堂以配上帝武王不與也鄭氏創其説而孔氏附之非矣閏月則闔門左扉立於其中闔胡獵反扉音非正義鄭氏康成曰閏月非常月也聽其朔於明堂門中還處路寢門終月孔疏案太史云閏月詔王居門終月是還處路寢門終竟一月所聽之事於一日耳其餘日則居燕寢也孔氏穎達曰閏非常月無恒居之處故在明堂門中聽朔於明堂門反居路寢門通論孔氏穎達曰皇氏云明堂有四門即路寢亦有四門閏月各居其時當方之門案闔門當依鄭注爲明堂門中無疑但聽朔於明堂者暫而一月之事非可卒辦故注又云還處路寢門終月還處亦謂聽事於寢門之中非寢於寢門之中也周官六寢惟小寢五爲休息之所五寢以時分不以月分則閏月何嘗無所繋之時乎闔左扉何也蓋月令明堂凡孟月居左而季月居右義取乎天之左旋耳至閏月則前月之氣已過後月之氣方來故闔左以送前月開右以迎後月禮之時為大而順次之者固當如是非獨爲左陽而右隂也路門布政之門聽朔於明堂而闔左扉還處於路門而亦必闔左扉矣皮弁以日視朝遂以食日中而餕奏而食日少牢朔月大牢五飲上水漿酒醴酏餕音俊大音泰酏以支反正義鄭氏康成曰餕食朝之餘也奏奏樂也上水水爲上餘其次之孔氏穎達曰天子既著皮弁視朝遂以皮弁而朝食所以敬養身體至日中之時還著皮弁而餕朝之餘食餕尚奏樂即朝食奏樂可知也月朔禮大故加用大牢周禮大司樂云王大食令奏鐘鼔方氏慤曰以朝服而食不敢慢於所養也日中餕朝之餘不敢厚於所養也奏而食周官膳夫掌王之食飲以樂侑食所以和其心志而助氣體之養也日少牢朔月大牢所以爲豐儉之節且重朔故也前於朔言聽此於朝言視聽主有所受於上視主有所明於下味以淡爲本上水則貴本故也周氏諝曰皮弁之服白布衣積素以爲裳弁用皮者貴自然也衣白而裳素者貴其潔且明也餘論陸氏佃曰日中言奏而食則夕食不以樂侑然猶祭也故曰夕深衣祭牢肉周官王日一舉鼎十有二物楚語天子舉以大牢祀以㑹其舉謂朔月月半以盛者言之鼎十二物不必皆大牢也禮君無故不殺牛則王雖尊不應日殺牛天子言飲諸侯言爼簋飲養陽氣食養隂氣也案凡殺牲盛饌即曰舉周禮日舉即此日少牢也楚語舉以大牢即此朔月大牢也又此五飲皆常飲也故於六飲去凉醷凉者氷水夏暑飲之非常飲也醷酸亦醯之類非常飲也而加酒以酒養人氣血可常飲也卒食𤣥端而居動則左史書之言則右史書之御瞽幾聲之上下瞽音古上時掌反正義鄭氏康成曰天子服𤣥端燕居也左史右史其書春秋尚書其存者孔疏春秋是動作之事故以當左史所書左陽陽主動尚書記言誥之事故以當右史所書右陰隂主靜也瞽樂人也孔疏御侍也以瞽人侍側幾猶察也察其哀樂孔疏政和則樂聲樂政酷則樂聲哀察其哀樂防君之失通論孔氏穎達曰周禮五史無左史右史之名襄二十五年傳大史書曰崔杼弑其君是記動作之事則大史爲左史也僖二十八年傳王命内史叔興父䇿命晉侯為侯伯是言語之事故為右史酒誥云矧大史友内史友鄭注掌記言記行是内史記言大史記行也此論正法若其有闕則得交相攝代春秋之時特置左史右史襄十四年左史謂魏莊子昭十二年楚左史倚相是也藝文志及六藝論云右史記事左史記言與此正反陳氏祥道曰古者端衣或施之於冕或施之於冠樂記魏文侯端冕而聽古樂此施之於冕者也冠禮冠者𤣥端緇布冠既冠易服服𤣥冠𤣥端内則子事父母冠緌纓端韠紳公西華曰端章甫以至晉侯端委以入武宮晏平仲端委以立於虎門此施之於冠者也蓋𤣥端齊服也諸侯與士以為祭服玉藻𤣥端以祭特牲冠𤣥端是也大夫士以爲私朝之服玉藻朝𤣥端是也天子至士亦以爲燕服玉藻天子卒食𤣥端而居内則事父母端韠是也然則端衣所用固不一矣陸氏佃曰諸侯言夕深衣舉輕天子言卒食𤣥端而居舉重互相挾則天子夕亦深衣諸侯卒食亦𤣥端而居左史右史諸侯亦應如此諸侯言行或愧於書天子言幾聲諸侯言定體善言卜幾聲精矣存異陳氏祥道曰周官典同言髙聲䃂下聲肆正聲緩則所謂中聲者一適於正緩而已蓋樂以中聲爲本而一上一下非所以爲中也古者神瞽考中聲以作樂蓋本諸此然則御瞽察樂有不以中聲為量乎上非中下亦非中御瞽在所幾焉若夫不上不下而要宿於中則中和之紀於是乎在尚何幾察為哉案周官對正聲而言故髙下俱失其正若謂上下則幾而中聲即可不幾則神瞽之所考者謂何陳氏之論似是而非且此記特辨其哀樂以知政之得失耳與中聲之義又有别矣年不順成則天子素服乗素車食無樂正義鄭氏康成曰自貶損也孔氏穎達曰周禮司服大札大荒大烖素服鄭注大札疫病也大荒饑饉也大烖水火也此天子諸侯罪己之義通論孔氏穎達曰素服者謂素衣故下文諸侯年不順成君衣布與此互文也其臣下助君禱請之時乃素故司服𤣥端素端注云為札荒有所禱請也馬氏睎孟曰順在氣成在物不順則逆而水旱至焉不成則虧而饑饉至焉周官司服大荒素服大司徒荒政蕃樂大司樂大凶弛縣雜記凶年乗駑馬皆憂以天下故也總論范氏鍾曰自天子玉藻至食無樂此天子之儀十二天數也旒必象焉變化天道也龍卷象焉尊祖配天以是而祭可以對越上帝來格祖考矣東者日之所出向明而治閏必變而從時皆天道也皮弁以食順以質也餕食之餘自損挹也日少牢崇儉也朔月大牢敬始也朔言聽受命於天也朝言視中正以觀天下也五飲水之為上原本而反始也燕居而齊服戒謹恐懼於不覩不聞也言動有書表儀天下也幾聲以察治忽聲音與政通惟樂不可以偽為也年不順成遽自貶損憂以天下也一衣服飲食動作起居雍雍肅肅周旋中禮矣諸侯𤣥端以祭裨冕以朝皮弁以聽朔於大廟朝服以日視朝於内朝裨婢支反大音泰正義鄭氏康成曰𤣥端祭先君也孔疏與上天子龍卷以祭其文相類故知祭先君也鄭注王制𤣥衣養老云𤣥衣素裳天子之燕服為諸侯之朝服天子諸侯以朱為裳上士以𤣥為裳中士以黄為裳下士以雜色為裳則名𤣥端不得名朝服裨冕朝天子也公衮侯伯鷩子男毳也孔疏案覲禮侯氏裨冕鄭注裨之為言埤也天子六服大裘為上其餘為裨是以總云裨冕皮弁下天子也孔疏以天子用𤣥冕諸侯用皮弁故云下天子也此内朝路寢門外之正朝孔疏以下文君日出而視之退適路寢故知此路寢門外朝天子諸侯皆三朝孔疏太僕掌燕朝之服位注燕朝朝於路寢之庭是一也司士正朝儀之位注此王日視朝事於路門外是二也朝士掌外朝之法注外朝在庫門之外皋門之内是三也諸侯三朝已見於文王世子疏劉氏彜曰天子聽朔於明堂而頒其正朔於天下諸侯受而藏諸大廟每月之吉則以餼羊告朔祭於大廟因而聽其月朔之政則服皮弁焉存疑鄭氏康成曰端亦當為冕孔疏𤣥端賤於皮弁下文皮弁聽朔於大廟不應𤣥端以祭先君故知亦當為𤣥冕孔氏穎達曰行此禮天子於明堂諸侯於大祖廟訖然後祭於諸廟謂之朝享司尊彜云朝享是也聽朔又謂之月祭祭法云皆月祭是也案朝享月祭與告朔無干戴氏侗曰裨冕冕服之次諸侯朝天子則降而服其次如公當衮則服鷩侯伯當鷩則服毳馬氏睎孟曰周諸侯之衣服禮儀皆以命數為節而諸侯相見亦用朝王之圭藉豈祭不以朝王之裨冕特降之以從𤣥冕乎殆不然矣公西華曰宗廟之事如㑹同端章甫則端𤣥端也孔子冠章甫之冠而公西華亦以端章甫為禮記者所以有𤣥端以祭之説歟存異鄭氏康成曰諸侯祭宗廟之服惟魯與天子同孔疏案明堂位君卷冕立於阼此謂祭文王周公之廟得用天子之禮祭魯公以下則亦𤣥冕方氏慤曰内朝亦曰燕朝以其别於外朝故曰内以其别於治朝故曰燕視止於内朝者常朝也故以日言之案燕朝為路門内之朝此記指路門外之朝疏説甚明方氏之説非也辨正陳氏祥道曰記曰齊之𤣥也以陰幽思也故祭之冕服皆𤣥齊之端衣亦𤣥儀禮大夫祭以朝服士祭以𤣥端冠禮冠者服𤣥端雜記公襲朝服一𤣥端一襚禮自堂受𤣥端則朝服𤣥端異矣𤣥端皆𤣥裳或黄裳雜裳可也未聞以素裳也鄭注云朝服冠𤣥端素裳此説無據案士冠禮朝服素韠特牲𤣥端爵韠是異以韠不以裳案天子之服必十二章以則天數上公則止九章鄭據左傳三辰旗旂句謂登日月星於旂則服去三章而止九將畫黼於扆畫雉於門而山節藻棁服并去此四章而五乎上公九命九章自衮冕而下侯伯七命七章自鷩冕而下子男五命五章自毳冕而下大國之孤四命自希冕而下卿大夫不過三命自𤣥冕而下士一命無冕自皮弁而下此皆在外者也其在内則三公八命猶鷩冕故曰三公一命衮卿六命猶毳冕大夫四命猶希冕上士三命乃𤣥冕在内屈也其出封則皆加一命在外伸也未出封加衮以前則在内公卿之冕服自應比在外諸侯降一等既出封以後則冕服繋王命所加入朝時自應如周禮大行人九儀之命上公九章而服衮侯伯七章而服鷩子男五章而服毳夫亦何嫌而必降服其次如戴所云乎出封加命之諸侯若以入朝而必降其服將何以别於在内公卿未之加命者乎且裨有埤陪之義又卑也副也凡冕以一上者為正其餘卑者為裨天子裘冕十二旒為主為正衮冕而下為副為陪諸侯冕服通稱裨冕王朝卿大夫士亦如之故曽子問云大祝裨冕又云大宰大宗大祝皆裨冕覲禮云侯氏裨冕侯氏以入朝而見屈於王豈大宰大宗大祝亦必降服其次乎其總稱裨冕者以服衮服鷩服毳之諸侯同時入覲服章非一故以裨冕括之亦猶五玉總稱為瑞云爾况弁師天子十有二玉朱子謂天子雖與諸侯同冕而旒皆十二玉則與上公衮冕九旒九玉自有分辨鄭孔之説何疑焉至魯君用天子車服乃僖公所僭與魯公何與鄭孔附㑹則非朝辨色始入君日出而視之退適路寢聽政使人視大夫大夫退然後適小寢釋服辨如字徐扶免反正義鄭氏康成曰辨色始入羣臣也入入應門也辨猶正也别也小寢燕寢也釋服服𤣥端孔疏據君故服𤣥端若卿大夫釋服服深衣陳氏祥道曰詩曰夜鄉晨言觀其旂臣辨色始入之時也又曰東方明矣朝既盈矣君日出而視之之時也朝以先為勤以後為逸退以先為逸以後為勤今朝而臣先於君所以明分守退而君後於臣所以防怠荒劉氏彛曰大夫有政不敢自達者必入路寢之朝以請於君也故大夫未退則君不敢適小寢古之君臣同心同德以憂國事而君不敢恃其尊大以自暇逸三代之臣所以忠厚勤瘁於後世蓋有所自焉陳氏澔曰視朝而見羣臣所以通上下之情聽政而適路寢所以決可否之計案視朝於路寢門外立而行禮而已禮畢君入路寢門聽政大夫就寢門外左右六府各治其事周禮大僕所謂掌君命之出入諸臣之復逆全在於此臣有所奏告大僕引而入君有所命使大僕傳而出獻可替否反覆商確恒歴數時故臣曰夙夜在公必大夫皆退而後君適小寢釋服也存疑孔氏穎達曰應門之内則路門之外諸侯中門為應門外有皋門若魯則雉庫路入者入雉門也案諸侯無皋門疏誤又朝服以食特牲三爼祭肺夕深衣祭牢肉朔月少牢五俎四簋子卯稷食菜羮夫人與君同庖稷食食音嗣庖歩交反正義鄭氏康成曰食必復朝服所以敬養身也三俎豕魚腊孔疏約特牲禮故知豕魚腊也祭牢肉異於始殺也孔疏早起初殺之時將食先祭肺以周人重肺至夕將食之時切牢肉為小叚而祭之故云異於始殺天子言日中諸侯言夕天子言餕諸侯言祭牢肉互相挾孔疏天子言日中諸侯亦當有日中諸侯言夕則天子亦有夕天子言餕則諸侯亦餕諸侯言祭牢肉則天子亦祭牢肉五俎加羊與其腸胃也孔疏約少牢禮五俎但少牢祭神加羊與膚為五此人君所食無膚而有腸胃也朔月四簋則日食稲粱各一簋而已孔疏以朔月四簋故知日食二簋以稻粱羙物故知各一簋稷食菜羮忌日貶也孔疏紂以甲子死桀以乙卯亡無道被誅後王以為忌日夫人與君同庖不特殺也孔疏夫人與君同庖則后亦與王同庖可知方氏慤曰牛羊豕為大牢羊豕為少牢諸侯朔月少牢以見日所食特牲三俎者或羊或豕而已案特牲用豕此傳冩之誤深衣燕居之服由朝至夕則可以燕矣故夕深衣而燕食焉朔月少牢固以降於天子亦以無故不殺羊故也俎薦牲肉天産故用陽數之竒簋盛黍稷地産故用陰數之耦五俎四簋則以朔月故倍常也君之常膳非不以稷為食特以稻粱為上而稷為之次耳非不以菜為羮特以雞犬為胾而菜為芼耳今乃食止以其次羮止以其芼則以疾日當自貶故也夫人與君同庖與共牢而食同義通論孔氏穎達曰以此而推天子朔月大牢當六簋黍稷稻粱麥苽各一簋若盛舉則八簋故小雅陳饋八簋當加以稻粱此常食也若禮食則兼用簠數更多公食大夫禮簠盛稻粱下大夫六簋上大夫八簋周禮掌客上公簠十侯伯八子男六簋則俱十二存疑方氏慤曰周官膳夫王燕食則奉膳贊祭王荆公謂燕食有魚鳥之膳非祭朝食之餘禮餕餘不祭以餘膳祭非敬也此言日中與夕則燕食爾而曰祭牢肉者由周以前質略故也存異陸氏佃曰深衣叙祭牢肉之上則夕亦以此食矣夕燕居之時雖天子亦深衣易曰君子以嚮晦入燕息若端朝事也案周官膳夫贊祭注言奉朝之餘膳所祭者牢肉則與此正同蓋朝所祭者肺此所祭者牢肉就全牲言則以此為朝食之餘非前所食者之餘也王安石以餕餘不祭疑此所祭者是魚鳥非牢肉誤矣又上文𤣥端敘卒食之下是可知天子雖卒食猶朝服卒食後乃𤣥端也而陸氏佃顧謂天子亦夕深衣何耶且下朝𤣥端夕深衣據大夫士而言正以不敢上同於天子昭其辨也豈以相備哉君無故不殺牛大夫無故不殺羊士無故不殺犬豕君子逺庖廚凡有血氣之類弗身踐也逺於萬反踐依注作翦子淺反正義鄭氏康成曰故謂祭祀之屬孔疏若賓客饗飯亦在其中故云祭祀之屬踐當為翦聲之誤也翦猶殺也孔氏頴達曰弗身踐此謂尋常若祭祀之事則身自為之故楚語云禘郊之事天子自射其牲又刲羊擊豕是也方氏慤曰庖宰殺之所廚烹飪之所應氏鏞曰無故不殺仁也君大夫士必有辨禮也有故而殺禮也逺之而弗身踐仁也君子逺庖廚蓋古有是語孟子亦引之存異孔氏穎達曰此君惟據諸侯以天子日食大牢無故得殺牛也無故不殺羊亦諸侯大夫也若天子大夫有故得殺牛陸氏佃曰踐如字血氣之類蓋若螻蟻案孔謂天子日殺一牛顯與本文日少牢朔月大牢背陸謂螻蟻不可踏則婦人之仁矣至於八月不雨君不舉年不順成君衣布搢本關梁不租山澤列而不賦土功不興大夫不得造車馬衣於既反搢徐音箭又如字正義鄭氏康成曰君不舉者為旱變也君衣布以下皆為凶年變也衣布者謂若衛文公大布之衣大帛之冠是也孔疏為國之破亂與凶年同故引之搢本去珽荼佩士笏也士以竹為笏飾本以象關梁不租此周禮也殷則關但譏而不征孔疏雖非凶年亦不課税列之言遮列也雖不賦猶為之禁不得非時取也孔疏恐有傷損於物不賦歛也造謂作新也孔氏穎達曰此論諸侯及卿大夫遭凶年之禮關謂關門梁謂津梁租謂課稅以其凶年故不課税馬氏睎孟曰古人謂辰角見而雨畢則至於八月不雨者終無雨而萬寶莫期乎成矣此君所以不舉喪服以布士笏以本衣布所以致憂搢本所以自貶不租不賦所以寛民財司關凶札則無關門之征是也土功不興所以寛民力司徒荒政弛役是也關以通陸梁以通川大夫不得造車而繼之以馬者造車而馬從之也朱氏申曰關梁人之所運其利微故其税曰租山澤地之所産其利博故曰賦輔氏廣曰土功謂築城壘浚河湟大夫不造車馬則君不得為宮室可知通論馬氏睎孟曰周官司書言賦而終之以凡税歛掌交言九税而餘官言九賦司徒言征而繼之以賦載師言賦而繼之以税則税者以地取之也征者以正取之也歛則收而聚之賦則取而布之租則取之不可以悉税者取之以道征者取之以義歛者取之事賦者取之法租者取之戒其言不同相備故也存疑鄭氏康成曰至於八月建子之月盡建未之月也孔疏文公十年自正月不雨至於秋七月傳云不曰旱不成災也春秋之義周之春夏無雨未能成災至秋秀實之時而無雨則雩雩而得雨則書雩喜祀有益也雩而不得雨則書旱明災成也劉氏彜曰洪範庶徵三代之明訓也君人者知其由已之致也反躬自訟不御正寢不進常膳食不舉樂春秋所以書正月至於七月不雨或書大旱或書大雩或書又雩皆因其違禮違天之實跡書以見其咎徵也三傳弗達聖人之意乃曰不為災故不書旱豈有不雨者七月而不為災者此曰至於八月不雨君不舉後儒惑於三傳不然則誤且繆矣孔氏穎達曰土功不興謂人食不得滿二鬴之歲若人食二鬴則猶興土功均人云豐年旬用三日中年用二日無年用一日廩人云人食四鬴上三鬴中二鬴下是無年猶有一日之役也案年不順成亦大槩謂凶歳耳不興土功謂不造城郭宮室若無年猶有一日之役則凡小力役亦是不必土功也案周八月夏六月孟子所謂七八月之間旱則苖槁者言至此月不雨尚未至年不順成也而君已為之不舉見其敬天勤民之至若據春秋至七月不雨不為災至八月乃為災而君不舉之説猶未協經義卜人定龜史定墨君定體正義鄭氏康成曰定龜謂靈射之屬所當用者定墨視兆坼也定體視兆所得也周公曰體王其無害孔疏此尚書金縢文孔氏穎達曰龜人云天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁屬南龜曰獵屬北龜曰若屬各以其方之色與其體辨之色謂天龜𤣥地龜黄東青西白南赤北黒也體則俯者靈仰者繹前弇果後弇獵左倪靁右倪若定者定其所當用謂卜祭天用靈祭地用射射則繹也春用果秋用靁之屬占人云君占體大夫占色史占墨卜人占坼注云體兆象也色兆氣也墨兆廣也坼兆璺也凡卜必以墨畫龜求其吉兆若龜從墨而大坼稱為兆廣從墨裂其傍岐細出稱為兆璺君定體者謂五行之兆象既得兆體君定其體之吉凶尊者視大卑者視小也朱子曰占龜土兆大横木兆直金兆從右邪上火兆從左邪上水兆曲或曰火兆直木兆從左邪上案此即五行之兆象以大小長短明暗為吉凶或占凶事又以短小為吉又有旋者吉大横吉案君定體即以此定其吉凶通論方氏慤曰周官言君占體大夫占色史占墨卜人占坼其序與此不同者彼以尊卑之序言此以先後之序言故也存疑吳氏澄曰墨謂既坼之後以墨塗之坼大者食墨粲然可見坼微者墨不能入故但占其坼而已案古卜法今不傳如孔疏則史先就龜腹板為圖如書言我卜瀍水東澗水西又卜瀍水東惟洛食是必圖瀍澗洛水地勢之形而龜之坼如墨所􅃌則吉也如吳氏説乃既坼後加以墨全非史所能定矣疑疏説猶為近之君羔幦虎犆大夫齊車鹿幦豹犆朝車士齊車鹿幦豹犆孔云君下或有齊字幦音覓詩作幭周禮作幎徐苦荻反犆依注音直齊音齋上鹿字或作豹正義鄭氏康成曰幦覆苓也孔疏苓即式也詩大雅鞹鞃淺幭毛傳云幭覆式幭即幦也又周禮巾車作􅍜但古字耳三者同也知幦是覆苓者少儀云負良綏申之靣拖諸幦是也犆讀皆如直謂縁也此君齊車之飾孔疏以大夫及士皆云齊車故知此君齊車之飾臣之朝車與齊車同飾孔疏據此則君之朝車與齊車異飾也但無文以言之孔氏穎達曰此論君及大夫士等齊車朝車所飾之物尊卑不同皇氏云君謂天子諸侯詩淺幭以虎皮為幭此或緣以虎皮即謂之淺幭歟陳氏祥道曰軾之制有衡以横乎上有犆以直乎下幦若席然施諸軾上其禮有等其用有辨虎以其威猛而有義也羔以其不黨跪乳而有禮也鹿以其善接其類而有仁也豹之於虎其為威小矣齊於朝其為禮異矣故諸侯覲王虎淺幦齊則羔幦虎飾而已士之齊車鹿幦豹飾則朝車之幦與飾不以鹿豹而大夫齊車朝車皆鹿幦豹飾者屈於君故也方氏慤曰周官巾車金路封同姓象路封異姓齊右謂金路為齊車則王固以金路齊也王如此則同姓從可知言同姓以金路則異姓以象路可知由此推之大夫之車則墨車是也士之車則棧車是也吳氏澄曰朝車者大夫之朝車也蒙上文大夫之齊車用鹿皮為幦豹皮為飾而其朝車及士之齊車亦皆鹿皮豹犆也言朝車者恐人疑其朝車之與齊車異飾也言士齊車者恐人疑士之齊車與大夫異飾也故重出鹿幦豹犆四字而不殺其文云徐氏師曽曰鹿善羣豹文炳取其恊恭而有文也存疑孔氏頴達曰車式以苓為之有豎者有横者故考工記注云轛式之植者衡者也又曰皇氏云詩淺幭與𤣥衮赤舄同文知亦齊車此用羔幦是異代禮案韓侯來朝而賜之必命車也此以為齊車又謂為異代之禮不知何據方氏慤曰承君之下不言朝車則知君之羔幦虎犆以齊而不以朝也宣王賜韓侯鞹鞃淺幭者謂虎皮淺毛亦虎犆矣蓋天子之所錫不必諸侯之以朝故也馬氏睎孟曰周禮以金路祭祀㑹同賓客謂之齊車而其幦無所經見荀子曰絲末彌龍所以養威此天子之幦也然則羔幦虎犆殆諸侯之禮歟案天子之輅有五等安見輅别而幦與犆盡同歟據周禮喪車且有五等木車犬􅍜疏飾素車犬􅍜素飾藻車鹿淺䄙革飾駹車然􅍜髤飾漆車豻䄙雀飾安見祭車朝車反無辨而同􅍜同飾歟則周禮巾車一職大有闕文而此一節言齊車朝車亦多闕誤蓋朝必降齊一等而士必降大夫一等無緣大夫之齊大夫之朝士之齊俱鹿幦豹犆别數之而仍重言之也芮城定本作大夫齊車豹幦豹犆其朝車與士齊車鹿􅍜豹犆芮氏博極羣書或有據又案孔以苓即式是已又言以苓為之何也苓是何物可以之為式乎且言式有直者有横者益不可解式車前横木其直者謂之轛式無直者也君子之居恒當戸寢恒東首若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐首手又反迅音峻又音信衣於既反下衣布同正義鄭氏康成曰當戸鄉明也東首首生氣也衣服冠而坐敬天之怒通論方氏慤曰孔子將病猶當戸而坐君視之猶東首加朝服迅雷風烈必變蓋禮然也總論孔氏頴達曰自此至光矣一節明卿大夫以下所居處及盥浴并將朝君之儀日五盥沐稷而靧粱櫛用樿櫛髪晞用象櫛進禨進羞工乃升歌浴用二巾上絺下綌出杅履蒯席連用湯履蒲席衣布晞身乃屨進飲盥音館靧音悔櫛則乙反樿章善反禨其既反絺刃疑反綌去逆反杅音雩蒯苦怪反連力旦反方讀如字屨九具反本又作履正義鄭氏康成曰晞乾也沐靧必進禨作樂盈氣也孔疏以新沐氣虚補益其氣更言進羞明為羞籩豆之實孔疏知非庶羞者庶羞為食而設今進禨則為飲設故知是羞籩羞豆絺綌刷去垢也杅浴器也蒯席澀便於洗足也孔疏浴竟出盆踐蒯席上亦刮去垢也連猶同也案同謂此洗足與浴同用湯也疏又以連為釋謂同用湯則垢釋耳進飲亦盈氣也孔氏穎達曰盥洗手也沐沐髮也靧洗面也取稷粱之潘汁洗面沐髪並須滑故也此大夫禮人君靧沐皆粱也樿白理木櫛梳也沐髪為除垢膩故用白理澀木以為梳沐已燥則髪澀故用象牙滑櫛以通之禨謂酒也沐而飲酒曰禨進羞之後樂工乃升堂以琴瑟而歌連猶釋也釋去足垢而用湯䦨也方氏慤曰上貴而下賤絺精而綌粗上絺下綌則用之各以其稱也杅以木為之蒯茅類蒯澀而蒲軟用湯謂用以洗足浴既用湯又用湯以洗足故曰連連之為言續也進飲而不進羞工亦不升歌殺於沐也輔氏廣曰衣布如今之浴衫晞身乃屨屨服之末進屨則衣服皆舉矣故進飲焉通論馬氏睎孟曰内則子之於親聘禮館人之於賓皆三日具沐五日具浴蓋禮以情制德以禮作君子知彈冠振衣於其外則必浴德澡心於其内也總論應氏鏞曰沐先稷而後粱櫛先樿而後象浴巾下綌而上絺席先蒯而後蒲蓋垢汙之難去不可不加刮摩滌蕩之力故先用其粗者及整治之後則用潤養之功而已將適公所宿齊戒居外寢沐浴史進象笏書思對命既服習容觀玉聲乃出揖私朝煇如也登車則有光矣齊側皆反煇音暉正義鄭氏康成曰思所思念將以告君者對所以對君者如復命覆奏命謂所受君命書之於笏為失忘也玉聲玉珮也私朝自大夫家之朝也揖其臣乃行孔氏穎達曰史謂大夫亦有史官也熊氏云下大夫不得有象笏又解云有地大夫故用象既服者著朝服已竟私習儀容又聽已佩鳴玉聲與行歩相中適也習儀竟行歩至己之私朝揖其屬臣揖竟出登所乗之車而適君朝矣案有地大夫用象以後言諸侯以象大夫以魚湏文竹推之方氏慤曰齊戒故居外寢沐浴以前期為之故曰宿古之人將有所思也必先齊將有所為也必先戒陳氏澔曰煇與光皆言德容發越之盛光則又盛於煇矣通論馬氏睎孟曰孔子於哀公三日齊而後請伐齊諸侯於玊畿泰山具朝宿之邑皆以湯沐名之則人臣見君之禮可見矣餘論朱子曰漢初有秉笏奏事又曰執簿亦笏之類只是為備遺忘故手執眼觀口誦於君前有所指畫不敢用手故以笏指畫今世遂用以為常執之物存異吳氏澄曰煇如謂昧爽之際晨光猶熹㣲也有光謂質明之時晨光已顯著也案容觀必中禮玉聲必中樂君子事君誠敬積於中儀容發於外煇如有光易所謂有孚暉吉詩所謂儀一心結也如吳説則登車已有光至公門大明矣非辨色始入又案此章記朝君之禮凡事君者皆當如是不必専謂為諸侯朝天子也天子搢珽方正於天下也諸侯荼前詘後直讓於天子也大夫前詘後詘無所不讓也荼依注音舒詘出勿反正義鄭氏康成曰珽之言珽然無所屈也荼讀為舒遲之舒舒懦者所畏在前也詘謂圜殺其首諸侯惟天子詘焉大夫奉君命出入者也上有天子下有已君又殺其下而圜孔氏穎達曰方正於天下示己之端平正直而布於天下也荼後直下角方正大夫士又杼其下廣二寸陳氏祥道曰天子於天下體無所屈故體必方正諸侯於天子則謹度以臣之於臣民則制節以君之故荼前詘後直大夫於其君則為臣於天子則為陪臣故笏前詘後詘方氏慤曰玉之廷者為珽左傳衮冕黻珽珽故直直故方方故正方正者以其直而無所詘於天下也故天子搢之且其動也直天道也其動也詘地道也天子體天道故無所詘諸侯進則勢詘於天子故前詘退則道伸於國人故後直搢謂搢之於紳也搢之於紳則服之也服之欲其識而勿忘故也言天子如此則餘可知矣案紳帶之垂者帶可搢笏紳不可搢紳當作帶存疑鄭氏康成曰此亦笏也謂之珽孔疏以下文笏天子以球玉故知此珽亦笏也或謂之大圭長三尺杼上終葵首孔疏玉人注云大圭或謂之珽終葵首者於杼上又廣其首方如椎頭孔疏齊人謂椎頭為終葵是謂無所詘後則恒直相玉書曰珽玉六寸明自炤孔疏引証珽是玉明自炤者内含明也陸氏佃曰珽非大圭大圭長三尺珽長六寸周氏諝曰笏二尺六寸考工記大圭三尺兼上終葵首言之珽六寸單指終葵首陳氏祥道曰天子之朝日執鎮圭搢大圭則所執者贄也所搢者笏也諸侯之朝大夫之聘蓋亦如此則諸侯執命圭者必搢荼大夫執聘圭者必搢笏及其合瑞而受圭則執其所搢而已此所謂見於天子無説笏天子之笏曰珽諸侯曰荼大夫以下曰笏者尊者文其名卑者命其實故車天子諸侯曰路大夫以下曰車寢天子諸侯曰宮大夫以下曰寢辨正朱子曰周禮典瑞大圭不執只是搢於腰間却執鎮圭用藻藉以朝日而今郊廟天子皆執大圭大圭長三尺且重執之甚難古者本非執大圭也案珽笏大圭三者鄭氏以為一為鄭氏之説者曰珽玉六寸據上不殺者椎頭也然以笏計之笏度二尺六寸加椎頭六寸是大圭應長三尺二寸而玉人典瑞俱云大圭三尺者何也是大圭非珽明矣第珽與大圭固二而陳氏以珽即笏恐猶未然本文明言天子之珽方正無所詘諸侯之荼前詘後直大夫前後詘笏則明言中愽三寸前後皆二寸則以為大夫之前後詘可也與天子之方正諸侯之後直能附合乎且笏惟天子以球玉諸侯則以象大夫則以竹安得盡以玉為之而但辨其直殺耶則珽與笏亦不得混為一也荀卿云天子御珽諸侯御荼大夫服笏管子云天子執玉笏以朝日又似珽荼之用同於笏者或天子有珽有玉笏接諸侯則搢珽示方正朝日則執玉笏示有所讓諸侯有荼有象笏朝王及臨羣臣則搢玉荼示上詘下直居恒則所搢但象笏歟本文於大夫不舉名蓋大夫惟有一笏原無異制異用觀荀子於大夫言服笏服者其常於天子言御珽諸侯言御荼則必有所御乃用之侍坐則必退席不退則必引而去君之黨登席不由前為躐席徒坐不盡席尺讀書食則齊豆去席尺為於偽反躐力輒反正義鄭氏康成曰引卻也退謂傍側也辟君之親黨也登席不由前升必由下也徒坐不盡席尺示無所求於前不忘謙也食則齊者為汙席也孔氏穎達曰臣侍君坐若側傍有别席則退受側席不退謂傍無别席可退或雖有别席君不命之使退命令與君之親黨同席則卑謙卻引而離君之親黨坐君親黨之下也庾云失節而踐為躐席應從下升若由前升是躐席也徒空也空坐謂非飲食及講問時也不盡席之前畔有餘一尺讀書食則坐近前與席畔齊豆去席尺者解席所以近前之意以設豆去席一尺不得不前坐就豆方氏慤曰侍坐則必退席者不敢與尊者並故也雖不退席猶須引身而去君之黨以避之於其黨如此則於君可知矣存疑鄭氏康成曰讀書則齊者讀書聲當聞尊者孔氏穎達曰案鄉飲酒禮賓席於戸西以西頭為下主人席於阼階介席於西階皆北頭為下賓升席自西方注云升由下也又鄉飲酒記云主人介凡升席自北方降自南方注云席南上升由下降由上主人受獻自席前適阼階是降自北方者以受獻正禮須席末啐酒也若賓則升降皆由下也案上二句言侍君之席下因及師弟賓主之席盖講説與食則惟師南面專席弟子東西面同席賓主則無南面之席惟有東西相向之席講説則書䇿在席前食則豆在席前故升席皆當由後而升乃不相背若由前而升則陵躐而失其節所以不由前為此故也徒坐不盡席尺以示謙也讀書食則與席齊以豆去席尺書亦猶是也存異陳氏澔曰登席不由前為躐席八字當作一句而為字平聲蓋行禮之時人各一席而相離稍逺固可從下而升若布席稍宻或數人共一席則必由前乃可得已之坐若不由前則是躐席也王氏曰食則豆去席尺讀則與豆齊亦去席尺是謂齊豆去席尺案登席不由前疏引鄉飲酒禮於義不符陳氏必以八字為一句其説尤繆曲禮云毋踖席摳衣趨隅不趨隅尚不可而獨可由前乎蓋升席有從下者有從後者必無從上從前者讀書食則齊依䟽為句豆去席尺舉食席以例書席省文也石梁王氏説更支若賜之食而君客之則命之祭然後祭先飯辯嘗羞飲而俟若有嘗羞者則俟君之食然後食飯飲而俟飯扶晚反辯音徧正義鄭氏康成曰侍食則不祭雖見客猶不敢備禮也君將食臣先嘗羞忠孝也俟君食而後食若有嘗羞者膳宰存也飯飲利將食也孔氏穎達曰此論人君賜食之禮祭祭先也禮敵者共食則先祭降等之客則後祭若臣侍君而賜之食則不祭若賜食而君以客禮待之則得祭雖得祭又先湏君命之祭乃敢祭也飯食也君未食而臣先食徧嘗羞膳示行臣禮為先嘗食之義也禮食未飱必先啜飲以利滑喉中不令澀噎君既未飧故臣亦不敢飧而先嘗羞嘗羞畢啜飲以俟君飧臣乃敢飧也若有嘗羞者臣侍食非君所客故不得祭亦不得嘗羞君自有膳宰嘗羞也既不祭不嘗則俟君食後已乃食也飯飲者飲之也雖不嘗羞亦先飲以俟君也徐氏師曽曰飲而俟飯非飲而俟飧知然者以在品嘗之前也通論方氏慤曰於飯曰先於羞曰嘗互言之耳陸氏佃曰侍食雖衆其嘗食常卑者一人先君命之羞羞近者命之品嘗之然後惟所欲凡嘗逺食必順近食君未覆手不敢飧君既食又飯飧飯飧者三飯也君既徹執飯與醬乃出授從者覆芳復反飧通作湌從夕者夕食也從水者水澆飯也皆音孫從才用反正義鄭氏康成曰羞近者辟貪味也順近食者從近始也孔疏意欲嘗逺且從近始辟貪味也覆手以循咡已食也孔疏食飽必覆手以循口邊恐有殽粒汙著之也飧勸食也孔疏飧謂用飲澆飯於器中也禮食竟更作三飧以勸助令飽食使不虚也君既食又飯飧不敢先君飽也三飯臣勸君食如是可也孔疏三飯三度飧也執飯與醬授從者食於尊者之前當親徹也孔氏穎達曰君命之羞猶是君所不客者也雖君已食已乃後食而猶未敢食羞故又須君命雖得君命猶先食近其前者一種而止品徧也君又命徧嘗而已乃徧嘗之後則隨己所欲不復次第也凡嘗逺食必順近食客與不客悉皆如此故云凡也君未覆手不敢飧侍食者悉然也君饌已徹則臣乃徹已饌以授從者飯醬是食之主己之所得故自執之以授從者此謂不客者若君與已禮食則但親徹之不敢授已之從者也余氏心純曰飧不敢先君飽饌不敢先君徹皆視君節以執臣禮也通論孔氏穎達曰君與己禮食不敢授從者故公食大夫禮賓北面坐取粱與醤以降西面坐奠於階西注云不以出者非所當得是也若非君臣但降等者則徹以授主人相者故曲禮云客若降等徹飯齊以授相者若賓主敵則徹於西序端公食大夫禮親徹是也凡侑食不盡食食於人不飽唯水漿不祭若祭為己偞卑侑音又偞虚實反正義鄭氏康成曰不盡食不飽謙也水漿非盛饌也已猶大也祭之為大有所畏迫臣於君則祭之孔疏公食大夫禮宰夫執觶漿以進賓受坐祭遂飲孔氏穎達曰此因上侍君之食因明凡人相敵為食之禮侑食不盡食明勸食尊者之法食於人不飽通包食於尊者及禮敵之人皆謙退不敢自足也食於禮敵之人所設水漿不以祭先偞厭也若祭水漿為大厭降卑微也方氏慤曰食於人不飽與共食不飽同義通論輔氏廣曰孔子説食於人不飽禮也孔子食於少施氏未嘗不飽飽少施氏之德也君若賜之爵則越席再拜稽首受登席祭之飲卒爵而俟君卒爵然後授虚爵君子之飲酒也受一爵而色洒如也二爵而言言斯禮已三爵而油油以退退則坐取屨隱辟而後屨坐左納右坐右納左洒先典反又西禮反言魚斤反油音由本亦作由鄭於斯字句禮一字句王肅本無已字及下油字於言字句言斯禮句正義鄭氏康成曰不敢先君盡爵洒如肅敬貌洒或為察言言和敬貌斯猶耳也油油説敬貌以退禮飲過三爵則敬殺可以去矣孔氏穎達曰此論臣於君前受賜爵之禮在君前先飲者示賤者先即事後授虚爵者示不敢先君盡爵洒如者謂顔色肅敬如似洒然既受二爵顔色稍和故言言皇氏讀言為誾義亦通也油油者言侍君小燕惟止三爵顔色油油説敬故春秋左氏傳云臣侍君宴過三爵非禮也坐跪也初跪脱屨堂下為敬故退而跪取屨起而逡廵隱辟而著之納猶著也若坐左膝則著右足之屨若坐右膝則著左足之屨輔氏廣曰言君若賜之爵則非禮食可知越席再拜稽首受者受於尊所也反登席而祭之方氏慤曰隱則不顯辟則不正隱辟而後屨與就屨跪而屏之於其側同義坐左納右坐右納左凡以順手足之便也通論孔氏穎達曰此謂朝夕侍者始得爵也若其大禮則君先飲而臣後飲故曲禮云長者舉未釂少者不敢飲燕禮公卒爵而後飲是也此經再拜稽首而後受燕禮興受爵降下奠爵再拜稽首則先受而後再拜燕禮據大飲法此據朝夕侍君而得賜爵燕禮非惟三爵而已馬氏睎孟曰考工記一升曰爵三升曰觚自觚至散其量有差而此特言爵者蓋爵者觚觶角散之總名故也君之賜爵所以致恩臣之受爵貴於至敬此所以三爵而油油以退也若夫湛露之燕諸侯至於不醉無歸燕禮之燕臣至於無算爵此又禮之大者與此異也士相見禮言君賜之爵退則隱辟而後屨君為之興則曰君無為興而其出至於三辭此不言者記其畧也朱子曰詳畧不同皆宜參考應氏鏞曰古之君臣以情相與於其閒燕命之侍坐賜食賜爵非朝聘宴饗之正疑若不必過嚴其分然亦未嘗忘恭敬之心亷恥之節焉其有不同者食則命之祭然後祭爵則越席而飲者不敢留君惠也飲至於三而亟退者酒易及亂而遂其驩則無已也飯至於三而猶勸者食以養人而相愛之意為無窮也詩曰三爵不識矧敢多又古聘射之禮賓主百拜而酒三行則爵不過三古之定禮也若夫傳有四飯之文禮有勸飧之義其亦不厭於詳矣存異王氏肅曰二爵而言飲二爵可以語也言斯禮語必以禮也案鄭王二説義皆可通但王説言字頗鑿凡尊必上𤣥酒惟君面尊惟饗野人皆酒大夫側尊用棜士側尊用禁上陳澔本作尚棜於據反正義鄭氏康成曰𤣥酒不忘古也面猶鄉也燕禮曰司宮尊於東楹之西兩方壺左𤣥酒南上公尊瓦大兩有豐在尊南南上饗野人皆酒飲賤者不備禮也棜斯禁也無足有似於棜是以言棜孔疏案鄉飲酒禮設兩壺於房戸間有斯禁彼是大夫禮此云大夫用棜故知棜是斯禁也案特牲禮注云棜今木舉上有四周下無足今斯禁亦無足故云有似於棜孔氏穎達曰人君燕臣子專其恩惠故尊鼻鄉君若兩君相見則尊鼻於兩楹間在賓主之閒夾之不得面鄉尊也饗野人謂蜡祭時也野人賤不得本古又無德又可飽食故惟酒而無水也側謂旁側在賓主兩楹閒旁側夾之若一尊亦曰側尊故士冠禮云側尊一甒醴在服北注云無偶曰側與此側别方氏慤曰設𤣥酒之尊必在衆尊之上禮運言𤣥酒在室是矣君面尊者專惠之道也臣側尊者辟君之嫌也陸氏佃曰禁即棜也變棜言禁棜之辭仁禁無所不禁通論馬氏睎孟曰周官行人王禮諸侯饗而有祼孤卿無祼則以酒禮之而已觀此則君子之於野人又可知也然禮之不用𤣥酒非特此也士冠禮醴子昏禮醴婦聘禮醴賓皆無𤣥酒禮質故也特牲少牢酌一尊無𤣥酒禮殺故也昏禮尊於房戸之閒無𤣥酒外畧於内故也士喪既夕士虞皆有酒醴無𤣥酒凶變於吉故也然則𤣥酒雖薄而其禮重醴酒雖厚而其禮輕記所謂近於人情非其至者於此見矣欽定禮記義疏卷四十一
