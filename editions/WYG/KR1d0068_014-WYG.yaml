body:
  text: 檀弓下第四之三哀公使人弔蕢尚遇諸道辟於路畫宫而受弔焉曾子曰蕢尚不如杞梁之妻之知禮也齊莊公襲莒於奪杞梁死焉其妻迎其柩於路而哭之哀莊公使人弔之對曰君之臣不免於罪則將肆諸市朝而妻妾執君之臣免於罪則有先人之敝廬在君無所辱命蕢苦怪反辟音避又婢亦反畫音獲杞音豈奪當作隧徒外反肆音四朝直遥反正義鄭氏康成曰哀公魯君也畫宫畫地為宫象曽子言行弔禮於野非也魯襄二十三年齊侯襲莒春秋傳曰杞殖華還載甲夜入且于之隧隧奪聲相近或為兑陳氏澔曰隧狹路也梁即殖也肆陳尸也大夫以上於朝士以下於市執拘也無所辱命辭不受也春秋傳曰齊侯弔諸其室孔氏頴達曰此論蕢尚不如婦人得禮之事方氏慤曰弔人於道路之間禮苟從簡事苟從便蓋非禮之禮君子固不以加於人亦未嘗受之於人此曽子所以言蕢尚不如杞梁之妻之知禮也陳氏澔曰辟讀闢除闢道路畫宫室之位以受弔通論孔氏穎達曰周禮鄉士職云協日刑殺肆之三日是陳尸曰肆鄭注謂諸侯大夫士也故襄二十二年楚殺令尹子南尸諸朝大夫既於朝士則於市其天子臣則有爵者皆適甸師氏不在朝故周禮掌囚職云凡有爵者奉而適甸師氏以待刑殺掌戮云有爵者殺之於甸師氏是也天子士宜在朝與諸侯大夫同陳氏澔曰妻妾執拘執其妻妾也孺子䵍之喪哀公欲設撥問於有若有若曰其可也君之三臣猶設之顔柳曰天子龍輴而椁幬諸侯輴而設幬為榆沈故設撥三臣者廢輴而設撥竊禮之不中者也而君何學焉䵍吐孫反撥半末反椁音郭幬大報反沈又作瀋昌審反中竹仲反又如字學知字或又户敎反正義鄭氏康成曰䵍魯哀公之少子三臣孟孫叔孫季孫氏猶尚也有若以臣況子也輴殯車也天子畫轅為龍幬覆也殯以椁覆棺而塗之所謂菆塗龍輴以椁也諸侯輴不畫龍孔疏天子之殯載柩于龍輴累材作椁而題湊其木幬覆棺上而後塗之輴形庳下不似龍惟轅與龍相類故鄭知畫轅為龍也諸侯以輴載柩不畫為龍亦累木為椁設木於上以幬之不為題湊直横木覆之亦泥塗其上為榆沈謂以水澆榆白皮之汁以播地於引輴滑也廢去也殯禮大夫菆置西序士掘肂見衽孔疏喪大記文顔柳止其學非禮也孔氏穎達曰此諫哀公不得學僭禮之事顔柳以有若對非其實恐哀公從之故以正禮而言方氏慤曰為輴之重也故為榆沈以滑之欲榆沈之散也故設撥以發之撥以手撥榆沈而灑於道也徐氏師曾曰設撥設置撥榆沈之人也存疑鄭氏康成曰撥可撥引輴車所謂紼也紼繫於輴三臣於禮去輴今有紼是用輴僭禮也孔疏喪大記大夫二綍二碑是大夫有綍綍即紼也又注既夕禮云大夫以上始有四周謂之輴是有輴也此云用輴僭禮者此據殯時大記及既夕禮謂朝廟及下棺時大夫以柩朝廟時用輴紼殯時用輁軸不得用輴紼案喪大記大夫葬用輴注輴當作輇與既夕異陸氏佃曰禮言天子龍輴以椁則諸侯無椁可知疏謂亦累木為椁非也榆性堅忍所謂不剥不沐十年成轂者然性沈難轉亦所載沈也故設撥以撥輴可知鄭謂撥謂紼亦非也吳氏澄曰天子之殯外加椁而又有幬諸侯外無椁而亦有幬榆為輴車之輪轂木性本重所載又重為難轉移動故須設撥以撥其輪大夫殯用輁軸其轉動甚易既不用輴則撥無所施徒為虚器無所用也案葬用椁殯不用椁殯樷木周之如椁耳天子象屋四注諸侯不四注以為差陸謂諸侯無椁非至於榆沈陸呉謂以榆木為轂木性沈重本文言榆不言轂何據而知此未可以為必然設撥鄭謂即紼夫棺無不用紼者去紼棺何以行陸呉謂設撥以撥輪夫輪圓轉易行何待撥悼公之母死哀公為之齊衰有若曰為妾齊衰禮與公曰吾得已乎哉魯人以妻我齊音咨衰七回反為于偽反與音餘正義鄭氏康成曰悼公母哀公之妾妾之貴者為之緦有若譏而問之哀公言國人皆名之為我妻重服嬖妾文過非也孔氏穎達曰此論哀公為妾著服非禮之事天子諸侯絶旁期於妾無服唯大夫貴妾緦哀公文過謂魯人以我無夫人皆以為我妻不得不服也秦氏繼宗曰哀公欲以尊寵其所愛而不虞卑其身與辱其宗廟及有若譏之猶為此文過之辭則其失國非不幸也季子皋葬其妻犯人之禾申祥以告曰請庚之子皋曰孟氏不以是罪予朋友不以是棄予以吾為邑長於斯也買道而葬後難繼也庚古衡反長竹丈反正義鄭氏康成曰季子皋孔子弟子髙柴孟氏成邑宰或氏季孔疏以字為氏若子游稱叔氏子路稱季路犯躐也申祥子張子庚償也孔氏穎達曰髙柴字子皋論語作子羔古字通用子皋見申祥請償故拒之云孟氏不以是犯禾之事罪責於我朋友不以是犯禾之事離棄於我以其小失非大故也斯此也以吾為邑長於此成邑乃買道而葬清儉大過難續也通論秦氏繼宗曰買道則沽名後必難繼鄭造漸臺百姓怨之子産執扑而督工亦是此意存異鄭氏康成曰皋恃寵虐民非也孔氏穎達曰此論髙柴非禮之事方氏慤曰子皋所謂順非而澤也辨正劉氏曰觀家語所稱及此經所記泣血三年及成人為衰之事賢可知矣葬妻犯禾亦為成宰時事有無固不可知然犯禾之失小而買道之害大此亦愚而過慮之一端然出於誠心非文飾也鄭方之説過矣案為政在大體不在小惠若一犯禾而必償之是煦煦之仁也且使民將責償於君亦傷忠敬之俗子皋此語深達大體亦先王以道立民之意葢晚而見道非復前此質美未學矣觀子路治蒲壺漿施徳夫子責之孔子之馬傷禾使子貢辭焉亦不償也可見申祥請庚之陋仕而未有禄者君有饋焉曰獻使焉曰寡君違而君薨弗為服也饋其位反使色吏反正義鄭氏康成曰違去也以其恩輕也孔氏穎達曰違謂三諫不從以禮去者若已有禄雖去仕他國而所仕者敵則猶反服今此未得禄之臣惟在朝時乃服若放出他國而故君薨所仕雖敵亦不反服也陳氏祥道曰孟子曰湯之於伊尹學焉而後臣之桓公之於管仲學焉而後臣之方其學焉則賓之而弗臣此所謂仕而未有禄者也賓之而弗臣故有饋焉不曰賜而曰獻其將命之使不曰君而曰寡君若子思之仕魯孟子之仕齊是也違而君薨弗服則在國而君薨為之服矣通論李氏格非曰廩人繼粟庖人繼肉不以官定食所謂仕而未有禄者也賓之故有獻而無賜不臣故有聘而無召葢不如是不足以有為也故玉府之職曰掌王之獻玉是王有獻賢之禮也酒誥曰爾事服休服采諸侯之於賢猶不可以不事況得而臣之乎存疑鄭氏康成曰見在臣位與有禄同也君有饋有饋於君也孔氏頴達曰臣雖仕未得禄而有物饋君及出使他國所稱則並與得禄者同也虞而立尸有几筵卒哭而諱生事畢而鬼事始已既卒哭宰夫執木鐸以命於宫曰舍故而諱新自寢門至於庫門鐸大各反舍音捨正義鄭氏康成曰諱辟其名也鬼事始謂不復饋食於下室而鬼神祭之孔疏下室謂内寢生時飲食有事處也未葬以脯醢奠于殯又於下室饋設黍稷謝慈云下室之饋器物几杖如平生皇氏謂虞則不復饋食下室於理有疑卒哭之時乃不復饋食於下室也已語辭也舍謂髙祖之父當遷者也庫門宫外門百官所在明堂位曰庫門天子皋門孔氏穎達曰此論葬後當以鬼神事之禮未葬猶生事之故未有尸既葬親形已藏故立尸以繫孝子之心未葬殯宫雖有脯醢之奠不立几筵大斂之奠但有席而已亦無几也至虞祭更立筵與几相配故士虞禮云祝免澡葛絰帶布席於室中東面右几是也此謂士大夫禮若天子諸侯則葬前有几故周禮司几筵云喪事素几鄭注謂殯奠時也既虞卒哭則生事畢鬼神之事方為始也既執木鐸以命宫中又出宫從寢門至於庫門寢門路門庫門魯之外門也百官及宗廟所在之次咸使知之也魯三門故至庫門耳若天子則至皋門也凡諸侯則皋應路案諸侯三門庫雉路無皋應陳氏澔曰周禮大喪小喪宰夫掌其戒令故卒哭後使宰夫執金口木舌之鐸振之以命令於宫也其令之辭曰舍故而諱新諱多則難避故使之舍舊諱而諱新死者之名也以其親盡故可不諱存疑鄭氏康成曰易説曰易之帝乙為成湯書之帝乙六世王孔疏湯六世孫名祖乙酒誥帝乙則紂父天之錫命疏可同名案鄭據緯謂至六世則孫可與祖同名故不必諱不知湯名履祖乙名滕小乙名斂武乙名瞿紂父帝乙名羨其甲乙皆以生日為字非名也二名不偏諱夫子之母名徵在言在不稱徵言徵不稱在正義鄭氏康成曰稱舉也雜記曰妻之諱不舉諸其側孔氏穎達曰此論不偏諱之事陳氏澔曰二名二字為名也此記避諱之禮方氏慤曰夫子曰不在顓臾此言在不稱徵也又曰杞不足徵此言徵不稱在也軍有憂則素服哭於庫門之外赴車不載櫜韔櫜音羔韔勅亮反正義鄭氏康成曰憂謂為敵所敗也素服者縞冠也赴謂還告於國以告喪之辭言之也孔疏左氏傳禍福稱告崩薨稱赴櫜甲衣韔弓衣兵不戢孔疏甲不以櫜戢之弓不以韔戢之示當報也陳氏澔曰甲不入櫜弓不入韔示再用也孔氏穎達曰此論軍敗當報之事方氏慤曰戰勝而還謂之凱則其敗謂之憂亦宜矣素服哭於庫門之外則以喪禮處之也必於庫門之外者以近廟門故也葢師之出也受命於祖及其無功則於祖命不能無辱矣故近廟門則哭之案廟在雉門内仲尼與于蜡賓事畢出遊于兩觀之上孔氏曰孔子出廟門往雉門是庫門與廟尚逺通論陳氏祥道曰兵法曰若師不勝取過在己周官大司馬若師不功則厭而奉主車臣之取過在己也禮記素服哭於庫門之外君之取過在己也秦穆公之敗於殽素服郊次向師而哭葢其遺禮歟必曰赴車若告喪也赴車不載櫜韔示不忘戰也有焚其先人之室則三日哭故曰新宫火亦三日哭正義鄭氏康成曰謂人燒其宗廟哭者哀精神之有虧傷火人火也孔疏左傳云人火曰火天火曰災新宫火在魯成三年孔氏頴達曰此論哀先人宗廟毁傷之事公羊傳曰新宫者何宣公之宫也李氏格非曰言新宫不言宣宫不忍言也春秋書新宫災謂天災也謂人火則不恭大矣故内火皆書災然實人火也陳氏澔曰先人之室宗廟也魯成公三年災宣公之廟神主初入故曰新宫春秋書二月甲子新宫災三日哭注云書其得禮此言故曰者謂春秋文也案公穀二傳皆謂宣主已入其哭為得禮胡傳宣主未入其哭為失禮考宣公薨已二十八月二年冬大烝已入廟公穀是也此經不見譏失禮意孔子過泰山側有婦人哭於墓者而哀夫子式而聼之使子路問之曰子之哭也壹似重有憂者而曰然昔者吾舅死於虎吾夫又死焉今吾子又死焉夫子曰何為不去也曰無苛政夫子曰小子識之苛政猛於虎也重直用反苛音何亦作荷識申志反又如字正義鄭氏康成曰夫子怪其哀甚故式而聼之而猶乃也孔疏而曰然哭畢乃荅之夫之父曰舅孔氏頴達曰此論苛政嚴于猛虎之事壹者決定之辭陳氏澔曰聞其哭式而聼之與見齊衰者雖狎必變之意同聖人敬心之所發葢有不期然而然者方氏慤曰虎之害人也人能逃之政之害人也無可逃之地此所以寧遭虎之累傷而不忍舍其政之無苛也魯人有周豐也者哀公執摯請見之而曰不可公曰我其已夫使人問焉曰有虞氏未施信於民而民信之夏后氏未施敬於民而民敬之何施而得斯於民也對曰墟墓之間未施哀於民而民哀社稷宗廟之中未施敬於民而民敬殷人作誓而民始畔周人作㑹而民始疑苟無禮義忠信誠慤之心以涖之雖固結之民其不解乎摯音志夫音符涖音利又音類解佳買反正義鄭氏康成曰摯禽摯也諸侯而用禽摯降尊就卑之義下賢也周豐曰不可辭君以尊見卑也士禮先生異爵者請見之則辭已止也重強變賢也時公與三桓始有惡懼將不安故使人問焉周豐言民見悲哀之處則悲哀見莊敬之處則莊敬非必有使之者墟毁滅無後之地也孔疏凡舊居皆曰墟故左傳有莘氏之墟有昆吾之墟皆毀滅無後者㑹謂盟也孔疏左傳有事而㑹不協而盟盟與㑹别此以下云而民始疑司盟云邦國有疑則盟詛之故以㑹為盟也盟誓所以結衆以信其後外恃衆而信不由中則民畔疑之孔子曰其身正不令而行其身不正雖令不從涖臨也孔氏頴達曰此論君之臨臣民當以禮義忠信為本之事哀公言虞夏施何政敎而得如此敬信於民豐言民之從君在君身所行不在言也若身之不行言亦無益故殷周作誓作㑹而民始疑畔苟誠也人君之身誠無禮義忠信誠實質慤之心以臨化之雖以言辭誓令堅固結之民其不解散離貳乎周豐此言欲哀公身行誠信而已通論孔氏穎達曰尚書夏啟作甘誓左傳云夏啟有塗山之㑹又禹㑹塗山而此言殷周者據身無誠信徒作盟誓而民始離畔者耳非謂殷周作誓㑹也若啟作甘誓禹㑹塗山皆身有誠信於事善也又穀梁傳云誥誓不及五帝盟詛不及三王者五帝三王身行徳義不專用誥誓盟詛故云不及與此不同陳氏祥道曰誓生於不信㑹生於不敬不信而誓之使信則民始畔不敬而㑹之使敬則民始疑馬氏睎孟曰先王之制法事為之制曲為之防有不聼者可以棄矣而猶有誓以致其戒故大司徒之制曰以誓敎恤則民不怠有犯命者可以刑矣而猶有盟以聼其政故司盟曰盟萬民犯命詛不信者是以殷周盛時以禮義道民其民始於無犯非禮而終於無思犯禮以忠信遇民其民始於不敢欺而終於不忍欺盟誓之助於敎豈小補哉及其末也無善政以使之逺刑罰而徒作誓故曰民始畔無徳敎以使之畏鬼神而徒作㑹故曰民始疑葢誓之以禮義盟之以忠信末也不脩其本而一之於末民其有不解乎案民畔民疑當指殷周末季言若二代盛時正所謂以禮義忠信誠慤之心涖之者何以有此喪不慮居毁不危身喪不慮居為無廟也毁不危身為無後也為于偽反正義鄭氏康成曰危身謂憔悴將滅性方氏慤曰君子將營宫室宗廟為先居室為後毁而死君子謂之無子黄氏震曰不慮居謂以廟為慮不以居室為慮不危身謂恐親之無後不敢以死傷生毁不滅性也秦氏繼宗曰慮居者愚不肖之不及危身者賢智之過禮貴得中也存疑鄭氏康成曰慮居謂賣舍宅以奉喪案鄭注以慮居為賣宅舍未是古者五畝之宅受之於君非己所得賣也或曰慮居謂謀寢處之安延陵季子適齊於其反也其長子死葬於嬴博之間孔子曰延陵季子吳之習於禮者也往而觀其葬焉其坎深不至於泉其歛以時服既葬而封廣輪揜坎其髙可隱也既封左袒右還其封且號者三曰骨肉歸復於土命也若魂氣則無不之也無不之也而遂行孔子曰延陵季子之於禮也其合矣乎長竹丈反嬴音盈深式鴆反廣古曠反揜又作掩于檢反隱於忍反號户髙反正義鄭氏康成曰季子名札魯昭二十七年呉公子札聘于上國是也季子讓國居延陵因號焉孔疏延陵一名延州來傳杜預左傳注季子本封延陵後復封州來案左楚子狩于州來以懼呉則延陵非州來嬴博齊地今泰山縣是也孔子往弔之坎不至泉以生恕死也孔疏以生時不欲近泉故死亦不至於泉以生時之意以恕於死者歛以行時之服不改制節也孔疏歛服不更制造是其節也輪從也隱據也封可手據謂髙四尺所示節也孔疏人長八尺低而據之半為四尺所所是不定之辭右還還圍也號哭且言也命猶性也行去也孔氏穎逹曰此論仲尼言季子葬子得禮之事案鄭注覲禮云凡以禮事者左袒若請罪待刑則右袒喪禮直云袒不云左右今季子長子之喪而左袒者達死生之命以自寛慰也左袒訖乃右而圍繞其封繞墳三匝號哭且言曰骨肉歸復於土乃自然之性若魂氣則無不之適再言之者愍傷離訣之意方氏慤曰坎不至泉不至太深歛以時服不至太厚廣輪揜坎不至太大其髙可隱不至太髙左為陽故袒之變吉右為隂故還焉以示凶骨肉為隂則降而聚故言歸復於土魂氣為陽則升而散故言無不之孔子始言習聞其學禮而已終見其能行禮焉故曰合也陳氏澔曰横曰廣直曰輪骨肉歸復於土為命者此精氣為物之有盡魂氣則無不之者此游魂為變之無方不惟適旅葬之節而又且通幽明之故宜夫子之善之也然為疑辭而不為決辭者葢季子乃隨時處中之道稱其有無而不盡拘乎禮者也辨正呉氏澄曰人之骨肉資坤而成既生之後漸漸長大及其死也歸而藏焉復反於土漸漸朽腐與土為一若其魂氣資乾而始死則游散混於天氣之中無所不之也季子其時奉君命出使而有私喪不敢將其尸柩以歸只得葬於齊地故言死而骨肉歸土乃天命之常人情縱有繫戀不容不葬之土中父子一體死者葬齊生者還呉兩相離訣永不親近深可愍傷然其魂氣則無不之父子一氣能相感通父在於呉則子之魂氣亦在於呉實不疏逺也聊以自寛慰耳右還其封且號者三八字為句是記圍繞之匝數非記其號哭之聲數也季子於子之喪自初死至葬時甚促亦經旬日初死之時哭必盡哀又有再哭三哭朝哭夕哭其哭不止一次矣非但有此既葬還封之一哭也惡得以此而議其哀之不足哉邾婁考公之喪徐君使容居來弔含曰寡君使容居坐含進侯玉其使容居以含有司曰諸侯之來辱敝邑者易則易于則于易于雜者未之有也容居對曰容居聞之事君不敢忘其君亦不敢遺其祖昔我先君駒王西討濟於河無所不用斯言也容居魯人也不敢忘其祖婁力俱反含胡闇反易以豉反正義鄭氏康成曰考公隱公益之曽孫考或為定弔含弔且含也容居欲親含非也含不使賤者君行則親含大夫歸含耳孔疏上曹桓公卒于㑹諸侯請含是親含也雜記諸侯之喪使人弔含贈襚是歸含也言侯玉者時徐僭稱王自比天子使大夫敵諸侯有司拒之易謂臣禮于謂君禮孔疏臣來則行臣簡易之禮君來則行君廣大之禮雜者容居以臣欲行君禮也容居言我祖與今君於諸侯初如是孔疏言我祖駒王與今日徐君稱謂于諸侯自初以來如是稱王非始今日不聞義則服駒王徐先君僭號容居其子孫也濟渡也西討渡河廣大其國魯魯鈍也言魯鈍者自明不妄孔氏穎達曰此論徐國僭禮之事容居致其君命云寡君使容居親坐行含進侯玉於邾君此是使致詞也其使容居以含者此是記人録語案錄謂錄容居所自言凡行含禮未歛之前以玉實口士則主人親含大夫以上則使人含若既歛已後至殯葬其有含者親自致璧於柩及殯上者謂之親含若但致命以璧授主人主人受之謂之不親含徐自比於大子以邾君為己之諸侯言進侯氏以玉故云進侯玉又言我從先君駒王以來於諸侯無不稱王我若是曉利之人或妄稱先祖之善自言魯鈍朴實不解虚詐惟知不敢忘其祖也王氏曰坐當訓跪陳氏澔曰容居言事君者不敢忘其君我奉命如此今不能行是忘吾君也為人子孫當守先世之訓故亦不敢遺吾祖也居葢徐之公族耳且言昔者我之先君駒王濟河而西討無一處不用此稱王之言自言其疆土廣大久已行王者之禮也又自言我非譎詐者乃魯鈍之人是以不敢忘吾祖欲邾人之信其言也此著徐國君臣之僭且明邾有司不能終正當時之僭也案鄭注考或為定以考公在春秋後春秋魯昭公三十年呉滅徐徐子章羽奔楚楚沈尹戌帥師救徐弗及遂城夷使徐子處之久失國而為寓公尚能行王禮於諸侯乎定公在魯文宣時或有此耳孔氏謂春秋後徐復興强大稱王無據子思之母死於衞赴於子思子思哭於廟門人至曰庶氏之母死何為哭於孔氏之廟乎子思曰吾過矣吾過矣遂哭於他室正義鄭氏康成曰子思之母嫁母也門人弟子也嫁母與廟絶族方氏慤曰他室異室也以有别於正故謂之他以義起之而已陳氏澔曰伯魚卒其妻嫁於衞之庶氏嫁母與廟絶族故不得哭之於廟存疑鄭氏康成曰子思之母姓庶氏辨正王氏安石曰似嫁庶氏而鄭云母姓氏非也案伯魚年五十而卒其妻猶改適乎此等事恐屬傳聞天子崩三日祝先服五日官長服七日國中男女服三月天下服虞人致百祀之木可以為棺槨者斬之不至者廢其祀刎其人祝之六反刎勿粉反正義鄭氏康成曰祝佐含歛故先服官長大夫士也國中男女庶人也天下服諸侯之大夫也虞人掌山澤之官百祀畿内百縣之祀也為棺槨作棺槨也斬伐也崔氏靈恩曰此據朝廷之士四制則邑宰之士也孔氏穎達曰此論天子崩尊卑服杖及葬僃槨材之事祝謂大祝商祝也服服杖也祝先服故先杖子亦三日而杖大夫士服在祝後故五日亦服杖也庶人謂畿内民及庶人在官者服謂齊衰三月必待七日者殯後嗣王成服故民得成服也諸侯之大夫為王繐衰既葬而除之近者不待三月今據逺者為言耳然四條皆云服何以知其或杖或衰案喪大記云君之喪三日大子夫人杖五日既殯授大夫世婦杖喪服四制三日授子杖五日授大夫杖則知三日五日是服杖明矣其七日及三月者惟服而已無杖百祀者王畿内諸臣采地之祀也既殯旬而布材故虞人斬百祀之木可以為周棺之槨者送之也方氏慤曰喪人之冠帶衣裳杖屨通謂之服此所謂服特指杖爾夫杖所以扶病也祝先服者力勞而先病故也言祝先服則子可知官長對祝言則力有勞逸對子言則恩有重輕故五日而後服杖也七日國中男女服三月天下服言各服其所服之服非謂杖矣葢不特以恩有重輕故服有先後亦以地有逺近而聞訃有早晚故也刎亦剄也自吻下刑之故也呉氏澄曰廢其祀刎其人葢設此辭而令之以見王喪尤重於神祀也如誓師而曰無敢不供汝則有大刑是也非果必廢之刎之也葢祀木者神祇所主豈可斬伐惟為天子采槨木則雖祀木亦斬無或敢占吝者若或占吝不以其木至是不供王喪為大不敬故設廢祀刎人之辭使人不敢慢令也陳氏澔曰禮制若此未詳其説一云必命虞人致木不用命者然後國有常刑虞人非一未必盡命之也案士喪禮三日成服杖則服與杖同日也祝官長國中天下有有服有杖者有有服無杖者故記第以服言之葢言杖不足以槩國中天下言服則四者皆在其中也舊説未發明此義故説禮者多非之要之其義本不可易也辨正黄氏震曰天子棺槨未必待逺取諸百祀不至豈神之罪而廢其祀雖人之罪亦何至於死苟其行此民將不勝擾豈所謂死無害於人者耶齊大饑黔敖為食於路以待餓者而食之有餓者蒙袂輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視之曰予惟不食嗟來之食以至於斯也從而謝焉終不食而死曽子聞之曰微與其嗟也可去其謝也可食饑居宜反黔其廉反而食音嗣下奉食同􅃑彌世反輯側立反貿亡救反又音茂又音牟奉芳勇反與音餘正義鄭氏康成曰蒙袂不欲見人也輯斂也斂屨力憊不能屨也貿貿目不明之貌嗟來食雖閔而呼之非敬辭從猶就也孔氏穎達曰此論餓者狂狷之事餓者聞黔敖嗟已無敬己之心於是發怒揚舉其目而視之曰予惟不食嗟來無禮之食以至於此困病曽子言初時無禮之嗟也可怒之而去其終有禮之謝也可返迴而食方氏慤曰饑主歳言之餓主人言之呉氏澄曰曾子之言君子之中餓者之操賢者之過也陳氏澔曰微與猶言細故末節謂嗟來之言雖不敬然亦非大過故其嗟雖可去而謝焉則可食矣存疑鄭氏康成曰微猶無也無與止其狂狷之辭姚氏舜牧曰凡人所重者生死也而要準於道義就食本為生也而彼其嗟來則可以無生不可以失節不食嗟來本以重節也而彼既致謝則又不可以輕生此其間道理極微故曽子曰微與其嗟也則可去耳一致謝則可以復食矣惜其人未識此而終守小諒焉以致死也邾婁定公之時有弑其父者有司以告公瞿然失席曰是寡人之罪也曰寡人嘗學斷斯獄矣臣弑君凡在官者殺無赦子弑父凡在宫者殺無赦殺其人壞其室洿其宫而豬焉葢君踰月而后舉爵弑式志反瞿紀具反斷丁亂反殺如字壞音怪洿音烏豬音誅正義鄭氏康成曰定公貜且也魯文十四年即位民之無禮不敎之罪故曰寡人之罪也弑君弑父其罪無赦諸臣子孫孔疏案子孫當指族姓之卑幼在子孫行者皆得殺之孔疏臣之弑君凡在官之人無問貴賤皆得殺此弑君之人子之弑父凡在宫者無問尊卑皆得殺此弑父之人壞其室洿其宫而豬明其大逆不欲使人復處之豬都也南方謂都為豬孔疏都聚也掘洿其宫使水聚積踰月舉爵自貶損也孔氏穎達曰此論誅弑父之事陳氏澔曰瞿然驚怪之貌天下之惡無大於此者是以人皆得以誅之無赦之之理君不舉爵以人倫大變亦敎化不明所致故傷悼而自貶耳通論彭氏汝礪曰春秋之法亂臣賊子人人得而討之不必皆士師也故隱四年書衞人殺州吁于濮公羊傳曰其稱人何討賊之辭何休注曰明國中人人得討之存異陸氏佃曰凡在官者殺無赦謂弑君者同一官府亦坐焉爾弑父放此鄭氏謂弑父者凡在宫子孫皆得殺之是父子兄弟相殺終無已時也辨正呉氏澄曰凡在官凡在宫謂被弑者之羣臣子孫非謂行弑者之羣臣子孫也無赦謂毋令縱逸也宋萬弑閔公縱令出奔陳君子以為宋無臣子也陸農師謂同一官府之人亦坐弑君之罪若不知謀而一府一宫之人皆連坐不亦濫乎晉獻文子成室晉大夫發焉張老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國族於斯文子曰武也得歌於斯哭於斯聚國族於斯是全要領以從先大夫於九京也北面再拜稽首君子謂之善頌善禱奐音喚亦作煥要一遙反京音原禱丁老反正義鄭氏康成曰文子趙武也作室成晉君獻之謂賀也胡氏銓曰君於臣不當言獻恐趙武諡獻文皆案春秋時無二諡本文原無君字第當云人往賀諸大夫亦往耳諸大夫亦發禮以往輪輪囷言髙大奐言衆多歌於斯哭於斯聚國族於斯言祭祀死喪燕㑹於此足矣欲防其後復為此張老心譏其奢也全要領者免於刑誅也晉卿大夫之墓地在九原京葢字之誤當為原孔疏爾雅絶髙曰京廣平曰原京非葬處案詩于胥斯原乃覯于京同一地也則言其髙曰京言其平廣則曰原耳善頌謂張老之言善禱謂文子之言禱求也孔氏頴達曰此論文子成室相頌禱之事張老心譏文子宫室飾麗故佯為美之歌謂祭祀奏樂哭謂居喪哭泣聚國族謂燕聚國賓及㑹宗族也始終永足切勿更造作文子覺譏故稽首謝過受諫也北面在堂禮故鄉飲酒賓主皆北面領頸也古者罪重要斬罪輕剄刑先大夫謂文子父祖以其世為大夫故稱父祖為先大夫也案墓大夫云令國民族葬注云族葬各從其親是卿大夫墓地同在一處秦氏繼宗曰張老之言善於頌文子所荅善於禱也古人達生知命善始要終故頌禱之言切實如此通論方氏慤曰發謂以禮落成之也若楚子成章華之臺願與諸侯落之是矣葢發與落皆有始意仲尼之畜狗死使子貢埋之曰吾聞之也敝帷不棄為埋馬也敝葢不棄為埋狗也丘也貧無葢於其封也亦予之席毋使其首陷焉路馬死埋之以帷畜許六反又許又反為于偽反埋亡皆反封依注作窆正義鄭氏康成曰畜狗馴守封當為窆陷謂沒於土路馬君所乘者其他狗馬不能以帷葢方氏慤曰家語言仲尼將行雨而無葢則貧而無葢可知陷謂沒於土特以首為言者以衆體之所貴也路馬死埋之以帷故魯昭公乘馬塹而死乃以帷裹之葉氏夢得曰帷葢近於身以為障蔽者犬馬畜於家以為代禦者障蔽者敝不敢棄而代禦者死用以埋之所謂仁之至義之盡也陳氏澔曰狗馬皆有力於人故特示恩君之乘馬死則特以帷埋之不用敝帷也案家語末句亦孔子語或曰以其類附記之季孫之母死哀公弔焉曾子與子貢弔焉閽人為君在弗内也曾子與子貢入於其廏而脩容焉子貢先入閽人曰鄉者已告矣曾子後入閽人辟之涉内霤卿大夫皆辟位公降一等而揖之君子言之曰盡飾之道斯其行者逺矣閽音昏為去聲内音訥廏久又反鄉許亮反辟音避􅋼力又反正義鄭氏康成曰閽人守門者脩容更莊飾也子貢先入閽人既不敢止以言下之故曰鄉者已告矣閽人見兩賢相隨彌益恭故辟之也公降等揖禮之也孔氏頴逹曰案喪大記君臨大夫之喪君即位於序端卿大夫即位於堂廉楹西北面東上所謂辟位者葢少西逡巡而東面不當北面之位也然君在大夫不得私為二子辟位或是公始入升堂之後卿大夫猶在庭中北面辟位者謂辟中庭少近東耳陳氏澔曰鄉者已告言先已告於主人矣内􅋼門屋後簷也行者逺猶言感動之大也存疑孔氏穎達曰二子初時不具衣服則閽人拒之二子退而脩容閽人雖愚猶知敬畏二子渉至内􅋼卿大夫皆逡巡辟位公於堂上降階一等揖而禮之君子遂美之云凡人盡其容飾行之可長逺矣辨正彭氏汝礪曰此段恐記者之過弔有一定之容服若曰脩容則其初二子乃不脩容乎姚氏舜牧曰二子弔於季孫適值君在自當待命而入斯時致肅敬比致弔有加亦臣禮合如此第當時俗人不知者謂為脩容其君子亦當時之號為君子者非知禮之君子也案士喪禮君視歛出主人拜送襲拜大夫之後至者賈疏以後至為不得與前卿大夫同時從君入者則君弔時後至者自不得入安有脩容而入之事此記者傳聞傅㑹説也陽門之介夫死司城子罕入而哭之哀晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民説殆不可伐也孔子聞之曰善哉覘國乎詩云凡民有喪扶服救之雖微晉而已天下其孰能當之罕呼旱反覘勅廉反説音悦扶服並如字又扶音蒲服蒲北反又作匍匐音同當丁郎反正義鄭氏康成曰陽門宋國門名介夫甲衞士宋以武公諱司空為司城子罕戴公子樂甫衎之後樂喜也孔疏世本戴公生樂甫衎衎生石甫願繹繹生夷甫傾傾生東鄉克克生西鄉士曹曹生子罕喜覘窺視也孔子善覘國者之知微也救猶助也微猶非也孔氏穎達曰此論善覘國之事民心皆喜悦若有人伐民必致死故云殆不可伐詩邶谷風之篇言雖非晉之强天下更有强於晉者誰能當之陳氏澔曰孔子善之以其識治體也扶服致力之義孰能當之甚言人心之足恃也通論陳氏祥道曰呉起吮一人之疽而鄰敵莫抗段熲裹一人之瘡而西羌頓平然則司城子罕哭一介夫而民説其可伺隙抵巇而伐之哉覘者所以知微也案哀不哀有節焉子罕身為大臣一介夫死而哭之哀凡處尊親僚友之喪將何以加之違禮矯情以干國人之説臣之姦者為之賢者必不爾子罕賢者也覘國云云亦非夫子之言案子罕與向戌同時向戌往來晉楚成弭兵之盟而晉宋尤睦晉何事欲伐宋乎覘宋之説妄矣宋皇國父為平公築臺妨於農收子罕諫不聽築者謳曰澤門之皙實興我役邑中之黔實慰我心子罕面黑故云爾於是子罕親執扑以抶其人而謳者止焉人問其故子罕曰宋國區區而有詛有祝禍之本也其正直知大體如是觀此一事介夫之誣可不辨而雪也魯莊公之喪既葬而絰不入庫門士大夫既卒哭麻不入正義鄭氏康成曰閔公吉服不與虞卒哭羣臣畢虞卒哭亦除喪也麻猶絰也孔氏穎達曰此論禮變所由也莊公閔公父也莊公薨太子般即位慶父賊子般於黨氏閔公年八嵗絰葛絰也諸侯弁絰葛而葬魯有三門庫雉路庫門最在外以從外來故至庫門去絰絰不入衰亦不入可知君身絰用葛士大夫絰用麻亦不入庫門彭氏汝礪曰國亂臣强遂使君臣之間不敢盡禮如此陳氏澔曰記禍亂恐迫禮所由廢通論方氏慤曰君以葬為節臣以卒哭為節者君先除而後臣敢除也此皆不能三年失禮之甚呉氏澄曰莊公薨歴十一月始葬時閔公幼弱莊夫人外淫慶父謀簒立不君生君因亦不天死君故不令閔公服父喪三年至閔二年五月距莊公之薨二十二月遽行吉禘後年八月慶父弑閔公矣存疑鄭氏康成曰時子般弑慶父作亂閔公不敢居喪葬已吉服而反正君臣欲以防遏之微弱之至也孔氏穎達曰閔公既葬須即位正君臣故既葬而除羣臣須行虞卒哭之祭故卒哭乃除之案閔公止八歳其絰不入慶父使之也閔公何知即位以正君臣而防遏慶父哉孔子之故人曰原壤其母死夫子助之沐槨原壤登木曰久矣予之不託於音也歌曰貍首之斑然執女手之卷然夫子為弗聞也者而過之從者曰子未可以已乎夫子曰丘聞之親者毋失其為親也故者毋失其為故也壤如丈反貍力知反女如字又音汝卷音權又作拳從才用反正義鄭氏康成曰沐治也木槨材也託寄也謂叩木以作音為弗聞也而過之佯不知也已猶止也孔氏穎達曰此論孔子無大故不遺故舊之事原壤謂吾遭母喪以來日月久矣不得託寄此木以為音聲於是叩木作音而歌非禮之甚從者見其無禮止夫子不須為治槨夫子謂朋友無大故不相遺棄丘聞之與骨肉親者雖有非禮無失其為親之道尚得與之和睦故舊者雖有非禮無失其為故之道尚得往來何以絶之劉氏曰貍首之斑言木文之華執女手之卷言沐槨之滑膩葉氏夢得曰方周之末世有妻死鼓盆而歌自以為達如莊周者友死臨尸而歌自以為禮如子皮琴張者葢將以矯世未必出其誠心然如此則人道且絶豈止違禮已哉存疑鄭氏康成曰斑然卷然悅人辭也孔氏穎達曰歌言槨材文采似貍之首夫子手執斤斧如女手拳然柔弱以此歡悦仲尼陸氏佃曰此其貍首之詩歟所謂大小莫處御於君所其詩中間之詞歟執女手之卷然葢上之所以接下御於君所葢下之所以事上辨正呉氏澄曰葢古歌詞而壤歌之耳非當時自作此歌也孔疏紕繆又與曽孫侯氏詩體製各異陸氏合為一篇亦非案晉阮籍母卒飲酒一號嘔血哀毁骨立時稱為死孝想原壤亦是此種故為放誕而至性却過人夫子平日與之遊母死又助之沐槨其情義非淺登木一歌殊出意外夫子若為弗聞於此見覆載生成氣象然未到聖人此等人且須逺之恐厭惡禮法四字浸淫及我使喪所守趙文子與叔譽觀乎九原文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎文子曰行幷植於晉國不沒其身其知不足稱也其舅犯乎文子曰見利不顧其君其仁不足稱也我則隨武子乎利其君不忘其身謀其身不遺其友晉人謂文子知人文子其中退然如不勝衣其言呐呐然如不出諸其口所舉於晉國管庫之士七十有餘家生不交利死不屬其子焉譽音預父音甫行如字又下孟反并必正反植直吏反又時力反知音智退依注作妥他果反勝音升呐如悦反又奴劣反屬音燭正義鄭氏康成曰叔譽叔向也孔疏案叔譽之為叔向春秋傳無考鄭注據韓詩外傳言之此案肸嚮蟲相應聲左傳嚮省為向而又嚮譌為譽也晉羊舌大夫之孫名肸孔疏羊舌邑名羊舌大夫生職職生肸妻案列女傳鄰有攘羊者以首餉之大夫受而埋之後攘羊事敗及大夫則舌尚在人因號之羊舌大夫作起也陽處父襄公之太傅并專也孔疏并他事為己有是專權之事謂剛而專已為狐射姑所殺孔疏左傳文公六年晉蒐於夷使狐射姑將中軍趙盾佐之陽處父至改蒐於董易其班射姑使人殺處父沒終也植或為特舅犯久與文公辟難至將反國無安君之心及河授璧詐請亡要君以利是也孔疏左傳僖公二十四年重耳反國及河干犯請亡武子士㑹也食邑於隨范字季晉人謂文子知人葢見其所善於前則知其來所舉也中身也鄉射記曰弓二寸以為侯中退柔和貌退或為妥呐呐舒小貌管庫之士府史以下官長所置也舉之於君以為大夫士也孔疏家是士大夫之總稱管鍵也孔疏别言之則鍵是鎖須管是鑰匙散文則一庫物所藏生不交利廉也死不屬其子潔也孔氏穎達曰此論趙文子知人之事文子謂先世大夫死者甚衆假令生而可作起吾於衆大夫誰可以與歸也凡人利君者多性行偏特不顧其身謀身者多遺棄故舊武子徳行𢎞廣内外周僃故左傳云夫子之家事治言於晉國無隐情無隠情則利君也家事治則不忘其身也文子退然柔和如不勝衣言形貌卑退也其𤼵言舒小呐呐如不出諸口謂言語卑下也方氏慤曰退言其弱也進為强退為弱如不勝衣則其弱可知矣管庫之士葢守藏之吏也陳氏祥道曰太剛則易屈太植則易折植者剛直而自立者也處父并為之其智不足稱矣懷利者有己懷仁者有君舅犯見利而不顧君其仁不足稱矣隨武子則利其君仁也不忘其身與謀其身智也不遺其友義也陳氏澔曰管庫之士賤職也知其賢而舉之即不遺友之實雖有舉用之恩於其人而生則不與之交利將死亦不以其子屬託之廉潔之至秦氏繼宗曰管庫之士舉一以類其餘承上文知人而言文子身雖謙退言雖遲鈍而實有知人之明得大臣舉賢授能之體且無市恩之意於所舉之人㢘潔之至也通論呉氏澄曰士㑹在秦不見先蔑正是謀身不遺友之一事葢晉使先蔑士㑹迎公子雍於秦既而背之儻士㑹數見先蔑似若有謀秦必生疑於身於友俱有禍害故在秦不見之及士㑹還晉若見先蔑秦必疑先蔑與知士㑹逃歸之情亦將累及先蔑故還晉亦不見之葢惟恐因己之見使秦疑先蔑而後受禍害也幷植二字未詳姑從鄭注并猶專也如子路之兼人植謂剛直挺立如木之植國語作㢘直疑并葢廉字缺損植葢直字増多也餘論陳氏祥道曰君子之尚友以一鄉為未足則友一國以一國為未足則友天下以天下為未足則尚論古之人此文子叔譽所以論死者之可作存疑孔氏頴達曰不屬其子謂不屬其子於君及朝廷也案孔説太逺與生不交利語不稱叔仲皮學子柳叔仲皮死其妻魯人也衣衰而繆絰叔仲衍以告請繐衰而環絰曰昔者吾喪姑姊妹亦如斯末吾禁也退使其妻繐衰而環絰學户敎反衣依注作齋音咨衰七雷反繆依注作樛居糾反衍以善反繐音歳喪如字末莫曷反正義鄭氏康成曰叔仲皮魯叔孫氏之族孔疏僖叔牙生武仲休休生惠伯彭彭生皮為叔仲氏學敎也子柳仲皮之子衣衰而繆絰衣當為齋繆讀為不樛垂之樛士妻為舅姑之服也孔疏知為士者以叔仲為氏則非庶人經傳無文則非卿大夫也言其妻雖魯鈍其於禮勝學叔仲衍葢皮之弟告子柳言此非也繐衰小功之縷而四升半之衰環絰弔服之絰時婦人好輕細而多服此者衍既不知禮之本子柳亦以為然而請於衍使其妻為舅服繐衰而環絰衍荅子柳言姑姊妹在室齊衰與婦為舅姑同末無也言無禁我欲其言行也婦以諸侯之大夫為天子之衰弔服之絰服其舅非也孔氏穎達曰此論子柳失禮之事叔仲皮敎訓其子子柳受父敎而不知禮叔仲皮死子柳之妻雖魯鈍猶知為舅姑身著齊衰首服繆絰謂兩股相交也五服之絰皆然惟弔服環絰不繆耳衍子柳之叔見當時婦人好尚輕細告子柳汝妻何以著非禮之服子柳亦以妻非禮遂請於衍欲令其妻身著繐衰首服環絰衍荅子柳云吾喪姑姊妹亦如斯謂如此繐衰環絰無人於吾而相禁者子柳得衍言乃退使其妻著繐衰而環絰子柳不肻粥庶弟之母非是下愚而不知其非禮明當時皆著輕細者也案或謂昔者以下語意似即請者之辭葢衍告子柳以齊衰之服因請改齊為繐而因自以昔者証之其説較為直截或謂皮衍柳俱叔仲彭生子鄭以子柳為皮子誤並存疑成人有其兄死而不為衰者聞子皋將為成宰遂為衰成人曰􅁞則績而蟹有匡范則冠而蟬有緌兄則死而子皋為之衰成或作鄭音丞蠶七南反蟹户買反緌耳隹反正義鄭氏康成曰嗤兄死者言其衰之不為兄死如蟹有匡不為􅅙之績蟬有緌不為范之冠也范蜂也孔疏蜂頭上有物似冠蟬蜩也緌謂蜩喙長在腹下孔疏似冠之緌孔氏穎達曰此論成人無禮之事成孟氏所食采地即前犯禾之邑也此邑中民有兄死而弟不為兄制服者聞子皋至孝來為成宰恐其罪己乃制衰服故成人譏之言此服是子皋為之非為兄施也朱氏申曰􅁝之績者必由乎匡之所盛然蟹之有匡非為蠺之績也為背而已首之冠者必資乎緌之所飾然蟬之有緌非為范之冠也為喙而已兄死者必為之服衰然成人之服衰非為兄之死也為子皋而已葢以上二句喻下句也通論應氏鏞曰仲尼相而無飲羊縱妻之民楊綰相而有減騶省樂之效風化之機繫於人焉耳蠶績范冠之謠雖以戲夫民之為服者未必出於誠心實以喜子皋之孝足以感不友不悌之俗故周公之告康叔不以弟之大不克恭者為怒而以克敬典者為急分正東郊之責亦以孝友之君陳感悟之其機固不在多也樂正子春之母死五日而不食曰吾悔之自吾母而不得吾情吾惡乎用吾情惡音烏正義鄭氏康成曰子春曽子弟子勉强過禮惡乎猶於何也孔氏穎達曰此論孝子遭喪過哀之事禮不食三日子春悔不以實情勉强至五日言自吾母死而不得吾之實情而勉强為之更於何處用吾之實情乎存疑黄氏敏求曰曾子喪親不食七日故子春心慕師道執親之喪五日而後食既而告人曰吾母之喪不盡得吾哀痛之情以報其罔極之恩更於何處盡用吾哀痛之情乎乃悔不及七日之謂也記者載之以旌孝行陸氏佃曰曽子水漿不入口者七日而不以為悔非勉强故也歳旱穆公召縣子而問然曰天久不雨吾欲暴尩而奚若曰天則不雨而暴人之疾子虐毋乃不可與然則吾欲暴巫而奚若曰天則不雨而望之愚婦人於以求之毋乃已疏乎徙市則奚若曰天子崩巷市七日諸侯薨巷市三日為之徙市不亦可乎旱音汗縣音懸暴步卜反尩烏光反與音餘徙音死為于偽反可乎可或作善正義鄭氏康成曰然之言焉也凡穆或作繆奚若何如也暴尩覬天哀而雨之錮疾人之所哀暴之是虐也巫主接神亦覬天哀而雨之已猶甚也春秋傳説巫曰在女曰巫在男曰覡周禮女巫旱暵則舞雩孔疏楚語觀射父對昭王絶地天通之問云民之精爽不攜貮者明神降之在男曰覡在女曰巫此經云愚婦人據末世之巫也徙市者庶人之喪禮今徙市是憂戚於旱若喪孔疏天子諸侯之喪庶人憂戚無復求覓財利要有急須之物不得不求故於邑里之内而為巷市今徙市若居天子諸侯之喪也孔氏穎達曰此論旱變之事陳氏澔曰尩者瘠病之人此言酷虐之事非所以感天已疏言甚迂闊也言徙市又言巷市者謂徙交易之物於巷也欲徙市行居喪之禮以自責也縣子以其求諸己而不求諸人故可其説然豈不聞僖公以大旱欲焚巫尩聞臧文仲之言而止案事見僖公二十一年縣子不能舉其説以對穆公而謂徙市為可則亦已疏矣陳氏祥道曰先王之於旱也内則責諸己外則求諸神責諸己則有成湯之事宣王之行求諸神則巫以女巫舞以皇舞祭以雩禮以牲璧責諸己者本也求諸神則以為文而已穆公不能責諸己又不知求諸神而欲暴尩與巫豈不惑哉市隂也雨隂中之陽也徙市所以助發隂中之陽與周官皇舞女巫同意姚氏舜牧曰讀雲漢之詩則知君之所以為民請命者當以誠不以文矣文尚不可而況虐尩與巫之甚者乎甚矣後世之君之昏於感格也存異鄭氏康成曰尩者面鄉天覬天哀而雨之辨正姚氏舜牧曰暴尩者暴此人於日中見其已瘠病若此之可哀祈天一見憫而降澤耳注瘠病之人其面上向云云未確案董仲舒請雨書有徙市之説葢旱屬陽而市主隂故王后主立市徙市者謂鼔動隂氣以勝陽使之致雨云耳在春秋時或已有此法故穆公問其如何不亦可乎縣子本意原不以為極當故作僅可之辭耳孔子曰衞人之祔也離之魯人之祔也合之善夫祔音附夫音扶正義鄭氏康成曰祔猶合葬也離之有以閒其槨中善夫善魯人也祔葬當合孔氏穎達曰此論魯衞得失衞人離之謂合葬猶生時男女須隔居處魯人則合並兩棺置槨中言異生不須復隔詩云穀則異室死則同穴故善魯之祔也朱子曰古者椁合衆材為之故大小隨人所為今用全木則無許大木可以為椁故合葬者只同穴而各用椁也秦氏繼宗曰祔葬即合葬一椁而兩棺共之也然又有離合之分衞人以别物隔判故曰離魯人不用物隔故曰合離之别男女也合之同生死也合之者於人子之情為盡故善魯存異陳氏祥道曰衞之俗有存於殷魯之俗一之於周殷之所尚者尊尊故凡昭穆之祔於廟者離之而不親周之所尚者親親故凡昭穆之祔於廟者合之而不尊離之則義合之則仁孔子皆善之案諸説俱以此祔為合葬獨陳以為祔廟又以為昭穆之離合殊不可解宗廟昭從昭穆從穆穆不混昭昭不混穆魯衞一也安所據以别魯衞而以為孔子皆善之乎欽定禮記義疏卷十四
