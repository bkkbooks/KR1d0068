body:
  text: 仲尼燕居第二十八正義孔氏穎達曰案鄭目錄云名曰仲尼燕居善其不倦燕居言及於禮著其字言事可法也退朝而處曰燕居此於别錄屬通論仲尼燕居子張子貢言游侍縱言至於禮燕於見反正義鄭氏康成曰言游言偃子游也縱言汎說事孔疏廣言諸事遂至於禮子曰居女三人者吾語女禮使女以禮周流無不徧也女音汝後同語魚據反下同徧音遍正義鄭氏康成曰居坐也使之坐凡與尊者言更端則起也孔氏穎達曰周流謂周旋流轉言我使汝等恆以禮周旋流轉無不徧於天下方氏慤曰周言其不虧於一方流言其不滯於一曲周流則其用無所不徧陳氏澔曰周流無不徧者隨遇而施無不中節也子貢越席而對曰敢問何如子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆子曰給奪慈仁中竹仲反下同給音急又其劫反下同正義鄭氏康成曰奪猶亂也巧言足恭之人似慈仁特言是者感子貢也子貢辨近於給孔疏子貢問禮辨而不讓夫子因感喻之貢案先問不可謂給恐是因子能言故以喻也孔氏穎達曰言不中禮則於事為失野謂鄙野恭謂便辟足恭捷給之人貌為恭敬似慈愛寛仁而實不慈仁但其貌亂真慈仁也方氏慤曰敬言其心恭言其貌心敬而不中禮則文辭寡故謂之野貌恭而不中禮則文辭多故謂之給勇而不中禮則以力而不以徳故謂之逆給則論語所謂口給也三人侍坐之序子張為首子貢為次言游為末子張未對而子貢對焉此所以為越序也馬氏睎孟曰恭不中禮謂之給蓋能足恭未有不能巧言者給奪慈仁言色取仁而行違也陳氏澔曰野與逆二者猶是直情徑行而然使習於禮則無此患矣唯足恭便佞之人是曲意徇物致飾於外務以悦人貌類於慈仁而本心之徳則亡矣故謂之奪慈仁案恭主容敬主事心主於事則或疎於禮故謂之野勇亦在任事上見勇徃直前不顧尊長故謂之逆所謂好勇不好學其蔽也亂也再記子曰語已絶而復言也後放此子曰師爾過而商也不及子産猶衆人之母也能食之不能敎也食音嗣正義鄭氏康成曰過與不及言敏鈍不同俱違禮也孔疏師於事敏疾商於事遲鈍過案朱子論語注子張才髙意廣而好為苟難故常中子夏篤信謹守而規模狹隘故常不及不止敏鈍不同而已衆人之母言子産慈仁多不矜莊又與子張相反子産嘗以其乘輿濟冬渉者而輿梁不成是慈仁亦違禮孔疏約孟子文孔氏穎達曰此明不中禮之人父義母慈父能敎而不能愛母則能愛而不能敎周氏諝曰子張於中道則過而子夏則不及子產之惠猶衆人之母則亦過又不能敎則亦不及也吳氏澄曰卜商不在坐而並言之者以其不及與子張之過相反也子産母道有餘父道不足師商兩人而一過一不及子產一人而有過有不及故並言之案子産十五字家語别見正論篇而文特詳疑脫簡在此子貢越席而對曰敢問將何以為此中者也子曰禮乎禮夫禮所以制中也正義鄭氏康成曰禮乎禮惟有禮也馬氏睎孟曰中出於人之性而所以節性者在乎禮而已故曰夫禮所以制中吳氏澄曰先云禮乎者設為問辭後云禮者設為答辭也案人皆受中於天而所稟有過不及惟禮為天理之節文以禮制之而過者俯而就不及者仰而企斯皆可以至於中也總論孔氏穎達曰自此至相示而已明說禮之事子貢退言游進曰敢問禮也者領惡而全好者與子曰然然則何如子曰郊社之義所以仁鬼神也嘗禘之禮所以仁昭穆也饋奠之禮所以仁死喪也射鄕之禮所以仁鄕黨也食饗之禮所以仁賔客也與音餘食音嗣正義鄭氏康成曰領猶治也好善也孔氏穎達曰子游問禮之為體治去惡事而留全善事者與與語辭饋奠謂人之初死設此饋食之奠射謂鄉射鄉謂鄉飲酒馬氏睎孟曰仁者有推恩而及之之意事天地主於敬故於郊社言鬼神事宗廟主於愛故於禘嘗言昭穆饋奠之禮始死者之奠也始死而致死之則不仁此饋奠所以仁死喪也習射尚功則壯者有以勵習鄉尚齒則少者有所讓所以待鄉黨者盡矣食以示其愛饗以示其敬所以待賔客者盡矣應氏鏞曰仁心發於中而後禮文見於外及禮之舉而是心達焉則幽明之間咸順其序驩欣浹洽皆在吾仁中是仁之周旋暢達也劉氏彝曰領惡猶言克己也視聽言動非禮則勿所以克去己私之惡而全天理之善也吳氏澄曰上言以禮制中損其過益其不及蓋因其氣質之偏而除治之所謂領惡也下言仁鬼神至仁賓客蓋因其徳性之善而充周之所謂全好也姚氏舜牧曰領惡而全好則此心一仁也仁則無所徃而不為仁矣存異鄭氏康成曰仁猶存也凡存此者所以全善之道也郊社嘗禘饋奠存死之善者也射鄉食饗存生之善者也郊有后稷社有句龍孔疏眀此鬼神是人之鬼神非易隂陽七八九六之鬼神孔氏穎達曰仁謂仁恩相存念也案此惡字只就過不及說領惡全好緊承中字言之張子曰禮儀三百威儀三千無一物之非仁也程子曰醫家以手足痿痺為不仁此言最善名狀舉天地人鬼之交接總一吾仁之周流痿痺之患無有矣鄭孔訓仁作存其說近鑿子曰明乎郊社之義嘗禘之禮治國其如指諸掌而已乎是故以之居處有禮故長幼辨也以之閨門之内有禮故三族和也以之朝廷有禮故官爵序也以之田獵有禮故戎事閑也以之軍旅有禮故武功成也是故宮室得其度量鼎得其象味得其時樂得其節車得其式鬼神得其饗喪紀得其哀辨說得其黨官得其體政事得其施加於身而錯於前凡衆之動得其宜長竹丈反後皆同量音諒下同錯七故反又音措正義鄭氏康成曰治國指諸掌言易知也郊社嘗禘尊卑之事有治國之象焉辨别也三族父子孫也孔疏三者於己最近昏禮三族之不虞鄭注三族父昆弟已昆弟子昆弟以期喪廢昏故舉三者言之與此異也婦方氏慤曰父子合尊卑兄弟合長幼夫合内外為三族或曰三族即三黨凡言得者得灋於禮也量豆區斗斛也孔疏左傳云四升為豆注云四豆為區四區為釜又律厯志云十升為斗十斗為斛味酸苦之屬四時有所多孔疏周禮食醫春多酸夏多苦秋多辛冬多鹹及獻所宜也孔疏周禮獸人春獻狼夏獻麋秋冬獻鹿豕式謂載也所載有尊卑辨禮之說謂禮樂之官敎學者黨類也孔疏辨說詩書禮樂不乖事之義理體尊卑異而合同孔疏若長官與屬官尊卑異而共掌一事類陸氏佃曰若宰相不親小事之孔氏穎達曰前經明郊社等禮各有所因故此經廣明郊社嘗禘明而用之則有功又廣明諸禮所用有功諸事郊社祭天地嘗禘祭宗廟皆是事之難者能明其理則治國甚易了也族屬也度謂制度髙下大小得禮之度數象謂灋象言斛斗之量三牲之鼎各得其禮之灋象故易傳云以制器者尚其象節謂樂曲之節饗謂天神人鬼各得其饗食喪紀謂五服親疏各得其哀情錯置也衆謂萬事也以禮加身而錯之萬事皆得其所宜合結用禮之功方氏慤曰室有奧阼席有上下居處有禮也父父子子兄兄弟弟夫夫婦婦閨門有禮也設官分職列爵分土朝廷有禮也春蒐夏苗秋獮冬狩田獵有禮也進退有度左右有局軍旅有禮也戎事閑於無事之時故於田獵言之武功成於尚功之日故於軍旅言之宮室若魯莊公之丹楹刻桷臧文仲之山節藻梲蓋失其度故也量左為升以象陽之所升右為合以象陰之所合仰者為斛以象顯而有所承覆者為斗以象隱而有所庇外圜其􅄱動以天内方其􅄱靜以地也鼎口在上以象有所受於上足在下以象有所立於下大者為鼐弇者為鼒足竒其數參乎天也耳偶其數兩乎地也其器疏以達者象春髙以粗者象夏廉以深者象秋閎以奄者象冬器固無適而非象止以量鼎為言者量為器之大鼎為器之重大者重者得其象則小者輕者可知陽而不散陰而不密剛氣不怒柔氣不懾樂得其節也有六等之數作車之得其式辨五路之用乘車之得其式也鬼神得其饗者若天神皆降地􅅘皆出可得而禮是矣喪紀得其哀者發於容體聲音言語飲食居處衣服而各得其哀也辨說得其黨若在官言官在府言府在庫言庫在朝言朝之類官得其體者若天官掌邦治地官掌邦敎春官掌邦禮夏官掌邦政之類政事得其施者若施典於邦國施則於都鄙施灋於官府之類自宮室得其度而下皆以本於禮故能各有所得焉以禮加於身錯於前無所不用禮故用皆得其宜也馬氏睎孟曰郊社所以事天地而義藏其中嘗禘所以事宗廟而禮陳其外因義以設禮因禮以考義神而明之存乎人則治國其如示諸掌乎推而通之以至加於身而錯於前凡動無不宜也陳氏澔曰明乎郊社之義則事天如事親明乎嘗禘之禮則事親如事天仁人孝子明於此故能推民胞物與之心而天下國家有不難治者矣案郊社嘗禘舉上最重者而申言之居處以下又舉上所未及而廣言之所謂周流無不徧也子曰禮者何也即事之治也君子有其事必有其治治國而無禮譬猶瞽之無相與悵悵乎其何之譬如終夜有求於幽室之中非燭何見若無禮則手足無所錯耳目無所加進退揖讓無所制是故以之居處長幼失其别閨門三族失其和朝廷官爵失其序田獵戎事失其䇿軍旅武功失其制宮室失其度量鼎失其象味失其時樂失其節車失其式鬼神失其饗喪紀失其哀辨說失其黨官失其體政事失其施加於身而錯於前凡衆之動失其宜如此則無以祖洽於衆也治直吏反下其治治國並同相息亮反倀勅良反正義鄭氏康成曰凡言失者無禮故也䇿謀也祖始也洽合也言失禮無以為衆倡始無以合和衆孔氏穎達曰前經明諸事得禮則有其功此明諸事失禮則有害即事之治言萬物之治皆由禮方氏慤曰祖言有所繼洽言有所合經曰禮為可繼也易曰嘉㑹足以合禮陸氏佃曰耳目無所加不知所以給視聽也吳氏澄曰無禮則手足皆妄動故曰無所錯耳目皆妄聽妄視故曰無所加䇿謂講武敎戰之謀䇿制謂全師克敵之灋制子曰愼聽之女三人者吾語女禮猶有九焉大饗有四焉茍知此矣雖在畎畝之中事之聖人已兩君相見揖讓而入門入門而縣興揖讓而升堂升堂而樂闋下管象武夏籥序興陳其薦俎序其禮樂備其百官如此而后君子知仁焉行中規還中矩和鸞中采齊客出以雍徹以振羽是故君子無物而不在禮矣入門而金作示情也升歌清廟示徳也下而管象示事也是故古之君子不必親相與言也以禮樂相示而已女音汝縣音𤣥闋苦穴反籥音藥中竹仲反下同還音旋齊夲又作薺在細在私二反正義鄭氏康成曰猶有九焉吾所欲語女餘有九也但大饗有四大饗謂饗諸侯來朝者四者謂金再作升歌清廟下管象也事之謂立置於位也縣興金作也孔疏謂金奏第一作也案大射禮賔及庭奏肆夏至主人獻賓賓再拜受爵樂闋是金一作也但大射以臣為賔故及庭始金奏若隣國君來入門即金奏也金再作者獻主君又作也孔疏案大射禮主人獻賔之後主人洗象觚獻於公公拜受爵乃奏肆夏公卒爵而樂闋大射禮謂臣為主而獻君若兩君相見則賔獻主君故獻主君又作也下謂堂下也夏籥文舞也方氏慤曰夏籥夏禹之樂大夏也文舞必執羽籥故謂之夏籥序更也堂下吹管舞文武之樂更起也知仁焉知禮樂所存也采齊雍振羽皆樂章也振羽振鷺及雍金作示情也賓主人各以情相示也孔疏主人示賓以恩情賔示主人以敬情金性内明象人情也示徳相示以徳也清廟頌文王之徳示事相示以事也武象武王之大事也孔氏穎達曰大饗謂鄰國兩君相見縣興謂鍾磬興而動作謂金奏作也下管象武之上少升歌清廟一句下文既詳故略之入門而金作覆釋前文古之君子相朝㑹不必親自以事相與丁寧而言但以禮樂微相示語而已方氏慤曰兩君相見其禮大若以饗禮養老與春饗孤子則小也象即詩所謂象舞武即詩所謂大武也大夏文舞必執羽籥故謂之夏籥客之出也猶歌以雍見客之能雍非特於來時而已器之徹也猶歌以振羽見主之無斁非特於在此之時而已示情欲賔主以情相接也示徳欲賓主以徳相讓也示事者欲賓主以事相成也吳氏澄曰九者大饗有四幷前之五者為九也仁鬼神以下之五是即諸禮之中總其凡而言大饗之四是就一禮之中分其目而言禮有饗有食有燕饗禮重於食燕諸侯饗諸侯視諸侯饗大夫之禮為大故曰大饗大饗之禮大節有四初迎賓一也次獻賓二也次樂賓三也終送賓四也揖讓入門而縣興此迎賓時也揖讓升堂而樂闋此獻賔時也獻畢工入堂上絃瑟而歌清廟歌畢堂下吹管而迭興象舞夏籥之二舞此樂賓時也禮畢而賓出則以雍徹之詩振羽之詩歌而送之此大饗之四禮也薦俎謂獻賓之時所陳禮樂謂自初及終所行之禮節所奏之樂章先後皆有次第也百官謂執禮服役之職備具而無缺也通論方氏慤曰雍振鷺二詩本以禘太祖與助祭而又用之於此者猶之鹿鳴本以燕羣臣而又用之於鄉飲酒也然論語言以雍徹其用與此不同又何也蓋彼所言者天子饗神之事此所言者諸侯饗賓之事故諸侯所用之大者天子止用之於小者此所以不同陳氏祥道曰晉饗穆叔歌文王之詩穆叔以為文王兩君相見之樂則諸侯相見歌文王而不歌清廟也孔子謂諸侯相見歌清廟者蓋二王後諸侯之長禮然也存疑盧氏植曰大饗有九者揖讓入門一也入門縣興二也揖讓升堂三也升堂樂闋四也下管象武五也夏籥序興六也陳其薦俎七也序其禮樂八也備其百官九也鄭氏康成曰象武武舞也王氏肅曰揖讓入門至升堂一也升堂樂闋二也下管象武夏籥序興三也陳其薦俎序其禮樂備其百官四也行中規五還中矩六和鸞中采齊七客出以雍八徹以振羽九孔氏穎達曰鄭以獻賓樂作一獻主君樂作二升歌三下管四其餘五事王與鄭同皇侃以夏籥合下管為一事鄭不數夏籥皇義非也案周頌維清奏象武也又曰初時管中吹象武之曲已後與夏籥文舞更遞而作故云舞文武之樂更起也陸氏佃曰九者一清廟二象三雍四振羽五肆夏六采齊七武八夏九籥熊氏云勺籥也籥是舞勺案前以仁言禮已渾舉其全此言禮猶有九將析言其義之所該不舉郊社禘嘗者前已言明乎其義治國如指掌所謂盡其誠信與其忠敬順以備者其義尤多可意㑹也大饗有四舉饗以例其餘言饗以仁賓客則觀之固可知仁而析言其義則示情示徳示事又有其三鄭注吾所欲語女餘有九但大饗有四又言大饗四節金再作升歌清廟下管象是明以金作示情升歌示徳下管示事言矣初不云大饗分九節也孔氏不達其意述盧說王說見盧全異王似可附合遂言前四事鄭與王異後五事鄭與王同直誣鄭矣夫中規中矩君子行步之常可分之以當大饗之五節六節乎鄭注初無是說也陸因鄭而加悞分夏與籥為二又增入肆夏以足之本經明云大饗有四何嘗言大饗有九更何嘗言大饗之禮用樂有九耶釋經而忘經益之繆矣又案文王世子言下管象舞大武此言下管象武文稍略耳非以象武為一且謂大武不舞亦以管吹之也且象文舞武武舞不可混稱武舞也玉藻言趨以采齊行以肆夏周旋中規折還中矩在車聞鸞和之聲此言行中規還中矩和鸞中采齊互文見意耳至於揖讓升堂是兩君之升升歌清廟是樂工之升初非謂兩君升堂時歌清廟行指賓出而奏肆夏送之客出旣登車而和鸞中采齊也諸儒附㑹愈謬總論應氏鏞曰此篇言仁者凡三語子貢曰給奪慈仁以其辨給而或傷於仁也告言游曰郊社之禮所以為仁以其習於威儀而未深體夫仁也告子張曰如此而後君子知仁以其堂堂而難與並為仁也各因其病而藥之使於禮而知其仁則其悟入益深而不專以虛文為禮矣子曰禮也者理也樂也者節也君子無理不動無節不作不能詩於禮繆不能樂於禮素薄於徳於禮虛繆音謬正義鄭氏康成曰繆誤也素猶質也歌詩所以通禮意也作樂所以同成禮文也崇徳所以實禮行也王制曰樂正崇四術立四敎順先王詩書禮樂以造士春秋敎以禮樂冬夏敎以詩書王大子王子羣后之大子卿大夫元士之適子國之俊選皆造焉孔疏明上從天子下至俊選皆須禮樂而成證君子無禮不動無節不作孔氏穎達曰禮者使萬事合於道理樂者使萬事得其節制詩能通逹情意則行禮審正若不能習詩則情意隔絶於禮錯繆樂有音聲綴兆文飾於禮若不能習樂則於禮樸素内心厚於徳則外充實若内徳淺薄則外禮空虛此經雖禮樂並陳徳是百行之本樂是禮中之别故明禮須詩樂及徳乃為善也陳氏祥道曰禮繁則亂非所以為理也樂勝則流非所以為節也君子循禮而動無動而非中也應節而作無作而非和也一動一作而禮樂存焉豈小人所能與哉應氏鏞曰禮非樂以發越則如采色之素而無飾樂非禮為之質幹則如支體之偏而不全陳氏澔曰人而不為周南召南猶正牆面而立不能詩者能不繆於禮乎禮之用和為貴不能樂則無從容委曲之度是達於禮而不達於樂謂之素也忠信之人可以學禮薄於徳者必不能充於禮也通論陸氏佃曰詩與禮不同禮嚴而詩寛若禮好色則禁怨讟則禁詩不禁好色而禁人之淫不禁怨讟而禁人之亂司馬遷曰國風好色而不淫小雅怨誹而不亂是也存疑鄭氏康成曰古之人皆知諸侯之禮樂孔氏穎達曰以前經大饗是諸侯禮樂之事故知此是申說前經案此節是另起泛說不粘諸侯又案禮歸於一仁則禮固吾心自具之理而升歌下管雍徹用詩樂行之是詩樂亦即理之節而非有二也故君子行禮必以吾心自具之理為之本無理不動也亦必有詩樂以和其節而作焉無節不作也不然不能詩則少溫柔敦厚之情而於禮亦拘固而成繆不能樂則少和順從容之意而於禮亦朴直而不文皆無節者也若夫薄於徳則自絶其仁而本心之理亡矣又何以為禮哉故曰於禮虚也子曰制度在禮文為在禮行之其在人乎正義鄭氏康成曰文為文章所為孔氏穎達曰言能行禮全在乎人馬氏睎孟曰制度者文為之體文為者制度之用簠簋俎豆所謂制度也升降上下所謂文為也制度文為皆禮之灋也徒灋不能自行故行之在人周氏諝曰文言也為行也輔氏廣曰行禮雖在人而所謂人者必興於詩成於樂厚於徳然後可不然非所謂其人也子貢越席而對曰敢問夔其窮與與音餘正義鄭氏康成曰見其不達於禮孔氏穎達曰子貢惟聞夔善樂不聞夔善禮故問夔窮於禮與子曰古之人與古之人也達於禮而不達於樂謂之素達於樂而不達於禮謂之偏夫夔達於樂而不達於禮是以傳於此名也古之人也正義鄭氏康成曰素與偏俱不備耳孔氏穎達曰素謂樸素偏謂不備具皆不得為窮夔禮樂兼有但特通達於樂不甚通達於禮是以賢名流傳後世若全不解禮何以傳於此名更重羙夔為古人與今人别也虞書舜命伯夷典朕三禮伯夷讓夔是夔知禮也陸氏佃曰古之人不朽者也言夔特以樂傳耳陳氏祥道曰觀䕫敎胄子以直寛剛簡之徳達之以溫柔戒之以無虐無傲則以禮樂敎中和亦不過如此子貢以為窮惡可哉案子貢因子言不能樂於禮素思能樂而不能禮則亦非全人故以夔為問但窮與達正相反達者通之至窮者塞之至夔於禮未達容有之而疑其窮則不可況夔為古之人幷未必不達於禮不可輕議也子張問政子曰師乎前吾語女乎君子明於禮樂舉而錯之而已女音汝正義鄭氏康成曰言禮樂足以為政也錯猶施行也吳氏澄曰錯置也舉而錯之謂如手舉一物而置之一處也子張復問子曰師爾以為必鋪几筵升降酌獻酬酢然後謂之禮乎爾以為必行綴兆興羽籥作鐘鼓然後謂之樂乎言而履之禮也行而樂之樂也君子力此二者以南面而立夫是以天下大平也諸侯朝萬物服體而百官莫敢不承事矣禮之所興衆之所治也禮之所廢衆之所亂也目巧之室則有奧阼席則有上下車則有左右行則有隨立則有序古之義也室而無奧阼則亂於堂室也席而無上下則亂於席上也車而無左右則亂於車也行而無隨則亂於塗也立而無序則亂於位也昔聖帝明王諸侯辨貴賤長幼遠近男女外内莫敢相踰越皆由此塗出也復扶又反大音泰長竹丈反正義鄭氏康成曰衆之所治所以治也衆之所亂所以亂也目巧謂但用巧目善意作室不由灋度猶有奥阼賓主之處也孔疏爾雅云西南隅謂之奥奥之外有賓位東階謂之阼自目巧以下古今常事不可廢改也孔氏穎達曰力謂勉力目巧言但用目準視巧思也古之義者自古以來禮樂之意也由此塗出者由此禮樂之塗而出也方氏慤曰禮云禮云玉帛云乎哉樂云樂云鐘鼔云乎哉故不必鋪几筵之類然後為禮不必行綴兆之類然後為樂也言而履之所謂踐言是也行而樂之所謂安行是也力此二者謂力行此禮樂而施於有政也萬物者萬事也服體者各服其體而不相侵也諸侯朝萬物服體百官莫不承事則太平之效也夫禮者衆之紀紀散而衆亂則衆之治亂係乎禮之興廢而已隅有奥則尊者所處而别於卑階有阼則主人所歴而别於賓所謂室有奥阼也席或以南方為上或以西方為上所謂席有上下也乘車之灋君在左勇士在右所謂車有左右也父之齒隨行五年以長則肩隨之所謂行有隨也天子南鄉而立自公侯而下各有位焉所謂立有序也然則古人之禮至於如是者豈徒從事於文為哉亦各有義存焉爾故曰古之義也踰越皆過也陳氏澔曰衆之治亂由禮之興廢此所以為政先禮也目巧謂不用規矩繩墨但據目力相視之巧也言雖茍簡為之亦必有奥阼之處此以下皆古聖人制禮之義也又言禮之為用無所不在失之則隨事致亂貴賤以爵言長幼以齒言遠近以親疏言男女以同異言外内以位序言也存異鄭氏康成曰服體體服也謂萬物之符長皆來為瑞應也孔疏服謂屈服體謂形體言飛走動植之物皆來為瑞應也案服體者言物之有理猶人之有體萬事皆從其理如視聽之聰明手足之恭重便是服體鄭孔符應之說非也三子者旣得聞此言也於夫子昭然若發矇矣矇音蒙正義鄭氏康成曰乃曉禮樂不可廢改之意孔氏穎達曰經中自目巧以上論禮樂之事質文沿革隨事變改自目巧以下論尊卑上下萬代恆行吳氏澄曰言三子旣聞此十二條之言昭然有見如人徹去其蔽目之物然也孔子閒居第二十九正義孔氏穎達曰案鄭目錄云名孔子閒居者善其無倦而不䙝一作衰猶使一弟子侍為之說詩著其氏言可灋也退燕避人曰閒居此於别錄屬通論陳氏祥道曰子夏始問為民父母之道繼問三王參於天地之徳有為民父母之道而後可以行三王之徳洪範曰天子作民父母以為天下王故其序如此孔子閒居子夏侍子夏曰敢問詩云凱弟君子民之父母何如斯可謂民之父母矣孔子曰夫民之父母乎必達於禮樂之原以致五至而行三無以横於天下四方有敗必先知之此之謂民之父母矣閒音閑凱與愷同丘在反弟又作悌徒禮反夫音扶正義鄭氏康成曰凱弟樂易也原猶本也横充也敗謂禍烖也王氏肅曰五至五者相因自然而至孔氏穎達曰詩大雅泂酌之篇羙成王之徳凱樂也弟易也謂成王行樂易之徳為民之父母也聖人行五至三無通幽達微無所不悉觀其萌兆觀微知著豫知禍害使民免罹於禍故為民之父母然四方之福亦必先知之此主為民除害故舉敗言之呂氏大臨曰禮樂之原在於一心葉氏夢得曰凱則強敎而使民尊之父道也弟則悦安而使民親之母道也方氏慤曰五至由粗以入精故曰致三無自内以達外故曰行橫於天下者以是道廣被於天下也四方有敗必先知之言其道又足以㡬於神也敗者成之對不言成而止言敗者蓋君子思患而豫防之則敗尤在乎先知也輔氏廣曰仁者禮樂之本原也此非至仁而以天下萬物為一體者不能惟仁故可以作民父母應氏鏞曰父母之心惻怛懇至而赤子痒疴疾痛無纖髮不切於肌膚四方萬里微有禍敗必先知之蓋愛其民者切慮其事者周故不善之幾微萌芽稍觸於吾身則吾已先知而知焉如此始無愧於父母之名矣案自其極盛而無以復加謂之至君子則推而致之以廣其充周之用自其至微而不泥於迹謂之無君子則施而行之以運其微宻之神橫於天下正以滿其達之量也其稍有不序不和處便是敗五至終以哀三無終以喪正其切於憂民處非五至三無之外别有一種憂民之心也子夏曰民之父母旣得而聞之矣敢問何謂五至孔子曰志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至哀亦至焉哀樂相生是故正明目而視之不可得而見也傾耳而聽之不可得而聞也志氣塞乎天地此之謂五至上二樂並如字塞音色正義鄭氏康成曰凡言至者至於民也志謂恩意也言君恩意至於民則其詩亦至也詩謂好惡之情也自此以下皆謂民之父母者善推其所有以與民共之云耳不能聞目不能見行之在心也塞滿也孔氏穎達曰君子之恩意旣至於民故詩之歡樂亦至極於民旣能歡樂至極於民則以禮接下故禮亦至極於民旣禮能至極於民必為民之所樂故樂亦至極於民旣與民同其歡樂若民有禍害則能憂恤極於下故哀亦至焉凡此五者皆與民共之君民同有感之在於胸心外無形聲故目不得見耳不得聞是人君志氣塞滿天地由行五至之道又曰己欲恩愛民亦欲恩愛己有好惡民亦有好惡己欲禮樂民亦欲禮樂己欲哀恤民亦欲哀恤是推己所欲與民共之也徐氏師曾曰五至之道分而言之則各造其盛而不同序而推之則互為其根而不亂姚氏舜牧曰五至雖有次第而總由一志字來此志一至四者自無不至故云志氣塞乎天地子民之心誠切懇到心口之間自然欲隱秘而不得便是詩至有是心口之圖自然有許多經綸料理出來便是禮至有是經綸料理自然欣喜從事而不為疲便是樂至樂此而不為疲則視民如傷唯恐或阽於危亡也將戚然而不自寧便是哀至哀本於樂樂轉為哀朝夕徃來於中無少止息便是哀樂相生所以視不可得見聽不可得聞而此志此氣充塞於天地閒案樂人之立者必憂人之不能立樂人之達者必憂人之不能達方幸其生聚而欣然又憂天下之未能徧後日之未能保而戚然哀樂相生周流不息此其志氣之所充塞直與天地為量矣哀卽喪也不見不聞即下無體無聲無服也言五至而三無已在其中下因再問而申言之耳又案五至至字鄭訓至於民王訓相因自然而至陳氏澔訓極盛而無以加三説相須其義始備子夏曰五至旣得而聞之矣敢問何謂三無孔子曰無聲之樂無體之禮無服之喪此之謂三無子夏曰三無旣得略而聞之矣敢問何詩近之孔子曰夙夜其命宥密無聲之樂也威儀逮逮不可選也無體之禮也凡民有喪匍匐救之無服之喪也其讀基宥音又逮讀棣選宣面反匍音扶又音蒲匐音服又蒲北反正義鄭氏康成曰於意未察求其類於詩詩長人情呂氏大臨曰子夏雖聞此言而未深通以詩之道長於人情故問何詩近之欲通其倫類也其詩讀為基聲之誤也逮逮安和貌言君之威儀安和逮逮然呂氏大臨曰逮詩作棣言其威儀富而閑習如棣之花蕚光輝相逮陳氏澔曰棣棣盛也則民傚之此非有升降揖讓之禮也孔疏詩邶風栢舟篇仁人有威可畏有儀可象民自效灋之救之賙恤之言君於民有喪有以賙恤之則民傚之此非有衰絰之服孔疏詩邶風谷風篇朱子曰宥宏深也密靜謐也基積累於下以承藉乎上者也言夙夜積德以承藉天命者宏深而靜謐匍匐手足竝行急遽之狀陳氏澔曰手行為匍伏地為匐呂氏大臨曰無聲者樂之道無體者禮之本無服者喪之理三者行之在心外無形狀可知也方氏慤曰宥則寛以致和密則深而能靜寛而致和所以為樂也然深而能靜則為無聲焉有威可畏有儀可象所以為禮也然不可選則為無體焉匍匐救之所以為喪也然凡民而已則為無服焉輔氏廣曰夙夜基命宥密則無時而不和威儀逮逮不可選則無動而不節凡民有喪匍匐救之則哀不必見於服也吳氏澄曰三無不言志不言詩蓋志行乎三者之中能是三者則民之情無不達矣所謂禮樂之原也存疑鄭氏康成曰基謀也密靜也言君夙夜謀為政敎以安民則民樂之此非有鐘鼓之聲也孔疏詩周頌昊天有成命篇基始命信宥寛也言文王始信順天命行寛𢎞仁静之化鄭意謀為政敎民得寛和安靜子夏曰言則大矣羙矣盛矣言盡於此而已乎孔子曰何為其然也君子之服之也猶有五起焉正義鄭氏康成曰言盡於此乎意以為說未盡也服猶習也君子習讀此詩起此之義其說有五也孔氏穎達曰子夏疑其未盡故問之孔子告以何為其盡君子習之猶有五種起發也方氏慤曰大言光輝於外羙言充實於内盛言無以有加盡言無有餘蘊起言有加而無已陸氏佃曰猶有五起孔子之言所以進商也董氏仲舒曰勉強行道則徳日起而大有功子夏曰何如孔子曰無聲之樂氣志不違無體之禮威儀遲遲無服之喪内恕孔悲無聲之樂氣志旣得無體之禮威儀翼翼無服之喪施及四國無聲之樂氣志旣從無體之禮上下和同無服之喪以畜萬邦無聲之樂日聞四方無體之禮日就月將無服之喪純徳孔明無聲之樂氣志旣起無體之禮施及四海無服之喪施于孫子施並音異以豉反畜音旭許六反聞去聲正義鄭氏康成曰孔甚也孔疏釋言文施易也從順也畜孝也孔疏祭統云孝者畜也使萬邦之民競為孝也就成也將大也使民之傚禮日有所成至月則大矣起猶從也孔氏穎達曰此以下五節從輕以漸至於重是從微至著也初時威儀遲遲但舒遲而已二則翼翼而恭敬三則上下和同無不從也四則日就月將漸興進也五則施及四海所及遠也初則内恕孔悲謂親族之内悲哀其處近也二則施及四國所被遠也三則以畜萬邦皆為孝也四則純徳孔明益甚也五則施于孫子埀後世也呂氏大臨曰無聲之樂在於氣志無體之禮在於威儀氣志與物不違則固樂矣於理旣得則尤樂矣於道旣合則愈樂矣然則雖曰無聲日聞四方矣是故天下樂之氣志旣起也威儀和而緩則無急迫之態敬而肅則無怠慢之容上下和同則無乖異之變然則雖曰無體而小者日就大者月將矣是故一人行之施及四海也若夫無服之喪本由内恕孔悲則眂人之喪猶己之喪也旣推是心施及四國必由是道以畜萬邦厥今純徳孔明其後施于孫子此仁之至也氣志旣充威儀旣備而篤於仁然後三無五起之義可得而盡矣方氏慤曰氣志不違内無所戾也故繼之以氣志旣得得之於身則人從之故繼之以氣志旣從内恕孔悲以仁存心也仁者愛人故繼之以施及四國馬氏睎孟曰氣志不違氣與志交養於中未至於旣得得者得中也從從心之所念而無所拂也内恕孔悲哀在於心而未形於外故繼之以施四國畜萬邦陸氏佃曰不違徳在我而已旣從則有在彼者也輔氏廣曰不違持其志無暴其氣旣得則志帥氣而氣充乎體旣從則養而無害矣存疑鄭氏康成曰不違者民不違君之氣志也孔氏穎達曰初言民不違君之氣志二云氣志旣得言君之氣志得於下三云旣從民所從也四云日聞四方及於遠也五云旣起是興起也案無聲之樂先儒之說頗異夙夜基命宥密鄭謂夙夜謀為政敎是以政敎為君之命故氣志不違即以民不違君言之旣得為君得於民旣從為民從乎君也呂氏大臨謂不違者我與物不違方氏慤謂内無所戾陸氏佃謂徳在於我輔氏廣則直以持其志無暴其氣工夫言之似己但樂由中出則無聲之樂斷未有舍其本而泛言君民者故始即以基命言之蓋必保合天命之太和而後氣志之間無所乖逆内無乖逆而後事物各得其理而後我之所順人亦順之而後日聞四方和氣洋溢至於天地萬物感而太和不過吾氣志之旣起樂之成原如是其靜謐也若夫禮則自外作故始即以威儀言之遲遲和為貴也翼翼禮節之也然制乎外者正所以養其中與樂不同為斯須不可去乎故中言日就月將乃終以施及四海禮之成遂如是其廣大也喪則一仁之周流也凡民有喪匍匐救之惟以己度人而見其孔悲耳由此而四國而萬邦仁益廣也至是而内恕者不待勉強也徳純則自如是已且施于孫子仁愈遠也子夏長於詩故以詩為問而孔子遂歴以詩語之咏歎淫泆意味深長使人感發興起有不能自已者此之謂五起也子夏曰三王之徳參於天地敢問何如斯可謂參天地矣孔子曰奉三無私以勞天下子夏曰敢問何謂三無私孔子曰天無私覆地無私載日月無私照奉斯三者以勞天下此之謂三無私其在詩曰帝命不違至于湯齊湯降不遲聖敬日齊昭假遲遲上帝是祇帝命式于九圍是湯之徳也參音驂勞鄭讀去聲今如字覆敷救反齊鄭上讀躋下讀齋今上如字下讀躋子兮反假讀格祗諸夷反案今本謂參下無於字正義鄭氏康成曰三王禹湯文武也參天地者其徳與天地為三也帝天帝也昭明也假至也祇敬也孔疏釋詁文九圍九州之界也是湯之徳者是湯奉於無私之徳也孔氏穎達曰詩商頌長發之篇羙成湯之辭方氏慤曰天立乎上地立乎下人立乎中所謂參也立徳以居體固已能參之矣至於興事以致用又有在乎奉之焉天地者陰陽之體日月者陰陽之用方其參之以居體則止以天地為言及其奉之以致用故兼之以日月也天之運轉地之生育日月之升降變化不停可謂勞矣為天下者得不奉此三者以勞之乎雖然勞之而茍有私人得無怨乎故其所奉者主於無私也朱子曰商之先祖旣有明徳天命未嘗去之以至于湯湯之生也應期而降適當其時其聖敬又日躋升以至昭假于天久而不息惟上帝是敬故帝使之為灋於九州也存疑鄭氏康成曰勞勞來案孟子勞之來之詩讀湯齊為湯躋躋升也降下也齊荘也式用也此詩云殷之先君為政不違天命至于湯升為君又下天之政敎甚疾其聖敬日莊嚴其明道至于民遲遲然安和天是用敬之命之用事於九州謂使王也孔氏穎達曰湯降下賢士能速疾不遲假暇也湯以昭明寛暇天下之士心遲遲然舒緩也嚴氏粲曰湯之謙抑所以自降下者甚敏而不遲故聖敬之徳日以躋升日躋言至誠無息也其昭格於天遲遲甚緩言湯無心于得天付之悠悠也案詩義則朱子與諸說盡矣但此引以証奉三無私則所謂帝命不違者天之無私也湯與天齊湯之奉天無私也蓋人有私則有違天無私故命於物者皆不違易所云物與无妄也人一有私即與天地不相似惟湯之無私與天齊一古人引詩多斷章取義似如此說乃切合言不遲又言遲遲者不遲克己之勇所以致其決遲遲達天之養所以俟其化總論孔氏穎達曰自此至大王之徳節論三無私之事並明湯及文武三代大王之徳天有四時春秋冬夏風雨霜露無非敎也地載神氣神氣風霆風霆流􅄱庶物露生無非敎也霆音廷正義鄭氏康成曰言天之施化收殺地之載生萬物非有所私也無非敎者皆人君所當奉行以為政敎也孔氏穎達曰此論天地無私聖人則之以為敎天春生夏長秋殺冬藏以風以雨以霜以露化養於物聖人則之事事傚灋以為敎故云無非敎也神氣謂神妙之氣霆雷也地以神氣風雷之等流布其􅄱衆物感此神氣風霆之􅄱露見而生人君灋此地之生物事事奉之以為敎故云無非敎也春秋云天有六氣此經云天有風雨不偏屬於地但氣從地出又風著於土雷出於地故神氣風雷偏繫於地呂氏大臨曰風霆猶風雨皆神氣也降於天載於地以成化育者也猶於地言之則以流形而可見也方氏慤曰四時以風雨霜露為之用庶物以神氣風霆為之體神氣者天氣也及其下降而得地載之故曰地載神氣神氣散而為風薄而為霆故曰神氣風霆風霆流􅄱􅄱成而後物生可見故曰庶物露生雨露莫不物資以生然止以風霆言之者以風霆無方而莫測尤為氣之神故也陳氏澔曰上文明王道之無私此言天地之無私也徐氏師曾曰天以氣運於上故氣一伸而物無不生氣一屈而物無不成天道至公之敎由四時見之地載神氣其始也承天而生其終也代天而成地道至公之敎由載神氣見之案上文無私覆載以􅄱體言此節以化工言此天地無私之徳所謂大信不約大時不齊無心而成化者也聖人奉之􅆿賞一春夏秋冬也鼓舞振作一神氣也政敎恩澤一風霆雨露流􅄱發生之機也清明在躬氣志如神耆欲將至有開必先天降時雨山川出雲其在詩曰嵩髙維嶽峻極于天維嶽降神生甫及申維申及甫惟周之翰四國于蕃四方于宣此文武之徳也耆市志反翰胡旦反徐音寒正義鄭氏康成曰清明在躬氣志如神謂聖人也峻髙大也翰幹也言周道將興五嶽為之生賢輔佐甫及申為周之幹臣天下之蕃衛宣徳於四方以成其王功此文武之徳也是文王武王奉天地無私之徳此宣王詩也文武之時其徳如此而詩無以言之取類以明之孔氏穎達曰此明周文武之徳清謂清靜明謂顯著言聖人清靜光明之徳在於其身氣志變化微妙如神謂文武也詩崧髙篇羙宣王之詩張子曰清明在躬氣志如神此言聖人也耆欲猶言祥福也雨之將作山川須出雲蓋一氣耳呂氏大臨曰清而明者天之徳也以天徳在躬故氣志如神陳氏澔曰清明在躬氣志如神卽至誠前知之謂也耆欲所願欲之事也有開必先言先有以開發其兆眹者如將興必有禎祥也徐氏師曾曰此言文武無私之徳本源澄澈物不能淆清也本體光明物不能蔽明也此無私之體也清明之徳在身則氣之所適志之所向自能前知所謂至誠如神也此無私之用也存疑鄭氏康成曰耆欲將至謂其王天下之期將至也神有以開之必先為之生賢知之輔佐若天將降時雨山川為之先出雲矣仲山甫及申伯為周之幹臣朱子曰耆欲將至有開必先家語作有物將至其兆必先此語却是竊疑有物訛為耆欲其兆訛為有開辨正孔氏穎達曰甫甫侯謂呂侯也鄭注禮時未見毛詩傳後箋詩乃得之故與禮注别也邵氏囦曰耆欲二字古人以明可願之事不獨孔子閒居言之也衛孔悝鼎銘亦曰乃考文叔興舊耆欲案天地無私故清明在天地聖人無私故清明在聖人由是志氣之動亦如風霆之神立之斯立道之斯行綏之斯來動之斯和聖人之耆欲甫祈至是而聖人開之物先應之如天將降時雨而山川先出雲者然引詩只以証天人相應之理並不重將王天下而生賢才意而說者且謂宣王時生申伯亦文武積徳所感不太迂乎總論應氏鏞曰是篇論禮樂之原至深至遠而實以志氣為之主始言塞乎天地末言氣志如神則充養之妙而無閒也孟子所謂以直養而無害則塞乎天地之閒者也其中論五起而反覆以志氣為言蓋持養用功者不一而足也孟子所謂持其志無暴其氣者也三代之王也必先其令聞詩云明明天子令聞不已三代之徳也弛其文徳協此四國大王之徳也弛式氏反大音泰正義鄭氏康成曰令善也言以名徳善聞天乃命之王也不已不倦止也弛施也協和也大王文王之祖周道將興始有令聞孔氏穎達曰此總結三代以其無私故令聞不已三代之所以王天下者必祖父未王之前先有令聞也江漢之篇羙宣王之詩明明天子謂宣王此記則謂三代之王也言父祖及身令聞不休故云三代之徳詩亦江漢篇弛本文作矢陳也此云弛施也言大王弛其文徳和此四方之國居豳而狄人侵之不忍鬭其民乃徙居岐山之陽而王業起焉故云大王之徳通論孔氏穎達曰唯云湯與文武不稱夏者以夏承禹後為天下治水過門不入無私事惟殷周以戰爭而取天下恐其有私故特舉之也案明明正所謂清明在躬也又獨舉大王者以大王之不隕厥問尤可見文武之王必先其令聞處且以明三代之王以文徳不以武功恐人疑湯武之得天下以征誅非無私也弛文徳協四國則勞天下之証可見禮樂之原一無私之徳也子夏蹶然而起負牆而立曰弟子敢不承乎蹶居衛反又音厥正義鄭氏康成曰承奉承不失隊也起負牆者所問竟辟後來者姚氏舜牧曰負牆而立者聞此敎而謙退以承之也與循牆而懼意同欽定禮記義䟽卷六十四
