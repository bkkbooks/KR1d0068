body:
  text: 燕義第四十七正義孔氏穎達曰案鄭目録云名曰燕義者以其記君臣燕飲之禮上下相尊之義此於别録屬吉事案儀禮目録云諸侯無事若卿大夫有勤勞之功與羣臣燕飲以樂之勤勞謂征伐聘問詩曰吉甫燕喜是也臣有王事之勞亦燕之故燕禮記云若有王事是也通論吕氏大臨曰古之君臣賓主之相接有饗有燕有食饗禮亡矣獨燕食之禮存焉儀禮公食大夫禮是也案儀禮下當有燕禮及三字坊本之漏耳燕以飲為主食以食為主故燕禮之始主人酌以獻賓薦脯醢設折俎而無黍稷食禮之始主人親設醢醤太羮宰夫為主菹醢之豆六三牲魚腊腸胃膚之俎七黍稷之簋六牛羊豕之鉶四宰夫執觶酒設於豆東而不獻此燕食之别也饗禮雖無文然雜見於𫝊記之間饗以訓恭儉燕以示慈惠饗有體薦燕有折俎又云几設而不倚爵盈而不飲又云若不親饗致饗以酬幣又云大饗卷三牲之俎於賓館故知饗禮之始如燕之始獻言爵盈而不飲則啐而不卒爵矣言有體薦則俎肉不折矣言几設而不倚則無脫屨而升堂矣又有酬幣又卷俎歸於賓館此燕饗之别也蓋燕者主於接歡故至於請安請醉旅酬無算爵少紓其敬也故其辭曰寡君有不腆之酒以請吾子之與寡君須臾焉此所以示慈惠也古之燕禮有天子燕諸侯者湛露之詩是也有燕羣臣者鹿鳴之詩及記云君與卿燕則大夫為賓與大夫燕亦大夫為賓是也有燕賓客者則記云若與四方之賓燕聘禮云燕羞俶獻無常數大行人云上公三饗三食三燕是也有燕族人者文王世子公與族燕則以齒是也有養老者王制云凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人脩而兼用之是也陳氏祥道曰近自九族同姓與夫兄弟朋友之親而逺至乎諸侯君臣與夫蠻貊夷狄之邦莫不有恩以見其愛有義以盡其禮故禮行而人説而天下服者此乃古之所以為燕也行葦之序曰周家忠厚故能内睦九族而其詩有或歌或咢洗爵奠斚是所謂燕九族同姓也與頍弁之刺異矣常棣之序曰閔管蔡之失道而其詩有兄弟既具和樂且孺是所謂燕兄弟也與杕杜之刺異矣伐木之序曰友賢不棄不遺故舊而其詩有矧伊人矣不求友生是所謂燕朋友也與谷風之道異矣若夫燕諸侯則有湛露燕羣臣嘉賓則有鹿鳴焉湯氏三才曰諸侯無事朝畢而燕一也卿大夫有勤勞之事君燕勞之二也卿大夫聘還燕之三也四方聘客燕之四也存疑吕氏大臨曰有因燕而射者大射禮是也陳氏祥道曰燕夷狄則所謂蓼蕭澤及四海是已其詩曰燕笑語兮是以有譽處兮夫以湛露之諸侯為中國則蓼蕭之所以燕諸侯者皆謂之四海豈非夷狄與案此當云因射而燕者燕禮記云若射則大射正為司射如鄉射之禮是也至于大射則因祭而射以擇士又因射而先行燕禮不得謂之因燕而射盖燕禮之射重在燕大射之燕重在射也如陳以蓼蕭為通及賓客則可謂専燕夷狄不確至先王之燕夷狄經無明文乃若夷狄食禮則周語舌人食之委之牲體而坐諸外由此推之則燕夷狄可知四夷之樂不使亂雅而陳于門則燕夷狄所歌之詩亦無考古者周天子之官有庶子官庶子官職諸侯卿大夫士之庶子之卒掌其戒令與其教治别其等正其位國有大事則率國子而致於大子唯所用之若有甲兵之事則授之以車甲合其卒伍置其有司以軍法治之司馬弗正凡國之政事國子存游卒使之脩德學道春合諸學秋合諸射以考其藝而進退之卒依注作倅七對反大子之大音泰卒伍之卒子忽反正音征正義鄭氏康成曰職主也庶子猶諸子也方氏慤曰諸庶皆衆也諸侯而下長倅皆在所掌所以為庶其異名猶周官宗伯記曰宗人周官甸師記曰甸人也周禮諸子之官司馬之屬也卒讀皆為倅孔疏此庶子之卒下㳺卒皆為倅副倅之倅諸子副代父者也戒令致於大子之事孔疏其事非一故云戒令教治脩徳學道也位朝位也孔疏此等諸子雖未為官皆繼父尊卑以為等級國子諸子也軍法百人為卒五人為伍國子屬大子司馬雖有軍事不賦也游卒未仕者也孔䟽周禮師氏職凡國之貴游子弟學焉注云貴王公子弟游無官司者是游逸尚未仕也學大學也射射宫也燕禮有庶子官是以義載此以為説孔䟽燕禮云主人升自西階獻庶子於阼階上又云庶子執燭是燕禮有庶子官孔氏穎達曰此官職主諸侯及卿大夫士衆庶之子副倅於父之事所以官名庶子也教謂教學治謂治身周禮諸子職則云掌國子之倅此云諸侯卿大夫士之庶子庶衆也以其適子衆多故總謂之庶子非適子庶弟而稱庶子也必知適子者以云倅是副貳於父之言王制云王大子王子羣后之大子卿大夫元士之適子是也國有大事之時則進致諸子於大子唯任大子随時所用也若國有甲兵之事則庶子之官付授以車甲合會之以卒伍置立之以有司謂立其主將使統領之用軍旅之法治理也正役也諸子既統屬大子随大子徴發司馬不得征役之也凡國之政事謂力役土功胥徒之屬國子存游卒者未仕者之中既不與尋常政事但使之脩行其徳學習道藝也仲春之時合此諸子在於大學仲秋之時合此諸子在於射宫庶子之官考校其藝能之髙下而進退之吕氏大臨曰古人為國其使君臣相信非一日積也大子君之貳也國子之倅諸侯諸臣之貳也以諸侯諸臣之貳事其君之貳學相同則好相合矣王制曰春秋教以禮樂冬夏教以詩書是也事相同則情相信矣率國子致於大子唯所用之是也故大子雖未為君君臣之交相際已久賢不肖之別已悉可任使之才已􅊀則先王所以慮後世者不為不豫也戒令謂任之征役也别其等謂父爵為之等也正其位謂在朝廷則尚爵在學校則尚齒也國有大事謂大祭祀大喪紀大賓客大燕饗之類甲兵之事謂師旅之役也國之政事謂凡力役田獵追胥之事未仕則庶人力役田獵追胥之事不舍然以國子之倅將使之脩徳學道故舍征而存之以養材也方氏慤曰戒則戒之使勿怠令則令之使有為敎則敎之以其藝治則治之以其事知其戒令而後可以教治之也等謂上下之等位謂貴賤之位周官師氏敎國子保氏養國子地官掌邦敎也故師保以敎養為主夏官掌邦政也故庶子以戒令為主甲以自營兵以勝敵合其卒伍則聯之有數置其有司則帥之有人所謂以軍法治之也軍法者司馬之所正治之以軍法而司馬弗正者致之在於庶子用之在於大子以國之貴游不可以常民畜之故也合其卒伍置其有司所謂戒令春合諸學秋合諸射所謂敎治也戒令庶子之職所主敎治庶子之職所兼也馬氏睎孟曰司馬治之則處之以義司馬弗征則優之以恩春合諸學而教之以文所以順陽秋合諸射而敎之以武所以順陰葉氏夢得曰辨其等則親疎有序正其位則貴賤有等所謂庶子之官治而邦國有倫也通論李氏覯曰王者之師其􅊀矣乎非直興於閭里抑又取於世族彼以父祖貴富宜有報上之心而況學習徳行道藝孰不知忠孝之美佐之以金革則與夫干賞蹈利傭徒鬻賣者盖有閒矣且大子將為君國子将為臣君臣之分未定而恩義固已接矣則今日之游卒未必不為嗣王之将帥也轡長馭逺有如是哉案庶子國子卒游倅總是諸侯卿大夫士之適子將來承襲父爵代父宣力者合衆言之曰庶養於國學曰國副貳曰倅未仕曰游卒其庶子官則統率之官名也辨正芮氏城曰此燕禮乃諸侯之禮與天子官何與周禮夏官諸子職掌與燕飲何與雖經内有獻庶子及庶子執燭之文然其受獻士舉旅以後其執事與甸人閽人相聯乃諸侯官之最卑者燕禮之行貴者衆矣不舉其職而先最賤者何哉刪之為當案此必他書斷簡掇拾者見下有士庶子就位於下字遂取以附此耳今姑另斷為一章存疑孔氏穎達曰天子謂之諸子諸侯謂之庶子其職掌則同案周禮司馬之屬有諸子此記又言天子有庶子官而所載庶子職之説則猶是周禮諸子職文則庶子即諸子註説是也此下皆諸侯禮而此則首言庶子官則諸侯亦有庶子官與天子同賈以諸子屬天子庶子屬諸侯不知記固眀言天子有庶子官也諸侯燕禮之義君立阼階之東南南鄉爾卿大夫皆少進定位也君席阼階之上居主位也君獨升立席上西面特立莫敢適之義也鄉許亮反適音敵爾案爾卿下當有卿西面北上大夫八字文闕耳正義鄭氏康成曰定位者為其始入踧踖揖而安定也孔氏穎達曰燕禮之初君獨升立於阼階之上眀君尊莫敢適之義也皆引燕禮正經記者以義説之案燕禮卿大夫皆入門右北面君南鄉爾卿卿西面北上爾大夫大夫皆少進皆北面所以然者定羣臣之位也莫敢適言莫敢與君敵體為禮也吕氏大臨曰燕禮射人告具小臣設公席於阼階上西鄉公升即位於席西鄉而與燕之羣臣皆未入也諸臣未入而君特立於席眀是燕也君為之主非諸臣之敢敵也君既即位小臣納卿大夫士皆入門立公乃降立於阼階之東南南鄉爾卿卿西面北上爾大夫皆少進爾近也進之使前也方氏慤曰卿大夫在北面故鄉而爾之欲其皆少進以定位故也君獨升席上西面特立者西面則居東主居東則賓宜西賓居西則主與之對立矣而此言特立者方見賓莫敢居西而與之敵也始則南鄉杀君道也終則西面示主道也示君道者待之以臣禮示主道者待之以賓禮至於待之以賓禮猶莫敢居賓位以相敵焉是乃所以深眀君臣之義也存異陳氏祥道曰定位小卿次上卿大夫次小卿士庶子以次就位是也案所云定位盖中庭立位也陳以下文席次言之誤矣設賓主飲酒之禮也使宰夫為獻主臣莫敢與君亢禮也不以公卿為賓而以大夫為賓為疑也眀嫌之義也賓入中庭君降一等而揖之禮之也亢苦浪反為疑之為去聲正義鄭氏康成曰設賓主者飲酒致歡也宰夫主膳食之官也方氏慤曰此即天官之膳夫非天官之宰夫亦謂之宰夫者皆以宰制為事也杜蕢言蕢宰夫刀已是供即此天子使膳宰為主人方氏慤曰為獻主攝主人而獻賔也膳夫供食飲養王以養王者養賔王之厚意也公孤也孔䟽此諸侯燕臣而稱公故知是上公得置孤孤止一人而燕禮云諸公者鄭注彼云容牧有三監也案天子不以公為賔諸侯不以卿為賓或通天子言之疑自下上至之辭孔䟽疑擬也是在下比擬於上故云自下上至之辭公卿尊矣復以為賓則尊與君大相近孔氏穎達曰公卿朝臣之尊賓又有敵主之義若以公卿為賓疑其敵君也為其嫌疑故使大夫為賓眀其逺嫌之義也賓既至庭君降階一等而揖之是以禮待於賓也呂氏大臨曰既爾卿大夫然後射人請賓公曰命某為賓賓以大夫不以公卿之貴疑於君也賓入及庭公降一等揖之公升就席乃以宰夫為主人以獻賓臣不敢亢君也君不敢以已尊莫亢而必伸賓主之敬臣不敢以已為賓而必屈君之尊君盡君之禮以下下故賓入及庭降一等揖之賓受爵拜君皆答拜臣盡臣之禮以事上故君舉旅賜爵賓皆降再拜稽首君辭然後升成拜天下之理未有不交而成者也故天地交而萬物通上下交而其志同此所以君臣和禮義行也通論陳氏祥道曰王不自為主故於膳夫曰王燕飲則為獻主也燕必於内朝之地故於大僕曰王燕則相其法也君舉旅於賓及君所賜爵皆降再拜稽首升成拜眀臣禮也君答拜之禮無不答眀君上之禮也臣下竭力盡能以立功於國君必報之以爵禄故臣下皆務竭力盡能以立功是以國安而君寧禮無不答言上之不虚取於下也上必眀正道以道民民道之而有功然後取其什一故上用足而下不匱也是以上下和親而不相怨也和寧禮之用也此君臣上下之大義也故曰燕禮者所以眀君臣之義也稽音啟以道之道音導正義鄭氏康成曰言聖人制禮因事以託政臣再拜稽首是其竭力也君答拜之是其報以禄位也孔氏穎達曰君舉旅於賓者謂舉旅酬之酒以酬賓賜爵者特賜臣下之爵凡賓受君之酬及臣受君賜爵皆降自西階再拜稽首以受君恩又升堂更再拜稽首以成拜也故燕禮云公酬賓賓降西階下再拜稽首公命小臣辭賓升成拜鄭云升成拜復再拜稽首也至禮殺之後賓下堂是欲拜君則辭之賓未拜也賓乃升堂再拜稽首鄭注不言成拜以其下堂未拜故也燕禮云公卒觶賓下拜小臣辭賓升再拜稽首鄭注不言成拜為拜故下實未拜也下不輙拜禮殺也燕禮君賜爵之時再拜稽首示竭力盡能立功於國也燕禮臣拜君皆答之者示君報之以爵禄也凡臣之拜君無不答拜示為上之道不虚取於下上必須報之也上下既須相報故在上眀正道以敎道於民民亦依君訓導有功報上君既簿歛於上民亦什一而税於下上下和平親睦而不相怨恨前眀君臣相報此眀君民上下相報上下和親是和也不相怨是安寧也和與寧禮之用也以結成上文方氏慤曰舉旅即下言舉旅行酬也鄉飲酒禮亦謂之相旅即中庸所謂旅酬是也君所賜爵謂旅酬之外君有特賜之爵也和寧禮之用也以其國安而君寧論語曰禮之用和為貴曲禮曰人有禮則安皆以是而已陳氏澔曰先是宰夫代主人行爵酬賓之後君命下大夫二人媵爵公取此媵爵以酬賓賓以旅酬於西階上楊氏復曰案公取媵爵以酬賓此别是一禮與尋常酬賓不同君臣之際其分甚嚴其情甚親使宰夫為獻主所以嚴君臣之分今舉觶以酬賓賓西階下拜小臣辭升成拜公奠觶答再拜公卒觶賓下拜公答再拜畧去勢分極其謙卑所以通君臣之情也注云不言君酬賓於西階上及君反位尊君空其文也此又所以嚴君臣之分也通論葉氏夢得曰上以爵禄報下則下日奮而有功故禮無不拜下以功力事上則上見知而有賜故禮無不答無不拜則非與亢禮無不答則非虚取也勞心者治人勞力者治於人治人者食於人治於人者食人上下之義也燕禮眀君臣之義者何以異此案禮通於上下故拜無不答因答拜之禮推及君臣報功之道又因君臣之禮推及君民取與之義以見禮之可以為國也席小卿次上卿大夫次小卿士庶子以次就位於下獻君君舉旅行酬而後獻卿卿舉旅行酬而后獻大夫大夫舉旅行酬而后獻士士舉旅行酬而后獻庶子俎豆牲體薦羞皆有等差所以眀貴賤也差初冝反正義鄭氏康成曰牲體俎實也薦謂脯醢也羞庶羞也孔氏穎達曰席小卿次上卿者案燕禮上卿在賓席之東小卿在賓席之西隔越於賓席而云次上卿者以俱南面東上遥相次耳大夫次小卿者燕禮大夫在小卿之西故云辯獻大夫遂薦之繼賓以西東上也士庶子以次就位於下者燕禮於西階上獻士既受獻者立於阼階下西面北上獻庶子於阼階上既獻立於阼階下故云士庶子以次就位於下也獻君君舉旅行酬者燕禮宰夫為主人酌以獻賓賓飲畢酌以酢主人主人飲畢酌以獻君君飲畢酌以酢主人更爵以受酢於阼階下飲卒爵主人又洗觚酬主人先飲卒爵酌以酬賓賓受觚坐奠於薦東訖小臣請媵爵者二人媵爵阼階下皆北面媵爵於公媵爵者先自飲畢媵爵者洗象觶酌奠於公席之前公坐取所媵之觶以酬賓賓下再拜稽首公命小臣辭賓升成拜公立卒觶賓乃受公虚爵酌之酬大夫於西階上衆大夫相酬畢奠虚觶於篚此是獻君君舉旅行酬也而后獻卿卿舉旅行酬者燕禮主人洗升實散獻卿於西階上獻卿畢小臣又請媵爵者公使二人媵爵奠於公前公又行一爵若賓若長惟公所酬以旅於西階上大夫辯而止此是為卿旅酬也而后獻大夫大夫舉旅行酬者燕禮主人洗獻大夫於西階上大夫辯受獻乃納工獻衆工畢公又舉奠觶惟公所賜以旅於西階上此是獻大夫為大夫而旅酬也而后獻士士舉旅行酬者燕禮説屨升堂坐之後主人獻士於西階上獻士辯又獻旅食賓媵觚於公公坐取賓所媵觶興惟公所賜乃就席坐行之終於大夫終受者興以酬士士舉旅於西階上此是獻士為旅酬也而後獻庶子者庶子卑不為之舉旅但無算爵之莭執爵者酌而旅之爼豆牲體薦羞皆有等差者公及卿大夫士等皆有等差但燕禮不載無以言也彭氏曰主人酌獻君為君行第一旅次為卿行第二旅次為大夫行第三旅次為士行第四旅次獻庶子庶子卑不為之舉旅也通論孔氏穎達曰燕禮直云卿不云大卿小卿之異則大卿小卿俱同獻也吕氏大臨曰禮之所貴別而已矣貴貴之義有所不行此亂之所由生也燕禮之别故上卿小卿大夫士庶子其席其就位皆有次獻君獻卿獻大夫獻士獻庶子及舉旅行酬皆有序爼豆牲體薦羞皆有等差君臣貴賤之義極其宻察至於此者所以防亂也方氏慤曰小卿即下卿也言上卿則知小卿之為下言小卿則知上卿之為大仲尼燕居曰席而無上下則亂於席上也故其上下之次如此案凡獻皆宰夫所獻至舉酬則君自為之其俎豆牲體薦羞之等差燕禮文雖未詳載然云惟君與賓有俎卿無俎大夫士無脀則亦畧可見矣聘義第四十八正義孔氏穎達曰案鄭目録云名曰聘義者以其記諸侯之國交相聘問之禮重禮輕財之義也此於别録屬吉事此釋儀禮聘禮之義但聘禮謂大聘使卿故經云及竟張旜旜是孤卿所建也此謂侯伯之卿故經云上介奉束錦士介四人皆奉玉錦介凡五人然此聘義所釋包五等之卿故經云上公七介侯伯五介子男三介皆謂其卿也通論吕氏大臨曰交際之義人道之所以羣也其交際也必有相見以結其驩閒於見也必有相問以繼其好自天子至於庶人雖有貴賤親踈逺爾長幼之差其所以相問一也天子之與諸侯諸侯之與隣國皆有朝禮有聘禮朝則相見聘則相問也朝宗覲遇㑹同皆朝也存頫省聘問皆聘也故聘禮有天子所以撫諸侯者大行人一嵗徧存三嵗徧頫五嵗徧省是也有諸侯所以事天子者大行人時聘以結諸侯之好殷頫以除邦國之慝是也有隣國交修其好者大行人凡諸侯之邦交嵗相問殷相聘久無事則聘焉是也聘禮上公七介侯伯五介子男三介所以明貴賤也正義鄭氏康成曰此皆使卿出聘之介數也大行人職曰凡諸侯之卿其禮各下其君二等孔氏穎達曰此篇總明聘義介數不同明貴賤有異皆謂使卿出聘之介數也上公親行則九介其卿降二等故七介侯伯子男以次差之義可知也方氏慤曰上公即九命作伯之上公也王之三公八命而已以其加三公之一命故以上言之周官行人上公介九人侯伯七人子男五人此言七介五介三介者以大聘使卿各下其君二等故也以爵有貴賤則其介亦有多寡故曰所以眀貴賤也通論吕氏大臨曰古者賓必有介介副也所以輔行斯事致文於斯禮者也鄉飲酒之禮主人就先生謀賓介此飲酒之賓介也大行人掌上公之禮介九人侯伯七人子男五人此朝覲之賓介也聘禮上公七介侯伯五介子男三介此聘問之賓介也聘禮上介奉束錦士介四人皆奉玉錦則介凡五人舉侯伯之卿而言之也禮之莭文少則質多則文同則質異則文致其文者乃所以盡其敬也故使人聘於隣國一人将命可矣必有介者以多為文也爵之髙者其介多爵之卑者其介寡以異為文也人臣之義莫大乎敬君敬君莫大乎敬命使之受命不宿於家入境而死以棺造朝介攝其命備豫不虞如此其至不敢以死而棄之則皆不敢質之義也不敢質故致文也葉氏夢得曰周禮上公九介侯伯七介子男五介謂親行之介也禮器言諸侯七介七牢大夫五介五牢所謂侯伯之卿使聘也此言侯伯五介子男三介所謂其使之介也案眀貴賤有二義自本國言之介如命數故上公親行則介九人卿殺其君二等而為七侯伯子男亦各逓減是一義也自列國言之上公之卿七命侯伯之卿降公二等而為五子男亦然又是一義也介紹而𫝊命君子於其所尊弗敢質敬之至也正義鄭氏康成曰質謂正自相當陸氏佃曰言紹則若上公七介皆相繼𫝊命也盖如是而後盡敬父子之間以質為敬君臣之間以文為敬陳氏澔曰紹繼也其位相承繼也先時上擯入受主君之命出而𫝊與承擯承擯𫝊與末擯此是𫝊而下也賓之末介受命於末擯而𫝊與次介次介𫝊與上介上介𫝊與賓是𫝊而上也此所謂介紹而𫝊命也質正也於所尊者不敢正自相當故以介𫝊命敬之至也賓在大門外西北面介自南向北為序主君在内迎擯者自北向南為序案儀禮聘禮注云賓至末介相去三丈六尺上擯至末擯亦三丈六尺賓乃𫝊聘君之命於上擯即此𫝊命時也又此所𫝊之命乃尋常交際之命若因國有故而有言則聘禮記所謂若有言則束帛加書將命如享禮者又在卒聘後事也初時尚未遽及云三讓而后𫝊命三讓而后入廟門三揖而后至階三讓而后升所以致尊讓也正義鄭氏康成曰此揖讓主謂賔也三讓而後𫝊命賓至廟門孔疏三讓而後𫝊命之莭正當賔至主人大門主人請事之時案聘禮賓至大門主人陳介而請事此云廟門有廟字者誤也主人請事時也賓見主人陳擯以大客禮當已則三讓之不得命乃𫝊其君之聘命也三譲而後入廟門譲主人廟受也小行人職曰凡四方之使者大客則擯小客則受其幣聴其辭孔氏穎達曰此明𫝊命時揖譲升階之莭賓既𫝊命之後主君延賓而入至廟将欲廟受賓不敢當之故三譲而後入廟門主君在東賔差退在西相嚮三譲乃入廟門也初入廟門一揖當階北面又揖當碑又揖三揖乃至階也至階主君譲賓升賓譲主君如此者三主君乃先升賓乃升也如此者是賓致其尊譲主人之心也案行人職兩君相見則交擯若臣聘於君則旅擯交擯𫝊命者各鄉本君受命反面𫝊而下及末則鄉受之反面𫝊而上又受命𫝊而下其旅擯之時不上下相𫝊直賓及上擯相對而語亦是𫝊命也聘禮入廟門之時無三譲之文不備也方氏慤曰致尊言主人之尊賓致譲言賓譲而不敢受君使士迎于竟大夫郊勞君親拜迎于大門之内而廟受北面拜貺拜君命之辱所以致敬也竟同境勞去聲正義鄭氏康成曰貺賜也賓致命公當楣再拜聘君之恩恵辱命來聘者也孔氏穎達曰聘禮賓及竟張旜君使士請事遂以入賓至於近郊君使下大夫請行君又使卿朝服用束帛勞此大夫郊勞者即卿也聘禮賓入門左公再拜是君拜迎於大門之内又云及廟門公揖入納賓賓入門左賓升西楹西東面是廟受也君於阼階之上北面再拜拜聘君之貺以聘君之命來屈辱也致敬言主君致敬於聘君方氏慤曰迎於竟則使士勞於郊則使大夫因為之隆殺焉廟受者受使者所銜之命也受必於廟所以致敬也敬譲也者君子之所以相接也故諸侯相接以敬讓則不相侵陵正義鄭氏康成曰君子之相接賓譲而主人敬也吕氏大臨曰𫝊命入門皆三譲三揖至階三譲而升此賓所以敬主人也士迎於竟大夫郊勞君親拜迎而廟受拜貺拜辱此主人所以敬賓也賓主之交爭相為敬譲則暴慢侵陵無自而生交日以親好日以固此兵所以不用民所以休息也方氏慤曰侵言自此以侵彼陵言自下以陵上卿為上擯大夫為承擯士為紹擯君親禮賓賓私面私覿致饔餼還圭璋賄贈饗食燕所以眀賓客君臣之義也覿大厯反還音旋食音嗣下同正義鄭氏康成曰設大禮則賓客之也孔疏凡饗食之屬以賓客禮待之使人延賓於館則主君親待之是賓客其使人也或不親而使臣則為君臣也孔疏主君或不親饗則使人致禮於賓若致饔餼致饗致食及還圭璋贈賄之屬皆主君不親客是臣故使臣敵之是君臣之義也孔氏穎達曰主國之卿為上擯接迎於賓大夫為承擯者承副上擯也士為紹擯者紹繼承擯也聘禮注云主君公則擯者五人侯伯四人子男三人其待聘客及朝賓擯數皆然若擯者五人則士為紹擯者三人四人則士為紹擯者二人三人則士為紹擯者一人君親禮賔者謂行聘已訖君親執醴以禮賓故聘禮賓行聘訖宰夫徹几改筵公出迎賓以入公側受醴公拜送醴是也私面私以已禮而見主國之卿大夫私覿私以已禮覿主國之君以其非公聘正禮故謂之私司儀云諸公之臣相為國客私面私獻注云私面私覿也行聘之日主君使卿致饔餼之禮於賓館賓將去時君使卿就賓館還其所聘之圭璋故聘禮云君使卿皮弁還玉於館是也賄贈者因其還玉之時主人之卿幷以賄而徃還玉既畢以賄贈之故聘禮還圭璋畢大夫賄用束紡是也饗食燕者主君設大禮以饗賓設食禮以食賓皆在朝也又設燕以燕之燕在寝也故聘禮云公於賓一食再饗燕與羞俶獻無常數是也凡此君親禮賓賓用私覿及致饔餼饗食之屬或主人敬賓或賓答主人或君親接客或使臣致之是顯眀賓客君臣之義也吕氏大臨曰主之有擯猶賓之有介擯有三者亦以多為文也大宗伯朝覲㑹同則為上相相即擯也入詔禮曰相出接賓曰擯宗伯卿也故卿為上擯小行人諸侯入王則為承而擯行人大夫也所以接承上擯之事故大夫為承擯士職卑承官之乏以繼其擯之事故士為紹擯聘禮賓卒聘事奉束錦請覿所謂私覿也賓朝服問卿既致命出面如覿幣所謂私面也君命未致使臣不敢以私見其君及其卿卒君事乃得申其私敬也私覿見其君私面見其卿别而言之此篇及覲禮所言私覿私面是也離而言之則私面即私覿亦可為見君如司儀諸公之臣相為國客私獻私面楚公子棄疾見鄭伯以乘馬八匹私面於君是也盖使臣之義則致其君臣之敬於所聘之君主君之義則致其賓主之敬於來聘之臣故公之禮賓及受私覿皆揖譲而進之臣降拜公辭然後升拜賓覿奉束錦總乘馬二人贊入北面奠幣再拜稽首以臣禮見也擯者辭賓出擯者取幣牽馬出請受於賓賓禮辭聼命乃牽馬入設授幣堂上始以客禮見此君臣交致其敬者也既卒聘事然後敢私面私覿此臣獨致其敬者也設三擯以接之親禮以敬之致饔餼賄贈及饗食燕以盡其歡還圭璋以成其信此君獨致其敬者也黃氏震曰半圭曰璋賄以貨言贈以送言通論孔氏穎達曰案聘禮君使卿韋弁歸饔餼五牢注云牲殺曰饔生曰餼又曰飪一牢鼎九設於西階前腥二牢鼎二七設於阼階前餼二牢陳於門西北面東上是也案聘禮餼既為生而左𫝊云餼牽竭矣服䖍云死曰餼者以餼與牽相對牽既為生餼則為死故詩瓠葉篇鄭注云腥曰餼者以牲牢饔餼相對以牲牢既為生饔又為熟故以餼為腥也存疑吕氏大臨曰大行人五人四人三人此王迎朝賓之擯也諸侯之卿各下其君二等則主待聘客之擯上公當三人侯伯二人子男一人矣聘禮聘義皆云卿為上擯大夫為承擯士為紹擯必三人而後備亦舉公禮言之也鄭以王待諸侯之擯為諸侯待賓客之擯恐未然案論語朱注擯用命數之半恐無視聘賓介數逓降之禮故天子制諸侯比年小聘三年大聘相厲以禮使者聘而誤主君弗親饗食也所以愧厲之也諸侯相厲以禮則外不相侵内不相陵此天子之所以養諸侯兵不用而諸侯自為正之具也比必履反使去聲正義鄭氏康成曰比年小聘所謂嵗相問也孔疏大行人諸侯之邦交嵗相問也聘禮記云小聘曰問故知小聘是嵗相問也三年大聘所謂殷相聘也孔疏大行人又云殷相聘也殷中也謂三年之時中而無事故稱殷也此經謂諸侯自相聘也孔氏穎達曰天子立制使諸侯相於比年使大夫小聘三嵗使卿大聘使者行聘之時禮有錯誤則主君不親自饗食所以使賓愧耻自相勸厲天子制此禮使諸侯相親是存養諸侯無兵革之患國家得正由其外親諸侯也吕氏大臨曰使者聘而誤主君不親饗食者聘禮所謂大夫來使無罪饗之過則餼之意也先王御諸侯使之相交以􅁱好必求疏數之中故比年小聘三年大聘也使之相敬以全交必相厲以禮故使者之誤主君不親饗食以愧厲之然後仁達而禮行也通論孔氏穎達曰王制云諸侯之於天子比年一小聘三年一大聘與此不同者此經諸侯相聘是周公制禮之正法王制謂文襄之法故不同吕氏大臨曰王制言諸侯之聘於天子此言諸侯交相聘天子制其禮也案周禮天子十二年乃廵守其十二年中五服諸侯來朝各二卿大聘四大夫小聘六正得䟽數之中則比年一小聘三年一大聘乃諸侯事天子之正法王制所云是也周禮大戴皆言諸侯邦交嵗相問不云比年殷相聘不云三年左𫝊孟僖子如齊殷聘服䖍注云自襄二十年叔老聘於齊至今二十年故􅁱盛聘則諸侯相聘無一定之年可知若諸侯相聘亦必比年三年則卿大夫道長不給矣晉文襄覇諸侯以事天子者事晉非禮也聘義亦因時事為説耳古今惟禮可以養人制諸侯是天子養之也自為正是諸侯自養也相厲以禮正其以禮相養處以圭璋聘重禮也已聘而還圭璋此輕財而重禮之義也諸侯相厲以輕財重禮則民作讓矣正義鄭氏康成曰圭瑞也尊圭璋之類也孔疏言尊此璋同于圭則璋是圭之類用之還之皆為重禮禮必親之不可以已之有遥復之也孔疏言若親往彼國則可以已國所有執往行禮既不親往則不可以已國所有寳玊遙復償他國所來圭璋也財謂璧琮享幣也受之為輕財者財可遥復重賄反幣是也孔氏穎達曰玉以比徳故以圭璋而聘賓将歸時致此圭璋付與聘使而還其聘君也凡行聘禮之後饗君用璧饗夫人用琮加於束帛還圭璋之玉是重其禮㽜璧琮之財是輕其財重者難以報復故以本物還之輕者易可酬償故更以他物贈之是輕財重禮之義通論孔氏穎達曰聘禮圭璋與璧琮相對故圭璋為聘璧琮為享若諸侯之朝天子圭璋與璧琮皆為享也皆為財故小行人合六幣圭以馬璋以皮二王之後享天子用圭享后用璋則雖圭璋亦受之不歸也方氏慤曰以儀禮考之有聘必有饗聘君則以圭聘夫人則以璋饗君則以璧饗夫人則以琮聘先於饗其禮為尊尊之故圭璋特而達饗因於聘其禮為親親之故璧琮有所加焉圭璋固有藻然特藉玉以為禮而已異乎璧琮之加於束帛以為財也故言圭璋特達以此案天子之命圭惟朝天子則執以合符所謂輯五瑞也若諸侯相朝聘則所執者瑑玉其制視命圭而瑑刻之故謂之瑑圭瑑圭八寸與命圭之九寸七寸如其命數者不同此以圭璋聘已聘而還圭璋乃八寸之瑑圭璋也鄭言不可以已之有遥復之論語注執命圭小誤盖命圭必不可以復人亦不可言已有也若六幣之圭璋乃諸侯所以享天子與后者與聘君聘夫人八寸之圭璋又不同以享之圭璋必合幣聘之圭璋則特達而不用幣也主國待客出入三積餼客於舍五牢之具陳於内米三十車禾三十車芻薪倍禾皆陳於外乘禽日五雙羣介皆有餼牢壹食再饗燕與時賜無數所以厚重禮也積子賜反乘䋲證反食音嗣正義鄭氏康成曰厚重禮厚此聘禮也孔氏穎達曰待客三積者謂上公之臣司儀云諸公之臣相為國客則三積注云侯伯之臣不致積也入三積出亦三積故司儀云遂行如入之積是也聘禮致客有饔有餼今直云餼客者畧言之於舍謂於賓館也五牢之具謂飪一牢在賓館西階腥二牢在賓館東階餼二牢在賓館門内之西是皆陳於内也聘禮米三十車設於門東東陳禾三十車設於門西西陳薪芻倍禾鄭注薪從米芻從禾乘禽謂乘行羣匹之禽鴈鶩之屬聘卿則每日致五雙也羣介皆有餼牢者鄭注掌客云爵卿飱二牢饔餼五牢爵大夫飱大牢饔餼三牢爵士飧少牢饔餼大牢也聘卿一為之設食再為之設饗其歡燕與當時之賜無常數凡此備設待賓之物皆所以尊重行聘之禮也凡天子待諸侯之禮及諸侯相待之法賓主玉帛之莭饔餼飧積之差米禾薪芻之多少饗食牲牢之隆殺皆文具掌客義見聘禮吕氏大臨曰上公五積卿下其君二等則三積也三積皆有牢禮米禾芻薪也致積之禮惟諸公之臣有之故聘禮不載案鄭注司儀云侯伯之臣不致積賈疏云但不以束帛致之非無積也積者致重禮於其出入也饔餼者致重禮於其舍館也乘禽二羞俶獻将其勤也饗食燕盡其歡也皆所謂厚重禮也陸氏佃曰據周官侯伯七十雙今曰日五雙雖曰諸侯大夫不應如是之縣也盖日五雙旬而稍所致之禽也據聘禮旬而稍乘禽日如其饔餼之數羣介皆有餼壹食再饗子男一食一饗則上公之使食視子男饗視侯伯其米二十車禾三十車倣此據侯米三十車禾四十車子男米二十車禾三十車燕與時賜無數聘禮謂之俶獻獻言禮賜言義不言禽羞從時賜也葉氏夢得曰餼牢天産陽物也故陳於内米禾芻薪地産隂物也故陳於外饗所以訓恭儉也故至於再燕與時賜以示慈恵也故無數彭氏曰每牢有飪熟之腥殺之餼生之案禮有飯有殽設酒不飲食禮也體薦不食爵盈不飲饗禮也一獻既畢坐飲至醉燕禮也或賜以束紡或賜以金玉時賜也食行於朝饗行於廟以訓恭儉故有數燕行於寝時賜於館以示慈恵故無數此所以盡品莭之宜而結邦交之好也古之用財者不能均如此然而用財如此其厚者言盡之於禮也盡之於禮則内君臣不相陵而外不相侵故天子制之而諸侯務焉爾正義鄭氏康成曰不能均如此言無則從其實也言盡之於禮欲令富者不得過也孔氏穎達曰古之用財不能均平常厚如此言厚則從其豐無則從其實古之用財既有隆殺而相聘之用費如此豐厚者言豐財以行禮盡禮而後用財雖有其財惟盡極於禮不可禮外過用其財也若用財能以禮自制不得過則於國内上下和睦君臣不相陵四隣歸懐外不相侵也故天子制此聘禮諸侯務而行焉吕氏大臨曰古者制國用量入以為出至於國新殺禮凶荒殺禮故有祈以幣更賓以特牲者則用財於賓客不皆如此之厚也然禮存其數将使富而奢汰者不敢過制貧而儉嗇者不敢不盡則盡之於禮此天子所以養諸侯使内外不相侵陵之道也案合考聘義賓禮四一𫝊命二入廟三至階四升堂皆揖譲者所以致尊譲於主君也主禮五一迎竟二郊勞三拜迎四廟受玉五拜貺或使人或親行所以致敬於使臣也有一之未行不可謂之盡禮聘射之禮至大禮也質眀而始行事日幾中而后禮成非强有力者弗能行也故强有力者將以行禮也酒清人渴而不敢飲也肉乾人饑而不敢食也日莫人倦齊莊正齊而不敢解惰以成禮莭以正君臣以親父子以和長㓜此衆人之所難而君子行之故謂之有行有行之謂有義有義之謂勇敢故所貴於勇敢者貴其能以立義也所貴於立義者貴其有行也所貴於有行者貴其行禮也故所貴於勇敢者貴其敢行禮義也故勇敢强有力者天下無事則用之於禮義天下有事則用之於戰勝用之於戰勝則無敵用之於禮義則順治外無敵内順治此之謂盛徳故聖王之貴勇敢强有力如此也勇敢强有力而不用之於禮義戰勝而用之於爭鬭則謂之亂人刑罰行於國所誅者亂人也如此則民順治而國安也乾音干莫音暮齊側皆反觧佳買反長丁丈反有行之行下孟反治直吏反正義鄭氏康成曰勝克敵也或為陳孔氏穎達曰此眀聘禮而兼及射禮也聘射至大之禮非如冠昏之屬暫時即畢也幾近也日近中而后禮成非强有力弗能行也射義云諸侯之射必先行燕禮卿大夫士之射必先行鄉飲酒之禮故燕禮以眀君臣之義鄉飲酒禮以眀長㓜之序此􅀴總括之也故酒清殽乾之屬燕禮與鄉飲酒禮初行之時事同於饗皆若此至脱屨升坐之後乃盡歡飲食也勇敢射之所須强有力聘之所須前文論聘止稱强有力者此􅀴論射則云勇敢也天下無事謂兵革休息故用之於聘射之禮義有事謂軍旅數起故用於戰鬭必得勝也吕氏大臨曰莭文之多惟聘射之禮為然故曰至大禮也質眀行事至於日幾中而禮成酒清肉乾而不敢飲食非心夷氣平强有力而不憚煩則不能也非齊莊中正知所尊敬而不敢􅈈則不能也君臣父子長㓜之義皆形見於莭文之中人之所難我之所安人之所􅈈我之所敬故能行之者君子也君子之自養也養其强力勇敢之氣一用之於禮義戰勝則徳行立矣其養人也養其强力勇敢之氣一用之於禮義戰勝而教化行矣此所以外無敵内順治國之所以安也陳氏祥道曰聘之為禮養諸侯而兵不用射之為禮亦養諸侯而兵不用非强有力不能行之葉氏夢得曰古之所謂勇敢而强者勇於義而已惟其勇於義故能行禮能行禮則習其俯仰而行列得正焉習其進退而坐作得齊焉故施之於戰則無敵者此也所謂盛徳者以其備具而已猶禮器謂大備盛徳是也存疑孔氏穎達曰酒清人渴而不敢飲謂射禮也欲射之時先行燕禮惟以禮獻酬不敢恣意醉飽若行聘禮但酌醴禮賓無酒肴之事故知此惟據射也日晚人倦猶齊莊而自整齊不敢􅈈怠以成就禮之節制此亦謂射禮故下莭云以正君臣以親父子以和長㓜皆謂射也前文云日幾中特謂聘故日幾中而禮成此云日莫謂鄉射禮酒清肴乾特據於射故日莫而成禮節也正君臣者謂射前行燕禮君在阼賓升成拜稽首之屬及受君賜再拜稽首之等也親父子和長㓜者此謂鄉射之前行鄉飲酒之禮有齒於父族之事故云然也吕氏大臨曰射禮未射之前先行獻酬之節故有酒清肉乾而不敢飲食者若聘禮則受聘受饗請覿然後酌醴禮賓無酒清肉乾之事方氏慤曰此聘禮兼言射者賓射亦有射故因而眀之自質眀始行事以下言聘之難行酒清人渴而下言射之難行酒以久故清肉以久故乾揚子言日昃不食肉射又至於日莫者以先行禮而後射故也朱子曰案疏云此雖總結聘然自酒清肉乾日莫成禮父子長㓜之語似據鄉射而言恐鄉射之義失次在此故相因而言與案以上皆大戴本文所有此節大戴無之疑小戴所附益也又案聘後有饗食三禮則饗之酒清肉乾亦有之禮有賓射則因聘而射亦有之但本文語原蕪雜不甚分眀亦不必强為分疏子貢問於孔子曰敢問君子貴玉而賤䃉者何也為玉之寡而䃉之多與䃉武巾反為於偽反與音餘正義鄭氏康成曰䃉石似玉或作玟孔氏穎達曰此以聘用玉因論玉有諸徳而結成聘義之篇與疑辭孔子曰非為䃉之多故賤之也玉之寡故貴之也夫昔者君子比徳於玉焉溫潤而澤仁也縝密以栗知也廉而不劌義也垂之如隊禮也叩之其聲清越以長其終詘然樂也瑕不揜瑜瑜不揜瑕忠也孚尹旁達信也氣如白虹天也精神見于山川地也珪璋特達徳也天下莫不貴者道也詩云言念君子温其如玉故君子貴之也縝音軫知音智劌九衛反正義鄭氏康成曰色柔溫潤似仁也潤或作濡縝緻也栗堅貌劌傷也義者不茍傷人也如隊禮尚謙卑也樂作則有聲止則無也越猶揚也詘絶止貌樂記曰止如槀木瑕玉之病也瑜其中閒美者玉之性善惡不相揜似忠也孚讀為浮尹讀如筠浮筠謂玉采色也采色旁達不有隠翳似信也虹天氣也精神亦謂精氣也山川地所以通氣也特達謂以朝聘也璧琮則有幣惟有徳者無所不達不有須而成也道者人無不由之言念君子言我也貴玉者以其似君子也孔氏穎達曰玉徳溫和柔潤而光澤仁者亦温和潤澤故云仁玉理密緻而堅剛智者亦密緻堅剛故云知廉稜也玉體雖有廉稜而不傷割於物人有義者亦能斷割而不傷物故云義玉體垂之而下墜人有禮者亦謙恭而卑下故云禮以物叩擊其聲清泠發越以長逺擊之終竟聲則詘然而止不如鐘聲擊罷猶有餘音也故似樂美䖏病處不相掩映如人之忠采色彰達著見無隠如人之信白虹謂天之白氣言玉之白氣似天白氣故云天也玉在山川之中精氣徹見於外亦如地氣含藏徹見於外也圭璋特得通達不加餘幣亦同人之有徳不假他物而成也天下貴之與道相似故云道也詩引秦風小戎之篇證玉以比徳也吕氏大臨曰君子不貴難得之貨故玉之貴非以寡䃉之賤非以多也玉者山川至精之所融結其徳之美有似乎君子故君子服之用之所以比徳而貴之也䃉石似玉而非君子賤之如紫之於朱莠之於苖鄉原之於徳也玉氣粹精之所發則溫潤而澤如君子之仁溫厚深醇之氣形諸外也玉理密緻而堅實如君子之知密而不疏則中理堅而不觧則可久也金之有廉雖利也用之則傷玉之有廉雖不利也用之則不能傷如君子之義其威雖若不可犯卒歸於愛人而已玉之體重垂之則如墜而欲下如君子之好禮以謙恭下人為事故曰禮也凡聲滯濁而韻短者石也清越而韻長者玉也始洪而終殺者金也始終若一者玉也此玉之聲所以與金石異也其終詘然所謂玉振之也者終條理也樂之始作翕如至於皦如以成歌止如槀木其合止皆無衰殺之漸則君子於樂其終詘然如玉之聲也玉之瑜者其美也瑕者其病也玉之眀洞炤乎内外瑕瑜不能相揜如君子之忠無隐情善惡盡露而無所蓋故曰忠也玉之眀徹藴於中而達於外猶君子之信由中出也玉之瑩者光氣能達於天所謂氣如白虹也韞諸石中則光輝必見所謂精神見於山川也如君子之達於天則與天同徳充實而有光輝則與地同徳也玉之為璧琮其用也必有幣以將之玉為圭璋特達而已不用幣也如君子之徳無待乎外也莫非物也玉之為物天下貴之莫非道也君子之道天下尊之故曰天下莫不貴者道也陳氏祥道曰古人用玉皆象其美若鎮玉以召諸侯以恤凶荒用其仁齊有食玉用其知牙璋以起軍旅用其義國君相見以瑞相享以璧用其禮樂有鳴球服有佩玉用其樂邦國以玉節用其信琬玉以結好琰圭以除慝用其忠四圭有邸蒼璧以禮天用其能達於天兩圭有邸黄琮以禮地用其能達於地圭璋特達用其能達於徳已饗而還圭璋已朝而班瑞此皆古之為器以用玉之美者也葉氏夢得曰人之大徳曰仁故先溫潤而澤有仁未甞無知故次之以縝密以栗有知矣非義不足以制事故次之以廉而不劌義所以充實乎内禮所以節文乎外故次之以垂之如隊立於禮必成之以樂故次之以其聲清越以長自仁而至成於樂則脩身之至矣可以出而應物故忠者不欺於内外則次之以瑕瑜不相揜也忠以待物而物必信故次之以孚尹旁達也忠信人徳而已人徳備則與天地參故次之以氣如虹精神見於山川也與天地參則歸於徳而退藏於道矣故終之以圭璋特達天下莫不貴也存疑吕氏大臨曰孚尹未詳或曰信發於中謂之孚也信也尹或訓誠亦信也欽定禮記義疏卷七十六
