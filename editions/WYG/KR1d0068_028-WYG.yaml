body:
  text: 文王世子第八之一正義陸氏徳明曰文王周文王昌也以其善為世子之禮故著諡號標篇言可法也孔氏穎逹曰鄭目録云以記文王為世子時之法於别録屬世子法内凡五節第一節論文王為世子之禮下之事上之法自凡學世子以下為第二節論在上敎下釋奠養老及三王敎世子事自庶子之正於公族以下為第三節明庶子正理公族燕飲及刑罰之事自天子視學以下為第四節論天子視學養老并諸侯養老於國之事末一節更明古者尋常世子之法方氏慤曰王制曰諸侯世子世國大夫不世爵故諸侯以上之適子然後名世子此篇主於世子之事而文王之為世子可為後世法故冠之於首且以名篇王氏炎曰首言文王為世子之事故以武王成王為世子事繼之成王幼周公輔導有道故以教世子之法繼之世子當貴親當敬老故以待宗族養老繼之而終以世子之記見文王之事王季皆所當法也文王之為世子朝於王季日三雞初鳴而衣服至於寢門外問内豎之御者曰今日安否何如内豎曰安文王乃喜及日中又至亦如之及莫又至亦如之其有不安節則内豎以告文王文王色憂行不能正履王季復膳然後亦復初食上必在視寒煖之節食下問所膳命膳宰曰末有原應曰諾然後退朝音潮衣去聲豎音樹莫古暮字正義鄭氏康成曰三皆曰朝以其禮同也内豎小臣之屬掌外朝之通命者御如今小史直日者文王乃喜孝子恒兢兢也又復也莫夕也節謂居處故事履蹈地也復膳飲食安也復初憂解也在察也問所膳問所食者末猶勿也原再也勿有所再進為其失飪臭味惡也退反其寢也孔氏穎逹曰朝曰朝莫曰夕朝禮具夕禮簡世子恒日二朝今文王增一時又皆稱朝並是聖人法也食上謂獻饌食下謂食畢徹饌而下命後進食皆須新好若再進必熟爛過莭而氣與味皆惡矣方氏慤曰内則言雞鳴盥潄昧爽而朝此雞鳴而至寢門外是盥潄猶未雞鳴而朝猶未昧爽又有日中之朝焉無時不心乎親也乃喜親喜而已亦喜也色憂親憂而已亦憂也夫人之安否尤見於飲食之際故其復常也必以膳為言寒煖之節若食齊視春時飲齊視冬時問所膳欲知親之好羞也劉氏彝曰文王受命惟中身則五十以前猶為世子自成童至知命克盡其性以事親故其以篤誠為本者他聖所同以備物為實者雖舜有弗逮也夜不遑寐故雞鳴而至以其達旦懐憂故知其安而喜形於色有不安莭則心有所懼而色形其憂急侍其親并履不能正盖聖人盡其性以事其親無所入而不為極也徐氏師曾曰聖人之行過人而得中也復初以上問安之禮食上以下視膳之禮通論莊氏夏曰父子之間舜處其不幸文王䖏其幸要文王之心日以兢兢者與舜之䕫䕫齊栗曷以異以乃喜而知其心之憂也憂如此而謂之無憂乎曰文之憂惟憂其不安莭耳舜則無時不憂也故觀舜之憂而後知文王之無憂而後知舜之大孝舜與文王易地則皆然武王帥而行之不敢有加焉文王有疾武王不説冠帶而飬文王一飯亦一飯文王再飯亦再飯旬有二日乃間文王謂武王曰女何夢矣武王對曰夢帝與我九齡文王曰女以為何也武王曰西方有九國焉君王其終撫諸文王曰非也古者謂年齡齒亦齡也我百爾九十吾與爾三焉文王九十七乃終武王九十三而終帥率通説讀脱飬去聲飯音反有二之有讀又閒去聲女讀汝九齡陸徳明作九聆皇侃作九鈴正義鄭氏康成曰帥循也庶㡬程式之不説冠帶言常在側也一飯再飯欲知氣力箴藥所勝猶瘳也問何夢間後容臥也帝天也撫猶有也年天氣也齒人夀之數也君子曰終終其成功孔氏穎達曰間空隙也病重之時病恒在身至瘳乃有空隙劉氏彝曰聖人所行莫非盡其性也盡其性以事其親又何加焉莊氏夏曰天下之理惟極其至則不可以復加文王之事親豈有一毫之不至哉武王而復求加則非可傳也非可繼也故武王不敢有加存疑鄭氏康成曰言君王受命之後也九齡九十年之祥也文王以勤憂損夀武王以安樂延年言與爾三者明傳業於汝汝受而成之孔氏穎達曰書傳文王受命一年質虞芮之訟二年伐鬼方三年伐宻須四年伐犬夷五年伐耆六年伐崇七年而崩鄭注紂聞文王三伐勝畏惡之囚於羑里在四年末五年初猶未稱王六年伐崇則稱王故詩曰是類是禡行天子禮也受命謂受赤雀丹書之命西方九國㦯以為庸蜀𦍑髳微盧彭濮之徒年夀之數賦命自然不可延之寸陰不可減之晷刻此云與汝三者示其傳基業於武王欲使成其所傳之業此乃教戒之義孫氏佖曰大戴云文王十五生武王少文王十四嵗文王之崩武王已八十三矣明年即君位又明年服畢觀兵孟津又二年克殷有天下年八十有七明年有疾弗豫周公作金縢又五年王崩年九十三凡在王位七年也莊氏夏曰文王直以年齡告欲使武王知我之享年如此女之享年又如此天命未寢以是釋武王之憂也非武王愛親之切不足以召上帝之夢非文王與天為一不足以知上帝之誠徐氏師曾曰不說冠帶視不滿容一飯再飯視不能飽辨正胡氏銓曰先儒謂伐崇行天子禮則文王與紂為二王矣安得云以服事殷乎書曰文王受命惟中身案蔡氏集注云受命謂受天子之命為諸侯也與受命稱王説不同厥享國五十年是五十乃受命受命以後五十年乃崩則百年也今云受命七年而崩已自謬矣又云受命稱王妄可知也人之老折天定其數今曰吾與爾三是不知命非文王之言也陳氏澔曰數之脩短稟氣於有生之初文王雖愛其子豈能減己之年而益之㦲好事者為之辭而不究其理讀記者信其説而莫之敢議也案注家謂文王年十五生武王而武王尚有兄伯邑考文王生子不太早與武王九十三乃終而成王尚㓜不能涖阼武王生子不太晚與且文王十五生武王文王薨年武王已八十三又十三年大會孟津伐紂則九十六又七年崩則百有三嵗矣竹書紀年作武王年八十四而金履祥引入通鑑則以為五十四孔氏所云征伐諸國之年攷之他書多不合也至於帝與九而文王曰吾與爾三并附㑹亦有難通者此直傳聞之誤削而不論可矣至於鄭氏勤憂損夀之説尤不可訓無逸之篇明言生則逸惟耽樂是従此之不克夀矣可反以憂勤為戒乎若夫聖人之􅁱徳永年與子臣之求代其君父則至誠之道原有與天地相通者正不得以􅂽幻之説雜之也成王幼不能涖阼周公相踐阼而治抗世子法於伯禽欲令成王之知父子君臣長幼之道也成王有過則撻伯禽所以示成王世子之道也相去聲治令皆平聲長上聲正義鄭氏康成曰踐履也代成王履阼階攝王位治天下也抗猶舉也謂舉以世子之法使與成王居而學之以成王之過撻伯禽則足以感喻焉孔氏穎達曰舉世子之法於伯禽欲令成王觀而法之使知父子君臣長幼之道若成王法效伯禽不能備具而有過失則笞撻伯禽責其不能以禮敎成王也方氏慤曰於伯禽言法於成王言道法下之所守道上之所揆馬氏睎孟曰成王幼不能行人君之事則百官總己以聽於冢宰禮之常也成王雖有君道不能涖阼則猶未離乎世子故抗世子法於伯禽使成王知世子之道禮之權也劉氏彝曰伯禽行世子事父之禮於周公以觀化成王其撻伯禽用以為成王之愧恥也通論許氏曰世子之道於職則子於位則臣於齒則幼知為人子然後可以為人父知為人臣然後可以為人君知事人然後能使人成王既即天子位為人君而為子為臣為幼之道皆未聞周公以輔相之職處師保之位可無術以䖏此乎是以抗世子法於伯禽使與成王居以相觀而善非特伯禽一時若夑父呂伋王孫牟皆子弟之賢也故俱得以入衞於王周官師氏掌以媺詔王保氏掌諫王惡皆以敎國子為軄莫嚴於師保莫親於國子嚴則有所憚而親則易以䙝使朝夕與王居者皆伯禽若也則王誰與為不善而師保之軄亦不勞而舉矣大臣格君心之非其周公之謂乎存疑鄭氏康成曰涖視也不能視阼階行人君之事方氏慤曰涖言以位臨之踐言以足履之成王主也故於阼曰涖周公相之而已故於阼曰踐此輕重之别也案踐阼者謂成王不能涖阼周公相王踐之也孟子踐天子位以為天子言與涖字何别方氏强為之説文王之為世子也正義鄭氏康成曰題上事存異孔氏穎達曰武王成王之為世子皆法文王故以文王之為世子結之陳氏澔曰見伯禽所行乃文王為諸侯世子之禮非王世子之禮案古文每篇之末必有篇題鄭氏所注是也凡學世子及學士必時春夏學干戈秋冬學羽籥皆於東序小樂正學干大胥賛之籥師學戈籥師丞贊之胥鼓南春誦夏弦大師詔之瞽宗秋學禮執禮者詔之冬讀書典書者詔之禮在瞽宗書在上庠學竝音效學禮之學如字正義鄭氏康成曰學士謂司徒論俊選所升於學者四時之敎各有所宜干盾也戈句孑㦸也干戈萬舞象武也用春夏動作之時學之孔疏盾捍也干盾所以捍難公羊𫝊萬者何干舞也以其用干故知象武若其大武則以干配戚明堂位朱干玉戚冕而舞大武是也若其小舞則周禮樂師敎小舞干舞是也春時萬物孚甲象干夏氣壮盛枝葉似㦸春夏陽氣發動故云用動作之時羽籥籥舞象文也用秋冬安静之時學之孔疏羽翟羽秋則體成文章也籥笛也籥聲出於中冬則萬物藏於中也公羊傳籥者何籥舞也以其不用兵器故象文秋冬凝寒故云安静之時詩云左手執籥右手秉翟小樂正四人皆樂官之屬通職秋冬亦學以羽籥孔疏周禮籥師掌教國子舞羽龡籥樂師敎小舞則六舞皆敎故知通職秋冬時亦教羽籥也小樂正樂師也孔疏周禮有大司樂有樂師故知小樂正即樂師此經雜有諸侯禮盖諸侯謂之小樂正天子謂之樂師也周禮樂師掌國學之政敎國子小舞孔疏引以證樂師有敎舞之事小舞年㓜小時敎以舞即帗舞羽舞皇舞旄舞干舞人舞也大胥掌學士之版以待致諸子春入學舍菜合舞秋頒學合聲孔疏引以證大胥有敎樂之事諸子學士也春時入學釋蘋藻之菜以禮先聖先師合六舞節奏秋時頒布學者才藝和合音聲使應曲折籥師掌敎國子舞羽吹籥孔疏籥師有教樂之事周禮惟有籥師此言丞或諸侯之禮或異代之法胥掌以六樂之會正舞位詩以雅以南以籥不僭孔疏胥謂大胥誦謂歌樂也孔疏口誦歌樂之篇不以琴瑟弦謂以絲播詩孔疏以琴瑟播樂章之音節陽用事則學之以聲陰用事則學之以事因時順氣於功易成也孔疏春夏是陽陽主輕清故學聲秋冬是隂隂主體質故學事因四時所宜順動静之氣於學功業易成也周立三代之學學書於有虞氏之學典謨之敎所興也學舞於夏后氏之學文武中也學禮樂於殷之學功成治定與己同也孔疏立虞之學在國兼在西郊夏殷之學亦在國鄭注儀禮又云立四代之學於國者合周而言也虞書有典有謨故就其學敎之夏后氏上承舜禪是文下有湯伐是武在二者之間湯放桀武王伐紂殷周革命事類相似也先師以為三代學皆立大學小學今案下飬老於東序是周之大學又王制云養老於虞庠是周之小學孔氏穎達曰此以下為第二節盧植以為春敎干夏敎戈秋敎羽冬敎籥但干與戈羽與籥舞時相對之物皇氏謂秋冬羽籥同敎春夏干戈同敎義或然也此皆據年二十升大學者言之若其未升大學之時則春誦夏弦在殷之瞽宗也張氏曰南二南也以鼓莭之曰鼓南陸氏佃曰周官羽舞無籥象文徳之小者以為儀干舞無戚象武事之小者以為扞而已文舞小曰羽舞大則謂之籥武舞小曰干舞大則謂之萬鄭氏孫毓皆謂萬舞惟干無羽籥舞惟羽無干是不知文必有武備武必有文輔之意也干戚一舞故以一官敎之干戈兩舞故各以其官敎之干戚大舞故敎以大樂正干舞小故敎以小樂正戈舞尤小故以籥師敎焉周官有干舞又有兵舞兵舞即戈舞也五兵一曰戈故以名之觀司干授干而小樂正敎之司戈授戈而籥師敎之則干舞戈舞為二可知而先儒謂小舞以干配戈謬也劉氏敞曰周人立四代之學直謂一處竝建四學耳周曰辟雍則辟雍最居中其北為有虞氏之學其東為夏后氏之學其西為商人之學當學干戈羽籥者就東序學禮者就瞽宗學書者就虞庠其辟雍惟天子養老出師成謀與受俘大射就焉當天子至於辟雍則三學之人環水而觀矣案辟雍之制與明堂同尚有南一區為周之東膠故又曰五學又以虞之庠建之於鄉故鄉有庠案學記言黨有庠此或據鄉飲酒義迎賔庠門之外也以夏之序建之於州故州有序以商之校建之於黨故黨有校案左𫝊鄭人㳺於鄉校當云黨有庠鄉有校皆為小學以敎童子而已擇小學之秀者案由家塾出移之庠庠之秀者升之序序之秀者升之校校之秀者升之大學大學在郊案五百家為黨二千五百家為州萬二千五百家為鄉至命鄉論秀士則升之司徒矣盖由郊學升乃入國學而大樂正敎之以周包四代之學故記禮者紛紛所指之體偏也案先儒論學惟此為備特遺東膠耳陸氏佃謂辟雍周學在中成均黄帝學在南上庠虞學在北東序夏學在東瞽宗殷學在西以南不可缺故以成均補之不知王制明言周人養國老於東膠與虞庠對則與虞庠對者必東膠而董子言成均五帝太學則成均必居中即辟雍也胡氏銓曰三代皆立大學小學則周别有大學小學矣非虞庠東序案此以駮孔氏東序周大學虞庠周小學之說小學在公宫南之左及家有塾小學也辟雍大學也然對小學言則東序虞庠已大對辟雍言則猶小如治朝可言内亦言外也劉氏彝曰春誦敎國子以樂語興道諷誦言語者也夏弦敎國子以六律六同五聲八音以合樂而以弦為首也春者陽氣宣吐以生萬物故宜誦以宣其中和之聲夏者陽氣盛大以壯萬物故宜弦以極其純粹之致皆太師之職以敎國子者也方氏慤曰誦者人也人事始於東弦者絲也絲音屬於南禮者體也體之文成於西書者事也事之質辨於北此四時所以别也馬氏睎孟曰士者徳之已成然後入大學而世子者不必其徳之成此貴賤之别也胥鼓南以上大學之法春誦以下小學之法禮由陰作而秋屬物之所歛亦陰書以道事而冬屬物之所蔵亦事此春夏學干戈秋冬學羽籥與王制春秋敎禮樂冬夏教詩書皆在大學敎詩書禮樂未嘗不教干戈羽籥互見耳徐氏師曾曰干戈兩舞也故各以其官之敎者焉皆大師詔之因陽用事敎以聲也秋冬不特敎羽籥也又學禮讀書因陰用事敎以事也樂於瞽宗樂之祖也禮亦在焉禮樂一道也書在上庠書始唐虞也通論劉氏彝曰周官大司樂掌成均之法以治建國之學政而合國之子弟焉以樂徳敎國子中和祗庸孝友以樂語敎國子興道諷誦言語以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武而舉三者之教各有其時則所習之業與隂陽合徳内足以正國子之性情外足以養國子之形氣藝順於天性而與時偕行則罔有志於學而弗成就者矣夫六代聖王神其徳行以成變化以參天地以和神人樂與舞存焉耳國子由其舞以志厥功由其聲以想厥徳然後中和生於誠明而志氣趨於聖智故孝友形於中而舞蹈應於外遜於五品無所入而不自得矣陳氏祥道曰王制敎造士則其才嚮於有成其敎之也易故先其難者而以詩書後禮樂文王世子教貴驕之世子則其性誘於外物其敎之也難故先其易者而以干戈羽籥先禮樂詩書又曰周之時干戈羽籥在東序弦誦與禮在瞽宗書在上庠言學之事始乎書立乎禮成乎樂而舞又樂之成故大司樂言樂徳樂語而終於樂舞樂師言樂成而終於皋舞孟子言仁義知禮之實而終於樂之手之舞之也又曰詔樂於瞽宗而又言禮在瞽宗言樂而禮在其中矣故周官禮樂同掌之春官而禮記禮樂同詔之瞽宗葉氏夢得曰以聲對舞舞動而聲靜故春夏學干戈秋冬學羽籥以聲對事又聲動而事静故春夏敎詩樂秋冬敎禮書經能達其所有不能予其所無故干戈以動其容羽籥以和其心周旋進退而自得其性命之理此所以散在四時之閒以先乎四敎者也然則干戈羽籥小學之敎所以成始獨主乎樂詩書禮樂大學之敎所以成終備習乎經惟其習經也故樂嫌於舞之無聲則言弦禮以道行則言學書以道政則言讀弦在東序東膠順陽也禮在瞽宗書在上庠順陰也虞殷主陰夏周主陽周兼四代東立序干戈羽籥皆敎於此而周之東膠與竝立焉西立庠書敎於此而殷之瞽宗與竝立焉庠序瞽宗皆其學名而詔不同位所以順地春夏秋冬皆其時序而教不同術所以順天存疑孔氏穎達曰武舞大者以干配戚小者以干配戈陸氏佃曰武舞干之上覆以羽文舞羽之下戴以干實一而已存異鄭氏康成曰南南夷之樂也旄人敎夷樂則胥以鼓莭之孔疏鉤命決云東夷之樂曰昧南夷之樂曰南西夷之樂曰朱離北夷之樂曰禁南一名任旄人教國子南夷樂之時大胥則擊鼔以節南樂故曰胥鼔南周禮旄人教夷樂以籥舞之進旅退旅不有僭差舉南樂則四夷之樂皆教之辨正陳氏祥道曰南所謂象箾南籥非鄭康成所謂南夷之樂也周禮鞮鞻氏掌四夷之樂旄人教舞夷樂則夷樂固鞮鞻氏所掌旄人所教非大胥小胥之職也陳氏曰南亦雅樂名猶樂章之有九夏盖南與夏皆屬文明之方先王之樂以中聲為莭則溫和而明達故曰夏曰南若如鄭說以南為夷樂安得不僭哉近世沈括鄭樵説周南召南亦云南是樂名其說頗近程氏迥曰詩以雅以南以籥不僭左傳象箾南籥杜預釋左云南籥當為文樂劉炫釋詩云當如周南未敢正指為二南也夫周備六代之樂韶夏􅇴武竝列何獨取夷樂以配文王之象舞且四夷獨取其一與箾之舞象籥之奏南明是文王之詩矣案萬者舞之總名武用干戚文用羽籥朱子為確干舞戈舞為二陸氏為確但陸氏干上覆羽羽下戴干之說反混文武二舞為一恐未然凡祭與養老乞言合語之禮皆小樂正詔之於東序正義鄭氏康成曰養老乞言養老人之賢者因從乞善言可行者也合語謂鄉射鄉飲酒大射燕射之屬也鄉射記曰古者於旅也語小樂正學以三者之威儀也孔疏一祭二養老乞言三合語之禮孔氏穎達曰此至論說在東序論敎世子及學士之事兼明所敎之官所敎之地及司成考課之法也合語謂合㑹義理而語說也鄉射四者固有合語其實祭末及養老亦皆合語也陳氏祥道曰下經云釋奠於先老遂設三老五更羣老之席位及既歌而語以成之此凡祭豈釋奠與養老豈老更羣老與合語豈徳音之致與方氏慤曰於東序則以先老之所在而敎有所本故也後儐於東序適東序與此同意通論劉氏彛曰祭謂祀天神祭地祗饗宗廟之禮凡九獻自始至終其儀百出禮意深逺苟不素習其儀講其義則違誤必多非所以致敬也養老有國之大敎以敎天下之為人子為人弟既憲其徳又乞其言合語謂鄉飲鄉射大射燕射祭饗燕賓自鄉黨上至朝廷莫不行之有貴賤之禮以明君臣有尊卑之禮以明父子有長㓜之禮以明兄弟有陰陽之禮以明夫婦有賓主之禮以明朋友聖人所以育萬物贊天地永國命於無疆者莫不以人倫為本行此數者齊莊整肅而於旅酬之時歡樂之情通而語言之義合此君臣所以和同誠意所以浹洽也案本篇前後文義則此祭指釋奠於先聖先師及先老也乞言合語皆養老事陳氏得之餘說作推論則可耳大樂正學舞干戚語説命乞言皆大樂正授數大司成論説在東序學音效正義鄭氏康成曰戚斧也語說合語之説也葉氏夢得曰三者小樂正詔其威儀而至於度數則大樂正授之干戚則有俯仰之數合語則有進退之數乞言則有升降之數陳氏祥道曰數則可陳義為難知豈淺識之士所能與哉王氏炎曰大樂正授數所謂樂正司業也大司成所謂父師司成太傅在前少傅在後入則有保出則有師以成世子之徳者也鄭氏以為司徒之屬師氏誤矣論說即所授之數為講論而詳說之習其事不明其義誦其言不明其指與不學無異大司成所以必為之論説也馬氏睎孟曰數與儀淺而易見故小樂正詔以三者之儀大樂正授以三者之數皆於先義則深而難知故司成論説在後欲學者由淺而至於深也吳氏澄曰言大樂正授數又言大司成論說者盖授數猶未離乎業論說始可言成也徐氏師曾曰上言祭此不言祭樂舞原為祭設也存疑鄭氏康成曰數篇數論説課其義之深淺才能優劣大司成司徒之屬師氏也孔疏以其掌敎故知為司徒之屬以後言父師司成書傳大夫為父師師氏中大夫故知為師氏師氏掌以􅍇詔王敎國子以三徳三行孔疏周禮一至徳以為道本二敏徳以為行本三孝徳以知逆惡一孝行以親父母二友行以尊賢良三順行以事師長及國中失之事也孔疏中謂中禮失謂失禮孔氏穎達曰前小樂正既敎以三者之威儀今大樂正又教以三者之義理案禮有儀有數有義儀者進退登降之儀數則其髙下疾徐之節小樂正既詔告其威儀大樂正又授之以莭度於業習矣然此當然之則皆有所以然之故焉知其然而不知其所以然可乎故又必加之以論説也鄭以數為篇數以論説為考課其才能之優劣似皆未當孔以授數為教義理則與論説無異凡侍坐於大司成者逺近閒三席可以問終則負牆列事未盡不問閒如字或去聲正義鄭氏康成曰閒猶容也容三席則得指畫相分别也席之制廣三尺三寸三分則是所謂函丈也終則負牆却就後席相辟也孔疏辟後来問者列事未盡而問錯尊者之語不敬也孔疏必待尊者言終如有不曉然後更問孔氏穎達曰此論國子侍坐於大司成之儀方氏慤曰可以問以其聲足以相聞又不至於太逼也陸氏佃曰負牆致竦敬也董氏應暘曰此尋常侍坐時故曰凡非專論說時也終則負牆便人之問列事未盡不問黙而識之靜以審之凡學春官釋奠於其先師秋冬亦如之正義鄭氏康成曰官謂禮樂詩書之官周禮曰凡有道者有徳者使敎焉死則以為樂祖祭於瞽宗孔疏周禮大司樂文此謂先師之類若漢禮有高堂生孔疏漢儒林傳高堂生魯人漢興為博士傳禮十七篇樂有制氏孔疏制氏以雅樂聲律世為樂官頗能記其鏗鏘鼔舞不能言其義詩有毛公孔疏毛公趙人治詩為河間獻王博士書有伏生孔疏伏生濟南人秦時博士漢孝文時以書救於齊魯之間億可以為之也孔疏億發語聲言此等人後世亦可以為先師也人王氏曰古所謂先師今不知其人鄭氏以漢為比爾不言夏夏從春可知釋奠者設薦饌酌奠而已無迎尸以下之事孔疏奠置於地無飲食酬酢之事不迎尸者以主於行禮非報功也孔氏穎達曰此論四時在學釋奠之事敎書之官冬時於虞庠釋奠於先代明書之師敎禮之官秋時於瞽宗釋奠於先代明禮之師春誦夏弦則大師釋奠敎干戈則小樂正籥師釋奠皇氏侃曰其敎雖各有時其釋奠則四時各有其學而行之案敎者自致其尊師重道之意亦使學者知師嚴道尊也餘論魏氏了翁曰古者民以君為師仁鄙夀夭君實司之而臣則輔相人君以師保萬民者也自孔子以前曰聖曰賢有道有徳則未有不生都顯位没祭大烝者此非諸生所得祠也自君師之職不修學校廢井牧壊民散而無所繫於是始有師弟子羣居以相講授者所謂各祭其先師疑秦漢以来始有之而詩書禮樂各有師不能以相通則秦漢以前之為士者斷不若是之隘也此亦可以觀世變矣凡始立學者必釋奠於先聖先師及行事必以幣正義鄭氏康成曰謂天子命之敎始立學官者也孔疏知非天子始立學者下廣言有國故據諸侯也先聖周公若孔子孔氏穎達曰始立學重故及先聖四時常奠輕惟及先師若天子視學必及先聖也始立學用幣四時常奠不用幣陳氏祥道曰徳之小者親而不尊故其祭數故四時釋奠止於先師徳之大者尊而不親故始立學乃祭先聖宗廟郊社之疏數亦然方氏慤曰可為師者不必聖聖則師可知董氏應暘曰先聖是作者先師是述者必用幣加禮也通論孔氏穎逹曰天子立虞夏殷周四代之學若諸侯則立時王一代之學若賜則得立東序大功徳如魯則得立三代之學陳氏祥道曰學之釋奠春官及秋冬此常時也始立學天子視學出征反以訊馘告此非常時也釋奠有牲幣有合樂有獻酬曾子問凡告用牲幣及此皆用牲幣之證也釋奠必有合此合樂之證也聘禮一人舉爵獻從者行酬此有獻酬之證也然山川廟社必有牲幣學非始立不必有幣也學之釋奠有合樂山川廟社不必合樂也聘禮釋奠有三獻天子諸侯於山川廟社不止三獻此又其異也存疑劉氏彝曰虞庠以舜為先聖夏學以禹為先聖殷學以湯為先聖東膠以文王為先聖各取當時左右四聖成其徳業者為之先師以配享焉此天子立學之法四時率國子舞而奠幣所以致誠而效法之也案鄭於先師惟以漢人為比於先聖言周公若孔子於下有國故言若唐虞有䕫龍伯夷周有周公魯有孔子則所謂先聖先師大約係能敎之人未必是帝王且地異而時不同未必定某為先聖某為先師如劉氏說也記曰祀先賢於西學賢者師與聖之統名其祀之總在西學又未必五學各有一先聖數先師也唐初以周公為先聖孔子為先師後従房喬議改孔子為先聖顔淵為先師至明嘉靖改孔子為至聖先師而先聖先師合為一矣至三皇五帝唐𤣥宗嘗立廟京師元成宗立三皇廟於府州縣嘉靖閒於文華殿奉皇師伏羲神農軒轅帝師堯舜王師禹湯文武皆南向先聖周公先師孔子東西向則先聖先師之號又分然而孔子之祀自國學以及天下州縣皆行而聖師惟春秋開講親行釋奠禮用羮酒果脯束帛而已其輕重迥不侔也凡釋奠者必有合也有國故則否正義劉氏彝曰合謂合樂春釋菜合舞秋頒學合聲此并合之以侑神故謂凶札師旅陳氏祥道曰必有合合舞與聲有國故則否與國有大故去樂意同存異鄭氏康成曰國無先聖先師則釋奠者當與鄰國合孔疏非謂就他國祭之謂彼此二國共祭此先聖先師耳有國故若唐虞有䕫龍伯夷周有周公魯有孔子則各自奠之不合也孔疏是國故有此人不須與鄰國合辨正朱子曰以下文考之有合當為合樂從陳說國故當為喪紀凶札之類凡大合樂必遂養老正義鄭氏康成曰大合樂謂春入學舎菜合舞秋頒學合聲是時天子則視學焉孔疏周禮合舞合聲無天子視學之文據月令季春大合樂天子親徃視之通論葉氏夢得曰天子一入學而所敎者三釋奠敎其重道也合樂敎其崇徳也養老教以致孝也三代盛時貴㳺子弟皆能秉禮出封於外足以禦亂食采於内足以助治此道素行也陳氏澔曰常事合樂不養老惟大合樂人君視學則行養老存疑鄭氏康成曰遂養老用其明日也鄉飲鄉射禮明日乃息司正徴惟所欲以告於先生君子可也是養老之象類孔疏先生謂致仕者君子謂鄉中有徳行者皆是老人辨正陳氏祥道曰後言天子視學遂適東序養老則視學養老皆同日也鄭氏謂用其明日誤矣凡語於郊者必取賢斂才焉或以徳進或以事舉或以言揚曲藝皆誓之以待又語三而一有焉乃進其等以其序謂之郊人逺之於成均以及取爵於上尊也正義鄭氏康成曰語謂論説於郊學大樂正論造士之秀者升諸司馬曰進士謂此徳進事舉言揚也曲藝謂小技能也誓謹也皆使謹習其事又語後復論說也三説之中有一善則取之以曲藝不必盡善也進之於衆學者之中以其藝為次俟事官之缺者代之不曰俊造而曰郊人以技藝故賤之也董仲舒曰五帝名大學曰成均孔氏穎達曰此明官爵於學士已成者人能不同各隨才用徳謂有道徳者進之宜先事謂解世事或吏治亦舉用之又次而能言語堪使命則亦揚之揚亦舉也曲藝若醫卜之屬雖無前三事而有曲藝又令謹習以待又試三事有一善則亦進之然終不得與俊造為一也餘論黄氏乾行曰於此見先王立賢無方而不求備於人曲成不遺而又明著其等此人才所以盛也案郊四郊之學所謂東膠東序瞽宗虞庠也語於郊王制所謂司徒論選士之秀也以徳進事舉言揚將升諸司馬又用為鄉遂之吏也曲藝執技以事上者待又語不與上語於郊同日也曲藝則賤矣不得與士齒而於徳事言三者之中或有一節之可取則亦於曲藝中進其等以鼓勵之不以藝成而下棄之也成均謂俊士由司徒論定而升於國學者取爵於上尊謂鄉以賔禮升之司徒者謂之郊人不稱士逺之於俊選二士也存疑鄭氏康成曰成均則虞庠近是孔疏以無正文故云近是天子飲酒于虞庠則郊人亦得酌于上尊以相旅孔疏凡飲酒之禮尊者酌堂上之尊卑者酌堂下之尊故特牲禮主人獻賔及衆賔長兄弟俱酌堂下之尊以相旅此郊人雖賤於天子成均飲酒亦得酌上尊以相旅以榮之孔氏穎逹曰待後復論說若春待秋時辨正吳氏澄曰鄉學之秀士已升於司徒為選士者於天子視學飲酒之時得取爵於堂上之尊以相酬又升於太學為俊士者則謂之成均之士曲藝雖已進等然猶在郊學未得與國學者齒是逺之於成均并未及與升於司徒者得取爵於上尊也郝氏敬曰成均俊士司馬所論者郊人乃執技以事上者出鄉不與士齒安得取爵於上尊案成均為五帝太學在周即辟雍也鄭以為虞庠誤矣祭祀之上尊以尊神也故旅酬雖賓不得取上尊燕飲之上尊以尊賓也鄉當賓興之時則升於司徒者乃得用上尊豈有天子飲酒於成均而此郊人亦取上爵以相酬如鄭説者又此郊是四郊之鄊學先語之而舉其賢者才者而升之矣若醫卜射御有一可取則誓戒之期而考試春秋皆於辨論秀士後行之非春又待秋秋又待春如孔氏說也始立學者既興器用幣然後釋菜不舞不授器乃退儐於東序一獻無介語可也興鄭讀釁正義鄭氏康成曰興當為釁禮樂之器成則釁之孔疏據雜記文知當讀釁禮樂之器成用幣告先聖先師以器成又釋菜告先聖先師以器成有時將用也釋奠禮重釋菜禮輕釋奠則舞舞則授器司馬之屬司兵司戈司盾祭祀授舞者兵也言乃退者謂得立三代之學者釋菜於虞庠則儐賓於東序若魯有米廩東序瞽宗也孔疏諸侯惟立時王之學何得有東序故知有功徳者得立三學如魯也束序在東虞庠在西相對既退儐於東序知釋菜在虞庠也孔氏穎達曰天子命諸侯始立學又造禮樂之器既畢乃用幣告器成告後更釋菜告其將用也釋幣禮重作樂須舞故授舞者所執干戈之器今釋菜時既不舞則亦不授舞者之器矣釋菜禮畢乃禮賓於序之中其禮既殺惟行一獻無介無語於禮亦可也此釋菜及學記皮弁祭菜皆及先聖徐氏師曾曰告器將用其事本輕故禮之行於神者既簡則行於人者不得不簡也通論熊氏安生曰釋奠有六始立學一也四時各一則五王制師還則六釋菜有三春入學合舞一也此興器二也皮弁祭菜三也秋頒學合聲無釋菜之文則不釋菜也釋幣惟一此興器用幣是也用幣則無菜用菜則無幣皇氏侃曰用幣釋菜祇是一告歐陽氏脩曰釋奠有樂無尸釋菜無樂陳氏祥道曰釋菜猶贄也婦見舅姑贄以棗栗腵脩若沒而廟見則釋菜弟子見師贄以束脩若禮先師則釋菜而士喪禮君視斂釋菜入門占夢季冬舎萌於四方舍萌釋菜也鄭謂昏禮釋菜當用堇荁據内則子事父母為說也入學釋菜用芹藻據詩泮為說也陳氏暘曰釋菜小以食為主釋奠大以飲為主存疑陸氏佃曰始立學必制器言興非因舊之辭黄氏震曰諸輕多言舍采采即幣也說者謂用幣禮重釋菜禮輕恐無一時輕重竝行與先行重禮方正行輕禮之理陳氏以女贄為比男女異贄何為同以菜乎事師之禮至微猶以束脩為貧不能備禮也豈國家立學而不能備禮乎詩言蘋蘩薀藻乃婦人助祭之末非君子祭禮之正此恐漢人沿誤以采為菜爾案春合舞禮及吕覽本文作舍采然古人采與菜通用禮有舍菜不得謂誤也此節用幣或君親之或有司為之釋菜則學子之事初非一時竝用也考祭則有尸有牲有幣有樂釋奠則無尸釋幣幷無牲釋菜幷無幣然脯醢之屬未嘗無也朱子釋菜儀邉用脯果豆用笋韭然則不言脯祭而曰釋菜者或取其新且潔與敎世子正義鄭氏康成曰亦題上事凡三王敎世子必以禮樂樂所以脩内也禮所以脩外也禮樂交錯於中發形於外是故其成也懌恭敬而溫文正義鄭氏康成曰中心中也懌說懌孔氏穎達曰此以下為第三節樂是喜樂之事喜樂從内而生和諧性情故云所以脩内禮是恭敬之事正其容體在表故云所以脩外樂雖由中従中而見外禮雖由外從外而入中交閒錯雜於性情之中宣發形見於身外内外有樂心說貌和故曰其成也懌内外有禮貌恭心敬而溫潤文章故曰恭敬而溫文方氏慤曰先王敎人以禮樂豈責以所無哉亦因所固有脩之俾勿壊而已兩相合謂之交兩相雜謂之錯溫則不暴文則不野馬氏睎孟曰樂以脩内禮以脩外此敎之始禮樂之分也禮不止脩内樂不止脩外此教之成禮樂之合也眞氏徳秀曰禮以起人之敬敬心生則慢心窒樂以感人之和和心生則戾心消薰陶徳性變化氣質莫妙於此至二者薰醲涵暢相與無閒故其成也但見其悦懌而已恭敬溫文而已史氏駉孫曰禮勝則離樂勝則流故有分者禮樂之定體交錯發形者敎養之妙用黄氏乾行曰樂雖脩内然心和者身亦和禮雖脩外然身敬者心亦敬盖禮之和即為樂樂之莭即為禮也此一節敎以正道立大傅少傅以養之欲其知父子君臣之道也大傅審父子君臣之道以示之少傅奉世子以觀大傅之徳行而審喻之大傅在前少傅在後入則有保出則有師是以敎喻而徳成也師也者敎之以事而諭諸徳者也保也者慎其身以輔翼之而歸諸道者也記曰虞夏商周有師保有疑丞設四輔及三公不必備唯其人語使能也大音泰少詩召反少行竝去聲正義鄭氏康成曰養猶敎也言養者積浸成長之示之為之行其禮審喻之為之說其義前後謂在學時出入謂燕居出入時以有四人維持之是以教喻而徳成也慎其身者謹安䕶之記所云謂天子也語言也得能則用之無則已不必備其官也小人處其位不如且闕熊氏安生曰大傅審慎其道行之於身以示法此身敎也少傅奉以觀其徳行詳審言之使通曉此言敎也孔氏穎達曰作記者更明師保之徳喻曉也保護也輔相也翼助也師敎世子以所行之事使曉喻於徳義保慎世子之身輔相翼助使世子歸於道也記曰者是古有此記至唯其人皆古記之語語使能一句是作記者解之也四輔者尚書大傳云古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼天子有問無以對責之疑可志而不志責之丞可正而不正責之輔可揚而不揚責之弼其爵視卿其祿視大國之君也朱子曰養謂涵育薰陶俟其自化也陳氏祥道曰有師保矣又繼之曰設三公充其數則有傅也曰有疑丞矣又繼之曰設四輔充其數則有輔弼也曰大傅在前少傅在後則師保在左右矣入則有保出則有師則大傳少傅出入皆預矣出入前後罔非正人則目不閲滛色耳不聞優笑居不近庸邪玩不備珍異則所見者正事所聞者正言所行者正道所以敎喻而徳成眞氏徳秀曰前言禮樂敎世子之具此言師保敎世子之人通論郝氏敬曰此保傅即周官三公三孤而周禮惟大司徒之屬有師氏掌以媺詔王以三徳敎國子保氏掌諫王惡養國子以道敎之六藝而周官云惟其人不惟其官此云不必備惟其人可補周官之缺先儒謂保傅為兼官無專職非也餘論朱子曰漢初未見孔壁古文尚書周官一篇但見伏生牧誓立政萹司徒司馬司空遂以為三公不知諸侯止有此三卿惟天子有三公三孤六卿也牧誓立政所記在周初猶諸侯國制周官所記在成王時所以不同公孤以師道輔君後世但以公孤為加官贈職不復有師保之任矣案師傅保之職有甚尊者如周成王時太公為大師周公為太傅召公為大保此三公也有不甚尊如周禮大司徒之屬有師氏保氏此皆與王燕者也而子初生即擇諸母與可者使為子師次為傅母為保母然則所以慎其身教之事而諭諸徳歸諸道者自内至外自孩提至成立無地不有無人不然至年愈長位愈尊而師之傅之保之者任愈重爵亦愈貴至以臣妾億兆者當其為師則弗臣焉書曰能自得師者王此義明也君子曰徳徳成而敎尊敎尊而官正官正而國治君之謂也正義陸氏徳明曰君子成徳之名劉氏敞曰言四輔三公之官各正厥職則國罔不治而君道成焉彭氏亷夫曰天子設四輔及三公以求助如此則敎世子何獨不然存疑熊氏安生曰世子之名為君子者曰有和敬倫理之徳也徳既成則皇極建於上而臣下化之見世子之君道必本於敎以成徳也方氏慤曰君子有君國子民之道也陳氏澔曰此徳是指世子之徳世子之徳有成則敎道尊嚴而無敢慢易者故凡居官守者皆以正自處官正而國治世子為君之位也吳氏澄曰上既引古記之言此又引君子之言以足前義二徳字其一衍受敎者之徳成則敎者有功而道尊也案上言諭諸徳歸諸道惟大𫝊身有其徳故能審其道以示人而少傅奉世子以觀大傅之徳行而審喻之是道之審由道之立必其人皆君子而後可曰徳必師傅之徳成而後其教尊必教尊而後無愧於師傅之官此四輔三公之所以不必備而惟其人也或謂君子謂人君之子或謂君子謂能君國子民皆非仲尼曰昔者周公攝政踐阼而治抗世子法於伯禽所以善成王也聞之曰為人臣者殺其身有益於君則為之况于其身以善其君乎周公優為之于依注作迂正義鄭氏康成曰聞之者聞之於古也于讀為迂孔疏于是語詞迂為迴逺故讀于為迂孔氏穎達曰此以下是第四節劉氏彜曰以世子法敎世子直道也今舉世子法於伯禽以敎成王則曲矣盖人臣殺身為國猶尚為之况不過迂曲其身之所行以成其君之徳乎宜乎公優為之陳氏祥道曰于曲也言非直躬者也先儒謂周公之道曲而當方氏慤曰優言為之有餘而不廹也存異鄭氏康成曰于猶廣也大也孔疏他人益君則勤苦周公益君則逸樂是於身有優饒於徳又廣大也是故知為人子然後可以為人父知為人臣然後可以為人君知事人然後能使人成王㓜不能涖阼以為世子則無為也是故抗世子法於伯禽使之與成王居欲令成玉之知父子君臣長㓜之義也正義鄭氏康成曰使伯禽學此禮於成王側孔氏穎逹曰凡敎世子之法必須對父成王既無父若以成王為世子時則無為世子之處故抗世子法於伯禽使伯禽與成王居令成王學之知父子君臣之義也呉氏澄曰此引夫子之言以證上文所記之事朱氏申曰知事父之道則知為父之道知事君之道則知為君之道知為下之道則知為上之道未有不能為人臣子以事人而能為君父以使人者也前言道此言義者道以理言義以事言存疑鄭氏康成曰以為世子若為世子時也孔疏以實則不為世子也呉氏澄曰按此篇周公敎成王可謂曲盡但稽之事實武王崩成王㓜管蔡流言殷人謀畔其時周公即出居東伯禽亦就封而征徐戎其後周公三年而歸即相成王東征安得有伯禽同學之事或武王在時周公使伯禽與成王同學令觀伯禽所學而效之記者誤傳為武王崩後事乎案武王而在則直行世子法於成王耳安用迂曲而抗世子法於伯禽此必武王初崩周公即用此法太公為太師召公為太保而周公身為太傅即使伯禽君陳與呂伋王孫牟輩與成王逰處元年之冬周公以流言辟居東都而太公召公固為師保伯禽輩日在左右抗世子法原未變也明年秋感風雷變而公還則成王已悔悟矣至五年遷奄而伯禽出封於魯則成王徳器已成吳氏所疑不為無見而於事實究考之未悉也君之於世子也親則父也尊則君也有父之親有君之尊然後兼天下而有之是故養世子不可不慎也存疑鄭氏康成曰處君父之位覽海内之士而近不能敎其子則其餘不足觀矣陳氏澔曰能盡君父之道以敎其子然後可以保有天下之大不然則他日之為子者不克負荷矣可不慎乎案有有之也謂知其理而存於心也為世子者必心有父之親乃能為人子必心有君之尊乃能為人臣能為子臣然後可以為君父而兼天下而有之是養世子不可不愼必使知父子君臣長㓜之道也行一物而三善皆得者惟世子而已其齒於學之謂也故世子齒於學國人觀之曰將君我而與我齒讓何也曰有父在則禮然然而衆知父子之道矣其二曰將君我而與我齒讓何也曰有君在則禮然然而衆著於君臣之義也其三曰將君我而與我齒讓何也曰長長也然而衆知長㓜之節矣故父在斯為子君在斯謂之臣居子與臣之莭所以尊君親親也故學之為父子焉學之為君臣焉學之為長㓜焉父子君臣長㓜之道得而國治語曰樂正司業父師司成一有元良萬國以貞世子之謂也長丁丈反學音效正義鄭氏康成曰物猶事也學之敎之也司主也一一人也元大也良善也貞正也孔氏穎達曰一物謂與國人齒讓之一事三善謂衆知父子衆知君臣衆知長㓜設為不知禮者疑而發問知禮者曉其意而答之世子雖貴尚以君父在而居臣子之禮於是國人皆知尊其君父也父子天性自然故云道君臣以義相合故云義長㓜有等級上下故云節然齒讓惟在學受業時若朝㑹飲食則各以位之尊卑諸子職云辨其等正其位是也徐氏師曾曰著者知之明父子長㓜親屬易知君臣以義合故獨言著業詩書之屬司業即前所謂樂正授數也父師司成即前師保傅所以成世子之徳者也元良即道徳之謂以貞即國治之謂也通論眞氏徳秀曰天子之世子將為君者也而乃於公侯卿大夫士之子以齒為先後何哉君在故也父在故也長長故也身為世子而以親親尊尊長長之道為天下倡有不翕然觀效者哉秦漢以来禮樂既廢又無師保之敎齒讓之禮世子生而狃於貴驕之習此篇雖存無復考而行之者此治之所以不古若與案商書微子稱箕子為父師比干為少師則父師是師傅之尊親而齒徳兼優者或謂即君父非也周公踐阼正義鄭氏康成曰亦題上事存異陸氏佃曰此萹始曰周公相踐阼而治次曰周公攝政踐阼而治卒曰周公踐阼則周公踐位乆愈益不疑案此亦仍孔疏成王年十二周公攝政年十五周公居攝之誤案文王之為世子為第一章當以仲尼曰昔者周公以下為第二章承上成王㓜而以仲尼言證之也凡三王敎世子以下為第三章因言周之教世子而廣及三王也凡學世子及學士為第四章因言教世子而竝及教士也欽定禮記義疏卷二十八
