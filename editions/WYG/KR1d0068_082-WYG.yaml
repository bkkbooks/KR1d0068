body:
  text: 案儀禮喪服𫝊曰尊者尊統上卑者尊統下大宗者尊之統也大宗者收族者也不可以絶故族人以支子後大宗也適子不得後大宗喪服丈夫婦人為宗子宗子之母妻齊衰三月𫝊曰尊祖也尊祖故敬宗敬宗者尊祖之義也喪服小記曰別子為祖繼別為宗繼禰者為小宗有五世而遷之宗宗其繼高祖者也是故祖遷於上宗易於下尊祖故敬宗敬宗所以尊祖禰也大𫝊曰別子為祖繼別為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者別子之後也宗其繼別子者百世不遷者也宗其繼髙祖者五世則遷者也有小宗而無大宗者有大宗而無小宗者有無宗亦莫之宗者公子是也聶氏崇義曰別子為祖謂諸侯適子之弟別於正適故稱別子為祖者謂此別子子孫為卿大夫者立此別子為始祖也繼別為大宗謂別子之世長子恒繼別子與族人為百世不遷之大宗也繼禰者為小宗禰謂別子之庶子其庶子所生長子繼此庶子與兄弟為小宗故云繼禰為小宗謂之小宗者以五世則遷比大宗為小也所謂有五世則遷之宗其繼高祖者也繼高祖者其實是繼高祖者之子以繼高祖者之身未滿五世猶為宗也又案公子不得禰先君故為別子而繼別者族人宗之為大宗逺至絶屬猶為之服齊衰三月母妻亦然庶子不得祭祖故諸兄弟宗之為小宗以其服服之大宗逺祖之正體小宗高祖之正體也別子有三一是諸侯適子之弟別於適長二是異姓公子來自他國別於本國不來者三是庶姓崛起於是邦為卿大夫別於不仕者皆稱別子此別子為後世之始祖族人百世宗之而不遷故為大宗大宗一而已小宗則一人之身而所宗凡四事親兄弟之適是繼禰小宗也事同堂兄弟之適是繼祖小宗也事再從兄弟之適是繼曾祖小宗也事三從兄弟之適是繼高祖小宗也小宗有此四者而小記獨云繼禰者初皆繼禰為始故據始而言之也夫先王立宗法而吉凶相及緩急相扶尊卑有紀親疏有倫然後一族如一家一家如一人此禮俗所以成而民風所由厚也因宗法為服制之本故先圖於此案喪服首斬衰閒𫝊曰斬衰三升檀弓縣子曰三年之喪如斬蓋貌以表心服以表貌斬在服則心之斬可見也喪服記曰凡衰外削幅裳内削幅幅三袧疏謂削幅者縫之邊幅外者向外内者向内也袧者謂辟兩側空中央也為裳之法前三幅後四幅幅皆三辟襵之也衰前有衰後有負版左右有辟領有袂中為闊中下有衽孝子哀戚之心無所不寓也案喪服制度皆法吉服為之但吉服則以冠為本而衣與裳因之喪服則以衰為本而冠與裳因之耳案斬衰裳三升以冠為首飾故倍衰裳而用六升布右縫外畢冠廣三寸落額上以布為三辟襵兩頭皆在武下向外屈之縫於武以前後兩畢之末向外襵之故曰外畢曲禮厭冠不入公門注厭猶伏也喪冠厭伏也謂反屈之故得厭伏之名冠繩纓條屬屬猶著也通屈一條繩為武垂下為纓著之於冠也又雜記云喪冠條屬以別吉凶言吉冠則纓武別材凶冠則纓武共材將一條繩從額上約之至項後交過前各至耳於武綴之各垂於頤下結之也三年之練冠亦條屬右縫至大祥縞冠從吉當纓武異材也大功以上右縫其三辟襵向右為之從陰小功以下左縫亦三辟襵向左為之從陽又案大功章注云大功布其鍜治之功麤治之是用灰也此冠用六升布加水濯之勿用灰蓋七升以上始用灰也又案黄氏幹曰案五服之喪冠其制之異者有四升數之不同一也繩纓之與布纓澡纓二也右縫之與左縫三也勿灰之與灰四也其制之同者亦四條屬一也外畢二也辟積之數三也廣狹之制四也蓋其不同者親疏之差等其同焉者形式之定制也案閒𫝊云斬衰貌若苴齊衰貌若枲喪服𫝊曰苴絰大搹左本在下爾雅以蕡為枲實孫炎以蕡為麻子苴絰者以色言之謂之苴以實言之謂之蕡鄭氏康成曰麻在首在腰皆曰絰絰之言實也明孝子有忠實之心苴之形惡色貌象苴服因心而發也盈手曰搹搹扼也圍九寸腰絰大七寸五分寸之一而樛之謂兩股相交兩頭結各存麻本散垂三尺也絞帶者繩帶也謂絞苴麻為繩以作帶故云絞帶王肅謂帶如腰絰亦用苴麻為之案儀禮喪服疏衰裳齊牡麻絰冠布纓削杖布帶疏屨三年者𫝊曰齊者何緝也牡麻者枲麻也牡麻絰右本在上冠者沽功也疏屨者藨蒯之菲也閒𫝊曰齊衰貌若枲又曰齊衰四升五升六升蓋降服四升正服五升義服六升也敖氏繼公曰牡麻者無實之麻也牡麻比苴為善故齊衰以下之絰用之此絰右本在上以見其不以本為纓而纓亦在其左也其制屈一條繩自額上而後交於項中一端垂於左下而為纓一端止於右上而前鄉其不纓者則左端不垂而在上為異耳冠布纓之制與繩纓同齊斬不言布此纓帶言布者對斬衰纓帶用繩言也大功至緦麻衰惟無負版辟領之制其衰則皆外削幅其裳則皆内削幅蓋布有麤細而體式略同故大小功緦麻之齊裳等物皆凖此不另圖案苴杖之義育三苴杖竹也父者子之天竹圓象天一也竹内外有節象子為父亦兼内外之痛二也竹貫四時而不變子之痛父亦經寒暑而不改三也削杖之義亦有三削杖桐也削之使下方取母象於地也一也桐之言同也取内心悲痛同於父也二也桐外無節象家無二尊故外屈於父為之齊衰經時而有變也三也又案喪服小記云絰殺五分而去一杖大如絰注云如腰絰也必知如腰絰者以杖從心已下與腰同處故也又云杖皆下本者從木性也各齊其心者杖以扶病病從心起故杖之高下以心為斷也案𫝊云菅屨者菅菲外納也在周公時謂之屨在子夏時謂之菲其實一也菅屨謂以菅草為屨菅白華也已漚為菅漚菅柔韌中用此菅是已漚者用之為屨外納者向外編之也疏屨者粗屨也𫝊曰疏屨者藨蒯之菲也藨蒯皆草名案斬衰言菅屨見草體舉惡貌其服重也齊衰言疏屨舉草之總稱其服輕也自此不杖期則言麻屨齊衰三月則與大功同繩屨小功緦麻又没其屨號皆各因其差降之宜也案士喪禮明衣裳用布記云明衣裳用幕布袂屬幅長下膝注云幕布帷幕之布升數未聞屬幅不削幅也長下膝者謂制此衣長至膝下亦有裳前三幅後四幅不辟積腰間下至足跗亦不被土也此不辟積腰間者以其一服不動不假上狹下寛也士喪禮下篇曰縓綼緆是裳之飾也緇純即此衣之節也一染謂之縓在幅曰綼在下曰緆衣以緇裳以縓象天地也案喪大記云小斂絞縮者一横者三大斂布絞縮者三横者五絞紟如朝服注云絞既斂所用束堅之者也縮從也如朝服者謂布精粗如朝服十五升也疏云謂從者一幅置於尸下横者三幅亦在尸下從者在横者之上每幅之末析為兩片以結束為便也小斂之絞廣終幅析其末大斂之絞取布一幅直裂作三片而用之其横者五者亦取布二幅直裂為六片而用五片置於縮三之下皆欲其堅之急也案士喪禮云掩練帛也廣終幅長五尺析其末作掩為裹尸首故也析其末者以後二脚於頤下結之既瑱幎目之後乃以前二脚倒結於項中也喪大記云君錦冒黼殺綴旁七大夫𤣥冒黼殺綴旁五士緇冒赬殺綴旁三凡冒質長與手齊殺三尺注云既襲所以韜屍重形也殺冒之下帬韜足上行者也又士喪禮云冒緇質長與手齊赬殺掩足注云冒制如直囊上曰質下曰殺質正也其用之先以殺韜足而上後以質韜首而下齊手上𤣥下纁象天地也孔疏云於不縫之邊上下安帶以結之綴旁七旁五旁三尊卑之差也案喪大記小斂君錦衾大夫縞衾士緇衾皆一至大斂又制二衾君大夫士一也凡衾皆五幅布於絞上衾者即今之被也紟者鄭注襌被也五幅白布為之別無緣飾喪大記云紟五幅無紞注云紞被識生時襌被有識死則去之異於生也喪大記曰小斂以往用夷衾夷衾質殺之裁猶冒也冒以韜屍小斂又覆以夷衾其所用繒色及長短制度與質殺同但不復為囊及旁綴耳小斂前有冒故不用夷衾自小斂後衣多不可用冒故用夷衾覆之案禮記喪大記云君設大盤造冰周禮凌人大喪共夷盤冰注云夷之言尸也實冰於夷盤中置之尸牀之下所以寒尸也尸之盤曰夷盤牀曰夷牀衾曰夷衾皆依尸而為言者也漢禮器制度大盤廣八尺長丈二尺深三尺漆赤中諸侯謂之大盤其即夷盤之謂與案檀弓重主道也疏云謂始死作重猶若吉祭木主之道也吉祭木主所以依神在喪作重亦以依神故曰主道也蓋孝子望親之精神有所憑依故設重以依之謂鬼神每依飲食庶㡬見親於所依也重起於殷代以含飯餘鬻以鬲盛之名曰重今之糧甖即其遺制也士喪禮云重木刊鑿之甸人置重於中庭三分庭一在南注云木也縣物焉曰重刊斵治之也鑿之為縣簪孔也士重木長三尺疏云以其木有物縣於下相重累故得名重云簪孔者下云繫用靲用靲内此孔中也云簪者若冠之簪使冠連屬於紒此簪亦相連屬於木之名也士重木長三尺則大夫以上各有等當約銘旌之杠士三尺大夫五尺諸侯七尺天子九尺據豎者言之横者宜半之也禮又曰夏祝鬻餘飯用二鬲於西墻下幂用疏布久之繫用靲縣於重幂用葦席北靣左衽帶用靲賀之結於後注云夏祝祝習夏禮者也夏人教以忠其於養宜鬻餘飯以飯尸餘米為鬻也重主道也士二鬲則大夫四諸侯六天子八與簋同差久讀為灸謂以蓋塞鬲口也靲竹䈼也以席覆重辟屈而反兩端交於後左衽西端在上賀加也疏云前商祝奠米飯米夏祝徹之今乃鬻之而盛於鬲是以下記云夏祝徹餘飯其注云徹去鬻是也北面左衽者人北靣以席先於重北靣向南掩後也聶氏崇義圖云重用互達横鑿穿為四孔貫四横木每一横縣二鬲四横八鬲諸侯七尺三横六鬲大夫五尺二横四鬲士三尺一横二鬲並覆以疏布裹以葦席而後代則重與葦席為二物矣又案幂用疏布以布覆鬲也久之不言其物殆以所幂者為之耶左袵者右端在上而西鄉象死者之左衽也帶用靲以靲中束其席象死者之帶也曰靣曰衽曰帶皆象形名之故曰重主道也又敖氏繼公不讀久為灸而以久為以物承他器之稱是上既幂之而下又承之也其說較優案禮記喪大記曰熬君四種八筐大夫三種六筐士二種四筐加魚腊焉注熬者以火熬穀使香以筐盛之設棺旁以惑蚍蜉使不至棺也鄭注士喪禮曰熬黍稷各二筐又曰設熬旁各一筐大夫三種加以粱君四種加以稻四筐則手足各一餘設於左右加魚腊者案特牲士腊用兔少牢大夫腊用麋天子諸侯無文當用六獸之屬今案用熬筐者或亦以穀氣者人精氣所依置之棺旁亦實口用米實鬲用飯之意必謂以惑蚍蜉竊恐熬穀易竭而蚍蜉無窮也迂矣案周禮巾車職云大喪飾遣車注云一曰鸞車用疏布為輤四靣有障置於四隅後鄭云輤其蓋也四面皆有障蔽以隱翳牢肉置於椁中之四隅疏云遣車謂將葬柩朝廟畢將行設遣奠竟取遣奠之牲臂臑折之為段用此車載之遣送亡者入壙也雜記云遣車視牢具言車多少各如所包牲體之數也既夕禮云包牲取下體蓋遣奠所包也士三箇前脛折取臂臑後脛折取骼是一牲取三體士少牢二牲則六體大夫以上用太牢牲九體分為十五段三段為一包凡五包諸侯分為二十一段凡七包天子分為二十七段凡九包所包皆用左胖案天子六綍前後二碑上下各重鹿盧共穿四綍左右二碑二鹿盧分穿二綍餘可以此推之案士喪禮為銘各以其物檀弓銘明旌也以死者為不可別已故以其旗識之注云明旌神明之旌也周禮司常大喪共銘旌注云王則大常又案司常職王建大常諸侯建旗孤卿建􅎶大夫士建物銘旌亦然但尺數異耳天子九尺諸侯七尺大夫五尺士三尺若不命之士則以緇布半幅長一尺也赬其末長終幅長二尺也緇赬共長三尺廣三寸書銘於末曰某氏某之柩竹杠長三尺置于宇西階上注云杠銘橦也宇梠也梠者兩端連綿木也案既夕禮云商祝執功布以御柩執披注云居柩車之前若道有低仰傾虧則以布為抑揚左右之節使引者執披者知之士執披八人疏云葬時乗車故有柩車前引柩者及在旁執披者皆御治之下記云執披者旁四人注云前後左右各二人是士執披者八人也又案禮將葬啓肂商祝免袒執功布入升自西階又商祝拂柩用功布夫啓肂用功布者執之以接神為有所拂㧍也拂柩用功布者始告神用功布拂去凶邪之氣也此皆功布之為用也功布灰治之布也周禮鄉師及葬執纛以與匠師御柩注云纛與翿義同翿羽葆幢也喪大記君葬御棺用羽葆蓋士御柩以功布則大夫御柩以茅諸侯以羽葆天子以纛皆以指引前後左右一如功布之施為也案雜記諸侯之葬升正柩匠人執羽葆御柩鄭注御柩者居前道止之孔疏匠人工人也羽葆者以鳥羽注於柄頭如蓋謂之羽葆謂蓋也匠人主宫室故執蓋物御行於道示指揮於路為柩進止之節也案喪大記君飾棺黼翣二黻翣二畫翣二皆戴圭大夫士皆戴緌禮器曰天子八翣諸侯六翣大夫四翣鄭注喪大記引漢禮翣以木為筐廣三尺高二尺四寸方兩頭高衣以白布畫者畫雪氣其餘各如其象柄長五尺車行使人持之而從以障車既窆樹於壙中天子八翣有龍翣二其戴皆加璧垂羽案栁之言聚也諸飾所聚也孝子啓殯見棺猶見親身載飾而行遂以葬若存時居帷幕而加文繡也其名有四以殯則謂之輤車以葬則謂之栁車以其廹地而行則謂之蜃車以其無輤則謂之軫車其帷荒振容褚紐翣披之制詳喪大記中阮氏圖云栁車四輪一轅車長丈二尺廣四尺高五尺其廹地而行有似於蜃故周禮謂之蜃車又既夕禮記注云其車狀如牀中央有轅前後出設前後輅轝上有四周下有前後軸以輇為輪許慎說有輻曰輪無輻曰輇以輇為輪此與輴車異也輴無輪直有轉轔此則有輇輪而無輻欽定禮記義疏巻八十二
