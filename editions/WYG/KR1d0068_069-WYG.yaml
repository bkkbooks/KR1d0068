body:
  text: 緇衣第三十三正義孔氏穎達曰案鄭目錄云名曰緇衣者善其好賢者厚也緇衣鄭詩也此於别錄屬通論陸氏德明曰劉瓛云公孫尼子所作吕氏大臨曰篇中有好賢如緇衣語故以是名篇方氏慤曰此篇凡二十四節大抵多明人之好惡人之所宜好者莫如賢所宜惡者莫如惡緇衣好賢之詩也經正引此故以名篇朱子曰緇衣兼惡惡獨以緇衣名篇者以見聖人有心於勸善無心於懲惡也馮氏椅曰篇中多依倣聖賢之言其文有不純義有不足者多矣子言之曰爲上易事也爲下易知也則刑不煩矣易以䜴反正義鄭氏康成曰言君不苛虐臣無姦心則刑可以措孔氏穎達曰君上以正理御物則臣事之易臣下無姦詐則君知其情易吕氏大臨曰上不務信以機心待民則民亦以機心報上上下之交機心相勝姦生詐起欲刑之不煩不可得矣劉氏彝曰上難事則下難知上易事則下易知好惡悖其正喜怒失其常於是有匿其誠信以爲容悅者屈其忠直以爲阿諛者包其禍心以爲詐僞者子曰好賢如緇衣惡惡如巷伯則爵不凟而民作愿刑不試而民咸服大雅曰儀刑文王萬國作孚好呼報反惡惡上烏路反下如字正義鄭氏康成曰緇衣巷伯皆詩篇名緇衣首章曰緇衣之宜兮敝予又改爲兮適子之館兮還予授子之粲兮是其好賢欲其貴之甚也巷伯六章曰取彼讒人投􅂌豺虎豺虎不食投􅂌有北有北不受投􅂌有昊此其惡惡欲其死兦之甚也爵不凟者不輕爵人也試用也咸皆也刑法也孚信也儀法文王之德而行之則天下無不爲信者也文王爲政克明德慎罰孔氏穎達曰此明好賢惡惡賞罰得中則爲民所信緇衣鄭風之首美桓公武公詩巷伯小雅篇名刺幽王詩凟濫也愿慤也末所引詩大雅文王之篇諫成王之詩胡氏銓曰緇衣好得其正巷伯惡得其正吕氏大臨曰子曰示之以好惡而民知禁蓋誠心不至則好惡不明好惡不明則民莫知其所從違如此而欲人心之孚天下嚮風難矣文王好惡得其正而一出乎誠心故爲天下之所儀刑德之所以孚於下也子曰夫民教之以德齊之以禮則民有格心教之以政齊之以刑則民有遯心故君民者子以愛之則民親之信以結之則民不倍恭以涖之則民有孫心甫刑曰苖民匪用命制以刑惟作五虐之刑曰法是以民有惡德而遂絶其世也孫去聲正義鄭氏康成曰格來也遯逃也涖臨也孫順也甫刑尚書篇名孔疏此尚書吕刑篇而稱甫刑者案孝經序云春秋有吕國而無甫侯國語云齊許申吕皆由大姜然則吕即甫也孔注尚書吕侯後爲甫侯故穆王時謂之吕侯周宣王及平王時爲甫侯匪非也命謂政令也高辛氏之末諸侯有三苖者作亂其治民不用政令專制御以嚴刑乃作五虐蚩尤之刑以爲法孔疏苖民九黎之君少昊氏衰上效蚩尤重刑顓頊代少昊誅九黎分流其子孫爲居于西裔高辛之衰又復九黎之君惡堯興又誅之堯末又在朝舜時又竄之後王深惡此族三生凶惡故著其氏謂之苗民民者冥也於是民皆爲惡起背畔也三苖由此見滅無後由不任德孔氏穎達曰此明教民以德不以刑也論語云有恥且格馬氏睎孟曰德者所以養人於中而在外有不正則又以禮齊之此順其性命之理而以善養人也故民有格心政者所以率人於外而内有不從則又以刑齊之此逆其性命之理而以力服人也故民有遯心先王之爲治德禮以爲本刑政以爲助葉氏夢得曰子以愛之信以結之所謂教之以德也恭以涖之所謂齊之以禮也德不止於一故有仁有信禮則恭而已矣應氏鏞曰書云苖民弗用靈靈善法也今引弗用命命當作靈子曰下之事上也不從其所令從其所行上好是物下必有甚者矣故上之所好惡不可不慎也是民之表也好惡並去聲正義鄭氏康成曰不從其令言民化行不拘於言甚者甚於君也民之從君如景逐表馬氏睎孟曰令者令之於民行者行之於已令民而使作愿民未必作愿令民而使之服民未必咸服唯好賢如緇衣則爵不瀆而民作愿惡惡如巷伯則刑不試而民咸服所謂從其所行而不從其所令也陳氏祥道曰言之化人也淺行之感人也深故好惡出於正則彼皆從而正好惡出於非則彼皆從而非猶表端而影端表枉而影枉也故謂民之表子曰禹立三年百姓以仁遂焉豈必盡仁詩云赫赫師尹民具爾瞻甫刑曰一人有慶兆民頼之大雅曰成王之孚下土之式正義鄭氏康成曰遂猶達也言百姓傚禹爲仁也孚信也式法也皆言化君也孔氏穎逹曰此申明上文君爲民表不可不愼詩小雅節南山之篇引以證民之法則於上甫刑見上引以證上有善行頼及於下大雅下武之篇引以證君有善與下爲法式也方氏慤曰禹欲百姓之仁而已及百姓之興仁亦遂上之所欲而已故以遂言之陳氏澔曰豈必盡仁言不必朝廷盡是仁人而後足以化民也得一仁人爲民之表則天下皆仁矣所謂君仁莫不仁也通論孔氏穎達曰禹立三年則百姓盡行仁道論語稱有王者必世而後仁者禹承堯舜禪代之後其民易化論語所稱者謂重離之後故必世乃後仁是以注論語云周道至美武王伐紂至成王乃致太平由承殷紂敝化之後然也存異鄭氏康成曰言百姓效禹爲仁非本性能仁也案民之秉彞好是懿德未有民之本性不可爲仁者謂非本性能仁繆已子曰上好仁則下之爲仁爭先人故長民者章志貞教尊仁以子愛百姓民致行已以說其上矣詩云有梏德行四國順之好去聲長上聲說悅通梏詩作覺行去聲正義鄭氏康成曰章明也貞正也民致行已者民之行皆盡已心梏大也直也吕氏大臨曰覺明也訓大直未詳案朱子詩傳亦訓直大又有覺其楹訓覺高大而直也則明之義已在其中矣孔氏穎達曰此結上經在上行仁之事詩大雅抑之篇刺厲王也引以證上有其德下所從也吕氏大臨曰爲仁爭先人者得其良心之所同然靡然嚮風日用而不知也章志者明吾好惡以示之貞教者立不可易之道以敎之所示所教者尊仁而已好仁惡不仁吾所以示之也明人倫於上教之使順不使之不順此吾所以敎之也民致行已以悅其上如子從父母之命盡心力以奉之不忍違也陳氏祥道曰覺出於性而非僞故覺爲直子曰王言如絲其出如綸王言如綸其出如綍故大人不倡游言可言也不可行君子弗言也可行也不可言君子弗行也則民言不危行而行不危言矣詩云淑愼爾止不諐于儀綍與紼通音弗危行而行之行竝去聲諐詩作愆字通正義鄭氏康成曰言言出彌大也孔疏王言初出微細如絲其出行於外漸大如綸綍又大於綸也綸今有秩嗇夫所佩孔疏漢十里一亭十亭一鄕鄕有三老有秩嗇夫鄕小者縣亦置嗇夫職同但隨鄕大小異名耳所佩則同張華云綸如宛轉繩綍引棺索游浮也不可用之言也危高也言不高於行行不高於言則言行相應也淑善也諐過也言善愼汝之容止不可過於禮之威儀也孔氏穎達曰詩大雅抑之篇吕氏大臨曰生於心則形於言形於言則發於政如絲如綸如綍言其端甚微其末甚大也爲人上者倡之以誠慤篤實之言天下猶有姦欺以罔上者茍以無根不實之言倡之則天下蕩然虛浮之風作矣可不愼乎可言而不可行過言也可行而不可言過行也過言者窮高極深絶類離倫自以爲高明博大然人倫不察庶物不明卒不可行於世無用之空言而已過行者可行之一時不可法於後世可行之於已不可達之於天下獨行之高行而已此君子所以弗言弗行也如此則言行不越乎中民將效之言不敢高於行言之必可行也行不敢高於言必爲可繼之道也引詩言爲人上者當善愼其容止不過於先王曲禮之儀以證言行之不可過也方氏慤曰王以位言大人以道言其言如綸則有位者之事故曰王不倡游言非有道者不能故曰大人君子則兼上下言之見在上在下皆如此也子曰君子道人以言而禁人以行故言必慮其所終而行必稽其所敝則民謹於言而愼於行詩云愼爾出話敬爾威儀大雅曰穆穆文王於緝熙敬止道與導同行竝去聲稽古兮反於音烏正義鄭氏康成曰禁猶謹也孔疏言禁約謹慎人以行使行顧言稽猶考也議也話善言也緝熙皆明也孔氏穎達曰此明前經言行之事上詩大雅抑之篇下詩大雅文王之篇言穆穆然美者乃是文王之德嗚呼光明乎又敬其容止證上當敬其言行也陳氏祥道曰言以明理所以通彼此之情而達之也故道人以言行出於正而率以正則彼莫敢爲非也故禁人以行眞氏德秀曰言出於口至易也然不慮其所終則一言之過貽患將不勝救行出於身亦至易也然不稽其所敝則一行之差流禍至於無窮不善者固不足言善矣而慮之不深稽之不遠未有不反而爲不善者也況尊居人上言行所關安危自出故必謹之審之而不敢茍則民亦從其化而不茍於言行矣吕氏大臨曰引抑詩言上之言行不可不愼引文王詩言文之盛德亦不越敬其容止而已通論陳氏祥道曰孔子於空空之鄙夫則叩兩端而竭焉所謂道人以言也爲魯司寇而公謹氏出其妻愼潰氏踰竟而徙所謂禁人以行也眞氏德秀曰老莊非善言乎其終爲浮虛之害夷惠非善行乎其敝有隘不恭之失子曰長民者衣服不貳從容有常以齊其民則民德壹詩云彼都人士狐裘黃黃其容不改出言有章行歸于周萬民所望長竹丈反下君長同貳或作貸同音二下同從七凶反正義鄭氏康成曰貳不一也章文章也忠信爲周孔氏穎達曰從容有常謂舉動有常度壹謂齊一不參差詩小雅都人士之篇言彼明王時都邑之人有士行者服此狐裘黃黃然行歸忠信萬民所以瞻望以法則之馬氏睎孟曰長民者處人之上不惟其行貴有常即其形於衣服容貌之際者亦不可無常然後民望其容貌而其德歸於一矣狐裘黃黃服其服也其容不改文以君子之容也出言有章遂以君子之辭也行歸于周萬民所望實以君子之德也陳氏祥道曰民德之不純常生於竒衺而竒衺之作常兆於衣服之不一狐裘燕居之服黃黃言其色也燕居之服猶且致一如此則其出而齊民可知矣存異鄭氏康成曰黃衣則狐裘大蜡之服也孔疏案詩注云狐裘取温裕而已不云大蜡鄭云蜡服者以正衣解之耳詩謂庶人有士行非闢蜡之事故爲温裕也案衣服不貳所服皆法服也從容禮法之内而又有常安而且久也如是則上之德壹矣以此齊民民德豈有不壹者哉言衣服者亦猶鳲鳩之言其帶伊絲其弁伊騏之意子曰爲上可望而知也爲下可述而志也則君不疑於其臣而臣不惑於其君矣尹吉曰惟尹躬及湯咸有壹德詩云淑人君子其儀不忒忒他得反或作貳正義鄭氏康成曰吉當爲告古文告字之誤尹誥伊尹之誥也書序以爲咸有壹德咸皆也言君臣皆有一德不貳則無疑惑也孔氏穎達曰可望而知謂貌不藏情望見其貌則知其情詩曹風鳲鳩篇刺曹君之詩言善人君子其儀不有差忒引以證一德之義吕氏大臨曰可望而知者不言而喻也可述而志者可稱述而志之於書也若上有深阻難測之意則雖言而未喻下有隱匿不忠之情則雖言不可信況於志乎此君臣上下所以交相疑惑欲同心爲治難矣陳氏祥道曰上以情待下故望其趨舍足以知其情下以情事上故述其功業足以志其情爲上可望而知則君於臣無可疑之行爲下可述而志則臣於君無可惑之事書言君臣皆有一德此君所以不疑於其臣而臣不惑於其君也陸氏佃曰可望而知表裏如一可述而志先後如一存異鄭氏康成曰志猶知也孔氏穎達曰可述而志謂臣下率誠奉上其行可述叙而知也子曰有國家者章義􅓠惡以示民厚則民情不貳詩云靖共爾位好是正直􅓠丁但反共音恭好呼報反案陸德明云義尚書作善陳澔本因改善今從鄭氏原本正義鄭氏康成曰章明也􅓠病也皇氏侃曰義善也孔氏穎達曰有善以賞章明之有惡以刑􅓠病之詩小雅小明之篇刺幽王之詩引證上文民情不貳爲正直之行吕氏大臨曰善居其厚惡居其薄章之􅓠之以示民厚則民一歸於理義所以不貳也詩言居位者惟正直是好則所好出於理義民德所以一也陳氏祥道曰惟民生厚因物有遷有國者知民性之有善而移於習然後爲惡故爲善則章之使民知善之可爲爲惡則􅓠之使民知惡之可避示民有生厚之善則民致一於善而歸厚矣是以民情不貳引詩言此章善之謂也方氏慤曰章善而著之惡者恥其不若則惡者病矣夫不待刑罰而能使惡者知恥則上之用心厚矣民豈有攜貳之情乎案民情之本厚者以其直道而行也故在位而好是正直則民自動其天而德壹焉三代之章善􅓠惡孔子之無毁無譽孟子曰民之秉彝也故好是懿德皆是道也子曰上人疑則百姓惑下難知則君長勞故君民者章好以示民俗愼惡以御民之淫則民不惑矣臣儀行不重辭不援其所不及不煩其所不知則君不勞矣詩云上帝板板下民卒􅓠小雅曰匪其止共維王之卭長上聲好呼報反惡烏路反行去聲􅓠詩作癉共作恭卭音窮正義鄭氏康成曰難知有姦心也淫貪侈也孝經曰示之以好惡而民知禁重猶尚也援猶引也上帝喻君也板板辟也卒盡也􅓠病也此君使民惑之詩卭勞也言臣不止於恭敬其職惟使王之勞此臣使君勞之詩孔氏穎達曰此明君臣各以情相示則各得其所君上多疑貳則百姓疑惑下懐欺詐則在上治之勞苦也不重辭不尚虛辭也臣下不援引其君行所不能及之事不煩亂以君所不知之事則君不勞苦矣詩大雅板之篇刺厲王之詩小雅巧言之篇刺幽王之詩吕氏大臨曰篇首曰爲上易事爲下易知又曰爲上可望而知爲下可述而志此又反覆言此者蓋君臣上下之際茍非同心同德一歸於理義則上下睽乖欲政行而事治未之有也因極言上之好惡言行所以示其下者一德而已章好者明吾所好唯理義而已非他好也愼惡者愼吾所惡唯非理非義而已非他惡也所好未必理義則君好可疑欲以化民成俗難矣所惡未必非理非義則君惡可疑欲民之不淫難矣臣之事上非理義不行故曰儀行非有隱匿詐僞之情不必多言以自解故曰不重辭以君力所不能及而援其君則君難從以君智所不能知而煩其君則君難聽勞其君而無益非所以事君也板板反也王者反覆二三其德則民莫知所從而病矣此證上人疑則百姓惑也卭病也爲臣者事君不止於恭敬而援其所不及使君病其不能煩其所不知使君病其不知此證下難知則君長勞也方氏慤曰臣有可儀之行而所重者不在乎辭君之所及者道而所不及者事故於所不及者則不援之使及君之所知者本而所不知者末故於所不知者則不煩之存異鄭氏康成曰儀當爲義言臣義事君則行也引君所不及謂必使其君所行如堯舜也不煩以其所不知謂必使其知慮如聖人也凡告喻人當隨其才以誘之辨正胡氏銓曰孟子曰我非堯舜之道不敢以陳於王前又曰人皆可以爲堯舜謂堯舜爲不可及不可也謂不必使其君如堯舜尤不可也鄭氏誤矣案上之疑有二用舍不斷威福莫測善不必賞惡不必罰此民所以從違莫定也章善癉惡法紀昭明則民曉然於善之當爲而惡之必不可爲矣下之難知新進喜事浮夸無實聽其言則天下事無不可爲而發而不收慮而無成如鼂錯之更令王安石之變法之類責難陳善人臣之義然堯舜之知而不徧物急先務也今援其所不及煩其所不知紛紜滋擾日不暇給皆𤨏屑煩苛舍本求末者也夫人引君當道中正是遵俾君不苦於過高之事何勞之有子曰政之不行也教之不成也爵祿不足勸也刑罰不足耻也故上不可以䙝刑而輕爵康誥曰敬明乃罰甫刑曰播刑之不廸䙝息列反正義鄭氏康成曰言政敎所以明賞罰康康叔也作誥尚書篇名播猶施也不衍字耳廸道也言施刑之道皇氏侃曰言在上政令所以不行敎化所以不成者祗由爵祿加於小人不足勸人爲善刑罰加於無罪不足耻其爲惡賞罰失所故政不行也孔氏穎達曰此明愼賞罰之事賞罰不中則勸懲失所故君上不可輕䙝之周公作誥告康叔云女所施刑罰必敬而明之甫刑穆王戒羣臣言所爲監者皆是伯夷布刑之道引之者證重刑之義吕氏大臨曰好惡本諸心爵祿刑罰施於政心術不正則政刑從之不可不愼也陳氏祥道曰爵祿之榮人情所甚欲也且不足以勸其爲善刑罰之威人情所甚惡也且不足以耻其爲惡則輕爵以予人猶無益也故上不可以輕爵䙝刑以加物猶不足禁也故上不可以䙝刑書言敬以致其謹明以致其察則不可䙝刑之意也子曰大臣不親百姓不寧則忠敬不足而富貴已過也大臣不治而邇臣比矣故大臣不可不敬也是民之表也邇臣不可不愼也是民之道也君毋以小謀大毋以逺言近毋以内圖外則大臣不怨邇臣不疾而遠臣不蔽矣葉公之顧命曰毋以小謀敗大作毋以嬖御人疾莊后毋以嬖御士疾莊士大夫􅀸士治平聲比音􅂌道與導同毋竝音無葉音攝正義鄭氏康成曰忠敬不足謂臣不忠於君君不敬其臣邇近也言近以見遠言大以見小互言之比私相親也民之道言民所循從也圖亦謀也凡謀之當各於其黨於其黨知其過審也案過謂繆悞審謂正當大臣柄權於外小臣執命於内或時交争轉相陷害疾猶非也葉公楚縣公葉公子高也案此文見逸周書乃祭公謀父將死而告周穆王之辭以爲葉公誤臨死遺書曰顧命小謀小臣之謀也大作大臣之所爲也嬖御人愛妾也疾亦非也莊后適夫人齊莊得體者嬖御士愛臣也莊士亦謂士之齊莊得體者今爲大夫􅀸士孔氏穎達曰此明臣無大小皆須恭敬謹愼人君無以小臣而謀大事也沈氏云大臣離貳不與上相親政敎煩苛百姓不寧是臣不忠於君君不敬於臣所致由君與臣富貴已過極也大臣不肯爲君治職事由邇臣與上相親比也民之道邇臣好則民從之好邇臣惡則民從之惡也君無與小臣而謀大臣之事無以遠臣言近臣之事無以内臣共謀外臣之事所以然者大小之臣意殊遠近之臣不同恐各爲朋黨彼此交爭相害故不圖謀若能如此則内外情通小大意合大臣不怨恨於君也近臣不爲人所非毁遠臣不被障蔽也吕氏大臨曰此言大臣不信而小臣之比國之大患也傳曰不使大臣怨乎不以大臣之任國之休戚繫焉用之斯信之不信斯黜之未有居其位而不信之者也大臣不親民疑於所任百姓所以不寧蓋由君之敬不足於臣徒富貴之而無信任之意猶犬馬畜之而弗敬也事至於此必有邇臣嬖􅃂奪大臣之權而不得治其事故曰大臣不治而邇臣比矣大臣尊嚴國之政令存焉民之所望以爲表不敬則國命輕矣邇臣􅃂昵君之好惡繫焉民之所從以爲道不愼則風俗壊矣使小臣謀大臣則大臣怨乎不以使遠臣閒近臣則近臣疾其君使内之􅃂臣圖四方宣力之臣則遠臣之賢蔽而不聞三者君之大害也陳氏祥道曰大臣道之隆德之駿王所尊而隆之者也故言敬中庸言敬大臣則不眩是也邇則居王之左右前後者欲擇正人而已故言慎書言慎簡乃僚是也敬大臣者謂其有師尊之實而下之人所視而效也故謂之民之表詩言赫赫師尹民具爾瞻是也謹邇臣者謂其正朝廷以正萬民而下之人所從而由也故謂之民之道書言侍御僕從罔非正人以至下民祗若萬邦咸休者是也大臣則權重也權重常見謀於小臣矣小臣之謀得行則大臣退故大臣怨君毋以小謀大則大臣不怨矣近臣則所親而任親而任則嘗見言於遠臣矣遠臣之言或聽則近臣踈故邇臣疾君毋以遠言近則邇臣不疾矣外臣則遠於王也遠於王則易爲内臣之所圖矣内臣之圖得用則外臣之功業不上達於王故遠臣蔽君毋以内圖外則遠臣不蔽矣小臣之於大臣勢不足以圖之其所以擠陷之者謀而已内臣之於外臣謀非不足用也勢足以圖之而已故於小大言謀内外言圖怨生乎心疾作於外疾不如怨之深也故大臣言怨邇臣言疾存異葉氏夢得曰大臣牧伯也近臣四輔三公也外臣則諸侯也案鄭孔以忠屬臣敬屬君於理則似但玩文義總重親大臣上親者内盡其忠外盡其敬猶孟子待先生如此其忠且敬之意百姓不寧由大臣不治之故大臣不親由邇臣比之故蓋左右近君善窺意旨巧於逢迎大臣方嚴素爲其所疾常謀所以閒之人主不覺毎墮其術中如𢎞恭石顯之殺蕭望之也由是類推以遠言近以内圖外中朝若此百姓何以寧哉又引葉公語結之子曰大人不親其所賢而信其所賤民是以親失而敎是以煩詩云彼求我則如不我得執我仇仇亦不我力君陳曰未見聖若已弗克見既見聖亦不克由聖案仇鄭讀逑匹也據詩君子好逑公侯好仇仇與逑同正義鄭氏康成曰親失失其所當親也敎煩由信賤也賤者無一德也詩言君始求我如恐不得我旣得我持我仇仇然不堅固亦不力用我是不親信我也克能也由用也孔氏穎達曰此言君不信用人也在上不親任其所賢有德者而信用其所賤無德者則民效於上失其所當親唯親羣小政敎所以煩亂也詩小雅正月之篇刺幽王詩君陳尚書篇名引以證不親其所賢也馬氏睎孟曰言賢則知賤者爲不肖之行言賤則知賢者有可貴之德上失其所親則下亦失其親雖區區於敎令之煩民未必從之蓋其令反其所好則民未有從之者也詩言始求我之法則如不我得焉其好之心可謂篤矣及其執我仇仇亦不我力旣已得我而反不用我至於君陳所言其理亦猶是也陸氏佃曰孟子曰堯舜之知而不徧物急先務也堯舜之仁不徧愛人急親賢也今如此雖欲不煩得乎存疑陳氏澔曰仇仇者言不一仇之無徃而不忤其意也案陳以仇爲讐非詩意子曰小人溺於水君子溺於口大人溺於民皆在其所䙝也夫水近於人而溺人德易狎而難親也易以溺人口費而煩易出難悔易以溺人夫民閉於人而有鄙心可敬不可慢易以溺人故君子不可以不愼也大甲曰毋越厥命以自覆也若虞機張往省括于度則釋兌命曰惟口起羞惟甲胄起兵惟衣裳在笥惟干戈省厥躬大甲曰天作孽可違也自作孽不可以逭尹吉曰惟尹躬天見于西邑夏自周有終相亦惟終夫音扶易竝音異費芳味反鄭云或爲哱或爲悖大音泰兌作說逭胡玩反吉讀告天作先相去聲正義鄭氏康成曰溺謂覆没不能自理出也人不溺於所敬者水人所沐浴自潔清者至於深淵洪波所當畏愼也由近人之故或泳之游之䙝慢而無戒心以取溺焉費猶惠也言口多空言且煩數也孔疏口出虚言而無寔口惠不難失在煩數過言一出駟馬不能及不可得悔也口舌所覆亦如溺矣民難卒諭人君敬愼以臨之則可若陵虐而慢之分崩怨叛君無所尊亦如溺矣君子愼所可䙝乃不溺越之言蹷也言無自顛蹷女之政敎以自毁敗虞主田獵之地者機弩牙也度謂所擬射也虞人之射禽弩已張從機閒視括與所射參相得乃後釋弦發矢爲政亦當以已心參於羣臣及萬民可乃後施也兌當作說兌命傅說作以命高宗者衣裳朝祭之服惟口起羞當慎言語也惟甲胄起兵當愼軍旅之事也惟衣裳在笥當服以爲禮也惟干戈省厥躬當恕已不害人也違猶辟也逭逃也尹吉亦尹誥也天當爲先字之誤忠信爲周相助也謂臣也伊尹言見夏之先君臣皆忠信以自終伊尹始仕於夏此時就湯矣夏之邑在亳西吕氏大臨曰小人謂民也君子謂士大夫也大人謂王公也凡人覆没於患禍不能以自出者皆在其易而䙝之也水至柔之物民狎而玩之則雖巨川深淵而不戒此取溺之道也德易狎而難親者謂水之德也與人交際不能無言古之君子辭逹而已若於已則費於人則煩過言之甚至於害德䘮身而不可悔非口之溺人乎民愚故蔽於心而不可理喻且賤故多鄙怨之心上不敬而慢之則輕身輕上無所不至此民之溺人也引大甲言爲政者如虞人射禽張機省括而後發有是心也安有溺於民之患哉兌命言庻政不可不慎也大甲言禍患之溺莫非自取也尹告言君以忠信有終皆君所自致也此引書爲證與書文小不同義無所害方氏慤曰前兼言大人小人此統言君子者君子上下之通稱馬氏睎孟曰禍故多藏於隱微而發於人之所忽蔽於所䙝而不知加愼以爲慮此其所以至於没溺而不知悟也費者言其無實煩者言其無節言之非艱故易以出斯言之玷不可磨故難以悔蔽於易出以爲常不知難悔以爲慮此君子所以至於溺也敬者御民之道書曰予臨兆民若朽索之馭六馬爲人上者奈何不敬不能莊以涖之而乃慢易以犯之此大人所以至於溺也衣服者所以命有德不可以命非其人故在笥言藏之而不輕於與人也干戈所以討有罪而不可以伐非其罪故省厥躬言當恕之於已然後可以責諸人也甲胄所以自衞干戈所以敵物天作孽猶有可違之理蓋脩德則可以消天變禍自已求無所逃於天地之閒也陸氏佃曰閉則不能受人鄙故係吝怨毒難解存疑鄭氏康成曰德易狎而難親者言有德者亦如水矣初時學其近者小者以從人事自以爲可則侮狎之至於先王大道性與天命則遂扞格不入迷惑無聞如溺於大水矣難親親之當肅敬如臨深淵存異孔氏穎達曰卑賤小人居近川澤愛玩於水多所覆没君子以口傷人而致怨恨遂被覆没如溺於水案鄭意以口惠人疏謂以口傷人意正相反又似以水譬口合兩爲一疏例無此辨正吕氏大臨曰先儒以德爲人之德易狎難親豈德之謂耶方論溺水溺口溺民三者之别無庸以有德厠其閒子曰民以君爲心君以民爲體心莊則體舒心肅則容敬心好之身必安之君好之民必欲之心以體全亦以體傷君以民存亦以民亡詩云昔吾有先正其言明且清國家以寧都邑以成庶民以生誰能秉國成不自爲正卒勞百姓君雅曰夏日暑雨小民惟曰怨資冬祈寒小民亦惟曰怨好竝去聲勞鄭去聲今如字雅今書作牙資今書作咨屬上句鄭讀至屬下句祈書作祁案陸氏曰詩無上五句餘在節南山篇而無能字或皆逸詩也正義鄭氏康成曰先正先君長也誰能秉國成傷今無此人也成邦之八成也孔疏周禮小宰職掌以官府之八成經邦治一曰聽政役以比居二曰聽師田以簡稽三曰聽閭里以版圖四曰聽稱責以傳别五曰聼祿位以禮命六曰聽取予以書契七曰聽賣買以質劑八曰聽出入以要㑹皆成事品式以聽治於人誰能秉行之不自以所爲者正盡勞來百姓憂念之者與孔疏卒盡也先正謙退能用仁恩盡勞來百姓今無有如此之人案朱子詩傳不自爲政而以付姻婭之小人卒使受其勞病勝鄭此註疾時大臣專功争美雅書作牙假借字君牙書篇名周穆王司徒君牙作案梅賾古文尚書是王命君牙爲司徒夏日暑雨小民怨天至冬寒小民又怨天言民恆多怨爲其君難孔疏尚書云小民惟曰怨咨今此本作資字鄭又讀資爲至以鄭不見古文尚書故也孔氏穎達曰此論君民相須養人之道不可不愼也詩人稱昔吾之有先君正長其敎令之言分明且清潔國家所以安也都邑所以成也庶人所以生也詩逸詩也書言民心難稱君政雖當人怨不已是治民難也吕氏大臨曰引詩言君不正百姓所以勞也引君牙言天之寒暑小民且怨況君之政敎乎方氏慤曰民以君爲心好惡從於君也君以民爲體休戚同於民也體雖致用於外然由乎心之所使故曰心好之身必安之心雖爲主於内然資乎體之所保故曰心以體全亦以體傷荀子曰君舟也庶民水也水能載舟亦能覆舟君以民存亦以民亡之謂也陳氏祥道曰詩言昔吾有先正居人上者其言明且清則人可得而法謂之先正以其正身而後正天下也唯能正身以率之故國家以寧都邑以成庶民以生幽王不然權移於下故詩人傷之不能秉國成則政出多門而不自爲政矣政多門則多事多事則百姓所以勞此幽王不明所以懐來之道也天之於民厚矣而寒暑之過正雨暘之失中民猶怨咨則爲上者可不敬乎通論吕氏大臨曰天下無一物非我故天下無一物不愛我體或傷心則憯怛理之自然故大人自任以天下之重匹夫匹婦有不被堯舜之澤若已推而納之溝中豈勉强之所能爲也體完則心悅猶有民則有君也體傷則心憯猶民病則君憂也所以安危存亡者亦然可不愼乎存異鄭氏康成曰資當爲至齊魯語聲之誤也祈之言是也齊西偏之語也案君雅依古文尚書則末脫一咨字子曰下之事上也身不正言不信則義不壹行無類也行下孟反正義鄭氏康成曰類謂比式孔氏穎達曰此明下之事上當一其守陳氏祥道曰下之事上以身爲本而信以成之也方氏慤曰身不正故義不壹言不信故行無類不壹謂不能專於其身也無類謂無以副於其言也陸氏佃曰不壹無以統之無類無應之者案臣之告君孰不以正然身者言之本自處以義則身正而言之於君亦信而樂從身不正不能事事皆出於義其發之言者與行絶不相類而望君之信從不可得也諸儒忘却下之事上句故說多膚子曰言有物而行有格也是以生則不可奪志死則不可奪名故君子多聞質而守之多志質而親之精知畧而行之君陳曰出入自爾師虞庶言同詩云淑人君子其儀一也行有之行去聲是以陸本作是故鄭云精或爲清知如字一音智正義鄭氏康成曰物謂事驗也格舊法也精知熟慮於衆也自由也師庶皆衆也虞度也言出納政敎當由女衆之所謀度衆言同乃行之政敎當由一也孔氏穎達曰言必須有徵驗行必須有法式言行不妄守死善道名志俱善欲奪不可也質而守之親之畧而行之皆謂聞見雖多執守簡要也君陳成王戒君陳之言詩曹風鳲鳩篇言善人君子威儀齊一證爲政須齊一也吕氏大臨曰有物則無失實之言有格則無踰矩之行如是者人歸於一而不可變也生乎由是死乎由是故志也名也不可得而奪也義重於生舍生而取義則不義之名君子所不受也多聞所聞欲博也多志多見而識之者質正也不敢信已質衆人之所同然後用之者也守之者服膺而勿失者也親之者學問不厭者也由多聞多志而得之又當精思以求其至約而行之故曰精知畧而行之畧約也此皆義壹行類之道也君子之學必致一不致一則二三一者何理義而已以吾之所同然合人之所同然而已引書言當謀之於衆取其同然也引詩言君子之行卒歸於一也陳氏祥道曰志者言行之所從出名者言行之所自成言有物行有格則志之所守者堅而名之所成者著是以生則不可奪志死則不可奪名馬氏睎孟曰聞之志之則言有所擇而言無所妄此言有物也知之則可以行知之已精而又畧而行之則行有所擇而行無所妄此行有格也存疑鄭氏康成曰質猶少也多志謂博交汎愛人也案鄭訓質爲少不如吕氏訓正爲確言有物言皆至當之理行有格不踰規矩之中生必行其所求之志即死亦不變平生之所守而遺不令之名也要其所以然者則有學焉多聞多志者學之博必求其正者擇之精然後取其至要者而行之所謂守之約也庶言同則言有物可知其儀一則行有格可知注疏連上章爲一節陳澔本從之徐師曾分二章今案記者之意相承而子未必一時之言故從徐本子曰唯君子能好其正小人毒其正故君子之朋友有鄕其惡有方是故邇者不惑而遠者不疑也詩云君子好仇能好之好去聲正鄭讀匹今如字鄕許亮反又如字惡烏路反仇詩作逑正義鄭氏康成曰鄕方喻輩類小人徼利其友無常也邇近也仇匹也孔氏穎達曰君子所親朋友及所惡之人皆有輩類故善者與之交不以榮枯爲異不善者則憎惡之言有常也好惡有定可望貌而知故近不惑而遠不疑也詩周南關雎篇斷章云以好人爲匹也吕氏大臨曰君子之好不可以非其人故曰朋友有鄕所惡不可以及善人故曰其惡有方陳氏祥道曰君子小人異道故正人君子好之而小人毒之方氏慤曰君子非特其身正而已於正人又好而與之小人非特身不正而已於正人且毒而害之此君子小人好惡之辨有鄕有方言取舍之有常也通論陳氏祥道曰邇者不惑儒行所謂並立則樂相下不厭也遠者不疑儒行所謂久不相見聞流言不信其行也胡氏銓曰君子正直是與故好之小人惡直醜正故惡之君子居必擇鄕遊必擇士所以防邪僻而近中正也存疑鄭氏康成曰正當爲匹匹謂知識朋友案鄭氏以正爲匹然小人亦有同惡相濟者寧盡相毒耶不如陳說明確子曰輕絶貧賤而重絶富貴則好賢不堅而惡惡不著也人雖曰不利吾不信也詩云朋友攸攝攝以威儀上惡烏路反正義鄭氏康成曰言此近徼利也攸所也言朋友以禮儀相攝正不以富貴貧賤之利也孔氏穎達曰此明交友之道以賢而貧賤則輕絶之是好賢不堅惡而富貴則重絶之是惡惡不著此貪利之人也詩大雅旣醉篇美成王太平之詩於時朋友羣臣相攝佐之時以威儀也言不以富貴貧賤而求利者陳氏祥道曰貧賤者人之所易絶於其所易絶者而不絶然後爲好賢之堅富貴者人之所難絶於其所難絶者而絶之然後爲惡惡之著也方氏慤曰可友者以其賢可絶者以其惡然賢者不必富貴惡者不必貧賤茍輕絶貧賤而重絶富貴則勢利之交而已通論陸氏佃曰相好仁也相攝義也相好主内君子好仇是也相攝主外攝以威儀是也案重絶富貴如揚雄蔡邕荀彧輩所以貽萬世羞也子曰私惠不歸德君子不自畱焉詩云人之好我示我周行歸鄭云或作懐好去聲行户剛反又如字正義鄭氏康成曰行道也言示我以忠信之道孔氏穎達曰此明君子唯德是與詩小雅鹿鳴之篇周忠信馬氏睎孟曰有忠信之德然後將之以惠禮也茍無忠信之德而行之則君子不自畱焉吕氏大臨曰引詩言受人之好以示我至公而不比故也孔子曰君子周而不比周則徧徧則公比則有所附有所附則私通論陳氏澔曰上文言好惡皆當循公道故此言人有私惠於我而不合於德義之公君子決不畱之於已也存異鄭氏康成曰私惠謂不以公禮相慶賀時以小物相問遺也言其物不可以爲德則君子不以身畱此人孔氏穎達曰言不用畱意此等人案惠小惠德大德處我以禮物雖微亦德也惠而曰私非以此嘗我卽以此豢我矣私惠不歸德謂小惠不足爲德也君子不畱如子思不受鼎肉孟子不爲貨取是也鄭氏在公禮小物上說又以畱爲畱此人似誤子曰茍有車必見其軾茍有衣必見其敝人茍或言之必聞其聲茍或行之必見其成葛覃曰服之無射射音亦詩作斁正義鄭氏康成曰言凡人舉事必有後驗也見其軾謂載也敝敗衣也衣或在内新時不見射厭也言采葛爲衣服之無斁言不虛也孔氏穎達曰此明人言行必愼其所終也詩周南葛覃之篇馬氏睎孟曰言有實於此有以徵於彼而君子不可無其實也陸氏佃曰軾言前敝計後存異吕氏大臨曰有軾則有車無車則何所憑而式有衣然後可敝無衣則何敝之有案軾在車前車不止軾而先見其軾有其全必有所先見也衣之初服未至敝而終見其敝有其始必要其終也以興言雖隱而必聞行方始而必成之意引詩證衣則車可知子曰言從而行之則言不可飾也行從而言之則行不可飾也故君子寡言而行以成其信則民不得大其美而小其惡詩云白圭之玷尚可磨也斯言之玷不可爲也小雅曰允也君子展也大成君奭曰在昔上帝周田觀文王之德其集大命于厥躬行從則行之行並去聲寡鄭讀顧今如字玷丁簟反奭音釋尚書今文作周田觀古文作割申勸文書作寧正義鄭氏康成曰從猶隨也以行爲驗虛言無益於善也玷缺允信也展誠也奭召公名君奭尚書篇名孔氏穎達曰此明重言行之事言在於先而後隨以行之則言須實行在於前言隨於後則行須實言行皆不可虚飾也君子言行相顧則人於美惡大小不得增減皆驗於行也詩大雅抑之篇刺厲王詩小雅車攻篇美宣王詩君奭書篇名周公告君奭之辭也吕氏大臨曰飾言者所言非信故不可行飾行者所行必僞故不可言君子言顧行行顧言而已不可失吾信使民之稱美惡不敢有所大小而失其實也言之不信所謂玷也允也君子展也大成言君子非信則不成也君奭言文王有誠信之德爲天所命況於人乎案人有小善言必飾而大之其夸飾在言人有大惡言必飾而小之其掩飾在行然言行相隨聽其言者必考其行言不可飾也觀其行者必察其言行不可飾也是故君子寧寡於飾僞之言而務實行其爲善去惡之事惡日祛而小善日積而大使發於口者無不可信之言而民亦自從而化之矣引詩大雅以證寡言小雅以証成信引書以証民皆化於君通論吕氏大臨曰莊生之言非不善也卒不可以治天下國家此言之飾也五霸假仁義而行非不美也而後世無傳焉此行之飾也存疑鄭氏康成曰寡當爲顧聲之誤也古文周田觀文王之德爲割申勸寧王之德今博士讀爲厥亂勸與此三者異古文似近之割之言蓋也孔疏今文伏生所傳歐陽夏侯所注者古文衞賈馬所注者以文從壁中出故謂之古文卽鄭注尚書是也蓋割亦聲相近陸氏佃曰先儒謂虞芮質厥成諸侯並附以爲受命之年故曰其集大命于厥躬辨正陸氏佃曰寡如字言之必踐之是以寡民雖欲虚美隱惡不可得也所謂周田虞芮質成是也案古文前人多疑之若此記所引今文作上帝周田觀文王之德古文作上帝割申勸寧王之德周田古無訓辭陸氏乃以虞芮質成言之其說亦似但周田字旣無確詁又不若解割申勸者之說爲恊也緣屬伏生所傳特存之以俟精者至博士之說則不可爲訓矣子曰南人有言曰人而無恆不可以爲卜筮古之遺言與龜筮猶不能知也而況於人乎詩云我龜旣厭不我告猶兌命曰爵無及惡德民立而正事純而祭祀是爲不敬事煩則亂事神則難易曰不恆其德或承之羞恆其德偵婦人吉夫子凶與平聲兌讀說鄭云純或爲煩偵周易作貞正義鄭氏康成曰恆常也不可爲卜筮言卦兆不能見其情定其吉凶也猶道也言䙝而用之龜厭之不告以吉凶之道也惡德無恒之德也純或爲煩惡德之人使事煩事煩則亂使事鬼神又難以得福也孔氏穎逹曰龜筮猶不能得知無恆之人況於凡人乎詩小雅小旻篇刺幽王數誣卜筮說命傅說告高宗之辭言惡德之人主掌祭祀其事則煩事煩則致亂也易恆卦九三六五爻辭引之以証無恆其行惡也吕氏大臨曰德歸於一則有恆二三則無恆鬼神之理至虛而善應齊戒潔成虛心以求之猶有不應將以二三不定之私意瀆而求之其可得乎馬氏睎孟曰婦人無攸遂在中饋吉德不可以無恆夫子以知率人德不可以無變所謂婦人之從一而終夫子制義從婦而凶與此合存疑鄭氏康成曰純猶皆也言君祭祀賜諸臣爵無與惡德之人也民將立以爲正言放傚之疾事皆如是而以祭祀是不敬鬼神也孔疏此明爲人臣之法當有恆言若爵此惡德之人立之以爲正事在下必學之若毎事皆爵此惡德之人主掌祭祀是不敬鬼神難得其福偵問也問正爲偵婦人從人者也以問正爲常德則吉男子當專行幹事而以問正爲常德是亦無恆之人也孔氏穎達曰南人殷掌卜之人案孔疏無據朱子曰南人南國之人陸氏佃曰民立而正正讀如政民立而正事純卽書所謂惟厥攸居政事惟醇也而祭祀是爲不敬卽書所謂黷于祭祀時謂弗欽也爵罔及惡德民立而正事純可謂善矣然祭祀爲不敬則事煩不能不亂事神難矣事煩讀如事神之事雖然恆其德矣不知化而趨變是亦凶而已矣故經合二爻以爲一案書兌命之意言無恆之人是謂惡德朝廷爵命罔有及者則民亦惟立汝正事改惡脩德可矣若純求之祭祀以希爵命鬼神聰明正直而諂黷之是謂不敬也祭愈煩而心愈亂以此事神不亦難乎下又引易見所謂恆者非拘固之謂可與立又當可以權以足上文之義欽定禮記義疏卷六十九
