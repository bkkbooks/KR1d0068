body:
  text: 王制第五之一正義盧氏植曰漢文帝令博士諸生作此篇孔氏穎達曰鄭目録云名王制者以其記先王班爵授禄祭祀養老之法此於别録屬制度鄭答臨碩云孟子當周赧王之際王制之作復在其後葉氏適曰文帝初賈􅁩言當改正朔定官名色用黄數用五而已中年􅁩已死新垣平得用始有作王制廵守封禪之説項氏安世曰王制之言爵禄取於孟子言廵守取虞書歳三田及大司徒大司馬大司空三官取公羊朝聘取左傳其餘必皆有所授蓋文帝合漢初今文博士之傳斟酌增損共為一書將以興王制致太平其書自應與古文諸書不合鄭氏康成無䇿以通之强為之説曰殷制豈非遁辭哉通論髙氏文彪曰孟子言周室班爵禄諸侯惡害已而去其籍知天下莫先於此王制所以冠之於首又曰暴君汙吏必慢其經界知天下莫急於此王制所以奠之於終彭氏絲曰此篇前言爵命田禄中散言六官末言養老三者為經而中閒錯出數節為緯篇末自註前段義葉氏夢得曰自王者之制禄爵至千里之内以為御分田制禄為詳所以正經界也經界正則榖禄平而封地所以制禄所封有小大而守土之臣必以小大相屬故自千里之外設方伯至下大夫一命言建侯設官尤備所以次之封地也建侯設官才不可不辨故自凡官民材至不及以政皆擇人之法所以次之設官也設官以守乎外天子專治於内𫝑恐不相及故自比年一小聘至一徳以尊於天子皆廵守朝聘之制所以次之擇人也廵守以考績明則陟幽則黜黜不足則加以兵故自賜諸侯樂至出征執有罪皆黜陟之法所以次之廵守也兵不可以無備田獵以習兵故自無事則歳三田至不覆巢所以次之出征也財所以聚人用財不可無節故自冡宰制國用至日舉以樂皆用財之節財用足可以行禮而禮莫大於喪祭故自七日而殯至寢不踰廟皆喪祭之禮所以次之財用足也征稅則取財未及於生財居四民時地利所以生財也故自司空度地至樂事勸功皆生財之道所以次之征稅也冡宰所職者邦治而治所以平邦國司空所職者邦事而事所以富邦國既富之斯教之故自司徒脩六禮及樂正立四教皆教之大成所以次之生財也司徒樂正教以成其材未及辨其材故自司馬辨論官材至不與士齒皆論辨之道所以次之教也司馬所授者邦政而刑所以輔政之不及故自司冦正刑明辟至四誅不以聽所以次之政也刑懲其已然禁止其未然故自圭璋不粥至禁異服識異言皆於未然止之所以次刑也至此治道備事功成矣百官於歳終程功緒而考其廢置故自天子受諫至百官受質皆在於廢置所以次之刑禁也天子受諫於上則有道揆百官受質於下則有法守而道徳一於天下治之所終也然而養耆老以致孝恤孤獨以逮不足則王道之始經界正榖禄平則仁政之始故自休老勞農下於養老恤孤分田制禄詳言之所以成始也王制所論其序如此孫氏景南曰統諸侯之權自五國有屬長十國有連帥三十國有卒正至二百一十國有州伯豈後世維持郡國者所暇及也舉賢之法論於鄉為秀士升於學為俊士論於大樂正為造士論於司馬乃為進士豈後世選用人才者所暇及也一聽獄也史以獄成告正聽之司冦又聽之王又命三公參聽之王猶三宥然後制刑何謹之至也一受質也司㑹以其成質天子而冢宰受以退三官又以質天子而百官受以退何審之詳也非三代之法其孰能與於此有不免牴牾者如祝史射御醫卜周禮列於六官之屬而射尤最重自天子至士皆有事焉以為不與士齒何耶案作此書者必儀禮已行周禮未出故以鄉相見列諸七教六官無宗伯而司馬亦不言掌兵要其大㫖言公田藉而不稅關市譏而不征山澤入而不禁言圭田言養老恤窮民無告者言省刑罰言設學校多根柢孟子而言班爵則取孟子全文其不言天子一位則以漢承秦後天子甚尊不敢復與公侯伯子男並列為五等其質成之法獨歸重大司徒大司馬大司空則因漢法以此為三公欲稍變古以宜今也雖於古聖人制作之精意未必盡當而規模亦整飭可觀且文帝本以新垣平言議廵守封禪而本篇言廵守絶無一言及封禪其學識過叔孫通司馬相如輩逺甚厥後文帝謙譲卒莫之行而此書亦成虛説矣輯禮者取入記中以其去古未逺也而後人徒以其與周禮孟子不合銖銖而稱寸寸而度曾不察其本末豈通儒之論哉王者之制禄爵公侯伯子男凡五等諸侯之上大夫卿下大夫上士中士下士凡五等正義榖梁氏曰仁義歸徃曰王孔疏身有仁義人所歸徃也鄭氏康成曰禄所受食爵秩次也上大夫曰卿班氏固曰禄録也所以收録人才爵盡也盡其才而用之也孔氏頴逹曰鄭注司禄云禄之言榖年榖豐乃後制禄周禮大司徒以賢制爵以庸制禄禄在爵後此禄在爵前者禄是田財之物班布在下最國之重事須裁節得所王者制度重之故在於先又曰元命苞云公之為言平也公平正直侯者候也候王順逆伯之為言白也明白於德子者奉恩宣徳男者任功立業大夫者達人謂扶逹於人士者事也皇熊皆云為任職事士既命同而分為三等者士職卑徳薄義取漸進卿大夫位髙徳顯不須細分也卿大夫士不以王朝之臣但取君臣相對也陳氏祥道曰田不分不可以制禄禄不制不可以定爵先王量財以制用視禄以制爵然後無有餘不足之患故以禄爵為序徐氏師曾曰首句乃一篇之綱領故特揭之葉氏夢得曰禄以詔功爵以詔徳皆王者之事故制其等則自公至於下士爵之名也自天子之田方千里至庻人在官者禄之差也公近天子而爵盛大故必以無私為徳侯伯逺天子而障扞於外欲其有所屈故稱侯伯侯伯長也言其徳足以長人子養也言其道足以養人男任也言其道足以安人五等者臣於天子者也諸侯有國亦人君也有君莫不有臣故近諸侯欲其承上羣而不黨而知進退則曰卿上以忠扶君下以智帥人則曰大夫志有所尚仕有所事則曰士王譬則天也其臣之數則有公侯伯子男有卿大夫士諸侯譬則地也其臣止於卿大夫士附庸雖附於大國不得臣之以地統於天也地統於天則雖其卿大夫士猶不能純臣於諸侯天則統地故雖諸侯為君亦必純臣於天子熊氏安生曰上五等制爵通於天下下五等施於一國郝氏敬曰王制説宗孟子而有異者不以天子列於五等尊王也不以國君列於六等尊君也通論孔氏頴逹曰周禮設官分職官者管也以管領為名指其所主則謂之職尚書唐虞建官惟百外有州牧侯伯是州牧侯伯亦名官也若細而言之則諸侯非有偏主故學記云大徳不官注謂天子諸侯也諸侯亦稱職朝於天子曰述職也殷以前大夫以上有爵故士冠禮云古者生無爵死無諡周則士亦有爵故鄭注周以士為爵死猶不為諡馬氏端臨曰周制非二王後不為公故周公太公爵皆為侯詩曰穆穆魯侯齊侯之子是也而春秋有虞公虢公或常為三公子孫因其號歟故天子三公八命卿六命大夫四命上士三命中士再命下士一命其出封各加一命三公加為方伯九命卿加侯伯七命大夫加子男五命元士出為附庸四命大夫以上徳盛爵命並加士徳未周進命不進爵故附庸猶稱命也子弟及異姓封爵不過侯而有大功徳則進地故齊魯皆以侯而受上公五百里之地若列土侯伯有功徳加一命為牧故春官云八命作牧上公之孤四命卿三命大夫再命士一命次國無孤卿大夫士同小國之卿再命大夫一命士不命周禮爵及命士故云一命受爵有爵命者有職故周禮云一命受職再命受服受服於君不自為然則一命者其服自為之也三命受車馬謂侯伯之卿父在則不受故曲禮云為人子者三賜不及車馬三命之卿有命於天子之禮故周禮云三命受位皆有列位於王朝則小國之卿再命未有列位也三命始受車馬則再命以下車馬自為之若君特賜者不在此例四命受器謂公之孤卿受祭器於公若三命以下皆自為之故記曰有田禄者先為祭器存疑孔氏頴逹曰白虎通云卿之言嚮也為人所歸嚮也案周禮六官之屬止有中大夫下大夫是天子之卿即上大夫也諸侯之國無中大夫止有下大夫五人是諸侯之上大夫即卿也諸侯三卿者司徒兼冡宰司馬兼宗伯司空兼司冦左傳季孫為司徒叔孫為司馬孟孫為司空其明據下大夫五人者崔氏靈恩云司徒之下置小宰小司徒司空之下置小司冦小司空司馬事省但置小司馬也然魯有夏父弗忌為宗伯豈有禮事即轉小司馬為宗伯如燕射之轉司馬為司正歟又攷白虎通卿之為言章善明理也大夫之為言大扶進人也故傳曰進賢達能謂之大夫士者事也任事之稱故傳曰通古今辨然否謂之士與孔疏訓卿為歸嚮迥異且卿之文從卩與鄉之文從邑者亦迥别葉訓知節得之天子之田方千里公侯田方百里伯七十里子男五十里不能五十里者不合於天子附於諸侯曰附庸正義鄭氏康成曰方千里畿内之地以禄公卿大夫元士者也不合不朝㑹也小城曰附庸附庸者以國事附於大國未能以其名通也熊氏安生曰此以下皆制禄之法孔氏頴達曰此論天子畿内之田及王畿外五等諸侯之制七十里倍減於百里五十里倍減於七十里故孝經緯云徳不倍者不異其爵功不倍者不異其土故轉相半别優劣也成氏伯璵曰徳髙者倍其爵功高者倍其土人臣有大勲天子報以土地開國承家也彭氏絲曰方千里者横千里直千里共一百萬里也案一百萬里者謂方一里者百萬也案凡言方非正方也以開方法計之有此數耳如臣瓚謂周西都方八百里每方為百里者八八八六百四十里東都方六百里每方為百里者六六六三百六十里合之則方千里也其餘侯國亦大約因山川之形𫝑大國方百里所謂一同也方七十里有方百里之半方五十里有方七十里之半皆舉其大畧之辭民功曰庸其治民之功因大國以逹於天子或曰庸墉通附庸猶屬城項氏言王莽封諸侯置附城蓋以城為庸也通論陳氏祥道曰三等之地百里七十里五十里正封也五百里四百里三百里二百里一百里五等則包附庸廣封也正封則尺地莫非其土一民莫非其臣尊者嫌於盛而無所屈故公之地必下而從侯卑者嫌於削而無所立故男之地必上而從子至於廣封則欲上之政令有所統而不煩下之職貢有所附而不費且非諸侯所得擅尊不嫌於太多卑不嫌於太寡故公之地必五百里而異於侯男之地止百里而異於子也王氏安石曰王制封國三等古者九州之地以及四海之内莫不各有君長苟斥而大之増至百里五百里則所絀廢削滅必多此於人情必不合也或者以商末諸侯各相侵并合為大國至周始裁損就五百里至百里則不當云分土惟三也武王分土惟三周公又何增至五百里耶孟子言周公封魯百里明堂位言封周公方七百里蓋此時魯人已不知始封之大小矣又子産言諸侯一同與孟子合則五百里之言殆不足信葉氏夢得曰以其地方五百里而去山林川澤取其可食者半則是附庸在其中以其地方百里皆可食之地而山林川澤不在焉則是附庸在其外此魯所以有七百里而孟子亦謂周公封於魯地方百里也詩云錫之山川土田附庸附庸舉其虚封言之所謂七百里也土田舉其實封言之所謂方百里也汪氏克寛曰周禮大司徒論公侯伯子男之地各以封疆言而其食者或半或三之一或四之一孟子王制所言専主田禄正周禮所謂食者也其食者魯頌所謂錫之土田其封疆魯頌所謂錫之附庸也陳氏澔曰里數有二分田之里以方計分服之里以袤計分服則計道里逺近以為朝貢之節分田則計田畝多寡以為賦禄之制此所以為均平也案虞書言弼成五服至於五千每服一面五百里合兩面千里通五服方五千里又外薄四海咸建五長約五百里王制州方千里則縱廣方三千里周禮九服每服一面二百五十里合兩面五百里通九服四千五百里合王畿千里為方五千五百里則縱廣方七千里鄭因謂唐虞時中國方五千里以合虞書夏衰四夷内侵故疆域最狭止方三千里以合王制周公斥大疆域中國地至方七千里以合周禮職方附㑹可謂宻矣至謂殷時方千里者九周時方千里者四十九其地五倍於殷而又有半周􅀄因殷之舊故公侯猶方百里周公增公之封五五二十五箇方百里如其説則增封一公其左右皆公侯則并其二十四國皆伯則并其四十七八國若子男附庸則所并者將百國矣不知此所并者無罪而盡滅之乎抑遞徙而逺至四裔之外舉其舊國號移而加之彼乎今攷之經禹貢於東言海岱言河濟周職方言其鎮岱山其川河泲案泲古濟字禹貢於西言華山言涇渭周職方於河南言華山正西言涇汭渭洛禹貢於南言衡山言江漢職方同與王制東舉東海南舉衡山西舉流沙疆域畧同惟周職方於北言其鎮醫無閭其澤藪貕養而王制言北不盡恒山疆域稍狭然禹貢云朔南暨以聲教所至言王制皆云不盡以封建侯國言其實相方也蓋州域之分合小大無常而山川之名終古不易故虞肇十二州禹復為九州禹貢與職方山川分屬閒有小異耳烏覩周公所斥大之地五倍於殷有半者歟從古山川之奠成於禹功故周言信彼南山維禹甸之商頌言天命多辟設都于禹之績孟子周人亦言方千里者九齊集有其一言周室班爵禄而曰天子之制地方千里公侯皆方百里又言周公之封於魯太公之封於齊皆方百里也王制所云悉本孟子斷為周法無疑又唐虞與夏皆都冀商界冀豫閒周都雍大抵南之疆域寛而北狹則書五服服各五百里周禮九服服各五百里舉兩面言之耳存異鄭氏康成曰此地殷所因夏爵三等之制孔疏不直舉夏時而云殷所因者下云千七百七十三國少於夏之萬國殷有鬼侯梅伯春秋變周之文從殷之質合伯子男以為一則殷爵三等公侯伯也孔疏公羊傳鄭忽何以名春秋伯子男一也辭無所貶異畿内謂之子孔疏夏四百國在畿内國皆五十里殷畿内爵雖為子若作三公則受百里之地六卿則受七十里之地大夫則受五十里之地與夏不同微子箕子皆是畿内采地之爵非畿外治民之君周武王􅀄定天下更立五等增以子男而猶因殷之地以九州之界尚狭也周公攝政致太平斥大九州之界成武王之志封王者之後為公及有功之諸侯大者地方五百里其次侯四百里其次伯三百里其次子二百里其次男百里孔疏大司徒職文所因殷之諸侯亦以功黜陟之孔疏既無大罪不可以絶今日有功則升陟或二百里或三百里於周有過黨紂為惡者皆黜退之或減至七十里五十里或黜為附庸其不合者皆益之地為百里焉孔疏謂不以功過黜陟平常諸侯皆益之地為百里是以周世有爵尊而國小孔疏鄭答張逸云若虞虢之君爵公而地方百里爵卑而國大者孔疏侯四百里伯三百里子男二百里皆大於虞虢惟天子畿内不增者以禄羣臣不主為治民也孔疏外土諸侯本主治民須使民利國故湏增益其封孔氏頴逹曰夏㑹諸侯於塗山執玉帛者萬國若不百里七十里五十里不得有萬國故知夏爵三等之制如此武成云列爵惟五分土惟三武王􅀄定天下增以子男之爵列爵既五則分土亦意欲五等而地尚狭隘未得廣封周公開斥廣大於先中國方三千里今方七千里乃為五等之封以成武王之意若大司徒職所云也説者因此以為文家五等質家三等然虞夏質而虞書輯五瑞豈三等乎孝經夏制而云公侯伯子男亦不三等也案孝經孔子與曽子言孝安所據而以為夏制辨正胡氏銓曰鄭云此殷所因夏爵三等之制何休云春秋改周之文從殷之質合伯子男為一皆不經也案春秋尊周何嘗變周亦何嘗合伯子男以為一如杞入春秋書侯莊二十七年黜為伯至僖二十三年貶稱子若以伯子男為一何必書侯書伯書子以貶杞明堂位云脯鬼侯天問云梅伯受醢箕子佯狂殷有侯有伯有子亦有男可知是殷亦備五等矣鄭氏乃云微子箕子是畿内采地之爵不得為子男之子則天子三公亦不得為公侯之公乎推此則鄭云殷爵三等者非也夏有塗山之㑹執玉帛者萬國若只三等不得為萬國則鄭云殷所因夏三等又非矣自虞氏五瑞五玉以来制為五等夏殷周因之未有改不可謂虞周有五等殷猶三等也存疑葉氏夢得曰周官合山林川澤而言之則謂之地王制止於可食之地則謂之田案孟子言天子之制地方千里大國地方百里是地與田一也故以五百里兼山林川澤附庸百里為可食之地則可以稱地與稱田異義則不可天子之三公之田視公侯天子之卿視伯天子之大夫視子男天子之元士視附庸正義鄭氏康成曰視猶比也朱子曰元士上士也陳氏祥道曰在内者卑其命而禄必視外則名有所屈而實有所養在外者崇其命而禄不異乎内則名有所申而實有所守也案此以禄之制於畿内者言之其視外諸侯合内外於一體也通論陳氏祥道曰周禮載師士田任近郊之地案士田先鄭謂士大夫子得而耕之後鄭謂仕者之圭田朱子謂上士中士已有禄此未命之士無禄故受田則已命之士在公邑甸地歟家邑之田任稍地案大夫受地在焉小都之田任縣地案卿受地在焉大都之田任畺地案公受地在焉此所謂視侯伯子男者也士受田寡而近地為可容故任之近郊公卿大夫田多非逺地不足以容故任之縣畺此周采地之别也鄭氏釋大司徒以王制縣内之數為夏之采地曰周則未聞小司徒又曰采地百里之國凡四都五十里之國凡四縣二十五里之國凡四甸既曰未聞而又質言之何據耶徐氏自明曰先王設官制禄受田相視内外齊一所以制天下偏重之患而使逺近若一也畢公保釐東土衛武入相於周所以出入均勞而内外之輕重不分也故内諸侯之禄必視外諸侯而為之制三公受百里卿受七十里大夫受五十里之地而元士三等亦視附庸而受田夫田者禄之所自出而居官之禄即田也皆有采邑大夫受五十里有功始食采地其子孫得世其禄不得世其官無功則無采地亦與士皆食禄於上以圭田為祭祀耳自三公至元士大者受邑小者受田所謂分田制禄可坐而定於此畧可考矣存疑葉氏夢得曰古者三公無常職大夫雖有常職而有卿為之者故三公與六卿其田同視公侯卿與大夫其田同視伯大夫與元士其田同視子男以及附庸孟子舉卑而見尊故止言卿大夫元士王制定其尊卑之序故雖三公無常職附庸不合於天子亦必詳言之也季氏本曰視者視其所食之禄耳大國君田三萬二千畝卿則視之次國君田二萬四千畝大夫則視之小國君田一萬六千畝元士則視之葢畿外諸侯公用在君十卿禄外畿内之臣公用皆出於天子賦内不必取於其私故視其禄而已足非視其國方百里方七十里五十里也存異鄭氏康成曰元善也善士命士也孔氏穎逹曰案周禮注天子上士三命中士再命下士一命所以皆稱元士異於諸侯也諸侯伯之士雖一命不得稱元士辨正方氏慤曰上士稱元士與元子元侯同義惟上士得稱之以其才不特能事人又可以長人故也不言中士下士惟上士得視附庸耳案孟子言天子之卿受地視侯大夫受地視伯元士受地視子男此就孟子遞減一等亦酌時宜而將以為漢制也葉氏謂孟子舉卑以見尊王制定其尊卑之序故必詳言之是孟子止聞其畧而漢儒反得其詳耶其誤由鄭以王制為殷制而諸儒又以為周制耳至季氏視其祿非視其國之説於義未恊觀萹末封方百里者九方七十里二十一未嘗不以國土言也制農田百畝百畝之分上農夫食九人上次食八人其次食七人其次食六人下農夫食五人庶人在官者其祿以是為差也分孟子作糞食音嗣差楚宜反正義馬氏睎孟曰百畝以周尺言之六尺為歩歩百為畝鄭氏康成曰農夫皆受田於公庶人在官謂府史胥徒官長所除不命於天子國君者孔疏官長如冢宰為天官之長大司徒為地官之長太府為府藏之長大司樂為樂官之長其府史胥徒皆得自命之以不在九命之類故知不命也除謂去其舊名籍賈氏公彦曰王制言下士視上農夫食九人則府食八人史食七人胥食六人徒食五人其官並亞士故號庶人在官應氏鏞曰上農九人下士視農夫互相積而倍之者三則為中士為上士為大夫自是積而四之則為卿案此舉大國而次國三大夫小國二大夫可知又自是積而十之則為君皆自農而計之也故莫賤於庶人而在官以農為差莫尊扵君而禄亦視其農之所積非特使執役冗賤者不敢遽忘本業而禄秩之厚備物之奉者亦知其本未有不基於農者也方氏慤曰府史胥徒之類其家亦授之田周禮所謂官田也其位之髙下不可得而詳故禄之髙下亦不可得而定大約多者不過食九人寡者亦不下食五人孟子言百畝之糞此言分者分以均之存乎法糞以治之存乎力法定於上力出乎下互相備也馬氏睎孟曰上止九人因諸侯下士所視言之下止五人因庶人在官最下者言之通論葉氏時曰大抵古者賦禄以田其不可受田者則有稍食王宫之宿衛宫正均其稍食后宫之人民内宰均其稍食至於士庶子及衆庶之在外守城郭溝池者掌固均其稍食馭夫圉師府史之在宫中者校人均其稍食内外朝官吏留治文書者稿人共其冗食若此者所班有常數所給有定貟其禄出於廩人之所藏以待匪頒賙賜而司禄取以頒之宫正内宰等官使均給歟存異鄭氏康成曰田之肥墝有五等収入不同孔氏穎逹曰家有二人至十人為九等一家男女七人以上則授之上地所養者衆也男女五人以下則授之下地所養者少也周禮大司徒上地家七人中地家六人下地家五人謂中地之上中地之中中地之下推之上地之上家十人上地之中家九人上地之下家八人下地之上家四人下地之中家三人下地之下家二人凡九等陳氏澔曰肥饒者為上農墝瘠者為下農馬氏睎孟曰周禮有不易一易再易之差三等即九等周官制農田之法此則因制禄言之季氏本曰一夫百畝非謂一夫一婦佃百畝田也夫盖九夫為井之夫謂百畝之田為一夫之田也百畝之田一人之力止可以耕二十五畝則百畝者四人之力所耕也辨正季氏本曰上地中地下地此即古人覈田之法後世量田宜以此為凖盖因田美惡以制其均則瘠田皆與肥等矣而鄭云七人以上授之上地五人以下授之下地則地之肥瘠本未通均而但因人多寡以為差豈不亂疆理而􅁸弊源哉案朱子謂農夫受田同此百畝而所𫉬之多寡視其力之勤惰庶人在官者其任有小大其才亦有優絀勤惰之不同故受禄多寡視農夫之五等以為差其義甚眀盖所以必視農夫者禄皆出於民力上無濫與下無虚受而後激勸之道眀自士以上至君卿雖不言以是為差而差自此始出之者甚艱享之者不易禄愈隆責愈重不舉一國之民康乂之愧此君卿之禄而不安若謂田有九等授之必視其口之多寡則自三十受田六十歸田其里居有定而生齒之増耗歲有不同一歳而三兩易不太煩擾乎且庶人在官止計其家口之多寡則卿大夫士其家口豈無多寡而以庸制禄以功奠食之法俱無自而推矣季氏謂一夫非一人百畝為四夫所耕則必不然盖周以百歩為畝至漢景帝時始以二百四十歩為畝桑𢎞羊曰古者制田百歩為畝什而税一先帝哀憐百姓制田二百四十步為畝三十而税一古之百畝止當四十畝又古尺當宋鈔尺六寸四分弱則四十畝止當二十五畝六分若又四分之每人耕田六畝四分父母妻子不皆餒乎孟子言百畝之田匹夫耕之匹夫即一夫四人為夫説何據乎惟其覈田之説則甚善所謂一夫百畝乃周禮所謂不易之地左傳所謂衍沃之地皆舉其最上者以定賦若今以折平定賦也諸侯之下士視上農夫禄足以代其耕也中士倍下士上士倍中士下大夫倍上士卿四大夫禄君十卿禄次國之卿三大夫禄君十卿禄小國之卿倍大夫禄君十卿禄正義鄭氏康成曰此班禄尊卑之差孔氏穎逹曰自下士至小國之君倍禄者皆據無采地者言之大夫以下位卑禄少故大小之國不殊卿與君位重禄尊故禄随國之大小以為節朱子曰倍加一倍也四四倍之三三倍之十十倍之也黄氏震曰必本於上農夫者示禄出扵農等而上之皆以代耕者也徐氏曰下士田百畝可食九人中士二百畝可食十八人上士四百畝可食三十六人大夫八百畝可食七十二人大國卿三千二百畝可食二百八十八人君三萬二千畝可食二千八百八十人次國卿二千四百畝可食二百十六人君二萬四千畝可食二千一百六十人小國卿一千六百畝可食百四十四人君一萬六千畝可食千四百四十人所食之禄皆助法之公田藉庶人之力以耕而収其租士之無田與庶人在官者則但受禄於官如田之入而已案此以禄之制於畿外諸侯之國者言之君夫人公子及女御内官皆有常禄非必實有一二千人食之特其數如此耳通論朱子曰君十卿禄君所私用若貢賦賔客朝聘祭享别有公儲詹氏道傳曰大國為田九百萬畝除山林城郭宫室及民田廬舍公田所入常得五十三萬三千三百畝有竒賦祿五萬一千九百畝餘四十八萬三千三百畝有竒次國公田二十六萬三千三百畝有竒賦禄四萬一千五百畝小國公田一十二萬三千三百畝有竒賦祿二萬九千五百畝餘以供國家調度喪祭賔客之費以備凶荒不測之用徐氏自眀曰春秋以來諸侯擅其國山澤之賦皆自有之無復君十卿禄之制而卿大夫采邑亦多逾制為國生患晉恵公一入國即許里克以汾隂之田百萬丕鄭以負葵之田七十萬在齊桓時伯氏有駢邑三百魯成公時施氏有百室之邑鄭賞入陳之功子産以上卿受八邑宋之盟公與左師邑六十齊慶氏之變公與晏子邑六十晏子辭而復之懼其盈以召禍於先王之制不暇論矣案詹氏止以山林城郭宫室三分去一之法推之約田數如此其實各國山林薮澤有多有少不盡同也又詹氏據鄭氏侯國上中下士止各九人推之故禄止此若従徐氏中士三倍上士下士三倍中士合各加士禄二萬三千八百畝次國之上卿位當大國之中中當其下下當其上大夫小國之上卿位當大國之下卿中當其上大夫下當其下大夫正義鄭氏康成曰此諸侯使卿大夫頫聘並㑹之序也其爵位同小國在下爵異故在上耳孔氏穎逹曰同是卿則小國卿在大國卿下大國是大夫小國是卿則小國卿位大國大夫上知者以卿執羔大夫執雁卿絺冕大夫𤣥冕卿不得在大夫下也方氏慤曰三等之國其地與君互降一等故其卿大夫位之所當亦各降一等焉上大夫即卿矣有上中下卿又有上大夫者盖下大夫之上者也案命數則大國次國之卿分二等小國一等位序則各分二等大夫對卿言之皆為下而於此又分上下者崔氏靈恩曰小宰小司徒為上小司馬小司宼小司空為下也或云天官秋官無正卿故吴宋宰稱太魯司宼稱大孔子為魯大司宼是小宰小司宼為上存参通論徐氏自眀曰於大國之卿不言略之也春秋時列國之卿藉口當小國之君每以臣而敵君偃然主􅉀㑹而不辭扵是垂隴之盟三國之君在焉而士縠専之新城之盟七國之君在焉而趙盾専之未幾而棐林之師四國之君帥師以㑹晉大夫而不以為歉也馴至衆大夫為湨梁之盟以傲其上皆始事之驗也然後知先王不以眀言者正名定分防㣲之意深矣魯成公時晉荀庚位下卿衛孫良夫位上卿皆來􅉀臧宣叔言衛在晉不得為次國而後衛晉衞皆侯爵而以强弱為大小非也其時士大夫雖能言周禮而移於習俗巧為附㑹左氏反以為禮何哉其有中士下士者數各居其上之三分正義徐氏師曽曰此當在上士二十七人之下錯簡在此謂中士三倍扵上士之數下士三倍於中士之數也存疑鄭氏康成曰居猶當也此據大國而言大國之士為上次國之士為中小國之士為下士之數皆二十七人各三分之上九中九下九以位相當則次國之上士當大國之中中當其下小國之上士當大國之下凡非命士亦無出㑹之事春秋傳謂士為㣲孔氏穎逹曰次國以大國為上小國以次國為上此文以大國為主以中國小國來當也存異方氏慤曰一有一無謂之有後列三等之國止云上士二十七人則知中下之士諸侯或有或無矣其有者各二十七人合為八十一言各與上為三分也胡氏銓曰士之數國各二十七人三分之上士之數居大半中士下士各居上士之三爾黄氏震曰其有者不常有之詞中士下士或有之則制禄之數當居上士三分之一陳氏祥道曰卿大夫則賔也賔以位序故以位言之士則介也介則待之以數而已傳曰名位不同禮亦異數中士之禮居上士之三分下士之禮居中士之三分案大國有孤一人卿三人大夫五人合之則九故上士三之而二十七則中下士必視國之大小而逓加或三之或倍之矣故草廬吴氏及吴江徐氏皆以為上二十七人下之脱簡也鄭氏以為頫聘之等今考下大夫五人可分二等則上士二十七人分為三等亦未可知但本文眀言其有中士下士不應又即上士分為中下士也至方氏或有或無黄氏不常有胡氏合中下士得上士小半之説尤不確孟子眀言上士一位中士一位下士一位若無中下士爵止四等矣本篇亦言上大夫下大夫上士中士下士凡五等若無中士下士止三等矣天子六鄉五家之比長即下士六遂為内諸侯食邑故比外諸侯而二十五家之里宰為下士則侯國之中下士亦多矣豈有無中下士與合中下士而僅得上士之半者哉鄭氏言非命士不出㑹則小國之卿與下大夫止一命耳又安有命士出㑹者陳氏言卿大夫為賔士則為介義略可通然聘禮於歸饔餼云士介四人皆餼大牢米百筥設飱則衆介皆少牢安見中士之禮止得上士三分之一下士之禮止得中士三分之一耶恐俱不可從凡四海之内九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國名山大澤不以封其餘以為附庸閒田八州州二百一十國閒音閑正義鄭氏康成曰此大界方三千里三三而九方千里者九也其一為畿内餘八各立一州大國三十十三公也次國六十十六卿也小國百二十十十二小卿也孔疏定本云十十二小卿重有十字俗本直云十二小卿誤也名山大澤不以封者與民同財不得障管亦賦税之而已孔氏穎逹曰此論四海之内九州州别建國多少及附庸閒田之法爾雅釋地云九夷八狄七戎六蠻謂之四海此四海之内謂夷狄之内也一箇千里之方為方百里者百一州惟餘方百里者十得備二十一國附庸者鄭注大司徒云凡諸侯為牧正帥長及有徳者乃有附庸非國皆有也若未封人則謂之閒田名山大澤若以封則諸侯為主民不得取其財物矣故不以封則諸侯不得障塞管領禁民取物但随其所取賦税之而已李氏覯曰方千里則得方百里者百方百里則得方十里者百方七十里則得方十里者四十九方五十里則得方十里者二十五伯之田倍子男公侯之田倍伯天子之田百倍公侯不如是不足為維持之固也辨正朱子曰封國之制只是漢儒立下一箇算法九州之地冀州極闊河南河北皆屬焉雍州亦闊陕西五路皆屬焉若青兖徐豫則疆界有不足者矣設如夏時封建之國至商革命必削其多者以與少者則彼未必服或以生亂又如周王以原田與晉文其民不服至扵伐之盖世守其地不肯遽従他人若封王子弟必湏有空地方可封左氏載齊地蒲姑氏因之而後太公因之若武王不得蒲姑之地即太公亦未有安放處案此申言畿外建國之數也當堯之前洪水横流有一可居之地必有千百之人其為之長者即其君也禹平水土然後統為一故禹言弼成五服至於五千咸建五長外薄四海故土姓之錫於是始孔子刪書斷自唐虞唐虞萬國殷初三千至周而千八百國亦日相吞併使然周初滅衛而管叔出監滅霍而霍叔出監成王四年滅奄乃以封魯六年滅唐乃以封晉故孟子言滅國者五十同姓五十之封即其地也故有爵卑而地廣者有爵尊而地狹者有始小而後大始大而後小者所謂列爵惟五分土惟三亦大槩然耳朱子説甚眀文帝時賈生進衆建諸侯而少其力之䇿博士依據孟子欲仿周初建千八百國亦識時之宜者文帝不能行而七國之變作後又摧抑過甚名為諸侯王至不能有寸土臣一民而封建之法遂廢矣天子之縣内方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國名山大澤不以朌其餘以祿士以為閒田朌鄭讀為班閒音閑正義孔氏頴逹曰此眀天子縣内之國數多少及禄士之法名山大澤畿外有封建之義故曰不以封畿内不世位惟有朌賜故曰不以朌亦與民共財不障管也民取其財物亦入之王府周禮山虞澤虞所掌是也以禄士謂無地之士給之地以當其禄不得為采邑也以為閒田周禮所謂公邑不云附庸縣内諸侯無附庸也通論葉氏時曰晏子以齊侯守山林薮澤之利而民疾詛韓獻子以晉欲居郇瑕曰近寳公室乃貧是知山澤之利先王未甞禁民自取之是故名山大澤不以封諸侯而九州山川薮澤之名皆職方之所掌將以弭諸侯之侈心而謹天子之守地也至於山林川澤之利有可與侯國共者則命山師川師辨其物而頒之使致其珍異之貢所以示諸侯之公心而均天下之利源也山海天地之藏山澤國家之寳古先王不與民争利亦不縱民趨利是以大宰以九職任萬民而三曰虞衡作山澤之材則官不以私也地官之屬有山虞令萬民以時斬材澤虞頒其餘於萬民田獵受迹人之令取金玉錫石受丱人之圖羽翮齒角絺綌草貢以至染草灰炭疏材互蜃之物皆山澤之民所得有此謂與民共財既而大宰又以九賦斂財賄而八曰山澤之賦則民不得擅也地官之屬山虞澤虞川衡林衡迹人丱人皆有厲禁齒角羽翮以當邦賦則角人羽人領之絺綌草材以當邦賦則掌葛領之以至掌炭掌染草掌荼掌蜃之類無不以時徴其物此謂禁民取利自齊桓筦山海鹽筴之利始為侯國之利而與民共財之意失漢以山澤租税領少府賦雖私之利猶在民至吴王鑄山煮海而禁民趨利之意失迨孔僅幹天下鹽鐡而山澤變為𣙜利矣徐氏自明曰地雖領於王官而富實藏於郡國財雖同於王民而利實歸之公上諸侯自食田税之外餘不敢過而問焉考之周官凡山澤之數司書掌之以計吏治山澤之賦大府掌之以待喪紀九州之川澤山藪職方氏實掌天下之圖而諸侯無所𨽻焉至扵伯禽侯於東魯而錫之山川乃天子之加賜是固異恩而非可以例觀也山虞令萬民斬材有期日則未嘗不與民共之而有司徒禁其不使戕賊而已澤虞使人守其財物以時入於王府則實為民守之而王官時以其職入於王而已推本先王領於王臣之意盖使侯國不得以障管云爾非不與民共財也存疑陳氏祥道曰周禮載師宅田任近郊之地近而狹以祿致仕之臣其禄少也家邑大都小都之田在三百里至五百里之地逺而廣以祿公卿大夫及子弟其禄多也鄭謂三等采邑皆有致仕之田與公卿大夫子弟地相埒恐先王之法不然胡氏銓曰天子三公則大國餘者六六卿則次國餘者十五二十七大夫則小國餘者三十六觀下言名山大澤不以朌則知此九十三國不盡為公卿大夫之田盖待王别有所朌也鄭乃云為有致仕者副之其餘待封王子弟於經何見且公卿大夫在位則有定貟致仕者安有定數今必限以貟數恐非通論陳氏埴曰田里之里以方計即井方一里是也道里之里以袤言如二十五家為一里之類是也季氏本曰一千七百七十三國雖亦臆説然以漢制考之則古田未盡湮晦分數猶可得而眀也今總計漢時天下之地東西九千三百二里南北一萬三千三百六十八里提封田一萬萬四千五百一十三萬六千四百五頃邑居道路山川林麓三分去一可墾田三千二百二十九萬九百四十七頃定墾田八百二十七萬五百三十六頃曰定墾漢時已墾之實田也曰可墾通計周時井授之田而荒蕪者尚在其中也則所謂公侯方百里伯七十里子男五十里皆指可井之實田而言烏得云山川林麓城池宫室三分去一於其間㢤案此申言畿内建國之數合畿内畿外可建若干國耳非夏非殷亦非周也鄭以為夏已與注書自相矛盾孔又附㑹為殷湯因夏末之餘巧而彌拙矣大約畿外諸侯多因前代畿内則多本朝疏附後先之臣觀周初周召畢榮康叔聃季諸國可見也其後或建國而仍世邑或建國而不世邑或但世其邑而扵其中又有任職不任職之殊要各視其功徳之大小才能之優劣耳成王十年周公致政歸於豐又十一年而薨其食采於周如故也何嘗以致仕不可食三公之邑而别易一地哉又周惟文武之子弟皆有封邑後惟宣王弟友封鄭他如王子虎列於㑹􅉀但稱王叔文公不聞以國號舉則無封邑者多矣陳氏胡氏駁鄭注甚眀而陳謂致仕之田在近郊胡謂虚建此國以待朌恐亦非確論也陳氏謂分服里數以袤計封國里數以方計似已然分服以縱言開方合縦廣言今法田以長五尺濶五尺為一歩道亦以長五尺為一歩二法實一也且二十五家為里乃授民居之里民居疏宻不齊安據以定逺近乎季氏説亦近之而就其所推提封田數亦不合存異鄭氏康成曰縣内夏時天子所居州界名殷周皆曰畿大國九者三公三􅆀仕之公三其三待封王之子弟次國二十一者六卿六致仕之卿六又三孤三其六待封王之子弟小國六十三者大夫二十七致仕亦二十七其九亦待封王之子弟三孤之田不副以其無職佐公論道雖致仕猶可即而謀焉孔氏頴逹曰鄭注益稷夏禹萬國四百國在畿内此惟九十三國湯承夏末所餘國是殷制言縣眀承夏餘也三公在朝有正田今既致仕不可仍食三公采邑身又見存不可全無其地故公卿大夫有正職之田又有致仕副邑也王子弟有同母異母親疏之異故待之亦有三等之差周禮鄉老二鄉則公一人是公雖正職猶列於官孤則不列也辨正陳氏祥道曰周禮有在鄉之縣有在遂之縣有采邑之縣有閒田之縣故王畿統謂之縣鄭氏謂縣内夏時所居州界名殷周則皆曰畿非也陳氏澔曰此鄭氏臆説周制六卿兼公孤則餘田尚多王子弟亦未必能盡有所封也凡九州千七百七十三國天子之元士諸侯之附庸不與與去聲正義鄭氏康成曰不與不在數中也陳氏澔曰元士附庸皆不能五十里故不與孔氏頴逹曰此總名畿内畿外之數辨正胡氏銓曰鄭謂禹承唐虞初有萬國是則然矣夏末四夷内侵諸侯相併土地減國數少殷湯承之更制中國方三千里之界亦分九州建此千七百七十三國似未然也洛誥傳云天下諸侯來進受命扵周退見文武尸者千七百七十三諸侯又孝經説周千八百諸侯布列五千里内又異義公羊説殷三千諸侯周千八百諸侯與此千七百七十三合鄭不據周而據殷何也欽定禮記義疏卷十五
