body:
  text: 祭法第二十三正義孔氏穎達曰按鄭目録云名為祭法者以其紀有虞氏至周天子以下所制祀羣神之數此於别録屬祭祀沈氏清臣曰祭法自燔柴於泰壇祭天也以至終篇即書肆類於上帝禋於六宗望秩於山川徧於羣神之義疏也上只添禘郊祖廟一段朱子曰祭法一篇即國語栁下惠説祀爰居一段但文有先後如祀稷祀契之類只是祭祖宗耳末又説有功則祀之若然則祖宗無功不祀乎吳氏澄曰法謂制之定者此篇記祭人鬼天神地􅅘之定制故曰祭法祭法有虞氏禘黄帝而郊嚳祖顓頊而宗堯夏后氏亦禘黄帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊𡨕祖契而宗湯周人禘嚳而郊稷祖文王而宗武王禘大計反嚳口毒反顓音専頊許玉反鯀本又作􅕐古本反冥莫徑反契息列反正義鄭氏康成曰有虞氏以上尚徳郊禘祖宗配用有徳者而巳自夏以後稍用其姓代之趙氏匡曰虞氏禘黄帝蓋舜祖顓頊出於黄帝則所謂禘其祖之所自出也郊嚳者帝王郊天當以始祖配則舜合以顓頊配天為身繼堯緒不可捨唐之祖故推嚳以配天而舜之世系出自顓頊故以爲始祖情禮之至也舜宗堯當禹身亦宗舜凡祖者創業𫝊世之所出也宗者徳髙而可尊其廟不遷也夏后氏禘黄帝義同舜也郊鯀者禹尊父且以有水土之功故以配天祖顓頊者禹世系亦出於顓頊也宗禹者當禹身亦宗舜子孫乃宗禹也殷祖契出自嚳故禘嚳冥有水功故郊冥以配天湯出契後故祖契宗湯者當湯身未有宗也周禘嚳義與殷同稷有播植之功且爲始祖故祖稷當武王身亦未有宗存異鄭氏康成曰禘郊祖宗謂祭祀以配食也此禘謂祭昊天於圜丘也孔疏經𫝊之文稱禘非一其義各殊論語云禘自既灌及春秋禘於大廟謂宗廟之祭也喪服小記云王者禘其祖之所自出大𫝊云禮不王不禘謂祭感生帝於南郊也必知此是祭昊天於圜丘者以禘文在於郊祭之上郊前之祭唯圜丘耳祭上帝於南郊曰郊祭五帝五神於明堂曰祖宗祖宗通言爾孔疏明堂月令云春曰其帝太皡其神句芒五時皆有帝及神又月令季秋大饗帝故知明堂之祭有五人神及五天帝也又孝經云宗祀文王於明堂以配上帝故知於明堂也以孝經云宗祀文王此云宗武王又云祖文王故知祖宗通言爾下有禘郊祖宗孝經曰宗祀文王於明堂以配上帝明堂月令春曰其帝太皡其神句芒夏曰其帝炎帝其神祝融中央曰其帝黄帝其神后土秋曰其帝少皡其神蓐収冬曰其帝顓頊其神𤣥冥有虞氏以上尚徳禘郊祖宗配用有徳者而已自夏以下稍用其姓代之先後之次有虞氏夏后氏宜郊顓頊殷宜郊契郊祭一帝而明堂祭五帝小徳配寡大徳配衆亦禮之殺也熊氏安生曰有虞氏禘黄帝者謂虞氏冬至祭昊天上帝於圜丘大禘之時以黄帝配之而郊嚳者謂正建寅之月祭感生帝於南郊以嚳配也祖顓頊而宗堯者謂祭五天帝五人帝及五人神於明堂以顓頊及堯配之也祖始也宗尊也其夏后氏以下禘郊祖宗其義亦然但所配之人當代各别辨正王氏肅曰祖宗謂祖有功而宗有徳其廟不毁郊與圜丘是一郊即圜丘也天唯一而已安得有六五行分主四時化育萬物其神謂之五帝是五帝之佐也豈得稱天而鄭以五帝爲靈威仰之屬非也郊則圜丘圜丘則郊猶王城與京師異名而同處楊氏復曰禘禮見於大𫝊小記子夏𫝊郊禮見於孝經大雅周頌祖有功宗有徳見於王肅賈誼劉歆韋𤣥成蓋禘與祖宗三條皆宗廟之祭無與乎祀天唯郊一條爲配天之祭經𫝊昭然不可誣也祭法禘在郊上者謂郊以祖配天禘上及其祖之所自出禘逺而祖近故禘在郊上也鄭氏見禘在郊上便謂禘大於郊遂強分圜丘與郊為二以禘爲冬至日祀昊天上帝於圜丘而以嚳配之以郊為祭感生帝於南郊而以稷配之既謂禘郊皆為配天矣遂併以祖宗為祀五帝於明堂而以祖宗配之輕肆臆説實皆非也燔柴於泰壇祭天也瘞埋於泰折祭地也用騂犢燔音煩瘞於滯反折之設反舊音逝正義鄭氏康成曰壇折封土為祭處也壇之言坦也坦明貌也折照晳也必為照明之名尊神也地陰祀用黝牲與天俱用犢連言爾孔疏陰祀宜用黒犢今承祭天之下故連言用騂犢也孔氏穎達曰燔柴謂積薪於壇上而取玉及牲置柴上燔之使氣達於天也瘞埋謂瘞繒埋牲也按禮器云至敬不壇此云燔柴於泰壇者謂燔柴在壇設饌在地義具禮器及郊特牲疏陳氏祥道曰泰壇南郊之壇也以之燔柴泰折北郊之坎也以之瘞埋言壇則知泰折之為坎言折則知泰壇之為圜宗廟之禮瘞埋於兩階之間則壇必設於圜丘之南坎必設於方丘之北矣燔柴以升烟瘞埋以達氣則燔必於樂六變之前瘞必於樂八變之前矣方氏慤曰燔柴則升而明瘞埋則藏而幽升而明者天道也藏而幽者地道也壇為高以見折之為深折為方以見壇之為圜圜而高者天形也方而深者地形也存異陸氏佃曰此合祭也主天而已故雖瘞埋猶從祭天之牲即祠北郊應用黝犢説者曰天地無合祭之壇則春秋言郊何以有三望中庸言事上帝何以有社按周書郊祀亦及聖帝明王荀子所謂郊者并百王於上天而祭祀之是也盖大報天神人鬼地􅅘皆與故曰禮行於郊而百神受職焉又曰用騂犢當連下埋少牢於泰昭讀為一段盖四時者隂陽之氣升降出入於天地之中故用騂犢埋少牢以祀之少牢言埋則祭之於泰昭之下也騂犢言用則祭之於泰昭之上者鄭解騂犢以屬上句盖祭天用蒼犢祭地用黝牲今用騂犢以天則非倉以地則非黝非是也案圜丘則牲用蒼方澤則牲用黄從天地之色也祈穀祈年及出征廵守之告祭皆用騂從周所尚也埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宫祭日也夜明祭月也幽宗祭星也雩宗祭水旱也四坎壇祭四方也山林川谷丘陵能出雲爲風雨見怪物皆曰神有天下者祭百神諸侯在其地則祭之亡其地則不祭相近依注讀為禳祈王肅作祖迎宗讀為禜榮敬反王如字見賢遍反亡如字一音無正義鄭氏康成曰昭明也亦謂壇也時四時也亦謂隂陽之神也埋之者隂陽出入於地中也孔疏祭時者謂祭四時隂陽之神也春夏為陽秋冬為隂若祈隂則埋牲祈陽則不應埋之今總云埋者以隂陽之氣俱出入於地中而生萬物故並埋之以享隂陽為義也凡此以下皆祭用少牢孔疏以埋少牢之文在諸祭之首故知以下皆用少牢用少牢者降於天地也先儒云不薦熟惟殺牲埋之也按小司徒小祭祀奉牛牲則王者之祭無不用牛此用少牢者謂祈禱之祭也相近當爲禳祈聲之誤也禳猶却也祈求也寒暑不時則或禳之或祈之寒於坎暑於壇孔疏寒暑之氣應退而不退則禳却之應至而不至則祈求之寒於坎寒隂也暑於壇暑陽也王宫日壇王君也日稱君宫壇營域也夜明月壇也孔疏日神尊故其壇曰君宫月明於夜故其壇曰夜明也宗皆當爲禜字之誤也幽禜星壇也孔疏幽闇也星至夜而出故曰幽星以昏始見禜之言營也孔疏案荘二十五年公羊𫝊云以朱絲營社或曰脅之或曰爲闇恐人犯之故營之是禜有營意雩禜水旱壇也雩之言吁嗟也孔疏水旱為人所吁嗟曰幽禜雩禜皆為域而祭之也春秋𫝊曰日月星辰之神則雪霜風雨之不時於是乎禜之山川之神則水旱癘疫之不時於是乎禜之四方即謂山林川谷丘陵之神也祭山林丘陵於壇川谷於坎毎方各為坎為壇孔疏謂四方各為一坎一壇怪物雲氣非常見者也孔疏山林川谷丘陵能出雲為風雨見怪物皆曰神者此明四坎壇所祭之神也怪物慶雲之屬風雨雲露並益於人故皆曰神而得祭也有天下謂天子也百者假成數也孔氏穎達曰此總明四時以下諸神所祭之處及天子諸侯不同之禮天子祭天地四方言百神舉全數也諸侯不得祭天地若山林川澤在其封内而益民者則得祭之如魯之泰山晉之河楚之江漢是也亡無也謂其境内無此山川則不得祭也又曰案周禮大宗伯備列諸祀而不見祭四時寒暑水旱者宗伯所記謂周禮嵗時常祀此經所載謂四時乖序寒暑僭逆水旱失時須有祈禱之禮也然案荘二十五年左𫝊云凡天災有幣無牲此禱祈得用少牢者彼天災謂日月食之示以戒懼人君先須修徳不當用牲若水旱歴時禱而不止則當用牲故詩雲漢云靡愛斯牲周氏諝曰月為隂而盛於夜故曰夜明於星謂之幽者以對月而言則月為明而星為幽也水旱必謂之雩者以祭旱為主蓋隂中之陽升則為雨故雩祭所以助逹隂中之陽者也存疑張子曰寒暑無定暑近日壇寒近月坎而已故曰相近於坎壇祭寒暑也注謂相近為禳祈者非方氏慤曰幽言其隐而小揚雄曰視日月而知衆星之蔑故祭星之所謂之幽宗焉雩主祭旱言之兼祭水而主旱言之者雨以時至亦無患也幽雩皆謂之宗宗尊也祭祀無所不用其尊詩曰靡神不宗無所不用其尊之謂也陳氏澔曰相近當爲祖迎字之誤也寒暑一徃一來徃者祖送之來者迎迓之周禮仲春晝迎暑仲秋夜迎寒則送之亦必有其禮也案或謂四坎壇分置於四郊望而祭之曲禮所謂天子祭四方祭山川是也四方即四方之神東方青帝太皡南方赤帝炎帝西方白帝少皡北方黒帝顓頊毎方以一帝爲主而一方之山林川谷丘陵皆從祀焉周禮宗伯兆五帝於四郊者即此月令迎春於東郊迎夏於南郊迎秋於西郊迎冬於北郊者亦即此曲禮言諸侯方祀祭山川而此不言方祀者文略耳附存之以備一説大凡生於天地之閒者皆曰命其萬物死皆曰折人死曰鬼此五代之所不變也七代之所更立者禘郊宗祖其餘不變也更古行反正義鄭氏康成曰折棄敗之言也鬼之言歸也孔氏穎達曰此論人死與萬物不同及五代七代變與不變之義總包萬物故曰大凡皆受天之賦命而生故皆曰命萬物無知死皆曰折人爲有識故死曰鬼此之名號從黄帝正名百物以來至於堯舜禹湯及周所不變更也黄帝以下七代所變易而立者是禘之與郊及宗祖也除此外其餘社稷山川五祀之等不改變也方氏慤曰折言其有所毁鬼言其有所歸不變者所命之名也更立者更立所祭之人也名既當於實故無事乎變人既異於世故必更立焉前先祖而後宗者逺近之序此先宗而後祖者親疏之序存疑鄭氏康成曰五代謂黄帝堯舜禹湯周之禮樂所存法也七代通數顓頊及嚳也孔疏以上云禘郊祖宗有顓頊及嚳故也所不變者則數其所法而已變之則通數所不法爲記者之㣲意也少昊氏脩黄帝之法後王無所取焉方氏慤曰名之不變止自堯而下者蓋法存乎堯而已由堯以前其法未成其名容有變也案五代七代記無明文要而論之黄帝爲立法之祖不應在不變及更立之中周亦猶是不變及更立者不應置之五代七代之外况此記上下皆合周言之胡獨此不言周則鄭之舍周而言黄帝者悮也又疏謂鄭以上記文言頊及嚳而易緯易繫辭皆不言少昊則以少昊不在七代之内猶之可也若謂少昊脩法後世無取則頊亦下記所謂脩者胡舍少昊而獨取之孔合唐虞三代為五又増頊嚳而爲七則鄭注之非明矣至方氏法成於堯之説則又與下記義不合也天下有王分地建國置都立邑設廟祧壇墠而祭之乃爲親疏多少之數是故王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟爲祧有二祧享嘗乃止去祧爲壇去壇爲墠壇墠有禱焉祭之無禱乃止去墠曰鬼諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖爲壇去壇爲墠壇墠有禱焉祭之無禱乃止去墠爲鬼大夫立三廟一壇曰考廟曰王考廟曰皇考廟享嘗乃止顯考祖考無廟有禱焉爲壇祭之去壇爲鬼適士二廟一壇曰考廟曰王考廟享嘗乃止顯考無廟有禱焉爲壇祭之去壇爲鬼官師一廟曰考廟王考無廟而祭之去王考爲鬼庶士庶人無廟死曰鬼墠音善適丁歴反顕考無廟之顯依注作皇正義鄭氏康成曰建國封諸侯也置都立邑爲卿大夫之采地及賜士有功者之地廟之言貌也宗廟者先祖之尊貌也祧之言超也超上去意也封土曰壇除地曰墠書曰三壇同墠孔疏書金縢文於案此則祭皆為壇無祭平地者去壇為墠之説可疑矣王皇皆君也顯明也祖始也孔疏皆爾雅釋詁文名先人以君明始者所以尊本之意也天子遷廟之主以昭穆合藏於二祧之中孔疏昭之遷主總合藏武王祧中穆之遷主總合藏文王祧中故鄭注周禮守祧先公遷主藏於后稷之廟先王遷主藏於文武之廟至大祫毁廟之主陳於太祖是毁廟主在太廟祫乃陳之故知不窋以下遷主藏於后稷廟也文武二廟既不毁則文武以下遷主不可越文武上藏於后稷之廟故知藏於文武廟也諸侯無祧藏於祖考之廟中聘禮曰不腆先君之祧是謂始祖廟也案文武以下遷主皆藏兩世室中故謂文武世室為二祧諸侯無世室祧主藏太祖夾室故即謂始祖廟為祧享嘗謂四時之祭天子諸侯爲壇墠所禱謂後遷在祧者也既事則反其主於祧鬼亦在祧顧逺之於無事祫乃祭之爾春秋文二年秋大事於太廟𫝊曰毁廟之主陳於太祖未毁廟之主皆升合食於太祖是也魯煬公者伯禽之子也至昭公定公久已爲鬼而季氏禱之而立其宫則鬼之主在祧明矣惟天子諸侯有主禘祫大夫有祖考者亦鬼其百世不禘祫無主爾其無祖考者庶士以下鬼其考王考官師鬼其皇考大夫適士鬼其顯考而已大夫祖考謂别子也凡鬼者薦而不祭王制曰大夫士有田則祭無田則薦適士上士也官師中士下士庶士府史之屬此適士云顕考無廟非也當為皇考字之誤孔氏頴達曰此明天子以下尊卑既異上祭祖廟多少不同之事王立七廟者親廟四始祖一文武不遷合爲七廟也七廟之外又立壇墠各一近者封土逺親除地示将去然也父廟曰考考成也謂父有成徳之羙也王考廟者祖廟也王君也祖尊於父故加君名也皇考曽祖也皇大也君也曽祖轉尊又加大君之稱顯考髙祖也顯明高祖居四廟最上故以高目之祖考廟者始祖也此廟為王家之始故云祖考也去祧爲壇謂髙祖之父也不得四時而祭之若有祈禱則出就壇受祭也去壇爲墠者謂髙祖之祖也不得在壇若有祈禱則出就墠受祭也髙祖之父初寄在祧不得於祧中受祭故曰去祧髙祖之祖經在壇而今不得祭故云去壇在壇墠者不得享嘗有祈禱乃祭之無祈禱則不得祭也去墠曰鬼者若又有從壇遷來墠則此前在墠者遷入石函爲鬼雖有祈禱亦不得及惟禘祫乃出也諸侯立五廟壇墠與天子同無功徳之祖爲二祧也月祭三廟顯考祖考不得月祭止預四時皆降於天子也去祖謂去太祖也即高祖之父諸侯無功徳二祧若髙祖之父亦遷即寄太祖而不得於太祖廟受時祭唯有祈禱則去太祖而徃壇受祭也大夫立三廟二壇者異於君故立二壇而不墠也顯考祖考無廟以其卑也大夫髙太二祖無廟若有祈禱則爲壇祭之去壇爲鬼者謂高祖若遷去於壇則爲鬼不復得祭但薦之太祖壇而已若大夫有太祖之廟者其義具王制疏適士謂天子三等諸侯上士悉二廟一壇也顯當爲皇皇考曽祖也曽祖既無廟有祈禱則爲壇祭之若遷去於壇則爲鬼不復祭也官師謂諸侯中士下士爲一官之長者也一廟爲父立之王考雖無廟而猶獲祭謂在考廟者去王考爲鬼謂曽祖則不得祭又無壇若有祈禱則薦之於廟也庶士府史之屬庶人平民也賤故無廟死則曰鬼亦得薦之於寢王制云庶人祭於寝是也方氏慤曰分地者分天子之地建國者建諸侯之國置都者置公卿之都立邑者立大夫之邑分地建國畿外之臣所以嗣也置都立邑畿内之臣所以禄也陳氏祥道曰月祭者薦新之祭也月令獻羔開氷薦鮪羞含桃與夫嘗麥嘗榖嘗麻嘗魚皆先薦寝廟是也享嘗者四時之祭周官大宗伯春祠夏礿秋嘗冬烝及司尊彜所載彝舟尊罍是也有禱焉者求福之祭也周官小宗伯大烖及執事禱祠於上下神祗凡王之㑹同軍旅田役之禱祠肄儀爲位凡天地之大烖類社稷宗廟則爲位都宗人掌都祭祀之禮家宗人掌家祭祀之禮國有大烖故皆令禱祀是也朱子曰官師諸有司之長也官師一廟止及禰却於禰廟併祭祖適士二廟即祭祖祭禰皆不及髙曽大夫三廟一昭一穆與太祖廟而三大夫亦有始封之君如魯季氏則公子友仲孫氏則公子慶父叔孫氏則公子牙是也呉氏澄曰親廟四祧廟二共爲三昭三穆并太祖凡七廟有功徳可宗者别立廟百世不毁與太祖同宗或多或少或有或無故不預七廟之數孔氏穎達曰此遷主所藏曰祧者是對例言之若散而通論則凡廟曰祧故昭元年左傳云其敢愛豐氏之祧彼祧逺祖廟也襄九年左傳云君冠必以先君之祧處之服䖍注云曽祖廟曰祧也存疑孔氏穎逹曰大夫無主故無所寄藏又曰逺廟謂文武廟也文武廟在應遷之列故云逺廟特爲功徳而留故謂爲祧有文武二廟不遷故云有二祧享嘗四時祭祀文武特留故不得月祭但四時祭而已陳氏祥道曰周官隸僕掌五寝之埽除糞灑之事所謂五寝者自考廟以至祖考之寝廟也王七廟而其寝乃五者爲其二祧将毁先除其寝所以見孝子孝孫之心不欲遽毁故去有漸也辨正徐氏邈曰左傳稱孔悝反祏又公羊大夫聞君之喪攝主而往注義以爲歛攝神主而已不暇待祭也此皆大夫有主之文又禮言重主道也埋重則立主今大夫士有重亦宜有主以紀别座位有尸無主何以爲别将表稱號題祖考何可無主今案經𫝊未見士大夫無主之義有者爲長陳氏祥道曰薦新止於寝廟則月祭不及二祧亦明矣王肅謂二祧一爲髙祖之父則五世矣一爲髙祖之祖則六世矣誠能明其言之意而不溺於文王之功徳則通矣又曰父昭子穆而有常數者禮也祖功宗徳而無定法者義也故周於三昭三穆之外而有文武之廟魯於二昭二穆之外而有魯公之世室王舜劉歆王肅韓愈之徒皆謂天子祖功宗徳之廟不在七世之列特鄭康成以周禮守祧有八人小記王者立四廟則謂周制七廟文武爲二祧親廟四而已是不知周公制禮之時文武尚爲近廟其所以宗之之禮特起於後代也果所以宗之者在七廟内使繼世祖先閒有豐功盛徳不下文武復在可宗之列則親廟又益殺乎理必不然馬氏睎孟曰説者以爲七廟之中祧廟二則爲文武之廟其説非也逺廟爲祧而二祧之廟止於享嘗而已茍文武之廟而祭止享嘗亦非先王所以尊祖宗之意也楊氏復曰按祭法與王制不同大抵王制略而祭法詳又案三壇同墠之説出於金縢乃因有所禱而爲之非宗廟之外預爲壇墠以待他日有禱也孝經爲之宗廟以鬼享之非去墠爲鬼也晉張融謂祭法去祧爲壇去壇爲墠去墠爲鬼皆衰世之法則所言難以盡信案此記天子兼二祧爲七廟蓋韋𤣥成説也劉歆則謂天子本七廟加二祧爲九語類中朱子獨以劉説爲然則文武世室不在七廟數中自有定論先儒若陳氏馬氏呉氏亦各韙劉而疑鄭其以文武世室爲二祧者周禮鄭注所謂因祧主所藏故名爲祧聘禮不腆先君之祧其義亦如之二祧之祭各經雖無明文以理論之二祧爲髙祖之祖父其祭視太廟親廟宜少殺此記所以有享嘗乃止之文也若以文武世室為七廟中之二祧則宜月祭而不止享嘗矣孔氏謂祧不月祭本望經為説至陳氏以二祧将毁并埽除之事去之其意若以為文武之廟則不可以将毁言若以将遷為将毁則髙祖矣焉有廟在四親之内乃去其月祭并埽除之不事乎要之記有二祧必非文武廟也若文武廟何至不月祭耶王為羣姓立社曰大社王自為立社曰王社諸侯為百姓立社曰國社諸侯自為立社曰侯社大夫以下成羣立社曰置社為于偽反正義鄭氏康成曰羣衆也大夫以下謂下至庶人也大夫不得特立社與民族居百家以上則共立一社今時里社是也郊特牲曰唯為社事單出里孔氏頴逹曰此明天子以下立社之義羣姓謂百官以下及兆民大社在庫門内之右故小宗伯云右社稷王社在耤田王所自祭以供粢盛故詩頌云春藉田而祈社稷是也諸侯國社亦在公宫之右侯社在藉田大夫以下為衆特置故曰置社通論陳氏祥道曰有天下之社有一國之社有衆人之社有一人之社有失國之社大社天下之社也國社一國之社也王社侯社一人之社也喪國之社屋之失國之社也三社之制大社為大此孟子所謂民為貴社稷次之君為輕也喪國之社天子所以為戒則又次於王社矣以言安不可以忘危也書曰夏社禮與春秋曰亳社皆以為戒而已然則諸侯有國社侯社與春秋之亳社亦三社矣天子之社在雉門之右而緜詩曰乃立應門繼之曰乃立冢土冢土社也則諸侯之社亦在門内也天子之牲太牢則諸侯當用少牢若郊特牲曰社事單出里丘乗供粢盛此大夫以下之社也案社有與郊對舉者漢志引禮記祭地於泰折在北郊就隂位也案今記無此蓋逸文周禮大宗伯以冬日至致天神夏日至祭地􅅘蒼璧禮天黄琮禮地四圭有邸以祀天兩圭有邸以祀地大司樂圜丘方澤此禋祀之禮禮之最重者也社有與稷並稱者大司徒設社稷之壝㑹社稷之職夏官小子掌衈于社稷此血祭之禮禮之稍輕者也方澤祭全載之地大社祭中國九州之地王社祭畿内之地諸侯國社祭其一國之地下而州社祭一州之地里社祭一里之地天唯天子得祭之地則諸侯大夫士無不得祭但有廣狹不同者天父道地母道也天尊地親父尊母親天非天子不得郊見地各以其所食為社也唯於天尊之故禮多舉郊而祈榖祈年不及舉其重以明尊也於地親之故瘞埋泰折止一言而大社王社國社侯社置社悉數之舉其多以明親也不明此義而胡氏有社無北郊之惑生矣王為羣姓立七祀曰司命曰中霤曰國門曰國行曰泰厲曰户曰竈王自為立七祀諸侯為國立五祀曰司命曰中霤曰國門曰國行曰公厲諸侯自為立五祀大夫立三祀曰族厲曰門曰行適士立二祀曰門曰行庶士庶人立一祀或立户或立竈霤力又反正義鄭氏康成曰中霤主堂室居處門户主出入行主道路行作厲主殺罰竈主飲食之事明堂月令春曰其祀戶祭先脾夏曰其祀竈祭先肺中央曰其祀中霤祭先心秋曰其祀門祭先肝冬曰其祀行祭先腎聘禮曰使者出釋幣於行歸釋幣於門孔疏此證大夫有門行士喪禮曰疾病禱於五祀孔疏此證士亦有五祀司命與厲其時不著春秋𫝊曰鬼有所歸乃不爲厲孔氏穎逹曰此明天子以下立七祀五祀之義司命者宫中小神非天之司命故祭於宫中國門謂城門也國行謂行神在國門外之西泰厲謂古帝王無後者此鬼無所依歸好為民作禍故祀之也此七祀是為民所立與衆共之其自為立者王自禱祭不知其當同是一神為是别更立祀也諸侯減天子戶竈二祀故五祀公厲謂古諸侯無後者諸侯稱公其鬼曰公厲大夫減諸侯司命中霤故三祀族厲古大夫無後者鬼也曰門曰行者大夫無民國故不言國門國行也方氏慤曰司命即周官以槱燎祀司命者是矣厲即春秋𫝊所謂鬼有所歸乃不為厲是矣以司人之命祀之求有所延慮其為厲故祀之使有所歸也門行曰國而户竈不言者以其在内故也大夫而下雖門行亦不言者以所立皆非為國也司命天神故首言之中霤土神故次言之門在外故又次於中霤行在道故又次於國門厲之施毒不特在道而已故又次於國行戶雖在内特用於房户之閒而已故又次於泰厲竈則化飲食以飬人非人之飬也故以是終焉獨族厲先於門行者以厲之為道在天道則為卑在人道則為尊故或先或後以尊卑之辨也大宗伯言以血祭祭社稷五祀則七祀之説非周制可知曲禮王制止言大夫祭五祀蓋以周制言之上可得以兼下而五祀主於家故也通論陳氏祥道曰五祀見於周禮禮記儀禮雜出於史𫝊多矣特祭法以司命泰厲為七祀而左傳家語則以五祀為重該脩熙黎勾龍五官月令為門行户竈中霤白虎通劉昭之徒為門井户竈中霤鄭氏釋大宗伯則用左𫝊家語釋小記則用月令釋王制則用祭法而荀卿謂五祀執薦者百人侍西房侍西房則五祀固非四方之五官侍必百人則五祀固非門户之類然則所謂五祀其名雖同其祭各有所主也七祀之制不見他經鄭氏以七祀為周制五祀為商制然周官雖天子亦止於五祀儀禮雖士亦備五祀則五祀無尊卑隆殺之數矣祭法曰七祀推而下之至於適士二祀庻人一祀非周禮也五祀中霤祀於中央竈祀於夏井祀於冬户在内而竒陽也故祀於春門在外而耦隂也故祀於秋兩漢魏晉立五祀井皆與焉隋唐用月令祭行及復脩月令冬亦祀井而不祀行然則行神亦特軷於始行而已非先王冬日之常祀也考之於禮五祀之牲羊牲案小司徒小祭祀共羊牲祭於廟有主有尸觀月令臘先祖五祀同時則五祀祭於廟可知曽子問祭五祀尸入則有尸既殯而祭不酳不酢則凡祭五祀固有侑酳與酢矣老婦之祭先儒以為竈配則五祀固有配矣先儒又謂卿以上宗廟有主五祀亦有主大夫以下宗廟無主五祀亦無主然大夫之廟未嘗無主五祀有主與否不可考也餘論馬氏端臨曰司命與厲當有祭之之所若中霤門户行竈則所祭之神即其地也而隋唐以時享祖宗時并祭於廟蓋本鄭康成説然康成注禮記月令言祭於廟注周禮宫正言祭七祀於宫中夫五祀皆人生日用起居所係當即宫居而祭之若廟則所以崇奉祖宗不當雜祭他鬼神於其地如門户中霤廟亦有之因時享而并祀於其地猶可也若司命竈行於廟何闗況泰厲乃帝王之無後者非我族類得毋有相奪予享之患乎存疑鄭氏康成曰今時民家或春秋祠司命行神山神門户竈在旁是必春祠司命秋祠厲也或者合而祠之山即厲也民惡言厲巫祝以厲山為之謬乎存異鄭氏康成曰此非大神所祈報大事者也小神居人之閒司察小過作譴告者爾司命主督察三命孔疏案援神契云命有三科有受命以保慶有遭命以謫暴有隨命以督行受命謂年夀也遭命謂行善而遇凶也隨命謂隨其善惡而報之王下祭殤五適子適孫適曽孫適𤣥孫適來孫諸侯下祭三大夫下祭二適士及庶人祭子而止殤音傷正義鄭氏康成曰祭適殤者重適也祭適殤於廟之奥謂之隂厭王子公子祭其適殤於其黨之廟大夫以下庶子祭其適殤於宗子之家皆當室之白謂之陽厭凡庶殤不祭孔氏穎達曰此明天子以下祭殤之差鄭注王子謂王之庶子公子謂諸侯之庶子不得為先王先公立廟無處可祭適殤故祭於黨之廟謂王子公子但為卿大夫得自立廟與王子公子同者就其廟而祭之適殤其義已具曽子問方氏慤曰𤣥孫之子為來孫必曰來者言其世數雖逺方來而未已也曽𤣥見小記觧殤見檀弓觧毎言適則庶殤在所不祭矣重本故也然以尊而祭卑故曰下祭且在王而下毎殺於廟數之二焉曽子問所謂隂厭陽厭者是矣應氏鏞曰祭殤之數尊者所及逺卑者所及近澤有厚薄則禮有隆殺也徳厚者流光既上及其祖又下及其殤祭及於五所愛者逺也祭止於適所重正統也不混淆也夫聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大烖則祀之能捍大患則祀之是故厲山氏之有天下也其子曰農能殖百榖夏之衰也周棄繼之故祀以為稷共工氏之霸九州也其子曰后土能平九州故祀以為社帝嚳能序星辰以著衆堯能賞均刑法以義終舜勤衆事而野死鯀鄣洪水而殛死禹能脩鯀之功黄帝正名百物以明民共財顓頊能脩之契為司徒而民成冥勤其官而水死湯以寛治民而除其虐文王以文治武王以武功去民之葘此皆有功烈於民者也及夫日月星辰民所瞻仰也山林川谷丘陵民所取材用也非此族也不在祀典禦魚呂反葘音哉共音恭鄣音章殛紀力反去起吕反夫音扶正義鄭氏康成曰此所謂大神也春秋𫝊曰封為上公祀為大神厲山氏炎帝也起於厲山或曰有烈山氏棄后稷名也共工氏無錄而王謂之霸在太昊炎帝之閒孔疏本漢律歴志文案月令春其帝太皡夏其帝炎帝不載共工氏是無録以水紀官是無録而王又案昭十七年左傳郯子稱黄帝以雲紀炎帝以火紀共工氏以水紀太皡氏以龍紀從下逆陳是在炎帝之前太皡之後也著衆謂使民興事知休作之期也賞賞善謂禪舜封禹稷等也能刑謂去四凶義終謂既禪二十八載乃死也野死謂征有苖死於蒼梧也案辨詳檀弓殛死謂不能成其功也明民謂使之衣服有章也民成謂知五教之禮也冥契六世之孫也案竹書少康十一年使商侯冥治河帝杼十三年商侯冥死於河其官𤣥冥水官也案為𤣥冥之官者脩與熙二人乃少皡之後非契後冥雖治水未嘗為𤣥冥之官冥其名非官也虐菑謂桀紂也烈業也族猶類也祀典謂祭祀也孔氏穎達曰法施於民若神農后土帝嚳與堯及黄帝顓頊與契之屬是也以死勤事若舜及鯀冥是也以勞定國若禹是也禦大菑捍大患若湯及文武是也農謂厲山氏後世子孫名柱能殖百榖故國語云神農之子名柱作農官因名農是也夏末湯遭大旱七年變置社稷故廢農祀棄祀以為稷者謂農及棄皆祀之以配稷之神也共工後世之子孫為后土之官后君也為君而掌土能治九州五土之神故祀之以配社之神帝嚳能紀星辰序時候以明著使民休作有期不失時節故祀之也堯以天下位授舜封禹稷官得其人是能賞均平也五刑有宅是能刑有法也舜征有苖仍廵守陟方而死是勤衆事而野死鯀塞水無功被堯殛死於羽山治水九載亦有㣲功故得祀之又世本云作城郭是亦有功也鄭答趙商云鯀非誅死放居東裔至死不得反於朝耳禹能脩父之功故祀之上古雖有百物而未有名黄帝為物作名正名其體明民謂垂衣裳使貴賤分明得其所也共財謂山澤不鄣教民取百物以自贍也湯除虐謂放桀也去民之菑謂伐紂也自厲山氏以下所得祀者皆有功烈於民也及夫日月星辰者釋上文泰壇泰折等祀也上有祭地祭天祭四時寒暑水旱此不言者舉日月則天地可知四時寒暑水旱則日月隂陽之氣故舉日月以包之非此族謂非厲山以下及日月丘陵之等無益於民者悉不得預於祭祀之典也劉氏彝曰法施於民則祀之者民頼其法成身者也伏羲氏作八卦而民頼之以知君臣父子兄弟夫婦之義神農氏作耒耜而民頼之以知耕種之益黄帝氏作衣裳而民頼之以知尊卑上下之分堯舜執遜避之義而民頼之以知亷讓崇徳之羙后稷立耕稼之規而民賴之以知粒食畎畝之法是皆功及萬世而莫敢或違故有天下者祀以為報所以重民之生也以死勤事者忠於國者弗顧其生義於君者弗惜其死祀之則忠義勸於天下矣以勞定國者夙夜勞瘁弼成王業如伊尹之相湯升陑如吕望之鷹揚我武如周公之坐以待旦也能禦大菑者如洪水為菑而后土氏能平五土懐襄昏墊而夏后氏能滌九源既免民之魚鼈又敷土以播殖也能捍大患者如玁狁猾夏而宣王斥之管蔡亂國而周公征之楊墨亂教而孟子闢之皆俾大患弗克興焉黄帝正名百物者謂垂衣裳而定尊卑之法為舟楫而取諸渙服牛乗馬而取諸隨重門擊柝而取諸豫設杵臼而取諸小過弦弧矢而取諸睽作宫室而取諸大壮易棺槨而取諸大過立書契而取諸夬皆其正百物之名以興天下之利而共其財用於無窮者也陳氏祥道曰凡聖賢之有功烈於民者蓋皆應時而造隨所著見而已其内之所存豈止於此哉堯之道至於無能名而其所以見祀者止於賞均刑法以義終舜之道至於無為而其所以見祀者止於勤衆事而野死以此推之則功烈者道徳之迹迹者祀典之所可載而其為道非祀典之所可盡也夫法施於民所謂民功曰庸也以死勤事以勞定國所謂事功曰勞也能禦天之大菑捍人之大患所謂治功曰力也案禹貢言既脩太原存鯀功也則權其保障太原之功而秩祀之宜也奉以配天似過而國語晉平公疾夢黄熊鄭國僑言鯀化黄熊實為夏郊三代舉之今周少卑晉實繼之韓起告晉侯晉祀夏郊董伯為尸與此言夏郊鯀合而劉氏基云夏之天下受之舜舜之殛鯀天刑也禹受舜禪而升其罪人以配天逆於舜即逆於天天其弗享之矣持論甚正今思國語謂鯀化黄熊語已近怪三代皆舉夏郊配祭以鯀理亦不確而謂晉可代周郊天尤為非禮子産不應有是言也或屬晉人飾説而記者亦因附㑹與欽定禮記義疏巻五十九
