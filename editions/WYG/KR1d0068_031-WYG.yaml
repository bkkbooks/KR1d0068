body:
  text: 禮運第九之二孔子曰嗚呼哀哉我觀周道幽厲傷之吾舍魯何適矣魯之郊禘非禮也周公其衰矣杞之郊也禹也宋之郊也契也是天子之事守也故天子祭天地諸侯祭社稷舍音捨禘大計反契息力反正義鄭氏康成曰周衰政亂禮失以爲魯尚愈孔疏言魯尚勝于餘國故韓宣子適魯曰周禮盡在魯矣非猶失也周公其衰言子孫不能奉行興之事守言先祖法度子孫所當守也孔氏頴達曰孔子答子游問畢乃發明所以自歎之意言觀周家文武之道以經幽厲之亂而傷獨魯秉周禮庶幾可觀而子孫不能承奉興行周公之道是可歎也郊禹郊契是夏殷天子之事杞宋乃其子孫常所保守勿使有失馬氏睎孟曰郊天子外祭之重禘天子内祭之重非諸侯所宜有祀宋之郊禘皆天子之事守魯非天子之事守也天子與天地參天有覆物之功地有載物之功故天子祭天於圜丘祭地於方澤諸侯守天子之土養一國之民故祭社稷而已天子亦祭社稷諸侯不得祭天地蓋上得以兼下下不得以兼上也存異鄭氏康成曰魯之郊牛口傷鼷鼠食其角又有四卜郊不從是周公之道衰孔氏頴逹曰魯合郊禘但郊失禮則牛口傷禘失禮則躋僖公王氏安石曰有伊尹之志則放其君可也有湯武之仁則誅其君可也有周公之功則用郊不亦宜乎辨正張子曰魯之郊禘非禮夫子已明言之杞宋則爲其二王之後也魯用天子禮樂必是成王不敢臣周公故以二王之後待魯然非周公之意也以成王尊徳樂道之心則善矣伯禽不當受也其後家臣僭大夫三桓僭魯魯僭天子已啟其階程子曰周公之功固大矣皆臣子之分所當爲魯安得獨用天子禮樂哉成王之賜伯禽之受皆非禮也其因襲之弊遂使季氏僭八佾三家僭雍徹故仲尼譏之林氏之竒曰春秋書郊先儒無得其㫖者知求小禮而昧於大禮也經書郊九或因卜不吉或因牲死傷先儒止罪其屢卜與養牲之不謹不知聖人乃惡其非禮之大未暇及此瑣瑣也夫子傷周之衰禮樂自諸侯出魯之郊禘則有周公其衰之歎使諸侯而可郊禘則聖人不以禮樂自諸侯出爲傷矣漢儒不知道者但見春秋書魯祭祀多天子禮始妄設周賜之説雖周郊以冬至魯用之啟蟄天子四望魯三望似乎稍降但竊郊望之名已有罪矣予謂春秋正以有故而不郊爲幸無故而郊爲罪也泰山不享季氏之旅曾上帝而享魯之郊乎至三卜四卜五卜不從可見天心之不享也春秋書乃不郊乃免牲其深矣乎其微矣乎蔣氏君實曰君臣天下之大分也禮不王不禘郊以祖配天其義甚重魯侯國安得有郊周成王時禮典未壊安得以賜魯呂覽載魯恵公使宰請郊廟之禮於天子天子使史角徃止之使成王之世而魯已郊恵公奚請恵公之請殆由平王以下也聖人觀周道而傷幽厲論郊禘而衰周公其義甚明注疏殊失聖人立言之㫖郝氏敬曰魯頌言周公之孫莊公之子龍旂承祀及皇皇后帝皇祖后稷故春秋書郊自僖公始使魯郊由伯禽則僖以前豈無一牛之傷而獨於僖後數數書之耶則魯郊斷非周公之舊夫子所以歎之案魯之郊禘明堂位謂成王賜祭統謂成王康王賜或曰成王或曰康王則出於傳聞附會可知此篇直指爲非禮歎爲周公之衰而疏反謂魯合郊禘何其蔽也魯之僭禮先儒多歸罪於成王伯禽獨蔣氏歸罪恵公郝氏歸罪僖公爲得其實但細案之有王所賜者有魯自僭者不可不辨也成王之賜以康周公惟禘祭耳而魯之禘亦與天子之禘不同天子之禘追所自出魯之禘不追所自出故明堂位言季夏六月以禘禮祀周公於太廟不言祀文王於周公之廟魯頌言周公皇祖亦其福女不言文王福女也若其郊則何與於公而曰康周公乎且周正郊以至月祈糓以啟蟄春秋惟言啟蟄而郊是魯未嘗大郊也祭社以稷配爲農報也祈糓以稷配爲農祈也大郊以稷配萬物本乎天人本乎祖之義也以稷配同而所以配之義則異魯頌言皇皇后帝皇祖后稷亦魯人以后稷爲遠祖而誇之非祈糓之本義也况祈糓之郊詩於僖公始言之春秋於僖公始書之其非出於成王之賜更爲明著即禘禮祀公所用者詩言白牡用殷天子禮也祭統言八佾以舞大夏用夏天子樂也明堂位言殷之玊豆夏之嶡俎虞之雕篹雜用三代天子器物是特比於三恪以尊公耳其餘犧象山罍玊琖斚角璧散考之周禮皆降天子一等則仍上公禮耳至於闕春一祭無皋應二門皆諸侯制也烏覩所謂王禮乎子家駒謂設兩觀乘大輅舞大夏大武久僭天子蓋闕門之作煬公時亦因周廢象魏而作其後周復象魏而魯仍而不革大武原無八佾只朱干玉戚爲僭耳餘皆恵僖以下爲之也呂覽言魯使宰讓如周請郊禘禮王使史角諭止之恵公怒執王使則恵公之罪甚於楚之問鼎晉之請隧矣安得以爲成王伯禽罪而反失出恵與僖乎鄭氏於凡周禮無考者悉以魯禮實之曰魯禮即王禮也堅執郊服大裘不服衮之説於禮記王被衮以象天則曰此王魯君也趙匡釋魯禘以周禮推之曰周禘追后稷所自出爲帝嚳魯必追周公所自出而祭文王似此附會而成王伯禽遂爲敗法亂紀之首矣商沃丁八年伊尹薨沃丁祀以天子禮成王以禘禮祀公亦猶行先代之道也但因此賜而僭端以開篇首稱成王謹於禮且有此失况不謹者哉祝嘏莫敢易其常古是謂大假正義鄭氏康成曰假亦大也不敢改其常古之法度是謂大大也將言今不然孔氏頴達曰祝以主人之辭告神神以嘏福與主皆依舊禮無敢易其常事是於禮法大中之大自此以下皆論今時之惡陳氏澔曰祝於始嘏於終禮之成也中間禮節一遵常古内盡於己而外順於道矣假亦當作嘏猶上章大祥之意言行當然之理則有自然之福其福大矣存異黄氏震曰天子祭天地諸侯祭社稷各有分守今乃諸侯用天子禮而祝嘏皆莫敢易其辭竟以天子之辭而用之諸侯之國假竊莫大於是是謂大假此章本歎非禮先儒誤也方氏慤曰祝君假以告神者嘏尸假以告主人者案鄭訓假爲大乃禮夏者假也易王假之尚大也之義陳作嘏謂猶大祥二説皆可通但家語作嘉中庸嘉樂君子詩作假似陳説近之方説巧而纖黄氏闢鄭孔尤謬祝嘏辭説藏於宗祝巫史非禮也是謂幽國正義鄭氏康成曰藏於宗祝巫史言君不知有也幽闇也國闇者君與大夫俱不明也孔氏頴達曰祝嘏皆當從古法今乃棄去不用改易古禮自爲辭説君臣皆不知是上下俱闇也通論方氏慤曰祝以孝告嘏以慈告祝嘏有常古焉天下所共知也若藏於宗祝巫史之家則非慈孝之言且不欲使人知矣劉氏彛曰周官大祝掌六祝六祈六辭六號皆繫諸六典之籍而藏於大史屬於春官上下相維不可少廢也今藏於宗祝巫史之家使國之禮典幽暗不明矣餘論應氏鏞曰祝嘏辭説藏於公而不藏於私金縢之納匱中命祝史勿言周公不欲宣其事而揚己功也若常時之辭説未嘗不欲人知若私爲之而私藏之不爲隨之矯舉則爲漢之秘祝矣案孔方以變易舊法爲説劉以具文無實爲説考家語與上通爲一節作今使祝嘏辭説徒藏於宗祝巫史則無實而又矯舉以求媚是二義兼之醆斚及尸君非禮也是謂僭君斚古雅反又音嫁正義鄭氏康成曰醆斚先王之爵惟魯與二王後用之其餘諸侯用時王之器而已僭君僭禮之君也孔氏頴逹曰夏曰醆殷曰斚祭祀尸未入時祝酌奠於鉶南尸入乃舉之若尋常獻尸則用玉爵時諸侯有同二王後用醆斚者是僭禮矣周氏諝曰及尸君君以獻尸尸以酢君也劉氏彛曰天子備六代禮樂故用醆斚蔣氏君實曰用器或忘乎分守則僭上之患起天子奠斚諸侯奠角等級甚明諸侯用醆斚大夫安得不僭諸侯哉冕弁兵革藏於私家非禮也是謂脅君脅許劫反正義鄭氏康成曰冕弁君之尊服兵革君之武衞及軍器脅君劫脅之君也案記文皆大夫劫脅之事注以爲劫脅之君者謂其不能正名分而啓人刼脅之君也孔氏頴達曰大夫以下稱家冕衮冕弁皮弁私藏公物則見此君恒被臣之劫脅也顧氏臨曰冕有五絺冕𤣥冕卿大夫得服之皮弁通用其飾不同通論蔣氏君實曰繁纓小物君子猶惜之弓矢鈇鉞諸侯猶俟命於天子今竟藏於私家此所以攘竊僭逆莫之能禦也黄氏乾行曰臣而脅君其罪易見君而見脅寧無不善之積乎記者深罪君之見脅與春秋君出奔書名同義存疑姚氏舜牧曰脅君臣脅其君也案君之冕弁臣不敢服臣何故藏之私家若謂臣之冕弁亦藏公府則卿大夫有公事至公府服之事畢至公府脱之亦殊非禮左傳晉以黻冕命士會是卿大夫之冕弁必命乃得服之東周時世卿僭侈卿不待君命而自居之冕弁不待君命而自爲之如詩所云豈曰無衣者其君直視爲無可如何故曰劫脅之君也大夫具官祭器不假聲樂皆具非禮也是謂亂國正義鄭氏康成曰臣之奢富擬於國君敗亂之國也孔子謂管仲官事不攝焉得儉孔氏頴達曰天子六卿諸侯三卿大夫有地者置宰一人兼攝衆職大夫無地不造祭器有地造而不具唯公孤以上得備造故周禮四命受器大夫樂有判縣而祭不得用樂故少牢饋食無奏樂之文惟君賜乃有之陳氏澔曰大夫樂有判縣不得如三桓舞八佾故仕於公曰臣仕於家曰僕三年之喪與新有昏者期不使以衰裳入朝與家僕雜居齊齒非禮也是謂君與臣同國期朞通朝音潮正義鄭氏康成曰臣有喪昏之事而不歸反服其衰裳以入朝或與僕相等軰而處是謂君臣同國無尊卑也有喪昏不歸唯君耳臣有喪昏當致事而歸僕又不可與士齒孔氏頴逹曰仕於諸侯自稱曰臣臣者卑賤之稱仕於大夫自稱曰僕僕又賤於臣臣有喪昏則歸其家一期之閒不復役事今臣有喪乃不致事身著衰裳入朝是君與臣同國臣是君之臣僕是臣之僕今卿大夫與僕雜居亦是君與臣同國也方氏慤曰臣者對君之稱諸侯稱君僕者對主之稱大夫稱主左氏人有十等遞相臣而位不可不辨故與家僕雜居齊齒爲非禮陳氏澔曰昏喪不使所以體人情也而喪尤重於昏今乃不居喪於家而以衰裳入朝是視君之朝如巳之家矣卿大夫於君爲臣僕又其臣也今卿大夫乃與僕雜居齊列是忘己之身在君之朝矣呉氏澄曰先言臣僕之不同稱以見臣僕雜齊之非禮先言昏喪之不使以見衰裳入朝之非禮黄氏乾行曰無吉凶之辨無貴賤之分是皆君無節制使然罪在君也通論張子曰魯之於陽貨豈特雜居齊齒哉且有畏偪之勢焉案或謂禮惟君門脱齊衰觀檀弓蟜固事是春秋時於卿大夫之門且不敢以衰裳入矣豈有入朝而反以衰裳者今案其文義承上不使當是專責君之不以禮使臣謂三年之喪而使之是奪人之親而使以衰裳入朝也新有昏句只帶説鄭孔并説謂君有昏喪臣皆不歸夫君有父之喪則臣有君之喪臣之不歸居君喪也君昏於臣何與而不歸乎詩大夫夙退無使君勞安見大夫之不歸耶與家僕雜居齊齒亦是君使之君以是輕其臣殊不知臣與家臣無别即君與臣無别矣所謂陛無級亷近地則堂卑也故曰君與臣同國罪君也附存之總論徐氏師曾曰自祝嘏至此七節皆言失禮之辨故天子有田以處其子孫諸侯有國以處其子孫大夫有采以處其子孫是謂制度正義鄭氏康成曰言今不然也春秋昭元年秦伯之弟鍼出奔晉刺其有千乘之國不能容其母弟孔氏頴逹曰將論其臣之惡先明古之制度天子子孫有功徳者封爲諸侯無功徳者食邑於畿内諸侯子孫封爲卿大夫有大功徳亦有采地大夫位卑不能割采地以處子孫但以采地之禄養其子孫而巳陳氏祥道曰制則有所裁度則有所限先王以人之子孫莫不思有以處之然不可無尊卑隆殺之别故爲之大法如此若諸侯大夫之子不肖亦不可以世食大夫之子賢亦不止於食舊已也通論應氏鏞曰制度一定則欲偏厚子孫者固無所容其私心而侵剥枝葉兼并同姓者亦不容薄於所厚春秋時京之不度沃之盛强皆私䁥爲患也至晉無畜羣公子秦不能容一弟甚矣徐氏師曾曰制度不止此舉其大而餘可知案此節亦以起下文見天子諸侯大夫各有以處子孫則不相䙝不相瀆如命士以上父子異宮皆是也如此則天子自不可不以禮籍入諸侯之國諸侯非問疾弔喪自不可入諸臣之家矣總論王氏炎曰上五節言諸侯卿大夫之失禮禮之失起於制度之壞故此明言先王制度大小有等尊卑有辨安得有前五失諸侯僭差起於天子之失禮大夫僭差起於諸侯之失禮也故下文言之故天子適諸侯必舍其祖廟而不以禮籍入是謂天子壞法亂紀諸侯非問疾弔䘮而入諸臣之家是謂君臣為謔壞音怪謔許約反正義鄭氏康成曰以禮籍入謂太史典禮執簡記奉諱惡也天子雖尊舍人宗廟猶有敬焉自拱勅也無故而相之是戲謔也陳靈公與孔寧儀行父數如夏氏以取弑焉劉氏彝曰諸侯敬於天子雖其祖先宗廟亦不敢私有而天子入處其廟言動必據乎禮亦不敢慢交相敬也蔣氏君實曰天子適四方曰廵守因以考制度於四方諸侯皆朝於方嶽所以廵省風俗而混一軌轍也豈有躬造諸侯之國而可不以禮籍入乎諸侯問疾弔喪入諸臣之家所以憫難恤患見厚下之禮也豈可出入無名率意以行乎君臣無私交聖人嚴之在易之履上天下澤𣺌不相接也而上下以辨民志以定聖人觀其會通必出於名義之所宜有而後交際酬酢興焉不然妄動兆亂事出於微而禍成於著矣徐氏師曾曰此又言失禮之弊案天子廵守所經之國諸侯待於竟故舍其祖廟若至方嶽則居有常所不必舍其祖廟矣禮籍凡廵守所當考正者皆是先儒專指諸侯之廟諱太拘國有大賢諸侯亦親就見如魯穆亟見子思宜也若齊桓飲酒於陳敬仲之家而將之以禮猶有古迭爲賓主之意焉非是則斷不可是故禮者君之大柄也所以别嫌明微儐鬼神考制度别仁義所以治政安君也柄兵命反儐必刃反正義鄭氏康成曰疾今失禮如此爲言禮之大義也柄所以治事孔氏頴達曰惟失禮故致上禍敗之事言人君治國湏禮如巧匠治物執斧斤之柄然其下明用禮爲柄之事如寡婦不夜哭是别嫌君子表微是明微接賓以禮曰儐郊天祀地及一切神明是儐鬼神考成也廣狹丈尺以禮成之是考制度仁生義殺各使中禮是别仁義用禮爲柄如此故治國得政君得安存劉氏彞曰天下甚衆也非一人之力可得而治惟禮明然後可以無爲於岩廊之上而四海莫不尊親故曰大柄尊卑嫌者以貴賤别之長少嫌者以親疎别之先後嫌者以上下别之則人倫之道正矣著誠去僞莫善於禮正民心於幾微之先定民志於意慮之始則未形於言動而先定之於心矣用禮以致其誠則天神地祗人鬼可得而饗是儐鬼神也謹禮莫大於制度廵守及四方協時月正日同律度量衡所以考之也仁義之賢由之可别悖亂之失由之可除則所以治政安君者不柄以禮其可致哉馬氏睎孟曰嫌者人所難别禮以别之微者人所難明禮以明之鬼神在幽而難測禮以接之制有所裁度有所節禮以考之仁有殺義有等禮以别之故禮所以治政安君也總論顧氏臨曰别嫌明微則不爲僭君脅君儐鬼神則祝嘏不敢易其常古考制度若有田有國有采別仁義若適諸侯諸臣不爲亂謔之類故政不正則君位危君位危則大臣倍小臣竊刑肅而俗敝則法無常法無常而禮無列禮無列則士不事也刑肅而俗敝則民弗歸也是謂疵國正義鄭氏康成曰又言政失君危之禍敗也肅駿也疵病也孔氏頴達曰大臣大夫以上小臣士以下倍倍君行私竊竊盜府庫君位已危大夫又倍小臣盜竊愚君無奈此何惟知暴怒急行刑罰上下乖離法教無常皆國之病陳氏祥道曰政不正則君位危所謂上無道揆也大臣倍而不法小臣竊而不亷所謂下無法守也上無道揆下無法守則刑肅而不中俗敝而不美法亂而無常禮紊而無别所謂士者亦不事其事也士不事其事則民亦不歸之矣重言刑肅俗敝以亂之所致多由刻核太至也夫治之爲道由内以及外故禮出而後有法法出而後有刑及其亂也由外以及内故刑肅而後法無常法無常而後禮無列方氏慤曰法以禮爲體禮以法爲用用既無常則體亦無列矣禮失其序則人不安其職故士不事刑肅而俗敝則民畏罪而離散故民弗歸俗敝民散何以致國之肥故以疵言之總論徐氏師曾曰自天子有田至此四節言禮之得失係國之存亡而歸重於君也故政者君之所以藏身也是故夫政必本於天殽以降命命降于社之謂殽地降于祖廟之謂仁義降于山川之謂興作降于五祀之謂制度此聖人所以藏身之固也殽户教反正義鄭氏康成曰於此又遂爲之言政也藏謂光輝於外而形體不見若日月星辰之神降下也殽天之氣以下敎令天有運移之期陰陽之節孔疏天有運移若星辰圍繞北極氣有陰陽若冬夏之有寒暑命降于社謂敎令由社下者也孔疏命政令之命降下於社謂從地而來以教民社土地之主也孔疏指其神謂之社指其形謂之地周禮土會之法有五地之物生孔疏地有五土生物不同人君法地亦養物不一敎令由祖下者大傳曰自禰率而上至於祖遠者輕仁也自祖率而下至於禰高者重義也孔疏父親仁也祖尊義也言法此父祖施仁義於民敎令由山川而下者山川有草木鳥獸可作器物共國事孔疏人君效法山川以興作其器物敎令由五祀而下者五祀有中霤門户竈行之神此始爲宮室制度孔疏初造中霤門户竈行大小形制各有法度後王所取以爲制度等級也政之行如此何用城郭溝池之爲孔氏頴達曰殽效也上文言政不正則國亂君危此乃廣言政之大理本於天地及宗廟山川五祀而來所來既重故君用之得藏身安國也身在於中政行於外人見其政不見其身政美盛而身安靜故曰藏身左傳云禮者天之經地之義爲父子兄弟昏媾姻亞以象天明爲温慈恵和以效天之生殖長育爲刑罰威獄以類其震曜殺戮皆法天之所爲以下教令也此言政之所行若能法天陰陽使賞罰得所法地高下使尊卑有序法祖廟而行仁義法山川五祀而爲興作制度則民懷其徳禍害不來何所防禦方氏慤曰道徳仁義興作制度皆政之所存而聖人特寓之天地祖廟山川五祀使萬物莫不聽命焉然未嘗有迹也故謂之藏身先天後地上下有序次以祖廟尊卑之序次以山川内外之序次以五祀大小之序蔣氏君實曰自有天地萬物而是理已具於混然之初天高地下是氣形焉類聚羣分是理形焉故聖人本天理以出政天不言而六子運四時行百物生吾則傚之以降命於天下凡其興建顯設咸有定序使萬物森列各居其位而不相奪者皆非私意爲之也是以命降于社因地事地敎民美報而地道以顯也降于祖廟反本復始尊祖敬宗而人道以立也降于山川備物致用率作興事而職業以起也降於五祀門行有守外内有職而宫室以居也皆因天理之自然運機緘於不露蓋人道立於天下莫先於天地鬼神各安其位莫先於孝慈報反各有其常又莫先於養生居處各有其序此二帝三王所以爲天下開物成務身處法宮而民莫與爲敵也存疑呉氏澄曰當作本於天殽于地以降命命降于郊之謂本天降于社之謂殽地爲政降下敎命必原本於天效法於地取法於中鬼神因郊祭而降敎命是法天也因社祭而降敎命是法地也降于祭祖廟之時是取法親親尊尊之仁義降于祭山川之時是取法山川所生之材可以興功作事降於祭五祀之時是取法户竈中霤門行之各有制度也敎命各於祭禮而有所取法是故皆出於禮聖人使君行此政是所以藏蔽其身之固也案殽者散布之謂天下之理一天而已矣天無乎不在則殽之以見命者亦無乎不在乾元統天坤順承天則觀地之載物而知天之命已降於地天者萬物之祖天生人而人遞生生則觀人各有祖而知天之命巳降於祖廟山川亦天所生之物而山川又各能生物則觀山川之興殖而知天之命已降於山川天之生物播於五行而五祀乃五行之功之最切於人者則觀五祀之爲功於人而知天之命已降於五祀夫祖廟山川五祀皆殽列於地之上而實皆本於天則聖人效天以降命即地道之承天而自仁率親自義率祖仁義一天命也山川生物聖人用之興作一天命也五祀分職聖人則之制度一天命也其所以爲政者神而明之化而裁之人見聖人之用而不見聖人之所以用而聖人之藏身則巳固矣又案統言之則祖廟山川五祀皆鬼神故前止曰殽於地列於鬼神分言之則春秋之榮枯冬夏之盈涸其屈伸徃來在山川尤爲易見故後曰山川所以儐鬼神此只就政上説與中庸建天地質鬼神同義後祭天于郊祀社于國方氏専以祭祀言呉氏增改恐非是故聖人參於天地並於鬼神以治政也處其所存禮之序也玩其所樂民之治也治政之治平聲樂音洛正義鄭氏康成曰並并也謂比方之也治所以樂其事居也孔氏頴達曰此結上政令之降鬼神則祖廟山川五祀也天有運移寒暑地有五土生殖廟有祖禰仁義聖人處此以爲政則禮得其次序興作器物宫室制度皆是人所樂聖王能愛玩民之所樂以教於民則民所治理各樂其事業居處也方氏慤曰天地祖廟山川五祀皆禮之妙理所存聖人因其所存而處之不違其先後道徳仁義興作制度皆民之良心所樂聖人因其所樂而玩之不紊其條理朱氏申曰參於天地以本天降命而殽于地也並於鬼神以降於祖廟山川五祀也存疑鄭氏康成曰存察也孔氏頴達曰皆人之所觀察陳氏澔曰此承上章言政之事謂聖人所以參贊天地之道比擬鬼神之事凡以治政而已故處天地鬼神之所存則天高地下萬物散殊聖人法之此禮之所以序也玩天地鬼神之所樂則流而不息合同而化聖人法之此民之所以治也沈氏括曰士農工商各安其業君臣父子各適其宜此之謂處其所存案此節語意與易君子所居而安者易之序所樂而玩者爻之辭正同言聖人體天地鬼神之理於身然後有以及於民所存者體於身而藏於心所樂者誠於身而及於物聖人平日所居而安者莫非天地鬼神自然之秩序而所樂而玩者又皆人情受治之所當然此其所以能參並而無不治也陳以兩其字皆指天地鬼神似與上藏身之固下立於無過不甚恊故天生時而地生財人其父生而師敎之四者君以正用之故君者立於無過之地也正義鄭氏康成曰君順時以養財尊師以敎民而以治政刑無過差矣易曰何以守位曰仁何以聚人曰財熊氏安生曰天生四時地生百物父生師敎四者各不能相兼惟君正身修徳則兼用之而禮序民治矣此見君必正身立於無過之地而與天地合其徳鬼神合其吉凶以爲治政之本也馬氏睎孟曰天雖生時而茂對育物非君不能地雖生財而理財正辭非君不能人雖生於父而非君則無以胥匡以生雖敎於師而非君則無以協於大中至正故惟君能以正用之沈氏括曰人君以有心擾天下天下必以多事累聖人行其所無事而我無與焉此之謂以正用呉氏澄曰耕種收穫之時天所生也穀粟桑麻之財地所生也人類繁衍父之所生脩其孝弟忠信師之所敎人君因天所生之時以授人因地所生之財以聚人因父所生師所敎以爲己之民其用時用財用民一出於正陳氏澔曰以正用之謂人君正身修徳順天之時因地之利而裁成其道輔相其宜以左右民使之養生送死無憾然後設爲庠序學校之敎申之以孝弟之義則有以富之敎之而治道得矣然其要在君之自正其身立於無過之地而後可不能正其身如正人何徐氏師曾曰天不能兼乎地父不能兼乎師惟聖人之身克正故能用天之道因地之利養之爲父敎之爲師用是四者以自立於無過之地也苟不正身則四者皆廢惡能若是之無過哉餘論孔氏頴達曰若天不生時地不生財父不生子師不敎訓直欲令人君敎之不可敎誨則君多過今君皆因其自然之性其功易成故無過差也故君者所明也非明人者也君者所養也非養人者也君者所事也非事人者也故君明人則有過養人則不足事人則失位故百姓則君以自治也養君以自安也事君以自顯也故禮逹而分定故人皆愛其死而患其生所明明人之明則君之則今皆如字分扶問反正義呉氏澄曰所明謂人所視效明人謂視效人所養謂食於人養人謂食人所事謂役人事人謂役於人君者立身無過則徳可爲師而人視效之若猶視效於人則身猶有過不足以爲人師矣以一人而享萬方之奉者君也若君養人則以寡養衆而贍給不足矣以萬人而受一人之役者君也若君事人則以上事下而失君位之尊矣百姓取則於君之徳以自治者也出貢賦以供養君君撫臨之而得自安竭膂力以服事君君任使之而得自顯者也此禮既逹於下爲下皆知盡其分故危難之世皆思盡節以委命安平之世亦思盡忠而以竊食爲恥也鄭氏康成曰人之道身治居安名顯則不苟生也不義而死舍義而生是不愛死患生也孔氏頴達曰此一節論政之大體上下分定則人皆以死事上方氏慤曰人之所愛莫如生所惡莫如死所欲有甚於生所惡有甚於死也蔣氏君實曰上論君人之道此别君臣之體徐氏師曾曰君爲所則固矣然有善當從有諫當聽亦未嘗不則人也君爲所養固矣然巳欲當節民勞當恤亦未嘗不養人也君爲所事固矣然大賢當友亦未嘗不事人也序異鄭氏康成曰明猶尊也孔氏頴達曰在下百姓尊奉其君使之光顯陳氏澔曰三明字皆讀爲則君爲臣民所則效非則效人者也案鄭讀下則字爲明謂君尊人則有過陳讀上明字爲則謂君不可取則於人揆之於理似皆未安書明哲實作則蓋君當立身無過之地必自明其明徳乃能以其昭昭使人昭昭而人自則之不然以其昏昏使人昭昭身且多過人何則焉所謂藏身不恕而能喻諸人者未之有也兩字皆讀如字其義自明不必改讀也愛其死求得禮也患其生恐失禮也禮者天理之正人心之安也處治處亂莫不皆然故用人之知去其詐用人之勇去其怒用人之仁去其貪知音智去羌呂反正義孔氏頴達曰此因上患其不義而生論去不義之事知謂計謀曉達勇謂果决敢斷仁者好施不苟求財若詐怒貪皆不敢爲之心慚止息也張子曰禮達而分定則仁知勇之士皆盡誠於上而不過其分用知而知去其詐用勇而勇去其怒用仁而仁去其貪怒如子胥郤克以公戰報私怒也貪如田氏好施以掠美於己也朱子曰人之性易得偏仁善的人便有貪便宜意思亷介多是剛硬的人蔣氏君實曰人狃於性質之所趨而不知反於義理之所止則善端之所形反足爲終身之累知固可尚也而不能行所無事則將變詐以壊禮聖人本禮以用知則止邪於未形而詐去矣勇固可尚也而不能以禮爲主則將肆怒以爲亂聖人本禮以用勇則暴慢逺而怒去矣仁主於有已由盡已而至盡物仁之推也然貪心一形施濟莫廣聖人本禮以用仁則欲立立人欲達達人仁有所廣道有所推而貪去矣存異鄭氏康成曰用知者之謀勇者之斷仁者之施足以成治矣詐者害民信怒者害民命貪者害民財三者亂之源故去之陳氏澔曰言用人之長當去其所短案禮不達分不定人皆愛生而惡死則凡可以趨利可以避害者無不爲若臧武仲之要君是知用其詐郤克之戰鞌是勇用其怒陳氏之厚施是仁用其貪惟君以正用則下化之而用仁之知仁勇者自去其詐怒與貪矣承上文而言鄭陳謂君之用人非也故國有患君死社稷謂之義大夫死宗廟謂之變變注作辯今如字正義鄭氏康成曰患謂見圍入方氏慤曰諸侯爲守土之臣故死於社稷則爲義義之爲言宜也大夫有可去之義死於宗廟則爲變矣陳氏祥道曰社稷天子之社稷也故君死之則義而正宗廟己之宗廟也故大夫死之則非義而變也然則大夫之義而正者如之何曰死衆而巳存異鄭氏康成曰變當爲辨聲之誤也辨猶正也君衞社稷臣衞君宗廟孔疏人臣義則進不義則退不可致死於已之宗廟故知爲君之宗廟案用其詐怒與貪則背公死黨之行成若欒盈之入曲沃衆願爲孺子死魚石之入彭城至於君臣日戰彼視大夫之死宗廟與君之死社稷同皆以為義爲之而不知其非也故特以變名之見此爲敗常亂禮之極也禮達分定則人皆知此之爲變而死於公不死於私矣鄭氏改讀非是又案自故政者至此言政之必本於天以申前先王承天之道以禮正之之意故聖人耐以天下爲一家以中國爲一人者非意之也必知其情辟於其義明於其利達於其患然後能爲之耐能同辟婢亦反正義鄭氏康成曰耐古能字傳書世異古字時有存者則亦有今誤矣孔疏古能字皆作耐堪其事謂之耐後來能字乃假借鼈三足爲能是世異也此與樂記人不耐無樂是古字時有存若劉向説苑能字皆爲而是又有今誤也意心所無慮也孔疏謂於無形處用心思慮無慮即慮無也辟開也孔氏頴達曰言聖人所以能和合天下爲一家中國爲一人者非是以意測度謀慮必知民之情也情即下七情開辟其義以敎之顯明利事以安之曉達禍患而預防之然後能使天下中國皆感義懐徳而歸之也馬氏睎孟曰言天下則兼乎四海也言中國則異乎夷狄也聖人之治略逺而詳近如一家言其俗不殊若父子之親上下有以相使如一人言其道之同若手足之用左右有以相衞風俗雖異而趨向則一貴賤雖殊而趨善則同非順性命之理而明利達患孰能爲之潘氏植曰衆人徇私而自蔽則雖父子猶有豺狼焉兄弟猶有參商焉聖人深探本源萬物一體是謂踐形由是樂民之樂民亦樂其樂憂民之憂民亦憂其憂不以一已外天下而以一體視天下此天下所以一家中國所以一人也徐氏師曾曰天下非一家而能以爲一家若家人父子然中國非一人而能以爲一人如腹心手足然此豈私意臆度所能爲哉蓋天下中國之離合繫乎人情故必先知其情何謂人情喜怒哀懼愛惡欲七者弗學而能何謂人義父慈子孝兄良弟弟夫義婦聽長恵幼順君仁臣忠十者謂之人義講信脩睦謂之人利爭奪相殺謂之人患故聖人之所以治人七情脩十義講信脩睦尚慈讓去爭奪舍禮何以治之惡烏路反下同弟弟下音悌長竹丈反去舍並上聲治平聲正義鄭氏康成曰極言人事見惟禮可耳熊氏安生曰禮即三千三百因人情而爲之節文者孔氏頴達曰此申釋上文十義從親者爲始以漸至疎故長幼在後君臣處末七情不定故云治十義是事故云脩信是深隱故湏講睦恐乖離故云脩陳氏祥道曰喜愛欲者陽之情怒哀懼惡者陰之情皆出於天然者父慈子孝兄良弟悌夫義婦聽閨門之義長恵幼順鄉黨之義君仁臣忠朝廷之義皆出於人爲者信則無所欺罔睦則有所顧省皆足以和義故謂之人利爭而後相奪奪而後相殺皆足以召禍故謂之人患蔣氏君實曰人生而靜天之性也感物而動情遂形焉方其動與義俱天理自見及乎人欲日長貪嗜無厭淫湎無恥而爭奪之患作矣然人豈本有是患哉情我固有也義亦我固有也本義以制情斯因義以成利惟舍義而求利乃因利而生患君子論人道之大揭此情此義於利害間而敎以制情立義興利去患納天下於相安相養之域則自禮之外無餘説也朱氏申曰情惡其亂故言治義恐其壊故言脩通論孔氏頴達曰左傳云天有六氣在人爲六情喜怒哀樂好惡六氣陰陽風雨晦明喜生於風怒生於雨哀生於晦樂生於明好生於陽惡生於陰此欲則樂愛則好也增懼爲七案愛與欲微有别愛因物生欲自我出愛泛悦之欲則求必得之也飲食男女人之大欲存焉死亡貧苦人之大惡存焉故欲惡者心之大端也人藏其心不可測度也美惡皆在其心不見其色也欲一以窮之舍禮何以哉度大洛反見賢遍反舍音捨正義鄭氏康成曰言人情之難知明禮爲重孔氏頴達曰端謂端緒言人深心厚貌内外乖違包藏欲惡之心不可測知故外邉不見其色人君欲専一窮盡人美惡之情若舍去其禮更將何事以知之蓋有事於心貎形於外七情美善十義流行則舉動無不合禮若七情違辟十義虧損則動作皆失其法故觀其貌知其心也馬氏睎孟曰莫非欲也而飲食男女爲甚莫非惡也而死亡貧苦爲甚喜怒哀懼愛惡欲皆情而情不外欲惡故曰心之大端朱氏申曰心有所欲然後有喜愛心有所惡然後有怒哀懼欲惡得其正則美失其正則惡董氏應暘曰窮之者不惟知其欲惡必知其欲惡之善惡窮其情乃知其情知其情乃能治其情通論蔣氏君實曰人各有心自命於天而謂之性感於物而謂之情制於理而謂之義因其所適而後利害之名立焉原其治人之要必先正其欲惡之大端致力於危微之際飲食我所欲也觴酒豆肉讓而受惡男女我所欲也無媒不交無幣不見死亡貧苦我所惡也而國君死社稷大夫死衆君子仕而不稼田而不漁凡以使内之所存不爲外之所奪一隱顯而見定形也然後此心不離而可孚於天下矣案自故聖人至此言知人情必以禮窮之以申前先王治人之情天下國家可得而正之意欽定禮記義疏卷三十一
