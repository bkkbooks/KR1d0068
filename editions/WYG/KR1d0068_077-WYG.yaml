body:
  text: 喪服四制第四十九正義孔氏穎達曰案鄭目録云名曰喪服四制者以其記喪服之制取於仁義禮智也此於别録舊説屬喪服但以上諸篇皆記儀禮當篇之義故毎篇言義此則記者别記喪服之四制非記儀禮喪服之篇故不云喪服之義也案此篇小戴本所無今按其文取之大戴本命篇者大半而因殺以為節上與家語同必後人掇兩書以已意附益首尾以成此篇故不與三年問相次而附之小戴之末鄭因存之也凡禮之大體體天地法四時則隂陽順人情故謂之禮訾之者是不知禮之所由生也訾音紫正義鄭氏康成曰禮之言體也故謂之禮言本有法則而生也口毁曰訾孔氏穎達曰體天地天地所生之物皆以禮定之法四時變而從時也則隂陽吉凶異道也順人情下四制是也馬氏晞孟曰天地者禮之本也隂陽者禮之端也四時者禮之柄也人情者禮之道也胡氏銓曰一體不備不足謂之成人一物不體不足謂之成禮體者何也禮也非禮體不足以為大非聖人不足以知禮之大故訾之者為不知禮陳氏澔曰體天地以定尊卑法四時以為往來則隂陽以殊吉凶順人情以為隆殺先王制禮皆本於此不獨喪禮為然故曰凡禮之大體案節文禮也即心之體也體天地體字即易體仁中庸體物之體字言與為體而無二也此禮具乎心本乎天殽乎地皆是物也是之謂體夫禮吉凶異道不得相干取之隂陽也正義鄭氏康成曰吉禮凶禮異道謂衣服容貎及器物也孔氏穎達曰天地包四時隂陽人情無物不總故不覆説體天地之事吕氏大臨曰禮之有吉凶猶天之有隂陽可異而不可相干也案取之隂陽者謂取則其義也人生則陽明故從吉死則隂暗故從凶喪有四制變而從宜取之四時也有㤙有理有節有權取之人情也恩者仁也理者義也節者禮也權者知也仁義禮知人道具矣知音智正義鄭氏康成曰取之四時謂其數也取之人情謂其制也孔氏穎達曰變而從宜者言門内言恩若於門外則變而行義尊卑有定禮制有恒以節為限或有事故不能備禮則變而行權是皆從宜取之人情也恩屬於仁理屬於義節屬於禮量事權宜非知不可人道具矣此總結四制之義吕氏大臨曰禮有恩有理有節有權猶天之有四時可變而不可執一也仁義禮知人道具矣人道具則天道具其實一也馬氏曰恩理所以厚其死節權所以存其生厚其死故為父斬衰三年為君亦斬衰三年存其生者故曰毁不滅性不以死傷生也通論胡氏銓曰言仁義禮知而不及信者仁義禮知非信不立既言人道具則信在其中可知矣呉氏澄曰禮之大體體天地者總其綱下三者分其目隂陽之氣四時之序即天地也人生天地閒其情與天地之情通故天地足以該人情吉凶軍賓嘉五禮之内各備隂陽案權何以曰知凡權度銖兩由此心之眀覺精切不差也故曰知其恩厚者其服重故為父斬衰三年以恩制者也為于偽反衰七回反正義鄭氏康成曰服莫重斬衰也孔氏穎達曰此眀恩制也父恩最深故特舉父言之其實門内諸親之服皆恩制也門内之治恩揜義門外之治義斷恩資於事父以事君而敬同貴貴尊尊義之大者也故為君亦斬衰三年以義制者也治直吏反斷丁亂反正義鄭氏康成曰資猶操也貴貴謂為大夫君也孔疏大夫之臣事大夫為君大夫尊貴臣能盡敬尊尊謂為天子諸侯也孔疏天子諸侯之臣事天子諸侯為君同為南面臣能極敬孔氏穎達曰此眀義制也門内之親故得行私恩揜公義若三年之喪君不呼其門是也門外謂朝廷之間公朝當以公義絶私恩若金革之事無辟是也操事父之道以事君則敬君與父同以義斷恩門外如一雖復大夫與王侯有異而其臣敬不殊故並云義之大者故為君亦斬衰三年同於父也案儀禮義服五服皆有之此特言其重者也三日而食三月而沐期而練毁不滅性不以死傷生也喪不過三年苴衰不補墳墓不培祥之日鼔素琴告民有終也以節制者也資於事父以事母而愛同天無二日土無二王國無二君家無二尊以一治之也故父在為母齊衰期者見無二尊也期音基苴七餘反為于偽反齊音咨見賢遍反大戴不培作不坿下有下同丘陵四字正義鄭氏康成曰食食粥也沐謂將虞祭時也孔疏士虞禮沐而不櫛雜記曰非虞祔練祥無沐浴補培猶治也鼓素琴始存樂也孔疏始存省此樂若縣而作在既禫之後三年不為樂樂必崩孔氏穎達曰此眀節制也不補者苴麻之衰雖破不補也不培者一成丘陵之後不培益其土也大祥日得鼔素琴所以為此上事者教其民使哀有終極也以節制者以情實未已仍以禮節為限制抑其情也自此以上皆節制之事自此以下更眀節制欲尊歸於一無二事之理言父母恩愛雖同而服乃有異以不敢二尊故也故下總結無二尊之理吕氏大臨曰創鉅者其日久痛甚者其愈遲遂其無窮之情則情之過者不至滅性不止而情之不及者不知所勉矣故三日而殯未殯不食既殯食粥朝暮皆一溢米三月而𦵏未𦵏不沐既𦵏將虞然後沐浴期而小祥既小祥然後練冠練衣盖毁不可以久久則滅性以死傷生不得申其孝矣恩雖重也嵗月之久則不可不除故喪不過三年苴麻之衰以為至痛飾非求乎完且久故服雖敝而不補𦵏之言藏封之以識非求乎高大而終不夷故墳墓不培哀雖甚也已過則不可不樂故既祥而後樂者示哀亦不可以無終此所以為之節也賈氏公彦曰子為母屈而期心喪猶三年故父雖為妻期而除然必三年乃娶者達子心喪之志也程子曰古之父在為母服期今則皆為三年之喪皆為三年喪則家有二尊矣可無嫌乎䖏今之宜服齊衰一年外以墨縗終月算可以存古之禮全今之制通論吕氏大臨曰檀弓曰祥而縞是月禫徙月樂又曰孔子既祥五日弹琴而不成聲十日而成笙歌又曰魯人有朝祥而暮歌者子路笑之子曰又多乎哉踰月則善矣又孟獻子禫縣而不樂夫子曰獻子加於人一等矣由此觀之既禫徙月然後可樂孔子亦未以朝祥暮歌為非而既祥五日弹琴乃躬行之何也盖祥者吉也自練至於祥漸而即吉則人既祥可樂矣然又至於禫之徙月為樂不忍遽也此云祥之日鼓素琴或未然又曰父子之道天之合也其愛不可觧於心此以恩制者也君臣之道人之合也義則從不義則去此以義制者也情之至者遂之則無窮也至於無窮則賢者過之不肖者不可繼道所以不行此不可不以節制者也遂其所不得申則無等差施之於所不必用則事無實責之於所不能具則力不給必之於所不能行則人告病此不可不以權制者也故恩莫大於父服莫重於斬衰極其恩而制其服也極天下之愛莫愛於父極天下之敬莫敬於君愛敬生乎心與生俱生者故門内以親為重故為父斬衰親親之至也門外以君為重故為君亦斬衰尊尊之至也内外尊親其義一也案父在為母期庾氏皇氏熊氏俱以為屬下經權制獨鄭氏於期下總注三日而食三月而沐之事是為母期之文乃在節制之中攷古本及大戴本則資於事父以事母半莭本在三日而食上與資於事父以事君接遞而下而後錯簡耳故雖從今本而以鄭説為正杖者何也爵也三日授子杖五日授大夫杖七日授士杖或曰擔主或曰輔病婦人童子不杖不能病也百官備百物具不言而事行者扶而起言而后事行者杖而起身自執事而后行者面垢而已秃者不髽傴者不􅃝跛者不踊老病不止酒肉凡此八者以權制者也擔是艶反秃吐木反髽側瓜反傴紆主反跛彼我反大戴無起四十字此八者作凡此正義鄭氏康成曰五日七日授杖謂為君喪也扶而起謂天子諸侯也杖而起謂大夫士也面垢而已謂庶民也髽婦人也男子免而婦人髽髽或為免孔氏穎達曰此眀權制也權制之中所以先眀杖者以下有不應杖而杖又有應杖而不杖皆是權宜故先舉正杖於上杖之所設本為扶病而以爵者有徳其恩必深其病必重故杖為爵者設也三日五日七日厯叙其爵之人也喪服𫝊云杖者何爵也無爵而杖者何擔主也非主而杖者何輔病也鄭註擔假也尊其為主假之以杖庶子以下雖非適子皆杖為其輔病故也婦人未成人之婦人童子㓜男所以不杖為其不能病也不言而事行者謂王侯也喪具觸事委任百官不假自言而事得行故許子病深雖有扶病之杖亦不能起又須人扶乃起也言而後事行者謂大夫士既無百官百物須已言而後喪事行故不許極病所以杖而起不用扶也身自執事者謂庶人也卑無人可使但身自執事不可許病故有杖不得用但使面有塵垢之容而已子於父母貴賤情同而病不得一故為權制髽是婦人大紒重喪辮麻繞髮秃者無髮故不髽女秃不髽故男子秃亦不免􅃝者露膊傴者可憎故不露跛人脚蹇故不踊老病身已羸瘠又使備禮或致滅性非制所許故酒肉養之此八條不可以强逼故聖人權宜制也所謂八者謂應杖不杖不應杖而杖一也扶而起二也杖而起三也面垢四也秃者五也傴者六也跛者七也老病者八也又曰案喪大記大夫與士之喪皆云三日授子杖同主為其親也今云五日七日故知為君也通論吕氏大臨曰喪之有杖所以輔病也孝子毁瘠之至非杖不能起後世因之以為節文親喪則親者杖君喪則有爵者杖童子當室則杖皆以其主喪而有杖故曰擔主也國君之喪三日子夫人杖五日大夫世婦杖大夫之喪既殯主人主婦室老皆杖士之喪三日之朝主人杖婦人皆杖則婦人有杖矣此云婦人不杖者先儒云謂皆以㓜不能病故不杖其義然也又曰先王制禮其本致一而不可二也婦人已嫁為夫斬為其父齊衰其致一於夫雖父不得而抗也親莫隆於父母父在為母齊衰期其致一於父雖母不得而抗也故愛有差等仁義所以並行而禮所由立致於一也方氏慤曰伊耆氏言軍旅有爵者杖則不特喪事為然凡以優貴者也三日五日七日則以爵之貴賤而為授杖早晚之節凡此皆非禮之經故曰以權制案人子執親之喪也以身致之其得自致者為正不得致者為權若杖則所以安此身也衰病者用之惟天子諸侯大夫士居父母喪知義理則能病官備事具則可病病必有以扶之故以杖為正若婦人弱童子㓜皆不能病者也庶人身執事面垢而已又不可病者也則又以不杖為正以杖為權也庶人不杖而長子為主以接賓者勞則使擔之不止有爵矣權制一也庶子不杖而同此父母詎不能哀則雖不以杖即位而病則輔之幷不止擔主矣權制二也婦人不杖而有不為主而杖者姑在為夫為長子亦以輔病故此權制三也童子不杖而有杖者男子當室則杖女子子在室其主喪者不杖則子一人杖亦以擔主故此權制四也或曰二語上對大夫士則擔主輔病各一下對婦人童子其擔主輔病又各一而四耳百官以下申上爵者杖而庶人不杖之意不通考諸禮而觀其義則孰為正孰為權總不眀存疑庾氏蔚之曰父存為母一也不數杖與不杖之例吕氏大臨曰八者父在為母期一也婦人童子不杖二也杖而起三也面垢四也庾氏數為母而不數扶而起及童子不杖非案庾吕皆承今本以為母屬下節之誤而以杖而起為一與以扶而起為一誤正同始死三日不怠三月不解期悲哀三年憂恩之殺也聖人因殺以制節解佳買反期音基殺色戒反正義鄭氏康成曰不怠哭不絶聲也不解不解衣而居不倦怠也孔氏穎達曰此覆眀節制之事不怠謂哭不休息期悲哀者謂期閒朝夕恆哭三年憂謂不復朝夕哭但憂戚而已恩之殺者自初以降恩漸減殺也聖人因孝子情有減殺制為限節吕氏大臨曰始死哭不絶聲水漿不入口者三日此三日不怠也未𦵏哭無時居倚廬寢不説絰帶此三月不解者也既虞卒哭惟朝夕哭此朞悲哀者也既練不朝夕哭哭無時謂哀至則哭此三年憂也君子之居喪期合乎中者也聖人因隆殺而制其禮所謂品節斯斯之謂禮此喪之所以三年賢者不得過不肖者不得不及此喪之中庸也王者之所常行也書曰髙宗諒闇三年不言善之也王者莫不行此禮何以獨善之也曰高宗者武丁武丁者殷之賢王也繼世即位而慈良於喪當此之時殷衰而復興禮廢而復起故善之善之故載之書中而高之故謂之高宗三年之喪君不言書云高宗諒闇三年不言此之謂也然而曰言不文者謂臣下也復扶又反正義鄭氏康成曰言不文者謂喪事辨不所當共也孝經説言不文者指士民也孔氏穎逹曰三年之喪君不言是記者引古禮吕氏大臨曰禮者所以敎民之中故三年之喪賢者不得過不肖者不敢不勉也三年之喪自天子達於庶人古之道也書稱高宗諒闇者先王之禮廢王者有不能行之者高宗以善喪聞為廢禮所由興故善之也不言而事行者此人君之喪禮故高宗三年不言也言而後事行者杖而起故言不文此士大夫之喪禮也朱子曰諒闇天子居喪之名存疑孔氏安國曰諒闇讀為諒隂諒信也陰黙也鄭氏康成曰諒古作梁􅎝謂之梁闇讀如鶉䳺之䳺闇謂廬也廬謂有梁者所謂柱􅎝也孔氏穎達曰古之王者既虞後施梁而柱􅎝禮斬衰之喪唯而不對齊衰之喪對而不言大功之喪言而不議緦小功之喪議而不及樂正義鄭氏康成曰此謂與賓客也唯而不對相者為之應耳言謂先發口也孔氏穎達曰唯而不對但稱唯而已不對其所問之事相者為之對不旁及也對而不言但對其所問之事不餘言也言而不議但言説他事不與人議論相問答也議而不及樂得議他事但不能聽及於樂也吕氏大臨曰此不言謂輿賓客接若治喪之事則亦言而後行事也對而不言應之而不倡也言而不議無徃反酬問也議而不及樂有徃反酬問而不及樂事也此因論三年不言與言不文而及之父母之喪衰冠繩纓菅屨三日而食粥三月而沐期十三月而練冠三年而祥衰七雷反菅音姦期音基正義吕氏大臨曰父母之喪其大變有三始死至於三月一也十三月而練二也三年而祥三也比終茲三節者仁者可以觀其愛焉知者可以觀其理焉强者可以觀其志焉禮以治之義以正之孝子弟弟貞婦皆可得而察焉比必利反知音智上弟音悌正義鄭氏康成曰仁有恩者也理義也察猶知也孔氏穎達曰此覆結言居喪之徳三節者初喪至沐一也十三月練二也三年祥三也仁者居喪可以觀其思慕愛親不思慕愛親非仁也知者居喪則合於道理不合於道理非知也强者居喪則能守其志節若無志節非强也因禮以治喪事用義以正喪禮則孝子弟弟貞婦也吕氏大臨曰人子莫不執喪也善於此者難莫不善其始也善於終者難故終茲三節以善喪稱則孝子弟弟貞婦可得而知也惻怛痛疾悲哀志懣非仁者之篤於愛則不能也然哭踊無節喪期無數服不别精粗位不别賓主乃野人夷狄直情徑行者其知不足道也哀之發於容體發於聲音發於言語飲食居處衣服輕重有等變除有等至於襲含歛殯之具賓客弔哭之文無所不中於禮非知者之眀於禮則不能也然有其文矣實不足以稱之有其始矣力不足以終之其强不足道也喪事不敢不勉此有志者之所能也故古之善觀人者察其言動之所趨而知其情驗其行事之所及而知其徳親喪者人之所自致者也哭死而哀非為生者則其仁可知矣生事之以禮死𦵏之以禮祭之以禮則其知可知矣先王制禮不敢不及則其强可知矣故君子觀人常於此而得之欽定禮記義疏卷七十七
