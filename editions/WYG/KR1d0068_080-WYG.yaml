body:
  text: 案易曰鼎象也考工記曰六分其金而錫居一謂之鐘鼎之齊是鼎之器於象為備鼎之齊於金為多下有足上有耳有幂以覆之有鉉以舉之有扃以貫之詩稱鼐鼎及鼒爾雅曰鼎絶大者謂之鼐圜弇上者謂之鼒附耳外謂之釴款足謂之鬲士虞禮有上鼎中鼎下鼎有司徹司馬舉羊鼎司士舉豕鼎魚鼎則鼎之體有大小侈肆之别而其用有牛羊豕魚之異天子諸侯有牛鼎大夫有羊鼎士豕鼎魚鼎而已上得兼下下不得兼上則鼐鼎特王有之也聘禮飱饔之鼎陳鼎也王日一舉之鼎食鼎也少牢特牲之鼎庸禮也喪禮既夕之鼎斯湏禮也舊圖天子之鼎飾以黄金諸侯飾以白金容一斛大夫羊鼎飾以銅容五斗士豕鼎飾以鐵容三斗而牛羊豕鼎各狀其首於足上若然魚鼎腊鼎豈皆狀以魚腊乎所謂飾以金與銅鐵而容一斛與五斗三斗者蓋以後世之鼎言之耳士喪禮虞禮特牲禮陳鼎有西面北面東面之文則鼎固有其面而其詳不可考矣案鉶鼎所以實羮鉶羮所以具五味其芼則牛以藿羊以苦豕以薇也其具則膷者牛臐者羊膮者豕也自羮言之曰鉶羮自器言之曰鉶鼎以其在正鼎後曰陪鼎以其入庶羞内曰羞鼎其實一也案郊特牲割刀之用鸞刀之貴貴其義也聲和而後斷也詩曰執其鸞刀以啓其毛說文曰鸞鳴中五音孔疏曰鸞即鈴也謂刀環有鈴其聲中節也毛氏曰鸞刀刀有鸞者割中節也何休曰宗廟割切之刀環有和鋒有鸞夫和非斷則牽斷非和則劌先王以義制物而以仁和之此貴鸞刀之意也案禮記明堂位曰俎有虞氏以梡夏后氏以嶡商以椇周以房俎少牢禮言俎距此横距也詩言大房傳言房烝此房俎也舊圖謂髙二尺四寸廣尺二寸不可詳已陳氏祥道曰斷木為梡横距為嶡椇之木多橈房之制有户閾虞氏之俎斷木為四足而已夏俎加横距焉商有横距而曲其足若椇然周又設下跗於兩端若房然是商之横距與夏同而曲其足與三代異周之下跗與三代異而直其足則與虞夏同也夫鼎俎之數用竒而有司徹有六俎者蓋尸侑主人主婦各一俎司馬羞羊湇司士羞豕湇各一俎俎列而陳之則用竒散而用之雖偶可也案明堂位曰夏后氏以龍勺殷以疏勺周以蒲勺鄭注龍龍頭也疏疏通刻其頭蒲合蒲如鳬頭也孔疏龍勺刻勺為龍疏勺謂刻鏤通刻勺頭蒲謂當刻勺為鳬頭其口微開如蒲草本合而末微開也陳氏祥道曰龍水畜也疏水道也蒲水物也勺所以㪺齊酒明水故其飾如此今止圖龍勺而疏勺蒲勺可類推矣案周禮籩人掌四籩之實朝事之籩饋食之籩加籩之實羞籩之實凡祭事共其籩喪事及賔客之實共其薦籩羞籩儀禮士冠禮再醮兩籩栗脯鄉射禮大夫與則公士為賔薦脯用籩禮記郊特牲鼎俎竒而籩豆偶隂陽之義也籩豆之實水土之品也明堂位夫人薦籩豆聶氏崇義云籩以竹為之口有縢縁形制如豆受四升盛棗栗桃梅菱芡脯脩膴鮑糗餌之屬有巾𤣥被纁裏圜一幅案士喪禮籩無縢則士大夫吉事之籩有縢可知矣明堂位魯用雕篹篹籩屬也惟魯得用雕篹則士大夫之籩無雕可知矣案周禮醢人掌四豆之實朝事之豆饋食之豆加豆之實羞豆之實凡祭祀共薦羞之豆實賔客喪紀亦如之儀禮聘禮堂上八豆西夾六豆公食大夫六豆上大夫兩豆士昏四豆士喪毼豆兩既夕四豆士虞四豆特牲兩豆少牢四豆有司徹四豆禮記明堂位夏后以楬豆殷玉豆周以獻豆鄭注云楬無異物之飾也獻疏刻之也聶氏崇義云豆以木為之受四升口圓徑尺二寸有蓋盛昌本脾析豚拍之虀醓蠃兔雁之醢韭菁芹筍之菹麋臡鹿臡之屬案鄭氏康成請豆宜濡物籩宜乾物此豆之用所以異於籩也案聶氏崇義曰内方外圓曰簋外方内圓曰簠皆足髙二寸漆赤中天子飾以玉諸侯飾以象簠受一斗二升口圓徑六寸深七寸底徑五寸二分厚八分足底徑六寸厚半寸脣寸挫其四角考工旊人為簋受一斗二升簋髙一尺厚半寸脣寸口徑五寸二分深七寸二分底徑五寸二分厚八分足底徑六寸鄭注有蓋用龜陳氏祥道曰管仲鏤簋禮以為僣則大夫士刻龜於蓋而已人君則全飾之簠盛稻粱簋盛黍稷朱子圖曰銅簠并蓋重一十三斤二兩通蓋髙七寸深二寸闊八寸一分腹徑長一尺一寸簋并蓋重九斤通蓋髙六寸七分深二寸八分闊五寸腹徑長七寸九分闊五寸六分范氏禮料圖及通祀輯畧續集同案儀禮士昏禮黍稷四敦皆蓋婦至賛啓㑹郤于敦南對敦于北少牢主婦執一金敦黍有蓋士喪禮用瓦敦有蓋既夕用器兩敦士虞盛兩敦陳于西堂鄭氏注云敦有首者尊器飾也飾象龜形以經云敦皆南首明象蟲獸之形也龜有上下甲故知敦蓋象之取其類也又案諸圖敦所容受與簠簋並同但上下内外皆圓為異耳士喪禮又有廢敦蓋敦之無足者或曰去而不用為廢案郊特牲云器用陶匏以象天地之性也孔疏祭天無圭瓉酌鬱之禮唯酌用匏爵而已聶氏崇義曰匏制徧檢三禮注疏諸家唯言破匏用匏片為爵不見有漆飾之文蓋陶匏是太古之器非人功所為故貴全素自然以象天地之性士昏禮合卺謂破匏為之即此匏爵破為二片而已案禮記明堂位灌尊夏后氏以雞彝殷以斝周以黄目聶氏崇義曰雞彝受三斗宗廟器盛明水彝者法也言與諸尊為法也雞彝者後鄭云刻而畫之為雞形著於尊上斝彝盛明水先鄭讀斝為稼謂畫禾稼於尊其彝亦以禾稼為飾也黄彝盛鬱鬯後鄭云黄彝謂黄目以黄金為目也禮記郊特牲曰黄目鬱氣之上尊也黄者中也目者氣之清明者也言酌於中而清明於外也案舊圖云刻木為之又云於雞腹下别作鐵脚距立在方板為别若然則斝彝黄彝二器之上又何特畫禾稼眼目以飾尊乎非典實矣又案陳氏祥道曰雞彝取諸物也斝耳黄目取諸身也至其或刻或畫不可得而知矣案禮記明堂位泰有虞氏之尊也山罍夏后氏之尊也著殷尊也犧象周尊也周禮司尊彝春祠夏禴其朝踐用兩獻尊其再獻用兩象尊秋嘗冬烝其朝獻用兩著尊其饋獻用兩壺尊追享朝享其朝踐用兩泰尊其再獻用兩山尊聶氏崇義曰注太尊太古之瓦尊也口圓徑一尺脰髙三寸中横徑九寸脰下大橫徑一尺二寸底徑八寸腹上下空徑一尺五分厚半寸脣寸底平厚寸受五斗山罍受五斗山尊也刻而畫之為山雲之形口圓徑九寸腹髙三寸中橫徑八寸脰下大橫徑尺二寸底徑八寸腹上下空徑一尺五分足髙二寸下徑九寸壺尊以壺為尊也受五斗口圓徑八寸中徑六寸半脰下橫徑八寸腹下橫徑一尺一寸底徑八寸足髙五寸著尊受五斗著地無足亦無飾口圓徑一尺二寸底徑八寸上下空徑一尺五分犧周禮作獻詩頌毛傳謂犧尊有莎飾阮氏則謂犧尊飾以牛諸侯飾口以象骨天子飾以玉其圖之制亦於尊上畫牛為飾今從阮氏象尊後鄭云以象骨飾尊阮氏則云以畫象飾尊今亦從阮氏又案王肅謂犧象二尊並全刻牛象之形鑿背為尊今皆不取陳氏祥道曰虞氏尚陶故泰尊瓦則山罍亦瓦矣商人尚梓故著尊木則犧象亦木矣周禮以犧為獻犧者尊之飾獻者尊之用也先儒讀犧為莎臆說也王肅謂魯郡地中得犧尊以犧牛為尊則象尊為象形耶此又不可考也案明堂位爵夏后氏以琖孔疏琖夏爵名以玉飾之陳氏祥道曰爾雅鍾之小者謂之琖晉太興中剡縣民井中得鍾長三寸口徑四寸銘曰棧則棧卑而淺矣夏爵命之以琖盖其制若棧然也案朱子圖爵上作兩柱者趙氏謙聲音文字通所謂象爵頭兩柱連柄尾之形也許氏慎說文爵作趙所謂兩柱連柄尾者以言三足者楊氏桓六書統爵字作三足據𨽻書爵首從爪爪三足之象說文所說凡爪之屬從爪也兩柱之前為流如圭瓉龍口在前以其出酒故謂之流􅵀即柄宣和博古圖所謂其後為尾執者為􅵀也朱子圖前有流後有尾圖說不言尾省文中作篆鄂蓋本士虞禮繶爵注口足閒篆飾之義􅵀上有首當象爵為之宣和博古圖以為牛首與爵字義不合陸氏禮象似朱子而無篆其素爵與士虞禮廢爵無足當與素爵並無篆也又案聶氏謂漢書律厯志說斛之制口足皆圓有兩耳而其状似爵今見祭器内有刻木為雀形腹下别以鐵作脚距立在方板者失之是聶氏亦主圓其體也乃聶氏之圖仍作爵形鐵距立方板上者不亦自背其說耶案禮器云賤者獻以散卑者舉角聶氏載舊圖云散形似觚角制如散注云四升曰角口徑五寸中深五寸四分底徑三寸五升曰散口徑六寸中深五寸一分底徑四寸是角與散之形状同而所容之大小别矣孔疏云角觸也不能自適觸罪過也散訕也飲不自節為人謗訕也是又古人示戒之義也明堂位又有璧散璧角則魯之散角其以玉為之者與鄭氏鬯人注云散尊無飾惟明堂位璧散璧角以璧飾其口耳案聶氏崇義曰口徑五寸中深四寸强底徑三寸受三升陳氏祥道曰明堂位加以璧散璧角則天子自觶而上用玉燕禮大射以象觚則諸侯用象大夫飾以角士木而已案禮器云五獻之尊門外缶門内壺鄭注缶大小未聞孔疏缶尊名列尊之法缶盛酒在門外禮有以小為貴者近者小則逺者大缶在門外則大於壺矣又易曰鼓缶而歌詩又曰坎其擊缶則缶亦可鼓可擊之具與案禮器五獻之尊君尊瓦甒鄭注瓦甒五斗孔疏君尊子男尊也子男用瓦甒為尊郊特牲疏云祭天用瓦大瓦甒盛五齊聶氏載舊圖云醴甒以瓦為之脰中横徑宜八寸腹横徑一尺二底徑六寸自脰下至股横徑四寸自腹徑至底徑深八寸乃容五斗之數有蓋案牟巵槃匜諸器俱見於内則鄭注牟讀曰堥黍稷器也巵匜酒漿器槃承盥水者孔疏堥土釜也今以木為之象土釜之形巵酒器也匜水漿之器案棜禁與豐皆承尊之器禁有足棜無足似豐亦應無足然下有柄且髙視禁足三寸不翅倍之則為酒戒又甚矣故冠昏飲射尊皆設禁是祭祀無禁而禮飲有禁也燕禮之尊獨設豐是私燕易縱故戒又甚於諸飲也至公食大夫及鄉射大射則并以豐承觶者蓋食禮以觶飲射承罰故特戒之鄭注謂豐似豆而卑聶氏圖謂豐如爵坫則朱子釋奠圖作盤式者後世制也投壺罰爵注以為設豐盖以射禮準之耳但射禮於西階上設豐以中在堂下也投壺當在中之北以中與算及馬在西階上也案造車始於輿廣狹大小因之輿人所以得名也其等威有數其吉凶有殊其男女有别其文武有辨制詳考工記圖案兵車與乗車其制略同所異者車中人之所在有别耳盖凡乗車之禮君處左車右處右僕處中惟兵車則馭者在左戎右在右將帥居中春秋𫝊所叙諸戰将帥車右僕御可考也然此乃将帥所乗則然若士卒所乗則左人持弓右人持矛而御者在中故書戒左不攻于左右不攻于右又曰御非其馬之正則御在中可知也陳氏祥道曰御無定位右有常處故将帥車則御在左士卒車則御居中至右人持矛則雖将帥士卒之車不同而所居常在右所職常持矛也旗建車後見朱子詩𫝊車前竪二干所謂龍盾之合也周官司兵建車之五兵為戈殳㦸酋矛夷矛夷矛長三㝷故在前酋矛次之㦸次之殳次之戈又次之舊圖五兵皆載車左以保介在右準之則當在車右案陳氏祥道曰幦幂也以覆齋車車笭如幂也若席然諸侯覲王虎淺幦案韓奕詩鞹鞃淺幭虎幦也虎淺毛故曰淺然孔疏又謂詩𫝊或據以虎皮飾幦故謂之淺幭此不可考此羔幦說也其齋則羔幦虎縁大夫士鹿幦豹犆亦可以此準之又巾車王喪車五幎皆有飾大夫素篾士喪禮主人惡車白狗幦言幦不言縁則無縁也案聶氏崇義曰旌旗之杠皆注旄與羽於竿首故夏采注以旄牛尾綴於橦上阮氏梁正等圖旗首為金龍頭唐志云金龍頭銜結綬及鈴則古注旄及羽之遺制與案爾雅素錦綢杠等制下龍旗案詳之大常當不異也又覲禮云天子乘龍載大旂鄭注大旂大常也王建大常縿首畫日月其下及旒畫升龍降龍賈疏日月為常交龍為旂是旂與常别也但九旗有定稱亦有通名故左傳三辰旂旗服氏注云九旂之總名故諸侯建之交龍為旂用九斿亦謂之常也惟天子大常十二斿為異耳大常畫日月又有交龍則諸侯交龍為旂無日月王之大常非直有日月兼有交龍也凡旌旗之杠皆注旄與羽於竿首其杠長九仞其斿曳地又案書曰厥有成績紀于大常司勲凡有功者銘書於王之大常大常不特以祀天凡拜日禮月祀方明禮四瀆禮山川秋治兵冬大閱皆載焉大常之用廣矣哉又案周禮典命自上公至士其車旗各如其命之數禮書謂上公建常九斿等是也據此則天子之旗皆十二斿餘則各如其命數故考工龍旂九斿及七斿六斿四斿注以諸侯言之疏以天子所建誤也今據郊特牲王之旂十二斿龍章而設日月則天子之旗不止九斿大常及大赤大白皆十二斿矣其青龍等四旗則如考工斿數以示諸侯以下之等云又案周禮司常云日月為常交龍為旂熊虎為旗鳥隼為旟龜蛇為旐考工記輈人云龍旂九斿鳥旟七斿熊虎六斿龜蛇四斿曲禮則云青龍白虎朱雀𤣥武孔疏即以輈人九斿七斿六斿四斿言之則三說本一耳故此下四圖合三說為一以此推之案覲禮侯載龍旂弧韣司常交龍為旂考工記龍旂九斿盖交畫升龍降龍一象其升朝一象其下復此侯所建也上公九斿侯伯則七斿子男則五斿上得兼下下不得僣上也爾雅云素錦綢杠纁帛縿素升龍於縿練旒九飾以組維以縷蓋揭旗以杠綢杠以錦正幅為縿屬縿為旒旒亦曰斾縿以纁則斿綪矣左傳所謂綪茷也升龍素則降龍青矣曲禮所謂左青龍也青陽也素隂也陽在上而降隂在下而升交泰之道也其斿之長短則諸侯齊軫天子則長如大常案西方白虎七宿為金金刑官主殺故守猛莫敢犯虎居其方以象之參伐六星上下故熊旗六斿其縿及竿飾則與旂同其斿之長短則所謂大夫齊較士齊肩也據巾車師都建旗大司馬則軍吏戴旗注以師都為鄉遂大夫疏以軍将至伍長皆軍吏則大夫士皆得用旗其齊較齊肩則異若天子建之則曳地諸侯則齊軫又案周禮熊虎為旗曲禮言虎不言熊考工言熊不言虎蓋曲禮専以居方者言考工専以極猛者言互文見義一而已與火鳯之不可混為鳥隼者别案爾雅錯革鳥曰旟郭氏璞注云以鳥皮置竿頭若禮記載鴻及鳴鳶與此不同禮書非之要之錯者雜鳥隼之謂陸氏佃以革為隼是也郭注誤又鄭康成以鳥隼為勇㨗以龜蛇為捍難辟害蓋在前者主勇往在後則貴其能守也又據陸氏以旟象南方七宿則火鳳耳其象鳥隼者從周禮說也案陸氏以旐象北方七宿斿四郭氏璞曰帛全幅長八尺又陸氏佃曰旐色黒以斿少故得用廣終幅若旗旟而上斿多充幅為之則縿不能容必削其幅乃稱據此則帛皆削惟旐全幅也案鄭注云畫招摇於旌旗上疏云張四旗於四方標招摇於中則招摇當在中軍中軍王之所在當建日月之常而旌在其首天子旗杠九仞故髙出四旗上也但於圖莫考故但存旌制而已案周禮司常析羽為旌又曰斿車載旌考工記鍾氏染羽以朱湛丹秫三月而熾之淳而漬之蓋染羽以為旌也旌注於旄而旄又注於干首故名干旌案大赤周之正色以周尚赤也司常注大赤無飾大白亦然斿數未聞司常孤卿建旜旜即大赤王之孤卿六命則當六斿若大白惟王建之亦十二斿餘如諸旗案疏以上三者為畫虎皮為皮貔貅則畫與皮無一定說禮書於上四者俱依疏說為圖貔貅則從疏載皮說蓋以虎皮準之也又案爾雅云錯革鳥曰旟郭璞謂合剥鳥皮毛置之竿首因以此為證陳氏禮書非之陸氏佃以革為隼所謂鳥隼之旟也但青旌等不聞有旟名當以鄭說為是案甲亦曰介亦曰函亦曰鎧甲言猶物之有甲介言猶物之有介函言所以周其身鎧言所以致其愷古者之甲惟以革為之後世加之以金耳考工記曰函人為甲犀甲七屬兕甲六屬合甲五屬犀甲夀百年兕甲壽二百年合甲夀三百年凡為甲必先為容然後制革權其上旅下旅而重若一賈疏上旅衣也下旅裳也屬者續也陳氏祥道曰甲之制腰以上為上旅腰以下為下旅革堅者札長故其屬少其次札短故其屬多也案孔氏穎達曰說文曰胄兠鍪也經言甲胄秦始有鎧兠鍪之名蓋古用革後以鐵為之陳氏祥道云魯人之胄綴以朱綫飾以貝文則古胄制蓋亦類此案㦸有三鋒刺則鋒之直前者也胡則正方中矩而下垂者也援則磬折而上達者也賈公彦曰必知三鋒胡向下者三鋒皆向上者無用也觀春秋傳言衛公㦸其肘史言㦸手罵之則援上嚮可知晉人以㦸鈎欒樂而殺之宋狂佼倒㦸而出鄭人于井則胡之下垂者也楚武王荆尸授師孑而先儒謂之㦸書一人執戣一人執瞿而先儒以為㦸則㦸之異名多矣案陳氏祥道曰胡曲而下垂者也援直而上達者也柲所以受胡者也或謂之雞鳴或謂之擁頸皆胡也案鄭注考工以矛為刺以其有刺圍也陳氏祥道曰廬人矛有刺圍則為刺兵說文曰矛象形則為勾兵蓋矛之為器上鋭而旁勾酋言其就夷言其易短者其體就長者其體易此矛之辨也詩曰二矛重英又曰二矛重喬毛氏曰重英矛有飾也喬矛矜鄭氏云矛有畫飾矜及室題縣羽毛又曰二矛重弓朱英綠縢則矛之飾以朱而矜室之間飾以羽毛矣兩說如此據舊圖圍刺俱有其制頗合其柄則注以為竹也案司馬氏遷謂揮作弓弓以木為身以角為面筋所以為深絲所以為固張則筋外而角内弛則角外而筋内弣把中也簫其端也隈其曲也茭其接也旁曰撻中曰蔽弓無縁者曰弭司之者周官有弓人此弓之大凡也韔弓衣也亦曰弢曰韣曰鞬古並以皮為之明器以緇布詩言虎韔則其皮用虎矣案周官司弓矢凡矢枉矢絜矢利火射用諸守城車戰殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射恒矢庳矢用諸散射注枉矢絜矢五分二在前三在後殺矢鍭矢三分一在前二在後茀矢矰矢七分三在前四在後恒矢庳矢八分四在前四在後强弓用重矢弱弓用輕矢所以盛矢者曰籠箙籠以竹為之箙以皮為之案陳氏祥道曰劍柄之名六後夾鼻莖鐔首也劍刃之名三臘脊鍔也所握者為夾在夾中者曰莖其旁鼻曰鐔帶所以貫鼻也夾下大者為後圜其上以接刃者為首兩刃為臘其中髙者為脊其末殺者為鍔亦謂之鋒鼻亦謂之彘字林又謂之珥博雅珥又謂之鐔又曰櫝劍匣也夫襓劍衣也案陳氏祥道曰櫝劍柙也夫襓劍衣凡藏玉與筮筴者曰櫝藏弓矢者曰韥而劍室亦謂之櫝以其有所容故也又謂之柙以其有所檢故也夫襓博雅作衭襓蓋進劍者左首而加於夫襓之上左首者尊其首也加於夫襓之上不敢䙝也欽定禮記義疏卷八十
