body:
  text: 大傳第十六正義孔氏穎達曰案鄭目錄云名曰大傳者以其記祖宗人親之大義此於别錄屬通論通論陳氏祥道曰禘者祭之大者也追王者孝之大者也名者人治之大者也人道者禮義之大者也是篇言人道者三則其所謂祭祀追王服術宗族之類莫非人道而已豈非傳之大者哉故命曰大傳吳氏澄曰儀禮經十七篇惟喪服一篇之經有傳此篇通用喪服傳之文而推廣之喪服傳逐章釋經如易之彖象傳此篇不釋經而汎説則如易之繫辭傳不釋經而統論大凡也人以繫辭傳為易大傳故此篇亦名大傳云禮不王不禘王者禘其祖之所自出以其祖配之諸侯及其大祖大夫士有大事省於其君干祫及其髙祖王如字又于况反下同禘徒細反下同大祖之大音泰正義鄭氏康成曰凡大祭曰禘自由也大祭其先祖所由生大祖諸侯受封君也王氏肅曰所自出虞夏出黄帝殷周出帝嚳也孔氏穎達曰此論王及諸侯大夫士祭祖先之義諸侯非王及祭大祖耳大夫士有勳勞大事為君所善者則君許其祫祭至於髙祖趙氏匡曰不王不禘明諸侯不得有也所自出謂所系之帝諸侯五廟惟大祖廟百世不遷及其大祖言及者逺祀之所及也不言禘者不王不禘無所疑也有省謂有功往見省記者也據此體勢相連皆説宗廟之事不得謂之祭天張子曰禘其祖之所自出始受姓者也以其祖配之以始祖配也所出之祖無廟於太祖之廟禘之而已萬物本乎天人本乎祖故以所出之祖配天地方氏慤曰禮不王不禘蓋徳愈隆而孝愈廣位愈尊而祭愈逺故也此禘也或謂之閒祀或謂之追享或謂之大祭何也以其非四時之常祀故謂之閒祀及祖之所自出故謂之追享比常祭為特大故謂之大祭名雖不同至於所及為適當焉則一而已此所以通謂之禘也諸侯及其大祖即王制所謂二昭二穆與大祖之廟而五是也有大事省於其君詩序所謂有功而見知是矣祫謂毁廟之主合食於祖廟也大夫止於三廟士止於二廟一廟則廟祭固不及髙祖必待祫然後及之故曰干祫及其髙祖祫人君所行之祭非人臣之常禮也特人君非常之賜而已葉氏夢得曰大事大功也省察也干上達也古者諸侯有祫而無禘大夫有時祭而無祫禘天子之事祫諸侯之事大夫既不得祫然有大功見察於天子則視諸侯上達而祫其毁主案本文惟云及其髙祖不云髙祖以上毁廟之主此云毁主誤王氏炎曰記大傳者首言禮一字眀所記者禮之舊典非漢儒臆説也禘與祫不同祫則大祖東郷毁廟及羣廟之主昭南郷穆北郷合食於大祖之廟禘則祖之所自出者東郷而以祖配食昭穆各以其次故禘為大祫次之如周人之祀后稷祖廟通論張子曰文武之功起於后稷故推以配天嚴父莫大於配天宗祀文王於明堂以配上帝上帝即天也聚天之神而言之則謂之上帝此武王祀文王推父以配上帝也曰昔者周公郊祀后稷以配天宗祀文王以配上帝不曰武王者以周之禮樂盡出周公制作故以其作禮樂者言之以始祖配天須在冬至冬至一陽生萬物之始宗祀九月萬物之成父者我之所自生帝者萬物之祖故推以為配而祭於明堂其實與帝一也陳氏祥道曰祀先之禮自禰而祖自祖而推之以及始祖備矣而禘又推始祖之所自出而以其始祖配之非仁孝誠敬之至者莫能行也朱子曰禘之意最深長如祖考與自家身心未相遼絶祭祀之理亦自易理㑹至如郊天祀地猶有天地之顯然者不敢不盡其心至祭其始祖己自大段闊逺難盡其感格之道今又推其始祖之所自出而祀之茍非察理之精微誠意之極至安能與於此哉項氏安世曰必以祖配之者猶祭天必以人帝配之使有依也存異鄭氏康成曰凡大祭曰禘謂郊祀天也王者之先祖皆感太微五帝之精以生蒼則靈威仰赤則赤熛怒黄則含樞紐白則白招拒黒則汁光紀皆用正嵗之正月郊祭之蓋特尊焉孝經曰郊祀后稷以配天配靈威仰也宗祀文王於明堂以配上帝汎配五帝也大事冦戎之事也省善也善於其君謂免於大難干猶空也空祫謂無廟祫祭之於壇墠孔氏穎達曰空祫及其髙祖此對諸侯為言言支庶為大夫士者耳若適為大夫亦有大祖故王制云大夫三廟一昭一穆與大祖之廟而三是也方氏慤曰此禘也或謂之肆獻祼猶事生之有享焉故謂之肆獻祼案周禮四時之閒祀追享朝享謂閒祀中有此二者為大耳非三名也肆獻祼謂朝踐天子凡祭皆有之以肆獻祼為禘亦誤辨正趙氏匡曰鄭見祭法説禘在郊上故為配祭昊天上帝於圜丘之説至云祖之所自出謂感生帝靈威仰此文出自讖緯始於漢哀平間偽書也故桓譚賈逵蔡邕王肅之徒疾之如仇而鄭氏通之於經其誣甚矣劉氏􅂜曰禮不王不禘者謂大禘於廟非祭天地鄭氏引緯書以為禘祭大微五精帝事非經據聖人之意不如是也證以下文其理煥然矣案大夫三廟則髙祖無廟可祀故鄭為壇墠之説然據祭法壇墠有禱則祭不言祫也王制大夫有大祖廟則亦祫於大祖廟耳何壇墠之足云寇戎説亦未確至王制言大祖廟祭法言皇考廟二説葢傳聞異辭耳又案程子曰髙祖有服不祭甚非故大夫三廟其昭穆二廟實具四世之主雖於經無據然以程子説推之則大夫士並宜祭及髙祖但限於廟制無髙曽二廟則立髙祖之主於祖廟立曽祖之主於禰廟禮以義起義自可通則昭穆二廟實具四世之主其説亦未可厚非也但大夫有時祭而無祫必有大功見察於天子則視諸侯上達而祫及之耳牧之野武王之大事也既事而退柴於上帝祈於社設奠於牧室遂率天下諸侯執豆籩逡奔走追王大王亶父王季歴文王昌不以卑臨尊也逡息俊反追王于况反亶于但反父音甫正義鄭氏康成曰柴祈奠告天地及先祖也先祖者行主也孔疏曽子問云古者師行必以遷廟主行故甘誓云用命賞于祖此武王所載行主者也牧室牧野之室也古者郊闗皆有館焉孔疏遺人云凡國野十里有廬二十里有宿五十里有市道路尚然明郊闗亦有館舎鄭言此者證牧野有室逡疾也疾奔走言勤事周頌曰逡奔走在廟不以卑臨尊不用諸侯之號臨天子也孔氏穎達曰此論武王伐紂率諸侯以祭祖廟追王大王王季上尊祖禰與前相接也牧野之戰是武王之大事也既戰而退燔柴以告天陳辭以告社奠祭於牧野之館室以告行主遂領天下諸侯執豆籩逡奔走在廟祭先祖此時乃追王大王名亶父者又追王王季歴及文王昌等為王此追王者王迹所由興故也若非王迹所由興不必追王故小記云父為士子為天子諸侯祭以天子諸侯其尸服以士服是也方氏慤曰爾雅言邑外曰郊郊外曰牧牧外曰野書言王朝至于殷郊牧野此云牧之野則武王之事乃在於殷邑之外而已柴者升其氣祈者求以事奠者薦以物天下諸侯執豆籩逡奔走則各以其職來祭故也執豆籩以見四時之和氣逡奔走以見四表之歡心所謂古公季歴西伯皆當世之所稱也大王王季文王乃後來之所追也且祖禰為侯子孫為王則是以卑臨尊也故追王之者不敢以子孫之卑而臨祖禰之尊也案大王王季文王理宜追王惟當柴於上帝祈於社之時遂率諸侯行之若曰此皇天后土之所命而諸侯共承之非子孫之所敢為也通論陳氏祥道曰武王出師受命文考類於上帝宜於冢土以告伐也既事而退柴於上帝祈於社設奠於牧室以告成也伐者天與神之命成者天與神之功又曰既事而退柴帝祈社商郊之祭也故在享廟之前柴望大告武成豐邑之祭也故在享廟之後李氏開曰於牧野則先柴祈而後設奠於豐則先告廟而後柴望者葢祀於牧野則天地以尊至於豐則以告廟為始此祭祀之序也存異鄭氏康成曰文王稱王早矣於殷猶為諸侯於是著焉孔疏文王所以早稱王者案中侯我應篇云我稱非早一民固下注云一民心固臣下雖時為早於年為晚矣孔氏穎達曰周本紀云文王受命六年立靈臺布王號於時稱王年九十六也合符候云文王立后稷配天追王大王王季暫追王耳諡號未定至武王乃定之中庸言周公追王謂以王禮改葬耳辨正陳氏祥道曰追王之事武王有其志而佐以周公也司馬遷言文王改正朔追尊太王王季妄矣書曰至于商郊牧野詩曰矢于牧野維予侯興牧室牧野之室也鄭康成以行主為先祖其說是矣周本紀稱武王載文王木主以行果載以行則文王之廟虚主矣為假主以行則文王之廟二主矣馬遷之説得非惑於文考受命之説乎春秋書王正月公羊曰王者孰謂謂文王也葢於是時虞芮質成天固已命之然作周而未成有所統而未集不幸九年而終至此武王周公所以正其名而追之也觀祖伊稱文王以西伯武王稱文王以文考則文王未嘗稱王可知也呂氏祖謙曰考之武成曰大王肇基王迹王季其勤王家我文考文王克成厥勲誕膺天命盖三王皆肇基之主所以追王之也項氏安世曰父尊子卑祖尊孫卑久矣豈區區之稱號所能相臨邪彼謂不以諸侯之卑而臨天子者秦人忘親尚勢之説而漢儒因之耳案鄭據緯書謂文王稱王九年孔又據緯書謂文王尊后稷配天追王大王王季李氏并謂文王追王后稷史記述舊傳言武王載木主號為文王考書泰誓止稱文考武成乃稱文王金縢篇言若爾三王逸周書言一月甲子入殷乙丑復於軍二月辛亥告於天宗上帝祀大王王季文王是追王在克商後一月古人謂行主為公禰故人遂誤為載文王主也中庸言周公追王者周家制作皆出於公故係之公耳孔氏必求其説謂周公追王乃改葬以王禮未必然也縱周公於大王王季之墓髙其封大其域亦不得以追王名之國語言昔我先王后稷猶詩言𤣥王桓撥亦臣子之統辭李氏謂文王追王后稷亦無據之説也上治祖禰尊尊也下治子孫親親也旁治昆弟合族以食序以昭繆别之以禮義人道竭矣禰本或作祢年禮反繆同穆音木别彼列反下並同正義鄭氏康成曰治猶正也繆讀為穆聲之誤也竭盡也孔氏穎達曰此論武王伐紂之後因治親屬合族之禮叙昭穆之事上正祖禰是尊其尊下正子孫是親其親上主尊敬故曰尊尊下主恩愛故曰親親㑹合族人以食之禮又次序族人以昭穆之事所謂旁治兄弟也别之以禮義總結上三事馬氏睎孟曰上治祖禰則上有所殺下治子孫則下有所殺旁治昆弟則旁有所殺上殺下殺旁殺而親畢矣故合族以食使之有所同而内外之意一序以昭穆别以禮義使之有所異而親疎之義明則人道為盡於此矣陳氏祥道曰自仁率親等而上之至於祖名曰輕自義率祖順而下之至於禰名曰重此上治祖禰尊之也諸侯冢子生接以大牢庶子皆以少牢冢子未食而見庶子已食而見為長子三年庶子期為適孫期庶孫大功此下治子孫親之也兄弟期從兄弟大功族兄弟小功此旁治昆弟也周禮大宗伯曰以飲食之禮親兄弟宗族記曰繫之以姓而不别綴之以食而弗殊則飲食者人情之合歡者也觀文王燕兄弟而唐棣之羙作幽王不能燕樂同姓而頍弁之刺興則合族以食禮之大者也禮曰君與族人燕則膳宰為主人又曰族食世降一等詩曰厭厭夜飲在宗載考國語曰親戚享燕有殽烝又曰歳飫不倦時宴不滛則族食之禮合之以時等之以世掌之以膳夫其薦也以殽烝其飲也或以夜葢合族以食恩也序其昭穆别之以禮義所以節恩者也無恩則離恩而無以節之則亂先王之於宗族使不至於離且亂無他盡人道以治之而已方氏慤曰序以昭穆謂三者皆為先後之序若小宗伯所謂辨廟祧之昭穆盖序祖禰之昭穆也魯語言昭穆等胄之親疎蓋序子孫之昭穆也祭統言昭與昭齒穆與穆齒盖序昆弟之昭穆也别以禮義謂逺近之别也上曰祖曰禰下曰子曰孫旁曰昆曰弟此之謂别之以禮尊尊有等親親有殺合族有降此之謂别之以義若是則人道豈復有餘藴哉故曰竭盡矣案上治下治旁治總在治親一條内而治親一條内卻分四事上治尊尊下治親親不待言矣旁治中卻有長長及男女有别二等合之以食序以昭穆所謂同姓從宗合族屬所以長長也别之以禮義所謂異姓主名治際㑹所以厚别也如此則通篇血脈貫通别之以禮義一句孔氏謂通結上三事馬氏陳氏專屬旁治一事方氏又以序昭穆别禮義皆通上三事於義皆可通而要不若直注男女有别為確即後服術之六三曰名四曰出入亦大都在男女中也聖人南面而聽天下所且先者五民不與焉一曰治親二曰報功三曰舉賢四曰使能五曰存愛五者一得於天下民無不足無不贍者五者一物紕繆民莫得其死聖人南面而治天下必自人道始矣聽體寧反與音預紕匹彌反徐孚夷反又方齊反繆音謬正義鄭氏康成曰且先言未遑餘事也功功臣也存察也察有仁愛也物猶事也紕繆猶錯也人道謂此五事孔氏穎達曰聖人即位所且欲先行者五事治親即前三事三事若正則於家國皆正故急在前報功謂報其有功勞者使為諸侯之屬是也舉賢謂舉用巖穴有賢徳之士使能謂無功徳非賢者而有道藝亦錄之使各當其職存愛謂上四者為政既足又宜察民下側陋之中有仁愛之心者亦賞異之贍是優足之餘莫得其死言無得以夀終也方氏慤曰民不與焉非不以民為事苟能行此五者民亦從而治矣故後言民無不足無不贍者夫正之以善之謂治予其所施之謂報升之於位之謂舉任之以職之謂使念之而不忘之謂存必自人道始蓋以治親為先故也始言聽天下終言治天下者盖事之來也聽其可否而後治之使正焉故言之序如此輔氏廣曰五者無非為民而曰民不與焉何哉言未及於民事如勞來勸率賙給之類也陳氏澔曰言此五事之得失闗國家之治亂也人道申言上文之意彭氏絲曰絲屬而不周曰紕被飾而過實曰繆餘論陸氏佃曰鄭氏謂察有仁愛者盖啜羮放麛其持心不同古者求忠臣必於孝子之門以此後世以善求事為精神以能訐人為風采刻薄之徒進而仁愛者不見察民始莫得其死矣陳氏祥道曰湯有天下徳懋懋官功懋懋賞武王有天下崇徳而後報功周官八統進賢使能然後保庸先王於有功者非不報也特在進賢使能之後耳後世類皆急勲勞而緩賢能以報功繼治親以舉賢使能後存愛豈漢儒之說與存異姚氏舜牧曰先世功徳遺愛在民興滅繼絶所以存之總論孔氏穎達曰此廣明聖人受命以臨天下有不可變革及有可變革之事立權度量考文章改正朔易服色殊徽號異噐械别衣服此其所得與民變革者也其不可得變革者則有矣親親也尊尊也長長也男女有别此其不可得與民變革者也量音亮正音征徽諱韋反械户戒反長長並丁文反後並同正義鄭氏康成曰權稱錘也度丈尺也量斗斛也文章禮法也孔疏謂夏殷周損益之禮服色車馬也孔疏夏尚黒殷尚白周尚赤車馬各隨所尚之正色徽號旌旂之名也孔疏旌旂夏大麾殷大白周大赤周禮有九旗九旗外又有小旌旗司常官府各象其事州里各象其名家各象其號陳氏祥道曰左𫝊揚徽者公徒即此徽也用兵之法以旌旂待晝事以名號待夜事器械禮樂之器及甲兵也案凡禮樂之器統謂之器甲兵則謂之械以為戒備而設也孟子曰予有戒心衣服吉凶之制也徽或作褘親親四者人道之常孔氏穎達曰立權度量言始有天下必宜造此物也考校也正謂年始朔謂月初王者得政改故用新周子殷丑夏寅是改正也周夜半殷雞鳴夏平旦是改朔也殊别也器謂楬豆房俎禮樂之器械謂戎路革路兵甲之屬别衣服者周吉服九章虞以十二章殷凶不厭賤周貴則降卑此諸事是末故可變革與民為新也方氏慤曰銖兩斤鈞石謂之五權首言權則以規矩凖繩衡皆始於此故也權之輕重度之長短量之多少及其久也則不能無差故立以定之文章葢言禮樂法度久則不能無壊故考以正之正朔者天之所為則改之而已服色者人之所為故可易焉此七者治之法也或以三或以五或以九其數雖不同所以為親親之義則一也有祖有曽有髙其名雖不同所以為尊尊之義則一也四世而緦五世袒免疎戚雖不同所以為長長之義則一也父則隆於母夫則隆於婦兄弟則隆於姊妹其位雖不同所以别男女之義則一也此四者治之道也道有常要在久之而不易故曰不可得與民變革也既曰變又曰革何也天下之理因之則有常革之則有變因革則存乎人變常則存乎事人與事常相須而已陳氏祥道曰立權度量所以示民信改正朔所以授民時考文章别衣服所以示民禮易服色殊徽號異器械所以便民用蓋聖人立法因民而已民之所安聖人不强去民之所厭聖人不强存通其變使民不倦天下其有敝法哉宜革而因物失其均宜因而革物失其則故得於天者可因而不可革則親親尊尊長長男女有别是也成於人者可革而不可因則立權度量考文章改正朔易服色殊徽號異器械别衣服是也衣服言其制服色言其色通論馬氏睎孟曰自立權度量至於别衣服者禮之文也文則應時而造自親親至於男女有别者禮之本也本則理有不可易輔氏廣曰聖人之治有所更易無非所以奉天命而順人心固非私意所能也親親仁也尊尊長長義也男女有别禮也知者知此者也信者信此者也其不可得而變革者經也黃氏震曰此借制度之可變以形人道之不可變主人道也同姓從宗合族屬異姓主名治際㑹名著而男女有别其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也謂弟之妻婦者是嫂亦可謂之母乎名者人治之大者也可無慎乎際音祭著知慮反屬音燭嫂本又作㛮悉早反正義鄭氏康成曰合合之宗子之家序昭穆也異姓謂來嫁者也主於母與婦之名耳際㑹昏禮交際之㑹也著明也母婦之名不眀則人倫亂也母焉則尊之婦焉則卑之尊之卑之眀非己倫孔䟽既尊卑懸絶眀知非己之倫位以厚别也昆弟之妻夫之昆弟不相為服不成其親也孔疏若男女尊卑隔絶相服成親義無混雜此兄弟之妻若成親為服則數相聚見姦亂易生男女無親則逺於相見孔疏以其全同路人㤙親不接孔氏穎達曰此論同姓從宗異姓主名眀男女有别之事同姓父族也從宗謂從大小宗也合聚族人親疎使昭為一行穆為一行同時食故曰合族屬也異姓謂他姓之女来為己姓之妻繫夫之親主為母婦之名治正也際㑹所以主此母婦之名正昏姻交接㑹合之事若母婦之名著則男女尊卑異等各有分别不相滛亂他姓婦人來嫁己族本無昭穆於己親惟繫夫尊卑而定母婦之號也道猶行列也若其夫隨屬於己之父行者其妻皆己之母行也其夫隨屬於己之子行者其妻皆己之婦行也故婦人来嫁己伯叔之列即謂之為母來嫁於己之子行即謂之為婦也男女若無尊卑倫類相聚則滛亂易生劉氏彝曰宗者一族人倫之主也天子諸侯尊崇雖其子之親非嗣厥位則莫可得而禰之也是以同姓之親必崇其宗崇其宗則五服各有倫類所以辨親踈定長㓜明尊卑繫昭穆也正其一身而人倫之道偹焉者宗以正之使然也故先王之禮同姓人之昏嫁祭祀燕饗飲食必稟於大宗仕進出入饋遺往来亦如之屬猶繫也父之黨則繫於昭子之黨則繫於穆昭穆分則序之以長㓜合族人而食所以正人倫而禮義行於宗黨矣馬氏睎孟曰同姓者自内出而有所殺嫌於無所厚故使之從宗合族屬所以親之以仁恩也異姓者自外入而有所厚嫌於無所分故使之主名治際㑹所以别之以禮義也呂氏祖謙曰婦人尊卑本無定位隨其夫之尊卑爾故所主者在名輔氏廣曰名著則男女雖際㑹而有别矣此所謂主名也方氏慤曰嫂雖少當敬忌如叟故以文從之是乃所以别嫌與名雖非尊而實則敬之葢先王之微意也陳氏澔曰弟妻不可謂之為婦猶兄妻不可謂之為母以紊昭穆也故云謂弟之妻婦者是嫂亦可謂之母乎言皆不可也通論鄭氏康成曰亂者若衞宣公楚平王爲子取而自納焉孔疏左傳桓十六年初衞宣公烝于夷姜生急子取于齊而羙公取之生夀及朔又昭十九年椘平王為大子建取秦女而羙平王自納之孔氏穎達曰凡姓族異者所以别異人也天子賜姓賜氏諸侯但賜氏故隠八年左傳云天子因生以賜姓胙之土而命之氏諸侯以字為諡因以為族案左傳以字句言有以字為族者亦有為諡而因以為族者如桓族荘族之類桓魋亦稱桓氏官有世功則有官族邑亦如之以此言之天子因諸侯先祖所生賜之曰姓杜預云若舜生嬀汭賜姓曰嬀封舜之後于陳以所封之土命為氏舜後姓嬀而氏曰陳故鄭駁異義云炎帝姓姜太皞之所賜也黃帝姓姬炎帝之所賜也故堯賜伯夷姓曰姜賜禹姓曰姒賜契姓曰子賜稷姓曰姬著在書傳是天子賜姓也諸侯賜卿大夫以氏若同姓公族之子曰公子公子之子曰公孫公孫之子其親已逺不得上連於公故以王父字為氏若適夫人之子則以五十字伯仲為氏若魯之仲孫季孫是也若庶子妾子則以二十字為氏則展氏臧氏是也若異姓則以父祖官及所食之邑為氏以官為氏則司馬司城是也以邑為氏若韓趙魏是也凡賜氏族者為卿乃賜有大功徳者生賜以族若叔孫得臣是也雖公子之身若有大功徳則以公子之字賜以為族若仲遂是也其無功徳死後乃賜族若無駭是也若子孫不為卿其君不賜族子孫自以王父字為族也氏族對文為别􅄆則通故左傳問族於衆仲下曰以字為展氏是也其姓與氏散亦得通故春秋有姜氏子氏姜子皆姓而云氏是也方氏慤曰以衆而聚於一者謂之族若所謂宗以族得民敬宗故收族是也以小而繫於大者謂之屬若所謂夫屬乎父道夫屬乎子道是也上下之交謂之際彼此之合謂之㑹若王姬下嫁於諸侯者際也㑹男女之無夫家者㑹也言同姓從宗則異姓非不然也以同姓為宗之所主而族屬之所繫焉不然則離故也經曰婦人從夫其謂是與異姓主名則同姓非不然也以異姓則名之所難辨而際㑹之所因焉不然則亂故也經曰合二姓之好其謂是與名著而男女有别者尊者為父親者為母而父母之名著矣外則為夫内則為婦而夫婦之名著矣此男女之所以有别也至於父之與夫而名著乎外則男又有别矣母之與婦而名著乎内則女又有别矣陳氏祥道曰母婦雖無昭穆而昭穆繫於父子之别嫂婦無長㓜而長㓜繫於兄弟之倫故婦於世叔父母則大功世叔於婦亦大功以其相逺而親之也兄公與叔於嫂婦無服嫂婦於兄公與叔亦無服以其相邇而逺之也餘論應氏鏞曰人固有㓜而無依年之長㓜或甚遼絶兄當撫㓜弟如父故康誥以兄不念鞠子哀為大不友嫂當撫㓜叔如子故唐賢有鞠於嫂以有成以母服報之恩禮可以有加而名卒不可變者天倫自然之序非人所能移也此其所以莫急於正名也徐氏師曽曰今世猶稱弟妻為婦殆未之考耳存疑鄭氏康成曰謂之婦與嫂者以其在己之列以名逺之耳孔疏在己之倫列恐相䙝凟故弟妻假以同子婦之名兄妻假以婦老之名殊逺之也復謂嫂為母則令昭穆不明孔疏既以子妻之名名弟妻若又以諸父之妻名名兄妻則上下全亂昭穆不明故不可也亦可謂之母乎言不可也人治所以正人也孔氏穎達曰此論兄弟之妻相稱謂之義弟非子行其妻亦謂之婦者以嫌相䙝瀆謂之為婦欲卑逺之也弟妻旣得為婦號恐兄妻得為母號故明之言嫂不可亦謂之為母也若兄妻又為母是兄弟之倫翻為父子之例故借婦老之名以為兄妻之號也名謂母婦之名得之則昭穆明失之則上下亂是人治之大須慎之也案記義盖謂兄弟非父道子道之可稱故其妻亦不可謂之母與婦而世乃有稱弟之妻為婦者是降其弟屬子道將嫂亦可為母而以兄屬父道乎甚言其不可之意而鄭孔反以稱弟婦為厚别似非經意考爾雅女子謂兄之妻曰嫂弟之妻曰婦男子無文以男女有别最重同等之嫌而兄公與弟之妻尤必無際㑹也後世假女子之稱以相稱而稱兄妻曰嫂於弟妻曰弟婦以别於子婦豈所稱無於禮者之禮耶四世而緦服之窮也五世袒免殺同姓也六世親屬竭矣免音問殺色界反徐所例反正義鄭氏康成曰四世共髙祖五世髙祖昆弟六世以外親盡無屬名孔氏穎達曰四世謂上至髙祖下至己兄弟同承髙祖之後者為親兄弟期一從兄弟大功再從兄弟小功三從兄弟緦麻為四世而緦麻盡也五世謂共承髙祖之父者服袒免而無正服減殺同姓也六世則謂共承髙祖之祖者不服袒􅊵同姓而已故云親屬竭通論馬氏睎孟曰服有五者蓋其親有隆殺則服有精粗故四世而緦者服之精乃其服之窮也至於五世則宜其無服而先王不忍遂絕之也故為之袒􅊵之禮所以殺同姓也存疑方氏慤曰五世尤疏但不襲不冠以變其吉耳六世雖不變吉可也案六世但不袒􅊵耳不變吉則過矣其庶姓别於上而戚單於下昏姻可以通乎繫之以姓而弗别綴之以食而弗殊雖百世而昏姻不通者周道然也戚千歴反單音丹繫音計又户計反別皇如字舊彼列反綴丁衞反食音嗣正義鄭氏康成曰𤣥孫之子姓别於髙祖五世而無服孔疏𤣥孫與髙祖服屬仍同其姓不異𤣥孫之子則四從兄弟承髙祖父之後至已五世而無服各事小宗因字因官為氏不同髙祖之父是庶姓别於上庶姓氏族之謂也姓世所由生孔疏五世無服不相禀承各為氏姓昏姻可以通乎問之也周之禮所建者長也姓正姓也始祖為正姓孔疏若炎帝姜姓黄帝姬姓周姓姬本於黃帝齊姓姜本於炎帝宋姓子本於契是也髙祖為庶姓孔疏若魯之三桓慶父叔牙季友之後及鄭之七穆游氏國氏之等繫之弗别謂若今宗室屬籍也孔疏漢同宗有屬籍周禮小史掌定繫世辨昭穆孔疏周禮小史之官掌定帝繫世本知世代昭穆孔氏穎達曰周家五世以後各為氏族不共髙祖别自為宗是庶姓别異於上也戚親也單盡也謂四從兄弟各自為宗不相尊敬是恩親盡於下也庶衆也髙祖以外人轉廣逺分姓衆多故曰庶姓周法大宗百世不改雖庶姓别於上而有世繫連繫之以本姓而不分别又綴族以飲食之禮而不殊異雖相去百世昏姻不得通也通論方氏慤曰周官言定繫世所謂繫之以姓也以飲食之禮親宗族兄弟所謂綴之以食也曲禮曰娶妻不取同姓則周之不通也明矣陳氏祥道曰恩出於情有時而可絶義出於理無時而可廢故六世而親屬竭者恩之可絶也百世而昏姻不通者義之不可廢也呂氏祖謙曰禮記庶姓即左傳所謂氏族如襄二十五年崔武子欲娶東郭偃之姊偃曰男女辨姓今君出自丁臣出自桓不可蓋崔與東郭皆是氏其姓同出於姜自姜姓中分别出来便有所謂崔氏有所謂東郭氏此便是庶姓别於上也存疑孔氏穎達曰此論殷周統叙宗族之異昏姻可通以殷法而問也方氏慤曰小記言婦人不知姓則書氏則殷無所繫可知案禮所以别嫌疑嫌之易生者莫甚於男女故記於主名治際㑹三致意焉其曰周道然者尊王制也亦自相答耳雖前世或不必如周之嚴而謂殷為五世以後可通昏姻果何所據乎注疏倡之諸儒因之至援堯舜以證尤謬故直削之鄭氏以庶姓為氏族繫之以姓為正姓其義固然然對文則異散文則通也服術有六一曰親親二曰尊尊三曰名四曰出入五曰長㓜六曰從服正義鄭氏康成曰親親父母為首孔疏次以妻子尊尊君為首孔疏次以公卿大夫名世母叔母之屬出入女子子嫁者及在室者孔疏及出繼為人後者長㓜成人及殤也從服若夫為妻之父母妻為夫之黨服孔疏從服下有六等鄭畧舉夫妻相為而言之孔氏穎達曰此明服術之制馬氏睎孟曰術者言其所由服之制有五而術則有六其詳至於如此者所謂喪多而其服五上附下附是也親親者門内之喪也門内之喪則必以恩掩義而以父母為首故為父母斬衰此親親之重也尊尊者門外之喪也門外之喪則以義斷恩而以君與臣為首故為君斬衰此尊尊之重也名者自彼而適我也出入者自我而適彼若姑姊妹之服是也從服者言其以類相從而非正服也吳氏澄曰服術謂聖人制服之道其一親親承上人道之親親下治子孫者而言案子至親也為長子三年斬衆子齊衰期下而適孫期衆孫大功九月又下而曽孫𤣥孫並緦麻三月由子以下皆親親之下殺也其二尊尊承上尊尊上治祖禰者而言案父至尊也斬衰三年父之上祖齊衰期上而曽髙並齊衰三月由父而上皆尊尊之上殺也其三名其四出入承上男女有别别之以禮義而言名者彼女来配此男案母父之配父在期父殁齊衰三年妻己之配齊衰期父不在加以杖妻則為夫斬三年婦者子配故服大小功伯叔母名同於父之配視己尊一等故期兄弟之子婦同於子之配視己卑一等故小功惟兄弟之妻不可同於己之配故無服出者此女往配彼男案姑姊妹女子子在室齊衰期出嫁大功入者已嫁而反案或被出或無子来歸仍服在室之服其五長㓜承上長長旁治昆弟而言案昆弟相為服期而一從大功再從小功三從緦麻由長而上又有旁尊之上殺案父之昆弟為從父期再從父小功族父緦麻祖之昆弟為從祖小功再從及曽祖之兄弟皆緦由㓜而下又有旁卑之下殺也案子行兄弟之子期從子小功再從緦孫行兄弟之孫小功從孫緦親兄弟之曽孫亦緦以上喪服之五術本於人道之四親非親而服者不在此數其六從服謂非己之正服從於人而服也故殿於五術之後此篇專言治親制服之正注以尊尊為君服失之案吳氏所論於本篇脈絡最為親切但本篇所述與喪服傳文同者五而喪服傳言父至尊也君至尊也則鄭所舉該喪服傳之全吳所舉乃本篇之㫖也從服有六有屬從有徒從有從有服而無服有從無服而有服有從重而輕有從輕而重正義鄭氏康成曰屬從子為母之黨孔疏鄭舉一條耳夫從妻妻從夫並是也徒從臣為君之黨孔疏亦畧舉一條耳妻為夫之君妾為女君之黨庶子為君母之親子為母之君母並是也從有服而無服公子為其妻之父母孔疏鄭引服問篇其妻為本生父母期而公子為君所厭不得服從是妻有服而公子無服是從有服而無服嫂叔無服亦是也從無服而有服公子之妻為公子之外兄弟孔疏鄭亦引服問篇公子被君厭為己外親無服而妻猶服之是從無服而有服娣姒亦是也從重而輕夫為妻之父母孔疏鄭引服問篇妻自為其父母期為重夫從妻服之三月為輕是從重而輕也舅之子亦是也從輕而重公子之妻為其皇姑孔疏鄭引服問篇公子為君所厭自為其母練冠是輕其妻猶為服期是從輕而重也孔氏穎達曰從服有六者從服之中别有六種屬從者以其親屬為其支黨徒從者與彼無親空服彼之支黨方氏慤曰以非正由於己特從人而服故謂之從服有所繫而從則曰屬從無所繫而從則曰徒從屬從由仁而生也徒從以義而起也從有而無從重而輕斷之以義也從無而有從輕而重濟之以仁也先王之於服術仁之至義之盡也故率親則自仁率祖則自義自仁率親等而上之至于祖名曰輕自義率祖順而下之至于禰名曰重一輕一重其義然也正義鄭氏康成曰自猶用也率循也恩重者為之三年義重者為之齊衰然如是也孔氏穎達曰此論祖禰仁義之事仁恩也親謂父母也等差也義宜也言人情道理宜合如是案喪服條例衰服表恩若髙曽之服本應緦麻小功而進以齊衰踰數等之服豈非為尊重而然至親以期斷而父母加三年寧不為恩深故亦然矣方氏慤曰言率親以知率祖之為尊言率祖以知率親之為禰因親以推祖則以階而升焉故曰等而上之由祖以及禰則即世以降焉故曰順而下之或自仁率或自義率而下止言其義然者義宜也宜輕而輕宜重而重是義而已輔氏廣曰親親仁也逆而上之則漸輕故至於祖名曰輕尊尊義也順而下之則漸重故至於禰名曰重輕則緦麻三月重則斬衰三年一輕一重非人之所能為也案祖無緦麻三月者􅂲當作齊衰三月存疑鄭氏康成曰用恩則父母重而祖輕用義則祖重而父母輕孔氏穎達曰子孫若用恩愛循親而上至於祖逺者恩漸輕故名曰輕用義循祖順而下之至於禰其義漸輕祖則義重故名曰重案仁義之道皆根於性命於天而義又自仁出蓋義即仁之宜而敬即愛之隆也人之初生本於父而已由父而上之至於祖則本之本也然親之名盡於髙服之制亦盡於髙聖人非不念再上之有始祖有始祖所自出然而服盡於此者恩有所窮以義斷之也若分仁與義而對言之則仁主於愛義主於敬愛施於親敬施於尊二者相權互濟而要以仁為本愛莫隆於父之親故為父三年而上殺之至於髙曽止三月耳蓋以仁論則至於祖名曰輕然於祖不敢服以功緦之輕而必為之齊衰以仁雖輕而義則重也乃為髙曽止齊衰三月而下隆之至於祖而齊衰期至於禰而斬衰三年蓋以仁論則父重即以義論至於父亦名曰重蓋仁者義之本仁重則義愈重也其輕其重各得其宜是乃所謂義也故曰其義一也鄭氏謂用義則祖重而父母輕謬矣本文何嘗曰自義率祖至於禰名曰輕乎君有合族之道族人不得以其戚戚君位也正義鄭氏康成曰君恩可以下施而族人皆臣也不得以父兄子弟之親自戚於君位謂齒列也所以尊君别嫌也孔氏穎達曰合族者言君設族食燕飲有合㑹族人之道族人不敢計已親戚與君齒列陳氏祥道曰君之於族人主乎愛而失愛則疏族人之於君主乎敬而失敬則䙝以失其愛則疏故有合族之道所以明其親親之恩以失其敬則褻故不得以其戚戚君位所以明其尊尊之義不能親九族燕樂同姓與夫恃親而不恭者豈知此哉輔氏廣曰君有合族之道親親仁也族人不得以其戚戚君位尊尊義也上所行者仁下所守者義陳氏澔曰不敢上親於君者一則君有絶宗之道二則以嚴上下之辨而杜簒代之萌也案此為下宗法引端惟族人不得以其戚戚君位此别子之義所由立也存疑王氏曰位也當自為句蓋族人不敢戚君者限於位也案此亦得偹一説但與諸家義别附存之庶子不祭眀其宗也庶子不得為長子三年不繼祖也為于偽反正義鄭氏康成曰明猶尊也一統焉族人上不戚君下又辟宗乃後能相序孔氏穎達曰此下論卿大夫以下繼續小宗大宗之義小記文詳此文簡畧小記已備釋之方氏慤曰適子為宗宗則承家主祭焉庶子非宗也故不得祭吕氏祖謙曰庶子不祭曽子問所謂供其牲物以辨大宗故也通論陳氏祥道曰庶子不祭不敢瀆其祖於上不得為長子三年不敢重其嗣於下皆以己之不繼祖所以明其宗也蓋不繼祖大宗之庶者也不繼禰小宗之庶者也合而言之皆祖也斬言其服三年言其期朱子曰依大傳文直謂非大宗則不得祭别子之為祖者非小宗則不得各祭其四小宗所主之祖禰也其小記則云庶子不祭禰明其宗也又云庶子不祭祖明其宗也文意重複恐不如大傳語雖簡而事反該悉也案小記言庶子不祭祖為不為長子斬發庶子不祭禰為不祭殤與無後者發也故文意重複而義各有主大傳直就小宗之庶子推起曰庶子不祭明有繼禰之小宗子在也其為繼祖繼曽繼髙者各有宗子則各不得祭以明其宗朱子所謂語雖簡而事反該悉者此也然鄭氏所云亦自明析别子為祖繼别為宗繼禰者為小宗正義鄭氏康成曰别子謂公子孔疏諸侯適子繼世為君適子之弟別於正適是諸侯之子故謂之别子若始來在此國者孔疏或是異姓始來亦謂之别子以其別於在本國不來者後世以為祖也繼别謂别子之世適也孔疏世繼别子為大宗族人尊之謂之大宗孔疏五世外皆為之齊衰三月母妻亦然是宗子也繼禰者父之適也兄弟尊之謂之小宗孔疏皆以本親服之孔氏穎達曰前既云明其宗此下廣陳五宗義也諸侯適子繼世為君而第二子以下悉不得禰先君故云别子並為其後世之始祖故云為祖也張子曰夫所謂宗者以己之旁親兄弟来宗己所以得宗之名是人來宗已非己宗於人也所以繼禰則謂之繼禰之宗繼祖則謂之繼祖之宗曽髙亦然陳氏埴曰一族之中大宗只是一人小宗儘多故一人之身從下數至始祖大宗惟一數至髙祖小宗則四此古者宗族人情相親人倫不亂由大宗小宗之法而然通論賀氏循曰禮宗子之義所以眀本祖之正統紀百代而不紊者也而宗之義委曲著見者多在别子卿大夫雖非别子起於是邦而為大夫者便為大宗其適繼之亦百代不遷禮記王制云大夫之廟一昭一穆與大祖之廟而三鄭君解曰大祖别子始爵者也謂起於是國盛徳特興為一宗之始如此則百代不遷統族序親及族人服之皆宜如别子之宗宗子之服雖在絶屬皆齊衰三月不以大夫位卑或以非代封為嫌也又曰奉宗加於常禮平居即毎事咨告凡告宗之例宗内祭祀嫁女娶妻死亡子生行來改易名字皆告若宗子時祭則告於同宗宗内男女畢㑹喪故亦如之若宗内吉凶之事宗子亦普率宗黨以赴役之宗子時祭畢則合族於宗子之家男子女子以班宗子為男主宗婦為女主凡所告子生宗子皆書於宗籍大宗無後則支子以昭穆後之故宗立則宗道存而諸義有主也有一人不惇者則㑹宗而正其罰族不可以無統故立宗宗既定則常尊歸之宗子雖在凡才猶當佐之佑之奉以為主雖有髙明之屬盛徳之親父兄之尊而不得干其任者所以全正統而一人之情也若姦回滛亂行出軌道有殄宗廢祀之罪者然後告諸宗廟而改立其次亦義之權也李氏覯曰大宗者其先祖之負荷族人之紀綱乎有族食族燕之禮所以收族也夫五服者人道之大治也然而逺者疎者忘之矣故立大宗以承其祖族人五世外皆合之宗子之家序以昭穆則是始祖常祀而同姓常親也始祖常祀非孝乎同姓常親非睦乎餘論呂氏大臨曰宗子法久不行今雖士大夫亦無收族之法欲約小宗之法且許士大夫家行之其異宫同財有餘則歸不足則取及昏冠喪祭必告皆今可行仍似古法詳立條制使之遵行以為睦宗之道亦無所害於今法可以漸消析居爭競之醜所補當不細矣案别子天子諸侯之庶子也雖與適子同出而諸侯不得祖天子則别於正適之天子而為諸侯之始祖大夫不得祖諸侯則别於正適之諸侯而為大夫之大祖故曰别子為祖其後繼此别子者為大宗故曰繼别為宗若不能為大夫而止為士則不得為大祖而其子繼之但為繼禰之小宗而已蓋宗子之立以為祭也族人不得祭始祖而得宗别子之世適以共祭故大宗惟一非髙祖之世適不得祭髙祖非禰之適亦不得祭禰故必宗髙曽祖禰之世適以祭故大宗一而小宗有四大宗以祭别子故百世不遷小宗至髙祖服盡不祭故五世則遷也存疑呂氏大臨曰天子之元子為天子之大宗以繼其大祖而别子為諸侯諸侯不敢祖天子而自為一國之大祖故諸侯之元子亦為諸侯之大宗以繼其大祖而别子為大夫大夫亦不敢祖諸侯而自立家為别子之祖繼别者為宗亦謂之大宗案天子諸侯不可以宗言上記所謂不得以其戚戚君位故惟繼别者為大宗也如吕氏説則有兩大宗矣未安有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼髙祖者五世則遷者也尊祖故敬宗敬宗尊祖之義也正義鄭氏康成曰遷猶變易也繼别子别子之世適也孔疏適子適孫世世繼别子繼髙祖者亦小宗也孔疏繼髙祖無小宗之文故云亦小宗也先言繼禰者據别子子弟之子也孔疏鄭以經繼髙祖為小宗何以前云繼禰鄭釋此意先云繼禰者又承上繼别為大宗之下則從别子言之别子子者别子之適子弟之子為别子適子之弟所生之子也弟則是禰其長子則是小宗故云繼禰為小宗因别子而言也以髙祖與禰皆有繼者則曽祖亦有也則小宗四與大宗凡五孔氏穎達曰此覆説大宗小宗之義幷明敬宗所以尊祖也百世不遷謂大宗也五世則遷謂小宗也尊祖故敬宗總結大宗小宗大宗是逺祖之正體小宗是髙祖之正體尊崇其祖故敬宗子所以敬宗子者尊崇其先祖之義也李氏覯曰吾於五宗見孝弟之至焉髙祖以上逺矣而數十百世尊其正體不忘祖也何孝如之袒􅊵以外疏矣而合之以食序以昭穆厚其同姓何弟如之先王之所以治天下此其本與周衰法弛斯道以亡廢正適者有之矣幼陵長者有之矣祖以世繼逺則忘之矣族以服治疏則薄之矣骨肉或如行路尚何有於天下乎案敬宗故族無不收所謂繫之以姓而弗别者如此此宗百世不遷則昏姻百世不通矣餘論張子曰今無宗之家所祭不能追逺大宗則百世不遷言百世已逺矣小宗大宗人主禮者統宗族之事者宗也故稱宗子國有宗正大抵主族中之禮故以主禮稱宗人唐虞已稱秩宗掌禮秩典秩也宗宗族之禮也陳氏祥道曰大宗始祖之統始祖之廟以義立而百世不毁小宗髙祖之統髙祖之廟以恩立而五世則遷以其廟有遷不遷之不同故其宗有易不易之不齊也凡此皆卿大夫之制至於公子則具下文呂氏祖謙曰尊祖故敬宗敬宗尊祖之義也蓋諸侯必敬宗子者以宗子是祖之適尊所自來故敬適也存疑孔氏穎達曰自由也謂别子所由出或由此君出案如周公為别子自文王出或由他國來案如孔子祖防叔奔魯而孔子猶自謂殷人吳氏澄曰此章第一節自别子為祖至尊祖之義也是言卿大夫士繼别子之宗第二節自有小宗而無大宗者至公子之宗道也乃是特言公子本身自為宗之宗二義各異若藍田呂氏之説後一節與前一節其義不殊一君但有一公子謂之别子君之子雖多止有一人為大宗以下皆不得謂之别子彼魯三桓之為三大宗鄭七穆之為七大宗者蓋非正禮然二説未詳孰是姑兩存之辨正朱子曰之所自出四字疑衍注中亦無其文至作疏時方誤耳陳氏祥道曰孔穎達言别子之所由出然則别子所由出即國君也其可宗乎榖梁曰燕周之分子也分子即别子也案諸侯不得祖天子大夫不得祖諸侯故有别子為祖繼别為宗之法而記乃云宗其繼别子之所自出則諸侯仍得祖天子大夫仍得祖諸侯矣且斷無别子為祖而别子之所自出反稱宗之理朱子據鄭注無文而疑之所自出為衍其説是也孔疏既混吳氏乃以三大宗七大宗言之豈知大宗未嘗有二而何三與七之有耶有小宗而無大宗者有大宗而無小宗者有無宗亦莫之宗者公子是也公子有宗道公子之公為其士大夫之庶者宗其士大夫之適者公子之宗道也適丁歴反正義鄭氏康成曰公子有此三事也公子謂先君之子今君昆弟公子不得宗君君命適昆弟為之宗使之宗之是公子之宗道也所宗者適則如大宗孔疏公子既有大宗小宗故知適者如大宗庶者如小宗大宗之正本是别子之適今公子為大宗謂禮如之非正大宗故云如也死為之齊衰九月孔疏以君在厭降兄弟降一等故九月以其為大宗故齊衰其母則小君也孔疏與君同母爲其妻齊衰三月孔疏同喪服宗子之妻無適而宗庶則如小宗死為之大功九月孔疏與尋常兄弟相為同君在厭降一等故為之大功九月其母妻無服孔疏母則庶母妻則兄弟之妻故無服公子唯己而已則無所宗亦莫之宗孔疏既立適爲大宗則不復立庶爲小宗前經所謂有大宗而無小宗是也既無適子可立但立庶子為小宗前經所謂有小宗而無大宗是也公子唯己而已即前經有無宗亦莫之宗鄭注遥釋前耳孔氏穎達曰以前經明卿大夫自有大宗有小宗以相繼屬此經眀諸侯之子身是公子上不得宗君下未為後世之宗不可無人主領之義君無適昆弟遣庶兄弟一人為宗領公子禮如小宗是有小宗而無大宗也君有適昆弟使之為宗以領公子更不得立庶昆弟為宗是有大宗而無小宗也公子唯一無他公子可為宗是無宗亦無他公子來宗於己是亦莫之宗也公子是也言此三事他人無唯公子有也公子有宗道言公子有族人來與之為宗為下起文也公子之公者公君也謂公子之君是適兄弟為君者為其士大夫之庶者則君之庶兄弟為士大夫所謂公子者也宗其士大夫之適者言君為此公子士大夫庶者宗其士大夫之適者謂立公子適者士大夫之兄與庶公子為宗也此適者即君之同母弟適夫人所生之子陸氏佃曰言公子有宗道如上所謂無宗亦莫之宗是無宗道也故公子之公為此公子求其上行先君之昆弟適者使為之宗以統公子此公子之宗道也即上行無適以其先君庶昆弟為小宗以統之呂氏祖謙曰假如國君有兄弟四人庶而一適適者君之同母弟公子既不敢宗君君則命同母弟為之宗使庶兄弟宗焉若皆庶而無適則須令庶長權攝祭事傳至子則自宗矣絶族無移服親者屬也移本或作施同以豉反正義鄭氏康成曰族昆弟之子不相為服有親者服各以其屬親踈孔氏穎達曰此論親盡則無服有親則有服絶族者謂三從兄弟同髙祖者族兄弟緦麻族兄弟之子及四從兄弟為族屬既絶者無施服在旁而及曰移言不延施及之有親者各以屬而為之服故曰親者屬也方氏慤曰九族之外謂之絶族以其恩至此絶故也有恩則有服以其恩絶故無施服也夫以卑而屬尊以㓜而屬長以庶而屬適以旁而屬正親親之道如斯而已故曰親者屬也族絶即非其所屬張子曰所謂絶非特此也喪服出妻之子為母期則為外祖父母無服傳曰絶族無施服親者屬也謂妻於夫家與族齒其出也與族絶族絶則為外祖父母無服此所謂無施服然夫妻判合有絶族子母至親無絶道故為出母期謂親者屬禮記作移喪服傳作施蓋古者移施通用自仁率親等而上之至于祖自義率祖順而下之至于禰是故人道親親也正義鄭氏康成曰親親言先有恩孔氏穎達曰從親親以至尊祖敬宗收族宗廟嚴社稷重禮俗成天下樂之而無厭倦前文已具此重説之者前論服之輕重此論親親之道方氏慤曰自仁率親等而上之至于祖則始乎親親焉自義率祖順而下之至于禰則終乎親親焉人道始終乎親親也輔氏廣曰人道不過仁義親親仁也尊祖義也推親親之仁至於尊祖則義也率尊祖之義而至於親親則仁也仁義之極則一故曰人道親親也又曰親親故尊祖案義自仁出尊祖之義原出於親親之仁則自仁率親等而上之至於别子為祖以仁為本乃見義有所當尊自義率祖順而下之至於禰以義相形愈見仁之有獨重則雖一從再從以至絶族而大宗百世不遷者孰非此仁之所貫注乎是故人道在親親聖人治天下所為必自此始也總論孔氏穎達曰自此至篇末論人道親親親親故尊祖尊祖故敬宗敬宗故收族收族故宗廟嚴宗廟嚴故重社稷重社稷故愛百姓愛百姓故刑罰中刑罰中故庶民安庶民安故財用足財用足故百志成百志成故禮俗刑禮俗刑然後樂詩云不顯不承無斁於人斯此之謂也中丁仲反樂音洛斁音亦正義鄭氏康成曰收族序以昭穆也嚴猶尊也孝經曰孝莫大於嚴父百志人之志意所欲也刑猶成也斁厭也言文王之徳豈不顯乎豈不承成先人之業乎言其顯且承之人樂之無厭也孔氏穎達曰已上親於親親亦上親於祖以次相親去已髙逺故云尊祖宗是祖之正𦙍故云敬宗族人既敬宗子宗子故收族人喪服傳云大宗收族是也族人散亂骨肉乖離則祭享不嚴肅若收之則親族不散昭穆有倫宗廟之所以尊嚴也宗廟嚴以下始於家邦終於四海並立宗之功也先嚴宗廟而後社稷重百姓百官也百官當職更相匡輔則刑罰得中上無滛刑濫罰則民手足有所措各安其業故財用得足也百姓足君孰與不足天下皆足君及民人百志悉成是謂倉廩實知禮莭衣食足知榮辱禮節風俗於是而成所以太平告成功也樂謂不厭也禮俗既成所以民庶樂而不倦也引詩周頌清廟之篇言文王之徳人無厭倦之者斯語辭今尊祖敬宗人皆願樂亦無厭倦故云此之謂也謂與文王相似矣程子曰收族之義止為相與為服祭祀相及吕氏祖謙曰禮俗不可分為兩事且如後世雖有籩豆簠簋百姓且不得而見安得習以成俗故禮俗不相干蓋制而用之謂之禮習而安之謂之俗如春秋祭祀不待上令而自安而行之刑是儀刑之刑須是二者合為一方謂之禮俗若禮是禮俗是俗不可謂之禮俗方氏慤曰宗五宗也族九族也宗廟者祖禰之祀社稷者土穀之神樂者樂也王者功成作樂其以是與不顯不承則親親尊祖之義也無斁於人斯其樂之意也故引詩以明之又曰百姓百官族姓也上言愛百姓非不愛庶民也蓋政自貴以及賤耳下言庶民安非百姓不安也蓋賤者已安而貴者可知矣臣以安社稷為事上言社稷故繫之於百姓刑不上大夫下言刑罰故繫之於庶民而已王氏炎曰此詩頌文王之徳記此傳者即以之明己意耳不顯顯也不承承也親親尊祖敬宗收族而宗廟嚴豈不顯乎推其效至於財用足百志成禮俗刑豈不承乎禮俗刑而民樂豈非人之無斁乎通論孔氏穎達曰詩箋云周公祭清廟是不光明文王之徳與言其光明之也是不承順文王之志與言其承順之也與此注不同者禮注在前詩箋在後欽定禮記義疏卷四十七
