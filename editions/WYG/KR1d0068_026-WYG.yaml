body:
  text: 曽子問第七之一正義陸氏徳眀曰曽子孔子弟子名參以其所問多眀於禮故著姓名以顯之孔氏穎達曰此於别錄屬喪服芮氏城曰通論冠昏喪祭諸侯所遭之變吉凶雜岀擬議無從際㑹雖不可知而典禮必不可闕曽子圖其變而豫為之問夫子因其問而豫為之䖏曽子所問或事所有或所不必有雖虚位也而實理寓焉夫子所答㦯禮所有或未有而以義起雖權制也而經常在焉非曽子不䏻問非孔子不䏻答易曰至賾而不可惡至動而不可亂此之謂也案必如曽子所問纔可當格物致知四字非如此精察則力行䖏總是粗踈不見聖人權度精切䖏王氏應麟云曽子之學博而約者也若今人所謂博止是一片荒蕪愈成悠􅍝曽子問曰君薨而世子生如之何孔子曰卿大夫士從攝主北面於西階南大祝裨冕執束帛升自西階盡等不升堂命毋哭祝聲三告曰某之子生敢告升奠幣於殯東几上哭降衆主人卿大夫士房中皆哭不踊盡一哀反位遂朝奠小宰升舉幣大祝之大音泰下同裨音皮毋音無祝聲祝之六反又之又反三去聲下同正義鄭氏康成曰於西階南變於朝夕哭位也孔疏朝夕内外哭位皆在東方此從攝主扵西階南是變也攝主上卿代君聴國政者裨冕者接神則祭服也諸侯之卿大夫所服裨冕絺冕及𤣥冕也士服爵弁服孔疏周禮司服孤自絺冕而下卿大夫自𤣥冕而下此卿兼孤也三命再命之卿大夫皆𤣥冕服士則爵弁大祝裨冕則大夫也孔䟽天子太祝是大夫諸侯無文若士則當爵弁故此太祝必大夫也命毋哭将有事宜清浄也聲噫歆警神某夫人之氏也几筵於殯東眀繼體也孔疏皇侃云殯宫無几庾蔚之云此特設之以世子初生異其事也衆主人君之親也房中婦人孔疏喪大記父兄堂下北面外宗房中南面案疏舉此為例耳子姓妃嬪内外宗應皆在反位反朝夕哭位小宰升所主也孔疏周禮小宰職凡祭祀贊玉幣爵之事喪荒受其含禭幣玉之事是幣小宰所主也舉而下埋之階間孔疏據師行主命反設奠卒歛幣玉蔵兩階間知亦然也徐氏曰其埋之既以禮神不敢䙝也孔氏穎達曰此論君薨子生告殯之事必於西階南以將告殯近殯位也喪大記卿大夫即位於堂㢘楹西以哭斂故升堂此告子生故在堂下裨埤也天子六服大裘為上其餘為裨以事尊卑服之而諸侯亦服焉服裨衣而著冕故云裨冕束帛十端也鬼神以丈八尺為端一丈象陽八尺法隂十端六𤣥天色四纁地色合為五兩於堂下告則太逺故升自西階於堂上告則太近故盡等不升堂告殯竟執束帛者升堂奠置所執之幣於殯東几筵上遂哭哭竟而降階士喪禮每日之旦先哭而後行朝奠朝奠了又哭今因西階前哭畢反哭位即行朝奠故云遂朝奠也熊氏云經稱奠幣於殯東則告世子生謂既殯以後若未殯前世子生不告通論孔氏穎達曰公羊云君存稱世子君薨稱子某左傳杜注云始生未命不稱太子此亦始生而稱世子者以别於庶子又即用世子之禮舉之以告殯也凡天子諸侯稱世子亦稱太子卿大夫以下稱適子在喪諸侯亦稱適子若冡子則上下通名方氏慤曰君薨凶事人之所哀世子生吉事人之所樂君子行禮於此可不慎哉是以裨冕吉服衰杖凶服毋哭吉禮稽顙凶禮盖處以吉凶之間也案太祝裨冕而餘人衰將告命毋哭而告竟即哭盖以世子生神必喜之故以吉處神而人實哀之故以凶處人也餘論陸氏佃曰君薨子恃以立者士大夫也古之人植遺腹朝委裘而天下不亂用此道也事變世移漢始垂簾矣存疑孔氏穎達曰皇侃云周下室喪奠有素几庾蔚之云殯宫朝夕奠之几常在不去案朝夕奠在室中非下室亦非殯宫殯宫本無几筵奠不在此三日衆主人卿大夫士如初位北面大宰大宗大祝皆裨冕少師奉子以衰祝先子從宰宗人從入門哭者止子升自西階殯前北面祝立扵殯東南隅祝聲三曰某之子某從執事敢見子拜稽顙哭祝宰宗人衆主人卿大夫士哭踊三者三降東反位皆袒子踊房中亦踊三者三襲衰杖奠出大宰命祝史以名徧告扵五祀山川大宰大宗竝音泰少去聲奉捧同子從人從之從去聲見音現正義鄭氏康成曰三日負子日也如初如告子生時孔疏亦西階南宰宗人詔賛君事者孔疏大宰是主教令之官大宗是主宗廟之官子拜哭奉子者拜哭也踊襲衰杖成子禮也奠亦謂朝奠孔疏知即朝奠者以在殯無特告奠之法也因負子名之喪禮略也孔疏内則世子生告扵君三日卜士負之三月子見乃名今幷行之以喪事遽故於禮略也孔氏穎達曰此論子生三日名之以見殯之禮大宰大宗前不禆冕今得裨冕者以奉子接神故服祭服少師主養子之官故以衰衣奉子祝主接神故先進少師奉子從祝大宰大宗為詔賛君事故次從在後升堂也前告子初生哀甚故祝升階乃命止哭今三日哀已微殺故子入門哭即止子升自西階不忍從先君之階升其宰及宗人以次立於子之東皆北面若其須詔相之時㦯就子前而西面也祝聲三亦警神也前告生哀甚故盡階不升堂此見子故進立殯東南隅告曰夫人某氏之子某從執事宰宗人等敢見告訖奉子之人拜而稽顙乃哭不踊者未即位故也祝宰宗人堂上哭衆主人卿大夫士階下哭堂上者亦降自西階而反東在下者皆東反朝夕哭位皆袒者以初堂上堂下非朝夕哭之正位故不袒今反位故當踊時皆袒也上文子不踊房中亦不踊至此子踊房中亦踊乃襲而杖以成其為子之禮遂朝奠而出也陸氏佃曰少師奉子言師著一日不可無師傅也不言大師嫌䙝也彭氏㢘夫曰三日既殯即名者國不可以無主又諸侯五月而葬若俟三月則殯或存或啓未可知故權為之禮曽子問曰如已葬而世子生則如之何孔子曰大宰大宗從大祝而告於禰三月乃名於禰以名徧告及社稷宗廟山川正義鄭氏康成曰告於禰告主也孔疏既葬無尸匶惟有主在故告於主漸神事之故以廟名而曰禰禰殯宫之主也又曰喪在殯告五祀山川不告社稷者五祀殯宫之五祀山川國鎮之重故越社稷告之也葬後則已祔廟廟與社稷相連不得不告社稷也案此條孔疏所述非本注孔氏穎達曰此論葬後世子生之禮不云攝主葬時攝主已弁絰葛葬竟又服受服喪之大事已畢故自還依大宰之禮也三月乃名於禰者葬後神事之故依平常之禮三月因見乃名也不云禆冕未葬尚禆冕葬後不言自顯也不言執帛凡告必用幣從之可知也前不云社稷宗廟此不云五祀相互也徐氏師曽曰云大宰從大祝則無攝主可知其哭踊袒襲升降由西階之類恐亦不同其餘當不異上文也存疑陸氏佃曰徧告告同盟諸侯知然者以言及社稷宗廟山川知之也案上莭告子生止有卿大夫此子見乃言大宰大宗知前攝主即大宰也古者君薨聴於冢宰即子未生朝委裘亦聴於冢宰也子未生冢宰攝主子既生則喪有主而冢宰攝其政不攝主矣徧告無所不告也及者言自近以及逺自人以及神也若不以名告天子則天子他日將何命焉不徧告臣庶則臣庶後日將何諱焉孔子曰諸侯適天子必告於祖奠於禰冕而出視朝命祝史告於社稷宗廟山川乃命國家五官而后行道而出告者五日而徧過是非禮也凡告用牲幣反亦如之朝直遙反牲舊讀制今如字正義鄭氏康成曰祖禰皆奠幣以告此互文也視朝聴國事也諸侯朝天子必禆冕為將廟受也孔疏諸侯視朝當用𤣥冠緇衣素裳案覲禮侯氏裨冕天子受之於廟今諸侯往朝為天子将廟受故豫敬之以冕服視朝也裨冕者公衮侯伯鷩子男毳臨行又徧告宗廟孝敬之心也五官五大夫典事者命者勅之以其職道祖道也聘禮記曰出祖釋軷祭酒脯也五日而徧既告不敢久留也孔氏穎達曰此論諸侯朝覲天子將出之禮不云曾子問因上起文也案下宗子條疏云凡無問而稱孔子曰皆記者失問也此條當亦然言徧是宗廟皆告也不言命卿者或從君出行或在官留守總主羣吏不専一事尊之也道以險阻為難是以委土為山伏牲其上以酒脯祈告禮畢乘車轢而遂行其牲犬羊可也告以五日為限者近者就告逺者望告先已告廟載遷主久留則非禮也陸氏佃曰祖言告禰言奠尊祖而親禰也黄氏震曰諸侯受天子命為宗廟社稷山川之主將暫違以適天子故禮必周徧如此通論方氏慤曰曲禮曰夫為人子者出必告反必面諸侯之出必告於祖奠於禰反亦如之盖事死如事生也而又及於社稷山川者推事親之道以事神也然於適天子則其禮詳與諸侯相見則其禮畧豈非相見之人有輕重故其禮不能無隆殺與存疑鄭氏康成曰牲當為制字之誤也制幣一丈八尺熊氏安生曰周禮校人王所過山川飾黄駒是天子當用牲下云幣帛皮圭以告知諸侯禮不應用牲也孔氏穎達曰上已告於祖奠於禰下又告宗廟是再告也案諸侯五廟初告奠止於祖禰故又命祝合未告者並告之注所謂徧告是也再告說未安辨正陳氏祥道曰道或有逺近禮或有輕重故告有特用幣有兼牲幣非一端也大祝大師宜於社造於祖大㑹同造於廟宜於社過大山川用事焉反行釋奠鄭氏引曾子問曰凡告必用牲幣及釋曾子問則改牲幣為制幣是自惑也孔穎達云天子諸侯出入有告有祭故告用制幣卿大夫入祭而已故聘禮既使而反祭用牲然禮凡告朔告至必用牲也孰謂天子諸侯之告不皆用牲也皇氏熊氏謂天子告用牲諸侯不用牲此尤無據告雖或用牲而其它不用牲者多矣若國大貞則奉玉帛而詔號春秋傳曰凡天災有幣無牲月令仲春之月祀不用犧牲用圭璧更皮幣以至晉侯謀以息民魏絳請祈以幣更齊饑孔子請祈以幣玉凡此視其事與時而已諸侯相見必告於禰朝服而出視朝命祝史告於五廟所過山川亦命國家五官道而出反必親告於祖禰乃命祝史告至於前所告者而后聴朝而入正義鄭氏康成曰朝服為事故也山川所不過則不告貶於適天子也孔氏穎達曰諸侯朝天子著冕服諸侯相朝降下天子故惟著臨朝聴事之服𤣥冠緇衣素裳也徐氏師曽曰聴朝而后入以久不在國當飭政也存疑鄭氏康成曰出止告禰道近或可不親告祖也反必親告祖禰同出入禮也徐氏師曽曰反必親告下當别為一莭通上兩莭而言諸侯適天子及自相見親告命祝史告皆如行時或告祖禰或但告禰也案本文眀言告至於前所告者是不告出者亦不告至今告至者前必告出矣而反言告祖禰出止言告禰不言告祖文不備也或云當作必告於祖禰曽子問曰並有喪如之何何先何後孔子曰葬先輕而後重其奠也先重而後輕禮也自唘及葬不奠行葬不哀次反葬奠而後辭於殯遂倄葬事其虞也先重而後輕禮也殯舊讀為賔今如字正義鄭氏康成曰並謂父母若親同者同月死孔疏親同者祖父母及世叔父兄弟不奠務於當葬者不哀次輕於在殯者孔氏穎達曰此論並有喪葬之事次謂大門外之右平時待賔之䖏葬柩車至此孝子悲哀柩車暫停今為父喪在殯故孝子不得為母伸哀也皇氏侃曰葬是奪情故從輕者為首奠是奉養故令重者居先通論杜氏預曰若父母同日卒其葬先母後父皆服斬衰其虞祔先父後母各服其服卒事反服父服若父已葬而母卒則服母之服至虞訖反服父之服既練則服父之服喪可除則服父之服以除之除訖而服母之服馬氏睎孟曰葬者送終之道人子之心所弗忍也所以先輕後重奠者求神之道也人子之心所至切也所以先重後輕惟其不欲遽於送終故既窆主人贈祝而先歸惟其欲速於求神故反哭則主人與有司視虞牲存疑鄭氏康成曰殯當為賓聲之誤也辭於賓謂告将葬啓期也孔氏穎達曰不奠不奠父也父喪在殯惟設母啓殯朝廟祖遣諸奠而不於殯宫為父設朝夕新奠其舊奠則猶存案父母殯於西階奠則在室朝夕朔奠雖同時並奠必先父後母孔意謂既啓則行者為急而居者為緩故啓殯遷祖祖奠遣奠皆奠母而父并不設朝夕及朔之奠如此是奠先輕也疑經謂母自啓及葬諸奠皆不設而遂行𦵏幷門外亦不哀次所謂葬先輕也葬母反然後設唘殯之奠以告扵父遂營父之葬事小記云父母之喪偕先𦵏母不虞祔待後事即葬後之虞祔亦先父而後母焉所謂奠先重也辭於殯即唘殯之奠鄭讀賔非孔子曰宗子雖七十無無主婦非宗子雖無主婦可也正義鄭氏康成曰族人之婦不可無統孔氏穎達曰此論宗子立後之事宗子大宗子也凡人年六十無妻不娶以陽道絶也而宗子領宗男扵外宗婦領宗女扵内事不可闕故雖七十猶娶也然此亦謂無子孫及有子孫而年㓜者若有子則傳家事扵子孫故曲禮七十老而傳凡無問而稱孔子曰皆記者失問也存疑陸氏佃曰參也魯有至誠焉故孔子有雖不問亦告之者吳氏澄曰因孔子有答曽子所問宗子事故附記此章曽子問曰將冠子冠者至揖讓而入聞齊衰大功之喪如之何孔子曰内喪則廢外喪則冠而不醴徹饌而埽即位而哭如冠者未至則廢冠埽並去聲下同齊音咨衰七回反凡齊衰並同正義鄭氏康成曰冠者謂賔及賛者内喪同門也不醴不醴子也其廢者喪成服則因喪而冠孔氏穎達曰此論冠子遭喪之事加冠必於廟廟在大門之内吉凶不可同䖏故内喪則廢也若喪在大門外則猶可加冠但平常吉時三加之後設醴以禮冠者今既聞喪遂三加而已不醴之也初迎賓時未知有喪醴及饌具已設故徹去醴與饌具又埽除冠之舊位令使潔新乃即位而哭如賔賛不至則廢而不冠也方氏慤曰門内之治恩掩義門外之治義斷恩禮以行義而已内喪則廢以義有所屈故也外喪則冠以義有所伸故也然而不醴以變常而為之殺也案饌禮賔之具士冠禮所謂禮賔以一獻之禮也子可不醴賔不可不禮此言徹饌或饌設而賔聞有喪則辭之而即出與為位而哭亦為其喪家逺若近則就其家哭之矣如将冠子而未及期日而有齊衰大功小功之喪則因喪服而冠正義鄭氏康成曰及至也廢吉禮而因喪冠俱成人之服也孔疏冠是吉時成人之服喪冠是喪時成人之服故曰俱成人也孔氏頴達曰既答曽子之問遂言未及期日而有喪之禮徐氏師曽曰冠嘉事之重吉禮之始因喪而冠不可也未及期日而有喪齊衰期年耳大小功九月五月耳待除喪而冠未為遅也何必因喪而冠乎疑有闕誤案内則二十而冠左傳言國君十五生子冠而後生子是冠之年無定也夏小正二月綏多女士注謂可冠昏而士冠禮言夏葛屨冬皮屨是冠之月無定也記言大功之末可以冠子已雖小功卒哭而冠是齊功之喪不因喪冠也上節已及期日尚不因喪而冠况未及期日乎則必俟除喪而冠惟父母之喪年㡬二十不忍以未成人之服服其親可因喪而冠故曰以喪冠者惟三年之喪可也成王年十四居喪眀年夏六月既葬乃冠此下文又有父殁而冠之禮是父母之喪亦不盡因喪而冠則齊功可知也義疑闕之除喪不改冠乎孔子曰天子賜諸侯大夫冕弁服於大廟歸設奠服賜服於斯乎有冠醮無冠醴大廟大音泰醮子妙反正義鄭氏康成曰酒為醮冠禮醴重而醮輕孔疏士冠禮適子冠扵阼乃醴之醴是古之酒故為重庶子則冠扵房外南面遂醮焉醮是後代之酒故為輕醮無酬酢醴亦無酬酢而異者醴三加之後總行一醴醮則每一加行一醮凡三醮也服賜服酌用酒尊賜也不醴眀不為改冠改冠當醴之孔氏頴達曰曽子疑問而孔子引類答之謂諸侯㓜弱未冠總角從事至當冠之年因朝天子天子賜以冕弁之服扵大廟之中榮君之賜歸設奠祭扵己宗廟此時身服所賜之服但行冠醮以相燕飲無冠醴以禮受服者之身所以然者以初冠則當用醴今既受服於天子不可更改為初冠之禮法也然則既因喪而冠不可除喪更改冠矣張氏曰冠為嘉事之重惟因喪而冠及諸侯大夫賜冠於天子孤子冠則禮殺餘不得輕廢也存疑孔氏穎達曰夏小正冠用二月假令正月遭喪則二月不得因喪而冠服喪猶用童子禮必待變除受服之莭乃可冠徐氏師曾曰冠禮三加而醮冠畢而醴諸侯大夫服賜服不用三加安得有醮而無醴乎疑當作有冠醴無冠醮案孔謂不得因喪而冠是已但年二十而正月遭父母喪便當用成人之服盖父母哀重不可謂我猶童子不杖不廬故曰以喪冠者惟三年之喪可也又案適子醴而庶子醮是醴重而醮輕也此受天子賜如何反以輕禮行之意醮者冠禮之通行而醴者父之所以重適子今天子賜諸侯冕服於大廟侯服之以拜賜則天子冠之矣歸榮君賜奠以告於祖考而因與羣臣燕樂之故不醴乎父没而冠則已冠埽地而祭於禰已祭而見伯父叔父而后饗冠者見音現正義鄭氏康成曰饗謂禮之也孔氏頴達曰孔子既答其問又釋父殁加冠之禮父兄戒賔冠之日主人紒而迎賔已冠之後埽地而祭扵禰廟已祭之後見伯父叔父乃饗冠賔及賛者黄氏震曰父殁而冠之禮因上不改冠者而併及之曽子問曰祭如之何則不行旅酬之事矣孔子曰聞之小祥者主人練祭而不旅奠酬扵賔賔弗舉禮也昔者魯昭公練而舉酬行旅非禮也孝公大祥奠酬弗舉亦非禮也正義鄭氏康成曰奠無尸孔䟽既葬形體已去鬼神事之奠是未葬以前形體猶在未忍鬼神待之也虞不致爵孔疏特牲禮尸止爵後主婦致爵扵主人主人致爵扵主婦虞至尸卒爵即禮畢小祥不旅酬大祥無無算爵彌吉也孔疏無算爵旅酬之後賔弟子兄弟之子各舉觶扵其長賔取觶酬兄弟之黨兄弟取觶酬賔之黨也孝公隠公之祖父孔疏世本孝公生惠公弗皇弗皇生隠公孔氏頴達曰旅酬者主人西階上獻賔賔卒爵又自酢北面酬賔賔受奠之薦南不舉主獻兄弟衆兄弟内兄弟畢賔乃取所奠觶扵阼階前酬長兄弟長兄弟扵西階前酬衆賔衆賔酬衆兄弟所謂旅酬也自此以後有無算爵禮小祥賔不舉所奠酬爵以行旅酬之禮而遂止也大祥乃得行旅酬而不得行此無算爵漸漸備禮仍未純吉也練祭但得致爵扵賔賔不合舉此爵而行旅酬昭公行之故曰非禮大祥彌吉得旅酬孝公不行故亦非禮方氏慤曰昭公不及扵禮孝公過扵禮然不及者近扵薄過者近扵厚故扵昭公曰非禮扵孝公曰亦而已曽子問曰大功之喪可以與扵饋奠之事乎孔子曰豈大功耳自斬衰以下皆可禮也曾子曰不以輕服而重相為乎孔子曰非此之謂也天子諸侯之喪斬衰者奠大夫齊衰者奠士則朋友奠不足則取扵大功以下者不足則反之與為並去聲下同正義鄭氏康成曰饋奠在殯時也曽子怪以重服而為人執事孔子言非謂為人謂扵其所為服也天子諸侯為君服者皆斬衰惟主人不奠大夫服斬衰者不奠辟正君也齊衰者其兄弟孔疏大夫子及屬臣皆斬衰則服齊衰惟兄弟耳父案齊衰中兼有伯叔及兄弟之子士服齊衰者不奠辟大夫也言不足者謂殷奠時孔氏頴達曰此論為死者服還得為死者饋奠之事曽子問已有喪可與他人饋奠否孔子據所服者答之言身有斬衰所為者斬衰身有齊衰所為者齊衰皆可與扵饋奠曽子不解孔子之㫖猶謂為他人疑其輕已喪服而重他人之饋奠孔子乃答云我之所言據所為服者饋奠非此為他人之謂也天子諸侯之喪子臣皆斬衰子為主人悲號思慕不暇執事皆使臣為奠大夫子及家臣皆斬衰子不親奠家臣辟天子諸侯不得饋奠故惟遣兄弟之服齊衰者奠士位卑不嫌敵君故遣僚屬奠僚屬弔服加麻則朋友也殷奠謂月朔之奠士無月半之殷奠也殷奠有牲牢黍稷禮大用人多故朋友不足則取小功緦麻者再不足則取前人執事者充之存疑彭氏㢘夫曰喪家殷奠非獨力所能辦族人身服其服親執其事非特助孝子所不及亦以伸己之情臣子扵君父亦若是而已如是而後稱扵其服天子諸侯之臣衆故重服方與其奠而輕者不必與士則徒屬無㡬故必朋友助之若不足則大功以下周而復始案如孔說則天子諸侯之臣無不服斬也如彭說則天子諸侯之臣服有輕重不必皆斬也彭說不知何據曽子問曰小功可以與扵祭乎孔子曰何必小功耳自斬衰以下與祭禮也曽子曰不以輕喪而重祭乎孔子曰天子諸侯之喪祭也不斬衰者不與祭大夫齊衰者與祭士祭不足則取扵兄弟大功以下者與去聲下同正義鄭氏康成曰祭謂虞卒哭時孔疏知與祭為虞卒哭時非練祥者士練祥之祭大功之服已除不得云取扵兄弟大功者其天子諸侯則得兼練祥以其時猶斬衰與祭也方氏慤曰與祭乃喪祭以服重者與祭正以重其喪也曾子反以為輕喪盖失之案上孔子眀言非此之謂則知我有重喪不可與他人之喪奠矣而曽子又問我之服更輕人之祭漸吉可與否而孔子仍以為所服者答之故曽子猶不喻也曽子問曰相識有喪服可以與扵祭乎孔子曰緦不祭又何助扵人正義鄭氏康成曰曽子問已有喪服可以助所識者祭否孔氏穎達曰孔子言有緦服尚不得自祭宗廟何得助他人祭乎以深非之方氏慤曰此所謂祭盖吉祭通論彭氏㢘夫曰前所論大功小功斬衰齊衰皆為之族而服其屬及為之臣而服其主也喪祭者孝子之所自盡而為之宗族為之臣子亦欲内盡其心外盡其職非舎己之哀而為人執事也若身有服而欲施於在外無服之相識則既無所施之恩又無所尊之義進退兩無據於所薄者厚而厚者反薄矣存疑熊氏安生曰謂身有緦服則不得自為父母虞祔卒哭祭此謂同宫緦則士為妾有子及大夫為貴妾是也若大夫士有齊衰大功小功緦麻同宫則亦不祭若異宫則殯後得祭故雜記云父母之喪将祭而昆弟死既殯而祭若同宫則雖臣妾葬而後祭虞祔亦然天子諸侯臣妾死於宫中雖無服亦不得為父母虞祔卒哭祭也天子諸侯適子死斬衰既練乃祭天子諸侯為適孫適婦則既殯乃祭以異宫故也案方氏謂此祭為吉祭良是若熊氏謂父母虞祔卒哭之祭恐非也盖緦之不祭以祭事吉喪事凶吉凶不可同䖏耳若未行卒哭之祭則猶哭不可謂吉也其曰以吉祭易喪祭者亦謂立尸有几筵較前為吉耳非謂竟行吉禮也虞與祔之祭不忍一日離可以臣妾之至卑舎父母之至尊歴三月而不虞不祔乎曽子問曰廢喪服可以與扵饋奠之事乎孔子曰說衰與奠非禮也以擯相可也說音脫相去聲正義鄭氏康成曰廢喪服謂新除喪服執事扵人之神為其忘哀疾也故曰非禮孔疏已新脫喪服吉祭禮輊吉凶不相干決其不可而問饋奠者饋奠是他人之重者已又新始脫衰凶事猶可相因也吳氏澄曰詳酌人情禮意緦功之喪除服後踰月可與人祭齊斬之喪則須自已行吉祭畢乃可為人執事也總論吳氏澄曰曽子初問自大功之喪始者盖以斬齊服重必不可執事扵人疑大功服稍輕或可與人殯奠而孔子答之如此則知有服之人但可為所服者奠而不可為他人奠矣曽子乃疑小功之服又輕扵大功或可與人殯奠後之喪祭而孔子復答之如此則知但可為所服者奠而小功亦不可為他人祭矣乃曽子又疑緦麻更輕扵小功或可與所識者之吉祭故孔子以不可答之以上三問論喪服則先大功次小功次緦麻由重而漸輕扵為人則先殯奠次喪祭次吉祭由凶而漸吉也曽子既知此遂疑新除喪之後或可與人饋奠乎孔子亦以為不可而但言其可擯相畧許而不深許之則不若幷擯相亦不為之為得也曽子問曰昏禮既納幣有吉日女之父母死則如之何孔子曰壻使人弔如壻之父母死則女之家亦使人弔父喪稱父母喪稱母父母不在則稱伯父世母壻已葬壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟使某致命女氏許諾而弗敢嫁禮也壻免喪女之父母使人請壻弗取而後嫁之禮也女之父母死壻亦如之正義鄭氏康成曰吉日娶女之吉日必使人弔者未成兄弟也父喪稱父母喪稱母禮各以其敵者也父使人弔之辭云某子聞某之喪某子使某如何不淑母則若云宋蕩伯姬聞姜氏之喪伯姬使某如何不淑凡弔辭一耳父母不在稱伯父世母弔禮不可廢也伯父母又不在則稱叔父母已葬必致命者不敢以累年之喪失嘉㑹之時也使人請請成昏也女免喪壻之父母亦使人請其已葬時亦致命孔氏穎達曰此論昏娶遭喪之事夫婦有兄弟之義壻免喪則應迎婦必湏女之父母請者以壻家前已致命也羅氏欽順曰壻弗取免喪之初不忍遽從吉也女氏再請壻曰有先人之好在又重之以嘉命敢不敬從而後嫁之所謂有故二十三年而嫁也鄧氏元錫曰初免喪何忍遽従吉女家終請而後娶之禮也不曰取而曰嫁若壻終不忍取而女家以婦歸之可謂曲而至矣案有吉日則已請期也請期出之男氏而女氏諾之男既請期而今失其期女既諾其期而今違其諾古之人重信故不可不致命也許諾而弗敢嫁順子之孝心也壻免喪可娶矣而請之必出自女氏餘哀未忘不汲汲於娶也壻弗取猶戚戚乎爾盖不親迎也案儀禮昏禮若不親迎則婦入三月然後壻見孔疏必三月如婦之三月廟見也鄭云三月廟見謂舅姑殁者其文女之父母使人請與壻之伯父使致命對壻弗取與女氏許諾對而后嫁之與而弗敢嫁對言前弗敢嫁至此而后嫁也正以伸前弗敢嫁之義存異孔氏穎達曰女之父母死亦葬後致命男氏許諾而不敢娶女免喪壻之父母使人請女家不許壻而後别取禮也陽唱隂和壻父母使人請昏而女家得以不許者亦以彼初葬訖致命於己故也陳氏澔曰壻祥禫之後女之父母使人請壻成昏壻終守前説而不取而後此女嫁於他族辨正徐氏師曽曰舊説以而後嫁為别嫁他族愚謂有父母之喪而不嫁不取孝也除喪而嫁取禮也且自議昏至請期夫婦之義久定矣壻免喪而別取非義也女別嫁非貞也若謂恐其失時則三年不已失時乎張氏鶴門曰昏姻㝡重父命以父命所聘之婦父死遂背而弗取其謂之何曽子問曰親迎女在塗而壻之父母死如之何孔子曰女改服布深衣縞總以趨喪女在塗而女之父母死則女反迎去聲後放此縞古老反正義鄭氏康成曰布深衣縞總婦人始喪未成服之服女反奔喪服期孔氏頴達曰嫁服士妻褖衣大夫妻展衣卿妻鞠衣也深衣衣裳相連前後深邃縞白絹總束髪者長八寸女子在室為父箭筓髽衰三年今既在塗非復在室故知服期徐氏師曽曰壻父母死女改服以奔喪雖未成婦而婦之分已定也女父母死女改服而反不可奪喪而成昏也皆以教孝也女居壻家若今童婦皆除喪而後成昏餘論丘氏濬曰女已在塗聞喪尚反今乃有停喪嫁娶或因送葬舁歸者此何忍哉如壻親迎女未至而有齊衰大功之喪則如之何孔子曰男不入改服扵外次女入改服扵内次然後即位而哭曽子問曰除喪則不復昏禮乎孔子曰祭過時不祭禮也又何及扵初過古卧反正義鄭氏康成曰不聞喪即改服者昏禮重扵齊衰以下孔疏禮運三年之喪與新有昏期不使王制齊衰大功三月不従政是昏禮重扵齊衰以下也復猶償也過時不祭以重喻輕也孔疏祭是奉事鬼神故重昏禮是生人燕飲故輕反扵初謂同牢饋饗相飲食之道孔氏頴達曰改服男不入大門改其親迎之服服深衣扵門外之次女入大門改其嫁服服深衣扵門内之次然後就壻家為位而哭過時不祭謂四時常祭㷱氏云若喪祭及禘祫雖過時猶追而祭之曽子不問小功以下以小功輕不廢昏禮待昏禮畢乃哭若女家齊衰大功之喪女不反歸其改服即位與男家親同奔喪注言不見喪不改服者謂不改素冠而著免也其改吉服而著布深衣素冠則聞喪即改之存異黄氏乾行曰親迎未至猶未成昏也舅姑與廟猶未見也齊衰大功之喪與舅姑與廟孰重且除喪不復昏禮將苟合已乎終廢見舅姑與廟之禮乎案齊衰大功之喪一家衰麻哭踊而壻與婦盛服成昏苟有人心奚忍出此改服即位天理人情之至也若婦入門雖未成昏斷無不見舅姑之禮意既葬必深衣見舅姑除喪合卺不事陳設賛拜之儀耳鄭氏以不復者指飲食之道則非不見舅姑不廟見可知而以禮相見亦可知也孔子曰嫁女之家三夜不息燭思相離也取婦之家三日不舉樂思嗣親也三月而廟見稱来婦也擇日而祭扵禰成婦之義也離力智反見音現正義鄭氏康成曰思相離親骨肉也思嗣親重世變也三月廟見謂舅姑歿者也必祭成婦義者婦有供養之禮猶舅姑存時盥饋特豚扵室孔氏頴達曰不舉樂思已之嗣續其親是親將代謝感世之改變也舅姑存者當夕同牢之後明日婦執棗栗腶脩見於舅姑見訖舅姑醴婦醴婦訖婦以特豚盥饋盥饋訖舅姑饗婦更無廟見之事昏禮舅姑既殁婦入三月乃奠菜後更無祭舅姑事則此祭禰正謂奠菜廟見奠菜祭禰一事也所以必待三月者三月一時天氣既變乃可以事神也方氏慤曰不息燭夜不寢也相離之思無時而懈不舉樂晝不樂也嗣親之思無時而散張子曰古者三月而後廟見女家馬亦不去必三月而後反此則慎重服事祖考可以事宗廟不可以事宗廟於此決之女家然後反馬通論孔氏穎達曰舅姑有偏沒者崔氏云厥明婦盥饋於其存者三月廟見於其亡者此皆謂適婦若庻婦則不饋亦不廟見以共養統於適也昏禮唯云不饋不云不見則庻婦亦以棗栗腶脩見舅姑也熊氏云鄭義則從天子至士皆當夕成昏舅姑没者三月廟見若賈逵服䖍謂大夫以上無問舅姑在否皆三月廟見後乃始成昏故譏鄭公子忽之先配後祖謂季文子之如宋致女為三月始成昏與鄭義異也存疑孔氏穎達曰隠八年鄭忽先配而後祖鄭以祖為祖道之祭謂應先為祖道然後配合也案儀禮親迎之夕至衽席相連夫親脫婦之纓則成昏明矣賈服所云恐太不近情也然康成以後祖為祖道之祭則亦不然詩飲餞于禰是女嫁有祖男親迎無祖女祖逺行不反也男不祖娶婦即歸也楚公子圍言告於莊共之廟而来是娶亦必先告廟儀禮婦入三月然後祭行謂三月之内婦未廟見非謂親迎之初男不告廟也父醮子而命之迎曰往迎爾相承我宗事是告廟可知康成謂女道外成故重之而告廟男但取婦入室故輕之而不告廟則又非也取婦以為先祖後為社稷主而可謂輕乎曽子問曰女未廟見而死則如之何孔子曰不遷扵祖不祔扵皇姑壻不杖不菲不次歸葬扵女氏之黨示未成婦也菲音肺正義鄭氏康成曰遷朝廟也壻雖不備喪禮猶為之服齊衰孔氏穎達曰皇大也君也稱皇者尊之也以反葬扵女氏之黨故不遷柩而朝廟祔祭亦不祔扵皇姑廟壻為妻合服齊衰杖而菲屨及別止哀次今未廟見而死其壻唯服齊衰而已以未廟見不得舅姑之命實已成婦示若未成婦然見不敢自専也雖歸葬女氏之黨其女之父母為之降服大功以壻為之服齊衰期非無主也案此未廟見而死歸葬扵女氏之黨謂舅姑皆沒者耳若舅姑存則眀日已見扵舅姑矣舅姑醴婦已授之室矣不可謂未成婦也當葬扵男之黨且婦之祔廟舅主之也若舅姑皆沒而又未三月未從扵祭是舅姑以上皆不知此婦也故不祔亦不得已焉耳若三月然後反馬恐又是一義不與廟見同曽子問曰取女有吉日而女死如之何孔子曰壻齊衰而弔既葬而除之夫死亦如之正義鄭氏康成曰未有期三年之恩也孔疏壻扵女未有期之恩女扵壻未有三年之恩故既葬而除方氏慤曰以其嘗請期故齊衰而弔然未成婦也故既葬而除之徐氏師曽曰齊衰而弔義之重也既葬而除情之輕也存疑鄭氏康成曰女服斬衰孔䟽以壻服齊衰故知女服斬衰案坊記言親迎女之父母承子以授壻壻親受之扵其父母昏禮壻降自西階女從之故郊特牲言男帥女女從男夫婦之義由此始前女之父母死壻使人弔父喪稱父母喪稱母其致辭曰不得嗣為兄弟不稱夫婦嫌也豈女死而壻親弔獨無嫌乎女嫁三月未廟見猶曰未成婦豈未娶而親哭之若成婦乎昏禮父親醮子而命之迎曰往迎而相此時非特未親受扵女之父母幷未受父親迎之命如之何遽婦之而親哭之乎玩本文無親弔字即親弔亦必父命之耳若女斬衰而弔則夲文所無鄭氏臆斷即孔疏亦不䏻曲為之証也盖亦如之者如其齊衰而弔既葬而除婦人不貳斬在家從父非所自主也然眀儒於未嫁之女為夫守莭者斥為専以身許人則又不然男未娶女未嫁總聴命於父前之納徵而受請期而諾者非父命乎則壻死而父改字他族亦父有二命而女守貞不字亦女固守初命而不從後命不得謂女専以身許人也大約聖人立制自有中道為可通也為可久也男有再娶之文女無再嫁之道非寛於男刻於女盖男子之娶以供父母以承宗嗣有必不可缺者若女則從一而終耳女果貞烈不從後命即斬衰奔喪誓死不二庸何傷且女死男尚為之齊衰則知三年喪畢斷無女父母請而男舎之别娶男父母請而女舎之别嫁之理既嫁三月未廟見尚曰未成婦則知方有吉日亦斷無女死而男不待父命男死而女不待父命親往哭之之禮且未廟見即曰未成婦則所謂昏禮之不復初亦斷非不見舅姑不廟見而使之終身不成婦也凡此皆說禮者之過禮之正文原不然也曽子問曰喪有二孤廟有二主禮與孔子曰天無二日土無二王嘗禘郊社尊無二上未知其為禮也昔者齊桓公亟舉兵作偽主以行及反蔵諸祖廟廟有二主自桓公始也喪之二孤則昔者衛靈公適魯遭季桓子之喪衛君請弔哀公辭不得命公為主客入弔康子立扵門右北面公揖讓升自東階西郷客升自西階弔公拜興哭康子拜稽顙扵位有司弗辯也今之二孤自季康子之過也亟超吏反鄉許亮反正義鄭氏康成曰時有二孤二主者故怪問之而孔子以尊喻卑見不可二也偽猶假也舉兵以遷廟主行無則主命為假主非也辯猶正也若康子者君弔其臣之禮也孔疏喪大記大夫既殯君弔主人門右北面哭拜稽顙鄰國之君弔君為之主康子拜稽顙非禮也當哭踊而已靈公先桓子以魯哀公三年夏卒桓子以三年秋卒當是出公孔氏穎達曰此論喪不得有二孤廟不得有二主之事嘗禘郊社雖衆神並在猶先尊後卑一一祭之不一時總祭君弔賔主尊卑宜敵故君為主唯君答拜方氏慤曰喪有孤為哀之主廟有主為神之依喪有二孤則莫適為主廟有二主則莫適為依是豈禮之意哉存異孔氏穎達曰天有二日則草木枯萎土有二王則征伐不息案天統陽日者陽之主也土載民王者民之主也是皆道之自然嘗禘皆祫於太廟而總太祖之子孫則以始祖為主南北郊亦以日月星辰山川從祀而總一天地之大用則以上帝皇祇為主是亦禮之自然也泛陳之以無二尊眀無二主無二孤之義若如孔説豈天恐草木枯萎而不可有二日乎曽子問曰古者師行必以遷廟主行乎孔子曰天子廵守以遷廟主行載扵齊車言必有尊也今也取七廟之主以行則失之矣當七廟五廟無虚主虚主者唯天子崩諸侯薨與去其國與祫祭扵祖為無主耳吾聞諸老耼曰天子崩國君薨則祝取羣廟之主而蔵諸祖廟禮也卒哭成事而后主各反其廟君去其國大宰取羣廟之主以從禮也祫祭扵祖則祝迎四廟之主主出廟入廟必蹕老耼云守手又反齊齋同從去聲正義鄭氏康成曰齊車金路也孔疏凡祭祀乘玉路齊車則降一等故金路老耼古夀考者之號與孔子同時案史記老耼陳國苦縣賴鄉曲仁里人為周柱下史或為守蔵吏荘子稱孔子與老耼對言知同時也天子崩諸侯薨則蔵羣廟主扵祖廟象有凶事者聚也卒哭成事先祔之祭名也君去其國以廟主從鬼神依人者也祝迎廟主祝接神者也蹕止行也皇氏侃曰載新遷廟之主孔氏穎達曰此以下論師出載主及無主之事生人有凶事則聚而謀故象之至卒哭之眀日則新主祔祭扵祖故祖主先反其廟也三年祫祭扵祖則祝迎髙曽祖禰四廟主扵太祖廟祭之案時祭亦然不必三年大祫天子則迎六廟之主此言四據諸侯也天子主長尺有二寸諸侯尺出廟謂出已廟往太祖廟入廟謂由太祖廟還入已廟也主出入當蹕止行人若主入太廟中則不蹕以壓扵尊也若有喪及去國無蹕老耼云結上義也方氏慤曰甘誓曰用命賞于祖則以主行可知然必以遷主者以廟不可虚廟之有主猶國之有王也崩薨去國無主示神休戚之同也祫祭以合食而示反本也非是可虚乎載以齊車示有齊敬之心也曽子問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯将出必以幣帛皮圭告于祖禰遂奉以出載扵齊車以行每舎奠焉而后就舎反必告設奠卒斂幣玉蔵諸兩階之間乃出盖貴命也舎並去聲正義鄭氏康成曰每舎奠以脯醢而後就舎禮神乃敢即安也孔疏以在路不可恒設牲牢故知以脯醢所告不以出即埋之案所告疑當作所奠幣帛皇氏侃曰有遷主者直以幣帛告神不将幣帛以出行即埋之兩階前無遷主乃加以皮圭告扵祖禰遂奉以出熊氏安生曰每告一廟以一幣玉告近祖者不以出埋之告逺祖者即載以行還時以所載者告事畢則埋扵逺祖兩階間近祖以下告祭而已不陳幣玉孔氏頴達曰載幣以象受命故云主命朱氏申曰貴命以祖禰之命為貴也奉祖禰之命為主見齊桓之作偽主非也天子出謂廵守諸侯出則見天子與諸侯相見也載幣帛所以代遷主黄氏震曰主命者主在廟而受其命以行不以主行也子㳺問曰喪慈母如母禮與孔子曰非禮也古者男子外有傅内有慈母君命所使教子也何服之有昔者魯昭公少喪其母有慈母良及其死也公弗忍也欲喪之有司以聞曰古之禮慈母無服今也君為之服是逆古之禮而亂國法也若終行之則有司將書之以遺後世無乃不可乎公曰古者天子練冠以燕居公弗忍也遂練冠以喪慈母喪慈母自魯昭公始也喪平聲下同與音餘少喪皆去聲正義鄭氏康成曰如母謂父卒三年也子㳺意以國君亦當然禮所云者乃大夫以下父所使妾養妾子也何服之有言無服也此子謂國君之子也大夫士之子為庶母慈已者服小功父卒乃不服慈母無服據國君也良善也謂之慈母固為其善國君之妾子扵禮不服也公之言非也昭公年三十乃喪齊歸是不少又無戚容孔疏襄公三十一年薨左傳云昭公十九猶有童心是即位時年十九也十一年母齊歸薨而無慼容是三十非少孤也安能不忍扵慈母此非昭公眀矣未知何公孔疏家語云孝公有慈母良鄭不見家語故云未知何公孔氏穎達曰此論諸侯喪慈母無服之事喪服傳三年章云慈母如母者何也妾之無子者妾子之無母者父命妾曰女以為子命子曰女以為母若是則生養之終其身如母死則喪之三年此謂大夫以下天子諸侯則不服庶母也小功章君子子為庶母慈已者傳云君子子者貴人之子也為庶母何以小功也以慈已加也鄭注言君子子則父在也若父歿則不服小功仍服庶母緦若庶母不慈已者雖父在亦服緦慈母有他故使賤者代之謂之乳母死則服之三月士之適子無母乃命妾慈已亦為之小功辨正吳氏澄曰慈母有二其一有服者大夫士之子無母父使庶母之無子者以為子儀禮喪服傳齊衰三年章所稱慈母如母亦齊衰三年也若小功章云為庶母慈已者但名為庶母慈已不名慈母矣其一無服者國君子生擇諸母使為子師其次為慈母其次為保母内則及此條孔子所稱者是也後世不審或執喪慈母如母之文而施於君命所使教子之慈母則失矣故子游疑其禮而孔子特眀君所使教子者而告之也存疑鄭氏康成曰天子練冠以燕居盖謂庶子王為其母孔疏服問云庶子為後為其母緦春秋有以小君服之者春秋母以子貴皇氏云若適小君沒則得伸若小君猶在則其母壓屈故練冠也所以不同大夫士為後著緦麻必練冠者大夫士為母本應三年以為後壓屈故降為緦麻王侯庶子為母本練冠故今應練冠此乃異代之法若周則為其母緦天子諸侯士一也經無眀文故鄭言盖以疑之案父母之喪自天子下達期以下諸侯絶大夫降此謂天子諸侯絶旁期也况於君使教子之慈母乎若庶子生母之服則有不可一例言者禮子為母服齊衰三年父在則期此母為父厭屈無貴賤一也妾之子士以下其子為其母如母大夫則父在為其母大功父卒亦三年諸侯以上則父在為其母無服父卒為之大功此庶子異於適貴與賤異也此章夲文言古者天子練冠以燕居初不言其生母鄭以儀禮記推之疑其為生母孔以古者字指為異代之制然考儀禮喪服記云公子為其母練冠麻衣既葬除之傳曰何以不在五服之中也君之所不服子亦不敢服也則此乃諸侯妾子為國君所厭之降服非國君自為其生母更非言天子為其生母也大功章云公之庶昆弟為其母大功傳曰先君餘尊之所厭不得過大功也緦麻章云庶子為父後者為其母緦傳曰與尊者為一體不敢服其私親也有死於宫中者則為之三月不舉祭因是以服緦也然則諸侯之妾子父卒為其母大功而為後則惟服緦以此推之則庶子王亦當用緦之正服而不當以五服外君在尊厭之降服服之眀矣夫親喪下達庶子之生母君在既厭於君君卒又以餘尊厭而僅為之大功為君之後又以喪者不祭而為之緦所抑已多矣而謂庶子王反靳為之練冠以居幷在五服之外乎公羊傳言母以子貴以父妾而尊為君夫人以亂嫡妾之分此禮所不與也而疏引之滋之惑矣家語作子游問曰諸侯之世子喪慈母禮與下述公言古者天子喪慈母練冠以燕居其文甚眀今鄭乃謂庶子王為其母練冠以居何哉若皇氏為小君厭屈之說尤非是禮有庶子厭於父無厭於適母自趙岐誤注孟子而諸儒沿之即朱子孟子集註猶未免沿誤矣欽定禮記義疏卷二十六
