body:
  text: 雜記下第二十一之二卒哭而諱王父母兄弟世父叔父姑姊妹子與父同諱母之諱宮中諱妻之諱不舉諸其側與從祖昆弟同名則諱正義鄭氏康成曰自卒哭而鬼神事之尊而諱其名王父母以下之親諱是謂士也孔疏是士故諱王父若是庶人子不逮事父母則不諱王父母也父為其親諱則子不敢不從諱孔疏據王父母世父叔父及姑已不合諱者言之父之兄弟及姊妹已為合諱不假從父而諱也天子諸侯諱羣祖孔疏天子七廟諸侯五廟故知諱羣祖母之所為其親諱子孫於宮中不言妻之所為其親諱夫於其側亦不言也孔疏於宫中逺處得言之孝子聞名心瞿凡不言人諱者亦為其相感動也子與父同諱則子可盡曾祖之親也孔疏父為王父諱於子則為曾祖父之伯叔及姑則是子曾祖之親故云子可盡曾祖之親也從祖昆弟在其中孔疏從祖昆弟共同曾祖之親於父輕不為諱孔疏從祖昆弟於父言之是父之同堂兄弟子也父服小功不為之諱已又不得從父而諱與母妻之親同名重則諱之孔疏母與妻二者之諱與已從祖昆弟同名則為之諱不但宮中旁側其在餘處皆諱之也孔氏穎達曰此論親戚死亡諱辟名之事卒哭前猶以生禮事之卒哭後去生漸逺故諱其名兄弟謂父之兄弟於己為伯叔正服期父亦為之期是子與父同有諱也世父叔父是父之世父叔父於己是從祖正服小功姑謂父之姑於己為從祖姑在家正服小功出嫁緦麻二者皆不合諱以父為之諱故已從父而諱也姊妹謂父姊妹於己為姑在家正服期出嫁大功九月是已與父同為之諱此等是子與父同諱也吳氏澄曰己之從祖是弟於父為子行屬卑且疏故不諱若與母妻之親名同而相重則為母妻之親諱而因為之諱爾非正為從祖昆弟而諱也存異孔氏穎達曰王父母謂父之王父母於己為曾祖父母正服小功不合諱以父為之諱子亦同父諱之案卒哭而諱令於宮曰舍故而諱新髙祖以上親盡不復諱是高祖曾祖禮當諱孔謂父之王父母於己為曾祖父母正服小功不合諱恐非也又其所謂正服小功者從至親以期斷推之謂父當期祖當大功曾祖當小功耳聖人制禮定父斬衰三年祖齊衰期曾祖齊衰三月以明尊親之大義可云父正服期當以期為例乎則其比例亦非也或曰諱及髙曾者天子諸侯禮大夫三廟諱不及髙適士二廟諱不及曽尤非以喪冠者雖三年之喪可也既冠於次入哭踊三者三乃出冠古亂反下同三息暫反正義鄭氏康成曰言雖者明齊衰以下皆可以冠也始遭喪以其冠月則喪服因冠矣非其冠月待變除卒哭而冠次廬也雖或為唯孔氏穎達曰自此以下明遭喪冠取之節將冠值喪當成服時因喪服加冠冠於次謂加冠於廬次之中若齊衰以下加冠於次舍之處冠後入於喪所哭而跳踊每哭一節三踊如此者三凡九踊乃出就次所曽子問曰將冠子未及期日有齊衰大功小功之喪則因喪服而冠言未及期日知冠月則可冠也次廬也據重服而言胡氏銓曰夏小正冠用二月若正月遭喪則二月不得因喪而冠必待變除受服之節存疑郝氏敬曰冠吉禮也元首之服成人之始豈可凶服哭踊行之雖三年之喪可者亦不得已之辭非禮之正詳見曽子問案喪服曰成服如郝說則當加冠之期竟可因吉凶之小嫌而廢成服之大禮乎未確大功之末可以冠子可以嫁子父小功之末可以冠子可以嫁子可以取婦己雖小功既卒哭可以冠取妻下殤之小功則不可取七住反正義鄭氏康成曰此皆謂可用吉禮之時下殤小功齊衰之親除喪而後可為婚禮孔疏下殤小功謂本齊衰重服降在小功不可冠嫁其餘小功可以冠取若其齊衰長殤中殤降在大功理不可冠嫁矣凡冠者其時當冠則因喪而冠之孔疏經云大功小功之末可以吉冠則大功小功之初當冠之時則因喪服而冠之鄭因前經三年之喪可冠於此復明輕喪亦可冠也孔氏穎達曰大功謂已有大功之喪取婦有酒食之㑹集鄉黨僚友渉近歡樂故小功之末乃可得為也經文大功據已身不云父小功據其父不云身互而相通故鄭注同之謂父及已身俱有大功之末小功之末父是大功之末己亦是大功之末乃得行此冠子嫁子父小功之末己亦小功之末可以嫁取必父子俱然乃得行事故云必偕祭乃行知父子俱大功小功者若姑姊妹出適父子俱為大功從祖兄弟父子俱為小功其服同也若父齊衰子大功則不可若父大功子小功可以冠嫁未可取婦必父子俱小功之末可以取婦若父小功已緦麻灼然合取可知范氏宣曰案禮大功之末可以冠子嫁子此於子已為無服也以已尚在大功喪中猶未忍為子取婦近於歡事也故於冠子嫁子則可取婦則不可矣已有緦麻之喪於祭亦廢婚亦不通矣况小功乎陸氏佃曰大功之末不言可以取婦不可以取婦也通論范氏宣曰五服之制各有月數月數之内自無吉事故曰衰麻非所以接弁冕也春秋左氏傳齊侯使晏子請繼室於晉叔向對曰寡人之願也衰絰之中是以未敢請時晉侯有少姜之喪耳禮貴妾緦而叔向稱在衰絰之中推此而言雖輕喪之麻猶無婚姻之道也而敦本敬始之義每於婚冠見之矣雜記曰大功之末可以嫁子小功之末可以取婦而下章云已雖小功卒哭可冠取妻也二文誠為相發尋此言為男女失時或繼嗣未立者耳非通例也存疑鄭氏康成曰父大功卒哭而可以冠子嫁子小功卒哭而可以取婦己大功卒哭而可以冠子小功卒哭而可以取妻必偕祭乃行也孔氏穎達曰末謂卒哭之後張子曰疑大功之末已下十二字為衍宜直云父大功之末云父大功則是己小功之末而已之子緦麻之末故可以冠取也盖冠取者固已無服矣凡卒哭之後皆是末也所以言衍者以上十二字義無所附著已雖小功既卒哭可以冠取妻是已自冠取妻也陸氏佃曰父小功之末謂小功服之在父行者若從祖父母從姊妹從祖母從祖祖姑是也大功之末在卑行者若孫及從父兄弟從父姊妹兄弟之子婦是也已雖小功既卒哭可以冠取妻若父小功未卒哭亦不可辨正陳氏澔曰末服之將除也舊說以末為卒哭然大功卒哭後尚有六月恐不可言末小功既言末又言卒哭則末非卒哭明矣案父小功謂己服輕而父小功如已為族曽祖父母緦而父皆小功也已小功謂父服輕而已小功如已為從父兄弟之子外祖父母小功而父皆緦從母小功而父無服也言齊衰以上服重必不可行冠昏諸嘉禮若大功至九月之末則服本輕於期而月數亦將盡則冠子嫁女或可行之而取妻猶不可為冠嫁施之子而取則身之也至於小功則服更輕疑冠嫁取無不可行然猶有辨焉家統於尊父有小功之服則亦未可行必待父小功之末乃行也若父服輕而已小功如從父兄弟之子其屬已卑外祖父母從母則外族異姓雖卒哭亦可行不待小功之末也惟下殤之小功則由期而降其服本重斷不可矣鄭注以末與卒哭為一孔疏以父小功已小功為一似皆未分明凡弁絰其衰侈袂正義鄭氏康成曰侈猶大也弁絰服者弔服也其衰錫也緦也疑也袂之小者二尺二寸大者半而益之則侈袂三尺三寸孔氏穎達曰弔服首著弁絰身著錫衰緦衰疑衰存疑孔氏穎達曰此三衰大夫以上侈其袂若士則不侈也周禮司服有𤣥端士不侈故稱端案不侈稱端似己但司服𤣥端固為士服而玊藻所謂朝𤣥端夕深衣者亦大夫士共有之服也若謂士不侈故稱端則侈袂之大夫何以亦曰端以臆為説其病如此父有服宫中子不與於樂母有服聲聞焉不舉樂妻有服不舉樂於其側大功将至辟琴瑟小功至不絶樂與音預閒音問又如字辟音避正義鄭氏康成曰宫中子與父同宫者也禮由命士以上父子異宮不與於樂謂出行見之不得觀也至來也辟琴瑟亦所以助哀崔氏靈恩曰父有服齊衰以下之服也若重服則期後猶有子姓之冠自不當與於樂陸氏佃曰此一節自士上達父有服有作樂者宫中雖不聞子不敢與也母有服聲聞焉不敢舉樂妻有服於其側不舉爾所謂不與於樂非直不舉也陳氏祥道曰父尊而不親故父有服宮中子不得與於聞樂况舉樂乎母親而不尊故母有服不得以舉樂雖聲聞焉可也妻敵體而已故妻有服不舉樂於其側不於其側舉之可也君子無故不徹琴瑟大功之親有服将至則有故矣雖辟琴瑟可也未至則不必辟矣小功之親有服雖不至絶樂其将至又可知矣雖然小功至不絶樂若夫於己有小功之喪議而及樂又禮之所棄也存疑孔氏穎達曰此謂命士以下與父同宮者若異宮則得與於樂辨正黄氏幹曰父方持服在家未出而從吉之時其子或輕而先除或親盡而無服以其父方在喪服哀戚未終不可與於樂也亦如從父諱於先祖之禮也次云母有服妻有服亦謂方在服制之中亦隨其降殺非謂命士而上異宮父有喪服子可觀聽音樂者也案父所為三年斬母三年齊或期妻亦正期則父母妻之所服亦我之所有服降殺止一等耳故我服即除而父母妻有服必以其哀為哀順其志也然而父尊母親妻敵又各有等焉宮中廣言之不止聲聞之地也聲聞稍逺不止其側也至於大功則稍疏矣彼之所戚或我無服或我小功緦而服已除故惟將至為之辟琴瑟耳孔謂異宮之子得舉樂則宮近者或且聲聞奈何黃氏辨之極是然訓父持服在宮中亦鑿也以宮中聲聞其側例㸔自明姑姊妹其夫死而夫黨無兄弟使夫之族人主喪妻之黨雖親弗主夫若無族矣則前後家東西家無有則里尹主之或曰主之而附於夫之黨正義鄭氏康成曰此謂姑姊妹無子寡而死也夫黨無兄弟無緦之親也其主喪不使妻之親而使夫之族人婦人外成主必冝得夫之姓類也里尹主之喪無無主也里尹閭胥里宰之屬孔疏周禮六鄉之内二十五家為閭閭置一胥中士也六遂之内二十五家為里里置一宰下士也王度記曰百戸為里里一尹其祿如庶人在官者孔疏洛誥傳古者八家為鄰三鄰為朋三朋為里鄭云此虞夏時制王度記淳于髠等所說或云此是殷制諸侯弔於異國之臣則其君為主孔疏諸侯之臣在國而死他國君來弔則君為主死者雖至親不得為主里尹主之亦斯義妻之黨自主之非也夫之黨其祖姑也孔氏穎達曰此明姑姊妹在夫家而死無後使外人為主之事或人之說云妻黨主之而祔祭之時夫之黨主之非也通論朱子曰古法既廢鄰家里尹决不肯祭他人之親則從宜而祀之別室其亦可也陸氏佃曰言妻之黨雖親弗主苟夫無族矣雖親朋友至於祔而止可也喪服小記曰大功者主人之喪有三年者則必為之再祭朋友虞祔而已麻者不紳執玉不麻麻不加於采正義鄭氏康成曰吉凶不相干也麻謂絰也紳大帶也喪以要絰代大帶也麻不加於采衣采者不麻謂弁絰者必服弔服是也采𤣥纁之衣孔氏穎達曰言著要絰者不得復著大帶尋常執玉行禮不得服衰麻也案聘禮已國君薨至於主國衰而出注云於是可以凶服將事似行聘禮執玉得服衰絰者彼謂受主君小禮得以凶服若行聘饗大事則吉服也弁絰之麻不得加於𤣥衣纁裳之采國禁哭則止朝夕之奠即位自因也正義鄭氏康成曰禁哭謂大祭祀時雖不哭猶朝夕奠自因自用故事也孔疏孝子於殯宫朝夕奠之時即阼階下位自因其故事而設奠也存疑陸氏佃曰此一節宜承如始即位之禮脫爛在是言若國禁哭則之他室不哭其入奠與即位猶自因也童子哭不偯不踊不杖不菲不廬菲扶味反正義鄭氏康成曰童子未成人不能備禮也當室則杖孔疏案問喪云童子當室則免而杖當室謂十五以上若世子生則杖故曽子問云子衰杖成子禮是也案菲即菅屨也斬衰菅屨外納陸徳明作屝釋文云本又作菲孔子曰伯母叔母疏衰踊不絶地姑姊妹之大功踊絶於地如知此者由文矣哉由文矣哉正義鄭氏康成曰由用也言知此踊絶地不絶地之情者能用禮文哉能用禮文哉美之也伯母叔母義也姑姊妹骨肉也存疑陸氏佃曰疏衰大功文也踊絶不絶情也伯叔母之喪文至而情不至姑姊妹之喪文不至而情至知此者則凡於禮知由於内矣故曰如知此者由文矣哉若夫徒文具而無至誠惻怛之實失是矣吳氏澄曰知此二者則知哀之淺深由乎其中之情也豈由乎外之文矣哉案子游言禮有微情者有以故興物者徑情直行戎狄之道是孔子稱其由文正美其不直情徑行鄭注是也陸吳說正相反泄柳之母死相者由左泄柳死其徒由右相由右相泄柳之徒為之也相息亮反正義鄭氏康成曰亦記失禮所由始也泄栁魯穆公時賢人也相相主人之禮孔氏穎達曰相主人之禮法相者由左其徒由右失禮也陸氏佃曰由右相雖非古在可以然之域凡經言自某始記失禮所由始也即言為之君子或有取焉天子飯九貝諸侯七大夫五士三飯扶晚反正義鄭氏康成曰此盖夏時禮也周禮天子飯含用玉孔氏穎達曰典瑞云大喪共飯玉含玉禮戴記天子飯以珠含以玉諸侯大夫士飯以珠含以貝皆非周禮並夏殷之法左傳成十七年子叔聲伯夢食瓊魂哀十一年齊陳子行命其徒具含玊此等皆是大夫而以珠玊為含者以珠玊是所含之物故言之非謂當時實含用珠玉也通論陸氏佃曰士喪禮貝三實於笲此士三之證也案珠玉曰含玉貝亦曰含則散言之飯含通也周禮典瑞天子飯含用玉典瑞言玉職也貝非所言大戴禮云飯以珠珠有以玉為之者玉府所謂珠玉是也稽命徴曰天子飯以珠含以玉諸侯飯以珠含以璧相備也存疑胡氏銓曰檀弓飯用米貝鄭不疑於夏殷獨疑此何也案周禮春官典瑞大喪共飯玉含玉則天子用玉儀禮士喪貝三實於笲則士用貝與大戴記同是周禮無疑檀弓米貝或舉下以該上故鄭於彼不疑此明言天子至士故鄭舉周禮以正之耳而疑為夏禮不必舉彼駁此注又析言之則碎玉以雜米曰飯琢為圭璧以拄頰及中曰含合言之則通稱也士三月而葬是月也卒哭大夫三月而葬五月而卒哭諸侯五月而葬七月而卒哭士三虞大夫五諸侯七正義鄭氏康成曰尊卑恩之差也天子至士葬即反虞孔氏穎達曰大夫以上葬與卒哭異月者以其位尊念親哀情於時長逺士職卑位下禮數未申故葬罷即卒哭檀弓云葬日虞弗􅃘一日離也不顯尊卑是貴賤同然陸氏佃曰大夫三月而葬容同位至諸侯五月而葬容同盟至天子七月而葬容同軌至左傳云同軌畢至著同盟以下雖至有不畢也黄氏震曰葬有遲速㑹葬者有逺近也卒哭亦與之遲速以未葬有朝夕奠也案左傳疏天子七月而葬九月而卒哭鄭謂卒哭別有祭敖繼公謂末虞即卒哭非別有祭夫諸侯七虞止十二日天子九虞亦十六日止矣安能越二月乎是當別有祭也存疑陸氏佃曰士踰月而葬容外姻至諸侯使人弔其次含襚賵臨皆同日而畢事者也其次如此也正義鄭氏康成曰言五者相次同時孔氏穎達曰諸侯使人弔鄰國先行弔禮宣君命人以飲食為急故含次之食湏衣故襚次之有衣即湏車馬故賵次之案此節當在弔者即位章首卿大夫疾君問之無算士壹問之君於卿大夫比葬不食肉比卒哭不舉樂為士比殯不舉樂比必利反為于偽反正義孔氏穎達曰案喪大記君於大夫疾三問之此云無算謂有師保恩舊之親三問謂君自行無算謂遣使也彭氏曰比即比及之比不食肉則不舉樂不舉則容食肉矣升正柩諸侯執綍五百人四綍皆銜枚司馬執鐸左八人右八人匠人執羽葆御柩大夫之喪其升正柩也執引者三百人執鐸者左右各四人御柩以茅葆音保引以愼反正義鄭氏康成曰升正柩者謂將葬朝於祖正棺於廟也五百人謂一黨之民孔疏周禮注六鄉主六引六遂主六紼此應舉六遂而言一黨取人數耳諸侯之大夫邑有三百戸之制孔疏小國中下大夫大國下大夫皆三百戸論語奪伯氏騈邑三百綍引同耳廟中曰綍在塗曰引互言之御柩者居前道止之大夫士皆二綍孔氏穎達曰此明諸侯大夫送葬正柩之禮執鐸之差将葬朝於祖廟柩升廟之西階既夕禮云升自西階正柩於兩楹間是也銜枚止諠囂也司馬夏官主武故執金鐸率衆左右各八人夾柩以號令於衆也匠人工人也以鳥羽注於柄頭如盖謂之羽葆匠人主宮室故執羽葆居柩前御行於道指揮為進止之節也周禮喪祝御柩謂王禮此諸侯禮也通論方氏慤曰載柩有車車有副焉而載柩者為正大夫殺禮於諸侯故以茅取其色白宜於凶禮且以表哀素之心焉楚軍前茅亦以兵凶器也陳氏澔曰朝祖用輁軸載柩柩有四綍枚形似箸兩端有小繩銜於口而繫於頸後則不能言五百人皆用之葆形如盖以羽為之道塗有低昂傾虧則以所執者為抑掦左右之節使執綍者知之也茅以茅為麾也孔子曰管仲鏤簋而朱紘旅樹而反坫山節而藻梲賢大夫也而難為上也晏平仲祀其先人豚肩不掩豆賢大夫也而難為下也君子上不僭上下不偪下正義鄭氏康成曰難為上言其僭天子諸侯鏤簋刻為蟲獸也冠有筓者為紘紘在纓處兩端上屬下不結旅樹門屛也反坫反爵之坫也山節欂櫨刻之為山梲侏儒柱畫之為藻文難為下言其偪士庶人也豚俎實豆徑尺言幷豚兩肩不能覆豆喻小也孔疏豚在俎不在豆豆形小尚不掩之明豚小之甚孔氏穎達曰此明奢儉失禮之事祭義天子冕而朱紘諸侯青紘管仲大夫當緇組紘與士同當時謂管仲是大夫之賢者尚為僭上是他人在管仲之上者皆被僭之故云難為上晏平仲亦大夫之賢者猶尚偪下是在平仲之下者恒被平仲偪也是難為下通論馬氏睎孟曰管仲能九合諸侯而不能治一身晏子能一言省刑而不能善一祭故言其功與才而孔子稱之言其徳禮則曾西所不為孟子所不與也以是知非有徳不可以知禮非有禮不足以成徳徳禮既備豈有失哉婦人非三年之喪不踰封而弔如三年之喪則君夫人歸夫人其歸也以諸侯之弔禮其待之也若待諸侯然夫人至入自闈門升自側階君在阼其他如奔喪禮然正義鄭氏康成曰踰封越境也君夫人歸奔父母喪也若待諸侯謂夫人行道車服主國致禮入自闈門升自側階不自同於女賔也宮中之門曰闈門為相通者也或為帷門側階亦旁階其他謂哭踊髽麻孔氏穎達曰此明諸侯夫人奔父母喪女子出適為父母期云三年者以本親言也案喪大記夫人弔於大夫士入自大門升自正階今此不然以女子不同於女賔之疏也主國之君在阼階待之不降階而迎言其他如奔喪禮嫌夫人位尊與卿大夫妻奔喪禮異故明之通論李氏格非曰穀梁傳曰婦人既嫁不踰境非三年之喪則雖衛之亡而許穆夫人不得唁者大夫止之以義故也案儀禮女嫁反在父之室為父三年賈疏曰若天子之女嫁於諸侯諸侯之女嫁於大夫嫁為夫斬仍為其父不降知者以其外宗内宗及與諸侯為兄弟者皆斬也如賈疏則女子亦有出嫁為父不降而服三年不僅以本親言矣然卿大夫為君斬妻從服為君期諸侯為天子斬夫人從服為天子期内宗外宗之女既嫁皆從夫爵則皆期究未有為父仍服三年不降者不知賈氏何據嫂不撫叔叔不撫嫂嫂悉早反正義鄭氏康成曰逺別也吳氏澄曰嫂之於叔叔之於嫂生不通問死不制服皆逺之也故於大斂之後不撫其尸存異方氏慤曰撫謂撫存之也與不通問同義君子有三患未之聞患弗得聞也既聞之患弗得學也既學之患弗能行也君子有五恥居其位無其言君子恥之有其言無其行君子恥之既得之而又失之君子恥之地有餘而民不足君子恥之衆寡均而倍焉君子恥之其行之行下孟反正義鄭氏康成曰恥民不足者古者居民量地以制邑度地以居民地邑民居必參相得也衆寡均謂俱有役事人數等也倍焉彼功倍已也孔氏穎達曰君子謂在位者人湏多聞多識若未聞知古事恒憂患不得聞民不足由不能撫飬使民逃散役民衆寡均等他人功績倍多於已由不能勸課督率故君子皆恥之方氏慤曰聞之而不能學與無聞同學之而不能行與不學同故君子每以是為患焉居其位而無其言是備位耳言之易行之難有其言而無其行是空言耳政不足以聚人則民不繁民不繁則有曠土術不足以使人則事不逮事不逮則有廢功三患所言者道五恥所言者事惟其知所患故能終至於無患惟其知所恥故能終至於無恥吳氏澄曰三患之君子兼該有位無位之人五恥之君子兼該北面之臣南面之君存疑方氏慤曰君子進以禮位固不可以苟得退以義位又不可以苟失既得之而又失之則必非義而退也案既得之謂有其行如先剛直而後脂韋先潔清而後汙濁先勤敏而後怠弛凡晚節不終皆是也恐不當專以位之得失言孔子曰凶年則乘駑馬祀以下牲駑音奴正義鄭氏康成曰自貶損亦取易供也駑馬六種最下者下牲少牢若特豕特豚也孔疏天子諸侯常祭大牢凶荒則用少牢諸侯之卿大夫常祭用少牢降用特豕士常祭用特豕降用特豚如此之屬皆為下牲孔氏穎達曰校人馬有六種種馬玉路所乘戎馬兵車所乘齊馬金路所乘道馬象路所乘田馬木路所乘駑馬負重載逺所乘凶年人君自貶乘駑馬也方氏慤曰馬不良謂之駑牲非純全謂之下陸氏佃曰下牲盖猶用其本牲之下者也故祭凶年不儉案王制凶年不儉所謂下牲者乃如其本分應用之牲而不必擇其肥腯中選者耳然說苑引曲禮有上牲損則用下牲下牲損則祭不備語是降等亦未嘗無是禮也恤由之喪哀公使孺悲之孔子學士喪禮士喪禮於是乎書孺而樹反正義鄭氏康成曰時人轉而僭上士之喪禮已廢矣孔子以敎孺悲國人乃復書而存之方氏慤曰明禮之不廢有所因也陸氏佃曰儀禮士喪是與子貢觀於蜡孔子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也子曰百日之蜡一日之澤非爾所知也張而不弛文武弗能也弛而不張文武弗為也一張一弛文武之道也蜡仕嫁反樂音洛弛尸是反正義鄭氏康成曰蜡也者索也歲十二月合聚萬物而索饗之祭也孔疏皆郊特牲文國索鬼神而祭祀則黨正以禮屬民而飲酒於序以正齒位是時民無不醉者如狂矣孔疏初飲則正齒位飲末則醉無不如狂曰未知其樂怪之也孔疏禮儀有序乃可樂既皆如狂則非歡樂蜡之祭主先嗇也孔疏以神農為主大飲烝孔疏烝升也天子諸侯與羣臣大飲於學升牲體於俎勞農以休息之言民皆勤稼穡有百日之勞喻乆也今一日使之飲酒燕樂是君之恩澤非女所知言其義大張弛以弓弩喻人也弓弩乆張之則絶其力乆弛之則失其體孔氏穎達曰王者於亥月報萬物休老息農又各燕㑹飲酒於黨學中故子貢往觀之張而不弛則絶其弓力喻民乆勞不息亦損民力弛而不張則失弓往來之體喻民乆休息則志驕逸若調之以道化之以理張弛以時勞逸以意則文武得其中道也呂氏大臨曰自秋成至於十二月有百日在百日中索鬼神以脩蜡禮故曰百日之蜡祭而遂息田夫故曰一日之澤吳氏澄曰使民常勞則民將不堪上之人不能強民之從也故曰文武弗能使民乆逸則民將廢業上之人不為此以縱民之情也故曰文武弗為孟獻子曰正月日至可以有事於上帝七月日至可以有事於祖七月而禘獻子為之也正義鄭氏康成曰記魯失禮所由也孟獻子魯大夫仲孫蔑也獻子欲尊其祖以郊天之月對月禘之非也魯之宗廟猶以夏時之孟月爾明堂位曰季夏六月以禘禮祀周公於大廟孔氏穎達曰此明魯郊禘之事獻子仲孫蔑諡也正月周正月建子之月日至冬至日也周以十一月為正其月日至若天子則圜丘此言是也七月周七月建午之月日至夏至日也有事謂禘祭於祖廟此言非也魯之祭祀猶用夏法禘於孟月孟月於夏家是四月於周為六月獻子以二至相當以天對祖乖失禮意獻子為之記其失所由也案春秋宣九年獻子始見經案僖八年於時未有獻子而七月禘者鄭云以僖公八年正月公㑹王人于洮六月應禘以在㑹未還故至七月乃禘理不合譏為致夫人故書之獻子既七月而禘春秋不書於經以示譏者魯時暫行之又此不云自獻子始是不恒行也吳氏澄曰魯之郊上帝亦但郊於建寅之月禘則建巳之月獻子二言皆非魯之郊禘本非禮獻子欲移其祭月則失禮愈甚矣存疑鄭氏康成曰魯以周公之故得以正月日至之後郊天亦以始祖配之案春秋魯郊未有以周正子月至日者鄭依經為說非也周公說明堂位詳之夫人之不命於天子自魯昭公始也正義鄭氏康成曰亦記魯失禮所由也周之制同姓百世婚姻不通吳大伯之後魯同姓昭公取於吳謂之吳孟子不告於天子自此後取者遂不告於天子天子亦不命之孔氏穎達曰諸侯夫人亦天子所命或是王后無畿外之事故天子命畿外諸侯夫人此文是也若畿内諸侯及卿大夫之妻則玊藻注云天子諸侯命其臣后夫人亦命其妻是也通論郝氏敬曰魯昭公之世王命不行於諸侯乆矣諸侯繼世自立且不由天子况其夫人乎諸侯之不取同姓者未必皆有王命也因昭公娶吳女附㑹之耳外宗為君夫人猶内宗也為于偽反正義鄭氏康成曰皆謂嫁於國中者孔疏以君夫人是國人所稱若他國外當云諸侯為君服斬夫人齊衰不敢以其親服服至尊也外宗謂姑姊妹之女内宗五屬之女也其無服而嫁於諸臣者從為夫之君嫁於庶人從為國君孔氏穎達曰君内宗為君悉服斬衰為夫人齊衰案五屬之親為君斬衰三年君夫人齊衰三年女在室當亦如之嫁則從為夫之君服孔此說盖據在室者言之耳則君外宗之女為君及夫人與内宗同故云猶内宗也即與諸侯為兄弟者服斬之例案禮族人不敢以其戚戚君則異族者亦不可以戚戚君故不以其親服服至尊也存疑鄭氏康成曰外宗舅之女從母皆是也辨正孔氏穎達曰古者大夫不外取故君之姑姊妹嫁於國内大夫為妻是其正也舅之女及從母在國中非正也諸侯不内取舅女及從母不得在國中若元在他國亦不得來嫁與己國卿大夫為妻以卿大夫不外取也熊氏云内宗外宗嫁在他國皆為本國諸侯服斬賀循譙周等云在他國則不得服賢者擇之案此外宗當止指君姑姊妹嫁本國大夫其所生女仍嫁本國大夫者而鄭兼及舅女從母孔謂諸侯不内取則君之舅女從母不得在國中大夫不外取則舅女從母又不得來嫁本國大夫無從為君夫人服雖熊氏有他國本國皆服之說然身為他國大夫之妻而為此國之君夫人服齊斬不嫌於所居國之君夫人乎故引賀譙說以正之而但云賢者擇之疏例不駁注也廄焚孔子拜鄉人為火來者拜之士壹大夫再亦相弔之道也正義鄭氏康成曰言拜之者為其來弔已宗伯職曰以弔禮哀禍災孔氏穎達曰孔子馬廐為火焚孔子拜鄉人來慰問者雖非大禍災亦是相哀弔之道也孔子曰管仲遇盗取二人焉上以為公臣曰其所與遊辟也可人也管仲死桓公使為之服宦於大夫者之為之服也自管仲始也有君命焉爾也上時掌反辟匹亦反正義鄭氏康成曰可人也言此人可也但居惡人之中使之犯法陳氏澔曰為其所交遊是邪辟之人故相誘為盗也宦猶仕也此仕於大夫更升於公與違大夫之諸侯同爾禮不反服孔氏穎達曰此明大夫之臣雖仕於公反服大夫之服記失禮所由又記桓公不忘賢者之舉也餘論陸氏佃曰其為盗以其所遊故君子居必擇鄉遊必就士所以防邪辟而近中正也世衰道微君不能敎始服其師君不能舉而為所主者有服矣案或謂此二人特為管仲所舉耳未嘗仕仲為家臣也與違大夫之諸侯稍別不知記明言仕於大夫則不得謂之未嘗仕仲也過而舉君之諱則起與君之諱同則稱字正義鄭氏康成曰舉猶言也起立者失言而變自新稱字謂諸臣之名也孔氏穎達曰此明辟君之諱過謂過誤也内亂不與焉外患弗辟也與音預辟音避正義鄭氏康成曰謂卿大夫也同僚將為亂己力不能討不與而已至於鄰國為㓂則當死之也春秋魯公子友如陳葬原仲傳曰君子辟内難而不辟外難孔疏荘二十七年公羊傳大夫不書葬此何以書公子慶父公子牙通乎夫人以脅公季子起而治之則不得與於國政坐而視之則親親因不忍見也何休云不忍見其如此故請至於陳葬原仲至荘三十二年季子與國政故逐慶父酖叔牙也此注力不能討亦謂不與國政若與國政力能討而不討則責之宣二年晉史董狐書趙盾以弑君是也孔氏穎達曰此明卿大夫辟内亂之事方氏慤曰門内之治恩掩義内亂不與者所以重恩也門外之治義斷恩外患不辟者所以重義也通論吳氏澄曰亂之重且大者管叔啓武庚而叛周則周公以弟誅其兄石厚輔州吁而弑君則石碏以父殺其子豈得不與乎贊大行曰圭公九寸侯伯七寸子男五寸博三寸厚半寸剡上左右各寸半玊也藻三采六等剡以冉反正義鄭氏康成曰贊大行者書說大行人之禮者名也孔疏周禮有大行人篇掌諸侯五等之禮作記之前有人說書贊明大行人之事記者引之藻薦玊者也三采六等以朱白蒼畫之再行也孔疏案聘禮記云朝天子圭與繅皆九寸繅三采六等典瑞云公侯伯皆三采三就謂一采為一就其實采別二就三采則六等也典瑞又云子男皆二采再就二采則四等又云瑑圭璋璧琮繅皆二采一就以頫聘此謂卿大夫二采共一就也天子五采五就則十等也子男執璧作此贊者失之孔疏此經子男總云圭失之孔氏穎達曰此明五等諸侯所執圭玉之制剡殺也圭與璧殺上左右角各寸半也五等諸侯圭璧雖異而俱以玉為之故云玉也藻謂以韋衣板以藉玉者三采朱白蒼也六等六行也謂三色每色為二行是三采六等陳氏祥道曰玉之藉以繅而繅之長眂玉采以象徳之文就以象文之成君子以貞剛之質存乎内而以柔順藉之於外又有文焉然後可以行禮矣王五采五就色不過五也公侯伯皆三采三就降殺以兩也子男二采而大夫聘玉亦二采者禮窮則同也存疑陸氏佃曰聘禮記曰所以朝天子圭與藻皆九寸問諸侯朱綠藻八寸盖上言所以朝之玉下言以聘他國者也藻八寸則圭亦八寸可知故曰瑑圭璋八寸璧琮八寸以頫聘子男執璧以朝圭以頫聘今此言圭則子男頫聘之玉也鄭氏謂子男執璧作此贊者失之矣誤也正言玉也則所謂博三寸厚半寸剡上左右各寸半主公言之其餘以是為差上公用龍四玉一石雖曰玉可也故曰藻三采六等據子執穀璧男執蒲璧繅皆二采再就陳氏祥道曰繅或作藻冕織絲為之則圭繅亦然鄭氏與杜預皆謂韋為之亡據也案陸謂博三寸者主公言之餘以是差誤也惟圭首一致故執一冒以合符若圭首有五等則天子有五冒乎鄭謂藻以韋衣板陳又非之不知崇坫康圭不可以圭置土坫上故先以韋衣板藉玉而玉與韋不相附故以五采之絲纒縛之而因屈繅以為質垂繅以為文也哀公問子羔曰子之食奚當對曰文公之下執事也當如字正義鄭氏康成曰問其先人始仕食祿以何君時陳氏澔曰文公至哀公七君存疑方氏慤曰文公之下執事也自此而下宜更有辭容簡脫之耳成廟則釁之其禮祝宗人宰夫雍人皆爵弁純衣雍人拭羊宗人祝之宰夫北面於碑南東上雍人舉羊升屋自中中屋南面刲羊血流於前乃降門夾室皆用雞先門而後夾室其衈皆於屋下割雞門當門夾室中室有司皆鄉室而立門則有司當門北面既事宗人告事畢乃皆退反命於君曰釁某廟事畢反命於寢君南鄉於門内朝服既反命乃退路寢成則考之而不釁釁屋者交神明之道也凡宗廟之器其名者成則釁之以豭豚釁許靳反純側其反拭音式刲苦圭反夾古洽反衈如志反鄉許亮反朝直遙反豭音加正義鄭氏康成曰廟新成必釁之尊而神之也宗人先請於君曰請命以釁某廟君諾之乃行宰夫攝主故居上拭淨也自由也其衈謂將刲割牲以釁先滅耳旁毛薦之耳聼聲者告神欲其聼之周禮有刉衈有司宰夫祝宗人也告事畢告宰夫也君朝服者不至廟也路寢生人所居不釁者不神之也考之者設盛食以落之爾檀弓曰晉獻文子成室諸大夫發焉是也宗廟名器謂尊彛之屬孔氏穎達曰此論釁廟及考路寢之事宗廟初成則殺羊取血以釁之其禮謂釁廟之禮爵弁士服也純衣謂絲衣則𤣥衣纁裳也雍人是厨宰之官拭淨其羊於廟門外案大戴禮釁廟篇云成廟則釁以羊君𤣥服立於寢門内南鄉祝宗人宰夫雍人皆𤣥服宗人曰請命以釁某廟君曰諾遂入雍人拭羊乃行入廟門碑南北面雍人舉羊升屋自中中屋南面刲羊血流於前乃降此皆大戴禮文初受命寢門内君與祝宗人宰夫雍人等皆著𤣥服謂朝服緇衣素裳等其祝宗人等入廟之時則爵弁純衣也雍人抗舉其羊由屋東西之中謂兩階之閒而升也當屋棟上之中南面刲割其羊使血流於前也門廟門夾室東西廂不用羊各一雞凡三雞故云皆用雞如上用羊升屋割之也未刲羊雞之時先滅耳旁毛以薦神廟則在廟之屋下門與夾室則在門夾室之屋下故云其衈皆於屋下衈訖然後升屋而釁門與夾室亦當門屋上及室上之中釁既畢反報君命於路寢考之謂與賔客燕㑹以酒食澆落之即歡樂之義也器之作名者成則殺豭豚血塗之細者成則不釁鄭注周禮云毛牲曰刉羽牲曰衈此經有羊有雞無刉文總以衈包之周禮對文耳方氏慤曰考即宣王考室之考且考有燕必用酒者陽之盛也寢者人之所居故以陽之盛者考之釁用血血者隂之至也廟者神之所居故以隂之至者釁之亦各從其類也通論陳氏祥道曰周官羊人釁共羊牲將以釁廟也雞人釁共雞牲將以釁門及夾室也犬人幾珥用駹賈公彦曰或羊或犬俱得為釁是也天府釁寶鎮及寶器小子釁邦器及軍器龜人釁龜圉人釁廐以至社稷五祀與夫師行之主藏約之戸或釁於始成或釁於將用其禮豈一端哉然釁有司行事而君不親犬羊為牲而牛馬不預爵弁而不冕牲駹而不純則釁之為禮也小矣後世有以牛釁鐘而甚者有叩人鼻以衈社此先王之所棄也張子曰釁名器以豭豚而齊宣王釁鐘以牛戰國時無復常制不然又何以欲以羊易之諸侯出夫人夫人比至於其國以夫人之禮行至以夫人入使者將命曰寡君不敏不能從而事社稷宗廟使使臣某敢告於執事主人對曰寡君固前辭不敎矣寡君敢不敬湏以俟命有司官陳器皿主人有司亦官受之比必利反使色吏反正義鄭氏康成曰行道以夫人之禮者棄妻致命其家乃義絶不用此為始也前辭不敎謂納采時此辭賔在門外擯者傳焉賔入致命如初主人卒辭曰敢不聼命器皿其本所齎物也律棄妻卑所齎孔氏穎達曰夫人有罪諸侯出之命歸本國禮尚謙退不能指斥夫人之罪故使者将命云寡君才知不敏不能隨從夫人共事社稷宗廟使使臣某告在下之執事湏待也俟亦待也敬湏待君命也使人得主人答命使有司之官陳夫人嫁時所齎器皿之屬以還主國主國亦使有司領受之並云官者明付受悉如法也總論孔氏穎達曰此諭諸侯出夫人及卿大夫以下出妻之事妻出夫使人致之曰某不敏不能從而共粢盛使某也敢告於侍者主人對曰某之子不肖不敢辟誅敢不敬湏以俟命使者退主人拜送之如舅在則稱舅舅沒則稱兄無兄則稱夫主人之辭曰某之子不肖如姑姊妹亦皆稱之共音恭盛音成辟音避正義鄭氏康成曰肖似也不似言不如人誅猶罰也稱舅稱兄言棄妻者父兄在則稱之命當由尊者出也惟國君不稱兄姑姊妹見棄亦曰某之姑某之姊若妹不肖孔氏穎達曰稱舅謂妻被出夫之父在則稱父名使使來告也稱兄謂夫兄之名不云舅沒則稱母者婦人之名不合外接於人也若有死喪則稱母弔故曽子問云母喪稱母夫身無兄則稱夫名使某來告則上文是也夫之父兄遣人致命之辭未聞方氏慤曰夫婦之道合則納之以禮不合則出之以義人倫之際有所不免也故先王亦存其辭焉案七出見家語子曰不順父母出無子出滛出妬出惡疾出多口舌出竊盜出王肅注曰不順父母謂逆徳也無子謂絶世也淫謂亂族也妬謂亂家也惡疾謂不可供粢盛也多口舌謂其離親也竊盜謂反義也或謂無子惡疾豈婦欲哉亦不幸爾奈何出之不知人之娶婦將以繼先祖嗣共宗廟之粢盛也既無以承先祖後共宗廟之粢盛則義固可去矣然古君夫人無子得以妾媵之子為子如衞荘姜之以完為己子雖荘公之狂暴未嘗遽出之則禮可知也若魯文公之哀姜有太子赤及弟視仲遂弑之而以無子出詎云禮乎盖君子見幾明决而用意忠厚其出也必有不可不去之實所以為明決也而出女使可嫁令其以不幸去所以為忠厚也必如此而後為天理之正必如此而後為人情之安孔子曰吾食於少施氏而飽少施氏食我以禮吾祭作而辭曰疏食不足祭也吾飧作而辭曰疏食也不敢以傷吾子少失召反食音嗣下同正義鄭氏康成曰言貴其以禮待已而為之飽也時人倨慢若季氏則不以禮矣少施氏魯惠公子施父之後孔氏穎達曰吾祭謂孔子祭也作起也飧謂強飯以答主人之意通論張子曰後世不安於禮惟務簡便雖宗廟之饗父母之養禮意猶有所闕所謂如食宜飫如酌孔取但取飲食醉飽而已孔子食於少施氏而飽必是少施氏有禮也食於季氏不食肉而飧孔子雖欲行禮施於季氏必是不知故不若辭食而已凡禮必施之知者若為不知禮亦難行又曰傷謂疏食不可強飽以致傷也納幣一束束五兩兩五尋正義鄭氏康成曰納幣謂昏禮納徵也十个為束貴成數兩兩者合其卷是謂五兩八尺曰尋兩五尋則每卷二丈也合之則四十尺今謂之匹猶匹偶之云與孔氏穎達曰兩个為一卷取配偶之義也方氏慤曰納幣即昏禮所謂納徴以物言故曰幣以義言故曰徴周官媒氏凡嫁子取妻入幣純帛無過五兩王氏謂天數五地數五五位相得而各有合五兩則以天地合數為之節正謂是矣婦見舅姑兄弟姑姊妹皆立於堂下西靣北上是見已見諸父各就其寢女雖未許嫁年二十而筓禮之婦人執其禮燕則鬈首見賢遍反鬈音權又居阮反正義鄭氏康成曰婦來為供養也其見主於尊者兄弟以下在位是為已見不復特見也諸父旁尊各就其寢亦為見時不來也女雖未許嫁年二十亦為成人矣禮之酌以成之言婦人執其禮明非許嫁之筓既筓之後去之鬈首猶若女有鬌紒也孔氏穎達曰此論昏禮婦見舅姑及女未許嫁加筓分別之事婦來明日而見舅姑之時兄弟姑姊妹皆立於舅姑之堂下東邊西鄉以北為上近堂為尊也婦自南門而入入則從於夫之兄弟姑姊妹前度以因是即為相見不復更別詣其室見之故云是已見也諸父謂夫之伯叔婦於明日各往其寢見之不與舅姑同日也女子十五許嫁而筓則主婦及女賔為筓禮主婦為之者筓女賔以醴禮之若未嫁至二十而筓則婦人禮之存疑孔氏穎達曰未許嫁無主婦女賔不備儀也既筓後尋常燕居則去其筓而鬈首謂分髪為鬌紒也既未許嫁猶為少者處之案婦人正謂主婦女賔重在執禮二字謂雖未許嫁必以禮為之筓也所以不待許嫁而筓者欲早責以成人之道也而不備儀可乎燕則鬈首者謂有事時則筓無事則不筓非既筓輒釋直待嫁而後筓也若云已筓猶以少者處之則是不以成人之道責之矣筓何為乎韠長三尺下廣二尺上廣一尺㑹去上五寸紕以爵韋六寸不至下五寸純以素紃以五采韠音畢長直諒反廣古曠反㑹古外反紕婢支反純之閏反又支允反紃音巡正義鄭氏康成曰㑹謂領上縫也領之所用盖與紕同在旁曰紕在下曰純素生帛也紕六寸者中執之表裏各三寸也純紕所不至者五寸與㑹去上同紃施諸縫中若今時絛也孔氏穎達曰韠韍也長三尺與紳齊也下廣上狹象天地數也旁緣謂之紕上緣謂之㑹以其在上下總㑹之處故謂之為㑹謂韠之領縫也此縫去韠上畔廣五寸謂㑹上下廣五寸紕謂㑹縫之下韠以兩邊紕以爵韋闊六寸倒攝之兩廂各三寸也不至下五寸者紕韠之兩邊不至韠之下畔闊五寸也純以素者謂紕所不至之處横純之以生帛此帛上下亦闊五寸也紃條也五采之絛施之諸縫之中也會之所用無文純紕既用爵韋故鄭知與紕同也純之上畔去韠之下畔五寸㑹之下畔去韠之上畔五寸以其俱五寸故鄭云與會去上同也聶氏崇義曰天子祭服之韠繪龍火山卿大夫山士不畫案鄭孔訓會為領縫聶陳訓會為繪畫二説似異而並存正義者韠之身有畫其頸無畫其二者接續處為領縫則二説合而義乃備盖五寸以上為頸頸兩旁為肩穿孔以受革帶又加大帶四寸於其上與兩旁皆紕以爵韋而中畫之其下五寸亦不畫而於接縫處以下皆純以素其縫之上則皆以五采之紃加其上以為飾如弁縫之五采紃也欽定禮記義疏卷五十六
