body:
  text: 玉藻第十三之二始冠緇布冠自諸侯下達冠而敝之可也冠古亂反布冠如字下並同敝音弊本亦作弊正義鄭氏康成曰緇布冠本太古耳非時王之法服也孔氏穎達曰從諸侯下達於士其初加者是緇布冠不復常著冠而敝去之可也周氏諝曰用緇布者所以立本也然非以趨時故既冠而即敝之可也案崇本尚質而導人心於朴淳則始加緇布之深意也故冠義以此始兹雜明冠制亦以此始總論孔氏穎達曰自此至桓公始也一節廣論上下及吉凶冠之所用唯五十不散送及親沒不髦記者雜録厠在其間玄冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也玄冠丹組纓諸侯之齊冠也玄冠綦組纓士之齊冠也繢又作繪户內反緌本又作蕤耳隹反齊側皆反綦音其徐其記反正義鄭氏康成曰玄冠朱組纓緇布冠繢緌始冠之冠也玄冠委貌也諸侯緇布冠有緌尊者飾也孔疏郊特牲士冠禮皆云其緌也吾未之聞謂大夫士也此云繢緌諸侯之冠故云尊者飾也繢或作繪緌或作蕤齊冠言齊時所服也孔疏言齊者兼祭祀之時故曲禮云立如齊恐此齊亦兼祭祀故言齊時所服其祭諸侯則玄冕也陳氏祥道曰朱以著正陽之色繢以備五采之文五采雖美不若正陽之純純其飾所以異也諸侯與士之齊則同而尊卑之分則異同故皆玄冠以一其誠異故組纓殊色以辨其等丹則顯綦倉艾色則晦也方氏慤曰天子言纓諸侯言緌互相備爾玄則純乎天之色緇則雜以地之色故以為天子諸侯隆殺之辨齊之冠一以玄者以陰幽思也馬氏睎孟曰委貌之制不可考觀周禮言冠辨而康成以委貌言之則委貌類辨矣范文子以杖擊其子而折委筓則委貌有筓矣士冠禮緇布冠有纓無筓而皮辨爵辨有筓則委貌殊於緇布冠類於辨可知也周官司服其祭服有玄端素端記曰太古冠布齊則緇之又曰齊之玄也又曰齊玄而養又曰玄冕齊戒荀子曰端衣玄裳挽而乘路蓋太古之祭冠以緇周之祭冠以玄天子齊則玄冕而玄端所以挽而乘路者也諸侯而下則玄冠玄端而已所謂丹綦組纓是也朱氏申曰朱與丹皆赤類也然朱則含陽焉丹則受陽而已繢與綦皆雜色也然繢則以畫綦則染之而已存疑鄭氏康成曰四命以上齊祭異冠孔疏諸侯玄冕祭玄冠齊孤則爵辨祭亦玄冠齊是齊祭異冠也其三命以下大夫則朝服以祭士玄端以祭皆玄冠是齊祭同冠天子之士與諸侯上大夫同天子大夫與諸侯孤同此云四命齊祭異冠謂自祭助祭於君則齊祭同冠也鄭答趙商云齊祭謂齊時一冠祭時亦一冠四命乃然大夫冕士辨而祭於君齊時服之祭時服之鄭言是助祭齊祭同冠若然士之助祭齊服應服爵辨而鄭注旅賁氏云服玄端不服爵辨者熊氏云士助王祭祀服爵辨若助王受朝覲齊時則服玄端義或然也陳氏祥道曰天子諸侯大夫齊祭異服特天子於羣小祀皆玄冕則齊祭同服存異陸氏佃曰玄冠丹組纓亦天子之齊冠案記謂夏之末造有諸侯冠禮自必有天子冠禮而此朱組纓繢緌誠如鄭云始冠之冠蓋夏之末造興焉至周彌文矣冠之制有三冕最尊辨次之冠又次之故冕辨不得妄干而冠自天子下逹然天子亦止用之燕居耳此言齊冠不及天子天子齊以冕故也陸謂玄冠丹組纓亦天子齊冠則無别矣且羣小祀祀之最卑者也猶必玄冕是天子無以冠齊者陳氏以齊祭異冠兼大夫較鄭四命以上之義為長蓋玄冠丹組纓諸侯之齊冠則諸侯以下齊必以冠可知乃雜記有云大夫冕而祭於公辨而祭於己士辨而祭於公冠而祭於己即謂雜記大夫為孤而士則固辨而祭於公是雖小國之大夫亦當辨而祭於公也以齊無不玄冠之諸侯以祭有辨之士齊祭異冠矣而顧謂四命以上始然宜乎來趙商之問而孔氏輾轉以求申其説終疑其義之或然哉縞冠玄武子姓之冠也縞冠素紕既祥之冠也垂緌五寸惰遊之士也玄冠縞武不齒之服也縞古老反又古報反紕音埤又埤支反惰徒臥反正義鄭氏康成曰縞冠玄武謂父有喪服子為之不純吉也武冠卷也古者冠卷殊孔疏卷用玄而冠用縞冠卷異色紕讀如埤緣邊也既祥之冠已祥祭而服之也間傳曰大祥素縞麻衣垂緌五寸亦縞冠素紕凶服之象也孔疏以文承上故知縞冠素紕而加垂緌五寸垂長緌明非既祥不齒所放不帥教者孔氏穎達曰姓生也孫是子之所生故云子姓武用玄玄是吉方氏慤曰武在下為父而玄親親於下也冠用縞縞是凶方氏慤曰冠在上為祖而縞尊尊於上也吉而雜凶不純吉也縞冠素紕緣冠兩邊及冠卷之下畔其冠與卷身皆用縞未純吉之祭服也但以素緣耳方氏慤曰既祥之冠不以布而以縞吉事之先見也紕不以采而以素有禫餘哀故也陳氏祥道曰子姓之縞冠玄武則凶其上不齒之玄冠縞武則凶其下凶其上以父之有服故也凶其下以下之自貽故也吳氏澄曰對有服之父而言則曰子對所為服之祖而言則曰孫故兼言子姓應氏鏞曰垂緌五寸遊曳而長非法服也蓋勤飭者敏於趨事謹於守禮故緌必短惰遊者怠於事而侈於飾故特長通論孔氏穎達曰縞是生絹而近吉當祥祭之時身著朝服首著縞冠以其漸吉故也不言以素為紕故喪服小記云除成喪者朝服縞冠雜記祥主人之除也於夕為期朝服鄭云祭猶縞冠雜記又云既祥雖不當縞者必縞據此皆云祥祭縞冠若既祥之後微申孝子哀情故加以素紕以素重於縞也檢勘經注如此而皇謂縞重素輕祥祭之時以素為冠以縞為紕紕得冠名祥祭之後以縞為冠以素為紕亦冠得紕名素冠文無所出不知皇何據案禮無素冠詩庶見素冠陳氏祥道曰惰遊之責輕於不齒而縞冠素紕垂緌五寸重於玄冠縞武何也蓋惰遊者一時之過茍變惰遊以趨職事則縞冠垂緌棄之可也若夫玄冠縞武或服之終身或服之三年故以重馭暫義也以輕馭久仁也義故民畏其威仁故民懷其德存疑鄭氏康成曰惰遊罷民也孔疏周禮坐嘉石之罷民辨正陸氏佃曰惰遊言士非罷民著矣亦言士猶以士望之案居冠不緌而遊惰之士常垂緌以為飾則使之縞冠素紕加垂緌五寸無喪若有喪以深著無事若有事之深可閔也居冠屬武自天子下達有事然後緌屬章欲反正義鄭氏康成曰居燕居也著冠於武少威儀有事然後緌燕無事者去飾通論周氏諝曰諸侯齊與燕雖皆用玄冠然齊冠不屬卷而加緌則齊與燕其服不能無小異陳氏祥道曰子姓之冠縞冠玄武不齒之冠玄冠縞武則非子姓與不齒冠武同色也雜記曰委武玄縞而后蕤則武亦謂之委以其若冠之足故曰武以其委於下故曰委案武者冠之卷儀禮斬衰外畢注冠前後屈而出縫於武賈疏前後兩頭皆在武下向外出反屈之縫於武縫畢向外故云外畢是惟斬衰外畢諸冠皆內畢也若冠不與武相屬則制冠猶未畢何以冠乎喪大記加武帶絰謂加絰於冠之武非前冠無武至此加武也固冠在纓不在武此節文義以有事與居對以後緌與屬武對言常時纓屬於武故無緌有事乃繫纓於筓以固冠而因垂其餘以為飾乃有緌也存疑孔氏穎達曰若非燕居則冠與武别臨著乃合之有儀飾故也陳氏祥道曰古者施冠於首然後加武以約之喪大記襲裘加武則武之設所以約冠居冠屬武則非燕居武不屬於冠也喪冠條屬則非有喪者纓武異材也方氏慤曰君子動而有為則詳而文靜而無事則略而質居冠屬武略而質也五十不散送親沒不髦大帛不緌玄冠紫緌自魯桓公始也散悉但反髦音毛正義鄭氏康成曰五十送喪不散麻始衰不備禮也孔疏始死三日之前要絰散垂三日之後乃絞之至葬啓殯已後亦散垂既葬乃絞五十既衰不能備禮故不散垂不髦去為子之飾大帛不緌去飾也周氏諝曰五十不散送養筋力於始衰之年親沒不髦責成人於親沒之後大帛不緌異於吉也方氏慤曰紫色非正也後世用之自桓公始存異鄭氏康成曰帛當為白謂白布冠凶服玄冠紫緌僭宋王者之後服也孔疏以祭周公用白牡乘大路是魯用殷禮故疑紫緌僭宋後緌當用繢孔疏以上文云緇布冠繢緌諸侯之冠故知也案雜記大白與緇布連文則白布冠居喪所服此大帛則素繒凡有憂者之服如衛文公大帛之冠及秦伯素服郊次用之不必改此帛為白孔子惡紫奪朱時人好紫桓公以為緌耳宋王者之後服紫何據乎天子朱紘諸侯青紘青紘則青緌者宜也始冠之緇布繢緌冠而敝之矣豈以為常乎朝玄端夕深衣深衣三袪縫齊倍要祍當旁袂可以回肘朝直遙反祛起魚反縫音逢齊音咨要一遙反祍而審反又而鴆反肘竹丑反正義鄭氏康成曰謂大夫士也孔疏朝玄端與君不同故知是大夫士三祛者謂要中之數也袪尺二寸圍之為二尺四寸三之七尺二寸孔疏深衣云幅十有二以計之幅廣二尺二寸邊各去縫一寸餘有一尺入寸裳每幅交解之潤頭廣尺二寸狹頭廣六寸此寬頭嚮下狹頭向上要中十二幅廣各六寸故為七尺二寸縫紩也紩下齊倍要中齊丈四尺四寸孔疏下齊十二幅各廣尺二寸故為一丈四尺四寸衽謂裳幅所交裂也袂可以回肘二尺二寸之節孔疏肘長尺二寸故可以回肘也凡衽者或殺而下孔疏謂喪服之衽廣頭在上狹頭在下或殺而上孔疏謂深衣之祍寬頭在下狹頭在上是以小要取名焉孔疏深衣與喪服相對為小要兩旁皆有此祍衽屬衣則垂而放之孔疏謂喪服或朝祭之衽屬裳則縫之以合前後孔疏謂深衣之衽上下相變也孔疏謂上體是陽陽體舒散故垂而下下體是隂隂主收斂故縫而合之孔氏穎達曰袪謂袂末言深衣之廣三倍於袂末齊謂裳之下畔要謂裳之上畔衽謂裳之文接之處當身之畔深衣衣上屬幅而下裳下屬幅而上相對為祍鄭注深衣鉤邊今之曲裾則宜兩邊而有也陳氏祥道曰深衣與長中同制異飾連裳方夾直繩旁衽以至裳十二幅要三袪縫齊倍要之類此其所同也深衣之純以采若素長衣之純素而已中衣之飾繡黼丹朱而與長衣又繼掩尺焉蓋以其衣裳邃焉故謂之深衣以其祛褎長焉故謂之長衣以其有表而在中焉故謂之中衣張氏怡曰禮服殊裳則衽圍掩前後深衣連裳祍掩向旁也通論孔氏穎達曰士大夫以視私朝故服玄端若朝君則朝服也若大夫莫夕蓋亦朝服其私朝及在家大夫士夕皆深衣也餘論陳氏祥道曰衽之辨有上下其用有左右生者尚右記曰親始死扱衽是也死者尚左記曰小斂大斂祭服不倒皆左衽是也總論孔氏頴達曰自此至弗敢充也一節廣論衣服及裘裼襲之事長中繼掩尺夾二寸袪尺二寸緣廣寸半以帛裏布非禮也祫音劫廣公曠反正義鄭氏康成曰其為長衣中衣則繼袂掩一尺若今褎矣深衣則緣而已祫曲領也袪袂口也緣飾邊也中外宜相稱故以帛裏布非禮也冕服絲衣也中衣用素皮辨服朝服玄端麻衣也中衣用布孔疏皮辨服朝服玄端服三衣用麻麻即十五升布故中衣並用布也孔氏穎達曰長衣中衣制同有表謂之中衣若露著則曰長衣幅廣二尺二寸長衣中衣以半幅繼續袂口故掩餘一尺也長衣掩必用素中衣掩或布或素隨其衣而然以帛裏布非禮者若朝服用布則中衣不得用帛陸氏佃曰長衣練冠長衣是也中衣繡黼丹朱中衣是也周氏諝曰玄冕而上衣用帛者則裏亦用帛皮辨而下衣用布者則裏亦用布余氏心純曰袂口以半幅繼續而掩覆一尺此與深衣異夾二寸袪尺二寸緣廣寸半皆與深衣同通論陳氏祥道曰禮遭君夫人世子之喪將命於大夫主人長衣練冠以受喪服小記大夫士筮宅史練冠長衣以筮是長衣所施趨於凶而非純凶也士不衣織無君者不二采衣正色裳間色衣於既反間去聲正義鄭氏康成曰織染絲織之士衣染繒也不二采大夫去位宜服玄端玄裳孔疏大夫士去國三月之內服素衣素裳三月之後則服玄端玄裳衣正色裳間色謂冕服玄上纁下孔疏玄是天色故為正纁是地色赤黃之雜故為間色孔氏穎逹曰織者前染絲後織此服功多色重大夫以上衣之士賤不得衣也皇氏云正謂青赤黃白黑間謂緣紅碧紫駵黃青是東方正緑是東方間木色青木尅土土黃故緑色青黃也朱是南方正紅是南方間南火赤尅金故紅色赤白也白是西方正碧是西方間西金尅木故碧色青白也黑是北方正紫是北方間北水黑尅火故紫色赤黑也黃是中央正駵黃是中央間中央土尅水水黑故駵色黃黑也徐氏師曾曰衣被於上體用正色以得五行之純氣尊之也裳被於下體用間色以得五行相尅之雜氣卑之也通論孔氏穎達曰士衣染繒詩庶人得衣錦者禮不下庶人有經而等也唐傳云古者有命民飾車駢馬衣錦非周法下文居士錦帶者直以錦帶非為衣也大夫以上得衣織衣而禮運云衣其浣帛謂先代禮尚質故也非列采不入公門振絺綌不入公門表裘不入公門襲裘不入公門振依注讀袗之忍反正義鄭氏康成曰列采正服振讀為袗襌也孔疏振袗聲相近論語當暑袗絺綌表裘外衣也二者形且褻孔疏形謂其形露見褻謂可鄙褻皆當表之乃出襲裘不入者衣裘必當裼也方氏慤曰正服則文采備焉故謂之列絺綌為涼必有表衣以蔽之惡褻也表裘固為溫必有正服以被之惡簡也陸氏佃曰五等采謂之列采猶五等爵謂之列爵能成列者也吳氏澄曰裼裘者裼衣外之上服直其領而露出裼衣也襲裘者裼衣外之上服曲其領而掩蔽裼衣也非列采與襲裘同皆為其不文也袗絺綌與表裘同皆為其不敬也通論孔氏穎達曰檀弓云子遊裼裘而弔曾子襲裘而弔皆謂裘上有裼衣裼衣之上有襲衣襲衣之上有正服但據露裼衣不露裼衣為異爾若襲裘不得入公門也纊為繭縕為袍襌為絅帛為褶纊音曠繭古典反縕紆粉反又紆郡反絅苦逈反又音迥褶音牒正義鄭氏康成曰繭袍衣有著之異名也纊新綿縕舊絮也孔疏鄭時以好者為綿惡者為絮絅謂有衣裳而無裏褶謂有表裏而無著彭氏汝礪曰纊為繭者纊本是繭為之緼為袍者以舊絮著於夾衣中故為袍此乃袍之賤者子路衣敝縕袍是也袍字通上文纊為繭言之若著以新綿則為袍之美者絅蓋單布衣褶以帛為之即夾衣內無纊縕褶之為言重也總論余氏心純曰衣服在躬而不知其名為罔故以四時燕服之名因制而定者言之繭袍絅褶衣之名纊縕襌帛是制乃衣之所以得名也上二句是寒服下二句是溫服朝服之以縞也自季康子始也孔子曰朝服而朝卒朔然後服之曰國家未道則不充其服焉朝直遙反正義鄭氏康成曰朝服而朝卒朔然後服之謂諸侯與羣臣也諸侯視朔皮辨服孔疏以上文皆云不入公門下云惟君有黼裘君衣狐白裘皆據諸侯禮也方氏慤曰朝服以布不以純以緇不以縞後世反之始乎季康子之失禮也禮不盛服不充禮所以行道也故國家未道則不充其服焉此亦孔子所言也彭氏汝礪曰案家語季康子朝服以縞曾子問於孔子曰禮乎孔子曰君臣視朝上下同服緇衣羔裘惟諸侯皮辨以告朔卒朔然後服縞以視朝王肅注孔子惡指斥康子但言諸侯明朝服不用縞存疑鄭氏康成曰朝服以縞亦僭宋王者之後孔疏王制殷人縞衣而飬老燕服則為朝服宋是殷後故朝服以縞也未道未合乎道謂若衛文公者陸氏佃曰卒朔卒告朔也告朔已然後退而聽朔案告朔於廟退即聽朔於廟之門其事乃卒本屬一事亦無易服處陸云告朔卒乃聽朔亦小誤方氏慤曰天子皮辨視朝玄端聽朔卒朔事然後視朝事故卒朔然後服朝服也案家語言因視朔而視朝然後服縞若常朝不可服縞非謂卒朔易朝服也方似小誤唯君有黼裘以誓省大裘非古也黼音甫正義鄭氏康成曰僭天子也天子祭上帝則大裘而冕大裘羔裘也黼裘以羔與狐白雜為黼文省當為獮獮秋田也國君有黼裘誓獮田之禮孔氏穎達曰君諸侯也禮唯許諸侯服黼裘以誓軍衆田獵不得服大裘冬始裘而秋田用黼裘者始誓殺須威也餘論陳氏祥道曰周禮獻皮以掌皮攻皮以裘氏獻裘以司裘司裘為大裘以共王祀天之服中秋獻良裘季秋獻功裘鄭氏曰良裘因其良時而用之所謂黼裘與功裘人功微粗謂狐青麛裘之屬然則良裘其質美功裘其功多良裘非特黼裘功裘非特狐青麛裘存疑方氏慤曰省如字謂春省耕秋省斂陳氏祥道曰祀天尚道故以大裘誓省尚義故以黼裘誓則前期十日大宰帥執事卜日遂戒是也省則前祭一日大宰及執事眂滌濯宗伯大祭祀省牲眂滌濯是也司寇大祭祀納亨前王郊特牲卜之日王立於澤親聽誓命則王於誓省皆與之也先王制禮盥重於既薦幣貴於未將則禮常嚴於未然之前祭祀治官以治之刑官以涖之則義常肅於行禮之際則黼裘以誓省宜矣鄭氏康成曰時大夫又有大裘也孔疏以經云唯君則知時臣亦為之案黼為斧形取斷制之義於治軍秋殺為合故鄭以音之近讀省為獮方釋以省耕省斂於斧義何取陳因鄭大裘祀天之説謂誓即郊之聽誓於澤省即郊前一日之省牲而黼裘以郊之誓省絶無可據且春秋時亦安有大夫以黼裘僭郊祀而誓省者記不斥其僭天子郊之大無禮而指其僭君黼裘之小失乎玩經意當是言諸侯唯以黼裘誓省而今以大裘誓省僭天子服耳鄭以大夫相形反支而窒君衣狐白裘錦衣以裼之君之右虎裘厥左狼裘士不衣狐白衣於既反裼思厯反正義鄭氏康成曰君衣狐白毛之裘則以素錦為衣覆之使可裼也袒而有衣曰裼必覆之者裘褻也詩曰衣錦絅衣裳錦絅裳然則錦衣復有上衣明矣孔疏錦衣之上更有衣覆之以無正文故引詩則案絅詩作褧昏禮作景加之以為行道禦塵及門脫之矣不當以此為證天子狐白之上衣皮辨服與孔疏知皮辨服者狐白既白皮辨服亦白錦衣亦白三者相稱也凡裼衣象裘色也孔疏狐白裘用錦衣為裼狐青裘用玄衣為裼羔裘用緇衣為裼是裼衣與裘色相近也右虎裘左狼裘衛尊者宜武猛也士不衣狐白辟君也狐之白者少以少為貴也陳氏祥道曰狐白所以象德之成狐青所以象仁之發故狐白錦衣為人君之服狐青而下為君子之服言君子之服則大夫士同之也夫天下無粹白之狐而有粹白之裘則狐白裘天下之尤難得者右虎裘左狼裘則武士之衛君如手足之衛身也周官虎賁氏掌先後王而趨以卒伍旅賁氏掌執戈盾夾王車而趨左右皆八人然則君之左右蓋旅賁之類也案大司馬僕與車右亦分左右旅賁十六人則在車下者所謂夾王車是也通論孔氏頴逹曰天子視朝服皮辨服則天子皮辨之下有狐白錦衣也諸侯於天子之朝亦然故秦詩云君子至止錦衣狐裘此經云君則天子兼諸侯也下云士不衣狐白則卿大夫亦得衣狐白也其裼則不用錦衣熊氏云當用素衣為裼士既不衣狐白熊氏云用麛裘素裼也存疑周氏諝曰衣裘之色雖以相稱為貴然狐青裘加以玄綃衣白麛裘加以蒼黃之絞衣不必一色則冕服雖玄衣不害其加於狐白裘與狐青裘之上皮辨雖白布衣亦不害其加於黑羔裘之上君子狐青裘豹褎玄綃衣以裼之麛裘青犴褎絞衣以裼之羔裘豹飾緇衣以裼之狐裘黃衣以裼之錦衣狐裘諸侯之服也豹包教反綃音消麛音迷犴音岸絞户交反正義鄭氏康成曰君子大夫士也孔疏上文已云君故知是大夫士綃綺屬也染之以玄於狐青裘相宜狐青裘蓋玄衣之裘孔疏熊氏云六冕皆有裘此云玄謂六冕及爵辨也則天子諸侯皆然而云大夫士者君用純狐青大夫士雜以豹褎犴胡犬也絞蒼黃之色也孔子素衣麛裘飾猶褎也孔子緇衣羔裘黃衣大蠟時臘先祖之服孔疏郊特牲黃衣黃冠而祭所以息田夫此息民謂之臘故月令孟冬臘先祖五祀是黃衣為臘先祖之服孔子黃衣狐裘非諸侯則不用錦衣為裼孔氏穎達曰以狐青為裘豹皮為褎用玄綃之衣以覆裼之也方氏慤曰錦衣以裼燕居之狐裘也玄綃衣以裼祭祀之狐裘也黃衣以裼息民之狐裘也言綃則錦衣以降裼皆用綃可知狐有青有白有黃前言青言白以與衣異故也此不言從其衣之黃可知麛裘為聽朔之服羔裘為視朝之服麛鹿子羔羊子於犴言褎則知豹之為飾亦褎矣褎言其體飾言其用案論語裼衣必與裘色相稱而此微異或原不必一色者時人禮服之所同而必純一者聖人之所獨也至凡裘天子諸侯用全臣則飾異禮服確然詩於君言羔裘逍遙於卿大夫言羔裘豹袖羔裘豹飾可據不得以犬羊之裘至賤不飾為難也犬羊之裘不裼不文飾也不裼裘之裼也見美也弔則襲不盡飾也君在則裼盡飾也服之襲也充美也是故尸襲執玉龜集無事則裼弗敢充也見賢遍反正義鄭氏康成曰犬羊之裘質略亦庶人無文飾故不裼裼主於有文飾之事君子於事以見美為敬也喪非所以見美故襲君在則裼謂臣於君所也充猶覆也所敬不主於君則襲尸尊則襲執玉龜襲重寶瑞也無事則裼謂已致龜玉也孔氏穎達曰案聘禮使臣行聘之時主於敬不主於文故襲裘至行享之時主於文故裼裘裘之裼者謂裘上加裼衣裼衣上雖加他服猶開露裼衣見裼衣之美以為敬也弔襲謂主人既小斂之後若未斂則裼裘檀弓子遊裼裘而弔是也君在之時則露此裼衣盡其文飾之道以敬於君也服之襲充美也者此謂君之不在臣所加上服掩襲裼衣覆蓋裼衣之美以君不在敬心殺故也凡敬有二體子於父以質為敬故於父母之所不敢袒裼臣於君以文為敬故於君所則裼若平敵以下亦襲以其質略故所襲雖同其意異也尸處尊位無敬於下故襲也凡執玉得襲謂尋常執玉若聘禮執圭璋致聘則襲執璧琮行享雖玉亦裼也龜是享禮庭食之物執之亦裼若尋常所執及卜則襲敬其神靈也無事則裼謂已致龜玉在君之前不敢充覆其美也若不在君所無事則襲也劉氏曰六冕服皆黑羔裘禮惟云大裘而冕下冕皆不言裘案下冕不言裘者以大裘而冕則下冕皆裘不言而可知方氏慤曰由內達外則有裘而後有裼故於裼言裘自外至內則有服而後有襲故於襲言服由內達外則出乎顯故曰見美以示其文自外至內則入乎隱故曰充美以示其質彭氏汝礪曰前言羔裘有裼衣此羊裘不裼者羔乃羊子貴者服之此羊裘賤也存疑孔氏穎達曰皇氏云六冕及爵辨無裘先加明衣次加中衣冬則次加袍繭夏則不袍繭用葛次加祭服若朝服布衣亦先以明衣親身次加中衣冬則次加裘裘上加裼衣裼上加朝服夏則中衣上不用裘而加葛葛上加朝服熊氏云六冕及爵辨君以純狐青大夫士雜以豹褎謂之功裘內外諸侯朝服則以羔為裘不用狐青劉氏云禮惟云大裘而冕下冕皆不言裘案祭服無裘文無所出大裘上有衣則與玄冕無異是以小祀與昊天服同二家皆非熊氏為勝方氏慤曰夫裘之上有裼衣裼衣之上有襲衣襲衣之上有正服則所謂裼者未嘗無襲由露其裼衣故謂之裼爾所謂襲者未嘗無裼由掩以襲衣故謂之襲爾案皇氏祭服無裘説斷非也劉氏六冕皆羔裘證之周禮而合孔之袒熊據鄭大裘祭天而不知龍衮以祭記首明言大裘上有龍衮如何與玄冕無别詩言羔裘逍遙狐裘以朝安見諸侯朝不可狐青乎白虎通云天子狐白諸侯狐黃大夫狐蒼士惟羔存以備一説又案如方説則既襲矣美何從見必釋禮衣去襲衣而後美可見若裼衣而來亦必釋禮衣加襲衣而後美可充當行禮時不應若是煩擾疑只一衣直領左右襟皆有小衽衽相掩則襲屈衽藏之即裼如孝子露肩臂即袒納肩臂於袖即襲也笏天子以球玉諸侯以象大夫以魚須文竹士竹本象可也球音求須崔陸音班孔陳如字文孔陳去聲崔陸平聲正義鄭氏康成曰球美玉也孔疏案釋地云西北之美者有崑崙墟之璆琳琅玕焉璆琳美玉球與璆通文猶飾也大夫士飾竹以為笏不敢與君並用純物也孔氏穎達曰自此至去一一節明天子以下笏所用之物並明用笏之事及濶狹長短魚須文竹庾氏云以鮫魚須飾竹以成文士以竹為本質以象牙飾其邊緣言可者通許之辭陳氏祥道曰玉德之美象義之辨竹禮之節天子尚德諸侯貴義大夫士則循禮而已此笏所以異也大夫近尊而其勢屈士遠尊而其禮伸此飾所以異也馬氏晞孟曰象也者馴物也諸侯之在外以順為行故其笏用象大夫士皆事人者也事人者以貞固為節故其笏用竹存疑盧氏植曰大夫以魚須及文竹為笏崔氏靈恩曰用文竹及魚班陸氏德明曰以魚班飾文竹之邊陸氏佃曰竹有節而已大夫則又有文焉士以竹本為正若或用象亦許故曰象可也陳氏祥道曰象諸侯所以為笏者士卑而伸故飾笏用焉先儒謂以象飾其本誤矣應氏鏞曰爾雅魚曰須蓋魚之所以鼓息者在須故也吳氏澄曰文者其飾也本者其質也俱飾竹也互言之爾大夫竹質而魚須為之飾士象飾而竹為之質也陳氏澔曰陸氏音須為班而疏引庾氏説與應氏説相近宜讀如字案魚須文竹古制莫考盧氏崔氏以魚須文竹為二物陳氏陸氏則以魚皮飾竹應氏吳氏則以魚須飾竹或有謂笏首刻魚須形以為飾皆無徵姑並存其説士亦以竹為笏而以象飾其本可也見於天子與射無説笏入大廟説笏非古也小功不説笏當事免則説之既搢必盥雖有執於朝弗有盥矣凡有指畫於君前用笏造受命於君前則書於笏笏畢用也因飾焉説本又作稅同他活反免音問盡呼麥反造七報反正義鄭氏康成曰言凡吉事無所説笏孔疏凡者非一之辭下文小功不説則大功以上皆説之故云惟吉事無所説笏也太廟之中惟君當事説笏免悲哀哭踊之時不在於記事也小功輕不當事可以搢笏搢笏輒盥為必執事也畢盡也孔氏穎達曰天子尊極恐臣畏懼不敢執笏故特言見於天子明臣見君無不執笏也笏所以記事射所以正威儀太廟之中雖當事之時亦執笏也君入太廟當事則説笏時臣驕泰僭放於君當事亦説笏故記者明其非禮既搢笏於帶必盥洗其手謂須預潔淨於後雖有執事於朝不須盥矣以其初盥已畢也造詣君前而受命則書記於笏笏畢用者謂事事皆用笏記之故因而飾以為上下等級焉陸氏佃曰見於天子執贄大宗伯公執桓圭侯執信圭是也射亦執贄射人三公執璧孤執皮帛是也雖有所執猶有所搢故曰見於天子與射無説笏陳氏祥道曰小功則禮可以勝情故不説當事而免則事可以勝禮故説之方氏慤曰指指其事之意而定之畫畫其事之分而籌之皆不敢徒手而為之嫌大慤也書已之思則記之將以獻乎上書君之命則記之將以行乎下也此笏所以為畢用與笏度二尺有六寸其中博三寸其殺六分而去一去起吕反殺去聲正義孔氏穎達曰云其中博三寸明上下二首不博三寸也存疑鄭氏康成曰殺猶杼也孔疏案玉人云天子杼上此云殺故知殺猶杼天子杼上終葵首諸侯不終葵首孔疏以玉人云天子終葵首則諸侯不終葵首可知大夫士又杼其下首廣二寸半孔氏穎達曰天子諸侯上首廣二寸半其天子椎頭不殺也惟笏中央同博三寸天子諸侯從中以上稍稍漸殺至上首六分三寸而去其一餘有二寸半在大夫士又從中以下漸漸殺至下首亦六分而去一諸侯既南靣之君同殺其上大夫士北靣之臣宜俱殺其下也辨正王氏炎曰大圭天子服之非臣下所得用笏則自天子諸侯至大夫士皆有之其非大圭明矣鄭以大圭為笏未見其可也且記言其中博三寸則是上下皆殺也其殺六分去一則上下皆二寸半也又安知天子諸侯殺其上大夫士殺其下乎而素帶終辟大夫素帶辟垂士練帶率下辟居士錦帶弟子縞帶辟鄭讀禆下同率音律下同正義鄭氏康成曰而素帶終辟謂諸侯陳氏澔曰而字下脫諸侯字諸侯不朱裏合素為之如今衣帶為之下天子也大夫亦如之率繂也士以下皆襌不合而繂積如今作幧頭為之也辟讀如禆冕之禆禆謂以繒采飾其側人君充之孔疏充滿也天子諸侯飾帶從首及末遍滿皆飾大夫禆其紐及末士裨其末而已居士道藝處士也此亂脫在是宜承朱裏終辟孔氏穎達曰自此以下至皆從男子明帶及韠韍及王后以下衣服等差上下爛脫今一依鄭注為先後此章總論帶之義也諸侯以素為帶不以朱為裏亦用朱緣終裨士熟帛練為帶用禪帛兩邊繂而已繂謂緶緝也下辟者帶垂者必反屈嚮上又垂而下大夫則總皆裨之士則惟裨嚮下垂者居士用錦為帶尚文也弟子用生縞為帶尚質也方氏慤曰凡帶繚於要者為鞶垂於前者為紳天子諸侯終辟則自鞶至紳皆辟也大夫辟垂於鞶則否士下辟則紳之下而已於上則否也降殺之異如此至於以潔白約其身無貴賤一也居士有由中之良貴則服錦帶以象之弟子有受道之素質則服縞帶以象之惟其稱也陳氏祥道曰天子至士帶皆合帛為之或以素或以練或終辟或辟垂或下辟其飾或朱緑或玄華蓋素得於自然練成於人功終辟則所積者備辟垂下辟則所積者少居士錦以其有備成之文也鄉飲酒禮主人就先生而謀賔介鄭謂賔介處士也鄉射禮徵惟所欲以告於先生君子鄭云君子處士也此蓋處士之未仕者與存疑孔氏穎達曰大夫素帶不終裨但以玄華禆其身之兩旁及屈垂者案此與正義不符案此及下三寸長齊於帶至紳韠結三齊又大夫大帶至無針功又肆束及帶至擁之鄭注俱謂為亂脫宜各有所承孔疏亦謂當依鄭注為先後二家之説如此然猶存記文之舊而不之改先儒闕疑承誤之意有固然耳陳氏集説遽依鄭注改攛仍無一語申明改攛之意若記文次第本如是者然似非儒者存經之義且據此注謂自而素帶亂脫在是宜承朱裏終辟是明謂此節宜在天子素帶朱裏終辟之下非謂天子素帶八字宜在此而素帶之上也集説乃移天子句於此而以而素帶終辟承之則從鄭説中又自以臆為次第也昔朱子注易移天一地二二十字於繫傳第九章之首此在大儒則可至蔡氏改武城則仍存本文加注而以考定武成附其後蓋不敢毅然以刪定自任也下此者而欲以朱子為例其去俞王五家之割裂周官經者幾何謹照原文次第而載鄭説以明之學者亦可得其大槩矣並紐約用組紐女久反正義孔氏穎達曰並並也紐謂帶之交結處約者以物穿紐約結其帶天子以下至弟子之等其所紐約之物並用組為之韠君朱大夫素士爵韋圜殺直天子直公侯前後方大夫前方後挫角士前後正韠音必圜音圓殺去聲挫作臥反正義鄭氏康成曰此玄端服之韠孔疏案上冠禮玄端玄裳黃裳雜裳爵韠謂士玄端之韠此云士爵韋故知是玄端之韠韠之言蔽也凡韠以韋為之必象裳色裳色則天子諸侯玄端朱裳孔疏以韠從裳色若祭服則君大夫士同纁裳也大夫素裳孔疏大夫玄端素裳故素韠惟士玄裳黃裳雜裳也皮辨服皆素韠孔疏士冠禮皮辨服素韠云皆者君與大夫士皮辨皆然圜殺直目韠制也天子四角直無圜殺諸侯殺四角使之方變於天子也所殺者去上下各五寸大夫圜其上角變於君也韠以下為前以上為後士賤與君同不嫌也正直方之間語也孔疏正謂不邪也直而不邪謂之正方而不邪亦謂之正故云直方之間孔氏穎達曰圜則大夫前方後挫角謂挫上角使圜不令方也殺則諸侯前後方謂殺四角上下各去五寸所去之處以物補飾之使方也直則天子直是也陳氏祥道曰天子之韠直其會龍火與山諸侯前後方其會火以下大夫前方後挫角其會山而已鄭氏謂山取其仁火取其明龍取其變天子備焉諸侯火而下卿大夫山士韍韋方氏慤曰韠以韋為之一而已士言爵韋者舉卑以見尊也曰君則兼天子諸侯言之矣然詩以赤芾為諸侯之服者蓋諸侯之在國則朱韍以存臨下之仁在朝則赤韍以示事上之禮故也天子體天以臨下故直諸侯法地以事上故方於方言前後則直亦前後可知所謂直則必方矣所謂方則未必直也此其所以為殺與通論孔氏頴達曰知朱韠非祭服韠者若其祭服則天子諸侯祭服玄衣纁裳其韠則君與大夫士無别同是赤色何得云大夫素士爵韋且祭服之韠大夫以上謂之韍士爵辨謂之韎韐不得稱韠故知非祭服也陳氏祥道曰士冠禮於皮辨玄端皆言韠於爵辨言韎韐詩於素韠言韠於朱芾赤芾乃言芾是韠者芾之通稱而芾與韎韐異其名所以尊祭服也君韠雖以朱而諸侯朝王亦赤芾詩曰赤芾在股赤芾金舄是也士雖以爵凡君子之齊服皆爵韠記曰齊則綪結佩而爵韠是也采芑言方叔之將兵韍以朱瞻彼洛矣言作六師而韍以韎韐者蓋兵事韋辨服韋辨服纁裳故貴者以朱芾卑者以韎韐韎韐即所謂縕韍陳氏澔曰詩疏曰古者佃魚而食因衣其皮先知蔽前後知蔽後後王易之以布帛而猶存其蔽前者重古道不忘本也士服爵辨以韎韐配之則服冕者以芾配之餘論成氏伯璵曰古者韠韍用皮今用絲以代之故其字從絲也總論孔氏頴達曰此總明韠韍上下尊卑之制案雜記云會去上五寸紕以爵韋六寸不至下五寸純以素紃以五采會謂上領縫也領之所用蓋與紕同鄭此言即上去五寸是領也以爵韋為領其會之下兩邊皆紕以爵韋表裏各三寸下所云五寸紕所不至者紕以素紃以五采也韠制大略如此或據禮圖形如要鼓以今參驗不附人情吳氏澄曰韠之制長三尺上廣一尺下廣二尺天子自上之左右角廣一尺處斜裁至下之左右角廣二尺處盡其所裁一直而無所屈故曰直諸侯自上之左右角正裁而下至五寸止止處亦廣一尺自下之左右角正裁而上至五寸止止處亦廣二尺又自上五寸之下廣一尺處斜裁至下五寸之上廣二尺處止上下各有五寸皆不斜裁故方大夫自下之左右角正裁而上至五寸止止處廣二尺就此廣處左右皆斜裁之至上左右角廣一尺處盡其上端之左右及左右之兩邊各剡一寸去其兩角其下端裁方與諸侯同上端不裁方但剡其兩角而已故圜士之下端左右角亦裁方上至五寸而止止處廣二尺亦就止處斜裁至上端廣一尺處盡如大夫但不剡圜二角蓋後直而前方故曰前後正上端用爵韋橫紕表裏各五寸中間長二尺亦用爵韋紕其左右二邊表裏各廣三寸其下端用生帛橫緣表裏各五寸其四角領紕邊紕下緣相接處用五采之紃斜襯其兩緣之交會處存疑鄭氏康成曰天子之士則直諸侯之士則方陸氏佃曰朱爵辨之韠素皮辨之韠爵玄端之韠君主爵辨大夫主皮辨士主玄端韠下廣二尺上廣一尺長三尺其頸五寸肩革帶博二寸頸古井反又吉成反正義鄭氏康成曰頸五寸亦謂廣也頸中央肩兩角皆上接革帶以繫之肩與革帶廣同孔疏上下及肩與革帶俱二寸凡佩繫於革帶孔疏以韠繫於革帶恐佩繫於大帶故云然以大帶用紐約其物細小不堪懸韠佩故也方氏慤曰肩兩角也以在兩旁如人之肩也以繫於帶故並言革帶之博焉吳氏澄曰中頸廣五寸左右肩各廣二寸頸至左右肩中間相去各五寸合為一尺與韠之上端同廣成氏伯璵曰中紐謂之頸以皮為之兩邊紐謂之肩皆穿於革帶者存疑陳氏祥道曰雜記云會去上五寸又云不至下五寸其中餘二尺也則韠之頸肩在上自頸肩而下其身也鄭氏别以其身之五寸為頸而會為頸縫是肩在頸上矣案鄭云皆上接革帶是亦以頸肩在上而未嘗以其身之五寸為頸也且孔氏申之云其上下及肩與革帶俱二寸是合頸下言之則五寸其實則二寸也其云中央者對兩肩言之耳陳氏誤認而辨之方氏誤認而附之乃謂上下皆大而中特小是豈知形如要鼓孔氏固已斥之矣革帶博二寸與雜帶同廣義或然也大夫大帶四寸雜帶君朱緑大夫玄華士緇辟二寸再繚四寸凡帶有率無針功正義鄭氏康成曰雜猶飾也即上之裨君裨帶上以朱下以緑終之孔疏熊氏云據要為正朱是正色故在上緑是間色故在下大夫裨垂外以玄內以華華黃色也孔疏熊氏云遠人為外近人為內玄是天色故在外以華對玄故以為黃黃是地色故在內也士裨垂之下外內皆以緇是為緇帶孔疏士既練帶而士冠禮謂之緇帶據韠色言之韠之內外皆用緇也案疏所謂韠即注所謂裨也大夫以上以素皆廣四寸士以練廣二寸再繚之凡帶有司之帶也亦繂之如士帶矣無針功則不裨之士雖繂帶禆亦用針功凡帶不裨下士也此又亂脫在是宜承紳韠結三齊孔氏穎達曰大夫大帶四寸謂合素為之廣四寸士用單練廣二寸再度繞腰亦四寸有率謂其帶既禪亦以針緶緝其側但繂褶之而已無别禆飾之針功方氏慤曰言雜帶則知素帶之為純言素帶則知雜帶之為采矣存疑陸氏佃曰緑木之間華土之間先儒謂五間緑紅碧紫驑華即驑也雜帶二寸再繚四寸雜帶之二當大帶之一案大帶正服之帶雜帶雜服之帶謂燕私所用正服之帶皆素雜服之帶則天子諸侯有朱有緑大夫有玄有黃士則惟緇而已尊者明卑者暗也大夫以上廣四寸故言大士廣二寸故不言大陸謂雜帶皆二寸恐未然一命縕韍幽衡再命赤韍幽衡三命赤韍蔥衡縕音溫韍音弗幽讀為黝正義鄭氏康成曰此玄冕爵辨服之韠孔疏上是玄端之韠此韠異於上尊祭服異其名耳孔疏他服稱韠祭服稱韍是異其名韍之言亦蔽也縕赤黃之間色所謂韎也孔疏士冠禮爵辨韎韐此縕服當彼韎韐蓋以蒨草染之其色淺赤則縕為赤黃之間色衡佩玉之衡也幽讀為黝黑謂之黝青謂之蔥孔疏周禮牧人陰祀用黝牲又孫炎注爾雅云黝青黑蔥則青之異色周禮公侯伯之卿三命其大夫再命其士一命子男之卿再命其大夫一命其士不命孔疏公之卿玄冕侯伯之卿絺冕陳氏祥道曰縕則其色雜雜則賤故於士言之赤則其色純矣純則貴故於卿大夫言之方氏慤曰縕赤黃之色縕者藏也一命其韍用縕以見雖有所縕未足以發見而著明也再命三命爵位漸隆足以發見而著明矣故其韍用赤焉辨正陳氏祥道曰韍不獨祭服也服其命服朱芾斯皇見於方叔赤芾金舄又歌於會東都之諸侯禮曰君朱大夫素士爵韋又曰赤韍幽衡赤韍蔥衡若朝服也然主人玄端素韠於廟門之內以筮日則見於士冠禮之初而緇衣則爵韠皮辨則素韠又序於士冠禮三加之際則韠不得為朝服也案韠韍無别朝祭命數亦不專據侯國也特以一再三命定縕赤並衡之幽蔥耳言三命則上者可知而不虞無别者形則圜殺直此經是已會則龍火山明堂位是已天子素帶朱裏終辟正義鄭氏康成曰天子素帶謂大帶也孔氏穎達曰天子以素為帶用朱為裏終竟帶身在要及垂皆禆故曰終辟方氏慤曰帶之體用素示有潔白之德約其身帶之裏用朱示有含陽之德密於心王后禕衣夫人揄狄禕音翬許韋反下同揄音搖狄同翟正義鄭氏康成曰禕讀如翬揄讀如搖翬搖皆翟雉名也孔疏爾雅釋鳥伊雒而南素質五色皆備成章曰翬江淮而南青質五色皆備成章曰搖刻繒而畫之著於衣以為飾因以為名也夫人三夫人孔疏王后夫人其文相次故以夫人為三夫人亦侯伯之夫人也案鄭注周禮內司服侯伯夫人揄狄子男之夫人闕狄孔氏穎達曰此至從男子論王后以下命婦之服禕衣畫翬於衣六服之最尊也狄讀如翟通論鄭氏康成曰王者之後夫人亦禕衣孔疏王者之後與天子同故祭其先王亦禕衣也若祭先公則降焉魯祭周公其夫人亦褘衣故明堂位云君衮冕立於阼夫人副褘立於房中孔氏穎達曰鄭注內司服云褘衣畫翬揄狄畫搖闕翟刻而不畫從王祭先王則服禕衣祭先公則服揄狄祭羣小祀則服闕翟鞠衣黃桑服也色如鞠塵服之以告桑展衣以禮見王及賔客禒衣御於王之服闕狄赤搖翟青禕衣玄鞠衣黃展衣白禒衣黑其六服皆以素紗為裏陳氏祥道曰九者陽之窮故王之吉服九六者陰之終故后之吉服六王之服九而祭服六后之服六而祭服三以婦人不預天地山川社稷之祭故也王之服衣裳之色異后之服連衣裳而其色同以婦人之德本末純一故也王之服禪而無裏后之服裏而不禪以陽成於竒陰成於偶故也崔靈恩謂王后三翟數皆十二三公而下夫人雉數如命數於理或然方氏慤曰言禕衣則知揄之為衣言揄狄則知禕之為狄鞠衣而下不言狄則以不畫狄故也六服之制上得以兼下下不得而僭上后之禕衣至尊之所獨揄狄則諸侯公夫人之所同狄之為性交有時别有倫守死而不犯分婦德所宜以至后之五路皆重翟其義亦若是而已存疑孔氏頴達曰三夫人與三公同對王為屈三公執璧與子男同則三夫人亦當與子男夫人同故鄭注司服云三夫人及公之妻其屈狄以下乎為兩解之也方氏慤曰三夫人屈狄與三公在朝鷩冕同義案本文言夫人揄狄蓋合三夫人及侯伯夫人言之不應謂三夫人降於侯伯之夫人也司服注本疑辭不足為據且射人三公之璧本與子男之璧不同三公縱屈於王豈有全同子男之理三寸長齊於帶紳長制士三尺有司二尺有五寸子遊曰參分帶下紳居二焉紳韠結三齊正義鄭氏康成曰三寸謂約帶紐組之廣也長齊於帶與紳齊也紳帶之垂者言其屈而重也孔疏解垂帶名紳之意論語曰子張書諸紳有司府史之屬也三分帶下而三尺則帶髙於中也結約餘也此又亂脫在是宜承約用組結或為襟孔氏穎達曰組濶三寸長齊於帶者約紐組餘長三尺與帶垂者齊紳謂帶之垂者紳重也重屈而舒申其制士長三尺有司長二尺五寸引子遊之言以證紳之長短人長八尺大帶之下四尺五寸分為三分紳居二分長三尺也紳韠結三齊者紳謂紳帶韠謂蔽膝結謂約紐餘組三者俱長三尺故云三齊也方氏慤曰有司欲其便於趨走故特去其五寸案帶有當心上者有當腰者自心上至腰一尺五寸腰以下三尺紳指自腰以下者故曰三分帶下紳居二焉君命屈狄再命褘衣一命禪衣士禒衣禕依注作鞠禪張戰反禒土亂反正義鄭氏康成曰屈周禮作闕謂刻繒為翟不畫也此子男之夫人及其卿大夫士之妻命服也孔疏典命云子男之卿再命其大夫一命其士不命此云再命禕衣一命禪衣士禒衣又承闕狄下正與子男同故知據子男夫人及卿大夫士之妻也禕當為鞠字之誤也孔疏禕衣是王后之服故疑當為鞠子男之卿再命而妻鞠衣則鞠衣禪衣禒衣者諸侯之臣皆分為三等其妻以次受此服也孔疏明諸侯臣之妻唯有三等之服公之臣孤為上卿大夫次之士次之孔疏此謂上公臣為三等侯伯子男之臣卿為上大夫次之士次之孔疏是亦三等禒或作稅孔氏穎達曰禪展也子男之士不命其妻服禒衣鄭注士喪禮禒之言緣黑衣裳以赤緣之陳氏祥道曰周官內司服辨外內命婦之服鞠衣展衣緣衣鄭氏以為內命婦之服鞠衣九嬪也展衣世婦也緣衣女御也外命婦者其夫孤也則鞠衣卿大夫也則展衣士也則緣衣通論范氏鍾曰王后而下服分六等各視其夫爵以位為之隆殺也世婦而上各分六等由君而命以德為之隆殺也唯世婦命於奠繭昭婦功也其他皆從男子昭婦順也六宫之內后親蠶世婦以下皆分繭稱絲效功以共冕服百官之衆夫尊於朝婦榮於室位髙而後身顯無敢覬覦一衣服之間區别如此安有不稱其服者乎如是然後家齊而國治存疑鄭氏康成曰君女君也孔疏女君謂后禮天子諸侯命其臣后夫人亦命其妻以衣服所謂夫尊於朝妻榮於室也孔疏子男之妻不得受天子之命受后之命存異陸氏佃曰屈狄其夫五命之服也蒙上又兩加命是為九命所謂再命禕衣者此歟不言五命屈狄而言君命著君命以竒自五而加焉一加為七命又一加為九命矣士一命其妻禒衣若加一命是為大夫則其妻服禪衣所謂一命禪衣者此歟據侯伯之卿三命其大夫再命其士一命案鄭説下禕當作鞠甚是陸氏讀如字而以經文一命再命為加命謂子男之夫人加命服誤也如其説則子男妻五命屈狄加一命而六則揄翟加再命而七則禕衣乃可通耳加一命乃禪衣何説耶君命王命也獻繭之禮世婦先奉繭示王乃獻后則必王命之而后傳王命以命之也獨於子男之夫人言之者其上則后夫人屬君其下則卿大夫士為臣於此言君命則上與下該矣經曰君命尊王也記曰夫人之不命於天子自魯公始則夫人固命於王不命於后可知唯世婦命於奠繭其他則皆從男子正義鄭氏康成曰奠猶獻也孔疏凡獻物必先奠於地凡世婦以下蠶事畢獻繭乃命之以其服天子之后夫人九嬪及諸侯之夫人夫在其位則妻得服其服矣孔氏穎達曰世婦謂天子二十七世婦以下也存疑孔氏穎逹曰凡夫尊於朝妻貴於室皆得各服其命服今唯世婦及卿大夫之妻雖已被命猶不得即服命服必又須經入助蠶蠶畢獻繭繭多功大君親命之著服乃得服爾故曰命於奠繭世婦以下女御亦然其他不須奠繭之命其夫得命其妻得著命服故曰皆從男子案禮天子諸侯娶一國則二國媵之皆以姪娣從一女為嫡為妻天子稱后諸侯稱夫人一女為左媵一女為右媵皆為貴妾天子及諸侯俱稱妃或與后夫人通稱三妃亦曰三夫人蓋夫者扶也取扶助人之義故王后亦可稱夫人周宣王稱薑后曰夫人周官漿人供夫人致飲于賓客之禮掌客夫人致禮玉人諸侯以享夫人夫人以勞諸侯是也一嫡二媵各以姪娣從天子一娶十二女則各從姪娣三人凡九人謂之九嬪禮所謂嫡姪娣左媵姪娣右媵姪娣是也后妃及嬪所從侍女嫡四人左右媵各三人凡十人謂之女御周官女御掌服二人掌縫八人是也俱屬于九嬪教之故亦稱九御周語所謂內官不過九御也三夫人九嬪不必奠繭而後命其命于奠繭者唯世婦耳但二十七世婦有本先君宫人而為世婦者或有從女御之賢而加命者此內世婦之命于奠繭者也若卿大夫之妻為外世婦則視其夫之爵以為差所謂其他則皆從男子亦必因奠繭而命也周禮天官九嬪舉數世婦不舉數春官世婦乃舉數然總之不過二十七人止矣天官世婦不言數內恆少也春官言每宫卿二人大夫四人上士八人則當賓祭時所用相禮之數非實有八十四世婦也欽定禮記義疏卷四十二
