body:
  text: 郊特牲第十一之二天子適四方先柴正義鄭氏康成曰所到必先燔柴有事於上帝也書曰歲二月東巡守至于岱宗柴孔氏穎達曰此明天子巡守祭天之禮巡守至方嶽先燔柴以告天尊天也徐氏師曾曰周制天子十二年一巡守適四方諸侯之國至於方嶽有覲諸侯觀民風考正朔一王制明賞罰諸事然初至皆未行特先燔柴以告至於天也通論應氏鏞曰四方惟天子所適者普天之下莫非王土也所適必先柴昊天曰明及爾出王昊天曰旦及爾游衍也噫其與周行天下將必有車轍馬跡焉者異矣郊之祭也迎長日之至也大報天而主日也兆於南郊就陽位也掃地而祭於其質也器用陶匏以象天地之性也於郊故謂之郊牲用騂尚赤也用犢貴誠也騂息營反正義孔氏穎達曰燔柴在壇正祭於地故云掃地而祭陶謂瓦器尊及豆簋之屬方氏慤曰郊之祭在建子之月而陽生於子故曰迎長日之至至猶來也與月令仲夏日長至異矣故言迎焉祭天必迎長日之至者當是時陽始事矣天以始事為功也周官以冬日至致天神蓋謂是矣以迎長日之至故以日為主天神不可得見所可瞻仰者日月星辰而已兆則為之分域如龜兆之可别也既曰兆於南郊矣又曰掃地而祭者蓋築壇謂之兆若兆五帝於四郊是矣掃地亦謂之兆若此所言是矣此主祭天而器之所象乃並言地者蓋地道無成而代有終象地之性亦所以歸功於天也牲用騂即牧人所謂陽事用騂牲大宗伯以蒼璧禮天牲幣各放其器之色則祀天之牲用蒼乃與牧人所言異者蓋赤為陽之盛色而蒼與青其類也黑為陰之盛色而黃與白其類也若是則祀天之牲不必蒼亦從其類而已陸氏佃曰郊祭禮務質略是之謂大報若社不美不足為報也故曰內之為尊外之為樂少之為貴多之為美天造而始之地作而終之故天言報在前地言報在後天無所不在以我祭於郊故謂之郊於國則已䙝於野則已疏祭之郊節矣馬氏睎孟曰祭義言大報天而主日配以月於此不言月者文略也就陽位者此釋其郊之意掃地而祭器用陶匏此釋其以少為貴之意也徐氏師曽曰既曰圜丘曰泰壇矣而又謂之郊者以兆在南郊故因其地而為名也牲用騂者周尚赤也通論張子曰周之始郊日以至日至陽氣之始也四時迎氣之小者日至而郊迎氣之大者於此可以見郊之大意郊之祭迎長日之至此之謂也言日至則更不容卜卜日則失氣至之時矣圜丘掃地而祭所貴簡易天道本簡易繁文虛費亦不饗也故掃地不壇服以大裘酌以陶匏禮以蒼璧牲以犢燎以柴禮簡誠至止當如是而已人道之䙝非所以事天也然必以其祖配者物本乎天人本乎祖事天之禮成則事人之道不可不繼也故當燔柴成禮之後迎祖尸入而以人鬼之禮祭之尸人象也俎簋籩豆人器也朝事饋食人禮也以禰對祖則禰親而祖尊以祖對天則祖親而天尊事天事人盡於愛敬此王者所以郊祀之意也陳氏祥道曰陽祀以騂為主而不必皆騂陰祀以黝為主而不必皆黝牧人所言亦其大率而已郊特牲之騂犢閟宮之騂犧此祀天之用騂者旱麓信南山之騂牡閟宮之騂剛洛誥之騂牛此宗廟之用騂者也爾雅曰黃牛黑唇曰犉詩曰殺時犉牡此社稷之用黝者也詩曰來方禋祀以其騂黑則四方有用騂黑者矣孔子曰犂牛之子騂且角山川其舍諸則山川亦有用騂者矣存異鄭氏康成曰迎長日者建卯而晝夜分分而日長也辨正朱子曰以始祖配天須在冬至一陽始生萬物之始宗祀九月萬物之成父者我所自生帝者生物之祖故推以為配而祀於明堂此議方正陳氏澔曰今案郊祀一節先儒之論有子月寅月之異今以朱說為定葉氏夢得曰以郊為迎長日之至下言郊之用辛周之始郊日以至正以别魯鄭氏反之强以建卯為日至甚矣其誣也冬至之日祭天于圜丘此周之正禮不可易者也孟春建寅之月郊蓋祈穀之祭耳魯雖得郊不得同於天子是以因用郊之日以上辛三卜不從至建寅之月而止乃不郊書於春秋者甚明則魯郊殆周祈穀之郊而已故左氏以為啓蟄而郊凡周之政事大抵皆用夏正蓋天時有不可亂故周官每以正歲别之鄭氏本不曉郊禘之辨故以冬至之祭為大禘以祈穀為正郊此其言所以紛紛所引易說亦無據郊之用辛也周之始郊日以至正義孔氏穎達曰王肅用董仲舒劉向之說以周之始郊日以至者對建寅之月又祈穀郊祭此言始者對建寅為始也方氏慤曰言春夏祈穀於上帝則知周之郊非一周以建子之月為正則冬至之郊為歲之始郊矣始郊言以至則祈穀之郊不必以至於周之郊言日至則用辛之郊不必皆周存疑張子曰自冬至之日以樂降神為郊之始而未祀既降神乃用辛日而祀故曰迎長日之至又曰郊之用辛也周之始郊日以至陳氏澔曰郊之用辛謂周家始郊祀適遇冬至是辛日自後用冬至後辛日也徐氏師曾曰郊用日至不用辛日其用辛也蓋因周人始郊所用日至之日偶遇辛日後人因之遂用至後辛日不知其非禮也存異鄭氏康成曰易說三王之郊一用夏正孔疏易緯乾鑿度文辨正楊氏復曰鄭氏必以迎長日為建寅之月郊天迎春分之長日又以周之始郊為魯郊者蓋鄭氏欲分圜丘與郊為兩事周既以冬至禘圜丘則冬至不得復有郊故用易緯之說以周郊用建寅之月此云周之始郊日以至者非周之始郊乃魯郊夫此章本文明言周之始郊今乃以周為魯豈不繆哉孔氏穎達曰案聖證論王肅難鄭云鄭以祭法禘黃帝及嚳為配圜丘之祀祭法說禘無圜丘之名周官圜丘不名為禘是禘非圜丘之祭也鄭既以祭法禘嚳為圜丘又大傳王者禘其祖之所自出而鄭又施之於郊祭后稷是亂禮之名實也爾雅云禘大祭也繹又祭也皆祭宗廟之名則禘是五年大祭先祖非圜丘及郊也又詩思文后稷配天之頌無帝嚳配圜丘之文知郊即圜丘圜丘即郊所在言之則謂之郊所祭言之則謂之圜丘於郊築泰壇象圜丘之形以丘言之本諸天地之性故祭法云燔柴於泰壇則圜丘也此云周之始郊日以至周禮云冬至祭天於圜丘知圜丘與郊是一也案孔疏所載本非指此記注說言因係此記疏語故附存之案郊之用辛謂祈穀諸祭其用辛日則以武王牧野柴望告成是辛亥日乃周有天下之始故以為一代之制若郊之日則必以至為一陽所自生也卜郊受命于祖廟作龜于禰宮尊祖親考之義也卜之日王立于澤親聽誓命受教諌之義也獻命庫門之內戒百官也大廟之命戒百姓也正義鄭氏康成曰受命謂告之退而卜澤澤宮也所以擇賢之宮也既卜必到澤宮擇可與祭祀者因誓敕之以禮也禮器曰舉賢而置之聚衆而誓之是也王自澤宮而還以誓命重相申敕庫門在雉門之外入庫門則至廟門外矣大廟祖廟也百官公卿以下也百姓王之親也孔疏王親謂之百姓者皇氏云姓者生也並是王之先祖所生入廟戒親親也王自此還齊路寢之室庫或為廏孔氏穎達曰郊事既尊不敢輒專故先告祖後乃卜亦如受命也作灼也先告祖受命又至禰廟卜之也考亦禰也尊祖故受命命由尊者出親禰故作龜作龜是事事宜就親近者也以射擇士因呼為澤宮至澤宮既射又使有司誓敕舊章齊戒之禮王又親聽受誓之告祖作禰是受教義立澤聽誓是受諫義王自澤宮而還至欲致齊之時有司獻王所以命百官之事王乃於庫門之內戒百官大廟之內戒百姓百官疏故在公朝重戒之百姓王之親屬故在大廟而重戒之方氏慤曰於祖則受命以其能始事故也於禰則作龜以其能成事故也於祖曰廟以其遠而神事之也於禰曰宮以其近而人事之也尊親之義又在於是矣灼龜將以作事故以作言之以一人之尊亦親聽誓命則以嚴上故也聚衆而誓非為王也特助祭者爾而王亦親聽之故有受教諫之義陳氏澔曰用冬至則有定日此但云卜郊則非卜日矣下文言帝牛不吉亦或此為卜牲與通論孔氏穎達曰王者獵在囿而主皮射亦在澤故鄭注鄉射記引尚書傳主皮射陳於澤然後卿大夫相與射也又云鄉之取也於囿中勇力之取也今之取也於澤宮揖讓之取也張子曰受命祖廟作龜禰宮次序之宜陸氏佃曰毛詩傳曰雍澤也澤蓋學宮辟雍周氏諝曰郊之禮歲有常而卜之必受命於祖廟者先王一舉事未嘗不稟受於鬼神也受命必於祖作龜必於禰者先王之於祖致其義義則尊之而於禰則盡其仁仁則親之故也存疑程子曰春秋有卜郊但卜上辛不吉則卜中辛中辛更不吉便用下辛不當更卜春秋乃三卜四卜五卜至於不郊非禮也方氏慤曰卜郊蓋指用辛之郊爾以其有上辛中辛下辛故周郊以日至而大宰於祀大神祗言卜日者崔氏謂卜日以至為主不吉乃用他日理或然也案此卜郊當以陳氏卜牲義為正周之始郊日以至日固無所用卜矣程子卜辛之說即曲禮不過三之義而泛論郊之用辛者也夫先王之制為卜筮以神道設教而祭用卜亦示其誠敬之心不敢有所苟耳若郊日之以至報本之義莫大焉陽生於子物本於天人本於祖卜不吉而用他日於義奚取乎然則大宰所云帥執事而卜日亦謂祭之無常期者而下云大神示亦如之則祈穀諸祭是也祭之日王皮辨以聽祭報示民嚴上也喪者不哭不敢凶服汜掃反道鄉為田燭弗命而民聽上汜芳劍反亦作泛掃素報反正義鄭氏康成曰報猶白也夙興朝服以待白祭事者乃後服祭服而行事也周禮祭之日小宗伯逆粢省鑊告時於王告備於王也孔疏引周禮者證小宗伯既有告事王皮辨聽之是也反道剗令新土在上田燭田首為燭皆謂郊道之民為之也弗命而民聽上化王嚴上也孔氏穎達曰未郊故未服大裘且服日視朝之服汜掃廣掃也鄉謂郊內六鄉也周氏諝曰喪者不哭不敢凶服所以異其吉泛掃反道所以去其舊鄉為田燭所以尚其質民之奉君猶君之奉天果君能奉天則民化矣馬氏睎孟曰報其時之早晚與牲之備具事之小者而皮辨以聽之所以尊天而不敢慢也不惟不敢慢於天亦示其民之所以知嚴也以天子之尊而其嚴如此則民莫不從而倣之故弗命而民聽上也通論孔氏穎達曰周禮蠟氏云凡國之大祭祀令州里除不蠲禁刑者任人及凶服者以及郊野而此云不命者作記之人盛美民聽上之義未必實然也祭之日王被衮以象天戴冕璪十有二旒則天數也乘素車貴其質也旗十有二旒龍章而設日月以象天也天垂象聖人則之郊所以明天道也被皮義反璪音早正義鄭氏康成曰衮象天謂有日月星辰之章也天之大數不過十二設日月畫於旗上明天道謂則之以示人也孔氏穎達曰龍為陽氣變化日月以光照下皆是象天也方氏慤曰天以龍為用而衮以龍為首故被衮以象天經言天子龍衮是也璪者聚采以貫玉而有華藻故謂之璪字通於藻左傳曰周之王也制禮上物不過十二以為天之大數也彼有象而我象之故於龍言象彼有則而我則之故于數言則以畫龍而文成焉故曰章以日月而設飾焉故曰設龍也日月也數也質也皆天所示之象也而聖人觀之以為儀物之則故曰天垂象聖人則之天道遠而難知神而莫測故郊之儀物必觀象而作焉則所以明之也通論陸氏佃曰古者郊祀之禮內服大裘其上加衮故凡裘言服而衮言被然周禮王祭天乘玉路建大常此祭天乘素車建大旗則祭天之禮有兩旗兩車也蓋乘玉路建大常者即道之車也祭之日馭之以適郊乘素車建大旗者即事之車也祭之日馭之以赴壇何以知其如此也曰巾車王之玉路錫樊纓十有再就建大常十有二斿以祀則凡王之祭祀無不乘矣祭天禮之至而乘泛祭之玉路以物則非文以志則非敬故知乘素車建大旗以祀之而玉路者乘之以適郊固有兩車也非特祭天也四時之田王乘戎路建大常而巾車之職曰木路前樊鵠纓建大麾以田則田之車旗亦以兩蓋乘木路建大麾者即道之車也與王乘玉路建大常同意乘戎路建大常者即事之車也與王乘素車建大旗同意凡此者皆周制也或曰司常掌九旗之物名日月為常交龍為旗旗無三辰而此云龍章而設日月何也曰此大旗也非諸侯所得建故其上又有日月星辰之章以祀天神非特有升降之龍也明堂位曰旗十有二旒日月之章覲禮曰王建大旗以象日月升龍降龍拜日於東門之外左傳云三辰旗旗昭其明也然則龍旗而設日月其來固久矣又曰郊之祭也其序可推而知嘗試言之蓋祭之日夜向晨王皮辨以聽祭報而小宗伯告時於王則王易皮辨服衮冕乘玉路建大常以適郊既至下玉路息大次又衮冕以聽祭報而小宗伯告備于王則王脫衮著大裘以衮被之易玉路乘素車建大旗以即壇既至下素車捧帛升柴置於牲上以焚之致天神祭法所謂燔柴于泰壇此先後之序也存異鄭氏康成曰此魯禮也周禮王祀昊天上帝則服大裘而冕祀五帝亦如之魯侯之服自衮冕而下也素車殷路也魯公之郊用殷禮也孔氏穎達曰魯用王禮作記之人既以魯禮而為周郊遂以魯侯稱王也辨正陳氏祥道曰王祀天內服大裘外被龍衮龍衮所以襲大裘也記曰裘之裼也見美也服之襲也充美也禮不盛服不充故大裘不裼則襲衮可知也議者以司裘言大裘祀天而不及衮司服言大裘而冕祀昊天上帝在衮冕之上謂大裘而冕則不加衮不知先王祀天以冬至之日為正而裘又服之本也故取大裘以名之猶之朝服緇衣羔裘而詩獨稱羔裘如濡羔裘逍遙燕服𤣥端蠟服黃衣皆狐裘而詩獨稱狐裘以朝狐裘黃黃則裘之上未嘗無衣也古者裘服有裼之而不襲襲之而不裼未有表之而不裼襲者則走服大裘而不襲非禮意也林氏之奇曰舜觀古人之象繪日月星辰山龍華蟲於衣繡宗彝藻火粉米黼黻於裳以彰天子之盛德能備此十二物也歷代之制莫不皆然說者謂周登三辰於旗服惟九章何其異也蓋不過據左氏三辰旗旗之文左氏謂旗有三辰何嘗謂衣無三辰邪况又謂上公九章而王服亦九章何周公制禮乃至於無别與此云祭之日王被衮以象天則十二章備鄭氏謂有日月星辰之章此魯禮也夫被衮以象天周制固然何魯之足云豈有周制止九章魯乃加以十二之理乎楊氏復曰玩司服經文公之服自衮冕而下衮冕九章推而上之則天子之服十二章可知先鄭謂六服同冕則繪三辰於服而冕可知也今不曰三辰而冕而曰大裘而冕者何與蓋享先王先公之禮備乎文則以衮鷩之文名之祀昊天上帝之服尚乎質則以大裘之質名之與牲用犢席用稿秸器用陶匏之意同所以尊天也且自上古至於周天子仰則天數路十二就常十二斿馬十二間圭尺二寸繅十二就而冕服之章莫不皆然鄭氏謂周以日月星辰畫於旗而冕止九章不知龍登於旗山登於俎黼登於扆九章亦可損乎然則服備十二章則三辰不待言而可見矣案此記郊祀觀象取則情文具備其為周禮無疑也諸儒之辨詳矣帝牛不吉以為稷牛帝牛必在滌三月稷牛唯具所以别事天神與人鬼也滌音迪别彼列反正義鄭氏康成曰帝牛不吉以為稷牛養牲必養二也滌牢中所搜除處也孔疏搜謂搜掃清滌故周禮掌養馬者謂之廋人唯具遭時又選可用也孔疏謂帝牲遭災之時既取稷牲而用之其祀稷之牲臨時選其可者孔氏穎達曰郊天既以后稷為配故養牲養二以擬祭也凡帝牲稷牲初時皆卜取其牲繫於牢芻之三月若臨時有故乃變之也為猶用也若帝牛不吉或死傷則用稷牛為帝牛其祭稷之牛臨時别取天神既尊故須在滌人鬼稍卑故臨時别取唯具而巳是分别天神與人鬼不同也方氏慤曰充人掌繫祭祀之牲牷祀五帝則繫于牢芻之三月享先王亦如之謂之滌則以精潔為義唯具則取足而已不必三月之滌也帝為天神稷為人鬼徐氏師曾曰天神遠而尊人鬼近而親故事之不同存疑劉氏彝曰帝牛不吉以為稷牛在滌三月然後卜也陸氏佃曰帝牛不吉則以為稷牛案養牲據疏則先卜而後養唯先卜故有帝牛稷牛之分劉氏以為既養臨祭方卜似未然注疏俱云用稷牛代帝牛故下有在滌及唯具之文陸氏謂以不吉者為稷牛亦與經左萬物本乎天人本乎祖此所以配上帝也郊之祭也大報本反始也正義鄭氏康成曰言俱本可以配孔氏穎達曰此論尊祖配天之義大報本反始者釋所以郊祭天也天為物本祖為王本祭天以祖配之所以報謝其本反始者反其初始謝其恩謂之報歸其初謂之反此文天神尊故加大字黃氏叔暘曰物非天不生人非祖不生祖與天合其功同也功同則報之亦同此稷之所以配天也由是觀之則郊之祭不惟報物之本而人之本亦報矣不惟反物之始而人之始亦反矣乃報本反始之大者非若常祭不能兼也通論呂氏大臨曰祀天禮之至敬者也然人道有所未盡故從其祖配之所謂配者當於祀天禮成之後迎祖尸以人鬼之禮祭之必配祭者所以盡人道之至愛凡言配天及郊祀之有尸者義當如此陸氏佃曰家主中霤國主社示本也此諸侯大夫之事萬物本乎天人本乎祖此所以配上帝也此天子之事周氏諝曰孝經曰郊祀后稷以配天宗祀文王於明堂以配上帝是祖之所配於圜丘者昊天而考之所配於明堂者上帝此言配上帝何也天言其體帝言其用故對而言則天與帝異離而言則帝即天天即帝也易之象曰先王以作樂崇德殷薦之上帝以配祖考其言上帝與此同意天子大蠟八伊耆氏始為蠟蠟也者索也歲十二月合聚萬物而索饗之也蠟仕詐反耆巨夷反正義鄭氏康成曰八者所祭有八神也索謂求索也饗者祭其神也萬物有功加於民者神使為之也祭之以報焉造者配之也孔疏謂造此蠟祭配此八神而祭孔氏穎達曰此論蠟祭之事所祭之神合聚萬物而饗之但以此八神為主大者天子之蠟對諸侯為大陳氏祥道曰蠟之為祭所以報本反始息老送終也其所致者川澤山林以至土示天神莫不與焉則合聚萬物而饗之者非特八神也而所重者八以其尤有功於田故也方氏慤曰合而言之則曰大蠟分而言之則曰八蠟曰大蠟八者則知自八者之外皆其小也昔之所用者物之形今之所索者物之靈故索而乃可饗焉黨正所謂國索鬼神而祭祀是矣凡物之種種固已離矣十二月物之合聚之時也先王因其合而合之因其聚而聚之以索饗不亦宜乎黃氏乾行曰蠟之為名求索之義也所以謂之索者蓋歲十二月合聚萬物乃物成之時也夫成物之功神實相之則報功之典不可或缺况有功於農為民所天如八神者乎通論孔氏穎達曰周禮大司樂六變而致象物及天神鄭云象謂日月此不數者先嗇司嗇並是人神有益於人水庸之屬有益稼穡故祭之天神象物去人縣遠雖祭不為八神之數存疑鄭氏康成曰歲十二月周之正朔建亥之月也皇氏侃曰神農伊耆一代總號其子孫為天子者始為蠟祭孔氏穎達曰八蠟先嗇一司嗇二農三郵表畷四貓虎五坊六水庸七昆蟲八伊耆氏神農也以其初為田事故為蠟祭以報天或云即帝堯是也辨正周氏諝曰歲十二月即夏十二月乃建丑之月也蓋建丑之月謂之蠟始可謂息民之祭果周之十二月則豈得為息民之祭乎徐氏師曾曰八神以下經文為正鄭氏去百種而增昆蟲方氏亦去百種而分貓虎為二張子雖用百種而序之於末皆非也歲十二月當依周氏謂夏正建丑之月案伊耆氏本秋官之屬後鄭以為古天子號而孔穎達明堂位疏據易神農始作耒耜遂以神農當之又或云即帝堯而雲莊陳氏直采其說以入注豈亦以明堂位文伊耆氏之樂下即記虞夏商周之樂而實之以陶唐氏與陳用之援周禮與壺涿氏銜枚氏為一例則非古天子有天下之號矣且不特此自冥氏以下十三官皆掌攻取昆蟲鳥獸草木之官而伊耆乃次其後正與昆蟲毋作草木歸其澤為一類但其所職大祭祀則共杖咸有爵及王齒杖特不言蠟耳考春官籥章掌土鼓豳籥國祭蠟則吹豳頌擊土鼓以息老物證之明堂位云土鼓葦籥伊耆氏之樂此篇自天子之大蠟八至黃冠草服也皆蠟祭文而其中言葛帶榛杖喪殺也者則知鼓籥杖咸並伊耆氏一官掌之以其名考其職是佐天子非古天子也或言共杖或言葦籥皆互文見意而伊耆氏之名官大蠟之終始一一可通已但古無確據並以疑存之蠟之祭也主先嗇而祭司嗇也祭百種以報嗇也饗農及郵表畷禽獸仁之至義之盡也古之君子使之必報之迎貓為其食田鼠也迎虎為其食田豕也迎而祭之也祭坊與水庸事也種之勇反下之種同郵亦作尤有周反畷丁劣反貓又作猫為于僞反坊音房正義鄭氏康成曰先嗇若神農者司嗇后稷是也嗇所樹藝之功使盡饗之故云祭百種以報嗇農田畯也郵表畷謂田畯所以督約百姓於井閒之處也詩云為下國畷郵孔疏郵謂民之郵舍今毛詩商頌長發篇作綴旒禽獸服不氏所教擾猛獸也迎而祭之祭其神也水庸溝也孔氏穎達曰田畯有功於民郵若郵亭屋宇處所表田畔畷者謂井畔相連畷於此田畔相連畷之所造此郵舍田畯處焉禽獸即下文貓虎之屬言禽獸則助田除害者皆悉包之不忘恩而報之是仁有功必報之是義也坊者所以蓄水亦以障水庸者所以受水亦以泄水祭此坊與水庸之神也馬氏睎孟曰先嗇者其智足以創物立於其先司嗇者因其成法而謹司其職而已故祭則以先嗇為主而以司嗇配之陳氏澔曰主者言為八神之主也百種之神也周氏諝曰君子之於物莫不各因其才而使之雖使之甚勞亦必有以為之報此使人之術與忠厚之道常見於祭祀之閒也坊與水庸以其有事於我故祭之辨正徐氏師曾曰據此則八神者先嗇一司嗇二百種三農四郵表畷五貓虎六坊七水庸八可以無疑而紛紛之說不攻自破矣學者不信經而信注亦獨何哉曰土反其宅水歸其壑昆蟲毋作草木歸其澤皮辨素服而祭素服以送終也葛帶榛杖喪殺也蠟之祭仁之至義之盡也黃衣黃冠而祭息田夫也野夫黃冠黃冠草服也壑火各反榛側巾反殺所界反正義鄭氏康成曰土反其宅至歸其澤蠟祝辭也若辭同則祭同處可知矣壑猶坑也昆蟲暑生寒死螟螽之屬為害者也送終喪殺所謂老物也素服衣裳皆素黃衣黃冠而祭謂既蠟臘先祖五祀也於是勞農以休息之論語云黃衣狐裘黃冠草服言祭以息民服象其時物之色季秋而草木黃落孔氏穎達曰反歸也土歸其宅則不崩水歸其壑謂不泛溢昆蟲毋作謂不為災草苔稗木榛梗之屬當各歸生藪澤之中不得生於良田害嘉穀也案周禮籥章云國蠟祭則吹豳頌擊土鼓息老物以物老故素服物老將終故葛帶榛杖也素服送終是仁恩葛帶榛杖示陰氣斷割故云仁之至義之盡也田夫則野夫也陳氏祥道曰蠟以息老物故服送終之服臘以息民故服田夫之服方氏慤曰别言之則服止言衣裳合言之則辨亦服爾故下止言素服也帶不以麻而以葛杖不以竹而以榛若喪也而實非喪故曰喪殺也草服草野之服上兼言黃衣而下止言黃冠則以草服該之也息猶氣之息也作之於始息之於終道終則有始今歲之息乃所以兆來歲之作往來未嘗息所以為息也馬氏睎孟曰蠟者於歲之終報其成功又以祈來年之始故祝之辭如此通論陸氏佃曰據此皮辨以祭而已所謂素服蓋去繡黼丹朱中衣也天謂之𤣥𤣥冠象焉朝服也地謂之黃黃冠象焉野服也野夫務知地事而巳言草以非齊服𤣥冠齊服齊朝廷之事也草野田之事也草艮也齊㢲也草昧也齊明也方氏慤曰黃者土之色百昌生於土而作終亦反於土而息冬則反於土之時也服以是色宜矣土爰稼穡者田夫之事取土之義以息田夫又宜矣以土之義故凡野夫皆黃冠焉言其所事曰田夫言其所居曰野夫陳氏祥道曰蠟祭之服王𤣥冕而有司皮辨素服葛帶榛杖其牲體疈辜其樂六樂而奏六變吹豳頌擊土鼓舞兵舞帗舞古者蠟則飲於學黨正屬民飲酒於序是也既蠟則臘先祖五祀之廟仲尼與於蠟賓事畢出遊於觀之上是也然則臘亦謂之蠟矣先儒謂皮辨素服而祭與祈來年於天宗蠟也黃衣黃冠而祭與臘先祖五祀臘也蠟以息老物臘以息民息民固在蠟後矣此記所以言既蠟而休民息己也馬氏睎孟曰萬物所以成者神有以相功於其幽民有以致力於其明神有功則報之民有力則勞之所謂百日之蠟一日之澤是也存異孔氏穎達曰陳辭有水土昆蟲草木者以其無知故特有辭也先嗇之屬有知故不假辭草木有辭則當有神八蠟不數之者以草木遍地皆是不如坊與水庸之屬各指一物也辨正徐氏師曾曰案陳壽翁云蠟之服王𤣥冕而有司皮辨素服葛帶榛杖方氏曰皮辨素服主祭者之服黃衣黃冠助祭者之服二說不同愚謂𤣥冕總言王服以祭羣小祀不特蠟也子男及卿大夫之服自𤣥冕而下皮辨則天子至士所共用蠟祭通乎上下則天子服皮辨以祭亦未可知故疑方說為長案此陳辭統八蠟之神而禱祝之也蓋水土養稼穡而昆蟲草木害稼穡者也序其和順鋤其非類微神之力不致此於是乎報焉若謂先嗇有知故不假辭則大祝所掌多矣不為無知也又謂草木不數以遍地皆是則土水亦何嘗不然又案蔡氏雍本尚有豐年若土歲取千百八字大羅氏天子之掌鳥獸者也諸侯貢屬焉草笠而至尊野服也羅氏致鹿與女而詔客告也以戒諸侯曰好田好女者亡其國天子樹瓜華不斂藏之種也笠音立好呼報反正義鄭氏康成曰諸侯於蠟使使者戴草笠貢鳥獸也詩云彼都人士臺笠緇撮孔疏小雅都人士篇箋云臺夫須草都人以夫須為笠緇布為冠又曰其笠伊糾孔疏周頌良耜篇皆言野人之服也詔客告者詔使者使歸以此告其君所以戒之華果蓏也又詔以天子樹瓜蓏而已戒諸侯以蓄藏藴財利也孔氏穎達曰因上蠟祭廣釋歲終蠟時之事周禮羅氏掌羅烏鳥蠟則作羅襦四方諸侯有貢獻鳥獸於王者皆入屬大羅氏使者著草笠而至王庭草笠是野人之服今歲終功成是由野人而得故重其事而尊其服客謂使者好田好女者亡其國此宣詔所告之言也天子惟樹瓜與果蓏共一時之食不是收斂久藏之種若其可久藏之物則不樹之令使者歸告其君亦當如此不得蓄藏與民爭利也案天子樹瓜華當别為一節亦記者因草服而言言天子樹瓜華於圃以覘時候習種植與黃冠草服之意同然是不可斂藏之種初非與民爭利亦與田之非禽荒女之非色荒義同總以息民而非以害民也存疑方氏慤曰致鹿非實致鹿也特致所以獲鹿之物爾致女非實致女也特致所以飾女之物爾劉氏彝曰四方諸侯當仲冬而遇於天子者必助其祭祀也故其為蠟而獵莫不從焉獻禽者諸侯之卿大夫草笠而至尊野服者以明諸侯及其臣皆野服馳騁從禽以助王也故即之以為禮焉案夏官羅氏蠟則作羅襦注以襦為細密之羅則亦網耳方以襦為飾女之物誤矣劉氏合來朝諸侯言亦與記文詔客以戒諸侯說不符八蠟以記四方四方年不順成八蠟不通以謹民財也順成之方其蠟乃通以移民也既蠟而收民息己故既蠟君子不興功移以豉反既蠟而收絶句正義鄭氏康成曰四方方有祭也其方穀不熟則不通於蠟使民謹於用財也移之言羡也孔疏蠟祭豐饒皆醉飽飲食使民歆羡也詩頌豐年曰為酒為醴蒸畀祖妣以洽百禮此其羡之與收謂收斂積聚也孔氏穎達曰此論天子蠟祭四方不同豐荒有異兼記臘祭宗廟息民之事記四方者因以明記四方之國有豐有凶也不興功謂不興農功劉氏彝曰順謂五氣時若成謂九穀皆登蠟禮既畢然後息民之祭行焉黨正以禮屬其民飲酒於序以正齒位而謂之息民者息其田野之勞而入於邑居以習禮義故正其齒位以為庠序之先焉方氏慤曰年不順成八蠟不通此以蠟而記其凶也順成之方其蠟乃通此以蠟而記其豐也蠟乃合聚之祭故因其合聚而收之物既收則民亦息前言息田夫此言民息互相備也功者民力之所致民息己故既蠟君子不興功余氏心純曰民息己民自息也不興功君子之息民也通論方氏慤曰宮功則執於建亥之月土功則畢於建子之月武功則纘於建丑之月而既蠟君子未嘗不興功焉此謂農功爾劉氏彝曰易之損曰曷之用二簋可用享言凶年而約其禮也大司徒之職曰大荒大札則令邦國移民通財舍禁弛力薄征緩刑然則蠟之通不通皆聽命於司徒矣餘論孔氏穎達曰月令臘在祈天宗之下臘與蠟異但不知臘與蠟祭相去幾日惟隋禮及今禮皆蠟之後日曾氏鞏曰博士和峴言蠟始伊耆而三代有嘉平清祀蠟祭之名蠟臘之利案利疑作别名也漢承火德以戌日為臘臘接也言新故相接故田獵取禽以報百神享宗廟旁及五祀以致孝盡䖍魏晉同之唐以土王貞觀之祭尚用前寅蠟百神卯日祭社辰日臘宗廟至開元始定禮制三祭皆於臘辰以應土德議者是之宋興推應火行以戌日為臘而獨以前七日辛卯蠟不應於禮請如開元事蠟百神祀社稷享宗廟同用戌臘如禮便制曰可程氏迥曰聖人治神之道以為苟曠其職如神者亦不敢不致罰也然則四方年不順成之所八蠟不通者亦變置社稷之意非區區為民財不足而謹之也唐禮蠟祭年不順成則絀其方守之神也此古禮之存者猶可考也存疑孔氏穎達曰皇氏以此一節皆據諸侯之國而為蠟祭以記其功當國不成則不為蠟成則為蠟義亦通也劉氏彝曰移民者勸而移之易其不勤以為勤移其心也易其不足以就有餘移其身也存異彭氏汝礪曰案蠟說不同天子大蠟八疑通四方及四維言之此言四方舉正位耳大槩蠟祭之禮先嗇為主司嗇從祀凡水土之神與夫善制禽獸草木昆蟲者悉迎祭又享及農夫與掌田之官掌禽獸草木之官大羅氏者掌禽獸之官也樹瓜華者掌草木之官也故順成之方其蠟乃通一方不順成則八蠟不通謂缺此一方之蠟禮也案彭氏四方四維之義本先鄭注大宗伯以疈辜享四方百物之文言之然蠟自一事與四方之祭不同又因大羅氏為掌禽獸之官并以樹瓜華為掌草木之官于蠟八神而外又享掌禽獸草木之官是為十蠟矣大羅氏樹瓜華乃因蠟而及之總以息民之意非謂并其官而享之也要之蠟通於上下而報賽勞農其本義也言天子則侯國該之矣孔所引皇氏蓋謂諸侯之國有全不通者天子以天下為量必無全不通也總論徐氏師曾曰此章皆言蠟祭自黃衣而上言報本之事因神之相其功於幽也自黃衣而下言息農之事因民之致其力於明也幽明皆得此蠟祭之所以為善也恆豆之菹水草之和氣也其醢陸産之物也加豆陸産也其醢水物也籩豆之薦水土之品也不敢用常䙝味而貴多品所以交於神明之義也非食味之道也菹爭居反醢音海正義鄭氏康成曰天子朝事之豆有昌本麋臡茆菹麏臡饋食之豆有葵菹螺醢豚拍魚醢其餘則有雜錯云也非食味之道言禮以異為敬孔氏穎達曰恆豆謂朝事恆常所薦之豆加豆謂尸食訖酳尸所加之豆恆豆之菹是水草和羮之氣若昌本茆菹是也其醢陸地所産若麋臡麏臡是也加豆之菹陸産若葵菹豚拍之屬其醢水物若螺醢魚醢是也其籩豆所薦之物或水或土所生品類也前惟言豆此連言籩者籩是配豆之物所盛有麷蕡白黑則土所生鮑魚則水物也義取恭敬質素非如人事飲食美味之道也方氏慤曰上言恆豆之菹則知加豆之陸産亦菹也上言陸産之物則知下言水物即水産也上言水草之和氣則知下之所言皆和氣也交於神明者在誠而不在味義言其所宜道言其所由也篇首言籩豆之實此言薦者實言實之於中薦言薦之於上通論孔氏穎達曰周禮天子朝事之籩麷蕡白黑土産也鮑魚則水物也但籩之所盛陸産甚多張子曰古亦有燕器祭必為籩豆簠簋者非聖人不能為也蓋欲異其器而不能通䙝用又欲其器之盛物之豐且令人持之專敬存疑鄭氏康成曰此謂諸侯也孔疏諸侯者以天子朝事之豆菁菹非水物加豆芹菹深蒲菭菹非陸産與此經異也案此下記文皆以天子之禮言此注獨以為諸侯者據疏以天子朝事之菁菹與此記水草說不符加豆之芹蒲與此記陸産說不符故斷以為諸侯然諸侯水産陸産之詳本無可考據公食大夫禮六豆曰韭菹醓醢昌本麋醢菁菹鹿臡此諸侯禮也其豆取天子朝事之豆而不必拘于水草之說則注疏不足信矣又據醢人共醢六十罋以五齊七醢七菹三臡實之則菹亦稱醢矣而尚拘拘于為水為陸耶凡禮經各有授受抑且傳聞異辭其異同之處只應闕疑未便武斷先王之薦可食也而不可耆也卷冕路車可陳也而不可好也武壯而不可樂也宗廟之威而不可安也宗廟之器可用也而不可便其利也所以交於神眀者不可以同於所安樂之義也耆市志反路本作輅樂音落正義鄭氏康成曰武萬舞也孔氏穎達曰祭祀薦羞質而無味不可歆嗜衮冕路車尊嚴不可尋常乘服以為榮好也舞大武以示壯勇之容不可常為娛樂宗廟尊嚴肅敬不可寢處其中以自安宗廟之器共事神眀不可因便以為私利也所以交於神明者二句總結上文通論方氏慤曰安樂者謂所安而樂之也若可嗜可好之類是矣此言先王之薦可食而不可耆則知後之所言𤣥酒眀水大羹皆不可耆言路車可陳而不可好則知素車之乘亦不可好也言宗廟之器可用而不可便其利則知疏布冪與蒲越稿鞂皆不可便其利也前總其略後别其詳案鄭以萬舞為武舞不如孔疏直指大武之樂酒醴之美𤣥酒眀水之尚貴五味之本也黼黻文繡之美疏布之尚反女功之始也莞簟之安而蒲越稿鞂之尚眀之也大羹不和貴其質也大圭不琢美其質也丹漆雕幾之美素車之乘尊其朴也貴其質而已矣所以交於神眀者不可同於所安䙝之甚也如是而后宜莞音官簟大㸃反越音活稿又作藁古老反鞂簡八反和胡臥反琢依注丈轉反雕又作雕幾巨衣反乘時證反朴普角反正義鄭氏康成曰尚質貴本其至如是乃得交於神眀之宜也眀水司烜以陰鑑所取於月之水也孔疏周禮秋官司烜氏文蒲越稿鞂藉神席也孔疏今禮及隋禮稿鞂為祭天席蒲越為祭帝席眀之者神眀之也琢當為篆字之誤也幾謂漆飾沂鄂也孔疏幾與畿字相涉畿是畿限之所故以幾為沂鄂也案沂即圻鄂節高貌丹朱漆黑而丹亦必用漆雕刻其木幾纏以絲而刻者以幾為界於雕幾加丹漆四而二二而一也孔氏穎達曰𤣥酒水也陳列酒尊之時眀水在五齊之上𤣥酒在三酒之上尊尚其古故設尊在前也疏布之尚者冪人云疏布冪八尊禮器云犧尊疏布冪是也雕謂刻鏤貴其質而已矣此一句包上酒醴以下諸事方氏慤曰夫味以淡為本感於鹹作於酸化於苦窮於甘變於辛𤣥酒眀水則淡而無味故曰貴五味之本黼作斧形其色則白與黑黻則兩已相背其色則黑與青青與赤謂之文赤與白謂之章以天地之文作於東南成於西南故也繢則五采之所會繡則五采之所刺言文則章可知言繡則繢可知是皆色之美者也布之精者升多而密粗者升少而疏女功之作始於粗久而後至於精故揚雄曰霧縠之組麗女功之蠧矣以疏布之尚故曰反女功之始明之者謂其潔著之也尊無非貴也朴無非質也故下總而言之則曰貴其質而已矣通論陳氏祥道曰禮之初有眀水而已眀水而後有𤣥酒𤣥酒而後有五齊五齊而後有三酒至於三酒則事神與人者備矣又有六飲所以純乎人而致養焉張子曰眀水飲之祖毛血食之祖所以反始也周氏諝曰大圭不琢固巳美矣故大羮則言貴其質大圭則言美其質質未至於朴故於素車特言朴存異唐氏仲友曰周禮有眀水而無𤣥酒則眀水即𤣥酒也加於齊則謂之眀水加於酒則謂之𤣥酒且玉藻曰凡尊必尚𤣥酒不曰尚眀水則眀水之與𤣥酒決非二物案𤣥酒疏謂水眀水則以鑑取於月之水眀是二物周禮不言𤣥酒玉藻不言眀水文有偶舉不惟其備也鼎俎奇而籩豆偶陰陽之義也黃目鬱氣之上尊也黃者中也目者氣之清眀者也言酌於中而清眀於外也奇居宜反正義鄭氏康成曰黃目黃彝也周所造孔疏明堂位夏后氏以雞彝殷以斝周以黃目孔氏穎達曰黃彝以黃金鏤其外以為目因取名也貯鬱鬯酒故云鬱氣也祭祀時列之最在諸尊之上故云上也黃是中方色目是氣之清眀解用黃目之義酌於中而清眀於外者又解必用中及清眀義也言酒清眀在尊中而可斟酌示人君慮於祭祀必斟酌盡於中而外盡清眀潔淨也方氏慤曰目之精水也其光火也以水為體故其氣清以火為用故其氣眀玉藻言視容清眀是也是以詩云瑟彼玉瓚黃流在中鬱在中而以瓚酌之蓋酌於中也直達於外焉蓋清眀於外也夫孝子將祭虛中以治之此非酌於中之義乎至於不御內不聽樂不飲酒不茹葷此非清眀於外之義乎陳氏澔曰鬱鬯之酒有芬芳之氣故云鬱氣存疑鄭氏康成曰牲陽也庶物陰也孔疏宗伯云以天産作陰德注云天産者動物六牲之屬動故為陽也庶物雖出於牲體雜以植物相和非復牲之全體故為陰也於諸侯為上也孔疏天子則黃彝之上有雞彞鳥彞備前代之器諸侯但有黃彞故云於諸侯為上通論徐氏師曾曰周禮司尊彝掌六彝之位黃彝居末四時所用之次也此言上尊祭時陳列之器也存異孔氏穎達曰聘禮醯在碑東醢在碑西鄭云醯穀陽也醢肉陰也為醯體輕清肉有形質與此異也陳氏祥道曰先王制器或遠取諸物或近取諸身雞鳥虎蜼之彝取諸物也斝耳黃目取諸身也案本文以奇數為陽偶數為陰耳非以六牲為陽六穀為陰也且既以六穀為陰而又以醯之出於穀者為陽六牲為陽又以肉有形質為陰又分純出牲體為陽雜植物即為陰不使人惑乎考周禮尊彝文虎彝蜼彝四時之閒祀所用而雞彝鳥彝春夏所用斝彝黃彝秋冬所用蓋閒祀即大禘大祫所及者遠故用虎蜼取其孝也雞㢲畜春象鳥朱鳥夏象斝禾稼秋象黃目水之精冬象故四時分用之黃彝象冬而反為上尊者周正建子天一生水六尊並設以貯𤣥酒一也時王所制尊之二也目取象於人虎蜼雞鳥禾稼取象於物人貴於物三也祭天掃地而祭焉於其質而已矣醯醢之美而煎鹽之尚貴天産也割刀之用而鸞刀之貴貴其義也聲和而後斷也醯呼兮反斷丁亂反正義孔氏穎達曰餘物皆人功和合為之鹽則天産自然故云貴天産也煎鍊治之也設之於醯醢之上故云尚割刀之用必用鸞刀貴其聲和之義取其鸞鈴之聲宮商調和而後斷割其肉也通論方氏慤曰天官鹽人之所掌祭祀共其苦鹽散鹽然醯人醢人所共未嘗不以祭祀為主特非其所尚爾天刀能制斷莫非義也獨鸞刀貴其義者貴其義之和而已陳氏祥道曰何休曰鸞刀宗廟割切之刀環有和鈴有鸞考之詩禮曰和鸞雍雍曰登車聞和鸞之聲鸞在前和在後言鸞則和可知言和鈴則鸞可知和非斷則牽斷非和則劌易曰利物足以和義鸞刀以和濟割亦此意也欽定禮記義疏卷三十七
