body:
  text: 雜記上第二十之二聞兄弟之喪大功以上見喪者之鄉而哭適兄弟之送葬者弗及遇主人於道則遂之於墓凡主兄弟之喪雖疏亦虞之正義鄭氏康成曰見喪者之鄉而哭奔喪節也遂之於墓言骨肉之親不待主人也疏亦虞之以喪事虞祔乃畢孔氏穎達曰此明奔兄弟喪之法見喪者之鄉而哭此謂親兄弟同氣及同堂兄弟也奔喪禮云齊衰望鄉而哭大功望門而哭不同者此經謂降服大功者若如此則兄弟之名通輕重也適兄弟之送葬者此兄弟通緦小功也適往也謂往送五服之親不及喪柩在家主人葬竟已還送葬之人值於路不得隨孝子歸仍自獨往於墓也兄弟疏者謂小功緦麻彼既無主雖服緦小功之疏亦為之主虞祔之祭通論孔氏穎達曰案小記云大功者主人之喪有三年者則必為之再祭鄭注云小功緦麻為之練祭可也是大功有三年者至大祥則緦小功有三年者至小祥今此疏者亦虞謂無服者朋友相為亦虞祔也故熊氏云無服謂袒免以外之兄弟案死者子幼或有妻則緦小功之兄弟來主其喪必至小祥死者無妻子則但至虞祔即無服者亦然以送死之事至虞乃畢也以虞與祔近故注連言之凡喪服未畢有弔者則為位而哭拜踊正義鄭氏康成曰客始來主人不可以殺禮待之孔氏穎達曰未畢謂喪服將終猶有餘日未滿有人始來弔當為位哭踊不以殺禮待新弔之賓也言凡者五服悉然大夫之哭大夫辨絰大夫與殯亦辨絰大夫有私喪之葛則於其兄弟之輕喪則辨絰與音預正義鄭氏康成曰辨絰者大夫錫衰相弔之服也如爵辨而素加環絰私喪妻子之喪也輕喪緦麻也大夫降焉弔服而往不以私喪之末臨兄弟孔氏穎達曰謂成服以後大夫往弔哭大夫則身著錫衰首加辨絰若未成服已前與殯之時身亦辨服而首辨絰也妻子之喪至卒哭以葛代麻之後於此遭兄弟之輕喪緦麻大夫降一等雖不服以骨肉之親亦著弔服辨絰而往也若成服後則錫衰未成服之前身著素裳而首服辨姪為長子杖則其子不以杖即位為妻父母在不杖不稽顙母在不稽顙稽顙者其贈也拜正義鄭氏康成曰子不以杖即位辟尊者也孔疏父為長子杖其子長子之子祖在不厭孫其孫得杖但與祖同處不得以杖即位辟尊者也為妻尊者在不敢盡禮於私喪故不杖不稽顙獨母在於贈拜得稽顙父在贈拜則不得稽顙孔氏穎達曰為妻謂適子為妻父母見存不敢為妻杖又不敢為妻稽顙案喪服云大夫為嫡婦為喪主父為已婦之主故父在不敢為婦杖父沒母在為妻雖得杖而不得稽顙以杖與稽顙連文不杖屬於父在不稽顙文屬母在故云父母在不杖不稽顙不稽顙二義母在不稽顙者謂母在為妻子尋常拜賓之法也稽顙者其贈也拜者但父沒母在稍降殺於父有他人以物來贈已其恩既重其謝此贈之人時為拜得稽顙故云其贈也拜陸氏佃曰適子為妻如此則庶子父雖在以杖即位可也陳氏澔曰父沒母存母不主喪則子可以杖但不稽顙違諸侯之大夫不反服違大夫之諸侯不反服正義鄭氏康成曰其君尊卑異也違猶去也去諸侯仕諸侯去大夫仕大夫乃得為舊君服孔氏穎達曰去諸侯謂不便其君及辟仇也之往也自尊適卑不可反服於前之尊君自卑適尊若猶服卑君則為新君之恥所仕敵則反服舊君服齊衰三月存疑劉氏敞曰此言違而仕者則不反服舊君辟新君也然則違而未仕者聞舊君之喪則反服爾春秋傳所謂未臣焉有伐其國者反死之可矣既臣焉而反死之則不可鄭說非也案記以所仕之奠卑為服不服之節非仕與未仕之謂喪冠條屬以別吉凶三年之練冠亦條屬右縫小功以下左緦冠繅纓大功以上散帶別彼列反縫音逢繅依注作澡音早正義鄭氏康成曰別吉凶者吉冠不條屬也條屬者通屈一條繩若布為武垂下為纓屬之冠象大古喪事略也吉冠則纓武異材焉右縫者右辟而縫之小功以下左辟象吉輕也繅當為澡麻帶絰之澡聲之誤也為有事其布以為纓孔疏緦冠已治其縷纓布縷俱治小功緦輕初而絞之孔氏穎達曰此明喪冠輕重之制吉冠則纓與武各別喪冠則纓與武共材條猶著也條屬謂取一條繩屈之為武垂下為纓以著冠也三年練冠小祥之冠也雖微入吉亦猶條屬與凶冠不異吉冠則攝上屈縫鄉左左為陽陽吉也凶冠縫鄉右右陰喪所尚也過小祥猶條屬故縫猶鄉右也小功以下輕故縫同吉鄉左也緦衰冠治縷不治布冠又用澡治緦布為纓以輕故也大功以上散帶者小斂之後主人拜賓襲絰於序東小功以下皆絞之大功已上散此帶垂不忍即成之至成服乃絞案小功服輕小斂即絞大功以上服重成服乃絞至葬後卒哭則男子俱易葛帶大功以下女子亦葛帶矣朝服十五升去其半而緦加灰錫也朝直遙反去起吕反正義鄭氏康成曰緦精粗與朝服同去其半則六百縷而疏也又無事其布不灰焉孔氏穎達曰朝服精細全用十五升布為之緦麻於朝服十五升布之內抽出其半以七升半用緦麻服之衰服也鄭注喪服去其半而緦如絲是也取緦以為布又加灰治之則曰錫言錫然滑易也經云去其半而緦始云加灰錫明此緦衰不加灰不治布故也陸氏佃曰升之精粗有不同鄭氏謂八十縷為升舉其精者也緦於縷加灰錫於布加灰朝服據布朞悲哀三年憂緦思而已黃氏震曰升者麻縷之數八十縷為升十五升千二百縷去其半為緦陳氏澔曰緦云者以其縷之細如絲也若以此布而加灰以澡治之則謂之錫所謂弔服之錫衰也諸侯相襚以後路與冕服先路與褒衣不以襚襚音遂正義鄭氏康成曰不以已之正者施於人以彼不以為正也孔疏以彼不以為正服所用也後路二車二車行在後也孔氏穎達曰襚謂以物送死用後路謂上路之後次路也冕服謂上冕之後次冕也先路褒衣是已車服之上不可以施人方氏慤曰後路二車也先路正車也褒衣即前言復諸侯以褒衣是也陳氏澔曰上公以鷩冕為次侯伯以毳冕為次子男以絺冕為次吳氏澄曰冕服以襚後路以賵但言相襚者包賵在其中也遣車視牢具疏布輤四面有章置于四隅遣弃戰反章本或作鄣音同正義鄭氏康成曰言車多少各如所包遣奠牲體之數也遣奠天子大牢包九個諸侯亦大牢包七個大夫亦大牢包五個士少牢包三個大夫以上乃有遣車輤其蓋也四面皆有鄣蔽以隱翳牢肉孔氏穎達曰遣車送葬載牲體之車也牢具遣奠所包牲牢之體貴賤各有數也一個為一具取一車載之故云視牢具諸侯大夫位尊雖無三命則有車馬之賜及天子上士三命皆得有遣車疏布輤者以粗布為上蓋四面有物障之入壙置於椁之四隅賈氏公彥曰士無遣車則所包者不戴於車直持之而已陸氏佃曰疏布輤亦如殯車為輤其異者四面有障置於椁之四隅郝氏敬曰遣車送葬之車送行曰遣死有遣車皆以爵命為差故牢具視其命數存疑孔氏穎達曰諸侯士以下賤故無遣車也案周禮上公九牢侯伯七牢子男五牢左傳天子十二牢此經言遣車視牢具則如命數可知鄭謂喪禮質不視命數諸侯之大夫與天子大夫同夫復之人數襲之衣數皆如命數安見喪禮質不如命數乎天子之元士視子男可謂諸侯之大夫五乘而天子之元士不一乘乎孔疏天子上士三命得有遣車諸侯士賤無有則又論命數與鄭異矣疑不若郝說為當也諸侯之士有命有不命命士則遣車如其命數不命之士則無遣車其牢具直持之耳戴粻有子曰非禮也喪奠脯醢而已粻陟良反醢音海正義鄭氏康成曰粻米糧也言死者不食糧也遣奠本無黍稷孔氏穎達曰遣車載粻有子譏其為失也遣奠之饌無黍稷故不載粻既夕藏筲者謂遣奠之外別有黍稷麥也遣奠用牲體是脯醢之義祭稱孝子孝孫喪稱哀子哀孫正義鄭氏康成曰各以其義稱孔氏穎達曰祭吉祭也謂自卒哭以後之祭吉則申孝子之心祝辭云孝也或子或孫隨其人喪稱哀子哀孫謂自虞以前凶祭也喪則痛慕未申故稱哀也故士虞禮稱哀子卒哭乃稱孝子方氏慤曰祭所以追養而盡於一身之終喪所以哭亡而止於三年孝則為人子孫終身之行也故子孫之於祭必稱孝哀則發於聲音見於衣服蓋三年之禮而已故子孫之於喪止稱哀案祭稱孝孫孝子孔疏止舉卒哭極密蓋主入廟則天子稱孝王矣端衰喪車皆無等正義鄭氏康成曰喪車惡車也案士喪禮記主人乘惡車喪者衣衰及所乘之車貴賤同孝子於親一也衣衰言端者𤣥端吉時常服喪之衣衰當如之孔氏穎達曰端正也吉時𤣥端服身與袂同以二尺二寸為正而喪衣亦如之以其綴六寸之衰於心前故曰端衰等等差也喪之衣衰及惡車天子至士制度同無等差之別也案鄭注巾車喪車凡五等木車始遭喪所乘素車卒哭所乘薻車既練所乘駹車大祥所乘漆車禫所乘存疑陸氏佃曰衰制雖無等其布之精粗則有差也據衰與其不當於物也寧無衰案陸以布之精粗言則仍是有等似非記義大白冠緇布之冠皆不蕤委武𤣥縞而后蕤正義鄭氏康成曰不蕤質無飾也大白冠大古之布冠也春秋傳曰衛文公大布之衣大白之冠案春秋傳大帛之冠非大白注引之豈鄭所見本為大白與委武冠卷也秦人曰委齊東曰武𤣥𤣥冠也縞縞冠也孔氏穎達曰大白冠白布冠也緇布冠黑布冠也二冠無飾故皆不蕤此緇布冠謂大夫士之冠其諸侯則玉藻云緇布冠繢緌是也𤣥縞二冠既先有別卷後乃可蕤故云而后蕤也大祥縞冠亦有緌何以知之前既云練冠亦條屬右縫則知縞不條屬既別安卷灼然有蕤也馬氏睎孟曰冠以莊其首蕤以致其飾冠而不蕤者始於上古尚質而不文也冠之以蕤者制於後代以文而勝質也始冠者欲其重始而取上世之冠故以緇布此皆不蕤者也至於𤣥冠或以朱組纓或以丹組纓縞冠則或以𤣥武或以素紕此皆以蕤者也雜記所言特喪冠爾陸氏佃曰委委貌也𤣥所謂縞冠𤣥武縞所謂𤣥冠縞武如是而後緌先儒謂𤣥冠委貌也然則縞冠素委貌與素委貌蓋素端之冠大夫冕而祭於公辨而祭於己士辨而祭於公冠而祭於己士辨而親迎然則士辨而祭於己可也迎魚敬反正義鄭氏康成曰辨爵辨也冠𤣥冠也祭於公助君祭也然則士辨而祭於己緣類欲許之也親迎雖亦己之事攝盛服爾非常也孔氏穎達曰此明大夫士公私祭服大夫謂孤也冕絺冕也祭於己自祭廟也助祭為尊故服絺冕自祭為卑故服爵辨士以爵辨為上故用助祭𤣥冠為卑自祭不敢同助君之服故用𤣥冠也作記之人雖云士冠而祭於己以己既爵辨親迎親迎輕於祭尚用爵辨則士用爵辨自祭己廟於禮可用也是記者緣事類許之著爵辨也親迎配偶一時故許其攝盛服祭祀須依班序著辨於理不可也案記所謂可蓋僅可之辭馬氏睎孟曰周官司服曰王之吉服祭昊天上帝則服大裘而冕降而至於祭羣小祀則𤣥冕蓋祭之大者莫重於昊天而祀之小者莫甚於羣小祀不別以服不降以等則尊卑不明隆殺不分而禮幾乎熄矣大夫士祭之大者莫重乎助於公祭之有常者莫甚乎祭於己故大夫則冕而祭於公辨而祭於己士辨而祭於公冠而祭於己者亦周官六服同冕之意也蓋王則異其服而大夫士則異其冕辨而已周禮又曰卿大夫之服自𤣥冕而下士之服自皮辨而下則大夫以𤣥冕為極而士以爵辨為極也非祭於公安敢用哉苟辨而祭於己則非特嫌其同於公而又著其輕於昏矣故士之辨而祭於公者正也辨而親迎者權也辨而祭於己則不可也存疑鄭氏康成曰大夫爵辨而祭於己唯孤爾孔氏穎達曰儀禮少牢上大夫自祭用𤣥冠此亦云辨而祭於己與少牢異故鄭注云唯孤爾崔氏靈恩曰孤不悉絺冕若王者之後及魯之孤則助祭用絺若方伯之孤助祭則𤣥冕以其君𤣥冕自祭不可踰之也辨正陸氏佃曰下大夫一命辨而祭於公則冠而祭於己可知下士不命冠而祭於公則端而祭於己亦可知少牢朝服而祭下大夫也特牲冠𤣥端而祭下士也王之上士三命服𤣥冕則辨而祭於己矣暢臼以椈杵以梧枇以桑長三尺或曰五尺畢用桑長三尺刊其柄與末椈音菊枇音匕本亦作朼長直亮反刊苦干反正義鄭氏康成曰臼杵所以搗鬱也椈柏也孔疏爾雅釋木文枇所以載牲體者此謂喪祭也吉祭枇用棘孔疏特牲記枇用棘心吉時亦用棘畢末頭亦刊削之枇亦當然畢所以助主人載者刊猶削也孔氏穎達曰此明吉凶暢及枇畢之義暢謂鬱鬯也梧桐也以柏為臼以桐為杵搗鬱鬯柏香桐潔於神為宜也牲體從鑊以枇升入於鼎從鼎以枇載之於俎主人舉肉時以畢助主人舉肉用桑者亦喪祭也通論陳氏暘曰匕之別有四有黍稷之匕有牲體之匕有疏匕有喪匕三匕以棘喪匕以桑廩人之所溉黍稷之匕也饔人之所溉牲體之匕也牲體之匕挑匕也其制則黍稷之匕小於挑匕挑匕小於疏匕何則敦之量不過三豆而高不過一尺則黍稷之匕小矣挹之以挑匕然後注於疏匕者三則疏匕大矣畋器曰畢祭器亦曰畢皆象畢星也詩曰兕觥其觩角弓其觩有救棘匕有救天畢救者曲而長也則畢之狀可知矣鄭氏曰畢狀如匕喪匕用桑而畢亦桑則吉匕用棘而畢亦棘此鄭氏所以言匕畢同材也然桑黃棘赤各致其義舊圖謂匕畢皆漆之誤矣特牲主人及佐食舉牲鼎宗人執畢先入贊者錯俎加匕鄭氏曰主人親舉則宗人執畢導之以畢臨載匕備失脫也少牢及虞禮無匕何哉少牢大夫不親舉虞祭主人未執事其說是也率帶諸侯大夫皆五采士二采率音律正義鄭氏康成曰此謂襲尸之大帶率繂也繂之不加針功大夫以上更飾以五采士以朱緑襲事成於帶孔疏襲著衣畢加帶乃成變之所以異於生孔疏襲衣與生同惟帶與生異孔氏穎達曰小斂大斂衣數既多有絞不可加帶故知此謂尸襲竟而著此帶也率謂但褶帛邊而尉殺之不加針功異於生也吉時大帶惟有朱緑𤣥華無五采以五采飾之亦異於生也大夫與諸侯同而士二采並異於生也然此士天子之士也諸侯之士則士喪禮用緇帶陸氏佃曰言大夫已上襲尸其帶皆以五采絲率之即非襲尸無率也據士練帶率下辟醴者稻醴也甕甒筲衡實見閒而后折入甕於貢反甒音武筲所交反衡戶剛反見音閒厠之閒正義鄭氏康成曰此謂葬時藏物也衡當為桁所以庪甕甒之屬聲之誤也實見閒藏於見外椁內也折承席也孔氏穎達曰此送葬所藏之物醴是稻米所為甕者盛醯醢甒者盛醴酒筲者盛黍稷衡者以大木為桁置於地所以庪舉甕甒之屬見謂棺外之飾實此甕甒筲等物於見外椁內既畢然後以承席加於椁上案既夕禮乃窆藏器於旁加見注用器役器在見內苞筲明器在見外此是士禮大夫已上則有人器明器也人器實明案虛折猶庪也方鑿連木為之蓋如牀而縮者三橫者五無簀窆事畢加之壙上以承抗席故謂承席賈氏公彥曰見棺飾也飾則帷荒以帷荒加於柩棺柩不復見惟見此帷荒故名帷荒為見彭氏絲曰甕高一尺口徑六寸五分腹徑九寸五分底徑六寸五分受三斗甒口徑一尺脰高二寸徑八寸腹徑尺二寸底徑六寸受五斗案續漢書禮儀志下明器筲八盛容三升黍一稷一麥一粱一稻一麻一菽一小豆一甕三容三升醯一醢一屑一黍飴載以木桁覆以疏布甒二容三升醴一酒一載以木桁覆以功布孔疏所云甕者盛醯醢甒者盛醴酒筲者盛黍稷得此可以為證衡仍作桁康成以漢人解周禮仍漢制故也重既虞而埋之重直龍反正義鄭氏康成曰就所倚處埋之孔氏穎達曰案既夕禮初啓朝禰廟重止於門外之西不入謂將鄉祖廟若過之然也明日自禰廟隨至祖廟庭厥明將出之時重出自道道左倚之就所倚之處埋之謂於祖廟門外之東也案埋重之地賈逵云壁兩楹閒何休云廟北墉下與鄭異疑何得之蓋所埋之地必踐踏之所不及也然無考凡婦人從其夫之爵位正義鄭氏康成曰婦人無専制生禮死事以夫為尊卑小斂大斂啓皆辨拜辨音遍正義鄭氏康成曰嫌當事來者終不拜故明之也此既事皆拜孔氏穎達曰禮凡大斂小斂及啓攢之時惟有君來則止事而出拜之若他賓客至則不止事事竟乃即堂下之位悉遍拜故云皆辨拜也然若士當事而大夫至則士亦為大夫出雜記云大夫至絶踊而拜之是也案應氏謂賓亦於是拜死者吳草廬辨之謂儀禮喪禮弔者入升自西階東面主人進中庭弔者致命曰君聞子之喪使某如何不淑主人哭拜稽顙成踊賓出主人拜送門外及後凡襚賻儀皆大略放此由此觀之古人弔賓之禮於生者只有慰問之辭於死者只有襚賵之物及哭踊馮尸之節而已並無拜祭於死者之禮故楊氏復曰今世俗弔賓來見几筵哭拜主人亦拜謂代亡者答拜非禮也既而賓弔主人又相與交拜亦非禮也朝夕哭不帷無柩者不帷正義鄭氏康成曰朝夕哭不帷緣孝子心欲見殯肂也既出則施其㧁鬼神尚幽暗也孔疏案士喪禮君使人弔徹帷鄭云徹帷㧁之則㧁是褰舉之名初哭則褰舉事畢則施下之無柩謂既葬也棺柩已去鬼神在室孔疏葬後神主祔廟還在室堂無事焉遂去帷君若載而后弔之則主人東面而拜門右北面而踊出待反而后奠正義鄭氏康成曰主人拜踊於賓位不敢迫君也君即位車東出待不必君留也君反之使奠孔氏穎達曰臣喪朝廟柩已下堂載在柩車而君來弔君位於車東故主人在車西東面而拜門祖廟門右西邊也據車門內出故右在西孝子拜君竟從位立近門內西邊北面而哭踊為禮也哭踊畢而先出門待君以君來則拜迎去則拜送今君弔事竟不敢必君久留也君使人命孝子反還喪所而后設奠告柩知之或謂此在廟載柩車時奠謂反設祖奠也子羔之襲也繭衣裳與稅衣纁衻為一素端一皮辨一爵辨一𤣥冕一曾子曰不襲婦服繭古典反稅他喚反衻而占反正義鄭氏康成曰繭衣裳者若今大䙱也纊為繭緼為袍表之以稅衣乃為一稱爾稅衣若𤣥端而連衣裳者也大夫而以纁為之緣非也惟婦人纁衻禮以冠名服此襲其服非襲其冠曾子譏襲婦服而已𤣥冕又大夫服未聞子羔曷為襲之孔疏子羔為大夫無文𤣥冕或為𤣥冠或為𤣥端孔氏穎達曰此明大夫死者襲衣稱數也繭衣裳者纊為繭謂衣裳相連而綿纊著之稅黑衣也亦衣裳連纁絳也衻裳下緣襈也以絳為緣繭衣既䙝故用稅衣表之合為一稱也表端盧云布上素下皮辨服賀云以素為衣裳此第二稱服既不䙝並無別衣表之也皮辨第三稱十五升白布為衣積素為裳也爵辨第四稱𤣥衣纁裳也𤣥冕第五稱大夫之上服也纁衻是婦人之服而子羔襲用之故曾子譏之陸氏佃曰據此男子裏衣皆連衣裳裘蓋亦如之然則婦人連衣裳放男子之內也公襲九稱爵辨三大夫五稱皮辨三則士三稱爵辨一皮辨二與凡襲親身之服不與其餘為序故子羔襲稅衣其素端已下自為序素端亞皮辨皮辨亞爵辨爵辨亞𤣥冕公襲衮衣其𤣥端已下自為序𤣥端亞朝服朝服亞素積素積亞爵辨爵辨亞𤣥冕𤣥冕亞褒衣案死者不冠記言皮辨爵辨𤣥冕孔陸因之此皆以服言不言服文省也存疑彭氏絲曰三禮圖注禒衣當𤣥端處生時𤣥端衣裳別及死而襲𤣥端達衣裳與婦人褖衣同故雖男子𤣥端亦名褖衣也曾子譏之者非譏褖衣譏用纁衻褖衣纁衻是婦人嫁時之服亦非裳衣故曾子譏襲婦服案稅衣黑衣男女通用惟婦嫁則緣以纁耳王肅以衻為蔽膝非為君使而死公館復私館不復公館者公宫與公所為也私館者自卿大夫以下之家也為於僞反又如字使色吏反復音伏正義鄭氏康成曰公所為君所作離宫別館也案詳曾子問互考自得之公七踊大夫五踊婦人居閒士三踊婦人皆居閒正義鄭氏康成曰公君也始死及小斂大斂而踊君大夫士一也則皆三踊矣君五日而殯大夫三日而殯士二日而殯士小斂之朝不踊君大夫大斂之朝乃不踊婦人居閒者踊必拾主人踊婦人踊賓乃踊孔氏穎達曰此明諸侯至士初死在室殯踊之節及明貴賤踊數也公諸使去死日五日而殯則合死日六日也七踊者始死一踊明日襲一踊襲明日朝踊又明日朝踊為四日晚小斂時又一踊為五小斂明日朝又踊為六至明日大斂之朝不踊當大斂時乃踊凡七也大夫三日殯合死日為四日始死一明日襲朝一又明日小斂日再小斂明日大斂凡五也士二日殯合死日數也始死一小斂朝不踊至小斂時一又明日大斂一凡三也婦人與丈夫更踊居賓主之中閒也然親始死及動尸舉柩哭踊無數今云七五三者謂為禮有節之踊每踊輒三者三為九而謂為一也方氏慤曰為貴者踊則多為賤者踊則少此重輕之別也陳氏澔曰記者固云動尸舉柩哭踊無數而此乃有三五七之限者此以禮經之常節言彼以哀心之泛感言也又所謂無數者不以每踊三跳九跳為三踊之限也存疑徐氏師曾曰婦人居閒上四字衍文存異陸氏佃曰公五日而殯踊七日大夫三日而殯踊五日其始死之日踊既殯之後一日猶踊若士三日而殯踊三日則其既殯之後一日不踊與三五七然後有閒士三踊婦人居閒言皆三無又閒故也然則婦人居閒若閒七踊其二日甲一踊又二日乙一踊又二日甲一踊大夫放此公襲卷衣一𤣥端一朝服一素積一纁裳一爵辨二𤣥冕一褒衣一朱緑帶申加大帶於上卷音衮正義鄭氏康成曰朱緑帶者襲衣之帶飾之雜以朱緑異於生也此帶亦以素為之孔氏穎達曰此明襲用衣稱卷冕之制𤣥端者燕居𤣥端朱裳也朝服者緇衣素裳日視朝之服也素積者皮辨視朔之服纁裳者冕服之裳亦可鷩毳任取中閒一服也爵辨二者𤣥衣纁裳此始命之服重本故二通也𤣥冕之下又取一也褒衣最上華君賜也自卷衣至此合爵辨二通合九稱朱緑帶者以素為之飾以朱緑此衣之小帶散在於衣非是總束其身已用此朱緑小帶結束之重加大帶於此帶之上象生時大帶也用素為之士則二采大夫諸侯皆五采即前經率帶也通論鄭氏康成曰士襲三稱子羔襲五稱今公襲九稱則尊卑襲數不同矣諸侯七稱天子十二稱與孔疏天子諸侯襲數無文鄭約之故稱與疑辭也孔氏穎達曰公襲以上服在內公身貴故以上服親身欲尊顯加賜故褒衣最外而細服居中也子羔賤故卑服親身方氏慤曰言公之襲如此自卿大夫而下固有降殺矣存疑鄭氏康成曰申重也重於革帶也革帶以佩韍必言重加大帶者眀雖有變必備此二帶也孔氏穎達曰申加者謂於革帶之上重加此大帶也陸氏佃曰子羔言繭衣裳公言朱緑帶申加大帶於上相備也素積言皮辨則纁裳言爵辨可知然則公襲爵辨蓋三即言爵辨三嫌不侈又公言褒衣而子羔不言著有褒衣則襲無則否案公襲端衣辨服冕服不一等故先用朱緑之雜帶而重加大帶之素者於朱緑帶之上若謂重加於革帶上則本文不言革帶也孔疏言此衣之小帶散在於衣已與鄭義異矣又考士喪禮惟言緇帶不言革帶蓋革帶以繫佩襲不用佩故即以此帶代革帶為重帶與小斂環絰公大夫士一也正義鄭氏康成曰環絰者一股所謂纏絰也孔疏兩股相交謂之絞環者周回纏繞之名故知是一股士素委貌孔疏武叔投冠括髮諸侯大夫當天子之士大夫已上素爵辨孔疏雜記大夫與殯亦辨絰與他殯尚辨絰則子更明矣而加此絰焉散帶孔氏穎達曰親始死孝子去冠至小斂不可無飾士素委貌大夫已上素辨而貴賤悉得加於環絰故云一也方氏慤曰親始死故未暇辨貴賤之等黃氏裳曰至大斂子亦辨絰存疑黃氏裳曰鄭注未有散帶二字孔疏於既馮尸主人絞帶條下亦云小斂於户內訖主人袒括髮散帶垂今以記文考之小斂但言婦人帶麻主人絞帶不言主人帶絰至奉尸夷於堂方言帶絰而注說則以小斂之時散帶疏說又以為既小斂之後散帶其說不同皆不足為據案士喪禮陳小斂衣衾即言苴絰下本在左散帶垂長三尺牡麻絰右本在上亦散帶則未小斂已散帶矣鄭注因言首之環絰故並腰之散帶言之猶士喪禮之言絰因及帶也黃氏之疑未審耳公視大斂公升商祝鋪席乃斂鋪普吳反正義鄭氏康成曰喪大記曰大夫之喪將大斂既鋪絞襟衾乃鋪席則君至為之改始新之也孔氏穎達曰公君也明君臨臣喪大斂禮也臣喪大斂君未至之前主人雖已鋪席布絞襟衾聞君至則主人撤去之君來升堂時商祝更鋪席待君至乃斂榮君未為新之也亦示若事由君也商祝主斂事者魯人之贈也三𤣥二纁廣尺長終幅廣古曠反長直亮反正義鄭氏康成曰言失之也士喪禮下篇曰贈用制幣𤣥纁束帛孔氏穎達曰記魯失也贈謂以物送亡人於椁中魯人雖三𤣥二纁而用廣尺長終幅不復丈八尺則失禮也案既祖奠公賵賓客贈奠於輚左及邦門公又使人贈實於棺蓋公賵贈皆𤣥纁束五匹為束𤣥三象天纁二象地其廣皆二尺二寸長丈八尺為制今𤣥纁廣尺長終幅是不誠而非禮矣弔者即位于門西東面其介在其東南北面西上西於門主孤西面相者受命曰孤某使某請事客曰寡君使某如何不淑相者入告出曰孤某須矣弔者入主人升堂西面弔者升自西階東面致命曰寡君聞君之喪寡君使某如何不淑子拜稽顙弔者降反位相息亮反下同正義鄭氏康成曰弔者即位於門西立門外不當門主孤西面立於阼階下也相者受命受主人命以出也不言擯者喪無接賓也淑善也如何不善言君痛之甚使某弔也稱孤某者其君名君薨稱子某使人知適嗣也須矣不出迎也子孤子也降反位者出反門外位無出字脫孔氏穎達曰自此以下終於篇末明諸侯相弔含贈賵之禮此一節明弔禮也門西謂主國大門之西凶事異於吉故介在東南北面西上以使在門西故也相者相主人傳命者也鄭注喪不言擯此對例耳通而言之吉事亦云相司儀云每門一相大宗伯云朝覲㑹同則為上相凶事亦稱擯故喪大記云君弔擯者進又士喪禮擯者出請入告是也孤某須矣孤謂嗣子也異於吉禮故不出迎主人升堂謂從阼階升也子拜稽顙不云孤某而稱子者客既有事於殯故稱子以對擯之辭也已下皆然若對賓之辭則稱孤某彭氏絲曰西於門謂介位雖在賓東南亦西於門含者執璧將命曰寡君使某含相者入告出曰孤某須矣含者入升堂致命子拜稽顙含者坐委于殯東南有葦席既葬蒲席降出反位宰夫朝服即喪屨升自西階西面坐取璧降自西階以東含胡暗反朝直遙反正義鄭氏康成曰含玉為璧制其分寸大小未聞言降出反位則是介也皆受之於殯宫朝服告鄰國之禮也即就也以東藏於內也孔氏穎達曰此一節明含禮含之所用已具檀弓疏含者坐委所含之璧於殯之東南席上未葬之前有葦席承之既葬已後則以蒲席承之朝服者吉服也必用吉服者以鄰國執玉不麻故著朝服且不敢純凶待鄰國也以在喪不可純吉故即喪屨也此弔者既為上客又賵者是上介則此含者襚者當是副介末介但含襚於死者為切故在先陳之存疑鄭氏康成曰春秋有既葬歸含賵襚無譏焉孔疏案左傳隱元年天王使宰咺來歸惠公仲子之賵緩也公羊亦云不及事皆譏其緩鄭云無譏者據穀梁云宰咺言來得周事也所以不譏者平王新有幽王之亂遷於成周欲崇禮於諸侯故原情免之存異孔氏穎達曰宰夫朝服即喪屨者宰謂上卿也言夫衍字此遭喪已久故嗣子親受禮宰著朝服若新始遭喪則主人不親受使大夫受於殯宫案孔又謂此喪久故子親受若新喪不親受豈有鄰國以含襚賵贈來而子不見賓者見即親受矣蓋大斂後即殯鄰國來弔多在殯後故本文致含致襚皆曰鄉殯即執紼亦在殯之紼原不必久也若葬後則緩而當譏矣鄭以既葬言之孔又援穀梁證之轉疏矣隱之元年平王之四十九年也豈新有幽王之亂乎又宰夫朝服孔疏據下宰舉璧與圭謂此宰是上卿夫字衍考春秋時惟宋吳有大宰餘國無稱上卿曰宰者周禮冢宰下有小宰中大夫二人宰夫下大夫四人上士八人小宰受含襚幣玉之事宰夫掌弔幣器財用則下所云舉璧與圭當是小宰餘皆宰夫初非上卿也襚者曰寡君使某襚相者入告出曰孤某須矣襚者執冕服左執領右執要入升堂致命曰寡君使某襚子拜稽顙委衣于殯東襚者降受爵辨服於門內霤將命子拜稽顙如初受皮辨服於中庭自西階受朝服自堂受𤣥端將命子拜稽顙皆如初襚者降出反位宰夫五人舉以東降自西階其舉亦西面要一遙反霤力救反正義鄭氏康成曰委衣於殯東亦於席上所委璧之北順其上下孔疏南頭為上順謂上者在前下者在後授襚者以服者賈人也孔疏聘禮有賈人故知授襚者服是賈人其舉亦西面亦襚者委衣時孔疏上云委衣於殯東又云受爵辨受皮辨𤣥端皆曰如初是皆在殯東西面而鄉殯今云舉者亦西面是亦如襚者西面也孔氏穎達曰此一節明襚禮案上文含者稱執璧下文賵者稱執圭則此襚者當稱執衣不云者文不備也其服重者使執而入爵辨受於內霤皮辨受於中庭朝服受於西階𤣥端受於堂既受處不同則陳於璧北亦重者在南凡諸侯相襚衣數無文據此其服有五又先路褒衣不以襚以外無文陸氏佃曰所受服轉卑故其所授轉高也爵辨服尊矣受於門內霤皮辨次之受於中庭朝服又次之自西階受朝服𤣥端卑矣自堂上受𤣥端不言受朝服於西階受𤣥端於堂亦以此上介賵執圭將命曰寡君使某賵相者入告反命曰孤某須矣陳乘黃大路於中庭北輈執圭將命客使自下由路西子拜稽顙坐委于殯東南隅宰舉以東賵芳鳳反乘繩證反輈竹由反正義鄭氏康成曰輈轅也自率也下謂馬也馬在路之下覲禮曰路下四亞之孔疏引覲禮證馬為下謂馬四匹亞次車下案四即駟也謂路車之下四馬次之客給使者入設乘黃於大路之西客入則致命矣使或為史孔氏穎達曰此一節明賵禮乘黃謂馬也大路謂車也陳四黃之馬於大路之西於殯宫中庭北輈者大路輈轅北鄉也客使謂使客之從者為客所使故曰客使自下由路西者由在也陳路北轅既竟賵客執圭升堂致命而客之從者牽馬設在車之西大路亦使設之也賵既夕有奠主於親者故既夕禮兄弟賵奠此諸侯相與既疏故無奠方氏慤曰乘馬曰賵此言賵禮故陳乘黃大路於中庭陸氏佃曰犬馬不上於堂故執圭將命小行人圭以馬陳氏澔曰覲禮車在西統於賓也既夕禮車以西為上者為死者而設於鬼神之位也此贈禮車馬為助主人送葬而設統於主人故車在東也存疑陸氏佃曰客使牽馬者也自下自路下西之前聘禮所謂牽馬者自前西乃出是也凡將命鄉殯將命子拜稽顙西面而坐委之宰舉璧與圭宰夫舉襚升自西階西面坐取之降自西階賵者出反位于門外鄉許亮反正義鄭氏康成曰凡者說不見者也鄉殯將命則將命時立於殯之西南宰夫宰之佐也此言宰舉璧與圭則上宰夫朝服衍夫字賵者出乃言反位門外明禮畢將更有事孔氏穎達曰此總明從上以來弔含襚及賵文不見者將命既畢子拜稽顙之後將命者就殯東西面而坐委之宰舉璧與圭者主人上卿坐舉含者之璧與賵者之圭宰夫舉襚謂宰之屬官舉此襚者之衣宰與宰夫欲舉時升自西階不敢當主孤之位來鄉殯東席之東西鄉坐取之降自西階也陸氏佃曰此弔儀也始云寡君使某弔矣而曰寡君使某含寡君使某襚寡君使某賵又曰寡君有宗廟之事不得承事使一介老某相執紼則弔臨含襚賵皆相將贈賻亦應爾而今不録不與録也故曰玩好曰贈貨財曰賻存疑孔氏穎達曰鄉殯謂在殯之西南東北面案殯在西階上其西近序其西南似無餘地可容將命者疏謂在殯西南者誤陳氏澔曰賵者出反位於門外此句當屬於前章上介賵云云宰舉以東之下上客臨曰寡君有宗廟之事不得承事使一介老某相執綍相者反命曰孤某須矣臨者入門右介者皆從之立于其左東上宗人納賓升受命于君降曰孤敢辭吾子之辱請吾子之復位客對曰寡君命某毋敢視賓客敢辭宗人反命曰孤敢固辭吾子之辱請吾子之復位客對曰寡君命某毋敢視賓客敢固辭宗人反命曰孤敢固辭吾子之辱請吾子之復位客對曰寡君命使臣某毋敢視賓客是以敢固辭固辭不獲命敢不敬從客立于門西介立于其左東上孤降自阼階拜之升哭與客拾踊三客出送于門外拜稽顙臨如字綍音弗使色吏反拾其劫反正義鄭氏康成曰上客弔者也臨視也言欲入視喪所不足而給助之謙也其實為哭耳臨者入門右不自同於賓客賓三辭而稱使臣為恭也為恭者將從其命孤降自阼階拜之拜客謝其厚意不迎而送喪無接賓之禮孔氏穎達曰此明弔含襚賵既畢上客行臨哭之禮使一介老某相執綍者某者上客名也相助也謙言助主人執其葬綍其實為哭而來耳一介言惟有一人為介謙辭耳其實介數各下其君二等臨者不敢自同賓故入門右從臣位也宗人納賓升受命於君者主國宗人掌禮欲納此弔賓先受納賓之命於主國嗣君降曰請復位者宗人下阼階請客復門西客位也反命者反此客之辭命於嗣君也曰孤敢固辭者是宗人受嗣君之命以告客前文云孤某此直云孤不云某者客是使臣不復稱名也陸氏佃曰臨應親至故其辭如此據寡君使某弔使某含使某襚使某賵不云不得承事其遣上客亦以此賵稱上介亞於此與若陳乘黃大路於中庭蓋亦重禮也言執綍容外客臨有葬而至者也含不及斂不及事矣襚不及殯不及事矣賵不及葬不及事矣雖然猶愈乎否賓升受命於君變子稱君容外客臨有不及事既葬與踰年而後至也公羊傳曰君薨稱子某既葬稱子踰年稱公其曰孤降自阼階則子踰年可知孤不名亦以此曲禮曰居喪之禮升降不由阼階存疑孔氏穎達曰前四禮客皆在門西此臨在門東者前是奉君命而行此是私禮若聘禮私覿故在門東辨正姚氏舜牧曰弔含襚賵外有臨以執綍禮辭曰寡君有宗廟之事不得承事使一介老某相執綍又再三曰寡君命使臣某毋敢視賓客則此禮為君所命審矣解者訓自行臨哭之禮若聘客之有私覿然非也下諸侯使人弔其次含襚賵臨皆同日而畢事是其證案此鄰國君不來親弔遣使來弔是在將葬之時五事並行故曰凡將命鄉殯將命亦有既葬而來者故含禮有曰既葬蒲席其將葬而來使含使襚使賵者含不及斂襚不及殯賵不及葬矣使者上客為正其餘皆介也上公七介侯伯五介子男三介弔亦上客而不言上客弔亦慰生一事而已餘皆以哀死但賵含襚猶致其物臨特致其情臨於事尤重故特言之也賵以上介則含者次介襚者四人自次介以下子男則末介及行人宰史為之已臨禮特重故文尤詳稱君命三而孔乃比之私覿誤矣其國有君喪不敢受弔正義鄭氏康成曰辟其痛傷己之親如君孔氏穎達曰此謂國有君喪而臣又有親喪則不敢受他國賓來弔也以義斷恩哀痛主於君不私於親通論陸氏佃曰諸侯有天子之喪雖有親喪不敢受弔諸侯如此則其臣有諸侯之喪蓋亦如此設若衛靈公弔季康子而康子有君之喪應辭外宗房中南面小臣鋪席商祝鋪絞襟衾士盥于盤北舉遷尸于斂上卒斂宰告子馮之踊夫人東面坐馮之興踊斂力劍反馮皮冰反正義鄭氏康氏曰此喪大記脫字重著於是孔氏穎達曰大記云夫人東面亦如之此云夫人東面坐馮興踊惟四字別義皆同也士喪有與天子同者三其終夜燎及乘人專道而行燎力召反乘繩證反正義鄭氏康成曰乘人謂使人執引也專道人辟之孔氏穎達曰柩遷之夜須光明故竟夜燎也乘人謂人引車不用馬也既夕禮云屬引專道謂喪在路不辟人也二事為重與天子同欽定禮記義疏卷五十四
