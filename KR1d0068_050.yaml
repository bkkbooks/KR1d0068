body:
  text: 樂記第十九之一正義孔氏頴達曰案鄭目録云名曰樂記者以其記樂之義此於别録屬樂記蓋十一篇合為一篇有樂本樂論樂施樂言樂禮樂情樂化樂象有賓牟賈師乙魏文侯今雖合此略有分焉案藝文志云黃帝以下至三代各有當代之樂名周衰禮壞其樂尤微以音律為節又為鄭衛所亂故無遺法漢興制氏以雅樂聲律世為樂官頗能記其鏗鏘鼓舞而已不能言其義理武帝時河間獻王好博古與諸生共采周官及諸子云樂事者以作樂記其內史丞王度𫝊之以授常山王禹成帝時為謁者數言其義獻二十四卷樂記劉向校書得樂記二十三篇與禹不同今樂記斷取十一篇餘有十二篇其名猶在奏樂第十二樂器第十三樂作第十四意始第十五樂穆第十六說律第十七季札第十八樂道第十九樂義第二十昭本第二十一昭頌第二十二竇公第二十三是也程子曰禮記除大學中庸惟樂記為近道學者深思自得之黃氏震曰此書閒多精語如曰人生而靜天之性也感於物而動性之欲也好惡無節於內知誘於外皆近世理學所據以為淵源如曰天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉晦菴先生所深嘉而屢歎者也又曰此篇之外所餘十二篇及河間獻王之樂記孔氏作疏時其書已泯絶黃氏乾行曰以樂記名篇宜若専言樂也其多與禮對舉而互言之何也周子曰古者聖王制禮法修教化三綱正九疇叙百姓大和萬物咸若乃作樂以宣八風之氣以平天下之情故樂聲淡而不傷和而不淫此得其序而和禮先樂後之道闕一不可者也故篇以樂記名而禮必對舉而互言之也案漢河間獻王采周官及諸子言樂事者作樂記二十四卷成帝時王禹獻入祕府其書遂亡此乃劉向校書時所得與河間獻王所采絶不相同蓋獻王所采者其事此所陳者義也史記樂書全用其文或謂褚少孫所補褚與劉向同時必劉校定後禇取入之耳又考史記與此目録次第各不同孔疏言鄭目第三樂施第四樂言第五樂禮與劉目録正合而今易之疑傳鄭學者南皇北熊孔疏以皇為據則易鄭次者或皇也今分篇如其舊而以異同附見之凡音之起由人心生也人心之動物使之然也感於物而動故形於聲聲相應故生變變成方謂之音比音而樂之及干戚羽旄謂之樂比毗志反而樂如字又音洛正義鄭氏康成曰宮商角徵羽雜比曰音孔疏五音清濁相雜比和單出曰聲孔疏單有一聲無餘聲相雜形猶見也樂之器彈其宮則衆宮應然不足樂是以變之使雜也易曰同聲相應同氣相求孔疏易文言文同聲雖相應不得為樂必有異聲相應春秋傳曰若以水濟水誰能食之若琴瑟之専一誰能聽之孔疏昭二十年晏嬰語琴瑟一聲不得成樂方猶文章也干盾也戚斧也武舞所執也羽翟羽也旄旄牛尾也文舞所執周禮舞師樂師掌教舞有兵舞有干舞有羽舞有旄舞孔疏周禮有干舞無兵舞鄭司農云干舞兵舞也鄭引樂師益以兵舞以經云干戚則是大武也詩曰左手執籥右手秉翟孔疏證羽舞是翟舞孔氏穎達曰此章論音聲起於人心故名樂本人心既感外物而動口以宣心形見於聲心若感死喪之物而興動於口則形見於悲戚之聲心若感於福慶而興動於口則形見於歡樂之聲也既有哀樂之聲自然一髙一下或清或濁而相應不同故云生變變謂不恆一聲變動清濁也聲既變轉和合次序成就文章謂之音也音則今之歌曲也以樂器次比音之歌曲而樂器播之并及干戚羽旄鼓而舞之乃謂之樂也又曰初發口單者謂之聲衆聲和合成章謂之音金石干戚羽旄謂之樂則聲為初音為中樂為末也所以惟舉音者舉中見上下矣張氏守節曰夫樂之起其事有二一是人心感樂樂聲從心而生一是樂感人心心隨樂聲而變陳氏暘曰文者音之雜方者音之節音之雜者音之始音之節者音之成故情動於中而形於聲則成文聲相應而生變然後成方此始與成之辨也方氏慤曰人心之靜性自然也及其動也物使然耳心靜則藏於默心動則發於言故形於聲有聲矣或倡或和則相應無常也宮變生徴徴變生商商變生羽羽變生角上下相通而方成則雜比之矣故謂之音音既雜比則節奏可聽人斯樂之不知手舞足蹈也故曰比音而樂之及干戚羽旄謂之樂樂者樂也以人樂之故謂之樂樂者音之所由生也其本在人心之感於物也是故其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以廉其愛心感者其聲和以柔六者非性也感於物而后動是故先王慎所以感之者噍子遙反殺色界反其樂之樂音洛嘽昌善反散思旦反柔說苑作調正義鄭氏康成曰言人聲在所見非有常也噍踧也嘽寬綽貌發猶揚也粗粗也孔氏穎達曰此覆明上文感物而動之意結樂聲生起所由也合音乃成樂是樂由此音而生本猶初也物外境也言樂初所起在於人心之感外境而變若外境痛苦則其心哀哀感在心故其聲必踧急而速殺若外境所善心必歡樂歡樂在心故聲必隨而寬緩若外境會合其心心必喜說喜說在心故聲必隨而發揚放散無輒礙但樂是長久之歡喜是一時之說左傳云喜生於好是喜與樂別也若忽遇惡事而心恚怒恚怒在心則其聲粗以猛厲若外境見其尊髙心中嚴敬嚴敬在心則其聲正直而有廉隅不邪曲也性本靜寂無此六事六事之生由應感外物而動故云非性也既六事隨見而動非關其本性故先代聖人在上制正禮正樂以防之不欲以外境惡事感之故云先王慎所以感之者也方氏慤曰凡人之情得所欲則樂喪所欲則哀順其心則喜逆其心則怒於所畏則敬於所說則愛此六者之别也噍則竭而無澤殺則減而不隆嘽則闡而無餘緩則紆而不迫發則生而不窮散則施而無積粗則疏而不精厲則危而不安直則無委曲廉則有分際靜者天之性動者人之情無所感則靜有所感則動六者感於物而後動故曰非性也輔氏廣曰慎謂一嚬一笑不敢妄形一話一言不敢妄發通論張子曰古樂不可見蓋為後人求之太深但以虞書詩言志歌永言聲依永律和聲求而得之樂之意盡於是詩止言志歌但永轉其聲令人可聽耳今學者亦以轉聲不變字為善歌既長言之要入於律則知音者察之知此聲入得何律錯綜以成文矣存疑孔氏穎達曰若外境親屬死亡心起愛情愛情在心則聲和柔也案疏此語恐誤親屬死亡必哀心感而聲噍殺矣有何可愛而聲和柔乎故禮以道其志樂以和其聲政以一其行刑以防其姦禮樂刑政其極一也所以同民心而出治道也道音導行下孟反治直吏反正義鄭氏康成曰極至也同民心而出治道此其所謂至也孔氏穎達曰政法律也既防慎其感故用正禮教道其志用正樂諧和其聲用法律齊一其行用刑辟防其凶姦賀氏云雖有禮樂刑政之殊及其檢情歸正同至理極其道一也陳氏暘曰禮樂者政刑之本政刑者禮樂之輔其極則一於同民心使之無悖逆詐僞之心一於出治道使之無淫佚作亂之事慎所以感之之效也邵氏囦曰此又言聖人養其樂之本如此志者心之所之聲者心之所發行者心之形也姦者心之賊也四者既謹則民心同入於善而治道由是而出養其本者如是則心發於聲有不得其所者哉凡音者生人心者也情動於中故形於聲聲成文謂之音是故治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困聲音之道與政通矣樂音洛思息吏反又音笥正義鄭氏康成曰言八音和否隨政也玉藻曰御瞽幾聲之上下孔氏穎達曰上云比音而樂之及干戚羽旄謂之樂此云音不云樂者樂以音為本變動由於音也治平之世其樂音安靜而歡樂由君政和美而人心安樂故也禍亂之世其樂音怨恨而恚怒由其政乖僻而人心怨怒故也亡國謂將欲滅亡之國樂音悲哀而愁思由其人困苦哀思故也陳氏暘曰治世以道勝欲其音安以樂雅頌之音也政其有不和乎亂世以欲勝道其音怨以怒鄭衛之音也政其有不乖乎亡國之音則桑閒濮上非特哀以思而已其民亦已困矣書曰八音在治忽國語曰政象樂亦斯意歟宮為君商為臣角為民徵為事羽為物五者不亂則無怗懘之音矣宮亂則荒其君驕商亂則陂其官壞角亂則憂其民怨徵亂則哀其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢如此則國之滅亡無日矣徵音㫖怗昌廉反懘昌制反又昌紙反陂彼義反匱其愧反正義管氏夷吾曰凡聽宮如牛鳴窖中凡聽商如離羣羊凡聽角如雉登木以鳴音疾以清凡聽徴如負猪豕覺而駭凡聽羽如鳴馬在野案此一作鳴鳥在樹凡將起五音先主一而三之四開以合九九朱子曰一而三之即四也以是四開合於五音九也又九之為八十一以是生黃鍾小素之音以成宮原注素本宮八十一數生黃鍾之宮為五音之本三分而益之以一為百有八為徵原注本八十一益以三分之一二十七通前百有八是為徴數朱子曰百有八半之為五十四有三分而去其乘適足以是為商原注乘亦三分之一也三分百八而去一餘七十二是商之數也有三分而復於其所以是成羽原注三分七十二而益其一分二十四合為九十六是羽之數也朱子曰九十六半之為四十八有三分而去其乘適足以是成角原注三分九十六去其一分餘六十四是角之數朱子曰六十四司馬氏遷曰下生者倍其實三其法上生者肆其實三其法上九商八羽七角六宫五徴九朱子曰當作宮九徴六商八羽五角七宮動脾而和正聖商動肺而合正義角動肝而合正仁徴動心而合正禮羽動腎而和正智故聞宮音使人溫舒而廣大聞商音使人方正而好義聞角音使人惻隱而愛人聞徴音使人樂善而好施聞羽音使人整齊而好禮班氏固曰夫聲者中於宮張於商觸於角祉於徴宇於羽鄭氏康成曰五者君臣民事物也凡聲濁者尊清者卑怗懘敝敗不和貌君臣民事物其道亂則其音應而亂荒猶散也陂傾也崔氏靈恩曰五音之次宮最濁自宮以下則稍清矣君臣民事物亦有尊卑故以次配之孔氏穎達曰此論五聲之殊所主之事上下不一得則樂聲調和失則國將滅亡鄭注月令云宮屬土土居中央總四方君之象也又音以絲多聲重者為尊宮弦最大用八十一絲聲最濁故為君也商屬金七十二絲次宮如臣次君之貴重也角屬木六十四絲聲居宮羽之中半清半濁民比君臣為劣比事物為優角清濁中民之象也徵屬火用五十四絲是微清所以為事之象羽屬水用四十八絲最處末聲最清所以羽為物也五者各得其所用不相壞亂則五音之響無敝敗矣宮音亂則其聲放散由其君驕溢故也商音亂則其聲欹邪不正由其臣不治於官官壞故也角音亂則其聲憂愁由政虐民怨故也徴音亂則其聲哀苦由徭役不休民事勤勞故也羽音亂則其聲危由君賦重民貧之故也迭互也陵越也五聲不和則君臣上下互相陵越所以為慢也滅絶也無日言旦夕可俟無復一日也陳氏暘曰宮商角徵羽五聲之名君臣民事物五聲之實實治則聲從而治實亂則聲從而亂輔氏廣曰大而不治曰荒荒不治也陂不正也變臣言官者主有職者言之周氏諝曰還相為宮而不相亂則其音和相陵謂聲不依永也君臣民事物其道亂則其音應通論陳氏暘曰先王作樂以聲配日以律配辰原樂聲之始五聲未始不先律要樂器之成十二律未始不先聲書曰詩言志歌永言聲依永律和聲樂聲之始也周官大師掌六律六同以合隂陽之聲皆文之以宮商角徴羽之聲樂器之成也古者考律均聲必先立黃鍾以本之黃鍾之管九寸觸類而長之數多者上生而有餘數少者下生而不足一損一益皆不出三才之數而已故參分益一上生之數也參分損一下生之數也今夫樂始於聲聲始於宮宮聲最大而中固足以綱四聲覆四方君之象也參分宮數損一而下生徴徵聲微清而生變事之象也參分徴數益一而上生商商聲則濁而下次於宮臣之象也參分商數損一而下生羽羽聲最清而足以致飾物之象也參分羽數益一而上生角角聲一清一濁其究善觸而已宮徴商羽角上下相生之次也宮商角徴羽君臣民事物之次也傳曰宮者音之主蓋商非宮則失其所守不足以為臣角非宮則失其所治不足以為民徴非宮則失其所為不足以為事羽非宮則失其所生不足以為物五行主土五事主思亦猶是也鄭衛之音亂世之音也比於慢矣桑閒濮上之音亡國之音也其政散其民流誣上行私而不可止也比毗志反濮音卜正義鄭氏康成曰比猶同也桑閒在濮陽南誣罔也孔氏穎達曰此論亂世滅亡之樂鄭國之音好濫淫志衛國之音促速煩志並亂世之音也雖亂而未滅亡故云比於慢即同前謂之慢也君政荒散民自流亡誣罔於上行其私意違背公道不可禁止也通論張子曰鄭國之音人聞之頓起留連光景之意又生怠惰之情從而致驕淫之生雖珍玩竒貨其始感人也亦不如是之切從而生無限嗜好故孔子必曰放之是亦聖人經厯過但聖人不為物所移耳苟未成性則有時能為所移蓋鄭衛之地濱大河沙地土壤不厚其間人自然氣輕浮其地氣薄不費耕耨物亦能生故其人偷脫怠惰弛慢頽靡其人情既如此則其聲音所感亦同故聞其樂亦使人如此又其地平下其閒人自然意氣柔弱怠惰其土足以生古所謂息土之民不才者此也案宮濁羽清宮大羽小清之至則愈微渺可愛孔子所謂鄭聲淫季札所謂其細已甚率羽音多即此所謂比於慢也若衛則季札稱其憂而不困自必差勝於鄭而詩小序摘衛采唐一詩以實桑閒鄭又謂濮水之上地有桑閒合桑閒於濮上嘗考路史桀作東音操北里大合樂桑林孔疏亦云桑林之閒是桑閒桀樂濮上紂樂其為亡國之音坦然明白於本文亂世之音亡國之音二等亦瞭然矣存疑鄭氏康成曰濮水之上地有桑閒者亡國之音於此之水出也昔殷紂使師延作靡靡之樂已而自沈於濮水後師涓過焉夜聞而寫之為晉平公鼓之是之謂也孔疏於濮水之上桑林之間所得之樂則亡國之音矣凡音者生於人心者也樂者通倫理者也是故知聲而不知音者禽獸是也知音而不知樂者衆庶是也惟君子為能知樂正義鄭氏康成曰倫猶類也理分也禽獸知此為聲耳不知其宮商之變也八音並作克諧曰樂孔氏穎達曰音從聲生聲從心起故云生於人心比音為樂有金石絲竹干戚羽旄樂得則隂陽合失則羣物亂是樂能通倫理也隂陽萬物各有倫類分理者也禽獸知其聲不知五音之和變是聲易識而音難知矣衆庶知歌曲之音而不知樂之大體是音猶易而樂倍難也惟君子能知極樂之理張氏守節曰音初生自君心形而成樂樂成則能通於百姓使各盡其類分故曰通倫理者也劉氏敞曰所謂君子知樂者知其通倫理也知其扶性飾情而反之正也知其創業象功移風易俗也通論方氏慤曰倫言人倫理言物理若君臣上下同聽之則莫不和敬長幼同聽之則莫不和順父子兄弟同聽之則莫不和親所謂通人倫也若草木茂區萌達羽翼奮角觡生所謂通物理也君子則通於道者也故惟君子為能知樂焉若瓠巴鼓瑟流魚出聽伯牙鼓琴六馬仰秣此禽獸之知聲者也魏文侯好鄭衛之音齊宣王好世俗之樂此衆庶之知音者也若孔子在齊之所聞季札聘魯之所觀此君子之知樂者也是故審聲以知音審音以知樂審樂以知政而治道備矣是故不知聲者不可與言音不知音者不可與言樂知樂則幾於禮矣禮樂皆得謂之有德德者得也幾音機一音巨依反正義鄭氏康成曰幾近也聽樂而知政之得失則能正君臣民事物之理也孔氏穎達曰音由聲生先審識其聲然後可以知音樂由音生先審識其音然後可以知樂政由樂生先審識其樂然後可以知政所以審樂知政者樂由音聲相生聲感善惡而起若能審樂則知善惡之理行善不行惡習是不習非而知為政化民政善樂和音聲皆善人事皆無僻則治道備具矣方氏慤曰聲雜而為音故審聲以知音音比而為樂故審音以知樂聲音之道與政通故審樂以知政此皆由粗以致精故每言審焉馬氏睎孟曰禮者中也樂者和也中以和為用和以中為體故知樂則可以幾於禮輔氏廣曰審聲以知音審音以知樂順而下之自源以尋流也審樂以知政逆而上之自末以反本也審始形之聲以知他日之樂審已成之樂以知前日之政如表裏形影之不誣也應氏鏞曰倫理之中皆禮之所寓知樂則通於禮矣不曰通而曰幾者辨析精微之極也是故樂之隆非極音也食饗之禮非致味也清廟之瑟朱弦而疏越一倡而三歎有遺音者矣大饗之禮尚𤣥酒而俎腥魚大羮不和有遺味者矣食音嗣疏音疏倡昌諒反和胡卧反正義鄭氏康成曰隆猶盛也極窮也清廟謂作樂歌清廟也朱弦練朱弦練則聲濁孔疏虞書𫝊古者帝王升歌清廟大瑟練弦此云朱則練可知蓋不練則體徑而聲清練則絲熟而聲濁也越瑟底孔也畫疏之使聲遲也孔疏鄉飲酒禮二人皆左荷瑟後首汙越疏通之使兩頭孔相連孔小則聲急大則聲遲也倡發歌句也三歎三人從歎之耳俎腥魚謂以腥魚為俎實不臑熟之孔疏郊特牲郊血大饗腥熊氏云牛羊至薦熟時皆熟惟魚始末不烹大羮肉清不調以鹽菜遺猶餘也孔氏穎達曰樂之隆盛本在移風易俗非崇重於鐘鼓之音禮之隆重在於孝敬非在於致其美味歌清廟詩所彈之瑟弦聲既濁瑟音又遲是質素之聲初發聲一倡惟有三人歎之言歎者少也然以其貴在於德所以有遺餘之音念之不忘也大饗尚𤣥酒在五齊之上雖有三牲而兼載腥魚大羮肉湇不以鹽菜和之此皆質素之食而大饗設之然以其有德其味可重人愛之不忘也陳氏暘曰德為禮樂之本禮樂為德之文樂之隆在德不在音非極五音之鏗鏘而已大饗之禮在德不在味非致五味之珍美而已老子所謂大音希聲左𫝊所謂大羮不致是也存疑鄭氏康成曰大饗祫祭先王孔疏以俎魚故知為祫先王熊氏安生曰聲有五聲但有三人歎之餘兩聲未歎是有遺音也劉氏敞曰遺者忘也棄也凡樂以音為之節而反忘音焉意不主於音也凡食饗以味為之文而反忘味焉意不主於味也主於音則不能遺音雖繁響淫聲有不足矣主於味則不能遺味雖太牢庶羞有不足矣存異陳氏暘曰周官大司樂以肆獻祼享先王以饋食亨先王蓋羞其肆而酌獻焉則以祼猶生事之有饗也羞其熟而饋食焉則以食猶生事之有食也饗以陽為主而其祭為禘食以隂為主而其祭為祫由是觀之食饗之禮未嘗不致味謂之非致味者豈大饗之禮而誤食饗與辨正朱子曰一倡三歎蓋一人倡而三人和也今解者以為三歎息非也案鄭謂祫重禘輕故以此為禘其實追享朝享皆大饗也是故先王之制禮樂也非以極口腹耳目之欲也將以教民平好惡而反人道之正也好呼報反惡烏路反後二字相連者皆放此正義鄭氏康成曰教之使知好惡也孔氏穎達曰𤣥酒腥魚大羮是非極口腹也朱弦疏越是非極耳目也將以教民均平好惡使好者行之惡者避之而反歸人道之正也陳氏暘曰周官五禮防民之僞而教之中六樂防民之情而教之和所謂防民之情僞者平好惡也教之中和者反人道之正也馬氏睎孟曰反人道之正非强其所無也使之復其性之本而已陳氏澔曰教民平好惡謂不欲其好惡之偏私也人道不正必自好惡不平始好惡得其平則可以復乎人道之正而風移俗易也人生而靜天之性也感於物而動性之欲也物至知知然後好惡形焉好惡無節於內知誘於外不能反躬天理滅矣誘音酉正義鄭氏康成曰言性不見物則無欲至來也知知每物來則又有知也言見物多則欲益衆形猶見也節法度也知猶欲也誘猶道也引也躬猶已也理猶性也孔氏穎達曰自此至道也一節論人感物而動物有好惡所感不同若其感惡則天理滅為大亂之道故下文明先王所以制禮樂而齊之也人初生未有情欲其靜本於自然是天性也感於外物而心遂動是性之所貪欲也每一物來則心知之為每一物皆知是物至知知也物至既衆會意者則愛好之不會意者則嫌惡之是好惡形焉所好惡恣己之情是無節於內外見所欲心則從之是知誘於外也恣己情欲不能自反是天之所生本性滅絶矣程子曰不能反躬天理滅矣天理云者百理俱備元無少缺張子曰謂天性靜則何常靜謂之動則何常動天性難専以靜言無物非天性靜也感之而動氣之性也何謂氣之性人須氣以生其性即氣之性也感者必待有物則有所感無物則何所起喜怒好惡去取莫非因物而有知知猶言能知能知其知則好惡形焉劉氏敞曰人生而靜者喜怒哀樂未發之中天命之性也感於物而動則性發而為情也人心虛靈知覺事至物來則必知之而好惡形焉好善惡惡則道心之知覺原於義理者也好姸惡醜則人心之知覺彂於形氣者也好惡無節於內而知誘於外則是道心昧而不能為主宰人心危而物交物則引之矣不能反躬以思其理之是非則人欲熾而天理滅矣朱子曰人生而靜以上不容說人生而靜以上即是人物未生時人物未生時只可謂之理說性不得此程子所謂在天曰命也才說性時便已不是性才謂之性便是人生以後此理已墮在形氣中不全是性之本體矣此程子所謂在人曰性也然性之本體元未嘗離亦未嘗雜要人就此上面見得其本體原未嘗離亦未嘗雜耳凡人說性只是說繼之者善也言性不可形容善言性者不過即其發見之端言之而性之理固可默識矣如孟子言性善與四端是也又曰人生而靜天之性也感於物而動性之欲也此言性情之妙人之所生而有者也蓋人受天命之中以生其未感也純粹至善萬理具焉所謂性也然人有是性則有是形有是形則有是心而不能無感於物感於物而動則性之欲者出焉而善惡於是乎分矣性之欲即所謂情也又曰物至知知然後好惡形焉此指情之動處為言而性在其中也物至而知知之者心之感也好之惡之者情也形焉者其動也所以好惡而有自然之節者性也好惡無節於內知誘於外此言情之所以流而性之所以失也情之好惡本有自然之節惟其不自知覺無所涵養而大本不立是以天則不眀於內外物又從而誘之此所以流濫放逸而不自知也茍能於此覺其所以然者而反躬以求之則其流庶乎其可制也不能如是而惟情是狥則人欲熾盛而天理滅息尚何難之有哉此一節明天理人欲之機閒不容息處惟其反躬自克念念不忘則天理益明存養自固而外誘不能奪矣上知字是體下知字是用張氏栻曰反躬之義深矣反躬而求之則夫生而靜者卓然可見而萬理可得而窮矣平日致知力行無非反躬之功也輔氏廣曰因上禮樂教民平好惡故此推人好惡所由生反躬謂反之於心也變性言理善言性也滅謂湮滅之實未嘗亡也黃氏震曰天理即指性而言變性言理理者天之所賦而具於性者也知者我之知而曰誘於外者我之心知誘於外物非知在外也辨正邵氏囦曰感物而動性始有欲欲非情欲逸欲之欲性而無欲則槁木死灰耳率性之謂道從何出哉案本文性之欲即所謂情也未見不好處到下節窮人欲欲字則失性矣孔疏以性之欲為貪欲貪字疑衍夫物之感人無窮而人之好惡無節則是物至而人化物也人化物也者滅天理而窮人欲者也於是有悖逆詐僞之心有淫佚作亂之事是故强者脅弱衆者暴寡知者詐愚勇者苦怯疾病不養老幼孤獨不得其所此大亂之道也脅許劫反知音智正義鄭氏康成曰窮人欲言無所不為孔氏穎達曰物既衆多來感於人無有窮已而人見物之來所好所惡無有法節物善則人善物惡則人惡是人化物也人既化物逐而遷之恣其情欲故滅其天生清淨之性而窮極人所貪嗜欲也知者欺詐愚人勇者困苦怯者疾病者心所嫌惡不收養之老幼孤獨無有哀矜者故不得其所也陳氏暘曰自好惡無節於內至滅天理而窮人欲不能平好惡之患也自有悖逆詐僞之心至老幼孤獨不得其所不能反人道之正之患也由是觀之先王之於禮樂刑政獨可已乎朱子曰物之誘人固無窮然亦是自己好惡無節所以被物誘去若自有主宰如何被誘去又曰上言情之所以流此以其流之甚而不返者言之好惡之節天之所以與我也而至於無節宰制萬物人之所以為貴也而反化於物天理惟恐其存之有未至也而反滅之人欲惟恐其制之不力也而反窮之則人之所以為人者至是盡矣然天理秉彝終非可殄滅者雖化物窮欲至於此極苟能反躬以求則天理之本然者初未嘗滅也但習染已深難覺而易昧難反而易流非厲知恥之勇而致百倍之功則不足以復其初耳是故先王之制禮樂人為之節衰麻哭泣所以節喪紀也鐘鼓干戚所以和安樂也昏姻冠笄所以別男女也射鄉食饗所以正交接也衰七雷反樂音洛冠古亂反笄音雞別彼列反食音嗣正義鄭氏康成曰人為之節言為作法度以遏其欲男二十而冠女許嫁而筓成人之禮也射鄉大射鄉飲酒也陳氏暘曰居喪以哀為主其發於衣服容體則斬衰三升而其貌若苴至緦麻十五升而去其半容貌可也其發於言語聲音則斬衰唯而不對其哭若往而不返至緦麻議而不及樂所以節喪紀者如此有文必有武故鐘鼓以聲文事干戚以容武事所以和安樂者如此婦曰昏夫曰姻二姓之好自此和室家之道自此正所以别男女之親也男娶以三十則參天之陽數女嫁以二十則兩地之隂數則陽數者必成以隂故始之以二十之冠則隂數者必成以陽故始之以十五之笄所以別男女之成也諸侯之射先行燕禮卿大夫之射先行鄉飲酒禮旌以詔之鼓以節之撲以戒之定其位有物課其功有尊使人存爭心於揖遜之間奮武事於燕樂之際德行由是可觀齒位由是可正所以正交接於鄉黨也食以養隂而食在所主焉饗以養陽而飲在所主焉故諸侯饗禮七獻食禮七舉而諸伯如之諸子饗禮五獻食禮五舉而諸男如之禮事相於世婦樂事序於樂師所以正交接於賓客也然亂多而刑五治多而禮五故天之所秩不過五禮有庸而已由是觀之節喪紀而使之不過者凶禮也和安樂而使之不乖者吉禮也別男女而使之不雜者嘉禮也正交接而使之不瀆者賓禮也不言軍禮者舉干戚與射以見之方氏慤曰因人之有喪紀制為衰麻哭泣以節之因人之有安樂制為鐘鼓干戚以和之以至昏姻冠笄之於男女射鄉食饗之於交接亦若是而已且禮節樂和而總曰為之節者樂雖和而不流是乃為之以節也以至别男女正交接亦無非節而己喪在彼也而我以禮數紀之故謂之喪紀衰麻有重輕之節焉哭泣有多少之節焉於樂舉鐘鼓以見管籥於舞舉干戚以見羽旄安則無危樂則無憂和則可否相濟之謂也和其安則安不至於怠和其樂則樂不至於流昏姻所以别男女之名冠笄所以别男女之服朱子曰人為之節言人人皆為之節也存疑孔氏穎達曰庾云人為猶為人也言為人作法節也禮節民心樂和民聲政以行之刑以防之禮樂刑政四達而不悖則王道備矣正義孔氏穎達曰禮樂人為之節故此明其所節之事禮有尊卑上下故裁節民心樂有宮商角徴羽及律呂所以調和民聲政謂禁令用禁令以行禮樂也若不行禮樂則以刑罰防止之此四事通達流行而不悖逆則王道備具矣方氏慤曰禮以道其心然後能節民心樂以和其聲然後能和民聲政以一其行然後能行禮樂之道刑以防其姦然後能防禮樂之失四者如是則無所不達而無所不順無所不順之謂備前言出治道四者之始也此言王道備四者之終也既曰道其志又曰節民心蓋禮達而分定禮達則所謂道其志也分定則所謂節民心也右樂本章第一史記樂書正義孔氏穎達曰此章論樂本名為樂本者樂以音聲為本音聲由人心而生也張氏守節曰此章分三段第一段明人心感樂第二段明樂感人心第三段自凡音至反人道應樂感人心自人生至王道備應人心感樂案此章分四節第一節言樂之乖和本於人心所感之邪正第二節言人所感之邪正本於政治所行之得失第三節言先王制禮樂以平人心之好惡第四節又推本於人生而靜之初見好惡之失其平皆由於物感而非先王無以平之也樂者為同禮者為異同則相親異則相敬樂勝則流禮勝則離合情飾貌者禮樂之事也勝始證反正義鄭氏康成曰同謂協好惡異謂別貴賤流謂合行不敬也離謂析居不和也合情飾貌欲其並行斌斌然也王氏肅曰流流遁不能自還離離析而不親孔氏穎達曰樂者為同謂上下同聽莫不和說也禮者為異謂尊卑各别恭敬不等也無所閒别故相親有所殊别故相敬樂勝則流禮勝則離明雖有同異而又有相須也勝猶過也樂過和同而無禮則流漫無復尊卑之敬禮過殊隔而無和樂則親屬離析無復骨肉之愛惟禮樂兼有所以為美樂和其內是合情禮以檢飭於外是飾貌二者無偏是禮樂之事也張氏守節曰樂使率土合和是為同也禮使父子殊別是為異也程子曰禮勝則離故禮之用和為貴先王之道斯為美小大由之樂勝則流故有所不行知和而和不以禮節之亦不可行也陳氏暘曰樂主和而為同凡天下所謂同者麗焉禮主別而為異凡天下所謂異者麗焉周官大司徒以樂教和以儀辨等教和則其仁足以相親而不乖辨等則其義足以相敬而不越二者不可偏勝也詩曰好樂無荒戒其流也易曰履和而至戒其離也朱子曰禮才勝些子便是離樂才勝些子便是流知其勝而歸之中即是禮樂之正真氏德秀曰禮屬隂凡天地閒道理一定而不可易者皆屬隂樂屬陽凡天地閒流行轉運者皆屬陽禮樂之不可闕亦如隂陽之不可偏勝有隂無陽則物不生有陽無隂則物不成禮勝則太嚴而不通人情故難合樂勝則太和而無所限節故流蕩忘反所以有禮須用有樂有樂須用有禮此禮樂且是就性情上說然精粗本末亦初無二理應氏鏞曰同異者禮樂之理親敬者禮樂之效流離者禮樂之偏內合其情而相與交致其親敬外飾其貌而不使偏勝於流離此禮樂之見於事為者禮義立則貴賤等矣樂文同則上下和矣好惡著則賢不肖別矣刑禁暴爵舉賢則政均矣仁以愛之義以正之如此則民治行矣著張慮反正義鄭氏康成曰等階級也孔氏穎達曰義宜也若行禮得其宜則貴賤各有階級矣文謂聲成文也若行樂文采諧同則上下各自和好也好惡者謂所好得其善所惡得其惡則賢與不肖自然分別矣用刑罰禁止暴慢用爵賞以舉賢良則政教均平矣用仁以愛之用義以正惡則民治行矣此經凡五事也陳氏暘曰禮粗而顯而以義為之樂妙而幽而以文闡之天尊地卑而君臣定卑髙以陳而貴賤位禮義立則貴賤等之謂也節奏合而成文父子以之和親君臣以之和敬樂文同則上下和之謂也因禮樂以好惡因好惡以施刑爵賞以舉賢仁不可勝用也刑以禁暴義不可勝用也仁以立人而有以愛之義以立我而有以正之則禮樂刑政四達而不悖固足以同民心出治道而民治不行未之有也方氏慤曰貴賤以位言故曰等上下以情言故曰和上言不肖而下言暴者蓋不肖雖為可惡然未至於可刑必至於暴然後有刑以禁之也存疑陳氏澔曰仁以愛之則相敬而不至於離義以正之則相親而不至於流此又以仁義為禮樂之輔者也案所性之理不外仁義兩端仁主親義主敬而樂之和即仁樂之敬即義聖人仁育天下義正萬民好惡刑賞未嘗不用義而化民善俗總以行仁此禮樂之所以同源而用亦實相濟也陳氏澔謂仁義為禮樂之輔恐未然樂由中出禮自外作樂由中出故靜禮自外作故文大樂必易大禮必簡易以䜴反正義鄭氏康成曰樂由中出和在心也禮自外作敬在貌也文猶動也孔氏穎達曰樂從心起在心故靜禮肅人貌貌在外故云動也張氏守節曰出猶生也為人在中和有未足故生此樂作猶起也為人在外敬有未足故起此禮黃氏裳曰大樂所樂者性也故易大禮所履者理也故簡周氏諝曰樂由中出文在於外禮自外作本在於中所謂由中出者言其自然也所謂自外作者言其使然也以其自然故靜以其使然故文應氏鏞曰靜者言樂止其所雖鏗鏘備舉而中之統一不可散也文者言禮備其節雖莊敬純實而外之設飾不可略也蓋樂和而易於流故雖動而必主乎靜禮嚴而易以倦故雖質而必飾以文四肢百體皆由順正樂之靜也禮儀三百威儀三千禮之文也樂出於虛愈出而愈靜禮飾其實愈飾則愈文此所以不同易以心言簡以事言心和則易而順事敬則簡而略也存疑鄭氏康成曰易簡若於清廟大饗然孔疏清廟之瑟朱弦疏越大饗之禮𤣥酒腥魚案樂之文亦外見而欣喜歡愛之情實本於中故靜禮之義亦根心而等威隆殺之儀具見於外故文惟樂由中出故雖有五音六律之繁而總一人心之和是其本固易禮自外作故必極三千三百之詳而總致吾心之敬是其本亦簡也此簡易字與易乾以易知坤以簡能同直探禮樂之原不當専在器物上說樂至則無怨禮至則不爭揖讓而治天下者禮樂之謂也暴民不作諸侯賓服兵革不試五刑不用百姓無患天子不怒如此則樂達矣合父子之親眀長幼之序以敬四海之內天子如此則禮行矣正義鄭氏康成曰至猶達也行也賓協也試用也孔氏穎達曰樂行於人由於和故無怨禮行於民由於謙敬則不爭民無怨爭則君上無為但揖讓垂拱而天下自治其功由於禮樂故曰禮樂之謂也天子如此則禮行者言天子若能使海內如此則是禮道興行也樂云達禮云行者互文也張氏守節曰禮使父慈子孝是合父子之親長坐幼立是明長幼之序孝經云教以孝所以敬天下之為人父教以弟所以敬天下之為人兄教以臣所以敬天下之為君即是敬四海之內也天子能躬行禮則臣下必行禮如此則禮行矣合父子以下悉是天子自身行之也陳氏暘曰樂不至不可以言極和禮不至不可以言極順內極和則不乖於心何怨之有外極順則不逆於行何爭之有樂以治內為同禮以修外為異同則相親而無怨異則相敬而不爭周道之衰民之無良相怨一方則樂不至可知受爵不讓至于已斯亡則禮不至可知陸氏佃曰樂至則無怨若神罔時怨神罔時恫是也禮至則不爭若虞芮質厥成文王蹶厥生是也以敬四海之內所謂豫視天下匹夫匹婦能勝豫是也存疑陸氏佃曰天子不怒當曰天下不怒以天子言禮以天下言樂相備也輔氏廣曰樂達言其終也禮行言其始也樂欲達之於下故於天下言樂禮欲率之於上故以天子言禮陸氏之說善矣然亦非相備而已應氏鏞曰四海之內四字恐在合字上案上言禮樂之本原此乃言用禮樂者之能事大樂必易則有一物不在太和之內即不易而非樂之至大禮必簡則有一物不歸主敬之中即不簡而非禮之至故必由巳達之至暴民不作刑可措諸侯賓服兵可弭而天子絶無所怒則天下俱化於無怨而後為樂之達必躬行率之至海內父子之親無不合長幼之序無不明乃為天子敬身以敬四海則天下俱化於無爭而後為禮之行也易曰易簡而天下之理得此之謂也又案合父子之親明長幼之序所謂立愛惟親立敬惟長也以敬四海之內即書所謂始於家邦終於四海也蓋謹守此禮而推廣之是之謂敬應氏謂四海之內四字當在合字上恐非大樂與天地同和大禮與天地同節和故百物不失節故祀天祭地明則有禮樂幽則有鬼神如此則四海之內合敬同愛矣正義鄭氏康成曰同和同節言順天地之氣孔疏天地與隂陽生養萬物解同和與其數孔疏天有日月星辰地有山川高下其數不同解同節不失謂不失其性祀天祭地謂成物有功報焉禮樂教人者也鬼神助天地成物者也孔氏穎達曰天地氣和而生萬物大樂之體順隂陽律呂生養萬物是與天地同和也天地之形各有髙下大小為限節大禮辨尊卑貴賤與天地相似是與天地同節也大樂與天地同和能生成百物故不失其性大禮與天地同節有尊卑上下報生成之功故祀天祭地聖人既能使禮樂與天地同和節又於顯明之處尊崇禮樂以教人幽𡨕之處尊敬鬼神以成物行禮得所故四海㑹合其敬行樂得所故四海齊同其愛矣程子曰鬼神者造化之妙用禮樂者人心之妙用張子曰禮樂鬼神一物得禮樂則得鬼神失禮樂則失鬼神但有幽眀之別耳人在隱微有不善其心不安必私禱於鬼神殊不知明則有禮樂幽則有鬼神理無二也樂仁也禮義也仁則有樂義則有禮朱子曰禮主減樂主盈鬼神亦只是屈伸之義禮樂鬼神一理又曰在聖人制作處便是禮樂在造化功用處便是鬼神輔氏廣曰先王制禮作樂與天地同和節則是理充塞乎天地幽明之閒矣故四海之內因禮以合其敬因樂以同其愛應氏鏞曰樂和故泛言百物不失舉物類之至衆見其小大各得也祀天祭地舉祭祀之至重見其髙下有等也禮麗於定體收斂而不散鬼之歸也樂游乎和氣發達而不流神之伸也昭昭之際進退盈縮而經緯不窮者無非禮樂之用冥冥之中屈伸往來而闔闢不已者無非鬼神之用幽明各有管攝其分不同而理則一曰有者顯然見其理之可以相有不可以相無也惟此理磅礴充塞乎天地鬼神之閒故天下之大而愛敬無異心也通論陳氏暘曰均是和也或謂百物不失或謂百物皆化者蓋樂者道天地沖和之氣所以合天地之化百物之産者也與天地同和其功淺故止於百物不失為天地之和其功深故至於百物皆化自天地欣合至不殰不殈所謂百物皆化也百物不失特不失其道理而已故詩序曰崇丘廢則萬物失其道理矣存異鄭氏康成曰五帝德篇黃帝死而民畏其神者百年孔疏見大戴禮左𫝊若敖氏之鬼孔疏見宣公四年熊氏安生曰繫辭鬼神謂七八九六自然之鬼神聖人賢人之鬼神與自然之鬼神俱助天地而成物孔氏穎達曰鄭易注云精氣謂七八謂之神物生所性也遊魂謂九六謂之鬼物終所歸也言木火之神生物東南金水之鬼終物西北二者之情狀與春夏生物秋冬終物相似案鄭注於鬼神先以天地言後以人鬼言其說未純自當以張子朱子之言為正禮者殊事合敬者也樂者異文合愛者也禮樂之情同故明王以相沿也故事與時並名與功偕沿說専反偕古諧反正義鄭氏康成曰沿猶因述也孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也沿或作緣事與時並為事在其時也禮器曰堯授舜舜授禹湯放桀武王伐紂時也名與功偕為名在其功也堯作大章舜作大韶禹作大夏湯作大濩武王作大武名因其得天下之功王氏肅曰有其時然後得立其事有其功然後得受其名孔氏穎達曰禮尊卑有別是殊事俱行於禮是合敬樂宮商別調是異文無不歡愛是合愛禮樂之狀質文雖異樂情主和禮情主敬致治是同以其致治情同故明王所以相因述也沿謂因而增改事謂聖人所為之事與所當時而並行名謂聖王制樂之名與所建之功而俱作也聖王雖同禮樂之情因而修述但時與功不等故禮與樂亦殊陳氏暘曰禮也者理之不可易者也語其事未嘗不通變以從宜樂也者情之不可變者也語其文未嘗不比物以飾節然禮雖殊事而不殊乎合敬禮之本故也樂雖異文而不異於合愛樂之本故也天官大宰以禮典合邦國諧萬民春官大司樂以六樂和邦國諧萬民則禮以和為用樂以和為體其情同故也明王之於禮樂有改制之名無變情之實禮之損益雖事與時並樂之象成雖名與功偕要其情同明王未嘗不相沿也黃氏震曰事文禮樂之迹敬愛禮樂之情立本有情趨時有迹情天也不可戻者也故在所因迹時也不可同也故在所損益事者時之應名者功之報趨時斯有事建功斯有名為趨時而後有事故事與時並為立功而後有名故名與功偕故鐘鼓管磬羽籥干戚樂之器也屈伸俯仰綴兆舒疾樂之文也簠簋俎豆制度文章禮之器也升降上下周還裼襲禮之文也綴音贅又丁劣反簠音甫簋居洧反上時掌反下遐去聲本遐上聲還音旋裼思歷反襲音習正義鄭氏康成曰綴酇舞者之位也孔疏謂舞者行位相連綴兆其外營域也孔氏穎達曰自此至謂也一莭申明禮樂器與文并述作之體周旋謂行禮周曲回旋也裼袒上衣襲掩上衣也禮盛者尚質故襲不盛者尚文故裼方氏慤曰管在堂下磬在堂上羽籥文舞所執干戚武舞所執屈伸舞者之身容俯仰舞者之頭容綴兆其位也舒疾其節也簠簋以盛地産俎豆以薦天産制度者文章之法文章者制度之飾升降言其行上下言其等周旋言其容裼襲言其服則禮樂之文與器略見於此矣案此一節申上殊事異文之意故知禮樂之情者能作識禮樂之文者能述作者之謂聖述者之謂明明聖者述作之謂也正義鄭氏康成曰述謂訓其義也孔氏穎達曰下文云窮本知變樂之情若能窮盡其本識其變通是知樂之情也著誠去僞禮之經若能顯著誠信棄去浮僞是知禮之情也既能窮本知變又能著誠去僞故量事制宜而能作也文謂上屈伸俯仰升降上下是也聖者通達事理故作者之謂聖堯舜禹湯是也明者辨說是非故述者之謂明子游子夏之屬是也陳氏暘曰禮樂之情寓於象質之微而難知其文顯於器數之粗而易識故知其情者能作之於未有識其文者能述之於已然方氏慤曰情者文之始也文者情之末也作述者聖明之用聖明者作述之體馬氏睎孟曰因情以作其文者非神足以知來知足以知往不能與於此故作者之謂聖因文以述其情者非明足以照之亦不能與於此故述者之謂明揚子曰深知乎器械舟車宫室之為則禮由已此因情以作其文也又曰鐘鼓不成玉帛不分吾無以見聖人此因文以述其情也案此一節申上合敬同愛之意見知禮樂之情之難也樂者天地之和也禮者天地之序也和故百物皆化序故羣物皆別樂由天作禮以地制過制則亂過作則暴明於天地然後能興禮樂也别彼列反正義鄭氏康成曰化猶生也別謂形體異也樂由天作禮以地制言法天地也過猶誤也暴失文武之意孔疏謂文樂武樂雜亂孔氏穎達曰此申明禮樂從天地而來王者必明於天地然後能興禮樂樂能暢隂陽是天地之和禮明貴賤是天地之序樂生於陽是法天而作禮生於隂是法地而制惟聖人識合天地則制作禮樂不誤若非聖人識合天地則必誤誤制禮則尊卑混亂誤作樂則樂體違暴張氏守節曰樂法天地之氣故云天地之和禮法天地之形故云天地之序馬氏睎孟曰天髙地下萬物散殊此天地自然之序隂陽相摩天地相蕩此天地自然之和天以和而百物化故樂由天作而聖人作樂以應天地以序而羣物別故禮以地制而聖人制禮以配地所謂作者之謂聖是也胡氏銓曰易於樂取雷出地奮是天地之和於禮取上天下澤是天地之序朱子曰樂由天作屬陽故有運動底意禮以地制如由地出不可移易黃氏乾行曰上言天地之和天地之序下以禮樂分屬天地者蓋氣含天地之和然上行於天流而不息合同而化於和為切質含天地之序然下凝於地天髙地下萬物散殊於序為切故合言天地而理自相通也案樂不僅與天地同和究其本則樂即天地之和禮不僅與天地同節究其本則禮即天地之節天地具自然之禮樂而聖人之禮樂由是而興天地無心而成化聖人有心而化成其自然者一也若曰自我制之作之則過而暴亂生矣興者順其自然之謂論倫無患樂之情也欣喜歡愛樂之官也中正無邪禮之質也莊敬恭順禮之制也案官史記賀㻛作容非正義鄭氏康成曰倫猶類也患害也官猶事也質猶本也孔氏穎達曰自此至與民同也明禮樂文質不同事為有異樂主和同論說等倫無相毁害是樂之情也官猶事也在心則倫類無害故為樂情在貌則欣喜歡愛故為樂事內心中正無有邪僻是禮之本質外貌莊敬謙恭敬慎是禮之節制馬氏睎孟曰樂以和為實其和足以通倫理而無繆故為樂之情情猶言實也樂雖以和為實而和之所見則在於欣喜歡愛無欣喜歡愛則和之理幾乎隱矣故欣喜歡愛為樂之官官猶言職也情者官之所始而官者情之所成也著誠去僞禮之經也中正無邪者誠而已故為禮之質禮雖以誠為本而誠之所發則在於莊敬恭順無莊敬恭順則禮之誠於是乎滅矣故莊敬恭順為禮之制制猶言文也質者制之所立而制者質之所行也此與夫義理禮之文忠信禮之本者其意同矣若夫禮樂之施於金石越於聲音用於宗廟社稷事乎山川鬼神則此所與民同也正義鄭氏康成曰言情官質制先王所専也孔氏穎達曰施於金石越於聲音樂也用於宗廟社稷事乎山川鬼神禮也通而言之則禮樂相將矣此等與民所同有也陳氏暘曰論倫無患至於莊敬恭順禮樂之本先王之所以與人異及夫施於金石越於聲音用於宗廟社稷事乎山川鬼神者禮樂之用先王之所以與人同不以所異者與人不以所同者處己夫是之謂議道自己置法以民方氏慤曰情官質制者禮樂之義也金石聲音者禮樂之數也其數可陳則民之所同其義難知則君之所獨論語曰禮樂自天子出又曰民可使由之不可使知之皆此意也右樂論章第二史記樂書鄭目録同吳氏澄纂言改居第六孔氏穎逹曰此章凡有四段自首至民治行矣為第一段論樂與禮同異將欲廣論先論其異同也自樂由中出至則禮行矣為第二段論樂與禮之功論同異既辨故次宜有功也自大樂與天地同和至述作之謂也為第三段論樂與禮惟聖人能識既有其功故究識也自樂者天地之和至則此所與民同也為第四段論樂使上下和合是為同禮使父子殊别是為異也張氏守節曰一段說樂體二段說樂功三段說聖人識禮樂之情四段更說其情狀案此篇劉向本作樂論第三萹劉向本作樂理蓋承首篇樂通倫理之意而申言之也倫之言綸也比其類而合之故禮樂之為同為異分而合情飾貌則合中出外作分而揖讓而治天下則合和節分而合敬同愛則合和序分而禮樂之情則合皆於分處看出合處來以明樂通倫理之意王者功成作樂治定制禮其功大者其樂備其治辨者其禮具干戚之舞非備樂也孰亨而祀非達禮也辨薄莧反又音遍孰熟同亨普衡反正義鄭氏康成曰功成治定同時耳功主於王業治主於教民明堂位說周公曰治天下六年朝諸侯於明堂制禮作樂辨遍也干戚之舞非備樂者樂以文德為備若咸池者孔子曰韶盡美矣又盡善也謂武盡美矣未盡善也逹具也郊特牲曰郊血大饗腥三獻爓一獻孰至敬不饗味而貴氣臭也孔氏穎達曰功成作樂者王者興先王之功由民所樂故作樂以應民心猶如民樂周有干戈而業成故周王成功制干戈之樂也治定制禮者禮以體別為義今治人得體故制禮應之如周王太平乃制禮也禮樂必由其功治功治有大小故禮樂亦應以廣狹樂備謂文德備具不備謂干戚之舞禮具則血腥而祭不具謂孰烹而祀言禮樂之體皆以德為備具也周樂干戚之舞非如舜時文德之備樂後世孰烹體而祭祀非如五帝之時血腥之達禮也陳氏暘曰功不至於鳧鷖不可以言成治不至於既濟不可以言定王者德位兼隆雖有可以制作之道必適乎可以制作之時故禮雖可以義起必待乎治定樂雖可以理作必待乎功成作樂合乎祖而簫管備舉樂之所以備也蒸畀祖妣以洽百禮禮之所以具也蓋全之之謂備小備之謂具然則文武之舞不全非所以為備樂腥孰之薦不兼非所以為具禮周官以六代文武之舞為大合樂禮運以毛血腥孰合亨為禮之大成則備樂具禮於是覩矣變具禮為達禮者禮不具不足為天下之通禮故也陸氏佃曰干戚之舞備樂也而曰非備樂孰亨而祀達禮也而曰非達禮以著禮樂在彼不在此也雖有干戚之舞而功不備雖孰亨而祀而治不協愧於備樂達禮矣案樂之備由於功之大則戡亂繼治各有其功必不以干戚之舞為備樂可知禮之具由於治之辨則凖今酌古各有其治必非以孰亨而祀為達禮可知以起下聖人所以遞變之故孔疏尊五帝而卑三王恐非本義五帝殊時不相沿樂三王異世不相襲禮樂極則憂禮粗則偏矣及夫敦樂而無憂禮備而不偏者其唯大聖乎夫音扶正義鄭氏康成曰不相沿襲言其有損益也樂人之所好也害在淫誇禮人之所勤也害在倦略敦厚也孔氏穎達曰五帝三王禮樂之情則同故前文云明王以相沿是也此論禮樂之迹損益有殊隨時而改云不相沿襲也樂極而不止則必至憂戚禮不勤行好生懈怠則致粗略偏謂不周備也及夫厚重於樂知止則止而無至於憂行禮安靜委曲備具不至倦略惟大聖之人能如此也張氏守節曰庾蔚之云樂興於五帝禮成於三王方氏慤曰大饗卒爵而樂闋鄉飲酒樂備而遂出所以防其極也書言享多儀經言賓主百拜亦以防其粗也前言相沿述者之事故稱明此言敦備作者之事故稱聖馬氏睎孟曰樂患於極故以反為文禮患於粗故以進為文敦樂而無憂者盈而能反也禮備而不偏者減而能進也天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉春作夏長仁也秋斂冬藏義也仁近於樂義近於禮夏户嫁反長丁丈反正義孔氏穎達曰自此至天地官矣申明禮樂配於天地若禮樂備具則天地之事各得其宜天髙地下不同故人倫尊卑有異其閒萬物各散殊塗禮者別尊卑定萬物是禮之法制行矣天地萬物流動不息合㑹齊同而變化者也樂者調和氣性合德化育是樂興也禮以裁制為義故特加制樂以興作為本故不云制也仁主仁愛樂主和同故仁近於樂義主斷割禮為節限故義近於禮方氏慤曰隂以形為體故於禮言形陽以氣為用故於樂言氣形故言其名氣故言其義作長以氣言氣盛於春夏斂藏以形言形成於秋冬禮樂者天地之道也仁義者四時之德也輔氏廣曰形於天地則先禮而後樂蓋有序而後和生焉形於四時則又先樂而後禮蓋氣和而後樂成焉陳氏澔曰物各賦物而不可以强同此造化示人以自然之禮制也絪縕化醇而不容以獨異此造化示人以自然之樂情也合同者春夏之仁故曰仁近於樂散殊者秋冬之義故曰義近於禮通論朱子曰天髙地下萬物散殊一段意思極好非孟子以下所能作其文如中庸必子思之辭左𫝊云為六畜五牲三犧以奉五味云云之類都是做這箇去合那天都無自然之理如云天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉皆是自然合當如此真氏德秀曰禮樂之原出於天地自然之理天髙地下此即自然之尊卑萬物散殊有大有小有隆有殺此即自然之等級聖人因此制為之禮君父在上臣子在下此即天髙地下之象自是而下兄弟夫婦師友賓主以至於輿臺皂隸名位分守燦然有倫此即萬物散殊之象皆所以法天地之序也隂陽五行之氣流行於天地之閒未嘗少息為雷霆為風雨皆是隂陽之氣摩蕩而成惟其二氣和合所以能化生萬物聖人因此作為之樂樂有五聲以應五行十二律以候十二月之中氣皆隂陽交錯而成所以象天地之和也陳氏暘曰天髙地下萬物散殊形也流而不息合同而化氣也夫天地之初有氣然後有形及其形之既具而氣又運乎其閒則形資氣而後有氣資形而後行自其形資氣而觀之則樂常先於禮自其氣資形而求之則禮又先於樂物出乎震齊乎㢲相見乎離此天地之仁故曰春作夏長仁也說乎兌勞乎坎成乎艮此天地之義故曰秋斂冬藏義也仁主乎愛故近於樂義主於敬故近於禮存疑鄭氏康成曰禮為異樂為同樂法陽而生禮法陰而成辨正姚氏舜牧曰自天髙地下至居鬼而從地統論天地閒有自然之禮樂未便說到聖人至作樂以象天制禮以配地方說是聖人之效法注禮行樂興說聖人法之似太早近樂近禮說效法之所本似俱未當樂者敦和率神而從天禮者别宜居鬼而從地故聖人作樂以應天制禮以配地禮樂明備天地官矣別彼列反正義鄭氏康成曰敦和樂貴同也率循也從順也別宜禮尚異也居鬼謂居其所為亦言循之也孔疏居謂居處亦率循之義變文爾官猶事也各得其事王氏肅曰天地官各得其位也孔氏穎達曰樂之為體敦重和同因循聖人之神氣而從於天禮之為體殊別萬物所宜居處鬼神之所為而順於地聖人能使禮樂顯然備具則天地之事各得其利矣陳氏暘曰樂極和不有以敦之未必能統同禮從宜不有以別之未必能辨異天以至陽而職氣覆地以至隂而職形載樂由天作而至陽之氣存焉禮以地制而至隂之形存焉聖人職教化者也為能因隂陽以統形氣樂有聲而無形作之以應天聲氣同故也禮有形而無聲制之以配地形體異故也禮樂明矣而不昧備矣而不偏非徒足以官天地天地亦將為我官也方氏慤曰氣固有和樂則敦之使厚物固有冝禮則別之使辨和既敦則莫不循其理而無所屈故能率神宜既別則莫不安其處而有所歸故能居鬼馬氏睎孟曰神者陽之類而天者陽之所積樂由陽來故率神以從天鬼者隂之類而地者亦隂之所積禮因隂作故居鬼以從地率者引而上之居者俯而就之天地有自然之禮樂而聖人輔相天地之宜故作樂以應天制禮以配地則禮樂明備而天地各當其位也此與記所謂致中和天地位焉萬物育焉者同意存疑鄭氏康成曰鬼神謂先聖先賢孔疏聖人之魂為神賢人之魂為鬼辨正張子曰率神居鬼鬼神之物也只是神為伸鬼為歸指幽明而言案以二氣言則天地之形常定定者隂之精也禮也天地之氣常流流者陽之動也樂也以一氣言則天之資始無形神之伸也樂也地之資生有質鬼之歸也禮也鄭孔以神鬼屬聖賢說未確天尊地卑君臣定矣卑髙以陳貴賤位矣動靜有常小大殊矣方以類聚物以羣分則性命不同矣在天成象在地成形如此則禮者天地之別也正義鄭氏康成曰卑髙謂山澤也位尊卑之位象山澤也孔疏鄭易注君臣尊卑之貴賤如山澤之有髙卑動靜隂陽用事孔疏謂風雷動散有常大小萬物也大者常存小者隨陽出入孔疏小如草木春生秋殺昆蟲夏生冬伏大者不隨四時變也性之言生也命生之長短也象光耀也孔疏日月星辰形體貌也孔疏植物動物孔氏穎達曰自此至禮樂云廣明禮樂之功包天地之德萬物各有區分性命之別故聖人因此制禮類族緣物各隨性命也應氏鏞曰此莭所謂天髙地下萬物散殊而禮制行矣陳氏澔曰此與易繫辭略同記者引之言聖人制禮其本於天地自然之理者如此定君臣之禮者取於天地尊卑之勢也列貴賤之位者取於山澤卑髙之勢也小事不可為大大事不可為小故小大之殊取於隂陽動靜之常也方猶道也聚猶處也君臣父子夫婦長幼朋友各有其道則各以其類而處之所謂方以類聚也物事也行禮之事即謂天理之節文人事之儀則行之不止一端分之必各從其事所謂物以羣分也所以然者以天所賦之命人所受之性自然有此三綱五常之倫其閒尊卑厚薄之等不容混而一之也故曰性命不同矣在天成象如衣與旗常之章著為日月星辰之象在地成形如宮室器具各有髙卑大小之制是取法於地也由此言之禮之有別非天地自然之理乎存異鄭氏康成曰方謂行蟲物謂植生者孔氏穎達曰禽獸之屬有性識故稱方各以類聚不相雜也草木之屬無心靈故云物各有區分自殊於藪澤也案天尊地卑即上天髙地下卑髙動靜方類物羣即上萬物散殊所該甚廣方本異而類同則聚在天則星皆拱北在地則水皆向東在人則君子小人亦各從其類物本同而羣異則分在天則參商不相見在地如河濟清濁之分在人如禽跖牛魋之異皆是鄭孔指禽獸草木似未該也君臣定貴賤位大小殊即上禮制行焉總之禮未制而天地之尊卑動靜己儼然一禮聖人因之制禮正君臣之等明貴賤之位辨小大之宜類族辨物使各得其所亦如在天之成象在地之成形者然是禮未制而聖人之禮在天地禮既制而天地之別在聖人也地氣上齊天氣下降隂陽相摩天地相蕩鼓之以雷霆奮之以風雨動之以四時暖之以日月而百化興焉如此則樂者天地之和也上時掌反齊依注作躋摩本又作磨蕩本或作蕩暖許袁反同暄正義鄭氏康成曰齊讀為躋躋升也摩猶迫也蕩猶動也奮迅也百化百物化生也孔氏穎達曰地氣上升天天氣下降與地氣交合積氣從下升上樂象氣故先從地始形以上為尊禮象形故從天為初相摩謂隂陽二氣相切迫相蕩言天地之氣相感動鼓之以雷霆者雖以氣生而物未發故用雷霆以鼓動之奮之以風雨者萬物得風雨奮迅而出也動之以四時者萬物生長隨四時而動也暖之以日月者萬物之生必須日月暖煦之此皆天地相蕩之事言作樂者法象天地之和氣樂和則天地亦和前經云禮者天地之別若制禮得所亦能使天地別異此經樂者天地之和則是法天地之和氣故云樂者天地之和也張氏守節曰二氣切摩而萬物生發作樂亦令聲氣切摩使民心生敬也天地化物八節更相感動作樂亦令八音相感動也萬物雖以氣生而物未發故雷霆以鼓動之如樂用鐘鼓以發節也萬物皆以風雨奮迅而出如樂用舞奮迅以象之使發人情也萬物生長隨四時而動如樂各逐心內所須而奏之萬物之生必須日月暖照如樂有蘊藉使人暄照也蘊藉者歌不直言而長言嗟歎之屬也陳氏澔曰暖之者日也月亦預焉潤之者雨也風亦預焉相須而成故也方氏慤曰隂陽以氣言而見乎形故曰摩天地以形言而存乎氣故曰蕩其實一也雷霆者聲之所作故曰鼓風雨者氣之所激故曰奮四時代謝故曰動日月代明故曰暖禮之别終於成形者主乎體故也樂之和終於百化者主乎氣故也應氏鏞曰此即所謂流而不息合同而化而樂興焉案此節言樂未作而天地之雷霆風雨已藹然一樂聖人因之作樂清明象天廣大象地奮發象雷霆周旋象風雨終始象四時文明象日月其百物不失亦如百化之興者然是樂未作而聖人之樂在天地樂既作而天地之和在聖人也化不時則不生男女無辨則亂升天地之情也正義鄭氏康成曰辨别也升成也樂失則害物禮失則亂人孔氏穎達曰此明天地不時由禮樂失所樂以法天化得其時則物生不時則物不生天之情也禮以法地男女有別則治興無別則亂升地之情也皇氏云天地無情以人心而謂之耳陳氏暘曰和故百物皆化化不時則不生樂失其和故也序故羣物皆别男女無辨則亂升禮失其別故也馬氏睎孟曰天地之道變化不以常未春而燠未冬而寒則隂陽失其和雖天下易生之物亦不能生也男女有別而後父子親父子親而後禮作禮作然後萬物安夫亂之所起常起於衽席之上升猶言階之以為亂也陳氏澔曰此言禮樂之得失與天地相關所謂和氣致祥乖氣致異也總結上文兩節之意及夫禮樂之極乎天而蟠乎地行乎隂陽而通乎鬼神窮髙極逺而測深厚蟠步丹反正義鄭氏康成曰極至也蟠猶委也髙逺三辰也深厚山川也言禮樂之道上至於天下委於地則其閒無所不之孔氏穎達曰禮樂之大原雖取象於天地功德又能遍滿於天地之閒天降膏露是極乎天地出醴泉是蟠乎地日月嵗時無易百榖用成是行乎隂陽用之以祭鬼神作樂一變以至六變百神俱至是通乎鬼神髙逺謂天之三光皆應禮樂而明是禮樂窮極之也深厚謂地之山川皆應禮樂而出瑞應是測深厚也陳氏暘曰禮樂之用四方上下無所不至此樂所以為天地之和而非止同其和禮所以為天地之別而非止同其節也蓋禮樂非天地則不因天地非禮樂則不成方氏慤曰極天蟠地言其升降之無常行乎隂陽言其往來之不息通乎鬼神言其變化之無方極乎天非特樂由天作雖禮亦極乎天蟠乎地非特禮以地制雖樂亦蟠乎地行乎隂非特禮由隂作雖樂亦然行乎陽非特樂由陽來雖禮亦然通乎鬼非特禮别宜居鬼而已雖樂亦然通乎神非特樂敦和率神而已雖禮亦然此其所以為至歟故首以極言之及言及其至也馬氏睎孟曰禮樂之粗則寓於形名度數之閒至於精則無乎不在也此言中和之效其妙如此而不言在人者蓋中和者人之所致也其妙如此則在人可知矣朱子曰此以理言有是理即有是氣一氣之和無所不通亦如說天髙地下萬物散殊而禮制行其中正義引膏露降醴泉出等語緣先有此理末梢便有這徴驗輔氏廣曰上言天地自然之禮樂此言聖人制禮作樂之功樂著大始而禮居成物著不息者天也著不動者地也一動一靜者天地之閒也故聖人曰禮樂云鄭注樂著直略反下著如字王注並如字今從王大音泰正義鄭氏康成曰大始百物之始生也著不息著猶明白也息猶休止也易曰天行健君子以自强不息言禮樂之法天地也樂靜而禮動其並用事則亦天地之閒耳王氏肅曰著明也明大始謂法天也成物謂地也居亦謂法也孔氏穎達曰言顯著明白運生不息者是天也顯著養物不移動者地也言樂法於天動而不息禮象於地靜而不動也陳氏祥道曰乾者萬物之所資始故能以始而推始則至於知大始坤者萬物之所資生故能以生而生生則至於作成物然乾於大始知之而已未能使之著坤於成物作之而已未能至於居惟樂有和所以能著其始禮有節所以能居其物此禮樂所以能成天地之道也其成天地之道如此蓋亦本於天地之動靜而已故著不息而動者樂也著不動而靜者禮也一動則為樂一靜則為禮是以凡在天地之閒者莫非禮樂也禮樂之道天地而已聖人曰禮樂云玉帛鐘鼓云乎哉陳氏暘曰大始氣之始成物形之終著其微而顯之者樂也居其所而有之者禮也乾則自强不息坤則至靜德方天確而動故其運不息著不息者樂之所以冥乎天也地隤而靜故其處不動著不動者禮之所以冥乎地也有天地然後有萬物萬物之情非動則靜而禮樂如之樂主動由中出則靜矣禮主靜交乎下則動矣萬物盈於天地之閒或類聚或羣分動者有時而靜靜者有時而動一動一靜而不主故常者無適而非禮樂也非聖人知禮樂之情其孰能究此邵氏囦曰禮樂雖因天地而形天地亦因禮樂而著大始氣也成物形也大始本有是氣樂則著而明之成物本有是形禮則居而辨之故著而運行不息則為天著而一定不易則為地著而為一動一靜則在動非動在靜非靜乃天地之閒而機緘之妙也聖人於此窮其所自而歸之於禮樂故曰禮樂云又以見天地造化亦無不待於禮樂也存疑鄭氏康成曰著之言處也孔疏樂象於天天為生物之始是樂處大始禮法於地地稟天氣以成於物故云禮居成物著與居相對故以著為處也閒謂百物也孔疏或一物飛走蠢動感天地之陽氣或一物安伏止靜安天地之隂氣此一動一靜在天地之閒所謂百物也張氏守節曰天為萬物之始故曰大始天蒼而氣化樂亦氣化故云處大始在地成形禮亦形教故云居成物地卑故曰居天髙故曰著也著不息著不動此美禮樂配天地著亦處也樂氣處運生不息者配天也禮制尊卑定位成養萬物處不移動者配地也彭氏汝礪曰下二著字皆當訓處蓋處乎上而不息者天也處乎下而不動者地也此天地之定體案易乾知大始坤作成物此本其語著猶知也居猶作也陽輕清故以著言隂重厚故以居言耳鄭讀此著字為直略反已誤張氏彭氏并下二著字亦誤之何也一動一靜者天地之間言天地之間一陰一陽變化流行乃周子所謂互為其根張子所謂兩在故不測之意鄭指百物已滯孔疏則愈泥矣右樂理章第三史記樂書同鄭目録第五吳氏澄纂言居第七孔氏穎達曰此樂記第三章名曰樂禮明王者為治必制禮作樂張氏守節曰中有三段一明禮樂其用必對二明禮樂法天地三明天地應禮樂案此章劉向本作樂理皇侃作樂禮熊安生作樂體張守節作禮樂劉本最先為得之蓋各有條之謂理天地之位不定則其氣不交君仁臣忠父慈子孝夫義婦德之禮不明則亦無以相和故禮先而樂後皆從分處指出所以合來以明樂通倫理之意欽定禮記義疏卷五十
