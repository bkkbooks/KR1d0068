body:
  text: 曲禮下第二之二天子有后有夫人有世婦有嬪有妻有妾正義孔氏頴達曰自此至曰享總論立男官女官之事后後也言其後於天子亦以廣後嗣也夫扶也言扶持於王也婦服也言其進以服事君子也以其猶貴故加以世言之亦廣世嗣也嬪婦人之美稱可賓敬也妻之言齊也得與夫敵體也妾之言接也以得接見於君子也通論吕氏大臨曰后以配天子夫人視三公其名與諸侯之妃同世婦視大夫其名與大夫妻同九嬪於昏義視九卿位在世婦上此在世婦下者異代之制也馬氏睎孟曰昏義言後宫之治故兼天子后言之以備六宫之數而妾不預焉曲禮言後宫之位故止言天子而備六宫之名則雖以后之尊亦曰有后而妾之賤亦預焉存異鄭氏康成曰妻八十一御妻周禮謂之女御以其御序於王之燕寢妾賤者孔氏頴達曰周禮嬪在世婦上又無妾之文今此所陳與周禮雜而不次者或記者雜夏殷而言之胡氏銓曰隋唐以後皇后而下有貴妃淑妃德妃賢妃則夫人也昭儀昭容昭媛修儀修容修媛充儀充容充媛則九嬪也婕妤美人才人各九合二十七是代世婦寶林御女采女各二十七是代御妻六尚分典乘輿服御則妾也大抵踵周官之制案此節當在後天子之妃曰后節下公侯有夫人節上脫簡在此耳妻者齊也敵體之義天子六宫惟后與君齊德諸侯三宫惟夫人與君齊德故論語曰邦君之妻君稱之曰夫人孟子述初命曰毋以妾為妻是左右媵即不得有妻名況女御乎周禮女御不言數鄭注以昏義之八十一御妻實之不知昏禮御妻妻字乃御女之訛文而八十一之數亦遞以三倍加之非確也且鄭注三公九卿二十七大夫八十一元士似夏制三夫人九嬪二十七世婦八十一御妻是周制取其數相應豈周公特設此制誇周女寵之盛與夏多士相配耶況周禮惟九嬪言九世婦女御不言數鄭何所據而以八十一妻為周制乎蓋此經文義謂天子有后夫人嬪婦諸侯有夫人世婦以備內官名分甚嚴天子惟后為妻公侯惟夫人為妻餘皆妾耳非謂天子世婦嬪之下又有八十一妻公侯夫人之下又有三婦九妻也天子建天官先六大曰大宰大宗大史大祝大士大卜典司六典大音泰正義鄭氏康成曰典法也陳氏澔曰以其所掌重於他職故曰先孔氏頴達曰大宰一卿以象天時大宰既尊故先列之大宰既法於天故同受大名云六大也上典是守典之典下典是典法之典葉氏夢得曰六者皆有書故謂之六典六典所以奉天道也天道主之以天官案公卿輔弼之臣皆寅亮天職故統謂之天官非周禮之天官六大皆奉天之事大宰即周官之冢宰於職無所不統大宗即周官之宗伯亦謂之天官者典禮皆天秩天敘也大史於周官掌六典八法八則而月令掌天日月星辰之行大祝周禮掌六祝六祈以接神大士周禮無之而此在卜祝之間故鄭疑為以神仕者大卜周禮掌三易三兆以占吉凶四者皆屬宗伯而皆以為天官者蓋鬼神去人逺而與天通故也存疑鄭氏康成曰此蓋殷時制也周大宰為天官大宗曰宗伯宗伯為春官大史以下屬焉孔疏鄭注大傳夏六卿后稷司徒秩宗司馬作士共工此所言上非夏法下異周典故鄭疑殷制也大士以神仕者孔疏知非司士及士師鄉士之等者以下别有司士司寇此與卜祝相連也吕氏大臨曰殷人尊神率民以事神先鬼而後禮大宗以下皆事鬼神奉天時之官故總謂之天官案鄭氏以為殷制者以周制既未合姑以此擬之非謂實有可據也蓋者疑辭則亦以疑存之可耳又此特約舉官制言天子設官有掌天事者則大宰大宗大史大祝大士大卜也有掌民事者則司徒司馬司空司士司寇也有掌物用者則六府六工也天事尊故曰典民事繁故曰衆司徒掌教司馬掌兵司空掌役司士掌爵祿以賞善司寇掌刑罰以懲姦而衆無不治矣天子之五官曰司徒司馬司空司士司寇典司五衆正義葉氏夢得曰司徒所奉者地道所掌者邦教有教不可無政故次以司馬有政不可無事故次以司空有政事則財用足人輕於從善而恥於犯法故次以司士正羣臣之版以詔爵祿終以司寇詰邦國之禁以刑暴亂五官各率其屬而治所以奉地道也案天子設官之意莫大乎敬天而勤民上一節首舉治天事者此一節乃舉治民事者五衆者司徒養之則曰民司馬治之則曰兵司空用之則曰役司士升之則曰士司寇涖之則曰隸也通論吕氏大臨曰周官司士則夏官之屬此别為一官者司士掌羣臣之版及卿大夫士庶子之數則所統者衆與司馬司徒司空司寇略等矣所以並立為五官也司徒之衆則六鄉六遂之屬是也司馬之衆則六軍之屬是也司空之衆則百工是也司寇之衆則士師司隸之屬是也故曰典司五衆吳氏華曰以郯子所言少昊氏之官名則曰祝鳩氏司徒也鴡鳩氏司馬也鳲鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩鳩民者也名與曲禮五官同存疑鄭氏康成曰衆謂羣臣此亦殷時制也孔疏知非天下衆人者以經云五衆明官各有所衆如周六官之屬也周則司士屬司馬大宰司徒宗伯司馬司寇司空為六官孔氏頴達曰立六大以象天之六氣又置五官以象地之五行典司五衆者言用此五官使各守其所掌上之羣衆然此五官亦各有所領羣衆如大宰領大宗以下也而不條出其人者略也六典五衆者互言也天尊故云典地卑故云衆案周禮惟司徒為地官餘以四官分四時不可以地概之且五行生於天而成於地不當第屬之地也天子之六府曰司土司木司水司草司器司貨典司六職正義鄭氏康成曰六府主藏六物之稅者司土土均也司木山虞也司水川衡也司草稻人也司器角人也司貨丱人也孔疏司土於周為土均主均平地稅之政令司木於周為山虞虞度也主量度山之大小所生之物司水於周為川衡衡平也掌巡行川澤平其禁令司草於周為稻人掌稼種下地及除草萊司器於周為角人掌以時徴齒角於山澤之農供為器用司貨於周為丱人掌金玉錫石之地為之守禁以時取之以供器物金玉曰貨故稱貨人立此六官使各主其所掌職案若玉府之掌金玉玩好兵器孰非器而専舉一角人若四監之收秩薪柴掌葛掌荼掌染草孰非草而専舉一稻人乎孔亦順鄭為説耳吕氏大臨曰農以耕事貢九榖則司土受之山虞以山事貢木材則司木受之澤虞以澤事貢水物則司水受之圃以樹事貢薪芻疏材則司草受之工以飭材事貢器物則司器受之商以市事貢貨賄則司貨受之周官司土則廪人倉人之職司木則山虞林衡之職司水則澤虞川衡之職司草則委人之職司器司貨則玉府內府之職所入者乃農圃虞衡工商之民所貢故曰典司六職王氏安石曰司徒至司土主地事之官也府者物之所聚也陳氏祥道曰大宰理天道者也司徒以下理人道者也司土以下職地物者也土工以下飭地財者也存疑鄭氏康成曰此亦殷時制也周則皆屬司徒孔氏頴達曰殷既法天地立官又為萬物立府天子之六工曰土工金工石工木工獸工草工典制六材正義鄭氏康成曰土工陶旊也金工築冶鳧栗段桃也石工玉人磬人也木工輪輿弓廬匠車梓也獸工函鮑韗韋裘也惟草工職亡蓋謂作萑葦之器也孔疏考工記陶人為甗旊人為簋即土工也築氏掌為削削謂書刀冶謂煎金石冶氏掌戈戟故因呼煎金為冶鳧氏世能為鐘以供樂器栗氏世能為量器謂豆區釜鍾之屬段氏主作錢鎛田器桃氏為刃刃刀劒之屬此即金工也玉人作圭璧磬人作磬玉及磬出於石故謂石工也輪謂車輪輿謂車牀車難不能一人獨成各有所善故輪輿不同弓能作弓者廬能作戈戟柲者匠能作宫室之屬者車謂能作大車及羊車梓謂杯勺筍虡之屬此七物並用木故曰木工也函謂能作甲鎧鮑謂能治皮作甲韗謂考工記韗人為皋陶鼓木謂能以皮冒鼓者韋熟皮為衣及韎韐者裘謂帶毛狐裘之屬考工記韋裘二職存此物並用獸皮即獸工也孔氏頴達曰既有六府之物宜立六工以作為器物工能也言能作器物者也草工謂以萑葦作盛食之器及葦席之屬也立此六工使典制六府之財物葉氏夢得曰六者造之於人則曰工見之於用則曰材治天下至於各成其材此先王所以裁成輔相以左右民而治也存疑鄭氏康成曰此亦殷時制也周則皆屬司空陸氏佃曰考工記曰凡攻木之工七攻金之工六攻皮之工五設色之工五刮摩之工五摶埴之工二土工蓋摶埴之工金工蓋攻金之工石工蓋刮摩之工木工蓋攻木之工獸工蓋攻皮之工草工蓋設色之工若以藍為青以䓞為紫以蒨為紅以菉為黃之類是也或曰草讀如字今俗作皂非正也殷人尚質故設色之工謂之草工案六材皆當歸之府今六府有土木草而無金石獸六工有土木草而無水器貨者水無藉於人工金獸之材於器貨中兼之也又案先六大立五官以天下之賢立天下之政而不尸其功設六府考六工以天下之材供天下之用而不私其有則此數節雖未及建官之詳而所為治天治人治物者已提其要百王損益雖殊而大指要莫外此矣五官致貢曰享享許兩反正義鄭氏康成曰貢功也享獻也致其歲終之功於王謂之獻也周禮太宰歲終則令百官府各正其治受其會聽其致事而詔王廢置葉氏夢得曰功罪不進於上則下之情不通黜陟不行於下則上之權不立故五官各致其貢以通於王六職所分者內事則獻事六大所職者邦治則考治五官所職者衆則獻功六府所職者物則獻業王於是考其貢而加之黜陟此所以道揆於上法守於下為治之所以成終成始也故曰五官致貢曰享貢言其造於下而有所進享言其通於上而有所舍存異熊氏安生曰五官五等諸侯孔氏頴達曰五官后一天官二地官三六府四六工五歲終王后之屬致蠶織之功天官以下各獻其職之功辨正孔氏頴達曰五官致貢謂上天子之五官司徒以下故下云五官之長曰伯大宰總攝羣職總受五官之貢故不入其數若以五官為后以下則下云五官之長豈有長於后乎熊氏以為五等諸侯亦非也案此結上四節六大不言貢天事無可貢也六府六工不言貢治物原以為民總不越民事中也五官之長曰伯是職方其擯於天子也曰天子之吏天子同姓謂之伯父異姓謂之伯舅自稱於諸侯曰天子之老於外曰公於其國曰君長竹丈反下同正義鄭氏康成曰五官之長謂為三公者周禮九命作伯孔疏即三公加一命出為分陜二伯者也職主也是伯分主東西者春秋傳曰自陜以東周公主之自陜以西召公主之一相處乎內是或為氏曰天子之吏擯者辭也孔疏擯謂天子接賓之人天子之吏亦當言名記者略之春秋傳曰王命委之三吏謂三公也孔疏鄭引之證呼三公並為吏之意也稱之以父與舅親親之辭也外自其私土之外天子畿內孔氏頴達曰自此至曰孤總論二伯及州牧諸侯稱謂畿外之大莫大於二伯故此先言之五官即司徒以下五官也云長者三公無職故不在五官之中伯長也言此二伯為內外官之長是職方者言二伯於是職主當方之事也若擯者傳辭於天子則稱此二伯為天子之吏若三公與王同姓者王呼為伯父伯者長大之名父乃同姓重親之稱也伯舅異族重親之名也異族無父稱故呼為伯舅二伯若與九州及四夷之諸侯言則自謂天子之老係於天子威逺國也外者其私土采地之外也而猶在王畿之內如周公食邑於周嚮國外之人其自稱曰公也其國采地內也與采地內臣民言則自稱曰君既主分陜又在王朝嫌不正為采地君故明之也案於外曰公諸侯之國稱之如宰周公也於國曰君其臣民稱之皆曰我君非其自稱也方氏慤曰二伯之尊於天子有賔道故傳辭於天子而其人謂之擯也通論孔氏頴達曰擯呼在朝三公為天子之吏然玉藻伯曰天子之力臣者謂介傳命稱天子力臣擯者受辭傳於天子則曰天子之吏案晉文公為二伯左傳僖二十八年王曰叔父不稱伯者以州牧之禮命之也昭九年云伯父惠公又云我在伯父猶衣服之有冠冕以晉為州牧又為二伯也周公分陜為二伯詩稱王曰叔父者成王以本親命之也晉文侯仇為伯而尚書云父義和不云伯者親之也存異朱氏申曰五官即五等諸侯伯其長也案二伯為六官長記不言六官而言五官者大宰尊即為長不待言五官中又命一人為二伯也蓋三公即六卿之兼官而二伯即三公之分職顧命召六卿而召公畢公毛公即三公畢公率東方諸侯召公率西方諸侯即二伯不必三公止論道不分職亦不必一公處內二公處外亦不以東伯尊西伯次也朱氏申以五官為諸侯誤總論遊氏桂曰古者封建有官有爵有同姓異姓之親曰牧曰伯官也曰公曰子爵也曰伯父伯舅叔父叔舅親也天子之三公及二王之後稱公餘則以國大小列為侯伯子男在四夷有子男而無侯伯此其為爵之法九州各建其牧九牧之職各治其州之諸侯二伯之職分治九州之牧書曰以倡九牧是也九州之牧各擇其賢侯為之而二伯則三公為之此其分職之法也方三代封建之始其所封者非王之父兄子弟則其婚姻也非婚姻則謂之庶姓庶者卑之也其言庶方小侯猶庶姓也國大而爵尊則以伯稱之為二伯者是也國差小而爵差卑則以侯稱之為九州之牧者是也因其國與爵與為伯叔之稱所以皆稱父者假以成王言之當時諸侯所謂文之昭也則其諸父也齊王舅也於周世為婚姻稱父云者皆本其始封而言稱舅云者本其婚姻而言此親親之等也古者君臣之際有親親之道焉有賓主之道焉有君臣之道焉三者並行所謂至文也後世君臣之際尊卑相臨親親之道喪而君臣之恩乖賓主之道喪而君臣之禮廢恩禮交亡所恃者薄而専從事於法矣九州之長入天子之國曰牧天子同姓謂之叔父異姓謂之叔舅於外曰侯於其國曰君正義鄭氏康成曰每一州之中天子選諸侯之賢者以為之牧也孔疏選取賢侯一人牧加一命使主一州為周禮曰乃施典於邦國而建其牧牧尊於大國之君而謂之叔父辟二伯也亦以此為尊禮或損之而益謂此類也二王之後不為牧外自其國之外九州之中曰侯者本爵也孔氏頴達曰殷曰伯此曰牧據周禮也若入天子之國則自稱曰牧牧養也言其養一州之人周禮八命作牧是也伯不言入天子之國者伯不出故不言入耳此不云擯於天子者記者略之也自稱曰侯若與國內臣民言猶自稱為君也案為牧者必侯故他國稱曰侯其本爵各君其國故其臣民稱之皆曰君亦非自稱也朱氏申曰九州之長九州各有其長也通論吕氏大臨曰牧者九州諸侯之長也各有所封之國所謂其國者所封之國也於外者非所封之國也曰公曰侯者以爵稱臣民之辭也曰君者以事稱父與舅以姓同異而别也伯與叔以位尊卑而别也必謂之父與舅尊之親之之辭也覲禮曰同姓大國則曰伯父其異姓則曰伯舅同姓小邦則曰叔父其異姓則曰叔舅則天子所以待天下諸侯大國之禮視三公小邦之禮視九牧也黃氏震曰叔父叔舅次於內之伯也案郊特牲云天子無客禮又曰諸侯不敢祖天子故雖同體屬在昆弟之稱者一以同姓異姓始封之稱稱之曰伯父叔父曰伯舅叔舅而於同姓國之卿大夫但稱伯氏叔氏不稱父於異姓國之卿但稱舅氏不稱伯叔明殺也此正前所謂朝諸侯分職授政任功曰豫一人之義存疑孔氏頴達曰二王之後不為牧者以其先祖常為天子統領海內恐為牧有専權之心案此以私心度先王也二王之後始皆公不以公為牧尊之也王會稱夏公殷公杞後自降侯伯耳其在東夷北狄西戎南蠻雖大曰子於內自稱曰不榖於外自稱曰王老正義鄭氏康成曰謂九州之外長也天子亦選其諸侯之賢者以為之子子猶牧也入天子之國曰子天子亦謂之子雖有侯伯之地本爵亦不過子是以同名曰子不榖與民言之謙辭榖善也稱王老威逺國也外亦其戎狄之中孔氏頴達曰選賢者為子不知幾國立一人卑不得名為牧又不得謂為父舅其本爵不過子男若本爵是男亦謂為子舉其髙者言之也或有多功益土雖加侯伯之地而爵不得進終守子男以卑逺故也不言入天子國不云擯略之四夷之君去王逺由有歸往之義賢始得為長故以王老為稱也通論陳氏祥道曰治六鄉以天子六卿治九州以諸侯九牧以強其幹九州之外疆域雖大爵不過子小者入天子國止曰人以弱其枝葉氏夢得曰四海之外先王所主者略故曰外薄四海咸建五長使之自長其類而已夷蠻戎狄能自養其類則皆通曰子子言其道足以養人此吳楚雖大亦稱子也存異陸氏佃曰公羊傳曰名不若字字不若子庶方小侯入天子之國曰某人於外曰子自稱曰孤正義鄭氏康成曰謂戎狄子男君也男者於外亦曰子舉尊言之孔氏頴達曰庶衆也小侯四夷之君非為牧者也以其賤故曰衆方也若入王國自稱曰某人若牟人介人也六服之內但舉伯之與牧不顯其餘諸侯九州之外既舉大國之子又舉其餘小國者以六服諸侯下文别更具顯方氏慤曰庶方小侯亦九州之外也以其非長故曰庶方以其非大故曰小雖大不過子而小乃謂之侯者蓋五等之爵通謂之諸侯入天子之國則曰某人則不以其爵稱且賤而略之也於外曰子則稱之以爵矣以入內則屈出外則伸故也小侯亦有男特舉子以槩之耳於外曰子而不言自稱則人稱之故也自稱曰孤而不曰內外則通內外可知通論吕氏大臨曰自稱曰孤又下於王老也春秋楚子稱不榖從其稱也齊桓公對楚屈完稱不榖以自卑之辭答楚也魯弔宋災宋閔公稱孤傳曰列國有凶稱孤禮也亦自貶之稱也辨正黃氏震曰葉氏以小侯為附庸恐非蓋附庸不自達於天子亦無子男之爵總論邵氏囦曰五官致貢曰享以下至此皆因其人而定其所稱之名蓋名正則言順言順則事成聖人所以汲汲於此者非較輕重於一言一字之間也天子當依而立諸侯北靣而見天子曰覲天子當寧而立諸公東靣諸侯西靣曰朝依本作扆同於豈反見賢遍反寧徐珍吕反正義鄭氏康成曰諸侯春見曰朝受贄於朝受享於廟生氣文也秋見曰覲一受之於廟殺氣質也朝者位於內朝而序進孔疏此內朝即路門外朝對皋門內三槐九棘之外朝故稱內也若對路寢又為外故文王世子云朝於外朝則以官是也諸侯入廟門更服朝服執贄入應門而行禮故王當寧以待諸侯次第而進故曰序進覲者位於廟門外而序入孔疏其宿受位次在廟門外至上擯進之乃於位次第而入故云序入也王南靣立於依寧而受焉孔疏當依當寧王皆南靣也夏宗依春冬遇依秋孔疏隂陽同各相依也覲禮今存朝宗遇禮亡孔氏頴達曰此論諸侯四時朝覲宗遇之法依狀如屏風以絳為質髙八尺東西當户牖之間繡為斧文亦曰斧依故覲禮云天子設斧依於户牖之間鄭注如今綈素屏風有繡斧文所以示威也爾雅云户牖之間謂之扆設依於廟堂户牖之間當依而立是秋於廟受覲禮也諸侯來朝至近郊王使大行人皮辨用璧迎勞諸侯亦皮辨從使者入受舍聽命朝之日廟門外同姓西靣北上異姓東靣北上質明諸侯裨冕先釋幣於齊車之行主天子衮冕在廟當依前南靣而立不迎賓諸侯自廟門外位天子使上擯進諸侯諸侯入廟門右坐奠圭玉而再拜所以奠圭玉者卑見於尊奠贄不授也擯者命升西階親授諸侯於是坐取圭玉升堂王受玉是當依而立之時也王既受玉諸侯降階並北靣再拜稽首擯者延之使升成拜是北靣曰覲所以同北靣者覲遇秋冬隂殺之時其氣質斂故并於一處受之不布散也當寧而立此為春夏受朝時也寧者爾雅云門屛之間謂之寧屛在路門外近應門郭注云人君視朝所寧立處王既立寧諸侯次第而進諸公在西諸侯在東而朝王陽氣文舒而布散故分於兩處也地道尊右故諸公在西受朝竟然後入廟受享也項氏安世曰朝以行禮覲以獻功行禮則異等威辨儀物盛朝會之禮以示衆庶故君於外而立臣分班而見也獻功則南靣而聽治北靣致之故受之於內而一其向也朝者正禮之名覲主於見而已案天子巡守之明歲侯服來朝二歲甸服來三歲男服來四歲采服來五歲衛服來六歲要服來此諸侯述職之事不期而自來者也春朝而圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮時會以發四方之禁殷同以施天下之政此天子有命諸侯乃來者也其諸侯之自來者大約東諸侯多於春南諸侯多於夏西秋北冬也周分九服而朝止六服者邦畿之內諸侯即公卿無論任六官者朝夕在廷即無官者亦時有事焉不可以歲計也外諸侯至衛服已曰賓不享其贄矣至要服則來不拒去不追故周官曰六服又曰五服也今周禮盡亡所存止覲禮一篇恐亦不可専指秋覲通論吕氏大臨曰自此至曰盟言朝覲會同聘問盟誓之所以名也古者謂相見曰朝相問曰聘臣見於君子見於親賤見於貴皆謂之朝以朝暮别之則朝見曰朝暮見曰夕以春秋别之則春見曰朝秋見曰覲然考之舜典二月東巡守肆覲東后則春亦曰覲蓋朝覲互名至周始以春秋别之又有夏宗冬遇以備四時之朝又曰春朝以圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮則四者非獨時異事亦異矣此章天子之立有當依當寧之别其朝位有諸侯北靣及諸公東靣諸侯西靣之别則朝覲之禮非獨事異儀亦異矣陳氏祥道曰古者門皆有屏天子設之於外諸侯設之於內禮臺門而旅樹旅道也當道而設屏此外門之屏也治朝在路門之外天子當寧而立寧在門屏之間此路門之屏也國語曰王背屏而立夫人向屏此寢門內之屏也魯廟疏屏天子之廟飾此廟門之屏也月令天子田獵整設於屏外此田獵之屏也案諸侯分東西靣立以通姓名謂之朝既朝天子乃入廟受覲蓋廟在應門之外雉門之內舊説庫門之內小誤覲禮諸侯前朝受舍於朝注謂舍在文王廟外即此地也是朝亦兼覲覲亦兼朝特春以朝為重秋以覲為重耳若屏之制有築土為之者郭璞所謂小牆當門中即今照牆此不可移徙者也有刻木為之者鄭氏謂刻為雲氣蟲獸孔謂今之罘罳即今應棚此可移徙有事設之無事去之者如田獵之屏亦是也若越王將入吳背屏而立以訣夫人夫人向屏以送王即諸侯路寢門之內屏陳分路門寢門為二亦小誤存異陳氏祥道曰周禮司几筵凡大朝覲王位設黼依依前南鄉覲禮天子衮冕負斧依明堂位天子負斧依南鄉而立則天子於朝覲未嘗有當寧之禮司士正朝儀之位王南鄉三公北靣孤東靣卿大夫西靣朝士掌建邦外朝之法左九棘孤卿大夫位焉右九棘公侯伯子男位焉靣三槐三公位焉明堂位三公北靣諸侯西靣諸伯東靣諸子東北靣諸男西北靣射人掌羣臣見王之位諸侯北靣焉則諸侯之於朝覲未嘗有北靣之禮記之所言非周制也案陳據司几筵及覲禮説謂朝覲未嘗當寧似矣但天子當寧以待諸侯之至故路門之外外屏之內謂之寧寧待也及諸侯至則出外屏之外負扆以受朝則周禮儀禮説為受朝之位此記為待諸侯之位此注特依文為訓故未及依耳不應執一説為定論也至所引明堂位子男皆北靣射人諸侯又北靣覲禮亦數言北靣胡謂諸侯未嘗北靣而以記為非周制耶諸侯未及期相見曰遇相見於郤地曰會諸侯使大夫問於諸侯曰聘約信曰誓涖牲曰盟郤丘逆反正義鄭氏康成曰及至也郤間也涖臨也坎用牲臨而讀其盟書孔疏盟之為法先鑿地為方坎殺牲於坎上割牲左耳盛以珠槃又取血盛以玉敦用血為盟書成乃歃血而讀書知坎血加書者見僖二十五年左傳又襄二十六年欿用牲加書是也知用耳者戎右云贊牛耳知用左者以馘用左耳也知珠槃玉敦者戎右以玉敦辟盟又玉府共珠槃玉敦是也知口歃血者襄九年左傳云新與楚盟口血未乾是也戎右云贊牛耳又左傳云諸侯盟誰執牛耳然則人君盟當以牛也聘禮今存遇會誓盟禮亡誓之辭尚書見有六篇孔疏六篇甘誓湯誓泰誓牧誓費誓秦誓孔氏頴達曰未至前所期之日及所期之地而忽相見則並用遇禮相接故曰遇謂禮易略也既及期又至所期之地則其禮間暇故曰會聘問也謂遣大夫往相存問若用言約束以相見則用誓禮約言語之約束也以不能自和好用言辭共相約束以為信故曰誓若約束而臨牲則用盟禮盟者殺牲歃血誓於神也誓與盟亦諸侯事通論吕氏大臨曰會遇聘問誓盟皆諸侯之禮也古者諸侯無事則相朝不相朝則相會不相會則聘有大事則天子方伯誓之皆所以講信修睦以交四鄰者也盟詛之事其起於衰世乎周官雖有司盟之官疑非治世之事此詩所以非屢盟春秋之書盟所以多譏也時有緩遽則儀有詳略故會禮詳而遇禮略也問有大小則文有隆殺故諸侯使大夫問於諸侯曰聘小聘曰問也誓有輕重則約有淺深故誓約之淺盟約之深也期而相見曰會日有期地有所也郤地者竟上之地也其時緩則禮宜詳也不期而相見曰遇如邂逅適相遇然日無期地無所其時遽則宜略也公羊傳齊景公之唁魯昭公以人為災以幦為席以鞍為几以遇禮相見遇禮非皆然也其略有如此者久無事曰聘聘大禮也小聘曰問禮有殺也約信曰誓古者舉大事以齊衆皆有誓舜征有苖禹誓于師啓伐有扈以誓于師湯誓泰誓費誓秦誓皆有書周官則祭祀師役莫不誓也辨正方氏慤曰遇者見而非約故未及期相見曰遇而與周官冬見之遇異矣會者衆之所聚故相見於郤地曰會而與周官時見之會異矣聘言有所與故使大夫問曰聘而與王制比年之聘異矣蓋冬見之遇時見之會比年之聘諸侯之所以事天子也未及期之遇與郤地之會使大夫之聘諸侯之所以交鄰國也此其所以為異諸侯見天子曰臣某侯某其與民言自稱曰寡人正義鄭氏康成曰臣某侯某嗇夫承命告天子辭也孔疏並覲禮文嗇夫司空屬為末擯承命於侯氏末介傳而上上擯以告於天子也音義隱云嗇夫主諸侯所齎幣帛皮圭之禮奉以白於天子也自稱曰寡人謙也於臣亦然孔氏頴達曰自此至寡君之老明諸侯及臣稱謂之法諸侯謂五等諸侯見天子而擯者將命之辭某侯某若言齊侯衛侯下某是名若伯子男則云曹伯許男某也方氏慤曰某侯所以别其國也繼某侯而又曰某所以别其人也存疑鄭氏康成曰其為州牧則曰天子之老臣某侯某孔疏州牧既尊擯者加天子之老四字案此當在九州之長節下統説中國諸侯在州牧之下者前明言五官之長曰伯擯於天子曰天子之吏自稱於諸侯曰天子之老牧卑於伯豈有擯於天子反稱天子之老者鄭孔並誤其在凶服曰適子孤臨祭祀內事曰孝子某侯某外事曰曽孫某侯某適音的正義鄭氏康成曰凶服亦謂未除喪祭祀稱國者逺辟天子孔疏天子外事言嗣王某謂能繼天德而立也諸侯不得稱嗣侯但稱曽孫謂是祖父重孫耳方氏慤曰適子孤者以幼而無父自稱之也然亦或稱嗣子某故前言大夫士之子不敢自稱曰嗣子某也天子於內事曰孝王則以國所尊者稱之也諸侯於內事曰孝子則以家所卑者稱之也案諸侯之子必誓於天子乃稱世子而嗣位則以子繼世者恆多故曰孝子某侯某祭義曰祭稱孝子孝孫以其義稱也諸侯亦有非子而嗣位者如桓之繼隱僖之繼閔先君之主亦必入於考廟則不稱孝子故遷廟禮但曰孝嗣侯某敢用嘉幣告於皇考某侯蓋考者成也成其為君與成其為父同且祫則上臨之以太祖亦不得私其所親而諸侯亦未必世世父子相繼故諸侯五廟亦不以父祖曽髙名之也祭義曰稱曽孫某謂國家也為今之守此土猶以祖之功德故武王伐紂告所過名山大川曰有道曽孫大田甫田諸詩祭方社田祖皆曰曽孫者天子之卿大夫有采地視諸侯也通論孔氏頴達曰適子孤者擯者告賓之辭雜記云相告曰孤某須矣彼不云適子此不云名皆文不具也稱孤稱名者皆謂父死未葬之前故雜記云孤某須矣下則云有葦席既葬蒲席明孤某是未葬也凡諸侯在喪之稱公羊未葬稱子某者莊三十二年子般卒襄三十一年子野卒是也既葬稱子者文公十八年子惡卒經書子卒是也踰年稱君者則僖公十年里克殺其君卓及文公元年公即位是踰年稱君謂臣子稱君也若其君自稱猶曰子故公羊傳文九年諸侯於其封內三年稱子是也案昭十一年楚滅蔡執世子有其時蔡君已死仍稱世子者何休云不許楚之滅蔡猶若君存然文十四年齊商人弒其君舍成舍為君正商人之弒也襄二十九年吳子使季札來聘先君未踰年吳稱子者賢季子故録之桓十一年鄭忽出奔衛先君既葬而尚稱名者何休云直以喪降稱名無餘罪致貶凡以王事出會未踰年皆稱子僖九年會於葵丘宋襄公稱子僖二十八年會於踐土陳共公稱子定四年會召陵陳懷公稱子皆未踰年會王事而稱子也若未踰年非王事而稱爵者皆譏耳成四年鄭伯伐許是也以上皆公羊之義也其左氏之義君薨未葬未行即位之禮前稱子某子般子野是也其出會諸侯未葬之前稱子故僖九年左氏傳云凡在喪王曰小童公侯曰子葵丘之會宋襄公稱子踐土之會陳共公稱子是也葬雖未踰年則稱君則晉里克弒其君卓齊商人弒其君舍是也文十八年子惡卒先君葬後稱子者杜預云時史畏襄仲不敢稱君故云子也其王事出會則稱爵成四年鄭伯伐許是也案桓十三年經書衛惠公稱侯成十三年經書宋公衛侯此並先君未葬而稱爵者賈服注譏其不稱子杜預云非禮也僖二十五年會衛子莒慶盟於洮時先君已葬衛成公猶稱子者杜預云善其成父之志故上繫於父而稱子服虔亦云明不失子道成十年晉侯伐鄭時厲公父景公患未薨而厲公出會稱爵譏其生代父位不子也此皆左氏之義公羊以奚齊僖九年死卓子十年死以卓子踰年故稱君左氏卓子亦九年死但赴告在十年以葬後故稱君左氏公羊二傳不同也公羊以成四年鄭伯伐許非王事未踰年而稱爵譏之也左氏則以鄭伯伐許為王事雖未踰年得稱爵當與公羊異鄭駁異義從公羊義以鄭伯伐許為非禮及公羊未踰年為王事皆稱子即宋襄公稱子陳共公稱子是也左氏未踰年為王事皆稱爵鄭駁異義引宋襄公稱子從公羊説以為稱子禮也存疑孔氏頴達曰外事謂社稷山川在封內者也案外神五祀之類皆是不但社稷山川死曰薨復曰某甫復矣既葬見天子曰類見言諡曰類正義鄭氏康成曰死曰薨亦史書策辭孔疏若異國史書之則但云卒若告於諸侯則辭當謙退故雜記曰寡君不祿某甫且字孔疏天子曰天子復諸侯不可云諸侯復故且以字曰某甫也既葬見天子曰類代父受國類猶象也執皮帛象諸侯之禮見也孔疏春秋之義三年除喪之後乃見而今云既葬者謂天子巡守至竟亦得見故未執玉帛但執皮帛象諸侯也若未葬未正君臣故雖天子巡守亦不見言諡者序其行及諡所宜使大夫行象聘問之禮也孔疏諡以表德必由尊者所裁故將葬之前使人請於天子若檀弓云其子戍請諡於君曰日月有時將葬矣請所以易其名者是也請諡使大夫不得曰聘而曰類言此類聘問之禮而行也其禮俱亡王氏肅曰請諡必以其實為諡類於平生之行也何氏胤曰類其德而稱之如經天緯地曰文也存疑陳氏祥道曰夏后氏殯而致事殷人既葬而致事周人卒哭而致事凡以全父子至恩而已然有父子之至恩亦必有君臣之至義以至恩廢至義君子之所不敢春秋之時晉襄公既祥將伐衛先且居曰效尤禍也請朝王臣從師且居以在喪而不朝王為尤則在喪而朝王其為禮可知也方其朝王也其禮蓋下於先君以皮帛繼子男之君其服蓋皆吉服特不免絰而已以皮帛繼子男以周禮典命推之可知也吉服以書之顧命天子麻冕推之可知也不免絰以記之服問推之可知也類者象也有事於上帝而非事天之常禮曰類於上帝有事於社稷宗廟而非祭享之常禮曰類於社稷宗廟則嗣君之朝王大夫之言諡非朝聘之常禮謂之類宜矣吕氏大臨曰赴於諸侯則曰寡君不祿謙辭某甫字也復稱字與卿大夫士異矣臣不名君也不稱爵與天子異矣有所降也諸侯使人使於諸侯使者自稱曰寡君之老使色吏反正義鄭氏康成曰繫於君以為尊也此謂諸侯之卿上大夫孔氏頴達曰玉藻云上大夫曰下臣擯者曰寡君之老下大夫自名擯者曰寡大夫此云自稱曰寡君之老則上大夫擯者傳辭及自稱於他國亦曰寡君之老稱於已君則玉藻云下臣某吕氏大臨曰三公自稱於諸侯曰天子之老諸侯之卿自稱於諸侯曰寡君之老士大夫家宰亦曰老老長稱也自稱天子之老寡君之老比於家臣之長亦謙辭也陳氏澔曰寡君之老惟上大夫可稱天子穆穆諸侯皇皇大夫濟濟士蹌蹌庶人僬僬濟子禮反蹌本又作鶬或作鏘同七良反僬子妙反正義鄭氏康成曰皆行容止之貌也聘禮曰賓入門皇孔疏引以證皇是容儀又曰皇且行孔疏又證皇是行時儀容又曰衆介北靣鏘鏘焉案今本作蹌焉凡行容尊者體盤卑者體蹙孔氏頴達曰此論天子至庶人行容之貌穆穆威儀多也皇皇莊盛也濟濟徐行有節蹌蹌者容貌舒揚僬僬卑盡之貌庶人無容儀並自直行而已通論吕氏大臨曰北幽曰穆則穆穆者雍容深厚之貌孔子曰濟濟者容也逺也則濟濟者修飾齊一之貌書曰笙鏞以間鳥獸蹌蹌則蹌蹌者翔舉舒揚之貌僬僬雖無可考大抵庶人趨走促數不為容止之貌也尊者容重卑者容輕尊者容舒卑者容遽濟濟之齊一不如皇皇之莊盛皇皇之莊盛不如穆穆之深厚則知尊者重且舒也濟濟之修飾不為蹌蹌之舒揚蹌蹌之舒揚不為僬僬之促數則知卑者輕且遽也崔氏靈恩曰凡容下不得兼上上得兼下故詩有濟濟文王其言穆穆魯侯者詩人頌美舉盛以言陳氏祥道曰詩曰穆穆魯侯則穆穆不特天子而已聘禮曰賓入門皇又曰皇且行則皇皇不特諸侯而已書曰濟濟有衆則濟濟不特大夫而已言語之美穆穆皇皇朝廷之美濟濟翔翔則天子至士亦莫不然蓋其儀各有所當非一端也天子之妃曰后諸侯曰夫人大夫曰孺人士曰婦人庶人曰妻妃芳非反正義鄭氏康成曰后之言後也夫之言扶孺之言屬婦之言服妻之言齊孔氏頴達曰自此至曰某一節論天子以下妃妾及臣子稱謂之法妃配也諸侯以下通有妃義故以妃字冠之特牲少牢是大夫士禮皆云某妃配某氏尊卑通稱也后君也明配至尊為海內小君天下尊之故繼其王言之曰王后也夫人之名惟諸侯得稱論語云邦君之妻邦人稱之曰君夫人是也孺言其為親屬婦言服事其夫婦號亦上下通稱故春秋逆婦薑於齊是諸侯亦呼婦也榖梁傳云言婦有姑之辭服事舅姑故通名婦庶人賤無别稱判合齊體而已通言之則上下通曰妻詩曰刑于寡妻是天子亦曰妻也吕氏大臨曰天子之妻所以稱后者有繼後之辭合二姓之好以繼聖人之後以為天地社稷宗廟之主則有繼者也夫人帥人之稱也夫人帥其嬪婦以事君故諸侯之妃曰夫人若邦人稱之則曰君夫人言君之夫人也大夫曰孺人士曰婦人喪大記卿之妻曰內子春秋傳趙盾以叔隗為內子是也大夫妻曰世婦士則止曰士之妻而已未聞有孺人婦人之稱況婦人者已嫁之達稱非特士妻之名或古有之考於經傳未之有也庶人曰妻妻者貴賤同稱貴者尚文故其名異賤者尚質無所改也劉氏彝曰后者後也德配於天子育其嗣息以為之後也周南之序曰關雎后妃之德也所以風天下而正夫婦也然則樂得淑女者其德也螽斯不妬忌者其行也無思犯禮者其化也躬儉憂勤者其志也故能風天下而正夫婦也公侯有夫人有世婦有妻有妾夫人自稱於天子曰老婦自稱於諸侯曰寡小君自稱於其君曰小童自世婦以下自稱曰婢子子於父母則自名也此上脫前天子有后一簡正義鄭氏康成曰公侯貶於天子無后與嬪去上中也自稱於天子謂畿內諸侯之夫人助祭若時事見也自稱於諸侯謂饗來朝諸侯之時也孔疏畿內諸侯之夫人助祭於后得接見天子故得自稱老婦言老而服事也時事見謂若獻繭之屬畿外諸侯夫人無見天子之禮小童若示未成人也子名父母所為也言子通男女孔氏頴達曰言公侯舉其上者餘從可知下於天子不得立后故以敵體一人正者為夫人自稱於諸侯謂他國君也君之妻曰小君而云寡者從君謙也其與夫言自謙稱為小童言無所知也世婦以下降於夫人故並自稱婢子謙也通論吕氏大臨曰自稱於天子曰老婦婦事舅姑者也諸侯事天子猶子事父則夫人必稱婦也寡小君臣下稱諸異邦之辭猶稱其君為寡君也小童之稱不見於經傳秦夫人告秦伯曰晉君朝以入則婢子夕以死雖夫人亦稱婢子自貶而就下也子之名父母所命敬親之命不敢有他稱也存疑鄭氏康成曰婢之言卑也於其君稱此以接見體敵嫌其當也孔疏接見之時暫有體敵嫌若當夫人然孔氏頴達曰古者諸侯相饗夫人亦出故得自稱坊記云陽侯殺繆侯竊其夫人故大饗廢夫人之禮知前有夫人饗法也存異孔氏頴達曰世婦者謂夫人之姪娣其數二人妻謂二媵及姪娣也凡六人妾者謂六人之外别有其妾知者以上文云天子八十一御妻之外更有妾鄭注云妾賤者不入百二十人數也案諸侯之夫人必命於天子子男之妻則命為世婦然於其國統曰夫人優之也猶諸侯於國皆曰君死皆曰公也孔謂夫人之姪娣稱世婦何據乎至謂二媵及娣姪六人為妻尤繆論語曰邦君之妻君稱之曰夫人可稱此六人皆曰夫人乎何以二媵之娣姪皆稱夫人而適夫人娣姪稱世婦乎蓋孔亦知諸侯一娶九女天子不過十二女而必附鄭氏八十一御妻之説謂諸侯六御妻也夫天子諸侯之降殺如天子六卿諸侯三卿天子六宫諸侯三宫一殺七十五御妻何説耶又案論語稱諸異邦曰寡小君則此自稱於諸侯亦必擯使將命之辭非必與他國君口稱必以相饗實之亦泥公侯之妻命為夫人見天子則自稱老婦伯子男妻命為世婦見天子則自稱婢子禮之等也鄭氏以體敵嫌其當又從御妻妻字生義豈有御女而與君體敵者列國之大夫入天子之國曰某士自稱曰陪臣某於外曰子於其國曰寡君之老使者自稱曰某使色吏反正義鄭氏康成曰列國大夫亦謂諸侯之卿也三命以下於天子為士陪重也使者謂使人於諸侯也某名也孔氏頴達曰某士擯者辭也列國五等諸侯也天子上士三命中士再命下士一命五等之臣唯公國一孤四命耳自卿大夫從三命而下其命等於王之士故入天子之國則擯者稱為某國之士也陪臣者其君已為王臣已今又為巳君之臣故自稱對王曰重臣也通論鄭氏康成曰某士者若晉韓起聘於周擯者曰晉士起是也子有德之稱魯春秋曰齊髙子來盟孔氏頴達曰於外曰子亦擯者辭外謂在他國時也擯者則稱其姓而曰子若此卿為使在他國與彼君語則稱名知者玉藻上下大夫於他國擯皆無稱名之事玉藻又云大夫私事使私人擯則稱名注云私事使謂以君命私行非聘也若晉韓穿來言汶陽之田彼以私事使故稱名與此相當故知使謂使人於諸侯也吕氏大臨曰此言諸侯大夫之異稱也曰某士某者國名也自稱曰陪臣如管仲平戎於王云陪臣敢辭是也胡氏銓曰老謂老成人也王朝則有國老五官之長曰天子之老是也諸侯則有卿老國君不名卿老及此是也卿大夫則有家老語云趙魏老是也存疑吕氏大臨曰臣子與異邦稱其君曰寡君故自稱寡君之老此云於其邦者蒙於外之辭亦謂異邦也方氏慤曰使者自稱曰某則特名之也以其為陪臣之使故所稱如此若夫為諸侯之使則亦曰寡君之老案已上所載諸稱謂有見於他經他傳者有經傳别無正文者或異或同或合或否皆由傳聞異辭各記所見以理推之可矣不必強為之説天子不言出諸侯不生名君子不親惡諸侯失地名滅同姓名正義鄭氏康成曰天子之言出諸侯之生名皆有大惡君子所逺出名以絶之春秋傳曰天王出居於鄭衛侯朔入於衛是也孔疏僖二十四年襄王出居於鄭公羊傳曰不能乎母謂不能以孝事母也莊六年衛侯朔入于衛公羊傳曰犯命也謂朔未為君時與母讒搆世子伋及為君被逐出奔齊王立公子黔牟朔自齊入逐黔牟是犯王命失地滅同姓名亦絶之孔氏頴達曰此論天子諸侯有罪書出名之事天子以天下為家不得言出諸侯南靣之尊不可稱名君子謂策書君子若孔子書經見天子諸侯大惡書出書名以絶之君子不親此惡人故書以罪之也皆據公羊傳義失地名若春秋莊十年荆敗蔡師於莘以蔡侯獻舞歸是也滅同姓名若僖二十五年衛侯燬滅邢是也吕氏大臨曰天子無外安得而言出然而言出者德不足以君天下而位號存焉耳天下之逹尊者皆敬之而不名故或稱爵或稱字貴之也非此族則名之賤之也故古之諸侯不生名惟死而告終然後名之然有生名者德不足以君一國而位號存焉耳故失地名滅同姓名皆以小人待之也方氏慤曰凡此皆謂史之所書也諸侯言其所以名之惡天子不言所以出之惡者至尊不敢斥也陳氏澔曰諸侯義莫大於保國仁莫大於親親不能保國而至於失地不能親親而至於滅同姓其名之也宜矣通論陳氏祥道曰春秋書天王居於某地者二而不言出諸侯失地而奔者十五滅同姓者三而有不生名者或出居而事有異同或失地滅同姓而罪有輕重故也存疑胡氏銓曰春秋衛侯燬名是時天王居鄭衛侯不顧天王在難而滅邢故生名之諸侯出奔為失地名者罪之然文公十二年郕伯奔不名别有指春秋晉滅虢滅虞齊滅紀楚滅夔是皆滅同姓皆不名則衛燬之名非因滅同姓欽定禮記義疏卷七
