body:
  text: 喪服小記第十五之一正義孔氏穎達曰案鄭目錄云喪服小記者以其記喪服之小義也此於别錄屬喪服朱子曰儀禮喪服子夏作傳小記是解傳中之曲折吳氏澄曰喪服正經之後有記蓋以補經文之所不備此篇内所記喪服一章又以補喪服經後記之所未備者也其事瑣碎故名小記以别於經後之記記喪服一章外又廣記喪禮雜事亦皆瑣碎比喪大記之所記則爲小也小記亦猶雜記小記所記之事小雜記所記之事雜喪大記之所記視二篇則爲大也但雜記中記喪服者鮮故承喪大記之後止稱雜記此篇記喪服者詳故以喪服二字冠小記之上而名篇通論方氏慤曰哀之本在心及發於聲音而見於衣服者乃其末耳此篇則以服爲主故以服爲言且謂之小記至於大記則所主不特在服故不曰服而謂之大記斬衰括髮以麻爲母括髮以麻免而以布齊衰惡筓以終喪衰七雷反下並同括古活反爲于僞反免音汶齊音咨下並同筓古兮反正義鄭氏康成曰母服輕至免可以布代麻也爲母又哭而免孔疏又哭小斂拜賓後卽堂下位哭踊時筓所以卷髮帶所以持身也婦人質於喪所以自卷持者有除無變孔疏婦人要絰及筓不須更易服竟方除孔氏穎達曰自此至則髽一節論斬衰齊衰之喪男女括髮免髽之異斬衰者主人爲父之服也括髮者爲父未成服之前所服也禮親始死子布深衣去冠而有筓縰徒跣扱上衽至將小斂著素冠視斂斂訖投冠而括髮括髮者以麻自項以前交於額上卻繞紒如著幓頭焉爲母初喪至小斂後括髮與父禮同故亦云括髮以麻也免而以布此謂爲母與父異者小斂後至尸出堂子拜賓時猶與爲父不異至拜賓後子往卽堂下之位時則異也若爲父此時猶括髮而踊襲絰帶以至大斂而成服若母䘮於此時則不復括髮乃著布免踊而襲絰帶以至成服也惡筓榛木爲筓也陸氏佃曰士喪禮主人髻髪袒衆主人免於房婦人髽於室則袒括髪一人而已諸子皆免朱子曰括髮是束髮爲髻儀禮注疏以男子括髮與免及婦人髽皆云如著幓頭所謂㡎頭卽如今之掠頭編子自項而前交於額上卻繞髻也案束髮者蓋括髮則去纚故又束之黄氏乾行曰爲父爲母括髮皆以麻恩同故也爲母則小斂後免而以布殺於父家無二尊故也通論黄氏幹曰括髮免髽乃小斂至大斂未成服之制又有變禮括髮免髽者奔喪是也有啓殯見棺柩之變同小斂之時者旣夕禮丈夫髽㪚帶垂是也大要不出此三節而免之用爲尤廣蓋喪禮未成服以前莫重於袒括髮檀弓曰袒括髮去飾之甚也括髮以麻免以布又曰免不冠者之所服則免之禮稍殺於括髮也是故小斂爲父括髮而至於成服爲母則卽位之後不括髮而爲免小斂有括髮有免及啓殯則雖斬衰亦免而無括髮以至卒哭不唯此也自斬至緦皆有免五世無服者亦袒免童子當室免朋友在他邦亦袒免君弔雖不當免時亦免是免之用爲尤廣也方氏慤曰衰凶服名也其制當心曰衰當背曰負左右曰辟其别如此而通謂之衰者以哀雖見於衣服其本在心故也存疑孔氏穎達曰將小斂去筓縰吕氏大臨曰免以布爲卷幘以約四垂短髮而露其紒於冠禮謂之缺項冠者必先著此缺項而後加冠故古者有罪免冠而缺項存因謂之免音免以其與冕弁之冕其音相亂故改音問程氏大昌曰只是解除吉冠並無他物彭氏汝礪曰斬衰下脫箭筓終喪三年一句案問喪親始死筓縰注云二日乃去筓縰括髮士喪禮括髮在小斂畢後尸出户之前孔謂在將小斂時者悞又案士喪禮注云免之制未聞杜氏佑云舊說以爲如冠狀廣一寸自額却交於項中幷其末覆紒而前綴連之成冠象孔謂以麻自項中向前交於額上卻繞紒爲括髮免亦然但用布不用麻士冠禮缺項注則云圍髮際結項中隅爲四綴以固冠項中有􅕒亦由固頍爲之先著冠乃加缺項無免冠而缺項存者吕說非是若但解除吉冠則筓纚矣程說尤非也彭氏據齊衰惡筓之文謂斬衰下亦當有箭筓說是也然特意度之辭耳乃竟以脫言之則武斷矣況以齊衰惡筓準之亦當在括髮以麻之下胡云斬衰下耶男子冠而婦人筓男子免而婦人髽其義爲男子則免爲婦人則髽冠古亂反下同髽側巴反正義鄭氏康成曰别男女也孔氏穎達曰此明男子婦人冠筓髽免相對之節吉時男子首有吉冠則女子首有吉筓若親始死則男去冠女去筓若成服爲父男則六升布爲冠女則箭篠爲筓爲母男則七升布爲冠女則榛木爲筓若遭齊衰之喪首飾亦别當襲斂之節男子著免婦人著髽也髽有多種有麻有布有露紒男子括髮先去冠縰用麻婦人亦去筓縰用麻其形如一男子爲母免時免用布則婦人布髽又成服後男或對賓踊免則婦人自布髽對之三年喪内男不恒免則婦不恒布髽恒露紒此是皇氏說今考校止有二髽一是斬衰麻髽一是齊衰布髽皆名露紒庾蔚云喪服往往寄異以明義或疑免髽亦有别義故解之云其義獨以别男女而已賀瑒云男去冠猶婦人去筓無復别義也方氏慤曰男子所以冒首者謂之冠婦人所以貫髮者謂之筓此特言其吉而已及凶而變焉男子則去冠而免婦人則去筓而髽也蓋有冠則首服去冠則免有筓則髮立去筓則髽若夫男子成服則亦有冠焉所謂厭冠是也婦人成服則亦有筓焉所謂惡筓是也通論黃氏幹曰襄公四年臧紇救鄫侵邾敗於狐駘國人逆喪者皆髽魯於是乎始髽注髽麻髮合結也遭喪者多故不能備凶服髽而已疏曰髽之形制禮無明文先世儒者各以意說鄭衆以爲枲麻與髮相半結之馬融以爲屈布爲之高四寸著於顙上鄭康成以為去纚而紒案檀弓記稱爾母從從爾爾母扈扈爾鄭注云從從謂大高扈扈謂大廣若布高四寸則有定制何必慮其從從扈扈而誨之哉如鄭康成云去纚而空露其紒則髮上本無服矣喪服女子在室爲父髽衰三年空露紒髮安得與衰共文而謂之髽衰也魯人逆喪皆髽豈直露紒迎喪哉凶服以麻表髽字從髟是髪之服也杜以鄭衆爲長故用其說言麻髮合結亦當麻髮半也案皇以麻髽布髽露紒爲三孔謂麻布二髽皆露紒蓋髽者髮髻卑挫之名吉時其髻有纚以纚爲髻之梁髻高而冠亦高去纚則髻卑而冠亦卑故喪冠曰厭冠也親始死男子去冠則露筓纚至小斂訖去纚則髻露斬衰者以麻齊衰者以布掠髮之四垂者而束之名以麻者曰括髮以布者曰免以為父母隆殺之別婦人之髽亦去纚斬衰用麻齊衰用布大約與男子同特異其名曰髽以為男女之別耳至既殯成服後則男子著冠婦人加筓總然去纚猶如故男子冠之内用麻與布約其㪚髮故崔謂於括髮上加冠婦人加總束髮故曰布總箭筓髽衰三年此居恆之髽不用麻不用布而用筓也三者不同故皇分爲三然總之露紒故孔以麻與布爲二也其不髽者自初喪即不去纚矣秃者不髽以無髮之可露故不去纚優之以掩其疾也苴杖竹也削杖桐也苴七余反削思畧反正義杜氏預曰削員削之孔氏穎達曰苴者黯也至痛内結必形色外章心如斬斫故貌必蒼苴所以衰裳絰杖俱備苴色也必用竹者以其體圓性貞履四時不改明子爲父有終身之痛故斷而用之也削者殺也必用桐者明外雖被削而心本同也且桐隨時凋落此謂母喪示外被削殺服從時除終身之心與父同也賈氏公彦曰父者子之天竹圓亦象天削桐使方者取母象於地彭氏絲曰此記下云絰殺五分而去一杖大如絰謂斬衰首絰九寸要絰殺於首五分去一計七寸五分寸之一苴杖之大亦如之齊衰首絰七寸五分寸之一要絰殺於首五分去一計五寸二十五分寸之十九削杖之大亦如之案扶老之杖本上末下惟喪杖皆下本竹取幹桐取枝枝近幹處必粗而難使故下必四削之四削之則近方矣杜謂員削之以全體言賈據變除禮謂削之使方指近地處耳古人用木如棘之言吉桑之言喪則桐之言同見同於父猶稱妣見比於父也祖父卒而后爲祖母後者三年正義鄭氏康成曰祖父在則其服如父在為母也孔氏穎達曰祖父卒者謂適孫無父而爲祖後祖父已卒今又遭祖母喪故云爲祖母後也如父卒爲母三年若祖父卒時父在已雖爲祖期今父沒祖母亡時已亦爲祖母三年也徐氏師曾曰若庶孫則爲祖父母皆期總論孔氏穎達曰此論適孫承重之服爲父母長子稽顙大夫弔之雖緦必稽顙婦人爲夫與長子稽顙其餘則否爲于僞反長竹丈反稽音啓顙素黨反正義鄭氏康成曰爲父母長子稽顙喪尊者及正體不敢不盡禮也雖緦必稽顙尊大夫不敢以輕待之也其餘否恩殺於父母也孔氏穎達曰此論喪合稽顙之事重服先稽顙而後拜父母長子並重其餘期以下先拜後稽顙此謂平等來弔若大夫弔士雖是緦麻之親亦必先稽顙而後拜也婦人爲夫與長子亦先稽顙而後拜其餘謂父母以受重他族故恩殺於父母案雖緦必稽顙謂死者無主而疏服之士主其喪也上言男子爲父母長子稽顙下言婦人爲夫長子稽顙故鄭以父母不稽顙釋其餘所指甚明但女主必使異姓則女子在室亦無爲主拜賔之禮稽顙自無所用之亦不待既嫁而後恩殺於父母也男主必使同姓婦主必使異姓正義鄭氏康成曰謂爲無主後者爲主也異姓同宗之婦也孔疏同宗謂與喪家同宗其婦必與喪家異姓也婦人外成孔疏與死者同姓之婦人不得爲喪主以婦人適於他族不得自與己同宗爲主也此云異姓者與夫家爲異姓庾氏蔚之曰喪有男主以接男賓女主以接女賓若父母之喪則適子爲男主適婦爲女主今或無適子適婦遣他人攝主若攝男主必使喪家同姓之男婦主必使喪家異姓之女案使異姓謂使宗婦不使宗女也若無女主則男主拜女賓於寢門内爲父後者爲出母無服爲出母爲于僞反正義鄭氏康成曰不敢以己私廢父所傳重之祭祀孔疏母子至親義不可絶父若猶在子皆爲出母期若父沒後則適子一人係嗣烝嘗不敢以私親廢先祖之祀故不復爲出母服孔氏穎達曰出母謂母犯七出爲父所遣親親以三爲五以五爲九上殺下殺旁殺而親畢矣正義鄭氏康成曰己上親父下親子三也以父親祖以子親孫五也孔疏已上親父下親子合云以一爲三而云以三爲五者父子一體無可分之義又以父上親祖以子下親孫故言五也以祖親高祖以孫親𤣥孫九也孔疏以祖親曾祖以孫親曾孫應云以五為七而言九者由祖以親曾高二祖由孫以親曾𤣥二孫爲情已逺故畧其相親之旨惟云九也殺謂親益疏者服之則輕孔氏穎達曰此廣明五服輕重之節上殺者服父三年祖殺至期應曾祖大功高祖小功但其恩已疏故從齊衰三月所以喪服注云重其衰麻尊尊也減其日月恩殺也不可以大功小功旁親之服加至尊故皆服齊衰也下殺者子服父三年父亦宜報而父子首足不宜等衰故父服子期若正適傳重則三年不降孫卑不得祖報故祖爲孫大功若傳重則亦期也爲孫大功則曾孫宜五月但曾孫服曾祖齊衰三月故曾祖報亦一時而曾祖正尊自加齊衰曾孫正卑正服緦麻也曾孫既三月𤣥孫理不容異故服同三月旁殺者據祖期斷則世叔宜九月而世叔是父一體故加至期從世叔既疏加所不及據期而殺是以五月族世叔又疏故緦麻此外無服是發父而旁漸至輕也祖是父一體故加至期祖之兄弟非己一體加亦不及便正五月族祖又疏故緦麻此外無服是發祖而旁殺也曾祖據期本應五月曾祖之兄弟爲族曾祖既疏一等故宜三月此外及高祖之兄弟悉無服矣又據兄弟一體相爲期同堂兄弟九月從祖兄弟小功族昆弟三月此外無服是發兄弟而旁殺也父爲子期兄弟之子宜九月而兄弟之子爲世叔加期世叔旁尊無義可降故報兄弟子期且兄弟之子不宜隔異與己子等所以至期同堂兄弟之子服從伯叔無加則從伯叔亦正報五月族兄弟之子又疏故宜緦耳此發子而旁殺也孫服祖期祖尊故爲孫大功兄弟之孫服從祖五月故從祖報之小功同堂兄弟之孫爲緦麻其外無服矣曾祖爲曾孫三月爲兄弟曾孫以無等降之故亦爲三月始自父母終於族人故云親畢矣且五屬之親若同父則期同祖則大功同曾祖則小功同髙祖則緦高祖外無服亦是畢也方氏慤曰曰上殺者逺近之殺也曰下殺者尊卑之殺也曰旁殺者親疏之殺也近者隆而逺者殺尊者隆而卑者殺親愈上則愈殺於逺親愈下則愈殺於卑三殺既畢則九族之外也故曰而親畢矣徐氏師曽曰如此則尊祖父於上慈子孫於下友兄弟於旁而本宗之親盡矣辨正陳氏祥道曰書與詩序皆言九族特周禮小宗伯儀禮士昏禮記仲尼燕居特言三族者三族父子孫也九族高祖至𤣥孫也三族舉其本九族極其末舉三族則九族見矣白虎通夏侯歐陽何琦如淳之徒以父族四母族三妻族二爲九族其說蓋以詩頍弁刺幽王不親九族而言兄弟舅甥角弓刺不親九族而言兄弟昏姻則所謂九族者非特内宗而已是惡知詩人之所主者因内宗而發哉彼謂父族四者父之姓爲一族父女昆弟適人者子爲二族己女昆弟適人者子爲三族己女適人者子爲四族母族三者母之父母爲一族母之昆弟爲二族母之女昆弟爲三族妻族二者妻之父爲一族妻之母爲二族然於母之父母則合而爲一族妻之父母則離而爲二可乎爾雅於内宗皆曰族於母妻曰黨則九族之說當從孔安國鄭康成爲正通論李氏覯曰周官小宗伯掌三族之別以辨親疏書曰九族旣睦辨因其近故止於三睦舉其逺故至於九蓋六世則親族絶矣自己而上殺至於高祖則五世自已而下殺至於𤣥孫則五世自己而旁殺至於三從兄弟則五世故曰上殺下殺旁殺而親畢矣夫服者所以序其親者也孫為祖齊衰而祖為之大功兄弟之子爲世叔期而世叔父亦爲之期從兄弟之子爲從世叔小功五月而從世叔亦爲之五月族兄弟之子爲族世叔緦三月而族世叔亦爲之緦兄弟之孫爲從祖五月而從祖亦爲之小功從兄弟之孫爲曾祖之兄弟三月而曽祖兄弟亦爲之緦兄弟則期從兄弟則大功從祖兄弟則相爲小功此經而等也子爲父三年而父爲之期孫爲祖期而祖爲之大功曾孫𤣥孫爲曾祖高祖齊衰三月而曾祖高祖亦爲之緦此順而殺也爲子期則爲兄弟之子當大功而亦期此引而進也有傳重者則父爲子三年祖爲孫期此輕而重也爲祖期爲曾祖當大功而乃爲之齊衰三月此重而輕也王者禘其祖之所自出以其祖配之而立四廟庶子王亦如之禘大計反正義鄭氏康成曰禘大祭也而立四廟者高祖己下與始祖而五也世子有廢疾不可立而庶子立春秋時衞侯元有兄縶孔疏引此證侯世子廢疾不可立也方氏慤曰王立七廟三昭三穆與太祖之廟而七此言王者止曰立四廟者據月祭之親廟言之也蓋逺廟爲祧有二祧享嘗乃止旣言禘其祖之所自出以其祖配之則祭及其二祧可知矣此所以不言之也陸氏佃曰庶子王亦如之今經言此者正爲庶子不祭庶子王然後祭耳通論吳氏澄曰舊本禮不王不禘四字別在一處劉氏曰此句當在王者禘其祖之所自出之上脫誤爾澄案如劉說則與大傳文同趙氏曰禘王者之大祭不王不禘眀諸侯不得有也儀禮喪服傳曰都邑之士則知尊禰矣大夫及學士則知尊祖矣諸侯及其太祖天子及其始祖之所自出朱子曰先王報本追逺之思莫深於禘長樂黄氏曰祀先之禮自禰而祖自祖而推之以及於始祖其禮已備而禘又推始祖之所自出而以其祖配之也夫報本追逺而至於及其始祖之所自出是其用意甚深而非淺近之思也存疑劉氏敞曰庶子王亦如之當承後文慈母與妾母不世祭也之下脫誤在前耳又曰而立四廟云天子立四廟亦非也此上有脫簡耳文當曰諸侯及其太祖而立四廟吳氏澄曰舊本而立四廟四字在上文以其祖配之之下無所係屬澄案大傳以其祖配之下有諸侯及其太祖六字劉氏所謂有缺文者是也言諸侯不得如天子之追禘太祖以上所祭上及其太祖而止爾而太祖之下則立二昭二穆之廟爲四祖廟也存異鄭氏康成曰始祖感天神靈而生祭天則以祖配之自外至者無主不止孔疏公羊傳文外至者天神主者人主也故祭以人祖配天神也陳氏祥道曰韋𤣥成曰王者禘其祖所自出以其祖配之而立四廟言始受命而王祭天以其祖配不爲立廟親盡也然則康成以禘爲祭天固不足信以立四廟爲始受命而王於理或然蓋始受命者不必備事七世故立四廟止於高祖而已庶子王亦如之者庶子爲王雖有正統之七廟其可輙廢祖考之祭乎於是自立四廟以視始受命而王者所以著其不忘本也昔漢宣帝以從孫繼昭帝患昭穆之體一也於是立悼皇考廟以當一代之穆而劉歆以爲孝宣以兄孫繼統爲孝昭後考廟固不當立累世奉之是兩統二父也然宣帝以悼皇考當一代之穆固不合禮若特立廟乃庶子王之所當立者謂不當立誤矣案始受命之君未有不爲太祖立廟者祭法虞夏祖顓頊商周祖嚳豈有名之為祖而無廟祀之禮且陳氏既知康成禘爲祭天之説之非矣則其禘也豈猶是郊壇之祀故先儒以爲禘於始祖之廟耳而可謂始祖無廟耶至記所謂庶子王者鄭以君之庶子言其說是也陳求四廟之說而不得乃以藩邸入繼別立親廟言之是漢之悼宋之濮明之興獻所以見譏於古今也且據儀禮喪服傳支子可以爲人後疏云適子當家自爲宗蓋支子既出後大宗其本生廟祀自有小宗適子承之何必庶子别爲之廟是當以鄭説爲是又案劉氏謂當承慈母與妾母不世祭也之下豈有爲妾立四廟者且母妾則子庶固不必言矣別子爲祖繼别爲宗繼禰者爲小宗有五世而遷之宗其繼高祖者也禰乃禮反正義鄭氏康成曰别子者諸侯之庶子孔疏諸侯適子之弟别於正適故爲别子别爲後世爲始祖也孔疏此别子子孫爲卿大夫立此别子爲始祖謂之别子者公子不得禰先君孔疏若世子不立則庶子公子有禰先君之義繼别者别子之世長子爲其族人爲宗所謂百世不遷之宗也繼禰者别子庶子之長子爲其昆弟爲宗也謂之小宗者以其将遷也五世而遷即小宗也小宗有四或繼高祖孔疏與三從兄弟爲宗或繼曾祖孔疏與再從兄弟爲宗或繼祖孔疏與同堂兄弟爲宗或繼禰孔疏與親兄弟爲宗皆至五世則遷孔疏繼高祖者至於五世不復與四世從兄弟爲宗五世則遷各隨近相宗孔氏穎達曰五世者爲上從高祖下至𤣥孫之子此𤣥孫之子則合遷徙不得與族人爲宗故云有五世則遷之宗此五世則遷實是繼高祖者之子記文畧唯云繼高祖若繼高祖之身未滿五世猶爲宗也一身凡事四宗事親兄弟之適是繼禰小宗也事同堂兄弟之適是繼祖小宗也事再從兄弟之適是繼曾祖小宗也事三從兄弟之適是繼高祖小宗也兼大宗爲五則小宗所繼非一獨云繼禰者小宗雖四初皆繼禰爲始據初爲元故也陳氏澔曰别子有三一是諸侯適子之弟别於正室二是異姓公子來自他國别於本國不來者三是庶姓之起於是邦爲卿大夫而别於不仕者皆稱别子也案别子以别於正適而名若異姓崛起有何不别而立此名乎但其例可相通耳存疑張子曰宗子繼别爲宗言别則非一也如别子五人五人各爲大宗所謂兄弟宗之者謂别子之子繼禰者之兄弟宗其小宗子也案别子爲祖自别子言之故曰祖祖者尊之也繼别爲宗自别子之子言之故曰宗宗者親之也繼禰曰小宗則繼别者爲大宗可知矣小宗五世而遷則大宗不遷可知矣若原其初而論之繼别亦即繼禰以其世奉别子爲族人大宗不得以高曾祖禰限之故特曰繼别也張子别子非一說似是而實非據大傳公子有小宗無大宗諸説則止一别子爲大宗兄弟皆宗之不得别爲小宗惟無適昆弟則立庶昆弟爲小宗總論孔氏穎達曰自此至大宗一節並論尊祖敬宗之義是故祖遷於上宗易於下尊祖故敬宗敬宗所以尊祖禰也正義鄭氏康成曰宗者祖禰之正體孔氏穎達曰四世之時尚事髙祖至五世之時謂高祖之父不爲加服是祖遷於上四世之時仍宗三從族人至五世不復宗四從族人各自隨近爲宗是宗易於下方氏慤曰先儒疏祖遷於上宗易於下特五世則遷之小宗爾若夫百世不遷之大宗則祖未嘗遷而宗未嘗易焉遷有升之之意故於在上者言之易有去之之意故於在下者言之吳氏澄曰敬繼祖之宗所以尊其爲祖之正體敬繼禰之宗所以尊其爲禰之正體上但言尊祖不言禰者舉尊以包卑祖者兼高曾二祖通言三祖也案此章與大傳畧同而用意各别大傳重在繼别之大宗上百世不遷者宗别子之所自出故百世而昏姻不通此重在繼禰之小宗上五世則遷者自禰而起極高而遷故殤與無後者從祖祔食一推之至極逺一引之至最親各就其文玩之斯得矣庶子不祭祖者明其宗也庶子不爲長子斬不繼祖與禰故也爲于僞反正義鄭氏康成曰眀其尊宗以爲本也禰則不祭矣孔疏子名對父若父庶即不得祭父何假言祖故云禰則不祭言不祭祖者主爲宗子庶子俱爲適士得立祖禰廟者也孔疏適士得立二廟自禰及祖而已是祖庶雖爲適士得自立禰廟不得立祖廟祭之案祭祖唯宗子主之凡庶子皆不得祭鄭注獨舉得立二廟之適士言者嫌得立廟即可自祭也下不祭禰注士得立一廟之說亦然與曾子問大夫祭於宗子之家義參觀可矣凡正體在乎上者謂下正猶爲庶也孔疏正體謂祖之適也下正謂禰之適也雖正爲禰適而於祖猶爲庶故禰適謂之爲庶也五宗悉然不爲長子斬尊先祖之正體不二其統也言不繼祖禰則長子不必五世孔疏馬季長云五世之適父乃爲之斬鄭是馬弟子不欲相非故但言不必庾氏云不繼祖不斬是父適二世承重則得爲長子三年矣孔氏穎達曰此尊宗之義庶適俱是人子並宜共養而適子烝嘗庶子獨不祭者正是推本崇適明有所宗故也喪服明父適爲長子斬此明父是庶子故不得爲長子斬互相明也鄭注喪服爲父後者然後爲長子三年盖禮有適子者無適孫父在則已未成適未成適不得重長重長必父沒後也然己身雖是祖庶而是父適則應立廟立廟則己長子傳重當祭而不爲斬者以是祖庶不敢服且其父在自供祭也禮爲後者有四條皆不爲斬有體而不正庶子爲後是也有正而不體適孫爲後是也有傳重而非正體庶孫爲後是也有正體而不傳重適子有廢疾不立是也四者皆期惟正體又傳重者乃極服耳賈氏公彥曰適妻所生皆名適子第一子死則取適妻所生第二子者立之亦名長子若言適子惟據第一者若云長子通立適以長故也徐氏師曾曰庶子非繼祖之宗不得祭祖明繼祖之宗有所在也言祖則自祖而上可推矣庶子不得爲長子服斬衰三年者以己非繼祖繼禰之宗則長子亦非正統故輕之也餘論朱子語類或問周制有大宗之禮乃有立適之義立適以爲後故父爲長子權其重者若然今大宗之禮廢無立適之法而子各得以爲後則長子少子當爲不異庶子不得爲長子三年者不必然也父爲長子三年者亦不可以適庶論也朱子曰宗子雖未能立然服制自當從古是亦愛禮存羊之意辨正張子曰此以服言不以祭言故又發此條應氏鏞曰長子斬衰之事重故先言不祭祖又言不繼祖禰以明之以統傳於祖而源流逺也注所言適士下士之說雖於禮法曲盡其詳然立言初意恐不在是案先儒著說畧有數端戴聖聞人通漢馬融輩主五世之適五世之適是繼高祖之宗也賀循虞喜庾蔚之孔穎達賈公彥輩主四世之適四世之適是繼曾祖之宗也經明云庶子不云庶子之子明云繼祖不云繼祖之祖父所謂五世四世之適豈經義乎譙周曰不繼祖與禰者謂庶子身不繼禰故長子爲不繼祖劉智釋疑曰父之重長子以其當為禰後也其所繼者於父則禰於子則祖也衆說之中無踰此二說者盖自長子言之為不繼祖自庶子言之為不繼禰也庶子非繼禰之宗故不敢以承己之重而為之極服耳禮家妄移不繼祖之文加之庶子此其所以誤也至敖繼公引殤小功章而謂庶子不得爲長子三年記文為誤今按禮經此條專主庶子而爲長子三年惟當以繼禰之宗為斷繼禰而不遂服是禰其祖而不知有父也不繼禰而遂服是不忍其子而不知有父也禮之設豈以訓無父者哉然則五世四世庶子之云者非經義決矣庶子不祭殤與無後者殤與無後者從祖祔食殤音傷祔音附正義鄭氏康成曰不祭殤者父之庶也孔疏謂己是父之庶子所生之適子爲殤而死者不得自祭之以己是父庶不合立父廟故也殤尚不祭成人無後不祭可知祖庶之殤則自祭之孔疏己於祖爲庶故謂己子爲祖庶之殤己是父適得立父廟故自祭殤於父廟也凡所祭殤者惟適子耳此與無後者當從祖祔食而已不祭祖無所食之也共其牲物而宗子主其禮焉孔氏穎達曰殤者未成人而死者也無後謂成人未昏或已娶無子而死者又曰此與曾子問中義同語異餘論張子曰無後者必祭借如有伯祖至孫而絶則伯祖不得言無後盖有子也夫祭者必是正統相承然後祭禮正有所統屬今既宗法不正無縁得祭禮正且須參酌古今順人情而爲之如士當一廟而設三世則是禰廟而設祖位與曾祖位也有人又有伯祖與伯祖之子者當如何爲祭伯祖則當自與祖為列從父則當自與父為列茍不如此使死者有知以人情言之必不安使死者無知己妄有去取則己不是不如求中於義理為善然禮於親疏逺近則自有繁簡或月祭之或享嘗乃止故拜朔之禮施於三世伯祖之祭止可施於享嘗平日藏主位版於櫝中至時祭則取而祫之其位則自如尊卑且無逆祀之禮若又設於他所則似不得祫祭皆人情所不安存疑鄭氏康成曰不祭無後者祖之庶也孔疏己是祖庶不合立祖廟故兄弟無後者不得祭之己若曾祖之庶亦不得祭諸父無後者諸父無後當於曾祖之廟而祭此不云曾祖言祖兼之也無後者謂昆弟諸父也宗子之諸父無後者為墠祭之孔疏宗子是士唯有祖禰二廟無曾祖廟故諸父無後者為墠祭之若宗子為大夫得立曾祖廟則祭於曾祖廟不於墠也案疏以殤與無後俱庶子之子其説極是蓋他人之子他人自主之庶子不特不當祭亦不必祭也祔食必以昭穆鄭注以不祭無後為祖之庶以己之昆弟當祔食於祖也然無後者祖庶固不得祭父庶亦何嘗得祭不可僅以祖庶為斷也且據其説以無後者為祖庶之昆弟諸父夫祖庶之昆弟當祔食於祖其祭也主祖廟之祭者當自主之諸父祔曾祖廟廟亦自有主之者何必辨祭不祭於祖庶若宗子之諸父應祔於宗子之曾祖宗子即不主曾祖之祭豈遂無主曾祖廟祭者墠壇之說本於祭法言適士顯考無廟不言皇考無廟大傳言大夫士干祫及高祖則常祭及曾祖可知朱子謂高曾有服不可不祭且孔疏謂官師一廟祭二世則安見大夫三廟不可祭四世耶庶子不祭禰者明其宗也正義鄭氏康成曰謂宗子庶子俱為下士得立禰廟也孔疏此文云不祭禰惟有禰廟故注云宗子庶子俱為下士若庶子是下士宗子是庶人此下士立廟於宗子之家庶子共其牲物宗子主其禮庶人亦然孔疏雖庶人是有祭義若宗子為下士是宗子自祭庶子不得祭也孔氏穎達曰禰適故得立禰廟故祭禰禰庶不得立禰廟故不得祭禰明其有所宗既無禰廟故不得祭子殤也吳氏澄曰此庶子父庶也謂别子之庶孫繼别大宗之從子繼禰小宗之親弟也有親兄為繼禰小宗故不敢祭禰者以明其所宗者禰之正體通論朱子曰凡文字有一兩本參對則義理自明如禮記中喪服小記喪服大傳都是解注儀禮喪服小記云庶子不祭禰明其宗也又曰庶子不祭祖明其宗也注謂不祭禰者父之庶子不祭祖者其父為庶子說的繁碎大傳只說庶子不祭則祖禰皆在其中矣案經義總為不祭殤與無後者而發孔氏云既無禰廟故不得祭殤當更云無禰廟亦不得祭子無後者親親尊尊長長男女之有别人道之大者也長竹丈反別彼列反正義鄭氏康成曰言服之所以為隆殺吳氏澄曰言服之隆殺盖以結上親親三五九之意也孔氏穎達曰尊尊謂祖及曾祖高祖也長長謂兄及旁親也舉尊長則卑幼可知男女有别若為父斬為母齊姑姊妹在室期出嫁大功為夫斬為妻期之屬此人閒道理最大者也存疑孔氏穎達曰親親謂父母也辨正吳氏澄曰親親之三五九以一家所親之親合爲一而言也此條之親親在尊尊長長男女有别之先以一家所親之親分為四而言也親親謂親而非尊非長者大傳謂之下治子孫此章所謂下殺之親正子孫之服與從族旁親之子孫也尊尊謂親而又尊者大傳謂之上治祖禰此章所謂上殺之親正父祖與從族旁尊之父祖也長長謂親而又長者言長則兼幼矣大傳謂之旁治昆弟此章所謂旁殺之親正昆弟與從族旁長旁幼之昆弟也男女之有别謂他姓之女來為本姓婦本姓之女往為他姓婦者是謂内治夫婦之親大傳之服屬所謂名服出入服也孔疏所釋親親尊尊之服未當故特據大傳上治下治旁治之說以定尊親長之服焉案此節當是大傳周道然也下脫簡男女有别之義大傳詳之所謂叔嫂之無服推而逺之也從服者所從亡則已屬從者所從雖没也服妾從女君而出則不爲女君之子服已音以爲于僞反正義鄭氏康成曰所從亡則已謂若為君母之父母昆弟也所從雖沒也服謂若自為己之母黨也妾為女君之黨服得與女君同而今俱出女君猶為子期妾於義絶無施服孔氏穎達曰從服有六其一是徒從徒空也於彼非親屬空從此而服彼所從既亡則止而不服已止也屬者骨血連續以為親也雖沒猶從之服其親也妾從而出謂姪娣從女君而入若女君犯七出則姪娣亦從而出也方氏慤曰從服即大傳所謂徒從屬從即大傳所謂屬從徒從不若屬從之為重也通論孔氏穎達曰徒從有四一是妾為女君之黨二是子從母服於母之君母三是妾子為君母之黨四是臣從君而服君之黨就此四徒之中而一徒所從雖亡猶服如女君雖沒妾猶服女君之黨其餘三徒所從亡則已謂君母死則妾子不復服君母之黨及母亡則子不復服母之君母又君亡則臣不復服君黨親也其中又有妾攝女君爲女君黨案為字上疑脫不字各有義故也鄭注畧舉一隅耳屬從三一是子從母服母之黨二是妻從夫服夫之黨三是夫從妻服妻之黨鄭注亦舉一隅也案服君之黨疑不可謂之徒從如君之父母君雖不在新君當承重則從新君而服之矣若小君則本應服長子則便爲新君皆非徒從也唯妻從夫而服夫之君夫亡似可不從耳此皆為士言之若大夫則母黨妻黨皆無服大夫之子父在亦不服禮不王不禘正義孔氏穎達曰此經上下論服制記者亂錄不禘之事厠在其閒陸氏佃曰此文宜在王者禘其祖之所自出以其祖配之之上世子不降妻之父母其爲妻也與大夫之適子同爲于僞反正義鄭氏康成曰世子天子諸侯之適子也不降妻之父母為妻故親之也為妻亦齊衰不杖者君為之主子不得伸也言與大夫適子同據服之成文孔疏喪服齊衰不杖條大夫適子爲妻孔氏穎達曰世子既不降妻之父母其為妻亦不降與大夫之適子爲妻同也應氏鏞曰天子諸侯降其妻之父母而世子上不敢擬於尊者儲副韜潛而未有君道也大夫之子為其妻齊衰不杖期而世子下不敢異於卑者家國雖異而敬父則均也故服不降者非厚於外黨也自處於卑而致其謙焉耳服不杖者非薄於伉儷也厭於所尊而避其私焉耳凡以君父在焉而不敢失臣子之禮也通論孔氏穎達曰喪服唯言大夫適子者若舉世子為妻嫌大夫以下有降若舉士子為妻士既職卑本無降理大夫是尊降之首恐其為適婦而降故特顯之案大夫無緦服故大夫不為妻父母服大夫之子以父厭降於兄弟大功於從父昆弟庶孫小功皆降一等不知於妻父母降否世子於旁親昆弟姊妹皆不服以為君所厭也妻父母獨不降者服問有從有服而無服公子為其妻之父母不言世子是公子皆無服而世子不降獨有服也豈以世子之妻將從宗廟社稷之事不降其妻故并不降其父母乎父爲士子爲天子諸侯則祭以天子諸侯其尸服以士服父爲天子諸侯子爲士祭以士其尸服以士服正義鄭氏康成曰祭以天子諸侯養以子道也尸服士服父本無爵不敢以己爵加之嫌於卑之也為王者後及所立為諸侯祀其先君以禮卒者尸服天子諸侯之服如遂無所封立則尸也祭也皆如士不敢僭用尊者衣物方氏慤曰言天子諸侯士之祭其别如此則王制所謂祭從生者也與中庸所言亦同父為士其尸服以士服者則與喪從死者同義陳氏澔曰以天子諸侯之禮祭其父之為士者其禮伸故尸服死者之服為禮之正以士之禮祭其父之為天子諸侯者其禮屈故尸服生者之服為禮之變禮有曲而殺者此類是也通論孔氏穎達曰尸服士服謂𤣥端若君之先祖為士大夫則服助祭之服故曾子問云尸弁冕而出是為君尸有著弁者有著冕者若為先君士尸則著爵弁若為先君大夫尸則著𤣥冕是也若大夫士之尸則服家祭之服𤣥端是也應氏鏞曰古之為天子者皆積累世徳而致之未有一旦崛起而在尊位也其失天下者必有大惡自絶於天人之心否則未有不賴前哲以免也故徳必若舜禹而後自匹夫驟興惡必若桀紂而後忽降於匹夫若諸侯與士之進退升黜雖或有之而亦已鮮矣自周秦以降而後興替之不常貴賤之殊絶比比有之此論其所祭所服者固亦當時所絶無而僅有然先王制禮以該括古今之變而方來之人情事物不能違焉所以百世以俟聖人而不惑也案士服三𤣥端也皮弁也爵弁也天子皮弁以視朝𤣥端以居諸侯𤣥端以視朝則尸即服士服原不失為天子諸侯之舊其服原遺衣服所有也若衮冕鷩冕豈可於士廟服之存疑鄭氏康成曰天子之子當封為王者後以祀其受命之祖云為士則不必封其子擇其宗之賢若微子者其尸服以士服謂父以罪誅不成為君也孔疏鄭知父以罪誅以尸服士服故也以其嘗為天子諸侯不可以庶人禮待之士是爵之最卑故服其士服案三代以上未有天子主祀之適子而為士者若諸侯失國則往往有之如周公滅國五十春秋兼幷史不絶書其子或降而為士亦事所或有但其父雖失國而嘗為諸侯準之中庸葬以大夫之例則其尸當服諸侯之服而以士服服之者蓋中庸所謂大夫特指為大夫而死者言若大夫遭貶謫以死則仍不得葬以大夫王制所謂大夫廢其事終身不仕死則以士禮葬之是也春秋諸侯失國名貶也貶則失國之諸侯與廢事之大夫等廢事之大夫可以士禮葬則失國之諸侯胡不當以士服服其尸此雖孝子仁人亦有不得不為法屈者由此言之則記者特為諸侯言耳言諸侯而又兼及天子者因上言天子故連類及之非謂天子之子果有為士者也鄭謂封王者後必擇其宗之賢若微子者而不必封其子其亦思武王有武庚之封否耶婦當喪而出則除之爲父母喪未練而出則三年既練而出則已未練而反則期既練而反則遂之爲于僞反正義鄭氏康成曰當喪當舅姑之喪也出除喪絶族也孔氏穎達曰此明婦人遭喪出入之節婦正當舅姑之服被夫遣出恩情既離故出即除服也女出嫁為父母期若父母喪未小祥被夫遣歸值兄弟之小祥則隨兄弟服三年之受已絶夫族故其情隆於父母也若父母喪已小祥而女被遣其期服已除今歸雖在三年内則止不更反服以兄弟小祥之後無服變節故女遂止也已止也未練而反謂先有父母喪為夫所出今喪猶未小祥而夫命已反則還夫家至小祥而除是依期服也既練而反則遂之者若被遣還家已隨兄弟小祥服三年之受而夫命之反則猶遂三年乃除隨兄弟故也方氏慤曰女出嫁則恩隆於夫家被出則恩復隆於父母得反則恩復隆於夫家既練而反則服不可中道而除故遂其三年再期之喪三年也期之喪二年也九月七月之喪三時也五月之喪二時也三月之喪一時也故期而祭禮也期而除喪道也祭不爲除喪也正義鄭氏康成曰三年至一時言喪之節應嵗時之氣也期而祭謂練祭也禮正月存親孔疏莊元年公羊𫝊文親亡至今而期期則宜祭期天道一變哀惻之情益衰衰則宜除不相為也孔疏祭為存親除喪為天道之變兩事雖同一時不相為也故云祭不為除喪孔氏穎達曰此眀遭喪時節降除之義孝子喪親嵗序改易隨時傷感故一期而為練祭是孝子存親之心於禮當然故云禮也親終一期而除說其喪天道當然故云道也此除喪謂練時除喪也男子除首絰女子除要帶與小祥祭同時若至大祥除喪大祥祭亦同日不相為又曰祭為存親幽隱難知除喪事顯其理易識恐人疑祭之爲除喪而祭故記者特眀之云祭不為除喪也然祭雖不為除喪除喪與祭同時總而言之練祭祥祭亦名除喪故下文云三年而後葬者必再祭其祭之閒不同時而除喪又云除成喪者朝服縞冠是練祥之祭總名除喪陳氏澔曰儀禮大功章有中殤七月之文即此七月之喪也吳氏澄曰再期一期九月七月五月三月者喪節之隆殺也三年二年三時二時一時者氣運之久近也隆殺在人久近在天故祭以存親亦以盡乎人之禮除喪以順變亦以從乎天之道人禮之當盡者無有窮已天道之當從者不得不然也徐氏師曾曰再期斬衰也期齊衰也九月七月大功也五月小功也三月緦麻也期以上以年計功緦以時計服之隆殺有此五等凡取義於人情天道而已舉一期則再期可知舉一年則其餘可知案祭不為除喪記者恐哀戚之情衰而徒以除喪畢此祭也故為此言鄭氏以存親釋祭以哀衰釋除服明其不相為然親喪外除外除則服除而内固有不除者在也三年而後葬者必再祭其祭之閒不同時而除喪正義鄭氏康成曰再祭練祥也孔疏下文大功再祭朋友虞祔知再祭非虞祔也閒不同時者當異月也既祔明月練而祭又明月祥而祭必異月者以葬與練祥本異嵗宜異時也而除喪己祥則除不禫孔疏以記直云必再祭故知不禫禫者本為思念情深不忍頓除故有禫也今既三年始葬哀情己極故不禫也孔氏穎達曰此謂身有事故不得及時而葬故三年後始葬既三年未葬尸柩尚存雖當練祥之月不可除親服故三年葬後必為此練祥不可同一時而祭當前月練後月祥故云不同時於練祥之時而除喪謂練時男子除首絰婦人除要帶祥時除衰杖也方氏慤曰未葬則雖期未可練再期未可祥必待葬畢而為之故曰再祭必有漸焉故不可同時也徐氏師曾曰此言後期而葬之禮既不以過時而廢禮又不以一蹴而殺哀禮之盡情之至也馬氏睎孟曰祭不為除喪而除喪者必因祭焉以祭為吉而除喪者所以從吉也夫練祥之時既已過矣而猶為之再祭以存親之禮不可廢也其祭之閒不同時者以其存親之節不可忘也祭不同乎時而除喪者亦不同乎時則除喪必從祭也可知矣案禫之見於經傳者多矣未有不遵鄭注以為祭名者士虞記中月而禫雜記期之喪十五月而禫閒傳中月而禫禫而飲醴酒又云禫而牀禫而纖喪大記禫而從御吉祭而復寢又云祥而外無哭者禫而内無哭者樂作矣故也檀弓是月禫徙月樂又云孟獻子禫縣而不樂比御而不入小記云為父母妻長子禫庶子在父之室則為其母不禫宗子母在為妻禫王肅難鄭但據檀弓是月禫句難其二十七月為禫之說未聞以禫為除服難其禫為祭名如戴侗所云者小記云祭不為除喪孔疏祭雖不為除喪除喪與祭同時練祭祥祭總名除喪則禫祭亦名除喪可知檜風素冠傳云据玉藻縞冠素紕既祥之冠也祥則冠之禫則除之除謂除祥冠也祥冠至禫月而除却無不祭而除之理且禫而飲醴禫而牀禫而從御豈有禫止除服居然不祭而飲醴從御之禮劉公瑾恪遵鄭注未或非之顧炎武以禫為終喪之祭考證甚明三虞練祥之祭各有祝辭唯禫不具文畧耳此記孔疏謂三年始葬哀情己極故不禫若葬在三年以前則練祥在祭外其必禫祭以終喪可知禫祭𤣥冠朝服既祭綅冠素端黄裳終月鄭据閒𫝊及大戴變除禮文侗謂毫無可據殆勿深考耳變除禮云禫祭𤣥冠黃裳疏謂既著𤣥衣應著𤣥冠則是禫祭𤣥冠矣黄裳者未大吉也以大吉當𤣥衣素裳今用黃裳故云未大吉變除禮又云禫訖朝服綅冠疏以祥祭後乃著大祥素縞麻衣故知禫祭後亦著朝服綅冠也綅與纖同皆黑經白緯閒傳云禫而纖無所不佩鄭注據舊說云纖冠者采纓也禫祭時𤣥冠朝服禫祭訖首著纖冠身著素端黄裳鄭之考證章章明矣禫字說文韻會集韻廣韻並從示只以士虞記文期而小祥又期而大祥中月而禫一氣說下並從示則知練祥為祭禫亦祭名何疑其改示從衣本正字通耳此書頗蹖駁不足憑大功者主人之喪有三年者則必為之再祭朋友虞祔而已爲于僞反正義鄭氏康成曰謂死者之從父昆弟來為喪主孔疏謂死者無近親有三年者謂妻若子幼少孔疏未能為主大功為之再祭孔疏練祥則小功緦麻為之練祭可也孔氏穎達曰朋友疏於大功不能為練祥但為之虞祔而已然則大功尚為練祥則虞祔亦為之可知親重者為之逺祭親輕者為之近祭故大功為之練祥小功緦麻為之練朋友但虞祔而已通論孔氏穎達曰皇氏云死者有三年之親大功主者為之練祥死者有期親則大功主者爲之至練若死者但有大功則大功主者至期小功緦麻至祔若又無則各依服月數而止故雜記云凡主兄弟之喪雖疏亦虞之謂無三年及期者也田氏瓊曰劉徳議問朋友虞祔謂主幼而為虞祔也若都無主族神不歆非類當為虞祔否答曰虞安神也祔以死者祔於祖也朋友恩舊歡愛固當安之祔之然後義備但後日不常祭之耳餘論應氏鏞曰凡此皆為死者無主後而慮生者不能久其事故以親疏而為之節若盡送往撫孤之義則雖過於厚而無害也夫死生之相収䘏人道之當然今其身死而又妻子惸弱適無父母兄弟之至親也則大功當任其責而至於終喪或其適無小功之親也則朋友當任其責而至於逾葬使其不幸而無大功以為之依則小功以下其可以坐視乎又不幸而無朋友以為之助則為鄰者倘與之舊者其可以恝然乎是以體朋友死無所歸於我殯之義則練祥不必大功而親黨皆不得而辭推行有死人尚或墐之之心則凡相識者皆不得而拒特其情有厚薄則處之各不同耳士妾有子而爲之緦無子則已正義鄭氏康成曰士卑妾無男女則不服不别貴賤孔疏喪服傳大夫為貴妾緦是大夫貴妾無子猶服之也士妾無子則不服不殊别妾之貴賤也案喪服傳貴妾緦何以緦以其貴也鄭注謂此公士大夫之君賈疏貴妾姪娣也曲禮大夫不名長妾若士則娣姪不具是妾以娣姪為貴非娣姪則賤也生不及祖父母諸父昆弟而父稅喪已則否税他活反又他外反正義鄭氏康成曰謂子生於外者也父以他故居異邦而生己己不及此親存時歸見之今其死於喪服年月已過乃聞之父為之服已則否者不責非時之恩於人所不能也當其時則服稅讀如無禮則稅之稅孔疏僖三十三年左傳文稅喪者喪與服不相當之言孔疏以稅是不相當故知當其時則服全服也孔氏穎達曰王氏云昆弟謂諸父之昆弟存疑孔氏穎達曰王氏云己則否謂計己之生不及此親之存則不稅若此親未亡之前而已生則稅之也存異孔氏穎達曰鄭意謂父在本國先有此諸親後隨宦出遊他國更取而生子此子生不及歸見祖父以下諸親又年限已竟而始聞喪則父追服而子不追服若年限未竟追全服已在他國後生得本國有弟者或父又適他國更取所生也王謂此弟諸父之昆弟庾謂己謂昆則彼謂己弟不相稅服並非鄭義辨正淳于氏纂曰據降而緦小功者稅之盖正親而重骨肉也今父在則祖周父亡則三年此非重與若但以不見則割其至親之本愛而忍惻怛之痛使與諸父母昆弟同制尊祖之義於是疏矣又禮為慈母之父母無服亦云恩不能及恩不及者慈母之父母則可也今以他故生不見祖而以為非時之恩意實不厭案此一節以本服緦小功與降而在緦小功對王以諸父昆弟為諸父之昆弟得之盖祖父母昆弟謂伯叔祖父母也諸父昆弟謂從伯叔父母也禮祖伯叔父母小功從祖伯叔父母緦從伯叔父母小功再從緦從祖昆弟小功再從緦言此子從父在外而生子不識此緦小功之親今聞喪又在限外則父追服而己不服服本輕也若由期大功而降在緦小功者則雖不識亦在限外而必追服之服本重也惟本服在小功緦者不稅則本服在期大功者必稅明矣况祖父母正期至尊不降即諸父昆弟亦正期非天子諸侯無絶期者而可不稅乎或曰祖父母上落一從字亦通總論孔氏穎達曰自此至服巳一節明稅服之禮爲君之父母妻長子君已除喪而后聞喪則不稅正義鄭氏康成曰臣之恩輕也謂卿大夫出聘問以他故久留案如行人被執而後歸或出奔而君反之在喪限之後孔氏穎達曰臣出聘不在而君諸親喪臣後方聞之若君未除則從爲服之若君已除則臣不稅之案臣之服君黨從君故也君既除矣臣是以不稅無所從也降而在緦小功者則稅之正義鄭氏康成曰此句宜承父稅喪己則否謂正親在齊衰大功者正親緦小功不稅矣陳氏澔曰降者殺其正服也如叔父及適孫正服皆不杖期死在下殤則皆降服小功如庶孫之下殤以大功降而為緦也案陳原注此下尚有從祖昆弟之長殤降而為緦也十二字據記義盖為本齊衰大功之親降在緦及小功者言之若從祖昆弟正服小功禮本不稅何有於殤刪之近臣君服斯服矣其餘從而服不從而稅君雖未知喪臣服已正義鄭氏康成曰謂君出朝覲不時反而不知喪者近臣閽寺之屬也其餘羣介行人宰史也君雖未知喪臣服已從服者所從雖在外自若服也孔氏穎達曰此明賤臣從君出不時反國比反而君諸親喪君自稅之臣之卑近者則從君服之非稅義也其餘為臣之貴者若君親服限未除君既服之則亦從而服之若限已竟而君稅之不從君而稅也若君出而臣不隨君君之親於本國内喪君雖未知在國之臣即如尋常先著服嫌從君之未服臣不先服故特明之案臣不稅服以恩輕也近臣斯服以在君左右不可異於君然非為死者服故孔曰非稅義也欽定禮記義疏卷四十五
