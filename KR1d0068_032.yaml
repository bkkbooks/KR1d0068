body:
  text: 禮運第九之三故人者其天地之徳隂陽之交鬼神之會五行之秀氣也正義鄭氏康成曰言人兼此氣性純也孔疏天地之徳隂陽之交是氣鬼神之㑹五行之秀是性孔氏穎達曰此以下言人感天地鬼神而生聖人還因天地鬼神作其法則以化人所以人情萬物可知也天以覆為徳地以載為徳人感覆載而生是天地之徳也據其氣謂之隂陽據其形謂之天地獨陽不生獨隂不成二氣交乃生是隂陽之交鬼謂形體神謂精靈形體與精靈相㑹然後物生故曰鬼神之會秀謂秀異人感五行秀異之氣故有仁義禮知信張子曰天地之徳所謂天地之性人為貴也稟五行之氣以生最靈於萬物是其秀也神之言申鬼之言歸凡生即申也要終即歸也神之盛極於氣鬼之盛極於魄一體兼此始終隂陽之交鬼神之會五行之氣物生皆然而人爲備陳氏澔曰天地鬼神五行皆隂陽也德指實理言交指變合言會妙合而凝也形生神發皆其秀而最靈者故曰五行之秀氣徐氏師曾曰上天之載無聲無臭而實造化之樞紐品彚之根柢此天地之實理而爲生人之本也理一而已動而爲陽陽變交隂静而生隂隂合交陽此實理之流行而爲生人之機也由是二氣凝聚隂靈爲鬼聚而成魄陽靈爲神聚而成魂此實理之凝成而人道於是乎生矣形生而四肢百骸無有偏塞五行之質之秀也神發而聰明睿知無有駁雜五行之氣之秀也此實理之全具而人之所以靈於物也董氏應暘曰天地之德人得是理以成性下三句人得是氣以成形而理即具焉隂陽之交體未成時鬼神之會形已成者五行之秀形生而神發矣形生是隂神發是陽案天地之理渾藏於二氣之中所謂無極之真也語其氣之本然曰隂陽語其氣之成能曰鬼神語其氣之成質曰五行所謂二五之精也徳以賦畀言交以變合言會以凝聚言秀以純全言所謂妙合而凝也乾健而不息坤順而有常天地之氣陽變隂合鬼屈神伸五氣順布萬物化生而於其間又有偏全純雜其偏者雜者為物全者純者為人故人者即天地健順之徳隂陽變合之交鬼神屈伸之會而五行純全之秀氣也通論劉氏彞曰天地之氣隂陽也隂陽消長迭相出入而成四時四時終始更相變化而成五行五行者四時之氣凝結而成也大之為山嶽河海小之為動植羽毛其於人也内之為五臟外之為五事性之為五常類之為五品其作於教化也則與天地合其徳與隂陽合其序與鬼神合其吉凶能使五行不失其性然非七情之所能致也不曰中和之至徳哉禮之為用其如是夫陳氏淳曰人受隂陽二氣而生此身莫非隂陽如氣陽血隂脈陽體隂頭陽足隂面陽背隂口之語黙目之寤寐鼻息之呼吸皆有隂陽不特人如此凡萬物皆然中庸言鬼神體物不可遺天地間無一物不是隂陽則無一物不具鬼神又曰自二氣言之神是陽之靈鬼是隂之靈靈云者只是屈伸往来恁地活耳自一氣言之方伸而来屬神已屈而往屬鬼其實二氣只是一氣姚氏舜牧曰人生天地間必與天地合其徳與鬼神隂陽同其屈伸往来而保合五行之秀氣方無愧於人故聖人作則其道亦不外是故天秉陽垂日星地秉隂竅於山川播五行於四時和而后月生也是以三五而盈三五而闕竅苦弔反播彼佐反正義鄭氏康成曰秉猶持也竅孔也言天持陽氣施生照臨於下地持隂氣出内於山川以舒五行於四時此氣和乃后月生而上配日若臣功成進爵位也孔疏此氣謂五行之氣凡月體之生本於日光一盈一闕屈伸之義也孔疏盈若臣進受髙位是其伸闕若臣退就下位是其屈也必三五者播五行於四時也一曰水二曰火三曰木四曰金五曰土孔疏尚書洪範文合爲十五之成數也孔疏積一二三四五縂為十五孔氏頴達曰上言人禀天地隂陽鬼神五行而生此又明天地之徳五行之氣不重陳隂陽鬼神以皆天地中物也天持陽氣垂縣日星以施生照臨於下地持隂氣而開竅於山川以出納其氣氣有隂陽皆出於地地體秉隂故雖陽氣亦謂之隂也播散五行之氣於四時春木夏火秋金冬水土無正位分寄四時若四時不和日月乖度寒燠失所則月不得依時而生必五行四時調和道度不失而后月依時而生也盈謂月光圓滿闕謂月光虧損陳氏祥道曰天以清秉陽在天成象日星是也地以濁秉隂在地成形山川是也天地既位於上下則播五行於其中故天一生水播於冬天三生木播於春地二生火播於夏地四生金播於秋天五生土播於四時之閒其所播者和然後月生如其數積自一至五爲十五生數極而月盈又積十五成數極而月闕也隂陽之義配日月不言日何也蓋月有盈闕之常又有薄蝕之變得其常則四時和及其變則四時乖故觀月之生而己矣項氏安世曰五行言十干甲乙木丙丁火戊己土庚辛金壬癸水也四時言十二支寅卯辰春巳午未夏申酉戌秋亥子丑冬也布五行於六支爲三十日晦朔一周也三五盈三五闕則三十日矣呉氏澄曰天有日月星辰日明於晝而生月星明乎夜而麗辰皆縣象於天以照地之形於下地有水火土石山者土石之起而藏火川者土石之䧟而行水皆開竅於地以通天之氣於上月有盈闕非如日星之一定故别言之布五行之十干於四時之十二支則爲六十其全數也三十者六十之中半中半則和和則月生即日星山川以驗隂陽月之盈闕即鬼神之屈伸也案尚書五行傳晦而月見西方謂之脁脁則王侯荼朔而月見東方謂之朒亦謂之仄慝則王侯蕭漢書君舒緩則臣驕慢故日行遲月行疾君肅急則臣恐懼故日行疾月行遲此皆不和而月不生之驗五行之動迭相竭也五行四時十二月還相為本也迭大計反又田結反竭義作揭其列反還音旋下同正義鄭氏康成曰竭猶負戴也言五行運轉更相為始也孔疏負謂背負戴謂頭戴物在人上謂之負戴氣之過去者下亦負戴之春木負戴水夏火負戴木秋金負戴火冬水負戴金也許氏慎曰竭負舉也孔氏穎達曰前既論天地此更論五行之動竭是擔竭之名五行轉運迭相負竭若春木王則水終謝夏火王則木終謝也還相為本若孟春則寅月為諸月之本仲春則卯月為諸月之本也劉氏彞曰春木盛而生火夏火盛而生土夏季土盛而生金秋金盛而生水冬水盛而生木五行相生終而又始天地之常理也金克木木克土土克水水克火火克金五行相克以成其性以竭其才故静則相生天之道也動則相竭地之道也其相生皆以氣之盛者為本而盛過於中隂陽之氣不和是以有相克之義然後不失其和而日月五星山川萬物罔不順其序而遂其生也陳氏祥道曰竭猶休也休則有王故竭則有盈一行直行一時之月為本則四時皆為末方氏慤曰交相為用則迭相竭相竭如此則相生相克可知五行播為四時四時合為十二月積陽成暑積隂成寒陽生子中隂生午中各以所生之氣為本馬氏睎孟曰四時者五行之運十二月者四時之積故還相為本盛徳所在即本也周氏諝曰木竭則火盈火竭則金盈如春木為本則水火土金皆末也陸氏佃曰竭盡也水王則金竭木王則水竭王文公曰此立而彼竭也呉氏澄曰五行之動句總包下四者動運轉而不一定也陳氏澔曰已往者為見在者所竭見在者為將来者所本徐氏師曾曰春木王夏火来竭之秋金王冬水来竭之此盛而彼衰是迭相竭也此五行各循其序動静不同時生成不同方天地隂陽之分分之所以一定而不移也春木之王乃夏火之本夏火之王乃秋金之本是還相為本也此五行互為其根動静無二機生成無二理天地隂陽之合命之所以流行而不已也案竭者立於此而無不舉之意鄭氏負戴言其前陸陳休盡言其後蓋生而不息者天之道也徳立於此而所生者已舉其中如木立則火已藴土立則金已藴而所生者日盛即生之者之力盡如木盛而水涸火盛而木灰其竭乃所生者竭之也然而遞相生則竭而無竭矣故蘇子曰逝者如斯而未嘗往也盈虚者如彼而卒莫消長也又案還相為本與下還相為宮還相為質同義蓋五行之中各有五行如木榆柳青是木中之木棗杏赤是木中之火桑柘黄是木中之土柞楢白是木中之金槐檀黑是木中之水故四時取火異用若金若土俱有五色是每時每月各有一行以為主而四行亦從之也五聲六律十二管還相為宮也正義鄭氏康成曰五聲宮商角徵羽也其陽管曰律隂管曰呂布十二辰始於黄鐘管長九寸下生者三分去一上生者三分益一終於南呂更相為宮凡六十律也孔氏穎達曰舉陽律則隂呂從之故十二管十一月始於黄鐘管長九寸為第一宮下生林鐘為徵上生太蔟為商下生南呂為羽上生姑洗為角林鐘為第二宮上生大蔟為徵下生南呂為商上生姑洗為羽下生應鐘為角大蔟為第三宮下生南呂為徵上生姑洗為商下生應鐘為羽上生蕤賔為角南呂為第四宮上生姑洗為徵下生應鐘為商上生蕤賔為羽上生大呂為角姑洗為第五宮下生應鐘為徵上生蕤賔為商上生大呂為羽下生夷則為角應鐘為第六宮上生蕤賔為徵上生大呂為商下生夷則為羽上生夹鐘為角蕤賔為第七宮上生大呂為徵下生夷則為商上生夹鐘為羽下生無射為角大呂為第八宮下生夷則為徵上生夹鐘為商下生無射為羽上生仲呂為角夷則為第九宮上生夹鐘為徵下生無射為商上生仲呂為羽上生黄鐘為角夹鐘為第十宮下生無射為徵上生仲呂為商上生黄鐘為羽下生林鐘為角無射為第十一宮上生仲呂為徵上生黄鐘為商下生林鐘為羽上生太蔟為角仲呂為第十二宮上生黄鐘為徵下生林鐘為商上生大蔟為羽下生南呂為角是十二宮各有五聲凡六十聲南呂最處於末也夫十二律之變至於六十猶八卦之變至於六十四也宓羲作易紀陽氣之初以為律法建日冬至之聲以黄鐘為宮大蔟為商姑洗為角林鐘為徵南呂為羽應鐘為變宮蕤賔為變徵此聲氣之元五音之正故各統一日其餘以次運行當月者各自為宮而商徵以類從焉京房易云十二律得位者案隂居隂陽居陽五卦案黄鐘太蔟姑洗林鐘南吕生五子五五二十五并本五為三十失位者案陽居隂隂居陽五卦案大呂夹鐘仲呂夷則無射生三子三五十五并本五為二十不得不失者案處隂陽交際之間二卦案蕤賔應鐘生四子二四為八并本二為十合為六十黄鐘七律自為宮各統一日其餘五十三律随所生日六七等為其日之宮則周一期日數朱子曰五聲相生至於角位隔八下生當得宮前一位以為變宮五聲之正至此而窮又自變宮隔八上生當得徵前一位以為變徵餘分不可損益而其數又窮故立均之法至是而終孔氏以本文但云五聲十二管故不及二變止為六十聲若增二變二十四聲則合為八十四調又曰十二律各有正聲而旋相為宮則正聲初無定位當髙者或下當下者或髙則宮商失序而聲不諧於是有半律子聲之法如黄鐘正聲九寸則子聲四寸半當上生而所生者短則下取此聲適合下生之數又以正律下生則復得其本法而於本律又適合上生之數又曰黄鐘惟本宮用正律若他律為宮則黄鐘之為徵商羽角二變者但用變律漢志謂黄鐘至尊不為役也方氏慤曰五聲比而為六律六律偶而為十二管陽旋而左隂旋而右益隂而生律損陽而生同各以所生之音為宮故曰旋相為宮陳氏祥道曰先王因天地隂陽之氣而辨十有二辰因十有二辰而生十有二律統之以三故黄鐘統天林鐘統地大蔟統人所以象三才生之以人故黄鐘生林鐘林鐘生大蔟大蔟生南呂之類所以象八風律左旋而生呂則為同位所以象夫婦呂右轉而生律則為異位所以象子母六上所以象天之六氣五下所以象地之五行其長短有度其多寡有數其輕重有權其損益有宜始於黄鐘終於仲呂黄鐘太蔟姑洗損陽以生隂林鐘南呂應鐘益隂以生陽蕤賔夷則無射又益陽以生隂大呂夹鐘仲呂又損隂以生陽黄鐘至姑洗陽之陽也林鐘至應鐘隂之隂也皆陽息隂消之時故陽常下生而有餘隂常上生而不足蕤賔至無射隂之陽也大呂至仲呂陽之隂也皆陽消隂息之時故陽常上生而不足隂常下生而有餘自子午以左皆上生以右皆下生鄭以黄鐘三律為下生蕤賔三律為上生是也班固謂律下生呂上生誤矣書曰聲依永律和聲律非五聲不能辨聲非十二律不能和五聲非變不能盡旋之為十二宮析之為八十四聲皆五位為五音至六為變宮至七為變徴及八宮復旋矣陽盡變以造始故每律異名隂體常以效法故止三鐘三呂而已鐘者物所聚也呂者物所正也律述也所以述隂陽六律亦曰六始以始隂也六呂亦曰六閒曰六同呂其體閒其位同其情也而皆以述隂陽故統曰十二律也蔡氏元定曰黄鐘九寸皆用九數九絲為毫九毫為釐九釐為分九分為寸黄鐘林鐘大蔟得全寸南呂姑洗得全分應鍾蕤賔得全釐大呂夷則得全毫夹鐘無射得全絲至仲呂之實十三萬一千七十二以三分之不盡二算其數不行此律之所以終於十二也十二律各自為宮以生五聲二變其黄鐘林鐘太蔟南呂姑洗應鐘六律則五音具足蕤賔至仲呂六律則取黄鐘至應鐘六律之聲少下不和故有變律其聲視正律稍髙以非正律故不為宮五音宮與商與角徴與羽相去各一律則音節和至角與徴羽與宮相去乃二律則音節逺故角徴之間近徴收一聲比徴少下謂之變徴羽宮之間近宮收一聲比宮少髙謂之變宮所以濟五聲之不及也變宮十二在羽聲後宮聲前變徴十二在角聲後徴聲前共八十四聲若黄鐘宮起至夹鐘羽並用黄鐘起調黄鐘畢調餘十一律旋宮是為六十調杜氏佑曰還宮之法先以本管為均八音相生或上或下取五聲令足若黄鐘大呂大蔟之均為宮皆用正律夹鐘之均為宮四正聲一子聲黄鐘為羽正聲長用子聲林鐘為角子聲短仍用正聲姑洗之均為宮四正聲一子聲大呂為羽用子聲仲呂之均為宮正聲三子聲二黄鐘為徵大蔟為羽用子聲蕤賔之均為宮正聲三子聲二大呂為徵夹鐘為羽用子聲林鐘之均為宮正聲三子聲二大蔟為徵姑洗為羽用子聲夷則之均為宮正聲二子聲三夹鐘為徵仲呂為羽黄鐘為角用子聲南呂之均為宮正聲二子聲三姑洗為徵蕤賔為羽大呂為角用子聲無射之均為宮正聲一子聲四仲呂為徵黄鐘為商林鐘為羽大蔟為角俱用子聲應鐘之均為宮正聲一子聲四蕤賔為徵大呂為商夷則為羽夹鐘為角俱用子聲凡子聲如正聲之半案史記及律呂新書大約宮商角徵羽者五音遞降之序宮徵商羽角者五音相生之序黄鐘大呂大蔟夹鐘姑洗仲呂蕤賔林鐘夷則南呂無射應鐘十二律相間之序黄鐘林鐘大蔟南呂姑洗應鐘蕤賔大呂夷則夹鐘無射仲呂十二律相生之序宮音最濁商次濁角清濁半徵次清羽最清宮數最多故為君商次之故為臣角次之故為民君臣皆以治民也徵又次之為事有民而後有事也羽最少為物有事而後用物也其數黄鐘長八寸十分一以一寸分十分而有其一大呂七寸五分十分二以一分分十釐而有其二大蔟七寸十分三夹鐘六寸五分三分一姑洗六寸十分四仲呂五寸九分三分二蕤賔五寸六分三分二林鐘五寸十分四夷則五寸零三分二南呂四寸十分八無射四寸四分二分二應鐘四寸二分三分二其法如黄鐘八十一為宮則林鐘五十四為徵太蔟七十二為商南呂四十八為羽姑洗六十四為角此正聲也若由角三分去一則應鐘四十二餘九分分之六為變宮在羽後宮前由變宮又三分益一則蕤賔五十六餘九分分之八為變徵在角後徵前此變聲也其旋相為宮有臣過君民過臣事過民物過事則不用全律而以半聲應之如林鐘五十四為宮則太蔟去半三十六為徵南呂四十八為商則姑洗去半三十二為羽應鐘四十二六分為角此均法也若用之祭祀則去商聲不用而徵即下生羽又以夹鐘為天宮林鐘為地宮黄鐘為人宮祀天則去地宮祀地則避天宮宗廟則避天地二宮於是有隔二八隔三八以相生者此用法也先儒遞𫝊大略如此然十月之律應鐘纔四寸餘而十一月之律遽長至九寸自黄鐘大呂至無射應鐘但有遞降而無遞升祭不用商聲而謂徵即生羽則但有下生而無上生且不改其三分損益之法則實商而名之以羽實羽而名之以角隔二八三八以相生則實商而名之以徵實羽角而名之以商其故皆不可解蓋音律之義惟管子地員篇淮南子古樂篇司馬遷律書班固漢書律歴志為得其詳此不能具載大扺以還宮之妙盡聲之變至其用之則二變閟而不用以今樂工尺等驗之亦去乙凡不用髙低相轉七調皆然而所謂某聲中某律者亦止指此月之中氣而言非執此分寸以為中也五味六和十二食還相為質也正義鄭氏康成曰五味酸苦辛鹹甘也和之者春多酸夏多苦秋多辛冬多鹹皆有滑甘孔疏周禮食瞖文是謂六和孔疏四時四味皆有滑有甘為六孔氏穎達曰每月各以其物為質是十二月之食還相為質也陳氏澔曰還相為質如春三月以酸為質夏三月以苦為質而六和皆相為用也存疑方氏慤曰五味調而為六和衍而為十二食十二食六穀六牲也若牛宜稌羊宜黍豕宜梁各以其所宜者為質周氏諝曰十二食即周官鼎十有二呉氏澄曰家語下相為質作相為主今按此質當作主五味為六和之十二食所負戴則每食各有酸苦甘辛鹹還相為十二食之主而味之數亦各有六十案五味應四時五行則十二食自當以十二月之食之說為合方氏六穀六牲周氏十二鼎說雖恰符十二之數然於還相為質之義猶未合也呉氏又從十二推出六十如六十律之例亦支離無謂要知孔說本確何庸節外生枝五色六章十二衣還相為質也正義鄭氏康成曰五色六章畫繢事也周禮考工記曰土以黄其象方天時變火以圜山以章水以龍鳥獸蛇雜四時五色之位以章之謂之巧孔疏初畫曰畫成文曰繢若畫作土必黄而方畫作天則無定色随四時色而為之畫火則為圜形似半環龍水物孔氏穎達曰周禮月令食與衣唯有四時之異無十二月之分故熊氏云此異代法或每時三月故云十二也陳氏澔曰還相為質如月令春衣青夏衣朱各主其時之一色而餘色閒雜也存疑孔氏穎達曰章獐也獐山物案獐一獸何足以槩山華蟲雉也可以鳥獸蛇三者當之乎鳥獸蛇所謂華蟲也方氏慤曰十二衣六冕六服是也質以取正為義五味五色各有正也故以質言之周氏諝曰十二衣即舜之十二章呉氏澄曰五色為六章之十二衣所負戴則毎衣各有青赤黄白黒還相為十二衣之質而色之數亦各有六十案方氏以六冕六服為十二衣不知周禮天子六服同冕則冕與服不足十二之數也且與還相為質說不符陳氏以十二衣為十二章則自九章七章以次降殺如何還相為質歟孔氏謂月令食與衣帷有四時之異每時三月為十二陳氏申之謂味春以酸為主夏以苦為主色春以青為主夏以赤為主則意所謂還相為宮者春以角為主夏以徵為主夏季以宮為主故月令曰其音角其音徵於夏季言律中黄鐘之宮歟姑存之以俟知者故人者天地之心也五行之端也食味別聲被色而生者也別彼列反被皮義反又扶義反正義鄭氏康成曰此言兼氣性之效王氏肅曰人在天地閒如五藏之有心人乃有生之最靈其心五藏之最聖也孔氏穎達曰上論人稟天地五行氣性而生此下論稟氣性之有驗天上地下人居其中動静應天地如人腹内有心動静應人也萬物悉由五行而生而人最得其妙氣明仁義禮知信為五行之首五行各有味有聲有色而人並食之别之被之味聲色在五行為著而人氣性兼有之故曰五行之端項氏安世曰天地之心仁而已矣天地之至仁寓之於人纔有人形即有仁心故曰人者仁也仁人心也復所以見天地之心以其有生意也凡果實之心皆曰仁人亦作仁故天地之心亦名曰仁陳氏祥道曰物之體常在外而心常在中故人者天地之心方氏慤曰天地散而為五行故仁之端則木之性所立也義之端則金之性所立也以至火之於禮水之於知土之於信亦若是已矣五行滋而為五味人以養其口感而為五聲人以養其耳形而為五色人以養其目然後人得而生焉味色亦有别獨於聲言别以其微妙尤宜致别也朱子語類問人者天地之心朱子曰如天道福善禍滛善者人皆欲福之惡者人皆欲禍之又曰教化皆是人做故人為天地之心蔣氏君實曰鳥俯而啄仰而四顧味有所不辨也五味六和惟人能辨而食之瓠巴鼓瑟㳺魚出聴物萬一然耳聲有所不别也五聲六律惟人能别而聴之生而羽毛以禦寒暑物莫不然色不能自擇也五色六章惟人能擇而被之蓋囿於形而共人者為物任其知以役物者為人人具耳目備口體視明聴聰飲食有具服用有適得於天者本如是而已情欲一恣性天梏亡養一指而失肩背是自失其所以食味者也好鄭聲而厭雅樂是自失其所以别聲者也舎正色而好姦色是自失其所以被色者也不有聖人何以因天理之自然制人情之或過哉呉氏澄曰五行之性在兩間不可見人得以生而為仁義禮知信然後其端可見徐氏師曾曰此結上文言元亨利貞之理賦而為仁禮義知之性所謂天地之帥吾其性是人之性即天地之心也水火木金土之氣凝而為貌言視聴思之官所謂天地之塞吾其體是人之形即五行之端也食味别聲被色於此見天地生物獨厚於人人為至貴獨靈於物所當盡性踐形節欲以無負天地生養之意可也通論馬氏睎孟曰前言天地之性以其性之所受之中也此言天地之心以其為人所處之中也前言五行之秀言其精而不雜也此言五行之端以其本而非末也湯氏三才曰前言徳會交氣溯人所稟受造化是活的人是造化做就的此言心端則天地五行做不来的都要人做轉覺天地五行是定的人是活的案此以上原人情皆出於天地以明治人情所以必承天道之意故聖人作則必以天地為本以隂陽為端以四時為柄以日星為紀月以為量鬼神以為徒五行以為質禮義以為器人情以為田四靈以為畜柄本又作枋兵命反量去聲畜許又反下同正義鄭氏康成曰天地以至於五行其制作所取象也禮義人情其政治也四靈其徵報也量猶分也鬼神謂山川也山川助地通氣之象也器所以操事田人所捊治也孔疏操事若手秉耒耜以耕田捊謂以手捊聚即耕種耘鋤也孔氏穎達曰則法也本根本也人既是天地之心故聖人作法則必用天地為根本若祭帝於郊祭社於國也案天地為本所該甚廣郊社特祭禮其一端耳端首也用隂陽為端首若賞以春夏刑以秋冬是也柄若劒㦸須柄而用之聖人為教春生夏長秋斂冬藏是法四時也紀綱紀也日行有次度星有四方列宿部分昏明敬授人時是法日星也量猶分限也天之運行每三十日為一月聖人制敎亦随人才分是法月為限量也山川助地以通氣為地之徒屬聖人象之立羣臣助己以施教為己徒屬也質體也五行循逥周而復始聖人為教亦循環不已是法五行也執禮義為器用以治人情如田得耒耜之耕也聖人法天地以治人情故天地應以徵報四靈並至聖人畜之如人養牛馬然方氏慤曰聖人作則以天地為之始人物為之終其序如此胡氏銓曰柄以斟酌言以四時斟酌和氣也應氏鏞曰天地以全體言道之大原出於天言大本之先立也隂陽以氣化言立天之道曰隂與陽開端造始之可見者也四時以運化言太昊執規炎帝執衡當權操柄之可握者也日星紀運乎天之度驗其次舎以分時令如綱有紀以分其目一月周匝乎天之度視其晦朔以課事功如物有量以揆其平鬼神布列於天地之閒造化之用也以之為徒則開合變化常與之並行五行變合於隂陽之内造化之體也以之為質則亭毒胚胎不昧其所主有其質而無其具則善不能自遂故因其自然固有之禮義以為器而品節防範之道無不周有其器而無其地則功無所可施故因其可與為善之人情以為田而脩治墾除之功無不至四靈蓋物之變化而有神者能盡致而為畜則徳之所感可知已呉氏澄曰上言人以天地隂陽五行而生此言聖人制禮以治人亦取法於天地隂陽五行也徐氏師曾曰徒如徒侣之相依上二者作則之要下皆事之則也九者備則休徵應之矣通論鄭氏康成曰此則春秋始於元終於獲麟包之矣呂氏說月令而謂之春秋事類相近焉孔疏謂春秋元年以後獲麟以前包天地隂陽星辰日月之等書元氣之始則天地也書春時之始則四時也書王政教之始則禮義也熊云書無冰是陽大雨雹是隂書恒星書日書月書沙鹿梁山崩是鬼神雨木冰宣榭火等是五行獲麟是四靈為畜也呂不韋説十二月之令謂為呂氏春秋事之倫類與孔子所脩春秋相附近焉以天地為本故物可舉也以隂陽為端故情可睹也以四時為柄故事可勸也以日星為紀故事可列也月以為量故功有藝也鬼神以為徒故事可守也五行以為質故事可復也禮義以為器故事行有考也人情以為田故人以為奥也四靈以為畜故飲食有由也睹丁古反正義鄭氏康成曰可舉者物天地所養生也可睹情以隂陽通也孔疏同聲相應同氣相求通也可勸事以四時成也可列事以日與星為候興作有次第也有藝藝猶才也十二月各有分猶人之才各有所長也藝或為倪可守山川守職不移也可復下竟復由上始也考成也器利則事成奥猶主也胡氏銓曰左𫝊國有奥主田無主則荒由用也四靈與羞物為羣孔氏穎達曰此覆明前經諸事治理皆應則萬事成也天地生養萬物今本天地為政故萬物可舉而興人情與隂陽相通今法隂陽為教故人情無隐生長斂藏随時無失故民不假督勵而自勸敬授人時早晚無失故民東作西成事有次第月各有分人各有長随才而教則人竭所長而有功鬼神各有分職而不移今引鬼神爲徒屬則事無失業五行周而復始爲教法之則事必不絶工欲善其事必先利其器禮義器之利者故所治之事必成田以人爲主情用聖人爲主則不荒廢矣四靈衆物之長長既至則其屬並至得以充庖廚是飲食有用也張子曰自天地爲本至四靈為畜一理也特細别耳事天治人與夫接物無所不用其極能用其極則其餘不足治矣方氏慤曰以天地爲本則萬物皆末本既得則末斯從故物可舉言持之在我也隂陽者萬物之情以隂陽為端則情可探而見以四時爲柄則人順時之後先因時之動静而不敢辭以日星爲紀則晝之所参夜之所考各得其序月以爲量則興事造業各有數以致其能五行以爲質則代廢代興周而復始故事可復四靈以爲畜則人之日用者易致故飲食有由言人因之以致用也馬氏睎孟曰法象莫大乎天地故以爲本而隂陽日月鬼神皆天地之别也聖人作則仰法天俯察地而近取人情禮義出於人情而先王因以爲治情之具也其法備其治詳宜有休徵應之故終以四靈為畜焉又曰天地之大端在隂陽人情之大端亦在隂陽喜為陽怒為隂董氏師讓曰萬物生息於天地之閒以天地爲本則萬物雖多而無所逃為善陽之類為惡隂之類以隂陽為端則物情大槩可見陸氏佃曰隂陽為端若觀其所聚觀其所感觀其所恒而天地萬物之情可見四時為柄若春誦夏絃春率民耕秋率民斂日星爲紀若日在北陸而藏冰龍見而雩黄氏曰由從也從於禮之義飲食之禮達則物無暴殄信及豚魚禮化明備也葉氏適曰聖人發正於天理收功於人情如良農之善稼也五穀之報必厚矣聴而弗治長稂莠也治而弗達雜稊稗也不本其情而責其成廢田者也如是則人豈能心服於聖人而恃為奥主哉何謂四靈麟鳳龜龍謂之四靈故龍以為畜故魚鮪不淰鳳以為畜故鳥不獝麟以為畜故獸不狘龜以為畜故人情不失獝陸云矞又作獝家語獝作䎀狘作鮪音偉淰音審獝况必切狘許月切正義鄭氏康成曰淰之言閃也孔疏淰是水中之形狀閃是人在門中或見或不見也獝狘飛走之貌失猶去也龜北方之靈信則至矣孔疏龜為水蟲水主信故信則至水為信則土為知然水土二行俱有信知孔氏穎達曰此更解上四靈之事淰水中驚逝獝驚飛狘驚走魚鮪從龍鳥從鳳獸從麟其長既来故其屬見人不驚也龜知人情龜既来應故人各守其行其情不失也上三靈言其長来而族至龜獨言其感信而至與上相互也方氏慤曰麟體信厚鳳知治亂龜兆吉凶龍能變化故謂之四靈陳氏澔曰鮪魚之大者龜能前知人有所決以知可否故不失其情之正案上於四靈獨言飲食有由以禮始飲食人情大欲存焉故也龜非可食而能知吉凶悔吝故以人情不失别言之餘論葉氏適曰聖人盡人道之正則彼動物之傑不得自遂其雄狡而一將聴命於人於是蟲魚鳥獸無不順若而人之飲食生養亦未有苟爲温飽而不知其所由来者故夔言鳳皇來儀周公言遺我大寳龜孔子言鳳鳥不至河不出圗吾已矣夫此言物之聽命於人也後世不度其德之厚薄而取必於異物之有無如漢之神雀五鳳黃龍君臣歆豔以爲祥嗟夫是人反聽命於物也欽定禮記義疏卷三十二
