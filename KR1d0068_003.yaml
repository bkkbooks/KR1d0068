body:
  text: 曲禮上第一之三凡為長者糞之禮必加帚於箕上以袂拘而退其塵不及長者以箕自鄉而扱之為去聲糞古夲作􅠜後省帚之手反袂迷世反拘古侯反扱許急反音吸正義鄭氏康成曰加帚於箕得兩手奉箕恭也謂初執而往時也弟子職曰執箕膺擖厥中有帚孔疏弟子職管子書篇名擖箕舌也厥其也言執箕之禮以箕舌鄉胷而帚置於箕中也以袂拘謂埽時也以袂擁帚之前埽而卻行之扱讀曰吸謂收糞時也箕去棄物以鄉尊者則不恭孔氏穎達曰袂衣袂也退遷也當埽時却遷以一手捉帚又舉一手衣袂以拘障於帚前且埽且遷故云拘而退扱歛取也以箕自鄉斂取糞穢不以箕鄉尊者呉氏澄曰以帚埽地除去塵穢謂之糞餘論張子曰古者止是子弟事父母豈有使人而事者故至於糞除皆有禮使父母得以逺厮僕吕氏大臨曰糞除布席役之至褻者也古之童子未冠為長者役而其心安焉盖古教養之道必夲諸孝弟孝弟之心雖生於惻隐恭敬之端孝弟之行常在於洒掃應對執事趨走之際盖人之有血氣者未有安於事人者也今使知長者之可敬甘為僕御之役而不辭是所以存其良心折其傲慢之氣然後可與進於徳王氏蘋曰學者湏是下學而上達洒掃應對即是道徳性命之理此章所言糞除之禮試體究此時此心如何體究之斯知上達之理存異吕氏大臨曰扱讀如尸扱以柶祭羊鉶之扱謂箕扱於糞如柶扱於鉶也辨正陳氏澔曰糞除穢也少儀曰埽席前曰拚義與糞同吕氏讀扱為插音然凡氣之出入嘘則散吸則聚今以收斂為義則吸音為是案古人之於㓜學洒掃以習其體應對以正其辭進退以肅其儀循循於出入周旋而不越使身心内外常若有所持循而驕心浮氣由是斂看為長者糞之禮一節其小心敬謹如此故敎弟子者必從是始奉席如橋衡奉芳勇反橋居廟反正義鄭氏康成曰席横奉之令左昂右低如有首尾然孔疏所奉席頭令左昂右低如橋之衡衡横也左尊故昂右卑故垂也但席舒則有首尾卷則無首尾此謂卷席奉之法故注云如有首尾橋井上桔槔衡上低昂陳氏櫟曰少為長者横奉其卷席左昂右低如桔槔之横也存異胡氏銓曰如橋衡取中平而兩頭下應氏鏞曰橋橋梁也衡即横也或曰平也橋横於水至平而橋之横木尤平奉席者正平無欹其状亦然朱氏申曰衡權衡也如橋言奉席之髙如衡言奉席之平案古無橋梁名詩無逝我梁在彼淇梁造舟為梁孟子徒杠輿梁是梁或名杠不名橋也史禹山行乘橋亦作檋盖直轅車殷紂鉅橋之粟盖積粟倉士昏禮笲加於橋盖横格架是名橋者皆非梁也史記秦昭王初作河橋則以梁為橋殆自秦始又衡字與横字通用不止權衡故衡字有取於平者如上衡中衡有但取於横者如夏而楅衡卷席必横奉之而微有低昂則低右昂左不必正平亦不能使兩頭屈下則鄭説為是而必改之者反多誤也請席何鄉請衽何趾鄉去聲下竝同正義鄭氏康成曰順尊者所安也孔疏既奉席来當随尊者所欲眠坐也坐問鄉卧問趾孔疏席坐席鄉面也衽臥席趾足也因於隂陽孔疏坐為陽故問面欲何所鄉面亦陽也卧是隂故問足欲何所指足亦隂也皆從所安也案士昏禮御衽於奥媵衽良席在東皆有枕北止古文止作趾是卧席常北趾也管子曰俶衽則請有常則否則請以何趾者非常臥之所也又設衽曰衽猶置尊曰尊布筵曰筵必有請者總見弟子致敬而不敢専之意也總論孔氏頴達曰凡為長者至為上眀為尊者埽除布席之儀席南鄉北鄉以西方為上東鄉西鄉以南方為上正義鄭氏康成曰布席無常此其順之也上謂席端坐在陽則上左坐在隂則上右孔氏穎達曰此據平常布席如此若禮席則不然案鄉飲酒禮賔席牖前南面主人席阼階上西面介席西階上東面與此不同吕氏大臨曰南鄉東鄉皆坐在隂南鄉以西為右東鄉以南為右北鄉西鄉皆坐在陽北鄉以西為左西鄉以南為左應氏鏞曰古人布席於地禮畢則斂而收之四方異鄉盖其堂室之面𫝑或不同則酌地宜其方位之旋轉或不同則順天道順其方之所重為其位之所尊案下文若非飲食之客則此乃尋常主客㑹集之席而飲食亦在其中西鄉北鄉主家之席南鄉東鄉則親友異姓之席總論邵氏淵曰自此至足毋蹶大率有四始奉席次請席三布席四就席奉席則欲順席之理次請席問其欲坐卧之地次布席則平常之席講問之席各有其儀至就席又有就席之儀賔主之閒安得不敬乎若非飲食之客則布席席閒圅丈圅胡南反正義鄭氏康成曰非飲食謂講問之客也圅猶容也講問宜相對容丈足以指畫也孔疏布席中閒相去使容一丈之地文王世子云侍坐扵大司成逺近閒三席席之制三尺三寸三分寸之一三席是一丈也飲食之客布席於牖前孔疏飲食燕饗則賔位在室外牖前列筵南鄉布席不湏相對講説之席不在牖前或在於室丈或為杖王氏肅曰古人講説用杖指畫故或容杖也存疑陳氏澔曰兩席並中閒空地共一丈應氏鏞曰席閒圅丈其地寛則足以揖遜回旋而不至於迫其分嚴則足以致敬盡禮而不至於䙝非若飲食之客徒欲便於勸酬以為懽也案閒猶容也圅亦容也鄭注云容丈足以指畫注世子云容三席則得指畫分眀所謂圅丈也孔疏亦云中間相去使容一丈之地盖曰圅曰閒但指中間空地而言非并兩席計之共成一丈也陳氏改之非其質矣主人跪正席客跪撫席而辭客徹重席主人固辭客踐席乃坐重直龍反正義鄭氏康成曰主人跪正席者雖来講問猶以客禮待之異於弟子客跪撫席者荅主人之親正徹去也去重席謙也再辭曰固客踐席乃坐客安主人乃敢安也講問宜坐孔氏頴達曰撫謂以手按止之不聽主人之正席也客徹重席者禮器云諸侯三重大夫再重又鄉飲酒禮公三重大夫再重是尊者多卑者少故主人為客設多重席客謙而自徹主人固辭者再辭止客之徹也尊卑有數而客必徹之者既来講説夲以徳義相接不以尊卑為用故雖尊猶自徹也踐猶履也主人止客徹席故客還履席将坐主人待客坐乃坐也吕氏大臨曰主人敬客故跪正席客敬主人則徹重席主敬客則客辭客敬主則主辭賔主之禮所以荅也徐氏師曾曰此與下節皆蒙講説之客而言賔主之禮也通論陳氏祥道曰公食大夫之禮賔卷加席而公不辭大夫相食之禮賔卷加席而主人辭或辭或否以其敵與不敵故也案燕禮司宫筵賔於戸西東上無加席小臣設公席於阼階上設加席大射小臣設公席於阼階上西鄉司宫設賔席於戸西南面有加席是席以多為貴也故主人敬客則跪正席客敬主人則徹重席賔主各致其辭而客乃踐席者踐重席也主人不問客不先舉正義鄭氏康成曰客不先舉者客自外来宜問其安否無恙及所為来故孔氏穎達曰舉亦問也陳氏澔曰席坐既定主人先問客乃荅之客不當先舉言也將即席容毋怍兩手摳衣去齊尺衣毋撥足毋蹶怍才洛反摳苦侯反齊音咨正義鄭氏康成曰怍顔色變也齊謂裳下緝也撥𤼵揚貌蹶行遽貌孔氏穎達曰即就也弟子講問初来就席顔色宜荘不得變動摳提挈也衣謂裳也将就席時以兩手當裳前提挈使起令裳下緝去地一尺恐衣長轉足躡履之吕氏大臨曰怍者愧赧不安之貌愧赧不安失之野也衣毋撥收斂之不使旁有觸足毋蹶不怱遽使之躓三者謂之行容也統而言雖裳亦衣也存疑劉氏彛曰将即席湏詳緩而謹容儀毋使有失而可愧怍坐後更湏整疊前面衣衽毋使撥開又古人以膝坐乆則膝不安而易以蹶動坐而足動亦為失容故戒以毋動管寕坐席嵗久惟兩膝著處皆穿是足不動故然耳案朱子謂此古人為韻語以教小兒則不必故為求深孔氏謂弟子講問初来就席則亦不得混入賔主之禮也徐鉉説文怍心動作也小兒心易動故色易變将即席而不摳衣則坐而下衣必分散足必如蹶蹶謂顛仆也此皆以戒即席将坐之容先生書策琴瑟在前坐而遷之戒勿越正義鄭氏康成曰在前謂當行之前戒勿越廣敬也孔氏頴達曰策篇簡也坐亦跪也坐名通跪跪名不通坐吕氏大臨曰書策琴瑟之為物先生之所常御也物猶加敬人可知也通論陳氏祥道曰臣之於君至於路馬不敢齒路馬之芻不敢蹙見几杖則起遭乗輿則下子婦之於父母舅姑至於衾簟枕几不敢傳杖履不敢近弟子之於師至於書策琴瑟不敢越皆因其人而敬之故也於物猶然則凡所愛之人可知矣存疑孔氏穎達曰越踰也弟子将行若遇師諸物或當已前則跪而遷移之勿得踰越也案越者播散之意坐而遷之必有次序不得凌亂或謂跨之而過恐無此理虚坐盡後食坐盡前坐必安執爾顔長者不及毋儳言盡津忍反儳藏鑒反正義鄭氏康成曰盡後謙也盡前為汙席執猶守也儳猶暫也非類雜也案周禮注立而以物求市曰儳言未及而參錯以進如之孔氏穎達曰凡坐各有法虚空也空謂非飲食坐也盡後而不敢近前玉藻云徒坐不盡席尺是也食坐謂飲食坐也古者地鋪席而俎豆皆陳於席前之地若坐近後則濺汙席玉藻云食齊豆去席尺是也凡坐好自摇動故戒之令必安坐乆坐好異故戒之宜如鄉者毋怍顔容長者正論甲事未及乙事少者不得輒以乙事暫然錯雜之彭氏汝礪曰坐久或顔色怠慢故戒使執爾顔執有持守之義正爾容聽必恭毋𠞰説毋雷同必則古昔稱先王𠞰初交反正義鄭氏康成曰聼先生之言既說又敬孔疏方受先生之道當正已矜荘聼師長之說宜必恭敬𠞰猶擥也謂取人之說以為己説孔疏語當稱師友而言毋得擥取人之説以為己語雷之𤼵聲物無不同時應者人之言當各由已不當然也孟子曰無是非之心非人也孔疏凡為人之法當自立心㫁其是非不得聞他人之語輒附而同之若聞而輒同則似萬物之生聞雷聲無不同應者稱先王者言必有依據孔疏雖不雷同又不得専輒故必法於古昔之正而所言之事必稱先王也孔氏穎達曰正謂矜荘也顔容通語爾陳氏櫟曰聼長者言必恭敬雖不當茍同於人又不當茍異於古也此一節言弟子事師長講問之節陳氏澔曰上言執爾顔謂顔色無或變異此言正爾容則正其一身之容貌也聼必恭亦謂聼長者之言也楊氏鼎熙曰𠞰説則蹈襲之心勝而少獨得之見雷同則附和之意多而少折衷之詞必字正與二毋字相應通論胡氏銓曰𠞰猶抄也襄二十五年崔慶之盟杜預云讀書未終晏子抄荅易其辭是謂𠞰説餘論方氏慤曰言古則不止於昔言昔則未至於古若合而言之古亦可謂之昔昔亦可謂之古案是節皆就坐之時説正爾容者坐如尸也聼必恭者毋側聼也不𠞰説以掠美雷同以徇人而或好為新竒藐前哲為不足道則又不可故必則法古昔而述先王之實事以證之侍坐於先生先生問焉終則對正義鄭氏康成曰不敢錯亂尊者之言陳氏澔曰問終而後對欲盡聞所問之㫖且不敢雜亂尊者之言也請業則起請益則起正義鄭氏康成曰尊師重道也起若今摳衣前請也孔疏漢時受學有摳衣前請之法業謂篇卷也益謂受說不了欲師更明説之子路問政請益是也吕氏大臨曰業謂所學於先生者如詩書禮樂之類是也益謂所問未明或欲卒學或欲少進也有所請必起敬業也敬業所以敬師敬師所以敬道陳氏澔曰請業者求當習之事請益者再問未盡之藴起所以致敬也通論方氏慤曰孔子與曽參言復坐吾語汝則弟子之於先生有所請必起可知父召無諾先生召無諾唯而起唯于癸反正義鄭氏康成曰唯諾皆應辭唯恭於諾孔氏頴達曰父與先生呼召稱諾則似寛緩驕慢吕氏大臨曰弟子之事師猶子事父父召無諾則先生召亦無諾諾者許而未行也唯而起聞召即徃也玉藻曰父命呼唯而不諾手執業則投之食在口則吐之陳氏祥道曰諾者應之緩唯者應之速以道則唯諾無殊以禮則緩速有辨通論陳氏祥道曰内則應唯敬對事父之禮也論語曾子曰唯事師之禮也為人臣者君命召在内不俟屨在外不俟車亦唯而起之意也侍坐於所尊敬無餘席見同等不起正義鄭氏康成曰無餘席必盡其所近尊者之端為有後来者見同䓁不為私敬孔氏穎達曰先生坐一席己坐一席己必坐於近尊者之端欲得親近先生似若扶持然又備擬先生顧問不可過逺且擬後人之来故闕在下空處以待之也己之同䓁後来任其坐在下空處不為之起以尊敬先生不敢曲為私敬也方氏慤曰無餘席欲其近而應對之審也同等不起與己無上下之間故也通論方氏慤曰經有曰侍先生侍所尊敬侍君子侍長者何也曰先生以敎稱之也曰所尊敬以道稱之也曰君子以徳稱之也曰長者以年稱之也存疑吴氏澄曰吕氏以所尊敬三字相屬不若從舊所尊句㫁為是彭氏絲曰一説侍坐於所尊敬者當坐席之末不可使席有空餘案方氏所尊敬為句惟吴氏謂惟敬之故近之以敬字屬下句然舊實未有此㫁句至彭氏所述别說則與注疏全背㫁不可從燭至起食至起上客起正義鄭氏康成曰燭至異晝夜食至為饌變上客起敬尊者孔氏穎達曰上客謂尊者之上客尊者見之則起侍者宜從之起食與燭至起則尊者不起劉氏彛曰食至起不敢妨其食也張子曰非上客則主不起坐者亦不敢私修敬故無二尊也燭至起事之變也始虚坐至設食則起二者皆變於外也下欠伸撰杖屨亦變也故起案劉氏謂食至起不敢妨其食是此侍坐者不侍食也張子謂虚坐盡後設食則起而盡前是此侍坐者即侍食也二者皆應有之燭不見跋見賢遍反跋駢末反正義鄭氏康成曰跋夲也燭盡則去之嫌若燼多有厭倦也孔疏跋夲把處也古者未有蠟燭唯呼火炬為燭火炬易盡則藏所然殘夲若積聚殘夲客見之則知夜深慮主人厭倦或欲辭退也吕氏大臨曰燭者童子所執燭盡則更之不以殘夲示人使客不敢安也存疑劉氏彛曰燭不見跋趾也将至跋而退不敢及其更案燭不見跋從鄭説則主人敬客夜飲有當陽之禮從劉説則客避主人火繼非卜晝之常然此燭不見跋為執燭以侍者言從鄭為是尊客之前不叱狗正義鄭氏康成曰主人於尊客之前不敢倦叱狗嫌若風去之孔疏有尊客而叱狗則似厭客欲去之也卑客亦當然舉尊為甚吕氏大臨曰狗於尊者之前不敢叱者嫌於客也方氏慤曰不以至賤駭尊者之聼案尊客之前肅容柔聲安得有此不叱狗謂雖狗亦不叱敬之至也讓食不唾唾湯卧反正義鄭氏康成曰唾嫌有穢惡吕氏大臨曰譲食之際不敢唾者嫌若訾主人食亦不敬也楊氏鼎熙曰讓食辭讓以食之時侍坐於君子君子欠伸撰杖屨視日蚤莫侍坐者請出矣欠丘劍反撰仕轉反屨紀具反莫與暮同正義鄭氏康成曰撰猶持也請出以君子有倦意也孔氏穎達曰志疲則欠體疲則伸君子自執杖在坐著屦升堂時杖屨在側若倦則自起持之瞻視庭影望日蚤晚也禮卑者賤者請進不請退退由尊者今見尊者為上諸事皆是欲起之漸故侍坐者得請出吕氏大臨曰君子示以倦則請出不敢勤君子也侍坐於君子君子問更端則起而對正義鄭氏康成曰起對謂離席而對敬異事也君子必令復坐孔氏穎達曰更端别事也謂鄉語已畢更問他事吕氏大臨曰起而對因事有所變而起敬也朱氏申曰問者異事則對者異儀通論陳氏櫟曰君子更前事而别問一端則不敢坐對如曾子侍坐子問至徳要道曾子避席而對子命之復坐是也侍坐於君子若有告者曰少間願有復也則左右屏而待間音閑屏必領反正義鄭氏康成曰復白也言欲湏少空間有所白也屏猶退也隐也孔氏穎達曰左右避之不得廹也吕氏大臨曰屏而待不敢干其私也間謂閒隙聘禮賔曰俟間亦此意也方氏慤曰少間願有復則機事之欲密者也故左右屏而待焉既屏而又待者防君子之有所召楊氏鼎熙曰必待者以君子未命退也餘論戴氏溪曰夫禮少事長求進不求退故必長者有欲退之意而後少者敢求退焉大抵少者雖勞不憚而長者不可使少勞也少者雖乆立無􅊣而長者不可使乆坐也案此以上雜舉侍坐之禮盖子之侍父弟子之侍師凡於所尊者大略同也毋側聼毋噭應毋淫視毋怠荒噭古弔反正義鄭氏康成曰噭呼號之聲也淫視睇眄也怠荒放散身體也孔疏噭謂聲高急應荅宜徐徐而和也淫謂流移也目當直瞻視不得邪眄怠荒謂放縱不自拘斂陳氏櫟曰此言通戒敬身者當如是也毋傾側其耳以聼與不傾聼同陳氏澔曰上言聼必恭側耳以聼非恭也應荅之聲宜和平髙急者悖戾之所𤼵也淫視流動邪眄也怠荒謂容止縱慢存疑鄭氏康成曰側聼耳屬於垣嫌探人之私也孔疏側聼謂壁聼旁人私言也孔氏穎達曰已下亦侍君子之法案此數節謂人容貌之常皆當敬而不可敖慢邪辟即不侍君子亦當然也鄭以側聼為耳屬於垣恐非正義遊毋倨立毋跛坐毋箕寢毋伏倨音據跛彼義反又波我反正義鄭氏康成曰跛偏任也孔疏跛謂挈舉一足一足踏地立宜如齊伏覆也孔疏寝卧也卧當或側或仰而不可覆也孔氏穎達曰箕謂舒展兩足状如箕舌也朱氏申曰遊宴逰也倨傲也跛足不正也寝毋伏伏則失仰側之莭也徐氏師曽曰行當恭謹立當整齊坐必斂足寝不如尸皆敬也案徐訓逰為行良是揖者行容之俯逰者行容之仰逰則易倨故戒之通論胡氏銓曰坐毋箕尉佗箕踞而坐斂髮毋髢髢徒細反正義鄭氏康成曰髢髲也毋垂餘髮如髲也孔疏古人垂髮以纚韜之不使垂如髲人案纚長六尺以之韜髮安得復有垂餘如髲疑女以髮多為美故加髢而後以纚韜之男子但取斂髮不得加髢嫌為婦飾也冠毋免勞毋袒暑毋褰裳免如字袒徒旱反正義鄭氏康成曰免去也孔疏冠常著在首不可脱褰袪也皆為其不敬也孔疏雖炎熱不得褰袪取凉孔氏穎達曰袒露也雖有疲勞之事厭患其衣而不得袒露身體通論陳氏祥道曰立毋跛而魯之有司跛倚者禮之所棄坐毋箕而原壤夷俟孔子之所非古之飬老則袒而割牲祭祀則袒而迎牲喪禮以袒踊為孝喪服以袒免為制士虞則鉤袒取黍稷大射則袒決遂執弓然則袒豈先王之所不為以為無故而袒則非禮也盖先王以人不知服飾之為禮也為之冠以旌其首為之屨以重其足為之衣以充其身束則有帶佩則有玉深衣毋見膚絺綌必有表凡惡其無文而已餘論方氏慤曰冠固有時而可免若居喪之類則冠可免矣勞固有時乎可袒若割牲之類則勞可袒矣㳺氏桂曰人之所患在徇其意之所安而不由於正人之所安其病有五曰傾邪曰放縱曰惰偷曰倨慢曰輕易側聼淫視傾邪者也怠荒及立而跛冠而免勞而袒暑而褰裳惰偷者也噭應斂髮而髢輕易者也逰而倨坐而箕寝而伏放縱倨傲者也此五者禮之所禁也君子持身未論其他獨於視聼遊行坐立臥起衣冠之際而自克焉斯過半矣總論吕氏大臨曰頭容欲直故毋側聼聲容欲静故毋噭應目容欲端故毋淫視氣容欲肅故毋怠荒足容欲重故逰毋倨立如齊故毋跛坐如尸故毋箕正其衣冠故斂髮毋髢冠毋免勞毋袒暑毋褰裳侍坐於長者屨不上於堂解屨不敢當階上時掌反正義鄭氏康成曰屨賤空則不陳於尊者之側不敢當階為妨後升者孔氏穎達曰長者在堂故屨脱於階下若長者在室則得著屨上堂不得入室解脱也觧屦綦也初升時觧屨置階側吕氏大臨曰屨云觧者屨有繋也士禮夏葛屨冬白屨案此句誤禮緇布冠𤣥端黑屨皮弁服白屨爵弁服纁屨冬則皮屦可也組綦繋於踵言有繋也胡氏銓曰不當階自卑㢲也存疑林氏光朝曰屦著綦屦之有繋欲足之加斂也觧屨而後登堂不敢凟也古人觧屨則結襪而前徐氏師曽曰此言初至解屦之法案古人無所為襪詩邪幅在下則君亦見其邪幅矣左傳帶裳偪舄昭其度也褚師聲子以足疾襪而登席其君怒之欲斮其足則襪非禮服無疾不用可知或謂履字從舟襪字從栰皆取載義韓非子言文王襪繋自結之漢魏人辭賦中所言襪皆指女人似襪薄輕而履重厚襪即屨非今人所謂襪也林氏解屨則結襪而前未知何據就屨跪而舉之屏於側正義鄭氏康成曰就屨謂獨退也就猶著也屏亦不敢當階孔疏屏退於側不當階也孔氏穎達曰若獨暫退則先往階側跪舉取之案屏於側仍不敢當階與同退鄉長者而屨異盖此一人獨退長者未必視之也鄉長者而屨跪而遷屨俯而納屨鄉去聲正義鄭氏康成曰不得屏遷之而已俯俛也納内也遷或為還孔疏少者禮畢退去則就階側跪取屨移前近既取因俯身鄉長者而納足著之孔氏穎達曰納屨不跪者跪則足鄉後不便故但俯也雖不竝跪亦坐左納右坐右納左徐氏師曽曰此終退納屨之法面鄉長者而著之恐背尊也将屨之時則就階側跪取稍移近前欲便著也方屨之時則不跪而但俯身納之亦便著也通論陳氏祥道曰禮凡祭於室中堂上無跣燕則有之故特牲少牢饋食自主人以至凡執事皆不脱屨而尸坐亦不脱屨以其侍神不敢燕惰也若夫登坐於燕飲侍坐於長者無不脱屨以其盡歡致親不敢不跣也故在堂則屨不上於堂在室則屨不入於户排闔脱屨於户内者一人而已有尊長在則否然則君屦不下於堂不出於室矣解屨必屏於側取屨必隐辟納屨必鄉長者遷之必跪納之必俯脱之必主人先左賔先右納之必坐左納右坐右納左則屨之脱納皆有儀矣屨之為物有以不脱為敬有以脱為敬鄉飲鄉射禮未畢不脱屨祭祀尸未謖不脫屨此以不脱為敬也及升堂燕私則脱焉此以脱為敬也昔褚師聲子襪而登席其君㦸手而怒之此知脱屨而不知跣也後世人臣脱屨然後升堂此知致敬而不知非坐不脱屦也餘論王氏炎曰解屨取屦其事甚小古人至謹如此敬長之心誠一舉足而不敢忘矣存疑鄭氏康成曰鄉長者而屨謂長者送之也辨正朱子曰注云長者送之恐非是但謂雖降階出户猶鄉長者不敢背耳案侍坐者羣退則長者亦自送之故必鄉長者而屨不敢背也離坐離立毋往參焉離立者不出中閒正義鄭氏康成曰為干人私也離兩也孔氏穎達曰見彼或二人併坐或併立恐密有所論已不得輒往參預二人併立當已行路則辟之不得輒當其中間出也方氏慤曰兩相麗之謂離三相成之謂參彼坐立者兩人而我一人往焉則成為參矣案兩相麗之謂離即未必有私而我往參其間亦非慎以持己謙以待人之道故記戒之男女不雜坐不同椸枷不同巾櫛不親授椸羊支反枷與架同正義鄭氏康成曰此以下皆為重别防淫亂也不雜坐謂男子在堂女子在房也椸可以枷衣者孔氏穎達曰不親授者男女有物不親相授也内則云其相授則以篚無篚則皆坐奠之而後取之陳氏櫟曰施衣其上曰椸加衣其上曰枷朱氏申曰以拭物而上下通用者謂之巾以治髮而疎密有節者謂之櫛陳氏澔曰内則注云植者曰楎横者曰椸枷與架同置衣服之具也巾以涗潔櫛以理髮此四者皆所以逺私䙝之嫌嫂叔不通問諸母不漱裳漱悉侯反正義鄭氏康成曰通問謂相稱謝也諸母庶母也漱澣也庶母賤可使漱衣不可使漱裳裳賤尊之者亦所以逺别孔氏穎達曰諸母謂父之諸妾有子者朱氏申曰不通問禮問不敢䙝也陳氏澔曰不通問無問遺之往来也裳賤服不使漱裳亦敬父之道也外言不入於梱内言不出於梱梱苦本反正義鄭氏康成曰外言内言男女之職也孔疏男職在官政女職在織紝不出入者不以相問也孔疏各有限域不得濫預陳氏櫟曰梱中門限所以限内外也外言不入梱男不言内也内言不出梱女不言外也女子許嫁纓非有大故不入其門正義鄭氏康成曰女子許嫁繋纓有從人之端也大故宫中有災變若疾病乃後入也女子有宫者亦謂由命士以上也孔氏穎達曰女子婦人通稱也婦人質弱不能自固必有繋屬故恆繋纓纓有二時一是少時常佩香纓内則云男女未冠笄紟纓是也二是許嫁時繋纓主人入親説婦纓鄭注婦人十五許嫁笄而禮之因著纓是也盖以五采為之其制未聞又内則曰婦事舅姑紟纓以此而言故知有二纓也大故謂喪病之屬女子已許嫁則有宫門列為成人惟有喪病䓁乃可入其門胡氏銓曰繋纓有固束之義劉氏彛曰女子許嫁纓所以繋屬其心以著誠於夫氏起其孝義也既許嫁則有姆教之處於梱内之别室男子非有疾憂之故不入其門也林氏光朝曰内則子生七年則男女不同席不共食於童稚之時而教之逺嫌也婦人十五而許嫁則繋纓笄成人之飾纓許嫁則繋之不入其門者謂許嫁則異宫而處也姑姊妹女子子已嫁而反兄弟弗與同席而坐弗與同器而食父子不同席正義鄭氏康成曰女子十年而不出嫁及成人可以出矣猶不與男子共席而坐亦逺别也孔疏兄弟弗與同席而坐者雖已嫁及成人猶宜别席孔氏穎達曰女子謂己之女男子女子皆是父所生之子男則單稱子女則於子之上加女子二字以别於男子故云女子子也熊氏云兄弟弗與同席同器未嫁亦然陳氏櫟曰父之姊妹曰姑己之女兄弟曰姊妹己之女曰女子子若已嫁而歸寕還家兄弟弗與同席而坐弗與同器而食通論吕氏大臨曰人之所以異於禽獸者以有别也有别者先於男女天地之義人倫之始内則曰禮始於謹夫婦為宫室辨外内男子居外婦人居内深宫固門閽寺守之男不入女不出所以别於居處者至矣非祭非喪不相授器其相授則女授以篚其無篚則皆坐奠之而後取之不雜坐不通乞假内言不出外言不入所以别於往来者至矣道路男子由右婦人由左女子出門必擁蔽其面夜行以燭無燭則止御婦人則進左手所以别於出入者至矣外内不共井不共湢浴不通寝席不通衣裳不同椸枷不同巾櫛不敢縣於夫之楎椸不敢藏於夫之箧笥所以别於服御噐用者至矣姑姊妹女子子天屬也許嫁則非有大故不入其門已嫁而反則不與同席而坐同器而食嫂與諸母同宫之親也嫂叔則不通問諸母則不漱裳妻之母婚姻之近屬也壻見主婦闔扉立於其内壻立於門外東面主婦一拜壻答再拜主婦又拜壻出所以别於宗族婚姻者至矣男女非有行媒不相知名非受幣不交不親必日月以告君齊戒以告鬼神為酒食以召鄉黨僚友取妻不取同姓買妾不知其姓則卜之寡婦之子非有見焉則弗與為友所以厚别於交際者至矣男女不雜坐經雖無文然喪祭之禮男女之位異矣男子在堂則女子在房男子在堂下則女子在堂上男子在東方則女子在西方坐亦當然陳氏祥道曰同藏惟七十可也親授惟喪祭可也通問惟援溺可也内言不出而有所謂出外言不入而有所謂入周官内小臣達王后之好事於四方則内言出於梱矣内宰以隂禮教六宫則外言入於梱矣盖先王制禮惟嫌疑無别而已嫌疑有以别雖内言之出外言之入可也存異鄭氏康成曰父子不同席異尊卑也孔氏穎達曰不云姪及父惟云兄弟者姪父尊卑禮殊不嫌也辨正吕氏大臨曰父子不同席者此承上女子子已嫁而言父子之間雖男子猶不同席况女子已嫁而反者乎故因而言之陳氏櫟曰女子子以父視則子也亦不同席而坐今人單舉此句施之父子之同筵者非矣姚氏舜牧曰詩曰女子有行逺父母兄弟則出嫁之女父亦不當與之同席矣案不言姪者以父子兄弟親而姪疎其宜逺嫌猶易見耳孔疏姪父尊卑禮殊不嫌全失禮意男女非有行媒不相知名非受幣不交不親正義鄭氏康成曰男女有媒往来傳婚姻之言乃相知姓名孔疏先湏媒氏行傳婚姻之意後乃知名重别有禮乃相纒固孔氏穎達曰昏禮有六禮二曰問名幣謂聘之𤣥纁束帛先湏禮幣然後可交親也馬氏睎孟曰非行媒不相知名以逺嫌也非受幣不交不親以致敬也王氏炎曰昏禮納采而後問名故非行媒不相知名納吉而後納徴故受幣而後相親愛餘論方氏慤曰先王立媒氏以通内外故謂之行媒行者往来有所通之謂也非是而相知名則為褻矣非受幣不交不親者周官凡嫁子娶妻入幣純帛無過五兩於外則以之行禮於内則以之将意行禮於外所以交之也将意於内所以親之也故日月以告君齊戒以告鬼神為酒食以召鄉黨僚友以厚其别也齊側皆反别彼列反正義鄭氏康成曰周禮凡取判妻入子者媒氏書之以告君孔疏男女湏辨故歸来則書取婦之年月日以告國君昏禮凡受女之禮皆於廟為神席以告鬼神孔疏受六禮並在廟布席告先祖也明女是先祖之遺體不可専輒許人為酒食以㑹賔客也厚重慎也杜氏預曰禮逆女必先告祖廟而後行孔氏穎達曰齊戒謂嫁女之家而取婦之家父命子親迎竝自齊潔但在寝不在廟也夫家若無父母則三月廟見亦是告鬼神馬氏睎孟曰明而尊者莫如君書日月以詔之幽而嚴者莫如鬼神致齊戒以告之近而親者莫如鄉黨僚友為飲食以命之所以備禮而厚其别也邵氏淵曰日月告君以示不失時齊戒告鬼神以示不敢専召鄉黨僚友以示同其慶如是而男女之别厚方氏慤曰鄉黨在私而同國者也僚友在公而同官者也為酒食以召之且以見婚姻之道合乎公私之議也陳氏澔曰厚其别者重慎男女之倫也案周禮媒氏掌萬民之判乃主合婚姻之官非記所謂行媒也行媒者将合婚姻必使媒通言始行納采問名之禮至納吉後行納徴禮必有幣純帛無過五兩五兩用五疋疋四丈從兩頭卷之則五兩為十端每端二丈侈則費不給簡則禮不備曰無過則庶人不必備大夫不可踰也而昏禮成夫然後請期親迎焉故曰非受幣不交不親至日月以告君有位者固然在士庶則告於官即告於君矣若齊戒以告鬼神則鄭惟指女父母謂以先祖遺體許人不敢専輒白虎通謂男不告廟示不必安然左傳楚圍言告於荘共之廟而来鄭忽先配後祖鍼子譏之儀禮父命子親迎曰往迎爾相承我宗事則男亦當先告廟矣記者故謂重厚此男女之别也取妻不取同姓故買妾不知其姓則卜之取娶通下同正義鄭氏康成曰為其近禽獸也妾賤或時非媵取之於賤者世無夲繋故卜之孔疏鄭謂妾賤或非媵者諸侯取一國之女則二國同姓以姪娣媵媵送也妾送嫡行則明知姓氏大夫士取亦各有妾媵或時非此媵類取於賤者不知何姓之後朱氏申曰取同姓是無别也邵氏淵曰取妻不取同姓買妾必卜其姓所以重宗也通論方氏慤曰昭公之取於呉是失取妻之禮矣晉侯之有四姬是失買妾之禮矣陳司敗鄭子産所以譏之也存異熊氏安生曰卜者卜吉凶既不知其姓但卜吉則取之案此條鄭注未詳及之熊氏之説孔氏采入為疏後儒因皆夲此為説但上文曰不取同姓此曰不知其姓明以辨姓為重也故卜之者乃卜其姓之同與否耳又案古天子賜姓諸侯命氏然姓必賜於天子而氏不必皆命於諸侯如魯孔氏以祖孔父字為氏而姓子鄭孔張以祖子孔字為氏而姓姬衛之孔圉則孔氏而姞姓陳之孔寕則孔氏而媯姓氏同而姓異彰彰也其餘或以官為氏如司馬牛然其兄魋或稱向魋或稱桓魋則又以其祖為氏一家而三氏矣盖氏或其人自繋之或他人舉以目之不必皆命於諸侯也故惟門祚最顯者則姓與氏並著其側陋之家有夲無姓而或以其祖之字或以其祖之官或即所居之地以為氏者或夲有姓而式微轉徙忘其姓但記其氏者古人最重婚姻取妻必世家大族未有不知其姓者買妾則不知其姓者有之故卜之如有媯之後将育於姜則亦可因卜而决其與我同姓否也自熊氏但卜其吉凶之説而此義晦矣喪服小記書銘婦人書姓與伯仲若不知其姓則書氏則此時不知其姓必多故為之權禮如此寡婦之子非有見焉弗與為友見賢遍反正義鄭氏康成曰避嫌也有見謂有竒才卓然衆人所知孔氏穎達曰寡婦無夫若其子凡庸與其來往則於寡婦有嫌也陳氏澔曰非有好徳之實則難以避好色之嫌故取友者謹之餘論彭氏絲曰不與往来豈徒避嫌亦以礪孤子之徳慧術知禮豈徒然哉總論孔氏穎達曰男女不雜坐至弗與為友總明逺嫌之法賀取妻者曰某子使某聞子有客使某羞正義鄭氏康成曰賀謂不左賔客之中使人往者孔疏謂親朋友有昏已有事礙不得自往而遣人往也羞進也古者謂候為進孔疏古時謂迎客為進漢時謂迎客為候其禮盖壺酒束脩若犬也不斥主人昏禮不賀孔氏穎達曰昏禮有嗣代之序故不賀此云賀者聞彼昏而致筐篚将表厚意身實不往為賀故其辭不稱賀曰某子使某者此使者辭也某子賀者名使某使自稱名也言彼使我来也聞子呼取妻者為子也不賀故云聞子有客也使某羞者使某将此酒食與子進賔客也吕氏大臨曰郊特牲云昏禮不賀人之序也賀者以物遺人而有所慶也昏禮嘉禮也然著代以為先祖後人子之所不得已故不用樂即不賀也雖曰不賀然為酒食以召鄉黨僚友則問遺不可廢也故其辭曰聞子有客使某羞舍曰昏禮而謂之有客則所以羞者佐其共具之費以待鄉黨僚友而已非賀也言賀因俗之名吴氏澄曰此言為彼取妻而致餽遺其辭如此也案此節因上言昏取而附記之前章云為酒食以召鄉黨僚友即有客之謂也惟以供具之助為問遺之端使授受皆得其宜而仍不違於禮之不賀此古人措辭之善也貧者不以貨財為禮老者不以筋力為禮正義鄭氏康成曰禮許儉不非無也年五十始杖八十拜君命一坐再至吕氏大臨曰君子之於禮不責人之所不能備不責人之所不能行禮者敬而已矣心茍在敬財力之不足非禮之訾也陳氏祥道曰禮非貨財不足以為文非筋力不足以為儀貧者不足於貨財老者不足於筋力於其不足而責之以為禮則不恕矣通論吕氏大臨曰潢汙行潦可薦於鬼神瓠葉首不以㣲薄廢禮此不以貨財者也五十杖於家至一坐再至此不以筋力者也又有法之所不得為者有疾而不能行者臨難而不得已者土地之所不有者君子亦不責也王子為其母請數月之喪法之所不得為者也喪禮秃者不免傴者不袒跛者不踊此有疾而不能行者也嫂溺則援之以手同室有鬬被髮纓冠而救之此臨難而不得已也居山不以魚鼈為禮居川不以鹿豕為禮此土地之所不有也凡此皆禮之變也餘論陳氏祥道曰古者凶荒則殺禮況貧者乎聘射之禮非强有力者不能行况老者乎案此一節眀用禮之宜所謂以權制者也責貧以財則禮廢於貧責老以力則禮廢於老如是在己可以自安在人可以不責名子者不以國不以日月不以隐疾不以山川正義鄭氏康成曰此在常語之中為後難諱也春秋傳曰名終将諱之隐疾衣中之疾也謂若黑臀黑肱孔疏宣二年晉使趙穿迎公子黒臀於周而立之昭元年楚公子黒肱昭三十一年邾黒肱疾在外者雖不得言猶可指摘此則無時可辟杜氏預曰隠痛疾患避不祥也孔氏穎達曰以國衛侯晉晉侯周是也甲乙丙丁殷家以為名殷質不諱故也魯僖公名申蔡荘公名甲午者周末不能如禮山川魯獻公名具武公名敖此皆不能如禮者也陳氏澔曰常語易及則避諱為難通論李氏曰魯申繻言不以國不以官不以山川不以隠疾不以畜牲不以器幣蓋諸侯有百官有祭祀有噐幣有牲庶人名之則可也徐氏師曾曰申繻對魯桓公曰名有五名生為信案杜注若唐叔虞魯公子友徳命為義案杜注若文王昌武王𤼵類命為象案杜注若仲尼首象尼丘取於物為假案杜注若伯魚生君饋之鯉取於父為類案杜注若魯荘公與父同日又曰以官則廢軄案杜注若晉僖侯改司徒為中軍宋武公改司空為司城以畜牲則廢祀以器幣則廢禮此可以補曲禮之闕餘論吕氏大臨曰名子者必有所辟以其終将諱也國天子之所封也日月天下之達稱也隠疾者人之所難言也山川者國之望也名之必可言也所難言者不可傳於人故不以隐疾也名之必将諱之諱之必將改之改天子之所封則不敬上改天下之達稱則不同乎俗改國之望則不敬鬼神春秋之時名子之禮廢犯此四禁而莫之恤也陳氏祥道曰名子之禮世子適子則名之於君庶子衆子則名之於有司大夫士庶之子皆名之於父其名之之禮雖殊而名之之戒則一古人之於命物也猶曰名之必可言也况名子乎魏王昶之名子也以元黙冲虚為稱欲使顧名思義而已存疑孔氏穎達曰不以國者不以夲國為名他國即得為名案如孔説則魯公名宋衛侯名鄭皆禮所得為而㑹同大與相朝於廟将易其國乎抑不諱乎恐亦非是男女異長長知兩反正義鄭氏康成曰各自為伯季也孔疏案冠禮加字之時伯某甫仲叔季惟其所當又檀弓云幼名冠字五十以伯仲知女子亦自為叔季者春秋伯姬歸於紀叔姬歸於紀是也孔氏穎達曰文家稱叔案管叔以下皆稱叔惟末為耼季云質家稱仲嫡長稱伯案若衛共伯庶長稱孟案若魯孟孫黄氏震曰異長亦示别也陳氏澔曰各為伯仲示不相干雜之義也男子二十冠而字冠去聲正義鄭氏康成曰冠是成人矣敬其名朱氏申曰二十曰弱冠已冠而字之成人之道也父前子名君前臣名正義鄭氏康成曰對至尊無大小皆相名孔疏鄢陵之戰欒書欲載晉侯鍼曰書退鍼是書之于對晉侯而稱名是於君前臣名其父也賈氏公彦曰名是受於父母為質字者受於賔為文故君父之前稱名至於他人稱字是敬其名也陳氏祥道曰家無二長故父前無伯仲之稱國無二上故君前無爵位之稱吕氏大臨曰事父者家無二尊雖母不敢以抗之故無長幼皆名不敢致私敬於其長也事君者國無二尊雖父不敢以抗之故無貴賤尊卑皆名不敢致私敬於所尊也通論胡氏銓曰父前子名君前臣名宣十五年申犀謂楚王曰毋畏知死而不敢廢王命襄二十一年欒盈謂王行人曰陪臣書皆名其父於君前也於他國君前亦然成三年荀罃謂楚王曰以賜君之外臣首餘論方氏慤曰字緣名生固以敬其名經言廟中不諱與父前子名同意又言君所無私諱與君前臣名同意女子許嫁笄而字正義鄭氏康成曰女子以許嫁為成人黄氏震曰字以尊名男冠女笄皆成人而字惟君父之前則名陳氏澔曰許嫁則十五而笄未許嫁則二十而筓亦成人之道也故字之餘論王氏子墨曰男子伯仲叔季之序達於四方女子之長少不出閨闥其各為長宜也既冠成人敬其名而字之宜也而有時乎名之者君父之前尊有所伸則私有所屈也女子之笄猶男子之冠閨門之内亦當敬其名不言許嫁之年不可以豫定也聖人之制禮未嘗不謹其㣲也男女之别居有堂室之分衣有椸枷之異所以為内外之辨亦至矣而必異其長以眀其無所不當别異也凡進食之禮左殽右胾食居人之左羮居人之右膾炙處外醯醤處内蔥㳿處末酒漿處右以脯脩置者左朐右末殽户交反胾側吏反食音嗣膾古外反炙張夜反醯呼奚反㳿以至反漿子羊反朐其居反正義鄭氏康成曰左右皆便食也殽骨體也胾切肉也殽在俎孔疏左傳王享士㑹殽烝下云宴有折俎少牢特牲禮皆骨體在俎胾在豆孔疏公食大夫禮庶羞十六豆有牛胾羊胾食飯屬居人左右明其近也孔疏此饌之設羮食最近人外内殽胾之外内也孔疏羮食之外乃有殽胾故膾炙在殽胾外醯醤在殽胾内不得在羮食内也膾炙皆在豆醯醤食之主故近㳿烝蔥也處醯醤之左言末者殊加也孔疏地道尊右則末在左蔥㳿文繼醯醤之下故知在醯醤之左儀禮正饌惟有菹醢無蔥㳿故鄭以蔥㳿為殊加也㳿在豆酒漿處羮之右言若酒若漿爾兩有之則左酒右漿孔疏卑客則或酒或漿若尊客則有酒有漿此大夫士與賔客燕食之禮其禮食則宜放公食大夫禮云左朐右末亦便食也屈中曰朐孔疏左朐以中屈處置左也右末以末邉際置右也右手取末際擘食之便脯脩處酒左以燥為陽也孔氏頴達曰熟肉帶骨而臠曰殽純肉切之曰胾骨是陽故在左肉是隂故在右飯燥為陽故左羮濕是隂故右醯字徐音作醢則醢之與醤兩物各别依昏禮及公食大夫禮醤在右醢在左此醯醤處内亦當醤右醯左也案公食大夫禮宰夫自東方授醯醤公設之鄭注以醯和醤又周禮醯人共齊菹醯物則醯醤共為一物也今此記文若作醯字則是一物醯之與醢其義皆通未知孰是但鄭注蔥㳿云處醯醤之左則醯醤一物為勝以脯脩置者設食竟所湏也脯訓作始始作即成脩訓治脩治之乃成鄭注腊人云薄析曰脯捶而施薑桂曰腵脩朱氏申曰膾炙異饌故處外醯醤食主故處内蔥㳿㣲物故處末酒漿盛禮故處右彭氏絲曰膾牛羊魚肉聶而切之為膾也炙燔肉也處外處殽胾之外也此加饌非主也故在外醯醋也案食禮復設酒漿者盖食畢用漿以滌口用酒以演氣也通論吕氏大臨曰據此章所陳饌與辭遜之節雖與公食大夫禮少有不同其大略無甚異恐此即大夫士與賔客禮之節也公食大夫禮三牲之俎在左庶羞之豆在右俎實皆殽殽骨體也羞豆有胾胾切肉也此則左殽右胾矣公食大夫禮庶羞之豆有膾有炙設於稻南簋西則處外矣公設醯醤於席前則處内矣此其所同也公食大夫禮設黍稷六簋於俎西設鉶四於豆西俎豆南則鉶簋同列矣簋實食也鉶實羮也無左右之别也公食大夫禮飲酒實於觶設於豆東漿飲設於稻西豆東則左稻西則右是左酒右漿不俱在右又無蔥㳿脯脩之品此其所異也鄉飲酒之禮以飲為主故先酌酒以行獻酢食禮以食為主故卒食設酒以酳之不獻也左右内外之設皆便於食因以寓隂陽之義也左氏傳粢食不鑿玉藻云稷食菜羮皆飯也醯醤食之主也公食大夫禮賔将食宰夫自東方授醯醤公設之卒食賔取粱與醤興以降貴食之主也膾炙庶羞也庶羞非正食加饌而已為主者在内加者在外此所以分内外也蔥㳿亦加品與膾炙同物故處末末與外皆陽也酒漿與羮同物故處右右隂也若兩有酒漿則左酒右漿酒陽漿隂也脯脩皆胊案彭氏燕食禮圖其第一行食左羮右最近人其第二行蔥㳿在左醯醤在蔥㳿之右脯脩又在醯醤之右脯脩皆有朐則胊左末右又酒漿在脯脩之右則酒左漿右較脯脩處稍近人第三行為殽胾則殽左胾右第四行為膾炙則炙左膾右最在外今據鄭注細玩之當是食左羮右醯又在食之左醤又在羮之右蔥㳿又在醯之左酒漿又在醤之右共為一行最近人第二行為殽胾三行為膾炙客若降等執食興辭主人興辭於客然後客坐食音嗣正義鄭氏康成曰辭者辭主人之臨已食若欲食於堂下然坐復坐也孔氏穎達曰降下等也謂大夫為卿之客其品等卑下也執捉也興起也客既卑故未食先執飯起以辭謝主人飯為食主故特執之客既興辭故主人亦起辭止之則客從辭而止乃復坐食也吕氏大臨曰降等謂大夫於卿士於大夫也但執食興辭而不下堂陳氏澔曰不敢當主賔之禮故食至則執之以起而致辭於主人案凡飲食之禮臣於君則降食於堂下公食大夫禮云賔左擁簠粱右執湇以降是也若賔主相敵無降理公食大夫禮云大夫相食賔執粱與湇之西序端是也惟大夫於卿則欲降而不降此記云客若降等執食興辭是也凡卑㓜食於尊長而尊長賔之其禮皆然陳氏所謂不敢當賔主之禮是也主人延客祭祭食祭所先進殽之序徧祭之食鄭如字胡音嗣正義鄭氏康成曰延道也祭祭先也孔疏延客祭者君子得食則種種出少許置在豆間之地以報先代造食之人君子有事不忘夲也客若降等則先祭孔疏敵客則得自祭不湏主人之延道也殽之序徧祭之謂胾炙膾也以其夲出於牲體也孔疏雖同出牲體而祭必次序徧匝祭之公食大夫禮魚腊湇醤不祭也吕氏大臨曰延客祭者客卑於主人客不敢先必延之而後祭也殽謂骨體如特牲少牢尸飯舉幹舉骼舉肩皆振祭是謂徧祭朱子曰古人祭酒於地祭食於豆閒有板盛之卒食徹去通論陳氏祥道曰古者於爨則祭先炊於樂則祭樂祖将射則祭侯用火則祭司爟用龜則祭先卜養老則祭先老於馬則祭馬祖馬社於田則祭先嗇司嗇於學則祭先聖先師凡此不忘夲也又况飲食之間哉存疑鄭氏康成曰主人所先進先祭之所後進後祭之如其次也辨正胡氏銓曰祭食祭所先進食飯也黍稷稻粱之屬所先進者則祭之後者不祭若殽之序則徧祭徧皆也徐氏師曾曰此卑客就食之儀若敵則不必然夫禮要於中而已矣案鄭意祭食謂所食之殽胡以飯與殽對舉似胡得之但公食大夫禮黍稷粱稻皆祭此非於君故略與三飯主人延客食胾然後辯殽飯扶晚反辯音徧下同正義鄭氏康成曰延客先食胾後食殽殽尊也凡食殽辯於肩食肩則飽也孔疏食胾竟後乃始辯殽辯匝也主人道客令食至飽故食殽得匝也特牲少牢云初食殽次食脊次食骼後食肩辯於肩則飽也孔氏穎達曰三飯謂三飧也案朝曰饔夕曰飧此三飯不應以飧言飧疑餐字之誤禮食三飧而告飽湏勸乃更食三飯竟主人乃道客食胾也公食大夫禮云賔三飯以湇醤鄭云每飯歠湇以殽擩醤食正饌也是三飯但食醤及他饌而未食胾也所以至三飯後乃食胾者以胾為加故客三飧前未食之然公食禮三飧竟不云延客食胾與此異案公食大夫君禮也此主賔禮自當有異賈氏公彦曰公食大夫為禮食故先食殽此大夫士與客燕食故先食胾吕氏大臨曰既食胾則徧食之所謂辯殽也徧食如尸嚌之是也先儒以此殽為膾炙膾炙禮謂之庶羞非殽也案分言之則羊豕魚腊為正饌臐膮炙胾為加饌通言之則凡列皆謂之殽所謂徧祭者謂徧舉骨體而祭也胾加豆也客既三飯主人延客食加所以盡其勤也馬氏睎孟曰飲食惟魚腊醤湇不祭以其非物之盛則餘殽莫不徧祭也飲禮三爵而退食禮三飯而止者不盡人之歡非専為飲食之義也故三飯主人延客食胾然後辯殽盖主人之加禮則義不可辭也主人未辯客不虚口正義鄭氏康成曰客不虚口俟主人也虚口謂酳也客自敵以上其酳不待主人飽主人不先飽也孔疏虚口謂食竟飲酒蕩口使清潔及安食也用漿曰潄令口以潔清為義用酒曰酳酳訓演言食畢以酒演養其氣客雖食殽已匝不得輙酳盖主人常讓客不自先飽故客待主人辯乃酳孔氏穎達曰此謂卑客案公食禮雖設酒優賔不得用酳但以漿漱口此是私客故用酒以酳也吕氏大臨曰降等之客必俟主人徧食殽胾乃敢卒食而酳盖有所待也存疑胡氏銓曰疏謂公食之禮雖設酒為優賔不得用酳故鄭注彼云但以漿漱口而已則此虚口安知其酳邪或曰客雖已飽而主人未辯客必㣲有所食若食猶未竟者然案客降等若士之於大夫既非均敵又不若大夫之於君其等懸殊故介於二者之閒最宜細㸔進食之序左殽右胾右近人便於食故先胾而後殽又胾純肉為隂卑殽帶骨為陽尊卑先食尊後食也公食大夫酳以漿此私客自當以酒以漿以酒皆可謂之虚口亦不必泥侍食於長者主人親饋則拜而食主人不親饋則不拜而食饋羣媿反正義鄭氏康成曰勸長者食耳雖賤不得執食興辭拜而已示敬也不拜以其禮於己不隆通論吕氏大臨曰凡稱侍者少賤之於長者毋敢視賔客也若執弟子職而侍之侍飲侍食侍坐皆然以賔主之義不全故無執食興辭之節也若長者加禮略申賔主之敬而親饋之則拜之而已若不親饋則主人之敬不足亦不必拜也存疑孔氏穎達曰鄉是自為客法此眀侍從尊長為客禮也饋謂進饌也已雖侍尊長而主人若自親饋與巳巳則拜謝之而後食也張子曰從長者而就人食若主人親饋及已則拜而食若不親饋則禮非為我不拜而食不敢當其禮也與雖貳不辭同義徐氏師曾曰侍長者而為客非自為客也故雖少無執食興辭之禮但視主人之施而答之耳案上是降等之客此侍食於長者則侍者非客長者亦未嘗客之也此長者即是主人若如孔疏是侍長者而食於人非侍食於長者而長者與主人為二人矣張子徐氏皆從孔疏案侍食於長者與後侍飲於長者句法正同孔後訓長者賜侍者酒則此亦長者賜侍者食耳安得云從長者而為客乎鄭云勸長者食盖子侍父食臣侍君食無不當勸者㸔侍字甚眀共食不飽共飯不澤手飯扶晚反下放飯飯黍竝同正義鄭氏康成曰不飽謙也孔疏共食宜謙不輙厭飫為飽謂共羮飯之大器也不澤手為汗手不潔也案陸氏釋文汗下半反夲或作汙今攷釋訓捼莎則從汗為是澤謂捼莎也禮飯以手澤或為擇孔疏古之禮飯不用箸但用手與人共飯手宜潔净不得臨食始捼莎手乃食恐為人所穢也吕氏大臨曰共食者所食非一品共飯者止飯而已凡與人共者必先人而後己厚人而薄己共食而求飽非讓道也古人之飯者以手與人共飯摩手而有澤人将惡之而難言也存疑張子曰共飯不澤手必有物以取之不使濡其手共飯雖食共一器必各有器以取之案古人飯皆以手下言摶飯其眀徴也惟飯黍用匕耳此共飯夲大槩言之張子乃以飯黍之匕槩之稻粱其説未確毋摶飯毋放飯毋流歠摶徒端反上飯如字下飯音反歠川悦反正義鄭氏康成曰摶飯謂欲致飽不謙也孔疏取飯作摶則易得多是欲爭飽非謙也流歠大歠嫌欲疾也孔疏謂開口大歠汁入口如水流則欲多而速是傷亷也吕氏大臨曰食言放羮言流皆貪肆飲食而無容也朱子曰放飯大飯謂食之放肆而無所節流歠謂長歠飲之流行而不知止也通論吕氏大臨曰孟子曰放飯流歠而問無齒决齒決之失小而流放之過大也存疑鄭氏康成曰放飯去手餘飯於噐中人所穢也孔氏穎達曰手就器中取飯若粘著手不得拂放夲器中當棄於篚無篚棄於㑹㑹謂簋盖也案鄭孔說亦可通但如此則非不敬之大與孟子不合毋咤食毋齧骨毋反魚肉毋投與狗骨毋固獲咤陟嫁反齧五結反正義鄭氏康成曰咤嫌薄也齧謂有聲響不敬反魚肉為己歴口人所穢也投骨為其賤飲食之物固𫉬為其不廉也孔氏穎達曰咤謂以舌口中作聲齧骨一則有聲二則嫌主人食無肉三則齧之口唇可憎也魚肉與人同器若已齧殘不得反還噐中髙氏愈曰已取而復反之病其揀擇少牢禮尸所食之餘肉皆别置於肵俎投致也食肉後毋棄其骨與犬為賤飲食之物案且恐致犬爭驚衆亂席也固𫉬謂與人共食不可専固獨得及爭取也吕氏大臨曰毋咤食當食叱咤惡無容也毋固𫉬惡必得也陳氏澔曰毋咤恐似於氣之怒也存異姚氏舜牧曰毋反魚肉謂器中尚有餘不必以箸反掀而盡食之案此讀反為翻古人牲體載之有序無可翻也鄭氏康成曰欲専之曰固爭取曰𫉬案反還也姚讀為翻非是固𫉬只必得之意鄭分専屬固争屬𫉬非毋揚飯飯黍毋以箸箸直慮反正義鄭氏康成曰揚飯亦嫌欲疾也孔氏穎達曰飯熱當待冷若揚去熱氣則為貪快傷亷飯黍當用匕故少牢廩人溉匕注云匕所以匕黍稷也彭氏汝礪曰匕今之匙吕氏大臨曰飯黍以箸惡用非所宜也陳氏澔曰毋以箸貴其匕之便也案黍稷稻粱皆可為飯黍極黏難以手取故或有用箸者箸梜也羮有菜者可用箸飯不可用箸當用匕也孔疏引溉匕注兼稷言誤黍黏稷不黏不必用匕也毋嚃羮毋絮羮毋刺齒毋歠醢客絮羮主人辭不能亨客歠醢主人辭以窶嚃他答反絮敕慮反刺七亦反醢音海亨普彭反窶其雨反正義鄭氏康成曰嚃為不嚼菜亦嫌欲疾也孔疏羮有菜當梜嚼若含而歠吞之是欲速而多又有聲不敬也絮猶調也為其詳於味也孔疏絮謂噐中調和鹽梅是嫌主人味惡也刺齒為其㺯口也口容止孔疏口容欲静止不得刺弄之為不敬歠醢為其淡故亦嫌詳於味也孔疏醢肉醤也醤宜鹹客若歠之則是醤淡也主人兩辭優賔也孔疏客失禮而絮羮則主人謝之云已家不能亨煮故味不調適客失禮而歠醢則主人亦致謝云作醢淡而無鹽故可歠皆以優饒於賔也吕氏大臨曰毋刺齒取齒閒之餘也醢之味厚非可歠而歠之則味薄可知濡肉齒決乾肉不齒決毋嘬炙濡仁朱反乾音干嘬初怪反正義鄭氏康成曰決猶斷也孔疏濡濕也濕軟不可用手擘故用齒斷乾肉堅宜用手孔疏乾肉脯肉也堅肕不可齒斷故湏用手擘徐氏師曾曰各有宜也嘬炙為其貪食甚也嘬謂一舉盡臠特牲少牢嚌之加於俎孔疏火灼曰炙若食炙肉先當以齒嚌而反置俎上嘬者不細齧一舉而并食之也餘論馬氏睎孟曰君子於觴酒豆肉之閒未嘗不致謙而養亷也卒食客自前跪徹飯齊以授相者主人興辭於客然後客坐卒子恤反齊将兮反相息亮反正義鄭氏康成曰謙也自從也齊醤屬也相者主人賛饌者孔疏相者謂主人佐助進食者賓以所徹飯齊授之公食大夫禮賔卒食北面取粱與醤以降也興辭不聽親徹孔氏穎達曰卒食食已也食坐南鄉客食竟起從坐前北面當已坐而跪自徹己所食飯與齊以授相者飯齊食主故也答主人初所親饋者也齊醤菹通名耳此是卑者侍食之禮敵者則否陳氏櫟曰飯與齊皆主人所親設故客皆親徹謙也吕氏大臨曰主人興辭於客然後客坐此與客降等執食興辭之義同敵者則不親徹也存疑張子曰此錯簡當在前章客不虚口之下侍飲於長者酒進則起拜受於尊所長者辭少者反席而飲長者舉未釂少者不敢飲少時照反釂子妙反正義鄭氏康成曰降席拜受敬也燕飲之禮鄉尊案鄉飲不鄉尊飲字似誤疏不明駁疏例不駁注也盡爵曰釂不敢飲不敢先長者飲也孔疏湏待長者盡爵後少者乃得飲也燕禮曰公卒爵而後飲也孔疏燕禮曰受賜爵者以爵就席坐公卒爵然後飲鄭注不敢先虚爵眀恵從尊者来也然此與燕禮合與士相見及玉藻違士相見及玉藻皆云卒爵而俟君卒爵然後授虚爵二文皆先君卒爵者謂私燕之禮此據燕飲正禮故不同也酬案此賜爵乃無算爵時惟公命所賜者非與賔獻之爵士相見禮亦略其文孔氏穎達曰眀侍尊長飲酒法也食竟宜飲酒故次之長者賜侍者酒進至侍者前侍者不敢即飲起而拜受於尊處謂陳尊之所貴賤不同若諸侯燕禮大射設尊東楹之西自北鄉南陳之酌者在尊東西鄉以酌者之左為上尊尊面有鼻鼻鄉君示君専有此恵也若鄉飲酒及鄉大夫燕則設尊房户之閒東西列尊尊面鄉南酌者鄉北以西為上尊時主在阼賓在戸西牖前南鄉賔主夾尊示不敢専恵也今云拜受於尊所當是燕禮而燕禮不言拜受鄉飲亦無此語疑文不具近尊鄉長者故往於尊所鄉長者而拜長者辭少者之起案起當作拜故少者復反還其席而飲賜酒也舉猶飲也王氏安石曰拜受於尊所此是初進酒時一拜受耳不然則已煩矣徐氏師曾曰受爵則聽於長者飲酒則後於長者皆敬也案燕禮有賔賓主禮既成下大夫媵爵於公而後公為賔舉旅再媵爵而後公為卿舉旅為大夫舉旅賔媵爵於公而後公為士舉旅至無算爵而後公命賜執膳爵者賜執散爵者則雖拜受執之而不敢飲必公卒爵而後敢飲也鄭引之以証不敢飲之意而不與上反席而飲句違者盖所謂反席而飲特将飲未飲必待長者釂而後敢飲也長者賜少者賤者不敢辭正義鄭氏康成曰不敢亢禮也賤者僮僕之屬孔疏敵者亢而有辭少者賤者則不敢被長者之賜宜即受也孔氏穎達曰少謂㓜稚吕氏大臨曰辭遜之節行於賔主之際而已體不敵則毋敢視賔客徐氏師曾曰此因上節而并記之盖䝉酒食而言推之凡賜亦當如是賜果於君前其有核者懐其核核户革反正義鄭氏康成曰懐核嫌棄尊者物也木實曰果吕氏大臨曰果核當棄重君賜故懐之徐氏師曾曰不敢棄於地也御食於君君賜餘器之溉者不寫其餘皆寫溉古愛反正義鄭氏康成曰重汙辱君之器也溉謂陶梓之器孔疏陶是瓦甒之屬梓是杯杅之屬不溉謂萑竹之噐也孔疏萑葦也是織萑為之器竹是織竹為之器並是筐筥之屬也寫者傳已噐中乃食之也勸侑曰御孔氏穎達曰君賜餘者謂君食竟以食殘餘賜御者也器可滌溉者不畏汙則於器中食之食訖則滌以還君也其餘不可溉滌之器若不倒寫則浸汙其器壊尊者物也故皆倒寫之吕氏大臨曰二者皆廣敬也總論戴氏溪曰果核餘物也不敢棄君之餘器用㣲物也不敢同君之器所以習臣子恭順之心於人情慢易之際也餕餘不祭父不祭子夫不祭妻餕子閏反正義鄭氏康成曰食人之餘曰餕朱子曰餕餘之物不可祭先祖雖父不以祭子夫不以祭妻不敢以鬼神之餘復以祭也陳氏櫟曰雖父於子夫扵妻亦不以餕餘祭之非特不以薦先也徐氏師曾曰此承上章賜餘而言盖受君之賜當熟以祭惟是餕餘則不祭戒䙝也盖君雖當尊而祭亦當重忠孝兩盡之道也存疑鄭氏康成曰餕而不祭惟此類也食尊者之餘則祭盛之孔氏穎達曰凡食人之餘及日晚食朝饌之餘皆云餕凡食餘悉祭惟父得子餘夫得妻餘則不祭言其卑故也非此二條悉祭熊氏安生曰父得有子餘者謂年老致事傳家事於子孫子孫有賔客之事故父得餕其餘夫餕其妻餘者謂宗婦與族人婦燕飲有餘夫得食之戴氏溪曰餕餘不祭與父不祭子夫不祭妻義不相屬父不祭子夫不祭妻各使其子主之示有尊也案以尊臨卑死者之靈必有所不安故當祭則使人攝之也辨正朱子曰二句承上面餕餘不祭說如孔子君賜腥則非餕餘雖熟之以薦先祖可也賜食則或為餕餘但可正席先嘗而已祭只是祭祀之祭非飲食必有祭之祭案先儒皆以為飲食之祭故難説如廟中餕鬼神之餘皆祭日中而餕亦祭故此節斷以朱子說為正御同於長者雖貳不辭偶坐不辭正義鄭氏康成曰御同謂侍食於長者饌具與之同也貳謂重殽膳也辭之為長者嫌孔疏御謂侍也侍者雖𫉬殽膳重而已不湏辭其多也所以然者此饌夲為長者設耳若辭之則嫌當長者也偶坐盛饌不為己孔疏偶媲也或彼為客設饌而召已往媲偶於客共食此饌夲不為己設故不辭之也一云偶二也若惟獨有己主人設饌己當辭謝若與他人俱坐則己不假辭以主人意不必在己也通論馬氏曰禮者施報而已主人之禮在我不辭非禮也主人之禮不在我辭之亦非禮也存異朱氏申曰御同於長者與長者同御食於君雖貳不辭貳重膳盛禮也禮意施於長者而不在己故不必辭偶坐偶然而坐禮意亦不在己也羮之有菜者用梜其無菜者不用梜梜古協反正義鄭氏康成曰梜猶箸也孔氏穎達曰有菜鉶羮是也以其有菜交横非梜不可無菜者謂大羮湇也直歠之而已其有肉調者犬羮羮之屬或當用匕也為天子削瓜者副之巾以絺為國君者華之巾以綌為大夫累之士疐之庶人齕之為去聲副普偪反華胡瓜反累力果反疐音帝齕恨沒反正義鄭氏康成曰副析也既削又四析之乃横斷之而巾覆焉孔疏刋其皮而析為四解又横解而以細葛布覆之而進也華中裂之不四析也孔疏諸侯禮降故破而不四析亦横斷之用麤葛巾覆之而進也累倮也謂不巾覆也士不中裂横斷去疐而已庶人不横斷孔氏穎達曰削刊也絺細葛綌麤葛也爾雅曰瓜曰華之疐謂脱華處庶人府史之屬齕齧也此削瓜等級非謂平常之日當是公庭大㑹之時吕氏大臨曰削瓜有等亦以辨上下也自大夫以上皆削故曰為天子為國君為大夫以下不削故曰士疐之庶人齕之累之如裸裎之裸也方氏慤曰瓜必用巾以奉尊者不敢褻其物也必以絺綌當暑以凉為貴也湯氏三才曰此亦槩論食瓜之禮食瓜之制先刊皮次半破次四析次横斷次巾覆天子分尊而制獨隆故五者兼有之諸侯有四而又降其一謂麤葛也大夫有三不四析不巾覆然猶削也士只有二不刊皮不四析不巾覆庶人只有一惟以手齕之而同半破即一食瓜而正名定分之意寓焉通論劉氏彛曰三代之王於府史胥徒女奚莫不用禮以竭其忠孝之誠也如内饔之割烹外饔之刑膴辟雞宛脾熬母珍捶曲盡精㣲皆有制度而况瓜為時新必薦寝廟也大夫已上皆曰為者有司為之也士庶人不曰為者自為之也欽定禮記義疏卷三
