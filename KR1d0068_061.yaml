body:
  text: 祭義第二十四之二宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也衆生必死死必歸土此之謂鬼骨肉斃於下隂為野土其氣發揚於上為昭明焄蒿悽愴此百物之精也神之著也因物之精制為之極明命鬼神以為黔首則百衆以畏萬民以服魄普白反斃婢世反隂依注讀蔭焄許云反蒿許羔反黔其亷反正義鄭氏康成曰氣謂噓吸出入者也耳目之聰明為魄合鬼與神而祭之聖人之教致之也隂讀為依蔭之蔭言人之骨肉蔭於地中為土壤焄謂香臭也蒿謂氣蒸出貌也蒿或為藨以先言衆生又言百物明其與人同也不如人貴耳明命猶尊名也尊極於鬼神不可復加也黔首謂民也孔疏黔黑也以黑巾蒙頭漢家僕隸曰蒼頭以蒼巾為飾史記秦命民曰黔首此記必後人變改之朱豫曰黑髮之民則法也為民作法使民亦事其祖禰鬼神民所畏服孔氏穎達曰氣之體噓吸出入無性識也但性識依此氣而生有氣則有識無氣則無識識從氣生性則神出入也故人之精靈謂之神魄體也若無耳目形體不得為聰明故人之耳目聰明為魄人之死其神與形體分散各別聖人以生存之時神形和合今雖身死聚合鬼神似生人而祭之是聖人設教致之令其如此也物之羣衆而生必皆有死此本説人因及物也鬼歸也歸土之形故謂之鬼骨肉斃於下陰為野土此覆説歸之義下又申明人氣為神人生則形體與氣合而生死則形與氣分人氣之精魂發揚而升於上為神靈光明也百物之氣或香或臭蒸而上出其氣蒿然此等之氣人聞之其情有悽有愴人與百物共同但人情識為多人氣發揚於上為昭明是人神之顯著故特謂之神也案孔疏以焄蒿為死者蒸出之氣悽愴為人感此氣之情此百物所同昭明為人所獨故曰神之著分晰最眀鬼神本是人與物之魂魄若直名魂魄其名不尊聖人因人與物死之精靈遂制造為尊極之稱尊而名之為鬼神以為萬民之法則也百衆謂百官衆庶萬民謂天下衆民既敬之以鬼神故下皆畏敬之也方氏慤曰神者陽之所為鬼者隂之所為也言氣則知魄之為形言魄則知氣之為魂魂亦神也此止言氣者以氣為魂之本而魂非神之盛故也形亦鬼也此止言魄者以形為魄之本而形非鬼之盛故也以主其盛者故止言氣魄而巳陸氏佃曰魂亦神也氣其盛者也體亦鬼也魄其盛者也氣有升而巳魄有降而巳唯聖人為能求而合之以教天下故曰教之至也葉氏夢得曰易曰精氣為物遊魂為變物者其聚也變者其散也郊特牲謂魂氣歸於天形魄歸於地歸於天者知氣升自上也歸於地者體魄降自下也聚散者天之道故精氣猶謂之物升降者人之道故魂氣亦謂之神蓋魂與氣無不之無不在則為神之盛體與魄有所歸有所化故為鬼之盛鬼神皆潛於幽而祭以合饗之使民敬畏此所以為教之至也朱子曰如鬼神之露光處是昭明其氣蒸上處是焄蒿使人精神悚然是悽愴又曰鬼神固是以理言然亦不可無氣所以先王祭祀或以燔燎或以鬱鬯以其有氣故以類求之爾吳氏澄曰氣者謂人之魂氣死則其魂氣之靈為神魄謂人之體魄死則其體魄之靈為鬼通論孔氏穎達曰此經鬼神本為人故下文築為宮室設為宗祧其實亦兼山川五祀百物之屬故禮運列於鬼神注云謂祖廟山川五祀之屬樂記幽則有鬼神注云助天地成物者是百物之魂謂之鬼對則精靈為魂形體為魄故昭七年左傳云人生始化曰魄既生魄陽曰魂是形為魄氣為魂若散而言之魄亦性識識與魄無異故昭二十五年左傳云心之精爽是謂魂魄魂魄去之何以能久又襄二十九年左傳云天奪伯有魄又對而言之則天曰神地曰示人曰鬼散而言之通曰鬼神張子曰禮記凡言鬼神者大率以隂陽出入言之鬼神一物也以其歸故謂之鬼歸者自無形中來復歸於無形自有形中來者復歸於有形是歸也魄也者鬼之盛指有形體而言神伸也鬼歸也物之所生即是神及其終則歸也又曰精氣為物遊魂為變精氣者自無而有遊魂者自有而無自無而有神之情也自有而無鬼之情也自無而有故顯而為物自有而無故隱而為變顯而為物者神之狀也隱而為變者鬼之狀也大意不越有無而巳物變而巳物雖是實本自虛來故謂之神變雖是虛本緣實得故謂之鬼此與上所言神無形而有用鬼有形而無用亦相會朱子曰易中説遊魂為變却只説一邊精氣為物精氣聚則成物精氣散則無物氣為魂精為魄魂升為神魄降為鬼易只説那升者如殂落之義則是兼言之又曰子産有言物生始化曰魄既生魄陽曰魂孔子曰氣也者神之盛也魄也者鬼之盛也鄭氏注曰噓吸出入者氣也耳目之聰眀為魄氣則魂之謂也淮南子曰天氣為魂地氣為魄髙誘注曰魂人陽神也魄人隂神也此數説者其於魂魄之義詳矣蓋嘗推之物生始化云者謂受形之初精血之聚其間有靈者名之曰魄也既生魄陽曰魂者既生此魄便有暖氣其間有神者名之曰魂也二者既合然後有物易所謂精氣為物是也及其散也則魂遊而為神魄降而為鬼矣説者乃不考此而但據左疏之言其以神靈分隂陽者雖若有理但以噓吸之動者為魄則失之矣其言附形之靈附氣之神似亦近是但其下文所分又不免於有差其謂魄識少而魂識多亦非也但有運用蓄藏之異耳又曰隂主藏受陽主運用凡能記憶皆魄之所藏受也至於運用發出來是魂這兩箇物事本不相離他能記憶底是魄然發出底便是魂能知覺底是魄然知覺發出來底又是魂雖各自分屬隂陽然隂陽中又各自有隂陽也問陽魂為神隂魄為鬼祭義曰氣也者神之盛也魄也者鬼之盛也而鄭氏云氣噓吸出入者也耳目之聰明為魄然則隂陽未可言鬼神隂陽之靈乃鬼神也如何曰魄者形之神魂者氣之神魂魄是形氣之精英謂之靈故張子曰二氣之良能二氣即隂陽也良能是其靈處問眼體也眼之光為魄耳體也何以為耳之魄曰能聼者便是如鼻之知臭舌之知味皆是但不可以知字為魄才説知便是主於心也心但能知若甘苦鹹淡要從舌上過如老人耳重目昏便是魄漸要散問魂附於體氣附於魂可作如是看否曰也不是附魂魄是形氣之精英問陽主伸隂主屈鬼神隂陽之靈不過指一氣之屈伸往來者而言耳天地之間隂陽合散何物不有所以錯綜看得曰固是今且説大界限則周禮言天曰神地曰示人曰鬼三者皆有神而天獨曰神以其常常流動不息故專以神言之若人亦自有神但在人身上則謂之神散則謂之鬼耳鬼是散而靜了更無形故曰往而不返又曰人之精神知覺與夫運動云為皆是神但氣是充盛發於外者故謂之神之盛四肢九竅與夫精血之類皆是魄但耳目能視能聼而精明故謂之鬼之盛案鬼神固是天地之功用二氣之良能人之所以成終而成始但此章專就人身上説以明宗廟祭祀所由起也言人之生有是氣乃有是形形之知覺為魄神即鬼而成有是形即載是氣氣之運動為魂鬼即神而在此人之生惟鬼與神合也然氣聚而形成氣散而形亦化人不能不與百物同而人於百物中得天地之氣之最靈而又食味別聲被色博取百物之精以為精故其死也魄降於下骨肉蔭為野土其謂之鬼者未嘗不與百物同但物有死而即泯者有其升騰而為焄蒿且觸於物而使物悽愴者其氣不盛其神亦不著人則骨肉之氣發揚於上為焄蒿悽愴者獨昭明焉蓋其魄具百物之精故神之著至於如此是氣雖與魄離而神未嘗不即鬼而著故聖人因此百物之精而即命之曰鬼神以合之也語意純重一合字上人之異於物在百物之精故祭之備物亦原取百物之精以合之總論孔氏穎達曰自此至先王先公敬之至也一節明宰我問鬼神之事夫子答以鬼神魂魄祭祀之禮又廣明天子諸侯耕藉及公桑之事聖人以是為未足也築為宫室設為宗祧以別親疏逺邇教民反古復始不忘其所由生也衆之服自此故聼且速也正義鄭氏康成曰自由也言人由此服於聖人之教也聼謂順教令也速疾也孔氏穎達曰此明聖人為鬼神立宗廟之事聖人以尊名鬼神為未足稱其意故為宫室宗祧以別親疏逺邇教民反古復始也古謂先祖追而祭之是反古也始謂初始父母始生於已今追祭祀是復始也追逺報祭是不忘其所由生也衆人服從於下一由此反古復始而教之故在下順其政令而且速疾也劉氏彝曰所以別其親疏者立祖禰之道也所以辨其逺邇者定宗祧之數也方氏慤曰聼言其不拒速言教之所以神也慕容氏彥逢曰親而邇者為宗疏而逺者為祧此宗祧所以別親疏逺邇也廟有寢祧無寢廟則修除祧則黝堊此宫室所以別親疏逺邇也二端既立報以二禮建設朝事燔燎羶薌見以蕭光以報氣也此教衆反始也薦黍稷羞肝肺首心見間以俠甒加以鬱鬯以報魄也教民相愛上下用情禮之至也燔音煩燎力召反又力弔反羶鄭讀馨方如字薌音香見鄭讀覸方如字見間鄭合為覸字音間厠之間俠古洽反甒音武心案家語無見以蕭光及首二字正義鄭氏康成曰二端既立謂氣也魄也更有尊名云鬼神也二禮謂朝事與薦黍稷也朝事謂薦血腥時也薦黍稷所謂饋食也見及見間皆當為覵字之誤也羶當為馨聲之誤也燔燎馨香覸以蕭光取牲祭脂也孔疏詩生民篇取蕭祭脂取蒿及牲雜燒之光猶氣也有虞氏祭首夏后氏祭心殷祭肝周祭肺孔疏明堂位文覸以俠甒謂雜之兩甒醴酒也孔疏士喪禮既夕篇以甒盛醴天子追享朝踐用大尊此甒也或子男禮禮器云君尊瓦甒相愛用情謂此以人道祭之也報氣以氣報魄以實各首其類孔疏燔燎蕭光是氣報氣以氣還以馨香虛氣報之黍稷肺肝之屬是實報魄以實還以黍稷實物報之各本其事類也孔氏穎達曰此論氣魄既殊明設祭之時二禮亦異既立謂尊名立也報此氣魄以二種祭禮報氣謂朝踐之節也報魄謂饋孰之節也建設朝事燔燎羶薌見以蕭光此明朝踐報氣之義也朝事謂早朝祭事燔燎謂取膟膋燎於爐炭覸謂雜也燔膟膋兼爇蕭蒿是雜以蕭氣此三者是報氣也此祭氣是古者尚質之義所以教衆反於初始總包上反古復始也薦黍稷羞肺肝首心覸以夾甒加以鬱鬯謂饋孰時薦此黍稷進肝與肺及首與心雜以兩甒醴酒加以鬱鬯言更加以鬱鬯然後薦黍稷也饋孰報魄之時始云加鬱鬯者言非但薦孰是報魄祭初所加鬱鬯亦是報魄也以魄在地下鬱鬯灌地雖是祭初亦報魄不當薦孰之時故云加也以報魄也言薦黍以下皆是報祭形魄也相愛用情者上以恩賜逮下下受上恩賜故上下用情此饋孰時皆以飲食遍於燕飲是教民相愛至謂至極謂報氣報魄二禮備足是禮之至極也陸氏佃曰凡祭朝踐尊而饋食親尊故曰教衆反始親故曰教民相愛方氏慤曰二端既立謂立鬼神之名與宗祧之制也報以二禮謂報氣報魄之禮也建言立其禮設言陳其物羶天産之臭也薌地産之臭也染蕭以膟膋故有羶合蕭以黍稷故有薌燔燎羶薌則蕭與膟膋黍稷并合而見矣故曰見以蕭光凡此皆以臭為主臭為陽故曰以報氣也氣以陽生而有所始故曰教衆反始也甒蓋瓦器有兩甒故曰俠即司尊彝所謂間祀用大尊是矣言瓦甒之大尊則鬱鬯之為虎彝可知不及時祭則舉大以該小爾以諸物見於夾甒之間故曰覸以俠甒又副之以鬱鬯之彝故曰加以鬱鬯加與加籩加豆之加同義宗廟之祭灌而後獻此於鬯言加者以尊尊而彝卑故也凡此皆以味為主而味為隂故曰以報魄也隂聚而有所愛故曰教民相愛於報氣言朝事則知報魄為饋食矣蓋朝事以象朝事其親所進也饋食以象食時所進也於報魄言黍稷之類則報氣有血腥之類可知然瓦甒之所獻鬱鬯之所灌皆非饋食之事此則并言之時雖不同其為報魄則一也上言反始則知下之為成終下言相愛則知上之為致敬凡此皆互言之耳存疑孔氏穎達曰一祭再焫蕭郊特牲取膟膋報陽朝踐焫蕭也又云既奠然後焫蕭饋孰焫蕭也案一祭不再焫蕭辨正巳見郊特牲陸氏佃曰此一節蓋言殷禮殷人尊神先鬼而後禮方言明命鬼神故主殷禮言之殷人先求諸陽故此朝事焫蕭以報氣也饋食灌鬯以報魄也然則殷人祭首無祼事以樂侑獻而巳殷人尚聲蓋當此節故曰樂三闋然後出迎牲羞肝肺首心郊特牲言肺在上此言肝在上以方言殷禮故也眀堂位曰殷祭肝周祭肺見間蓋謂陳設中間若喪禮所謂見以不見為見也據禮藏器於旁加見又曰甕甒筲桁實見間而後折入周人先求諸隂於朝踐祭齊加明水以報隂殷人先求諸陽於饋獻祭酒加鬱鬯以報魄其義一也據此周人有求有報殷人直報而已其報之也亦所以求之也故曰周人先求諸隂殷人先求諸陽方氏慤曰報氣所以求陽乎上是用情於上也報魄所以求隂乎下是用情於下也上下用情則二禮之報無以復加故曰禮之至也案鄭所謂相愛用情謂此以人道事之者蓋報氣主於敬燔燎羶薌以神道事之也敬也報魄主於愛黍稷牲醴以人道事之也愛也敬則禮伸愛則情洽用情如告孝告慈之類如是則上而祖考下而子孫愛且用情矣由是以教民而君民之情愛通焉敬愛洽於斯民所以為禮之至也方説亦似但燔燎與用情義既未洽且教衆教民之後當推其效以結之不應又敘二禮也至陸氏殷禮説亦注家習語始終傅會居多不足為訓存異慕容氏彥逢曰郊特牲曰祭求諸隂陽之義禮運曰以嘉魂魄是謂合莫蓋燔以求諸陽灌以求諸隂所謂二禮也二者朝事之所行而鄭以薦黍稷為饋食之時失之矣夫求神必於祭始而祭之始必合鬼神以嘉魂魄所謂臭隂達於淵泉是也周人先求諸隂既灌然後迎牲至饋食而後報魄求諸隂不已後乎况灌用鬱鬯貴氣用肝肺首心與黍稷同為朝事之時所用非必有於薦孰之時也膟膋為羶黍稷為薌故謂之羶薌鄭氏以羶為馨誤矣案報氣惟燔燎一節報魄有薦黍稷等四節據周官司尊彝雞彝鳥彝在朝踐之先則此記當先鬱鬯而後燔燎今置鬱鬯於二禮之末則記本錯綜言之蓋以灌鬯求神於隂亦是報魄故併歸報魄條內而置之二禮之末也朝事饋食並有黍稷但朝事時用黍稷以燔燎未用以薦至饋孰時乃薦黍稷也儀禮特牲少牢薦熟之禮黍稷在敦心舌在肵俎離肺刌肺在尸俎酳尸則以肝從此記云羞肝肺首心在薦黍稷之下則薦熟時亦用首至朝事之節惟郊特牲升首於室為用首耳心及肝肺僅於薦熟時用之禮經之説甚眀不得謂肺肝首心同為朝事之用也眀堂位言祭首乃統朝事饋食言之其下云祭心祭肝祭肺則專指饋孰時無惑矣周禮膳夫惟羊稱羶而廟祭不止于羊故鄭以馨字易之慕容之説俱未確君子反古復始不忘其所由生也是以致其敬發其情竭力從事以報其親不敢弗盡也正義鄭氏康成曰從事謂修薦可以祭者也孔氏穎達曰此申明反古復始竭力報親之事致其恭敬發其情性竭盡氣力以從其事上報於親不敢不極盡也方氏慤曰致敬發情于內故能竭力從事於外報如上所言報氣報魄皆報親之事盡謂內盡志外盡物也輔氏廣曰自致其敬已下所謂致反始之道也發其情謂發露其情如所謂用其情也家語夫子之答止此却繼以前文王之祭至必哀是故昔者天子為藉千畝冕而朱紘躬秉耒諸侯為藉百畝冕而青紘躬秉耒以事天地山川社稷先古以為醴酪齊盛於是乎取之敬之至也紘音宏酪音洛齊音咨正義鄭氏康成曰藉藉田也先古先祖孔氏穎達曰以君子報親不敢不盡心以事之故古者天子諸侯有藉田以親耕祭祀諸神須醴酪齊盛之屬於是乎藉田而取之敬之至也方氏慤曰天子之田方千里故為藉千畝諸侯之田方百里故為藉百畝亦各以其稱而巳耕必服冕則所以敬其事秉耒則所以躬耕也天地則指天子言之山川社稷先古則兼諸侯言之先古謂若先公及先聖先師之類案鄭云先古先祖以此篇論祭專於言孝且下公桑言先王先公也但推言之亦無礙通論陳氏祥道曰南郊正陽之位朱紘正陽之色也東郊少陽之位青紘少陽之色也其時則春秋傳曰啓蟄而郊郊而後耕是也其日則月令曰乃擇元辰是也其祭則祈社稷於內享先農於外國語曰膳夫農正陳藉禮是也其禮則后妃六宫贊事於內司空后稷大師瞽師鬱人犧人膳夫農正司徒大師贊事於外周禮內宰詔后帥六宫之人生穜稑之種獻之於王國語曰大師告稷司空除壇之類是也親載耒耜猶農者之出疆也載必措於保介之御間又眀勸農者也反執爵於大寢公卿諸侯大夫皆御命曰勞酒此春耕之終事也若夫夏耨秋穫王又至焉國語所謂耨穫亦於藉是也考之於禮蠟合萬物而索饗之則羣小祀也其禮主先嗇先嗇先農也王以玄冕祭之則耕藉之祭先農其服玄冕可知也小司徒凡小祭祀奉牛牲羞其肆鄭氏謂小祭祀王玄冕所祭者則祭先農用牛牲可知也王之藉掌以甸師而諸侯亦有甸人則諸侯之禮與王略同矣古者天子諸侯必有養獸之官及歲時齊戒沐浴而躬朝之犧牷祭牲必於是取之敬之至也君召牛納而視之擇其毛而卜之吉然後養之君皮辨素積朔月月半君巡牲所以致力孝之至也朝直遙反牷音全正義鄭氏康成曰歲時齊戒沐浴而躬朝之謂將祭祀卜牲君朔月月半巡視之君召牛納而視之更本擇牲意孔氏穎達曰此明孝子報親竭力養牲之事歲時謂每歲依時謂朔月月半也躬親也既卜牲吉在牢養之而身朝之言朝者敬辭也犧牷所祭之牲必是養獸之官受擇取之養獸者周禮牧人也初擇牲時君於牧處命取牛納之於內而視之君皮辨素積朔月月半君巡牲者即前言歲時朝之也巡行也皮辨諸侯視朔之服朔月月半君服此衣而巡牲所以致其力耕藉云敬之至養牲云孝之至互文也方氏慤曰自養獸之官而下所云即牧人阜蕃其物之時也自君召牛而下所云即充人繫於牢之時也繫於牢則芻之三月而已故朔望巡之阜蕃其物則不止三月也故歲時朝之君召牛納而視之所謂展牲是也擇其毛所謂陽祀用騂牲毛之隂祀用黝牲毛之是也卜之吉然後養之所謂帝牛不吉以為稷牛是也未卜止謂之牛既卜乃謂之牲召之則未卜故曰牛巡之則卜之矣故曰牲未卜謂之牛而上言祭牲者蓋取之將以為祭牲故也皮辨素積者君視朝之服也君以視朝之服而巡之所以極其辨也先王父天母地則以子道自處焉推而及於山川社稷亦由是也故凡所以事鬼神之道皆稱孝焉論語曰菲飲食而致孝乎鬼神歲時者謂比歲比時也皮辨素積見郊特牲解存疑鄭氏康成曰犧謂天子牷謂諸侯牲案犧言其色之純牲言其體之具似天子諸侯所同也古者天子諸侯必有公桑蠶室近川而為之築宫仭有三尺棘牆而外閉之及大昕之朝君皮辨素積卜三宫之夫人世婦之吉者使入蠶于蠶室奉種浴于川桑于公桑風戾以食之歲既單矣世婦卒蠶奉繭以示于君遂獻繭于夫人夫人曰此所以為君服與遂副褘而受之因少牢以禮之古之獻繭者其率用此與及良日夫人繅三盆手遂布于三宫夫人世婦之吉者使繅遂朱緑之玄黃之以為黼黻文章服既成君服以祀先王先公敬之至也昕許斤反奉芳勇反種章勇反戾力計反食音嗣單音丹繭古典反與音餘褘音暉繅悉刀反盆蒲奔反正義鄭氏康成曰大昕季春朔日之朝也陸氏佃曰餘日為昕朔日為大昕諸侯夫人三宫半后也風戾之者及早涼脆采之風戾之使露氣燥陸氏德明曰戾燥也乃以食蠶蠶性惡溼也歲單謂三月月盡之後也方氏慤曰一歲蠶期成故曰歲單若孟夏稱麥秋言歲者蠶歲之大功事畢於此也副褘王后之服而云夫人容二王之後與禮之禮奉繭之世婦也其率用此與問者之辭孔疏夫人曰獻繭之禮自古如此耶重事之義故問之案此句疑記者之辭由今所見以思古也三盆手者三淹也凡繅每淹大總而手振之以出緒也孔氏穎達曰此明孝子報親養蠶為祭服祀先王先公之事公桑謂官家之桑於處而築養蠶之室近川取其浴蠶種便也築宫謂築養蠶之宫牆七尺曰仞牆之七尺又有三尺髙一丈也棘牆謂牆上置棘外閉謂扇在戶外閉也世婦亦諸侯世婦前雖總舉天子諸侯此特舉諸侯互言之奉種浴於川言蠶將生而又浴之初於仲春巳浴至此更浴之也夫人曰此所以為君服與擬君之祭服故夫人首著副身著禕衣受此所獻之繭因少牢以禮之接獻繭之世婦也率法也良日謂吉日繅更擇日日至而後夫人自繅三盆手猶三淹也每淹以手振出其緒遂布與三宫夫人世婦之吉者諸侯夫人唯一人而云世婦之吉者雜互天子言之以天子有三夫人就其中取吉者蠶繅非一人擇其吉者主領而巳前文耕藉男子之事故云以事天地山川社稷兼云先祖養蠶是婦人之事婦人不與外祭故云先王先公其實養蠶為衣亦事天地山川社稷陳氏祥道曰天子諸侯之禮文而有辨故耕於南郊東郊王后夫人之禮質而少變故皆蠶於北郊築宫仞有三尺棘牆而外閉之所以謹於蠶者也其始也天子薦鞠衣於先帝以告將蠶內宰詔后帥內外命婦以趨蠶事而后之首飾以編服以鞠衣屨以黃屨車以翟車貝面組總有握及郊享先蠶然後東鄉而躬桑焉躬桑后夫人之事耳天子必薦鞠衣君必皮辨素積卜三宫夫人世婦使入蠶室者內外相成之義也王耕藉后獻種王躬牲后舂盛則后夫人之躬桑王與諸侯不可不與之也躬桑不過鞠衣而受繭必以副褘者重繭之成也繅必三盆手者禮成於三也三盆手猶王藉之三推也然後布於三夫人世婦之吉者使繅遂朱緑之玄黃之以為祭服猶庶人之終畝也方氏慤曰蠶居於內故曰室牆圍於外故曰宫閽人自外閉其門以親蠶者皆婦人故也君皮辨素積與巡牲同繭則示於君而獻於夫人者示則告其成而巳獻則欲其受之以繅也禮之以少牢則所以勞其還也馬氏睎孟曰周官內宰職曰中春詔后帥內外命婦始蠶於北郊以為祭服蓋蠶於季春則詔於中春也輔氏廣曰蠶婦事也猶不敢專必待君之卜吉而後親之則他可知矣故曰地道代終存疑方氏慤曰日欲出為昕於時為卯大昕則向辰矣案文王世子大昕亦謂朔日卜于朔敬事也方説非存異陸氏佃曰單如衣單也絲事成於衣單麻事成於衣重案經文無衣字陸説非君子曰禮樂不可斯須去身致樂以治心則易直子諒之心油然生矣易直子諒之心生則樂樂則安安則久久則天天則神天則不言而信神則不怒而威致樂以治心者也致禮以治躬則莊敬莊敬則嚴威心中斯須不和不樂而鄙詐之心入之矣外貌斯須不莊不敬而慢易之心入之矣故樂也者動於內者也禮也者動於外者也樂極和禮極順內和而外順則民瞻其顔色而不與爭也望其容貌而衆不生慢易焉故德輝動乎內而民莫不承聼理發乎外而衆莫不承順故曰致禮樂之道而天下塞焉舉而措之無難矣樂也者動於內者也禮也者動於外者也故禮主其減樂主其盈禮減而進以進為文樂盈而反以反為文禮減而不進則銷樂盈而不反則放故禮有報而樂有反禮得其報則樂樂得其反則安禮之報樂之反其義一也易以豉反子如字又將吏反則樂樂則之樂並音洛輝音輝正義鄭氏康成曰斯須猶須臾也子讀如不子之子諒信也油然物始生好美貌躬身也極和極順極至也理發乎外理謂言行也塞充滿也減猶倦盈猶溢也樂以統情禮以理行人之情有溢而行有倦倦則進之以能進者為文溢則使反以能反者為文文謂才美報皆當為褒聲之誤也孔氏穎達曰此一節巳具樂記故於此不繁文陸氏佃曰君子見微者也世之人慢易起於放肆而鄙詐常生於矯激然後知君子之言不誣也若申屠狄輩不知致樂以治心者也若阮籍輩不知致禮以治躬者也不曰塞乎天下而曰天下塞焉小在天下也曽子曰孝有三大孝尊親其次弗辱其下能養養羊尚反正義孔氏穎達曰大孝尊親即是下文大孝不匱聖人為天子者也尊親嚴父配天也其次弗辱謂賢人為諸侯及卿大夫士各保社稷宗廟不使傾危以辱親也與下文中孝用勞一也其下能養謂庶人也與下文小孝用力一也能養謂用天分地以養父母也黃氏裳曰曽子言孝道三自天子達庶人三者之行咸在其中謂人子能立身行道有大功於國大德及民俾人稱美其先而尊重之為上也生事之以禮死葬之以禮祭之以禮全父母遺體殁身無毁者次之生事父母盡其色養者為下也言尊親為大則弗辱能養兼之矣次言不能尊貴其親而唯弗辱能養為二也其下者謂不能尊親不辱惟能供養是孝之末節矣但論孝行升降輕重不分別名位尊卑總論孔氏穎達曰自此至可謂孝矣廣明為孝子之事公明儀問於曽子曰夫子可以為孝乎曽子曰是何言與是何言與君子之所謂孝者先意承志諭父母於道參直養者也安能為孝乎與音餘先悉薦反正義鄭氏康成曰公明儀曽子弟子孔氏穎達曰先意謂父母將欲發意孝子則預先逆知其意而為之也承志謂父母巳有其志巳當奉承而行之諭父母於道謂或在父母意先或在父母意後皆曉諭父母歸於正道也方氏慤曰徒先意承志而不能諭之於道則是苟順其令而或陷親於不義者蓋有之矣此所以又在乎諭父母於道也夫養將以為孝而所以為孝子不止於養親曽參之事其親豈直能養已哉乃自謂如此者不敢以孝自居故也唯夫不自居其孝兹其所以為孝與真氏德秀曰為人子者平時能以理開曉其親置之無過之地猶臣之事君格其非心而引之當道也其視有過而後諫者功相百矣故君子尤難之存疑馬氏睎孟曰先意所以間其邪承志所以成其美此所以諭父母於道案孝子事親惟盡其親愛之至意先意承志所以順吾親而致其親愛也如時時以不肖之心待父母即溫凊定省亦莫非防微杜漸之意是尚得為孝乎要知諭父母於道未嘗不在先意承志中而先意承志則不必為諭親於道而設方説可謂曲盡情理矣孔氏雖以諭父母於道并入先意承志中但上已詳言先意承志正義然後合諭親於道言之其説便得若馬氏説則若先意承志盡為諭親於道者窺伺之術不亦惑乎其分先意為間邪承志為成美尤未合也曽子曰身也者父母之遺體也行父母之遺體敢不敬乎居處不莊非孝也事君不忠非孝也涖官不敬非孝也朋友不信非孝也戰陳無勇非孝也五者不遂災及於親敢不敬乎亨孰羶薌嘗而薦之非孝也養也君子之所謂孝也者國人稱願然曰幸哉有子如此所謂孝也巳衆之本教曰孝其行曰養養可能也敬為難敬可能也安為難安可能也卒為難父母既沒愼行其身不遺父母惡名可謂能終矣仁者仁此者也禮者履此者也義者宜此者也信者信此者也強者強此者也樂自順此生刑自反此作陳直勤反亨普彭反孰熟同養羊尚反正義鄭氏康成曰五者不遂遂猶成也願然然猶而也孔氏穎達曰亨孰羶薌之美先自口嘗而後薦之父母此非孝也唯是供養而已孝子百行皆美一國之人稱揚羡願而曰此子父母有幸遇哉有孝子如此令人羡願如此乃所謂孝也衆之本教曰孝者言孝為衆行之根本以此根本而教於下名之曰孝不能備孝之德唯行奉上之禮但謂之養者也父母既沒巳下解卒為難之事順從孝道則和樂自至違反孝道則刑戮及身方氏慤曰孝經曰身體髮膚受之父母不敢毁傷孝之始也哀公問曰身者親之枝也敢不敬與正謂是矣身者體之全體者身之別夫一人之身生於父母而別於父母者也故曰身者父母之遺體居處也事君也涖官也朋友也戰陳也皆所以行父母之遺體也苟不莊不忠不敬不信無勇則災及其身災及其身是及其親也豈孝也哉故每以非孝言之先居處而後事君內外之序先事君而後涖官尊卑之序先涖官而後朋友公私之序先朋友而後戰陳文武之序稱者口稱其所為願者志願其如此論語云不敬何以別故敬為難揚子曰孝莫大於寧親故安為難案陳氏澔曰安為難者謂非勉強矯拂之意此亦得備一説孝經曰立身行道揚名於後世以顯父母孝之終也故卒為難所謂能終者非終父母之身終其身也哀公問曰不敬其身是傷其親然則居處之莊所以愛其親仁者仁此居處所以莊也禮者履此涖官所以敬也義者宜此事君所以忠也信者信此朋友所以信也強者強此戰陳所以勇也五者不遂災及於親況其身乎真氏德秀曰身體髮膚受之父母不敢毁傷然忠臣義士奮不顧身視死如歸何也殺身所以成仁既成仁則孝在其中矣案亨孰已下記者之言合上二章之意而申言之又推廣之以起下二章也曽子曰夫孝置之而塞乎天地溥之而橫乎四海施諸後世而無朝夕推而放諸東海而準推而放諸西海而準推而放諸南海而準推而放諸北海而準詩云自西自東自南自北無思不服此之謂也溥本亦作敷同芳于反放甫往反準諸尹反正義鄭氏康成曰無朝夕言常行無輟時也放猶至也準猶平也孔氏穎達曰置謂措置也塞滿天地謂感天地神明也溥布也橫被四海言孝道廣逺也施諸後世終長行之言久也推而至於四海以為準平而法象之無所不從也詩大雅文王有聲之詩美武王之德今孝道亦然故引以證之方氏慤曰直而立之則塞貫乎天地之間敷而散之則橫廣乎四海之內施言其出無窮故後世曽無朝夕之間推言其進之不已故放諸四海而準準言人以是為準而不差也前既言溥之橫乎四海後又言推而放諸四海蓋前言身之所行者如此後言人之所化者如此朱子曰準猶齊也言無不同也曽子曰樹木以時伐焉禽獸以時殺焉夫子曰斷一樹殺一獸不以其時非孝也孝有三小孝用力中孝用勞大孝不匱思慈愛忘勞可謂用力矣尊仁安義可謂用勞矣博施備物可謂不匱矣父母愛之喜而勿忘父母惡之懼而無怨父母有過諌而不逆父母既沒必求仁者之粟以祀之此之謂禮終斷丁管反匱其愧反施始豉反惡烏路反正義鄭氏康成曰夫子孔子也曽子述其言以云勞猶功也思慈愛忘勞思父母之慈愛巳而自忘已之勞苦也無怨無怨於父母之心諌而不逆順而諌之也必求仁者之粟喻貧困猶不取惡人物以事亡親也孔氏穎達曰庶人思父母慈愛忘巳躬耕之勞可謂用力矣諸侯卿大夫士尊重於仁安行於義心無勞倦可謂用勞矣匱乏也博施謂德教加於百姓刑於四海備物謂四海之內各以其職來助祭方氏慤曰孟子曰君子親親而仁民仁民而愛物故斷一樹殺一獸不以其時非孝也於親生育之恩則思之而不忘於已奉養之力則忘之而不思故曰用力仁所以愛親義所以敬親愛敬盡於事親可謂用勞矣用力言事用勞言功不匱言德則大小與中其別可知前以位言孝故自上以及下此以行言孝故積小以至大父母愛之喜而弗忘仁之至也父母惡之懼而無怨義之至也內則曰父母有過下氣怡色柔聲以諌不逆之謂也仁者之粟則有愛心存焉夫子受仁人之饋掃地而祭亦此之意祭之以禮禮之終也此主言祀故曰禮終又曰用力則能養矣用勞則弗辱矣不匱則可以尊親矣葉氏夢得曰忘勞者思親之慈愛未能無望於其親故曰小孝仁大矣則尊之義有理則安之仁義而巳勤行而不懈未能得天下之歡心以事其親故為中孝博施則聖矣仁不足以名之孝至於此則達於天下四海九州之美味莫不備至故為大孝通論周氏諝曰父母惡之懼而無怨然有所謂怨者也故孟子曰小辨之怨親親也父母有過諌而不逆然有所謂逆者也故荀子曰從義不從父胡氏銓曰孟子曰其交也以道君子受之受之而以祀可也然孝子之心有所不安故必仁者之粟為孝樂正子春下堂而傷其足數月不出猶有憂色門弟子曰夫子之足瘳矣數月不出猶有憂色何也樂正子春曰善如爾之問也善如爾之問也吾聞諸曽子曽子聞諸夫子曰天之所生地之所養無人為大父母全而生之子全而歸之可謂孝矣不虧其體不辱其身可謂全矣故君子頃步而弗敢忘孝也今豫忘孝之道豫是以有憂色也一舉足而不敢忘父母一出言而不敢忘父母一舉足而不敢忘父母是故道而不徑舟而不遊不敢以先父母之遺體行殆一出言而不敢忘父母是故惡言不出於口忿言不反於身不辱其身不羞其親可謂孝矣數色主反瘳丑留反頃依注作跬缺婢反又丘弭反徑古定反正義鄭氏康成曰曽子聞諸夫子述曽子所聞於孔子之言頃步頃當為跬聲之誤也豫我也道而不徑徑步邪趨疾也忿言不反於身人不能無忿怒忿怒之言當由其直直則人服不敢以忿言來也孔氏穎達曰此明父母遺體不可損傷之事天地生養萬物之中無如人最為大非特體全又須善名得全跬步謂一舉足正道平易於身無損邪徑險阻或有所傷乘舟安浮水危也此是不敢以先父母遺餘之體而行歷危患處也不辱其身不羞其親總結舉足出言二事身及親並不羞辱可謂孝矣劉氏彝曰樂正子春可謂能改其過者也失之於初而戒之於終方氏慤曰不虧其體所以全其形不辱其身所以全其德故曰可謂全矣唯己之惡言不出於口故人之忿言不反於身身者親之枝也不辱其身故不羞其親朱子曰父母者一身之父母也天地者人與物已與人皆共以為父母者也父母之生我也四支百骸無一不全必能全其身之形斯為不忝於父母天地之生我也五常百善無一不備必能全其性之理然後為不負於天地餘論周氏諝曰周官之法禁徑踰者禁川遊者是知周公之法不特有意於防微而又有以教人之孝昔者有虞氏貴德而尚齒夏后氏貴爵而尚齒殷人貴富而尚齒周人貴親而尚齒虞夏殷周天下之盛王也未有遺年者年之貴乎天下久矣次乎事親也正義鄭氏康成曰尚謂有事尊之於其黨也臣能世祿曰富孔氏穎達曰虞氏貴德德之中年髙者在前故曰尚齒夏后於貴爵之中年髙者在前殷人貴富周人貴親亦皆年髙者在前也次乎事親言貴年之次第近於事親之孝也餘論馬氏睎孟曰貴以對其民為賤尚以對其等為下四代非相反也蓋有虞氏貴德則賢者固已在位能者固已在職矣故夏后氏承之以貴爵貴爵則賢而德似其先人者使之世官不賢而不至於不由禮者使之世祿矣故殷人承之以貴富貴富則尊祖尊祖則敬宗敬宗則收族故周人承之以貴親皆因其時乘其理為之也夏后氏貴爵斯所以貴德也殷人貴富斯所以貴爵也周人貴親斯所以貴富也然貴德以賢賢貴爵以貴貴貴富以眀功貴親以厚本則四代一也齒取諸身年取諸物皆可以數言方氏慤曰四代之所貴不同由救弊之政異故也貴德之弊有至於忘君故夏后氏救之以貴爵蓋爵所以明貴賤故也貴爵之弊有至於忘功故殷人救之以貴富蓋富者所以眀世祿故也三者之弊有至於忘親故周人救之以貴親至於尚齒則未嘗易者以年之貴乎天下久矣次乎事親萬世而無弊故也存疑鄭氏康成曰貴謂燕賜有加於諸臣也舜時多仁聖有德後德則在小官孔疏鄭恐貴者皆班在上故云燕賜有加德小者先來已居大官德大者後來則居小官然德尊有虞氏貴之所以燕賜有加孔氏穎達曰虞氏帝德𢎞大故貴德夏世漸薄不能貴德而尚功故貴爵由道劣故也殷人又劣於夏故世爵而富乃貴之殷人富而疏者猶貴周人愛敬彌狹於已有親乃貴之案本經之意只以時之所貴雖有不同而無不尚齒以眀年之貴乎天下之久非如孔氏世道優劣之説也馬氏以相承為義方氏以相救為義揆之聖人窮變通久之道必兼有之然非本經正義附存之而已至鄭氏燕賜有加説則去經義益逺矣總論孔氏穎達曰前經眀孝此已下至不敢犯又兼明孝弟是故朝廷同爵則尚齒七十杖於朝君問則席八十不俟朝君問則就之而弟達乎朝廷矣朝直遙反正義鄭氏康成曰同爵尚齒老者在上也君問則席為之布席於堂上而與之言凡朝位立於庭孔疏燕禮大射卿大夫立於庭君立阼階上是皆立也魯哀公問於孔子命席孔疏儒行文不俟朝君揖之即進不待朝事畢也孔疏燕禮大射君爾卿爾大夫爾揖也於時老臣君揖即退又路寢門外視朝亦揖竟即退就之就其家也老而致仕君或不許異其禮而已孔疏不許曲禮所云若不得謝也異其禮上文所云及八十不俟朝也王制云七十不俟朝八十杖於朝則許致仕者孔氏穎達曰官爵同則貴尚於齒四代皆然七十者許之據杖於朝君有問則布席令坐弟達乎朝廷言遜弟敬老之道通達於朝廷也方氏慤曰爵同故以齒為上爾爵異則以爵為上也通論方氏慤曰孟子曰朝廷莫如爵鄉黨莫如齒蓋朝廷雖以爵為上然未嘗廢齒則此所言者是也鄉黨雖以齒為上然亦未嘗廢爵則後言三命而不齒是也陸氏佃曰祭義謂尊者也故杖於朝早杖於朝早故毋俟朝晚王制八十杖於朝七十不俟朝謂卑者也故杖於朝晚杖於朝晚故毋俟朝早行肩而不併不錯則隨見老者則車徒辟斑白者不以其任行乎道路而弟達乎道路矣居鄉以齒而老窮不遺強不犯弱衆不暴寡而弟達乎州巷矣併步頃反辟音避正義鄭氏康成曰錯鴈行也父黨隨行兄黨鴈行孔疏王制文車徒辟乘車步行皆辟老人也孔疏少者或乘車或徒行見老者皆避之徒方氏慤曰車者貴者賤斑白者髮雜色也任所擔持也不以任少者代之也老窮不遺以鄉人尊而長之雖貧且無子孫無棄忘也一鄉者五州巷猶閭也孔氏穎達曰行肩而不併謂老少並行肩臂不得併行少者差退在後則朋友肩隨是也不錯則隨者若兄黨為鴈行之差錯是父黨則隨從而為行也古之道五十不為甸徒頒禽隆諸長者而弟達乎獀狩矣軍旅什伍同爵則尚齒而弟達乎軍旅矣甸田見反頒音班長上聲獀音搜所求反狩音獸正義鄭氏康成曰四井為邑四邑為丘四丘為甸甸六十四井也以為軍田出役之法孔疏一甸之中出長轂一乘甲士三人步卒七十二人供田役事五十始衰不從力役之事也頒之言分也隆猶多也及田者分禽多其老者謂竭作未五十者春獵為獀冬獵為狩孔疏爾雅釋天文什伍士卒部曲也孔疏五人為伍二伍為什士謂甲士卒謂步卒在軍旅之中時主帥部領圍曲而聚故云部曲少儀曰軍尚左卒尚右孔氏穎達曰作記之人在於周末於時力役煩重道周初之事故云古之道也吳氏澄曰凡軍旅五人為一伍五伍為一兩五人之長曰伍長四伍長又統於一人為兩司馬尚齒各行於一兩二什四伍之中兩之外則不序四伍長爵皆下士是為同爵四人之中齒尊者先是為尚齒存疑孔氏穎達曰案小司徒云凡起徒役毋過家一人唯田與追胥竭作若田與追胥竭作此未五十者猶在田役案記言不為甸徒矣則雖竭作亦不及也孔説未的孝弟發諸朝廷行乎道路至乎州巷放乎獀狩修乎軍旅衆以義死之而弗敢犯也放方往反哀案家語此為孔子告公之辭正義鄭氏康成曰死之死此孝弟之禮孔氏穎達曰此經總結上文在上諸文但云弟此兼云孝者以孝故能弟弟則孝之次也孝弟之道無處不行故衆行孝弟雖死不捨也輔氏廣曰獀狩爭獲軍旅爭功弟道達於是則無所不通矣以義死言非有所利也吳氏澄曰朝廷政令所自出下民所視效故先言朝廷道路民所行之處州巷民所居之處獀狩者用衆於內也軍旅者用衆於外也義謂所宜行衆人以此孝弟為所宜行者故寧死而不敢犯不孝不弟之事也祀乎明堂所以教諸侯之孝也食三老五更於大學所以教諸侯之弟也祀先賢於西學所以教諸侯之德也耕藉所以教諸侯之養也朝覲所以教諸侯之臣也五者天下之大教也食音嗣更古衡反大學之大音泰正義鄭氏康成曰祀乎明堂宗祀文王西學周小學也先賢有道德王所使教國子者孔氏穎達曰此廣眀孝弟之道祀乎明堂於周言之祀文王也樂記祀文王於明堂是也上文祀文王於明堂為孝此以食三老五更為弟文有所對也此西學以祀先賢大司樂云凡有道者有德者使教焉死則以為樂祖祭於瞽宗方氏慤曰祀明堂所以享上帝而享之者必有配配必以父所以教諸侯之孝也食三老五更於大學所以貴老貴老為其近於親而已所以教諸侯之弟也先賢則樂祖西學則瞽宗瞽宗殷學名學有左右之異而此止言西者殷之名也樂祖則有道德者所以教諸侯之德也朝覲所以尊天子而致為臣之義夫孝以事親弟以事長故始之以教孝而次之以教弟孝弟則足以成德故繼之以教德有德則足以養人故繼之以教養能養人則足以事君故繼之以教臣此教之之序也周氏諝曰先王之於教豈必諄諄而命之也哉蓋禮行於此而人得於彼而不知者乃教之至也故五者天下之大教而其所以為教者如此而巳矣五者以德為主養者孝之屬臣者弟之屬故其序如此吳氏澄曰凡享先王皆是教孝而獨言祀明堂者尊先王以配天於享禮為最大孝經孝莫大於嚴父配天是也上下文止是言弟長之事而此兼言五教者蓋先且列其凡其下乃專言教弟一事也彭氏曰文王世子説養老於東序此云大學者蓋周別立五學其中辟雍是為大學養老於大學之東序故該之以大學之名亦可也食三老五更於大學天子袒而割牲執醬而饋執爵而酳冕而總干所以教諸侯之弟也是故鄉里有齒而老窮不遺強不犯弱衆不暴寡此由大學來者也天子設四學當入學而大子齒大音泰酳音引又任覲反正義鄭氏康成曰割牲制俎實也冕而總干親在舞位以樂侑食也教諸侯之弟次事親也文王世子曰行一物而三善皆得唯世子而巳其齒於學之謂也孔氏穎達曰此明養三老五更及齒學之事牲入之時天子袒而親割之食之時親執醬而饋食罷親執爵而酳干盾也親在舞位持盾而舞以天子敬老鄉里化之故有齒也在下年老及困窮者皆化上而養之不見遺棄故強不犯弱衆不暴寡所以致此由養三老五更於大學也當入學而大子齒於國人故云而大子齒方氏慤曰由大學來者言教化之原出自大學也四學謂周設四代之學即有虞氏之庠夏后氏之序殷之瞽宗周之辟雍是矣陸氏佃曰天子立四學并其中學而五直於一處並建周人辟雍則辟雍最居中其南為成均其北為上庠其東為東序其西為瞽宗當學禮者就瞽宗學書者就上庠學舞干戈羽籥者就東序學樂德樂語樂舞者就成均辟雍唯天子承師問道養三老五更及出師受成等就焉當天子入大學則四學之人環水而觀之矣是之謂辟雍學禮曰帝入東學尚親而貴仁東序是也帝入南學尚齒而貴誠成均是也帝入西學尚賢而貴德瞽宗是也帝入北學尚貴而尊齒上庠是也帝入大學承師而問道辟雍是也總而言之四學亦大學也存疑鄭氏康成曰四學謂周四郊之虞庠也案四學而以一虞庠當之不可解辨詳王制天子巡守諸侯待於竟天子先見百年者八十九十者東行西行者弗敢過西行東行者弗敢過欲言政者君就之可也正義鄭氏康成曰弗敢過者謂道經之則見之孔氏穎達曰此亦明尚齒貴老之義巡守謂巡行守土諸侯八十九十不可一一就見若天子諸侯因其行次或東行西行至八十九十者閭里之旁不敢過越而去必往見之若欲共論政教雖不當道路左右君即就之可也方氏慤曰竟者疆土至此而竟也待於竟而不敢越則其所守槩可見矣先見百年者即王制所謂問百年者就見之是也至於八十九十者其禮又有殺焉彼或在東行則此在西行者弗敢過之而弗見西行東行其義亦若是以不必人人而見之也若欲言政者雖非東行西行固當就而問之矣一命齒於鄉里再命齒於族三命不齒族有七十者弗敢先七十者不有大故不入朝若有大故而入君必與之揖讓而後及爵者正義鄭氏康成曰此謂鄉射飲酒時也孔疏鄉射謂鄉人詢衆庶而為射於時先行飲酒之禮是鄉射有飲酒者也齒者謂以年次立若坐也孔疏士立於堂下大夫坐於堂上案鄉射云大夫受獻訖及衆賔皆升受爵於時雖立至徹俎即坐又云既旅士不入不見士坐之文明立於堂下三命列國之卿也孔疏據諸侯言之若天子黨正飲酒三命不齒謂上士也此經雖據諸侯亦謂黨正飲酒故云三命不齒不復齒席之於賔東孔疏若鄉飲酒諸侯之國但爵位為卿大夫雖再命一命皆得不齒以鄉飲酒賔賢其賔必少其得爵為卿大夫者必年長於賔故在賔東西面而不齒若黨正飲酒以正齒位其賔必長故天子諸侯之國三命乃不齒知鄉飲酒爵為卿大夫乃不齒者案鄉飲酒云席於賔東公三重大夫再重注云席此二人於賔東尊之不與鄉人齒也天子之國三命乃不齒於諸侯之國爵為大夫則不齒也不敢先族之七十者謂既一人舉觶乃入也孔疏族七十者初飲酒之時則與衆賔先入此三命者為待獻賔獻介獻衆賔之後至一人舉觶之時乃始入也故鄉飲酒鄉射記皆大夫樂作之前一人舉觶之後乃始得入也若然大夫之入依禮自當一人舉觶之時縱令無族人七十者亦當如此又族之七十者及鄉人少者於先已入今特云族有七十者不敢先記人之意以身有三命應合在族人七十者之先欲明敬齒上老故云不敢先爾是以鄭注云雖非族亦然雖非族亦然承齒乎族故言族爾不有大故不入朝謂致仕在家者其入朝君先與之為禮而后揖卿大夫士孔氏穎達曰此明鄉里之中敬齒之法身有一命官者或立或坐齒與鄉人同再命既髙鄉人疏者雖復年髙不與之齒但族內計長幼為班序三命轉尊不復齒於親族特坐賔東若此飲酒時族內有年七十者令其先入此三命者後入故云不敢先也方氏慤曰以周制考之一命則下士也再命則中士也三命則上士也四命則為大夫矣於諸侯之國三命則卿再命則大夫一命則士也小國則又降於此矣一命齒於鄉里非其鄉里則以爵而不以齒可知再命齒於族非其族則以爵而不以族亦可知三命不齒雖於其族亦不得而齒之矣則鄉里又可知不齒者周官黨正以禮屬民於序以正齒位其言正與此合雖然此特貴貴之義爾至於老老之仁又不可得而廢故族有七十者弗敢先也夫七十者君猶與之揖讓而後及爵者豈族之三命得以先之五州為鄉五鄰為里於逺舉鄉則近至於五比之閭可知於近舉里則逺達於五縣之遂可知六鄉六遂足以互見之故也葉氏夢得曰三命不齒貴貴也七十者不敢先長長也先王之道並行而不相悖者如此李氏覯曰大司徒以陽禮教讓謂鄉射飲酒之禮也黨正一命齒於鄉里再命齒於父族三命而不齒謂歲十二月大蠟之時建亥之月農隙而教之尊長養老見孝弟之道也凡鄉射飲酒此鄉民雖為卿大夫必來觀禮齒於鄉里者以年與衆賔相次也齒於父族者父族有為賔者以年與之相次異姓雖有老者居於其上不齒者席於尊東所謂遵也大哉先王之所以居鄉黨睦親戚有如此夫被一命者天子之下士公侯伯之上士子男之上大夫也而與鄉里齒焉再命者天子之中士公侯伯之大夫子男之卿也而與父族齒焉三命者天子之上士公侯伯之卿也雖云不齒亦異席而巳非敢居其上也然則貴而驕人少而陵長者不容於其間矣天子有善讓德於天諸侯有善歸諸天子卿大夫有善薦於諸侯士庶人有善本諸父母存諸長老祿爵慶賞成諸宗廟所以示順也正義鄭氏康成曰薦進也成諸宗廟於宗廟命之祭統有十倫六曰見爵賞之施焉孔氏穎達曰此明有善讓於尊上示以敬順之道不敢專也方氏慤曰天子受命於天者也故有善則讓德於天諸侯受命於天子者也故有善則歸諸天子卿大夫受命於諸侯者也故有善則薦於諸侯士庶人既卑且賤其善亦小矣內則本諸父母外則存諸長老而已自外至內之謂歸自下進上之謂薦本以言其有所反存以言其無所忘父母內也故言其有所反而曰本長老外也故言其無所忘而曰存成諸宗廟者謂必即諸宗廟之中然後得以成其事也祭統曰古者明君爵有德而祿有功必賜爵祿於大廟示不敢專也吳氏澄曰天子不自有其善而讓於天即下文不自專而尊天之意諸侯卿大夫士庶人不自有其善而推於人亦廣下文不自伐而尊賢之意也成諸宗廟者天子既讓德於天諸侯既歸善於天子矣又不敢自專而尊其祖考皆為人下者之順道也故曰示順昔者聖人建隂陽天地之情立以為易易抱龜南面天子卷冕北面雖有明知之心必進斷其志焉示不敢專以尊天也善則稱人過則稱己教不伐以尊賢也卷古本反知音智斷丁亂反正義鄭氏康成曰立以為易謂作易易抱龜易官名周禮曰大卜大卜主三兆三易三夢之占孔疏周禮大卜三兆者玉瓦原也言兆形似玉瓦原之璺罅三易者連山歸藏周易三夢致夢觭夢咸陟也孔氏穎達曰此亦明其不敢專輒尊賢之事聖人謂伏羲文王之屬興建隂陽之情仰觀天文俯察地理立此隂陽以作易占易之官抱龜南面尊其神明故也天子親執卑道故卷冕北面雖有明哲之心必進於龜之前令龜斷決已之所有為之志示不敢自專以尊敬上天也有善稱人有過稱已又教在下不自伐其善以尊敬賢人也方氏慤曰隂陽天地莫不有情必待聖人建之然後能有所立焉然易無體也體之於言則其書謂之易體之於人則其官謂之易故曰立以為易明吉凶之象者莫如易示吉凶之象者莫如龜有自知之明而又有知人之知則其事固可以無疑矣然猶斷之於龜者以吉凶悔吝生乎動故也前言建隂陽天地之情而後止言尊天者蓋一隂一陽之謂道而道則出於天而已故後言尊天以該之稱己之過所以教不伐稱人之善所以教尊賢伐與矜伐之伐同字者有其善而矜之祇所以自傷其善故也應氏鏞曰易書也抱龜者人也不曰掌易之人而直以為易者蓋明以示天下者易也易之道不可屈故不於北而於南明此以北面者臣也臣之位不可踰故不曰人而曰易蓋有深意焉吳氏澄曰天地言其理隂陽言其氣情者人性之動在天地隂陽則言其用也案立言易抱言龜抱龜者亦言易蓋互言之以示卜筮並用之義也孝子將祭祀必有齊莊之心以慮事以具服物以修宫室以治百事及祭之日顔色必溫行必恐如懼不及愛然其奠之也容貌必溫身必詘如語焉而未之然宿者皆出其立卑靜以正如將弗見然及祭之後陶陶遂遂如將復入然是故慤善不違身耳目不違心思慮不違親結諸心形諸色而術省之孝子之志也齊側皆反語魚預反陶音遙思息嗣反正義鄭氏康成曰百事謂齊之前後也如懼不及愛如懼不及見其所愛者也奠之謂酌尊酒奠之及酳之屬也如語焉而未之然如有所以語親而未見答也宿者皆出謂賔助祭者事畢出去也如將弗見然祭事畢而不知親所在思念之深如不見出也陶陶遂遂相隨行之貌思念既深如覩親將復入也孔氏穎達曰此眀孝子將祭祀顔色容貌務在齊莊卑詘思念其親存也慮事謂謀慮祭事服物謂備具衣服及祭物百事謂齊前後凡百之事祭之日色必溫和行必戰恐身形必卑詘卑靜以正謂孝子其立卑柔靜默正定心意以思念其親也慤善不違身謂思念親深之故精慤純善之行不違離於身也耳目不違心者言中心思慮不違於親無時歇也思念之深結積於心形見於色術述也省視也循述而省視之反復不忘此孝子思念親之志也方氏慤曰服物慮其不備故以具服物宫室慮其不完故以修宫室百事慮其不飭故以治百事溫以言其不暴也祭之日其溫見於顔色爾及奠之也又見乎容貌焉祭之日行必恐爾及奠之也又身必詘焉此孝子之心所以為有加而無已也終言及祭之後則始言及祭之日為祭初可知先言其奠之也則後言宿者皆出為既奠之後可知於祭之日其迎來也如懼不及愛然及既來也又如語而未之然於其往也如將弗見然及既往也又如將復入然則是孝子之思其親無物足以慊其心無時足以絶其念如懼不及愛即所謂致愛則存是矣如語而未之然即所謂如親聼命是矣如將弗見即所謂如將失之是矣如將復入即所謂又從而思之是矣陶陶言思親之心存乎內遂遂言事親之心達乎外慤言實而無偽善言愛而無惡蓋所體者如此常不違於身也耳所聞者必親之聲目所見者必親之容蓋所存者如此常不違於心也思言思死者如不欲生慮言慮事不可以不豫蓋所念者如此常不違於親也不違言不違戾而之他也不違於身故能不違於心不違於心故能不違於親結諸心言齊莊之心不可解形諸色言齊莊之色不可掩葉氏夢得曰顔色溫者有愈色也容貌溫者有婉容也卑靜以正者有深思也蓋有愈色則若將及之故行必恐有婉容則若將聼之故身必詘有深思則若將見之故立必正陶陶者其氣和也遂遂者其志得也慤善於內而言不違身者以其有應於外耳目在外而言不違心者以其有主於內內外定而後為愛敬之至此其序所以與前相反也謹是三者而固守之則曰結發是三者於色則曰形察是三者不失其行則曰術此先王所謂孝也吳氏澄曰此一節其小節有五將祭慮事一也祭之日二也奠之時三也宿者皆出四也祭之後五也祭之初神未來也如懼不及得見其所愛之親蓋望其來之切也奠之時神已來矣如神與巳語而猶未之語也蓋喜其來之至也祭將畢神未去也如其將去而弗可見蓋悲其去之速也祭既畢神已去矣如將見其復入蓋冀其不去而復來也違猶離去也慤善不違身如懼不及愛之時也耳目不違心如語焉而未之然時也思慮不違親如將弗見之時也結諸心形諸色而術省之如將復入之時也存疑鄭氏康成曰術當為述聲之誤也辨正王氏應麟曰祭義曰術省之賈山至言術追厥功術與述同建國之神位右社稷而左宗廟正義鄭氏康成曰周尚左也孔氏穎達曰此明神位所在周人尚左故宗廟在左社稷在右案桓二年取郜大鼎納於大廟何休云質家右宗廟尚親親文家右社稷尚尊尊此説與鄭合陳氏祥道曰宗廟陽也故居左社稷隂也故居右存疑陸氏佃曰左宗廟不死其親之意三代共之先儒謂質家右宗廟尚親親文家左宗廟尚尊尊非是欽定禮記義疏卷六十一
