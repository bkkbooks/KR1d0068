body:
  text: 郊特牲第十一之三冠義始冠之緇布之冠也大古冠布齊則緇之其緌也孔子曰吾未之聞也冠而敝之可也冠義之冠古亂反下始冠冠而冠於冠禮皆同齊側皆反緌耳隹反敝婢世反正義鄭氏康成曰始冠三加先加緇布冠也大古無飾非時人緌也雜記曰大白緇布之冠不緌大白即大古白布冠也齊則緇之者鬼神尚幽暗也唐虞以上曰大古冠而敝之此重古而冠之耳三代改制齊冠不復用以白布冠質以為喪冠孔氏穎達曰此論初冠之義儀禮有士冠禮此説其義故云冠義案此即儀禮冠義説也士冠禮末載之故孔以儀禮為説大古之時其常所冠惟用白布若齊戒則染之為緇今始冠重古故先冠之也冠而敝之者言初加暫用冠之罷冠則敝棄之可也以其古之齊冠後世不復用也陳氏澔曰緇布冠不用筓用頍以圍髮際而結於項中因綴之以固冠耳不聞有垂下之緌也玉藻云緇布冠繢緌是諸侯位尊盡飾故也然亦後世之為耳徐氏師曾曰用之者不忘古也敝之者遵時制也通論皇氏侃曰鄭氏雜記緇布冠無緌而玉藻云緇布冠繢緌者此經所論謂大夫士故緇布冠無緌諸侯則位尊盡飾故有緌也總論孔氏穎達曰自此至治天下也一節總明尊卑加冠因明官爵及禮義之意適子冠於阼以著代也醮於客位加有成也三加彌尊喻其志也冠而字之敬其名也適丁歷反醮子妙反朱子曰北本無適子字加有成也在彌尊字下冠而上有已字敬其名作成人之道蓋傳誦之訛也案南本皇侃本北本熊安生本正義鄭氏康成曰阼者東序少北近主位也孔疏士冠禮冠者在主人之少北是近主位也其庶子則冠於房户外南面每加而有成人之道成人則益尊醮於客位尊之也三加者始加緇布冠次皮辨次爵辨冠益尊則志益大也冠而字之者重以未成人之時呼之孔疏重難也雖未成人時呼其名故以字代之孔氏穎達曰客位謂户牖之間南面此謂適子其庶子則皆醮於房户外醮用酒每一加則一醮用醴三加畢乃一醮於客位也初加緇布冠欲其尚質重古次加皮辨欲其行三王之德後加爵辨欲其行敬事神明是喻其志令益大也字之者冠禮既冠見母畢立於西階東南面賔東面字之曰伯某甫是也方氏慤曰冠者成人之服阼者主人之階成人則將代父而為之主著則所以明之也冠於阼階是以主道期之也醮於客位是以賔禮崇之也以其有成人之道故以是禮加之故曰加有成也然緇布之粗不若皮辨之精皮辨之質不若爵辨之文服彌尊則志宜彌大故曰喻其志也陳氏澔曰酌而無酬酢曰醮通論方氏慤曰以冠禮考之非特冠彌尊而衣屨亦彌尊非特衣屨彌尊至於祝辭醮辭亦然所以喻其志則一而巳委貌周道也章甫殷道也母追夏后氏之道也周辨殷冔夏收三王共皮辨素積母音牟追多雷反冔况甫反正義鄭氏康成曰周辨殷冔夏收齊所服而祭也孔疏言齊及祭時所服也若三命以下齊祭同冠四命以上齊祭則異冠孔氏穎達曰委貌章甫母追三代常服之冠俱用緇布而其形自殊委安也言所以安正容貌章明也言所以表明丈夫母發聲追猶堆也夏后氏質以其形名之鄭注冠禮記云辨名出於槃槃大也言所以自光大冔名出於幠幠覆也言所以自覆飾也收言所以收斂髮也其制之異亦未聞皮辨素積以其質素故三王同服無所改易方氏慤曰皮辨以白鹿皮為之素積以素為裳言裳則衣可知裳必疊幅故謂之積揚雄所謂襞幅為裳是矣周氏諝曰委貌章甫冔收命以意母追與辨命以形三代不同者所以趣時也皮辨素積三代共之者立本也蓋皮辨素積上古之服存疑鄭氏康成曰委貌章甫母追所常服以行道之冠也或謂委貌為玄冠也孔疏行道謂養老燕飲燕居之服若視朝行道則皮辨也此云委貌而儀禮記稱玄冠故云案始加為緇布冠冠而敝之可也鄭於此何以云常所服乎以行道求合記文三道字亦曲而無當至云委貌為玄冠則三加後易服以見君及大夫先生者而非始加之緇布冠矣儀禮賈疏曰玄端始加之服易玄冠以配玄端非明證乎無大夫冠禮而有其昏禮古者五十而後爵何大夫冠禮之有諸侯之有冠禮夏之末造也正義鄭氏康成曰言年五十乃爵為大夫也其有昏禮或改取也孔疏三十而昏五十乃為大夫亦應無大夫昏禮而云有者是改取也孔氏穎達曰前所眀悉士禮所以然者二十而冠五十爵為大夫故無大夫冠禮也古者二句記者覆解無大夫冠禮所由也諸侯之有冠禮夏之末造者言夏初以前諸侯未有冠禮周氏諝曰冠不再昏不一故大夫無冠禮而有昏禮天子之元子其禮猶止於士而已何諸侯冠禮之有特夏之末造也方氏慤曰古者諸侯無冠禮皆用士冠禮而已父在則為士父沒則代為君以彼年未冠而父沒者不可以居諸侯之位而用士禮故夏末有諸侯冠禮然則諸侯之有冠禮為未冠而父沒者造之也陳氏澔曰諸侯大夫之冠一如士禮行之下所謂無生而貴者也葉氏夢得曰此專為士冠禮言也一加而冠緇布再加而冠皮辨三加而冠爵辨士服也然後謂之士此天子元子與大夫之子所同者也男子二十而冠蓋未有大夫而始冠者此大夫所以無冠禮也徐氏師曾曰古者天子諸侯與大夫皆用士禮故儀禮無天子諸侯大夫冠禮非逸也通論孔氏穎逹曰四十強而仕亦應無士冠禮而云有者立禮悉用士為正所以五等並依士禮冠子也夏末以來諸侯有冠禮與士禮異故大戴禮有公冠篇加玄冕為四加也玉藻云玄冠朱組纓天子之冠也鄭注云始冠之冠是天子别有冠禮葉氏夢得曰鄭氏謂諸侯雖父死年未及五十亦服士服行士禮五十乃命古禮雖不可盡見然天子諸侯未嘗以年斷審如其説不幸有未冠而立立未及五十而死則終身不得為諸侯天子乎此理之必不然者也徐氏師曾曰朱子謂元子世子不當用士禮引玉藻公符左傳冠頌以補之不知玉藻公符左傳所云皆後世之失成王冠頌如誠有之意者周公欲修德故因仍夏末之禮而使祝雍作頌以勗之耳安可取以補儀禮之逸乎案家語邾隱公既即位將冠使大夫因孟懿子問禮於孔子孔子答之大戴取為公冠篇或作公符誤存疑葉氏夢得曰諸侯天子既冠而即位固已同於士禮矣未冠而即位則既為諸侯天子何緇布皮辨爵辨之云則冠禮無復施安得復有公侯之冠禮此所以為夏之末造也徐氏師曾曰天子崩太子未冠則冕而踐阼不行冠禮故家語孔子曰古者王世子雖幼其即位則尊為人君人君治成人之事者何冠之有又曰君薨而世子主喪是亦冠也所謂因喪而冠也案冠禮諸説棼如若據下記天子之元子士也二語論之則雖天子諸侯之子亦用士禮可知至於既為天子諸侯而冠則如大戴記合緇布冠皮辨爵辨玄冕及左氏傳祼享金石之説皆可采用若以彼為古禮則未之信也葉氏謂既為天子諸侯何緇布皮辨爵辨之足云則不但與古禮悖且亦未見大戴記矣徐氏冕而踐阼説既不免於武斷因喪而冠亦後世説不足為訓也天子之元子士也天下無生而貴者也繼世以立諸侯象賢也以官爵人德之殺也死而諡今也古者生無爵死無諡殺音試正義鄭氏康成曰儲君副主猶云士也明人有賢行著德乃得貴也繼世以立諸侯象賢者子孫常能法其先父德行也以官爵人德之殺者言德益厚爵益尊也古謂殷以前也大夫以上乃謂之爵死有諡也周制爵及命士孔疏案典命云其士一命既有命即爵也雖及之猶不諡耳孔疏檀弓士之有誄自此始也明以前無誄無誄即無諡也今記時死則諡之非禮也孔氏穎達曰繼世以立諸侯此釋夏末以來有諸侯冠禮之意以官爵人德之殺也明所以無大夫冠禮也言官爵之授隨德隆殺也周氏諝曰諡者行之迹故古者生而有爵則死乃請諡於天子而天子命之諡後世但死則皆有諡蓋未嘗請諡於天子特其自諡耳故曰死而諡今也徐氏師曾曰古者生無大夫之爵死不得為諡以其德未成而無可述也餘論成氏伯璵曰天子諸侯之元子死而無諡謂以士禮葬故無諡也恭太子戾太子後世亂法也案此又言非特諸侯無冠禮也即古天子亦無之雖天子之子亦與士同耳天下豈有生而貴者哉夫諸侯受命必其德足象賢乃命之大夫受命亦視其德之殺於諸侯而次之若六德為諸侯三德為大夫若未命則生無爵死亦無諡矣後世命之不待五十故得諡者亦多此今時則然并非周初制矣明制之愈變而非古也禮之所尊尊其義也失其義陳其數祝史之事也故其數可陳也其義難知也知其義而敬守之天子之所以治天下也正義鄭氏康成曰禮所以尊尊其有義也政之要盡於禮之義此知其義所以治天下也孔氏穎達曰此經因上論冠義下論昏義故因上起下於中説重禮之義不解禮之義理是失其義惟知布列籩豆是陳其數其事輕故云祝史之事籩豆事物之數可布陳以其淺易故也禮之義理難以悉知以其深逺故也聖人能知其義理而恭敬守之所以治天下也馬氏睎孟曰有數有義然後足以為禮數者義之寓義者數之意而其重尤在於意也先王為禮未嘗不寓之以微妙之意知其義則舉而措之天下無難矣通論朱子曰此蓋秦火之前典禮具備之時之語固為至論然非得其數則其義亦不可得而知矣况今亡逸之餘數之存者不能什一則尤不可以為祝史之事而忽之也方氏慤曰祭統曰明其義者君也能其事者臣也數在外故可陳義在內故難知然知之矣而或不能守守之矣而或不能敬則亦未免失其義焉又何以治天下哉中庸曰明乎郊社之禮禘嘗之義治國其如示諸掌乎正謂是矣案古者十五而入大學齊治均平分內事也天下無生而貴者知其義而敬守之冠者可不勉焉冠者禮之始故於此言之而昏喪祭射朝聘舉可知矣天地合而後萬物興焉夫昏禮萬世之始也取於異姓所以附逺厚别也幣必誠辭無不腆告之以直信信事人也信婦德也一與之齊終身不改故夫死不嫁取音娶别兵列反下皆同腆天典反正義鄭氏康成曰天地合而後萬物興焉目禮之義也取於異姓謂同姓則多相褻也誠信也腆猶善也直猶正也直信二者所以教婦也齊謂共牢而食同尊卑也齊或為醮孔氏穎達曰天氣下降地氣上騰天地合配則萬物生焉若夫婦合配則子胤生焉取異姓者所以依附相疏逺之道厚重分别之義也幣帛必須誠信使可裁制勿令虛濫昏禮記云皮帛必可制是也下惟云信事人信婦德不云正者正是信之小别信則兼之方氏慤曰天地合萬物興昏禮之合二姓蓋本於此有夫婦然後有父子父子所以傳世故曰昏禮萬世之始必取異姓所以附逺不取同姓所以厚别且於逺不附則人情無以通於别不厚則人道無以辨昏姻者所以通人情而辨人道而已馬氏睎孟曰易曰天地絪縕萬物化醇男女搆精萬物化生與此同意幣者所以將其昏姻之意辭者所以道其昏姻之情幣以將意則不可以不誠辭以道情則不可以不腆腆之言厚也君子無所不用其誠與厚至於昏禮則尤甚焉故曰幣必誠辭無不腆婦人事人者也事人必以信故體信以為德然後可以事人也一與之齊則榮辱貧賤休戚惟所遇而不擇焉故終身不改餘論張子曰以義禮言則婦死不當再娶夫死不當再嫁當其初娶時便期以終身豈復有再娶之事禽獸猶有不再匹者男子或為無嗣祭祀之重猶可再娶婦人則雖至窮餓而死不可也介甫直謂婦人得再嫁豈有是理古者人君自元妃而下姪娣媵御不復再娶元妃死則繼室攝內事自卿大夫以下有再娶之文亦必大不得已也葉氏夢得曰喪服父卒繼母嫁從為之服報傳曰何以期貴終也則繼母有再嫁之道矣衛世子共伯蚤死其妻薑氏父母欲奪而嫁之共薑守義誓而弗許作柏舟詩以自見孔子取焉則不再嫁者婦人之義也有不得已而嫁者君子亦通之也總論孔氏穎達曰自此至序也論聖人重昏禮之事案凡交際贈遺必言不腆束帛以致其謙此云某有先人之禮儷皮束帛無不腆之辭告之直也皮帛亦可制告之信也男子親迎男先於女剛柔之義也天先乎地君先乎臣其義一也迎魚敬反先采見反正義鄭氏康成曰先謂倡道也馬氏睎孟曰男子親迎而男先於女者剛先於柔之義豈獨昏姻之際如此至於天地君臣其義一也天則造始而地則代終君主乎倡而臣主乎和通論徐氏師曽曰親迎以眀義則關乎天地君臣之大此義之所以當重也執摯以相見敬章别也男女有别然後父子親父子親然後義生義生然後禮作禮作然後萬物安無别無義禽獸之道也摯音至亦作贄正義鄭氏康成曰摯所奠鴈言不敢相褻也人倫有别則氣性醇禽獸言聚麀之亂類也孔氏穎達曰章明也壻親迎入門而先奠鴈然後與婦相見是先行敬以明夫婦禮有分别不妄交親馬氏睎孟曰摯者交接之際所以致敬人之私褻莫甚於衽席之上男女之際不可不正故執摯相見所以敬章别也父子相親出於天性自然而曰男女有别然後父子親何也蓋男女無别於內則夫婦之道喪而淫僻之罪多雖父子之親亦不可得而親之也男女有别然後父子有相親之恩父子有相親之恩則必有相親之義故義生焉推而至於朋友兄弟君臣上下之際皆有義則燦然有文以相接故曰義生然後禮作禮作而貴賤有等上下有分此萬物所以安也自父子相親推而至於萬物安皆起於男女有别則衽席之上不可以不戒也陳氏澔曰有别則一本而父子親親親之殺則義生禮作而萬物各得其所矣禽獸知有母而不知有父無别故也壻親御授綏親之也親之也者親之也敬而親之先王之所以得天下也出乎大門而先男帥女女從男夫婦之義由此始也婦人從人者也幼從父兄嫁從夫夫死從子夫也者夫也夫也者以知帥人者也出乎大門而先如字絶句又悉遍反知音智正義鄭氏康成曰出乎大門而先者車居前也從謂順其教令夫之言丈夫也夫或為傅孔氏穎達曰昏禮婦降自西階壻親御婦車授綏方氏慤曰親御授綏固所以親之然必親迎親御亦所以敬之也敬所以為義親所以為仁先王之所以得天下者仁義而已馬氏睎孟曰敬之者禮也親之者仁也愛與敬先王之所以御婦之道二女嬪於虞文王刑于寡妻至於兄弟以御于家邦此先王之所以得天下也夫主於義故有所帥無所從婦主於聽故有所從無所帥夫婦之道其大槩不出於此婦者恆其德者也有三從之義無一違之禮夫者制義者也制人而不制於人故知帥人則非所謂不恆其德而從婦凶也陳氏澔曰太王爰及薑女文王親迎于渭皆是敬而親之之道以至於有天下故曰先王之所以得天下也大門女家之門也通論李氏格非曰婦人從人者也從之斯尊之矣卑其夫未有能從夫也夫弱於外婦強於內下上其心而莫之制何所弗及哉舉天下而漸其風亂矣王化之存者幾何故婦人於夫家不可不使之盡禮也存異鄭氏康成曰言己親之所以使之親己孔疏壻所以親其婦欲令婦親己案上親之言親御授綏指其禮下親之明其義注疏非也敬而親之敬承執摯親而不敬其失則流敬而不親其失則離敬也而親此所以小大由之而無弊也玄冕齊戒鬼神隂陽也將以為社稷主為先祖後而可以不致敬乎共牢而食同尊卑也故婦人無爵從夫之爵坐以夫之齒正義鄭氏康成曰玄冕祭服也隂陽謂夫婦也孔氏穎達曰案士昏禮用爵辨是士服之上者則天子以下皆用上服以五冕色俱玄故總稱玄冕齊戒自整飭也著祭服而齊戒親迎是敬此夫婦之道如事鬼神也妻為內主故有國者是為社稷內主也方氏慤曰先祖後者有夫有婦然後可以傳世而後其先也此則通天下言之牢謂牲牢也先王以牢禮為之等尊卑異焉而夫婦則共牢而食者示同尊卑夫尊則婦亦尊夫卑則婦亦卑尊卑同故爵齒亦從夫而已以爵齒各有尊卑故也玉藻曰君命屈狄再命禕衣一命袒衣士禒衣是從夫之爵也大傳曰其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也是從夫之齒也陸氏佃曰鬼神隂陽神明之也神眀之也者不可同於所安褻之甚也周氏諝曰婦人無爵而周官內宗則內女之有爵者外宗則外女之有爵者何也其所謂爵者亦從夫之爵也器用陶匏尚禮然也三王作牢用陶匏厥明婦盥饋舅姑卒食婦餕餘私之也舅姑降自西階婦降自阼階授之室也盥音管一本無婦盥饋三字餕音俊正義鄭氏康成曰陶匏大古之禮器也大古無共牢之禮三王之世作之而用大古之器重夫婦之始也私之猶言恩也授之室明當為家事之主也孔氏穎達曰共牢之時爼以外其器但用陶匏陶是無飾之物匏非人功所為乃貴尚古禮之自然也厥明謂共牢之明日也明日婦乃盥饋特豚舅姑食竟以餘食賜婦食餘曰餕此示舅姑相恩私之義降自阼階授之室者謂適婦也婦餕餘禮畢舅姑從賔階而下婦從主階而降是示授室與婦之義也方氏慤曰盥謂盥手所以致其潔饋謂特豚所以致其養以舅姑之尊而降自賔階以婦之卑而降自主人之階者示授之室而為之主男以女為室故以室言之通論周氏諝曰陶匏祭天地之器而用於昏者尚禮之至也凡為人子者居不處奧行不中道立不中門者以其有父在也至於冠禮則冠於阼而昏禮又婦降自阼階何也先王欲隆冠昏之禮也昏禮不用樂幽隂之義也樂陽氣也昏禮不賀人之序也正義鄭氏康成曰序猶代也方氏慤曰昏姻之禮在子則有代父之序在婦則有代姑之序所以不賀則一也孔子曰取婦之家三日不舉樂思嗣親也彼言思嗣親此言幽隂之義者蓋有所思者固欲其幽隂也經云齊之玄也以隂幽思也是矣昏禮不賀曲禮言賀取妻賀其有客而已故其辭曰聞子有客使某羞周氏諝曰冠必至於昏昏必至於代父者人之序也以其序將至於代則哀之可也故不賀餘論陳氏祥道曰古之制禮者不以吉禮干凶禮不以陽事干幽事則昏禮不用樂幽隂之義也昔裴嘉有昏會酒中而樂作薛方士非之可謂知其義矣存疑孔氏穎達曰不用樂者使其婦深思隂靜之義以修婦道陽是動散用樂則令婦人志意動散也案幽隂之義方氏解為詳晰是所謂報本也反始也貴誠而尚質也孔説姑存亦備一義又案此篇大旨在報本反始貴誠尚質而已故其敘冠義曰始加緇布曰天子無生而即貴其敘昏禮曰萬世之始曰器用陶匏曰不樂不賀有虞氏之祭也尚用氣血腥爓祭用氣也正義鄭氏康成曰尚謂先薦之孔疏對合亨饋孰為先也爓或為䐲孔氏穎達曰尚謂貴尚血謂祭初以血詔神於室腥謂朝踐薦腥肉於堂爓謂沈肉於湯次腥亦薦於堂祭義爓祭祭腥而退是也今於堂以血腥爓三者而祭並未熟是用氣也方氏慤曰血腥爓三者皆氣而已未嘗致味故曰祭用氣也然爓之氣不若腥之全腥之氣不若血之幽故其序如此馬氏睎孟曰有虞氏之意以為鬼神之所享在於敬而不在於味敬之所至則味有所遺故祭以血腥為始記曰血祭盛氣也又曰郊血大饗腥三獻爓一獻孰皆不敢用褻味而貴氣也總論孔氏穎達曰自此至篇末總論祭祀之事又曰此虞氏尚氣殷人尚聲周人尚臭皆謂四時常祭也若其大祭祫周人仍先用樂故大司樂云若樂九變則人鬼可得而禮鄭云先奏六樂以致其神而後祼焉推此言之虞氏大祭亦先用樂也故鄭注大司樂引虞書云戛擊鳴球搏拊琴瑟以詠祖考來格簫韶九成鳯皇來儀此宗廟九奏之節熊氏云凡大祭並有三始祭天以樂為致神始以煙為歆神始以血為陳饌始祭地以樂為致神始以埋為歆神始以血為陳饌始祭宗廟亦以樂為致神始以灌為歆神始以腥為陳饌始案禮宗廟之祭先薦血後薦腥而云宗廟腥為陳饌始於義未安周氏諝曰所謂尚聲者先作樂以求諸陽然後迎牲所謂尚臭者先灌以求諸隂然後迎牲然則有虞氏之尚氣者亦求諸隂陽之間而已矣應氏鏞曰祭祀之禮帝王所同而必别言之者隨其所尚各有所先也戛擊鳴球祖考來格虞非不尚樂也而商樂視舜則愈備猗那之詩可考也厥作祼將常服黼冔商非不尚灌也而周祼視商則愈重旱麓受祖之詩可見矣殷人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲聲音之號所以詔告於天地之間也正義鄭氏康成曰滌蕩猶搖動也孔氏穎達曰帝王草異殷不尚氣而尚聲謂先奏樂也不言夏或從虞也臭味未成謂未殺牲也殷尚聲故未殺牲先搖動樂聲以求神也闋止也奏樂三遍止乃迎牲入殺鬼神在天地之間故用樂之音聲號呼告於天地之間庶神明聞之而來是先求陽之義也方氏慤曰尚聲者以其自樂始故也臭未成以其未用鬯故也味未成以其未用牲故也馬氏睎孟曰凡聲陽也蓋人之死魂氣歸於天非求諸陽不足以報魂殷人尚聲所以迎其魂之來也樂三闋然後出迎牲舉其尚聲之時詔告於天地之間舉其尚聲之意也應氏鏞曰滌蕩者澡除洗雪於塵埃之境播散發越於虛無之中使天地之間虛曠洞達無不響答也陳氏澔曰鬼神在天地間與隂陽合散同一理而聲音之感無間顯幽故殷之祭必先作樂然後出而迎牲於廟門之外通論陳氏祥道曰商頌那祀成湯也樂之所依者磬聲其名學以瞽宗則主以樂教瞽之所宗皆尚聲之意也方氏慤曰聲音之號雖以求陽為先然詔告於天地之間則凡在隂陽之間者無不求也周人尚臭灌用鬯臭鬱合鬯臭隂達於淵泉灌以圭璋用玉氣也既灌然後迎牲致隂氣也蕭合黍稷臭陽逹於牆屋故既奠然後焫蕭合羶薌灌用鬯臭絶句庾以鬯字絶句焫如悅反羶依注為馨薌音香正義鄭氏康成曰灌謂以圭瓚酌鬯始獻神也已乃迎牲於庭殺之天子諸侯之禮也孔疏以儀禮少牢特牲是大夫士之禮無臭鬱灌鬯之事故也蕭薌蒿也染以脂合黍稷燒之詩云取蕭祭脂孔疏云蕭合黍稷是蕭與黍稷合取蕭祭脂是蕭與脂合故知有蕭及脂黍稷合馨香也羶當為馨聲之誤也孔氏穎達曰周禮變於殷故先求隂臭謂鬯氣未殺牲先酌鬯酒灌地以求神是尚臭也鬱鬱金草鬯謂鬯酒煮鬱金草和之其氣芬芳調鬯又以搗鬱汁和合鬯酒使香氣滋甚故云鬱合鬯也用鬱鬯灌地是用臭氣求隂達於淵泉也以圭璋為瓚之柄瓚所以㪺鬯也玉氣潔潤亦是尚臭也既灌然後迎牲者先求神後迎牲也陳氏祥道曰鬱合鬯臭隂達於淵泉以形魄歸於地而求諸隂也蕭合黍稷臭陽達於牆屋以魂氣歸於天而求諸陽也方氏慤曰玉之為氣如白虹則潔之至也能交三靈而通之亦以其氣之潔而已故祭祀每用焉迎牲之禮固巳重矣而在既灌之後則以致氣為先故也陳氏澔曰既奠以下是眀上文焫蕭之時非再焫也通論孔氏穎達曰周言用玉則殷不用圭瓚陸氏佃曰鬱隂也鬯陽也蕭隂也黍稷陽也玉隂中之陽欲致隂氣非此不能出脂陽中之隂欲致陽氣非此不能降馬氏睎孟曰灌者禮之始而敬之至者也傳曰禘自既灌而往吾不欲觀之矣易曰觀盥而不薦推此足以知周尚臭之意也周人既以求諸隂又以求諸陽則知有虞氏之用氣非不用味也殷人先求諸陽非不求諸隂也尚氣尚聲尚臭皆以始言之而其意各有主也應氏鏞曰周樂九變兼用六代視商愈備而納牲必俟灌鬯之後故曰獻奠重於祼聲莫重於升歌舞莫重於武宿夜是祼尤在於瞽歌武舞之先也存疑鄭氏康成曰既奠謂薦孰時也特牲饋食所云祝酌奠於鉶南是也孔疏云饋孰有黍稷此云蕭合黍稷既奠然後焫蕭故知當饋孰之時也孔氏穎達曰先灌是先致氣於隂取蕭草及牲脂膋合黍稷燒之此謂饋食時以臭氣求陽達於牆屋也既奠謂堂上事尸竟延尸户內更從此始也於薦孰時祝先酌酒奠於鉶羮之南訖尸未入於是取香蒿染以腸間脂合黍稷燒之於宫中此求陽之義也陳氏祥道曰迎牲奠盎皆在既灌之後而焫蕭又在奠盎之後灌求神之始而焫蕭次之迎牲奠盎事神之始而獻薦次之祭義設燔燎羶薌見以蕭光在朝事之節而朝事之初有迎牲奠盎之禮祭義郊特牲之文雖殊其事一也蓋迎牲而刲之則血毛告於室以示其幽全膟膋焫於堂以達其臭氣而羮定之所詔又在其後不然不足謂之尚臭也鄭康成以祭義為朝事之焫蕭郊特牲為饋食之焫蕭案大夫士無二祼及朝事其饋食禮之見於特牲少牢者品物雖或不同其儀節則一耳特牲始於饗神奠爵鉶南之後乃迎尸薦孰行正祭禮而無燔燎之節則燔燎不在薦孰時并不在饗奠後可知故祭義亦以燔燎屬朝事也此記灌後既言蕭合黍稷臭陽達於牆屋又言既奠然後焫蕭者蓋上只言其節而不言行禮之候故又申明之奠奠灌爵也謂既奠灌爵然後迎牲而焫蕭也此與上既灌同侯蓋灌訖即奠之以依神也自此以後行饋食禮其節與特牲少牢同故記亦省其文陳氏集説所謂既奠以下是明上文焫蕭之時非再焫是也注疏見記文兩言焫蕭求之不得其説故謂薦孰時亦焫蕭又以既奠為即特牲少牢鉶南之奠以為薦孰再焫之證故吳氏澄非之凡祭慎諸此魂氣歸於天形魄歸於地故祭求諸隂陽之義也殷人先求諸陽周人先求諸隂正義鄭氏康成曰此其所以先後異也方氏慤曰魂者氣所主故曰魂氣魄者營於形故曰形魄主者在內故言氣於魂之下營者在外故言形於魄之上人之生也受氣於天成形於地及其死也魂氣復歸於天形魄復歸於地以其歸於地也故不可不求諸隂以其歸於天也故不可不求諸陽然則聖人之為此豈徒陳其數而已哉亦有以知其義爾先求諸陽尚聲故也先求諸隂尚臭故也五聲五臭各有隂陽然聲以氣動而生故凡聲皆陽也臭以氣留而生故凡臭皆隂也以殷為求陽周為求隂則知有虞氏亦求諸隂陽之間而已夫一祭之內氣也聲也臭也三者未嘗不兼用焉經之所言特以所尚者爾餘論朱子語類安卿問魂氣歸於天與橫渠反原之説何以别曰魂氣歸於天是消散了正如火煙騰上去處何歸只是消散了論理大槩固如此然亦有死而未遽散者亦有寃恨而未散者然亦不皆如此叔器問聖人死如何曰聖人安於死即消散案此一節總結上文而申言以盡其意氣對質則氣為陽以理言之則隂陽皆氣也詔祝於室坐尸於堂用牲於庭升首於室直祭祝於主索祭祝於祊不知神之所在於彼乎於此乎或諸逺人乎祭於祊尚曰求諸逺者與與音餘正義鄭氏康成曰詔祝坐尸謂朝事時也孔疏以下用牲升首此云詔祝於室當殺牲之初故知當朝事時朝事延尸於户西南面布主席東面取牲膟膋燎於爐炭洗肝於鬱鬯而燔之孔疏此並於堂上而燔燎之故始云入以詔神明以前在堂也入以詔神於室又出以墮於主孔疏墮謂墮祭分減肝膋以祭主前也主人親制其肝所謂制祭也孔疏制割也謂割其肝而不相離時尸薦以籩豆孔疏即是朝事籩豆至薦孰乃更延主於室之奧尸來升席自北方坐於主北焉孔疏在奧東面以南為尊主尊故在南主既居南故尸來升席自北方也尸主各席故朝事延尸於户外尸南面主席於東面是也用牲於庭謂殺之時升首於室謂制祭之後孔疏下文升首在燔燎下故知在制祭後升牲首於北墉下尊首尚氣也孔疏下文升首以報陽明是當尸北墉可知羊人云祭祀割羊牲登其首則三牲之首皆升直祭祝於主謂薦孰時如特牲少牢饋食之為也直正也祭以孰為正則血腥之屬盡敬心耳索求神也於彼於此言室與堂與尚庶幾也孔氏穎達曰詔告也祝呪也詔祝於室尸主出堂薦用籩豆祝乃取牲膟膋燎於爐炭入告神於室也孔疏時主尸皆在堂室虛位故曰神坐尸於堂者既灌之後尸出堂坐户西而南面也直祭祝於主言薦孰正祭之時祝官以祝辭告於主若儀禮少牢敢用柔毛剛鬛用薦嵗事於皇祖伯某是也索祭祝於祊者廣博求神非但在廟又為求祭祝官行祭於祊也陸氏佃曰詔祝於室詔使入以詔神時灌事畢而朝事始矣是以詔祝坐尸當此節蓋神格而後可以詔祝主設而後可以坐尸又曰焫蕭求諸陽灌鬯求諸隂奏樂求諸天地之間以為未也故詔祝於室求諸內也坐尸於堂求諸外也猶以為未也故用牲於庭求諸下也升首於室求諸上也又以為未也故直祭祝於主求諸近也索祭祝於祊求諸逺也求求之而已若索索也陳氏祥道曰神主自在室祭時迎尸入於室祼後迎牲至庭告殺尸出於室坐户西南面臨之祝乃取肝膋燎於爐入詔神主於室以行制祭之禮於是升首於室薦腥於尸前更延尸坐於室薦孰於主乃妥尸而祭之祭後祝又求神於廟門內明日繹祭略同周氏諝曰所謂孝子求神非一處也通論孔氏穎達曰祊有二種正祭之時既設祭於廟又求神於廟門之內平生待賔客之處繹祭之日設饌於廟門外之西室今此索祭當是正祭日之祊知者禮器云為祊乎外以其稱外故注云明日繹祭此經不云外又下言肵之為言敬也相饗之也嘏大也血毛告幽全之物是皆據正祭之日明此祊亦正祭日陳氏澔曰詔祝於室謂天子諸侯之祭朝事時祝取牲之膟膋燎於爐炭而入告神於室也坐尸於堂者灌鬯後尸坐户西南面也用牲於庭謂殺牲升首於室升牲首也祭以薦孰為正正祭時祝官以祝辭告於神主也祊有二一正祭時求於廟門內一明日繹祭祭於廟門外也存疑陸氏佃曰詔祝於室坐尸於堂主人親制其肝所謂制祭此殷禮也鄭氏以言周禮誤矣蓋殷人制肝周人制肺殷人先求諸陽周人先求諸隂先求諸陽故朝踐時取牲膟膋燎於爐炭洗肝於鬱鬯而燔之若周人制肺雖在此時其取膟膋燎於爐炭自當饋食之節方氏慤曰詔祝於室即血毛詔於室坐尸於堂即羮定詔於堂用牲於庭即納牲詔於庭納之將以用焉故言用直祭祝於主凡室事是也索祭祝於祊凡門事是也尚曰求諸逺者與夫廟門之旁豈實為逺人乎故以尚言之祊之為言倞也肵之為言敬也富也者福也首也者直也相饗之也嘏長也大也尸陳也倞音諒肵音祈相息亮反正義鄭氏康成曰倞猶索也倞或為諒肵者為尸有肵俎此訓也福者人君嘏辭有富此訓之或曰福也者備也直者訓所以升首祭也直或為犆相謂詔侑也詔侑尸者欲使饗此饌也特牲饋食禮主人拜妥尸尸答拜執奠祝饗孔疏鄭引特牲者證饗尸時尸執鉶南之奠祝則設辭以饗之尸遂祭與啐之是相饗之也主人受祭福曰嘏孔氏穎達曰案特牲少牢設饌後尸祭饌訖祝取牢心舌載於肵俎設於饌北尸每食牲體反置於肵俎是主人敬尸之俎也又少牢云皇尸命工祝承致多福無疆于女孝孫使女受祿于天宜稼于田眉夀萬年勿替引之此是大夫嘏辭人君則福慶之辭更多故詩楚茨云永錫爾極時萬時億卜爾百福如幾如式是也直正也言首為一體之正尸嘏主人欲使廣大長久也方氏慤曰索祭祝於祊於正祭之後而又索焉非強有力者不能如此故曰祊之為言倞也倞強也首謂升首也首犆而直支偶而曲故曰直也以其直故得特逹以升於室焉相謂相尸也坐則有妥食則有侑入或逆之升或延之凡為此者豈偶然哉亦心鄉之而欲神饗之而已故曰相饗之也福而有嘏之義中庸言大德之得祿夀以得其夀故長以得其祿故大故曰嘏長也大也且祿夀為五福之先故必以長大言之天保曰降爾遐福此福所謂長也楚茨曰以介景福此福所謂大也尸神象也神隱而尸陳故曰尸陳也存疑鄭氏康成曰尸或詁為主此尸神象當從主訓之言陳非也案爾雅釋詁文尸旅陳也尸職主也存異陸氏佃曰相主婦也經曰既內自盡又外求助昏禮是也又曰鄉之然後能饗焉蓋祀主人所自致也他人所事祭而已若饗非夫婦有不能鄉亦其親或不饗也毛血告幽全之物也告幽全之物者貴純之道也血祭盛氣也祭肺肝心貴氣主也正義鄭氏康成曰幽謂血也純謂中外皆善氣主氣之所舍也周祭肺殷祭肝夏祭心孔氏穎達曰毛血謂祝初薦毛血於室時也血是告幽之物毛是告全之物告幽者言牲體肉裏美善告全者牲體外色完具血祭是堂上制祭後又薦血腥時也肺肝心三者並為氣之宅故祭時先用之是貴氣之主也血是氣之所舍故云盛氣三者非即氣故云氣之主也方氏慤曰信南山言以啓其毛取其血膋蓋謂是矣祭祀之道以純為貴觀射父曰毛以示物血以告殺又曰祝於一純二精是矣經血腥爓祭用氣也然腥爓之氣不若血之幽氣聚於幽而散於明聚則盛矣故曰血祭盛氣也夫鬼神無形也有氣而已則交之者可不盛其氣哉五行之氣在天則為五星在地則為五材在人則為五臟之氣各有所主而牲亦象之肺則金氣之所主也肝心木火氣之所主也經獨言三者則以三代之所用者言之也餘論周氏諝曰臟有五而位三肺心位乎上肝腎位乎下位乎上陽也位乎下隂也肝者位乎下之上而為隂中之陽陽者氣之主隂者體之主故肺肝心皆氣主也周以火德王天下而肺臟屬金故祭先肺示火之能勝於金也殷以金德而肝臟屬木夏以水德而心臟屬火是三代祭先皆用五行相勝之法以順天地性命之理也祭黍稷加肺祭齊加明水報隂也取膟膋燔燎升首報陽也齊才細反下涗齊同正義鄭氏康成曰祭黍稷加肺謂綏祭也孔疏案特牲禮祝命綏祭尸左執觶右取菹㨎於醢祭於豆間佐食取黍稷肺祭授尸尸祭之少牢亦然齊五齊也五齊加明水則三酒加玄酒也膟膋腸間脂也與蕭合燒之亦有黍稷也孔氏穎達曰尸既坐綏祭之時祭黍稷加之以肺兼肺而祭故云加肺也正祭之時陳列五齊之尊上又加明水之尊故云祭齊加明水也肺是五臟在內水屬北方皆隂類形魄歸地為隂以隂物祭之故云報隂也朝踐時祝取膟膋燎於爐炭入以告神於室出以綏於主前又升首於室膟膋黍稷並是陽氣之物首是牲體亦是陽魂氣在天為陽以陽物祭之故云報陽也通論方氏慤曰上言祭下言取互相備爾詩言取蕭祭脂同義前曰求此曰報何也求主乎人之情報主乎物之理陸氏佃曰報隂用明水則報陽用明火可知肺內而在上首外而在上存異陸氏佃曰祭齊加明水即此所謂明水涗齊貴新也鄭氏謂五齊加明水三酒加玄酒則讀加為尚之誤也經曰酒醴之美玄酒明水之尚案祭齊加明水與下明水涗齊自有兩義蓋報隂與新潔不可謂同也且此專歸明水下則對舉與涗齊並言詳玩經文自見耳明水涗齊貴新也凡涗新之也其謂之明水也由主人之潔著此水也涗始鋭反又作説潔同潔正義鄭氏康成曰涗猶清也五齊濁泲之使清謂之涗齊及取明水皆貴新也周禮㡆氏以涗水漚絲涗齊或為泛齊新之者敬也孔氏穎達曰設明水及涗齊貴新潔之義所以涗此齊者以敬於鬼神故新潔之也方氏慤曰明水謂之明固以取之於月又由主人之潔誠著見於此水蓋汙則暗潔則明也陳氏澔曰凡涗新之也專主涗齊而言故下文又釋明水之義存異周氏諝曰周官司尊彛之職謂鬱齊獻酌醴齊縮酌及盎齊涗酌以五齊清濁次之則泛齊醴齊同用縮酌而緹齊沈齊與盎齊同用涗酌此言明水涗齊蓋自盎而下三齊也涗者以水而和之解之也和解之則新矣貴新故不嫌於味之薄也案上注謂五齊加明水三酒加玄酒加玄酒者謂有酒尊即有玄酒尊酒為獻酢之用玄酒不用亦設之者士冠禮注所謂不忘古是也加明水之義亦然此記明水是一物所謂五齊加明水是也涗齊是一物注所謂五齊濁泲之使清是也陳氏集説自分明君再拜稽首肉袒親割敬之至也敬之至也服也拜服也稽首服之甚也肉袒服之盡也正義鄭氏康成曰割解牲體孔氏穎達曰再拜稽首肉袒是恭敬之至極恭敬之至極乃是服順於親也下又各釋拜稽首肉袒之事方氏慤曰袒則肉露故謂之肉袒所以致親割之勞以人君之尊而服勞如此所以為敬之至服屈服於神故曰敬之至也服也詩言勿翦勿拜而以拜為屈故曰拜服也拜下兩手而已稽首則首至地焉故曰稽首服之甚也首雖至地又未若肉袒之勞焉故曰肉袒服之盡也祭稱孝孫孝子以其義稱也稱曾孫某謂國家也祭祀之相主人自致其敬盡其嘉而無與讓也正義鄭氏康成曰孝孫孝子謂事祖禰曾孫某謂諸侯事五廟也於曾祖以上稱曾孫而已相謂詔侑尸也嘉善也孔氏穎達曰義宜也事祖禰宜孝是以義而稱孝也國謂諸侯家謂卿大夫既有國家之尊不但祭祖禰而已更祭曾祖以上惟稱曾孫言己是曾祖之孫也熊氏安生曰祭稱孝孫對祖為言稱孝子對禰為言經既稱國家則兼諸侯及大夫鄭注直言諸侯而不及大夫者略也庾氏蔚之曰賔主之禮相告以揖讓之節祭祀之禮則是主人自致其敬盡其善故詔侑尸者不告尸以讓是其無所與讓也方氏慤曰人之行莫大於孝自稱以此則疑於自矜祭而稱之且無所嫌者則有義存焉耳故曰以其義稱也稱曾孫以示國家非一世之積故曰謂國家也某則名之也於曽孫曰某則孝孫孝子從可知矣然其序先孫而後子者對祖禰稱之故也通論孔氏穎達曰熊氏云諸侯大夫事祖禰之時亦稱孝子孝孫事曾祖以上雖是內事則同於外稱故下曲禮云諸侯內事曰孝子某侯某外事曰曾孫某侯某是也此記不云某侯者略也陸氏佃曰案少牢饋食曰孝孫某則祭稱孝子孝孫名今略之也外事稱曽孫某故曰謂國家也據告於皇天后土所過名山大川曰惟有道曽孫周王發案雜記喪稱哀子哀孫謂虞祭以前祭稱孝子孝孫謂卒哭以後蓋哀主仁敬主義故曰以其義稱也曲禮天子內事曰孝王某不稱子孫諸侯曰孝子某侯某蓋兼未入廟言之大戴禮遷廟即稱孝嗣侯蓋廟統於太廟之尊故不復稱子也大夫以下乃統稱孝孫徐氏師曾引黃乾行説分諸侯內祭外事案此上下文皆明宗廟中祭義無一語及外事周頌維天之命祀文王也而云曾孫篤之安得以稱曾孫遂為外事乎腥肆爓腍祭豈知神之所饗也主人自盡其敬而巳矣肆敕歷反腍而審反正義鄭氏康成曰治肉曰肆腍孰也孔氏穎達曰肆剔也言祭或進腥體或薦解剔或進湯沈或薦煮孰四種之薦豈知神適所饗耶正是主人自盡敬心求祭之心不一耳方氏慤曰凡牲解而生之之謂腥體而陳之之謂肆爚而未稔之謂爓孰而為殽之謂稔孰謂之腍若禾之稔故也舉斝角詔妥尸古者尸無事則立有事而后坐也尸神象也祝將命也斝古雅反正義鄭氏康成曰妥安坐也尸始入舉奠斝若奠角將祭之祝則詔主人拜安尸使之坐尸即至尊之坐或時不自安則以拜安之天子奠斝諸侯奠角古謂夏時也孔氏穎達曰斝角爵名也夏立尸惟有飲食之時乃坐若無事則立由世質故耳方氏慤曰斝先王之爵也天子用焉角時王之爵也諸侯用焉周官鬱人之大祭祀與量人受斝之卒爵而飲之蓋言是矣詔妥尸即士虞禮所謂主人及祝拜妥尸尸拜遂坐是矣蓋尸於主人則子行也以卑臨尊嫌或不安焉為是詔之也詩言以妥以侑是矣必於時乃詔之者以尸始入舉奠故也有事謂若舉斝角之類也通論方氏慤曰七日戒三日齊承一人焉以為尸過之者趨走其敬如是固不以子行無事則立也見乃謂之象神隱而尸陳以其陳者見於隱者故曰尸神象也將命於祭祀之間以交神人者祝也將命於燕饗之間以交賔主者介也此主祭祀言之故曰祝將命也禮運曰祝以孝告嘏以慈告兹非將命乎存疑方氏慤曰尸於無事之時則子行而巳子行為卑故立至於有事之時則神象也神象為尊故坐孔氏穎達曰饋食薦孰之時尸未入祝先奠爵於鉶南尸入即席而舉之如特牲隂厭後尸入舉奠也陸氏佃曰妥尸蓋在初入即席之時宜在祼前辨正陸氏佃曰鄭氏謂天子舉斝諸侯舉角凡祭祀灌獻用斝齊用盞酒用爵知然者以春秋傳瓘斝玉瓉盎齊一名盞酒知之也斝以灌也灌非以飲也以歷而已所謂量人受斝歷而皆飲之以此然則舉斝角詔妥尸當灌獻之節先儒謂妥尸在饋食時此讀儀禮之誤也蓋少牢特牲無朝踐饋獻故妥尸在酳尸前若祭自祼始尸即席久矣不應至饋食始詔安坐也案儀禮無天子諸侯禮天子諸侯有朝踐大夫士無朝踐故少牢特牲禮尸入皆在饋孰時尸入即拜以安之若天子諸侯則祝迎尸入乃作樂樂九變尸乃灌以降神亞灌後乃迎牲行朝踐禮是尸之入久矣豈待饋食而後妥尸哉孔惟據少牢禮言之故與天子禮不合陸農師譏之是也然謂妥尸在灌前則亦不然蓋初灌亞灌王與后皆酌以獻尸祝詔尸祭尸祭以降神春秋傳瓘斝玉瓉是此舉斝角即舉王與后所獻之圭瓉璋瓉祭之啐之奠之而後即席而坐而拜以安之也不應神未降而尸先據席而坐縮酌用茅明酌也盞酒涗於清汁獻涗於盞酒猶明清與盞酒於舊澤之酒也盞側産反汁之十反獻注讀為莎素何反今如字澤依注讀為醳音亦正義鄭氏康成曰縮酌用茅謂泲醴齊以明酌也周禮曰醴齊縮酌孔疏證此經縮酌是醴齊五齊醴尤濁藉之以茅縮去滓也明酌者事酒之上也孔疏周禮三酒一曰事酒二曰昔酒三曰清酒明為清明故知是事酒之上清明者也名曰明者事酒今之醳酒皆新成也孔疏事酒謂為事而作者醳是和醳醖釀之名即今卒造之酒故云皆新成也春秋傳曰爾貢包茅不入無以縮酒孔疏僖四年左傳文酌猶斟也酒已泲則斟之以實尊彛昏禮曰酌玄酒三注於尊凡行酒亦為酌也盞酒涗於清謂泲盞酒以清酒也盞酒盎齊孔疏周禮盎齊涗酌又醴齊後有盎齊禮運醴後有盞故知盞謂盎齊盎齊差清和之以清酒泲之而已泲盎齊必和以清酒者皆久味相得孔疏盎齊既清作之必久清酒又冬釀接夏而成汁獻涗於盞酒者泲秬鬯以盞酒也不以三酒泲秬鬯者秬鬯尊也孔疏以其尊故用五齊泲之五齊卑故用三酒泲之事相宜也猶若也澤讀為醳天子諸侯禮廢時人或聞之而不審知云若今明酌清酒與盞酒以舊醳之酒泲之矣就其所知以曉之也孔氏穎達曰縮泲也謂醴齊既濁泲而後可斟酌故云縮酌也涗涕也涕謂泲漉也盎齊差清先和以清酒而後泲之不用茅也方氏慤曰此言縮酌用茅即醴齊縮酌是也必用茅者以茅之為物潔白順直祭祀之德欲如此故也縮之清而明故曰明酌尊也周禮曰盎齊此曰盞酒何也盎以所造之器言盞以所酌之器言汁獻涗於盞酒即鬱齊獻酌是也以煮鬱金汁和之故曰汁以獻之而不縮故曰獻汁言其物獻言其事鬱齊用灌亦曰獻者以居九獻之首故通謂之獻祭統曰獻之屬莫重於灌醴齊必縮之者以其尤濁故必縮去其滓也盞酒不若醴齊之濁故以清酒涗之而已汁獻尤不若醴酒之濁故以盞酒涗之而已涗之亦明矣然不若縮之為尤明故於用茅言明酌也前言凡涗新之豈非以明故新與然齊酒不止於此三者以灌事用鬱齊朝事用醴齊饋食用盎齊尊彛之所實宗廟之所用常祀不過於此故經指是言之此皆古禮後世以舊醳之酒涗清酒盞酒而明之其制雖異其理則同故曰猶明清與盞酒於舊醳之酒也陸氏佃曰茅明也故謂之明酌汁獻鬯齊也謂之汁汁隂陽之和也月令曰天時雨汁通論周氏諝曰周官酒正之職辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊司尊彛之職謂鬱齊獻酌醴齊縮酌盎齊涗酌蓋醴齊與泛齊則為濁故為縮酌即此所謂縮酌用茅者也以其濁故縮之縮之則差清差清則明是以謂之明酌也盎齊而下至沈齊則為少清而無待於縮以茅惟涗之而已故為涗酌即此所謂盞酒涗於清者也然所謂鬱齊獻酌何也鬱齊之味尤為薄而尤非人之所可飲但酌之而已故為獻酌即此所謂汁獻涗於盞酒者也而必涗於盞酒者蓋汁獻之味薄於盞酒故以盞酒涗之其猶盞酒之味薄於清酒而以清酒涗之也餘論陳氏祥道曰茅之為物柔順潔白可以施於禮者也故古者藉祭縮酒之類皆用焉禹貢荆州包匭菁茅甸師祭祀供蕭茅鄉師大祭祀供茅蒩司巫祭祀供蒩館則茅有貢於方國者有共於甸師者甸師之茅有入之鄉師有入之司巫者孔子曰苟錯諸地而可矣藉之用茅何咎之有則茅不特藉祭而巳故可以冪鼎可以御柩雜記或菹以為豆實或包以通好問或索綯以備民用此茅所以可重也士虞有苴特牲少牢吉祭無苴而司巫祭祀共蒩館則凡王祭祀有苴矣賈公彥謂天子諸侯尊者禮備於理或然存疑鄭氏康成曰獻當讀為莎秬鬯者中有煮鬱和以盎齊摩莎泲之出其香汁因謂之汁莎舊醳之酒謂昔酒也泲清酒以舊醳之酒者為其味厚臘毒也孔疏昔酒作雖久成比清酒為薄清酒是冬釀夏成其味厚久臘毒害故以薄酒泲之國語厚味實臘毒祭有祈焉有報焉有由辟焉辟依注作弭弭亡妣反正義鄭氏康成曰祈猶求也謂祈福祥求永貞也報謂若穫禾報社辟讀為弭謂弭災兵逺罪戾也孔疏祭除祈報外惟有禳除凶惡故取周禮小祝之文孔氏穎達曰有報焉者謂獲福而報之由用也方氏慤曰欲彼之有豫也故有祈以求之若噫嘻祈榖於上帝載芟祈社稷之類是也因彼之有施也故有報以反之若豐年之秋冬報良耜之秋報社稷是也慮彼之有來也故有辟以去之若月令之磔攘開氷而用桃弧棘矢以辟去不祥之類是也於辟又言由者以非祭之常禮或有所以而用之故也然禮器言祭祀不祈者彼之所言蓋為己耳此之所言主為民也齊之玄也以隂幽思也故君子三日齊必見其所祭者正義鄭氏康成曰齊三日思其居處思其笑語思其志意思其所樂則見之也孔氏穎達曰解齊服所以用玄衣玄冠義也玄隂色鬼神尚幽隂故齊者玄服以表心思幽隂之理故云隂幽思也方氏慤曰凡物之理隂則靜陽則動幽則深明則淺動不足以守靜淺不足以極深而哀樂欲惡二其心故必貴乎以隂幽也君子之服象其德三日齊必見其所祭者以靜而深故也為神而齊必見其所祭之神為鬼而齊必見其所祭之鬼陳氏澔曰見其所祭精誠之感也通論周氏諝曰玄者天道在北方之色天道在北方則寂然不動寂然不動則無思也然亦不能無思故以隂幽而思也總論陸氏佃曰此篇始言貴誠之意故以齊終也案自有虞氏尚用氣至此皆雜舉祭祀而研極其義言乎其地則於室於庭於堂於祊以極於牆屋淵泉無不到也言乎其節則於灌於迎於升於薦以極於再拜稽首肉袒親割無不嘉也言乎其物則於氣於臭於毛於血於肺肝心於鬯於齊於酒以極於明水縮茅焫蕭黍稷無不潔也故曰貴純曰貴新曰服之盡曰敬之至而總以自致其隂幽之思求合於冥漠之中而巳中庸論鬼神曰洋洋乎如在其上如在其左右仁人孝子之用心非積誠曷以通之必見所祭郊特牲一篇之大根柢也欽定禮記義疏卷三十八
