body:
  text: 王制第五之五凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人修而兼用之食音嗣正義鄭氏康成曰兼用之備隂陽也凡飲養陽氣凡食養隂氣孔疏郊特牲文陽用春夏隂用秋冬孔氏頴逹曰此論虞夏殷周養老不同之事有虞氏以燕禮者盧氏云燕禮脫屨升堂崔氏云殽蒸於爼行一獻之禮坐而飲酒以至於醉有虞氏帝道𢎞大故以燕禮夏后氏以饗禮者崔氏云饗則體薦而不食爵盈而不飲依尊卑為獻取數畢而已夏貴禮敬故以饗禮殷人以食禮者崔氏云不飲酒享大牢以禮食之殷人質素故以食禮皇氏云饗有四種一是諸侯來朝天子饗之則周禮大行人職云上公之禮饗禮九獻其牲則體薦體薦則房蒸左傳云饗有體薦二是王親戚及諸侯之臣來聘王饗之禮亦有飯食及酒其酌數亦當依命數其牲則折俎亦曰殽蒸左傳云饗有體薦宴有折俎公當饗卿當宴定王饗士㑹而用折俎知王親戚及饗朝廷之臣亦當然也三是戎狄之使來王饗之其禮則委饗也王不親饗但以牲全體委與之是也若夷狄君來則當與中國子男同故小行人職掌小賔小客所陳牲牢當不異也四時饗宿衛及耆老孤子則以醉為度故酒正云凡饗食庶子饗耆老孤子皆供其酒無酌數鄭云要以醉為度食禮者有飯有殽雖設酒而不飲其禮以飯為主故曰食也其禮亦有二一是禮食大行人云諸公三食之禮有九舉及公食大夫禮之屬是也二是燕食謂臣下自與賔客旦夕共食案鄭注曲禮酒漿處右云此大夫士與賔客燕食之禮是也燕禮者凡正饗食在廟燕則在寢燕以示慈惠故也燕禮則折俎有酒而無飯其牲用狗燕安也其禮最輕升堂行一獻禮畢而脫屨升堂坐飲以至醉也燕禮亦有二種一是燕同姓二是燕異姓故鄭箋湛露詩云夜飲之禮同姓則成之庶姓讓則止此燕饗食致仕之老則當用正饗正食正燕之禮以其有賢德不可以䙝禮待之饗死事之老不必有德又是老人不宜久立當用折俎之饗燕食之食異姓之燕禮也凡飲養陽氣凡食養隂氣者飲是清虛陽氣之象食是形質隂體之義皇氏云春夏雖以飲為主亦有食先行饗次燕次食秋冬以食為主亦有饗先行食次燕次饗一日之中三事行畢義或然也輔氏廣曰修者周人總三代之禮而兼取其善者以為一王之禮也存疑孔氏頴逹曰周人修而兼用之者謂周人春夏用虞氏燕禮夏后氏饗禮秋冬用殷人食禮周極文故兼用之也皇氏侃曰人君飬老有四種一是養三老五更二是子孫為國難而死王養死者祖父三是養致仕之老四是引户校年養庶人之老熊氏安生曰天子視學之年養老一嵗有七謂四時皆養老四也文王世子云凡大合樂必遂養老注大合樂謂春入學舍菜合舞秋頒學合聲通前為六又季春大合樂天子視學亦養老總為七也國語云王公立飫則有房蒸其所云飫即謂饗也立而成禮亦有飯食故舂人云凡饗食共其食米鄭云饗有食米則饗禮兼燕與食也案饗禮酒清人渴而不敢飲肉乾人饑而不敢食安得兼燕食二禮舂人所云米亦共之歸於其館耳辨正陳氏祥道曰天子之於老也其所養者三國老庶老死政者之老也嵗養之亦三仲春季春仲秋也周禮羅氏羅春鳥獻鳩以養國老在仲春月令養衰老授几杖在仲秋文王世子云大合樂必遂養老鄭云大合樂謂春入學舍菜合舞秋頒學合聲於是時也天子則視學焉此養於仲春仲秋者也月令季春之末擇吉日大合樂天子親往視之大合樂亦必養老此又養於季春者也若夫簡不帥教出征受成以訊馘告凡天子入學莫不養老又不在嵗養之數也又有死政者之老焉故羅氏獻鳩以養之者國老也司徒以保息養之者庶老也司門以其財養之者死政者之老也若夫外饔酒正稿人所謂耆老者總三者而言之也先王父事三老兄事五更則三老五更乃羣老之尤者而致仕之老固在其間皇氏離而三之誤矣月令無冬夏養老之文周禮禮記特言春養秋食而已熊氏謂養老嵗有七亦誤矣案周人修而兼用之孔疏謂春夏用虞燕禮夏饗禮秋冬用殷食禮拘於飲養陽食養隂之說恐未然也皇侃云先行饗次燕次食一日中行三事析理獨勝蓋養既致其敬又欲其安且樂故始則饗而敬之繼乃燕而安之食之而使有醉飽之樂至云春夏以飲為主秋冬以食為主則猶膠於所見耳竊疑養老之燕饗食當與疏所引天子享諸侯來朝來聘及諸公三食燕同異姓之禮有不同特用其名云然否則方養老時執醬而跪袒而割牲他燕饗有其儀乎凡肅賔客祀鬼神曰享於老致敬如賔與神故亦名其禮曰饗居處安之為燕養老時不欲煩其拜跪之節以逸其肢體故亦名其禮曰燕飲食以養其厭飫故亦名其禮曰食陳氏謂簡不帥教出征受成凡天子入學莫不養老初無明文五十養於鄊六十養於國七十養於學逹於諸侯八十拜君命一坐再至瞽亦如之九十使人受正義鄭氏康成曰天子諸侯養老同也國國中小學在王宫之左學大學也在郊小學在國中大學在郊此殷制明矣命謂君不親饗食必以其禮致之孔氏頴逹曰五十始衰故養於鄊學六十漸衰養禮彌厚故養之於小學七十大衰養禮轉重故養於大學至於八十年轉衰弱不堪來學受養君以饗食之禮使人就家致之其受君命之時理須再拜不堪為勞一坐於地而首再至於地也瞽人無目恐其傾倒拜君命亦當如此陳氏祥道曰年彌髙者養彌厚養彌厚者禮彌敬故五十養於鄊而不從力政六十養於國而不與服戎七十養於學則天子袒而割牲執醬而饋執爵而酳方氏慤曰養於鄊者特尊於一鄊養於國者則尊於一國猶不離於臣道養於學者則有師道焉以其年彌髙而德彌劭也陸氏佃曰六十者坐五十者立養於鄊之謂也春養孤子秋養耆老六十養於國之謂也劉氏彜曰養於鄊者鄊飲酒之禮五十始與於養也六十養於國者有命賙餼老者則及之矣養於學則君就行焉存疑孔氏頴達曰此言子孫為國死難而王者養其父祖盧王等以養於鄊者不從力政養於國者不與服戎皆庶人之老非鄭義案本文及鄭注皆無死事之老之文恐孔說未確也又陳氏以年言方氏以德言則其義可通蓋庶老之養於鄊者未必盡有德若國老之養於學則必齒德俱尊矣有由鄊遞升者有終養於鄊者有不必自鄊升者要視其德何如耳五十異粻六十宿肉七十貮膳八十常珍九十飲食不離寢膳飲從於遊可也粻涉良反離去聲正義鄭氏康成曰粻糧也貮副也遊謂出入上觀孔氏頴逹曰自此以下雜記卿大夫士及庶人年老節制在家自養之法隨年為品也五十始衰糧宜自異不可與少壯者同六十轉老故恆宿肉在帳下不使求而不得也膳善食也七十恆令善食有儲副不使有闕也八十常使有珍竒美食九十飲食無時或急求須得故不離於寢美善之膳水漿之飲從於所遊之處可也方氏慤曰粻則地産以養其隂肉則天産以養其陽膳用六牲而已珍用八物則為貴有膳則肉可知有肉則粻可知異者不必宿宿者不必貮貮者不必常言之䡖重其禮之隆殺也由八十而下飲食或庋於閣而已於寢則亦離焉膳飲止於所居而已於遊固不從焉故必九十然後飲食不離寢膳飲從於遊也六十嵗制七十時制八十月制九十日修唯絞襟衾冒死而后制絞音爻襟其鴆反正義鄭氏康成曰絞襟衾冒一日二日而可為者孔疏檀弓文孔氏頴逹曰年既衰老預為送終之具嵗制謂棺也不易可成故嵗制然此大夫以下耳人君即位而為椑不待六十也其槨則死後為之以其葬尚賖故檀弓云旬而布材是也時制謂一時可辦衣物難得者是年轉老所須辦轉切也月制謂一月可辦衣物易得者九十棺衣皆畢但日日修理之為近於終故也絞襟衾冒四物易成故生不逆為須亡乃制也存疑陸氏佃曰九十日修不保月也八十月制不保時也七十時制不保嵗也辨正朱子曰嵗制者嵗以展而修之下時月日放此五十始衰六十非肉不飽七十非帛不暖八十非人不暖九十雖得人不暖矣正義方氏慤曰五十始衰宜有以扶其衰九十雖得人不暖則衰之極養之宜無不至也通論周氏諝曰孟子言五十可衣帛七十可食肉與此不同者王制主言血氣而養血氣者以食為先以衣為次故也五十杖於家六十杖於鄊七十杖於國八十杖於朝九十者天子欲有問焉則就其室以珍從從去聲正義鄭氏康成曰就其室以珍從尊養之也陳氏祥道曰大夫七十而後賜之杖此五十而杖者蓋杖於家邦鄊國者不必待賜杖於朝則非賜不可也通論方氏慤曰前言巡守之禮曰問百年者就見之而此言九十者何也彼之所言則一國之老又不必有爵者故其禮為殺此之所言則天下之老惟有爵者而已故其禮為備而又以珍從也祭義又言八十君問則就之者彼言異禮此言常禮也案伏生大傳以此為文王之政子春述樂正子語告齊宣王未致仕而優之遞隆如此七十不俟朝八十月告存九十日有秩正義鄭氏康成曰大夫士之老者揖君則退朱子曰揖君當作君揖故不俟朝月告存每月致膳也秩常也有常膳孔氏頴達曰此謂大夫士老年而聽致仕者則七十杖於國朝君之時入門至朝位君出揖之即退不待朝事畢也若不聼致仕則祭義云七十杖於國八十不俟朝告謂問也八十者君每月使人致膳告問存否九十極老君則日使人以常膳致之故云日有秩陸氏佃曰告存告而後存之即日有秩不必告也胡氏銓曰九十君日使人膳則八十月告存之時亦膳矣方氏慤曰日有秩日有常賜也若酒正之秩膳是矣案此既致仕而優之遞隆又如此五十不從力政六十不與服戎七十不與賔客之事八十齊喪之事弗及也與音預齊音齊正義鄭氏康成曰五十力稍衰也力政城道之役也與及也八十不齊則不祭也子代之祭是謂宗子不孤孔疏父是宗子年已八十子則代之是有父之宗子也若父不為宗子則不主祭祀無祭可代也無父稱孤有父不孤故云宗子不孤孔氏頴達曰上文嵗制及杖於家之屬兼含大夫士及庶人之老此惟據庶人之事其大夫士六十未致仕若為軍將當與服戎故知此據庶人也服戎謂從軍為士卒案易孟氏韓詩說年二十行役三十受兵六十還兵古周禮說國中自七尺以及六十野自六尺以及六十有五皆征之許慎云漢承百王而制二十三而役五十六而免六十五已老而周復征之非用民意鄭駁之云周禮皆征之者使為胥徒給公家之事如今之正衛耳胥徒事暇坐息之閒多如鄭此說力政田役為重故云五十免之故此五十不從力政祭義五十不為甸徒是也戎事差輕六十不與服戎及孟氏說六十還兵是也胥徒又輕故野外六十五猶征之若四郊之內以其多役故二十受役六十乃免若於野則力役又少故十五征之六十五乃免若兵革之事則三十受之如孟氏韓氏說是也方氏慤曰力政則事之常者故五十已不從矣服戎則事之變者故六十然後不與焉七十不與賔客之事八十齊喪之事不及者蓋事生之與事死事人之與事神不能無䡖重之别故也從謂行其事焉與則預之而已及則旁有所加之謂以其衰老已甚非特不能從與於事也而事固不當及於我矣馬氏睎孟曰力政服戎此免於公者也賔客齊喪此免於私者也蓋代之以子孫矣案八十已傳祭有子主之故齊弗及力不勝哀故喪弗及然亦指旁期以下若正期則猶及之老愈甚而事愈寡如此通論季氏本曰老者之役止於五十其曰六十不與服戎謂不得已之兵變非謂軍旅亦至六十而始免也祭義王制二條可正鄊大夫六十六十五皆征之失許慎謂五經說皆不同無明文可據夫祭義王制之言五十即文王所謂老者非可據之明文乎五十而爵六十不親學七十致政唯衰麻為喪正義鄭氏康成曰爵謂賢者命為大夫不親學不能備弟子禮致政還其君事也存疑孔氏穎逹曰凡常之人有賢德故五十始為大夫若其有德不必五十故喪服小功章云大夫為昆弟之長殤是幼為大夫為兄之長殤案五十而爵示人不當躁於進七十致仕示人不當戀寵榮六十不親學示人至此學已晚也惟衰麻為喪恐毁或至滅性也五十而爵即內則五十命為大夫始錫命也其未命皆士試大夫也既試大夫則皆用大夫之禮喪服篇所云是通禮也孔謂此殷法殷士無爵恐大拘惟衰麻為喪所謂飲酒食肉處於內也然亦通制耳若仁人孝子豈無所以自盡哉有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊正義鄭氏康成曰皆學名也異者四代相變耳或上西或上東或貴在國或貴在郊上庠右學大學也在西郊下庠左學小學也在國中王宫之東東序東膠亦大學也在國中王宫之東西序虞庠亦小學也西序在西郊周立小學於西郊膠之言糾也庠之言養也周之小學為有虞之庠制是以名庠云其立鄊學亦如之膠或作絿孔氏頴逹曰此明養致仕之老及庶人之老給賜之事養老必在學者以學為教孝弟之處故於中養老熊氏云國老謂卿大夫致仕者庶老謂士皇氏云庶老兼庶人在官者其致仕之老大夫以上養從國老之法士養從庶老之法故外饔云邦饗耆老掌其割烹虞殷尚質貴取物成故大學在西小學在東夏周貴文取積漸長養故大學在東小學在西庠則後有室前有堂若夏后氏之序及周之學所在序者皆與庠制同其州黨之序則歇前而已序則豫也故鄊射云豫則鈎楹內堂則由楹外彼鄭注豫讀如成周宣榭火之榭是也周氏諝曰上庠下庠以尊卑言之東序西序以方言之右學左學以位言之虞與殷尚右貴有為也夏與周尚左貴陽位也國老庶老皆養之者恩也國老必於大學庶老必於小學者義也孟子曰夏曰校殷曰序周曰庠學則三代共之與此異者蓋以教則皆得謂之校以射皆得謂之序以養士皆得謂之庠以糾不帥者皆得謂之膠孟子之言特應時改造之名耳陳氏澔曰養老必於學以其為講明孝弟禮義之所也案鄭謂四代皆大小二學為國學其立鄊學亦如虞庠為三孔云周天子立虞夏殷周四代之學諸侯止立時王一代之學賜則得立東序大功德如魯則得立三代之學陳氏謂記言天子設四學蓋周制周之辟雍即成均又謂之序又謂之庠東膠即東序瞽宗即右學成均居中其左東序其右瞽宗此皆大學並建一丘之上虞庠在國之西郊是為小學則周大學有三小學止一也陸氏謂東膠虞庠郊學也諸侯謂膠為校左傳鄭人遊於鄊校校雖在鄉距國不逺又謂周置師保之官居虎門側正當王宫南之左此是小學又謂此二庠二序二學東膠虞庠皆小學先儒分養國老者為大學養庶老者為小學非也其大學在郊非此東膠虞庠是周小學有三其大學在郊者别一也項氏謂周於近郊並建四學虞庠在北夏序在東商校在西當代之學居中南面三學環之言其地曰郊言其象曰辟雍是四學總一地今考易大初篇云天子旦入東學晝入南學莫入西學夜入北學是虞夏殷亦未必止二學且此四學天子入之則必國學而非小學且一日周之則其地必相近而不在郊大戴禮記有五學賈誼所述古禮亦同是此東西南北四學中有大學為五也嘗總而論之大學小學以年分鄉學國學以地分鄉學中有小大國學中亦有小大而天子大學之在西郊者猶鄊學非大學而先儒每求小學於此是以誤也蓋以年論則八嵗所入者名小學天子小學在王宫之東天子之子入焉所謂虎門側者即此諸侯小學在公宫南之左諸侯之子入焉不於正東避天子也大夫士庶之子各在其家之孰或天子諸侯擇其公卿大夫適士之子之雋者與世子居遊亦入故周禮師氏曰凡國貴遊之子弟學焉是天子諸侯之小學一有常所而卿大夫士庶之子其小學無數亦無定所也若謂天子諸侯之子八嵗即入四郊之小學案鄭謂虞下庠夏西序殷左學周虞庠在西郊為小學則太逺而不情若謂卿大夫士庶之子同入此宫左之小學亦太雜而不倫矣及其十有五年則所入者皆謂之大學而其地迥殊五百家為黨黨有庠士庶之入大學者在此二千五百家為州州有序卿大夫之子及庶人之子由庠升者入焉孟子所謂夏曰校殷曰序周曰庠者指此皆鄉學也自鄊而升乃入國學亦謂之校諸侯之國學在郊諸侯之子卿大夫元士之適子及自鄊而升士庶之子皆入焉諸侯嵗貢士於天子亦取諸此故曰諸侯之大學在郊將出而效之天子也天子之制則黨庠州序鄙庠遂序以下大約與侯國同而諸侯之郊學則視其國之大小或一或二或三天子之郊學則必四或曰虞夏殷郊學皆一周兼四代則四焉東之前曰東膠周學也謂之南學養致仕之老於此東之後曰東序以法夏亦曰東學養老更於此西之後曰瞽宗以法殷亦曰右學謂之北學養死事之老於此蓋教士之法至周而詳六鄊六遂之所升既衆而諸侯亦嵗貢士於天子非四學不足以容故各就其方居之所謂天子之小學在郊將收天下之人材入而用之也大司徒掌其教教成乃升之大學董子言五帝大學曰成均賈誼言三王大學曰辟雍陳氏言明之以法和之以道曰辟雍成其所虧均其過不及曰成均大樂正掌其教天子之元子衆子內諸侯公卿大夫元士之適子則不必由郊學升而即入於此或天子年尚少如太甲成王亦學於此常居東膠則三公三孤涖之不專受教於樂正矣而此成均亦備五學之制蔡氏雍謂辟雍明堂異名同實則大體如明堂而鄭氏於考工亦言或舉宗廟或舉王寢或舉明堂明同制也有虞氏皇而祭深衣而養老夏后氏收而祭燕衣而養老殷人冔而祭縞衣而養老周人冕而祭𤣥衣而養老冔火羽反正義鄭氏康成曰皇冕屬也畫羽飾焉孔疏周禮皇邸皇舞皇鳳皇也鳳羽五采故畫凡冕屬皆𤣥上纁下凡養老之服皆其時與群臣燕之服孔疏以夏燕衣養老周人燕用𤣥衣知之有虞氏質深衣而已孔疏虞質深衣用白布其冠未聞皇氏云皇冠崔氏謂與夏周同案郊特牲云太古冠布齊則緇之則虞或白布冠也夏而改之尚黑而黑衣裳殷尚白而縞衣裳孔疏縞白色生絹亦名為素周則兼用之𤣥衣素裳孔疏經云𤣥衣若衣裳俱𤣥則與夏不異據儀禮朝服緇布衣素裳故知也其冠則牟追章甫委貌也孔疏儀禮朝服𤣥冠即委貌知殷朝服著章甫夏朝服著牟追也諸侯以天子之燕服為朝服孔疏以燕禮諸侯燕臣用朝服知天子同也燕禮曰燕朝服服是服也孔疏言燕時服是𤣥衣素裳之服王者之後亦以燕服為之季康子朝服以縞僭宋禮也孔疏康子事見玉藻若當時朝服無以縞者康子不應服之明是宋所著案此恐未確天子皮辨以日視朝也孔疏證天子與諸侯朝服之别詩頍辨注云禮天子諸侯朝服以燕天子朝服以皮辨服以皮辨服燕不用𤣥衣者詩所謂燕同姓諸公及異姓甥舅等故用皮辨尚質故也若燕其諸侯則用𤣥衣明諸侯朝服以日視朝服則𤣥冕素裳也馬氏睎孟曰先言祭者蓋祭所以追養繼孝而年之貴乎天下久矣次乎事親也故以祭為先在祭祀不言衣言冠則知其有衣在養老不言冠言衣則知其有冠存疑陸氏佃曰燕衣燕居之衣𤣥端是也據卒食𤣥端以居縞衣朝衣也據朝服之以縞自季康子始也𤣥衣冕也據食三老五更於大學冕而總干養老夏后氏衣以燕服殷人以朝服周人以祭服後王彌文也言燕則知有所謂朝言𤣥則知有所謂素言縞則知有所謂麻深衣亦燕服其服之卑者也記曰朝𤣥端夕深衣陳氏澔曰夏𤣥冠緇帶素韠白舄凡三王養老皆引年八十者一子不從政九十者其家不從政廢疾非人不養者一人不從政父母之喪三年不從政齊衰大功之喪三月不從政將徙於諸侯三月不從政自諸侯來徙家期不從政政同征正義鄭氏康成曰已而引户校年當行復除也老人衆多非賢者不可皆養廢廢於人事自從也孔氏頴逹曰案旅師云新氓之治皆聼之使無征役鄭注引此文以證之是據民之遷徙也王肅庾氏謂從大夫家出仕諸侯從諸侯退仕大夫非鄭意也方氏慤曰人莫衰於老莫苦於疾莫憂於喪莫勞於徙故王政恤之周氏諝曰一子一人不從政則老者廢疾者有所養喪不從政則生者得以盡其哀將徙不從政所以寬之始來不從政所以安之也通論陳氏祥道曰凡言養老必兼虞氏此特言三王引年者逺則論略近則論詳故也特言引年養老以年為主故也病者老者在所養喪者在所恤徙者在所寬此所以或復其家或復其子或復其身也周官大司徒以保息六養萬民有曰養老有曰寬疾以至小司徒鄊大夫遂人皆辨其老者廢疾者旅師凡新氓之治皆聽之使無征役然則辨其老者廢疾者蓋亦特復其身而已新氓之無征役蓋亦不過期而已制之以義綏之以仁也存異孔氏頴逹曰自諸侯來徙家謂諸侯之民來徙大夫之邑大夫役多地狹欲令人貪之故期不從政案引者引伸之義謂由國之養而推之也雖庶民中無德之老亦必復其子復其家使之得所養焉廢疾以下因言養老而類及之來徙家謂他國來徙而家於此蓋徙於諸侯自我國而往者具餱糧備械器其時猶少故止三月不從政若徙而來家於此則授之田里垣墉畝澮皆非素習故期不從政也若大夫之邑即諸侯之邑其民即諸侯之民役使無不均也大夫豈有私結其民之術哉少而無父者謂之孤老而無子者謂之獨老而無妻者謂之矜老而無夫者謂之寡此四者天民之窮而無告者也皆有常餼少詩照反矜與鰥同古頑反正義鄭氏康成曰餼廩也孔氏頴逹曰此論矜恤鰥寡孤獨之事案劉熙釋名云無妻曰鰥愁悒不能寐目恆鰥鰥然其字從魚魚目恆不閉無夫曰寡寡倮也倮然單獨也無父曰孤孤顧也顧望無所瞻見也無子曰獨獨鹿也鹿鹿無所依也成氏伯嶼曰四十無妻不為鰥三十無夫不為寡有室無父不為孤壯而無子不為獨先王制禮憂民之極則以老少年齒為限也瘖聾跛躃斷者侏儒百工各以其器食之瘖音音跛彼我反躃跲亦反斷音段侏音朱食音嗣正義鄭氏康成曰斷謂支節絶也侏儒短人也器能也孔氏穎逹曰此論矜恤疾民之事瘖謂口不能言聾謂耳不聞聲跛躃謂足不能行斷者謂肢節解絶侏儒謂容貌短小此等既非老無告不可特與常餼然既有疾病又不可不養故各以器能供官役使以廩餼食之晉語文公問八疾胥臣對曰戚施權鎛注云使擊鐘籧篨蒙璆注云璆是玉磬使擊之侏儒扶廬注云扶緣也廬㦸柄也矇瞍循聲注云歌詠琴瑟聾聵司火注云使主然火其童昏嚚瘖僬僥官司所不材宜於裔土是各以器食之外傳不云跛躃此不云籧篨戚施文不具外傳瘖與僬僥置於掌土此瘖與侏儒以器食之者今古法異也方氏慤曰先王之政使在下者無廢才而人人各得其養隨其大小長短而用之故謂之器耳案百工執技利用官司之所材瘖聾侏儒則官司不材者何以並言之意蓋謂瘖聾侏儒廢疾之人不能執百工之業無以自食王政之所矜故各就其所具之器而從之使得食淮南子云伊尹之興土功也修脛者使跖钁強脊者使負土眇者使之準傴者使之塗即各以其器食之之意道路男子由右婦人由左車從中央父之齒隨行兄之齒鴈行朋友不相踰輕任並重任分班白者不提挈行如字一音户剛反並必性反又作併挈苦結反正義鄭氏康成曰道有三途逺别也於塗中而隨行鴈行不相踰廣敬也並分皆謂以與少者雜色曰班孔氏穎逹曰任謂有擔負者老少並䡖則並與少者擔之老少並重不可並與少者則分為䡖重重與少者輕與老者陳氏祥道曰男女嫌於無别故男右女左車患於阽危故從中央陸氏佃曰父之齒年長以倍是也兄之齒十年以長是也所謂五年以長則肩隨之視此焉方氏慤曰隨行從其後也鴈行差其次也朋友不相踰謂各以其齒而為先後之序也君子耆老不徒行庶人耆老不徒食正義鄭氏康成曰徒猶空也陸氏佃曰無車而行為徒行無肉而食為徒食案君子謂士以上方氏云大夫謂之君子以位稱之士謂之君子以德稱之大夫祭器不假祭器未成不造燕器正義鄭氏康成曰造為也孔氏穎逹曰皇氏云此謂有地大夫故祭器不假若無地大夫則當假之故禮運云大夫祭器不假聲樂皆具非禮也謂無地大夫也周氏諝曰祭器未成不造燕器者先神而後人也通論陳氏祥道曰君子之行禮也無事則先諸神故田則先乾豆營宫室則先宗廟造器則先祭器有患則先諸己故凶年君膳不祭肺馬不食穀馳道不除祭事不縣方一里者為田九百畝方十里者為方一里者百為田九萬畝方百里者為方十里者百為田九十億畝方千里者為方百里者百為田九萬億畝億於力反正義鄭氏康成曰一里方三百步億今十萬萬億今萬萬也孔氏頴逹曰此論開方之法總計天子畿外內諸侯之地論語注云步百為畝是長一百步闊一步畝百為夫是一頃也長闊一百步夫三為屋是三頃也闊三百步長一百步屋三為井是九百畝也長闊一里一箇十里之方為田九萬畝十箇十里之方為田九十萬畝一百箇十里之方為田九百萬畝今云九十億畝是一億有十萬十億有百萬九十億為九百萬畝也陳氏澔曰方千里則一百箇百里之方以億言之當云九千億畝以萬言之當云九萬萬畝經文誤也存異皇氏侃曰億數不定或以十萬為億或以萬萬為億或以一萬為億此云萬億者祗是萬萬也六國時或將萬為億故云萬億李氏曰此即注天子之田千里之文案此以下皆申釋前文古經後有記皆如此李氏謂此漢儒注王制之文非也此一節由一里推之而總計一州田畝之數縱廣一里為田九百畝縱一里廣十里則九千畝縱十里廣十里則九萬畝縱十里廣百里則九十萬畝縱百里廣百里則九百萬畝此大國之數縱百里廣千里則九千萬畝縱千里廣千里則九萬萬畝此一州之數朱子謂是漢儒硬做這算法是也若論其實田可井則井之不可井則截長補短有百畝之地即可授一夫有二十五畝之地即可授一餘夫此方田之法所以列為九數之首原不必盡其地而井之盡其井而方之也今之積步法即古之方田法東與西並而折半南與北並而折半則不方者皆方矣若謂古之井無不方者則方田一數又安用哉自恆山至於南河千里而近自南河至於江千里而近自江至於衡山千里而遙自東河至於東海千里而遙自東河至於西河千里而近自西河至於流沙千里而遙西不盡流沙南不盡衡山東不盡東海北不盡恆山凡四海之內斷長補短方三千里為田八十萬億一萬億畝正義鄭氏康成曰恆山至南河冀州域南河至江豫州域江至衡山荆州域東河至東海徐州域東河至西河亦冀州域西河至流沙雍州域方三千里為田八十萬億一萬億畝此九州之大計皇氏侃曰千里而近者謂以千里言之其地稍近不滿千里千里而遙者謂以千里言之其地稍逺不啻千里也孔氏頴逹曰此論四海之內地逺近里數也為田八十萬億一萬億畝者以一州方千里九州方三千里三三如九為方千里者有九一箇千里有九萬億畝九箇千里九九八十一故有八十一萬億畝但記文詳具於八十整數之下云萬億是八十箇萬億又云一萬億言是詳也以前文誤為萬億此則因前文之誤更以萬億言之方氏慤曰經上重有萬億二字蓋衍文李氏曰此經乃注九州千七百國之文也應氏鏞曰海獨言東者東海在中國封疆之內而西南北則夷徼之外疆理有不及也南獨以江與衡山為限百越猶未盡開也惟河獨舉東西南者河流縈帶而周繞雖流沙分際亦與河接也當先王盛時東西南北各有不盡蓋聽四夷居之故外薄四海弼成五服至於五千里者此區域之大數而疆理之略者也四海之內斷長補短方三千里者此民田之大數而疆理之詳者也觀於曰內曰外二字而治之詳略可見矣陳氏澔曰方三千里當云八萬一千億畝疏亦承誤釋之案細究此經非計四方道里逺近蓋作王制者因九服五服之法欲割九州之境規方處中以為都畿也古者天子邦畿千里而實不止一州故自恆山至南河則割冀州之南以為王都之北境自南河至於江則割豫州以為南境東河至於東海則割徐州之西以為東境而兖在其中其不言西境者漢都長安雖仍豫州域而已帶雍州故不須割規方處中而王畿之規模大定則計其里數恆山至南河南河至江南境皆千里東河至西河東境亦千里自冀豫徐東南北合而規之則王畿之內斷長補短方三千里矣而其外則為逺服故皆千里而遙要亦概言之或不至千里或過千里不必拘於必千里也如孔疏所云則四海之內斷長補短何至三千里海內之地方千里者九便是九千里孟子固言之矣下是規定王畿而因計畿內之地應得田多少之數作王制者有意復井田封建故此經及前後文於分田制祿建國詳言之通論葉氏時曰古言九州者三禹貢之冀兖青徐揚荆豫梁雍夏制也爾雅之冀幽營兖徐揚荆豫雍商制也職方之揚荆豫青兖雍幽冀並周制也商有幽營而無禹貢之青梁周有幽並而無禹貢之徐梁此三代九州之不同也爾雅何以知其為商制以郭璞詁云也賈氏乃謂之夏制蓋以詩譜所謂梁雍荆豫徐揚之民被文王之化文王當商之末有雍梁之名爾雅無梁州則不可為商制然爾雅有九州之名無九州之界而禹貢職方之界有相侵者冀州視禹貢為小以分冀而為幽並如舜時制是一分而為三也禹貢曰海岱及淮惟徐州又曰大野既瀦今職方青州之川淮泗兖州之澤大野是以徐而入青兖可知禹貢曰華陽黑水惟梁州又曰厥貢璆鐵銀鏤砮磬今職方豫州之山華雍州之利玉石是以梁而入於雍豫可知職方既以青兖而包徐故青州多入禹貢之豫兖州多入禹貢之青禹貢豫州曰被孟瀦而職方青州曰其澤望諸豈非青之入豫乎禹貢青州曰鹽絺海物而職方兖州曰其利蒲魚豈非兖之入青乎職方既分冀而為幽並故幽州多入禹貢之青徐冀州多入禹貢之雍其山醫無閭醫無閭在遼東漢光武以遼東屬青州後又屬幽州茲非幽之入青乎職方曰幽州其澤貕養其浸菑時貕養在長廣菑在萊蕪地理志以長廣屬徐州琅琊有萊山茲非幽之入徐乎職方曰冀州其澤楊紆爾雅謂秦有楊紆李淳風以為在扶風茲非冀之入雍乎大抵周以禹之一冀州分而為三以禹之八州合而為六杜氏與二鄭不本此說不改職方之字則改職方之意後鄭以頴宜屬豫溠宜屬荆不知幽青雍梁兖豫尚多侵入況荆豫相距之州乎改其意而釋者此也先鄭以青之􅊶徐也謂雍之弦當為汧蒲當為浦直謂雍有汧水曽不謂吳山在汧而有弦蒲之藪杜氏以荆之湛當為淮後鄭以兖之盧維為雷雍直以湛與盧維無所經見曽不謂地名變易不一不可一一知也改其字而釋者此也至如山鎮藪澤又有可得而辨者九州山鎮分言之則曰四鎮五嶽總言之皆曰山鎮揚之㑹稽青之沂山幽之醫無閭冀之霍山故為四鎮矣而五嶽在虞夏商周與漢世皆有不同舜典南嶽孔安國以為衡山職方曰山鎮曰衡山是衡為南嶽眀矣而漢武帝以衡山遼逺又移其神於霍山此漢嶽與虞周不同也王制南北以山為至東西以水為至故五嶽言其二舜典言四方巡守所至之地故五嶽言其四嵩髙太室即禹貢之外方初無嶽名職方山鎮有岱有華有衡不言嵩髙而有嶽山蓋周都在五嶽之外故以雍之吳山為嶽山此周嶽之與虞夏商不同也故曰山鎮之有可辨者此也九州藪澤在職方為九在爾雅為十蓋職方以州言爾雅以國言也爾雅吳越有具區即揚楚有雲夢即荆鄭有圃田即豫宋有孟豬即青魯有大野即兖秦有楊紆即冀燕有昭餘祁即並此藪澤之名同也獨晉之大陸齊之海隅周之焦穫爾雅與職方不同然爾雅之徐即職方之幽以其幽之澤藪貕養而貕養在徐也爾雅之燕為職方之並以其並之昭餘祁而燕為幽州也爾雅之周為職方之雍爾雅之秦亦為職方之雍職方既以弦蒲為雍所以不受焦穫爾雅之晉為職方之冀職方既以冀之界入於秦以楊紆為冀所以不受大陸此藪澤之名異也故曰澤藪之可辨者此也案此由一州推之而總計九州田畝之數其分言逺近以見前所謂九州皆方千里特舉其概非果截然正方而建國之數田畝之數特例推之而非果皆如一也明乎此則固不以文􅊣辭矣方百里者為田九十億畝山陵林麓川澤溝瀆城郭宫室塗巷三分去一其餘六十億畝正義鄭氏康成曰以一大國為率其餘所以授民也山足曰麓案古之建國有多山林者有多川澤者亦有平原廣野無大山川者上既以開方法計疆域之數此又舉一大國以約計其田畝之實而七十里五十里之國可知其實未必皆三分去一也古者以周尺八尺為步今以周尺六尺四寸為步古者百畝當今東田百四十六畝三十步古者百里當今百二十一里六十步四尺二寸二分正義鄭氏康成曰周尺之數未詳聞也案禮制周猶以十寸為尺蓋六國時多變亂法度或言周尺八寸則步更為八八六十四寸以此計之古者百畝當今百五十六畝二十五步古者百里當今百二十五里陳氏祥道曰投壺記曰籌室中五扶堂上七扶公羊傳曰膚寸而合鄭氏曰鋪四指扶一指案寸何休曰側手為膚案指為寸扶即膚耳然則尺寸之度取諸身也漢律歷志一黍之廣為分十分為寸十寸為尺然則尺寸之廣又取諸物也先王制法近取諸身逺取諸物指尺之與黍尺一也黍有巨細故尺有長短先儒以黍之巨者積而為寸則與指膚不合於是有指黍二尺之辨謂圭璧之屬用指尺冠冕彝尊之屬用黍尺豈其然乎周禮典瑞璧羡以起度考工記璧羡度尺好三寸以為度璧徑九寸羡而長之從十寸廣八寸同謂之度尺則周之法十寸八寸皆為尺也考工記於案言十有二寸於鎮圭言尺有二寸此十寸尺之證也說文曰咫八寸周尺也王制曰周尺八尺為步今以周六尺四寸為步六尺四寸乃八尺耳蔡氏元定曰以十寸之尺起度則十尺為丈十丈為引八寸之尺起度則八尺為尋倍尋為常案此經諸儒因不明周尺之義遂至紛說徒作算博士竊意所謂周尺非指周代之尺而言周盡也凡尺之用盡於十至十則為丈而非尺矣此言古今丈田之不同丈田於一丈之中盡十尺之數而去其二尺而以八尺為步古之步田則然故曰古者以八尺為步今於一丈之中盡十尺之數而去其三尺六寸而以六尺四寸為步故曰今以周尺六尺四寸為步細究之義自灼然不然何不曰周以八尺為步而曰古者以周尺乎惟古今尺步實不同故明著其文曰八尺曰六尺四寸故知此周尺之周斷不指周代而言今則指漢時然六尺為步彭季山謂是古法不知實自秦始司馬法所稱且置勿論商君在穰苴之先故知自鞅始考商君治秦步過六尺者有罰步過六尺正謂步畝之數蓋鞅因古八尺為步則畝寬今去二尺以六尺為步則田必有餘積其有餘則田數增多而賦稅加益此下令墾草時阡陌經界並盡變古人者也惟田數增多故古者百畝得當今東田百四十六畝三十步兩古者則指周時且兼夏商而言耳又案天地之數生於一成於十律度量衡本天地自然之數故十寸為尺一定而不可易者蔡雍獨斷云夏以十三月為正十寸為尺律中太蔟商以十二月為正九寸為尺律中大吕周以十一月為正八寸為尺律中黃鍾後人據此遂以周尺果八寸此恐不然古人用尺無不以十寸為定者說苑云度量權衡以粟生一粟為一分十分為寸積十為尺漢志云度者所以度長短也本起黃鍾之長以黍度之一黍為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣此其明證故自黃帝至三代漢唐無不以十寸為一尺虞書同律度量衡正恐其於十寸之正或有長短之不齊故必同之武王滅紂即謹權量猶之舜同律度何得言禹尺十寸而殷周遞減其數豈理也哉又考周時尺與漢晉時尺短長正同汲冡得古周時玉律即玉尺也荀勗揆校比今尺長四分半後始平掘地又得古銅尺亦然則知周不以八寸為尺明矣又案如雍言周以十二月為正律中黃鍾則黃鍾九數周且當依九數以九寸為尺何取於八益知其不足信存疑孔氏頴達曰古者八寸為尺今以周尺八尺為步則一步有六尺四寸今以周尺六尺四寸為步則一步有五十二寸是今步比古步每步剩出一十二寸則古者百畝當今東田百五十二畝七十一步有餘又今步每剩古步十二寸則古之百里當今百二十三里一百一十五步二十寸與經不相應辨正陳氏澔曰疏義所算亦誤當云古者八寸為尺以周尺八尺為步則一步有六尺四寸今以周尺六尺四寸為步則一步有五尺一寸二分是今步比古步每步剩出一尺二寸八分則古者百畝當今東田百五十六畝二十五步一寸六分十分寸之四存異季氏本曰六尺為步古法也自后稷教民稼穡以來即有一畝三畎畎皆廣尺深尺之說則六尺之為步不始於周矣半步曰武因二武而度其長曰步此本人身自然之度不知王制何緣更起古步八尺之說至以六尺四寸為步則當省尺之四尺八寸耳步狹田增不合人身步武之數此必阡陌既開之後欲文富國者之言注疏雖正其誤亦未究六尺為步之古法也案此申前制農田百畝之意明古今授田有異數無異實也由周而言古則古謂商由周而言今則今謂漢周法布指知寸布手知尺引肘知尋以一指之廣為一寸兩手之廣為一尺引伸兩手為一尋古之積步皆起於車周車廣六尺六寸故以六尺六寸為步秦車六尺亦以六尺為步漢車六尺四寸亦以六尺四寸為步步廣則畝數少步狹則畝數多故商之七十畝於周為百畝而周之百畝於漢為百五十六畝二十五步也鄭氏謂周尺之數未詳聞案禮制周猶以十寸為尺蔡雍則謂商尺得夏九寸周尺得商八寸鄭據周禮謂鎮圭尺二寸公桓圭九寸知周尺亦十寸蓋周之尺未嘗不分為十寸而其實則當商之八寸耳諸儒於孟子夏后氏五十而貢殷人七十而助周人百畝而徹不得其說各以意推之皇氏謂夏時民多殷漸少周民至稀則天之生人有日益無日損非大兵大疫未嘗驟減何以三代之隆而户口反日少耶熊氏謂夏政寬簡一夫百畝止稅其五十畝殷政稍急增稅七十周政極煩畝盡稅之則夏民何樂於殷之增稅而歸殷殷民何樂於周之增稅而歸周孟子又何以言皆什一耶陳氏謂夏時洪水方平可耕之田尚少故授田止五十殷時漸廣周大備故日增徐氏謂夏民儉約故授以五十而用足後世彌文而用廣故田不得不加多是二說朱子嘗疑之謂先王疆理天下溝洫畎澮大假費力一旦加增許多疆理都要更改煩擾已甚恐無是理金氏謂區皆百畝三代所同但夏一井十六家受之自貢什一商一井十二夫受之而助耕公田周乃每夫一區不知夏始畫井何不人一區而故為牽配又金氏謂周世君子工商及庶人在官皆不受田故田多而農得百畝豈夏商君臣皆並耕而治其工商皆耕且為耶其說尤不可曉袁氏謂三代民皆百畝但夏以五十為萊田商以三十為萊田周人萊田在别井考周禮所謂萊田因其田非衍沃故别給此以補其不足未有一井中而半墝半次半荒半熟者尤不當以此附㑹也惟蔡雍寸度不一之說近之而數亦未盡合總之不若孟子與此文明白可據也朱子曰孟子之言雖本三代遺制然盡其大不必盡其細則所云五十七十百畝亦大數則然耳正不必寸寸而推之也又案周尺當今營造尺六寸四分則今方五尺為步在周止方三尺二寸又周步百為畝今二百四十步為畝則周百畝當今二十五畝六分耳漢景帝始定二百四十步為畝王制作於文帝時故猶以百步為畝耳若就本經細推之則孔疏固誤陳注亦未精孔疏謂今一步有五十二寸者誤陳注謂一步有五尺一寸二分是也陳謂古百畝當今百五十六畝二十五步得之謂尚有竒零一寸六分十分寸之四則猶未精蓋以古步六尺四寸自乘得四十尺九十六寸為古一步之積與百畝一萬步相乘得四十萬九千六百尺為古百畝之積以今步五尺一寸二分自乘得二十六尺二十一寸四十四分為今一步之積與一畝百步相乘得二千六百二十一尺四十四寸為今一畝之積以方百畝之積為實以今一畝之積為法除之得一百五十六畝二十五步即古百畝當今畝之數也並有竒零今既以原注寸法計之復以尺計之本法及用分數計之捷法參之皆無不合若三法有一不合即不確矣今惟録原注寸法後二法詳算術不贅方千里者為方百里者百封方百里者三十國其餘方百里者七十又封方七十里者六十為方百里者二十九方十里者四十其餘方百里者四十方十里者六十又封方五十里者百二十為方百里者三十其餘方百里者十方十里者六十名山大澤不以封其餘以為附庸閒田諸侯之有功者取於閒田以祿之其有削地者歸之閒田聞音間正義孔氏穎逹曰此論畿外八州建國之法凡千里之方以開方計之為方百里者凡有一百封方百里者三十國謂公也又封方七十里者六十謂侯國也又封方五十里者百二十謂伯國也方氏慤曰諸侯之有功者取於閒田以祿之即巡守之禮言有功德於民者加地是也其有削地者歸之閒田即巡守之禮言不敬者君削以地是也周氏諝曰所謂封國之數非實有此國特計其地之廣狹所能容者也周官職方謂凡邦國千里封公以方五百里則四公方四百里則六侯方三百里則十一伯方二百里則二十五子方百里則百男以周知天下蓋以一千里度之則天下可以周知其法與此同名山大澤不以封亦非不以封也故詩曰泰山巖巖魯邦所瞻又曰奄有龜䝉遂荒大東是泰山之與龜蒙雖不悉是魯國實封之地然亦在其所封域之內也附庸所以畜小國閒田所以待有功之諸侯周官之法若縣師所謂野者皆閒田也案此申前州二百一十國之實大約以方百里之地封方七十里之國則為二國而餘二里封方五十里之國則為四國然國必因山川以為界限所謂方七十里方五十里皆絶長補短以開方法計之固未必方亦未必整整七七四十九箇方十里五五二十五箇方十里也天子之縣內方千里者為方百里者百封方百里者九其餘方百里者九十一又封方七十里者二十一為方百里者十方十里者二十九其餘方百里者八十方十里者七十一又封方五十里者六十三為方百里者十五方十里者七十五其餘方百里者六十四方十里者九十六正義孔氏頴逹曰此計天子縣內之地畿外所餘地少畿內所餘地多者以畿外之土本擬封建諸侯故國數多餘地少畿內本為天子之有郊關鄊遂準擬公卿王子弟采邑故建國數少餘地多也陳氏祥道曰畿外封國多而餘地少廣封建之制於天下畿內封國少而餘地多備采邑之分於王朝也案此申前縣內九十三國之實國即公卿大夫食邑所謂祿也其餘為賔或喪祭諸用所出後世諸王子弟但飬以祿而無采地者甚多觀周自成康以下豈無支子孫惟鄭伯友得受甫田之地可知若畿外諸國多自古以來世守其地世有其民原不待封之而後有國若滅一國亦必封一國其從古所未開闢之地甚少必貶削其地乃歸閒田故閒田少也諸侯之下士祿食九人中士食十八人上士食三十六人下大夫食七十二人卿食二百八十八人君食二千八百八十人次國之卿食二百一十六人君食二千一百六十人小國之卿食百四十四人君食千四百四十人次國之卿命於其君者如小國之卿食音嗣正義孔氏頴逹曰此以下論士大夫及諸侯等食祿之數次國二卿命於天子祿各食二百一十六人而一卿命於其君為賤則祿不可等命天子者故視小國卿若子男二卿命於其君其國小不復差降也其天子之士卿大夫無文宜準大國之卿大夫士也通論應氏鏞曰由下士以至於君其祿愈厚則所食愈衆豈非以人徒服役漸增而漸廣與然由卿以下皆服役乎君者也則既各給之田以為祿矣君祿之所入豈盡以食二千八百八十人哉以二千八百八十人之食而飬一國之君所飬極其厚則所食兼於衆也然必析其數以見其所食之多亦欲居人上者知吾之所奉合衆力而共為之則必思其有以稱此且不至擁利以自私而必推己以飬人故君所食之人十倍於卿而由士至卿所食者次第加衆皆欲其無獨富之心而助君以飬民也案此申前諸侯之士視上農夫君十卿祿之制庶人在官者之祿有視九人至五人之差下士皆視九人無差者優士也然自士以上至於君卿雖不言差而使知祿出於耕則民力之甚艱享之之不易視此亦已可惕也天子之大夫為三監監於諸侯之國者其祿視諸侯之卿其爵視次國之君其祿取之於方伯之地上監如字下監平聲正義方氏慤曰篇首言監於方伯之國此言監於諸侯之國者蓋方伯長於諸侯三監監方伯即所以監諸侯其實一也以其監方伯故其祿取之於方伯之地焉王氏炎曰昔管叔蔡叔霍叔為三監於殷成王既殺武庚以其地付康叔兼治之謂之孟侯則為諸侯之長成王使之劼毖其民且曰矧惟若疇圻父薄違農父若保宏父定辟圻父司馬農父司徒宏父司空此天子使三卿監其國故以為康叔之疇案祿視諸侯之卿者其食少爵視次國之君者其體尊蓋視子男而一隆之一殺之也方伯為朝天子皆有湯沐之邑於天子之縣內視元士為去聲朝音潮正義鄭氏康成曰湯沐之邑給齊戒自潔清之用浴用湯沐用潘孔氏頴逹曰案前文云不能五十里曰附庸又云天子元士視附庸以湯沐之邑視元士亦五十里以下左氏說諸侯有功德於王室京師有朝宿之邑泰山有湯沐之邑魯周公之後鄭宣王母弟此皆有湯沐邑其餘則否陳氏祥道曰湯沐則朝宿之邑也不曰朝宿而曰湯沐者齊戒以見君故也又曰凡非方伯其邑不得視元士也案此以申前三監之制左氏於衛言有湯沐蓋晉魯衛皆為方伯故湯沐邑在天子縣內視子男鄭非方伯雖有祊邑而差小故鄭以祊易許而加璧祊薄於許田故也諸侯世子世國大夫不世爵使以德爵以功未賜爵視天子之元士以君其國諸侯之大夫不世爵祿正義鄭氏康成曰世子世國象賢也大夫謂縣內及列國諸侯為天子大夫者孔疏知是天子大夫者以下云諸侯之大夫不世爵而世祿辟賢也以君其國列國及縣內之國也孔氏頴逹曰禮運云天子有田以處其子孫則周召畢原之等是縣內諸侯也尚書顧命齊侯為虎賁衛侯為司寇是列國諸侯入為天子大夫也畿內諸侯有為三公則周召是也列國諸侯入為六卿則鄭武公是也若言公卿大夫於文為煩故總言大夫以包之詩云三事大夫謂三公也春秋諸侯殺大夫謂卿也是大夫為總號列國諸侯及縣內諸侯其身既死其子未得爵賜其衣服禮制視天子之元士各君其本國其畿內諸侯有大功德元子出封畿外則王命次子守其采邑若其賢才則世為公卿則春秋周公召伯之屬是也諸侯降於天子故大夫不世爵祿若有大功德亦得世之王氏炎曰在其國為世子則可以世國入為大夫則不可世爵蓋以德而使之待其功而爵之非子孫所得繼也又曰未賜爵此乃外之列國非畿內有采地之公卿也除服來朝以士服見於天子天子命之則授以冕服於是以諸侯而臨臣民或未朝天子亦遣使以冕服就賜之苟無君命而為諸侯春秋於桓公所以嵗首不書王也通論程子曰古者使以德爵以功世祿而不世官故賢才衆而庶績成及周之衰公卿大夫皆世官政由是敗矣案此又申前縣內諸侯祿外諸侯嗣之制諸侯之元子命於天子乃稱世子未命不稱世也天子之大夫為諸侯諸侯世國而大夫不世爵者大夫之子見德可任即使之必其成功乃爵之所謂五十命為大夫也夫外諸侯之世子初嗣君位其衣服禮數皆視天子之元士以君其國至除喪入見天子天子命之乃用諸侯之禮是世國者且不遽世爵況大夫乎然天子之大夫雖不世爵猶得世祿若諸侯之大夫則爵祿皆不世矣蓋天子地廣其采邑可不收諸侯地狹不收則將有所不給也但雖不世邑亦以賦稅飬其子孫六禮冠昏喪祭鄊相見七教父子兄弟夫婦君臣長幼朋友賔客八政飲食衣服事為異别度量數制冠去聲長上聲别必列切量去聲正義鄭氏康成曰鄊鄊飲酒鄊射也八政飲食為上衣服次之度丈尺也量斗斛也數百十也制布帛幅廣狹也又曰事為謂百工技藝異别五方用器不同也李氏曰此注司徒修六禮明七教齊八政之文也辨正項氏安世曰飲食衣服度量數制六者易明獨事為異别注不能通事為者冡宰之九職司徒之十二事考工之六職皆司徒所頒以任民者也異别者司徒五地之常職方九土之宜王制中國四夷之俗皆司空所辨以居民者也案冠以昭成人昏以正男女喪以慎終祭以報本鄊以崇齒德相見以正交接六者所以節民性也父慈子孝兄友弟恭夫義婦聼以齊其家君仁臣忠長惠幼順朋友有信賔客有禮則逹於鄊國七者所以興民德也事為導民以所當為異别教民以所當辨如親踈貴賤之等皆是飲食有節衣服有章事為有恆異别有辨度有長短量有大小數有多寡制有廣狹八者皆所以防民之淫也通論方氏慤曰冠昏嘉禮也喪凶禮也祭吉禮也鄊相見賔禮也不及軍禮者六禮司徒修之以節民性而有發司徒教士以車甲則軍禮固在其中矣陳氏祥道曰六禮不及朝聘軍旅而不備乎宗伯之五禮八政不及貨祀之類而異乎洪範之八政者宗伯之五禮洪範之八政人君之所揆於上也王制之六禮八政司徒之所教於下也欽定禮記義疏卷十九
