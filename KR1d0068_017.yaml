body:
  text: 五制第五之三天子七日而殯七月而葬諸侯五日而殯五月而葬大夫士庶人三日而殯三月而葬三年之喪自天子達正義鄭氏康成曰尊者舒卑者速春秋傳曰天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至杜氏預曰言同軌以别四夷之國言同盟同在方嶽之盟諸侯以下不言畢至有來有不來也孔氏穎逹曰自此至不祭明天子以下殯葬日月不同及衣衾牲器之數天子諸侯位既尊重送終禮物其數既多許其申遂故日月緩也大夫及士禮數既卑送終之物其數簡少義許奪情故日月促也必至三日者冀其更生三日不生亦不生矣左傳云大夫三月士踰月而此總云三月者除死月為三月士三月者數死月正是踰越一月故言踰月耳通論劉氏彞曰天子功德施於四海諸侯功德洽於一國大夫士恩德孚於一家庶人恩德著於其族固有小大之差天子葬者其當朝嵗之諸侯六服罔有不至或奔喪或㑹葬或㑹於練祥如四時之朝焉其不當朝嵗之諸侯則為位服於其國而遣卿以㑹葬同軌之畢至謂此也七月而葬所以極四海之哀誠也諸侯之葬必五月者相為賓也同盟之諸侯也雖非同盟而為其甥舅姑姊妹之邦也士庶人三月而葬其事具其誠盡矣案此以下因上言喪葬而類及之在周則宗伯之掌此不詳也天子之喪在侯服者無不奔也若在賓服則不責其必至矣其有父母之喪則大君者天下之所同親者人子之所獨君子不奪人之喪王吏不討可知故左氏說諸侯於天子之喪但使上卿弔上卿㑹葬者固非而公羊說雖父母喪亦奔者亦過也庶人縣封葬不為雨止不封不樹喪不二事自天子達於庶人縣懸同封窆同為去聲自天子句鄭屬下節今從王氏屬上句正義鄭氏康成曰縣封當為懸窆孔疏鄭知封當為窆者封土無懸係之理窆謂下棺㑹案窆從之穴㑹意封從之土意作懸窆者至卑不得引紼下棺孔疏士無碑有二繂繫棺下之雖雨猶葬以其禮儀少封謂聚土為墳案封從丰土㑹意作後混為一不封之不樹之又為至卑無飾也孔疏不積土為封不標墓以𣗳卑不須顯異也周禮曰以爵等為丘封之度與其樹數則士以上乃皆封樹孔疏周禮冢人職文彼注王公曰丘諸臣曰封又引漢律列侯墳髙四丈關內侯以下至庶人各有差檀弓孔子葬母崇四尺注蓋周之士其樹白虎通云天子松諸侯柏大夫栗士槐庶人樹以榆栁二之言二也孔氏穎逹曰許慎云死葬之以禮以雨而葬是不行禮通論孔氏穎逹曰公羊說雨不克葬謂天子諸侯也卿大夫臣賤不能以雨止又釋廢疾云雖庶人葬為雨而止則在廟未發之時庶人及卿大夫亦得為雨止若其已發在路及葬則不為雨止也其人君在廟及在路及葬皆為雨止陳氏祥道曰魯葬定公與敬嬴以雨不克葬而春秋譏之則不為雨止者不特庶人而已存異鄭氏康成曰庶人終喪無二事不使從政也喪大記曰大夫士既葬公政入於家既卒哭辨絰帶金革之事無辟也孔疏引以證大夫士在喪有二事辨正王氏安石曰喪不二事當連自天子至於庶人為句三年不從政所謂不二事使一於喪事也金革無辟上使之非也或權制也案喪不二事謂一志於親天子則諒隂不言諸侯居廬未有命戒大夫既葬亦致其事於君士亦三年廢業也庶人縣封至不樹言貴賤之禮制有殊喪不二事言貴賤之専志則一又案夲文明以葬不為雨止屬庶人而陳氏又非無據且考喪禮有道車載簑笠之文則君葬雨不止矣戰國䇿有雪甚及牛目而止之事或戰國及秦漢遇雨雪皆止遂以是定制與喪從死者祭從生者支子不祭正義鄭氏康成曰從死者謂衣衾棺椁從生者謂奠祭之牲器孔氏穎逹曰盧植云從生者謂除服之後吉祭之時以子孫官祿祭其父祖若喪中之祭虞祔練祥仍從死者之爵故小記云士祔於大夫則易牲又云其妻為大夫而卒而後其夫不為大夫而祔於其妻則不易牲雜記云上大夫之虞也少牢卒哭成事祔皆大牢下大夫之虞也犆牲卒哭成事祔皆少牢是喪中之祭仍從死者之禮也鄭云喪中奠祭得從生者之爵與小記雜記違者小記雜記據生者無官爵故喪祭用死者之禮若生者有爵則祭從生者之法喪祭尚爾後吉祭可知奠謂葬前祭謂葬後包喪終吉祭也鄭必與盧植别者以此云祭從生者喪從死者相對與中庸大夫士祭與葬相對皆祭與喪連及故祭中兼喪奠也或云在喪中祭尚從死者爵至吉祭乃用生者祿耳奠者自吉祭之奠耳朱子曰葬用死者之爵祭用生者之祿通論陳氏祥道曰祭雖從生者而有所謂從死者故父為士子為天子諸侯而其尸服則以士服支子雖不祭而有所謂祭故宗子為士庶子為大夫則以上牲祭於宗子之家案祭從生者謂適長子也適長為士支子為大夫亦祇以士主祭不以大夫古人極重宗法支子不祭謂不主祭耳其祝辭云宗子某為介子某薦其常事則庶子為大夫而以大夫牲可知但主其祭者宗子之為士者耳且云薦其常事則亦常從大夫之爵故曰士攝大夫惟宗子也陳說審矣天子七廟三昭三穆與大祖之廟而七諸侯五廟二昭二穆與大祖之廟而五大夫三廟一昭一穆與大祖之廟而三士一廟庶人祭於寢正義鄭氏康成曰此周制七者大祖及文王武王之祧與親廟四大祖后稷也諸侯大祖謂始封之君王者之後不為始封之君廟大夫大祖謂别子始爵者大傳曰别子為祖是也雖非别子始爵者亦然士一廟謂諸侯之中士下士名曰官師者上士二廟寢適寢也陳氏祥道曰積厚者流澤廣積薄者流澤狹廟而祭之仁之至也以七以五以三以一義之盡也先王於死者常待之以生由士而上生而異宮死則為之立廟庶人則生非異宮死則祭於寢而已通論孔氏穎逹曰周所以七者文武受命其廟不毁以為二祧并始祖后稷及髙祖以下親廟四故為七也若王肅則以為天子七廟者髙祖之父祖為二祧并始祖及親廟四為七周文武受命不遷之廟權禮所施非常廟之數殷之三宗宗其德而存其廟亦不以為數凡七廟者皆不稱周禮器云天子七廟孫卿云有天下者事七世又云自上以下降殺以兩今使天子諸侯立廟並親廟以四而止則君臣同制尊卑不别鄭必謂天子七廟唯周制者禮器云周旅酬六尸一人發爵則周七尸七廟明矣今使文武不在七數既不同祭又不享嘗豈禮也哉故盧植云二祧謂文武榖梁傳天子七廟漢書韋𤣥成四十八人議皆云周以后稷始封文武受命石渠論白虎通云周以后稷文武特七廟曽子問孔子云七廟無虛主若王肅數高祖之父高祖之祖與文武而九主當有九孔子何云七廟無虛主乎且天子七廟者有其人則七無其人則五若諸侯廟制雖有其人不得過五此天子諸侯七五之異也始封之君謂王之子弟封為諸侯為後世之大祖當此君之身不得立出王之廟則全無廟也諸侯不敢祖天子若有大功德王特命之則可如魯有文王之廟鄭祖厲王是也此始封君之子得立一廟始封六世之孫始五廟備也若異姓始封如大公之屬𥘉封則得立五廟從諸侯禮也鄭注王者之後不為始封之君廟者以其始封之君非有功德唯因先代以封之不得為後世之大祖得立此君所出王者之廟也大夫之大祖則諸侯之子始為卿大夫是嫡夫人次子或衆妾之子别異於正君故云别子鄭注雖非别子始爵者亦然者一是别子𥘉雖身為大夫中間廢退至逺世子孫始得爵命則以為大祖别子不得為大祖也二是别子及子孫不得爵命者後世始得爵命自得為大祖三是全非諸侯子孫異姓為大夫者及他國之臣初來仕為大夫者亦得為大祖鄭答趙商云王制所論皆殷制若周制别子始爵其後得立别子為大祖若非别子之後雖為大夫但立父祖曽祖三廟而已隨時而遷不得立始爵者為大祖此大夫三廟者天子諸侯之大夫皆同以此及祭法更不别云諸侯之大夫卿即大夫總號也案祭法適士二廟今此云士一廟故知是諸侯之中士下士祭法云官師一廟則天子之中士下士皆二廟也鄭知諸侯中士下士同一廟者以祭法云適士二廟言適士則不得兼中下也庶人之祭謂薦物以其無廟故惟薦而已薦獻不可褻處故知適寢也程子曰自天子至於庶人五服未嘗有異皆至高祖服既如是祭祀亦當如是七廟五廟亦止是祭及高祖大夫士雖或三廟二廟一廟或祭寢廟雖異亦不􅊣祭及高祖若止祭禰則猶知母而不知父禽獸道也尊禰而不及祖非人道也馬氏睎孟曰祖以功建故無可毁之禮百世不遷昭穆以親崇故有可毁之禮親盡則祧朱子曰以諸侯五廟言之周禮建國之神位左宗廟則五廟皆當在公宮之東南其制孫育以為外為都宮大祖在北二昭二穆以次而南蓋大祖之廟始封之君居之昭之北廟二世之君居之穆之北廟三世之君昭之南廟四世之君穆之南廟五世之君廟皆南鄉各有門堂室寢而牆宇四周焉大祖之廟百世不遷自餘四廟則六世之後每一易世而一遷其遷之也新主祔於其班之南廟南廟之主遷於北廟北廟親盡則遷其主於大廟之西夾室而謂之祧凡廟主在夲廟之室中皆東鄉及其祫於大廟之室中則唯大祖東鄉為最尊之位羣昭之入乎此者皆列於北墉下而南鄉羣穆之入乎此者皆列於南牖下而北鄉案廟室北有墉無牖郊特牲亳社北牖知廟北無牖室南有牖詩于以奠之宗室牖下南鄉者取其鄉明故謂之昭北鄉者取其深逺故謂之穆蓋羣廟之列則左為昭而右為穆祫祭之位則北為昭而南為穆昭常為昭穆常為穆二世祧則四世遷昭之北廟六世祔昭之南廟三世祧則五世遷穆之北廟七世祔穆之南廟昭者祔則穆者不遷穆者祔則昭者不動此所以祔必以班尸必以孫而子孫之列亦以為序若武王謂文王為穆考成王稱武王為昭考則自其始祔而已然春秋傳以管蔡郕霍為文之昭邘晉應韓為武之穆則雖其世既逺而猶不易也宗廟之制但以左右為昭穆不以昭穆為尊卑故五廟同為都宮則昭常在左穆常在右而外有以不失其序一世自為一廟則昭不見穆穆不見昭而內有以各全其尊必大祫而㑹於一室然後序其尊卑之次則凡已毁未毁之主又畢陳而無所易唯四時之祫不陳毁廟之主則髙祖有時而在穆或髙之上無昭而特設位於祖之西禰之下無穆而特設位於曽之東也與曰然則毁廟云者何也曰春秋傳曰壞廟之道易檐可也改塗可也說者以為將納新主示有所加耳非盡撤而悉去之也曰然則天子之廟其制若何曰唐之文祖虞之神宗殷之七世三宗其詳不可考獨周制猶有可言然而漢儒之記不同謂后稷始封文武受命而王故三廟不毁與親廟四而七者諸儒說也謂三昭三穆與大祖之廟而七文武為宗不在數中者劉歆說也雖其數之不同然其位置遷次宜亦與諸侯之廟無甚異者大夫三廟則眂諸侯而殺其二然其大祖昭穆之位猶諸侯也適士二廟則眂大夫而殺其一官師一廟則眂大夫而殺其二然其門堂室寢之備猶大夫也曰廟之為數降殺以兩而其制不降何也曰降也天子之山節藻梲復廟重檐諸侯固有所不得為者矣諸侯之黝堊斫礱大夫有不得為者矣大夫之倉楹斫桷士又不得為矣曷為而不降哉獨門堂室寢之合然後可名為宮則其制有不得而殺耳蓋由命士以上父子皆異宮生也異宮而死不得異廟則有不得盡其事生事存之心者是以不得而降也後世公私之廟皆同堂異室而以西為上者由漢明帝始漢之始諸廟皆自營之各為一處雖都宫之制昭穆之位不復如古然猶不失獨専一廟之尊至於明帝不知禮義之正而務為抑損之私遺詔藏主於光烈皇后更衣别室而其臣子不敢有加焉魏晉循之遂不能革而先王宗廟之禮始盡廢矣案北魏清河王懌廟議云古者七廟之堂皆别光武以來異室同堂後漢書祭祀志洛陽髙廟加祭孝宣孝元及太宗世宗凡五帝西京廟成哀平三帝主四時祭於故髙廟則同堂異室不始於漢明矣又考祭祀志明帝遺詔藏主於世祖廟更衣朱子則據本紀而言耳降及近世諸侯無國大夫無邑則雖同堂異室之制猶不能備獨天子之尊可以無所不致顧乃梏於漢明非禮之禮而不得以致其備物之孝蓋合為一廟則所以尊大祖者既褻而不嚴所以事親廟者又厭而不尊是皆無以盡其事生事存之心而宗廟之禮亦為虛文矣陳氏祥道曰廟所以象生之有朝也寢所以象生之有寢也建之觀門之內不敢逺其親也位之觀門之左不忍死其親也存疑鄭氏康成曰殷則六廟契及湯與二昭二穆夏則五廟無大祖禹與二昭二穆而已案祭法言夏后氏祖顓頊而宗禹不應謂夏無大祖殷人祖契而宗湯又商書咸有一德云七世之廟可以觀德則不應殷止六廟無大祖存疑陸氏佃曰國語曰工史書世宗祝書昭穆知廟次昭穆與世次異矣周官小宗伯既掌辨廟祧之昭穆小史又掌奠繫世辨昭穆則明世次先後與廟祧之昭穆異矣至於大祫即依世次與七廟常祀昭穆不同故小史又曰祭祀以書叙昭穆之俎簋若昭穆一定何必辨而叙之辨正何氏洵直曰說者謂對父則身為之穆對子則身為之昭其意以為廟次與世次不同故昭穆遷徙無常位右者可移之左左者可移之右殊不知廟次與世次一也廟次雖遷昭穆之班一定不移祖以傳孫孫以傳孫縱厯百世其當為昭當為穆者未之有改也如武王之時廟次以文王為穆至襄王之世凡厯十八君矣猶謂之穆左氏載富辰之語曰管蔡郕霍文之昭邘晉應韓四國武之穆宮之竒謂大伯虞仲為大王之昭虢仲虢叔為王季之穆夫大王文王其子對父皆稱昭曰文王之昭大王之昭王季武王其子對父皆稱穆曰武王之穆王季之穆其為子一也知昭穆為定班而廟次世次未始異也說者引魯語曰工史書世宗祝書昭穆知廟次昭穆與世次異又不然工史所書者帝繫世夲之屬宗祝所書者几筵表著之位自其譜牒則謂之世據其班秩則謂之昭穆則廟次昭穆豈與世次不同乎案四廟五廟六廟七廟之說紛紜不一或謂七廟天子之定制或謂實止四廟或謂夏五廟禹與二昭二穆殷六廟湯與契二昭二穆周七廟后稷文武二祧與親廟四然其說皆原於禮緯在西漢時其言始封之君為大祖以下五廟迭毁古之正禮者韋𤣥成等也其言天子三昭三穆與大祖之廟而七者其正法數可常數者劉歆也至東漢時王肅以為天子七廟是通百代之言則同於劉歆鄭康成以為高祖以下與始祖而五明立廟之正以親為限則同於𤣥成而盧植馬融亦守此議然自康成而後講經議禮者並據王制祭法斥鄭四廟之談伸王七廟之說又據王肅謂高祖之父髙祖之祖與文武二主則周廟宜有九設周之祖宗更有功德受命如二人者亦當更立廟以祀而必不僅九廟而止理固宜然也天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰蒸礿禴同正義鄭氏康成曰此蓋夏殷之祭名孔疏以與周不同而夏殷之祭無文故疑之周則改之春曰祠夏曰礿孔疏周禮大宗伯以祠春享先王以禴夏享先王以禘為殷祭孔疏公羊傳五年而再殷祭春秋僖八年秋七月禘於大廟殷猶大也詩小雅曰礿祠蒸嘗于公先王孔疏詩小雅天保篇文王受命已改殷夏祭禘名為礿而詩先礿後祠從便文先蒸後嘗以韻句也此周四時祭宗廟之名孔氏穎逹曰自此至地者一節論天子諸侯大夫四時祭宗廟及祭天地山川之事皇氏侃云礿薄也春物未成祭品鮮薄禘次第也夏物雖未成依時次第而祭白虎通云嘗者新穀熟而嘗之蒸衆也孫炎云進也冬時物成可進者衆也陳氏祥道曰礿禘以飲為主所以順乎陽嘗蒸以食為主所以順乎隂存疑孔氏穎逹曰郊特牲春禘鄭改讀禴祭義春禘鄭直云夏殷禮不改字以已見郊特牲也趙氏匡曰禘非時祭之名漢儒見春秋惟兩書禘一春一夏所以或謂之春祭或謂之夏祭耳陳氏祥道曰殷以長發為大禘言大以見小則夏禘小禘也郊特牲祭義言春禘蓋夏禮也陸氏佃曰春夏以飲為主審諦之時也春可謂之礿亦可謂之禘夏可謂之禘亦可謂之礿郊特牲曰春禘而秋嘗王制曰春礿夏禘是也祠品物少文詞多春之事而已故夏未有言祠者虙氏曰周官所言春祠夏礿此周禮王制祭統所言春礿夏禘此殷禮郊特牲祭義所言春禘此夏禮也何以知之記曰殷人尚聲樂三闋然後出迎牲又曰樂陽氣也又曰殷人先求諸陽則殷祭皆用樂矣郊特牲所言春禘秋嘗而先之以享禘有樂而食嘗無樂則為夏禮非殷禮也春禘既為夏禮則春礿自得為殷禮矣吳氏澄曰此春夏祭名是記者誤章內礿皆當讀祠禘皆當讀禴案周官與詩並周禮祠與禴嘗與蒸皆易其序此言春礿夏禘礿猶可言即禴而禘之名迥殊故鄭疑為夏殷禮虙氏又云春禘者夏夏禘者殷蓋王制作於漢作者不見周禮而雜采四代禮為之也趙伯循據大傳駁此謂禘大祭非時祭漢儒見春秋惟兩書禘一春一夏故誤則僖公之禘書秋七月漢儒何不見而誤云秋禘與周以重祭賜魯未聞賜晉何左傳晉人言寡君之未禘祀與是周人以大禘為重故改時祭之名而世猶通稱之今但辨禘之有時祭有大祭不必以記駁記也天子祭天地諸侯祭社稷大夫祭五祀天子祭天下名山大川五嶽視三公四瀆視諸侯諸侯祭名山大川之在其地者視一作眂正義鄭氏康成曰視視其牲器之數孔疏案夏傳其餘山川視伯小者視子男注謂牲幣粢盛爵獻之數非謂尊卑也周禮上公饔餼九牢飪五牢饗九獻豆四十侯伯饔餼七牢飪四牢豆三十二子男饔餼五牢飪三牢豆二十四簋皆十二侯伯無别夏傳侯與伯别不可強合在其地若齊人祭泰山晉人祭河是也孔疏泰山齊魯之界故齊人有事於泰山朱子曰一家之主則一家鬼神屬焉諸侯守一國則一國鬼神屬焉天子有天下則天下鬼神屬焉馬氏睎孟曰天地域之最大天子域中所尊故祭天地社稷土榖之神諸侯為天子守土故祭社稷大夫有家故祭五祀在上者可以兼下故天子祭天地社稷五祀在下者不可以兼上故諸侯祭社稷而不得祭天地大夫祭五祀而不得祭社稷古之祀典有功於民則祀之名山大川民所取財用也天子君天下其所報者衆故祭天下名山大川諸侯君一國其所報者寡故祭名山大川之在其地者吳氏澄曰祭法云大夫以下成羣立社曰置社蓋大夫以下所得祭者民社不得祭國社也案鄭注曲禮據月令户竈中霤門行此注據祭法司命中霤門行厲有地大夫祭五無地大夫祭三孔氏申之謂曲禮無差别者殷禮此有差别者周法也曲禮亦明言天子諸侯大夫安見其言無差别乎夫五祀春户木夏竈火夏季中霤土秋門金冬行水於理為當若司命為天星泰厲為外鬼其不當列於五祀甚明不當以彼惑此也天子諸侯祭因國之在其地而無主後者正義鄭氏康成曰謂所因之國先王先公有功德宜享世祀今絶無後為之祭主者孔氏穎逹曰天子置都之所及諸侯所封之內皆因古昔先王先公所居之地今其地子孫絶滅而無主後者則天子諸侯祭之陳氏澔曰在王畿者天子祭之在侯邦者諸侯祭之葉氏夢得曰亡國絶世而無主後者雖己廢而不可舉然先王興滅繼絶而因國亦祭者所以見其仁也存異鄭氏康成曰昔夏后氏郊鯀至杞為夏後而更郊禹晉侯夢黃熊入國而祀夏郊此其禮也孔疏祭法夏后氏郊鯀禮運杞郊禹不郊鯀故鯀無主後然有功猶當祀晉為盟主當代天子攝羣神之祀案左傳子産對叔向言遷閼伯於商丘商人是因遷實沈於大夏唐人是因晏子對景公昔爽鳩氏始居此地季萴因之有逢伯陵因之蒲姑氏因之而後太公因之彼其先世嘗有功德於民今無主後則祭之宜也若黃熊之說頗誕而晉祀夏郊亦非禮也不當據以為證天子犆礿祫禘祫嘗祫蒸諸侯礿則不禘禘則不嘗嘗則不蒸蒸則不礿諸侯礿犆禘一犆一祫嘗祫蒸祫犆音特祫音洽正義鄭氏康成曰犆猶一也祫合也孔氏穎逹曰南方諸侯春礿祭竟夏來朝西方諸侯夏祭竟秋來朝北方諸侯秋祭竟冬來朝東方諸侯冬祭竟春來朝各廢一時耳餘三時皆祭也程子曰諸侯亦祭祫只是祠禴嘗蒸之祭為廟煩故每年於四祭之中三祭合食於祖廟惟春則祭諸廟也陸氏佃曰時祭唯礿犆各於其廟祀之夏禘秋嘗冬蒸三昭三穆皆升合食於祖廟所謂三年大祫與此異彼祫之大者也陳氏祥道曰祭祀之禮有大有小有備有闕天子備而不闕然有所謂闕者大故之時而已諸侯闕而不備然有所謂備者不朝之嵗而已又曰天子春犆而三時皆祫諸侯亦春犆而秋冬皆祫其異於天子者禘一犆一祫而已又曰天子言祫禘祫嘗祫蒸諸侯言嘗祫蒸祫此特變文而已非有異也陳氏澔曰時祭之祫親廟之主升合食三年大祫則毁廟之主亦與焉存疑鄭氏康成曰天子諸侯之喪畢合先君之主於祖廟而祭之謂之祫後因以為常天子先祫而後時祭孔疏以經文祫在上天子位尊故先為大禮也諸侯先時祭而後祫孔疏以經文祫在下諸侯位卑取其漸備故先小禮後大禮凡祫之嵗春一礿而已不祫以物無成者不殷祭孔疏夏殷殷祭三周改夏祭曰礿以禘為殷祭也孔疏周殷祭止三魯禮三年喪畢祫於大祖明年春禘於羣廟自是之後而再殷祭一祫一禘也虞夏之制諸侯嵗朝故四時必廢一祭礿犆互明犆礿文禘一犆一祫下天子也祫嵗不禘孔氏穎逹曰此論夏殷天子諸侯大祭及時祭之事殷以前不知幾年一祫禮緯云三年一夾五年一禘鄭云百王通義則虞夏殷周皆同三年一祫皇氏謂虞夏祫祭每年皆為又云三時祫者謂夏秋冬或一時得祫即為之不三時俱祫鄭注禘祫志云王制記先王之法祫為大祭祫於秋於夏於冬周公制禮祭不欲數如鄭此言則夏殷三時俱殷祭皇氏之說非也又曰禘祫大小鄭以公羊傳云大事者何大祫也毁廟之主陳於大祖未毁廟之主皆升合食於大祖故為大事若王肅張融孔朝皆據逸禮以禘為大祫為小鄭不用逸禮又曰爾雅云禘大祭也謂比四時為大也若左氏及杜氏則皆以禘為三年一大祭在大祖之廟傳無祫文然則祫即禘也張子曰諸侯春祭髙祖夏祫羣廟秋祭曽祖冬又祫來春祭祖夏又祫秋祭禰冬又祫辨正林氏之竒曰禘祫之說諸儒聚訟久矣論年之先後則鄭康成髙堂隆謂先三而後二徐邈謂先二而後三辨祭之小大則鄭康成謂祫大於禘王肅謂禘大於祫賈逵劉歆謂一祭而二名禮無差降又或謂禘以夏不以春祫以冬不以秋矛盾相攻卒無定論鄭氏之說曰魯禮三年喪畢而祫於大祖明年禘於羣廟自爾以後五年而再殷祭一禘一祫為之說者曰僖公薨文公即位二年秋八月大事於大廟大事祫也推此是喪畢祫於大祖也明年春禘雖無正文約僖公定公八年皆有禘又可知蓋以文公二年祫則知僖宣二年亦皆有祫僖宣二年既有祫則明年是三年春禘四年五年六年秋祫是三年祫更加七年八年并前為五年禘故禘於羣廟也自後三年一祫五年一禘不知當春秋時諸侯僣亂魯之祭祀皆妄舉也諸侯而郊上帝禘始祖罪也大夫而旅泰山舞八佾罪也春秋常事不書其書者皆悖禮亂常之事故書郊者九書禘者二與夫大事一有事二蒸二嘗一之類無非記其非禮據僖公以三十二年冬十二月薨至文公二年秋八月喪制未畢未可以祫也而乃大事焉一惡也躋僖公二惡也經無三年禘祭之文何自知之徒約僖公宣公八年皆有禘而云愈繆矣况宣公八年經書有事於大廟有事則是常制也而以為禘何邪且閔公二年春秋書吉禘於莊公是魯常以二年即禘矣何待三年與八年乎至其言祭之時春秋書大事於秋八月而彼以為冬書閔公之禘於夏四月僖公之禘於秋七月而彼一以為夏既夲魯禮以行祀典而又不用其時是自戾也雖然魯禮誠非矣先王之制可得聞乎曰禘祫之文不詳所可知者禘尊而祫卑矣禮不王不禘或問禘之說夫子答以不知譏魯僖僣也春秋之法所譏在祭則書其祭名不然則否書郊書望書禘則所譏在郊望與禘也若文公之祫則譏其短喪逆祀不在於祫故曰大事而已何者禘者推始祖所自出之君而追祀之則謂之禘此天子之祭名諸侯無禘禮魯用之僣也若祫則毁廟未毁廟之主皆合食於大祖非惟天子有祫諸侯亦得祫也詳二祭之名則禘尊祫卑可謂明矣先儒據鄭氏說率以祫大於禘是以諸侯之制加天子之制可乎考之經籍禘祫之文可知者此耳至於年數之久逺祭時之先後則經無所據學者當闕其疑楊氏復曰知禘者禘其祖之所出不兼羣廟之主而唯以其祖配之則禘與祫異不容混矣知大祫兼羣廟之主則自大祖而下毁廟未毁廟之主皆合食於大祖矣案先儒說禘紛如聚訟然其義莫如游氏所謂仁人為能享帝孝子為能饗親及朱子所云先王報夲追逺莫深於禘之說最為諦當若禘與祫異及禘尊祫卑則林氏之說確為可據時祭之名春祠夏禴秋嘗冬蒸其為周禮確然而三代異物王制雜采三代以為漢法曰礿曰禘夏殷未必無是名也今知此禘是時祭非大祭足矣天子社稷皆大牢諸侯社稷皆少牢大夫士宗廟之祭有田則祭無田則薦庶人春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以鴈大如字又音泰少詩照反正義鄭氏康成曰有田者既祭又薦新孔疏以月令天子祭廟又有薦新如以彘嘗麥先薦寢廟士喪禮有薦新如朔奠故知也士薦牲用特豚孔疏按儀禮特牲是有地之士用特牲今無地之士薦宜貶降不用成牲故用特豚大夫以上用羔孔疏以諸侯大夫有地祭者用少牢其無地薦者則用羔也言以上則包天子皆用羔也但天子諸侯亦用餘牲不皆用羔所謂羔豚而祭百官皆足詩曰四之日其蚤獻羔祭韭庶人無常牲取與新物相宜而已孔疏謂相宜者兩物俱有非氣味相宜鴈陳氏曰春宜豚冬宜鮮此非其時羊宜黍豕宜稷宜麥魚宜苽又非其配但取其多而易得耳類方氏曰韭性溫陽類卵隂物也黍麥南方之穀陽魚豚隂物也稻西方之穀隂類鴈陽鳥也亦有隂陽相配之義孔氏穎逹曰此論天子諸侯祭用牲牢及庶人所薦之物賈氏公彥曰羊豕曰少牢牛羊豕三牲具為大牢若一牲不得牢名故郊特牲與特牲皆不言牢也陳氏祥道曰天子社稷福被天下故用大牢諸侯社稷福止一國故用少牢諸侯社稷少牢而宗廟則大牢者宗廟以仁社稷以義仁則極其隆故與天子同義則有所辨故亞於天子庶人之薦不過致其易得者而已又曰古者祭必卜日而薦新不擇日祭有尸而薦無尸以至不出神主奠而不祭有時物而無三牲黍稷此薦新之大略也陸氏佃曰春薦韭春無新榖故也陳氏澔曰薦雖無時然亦不過四時各一舉而已存疑鄭氏康成曰祭以首時薦以仲月孔疏晏子春秋云天子以下至士皆祭以首時故明堂位云季夏六月以禘禮祀周公於大廟周六月是夏四月雜記云七月而禘獻子為之譏其不用六月也其周禮四仲祭者因田獵而獻禽非正祭也服䖍注桓公五年傳云魯祭天以孟月祭宗廟以仲月非鄭義也大夫士既以首時祭故薦以仲月若天子諸侯禮尊物熟則薦之不限孟仲季故月令孟夏薦麥孟秋薦黍季秋薦稻是也大夫既薦以仲月而服䖍注昭元年傳祭人君用孟月人臣用仲月不同者非鄭義也南師解云祭以首時者謂大夫士也若得祭天者祭天以孟月祭宗廟以仲月其禘祭祫祭時祭亦用孟月其餘諸侯不得祭天者大祭及時祭並用孟月既無明據義得兩通故並存焉案春秋桓公八年五月蒸十四年八月嘗僖公八年七月禘昭公十五年二月禘此等皆不用孟月者以春秋亂世不能如禮故參差不一也陸氏佃曰天子嘗黍在夏故庶人秋始薦黍天子嘗稻在秋故庶人冬始薦稻由是言之天子孟夏嘗麥庶人薦麥在仲夏矣天子仲春薦韭庶人薦韭在季春矣案周禮明言仲夏享礿仲冬享蒸是天子祭以仲月矣其祭以仲月取四時之中也明堂位言魯季夏六月以禘禮祀周公於大廟其所言仲月季月皆是周正魯雖大禘而以季夏避天子也雜記言七月而禘獻子為之則禘當在季夏而魯以孟秋矣故頌魯僖公之詩直云秋而載嘗祭統合之言大嘗禘謂此大嘗即大禘也安見天子與諸侯祭必皆以首時乎祭天地之牛角繭栗宗廟之牛角握賓客之牛角尺諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕庶人無故不食珍庶羞不踰牲燕衣不踰祭服寢不踰廟繭又作繭公典反握烏角反燕伊見反正義鄭氏康成曰握謂長不出膚故謂祭享羞不踰牲謂祭以羊則不以牛肉為羞孔氏穎逹曰玉藻云天子食日少牢朔月大牢諸侯食日特牲朔月少牢則知大夫食日特豚朔月特牲士食日無文朔月特豚又曰諸侯祭以大牢得殺牛諸侯之大夫祭以少牢得殺羊天子大夫祭亦得殺牛其諸侯及大夫享食賔得用牛也陳氏祥道曰大禮必簡則小禮必煩簡則內心而貴誠故天地之牛角繭栗煩則外心而貴味故宗廟之牛角握賔客之牛角尺角繭栗非必繭栗也以其過於繭栗則非禮角握非必握也以其過於握則非禮至於角尺亦若是也國語曰郊禘之牛角繭栗禘之牛與郊同不及握也存疑張子曰不踰不豐於牲也牲體小而羞掩豆謂之踰牲不謂用羊而不用牛也葉氏夢得曰庶羞常薦而踰牲嫌於備物燕衣常用而踰祭服嫌於事神寢所常安而踰廟嫌於享親故禮皆不與案孔疏據周禮膳夫王日一舉謂周公制禮天子日食大牢諸侯日食少牢玉藻之文恐非也殺牲盛饌曰舉日少牢亦牲也何必日殺一牛然後謂之牲哉楚語天子舉以大牢祀以㑹諸侯舉以特牛祀以大牢舉與祀並言必朔日可知朔日大牢則常日少牢矣不踰牲三說鄭氏為典而葉氏亦該蓋庶羞常所食燕衣常所服寢人所居無故不殺以節用而仁亦行乎其中不踰以謹禮而用亦無不節矣古者公田藉而不稅市廛而不稅關譏而不征林麓川澤以時入而不禁夫圭田無征用民之力嵗不過三日田里不粥墓地不請藉在亦反廛直連反麓音鹿粥音育正義鄭氏康成曰藉之言借也借民力治公田美惡取於此不稅民之所自治也孟子曰殷人七十而助古謂殷時孔疏以下或兼虞夏廛市物邸舍稅其舍不稅其物譏譏異服識異言征亦稅也孔疏關境上門但呵禁非違不稅行人之物此夏殷之法周禮國凶札則無門關之征孔疏周非凶札即征但不知稅之䡖重猶譏也麓山足也入猶治也孔疏以時入若獺祭魚然後漁人入澤梁治圭田者不稅所以厚賢也此則周禮之士田以任近郊之地稅什一用民之力謂治城郭宫室道渠田里墓地皆受於公民不得私也粥賣也請求也孔氏穎逹曰周禮均人豐年旬用三日中年旬用二日無年旬用一日年嵗不同雖豐不得過三日陳氏祥道曰藉而不稅所以寬農廛而不稅所以寬商譏而不征所以寬旅山澤以時入而不禁所以寬萬民又曰商賈惡其盛又惡其衰盛則去夲者衆衰則貨不阜通故於其盛則抑之以征衰則寬之以無征凡因時以權之起一人之徭則百畝不舉起十人之徭則千畝不舉先王知其如此故用民之力嵗不過三日所以寬之也田里不粥則生者無相兼并而民無憾於飬生墓地不請則死者有所安厝而民無憾於送死藉也廛也譏也時入也夫也圭田也用民力也義也而不稅不征不禁無征不過三日仁也頒之田里墓地仁也禁之不粥不請義也徐氏師曽曰此泛言王政以見今之不然自公田以至墓地不請皆古制也存疑孔氏頴逹曰鄭知周制畿內用夏之貢法者載師云以廛里任國中之地以場圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任疆地鄭注云廛里邑里居也廛民居之區域也宅田致仕者之家所受田也士田自卿以下所受圭田也賈田在市賈人其家所受田也官田庶人在官者其家所受田也牛田牧田畜牧者之家所受田賞田者賞賜之田也公邑謂六遂餘地天子使大夫治之家邑大夫之采地小都卿之采地大都公之采地又司馬云井十為通通為匹馬三十家士一人徒二人通十為成成百井三百家革車一乘士十人徒二十人計一成百井井有九家百井即九百家而云一成三百家者以此田上中下除宫室塗巷三分之一自餘通率一家受二夫故一成為三百家是一井九家為定無公田也故鄭云以載師職及司馬法論之周制畿內用夏之貢法不稅夫者謂鄉遂及公邑若采地即為井田稅夫與畿外同知畿外用助法者案詩小雅雨我公田遂及我私春秋宣十五年云𥘉稅畝傳云榖出不過藉論語云盍徹乎孟子云方里而井井九百畝其中為公田八家皆私百畝知之也然畿外諸侯雖立公田實亦用貢法孟子云野九夫之田而稅一即九一而助國中什一使自賦故鄭云邦國亦異外內耳但郊內地少郊外地多從多言之故云畿外制公田不稅夫也又曰畿內無公田故有圭田圭潔白也德行潔白乃與之田此是殷禮周則通士田稅什一吳氏澄曰夫圭田夫田謂餘夫所受二十五畝之田圭田謂卿以下所受五十畝之圭田也無征謂既不稅其所受亦不令助耕公田也陳氏澔曰圭田亦似有功德者賜之若賜圭瓚案此將言司空度地居民之法而先述古制以發端其大指皆夲於孟子其言古者蓋自秦漢以遡三代通指夏商周而言孔以圭田上為殷法民力下兼通周禮非也商制八家同井皆私百畝而同養公田故為藉言借民力以耕之周制九夫為井悉以授民而與貢異者貢校嵗以為常周隨年之凶豐使民納十畝之入年豐則通其有年凶則通其無故為徹言君民上下相通也商之公田在私田外周之公田即在私田中故孟子云惟助為有公田言惟助有則徹無以明其制之異云雖周亦助見助凶豐相通徹亦凶豐相通明其意之同蓋自商𥘉至周厯六百餘年生齒必日繁無田可給不得不變法并以公田授民故曰九夫為井又曰夫三為屋屋三為井此周一井九夫徹與助異之明證也若徹原是助法周又七百餘嵗則人人共曉孟子何用辭費哉自春秋至戰國兵爭死亡生齒日耗反不免地廣人稀故孟子欲行助法所謂與時宜之也鄭孔謂周制畿內用夏之貢法無公田畿外用殷之助法有公田若內為采邑即有公田與畿外同則斷不然安有一朝定法不自行之而但使邦國行之者乎且周自公劉已徹田為糧安有至武王周公而反盡變畿內為貢法者乎又案孔陳二說皆與孟子必有圭田異朱子云圭潔也所以奉祭祀也世祿常制之外又有圭田最明又夫字有三解一說即餘夫二十五畝不應叙圭田上恐非一說治圭田之農不征力役又與厚賢無涉蓋此夫即一夫受田之稅所謂什一者言圭田五十畝不征五畝之稅也司空執度度地居民山川沮澤時四時量地逺近興事任力凡使民任老者之事食壯者之食上度如字下度待洛反量去聲食音嗣正義鄭氏康成曰司空冬官卿掌邦事者度丈尺也居民觀其寒暖燥溼孔疏寒暖謂四時燥謂山溼謂川沮澤沮謂萊沛孔疏草所生為萊水所生為沛量地謂制邑井之處孔疏謂平原之地沃衍堪建井邑左傳所謂井沃衍也若山林藪澤之地不堪井邑興事謂築邑廬宿市也孔疏築邑則築城也用力難重故云興事周禮遺人凡國野之道十里有廬三十里有宿五十里有市凡使民寬其力饒其食孔氏穎逹曰凡國家為役之法老少功程不同老則功少壯則功多今使民之時雖壯者限以老者之功程故曰任老者之事凡廩餼牲體壯者食多老者食少雖老者給以壯者之料故曰食壯者之食方氏慤曰小而水所止曰沮大而水所鍾曰澤陳氏祥道曰居民山川沮澤所以辨地宜時四時所以候天氣量地逺近興事任力所以均民力徐氏師曽曰事即制邑居民之事制邑必興役興役必任民力凡使民三句又承上而言寬恤之政案度謂規畫經界之大法山川沮澤勢有髙卑故氣有寒暖燥溼而天時物候亦因有早晚之不同必驗四時物候之異以知隂陽向背之宜而量逺近以居之或宜為民居或宜為都邑民居既定然後民事可興而民之力可任周禮以九職任萬民孰非民事孰非民力四時物候不同則其事之早晚不同非其時雖欲用力於事不可得也後樂事勸功正與此相應恐不指力役之征通論鄧氏元錫曰司徒主地司空主事乃制域制宅之法周禮不具蓋具在冬官而今亡矣徐氏師曽曰周禮度地居民屬司徒宋儒改度地居民屬司空據此則得之案大司徒掌五地之民數而大司馬掌邦國土地之政故原師職方之屬輔之然土功之事分財用平板幹稱畚築程土物議逺近略基趾揣厚薄仭溝洫具餱糧程有司量功命日則司空之掌而其屬又有以佐之冬官雖亡其略可知也凡居民材必因天地寒暖燥溼廣谷大川異制民生其間者異俗剛柔䡖重遲速異齊五味異和器械異制衣服異宜修其教不易其俗齊其政不易其宜燥素老反齊才細反和去聲械户戒反正義鄭氏康成曰因天地寒暖燥溼者使其材藝堪地氣也孔疏材謂氣性材藝言五方之人其能各殊五者居處各須順其性氣材藝使堪其地氣盧植云能寒者使居寒能暑者使居暑也異制謂其形象異俗謂其所好惡異齊謂其性情緩急孔疏性謂禀性自然故孝經說云性者生之質若木性則仁金性則義火性則禮水性則信土性則知情者既有知識當逐物而遷故有喜怒哀樂好惡此經云剛柔輕重遲速天生自然是性也而連言情者情是性之小别者耳剛柔輕重遲速有六鄭惟云緩急者剛輕速總是急柔重遲總是緩然亦有柔而速剛而遲者此亦大總耳異和謂香臭與鹹苦異制謂作務之用孔疏作務所用不同若考工記粵之用鎛胡之用弓車器謂總用之器械謂兵器何休注公羊傳云攻守之器曰械異宜謂旃裘與絺綌教謂禮義政謂刑禁孔氏穎逹曰自此至曰譯一節論中國及四夷居處言語衣服飲食不同之事俗謂民之風俗宜謂土地器物所宜修此禮義教化當隨其風俗齊其政令施為當隨物之所宜也馬氏睎孟曰教所以導民俗則因民之所欲也政所以正民而宜者事得其義之謂也方氏慤曰剛柔言其材輕重言其質遲速言其性凡此不特廣谷大川之間若堅土之人剛弱土之人柔以其材之異齊故也丘陵之民専而長墳衍之民晳而瘠以其質之異齊故也大䝉之人信空同之人武以其性之異齊故也修其教不易其俗齊其政不易其宜者若封於商墟則啓以商政疆以周索封於夏墟則啓以夏政疆以戎索之類是矣葉氏夢得曰所謂教者其屬有七具於天而自然者也父子有親兄弟有愛夫婦有别君臣有義長幼有序朋友有信賔客有禮其教成於人而使然也天雖有自然而成乎人者亦必使然故曰修其教所謂政者其屬有八所用以相養者也衣服有常飲食有節事為有度異别有法度量有權數制有等上所用以防淫者也物之相養雖不可齊淫辟亦不可無禁故曰齊其政吳氏澄曰以廣谷大川而言則地産有異而其習尚之所安各異其俗故雖進之以七教然亦不改易其所安之俗使之各得以安其所安也以剛柔輕重遲速而言則天禀有異而其身口之所便各異其宜故雖正之以八政然亦不改易其所便之宜使之各得以宜其所宜也此居民材之大凡也徐氏師曽曰此以下皆言居民之事而此一節則以中國言通論李氏格非曰周禮司徒以土宜之法辨十有二土之名物以相民宅而知其利􅊣以阜人民以蕃鳥獸以育草木以任土事此所謂量地逺近興事任力者也以土㑹之法辨五地之物因此五物者民之常而施十有二教焉此所謂修其教不易其俗也以土均之法辨五物九等制天下之地征以作民職以令地貢以斂財賦以均齊天下之政此所謂齊其政不易其宜也蓋司徒辨其物司空任其事所以交相治也中國戎夷五方之民皆有性也不可推移東方曰夷被髮文身有不火食者矣南方曰蠻雕題交趾有不火食者矣西方曰戎被髮衣皮有不粒食者矣北方曰狄衣羽毛穴居有不粒食者矣中國夷蠻戎狄皆有安居和味宜服利用備器五方之民言語不通嗜欲不同逹其志通其欲東方曰寄南方曰象西方曰狄鞮北方曰譯推吐雷反被皮義反題大兮反趾音止衣去聲下同粒音立鞮可兮反譯音亦正義鄭氏康成曰五方之性地氣使之然也雕文謂刻其肌以丹青涅之孔疏雕刻題額也以丹青雕刻其額亦文身也仲雍居吳越左傳云斷髮文身漢書地理志云以辟蛟龍之􅊣故刻其肌以丹青涅之東方南方皆近海故俱文身也交趾足相鄉浴則同川卧則僢不火食地氣暖不為病也不粒食地氣寒少五榖也皆有者其事雖異各自足也寄象鞮譯皆俗閒之名依其事類耳鞮之言知也今冀部有言狄鞮者孔氏穎逹曰此以下總論四夷中國之異被髮斷髮故也言有不火食亦有火食者西方無絲麻惟食禽獸故衣皮東方北方多鳥故衣羽正北多羊故衣毛凝寒至盛林木又少故穴居五方之民水土各異故言語不通好惡殊别故嗜欲不同帝王立傳語之人逹五方之志傳五万之欲使相領解寄者傳寄外內言語象者放象外內之言狄鞮通傳夷狄之語與中國相知譯者陳也謂陳說內外之言此通傳四方語官也東方謂之夷者風俗通云東方人好生萬物抵觸地而出夷者抵也南方曰蠻者風俗通云君臣同川而浴極為簡慢蠻者慢也西方曰戎者風俗通云斬伐殺生不得其中戎者凶也北方曰狄者風俗通云父子嫂叔同穴無别狄者辟也其行邪辟陳氏祥道曰寄言其寓於此象言其像乎彼鞮言其屨譯言其語凡此皆互見也馬氏睎孟曰志欲者言語之藴言語者志欲之寓逹其志通其欲必在於言語之際故古者有道言語之官徐氏師曽曰此因中國而及四夷也總論陳氏祥道曰先王以治治中國以不治治夷狄故於中國則有教以道其志有政以齊其行於夷狄則立之寄象鞮譯而已雖詳略不同順其所安而不強其所不安則一也案此極言五方民性之不可推移而各有安居和味宜服利用備器以明山川沮澤之各有俗宜不可強同居民者當隨地以制宜因民之所利而利之也凡居民量地以制邑度地以居民地邑民居必參相得也無曠土無游民食節事時民咸安其居樂事勸功尊君親上然後興學量去聲度待洛反樂音洛正義鄭氏康成曰興學立小學大學孔氏穎逹曰此論居民與地相得及食節事時勸功尊君立學之事食得其節事得其時民樂悅事務勉勵立功尊君親上如此然後可得興學民富而可教也馬氏睎孟曰邑大而民少則有曠土之患邑小而民多則養不足而有游民之患陳氏祥道曰先王之於民居之然後養之養之然後教之量地制邑以至必參相得者居之也無曠土以至尊君親上者養之也然後興學教之也蓋人之生莫不有親親長長之良心養其良心而不陷溺之則由其親親以至於親上由其長長以至於尊君則尊君親上天地之道也然後興學裁成天地之道也方氏慤曰食節則無不足之患事時則無不急之務居民之道亦期其如此而已故效至於民咸安其居也樂事則不至於勞苦勸功則不由於勉強尊君則為臣者有遜志親上則在下者無離心上不止於君凡在已上者皆是也教不可一日廢必待樂事勸功尊君親上然後興學者則以至此然後教學之道可致其詳故也制禮作樂必在於治定功成後亦此意徐氏師曽曰此節結上文以起下章存疑榖梁氏曰古者三百步為里名曰井田井田者九百公田居一公田為廬井竈葱韭皆取焉班氏固曰在邑曰廛在野曰里春令民畢出在野冬則畢入於邑鄭氏康成曰周禮載師以廛里任國中之地廛民之邑居在都城者司馬法王國百里郊三百里野何氏休曰在邑曰里里八十户趙氏岐曰公田二十畝八家分之得二畝半以為廬舍則城邑之居亦二畝半廬則各在其田中而邑聚居也熊氏安生曰計量地土廣狹制四井為邑每邑居三十二家賈氏公彥曰廛是五畝之宅在國中樹以桑麻辨正季氏夲曰公田為廬舍之說起於榖梁而諸儒遂以在邑在野各分二畝半以合孟子五畝之宅若公田之中去二十畝止存八十畝則制祿之時又當割别井二十畝以足百畝之數不惟失先王正經界之意而又以邑處農民亦有不便蓋一夫一婦食力之小人也就田斯可以治農桑而死徙無出鄉又同井者之所安也冬則入邑春則出野雖近郊之地住近國中猶以搬運為煩不欲輕動而况逺郊之外必使逺棄田疇徙居國邑人誰樂之且孟子言五畝之宅未嘗以為廬舍信南山之詩云中田有廬蓋其家各就田中小苫茅舍以為息勞守畝之所不占公田二畝半而正當其中也蓋農民所宅必是平原可居之地另以五畝為一處取於便農功通饁餉去田豈宜逺哉故農民之宅與國中之廛迥别農民之宅鄉里也即制里而道其妻子使養老者也國中之廛市廛也但為士旅寄寓之所工商懋遷之區而已管子曰四民者勿使雜處聖王處士就閒燕處工就官府處商就市井處農就田野韋昭謂國都城郭之域惟士工商而已農不在焉此古法之僅存者也若處農在官府市井之閒雜之甚矣案量地制邑度地居民二語曲盡居民之道蓋邑即今之村落必因地勢之環曲髙平寬廣者為之地勢小則邑小而民居少地勢大則邑大而民居多故論語十室之邑千室之邑一舉其至小一舉其至大而或數十室或數百室無定可知矣孟子所謂五畝之宅大約在此邑中去田亦不甚逺故牆下之桑匹婦蠶之而農事之殷則亦以其婦子饁彼南畝也就邑視田則謂之出就田視邑則謂之入耳若所謂中田有廬則在五畝之宅之外即田畔稍髙處苫小茅舍以便憩息避風雨故曰廬明非宅也曰疆埸明不在公田中也曰有瓜明不可植桑也此與五畝之宅樹牆下以桑之地迥别惟耕夫在焉故婦女自邑來餉也榖梁謂民居在公田中則據詩中田有廬為說鄭賈謂五畝之宅皆在都城中則據周禮以廛里任國中之地為說班趙合之則以公田二十畝八家分之應各得二畝半知都城亦二畝半為說而不知皆非也若如榖梁謂民居在公田中則惟商助有公田耳夏貢無公田民無居乎如鄭氏謂五畝之宅皆在都城則天子都城方十二里大國都城方九里次國方三里小國方一里舉一國之民入處於此何以容之如班趙謂都城及野各半則周參用貢助國中使自賦者宅止二畝半乎且自國中至近郊五十里逺郊百里更逺而邦甸二百里家稍三百里皆民田所在都城相去逺數百里近亦數十里當春夏之交蠶事正急農事方殷若婦隨在田則廢蠶功婦留邑治蠶則農自執㸑若使婦在邑治蠶且餉則豈有隔數十百里而能饋餉者且冬皆入國中則近郊逺郊以及甸稍數百里無一㸑烟人迹乎故知邑之必與地相得民居之必與邑相得則知凡民所聚居皆謂之邑而所授之田即與其邑之居相近斷不可如鄭賈以邑専指君之都城知十室千室皆可謂之邑斷不可如何之以邑必八十户熊之以邑必三十二家為定知制祿皆起於公田之百畝而倍之三之四之十之則斷無以二十畝為廬舍而下士八十畝不得比農夫之百畝若以别井割補則是分田定而制祿正不定也先儒惟季氏國中之廛市廛也農民之宅鄉里也二語辨析甚明古如是今亦如是山川沮澤之地隨地皆有邑居而度地居民之法瞭然分田制祿之法亦瞭然矣欽定禮記義疏卷十七
