body:
  text: 喪大記第二十二之一正義孔氏穎達曰案鄭目録云名曰喪大記者記人君以下始死小斂大斂殯葬之事此於别録屬喪服劉元云記謂之大者言其委曲詳備繁多故云大朱氏申曰送死大事也此篇所記皆喪事之大者故以大記名篇吳氏澄曰此篇是每章各記一事之大節非是逐句補記行事之小節故云大記疾病外內皆掃君大夫徹縣士去琴瑟寢東首於北牖下廢牀徹褻衣加新衣體一人男女改服屬纊以俟絶氣男子不死於婦人之手婦人不死於男子之手縣音元去起呂反首手又反牖音酉注或為墉音容屬音燭纊音曠正義鄭氏康成曰疾困曰病徹縣去琴瑟聲音動人病者欲靜也凡樂器天子宫縣諸侯軒縣大夫判縣士特縣去琴瑟者不命之士方氏慤曰曲禮大夫無故不徹縣士無故不徹琴瑟疾病則有故也病者恆居北牖下或為北墉下廢去也人始生在地去牀庶其生氣反徹褻衣則所加者新朝服矣互言之也加朝服者明其終於正也體手足也四人持之為其不能自屈伸也庶人深衣纊今之新綿易動搖置口鼻之上以為候男子不死於婦人之手婦人不死於男子之手君子重終為其相褻孔氏穎達曰君謂諸侯此篇所記皆據諸侯以下東方生長鄉生氣也案既夕禮云飬者皆齊文王世子云世子親齊玄而養應氏鏞曰樂縣琴瑟自其疾即不作則聲音固已久閟於耳矣徹而去之亦不欲接於目也黃氏乾行曰絶氣以上生者愛親之至情也男子以下死者謹終之正道也案此與儀禮文小異儀禮云疾者齊養者皆齊二句最得禮意鄭注云齊正性情也疾者正養者亦不敢不正去褻衣惡其汚逺婦人為其褻此疾者之正也樂散心志撤去之猶祭而齊則不樂此為疾者亦為養者也寢東首於北牖下不待疾遽而然廢牀屬纊在彌留之頃望其生故廢牀惟恐其絶故屬纊俟其絶俟字觀鄭注作候當是字誤候占也猶醫家候脈候其生非候其死也持體者若欲持而留之也存疑鄭氏康成曰外內皆掃為賓客將來問病也方氏慤曰伯牛有疾子問之曾子有疾孟敬子問之皆禮然也寢東首於北牖下謂君來視之時也孔疏據論語知之義方氏慤曰與郊特牲社在北牖下同欲君南面視之陳氏澔曰儀禮圖無北牖西北隅曰屋漏此即屋漏歟男女改服為賓客來問病亦朝服也孔氏穎達曰病困改服故檀弓曰親始死羔裘玄冠者易之而已易羔裘玄冠即朝服也辨正應氏鏞曰掃庭及堂正家之常道今於此又皆掃者肅外內以謹變致潔敬以謹終也案室南有牖北無牖鄭注或為北墉陸氏釋文舊音容是本文作墉可知方氏因俗本訛牖因附會社之北牖謂欲君南面視之夫亡國之社乃北牖郊特牲所祭之社亦北墉無北牖也大記統言君大夫禮何獨分此句為君視大夫疾乎若大夫寢於北則君自南戶入北面視之矣如何能南面乎陳氏以北牖為屋漏亦非屋漏是中霤非牖也又案男女改服亦養者皆齊之意病者既徹褻加新男女自應改服非專為賓客來問病也羔裘玄冠即是朝服始死則易白布深衣而扱上衽矣非死而易羔裘玄冠也孔疏誤君夫人卒於路寢大夫世婦卒於適寢內子未命則死於下室遷尸於寢士之妻皆死於寢適丁歷反正義鄭氏康成曰死者必皆於正處寢室通耳孔疏士喪禮死於適室是寢室通其尊者所不燕焉孔疏尊嚴之處不就而燕息君謂之路寢大夫謂之適寢士或謂之適室方氏慤曰路猶路車之路以大言之適猶適子之適以正言之言正以别他下室及燕寢也此變命婦言世婦者明尊卑同也孔疏大夫妻曰命婦而云世婦者是諸侯之次婦與大夫之命婦敵故互言之內子卿之妻也吳氏澄曰內子卿大夫正妻已命稱世婦未命但稱內子下室其燕處也孔氏穎達曰此明貴賤死寢不同君謂諸侯諸侯三寢一正者曰路寢餘二曰小寢故春秋成公薨於路寢道也僖公薨於小寢譏即安也夫人亦有三寢一正二小亦卒正者也適寢猶今聽事處其制異諸侯大夫與妻皆死於適寢命婦死於正寢卿之妻未命則死於下室至小斂後遷尸還正寢也士之妻各死正室夫妻皆然故云皆也方氏慤曰士與其妻皆死於寢賤無嫌故也案士與妻亦各死於其寢之正故夫曰正寢妻曰內寢非謂得死於夫之寢存疑鄭氏康成曰世婦以君下寢之上為適寢孔氏穎達曰命婦死於正寢則世婦死女君次寢之上也案此亦互言之意但下寢之上次寢之上説既無據亦濛混未明陸氏佃曰諸侯子曰世子大夫妻曰世婦大夫不世爵祿然克生其子則世矣其妻謂之世婦以此內命婦曰世婦蓋名生於大夫之妻辨正吳氏澄曰此記止是記君大夫士與其正妻死處不及其次妻世婦謂大夫之正妻天子后之次稱夫人故諸侯以為適妻之稱夫人之次稱世婦故大夫以為適妻之稱遞降一等也復有林麓則虞人設階無林麓則狄人設階小臣復復者朝服君以卷夫人以屈狄大夫以玄赬世婦以禪衣士以爵辨士妻以稅衣皆升自東榮中屋履危北面三號卷衣投于前司服受之降自西北榮其為賓則公館復私館不復其在野則升其乘車之左轂而復卷本又作衮同古本反屈音闕赬赤貞反禪知彥反稅他亂反號戶高反卷衣之卷俱勉反正義鄭氏康成曰復招魂復魄也階所乘以升屋者虞人主林麓之官狄人樂吏之賤者階梯也簨虡之類孔疏簨虡階梯之類故狄人設階也小臣君之近臣朝服所以事君之衣用朝服而復之者敬也復用死者之祭服以其求于神也君以卷謂上公也夫人以屈狄互言耳上公以衮則夫人用褘衣而侯伯以鷩其夫人用䄖狄子男以毳其夫人乃用屈狄矣孔疏夫人屈狄謂子男之夫人男子舉上公婦人舉子男之妻男子舉上以見下婦人舉下以見上是互言也赬赤也玄衣赤裳所謂卿大夫自玄冕而下之服也其世婦亦以禪衣榮屋翼升東榮者謂卿大夫士也天子諸侯言東霤孔疏天子諸侯屋四注東西兩頭為屋簷霤下故言東霤大夫以下南北二注而為直頭頭即屋翼危棟上也孔疏復者升東翼而上當屋東西之中履屋上髙危之處而復也號若云皋某復也司服以篋待衣於堂前私館卿大夫之家也不於之復為主人之惡黃氏震曰公館則情可伸故復私館則於主有嫌情不可伸故不復孔氏穎達曰此明復時所用之衣及招魂升降之階死者封內若有林麓則虞人設階梯而升屋無林麓故狄人設階小臣君之親近冀君魂來依之大夫士以下亦用近臣也君以卷謂上公衮冕而下大夫招魂用玄冕玄衣纁裳故云玄赬也世婦大夫妻也其上服唯禪衣言世婦亦見君之世婦服與大夫妻同也爵辨士助祭上服也六冕則以衣名冠諸侯爵辨則以冠名衣今言爵辨但用其衣不用其辨也稅衣六衣之下也北面求隂之義鬼神所嚮也號號呼三者一號於上冀神在天而來一號於下冀神在地而來一號於中冀神在天地之間而來也三招既竟捲斂所復之衣從屋前投與司服之官司服待衣於堂前者前謂陽生之道復是求生也復者投衣畢往西北榮而下𥘉復是求生故自東榮而上求既不得不忍虛還故就幽隂而下敖氏繼公曰與升時相變也下設奠升降異階其義皆然因取西北厞為便也馬氏睎孟曰死者不可以復生萬物自然之理也於死而必為復聖人制此豈虛禮與孝子之情苟可生死而肉骨者無不為己况於萬一有復生之道哉彭氏汝礪曰大夫妻其上服惟禪衣禪之言亶也亶誠也周禮及詩作展士以爵辨辨色赤而微黑如爵頭然因以名服稅衣六衣之下士妻得服之稅即䘵字又曰上公衮服九章曰龍曰山曰華蟲曰火曰宗彝繪於衣曰藻曰粉米曰黼曰黻繡於裳侯伯鷩服七章自華蟲而下子男毳服五章宗彝藻粉米畫於衣黼黻刺於裳大夫以玄赬前衮衣鷩衣毳衣皆玄而有畫此衣不畫故獨得玄名惟裳刺黻而已大夫玄衣纁裳故名玄赬士爵辨纁裳夫人用褘衣褘當為翬雉衣也色玄侯伯夫人用褕狄即搖翟色青二者皆刻繪五色畫之綴衣上子男夫人用屈狄即闕翟刻繪為雉形不畫色赤世婦以禪衣色白無畫士妻以禒衣色黑餘論陸氏佃曰幸其生故使虞人狄人設階周官夏采掌大喪以冕服復於大祖亦是此意復衣不以衣尸不以斂婦人復不以衻凡復男子稱名婦人稱字唯哭先復復而後行死事衻而廉反正義鄭氏康成曰不以衣尸謂不以襲也復者庶其生也若以其衣襲斂是用生施死於義相反士喪禮云以衣衣尸浴而去之衻嫁時上服非事鬼神之衣也婦入稱字不以名行也氣絶則哭哭而復復而不蘇可以為死事孔氏穎達曰自殷以上貴賤復同呼名周則天子稱天子諸侯稱某甫且字矣大夫士稱名婦人並稱字氣絶而孝子即哭哭訖乃復故云惟哭先復復而不生故行死事謂正尸於牀及浴襲之屬也陳氏祥道曰當云復衣以衣尸不以斂以衣尸者即士喪禮以衣衣尸者也不以斂者即士喪禮疏浴而去之者也方氏慤曰稅與衻皆謂之緣衣祭之緣衣謂之稅嫁之緣衣謂之衻案復而後行死事檀弓所謂楔齒綴足飯設飾帷堂並作也存異陸氏佃曰袒衣有衻稅衣亦有衻復升而復衻下垂故不以郝氏敬曰衻裙也下體之服屬隂故不用案男子殊裳婦人不殊裳如陸郝説截去其半乎純衣纁衻明見士昏禮諸説妄也始卒主人啼兄弟哭婦人哭踊正義鄭氏康成曰悲哀有深淺也若嬰兒中路失母能勿啼乎孔氏穎逹曰主人孝子男子女子也哀痛嗚咽不能哭故啼也有聲曰哭兄弟情比主人為輕也婦人衆婦也宗婦亦啼婦人雀踊而此云踊者通自上諸條並踊也存疑陸氏佃曰主人啼而不哭兄弟哭而不踊婦人哭踊殺於上矣蓋踊所以動體安心下氣也案孔疏明言通上如陸説則主人兄弟皆不踊恐非既正尸子坐於東方卿大夫父兄子姓立於東方有司庶士哭於堂下北面夫人坐於西方內命婦姑姊妹子姓立於西方外命婦率外宗哭於堂上北面正義鄭氏康成曰正尸者謂遷尸牖下南首也孔疏既夕禮設牀笫當牖士喪禮將含商祝入當牖北面故知牖下南首子姓謂衆子孫也姓之言生也其男子立於主人後女子立於夫人後世婦為內命婦卿大夫之妻為外命婦外宗姑姊妹之女孔氏穎逹曰此明人君𥘉喪子及夫人以下哭位也子謂世子世子尊故坐於東方士喪禮主人坐於牀東是也卿大夫父兄子姓立於東方士喪禮言衆主人在其後又云親者在室謂大功以上在室內東方但諸侯以上位尊不宜卿大夫父兄子姓俱在室內卿大夫等或當在戶外之東方遙繼主人之後也有司庶士卑故在堂下北面夫人坐於西方者亦近尸故士喪禮云婦人俠牀東面但士禮略人君當以帷障之內命婦則世婦及子婦也姑姊妹謂君姑姊妹也子姓君女孫皆立於西方也外命婦謂卿大夫妻外宗謂姑姊妹之女疏於內命婦故在戶外婦人無堂下之位故皆堂上北面舅之女及從母之女外宗中兼之也應氏鏞曰男東女西隂陽之大分也喪遽哀迫人雜事叢先謹男女之辨而各以類從則有倫矣男主居東之上而內之家長雖若母亦在西則示一國一家之有主而內外族姓之尊卑咸有所統攝矣存疑孔氏穎達曰案士喪禮云小功以下衆兄弟堂下北靣此經直云有司庶士在堂下則諸父兄子姓等雖小功以下皆在堂上西靣也陸氏佃曰卿大夫序於父兄子姓之上國事先君臣也諸侯為卿大夫服而不服父兄子姓以此序內命婦在上豈諸侯為內命婦服視卿大夫服與案士喪禮言小功以下衆兄弟此言有司庶士合二説論之則皆在堂下明矣疏説未安大夫之喪主人坐於東方主婦坐於西方其有命夫命婦則坐無則皆立士之喪主人父兄子姓皆坐於東方主婦姑姊妹子姓皆坐於西方凡哭尸於室者主人二手承衾而哭正義鄭氏康成曰命夫命婦來哭者同宗父兄子姓姑姊妹子姓也凡此哭者尊者坐卑者立士賤同宗尊卑皆坐承衾哭者哀慕若欲攀援皇氏侃曰尊者坐卑者立謂爵位尊者則坐故上文君喪子及夫人坐大夫之喪主人主婦命夫命婦皆坐是也君之喪卿大夫皆立卿大夫之喪非命夫命婦者皆立是也此尊卑非謂對死者為尊卑也若今所行之禮與古異成服之後尊於死者則坐卑於死者則立孔氏穎達曰此明大夫士初有喪哭位之禮大夫之喪哭位之中有命夫命婦雖有卑於死者以其位尊故坐哭若其無命夫命婦雖尊於死者亦皆立哭此是為喪來哭者若有弔者當立哭不得坐也不顯父兄子姓及姑姊妹哭位者約上文君喪及下文士喪略可知也君與大夫位尊故坐者殊其貴賤士既位下故坐者等其尊卑無所異也黃氏震曰大夫變子言主人下於君也陳氏澔曰承衾而哭猶若致其親近扶持之情也謂初死時案此下疑脫君設大盤四節君之喪未小斂為寄公國賓出大夫之喪未小斂為君命出士之喪於大夫不當斂則出為於偽反正義鄭氏康成曰父母始死悲哀非所尊不出也出者或至庭孔疏謂世子迎寄公及國賓下文士出迎大夫不逆於門外或至門孔疏下文大夫於君命出則世子於天子之命士於君命亦然不當斂其來非斂時孔氏穎達曰此明君大夫士未小斂之前主人出迎賓之節寄公失國之君國賓鄰國大夫來聘者未小斂去小斂遠不當斂去小斂近士之喪大夫來弔其主人於大夫來弔不當小斂之時尚為大夫出若當斂而至則擯者以主人有事告檀弓云當事而至則辭焉主人無事則為大夫出但云斂不云襲者未襲之前唯士為君命出其餘則不出故士喪禮未襲之前君使人弔主人迎於寢門外是也君使退主人哭拜送於外門外於時賓有大夫則拜之非特出迎賓也雜記云士喪當袒大夫至絶踊而拜之亦謂斂後正斂時不出也凡主人之出也徒跣扱衽拊心降自西階君拜寄公國賓於位大夫於君命迎於寢門外使者升堂致命主人拜於下士於大夫親弔則與之哭不逆於門外跣悉典反扱初洽反衽而審反拊音撫使色吏反正義鄭氏康成曰拜寄公國賓於位者於庭鄉其位而拜之此時寄公位在門西孔疏寄公有賓義也國賓位在門東孔疏或本是吉使行私弔之禮故從主人之位皆北靣孔疏凡弔北靣尸在堂上故向之也小斂之後寄公東靣孔疏稍依吉禮就賓位向主人也國賓門西北靣孔疏亦漸吉就賓位但爵是卿大夫猶北面也士於大夫親弔謂大夫身來弔士也與之哭既拜之即位西階東靣哭孔疏大夫與士俱來皆東靣故主人即位西階下在大夫北大夫特來則北靣孔氏穎達曰前明出迎賓遠近此更辨拜迎委曲之儀降自西階不忍當主位也主人鄉寄公國賓之位拜訖即位於西階下東靣哭之士之喪大夫親來弔立於西階下東靣主人則降自西階下南靣拜之拜訖即位西階下與大夫俱哭不迎大夫於門外郝氏敬曰惟罪人徒役不冠周禮司圜職云罷民弗使冠飾而任之以事始死喪冠屨未成又不敢著吉冠屨故自毁如罪人案問喪云親始死徒跣扱上衽交手哭孔疏謂扱深衣前衽於帶以號踊履踐為妨交手謂交手拊心而為哭也即此扱衽拊心存疑陸氏佃曰迎逢也凡言先之也若逆彼來而後往焉大夫於君命言迎士於大夫言逆以此夫人為寄公夫人出命婦為夫人之命出士妻不當斂則為命婦出正義鄭氏康成曰出拜之於堂上也此時寄公夫人命婦位在堂上北靣小斂之後尸西東靣孔疏前文云君之喪外命婦率外宗哭於堂上北靣故鄭知此時在堂上北靣也小斂之後遷尸於堂故知從婦人之位在尸西東靣也孔氏穎達曰前明男子迎賓此明婦人迎賓也出謂出房也婦人不下堂但出房而拜於堂上也婦人尊卑與夫同故所為出者亦同小斂主人即位於戶內主婦東靣乃斂卒斂主人馮之踊主婦亦如之主人袒説髦括髮以麻婦人髽帶麻於房中馮皮冰反説本作稅同他活反髽側瓜反正義鄭氏康成曰士既殯説髦此云小斂蓋諸侯禮也士之既殯諸侯之小斂於死者俱三日也孔疏謂死數往日婦人之髽帶麻於房中則西房也天子諸侯有左右房孔氏穎逹曰自此至拾踊明人君大夫士等小斂之節及拜迎於賓及奠祭弔者之儀初時尸在牖下主人在尸東今小斂當戶內故主人在戶內稍東西靣斂訖主人馮尸而踊主婦馮尸竟亦踊主人袒者嚮小斂不袒今方有事故袒衣也説髦者髦幼時翦髮為之至年長則垂著兩邊明人子事親恆有孺子之義也若父死説左髦母死説右髦二親並死則並説之親沒不髦是也今小斂竟喪事已成故説之也人君小斂説髦竟而括髮用麻士既小斂亦括髮但未説髦耳婦人髽亦用麻也帶麻謂婦人要絰士喪禮婦人之帶牡麻結本在房男子説髦括髮在東房婦人髽帶麻於西房與男子異處存疑呂氏大臨曰婦人不俟男子襲絰亦先帶麻者以其無絞帶布帶且質略少變故因髽而襲絰也辨正黃氏幹曰喪禮義但有死三日而斂若併死日而數則三日而斂恐指大斂而不及小斂惟白虎通義云天子諸侯三日小斂大夫士二日小斂天子諸侯殯葬月日與士不同則斂日亦當不同又曰案士喪禮小斂馮尸主人括髮袒衆主人免於房婦人人髽於室又士喪禮曰既馮尸主人絞帶衆主人布帶喪大記曰婦人髽帶麻於房中以此觀之則知小斂馮尸之後括髮免髽之時主人已絞帶衆主人已布帶婦人已帶麻特主人未襲絰爾又曰喪服斬衰章疏云婦人亦有絞帶布帶以備喪禮呂氏云無絞帶布帶當考案喪禮主人袒括髮絞帶與婦人髽同時而稍先至其先男子襲絰而帶麻者蓋男子所重在首婦人所重在腰括髮與帶麻並行蓋各重其所重耳帶絰非男子所重故婦人先之非無絞帶之謂也又男子袒故下云襲絰婦人不袒呂亦以襲絰言之尤誤徹帷男女奉尸夷於堂降拜正義鄭氏康成曰夷之言尸也於遷尸主人主婦以下從而奉之孝敬之心也降拜拜賓也孔氏穎達曰此明士之喪小斂訖徹帷夷尸之節初死恐人惡之故有帷小斂衣尸畢有飾故除帷此士禮也案士喪禮卒斂徹帷乃馮尸諸侯及大夫賓出乃徹惟見下文夷陳也小斂竟相者舉尸將出尸陳於堂孝子男女親屬扶捧之至堂也降下也適子下堂拜賓也通論陸氏佃曰體魄降矣而謂之夷婉詞也盤曰夷槃牀曰夷牀衾曰夷衾亦以此君拜寄公國賓大夫士拜卿大夫於位於士旁三拜夫人亦拜寄公夫人於堂上大夫內子士妻特拜命婦泛拜衆賓於堂上泛孚梵切與泛愛之泛同正義鄭氏康成曰衆賓謂士妻也尊者皆特拜拜士與其妻皆旅之熊氏安生曰大夫士拜卿大夫者是卿大夫士家自遭喪小斂後拜卿大夫於位士旁三拜大夫內子士妻亦謂自遭喪小斂後拜命婦及拜士妻之禮大夫士各自遭喪并言之者以其大夫士家喪小斂後拜賓同故也孔氏穎達曰此明小斂訖拜賓也君謂嗣君也小斂畢尸出堂嗣君下堂拜寄公國賓並就其位鄉而拜之也卿大夫則就其位鄉而拜之士賤不人人拜之每一靣三拜士有三等故也旁猶不正也夫人拜於堂上婦人無下堂也卿妻曰內子大夫妻曰命婦不言者見卿妻與命婦同也特拜命婦特猶獨也謂人人拜之尊故也拜內子亦然衆賓士妻賤故汜拜之亦旁三拜也存疑孔氏穎達曰寄公尊故先言之大夫士是先君之臣同服斬小斂訖出列庭位故嗣君出拜之大夫士妻夫人亦拜之此經唯舉君喪拜賓不云大夫士者文不具也大夫士喪拜賓亦然故士喪禮云主人拜賓大夫特拜士旅之是也案熊氏以大夫士拜卿大夫屬下為句孔以大夫士屬上為句謂大夫士為先君之臣故嗣君出拜之夫卿大夫士乃同服斬衰者非寄公國賓之為客者比也君安得拜之君不拜卿大夫士則夫人亦不拜大夫內子士妻矣經文當以君拜寄公國賓絶句是君禮大夫士拜卿大夫以下是大夫士禮夫人拜寄公夫人於堂上絶句是君禮大夫內子士妻以下是大夫士禮孔謂不言大夫士文不具誤也主人即位襲帶絰踊母之喪即位而免乃奠弔者襲裘加武帶絰與主人拾踊免音問拾其劫反正義鄭氏康成曰即位阼階之下位也案此當作阼階下之位傳寫之誤也襲絰乃踊尊卑相變也孔疏士喪禮先踊乃襲絰此先襲絰乃踊士卑諸侯尊也禮斬衰括髮齊衰免以至成服而冠為母重初亦括髮既小斂則免記異者孔疏謂所以異於父也乃奠小斂奠也始死弔者朝服裼裘如吉時小斂則改襲而加武與帶絰矣武吉冠之卷也加武者明不改冠亦不免也檀弓曰主人既小斂子遊趨而出襲裘帶絰而入孔氏穎達曰主人拜賓時袒今拜訖襲衣加要帶首絰於序東復位乃踊也為父喪拜賓竟而即阼階下位又序東帶絰猶括髮若為母喪至拜賓竟即位時不復括髮以免代之免以襲絰至大斂乃成服所以異於父也拜賓襲絰踊竟後始設小斂之奠未小斂前弔者裘上有裼衣裼衣上有朝服開朝服露裼衣今小斂之後弔者以上朝服掩襲裘上裼衣也帶絰者帶謂要帶絰謂首絰以朋友之恩故加帶絰若無朋友之恩則無帶惟絰而已拾更也主人先踊婦人踊弔者踊踊者三是與主人更踊也此皆謂未成服前若成服後其錫衰緦衰等已具上檀弓疏陸氏佃曰鄭氏謂襲絰乃踊尊卑相變也然則袒括髮括髮袒亦相變言加武則著不以居冠弔據居冠屬武後絰弔服也存疑孔氏穎達曰加武者主人既素冠素辨弔者故加素辨於武也郝氏敬曰加武者吉冠玄武今加縞武所謂玄冠者易之示變也雜記小斂繯絰公大夫士一也亦謂加絰於武此未成服視小斂之禮若成服弔則辨絰錫衰矣案孔謂凶冠冠與武連吉冠冠與武不連以玉藻居冠屬武則禮冠不屬武為據夫武者冠之下卷上以一幅布襞積為梁必與武相屬而後冠成若未屬武亦不成冠矣况居冠屬武正吉時常服而反謂吉冠不屬武何也孔又謂主人未成服弔者羔裘玄冠顯與羔裘玄冠不以弔違矣家語季桓子死諸大夫羔裘弔子遊問曰禮與子曰始死羔裘玄冠者易之而已是明言不可以羔裘玄冠弔雖始死未成服猶當易之而往朱子言喪主素吉主玄弔必變服所以哀死是也孔謂此始死子養疾者易之子遊問弔者孔子乃以其子答乎親始死子笄纚則去冠矣豈易玄冠乎且經言弔者襲裘是弔者原素服但猶裼衣至此襲之也言加武是弔者原素冠但無絰至此加絰於武也孔謂加素辨於武尤不可解辨與冠異制今去吉冠之梁存吉冠之武又加一素辨其絰又不加素辨上而加吉武上成何弔冠又不言易服但加一麻帶於朝服上成何弔服乎郝敬謂加縞武於吉冠亦未確謂加絰於縞武則得之君喪虞人出木角狄人出壺雍人出鼎司馬縣之乃官代哭大夫官代哭不縣壺士代哭不以官君堂上二燭下二燭大夫堂上一燭下二燭士堂上一燭下一燭縣音元正義鄭氏康成曰代更也未殯哭不絶聲為其罷倦既小斂可為漏刻分時而更哭也木給爨竈角以為㪺水斗壺漏水之器也冬漏以火爨鼎沸而後沃之此挈壺氏所掌也屬司馬司馬涖縣其器大夫不縣壺下君也士代哭不以官自以親疏哭也燭所以照饌也滅燎而設燭孔疏有喪則於中庭終夜設燎至曉滅燎而日光未明故須燭以照祭饌也孔氏穎達曰此論君及大夫士小斂後代哭之異虞人主山澤之官故出木與角狄人樂吏主挈壺漏水之器故出壺雍人主亨飪故出鼎冬月水凍則漏遲無凖故取鼎暖水用虞人木爨煮之也周禮挈壺氏云凡喪縣壺以代哭者縣漏分時使均其官屬更次相代而哭也賓出徹帷正義鄭氏康成曰此君與大夫之禮也孔疏尊者禮舒也士卒斂即徹帷孔疏據士喪禮徹或為廢案賓出徹帷四字當在前與主人拾踊下脫在此哭尸於堂上主人在東方由外來者在西方諸婦南鄉鄉許亮反正義鄭氏康成曰由外來謂奔喪者也無奔喪者婦人猶東靣孔氏穎達曰此明小斂後尸出在堂時法也哭尸於堂主人位在尸東婦人位在尸西如室中若於時有新奔喪從外來者則居尸西方欲異於在家也未小斂而奔者則在東方故奔喪注云其未小斂而至與在家同也諸婦南鄉謂主婦以下在家者婦人位本在西方東鄉今既有外新奔者故移辟之而近北鄉南也婦人迎客送客不下堂下堂不哭男子出寢門外見人不哭其無女主則男主拜女賓於寢門內其無男主則女主拜男賓於阼階下子幼則以衰抱之人為之拜為後者不在則有爵者辭無爵者人為之拜在竟內則俟之在竟外則殯葬可也喪有無後無無主正義鄭氏康成曰婦人所有事自堂及房男子所有事自堂及門非其事處而哭猶野哭也出門見人謂迎賓也拜者皆拜賓於位也為後者有爵攝主為之辭於賓耳不敢當尊者禮也孔氏穎達曰此明小斂之後男主女主迎送弔賓及拜賓之位又廣眀喪主不在之義婦人質故送迎敵者不下堂有君夫人弔則主婦下堂至庭稽顙而不哭也男子遭喪敵者來弔不出門若有君命則出門亦不哭也故士喪禮君使人弔徹帷主人迎於寢門外見賓不哭是也其無女主以下明喪無主使人攝者禮也若有主則男主拜男賓女主拜女賓無女主則男主拜女賓於寢門內少遠階下而猶不出門無男主則使女主拜男賓於阼階下之位鄉云女有下堂謂此也子雖幼小則以衰抱之為主而人代之拜賓也為後者不在謂不在家之主有官爵其攝主無官爵則辭謝於賓云已無爵不敢拜賓也若不在之主無官爵其攝主之人為主拜賓也若主行近在竟內則俟其還乃殯葬若主在國外不可待而殯又不可待則葬可也喪有無後無無主釋所以使人攝及以衰抱幼之義無主則對賓有闕故四鄰里尹主之無得無主也方氏慤曰有後無後存乎天有主無主存乎人存乎天者不可為也故喪有無後者存乎人者可以為也故無無主也存疑應氏鏞曰有爵無爵係於弔者而注以係於為後不在之人雖於理有之而有不通者大夫或弔於士士或弔於大夫其往來初無常而受弔者不拘為後之貴賤但弔者之至則隨其人而應之有所辭有所拜之不同耳且攝主所以領賓而欲弔者之不虛辱若如注説則為後不在而必身無爵者於凡有客始一例接之苟有爵則一例辭之是皆無事乎接賓也又何以攝主焉在禮士不主大夫之喪士不攝大夫則有爵者喪必有爵者而後主之以受有爵之弔乃為相稱又何辭焉案喪有賓客之主有饋奠之主有主饋奠即主賓客者有主饋奠不主賓客者饋奠惟以親者主之賓客則以爵之尊卑為衡若為後者有爵而在外則在家者雖士於饋奠必主之於賓無不辭者所謂士不攝大夫也若為後者無爵在外而在家者亦無爵則賓客可主在家者有爵則於賓亦當以主不在辭所謂大夫不主士之喪也則孔疏於有爵無爵皆係為後不在者言未可非也應氏謂有爵無爵係於弔者則於大夫於士有異禮前已言之矣君之喪三日子夫人杖五日既殯授大夫世婦杖子大夫寢門之外杖寢門之內輯之夫人世婦在其次則杖即位則使人執之子有王命則去杖國君之命則輯杖聽卜有事於尸則去杖大夫於君所則輯杖於大夫所則杖輯側立反去起吕反正義鄭氏康成曰三日者死之後三日也為君杖不同日人君禮大可以見親疏也孔疏以下云大夫既殯主人主婦室老皆杖是同日此不同日知別親疏輯斂也斂者謂舉之不以拄地也夫人世婦次於房中即位堂上堂上近尸殯使人執杖不敢自持也子於國君之命輯杖未成君不敢敵之也卜卜葬卜日也凡喪祭虞而有尸大夫於君所輯杖謂與之俱即寢門外位也獨焉則杖君謂子也孔疏以經前云子後云君嫌是别人故明之於大夫所杖俱為君杖不相下也孔氏穎達曰自此至隱者一節廣明君及大夫士三日後杖之節制子杖通女子在室者若嫁為他國夫人則不杖嫁為卿大夫妻同五日杖也喪服四制七日授士杖君之女及內宗外宗嫁為士妻及女御皆七日杖也子大夫子兼適庶及世子寢門殯宮門也子大夫廬在寢門外得扶杖拄地行以至寢門殯柩在門內神明所在故入門輯斂之不敢拄地也若庶子至寢門則去杖不得持入此大夫與子同者謂大夫特來不與子相隨也若與子相隨子杖則大夫輯子輯則大夫去杖故下文云大夫於君所輯杖是也夫人世婦在其次則杖者次謂西房居喪之地則得扶杖拄地即位則使人執之以堂上有殯焉子有王命去杖者世子尊天子之命對之不敢杖也國君之命輯杖謂鄰國使人來弔世子未敢比成君故斂杖也有事於尸謂虞及卒哭祔祭敬卜及尸故去杖也大夫於君所輯杖者君謂世子大夫與世子皆在門外位大夫則輯杖敬嗣君也大夫與大夫俱在門外是兩大夫相對同為君杖不相降故並得杖拄地也陸氏佃曰子夫人杖不言授嫌或使之大夫之喪三日之朝既殯主人主婦室老皆杖大夫有君命則去杖大夫之命則輯杖內子為夫人之命去杖為世婦之命授人杖為於偽反正義鄭氏康成曰大夫有君命去杖此指大夫之子也而云大夫者通實大夫有父母之喪也孔疏經云大夫之喪則其子非大夫又云大夫有君命是子為大夫故知二者通也授人杖與使人執之同也孔氏穎達曰此明大夫杖節大夫死後三日既殯應杖者悉杖也大夫嗣子有君命則去杖對君命亦然也大夫之命謂嗣子對彼大夫之使則斂杖自卑下也兩大夫自相對則不去杖內子卿妻也有夫及長子喪君夫人有命弔已皆去杖若有君之世婦命弔內子敬之則使人執杖以自隨卑於夫人故隨而不去也經云大夫之喪不舉命婦而舉內子卿妻者互文也欲見卿喪與大夫同士之喪二日而殯三日之朝主人杖婦人皆杖於君命夫人之命如大夫於大夫世婦之命如大夫案疏云下如大夫定本作如夫人正義鄭氏康成曰士二日而殯者下大夫也士之禮死與往日生與來日此二者於死者亦得三日也孔疏殯為死者故數往日杖為生者故數來日婦人皆杖謂主婦容妾為君女子子在室者孔氏穎達曰此明士之杖節二日而殯除死日為二日也三日殯之明日也士之子於君命其妻於夫人之命如大夫禮皆去杖也若士之子於大夫之命其妻於世婦之命如大夫於大夫之命則輯杖世婦之命則授人杖也陳氏澔曰如大夫謂去杖輯杖授人杖三者輕重之節也子皆杖不以即位大夫士哭殯則杖哭柩則輯杖棄杖者斷而棄之於隱者斷丁管反正義鄭氏康成曰子謂凡庶子也不以即位與去杖同孔疏辟適子也容人君適子入門輯杖猶得即位庶子在門外位去之不得即位熊謂君大夫士之庶子同哭殯謂既塗也哭柩謂啓後也大夫士之子於父父也尊近哭殯可以杖天子諸侯之子於父父也君也尊逺杖不入廟門孔疏即殯宮門棄杖於隱者杖是喪至尊為人得而褻之孔氏穎達曰大夫士謂大夫士之適子既攢塗之後哭殯可以杖將葬既啓之後對柩為尊則斂去其杖君設大盤造冰焉大夫設夷盤造冰焉士併瓦盤無冰設牀袒笫有枕含一牀襲一牀遷尸於堂又一牀皆有枕席君大夫士一也盤本又作槃造七報反併步頂反袒之善反笫側里反含胡暗反正義鄭氏康成曰此事皆沐浴之後宜承濡濯棄於坎下札爛脫在此耳造猶內也袒笫袒簀也謂無席如浴時牀也禮自仲春之後尸既襲既小斂先內冰盤中乃設牀於其上不施席而遷尸焉秋涼而止士不用冰以瓦為盤併以盛水耳漢禮大盤廣八尺長丈二深三尺赤中夷盤小焉周禮天子夷盤士喪禮君賜冰亦用夷盤然則其制宜同之孔氏穎達曰此明初死沐浴之節造冰者造內其冰於盤中夷盤亦內冰小於大盤置冰於下設牀於上去席禪露笫簀浴時無席為漏水也設冰無席為通寒氣也含襲遷尸此三節各有牀惟含一時暫徹枕使靣平故士喪禮云商祝徹枕含竟並有枕含襲及堂皆有席也案孔謂大夫士明日小斂設冰天子諸侯亦三日小斂恐不然夫冰之設恐暑氣鬱蒸尸易腐也士喪禮既沐浴乃設夷槃蓋士卑原不用冰而斂亦速故既沐浴乃設冰耳若天子諸侯三日而斂尚未設冰若當盛暑尸不已腐乎何以浴何以襲本經言設冰乃言牀蓋冰在牀下設冰與遷尸於牀同時必無天子諸侯之用反遲於士一日也始死遷尸於牀幠用斂衾去死衣小臣楔齒用角柶綴足用燕几君大夫士一也幠荒胡反去起呂反楔桑結反柶音四綴丁劣反正義鄭氏康成曰牀謂所設牀笫當牖者也士喪禮云士死於適室幠用斂食去死衣病時所加新衣及復衣也去之以俟沐浴孔氏穎達曰此又明初死之節尸初在地冀生氣復既不生故遷於牀近南當牖前所謂正尸也幠覆也斂衾者大斂之衾被也遷尸在牀用斂衾覆之楔柱也柶以角為之長六寸兩頭曲屈將含恐口閉急故使小臣以柶柱張尸齒令開也尸應著屨恐足辟戾亦使小臣側几於足令几腳南出綴拘尸足兩邊令直不辟戾也既夕禮綴足用燕几校在南御者坐持是也自始死至此貴賤同敖氏繼公曰燕几平生燕居時所馮者存異崔氏靈恩曰几形曲仰而拘足管人汲不説繘屈之盡階不升堂授御者御者入浴小臣四人抗衾御者二人浴浴水用盆沃水用枓浴用絺巾挋用浴衣如它日小臣爪足浴餘水棄於坎其母之喪則內御者抗衾而浴説吐活反繘均必反枓音主又音斗絺敕其反挋音震它音他正義鄭氏康成曰抗衾者蔽上重形也挋拭也爪足斷足爪也孔氏穎達曰此明浴時也管人王館舍者汲謂汲水繘汲水瓶索也遽促於事故不説去井索但縈屈執之於手中以水從西階而升盡不上堂用盆盛浴水用枓酌盆水沃尸用盤於牀下盛浴水絺是細葛除垢為易用生時浴衣拭尸肉令燥如平生尋常之日也浴竟小臣翦尸足之爪坎者甸人所掘階間取土為竈之坎甸人主郊野之官內外宜别故母喪用內御舉衾內御婦人也事事如前惟浴用人不同耳存異方氏慤曰管人主管籥之人也井竈亦其所司故使之汲水焉管人汲授御者御者差沐於堂上君沐粱大夫沐稷士沐粱甸人為垼於西牆下陶人出重鬲管人受沐乃煮之甸人取所徹廟之西北厞薪用爨之管人授御者沐乃沐沐用瓦盤挋用巾如它日小臣爪手翦須濡濯棄於坎差七何反垼音役重直龍反鬲音歷厞扶味反正義鄭氏康成曰差淅也淅飯米取其潘以為沐也浴沃用枓沐於盤中文相變也孔疏沐與浴俱有枓有盤此浴云枓沐云盤是文相變士喪禮沐稻此云士沐粱蓋天子之士也以差率而上之天子沐黍與孔疏公食大夫禮黍稷正饌稻粱為加是黍味美而貴故疑天子用之孔氏穎達曰此明沐也粱稷皆謂用其米取汁而沐也將沐甸人為土垼塹竈於西牆下以煮沐汁陶人作瓦器之官御者淅於堂上管人亦升盡等不上堂就御者受淅汁往西牆於垼竈鬲中煮之甸人取復魄人所徹正寢西北厞以然竈煮沐汁爨然也謂正寢為廟神之也煮汁熟管人取以升階授堂上御者御者乃為尸沐瓦盤貯沐汁用巾拭髮及靣士喪禮注云挋晞也清也事事如平生小臣翦手爪又治須象平生也濡謂煩撋其髮濯謂不淨之汁所濡濯汁棄於坎中鄭注士喪禮云巾櫛浴衣亦并棄之其坎案既夕禮掘坎南順廣尺輪二尺深三尺南其壤此沐汁棄於坎則浴汁亦然存疑孔氏穎達曰重鬲謂縣重之罌是瓦瓶受三升以沐米為粥實於瓶以疏布冪口繫以篾縣之覆以葦席也舊云抽取屋西北簷熊氏云取屋外當厞隱處薪義亦通也案荀子禮論始卒沐浴鬠體飯唅象生執也楊倞注象生執謂象生時所持之事執或為持此經所謂如它日即此意鄭注士喪禮甸人有司主田野者賈氏疏曰甸人當是甸師之屬是也陶人有司主瓦器者説文鬲鼎屬實五觳斗二升曰觳象腹交文三足或從瓦曰鬲今案鬲瓦釜即鬵也下為瓦竈加鬲其上爨之謂之重鬲者有二有兩上者小下者大重疊加之而相間隔下鬲煮者極熟則上鬲蒸者亦熟旁亦有兩耳可懸也士喪禮甸人掘坎於階間為垼於西牆下新盆槃瓶廢敦重鬲皆濯是鬲與盆盤瓶敦為五物不可謂鬲為瓶又重鬲二鬲也士喪禮夏祝鬻餘飯用二鬲於西牆下是也重平聲孔疏以為縣重之罌因為重鬲亦非也取所徹廟之西北厞薪者疏引或説取屋外當厞隱處之薪以為爨備一説耳據經取復魄人所徹正寢西北厞薪之用以爨則舊説是也鄭注若云此室不可居故徹之蓋將以為殯宮即遷廟易簷之意君之喪子大夫公子衆士皆三日不食子大夫公子衆士食粥納財朝一溢米莫一溢米食之無算士疏食水飲食之無算夫人世婦諸妻疏食水飲食之無算粥之育反溢音逸莫音暮疏食音嗣下並同正義鄭氏康成曰納財謂食穀也諸妻御妾也同言無算則是皆一溢米或粥或飯孔氏穎達曰以下廣明五服之喪自初死至除服君及大夫士食欲之節此明君喪食之禮財穀也謂所食之米每日納用之米朝唯一溢米莫唯一溢米也作之無時當須豫納故云納財居喪因病不能頓食隨須則食故云無算士則病輕故疏食疏粗也食飯也粗米為飯亦水為飲夫人世婦諸妻皆婦人質弱恐食粥傷性故言疏食水飲也案記言衆士食粥又言士疏食説若齟齬故有疑衆士為衍文者不知衆士者朝廷之士也士者縣都疏逺之臣也雜記大夫居廬士居堊室疏以士為邑宰疏所謂士卑恩輕者也夫君恩固不可以輕重言然迹逺分卑固有殺於朝廷之士者聖人因人情而制之禮其居也以堊室其食也以疏食蓋哀戚由心不容勉強觀其會通其意固已微矣存疑鄭氏康成曰二十兩曰溢於粟米之法一溢為米一升二十四分升之一孔疏案律厯志合籥為合合重二十四銖十合為一升升重十兩二十兩則米二升與此不同但古稱有二法説左傳者云百二十斤為石則一斗十二斤為一百九十二兩則一升為十九兩有竒今一兩為二十四銖則二十兩為四百八十銖計十九兩有竒為一升則總有四百六十銖八絫以成四百八十銖唯有十九銖二絫在是為米一升二十四分升之一此大略而言之也辨正王氏肅曰滿手曰溢敖氏繼公曰兩手曰掬一手曰溢案王肅云滿手曰溢是也敖説因之鄭以溢為鎰過矣但鄭所謂二十兩於今不及五兩所謂一升二十四分升之一於今亦二合一勺耳大夫之喪主人室老子姓皆食粥衆士疏食水飲妻妾疏食水飲士亦如之正義鄭氏康成曰室老其貴臣也衆士所謂衆臣士亦如之如其子食粥妻妾疏食水飲陳氏澔曰謂士之喪亦子食粥妻妾疏食水飲也孔氏穎達曰此明大夫禮也子姓謂孫也不云衆子主人中兼之案士喪禮有主人有衆主人故云主人中兼之喪服傳云卿大夫室老士貴臣其餘皆衆臣檀弓主人主婦啜粥主婦謂女主也既葬主人疏食水飲不食菜果婦人亦如之君大夫士一也練而食菜果祥而食肉正義鄭氏康成曰果瓜桃之屬也孔氏穎達曰此明既葬至練祥君大夫士之食節既葬哀殺可以疏食不復用一溢米也案婦人當未葬之先本疏食矣葬後不復有所加者蓋弱體食粥固患其或傷食既可以養生自不必求多於疏食之外是疏食者強弱之質與主人異既葬而猶疏食者哀戚之誠與主人同也食粥於盛不盥食於纂者盥食菜以醯醬始食肉者先食乾肉始飲酒者先飲醴酒盥古緩反纂本又作匴音算正義鄭氏康成曰盛謂今時杯杅也纂竹筥也啜者不盥手飯者盥纂或作簨熊氏安生曰此據病而不能食者練而食醯醬祥而飲酒也孔氏穎達曰此明食之雜禮啜粥不用手故不盥以手就纂取飯故盥也練而食菜果者食之時以醯醬也始食肉始飲酒謂祥後也然間傳曰父母之喪大祥有醯醬禫而飲醴酒二文不同庾氏云蓋記者所聞之異彭氏曰乾肉味澀醴酒酒之初熟滓汁相將者孝子不忍即嘗淳厚之味故先食乾肉飲醴酒期之喪三不食食疏食水飲不食菜果三月既葬食肉飲酒期終喪不食肉不飲酒父在為母為妻九月之喪食飲猶期之喪也食肉飲酒不與人樂之期音基為於偽反樂音洛正義鄭氏康成曰食肉飲酒亦謂既葬孔氏穎達曰此論期與大功喪食之節期之喪謂大夫士旁期之喪三不食謂義服也正服則二日不食九月之喪謂事同期也案九月之喪猶期謂亦既葬食肉飲酒不與人樂之言此二者獨食飲則可不可共他人歡樂而食肉飲酒也五月三月之喪一不食再不食可也比葬食肉飲酒不與人樂之叔母世母故主宗子食肉飲酒不能食粥羹之以菜可也有疾食肉飲酒可也五十不成喪七十唯衰麻在身比必利反正義鄭氏康成曰叔母以下義服恩輕也故主謂舊君也言故主者關大夫及君也孔疏諸侯當言舊君大夫稱主故知關大夫性不能食粥可食飯菜羮有疾食肉飲酒為其氣微也不成喪成猶備也所不能備謂不致毁不散送之屬也七十居處飲食與吉時同孔氏穎達曰此明五月三月喪食之節一不食謂緦麻再不食謂小功並言之容殤降之緦麻再不食義服小功一不食故以一不食再不食結之故間傳云小功緦麻再不食殤降者也致毁謂致極哀毁散送謂絰帶垂散麻雜記云五十不致毁玉藻云五十不散送既葬若君食之則食之大夫父之友食之則食之矣不辟粱肉若有酒醴則辭食音嗣辟音避正義鄭氏康成曰尊者之前可以食美也變於顔色亦不可孔氏穎達曰此明已有喪既葬尊者賜食之禮葬後情殺可從尊者奪也君食之謂君食臣也大夫謂大夫食士也父友謂父同志也其人並尊若命之食則可從之食也雖以粱米之飯及肉命食孝子食之若飲酒醴則變見顔色故辭而不飲欽定禮記義疏卷五十七
