body:
  text: 曲禮上第一之二謀於長者必操几杖以從之長者問不辭讓而對非禮也長上聲操七刀反正義鄭氏康成曰從猶就也長者問當謝不敏若曾子之為案孝經孔子問至徳要道曽子辟席而對曰參不敏何足以知之孔氏頴達曰操執持也几杖俱是飬尊者之物故於謀議之時持就也吕氏大臨曰問者皆以不能問能以寡問多則少者當問長者今長者反問之少者不辭讓而對則敬不足也陳氏澔曰謀於長者謂往就長者而謀議所為也長者之前當執謙虚不辭讓非事長之禮通論彭氏曰古之飬老乞言授几七十杖於朝八十不俟朝欲言政者君就之國家優禮賢者猶爾况少者乎餘論陳氏祥道曰辭者無所受於己譲者有所推於人曽子之謝不敏所謂辭也子路之對率爾非所謂譲也凡為人子之禮冬温而夏凊昏定而晨省在醜夷不争凊七正反省息井切正義鄭氏康成曰安定其牀衽省問其安否何如醜衆也夷猶儕也四皓曰陛下之等夷孔疏四皓漢時隐人一東園公二綺里季三夏黄公四甪里先生髙祖令太子擊黥布四皓說建成侯曰諸将皆陛下之等夷莫肯為用孔氏穎達曰冬温夏凊是四時之法昏定晨省一日之法晨旦也應臥當齊整牀衽使親體安定之後退至眀旦既隔夜早来視親之安否如何先昏後晨兼示經宿之禮醜夷皆等類之名貴賤相臨則有畏憚朋儕等輩喜争勝負故戒之以不争方氏慤曰冬則温之以禦其寒夏則凊之以辟其暑昏則定之以奠其居晨則省之以問其安朱子曰温凊定省雖有四時一日之異然一日之間正當随時随處省察其或温或凊之冝也朱氏申曰於相儕之衆相抗之等猶且不争則他可知呉氏澄曰昏定晨省所以養其親在醜夷不争所以安夫親通論呂氏大臨曰事親者居上不驕為下不亂在醜不争孝經引此三者此獨云在醜夷不争者上下驕亂之禍為少而醜夷之争多也孝子一出言舉足不敢忘父母茍好勇鬭很以危父毋一朝之忿忘其身以及其親則所以養親者安在哉呂氏祖謙曰孝子以親之心為心故以親之體為體冬温則當體其温之之理如古人置宻室之類是也夏凊則當體其凊之之理如古人扇枕之類是也昏時則安其父母晨時則雞鳴而起問其安否在醜夷不争此又見孝子涵養之熟頃刻不忘大凡人子在父母前固有孝敬之心不在父母前便移易了故起争心惟養之熟此心常存所以不争夫為人子者三賜不及車馬故州閭鄉黨稱其孝也兄弟親戚稱其慈也僚友稱其弟也執友稱其仁也交逰稱其信也正義鄭氏康成曰三賜三命也孔疏公羊云命者何加我服錫者何賜也是命賜相將凡仕者一命而受爵再命而受衣服三命而受車馬孔疏約周禮大宗伯文宗伯一命受軄軄則爵也三命受位鄭云始列位於王朝三命受位即受車馬受車馬而身所以尊者備矣卿大夫士之子不受不敢以成尊比踰於父孔疏以公侯伯卿三命案此言其父為卿而子受車馬則比於父父非卿而子受車馬并踰於父天子諸侯之子不受自卑逺於君孔疏以其父位既尊不得言不敢比踰也不敢受重賜者心也如此而五者備有焉周禮二十五家為閭四閭為族五族為黨五黨為州五州為鄉僚友官同者執友志同者孔氏穎達曰周禮大宗伯三命受位受位即受車馬人子受三命之尊謙卑不敢受車馬不云不受而云不及者心不及於此賜也親指族内戚言族外慈者篤愛之名兄弟内外通稱弟者事長次第之名交逰汎交也本資信合故稱信也吕氏祖謙曰何故爵與服受車馬不受盖外而為卿大夫内而依然是人子爵雖尊在朝廷之上服雖華在朝祭之時用時却不同惟車馬則偪近父母人子之心所不安也雖然大夫不徒行又不可以私廢公在朝不妨但至門不用吕氏大臨曰五者之稱不同各以其所見言之州閭鄉黨觀其行者也見其所以敬親故稱其孝兄弟親戚貴其恩者也順於父母者親親之愛必隆故稱其慈僚友見其有所譲者也有遜弟之心故稱其弟友者友其徳徳莫盛於孝孝者仁之本故稱其仁交㳺主於信知其誠心於孝故稱其信朱子曰左氏𫝊叔孫豹聘於王王賜之路豹以上卿無路而不敢乗疑此不及車馬亦謂受之而不敢用耳若尊者之賜又爵秩所當得豈容獨辭而不受之邪陳氏櫟曰孝為百行之原稱其孝者出乎鄉黨州閭之公論則孝弟慈信皆孝者之所兼備故各随所見而稱之通論吕氏大臨曰三賜有車馬君之所以寵臣也三賜不及車馬子之所以敬親也受位則有車馬之賜矣受位而不及車馬者位在朝廷而車馬入於私門也坊記云父母存饋獻不及車馬盖車馬家之重器也親之所無子不敢以受於人親之所有子不敢以予於人辟親而不敢加奉親而不敢專其義一也事宗子者不以富貴入宗子之家雖衆車徒舍於外以寡約入事宗子猶舍衆車徒於外則事親者車馬之盛宜在所不受也黨正以飲酒正齒位一命齒於鄉里再命齒於父族三命不齒庶子之正於公族雖有三命不踰父兄其所以敬於族人之長者猶如是况於父母乎能如是則事親之意誠矣存疑胡氏銓曰賜與也三賜貨財衣服車馬也鄭謂三賜三命非也大宗伯三命受位不言受車馬含文嘉九賜一曰車馬則非三命公羊説九賜之次則四曰車馬亦不在三何由三命受車馬乎又車馬賜由君命君子辭位不辭祿車馬安可辭哉鄭誤矣呉氏澄曰胡氏盖謂人之所以與人者有三輕則貨財重則衣服最重者車馬為人子者己仕有祿而欲以物與人如貨財衣服猶可白之父而稱尊者之名以與之車馬重物有父在則人子不敢以之與人也三賜不及車馬與坊記饋獻不及車馬同意辨正王氏炎曰不敢受重賜者心也而五者備有焉反此則其失亦多是以孝子不敢輕受重賜臨川王氏乃曰若謂人子辭譲而不敢受則百官牛羊倉廪之奉舜未嘗辭其説不然禮者聖人之中制天下可以通行堯之待舜與舜所受於堯非可律於天下也案古者車服所以旌勲庸非有功弗賜也君賜之非更有命弗敢即乗也所以榮君賜而致其敬也其平日所乗依所當得而自造之耳玉藻曰年不順成大夫不得造車馬明常法得自造矣又曰君賜車馬乗以拜賜衣服服以拜賜君未有命弗敢即乗服也明常所乗不待賜矣若以車馬不可不受不受則大夫之有車馬者少將大夫之車馬皆君之賜乎亦難為繼矣記所云三賜不及車馬盖謂宣力國家功效應科於法得賜而辭譲弗受不居其成功本之於君父故為人臣人子之盛節而名譽著聞若此耳諸家之説似有未盡見父之執不謂之進不敢進不謂之退不敢退不問不敢對此孝子之行也行下孟反正義鄭氏康成曰敬父同志如事父孔氏穎達曰父之執謂執友與父同志者也或故往見或路中相見也王氏安石曰心存於父者見父之執猶父也呂氏大臨曰進退問答不敢專焉敬之至也見父之執猶極其敬况於父乎陳氏澔曰謂之命之也通論陳氏祥道曰坊記曰睦於父母之黨可謂孝矣又曰於父之執可以乗其車不可以衣其衣廣孝也盖父之同類謂之父黨父之同志謂之父執見父之黨無容孝也此見父之執廣孝也餘論呂氏祖謙曰孝子愛親之心推原使之廣涵養使之厚若雖知愛親不能推原涵養則在親前雖屏氣下色供洒掃應對勞而不怨離父母便驕很傲戾在親前時不多外面驕很多則連親前亦愈薄所以孝子必於親愛之心推廣之涵養之見父之執退然躬弟子之職如此則此心廣大夫為人子者出必告反必面所逰必有常所習必有業夫音扶告古毒反正義鄭氏康成曰告面同爾反言面者從外来宜知親之顔色安否有常有業緣親之意欲知之方氏慤曰出必告者欲親知其所至之方也反必面者欲親知其所至之時也陳氏櫟曰人子事親出必告以所之還必見其父母之面有常㳺必有方也有業所學必有正業二者恐貽親之憂辱也陳氏澔曰逰有常身不他往也習有業心不他用也通論戴氏溪曰為人親者無一念而忘其子故有倚門倚閭之望為人子者無一念而忘親故有出告反面之禮生則出告反面沒則告行飲至事亡如事存也恒言不稱老正義王氏子墨曰慮動親之感也黄氏幹曰教人子對父母常言湏避老字一則傷父母之心一則孝子不忍斥言非謂人子自身稱老也陳氏澔曰恒言平常言語之間也通論吕氏大臨曰出必告反必面受命於親而不敢專也所逰必有常所習必有業體親之愛而不敢貽其憂也恒言不稱老極子之慕而不忍忘也出入而無所受命是遺親也親之愛子至矣所逰必欲其安所習必欲其正茍輕身而不自愛則非所以養其志也君子之事親親雖老而不失乎孺子慕者愛親之至也孟子曰五十而慕者予於大舜見之矣故髧彼兩髦為孺子之飾茍常言而稱老則忘親而非慕也存疑鄭氏康成曰不稱老廣敬孔氏穎達曰老是尊稱稱老是己自尊大非孝子卑退之情李氏曰孝子愛日不以老自稱如曰天子之老寡君之老則稱之不稱於常言而已黃氏震曰不敢自老恐傷親心也年長以倍則父事之十年以長則兄事之五年以長則肩随之長知兩反下竝同正義鄭氏康成曰年長以倍謂年二十於四十者肩随者與之並行差退孔氏穎達曰此謂鄉里之中非親非友但年長倍已則以父道事之即父黨随行也十年以長謂二十於三十者半倍故兄事之則止差退而鴈行也若二十於二十五者肩随之則齊於鴈行也呉氏澄曰此謂道路同行長幼之節父事之者王制所謂父之齒随行也謂正當尊者之背随其後而行也兄事之者王制所謂兄之齒鴈行也謂斜出其左右而稍向後如飛鴈之行次也肩随王制所謂朋友不相踰也謂兩肩相並而差退不踰越其肩也陳氏澔曰此汎言長幼之節通論呂氏大臨曰貴老為其近於親也敬長為其近於兄也闕黨童子與先生並行孔子知其欲速成疾行先長者孟子知其為不弟皆不知敬長之義而已張子曰年長以倍則父事之又視其雅素如何若本在兄弟之列則止可兄事之而已應氏鏞曰此言貴老敬長之道凡年長以倍則執父禮以事之不必限以二十也若曰二十崇行孝弟能盡此禮姑自此而始則可爾君子推敬親敬長之心則凡一日之長於我者皆吾所當敬而年有髙下則敬有等差不可毫釐之紊以此反觀於一身之間則幼而名二十冠而字五十以伯仲而常自省焉以此施於九族之内則服有齊斬功緦之異制居有東西南北之異宮食有族食世降之異等而常加謹焉近而推之鄉則五十者立侍六十者坐七十者四豆而鄉之所敬者各不同逺而推之國則五十杖於家六十杖於鄉七十杖於朝而國之所敬亦不一所以為文理宻察也朱子語類問年長以倍則父事之這也是同類則可曰他也是説得年軰當如此又問如此則不必問徳之髙下但一例如此否曰徳也隐微難見徳行底人也自是尊敬他又問如此則不必問年之髙下但有徳者皆尊敬之曰若是師他則又不同若朋友中徳行底也自是較尊敬他戴氏溪曰庸敬在兄斯湏之敬在鄉人彼固有等差也胡氏銓曰此謂鄉里之中父兄之黨也案此節説行下節説坐行坐正自相對若不在行路上説則父事兄事不止斯湏之敬恐説不去餘論鄭氏康成曰人年二十弱冠成人有為人父之端今四十於二十者有子道内則曰年二十惇行孝弟羣居五人則長者必異席長知兩反正義鄭氏康成曰席以四人為節因冝有所尊孔氏穎達曰羣朋友也謂朋友居處法也古者地敷橫席席容四人則推長者居席端若有五人應一人别席因推長者一人異席也陳氏櫟曰此敬長之義見於坐席之閒者也魏氏了翁曰羣居之席四人為節禮席則異呉氏澄曰居謂坐也上文言行而弟長之禮此言坐而弟長之禮因是推之六人則第三人以下共下席其第一第二人居上席也七人則第二第三居上席之下半其第一則居上席之上半也通論馬氏睎孟曰徐行後長謂之弟疾行先長謂之不弟堯舜之道孝弟而已夫孝弟於歩趋徐疾之閒而聖人之道乃始於此者盖達事長之禮無所往而不為順也推其齒而以父兄事之者謂其愈長而愈加敬也長之五年則肩随者不敢與先生並行也其出也不敢與之並行則其居也可以同席乎盖五人之羣當有所長推其長者必異席以敬之古人敬長如此則民之犯上而踰禮者冝鮮矣案賔主禮席皆無同坐法此羣居兼飲食講説言之為人子者居不主奥坐不中席行不中道立不中門正義鄭氏康成曰不敢當其尊處室中西南隅謂之奥道有左右中門謂棖闑之中央孔氏穎達曰主猶坐也室户近東南角則西南隅隐奥無事故名為奥尊者居必主奥人子不冝處之一席四人則席端為上獨坐則席中為尊尊者冝獨不與人共則坐居席中卑者不得坐也男女各路路各有中尊者常行正路卑者不得行也門中央有闑兩旁有棖棖闑之中尊者所立故人子不當之而立也朱子曰古人室在東南隅開門東北隅為窔西北隅為屋漏西南隅為奥人纔進便先見東北隅却到西北隅然後始到西南隅此是至深宻之地徐氏師曽曰居必別室坐必偏席行必近左右立必倚棖闑皆自卑以尊其親也存疑鄭氏康成曰謂與父同宮者也内則曰由命士以上父子皆異宮孔氏穎達曰四事與父異宮者不禁由命士以上父子皆異宮有命既尊各有臣僕子孫應敬已故也辨正應氏鏞曰父子異宮固各有西南隅之奥然親在而自主之亦有不安焉非特以同宮而避之也若同宮則父自主之矣且道路之間豈父之所統哉而行不敢中者盖無往而不寓其敬親之意也食饗不為槩食音嗣正義鄭氏康成曰槩量也不制待賔客饌具之所有孔氏穎達曰大夫士或相往來不制設饗食饌具由尊者所裁人子不得輙豫限量多少張子曰凡於父母賔客之奉必極力營辦亦不計家之有無不為槩量為子者不有其身不有私財凡人子為飬又湏使其不知勉强勞苦茍使見其為而不易則亦不安矣陳氏澔曰食饗如奉親延客及祭祀之類皆是不為概量順親之心而不敢自為概量也存疑熊氏安生曰食饗不為槩為傳家事任子孫若不傳家事則子孫無待賔客之事辨正游氏桂曰正義引熊氏説未妥盖𫝊家正欲省事方為子孫裁食饗之量是煩尊者也大概為人子假如士庶人朋友相往来茍欲為之設醴必先白父母乃可而設醴之意又當聼於父母也胡氏銓曰食饗不為概此未傳家事者㮚氏概而不税祭祀不為尸正義鄭氏康成曰尊者之處為其失子道然則尸卜筮無父者朱子曰尸用無父者為之陳氏櫟曰尸取主人之子行而已父在而已為尸父將北面事之子所不安故不為也案惟主祭者有北面事尸之禮餘子孫與祭者俱東階之東西面其父在與祭之列即不為尸餘論孔氏穎達曰尸用適而無父者非其宗廟之祭則其尸不必同姓石渠論云周公祭天用太公為尸是用異姓也白虎通又云周公祭太山用召公為尸盖天地山川得用公也案尸者神像也此尸謂宗廟之尸外祀之尸可異姓宗廟之尸必同姓尸必以昭穆從其類也必以正適不敢以賤者溤吾親也天子尸不以公而以卿諸侯不以卿而以大夫明嫌之義也大夫士尸以無爵者避君也又必擇皆無父者為之不使父拜其子也將祭祀尸服卒者之上服祝從尸主人從祝尸入即席東面而坐祝主西面而立皆拜妥尸遂坐而祭焉則儼然以神道事之矣故父在不為尸亦不敢當尊之意也聼於無聲視於無形正義鄭氏康成曰視聼恒若親之將有教使然孔疏父母雖無聲無形然常於心想像似見形聞聲謂父母将有教使已然呂氏大臨曰視聼於無形聲則誠於事親專心致志可知也方氏慤曰聼於無聲則常若親之有所命也視於無形則常若親之在其前也無聲且聼况聞親之聲乎則召之無諾可知矣無形且視况視親之面乎則顔之無犯從可知矣陳氏澔曰先意承志也通論真氏徳秀曰聼於無聲視於無形此戒慎乎其所不睹恐懼乎其所不聞之意乎盖孝子之心惟恐纖芥之差湏臾之失故其潛觀黙察至於如此非誠於事親者能若是乎戴氏溪曰此孝子之極至也念念不置與親為一常若親之在吾前而謦欬於其旁也記曰先王之孝也色不忘乎目聲不絶乎耳自其生也聼於無聲視於無形及其沒也色不忘乎目聲不絶乎耳念慮之積非一日矣楊氏鼎熙曰聼不於有聲於無聲視不於有形於無形分眀有潛孚黙喻志意相通意案或云孝子心與親融渾合無閒必待想像之下方似見形聞聲則恐鄰於擬議窺測然鄭氏所謂恒若原非擬議窺測也至真氏戒慎不睹恐懼不聞則君子存飬之全功戴氏色不忘乎目聲不絶乎耳則就祭祀時説雖理無所不通然不若鄭氏注之親切有味也不登髙不臨深不茍訾不茍笑孝子不服闇不登危懼辱親也訾音紫闇烏紺切正義鄭氏康成曰登髙臨深茍訾茍笑為近危辱也孔疏危登髙臨深辱茍訾茍笑人之性不欲見毁訾不欲見笑君子樂然後笑服事也闇冥也不於闇冥之中從事為卒有非常且嫌失禮也男女夜行以燭孔氏穎達曰茍且也相毁曰訾不樂而笑為茍笑彼雖有是非而已茍譏毁訾笑之皆非彼所欲必反見毁辱也不服闇者不行事於暗中一則為卒有非常二則生物嫌故孝子戒之呂氏大臨曰身也者親之枝也履不安以危之是危親也行不善以辱之是辱親也登髙臨深危道也茍訾近於讒茍笑近於謟是辱道也服闇者欺人所不見也登危者行險以僥倖也孝子之心將為不善思貽父母羞辱必不果服闇登危是忘親也非特忘之不令之名且將加之是辱親也方氏慤曰茍訾則為惡於人矣愛親者其可惡於人乎茍笑則為慢於人矣敬親者其可慢於人乎朱氏申曰不服闇不服闇昧之事不登危不登危險之地恐二者為親之辱通論陳氏祥道曰聼於無聲一傾耳不敢忘父母也視於無形一舉目不敢忘父母也不登髙不臨深一舉足不敢忘父母也不茍訾不茍笑一出言不敢忘父母也孟子曰事孰為大事親為大守孰為大守身為大聼於無聲視於無形則善於事親矣不登髙不臨深不茍訾不茍笑不服闇不登危則善於守身矣又曰父母全而生之子全而歸之則不茍訾不茍笑不服闇所以全其行不登髙不臨深不登危所以全其體案不登危比不登髙臨深進一層髙深有形之危也行險僥倖無形之髙深也行未光明皆属暗昧居非坦易即渉險危故記者特舉孝子以為法父母存不許友以死不有私財正義鄭氏康成曰為忘親也死為報仇讐孔氏穎達曰家事統於尊財闗尊者故無私財戴氏溪曰髮膚以上皆親之體豈敢許友以死粒粟縷絲以上皆親之物豈敢私有其財髙者輕死卑者重財皆非孝也陳氏澔曰親在而以身許人是有忘親之心親在而以財專已是有離親之志辨正呂氏大臨曰不許友以死者不敢受其託也先儒謂許報讎雖父母沒亦不可也患難相死兄弟之道也詩云鶺鴒在原兄弟急難每有良朋況也永歎又曰兄弟鬩於墻外禦其侮每有良朋烝也無戎朋友以道義相成患難之事無相及故曰無戎也戰國游俠以氣相許結私交報讐怨流俗尚之此先王之所必誅君子謂之不義者也餘論黃氏震曰記禮者漢人雜取後世豪侠之言人子髮膚以上皆親之有豈敢私林氏光朝曰父母存不許友以死戰國閒傳習之語不可以為訓為人子者父母存冠衣不純素純之準反下同正義鄭氏康成曰為其有喪𧰼也純緣也玉藻曰縞冠𤣥武子姓之冠也縞冠素紕既祥之冠也深衣曰具父母衣純以青孔氏穎達曰冠純謂冠飾衣純謂深衣領緣呂氏大臨曰人子之服必盡乎孺子之飾者所以説其親也故髧彼兩髦飾其首也衣純以繢以青飾其身也冠衣純以素孤子之服非所以事親也孤子當室冠衣不純采正義鄭氏康成曰孤子謂年未三十者蚤喪親雖除喪不忘哀也三十壯有室有代親之端不為孤也當室嫡子也孔氏穎達曰孤子雖除服猶素然深衣云衣純以素嫡庶皆然今當室謂嫡子似庶子不同者但嫡子内理烝嘗外交宗族代親既備嫌或不同故特明之呂氏大臨曰深衣云孤子衣純以素此云孤子當室冠衣不純采者少而無父者雖人之窮然既除喪矣冠衣猶不改素則無窮也先王制禮行道之人皆不忍也豈可獨遂其無窮之情哉故惟當室者行之非當室者不然也深衣之言畧矣通論馬氏睎孟曰孟子曰父母俱存兄弟無故一樂也樂於中者必稱於外冠衣不純素所以為文也孤子當室者謂嫡室也冠衣不純采者異於諸子也盖父之於長子冠於阼以著代也服之三年以稱情也則嫡子之於父其可以不加隆乎呂氏大臨曰當室謂為父後者問喪曰童子不緦惟當室緦亦指為父後者所謂不純采者雖除喪猶純素也唯當室者行之非當室者不然也案儀禮純博寸純以為口緣盖尊者存以多飾為貴故具父母大父母衣純以繢若惟具父母則飾少而純以青故不純素者一堂具慶見天倫之樂事不純采者終身孺慕見至性之篤誠幼子常視毋誑誑九况反正義鄭氏康成曰視今之示字小未有所知常示以正物以正教之毋誑欺孔氏穎達曰小兒常效習長者長者常示以正事不冝示以欺誑劉氏彜曰幼子之性純明自天未有外物生其好惡者無所學而不可成也故視之以誠信則誠信篤於其心矣視之以詐偽則詐偽篤於其志矣故曰幼子常視毋誑楊氏時曰人之生也直是以君子無所往而不用其直直則心得其正矣古人於幼子常示毋誑所以飬其直也陳氏澔曰常示之以不可欺誑所以習其誠徐氏師曽曰幼子之性本無不誠然習於偽則為惡易而為善難常示毋誑然後詐偽不滋而真純可全矣通論呂氏大臨曰書曰茲乃不義習與性成則不義非性矣然以不義成性則習有以移之故習不可不慎也古之教子者其始生也擇諸母之慈良恭敬慎而寡言者使為子師其次為慈母其次為保母教之之慎如此况可示之誑乎餘論孔氏穎達曰曽子兒啼妻云兒莫啼吾當與汝殺豕兒聞輙止妻後向曽子説之曽子曰勿教兒欺即殺豕食兒是不誑也黃氏裳曰禮云士無故不殺犬豕為示幼子小信而干先王大禮哉呂氏祖謙曰人多謂孟母能示子以信不知買肉以實其信所以為誑也母當直以前言為誑而語之乃買肉以成其誑本是一誑即成兩誑大抵所以䧟於小人者多因要實前言盖實前言三字最是入小人之徑路案常視毋誑兩句對説鄭孔得之陳謂示之以不可欺誑其義一也常示則日見日聞不習於一毫之偽則其誠若固有之矣盖教止於言而示則以意言有盡意無窮也孟母殺猪事朱子小學亦載入然呂氏駁義亦正故附録之童子不衣裘裳立必正方不傾聼衣去聲正義鄭氏康成曰裘太温消隂氣使不堪苦不衣裘裳便易立必正方不傾聼習其自端正孔氏穎達曰童子非成人之名衣猶著也童子體熱不冝著裘又應給役著裳則不便故童子並緇布襦袴内則二十則可以衣裘帛立冝正嚮一方不得傾頭属聼左右程子曰裘裳成人之服也不衣者不能衣也不帛襦袴不帛則是用布也襦今之襖不衣裘帛則常所衣者襦袴而已呂氏大臨曰裘裳與冠皆成人之服未成人者服亦有所未偹也立必正所向之方或東向西向或南向北向不使之偏有所向也士相見禮云凡燕見於君必辨君之南面若不得則正方不疑君疑君者謂斜嚮之不正方也不傾聼者頭容直通論戴氏溪曰常示毋誑所以養其心也不衣裘裳所以養其體也盖不開其情偽之端以育其正性不傷其陰陽之和以長其夀命此古之成人所以多有徳也立必正方不傾聼則敬以直内無傾邪之患矣方氏慤曰立必正則坐不至於跛矣聼不傾則聼不至於淫矣後又言毋側聼者側未至於傾此教童子故責之畧後教成人故責之詳盖不傾則容或側毋側則不傾可知長者與之提攜則兩手奉長者之手負劍辟咡詔之則掩口而對長知兩反奉芳勇反辟匹亦反咡如至反正義鄭氏康成曰提擕謂牽將行奉長者之手習其扶持尊者辟咡詔之謂傾頭與言口旁曰咡掩口而對習其向尊者屏氣也何氏休曰口耳之閒曰咡孔氏穎達曰非惟教之聼立至於歩行亦冝教之謂兒長大當扶持長者因牽行之時教之奉長者之手先使學者令習便也豈但在行在抱時亦湏教之長者或若負劍兒之時而與之語當傾頭不正向之令氣不觸兒亦令見長者所為而後習之童子雖未能掩口而對長者亦教其為之習向尊者屏氣也呂氏大臨曰長者與之提擕則兩手奉長者之手以長者之意不可以不承也負劍辟咡詔之則掩口而對以氣之逼人人或惡之也馬氏睎孟曰就而擕之則奉其手近而詔之則掩口而對者事長之禮盖自幼穉而已知禮譲矣劉氏曰長者俯與童子語有負劍之狀非真負劍也通論方氏慤曰少儀言有問焉則辟咡而對者彼言幼者對之之時此言長者詔之之時詔對雖不同其所以辟咡之容則一也存異鄭氏康成曰負謂置之於背劍謂挾之於旁胡氏銓曰歐陽子阡表劍汝立於旁劉氏彜曰長者從童子背後而俯首與之語則童子如負長者然長者以手挾童子於脅下則如帶劍然黃氏裳曰嬰兒可置於脅下如帶劍者豈能教之對長者禮是長者或負劍不便屈身但偏就近耳而詔之案此童子能行能對則非懐抱之童或負之於背帶之於脅可知而劉謂若童子背負長者與長者手挾童子若帶劍負屬童子劍屬長者則又非也盖劍長而室堅不可猝拔必推之背左手下持其室邪俯其身右手從腦旁拔其靶乃出今邪俯其身就童子語形似之非長者真負劍也又負劍乃拔之𫝑黃謂即帶劍亦非總論㳺氏桂曰古之人所謂匹夫匹婦皆有孝弟之行非皆生而知之亦由父兄長者教之使有方也欲其長毋誑欺也則自其幼而常視毋誑矣欲其長而知事長洒掃應對進退之節也則自其幼而使之堪忍勞苦給役便易矣欲其長而視聼之正也則自其幼而教之正方不傾聼矣欲其長而扶持供飬也則自其幼而教之提擕奉手之禮矣欲其長而觧事尊者屏氣也則自其幼而教之對長者掩口之禮矣凡此不獨自其幼而教之也父兄長者又以己身而先之焉常視毋誑則先以己之無誑示之也辟咡詔之則先以己之辟咡教之也古之教人者茍欲教人先正其身至於教子則尤其所當謹者也從於先生不越路而與人言邅先生於道趨而進正立拱手先生與之言則對不與之言則趨而退從才用反下並同拱俱勇反正義鄭氏康成曰不越路與人言尊不二也先生老人教學者拱手為有教使趋退為其不欲與已並行孔氏穎達曰從謂從行時先生師也謂師為先生者言彼先已而生其徳多厚也邅逢也疾趋而進就之又不敢斥問先生所為故正立拱手而聼先生之教吕氏大臨曰弟子之於師聼教聼役而已故正立拱手以待也與言則對不與言則退應對進退不敢專也戴氏溪曰禮無二敬從先生而越路與人言則敬有所分趋進者懼先生之有教令也趋退者不敢與先生並行也遇而引避雖足致敬而非所以承命也不與言而随行不置亦非所謂承意也通論呂氏大臨曰先生則他人稱之長者則無嫌於自稱馬氏睎孟曰先生者齒長而有徳之稱古之冠者見於鄉大夫鄉先生鄉飲酒之禮主人就先生而謀賔尊爵貴徳之義也存疑胡氏銓曰前云必辭譲而對此云則對畧道路也案論語問孝而曰有酒食先生饌則先生之稱初惟屬父耳其兼言兄則由父推之謂同為父所生而其生先於我也其以稱師則又由父兄推之謂教我比於生我故自稱亦曰弟子也其以稱大夫致仕者則又由師推之為古致仕大夫士教於鄉里也其以稱鄉人之老者則又推之為其年亦近於父也然此亦必年與徳兼耳若長者則但以年而言又案相從則歩趋不違所以專致其敬相遇則進退必謹所以曲盡其敬與之言與有所問不同問我立志問我所長故必謙遜乃對若但與言則直對而已無所用謙也胡氏畧道路之説非從長者而上丘陵則必鄉長者所視上時掌反鄉去聲正義鄭氏康成曰鄉長者所視為逺視不察有所問孔氏穎達曰長者東視則東視西視則西視戴氏溪曰從長者而升髙非以逺覽也所以承教也違長者所視則志在覽物敬長之意失矣况長者欲有所問乎陳氏澔曰髙而有向背者為丘平而人可陵者為陵鄉長者所視恐有問則即所見以對也登城不指城上不呼呼火故反正義鄭氏康成曰不指不呼為惑人陸氏徳眀曰呼號呌也方氏慤曰不指為其惑人之見也不呼為其惑人之聞也言城者士民之所㑹而聞見者衆故也通論戴氏溪曰論語曰車中不疾言不親指在車上猶不可况於登城乎案不指不呼非特不駭人亦以自約其不謹也將適舍求毋固正義鄭氏康成曰適舍謂行而就人舘孔氏穎達曰舍謂主人家也陳氏櫟曰將適館舍有求於主人不可有固求必得之心存異鄭氏康成曰固猶常也求主人物不可以舊常或時乏無周禮土訓辨地物原其生以詔地求其類張子曰將適舍求毋固固求休息有似厭怠然陳氏櫟曰一説將欲退而就舍長者或留之不可固求必退呉氏澄曰暮而求舍舘一宿而已随所在而安不敢必求適意之所也案鄭訓固為常所引周禮亦不類若謂不可以我常如是而求必遂則可耳又經文由適舍而上堂由上堂而入户由入户而即席是適舍者乃自外入非從内出也陳氏謂先生長者未許而固求必退則似身在户内而出就館舍呉氏謂暮而一宿又似旅行投宿恐與下上堂入户皆不類將上堂聲必揚户外有二屨言聞則入言不聞則不入屨紀具反聞音問又如字正義鄭氏康成曰聲必揚警内人也陳氏澔曰上堂升主人之堂揚其聲者使内人知之也徐氏師曽曰複下曰舄單下曰屨古者即席則去屨不以屨踐席楊氏鼎熙曰言者聲徹曰聞又曰此必師弟朋友親戚無擯介將命者存疑熊氏安生曰一人之屨在户内其户外有二屨則三人也下文云離坐離立無往参焉則知户内二人不得参之故知户外二屨當有三人孔氏頴達曰户外二屨謂兩人體敵故鄉飲酒賔主皆降脱屨堂下以體敵故也若尊卑不同則長者一人脱屨户内若内人語聞於户外則非私事外人乃可入也陳氏澔曰三人而所言不聞於外必是宻謀故不入存異孔氏穎達曰無非法之私事乃可入戴氏溪曰嫌疑者禍之階也故禮者所以别嫌疑而免於人道之患將上堂聲不揚而黙上則人得以疑乎我將入户言不聞而遽入則我有以窺乎人此二者禍之階也案此節自是上堂入户之通禮即由外寢入内寢亦然而上他人之堂入他人之户更可知孔氏非法戴氏禍階立論不無太過至户外有二屨自謂二人之屨熊氏謂户外有二屨一人之屨在户内則有三人但自外來者不見户内之屨又烏知其有無乎至熊引離坐離立無往参以證則義殊別盖離並也彼二人並坐並立我不可出其閒非謂坐與行必不可有三人也孔引脱屨堂下以証則事更不同此偶相過非賔主行禮且入室非升堂或卑幼自來主人不必出迎至户同脱屨入也將入户視必下入户奉扃視瞻毋囬户開亦開户闔亦闔有後入者闔而勿遂奉上聲扃古螢反闔胡臈反正義鄭氏康成曰言聞則入視必下不干掩人之私也奉扃敬也開亦開闔亦闔不以後来變先勿遂示不拒人孔氏穎達曰扃所以關鼎者關户之木亦得稱扃凡當奉扃之時必兩手向心而奉之今入户雖不奉扃木以其手對户若奉扃然言恭敬也初入時視必下不得廽轉廣有瞻視也若户本開則今入者不湏闔若户本闔則今入者不湏開已先入後猶有應入者雖已應闔當徐作闔𫝑以待後入不得遂闔以拒後人方氏慤曰視以下為敬上於面則傲視近而瞻逺視詳而瞻畧不可囬旋恐其掩人之私也陳氏祥道曰闔之所以敬其主於内勿遂所以敬其人於外存異姚氏舜牧曰户之開闔皆主人事也方主迎客而其户或閉必先舉手以開户客亦随身與開之既入主或闔其户客亦舉手與闔之皆致不敢當主之意但恐猶有後入者則闔之而勿遂耳毋踐屨毋踖席摳衣趨隅必慎唯諾踖在亦反摳苦侯反趨七俱反唯云癸反諾努各反正義鄭氏康成曰趋隅升席必由下也孔氏穎達曰踐蹋也既並脱屨户外其人或多若後進者不得蹋先入者屨踖猶躐也席既地鋪當有上下將就坐當從下而升以就已位若𤼵初從上為踖席摳提也趋猶向也隅猶角也既不踖席當兩手提裳之前徐徐向席之下角從下而升已位也唯諾應對也坐定又謹於應對呂氏大臨曰毋踐屨毋踖席敬其物所以敬其人也摳衣趨隅必慎唯諾不敢為賔聼命於先生長者唯所以應也諾所以許也陳氏澔曰摳衣與論語攝齊同徐氏師曽曰欲便於坐故摳衣欲示其譲故趨隅此即席之儀也既坐定又當謹於應對無往而非敬也通論戴氏溪曰凡升堂者脱屨於堂下唯祭則否凡入户者脱屨於户外有尊長在則否就屨取屨納屨遷屨皆有禮法即席之禮由下以序而升賔客之席讀書之席飲食之席徒坐之席亦有禮法不失尺寸過此則為非禮矣存疑鄭氏康成曰慎唯諾者不先舉見問乃應存異孔氏穎達曰玉藻云升席不由前為躐席自是不由席前升與此別鄉飲酒云賔升席自西方注云升由下也升必中席彼謂近主人為上故以西為下也衣裳也陳氏澔曰趨由席角而升坐也辨正朱子曰毋踐屨毋踖席此是衆人共坐一席既云當己位上即湏立於席後乃得當己位上盖以前為上後為下也正與玉藻義同鄉飲乃是特設賔席一人之坐故以西為下西自席下之中升而即席與此異也彭氏曰摳衣則連裳提之訓衣為裳非也總論孔氏穎達曰自從於先生至唯諾眀事師長之禮大夫士出入君門由闑右不踐閾闑魚列反閾音域正義鄭氏康成曰臣統於君闑門橛閾門限也孔氏穎達曰門以向堂為正右在東也主人位在門東客位在門西大夫士是臣皆統於君不敢自由故出入君門恒從闑東踐履也出入不得踐履門限一則自髙二則不净並為不敬陳氏祥道曰門以向内為常由闑右則由闑東也天子適其臣由阼階大夫士出入君門由闑右盖天子無適而不為主大夫士無時而不純臣也故賔客公事自闑西私事自闑東盖公事則以公禮入私事則以臣禮入馬氏睎孟曰由闑右不敢為賔也朱子曰疏門中有闑兩旁有棖棖如今衮頭相似闑當中礙門者今城門有之古人常掩左扉人君多出門外見人當棖闑之閒為君位又曰只是自外入右邉門中乃君出入之所自内出亦右陳氏澔曰當門之中闑東為右主人入門而右客入門而左大夫士由右者以臣從君不敢以賔敵主也陳氏櫟曰闑之右門之東也存異饒氏魯曰大門兩旁之木為棖中閒兩扉相合處又有一木常設而不動曰闑東西兩扉君出入則皆由左出以東扉為左入以西扉為左若大夫士出入君門則皆由右出以闑西為右入以闑東為右避君出入處也湯氏道衡曰君出入皆由左大夫避君出入故由右案天子五門郭門謂之皐門皐門内謂之庫門庫門内謂之雉門雉門内謂之應門應門内謂之路門諸侯三門庫門内謂之雉門雉門内謂之路門詩曰乃立皐門皐門有伉乃立應門應門將將明堂位言魯庫門天子皐門雉門天子應門言其制如之耳書言王出在應門之内春秋書魯雉門災家語言衞有庫門諸書皆無言諸侯有皐應二門者鄭注諸侯宮門外曰皐門朝門曰應門誤矣至於三朝内朝在路門内所謂圖宗人嘉事之朝每日視朝退聼事於此周禮太僕宰夫所謂掌其復逆論語所謂過位升堂皆在此也治朝亦名正朝在路門外周禮所謂司士正治朝之位玉藻所謂天子皮弁以日視朝諸侯朝服以日視朝者皆在此也其左右則為官府治事之所天子自此而出為應門為雉門諸侯無應門即雉門矣故曰魯雉門天子應門也雉門天子兩觀諸侯一觀魯亦兩觀僭也左宗廟右社稷之門亦在雉門以内故禮運仲尼與於蜡賔事畢出逰於觀之上孔氏謂孔子出廟門往雉門榖梁傳送女母不出祭門諸母兄弟不出闕門范寗謂祭門廟門闕門兩觀也自此又出為庫門府庫皆在其門内魯桓僖災而季桓子命蔵𧰼魏曰舊章不可無曰財可為也以府庫與𧰼魏相接也鄭謂廟門在庫門内亦似小誤至於外朝則天子在庫門外諸侯在庫門内而魯一門内外兩向故曰庫門天子皐門也詢萬民則在此周禮所謂朝士掌外朝之法小司冦掌外朝之政是也鄭謂外朝在雉門外或就諸侯言則可耳至門以向堂為正東為右西為左故治朝之位以東為尊王族故士虎士在路門右大僕大右小臣在路門左畢公率東方諸侯入應門右召公率西方諸侯入應門左王出入必以右也諸侯則西一門常掩謂之賔門惟客至乃啟君臣出入皆於東故曰臣統於君不敢自由也朱子説甚明陳用之饒雙峯之説皆誤總論孔氏穎達曰此一節明大夫士出入君門之法凡與客入者每門譲於客客至於寢門則主人請入為席然後出迎客客固辭主人肅客而入正義鄭氏康成曰每門譲下賔也敵者迎於大門外聘禮曰君迎賔於大門内為席猶敷席雖君亦然固辭又譲先入孔疏聘禮及廟門公揖入於中庭是也若敵則更出迎不敵則不出迎如此得君行一臣行二也肅進也進客為道之孔氏穎達曰言凡者通貴賤也每門者天子五門諸侯三門大夫二門客敵者主人出門外迎客主人遜不先入自謙下敬於賔也此云凡與客入謂燕也故下文云至寝門謂燕在寝也若相朝饗食皆在廟寝門最内門也主人嚮已應正席今客至内門方請先入敷席者一則自謙示不敢逆設席以招賢二則重謹更冝視之禮有三辭初曰禮辭再曰固辭三曰終辭客已再辭故主人進道客公食大夫禮公揖入賔從是也陳氏櫟曰肅客而入俯手揖客而入也通論孔氏頴達曰聘禮君使卿歸饔餼于賔賔迎于門外及廟門賔揖俱入是敵禮不重出迎者尊主君之命不敢當也聘禮賔見主國大夫及廟門大夫揖入不出迎者尊聘君之命不敢當也案主尊非賔敵故主入為席賔即從入主不出迎此卿與大夫賔主本敵而皆不出迎非主自尊正以尊兩君不敢用敵禮也呂氏大臨曰每門遜於客者門不一也有大門有寝門若行禮於廟則有廟門敵者則迎于大門之外士冠士昏聘禮賔皆行於廟主人迎賔於大門外是也敵以下則迎於大門之内聘禮公皮弁迎賔於大門内是也肅客謂俯手以揖之周官大祝九拜所謂肅拜也春秋傳曰三肅使者是也杜預云肅手至地餘論方氏慤曰寝門在人君則稱路門主人請為席將以行禮也請起事也於主人之將有為則曰請辭止事也於客之不敢當則曰辭陳氏祥道曰主人於賔迎之無不拜每門每曲無不揖此言迎而不言拜則拜可知每門譲而不言每曲揖則揖可知劉氏彜曰子男以上相為賔之禮則如諸公司儀之職皆以車迎車送無主人先入為席之事此諸侯大夫士相為賔之禮也存疑孔氏穎達曰入鋪席竟後更出迎客案請入為席只是請之之辭客固辭則即俯手肅拜而偕入耳孔疏入鋪席竟後更出迎客恐未然主人入門而右客入門而左主人就東階客就西階客若降等則就主人之階主人固辭然後客復就西階復音服正義鄭氏康成曰右就其右左就其左降下也謂大夫於君孔疏謂他國之大夫也士於大夫也不敢輙由其階卑統於尊不敢自專也復就西階復其正也孔氏穎達曰降等卑下之客也不敢亢禮故就主人階繼屬於主人方氏慤曰與主共階則以卑從尊而於禮為殺與主異階則以此敵彼而於禮為亢客若降等則為殺矣故就主人之階陳氏櫟曰東階在右西階在左客降等則不敢抗禮就西階而殺禮就主人之階從主人後以登卑統於尊不敢以賔自居也通論孔氏穎達曰聘禮公迎賔賔不就主人階公食大夫禮公迎賔賔入門左此皆是降等不就主人階者奉已君之命不可茍下主人故從客禮也若君燕臣命宰夫為主人則主人與賔皆從西階升與此異又聘禮賔面主國大夫賔亦入門右見私事猶謙若降等然方氏慤曰就主人之階與大夫士出入君門由闑右同義主人與客譲登主人先登客從之拾級聚足連歩以上上於東階則先右足上於西階則先左足拾音渉上時掌切下同正義鄭氏康成曰拾當為渉聲之誤也級等也渉等聚足謂前足躡一等後足從之併連歩謂足相随不相過重蹉跌也先右先左近於相鄉敬也孔氏穎達曰客主至其階又各譲不先升也譲必以三三竟而客不從故主人先登亦肅客之義主人前升至第二級客乃升中較一級故云從之拾級聚足者上階法也連歩以上者上上堂也在級未在堂後足不相過故云連歩渉而升堂故云以上張子曰拾級聚足此等事但敬事自至如此非著心安排而到通論孔氏穎達曰公食大夫禮公升二等賔升是從之也燕禮大射禮賔先升者公以宰夫為主人賔尊也聘禮君使卿歸饔餼於賔館卿升一等賔從者卿銜主君之命尊也至於賔設醴禮卿賔升一等卿從升者以賔作主人道之也存異呂氏大臨曰拾更也射者拾𤼵投壺者拾投哭踊者拾踊皆更為之也拾級者左右足更上也胡氏銓曰拾級聚足拾掇也拾物必俯言躡等級必俯視地若拾物然陳氏澔曰先右先左各順入門之左右也案拾級若如呂説則不聚足矣顯與經文背胡謂俯視地則東西階賔主不相顧亦非陳謂順其門則不應有就東階諸禮總論孔氏穎達曰凡與客入至左足眀賔與主送迎相譲及升堂行歩之法帷薄之外不趨堂上不趨執玉不趨堂上接武堂下布武室中不翔薄平博切正義鄭氏康成曰帷薄之外不見尊者行自由不為容也入則容行而張足曰趨堂上不趨為其廹也堂下則趨執玉不趨志重玉也聘禮曰上介授賔玉於廟門外孔疏引此証賔於堂下有執玉時不疾趋而為徐趋武迹也迹相接謂每移足半躡之中人之迹尺二寸布武謂每移足各自成迹不相躡行而張拱曰翔不翔亦為其廹也孔氏穎達曰帷幔也薄簾也張足疾趨而行敬也貴賤各有臣吏故其敬處亦有逺近禮天子外屏諸侯内屏卿大夫以簾士以帷臣来朝君至屏而加肅屏外不趨也帷薄外不趨謂大夫士外不趨則内可趨為敬也堂上廹狹故亦不疾趨下階則趨故論語云沒階趨執玉湏慎疾趨則或蹉跌失玉故不論堂之上下皆不疾趨也堂上不疾趨故迹相接每進六寸也呂氏大臨曰凡見尊者以疾行為敬然有不必趨者帷薄之外非尊者所見可以紓其敬也有不可趨者堂上地廹不足以容歩執玉之重或虞於失墜也方氏慤曰趨足容也翔手容也堂上不趨則未必不翔室中不翔則不趨可知通論孔氏穎達曰爾雅室中謂之時堂上謂之行堂下謂之歩門外謂之趨中庭謂之走大路謂之奔出廟入廟不以趨為文若迎賔則趨以采齊行以肆夏行謂大寝之庭至路門趨謂路門至應門陳氏祥道曰足在體下曰武緌在冠下亦曰武並坐不横肱授立不跪授坐不立肱古横切正義鄭氏康成曰不横肱為害旁人不跪不立為煩尊者俛仰受之孔氏穎達曰授立不跪者謂尊者立之時卑者以物授尊者不得跪煩尊者俯受若尊者形短雖卑者得跪以授之方氏慤曰授立不跪者為煩尊者之俯也授坐不立者為煩尊者之仰也陳氏澔曰横肱則妨並坐者不跪不立皆為不便於受者徐氏師曽曰立與坐皆謂尊者不立謂跪也通論陳氏祥道曰公食大夫禮贊者坐取黍興以授賔授立不坐也聘禮賈人坐取圭不起而授上介君子不以為非禮者賤不足以為禮也方氏慤曰少儀言受立授立不坐則不特授尊者而然雖受卑者亦然矣姚氏舜牧曰授立不跪授坐不立則在受者又可知案並坐不横肱謂敵體者下二句則皆為尊者言之古人跪與坐皆兩膝著地而有小異者反蹠坐其上而以股就足謂之坐伸腰及其服而挺身直起謂之跪跪以致敬而以物授尊者則禮有不同當尊者立之時則不必跪若當尊者坐之時則又湏跪而不可立皆以便於受者為禮也總論孔氏穎達曰此二節眀歩趨授受之儀欽定禮記義疏卷二
