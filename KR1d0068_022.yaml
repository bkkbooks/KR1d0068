body:
  text: 月令第六之三孟夏之月日在畢昏翼中旦婺女中婺音務又夏小正四月昴則見初昏南門正日在畢淮南子作招搖指已正義鄭氏康成曰孟夏者日月會於實沈孔疏實沈申次之號而斗建巳之辰也髙氏誘曰畢西方宿晉之分野孔氏穎達曰夏假也四月建巳巳己也律厯志已盛於已三統厯四月節日在畢十二度昏軫四度中旦虛三度中四月中日在井初度昏角六度中旦危六度中元嘉厯四月節日在畢十一度案畢十一度當作昴十一度今刻本誤耳昏翼十度中旦女三度中四月中日在畢十五度昏軫十度中旦虛九度中案此謂立夏後三十日也夏大也物盛而長大也畢西方隂宿八星狀如掩兔之畢旁一星為耳白虎性猛故以畢制之其廣十七度月建巳而日在申巳與申合也翼南方火宿二十二星為朱鳥之翼廣十九度女北方土宿婺女吕氏作須女婺須皆女賤者之稱四星如箕廣十一度唐月令四月節日在昴昏翼中曉牽牛中斗建巳位之初四月中日在畢昏軫中曉須女中斗建巳位之中通書立夏日在胃十三度小滿日在畢初度今時憲書立夏日在胃一度小滿日在昴三度實沈古法初畢十二度終井十五度今法初昴四度終觜九度其日丙丁淮南子上有其位南方正義鄭氏康成曰丙之言炳也日之行夏南從赤道長育萬物月為之佐時萬物皆炳然著見而強大又因以為日名焉易曰齊乎巽相見乎離孔疏引以證丙丁為眀著之義孔氏穎逹曰律厯志云丙炳丁成也炳眀於丙大成于丁陳氏祥道曰丙數七丁數六同於為火為禮張氏虙曰丙丁屬夏以夏盛德在火也其帝炎帝其神祝融正義鄭氏康成曰此赤精之君火官之臣自古以來著德立功者也炎帝大庭氏也祝融顓頊氏子曰黎為火官髙氏誘曰炎帝少典之子姓薑氏以火德王號為神農死祀南方為火德之帝祝融顓頊氏後老童之子吳回也為髙辛火正死為火官孔氏穎逹曰春秋説云炎帝作耒耜播百穀曰神農杜預云祝融眀貌張氏虙曰漢魏相傳南方之神炎帝乘離執衡而司夏火性炎上故曰炎融者火之眀盛也案炎帝天火德之帝祝融天火氣之神神農吳回則人帝人官之配食於此者也其蟲羽正義戴氏德曰羽蟲三百六十鳯為之長鄭氏康成曰象物從風鼓葉飛鳥之屬髙氏誘曰盛陽用事鱗散成羽鳥屬也朱氏申曰夏則前而禮羽蟲屬焉以其色文也吳氏澄曰南方井鬼栁星張翼軫七宿有鳥之象故凡物之有羽者屬火盧氏翰曰南方朱鳥七宿火屬其類為羽故夏則其蟲羽其音徵律中中呂徵音止中呂之中仲通正義鄭氏康成曰三分宮音去一以生徵徵數五十四屬火者以其微清事之象也夏氣和則徵聲調樂記云徵亂則哀其事勤孔疏宮數八十一三分之為二十七者去其一餘五十四徵數次少故微清孟夏氣至則中呂之律應中呂者無射之所生三兮益一律長六寸萬九千六百八十三分寸之萬二千九百七十四孔疏無射律長不及五寸三分之為一十六而有餘者三益其一則為六寸半而有餘也周語曰中呂宣中氣漢志云徵祉也物盛大而繁祉也中呂微陰始起未成著于其中旅助姑洗宣氣齊物也班氏固曰呂拒也陽氣將極陰始自中拒難之也髙氏誘曰徵火也位在南方仲呂陰律陽散在外陰實在中所以類陽也韋氏昭曰四月仲呂坤上六也管長六寸六分陽氣宣散於外陰氣閉藏於內所以助陽成功也陳氏祥道曰中呂建巳之律四時之序猶伯仲焉春為伯夏為仲是時夏氣始行故曰仲吕朱子曰管子云凡聼徵如負豬豕覺而駭太史公云徵動心而和正禮聞徵音使人樂善而好施又曰仲呂之律長六寸五分八釐三毫四絲六忽存疑王氏喬桂曰仲呂長八寸一分自姑洗又益九分其數七其味苦其臭焦其數七下唐月令有其性禮其事視正義鄭氏康成曰火生數二成數七但言七亦舉成數也孔疏易地二生火于南天七成火于南但言七以成數為功也又皇氏侃云火生數二得土五而成故七也苦焦火之臭味也凡苦焦者皆屬焉孔氏穎達曰火所以在南者從炎上之氣炎上者從陽也夏味苦臭焦者火之氣味火燒物則焦焦則味苦馬氏睎孟曰夏以陽極生火火之成形而炎上炎上則作苦矣物以火化則其氣為焦故曰其味苦其臭焦其祀竈祭先肺正義鄭氏康成曰夏陽氣盛熱於外祀之於竈從熱類也祀之先祭肺者陽位在上肺亦在上肺為尊也竈在廟門外之東孔疏少牢特牲禮皆竈在廟門外之東西面北上祀竈之禮先席于門之奧東面設主於竈陘乃制肺及心肝為俎奠於主西又設盛於俎南亦祭黍三祭肺心肝各一祭醴二亦既祭徹之更陳鼎俎設饌於筵前迎尸如祀户之禮孔疏奧門外西室之奧知西室者以神位在西也陘竈邉承器之物以土為之盛謂黍稷盛之于簋皇以為老婦之祭盛於盆非也言祭黍或無稷也髙氏誘曰吳回回祿之神託於竈是月火王故祀之肺金也祭先之用其所勝也孔氏穎達曰此配竈神而祭者是先炊之人禮器云爨者老婦之祭張氏虙曰夏與冬為對人之生不在家則在路夏祀竈賴其飬於家冬祀行賴其利于路也朱氏申曰竈者物之所以化夏則陽極而陰化也故祀之祭先肺夏火之勝金也黃氏震曰夏火盛克金故祭先肺以金養之螻蟈鳴蚯蚓出王瓜生苦菜秀螻音婁蟈音國螻蟈鳴夏小正作鳴蜮蚓淮南子作蠙王瓜生呂氏春秋作王善生夏小正又有鳴札囿有見杏正義鄭氏康成曰螻蟈蝦蟇也王瓜萆挈也今月令云王萯生夏小正云王萯秀髙氏誘曰蚯蚓自土中出王善或瓜㼋􅕕也是月乃生爾雅不榮而實曰秀孔氏穎達曰周禮有蟈氏先鄭云蟈蝦蟇後鄭云今御食蛙方氏慤曰蚯蚓至陰之物故感正陽之氣而出王瓜南方之果色赤感火之色而生苦菜南方之菜味苦感火之味而成馬氏睎孟曰螻蟈陰而伏者乘陽而鳴蚯蚓陰而屈者乘陽而伸王瓜陽物之可以勝陰者火炎上作苦故苦菜秀張氏虙曰王瓜大瓜也種最多有大有小以大者為善苦菜詩謂之荼盧氏翰曰蚯蚓無心與阜螽交引而後伸一名土龍存疑髙氏誘曰螻螻蛄也蟈蝦蟇也陰動於下故螻蟈應之而鳴張氏虙曰蛙能鳴蟈鳴尤甚故周禮蟈氏掌其禁盧氏翰曰螻一名蟪蛄當夏氣之盛則夜鳴聲似蚯蚓亦謂之土狗案夏小正三月􅕪則鳴傳曰􅕪天螻也四月鳴蜮傳曰蜮屈造之屬則螻蟈似是二物但與注疏不合姑存待考天子居眀堂左個乘朱路駕赤駵載赤旗衣朱衣服赤玉食菽與雞其器髙以粗駵音留粗七奴反淮南子下有南宮御女吹竽笙其兵戟正義鄭氏康成曰明堂左個太寢南堂東偏也菽實孚甲堅合屬水雞木畜時熱食之亦以安性也粗猶大也器髙大者象物盛長髙氏誘曰乘朱路駕赤駵順火德也騂馬黑尾曰駵孔氏穎達曰色淺曰赤深曰朱路與衣人功為之故須深旗亦人功然不須深若馬與玉自然之色不能深也是月也以立夏先立夏三日太史謁之天子曰某日立夏盛德在火天子乃齊立夏之日天子親帥三公九卿大夫以迎夏於南郊還反行賞封諸侯慶賜遂行無不欣説先悉薦反正義鄭氏康成曰不言帥諸侯諸侯時或無在京師者空其文也髙氏誘曰火王南方故於南七里之郊還從南郊還也封諸侯賞以茅土傳曰賞以春夏刑以秋冬此之謂也通論應氏鏞曰樂記舜作五絃之琴以歌南風夔始制樂以賞諸侯而東郊亦順景風以行賞則封於盛夏古之制也蓋封爵以夏時而出命田邑至秋始割耳要之可以待時而賞者特其功之常其非常者自不容緩司馬法所謂賞不踰時者也陸氏佃曰於天子言無不欣説於相言無有不當亦立言之法存疑鄭氏康成曰古者于禘也發爵賜服順陽義也于嘗也出田邑發秋政順陰義也今此行賞可也而封諸侯則違於古封諸侯出土地之事於時未可似失之乃命樂師習合禮樂淮南子作修禮樂饗左右正義髙氏誘曰禮所以經國家定社稷利民人樂所以移風易俗蕩人邪心存人正性故使習合之存疑鄭氏康成曰為將飲酎孔氏穎達曰不言是月因上文至必當其位皆立夏日處分辨正張氏虙曰禮樂不可一日廢以時習合非有所為也案禮樂之事無所不該亦斯須不去於此命之亦以順陽氣耳豈專以飲酎一事哉孔謂命于立夏日無據命大尉贊桀俊遂賢良舉長大行爵出祿必當其位當去聲舉長大淮南子作舉孝弟必當其位淮南子作佐天長養正義鄭氏康成曰贊猶出也桀俊能者也遂猶進也三王之官有司馬無大尉秦則有之爵祿當位使順之也王氏肅曰長大形貌壯大者髙氏誘曰贊白也遂達也材過千人為俊萬人為傑有賢良長大之人皆自達舉用之故齊桓公命鄉有孝於父母聰慧質直仁秀出于衆者則以告有不以告謂之蔽賢而罪之此之謂也孔氏穎達曰桀俊謂多才藝賢良謂有德行方氏慤曰大尉古司馬司馬政官命之取人取人將以為政王制司馬辨論官材亦此意也贊之遂之舉之不可以虛拘故繼以行爵出祿爵必當其德之位祿必當其功之位也徐氏師曾曰長大以力言王制云執技論力是也存疑馬氏睎孟曰桀者其才特俊者敏於德佐上利下宜為臣者賢志于善者良體仁而能元者長篤實而有光輝者大也胡氏銓曰長大學長而德大存異孔氏穎達曰中候握河紀舜為大尉是堯時置之三王不置案唐虞官制具見虞書無大尉名桀俊之桀唐月令作傑長大若如馬胡之説則亦桀俊賢良也不如王説是月也繼長增髙毋有壞墮毋起土功毋發大衆毋伐大樹壞音怪墮隳通許規反正義鄭氏康成曰毋壞墮為逆時氣也毋起土功發大衆為傷蠶農之事也毋伐大樹亦為逆時氣也髙氏誘曰繼長增髙無有壞墮象陽長養物也毋起土功毋發大衆毋伐大樹皆所以順陽氣也孔氏穎達曰繼長增髙王者施化當繼續長養之道而勸民種植長養增益髙大之物也馬氏睎孟曰萬物所以長而髙者陽上達故也長之髙之者天地繼之增之者人故曰人終天地之功也欲其長則勿壞欲其髙則勿墮起土功發大衆伐大樹皆所以壞墮之也張氏虙曰當夏之時物無不長無不髙也勿使有壞是繼之勿使有墮是增之也土功一起築城鑿池能無壞墮乎大衆一發車徒征行能無壞墮乎若伐大樹則壞墮又甚矣皆所當戒也徐氏師曾曰起土功發大衆則妨農桑之事伐大樹則傷條逹之氣故皆禁之存疑鄭氏康成曰繼長增髙謂草木盛蕃廡案長髙所該甚廣鄭謂草木未該是月也天子始絺正義鄭氏康成曰初服暑服髙氏誘曰絺細葛也通論方氏慤曰絺涼以禦暑裘溫以禦寒孟夏暑之始也故言始絺孟冬寒之始也故言始裘張氏虙曰夏葛冬裘天下之常惟天子尤以順時為道也命野虞出行田原為天子勞農勸民毋或失時命司徒循行縣鄙命農勉作毋休于都行為勞並去聲正義鄭氏康成曰重敕之急趨於農也縣鄙鄉遂之屬主民者也孔疏遂人職五家為鄰五鄰為里四里為酇五酇為鄙五鄙為縣此舉遂以包鄉故鄭兼云鄉也今月令休為伏王居明堂禮曰毋宿于國髙氏誘曰野虞位卑故命之出行田原曰為天子者見天子留意於農野虞之行如天子親勞然也司徒位尊命之循行縣鄙都者人情所樂居命農勉作以趨時在田而不在都也方氏慤曰野虞外官故曰出司徒內官故曰循農亦民也而民不止農欲農營其事之勞也故勞之欲民趨其事之樂也故勸之皆欲無失其時而已都者君子之所居鄙者野人之所居力耕養人野人之事禁之毋休于都則于農不能無所強矣故曰勉案勤者勞之惰者勸之曰農曰民互文爾馬氏睎孟曰彼欲為而我道之者勸也非其志而我強之者勉也黃氏震曰夏則農居田間之廬舍冬則歸都邑之居彭氏廉夫曰命野虞又命司徒尊卑勸飭殷勤之至也是月也驅獸無害五穀毋大田獵正義鄭氏康成曰為傷蕃廡之氣也髙氏誘曰毋大田獵為夭物也方氏慤曰四時之田夏曰苖以其為苖除害而已故曰毋大田獵若秋獮冬狩則為大矣張氏虙曰五穀正長獸或害之不得不驅重其所當重然不敢多殺以傷長氣也農乃登麥天子乃以彘嘗麥先薦寢廟正義鄭氏康成曰登進也麥之新氣尤盛以彘食之散其熱也彘水畜髙氏誘曰麥始熟故言嘗彘水畜夏所宜食也先薦寢廟孝之至也胡氏銓曰君子一食不敢忘其親通論方氏慤曰以彘嘗麥以水勝火也仲夏以雛嘗麥者以木生火也仲秋以犬嘗麻以金勝木也季秋以犬嘗稻以金勝金也夫勝所以治之生所以養之合所以和之故食齊得其宜焉是月也聚畜百藥靡草死麥秋至斷薄刑決小罪出輕繫斷丁亂反麥秋至句當在農乃登麥上呂氏春秋作靡草死斷薄刑無決小罪二句淮南子無斷薄刑三句正義鄭氏康成曰聚畜百藥為蕃廡之時毒氣盛也靡草舊説薺葶藶之屬孔疏葶藶之屬枝葉靡細故云靡草因無正文故引舊説眀之出輕繫崇寬也蔡氏雍曰百穀各以其初生為春成熟為秋髙氏誘曰陽氣極故藥草成微陰已伏于下故斷薄刑決小罪以應之也輕繫不及于刑者故出之方氏慤曰周官醫師掌聚毒藥藥之采不必皆在孟夏而蕃廡之時可采者為多凡物感陽而生者強而立感陰而生者柔而靡靡草至陰所生故不勝至陽而死也凡物生於春長於夏成於秋而麥獨成于夏故言麥秋以於麥為秋也刑主國言罪主人言方正陽之月於陰事未宜大有所施故止及薄刑小罪也陸氏佃曰斷薄刑決小罪出輕繫是亦仁義所以繼長增髙也且言靡草死麥秋至而後用此亦因時順氣矣徐氏師曾曰此恤刑之事是時天氣始炎恐罪人之繫於圜土者或以鬱蒸而生疾故刑之薄者即斷決之不久繫也罪之小者即決遣之不收繫也繫之輕者即縱出之不復繫也今時熱審減刑即其制存疑鄭氏康成曰祭統曰草乂則墨謂立秋後也刑無輕於墨者今以純陽之月斷刑決罪與毋有壞墮自相違似非胡氏銓曰有大姦惡義在必戮過今日便不可而曰必俟立秋可乎若大姦惡猶可以緩死則盛夏勿論可也案薄刑小罪如鞭作官刑撲作教刑之類本不罹于五刑而姑繫之以待訊者即斷決而出之雖稍示懲終以時當寬大也蠶事畢后妃獻繭乃收繭稅以桑為均貴賤長幼如一以給郊廟之服長上聲正義鄭氏康成曰收繭稅收以近郊什一之稅孔疏載師云近郊十一公桑在國北近郊故知收以近郊之稅也貴賤長幼如一國服同孔疏泉府云凡賒者以國服為之息國服謂國家貢賦服事在上各有等限髙氏誘曰均平也桑多稅多桑少稅少皇氏侃曰外命婦既就公家之桑而養蠶則繭當悉輸于公所以惟稅其繭餘得自入者以其夫當有祭服以助王祭故令繭得自入以供造也孔氏穎達曰以桑為均收稅之時以受桑多寡為賦之均皆什一也貴謂公卿大夫之妻賤謂士之妻長幼謂婦老少馬氏睎孟曰以桑為均上所征者地守而人功之至不至不為增損亦勸其勤而督其惰之術也張氏虙曰周禮內宰職后妃率內外命婦始蠶于北郊以為祭服則蠶于蠶室者內外命婦也后妃因內外蠶事之畢以其繭獻于天子當季春蠶事之興天子薦鞠衣以求福今蠶事既畢后獻于天子以告成功禮也徐氏師曽曰季春言蠶事既登要其終而言此則正終之以給郊廟之服無敢私用敬之至也存疑鄭氏康成曰后妃獻繭內命婦獻繭于后妃也孔疏知非后妃獻繭于王者祭義云世婦卒蠶奉繭以示于君遂以獻於夫人是夫人不獻繭知后亦不獻也收繭稅者收于外命婦孔疏知専收于外命婦者以內命婦既已獻繭也外命婦雖就公桑蠶室而蠶其夫亦當有祭服以助祭收以近郊之稅孔氏穎達曰既是官家之桑繭應全入於己所以有稅者以其夫祭服官家所給故輸繭以供造之存異張氏虙曰貴賤長幼如一什一則皆什一什二則皆什二也辨正胡氏銓曰經言后妃獻則獻于王矣鄭據祭義謂夫人不獻則后不獻案天子尊於后妃若諸侯與夫人體敵也不可以為比又祭義云世婦獻繭于君則夫人不獻可也此不云世婦獻繭於天子則后自獻無疑矣鄭又謂收外命婦繭稅案內宰職后妃帥外內命婦蠶則繭稅亦內外均何必外命婦案本文眀言后妃獻繭則獻之者后妃矣胡氏説是也國語云命婦成祭服則皇氏謂其妻供造得之而孔謂官家所給非也內命婦若九嬪世婦則其繭悉輸於后若內宗之女及兄弟之妻則各供其夫之祭服但收繭稅耳耕者之稅什一則桑者之稅必無什二張説尤非是月也天子飲酎用禮樂酎直又反正義鄭氏康成曰酎之言醇也謂重釀之酒也春酒至此始成與羣臣以禮樂飲之於朝正尊卑也孟冬云大飲蒸此言用禮樂互其文孔疏明孟冬亦當用禮樂髙氏誘曰酎春醖也詩為此春酒以介眉壽通論孔氏穎達曰此在朝若漢嘗酎及春秋見於嘗酎則皆於廟與此別馬氏睎孟曰左傳見于嘗酎與執膰焉則在廟之酎漢酎祭獻金亦在廟也豳詩為此春酒躋彼公堂則在朝之酎此亦宜在朝也方氏慤曰冬大飲亦用禮樂而于此特言之以用之于是為盛故也存疑胡氏銓曰食貨志酎飲酒亦於廟不言獻酎祭廟而云飲者蓋夏月時祭用酎常祭也祭畢則飲故不云獻案南北郊及四時廟祭月令皆不見則此謂飲可也謂因祭而飲亦非也孟夏行秋令則苦雨數來五穀不滋四鄙入保行冬令則草木蚤枯後乃大水敗其城郭行春令則蝗蟲為災暴風來格秀草不實數音朔蝗音皇又淮南子下有四月官田其樹桃正義鄭氏康成曰行秋令則申氣乘之行冬令則亥氣乘之行春令則寅氣乘之也苦雨白露之類時物得雨傷故不滋鄙界上邑小城曰保皆金氣為害也蝗蟲為災者寅有啓蟄之氣行於初暑則當蟄者大出矣格至也不實氣更生之不得成也髙氏誘曰孟夏盛陽而行金氣故苦雨殺穀而不滋四境之民畏寇賊之來而入城郭以自保守也行冬寒固閉之令故草木蚤枯而水來敗郭姦時逆行之徵也行春時啓蟄之令故蝗蟲敗穀木氣多風故暴疾之風應氣而至使當秀之草不成方氏慤曰雨謂之苦以極備而為人所苦也與詩所謂甘雨異矣夫雨所以滋穀而苦則反傷之故不滋鄙邑之在外者保城之在內者人自外入內為安象秋氣之斂藏故也感肅殺之氣故蚤枯大水冬之盛德所在也春木盛故蝗殘其末不實亦榮於末也陳氏澔曰行秋令為申金所泄冬令為亥水所傷春令為寅木所淫也仲夏之月日在東井昏亢中旦危中亢音剛一音抗夏小正五月參則見時有養日初昏大火中日在東井淮南子作招搖指午正義鄭氏康成曰仲夏者日月會於鶉首孔疏鶉首未次之號而斗建午之辰也髙氏誘曰東井南方宿秦之分野孔氏穎達曰五月五日午萼也蕚布于午三統厯五月五日日在井十六度昏氐二度中旦室三度中五月中日在井三十一度昏房二度中旦奎十一度中元嘉厯五月五日日在井三度昏角十度中旦危九度中五月中日在井十八度昏氐五度中旦室五度中案日躔當以節氣為定五月五日其節氣淺深不可知安能定日躔案此謂芒種後三十日也東井一名天井南方木宿八星狀如井字故謂之井廣三十四度月建午而日在未午與未合也亢東方金宿四星狀如彎弓廣九度危北方陰宿三星中曲而東廣十六度唐月令作五月之節日在參昏角中曉危中斗建午位之初五月中氣日在東井昏亢中曉營室中斗建午位之中通書芒種日在畢十四度夏至日在井一度今時憲書芒種日在畢九度夏至日在觜九度鶉首古法初井十六度終栁八度今法初觜十度終井二十七度其日丙丁其帝炎帝其神祝融其蟲羽其音徵律中蕤賓蕤人誰反正義鄭氏康成曰蕤賓者應鍾之所生三分益一長六寸八十一分寸之二十六仲夏氣至則蕤賓之律應周語曰蕤賓所以安靜神人獻酬交酢漢志蕤繼也賓導也陽始導陰使繼養陽也髙氏誘曰陰氣萎蕤在下如主人陽氣尊重在上如賓客也何氏胤曰是月乾陽反於下為復坤隂生于陽中為姤隂生為主陽謝為賓賓主之象禮既獻酢又酬之陰陽代謝之義也韋氏昭曰五月蕤賓乾九四也管長六寸二分朱子曰蕤賓律長六寸二分八釐陳氏詳道曰蕤賓午律陽至午則始衰也草木蕤矣隂用事而陽為賓焉通論陳氏祥道曰由殷以前音不過五至武王伐殷歲在鶉火月在天駟日在析木之津辰在斗柄星在天黿自鶉及駟七列南北之揆七同于是增變宫變徵為七音應鍾變宫隂之終蕤賓變徵隂之始應鍾變隂而將之陽蕤賓變陽而方至陰也存疑王氏喬桂曰蕤賓得九寸當午之中陽之極也案常反覆蕤賓之義而惕然懼也是時陽德方盛隂氣始萌似陽為主而隂為客然一隂既生則隂在內而為主陽在外而為客矣而陽方喜隂之至見其柔順導而進之而不知由此以前由夬而乾孚號有厲其夬一隂也如此其難由此而後由遁而否姤之女壯履霜堅氷如此乎其危也吾心理欲之幾國家治亂之界皆始于至微伏于不覺而終于莫救可不懼哉其數七其味苦其臭焦其祀竈祭先肺小暑至螳蜋生鶪始鳴反舌無聲螳音堂蜋音郎鶪工役反夏小正有浮遊有殷乃瓜鶪小正作鴂正義鄭氏康成曰皆記時候也螳蜋螵蛸母也鶪博勞反舌百舌鳥髙氏誘曰螳蜋一名天馬一名齕厖兖州謂之拒斧是月隂作于下陽發于上故伯勞鳴傳曰伯趙氏司至者也反舌能辨反其舌變易其聲效百鳥之鳴謂之百舌應隂故無聲孔氏穎逹曰螳蜋一名不方言云潭魯南謂之蟷蠰齊杞東謂之馬穀三河曰螳蜋燕趙曰食厖其子總曰螵蛸爾雅作蜱蛸伯勞鳴將寒之候豳地晚寒故詩曰七月鳴鶪時候異也反舌春始鳴至此稍止蔡云反舌鳴蛙非也蛙正聒耳何云無聲乎方氏慤曰暑極於季夏則此時尚為小矣螳蜋與鶪皆隂類故或感微隂而生或感微隂而鳴百舌之鳴感陽中而發故感微隂而無聲馬氏睎孟曰是月隂慝始作螳蜋生慝見乎形鶪始鳴慝聞乎聲反舌以陽敷而作以隂收而息陸氏佃曰伯勞賊害之鳥應隂氣之動陽氣為仁義隂氣為殘賊也反舌非不鳴特鳴而無聲耳張氏虙曰火流則暑退暑極于火中此時方至也通論陳氏澔曰凡物皆感隂陽而成故得時則鳴失時則廢天子居明堂大廟乘朱路駕赤駵載赤旗衣朱衣服赤玉食菽與雞其器髙以粗正義鄭氏康成曰眀堂大廟南堂當大室也張氏虙曰當午上五月位也案天子向眀而治故正其名曰眀堂即朝諸侯布政令之堂也曰眀堂而又曰大廟者兼祀五帝則祀火德之帝於此也居亦于大廟之大室而不言室室必堂上之後舉堂而室可知也即此大室開其南閉其東西北之户而又為眀堂大廟之大室矣養壯佼佼古卯反正義鄭氏康成曰助長氣也髙氏誘曰壯佼多力之士養之慎陽施也孔氏穎達曰壯謂容體盛大佼謂形容佼好以盛夏長養之時故養之以助長氣也通論方氏慤曰萬物生於春而長於夏故形色如此先王養之使成亦輔相裁成之道也陸氏佃曰大化有四春生夏壯秋老冬死也案朱子移此句入上章與舉長大相屬或謂壯佼者何須又養且壯佼者多矣可遍養乎不知春養幼少夏養壯佼秋養耆老冬飭死事各以時氣分屬之其實孤老待養壯佼原不待養也試思養老四時皆行何必定仲秋一舉則養壯佼雖列其目何必定為之設飲設食乎若此者俱不必以辭害意是月也命樂師修鞀鞞鼓均琴瑟管簫執干戚戈羽調竽笙竾簧飭鍾磬柷敔鞀鼗同鞞音禆竽音于竾音池柷昌六反音祝敔魚呂反音語竾簧呂氏春秋作塤箎正義鄭氏康成曰為將大雩帝習樂也修均執調飭皆治其器習其事髙氏誘曰鞀鞞鼓以節樂故修之琴瑟管簫以宣音故均之干戚戈羽以持麾故言執竽笙塤箎音上和故言調鍾磬柷敔以正樂以和成故飭整之也孔氏穎達曰鞀或為鼗如鼓而小持其柄搖之旁耳還自擊鞞小鼓在大鼓旁應鞞之屬也劉熙釋名云鞉導也以導樂作鞞禆也以禆助鼓節鼓廓也張皮冒之其中空廓廣雅云琴長三尺六寸六分施絃張之大琴謂之離孫炎云聲留離也郭璞云瑟長八尺一寸二十七絃大瑟謂之灑聲變布如灑出也管長尺圍寸併漆之有底賈謂如箎六孔大管謂之簥簫編二十管長尺四寸大簫謂之言干盾也戚斧也戈鉤孑戟羽鳥羽周禮羽舞皇舞之屬是也竽三十六簧笙十三簧列管瓠中施簧管端大笙謂之巢十九簧釋名云竽汙也其中汙空笙生也象物出地所生箎長尺四寸圍三寸一孔上出寸三分名翹廣雅云八孔先鄭云七空釋名云箎啼也如嬰兒啼大箎謂之沂簧橫也橫施管端氣鼓之而為聲鐘空也內空受氣多大者曰鏞磬聲堅罄罄然大者曰毊所以鼓柷謂之止柷如漆桶方二尺四寸深一尺八寸中有椎柄連底撞之令左右擊所以鼓敔謂之籈敔如伏虎背有二十七鉏鋙刻以木長尺櫟之修理其舊均平其聲執摻持營為調調和音曲飭整頓器物也許氏慎曰女媧作簧隨作笙陳氏祥道曰詩言左執簧非笙中之簧也方氏慤曰鞀鞞鼓與鍾磬柷敔其聲質而一故修以治之飭以正之而已琴瑟簫管竽笙箎簧其聲文而雜故必均之使平調之使和也干戚戈羽無聲但執之以待用故言之別如此馬氏睎孟曰簫植簧于枷竽笙植簧于發存疑孔氏穎達曰竽笙之總名也案本文言竽笙箎簧與上下文一例皆以四物為句且於舉笙之下又舉竾然後別舉簧則簧當別為一物許陳諸説得之孔疏以竽總笙未確又案十九物于八音金石絲竹匏革木七音俱備獨缺土音竾簧呂覽作塤箎則土音不缺似可從通論陳氏祥道曰鼓以節之鼗以兆之大鼓謂之鞞爾雅謂之麻以其音槩而長也小鞞謂之鞀爾雅謂之料以其音清而不亂也作堂下之樂必先鼗鼓周禮司馬職王執路鼓尤大旅師執鼙鼓尤小可知儀禮應鼙在阼階西建鼓之東應朔在西階西建鼓之北應朔皆小鼓奏樂先擊西朔而東鼙應之是應朔倡始應鼙和終而應朔以其引鼓又謂之朄儀禮有朔無朄周禮有朄無朔其實一也世本庖羲作瑟五十絃黃帝使素女鼓之哀不自勝乃破為二十五絃具二均聲舊圖雅瑟長八尺一寸廣一尺八寸二十五絃其常用者十九絃餘四絃案疑作六謂之番番者贏也頌瑟長七尺二寸廣尺八寸二十五絃盡用之荀卿曰鳯凰于飛其音若簫簫長尺四寸者二十四管無底而善應故謂之䇾尺二寸者有底而交鳴故謂之筊爾雅大管曰簥以其聲大而髙也小曰篎以其聲小而深也中曰篞以不髙不卑不大不小若土之與水相入也有虞氏下管至周而大備若孤竹之奇禮天神孫竹之衆禮地祗隂竹之幽禮人鬼各從其聲類也周禮笙師教吹笙竽爾雅大笙曰巢小曰和先儒謂笙大十九簧小十二簧竽三十六簧笙長四尺竽長四尺二寸後世和皆十七簧外設二管不定置謂之義管更調則更用由是定制二管於匏中為十九簧韓非子曰竽者五聲之長竽倡則諸樂皆和白虎通曰簫者中呂之氣易説曰簫者夏至之音九寸之管主黃鐘十寸之管應十月廣雅曰箎八孔鄭司農曰七孔不可考也十二辰之大鍾特縣謂之鏞非是則編爾雅中曰剽小曰剗周禮編鍾編磬皆十二為堵二堵為肆堂上一鍾一磬則不編鼓柷謂之止欲戒止于早也鼓敔謂之籈欲修潔於後也命有司為民祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益於民者以祈穀實為去聲雩音余辟音必正義鄭氏康成曰陽氣盛而常旱孔疏四月純陽用事故制月為雩月縱不旱亦雩山川百源能興雲雨者也衆水始所出為百源必先祭其本乃雩雩吁嗟求雨之祭也孔疏周禮女巫凡邦之大災歌哭而請旱是大災歌哭是吁嗟之類注春秋者謂雩逺也逺為百穀求雨自鞀鞞至柷敔皆用為盛樂凡他雩用歌舞而已孔疏女巫旱暵則舞雩百辟卿士古者上公若后稷句龍之類孔疏不云句芒蓐收舉有益于民功之顯者言之春秋傳曰龍見而雩雩之正當是四月周于秋三月中而旱亦修雩禮以求孔疏春秋書秋雩者二十一而因著正雩此月失之矣孔疏夏五月周秋七月也天子雩上帝諸侯以下雩上公周冬及春夏雖旱禮有禱無雩髙氏誘曰名山大川泉源所出非一故言百為民祈雨重之故用盛樂六代之樂皆用也百辟畿內之百縣大夫孔氏穎達曰將欲雩祭先祈祀山川百源為將雩之漸重民之義也既雩之後又命諸侯雩祀古之百辟及卿士等生存能立功有益于人者考異郵説云天子禱九州山川諸侯祭封內大夫禱所食邑山川凡雩必先禱故此經祈祀山川百源始大雩帝也禱者不雩僖公二年冬十月三年春正月夏四月直為禱祭而不雩故穀梁傳曰雩月雩之正也秋大雩非正也冬大雩非正也馬氏睎孟曰山川百源氣之鍾也百辟卿士有功烈于民者也所以為民祈穀者靡神不舉矣徐氏師曾曰此天子雩祀之禮侯國亦有舞雩但殺于天子耳通論陳氏祥道曰禮有先大而後小者異尊卑也祫而後時祭郊而後三望之類是也有先小而後大者致敬文也魯人將有事於上帝必先有事於頖宮晉人將有事於河必先有事于惡池是也此祈祀山川百源然後大雩致敬文之意既雩帝然後雩祀百辟卿士異尊卑之意也龍見而雩常也周禮旱暵則舞雩不言時所以待變也歌哭而請非盛樂也月令于仲夏以盛樂蓋秦制與古異矣方氏慤曰此言大雩帝後言大饗帝雩以祈饗以報也祈必於仲夏以隂生於午為物成之始也報必于季秋以陽窮于戌為嵗功之成也雩不必皆于帝雩于帝然後為大雩饗不必皆于帝饗于帝然後為大饗楊氏曰郊非不用樂以禮為主雩非不用禮以樂為主蓋聲音之號所以詔告于天地之間欲以陰陽之和達神眀也存異鄭氏康成曰雩帝謂為壇南郊之旁雩五精之帝配以先帝也孔氏穎達曰以雩是祭天當從陽位以五天總祭不可偏在四方故知在南郊以春夏秋冬共成嵗功故知雩五精之帝以自外至者無主不止故知以人帝配之大皞五帝配靈威仰五帝案五帝當從蒼赤黃白黑五帝為正鄭注靈威仰等名目從禮緯殊不經又案漢雩壇在龜山沂水之上蓋即曾晳所謂風乎舞雩者馬氏通考以為漢人舉事多即前代舊祀之地是漢乃因魯雩壇舊址為之與所謂南郊之旁異矣然鄭所以謂在南郊之旁者以南郊祭上帝此祭五帝五帝不可居上帝之壇故別為壇其旁然本文止言帝未嘗言五帝安見雩者必靈威仰五帝而配者必伏羲五帝乎詩雲漢篇憂旱也言自郊徂宫上帝不臨后稷不克又言昊天上帝則不我遺父母先祖胡寧忍豫則其壇即南郊其祭即上帝其配即已之先祖眀矣唐貞觀禮雩祀五天帝五人帝五官于南郊恐不若顯慶禮雩祀昊天上帝於圜丘之正也農乃登黍是月也天子乃以雛嘗黍羞以含桃先薦寢廟雛仕于反陳氏澔移是月也字置農乃登黍上正義鄭氏康成曰登進也云嘗黍者不以牲主穀也必以黍者黍火穀氣之主也髙氏誘曰雛春鷚也不言嘗雛而言嘗黍重穀也含桃櫻桃也蔡氏雍曰此時黍新熟今蟬鳴黍是也許氏慎曰黍以暑得名小暑至農遂登黍髙氏誘曰雛新雞也孔氏穎達曰櫻桃先成異于餘物故特記之其實諸果于時亦薦方氏慤曰雛蓋雞也必謂之雛者雞以雛為美也若羊則以大為美配菽食則又曰雞者日之所食為常時之所嘗為暫固不能無貴賤之別也存異孔氏穎達曰孟秋農乃登穀穀黍稷也仲夏新黍未熟猶用舊黍案本文眀言農乃登黍則新黍矣以為舊黍者誤令民毋艾藍以染艾刈通正義鄭氏康成曰為傷長氣也此月藍始可別夏小正曰五月啓灌藍蓼熊氏曰灌叢生也開別此叢生之藍蓼使稀散髙氏誘曰毋艾以染青未成也孔氏穎達曰藍體叢生早別之則多傷此月長大始可分移布散也存異陳氏澔曰藍之色青青者赤之母刈之亦傷時氣也案陳氏説失之迂鑿毋燒灰毋暴布暴步卜反灰呂氏春秋作炭淮南子同今從之正義髙氏誘曰毋燒炭草木未成也不欲夭物是月炎氣盛猛布暴則脆傷之徐氏師曽曰毋燒炭不伐薪也存疑陸氏佃曰帛陰也布陽也湅陰也暴陽也養陽貴適其中雖不燒灰亦不暴布張氏虙曰此二事亦為染而發考工記㡆氏湅帛以欄為灰言以欄木之灰漸釋其帛又曰晝暴諸日則布亦必暴矣而曰毋者燒灰暴布則耗傷陽氣不欲張而用之也存異鄭氏康成曰毋燒灰為傷火氣也火之氣於是為盛火之滅者為灰毋暴布不以陰功干太陽之事案呂氏春秋作毋燒炭與後乃伐薪為炭相對文義甚眀暴布陸張説可參鄭説似未確門閭毋閉關市毋索正義鄭氏康成曰順陽敷縱不難物也髙氏誘曰門城門閭里門也毋閉民順陽氣布散於外也關要塞市人所聚毋索不征稅也孔氏穎達曰商旅或隱藏其物以避征稅者是月從長之時故不搜索馬氏睎孟曰毋閉利宣也毋索不恃察以窮民隱也朱氏申曰毋閉欲居者之得其涼毋索欲行者之得其利陳氏澔曰毋閉一順陽氣之宣通一使暑氣之宣散毋索當時氣盛大之際人君亦當體之而行寬大之政也挺重囚益其食正義鄭氏康成曰挺猶寬也髙氏誘曰挺緩也孔氏穎逹曰益其食皇謂增益囚之飯食義當然熊謂益羣臣祿食非也方氏慤曰挺其囚猶在所繫故益其食焉馬氏睎孟曰不以其罪廢不忍人之政也張氏虙曰恐以瘐死傷助長氣也陳氏澔曰挺者拔出之義重囚禁繫嚴密故特加寬假輕囚不如是也遊牝別羣則縶騰駒班馬政正義鄭氏康成曰別羣孕妊之欲止也縶騰駒為其牝氣有餘相踶齧也馬政謂養馬之政教廋人職曰掌十有二間之政令以阜馬佚特教駣攻駒此之謂也孔疏校人職云天子十二間諸侯六間大夫四間每間馬二百一十六匹馬二嵗曰駒三嵗曰駣阜盛壯也佚用之不使甚勞教始乘習之攻駒制其踶齧者髙氏誘曰是月牝馬懷妊己定故別其羣方氏慤曰言駒不言犢以牛性順無事乎縶之也馬政若周官趣馬簡其節巫馬治其疾校人辨其屬廋人掌其間以及圉師之所教圉人之所養皆是朱氏申曰班分布也通論方氏慤曰馬火畜馬政於夏班之宜矣周官馬政皆列於夏官亦此意也于季秋又言之者夏主養秋主御養于夏然後成於秋而可御也案夏小正頒馬傳曰分夫婦之駒納之則法也蓋牛馬皆感春生之氣而交故合纍牛騰馬同月而牛生差早馬必十二月乃生至此則馬所妊之駒生矣故於駒之騰者縶之使調習也不言牿童牛牛之生多不待此月者且馬為戎備重之故特言之是月也日長至陰陽爭死生分君子齊戒處必掩身毋躁止聲色毋或進薄滋味毋致和節耆欲定心氣百官靜事毋刑以定晏陰之所成齊齋同處上聲和去聲刑呂氏春秋淮南子皆作徑正義鄭氏康成曰爭者陽方盛陰欲起也分猶半也掩隱翳也躁猶動也今月令毋躁為欲靜進猶御見也節耆欲定心氣微陰扶精不可散也毋刑謂罪罰之事不可以聞晏安也陰稱安髙氏誘曰至極也晝六十五刻夜三十五刻晝之長極矣隂氣始起于下盛陽強蓋其上故爭掩深也止節之薄猶損也靜事毋徑言當精詳而後行也孔氏穎達曰死生分蔡云感陽氣長者生感陰氣成者死也君子謂人君已下至在位士也齊戒所以敬導萌陰也處不顯露又不躁動恐干陰以安之也歌樂華麗之事為助陰靜故止之既止聲色故嬪房不得進御侍夕亦為微隂始動不可動於隂事也滋味和調氣味殊異他時可食此時傷人凡此皆清靜止息之事所以正定身中安隂之所成就也方氏慤曰陰陽爭者此隂方來與陽遇仲冬陽方來與隂遇也陽主生隂主死微隂既生則萬物向乎死矣故死生之理於是分也君子以陰陽方爭故潔誠居內退聽以待其定暑為躁寒靜故於暑時特以毋躁戒之止聲色欲其視聽之專也進進御也方解緩之時慮搖其精故戒之主物言曰滋主人言曰和厚滋味而致和或昏憒其志意也嗜發乎外欲動乎內皆主於心故節嗜欲乃以定心氣也靜事毋刑不欲動而有為也刑雖隂之事然用刑則動而有為矣故亦戒之陽造始而為早陰代終而為晏始以生之終以成之故曰成應氏鏞曰晏安也安靜之隂也陽生固貴乎安靜而陰德本靜尤不可有所擾也案言毋刑者陽為德陰為刑也呂覽淮南子皆作毋徑言無任意妄為其義為確通論徐氏師曾曰聖人扶陽抑隂則安靜以養微陽可也今養微隂何歟曰天地不能純陽無陰人身亦然隂陽所以當交養也存疑孔氏穎逹曰冬至圜丘夏至方澤皆有樂故知止聲非也吳氏澄曰晏爾雅云柔也凡內而掩身外而靜事皆是順時保養以安定初生之柔隂使漸至完成而無所虧傷辨正朱子曰止聲色蓋亦處必掩身毋躁之義若以正樂言則拘矣月令之説固多有未安而注以此為非則失其指案君子無故不去琴瑟豈有審一定和之樂亦不一御五服五章之色亦不一覩者哉此聲色乃指可以淫心蕩志者耳鹿角解蟬始鳴半夏生木堇榮堇音謹又蟬始鳴夏小正作良蜩鳴又有唐蜩鳴正義鄭氏康成曰又記時候也半夏藥草木堇王蒸也髙氏誘曰蟬以翼鳴木堇朝榮暮落是月榮華可用作蒸雜記謂之朝生一名蕣詩顔如舜華孔氏穎逹曰爾雅椵木槿櫬木槿郭云二名可食或呼為日及方氏慤曰鹿好羣而相比陽類故夏至感隂生而角解麋多欲而善迷隂類故冬至感陽生而角解言木堇別於堇草也以感微隂而榮故朝榮暮隕張氏虙曰鹿山獸麋澤獸山髙而澤卑鹿受髙燥之氣必資于陰麋受卑濕之氣必資于陽故其角生新而解舊也朱氏申曰蟬隂類感隂生而始鳴半夏陽氣上而隂已生木堇隂氣兆而陽不固也徐氏師曽曰鹿以陽為體以隂為末角末也故應陰而隕盧氏翰曰蟬兩翼喙長在腹下或以為無口以脅鳴有數種蜩螳皆大􅘪蠽螿皆小案鹿陽獸牡曰麚牝曰麀子曰麛有力曰角初生而赤曰茸不數日即成角骨之易長莫過于此夏至角脫盛陽之感微隂也蟬最大曰蝒青小曰蠽有文曰蜻五采曰螳楚名蜩宋名蝘陳鄭名蜋蜩齊魯名螇螰關東名蜒蚞先伏土中脫穢而出謂之蟬蛻見日則鳴日陰則止夏小正云良蜩鳴匽之興五日翕望乃伏蓋匽即蝘其興也以五日翕合也十五日曰望合望之日乃死曰興者不見其生曰伏者亦不見其死也其始鳴微隂喜附盛陽也半夏實圓色白其性燥烈感陽盛放生木堇朝榮暮萎與蜉蝣之朝生暮死同月皆微陰之喜附盛陽故不可久也是月也毋用火南方正義鄭氏康成曰陽氣盛又用火于其方害微陰也髙氏誘曰為太揚火氣也方氏慤曰夏火旺之時南方火旺之地旺而又旺則其氣太盛而害微隂之生矣朱氏申曰隆者不可復益也可以居髙眀可以逺眺望可以升山陵可以處臺榭正義鄭氏康成曰順陽在上也髙明謂樓觀也闍者謂之臺有木者謂之榭髙氏誘曰積土四方而髙曰臺加木曰榭皆所以順陽而宣眀之孔氏穎逹曰李巡云有大殿無室曰榭郭云若今之堂隍方氏慤曰居髙眀乃可逺眺望山陵自然髙明之所臺榭人為髙明之所臺榭亦必升而言處不若山陵之不可久居也順陽在上故居處如此張氏虙曰言可以者惟仲夏為宜也眺望可逺或困目力山陵可升或有嵐障臺榭可處或避髙寒則亦有時不宜矣仲夏行冬令則雹凍傷穀道路不通暴兵來至行春令則五穀晚熟百螣時起其國乃飢行秋令則草木零落果實早成民殃於疫螣音特又果實吕氏春秋作果蓏淮南子下有五月官相其樹榆正義鄭氏康成曰行冬令則子氣乘之行春令則卯氣乘之行秋令則酉氣乘之也陽為兩陰起脅之則凝為雹盜賊攻劫亦雹之類也五穀晚熟生日長也螣蝗之屬言百者明其類衆八月宿直昴畢為天獄主殺果實早成生日短也民殃于疫大陵之氣來為害也髙氏誘曰冬寒冰凍故雹冬陰閉藏故不通春生育故五穀晚熟百螣動股之屬兖人謂蝗為螣蟲害稼故國飢有核曰果無核曰蓏行秋成熟之令故草木零落而果蓏早成非其時氣故疫朱氏申曰草木零落秋氣肅物也果實早成秋氣成物也彭氏廉夫曰道路不通盜賊阻也暴兵即盜賊皆陰氣攻陽之故夏行春令則五穀之熟傷於太遲夏行秋令則果實之成傷於太早疫金火之相干也陳氏澔曰行冬令為子水所傷行春令為卯木所淫行秋令為酉金所讐也徐氏師曽曰百螣言多也春氣盛於末故蟲食葉案雹陰脅陽故雹中虛凍陰奪陽故凍上實不通冬閉塞也暴兵水戰火陰戰陽也朱子云食葉曰螣今俗名蟥雨下日中附苖成質絲網葉上食葉盡而遇西風則化為虻蓋卯中房星主蠶氣亂故為螣也酉有大陵積尸之氣故疫欽定禮記義疏卷二十二
