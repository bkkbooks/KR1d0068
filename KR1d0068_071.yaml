body:
  text: 閒𫝊第三十七正義孔氏穎逹曰案鄭目録云名曰閒𫝊者以其記喪服之閒輕重所宜此於别録屬喪服存疑吳氏澄曰或曰閒當讀為閒厠之閒此篇總論喪禮哀情之發見非釋經之正𫝊而厠於喪服之正𫝊者也故名閒𫝊去斬衰何以服苴苴惡貌也所以首其內而見諸外也斬衰貌若苴齊衰貌若枲大功貌若止小功緦麻容貌可也此哀之發於容體者也苴七余反見賢遍反齊音咨衰音催枲思里反正義鄭氏康成曰有大憂者面必深墨止謂不動於喜樂之事枲或為似孔氏穎逹曰此明居喪外貌輕重之異苴是黎黑色故為惡貌大功轉輕心無斬刺故貌不為之變又不為之傾平停不動若止於二者之閒衰因煆布帶屨亦輕其絰色用枲同者自别表義耳方氏慤曰苴子麻以之為布凡物精為美粗為惡故曰苴惡貌也蓋孝子之情在內者既極其哀則形於外也亦為之不美故斬衰則服苴以表之故曰所以首其內而見諸外以其所表如此而貌亦宜如之故曰斬衰貌若苴枲亦苴也蓋謂牡麻耳其為布稍精於子麻上言斬衰服苴則知齊衰而下服枲矣且齊衰既以緝而齊其下為義則其服緝之枲固亦宜矣其服如此貌亦宜如之故曰齊衰貌若枲以其哀既殺於斬衰故貌不如苴之惡也馬氏睎孟曰先王因哀以制禮則禮有隆殺因禮以見哀則哀有小大凡喪事以哀為主閒𫝊一篇言哀者六自斬衰以至緦麻輕重等差莫不有當其始也本於哀其終也成於禮有是哀則不得不行是禮有是禮則不得不致是哀也然而容體聲音言語動乎內者也飲食衣服居處在乎外者也內外俱備哀禮相稱之制可坐而定也吳氏澄曰儀禮經斬衰苴絰杖齊衰牡麻絰𫝊曰苴麻有蕡者牡麻枲也斬衰服苴謂衰裳絰杖並苴色也苴色蒼黑貌之惡似之首其內而見諸外謂內有哀情則外有此惡貌也枲無子麻色亦蒼而黑淺齊衰稍輕於斬衰絰不用苴而用枲若苴若枲貌各如其絰之色也止不動也貌活動者象春之生貌靜止者象秋之殺若止謂有慘戚無歡欣也容貌謂貌如平常之容小功緦麻之服雖輕然情之厚者貌亦略變於常其或不能然而但如平常之容則情不為厚而亦未至於甚薄喪與其哀不足而禮有餘不若禮不足而哀有餘也云可者微不滿之意容體者謂儀容形體之見諸外者也案首當讀去聲表出之謂斬衰之哭若往而不反齊衰之哭若往而反大功之哭三曲而偯小功緦麻哀容可也此哀之發於聲音者也偯于起反說文作㥋正義鄭氏康成曰三曲一舉聲而三折也偯聲餘從容也孔氏穎逹曰小功緦麻其情既輕哀聲從容於理可也方氏慤曰孝經言喪親曰哭不偯故至大功始有偯吳氏澄曰往而不反謂氣絶而不續往而反謂氣絶而微續三曲而偯謂聲不質直而稍文也哀容則聲彌文矣斬衰唯而不對齊衰對而不言大功言而不議小功緦麻議而不及樂此哀之發於言語者也正義鄭氏康成曰議謂陳說非時事也孔氏穎逹曰唯而不對但唯於人不以言辭而對也皇氏以為親始死時雜記曰三年之喪對而不問謂在喪稍久故對也大功稍輕得言他事而不議論時事之是非雜記云齊衰之喪言而不語彼謂言言已事為人說為語與此言異也方氏慤曰唯則順之而已對則有可否焉對則應彼而巳言則命物焉言則直言而巳議則詳其義焉議則主於事而巳樂則通其情焉由其哀有輕重故發於言語有詳略也存疑吳氏澄曰緦麻凡事陳說而議但不議及於作樂歡娛之事耳斬衰三日不食齊衰二日不食大功三不食小功緦麻再不食士與斂焉則一不食故父母之喪既殯食粥朝一溢米莫一溢米齊衰之喪疏食水飲不食菜果大功之喪不食醯醬小功緦麻不飲醴酒此哀之發於飲食者也與音預溢音逸莫音暮食音嗣正義王氏肅曰滿手曰溢案辨詳大記孔氏穎逹曰齊衰二日不食皇氏云謂正服齊衰也喪大記云三不食當是義服齊衰小功緦麻喪大記云一不食再不食則一不食謂緦麻再不食謂小功方氏慤曰三不食則日有半也朱氏申曰斬衰既殯則三日矣故可食粥吳氏澄曰五服皆同姓之骨月哀其死而不食者恩也士乃異姓之朋友與斂其尸而感發哀情亦廢一食者義也喪大記云士之喪士與斂焉則為之一不食父母之喪既虞卒哭疏食水飲不食菜果期而小祥食菜果又期而大祥食醯醬中月而禫禫而飲醴酒始飲酒者先飲醴酒始食肉者先食乾肉禫大感反醯案今本作有醬正義鄭氏康成曰先飲醴酒食乾肉者不忍發御厚味孔氏穎逹曰此明父母終喪以來所食之節大祥食醯醬則小祥食菜果之時但用鹽酪也不能食者得用醯醬醴酒味薄乾肉又澀所以先飲食之吳氏澄曰父母之喪既虞卒哭所食與齊衰既殯後同小祥後所食與大功既殯後同大祥後亦與小功既殯後同禫後飲醴酒則漸復常而飲酒食肉矣父母之喪居倚廬寢苫枕塊不說絰帶齊衰之喪居堊室芐翦不納大功之喪寢有席小功緦麻牀可也此哀之發於居處者也苫始占反塊苦怪反說吐活反芐户嫁反正義鄭氏康成曰芐今之蒲蘋也孔氏穎逹曰此明初遭五服之喪居處之異芐蒲草為席翦頭為之不編納其頭而藏於內也通論孔氏穎逹曰斬衰居倚廬齊衰居堊室論其正耳亦有斬衰不居倚廬者則雜記云大夫居廬士居堊室是士服斬衰而居堊室也亦有齊衰之喪不居堊室者喪服小記曰父不為衆子次於外注云自若居寢是也吳氏澄曰士斬衰不居倚廬乃臣為君服父為衆子齊衰不居堊室乃尊者為卑者服也父母之喪既虞卒哭柱楣翦屏芐翦不納期而小祥居堊室寢有席又期而大祥居復寢中月而禫禫而牀楣音眉正義孔氏穎逹曰此明遭父母喪至終服所居改變之節方氏慤曰柱廬間之楣以為之固故曰柱楣翦廬閒屏蔽之草而飾之故曰翦屏陸氏佃曰言翦屏則前此茅茨不翦柱楣於柱置楣而巳彭氏絲曰倚廬釋見大記柱楣翦屏者謂於倚廬柱楣之閒翦去其所屏之草稍以泥塗之大記所謂既葬柱楣塗廬不於顯者是也期而小祥居堊室則芐草之上有席又期而大祥居雖復殯宫寢猶未備牀至大祥後閒一月而禫禫始有牀也通論陸氏佃曰此期而席居堊室喪服𫝊既虞寢有席既練舍外寢𫝊所記尊者居喪之法此言大夫士禮而已吳氏澄曰既虞卒哭芐翦不納則與齊衰初喪同特居廬為異耳小祥後乃得居堊室也小祥後寢有席則與大功初喪同禫後牀乃與小功緦麻初喪同也案此上數節與喪大記喪服小記雜記所載微異蓋古禮既逺𫝊之者未免各守其師說要其哀戚惻怛之意則無不同也斬衰三升齊衰四升五升六升大功七升八升九升小功十升十一升十二升緦麻十五升去其半有事其縷無事其布曰緦此哀之發於衣服者也去起吕反正義鄭氏康成曰此齊衰多二等大功小功多一等孔疏喪服記止云齊衰四升此五升六升多二等喪服記大功八升若九升此多七升一等小功十升若十一升此多十二升一等服主於受孔疏以喪服父母為主欲文相值故略而不言案斬衰既葬當受以齊衰四升既練受以功衰八升也是極列衣服之差也孔氏穎逹曰此明五服精粗之異有事其縷無事其布曰緦者以三月之喪治其麻縷其細如絲故云緦麻以朝服十五升抽去其半縷細而疏也有事其縷謂煆治其布纑縷也無事其布謂織布既成不煆治其布以哀在外故也方氏慤曰八十一縷為升一服而升數不同者以其有正服降服義服故也所謂喪多而服五者此也通論朱子曰緦十五升抽其半者是一􅱍只用一經如今廣中疏布又如單經黃草布皆只一經也然小功十二升則其縷反多於緦矣又不知是如何賈氏公彥曰案喪服上下十有一章從斬至緦升數有異斬衰有二為父以三升為正為君以三升半為義其冠同六升三年齊衰惟有正服四升冠七升繼母慈母雖是義服繼母以配父故與因母同案慈母以重命不敢降亦與母同是以略為一節有正而巳杖期齊衰父在為母為妻正服齊衰五升冠八升案雜記云十一月而練十三月而祥十五月而禫是也然母則恩愛也妻則義合也雖父尊厭屈禫杖猶申故與三年同正服不杖齊衰期有正有義正則五升冠八升義則六升冠九升齊衰三月皆義服衰六升冠九升曾祖父母應是正服但正服合服小功以尊其祖不敢服小功而服齊衰既非本服故與義服同也殤大功有降有義為夫之昆弟之長殤義也其衰九升餘皆降也衰七升冠十升義服衰九升冠十升大功有降有正義姑姊妹出適之等是降婦人為夫族為義餘皆正也其衰八升又繐衰唯有義服衰四升半冠七升而巳諸侯之大夫為天子故同義服也殤小功有降有義婦人為夫之族類是義衰冠同十二升餘皆降也衰冠同十升成人小功有降衰如殤降有正衰同十一升有義衰同殤義緦布之衰冠降正義也皆同十五升之抽去其半而巳又曰吉服所以表德凶服所以表哀德有髙下章有升降哀有深淺布有精粗存異彭氏絲曰案孔氏說去其半意専指緦朱子謂緦十五升抽去其半則小功十二升其縷反多於緦有所不通蓋此去其半之文雖在緦麻十五升下其實斬齊大小功升數俱是去其半斬衰三升抽其半止百二十縷齊衰四升抽其半止百六十縷以漸至緦十五升抽其半止六百縷凡五服精粗輕重之等無不順序孔氏所云朝服及今所𫝊深衣皆十五升不去半計一千二百縷程子曰古者八十一縷曰升斬衰三升則是二百四十三絲於今之布為巳細緦麻十五升則是千有二百絲今蓋無有矣斬衰三升既虞卒哭受以成布六升冠七升為母疏衰四升受以成布七升冠八升去麻服葛葛帶三重期而小祥練冠縓緣要絰不除男子除乎首婦人除乎帶男子何為除乎首也婦人何為除乎帶也男子重首婦人重帶除服者先重者易服者易輕者又期而大祥素縞麻衣中月而禫禫而纖無所不佩為母之為於僞反重直龍反縓七戀反要一遙反縞古老反纖息亷反正義鄭氏康成曰葛帶三重謂男子也五分去一而四紏之帶輕既變因為飾也婦人葛絰不葛帶孔疏案少儀云婦人葛絰而麻帶又上檀弓云婦人不葛帶故士虞禮曰婦人既練脫首絰不脫帶此謂齊斬婦人帶不變若大功婦人變服亦受葛也易服謂為後喪所變也孔疏身先有前喪重今更遭後喪輕欲變易前喪也婦人重帶帶在下體之上婦人重之辟男子也其為帶猶五分絰去一耳孔疏以婦人斬衰不變帶以其重要故也婦人既重其要恐要帶與首絰粗細相似故云其帶猶須五分首絰去一分耳以首尊於要但婦人辟男子而重要帶爾小記曰除成喪者其祭也朝服縞冠孔疏證祥祭之服非素縞麻衣也此素縞者玉藻所云縞冠素紕既祥之冠麻衣十五升布深衣也孔疏證此經素縞麻衣是大祥後所服謂之麻者純用布無采飾也孔疏若有采飾則謂之深衣深衣篇所云是也緣以素則曰長衣聘禮長衣是也緣以布則曰麻衣此麻衣是也大祥除衰杖黑經白緯曰纖孔疏戴德變除禮也舊說纖冠者采纓也無所不佩紛帨之屬如平常也纖或作綅賀氏循曰斬衰既虞卒哭受以成布六升夫服緣情而制故情降則服輕既虞哀必有殺是故以細代粗以齊代斬耳若猶斬之則非所謂殺也若謂以斬衰命章便謂受猶斬者則疏衰之受復可得猶用疏布乎是以斬衰之名本生於始死之服以名其喪耳不謂終其日月皆不變也孔氏穎逹曰此明父母之喪初死至練冠衰升數之變并明練後除脫之差也成布六升者言三升四升五升之布縷既粗疏未為成布六升巳下其縷漸細與吉布相參故稱成布葛帶三重者既虞卒哭受服之節要中之帶以葛代麻帶又差小於前喪服𫝊云五服絰帶相差皆五分去一以四分見在作四股紏之積而相重四股則三重既變麻用葛因以為飾也未受服之前麻帶兩股相合此直云葛帶則首絰雖葛不三重猶兩股紏之也小祥練冠縓緣者父沒為母與父同也至小祥又以卒哭後冠受其衰而用練易其冠也又練為中衣以縓為領緣也大祥素縞麻衣者謂二十五月大祥祭此曰除脫則首服素冠以縞紕之身著朝服而為大祥之祭祭後哀情未除更反服微凶之服首著縞冠以素紕之身著十五升麻深衣也知用十五升者案雜記云朝服十五升此大祥之祭既著朝服則大祥之後麻衣粗細當同朝服也大祥之後更閒一月而為禫祭二十七月而禫禫而纖者禫祭之時𤣥冠朝服禫祭既訖而首著纖冠身著素端黃裳以至吉祭身著吉服尋常所服之物無不佩也張子曰古者紡績其布當有吉凶二種若三四升之粗及緦繐之細或去縷之半或不事其布或不事其縷不容吉凶二用者皆是特為有喪者設所謂成布蓋事縷事布供世俗常用成功之布但未加灰練耳其功尤粗略者為大功差細者為小功以蜃灰經鍊然後謂之練如此解之則練與成布義自兩安除首者麻葛重雖大功之喪可易三年之練冠舉大功之輕則齊衰可知練冠且去之故言除也或問縓緣朱子答曰縓今淺絳色小祥以縓為緣一入謂之縓禮有四入之說亦是漸漸加深色耳然古人亦不専把素色為凶蓋古人専用皮辨皮辨純白自今言之則為大凶矣方氏慤曰疏衰即齊衰也比功布之升為疏故亦謂之疏斬衰又疏矣然不謂疏衰者以斬之義為重而疏不足以名之故也彭氏絲曰除服先重者即男子先除首婦人先除帶也易服易輕者謂前喪為後喪所變男子得易要帶婦人得易首絰詳見下文吳氏澄曰此明三年之喪初服至終服受變除之節士卒哭後受服降初服三等受冠降初冠一等去麻服葛謂男子去麻首絰服葛首絰去麻要帶服葛要帶女子唯去麻首絰服葛首絰要麻帶如初練後男子首除葛絰要葛帶不除女子要除麻帶首葛絰不除存疑陸氏佃曰檀弓練衣縓緣言其衣矣今言練冠縓緣著冠亦縓緣也玉藻縞冠素紕言其冠矣今言素縞麻衣著衣亦素紕也變素紕言素縞則其紕也以縞之素者也先儒謂深衣純之以布曰麻衣非是案麻至十五升布縷皆治即謂之朝服但朝服緇之不緇即謂之麻衣耳詩言麻衣如雪是也易服者何為易輕者也斬衰之喪既虞卒哭遭齊衰之喪輕者包重者特既練遭大功之喪麻葛重齊衰之喪既虞卒哭遭大功之喪麻葛兼服之斬衰之葛與齊衰之麻同齊衰之葛與大功之麻同大功之葛與小功之麻同小功之葛與緦之麻同麻同則兼服之兼服之服重者則易輕者也麻葛重之重直龍反正義鄭氏康成曰說所以易輕者之義也既虞卒哭孔疏兼言之謂士庶人若大夫已上則虞受服也謂齊衰可易斬服之節也輕者可施於卑服齊衰之麻以包斬衰之葛謂男子帶婦人絰也孔疏言斬衰受服之時而遭齊衰初喪男子輕要得著齊衰麻帶而兼包斬衰之葛帶也婦人輕首得著齊衰麻首絰而兼包斬衰之葛絰也重者宜主於尊謂男子之絰婦人之帶特其葛不變之也孔疏言男子重首特留斬衰麻絰婦人重要特留斬衰要帶也此言包特者明於卑可兩施孔疏卑謂男子卑要婦人卑首兩施謂施於齊衰又得兼斬衰以其輕卑之也而尊者不可二也孔疏尊謂男子尊首婦人尊要故止得尊於重服不可差二兼服輕也既練巳下言大功可易斬服之節也斬衰巳練男子除絰而帶獨存婦人除帶而絰獨存謂之單單獨也遭大功之喪案此謂成服時男子有麻絰孔疏男子首空著大功麻絰婦人有麻帶孔疏婦人要空著大功麻帶又皆易其輕者以麻孔疏男子又以大功麻帶易練之葛帶婦人又以大功麻絰易練之葛絰謂之重麻既虞卒哭案此大功受服時男子帶其故葛帶孔疏以大功葛帶輕於練之葛帶絰期之葛絰婦人絰其故葛絰孔疏大功葛絰輕於練之葛絰故皆反練服帶期之葛帶孔疏謂與期葛帶粗細同其實是大功葛帶也謂之重葛案鄭注引服問絰期之絰句謂斬衰既練絰帶巳除此時遭大功之喪男絰大功之麻絰婦帶大功之葛帶其絰帶粗細與期同耳非服期之絰帶也孔疏自明鄭注須善㑹齊衰之喪巳下言大功可易齊衰期服之節也兼猶兩也不言包特而兩言者包特著其義兼者明有絰有帶耳孔疏麻葛兼服之者即前文輕者包重者特之義今齊衰既虞卒哭遭大功之喪易換輕者故麻葛兼服之卑者可包尊須特著其尊卑之義於斬衰重服言之兼者直云絰帶麻葛兼有故於齊衰輕服言之不言重者三年之喪既練或無絰孔疏男除首絰或無帶孔疏女除要帶言重者以明今皆有孔疏絰帶皆有期已下固皆有矣兩者有麻有葛耳孔疏言男子首與要皆有麻葛婦人亦然葛者亦特其重麻者亦包其輕也孔疏後服之麻與前服之葛粗細同則得服後麻兼服前葛也又竟言有上服既虞卒哭遭下服之差惟大功有變三年既練之服小功已下則於上皆無易焉孔疏服問篇小功緦不得變大功巳上謂成人之喪此言大功之葛與小功之麻同小功之葛與緦之麻同主為大功之殤長中言之服重者謂特之也孔疏服重者前文重者特是也易輕者前文輕者包是也則易輕者則男子與婦人也凡下服虞卒哭男子反其故葛帶婦人反其故葛絰其上服除則固自受以下服之受矣孔疏男子婦人雖易前服之輕至後服既葬之後還須反服其前喪故男子反服其故葛帶婦人反服其故葛絰經文據其後喪初死得易前喪之輕注意則謂服滿還服前喪輕服也孔氏穎逹曰斬衰齊衰既是重服云包云特則知齊衰大功亦包特也兼服之者男子則大功麻帶易齊衰之葛帶其首猶服齊衰葛絰是首有葛要有麻故云麻葛兼服之據男子也婦人則首服大功之麻絰要服齊衰之麻帶上下俱麻不得云麻葛兼服之也云麻葛兼服但施於男子不包婦人云易輕者男子則易於要婦人則易於首男子婦人俱得易輕也呂氏大臨曰輕包重特止為斬既虞遭齊衰之喪而立麻葛重止為斬既練遭大功之喪而立麻葛兼服則為齊既虞遭大功之喪大功既虞遭小功之喪小功既虞遭緦之喪而立麻葛重者其始也以麻變葛案雜記有三年之練冠則大功之麻易之惟杖屨不易麻葛兼服者其輕者變而兼服之案閒𫝊麻同則兼服之服問緦之麻不變小功之葛小功之麻不變大功之葛餘論彭氏絲曰閒𫝊所言易服皆是重喪遭輕喪之禮至於輕喪遭重喪則經文未載今舉一條見例假如初服齊衰之喪又遭斬衰之喪雖除下齊衰冠服别制斬衰冠服雖遇葬母亦服斬衰如遇母虞祔練祥又須著先所除下齊衰冠服俟卒事仍舊著斬衰服凡先遭輕喪後遭重喪者倣此故喪服小記云父母之喪偕先葬者不虞祔待後事其葬服斬衰孔疏云父母俱喪而猶服斬者從重也雖葬母亦服斬衰若為母虞祔練祥皆齊衰卒事反服重陳氏澔曰案檀弓云婦人不葛帶者謂斬衰齊衰服帶不變也喪服大功章男女並陳有即葛九月之文是大功婦人亦受葛也又士虞禮餞尸章注云婦人大功小功者葛帶三年問第三十八正義孔氏穎逹曰案鄭目録云名曰三年問者善其問以知喪服年月所由此於别録屬喪服朱氏申曰三年之喪天下之通喪也故以是名篇三年之喪何也曰稱情而立文因以飾羣别親疏貴賤之節而弗可損益也故曰無易之道也稱尺證反下同别彼列反正義鄭氏康成曰稱情而立文稱人之情輕重而制其禮也羣謂親之黨也無易猶不易也孔氏穎逹曰此記者假設其問立文謂立禮之節文也飾謂章表也五服之親因三年之喪差降各表其親黨親謂大功以上疏謂小功以下貴謂天子諸侯絶期卿大夫降期以下賤謂士庶人服族其節分明不可損益故曰無易之道引舊語成文也案此貴賤即親疏中之貴賤孔疏是陳氏澔曰人不能無群群不能無别立文以飾之則親疏貴賤之等明矣弗可損益者中制不可不及亦不可過是所謂無易之道也治親疏貴賤之節者惟喪服足以盡其詳服莫重於斬衰時莫久於三年故此篇列言五服之輕重而自重者始吳氏澄曰此因問三年并及期九月五月三月諸服輕重之差情謂哀情文謂禮文群謂五服之衆人言五服各稱哀情之輕重而立隆殺之禮文因以表飾五服衆人哀戚輕重之情而分别所為服者之或輕或重與夫服喪者或貴而有絶有降或賤而無降各有品等之節也其親而服重或賤而無降者不可損之而減輕其疏而服輕或貴而有絶有降者不可益之而加重也其弗可輕重者乃一定無可改易之理也通論朱子曰夏商而上大概只是親親長長之意到周又添得許多貴貴禮數如始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟期之喪天子諸侯絶大夫降然諸侯大夫尊同則亦不絶不降此皆貴貴之義上世想皆簡略到周公搜剔出來立為定制更不可易創巨者其日久痛甚者其愈遲三年者稱情而立文所以為至痛極也斬衰苴杖居倚廬食粥寢苫枕塊所以為至痛飾也創音瘡正義鄭氏康成曰飾情之章表也孔氏穎逹曰創大則難愈痛甚者喪親傷腎乾肝斬斫之痛既甚故差亦遲立三年之文以表是至痛極者也吳氏澄曰三年之文斬其衰苴其杖居則在倚廬所食者粥所寢者苫所枕者塊此皆三年喪之外文所以文內情至痛之表飾也此正答重喪三年之義三年之喪二十五月而畢哀痛未盡思慕未忘然而服以是斷之者豈不送死有已復生有節也哉斷丁亂反正義鄭氏康成曰復生除喪反生者之事也孔氏穎逹曰人子於此二十五月之時悲哀摧痛猶未能盡憂思悲慕猶未能忘而外貌喪服以是斷割若不以是裁斷則送死之情何時得已復吉之禮何有限節吳氏澄曰此又言重喪雖名三年實則二十五月蓋二十四月則兩期矣其第二十五月者第三年之月也大祥後除練服去絰杖則喪事畢矣其喪後所服至二十七月禫祭畢而除者此非喪之正服也故喪之正服止於二十五月彭氏絲曰吉服無頓著之理故聖人為是祥服與禫服使之得以從容去凶就吉其實三年之喪二十五月而畢而加此兩月者乃服已殺又能引之使伸於禮在凶與吉之間二十五月者喪之正服也其喪後所服至二十七月者孝子哀情未忘之餘服也凡生天地之閒者有血氣之屬必有知有知之屬莫不知愛其類今是大鳥獸則失喪其群匹越月踰時焉則必反巡過其故鄉翔回焉鳴號焉蹢躅焉踟蹰焉然後乃能去之小者至於燕雀猶有啁噍之頃焉然後乃能去之故有血氣之屬者莫知於人故人於其親也至死不窮喪息浪反號音豪啁張留反噍子流反知音智正義鄭氏康成曰匹偶也言燕雀之恩不如大鳥獸大鳥獸不如人含血氣之類人最有知而恩深也於其五服之親念之至死無止已將由夫患邪淫之人與則彼朝死而夕忘之然而從之則是曾鳥獸之不若也夫焉能相與羣居而不亂乎與平聲曾音層焉音煙為去聲正義鄭氏康成曰言惡人薄於恩死則忘之其相與聚處必失禮也吳氏澄曰患猶病也謂有邪僻淫溺之病將由夫修飾之君子與則三年之喪二十五月而畢若駟之過隙然而遂之則是無窮也過音戈正義鄭氏康成曰駟之過隙喻疾也遂之謂不時除也孔氏穎逹曰駟馬峻疾空隙狹小以峻疾過狹小急速之甚朱氏申曰遂其心之所欲則無除喪之期也案修飾謂修其飾羣之道故先王焉為之立中制節一使足以成文理則釋之矣為去聲正義鄭氏康成曰立中制節謂服之年月也釋猶除也去也孔氏穎逹曰立中人之制以為年月限節一謂齊同三年一閏天道小成子生三年免於父母之懷故服以三年成文章義理案相交曰文各别曰理先王憂邪淫者必忘親修飾者且滅性故酌人情之中制一定之節使相交足以成文相辨足以成理然則何以至期也曰至親以期斷期音基下同斷丁亂反正義孔氏穎逹曰此明一期可除之節存疑鄭氏康成曰言三年之義如此則何以有降至於期也期者謂為人後者父在為母也答言服之正雖至親皆期而除也孔氏穎逹曰言為父母本應三年何故為人後者為本生父母及父在為母而止於期為至親本以期斷故雖為他後及父在為母但以期也辨正孔氏穎逹曰經意父母本應三年何以至期有應除之義故答曰至親以期斷是明一期可除之節故禮期而練男子除絰婦人除帶下文云加隆故至三年是經意不據為人後及父在為母期鄭之此釋恐未盡經意是何也曰天地則已易矣四時則已變矣其在天地之中者莫不更始焉以是象之也正義鄭氏康成曰法此變易可以期也孔氏穎逹曰言期時天地之中動植之物無不於前事之終更為今事之始聖人以人事法象天地故期年也案此言三年喪既練則首絰要帶因時變除有更始之象焉故親喪降期由此義而起也然則何以三年也曰加隆焉爾也焉使倍之故再期也正義鄭氏康成曰言可以期何以乃三年為蓋於父母加隆其恩使倍期也下焉猶然孔氏穎逹曰焉猶然也言子既加隆於父母故然使倍之由九月以下何也曰焉使弗及也正義鄭氏康成曰言使其恩不若父母孔氏穎逹曰然使恩隆不及於期也五月不及九月三月不及五月轉相不及也案此因三年喪而明五服之制不言期上已明也故三年以為隆緦小功以為殺期九月以為閒上取象於天下取法於地中取則於人人之所以羣居和一之理盡矣殺色界反正義鄭氏康成曰取象於天地謂法其變易也自三年以至緦皆歲時之數也言既象天地又足以盡人聚居純厚之恩也孔氏穎逹曰隆謂恩愛隆重殺謂情理殺薄閒是隆殺之閒三年一閏是三年取象於一閏天地一期物終是一期取象於一周九月象陽數又象三時而物成也五月象五行三月象天地一時而氣變此五服之節皆取法天地也子生三年免於父母之懷故服三年人之一歲情意改變故服一期九月五月三月之屬亦逐人情而減殺是中取則於人取法天地與人三才並備故能調和羣衆聚居和諧専一義理盡備矣陳氏澔曰期與大功在隆殺之閒故云以為閒和以情言謂情無不睦也一以禮言謂禮無不至也案此總申上五服之制之義故三年之喪人道之至文者也夫是之謂至隆正義鄭氏康成曰言三年之喪喪禮之最盛矣孔氏穎逹曰此重明三年之義言於人道之中至極文理之盛人恩之至極隆厚也是百王之所同古今之所一也未有知其所由來者也正義鄭氏康成曰不知其所從來喻此三年之喪前世行之久矣孔氏穎逹曰言三年之喪行之自逺不知自何代而來也案易繫辭曰古之葬者厚衣之以薪葬之中野不封不樹喪期無數尚書云百姓如喪考妣三載此云不知所由來者但不知定在何時唐虞以前喪服與吉服同皆以白布為之故郊特牲云大古冠布齊則緇之若不齊則皆用白布至三代吉凶異也孔子曰子生三年然後免於父母之懷夫三年之喪天下之逹喪也正義鄭氏康成曰逹謂自天子至於庶人馬氏睎孟曰中庸曰期之喪逹乎大夫三年之喪逹乎天子父母之喪無貴賤一也然而世衰道微狃於習俗故雖宰我親受業於孔門猶以期可巳為問蓋人情之大不美也禮之所載三年問者豈亦當時之人疑此為重與故曰凡天地之閒有血氣之屬大至於鳥獸小至於燕雀莫不知愛其類又況於人乎其曰三年之喪人道之至文百王之所同古今之所一則為此書者亦有為而作也欽定禮記義疏卷七十一
