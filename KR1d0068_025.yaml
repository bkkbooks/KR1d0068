body:
  text: 月令第六之六孟冬之月日在尾昏危中旦七星中夏小正初昏南門見時有養夜織女正北鄉則旦日在尾淮南子作招搖指亥正義鄭氏康成曰孟冬者日月會於析木之津孔疏析木寅次之號而斗建亥之辰也髙氏誘曰尾東方宿燕之分野孔氏穎達曰冬中也陽氣在中也或曰冬終也四時之終也於月建亥亥該也該闔於亥三統厯十月節日在尾十度昏危十四度中旦翼初度中十月中日在箕七度昏室十度中旦軫五度中元嘉厯十月節日在心二度昏危一度中旦張八度中十月中日在尾十二度昏危十三度中旦翼八度中案此謂立冬後三十日也十月為陽月於卦為坤嫌於無陽故特以陽名之月建亥而日在寅亥與寅合也唐月令十月之節日在房昏虛中曉張中斗建亥位之初十月中氣日在尾昏危中曉翼中斗建亥位之中通書立冬日在氐五度小雪日在房三度今時憲書立冬日在氐二度小雪日在房初度古法析木初尾十度終斗十一度今法初房一度終箕一度其日壬癸淮南子上有其位北方正義鄭氏康成曰壬之言任也癸之言揆也日之行東北從黑道閉藏萬物月為之佐時萬物懷妊於下揆然萌芽又因以為日名焉孔氏穎達曰律厯志懷妊於壬陳揆於癸陳氏祥道曰壬數六癸數五同於為水為智張氏虙曰壬癸屬冬以冬盛德在水也其帝顓頊其神玄冥正義鄭氏康成曰此黑精之君水官之臣自古以來著德立功者也顓頊髙陽氏也玄冥少皥氏之子曰修曰熙張氏虙曰漢魏相傳北方之神顓頊乘坎執權而司冬顓之言專也隂盛則靜而專頊之言正也冬氣升而其位正故帝曰顓頊春為蒼天知冬為玄南為明方知北為冥故神曰玄冥彭氏廉夫曰水北方玄深而冥昧故取為神之名主冬而位北案顓頊天水德之帝玄𡨕天水氣之神髙陽與修熙則人帝人官之配食於此者也其蟲介正義戴氏德曰介蟲三百六十而龜為之長鄭氏康成曰介甲也象物閉藏地中龜鱉之屬髙氏誘曰象冬閉固皮漫胡也朱氏申曰冬則後而智介蟲屬焉以其性辨也吳氏澄曰北方斗牛女虛危室壁七宿有龜之象故凡物之甲者皆屬水盧氏翰曰北方玄武七宿水屬其類為介故冬則其蟲介其音羽律中應鍾正義鄭氏康成曰三分商去一以生羽羽數四十八孔疏商數七十二三分之為二十四者三去其一故四十八其數最少聲最清清者最賤物比於人亦為賤也屬水者以其為最清物之象也冬氣和則羽聲調樂記曰羽亂則危其財匱孟冬氣至則應鍾之律應應鍾者姑洗之所生三分去一律長四寸二十七分寸之二十姑洗長七寸一分強三分之為二寸七分強者三去其一得此數周語應鍾均利器用俾應復孔疏應當也言隂當代陽用事百物可種藏則均利百工之器俾應復者隂陽用事終則有始也髙氏誘曰隂應於陽轉成其功萬物聚藏故曰應鍾漢志曰羽聚也聚藏萬物而宇覆之曰應鍾者隂氣應無射該藏萬物而雜陽閡種也班氏固曰萬物應陽而動下藏鍾聚也韋氏昭曰十月應鍾坤六三也管長四寸七分隂應陽用事萬物鍾聚百嘉具備時務均利百官程度庶品皆使應其禮復其性陳氏祥道曰應鍾建亥之律始事者陽效法者隂陽始而倡之隂成而應之隂陽之道如是止矣故曰應鍾朱子曰管子云凡聽羽如鳴鳥在樹太史公云羽動腎而和正智聞羽聲使人整齊而好禮又曰應鍾長四寸六分六釐存疑王氏喬桂曰應鍾長四寸八分自無射降九分其數六其味鹹其臭朽其數六下唐月今有其性智其事聽朽淮南子作腐正義鄭氏康成曰水生數一成數六但言六亦舉其成數孔疏易天一生水於北地六成水於北但言六以成為功也鹹朽水之臭味也凡鹹朽者皆屬焉氣若有若無為朽孔氏穎達曰水所以在北方者從盛隂之氣所以潤下者陽下從隂也皇氏云水數一得土五而成故六冬味鹹臭朽者水之氣味在氣則朽在口則鹹也馬氏睎孟曰冬以隂極生水水之成形而潤下潤下作鹹故味鹹物以水化則其氣為朽故臭朽其祀行祭先腎正義鄭氏康成曰冬隂盛寒於水祀之於行從辟除之類也祀之先祭腎者隂位在下腎亦在下腎為尊也行在廟門外之西為軷壤厚三寸廣五尺輪四尺孔疏軷壇東西為廣南北為輪廟門外西常祀行神之壇若國外祖道其壇隨路所向而廣輪之數亦同也祀行之禮北面設主於軷上乃制腎及脾為爼奠於主南孔疏主以菩芻棘柏為之又設盛於俎東祭肉腎一脾再其他皆如祀門之禮孔疏皆逸中霤禮文髙氏誘曰行門內地也冬守在內故祀之一作井水給人冬水王故祀之也祭先腎行屬水自用其藏也張氏虙曰凡有功於人則祀之冬與夏為對人之生不在家則在路竈賴其養於家行資其庇於路其祀於冬者役車其休之時也朱氏申曰行者人之所以往冬則陽復而隂往也祭先腎不取相勝者以隂靜而物辨也存異張氏虙曰腎當作心水所勝也案揚雄蔡雍劉安皆謂冬祀井蓋井水竈火皆功在養人而夏火冬水亦於義為合行即井也易曰往來井井蓋祀井於汲道之旁故云行歟若行道之神出祖則祭之無常時不當以列于五祀中也但生民詩言取羝以軷以興嗣嵗則周於嵗暮實祀行蓋行者往來之道而嵗暮亦往來之交故於此祀之然觀詩别舉其文則似不在五祀中揚蔡諸家祀井之説亦或以此與春先脾夏先肺秋先肝皆食其所勝而中央不先腎冬不先心者五行惟水最卑五臟惟心最貴心為君主之官最尊不可屈故以居中之位配之而最卑者亦不敢以干尊故但自食其所藏也張虙説非水始冰地始凍雉入大水為蜃虹藏不見雉入大水夏小正作玄雉入於淮唐作野雞入於淮正義鄭氏康成曰皆記時候也大水淮也大蛤曰蜃髙氏誘曰傳曰雉入於淮為蜃虹隂陽之交氣是月隂壯故不見方氏慤曰氷即水也水以陽釋氷以隂凝也凍氣閉而陽不能熙也孟冬重隂之始故氷凍皆於此始焉馬氏睎孟曰雉火屬蜃水屬陽不勝隂而並與遷焉故化虹以隂干陽則見此時陽升隂降而弗通故藏張氏虙曰水氷地凍皆氣凝也雉之為蜃雉不自知由得水而然也虹天地之淫氣見於春乘陽也藏於冬伏隂也朱氏申曰隂陽極乎辨故虹不見陳氏澔曰虹非有質而曰藏者亦言其氣之下伏耳天子居玄堂左個乘玄路駕鐡驪載玄旗衣黑衣服玄玉食黍與彘其器閎以奄呂氏春秋作宏以弇淮南子有北宮御女擊磬石其兵鎩正義鄭氏康成曰玄堂左個北堂西偏也鐡驪色如鐡黍秀舒散屬火寒時食之亦以安性也彘水畜器閎而奄象物閉藏也髙氏誘曰玄堂向北堂左個西頭室也玄黑皆順水色也宏大弇深象冬閉藏也孔氏穎達曰黑深而玄淺旗色淺衣色深玉亦用自然之色也張氏虙曰冬為玄英故取以名冬所居此當亥上十月位也寒氣不可過故食火榖以減之寒氣不可抑故食當方之牲以存之案黍南方之榖而宜黑墳冬食之從其宜也彘坎畜坎一陽在隂中冬之象也陽在內故器中寬隂在外故上下窄是月也以立冬先立冬三日太史謁之天子曰某日立冬盛德在水天子乃齊立冬之日天子親帥三公九卿大夫以迎冬於北郊還反賞死事恤孤寡正義鄭氏康成曰死事謂以國事死者若公叔禺人顔涿聚者也孔疏公叔禺人見左傳哀十一年顔涿聚見左傳哀二十三年孤寡其妻子也有以惠賜之大功加賞髙氏誘曰迎冬於北六里之郊水氣用事其先人有死王事以安社稷者賞其子孫有孤寡者矜恤之孔氏穎達曰因殺氣之盛故賞死事以財祿供給其妻子朱氏申曰賞軍帥武人所賞者猶寡賞死事而恤其孤寡所賞者為多蓋秋為少隂而冬為重隂故也案仲春養幼少存諸孤順生氣之盛也孟冬賞死事恤孤寡感殺氣之盛也存疑張氏虙曰念死事之人慮其孤寡不得所養從而賞之順時之政於是為至案賞與恤分二義蓋死事之子孫不孤寡者則賞之其孤寡者則恤之恤視賞其惠又有加也髙説甚明張氏混而一之誤是月也命大史釁龜策占兆審卦苪城曰句吉凶是察句阿黨則罪句無有掩蔽策初革反又吕氏春秋作命大卜禱祀龜策審卦兆以察吉凶于時有阿上亂法者則罪之無有掩蔽正義鄭氏康成曰策蓍也周禮龜人上春釁龜謂建寅之月秦以亥月為嵗首使大史釁龜策與周異矣今月令曰釁祠髙氏誘曰周禮太卜掌三兆之法一曰玉兆二曰瓦兆三曰原兆又掌三易之法一曰連山二曰歸藏三曰周易龜曰兆策曰卦故命大卜禱祀龜䇿占兆審卦以知吉凶於是有阿意曲從取容於上以亂法度者必察知之則行其罪罰無敢強匿者方氏慤曰物有釁則妖作以血塗之祓除其釁故謂之釁龜以卜而有兆策以筮而有卦兆有象故言占卦有數故言審占兆審卦則吉凶可得而知必於嵗首者欲以知一嵗之吉凶也陸氏佃曰釁龜策策亦釁也吉凶是察者占人所謂以八簭占八頌以八卦占簭之八故也吳氏澄曰兆謂龜所坼之兆卦謂筮所得之卦既命大史釁其龜策乃以龜卜之觀卜之所遇為何兆以策筮之觀筮之所值為何卦於是推占其兆測審其卦以定吉凶何如也馬氏曰曲承曰阿私附曰黨掩自上掩之蔽從旁蔽之存疑張氏虙曰阿黨之察亦係之太史者如董狐趙盾之書南史崔杼之書其阿黨之罪毫無掩蔽也存異鄭氏康成曰占兆龜之繇文也吉凶謂易也審省録之而不釁筮短賤於龜也阿黨謂治獄吏以私恩曲撓相為也孔氏穎達曰非但釁此龜策又釁此占兆繇文易六十四卦有吉有凶故曰卦吉凶是正審察獄吏阿黨之事則在下犯罪之人獄吏不能掩蔽辨正邱氏光庭曰孔云釁占兆之書非也周禮有釁龜無釁兆兆辭存於竹帛何容以血塗之哉爾雅占視也占繫人不繫兆也易經三占廣大悉備豈短賤於龜乎筮短龜長乃不善筮者之言耳案或謂阿黨則罪所謂假於卜筮以疑衆者殺也存之以備一義是月也天子始裘夏小正王始裘在九月正義鄭氏康成曰九月授衣至此可以加裘矣髙氏誘曰始猶先也裘溫服優尊者故先服之張氏虙曰隕霜而冬裘具故司裘以仲秋獻良裘季秋獻功裘至此天子始服之以順時為重也通論陸氏佃曰蔡雍云祀天則大裘然則祭地不大裘明矣故曰掌為大裘以供王祀天之服案夏暑而冬寒天之道也夏葛而冬裘聖之制亦人之情也命有司曰天氣上騰地氣下降天地不通閉塞而成冬正義髙氏誘曰天地閉氷霜栗烈以成冬也孔氏穎達曰十月地氣六隂俱升天氣六陽並謝天體在上六陽歸於虛無故曰上騰地體在下隂氣下連於地故曰下降馬氏睎孟曰天地定位而其氣升降於四時交於南而辨於北故夏曰南交冬曰上騰也各得其所而不相與故曰不通然通之理未嘗息也寒暑相推而未有窮則所謂不通時焉而已陳氐澔曰不交則不通不通則閉塞通論張氏虙曰天地交泰故春言和同天地不交否故冬言閉塞和同之時天下皆知春之為春不必詔告也閉塞之時天下雖知之而或有不謹則無以為藏即無以為發故特命有司人苟知閉藏之義則事事物物皆不敢肆矣存疑鄭氏康成曰使有司助閉藏之氣門户可閉閉之窗牖可塞塞之案將申閉藏之令故先命之如此命百官謹蓋藏命司徒循行積聚無有不斂案司徒今作有司正義鄭氏康成曰蓋藏謂府庫囷倉有藏物積聚謂芻禾薪蒸之屬方氏慤曰閉塞之時蓋藏之事不可慢也故命百官謹之仲秋已命有司趣民多積聚至此又循行之無有不斂欲其無遺利也案蓋藏積倉府庫之在官者故命有司謹之積聚囷倉窖竇之在民者故命司徒循行之無有不斂以順天地之閉塞也壞城郭戒門閭修鍵閉慎管籥固封疆備邊竟完要塞謹關梁塞蹊徑鍵其輦反蹊音奚正義鄭氏康成曰壞益也鍵牡閉牝也孔疏鎖器入者謂之牡受者謂之牝若獸之牝牡然管籥搏鍵器也孔疏似樂器之管籥搢於鎖內搏取其鍵固封疆謂使有司循其溝樹及其衆庶之守法也孔疏掘溝塹而種樹木令人可守之要塞邊城要害處也梁橋橫也蹊徑禽獸之道也髙氏誘曰要塞所以固國關梁所以通塗塞絶蹊徑為其敗田孔氏穎達曰城郭當須牢厚故言壞門閭備禦非常故云戒鍵閉或有破壞故云修管籥不可妄開故云慎封疆理當險阻故云固邊竟防擬盜賊故云備要塞理宜牢固故云完關梁禁禦姦非故云謹蹊徑細小狹路故須塞朱氏申曰城郭既補矣又壞之謹之至也門閭出入或有不虞故言戒管籥猶今門鎖不容有偽故言慎封疆限於內故言固邊竟接於外故言備邊必有塞必有要不可虧故言完關以禦暴梁以濟險不可慢故言謹蹊徑非人所由不可以通故言塞凡此皆以順時之閉塞也存疑何氏子季曰鍵是門扇之後樹兩木穿上端為孔閉將關門以內孔中者朱氏申曰鍵閉猶今門鐶不能無壞故言修案上四句謹於內下五句謹於外王公設險以守其國道固然也至此因時以飭之飭喪紀辨衣裳審棺椁之厚薄塋丘壟之大小髙卑厚薄之度貴賤之等級塋吕氏春秋作營棺椁下淮南子有衣衾字貴賤之等級淮南子作貴賤尊卑皆有等級正義鄭氏康成曰此亦閉藏之具順時飭正之也辨衣裳謂襲斂尊卑所用也所用又有多少髙氏誘曰紀數也棺椁衣衾尊者厚卑者薄營度也丘墳壟冢也貴者髙大賤者卑小孔氏穎達曰鄭注冡人云漢律列侯墳髙四尺關內侯以下各有等差又注檀弓云墳髙四尺蓋周之士制方氏慤曰喪在人而我以禮紀之謂之喪紀辨衣裳已下皆其事也服有輕重則布有精粗不可不辨大小髙卑冢人所謂以爵等為丘封之度也朱氏申曰厚薄主禮言貴賤主人言馬氏睎孟曰喪人之終事也冬嵗之終時也以嵗之終時節人之終事不亦宜乎夫喪人所自盡而君子不以天下儉其親則衣衾棺椁丘壟孰不欲致美以為悅然莫為之節則富者僭於有餘貧者慊於不足而將不安其性命之情故先王視貴賤之等級而制為禮數以紀之使孝子仁人各隨其分而不敢踰也然後得盡其心焉徐氏師曾曰厚施於貴非以美沒禮薄施於賤非以薄為道皆分所當然也案棺天子厚二尺四寸椁厚一尺遞降至庶人棺厚四寸椁五寸衣衾天子百二十稱遞降至士三十稱丘壟天子髙一丈至士四尺凡禮之厚薄皆以其人之貴賤為等級所當飭正之者也是月也命工師效功陳祭器案度程毋或作為淫巧以蕩上心必功致為上物勒工名以考其誠功有不當必行其罪以窮其情致如字舊讀緻當去聲正義鄭氏康成曰霜降而百工休至此物皆成也工師工官之長效功録見百工所作器物也主於祭器祭器尊也度謂制大小也程謂器所容也淫巧謂奢偽怪好也蕩謂動搖生其奢淫勒刻也刻工姓名於其器以察其信知其不功致也功不當取材美而器不堅也孔氏穎達曰命百工陳列所造之器案此器舊來制度大小及容受程限多少勿得有過制之巧搖動在上生其奢侈之心苟功力密致斯為上矣每物之上刻所造工匠之姓名於後以考其誠信與否若用材精美而器不堅固則必行罪以窮其詐偽之情也方氏慤曰功工所成者效猶呈也祭器未成不造燕器故陳祭器焉黃氏震曰誠即功致者也不當即不功致者也通論馬氏睎孟曰度其器之洪纎曲直者有度會其功之久近勤惰者有程古之人雖小物其用功也無所不用其極致者功之至也然不可過過則淫巧先王所禁也故季春監工日號因其作而戒之此工師考工又於其成而戒之是月也大飲蒸正義鄭氏康成曰十月農功畢天子諸侯與其羣臣飲酒於大學孔疏此大飲是天子禮豳風躋彼公堂稱彼兕觥是諸侯禮毛傳云公堂學校也以正齒位孔疏約黨正文謂之大飲别之於他其禮亡今天子以燕禮郡國以鄉飲酒禮代之蒸謂有牲體為俎也黨正職曰國索鬼神而祭祀則以禮屬民而飲酒於序以正齒位亦謂此時也孔疏引以證大飲是十月正齒位之事詩云十月滌場朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觥受福無疆是頌大飲之詩孔疏兩尊曰朋升公學校之堂舉兕觥以罰失禮臣下慶君命受福無疆也髙氏誘曰蒸俎實謂有肴蒸也孔氏穎達曰國語王公立飫則有房蒸此既大飲饗禮當用房蒸半體之俎也馬氏睎孟曰是月嵗功既登物之可薦者衆君子可以飲酒燕樂矣存異陳氏澔曰因蒸祭而與羣臣大為燕飲也案如陳説則當先云蒸而後及大飲令先大飲而後蒸是以大飲之餘為蒸也有是理乎天子乃祈來年于天宗大割祠于公社及門閭臘先祖五祀勞農以休息之勞去聲正義鄭氏康成曰此周禮所謂蠟祭也天宗謂日月星辰大割大殺羣牲也臘謂以田獵所得禽祭也五祀門户中霤竈行也或言祈年或言大割或言臘互文勞農以休息之黨正屬民飲酒正齒位是也髙氏誘曰祈求也宗尊也公社國社后土也生為上公死為貴神先祠公社乃及門閭先公後私之義也是月農夫空間故勞犒休息之不役使也孔氏穎達曰社以上公配祭故云公社此等之祭總謂之蠟若細分之則天宗公社門閭謂之蠟其祭皮辨素服臘先祖五祀謂之息民其祭黃衣黃冠天子諸侯大飲在蠟祭前黨正屬民飲酒在蠟祭後以同在此月故鄭於大飲引其義證之熊謂大飲當在蠟祭後非也蔡雍云夏曰清祀殷曰嘉平周曰蠟秦曰臘案左傳虞不臘是周亦有臘名凡蠟皆在亥月皇氏謂各以嵗終則夏季冬已修耒耜具田器不得謂休息也方氏慤曰天宗尊而不親在致義以求之故曰祈公社門閭親而不尊在致味以祭之故曰大割先祖五祀衆而不一故曰臘臘在丑月而此行之亥月或異代禮與休大息小休久息暫事有大小則時有久暫合而言之一也存疑髙氏誘曰天地四時皆為天宗萬物非天不生非地不載非春不動非夏不長非秋不成非冬不藏書曰禋于六宗此之謂也案虞書先言類上帝次言禋六宗則六宗內不應有天且此記言天宗而不言六其非六宗審矣髙説未確又天子有大社有王社諸侯有國社有侯社此公社即侯社也門亦五祀之一而此别言其在家則一家之門也在國則國門也在閭則閭門也上而公社下而里社無不祭則大而國門小而閭門無不祭皆舉一以該之也五祀髙氏謂句芒五官辨已見前天子乃命將帥講武習射御角力將去聲正義髙氏誘曰習肄之也角猶試也方氏慤曰武言其道故講之使明射御言其事故習之使熟角則相抵而已馬氏睎孟曰亥之時其為隂也大矣講武以厲其威習射御以考其藝角力以視其才皆隂事也存疑鄭氏康成曰為仲冬將大閲簡習之亦因營室主武士也孔疏春秋説營室主軍士之糧凡田之禮唯狩最備夏小正十一月王狩孔疏仲冬教戰所須此備擬之案周禮春搜夏苖秋獮冬狩皆不見於月令唯驅獸無害五榖略似於苗然在孟夏非苖時也則此講武於孟冬正秦制耳安見其仲冬必大閲而以為預習其事乎預習其事且記而大閲之正反不見乎或以為此即大閲當在仲冬脫簡在此亦非也秦以亥正故於戌月即行大閲所謂天子乃教於田獵以習五戎觀月令所記田獵莫重於此可知先儒必以月令與周禮相附合故説多鑿是月也乃命水虞漁師收水泉池澤之賦毋或敢侵削衆庶兆民以為天子取怨于下其有若此者行罪無赦正義鄭氏康成曰因盛德在水收其稅髙氏誘曰虞官師長也天子曰兆民兆大數也稅斂重則民怨矣方氏慤曰水虞即周禮澤虞漁師即周禮漁人命是二官各以其職也失時之罪小故仲秋言行罪無疑取怨之罪大故孟冬言行罪無赦張氏虙曰魚至冬而美故冬取魚民皆取魚故有水泉池澤之賦朱氏申曰自此犯彼謂之侵減彼益此謂之削通論馬氏睎孟曰先王之時澤有虞川有衡皆為之厲禁以平其守而共其奠以時入之頒其餘於萬民則剝下益上豈其欲哉黃氏震曰收其賦又禁其擾恐不若澤梁無禁之相安也餘論張氏虙曰後世澤之萑蒲舟鮫守之海之蜃蛤祈望守之守之嚴則征之嚴而民始失利矣月令戒其侵削取怨亦恐有司苛取以病民乎案文王澤梁無禁而周公定周禮則有禁者山林藪澤寶藏興焉貨財殖焉不為之制則不為天地留其有餘非撙節愛養之道且民取之而多得則必啓其驕淫取之而有得有不得則必生其爭競皆足以長姦而召亂然後知聖人之綜理周密正所以輔相而裁成也然則文王之無禁非歟曰商辛之虐甚矣如燬之傷不如是不足以稍蘇之也孟子之告齊宣王意亦如此有禁者法之經無禁者時之權也以公物之心而盡物之性節以制度不傷財不害民其庶幾乎孟冬行春令則凍閉不密地氣上泄民多流亡行夏令則國多暴風方冬不寒蟄蟲復出行秋令則雪霜不時小兵時起土地侵削淮南子下有十月官司馬其樹檀正義鄭氏康成曰行春令則寅之氣乘之行夏令則已之氣乘之行秋令則申之氣乘之也民流亡象蟄蟲之動立夏巽用事巽為風故大風申宿直參伐為兵而申隂氣尚微故兵小孔疏春秋記參伐主斬刈示威行伐也髙氏誘曰春陽散越故凍不密而地氣發泄民多流亡象陽布散也夏陽炎溫故盛冬不寒而蟄蟲復出於洪範恆燠之徴秋金令干水不當霜而霜不當雪而雪故曰不時鄰國來伐土地侵削於洪範恆寒之徴也朱氏申曰凍閉不密以行東風解凍之令也地氣上泄以行地氣上騰之令也陳氏澔曰行春令為寅木之氣所泄行夏令為己火之氣所損行秋令為申金之氣所淫也通論方氏慤曰風者四時之所有而陽作則暴孟夏行春少陽之令故但來格而已此行夏盛陽之令故又多焉霜雪不時寒氣遲也小兵時起金氣盛也土地侵削揫斂之致也案唐月令有是月也祭神州地祗於北郊是月也命有司祭司寒是月也命有司祭司中司命司人司祿仲冬之月日在斗昏東辟中旦軫中辟必亦反又日在斗淮南子作招搖指子正義鄭氏康成曰仲冬者日月會於星紀孔疏星紀丑次之號而斗建子之辰也孔氏穎達曰十一月建子子孳也律厯志孳萌於子三統厯大雪日在斗十二度昏壁五度中旦角三度中冬至日在牛初度昏奎十度中旦亢七度中元嘉厯大雪日在箕十度昏氐九度中案氐當作室旦軫八度中冬至日在斗十四度昏東壁八度中旦角七度中案此謂大雪後三十日也十一月於周為正月斗北方木宿六星形如北斗故亦謂之斗廣二十五度月建子而日在丑子與丑合也東壁西方水宿二星廣七度軫南方水宿四星似張廣十七度唐厯十一月之節日在箕昏營室中曉軫中斗建子位之初十一月中氣日在南斗昏東壁中曉角中斗建子位之中通書大雪日在尾八度冬至日在箕六度今時憲書大雪日在尾二度冬至日在箕二度孟子言千嵗之日至可坐而致蓋古雖三正迭用而造厯必以甲子為厯元元正則餘無不正矣曰日至陽氣之始生也不言冬至周以為春正非冬也唐堯甲子冬至日在虛一度日入而昴中虞書所謂日短星昴是也秦莊襄元年差二十七度至日在牛三度而此言斗者斗度寬牛度狹仲冬之節猶在斗十四度故約言之耳漢元和三年日在斗二十一度晉太元九年在斗十七度宋元嘉十年日在斗十四度唐開元十二年在斗九度唐月令所云是也宋統天厯在斗二度元授時厯退在箕十度明大統厯在箕五度本朝康熙甲子猶在箕三度而今乾隆已在箕二度矣大約七十年而差一度二千一百十七年而差一辰積二萬五千四百十年有竒而差一周此嵗差也舉日至而其餘中節可倣此推之星紀古法初斗十一度終女七度今法初箕二度終斗二十二度存疑髙氏誘曰斗北方宿吳之分野案星紀吳越之野玄枵齊之野髙氏以仲冬星紀屬吳以季冬玄枵屬越豈别有所授耶抑因星紀終於女玄枵亦始於女故混二次而為一遂分吳越為二野耶然齊之分野又將歸之何所其日壬癸其帝顓頊其神玄𡨕其蟲介其音羽律中黃鍾正義班氏固曰鍾動也陽氣聚黃泉之下萬物萌動也鄭氏康成曰黃鍾者律之始也九寸仲冬氣至則黃鍾之律應周語曰黃鍾所以宣養六氣九德孔疏六氣隂陽風雨晦明九德六府三事六府金木水火土榖三事天事正德地事利用人事厚生陽氣伏於地下萬物始萌所以遍養此六氣九功之德也功案六府三事九功也鄭以九德言其即疏所謂九之德與髙氏誘曰鍾聚也陽氣聚於下隂氣盛於上萬物孳萌聚於黃泉之下也孔氏穎達曰漢志黃者中之色鍾種也五色黃莫盛焉陽氣始種於黃泉孳萌萬物為六氣元也陳氏祥道曰黃鍾建子之律也黃之為色則隂之盛鍾之為器則隂之聚隂盛而極則陽生之矣隂盛而止則陽散之矣由隂終於亥陽始於子也朱子曰正黃鍾九寸變黃鍾八寸七分八釐一毫六絲二忽通論韋氏昭曰十一月黃鍾乾初九也名黃者重元正始之義也黃鍾陽之變也管長九寸徑三分圍九分林鍾坤初六隂之變也坤之始也故長六寸九六為隂陽夫婦子母之道也其數六其味鹹其臭朽其祀行祭先腎冰益壯地始坼鶡旦不鳴虎始交鶡户割反正義鄭氏康成曰皆記時候也鶡旦求旦之鳥交猶合也髙氏誘曰始坼凍裂也鶡旦山鳥陽物也是月隂盛故不鳴虎陽中之隂隂氣盛以類發也方氏慤曰孟冬水始氷至此益壯孟冬地始凍至此凍甚而坼鶡旦夜鳴隂類也鳴而求旦則求陽也感微陽之生而不鳴得所求也虎隂物而交亦感陽生也張氏虙曰寒氣增於地之上故氷益壯暖氣生於地之下故凍者坼天子居玄堂大廟乘玄路駕鐵驪載玄旗衣黑衣服玄玉食黍與彘其器閎以奄正義鄭氏康成曰玄堂大廟北堂當大室張氏虙曰此當子上十一月位也案玄者水之色亦曰堂者北辰之地天子之尊位在焉故也居亦於大廟之大室開其北閉其東西南之户飭死事朱子曰呂氏春秋淮南子唐月令皆無此三字當為衍文存疑鄭氏康成曰飭軍士戰有必死之志孔氏穎達曰因殺氣之盛故飭之案死事與喪大記復而後行死事意同蓋承孟冬飭喪紀來孟冬飭之此又飭之者蓋王道之始在養生喪死之無憾故慎重如此命有司曰土事毋作慎毋發蓋毋發室屋及起大衆以固而閉地氣沮泄是謂發天地之房諸蟄則死民必疾疫又隨以喪命之曰暢月沮上聲又沮呂氏春秋作且唐月令無命之曰句正義髙氏誘曰有司於周為司徒掌邦土與民人之教隂氣在上民人空閉無所事作孔氏穎達曰隂氣凝固陽須閉藏若起土功開蓋物發室屋起大衆則泄陽氣也人所次舍曰房天地於此時擁蔽萬物不使宣露與房舍相似令地氣泄漏是開發天地之房也非但蟄死人疫國且有大喪隨其後馬氏睎孟曰自內漸外謂之沮自下達上謂之泄寒氣方盛而發其所閉則溫氣乘之故蟄必死民必疫又隨以喪蓋隂主屈陽主伸時不宜暢也方氏慤曰陽生於子至於丑隂猶執而紐之况在於子而可以暢之乎姚氏舜牧曰暢達也時月當閉而我暢之命之曰暢月與後命之曰逆同義見失時之甚也存疑鄭氏康成曰而猶汝也暢猶充也大隂用事尤重閉藏皇氏侃曰喪逃亡也人為疾疫皆逃亡也孔氏穎達曰命之曰暢月言此月為充實之月當使萬物充實不發動也朱子曰暢月謂陽久屈而得伸也陳氏澔曰言所以不可發泄者以此月萬物皆充實於內故也張氏虙曰黃鍾動而萬物潛起則天地之房其隱然萌動者原未嘗不暢非閉塞之令所能遏也命之名而曰暢豈苟乎哉案隂包於外故言固陽動於中故言閉以固而閉言毋發動以順隂之固於外而陽乃閉於內也沮者固之反泄者閉之反隂沮洳而不堅則陽且泄而易散蟄之出民之疫皆以陽易泄故而蟲必死民且喪則以微陽不能敵盛隂也是月也命奄尹申宮令審門閭謹房室必重閉省婦事毋得淫雖有貴戚近習毋有不禁正義鄭氏康成曰奄尹主領奄豎之官於周則為內宰掌治王之內政宮令譏出入及開閉之屬重閉外內閉也省婦事所以靜隂類也淫謂女工奢偽怪巧物也貴戚姑姊妹之屬近習天子所親幸者孔疏內宰主領奄官身非奄也命奄官之正長申明王之內政常察門閭之事謹慎房室之處其門閭房室皆有外內門户必重疊閉之此月隂氣既靜故減省婦之事順隂類也務在質素毋得過為淫巧方氏慤曰周官酒人漿人之類皆有奄鄭謂精氣閉藏者尹則其正也宮中之令國有常典以閉藏之月故申之省省察之也婦以化治絲枲為事巧過則淫淫則偽飾生焉貴近皆禁疏賤可知馬氏睎孟曰貴戚易奢近習易驕欲法之行自貴近始通論黃氏幹曰周制內宰宫正宫伯皆士大夫為之而又統於冢宰凡嬪御奄寺皆在所統漢初中常侍大長秋猶參用士人為之東漢以後専用宦官而宮壼之事大臣無復與知矣郝氏敬曰周禮奄人之制最善卿大夫至庶人在官者不下七萬有竒而奄止四十七人未有為官長者宮宰之制掌之內宰宮伯皆大夫士為之故先王之世宮府如一是書以奄為尹內宮之事毋有不禁權不已重歟此秦作法之弊趙髙所以専制也此稱奄尹是直以奄為尹內宰宮正之職移而屬之奄矣秦風首章未見君子寺人之令次章乃云既見君子見由寺人也司馬欣奏事七日不得見之兆形矣貴戚近習無不禁已開趙髙柄政之漸君子見微知著可不謹哉乃命大酋秫稻必齊麴糵必時湛熾必潔水泉必香陶器必良火齊必得兼用六物大酋監之毋有差貸酋音揫齊如字湛音沈又音尖齊劑同貸音二忒通正義鄭氏康成曰酒熟曰酋大酋酒官之長於周為酒人孔疏鄭注周禮引此大酋為酒正此又以大酋為酒人者酒正掌酒之政令及酒出入之事不親監督也必齊謂熟成也湛漬也熾炊也火齊生熟之調也物猶事也差貸謂失誤有善有惡也古者穫稻而漬米麴至春而為酒孔疏謂春而成非春始釀詩云十月穫稻為此春酒以介眉夀髙氏誘曰大酋於周禮為酒正掌酒之政令以式法度授酒材六物秫稻麴糵水火也孔氏穎達曰六物秫稻一麴糵二湛熾三水泉四陶器五火齊六吳氏澄曰秫説文稷之黏者案黍全黏曰秫而稻粱之黏者亦曰秫此稻既别出則秫乃黍稷粱之統名天子命有司祈祀四海大川名源淵澤井泉正義鄭氏康成曰順其德盛之時祭之也今月令淵為深髙氏誘曰以皆有功於人故祈祀之董氏師讓曰四海水所聚大川名源江源岷山河源崑崙淮源桐柏濟源沇水淵澤水所鍾井泉人所汲仲冬水歸於澤而復其本故祀之陳氏澔曰冬令方中水德至盛故為民祈而祀之通論應氏鏞曰夏之祈火勝水弱遵其流委而廣其潤澤也此之祈盛德在水鍾其淵源厚其渟畜也是月也農有不收藏積聚者馬牛畜獸有放佚者取之不詰正義鄭氏康成曰此收斂尤急之時人有取者不罪所以警懼其主也王居明堂禮曰仲冬之月命農畢積聚繫收牛馬髙氏誘曰詰誅也方氏慤曰孟冬既命百官謹蓋藏又命有司循行積聚矣至此猶不收藏積聚馬牛畜獸猶放佚是遊惰之民不聽令者也不為之詰不亦宜乎山林藪澤有能取蔬食田獵禽獸者野虞教道之其有相侵奪者罪之不赦道音導正義鄭氏康成曰務收斂野物也大澤曰藪孔疏水鍾曰澤水希曰藪中有水處謂之澤旁無水處謂之藪草木之實為蔬食孔疏山林蔬食榛栗之屬藪澤蔬食菱芡之屬髙氏誘曰無水曰藪有水曰澤野虞掌山澤之官不赦必罰之也方氏慤曰於農隙時而能取野物以資人用固宜教道之而無遏其欲若侵奪人之所有則是強暴之徒爾罪之不赦不亦宜乎吳氏澄曰必教道之以非農人所素習故也通論張氏虙曰上節遊惰之民為人所取上未嘗加問惡其遊惰也此勤力之民為人侵奪上為之罪其人喜其勤力也上之示民好惡者如此是月也日短至隂陽爭諸生蕩君子齊戒處必掩身身欲寧去聲色禁耆欲安形性事欲靜以待隂陽之所定齊齋同正義鄭氏康成曰爭者隂方盛陽欲起也蕩謂物動萌芽也寧安也髙氏誘曰蕩諸蟄伏者皆動搖也定猶成也方氏慤曰諸生萬物之生氣也方冬之時盛德在水而陽作之生氣欲發故蕩君子齋戒掩蔽其身以處於內以身欲寧故也去聲色不特止之禁耆欲不特節之君子之齊戒有加無己也外則養其形而無勞內則養其性而無悖安形性故事欲靜也凡此以微陽方生隂未退聽爭而未定故君子齊戒以待其定也王氏炎曰隂方極盛一陽來復隂欲拒之是以爭然一陽在內而為主五隂在外終必順之則定而無爭也君子知隂陽爭則草木之歸根者欲萌昆蟲之蟄藏者欲出不可無以養其微陽况於身心豈得不靜以處之齊戒以靜其心掩藏以靜其身外去聲色內禁耆欲以安形性則身靜而心亦靜矣所以然者隂陽方爭當靜以待其定定則陽反而隂順在一己可以養其身心達之天下亦可以遂萬物之情也徐氏師曽曰視仲夏尤謹者養陽尤重於養隂也彭氏廉夫曰夜漏六十五刻晝漏三十五刻是日短之至通論張氏虙曰夏之日至隂方來而與陽遇冬之日至陽方來而與隂遇未止其所故爭夫天地造化隂陽消息自然之運何嘗有爭其爭以人度之耳昆蟲草木生於春夏者死於秋冬顯然可見故曰生死分若自死而生則起於萌芽之微𥘉無可見之迹故惟言諸生蕩而已然此論時令則然若君子所以治身其至誠滌慮退藏於密固無分於冬夏而身不止毋躁且欲寧焉於聲色不但止之而且去之耆欲不但節之而且禁之外養其形內養其性其一歸於靜者更重於夏日至之時也月令一篇聖人所以順隂陽之序相天地之宜上為國家計下為生民計無遺憾矣未見修身養心之要至此然後知聖人齊戒之誠入於至靜而無間修身養心之要誠不苟也陳氏澔曰此皆與夏至同而有謹之至者仲夏之隂猶微陽未至於甚傷此時之隂猶盛微陽當在於善保故也馬氏睎孟曰夏為正陽隂始間之冬為正隂陽始間之有爭道焉於冬至曰諸生蕩見陽足以勝隂於夏至曰死生分見隂之來不過與陽為敵而已陸氏佃曰冬言以待夏言以定待始事定終事也藝始生荔挺出蚯蚓結麋角解水泉動結呂氏春秋作紆正義鄭氏康成曰又記時候也藝香草也水泉動潤上行髙氏誘曰荔馬荔一名鐡掃帚根可為刷孔氏穎達曰藝香草故應陽氣而出結猶屈也蔡氏云蚯蚓出穴屈首下嚮陽氣氣動則宛而上首故其結而屈也熊氏云鹿是陽獸夏至得隂氣而解角麋是隂獸冬至得陽氣而解角蓋鹿情淫而逰山角解從陽退也麋情淫而逰澤角解從隂退也時有早晚故夏小正十一月十二月俱隕麋角方氏慤曰凡物之氣感隂者腥感陽者香藝荔皆香草蚯蚓感正陽之氣而後出故微陽雖生而猶結焉結未解也是月也隂於此極故氷益壯陽於此始故水泉動壯其形然動其氣然也張氏虙曰蚯蚓在穴氣動則交存疑鄭氏康成曰荔挺馬薤也髙氏誘曰挺出挺然而出也案鄭以挺上屬髙以挺下屬未知孰是姑並存之日短至則伐木取竹箭正義鄭氏康成曰此其堅成之極時髙氏誘曰竹木調韌又斧斤入山林之時也方氏慤曰萬物之材隂盛則堅陽盛則柔隂盛極於此故伐取之木大故言伐竹小故言取張氏虙曰箭又竹之小者是月也可以罷官之無事去器之無用者正義鄭氏康成曰謂先時權所建作者也天地閉藏而萬物休可以去之方氏慤曰設官所以待事無事之官特曠官爾制器所以待用無用之器特虛器爾夫陽為實隂為虛陽生矣罷而去之所以應天地之實也塗闕廷門閭築囹圄此以助天地之閉藏也正義鄭氏康成曰順時氣也髙氏誘曰闕門闕也於周為象魏皆塗塞之使堅牢也方氏慤曰闕人所由以出入廷人所處以聽事塗以土塗之築則不止於繕矣吳氏澄曰門各家廟寢之門閭二十五家巷口之門闕廷畚土以補其凹陷門閭埏埴以塞其罅隙皆塗也通論張氏虙曰月令自入秋來凡所動作施為無非示收藏之義至冬又從而閉藏矣今於仲冬之末反覆之總括之以一陽既生物皆嚮榮氣不可少泄正易所謂至日閉關商旅不行者惟持養之深則其鋭無挫保護之堅則其鋒不折助天地之閉藏乃所以助天地之發達也案修舊曰繕更新曰築可仍舊者孟秋已令繕之必更新者至此乃營築之然土功之事惟囹圄獨後城郭宮室以衛人之生囹圄以禁人未必皆死而有死之道焉先王之所不忍急也仲冬行夏令則其國乃旱氛霧冥冥雷乃發聲行秋令則天時雨汁瓜瓠不成國有大兵行春令則蝗蟲為敗水泉咸竭民多疥癘氛音分雨去聲又淮南子下有十一月官都尉其樹棗正義鄭氏康成曰行夏令則午之氣乘之行秋令則酉之氣乘之行春令則卯之氣乘之也氛霧冥冥霜露之氣相亂也雷發聲午屬震震氣動也酉宿值昴畢畢好雨雨汁者水雪雜下也子宿值虛危虛危內有瓜瓠孔疏天文志瓜瓠四星在危東水泉咸竭大火為旱也疥癘之病孚甲之象髙氏誘曰夏火炎上故國旱清濁相干故氛霧夏氣發泄故雷動聲秋水之母也冬節白露故雨汁金用事以干水故瓜瓠不成蟲食榖心曰螟春木生蟲故也陽氣炕燥故水泉竭水木相干氣不和故多疥癘方氏慤曰氛霧旱氣所致雷發聲盛陽薄之也雪與雨雜下嚴凝之氣未固也瓜瓠不成柔脆為金氣所傷也孟冬言小兵此言大兵氣有淺深故也孟夏言蝗蟲為災此言為敗災以氣言敗以事言夏陽主氣冬陽主事各以其類也水泉竭感發散之氣故也疥癘虛陽作之也陳氏澔曰行夏令為午火之氣所仇行秋令為酉金之氣所淫行春令為卯木之氣所泄也案火氣勝水故旱鬱蒸故氛霧氣能上升達於冷際故雷秋宜雨冬宜雪二氣雜故汁昴為旄頭又金氣勝故大兵木氣盛風生蟲故蝗為敗甚於災也疥癘亦風疾季冬之月日在婺女昏婁中旦氐中日在婺女淮南子作招搖指丑正義鄭氏康成曰季冬者日月會於玄枵孔疏玄枵子次之號而斗建丑之辰也孔氏穎達曰十二月建丑丑紐也律厯志紐牙於丑三統厯小寒日在婺女八度昏婁十一度中旦氐十二度中大寒日在危初度昏昴二度中旦心五度中元嘉厯小寒日在牛三度昏奎十五度中旦亢九度中大寒日在女十度昏胃四度中旦氐十三度中案此謂小寒後三十日也十二月丑商為正月地闢於丑商取地統用之月建丑而日在子丑與子合也婁西方金宿三星直而不勾廣十一度氐東方土宿四星似斗而側廣十六度唐月令十二月之節日在南斗昏奎中曉亢中斗建丑位之𥘉十二月中氣日在須女昏婁中曉氐中斗建丑位之中通書小寒日在斗十二度大寒日在斗四度今時憲書小寒日在斗八度大寒日在女四度玄枵古法初女八度終危十五度今法初斗二十三度終虛九度存疑髙氏誘曰婺女北方宿越之分野案説見仲冬其日壬癸其帝顓頊其神玄冥其蟲介其音羽律中大呂正義班氏固曰呂拒也陽始欲出隂旅抑拒難之也鄭氏康成曰大呂者蕤賓之所生也三分益一律長八寸二百四十三分寸之百四季冬氣至則大呂之律應周語曰元間大呂助宣物也孔疏漢志曰呂旅也隂大旅助黃鍾宣氣而聚物也聚一作牙髙氏誘曰萬物萌生動於黃泉未能達見此去隂即陽助其成功故大之曰大呂也韋氏昭曰十二月大呂坤六四也管長八寸八分隂繫於陽以黃鍾為主故曰元間不名其初臣歸功於君之義也陳氏祥道曰大呂建丑之律也隂律之始所以助陽而行者功於是為大故曰大呂朱子曰大呂管長八寸三分七釐六毫存疑王氏喬桂曰大呂長四寸五分由黃鍾益六分陽尚微也其數六其味鹹其臭朽其祀行祭先腎鴈北鄉鵲始巢雉雊雞乳鄉音向雊音豆夏小正作雉震詬雞桴粥在正月呂氏春秋作乳雉雊淮南子作雞呼卵正義鄭氏康成曰皆記時候也雊雉鳴也詩云雉之朝雊尚求其雌髙氏誘曰鴈在彭蠡之澤是月北鄉將歸至北漠也鵲陽鳥隨陽而動故始巢乳雉雊乳卵也孔氏穎達曰易説二月驚蟄候鴈北鄉鵲始巢視此為遲詩緯推度災復之日鵲始巢視此為早易通卦驗小寒虎始交立春雉雊雞乳亦視此為遲皆以氣有早晚不同故也馬氏睎孟曰鴈北鄉順陽而復也雉火畜感於陽而有聲雞木畜麗於陽而有形陸氏佃曰夏小正云鄉者何也鄉其居也黃氏震曰鴈此月方北鄉後月乃歸彭氏廉夫曰鴈為隨陽之鳥冬至日已南至故反而向北夏至日已北至故運而向南鵲營巢門知避方此時冬將告終春將更始又識時而知營構天子居玄堂右個乘玄路駕鐡驪載玄旗衣黑衣服玄玉食黍與彘其器閎以奄正義鄭氏康成曰玄堂右個北堂東偏張氏虙曰此當丑上十二月位也命有司大難旁磔出土牛以送寒氣磔竹百反正義鄭氏康成曰此難隂氣也難隂始於此者隂氣右行此月之中日歷虛危有墳墓四司之氣為厲鬼將隨強隂出害人也孔疏石氏星經虛北有司命二星司祿二星司危二星司中二星史遷云四司鬼官之長又危東南有墳墓四星旁磔於四門磔攘也出猶作也作土牛者丑為牛牛可牽止也送猶畢也孔疏寒實未畢意欲畢之髙氏誘曰大難逐盡隂氣為陽導也今人臘前一日擊鼓驅疫謂之逐除是也旁磔犬羊於四方出土牛今鄉縣立春節出勸耕送土牛於東門外是也孔氏穎達曰季春唯國難仲秋唯天子難此則下及庶人故云大難此時強隂已盛年嵗已終隂若不去凶邪恐來嵗更為人害其時月建丑土能尅水故特作土牛以畢送寒氣馬氏睎孟曰難皆以除隂慝季春畢春氣仲秋達秋氣則曰難而已至季冬送寒氣則稱大難者隂慝之盛未有甚於此時也大難故旁磔磔非一方不特九門而已方氏慤曰牛土畜又以土為之水方用事欲勝水必以土也迎為入送為出故以出言通論陳氏祥道曰季冬大難旁磔然後出土牛驅除之終事也出土牛乃告民出五種計耦耕又耕農之始事也餘論張氏虙曰東漢志季冬立土牛六頭於國都郡縣城外丑地以送大寒又於立春之日立青幡施土牛耕人於門外以示兆民後世唯存立春之制而無季冬之制矣案此言其常耳若立春於季冬則亦季冬出之矣征鳥厲疾夏小正有鳴弋玄駒賁正義鄭氏康成曰殺氣當極也征鳥題肩也齊人謂之擊征或名曰鷹仲春化為鳩孔疏征鳥鷹隼之屬其取鳥捷疾嚴猛也陸氏佃曰為其將復為鳩物不極不反也存疑髙氏誘曰征猶飛也厲髙也言是月羣鳥飛行髙且疾也張氏虙曰征鳥過鳥為寒所逼行於空中皆猛厲迅疾也存異孔氏穎達曰亦命有司之辭案此句當在雉雊雞乳下乃記候之脫簡耳孔謂亦命有司之辭非也乃畢山川之祀及帝之大臣天之神祗呂氏春秋作天地之神祗唐月令作天子乃䄍百神於南郊正義鄭氏康成曰四時之功成矣故畢祀之帝之大臣句芒之屬天之神祗司中司命風師雨師髙氏誘曰帝之大臣功施於民若益稷之屬皆是也天曰神地曰祗是月嵗終報功凡祀典諸神畢祀之也方氏慤曰自孟冬祈來年於天宗割祠於公社至是一嵗之祀畢故曰乃畢也存疑鄭氏康成曰孟月祭其宗此月可以祭其佐孔氏穎達曰孟冬祭嶽瀆因祭衆山川至此更祭衆山川孟冬祭先嗇神農并祭五帝及大臣五帝為宗句芒等為佐天神人鬼山川等皆有宗有佐皆孟冬祭其宗此又祭其佐也方氏慤曰祗者同出而有别之稱日月之類雖同出於天而有别故亦可謂之祗黃氏震曰天曰神地曰祗此總言之地亦統於天也案此三祀周禮各有其方各有其時此言季冬乃畢秦禮也畢遍舉也孟冬祭嶽瀆祭五帝經皆無文何以知孟冬祭其宗季冬祭其佐且如孔疏是宗一祭佐再祭也於義又何居乎蓋此乃承前祈年於天宗節而統舉之猶言靡神不舉耳正不必一一實之也至於天之神祗則呂覽明有地字此以為闕文可以為省文可亦不必為鑿説也五帝説亦與天宗注不符是月也命漁師始漁天子親往乃嘗魚先薦寢廟正義鄭氏康成曰天子必親往視漁明漁非常事重之也孔疏嘗麻嘗稻皆不親往以魚非常祭之物故重之此時魚潔美馬氏睎孟曰宗廟之牲必親獵則漁必宜親往張氏虙曰冬月魚性定故充肥陳氏澔曰獵而親殺為奉祭也漁而親往為奉先也案夏不漁魚方别孕也秋不漁魚未成也周禮鱉人秋獻龜魚乃魚之埋藏於土泥中者故以矠得之而名貍物非漁也至孟冬獺祭魚虞人入澤梁乃聽民取之而君猶不取至此以魚最美將薦寢廟故命漁師始漁而天子親往順陽氣之始升且重祭事也季春薦鮪為繼事矣故不言始漁然季春天子乘舟此但親往觀之不乘舟者冰方盛舟或未可乘也冰方盛水澤腹堅命取冰冰以入腹呂氏春秋作復或作復正義鄭氏康成曰腹厚也孔疏形體腹長故為厚此月日在北陸孔疏陸道也女虛危是北方七宿之道冰堅厚之時也髙氏誘曰復凍重纍也入入凌室也詩二之日鑿冰沖沖三之日納于凌隂孔氏穎達曰小寒冰猶未盛大寒乃盛故云方也張氏虙曰盛無處不冰也腹堅言其堅達於水之腹也方氏慤曰堅達於內非特形於水面而已通論蘇氏軾曰十二月陽氣藴伏其盛在下則納冰於地中二月四陽作陽始用事則啓冰而廟薦之至於四月陽氣畢達隂氣將絶則冰於是大發食肉之祿老病喪浴無不受氷皆以節陽氣之盛胡氏安國曰藏冰開冰亦聖人輔相燮調之一事非専恃此為治也方氏慤曰冰以陽熙以隂凝夫萬物負隂而抱陽沖氣以為和隂盛閉塞而陽無所泄則氣戾不和為愆陽為伏隂然則鑿冰非特為備者亦以達陽氣也令告民出五種命農計耦耕事修耒耜具田器正義鄭氏康成曰氷既入而令田官告民出五種明大寒既過農事將起也耜者耒之金也廣五寸田器鎡錤之屬髙氏誘曰出出之於窖簡擇之也計會也耦合也孔氏穎達曰耒以木為之長六尺六寸底長尺有一寸中央直者三尺有三寸句者二尺有二寸其底向前曲接耜則以金鐡為之方氏慤曰耦耕二人相耦而耕也命樂師大合吹而罷正義馬氏睎孟曰匏竹利制隂物也自季秋合吹至此大合而罷焉則陽事始故也陸氏佃曰於此言罷著季春大合樂未罷也張氏虙曰季春大合樂固有吹矣樂以導和此大合吹而罷所以畢一嵗之事也朱氏申曰以樂成於其終也王氏曰凡聲陽也易曰雷出地奮豫在天為雷在人為樂古厯驚蟄為正月節雷將動矣是月送隂迎陽出土牛以送隂大合吹以迎陽不用他樂者何也吹者人氣也故用以迎陽案禮為隂樂為陽就樂論又舞為陽吹為隂馬王各有取也存疑鄭氏康成曰嵗將終與族人大飲作樂於大寢以綴恩也言罷者此用禮樂於族人最盛後年若時復然也凡用樂必有禮用禮則有不用樂者王居明堂禮季冬命國為酒以合三族君子説小人樂孔疏三族父子及身小記云以三為五以五為九也君子謂卿大夫士小人謂凡庶鄭知與族人大飲者以明堂禮合三族知之也知作樂者以本文言大合吹也知於大寢以與宗人圖事必於路寢也曰以綴恩者大傳言綴之以食而弗殊也孔氏穎達曰以一年停頓故曰罷辨正王氏曰大合吹即罷可以知其無燕矣案春夏皆用樂秋冬止用吹者君子禮樂斯須不去斷無禁樂之理而吹較舞為凝靜故於秋冬用之此冬將終故大合吹而罷明有終也鄭據明堂禮亦止命國為酒以合三族未嘗言天子與族人為大飲也文王世子言族食世降一等則天子與族人大飲誠有之然言世降一等則一年中齊衰四會食大功三會食小功再會食緦麻一會食古人稱同髙祖廟未毁者為族則於族人亦無停頓一年之禮豈鄭孔所云乃五服以外所謂繫之以姓而弗别綴之以食而弗殊者與乃命四監收秩薪柴以共郊廟及百祀之薪燎共音恭燎力召反正義鄭氏康成曰四監主山林川澤之官大者可析謂之薪小者合束謂之柴薪施炊爨柴以給燎春秋傳曰其父析薪今月令無及百祀之薪燎髙氏誘曰薪燎聚薪與柴置璧與牲於上而燎之升其煙氣董氏師讓曰周官有燔柴槱燎之祭故收以待用張氏虙曰季夏已命四監收秩芻以養犧牲至此又命收秩薪柴以供燔燎方氏慤曰收之所以備來嵗之用也是月也日窮于次月窮于紀星回于天數將幾終嵗且更始専而農民毋有所使幾音祈正義鄭氏康成曰言日月星辰運行於此月皆周匝於故處也次舍也紀會也而猶汝也言専一汝農民之心令之豫有志於耕稼之事不可徭役徭役之則志散失衆也髙氏誘曰次宿也月遇日相合為紀夏數得天故於是月言幾終將更始於正月也孔氏穎達曰去年季冬日次玄枵每月移次此月窮盡還次玄枵去年季冬月與日相會玄枵每月一辰此月窮盡復會於玄枵二十八宿隨天而行每日過一度此月復其故處與去年季冬早晚相似一年三百五十四日未滿三百六十五日之正終故曰幾終然此月終嵗且更始也在上之人當専一女農民之事無得興起造作有所使役也此是制禮者總為戒約之詞凡不云乃命某官者放此陸氏佃曰次言象紀言歷變窮言回回無窮也方氏慤曰陽大而為之主故以次言隂小而有所繫故以紀言案天本無度而曰天三百六十五度四分度之一者以日所不及天者計之也天亦無形而指日月所經之二十八宿以為形必三百六十五日三時而後日所躔與往嵗如一則以為三百六十五度四分度之一耳天與日月五星皆升於東中於南入於西晦於北而曰天左旋日月五星右旋者主日也日出而作日入而息人之作息皆視乎日故以日為主也日出於東故紀日行之宿由蒼龍始天行速則日轉而左日行遲則日轉而右故記日不及之度曰角一度角二度皆自東而北而西而南而復東所以紀日也日之行天每日一周而不及一度則一嵗而天之行較日多一周矣月亦每日一周天而不及十三度有竒則二十九日有竒而不及日者已一周而與日會所謂玄枵星紀十二辰每辰有三十度九十六分度之四十二所以紀月也一時為八分一日九十六分三時則二十四分總之日從日晨昏是也月從月弦望晦朔是也嵗時從天四立二分二至是也此三者厯之大法也天有餘日月不足閏也者補日月之不足以從天之有餘此聖人輔相裁成之妙道也先儒反謂日行遲月行速又謂日一日一周天月一月一周天星一嵗一周天約算家捷法以為言使人愈不明其理矣天子乃與公卿大夫共飭國典論時令以待來嵗之宜正義鄭氏康成曰飭國典和六典之法也孔疏六典治典教典禮典政典刑典事典也飭調和飭正之馬氏睎孟曰此所謂平在朔易也先王之時嵗終令百官府各正其治受其會聽其致事於是飭國典之未宜者改之以經邦治論時令之未協者正之以授民事至正月始和布焉所謂待來嵗之宜也方氏慤曰物有常宜宜在隨時而已然非一人能為也故以共言之彭氏廉夫曰國典之宜飭正者天子與臣下共飭之時令之當酌論者天子與臣下共論之於今嵗之末豫待來嵗之宜易所謂終則有始天行也吳氏澄曰國典經國之典法常而一定者也時令隨時之政令變而從宜者也國典有定故飭正其舊而已時令無常故須商論所宜而行來嵗之宜謂時令也論時令必先飭國典者時之所宜雖不同要無一不出於國典也存疑鄭氏康成曰周禮以正月為之孔疏太宰職正月之吉始和布治建寅而縣之孔疏小宰云正嵗而觀治象之法今用此月則所因於夏殷也孔疏以王者損益不出三代故案周至正月布之則冬亦必預飭論之鄭疑謂夏殷禮非也吳謂典有常令無常得之孟春命太史守典奉法而於此先飭之論之守法者臣制法者君也而君不敢自賢也必與公卿大夫共飭論之而後宜乃命大史次諸侯之列賦之犧牲以共皇天上帝社稷之饗乃命同姓之邦共寢廟之芻豢命宰歷卿大夫至于庶民土田之數而賦犧牲以共山林名川之祀凡在天下九州之民者無不咸獻其力以共皇天上帝社稷寢廟山林名川之祀正義鄭氏康成曰列國有大小賦之犧牲大者出多小者出少此所與諸侯共之者也芻豢猶犧牲此所與同姓共之者也歷猶次也卿大夫采地亦有大小其非采地以其邑民之多少賦之此所與卿大夫庶民共之者也民非神之福不生雖有其邦國采地此賦要由民出髙氏誘曰諸侯異姓者寢廟祖廟也親同姓故使共之宰於周為太宰掌建邦之六典八法以御其衆故命之咸皆獻致也孔氏穎達曰諸侯同王南面専王之土故命之出牲以共事天地異姓同姓俱祭也先王寢廟與同姓國共之故别命同姓國共之也天地不用犬豕社稷有豕而不用犬宗廟備六牲則草食榖食者具矣故以芻豢言之不言士省文也諸侯有國大夫有采庶人無邑而出賦稅以與邑宰是亦獻其力諸侯大夫賦稅所來皆由民出也宰小宰也陸氏佃曰諸侯必大宰賦之而言大史相備也於大祭舉輕小祭舉重如是而後可知歷而數之則小宰之事也方氏慤曰以神道言曰犧牲以人道言曰芻豢於天地社稷尊之於寢廟親之於山林名川亦曰犧牲為逺也庶民亦逺也饗者祭之義祀者祭之道芻豢者祭之物祭非備物不足以致義非致義不足以合道亦互相備而已吳氏澄曰歷土田之數謂枚數臣民之土田以定其數之多少黃氏震曰謂民皆得盡其力然後舉以事神無愧耳如必盡天下之供輸以為祭不幾於擾也哉案治莫急於禮禮莫重於祭而聖人之祭凡以為民也故於季夏曰以共皇天上帝名山大川之神以祠宗廟社稷之靈以為民祈福於季冬曰民咸獻其力以共皇天上帝社稷寢廟山林名川之祀勤民即所以事神故聖人之於鬼神也無私祈而鬼神之於聖人也亦無私福季冬行秋令則白露蚤降介蟲為妖四鄙入保行春令則胎夭多傷國多固疾命之曰逆行夏令則水潦敗國時雪不降氷凍消釋淮南子下有十二月官獄其樹櫟正義鄭氏康成曰行秋令則戌之氣乘之行春令則辰之氣乘之行夏令則未之氣乘之也九月初尚有白露月中乃為霜介蟲丑為鱉蟹也夭少長也此月物甫萌芽季春乃句者畢出萌者盡達胎夭多傷生氣早至不充其性也固疾生不充性成久疾也命之曰逆言衆害莫大於此也季夏大雨時行故水潦髙氏誘曰金氣白故白露冬降金為兵革故四境之民入城郭以自保春溫仁也與寒氣不和故胎夭傷時雪當降而不降氷凍不當消釋而消釋皆火氣溫干時之徵也方氏慤曰冬之序為後而言早者秦以亥正也介蟲之性辨於物以斂藏之氣不厚故為妖冬嵗終而行嵗始之令故命曰逆陸氏佃曰冬氣閉固故疾亦固陳氏澔曰行秋令為戌土之氣所應行春令為辰土之氣所應行夏令為未土之氣所應總論顧氏臨曰月令當取其體天行事之大意如賞以春夏刑以秋冬此是因天時整頓大綱若他時有合即施行者亦豈一一待那時方行如夫子遇迅雷風烈必變若栁子厚論之又須説平時何嘗不敬豈待迅雷風烈方敬也月令但是順天加重非是尋常都不理會其言行某令則某應誠有拘處然子厚之辨又失之太放彭氏廉夫曰月令本不韋所擬議制作而不及施行其書不過以賞刑生殺啓閉出納內外象天之春秋生殺開闔慘舒而以禮樂祭祀隨宜參錯其間泛而讀之似有得於聖人對時育物裁成輔相之道而聖人所為修齊治平之要了無所得七月以後大抵與上半年逐月相配如孟春毋置城郭則孟秋命補城郭仲春養幼少則仲秋養衰老仲春不可以內則仲秋無不務內仲夏門閭毋閉則仲冬毋發室屋季夏收秩芻則季冬收秩薪柴餘事亦多如此案呂氏月令大抵因秦法而以經術緣飾之其所為經術只在春木主生夏火主長秋金主斂冬水主藏上講究於先王建中立極大經大法皆未之及即如周禮以時分者吉禮莫大於冬至圜丘夏至方澤春分朝日秋分夕月宗廟之春祠夏禴秋嘗冬蒸而月令未及也賓禮莫大於春朝夏宗秋覲冬遇及時巡之至於四嶽而月令未及也軍禮莫大於春搜夏苖秋獮冬狩之教振旅治兵而月令皆未及也後世必以周禮強相附合或非其月或非其時故其説不免於鑿欽定禮記義疏卷二十五
