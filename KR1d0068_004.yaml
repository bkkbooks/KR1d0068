body:
  text: 曲禮上第一之四父母有疾冠者不櫛行不翔言不惰琴瑟不御食肉不至變味飲酒不至變貌笑不至矧怒不至詈疾止復故櫛側瑟反惰徒禾反又徒卧反矧本又作哂失忍反詈黎志反正義鄭氏康成曰不櫛不翔憂不為容也不御憂不在樂不變味憂不在味孔疏猶許食肉但不許多耳變味者少食則味不變多食則口味變也不矧不詈憂在心難變也齒本曰矧大笑則見復故自若常也吕氏大臨曰孝子之事親也病則致其憂憂在乎心故言動不得如其故也方氏慤曰言冠者别於童子冠則有時而不櫛可也童子則無冠矣無時而不櫛焉此所以止言冠者不櫛也以憂親之疾而忘其身之飾故也言不惰則以憂勤而不敢惰也琴瑟不御者不以所樂而忘所憂也樂必以琴瑟為言者蓋常御之樂士無故則不去故也物有常味也食肉多品則為變味人有常貌也飲酒過量則或至變貌徐氏師曾曰翔張拱也御用也不惰或人問疾或已迎醫言之必詳而不敢惰也通論陳氏祥道曰儀禮曰疾者齊養者皆齊則自行不翔以至怒不至詈皆齊之事然此亦中人之制孝子之疏節也文王行不能正履不特不翔而已色憂不特言不惰笑不至矧而已一飲亦一再飯亦再不特食肉飲酒不變味變貌也存異鄭氏康成曰不惰憂不在私好惰不正之言孔氏頴逹曰惰者惰訛不正之言謂言語戲劇華飾文辭陳氏澔曰不惰不及他事也辨正姚氏舜牧曰言不惰謂其言急切而不敢怠慢也訓不及他事非訓惰訛不正之言尤非有憂者側席而坐有喪者専席而坐正義鄭氏康成曰側猶特也憂不在接人不布他面席也専猶單也孔氏頴逹曰憂亦謂親有疾也吉時貴賤有重席之禮若父母始喪寢苫無席卒哭後苄翦不納自齊衰已下始喪而有席並不重降居處也張子曰有憂者心未安故側席喪已然者坐無容故専席也陳氏澔曰有憂謂親疾或他禍患存疑吕氏大臨曰側席坐不安也専席不與人共坐也有憂者行不能正履則坐不能安席可知矣喪不二事則不與人共處可知矣居倚廬非喪事不言既練居堊室不與人居皆専席之義也陳氏澔曰側席謂偏設之變於正席也姚氏舜牧曰側席是不能正席非獨坐一席也専席是另設一席非單設其席也案側之訓特如北階止一階而謂之側階也蓋設席必相對故有東向西向南向北向之席今以有憂無暇與人相接故席止在一面若謂必斜其席則古人死且必以正豈有憂即改其度乎席必兩而後為一重居喪則單席不重也若謂不與人同坐則喪各有位次其尊卑同疏戚同者安能不與之同坐外人無服者又豈有來此席而同坐者乎水潦降不獻魚鱉潦音老正義鄭氏康成曰不饒多也孔疏或云水潦降魚鱉豐足不饒益其多孔氏穎逹曰此以下明獻遺人物徐氏師曾曰降下也凡言獻者皆下施於上之辭餘論張氏曰水潦降時魚鱉方孕故不取彭氏曰水潦暴至恐人因取魚鱉傷生故不獻存異孔氏穎逹曰盧植庾蔚並以為天降水潦魚鱉難得朱氏申曰水深則魚鱉難取陳氏澔曰水涸魚鱉易得不足貴故不獻獻鳥者佛其首畜鳥者則勿佛也佛扶弗反陸夲作拂畜許六反正義鄭氏康成曰佛首為其喙害人也佛戾也王氏肅曰謂捩轉其首恐其喙害人陳氏祥道曰獻鳥必視其性也存疑鄭氏康成曰蓋為小竹籠以冒之畜養也養則馴孔疏馴善也鳥經人養則不喙害人故不用籠陸氏佃曰佛首以翼佛之若今佛雞鶩矣朱氏申曰勿佛順其性之有所適也案畜禽以籠獻則不然據下執禽左首則不用籠可知且竹籠亦與拂首何涉獻車馬者執䇿綏綏音雖正義鄭氏康成曰凡操執者謂手所舉以告者也設其大者舉其小者便也孔氏穎逹曰䇿是馬杖綏是上車之繩車馬不上於堂不可進尊者之前但執䇿綏呈之則知有車馬也獻甲者執胄獻杖者執末胄直又反正義鄭氏康成曰甲鎧也胄兜鍪也孔疏謂鎧為甲者言如龜鱉之有甲也孔氏穎逹曰鎧大兜鍪小小者易舉執以呈之末拄地頭也不淨不可向人故執以自向吕氏大臨曰便於受獻者之執也通論吕氏大臨曰少儀云車則説綏執以將命甲若無以前之則袒櫜奉胄案竹木皆有夲末凡吉杖皆下末惟喪杖下夲故此謂拄地者為末獻民虜者操右袂袂彌弊反正義鄭氏康成曰民虜軍所獲也孔疏謂征伐所獲操其右𬒮制之孔疏右袂右邊袖也以左手操其右袂用右手以防其異心執操互言耳胡氏銓曰民虜俘獲者馘取左而袂操右各制其強力案右手有力操其右袖示已縶服且可防變也獻粟者執右契獻米者操量鼓契苦計反量音亮正義鄭氏康成曰契劵要也孔疏謂兩書一札同而别之右為尊孔疏以先書為尊量鼓量器名孔氏穎逹曰粟稻粱之屬米六米之等量是知斗斛之數也隱義云東海樂浪人呼容十二斛者為鼓以量米故云量鼓獻米者執器以呈之吕氏大臨曰古者以契為信居者執左契出者執右契蓋豫人粟者執左契以待之取人粟者執右契以合之朱子曰右契契是合同底物以右為上將獻於人必執其右自取其左陳氏櫟曰待以右合左而付粟也彭氏曰帶殼曰粟去殼曰米徐氏師曾曰粟米皆重貨難舉故但執契鼓以呈之通論方氏慤曰趙簡子賦晉國一鼓鐵釋者謂鈞四謂之石石四謂之鼓理或然也案荀子曰瓜桃棗李一本數以盆鼓管子曰釜鼓滿則人槩之王肅注家語曰三十斤為鈞鈞四為石石四為鼓夫五量終於斛而鼓又十二之則量器中鼓為大存疑孔氏穎逹曰米可即食為急故獻者執量粟可久儲為緩故獻者執契辨正姚氏舜牧曰米云量則粟亦量粟云契則米亦契蓋互文耳獻孰食者操醬齊齊子奚反正義孔氏穎逹曰孰食蔥泄之屬醬齊為食之主執主來則食可知若見芥醬必知獻魚膾之屬也吕氏大臨曰醬齊者主人親設客親徹食之主也孰食之與醬齊各有所宜所謂不得其醬不食獻田宅者操書致正義孔氏穎逹曰書致謂圗書於板丈尺委曲書之而致之於尊者也己上諸物可動故不云致而田宅著土故板圖書畫以致之故言書又言致也存疑孔氏穎逹曰古者田宅悉為官所賦夲不屬民或有重勳為君上所賜故得有獻吕氏大臨曰鄭伯假許田春秋譏之此必周衰變禮即采地授之君公傳之先祖亦非己可擅以豫人者一説如郈成子分宅以居之之類其曰獻者假人使如有之也此説則得之案水潦降已下八節皆獻物之禮首節隨天時次節順物性三節已下唯執末為致潔操右為防變餘皆舉要以見古人有一物必有一物之儀如此總論陳氏祥道曰獻車馬以至於田宅皆有所執則舉其要也凡遺人弓者張弓尚筋弛弓尚角右手執簫左手承弣尊卑垂帨若主人拜則客還辟辟拜主人自受由客之左接下承弣鄉與客並然後受遺云季反弛式旨反辟上扶亦反下音避弣音撫鄉音向正義鄭氏康成曰弓有往來體皆欲令其下曲隤然順也遺人無時已定體則張之未定體則弛之孔疏弓之為體以本為身以角為面筋在外面張之時曲來鄉內故遺人則使筋在上弓身曲向其下其弛之時反張向外筋在曲內角在曲外今遺人角嚮其上弓形亦曲嚮下也弓人云秋合三材冬定體則合三材時亦可獻簫弭頭也謂之簫簫邪也孔疏簫弓頭頭稍剡差邪似簫又謂為鞘鞘簫言相似弣把中孔疏弣謂弓把也帨佩巾也磬折則佩垂授受之儀尊卑一主人拜拜受也辟拜謙不敢當由從也從客之左右客尊之也接下接客手下也承弣却手則簫覆手與孔疏主人既敵故自受拜客既竟從客左而受之主人既還在客左與客並却左手接客左手之下而承弣又覆右手捉弓下頭必知客主俱却左手承弣右手執簫者蓋主人用右手承弣則是倒執弓也鄉與客並謂於堂上則俱南面禮敵者並授孔疏鄉與客並明既拜客竟還前立處與客俱南面而立乃受弓若不敵則不並授孔氏穎逹曰此以下明授受之宜敵體故稱遺地道貴右故推客居右客覆右手執弓下頭又却下左手以承弓把把當中央而髙兩頭頽下以授主人主人在左弓下頭拄地不淨故自執之以上頭授人示敬也主人將受當賓前而拜客謙不欲當主人之拜故少逡巡以避之不答拜者執弓不得拜也吕氏大臨曰右手執簫左手承弣者受者便於執也少儀云弓則左手屈韣執弣授受之儀尊卑皆稍磬折故皆垂帨也由客之左吉事尚右以尊賔也接下承弣敬受之也鄉與客並然後受者敵相遺皆南鄉胡氏銓曰尊卑垂帨獻受皆敬還辟猶退却也陳氏澔曰還辟之辟猶開也謂離其所立之處方氏慤曰賔主異等則授受異鄉此賔主敵故鄉與客並也徐氏師曾曰接下承弣者是時客方承弣不能容手故先以左手接下俟客放手而後承弣次以右手執簫也通論孔氏穎逹曰聘禮賔問主國之卿卿北面受幣聘賔南面授幣敵不並授者以聘賔銜聘君之命敬其君命也存疑孔氏穎逹曰尊卑謂賔俱是大夫則為尊俱是士則為卑張子曰尊卑垂帨至地髙下之節也尊卑者髙下也尊者謂賓主卑者謂賓主之侍者尊者磬折則卑者亦當然辨正朱子曰賔主雖或一尊一卑然皆當磬折垂帨也馬氏睎孟曰主佩垂則臣佩委明尊卑俯仰之異也言尊卑垂帨而無上下之異者蓋賓主授受之禮非臣主之際也案此只論賔主雖有尊卑而其禮一致耳若如孔氏説則賔主或一大夫一士不皆垂帨顯與經背矣如張子説則賔主行禮安用侍者在旁摹仿乎弓張則筋外而角內弛則角外而筋內簫亦作弰又曰弭詩曰象弭魚服爾雅曰弓無緣者謂之弭左傳曰左執鞭弭是無緣之弓以骨飾其弭也然簫之飾亦有不特以骨者爾雅曰以金者謂之銑以蜃者謂之珧以玊者謂之圭蓋射者男子之所有事故弓之制獨詳而遺人以弓其饋視他物為重故詳其容然垂帨拜辟並受即他物亦當無不然者接下承弣孔疏甚明陳氏澔注主人却左手者謂主人却客左手亦以左手承弣也又覆右手者謂主人自覆右手亦以右手執簫也則客左手先釋弣而後主承弣下字反不分明進劒者左首正義鄭氏康成曰左首尊也孔疏首劒拊環也客在右主人在左劒以首為尊以尊處與主人也孔氏穎逹曰進亦遺也言授與人時也通論孔氏穎逹曰少儀云刀却刃授頴頴鐶也春秋傳叔孫之圉人欲殺公若偽不解禮而授劒末杜注以劒鋒末授之以鋒為末則鐶是首也少儀又云澤劒首鄭注澤弄也劒刃不容弄正是劒鐶也案古之佩劒者必左唯僕者右帶劒避君也少儀曰劒則啓櫝蓋襲之加夫襓與劔焉夫襓劒衣也博雅作䃿襓以劒置襓上示不敢褻也左首尊其首也劒首在左則主人右手受劒為便也進戈者前其鐏後其刃鐏在困反又作管反正義鄭氏康成曰鋭底曰鐏孔疏鐏在尾而鈍嚮人為敬也後刃敬也孔疏直刃長八寸橫刃長六寸刃下接柄處長四寸並廣二寸用以鉤害人也刃當頭而利故不持向人也孔氏穎逹曰戈鉤孑戟也如戟而橫安刃但頭不向上為鉤也徐氏師曾曰向主人曰前自向曰後不以刃授示不傷人敬也進矛戟者前其鐓鐓徒對反正義鄭氏康成曰三兵鐏鐓雖在下猶為首平底曰鐓孔疏戟兩邊皆安橫刃長六寸中刃長七寸半橫刃下接柄處又長四寸半並廣寸半鐓矛戟柄尾平底如鐓柄下也以平向人敬也孔氏穎逹曰矛如鋋而三亷也戟今之戟也亦應並授不云左右而云前後者互文也若相對則前後也若並授則左右也彭氏曰矛橫安兩刃而頭俱鉤向下也戟橫安兩刃一向上而一向下也鐓為矛戟柄尾進几杖者拂之正義鄭氏康成曰尊者所馮依拂去塵敬也孔氏穎逹曰前云獻杖執末此云拂之亦互文也或云進几者以彎外授人亦順也通論吕氏大臨曰少牢禮主人左手縮之以右𬒮進拂几三二手橫執几進授尸於筵前此進几之儀案此授尸之禮子事父弟事師或亦然若相遺則未必然也效馬效羊者右牽之正義鄭氏康成曰效猶呈見用右手便也孔氏穎逹曰此亦是遺人而言效互文也徐氏師曾曰馬羊豢畜馴而易制故右手牽之效犬者左牽之正義鄭氏康成曰犬齛齧人右手當禁備之孔疏犬好齛齧人故左牽之而右手防禦也少儀云獻犬則右牽之彼是田犬畜犬不齧人此是充食之犬故防之狗犬通名分言之則大者為犬小者為狗爾雅云未成豪曰狗吕氏大臨曰犬雖豢畜然吠非其主或有噬人之患故左牽而以右制之如臣虜之比執禽者左首正義鄭氏康成曰左首尊孔疏左陽也首亦陽也左首謂橫捧之並授則主人在左故客以鳥首授之也陸氏佃曰禽若羔鴈之類左首向人焉案此執禽與前獻鳥不同即周禮所謂以禽作六摯卿羔大夫鴈士雉庶人鶩工商雞是也故下文繼之云飾羔鴈者以繢士相見禮云摯冬用雉夏用腒左頭奉之即執禽左首之謂也飾羔鴈者以繢繢胡對反正義鄭氏康成曰繢畫也孔疏飾覆也畫布為雲氣以覆羔鴈為飾以相見也陳氏櫟曰飾羔鴈者覆以布而繢畫之朱氏申曰卿執羔大夫執鴈以為摯焉飾以繢所以文之也存疑鄭氏康成曰諸侯大夫以布天子大夫以畫孔疏士相見禮云下大夫以鴈上大夫以羔飾之以布不言繢者彼是諸侯之卿大夫卑故但用布此天子之卿大夫尊故畫之也辨正陸氏佃曰案士相見禮下大夫以鴈飾之以布言飾則繢可知未必有天子之大夫諸侯之大夫之異受珠玉者以掬掬九六反正義鄭氏康成曰受珠玉以掬慎也掬手中孔疏珠玉若受之置在手中不用𬒮承之恐墜落也陳氏澔曰謂以兩手共承之也徐氏師曾曰兩手曰掬珠玉重寶受之宜慎故開匣而以兩手共承之也受弓劒者以𬒮正義鄭氏康成曰受弓劒以𬒮敬也孔疏受弓劒者不露手取之用衣𬒮承接以為敬也存疑徐氏師曾曰前言受弓接下承弣又似不以𬒮者豈前專受弓而此兼受弓劒與飲玉爵者弗揮正義鄭氏康成曰為其寶而脆孔氏穎逹曰玉爵玉杯也揮振去餘也左傳奉匜沃盥既而揮之是也陳氏櫟曰洗他爵必揮揚之去其餘水惟飲玉爵者弗揮揚玉器宜慎也餘論吳氏澄曰此因上文受珠玉以掬而并記之也凡以弓劒苞苴簞笥問人者操以受命如使之容苴子餘反簞音單笥思嗣反操倉刀反使色吏反正義鄭氏康成曰問猶遺也苞苴裹魚肉或以葦或以茅簞笥盛飯食者圜曰簞方曰笥如使之容謂使者孔疏苞者以草包裹魚肉之屬詩曰白茅包之既夕禮云葦包長三尺是也苴者以草藉器而貯物簞圜笥方俱是竹器亦以葦為之問人者謂因問而有物遺之也或自有事問人或聞彼有事而問之悉有物以表其意使者操持此上諸物以進受尊者之命如臣為君聘使受君命先習其威儀進退令如其至所使之國時之儀容故云如使之容也孔氏穎逹曰凡謂凡此數事皆同吕氏大臨曰書厥包橘柚錫貢是包兼果實惟衣裳在笥是笥或有衣裳陳氏櫟曰苴藉也簞以盛飯食笥以盛衣裳問如詩雜佩以問之左氏問之以弓徐氏師曾曰上言親獻之儀此言為使之儀也使者操持諸物以進受尊者之命即習其威儀進退如至彼之儀容則臨時不至失禮而稱其為使矣通論吕氏大臨曰進者以物共尊者之用非獻也效者致之尊者之前使之見非進也聘禮曰小聘曰問問者久不相見使人問安否以講好因有物遺之義如諸侯之相聘禮則殺之也詩云知子之順之雜佩以問之如弓劒苞苴簞笥皆可以問人者也使者操是物以受尊者之命如使臣受命於君之容所以敬命也應氏鏞曰自獻魚鱉至於效犬執禽皆細别其獻物之宜而一物必有一儀也自飾羔鴈至於飲玉爵又略敘其飾物之文而重其物必重其禮也終則總之曰凡以弓劒苞苴簞笥問人者舉其凡以該上文所列之目也蓋曰獻曰遺曰進曰效雖不同而皆所以為問也當其受命主人之時物雖未至於所遺之家而其執操有儀已若與之相為揖遜周旋而無愧乎使者之容矣餘論馬氏曰禮曰無辭不相接也無禮不相見也欲民之毋相褻也相見以贄為此也卿執羔大夫執鴈而飾之以繢者君子交接之禮以文為貴蓋位彌尊而禮彌文也苞苴簞笥物之微者也操而遺人必習其威儀進退如使者之容以禮將之也故聘義使者聘而誤主君弗親饗古之人相厲以禮如此凡為君使者己受命君言不宿於家為于偽反使色吏反下使者並同正義鄭氏康成曰急君使也言謂有故所問也孔疏鄭注聘禮有故謂災患及時事相告所問或問其臣或問他人孔氏頴逹曰受命謂受得君命為聘使受君言宜急去不得停留宿於家聘禮既受命遂行舍於郊是也吕氏大臨曰人臣之義莫大乎敬君敬君莫大乎敬命受君命不宿於家不敢留也方氏慤曰上曰命蓋主於所使之人下曰言蓋主於所問之事通論陳氏祥道曰為人臣者無以有已故將軍受命之日則忘其家臨軍誓衆則忘其親援桴而鼓則忘其身為君使者豈異是哉聘禮所以言釋幣遂行此所以言不宿於家也鄭氏康成曰聘禮曰若有言孔疏如告糴乞師言汶陽田之類則以束帛如享禮孔疏行享禮畢而又有此言亦必有物將之又加束帛也案聘有以常禮行者則言不過述嵗事之常有以有故行者則言如秦伯使西乞術聘魯且言將伐晉事是也以其非一定故聘禮云若有言鄭引此者以見人臣急君命不敢留宿之義君言至則主人出拜君言之辱使者歸則必拜送于門外正義鄭氏康成曰敬君命也此謂國君問事於其臣孔氏穎逹曰君使初至則出門拜迎君命辱者言屈辱尊者之命來也君之使去又出拜送門外則知初至迎亦出門也若使人於君所則必朝服而命之使者反則必下堂而受命使人如字朝音潮正義鄭氏康成曰此謂臣有所告請於其君孔氏穎逹曰命使者言朝服則君言至亦朝服受之互言也去不下送反而下迎者尊君命也不出門者已使卑於君使也通論陳氏祥道曰大夫見於國君國君拜其辱况君言至乎孔子問人於他邦再拜而送之况使人於君所乎言拜辱拜送則知朝服而命之亦拜之也范氏成大曰朝受君言夕舍於郊非必使事如此其急也不敢慢君之命也使人請命於君其往則朝服而遣之其反則下堂而受之非嚴使人也嚴君之命也人君命令所至奔走奉承其震動如此是以聖主兢兢業業不敢忽於出令審之而弗輕發守之而弗輕變使天下致敬而取則觀聽不惑而後治功可成也博聞強識而讓敦善行而不怠謂之君子識音志行下孟反正義鄭氏康成曰敦厚也陳氏祥道曰博聞強識知也知常患於不讓敦善行行也行常患於怠知矣而能遜行矣而不怠然後謂之君子蓋聞識自外入善行由中出自外入者易實故處之以虛由中出者易倦故濟之以勤劉氏彛曰博聞矣強識矣而猶未敢以為能也於是自卑而尊人抑己以崇德日新力行而無厭怠其所以為君子歟遊氏桂曰多能者常失於傲而為善者常失於茍有得焉而止今也居之以讓加之以不怠謂之君子宜矣通論陳氏祥道曰顔子好學而不伐善所謂博聞強識而讓者也三月不違仁所謂敦善行而不怠者也君子不盡人之歡不竭人之忠以全交也正義鄭氏康成曰歡謂飲食孔疏飲食是會樂之具忠謂衣服之物孔氏穎逹曰與人交者不宜事事悉受若使彼罄盡則交結之道不全若不竭盡交乃全也吳氏澄曰飲食之禮所以致其歡樂饋遺之禮所以致其忠誠受其半而辭其半使彼致歡致忠於我之意常有餘而不竭盡不至於使人厭倦而難繼故曰全交謂全其交接之道使可常也通論遊氏桂曰盡人之歡如虞公求玊於虞叔叔既獻之而又求其寶劒故虞叔遂伐虞公此盡人之歡也楚共王歸知罃而問何以報我知罃不應而楚子責以必報不榖是竭人之忠也就飲食衣服言之若陳敬仲之樂飲而不繼以燭孔子出行不假雨具於子夏亦不盡不竭之一端禮曰君子抱孫不抱子此言孫可以為王父尸子不可以為父尸正義鄭氏康成曰以孫與祖昭穆同張子曰父於子主於尊嚴故不抱孫自有其父故在祖則可抱非謂為尸而可抱也祭所以有尸者蓋以示敬若接鬼神則室中之事足矣至於事尸分明是孫行反以子道事之則事親之道可以喻矣通論朱子曰神主之位東向尸在神主之北古人用尸夲與死者一氣又以生人精神去交感他那精神是會附著歆享孔氏穎達曰天子至士皆有尸宗廟之祭皆用同姓之嫡天子必取孫列之為卿大夫者既醉注云天子以卿謂諸侯入為卿大夫故云公尸諸侯亦然鄭注特牲禮大夫士以孫之倫為尸言倫明非己孫皇侃用崔靈恩義以為大夫用已孫非也天子祭天地社稷山川四方百物及七祀諸侯祭社稷竟內山川大夫有采地祭五祀皆有尸外神不問同異姓但卜吉則可祭殤無尸若新喪虞祭男女各立尸故士虞禮云男男尸女女尸至祔祭後止用男之一尸祭統云設同几是也若祭勝國之社稷則士師為尸異義公羊説祭天無尸左氏説晉祀夏郊以董伯為尸虞夏傳云舜入唐郊以丹朱為尸則祭天亦有尸也案董伯夏之後丹朱堯之子以為配天者之尸則天無尸明矣周禮節服氏郊祀送逆尸亦后稷之尸也存疑孔氏穎逹曰凡稱禮曰者皆禮舊語也祭祀必有尸尸必以孫子孫行並幼弱得抱孫為尸不得抱子為尸曽子問云孫幼則使人抱之無孫則取於同姓可也同姓謂五服外方氏慤曰君子指所祭之主案抱孫不抱子指平日言不指當祭言下兩句是作記者推到後來説見得孫與子其分固殊也大凡禮近則有嫌逺則無嫌故天子不以公為尸而以卿為尸諸侯不以卿為尸而以大夫為尸則不以子為尸而以孫為尸亦是此義張子之意謂君子於生之時為祖者抱其孫而為父者不抱其子故死可以孫行為尸而不可以子行為尸非謂孫他日可為己之尸而抱之也孔氏之意亦謂所祭者之孫可抱為尸昭穆同也子不可抱為尸昭穆異也云爾方氏乃以君子為祭主似祭主抱祭尸不可解矣曽子問篇孫幼則使人抱之使人抱非己抱也蓋大夫士避君尸必取無爵者尸必正適所生必已無父又必無爵求兼此三者而又卜之吉乃用則得其人甚難故或及至幼耳為君尸者大夫士見之則下之君知所以為尸者則自下之尸必式乘必以几正義鄭氏康成曰下下車尊尸也尸必式禮之也乘以几尊者慎也孔氏頴逹曰為君尸謂臣為君作尸者已被卜吉君許用者也古者致齊各於其家散齊亦猶出在路及祭日之旦俱來入廟故羣臣得於路見君之尸皆下車而敬之君若於散齊之時在路見尸亦自下車敬之式謂俯下頭也古者車箱長四尺四寸而三分之前一後二橫一木下去車牀三尺三寸謂之式於式上二尺二寸橫一木謂之較較去車牀五尺五寸於時立乘若平常則馮較詩云倚重較兮是也若應為敬則落手隱下式而頭得俯俯後云式視馬尾是也几上有冪君以羔皮而以虎緣之也方氏慤曰下謂在車則下之也馮式謂之式猶執杖謂之杖何氏兆清曰上三句立尸之法為君尸五句敬尸之道尸必式二句是尸自處之道存疑鄭氏康成曰國君或時幼小不能盡識羣臣有以告者乃下之孔氏穎逹曰廟門之外其尊未伸不敢亢禮不可下車故式為敬以答君也至廟中禮伸則亢故答拜几案在式之上尊者有所敬事以手據之辨正王氏安石曰鄭注國君幼小有告者則下之君必有告者不必幼也案或疑禮經凡不敢亢禮者有還辟辟拜及三退負序之法今君下尸而尸亦下固疑為屈若君下尸不下而第以式答之恐亦未順意尸必式句専指大夫士言若尸與君當必有辟之之法至不能辟而相值理應先下及君下車自可以辟退之禮處之豈有待君下車而第以式答之之理者考禮先十日戒尸先三日卜尸卜而吉乃成其為尸此所謂尸必在二日以內成其為尸則尸尊無下車法矣至乘必以几孔謂几在式上恐式上非置几地蓋車上設几以示尊安之意其實坐然後憑几非式時可用也據昏禮婦乘以几注亦以慎之為説賈公彥疏謂登車時也將上車踐以登若王后則履石若尸乘以几之類則乘字明據可正孔疏几在式上之失矣齊者不樂不弔齊側皆反樂音洛又如字正義鄭氏康成曰為哀樂則失正散其思也吕氏大臨曰古之有敬事者必齊齊者專致其精明之德恍惚以與神明交者也樂則散哀則動皆有害於齊也故不樂不弔全其所以齊之志也通論方氏慤曰致齊不以哀樂易其心祭則曰樂以迎來哀以送往何也齊之所謂哀樂者以防外物為主祭之所謂哀樂者以盡內志為主惟能防外物之樂故能盡內志而樂神之來惟能防外物之哀故能盡內志而哀神之往齊之不哀不樂乃所以致祭之哀樂也案鄭孔讀樂為哀樂之樂楊氏梧讀如字考祭統云耳不聽樂故曰齊者不樂言不敢散其志也則楊得之但樂所以樂弔所以哀其義仍一耳居喪之禮毁瘠不形視聽不衰升降不由阼階出入不當門隧瘠秦昔反衰所追反阼才故反隧音遂正義鄭氏康成曰為其廢喪事形謂骨見隧道也常若親存孔氏頴逹曰此明孝子居喪之法毀瘠羸瘦也許羸瘦不許骨露見也阼階主人之階孝子在喪思慕不忍從父阼階上下若祔祭則同於吉得升阼階也通論吕氏大臨曰記曰毀不危身為無後也又曰言而後事行者杖而起身自執事者面垢而已君子執親之喪其哀慕之至如不欲生齊疏之服饘粥之食居倚廬寢苫枕塊所以致毀者僅不死而已然先王制禮毀不滅性教民無以死傷生毀瘠形視聽衰幾於滅性矣送死之大事且將廢而莫之行罪莫大焉此君子所以不敢過也君子三年無改於父之道若父存焉而升降不由阼階出入不當門隧執人子之禮而不忍廢也士喪禮既啓柩遷於祖主人從升自西階既葬反哭入升自西階此不由阼階之節也雖天子諸侯在喪稱子亦此義也方氏慤曰居喪之禮雖哭泣無時然不可以過哀而喪其明雖聞樂不樂然不可以過哀而聵其聰視聽衰則不足以當大事雜記言視不明聽不聰君子病之者以此居喪之禮頭有創則沐身有瘍則浴有疾則飲酒食肉疾止復初不勝喪乃比於不慈不孝創初良反瘍音恙勝平聲正義鄭氏康成曰勝任也孔氏穎達曰不勝喪謂疾不食酒肉創瘍不沐浴毀而滅性者也不留身繼世是不慈也滅性是違親生時之意是不孝也然夲心實非為不孝故言比也吕氏大臨曰居喪非虞祔練祥無沐浴然頭有創身有瘍必為之沐浴朱子曰下不足以傳後故比於不慈上不足以奉先故比於不孝存疑吕氏大臨曰泛言居喪而不獨父母此所以兼言不慈也五十不致毀六十不毀七十惟衰麻在身飲酒食肉處於內衰倉回反處上聲正義鄭氏康成曰不致毀以下皆所以養老人五十始衰也孔氏頴逹曰致極也五十居喪許毀而不得極六十衰甚都不許毀也方氏慤曰七十則自衰麻之外與平居無以異飲酒食肉則不必有疾處於內則不居門外之倚廬也陳氏澔曰七十之年去死不逺略其居喪之禮所以全其易盡之期通論孔氏穎逹曰魯襄公三十一年經書子野卒傳云毀也生與來日死與往日正義鄭氏康成曰與猶數也生數來日謂成服杖以死明日數也死數往日謂殯斂以死日數也此士禮貶於大夫者大夫以上皆以來日數與或為豫孔氏穎逹曰士卑屈故降不如大夫然惟屈殯日不屈成服杖日者成服必在殯後故也大夫以上成服及殯皆不數死日也陳氏澔曰成服杖生者之事也從死之明日數之為三日是三日成服者乃死之第四日也通論鄭氏康成曰士喪禮曰死日而襲厥明而小斂又厥明大斂而殯則死已三日而更言三日成服杖似異日矣喪大記曰士之喪二日而殯三日之朝主人杖二者相推其然明矣孔疏證明士殯與成服不同日吕氏大臨曰三日成服杖生者之事也其三日也自死之明日數之故曰生與來日三日而殯死者之事也其三日也自死之日數之故曰死與往日喪大記云大夫之喪三日之朝既殯主人主婦室老皆杖則生死皆以死之明日數之與士異矣士位卑祿寡不若大夫死事畢而後治生事故成服杖後於殯一日然以來日往日數之皆可以名三日也戴氏溪曰死者日逺生者日忘聖人念之故三日而殯死者事也以往日數三日而食生者事也以來日數其情哀矣聖人察於人情之故而致意於一日二日之間以此教民而猶有朝祥暮歌者存疑陸氏佃曰父母之喪無貴賤一也鄭氏謂士禮貶於大夫非是然則喪大記云士之喪二日而殯左氏曰士踰月外姻至何也曰士卑故主生者之月日言之不嫌也若大夫以上言來日嫌於己蹙此立言之法故君之喪曰五日既殯大夫之喪言三日之朝既殯言既殯非殯之日也亦猶言五日而殯不言朝言朝嫌於己蹙案此二句乃以起下文言生者之相與在來日故必弔之以慰其生死者之相與在往日今則已矣故必傷之以痛其死也若計殯杖之日則注疏説自不可易鄭氏所謂異日謂殯之明日也喪大記士之喪二日而殯者核時刻言之若按日則仍是第三朝也成服杖後於殯日算來是第四日也從來日數起亦恰得三日此士禮也大夫以上皆以來日數者所謂死事畢而後治生事也喪無貴賤蓋統論生者不容自已之思至於位祿則士與大夫固有不能一概者不必拘陸氏説知生者弔知死者傷知生而不知死弔而不傷知死而不知生傷而不弔正義鄭氏康成曰人恩各施於所知也弔傷皆謂致命辭也孔氏穎逹曰此論弔傷之法若存之與亡並識則弔辭傷辭兼行若但識生而不識亡則惟遣設弔辭而無傷辭若但識亡惟施傷辭而無弔辭也此皆不自往而遣使致已之命然弔辭乃使口致命若傷辭當書之於版使者讀之而奠致殯前也方氏慤曰不知生而弔之近諂不知死而傷之近偽應氏鏞曰弔者禮之恤乎外傷者情之痛於中通論鄭氏康成曰雜記曰諸侯使人弔辭曰寡君聞君之喪寡君使某如何不淑此施於生者説者有弔辭云皇天降災子遭罹之如何不淑此施於死者辭畢退皆哭孔疏雜記行弔之後致含禭賵畢乃臨若不致含禭賵則弔訖乃臨故鄭云弔傷辭畢皆哭馬氏睎孟曰子張死曽子齊衰而往哭之或曰齊衰不以弔曽子曰我弔也與哉然則傷弔之禮所施固異也案白虎通引檀弓有此文鄭所見檀弓已逸也弔喪弗能賻不問其所費問疾弗能遺不問其所欲見人弗能館不問其所舍賻音附費芳味反遺於季反舍去聲正義鄭氏康成曰皆為傷恩也案傷謂無恩之實不問其所欲己物或非其所欲將不與也案不與則虛此問矣見人見行人也館舍也王氏安石曰不問者辭口惠而實不至也吕氏大臨曰君子於其言無所苟而已所問不由於誠不如勿問之陳氏澔曰以貨財助喪事曰賻此三事不能則皆不問者以徒問為可愧也通論方氏慤曰表記言有客不能館不問其所舍則知人謂行人耳儒行言孔子至舍哀公館之者以此賜人者不曰來取與人者不問其所欲正義王氏安石曰為人飬廉也吕氏大臨曰來取人之所難取也所欲人之所難言也賜之而難取問之而難言非所以惠人之道也陳氏澔曰賜者君子與者小人案賜君子而曰來取非所以重君子也君子寧去之而不來矣與小人而問其欲彼欲易饜乎是啓其貪矣適墓不登壟助葬必執紼壟力勇反正義鄭氏康成曰壟冢也墓塋域登壟為其不敬也葬喪之大事紼引車索也孔氏穎逹曰自此至君側一節雜記吉凶舉動威儀之事繩屬棺曰紼屬車曰引引紼亦通名助葬本非為客正助事耳故宜執紼呂氏大臨曰壟非所登也助葬執紼必有事也弔於葬者必執引若從柩及壙皆執紼通論呂氏大臨曰諸侯之禮曰寡君有宗廟之事使一介老某相執紼則助葬者雖諸侯亦執紼臨喪不笑正義鄭氏康成曰臨喪宜有哀色呂氏大臨曰臨喪非笑所也陳氏祥道曰臨喪不笑與望柩不歌入臨不翔當食不歎皆所以言哀樂喜愠之情不相雜也揖人必違其位正義鄭氏康成曰禮以變為敬孔氏穎逹曰位謂己之位於位而見己所當敬者則當離己位而向彼遙揖燕禮君降階爾卿大夫注爾近也揖而移近之眀雖君臣皆須違位而揖也望柩不歌入臨不翔當食不歎柩音舊正義鄭氏康成曰望柩入臨哀傷之無容樂也食或以樂非歎所也孔氏穎逹曰入臨人之喪不得趨翔為容陳氏澔曰不歌與不笑義同惟食忘憂非歎所也鄰有喪舂不相里有殯不巷歌舂書容反相去聲殯必刃反正義鄭氏康成曰相謂送杵聲不相不巷歌所以助哀也餘論呂氏大臨曰無服之喪至誠惻怛當與天下同之况鄰里乎陳氏澔曰五家為鄰相者以聲音相勸相蓋舂人歌以助舂也二十五家為里巷歌歌於巷也方氏慤曰除喪而後祥故未祥之前通謂之有喪啓殯而後葬故未葬之前通謂之有殯於鄰言有喪舂不相則有殯更可知於里言有殯不巷歌則容或相舂矣鄰近而里逺喪期逺而殯期近故哀不能無輕重淺深之别焉存異胡氏銓曰孫卿書多言成相漢藝文志有成相雜詞十一篇樂記云治亂以相鄭云即拊也又非送杵聲矣蘇氏云謳謡名案本文明言舂不相是送杵聲也不必汩而亂之適墓不歌哭日不歌正義鄭氏康成曰墓非樂所哭日哀未忘故皆不歌孔氏穎逹曰哭日謂弔人日也論語云子於是日哭則不歌送喪不由徑送葬不辟塗潦臨喪則必有哀色執紼不笑辟音避紼音弗正義鄭氏康成曰不由徑不辟塗潦所哀在此也臨喪執紼及下介胄諸事其貌皆宜與事相配楊氏簡曰送喪為生者送葬為死者不由徑謂從喪而送不由徑道而會也不辟塗潦謂柩車涉塗潦送死者哀情重從之無所辟也陳氏祥道曰情者色之實色者情之文情之得失存乎內則色之得失見於外故喪必有哀色則哀之情可知執紼不笑則憂之情可知臨樂不歎正義馬氏睎孟曰傳曰所樂而憂猶有憂而樂君子之憂樂各有所當故臨樂不歎陳氏澔曰亦為非歎所也介胄則有不可犯之色正義鄭氏康成曰介甲也孔氏穎逹曰介胄則戎容暨暨使形勢髙岸有不可犯之色以稱其服也馬氏睎孟曰兵革以威克愛也故君子戒慎不失色於人正義鄭氏康成曰色厲內荏貌恭心很非情者也孔氏穎逹曰此句并結前義故者承上起下之辭君子接人凡所施用並使心色如一不得色違於心案鄭注别義不如孔疏為確呂氏大臨曰色必稱其服情必稱其色內外相顧所謂不失色於人也陳氏祥道曰君子之顔色無所苟而已矣惟無所苟故為色不同而莫不中禮斯不失色於人矣宜君子於此戒慎而不敢忽也方氏慤曰色之得失在己乃云於人何也蓋色則已與人相通故必以人為言焉案此章是悉數君子動必以禮也禮無不敬故以戒慎二字作總結國君撫式大夫下之大夫撫式士下之正義鄭氏康成曰撫猶據也據式小俯崇敬也乘車必正立孔疏乘車駟馬之車既並立乘故為敬時俯俯據式孔氏穎逹曰謂君臣俱行君式宗廟則臣宜下車言大夫則士可知若士為大夫之臣亦如大夫於君也呂氏大臨曰下之敬重於式所敬皆降一等也通論陳氏祥道曰周官輿人言髙三尺三寸為式髙五尺五寸為較馮較則言其常撫式則致其敬國君大夫士名位不同則禮亦差等矣禮不下庶人正義鄭氏康成曰為遽於事且不能偹物也張氏逸曰非是庶人都不行禮以其遽務不能偹之故不著於禮文有事則假士禮行之孔氏穎逹曰禮謂酬酢之禮不及庶人勉民使至於士也遊氏桂曰庶人不廟祭則宗廟之禮所不及也庶人徒行則車乘之禮所不及也庶人見君子不為容則朝廷之禮所不及也不下者謂其不下及也案孔止以酬酢言不如此説該備存異陳氏澔曰或云此謂相遇於途君撫式以禮大夫則大夫下車大夫撫式以禮士則士下車庶人則否故云禮不下庶人也黃氏裳曰謂大夫士所乘皆天子命車乘車之禮不為庶人而下若國君見黃髮庶人而撫式則大夫士不必下之皆式之而已案孔疏引白虎通禮為有知制刑為無知設則文法自與刑不上大夫句相對陳黃二氏牽上文下字非正解而黃尤誤大夫士與君並式可乎刑不上大夫上時掌反正義鄭氏康成曰不與賢者以犯法孔疏與猶許也許賢者犯法則非進賢之道其犯法則在八議孔疏周禮一議親二議故三議賢四議能五議功六議貴七議勤八議賔輕重不在刑書孔氏穎逹曰五刑三千之科條不設大夫犯罪之目以大夫必用有德若逆設其刑則是君不知賢也呂氏大臨曰庶人愚且賤者也不可以待君子之事責之大夫賢且貴者也不可以待小人之法辱之大夫有罪八議所不赦則刑於隱周官掌囚所謂凡有爵者與王之同族奉而適甸師氏以待刑殺是也通論方氏慤曰周官司冦有議貴之辟宗伯不以象示民亦此意也然周官以禮俗馭其民則禮非不下庶人也要之以治貴者為主有甸師氏則刑非不上大夫也要之以治賤者為主在大夫之下庶人之上者則士而已王制言禮樂造士則禮及乎士矣舜典言朴作教刑則刑加乎士矣刑人不在君側正義鄭氏康成曰為怨恨為害也春秋傳曰近刑人則輕死之道孔疏春秋襄二十九年閽弒吳子餘祭公羊傳閽者何刑人也呂氏大臨曰古者刑人皆逺之墨者使守門劓者使守關刖者使守囿髠者使守積刑人而在君側輕身之道也通論陳氏祥道曰刑人不在君側禮也公家不畜刑人非禮也周禮掌戮墨劓宮刖等非不畜也不近之而已畜之者仁也不近之者智也世衰禮廢而防患之道不謹此吳子餘祭所以見殺於閽齊莊公所以見間於賈舉也案刑人不可在側兼二説一以杜邪佞之門一以防禍患之伏也而防患意較多欽定禮記義疏卷四
