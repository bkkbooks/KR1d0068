body:
  text: 雜記上第二十之一正義孔氏頴達曰案鄭目録云名曰雜記者雜記諸侯已下至士之喪事此於别録屬喪服依曲禮檀弓分上下篇方氏慤曰此篇雖以記喪為主而兼言三患五恥觀蠟取盜之類其事不一故以雜名篇諸侯行而死於館則其復如於其國如於道則升其乘車之左轂以其綏復其輤有裧緇布裳帷素錦以為屋而行至於廟門不毁牆遂入適所殯唯輤為說於廟門外乘繩證反下同轂工木反綏鄭讀緌胡如字復音伏輤千見反裧昌占反殯必刃反說土活反下同正義鄭氏康成曰館主國所致舍復招魂復魄也如於其國主國館賓與使有之得升屋招用褒衣也道道上廬宿也升車左轂象升屋東榮綏當為緌讀如蕤賓之蕤緌謂旌旗之旄孔疏在國招魂則用上服今在路死故用旌旗之緌冀魂魄望見識之覆還也王喪在國亦用緌周禮夏采建緌復於西郊輤載柩將殯之車飾也孔疏以下遂入適所殯故以殯言之輤取名於襯與蒨讀如蒨斾之蒨襯棺也蒨染赤色者也將葬載柩之車飾曰栁孔疏證此是殯車非葬車裧謂龞甲邊緣緇布裳帷圍棺者也孔疏輤象鱉甲覆於棺上中央隆髙四面漸下裧象邊緣垂於輤之四邊亦赤色若葬車則上用荒不用輤裳帷用緇則輤用赤矣輤象宫室屋其中小帳襯覆棺者孔疏輤下棺外用緇色之布以為裳帷於此裳帷之中又用素錦以為屋小帳以覆棺設此飾而後行也若未大斂其載尸而歸車飾皆如之廟所殯宫牆裳帷也孔疏鄭恐是宫牆故明之適所殯謂兩楹之間去輤乃入廟門以其入自有宫室也孔疏輤覆上象宫室今入有宫室故去輤不去裳帷者以裳帷障棺不可去也毁或為徹凡棺自外來者正棺於兩楹之間尸亦侇之於此皆因殯焉孔疏據定元年公喪至自乾侯正棺兩楹間知棺自外來皆如此即尸亦侇於此皆因殯焉也異者柩入自闕升自西階尸入自門升自阼階孔疏皆曾子問文其殯必於兩楹之間者以其死不於室而自外來留之於中不忍逺也孔疏周殯於客位今殯於兩楹間以自外來不忍逺也孔氏頴逹曰五等之侯朝覲天子及自相朝㑹死於主國有司所授館舍若復魄之禮則與在己本國同也道路也若諸侯在道路死升其所乘車左邊轂上而復魄車轅向南左轂左東也不於道路廬宿之舍復者廬宿供待衆賓非死者所専有也案周禮十里有廬三十里有路室室有委五十里有候館館有積皆所以待賓客也賓叩關關尹以告掌訝與士已迎賓於疆為之前驅小行人迎勞於畿訝士與行人逆之入於國則凡廬宿孰非公館使不得升屋而復與蓋此死於道乃死於車若魯桓公故即升車轂而復也存疑鄭氏康成曰緌旌旗之旄去其旒而用之異於生也存異陸氏佃曰綏旐也以其旐復旐北方之物也死無乎不之號而復之則其旌宜以死者所首之方而已胡氏銓曰禮言綏凡數處鄭皆讀為緌竊謂王制眀堂位夏采所云讀作綏可也此復魂既在車當以執綏之綏杜子春說是裳用緇則輤與裧皆赤以𤣥纁對耳大夫以白布為輤豈亦因染赤得名乎案去旒周禮無此說諸侯之旒如其命數豈有欲其望見而反反去其可别識之命數而存一不可别之旄乎陸以綏為旐胡以綏為登車所授之綏俱非又案不毁牆鄭說可通但既大斂有棺則必毁廟門西牆乃入所謂入自闕升自西階也方小斂則無棺不必毁牆所謂入自門升自阼階也此或以未大斂者言歟總論孔氏頴逹曰自此已下至蒲席以為裳帷總眀諸侯及大夫士在路而死招魂復魄并明飾棺貴賤之等此經論諸侯之制大夫士死於道則升其乘車之左轂以其綏復如於館死則其復如於家大夫以布為輤而行至於宋而說輤載以輲車入自門至於阼階下而說車舉自阼階升適所殯輲市專反正義鄭氏康成曰綏亦緌也案辨己見上大夫復於家以𤣥冕士以爵辨服大夫輤言用布白布不染也孔疏不以蒨草染之言輤者逹名也孔疏亦言輤者有襯近之義也不言裳帷俱用布無所别也至門亦說輤乃入言載以輲車入自門明車不易也孔疏鄭恐易以輴車故明之輲讀為輇或作槫許氏說文解字曰有輻曰輪無輻曰輇孔疏有輻謂用他木為輻無輻謂合大木為之周禮又有蜃車天子以載柩蜃輇聲相近其制同乎輇崇蓋半乘車之輪孔疏周禮遂師職共蜃車乘車髙六尺六寸此半之髙三尺三寸諸侯言不毁牆大夫士言不易車互相明也不易者不易以輴也廟中有載柩以輴之禮此不易耳孔氏頴逹曰此明大夫車飾初死及至家皆以輲車至家說輤惟輲車在故云載以輲車此謂尸若柩則升自西階也天子諸侯載柩以蜃車其殯時則易輴矣大夫士在路載以輲車至家說輤亦載以輲車故鄭云車不易也凡在路載柩天子已下至士皆用蜃車其制與輲車同周禮遂師共蜃車之役是天子也既夕云遂匠納車於階間注云蜃車是士也此云輲車謂大夫也諸侯不言可知蜃車之形鄭注既夕禮其車之輿狀如牀中央有轅前後出設輅輿輅輿上有四周下則前後有軸以輇為輪迫地而行其輪卑有似於蜃輲車則不用輻為輪天子諸侯殯皆用之故檀弓云天子菆塗龍輴謂畫輴轅為龍諸侯殯亦用輴車不畫轅為龍大夫殯不用輴故鄭注喪大記大夫之殯廢輴士掘肂見袵是亦廢輴也其朝廟大夫已上皆用輴士朝廟用輂軸故既夕禮云遷於祖用軸鄭注云軸狀如轉轔刻兩頭為軹輂狀如長牀穿桯前後著金而關軸焉是也士輤葦席以為屋蒲席以為裳帷正義鄭氏康成曰言以葦席為屋則無素錦為帳孔氏頴逹曰此明士輤也謂用葦席屈之以為輤棺之屋蒲席以為裳帷圍繞於屋旁也然大夫無以他物為屋之文則是用素錦為帳矣既有素錦帷帳帳外上有布輤旁有布裳帷則士之帷席屋之外旁有蒲席裳帷則屋上當以蒲席為輤覆於上但文不備也存疑方氏慤曰大夫以布為輤則諸侯用帛可知士以葦席為屋則不得用素錦矣蒲席為裳則不得用緇布矣此皆降殺之别也案孔疏不言諸侯之輤用帛方氏說似與之異凡訃於其君曰君之臣某死父母妻長子曰君之臣某之某死君訃於他國之君曰寡君不祿敢告於執事夫人曰寡小君不祿大子之喪曰寡君之適子某死長丁杖反大音泰適丁歷反正義鄭氏康成曰訃或皆作赴赴至也臣死其子使人至君所告之君之臣某此臣於其家喪所主者君夫人不稱薨告他國君謙也孔氏頴逹曰父母妻長子曰君之臣某之某死上某是生者臣名下某是臣之親屬死者君訃於他國稱寡君若云寡德之君曲禮云諸侯曰薨士曰不祿夫人尊與君同今俱不稱薨同士稱者言臣子於君父雖有考終眉夀猶若其短折然故云不祿經書諸侯言卒者春秋之文若君薨而訃者曰卒卒是夀終矣斯無哀惜之心非臣子之辭鄰國來赴書以卒者言無所老幼皆終成人之志所以相尊敬也不敢指斥鄰國君身故云告於執事夫人大子皆當云告於執事不言者略也陸氏佃曰凡諸侯同盟則訃不同盟蓋不訃也不言死不死其君也不言卒不卒其君也夫人曰寡小君不祿左𫝊曰君氏卒聲子也不赴於諸侯不反哭於寢不祔於姑故不曰薨總論孔氏頴逹曰此總眀遭喪訃告於君及敵者并訃於鄰國稱謂之差大夫訃於同國適者曰某不祿訃於士亦曰某不祿訃於他國之君曰君之外臣寡大夫某死訃於適者曰吾子之外私寡大夫某不祿使某實訃於士亦曰吾子之外私寡大夫某不祿使某實適並依注音敵大歷反實依注音至正義鄭氏康成曰適讀為匹敵之敵謂爵同者也實當為至周秦人聲之誤也孔疏以身赴告故云使某至孔氏頴逹曰此眀大夫卒相訃告之禮同國敵者謂大夫位相敵者大夫既尊於士士處亦稱不祿稱某者或死者名或死者官號而赴者得稱之訃於他國之君故云外臣自謙退無德故云寡大夫尊敬他君故云某死訃於他國大夫私有恩好故曰外私以赴大夫其辭得申故云某不祿方氏慤曰士曰不祿此非士亦曰不祿者謙辭也與死者有恩私故曰外私與玉藻言於大夫曰外私名同而實異矣胡氏銓曰春秋傳曰以賜君之外臣首實謂身親告也存疑方氏慤曰使某實謂以事實來告劉氏敞曰使某實實者以異國傳聞疑言使人實之也士訃於同國大夫曰某死訃於士亦曰某死訃於他國之君曰君之外臣某死訃於大夫曰吾子之外私某死訃於士亦曰吾子之外私某死正義孔氏頴逹曰此論士喪相訃告之稱士賤赴大夫士及他國皆云某死但於他君稱外臣於大夫士言外私耳大夫次於公館以終喪士練而歸士次於公館大夫居廬士居堊室正義鄭氏康成曰公館公宫之舍也案公館在倚廬堊室之外練而歸之士謂邑宰也練而猶處公館朝廷之士也唯大夫三年無歸大夫居廬士居堊室亦謂未練時也孔疏若練後則大夫居堊室士亦謂邑宰朝廷之士亦居廬孔氏頴逹曰此眀大夫士遭君喪次舍居處及歸還之節大夫恩深祿重故為君喪居廬終喪乃還家邑宰之士恩輕又為君治邑久不歸則廢職故至小祥反其所治邑朝廷之士雖輕而無邑事故亦留次公館三年也大夫居廬以位尊恩重士居堊室以位卑恩輕若士與王親者雖賤亦居廬與王無親則居堊室與王雖疏但是貴者亦居廬黃氏震曰倚廬者倚木於室外為廬堊室者白其室中為堊倚廬之制重堊室之制輕存疑熊氏安生曰若天子則大夫居廬士居堊室此經是也若諸侯則朝廷大夫士皆居廬宰邑之士居堊室宫正之注是也郝氏敬曰居君喪之禮大夫士服同斬衰三年而喪次有等大夫次於公館喪除後歸雖練祥不歸也士練祭則歸大夫練猶次公館士未練之先亦次於公館時大夫猶在倚廬大夫初喪居倚廬士初喪居堊室皆在殯宫門外倚廬重於堊室堊室重於公館斬衰居倚廬既練居堊室士初喪即居堊室不待練也位尊者情重位卑者哀殺大夫居廬時士居堊室大夫未出廬士已次公館大夫次公館士已歸此其差也應氏鏞曰必次於公館即練而歸之士也但大夫以其序皆次且朝夕存焉以待終喪故曾子問曰君未殯則朝夕不歸士則不盡次而又止於練未必朝夕存焉故檀弓曰士備入而朝夕踊經所以既曰練而歸又曰次於公館者正謂其不能盡次故以次為復也鄭氏謂士分兩等而有邑宰朝廷之殊諸侯之士多矣由大國至小國其有中士下士者數各居其上之三分國不止於兩等然而邑散布於四境之內固有去國尤逺者若邑宰之士盡釋邑寄而館於此豈不皆廢一邑之事乎案周禮宫正大喪則授其廬舍辨其親踈貴賤之居注親貴者居廬疏賤者居堊室喪大記大夫俟練士卒哭而歸今細案之廬也堊室也公館也居之三等也始死也卒哭也練也終喪也喪之四節也為君皆斬衰而五服之內五服之外親疏之等也朝廷之大夫一等都邑之大夫及朝廷之士一等都邑之士一等下邑之士一等貴賤之等也子親朝廷之大夫貴必居廬以終喪五服之內都邑之大夫朝廷之士始亦居廬卒哭居堊室此所謂大夫居廬鄭氏所謂未練時也既練則都邑之大夫朝廷之士皆次於公館以終喪矣鄭氏所謂練而猶處公館者也五服以外之親都邑之士則始即居堊室此所謂士居堊室卒哭居公館此所謂士次於公館練而歸此所謂士練而歸者也若下邑之士則堊室之地原無可容始即居公館卒哭而歸大記所云者是也鄭孔條貫本極分明但鄭孔不言天子諸侯禮異熊氏則謂天子之士居堊室諸侯之士乃有居廬堊室之不同雖無明據但天子二十七大夫八十一元士人多則朝廷之士居堊室容有之諸侯下大夫五人上士二十七人則親近之士始居廬卒哭居堊室亦其宜也郝氏謂士初喪即居堊室無卒哭一層則與天子同與鄭孔與熊皆異應氏謂諸侯之士多不止二等則天子之士更多矣上士中士下士原不止二等也且士之入臨者原止縣邑之長非人人盡來其次即可攝事不患一邑之事盡廢也况卒哭而歸又眀有據乎安得以此駁注疏大夫為其父母兄弟之未為大夫者之喪服如士服士為其父母兄弟之為大夫者之喪服如士服為其之為於僞反正義鄭氏康成曰大夫雖尊不以其服服父母兄弟嫌若踰之也孔疏大夫之父母兄弟或作士或無官今大夫為之若著大夫之服是自尊踰越父母兄弟也士謂大夫庶子為士者也孔疏若大夫適子雖未為士猶服大夫之服即下文是也已卑又不敢服尊者之服今大夫喪禮逸與士異者未得而傋聞也孔疏欲見大夫士喪禮殊異未甚分明春秋傳曰齊晏桓子卒晏嬰粗衰斬苴絰帶杖菅屨食粥居倚廬寢苫枕草其老曰非大夫之禮也曰唯卿為大夫孔疏皆左傳襄十七年文欲證大夫士喪服不同此平仲之謙也言已非大夫故為父服士服耳孔疏晏嬰對家老言若身為卿得著大夫之服若身為大夫唯得服士服此平仲謙退之辭非禮也王氏肅曰喪禮自天子已下無等故曽子曰哭泣之哀齊斬之情饘粥之食自天子逹春秋之時尊者尚輕簡喪服禮制遂壞羣卿大夫専政晏子惡之故服粗衰枕草於當時為重孟子云三年之喪齊疏之服飦粥之食自天子逹於庶人三代共之又此經云端衰喪車皆無等又家語云孔子曰平仲可謂能逺於害矣不以己之是駁人之非遜辭以避咎也孔氏頴逹曰案張融云士與大夫異者是亂世尚輕凉非王者之逹禮如融說是周公制禮之時則上下同後世有異耳又曽子云齊斬之情據其情為一等無妨服有殊異耳方氏慤曰生者貴而死者賤則其服從死者嫌若臨之也生者賤而死者貴則其服從生者嫌若僣之也存疑鄭氏康成曰粗衰斬者其縷在齊斬之間謂縷如三升半而三升不緝也孔疏斬衰三升齊衰四升今粗如三升半而計縷唯三升其齊不緝也斬衰以三升為正微細焉則屬於粗也然則士與大夫為父服異者有粗衰斬枕草矣其為母五升縷而四升為兄弟六升縷而五升乎孔疏鄭既約士為父之服又約為母及兄弟之服經為母四升而大夫縷細如五升兄弟五升而大夫縷細如六升也唯大夫已上乃能備儀盡飾士已下則以臣服君之斬衰為其父以臣從君而服之齊衰為其母與兄弟孔疏義服降正服一等今士皆降從義服是卑屈也亦以勉人為髙行也孔疏大夫已上儀服無降殺居喪之禮以服重為伸以服輕為屈今以重服情深使士有抑屈是勉勵士身使為髙行也大功已下輕服情殺故上下俱伸王氏肅曰其大夫與士異者大夫已上在喪斂時辨絰士冠素委貌陸氏佃曰閒𫝊曰斬衰三升齊衰四升五升六升齊衰四升蓋士已下則五升大夫六升諸侯天子齊衰之别也若斬衰則兩等喪服所謂衰三升三升有半三升有半大夫已上服斬之衰與辨正王氏曰父母喪自天子逹周人重爵施於尊親乃異其服非也周公制禮時恐其弊尚未至此案後言端衰喪車皆無等而儀禮喪服𫝊言大夫士禮别異亦多獨喪服之升數無異文是鄭所云縷如三升半者無確據也王子雍闢之是已但此經文言士服大夫服則異者在服而王但以素辨素委貌别之於經意却未盡喪車無等而周禮言王喪車五初喪蒲蔽犬􅍜士唯此一車是無等者又有等矣豈所謂負適與衰之制尊者長廣卑者短狹與其受服亦有緣飾之不同者與孔疏申鄭而詳載王說并及張杜服之異於鄭則其微意亦不深以鄭說為然矣閒傳所列精粗鄭以為降服正服義服之别陸以為士大夫天子諸侯之别則以彼注與此孔疏正服義服附合為一亦似可通也大夫之適子服大夫之服存疑鄭氏康成曰仕至大夫賢著而德成孔疏其父官至大夫賢行既著道德又成當尊此大夫之身適子得服其服亦尊其適象賢孔疏其適子未仕得服大夫服者非但尊此大夫之身亦尊其適能象似其父之賢也存異皇氏侃曰大夫適子若為士為其父唯服士服鄭注仕至大夫謂此子若仕官至大夫始得服大夫服以其賢德著成也案舊本此與上文為一節蓋承上以服言之儀禮喪服𫝊父之所降子不得不降父之所不降子亦不敢降蓋大夫之子厭於父故從父服所謂服大夫之服者此也若如注疏說則大夫子皆得衣冕服矣而可乎大夫之庶子為大夫則為其父母服大夫服其位與未為大夫者齒正義鄭氏康成曰雖庶子得服其服尚德也孔疏此大夫之子身雖是庶而仕至大夫由身有德故尚之而身服大夫服使齒於士不可不宗適孔疏其行位之處齒列於適子之下年雖長於適子猶在適子之下使適子為主是宗適也若年少於適子則固在適子之下矣陳氏澔曰大夫適子為士可服大夫服大夫庶子卑不敢服尊者之服止如士服士之子為大夫則其父母不能主也使其子主之無子則為之置後正義鄭氏康成曰大夫之子得用大夫之禮而士不得也置猶立也孔氏頴逹曰士子身為大夫父身是士故不可為大夫主喪使此死者之子為主以其子是大夫適子故得服大夫服為之主前經大夫之適子服大夫服是也若無適子則以庶子當適處若無庶子則以族人之子當適處皆得用大夫禮父是士則不得主大夫喪所以然者父貴可以及子故大夫之子得用大夫之禮子貴不可以及父故其父不得用大夫之禮存疑孔氏頴逹曰此所置之後謂暫為喪主假用大夫禮若大宗子則直為立後自然用大夫禮也案命士以上唯主適子之喪以下則子之喪父皆主之而亦有不能主者則其子為大夫也蓋士攝大夫唯宗子今此為大夫之父者非宗子而以大夫禮行是擅自爵也以士之禮行是擅貶君所爵之子也以大夫之禮處子以士之禮自居是以父而屈於子也三者皆不可故使其子主之無則為之置後者大夫得立三廟大夫不可無後也孔謂所置之後暫為喪主恐誤大夫卜宅與葬日有司麻衣布衰布帶因喪屨緇布冠不蕤占者皮辨正義鄭氏康成曰有司卜人也麻衣白布深衣孔疏吉服十五升布而著衰焉及布帶緇布冠此服非純吉亦非純凶也孔疏白布深衣是吉布衰是凶布帶亦凶緇布冠是吉不蕤亦凶故鄭云非純吉亦非純凶也皮辨則純吉之尤者也占者尊於有司卜求吉其服彌吉大夫士朔服皮辨孔疏於諸侯是視朔之服於天子是視朝之服孔氏頴逹曰宅謂葬地大夫尊故得卜宅并葬日布衰謂粗衰皇氏云以三升半布為衰長六寸廣四寸綴於衣前當胸上後又有負版長一尺六寸廣四寸布帶以布為帶因喪屨因喪之繩屨也緇布冠古法不蕤後代有蕤此以凶事故不蕤占者謂卜龜之人陸氏佃曰據士冠禮有司如主人服即位於西方東面北上筮與席所卦者具饌於西孰言因喪屨則麻衣布衰布帶緇布冠不蕤非前日之服也存疑郝氏敬曰有司供卜筮之事即大夫之臣也麻首絰也臣義服斬衰稍降成布故曰衣布衰也布帶大帶正斬衰唯絞帶疏衰已下加布帶也占者即下宗人公有司代大夫命龜者也士喪禮命筮者在主人之右是也不言主人可知也有司麻衰喪屨則主人可知占者皮辨禮神求吉故變吉也不言服與筮同朝服也又曰喪服小記曰練筮日筮尸主人要絰杖繩屨有司告事畢而後杖夫筮練主人不除要絰故卜葬有司不除首絰也筮練有主人在卜葬主人在可知然士喪禮筮宅主人北面免絰今云有司麻是緇布冠上猶加絰豈易冠即不易絰有布帶而無絰帶所謂易服易輕者與鄭讀有司麻衣為句以麻衣為深衣非也案鄭謂麻衣即白布深衣郝氏駁之謂麻者首加麻絰則當卜時主人且免絰豈有有司反加絰之禮鄭謂布衰以布為衰綴麻衣上郝謂布衣衰其衰衣成布則經言麻衣者多矣安得於此句獨割裂乎郝又援練筮日主人要絰為據不知小祥之祭感時以思親也故從凶多筮宅為親千百年計安固也故從吉多義有不同故也又案有司筮史皆私臣有服者故半吉卜人占者非其臣故全吉如筮則史練冠長衣以筮占者朝服正義鄭氏康成曰筮者筮宅也孔疏士喪禮有筮宅知之謂下大夫若士也孔疏下大夫及士不合用卜故筮筮史筮人也長衣深衣之純以素也孔疏制同深衣純以布為麻衣純以素為長衣長衣練冠純凶服也朝服純吉服也大夫士日朝服以朝也孔氏穎逹曰案士喪禮族長涖卜及宗人吉服鄭注服𤣥端也彼謂士之卜禮故占者著𤣥端此據筮禮故朝服案士虞禮注云士之屬吏為其長弔服加麻此史練冠長衣者此經文含大夫其臣為大夫以布帶繩屨故史練冠長衣若士之卜史當從弔服不得練冠長衣也存疑孔氏頴逹曰以筮輕故用純凶服陸氏佃曰長衣蓋練衣也練而為衣長之即吉有漸也知然者以練練衣黃裏縓緣鹿裘衡長袪知之也郝氏敬曰鄭謂有司衣半吉史衣純凶尤非也史作龜求卦者即下卜人史服吉有司服凶耳兩占者服則皆吉鄭意謂卜重筮輕不知卜與筮皆有有司史占者而公臣與家臣異家有蓍無龜大小宗人卜人皆公臣也記舉有司占者史占者以該主人卜舉有司該史筮舉史該有司卜舉皮辨該朝服筮舉朝服該冠文義互見鄭注未逹云占者尊於有司似亦知卜為公臣而又云練冠長衣為純凶有司布衰為半凶豈大夫之喪公臣反凶服重於家臣乎繆矣案長衣吉衣也練衣功衰也而陸氏謂長衣即練衣繆己玉藻言卜人定龜史定墨而郝氏謂史即卜人又繆已士喪禮筮宅有命筮者有筮人又有卦者有旅占者卜日有族長涖卜有宗人受命以命龜有卜人作龜有占者三人則此之史當即命筮者與宗人之命龜同皆其家之有服者但尊卜故宗人吉服輕筮故史凶服鄭謂筮史即筮人似小誤蓋其家之人未必能卜筮故必用卜人筮人卜人筮人占者原無服故吉服也大約公臣吉而家臣凶執事凶而禮神吉耳議者紛紛當合士喪禮而考證之大夫之喪既薦馬薦馬者哭踊出乃包奠而讀書正義鄭氏康成曰嫌與士異記之也既夕禮曰包牲取下體又曰主人之史請讀賵孔疏既夕士禮此大夫禮與士同讀賵者賵猶送者人名也孔氏頴逹曰此明大夫將葬啓柩朝廟後欲出之時也案士喪禮下篇云薦馬凡有三柩初出至祖廟設奠為遷祖之奠訖乃薦馬一也至日側祖奠又薦馬二也明日將行遣奠時又薦馬三也此薦馬下云包奠而讀書於既夕禮為第三薦馬時也薦進也馬是牽車為行之物孝子見進薦馬是行期已至故感之而哭踊馬出乃取遣奠牲下體包裹之以遣送行也包者象既饗而歸賓俎士則羊豕各三個必取下體者下體能行亦示將行也有遣車者亦先包之書謂凡送亡者賵入椁之物書也讀之者省録之也案既夕禮奠者出主人要節而踊鄭注以往來為節抗重出薦馬馬出駕於門外徹者入踊如初包牲於此若云哭踊薦馬者出似薦馬者俟孝子踊乃出若云薦馬者出哭踊又似孝子之踊以其出為節故記言薦馬者哭踊出言薦馬者當哭踊時即出也敖繼公則謂此哭踊是薦馬者哭踊喪無人不盡其哀也亦可通但既夕禮凡踊皆指主人此踊又在徹者入下恐不當屬之薦馬者也大夫之喪大宗人相小宗人命龜卜人作龜相息亮反正義鄭氏康成曰卜葬及日也相相主人禮也命龜告以所問事也作龜謂揚火灼之以出兆皇氏侃曰大小二宗並是其君之職來為喪事如司徒旅歸四布是也故宗伯肆師云凡卿大夫之喪相其禮應氏鏞曰君臣一家也君之喪百官庀其職大夫之喪家臣庀其役其廣狹不同矣君則恤其私而以國有司助之其凡役則司徒供之少儀聼役於司徒是也其贊相則大小二宗與卜人同之宗伯肆師相禮是也大小宗與卜人皆春官而喪事同贊相之蓋君喪之用大宰大宗大祝若曾子問所記是也而亦以贊大夫之喪其待之厚矣夫臣子之喪其力有不能盡具者皆仰之於公又俾有司贊其事所謂體羣臣者此類是也案士喪禮卜日族長涖卜宗人命龜卜人坐作龜此其事也此大宗人者即族長與內子以鞠衣褒衣素沙下大夫以袒衣其餘如士鞠九六反袒張戰反正義鄭氏康成曰此復所用衣也當在夫人狄稅素沙下內子卿之適妻也春秋𫝊曰晉趙姬請逆叔隗於狄趙衰以為內子而已下之是也孔疏僖二十四年左傳文下大夫謂下大夫之妻袒周禮作展王后之服六唯上公夫人亦有褘衣侯伯夫人自揄狄而下子男夫人自闕狄而下卿妻自鞠衣而下大夫妻自展衣而下士妻稅衣而已孔疏詳具玉藻素沙若今紗縠之帛也六服皆袍制孔疏袍制連衣裳有表裏不禪以素紗裏之如今袿袍襈重繒矣孔疏漢時有袿袍袍下之襈以重繒為之褒衣者始為命婦見加賜之衣也孔氏頴逹曰此明卿大夫已下之妻所復之衣鞠衣褒衣者始命為內子上所褒賜之衣故曰褒衣即鞠衣也復時亦用此衣亦以素紗為裏其餘如士謂鞠衣袒衣之外其餘褖衣如士之妻士妻既用褖衣而復則內子下大夫妻等亦用椽衣也復諸侯以褒衣冕服爵辨服正義鄭氏康成曰復招魂復魄也冕服者上公五侯伯四子男三褒衣亦始命為諸侯及朝覲加賜之衣也褒猶進也孔氏頴逹曰此經上下顛倒如鄭所次以此經為首次以夫人稅衣揄狄之經然後次內子以鞠衣之經諸侯既用褒衣又以冕服爵辨服而復也冕服者上公自衮冕而下故為五侯伯自鷩冕而下故為四子男自毳冕而下故為三也褒衣君特所褒賜在命數之外也故王制云三公一命衮若有加則賜是褒衣不入命數也此褒衣或是冕之最上者陸氏佃曰先儒謂始命為諸侯及朝覲加賜之衣若秦仲受顯服其詩曰黻衣繡裳此其一隅黻衮也然則復諸侯以褒衣公襲褒衣一舉其有者也若以謂諸侯人得而有之非所謂褒總論孔氏頴逹曰自此至西上總明招魂所用之衣夫人稅衣揄狄狄稅素沙稅他喚反音彖揄音遙正義鄭氏康成曰言其招魂用稅衣上至揄狄也狄稅素沙言皆以白紗縠為裏孔氏頴逹曰此明婦人復衣婦人衣有六也夫人謂諸侯伯夫人也狄稅言揄狄以下至於稅衣陸氏佃曰夫人先稅衣後揄狄即服有漸也據復諸侯以褒衣冕服爵辨服其言狄稅素沙又以别內子焉據內子以鞠衣素沙夫人稅衣不言以不嫌不以陳氏澔曰稅衣色黑而緣以纁揄與搖同揄狄色青江淮而南青質而五色皆備成章曰搖狄狄當為翟雉名也此服蓋畫搖翟之形以為文章因名也又曰儀禮注云王之服九而祭服六后之服六而祭服三王之服衣裳之色異后之服連衣裳而其色同以婦人之德本末純一故也王之服禪而無裏后之服裏而不禪以陽成於竒隂成於偶故也案此舉裏以明與諸侯之冕服禪夾異也復西上正義鄭氏康成曰北面而西上陽長左也復者多少各如其命之數孔疏士喪禮復者一人以爵辨服言諸侯之士一命用一人明復者各依命數孔氏頴逹曰凡招魂皆北面而招以西頭為上招魂冀生氣之來生氣為陽又北面言之南方是陽左在西方其復處不同故檀弓云君復於小寢大寢庫門四郊而云復西上者但有兩人以上一處復者則西上也大夫不揄絞屬於池下絞户交反正義鄭氏康成曰謂池飾也揄揄翟也采青黃之閒曰絞屬猶繫也人君之栁其池繫絞繒於下而畫翟雉焉名曰振容又有銅魚在其閒大夫去振容士去魚此無人君及士亦爛脫孔氏頴逹曰此明大夫葬時車飾諸侯已上則畫揄翟於絞屬於池下若大夫降下人君不得畫以揄絞屬於池下其池上則得有揄絞也故喪大記士亦有揄絞與大夫同但不得屬於池下人君之桞上有池下有振容池與振容之閒又有魚故注云在其閒詳見喪大記陸氏佃曰大夫士殯與葬儀雖小不同大略一也其異者大夫不揄絞屬於池下存疑陸氏佃曰宜承蒲席以為裳帷之下脫爛在是大夫附於士士不附於大夫附於大夫之昆弟無見弟則從其昭穆雖王父母在亦然附依注作祔正義鄭氏康成曰附讀皆為祔大夫祔於士不敢以己尊自殊於其祖也士不祔於大夫自卑别於尊者也大夫之昆弟謂為士者也孔疏鄭恐大夫昆弟為大夫亦得祔之故云祔者祔於先死者孔氏頴逹曰大夫祔於士謂祖為士孫為大夫若死可以祔祭於祖之為士者士不祔於大夫謂先祖為大夫孫為士不可祔祭於大夫唯得祔於大夫之兄弟為士者無昆弟謂祖無昆弟為士則從其昭穆謂祔於髙祖為士者髙祖為大夫則祔於髙祖昆弟為士者若孫死之後應合祔於王父王父見無可祔亦如是祔於髙祖也通論彭氏絲曰士不附於大夫而喪服小記言士附於大夫則易牲者彼謂無士可附故禮如此存疑鄭氏康成曰從其昭穆中一以上祖又祖而已孔疏中猶間也中一以上小記文言不得祔祖則閒曾祖一世祔於髙祖又無可祔則又問一世祔於髙祖之祖案天子諸侯皆君也其貴絶族萬無可易牲而祔之理大夫雖貴於士然皆屬人臣故可易牲而祔又案祔以為祭也新主之遷必入祖廟殤與無後祔食亦於祖廟故必附之祖耳若髙祖之祖久已無廟祔之何為且大夫以别子為祖者不必祔廟適士得立二廟官師得立一廟者亦不必祔廟又大夫賜氏則各為族恐不可以此族之孫祔彼族之祖則易牲而祔正可濟禮之窮此等處正當觀㑹通以行其典禮總論孔氏頴逹曰自此至祔於公子廣明祔祭之義應氏鏞曰重世裔之本宗故大夫寧自屈而祔於士重朝廷之命爵故士不敢僣而祔於大夫重婚姻之正耦故婦與妾之祔各以其類而無之則寧越次而間升重承家之陽類故男祔則配而女祔則不配婦附於其夫之所附之妃無妃則亦從其昭穆之妃妾附於妾祖姑無妾祖姑則亦從其昭穆之妾正義鄭氏康成曰夫所祔之妃於婦則祖姑孔氏頴逹曰此論婦之所祔義與夫同孫婦祔祖姑無妃謂無祖姑案無祖姑或祖姑𬒳出或宗子成人未娶而置後者亦閒一以上祔於髙祖之妃無則祔於髙祖之祖妃若其祖有昆弟之妃班爵同者亦祔之案妾母不世祭祔之何為禮亦有易牲而祔於女君一條當酌男子附於王父則配女子附於王母則不配公子附於公子正義鄭氏康成曰配謂并祭王母不配則不祭王父也有事於尊者可以及卑有事於卑者不敢援尊配與不配祭饌如一祝辭異不言以某妃配某氏耳女子謂未嫁者也嫁未三月而死猶歸葬於女氏之黨附於公子不敢戚君孔疏祖為君公子不敢祔之故祔於祖兄弟之為公子者孔氏頴逹曰男子祔於王父并祭所配王母在室之女及已嫁未三月而死祔祭於王母則不祭所配之王父案特牲禮云用薦嵗事於皇祖某子是不言配少牢禮云以某妃配某氏鄭注云某妃某妻也某氏若言姜氏子氏也此是言配但士用特牲大夫用少牢其餘皆同是祭饌如一特牲雖是常祭容是禫月吉祭故不言配存疑郝氏敬曰鄭謂不祭王父豈有附女子於王母而不告王父者謂有事於卑者不敢援奠佞說也案毋自入廟後鋪筵設同几自忌日外無専祭矣况女子未嫁及既嫁未三月而反葬必無世祭祔之何為若公子之君為其士大夫之庶者宗其士大夫之適者則有公子可祔矣若别為小宗則不必祔兄弟之為公子者君薨大子號稱子待猶君也正義鄭氏康成曰謂未踰年也雖稱子與諸侯朝㑹如君矣春秋魯僖公九年夏葵丘之㑹宋襄公稱子而與諸侯序待或為侍孔氏頴逹曰大子君存稱世子今君既薨故稱子與諸侯並列其待之禮猶如正君若踰年則稱君存疑孔氏頴逹曰杜元凱之意未葬以前雖踰年猶稱子既葬雖未踰年亦稱公具在曲禮疏陸氏佃曰此言君薨未葬待其子猶君也春秋召陵之㑹陳子亞衛侯待猶陳侯也案左𫝊定四年二月陳侯吳卒三月㑹召陵侵楚未葬可知若溫之㑹陳侯既葬陳子序在鄭伯之下莒子之上視君下一等案左傳僖二十八年六月陳侯款卒冬晉文㑹於溫經傳不言葬陳穆公案古諸侯三年喪畢乃以士服入見天子而受命豈有未葬甫葬而出與他國之㑹盟者待猶君謂其國之臣民耳而諸儒必援左𫝊諸國㑹盟以相證其可訓乎有三年之練冠則以大功之麻易之唯杖屨不易正義鄭氏康成曰謂既練而遭大功之喪者也練除首絰要絰葛又不如大功之麻重也孔疏斬衰既練與大功𥘉死要絰粗細正同但斬衰易葛不如大功麻重言練冠易麻互言之也孔疏三年練言冠明大功亦有冠大功麻謂絰帶明三年亦有絰帶是互言之唯杖屨不易言其餘皆易也屨不易者練與大功俱用繩耳孔氏頴逹曰此謂遭三年之喪至練時首絰已除故特云冠大功麻有七升八升九升三等賀瑒謂有細於三年之練衰者以新喪之重故皆易之庾氏謂惟降服大功則以此大功之麻易三年之練據下文論小功之殤則此大功亦殤降服故依庾說也其餘大功則不得易大功無杖無可改易案論恩則三年重於大功論服則麻重於葛此以大功之麻易三年之葛降服之麻重也餘九月則麻葛兼服之輕重同也大功之繩屨與三年之練屨正同則不易三年之練屨以三年重也有父母之喪尚功衰而附兄弟之殤則練冠附於殤稱陽童某甫不名神也正義鄭氏康成曰此兄弟之殤謂大功親以下之殤也孔疏大功正服則變三年之練故知此是大功以下兼小功也斬衰齊衰之喪練皆受以大功之衰孔疏練後之衰升數與大功同此謂之功衰以是時而祔孔疏大功親以下之殤大功親己下之殤輕不易服冠而兄為殤謂同年者也兄十九而死已明年因喪而冠陽童謂庶殤也宗子則曰隂童童未成人之稱也某甫且字也孔疏五十以伯仲是正字二十而冠曰某甫是且字案此是謂本無字而且為之造字尊神不名為之造字孔氏頴逹曰此明已有父母之喪練後得祔兄弟小功之殤也已有父母喪猶尚身著功衰今兄弟有殤在小功者當須祔祭則不改練時之服身著練冠祔祭於殤也已是祖之適孫若祔大功兄弟長殤得在祖廟若祔小功兄弟長殤則是祖之兄弟之後所以得祔者已是曾祖之適其小功兄弟同曾祖今小功兄弟當祔於從祖之廟其小功兄弟身及父是庶人不合立祖廟則曾孫適孫為之立壇祔小功兄弟之長殤於從祖立神而祭也當祔祭此殤之時其祝辭稱此殤曰陽童又稱此殤曰某甫弟冠而兄得為殤者兄十九而死既是小功之服不合變三年之練而已明年之初用父母喪之練節而加冠以後始祔兄弟也曾子問庶子之殤祭於室白故曰陽童宗子殤死祭於室奧則曰隂童張子曰有父母之喪尚功衰謂未祥猶衣所練之功衰未衣麻衣也吕氏大臨曰上言有三年之練冠則以大功之麻易之唯杖屨不易三年統言父母君長子及為人後及適孫為祖之類若父母之喪既練而祔兄弟之殤則杖屨與練冠俱不易此於三年練冠中特為父母立例所不易者又有練冠也案此兄弟之殤亦謂此殤於己為兄弟行輩耳非必定是兄凡異居始聞兄弟之喪唯以哭對可也其始麻散帶絰未服麻而奔喪及主人之未成絰也疏者與主人皆成之親者終其麻帶絰之日數正義鄭氏康成曰以哭對惻怛之痛不以辭言為禮也散帶垂與居家同也孔疏士喪禮三日絞垂凡喪小斂而麻孔疏士喪禮小斂襲絰於序東疏者小功已下親者大功已上也疏者及主人之節則用之孔疏與主人同成服其不及亦自用其日數孔疏奔喪後至三口而成服孔氏頴逹曰此明異居聞兄弟喪哭及奔赴之禮言凡非一之辭異居别所而始聞兄弟之喪情重不暇問餘事唯哭對使者則於禮可也大功已上兄弟其初聞喪始服麻之時散垂要之帶絰若小功以下服麻則糾垂不散也若聞喪未及服麻而即奔喪道路既近聞喪即來至在主人未小斂之前也疏者值主人成服之節則與主人成之親者雖值主人成服未即成之必終竟其麻帶絰滿依禮日數而後成服也奔喪禮聞喪即襲絰絞帶不散彼謂有事不即奔喪故也又奔喪禮至即絞帶不散垂彼謂來遲此即來奔故至猶散麻以見尸柩故也主妾之喪則自附至於練祥皆使其子主之其殯祭不於正室正義鄭氏康成曰祔自為之者以其祭於祖廟孔氏頴逹曰妾既卑賤得主之者謂女君死攝女君也尊祖故自祔妾合祔於妾祖姑無妾祖姑則祔於女君雖攝女君猶下正適故殯之與祭不得在正室妾祖姑無廟於廟中為壇祭之若不攝女君之妾則不得為主則别為壇不在祖廟中而子自主之也方氏慤曰殯祭不於正室者所以明適也陸氏佃曰言主妾之喪則自祔則妾之喪其主有不主者矣崔氏謂女君死攝女君也然則練祥使其子主之曰練祥可矣今曰至於練祥則又以著虞卒哭其子主之固也存疑方氏慤曰妾之喪祔於妾祖姑之廟故其夫自主而祔之非尊妾也尊祖而已練祥則使其子者略之也案妾祖姑無廟方說未確君不撫僕妾正義鄭氏康成曰略於賤也吳氏澄曰君撫大夫及內命婦大夫君撫室老及姪娣仕於家曰僕僕賤於室老者妾賤於姪娣者故恩不及之女君死則妾為女君之黨服攝女君則不為先女君之黨服正義鄭氏康成曰妾於女君之親若其親然孔氏頴逹曰雖是徒從而抑妾故為女君黨服防覬覦也攝女君差尊故不為先女君之黨服陸氏佃曰即不言先嫌女君出黃氏乾行曰古者諸侯不再娶於禮無二適故女君卒則以妾攝其事而不得為夫人是謂攝女君也女君死妾猶為其黨服徒從也而今則不服其黨此又其隆於衆妾者也唯其隆故雖無女君而內有主唯其殺故雖攝女君而分不踰所以家齊而國治也案妾稱妻皆曰女君此通大夫士而言不専指諸侯也欽定禮記義疏卷五十三
