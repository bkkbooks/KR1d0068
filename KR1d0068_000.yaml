front:
  text: 欽定四庫全書經部四欽定禮記義疏禮類三禮記之屬
  hash: sha256:6d79022e9ac1a801996778610bdf590f52cb7b22cf800df7ffad3e0b15e38f1b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0068_WYG_000-1a, image: WYG0124/WYG0124-0001a.png}
body:
  text: 提要臣等謹按欽定禮記義疏八十二卷乾隆十三年御定三禮義疏之第三部也經文四十九篇釐為七十七卷附載圖五卷其詮釋七例亦與周官義疏同三禮以鄭氏為専門王肅亦一代通儒博觀典籍百計難之弗勝也後儒所見曽不逮肅之棄餘乃以一知半解譁然詆鄭氏不聞道韓愈所謂不自量者其是類歟然周官儀禮皆言禮制禮記則兼言禮意禮制非考證不明禮意則可推求以義理廣托羣言於郊社樂舞裘冕車旗尊彛圭鬯燕飲饗食以及月令內則諸名物皆一一辨訂即諸子軼門百家雜説可以恭考古制者亦詳徴博引曲證旁通而辨説則頗採宋儒以補鄭注所未備其中庸大學二篇陳澔集説以朱子編入四書遂刪除不載殊為妄削古經今仍録全文以存舊本惟章句改從朱子不立異同以消門户之爭蓋言各有當義各有取不拘守于一端而後見衡鑒之至精也至于御纂諸經易不全用程傳本義而仍以程傳本義居先書不全用蔡傳而仍以蔡傳居先詩不全用朱傳而仍以朱傳居先春秋于胡傳尤多所駁正刋除而尚以胡傳標題列三傳之次惟禮記一經于陳澔集説僅棄瑕録瑜雜列諸儒之中不以冠首仰見睿裁精審務協是非之公尤足正胡廣等禮記大全依附門牆隨聲標榜之謬矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書經部四禮類三禮記之屬欽定禮記義疏凡例一本朝崇尚經術周易折中奉聖祖御纂後詩書春秋次第成編兹特命儒臣纂修三禮欽定折衷於是五經炳備咸正無缺惟禮記經文既多注釋繁富故簡帙逾舊今勒成七十有七卷圖五卷共八十二卷一説禮諸家或専尚鄭孔或喜自立説而好排注疏紛紛聚訟兹各虛心體究無所専適惟説之是者從之至於義理之指歸一奉程朱為圭臬云一三禮同為聖典而戴記旨非一端必博徵羣籍以求精解確證故自竹書汲冢周秦諸子帝王世紀及史漢等皆在採録其諸儒由鄭氏而下至本朝儒家専訓戴經外或注他經或在別説義有當引咸採擇以入案中不另標姓氏其宋元以來或𠞰説雷同蕪蔓冗陋無足發明者皆屏汰不録一經文如玉藻王制諸篇有先後錯簡宜更正者止於注內表明之諸家或未詳究則以案語發之而文仍舊本無専輒改易用昭遵古之義惟月令樂記章句稍有併合分析為便於訓釋也一經文字樣間有不同如九齡或作九聆九鈴等並附出本文下一中庸大學二篇自宋大儒編為四書其後俗本禮記遂有止載其目而不列其文者兹仍曲臺之舊以尊全經以存古本兼輯朱注以示準繩而正義等條概置勿用一禮經名物度數尤當精審極究辨是非而正異同故注中於郊社樂舞裘冕車旗尊彝圭鬯燕飲饗食及月令紀候之物內則有事之文皆再三考訂研核必求至當而九天六天眀堂大廟鄭王之殊互今古之參差或駁或甄要取歸於不惑其有去古既逺類不可以強通者則從闕疑一每經文下講説諸家各以時代為次代同者則以其人之先後為次所引注疏間或先孔後鄭者則因經文之先後次之一每經文下釋詁辨析互引旁連説或兼存義有總括先正義次通論餘論次存疑存異次辨正次案次總論如案繫辨正則列在存疑存異後若但發明經義則列在存疑存異前七十七卷統歸畫一一先儒稱鄭氏康成稱周程張朱子及稱姓名若某氏某曰等體例亦歸畫一一孔疏或釋注或闡經旨各分大小書之與周官儀禮賈疏一例一所引注疏或仍其全文或節其要義有刪無增亦無改一古注疏每篇目下必有解題著所以名篇之意今自鄭孔外凡諸家有所論説皆採取其要使一篇大旨開卷即明一月令一篇諸家所論得失不同今採周書時訓吕不韋書淮南子及唐月令各附於下而以時憲書較當時節候以備參考一禮記雖雜成於漢儒然微言大義往往斯在即以檀弓事或傳疑明堂位辭多夸越王制與周官孟子各有抵牾亦必詳求義訓不附會亦不武斷一校正字體點畫無訛一遵康熙字典一古六經皆有圖蓋左圖右史所以按驗而便稽考也兹編既成復因禮器三禮諸圖之舊損益為圖并加圖説俾窮經者瞭如指掌引用姓氏周荀氏况漢董氏仲舒寬夫廣川毛氏萇趙郡司馬氏遷子長龍門孔氏安國子國曲阜戴氏德延君譙國戴氏聖次君劉氏向子政劉氏歆子駿杜氏子春緱氏班氏固孟堅扶風賈氏逵景伯仲氏長統公理髙平鄭氏興少贑鄭氏衆仲師馬氏融季長扶風許氏慎叔重服氏虔子愼盧氏植子幹涿郡何氏休邵公任城鄭氏玄康成髙密趙氏岐邠卿臺卿一字蔡氏雍伯喈陳留髙氏誘應氏劭仲瑗仲南頓一作逺劉氏熙成國李氏巡田氏瓊王氏肅子雍孫氏炎叔然樂安蘇氏林孝友陳留譙氏周允南西充韋氏昭𢎞嗣雲陽射氏慈孝宗何氏晏平叔南陽晉杜氏預元凱當陽孫氏育郭氏璞景純聞喜范氏寧武子傅氏咸長虞義渠賀氏循彥先山隂徐氏邈仙民姑幕劉氏智子房髙唐宋庾氏蔚之潁川范氏曄蔚宗順陽梁賀氏瑒德璉山隂崔氏靈恩東武城何氏胤子季潛江皇氏侃一作皇甫吳郡北魏徐氏遵眀子判華陰李氏謐永和袁氏翻北齊熊氏安生植之阜城隋王氏通仲淹文中子唐陸氏元朗德眀吳縣魏氏徴元成孔氏穎達仲達沖衡水一作逺賈氏公彥洺州顔氏師古籀萬年張氏守節杜氏佑君卿萬年趙氏匡伯循河東邱氏光庭韓氏愈退之昌黎柳氏宗元子厚河東成氏伯璵中山宋聶氏崇義洛陽孫氏奭宗古博平邢氏昺叔明歐陽氏修永叔廬陵曾氏鞏子固南豐劉氏敞原父公是劉氏攽貢父公非司馬氏光君實涑水王氏安石介甫臨川何氏洵直王氏昭禹光逺東巖方氏慤性夫嚴陵馬氏睎孟彥醇劉氏彝執中長樂李氏格非文叔濟南陸氏佃農師山陰劉氏安世器之元城周子敦頤茂叔濂溪程子皓伯淳明道程子頤正叔伊川張子載子厚橫渠范氏祖禹淳夫華陽蘇氏軾子瞻東坡顧氏臨子敦劉氏恕道原京兆筠州一作黃氏敏求演山黃氏裳冕仲延平周氏諝希聖延平吕氏大臨與叔藍田周氏行已恭叔浮沚吕氏希哲原眀滎陽彭氏汝礪器資鄱陽李氏覯泰伯盱江朝氏説之以道嵩山沈氏括存中夢溪翁楊氏時中立龜山陳氏祥道用之三山陳氏㿩晉之胡氏安國康侯崇安范氏成大致能吳郡葉氏夢得少藴石林慕容氏彥逄叔遇毗陵胡氏銓邦衡廬陵應氏鏞子容金華髙氏閌抑崇息齋程氏迥可久沙隨程氏大昌泰之休寧鄭氏樵漁仲夾漈洪氏適景伯鄱陽洪氏邁景盧容齋王氏蘋信伯福清林氏之奇少穎三山髙氏文彪會稽胡氏寅明仲致堂胡氏宏仁仲五峯林氏光朝謙之艾軒張氏栻敬夫南軒吕氏祖謙伯恭東萊朱子熹元晦紫陽薛氏季宣士龍永嘉史氏浩直翁四明陸氏九淵子靜象山陳氏傅良君舉止齋王氏炎晦叔雙溪唐氏仲友與正金華葉氏適正則水心項氏安世平甫括蒼黃氏度文叔山陰鄭氏鍔剛中三山李氏舜臣子思隆山黃氏幹直卿勉齋輔氏廣漢卿慶源蔡氏沈仲默九峯楊氏復信齋秦溪楊氏簡敬仲慈湖慈溪一作沈氏清臣正卿晦巖遊氏桂元發廣安陳氏騤叔進天台易氏祓彥祥彥山齋一作章葉氏時秀發竹野顧氏元常平甫新定陳氏淳安卿北溪林氏椅奇卿沈氏煥晦叔四明邵氏淵作囦萬宗一金華徐氏自明誠甫永嘉戴氏溪少望肖岷隱一作望祝氏穆和父潘氏植子醇浦城張氏逸大隱莊氏夏子禮永春朝氏公武子止昭德趙氏汝騰茂實真氏德秀景元希西山一作元魏氏了翁華父鶴山王氏與之次點東巖范氏鍾仲和金華嚴氏粲坦叔華谷黃氏仲炎若晦永嘉李氏冶敬齋衛氏湜正叔崑山張氏虙四明陳氏埴器之潛室劉氏孟冶饒氏魯仲元魯齋王氏應麟伯厚深寧叟熊氏禾去非勿軒馬氏廷鸞翔仲碧梧朱氏申周翰建安林氏希逸鬳齋黃氏震東發慈溪陳氏振孫伯玉直齋家氏鉉翁則堂處士元馬氏端臨貴與鄱陽敖氏繼公君善長樂吳氏澄幼清臨川金氏履祥吉甫仁山熊氏朋來與可陳氏澔可大東匯程氏復心婺源陳氏櫟定宇新安彭氏應龍翼夫集齋戴氏侗彭氏亷夫虞氏集伯生邵庵李氏亷彭氏絲魯叔魯齋明劉氏基伯溫青田王氏褘子充金華汪氏克寬德輔環谷方氏孝孺希古正學邵氏寶國賢二泉邱氏濬仲深瓊山羅氏欽順允升整菴吕氏柟仲木涇野何氏孟春子元郴州魏氏校子才莊渠姚氏舜牧虞佐虞承庵一作揚徐氏師曾伯魯魯庵季氏本明德彭山王氏應電昭眀明齋鄧氏元錫汝極潛谷郝氏敬仲輿楚望吕氏坤叔簡新吾余氏心純葵明黃岡王氏圻洪州黃氏乾行玉巖張氏怡楊氏鼎熙緝庵芮氏城巖尹溧陽秦氏繼宗何氏兆清聖徵吳中湯氏三才中立丹陽盧氏翰孫氏佖眉山晏氏光李氏開去非小舟王氏石梁吳氏華張氏燧史氏駉孫毛氏信卿蔣氏君實胡氏迥王氏子墨董氏瑋王氏喬桂董氏師讓詹氏道傳董氏應㿩孫氏景南徐氏李氏虙氏張氏彭氏王氏許氏以上二十四人未詳世次今附於此欽定四庫全書欽定禮記義疏目録卷首聖制綱領卷一曲禮上第一之一卷二曲禮上第一之二卷三曲禮上第一之三卷四曲禮上第一之四卷五曲禮上第一之五卷六曲禮下第二之一卷七曲禮下第二之二卷八曲禮下第二之三卷九檀弓上第三之一卷十檀弓上第三之二卷十一檀弓上第三之三卷十二檀弓下第四之一卷十三檀弓下第四之二卷十四檀弓下第四之三卷十五王制第五之一卷十六王制第五之二卷十七王制第五之三卷十八王制第五之四卷十九王制第五之五卷二十月令第六之一卷二十一月令第六之二卷二十二月令第六之三卷二十三月令第六之四卷二十四月令第六之五卷二十五月令第六之六卷二十六曾子問第七之一卷二十七曾子問第七之二卷二十八文王世子第八之一卷二十九文王世子第八之二卷三十禮運第九之一卷三十一禮運第九之二卷三十二禮運第九之三卷三十三禮運第九之四卷三十四禮器第十之一卷三十五禮器第十之二卷三十六郊特牲第十一之一卷三十七郊特牲第十一之二卷三十八郊特牲第十一之三卷三十九內則第十二之一卷四十內則第十二之二卷四十一玉藻第十三之一卷四十二玉藻第十三之二卷四十三玉藻第十三之三卷四十四明堂位第十四卷四十五喪服小記第十五之一卷四十六喪服小記第十五之二卷四十七大傳第十六卷四十八少儀第十七卷四十九學記第十八卷五十樂記第十九之一卷五十一樂記第十九之二卷五十二樂記第十九之三卷五十三雜記上第二十之一卷五十四雜記上第二十之二卷五十五雜記下第二十一之一卷五十六雜記下第二十一之二卷五十七喪大記第二十二之一卷五十八喪大記第二十二之二卷五十九祭法第二十三卷六十祭義第二十四之一卷六十一祭義第二十四之二卷六十二祭統第二十五卷六十三經解第二十六哀公問第二十七卷六十四仲尼燕居第二十八孔子間居第二十九卷六十五坊記第三十卷六十六中庸第三十一之一卷六十七中庸第三十一之二卷六十八表記第三十二卷六十九緇衣第三十三卷七十奔喪第三十四問喪第三十五服問第三十六卷七十一間傳第三十七三年問第三十八卷七十二深衣第三十九投壺第四十儒行第四十一卷七十三大學第四十二卷七十四冠義第四十三昏義第四十四卷七十五鄉飲酒義第四十五射義第四十六卷七十六燕義第四十七聘義第四十八卷七十七喪服四制第四十九卷七十八禮記圖一卷七十九禮記圖二卷八十禮記圖三卷八十一禮記圖四卷八十二禮記圖五欽定四庫全書欽定禮記義疏卷首聖制天以隂陽五行化生萬物四時宣其氣百昌欣其榮而於穆不巳之理主宰其中者本至易而無難也地有山川河嶽涵負萬類飛走動息之各安其居發生長養之各順其序而安貞順應之德根柢其內者本至簡而無繁也樂由天作其極也如乾之易禮以地制其極也如坤之簡是故行綴兆興羽籥作鐘鼓非所謂易也而易在其中几筵升降酌獻酬酢非所謂簡也而簡寓其內本之於中者和而愛則聞其樂者皆知親其親本之於中者和而敬則見其禮者皆知尊其尊尊尊而親親易簡之本也故樂至則無怨禮至則不爭爭則由於不簡也怨則由於不易也豈所語於聖人之揖讓而治天下者耶夫不能極禮樂之至則不能易簡不能易簡則不能化成天下彼淫樂慝禮之日興無論矣即規規於器數儀文之末而不得其本原輒曰我能興禮樂也豈有當哉軒轅氏命伶倫取嶰谷之竹斷兩節而吹之以為黃鐘之宫制十二筒以聽鳯之鳴其雄鳴為六雌鳴亦六比黃鐘之宫而準隔八之法以相生六律之義所由昉也六律定而度量衡莫不定焉六律所以為萬事根本而黃鐘又六律之根本也蓋古之聖王其為民之計至深逺矣為之食以救其飢為之衣以禦其寒處之宫室以去其昏墊董之學校以化其澆漓猶恐其相欺也為之斗斛權衡以信之相奪也為之城郭甲兵以衛之司徒修六禮以節民性明七教以興民德大司樂以成均之義教王胄子與公卿大夫元士之適子及凡民之俊秀所以作君作師既富方穀者也然其法天時興地利導人和以興作勞息莫不以六律為之根本授時以厯而厯本於律齊民以政而政本於律是故分至寒暑之各應其時而歲月日時無差也九十分黃鐘之長一為一分各自其十以登於引則度之長短皆得也黃鐘之管容子穀秬黍中者一千二百為一籥十籥則合積而至於斛則量之多寡不忒也一籥之重十有二銖倍之則兩十六兩為斤三十斤為鈞四鈞為石則衡之重輕不爽也黃鐘正則六律正六律正則萬事成夫天下至大也萬事至紛也以一人齊萬事執此以往莫之或差也此古昔聖王所以能一道德同風俗也與月令所云來嵗之宜即象魏所布之政也先王治民原不期於朝令而暮改也宋室行新法舉周官一歲五歲三十歲皆有變更之法以附會其説謬矣天德王道其本一也一者何曰心而已聖人言王道必本諸一心然心不可以名象形不可以言語飾不可以事功論不可以鬼神惕蓋敬鬼神而逺之鬼神亦吾心中之一物耳論事功則唐太宗致治之盛幾於成康然於古聖王天德王道一以貫之者槩乎其未有聞也至於言語名象更為枝蔓其不可以徵心明矣故記言王道亦曰心無為也以守至正記曰人情者聖王之田蓋生民有欲無主乃亂上天眷命作之君師君師者所以裁成輔相而治其情者也得其道而理之則其情協拂其道而驅之則其情亂協則天下歸心亂則兆民背叛其機甚微而宗社之安危係焉故聖王之治人情猶農夫之治田聖王小心畏懼日昃不遑所以事上帝而畏民碞者凡以治人情而無鹵莽滅裂之患故大順大化淪肌浹髓萬世之業本於此焉夫惟施之也有次第是以其成功大而逺彼不以治理為心而耽晏安者是猶棄田而弗治而霸者假仁仗義以蘄速成者亦猶揠苖助長均為惑之甚矣神明而陽乾之屬也鬼暗而隂坤之屬也一陽來復子月天開先王於是乎行郊祀之禮以迓微陽記云禮行於郊而百神受職蓋陽氣方倡生物伊始也然禮本於天而成於地乾德統天併坤而有之使其稍有不協則於陽氣或悖而不足以發生物之機是故先王欽若昊天對越上帝則風雨節而寒暑時地且受職況百神哉禮者敬而已矣君子敬以直內如松柏之有心禮之用和為貴君子和以應物如竹箭之有筠以竹箭之筠較松柏之心心內而筠外也心為質而筠為文要之外根於內文本乎質君子之居心即所以應物也誠敬之至通於神人以之事天饗帝彼徒以威儀玉帛飾諸外者無其心矣遑問筠哉少儀云執虛如執盈入虛如有人蓋教人主敬之學也夫言主敬敬豈外來哉心與敬二則有時而敬有時而不敬又安能合盈虛有無而一之哉聖人教人常使人反身而誠誠在於身又焉用反此其義正與少儀相發明學者果能與敬合一則能合盈虛有無而一之不見有敬之可主况有不敬之事乎鼓無資於五聲五聲不能外鼓以成九奏之諧水無資於五色五色不能離水以成山龍之繪其在於人內而五常外而五倫其相接而為內外之樞以備具乎一身者莫若五官五官不能自治其治之者曰學學之道奈何亦惟推五常之性以接乎五倫之交俾無不得其宜而已夫五官質也雜乎氣質之緣則理欲半之盡其學之之道而恭從明聰睿之德雖聖賢不是過否則外物之交己私之錮有不可勝言者非如五聲無鼓五色無水徒紊其聲敗其色而已也則夫五官之於學豈不較聲之於鼓色之於水而更重哉學記曰先王之祭川也皆先河而後海君子之學何以異是滌性命之原返昭曠之本湛湛然出之無窮之府引之不竭之淵所以疏其源也逰之乎詩書之圃行之乎仁義之塗沛然其內充而外達也浩然其日引而月長也優遊漸進不舍晝夜而終必至乎大成所以竟其委也雖然疏其源而達其委者又豈有所作為也哉孟子曰如智者若禹之行水則無惡於智矣君子為學無躁進之志也無穿鑿之巧也順之以自然而待之以積久至於一旦豁然貫通則達海之𫝑有莫能禦者矣不然者無萬川之歸又安能不竭於尾閭之泄哉大禮與天地同節大樂與天地同和禮樂相資而成至道內以淑其身外以化其民皆猶二氣之保合獨陰不生獨陽不成也知此則知禮樂不可斯須離矣記曰報者天下之利夫君子不言利而天地聖人則以利為四德之一且以占天下之報者豈不曰報以天下則天下之報即天下之利以天下之利報天下天地聖人何容心乎故物之來者報之因其自然而各當其理各適其性此利之在我者也物之去也報之亦因其自然而各遂其生各觀其成此利之在物者也利在我而無我利在物而因物所謂以天下之報普天下之利也故廓然而大公物來而順應天地無心以萬物為心聖人無情以萬民為情報者天下之利蓋如是而已矣表記云君子淡以成夫有人已內外之見者不能淡者也君子內不見我外不見人與物無親而無物不親譬之於水無不淡也則無不以淡成也大而江河細而溝澮非水分也人自分也有分則人我立而水之淡終始無分也故曰君子如水水惟無已故以水為水可以水為醴亦可醴水之所成也小人者君子之所曲成也周之王業雖造於太王王季文武而開皇靈承天眷綿寶祚撫萬邦實由后稷教民稼穡肇祀上帝始之故惟后稷之祀易富亦惟后稷之祀難則也難則維何有后稷之德與誠則明水之薦可告馨香無后稷之德與誠則雖燦陳乎蒼璧黃琮備列乎鏞鐘賁鼓吾知神之不享矣古聖人先成民而後致力於神未有民不和而神降以福者后稷之詳穡事以供粢盛成民者至即所以事神者誠豈猶有致憾於未備哉逮其後周公作禮樂漸至文盛而大羮不和犧尊疏布羃樿杓猶祖述先人之意即以后稷所以事天者事后稷記稱武周為達孝蓋武周之孝自后稷之祀有以啓之矣君子求為己則不蘄人之譽求實得則不因有虛名而自止記曰貴玉而賤珉此物此志也小人之異於君子者有二庸懦無成者猶瓦缶之自棄假名要譽者猶以珉而亂玉君子依乎中庸溫其如玉人不知而不慍遁世而無悶亦如良玉之在璞已耳孔子欲待價而沽蓋求而不能待則玉已自失其美矣可不慎乎欽定四庫全書欽定禮記義疏卷首綱領一此篇論本經源流及本經精藴漢書藝文志曰禮古經五十六卷經十七篇朱子曰即今儀禮也記百三十一篇朱子曰七十子後學所記也眀堂陰陽三十三篇朱子曰古眀堂之遺事王史氏二十一篇朱子曰七十子後學者曲臺后蒼九篇如淳曰行禮射於曲臺后蒼為記故名曰曲臺記眀堂陰陽説五篇周官經六篇周官傳四篇顔氏師古曰即今周官禮也亡冬官以考工記充之劉氏歆曰易曰有夫婦父子君臣上下然後禮義有所錯而帝王質文世有損益至周曲為之防事為之制故曰禮經三百威儀三千北史儒林傳曰鄭康成為衆經注解易詩書禮論語孝經大行於河北自魏末大儒徐遵明兼通之其後三禮並出遵明之門徐傳業於熊安生後生能通禮經者多是安生門人諸生盡通小戴大抵南北所為章句好尚互有不同禮則同遵於鄭氏隋書經籍志曰髙堂生傳十七篇又有古經出於淹中蘇氏林曰淹中里名也而河間獻王好古愛學收集餘燼得而獻之合五十六篇並威儀之事至宣帝時后蒼最明其業乃為曲臺記蒼授梁人戴德及德從兄之子聖沛人慶普三家並立後漢惟曹充傳慶氏以授其子褒漢末鄭康成傳小戴之學後以古經校之取其於義長者作注為鄭氏學漢初河間獻王得仲尼弟子及後學者所記一百三十一篇獻之時亦無傳之至劉向考校經籍檢得一百三十篇向因第而敘之而又得明堂陰陽説三十三篇孔子三朝記七篇王氏史氏記二十一篇樂記二十三篇凡五種合二百十四篇戴德刪其煩重合而記之為八十五篇謂之大戴記而戴聖又刪大戴之書為四十六篇謂之小戴記漢末馬融傳小戴之學融又足月令一篇明堂位一篇樂記一篇合四十九篇而康成受業於融又為之注今周官六篇古經十七篇小戴記四十九篇凡三種惟鄭注立於國學其餘並多散亡又無師説孔氏穎達曰禮記之作出自孔氏但正禮殘闕無復能明故范武子不識殽蒸魯君及趙鞅謂儀為禮至孔子歿後七十二子之徒共撰所聞以為此記或録舊禮之義或録變禮所由或兼記體履或雜序得失故編而録之以為記也中庸是子思伋所作緇衣公孫尼子所撰鄭康成云月令吕不韋所修盧植云王制為漢文博士所録其餘衆篇皆如此例但未能盡知所記之人也六藝論云今禮行於世者戴德戴聖之學也戴德傳禮八十五篇則大戴禮是也戴聖傳禮四十九篇則此禮記是也儒林傳云大戴授琅琊徐氏小戴授梁人橋仁字季卿楊榮字子孫仁為大鴻臚家世傳業唐元行沖傳曰開元中魏光乘請用類禮魏徴傳徴以小戴禮綜彚不倫更作類禮二十篇列於經命行沖與諸儒作疏將立之學張説言戴聖所傳向已千載與經並立不可罷帝然之葉氏夢得曰禮家之學五傳弟子分曹教授蓋小戴最為後出而今之言禮者惟小戴為衆所宗此無他六經始出諸儒講習未精且未有他書以證其是非歷時既久諸儒議論既精而又簡書時出於山崖屋壁之間可以為證而學者得以考同異而長短見矣長者出而短者廢自然之理也鄭氏樵曰孝經疏曰經禮三百威儀三千禮記説曰正經三百動儀三千禮器曰經禮三百曲禮三千中庸曰禮儀三百威儀三千詳此諸文當時制作本有二書其三百篇者記言官府職掌上下之序其三千者皆委曲升降進退之辭漢世后蒼曲臺雜記數萬言在宣帝時立學官至鄭康成然後訓釋始具至孔穎達賈公彥而後疏始備孝宣立大小戴禮至平帝時復立逸禮世祖中興易尚書詩禮春秋凡十四博士漢法六經惟立學官然後開弟子員設射策科朱子曰案禮儀威儀小戴作經禮曲禮而中庸以禮經為禮儀所謂曲禮則皆禮之微文小節如今曲禮少儀內則玉藻弟子職篇所記事親事長起居飲食容貌辭氣之法制器備物宗廟宫室衣服車旗之等凡所以行乎經禮之中者其篇之全數雖不可知然條而析之亦應不下三千有餘矣大戴禮冗雜其好處小戴採來做禮記了然尚有零碎好處在陳氏振孫曰漢信都王太傅戴德延君九江太守聖次君皆受禮於后蒼謂大小戴禮者也漢初以來迄於劉向校定中書諸家所記殆數百篇戴德刪其煩重為八十五篇聖又刪為四十九篇今行於世而大戴實存四十篇意其闕者即聖所刪耶然哀公問投壺二篇與今禮記文不異他亦間有同者以上論本經源流司馬氏遷曰洋洋美德乎宰制萬物役使羣衆豈人力也哉余至大行禮官索隱曰大行秦官主禮儀漢景帝改曰大鴻臚觀三代損益乃知緣人情而制禮依人性而作儀其由來尚矣人道經緯萬端規矩無所不貫誘進以仁義束縛以刑罰故德厚者位尊祿重者寵榮所以總一海內而整齊萬民也是以君臣尊卑貴賤之序下及黎庶車輿衣服宫室飲食嫁娶喪祭之分事有宜適物有節文孔氏穎達曰夫禮者經天緯地本之則太一之初原始要終體之乃人情之欲夫人上資六氣下乘四序賦清濁以醇醨感陰陽而遷變故曰人生而靜天之性也感物而動性之欲也喜怒哀樂之志於是乎生動靜愛惡之心於是乎在精粹者雖復凝然不動浮躁者實亦無所不為是以古聖人鑒其若此欲保之以正直納之以德義故乃上法圓象下參方載道之以德齊之以禮禮者體也履也人之所生禮為大也非禮無以事天地之神辨君臣長幼之位是禮之時義大矣哉禮者理也其用以治則與天地俱興故左傳稱晏子云禮之可以為國也久矣與天地並但於時質略物生則自然而有尊卑若羔羊跪乳鴻雁飛有行列豈由教之者哉是三才既判尊卑自然而有但天地初分之後即應有君臣治國但年代綿逺無文以言司馬氏光曰禮之為用大矣哉用之於身則動靜有法而百行備焉用之於家則內外有別而九族睦焉用之於鄉則長幼有倫而俗化美焉用之於國則君臣有敘而政治成焉用之於天下則諸侯順服而紀綱正焉豈直几席之上户庭之間得之而不亂哉曾氏鞏曰夫禮者其本在於養人之性而其用在於言動視聽之間使人之言動視聽一於禮則安有放其邪心而窮於外物哉不放其邪心不窮於外物則禍亂可息而財用可充其立意微其為法逺矣故設其器制其物為其數立其文以待其有事者皆人之起居出入吉凶哀樂之具所謂其用在乎言動視聽之間者也然而古今之變不同而俗之便習亦異則法制度數其久而不能無弊者勢固然也故為禮者其始莫不宜於當世而其後多失而難遵亦其理然也失則必改制以求其當故羲農以來至於三代禮未嘗同也蓋上古聖人有為耒耜者或不為宫室為舟車者或不為棺椁至於後世有為宫室者不以土處為不可變也為棺椁者不以衣薪為不可易也豈好為相反哉以為人之所既病者不可因也又至於後聖則有設兩觀而更采椽之資攻文梓而易瓦棺之素豈不能從儉哉以為人情之所好者為之節而不能變也由是觀之古今之變不同而俗之便習亦異則亦屢變其法以宜之何必一一以追先王之迹哉其要在於養民之性防民之欲者本末先後能合乎先王之意而已此制作之方也故元樽之尚而薄酒之用大羮之先而庶饈之飽一以為貴本一以為親用則知聖人作而為後世之禮者必貴爼豆而今之器用不廢也先辨冕而今之衣服不禁也其推之皆然然後其所改易更革不至大拂天下之勢駭天下之情而固已合乎先王之意矣是以羲農以來至於三代禮未嘗同而制作之如此者未嘗異也周子曰禮理也樂和也陰陽理然後和君君臣臣父父子子兄兄弟弟夫夫婦婦萬物各得其理而後和故禮先而樂後張子曰禮記如中庸大學出於聖門無可疑者某舊多疑儒行今觀之亦多善處書一也已見與不見耳程子曰禮記雜出於漢儒然其間傳聖門緒餘其格言甚多如樂記學記大學之類無可議者檀弓表記坊記之類亦甚有至理惟知言者擇之如王制禮運禮器其書亦多傳古意若間居燕居三無五起之説文字可疑禮記除中庸大學惟樂記最為近道學者深思自得之禮記之表記其亦近道矣乎其言正古人自灑掃應對以至冠昏喪祭莫不有禮今皆廢壞禮之本出於民之情聖人因而導之耳禮之器出於民之俗聖人因而節文之耳聖人復出必因今之衣服器用而為之節文其所謂貴本而親用者亦隨時更斟酌而損益之耳天下無一物無禮樂且置兩隻椅子才不正便無序無序便乖乖便不和陳氏祥道曰先王之法以禮為本其宫室衣服車旗械用有等其冠昏喪祭朝聘射御有儀即器以觀理無非法象之所寓即文以觀義無非道義之所藏使人思之而知所以教守之而知所以禁奢者不得騁無度之心儉者不得就茍簡之節竒者不得以亂常邪者不得以害正此上下所以辨而民志所以定也周氏諝曰天秩有禮自我五禮有庸哉蓋其以欲滅命以人廢天者聖人不庸惟其天秩之所有是乃聖人之所庸者也鄭氏樵曰禮本於人情情生而禮隨之古者民淳事簡禮制未有然斯民不能無室家之情則冠昏之禮已萌乎其中不能無交際之情則鄉射之禮已萌乎其中不能無追慕之情則喪祭之禮已萌乎其中自是已還日趨於文燔黍捭豚足以盡相愛之禮矣必以為未足積而至於籩豆鼎俎徐行後長足以盡相敬之禮矣必以為未足積而至於賓主百拜其文非不盛也然即其真情而觀之則籩豆鼎俎未必如燔黍捭豚相愛之厚也賓主百拜未必如徐行後長相親之密也大抵禮有本有文情者其本也享食之文揖遜拜跪其本則敬而已喪紀之文劈踊哭泣其本則哀而已祭祀之文祼獻酬酢其本則誠而已即其本而觀之日用三牲可以為養啜菽飲水亦可以為養襲冒絞襟可以為葬斂手足形亦可以為葬庭實旅百可以為享瓠葉兔首亦可以為享區區之文不患其不該也有其本而無其文尚可以義起有其文而無其本則併與文俱廢矣何謂禮本情而已朱子曰有許順之者説人謂禮記是漢儒説恐不然漢儒最純者莫如董仲舒仲舒之文最純者莫如三䇿何嘗有禮記中説話來如樂記所謂天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉仲舒如何説得到這裏想必古來流傳得此個文字如此陳氏澔曰前聖繼天立極之道莫大於禮後聖垂世立教之書亦莫先於禮禮儀三百威儀三千孰非精神心術之所寓故能與天地同其節四代損益世逺經殘其詳不可得聞矣儀禮十七篇戴記四十九篇先儒表章庸學遂為千萬世道學之淵源其四十七篇之文雖純駁不同然義之深淺同異誠未易言也以上論本經精蘊綱領二此篇論本經義例及讀經方法仲氏長統曰周禮之經禮記之傳禮記作於漢儒雖名為經其實傳也陸氏德明曰此記二禮之遺闕故名禮記孔氏穎達曰上自遊夏之初下終秦漢之際其間岐途詭説雖紛然競起而餘風曩烈亦時或獨存於是博物通人知今溫古考前代之憲章參當時之得失是以所見各記舊聞錯綜鳩聚以類相附禮記之目於是乎在注者解書之名但釋義之人多稱為傳傳謂傳述為義或親承聖旨或師儒相傳故云傳今謂之注者謙也不敢傳授直注己意而已若然則傳之與注各出巳情皇氏以為自漢以前為傳自漢以後為注然王肅在鄭之後何以亦謂之傳其義非也吕氏大臨曰禮記皆孔子門人所傳授之書雜收於遺編斷簡者皆禮之變節也胡氏寅曰禮記出於孔子弟子必去吕不韋之月令漢儒之王制其次則經解儒行之類仍博集名儒擇冠昏喪祭燕射相見之禮典以類相從然後可為一書若中庸大學不可附之禮篇至於樂記表記學記坊記燕居緇衣格言甚多當為中庸大學之次禮運禮器玉藻郊特牲之類又其次也鄭氏樵曰三禮之學其所以訛異者其端有四有出於前人之所行而後人更之者如墨始於晉髽始於魯廟有二主始於齊桓朝服以縞始於季康以至古者冠縮縫今也衡縫同為一代而異制如此幸而遺説尚存得以推考因革之故設其不存則或同或異無乃滋後人之疑乎有出於聖人之門而傳之各異者如曾子襲裘而弔子遊裼裘而弔小斂之奠曾子曰於東方子遊曰於西方異父之服子遊曰為之大功子夏曰為之齊衰同師於夫子而異説如此況復傳之羣弟子之門人則其失又逺也從而信之則矛盾可疑從而疑之則其説有師承此文義不能無乖異也有後世諸儒損益前代而自為一代之典者如吕不韋作月令蓋欲為秦典故祭祀官名不純於周漢博士欲為漢制故封爵不純於古後世明知二書出於秦漢猶且曰月令為周制王制為商制況三禮之書所成者非一人所作者非一時又烏能使之無乖異也有専門之學欲自名家而妄以臆見為先代之訓者如春秋之末執羔執雁魯人已不自知則禮之所存蓋無幾也秦世灰滅殆盡漢世不愛髙爵以延儒生寧棄黃金以酬斷簡諸儒各述所聞雜以臆見而實未見古人全書故其説以霍山為南嶽以大尉為堯官以商之諸侯為千八百國以周之封域為千里者四十九以分陜處內為三公以大宰大宗大卜大士等為六官當時信其古書而無疑後世以其傳久逺而不敢辨又安能使之無乖異乎禮樂之訛以此後世議明堂或以為五室或以為九室或以為十二室議大學或以為五學或以為當如辟雍或以為當如膠庠或以為當如成均瞽宗夫明堂一也而制有三大學一也而名有六此何以使後世無疑哉有古文不通今多緣字以起義者如禮記謂禮者體也義者宜也如此類甚多有隨方訓釋取舍不同者土音不同而訓詁亦異是以熊安生本朔人則多用北音鄭康成本齊人則多收齊音陸德明本吳人則多從吳音鄭注經字有不安有曰當作當為之語有曰讀作讀如之語而不敢輕改聖賢之字朱子曰禮記是解儀禮如儀禮有冠禮禮記便有冠義儀禮有昏禮禮記便有昏義以至燕射之類莫不皆然儀禮禮之根本而禮記乃其枝葉禮記本秦漢上下諸儒解釋儀禮之書又有他書附益於其間今欲定作一書先以儀禮篇目置於前而附禮記於其後如射禮則附以射義似此類已得二十餘篇若其餘曲禮少儀又自作一項而以類相從若疏中有説制度處亦當採取以益之問吕祖謙三禮篇次曰儀禮附記上篇士冠禮冠義附士昏禮昏義附士相見禮鄉飲酒禮鄉飲酒義附鄉射禮射義附燕禮燕義附大射禮聘禮聘義附公食大夫禮覲禮儀禮附記下篇喪服喪服小記大傳服問間傳附士喪禮既夕禮士虞禮喪大記奔喪問喪曾子問檀弓附特牲饋食禮少牢饋食禮有司徹祭義祭統附禮記篇次曲禮內則玉藻少儀投壺深衣六篇為一類王制月令祭法三篇為一類文王世子禮運禮器郊特牲明堂位大傳與喪小記誤處多當釐正樂記七篇為一類經解哀公問仲尼燕居孔子間居坊記儒行六篇為一類學記中庸表記緇衣大學五篇為一類以上恐有未安幸更詳之語録賀孫因問祭禮附祭義如説孝許多如何來得曰便是祭禮難附兼祭義前所説多是天子禮若儀禮所存惟少牢饋食特牲饋食是諸侯大夫士禮兼是只是饋食若天子祭便合有初間祭腥等事如所謂建設朝事燔燎羶薌意欲將周禮中天子祭禮逐件作一總腦却以禮記附如疏中有説天子皆編出此書所係甚大小戴記之第一篇曲禮言委曲禮儀之事所謂曲禮三千者也其可隨事而見者已包在經禮三百篇之內矣此篇乃其雜碎首尾出入諸篇不可隨事而見者故合而記之自為一篇而又多為韻語使學者得以諷於口而存諸心蓋曲禮之記也第十二篇內則蓋古經也鄭氏以為男女居室事父母舅姑之法以閨門之內禮儀可則故曰內則今案此必古者學校教民之書宜以次於昏禮第十八篇學記言古者學校教人傳道授業之次第與其得失興廢之所由蓋兼大小學言之舊注多失其指第十七篇少儀言少者事長之節注疏以為細小威儀非也第三十一篇中庸程氏以為其書成於子思其言與大學相發明熹聞之先君子常以大學者此篇之户庭而此篇則大學之閫奧也第四十篇投壺第記主人與客燕飲投壺之禮鄭氏以為實曲禮之正篇其事與射相類於五禮屬嘉禮第四十二篇大學程氏以為孔氏之遺書也第四十三篇冠義蓋漢儒所造以釋冠禮之義第四十四篇昏義蓋漢儒所造以釋昏禮之義第四十五篇鄉飲酒義四十六篇射義亦漢儒所造燕義邦國禮聘義邦國禮凡解釋文字竊謂須只似漢儒毛孔之流略釋訓詁名物及文義理致尤難明者而其易明處更不須貼句相續乃為得體蓋如此則讀者看注即知其非經外之文却須將注再就經上理會自然思慮歸一功力不分而其玩索之味亦益深長矣馬氏廷鸞曰記不隨經注疏各為一書讀者不能遽曉此猶易之彖象文言繫辭各自為書鄭康成所以欲省學者兩讀而為今易也朱文公於禮書之離者合之於易書之合者離之是亦學者所當知也熊氏朋來曰漢儒於禮經輒改某字讀為某名如投壺二算為純則純為全就讀為全蓋因儀禮鄉射經文亦有二算為純注曰純猶全也一算為竒竒猶虧也今讀為全不聞讀奇為虧如此類甚多以上論本經義例荀氏況曰禮者法之大分羣類之綱紀也故學至於禮而止矣是之謂道德之極張子曰禮記大抵出於聖門二三子之傳講解各異故辭命不能無害至於禮文不可不信己之言禮未必勝如諸儒如有前後所出不同且闕之記有疑義亦且闕之就有道而正焉程子曰學禮者考文必先先王之意得意乃可以沿革子厚以禮教學者最善使學者先有所據守周氏諝曰禮記雜記先王之法言而尚多漢儒附會之疵此學者所宜精擇陸氏佃曰小禮之不謹大禮之所自亡也胡氏寅曰禮者其數可陳其義難知非仁且智則不能本人情而約之於中道也故或先王有之而不宜於今之世或古未之有而可以義起神而明之存乎其人而已鄭氏樵曰四十九篇之書雖雜出於諸儒傳記而不能悉得聖人之旨然其文繁其義博學者觀之隨其所入博而約之亦可弗畔未可以其言非盡出於夫子而輕議之也朱子曰凡禮有本有文自其施於家者言之則名分之守愛敬之實其本也冠昏喪祭儀章度數者其文也其本者有家日用之常體固不可以一日而不修其文又皆所以綱紀人道之始終雖其行之有時施之有所然非講之素明習之素熟則其臨事之際亦無以合宜而應節是以不可一日而不講且習焉也禮記須兼儀禮讀如冠禮喪禮鄉飲酒禮之類儀禮皆載其事禮記只發明其理讀禮記而不讀儀禮許多理皆無安著處禮記有説宗廟朝廷説得逺後不切於日用若欲觀禮須就禮記節出切於日用常行者如玉藻內則曲禮少儀看學者博學而無以約之則非學也何謂約禮是也禮者履也謂昔之誦而説之者至是可踐而履之也然古禮非必有經蓋先王之世上自朝廷下達閭巷其儀品有章動作有節所謂禮之實者皆踐而履之矣則豈必簡策而後傳哉其後禮廢儒者惜之乃始論著為書以傳於世今禮記四十九篇則其遺説己學而求所以約之者不可以莫之習也易曰知崇禮卑禮以極卑為事故自飲食起居灑掃咳唾之間皆有儀節聞之若可厭行之若瑣碎而不綱然惟愈卑故愈約與所謂極崇之知殆未可以差殊觀也夫如是故成性存存而道義出矣此造約之極功也項氏安世曰禮記諸篇有相抵牾者蓋諸家各記其師説如本朝諸臣之家喪祭之禮各成一書亦不能以相似也世之好禮者總而集之以資考證可也必欲曲為之説使貫為一家則妄也如檀弓之言喪或以為大功或以為齊衰或以為當使之喪或以為不當使之喪或以為可反或以為不可反如此類甚多惟其各載姓名故後人不以為疑而得置議論取舍於其間未有合為一説而並用之者也自餘諸篇不載姓名則遂以為皆古之成禮也而一切強解而曲通之可乎魏氏了翁曰人生而莫不有仁義之性存乎其心經禮三百曲禮三千聖人稟諸天道所以合內外之道而節文乎仁義者也學者誠能即是僅存之禮而推尋之內反諸心隨事省察充而至於動容周旋之會揖遜征伐之時則是禮也將以宅天衷而奠民極豈形器云乎哉衛氏湜曰凌節而求躐等而議越見聞以談卓約後學大患也矧會禮之家名為聚訟儻率意以去取其能息同異之辨絶將來之譏乎以上論讀經方法綱領三此篇論諸家醇疵及後代禮儀范氏蔚宗曰漢興諸儒頗修藝文東京學者亦各名家而章句多者或乃百餘萬言康成括囊大典網羅衆家刪裁繁蕪刊改漏失自是學者略知所歸王父豫章君李賢注蔚宗祖父寧字武子晉武帝時為豫章太守每考先儒經訓而長於康成常以仲尼之門不能過也及傳授生徒並専以鄭氏家法云孔氏穎達曰大小二戴共氏而分門王鄭兩家同經而異注爰從晉宋逮乎周隋其傳禮業者江左尤盛其為義疏者南人有賀循賀瑒庾蔚崔靈恩沈重宣皇甫侃等北人有徐遵明李業興李寶鼎侯聰熊安生等其見於世者惟皇熊兩家而已熊則違背本經多引外義又欲釋經文惟聚難義皇氏雖章句詳正微稍繁廣又既遵鄭氏乃時乖鄭義此皆二家之弊未為得也然以熊比皇皇氏勝矣雖體例既別不可因循今奉敕刪理乃據皇氏以為本其有不備以熊氏補焉唐書列傳曰孔穎達八歲就學誦記日千餘言暗記三禮義宗劉焯名重海內及請質所疑遂大畏服穎達與顔師古王恭等受詔撰五經義疏凡百餘篇名曰正義王恭講三禮别為義證甚精博宋史藝文志曰初禮記月令篇第六即鄭注唐明皇改黜舊文附益時事號御刪月令升為首篇集賢院別為之注厥後學者傳之而釋文義疏皆本鄭注遂有別注小疏者詞頗卑鄙淳化初李至復請行鄭注祕閣集議請如至奏鄭氏樵曰康成用功於六經深矣而後世獨取周禮禮記毛詩大扺鄭氏學長於禮而深於經制故先注禮而後箋詩至於訓詁又欲以一一求合於周禮不知詩人一時之言不可一一牽合也其注禮記以維申及甫為仲山甫泮宫為頒政教之宫至箋詩則以甫侯為吕侯頖宫為學宫出於一人而為二説蓋由注禮之時未見毛詩箋詩之時注禮已行不可追改箋詩之時方悟注禮之失安知他日不悟箋詩之失乎朱子曰禮記有王肅注煞好大史公樂書載樂記全文注家兼存王鄭如陸農師禮象陳用之禮書亦該博陳氏勝陸氏鄭康成是個好人考禮名數大有功王肅議禮必反康成魏徵以小戴禮綜彚不倫更作類禮二十篇數年而成太宗美其書録置內府今此書不復見甚可惜也二程與橫渠多是古禮溫公則大槩本儀禮而參以今之可行者要之溫本較穩若伊川禮則祭祀可用昏禮惟溫公者好楊氏復曰先生所定家鄉邦國王朝禮専以儀禮為經及自述家禮則又通之以古今之宜故冠禮則多取司馬氏昏禮則參諸司馬程氏喪禮則本之司馬氏後又以髙氏之書為最善及論祔遷則取橫渠遺命治喪則以書儀疏略而用儀禮祭禮則兼用司馬程氏而先後所見又有不同節祠則以韓魏公所行者為法若夫明大宗小宗之法以寓愛禮存羊之意此又家禮之大義所繫蓋諸書所未及而先生於此尤拳拳也朝氏公武曰禮記二十卷漢戴聖纂鄭康成注即所謂小戴者也禮記正義七十卷唐孔穎達等貞觀中奉詔撰禮記外傳四卷唐成伯璵撰義例兩卷名數兩卷雖以禮記為目通以三禮言之劉明素序張幼倫注唐月令一卷唐明皇刪定李林甫注序謂吕氏定以孟春日在營室不知氣逐閏移節隨斗建於是重有刪定景祐初改從舊文由是別行石經禮記二十卷偽蜀張紹文所書首之以月令議者謂經禮三百曲禮三千毋不敬一言足以蔽之故先儒以為首肆情變亂甚無謂也明道中庸解一卷程皓撰楊中立中庸解一卷楊時撰朝以道中庸解一卷遊定夫中庸解一卷藝閣禮記解十六卷吕與叔撰與叔禮學甚精博中庸大學尤所致意也三禮圖聶崇義纂集以鄭康成阮諶等六家圖刊定建隆二年奏之賜紫綬犀帶奬其志學竇儀為之序太常禮書一百五十卷陳祥道撰解禮之名物且繪其象甚精博丁丑三禮辨李心傳撰小戴之書疑者一百九十八鄭氏注疑者三百七十五各辨其所以而詳識之熊氏禾曰儀禮為六經之一大小戴記如春秋之左氏公穀乃其傳耳自安石廢罷儀禮但以小戴設科自是學者更不知有禮經文公晚年為經傳通解大綱細目具載歷門人黃勉齋楊信齋三世始克成書魏氏了翁曰平江衛氏正叔自鄭注孔義陸釋以及百家之所嘗講者會粹成書凡一百六十卷如范寧何晏例各記其姓名以聽覽者之自擇陳氏振孫曰吕與叔撰表記冠昏鄉飲酒鄉射燕聘義喪服四制凡八篇又有曲禮上下中庸緇衣大學儒行深衣投壺八篇此朱晦庵所傳本刻之臨漳射垜書坊稱藝閣吕氏即其書也方慤禮記解二十卷以王氏父子獨無解義乃取其所撰三經義及字説申而明之其所解文義亦明白馬睎孟禮記解七十卷亦宗王氏朱子曰方馬之解合當參考儘有説得好處不可以其新學而黜之也兼山中庸説一卷郭忠孝撰中庸集解二卷會稽石孰集凡十家之説晦庵為之序大學中庸章句或問各三卷晦庵撰復取石子重所集解刪其繁亂名以輯略曲禮學記口義各二卷戴溪撰中庸説項安世撰禮象十五卷陸佃撰以改舊圖之失陳祥道禮書百五十卷論辨詳博間以繪畫於唐代諸儒之論近世聶崇義之圖或正其失或補其闕衛氏湜曰漢鄭康成因盧植事馬融以禮記融植所考定並為之注唐孔穎達先與朱子奢李善信賈公彥柳士宣范義頵張權等取皇熊二家義疏刪定續與前修疏人及周元達趙君贊王士雄等覆更詳審為正義凡七十卷邱氏光庭書四卷托經典訓釋之不同復以經典證之中山成氏伯璵為禮記外傳四卷吳郡張氏幼倫注凡一百一十條雖舉禮記為目實兼三禮言之宋臨川王安石有禮記發明一卷長樂劉彝七經中義一百七十卷內禮記四十卷李氏格非有精義十六卷隨所見為之義橫渠張氏有記説三卷馬氏睎孟有解七十卷延平周氏諝解王制禮運禮器郊特牲玉藻學記樂記祭法祭義祭統經解哀公問仲尼燕居孔子間居中庸表記大學共十七篇不見於中興館閣書目山陰陸氏佃解禮四十卷又新説四卷嚴陵方氏慤有解義二十卷藍田吕氏大臨有禮解十卷館閣書目止一卷長樂陳氏祥道有講義二十四卷禮書百五十卷禮例詳解十卷案方馬陸三家書坊鋟板傳於世方氏最為詳悉有補初學然雜以字説且多牽合大為一書之纍間有與長樂陳氏講義同者馬氏陸氏皆略馬氏大學解義與藍田吕氏同朱文公或問以為吕氏今從之陸氏説多可取間有穿鑿亦字學誤之也廬陵胡氏銓有禮記傳十八卷石林葉氏夢得有解禮記十九篇其仲子模過庭録時有論説新安朱文公中庸大學章句或問之外其他説散見於語録儀禮經傳通解廣安遊氏桂為經學十二卷金華應氏鏞為纂義二十卷慶源輔氏廣取注疏及方馬胡陸諸家倣吕氏讀書記編集間有已説金華邵氏淵解曲禮王制樂記中庸大學五篇以上解義惟方氏胡氏始末全備自餘多不過二十篇或三數篇或一二篇或因講説僅十數篇其他如語録如文集凡有及於禮經可以開曉後學者裒輯編次粗已詳盡陳氏澔曰近世應氏集解於雜記大小記等篇皆闕而不釋噫愼終追逺其關於人倫世道非細故而可略哉以上論諸家醇疵班氏固曰秦燔詩書陳涉之王也魯諸儒持孔子禮器往歸之及髙帝圍魯魯中諸儒尚講習禮弦歌之音不絶豈非聖人遺化好學之國哉於是諸儒始得修其經學講習大射鄉飲之禮叔孫通作漢禮儀因為奉常諸弟子共定者咸為選首漢興言禮則魯髙堂生范氏蔚宗曰光武中興愛好經術先訪儒雅於是立五經博士各以家法教授禮大小戴太常差次總領焉中元元年初建三雍明帝親行其禮建初中大會諸儒於白虎觀考詳同異肅宗親臨稱制如石渠故事歐陽氏修曰自漢以來史官所記事物名數降登揖讓拜俯伏興之節皆有司之事耳所謂禮之末節也然用之郊廟朝廷自搢紳大夫從事其間者皆莫能曉習而天下之人至於老死未嘗見也況欲識禮樂之盛曉然諭其意而被其教化以成俗乎嗚呼習其器而不知其意忘其本而存其末又不能備具所謂朝覲聘問射鄉食饗師田學校冠昏喪葬之禮在者幾何自梁以來各立一家之學唐初即用隋禮太宗時房元齡魏徵等因隋之禮增以天子上陵朝廟養老大射講武讀時令納皇后皇太子入學太常行陵合朔陳兵大社等是為貞觀禮髙宗時又詔長孫無忌杜正倫李義府李友益劉祥道許圉師許敬宗韋琨等增之為一百三十卷是為顯慶禮其文雜以式令而義府敬宗方得幸多希旨傅會事既施行議者皆以為非詔復用貞觀禮由是終髙宗世貞觀顯慶二禮兼行而有司臨事逺引古義與二禮參考增損之無復定制開元十年以韋縚為禮儀使掌五禮王嵒疏請刪去禮記舊文而益以今事付集賢院議學士張説以為禮記不刊之書去聖久逺不可改易而貞觀顯慶禮前後不同宜加折衷詔徐堅李鋭施敬本撰述未就而鋭卒蕭嵩代鋭為學士奏王仲邱撰定一百五十卷是為開元禮由是唐之五禮之文始備而後世用之雖時小有損益不能過也貞元中王涇為郊祀録十卷元和中韋公肅又録開元以後禮文損益為禮閣新儀三十卷王彥威為曲臺新禮三十卷又採元和以來王公士民昏祭喪葬之禮為續曲臺禮三十卷嗚呼考其文記可謂備矣以之施於貞觀開元之間亦可謂盛矣而不能至三代之隆者具其文而意不在焉此所謂禮樂為虛名也哉宋史禮志曰宋太祖因太常聶崇義重集三禮圖詔詹事尹拙等儒學之士詳定之葉氏夢得曰國初循用唐開元禮舊書一百五十卷開寶初始命劉溫叟盧多遜扈蒙三人補緝遺逸通以今事為開寶通禮二百卷又義纂一百卷以發明其旨嘉祐初歐陽文忠公知太常禮院請續編以姚闢蘇洵掌其事為太常因革禮一百卷議者病其太簡元豐中蘇子容復議詳定禮文至大觀中始修之鄭達夫主其事然時無知禮舊人書成頗多抵牾後亦廢陳氏祥道曰先王之治以禮為本晚周而下先王之制寖以掃地天下學者亦失其傳故隨武子不知殽蒸孟僖子不知相禮范獻子不知問諱曾子不知奠方魯不知尚羔衛不知立市則時之知禮者蓋鮮矣漢興叔孫通之綿蕞禮儀徒規當時之近功而其法失於太卑魯二生之論禮樂必期百年然後興而其言失於太髙賈誼有修禮之議而困於絳灌曹褒有定禮之議而沮於酺敏傅咸極論於晉而誚於流俗劉蕡發策於唐而棄於一時繇漢以來千有餘歲禮之道終不眀禮之事終不行也朱子曰六經之道同歸禮樂之用為急遭秦滅學禮樂先壞漢晉以來諸儒補緝竟無全書其頗存者三禮而已周官一書固為禮之綱領至其儀法度數則儀禮乃其本經而禮記郊特牲冠義等篇乃其義疏耳前此猶有三禮通學究諸科禮雖不行而士猶得以誦習而知其説熙寧以來王安石變亂舊章廢儀禮而獨存禮記之科棄經任傳遺本宗末其失已甚而博士諸生又不過誦其虛文以供應舉至於其間亦有因儀法度數之實而立文者則咸幽冥而莫知其源一有大議率用耳學臆斷而已魏氏了翁曰河間獻王二戴馬鄭相與保殘補壞晉宋隋唐諸儒迭為發揮三禮得不盡亡自正義既出先儒全書泯不復見自列於科目博士諸生亦不過習其句讀以為科録計至金陵王氏又罷儀禮取士僅存周官戴記之科而士之習於禮者滋鮮就戴記而言如檀弓喪禮諸篇既指為凶事罕所記省則其所業僅一二十篇耳茍不得其義則又諉曰此漢儒之説也棄不復講所謂解説之詳僅有方馬陸陳諸家然而述王氏之説者也惟關洛諸大儒上接洙泗之傳乃僅與門弟子難疑答問而未及著為全書嗚呼學殘文闕無所因襲驅一世而冥行焉豈不重可歎哉明史禮志曰明太祖初定天下開禮樂二局廣徵耆儒分曹究討洪武二年詔諸儒臣修禮書明年告成賜名大明集禮其書準五禮而益以冠服車輅儀仗鹵簿字學音樂凡升降儀節制度名數纎悉畢具又屢敇議禮臣李善長傅瓛宋濂詹同陶安劉基魏觀崔亮牛諒陶凱朱升樂韶鳯李原名等編輯成集且詔郡縣舉髙潔博雅之士徐一夔梁寅周子諒胡行簡劉宗弼董彝蔡深滕公琰至京同修禮書以上論後代禮儀欽定禮記義疏卷首
