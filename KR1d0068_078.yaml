  text: 欽定四庫全書欽定禮記義疏卷七十八禮器圖一
  hash: sha256:6179d1ddf09c98f7579cd546fcda607f07300b2b5a3b223534016acd0785d718
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0068_WYG_078-1a}
body:
  text: 案日之行也自北而西厯南而東冬至在牽牛春分在婁夏至在東井秋分在角則婁井角以三仲月中言之斗以仲冬月本言之也其餘或舉月本或舉月末不必皆月中也虞書所言皆昏星故書于仲夏舉房心而月令舉亢書于仲秋舉虛而月令舉牛書于仲冬舉昴而月令舉壁則書之中星常在後而月令中星常在前蓋月令舉月本則書舉月中也月令之或舉朔氣或舉中氣猶書于七星或舉其名或舉其次皆互見也嵗之氣二十有四而候七十有二一月之內六候二氣朔氣常在前中氣常在後朔氣在晦則後月閏中氣在朔則前月閏朔氣有入前月而中氣常在是月中數周則為嵗朔數周則為年是年不必具四時而嵗必具十二月也案周之王畿與九服共方萬里故此九服除王畿之外每服言又方以别之畿者限也樹之封疆而限千里故曰王畿侯者候也為王斥候服者服事于王甸田也為王治田出稅男者任也為王任其職理采事也為王事民以供其上蠻者縻也以政教縻之又蠻服大司馬謂之要服要者以政令要束為義于四要之內方七千里故王制注云周公復唐虞舊域分其五服為九其要服之內凡七千里夷之一服在夷狄之中故以夷言之鎮服入夷狄又深故須鎮守之藩服者以其最在外為藩籬也案衛服之外聖人雖制其服而不必其來臣故武成洛誥康王之誥諸篇俱止言五服耳案詩曰邦畿千里春秋傳曰天子一圻周語曰規方千里則天子面五百里為王城百里為郊郊置六鄉七萬五千家而近郊之宅田士田賈田逺郊之官田牛田牧田任其餘地皆謂之郊以其與邑郊故也二百里為甸甸置六遂七萬五千家而公邑任其餘地謂之甸以甸法在是故也三百里為家削削所以封大夫與王子弟之尤疏者謂之削以其削于縣都故也四百里為邦縣所以封卿與王子弟之疏者謂之縣以其係于上故也五百里為邦都所以封公與王子弟之親者謂之都以其有邑都故也案此周制也周九服侯在畿外夏則五服甸在畿內也案禮記坊記曰制國不過千乘周禮大司馬凡令賦以地與民制之司馬法甸方八里出長轂一乘又成方十里出長轂一乘蓋乘者甸之賦甸者乘之地甸方八里據地言之成方十里兼溝塗言之其實一也諸侯地不過百里車不過千乘以開方之法計之方十里者為方一里者百方百里者為方一里者萬方一里者百其賦十乘方一里者萬則其賦千乘然賦雖至于千乘而兵不過三軍大國三軍次國二軍小國一軍惟天子則六軍大司馬云五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍出軍之法鄉為正遂為副則遂之出軍與鄉同公邑出軍亦與鄉同其公卿大夫采地則與鄉遂異故鄭氏注小司徒井十為通士一人徒二人通十為成革車一乘士十人徒二十人成十為終革車十乘士一百人徒二百人終十為同革車百乘士千人徒二千人此公卿大夫采地出軍之制也至其計地出軍之法則司馬法云九夫為井四井為邑四邑為丘馬一匹牛三頭四丘為甸出長轂一乘甲士三人步卒七十二人馬四匹牛十二頭此天子諸侯兵賦之通制也案周禮小司徒乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事匠人九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮王制方一里者為田九百畝方十里者為方一里者百為田九萬畝方百里者為方十里者百為田九十億畝方千里者為方百里者百為田九萬億畝凡四海之內斷長補短方三千里為田八十萬億一萬億畝方百里者為田九十億畝山陵林麓川澤溝瀆城郭宫室塗巷三分去一其餘六十億畝孟子曰方里而井井九百畝其中為公田八家皆私百畝同養公田公事畢然後敢治私事前漢志曰六尺為步步百為畝畝百為夫夫三為屋屋三為井井方一里是為九夫八家共之各受私田百畝公田十畝是為八百八十畝餘二十畝以為廬舍民受田上田夫百畝中田夫二百畝下田夫三百畝嵗耕種者為不易上田休一嵗者為一易中田休二嵗者為再易下田三嵗更耕之自爰其處農民戶一人受田其家衆男為餘夫亦以口受田司馬法六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為成成十為通通十為終終十為同蓋井方一里為九夫四井為邑邑方二里三十六夫十六井為丘丘方四里百四十四夫六十四井為甸甸方八里五百七十六夫二百五十六井為縣縣方十六里二千三百四夫一千二十四井為都都方三十二里九千二百一十六夫鄭康成以小司徒有邑甸縣都之別而其名與采邑同匠人有􅎌遂溝洫澮之制而多寡與遂人異故言都鄙采地制井田鄉遂公邑制溝洫賈公彥遂謂鄉遂及四等公邑皆用貢而無助也豈知先王之為井田也使所飲同井所食同田所居同㕓所服同事出入相友守望相助疾病相扶持鄉遂六軍之所寓豈各授之田而不為井法乎且大田之詩言曽孫來止而歌雨我公田遂及我私噫嘻之詩言春夏祈榖于上帝而歌駿發爾私終三十里亦服爾耕十千維耦周官遂人言興鋤旅師有鋤粟此非鄉遂井田之事乎載師所徴之賦非一夫受田之法而甸稍縣都皆無過十二則采地固有不為井田者矣觀二百一十國謂之州而五黨亦謂之州萬二千五百家謂之遂而一夫之間亦謂之遂王畿謂之縣而五鄙亦謂之縣縣都之名豈特施于采邑已哉又案周禮遂人十夫有溝即一井九夫之地百夫有洫即井十為通九十夫之地千夫有澮即通十為成九百夫之地萬夫有川即成十為終九千夫之地而云十夫百夫千夫萬夫者皆舉成數也遂人凡治野節首言治野末言以達于畿則此溝洫之制自四郊達于王畿皆然推此內而六鄉外而侯國其溝洫之制一準乎此可知矣蓋此溝洫即井田之溝洫而周人井田之制自鄉遂而都鄙而邦國無二法也康成乃分井田溝洫為二法而謂鄉遂用貢法十夫有溝都鄙用助法八家同井不知小司徒言井牧其田野不分鄉遂都鄙而遂人掌溝洫之制言以達于畿則亦兼都鄙孟子曰鄉田同井鄉亦未嘗不井授矣案建國之法前朝後市左右三㕓朝有三一曰外朝二曰治朝三曰內朝周禮宰夫掌治朝之法以正王及三公六卿大夫羣吏之位司士掌之辨其貴賤之等小司冦掌外朝之政以致萬民而詢國危國遷與立君焉大僕王眂燕朝則正位掌擯相王不眂朝則辭于三公及孤卿天子外朝在庫門之外治朝在路門之外燕朝在路門之內諸侯亦有路寢有外朝則文王世子所謂內朝玉藻所謂路寢也市以應天市之象內宰佐后立市設其次置其敘正其肆陳其貨賄出其度量淳制大市日昃而市百族為主朝市朝時而市商賈為主夕市夕時而市販夫販婦為主其中有肆有思次有介次物有不中度者市不得鬻法至嚴也㕓有市㕓有民㕓市㕓者即貨物所聚之地四面有門每日市門開則商賈皆集退則閉之非民廛也民㕓則在王宫之左右各有三所周官載師所謂以㕓里任國中之地是也何休范寧趙岐皆云在邑廬舍二畝半合在野之二畝半為五畝也詩云上入執宫功者此也蓋古人立國都亦用井田之法畫為九區中間一區為王宫前一區為朝而左宗廟右社稷在焉後一區為市而商賈百物聚焉左右各三區皆民所居為民㕓君立朝而后立市固以寓先義後利之權君主中而市㕓皆居外又以見居重馭輕之勢也案楊氏復曰考工記謂眀堂五室大戴禮謂為九室二説不同愚謂五室取五方之義也九室則五方之外必備四隅也九室之制視五室為尤備然王者居眀堂必順月令信如月令之説則為十二室乎惟朱子眀堂圖謂青陽之右個乃眀堂之左個東之南即南之東眀堂之右個乃總章之左個南之西即西之南總章之右個乃玄堂之左個西之北即北之西玄堂之右個乃青陽之左個北之東即東之北但隨其時之方位開門耳大廟大室則每時十八日居焉古人制事多用井田遺意此恐然也考工記周人眀堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵案考工言五室象五行之方位有五方則有四隅不言可知也朱子謂三間九架者指五方四隅凡有九室之大略也又案自古眀堂之制神農時曰天府黃帝曰合宫堯曰衢室舜曰總章夏曰世室殷曰重屋周曰眀堂此其名之不一也淳于登以為在國南三里韓嬰以為在國南七里宇文愷以為在國之內鄭康成以為在國之陽此其地之不一也考工記以為五室月令以為四堂十二室大戴禮以為九室三十六戶七十二牖公玉帶以為一殿居中環以復道此其制之不一也黃帝以之祀上帝堯舜以之祀五帝周以之祀文王鄭康成以為祭五人帝摯虞以為祭五天帝此又所祭之不一也要而論之眀堂者王者所居以出教令之堂也王者朝諸侯頒政令于此而嚴父配天之特典亦即于此交神眀焉非如左廟右社及有昭穆之宗廟也鄭氏乃以為或舉宗廟或舉王寢或舉眀堂為互言之詞蔡雍又謂眀堂大廟辟雍同實異名豈其然哉案大司徒設社稷之壝郊特牲云君南鄉于北墉下注以為社內之北墻大司徒疏謂中有壇壇四面有壁壁外有壝此禮書所謂其壝北面也又小宗伯左宗廟右社稷注謂庫門內雉門外之左右蓋注以雉門為中門也白虎通曰天子社廣五丈禮書方廣五丈諸侯半之其色東方青南方赤西方白北方黑冒以黃土記謂大社必受霜露風雨以達天地之氣故不屋勝國之社則屋之其祭也賈疏以為同壇共位禮書以為社東稷西以理論之社稷本二神則禮書説為是又鄭康成以社用石禮書云議者謂社主長五尺方二尺剡其上以象物生方其下以體地體埋其半以根在土中而本末均此臆論也夫石為地類先儒謂社主石為之長石過尺五寸蓋有所傳然也案廟説為禮家聚訟之門今依朱子説圖之以為折衷據朱子云廟制皆于中門外之左各有寢廟別有門垣大祖在北左昭右穆以次而南晉博士孫育議天子大祖百世不遷一昭一穆為宗亦百世不遷宗亦曰祧亦曰世室二昭二穆為四親廟髙祖以上親盡則毁而遞遷昭常為昭穆常為穆諸侯則無二宗大夫則無二廟謂髙曽廟其遷毁之次則與天子同儀禮所謂以其班祔檀弓所謂祔于祖父者也三代之制其詳雖不得聞然其大略不過如此今由朱子説推之則五廟以下及劉歆九廟之説其制大概可知矣又案王制云天子七廟三昭三穆與大祖之廟而七鄭注以為大祖及文武二祧與親廟四為七廟韋玄成主其説而劉歆則謂七者其正法數可常數者宗不在此數中班固以劉説為是朱子雖兩存其説而曰前代説者多是劉歆愚亦意其或然據此則以一昭一穆為宗亦曰世室之説未為朱子定論案天子七廟一壇一墠諸侯五廟一壇一墠大夫三廟一壇起土曰壇除地曰墠傳記皆不言其所禮記圖説載之大廟之西穆祧廟之北墠又在壇之西北于經無據據祭法壇墠有禱焉祭之又據金縢周公自以為功為三壇同墠此所謂禱也禱而特為之壇墠則平時無此禱始為之其地當去廟不逺但不敢以臆斷特別圖之案禮記祭法天子七廟諸侯五廟大夫三廟適士二廟官師一廟庶人無廟昭穆各如其數朱子曰今且假諸侯之廟以眀之蓋周禮建國之神位左宗廟則五廟皆在公宫之東南矣其制則孫育以為外為都宫大祖在北二昭二穆以次而南是也蓋大祖之廟始封之君居之昭之北廟二世之君居之穆之北廟三世之君居之昭之南廟四世之君居之穆之南廟五世之君居之廟皆南向各有門堂寢室而墻宇四周焉大祖之廟百世不遷自餘四廟則六世之後每一易世而一遷其遷之也新主祔于其班之南廟南廟之主遷于北廟北廟親盡則遷其主于大廟之西夾室而謂之祧凡廟主在本廟之室中皆東向及其祫于大廟之室中則惟大祖東向自如而為最尊之位羣昭之入乎此者皆列于北牖下而南向羣穆之入乎此者皆列于南牖下而北向蓋羣廟之列則左為昭而右為穆祫祭之位則北為昭而南為穆也案廟室形方南向外戶重簷內牖復墻主東向內戶東南羣廟以左右為昭穆是合都宫五廟而言廟乃是不動者祫祭以南北為昭穆是專就大廟室中羣廟之主而言此神主是祫祭時于各廟中請入來者此諸侯廟制也上而天子下而大夫士皆可倣此推之案朱子曰王宫之外門五一曰皋門二曰庫門三曰雉門鄭康成以雉門在庫門內而設兩觀四曰應門五曰路門又曰畢門亦曰虎門其朝在雉門之外者曰外朝在路門之外者曰治朝路寢之廷曰內朝鄭康成小司冦注以外朝在雉門之外朝士注又疑外朝在庫門之外皋門之內蓋因雉門外有宗廟社稷故疑不得置外朝不知外朝為致民三詢之地雉門為人民觀法之區則外朝當在雉門之外故依鄭前注及朱子説以圖之又爾雅觀謂之闕是劉熙釋名所謂在門兩旁中央闕然為道也據春秋定公二年雉門及兩觀災則雉門本有門觀在門外兩旁耳諸侯亦有三朝而無應門皋門外朝在庫門內內朝在雉門內路寢朝在路門內案覲禮天子設斧依于戶牖之間鄭注云依如今綈素屏風也有繡斧文所以示威也斧謂之黼賈疏云爾雅牖戶之間謂之扆以屏風為斧又置于依地孔安國顧命傳云扆屏風畫為斧文置戶牖間是也漢時屏風以綈素為之綈赤也素白也象古者白黑斧文也案扆或作依言其有所依也黼作斧言其有所斷也凡朝于寢覲于廟射于郊學朝于眀堂皆于戶牖之間設之又考士虞禮佐食無事出戶負依南面蓋諸侯至士皆有依焉其畫與否則未之聞耳案陳氏祥道曰爾雅柣謂之閾棖謂之楔樞謂之椳樴謂之杙在地謂之臬又曰橛謂之臬蓋介于門者榍也亦曰柣曰閾中于門者兩門之中也閫也亦曰闑曰橛旁于門者楔也亦曰棖又月令曰以修闔扇爾雅曰闔謂之扉則扇也闔也扉也其實一也案鄭康成曰中門棖闑之中央則一門之中也故士冠禮以門中為闑西又孔疏云闑為門中所竪短木今依疏圖之案王制天子曰辟雍諸侯曰頖宫鄭注尊卑學異名辟眀也雍和也所以眀和天下也頖之言班也所以班政教疏云眀和天下者謂于此學中習學道藝使天下之人悉皆眀達諧和也頖是分判之義故為班于此學中施化使人觀之故曰以班政教也案雍澤名朱子詩注曰辟雍天子之學大射行禮之處也水旋丘如璧以節觀者故曰辟雍泮宫泮水之宫也諸侯之學鄉射之宫謂之泮宫其東西南方有水形如半璧以其半于辟雍故曰泮水而宫亦以名也考辟雍古無此名其制始于文王及周有天下遂以名天子之學而諸侯不得立焉形則辟雍圓而泮宫半之周立四代之學而此則其所謂周學也案周官典瑞王搢大圭考工記玉人大圭長三尺杼上終葵首注杼殺也終葵椎也為椎于杼上示無所屈也玉藻天子搢珽方正于天下也禮器大圭不琢孔疏曰大圭天子朝日月之圭也尚質之義但杼上終葵首而無琢桓蒲之文也陳氏祥道曰王朝日禮神執鎮圭而搢大圭既禮神矣宜置鎮圭而用大圭也且執鎮圭而搢大圭殆所執者摯而所搢者笏與案此五玉即五等諸侯所執者虞書所輯之五瑞也公執桓圭侯執信圭伯執躬圭子執榖璧男執蒲璧桓圭周禮疏云桓若屋之桓楹桓宫室之象所以安其上也四植謂之桓柱之竪者竪之則有四稜也桓圭蓋以桓為瑑飾長九寸信圭躬圭皆長七寸周禮注云信當作身皆象以人形為瑑飾欲其慎行保身陸氏佃不取其説特謂信圭直躬圭屈耳信伸也伯次于侯故少屈焉榖璧蒲璧周禮注云榖所以養人蒲為席所以安人蓋以榖蒲為瑑飾皆徑五寸不執圭者未成國也大宗伯云七命賜國子男五命故云未成國也案圭者長方上鋭璋者半于圭琥為虎形璜則半環之象也諸侯朝王以圭朝后執璋玉之貴者不以他物儷之故謂之特周禮小行人掌合六幣圭以馬璋以皮然皮與馬皆不升堂惟圭璋特升于堂亦特之義也琥璜二玉下于圭璋不可専達必待用爵將之蓋天子享諸侯及諸侯自相享至酬酒時則以幣將送酬爵又有琥璜之玉以將幣故云琥璜爵也案圭瓉聶氏崇義曰玉人云祼圭尺有二寸有瓉瓉如槃大五升口徑八寸深二寸其柄用圭有流前注流謂鼻勺流凡流皆為龍口又案大雅旱麓箋云圭瓉之狀以圭為柄黃金為勺青金為外朱中央凡圭博三寸圭柄金勺牝牡相合處各長可三寸厚一寸博二寸半流道空徑可五分後鄭云圭瓉以酌鬱鬯而獻尸也案士昏禮納徴主人受幣士相見禮執幣不趨聘禮有書幣陳幣展幣受幣送幣有束帛加璧公食大夫有侑幣覲禮侯氏送幣周禮小宰凡祭祀皆贊玉幣爵之事大宗伯用幣之禮各放其器之色宗廟則玄纁雜焉聘禮則制玄纁焉巡狩則用制幣焉食有侑幣饗有酬幣燕無幣而詩曰承筐是將則燕亦有酬幣矣禮記雜記曰納幣一束束五兩兩五尋八尺曰尋五尋為匹每匹從兩端卷至中為一兩五兩十卷為一束鄭注四十尺謂之匹古人每匹作兩箇卷子猶匹偶也案羔鴈雉三者虞書所謂二生一死士相見禮冬用雉夏用腒雉以初死者言腒則乾雉也羔鴈飾之以布維之以索布有繢者孔疏以為畫雲氣其飾據士相見禮有四維結面之文則其布當方也纓為馬鞅孔疏謂即繁纓案禮記玉藻云卜人定龜史定墨君定體周禮卜師掌開龜之四兆一曰方兆二曰功兆三曰義兆四曰弓兆龜人掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁屬南龜曰獵屬北龜曰若屬凡取龜用秋時攻龜用春時菙氏掌共燋契以待卜事凡卜以眀火爇燋遂吹其焌契以授卜師蓋燋者然火之炬也契者灼龜之木也契謂之焌亦謂之楚焞楚其材也焞其體也契其用也焌與焞其名一也契與作其義一也凡卜必以墨畫龜以求吉兆乃鑽之以觀其所拆若從墨而拆大謂之兆廣若裂其旁岐細出則謂之璺拆璺音問器破而未離之名體者兆象之形體定者決定其吉凶也案周書洪範稽疑用筮士冠禮喪禮特牲少牢俱用筮人有執䇲抽櫝執櫝擊筮釋櫝立筮受命櫝筮之儀所以筮易而決疑也古筮法見于傳記有以前卦統後卦者有以後卦斷前卦者有兼二卦言之者有専一卦決之者吉凶在人不可為典要也周禮有連山歸藏周易三易之法儀禮有立筮坐筮之儀天子蓍長九尺諸侯七尺大夫五尺士三尺案周禮司几筵五几曰玉几雕几彤几漆几素几書顧命四几曰華玉几漆几文貝几雕玉几王設几于左右優至尊也諸侯于祭祀陰事則右之于筵賔陽事則左之儀禮士昏士虞少牢有司徹皆設几且吉事尚文而几必變凶事尚質而几常仍授者拜而送之受者拜以答之執者或橫而或中受者或于足或于手避者或以几避或不以几避事親者奉而不傳敬長者摻以從之是皆稱情以為文之道也又案阮氏圖云几長五尺馬融則云長三尺未知孰是竊謂几由手授則馬説為長案周書王牖間見羣臣朝諸侯則重篾席桃枝席黼純黼同斧繡斧黑白采純緣也西序旦夕聽事則重底席蒲席綴純雜采東序養老饗羣臣則重豐席傳謂筍席陳氏師凱曰下有筍席此當為莞席畫純五色雲氣西夾親屬私燕則重筍席以蒻竹之皮為之玄紛純則王席皆二重周禮司几筵王朝覲大祭祀封國命諸侯及昨席皆莞筵蒲筵紛純加繅席削蒲蒻展之編以五采畫純加次席桃枝席有次列成文黼純凡三重諸侯祭祀蒲筵繢純對方色加莞筵紛純昨席筵國賔莞筵紛純加繅席畫純皆二重王甸役則熊席喪事則葦席其柏注作椁席則雈黼純􅍉細于葦諸侯則紛純儀禮鄉飲鄉射皆蒲筵緇布純燕禮注賔席準鄉飲君席準諸侯昨席卿席如賔而重大射賔有加席公食大夫記賔席亦準鄉飲而特言常丈六尺又加雈席尋八尺玄帛純上大夫蒲筵加雈席純如下大夫注謂孤為賔如司几筵國賔席士虞禮有葦席厞亦用席禮器有越席蒲席郊特牲有蒲越藳鞂疏云今禮藳鞂祭天蒲越祭地玉藻有蒯席菲草席要之席緣必華于席以飾必尚文也加席上席必華于下席上尊也故禮書云席莫貴于次席而次席黼純則斷割之義惟王所獨是也又席有上下公食大夫疏所謂織之自有首尾可為識記是也又曲禮注云常席四人賔席一人席之大概如此其用之有單有重有加皆于分之尊卑辨之然司几筵王有莞繅次蒲熊五席而所設止有莞繅次三重諸侯所設亦各二重而郊特牲乃云天子之席五重諸侯三重彼此互異故賈疏以郊特牲為大祫之席也然據郊特牲又言大饗君席三重則不止于祫矣大夫再重故鄉飲鄉射遵者及燕禮大射卿皆重其燕禮大夫不重者大夫之席繼賔賔席不重故大夫亦不重也公食聘賔其重宜矣其大夫不重為賔降也而君亦有為聘賔降者郊特牲所謂三獻之介君専席而酢焉是也又禮器云鬼神之祭單席故司几筵葦席士虞禮室中之席皆不言加其蒲越藳鞂亦不加可知餘居恆坐席亦不加賔至則加故曲禮曰客徹重席又據鄭注云鋪陳曰筵藉之曰席賈疏云初在地一重謂之筵重在上者謂之席故諸經加席為席也然士冠禮單席亦曰就筵是對文則筵席別散文則通也又據禮器孔疏謂儀禮一種席皆稱重故燕禮注云重席重蒲筵所以鄉射大夫辭加席亦是一種席稱加者以上云公三重大夫再重故變云加是可知重與加之分非定論也且至云席有兩則稱兩重席有一則稱一重席一重席之説于經無考又據公食記云蒲筵常加雈席尋則加席視下席為窄蓋以眀著其為加耳禮書云筵席之制短不過尋長不過常中者不過九尺考工記匠人度九尺之筵是也純緣之制上不過黼下不過緇布是矣抑不知席之制亦尊不過次卑亦不過蒯衽亦席類禮書云衽於文從衣與簟不同然不可考矣又案席必有織組文公食禮云皆卷自末注以末為經之所終則其經緯可識但其制莫詳故以一席概之欽定禮記義疏卷七十八
