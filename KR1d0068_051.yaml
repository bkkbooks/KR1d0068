body:
  text: 樂記第十九之二昔者舜作五弦之琴以歌南風夔始制樂以賞諸侯案樂也者施也二節當在此節之上脫簡在後正義鄭氏康成曰夔欲舜與天下之君共此樂也孔疏夔欲天下同行舜道故歌此南風以賞諸侯南風長養之風也其辭未聞孔疏案聖證論引尸子及家語云昔者舜彈五弦之琴其辭曰南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮鄭云其辭未聞失其義也案馬昭云家語王肅所增加非鄭所見又尸子雜説不可取證正經故言未聞也夔舜時典樂者也書曰夔命汝典樂孔氏頴逹曰自此至知其行也特明聖人制樂以賞諸侯其功大者其樂備五弦謂無文武二弦唯宫商等之五弦也案世本云神農作琴今云舜作者正用此琴特歌南風始自舜耳或五弦始舜也王氏應麟曰五音十二律古也舜彈五弦之琴以歌南風是琴之全體具五音也琴之有少宫少商則不復有琴樂之有少宫少徴則不復有樂以繁脆唯殺之調皆生於二變也存疑鄭氏康成曰南風言父母之長養已孔疏南風詩名南風長養萬物而孝子歌之言己得父母生長如萬物得南風生也舜有孝行故以此五弦之琴歌南風之詩而教天下之孝也辨正輔氏廣曰鄭氏以為舜歌父母之德如南風家語所載之辭則以為解民愠阜民財疑家語所載必有據南風長養萬物猶人君長養萬民舜為天子而歌此以為樂則諸侯之君民者亦當法舜之德體南風之意以長養其民故夔因其歌而寫之於金石絲竹當時諸侯有養民之德者則以樂賞之也故天子之為樂也以賞諸侯之有德者也德盛而教尊五榖時熟然後賞之以樂故其治民勞者其舞行綴逺其治民逸者其舞行綴短故觀其舞知其德聞其諡知其行也舞行户剛反其行下孟反正義鄭氏康成曰民勞則德薄酇相去逺孔疏酇謂酇聚舞人行位處立表酇以識之舞人少也民逸則德盛酇相去近舞人多也諡行之迹也王氏肅曰逺以象民行之勞近以象民行之逸孔氏穎達曰此明諸侯德尊樂備舞具綴謂酇也逺是舞者外營域行列之處若諸侯治理於民使民勞苦者由君德薄賞之以樂其舞人相去行綴逺由人少舞處寬也諸侯治理於民使逸樂由君德盛故賞之以樂舞人相去行綴短由人多舞處狹也舞處之綴一種但人多則去之近人少則去之逺觀其舞之逺近則知其德之薄厚由舞所以表德也又以諡比擬其舞聞諡之善否知其行之好惡由諡所以迹行也陳氏祥道曰諸侯德盛而教尊五榖時熟然後天子賞之以樂者以其人事修於下天時應於上然後可以樂其樂也陳氏暘曰周官大胥以六樂之會正舞位小胥巡舞列經曰行其綴兆行列得正焉蓋位則酇也所以為綴列則佾也所以為行治民勞者酇逺而佾寡德殺故也治民逸者酇近而佾多德盛故也馬氏睎孟曰德大者然後得其樂之備德小者則雖有常數而不得備故其治民之勞逸者其舞所以不同也上言舜歌南風夔始制樂言其樂之聲下言其舞行綴逺綴短者言其樂之容舞者德之發德者舞之藴故觀舞可以知德諡者行之賔行者諡之主故聞諡可以知行其意主於舞而繼之以聞諡者所以詳之也存異輔氏廣曰治民勞謂勞於治民者治民逸謂逸於治民者行綴逺則氣舒行綴短則氣促上勤則下紓上逸則下促應氏鏞曰勤於治民則德盛而樂隆故舞列逺而長怠於治民則德薄而樂殺故舞列近而短案鄭孔於其治字略讀民勞謂民猶勞苦輔應以治民勞連解謂勤於治民二説相反然樂舞在庭其庭廣狹有定鄭謂人多而相去近人少而相去逺訓綴字甚明輔應諸説非也且怠於治民民心愁怨無制樂賞之之理大章章之也咸池備矣韶繼也夏大也殷周之樂盡矣韶上遙反正義鄭氏康成曰大章堯樂名言堯德章明也周禮闕之或作大卷咸池黃帝樂名咸皆也池之言施也言德之無不施也周禮曰大咸韶舜樂名韶之言紹也言舜能繼紹堯之德周禮曰大韶夏禹樂名言禹能大堯舜之德周禮曰大夏殷周之樂盡矣言盡人事也周禮曰大濩大武孔氏頴逹曰此論六代之樂咸池備矣言黃帝之德皆施被天下無不周遍是為備具也自夏以前皆以文德王天下殷周二代惟以武功為民除殘暴民得以生人事道理盡極矣陳氏暘曰舜紹堯之俊德而以后夔作韶禹成治水之大功而以臯陶作夏成湯能護民於塗炭故伊尹為之作濩武王以武定禍亂故周公為之作武是帝樂莫備於堯舜而王樂至三王無餘藴矣通論熊氏安生曰案樂緯云黃帝曰咸池帝嚳曰六英顓頊曰五莖堯作大章舜曰簫韶禹曰大夏商曰大濩周曰大武禮樂志云顓頊作六莖帝嚳作五英與樂緯不同其餘無異名曰六英者宋均注云為六合之英華五莖者能為五行之道立根莖也孔氏頴達曰案司樂注云湯德能使天下得其所是其德也元命包曰湯之時民樂其救之於患害故曰濩救也由救之故民得所義亦通也大武武王樂也以武取定天下周公制焉案此篇名樂施言德施至堯而備舜亦繼堯所施禹亦大堯所施至殷周而繼治以文戡亂以武所施於民者盡矣存疑鄭氏康成曰咸池堯增修而用之孔疏咸池雖黃帝之樂至堯之時更增改修治而用之故此文次在大章之下至周謂之大咸其黃帝之樂堯不增修者至周謂之大卷更加以雲門之號故周禮雲門大卷在大咸之上也案咸池為黃帝樂而記乃列之大章之後故鄭以堯時增改言之然無可考姑存以備參天地之道寒暑不時則疾風雨不節則飢教者民之寒暑也教不時則傷世事者民之風雨也事不節則無功然則先王之為樂也以法治也善則行象德矣飢居祈反正義鄭氏康成曰教謂樂也以法治以樂為治之法行象德民之行順君之德也王氏肅曰以法治作樂所以法治其行也君行善即臣下之行皆象君之德孔氏穎達曰此明樂之為善樂得其所則事有功也以法治者言先王作樂以為治為法若樂善則治得其善若樂不善則治乖於法前文教不時則傷世事不節則無功是也人君為治得其所教化美善則下民之行法象君之德也張氏守節曰此明施樂須節也寒暑天地之氣若寒暑不時則民多疾疫風雨天事也風雨有聲形故為事若飄灑凄厲不有時節則榖損民飢樂以氣和民心如天地寒暑以氣生化故謂樂為民之寒暑也禮以形教故曰事天地之以風雨奮潤萬物猶以禮安治萬民故謂禮為萬民之風雨也陳氏暘曰一隂一陽天地之道也運而為四時則寒暑相推而嵗成焉散而育萬物則風雨相資而化興焉樂道天地之和而其教與事實體之也春誦夏弦春合舞秋合聲先王之所著以成教者孰非法寒暑之時邪以聲展之以舞正之律小大之稱比終始之序以象事行孰非法風雨之節邪教有時事有節以善民心如此則民之行未有不象上之德矣夫豢豕為酒非以為禍也而獄訟益繁則酒之流生禍也是故先王因為酒禮一獻之禮賔主百拜終日飲酒而不得醉焉此先王之所以備酒禍也故酒食者所以合歡也樂者所以象德也禮者所以綴淫也豢音患綴知力反正義鄭氏康成曰以榖食犬豕曰豢為作也言豢豕作酒本以享祀養賢而小人飲之善酗以致獄訟也一獻士飲酒之禮孔疏凡饗禮案大行人云上公九獻侯伯七獻子男五獻並依命數其臣介則孤同子男卿大夫略為一節俱三獻則天子諸侯之士同一獻百拜以喻多孔疏令鄉飲酒之禮是一獻無百拜令云百拜故云多也綴猶止也孔氏穎逹曰此言禮樂之設不得其所則禍亂興故先王節其禮樂以防淫亂也陳氏暘曰飲酒人之大欲不能不速訟先王知其然於書有彛酒之戒羣飲之誅於禮有幾酒之察屬飲之禁猶以為未也又寓教戒之意於器皿之間彞皆有舟其載有量尊皆有罍其鼓有節爵以角觥以兕以至傷而為觴單而為觶孤而為觚戔而為盞散而為散止而為禁無非備酒禍也一獻之禮非不簡也而賔主至於百拜終日飲酒非不久也而不得醉焉然則先王為禮以備酒禍可謂至矣言士之饗禮如此則自士而上可知也酒食以合歡則禮之所施樂未嘗不有以通之也然合歡以為樂非樂其情必以象德酒食以為禮非淫其德必以綴淫易之需言君子以飲食燕樂酒食合歡之意也豫言先王以作樂崇德樂以象德之意也曲禮曰富貴而知好禮則不驕不淫禮以綴淫之意也是故先王有大事必有禮以哀之有大福必有禮以樂之哀樂之分皆以禮終樂音洛下所樂哀樂康樂皆同分扶問反正義鄭氏康成曰大事謂死喪也張氏守節曰民有喪則先王制衰麻哭泣之禮以節之使其各遂哀情是禮以哀之也大福祭祀者慶也民慶必歌舞飲食庶羞之禮使不過而各遂歡樂是有以樂之也哀樂雖反皆用禮節各終其分故云皆以禮終陳氏暘曰死喪凶札禍災天事之大者也圍敗冦亂人事之大者也大宗伯皆以凶禮哀之所謂有大事必有禮以哀之也以脤膰之禮親兄弟之國而與之同福祿以慶賀之禮親異姓之國而與之和安樂所謂有大福必有禮以樂之也方氏慤曰分以言其有定分而不可犯也若曾子七日水漿不入口則不能以禮節其哀矣魏文侯聽鄭衛而不知倦則不能以禮節其樂矣案大事及大福義陳氏本大宗伯言之鄭張特舉其一耳右樂施章第四鄭目録第三史記樂書以樂象章樂也者施也禮也者報也至所以贈諸侯也十四句係於皆以禮終之下乃禇少孫所升降也案此篇言樂施則樂也者施也節當為此篇之首所謂大輅一節承上禮報情夔始制樂以賞諸侯承上樂章德文義甚明孔氏穎達曰此論樂記第四章名為樂施施者用於天下此章中明樂施被之事也本是第二前既推樂理章為第三此為第四亦明禮樂既備後乃施布天下也張氏守節曰中有三段一明施樂以賜諸侯二明施樂須節既賜之所以宜節也三明禮樂所施各有本德本意樂也者聖人之所樂也而可以善民心其感人深其移風易俗故先王著其教焉所樂之樂音洛正義鄭氏康成曰著猶立也謂立司樂以下使教國子孔氏穎達曰風謂水土之風氣謂舒疾剛柔俗謂君上之情欲謂好惡取捨用樂化之故使惡風移改弊俗變易周氏諝曰聖人之所樂莫非正也發其所樂而為樂莫非和也以其正故可以善民心以其和故感人之深有以善之又有以感之所以移風易俗甚易也夫民有血氣心知之性而無哀樂喜怒之常應感起物而動然後心術形焉知音智應於甑反正義鄭氏康成曰言在所以感之也術所由也形猶見也孔氏穎達曰夫樂聲善惡本由民心而生所感善事則善聲應所感惡事則惡聲應樂之善惡初則從民心而興後乃合成為樂樂又下感於人善樂感人則人化之為善惡樂感人則人隨之為惡是樂出於人而還感人猶如雨出於山而還雨山火出於木而還燔木故此篇之首論人能興樂此章之意論樂能感人也人由血氣而有心知故血氣心知連言之其性雖一所感不恆物來感已心遂應之念慮興動然後心之所由道路而形見焉心術見者即下文是也張氏守節曰人生必有血氣心知之性性合五常之行有喜怒哀樂之分但其發無常時隨外境所觸故亦無常也應感起物而動緣外故來感心心觸感來起動應之故有喜怒哀樂也陳氏暘曰民生而靜有血氣心知之常性應感起物而動無哀樂喜怒之常情以有常之性託無常之情則心術之形固非我也實自物而已方氏慤曰上言血氣心知而下止言心者蓋别言之雖有血氣心知之異合而言之萬化皆本於心而已應氏鏞曰喜怒哀樂未發之謂中發而中節之謂和此道心惟微也有血氣心知之性而無哀樂喜怒之常此人心惟危也叩之則應觸之則感相激相生循環無端皆緣物而起物動於內而心形於外也所性曰心知心之虛明未嘗不靈也所形曰心術心之動則不勝其多事矣是故志微唯殺之音作而民思憂嘽諧慢易繁文簡節之音作而民康樂粗厲猛起奮末廣賁之音作而民剛毅亷直徑正莊誠之音作而民肅敬寬裕肉好順成和動之音作而民慈愛流辟邪散狄成滌濫之音作而民淫亂唯子遙反殺色界反思息吏反又音斯嘽昌善反諧户皆反慢莫諫反易以豉反賁依注讀為憤扶粉反徑吉政反裕羊樹反肉而救反好呼報反辟匹亦反邪似嗟反滌大歷反濫力暫反正義鄭氏康成曰志微意細也吳公子札聽鄭風而曰其細已甚民弗堪也孔疏左傅襄二十九年簡節少易也孔疏曲折雖繁其節簡少謂緩歌而疏節奮末動使四支也孔疏以身為本以四支為末故云動使四支賁案粗厲總言之猛起猛於始奮末奮於終廣大於中言自始至終皆粗厲賁讀為憤憤怒氣充實也春秋傳曰血氣狡憤孔疏左傳僖十五年言案賁大也其音𢎞大狄滌往來疾貌孔疏詩踧踧周道字異義同又詩滌滌山川濫僭差也此皆民心無常之效也肉或為潤孔氏頴達曰志微謂人君志意微細唯殺謂樂聲唯蹙殺小如此音作而民感之則悲思憂愁也嘽寬也諧和也慢疏也繁多也康安也君若道德寬和疏易則樂音多文采而節奏簡略下民所以安樂也粗厲謂人君性氣粗疏威厲猛起謂武猛發起奮末謂奮動手足廣賁謂樂聲廣大憤氣充滿如此音作而民感之則性氣剛毅也君若亷直徑正則樂音矜莊嚴栗而誠信故民應之而肅敬也君如寬裕厚重則樂音順序而和諧動作故民應之而慈愛也流辟謂君志流移不靜邪散謂違辟不正放邪散亂狄成滌濫謂樂之曲折疾速而成疾速而止則民感之而淫亂也此六事所云音者皆據君德及樂音相雜也君德好而樂音亦好君德惡而樂音亦惡皆上句論君德下句論樂音周氏諝曰心術形然後音作故審其音則其心術可知陳氏暘曰樂以音變音以民變民思憂哀心所感然也民康樂樂心所感然也民剛毅怒心所感然也民肅敬敬心所感然也民淫亂喜心所感然也由前則以心論聲而其辭略由後則以音論民而其辭詳此其序所以不同也肉倍好者璧好倍肉者瑗肉好如一旋而不可窮者環肉好之音豈其音旋而不可窮邪案肉好借璧以喻君德順成和動乃以音言方氏慤曰慢易者非傲慢之慢特言其過耳繁文簡節者文雖繁而節則簡也肉好猶璧之有肉好然蓋璧外謂之肉實而無隙內謂之好則虛而已謂其音實而有所養又虛而得所好也陸氏佃曰肉而無好則失之實好而無肉則失之虛馬氏睎孟曰論樂之所始則起於心之所感而後發於聲音論樂之所成則反以感人心者也前哀心感者其聲噍以殺至愛心感者其聲和以柔言音起於心之所感此言樂之所以感於人心也先王之為樂尤慎其所以感之之始存疑鄭氏康成曰肉肥也張氏守節曰謂音如肉之肥陳氏澔曰志疑當作急急促微細噍枯殺減也狄與逖同逺也成者樂之一終狄成言其一終甚長淫佚之意也滌洗也濫侵僭也言其音之泛濫侵僭如以水洗物而浸漬侵濫無分際也是故先王本之情性稽之度數制之禮義合生氣之和道五常之行使之陽而不散隂而不密剛氣不怒柔氣不懾四暢交於中而發作於外皆安其位而不相奪也稽古奚反道音導行下孟反懾之涉反正義鄭氏康成曰生氣隂陽氣也五常五行也孔疏此經隂陽剛柔皆天地之氣故以五行言木性仁金性義火性禮水性智土性信非父義母慈之五德也密之言閉也懾猶恐懼也孔氏穎達曰上既明樂之感人故此明先王節人情性自然所感謂之性因物念慮謂之情言先王制樂本人情性既得人情考之使合度數裁制以禮義使合生氣之和道之依金木水火土之性也陽主發動失在流散先王教之感陽氣者不使放散也隂王幽靜失在閉塞先王節民情感隂氣者不有閉塞也四暢謂隂陽剛柔也四者通暢交在身中而發見動作於身外也隂陽剛柔各得其所是安其位也不相侵犯是不相奪也張氏守節曰合應也陽氣舒散人稟陽多則散隂氣閉密人稟隂多則密陳氏祥道曰本之情性明樂之情稽之度數明樂之文有情有文然後裁之以禮義故能幽合生氣之和而和於天明道五常之行而同於人和同天人而至於無間故能使之陽不散隂不密剛不怒柔不懾不散者陽中之隂不密者隂中之陽不怒者剛中之柔不懾者柔中之剛四者條暢於中而發作於外是以安其位而不相奪也方氏慤曰黃鍾之律長九寸應鍾之律長四寸此樂之度也陽六為律隂六為吕此樂之數也情性由乎內故言本度數存乎微故言稽生氣固有和矣唯樂以合其和然後其和不離五常固有行矣唯樂以道其行然後其行無礙隂陽兼物言之剛柔指人言之陽不散隂不密然後得其暢故曰暢陽不至於散則陽交隂故也隂不至於密則隂交陽故也故曰交其暢也其交也豈非和之所致乎剛柔之氣亦若是而已陳氏澔曰本之情性即民有血氣心知之性喜怒哀樂之情也度數十二律上生下生損益之數也禮義貴賤隆殺清濁髙下各有其義也生氣之和造化發育之妙也五常之行仁義禮智信之德也案本之情性指先王性情之中和以為作樂之本者非但以民生血氣心知之性言之度如律始於三寸九分極於九寸而紀之以三平之以六成於十二則又其數也禮如音之君尊臣卑民貴物賤而君不可驕臣不可亢民不可勞物不可匱則又其義也先王既本之性情以立其本又稽之度數制之禮義以極其詳則於生氣之和五常之行人與天合天以人行使稟於天而為隂陽稟於地而為剛柔者皆無偏倚駁雜之差則四氣之在吾性情者條暢交錯於中而發形於度數禮義者皆安其位而不相奪倫則其樂真可樂而可用之以善民心矣然後立之學等廣其節奏省其文采以繩德厚律小大之稱比終始之序以象事行使親疏貴賤長幼男女之理皆形見於樂故曰樂觀其深矣省西領反稱尺證反比毗志反長丁丈反見賢遍反正義鄭氏康成曰等差也各用其才之差學之廣謂增習之省猶審也文采謂節奏合也繩猶度也周禮大司樂以樂語教國子興道諷誦言語以樂舞教國子舞雲門大卷大咸大韶大夏大濩大武孔疏周禮大司樂文律六律也周禮典同以六律六同辨天地四方隂陽之聲孔疏隂聲六吕陽聲六律陽聲屬天隂聲屬地以為樂器小大孔疏若黃鍾之律長九寸應鍾之律長四寸半強也謂髙聲正聲之類孔疏周禮典同髙聲䃂正聲緩下聲肆陂聲散斂聲斂達聲贏微聲韽回聲衍侈聲筰弇聲鬱薄聲甄厚聲石以鍾形小大不稱引以明作鍾之法須小大稱也終始謂始於宫終於羽孔疏五聲終始使有次序宗廟黃鍾為宫大吕為角大簇為徴應鍾為羽孔疏大司樂文祫祭降神之樂以象事行若宫為君商為臣皆形見於樂謂同聽之莫不和敬莫不和順莫不和親王氏肅曰繩法也法其德厚薄也孔氏穎達曰先王欲稽之度數制之禮義非教不可故立之學等使依其才藝等級而教學之廣謂增習寬廣其樂之節奏也省謂省審也文采謂樂之宫商相應若五采成文即上文聲成文是也繩度也謂凖度以道德仁厚也律謂六律小之與大以為樂器使音聲相稱也先王制樂如此以化於民由樂聲調和故親疏之理見於樂聲也樂聲有清濁髙下故貴賤長幼見於樂以樂聲有隂陽律吕故男女之理見於樂陳氏暘曰教不可陵節學不可躐等先王之於樂非獨以善吾身又將以教人也故始之以中和祇庸孝友之樂德中之以興道諷誦言語之樂語終之以二帝三王之樂舞始之以十三舞勺中之以成童舞象終之以二十舞大夏其立之學等用其才之差而使習之如此抑又使之廣其節奏而不為簡節之音省其文采而不為繁文之樂則德之充實而端厚者故足繩之使不淫矣周官小師掌六樂之節鍾師掌九夏之奏節奏之辨也節奏文采均聲之飾治飾之道欲始博而終約始博之節奏不可以不廣終約之文采不可以不省以繩德厚則能使人復性之靜而不逐物之動又何窮人欲滅天理之有律述此者也比輔此者也樂之於天下其體固有小大其用固有終始述以小大之稱則大小相成而無輕重之不等輔以終始之序則終始相生而無先後之不倫以此象事行則事容有大小終始矣繩德厚以為性象事行以為行則越之聲音形之動靜一逺一近而親疏之理存焉一上一下而貴賤之理存焉一先一後而長幼之理存焉一內一外而男女之理存焉能使是理莫不形見於樂豈不原於律小大之稱比終始之序邪方氏慤曰立之學所以教之立之等所以辨之節奏惡其狹故曰廣文采惡其雜故曰省凡此皆原其性之所稟故曰以繩德厚小大有宜事之稱也終始相生事之序也有宜則不可以無稱故律而述之使不易相生則不可以無序故比而聫之使不絶若宫音濁而大羽音清而小蓋律小大之稱也始於黃鍾之初九終於仲吕之上六蓋比終始之序也凡此皆發於情之所動故曰以象事行親疏言其分貴賤言其位長幼言其序男女言其情四者皆人之倫也莫不各有理焉唯形容於樂乃可得而見故曰樂觀其深矣焉氏睎孟曰五音大不過乎宫細不過於羽此小大之稱大師之奏始作翕如至於繹如此終始之序也案此乃言以樂教人也立之學以為教之地立之等以為教之方節奏以始終之次第言故欲其廣文采以宫商之倡和言故欲其省文采即節奏之合也存於心為德如仁於父子義於君臣見諸事為行如父慈子孝君仁臣忠德本厚而樂以繩之使厚者益厚德必見於行而樂以倣象之使皆可依據而行如上生下生即父子之親而餘遞疏旋為宫者即君之貴而餘遞賤黃鍾陽之長林鍾隂之長而餘遞幼黃鍾以大吕為妻大簇以夾鍾為妻是五常之德五倫之行無不形見於樂也舉此以教不誠可以善民心哉土敝則草木不長水煩則魚鱉不大氣衰則生物不遂世亂則禮慝而樂淫正義鄭氏康成曰遂猶成也慝穢也孔氏穎達曰敝謂勞敝煩謂煩擾隂陽之氣衰亂故生物不得遂成世道衰亂上下無序故禮慝男女不節故樂淫以上三事皆喻禮慝樂淫也輔氏廣曰物者氣之所生也禮樂者世之所形也禮慝如世俗委巷之禮也禮易失之慝樂易失之淫是故其聲哀而不莊樂而不安慢易以犯節流湎以忘本廣則容姦狹則思欲感條暢之氣而滅平和之德是以君子賤之也易以豉反湎綿鮮反而案今本滅平和之德無字正義鄭氏康成曰廣謂聲緩也狹謂聲急也感動也動人條暢之善氣使失其所孔氏穎達曰此論樂不得其所則滅平和之德故君子賤之朋淫於家是慢易以犯禮節淫訩肆虐是流湎以忘根本廣謂節間疏緩多有姦淫之聲狹謂節間迫促動人情欲而切急條逺也暢舒也賤謂棄而不用若師曠聞桑間濮上之聲撫而止之是也方氏慤曰關雎之樂非不哀也所哀者窈窕之難求是乃所以為莊非不樂也所樂者淑女之為配是乃所以為安今哀而不莊故慢易以犯節樂而不安故流湎以忘本慢則無所敬易則無所戒故犯節流則不知止湎則有所溺故忘本廣固足以有客所容者姦聲感人則逆氣應之矣狹固足以有思所思者樂得其欲則以欲忘道矣平則條而有理和則暢而能通陳氏澔曰感或作蹙感條暢之氣則與合生氣之和者反矣滅平和之德則與道五常之行者異矣右樂言章第五史記樂書同鄭目録第四吳氏澄纂言改居第二孔氏穎達曰皇氏以為是樂言之科自民有血氣至禮慝而樂淫論人心不同隨樂而變是故其聲以下論作樂不得其所則滅和平之德張氏守節曰此第五章名樂言明樂歸趣之事中有三段一言人心隨王之樂二言明王制正樂以化民三言邪樂不可以化民案樂言當作樂形聲之誤也先言樂因人性感物而心術形後言樂正則倫理皆形見於樂故以樂形名篇張氏作言樂則尤誤凡姦聲感人而逆氣應之逆氣成象而淫樂興焉正聲感人而順氣應之順氣成象而和樂興焉倡和有應回邪曲直各歸其分而萬物之理各以類相動也倡昌尚反和胡臥反分扶問反正義鄭氏康成曰成象者謂人樂習焉孔氏穎達曰姦聲謂姦邪之聲感動於人逆氣謂違逆之氣即姦邪之氣也姦聲感動於人而逆氣來應二者相合而成象淫樂遂興紂作靡靡之樂是也正聲感動於人而順氣來應二者相合而成象則和樂興若周室太平頌聲作也聲感人是倡也氣應之是和也善倡則善和惡倡則惡和是倡和有應回謂乖違邪謂邪辟言乖違邪辟及曲之與直各歸其善惡之分限也善歸善分惡歸惡分既善惡各歸其分是萬物之情理各以類自相感動也陳氏暘曰聲樂之象也其發而感人不能無姦正氣體之充也其出而應聲不能無逆順蓋樂者天地之和正聲之所止也而姦聲則乖此人者天地之安和順氣之所鍾也而逆氣則反此然氣合於無象見於有相感而文生文之所生則象之所見也象之所見則樂之所形也逆氣成象而淫樂興則新樂之發非治世之音也順氣成象而和樂興則古樂之發非亂世之音也夫命有正有不正性有善有不善道有君子有小人德有凶有吉然則聲有姦正氣有順逆樂有淫和不亦感應自然之符邪聲之邪正既異其所倡則氣之逆順亦異其所和可謂倡和有應矣逆氣而淫樂興順氣而和樂興可謂回邪曲直各歸其分矣凡此非特人為然萬物亦莫不各以氣類相感動也古之人當春而叩商弦以召南吕涼風忽至草木成實及秋而叩角弦以激夾鍾溫風徐回草木發榮當夏而叩羽弦以召黃鍾雪霜交下川池暴沍及冬而叩徴弦以激蕤賔陽光熾烈堅冰立散終嵗命宫而總四弦則景風翔慶雲浮甘露降醴泉湧以至瓠巴鼓瑟而鳥舞魚躍師曠奏角而雲行雨施鄒衍吹律而寒谷黍滋豈非萬物之理各以類相應也應氏鏞曰聲感於微而氣之所應者甚速氣應於微而象之所成者甚著成象則有形而可見見乃謂之象也各歸其分者所謂樂之道歸焉耳是故君子反情以和其志比類以成其行姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪辟之氣不設於身體使耳目鼻口心知百體皆由順正以行其義行下孟反惰徒臥反辟匹亦反知音智正義鄭氏康成曰反猶本也術猶道也孔氏穎達曰反情謂反去淫溺之情理以調和其善志比類謂比擬善類以成己身之美行不使姦聲亂色留停於耳目令耳目不聰明不使淫樂慝禮連接於心術謂心不存念也以耳目心術所為皆善則怠惰邪辟之氣無由來入故邪辟之氣不施設於身體既邪辟不在於身耳目鼻口心知百事之體皆由順正由從也皆從和順以行其正直義理也張氏守節曰聲色是事故云聰明而氣無形故於身為設也不留聰明於姦聲亂色故耳目得順正不用心術接淫慝禮樂故心知得順正不設身於惰辟故百體得順正也方氏慤曰情者性之欲反情所以復其性類者人之善比類所以别其等反情於內故足以和其志比類於外故足以成其行陳氏暘曰淫樂不止於姦聲慝禮不止於亂色姦聲亂色其入人也淺而不能纍吾聰明於其外淫樂慝禮其入人也深而不能蔽吾心術於其內夫然則惰慢邪辟之氣不設於身體百體所由無逆而非順無邪而非正以行吾義而已李氏格非曰反情以和其志以內修內者也比類以成其行以外治外者也姦聲亂色不留聰明淫樂慝禮不接心術以外治內也惰慢邪辟之氣不設身體以內治外也真氏德秀曰姦聲亂色不留聰明養其外也淫樂慝禮不接心術養其內也惰慢之氣自內出邪辟之氣自外入不設於身體則內外交養矣然後發以聲音而文以琴瑟動以干戚飾以羽旄從以簫管奮至德之光動四氣之和以著萬物之理著張慮反正義鄭氏康成曰奮猶動也著猶成也孔氏穎達曰前明君子去姦聲行正聲故此明正聲之道動發心志以聲音文飾聲音以琴瑟振動形體以干戚裝飾樂具以羽旄隨從諸樂以簫管用上諸樂奮動天地至德之光明感動四時氣序之和平樂既和平故能著成萬物之理道謂風雨順寒暑時鬼神降其福萬物得其所也張氏守節曰其身已正然後乃可制樂為化故用歌之音聲內發己之德用琴瑟之響外文己之行歌者在上此是堂上之樂又用干戚羽旄簫管從而播之絲竹在下此是堂下之樂陳氏暘曰發以聲音而為德音之音文以琴瑟而為德音之器動以干戚而為武德之容飾以羽旄而為文德之客從以簫管而為備成之樂則性術之變盡矣德自此顯足以奮至德之光氣自此調足以動四氣之和夫然則可以贊化育而與天地參矣萬物之理何微而不著乎陸氏佃曰至德之光以樂而奮若大章所以發堯德之光大韶所以發舜德之光案孔以至德屬天地此以至德屬堯舜以此見天人合撰之義存疑鄭氏康成曰動至德之光謂降天神出地祗假祖考案君子順氣成象至心知百體無不順正則德至矣然後播之於樂以奮其至德之光吾之氣順則天地之氣亦順故有以動四氣之和而萬物之性之正理遂於是著也至德當緊承順正行義鄭以屬天神地祗似稍隔是故清明象天廣大象地終始象四時周還象風雨五色成文而不亂八風從律而不姦百度得數而有常小大相成終始相生唱和清濁迭相為經還音旋迭大結反正義鄭氏康成曰清明謂人聲也孔疏八音氣濁唯人聲清明故知清明謂人聲也廣大謂鐘鼓也孔疏下云鐘聲鏗又云鼓鼙之聲歡鏗之與歡皆廣大之意周還謂舞者五色五行也案角音木色青徴音火色赤宮音土色黃商音金色白羽音水色黑音正即色成文也八風從律應節至也孔疏風八方之風律十二月之律樂得其度故八風應八節而至不為姦慝八風者白虎通云距冬至四十五日條風至次明庶風次清明風次景風次涼風次閶闔風次不周風次廣莫風皆間四十五日而至八節者立春春分立夏夏至立秋秋分立冬冬至百度百刻也言日月晝夜不失正也孔疏謂晝夜百刻昏明晝夜不失其正度數有常也清謂蕤賓至應鍾濁謂黃鍾至中吕王氏肅曰清明廣大終始周還皆樂之節奏容儀發動也孔氏穎達曰人之歌曲清潔顯明以象天鐘鼓鏗鏘寬廣壯大以象地終於羽始於宫象四時變化終而復始也舞者周匝回環象風雨之回復五行之色謂五行之聲宫商角徴羽相應成文如青黃相雜故曰五色也小大相成謂十二月律互為宫羽而相成也終始相生謂五行宫商迭相用為終始倡和清濁謂十二月律先發聲為倡後應聲為和律長者濁短者清迭相為經謂十二月之律還相為宫是樂之常也陳氏暘曰天職氣覆而清明地職形載而廣大運行天地之間一變一通而終則有始者其四時乎一散一潤而周則復還者其風雨乎樂之道本末具舉情文兼盡其聲清而不可溷明而不可掩者以象天也非特人聲而已其體廣而不可極大而不可圉者以象地也非特鐘鼓而已六舞終於大武始於雲門八音終於革木始於金石六律終於無射始於黃鍾六同終於夾鍾始於大吕皆象四時也非特宫羽而已五聲六律十二管還相為宫舞動其容以要鍾鼓俯會之節千變萬化唯意所適皆象風雨也非特舞之一端而已五聲之節奏合為文采莫不雜比成文而不亂則宫為君足以御臣商為臣足以治民角為民足以興事徴為事足以成物羽為物足以致用夫然則各得其所不相陵犯而無惉懘之音矣八風象八卦也其所以擬而遂之者八音所以節而行之者八佾之舞而已蓋主朔易者坎也故其音革其風廣莫為果蓏者艮也故其音匏其風融震為竹故其音竹其風明庶巽為木故其音木其風清明兑為金故其音金其風閶闔乾為玉故其音石其風不周瓦土器也故坤音瓦而風涼蠶火精也故離音絲而風景是正北之風從黃鍾之律而黃鍾冬至之氣也東北之風從大吕大簇之律而大吕大蔟大寒啓蟄之氣也正東之風從夾鍾之律而夾鍾春分之氣也東南之風從姑洗仲吕之律而姑洗仲吕穀雨小滿之氣也正南之風從蕤賔之律而蕤賓夏至之氣也西南之風從林鍾夷則之律而林鍾夷則大暑處暑之氣也正西之風從南吕之律而南呂秋分之氣也西北之風從無射應鍾之律而無射應鍾霜降小雪之氣也八方之風周於十二律如此則順氣應之而和樂興而正聲格矣尚何姦聲之有聲音律吕發越於樂縣之間其體有小大不相廢而相成其用有終始不相戾而相生一唱一和一清一濁迭相為經而其常未始有窮也蓋音莫不有適太清則志危太濁則志下皆非所謂適也一清一濁迭相為經要合清濁之中而已安往而不適哉方氏慤曰清明者樂之聲故象天廣大者樂之體故象地終始者樂之序故象四時周還者樂之節故象風雨合之以柷樂之始也止之以敔樂之終也既備乃奏樂之周也以反為文樂之還也五色即五行也五行則言其道五色則言其質非有其質則文無所附方言其成文故以其質言之五行播於四時故天地之文作於春夏而成於秋冬相生所以相成相剋所以相治故曰成文而不亂律十有二宫以應嵗十有二月合而為四時四時分而為八節八節行之以八風故八風在天則應乎八節在地則位乎八方在易則畫於八卦在樂則播於八音其所以從律則一也律述氣者也風則天地之氣也風從律之所述則應期而不姦矣百度者晝夜之刻數也陽長則隂消則晝得數為多夜得數為少隂長則陽消則晝得數為少夜得數為多得數多者其晷長得數少者其晷短長短者度之所起也故謂之度隂陽一消一長晝夜一短一長雖小變而不失其大常故曰得數而有常小者隂也大者陽也成雖隂之事然非陽以生之則隂無自而成故曰相成終者隂也始者陽也生雖陽之事然非隂以成之則陽亦無自而生故曰相生倡者為先和者為後清者為升濁者為降倡和者隂陽之氣先後之序也清濁者隂陽之氣升降之體也方其倡之得位則倡者為經和者為緯矣及和之得位亦若是也清之得位則清者為經濁者為緯矣及濁之得位亦若是也雖然此特其大概耳至於播之於樂則五音六律其聲亦莫不有倡有和有清有濁焉迭相為經亦若是而已馬氏睎孟曰小大精粗皆有歎故天之中數五因之以為五聲地之中數六因之以為六律至於樂之始則有柷柷方二尺四寸三八之數深一尺八寸二九之數九勝八陽勝隂此樂之所以作也至於樂之終則有敔敔之鉏鋙二十七三九之數長尺十之數十勝九隂勝陽此樂之所以止也凡此皆百度得數而有常不變也言百者亦舉其成數耳應氏鏞曰合之象兩儀分之象四時增中央土則為五行分以四隅則為八方五聲配乎五行之色故各成文而不亂八音配乎八卦之風故各從律而不姦自一度衍之而至於百則百度各得其數猶八卦至於六十四而其變無窮也大而日月星辰之度小而百工器物之度各有數焉不止晝夜之百刻也曰不亂不姦以至有常言其常而不紊也曰相成相生以至迭相為經言其變而不窮也順其常則能極其變矣案此一節申言動四氣之和故樂行而倫清耳目聰明血氣和平移風易俗天下皆寧正義鄭氏康成曰言樂用則正人理和隂陽也倫謂人道也孔氏穎達曰倫類也其樂施行而倫類清美矣人聼之則耳目清明血氣和平變移敝惡之風改革昏亂之俗而天下皆寧矣張氏守節曰正樂既行故人倫之道清不視聼姦亂故視聼聰明口鼻心知百體皆由順正故血氣和平風移俗易天下皆寧上行謂之風下習謂之俗馬氏睎孟曰倫者理也親疏貴賤長幼男女之理皆形見於樂故樂行而倫清言其莫不和親莫不和順莫不和敬也耳目聰明言不為外物所誘也血氣和平言不為外物所觸也移風易俗天下皆寧此樂之效也輔氏廣曰上既極言樂之理故此下言樂之功效以結之案此一節申言著萬物之理蓋耳當聰目當明血當和氣當平者萬物所性之理惟為逆氣所感乃失其性而其理遂若不可知故必動四氣之和而其理乃著馴至於移風易俗天下皆寧則知樂之所感大矣故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂樂音洛正義鄭氏康成曰道謂仁義也欲謂邪辟也孔氏穎達曰樂者是人之所歡樂也君子所歡樂在於得仁義之道得其道則歡樂小人所歡樂在於邪淫得邪淫則亦歡樂也然君子在上以仁義之道制邪淫之欲則意得歡樂而不有昏亂也若小人在上以邪淫之欲忘仁義之道則志意迷惑而不得歡樂矣張氏守節曰此引舊語樂名廣證前事方氏慤曰道有義故足以制欲欲既制則其樂不流而治生欲無窮故至於忘道道既忘則其惑不解而憂生是故君子反情以和其志廣樂以成其教樂行而民鄉方可以觀德矣鄉許亮反正義鄭氏康成曰方猶道也孔氏穎達曰反已淫欲之情以諧和德義之志寬廣樂之義理以成就其政教之事正樂興行而民歸嚮仁義之道人君如此可以觀其德行矣陳氏暘曰反情以和其志則是志以道寧而其仁足以成已廣樂以成其教則是以樂教和而其智足以成物案前言反情以和其志比類以成其行此言廣樂以成其教者萬物之理各以其類相動故必親比於善之類而後可以成我之行至於德成而移風易俗則廣樂以成其教我又足以動物所謂成己而成物也人之情無不求樂特小人無君子道之遂至以欲忘道反惑而入於不樂耳君子以道制欲德至而民皆化之遂無人不得其所欲正見反情乃得人情之大公也德者性之端也樂者德之華也金石絲竹樂之器也詩言其志也歌詠其聲也舞動其容也三者本於心然後樂器從之正義孔氏穎達曰德在於內樂所以發揚其德故樂為德之光華也非器無以成樂故金石絲竹為樂之器也詩謂言辭志在內故以言辭説其志歌謂曲音所以歌詠其言辭之聲哀樂在內必形於外故以舞振動其容樂之為體有此三者詩言其志則詩序云詩者志之所之也歌詠其聲則詩序云言之不足故嗟嘆之嗟嘆之不足故詠歌之也舞動其容則詩序云詠歌之不足則不知手之舞之足之蹈之也容從聲生聲從志起志從心發三者相因原本從心而來先心而後志先志而後聲先聲而後舞聲須合於宫商舞須應於節奏乃成於樂故樂器從之也張氏守節曰德得理也性之端本也言人稟性皆以得理為本也得理於內樂為外故云德之華樂為德華若莫之能用故須金石之器也金石為器須用詩述申其志志在心不述不暢故用詩述之若直述其志則無縕藉之美故又長言歌詠使聲音之美可得而聞若直詠歌未暢故舉手蹈足以動其形容也三者志聲容也陳氏暘曰古之教六詩者以六德為之本以六律為之音以六德為本故自樂器推而上之及於德者性之端樂者德之華也以六律為音故自樂器推而下之及於詠歌其聲舞動其客也方氏慤曰五常性之所有也非德無以得五音德所寓也非樂無以發發而為華然後散而為器然器不止於金石絲竹特舉此以該之輔氏廣曰端猶孟子所謂四端也華即下文所謂英華也德出於性故德者性之端也樂以章德故樂者德之華也金石絲竹又樂之形而下者也此總言樂之終始又言樂之本於心詩言心之志歌詠心之聲舞動心之容與詩大序所言同意存疑鄭氏康成曰三者本志也聲也容也言無此本於內則不能為樂也方氏慤曰有言有咏有動皆氣之所使也所以使氣者心而已故曰本於心然後樂氣從之張氏守節曰樂氣詩歌舞也君子前有三德為本乎心後乃詩歌舞可觀故云然後樂氣從之也輔氏廣曰樂之氣謂和氣也樂由陽來豈無氣乎案經文明言志聲容三者本於心不當又以志聲容三者為本又案諸本俱作樂器惟史記説苑作樂氣張輔二氏皆以氣釋之其説亦似但細玩記文以志承性之端以聲容承德之華則末二語自當承樂器言孔疏作器蓋有本也張輔據史記説苑改經字過矣張三德説亦武斷然其説亦備一義附存之是故情深而文明氣盛而化神和順積中而英華發外唯樂不可以為偽正義孔氏穎達曰志起於內思慮深逺是情深也言之於外情由言顯是文明也志意藴積在中故氣盛內志既盛則外感動於物故變化通神也氣盛謂手舞足蹈化神謂動天地感鬼神也思念善事日久是和順積於心中言辭聲音發見在外是英華發於身外此據正樂也若其姦聲則悖逆積中淫聲發外心惡而望聲之善不可得也故云唯樂不可以為偽張氏守節曰德為性本故曰情深樂為德華故云文明歌舞蹈樂氣從之案樂氣説詳前故云氣盛天下咸寧故曰化神內外符合而無有虛假也方氏慤曰樂有情則有文有氣則有化其情深然後其文明其氣盛然後其化神蓋中外之理然也情深氣盛則樂之和順積於中文明化神則樂之英華發於外所積者和順則知所發者無乖無逆所發者英華則知所積者有本有根矣是皆有諸中然後形諸外故言不可以為偽也案情反之性則得情之本而情乃深情深則詩言之歌詠之舞動之而文自明矣至詩言咏歌舞蹈之氣皆盛則化之所及舉萬物而皆各正其性命而化自神矣蓋承上章奮至德之光而申言之以深探其本也樂者心之動也聲者樂之象也文采節奏聲之飾也君子動其本樂其象然後治其飾正義鄭氏康成曰文采樂之威儀也孔氏穎達曰心動而見聲聲成而為樂樂由心動而成故云樂者心之動也樂本無體由聲而見是聲為樂之形象也聲無曲折則太質素故以文采節奏而飾之使美動其本則亦心之動也樂其象則亦樂之象也治其飾則亦聲之飾也以此三者結上三事陳氏祥道曰心動於自然而樂動於使然故曰心之動樂之本則隱而其聲則見故曰樂之象聲之單出則質必待文采節奏為之飾也陳氏暘曰容從聲生聲從志起志從心發君子致樂以治心則易直子諒之心油然生矣動其本之謂也施於金石越於聲音樂其象之謂也省其文采廣其節奏治其飾之謂也是故先鼓以警戒三步以見方再始以著往復亂以飭歸奮疾而不拔極幽而不隱獨樂其志不厭其道備舉其道不私其欲是故情見而義立樂終而德尊君子以好善小人以聼過故曰生民之道樂為大焉警音景見賢遍反復音伏獨樂之樂音洛拔步葛反厭於艷反好呼報反正義鄭氏康成曰先鼓將奏樂先擊鼓以警戒衆也三步謂將舞必先三舉足以見其舞之漸也奮疾謂舞者也孔疏拔疾也舞者奮迅疾速而不至大疾極幽謂歌者也孔疏歌者坐而不動是極幽靜而聲發起是不隱也陳氏澔曰再始謂一節終而再作也往進也亂終也如云關雎之亂歸舞畢而退就位也再始以著往者再擊鼓以明其進也復亂以飭歸者復擊鐃以謹其退也此兩句言舞者周旋進退之事存疑鄭氏康成曰再始以著往武王除喪至孟津之上紂未可伐還歸二年乃遂伐之武舞再更始以明伐時再往也復亂以飭歸謂鳴鐃而退明以整歸也孔氏穎達曰記者引周之大武之樂以明上三者之義方謂方將欲舞積漸之意也亂治也復謂舞曲終舞者復其行位而整治象武王伐紂既畢整飭師旅而還歸也世多違背道理武王獨能樂其志意不違厭其仁義之道理恆以道自將也既不違厭道理又能備舉而行之以利天下不私自恣己之情欲也情見謂武王伐紂之情見於樂也義立謂伐紂之義興立也觀其樂終則知武王道德尊盛也君子謂在位尊者觀武王之樂德類如此庶幾好行善道小人謂士庶之等觀武王樂音亦聽伏已之愆過也生養民人之道樂最為大此特引武王樂者以其利益為深餘樂莫及故也辨正胡氏銓曰此經泛論樂不指武王陳氏澔曰此章諸家皆以為論大武之樂以明伐紂之事且以再始為十一年觀兵十三年伐紂愚謂此特通論樂與舞之理如此耳故曰生民之道樂為大焉豈可以生民之道莫大於戰伐哉樂也者施也禮也者報也樂樂其所自生而禮反其所自始樂章德禮報情反始也施始豉反句案今本反其所自始無而字正義鄭氏康成曰言樂出而不反而禮有往來也自由也又曰此明禮樂所由生先王有仁民之德施於外故為樂以章之有報本之情動於中故為禮以行之孔氏穎達曰此明禮樂之别報施不同作樂之時庶衆皆聽之而無反報之意但有恩施而已曲禮云往而不來非禮也故禮言報也若周由后稷為始祖即追祭后稷報其王業之由是禮有報也又覆説報施之意言樂施而不報是章明其盛德也禮有恩則報以人意言之謂之報情以父祖子孫言之謂之反始其實一也張氏守節曰庾蔚之云樂者所以宣暢四氣導達情性功及物而不知所報所謂施也禮者所以通彼之意故有往有來所謂報也樂章德聞名知德若大章是也禮報人情而制隨質文之始也朱子曰樂是和氣由中間直出無所待於外禮却是始初有這意思外面却做一箇節文抵當他雖説是人做元不曾杜撰因他本有這意思存疑孔氏穎達曰若武王民樂其由武功而生王業即以武為樂名以受施處立名案德蘊於中樂形於外是樂主於施人以禮來我以禮往是禮主於報然樂之施雖達於外而達於外者實本於中心之德是樂之章德實樂其所自生禮之報雖因乎人而致之人者原以行乎敬是禮以報人之情亦以反吾心所自始也孔説民樂武德武王由武功成王業只説得樂以象功一邉與章德似隔所謂大輅者天子之車也龍旗九旒天子之旌也青黑緣者天子之寶龜也從之以牛羊之羣則所以贈諸侯也緣悅絹反正義鄭氏康成曰贈諸侯謂來朝將去報之以禮孔氏頴達曰前經明樂者為施禮者為報此明禮報之事諸侯守土奉其土地所有來朝天子故天子以此等之物報之不明樂施者其事易知故略之大輅金輅也據上公及同姓侯伯故下云龍旗九旒亦上公也若異姓則象輅四衛則革輅蕃國則木輅而受於天子總謂之大輅也龍旗九旒據上公言之侯伯則七旒子男則五旒寶龜之中並以青黑為緣天子既與之大輅龍旗及寶龜占兆又從以牛羊非一故稱羣陳氏暘曰春秋傳稱王賜晉文公以大輅之服祝鮀言先王分魯衛晉以大路杜氏以為金輅蓋周天子之輅以玉為大諸侯以金為大大夫以革木為大其為大同其所以為大異矣周官司常交龍為旗析羽為旌别之則旌旗異制合之則旗亦可謂之旌爾雅曰屬縿為旒旒亦謂之縿斾以纁則旒蒨矣左傳謂蒨茷是也青黑緣者天子之寶龜為其能顯仁藏知也以其有安民之德故報以天子之車以其有君民之德故報以天子之旌以其有守國之知故報以天子之龜以其有養民之道故報以牛羊之羣車服以庸其意如此馬氏睎孟曰天子以十二為節大輅繁纓十二就旗十有二旒青黑緣之寶龜長尺二寸公以九為節侯伯以七為節子男以五為節然則大輅與旒青黑之寶龜賜以上公之禮也案此二節劉向目録史記俱在樂施篇之末惟皇本誤屬此今考其文當在樂施篇之首右樂象章第六鄭目録第八吏記樂書第六吳氏澄纂言改居第三孔氏穎達曰皇氏以為是樂象之科自首至行其義明樂有姦聲正聲以類相感君子當去姦聲用正聲也然後發以聲音以下明正聲之道大樂之德足以安天下也故曰樂者以下明君子小人各有所樂惟君子敦行善樂也樂者心之動以下又廣明舞之義理與聲音相續之事樂也者施也明禮樂之别報施不同張氏守節曰此第六章名樂象人君作樂天地必法象應之中分五段一明淫樂正樂俱能成象二明君子所從正樂三明正樂有本非可假為四證有本不偽之由五明禮樂之用别案章中實分三節首言修德至順氣成象而樂興當然之功也次言君子德成而樂以象之末言君子之樂以象德而人又放象於君子自然之符也至樂也者施也二節則樂施篇之文而脫簡在此耳欽定禮記義疏卷五十一
