body:
  text: 冠義第四十三冠古亂反正義孔氏穎達曰鄭目録云名曰冠義者以其記冠禮成人之義此於别録屬吉事按略說稱周公對成王云古人冒而句頷注云三皇時以冒覆頭句頷繞項至黃帝時則有冕也故世本云黃帝造冕旒但黃帝以前則以羽皮為之冠黃帝以後乃用布帛成氏伯璵曰黃帝始象鳥獸之有冠角故制冠在首之上謂之元服漢髙堂生𫝊古儀禮十七篇無人君卿大夫冠禮唯有士冠禮以古者年五十始爵命為大夫也存疑孔氏穎達曰其冠之年即天子諸侯十二而冠故襄九年左𫝊云國君十五而生子冠而生子禮也又云一星終也是十二年嵗星一終大夫冠之年無文按喪服大夫為昆弟之長殤則不二十始冠也士則二十而冠曲禮云二十曰弱冠是也陸氏佃曰天子諸侯十五而冠早成其德先儒因晉侯謂魯襄公可以冠魯襄公是時年十二謂諸侯十二而冠誤矣蓋曰可以冠則非禮之正也金縢王與大夫盡辨成王時年十五則冠在是嵗可知案二十而冠者天下之達禮也其曰天子諸侯年十二而冠者先儒止據春秋傳一星之終及疏文王十五生子說言之於禮經本無確證喪服昆弟亦兄若弟之通稱不當據以為兄也程子謂年十二未可責以成人徒行此節文何益朱子謂十五至二十皆可冠但必父母無期功以上喪始可行之如朱子說則年不定儀禮有夏葛屨冬皮屨之文則月不定既年不定月不定則必除喪而冠不因喪而冠可知詳見曽子問凡人之所以為人者禮義也禮義之始在於正容體齊顔色順辭令容體正顔色齊辭令順而后禮義備以正君臣親父子和長幼君臣正父子親長幼和而后禮義立故冠而后服備服備而后容體正顔色齊辭令順故曰冠者禮之始也是故古者聖王重冠長上聲冠去聲下同正義鄭氏康成曰言人為禮以此三者為始三始既備乃可求以三行也立猶成也言服未備者未可求以三始也童子之服采衣紒孔氏穎達曰人之所以得異於禽獸者以其行禮義也先須正容體齊顔色順辭令然後可以正君臣親父子和長幼吕氏大臨曰容體顔色辭令三者修身之要必學而後成必成人而後備童子未成人者也自七年始教至於二十則三者備矣然後可以冠而責成人之事方氏慤曰容體欲其可度故曰正顔色欲其可觀故曰齊辭令欲其可從故曰順君臣存乎義故曰正父子存乎恩故曰親長幼存乎情故曰和又曰冠昏所以謹其始於先喪祭所以謹其終於後則冠昏為喪祭之始也而冠又為昏之始故曰冠者禮之始也葉氏夢得曰君臣正而朝廷肅父子親而閨門定長幼和而宗族有禮故曰禮義立馬氏睎孟曰正容體斯逺暴慢矣齊顔色斯近信矣順辭令斯逺鄙倍矣冠而后服備服備以德成成德以服章故服其服者文以君子之容遂以君子之辭實以君子之德通論陸氏佃曰柯陵之㑹厲公視逺步髙晉郤犨見其語迂郤錡見其語犯郤至見其語伐單襄公曰吾見厲公之容而聼三郤之語矣殆必禍者也蓋古之人於此以觀禍福如此則容體顔色辭令亦豈可忽哉古者冠禮筮日筮賔所以敬冠事敬冠事所以重禮重禮所以為國本也正義鄭氏康成曰國以禮為本吕氏大臨曰筮日筮賔於廟門之外成人之始質之神而不敢專敬之至也敬至則禮重禮重則人道立此國之所以為國也故曰以為國本陳氏祥道曰儀禮曰主人𤣥冠而朝服緇帶而素韠立於廟門之東西面以筮日𤣥冠象道之幽朝服皮辨致其誠之潔君子所以筮日而日無不吉也筮其賔客儀禮所謂前期三日如求日之儀是也昔之人有吉事則與賢者歡成之有凶事亦與賢者哀戚之冠禮吉事所以筮賔而歡成之也馬氏睎孟曰旬之外則筮日前期三日則筮賔筮日必吉者所以期於終身之吉筮賔必吉者所以要其終身之賢案冠禮重筮日尤重筮賔以冠乃賔加之也醮亦賔醮之字亦賔字之故以筮賔為敬事故冠於阼以著代也醮於客位三加彌尊加有成也已冠而字之成人之道也阼才故反醮子笑反正義鄭氏康成曰阼謂主人之北也適子冠於阼若不醴則醮用酒孔疏皆士冠禮文於客位敬而成之也戶西為客位庶子冠於房戶外又因醮焉孔疏亦士冠禮文不代父也冠者初加緇布冠次加皮辨三加爵辨每加益尊所以益成也字所以相尊也孔氏穎達曰阼是主人接賔處今適子冠於阼所以著明代父之義也周禮適子則以醴禮之庶子則以酒醮之周時或有舊俗行先代之禮雖適子亦用酒醮之則因而行不必改也朱子曰不醴而醮乃當時國俗不同有如此者如魯衛之幕有縿布祔有離合皆周禮自不同未必夏殷法也醮者醮盡之義鄭注士冠禮酌而無酬酢曰醮是也冠於客位尊以成人若賔客待之也加有成也謂益加有成人之事葉氏夢得曰字所以表德故已成人而稱字也吕氏大臨曰主人升立於序端西面贊者筵於東序之北西面將冠者即筵而冠則其位與主人同在阼也父老則𫝊之子姑老則𫝊之婦所𫝊皆適也故冠禮子冠於阼昏禮舅姑饗婦卒饗降自西階婦降自阼階所以著其𫝊付之意也未嘗𫝊而示之以𫝊付之意所以使之知繼之之重敬守而不敢墜也卒冠而醮若醮則席於賔位以禮賔之禮禮其子所以為成人敬也三加而服彌尊亦所以敬成人也古者童子雖貴名之而已所以别長幼也至冠卒醴然後賔字之曰伯某甫仲叔季惟其所當為成人之道而敬其名也陳氏祥道曰上有冠天道也中有服人道也下有履地道也故三加莫不有此者始加冠則緇布而服則𤣥端爵韠屨則黑而其絇青再加冠則皮辨而服則素積素韠屨則黑而其絇緇三加冠則爵辨而授之以纁裳韎韐也屨則纁而其絇黑其加之以序其序之有章所謂喻其志加有成者凡在是也方氏慤曰緇布齊冠也皮辨朝服也爵辨祭服也齊所以潔已朝所以接人祭所以交神則彌尊之義又見於此馬氏睎孟曰初加之辭曰令月吉日始加元服棄爾幼志順爾成德夀考維祺介爾景福再加曰吉月令辰乃申爾服敬爾威儀淑慎爾德眉夀萬年永受胡福三如曰以嵗之正以月之令咸加爾服兄弟具在以成厥德黃耉無疆受天之慶夫棄爾幼志順爾成德修其內而已敬爾威儀淑慎爾德則內外修也以成厥德德之成也夀考維祺未有數也故次之以眉夀萬年萬年猶有數也故終之以黃耉無疆不唯服之加也而其德亦有加不唯德之加也而其夀亦有加故曰三加彌尊加有成也郊特牲曰醮於客位加有成也三加彌尊喻其志也志言其始成言其終也通論孔氏穎達曰此記是士冠禮故三加士冠禮云古者五十而後爵何大夫冠禮之有是大夫雖冠用士禮若諸侯則有冠禮故左𫝊云公冠用祼享之禮行之金石之樂節之其加則四而有𤣥冕故大戴禮公冠四加也諸侯四加則天子亦當五加衮冕也陳氏祥道曰冠必用醴若不醴則醮以醴者太古之物故其禮簡所以示質酒者後世之味故其禮煩所以示文適子用醴庶子用醮適婦有醴與饗庶婦使人醮之不饗諸侯大夫受賜服於天子歸設奠服賜服於斯乎有冠醮無冠醴是醮輕於醴也士冠若不醴則醮者則冠適子或醴或醮惟其所用矣案家語孔子曰公四加𤣥冕王肅注天子五加衮冕大戴禮天子諸侯皆四加朱子謂當是諸侯三加𤣥冕天子三加衮冕考漢志乘輿初加進賢冠次爵辨次武辨次通天冠漢猶近古故四加如大戴說歟見於母母拜之見於兄弟兄弟拜之成人而與為禮也𤣥冠𤣥端奠摯於君遂以摯見於鄉大夫鄉先生以成人見也見賢遍反下同摯同贄正義鄭氏康成曰鄉先生謂鄉老而致仕者服𤣥冠𤣥端異於朝也孔氏穎達曰奠摯奠之於君也以摯謂以雉也士相見禮冬用雉夏用腒鄉大夫在朝之鄉大夫吕氏大臨曰冠者就筵受觶薦脯醢祭卒奠觶降筵北面取脯降自西階適東壁北面見於母母拜受子拜送母又拜冠者見於兄弟兄弟再拜冠者答拜故曰見於兄弟兄弟拜之乃易服服𤣥冠𤣥端爵韠奠摯見於君遂以摯見於鄉大夫鄉先生始以成人接也且眀貴貴長長之義也陳氏祥道曰母生我兄長我而見於母母拜之見於兄弟兄弟拜之家與之成禮也君出令以正我𤣥冠𤣥端以奠摯見國又與之成禮也鄉大夫以智帥我鄉先生以德先我遂以摯見鄉黨鄰里亦與之成禮也自一家達於一鄉自一鄉達於一國莫不與之成禮故曰將責成人者將責其為人子為人弟為人臣為人少者之禮行焉存疑孔氏穎達曰今唐禮母見子但起立不拜案儀禮廟中冠子以酒脯奠廟訖子持所奠酒脯以見於母母拜其酒脯重從尊者處來故拜之非拜子也案儀禮無奠廟文吕氏大臨曰母拜之義古今學者疑焉孔疏義亦未然所薦脯醢為醴子設非奠廟也蓋古者有庸敬有斯須之敬如為師則不臣王臣雖微在諸侯之上尸在廟門內則全於君皆斯須之敬也子之於母則庸敬矣然母雖尊卒有從子之道故當其冠也以成人之禮禮之則屈其庸敬以申斯須之敬眀從子之義猶未害乎母之尊也王氏曰見於母母拜之記者不知此禮為適長子代父承祖者與祖為正體故禮之異於衆子也案母拜之兄弟拜之只是與之行禮本文成人而與為禮一語甚眀蓋幼時父母兄弟唯慈愛之而已今以成人來見故母與兄弟各盡其相見之禮也士冠禮注云婦人於丈夫雖其子猶俠拜昏禮壻見婦之父母主婦一拜壻答再拜主婦又拜注云必先一拜者婦人於丈夫必俠拜朱子曰凡婦人見男子每先一拜男拜則又答拜若子冠則見母亦如之重成人也玩鄭注及朱子語其義甚眀蓋禮無不答燕禮則君之於臣昏禮則舅姑之於婦饋食禮則尸之於主人主婦嗣子舉奠無不答拜者何獨致疑於此此必先拜者所謂尊重事也成人之者將責成人禮焉也責成人禮焉者將責為人子為人弟為人臣為人少者之禮行焉將責四者之行於人其禮可不重與少詩照反行下孟反與音餘正義鄭氏康成曰責人以大禮者已接之不可以茍吕氏大臨曰所謂成人者非謂四體膚革異於童稚也必知人倫之備焉親親貴貴長長不失其序之謂備此所以為人子為人弟為人臣為人少者之禮行故孝弟忠順之行立而后可以為人可以為人而后可以治人也故聖王重禮故曰冠者禮之始也嘉事之重者也是故古者重冠重冠故行之於廟行之於廟者所以尊重事尊重事而不敢擅重事不敢擅重事所以自卑而尊先祖也弟音悌正義鄭氏康成曰嘉事嘉禮也宗伯掌五禮有吉禮凶禮賔禮軍禮嘉禮而冠屬嘉禮周禮曰以昏冠之禮親成男女也孔氏穎達曰先王重冠故行之於廟士行之於禰廟故士冠禮注廟謂禰廟既在禰廟此云尊先祖者尊禰即尊先祖之義且下士祖禰共廟其諸侯則冠於太祖之廟故左𫝊云以先君之祧處之聘禮云不腆先君之祧鄭注以為始祖之廟則天子當冠於始祖廟也吕氏大臨曰行必有諸已然後可以責於人故人倫備然後謂之成人成人然後可以治人也古者重事必行之廟中昏禮納采至親迎皆主人筵几於廟聘禮君親拜迎於大門之外而廟受爵有德祿有功君親策命於廟喪禮既啓則朝於廟皆所以示有所尊而不敢專也冠禮者人道之始所不可後也孝子之事親也有大事以告而後行歿則行諸廟猶是義也故大孝終身慕父母者非終父母之身終其身之謂也昏義第四十四正義孔氏穎達曰鄭目録云名曰昏義者以其記娶妻之義內教之所由成也此於别録屬吉事謂之昏者案鄭昏禮目録云娶妻之禮以昏為期因名焉必以昏者取其陽往隂來之義日入後二刻半為昏壻曰昏妻曰姻謂壻以昏時來妻則因之而去也若壻與妻之屬亦稱昏姻爾雅壻之父為姻婦之父為昏又云壻之黨為姻兄弟婦之黨為昏兄弟是也夫婦始自遂皇譙周云太昊制嫁娶儷皮為禮是儷皮起於太昊也其昏之年則大戴說男三十女二十合為五十應大衍之數自天子達於庶人一也然左氏說國君十五而生子禮也舜三十不娶謂之鰥文王十五而生武王尚有兄伯邑考知人君昏娶則早不必以年三十矣若鄭意依正禮士及大夫皆三十而後娶有早娶者非正法也吕氏大臨曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣夫婦人道之始也可不敬乎序卦曰物不可以茍合故受之以賁蓋天下之情不合則不成其所以合也敬則克終茍則易離必受之以致飾者所以敬而不茍也昏禮者其受賁之義乎案周禮媒氏凡男女自成名以上皆書年月日名令男三十而娶女二十而嫁家語孔子云男二十而冠有為人父之道女十五而筓有適人之道三十娶二十嫁言其極也漢王吉言嫁娶太早未知為人父母之道而有子是以教化不眀而民多夭則左𫝊言國君十五生子者恐非而宋令十三以上並聼昏嫁愈非矣酌以家語孔子之言可也昏禮者將合二姓之好上以事宗廟而下以繼後世也故君子重之是以昏禮納采問名納吉納徴請期皆主人筵几於廟而拜迎於門外入揖讓而升聼命於廟所以敬慎重正昏禮也昏一作昏好呼報反正義鄭氏康成曰聼命謂主人聼使者所𫝊壻家之命孔氏穎達曰此經總眀昏禮之義從始至終也采謂采擇之禮故昏禮下達納采用鴈白虎通云鴈取其隨時南北而不失節又鴈隨陽妻從夫之義納采問名二禮一使兼行之納吉者謂男家既卜得吉與女氏也納徵者納聘財也徵成也先納聘財而後昏成春秋則謂之納幣其庶人則緇帛五兩陳氏祥道曰周禮純帛無過五兩史錦繡千純文繡千純純帛匹帛也鄭改緇誤案純有訓絲者有訓匹者周禮讀如字鄭讀為䊷已於祭統中辨正其誤此改庶人緇以别大夫之𤣥纁亦通卿大夫則𤣥三纁二加以儷皮諸侯加以大璋天子加以榖圭請期者謂男家使人請女家以昏時之期請者謙敬之辭示不敢自專也納吉納徵請期每一事則使者一人行唯納徵無鴈有幣其餘皆用鴈主人謂女父母行此等禮時女之父母設筵几於禰廟此等皆據士昏禮而知之陳氏祥道曰言無過五兩則或庶人不必五兩也吕氏大臨曰娶妻不娶同姓買妾不知其姓則卜之皆所以遠别也君子之祭也既內自盡又外求助昏禮是也故國君取夫人之辭曰請君之玉女與寡人共有敝邑事宗廟社稷出夫人之辭曰某不敏不能從而共粢盛昏禮父醮子命之曰往迎爾相承我宗事詩有采蘩采蘋皆以承先祖供祭祀為不失職婦人之職莫先於奉祭祀女子未嫁觀於祭祀納酒漿籩豆菹醢禮相助奠其教有素矣有夫婦然後有父子故天地不合萬物不生大昏萬世之嗣也此昏禮所以不可不敬也故曰將合二姓之好上以事宗廟下以繼後世也昏禮之節納采問名納吉納徵請期親迎其别有六必至於六者敬則不茍别則致詳也納采者男先下女媒妁之言既達納采擇之禮以求之禮用鴈鴈大夫之摯也士昏而用大夫之摯攝盛也其辭曰吾子有惠貺室某也某也有先人之禮使某也請納采言有惠貺室則知女氏之前許也既納采遂問名者將卜之也故其辭曰某既受命將加諸卜敢請女為誰氏對曰吾子有命且以備數而擇之某不敢辭則告之矣納吉者既問名而男氏以吉卜告女氏也其辭曰吾子有貺命某加諸占曰吉使某也敢告納徴者納幣以聘之也古之聘士聘女皆以幣交恭敬不可以虛拘也正潔之女非禮則不行猶正潔之士非其招則不往敬之如此其至則夫婦之不正未之有也徴成也證也所以成其信而不渝也聘幣皆以束帛故無過五兩諸侯天子加玉則又所以重其禮也請期者男氏請昏期於女氏也昏期主於男氏而必請於女氏女氏固辭然後告期者賔主之義不敢先也此五者行乎親迎之前又皆男氏受命於廟女氏聼命於廟筵几以敬神拜迎揖讓以敬賔至繁縟也至重慎也皆所以敬而不茍也婦從乎夫女卑乎男人之大倫也昏禮下達自納采至於親迎皆男先於女者天地之義存焉天氣降而下地氣應而上則天地交而隂陽和萬物生上以禮求下下以誠應上則上下交君臣和萬化成男女之際非特有所下也别疑逺恥且以成婦之正順以為事宗廟繼後世之重也聘則為妻奔則為妾聘者以禮先之奔則不待禮而行此所以别貴賤也陳氏祥道曰士昏禮既納采問名然後歸卜於禰既卜然後納吉而卜常在告廟之日禮記曰卜郊受命於祖廟作龜於禰宫鄭氏謂受命退乃卜卜昏之禮蓋亦如之納采問名一使而二鴈三入廟而再迎之則問名因於納采故其禮略也請期曰吾子有賜命某既申受命矣惟是三族之不虞使某也請吉日蓋惟父之昆弟已與子之兄弟無死喪之凶然後可以行禮焉馬氏睎孟曰二姓者姓之所自出者異也繫之以姓而弗别綴之以食而弗殊雖百世而昏姻不通周道然也自納采至請期聼壻家之命必於廟者不敢忘其祖以敬慎重正昏禮也方氏慤曰采擇自我而名氏在彼故首之以納采而次之以問名此資人謀以達之也謀既達矣則宜資鬼謀以决之故又次之以納吉焉人謀鬼謀皆協從矣然後納幣以徴之請日以期之故其序如此存疑孔氏穎達曰問名者問其母所生之姓名故昏禮云為誰氏言女之母何姓也賈氏公彥曰問名者問母之姓氏不問三月之名故昏禮問名辭云敢請女為誰氏鄭云誰氏者謙也不必其為主人之女是問姓氏也案經文眀云問名而孔賈以為問母之姓鄭又謂謙不敢必其為主人之女夫世豈有納采之後而猶不知其母之姓者乎有為女擇配而非己女者乎儀禮之辭所謂誰氏者如仲子孟姬叔姬季姬之類前此納采時既告以某之子矣至此乃問其女之名氏也又案白虎通云娶妻不告廟示不必安也遣女於廟重先人之遺支體也朱子云鄭忽先配後祖陳針子譏之楚圍亦言告於莊共之廟而來是娶妻亦先告廟矣豈左氏據當時俗禮非先王正法歟考經文筵几於廟聼命於廟是女氏之廟若上事宗廟則男以事宗廟而娶恐無不告廟之理問名歸卜於廟乃納吉是納吉已告廟矣豈有納徴親迎而不告廟者父親醮子而命之迎男先於女也子承命以迎主人筵几於廟而拜迎於門外壻執鴈入揖讓升堂再拜奠鴈蓋親受之於父母也降出御婦車而壻授綏御輪三周先俟於門外婦至壻揖婦以入共牢而食合卺而酳所以合體同尊卑以親之也醮子妙反迎魚敬反下以迎同先悉薦反卺音謹酳音引正義鄭氏康成曰酌而無酬酢曰醮醮之禮如冠醮與孔疏無酬酢直醮盡之而已冠醴亦無酬酢不名醮者以禮敬之不為飲也其異者於寢耳孔疏冠醮子於廟此醮在寢成案其在寢者先告廟也昏姻之事於寢壻御婦車輪三周御者代之壻自乘其車先道之歸也共牢而食合卺而酳成婦之義又駁異義引左氏謂天子諸侯不親迎夫文王娶太姒親迎於渭又孔子答哀公云合二姓之好繼先聖之後以為天地宗廟社稷之主冕而親迎何謂己重乎此天子諸侯有親迎也孔氏頴達曰此眀親迎之義父以酒醮子而命之親迎男往迎之女則從男而至主人女之父壻來親迎以敵禮待之故拜迎於門外主人就東階初入門將曲揖當階北面揖當碑揖至階三讓主人升自阼階揖壻升自西階北面奠鴈再拜於時女房中南面母在房户外之西南面壻既拜訖旋降出女出房南面立於母左父西面誡之女乃西行母南面誡之是壻親受之於父母也降出御婦車謂壻降西階而出親御婦車婦升車時壻授婦以綏御婦車之輪三匝然後御者代御之婦至壻之寢門壻揖婦以入則稍西避之共牢而食者在夫之寢壻東面婦西面共一牲牢而同食不異牲也酳演也謂食畢飲酒演安其氣也卺謂半瓢以一瓠分為兩瓢謂之卺壻與婦各執一片以酳故云合卺而酳欲使壻親婦婦亦親壻所以體同為一不使尊卑有殊也吕氏大臨曰御婦車授綏御輪三周先俟於門外則所以下之之禮盡矣共牢合卺則所以親之之義見矣下之則有敬矣親之則有愛矣愛敬禮之大體而先敬後愛者自異姓而合之所以貴乎别也故曰所以成男女之别而立夫婦之義存疑陳氏祥道曰異義云戴禮說天子親迎左氏說天子不親迎上卿迎之諸侯亦不親迎使上大夫迎之鄭氏駁其說而謂天子諸侯有親迎然考之於經著之詩刺不親迎而充耳以黃者人君之飾又文王迎於渭韓侯迎於蹶而春秋紀裂繻來公羊曰譏不親迎也公子翬如齊逆女榖梁曰逆女親者也使大夫非正也莊公如齊逆女榖梁曰親迎常事也不志此其志何不正其親迎於齊也凡此皆言諸侯親迎之禮若天子則不然趙氏謂王者之尊海內莫敵故嫁女則使諸侯主之適諸侯諸侯莫敢有其室若屈萬乘之君而行親迎之禮則何莫敢敵之有夫子告哀公以為天地社稷宗廟之主以魯有郊祀天地之禮故云爾非為天子發也左氏謂諸侯不親迎公羊謂天子亦親迎其說不能全與經合當從趙氏之說為正案親迎之禮自天子下達左氏謂天子至尊不親迎先儒謂天子娶於諸侯迎后使卿往而公監之朱子亦謂古者天子必無親至后家之禮惟鄭氏從公羊之義謂為天地宗廟社稷之主非天子而誰周氏諝謂三年之喪人道之終親迎人道之始故皆自天子達於庶人朱子亦謂天地蓋通天子而言况天子主祭於外后主祭於內即宗伯攝天地社稷之祭要亦后為祭主也而可不致敬於其始乎然則親迎之禮信自天子達但天子迎之於館諸侯迎之於境大夫士庶迎之於家異耳陳氏祥道謂天子不迎於其國則可謂不迎則不可又案執鴈有四義取其順隂陽而往來一也不再偶二也士用大夫摯為攝盛三也昏禮摯不用死物故越雉而用鴈四也四者義可相兼而於士昏禮則以攝盛之義為主敬慎重正而后親之禮之大體而所以成男女之别而立夫婦之義也男女有别而后夫婦有義夫婦有義而后父子有親父子有親而后君臣有正故曰昏禮者禮之本也别彼列反下同正義鄭氏康成曰言子受氣性純則孝孝則忠也孔疏昏禮得所則受氣純和生子必孝事君必忠孝則父子親忠則君臣正是昏禮為諸禮之本也孔氏穎達曰昏禮必敬慎重正而後男女相親不然久必離異也馬氏睎孟曰男女者夫婦之始夫婦者男女之終始則成男女之别終則必能立夫婦之義由男女有别以至於君臣有正其序如易所謂有男女然後有夫婦有夫婦然後有父子以至於有君臣然後禮義有所錯同夫禮始於冠本於昏重於喪祭尊於朝聘和於射鄉此禮之大體也朝直遙反正義鄭氏康成曰始猶根也本猶幹也鄉鄉飲酒孔氏穎達曰此因昏禮為諸禮之本遂廣眀禮之始終馬氏睎孟曰冠以成人故為禮之始昏以繼後世故為禮之本喪以慎終祭以追逺故曰重朝以教諸侯之臣聘以成諸侯之好故曰尊習射尚功習鄉尚齒皆有飲故曰和葉氏夢得曰周官以嘉禮親萬民則先昏而後冠此則先冠而後昏何也蓋冠者一身之始昏者萬世之始周官垂於萬世則先昏此言一身則先冠不害其為序也夙興婦沐浴以俟見質眀贊見婦於舅姑婦執笲棗栗段修以見贊醴婦婦祭脯醢祭醴成婦禮也見賢遍反笲音煩段音腶按古本執笲上無婦字正義鄭氏康成曰成其為婦之禮也孔氏穎達曰婦執笲棗栗段修以見者案士昏禮舅坐於阼階西面姑坐於房外南面婦執笲棗栗進東面拜奠於舅席訖婦又執腶修升進北面拜奠於姑席是也贊醴婦婦祭脯醢祭醴者案士昏禮婦席於户牖閒贊者酌醴置於席前北面婦於席西東面拜受贊者西階上北面拜送又拜薦脯醢婦升席左執觶右祭脯醢訖以柶祭醴三是也吕氏大臨曰婦人從夫與夫同體者也夫之所事婦亦從之所飬婦亦飬之故婦之於舅姑猶子之於父母也夙興沐浴執笲以見舅姑舅姑醴婦婦祭脯醢祭醴眀敬事自此始矣故曰成婦禮也方氏慤曰婦沐浴以俟見所以致敬也贊即相者也棗栗則品之潔者以奠於舅尊之也段修則味之美者以奠於姑親之也贊醴婦謂贊者以醴酌婦而勞之也祭脯醢而不及牲祭醴而不及酒者又以婦禮始成而未備故也馬氏睎孟曰沐浴自潔以重禮也質眀平眀也贊者贊助以行禮也婦人質用器不過於笲其摯不過棗栗段修而已贊醴婦者舅姑答婦亦必有贊也婦必祭者所以重舅姑之答已也存疑鄭氏康成曰贊醴婦醴當作禮聲之誤也案醴婦如士冠禮之醴子鄭注謂醴當作禮下文又何以云祭醴耶存異陸氏德眀曰笲器名以葦若竹為之其形如筥衣之以青繒以盛棗栗腵修之屬案士昏禮記笲緇被纁裏無青繒說注笲竹器無葦說舅姑入室婦以特豚饋眀婦順也正義鄭氏康成曰以饋眀婦順者供飬之禮主於孝順孔氏穎達曰士昏禮舅姑入於室婦盥饋特豚合升側載無魚臘無稷並南上其他如取女禮鄭注云側載者右胖載之舅俎左胖載之姑俎異尊卑並南上者舅姑共席於奧其饌各以南為上也吕氏大臨曰舅姑入室婦以特豚饋贊成祭卒食一酳徹席婦餕眀共飬自此始矣故曰眀婦順也案易家人六二曰無攸遂在中饋婦人主中饋奉飬舅姑是第一義饋者進食於尊之名以特豚饋合升而分載之眀婦順也成婦禮方眀婦順是立言次第存疑孔氏穎達曰大夫以上非惟特豚案其說事或有之而於經無所據厥眀舅姑共饗婦以一獻之禮奠酬舅姑先降自西階婦降自阼階以著代也正義鄭氏康成曰婦降自阼階言既獻之而授之以室事也降者各還其燕寢婦見及饋饗於適寢昏禮不言厥眀此言之者容大夫以上禮多或異日孔疏士昏禮婦見舅姑之日即舅姑饗婦孔氏穎達曰舅姑共饗婦者案士昏禮既言舅獻爵姑薦脯醢以鄉飲酒之禮約之席在室外户之西阼階是舅姑所升處今婦由阼階而降是著眀代舅姑之事也適寢謂舅姑之適寢吕氏大臨曰父老則𫝊之子姑老則𫝊之婦故冠禮子始冠著其代父之意焉昏禮婦始見著其代姑之意焉眀所以冠所以昏者其責在是也故曰以著代方氏慤曰厥眀眀日也夙興婦既饋舅姑矣故厥眀舅姑共饗婦焉蓋報施之禮然也一獻與一獻熟之一獻同義奠酬與奠酬而升歌同義阼者主人之階子之代父將以為主於外婦之代姑將以為主於內故此與冠禮並言著代也葉氏夢得曰冠禮則責其為人父昏禮則責其為人母皆降自阼階以著代也陳氏澔曰厥眀昏禮之又眀日也昏禮注云舅姑共饗婦者舅獻爵姑薦脯醢又云舅洗於南洗洗爵以獻婦也姑洗於北洗洗爵以酬婦也賈疏云舅獻姑酬共成一獻仍無妨姑薦脯醢此說是也但婦酢舅更爵自薦又云奠酬酬酢皆不言處所以例推之舅姑之位當如婦見舅席於阼姑席於房外而婦行更爵自薦及奠獻之禮與姚氏舜牧曰饗婦與醴婦不同醴婦是使贊執醴事饗婦則舅姑饗之也一獻奠酬之禮據昏禮注云舅獻爵姑薦脯醢是獻在舅也又云舅洗於南洗洗爵以獻婦姑洗於北洗洗爵以酬婦是獻在舅酬在姑也賈氏疏云舅獻姑酬共成一獻孔氏疏云舅酌酒於阼階獻婦婦受卒爵婦酢舅舅受酢飲畢乃酬婦更爵先自飲畢更酌酒以酬姑是不特舅酬婦婦又酬姑也其說俱未詳眀玩此條重在著代重著代故先之以獻饗然家人不事多文且以尊臨卑故饗唯一獻存疑孔氏穎達曰舅酌酒於阼階獻婦婦西階上拜受即席祭薦祭酒畢於西階上北面卒爵婦酢舅舅於阼階上受酢飲畢乃酬婦先酌自飲畢更酌酒以酬姑姑受爵奠於薦左不舉爵正禮畢也姚氏舜牧曰男女不相授受意饗婦時尊卑皆有席舅但執爵同姑獻於席上不親授婦拜受卒爵更二爵酢舅姑亦奠於席上舅姑又復更爵奠於婦席上故記禮者特下一奠字奠安也置也見此獻酬但安置於席上不親授也崇其禮而又别其嫌若是內則云男女非祭非喪不相授器其相授則女受以篚其無篚則皆坐奠之而後取之此奠字一證案士昏禮舅姑共饗婦以一獻之禮舅洗於南洗姑洗於北洗奠酬鄭注南洗在庭北洗在北堂設兩洗者獻酬酢以潔清為敬奠酬者眀正禮成不復舉凡酬酒皆奠於薦左不舉賈疏案記云饗婦姑薦焉注云舅獻姑薦脯醢設北洗為婦人不下堂也則是舅獻姑酬共成一獻敖繼公云饗婦不辭洗不拜洗婦酢舅亦洗於北洗獻酢用爵酬用觶各於其席前舅拜於阼階上北面婦拜於西東面姑酬則於舅之席北而奠觶於婦之薦西婦取姑之酬酒而奠之於薦東也案賈疏及敖說甚眀今參鄉飲酒特牲少牢饋食之儀蓋饗婦時舅姑席在阼舅南而姑北婦席在户牖間舅獻酒洗於南洗不親授洗升實爵婦席前北面奠之婦拜受爵於西舅拜送爵於阼階姑薦脯醢婦升席祭卒爵拜舅阼階上答拜婦答酌酢舅洗於北洗升實爵亦不親授於舅席前奠之舅拜受爵婦拜送爵薦脯醢舅升席祭卒爵拜婦答拜姑取觶洗於北洗實觶酬婦於婦之席北奠觶拜婦席西答拜飲卒觶坐奠觶拜婦答拜姑實觶婦之席前北面婦席西拜姑坐奠觶於薦西婦辭坐取觶復位姑拜送婦北面取觶奠於薦東此所謂舅獻姑酬共成一獻之禮也舅獻婦則婦飲一爵婦酢舅則舅飲一爵姑酬婦則姑先導飲一觶然後實觶酬婦則婦奠之而不舉所謂正禮成也孔疏舅酬婦婦又酬姑其說非是姚說舅同姑獻亦非禮不參之義也成婦禮眀婦順又申之以著代所以重責婦順焉也婦順者順於舅姑和於室人而后當於夫以成絲麻布帛之事以審守委積蓋藏當丁浪反委於僞反積子賜反藏才浪反正義鄭氏康成曰室人謂女妐女叔諸婦也孔疏女妐謂壻之姊女叔謂壻之妹諸婦謂娣姒之屬當猶稱也後言稱夫者不順舅姑不和室人雖有善者猶不為稱夫也孔氏穎達曰申重也重加之以著代之義所以重責其婦之孝順也蓋藏掩蓋藏聚之物也室人是在室之人非男子也吕氏大臨曰婦禮所以敬也婦順所以愛也著代所以貴也三者皆所以順舅姑方氏慤曰上下相從謂之順可否相濟謂之和舅姑禮隆故可順不可逆室人禮敵故雖和而不必同絲所以成帛麻所以成布少而有所委多而有所積物在下曰蓋在內曰藏成絲麻布帛婦功之本也審守委積蓋藏坤為吝嗇故也通論吕氏大臨曰古之大孝飬志而已雖有三牲之飬而不能和其家人則不足以解憂其飬也微矣婦順舅姑何以異此故和於室人而後當於夫以成絲麻布帛之事以審守委積蓋藏是亦飬志者也飬志者順莫大焉故內和理而後家可長久也是故婦順備而后內和理內和理而后家可長久也故聖王重之正義鄭氏康成曰順備者行和當事成審也孔疏行和當者謂順於舅姑和於室人當於夫也成絲麻布帛之事審守委積蓋藏是事成審也馬氏睎孟曰婦順備而後內和理和則有理理則有義有理義則家可長久聖王所重者在此案無不周浹為和悉有處分為理二者缺一便不順是以古者婦人先嫁三月祖廟未毁教於公宫祖廟既毁教於宗室教以婦德婦言婦容婦功教成祭之牲用魚芼之以蘋藻所以成婦順也先悉薦反芼莫報反正義鄭氏康成曰謂與天子諸侯同姓者也案公宫謂君之宫廟同姓祖廟未毁則有服之親也嫁女者必就尊者教成之教之者女師也孔疏即詩所云言告師氏者祖廟女所出之祖也孔疏女出於君之髙祖則祭髙祖廟出於君之曽祖則祭曽祖廟祖父亦然女親行祭詩有齊季女公君也宗室宗子之家也孔疏與大宗近者於大宗教之與小宗近者於小宗教之婦德貞順也婦言辭令也婦容婉娩也婦功絲麻也祭之祭其所出之祖也魚蘋藻皆水物隂類也魚為俎實蘋藻為羮菜祭無牲牢告事耳非正祭也其齊盛用黍云孔疏君廟應用牲牢此非正祭不用正牲則無稻粱既用蘋藻為羮則當有齊盛以士特牲黍稷知之君使有司告之宗子之家孔疏君釁廟使有司知此亦使有司也若卿大夫以下則女主之宗子掌其禮若其祖廟已毁則為壇而告焉孔疏假令宗子為士止有父祖廟女與宗子同曽祖為壇告曽祖同髙祖為壇告髙祖孔氏穎達曰此更申眀成婦順之事祖廟未毁謂與君為骨月親廟有四髙祖廟未毁除此欲嫁之女教於公宫也祖廟既毁謂與君四從以外同髙祖之父以上其廟既遷是祖廟既毁此女則教於大宗子之室三月教之其教已成祭女所出祖廟告以教成也未嫁之前先教四德又祭而告欲使嫁而為婦遵此教而成和順也又曰內則女子十年不出使姆教成之眀已前恆教但嫁前三月特就公宫之教欲尊之也張子曰古者婦人亦須有教教於公宫宗室是也故知夙興夜寐臨祭祀事賔客承尊長馬氏睎孟曰婦人以順為本故先教之以德德本也言文也容者又其文之動也功者又其德之餘事也四者備則祭之以告其成也古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聼天下之內治以眀章婦順故天下內和而家理天子立六官三公九卿二十七大夫八十一元士以聼天下之外治以眀章天下之男教故外和而國治故曰天子聼男教后聼女順天子理陽道后治隂德天子聼外治后聼內治教順成俗外內和順國家理治此之謂盛德嬪毗人反御妻當作御女按后聼內治今本作內職正義鄭氏康成曰天子六寢而六宫在後六官在前所以承嗣施外內之政也內治婦學之法也隂德謂主隂事隂令也孔氏穎達曰此因昏禮而眀天子與后各立其官掌內外之事法隂陽之所為也案宫人云掌王之六寢之修注云路寢一小寢五是天子六寢也后六宫在王之六寢後亦大寢一小寢五其九嬪以下亦分居之其三夫人亦分主六宫之事或二宫則一人也或如三公分主六卿之類也六卿之官在王六寢之前其三孤亦分主六官之職總謂之九卿故考工記云外有九室九卿朝焉是也案九嬪職云掌婦學之法故知內治是婦學也案內宰掌王之隂事隂令注云隂事謂羣妃御見之事隂令謂王所求為於北宫也吕氏大臨曰男正位乎外女正位乎內男女正天下之大義也有家者夫聼家之外治婦聼家之內治天子與后有天下者也則不得不聼天下之內外治也外治者眀章男教也內治者眀章婦順也婦順之法德言容功皆是也陽道者夫所以正其室也隂德者婦所以宜其家也刑于寡妻至于兄弟則正室之道天子所理也嘒彼小星夙夜在公則宜家之道后所治也鄭氏謂內治之道婦學之法隂德謂主隂事隂令其義然也凡天子所聽皆外治后所聼皆內職至於教順成俗外內和順國家理治必如周南召南盛德之化然後可致也李氏曰內宰以隂禮教六宫又以隂禮教九嬪又以婦職之法教九御在王宫者不可不知禮也如使后夫人九嬪世婦女御皆受教皆知禮德皆正言皆順無冶容無廢功無侈服無喪道則閨門之內何有不肅普天之下何有不化關雎之不淫葛覃之躬儉樛木之無妬螽斯之多子孫卷耳之輔助求賢罝之莫不好德於斯見矣王道安得不成乎又曰此經言三夫人九嬪二十七世婦八十一御妻至於天官序則世婦以下不言數謂君子不茍於色有婦德者充之無則闕世婦女御視大夫士尚唯其人則三夫人九嬪官不必備可知矣存異鄭氏康成曰三夫人以下百二十人周制也三公以下百二十人似夏制也合而言之取其相應象大數也孔氏頴達曰欲見其數相當故以夏周相對為內外案九嬪世婦女御周禮雖設其職未嘗實其人自漢儒之昏義始列之為數鄭康成注小星詩及內則妻不在妾御莫敢當夕孔穎達俱從而附㑹之謂御見之法各帥其屬使九九相與從於王所女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕此則注疏之背繆也春秋之禮忒而亂及於三古漢唐之禮失而附㑹於六經其不足信决矣是故男教不修陽事不得適見於天日為之食婦順不修隂事不得適見於天月為之食是故日食則天子素服而修六官之職蕩天下之陽事月食則后素服而修六宫之職蕩天下之隂事故天子之與后猶日之與月隂之與陽相須而后成者也適直革反見賢遍反正義鄭氏康成曰適之言責也食者見道有虧傷也蕩者滌去穢惡也孔氏穎達曰此言男女之教不得則日月為之適食左𫝊昭二十一年十二月辛亥朔日有食之庚午之日始有謫謫謂日之將食之氣氣見於上所以責人君也故詩云十月之交朔日辛卯日有食之亦孔之醜又曰此日而食於何不臧是不善而日食之應也吕氏大臨曰男教陽事上應乎日婦順隂事上應乎月有不得則謫見於天為之薄食日食則天子為之變月食則后為之變素服自責各正厥事以答天變眀后與天子日月隂陽相須而后成之義也葉氏夢得曰日月之食理所常有必反之隂陽之事躬自厚之道也朱子曰日月之食皆有常度然王者修德行政用賢去姦能使陽盛足以勝隂隂衰不能侵陽則日月之行雖或當食而月常避日故其遲速髙下必有參差而不正相合不正相對者所以當食而不食也若國無政不用善使臣子背君父妾婦乘其夫小人陵君子外夷侵諸夏則隂盛陽衰當食必食雖曰行有常度而實為非常之變矣天子修男教父道也后修女順母道也故曰天子之與后猶父之與母也故為天王服斬衰服父之義也為后服資衰服母之義也衰七雷反資依注作齊音咨正義鄭氏康成曰父母者施教令於婦子者也故其服同資當為齊聲之誤也吕氏大臨曰以人倫推之天子修男教天下之父也后修女順天下之母也其德之盛必能以天下為一家為天下父母然後天下以父服服天子以母服服后也方氏慤曰服天子以父之義服后以母之義言以其義而服之非服之正故檀弓謂之方喪欽定禮記義疏卷七十四
