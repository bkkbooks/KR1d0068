body:
  text: 喪大記第二十二之二小斂於戶內大斂於阼君以簟席大夫以蒲席士以葦席簟徒點反葦于鬼反正義鄭氏康成曰簟細葦席也三者下皆有莞孔疏始死至大斂用席皆有莞也大夫辟君上席以蒲若吉禮則蒲在莞下故司几筵蒲席繢純加莞席紛純與此異也孔氏頴達曰此明君大夫士小斂大斂所用之席士卑不嫌故得與君同用簟也案士喪禮記云設牀當牖下莞上簟士喪經云布席户內下莞上簟謂小斂也大斂云布席如初案説文簟竹席蒲與葦皆草席黃氏日抄云簟細蒲次之葦粗見君與大夫士隆殺之别士喪禮下莞上簟孔疏士卑不嫌得與君同或記者傳聞異辭小斂布絞縮者一橫者三君錦衾大夫縞衾士緇衾皆一衣十有九稱君陳衣於序東大夫士陳衣於房中皆西領北上絞襟不在列絞户交反縮所六反縞古老反稱尺證反襟其鴆反正義鄭氏康成曰絞既斂所用束堅之者縮從也衣十有九稱法天地之終數也孔疏天數終於九地數終於十人既終故以天地終數斂之也士喪禮小斂陳衣於房中南領西上與大夫異今此同亦蓋天子之士也絞襟不在列以其不成稱不連數也小斂無襟孔疏以下大斂言布絞布襟此但言布絞知之因絞不在列見之也或曰縮者二孔氏穎逹曰以布為絞從者一幅竪置於尸下橫者三幅亦在尸下從者在橫者之上每幅之末析為三片以結束為便也君大夫士各用一衾故云皆一舒衾於此絞上君大夫士同用十九稱衣布於衾上然後舉尸於衣上屈衣裹又屈衾裹之然後以絞束之絞襟不在十九稱之列存疑孔氏頴達曰房中者東房大夫士惟有東房也辨正朱子曰公食大夫禮記筵出自東房注曰天子諸侯左右房賈氏曰言左對右言東對西大夫士惟東房西室故直云房而已然案聘禮賓館于大夫士君使卿還玉於館也賓退負右房則大夫士亦有右房矣又鄉飲酒禮記薦出自左房少牢饋食禮主婦薦自東房亦有左房東房之稱當考總論孔氏頴逹曰此以下至絺綌紵不入廣明君大夫士小斂大斂及禭所用之衣并所陳之處此明小斂之衣大斂布絞縮者三橫者五布襟二衾君大夫士一也君陳衣於庭百稱北領西上大夫陳衣於序東五十稱西領南上士陳衣於序東三十稱西領南上絞襟如朝服絞一幅為三不辟襟五幅無紞幅一作畐方服反辟補麥反又音璧紞丁覽反正義鄭氏康成曰二衾者或覆之或薦之如朝服者謂布精粗朝服十五升孔疏絞襟布皆十五升小斂之絞也廣終幅析其末以為堅之強也孔疏小斂布少用全幅布欲得堅束力強大練之絞一幅三析用之以為堅之急也孔疏凡物細則束縳牢急大斂衣多故須急也紞以組類為之綴之領側孔疏領被頭側被旁若今被識矣生時禪被有識孔疏識記也故案生時恐其或倒記之死者去之異於生也士喪禮大斂亦陳衣於房中南領西上與大夫異今此又同亦蓋天子之士紞或為點孔氏頴逹曰此明大斂之事布絞縮者三取布一幅裂作三片直用之兩頭裂中央不通橫者五者又取布二幅分裂作六片用五片橫於縮下布襟當在絞上以絞束之二衾者一是始死覆尸者士喪禮幠用斂衾注大斂所並用之衾一是大斂時復制士既然明大夫以上亦然君陳衣百稱者衣多故陳在庭為榮鄭注雜記篇襲禮大夫五諸侯七上公九天子十二稱則此大斂天子當百二十稱上公九十稱侯伯子男七十稱今云君百稱者據上公舉全數言之北領謂尸在堂也西上由西階取之便也大夫士小斂衣少統於尸故北上大斂衣多故南上亦取之便也絞以一幅之布分為三段辟擘也小斂絞全幅析裂其末為三大斂之絞既小不復擘裂其末吳氏澄曰辟讀如闢開也小斂之絞以布之全幅為數大斂之絞以布之小片為數大斂橫縮之絞八片皆狹小故結束處不用更辟裂之小斂橫縮之絞是全幅之布則其末須是剪開為三方可結束襟五幅者蓋用布五幅聮合為一如今稱布被斂衾直鋪布衾橫鋪斂時先緊捲布襟以包裹斂衾然後結束縮絞之三縮絞結束畢然後結束橫絞之五也存異皇氏侃曰襟禪被也取置絞束之下擬用以舉尸也孝經云衣衾而舉之是也小斂之衣祭服不倒君無禭大夫士畢主人之祭服親戚之衣受之不以即陳小斂君大夫士皆用復衣復衾大斂君大夫士祭服無算君褶衣褶衾大夫士猶小斂也禭音遂復音福褶音牒正義鄭氏康成曰不倒尊祭服也斂者要方散衣有倒君無襚者不陳不以斂也褶祫也君衣尚多去其著也孔氏頴逹曰祭服謂死者所得用也小斂十九稱不悉著之但用裹尸要取其方衣有倒領在足間者惟祭服不倒也君斂悉用己衣臣有致襚不得陳用也大夫士降於君小斂則先畢盡用已正服乃用賔客禭者也用衣之美者故言祭服若親屬有也相送受之而不以即陳列也士喪禮鄭注云大功以上有同財之義禭之不將命自即陳於房中小功以下及同姓皆將命案親者禭不將命衆兄弟外兄弟使人將命不親致朋友則親致之親者禮略其情重疏者禮隆其情淺也祭服無算算數也大斂所有祭服皆用之無限數也大夫士猶小斂主人猶用復衣復衾若襚亦得用祫也故士喪禮云襚以褶陳氏澔曰復衣復衾衣衾之有綿纊者存疑熊氏安生曰君無禭大夫士謂君不合以衣禭大夫士孔氏頴逹曰雖有君禭不陳不以斂至大斂則得用君禭胡氏銓曰此謂小斂若大斂則君有禭士喪禮具之辨正吳氏澄曰此章每節皆言君與大夫士三者之禮如熊説則此節不言君禮而但言大夫士禮與前後不合孔氏兩存其義猶或有疑胡氏專主其説則偏矣袍必有表不禪衣必有裳謂之一稱禪音單正義鄭氏康成曰袍褻衣必有以表之乃成稱也雜記曰子羔之襲繭衣裳與稅衣纁衻為一是也孔疏𫀆繭衣上加稅衣表之乃成稱論語當暑袗絺綌必表而出之亦為其褻也孔疏證冬夏並用袍上並加表熊氏安生曰褻衣所用尊卑不同士襲而用褻衣故士喪禮陳襲事爵辨服皮辨服禒衣純衣注云禒所以表袍是襲有袍士喪禮小斂云祭服次散衣次注云緣衣以下袍繭之屬是小斂有袍士喪禮大斂散衣是亦有袍若大夫襲亦有袍斂則必用正服不用褻衣若公則襲及大小斂皆不用褻衣雜記公襲無袍繭襲輕尚無則大小斂無可知也孔氏頴逹曰袍有衣以表之不使禪露也陸氏德明曰衣單復具曰稱黃氏震曰袍必有表內外相稱衣必有裳上下相稱案袍必有表乃為一稱男子禮服衣與裳殊恐止有衣無裳故又言必有裳凡陳衣者實之篋取衣者亦以篋升降者自西階凡陳衣不詘非列采不入絺綌紵不入篋苦協反詘丘勿反紵直呂反正義鄭氏康成曰取猶受也不屈謂舒而不卷也列采謂正服之色也絺綌紵當暑之褻衣也襲尸重形冬夏用袍及斂則用正服孔氏頴逹曰列采謂五方正色非列采謂雜色不入陳之也絺是細葛綌是粗葛紵是紵布此褻衣也陳氏澔曰陳衣者實之篋自篋中取而陳之也取衣收取禭者所委之衣也吳氏澄曰篋盛之者示慎重不輕褻之意自西階者主人雖死視之如生不敢由主人之階也凡斂者袒遷尸者襲君之喪大胥是斂衆胥佐之大夫之喪大胥侍之衆胥是斂士之喪胥為侍士是斂正義鄭氏康成曰袒者於事便也侍猶臨也大祝之職大喪贊斂喪祝卿大夫之喪掌斂士喪禮商祝主斂孔氏頴逹曰此明斂所用之人大小斂事多故袒為便遷尸入棺事少故襲大祝是接神者君尊故使親執斂事是猶執也衆祝喪祝也賤故副佐大祝大夫卑故大祝侍之侍謂臨檢之也君應有侍者不知何人也喪祝卑故親執斂也士之喪喪祝臨之士之朋友來助斂也士喪禮士舉遷尸是也商祝祝習商禮者存疑鄭氏康成曰胥樂官也不掌喪事胥當為祝字之誤也辨正吳氏澄曰大胥非謂樂官之大胥案周官大祝之下有胥四人所謂大胥者大祝之胥也喪祝之下有胥四人所謂衆胥者衆祝之胥也大祝之爵為下大夫喪祝之爵為上士非能親執斂役者故雖身親涖事而各以其下之胥服勞侯國之祝雖非四命之下大夫三命之上士等而差之其命數大祝當降國卿一等衆祝當降二等胥各四人當亦如王朝之數國君之斂大胥四人親斂衆胥二人佐之以足六人之數祝官臨檢記雖不言孔疏謂君應有侍者不知何人蓋大祝也大夫之斂則大胥二人臨檢衆胥四人親斂士之斂則衆胥二人臨檢士之友四人自斂小斂大斂祭服不倒皆左衽結絞不紐紐女九反正義鄭氏康成曰左衽衽向左反生時也孔氏頴逹曰此明斂衣之法前已言小斂不倒此又並言者為下諸事出也衽衣襟也生向右左手解抽帶便也死則襟向左示不復解生時帶並為屈紐使易抽解若死則無復解義故絞束畢結之不為紐也案衣原有兩衽但生則右衽在外死則左衽在外所謂襲也斂者既斂必哭士與其執事則斂斂焉則為之一不食凡斂者六人與音預其當作共正義鄭氏康成曰斂者必使所與執事者不欲妄人褻之執或為􅳪孔氏頴逹曰斂者謂大祝衆祝之屬以其與亡者或臣舊或有恩今手為執事專心則增感故斂竟皆哭也士與其執事謂平生曽與亡者共執事今與喪所助斂若不經共執事則褻惡之不使斂也生經有恩死又為之斂為之廢一食斂兩邉各三人故用六人凡者貴賤同也存疑吳氏澄曰上言既斂必哭蓋通為大胥衆胥及士而言此言一不食蓋專為士之生嘗共事死又與斂者言其情厚於大胥衆胥等也君錦冒黼殺綴旁七大夫玄冒黼殺綴旁五士緇冒赬殺綴旁三凡冒質長與手齊殺三尺自小斂以往用夷衾夷衾質殺之裁猶冒也冒莫報反殺色戒反正義鄭氏康成曰冒者既襲所以韜尸重形也殺冒之下裙韜足上行者也小斂又覆以夷衾裁猶制也字或為材孔氏頴逹曰此明尊卑冒制冒謂襲後小斂前所用以韜尸也冒有質殺者作兩囊各縫合一頭又縫連一邉餘一邉不縫兩囊皆然也上者曰質下者曰殺君質用錦殺用黼制如直囊其用之先以殺韜足而上後以質韜首而下綴旁七者不縫之邉上下安七帶綴以結之也大夫綴旁五士旁三者尊卑之差也鄭注士喪禮云上玄下纁象天地也以此推之士赬殺則君大夫畫殺為斧文也几冒謂通貴賤也冒之質從頭韜來至下長短與手相齊也殺從足韜上長三尺往猶後也小斂前有冒小斂後衣多故用夷衾覆之夷衾所用上齊於手下三尺所用繒色及長短制度如冒之質殺但不復為囊及旁綴也又曰始死幠用斂衾是大斂之衾自小斂以前覆尸至小斂時君錦衾大夫縞素士緇衾用之小斂斂訖别制夷衾以覆之其小斂以前所用大斂之衾者小斂以後停而不用至將大斂及陳衣又更制一衾主用大斂也所謂大斂二衾者其夷衾至大斂時所用無文當應總入大斂衣內并斂之也君將大斂子辨絰即位於序端卿大夫即位於堂亷楹西北面東上父兄堂下北面夫人命婦尸西東面外宗房中南面小臣鋪席商祝鋪絞襟衾衣士盥於盤上士舉遷尸於斂上卒斂宰告子馮之踊夫人東面亦如之鋪普吳反又音敷馮音憑下並同正義鄭氏康成曰子辨絰者未成服孔疏成服則著喪冠辨是未成服小斂亦然雜記小斂環絰公大夫士一也辨如爵辨而素大夫之喪子亦辨絰孔氏頴逹曰此明君大斂時節也序謂東序端謂序之南頭卿大夫謂羣臣也堂廉謂堂基南畔廉稜之上楹謂南近堂廉者子既在序端故羣臣立於基上東楹之西也父兄諸父諸兄不仕者以其賤故在堂下鄉北以東為上也若士亦在堂下外宗君姑姊妹之女及姨舅之女也輕故在房中而鄉南鋪席謂下莞上簟敷於阼階上供大斂也商祝鋪絞襟衾衣等致於小臣所鋪席上以待尸也士亦喪祝之屬周禮喪祝上士二人中士四人下士八人將舉尸故先盥手於盤上也斂上即斂處宰告者斂畢大宰告孝子也孝子得告馮尸而起踊夫人亦馮尸而踊馮竟乃斂於棺大夫之喪將大斂既鋪絞襟衾衣君至主人迎先入門右巫止於門外君釋菜祝先入升堂君即位於序端卿大夫即位於堂廉楹西北面東上主人房外南面主婦尸西東面遷尸卒斂宰告主人降北面於堂下君撫之主人拜稽顙君降升主人馮之命主婦馮之菜注如字今作采正義鄭氏康成曰先入右者入門而右也巫止者君行必與巫巫主辟凶邪也釋菜禮門神也必禮門神者禮君非問疾弔喪不入諸臣之家也主人房外南面大夫之子尊得升視斂也孔氏頴逹曰此明大夫大斂節也主人適子也出門迎君望見馬首不哭不拜先還入門右北面以待君至不哭厭於君不敢伸其私恩也巫止門外者君臨臣喪巫祝桃茢至門恐主人惡之且禮敬主人故不將巫入對尸柩士喪禮云巫止於廟門外祝代之故先君而入門升自阼階也君隨祝後而升堂即位於東序之端阼階上之東是適子臨斂處也主人房外南面者鄉者在門右君升則主人亦升立君之北東房之外面向南俱欲視斂也遷尸者鄉鋪絞襟衾衣而君至今列位畢故舉尸於鋪衣上也主人得告斂畢降西階堂下鄉北立待君者君臣情重方為分異故斂竟君以手撫案尸與之別主人見君撫尸故在堂下拜稽顙以禮君之恩君降者撫尸畢而下堂也升主人者君命升之也主人升自西階由足西面馮尸不當君所君又命主婦馮之士喪禮其子不得升故鄭注大夫之子尊得升視斂也案士喪禮君釋菜入門注疏訓為釋菜禮門神也與此記釋菜之解正同蓋古人蘋蘩之菜可薦鬼神故月令有入學釋菜之節學記有皮辨祭菜之儀其明證也或謂菜當作采謂時未成服故君釋采色之服而素服以入也抑知君臨臣喪當未成服而往則君仍朝服如既成服而往則君又自衣疑衰也又安有所為采服而臨入門時始釋之哉或説謬已士之喪將大斂君不在其餘禮猶大夫也正義鄭氏康成曰其餘謂卿大夫及主婦之位孔疏鋪衣列位男女之儀悉如大夫也孔氏頴逹曰此明士斂之節士喪卑無恩君不視斂故云君不在也若有大夫來而君在位則卿大夫位亦在堂廉近西也鋪絞襟踊鋪衾踊鋪衣踊遷尸踊斂衣踊斂衾踊斂絞襟踊正義鄭氏康成曰目孝子踊節吳氏澄曰踊之節君大夫士之禮皆同大斂當此之節則孝子必踊也君撫大夫撫內命婦大夫撫室老撫姪娣君大夫馮父母妻長子不馮庶子士馮父母妻長子庶子庶子有子則父母不馮其尸凡馮尸者父母先妻子後君於臣撫之父母於子執之子於父母馮之婦於舅姑奉之舅姑於婦撫之妻於夫拘之夫於妻於昆弟執之馮尸不當君所凡馮尸興必踊長竹杖反奉芳勇反正義鄭氏康成曰撫以手案之也內命婦君之世婦馮謂扶持服膺也君於臣撫之至夫與妻於昆弟執之此恩之淺深尊卑之儀也馮之類必當心馮尸不當君所不敢與尊者所馮同處也凡馮尸興必踊悲哀之至馮尸必坐孔氏頴逹曰此明撫尸及馮尸之節大夫貴故君自撫之大夫以室老為貴臣以姪娣為貴妾死則為之服故並撫之也君大夫自主父母妻長子四人喪故同馮之馮父母撫妻子并云馮通言耳士賤故馮及庶子謂庶子無子者也有子則不馮君大夫之庶子雖無子不得馮也凡馮尸者凡主人也父母先妻子後謂尸之父母妻子也君尊於臣但以手撫案尸心身不服膺也父母於子執之當心上衣也子於父母馮之服膺心上也婦於舅姑尊故奉當心上衣也舅姑於婦亦手案尸心與君為臣同也妻於夫拘之微引心上衣輕於馮重於執也夫於妻於昆弟亦執心上衣也不當君所者君已馮心則餘入馮者宜少辟之凡馮尸必哀殞故起必踊泄之馮者為重奉次之拘次之執次之尊者則馮奉卑者則撫執執雖輕於撫而恩深故君於臣撫父母於子報是兼有尊卑深淺也士喪禮君坐撫當心此下云馮尸不當君所明君不撫得當君所也吳氏澄曰總言之皆謂之馮尸分言之則有馮奉拘撫執五者之異撫在拘執之間案馮者俯而就之其統名也馮必當心以我悲切之心致之猶若欲彼知之也撫以一手親之奉以兩手為恭也拘執既馮其心又摻其手詩摻執子之袪摻執子之手若與之握别亦執緩而拘迫也父母之喪居倚廬不塗寢苫枕凷非喪事不言君為廬宫之大夫士袒之既葬柱楣塗廬不於顯者君大夫士皆宫之凡非適子者自未葬以於隱者為廬苫始占反枕之鴆反凷苫內反疏云定本無枕凷字禪章善反楣音眉適丁歷反正義鄭氏康成曰宫謂圍障之也袒袒也謂不障不於顯者不塗見面於隱者為廬不欲人屬目蓋廬於東南角既葬猶然孔氏頴逹曰廬者中門外東墻下倚木為廬以草夾障不用泥塗之孝子居於廬中寢卧於苫頭枕於凷志在悲哀若非喪事口不言説也君廬外以帷障之如宫牆大夫士其廬袒露不帷障也既葬情殺故柱楣稍舉以納日光又以泥塗辟風寒不塗廬外顯處也大夫士既葬故得宫之凡非適子謂庶子也既非喪主故於東南角隱映處為廬葬竟亦然聶氏崇義曰凡起廬先以一木橫於牆下去牆五尺卧於地為楣即立五椽於上斜倚東牆上以草苫蓋之其南北面亦以草屏之向北開門案儀禮鄭注云倚廬倚木為廬在中門外東方又云柱楣所謂梁暗於中門外屋下壘墼為之不塗塈謂之堊室今合此下文推之是初喪之廬東倚東壁西楣著於地但以草夾障之而北户既葬乃舉楣起之下加以柱使稍髙廣旁加壘墼使稍堅固成室矣而猶不塗至練則堊其牆使白謂之堊室為飾也至祥并黝其地使黑彌飾也總論孔氏頴逹曰此以下至兄不次於弟明君大夫士遭喪斬衰齊衰大功等居廬及堊室至祥禫以來降殺之節此論遭喪居廬之禮既葬與人立君言王事不言國事大夫士言公事不言家事正義鄭氏康成曰此常禮也孔疏庾云曽子問三年之喪不羣立旅行此與人立為常者以下經大判為常且曾子問據無事時此有事須言故也孔氏頴逹曰此明居喪常禮未葬不與人並立君諸侯也王天子也既葬可並立則諸侯可言天子事猶不私言己國事公君也大夫士亦得言君事未可言私事君既葬王政入於國既卒哭而服王事大夫士既葬公政入於家既卒哭辨絰帶金革之事無辟也辟音避正義鄭氏康成曰此權禮孔疏據曾子問魯公有為為之辨絰帶者變喪服而弔服輕可以即事也孔疏變服重弔服輕故從戎便孔氏頴逹曰國家有事孝子不得遵常禮故從權也葬竟未卒哭王事謂王之政令入于己國也既卒哭則出為王服金革之事公政謂國之政令入大夫家卒哭則有變服今服弔服以從金革之事無所避也國君言服王事則此亦服國事國君當亦辨絰但君尊不言奪服耳然此辨絰謂弔服帶謂喪服雖弔服而有要絰異凡弔也既練居堊室不與人居君謀國政大夫士謀家事既祥黝堊祥而外無哭者禫而內無哭者樂作矣故也黝於紏反堊烏路反禫大感反正義鄭氏康成曰黝堊堊室之飾也地謂之黝牆謂之堊孔疏釋宫文外無哭者於門外不哭也內無哭者入門不哭也禫踰月而可作樂孔疏魯人朝祥莫歌孔子言踰月則善樂作無哭者孔疏以祥踰月作樂故禫時無哭孔氏頴逹曰此論練及祥禫之節練居堊室猶不與人居也練後漸輕故君大夫士得謀己國家事也祥大祥也黝黑也平治其地令黑堊白也新塗堊牆壁令白稍飾故也外即中門外堊室中也祥之日鼓素琴故中門外不哭若有弔者則入即位哭也內中門也樂作矣句釋禫之無哭不釋祥之無哭皇氏謂祥之日鼓素琴句釋祥禫二時非鄭義禫踰月定本作祥是祥踰月而可作樂也存疑孔氏頴逹曰祥已懸八音於庭是樂作矣故門內不復哭也禫而從御吉祭而復寢期居廬終喪不御於內者父在為母為妻齊衰期者大功布衰九月者皆三月不御於內婦人不居廬不寢苫喪父母既練而歸期九月者既葬而歸齊音咨衰七回反期音基為於偽反正義鄭氏康成曰從御御婦人也孔疏杜預以為禫而從御謂從政御職事鄭必為御婦人者下文云期居廬終喪不御於內既言不御於內故知此御是御婦人也復寢不復宿殯宫也孔疏案間傳既祥復寢謂不宿中門外復于殯宫之寢此復寢謂平常之寢文同義别故鄭注不復宿殯宫也歸謂歸夫家也孔疏女子出嫁為祖父母及兄弟為父後者皆期九月謂夲是期而降在大功者案喪服記女子為父母卒哭折筓首鄭注謂卒哭喪之大事畢可以歸於夫家此云既練不同者喪服注云可以歸是可歸之節其實歸時在練後也案女子出嫁惟祖父母及兄弟為父後者正期不降若惟叔父母姑姊妹逆降九月衆兄弟姪出降九月象筓而折其首為太飾也孔氏頴逹曰此釋禫節通論孔氏頴逹曰吉祭而復寢者謂禫祭之後同月之內值吉祭之節行吉祭訖而復寢不待踰月若不當四時吉祭則待踰月吉祭乃復寢故士虞記云中月禫是月也吉祭猶未配注云是月是禫月也當四時之祭月則祭也亦不待踰月故熊氏云不當四時祭月則待踰月也案吉祭吉禘也謂之禘者以諦視昭穆也蓋三年喪畢將致死者之主於廟必祧一逺主故因時遞遷而虛禰廟以待新主之入至此合祭祖廟以審視昭穆當秋冬則謂之吉祫當春夏則謂之吉禘春秋閔二年吉禘於莊公襄十六年傳冬穆叔如晉晉人答穆叔曰以寡君之未禘祀皆此祭非大禘也但此祭在二十七月禫祭之後亦必遇四時當祭乃行之魯莊公三十二年八月薨至閔二年五月裁二十二月而遽行吉禘故左氏譏其速若僖八年禘於太廟文二年大事於太廟則又為大禘與此禘不同諸儒多混而一之故其説多鑿又從御即孟獻子之比御乃比次婦人使之當御復寢乃入內寢即孟獻子比御而不入之入也公之喪大夫俟練士卒哭而歸存疑鄭氏康成曰此公公士大夫有地者也孔疏其臣呼此有地大夫之君為公故曰公之喪知此公是公士大夫有地者以其臣大夫待練士待卒哭故知非正君案雜記大夫次於公館以終喪士練而歸彼謂正君與此殊也其大夫士歸者謂素在君所食都邑之臣皇氏侃曰素先也君所食都邑謂公士大夫之君采地言公士大夫在朝廷而死此臣先在其君所食之采邑君喪而來服至小祥而各反故云歸也熊氏安生曰素在君之所謂此家臣為大夫者素先在君所也都邑之臣謂家臣不在君所出外食於都邑者也今君喪皆在至練及卒哭後素在君所者歸於家素食都邑者歸於都邑孔疏皇説於文便而理不包如熊解則鄭當云素在君所及食都邑之臣今不云及其義疑也案鄭以此文與雜記不同故以此公為士大夫有采地者大夫士皆其家臣夫古人名分甚嚴恐無士大夫有采地得稱公之理春秋惟楚僭王故其大夫僭公如申公葉公不當以是為正禮且通篇皆辨君大夫士之禮不同不應至此忽亂之又檀弓亦有公之喪諸逹官之長杖句公之喪謂君喪安得此獨異訓乎疑此所指大夫士與雜記大夫士有內外之異耳君薨未葬以前諸臣以逺近相次入臨至既葬卒哭則都邑之大夫猶留俟練下邑之士卒哭即歸以治民至於既練則任政之大夫猶次於公館以終喪分職之士可歸其家以治職更有親近之士如僕人射人之屬亦留公館以終喪則居堊室與大夫居廬微不同是此文與雜記未嘗不可通也大夫士父母之喪既練而歸朔月忌日則帚哭於宗室諸父兄弟之喪既卒哭而歸正義鄭氏康成曰歸謂歸其宫也忌日死日也宗室宗子之家謂殯宫也禮命士以上父子異宫孔氏頴逹曰此明庶子遭喪歸家之節大夫士謂庶子為大夫士也適子則終喪在殯宫朔月朔望也雖練各歸至忌日及朔望則歸殯宫也諸父諸兄弟並期為輕故至卒哭而各歸賀氏云此弟謂適弟則庶兄為之次不云兄不次於弟謂庶弟也案言大夫士者大夫士期而從政故既練可歸不然誰非人子適長方朝夕堊室不與人居而庶子獨棄几筵而歸乎婦人於父母之喪既練而歸今以三年斬衰而同於降服之女於心安乎公羊傳閔子騫腰絰服事既而曰古之道不即人心退而致仕孔子善之則不歸者其正歸者其權也父不次於子兄不次於弟正義鄭氏康咸曰不次謂不就其殯宫為次而居孔氏穎逹曰父兄尊者君於大夫世婦大斂焉為之賜則小斂焉於外命婦既加蓋而君至於士既殯而往為之賜大斂焉夫人於世婦大斂焉為之賜小斂焉於諸妻為之賜大斂焉於大夫外命婦既殯而往正義鄭氏康成曰為之賜謂有恩惠也加蓋而至於臣之妻略也孔氏穎逹曰君於世婦謂內命婦大斂為常恩賜則小斂而往然則君於大夫大斂是常小斂是恩賜案隱元年公不與小斂故不書日此謂卿當未襲而往故昭十五年有事於武宫叔弓卒去樂卒事公羊云君聞大夫喪去樂卒事而往可也是卿未襲而往栁莊非卿衛君即弔急弔賢也君於外命婦恩輕故既大斂入棺加蓋之後而君至也於諸妻謂姪娣及同姓女也同士禮故謂之賜大斂焉若夫人姪娣尊同世婦當大斂為之賜小斂焉於大夫外命婦謂夫人於大夫及外命婦既殯而往但有一禮無恩賜差降之事也方氏慤曰小斂在先大斂在後喪事以速為敬故大斂而往者則為禮之常小斂而往者則為之賜也黃氏震曰恩輕者殯而後往恩重者大斂而往異恩者小斂即往為之賜言異恩也總論孔氏頴逹曰自此至君退必奠明君於大夫及士并夫人於大夫士恩賜弔臨主人迎送之節大夫士既殯而君往焉使人戒之主人具殷奠之禮俟於門外見馬首先入門右巫止於門外祝代之先君釋菜於門內祝先升自阼階負墉南面君即位於阼小臣二人執戈立於前二人立於後擯者進主人拜稽顙君稱言視祝而踊主人踊先悉見反後胡豆反正義鄭氏康成曰殷猶大也朝夕小奠至月朔則大奠君將來則具大奠之禮以待之榮君之來也祝負墉南面直君北孔疏直當也房户東也小臣執戈先後君君升而夾階立孔疏顧命夾階上刃故知之大夫殯即成服成服則君亦成服錫衰而往弔之擯者進當贊主人也始立門東北面稱言舉所以來之辭也視祝而踊祝相君之禮當節之也孔氏頴逹曰此明君弔大夫之禮君於大夫雖視大斂或有既殯之後而始往與士同也君將往使人豫戒主人主人重君之來先備月朔大奠之禮待於門外見君馬首先君而入祝先道君升阼階在君之北立於房户之東昔負壁而鄉南君位於阼階者主人不敢有其室也執戈辟邪氣也擯者進於孝子前告孝子使行禮喪贊曰相此云擯者以君之弔禮故以擯言主人北面拜而稽顙君舉弔辭祝以相君先踊君乃視祝而踊君踊畢主人乃踊案於士既殯而往者禮之常於大夫亦既殯而往者或君有朝會疾病之事不及其斂也大夫則奠可也士則出俟於門外命之反奠乃反奠卒奠主人先俟於門外君退主人送於門外拜稽顙正義鄭氏康成曰迎不拜拜送者拜迎則為君之答已孔氏穎逹曰此明君來弔士與大夫其禮不同也大夫則奠可也者君既在阼主人在庭踊畢則釋此殷奠於殯可也言對人君可為此奠士卑不敢留君待奠故士先出待君門外謂君將去也君使人命反設奠士乃反入設奠主人奠畢又先出門待君大夫士同君退主人門外送之而拜案曲禮凡非弔喪非見國君無不答拜然則喪法孝子拜賓無答拜之禮僖二十四年左傳宋先代之後於周為客有喪拜焉謂其餘諸侯來弔國喪主不拜宋周敵禮拜謝亦主人拜賔之義也君於大夫疾三問之在殯三往焉士疾一問之在殯一往焉君弔則復殯服正義鄭氏康成曰三問三往一問一往所以致殷勤也君弔則復殯服者復反也反其未殯未成服之服新君事也謂臣喪既殯後君乃始來弔也復或為服孔氏頴逹曰殯服則苴絰免布深衣也不散帶故小記有云君弔雖不當免時也主人必免謂臣大斂君有故不得來殯後始來弔也夫人弔於大夫士主人出迎於門外見馬首先入門右夫人入升堂即位主婦降自西階拜稽顙於下夫人視世子而踊奠如君至之禮夫人退主婦送於門內拜稽顙主人送於大門之外不拜正義鄭氏康成曰視世子而踊世子從夫人夫人以為節也世子之從夫人位如祝從君也孔氏穎逹曰此明夫人弔臣禮孝子迎君之妻亦如迎君禮也主婦臣妻也夫人來弔故婦人為主人世子夫人之世子隨夫人來也夫人來弔則世子在前導引其禮奠如君至之禮者亦先戒乃具殷奠夫人即位哭後主婦拜竟而設奠事如君弔禮主婦送於門內門寢門也婦人迎送不出門故夫人去於路寢門內拜送之主人送於大門外喪無二主主婦已拜故主人不拜應氏鏞曰君臣之際猶家人也君於外內婦既殯往夫人於大夫士之家亦往弔之蓋弔內子士妻之禮亦在其中矣主人迎而先入門右夫人升而自阼階待夫人猶待君也主婦拜稽顙於下執妾禮猶臣禮也夫人之行世子實待之國君視祝而踊夫人則視世子而踊也退則送於門內婦人迎送不下堂而特至門者為所尊變也其來也主人迎於門外送亦如之所以代主婦而伸敬也門外者男子之所有事婦人迎送不出門雖對所尊而不敢變也大夫君不迎於門外入即位於堂下主人北面衆主人南面婦人即位於房中若有君命命夫命婦之命四鄰賔客其君後主人而拜正義鄭氏康成曰入即位於下不升堂而立阼階之下西面下正君也衆主人南面於其北婦人即位於房中君雖不升堂猶辟之也後主人而拜者將拜賔使主人陪其後而君前拜不俱拜者主人無二也孔氏穎逹曰此明大夫君之禮大夫下臣稱大夫為君故曰大夫君不迎於門外貶於正君也主人北面者其君即阼階下位故適子避之所以在君之南北面也婦人之位在堂君雖不升堂猶辟於房中正君來禮亦如之不言大夫君之妻來者當同夫人禮也前君臨大斂云主婦尸西以大斂哀深故不辟君今謂殯後也當此大夫君來弔時或有本國之君或有國中大夫命婦之命或有昔經使四鄰之國卿大夫遣使來弔若有此諸賔在庭則此大夫君代主人拜命及拜賔以喪用尊者拜賔故也然大夫君不敢同於國君專代為主故以主人陪置君之後君先拜主人後拜不同時拜故鄭云主人無二也存疑郝氏敬曰大夫君後主人而拜非二孤與案大夫君必使主人陪其後而拜辟國君也然大夫君拜時主人不拜則亦非二孤矣君弔見尸柩而後踊大夫士若君不戒而往不具殷奠君退必奠正義鄭氏康成曰塗之後雖往不踊也踊或為哭或為浴君退必奠榮君之來孔疏君來不先戒當時雖不得殷奠君去後必設奠告殯以榮君來故也存疑皇氏侃曰前文既殯君往視祝而踊殯後有踊者謂既殯未塗得有踊也若塗之後不踊陳氏澔曰前章既殯而君往是不見尸柩也乃視祝而踊此言見尸柩而後踊以與前文異舊説殯而未塗則踊塗後乃不踊未知是否君大棺八寸屬六寸椑四寸上大夫大棺八寸屬六寸下大夫棺六寸屬四寸士棺六寸屬音燭禆步歷反正義鄭氏康成曰大棺棺之在表者也檀弓曰天子之棺四重水兕革棺被之其厚三寸杝棺一梓棺二四者皆周此以內説而出也孔疏檀弓先言水革是從內及外此先言大棺是從外及內屬當梓棺椑當杝棺也然則大棺及屬用梓椑用杝以是差之上公革棺不被三重也諸侯無革棺再重也大夫無椑一重也士無屬不重也庶人之棺四寸孔疏檀弓孔子為中都宰則四寸之棺五寸之槨是庶人棺四寸也上大夫謂列國之卿也趙簡子云不設屬椑時僭也孔疏哀公二年趙簡子與鄭戰於鐵簡子自誓云桐棺三寸不設屬椑下卿之罰也大夫依禮無椑今云罰始無椑故知當時大夫常禮用椑時僭也孔氏頴逹曰天子四重之棺屬與椑合一尺大棺八寸水兕革棺共六寸都合厚二尺四寸也上公棺則去水皮所餘三重合厚二尺一寸侯伯子男則又去兕皮但餘三棺為二重合厚一尺八寸也上大夫去椑四寸所餘大棺與屬合為一尺四寸下大夫大棺與屬各減二寸厚一尺也士則不重惟大棺六寸黃氏震曰大棺以其包於外故曰大屬則連屬於大棺故曰屬椑則親身而逼近故曰椑總論孔氏穎逹曰自此至篇末總論君大夫士等棺槨及飾棺之異并碑繂之殊此經論君大夫士等棺槨厚薄之制君裏棺用朱緑用雜金鐕大夫裏棺用玄緑用牛骨鐕士不緑鐕子南反正義鄭氏康成曰鐕所以琢著裏孔氏穎逹曰此明裏棺之制定本緑皆作琢謂鐕琢朱繒貼著於棺也雜金鐕者鐕釘也尚書云貢金三品黃白青色舊説云用金釘又用象牙釘雜之以琢士亦同大夫用牛骨鐕存疑孔氏頴逹曰隱義云朱緑皆繒也朱繒貼四方緑繒貼四角大夫四靣玄四角緑士不緑惟用玄也辨正吳氏澄曰案定本近是蓋裏棺兼用緑色無義疏説分二色貼四邉貼四隅亦無義且未詳何據若依定本以緑為琢則朱玄句絶琢字屬下句士用玄裏棺與大夫同但不用釘琢之為異爾君蓋用漆三衽三束大夫蓋用漆二衽二束士蓋不用漆二衽二束正義鄭氏康成曰用漆者塗合牝牡之中也衽小要也孔氏穎逹曰此明衽束之數蓋棺上蓋也用漆謂漆其衽合縫處也衽謂燕尾合棺縫際也束謂以皮束棺也棺兩邉各三衽每當衽上輒以牛皮束之故云三衽三束大夫士橫衽有二每衽有束故云二束士卑不用漆衽束與大夫同檀弓云棺束縮二衡三者據君言也若大夫士橫惟二束此文是也君大夫鬊爪實於緑中士埋之鬊音舜爪側巧反正義鄭氏康成曰緑當為角聲之誤也孔疏知緑當為角者緑為色以飾棺襄非藏物之處以緑與角聲相近經云緑中故讀緑為角王氏讜曰漢四皓其一號角里角音祿呼覺者非角中謂棺內四隅也鬊亂髮也將實爪髮棺中必為小囊盛之此緑或為簍孔氏頴逹曰士賤以物盛埋之君殯用輴攢至其上畢塗屋大夫殯以幬攢置於西序塗不暨於棺士殯見衽塗上帷之輴敕倫反攢才冠反幬音道見賢遍反正義鄭氏康成曰攢猶菆也孔疏菆聚其木周於外屋殯上覆如屋者也幬覆也暨及也此記參差孔疏若君據天子則當稱龍輴若據諸侯不得云攢上畢塗屋以檀弓參之天子之殯居棺以龍輴攢木題湊象椁孔疏題頭也湊鄉也以木頭相湊向內有似於椁上四注如屋以覆之孔疏天子之屋四注天子椁有四阿垂而鄉下如屋之簷以覆其上盡塗之孔疏四邉及上皆塗之也諸侯輴不畫龍攢不題湊象椁其他亦如之大夫之殯廢輴置棺西牆下就牆攢其三靣塗之不及棺者言攢中狹小裁取容棺士不攢掘地下棺見小要孔疏亦以木覆其上而塗之帷之鬼神尚幽暗也士逹於天子皆然孔氏穎逹曰此明尊卑殯之制度凡殯之禮天子先以龍輴置於客位殯處然後從阼階舉棺於輴中輴外以木菆聚輴之四邉木高於棺乃從上加綃黼於棺上然後以木題湊覆如屋形以泥塗之又加席三重於殯上其諸侯殯時則置棺輴內亦菆木輴外木高於棺後加布幕於棺上又菆木於塗上不題湊象椁也亦中間高似屋形但不為四注大夫殯以幬幬覆也謂棺衣覆之於大夫言幬覆則王侯並幬覆也西序屋堂西頭壁也大夫不輴又不四面攢以一面倚西壁而三面攢之又上不為屋也塗不暨於棺暨及也王侯塗之而攢廣去棺逺大夫攢狹裁使塗不及棺耳士掘肂見衽其衽之上所出之處亦以木覆而塗之其塗之為火備也帷幛也朝夕哭乃徹帷熬君四種八筐大夫三種六筐士二種四筐加魚臘焉熬五羔反種章勇反臘音昔正義鄭氏康成曰熬者煎穀也士喪禮曰熬黍稷各二筐又曰設熬旁各一筐大夫三種加以粱君四種加以稻四筐則手足皆一其餘設於左右孔氏穎逹曰此明熬榖之異魚臘謂乾臘特牲士臘用兔少牢大夫用麋天子諸侯無文當用六獸之屬存疑鄭氏康成曰將塗設於棺旁所以感蚍蜉使不至棺也孔氏穎逹曰火熬其榖使香欲使蚍蜉聞其香氣食榖不侵尸也魚臘亦為感蚍蜉案熬感蚍蜉之説頗迂熬有盡蚍蜉無窮恐感之不勝反足以召之矣敖繼公謂孝子不得復奠故置此於棺旁以盡其心似為近情云飾棺君龍帷三池振容黼荒火三列黻三列素錦禇加偽荒纁紐六齊五采五貝黼翣二黻翣二畫翣二皆戴圭魚躍拂池君纁戴六纁披六大夫畫帷二池不振容畫荒火三列黻三列素錦禇纁紐二玄紐二齊三采三貝黻翣二畫翣二皆戴綏魚躍拂池大夫戴前纁後玄披亦如之士布帷布荒一池揄絞纁紐二緇紐二齊三采一貝畫翣二皆戴綏士戴前纁後緇二披用纁偽依注作帷齊如字又才細反翣所甲反披彼義反綏依注音緌揄音遙紐女九反緇側其反正義鄭氏康成曰飾棺者以華道路及壙中不欲衆惡其親也荒蒙也在旁曰帷在上曰荒皆所以衣柳也士布帷布荒者白布也君大夫加文章焉黼荒緣邉為黼文畫荒緣邉為雲氣火黻為列於其中耳偽當為帷或作於聲之誤也大夫以上有禇以襯覆棺乃加帷荒於其上紐所以結連帷荒者也池以竹為之如小車笭衣以青布柳象宫室縣池於荒之爪端若承霤然云君大夫以銅為魚縣於池下揄揄翟也青質五色畫之於絞繒而垂之以為振容象水草之動搖行則魚上拂池雜記曰大夫不揄絞屬於池下是不振容也士則去魚齊象車蓋蕤縫合雜采為之形如瓜分然綴貝絡其上及旁戴之言值也所以連繫棺束與柳材使相值因而結前後披也漢禮翣以木為筐廣三尺高二尺四寸方兩角高衣以白布畫者畫雲氣其餘各如其象柄長五尺車行使人持之而從既窆樹於壙中檀弓曰周人牆置翣是也綏當為緌讀如冠蕤之蕤蓋五采羽注於翣首也孔氏穎逹曰此明葬時尊卑棺飾君龍帷者君諸侯也帷柳車邉障也王侯畫龍以象君德池織竹為籠挂於荒之爪端象平生宫室有承霤也天子生有四注屋四面承霤柳亦四池諸侯屋亦四注而柳降一池闕於後一故三池也振動也容飾也以絞繒為之長丈餘如幡畫為雉縣於池下為容飾車行則幡動也荒柳車上覆謂鱉甲也緣荒邉為白黑黼文於黼文之上荒中央又畫火黻各三行也火形如半環黻兩已相背也素白也禇屋也於荒下用白錦為屋在路象宫室也加偽荒者帷是旁牆荒是上蓋禇覆竟而加帷荒於禇外也纁紐六者上蓋與邉牆相離故以纁為紐連之旁各三凡六也齊五采五貝者鱉甲上當中形圓如車蓋高三尺徑二尺餘凡車蓋四面有垂下蕤今此齊形象車蓋旁象蓋蕤縫合五采繒列行相次如瓜內之子以穰為分限又連貝為五行交絡齊上也黼翣二黻翣二畫翣二皆戴圭者翣形似扇在路則障車入椁則障柩二畫黼二畫黻二畫雲氣翣兩角皆戴圭玉禮器云天子八翣諸侯六大夫四天子又有龍翣二也魚躍拂池者凡池必有魚故此車池縣振容又縣銅魚於振容間若車行則魚跳躍上拂池也君纁戴六纁披六者事異飾棺故更言君也棺橫束有三每束兩邉屈皮為紐三束有六紐用纁帛戴索連繫棺束之紐與外畔柳材使相當值謂連棺著柳故有六戴纁披亦用絳帛為之將一頭結此戴出一頭於帷外人牽之每戴繫之故亦有六也謂之披者若牽車登高則引前以防軒車適下則引後以防翻車欹左則引右欹右則引左使車不傾覆也大夫帷畫雲氣二池庾云兩邉賀云前後各一不振容不以揄絞屬於池下也畫荒謂畫雲氣火黻三列錦禇則與君同也紐用四不一色故二纁二玄也齊三采絳黃黑三貝亦降二也翣降兩黻翣角不圭止用五采羽作綏無絞而有魚躍拂池戴不並用纁其數與披同四也士唯白布帷荒而不畫一池在前亦畫揄雉於絞在於池上紐降玄用緇猶四紐連四旁也齊與大夫同一貝者一行絡之耳翣降二黼前纁後緇者戴當棺束通兩邉為四戴也二披用纁通兩旁則亦四披也鄭注以華道路及壙中以翣入壙中則知餘物堪入壙中者皆入陳氏澔曰披亦如之謂色及數悉與戴同也通論陸氏佃曰素錦禇即雜記所謂錦屋諸侯大夫士一也其異者士以葦席為幹爾知然者以君火三列黻三列素錦禇大夫亦云而士不言從可知也士布帷據此蒲席以為裳帷亦如其幹爾天子八翣皆戴璧諸侯六翣皆戴圭大夫四翣士二皆戴綏戴玉者必戴綏戴綏者不必戴玉綏旐也知然者以明堂位云有虞氏之綏夏后氏之綢練殷之崇牙周之璧翣知之也存疑陸氏佃曰君纁戴六纁披六戴猶所謂拂披猶所謂引引之使行紼之欲止戴之使上披之欲下周官司士作六軍之士執披以此案戴以繫棺與柳材披又繫於戴出帷外兩旁挽之在道曰紼在墓曰引與戴不同陸混而一之非也君葬用輴四綍二碑御棺用羽葆大夫葬用輴二綍二碑御棺用茅士葬用國車二綍無碑比出宫御棺用功布大夫用輴依注音輇市專反綍音弗葆音保國依注亦作輇比必利反正義鄭氏康成曰大夫廢輴此言輴非也孔疏與檀弓違故知非也輴當為輇聲之誤孔疏此從雜記文輇字或作團是以文誤為國輇車柩車也尊卑之差也孔疏皇氏云尊卑皆用輇差異在飾棺則前經棺飾是也在棺曰綍行道曰引至壙將窆又曰綍而設碑是以連言之孔疏此經論在道之時未論窆時經當云引而云綍與碑者初在塗後遂窆葬故鄭云連言之碑桓楹也孔疏碑桓楹者鄭云天子用大木為碑謂之豐碑諸侯則樹兩大木為碑謂之桓楹此經君稱二綍二碑故云桓楹謂每一碑樹兩楹檀弓云三家視桓楹是僭也御棺居前為節度也士言比出宮用功布則出宮而止至壙無矣綍或為率孔氏穎達曰此明葬時在路尊卑載柩之車及碑綍之等輴國皆當為輇輇則蜃車在路載柩尊卑同用蜃車諸侯紼有四碑有二所天子則六綍四碑羽葆以鳥羽注於柄末如蓋御者執之大夫二綍二碑各一孔樹於壙之前後綍各穿之也士二綍無碑手縣下之大夫用茅自廟至墓士卑御自廟至大門牆內而止出路便否至墓不復御也羽葆功布等其象皆如麾窆時下棺天子殯用龍輴至壙去蜃車更載以龍輴以此約之諸侯殯以輴葬用輴明矣大夫朝廟用輴殯與葬不用輴也士朝廟用輁軸若天子元士葬亦用輁軸彭氏汝礪曰葬謂之柳車以其迫地而行則曰蜃車以其無則曰輇車開元禮謂之鱉甲有似於蜃案乘車皆髙而有輻惟重車則卑而無幅其輪以全木為之故謂之輇亦謂之輲以迫地而行亦謂之蜃車車中惟此用四輪最安固而不傾故以載棺天子於輪畫龍有似於盾詩龍盾之合故謂之輴其實輴與輇一也國車役車也形制並同但或用兩輪不似輴輇之必用四輪耳以兩輪共一軸故謂之輁軸其實國車團車亦一也鄭孔過泥字形謂朝廟在塗至葬所三易其車棺升車下車易傾側不幾以人之親痁患乎禮曰端衰喪車皆無等則所以别尊卑在棺與棺飾而不在車即在車亦在畫龍不畫龍及色之飾其車者而不在車之屢易也凡封用綍去碑負引君封以衡大夫士以咸君命毋譁以鼓封大夫命毋哭士哭者相止也封依注作窆彼驗反咸依注讀為緘古鹹反毋音無正義鄭氏康成曰封周禮作窆窆下棺也此封或皆作斂檀弓曰公輸若方小斂般請以機封謂此斂也然則棺之入坎為斂與斂尸相似咸讀為緘凡柩車及壙説載除飾而屬紼於柩之緘又樹碑於壙之前後以紼繞碑間之鹿盧挽棺而下之此時棺下窆使挽者皆繫紼而繞要負引舒縱之備失脫也用紼去碑者謂縱下之時也衡平也人君之喪又以木橫貫緘耳居旁持而平之又擊鼓為縱舍之節大夫士旁牽緘而已庶人縣窆不引紼也禮惟天子葬有隧今齊人謂棺束為緘繩咸或為撼孔氏穎逹曰此論尊卑下棺之制至壙説載除飾之後解此蜃車之綍以繫於柩緘束之繩又將一頭繞碑間鹿盧所引之人在碑外背碑而立負引者漸漸應鼓聲而下故云用綍去碑負引也諸侯禮大物多棺重恐柩不正下棺之時別以大木為衡貫穿棺束之緘平持而下備傾頓也大夫士無衡使人以紼直繫棺束之緘下於君也君下棺時命令衆人無得喧譁以鼓封者擊鼓為縱舍之節每一鼓漸縱綍也大夫卑直命人使無哭耳士又卑哭者自相止也諸侯四綍二碑前後二綍各繞前後二碑之鹿盧其餘兩紼於壙之兩旁人挽之而下也天子則六繂四碑前後各重鹿盧每一碑用二繂前後用四繂其餘兩繂繫於兩旁之碑諸侯不重鹿盧前碑後碑各一紼其餘二紼在旁人持而下棺耳經云用紼去碑謂前後紼耳在旁之紼無碑也君松椁大夫柏椁士雜木椁正義鄭氏康成曰椁謂周棺者也天子柏椁以端長六尺夫子制於中都使庶人之椁五寸五寸謂端方也此謂尊者用大材卑者用小材耳自天子諸侯卿大夫士庶人六等其槨長自六尺而下其方自五寸而上未聞其差所定也抗木之厚蓋與椁方齊天子五重上公四重諸侯三重大夫再重士一重孔氏穎逹曰此明所用椁木不同君諸侯也諸侯用松心為椁材大夫以柏為椁不用松心士又卑用雜木也案檀弓柏椁以端長六尺注云其方蓋一尺以此差之諸侯方九寸卿方八寸大夫七寸士六寸庶人五寸雖有此約無正文可定也案孟子言古者棺椁無度中古棺七寸椁稱之自天子逹於庶人則鄭孔所云棺椁厚薄之異未必確也特考古者不可不存其説耳棺椁之間君容柷大夫容壺士容甒正義鄭氏康成曰間可以藏物因以為節孔氏穎逹曰此明棺椁之間廣狹所容也柷如漆桶是諸侯棺椁所容也壺是漏水器大夫所掌甒盛酒之器士所用也方氏慤曰柷方二尺四寸深一尺八寸壺大一石甒五斗則其所容之大小可知君必以柷則與狄人設階同義君裏椁虞筐大夫不裏椁士不虞筐正義鄭氏康成曰裏椁之物虞筐之文未聞也吳氏澄曰言君之椁有物裏之而又有虞筐大夫雖不裏椁而猶有虞筐也士則並虞筐亦無案裏椁當與前裏棺同或亦君朱大夫以玄歟虞筐疑亦前所謂熬加魚臘者士遣車不載糧無魚臘則不虞筐可知已欽定禮記義疏卷五十八
