body:
  text: 檀弓上第三之一正義陸氏德明曰檀弓魯人存疑孔氏穎達曰鄭目録云名檀弓者以其善於禮故著姓名顯之今山陽有檀氏此檀弓在六國之時以此篇載仲梁子故知是六國時人也案此篇雜出傳聞多不可信檀弓名篇者因其在簡端耳篇中檀弓不再見未必因其善禮著之也劉氏彝曰篇首言子游及篇内多言之疑是其門人所記公儀仲子之喪檀弓免焉仲子舍其孫而立其子檀弓曰何居我未之前聞也趨而就子服伯子於門右曰仲子舍其孫而立其子何也伯子曰仲子亦猶行古之道也昔者文王舍伯邑考而立武王微子舍其孫腯而立衍也夫仲子亦猶行古之道也子游問諸孔子孔子曰否立孫免音問舍音捨下皆同居音姬腯徒本反衍以善反正義鄭氏康成曰公儀蓋魯同姓孔疏案史記魯相公儀休此子服伯子是魯人故疑同姓也周禮適子死立適孫為後仲子所立非也居讀為姬齊魯間語助也檀弓去賔位案賔入門左入以西為左也今不左而右故曰去賔位就主人兄弟之賢者問之孔疏案賔位隨主人變小歛之前主人未忍在主位有事在西階下賔亦入門西弔於西階士䘮禮君使人禭主人拜送拜賔即位西階下東面是也小歛後尸出堂然後有飾主人位在阼階下西面賔於東階下弔士䘮禮小斂訖男女奉尸侇於堂主人降自西階即位踊襲絰於序東是也檀弓之來當在小歛前知者仲子初䘮即正適庶之位故也子服伯子蓋魯大夫仲孫蔑之𤣥孫子服景伯也孔疏案世本獻子蔑生孝伯孝伯生恵伯恵伯生昭伯昭伯生景伯此云子服伯子者景是諡伯是字也孔氏穎達曰此論仲子廢適立庶為檀弓所譏之事亦猶行古之道者言餘人有行古之道仲子亦如餘人也通論陳氏祥道曰先王貴適賤庶使名分正而不亂争奪息而不作故子生則冢子接以大牢庶子少牢冢子未食而見庶子已食而見冠則適子於阼階庶子於房外死適子斬庶子期其禮之重輕隆殺如此以其𫝊重不𫝊輕故也史曰父不祭於支庶之宅君不祭於臣僕之家此適庶之分不可不辨也春秋之時宋宣公舍子與夷立弟穆公穆公又舍子馮立與夷而與夷卒見殺莒紀公黜太子僕愛季佗而卒召禍晉獻公殺世子申生立奚齊而卒亂晉齊靈公廢太子光立公子牙而卒亂齊不察乎此每每趣禍良可悼也存疑鄭氏康成曰故為非禮以非仲子也禮朋友在他邦乃袒免案鄭注士䘮禮云免之制未聞舊說以為如冠状廣一寸䘮服小記日斬衰髻髪以麻免而以布此用麻布為之如今之著慘頭矣自項中而前交於額上却繞紒也文王立武王權也胡氏銓日武王之立以功季陳氏澔曰或以德不以長如大王傳位歴之意與微子適子死立其弟衍殷禮也案湯崩不立太甲而立外丙仲壬其後又多以弟嗣立故鄭據之為殷禮與伯子為親者隱耳方氏慤曰檀弓之免非所服而服之也服非所服之服所以譏立非所立之意耳馬氏睎孟曰檀弓之免子游之麻絰有朋友之道欲正而不可得者故重為之服所以視其親言惟親則有可正之恩就臣之位所以視其臣言惟臣則有可正之義案檀弓於仲子據䘮服記不應免鄭氏因有廢適之文謂弓為非禮譏之適庶廢立非細事弓既知當早為救正至以弔服譏之所謂成事不可說者矣乃始問廢立之故何耶就本文玩之弓之來弔似未知仲子之舍孫故怪聞其事趨而就子服伯子問也所以免者酌弔朋友之禮從厚耳如子游之弔裼裘曽子襲裘同母異父昆弟或齊衰或大功從母之夫舅之妻或云無服或云同爨緦此等禮文當時即無一定子游之麻哀檀弓之免似如此䘮服記朋友在他邦袒免檀弓免耳未純用他邦無主之禮譏弔之說不足據也史記周本紀不載伯邑考逸周書武王克商自大王大伯王季虞公文王邑考以列升告似伯邑考早卒矣微子世家無腯名此記所云不可考事親有隱而無犯左右就養無方服勤至死致喪三年事君有犯而無隱左右就養有方服勤至死方喪三年事師無犯無隱左右就養無方服勤至死心喪三年左右徐讀佐佑饒如字飬以尚反正義鄭氏康成曰隱謂不稱揚其過失無犯謂不犯顔而諫論語曰事父母㡬諫孔疏此指尋常之過若有大悪亦當犯顔孝經父有争子則不陷於不義是也左右謂扶持之方猶常也子則然無常人孔疏凡言左右者據僕從之臣立有左右之官位此但是子左右扶持之不常遣一人在左一人在右故云無常人勤勞辱之事致謂戚容稱其服此以恩為制也有犯無隱謂既諫人有問其國政者可以語其得失若齊晏子為晉叔向言之孔疏昭三年左傳景公謂晏子曰子近市何貴何賤時景公繁於刑有鬻踊者對曰踊貴屨賤後聘晉與叔向言齊國之政將歸陳氏是既諫得言君之過也孔子不仕昭公諱取同姓而稱丘也過者聖人含𢎞勸奬擥過歸已非實事也若史策書理則不一良史直筆不隱董狐書趙盾是也忠順臣則諱君親之悪春秋諱國悪之類是也就養有方不可侵官也孔疏成十六年晉楚戰於鄢陵時欒書將中軍欒鍼為晉侯車右晉侯陷於淖欒書將載晉侯鍼曰書退侵官冒也故云然此謂平常小事若君有危難當致死論語能致其身是也方䘮資於事父此以義為制也心䘮戚容如父而無服此以恩義之間為制也孔氏穎達曰此論事親及事君師之法臣子著服之義致之言至也哀情至極而居䘮禮也方䘮比方父䘮也事師無犯同親之恩無隱同君之義饒氏魯曰子之於親不分職守事事皆當理㑹無可推託事師如事父故皆無方臣之事君當各盡職守故曰有方通論方氏慤曰養言左右則養無不至勤言至死則勤無時已君親與師相湏而後成我之身者䘮之雖各不同所以盡三年之隆一也欒共子曰民生於三事之如一其序先親而後君者内外之分先君而後師者貴賤之等馬氏睎孟曰無犯者事親之仁也及其變以義終之則不能無犯無隱者事君之義也及其變以仁終之則不能無隐若夫師者所受敎而非敎之者也故無犯則不全君臣之義親其賢愛其道有故而合非天性者也故無隐則不全父子之仁季武子成寢杜氏之葬在西階之下請合葬焉許之入官而不敢哭武子曰合葬非古也自周公以來未之有改也吾許其大而不許其細何居命之哭正義鄭氏康成曰武子魯公子季友之曽孫季孫夙孔疏世本公子友生齊仲齊仲生無逸無逸生行父行父生夙自見夷人冢墓以為寢欲文過孔疏武子云合葬非古法從周公以來始有我成寢時謂此冢墓不須合𦵏故夷平之是文飾其過也孔氏穎達曰聽之葬是許其大哭是細也先儒皆以杜氏喪従外來就武子之寢合葬與孔子合葬於防同又案晏子春秋景公成路寢之臺逢於阿案古本晏子春秋作何盆成括後䘮並得附葬景公寢中與此同通論馬氏睎孟曰聖人盡人道以送死夫婦合葬所以従生者之志詩曰榖則異室死則同穴蓋生雖有禮以限内外之別死未嘗不同所歸葬則同穴附則同壙祭則同几體魄既降魂氣在上先王設為䘮祭之禮聚其散附其離而同之者所以合鬼神立至敎也劉氏彝曰成寢而夷人之墓不仁也不改葬而又請合焉非孝也許其合而命之哭矯偽以文過也寢者所以安其家乃處其家於人之冢上墓者所以安其先乃處其先於人之階下皆不近人情非禮明矣方氏慤曰周官墓大夫之職凡争墓地者聴其獄訟當是時豈有夷人之墓以成寢者哉而季氏乃有是事者由周官之法壊故也存疑鄭氏康成曰記此者善其不奪人之恩存異陸氏佃曰杜氏請遷於外而合葬之張子曰杜氏必是殯故取其柩以歸合葬也自伯禽至武子之世多歴年豈容城中有墓辨正胡氏銓曰謂善其不奪人之恩非也譏其夷人之墓故為是瑣瑣耳案如張子説宜記曰杜氏之殯周法殯於西階夏殷於阼於兩楹此外別無殯法禮士庶人踰月葬小記云未葬主人不釋服此有故必不得已者若停柩衰世之法耳古無此事然如陸氏請遷之說則成寢之先宜遷矣奈何聽其夷耶此事晏子春秋自可徵不必疑也子上之母死而不喪門人問諸子思曰昔者子之先君子喪出母乎曰然子之不使白也䘮之何也子思曰昔者吾先君子無所失道道隆則従而隆道汙則従而汙伋則安能為伋也妻者是為白也母不為伋也妻者是不為白也母故孔氏之不䘮出母自子思始也䘮如字伋音急正義鄭氏康成曰子上孔子曽孫子思伋之子名白其母出禮為出母期父卒為父後者不服耳孔疏䘮服傳云與尊者為一體不敢服其私親也汙猶殺也有隆有殺進退如禮自子思始記禮所由廢非之也孔氏穎達曰此論子上不喪出母之事子思既在子上當為出母有服故門人疑而問之道隆則従而隆謂父在為出母宜加隆厚為之著服汙猶殺也謂父卒子為父後禮當減殺不為著服陳氏祥道曰夫於妻有出之禮子於母無絶之道故不為父也妻不可謂不為子也母為子也母故必䘮不為父也妻故止於期䘮之者恩期年者義存疑孔氏穎達曰先君子謂孔子伯魚之母被出死期而猶哭是䘮出母也案說在本章此先君子泛言孔氏以下耳存異張子曰出妻不當使子䘮之禮也子於母則不可忘父不使之䘮固不可違父當黙持心䘮若父使之䘮而䘮之聖人處權子思惟循禮而已朱子曰出母得罪於祖不得入祖廟不䘮出母是正禮孔子却是變禮也又曰子思所答與儀禮都不相應禮為人後者為出母無服只合以此答之吳氏澄曰子上父在不得為出母服者子思兄死時使其子續伯父主祖與曾祖之祭既主尊者之祭則不敢服其私親不為伯父後而接續主祭者禮大宗無子不立後而但奪宗也何以知子思之有兄曰子思哭嫂案䘮服傳為父後者為出母無服張子朱子皆據之斷子上不䘮出母為合禮考孔氏疏為後指父沒適子承重主祭者孔知指承重主祭言者小記云為父後者為出母無服䘮者不祭故也此孔說之確有所據者子上既父在無廢祭之嫌有服明矣朱子又云出母得罪於祖不得入祖廟故無服而以孔子使服出母為變禮是又不分父在父没適子衆子俱不當服矣䘮服齊衰杖期章有出妻之子為母者何耶母出雖得罪於祖然於子猶為親者屬既不當制服則繼母嫁者從為之服報繼父同居者為服不杖期皆不可通也史記孔子世家伯魚八傳至鮒始有弟子襄以上俱單傳哭嫂之說不可據即如其說既不為伯父後而但藉口主祭逃出母之服於義安耶吳氏蓋求其說不得而為之辭者也孔子曰拜而后稽顙頽乎其順也稽顙而后拜頎乎其至也三年之䘮吾従其至者顙素黨反頽徒回反頎音懇又音畿案家語孔子曰上有子張有父之喪公明儀相焉問稽顙于孔子十七字正義鄭氏康成曰頽順也先拜賔順於事也頎至也先觸地無容哀之至孔氏穎達曰此論䘮拜之異拜者主人孝子拜賔也拜為賔稽顙為已前賔後已頽然而順序也頎惻隱貌先觸地無容後乃拜賔為親痛深惻隐之至也朱子曰拜而后稽顙先以兩手伏地如常然後引首向前叩地稽顙而后拜開兩手先以首叩地却交手如常姚氏舜牧曰順亦従哀中出但先拜猶知禮賔不若先稽顙自致其哀耳故孔子從其至通論孔氏穎達曰下檀弓云秦穆公使人弔公子重耳重耳稽顙不拜示不為後也重耳在周時知先稽顙後拜者士䘮禮周禮也云拜稽顙者謂拜之時先稽顙䘮大記云拜稽顙與士䘮禮同陳氏祥道曰孔子之時禮廢滋久天下不知先稽顙之為重而或以輕為重是猶不知拜下之為禮而或以泰為禮故孔子救拜之弊則曰吾従其至救泰之弊則曰吾從下吳氏澄曰拜而后稽顙九拜中此名吉拜輕䘮之拜用此先作稽首一拜後作空手一拜稽顙而后拜九拜中此名凶拜重䘮之拜用此存疑鄭氏康成曰拜而后稽顙此殷之䘮拜稽顙而后拜此周之喪拜従其至者重者尚哀戚自期如殷可孔疏知殷周之䘮拜者孔子所論每殷周相對吳氏澄曰周官九拜今約之為三一曰拜先跪兩膝著地次拱兩手到地乃俯其首不至於地周官謂之空首凡經傳記單言拜字者皆謂此故得専拜之名二曰頓首先兩膝著地次兩手到地乃俯其首下至於手此拜之加重者三曰稽首兩膝著地兩手到地乃俯其首至於地在手之前此拜之最重者稽顙即稽首以其為凶禮故易首為顙以別於吉凡䘮之再拜者先作空手一拜後作稽首一拜案大祝九拜注云空首者拜頭至手所謂拜手也疏云空首時引頭至地首頓地即舉故名頓首其至地稽㽞多時則為稽首三者之别如此吳氏以此拜為大祝之空首是矣但以首不至地為空首首下至手為頓首不已戾乎稽首與稽顙固似無別然據賈公彦以稽顙為觸地無容則與稽首别矣烏得以稽首即稽顙耶至先空手後稽首之說則又不免武斷矣辨正馬氏睎孟曰三年之喪喪拜非三年之䘮以吉拜案非三年之䘮者大祀注所謂齊哀不杖以下也鄭氏以為殷拜周拜於經無見孔子既得合葬於防曰吾聞之古也墓而不墳今丘也東西南北之人也不可以弗識也於是封之崇四尺孔子先反門人後雨甚至孔子問焉曰爾來何遲也曰防墓崩孔子不應三孔子泫然流涕曰吾聞之古不脩墓識式志反泫胡犬反正義鄭氏康成曰言既得者少孤不知其墓也墓謂兆域今之封塋也土之高者曰墳東西南北居無常處也孔疏謂不恒在鄉若久乃還歸不知葬之處所故不可不封墳記識其處聚土曰封先反當脩虞事也後待封也不應以其非禮也三言之者以孔子不聞脩猶治也陸氏徳明曰防墓防地之墓也陳氏澔曰封土為壟曰墳一恐人不知而誤犯一恐已或忘而難尋泫然流涕者自傷不能謹之於封築之時以致傾圯且言古人所以不脩墓者敬謹之至無事於脩也通論鄭氏康成曰古謂殷時聚土封之周禮也周禮曰以爵等為邱封之度高四尺蓋周之士制孔疏天子之墓一丈諸侯八尺其次降殺以兩知高四尺周之士制者叔梁紇雖為大夫周禮公侯伯之大夫再命與天子中士同云周之士制者謂天子之士也存疑庾氏蔚之曰防墓崩者防守其墓備擬其崩也孔氏穎達曰泫然流涕者自傷脩墓違古致令崩壊重脩也案如孔說是悔其封矣不如陳義為確孔子明言脩墓庾說不可通若以為防守則何為不應至三言之乃泫然出涕耶周官冢人疏引春秋緯天子墳高三仞諸侯半之大夫八尺士四尺孔氏謂天子一丈諸侯八尺其次降殺以兩則大夫六尺士亦四尺二說不同周之四尺當今營造尺二尺五寸孔子哭子路於中庭有人弔者而夫子拜之既哭進使者而問故使者曰醢之矣遂命覆醢使色吏反覆芳服反正義鄭氏康成曰寢中庭也拜弔者為之主也使者自衛來赴者故謂死之意狀醢之者示欲啗食以怖衆覆棄之不忍食孔氏穎逹曰此論師資之恩兼明子路死之意狀陸氏佃曰哭以師友之間進之也吳氏澄曰哭師於寢哭朋友於寢門外中庭在寢之外寢門之内故謂之師友之間通論陳氏祥道曰顔淵之死正命也子路之死非正命也孔子哭顔淵哭其正命之短哭子路哭其非正命之終哭之則同其所以哭之則異孔子哭於中庭視之猶子也有人弔焉而夫子拜之自視猶父也遂命覆醢者非特不忍食之又不忍見之也游氏桂曰出公雖大惡而子路學於孔子之門有古義焉子路之失失於執古義而不知變也存疑鄭氏康成曰與哭師同親之也孔疏下云師吾哭諸寢今哭於中庭故云與哭師同之王氏安石曰孔子哭子路與師同或者哭弟子禮當如師猶服之有報乎時衛世子蒯聵篡輒而立子路死之案事在哀公十五年左傳游氏桂曰琴張聞宗魯死將往弔之仲尼曰齊豹之盜而孟縶之賊女何弔焉宗魯死於公孟與子路死於出公一也宗魯死孔子以為不足弔子路死孔子哭之如此其哀為子路賢也案春秋哀公二年晉鞅納蒯聵於戚十六年蒯聵自戚入於衛中閒皆輙拒父之年公穀兩傳皆有不受父命以尊王父命之說考左氏蒯聵出奔靈公嘗欲立公子郢郢固辭靈公卒夫人曰立郢君命也又固辭且曰有亡人之子輒在遂立輙是輒立無靈公之命也天下無無父之子即蒯聵有命當廢輙即有命當立父可拒乎鄭氏謂蒯聵篡輙而立此就當時輒立為義耳臣子脅滅君父謂之篡若以篡加之父且加之久為子拒之父於理於名恐俱不順春秋誅亂賊於蒯聵出奔反國皆書衛世子不絶蒯聵於衛者正深著輙之惡也若聵為篡而書法如此則春秋之例亂矣孔悝執國政助拒父之子子路為悝宰不能救及於難死之誠好勇無所取材者朱子云子路仕衛之失前輩論之多矣然子路却見不到非知其非義而苟爲者其論甚明游氏以宗魯為比亦似未協宗魯由齊豹事公孟縶齊豹與公孟縶交惡既語宗魯將殺之反許豹行事知難不告以二心事縶成齊豹之惡此於義兩無所可者故曰齊豹之盜而孟縶之賊子路似不可以此比孔子哭之問故又覆醢自師弟之情如此然輒拒父而孔子受其公養且歴數年蓋聖人體道之大權又别有義曽子曰朋友之墓有宿草而不哭焉正義鄭氏康成曰宿草謂陳根也為師心䘮三年於朋友期可孔氏穎達曰曽子孔子弟子姓曾案鄫子之後以國為氏去邑為曽名參字子輿魯人也朋友雖無親而有同道之恩期而猶哭者非在家立哭位以終期年張敷云於一嵗之内聞朋友之喪或經過朋友之墓則哭期外則不哭也方氏慤曰師猶父朋友相視猶兄弟以喪父之義䘮師則以喪兄弟之義䘮朋友墓有宿草則期年矣是以兄弟之義喪之也子思曰喪三日而殯凡附於身者必誠必信勿之有悔焉耳矣三月而葬凡附於棺者必誠必信勿之有悔焉耳矣喪三年以為極亡則弗之忘矣故君子有終身之憂而無一朝之患故忌日不樂亡鄭如字絶句王極字絶句亡作忘向下讀孫依鄭作亡而如王分句今従之正義鄭氏康成曰言三日三月欲其盡心脩備之附於身謂衣衾附於棺謂明器之屬孔䟽棺中物少三日可辦棺外物多三月可就故言日月欲見宜慎也案既夕禮明器之外有用器弓矢耒耜兩敦兩杅盤匜燕樂器甲胄干笮杖笠翣等故云之屬事應氏鏞曰附棺若卜其宅兆邱壤封樹之不獨明器之屬也終身之憂念其親也忌日不樂謂死日不用舉吉事孔氏穎達曰此論喪之初死及葬送終之具須盡孝子之情及思念父母不忘之事也三日殯三月葬據大夫士禮陳氏祥道曰君子於親有終制之喪三年是也有終身之喪忌日是也通論方氏慤曰經曰緦小功以為殺期九月以為閒三年以為隆故三年之喪所以為䘮之極也亡則弗之忘矣者死者之形雖亡而生者之心未嘗忘之也忌日不樂蓋終身之憂有見於此胡氏銓曰終身之憂永慕也内則云終身也者非終父母之身終其身也忌日不樂有戚容忌舉吉事馬氏睎孟曰君子事親無所不用誠信至明器則備物不可用亦誠信乎蓋之死而致死之不仁而不可為之死而致生之不知而不可為明器之用仁知之道誠信之至者也知此則可以無悔也存疑鄭氏康成曰無一朝之患毁不滅性也孔疏終身念親是不忘之事不得有一朝滅性之患故惟忌日不樂他日則可恐其常毁也陳氏澔曰冢宅崩毁出扵不意所謂一朝之患或曰殯𦵏皆一時事於此不謹則有悔惟其誠信故無此患案此明孝子之孝久而不忘言附於身者必誠必信勿使有悔於三日焉耳矣附於棺者必誠必信亦勿使有悔於三月焉耳矣即服䘮之誠信亦三年以為極而君子有亡則弗之忘者是故君子有終身之憂而無一朝之患也終身之憂戰戰兢兢如臨如履一息尚存憂未釋也無一朝之患非仁無為非禮無行不以小不誠信或致患也語意與孟子正同但孟子以存心言此專以孝言耳祭義亦云終身之憂忌日之謂以經證經明白易曉而鄭乃謂無一朝之患毁不滅性孔謂恐其常毁故惟忌日不樂則以忌日不樂申無一朝之患與祭義違改故為惟并與本經違矣夫毁之滅性恒在𥘉䘮未有以此慮之三年後者至陳氏冢宅崩毁則葬時誠信足矣豈終身之憂只憂冢宅之崩毁乎孔子少孤不知其墓殯於五父之衢人之見之者皆以為葬也其慎也蓋殯也問於郰曼父之母然後得合葬於防父音甫衢求于反慎依鄭注作引張子讀如字郰鄹同側留反曼音萬胡氏銓曰此一經疑在孔子既得合葬於防之前辨正陳氏澔曰家語孔子生三嵗而叔梁紇死少孤及顔氏死夫子成立久矣聖人人倫之至豈有終母之世不尋求父葬之地至母殯而猶不知父墓乎且母死而殯於衢路必無室廬而死於道路者不得已之為耳聖人禮法之宗主而忍為之乎馬遷為野合之誣謂顔氏諱而不告鄭注因之以滋後世之惑且如虞舜瞽瞍之事世俗不勝異論非孟子辭而闢之後世謂何此經雜出諸子所記其間不可據以為實者多矣孟子曰主癰疽與侍人瘠環何以為孔子愚亦謂終身不知父墓何以為孔子此非細故不得不辨存疑鄭氏康成曰孔子之父郰叔梁紇與顔氏之女徵在野合而生孔子徵在恥焉不告孔疏野合不備於禮也案家語叔梁紇七十無妻顔父謂三女曰鄒大夫身長七尺武力絶倫誰能與之為妻二女莫對徵在進曰從父所制將何問焉父曰即爾能矣遂以妻之生孔子三歳而叔梁紇卒七十之男始取徵在灼然不能備禮亦名野合若論語野人野哉之類非謂草野而合也但徵在恥其與夫不備禮為妻見孔子知禮故不告五父衢名方氏慤曰左氏傳謂詛諸五父之衢是衢四逹之道也殯於家則知之者無由怪已欲𤼵問端也慎當為引禮家讀然聲之誤也殯引飾棺以輤葬引飾棺以栁翣孔疏𦵏引柩之時飾棺以栁翣其殯引之禮以輤案雜記諸侯行而死於道其輤有裧緇布裳帷輤為赤色大夫布裳帷士葦席以為屋蒲席以為裳帷大夫以下雖無輤取諸侯輤同名喪大記云君龍帷黼荒黼翣二黻翣二畫翣二大夫畫惟畫荒黻翣二畫翣二士布帷布荒畫翣二在上日荒在旁曰惟總謂之栁故云飾棺以栁翣孔子是時以殯引不以葬引孔氏穎達曰此論孔子訪父墓之事言不知父墓者謂不委曲適知墓之所在不是全不知去處其或出辭入告總望本處而拜今將合葬須正知處所也殯不應在外故稱蓋為不定之辭張子曰孔子殯母扵五父之衢以在衢故其殯周密有如葬然故人之見之者皆以為葬也其實是殯之周慎故曰其慎也蓋殯也其慎也屬下讀之則意明馬氏睎孟曰叔梁紇宋人喪葬之制蓋從古墓而不墳此孔子少孤所以不知墓也案孔叢子此說生於魏臣李由之對魏王當時孔子順已斥其造謗誣聖不足據也鄰有䘮舂不相里有殯不巷歌喪冠不緌正義鄭氏康成曰不緌去飾陳氏澔曰冠必有笄以貫之以紘繫筓順頤而下結之曰纓垂其餘於前者謂之緌案䘮服斬衰冠繩纓齊衰以下冠布纓皆不言緌是去飾之事有虞氏瓦棺夏后氏堲周殷人棺椁周人牆置翣周人以殷人之棺椁葬長殤以夏后氏之堲周葬中殤下殤以有虞氏之瓦棺𦵏無服之殤堲古作即子栗反翣所甲反長丁丈反殤式羊反正義鄭氏康成曰有虞氏上陶孔疏考工記陶人造瓦器引之證瓦棺也始不用薪也孔疏易下繋云古之葬者厚衣之以薪今虞氏既造瓦器故云始不用也火熟曰堲燒土冶以周於棺也孔疏堲土為陶冶之形大小得容棺也陳氏澔曰冶土為甎四周於棺之坎也或謂之土周案曾子問下殤土周葬於園弟子職曰右手折堲孔疏管子弟子職篇云左手秉燭右手折堲引之者證火熟曰堲之義殷人上梓孔疏考工記文引之以證椁也椁大也以木為之言椁大於棺也牆栁衣也孔疏䘮大記注云在旁曰帷在上曰荒帷荒所以衣栁則以帷荒之内木材為栁其實帷荒及木材等總名曰栁故縫人云衣翣栁之材注云栁之言聚諸飾之所聚是帷荒總名栁也孔案後孔子之䘮章鄭注飾棺牆置翣云牆栁衣也氏曰對下設披設崇設旐之事皆委曲言之故亦委曲觧之其實牆即栁也周人牆置翣注云牆栁者文無所對故直云栁也雜記不毁牆之下注云牆惟裳也皆望經為義故三注不同據此則當時孔本此經注牆栁也無衣字孔此經疏亦引縫人解鄭不注衣之義今有衣字誤也凡此言後王之制文孔疏虞瓦棺夏瓦棺之外加堲周殷梓棺替瓦棺又有木為椁替堲周周又於椁旁置栁置翣是漸文也周葬殤以下不同略未成人也孔氏穎達曰此論棺椁所起及用棺椁之差陸氏德明曰十六至十九為長殤十二至十五為中殤八歳至十一為下殤七嵗以下為無服之殤生未三日不為殤方氏慤曰椁之於棺如城之有郭也牆以帷柩而周圍如牆翣以飾柩而翼蔽如羽世愈久禮愈備也長殤而下死者愈少則禮愈殺也通論馬氏睎孟曰棺椁以比化牆置翣以為觀美皆所以盡孝子之心無使惡於死而已葬殤有異於成人之禮故皆以少長制之而不為貴賤之等何者天下無生而貴者也夏后氏尚黒大事斂用昏戎事乘驪牲用𤣥殷人尚白大事歛用日中戎事乗翰牲用白周人尚赤大事斂用日出戎事乗騵牲用騂驪力知反徐即兮反翰又作䮧胡旦反又音寒騵音原正義鄭氏康成曰夏建寅之月為正物生色黒大事䘮事也昏時亦黒戎兵也馬黒色曰驪爾雅曰騋牝驪牡𤣥孔疏庾人云八尺以上為龍七尺以上為騋六尺以上為馬凡馬皆牝驪牡𤣥獨言騋者舉中見上下也𤣥黒𩔖也殷建丑之月為正物牙色白日中時亦白翰白色馬也易曰白馬翰如孔疏賁卦六四爻周建子之月為正物萌色赤孔疏萌是牙之微細皆據一種之草大汎而言建子始動建寅乃出若薺麥以秋而生月令仲冬荔挺出不在此例日出時亦赤騵駵馬白腹孔疏詩駟騵彭彭傳云上周下殷故周人戎事乘之若其餘事則明堂位云周人黄馬蕃鬛是也王氏安石曰此似見詩有駟騵彭彭遂有乘騵乗翰之別馬以共戎事若皆以一物則可以給戎者鮮矣或者止以此物供貴者則理有可通孔氏穎達曰此論三代正朔所尚之色不同書傳畧說云天有三統物有三變故正色有三三正記云正朔三而改文質再而覆鄭意舜以十一月為正尚赤堯以十二月正尚白高辛以十三月正尚黒高陽十一月正尚赤少暤十二月正尚白黄帝十三月正尚黒神農十一月正尚赤女媧十二月正尚白伏羲以上未有聞焉以子月陽氣始生物得陽氣微稍變動故為天統丑月物已吐芽惟在地中含養故為地統寅月物出於地人功當須脩理故為人統統者本也天地人之本也必以此三月為正者以此月物生微細又是嵗之始生王者繼天理物天地人三者所繼不同故正朔不相襲也若孔安國則改正朔惟殷周二代故注尚書湯承堯舜禪代之後革命創制改正易服是從湯始改正朔也通論陳氏祥道曰春秋書大事於大廟傳云國之大事在祀與戎祭義曰夏后氏祭其闇殷人祭其陽周人祭日以朝及闇是以子路之與祭質明而始行事晏朝而退孔子以為知禮則大事用日出者祭以朝之質明也祭以朝之質明斂亦如之故曰大事斂用日出方氏慤曰䘮事凶禮也戎事軍禮也祀事吉禮也不及賔嘉者以非大事故也存疑陳氏澔曰禹以治水之功得天下故尚水之色湯以征伐故尚金之色周之尚赤取火勝金也應氏鏞曰周木徳也而尚赤豈取木所生之色乎案夏道近人而忠故尚黒黒最卑下近人者也殷道駿肅故尚白白最清潔亦色之本也周道文故尚赤赤者文明之至也史記云王者易姓受命必慎始𥘉改正朔易服色義如是矣漢書律厯志三代各據一統天統始施於子半日萌色赤地統受之於丑初日肇化而黄至丑半日牙化而白人統受之於寅𥘉日孳成而黒至寅半日生成而青天始復於子地化自丑畢於辰人生自寅成於申故天統以甲子地統以甲辰人統以甲申此論與孔氏相𤼵其所謂赤而黄而白而黒而青似五行相生為說陳氏應氏又以五行相勝為說又由三統而推五行不足據也穆公之母卒使人問於曽子曰如之何對曰申也聞諸申之父曰哭泣之哀齊斬之情饘粥之食自天子逹布幕衞也縿幕魯也齊音咨本又作齊饘本又作飦之然反粥之六反幕本又作冪音莫徐音覓縿音綃徐音蕭正義鄭氏康成曰穆公魯哀公之曾孫孔疏案世本哀公蔣生悼公寧寧生元公嘉嘉生穆公不衍是曽孫也問居䘮之禮曽子曾參之子名申案申字子西幕或為幦孔氏穎達曰此論尊卑之喪有異同之事有聲之哭無聲之泣並為哀也齊為母斬為父情同故云情厚曰饘希曰粥朝夕食一溢米故曰食也自天子達者父母之喪貴賤不殊馬氏睎孟曰哭泣之哀齊斬之情饘粥之食乃所以自致者由庻人達於天子無所加損至於幕帟之飾末而已矣而得以隆殺焉此魯衛所以有縿布之辨也李氏格非曰先王之制小斂殯葬所以為死者之禮故自天子以至於庶人有等哭泣齊斬饘粥所以盡生者之情故天子逹於庶人一也由前所以立禮由後所以立仁齊斬所以稱情而為之也故曰齊斬之情存疑鄭氏康成曰縿縑也讀如綃衛諸侯禮魯天子禮兩言之者僭已久也孔疏周公一人得用天子禮後代僭用之故曾申舉衛與魯俱是諸侯後代不冝異謂魯之諸公不冝與衛異也案周禮幕人掌惟幕幄帟注云在旁曰惟在上日幕帷幕皆以布為之四合象宫室曰幄王所居之悵也帟小幕幄帟皆以繒為之今云天子用綃幕者下文加斧於椁上畢塗屋注云以刺繡於縿幕加椁以覆棺已乃屋其上盡塗之是繡幕加斧文者襯棺之幕在塗之内以覆棺椁也若其塗上之帟則大夫以上有之故掌次云凡䘮王則張帟三重諸侯再重孤卿大夫不重方氏慤曰衛所存者殷禮故用布幕之質魯所存者周禮故用縿幕之文陸氏佃曰縿讀如字以縿記帛蓋衛幕用布魯用帛爾雅纁帛縿游氏桂曰穆公苟欲行禮所謂貴賤一者固當一也所謂天子諸侯異者固當異也禮文之制曽申獨舉幕而不舉其他則其他推是而可知晉文公請隧扵王隧天子葬禮文公於葬獨請隧則其他亦從是而可知也此襄王所以不許以幕而殯則殯禮視幕而相從者皆可知也此曽申所以獨舉其一以見其餘也案縿幕云天子之禮者鄭於下加斧於椁上注云用縿幕刺斧文覆棺故據之耳孔氏難其證亦用鄭此注以為在塗内者其實刺覆棺之衣為斧文未見其為縿幕而諸侯覆棺幕用布經亦無文於義疑也方氏亦想當然言之耳孟注曾西曽子之孫誤晉獻公將殺其世子申生公子重耳謂之曰子蓋言子之志於公乎世子曰不可君安驪姬是我傷公之心也曰然則蓋行乎世子曰不可君謂我欲弑君也天下豈有無父之國哉吾何仃如之使人辭於狐突曰申生有罪不念伯氏之言也以至於死申生不敢愛其死雖然吾君老矣子少國家多難伯氏不出而圗吾君伯氏苟出而圖吾君申生受賜而死再拜稽首乃卒是以為共世子也重直龍反蓋依注作盍户臘反弑本又作煞音試少詩召反難乃旦反共音恭正義鄭氏康成曰驪姬獻公伐驪戎所𫉬女案事在莊公二十八年申生之母早卒驪姬嬖焉獻公信驪姬之譖重耳欲使世子言見譖之意孔疏案僖四年左傳云姬謂太子曰君夢齊姜必速祭之太子祭歸胙於公公田姬置諸宫六日毒而獻之公祭地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由太子是驪姬申生之事也蓋當為盍何不也重耳申生異母弟後立為文公孔疏獻公烝於齊姜生太子申生大戎狐姬生公子重耳是異母弟也傷公之心者言其意則驪姬必誅也豈有無父之國者言人有父則皆惡欲弑父者辭猶告也狐突申生之傅舅犯之父也前此獻公使申生伐東山皋落氏案事在閔公二年狐突謂申生欲使之行今言此者謝之也伯氏狐突别氏孔疏狐是總氏伯仲是兄弟之字字伯者謂之伯氏字仲者謂之仲氏故傳云叔氏其忘諸乎又此下云叔氏専以禮許人是一人之身字則别為氏也子驪姬之子奚齊不出者自皋落氏反後突懼稱疾賜猶惠也既告狐突乃雉經孔疏雉牛鼻繩也或謂雉鳥耿介為人𫉬必自屈折其頭而死漢書載趙貫高自絶亢死申生當亦然可以為恭於孝則未之有孔疏春秋左傳云晉侯殺其世子申生父不義也孝子不陷親於不義申生不能自理遂陷父有殺子之惡雖心存孝而於理終非故不曰孝但諡為恭以其順於事父而已諡法敬順事上曰恭通論陳氏祥道曰申生於親可言而懼傷公之心於義可逃而謂天下豈有無父之國以至忘其躬之不閱而䘏國家之多難不顧生死之大節而謹再拜之末儀是恭而已非孝也雖然春秋之時如衛輙拒父楚商臣弑君則申生之行蓋可哀而恕之故禮不以申生為不孝而以為恭猶詩不以伋壽為不孝而以為不瑕也吳氏澄曰孝子之事親如仁人之事天豈敢私有其身而避禍逃死哉申生必殺而後奚齊可立設使申生出奔獻公必謂其結援鄰國以圗他日納已非如鄭之使盜殺子臧必如晉之以幣錮欒盈則負不孝之罪大矣但一出奔即是彰父之惡不待身殺而後為陷父於惡也予嘗謂屈原之忠申生之孝其行雖未合乎中庸其心則純然天理之公畧無人欲之私申生但知順父之為孝屈原但知憂國之為忠而一身之生死不計世之議者其何足以知申生之心哉存疑姚氏舜牧曰申生所處地位極難晨牝先杜其諌路有必不可言者女戎先絶其去路有必不可逃者事出不得已而從容就義此人子之至難存異胡氏銓曰案春秋自閔二年至僖二十三年狐突事晉未嘗去此云不出記禮者誤案先儒論申生惟吳氏澄為當蓋但知尊愛君父絶不為已身有計較商量之想者也如姚氏說似只揣無去路而死者耳非申生之本心於經文語氣亦不合也又案晉語敗翟稷桑讒言益起狐突杜門不出是伯氏不出有明徵胡氏偶失攷耳魯人有朝祥而莫歌者子路笑之夫子曰由爾責於人終無已夫三年之喪亦已久矣夫子路出夫子曰又多乎哉踰月則其善也已夫音扶絶句正義鄭氏康成曰子路笑其為樂速夫子為時如此人行三年䘮者希抑子路以善彼又復也孔氏穎逹曰此論大祥除衰杖之日不得即歌之事祥謂二十五月大祥歌哭不同日故仲由笑之夫助語也孔子抑子路善彼人既不當實禮恐學者致惑待子路出後更以正禮言之陳氏澔曰朝祥旦行祥祭之禮也朝祥莫歌固為非禮特以禮敎哀廢之時而此人獨能行三年之䘮故夫子抑子路之笑然終非正禮恐學者致疑故俟子路出乃正言之其意若曰名為三年之䘮實則二十五月今已至二十四月矣此去可歌之日又豈多有日月乎哉但更踰月而歌則為善矣蓋聖人於此雖不責之以備禮亦未嘗許之以變禮也通論孔氏穎達曰案喪服四制祥之日鼓素琴不譏彈琴而譏歌者琴以手笙歌以氣手在外而逺氣在内而近也陳氏祥道曰琴自外作歌由中出也存疑陳氏祥道曰䘮凶禮也祭吉禮也畢凶禮之喪猶為吉祭之禫未全乎吉也祥歌同日失之太速子路笑之失之太嚴孔子所以恕魯人而抑子路之責人無已也案祥之日鼓素琴此自節哀順變之禮豈有於此日歌者夫子云踰月則善正禮也陳氏謂子路之笑失之太嚴似非本指魯荘公及宋人戰于乗丘縣賁父御卜國為右馬驚敗績公隊佐車授綏公曰末之卜也縣賁父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誄之士之有誄自此始也乘繩證反縣音𤣥賁音奔父音甫隊直𩔖反綏息佳反誄力軌反正義鄭氏康成曰縣卜皆氏也右謂車右勇力者為之馬驚敗績驚奔失列也戎車之貳曰佐孔疏周禮戎僕掌倅車之政道僕掌貳車之政田僕掌佐車之政則戎車之貳曰倅此云佐者周禮相對為文散言則田獵兵戎皆武事同稱佐車少儀注戎獵之副曰佐是也圉人掌養馬者孔疏昭七年左傳云牛有牧馬有圉是圉人掌馬也白肉股裏肉也孔疏股裏白故謂之白肉非謂肉色白也流矢中馬非御與右之罪士有誄自此始記禮所由失也謝氏枋得曰莊公以義起而誄之後世因之不改則非故記其始孔氏穎達曰此論魯莊公與士為諡之事乘丘魯地莊公十年夏六月齊師宋師次於郎公子偃曰宋師不整可敗也宋敗齊必還請擊之大敗宋師於乘丘齊師乃還朱氏申曰公責卜國而賁父自責馬之馳騁在御不在右也存疑鄭氏康成曰末之猶微㢤言卜國無勇也死之二人赴敵而死也孔疏知二人俱死者卜國被責縣賁父自稱無勇既序二人於上即陳遂死於下明俱死也誄誄其赴敵之功以為諡周雖以士為爵猶無諡也殷大夫已上為爵孔疏知周以士為爵者案掌客云凡介行人宰史皆有飱饔餼以其爵等為之牢禮凡介行人皆士也而云爵等是士有爵也故鄭注大行人云命者五公侯伯子男爵者四孤卿大夫士知猶無諡者以此言誄自此始故也知殷大夫已上為爵者案士冠禮古者生無爵死無諡於士冠之下記此是據士也士冠是周禮而云古者故知是殷已上陳氏祥道曰馬驚在御不在右莊公末卜而不末縣記稱縣死而不言卜死何耶莊公之末卜責其輕者以見其重者記稱縣死即其責之所不及者以見其責所及者也又曰莊公乘丘之戰非義也流矢中馬而敗績非其罪而罪之非智也以成徳之誄而加之未成徳之士使與士䘮同非禮也非義與智貽害於一時其罪小非禮亂法於萬世其罪大記者即其罪大者記之故曰士之有誄自此始也辨正吕氏曰釋文作馬驚敗而無績字案乗丘之戰魯勝也無敗績之事當時止是馬驚敗耳𥘉不預軍之勝負也吳氏澄曰誄者述其功行以哀之之辭如後世祭文之𩔖非諡也案古者戰必有卜周官大卜作龜之八命一曰征是也末無也是時公子偃竊出公遂從之故不及卜公因車敗而悔其不卜賁父恥車敗以死赴敵而魯遂因而勝也馬驚御者之事公何以舍御而責右且古無以姓呼臣者又本經縣賁父死耳鄭兼指二人而孔附㑹之未免曲說禮有誄而不諡者如下哀公之誄尼父是也有誄而諡者如下諡貞恵文子是也諡必兼誄而誄不必諡鄭謂誄其功以為諡似未必然殷士不為爵之說鄭注三禮多言之然不見確據曾子寢疾病樂正子春坐於牀下曽元曽申坐於足童子隅坐而執燭童子曰華而睆大夫之簀與子春曰止曽子聞之瞿然曰呼曰華而睆大夫之簀與曽子曰然斯季孫之賜也我未之能易也元起易簀曽元曰夫子之病革矣不可以變幸而至於旦請敬易之曽子曰爾之愛我也不如彼君子之愛人也以德細人之愛人也以姑息吾何求哉吾得正而斃焉斯已矣舉扶而易之反席未安而沒睆華版反簀音責與音餘瞿紀具反革音急斃音弊正義鄭氏康成曰病謂疾困子春曽參弟子元申曽參之子隅坐不與成人竝也華畫也孔疏凡繪畫五色必有光華故云畫簀謂牀笫也孔疏爾雅釋器簀謂之笫睆說者謂刮其節目字或為刮孔疏刮削節目睆睆然好禮記本有作華而刮者案春官司几筵掌五几五席筵國賔于牖前莞筵紛純加繅席畫純儀禮公食記上大夫蒲筵加萑席賈氏曰國賔謂筵孤也筵孤用莞筵繅席卿大夫用蒲筵萑席此孤與卿大夫坐席不同則大夫與士不同可知若卧席經無其文或謂士大夫席制不殊則曽子何必乗疾革易之然不可攷矣爾雅簀為牀笫郭景純以笫為牀板牀板未嘗顯露童子何由知䘮大記設牀襢笫蓋設牀冰上故單其笫以達冰氣若板則無隙氣不能達非板可知毛傳以簀為積朱傳以簀為牀棧笫繋於牀欲易笫當并易牀記但言易簀則非編木之笫也張子疑為簟席陳氏直斷為簟史記范睢傳云卷以簀置厠中司馬貞索隐以簀為葦荻之薄薄織葦為之席織蒲或竹為之是凡可卷俱謂之簀而蒲席不能華睆舊說刮其節目則竹席近之今各存其說以備參攷止陳氏澔曰使童子勿言以病困不可動也呼虚憊之聲未之能易已病故也革急也變動也幸覬也彼童子也以徳謂成己之徳息猶安也言苟容取安斃仆也舉扶而易之言病雖困猶勤於禮孔氏穎達曰此論曽子臨死守禮不變之事張子曰簀必簟席之𩔖以其可易華而睆必陳之在上顯露也程子曰曽子易簀須要如此乃安人不能如此者只為不見實理實見得是實見得非必不肯安於此未子曰季孫之賜曽子之受皆為非禮或者因仍習俗嘗有其事而未能正耳但及其疾病不可以變之時一聞人言而必舉扶以易之則非大賢不能矣此是切要處正在此毫釐頃刻之間通論孔氏穎達曰韓詩外傳云曽子仕於莒得粟三秉方是之時曽子重其祿而輕其身親没之後齊迎以相楚迎以令尹晉迎以上卿方是之時曽子重其身而輕其祿既言輕其禄是未為大夫禮男子不死於婦人之手婦人不死於男子之手故春秋魯僖公薨於小寢譏即安也成公薨於路寢傳曰言道也已不為大夫當依禮不得寢大夫之簀也朱子曰易簀結纓未須論優劣但看古人謹於禮法不以死生之變易其所守如此陳氏祥道曰童子以其非禮而發問事師以義也曾元知其非禮而不忍易事父以恩也小恩不如大義之愈孟子言曽元養口體不易簀其養體之事與存疑楊氏慎曰尸子紂棄黎老之言而用姑息之語注姑婦女也息小兒也案姑息猶言姑婦所謂婦人之仁也鄭訓苟容取安亦通始死充充如有窮既殯瞿瞿如有求而弗得既葬皇皇如有望而弗至練而慨然祥而廓然瞿音句慨古愛反廓苦郭反正義鄭氏康成曰皆憂悼在心之貌也求猶索物孔氏穎達曰記人因前有死事遂廣説孝子容節也事盡理屈為窮言親始死孝子匍匐而哭之心形充屈如急行道極無所復去也既殯心形稍緩矣瞿瞿眼目速瞻之貌如有所失而求覓之不得也既葬又漸緩矣皇皇猶棲棲也葬後親歸草土孝子心形栖栖皇皇無所依託如望彼人來而人不至也練則轉緩也至小祥但歎慨日月若馳之速也至大祥而寥廓情意不樂而已通論方氏慤曰下篇述顔丁之居喪則皇皇於始死慨焉於既葬問䘮則皇皇於反哭所言不同者蓋君子有終身之䘮思親之心豈有隆殺哉先王制禮畧為之節而已故其所言不必同邾婁復之以矢蓋自戰於升陘始也魯婦人之髽而弔也自敗於臺鮐始也婁力俱反陘音形髽側瓜反臺音胡鮐音台正義鄭氏康成曰戰於升陘魯僖二十二年秋也時師雖勝孔疏傳云我師敗績邾人𫉬公胄懸諸魚門是也死傷亦甚無衣可以招魂敗於臺鮐魯襄四年秋也孔疏案傳冬十月邾人伐鄫臧紇救鄫侵邾敗于狐鮐此云秋舉其初也臺當為壺字之誤也春秋傳作狐鮐案誤狐為壺聲之似又誤壺為臺形之似也時家家有喪髽而相弔去纚而紒曰髽孔疏案士冠禮纚廣終幅長六尺所以韜髮今以凶事故去之但露紒而已禮婦人弔服大夫之妻錫衰士之妻則疑衰與皆吉笄無首素總孔疏䘮服傳云大夫弔于命婦錫衰命婦弔於大夫亦錫衰是大夫之妻弔服錫衰也士妻弔服無文故鄭云疑衰與周禮司服有錫衰緦衰疑衰䘮服注云士之弔服疑衰則知士妻亦疑衰也吉笄無首素總大戴禮文孔氏穎達曰此論二國失禮之事復必用矢者時邾人志在勝敵矢是心之所好故用所好招魂冀其復反也陳氏澔曰升陘魯地釋云邾人呼邾聲曰婁故曰邾婁方氏慤曰矢所以施於射非所以施於復髽所以施於䘮非所以施扵弔因之而不改則非矣餘論游氏桂曰先王之世雖用兵臨軍之際未有不由禮者孔子曰殺人之中又有禮焉兩軍交戰殺人要有所止未有若後世之僵尸百萬流血千里而後已者也故死者之家䘮弔之禮猶得行乎其間升陘以前未嘗無戰死者得復以衣而不以矢臺鮐以前未嘗無戰死而相弔者得弔以衰而不以髽則是殺人之甚必自升陘臺鮐始記禮者記其失禮之甚也存疑孔氏穎達曰因兵而死身首斷絶不生者應無復法若身首不殊因傷致死復有可生之理則用矢招魂陳氏澔曰夫以盡愛之道禱祠之心孝子不能自已冀其復生也疾而死行之可也兵刃之下肝腦塗地豈有再生之理復之用矢不亦誣乎案復招其魂盡愛之道也死不同而生者不忍其魂之散則一豈以肝腦塗地而廢之南宫縚之妻之姑之䘮夫子誨之髽曰爾毋從從爾爾母扈扈爾蓋榛以為筓長尺而總八寸縚吐刀反毋音無從音總扈音户榛側巾反長直亮反正義鄭氏康成曰南宫縚孟僖子之子南宫閲也字子容其妻孔子兄女誨敎爾汝也從從謂大高扈扈謂大廣孔疏楚辭招隐云山氣巃嵸兮石嵯峨則從從是高之貌扈扈猶廣也爾雅釋山云卑而大扈爾語助總束髪垂為飾齊衰之總八寸孔氏穎達曰此論婦人為舅姑服髽與筓總之法䘮服傳云總長六寸謂斬衰也此齊衰長八寸以二寸為差也以下無文亦當然喪服箭筓長一尺吉筓長尺二寸此榛筓亦長尺是斬衰齊衰筓同一尺降吉筓二寸也案大功以下筓無文賈氏公彦曰容差降但惡筓或用櫛或用榛故稱蓋以疑之案䘮服傳惡筓者櫛筓也櫛非木名以栁之木為筓耳玉藻云沐櫛用樿櫛髪睎用象櫛是也樿白理無文櫛筓宜用樿無樿則榛可故曰蓋榛以為筓孟獻子禫縣而不樂比御而不入夫子曰獻子加於人一等矣縣音𤣥禫大感反比必利反正義鄭氏康成曰孟獻子魯大夫仲孫蔑孔疏襄五年經書仲孫蔑㑹吴於善道傳云孟獻子是也仲稱孟者慶父之後鄭注論語云慶父輈稱死時人為之諱故云孟氏杜預謂慶父是荘公長庶兄庶長故稱孟可以御婦人矣尚不復寢加猶踰也孔氏穎達曰此論獻子除䘮得禮之宜也依禮二十八月始作樂吉祭復寢當時人禫祭之後則作樂未至吉祭而復寢今孟獻子既禫暫縣省樂而不作比可以御婦人而不入寢雖於禮是常而特異餘人故夫子善之云獻子加扵人一等不謂加於禮一等也通論孔氏穎逹曰祥禫之月先儒不同王肅以二十五月大祥其月禫二十六月作樂下云是月禫徙月樂士虞禮中月而禫是祥月之中也鄭康成則二十七月禫二十八月作樂復常䘮服四制祥之日鼓素琴夫子五日彈琴并此獻子禫縣之屬皆據省樂忘憂非正樂也其八音之樂工人所奏必待二十八月三年問云二十五月而畢者據䘮事終除衰棄杖其餘哀未盡故更延兩月非喪之正也大記禫而内無哭者樂作矣謂禫後方將作樂以釋内無哭者之義非謂即作樂也大記云禫而從御吉祭而復寢閒傳云大祥居復寢者去堊室復殯宫之寢耳又大記云禫而從御謂禫後得御婦人必待吉祭然後復寢也馬氏睎孟曰三年之䘮人子之所自盡而不可以死傷生故期而小祥再期而大祥祥則禫言祭有即吉之漸也大祥之祭可以從吉之時而為人子者不忍一朝之閒釋衰絰而被𤣥黄故又有禫以延之雖然祥禫之制施於三年之䘮則其月同施於期之䘮則其月異士虞禮曰二十五月太祥中月而禫此三年之䘮者也父在為母期則哀戚不得致扵三年之中故祥禫異月蓋三年所以為極而致於二十五月者其禮不可過以三年之愛而斷以期者其情猶可伸也夫三年之喪既禫而徙月可以作樂故魯人朝祥莫歌而孔子曰踰月則其善也至於孟獻子既禫而不樂則孔子以為加於人一等矣雜記曰親喪外除故笙歌之樂不作於未禫之前然則孔子既祥五日彈琴而不成聲十日而成笙歌言十日者蓋亦徙月之閒也朱子曰䘮禮只是二十五月祥便是禫當如王說又曰今既定制二十七月即此等細瑣處不須尋討自致其哀足矣存異陳氏祥道曰記曰禫而内無哭者樂作矣又曰禫而從御吉祭而復寢由此觀之孟厭子過於禮孔子反稱之者非以為得禮也特稱其加諸人一等而已案漢儒鄭氏主二十七月據服問中月而禫援中年考校證之謂中月中間一月也魏儒王肅主二十五月據三年問二十五月而畢且援文王受命唯中身謂中月即在此月之中也唐儒王元感謂三年之䘮必三十六月乃畢據䘮服四制三年而祥之文也考之竹書則唐虞以上實是三年以書陟書元中隔三甲子孟子云三年之䘮畢其明證也以書考之則商二十五月張柬之議引書可徴周確是二十五月蓋所謂三年者由期而倍之曰三年者首尾必越三年也鄭以父在為母十一月小祥十三月大祥十五月而禫為據不知母本三年也厭其正服故期而小祥為此餘服使行大祥三年之正服伸矣不得援此復為餘服故本文是月即指祥也而朱子亦謂祥即是禫也但父母之䘮至痛無已古人二十五月而畢亦謂先王制禮不敢過耳今自唐以來久矣二十七月為定於人子之心獨無恔乎則朱子所謂自致其哀者尤不可不深長思也戴徳變除禮今已無其書夫親䘮外除二十五月免喪二十七月復常即在周時亦原無過禮禮蓋免䘮而縣而比御亦賢者之俯而就矣而猶必以不樂不入責其過禮何耶孔子既祥五日彈琴而不成聲十日而成笙歌正義鄭氏康成曰不成聲哀未忘也十日則踰月且異旬也五日彈琴十日笙歌除由外也琴以手笙歌以氣孔氏穎達曰此論孔子除䘮作樂之限祥是凶事用逺日故十日得踰月若其卜逺不吉則用近日雖祥後十日亦不成笙歌以其未踰月也陳氏祥道曰祥之日可以鼓素琴君子所以與人同五日彈琴而不成聲君子所以與人異彈之者禮之不可廢也不成聲者仁之所不忍也有子蓋既祥而絲屨組纓組音祖正義鄭氏康成曰譏其早也禮既祥白屨無絇孔疏士冠禮冬皮屨夏用葛矣云絲屨者此盖以絲為飾如絇繶純之屬士冠禮白屨緇絇繶純纁屨黒絇繶純鄭注屨人云絇屨頭餙繶是縫中紃純緣也此有子蓋白屨以素絲為繶純也縞冠素紕孔疏既祥素紕當用素為纓未用組今用素組為纓乃禫後之服玉藻云𤣥冠綦組纓知此非綦組纓者綦組為纓當𤣥色為冠既祥𤣥冠失禮之甚不應直譏組纓也有子孔子弟子有若孔氏穎達曰此明除䘮失禮之事方氏慤曰以絲為屨之絇以組為冠之纓服之吉者也有子服之於既祥則失之早矣然則既祥之屨如之何徹絇而已既祥之纓如之何用素而已陳氏澔曰此二者皆譏其變吉之速然蓋者疑辭恐記者亦得之傳聞故疑其辭死而不弔者三畏厭溺厭于甲反溺奴狄反正義鄭氏康成曰畏謂人或以非罪攻已不能有以說之而死之者厭謂行止危險之下溺謂不乘橋船不弔以其輕身忘孝也孔氏穎達曰此論非理橫死不合弔哭之事方氏慤曰戰陳無勇非孝也其有畏而死者乎君子不立巖牆之下其有厭而死者乎孝子舟而不游其有溺而死者乎三者皆非正命故先王制禮在所不弔胡氏銓曰畏謂畏避不能死難而終不免於死者陳氏澔曰先儒言明禮可以治懼見理不明者畏懼不知所出多自經於溝瀆此真為死於畏矣通論王氏肅曰孔子畏匡徳能自全也設使聖人卒罹不幸何得不痛悼而罪之乎陳氏祥道曰怖畏而死則非勇厭溺而死則非智是以戰死而葬者不以翣失伍而死者不入兆域垂堂之坐巖牆之立動而徵病行而招死凡此君子之所不弔者不特此而已宗魯賊於孟縶及其死也琴張不敢弔季氏専政於魯及其死也曽晳倚門而歌君子之行無他生不為人之所不敬死不為人之所不弔而已應氏鏞曰為國而死於兵亦無不弔之理齊莊公於杞梁之妻未嘗不弔也餘論游氏桂曰古之君子欲正人之過失不専恃乎刑罰而已使生者有所愧死者有所憾皆所以誅罰之也生有所愧若異其衣冠之𩔖死有所憾若死而不弔之𩔖使人勸勉愧恥不麗於過惡其為道尊而不廹亦後世所不能及也存異張子曰知死而不知生傷而不弔畏厭溺可傷尤甚故特致哀死者不弔生者以異之且如何不淑之辭無所施焉哀有餘而不暇於文也案三者之不弔以其死非正命也若因情厚薄因人賢否以致哀戚亦非禮之所禁張子謂哀死者甚故不弔生者以異之恐無此理禮知死而不知生傷而不弔蓋因情生哀自合如是哭泣之痛豈能施於不知之人此涕之無從也若謂哀死者甚而於生者反漠然豈人情耶子路有姊之䘮可以除之矣而弗除也孔子曰何弗除也子路曰吾寡兄弟而弗忍也孔子曰先王制禮行道之人皆弗忍也子路聞之遂除之正義孔氏穎達曰庾氏蔚之云子路因姊妹無主後猶可得反服推已寡兄弟亦有申其本服之理故於降制已逺而猶不除非在室之姊妹欲申服過期也蓋子路已事仲尼始服姊䘮明姊已出嫁非在室也通論游氏桂曰伯魚母死期而猶哭孔子曰嘻其甚也與此同意人有賢不肖賢者過不肖者不及循其過而為之禮則子路伯魚不知其所終約其不及而為之禮則原壤宰子不可以為訓故禮者通乎賢不肖而為之存疑鄭氏康成曰行道猶行仁義案行道之人與孟子行道之人弗受同義家語載其說曰行道之人皆弗忍先王制禮過者俯而就之不及者跂而及之大公封於營丘比及五世皆反葬於周君子曰樂樂其所自生禮不忘其本古之人有言曰狐死正丘首仁也大音泰樂樂並音岳一讀下五教反又音洛首手又反通論孔氏穎達曰禮之與樂皆是重本若舜䏻紹堯即名大韶禹治水廣大中國則名大夏王業由質而興則禮尚質由文而興則禮尚文也反葬於周亦重本之意周官冢人云先王之葬居中以昭穆為左右凡諸侯居左右以前卿大夫居後各以其族周公封魯其子孫不反葬於周者以有次子在周世守其采地春秋周公是也鄭作詩譜云元子伯禽封魯次子君陳世守采地胡氏銓曰禮樂皆以報本為重舜琴思父母之長養是樂其所自生烝畀祖妣以洽百禮不忘本也存疑鄭氏康成曰齊大公受封留為大師死葬於周子孫生焉不忍離也孔疏子孫是大公所生故不忍離其先祖非謂子孫生在于周也五世之後乃葬於齊齊曰營丘孔疏觀經及注則大公之外為五世便是𤣥孫之子服盡亦反者其實反葬止四世知者案世本大公望生丁公伋伋生乙公得得生㾞公慈母慈母生哀公不臣齊世家哀公荒淫被紀侯譖之周周夷王烹哀公亦葬周也哀公是大公𤣥孫哀公死弟胡公靖立靖死獻公山立山死武公夀立若以相生為五世則武公以上皆反葬於周若以為君五世則獻公以上反葬於周未知孰是營丘臨淄縣以水縈遶故曰營丘案㾞公齊世家作癸公不臣齊世家作不辰君五世反葬當自胡公以上孔云獻公以上誤君子言其反葬似禮樂之義正丘首正首丘也孔氏穎達曰此一節論忠臣不欲離王室之事大公死反葬於鎬陪文武之墓其子孫比及五世雖死於齊以大公在周故皆自齊反歸周而葬之案皇覽吕尚冢在臨淄縣南十里似大公不葬於周矣然大公周公冢現在咸陽文武成康陵附近臨淄或其子孫葬衣冠或後人傅㑹未可以皇覽為據五世反葬之說鄭孔亦意為解之無確據如謂君五世反葬則當自胡公以上據齊世家哀公同母弟山怨胡公與其黨率營丘人襲攻殺之而自立則胡公不死於周水經淄水篇今胡公陵在廣固是不反葬於周也若生五世則武公以上愈無可考周官天司徒以本俗六安萬民二曰族墳墓又諸侯及諸臣葬於墓者授之兆為之蹕均其禁則諸侯子孫得族葬禮有明文而以史記及皇覽諸書攷之則五世反葬又無的據於事疑也伯魚之母死期而猶哭夫子聞之曰誰與哭者門人曰鯉也夫子曰嘻其甚也伯魚聞之遂除之期音基與音餘正義鄭氏康成曰伯魚孔子子也名鯉猶尚也嘻悲恨之聲孔氏穎達曰此論過哀之事期而猶哭則是祥後禫前祥外無哭伯魚在祥外哭故夫子怪其甚也張子云為母期而猶哭夫子怪鯉何也禮期至練必别有服服練則不哭時伯魚不除且哭故夫子怪之伯魚既聞之遂除其服而不哭也存疑孔氏穎逹曰伯魚父在為出母應十三月祥十五月禫或曰為出母無禫期後全不合哭案家語本姓篇孔子年十九娶宋亓官氏明年生子鯉素王事記年六十六亓官夫人卒無出妻之文據禮伯魚為母父在降服期十一月小祥十三月大祥十五月禫禮祥而外無哭者既期猶哭故夫子歎其甚未見其為出母也舊說似誤舜葬於蒼梧之野蓋三妃未之從也季武子曰周公蓋袝梧音吾祔音父辨正胡氏銓曰考經傳舜但二妃蓋堯二女也事見於書甚明孟子亦云二女果秦博士對始皇帝云湘君者堯二女舜妃也劉向鄭氏亦以湘君為二妃而離騷九歌有湘君湘夫人王逸解云湘君水神湘夫人二妃也山海經洞庭之山帝之二女居之郭璞疑二女者帝舜之后不當降小君謂其夫人因以二女為天帝之女韓子曰璞與逸俱失也夫娥皇為舜正妃女英自宜降曰夫人也故九歌辭謂娥皇為君謂女英為帝子各以其盛者推言之則知舜無三妃也明矣鄭氏乃謂舜不告而娶不立正妃但三妃而已若然曷不見於書傳鄭解湘君又何不云三妃而云二妃也吳氏澄曰堯薦舜攝位廵守等事皆舜代行舜薦禹攝位後當亦然也故温公司馬氏詩云虞舜既倦勤薦禹為天子安得復南廵迢迢渡湘水然則謂舜南廵守而死者妄也通論姚氏舜牧曰季武子常云合葬非古也自周公以來未之有改此云周公蓋祔者祔自周公始定其制武子前言以文已之過耳此所云乃禮之正記者並載之正著其前日文過之罪存疑鄭氏康成曰舜征有苖而死因留葬焉書説舜陟方乃死蒼梧於周南越之地今為郡帝嚳立四妃孔疏知立四妃者大戴禮帝繋篇云長妃有邰氏之女日姜嫄生稷次妃有娀氏之女曰簡狄生契次妃陳豐氏之女曰慶都生堯次妃陬訾氏之女曰常宜生摯此注用帝繋之文象后妃四星其一明者為正妃餘三小者為次妃孔疏孝經援神契云辰極横后妃四星縱曲相扶祭法云帝嚳能序星辰以著衆明象星立妃也帝堯因焉至舜不告而娶不立正妃但三妃而已謂之三夫人離騷所歌湘夫人舜妃也孔疏帝王世紀云舜三妃長妃娥皇無子次女英生商均次癸比生二女宵明燭光案山海經以為二女此云三者當以紀為正山海經不可用夏后氏増以三三而九合十二人春秋說云天子取十二即夏制也以虞夏及周制差之則殷人又増以三九二十七合三十九人周人上法帝嚳立正妃又三二十七為八十一人以増之合百二十一人其位后也夫人也嬪也世婦也女御也五者相參以定尊卑祝氏穆曰檀弓云舜葬於蒼梧之野習鑿齒云虞舜葬零陵元和郡縣誌亦云九疑舜之葬也案太史公曰舜南廵行死於蒼梧之野歸葬於江南之九疑山海經云舜之所葬在今道州零陵縣界蒼梧九疑當是兩處後人誤引舜死之地以為舜葬之所耳陳氏澔曰天子以四海為家南廵而崩故遂葬蒼梧之野三妃後皆不從舜之葬此記者言合葬之事古人未有因引季武子之言謂自周公以來始祔葬也書陟方乃死蔡氏曰史記舜崩於蒼梧之野孟子言卒於鳴條未知孰是今零陵九嶷有舜冢云案孟子舜卒於鳴條今安邑有鳴條陌陳留平邱有鳴條亭與此記蒼梧之説皆不合史記云舜崩蒼梧之野葬九疑山則蒼梧在南越矣今淮安海州實有蒼梧山吕覽云舜葬於紀九疑山下有紀邑海州蒼梧山近莒之紀城然九疑距安邑陳留皆數千里海州距陳留亦千餘里豈孟子之謂耶史記云舜南廵崩祭法云舜勤民事而野死淮南子則云征三苖死墨子則云西敎七戎道死南已之市皆說之不可解者然書亦有陟方乃死之文先儒以為如登遐殂落云耳亦似未確山海經載帝王之冢皆重見互出郭璞云聖人久於其位仁化廣及至於殂亡四海若䘮考妣故絶域殊俗之人聞天子崩各自祭醊哭泣起土為冢是以所在有焉理或如此要其確可信者孟子一語耳帝堯四妃無可考即世紀所載但稱取散宜氏耳若舜取堯二女書有明文未聞三妃孔氏引世紀為據而以山海經二女之説不可用攷山海經洞庭之山帝之二女居之此中山經之文也其海内北經云舜妻登比氏生宵明燭光處河大澤又曰登北氏此世紀之說所出但癸比登比登北小異耳古事荒闕不可意度大率如此至虞夏殷周妃嬪之數則鄭氏所據之書殊不足信況如殷增三九之説出於臆度乎欽定禮記義疏卷九
