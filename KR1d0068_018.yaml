  - {type: page-break, offset: 0, content: '', id: KR1d0068_WYG_018-1a, image: WYG0124/WYG0124-0618a.png}
body:
  text: 王制第五之四司徒修六禮以節民性眀七教以興民德齊八政以防淫一道德以同俗養耆老以致孝恤孤獨以逮不足上賢以崇德簡不肖以絀惡恤辛律反逮音代又大計反絀敕律反正義鄭氏康成曰司徒地官卿掌邦教者逮及也簡差擇也孔氏穎達曰自此至曰進士一節論司徒修禮明教上賢絀惡教學升進之事所稟之性有剛柔輕重遲速恐其失中故以六禮節之恐人不得其所故以七教興舉其民使之皆得其所也淫謂過奢侈故以八政禁令之事以防淫淫過之失貴賤同有故不云民道履蹈而行謂齊一所行之道以同國之風俗敬養耆老所以致恭孝之心哀恤孤獨所以逮及不足謂以思意逮及之不足則孤獨者也尊上賢人所以崇奬有德簡去不肖所以絀退惡人李氏格非曰民之性無非天也故六禮曰修修者言有所因也人之德無非自得也故七教曰眀明者言有所本也淫者出於民之欲故八政曰齊齊者所以制其過差也朱氏申曰性不節以禮則易流德不興以教則易廢齊八政使無過行一道德使無異趨方氏慤曰六十曰耆七十曰老耆老在所養則耄期可知無父曰孤無子曰獨孤獨在所恤則鰥寡可知陳氏祥道曰賢者德之名德者賢之實惡者不肖之實不肖者惡之名名出於行實係於心由其名以察其實由其行以原其心故尚之而後崇簡之而後絀也徐氏師曽曰此承上章興學而言司徒掌六鄉之政教以民氣質之性有過不及也於是修六禮以節之使賢者俯而就不肖者跂而及焉以人倫之德由物欲而薄也於是明七教以興之感發其良心鼓舞其德行焉恐其溺於欲則齊八政以防之使知禁戒而不敢放肆恐其入於邪則一道德以同之使學術歸一而不敢異向教法之詳如此而其所以為教皆以身先之老吾老以為孝又合鄉之耆老而養之推極吾心之孝使之興孝也幼吾幼以為慈又合鄉之孤獨而恤之逮及人之不足而使民不倍也身教至矣猶恐資稟有厚薄觀感有淺深又不可無勸懲故率教者上升之以崇其德所以示勸也叛教者簡去之以絀其惡所以示懲也詳見下文通論李氏格非曰六禮冠昏鄉嘉禮也喪凶禮祭吉禮也相見賔禮也周官宗伯掌禮之在上者則有軍禮而冠昏鄉其禮同故五禮此言禮之在民者則冠昏鄉其事異而無軍禮故有六禮父子教之有親君臣教之有義夫婦教之有别長幼教之有序朋友教之有信故曰五教分而言之則父子兄弟其道同而兄弟主於親朋友賔客其事同而賔客主於禮故有七教由七教而詳言之則周官司徒所掌十二教是也八政周官司徒辨其貴賤老幼而有飲食之禁令則政之在飲食也以本俗六安萬民而終於同衣服則政之在衣服也頒職事以登萬民曰學藝曰世事則所謂事為也以土宜相民宅而知其利害則所謂異别也以度教節則所謂度也以儀辨等則所謂制也節必有量等必有數夫禮始於冠本於昏成於喪祭和於鄉射故六禮以冠昏喪祭鄉相見為序教先於內而至於外父子兄弟夫婦教之在內者也君臣長幼朋友賔客教之在外者也故七教以父子兄弟夫婦君臣長幼朋友賔客為序政本於民而制於上飲食衣服事為異别因民而立制者也度量數制自上以節下者也故八政以飲食衣服事為異别度量數制為序鄉師三嵗察辭大行人六嵗協辭奇邪者有禁造言者有刑所以一道德也五十者養於鄉六十者養於國七十者養於學所以養耆老也鰥寡孤獨者皆有常餼所以恤孤獨也以賢制爵所以尚賢也有不孝不睦不姻之刑以糾不仁有不弟不任不恤之刑以懲不義所以簡不肖也有賢可以尚則教之成也先王之法至於簡不肖則備矣存疑孔氏穎達曰此六禮七教並是殷禮周則五禮十二教也案周五禮吉凶軍賔嘉十二教祀禮教敬陽禮教讓隂禮教親樂禮教和儀辨等俗教安刑教中誓教恤度教節世事教能賢制爵庸制祿與是互相經緯非有殷周之異也命鄉簡不帥教者以告耆老皆朝于庠元日習射上功習鄉上齒大司徒帥國之俊士與執事焉不變命國之右鄉簡不帥教者移之左命國之左鄉簡不帥教者移之右如初禮不變移之郊如初禮不變移之遂如初禮不變屏之逺方終身不齒帥音率朝音潮與音預屏音丙正義鄭氏康成曰帥循也不循教謂敖狠不孝弟司徒使鄉簡擇以告者鄉屬司徒孔疏六鄉大夫皆司徒統領耆老皆朝于庠將習禮以化之使之觀焉耆老致仕書傳大夫為大師士為少師及鄉中老賢者不仕而年老有德行者朝猶會也此庠謂鄉學也鄉謂飲酒也至中年考校而又不變移之左右使轉徙其居覬其見新人有所化也亦復習禮於鄉學使之觀焉郊則鄉界之外也稍出逺之後中年又為之習禮於郊學逺郊之外曰遂遂大夫掌之又中年復移之使居遂又為習禮於遂之學不變屏之逺方謂九州之外齒猶録也孔氏穎達曰此論絀惡之事以下皆司徒所掌命此鄉學簡擇不帥教者以告司徒司徒乃命鄉內耆老皆聚會於鄉學之庠乃擇善日於鄉學內為此不帥教之人習其射禮中者在上故云上功習鄉飲酒之禮令老者居上故云上齒欲使不率教之人觀其上功自勵為功觀其上齒則知尊敬長老大司徒帥領國之英俊之士與於鄉射飲酒執行事焉使俊士與之以為榮惡者慕之而自勵習射當在州學習鄉當在黨學今並於鄉學者州屬於鄉雖在州序亦得謂之鄉或鄉居此州更不立州學黨者鄉之屬或鄉所居之黨不别立黨學也此謂初入學一年之終又閒一年而考校之所謂中年考校也不變者右鄉移左左鄉移右亦復習鄉射之禮故云如初不變移之郊者謂五年之時此郊謂近郊也不變移之遂者謂七年之時又不變屏之逺方者謂九年之時九州之外於周則夷鎮蕃也周氏諝曰司空所以富之也司徒所以教之也既教矣故命鄉簡其不帥者以告於上於庠言朝尊道也於廟言朝尊祖也先王無意於成人之惡常慮其欲改之無地故雖鄉有告其不帥者必行射飲之禮以為之勸導有不變然後移之左移之右移之郊移之遂真不能變然後屏之逺方待不肖其恕如此陳氏澔曰左右對移以易其藏修遊息之所新其師友講切之功庶幾其變也四郊去國百里在鄉界之外遂又在逺郊之外蓋示之以漸逺之意也而猶不變則終不可與入德矣於是乃屏棄之徐氏師曽曰必遲之以九年需之以四不變重絶人之意也存疑孔氏穎達曰以逺郊之內六鄉居之其習禮亦鄉大夫臨之逺郊之外為遂不應鄉大夫臨之故遂大夫掌之亦帥國之俊選於遂學而行禮案古者六卿各治一鄉謂之鄉大夫六卿聨事在國則冡宰重在軍則司馬重在鄉則司徒重故司徒得以命六鄉即六遂之學亦當統於司徒也觀周禮每鄉卿一人三年大比皆屬鄉大夫遂止中大夫一人惟言教稼穡可見孔謂六遂不應鄉大夫臨之恐非是命鄉論秀士升之司徒曰選士司徒論選士之秀者而升之學曰俊士升於司徒者不征於鄉升於學者不征於司徒曰造士論選並去聲下同正義鄭氏康成曰秀士鄉大夫所考有德行道藝者升之司徒移名於司徒也升之學曰俊士謂可使習禮者學大學也不征不給其徭役孔疏謂供學及司徒細碎之繇役造成也能習禮則為成士孔氏穎達曰此論崇德之事大司徒命鄉大夫論量考校此鄉學之人有孝友多才藝秀異之士升於司徒先名惟在鄉今移名於司徒其身猶在鄉學未舉入官也司徒論選士之秀者而升之學則身升於大學非惟升名而已征謂力役選士雖升名司徒猶給鄉之繇役俊士雖身升在學猶給司徒繇役若其學業既成已能習禮皆免其繇役者是為造成之士也方氏慤曰升之司徒曰選士以其猶在所擇故也升之學曰俊士以其皆在所用故也選士之造不征於鄉俊士之造不征於司徒此其别也通論孔氏穎達曰周禮鄉大夫三年則大比考其德行道藝而興賢者能者以鄉飲酒禮興之彼據鄉人故三年一舉此據學者故中年考試殷周所同熊謂中年考校殷禮三年大比周法非也陳氏祥道曰司徒大軍旅大田役治其衆庶之政令鄉師辨其可任者國中賢者能者皆舍則征於司徒者惟大軍旅大田役而已升於司徒者鄉師之所舍也升於學者又司徒之所舍也周官考校之法書於族師然後校於黨正校於黨正然後考於州長考於州長然後考於鄉大夫鄉大夫與鄉老羣吏獻之於王然後內史詔王以制爵而不言鄉升士於司徒司徒升士於大學蓋司徒言以鄉三物教萬民而賔興之則其教而賔興之以鄉三物而已是大學亦司徒之所教也司徒言以德制爵則民慎德以庸制祿則民興功是爵祿亦司徒之所制也由是觀之鄉升之司徒司徒升之大學蓋亦周制然矣董氏師讓曰不征即周禮施舍施弛也舍無所取也司徒掌教亦掌役故施舍屬焉周人役法凡七曰祭祀曰朝覲曰會同曰賔客曰軍旅曰田役曰喪荒施舍則七事皆免其施舍凡六曰貴曰賢曰能曰服公事曰老曰疾貴有爵位當免服公事當免老疾無力當免賢能雖士亦民何以免貴之也其德行道藝為鄉老三公所賔禮王世子卿大夫適士所齒讓他日將與共天位治天職而使與庶人伍非待士之體故特免其役以示優異焉考之周制委曲詳盡其目有三一司存不紊二版籍不差三比校不苟六鄉官吏如比長閭胥族師黨正州長鄉大夫上至司徒長二皆長民之官也學校官吏如小胥大胥樂師諸子小樂正大司樂皆士之官也民之在鄉者六鄉官吏主之既升於司徒則司徒長二主之既升於學則學校官吏主之各有司存不相關也鄉大夫當舍者以嵗時入其書大胥掌學士之版司民掌萬民之版民版給役士版不與焉版籍既明胥徒不得為姦也周禮施舍雖寬而考校甚嚴閭胥書之族師書之黨正又書之州長考之鄉師辨之鄉大夫察之然後籍於司徒司徒又命執事以學藝試之然後升於學學官每嵗考校又從而進退之有不帥教者屏之不與士齒則在選造之科而受施舍之恩者亦甚難矣惟司存不紊故無扞格惟版籍不差故無混雜惟比校不苟故無冒濫此不征之法所以經久可行也存疑成氏伯璵曰造成也王子直名造士無俊選名若六卿之子弟本位卑則有俊士選士名取其漸也樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書王大子王子羣后之大子卿大夫元士之適子國之俊選皆造焉凡入學以齒大音泰適丁歷反造七到反正義鄭氏康成曰樂正樂官之長掌國子之教虞書曰蘷命汝典樂教胄子崇髙也髙尚其術以作教也幼者教之於小學長者教之於大學順此詩書禮樂四術而教以成是士春夏陽也詩樂者聲孔疏詩是樂章詩之文義以樂聲播之故為聲聲亦陽也秋冬隂也書禮者事事亦隂也互言之者皆以其術相成王子王之庶子羣后公及諸侯入學皆以長幼受學不用尊卑也孔氏穎達曰此眀習業之事謂樂正當光揚尊崇此四術以為教謂敷暢義理贊明㫖趣使學者知之順者依順此古昔先王之道以教之造成此士術者是道路之名詩書禮樂是先王之道路也春秋教以禮樂則秋教禮春教樂冬夏教以詩書則冬教書夏教詩以聲對舞則聲為安靜舞為鼓動舞為陽聲為隂故大胥云春釋菜合舞秋頒學合聲是也就舞之中奮動甚者屬陽奮動靜者屬隂故文王世子云春夏學干戈秋冬學羽籥是也書者言事之經禮者行事之法事為安靜故為隂文王世子秋學禮冬讀書與此同也四術不可暫闕春教樂兼有禮秋教禮兼有樂夏教詩兼有書冬教書兼有詩故云皆以其術相成但視其隂陽以為偏主耳徐氏師曽曰此言國學教人之法詩以理性情書以道政事禮以謹節文樂以和心聲四者入道之路則崇尚之禮樂有度數之習故教之宜於春秋詩書則誦讀而已故教之宜於冬夏王大子以下言所教之人必以齒者禮義相先之地不容不以孝弟為重也陳氏祥道曰詩者中聲之所止也說志者莫辨焉書者政事之紀也說事者莫辨焉禮之敬文也說體者莫辨焉樂之中和也說樂者莫辨焉崇之為四術使士有所尊立之為四教使士有所從方氏慤曰天子之子適庶皆與諸侯而下庶子不與隆殺之别也選士方升於司徒亦得與者教無內外之别故也存疑鄭氏康成曰尚書傳曰年十五始入小學十八入大學案大戴禮云古者王子年八嵗而就外舍學小藝焉履小節焉束髮而就大學學大藝焉履大節焉尚書大傳云使公卿之大子大夫元士之適子十有三年入小學見小節踐小義二十入大學見大節踐大義餘子年十五入小學見小節踐小義年十八入大學見大節踐大義說者謂餘子衆子或謂庶士庶民之子也今鄭引大傳惟取餘子二句絶不見王大子王子羣后之大子與卿大夫元士之適子之異殊不分明且承幼者教之於小學句則曲禮云人生十年曰幼學左傳言國君年十五冠而生子可謂幼乎白虎通云八嵗入小學十五入大學朱子於大學序且通貴賤言之蓋䝉養全在幼時故曰少成若天性若至十五則情識已開此時始入小學不已晚耶不特天子諸侯之子豫教宜早即庶人年十六則為餘夫别授田二十五畝矣其入學僅十五一嵗而已乎陳氏祥道曰防陽德者必以隂則春教禮夏教書以春夏陽而書禮皆隂事也防隂德者必以陽則秋教樂冬教詩以秋冬隂而詩樂皆陽事也大宗伯曰以天産作隂德以中禮防之以地産作陽德以和樂防之意與此同然春誦於東序主乎詩夏弦於成均主乎樂秋之瞽宗者禮也冬之上庠者書也則鄭氏謂因時順氣於功易成理或然也蓋防之者成人之事順之者小子之事也案春秋教以禮樂冬夏教以詩書春秋節候平調人之氣體皆舒而習禮者有揖讓之容習樂者有舞蹈之節故於春秋教之為宜詩書須講貫誦數而夏之日永冬之夜永為時久而功可專故於冬夏教之為宜古人謂讀書在三餘亦近此意也順先王詩書禮樂以造士者蓋春秋教禮樂冬夏教詩書原是先王成法故順而因之不違其時使士易於成業鄭必以春夏為陽詩樂亦陽秋冬為隂書禮亦隂解之至陳祥道謂防陽德者必以隂則春教禮夏教書防隂德者必以陽則秋教樂冬教詩已屬穿鑿至引天産作隂德以中禮防之之文以相證不更曲而誣乎將出學小胥大胥小樂正簡不帥教者以告于大樂正大樂正以告于王王命三公九卿大夫元士皆入學不變王親視學不變王三日不舉屏之逺方西方曰棘東方曰寄終身不齒屏必郢反棘鄭作僰步黑切周如字正義鄭氏康成曰出學謂九年大成學止也孔疏恐亦中年故明之所簡者謂王大子王子羣后之大子卿大夫元士之適子孔疏恐所簡有鄉人故明之案此承上王大子及俊選言之下大樂正之論而升之亦合鄉人在內此不及俊選偶遺之孔疏謂所簡無鄉人誤也大胥小胥皆樂官屬也孔疏周禮大司樂中大夫二人大胥中士四人小胥下士八人王命皆入學亦謂使習禮以化之不變王又親為之臨視重棄賢者子孫也此習禮皆於大學不舉去食樂重棄人也棘當作僰僰之言逼使之逼寄於夷戎不屏於南北為其大逺孔疏漢書地理志南北萬三千里東西九千里帝王世紀南北萬三千三百六十八里東西九千三百二里南北長東西短故云大逺也孔氏穎達曰此論王子等屏退之事方氏慤曰衆庶之家易治故考校在三年大比之時世祿之家難化故在學九年大成之後三年之近故必四不變乃屏之九年之逺則二不變屏之可也周氏諝曰棘急也示其雖屏之欲急於悔過寄者寓也示其雖屏之特寓於此耳通論陳氏祥道曰周官大胥掌學士之版以待致諸子春入學釋菜合舞秋頒學合聲小胥掌學士之徴令而比之觥其不敬者巡舞列而撻其慢怠者大胥待致以教之小胥觥撻以贊之則簡不帥教者小胥大胥預有力焉樂師掌國學之政以教國子凡樂官掌其政令聽其治訟則簡不帥教者小樂正亦預有力焉大司樂掌成均之法以治建國之學政凡王之事皆有所令焉則簡不帥教以告於大樂正者小胥大胥小樂正也以之告於王者大樂正也不帥者王命三公九卿大夫元士皆入學而王又親視學與周官鄉士遂士王命三公會其期同意王三日不舉與文王世子不舉為之變同意教之仁也簡不帥義也王親視學與三日不舉仁也終身不齒義也先王之於國子仁之而已其處之以義不得已也案記本作棘周氏訓棘為急是也鄭謂棘當作僰又以僰在南詔之東鄙與記西方說不符故以逼近義訓之雖不如從記文作棘之妥然亦得備一義並存作餘論可也存疑孔氏穎達曰殷人習禮在於大學即明堂位云瞽宗殷學文王世子云禮在瞽宗殷之大學也若周則大學曰東膠瞽宗不得為周之大學也故鄭注儀禮鄉射云周立四代之學於國而又以有虞氏之庠為鄉學則周之尋常習禮於殷學之中至九年為王子不變其習禮當於東膠大學然則餘子十八入大學嫡子二十入大學者皆是殷法也若周法立當代大學在公宮左大學即東膠也又立小學於西郊小學即有虞氏之庠其習書於虞氏之學習禮樂於殷之學習舞於夏后氏之學故文王世子云春夏學干戈秋冬學羽籥皆於東序春誦夏弦大師詔之瞽宗又云禮在瞽宗然詩與禮樂雖各在其學習之至二十入大學之時仍於大學之中兼習四術故此注云習禮皆於大學是周之大學亦習禮也禮既在瞽宗又在大學則其餘亦可知也存異黃氏震曰屏之逺方四凶之刑也人之資稟有髙下偶不可教則亦出之於學聽其為庶民而已既出而有犯於有司然後加之罪未晚也遽屏之逺方已甚矣並謂王子不免焉不太甚耶且德行在平日豈一視學之頃所能變而於此决為已甚之罪耶王制刺六經而作何不曰朴作教刑而以四凶之刑加之不帥教者耶案黃氏所云朴作教刑良是然此乃是舉其極耳教之三年中不知多少勸勉懲戒移左移右又三年移郊又三年移遂又三年共歷十二年矣此十二年中經多少良師益友稍有人性豈猶有不孝不弟干名犯義之大惡哉而猶不變乃屏之豈曰偶不可教遂屏之耶若夫國子其所與者皆選士造士也左右前後罔非正人誰與為不善九年出學簡不帥教而命三公九卿皆入學經雖不言年嵗要亦必需之嵗時王親視學亦必需之嵗時必非决之一日之間黃氏所云亦未細審其文義矣孔氏所論學亦恐未然詳見下大樂正論造士之秀者以告於王而升諸司馬曰進士正義鄭氏康成曰升諸司馬移名於司馬也司馬夏官卿掌邦政者進士可進受爵祿也孔氏穎達曰司馬之職以德詔爵以功詔祿即知凡入仕者皆司馬主之也但鄉人既卑級節升之故為選士俊士至於造士若王子與公卿之子本位既尊不須積漸學業既成即為造士於是大樂正總論此造士以告於王升諸司馬也方氏慤曰造士之秀則於成材之中又秀出者也升諸司馬則將以使之臨政故隸於政官之長也以其成材將使之臨政則可以進於王所故以進士名之案書咨伯夷而伯讓蘷龍是典樂即典禮之佐周禮春官大宗伯卿一人小宗伯中大夫二人大司樂亦中大夫二人是大司樂亦大宗伯之佐也作王制者未見周禮因司徒掌六鄉之教樂正掌國學之教故即次之司徒蓋宗伯一官孔孟未嘗言及故也司馬辨論官材論進士之賢者以告於王而定其論論定然後官之任官然後爵之位定然後祿之論力困反其論如字盧昆切任音壬正義鄭氏康成曰辨其論官其材觀其所長也定其論各署其所長也官之使之試守也爵之命之也孔氏穎達曰此論用人及居官黜退之事大樂正論造士之秀者以告于王王必以樂正所論之狀授於司馬司馬得此所論之狀乃更論辨之觀其材能髙下知其堪任何官是凖擬其官以其材故云官材也司馬辨論之後不堪者屏退論量進士之賢者以告于王其告王之時正定其論各署其所長若長於禮者署擬於禮官長於樂者署擬於樂官論擬定然後試之以所能之官堪任此官然後爵命之使有職位然後與之以祿也呂氏祖謙曰司馬政官以其可使從政一人之身未入仕之前經四級已入仕之後經三級始得祿其考之詳如此方氏慤曰所謂官若司徒司馬所謂爵若公卿大夫所謂祿若四大夫至倍上士吳氏澄曰此總言以司徒樂正之所教而成者官之也通論劉氏彞曰古者鄉學教庶人國學教國子鄉學所升曰選士不過用為鄉遂之吏而選用之權在司徒國學所升曰進士則命為朝廷之官而爵祿之權在司馬此鄉學教選之異所以為編户世家之别也然庶人之仕進亦有二道可為選士者司徒試用之一也國學則論選之法與國子同二也陳氏埴曰古者公卿大夫士之子弟以及萬民之子弟生八嵗而入小學教之以幼儀十五嵗而入大學教之以成人之事此大小學之所由建也其謂之國學者即大小學之立於國中以教公卿大夫士之子弟者也其謂之鄉學者即大小學之立於鄉遂以教萬民之子弟者也陳氏祥道曰周官司徒大軍旅大田役治其徒庶之政令是政事亦在所預非特掌教事而已司馬進賢興功其屬有司士稽士之功德有諸子掌國之教治是教事亦在所預非特掌政事而已蓋古者之設官也職未嘗不分而分職則責専事未嘗不聨而聨事則職合故論材主於鄉及官之則論以司馬然後無幸進教士主於司馬及其發則教以司徒然後無廢事案天子之小學在虎門之左師氏掌之當王宮之正東諸侯在公宮南之左當東南避天子也其鄉學之制則家有孰者小學黨有庠遂有序者則鄉學中之大學也其學官之職則國學掌於大樂正而大胥小胥已下其屬鄉學掌於鄉大夫而州長黨正已下其屬也其教之法則國學樂德樂語樂舞其凡鄉學六德六行六藝其目也其論選之法在國學則小胥大胥先簡其不帥教者以告樂正而後樂正論其秀者以告而官之司馬在鄉學則鄉大夫先簡其不帥教者以告司徒而後司徒興其賢者能者而獻其書於王也其仕進之法則自國學出者往往為王朝之官謂之適士自鄉學出者大抵為鄉遂之吏所謂庶士也蓋古者世家與編氓有貴賤之分故自少而别異之而仕進亦有二途然編氓之士又有二途也但自鄉升者其位止曰庶士其祿止於代耕其優之止免鄉之徭役蓋自比長至閭胥鄰長至里宰不啻萬計安能悉官於司馬正鄉大夫所謂使民興賢出使長之使民興能入使治之先就補其民之秀者而均以代耕之祿漸出於部伍而為之長還入其部伍而治其事也若其不願小成則由司徒而復升之國學其論選仕進與國子等矣又案古者先試以職實能任職然後命之未命以前止受前爵之祿必受命乃進祿也如大夫五十乃命未五十猶是士試大夫止受士祿所謂進賢如不得已也大夫廢其事終身不仕死以士禮葬之正義鄭氏康成曰以不任大夫也孔氏穎達曰致仕而退死得以大夫禮葬朱氏申曰廢其事官其官而不事其事也終身不仕貶之於其生士禮葬之貶之於其死方氏慤曰終身不仕則與民同耳猶以士禮葬之者以曽居大夫之位故也然是法也上不及公卿下不及士舉中以該之也周氏諝曰大夫廢其事而終身不仕者義也死以士禮葬之者恩也吳氏澄曰此因上文任官而後爵之之言因及不任其官則黜其爵之事大夫老而致仕者生時雖已不居大夫之位然未嘗奪其大夫之爵也故死時仍得葬以大夫之禮若廢其事而終身不得仕則是大夫之爵已奪故死時亦不得復以大夫禮葬而但以士禮葬之餘論胡氏銓曰案春秋大夫有過被黜則不書卒以其卒時非大夫也匡衡楊僕免為庶人李德裕貶為參軍皆不書薨有發則命大司徒教士以車甲正義鄭氏康成曰乘兵車衣甲之儀有發謂有軍師發卒孔氏穎達曰國有軍旅以發士卒是司馬之事王則命大司徒教以乘兵車及衣甲之儀容必司徒者以司徒主衆又主教故與司馬相參也通論方氏慤曰司徒掌教司馬掌政是分職而辨之也造士則司馬辨論官材有發則司徒教士以車甲是聨事而通之也吳氏澄曰此因上文司徒升造士而司馬官其材因及司馬發車甲而司徒教其士之事案鄉學所升於司徒者司徒論定即用為鄉遂之吏如六鄉之內比長即下士閭胥即中士族師即上士也六遂之內里宰即下士酇長即中士鄙師即上士若在軍則自比長以上即伍之長旅之師有發若搜苖獮狩三年治兵皆司徒教之以車甲以論定屬司徒故任事亦屬司徒也若國子造士則庶子授以車甲司馬弗征凡執技論力適四方裸股肱決射御凡執技以事上者祝史射御醫卜及百工凡執技以事上者不二事不移官出鄉不與士齒仕於家者出鄉不與士齒技其綺反或作伎裸一作祼力果反正義鄭氏康成曰裸股肱謂擐衣出其臂脛使之射御決勝負見勇力也不二事欲専其事亦為不德也不與士齒賤也於其鄉中則齒親親也仕於家亦賤故亦不與士齒孔氏穎達曰執技之事凡有三條上條論課試武夫技藝之事言此既無道藝惟論力以事上故適往四方境界之外則使之擐露臂脛角材力決射御勝負以見武勇中條論執技之人有七祝一史二射三御四醫五卜六百工七射御已言此重云者見其色目也下條論執技之人不得更為二事欲使専一其所有之事非但欲使専事亦為技藝賤薄不是道德之事故不許之方氏慤曰莊子曰能有所藝謂之技則凡執技者不足以德論之也特論其力而已適四方謂有故而之外也裸股肱所以宣手足之力決射御則決勝負於射御二技尤論其力也祝若周官大祝之類史若周官大史之類以其作辭以事神故曰祝以其執書以事神故曰史射則周官之五射若白矢參連之類御則周官之五御若鳴和鸞逐禽左之類醫則醫師卜則卜師之類百工則土工木工金工石工之類凡此者皆執技之名也不二事則欲其無異習不移官則欲其有常守出鄉不與士齒者以執技之賤不得與執德者序長幼也然必出鄉而後不與之齒以鄉黨尚齒故也仕於家則僕而已禮運曰與家僕雜居齊齒非禮也張子曰裸股肱決射御此執技以有事於外者也若祝史射御醫卜及百工此執技以事君於內者有此二等徐氏師曽曰此所謂技兼祝史射御醫卜而言重言射御者因五者而並列之也此皆謂執技之賤人非周禮大祝大史射人馭夫醫師卜師之官也齒列也仕於家謂執技為家臣者不然將季路冉有不與士齒乎案上條鄭孔皆一串說疑是三事適四方健行能覘遞者裸股肱能舉重者決射如徹七札決御如輦重如役三者皆論力也又第一條射御専以力言則次條射御兼以巧法言又第三條仕於私家者不齒則仕於君者出鄉與士齒矣通論陳氏祥道曰有其能者必有其名有其名者必有其分適四方裸股肱決射御言其能也祝史射御醫卜及百工言其名也出鄉不與士齒言其分也因能以正名正名以眀分先王所以處執技者如斯而已蓋士以德技以力德成而上藝成而下先王嚴其分守如此欲人逺恥遷善也然古者教人必以六藝周公以多藝為能孔子不以射御為賤何也古之人志於道據於德依於仁游於藝可也乃若不知道德與仁唯藝是從此君子所以賤之也文王世子謂之郊人賤之此執技者不與士齒之意也禮運臣與家僕雜居齊齒非禮此仕於家者不與士齒之意也仕於家者非技也於此言之者因其類也於鄉齒之仁也出鄉不齒義也不於鄉齒之非所以相親不出鄉不齒非所以相辨此禮所以不同案作王制者不見周禮夏官及書周官篇故絶不知掌六師九伐四時搜苖獮狩諸事但見漢時大司馬甚尊一切廢置由之故遂以辨論官材屬之司馬但周禮大司馬掌建邦國之九法其三曰進賢興功以作邦國則亦不可謂辨論官材非司馬本職也司寇正刑明辟以聽獄訟必三刺有㫖無簡不聽附從輕赦從重辟婢亦反刺七智反正義鄭氏康成曰司寇秋官卿掌刑者辟罪也三刺以求民情斷其獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民孔疏三訊見周禮司刺刺殺也謂欲殺犯罪之人其一問可殺與否於羣臣羣臣謂公卿大夫士其二問可殺與否於羣吏羣吏謂庶人在官者其三問可殺與否於庶人庶人謂萬姓衆來觀者此三刺雖以殺為本其被刑不殺者亦當問之簡誠也有其意無其誠者不論以為罪附施刑也從輕求出之使從輕赦從重雖是罪可重猶赦之也孔氏穎達曰自此至異言一節總論司寇聽訟刑罰禁止之事謂司寇當正定刑書明斷罪法使刑不差二法不傾邪以聽天下獄訟必三刺者言刑法宜謹不可専制必須三刺以求民情㫖意也求民情既得其所犯之罪雖有㫖意無誠實之狀則不聽之不論以為罪也若此人所犯之罪在輕重之間可輕可重則求可輕之刑而附之尚書罪疑惟輕是也所犯之罪本非故為而入重罪故赦之時從重罪之上而赦之其意輕故也尚書眚災肆赦是也方氏慤曰刑正而不偏則所加者無怨辟眀而不隱則所制者無疑辟法也刑出於法而此先刑後辟者以刑得其正然後辟得其明故也李氏格非曰審其輕重之罪所以正刑察其真僞之情所以明辟蔡氏沈曰簡核其實也苟無情實在所不聽郝氏敬曰諸大夫左右國人皆曰可殺然後殺之是三刺三訊也比例無正律曰附從輕以防冤雖無實而罪狀已著直指所應得而赦之存疑陸氏佃曰若聽訟無簡書可據與無可書之實狀皆不聽也胡氏銓曰古者刑辟書於簡所謂簡書是也書於簡則有實迹呂刑云無簡不聽葉氏夢得曰誠則其辭簡僞則其辭煩簡者則聽之案無簡不聽句本之尚書蔡氏核實之訓至矣陸氏胡氏以簡為簡書猶近實葉氏謂誠則辭簡巧僞之人寧不能僞為簡呐耶凡制五刑必即天論郵罰麗於事鄭郵與尤同正義鄭氏康成曰制斷也即就也必即天論言與天意合即或為則論或為倫孔疏倫理也謂就天之倫理即是生殺得中之理郵過也麗附也過人罰人當各附於其事不可假他以喜怒案疏言斷其罪過責罰其身皆依附於所犯之事不可離其本事假别事而為喜怒也孔氏穎達曰言制刑之時必就上天之意論議輕重天意好生又有時以生有時以殺論議時亦當好生使生殺得中方氏慤曰五刑即墨劓刖宮大辟是也制則制而用之也必即天論則取天理以為之也先王五刑不簡然後正乎五罰五罰不服然後正乎五過則罰輕於刑而過又輕於罰矣此止以郵罰為言者輕且如此其重可知矣其言以郵罰為序者亦先輕以眀之也周官所謂桎梏而坐諸嘉石役諸司空此治五過之法也陳氏澔曰郵與尤同責也凡有罪責而當誅罰者必使罰與事相附麗則至公無私而刑當其罪矣通論陳氏祥道曰先王無意於刑人而刑常貴於從輕故易噬嗑之用獄以明罰為先禮言制刑以郵罰為主凡聽五刑之訟必原父子之親立君臣之義以權之意論輕重之序慎測淺深之量以别之悉其聰明致其忠愛以盡之疑獄泛與衆共之衆疑赦之必察小大之比以成之論力困反量去聲泛又作泛孚劒反比必利反正義鄭氏康成曰權平也意思念也淺深謂俱有罪本心有善惡也盡之盡其情也小大猶言輕重已行故事曰比孔氏穎達曰原本也凡犯罪之人或子為父隱臣為國諱雖觸刑禁而非其本惡故聽訟者本其宿情立其恩義為平量之恕而免之意謂思念也又思念論量罪之輕重次序不有越濫又謹慎測度罪人意之善惡淺深之量以分别之使不相亂聽獄之人又當盡悉已之聰眀尋其事之根本致其忠恕仁愛不使嚴酷枉濫以盡犯罪之人情不有屈抑疑獄謂事可疑難斷者也泛廣也已若疑彼罪而不能斷決當與衆庶共論決之若衆人疑惑則當放赦之故書云與其殺不辜寧失不經也比例也言雖疑而赦之不可直爾而放當察案舊法輕重之例以成於事也存疑陳氏祥道曰輕重言其罪淺深言其情大小言其辟原父子之情則以恩掩義立君臣之義則以義掩恩悉其聰明則得其情致其忠愛則哀矜而勿喜疑獄與衆共之呂刑所謂胥占是也衆疑赦之呂刑所謂刑罰之疑有赦是也存異方氏慤曰親主於愛而已一於愛則刑有所不忍加義主於敬而已一於敬則刑有所不敢及一皆如是豈可以為法之經哉其或於親有所原於義有所立者特從法之權而已故曰以權之也邵氏淵曰原父子之親則近於愛故必權之以君臣之義則不溺於愛意論輕重之序則近於私故必謹測淺深之量則不流於私悉其聰明則近於密故必致其忠愛而不陷於察案必原父子之親立君臣之義孔仲達為父隱為國諱疏解最為精粹如晉伐齊逢丑父免齊侯韓厥獻丑父將以為戮郤獻子曰人不難以死免其君我戮之不祥赦之以勸事君者此所謂立君臣之義也如漢禁私酤河間劉忳因父病潛釀酒供藥飲為人所告太守問知其狀而免之此所謂原父子之親也意論輕重以下是概言聽訟之法當如此陳祥道謂原父子之親立君臣之義以恩掩義以義掩恩殊非經㫖方邵二說辭尤支而意不達不可訓也成獄辭史以獄成告於正正聽之正以獄成告於大司寇大司寇聽之棘木之下大司寇以獄之成告於王王命三公參聽之三公以獄之成告於王王三又然後制刑又作宥正義鄭氏康成曰史司寇吏也正於周鄉師之屬孔疏鄉謂鄉士師謂士師屬謂遂士縣士方士之等今漢有正平丞秦所置孔疏漢書百官表廷尉秦官掌刑辟有正左右監宣帝初置左右平鄭見古有正連言平耳周禮鄉師之屬辨其獄訟異其死刑之罪而要之職聽於朝孔疏是鄉士遂士縣士職文異謂殊其應死之文書要謂為其罪法之要辭即囚之狀辨要狀司寇聽之朝王之外朝也左九棘孤卿大夫位焉右九棘公侯伯子男位焉面三槐三公位焉孔疏是朝士職文周禮朝士掌外朝之法左嘉石平罷民焉罷民犯罪之人棘取赤心而外刺槐取懷來人也大司寇聽之棘木之下即此外朝也獄成告於王王使三公復與司寇及正共平之重刑也周禮王欲免之乃命公會其期孔疏六鄉之獄王自會之縣野之獄王命六卿㑹之三又當作三宥宥寬也一宥曰不識再宥曰過失三宥曰遺忘孔疏此司刺文不識不審也若仇當報甲見乙以為甲而殺之過失若舉刃欲砍伐而軼中人遺忘若閒帷薄忘有人在而以兵矢投射孔氏穎達曰成獄辭者獄吏初責核罪人之辭已成定也吏以成辭告於正正得吏告成之辭而又聽察也正聽已竟又以獄成之辭告於大司寇大司寇與公卿在朝槐棘之下聽獄訟成以告於王也王既得司寇之告成辭而刑辟不可繆妄故王又命三公與司寇及正更共參準聽之是三公之外共人相參而聽之也王三又者三三事也王得三公之告恐有此三事致罪故令宥之若不當三事故造罪者然後制刑陳氏祥道曰王以道揆而貴乎寬有司以法守而貴乎嚴寬則天下之所樂嚴則天下之所畏案宥者推其所以致此之故而求所以赦之耳不識者不知其非而誤以為當為此全可矜者也過失者無心而誤蹈於非此猶可諒者也遺忘者昏耄不記憶前事而忽相反此則實有罪而尚非故犯猶當末減者也三者由輕而重所該甚廣不必定指殺人孔氏只舉一以為例耳凡作刑罰輕無赦刑者侀也侀者成也一成而不可變故君子盡心焉侀刑同正義鄭氏康成曰法雖輕不赦之為人易犯也變更也孔氏穎達曰此非疑獄故雖輕不赦若輕者輒赦則犯者衆也故書云刑故無小侀是侀體侀體是人之成就容貌容貌一成之後不可變馬氏睎孟曰一辭不具不足以為刑一體不備不足以為成人故曰侀也侀者成也陳氏祥道曰無赦則民不至於犯罪盡心則吏不至於濫刑有無赦之法以禁於未然之前有盡心之吏以應於己然之後此民所以畏法而親上也析言破律亂名改作執左道以亂政殺作淫聲異服奇技奇器以疑衆殺行僞而堅言僞而辨學非而博順非而澤以疑衆殺假於鬼神時日卜筮以疑衆殺此四誅者不以聽行去聲正義鄭氏康成曰析言破律巧賣法令者也亂名改作謂變易官與名之物更造法度左道孔疏盧云左道邪道也地道尊右也案左猶逆若巫蠱孔疏蠱蟲食器皿之名巫行邪術損壞人心漢江充害戾太子及俗禁孔疏若張竦行避反支陳伯子出避往亡入避歸忌淫聲鄭衛之屬異服若聚鷸冠瓊辨也孔疏左傳僖二十四年鄭子臧好聚鷸冠僖二十八年楚子玉自為瓊辨玉纓奇技奇器若公輸般以機窆行僞至而澤皆謂虛華捷給無誠者也孔疏史記孔子以誅少正卯假鬼神時日卜筮若今時持喪葬築蓋嫁取卜數文書使民倍禮違制四誅不以聽為其為害大而辭不可習也方氏慤曰析言則離於理破律則壞於法亂名則失其實改作則反其常若是者皆執左道以亂政也馬氏睎孟曰淫聲所以惑民聽異服所以惑民視奇技奇器所以惑民心言行僞而不由於誠學順非而不由於是甚者至於堅辨博澤尤有以惑衆心故殺卜筮者先王所以使民信時日畏法令而不以正告則謂之假假於鬼神之幽而信其卜筮之明則有以惑於衆故殺之邵氏淵曰論其罪雖未至於可殺究其實則蠱民心甚矣故不聽而殺之聖人防微之心也案破律改作是假事功以亂治淫聲奇技是假玩好以亂俗行僞學非是假學術以亂教鬼神時日是假術數以亂常四者為害實大故誅不以聽破律改作謂變古人成法如商君開阡陌王莽更易舊縣官制之類執左道如墨子尚同許行為神農並耕之類太公戮華士則堅辨博澤者晏子流楚巫則時日卜筮者鄭但以巧賣法令當破律巫蠱俗忌當左道未盡其義也凡執禁以齊衆不赦過有圭璧金璋不粥於市命服命車不粥於市宗廟之器不粥於市犧牲不粥於市戎器不粥於市用器不中度不粥於市兵車不中度不粥於市布帛精粗不中數幅廣狹不中量不粥於市姦色亂正色不粥於市錦文珠玉成器不粥於市衣服飲食不粥於市五榖不時果實未孰不粥於市木不中伐不粥於市禽獸魚鱉不中殺不粥於市關執禁以譏禁異服識異言中去聲正義鄭氏康成曰不赦過亦為人將易犯圭璧金璋至戎器皆尊物非民所宜有戎器軍器也粥賣也用器不中度至姦色凡以其不可用也用器弓矢耒耜飲食器也度丈尺也數升縷多少錦文珠玉衣服飲食不粥於市不示民以奢與貪也成猶善也五榖果實未成不利人木伐之非時禽獸魚鱉殺之非時皆不中用故皆不粥於市周禮仲冬斬陽木仲夏斬隂木春獻鱉蜃月令季冬始漁關境上門譏呵察也孔氏穎達曰言圭璧金璋及犧牲戎器皆是尊貴所合蓄之物非民所宜有防民之僭僞也軍器防民之賊亂也飲食器者既夕禮敦杅之屬布帛精粗者若朝服之布十五升斬衰三升齊衰四升之類是也廣狹者布廣二尺二寸鄭注周禮引逸巡守禮帛廣四尺八寸鄭云四當為三則帛廣二尺四寸案此句疑誤若不中度數並不粥於市衣服飲食與珠玉連文據華美者不得粥之若尋常飲食則得粥也前言圭璧金璋是貴者之器非民所宜有此錦文珠玉是華麗之物富人合有但不得聚之過多故云不粥於市不示民以奢也飲食不粥者不示民以貪也司關之官執此戒禁之書以譏察出入之人禁身著異服者又識口為異言之人防姦僞察非違方氏慤曰首五事禁民之不敬次四事禁民之不法次二事禁民之不儉末三事禁民之不仁馬氏睎孟曰先王之為政在於明分而貴賤異勢其用不可無差等故圭璧金璋上之所寶也命服命車上之所用也宗廟器犧牲上之祭祀所用也戎器上之所以禦患也凡此皆非下所宜有故皆不粥於市先王之為政在於度量而度量不一先王有所禁故不中度不中量皆不粥於市先王於為政害者使之亡靡者使之微故姦色亂正色錦文珠玊成器衣服飲食皆不粥於市所以去其靡也五榖不時果實未孰木不中伐禽獸魚鱉不中殺皆不粥於市所以去其害也通論方氏慤曰周官士師掌國之五禁皆以木鐸徇於朝書而縣於門閭近則徇之使聞逺則縣之使觀在上待之為己盡在下習之為已久如是而猶犯之宜其不赦矣又曰戎器不粥而兵車之中度則得粥之者以丘乘出車賦而兵車之粥不可禁故也李氏格非曰周官司市凡僞飾之禁在民在商在賈者在工者皆十有二蓋錦文成器飲食民得以有而不禁圭璧金璋犧牲商得以資賈得以粥而不禁命服命車戎器工得以作而不禁故在民在商在賈在工者皆十二而此言禁則十有四也吳氏萃曰司市僞飾之禁在民尤先於商賈與工者民不敢用則商賈不敢販工亦不敢造也此民所以安分務本而無奢淫姦僞之習也李氏覯曰理財之道去僞為先姦僞惡物而可雜亂欺人以取利則人競趨之愚民見其利將日廢業以作無用之物人廢業則本不厚物無用則國不實下去本而上失實禍自此始矣至於侈靡雖不能盡去亦當制節使微少月令曰毋或作為淫巧以蕩上心書曰不貴異物賤用物民乃足此之謂也大史典禮執簡記奉諱惡天子齊戒受諫大音泰惡去聲齊音齊正義鄭氏康成曰簡記策書也諱先王名惡忌日若子卯孔氏穎達曰大史之官典掌禮事國之得失是其所掌奉進也鄭注諱謂先王名惡謂子卯忌日其實餘諱惡亦大史奉之故禮運云天子適諸侯而不以禮籍入是謂天子壞法亂紀鄭注云以禮籍入謂大史典禮執簡記奉諱惡是亦諱諸侯之祖父誦訓云掌道方慝以詔辟忌注云方慝四方言語所惡是也陳氏澔曰周官大史典歷代禮儀之籍國有禮事則豫執簡策記載所當行之禮儀并奉所當知之諱惡以進天子重其事故齊戒以受其諫諫猶教詔也通論劉氏彞曰大史之職凡有大禮大事則執簡記以考正其儀天子行禘祫㑹逺祖於大廟則奉其諱日月有可惡而齊戒恐懼以俟天譴則奉其惡日於天子所以佐佑一人惕厲修德若天地有大災變三辰失其常度咎徴作於四時札瘥形於四國皆天子所惡也周官大史掌建邦之六典以逆邦國之治掌法以逆官府之治掌則以逆都鄙之治正嵗年以叙事於官府頒告朔於邦國而小史掌邦國之志奠繫世辨昭穆若有事則詔王之忌諱大略皆同存疑鄭氏康成曰嵗終羣臣奏嵗事諫王當所改為也孔氏穎達曰舊來天子所施之事或有不便須有改為百官以此上諫於王天子以其事重故先齊戒而後受之也案此王者左右史之制宗伯之職也上皆言王者治人之事此則王者所以自治董子所謂正心以正朝廷百官者此也鄭孔以天子受諫句屬下節則大史之諫天子不受歟且施為未當則當其時宜據法式而爭矣何待嵗終陳氏集說以屬本節得之今從其說司會以嵗之成質於天子冢宰齊戒受質大樂正大司寇市三官以其成從質於天子大司徒大司馬大司空齊戒受質百官各以其成質於三官大司徒大司馬大司空以百官之成質於天子百官齊戒受質然後休老勞農成嵗事制國用㑹古外反齊音齊勞力報反正義鄭氏康成曰司會冢宰之屬掌計要者成計要質猶平也平其計要冡宰齊戒受質贊王受之也大樂正於周宗伯之屬市司市也於周司徒之屬從從於司會也百官司徒司馬司空三官之屬也百官受質受平報也休老勞農饗養之也成嵗事斷計要也孔氏穎達曰此論嵗終天子受質及百官質於天子休老勞農制國用之事司會總主羣官治要故以一嵗治要之成質於天子質平也謂奏上文簿聽天子平量之也冢宰二王治事故亦齊戒贊王受羣臣所平之事謂共王論定也大樂正大司寇市三官各以其當司成要隨從司㑹平於天子以周法言之司㑹總主羣官簿書則司徒司馬司空簿書亦司㑹掌之質於天子所以下文司徒司馬司空各質於天子不由司㑹唯大樂正大司寇市三官從司㑹質於天子者司㑹總主治要先質於王若今時先申帳目樂正司寇司市當司事少即徑從司會以質於王其司徒司馬司空總主萬民其事既大雖司㑹進其治要仍須各受質屬官親自質於天子百官齊戒受質者以司徒司馬司空質於天子天子平斷畢當須報於下百官齊戒受天子所平之要然後休老勞農即十月蠟祭飲酒勞農也斷定計要一嵗事成乃制來嵗之國用故云制國用也案周禮注嵗計曰會月計曰要日計曰成彼對文耳鄭總而言之故云成計要也胡氏銓曰大樂正等由司㑹以正於王大司徒以下三官不由司㑹者以其總主萬民得自質於王司㑹但進其治要耳通論方氏慤曰一嵗之內所質多矣必於嵗之終言齊戒受之者今嵗於是乎幾終來嵗於是乎更始朔易之事將有所平在始和之政將有所布宣既驗者可因為之監未然者可豫為之防也存異方氏慤曰大司徒大司馬大司空齊戒受質者是蓋各以其類受之也大司徒掌邦教敷五典者也而樂正則崇四術立四教焉故樂正之質則司徒受之司馬掌邦政統六師者也而司寇則詰姦慝刑暴亂焉故司寇之質則司馬受之司空掌邦事居四民者也而司市僞飾之禁在民在商在賈在工者各十有二焉故司市之質則司空受之非各以其類乎不及宗伯者以樂正所立之教兼於禮故也王氏曰冢宰司徒司馬司寇司空五官皆齊戒受質惟宗伯不與蓋典禮有常無可損益故也案祭用嵗之仂喪用三年仂安得謂禮事無可㑹陸氏佃曰不言宗伯以大樂正見之也案不言宗伯上文所無也若周禮所載宗伯之事甚多安得以一樂正盡之馬氏睎孟曰天子以司㑹之成降於冢宰冢宰則齊戒受之胡氏銓曰先儒云天子平斷畢報於下故百官受天子所質之要非也此謂百官自受在下所質正之要也案質成先自下上後自上下總以互文見意不拘一人也案質成之法周禮天官旬終則令正日成月終則令正月要嵗終則令羣吏正嵗㑹小宰贊之大宰受之小司徒嵗終則考其屬之治成小司寇命其屬入會乃政事小司馬小司空文雖闕而無不各考其屬可知三年大計羣吏之治以行黜陟而司㑹則以參互考日成以月要考月成以嵗㑹考嵗成以周知四國之治以詔王及冢宰爵祿廢置故冢宰受司會之質以質天子而五官各考其屬從冢宰以質天子也樂正及市各有所屬而此特别之因前造士關市而言不言宗伯前文未及也止言大司徒大司馬大司空者漢時以此為三公故也而或以此為夏殷制或據周禮以實之而又以樂正司寇司市為司徒三官之屬夫周制司寇為六卿之一而以為司徒三官之屬可乎欽定禮記義疏卷十八
