body:
  text: 表記第三十二正義孔氏穎達曰案鄭目録云名曰表記者以其記君子之德見於儀表也此於别録屬通論又曰稱子言之凡八所皇氏云皆發端起義事之頭首下更廣開其事或曲説其理則直稱子曰方氏慤曰表者裏之外也凡欲自眀於外而期物之取正者皆謂之表孔子體道而不行乎世無以自眀而莫之取正於是立言以表之則弟子不可不記也故曰表記朱氏申曰仁者天下之表也此篇記孔子言仁為詳故以表記名篇案表者測日之臬居中而為四方所取正坊記示人以所當戒表記示人以所當法也表莫尊於仁而義以輔之信以成之若敬則又所以求仁之方也今從皇氏分為八支子言之歸乎君子隱而顯不矜而莊不厲而威不言而信正義鄭氏康成曰此孔子行應聘諸侯莫能用巳心厭倦之辭也矜謂自尊大也厲謂嚴顔色孔氏穎逹曰孔子身在他國不被任用故稱歸乎隱而顯者言君子身雖幽隱而道德潛通聲名顯著也不自尊大而人尊敬不自嚴厲而人威服不須出言而人體信以其積德咸通故所致如此馬氏睎孟曰隱者其迹顯者其名德蘊於中輝光發於外不矜不厲不言所謂隱也莊威信所謂顯也子曰君子不失足於人不失色於人不失口於人是故君子貌足畏也色足憚也言足信也甫刑曰敬忌而罔有擇言在躬躬今尚書作身正義鄭氏康成曰失謂失其容止之節也玉藻曰足容重色容莊口容止甫刑書篇名孔疏即呂刑忌之言戒也言巳外敬而心戒慎則無有可擇之言加於身也孔氏穎達曰此廣明君子之德通論呂氏大臨曰修身之要有三貌也色也言也曽子曰君子所貴乎道者三動容貌出辭氣正顔色冠義曰禮義之始在於正容體齊顔色順辭令修此身者敬而巳矣不敬則失之陳氏祥道曰上言其所難勉者所以盡道此繼以其所易為者所以盡教必矜而莊故不失足於人必厲而威故不失色於人必言而信故不失口於人方氏慤曰靜所以處巳動所以接人故每以不失於人為言黃氏震曰不失於人謂交際之間敬謹也惟不失足於人故其貌足畏惟不失色於人故其色足憚惟不失口於人故其言足信忌戒也惟敬戒故無可擇之言在躬蓋舉一端以為證子曰裼襲之不相因也欲民之毋相瀆也正義鄭氏康成曰不相因者以其或以裼為敬或以襲為敬禮盛者以襲為敬執玉龜之屬也禮不盛者以裼為敬受饗是也孔氏穎達曰欲使人民無相褻瀆故使禮相變革也子曰祭極敬不繼之以樂朝極辨不繼之以倦樂音洛朝直遙反正義鄭氏康成曰極猶盡也辨分别政事也孔氏穎達曰祭祀極盡於敬不可繼之以樂而不敬朝禮極盡於分别政事不可繼之以懈倦而不分别也葉氏夢得曰禮之體無不敬而極者在祭故樂以迎來哀以送往非繼以樂也禮之用無不辨而極者在朝故日中而退非繼以倦也餘論王氏安石曰不繼以樂者樂之在身哀與樂半者樂之在親案祭以接鬼神固極敬至於獻酬笑語則樂起而敬易弛然而禮儀卒度不繼之以樂也朝以眀庶政固極辨或至於日中昃則倦起而辨不明然而不遑暇食不繼之以倦也君子之慎終如始如是子曰君子慎以辟禍篤以不掩恭以逺恥辟音避遠於萬反正義鄭氏康成曰篤厚也掩猶困迫也孔疏君子篤厚行於善道不使掩逼而被困迫故案易彖傳困剛掩也言剛為柔所困鄭以困釋掩義馬氏睎孟曰禍者起於微而生於人之所忽故君子慎以避之篤者居於厚不居其薄處其實不處其華則輝光發於外而人不能掩恭則不侮不侮於人則人不侮於巳故恭以逺恥存疑張子曰篤謂篤實篤實則自有光輝如何可掩呂氏大臨曰篤其行則誠著何事於掩則掩其不善而著其善不篤而好掩者也案不掩有三解吕氏謂君子不為掩著之事張子謂君子誠則自不可掩但玩本文掩字與禍恥字一例終以鄭孔為正子曰君子莊敬日強安肆日偷君子不以一日使其躬儳焉如不終日儳在鑑反正義鄭氏康成曰肆謂放恣也偷茍且也儳焉可輕賤之貌孔氏穎達曰又廣明恭敬之事君子恆能莊敬故德業日強小人安樂放恣則其情性日為茍且君子不使其身儳焉可輕賤如小人不能終竟一日也應氏鏞曰收斂則精神內固操存則血氣不浮故日進於強宴安則物欲肆行縱肆則膚體懈弛故日趨於偷儳者參錯不齊之貌心無所檢束而分離散亂遂至儳焉錯出外既散亂而不整內亦拘迫故如不終日也君子主一以直內斯須無不莊不敬之態則心廣體胖泰然自適何至於如不終日乎通論張子曰君子莊敬日強始則須拳拳服膺出於勉強至於中禮却從容如此方是為巳之學吕氏大臨曰莊敬出於禮安肆出於欲君子以此自檢故德業可尊進退可度不至於凌節犯分如不能容其身也儳凌節犯分之謂程子曰常人之情才放肆則日就曠蕩自檢束則日就規矩存疑鄭氏康成曰如不終日言人而無禮死無日也案書言僝功左傳鼓儳曲禮儳言皆急疾參錯之意蓋小人平日習於縱肆一當大事見君子勉為莊敬而手足耳目與心不習則參錯不齊有若不能終日者所謂心勞日拙也君子豈使其身至是哉子曰齊戒以事鬼神擇日月以見君恐民之不敬也齊側皆反見賢遍反正義鄭氏康成曰擇日月以見君謂臣在邑境者孔疏朝廷之臣每日朝君何得云擇日月故鄭知在邑境或擇日出使在外或食邑别都見君須擇日月也餘論方氏慤曰玉藻言將適公所宿齊戒則見君者非不齊戒周官言祭祀前期十日帥報事而卜日遂戒則事鬼神者非不擇日月而此於鬼神言齊戒於君言日月者亦各有所當也子曰狎侮死焉而不畏也正義鄭氏康成曰忕於無敬心也孔氏穎達曰小人惟好狎侮雖有死禍而不知畏懼也馬氏睎孟曰狎侮至於死而不畏者蔽其所褻也子曰無辭不相接也無禮不相見也欲民之毋相褻也易曰初筮告再三瀆瀆則不告三息暫反告音谷正義鄭氏康成曰辭所以通情也禮謂贄也春秋傳曰古者諸侯有朝聘之事號辭必稱先君以相接也瀆之言褻也孔氏穎達曰前明小人狎侮至於死亡此明君子無相褻瀆言朝聘會聚必有言辭以通情意贄幣之禮以示巳情否則不得相接見也引易蒙卦證無相褻瀆之義吕氏大臨曰辭者相接之言如公與客宴曰寡人有不腆之酒以請吾子之與寡人須臾焉使某也以請之類是也禮者相見之贄如羔鴈雉鶩之類必以辭必以禮者交接不可茍茍則褻褻則不敬筮之道貴於初筮而不敢再三至敬而不褻者也陳氏澔曰此言賔主之交際當慎始敬終如初筮之誠不可如再三筮之瀆慢也案辭以正會合之名贄以章恭敬之實無辭則直情徑行無幣則恭敬莫將此先王制禮所以消狎侮之萌而養斯人廉讓之心也此以上為第一支仁者天下之表而表記不先言仁未有不敬而能仁者也子言之仁者天下之表也義者天下之制也報者天下之利也正義鄭氏康成曰報謂禮也禮尚往來孔氏穎達曰自此至無失一節總明仁義之事故更稱子言之仁是行之盛極故為天下之儀表義宜也制謂裁斷於事也方氏慤曰仁足以長人故曰天下之表義足以方外故曰天下之制曲禮曰大上貴德其次務施報禮尚往來則報之為禮固眀不曰禮而曰報者以禮不止於報故也馬氏睎孟曰仁不傷乎愛者有義以裁之義不傷乎制者有仁以為本也仁者義之本義者仁之節而禮者節於仁義也凡此皆相因之理也案仁為天下之表則言仁足矣必兼言義者非以義勝欲不能仁其身而非以義正萬民亦必不能胥天下而仁之也至於因物付物不以巳私與焉則報亦為仁之用而非有二矣子曰以德報德則民有所勸以怨報怨則民有所懲詩曰無言不讐無德不報大甲曰民非后無能胥以寧后非民無以辟四方大音泰辟音璧正義鄭氏康成曰懲謂創艾讐猶答也大甲湯孫書以名篇孔疏伊尹作書訓之故云大甲胥相也民非君不能以相安孔氏穎逹曰引詩大雅抑之篇證相報之義引大甲證君臣上下各以其事相報也胥以寧謂相匡正以自安居也辟君之也馬氏睎孟曰此釋報者天下之利之意所謂報者隨其善惡之所在而有以報之也德必報之以德然後民知有所勸怨必報之以怨然後民知有所懲蓋言有得失則必讐德有凶吉則必報民非后無能胥以寧是民有德於后而必報之后非民無以辟四方是后有德於民而必報之此上下之報也存疑陳氏澔曰以論語以直報怨以德報德觀之此章恐非夫子之言案此與論語異者論語以常人之報施言此以君之治民言也仁者民之所德以德報之則民皆勸於為仁不仁者民之所怨故必以怨報之則民皆相戒於不仁子曰以德報怨則寬身之仁也以怨報德則刑戮之民也正義鄭氏康成曰寬猶愛也愛身以息怨非禮之正也仁亦當作民聲之誤孔氏穎達曰以德報怨是寬愛巳身之民欲茍息禍患非禮之正也吕氏大臨曰以怨報德則反易天常天下之亂民法所當誅者也存疑方氏慤曰以德報怨則忘人之怨忘人之怨雖不足以有懲而衆將德之故曰寬身之仁以怨報德則忘人之德忘人之德既不足以有所勸而衆且怨之故曰刑戮之民案此章以常人之報施言子曰無欲而好仁者無畏而惡不仁者天下一人而巳矣是故君子議道自巳而置法以民好去聲惡烏路反正義鄭氏康成曰一人而巳喻少也自巳自盡巳所能行孔氏穎達曰凡人好仁皆有所欲今無所欲而好仁凡人惡不仁皆有所畏今無所畏而惡不仁如此者少也君子議道先自巳而始巳所能行乃施於人故云置法以民吕氏大臨曰以聖人之所性而議道則道無不盡以衆人之可為而制法則法無不行方氏慤曰論語所謂躬自厚而薄責於人也自者自此而之乎彼之辭以者以彼而用於此之辭子曰仁有三與仁同功而異情與仁同功其仁未可知也與仁同過然後其仁可知也仁者安仁知者利仁畏罪者強仁正義鄭氏康成曰仁有三謂安仁利仁強仁也利仁強仁功雖與安仁者同本情則異功者人所貪也過者人所避也在過之中非其本情者或有悔者焉通論吕氏大臨曰功者人所貪假之者有之故齊桓公九合諸侯一匡天下湯武之舉不過乎是而其情則不同故其仁未可知也過者人所避有不幸而致焉故周公使管叔監殷管叔以殷畔過於愛兄而巳孔子對陳司敗以昭公知禮過於諱君而巳皆出乎情而無偽故其仁可知馬氏睎孟曰過者人所避惟仁者受之而不辭至於利仁強仁者不能無悔也故同過然後知仁案與仁同過其仁可知所謂觀過知仁也若周公之使管叔孔子之稱君知禮俱是天理人情之至不得以司敗陳賈語真以過目之存疑呂氏大臨曰仁者安仁無欲而好仁無畏而惡不仁者也知者利仁有欲而好仁者也畏罪者強仁有畏而惡不仁者也仁者右也道者左也仁者人也道者義也厚於仁者薄於義親而不尊厚於義者薄於仁尊而不親正義鄭氏康成曰右也左也言相須而成也仁多則人親之義多則人尊之孔氏穎達曰仁義相須若手之左右仁者人也言仁恩之道以人情相愛道者義也凡可履蹈而行者必裁斷得宜項氏安世曰仁即人身也道即義理也人身能行仁義故為右右用力也義理不能自行待其人而後行故為左左不用力也葉氏夢得曰道以仁為用故言右仁以道為體故言左足乎仁則人道備故言人人而有義則人道立故言義仁義一本而有厚薄者時與事異也吳氏澄曰日用動作之便右優而左稍劣仁右義左猶言禮先樂後志至氣次云爾蓋仁者中心所具之德體也道者事物所由之路用也體先用後體至用次故借左右二字以喻其有分非謂一尊一卑相去懸絶也仁之為體以此心之在人者言故曰人也道之為用以事物之義理而言故曰義也人之氣稟得生物之氣多者仁厚而義薄得收物之氣多者義厚而仁薄仁者溫然之慈惠故人親愛之義者截然之裁制故人尊敬之案以下記者申釋上文此一節則申利仁也言人之身本具斯道如左右之原不相離而就其中别而言之則人率性之道為仁如右之取携甚便以人從道為義如左之用力稍艱於是有好仁者其慈祥之意多而不足於義人見其親不見其尊有惡不仁者其嚴毅之氣多而不足於仁人見其尊不見其親蓋始於所稟之氣有偏即至於成德亦不能無異此皆利仁之事也道有至義有考至道以王義道以霸考道以為無失王去聲鄭謂義上當脫一有字正義鄭氏康成曰此讀當言道有至有義有考字脫一有耳有至謂兼仁義者有義則無仁矣考考成也能取仁義之一成之以不失於人非性也呂氏大臨曰至道者至於道之極不可以有加也故以王義道者揆道而裁之制節謹度可以有國而長諸侯故以霸考道者必稽古昔稱先王所謂非法不言非道不行雖未達道亦庶幾乎不失矣馬氏睎孟曰考道非體道者也惟稽考而巳矣故考道止於無失先至而後義先義而後考此優劣之序通論張子曰考求過失以免罪戾者畏罪之仁也故曰考道以為無失薄仁厚義薄義厚仁非論仁義之至語其偏者虞夏之道仁義不偏故親而尊餘論胡氏銓曰仁義歸往曰王湯武是也不粹而駮曰霸五霸是也雜王霸道成名以不失天下漢文景唐太宗是也辨正王氏曰義道以霸非孔子之言案此以上為第二支言仁也子言之仁有數義有長短小大中心憯怛愛人之仁也率法而強之資仁者也詩云豐水有芭武王豈不仕詒厥孫謀以燕翼子武王蒸哉數世之仁也國風曰我今不閲皇恤我後終身之仁也憯七感反今毛詩作躬案武王蒸哉句今本無正義鄭氏康成曰資取也數與長短小大互言之耳性仁義者其數長大取仁義者其數短小芭枸檵也案枸把之把從木此從草非木也經言豐水有芭必水草名與新田之芭人馬皆可食糜芭為榖名又别仕之言事也詒遺也燕安也蒸君也言武王豈不念天下之事如豐水之有芭矣乃遺其後世之子孫以善謀以安翼其子也君哉武王美之也閲猶容也皇暇也恤憂也言我今尚恐不能自容何暇憂我後之人乎孔氏穎逹曰自此至不稱其服更廣明仁義之道故更稱子言之中心憯怛天性自仁者也率法而強之取仁而行者也引大雅文王有聲美武王之詩以證性仁者其數長武王行仁遺及子孫故曰數世之仁又引邶國風谷風之篇證取仁而行惟在一身何暇憂及後世是終身之仁也吕氏大臨曰仁為器重為道逺隨其所舉之多寡所至之逺近皆可以謂之仁此仁所以取數之多也中心憯怛仁發於性者也率法而強之外鑠於仁者也以其誠心愛人故曰愛人之仁以其有取於外故曰資仁此所發淺深之數也數世之仁終身之仁此所施逺近之數也義有短長小大者義無定體惟其所宜而巳此章論仁而及義者蓋仁之數是亦義也馬氏睎孟曰數世之仁數之多也終身之仁數之寡也義者依於仁而為之節仁之數多者則其節長仁之數寡者則其節短中心憯怛推其所愛以及人言愛人則愛巳者可知率其在外之法而勉強以為之則資仁以成巳自愛猶不足愛人足乎哉豐水有芭出於自然武王所以有事於天下亦出於自然蓋由仁義行而非行仁義也故詒厥孫謀以燕翼子徐氏師曽曰人之體仁不能皆至故隨其力之所至而言皆可以仁名是仁有數也義以制事本無定體故隨其用之所處而言皆可以義言是義有長短小大也故以仁言可惻之事感於外而中心之憯怛形焉是為愛人之仁其所發者深矣循古人為仁之法而勉強行之是為資人之仁其所發則淺矣行仁於今時澤及於後世而為數世之仁惟其所發者深故其所及者逺取仁於人僅成乎巳而為終身之仁惟其所發者淺故其所及者近也仁之數如此則義之長短小大可類推矣子曰仁之為器重其為道逺舉者莫能勝也行者莫能致也取數多者仁也夫勉於仁者不亦難乎是故君子以義度人則難為人以人望人則賢者可知巳矣勝音升度待洛反正義鄭氏康成曰取數多者言計天下之道仁居其多以義度人言以先王成法擬度人則難中也當以時人相比方耳孔氏穎達曰難為人言難中乎古法也賢者可知言能合於今世事則是賢人也張子曰仁德至不可盡但取分數多者為仁如九德德多者益賢呂氏大臨曰舉莫能勝行莫能致勉之者之為難也以義度人者盡義以度人者也以人望人者舉今之人相望也盡義以求人非聖人不足以當之故難為人舉今之人相望則大賢愈於小賢小賢愈於不賢故賢者可知巳矣此亦以數而言仁也方氏慤曰器若器用之器道若道路之道勝言勝其任致言致其至舉若手舉行若足行子曰中心安仁者天下一人而巳矣大雅曰德輶如毛民鮮克舉之我儀圖之惟仲山甫舉之愛莫助之小雅曰髙山仰止景行行止子曰詩之好仁如此鄉道而行中道而廢忘身之老也不知年數之不足也俯焉日有孳孳斃而后巳輶音由鮮息淺反景行之行下孟反好呼報反鄉許亮反俯音免正義鄭氏康成曰輶輕也鮮罕也儀匹也圖謀也愛猶惜也言德之輕如毛耳人皆以為重罕能舉行之者作此詩者周宣王之大臣也言我之匹謀之仲山甫則能舉行之美之也惜乎時人無能助之者言賢者少仰髙勤行者仁之次也景明也有明行者謂古賢聖也廢喻力極罷頓不能復行則止也俯焉勤勞之貌斃仆也孔氏穎達曰詩大雅蒸民之篇引以眀行仁者少也小雅車舝之詩言修德如髙山則人瞻仰之有景明之行則人仰行之證古者賢聖能行仁道後世瞻仰慕行也朱子曰景行大道也髙山則可仰景行則可行應氏鏞曰前言仁之重且逺而不可以全責故以人望人隨其力量所至又恐人以仁為不可企及故又總敘而勸勉之安仁者雖獨立無儔然德本甚輕人自鮮舉幸有能舉者當衆圖而共助仰髙勤行終其身而後巳是其望於人者無巳不容有自恕之心也陳氏澔曰蒸民之篇言求其能舉德者惟仲山甫使其或有不及我思效忠以助之而山甫全德無可以致助者夫子引此又引車舝詩而贊之曰詩人之好仁如此中道而廢言力竭而止若非力竭則不止也不足少也人老則未來之歲月少矣俯焉無他顧之意存疑姚氏舜牧曰中道而廢當作中道不廢案足疾曰廢此廢字只是力竭不能自前之意至此而猶必進故見其好仁語氣直下子曰仁之難成久矣人人失其所好故仁者之過易辭也好去聲易以豉反正義鄭氏康成曰言仁道不成人所由不得其志辭猶解説也仁者恭儉雖有過不為甚矣惟聖人無過孔氏穎達曰取仁行故尚有過天性仁則全無過呂氏大臨曰仁者之心公衆人之心私公則所好者兼容博愛私則所好者克伐怨欲此人之失其所好者也心誠鄉仁雖有過差其情則善不待辭而辨矣故曰仁者之過易辭方氏慤曰雖有過易辭况無過乎仁者之過過所厚也子曰恭近禮儉近仁信近情敬讓以行此雖有過其不甚矣夫恭寡過情可信儉易容也以此失之者不亦鮮乎詩曰溫溫恭人維德之基夫音扶鮮上聲正義鄭氏康成曰言罕以此失之孔氏穎達曰禮主於敬故恭近禮儉不費用無害於物故近仁言語信實故近情恆能恭敬故少過以情示人故可信儉則寡求故易容詩大雅抑之篇結上文恭近禮也呂氏大臨曰恭則不侮得禮之意近乎禮矣儉則不奪得仁之意近乎仁矣言語必信存心正行近乎情矣三者之行不私於巳又以敬讓行之鄉乎仁矣雖有過差其情則善故不甚矣蓋不侮人則人亦不侮斯過寡矣近乎情則不志於欺斯可信矣不奪人則知足斯易容矣如是而失之者鮮可與進於德矣馬氏睎孟曰恭不侮人者禮也而未盡禮之道故恭近禮儉不奪人者仁也而未盡仁之道故儉近仁信不欺於物者情也而未盡情之道故信近情陸氏佃曰恭不近禮則足儉不近仁則鄙信不近情則偽情可信若柯之盟伐原徙木之信豈可也哉周氏諝曰情實也恭先之儉次之而信終之者恭儉待信而後成也以情間於恭儉者恭儉以信為主案信近情石梁王氏作情近信陳氏澔徐氏師曽皆從之謂情誠實也誠實而不作偽故近信今案信約信也信近情與論語信近於義略同可信即言可復意改讀非也子曰仁之難成久矣唯君子能之是故君子不以其所能者病人不以人之所不能者愧人是故聖人之制行也不制以巳使民有所勸勉愧耻以行其言禮以節之信以結之容貌以文之衣服以移之朋友以極之欲民之有一也小雅曰不愧于人不畏于天制行之行下孟反移舊作昌氏反今如字正義鄭氏康成曰惟君子能之言能成人道者少也病人愧人謂罪咎之以中人為制則賢者勸勉不及者愧恥聖人之言乃行也極致也一謂專心於善不愧于人不畏于天言人有所行當慚怖於天人也孔氏穎達曰君子不以巳之所能使他人必能若他人不能則以為困病不以人力所不能必欲使之能行人不能則以為愧恥故不以人所不能愧恥困苦於人亦仁者之行也是故聖人制法立行不以巳所能但制以中人之行使可得行則民自勸勉愧恥以行聖人之言矣衣服以移之使之尊嚴朋友以極之相勉勵以極致於道自禮以節之以下所以欲民之專心一意於善道也引小雅何人斯乃蘇公刺暴公之詩呂氏大臨曰君子責人以恕而成人有道則仁不難成矣君子之所能衆人必有不能者使衆人效巳之所能則病使衆人自彰其不能則愧矣故聖人制行以立教必與天下共之以天下之所能行者為之法所以為逹道也唯不制乎巳故民知跂乎此而有所勸勉不及乎此而有所愧恥制禮以節其行而使之齊立信以結其志而使之固其容貌必稱其志其衣服必稱其容衣服如是之備其容貌必移而稱其衣容貌如是之文中心必有其實朋友者切磋相成至於極而後巳則一道德以同俗矣蓋修其外則知愧於人修其內則知畏於天故曰不愧於人不畏于天葉氏夢得曰禮以節之信以結之然後人知恥有其德而無其行恥有其辭而無其德容貌以文之衣服以移之而後人恥有其容而無其辭恥有其服而無其容此民所以不二其行而道德所以一也人未有不須友以成故以處其終吳氏澄曰上言愧人我愧之也下言愧恥彼自愧也徐氏師曽曰責之太嚴適以重其畏難之心成之無道無以啓其從入之路此仁之所以難成也君子不以巳之能者病人恐形人之短不以人之不能者愧人恐沮人之進此責人之恕而使無畏難之心也其制行以立教不制以巳之所獨能而必以天下之所共能者為法使賢者勸勉不肖者愧恥必至行顧其言然後止而又制禮以節之無過不及約於仁之中信以結之著誠去偽致其仁之實齊其容貌驗其仁之文正其衣服稱其仁之存廣其朋友求仁之輔欲其表裏專一於仁此成人之周而使知從入之路也聖人之善教如此縱有懈怠而欲為惡者獨不愧於人而畏於天乎故引詩以明之存疑鄭氏康成曰移讀如水泛移之移移猶廣大也陳氏澔曰移讀為稱辨正陸氏佃曰衣服以移之者孔子曰衰麻苴杖者志不存乎樂非耳弗聞服使然也黼黻袞冕者容不褻慢非性矜莊服使然也是之謂移案移孔氏訓使之尊嚴於鄭氏讀侈猶廣大之説善於補救陳讀為稱則不善體吕氏説矣是故君子服其服則文以君子之容有其容則文以君子之辭遂其辭則實以君子之德是故君子恥服其服而無其容恥有其容而無其辭恥有其辭而無其德恥有其德而無其行是故君子衰絰則有哀色端冕則有敬色甲胄則有不可辱之色詩云維鵜在梁不濡其翼彼其之子不稱其服衰七雷反絰田節反鵜徒兮反濡而朱反稱去聲正義鄭氏康成曰遂猶成也無其行謂不行其德衰絰三句言色稱其服也鵜鵜胡汚澤也原注汙澤善居泥水之中在魚梁以不濡汚其翼為才如君子以稱其服為有德案鄭解似非詩意詩謂鵜鳥汚賤在泥澤中宜也在梁則不濡其翼矣侯人何戈與祋宜也今在位而赤芾不稱其服矣孔氏穎達曰實猶充也言君子既成其文辭則當充實之以君子之德也德在於內行接於外內既有德當以德行之於外以接於人民詩曹風候人篇刺曹共公之詩以證君子內外皆須相稱也吕氏大臨曰此皆修其外以移其內率法而強之者也及其成也知畏於天則與中心憯怛者一也方氏慤曰無其容則不足以稱其服無其辭則不足以道其容無其德則不足以副其辭無其行則不足以成其德此四者君子之所恥也案此以上為第三支皆以仁言見安仁甚難自治則由利亦可進於安教人則由強亦可進於利子言之君子之所謂義者貴賤皆有事於天下天子親耕粢盛秬鬯以事上帝故諸侯勤以輔事於天子正義鄭氏康成曰言無事而居位食祿是不義而富且貴孔氏穎達曰自此至便人一節明天子以下各有其事天子事上帝諸侯事天子是貴賤皆有事於天下馬氏睎孟曰在我必先自盡然後可以責人天子親耕粢盛秬鬯以事上帝身致其誠信而示其嚴上之禮故諸侯以輔事天子亦有嚴上之禮也應氏鏞曰義者截然正方而無偏私唯知賤之事貴而不知貴之率賤豈所謂潔矩之道乎故天子竭力致敬以尊乎上帝則諸侯亦服勤以輔事乎天子子曰下之事上也雖有庇民之大德不敢有君民之心仁之厚也是故君子恭儉以求役仁信讓以求役禮不自尚其事不自尊其身儉於位而寡於欲讓於賢卑巳而尊人小心而畏義求以事君得之自是不得自是以聽天命詩云莫莫葛藟施于條枚凱弟君子求福不回其舜禹文王周公之謂與有君民之大德有事君之小心詩云惟此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國庇必利反藟力水反施以豉反凱亦作愷又作豈與音餘正義鄭氏康成曰庇覆也無君民之心是思不出其位役之言為也求以事君者欲成其忠臣之名也自是以聽天命言不易道徼祿利也凱樂也弟易也言樂易之君子其求福修德以俟之不為回邪之行要之如葛藟之延蔓於條枚是其性也孔疏君子求福不為回邪亦是其性有大德有小心言此德當不回也孔疏常能畏懼是不回昭眀也上帝天也聿述懷至也言述行上帝之德以至於多福也方四方也受四方之國謂王天下孔氏穎達曰君子既有庇民之大德不敢有君民之心是其心仁厚故恭敬節儉以求為仁信實退讓以求為禮不問利祿得之與失恆行其是不行其非不茍易其道也詩大雅旱麓美文王之篇舜禹文王周公有君民之大德有事君之小心常能畏懼是不回也又引大雅大明美文王周公之詩證上求福不回馬氏睎孟曰此經言下事上之義雖有庇民之大德以其有君人之道不敢有君民之心以其處事人之任而其理固當如此自非仁厚不足以及此自君子恭儉以求役仁至求以事君此命之在我也命之在我故君子求之至於不獲乎上命之在外者也命之在外故君子聽之而巳得之亦由道不得亦由道故曰以聽天命陳氏祥道曰恭則不侮儉則不奪二者之於仁有其質矣乃可以從事於仁故曰以求役仁信則不疑讓則不爭二者之於禮有其質矣乃可以從事於禮故曰以求役禮方氏慤曰事雖可尚但為人所尚未嘗自尚之也身雖可尊但為人所尊未嘗自尊之也儉於位則非貪夫位也寡於欲則非慕夫祿也讓於賢則非爭其名也卑巳故能尊人小心故能畏義君子之能此者豈他求哉求以事君而巳以是事君而得君者義也以是事君而不得君者則有命存焉古之人有行之者舜禹文王周公而巳朱氏申曰文王事君之小心翼翼然其敬也以此心而明事上帝能懷來乎多福其德無所回邪故能受四方之國也引文王以證數聖人之道無不如此陳氏澔曰莫莫茂密也枝曰條幹曰枚文王求福不回邪有一毫覬幸之心則邪矣案有庇民之大德則可以君民矣而不敢有君民之心以有君在上我則猶是臣也就其愛君之心統言之則曰仁之厚就其愛敬之心分言之則愛曰仁敬曰禮而仁禮之心不可見其為之者則有恭儉焉信讓焉言其恭則不以能濟人而自尚其事不以人歸巳而自尊其身言其儉則不以尊位為貴而寧處卑不以厚祿為欲而寧處寡言其讓則讓於賢寧卑巳而尊人言其信則惟小心而畏義總求以事君而巳如是而得君命也問之心可安也如是而不得君亦命也問之心無愧也以聽天命而巳古帝若舜之協帝禹之德先文之怙冒公之勤施非皆有君民之大德乎舜之讓德禹之祇承文之服事公之孫膚非皆有事君之小心乎夫舜禹得君為最盛周公於成王猶始疑終信惟文王不得於君最處其變故下獨引文王詩結之子曰先王諡以尊名節以一惠恥名之浮於行也是故君子不自大其事不自尚其功以求處情過行弗率以求處厚彰人之善而美人之功以求下賢是故君子雖自卑而民敬尊之行去聲處上聲正義鄭氏康成曰諡者行之迹也名者聲譽也言先王論行以為諡以尊名者使聲譽可得而尊言也孔疏尊敬生前之聲名可傳於後也一讀為一惠猶善也言聲譽雖有衆多者節以其行一大善者為諡耳孔疏善行雖多但取一事以為諡在上曰浮君子勤行成功聲譽踰行是所恥也率循也自卑而民敬尊之言謙者所以成行立德也孔氏穎逹曰此眀君子名實相副卑巳尊人之義恐行不副於名所以減衆善之名但取一事之善為諡既不欲行過於名故不自誇大其所為之事不自加尚其所為之功以求處情實不欲虛為矯飾也吕氏大臨曰文王非無武武王非無文止取其一以為諡惟恐名浮於行方氏慤曰生則有名死則有諡有諡則諱其名矣故曰諡以尊名案此説似勝於以名為聲譽存疑張子曰節以一惠惠字必是古德字鄭氏康成曰行過不復循行猶不二過孔疏即修改以求處仁案過行是過髙之行足以驚世而取名者君子恥名之浮行惟求處篤厚之行而巳如孔子弗為素隱行怪而惟依乎中庸也鄭訓惠為善亦可通子曰后稷天下之為烈也豈一手一足哉唯欲行之浮於名也故自謂便人行去聲正義鄭氏康成曰烈業也言后稷造稼穡天下世以為業豈一手一足喻用之者多無數也自謂便人言其謙也避仁聖之名云吾便習於此事之人耳孔氏穎達曰君子恥名浮於行故此明后稷以證之后稷惟欲實行過於虛名自謂便於稼穡之人不自謂巳之仁聖也案此以上為第四支以下事上明君子之義而義正所以成仁也子言之君子之所謂仁者其難乎詩云凱弟君子民之父母凱以強教之弟以説安之樂而毋荒有禮而親威莊而安孝慈而敬使民有父之尊有母之親如此而后可以為民父母矣非至德其孰能如此乎強其良反説音悅毋荒之毋音無正義鄭氏康成曰有父之尊有母之親謂其尊親巳如父母孔氏穎達曰凱樂也弟易也言君子初以仁政化下使人樂仰自強不息是凱以強教之以遜弟化民民皆説豫而康安是弟以説安之也樂失於荒禮失於疏明君教下為樂而毋荒有禮而相親威嚴矜莊而民安孝順慈愛而民敬故民尊之如父親之如母也吕氏大臨曰詩有凱風司樂王師大獻則令奏凱樂凱風鼓動長養之風凱樂戰勝之樂皆有盛強之意故愷亦可訓強強教之者以道驅之説安之者得其心之謂也樂説安也毋荒則有教矣有禮強教也親則説矣威莊強教也安則説矣孝慈説也敬則有教矣強教則父之尊存焉説安則母之親存焉天下之民莫不尊親此之謂至德可以為民之父母今父之親子也親賢而下無能母之親子也賢則親之無能則憐之母親而不尊父尊而不親水之於民也親而不尊火尊而不親土之於民也親而不尊天尊而不親命之於民也親而不尊鬼尊而不親正義鄭氏康成曰或見尊或見親以其嚴與恩所尚異也命謂四時政令所以教民勤事也鬼謂四時祭祀所以訓民事君也孔氏穎達曰下謂下賤之父立於義故於子分别善惡母主於恩愛而巳吕氏大臨曰尊親之義自父母而推之當其強教也則不純以恩故賢則親之無能則下之當其説安也則有收而無絶故賢則親之無能則憐之此父母尊親之異也水者民狎而玩之火者民望而畏之此水火尊親之異也地載我者也然近人人可得而載天覆我者也然逺人人不可階而升此天地尊親之異也君之命見於事也近人而可行鬼之道存諸理也逺人而不可形此人鬼尊親之異也吳氏澄曰上言至德之君子能兼父母之尊親此則言其各偏於一而不兼有者存疑應氏鏞曰命者造化之所以示人者也顯而易見故人玩之鬼幽而難測故人畏之子曰夏道尊命事鬼敬神而逺之近人而忠焉先祿而後威先賞而後罰親而不尊其民之敝憃而愚喬而野朴而不文殷人尊神率民以事神先鬼而後禮先罰而後賞尊而不親其民之敝蕩而不靜勝而無恥周人尊禮尚施事鬼敬神而逺之近人而忠焉其賞罰用爵列親而不尊其民之敝利而巧文而不慙賊而蔽逺於萬反憃傷容反喬孔讀驕朴普角反正義鄭氏康成曰夏逺鬼神而近人敝謂政教衰失之時以本不困於刑罰少詐諼也殷人先鬼後禮禮者君臣朝會凡以摯交接相施豫也以本􅏸於鬼神虛無之事令其心放蕩無所定孔疏􅏸串也習也鬼神無體故云虛無以為事不在實也困於刑罰茍勝免而無恥也周賞罰用爵列以尊卑為差其民以本數交接以言辭尊卑多獄訟孔氏穎達曰此明夏殷周尊親之事尊命謂尊四時政教之令使人樂事勸功也夏尚仁恩民承寬裕及其衰末猶有先世遺風少有詐偽憃愚謂情不澆詭驕野質朴不競文華如淳朴時也殷代尚虛無故其敝不安靜周人尚禮往來施惠之事以其尚禮本數交接往來故便利機巧多文辭而無慚愧共相賊害而困蔽以其禮失於煩致然也吕氏大臨曰夏尚忠忠者奉上故尊命殷尚質質者不欺故尊神周尚文文者多儀故尊禮賞罰用爵列者如刑不上大夫禮不下庶人賜君子小人不同日命夫命婦不躬坐獄訟之類先王之政茍無道以救之其末也不能無敝忠之政使民近人而巳不求其所不能知勸於為善而巳不責其所不能為及其末也人不知進於學故守其顓蒙不困於刑罰故不為詐諼其民則憃而愚其風則喬而野其事則朴而不文喬髙大也如厥木惟喬之喬妄自髙大而無文乃憃愚之風也忠之敝如此故殷人尊神而救之民知敬於鬼神則莫非誠也誠則質美尊神者使知敬於幽先罰者使知敬於明而巳及其末也求神於虛無不可知之域則茫然不知其所安畏威於無所措手足之地則不知禮義之所貴故其民蕩而不靜其俗勝而無恥質之敝如此故周人尊禮以救之禮人文也人文之著則上下有等親疏有辨及其末也溺於文而不求其實拘於末而不返其本故其事則利而巧近人故茍利尚文故巧其俗則文而不慙文勝質而不知義也其民則賊而蔽不反其本故賊於其末不求其實故蔽於虛文也方氏慤曰近人而忠夏周所同而敝異者夏之近人本乎尊命周之近人本乎尊禮命之所制者簡故近人之敝喬而野禮之所飾者煩故近人之敝文而不慙朱氏申曰夏尚忠忠則不欺於人故尊命殷尚質質則入與物辨故尊神周尚文文則出與物交故尊禮吳氏澄曰憃愚喬皆內之無知野朴不文皆外之無矯飾蕩謂馳心於幽冥不靜謂不敢自安禮有節度儀文外有文飾則與直情徑行者有間矣如哭踊之有節則非如自然之哀也賊而蔽謂雖貨財筋力之不能勝有害於巳亦蔽於虛文而不知反通論孔氏穎達曰先罰後賞案左傳云賞以春夏刑以秋冬又月令春夏行賞秋冬行刑與此違者彼謂王者大體一歲之中法天道生殺故春夏賞秋冬刑此謂賞罰同時所行故夏則先賞後罰殷則先罰後賞也存疑鄭氏康成曰遠鬼神近人謂外宗廟內朝廷呂氏大臨曰修蒸嘗而略盟詛也先鬼後禮謂內宗廟外朝廷也吕氏大臨曰先盟詛而後祭享也案命亦謂天之賦於物者神則其鼓舞變化之妙禮則其等級隆殺之宜尊命但順其民彝物則之自然而無所勉強尊神則用其鼓舞變化之妙尊禮則示以等級隆殺之宜一由命而幽之一由命而顯之三代皆奉天以治而其所以變則又因人情之所趨如寒暑相代然故曰三王之道如循環子曰夏道未瀆辭不求備不大望於民民未厭其親殷人未瀆禮而求備於民周人強民未瀆神而賞爵刑罰窮矣強巨兩反正義鄭氏康成曰未瀆辭者謂時王不尚辭民不褻為也不求備不大望言其政寬貢稅輕也吕氏大臨曰不求備不責人之善故政令簡不大望不竭人之忠故貢賦輕強民言承殷難變之敝也賞爵刑罰窮矣言其繁文備設孔氏頴達曰上眀三代親尊有異此更明三代治民有異之事瀆謂褻瀆辭謂言辭未厭其親言民無困苦未厭其上下相親之心也周言強民以遭紂衰亂風俗頑凶強人以禮義未瀆神謂祭祀有時未褻瀆也夏言未瀆辭則殷瀆辭矣殷言未瀆禮則周瀆禮矣周言未瀆神則周衰之後瀆神矣呂氏大臨曰夏道尚忠忠者以行而不以言故曰未瀆辭忠之俗衰行雖修猶不足以使人信故殷人始瀆辭如盤庚三篇是也然殷人尚質雖辭之瀆而尚未以繁縟之文治之故曰未瀆禮質之俗衰辭雖瀆亦未足以取信於民故周人始瀆於禮矣分致其辨文致其詳欲驅而之善而責人也嚴大要教人以敬而巳故禮先於祭祀然至敬而不祈則未瀆神可知至周之末則信詛盟事祈禱且瀆神矣周人強民驅之於善從之有爵賞不從有刑罰故爵賞刑罰窮矣馬氏睎孟曰周時比有長閭有胥鄉有大夫其政至詳其法至嚴而爵賞刑罰極於此矣方氏慤曰前言殷人尊神矣至此乃言周人未瀆神何也蓋尊與瀆異瀆神者由瀆禮之所致也吳氏澄曰夏先爵賞以勸人之善為急殷先刑罰以懲人之惡為急周雖用夏之爵賞而不足以勸雖用殷之刑罰而不足以懲故曰窮蓋承殷之後時愈難治故也郝氏敬曰夏道尊命天道無言故不煩辭令夏道所以最近古也殷人尊神而禮文未煩然以罰為先則於民求備矣周人以禮強教民於事鬼神之禮未衰其於治人之事賞爵刑罰窮矣二代之治所以不及夏也案未瀆辭躬行率之教令不備也至殷人而教之甚詳幾於瀆辭矣然上之制禮猶未密如上下各以其親無貴賤之異民猶易從不見其強也至周而禮益詳幾於強民矣然亦因人心所自具之理為之初非瀆亂其神也神謂人心之神明然至此而爵賞刑罰之法皆處於無可復加之勢矣聖人於此如有反本復古之思焉至窮字諸家皆作極備解惟吳氏澄解為窮而難治然兩義相因故易曰窮則變變則通子曰虞夏之道寡怨於民殷周之道不勝其敝勝音升今如字正義鄭氏康成曰勝猶任也殷周極文民無恥而巧利後世之政難復也孔氏穎達曰虞夏政寬民怨尚少殷周文煩失在苛碎故其民不堪勝不言無怨而言寡怨者天地之大猶有所憾如冬寒夏雨民猶怨之如聖人之德無善不包人猶怨之是不備也呂氏大臨曰虞夏之道質質者責人也略故寡怨於民殷周之道文文者責人也詳民之不從則窮刑賞以驅之故不勝其敝辨正黃氏乾行曰此上三章疑非孔子之言孔子嘗學夏殷之禮而深惜其無徵極稱周禮之文而屢發從之之志何至數其敝壞至此極乎且以強民與不勝敝歸諸當代亦非聖人為下不倍之義案治必有敝三代之民不能無敝者勢也流極使然非先王過也記曰殷求備於民周人強民則其過在先王矣又曰殷周之道不勝其敝夫子惜宋不足徵而曰吾從周殷周之道固其所誦法服習者此言何為出於夫子之口哉老氏之徒賤文貴質是古非今漢初黃老盛行學者溺於所聞不能決正而託於夫子若此類甚衆即如禮運大同小康亦疑為老氏之徒之言而自有戴記以來未有辨之者黃氏此條辨正自精又案勝當讀如字虞夏不求備不大望故寡怨於民至殷周不得不因民之敝而矯之然未瀆禮未瀆神初非有求勝其敝之心也下章詳言之子曰虞夏之質殷周之文至矣虞夏之文不勝其質殷周之質不勝其文正義鄭氏康成曰言後有王者其作質文不能易之王者相變質文各有所多也孔氏穎達曰虞夏之時雖有其文但文少而質多故文不勝質殷周雖有其質亦質少而文多故質不勝文方氏慤曰至矣者言其文質不可復加也加乎虞夏之質則為上古之洪荒加乎殷周之文則為後世之虛飾此其所以為至與子言之曰後世雖有作者虞帝弗可及也巳矣君天下生無私死不厚其子子民如父母有憯怛之愛有忠利之教親而尊安而敬威而愛富而有禮惠而能散其君子尊仁畏義恥費輕實忠而不犯義而順文而靜寬而有辨甫刑曰德威惟威德明惟明非虞帝其孰能如此乎正義鄭氏康成曰死不厚其子言既不傳位又無以豐饒於諸臣也實謂財貨也辨別也猶寬而栗也德所威則人皆畏之言服罪也德所明則人皆尊寵之言得人也孔氏穎達曰子謂商均也生無私謂序爵必以德子愛於民如父母愛子也愛民之志悽愴憯怛有忠恕利益之教君子謂虞朝之臣君聖臣賢是由舜而得然也所引甫刑今尚書以明堯德記者引以結舜德也吕氏大臨曰三代之道或親而不尊或尊而不親不免流於一偏故其終不能無弊若虞帝則子民如父母有母之親故有憯怛之愛有父之尊故有忠利之教所謂憯怛之愛猶慈母之愛非責報於子也非要譽於他人也發於誠心不知其他而巳所謂忠利之教者如使契為司徒教以人倫如窮而變變而通作為衣裳舟楫臼杵弧矢宫室棺椁書契所以使天下利用而不倦是皆有教民以善之誠無所不利之功者也安而敬威而愛愛則能安教則知敬親則愛尊則威也富而有禮者節於物者也惠而能散者周於物者也節於物義也周於物仁也尊而有教義也親而有愛仁也此君子所以尊仁畏義也所謂君子貴者也賢者也有道之世唯賢者得在髙位所謂小德役大德小賢役大賢故謂之君子也富而有禮故恥費恐用之不以道惠而能散故輕實蓋不必藏於巳也愛之至則必忠忠至於犯則不敬敬之至則有義以一義斷或入於不順則不愛敬主於別别則文文煩則不靜愛主於恩恩則寬寬而踰節則無辨故忠而不犯義而順文而靜寬而有辨皆尊仁畏義親而尊之之道也行此道而天下敬之則德威也行此道而天下愛之則德明也故尊親之道一主於德並行而不廢則天下莫不尊親矣故甫刑曰德威惟畏德明惟明非虞帝之盛德能至此乎通論應氏鏞曰自庇民大德而下言臣道之難於盡仁唯舜禹文王周公可以為仁之厚而后稷庶幾近之自凱弟君子而下言君道之難於盡仁唯舜可為德之至而夏商周皆未免有所偏也存疑鄭氏康成曰恥費不為辭費出空言也孔氏穎達曰富有四海而不驕是有禮也下威訓畏下明訓尊言舜之道德欲威懼於人則在下之民惟畏懼之舜以德眀揚善人唯能得善人天下之人所以尊重之辨正吳氏澄曰恥費不侈用也案此以上為第五支以上治民明君子之仁子言之事君先資其言拜自獻其身以成其信是故君有責於其臣臣有死於其言故其受祿不誣其受罪益寡正義鄭氏康成曰資謀也獻猶進也言臣事君必先謀定其言乃後親進為君言也死於其言竭力於其所言之事死而不負也於事不信曰誣孔氏穎達曰此見君子事君之道須內外相副為謀既定乃拜見自進其身以成其言之信實以其言善乃受祿是受祿不誣也順死其言以竭臣力是受罪益寡也吕氏大臨曰自任以重則受祿不誣有死無二則受罪益寡方氏慤曰先資其言者先以言為之資也獻其身將以行其言也能行其言故足以成其信拜謂受其命獻謂效其能君無為也故有責於臣臣有守也故有死於其言人或以忠獲罪所以不言無罪止言益寡而巳應氏鏞曰資慿藉也古之君子其經世之學皆豫定於胸中至其事君則前定之規模先形於言以為藉手而委身以成其信自獻者非屈身以求售如書之自靖自獻致命而無所愧也通論應氏鏞曰畎畝幡然之數語説命對揚之三篇此伊傅先資之言齊桓問答而為書燕昭命之而有對此管樂先資之言言於先而信於後無一不酬者後世若登壇東向之答草廬三顧之策亦庶幾焉存疑呂氏大臨曰始見必知君之所以見任之意如伊尹事湯知湯以伐夏救民為巳任此先資於湯之言也曰吾豈若使是君為堯舜之君此拜自獻其身於湯之事也傅説事髙宗髙宗命之曰俾率先王迪我髙后以康兆民此先資於髙宗之言也説復於王曰木從繩則正后從諫則聖后克聖臣不命其承敢不祇若王之休命此拜自獻其身於髙宗之事也陳氏祥道曰君先取臣言以為可用然後有臣之之心乃拜而尊之如賢能之書特名籍爾猶且拜之况資其言之善者乎書曰禹拜昌言孟子曰禹聞善言則拜案事君者必先敷納以言其言只是臣之言吕氏謂臣先資君之言拜只是臣拜受君命陳氏謂君拜受臣言似俱拗子曰事君大言入則望大利小言入則望小利故君子不以小言受大祿不以大言受小祿易曰不家食吉正義鄭氏康成曰大言可以立大事也小言可以立小事也入謂君受之利祿賞也入或為人大祿小祿言臣受祿各用其德能也易大畜彖曰不家食吉養賢也賢有大小祿有多少孔氏穎達曰小言受大祿則臣濫大言受小祿則君重財而薄德也引易辭證君有祿而以養賢也張子曰利非歸巳之利大言入則吾道可大行是大利也小言入則可小利馬氏睎孟曰大言入則望其大有利於其國小言入則望其小有利於其國望猶言庶幾也某氏曰君子不以小言受大祿恥其祿浮於言而尸利也不以大言受小祿懼其言浮於祿而屈道也通論陳氏澔曰不家食吉謂大畜之君子才德所蘊者大則當食祿於朝以有為於天下而不食於家則吉此言不以大言受小祿所謂達可行於天下而後行之者也案大畜卦以艮畜乾艮賢乾君賢能以道正君故君尊之在上而養之此賢不食於家也存疑鄭氏康成曰不家食吉言君有大畜積不與家食之而巳必以祿賢者孔疏大畜乾下艮上之卦注云自九三至上九有頤象居外是不家食吉黃氏震曰橫渠病漢儒之説太卑故陳髙誼以張之耳本文所謂大利明指大祿而言未嘗及於行道特以小言不敢望大利為安分義各有在也辨正吕氏大臨曰大言則所言者大小言則所言者小利及天下澤及萬世大利也進一介之善治一官之事小利也諫行言聼利斯從之矣先儒謂利祿賞也如言入而遂望祿賞小人之道豈所以事君乎祿者君之所以報臣非臣之所以望君也受之以義亦稱其大小而巳小言而大祿則報踰其分大言而小祿則君不我知亦不可受也周氏諝曰大利於民則受大祿而不以為有餘小利於民則受小祿而不以為不足子曰事君不下達不尚辭非其人弗自小雅曰靖共爾位正直是與神之聼之式穀以女共音恭女音汝正義鄭氏康成曰不下逹不以私事自通於君也不尚辭不多出浮華之言也弗自不身與相親也靖治也爾女也式用也穀祿也言敬治女位之職事正直之人乃與為倫友神聼女之所為用祿與女孔氏頴達曰詩小雅小明之篇吕氏大臨曰以下逹之事事其君則賊其君者也尚辭而實不稱則欺其君者也非其人而自逹之枉巳以事君者也三者皆非所謂靖共正直者也陳氏澔曰自所由以進者也案陳氏澔云自所由以進者也指薦舉者言吕氏謂非其人而自逹之則其人直指所事之君言二説俱可通兼説乃備其人正直之人也子曰事君遠而諫則讇也近而不諌則尸利也讇亦作諂正義孔氏穎達曰逺而諫謂與君疏逺強欲諫爭則是讇佞之人望欲自逹也吕氏大臨曰逺臣既無言責又逺於君非其職而諫之故曰讇近者有言責之臣不諫則曠厥官懷祿固寵主於為利故曰尸利也方氏慤曰逺而諫似忠而非忠祇以為諂爾近而不諫似慎而非慎祇以為利爾通論吕氏大臨曰古者史為書瞽為詩工誦針諫大夫規誨士傳言庶人謗商旅議於市百工獻藝皆若逺而諫者蓋上之人所求於下者如此則下可以共職而有言不可謂之讇矣穎封人之諫鄭莊公杜蕢之諫晉平公亦逺而諌者然若二子者君子與之蓋有封人杜蕢之心雖諌而可無封人杜蕢之心則讇也存疑鄭氏康成曰尸謂不知人事無辭讓也孔氏穎達曰祭祀之尸無言辭而受享祭近臣不諫如尸之受利也案無辭讓與近而不諫義逺據記尸利義自當以吕説為確鄭孔説似不免於鑿也吕氏大臨曰逺而諫陵節犯分以求自逹故曰讇案或曰讇讕字之訛漢王陽病詆讕谷永傳滿讕誣天謂逺而諌則犯詆君之過此與吕説並得備一義子曰邇臣守和宰正百官大臣慮四方正義鄭氏康成曰邇近也和謂調和君事者也宰冢宰也冢宰主治百官孔氏穎達曰邇臣親近之臣獻可替否輔贊於君守其調和之事冢宰正治百官二伯州牧之等謀慮四方此大臣亦兼冢宰但冢宰居於中故言正百官耳馬氏睎孟曰言邇則對逺言大則對小冢宰可以兼邇臣而邇臣蓋不止於冢宰凡近於君者皆謂之邇臣也言冢宰則可以兼大臣而大臣亦不止於冢宰凡處於百辟之上者皆謂之大臣也存疑應氏鏞曰鹽梅麴糵弼諧於上塤箎金石協恭於下邇臣之和也表端而影正綱正而目舉宰之正也事幾眇綿瞭如在目民瘼幽隱慘如切膚大臣之慮也其序則先君德而後朝廷先朝廷而後天下案守和謂調養君德張子謂臣自平其心葉氏謂與君有可否皆可通子曰事君欲諫不欲陳詩云心乎愛矣瑕不謂矣中心藏之何日忘之正義鄭氏康成曰陳謂言其過於外也瑕之言胡也謂猶告也孔氏穎達曰所引詩小雅隰桑篇刺幽王之詩吕氏大臨曰臣之事君所以告其君則犯而無隱所以告於人則隱惡而揚善姚氏舜牧曰龍逢比干之諫可謂非陳乎然非二臣之心也欲不欲原其心案陳者直指之謂諫術有五直諌為下孔子曰吾其從諷諌巳乎蓋欲諌不欲陳之旨子曰事君難進而易退則位有序易進而難退則亂也故君子三揖而進一辭而退以逺亂也易以豉反逺去聲正義鄭氏康成曰亂謂賢否不別進難者為主人之擇巳也退速者為君子之倦也孔氏穎達曰此明臣事君當使賢與不賢分別之事有序謂賢愚別也亂無別也吕氏大臨曰位有序小德役大德小賢役大賢之謂亂者賢不肖倒置之謂相見之禮主人迎賔三揖至於階三讓其退也一辭而出主人拜送賔去不顧周氏諝曰其進也以禮故難其退也以義故易難進而易退位之所以有序易進而難退則亂而無序矣君子逺其亂於賔主之間况君臣哉進以禮所以慎始退以義所以敬終方氏慤曰進不難則茍合以貪位而位之在吾上者或有所越退不易則患失以固位而位之在吾下者或有所妨若是則位無序矣有序則治無序則亂子曰事君三違而不出竟則利祿也人雖曰不要吾弗信也竟與境通要平聲正義鄭氏康成曰違猶去也利祿言為貪祿留也臣以道去君至於三而不遂去是貪祿必以其強與君要也陳氏澔曰不出境實無去志也謂非要利可乎子曰事君慎始而敬終正義鄭氏康成曰輕交易絶君子所恥案慎始不輕於委贄敬終不怠於宦成子曰事君可貴可賤可富可貧可生可殺而不可使為亂正義鄭氏康成曰亂謂違廢事君之禮吕氏大臨曰臣之事君富貴貧賤生殺唯君所命其不可奪者吾之理義而巳凡違乎理義者皆亂也馬氏睎孟曰在物者有命在巳者有義有命故可貴可賤可富可貧可生可殺有義故不可使為亂徐氏師曾曰君之所加即命之所在故順受而不茍為趨避若非義則雖富貴生全以誘之貧賤殺戮以怵之終不肯從君於昏也子曰事君軍旅不辟難朝廷不辭賤處其位而不履其事則亂也故君使其臣得志則慎慮而從之否則孰慮而從之終事而退臣之厚也易曰不事王侯髙尚其事辟音避難乃旦反朝直遙反處上聲孰與熟通正義鄭氏康成曰履猶行也君使其臣謂使之聘問師役之屬慎慮而從之有此巳志也謹慎思慮從命而行欲其必有成否謂非巳志也雖非已志孰慮而從之又計於已利害也終事而退非巳志者事成則去也不事王侯言臣致仕而去不復事君也孔氏穎達曰此明臣禮君使之在軍旅之中不辟危亡之難在朝廷之中不辭卑賤之所君所使雖當巳才猶宜謹慎思慮從君之命而行之必使成功也君所使雖非巳本才而君命無擇則彌熟思慮而從行之於巳為利當勤力為之即於巳有害亦須為之不得辭也終事事畢也既本非巳才而幸得終竟即辭而退也得志不得志並從而無違是臣行之篤厚也引易蠱卦上九爻辭證終事而退是臣之厚也吕氏大臨曰事君者不仕則巳仕則卑賤有所不辭詩云碩人俁俁公廷萬舞事君者不受命則巳受之則患難有所不辭詩曰靡室靡家玁狁之故處其位而不履其事如弓人恥為弓矢人恥為矢亂於名實者也得志合素志也否者不合其素志也雖有所合不敢以得志而自滿故慎慮而從之有所不合又非所宜辭亦不敢怨於不得志而不事事故孰慮而從之卒事則致為臣而去則所以自免而不纍於上故曰臣之厚也蠱者有事之時自九五而下皆以幹蠱能不能為得失至於上九事之終且無位也故曰不事王侯唯不事王侯乃可以髙尚其事不見役於人若委質而仕反欲髙尚其事而不事事則曠官尸利無所逃罪矣故此章取以為證案此承上章不可使為亂而言食其祿必忠其事不可以臨難而逃居其職必守其官不可以位卑自諉不然或避難或辭賤則處其位而不履其事即亂矣故君於我言聼計從不敢自恃而必慎慮以從即巳有去志而時與事有不可請亦不可悻悻而去必熟慮以從俟其事終乃致仕而去蓋必去者義而不遽去者仁故曰臣之厚也又不得去凡數端一違其願如北山詩人勞於王事而不得養其父母是也一違其才如龎士元非百里才孟公綽不可為滕薛大夫是也一不欺其隱如自靖自獻於先王一自安於命如北門之大夫伐檀之君子也極其變如蘇屬國之奉使顔清臣之陷賊皆所謂終事而退者要同歸於厚而巳子曰唯天子受命于天士受命于君故君命順則臣有順命君命逆則臣有逆命詩曰鵲之薑薑鶉之賁賁人之無良我以為君鶉音蓴賁音奔正義孔氏穎達曰詩鄘風鶉之奔奔刺宣薑之詩吕氏大臨曰天道無私莫非理義君所以代天而治者推天之理義以治斯人而巳故天秩天敘天命天討莫非天也臣之受命於君者合乎禮義為順命不合則為逆彭氏絲曰引詩證君之逆理臣下不茍徇也存疑鄭氏康成曰言皆有所受不敢專也唯當為雖字之誤也臣受順則行順受逆則行逆如其所受於君則為君不易矣案此又承上章熟慮從之而言見熟慮而從必其事猶可委曲將順者也若君有逆命則斷不可從矣蓋君所受命者天臣之受命於君亦天也君命順乎天理則臣順君命若君命逆乎天理則臣必逆君命乃能以君順乎天若伊尹之於大甲其為逆也多矣不如是詎能成大甲之德使永保天命終為商一代之大宗也哉引詩以證君命逆則臣有逆命之意鄭注反責重於君恐非正義又案此以上為第六支以臣事君明君子之義子曰君子不以辭盡人故天下有道則行有枝葉天下無道則辭有枝葉是故君子於有喪者之側不能賻焉則不問其所費於有病者之側不能饋焉則不問其所欲有客不能館則不問其所舍故君子之接如水小人之接如醴君子淡以成小人甘以壞小雅曰盜言孔甘亂是用餤行下孟反費芳貴反淡徒闞反餤音談正義鄭氏康成曰行有枝葉所以益德也言有枝葉是衆虛華也枝葉依幹而生言行亦由禮出不問者皆辟有言而無其實孔疏戒其不得虛言也水相得合而巳酒醴相得則敗淡無酸酢少味也接或為交盜賊也孔甚也餤進也孔氏穎達曰此明君子之行不可虛用其辭言君子與人之交必須驗行不得以其言辭之善則謂行之盡善也有道之世則依禮所行外餘美好如幹之有枝葉也無道之世人皆無禮行不誠實但言辭虛美如幹之有枝葉也小雅巧言篇刺幽王之詩引之證小人甘以壞吕氏大臨曰君子不以辭盡人不敢輕信人也孔子曰聽其言而觀其行不以辭盡人之義也枝葉者幹之文也天下有道則人致文於行天下無道則人致文於辭問所費於喪者而不能賻問所欲於病者而不能饋問所舍於客而不能館則其言也不出於誠心君子恥之故與其不能惠而問之不如不問之愈也君子之接人也以信而不以茍説人故如水淡而可久小人之接人也苟説而不以信如醴之甘而不可久故凡言之甘而不出乎誠心者必將有以盜諸人傳曰幣重而言甘誘我也甘言入則受其盜故曰盜言孔甘亂是用餤存異方氏慤曰天下有道則君子之道發之於行事此行所以有枝葉天下無道則君子之道載之空言此辭所以有枝葉案巧言詩言甚甘而可餤者盜言也君子寧為其淡者爾方説以辭有枝葉為明道之言更屬別義又案皇説發端起皆子言之則此章為一支起處當作子言之或傳寫誤也子曰君子不以口譽人則民作忠故君子問人之寒則衣之問人之飢則食之稱人之善則爵之國風曰心之憂矣於我歸説譽平聲衣去聲食音似説音稅正義鄭氏康成曰譽繩也孔疏繩以量度於物凡口譽於人亦須量之於心故以譽為繩左傳蔡侯繩息媯杜注繩譽也問人之寒以下皆為有言不可以無實孔氏穎達曰詩曹風蜉蝣刺曹君之詩引之證疾虛言之義陳氏澔曰詩人憂昭公之無所依故曰其於我而歸稅乎説讀稅舍息也存疑鄭氏康成曰歸説欲歸其所説忠信之人也案以言與人謂之譽口與之而實不至是不忠也詩言我心憂子之無所歸也其於我歸息乎是出於中心之誠不復以言與人也鄭説詩似拗子曰口惠而實不至怨葘及其身是故君子與其有諾責也寧有已怨國風曰言笑晏晏信誓旦旦不思其反反是不思亦巳焉哉葘讀災晏於諌反巳音以正義鄭氏康成曰善言而無信人所惡也巳謂不許也言諾而不與其怨大於不許也詩言相與為昏禮而不終言始會合言笑和悅要誓甚信今不思其本恩之反覆反覆之不思亦巳焉哉無如此人何怨之深也孔氏穎達曰此明言不實則怨將及身諾謂許人物責謂許之不與而被責也引衛風氓之篇證許而不與被人所怨也呂氏大臨曰人有求而巳之始雖咈人之意而終不害乎信故其怨小諾人而不踐其言雖不咈人意而終害乎信故其責大彭氏絲曰口惠如晉許賂秦列城五既而背之此怨葘所以及也黃氏震曰諾而不豫者虛言絶而不許者直情故寧此勿彼徐氏師曽曰詩言今之反覆乃始者不思之過也喻今之見責於人由始不思而諾之耳案晏晏情之密旦旦許之明其諾如此似乎可信然其心實不思踐此言也踐言之不思而輕為是諾其責宜矣亦巳之而不諾哉引以證寧有已怨之意子曰君子不以色親人情疏而貌親在小人則穿窬之盜也與穿音川窬羊朱反與平聲正義孔氏穎達曰不以色親人謂不以虛偽善色詐親於人也情疏貌親外內乖異心不慤實恆畏於人如細人姦盜也吕氏大臨曰色親人者巧言令色足恭無誠心以將之情疏貌親主於為利亦欺人不見君子恥之故不為也子曰情欲信辭欲巧正義陳氏澔曰情欲信即大學意誠之謂也巧當作考即曲禮則古昔稱先王之謂否則為無稽之言矣存疑鄭氏康成曰巧謂順而説也孔氏穎達曰君子情貌欲得信實言辭欲得和順美巧不違逆於理與巧言令色者異案考古文作丂此字誤耳情見乎外謂相接之藹然可見處考成也謂自驗其實記者以此結上四章蓋情而信則不以色親人辭而考則不以辭盡人不以口譽人必無口惠而實不至者矣又案以上為第七支以交際言言君子言色皆務於實子言之昔三代明王皆事天地之神明無非卜筮之用不敢以其私褻事上帝是故不犯日月不違卜筮卜筮不相襲也正義鄭氏康成曰神明謂羣神也無非卜筮之用言動任卜筮也日月謂冬夏至及四時也孔疏冬至謂祭圜丘夏至謂祭方澤四時謂四時迎氣也襲因也大事則卜小事則筮孔疏大事謂征伐出師及巡守也其實是中事對小事為大耳小事若周禮簭人有九簭筮更筮咸之屬是也所不違者日與牲尸也孔疏左傳禮不卜常祀卜其牲日特牲少牢禮大夫士筮尸則天子諸侯卜尸崔氏靈恩曰凡卜一而吉則不更啓若初不吉則二不至於三大事卜筮兼用故尚書有龜從筮逆龜逆筮從之義皆據一用而言也初吉多則更卜若初凶多則亦卜至三所言三者皆謂三度用之非一度用三王之龜筮也卜筮各用者不得為襲中事兼用則謂之相襲呂氏大臨曰冬至祀天夏至祭地四時迎氣用四立皆素有定日不用卜他祭祀之當卜日者不可犯此素定之日然既卜之吉則不可違故曰不犯日月不違卜筮違之犯之皆不敬也記曰大饗不問卜此謂日月之素定者如冬夏日至之類他則皆卜如啓蟄而郊郊用辛之類故大宰祀五帝帥執事而卜日卜筮不相襲者主祭祀而言大事用卜小事用筮在他事則卜筮兼用之簭人云國之大事先筮而後卜春秋傳僖二十五年晉卜納襄王得黃帝戰於阪泉之兆又筮之得大有之聧哀九年晉卜伐宋亦卜而後筮則兼用亦明矣通論馬氏睎孟曰傳曰聖人不煩卜筮凡事可默決之於心而不煩於卜筮也然則事神明而用卜筮者不敢以私褻事卜筮也祭義曰雖有明知之心必進斷其志焉示不敢專以尊天也與此同義外事陽也剛亦陽也故用剛日內事陰也柔亦隂也故用柔日案大宰祭祀用卜者乃類宜祈報及有事祭告之祀非二至四立也傳所云卜郊則祈穀之郊非二至之郊社也總論孔氏穎達曰此至篇末總明卜筮之事大事有時日小事無時日有筮外事用剛日內事用柔日不違龜筮正義鄭氏康成曰大事有事於大神有常時常日也有事於小神無常時常日臨有事筮之剛日柔日順陰陽也陽為外隂為內方氏慤曰小事臨機而作故無時日曰有筮則無卜可知朱氏申曰外事郊社之祭剛日甲丙之類也內事宗廟之祭柔日乙丁之類存疑鄭氏康成曰事之內外別乎四郊孔疏先師以為祭天而用辛雖外用柔日祭社用甲雖內用剛日今謂事之外內別乎四郊者謂四郊之外為外事若甲午祠兵吉日庚午既差我馬之類是也四郊之內為內事若郊之用卒及宗廟少牢用丁亥之屬是也故言别於四郊以四郊為限辨正吕氏大臨曰鄭以郊外事反用辛故謂郊在四郊之內同內事故用柔日之辛然社乃內事而反用甲説亦未可行蓋所謂內事外事分別剛柔泛言衆事爾如郊用辛社用甲自別有義難以剛柔取類也子曰牲牷禮樂齊盛是以無害乎鬼神無怨乎百姓牷音全齊音粢本亦作齎正義鄭氏康成曰牷猶純也方氏慤曰鬼神有禍福故於鬼神曰害百姓有休戚故於百姓曰怨黃氏震曰牲牷禮樂齊盛有常故幽則無害乎鬼神言不廢祀也明則無怨乎百姓言皆正供也存疑陳氏澔曰詳文理不違龜筮四字當在牲牷齊盛禮樂之下案此承上不違龜筮言卜日既定而後以牲牷禮樂齊盛奉之則可以無害乎鬼神無怨乎百姓所謂無害無怨總歸重不違龜筮上如陳説則禮樂齊盛豈有卜而用之者子曰后稷之祀易富也其辭恭其欲儉其祿及子孫詩曰后稷兆祀庶無罪悔以迄于今易音異正義鄭氏康成曰富之言備也以傳世之祿共儉者之祭易備也兆四郊之祭處也案此謂后稷時迄至也言祀后稷於郊以配天案此謂成王時庶幾其無罪悔乎福祿傳世乃至於今孔氏穎達曰前言不違卜筮動合神明此言后稷祭祀福流後世以證成其義詩是大雅生民之篇美成王尊祖配天也言今所以尊后稷配天者以后稷生存之時於四郊之兆域祭祀於天事皆合禮庶無罪過悔恨迄至於今文武而王天下曾氏鞏曰自后稷肇祀前後相承兢兢業業惟恐一有罪悔獲戾於天閲數百年而此心不易故曰庶無罪悔以迄于今言周人世世如此也方氏慤曰其辭恭則物雖薄而誠足以饗神其欲儉則物雖少而用足以行禮此祀之所以易富也盛德必百世祀其祿及子孫不亦宜乎徐氏師曾曰有恭敬之祝辭則誠足以饗神無求福之大欲則專乎報本故不美多品而祀易備也由是神格鬼享降之以福由身及其子孫而有國有天下也子曰大人之器威敬天子無筮諸侯有守筮天子道以筮諸侯非其國不以筮卜宅寢室天子不卜處大廟處上聲大音泰正義鄭氏康成曰威敬言其用之尊嚴天子無筮謂征伐出師若巡守天子至尊大事皆用卜也孔疏以前云外事用剛日內事用柔日據在國諸事今此云無筮又云道以筮又云諸侯非其國不以筮皆據將欲出行及在道之事下云道以筮則無筮是未在道故知征伐出師若巡守欲發時也天子大事不徒用筮而巳兼用卜也故簭人云國之大事先簭而後卜此云無筮無徒筮耳不謂全無筮也春秋傳曰先王卜征五年嵗襲其祥孔疏左傳襄公十一年言先王將巡守先五年每嵗卜之歲嵗恆吉而後始行乃案古者五年一巡守是嵗將出乃卜三龜一襲吉出未必五年五卜皆吉乃出之謂守筮守國之筮國有事則用之道以筮者始將出卜之道有小事則用筮諸侯入他國則不筮不敢問吉凶於人之國也諸侯受封乎天子因國而國唯宫室欲改易者得卜之耳孔疏諸侯初受封時因先王舊國則不卜若初建國不因舊則必卜可建國之處也天子不卜處大廟言卜可建國之處吉則宫廟吉可知孔氏穎達曰所主之器當威嚴敬重不可私褻於小事雜用饗時則用燕則不用也道謂出行於道路之上臨時有小事唯用筮也卜宅寢室諸侯受封不卜建國之吉否但建國巳後宅及寢室則卜之吕氏大臨曰天子無筮者天子體尊在國中有事皆卜而不以筮至於巡守征伐在道則以筮蓋以龜當敬而不可褻也諸侯卑於天子在國中居守有事則筮降於天子之用龜也至於出竟則不筮蓋不敢問吉凶於人之國且辟天子也小宗伯云凡建國左宗廟右社稷則宗廟有定位雖天子不卜唯宅寢室則卜之蓋寢室為人君之居不可不敬以求祜於天故必卜項氏安世曰凡為宫室者寢室宅其中宗廟處左中定則左右可知故但卜寢室之所宅不卜宗廟之所處雖天子之廟無卜也諸侯以下可知方氏慤曰觀天子道以筮則天子非無筮也所守者龜耳諸侯卜宅寢室則諸侯非無卜也所守者筮耳徐氏師曾曰龜筮者聖人所以寓神道之教者也故其為器可畏敬而不可褻玩焉古者大事卜小事筮唯天子至尊則大小事皆用卜而不用筮諸侯有守國之筮則大小事皆用筮而不用卜然天子亦有用筮時如巡守征伐出而在途有事則筮明殺於在內也諸侯亦有不用筮時蓋守筮用於本國若在他國則不筮不欲人疑其吉凶之問也天子亦有不用卜時蓋其適諸侯則舍其祖廟居有常處不須卜也然此亦大略言之以見大人之器當威敬耳存疑孔氏穎達曰大人謂天子張子曰不卜處大廟舍諸侯祖廟為常故不卜方氏慤曰威敬若見君之几杖則起遭君之乘車則下是也案大人兼天子諸侯孔單指天子未安器即指龜筮方推到几杖乘車則泛又張子謂諸侯適他國惟卜宅寢室而巳夫諸侯在國無守龜豈有適他國不以筮行反以龜行者非其國不筮豈有筮於人國恐人疑之卜於人國人反不疑者且諸侯大夫朝聘於他國其國必致館我卜之不吉將使其國改築乎恐只謂在國之宅寢室可卜適他國則我無可卜雖天子適諸侯亦處其大廟而不必卜耳張子説未確子曰君子敬則用祭器是以不廢日月不違龜筮以敬事其君長是以上不瀆於民下不褻於上正義鄭氏康成曰敬則用祭器謂朝聘待賔客崇敬不敢用燕器也用龜筮問所貢獻也上之於下以直則下應之以正不褻慢也孔氏穎達曰敬事君長謂諸侯朝天子及小國之於大國吕氏大臨曰不廢日月者事其君長各有日月如嵗之有朝覲宗遇一日之有朝夕不敢廢也不違龜筮者欲見其君長及其所貢獻皆卜筮而後進也如此則上之待下下之事上莫非敬也故上不瀆於民下不褻於上方氏慤曰祭器所以事神燕器所以事人以事神之禮事之則敬可知也不廢日月不違龜筮凡以致敬而巳故推此道則臣足以事其君幼足以事其長徐氏師曾曰祭用祭器燕用燕器禮之常也唯主人敬賔則變其常而用祭器以燕之此天子諸侯待來朝之賔也是以諸侯守其常見之期而不敢廢卜其貢獻之禮而不敢違凡以敬事天子及大國而巳是賔主交致其敬也由是敬道行而上不瀆下不褻矣通論孔氏穎達曰鄭注以朝聘用祭器其實冠昏亦不用燕器也故左傳稱魯襄公冠季武子曰君冠必以祼饗之禮行之是用祭器也周氏諝曰冠昏人道之始君子之所致敬故亦用祭器案以上為第八支以卜筮言亦言敬也首支言敬而終復言敬者君子之學一敬而巳能敬則事上治民持身接人所謂為仁為義為實者一以貫之矣欽定禮記義疏卷六十八
