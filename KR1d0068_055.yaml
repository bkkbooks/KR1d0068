body:
  text: 雜記下第二十一之一正義方氏慤曰此篇固以所記不一為雜然有生必有死人道之正也死於外則變矣有樂必有憂人情之常也重有憂則變矣變則不一而雜記謂之雜者又在乎此故上篇諸侯行而死於館為首自未沒父喪而母死分為下篇之首有父之喪如未沒喪而母死其除父之喪也服其除服卒事反喪服正義鄭氏康成曰沒猶竟也除服謂祥祭之服也卒事既祭反喪服服後死者之服孔氏頴逹曰未沒喪者為父喪小祥後大祥前未竟之時又遭母喪母既葬後值父應大祥除服以行祥事故云服其除服卒事謂父祥竟更還服母服也方氏慤曰除服謂祥祭之服服其除服而後反喪服以示於前喪有終也存異孔氏穎達曰若母未葬而值父二祥則不得服其祥服二祥之祭為吉未葬為凶故未忍凶時行吉禮案下當父母之喪則除諸父昆弟之喪如除喪之服則當大喪亦為親者除服也彼文不言葬則葬一耳父尊于母即母未葬亦無不得祥服之理如孔説則父反諸父昆弟之不若矣總論孔氏穎達曰自此至父也明前後兩服之中有變除之節此明先有父喪而後遭母死為父變除之節也雖諸父昆弟之喪如當父母之喪其除諸父昆弟之喪也皆服其除喪之服卒事反喪服正義鄭氏康成曰雖有親之大喪猶為輕服者除骨肉之恩也唯君之喪不除私服孔疏曾子問曰大夫士有私喪可以除之矣而有君服焉其除之也如之何孔子曰有君喪服於身不敢私服又何除焉是有君服不得除己私服其私謂父母已下及諸父昆弟皆不得除也言當者期大功之喪或終始皆在三年之中小功緦麻則不除孔疏服問云緦之麻不變小功之葛小功之麻不變大功之葛據此言之是尋常小功緦麻不得易大功以上之服故知有大功以上之服不得為小功緦麻除服也殤長中乃除孔疏又服問云殤長中變三年之葛既變三年之葛明在大功服中為殤長中著服而又為之除也孔氏穎達曰此明諸父兄弟之喪當父母服內變除之節父母服內其諸親除喪亦為服除服除竟反先服此亦為重喪葬後之時也案惟君喪則父母之喪皆不除不敢私喪也父母喪緦小功不除不以輕喪間重喪也長中殤降而在緦小功者則除之本服重也如三年之喪則既顈其練祥皆行顈口迥反正義鄭氏康成曰言今之喪既服顈乃為前三年者變除而練祥祭也此主謂先有父母之服今又喪長子者孔疏以上皆重喪在前輕喪在後知之其先有長子之服今又喪父母其禮亦然孔疏以經不云長子之喪知互包之然則言未沒喪者已練祥矣孔疏既顈是既虞受服之時未沒喪是既練後將沒時別也顈草名無葛之鄉去麻則用顈庾氏蔚之曰注先有長子之服今又喪父母當云又喪母不得并稱父依禮父在子不為長子三年也後喪既顈前喪練祥皆行若後喪既殯得為前喪虞祔孔疏熊亦云有父字誤庾云得虞祔未知然否孔氏穎達曰此明後喪既受葛之後得為前喪練祥既顈者謂後喪既虞卒哭合變麻為葛也後喪既顈之後其前喪須練祭祥祭皆舉行之案三年之喪統父母及適長子言之既顈謂既虞卒哭男子易腰絰女子易首絰以葛時也此時哀猶重疑練祥吉祭未可行而皆行者均三年喪其輕重等且卒哭後此新喪亦以吉祭易喪祭也若練祥在未葬前則不得舉哀正重也至既顈亦可補行之以重服不可不除也又注先有長子之服今又喪父母孔引庾熊二氏説皆據父在不為長子三年疑父字為誤案先喪長子既期則服已除斯已矣若未期而父又喪則所以為子三年者本以繼禰之故今禰沒而繼禰之宗先沒或以哀禰之故而伸之故并言父也與王父死未練祥而孫又死猶是附於王父也附作祔下並同猶同由正義鄭氏康成曰未練祥嫌未祫祭序於昭穆爾孔疏三年喪畢祫於太祖廟是祥後祫也故注云未練祥嫌未祫祭序於昭穆爾王父既祔則孫可祔焉猶當為由由用也附皆當作祔孔氏穎達曰禮孫死祔祖今此明若祖喪雖未二祥而孫死則孫亦得用是祔禮祔於祖也但祖祔祭之後即得祔新死之孫方氏慤曰王父雖未練祥而孫得祔者以昭穆同故也存疑孔氏穎達曰案文二年榖梁傳云於練焉壞廟是練時遷廟也又曰王父雖祔未練無廟孫得祔於祖其孫就王父所祔祖廟之中而祔祭王父焉案禮三年喪畢然後遷廟時有祫祭榖梁傳大事于大廟是也此練而壞廟不免太遽孔以壞廟即遷廟未允也又祖未入廟似未可祔而孫必祔祖當即於殯宫祔之孔謂就王父所祔祖廟中祔祭王父幾似孫與祖並祔於髙祖與本文祔於王父不合有殯聞外喪哭之他室入奠卒奠出改服即位如始即位之禮正義鄭氏康成曰哭之他室明所哭者異也哭之為位後日之哭朝先入奠於其殯既乃更即位就他室如始哭時孔氏穎達曰有殯謂父母喪未葬柩在殯宫者也外喪謂兄弟喪在逺者也他室别室也若聞外喪哭於殯宫則嫌是哭殯於別室明所哭者為新喪也明日之朝著已重喪之服入奠殯宫及下室卒奠而出改重喪服著新死未成服之服即他室之位如昨日始聞喪即位時案外喪如母黨妻黨亦哭之别室而孔疏言兄弟喪在逺者以兄弟親必有三日五哭若異姓則小功緦而已一哭可止無明日之哭也大夫士將與祭於公既視濯而父母死則猶是與祭也次於異宫既祭釋服出公門外哭而歸其他如奔喪之禮如未視濯則使人告告者反而后哭如諸父昆弟姑姊妹之喪則既宿則與祭卒事出公門釋服而后歸其他如奔喪之禮如同宫則次于異宫與音預下同正義鄭氏康成曰次于異宫不可以吉與凶同處也使者反而後哭不敢専己於君命也宿則與祭出門乃解祭服皆為差緩也孔氏穎達曰此明大夫士與祭於公而有私喪之禮祭日前既視濯之後而遭父母喪則猶是吉禮而與於祭也其時止次於異宫未視濯前遭父母之喪則使人告君必待告君者反而後哭父母也既宿謂祭前三日將致齊之時既受宿戒雖有期喪則與公家之祭若諸父昆弟姑姊妹等同宫而死則既宿之後出次異宫通論陸氏佃曰禮大夫死雖當祭猶告春秋傳曰大夫國體也古之人重死君命無所不通鄭氏謂宿則與祭出門乃解祭服皆為差緩也然則歸而後哭亦以此黃氏震曰將與祭聞父母喪猶卒祭謂君命嚴而祭事重也然人子之情當何如雖堅忍其痛而不哭果能一其將事之誠否邪案特牲禮視濯在祭前一日大夫士三日而斂明日與祭猶得親斂但父母自疾至死非必一日致齊而心憂父母之疾與祭而心痛父母之死其於祭為不誠而徒使人子病不得致其憂喪不得致其哀何為乎今制得告而不與祭兩得之矣又案禮由命士以上父子異宫豈有大夫之諸父昆弟姑姊妹有同宫而死者此句似可疑存疑鄭氏康成曰猶亦當為由辨正胡氏銓曰猶是言自若也曾子問曰卿大夫將為尸於公受宿矣而有齊衰內喪則如之何孔子曰出舍乎公宫以待事禮也齊音咨衰七回反正義鄭氏康成曰尸重受宿則不得哭內喪同宫也孔氏穎達曰案上文不為尸之時未視濯之前受宿之後父母喪使人告告者反而後哭今此齊衰內喪亦謂諸父昆弟姑姊妹也但尸尊故出舍公之公館以待君之祭事不在己之異宫耳孔子曰尸辨冕而出卿大夫士皆下之尸必式必有前驅正義鄭氏康成曰冕兼言辨者君之尸或服士大夫之服也臣見尸而下車敬也尸式以禮父母之喪將祭而昆弟死既殯而祭如同宫則雖臣妾葬而后祭祭主人之升降散等執事者亦散等雖虞祔亦然正義鄭氏康成曰將祭謂練祥也言若同宫則是昆弟異宫也孔疏若同宫必葬而後祭古者昆弟異居同財有東宫有西宫有南宫有北宫有父母之喪當在殯宫而在異宫者疾病或歸者主人適子散等栗階為新喪略威儀孔氏穎達曰將大小祥祭而有兄弟死則殯後乃祭兄弟輕故殯後便可行吉事此謂異宫者耳若同宫雖臣妾之輕卑死猶待葬後乃行父母祭也喪服傳曰有死於宫中則為之三月不舉祭庾氏云祥祭已涉於吉尸柩至凶故不可以相干虞祔則得為之矣若喪柩即去者則亦祭不待三月也吉祭則涉級聚足喪祭則栗階此二祥祭宜涉級為有兄弟喪少威儀故散等也散栗也等階也助執祭者亦栗階主人至昆弟虞祔而行父母二祥祭執事者亦栗階栗階謂升一等而後升不連步也故燕禮記云栗階不過二等注云其始升猶聚足連步越二等左右足各一發而升堂自諸侯達諸士小祥之祭主人之酢也嚌之衆賓兄弟則皆啐之大祥主人啐之衆賓兄弟皆飲之可也酢音昨嚌才細反啐七內反正義鄭氏康成曰嚌啐皆嘗也嚌至齒啐入口孔氏穎達曰此明喪祭飲酒之儀正祭之後主人獻賓長賓長酢主人主人受賓長酢則嚌之衆賓及兄弟祭末受獻之時啐之衆賓兄弟皆飲之必知此主人之酢非受尸酢者以士虞禮主人主婦獻尸受酢之時皆卒爵虞比小祥為重尚卒爵今惟嚌之故知受賓酢也神惠為重故在喪受尸酢亦卒爵賓禮為輕故賓酢但嚌之知喪祭有受賓酢者鄭注曾子問云虞不致爵小祥不旅酬大祥無無算爵故知小祥之祭旅酬之前皆為之也陸氏佃曰自諸侯達諸士蓋蒙上言練祥虞祔之祭升降皆散等升降如此則小祥之酢嚌之啐之大祥啐之飲之皆逹亦可知通論黃氏乾行曰古者喪禮禫而始飲醴酒今曰小祥之祭主人受賓長之酢則嚌之大祥受酢則啐之何也曰今人奠祭自始死便有獻爵古人皆無之自虞以前未葬也其禮為奠只奠置所薦之物而已無獻酬飲酢等禮以始死哀至其禮質也及虞則謂之祭所以安神則有尸有獻酬酳酢等禮稍與吉祭相似所謂以虞易奠蓋殺哀變吉之漸禮遂稍文矣故虞祭之日尸酢主人主人飲卒爵則小祥大祥其受賓長之酢或嚌而或啐之蓋信然矣所以然者疏云神惠為重受尸酢雖在喪亦卒爵非以為酒也以尊神也猶之既葬疏食水飲不食菜果祥而食肉禮之正也若既葬而君食之大夫父之友食之則食之雖粱肉不辟也非甘於肉也尊君父之命也故不飲不食之至痛雖三年之經然或飲或食之隨宜亦一事之權並行不悖也凡侍祭喪者告賓祭薦而不食正義鄭氏康成曰薦脯醢也吉祭告賓祭薦賓既祭而食之喪祭賓不食孔氏穎達曰侍謂相於喪祭禮者吉時祭相者告賓祭薦賓祭竟而食之喪禮相者告賓但祭其薦不食之也此謂練祥正祭之後主人獻賓之時賓受獻主人薦脯醢賓祭而不食其虞祔不獻賓也徐氏師曾曰二祭字不同上祭謂二祥之祭下祭謂祭先代始為飲食之人存疑孔氏穎達曰不食者喪禮不主飲食辨正方氏慤曰祭之而不食者哀而不忍故也子貢問喪子曰敬為上哀次之瘠為下顔色稱其情戚容稱其服請問兄弟之喪子曰兄弟之喪則存乎書策矣稱尺證反正義鄭氏康成曰問喪問居父母之喪也喪尚哀言敬為上者疾時尚不能敬也容威儀也孝經曰容止可觀兄弟之喪存乎書策言疏者如禮行之未有加也齊斬之喪哀容之體經不能載矣孔氏穎達曰此明居父母兄弟喪禮父母至親哀容體狀經不能載顔色稱其情當須毁瘠戚容稱其服當須憔悴也張子曰持喪敬則必哀哀則必瘠居喪以敬為上敬則一於禮也方氏慤曰敬足以盡禮故為上哀足以盡情故次之瘠足以盡容故為下顔色在乎面目面目情之所見也故顔色稱其情戚容兼乎四體四體服之所被也故戚容稱其服顔色稱其情以外稱內也戚容稱其服以本稱末也情有悲哀隆殺之别服有齊斬重輕之殊外不稱內之隆殺則為偽矣本不稱末之輕重則為野矣案敬為上即曾子所謂慎終朱子所謂喪盡其禮附於身附於棺必誠必信勿之有悔為最難事也君子不奪人之喪亦不可奪喪也正義鄭氏康成曰不奪人之喪重喪禮也不可奪喪不可以輕之於已也孔氏穎達曰不奪人之喪謂他人居喪任其行禮不可抑奪亦不可奪喪謂已之居喪當須依禮不可自奪使不如法不奪人喪恕也不奪已喪孝也案君子不奪人之喪二語恐當在後三年之喪祥而從政節下孔子曰少連大連善居喪三日不怠三月不解期悲哀三年憂東夷之子也少詩照反解佳買反期音基正義鄭氏康成曰言其生於夷狄而如禮也怠惰也解倦也孔氏穎達曰此明居喪得禮之事三日不怠謂親之初喪三日內水漿不入口之屬三月不解未葬前朝夕奠及哀至則哭之屬期悲哀謂練以來常悲哀朝夕哭之屬三年憂以服未除憔悴憂戚通論馬氏睎孟曰非特美其能行是禮又美其能變是俗也三年之喪言而不語對而不問廬堊室之中不與人坐焉在堊室之中非時見乎母也不入門疏衰皆居堊室不廬廬嚴者也堊烏各反見賢遍反正義鄭氏康成曰言言己事也為人説為語在堊室之中以時事見乎母乃入門則居廬時不入門也廬哀敬之處非有其實則不居孔氏穎達曰大夫士言而後事行故得言己事不得為人語説也對而不問謂有問者得對而不得自問於人此謂與有服之親若與賓客疏逺者言則間傳云斬衰唯而不對齊衰對而不言是也喪大記云練居堊室不與人居居即坐也方氏慤曰言略而語詳對應而問倡言而不語對而不問以居憂有所不暇故也廬堊室之中不與人坐示憂之所獨也在堊室非時見乎母不入門則在廬之中非時亦有所不見矣間傳曰齊衰之喪居堊室齊衰即此所謂疏衰以廬為嚴故父母之喪乃居之所謂嚴者以居喪之重人不可犯也案禮以防德非徒外之文既練居堊室悲憂則既殺矣使以見母而時見其內之人哀敬之心移焉雖強居於外猶之乎作偽於其親也故見其母有時其入也有時其出也有時而母以外不得見所以示人心之危而俾自循省也妻視叔父母姑姊妹視兄弟長中下殤視成人長丁文反正義鄭氏康成曰視猶比也所比者哀容居處也孔氏穎達曰此明服雖有異其哀戚輕重各視所正之親妻居廬而杖抑之視叔父母姑姊妹出適服輕進之視兄弟長中下殤服輕上從本親視其成人也案姑姊妹之服降於昆弟殤服降於成人然服降而情之哀痛不能降也若妻與伯叔母其服制哀情有不同矣而云妻視叔父母以抑其情之私或為厚於妻薄於伯叔者言之也親喪外除兄弟之喪內除正義孔氏穎達曰親喪謂父母之喪兄弟謂期服及小功緦外謂服內謂心也存疑鄭氏康成曰親喪日月已竟而哀未忘兄弟之喪日月未竟而哀已殺辨正黃氏幹曰日月未竟而哀先殺則是不能終其喪也內除外除皆言日月已竟服重者則外雖除而內未除服輕者則不惟外除而內亦除也注説失之視君之母與君之妻比之兄弟發諸顔色者亦不飲食也正義鄭氏康成曰言小君服輕亦內除也發於顔色謂醲美酒食使人醉飽孔氏穎達曰視比也謂比視君之母與君之妻輕重之宜比於己之兄弟若酒食不發見於顔色者則得飲食之方氏慤曰服君之母妻比己之兄弟則服君之服比己之親可知此亦所以明外除內除之異也案孔子曰居君母與妻之喪居處飲食衎爾禮為兄弟期縣子曰期之喪如剡胡可比也儀禮凡小功者謂之兄弟此兄弟或泛辭與不然齊衰之喪疏食水飲不食菜果豈僅發於顔色者不飲食而已邪免喪之外行於道路見似目瞿聞名心瞿弔死而問疾顔色戚容必有以異於人也如此而后可以服三年之喪其餘則直道而行之是也瞿九遇反正義鄭氏康成曰惻隱之心能如是則其餘齊衰以下直道而行盡自得也見似謂容貌似其父母聞名謂名與親同孔氏穎達曰異於人謂殊異於無喪之人餘行皆應如此獨舉弔死問疾者以弔死問疾哀痛之處身又除喪戚容應甚故也其餘謂期親以下父在為母雖期年亦從上三年之內也陳氏澔曰瞿瞿然驚變也案此亦申內除之意免喪則服除矣而餘哀之款曲猶如此是除者外也直道而行謂服除而哀亦除內外正相當也祥主人之除也於夕為期朝服祥因其故服朝直遙反正義鄭氏康成曰為期為祭期也孔疏謂於祥祭前夕預告明日祥祭之期朝服以期孔疏於此為期之時主人著朝服謂緇衣素裳其冠則縞冠也至眀日而祥祭亦朝服孔疏主人因著其前夕故朝服始即吉孔疏往前居喪今將除服正祭服也孔疏諸侯卿大夫朝服而祭少牢禮主人朝服是也前練祭不著祭服至大祥時正著祭服喪服小記曰除成喪者其祭也朝服縞冠是也祭猶縞冠未純吉也孔疏純吉朝服玄冠此猶縞冠既祭乃服大祥素縞麻衣孔疏此間傳文祥祭奪情故朝服縞冠祥祭訖哀情不忘故仍縞冠素紕麻衣釋禫之禮云玄衣黃裳則是禫祭玄冠矣孔疏此變除禮禮云玄衣黃裳既玄衣則禫祭玄冠矣黃裳者未大吉也孔疏玄衣素裳為大吉既祭乃服禫服朝服綅冠孔疏亦變除禮踰月吉祭乃玄冠朝服既祭玄端而居復平常也孔疏天子諸侯各依本官吉祭之服既祭之後同平常無事之時孔氏穎達曰此謂祥祭主人除服之節從祥至吉服有六祥祭朝服縞冠一也祥訖素縞麻衣二也禫祭玄冠黃裳三也禫訖朝服綅冠四也踰月吉祭玄冠朝服五也既祭玄端而居六也存異陸氏佃曰嫌於夕為期嘗朝服矣詰朝不復反喪服故云爾然則祥之日猶服練服及祭易之所謂除成喪者其祭也朝服縞冠是也案鄭氏謂前夕服朝服明日即服朝服以祭陸氏謂明晨猶服練服祭乃易朝服考周之祭逮朝及暗是昧爽即祭矣安有祥日先服練服及祭乃易之時乎陸説未是子遊曰既祥雖不當縞者必縞然後反服正義陸氏佃曰此言親喪雖既祥猶有他喪未除今以祥故縞縞既然後反他喪之服存疑鄭氏康成曰謂有以喪事贈賵來者雖不及時猶變服服祥祭之服以受之重其禮也其於此時始弔者則衛將軍文子之為之是矣反服反素縞麻衣也孔氏穎達曰將祭縞冠朝服既祭縞冠麻衣禫祭玄衣黃裳既祭朝服綅冠踰月吉祭吉冠朝服既祭吉冠而居鄭云素縞麻衣據變除禮也案上經惟言朝服此言既祥則當縞檀弓言祥而縞小記言除喪之祭朝服縞冠間傳言大祥素縞麻衣蓋古朝服皆用麻朝祭衣與裳别燕居衣與裳連緣以采曰深衣緣以布曰麻衣祥祭用朝服燕居用麻衣其冠則縞冠如是終月己耳未必有六變服如疏所云也鄭注將軍文子之喪主人深衣練冠謂從未來弔者此不當縞謂前曾來弔此時以賵贈來案古惟至親而地近則於襲致含於斂致襚於葬賻贈其時異若疏且逺則諸侯使人弔含襚賵贈同日而畢事恐無既嘗來弔而賵贈遲之既祥乃來者不若陸氏他喪有服父母之喪當除必服其除服既除而反他喪之服為明著也當袒大夫至雖當踊絶踊而拜之反改成踊乃襲於士既事成踊襲而后拜之不改成踊袒音但正義鄭氏康成曰尊大夫來至則拜之不待事己也更成踊者新其事也於士士至也事謂大小斂之屬孔氏穎逹曰此明士有喪大夫及士來弔之禮案檀弓云大夫弔當事而至則辭焉謂當大小斂時主人不出故辭大夫也此是斂已竟當其袒踊故絶踊而拜之也反還也改更也拜大夫竟反還先位更為踊而始成踊踊訖乃襲初袒之衣也既猶畢也當主人有大小斂諸事而士來弔則主人畢事竟而成踊不即出拜也士言既事則大夫亦然大夫言絶踊則士固不絶踊也成踊畢而襲襲畢乃拜之不更為成踊存異陸氏佃曰已嘗袒矣大夫至而襲故今改襲而袒於士襲而後拜之故不復改袒然則又成踊何也蓋居喪凡賓客去而歸必踊案本文明言當袒拜大夫成踊乃襲陸反謂改襲而袒何也案士喪禮當斂有大夫至則告卒斂主人奉尸斂於棺踊如𥘉無算乃蓋主人降拜大夫之後至者蓋蓋棺時踊猶不絶以降拜大夫故絶之而拜拜竟復改升堂視肂設熬乃塗踊無算卒塗置銘主人復位踊襲所謂改成踊乃襲也士則於此乃拜之既事者小斂之事至奉尸侇於堂而畢大斂之事至殯塗乃畢也鄭注但言大小斂陸注竟似斂衣食竟即可拜大夫誤矣上大夫之虞也少牢卒哭成事附皆大牢下大夫之虞也犆牲卒哭成事附皆少牢犆音特正義鄭氏康成曰卒哭成事附言皆則卒哭成事附與虞異矣孔疏鄭以士虞禮云三虞卒哭他用剛日先儒以此三虞卒哭同是一事鄭因此經虞與卒哭其牢既别明卒哭與虞不同也下大夫虞以犆牲與士虞禮同與孔氏穎逹曰上大夫平常吉祭用少牢虞依常禮亦少牢卒哭謂之成事成吉事也附附廟也二祭皆大並加一等用大牢下大夫吉祭用少牢虞祭降一等用特牲卒哭附依常吉祭禮不言遣奠加者略可知也方氏慤曰犆即特也與牲特三爼之特同而與郊特牲之特異蓋位有上下故禮有隆殺也陸氏佃曰禮士虞用特豕今下大夫之虞亦云特牲則容父為士子為下大夫其祭如此於上大夫言父為大夫於下大夫言父為士相備也祝稱卜葬虞子孫曰哀夫曰乃兄弟曰某卜葬其兄弟曰伯子某正義鄭氏康成曰祝稱卜葬虞者卜葬卜虞祝稱主人之辭也孫謂為祖後者稱曰哀孫某卜葬其祖某甫夫曰乃某卜葬其妻某氏兄弟相為卜稱名而已孔氏穎達曰虞用葬日故并言葬虞子卜葬父則稱哀子某卜葬其父某甫乃者言之助也妻卑故假助句以明夫之尊也弟為兄則祝辭云某卜葬兄伯子某兄為弟則云某卜葬其弟某兄弟稱名則子孫與夫皆稱名也古者貴賤皆杖叔孫武叔朝見輪人以其杖關轂而輠輪者於是有爵而後杖也轂工木反輠胡罪反又胡瓦反又胡管反正義鄭氏康成曰記庶人失禮所由始也叔孫武叔魯大夫叔孫州仇也輪人作車輪之官孔氏穎逹曰關穿也輠回也作輪之人以扶病之杖關穿車轂中而回轉其輪於是有爵而後杖以其爵位既尊其杖不鄙褻而許用也陳氏澔曰以杖穿轂轉輪鄙褻甚矣自後無爵者不杖此記庶人廢禮之由也案喪服傳云杖者何爵也無爵而杖擔主也非主而杖輔病也然則制禮之初賤者不杖矣此記以為始於武叔未考耳鑿巾以飯公羊賈為之也飯扶晚反正義鄭氏康成曰記士失禮所由始也士親飯必發其巾大夫以上賓為飯焉則有鑿巾孔氏穎達曰飯含也大夫以上貴故使賓為其親含恐尸為賓所憎穢故設巾覆尸面而當口鑿穿之令含得入口也士賤不得使賓子自含其親但露面而含耳鑿巾則是自憎穢其親故為失禮也冒者何也所以掩形也自襲以至小斂不設冒則形是以襲而后設冒也正義鄭氏康成曰言設冒者為其形人將惡之也襲而設冒言后衍字耳明無二時孔氏穎達曰此記者自問答設冒之事未襲之前始死事須沐浴自既襲以後以至小斂之前雖已著衣若不設冒則尸象形見為人所惡也襲則設冒至小斂之前則以衣覆於冒上存異陸氏佃曰后非衍字言孝子如此設冒不得已也或問於曾子曰夫既遣而包其餘猶既食而裹其餘與君子既食則裹其餘乎曾子曰吾子不見大饗乎夫大饗既饗卷三牲之俎歸于賓館父母而賓客之所以為哀也子不見大饗乎夫音扶遣棄戰反與音餘卷紀轉反又厥挽反正義鄭氏康成曰言遣既奠而又包之是與食於人已而裹其餘將去何異與君子寧為是乎言傷廉也既饗歸賓俎所以厚之言父母家之王今賓客之是孝子哀親之去也孔氏穎達曰此明或人問曾子遣奠之事大饗賓客既畢主人斂三牲俎上之肉歸於賓館己家父母今日既去遂同賓客之疏是孝子所以哀悲也重結前文以語或人非為人喪問與賜與三年之喪以其喪拜非三年之喪以吉拜為于偽反與並音餘正義鄭氏康成曰此上滅脫未聞其首云何是言非為人喪而問之與人喪而賜之與問遺也久無事曰問謂受問受賜者也稽顙而後拜曰喪拜拜而後稽顙曰吉拜孔氏穎達曰平敵則問卑下則賜三年之喪謂父母長子其實杖期以上皆為喪拜不杖期以下以吉拜義備檀弓疏案問即如何不淑之弔辭賜即賵賻贈諸禮言此來問來賜者非為人喪而問之賜之與則其惠不專於己而施及先人故必拜之與遺之酒肉僅為恤其身之病瘠異也蓋酒肉之賜唯君命拜朋友不拜矣總論孔氏穎達曰從上問與賜與以下至遺人可也皆明在喪受問遺之事此論身有喪拜謝之禮三年之喪如或遺之酒肉則受之必三辭主人衰絰而受之如君命則不敢辭受而薦之喪者不遺人人遺之雖酒肉受也從父昆弟以下既卒哭遺人可也必三如字又息暫反正義鄭氏康成曰受酒肉必衰絰正服明不茍於滋味也受而薦之於廟貴君之禮喪者不遺人言齊斬之喪重志不在施惠於人孔氏穎逹曰三年之喪受酒肉雖受之猶不得食也尊者食之乃得食肉猶不得飲酒故喪大記云既葬若君食之則食之大夫父之友食之則食之矣不辟粱肉若有酒醴則辭是也方氏慤曰心有所樂然後以物遺人喪以哀為主故不遺人人遺之雖酒肉受之者郤之為不恭故也縣子曰三年之喪如斬期之喪如剡縣音玄期音基剡以漸反正義鄭氏康成曰如斬如剡言痛之惻怛有淺深也期之喪十一月而練十三月而祥十五月而禫三年之喪雖功衰不弔自諸侯逹諸士如有服而將往哭之則服其服而往練則弔禫大感反正義鄭氏康成曰期之喪至而禫當在練則弔上功衰既練之服也諸侯服新死者之服而往哭謂所不臣也孔疏諸侯絶期不應有始死者之服今服而往當是敵禮若始封君不臣諸父昆弟練則弔謂父在為母功衰可以弔人者以父在故輕於出也然則凡齊衰十一月皆可以出矣孔疏其餘喪雖無父得出母既可出諸父灼然孔氏穎逹曰三年之喪小祥後衰與大功同故曰功衰衰雖外輕而痛猶內重故不得弔人也自諸侯逹諸士謂貴賤同也功衰雖不弔人若有五服之親喪則往哭之將往哭不著已功衰而依彼親之節以服之申於骨肉之親故也期之喪十一月而練十三月而祥見父在為母亦備二祥節也案父母妻長子皆三年者也故皆有禫但父與長子皆三年則情已申故禫即在祥月中所謂三年之喪二十五月而畢也母為父厭而期其情未申故禫在練後四五月以微申之也若餘期則無所謂練無所謂祥亦無所謂禫矣故鄭於此惟以父在為母言之長子不為後則降期與庶子同無禫矣妻有母在不禫厭於母也宗子母在為妻禫以代母主祭收族尊之故申之也然妻之三年惟見於叔向之語而喪服傳齊衰三年條無文齊衰杖期父在為母條父必三年然後娶達子之志也語則所謂三年者必以三年後娶耳非實有三年之服而降之也十一月練十三月祥十五月禫非所施於妻故鄭惟以父在為母言之而孔疏亦曰父在為母其禫也父主之則所謂為妻禫者亦子之為母禫而夫特主其祭耳總論孔氏穎達曰自此至盈坎明弔喪之節既葬大功弔哭而退不聼事焉期之喪未葬弔於鄉人哭而退不聼事焉功衰弔待事不執事小功緦執事不與於禮與音預又據疏既葬字當在大功下又十二字俱當在小功緦上正義鄭氏康成曰聼猶待也事謂襲斂執綍之屬期之喪謂為姑姊妹無主殯不在己族者孔疏經直云期喪而知為姑姊妹無主者以大功既葬始得弔人此未葬已得弔人明此期服輕故知之也知殯不在己族者女未廟見反葬女氏之黨此姑姊妹已成婦久但夫早死故無主而殯在夫族禮謂饋奠也孔氏穎達曰身有大功之喪既葬往弔他喪弔哭既畢則退不待主人襲斂之事姑姊妹無主為之服期未至於葬往弔鄉人之喪亦哭畢則退不待襲斂也此姑姊妹期喪既葬受以大功衰謂之功衰此後若弔於鄉人其情稍輕於未葬得待襲斂但不親自執事執事擯相也緦小功服輕故未葬便可弔人亦為彼擯相但不得助彼饋奠耳曾子問云説衰與奠非禮也以擯相可也是擯相輕而饋奠重也陳氏澔曰儀禮喪服傳姑姊妹適人無主者姪與兄弟為之齊衰不杖期此言期之喪正謂此也存異吕氏大臨曰功衰弔下脫一不字此謂卒哭之受服案疏以此功衰為姑姊妹無主既葬後之受服吕謂此為卒哭之受服則三年喪小祥既受服矣而又以為卒哭之受服何邪且既不往弔矣又何從在彼聼事乎則脫不字之説亦非是相趨也出宫而退相揖也哀次而退相問也既封而退相見也反哭而退朋友虞附而退封彼驗反正義鄭氏康成曰此弔者恩之薄厚去留遲速之節也相趨謂相聞姓名來會喪事也相揖嘗會於他處也相問嘗相餉遺也相見嘗執摯相見也附皆當為祔孔氏穎達曰相趨本不相識情既輕故柩出廟之宫門而退相揖恩微深故待柩出至大門外哀次而退相問恩轉深故窆竟而退相見恩轉厚故葬竟孝子反哭至家而退朋友疇昔情重故至主人虞祔乃退然與死者相識亦當有弔禮知生者弔知死者傷今注云弔則知是弔生人也郝氏敬曰此與下節論送葬之事弔非從主人也四十者執綍鄉人五十者從反哭四十者待盈坎坎口敢反正義鄭氏康成曰言弔者必助主人之事從猶隨也執綍者成人二十以上至四十丁壯時非鄉人則長少皆反優逺也坎或為壙孔氏穎逹曰此論助葬及執事反哭之節弔喪者本是來助事非為空隨從主人而已既助主人故使年二十以上至四十強壯者皆執紼鄉人同鄉之人也五十始衰故待主人窆竟反哭從孝子反也四十強壯不得即反故待土滿坎而反若非鄉人則無問長少皆從主人歸優饒逺者黃氏乾行曰四十者待盈坎非徒執綍以待而已蓋為之執綍以下棺及實土也故既夕禮實土三主人拜鄉人注云謝其勤勞是也喪食雖惡必充飢飢而廢事非禮也飽而忘哀亦非禮也視不明聽不聰行不正不知哀君子病之故有疾飲酒食肉五十不致毁六十不毁七十飲酒食肉皆為疑死為于偽反正義鄭氏康成曰君子病之病憂也疑死疑猶恐也方氏慤曰禮所以制中飢而廢事飽而忘哀皆非中道故皆以為非禮然送死所以當大事則飢而廢事尤為非禮矣君子病之以其不足以當大事也有服人召之食不往大功已下既葬適人人食之其黨也食之非其黨弗食也人食之食音嗣正義鄭氏康成曰往而見食則可食也為食而往則不可黨猶親也非親而食則是食於人無數也方氏慤曰其黨則食之非其黨則弗食所以為之節功衰食菜果飲水漿無鹽酪不能食食鹽酪可也酪音洛食食下音嗣正義鄭氏康成曰功衰齊斬之末也酪酢酨方氏慤曰食菜果飲水漿皆聖人之中制故天下無難能之病焉存異吕氏大臨曰疏食水飲其飲不加鹽故曰飲水漿無鹽酪也不能食食鹽酪可也者喪大記不能食粥羮之以菜可也蓋人有所不能亦不可勉也陸氏佃曰鄭氏謂功衰齊斬之末末者齊衰既葬斬衰既練之後孔子曰身有瘍則浴首有創則沐病則飲酒食肉毁瘠為病君子弗為也毁而死君子謂之無子瘍音羊創𥘉良反正義鄭氏康成曰毁而死是不重親也非從柩與反哭無免於堩免音問堩古鄧反正義鄭氏康成曰言喪服出入非此二事皆冠也免所以代冠人於道路不可以無飾堩道路孔氏穎逹曰從柩謂孝子送葬從柩去時反哭謂孝子葬竟還時道路不可無飾得免而行非此二條不得免於道路也若葬逺反哭在路則著冠至郊反著免故小記云逺葬者比反哭皆冠及郊而后免是也凡喪小功以上非虞附練祥無沐浴正義鄭氏康成曰言不有飾事則不沐浴孔氏穎逹曰自小功以上恩重哀深自冝去飾沐浴是自飾非此數條祭事則不自飾也言小功以上則至斬同練祥不主大功小功也若三年之喪則士虞禮云沐浴不櫛鄭注云期以下櫛可也又士虞禮云明日以其班附沐浴櫛注云彌自飾大夫以上亦然方氏慤曰有祭則不可以不齋戒齊戒則不可以不沐浴疏衰之喪既葬人請見之則見不請見人小功請見人可也大功不以執摯唯父母之喪不辟涕泣而見人辟音避正義鄭氏康成曰言重喪不行求見人耳人來求見己亦可以見之矣不辟涕泣言至哀無飾也孔氏穎達曰此明在喪與人相見之義小功輕可請見於人大功不可也文承疏衰既葬之下則小功亦謂既葬也凡言見人謂與人尋常相見不論執摯之事故曰父母之喪不辟涕泣而見人方氏慤曰人請見在彼請見人在此亦與對而不問同義執摯則請見人之禮也案士相見必執摯執摰則備賓主之禮言大功既葬人請見則見之而以禮來者尚辭之不見若曰他日某將走見也三年之喪祥而從政期之喪卒哭而從政九月之喪既葬而從政小功緦之喪既殯而從政期音基存疑鄭氏康成曰以王制言之此謂庶人也從政從為政者教令謂給繇役孔氏穎達曰王制云父母之喪三年不從政齊衰大功三月不從政與此不同者此庶人依士禮卒哭與既葬同三月故王制省文總云三月也若大夫士三年之喪期不從政是正禮也卒哭金革之事無辟是權禮也案本文無庶人字且從政謂為大夫朱子有明訓矣公羊傳言已練可以辨冕服金革閔子騫腰絰而服事既而曰若此乎古之道不即人心退而致仕孔子善之是三年不從政古之正禮而練而從政者大率起於周之世官也王制之言正矣曽申問於曾子曰哭父母有常聲乎曰中路嬰兒失其母焉何常聲之有正義鄭氏康成曰嬰猶鷖彌也言其若小兒亡母啼號安得常聲乎所謂哭不偯案偯於豈反鄭間傳注云哭餘聲也通論胡氏銓曰孔子不取辨人孺子泣而此取嬰兒哭者此泛問哭時故舉重始死時也彼在襲斂當哭踊有節故異欽定禮記義疏卷五十五
