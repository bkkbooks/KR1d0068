body:
  text: 内則第十二之二凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人脩而兼用之凡五十養於卿六十養於國七十養於學達於諸侯八十拜君命一坐再至瞽亦如之九十者使人受五十異粻六十宿肉七十貳膳八十常珍九十飲食不違寢膳飲從於遊可也六十嵗制七十時制八十月制九十日脩唯絞紟衾冒死而後制五十始衰六十非肉不飽七十非帛不煖八十非人不煖九十雖得人不煖矣五十杖於家六十杖於鄉七十杖於國八十杖於朝九十者天子欲有問焉則就其室以珍從七十不俟朝八十月告存九十日有秩五十不從力政六十不與服戎七十不與賔客之事八十齊衰之事弗及也五十而爵六十不親學七十致政凡自七十以上唯衰麻為喪凡三王養老皆引年八十者一子不從政九十者其家不從政瞽亦如之凡父母在子雖老不坐有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊有虞氏皇而祭深衣而養老夏后氏收而祭燕衣而養老殷人冔而祭縞衣而養老周人冕而祭𤣥衣而養老粻知良反絞古交反紟其䲴反本又作衿冒亡報反煖乃管反朝直遥反下同珍從之從才用反又如字與音預下同齊側皆反衰七回反冔況甫反縞古老反正義鄭氏康成曰記王制有此孔氏穎達曰記者重録之後人因而不去慎疑不敢刪易也通論陸氏佃曰王制主國故先言養國老於上庠後言凡三王養老皆引年八十者一子不從政内則主家故先言三王養老皆引年八十者一子不從政後言養國老於上庠主家以言故無所謂少而無父者謂之孤一節主國以言故無所謂曽子曰孝子之養老也一節主家也故言不從政狹主國也故言不從政廣所謂家事有以異於國乎無也故内則終之以凡養老五帝憲三王有乞言一節所謂國事者有以異於家乎無也故王制終之以父之齒隨行兄之齒鴈行一節朱氏申曰瞽亦如之以廢疾者亦非人不養也案朱子謂此篇古經而王制漢作是王制采此篇入之也注巳前見故此不具曽子曰孝子之養老也樂其心不違其志樂其耳目安其寢處以其飲食忠養之孝子之身終終身也者非終父母之身終其身也是故父母之所愛亦愛之父母之所敬亦敬之至於犬馬盡然而况於人乎樂音洛下同養羊亮反正義鄭氏康成曰犬馬盡然賤喻貴也孔氏穎達曰此因上陳養老之事遂陳孝子事親之禮飲食忠養是孝子事親之身終也恐人謂孝子事親至親身終故解言父母雖没終竟孝子之身而行孝道與親在無異至於父母所愛敬犬馬之屬盡須愛敬況於父母所愛敬之人乎方氏慤曰忠不欺其親也養之以忠則足以養其志矣陳氏澔曰忠養以上是終父母之身愛所愛敬所敬則終孝子之身也凡養老五帝憲三王有乞言五帝憲養氣體而不乞言有善則記之為惇史三王亦憲既養老而后乞言亦微其禮皆有惇史有音又惇音敦正義鄭氏康成曰憲法也養之為法其徳行有讀為又又從之求善言以施行也㣲其禮者依違言之求而不切也孔氏穎逹曰此論五帝三王養老之禮五帝養老法其徳行三王非但法其徳行又從求乞善言養氣體而不乞言者覆說上五帝憲之法老人有善徳行則記録之使衆人法則為惇厚之史三王既法徳行又乞善言徳行善言皆記之為惇史皆者皆三代也吕氏祖謙曰年之貴乎天下久矣五帝三王皆尊徳尚齒然五帝時風氣未開人情惇厚朝夕與老者親炙其仁義之容道徳之光自得於觀感不言之際三王不及五帝所以有乞言之禮氣味稍薄矣張氏怡曰有善則記之所重在惇厚之徳也故曰惇史三王乞言亦不專恃言微具此禮耳所重亦在惇厚之徳故亦有惇史案五帝雖不乞言而老者有善言則記之故史為惇史所重在憲徳也三王則有乞言矣然其乞也重煩老人酬答不懇其必言故史亦為惇史所重原不在言也或曰古人求言必拜此殺其拜跪之禮使老人安逸亦通淳熬煎醢加於陸稻上沃之以膏曰淳熬淳之純反熬五羔反下同正義鄭氏康成曰淳沃也熬亦煎也沃煎成之以為名孔氏穎達曰自此至為酏論養老須飲食如養親之事明八珍之饌幷眀羞豆糝􅊡之等淳熬八珍内一珍之名陸稻陸地之稻以陸稻孰之為飯煎醢使熬加於飯上恐其味薄更沃之以膏使味相湛漬曰淳熬淳母煎醢加於黍食上沃之以膏曰淳母母依注音模食音嗣正義鄭氏康成曰母讀曰模孔疏母是禁止之辭非膳羞之體故讀模模象也作此象淳熬孔氏穎達曰淳母法象淳熬而為之食飯也謂以黍米為飯黍皆在陸無在水之嫌故不言陸炮取豚若將刲之刳之實棗於其腹中編萑以苴之塗之以謹塗炮之塗皆乾擘之濯手以摩之去其皽為稻粉糔溲之以為酏以付豚煎諸膏膏必滅之鉅鑊湯以小鼎薌脯於其中使其湯毋滅鼎三日三夜毋絶火而后調之以醯醢炮歩交反將讀牂子郎反刲苦圭反刳音枯編必縣反又歩典反萑音丸苴子餘反擘必麥反去起吕反皽章善反糔息酒反又相流反溲所九反鑊户郭反正義鄭氏康成曰炮者以塗燒之為名也將當為牂牂牡羊也孔疏以經云取豚若將則將是豚類故知將當為牂聲相近又字體相似刲刳博異語也孔疏案易云士刲羊又云刳木為舟意同而語異謹當為墐聲之誤也孔疏謹非泥塗之物聲相近故為墐也墐塗塗有穰草也孔疏用之炮豚須相黏著故知塗有穰草皽謂皮肉之上魄莫也糔溲亦博異語也糔讀與滫瀡之滫同薌脯謂煮豚若羊於小鼎中使之香羙也謂之脯者既去皽則解析其肉使薄如為脯然唯豚全耳孔疏案周禮封人有毛炮之豚豚形小故知全體周禮鄭注云毛炮豚者爓去其毛而炮之豚既毛炮則此牂或亦毛炮案疏豚全有証牂解究無証葢炮之時豚全牂亦全及為脯則牂解豚亦解也豚羊入鼎三日乃内醯醢可食也孔氏穎逹曰萑亂草也苴裹也編連亂草以裹匝豚牂裹之既畢塗之擘謂擘去乾塗也手既擘泥不淨其肉又熱故濯手摩之去其皽膜滅沒也小鼎盛膏煎熬豚牂膏必没此豚牂也大鑊盛湯以小鼎之香脯入於大鑊湯中鑊中之湯無得没此小鼎若湯没鼎恐湯入鼎中令食壊也毋絶火者欲令用火微熱勢不絶也存異陸氏佃曰將讀如字若將刲之猶如麛執之先儒謂獻麛有成禮如之也為稻粉以下一節釋為稻粉之法案下言付豚不言付牂似將字不必讀牂但若將二字究無著不如依注讀牂也為稻粉皆縁豚牂而設故經云以付豚陸謂另作一節非矣蓋經下言豚不言牂者省文也擣珍取牛羊麋鹿麕之肉必脄每物與牛若一捶反側之去其餌孰出之去其皽柔其肉脄音毎徐亡代反餌音二本或作皽下句皽作餌正義鄭氏康成曰脄脊側肉也孔疏脊側肉美今擣以為珍宜取羙處捶擣之也餌筋腱也孔疏皽為皮膜則餌為筋腱腱即筋之類柔之為汁和也汁和亦醯醢與孔疏上炮豚炮牂調以醯醢下漬亦食之以醯若醢故知擣珍和亦醯醢陳氏澔曰與牛若一謂與牛肉之多寡均也反捶之又側捶之去其筋餌既孰乃去其皽膜而柔之以醯醢陸氏佃曰異言牛大牲也案羊麋鹿麕小牛大不能相稱言或以羊與牛或以鹿與牛二物相稱合擣之必用牛者牛土畜補益最多故也存異陸氏佃曰此言擣珍則上所謂淳熬等物非珍也周官珍用八物即此牛羊麋鹿麕豕狗狼是與餌讀如合以為餌煎之之餌言去其餌則當以物為餌孰之可知案周禮膳夫珍用八物不詳其名鄭注以此淳熬淳母炮豚炮牂擣珍漬熬肝膋實之吕原明謂炮不宜分益之以糝固本經所有陸氏所云八物亦非本經所無與注疏並存可也但以經言擣珍而謂上淳熬等物非珍後又謂淳亦珍則自相矛盾須知牛羊麋鹿等八者其物也其所以為珍則在乎淳熬淳母炮擣八者之精耳至於餌字援下合以為餌則去字如何解漬取牛肉必新殺者薄切之必絶其理湛諸羙酒期朝而食之以醢若醯醷湛子潛反直䕃反又將鴆反期音朞正義鄭氏康成曰湛亦漬也陸氏佃曰期朝謂周一朝陳氏澔曰絶其理横斷其文理也為熬捶之去其皽編萑布牛肉焉屑桂與薑以灑諸上而鹽之乾而食之施羊亦如之施麋施鹿施麕皆如牛羊欲濡肉則釋而煎之以醢欲乾肉則捶而食之灑所買反鹽音艶又如字乾而食一本無而食之三字濡音儒下同正義鄭氏康成曰熬於火上為之也今之火脯似矣欲濡欲乾人自由也醢或為醯孔氏穎達曰作熬之法於牛如上所陳若施設於羊亦如牛也食熬之時唯人所欲若欲得濡肉則以水潤澤而煎之以醢也通論方氏慤曰曲禮言濡肉齒決葢由制造之異故食之不得不異也總論鄭氏康成曰此七者周禮八珍其一肝膋是也糝取牛羊豕之肉三如一小切之與稻米稻米二肉一合以為餌煎之正義鄭氏康成曰此周禮糝食也孔疏周禮醢人羞豆之食酏食糝食故云然孔氏穎達曰三如一謂取牛羊豕之肉等分如一稻米二肉一者謂二分稻米一分肉也通論陸氏佃曰三如一不異言牛同是三牲之一施之也肝膋取狗肝一幪之以其膋濡炙之舉燋其膋不蓼懞音蒙燋又作焦子消反正義鄭氏康成曰膋腸閒脂舉或為巨孔氏穎達曰舉皆也謂炙膋皆燋也陸氏佃曰上言養老繼之以此文王世子所謂養老之珍具也通論吕氏希哲曰上八者所謂珍用八物也據正文淳熬也淳母也炮也擣珍也漬也熬也糝也肝膋也注疏非是存異陸氏佃曰珍用八物其為品六一擣二漬三熬四糝五肝膋六酏言為熬在上為酏在下熬隆於用火也周官糝食即此糝酏食即此酏三相參為糝所謂稻米二肉一合以為餌煎之是也兩相差池為酏所謂小切狼臅膏以與稻米為酏是也然則淳熬淳母所謂糗餌粉餈是與其謂之淳亦珍也然進於珍凡物以淳為珍案周官珍用八物原未詳名鄭注既以淳熬至肝膋當之而此經忽雜糝一節於肝膋之上吕陸諸人遂有異同致成聚訟案朱子明言此數節疑有脫誤則安知糝非原在肝膋之下與酏為類而誤録在肝膋之上乎况本文原無八珍字靣亦何容嘵嘵也總論孔氏穎逹曰鄭意八珍一淳熬二淳母三四炮豚若牂五擣珍六漬七熬八肝膋記文不次故肝膋在糝下取稻米舉糔溲之小切狼臅膏以與稻米為酏酏讀為􅊡之然反又之善反正義鄭氏衆曰為酏以酒酏與稻米為餅鄭氏康成曰狼臅膏臆中膏也以煎稻米則似今膏􅖸矣孔疏似漢時膏􅖸以煎稻米鄭舉時事以説之此周禮酏食也此酏當從􅊡孔疏以酏是粥非是膏煎稻未故改酏從􅊡也案酏是粥不可為豆實後鄭既破酏為􅊡仍以為酏食酏字從酒則先鄭所謂餠即後鄭所謂􅖸也總論朱子曰内則一篇文理密察法度精詳見古先聖王所以厚人倫羙教化者無所不用其全某疑中閒似有難看處如飯黍稷稻粱止大夫於閣三士於坫一二節與上下文似不相蒙豈特載此因以著夫貴賤品節之差邪又凡養老止𤣥衣而養老一節疑王制之重出不然亦豈先王之成法因子事父母而逹之天下以及人之老哉又曽子曰一節雖承上章養老之文而云然此篇既曰后王命冡宰降徳於衆兆民則是古昔盛時朝廷所下教命恐不應引到曽子之言疑是他簡脫誤在此又凡養老五帝憲至皆有惇史一節疑錯簡恐或當在上文𤣥衣而養老之下又淳熬止以與稻米為酏一節亦疑錯簡恐或當屬上文冬宜鮮羽膳膏羶及雉皆有芼之下自此外數節上下井井有條獨此未易曉暢案此篇依朱子說分析屬之極順若曽子曰一節則謂承上養老之文者得之蓋此篇雖多古經亦必曽子之徒所録故因記師説以眀之其首云后王降徳亦記者語見此所録皆古王者之教耳不必定是朝廷所下教命也禮始於謹夫婦為宫室辨外内男子居外女子居内深宫固門閽寺守之男不入女不出閽音昏正義鄭氏康成曰閽掌守中門之禁也寺掌内人之禁令也孔氏穎達曰自此至當夕論夫婦男女及内外之別又明妾與適妻尊卑相降之等劉氏彞曰男子居外女子居内各正其徳業易曰閑有家閑以防之於細微之初方氏慤曰國之本在家故禮始於謹夫婦易基乾坤詩首關雎皆始於謹夫婦之意也男女不同椸枷不敢縣於夫之楎椸不敢蔵於夫之篋笥不敢共湢浴夫不在斂枕篋簟席襡噐而蔵之少事長賤事貴咸如之椸同杝以支反枷音嫁縣音元楎音輝笥息吏反正義鄭氏康成曰竿謂之椸楎杙也孔疏爾雅樴謂之杙在牆謂之楎郭璞云植曰楎横曰椸同類之物也夫不在斂枕篋等蔵之不敢䙝也咸皆也陸氏佃曰枕有篋簟席有襡皆噐而蔵之黄氏震曰夫不在謂夫出也此斂蔵之事凡少事長賤事貴皆如之吳氏澄曰夫婦得相親者且如此則非夫婦者其明微厚別又當何如夫婦之禮惟及七十同蔵無閒故妾雖老年未滿五十必與五日之御將御者齊潄澣愼衣服櫛縰筓總角拂髦衿纓綦屨雖婢妾衣服飲食必後長者妻不在妾御莫敢當夕閒徐去聲皇如字與音預齊爭皆反下皆同澣音浣正義鄭氏康成曰及猶至也夫婦七十同蔵無閒衰老無嫌也五十始衰不能孕也妾閉房不復出御矣此御謂侍夜勸息也將御者其往如朝也角字衍拂髦或為繆髪雖婢妾衣服飲食必後長者人貴賤不可以無禮也妻不在妾御莫敢當夕辟女君之御日也孔疏此謂卿大夫以下故注云女君孔氏穎逹曰夫婦唯至七十同處居蔵無所閒别若未七十婦雖六十以下則猶閒居妾五十不御則妻雖五十以上猶得與也妾恒避女君之御日非但不敢當女君之御日猶不敢當夕而往故詩小星云肅肅宵征夙夜在公方氏慤曰將御者必齊潄澣者所以致潔敬也妾御莫敢當夕者所以避上僭之嫌也朱氏申曰年未五十尚能孕育五日一御所以廣傳嗣之道也存異鄭氏康成曰五日一御諸侯制也諸侯取九女姪娣兩兩而御則三日也次兩媵則四日也次夫人專夜則五日也天子十五日乃一御孔疏周禮九嬪鄭注云御女之法卑者宜先尊者宜後女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕十五日而徧望後反之夫人姪娣卑於兩媵故先大夫一妻二妾則三日御徧士一妻一妾則二日御徧妾恆避女君之御日即自當御猶不敢當一夕見星往還陸氏佃曰鬠用組乃筓又曰鬠筓用桑長四寸角非衍字總角拂髦女未筓之飾今服以御言若未足以當君子也故邦君之妻自稱曰小童吳氏澄曰夫婦七十同藏則不敢蔵於夫之篋笥蓋年未七十者案周禮無夫人惟言九嬪世婦女御皆不言數曲禮言天子有后有夫人有嬪有世婦有妻有妾公侯有夫人有世婦有妻有妾皆不言數惟昏義后立六宫三夫人九嬪二十七世婦八十一御妻與王之三公九卿二十七大夫八十一元士相配鄭氏據此謂周特設百二十女官與夏之男官相配又據其數以分進御之日考白虎通義謂天子諸侯皆娶於三國九女法地之九州又言天子娶於四國十二女法天之十二月則天子之所御者九嬪止矣周官有六卿無三公蓋三公三孤不必備大約六卿兼之則三夫人亦不必備必徳尊望重外則命公侯之夫人為之内或九嬪兼之世婦内亦或九嬪兼之如六卿之兼三孤外則命卿大夫之妻兼之故周禮春官有世婦曰毎宫卿二人大夫四人所謂世婦命於奠繭者内世婦其他則皆從男子者外世婦則内世婦之無定數更可知矣若女御則后嬪進御之日以給使令故曰掌叙御於王之燕寢初非王所當御也若君私幸之則如衛州吁曰嬖人之子不得與所娶三國姪娣所生之子同非如鄭氏之說也又案女子年十五即未許嫁亦筓矣豈有既嫁當御而猶總角者陸謂服以御謬吳氏割首二句屬上章亦謬葢此蔵字乃寢息之意與上蔵字迥別觀敬姜於禮老而愈嚴豈有七十即廢男女内外之辨而衣服可蔵於夫之篋笥者妻將生子及月辰居側室夫使人日再問之作而自問之妻不敢見使姆衣服而對至於子生夫復使人日再問之夫齊則不入側室之門子生男子設弧於門左女子設帨於門右三日始負子男射女否見賢遍反下同姆音茂一音母復扶又反齊側皆反正義鄭氏康成曰側室謂夾之室次燕寢也孔疏夫正寢在前燕寢在後側室又次燕寢旁作有感動也夫齊不入若始時使人問也孔疏今雖動作以齊故亦使人問之弧者示有事於武帨者事人之佩巾表男女也負之謂抱之而使向前也男射始有事也孔氏穎逹曰以下論國君至庶人生子之禮此一節未生至始生及月辰謂生月之辰初朔之日也生子不於夫正室及妻之燕寢必於側室者以正寢燕寢尊故也輔氏廣曰側室是妾之常居夫使人日再問之者愛而不失於狎敬而不失於疏妻不敢見雖病不敢忘禮使姆衣服而對雖遽不敢失禮陳氏澔曰姆女師也通論方氏慤曰古之人重男女之別非特見於弧帨而巳男則寢於牀之尊女則寢於地之卑其衣之也男以晝服之裳女以夜服之裼其㺯之也男以所有事之璋女以所有事之瓦存異孔氏穎逹曰妻居側室則妾亦當然故春秋𫝊云趙有側室曰穿是妾之子也陸氏佃曰言衣服則姆代服其服以對與案妻常居適室妾常居側室此只月辰所遷耳疏引左𫝊反混姆衣服而對亦謂姆整潔其衣乃對以示敬耳非謂姆可服夫人内子之服也又案青史氏之記曰古者胎教之道王后腹之七月而就宴案賈氏新書作蔞室太師持銅而御户左案銅謂律管太宰持升案新書作斗而御户右太卜持蓍龜而御堂下案此將卜名諸官皆以其職御於門内比三月王后所求聲音非禮樂則太師撫樂而稱不習所求滋味非正味則太宰荷升不敢煎調曰不敢以待案新書作侍王太子賈誼新書曰太子生而泣太師吹銅曰聲中某律太宰曰滋味上某太卜曰命云某然後為王太子劉向列女𫝊曰婦人妊子寢不側坐不邉立不蹕案蹕跛同不食邪味割不正不食席不正不坐目不視邪色耳不聽滛聲夜則令瞽誦詩道正事三條可補記文之缺備録之國君世子生告于君接以大牢宰掌具三日卜士負之吉者宿齊朝服寢門外詩負之射人以桑弧蓬矢六射天地四方保受乃負之宰醴負子賜之束帛卜士之妻大夫之妾使食子接方如字鄭音㨗齊側皆反朝直遥反射天地食亦反正義鄭氏康成曰詩之言承也孔疏詩含神霧云詩者持也以手維持則承奉之義謂以手承下而抱負之承陳氏澔曰儀禮尸酢主人詩懐之亦義桑弧蓬矢本太古也孔疏桑與蓬皆質素之物天地四方男子所有事也保保母保受乃負之代士也醴當為禮聲之誤也禮以一獻之禮賜之束帛酬之以幣也孔疏約士昏禮禮賔酬幣之法此士負子故還用士禮士妻大夫之妾時自有子使之孔疏使其食子須有乳汁故知時自有子者孔氏穎逹曰此論國君世子生及三日負子及食之法劉氏彞曰男子生必卜求吉士負之以行接子之禮俾射人桑弧蓬矢射天地四方者明𫝊先王之道承祖父之付必有徳政以逹天地四方是假桑蓬以申其志焉方氏慤曰卜士負子既得吉卜然後宿齊朝服敬之至也保受乃負之蓋士之負子特為斯須之禮而已陳氏澔曰宰宰夫也掌具掌其設禮之具也輔氏廣曰醴士而不及射人士負我者也射人我所使也固不可同矣諸母則擇之乳母則卜之者豈非性情之發尚猶可見而氣血之相宜有不可知者邪徐氏師曽曰士卑故言妻大夫稍尊故止言妾通論孔氏穎達曰射禮唯四矢者謂天地非射事所及唯禦四方故止四矢皇氏侃曰士之妻大夫之妾隨課用一人案此止乳食之故止一人若師保則有三母桓六年左𫝊云卜士負之士妻食之不云有大夫妾文畧也方氏慤曰桑非弓榦之上者蓬非矢材之勁者取用之見有其志未備其事而成人有漸也陸氏佃曰嬰兒多類乳母食母豈可不擇哉存疑鄭氏康成曰接讀為㨗㨗勝也謂食其母使補虛强氣又曰食子不使君妾適妾有敵義不相䙝以勞辱事也案適妾不可觧且妾則何敵義之有王氏肅曰以大牢接待夫人劉氏彛曰接者繼續之謂諸侯有宗廟社稷人民傳付非輕夫人始生世子有繼續之道故接引其子俾有立志陸氏佃曰醴讀如字醴以禮之冠禮曰乃醴賔一獻之禮案士冠禮注亦以醴為禮案接即下接子非接夫人鄭王皆誤也劉謂繼續則止可言諸侯世子與下凡接子統大夫士言相碍陸謂禮之以醴於義可通但即禮之以酒亦未嘗不可一獻也凡接子擇日冢子則大牢庶人特豚士特豕大夫少牢國君世子大牢其非冢子則皆降一等正義鄭氏康成曰凡接子擇日三日之内尊卑必皆選其吉焉冢子天子世子也孔疏下云國君世子大牢既別言國君世子故知此冢子謂天子世子也冢大也冢子猶言長子通於下也孔疏恐冢子之名唯施天子世子故云通於下知者以下云其非冢子明庶人大夫士等皆有其號用特豚四者皆謂長子非冢子謂冢子之弟及衆妾之子天子諸侯少牢大夫特豕士特豚庶人猶特豚也孔疏士特豚則庶人全應無牲今以禮窮與士同故云猶特豚陸氏佃曰曰國君世子大宰為其接以大牢同於王冢子也是以盛言之盡其辭焉耳且推國君而逺之使不偪上也又以著自庶人積隆至是窮矣蓋禮窮則同也孔氏穎達曰此一節論國君以下至庶人以上接子牲牢之異幷適庶不同通論孔氏穎達曰此三日接子之禮牲牢如此若三月名子之時則與此異故下文云具視朔食案接子即上三日始負此又言擇日者或離生日數之或幷生日數之擇其吉者朱子曰或記異聞也孔謂三日負子之後又擇日似誤異為孺子室於宫中擇於諸母與可者必求其寛裕慈惠温良恭敬愼而寡言者使為子師其次為慈母其次為保母皆居子室他人無事不往正義鄭氏康成曰異為孺子室於宫中者特埽一處以處之諸母衆妾也可者𫝊御之屬也子師教示以善道者慈母知其嗜欲者保母安其居處者士妻食乳之而已孔疏師慈保各有其事故知上士妻但乳食之此人君養子之禮也他人無事不往為兒精氣微弱將驚動也孔氏穎達曰此諸侯選擇諸母及養子之法劉氏彞曰寛則容徳固多裕則臨事不撓慈則仁性豐盈恵則恩意浹洽温則言動粹和良則心意純淑恭則容止必莊敬則誠明不㪚具此八善而加之以畏愼將之以寡言婦人之全徳也然後可以為子之師焉若夫愛子以徳時其志意體其寒温察其好惡相其寢興順其長育者慈母之職也保䕶其身衛養其氣時其衣服節其飲食侍其寢寐防其疾苦而専司負之者保母之職也方氏慤曰諸母與曲禮不潄裳之諸母同擇於諸母將使之為子師也雖非諸母而其徳如下所言可以為師者亦擇之故曰與可者通論孔氏穎達曰士不具三母大夫以上則具故喪服小功章君子為庶母慈已者鄭注獨言慈母舉中以見上下是知大夫有三母也劉氏彞曰世子國之根本弗正厥始終戕其性矣弗淑其習烏能正厥性俾近於聖賢哉吳氏澄曰慈母子之傅也子方生而三母已具師傅保之職也及其長則有少師少傅少保之官焉三月之末擇日翦髪為鬌男角女羈否則男左女右是日也妻以子見於父貴人則為衣服由命士以下皆潄澣男女夙興沐浴衣服具視朔食夫入門升自阼階立于阼西鄉妻抱子出自房當楣立東面鬌丁果反徐大果反鄉去聲楣音睂正義鄭氏康成曰鬌所遺髪也夾囟曰角孔疏囟是首腦之上縫故説文云十其字象小兒腦不合也夾囟兩旁當角之處留髪不翦午達曰羈孔疏儀禮注云一從一横曰午今女翦髪畱其頂上從横各一相交通達貴人大夫以上也由自也朔食天子大牢諸侯少牢大夫特豕士特豚也孔氏穎達曰自此至如養禮明卿大夫以下名子之法側室亦南嚮故有阼階西階方氏慤曰角則耦羈則竒取隂陽之相須也或男左而女右取隂陽之相類也陳氏澔曰嚴氏云夾囟曰角兩髻也午達曰羈三髻也徐氏師曾曰大夫以上特為新衣命士以下亦皆浣衣以致潔也具視朔食以示豐也存疑鄭氏康成曰夫入門者入側室之門也孔疏上文妻將生子居側室至此三月之末未有妻出之文則恆在側室大夫以下見子就側室見妾子於内寢辟人君也孔氏穎達曰但卿大夫之室唯有東房妻抱子出東房與夫相對辨正孔氏穎達曰文雖據大夫士天子諸侯亦當然也案妾以子見父於側室宜也若妾見子於内寢而妻見子反於側室可乎疑此是妻之正寢妻先復已正寢待於房文不具耳故下適寢是往夫之燕寢存異徐氏師曽曰楣棟下横木俗謂之楣枋案鄉射禮記序則物當棟堂則物當楣注五架之屋正中曰棟次曰楣前曰􅔑賈疏中脊為棟棟前一架為楣楣前接檐為􅔑則棟為中脊楣乃中脊前後二架之横棟名朱子釋宫所謂中脊之架曰棟次棟之架曰楣也徐氏棟下横木之説大誤姆先相曰母某敢用時日祗見孺子夫對曰欽有帥父執子之右手咳而名之妻對曰記有成遂左還授師子師辯告諸婦諸母名妻遂適寢相息亮反咳户才反還音旋辯音遍下同正義鄭氏康成曰某妻姓若言姜氏也祗敬也或作振欽亦敬也帥循也欽有帥言教之敬使有循也執右手明將授之事也記猶識也識夫之言使有成也師子師也後告諸母名成於尊也適寢復夫之燕寢案此亦入御而不言御尊妻不敢䙝也孔氏穎達曰此論母以子見父及父名子妻遂適寢之事傅姆在母之前而相佐其辭孺稚也夫對妻言訖以一手執子右手以一手承子之咳而名之方氏慤曰孩子咳之則笑故謂之咳陳氏澔曰說文咳小兒笑聲父作咳聲笑容以示慈愛説案如孔疏則咳當作頦矣如方說則咳屬子如陳則咳屬父但父引子頦父作笑聲而子亦笑其義通也或曰使之啼笑聽其聲即知其性情善惡而後名之妻對夫言訖遂左嚮廻還轉身西南以子授師也諸婦謂同族卑者之妻諸母同族尊者之妻方氏慤曰左還授師順陽道也陸氏佃曰夫曰敬有帥妻曰敬有成帥之者父道成之者母道也夫告宰名宰辯告諸男名書曰某年某月某日某生而蔵之宰告閭史閭史書為二其一蔵諸閭府其一獻諸州史州史獻諸州伯州伯命蔵諸州府夫入食如養禮辯音徧養羊尚反正義鄭氏康成曰宰謂屬吏也春秋書桓六年九月丁卯子同生孔疏此據卿大夫以下而引春秋者欲證明子生年月日之事四閭為族族百家也閭胥中士一人五黨為州州二千五百家也州長中大夫一人皆有屬吏孔疏皆周禮地官文閭之屬吏則有閭史州之屬吏則有州史也獻猶言也夫入已見子入室也案妻已適寢夫遂入寢同牢而食其與妻食如婦始饋舅姑之禮也孔疏案士昏禮婦盥饋舅姑特豚合升側載右胖載之舅俎左胖載之姑俎大夫以上則無文以下妾生子見子之禮如始入室知此養禮如始入室養舅姑之禮孔氏穎達曰此卿大夫以下故以名徧告同宗諸男若諸侯則不告也諸男舉其卑者卑者尚告則告諸父可知書名而蔵之謂以簡䇿書子名而蔵之家之書府州伯則州長也州府是州長之府蔵彭氏汝礪曰如養禮敬妻之有所出而能不負乎始饋之初意亦示將有為人舅姑之端也餘論陸氏佃曰據此閭有府史州亦有府史而周官不言閭胥州長鄉遂之官也其府史胥徒王以委之自辟與黄氏乾行曰命名即告州閭使蔵諸府將俟其長而就閭塾也以承教訓以受征役以稽徳行以應賓興皆始於是古法如此安有時過後學老壯不均冒年冒籍如後世之弊哉世子生則君沐浴朝服夫人亦如之皆立于阼階西鄉世婦抱子升自西階君名之乃降朝直遥反鄉去聲正義鄭氏康成曰子升自西階則人君見世子於路寢也見妾子就側室諸侯夫人朝於君次而褖衣也孔疏既在路寢與君同著朝服則是以禮見君合服展衣注云褖衣者謂子見訖則當進入君寢侍御於君故服進御之服也孔氏穎達曰此明人君見世子之禮前文卿大夫妻見適子之時既有父執右手咳而名之及戒告之辭其文既具故於見世子之禮畧而不言其實世子亦執右手咳而名之及戒告也陳氏澔曰諸侯朝服𤣥端素裳夫人亦如之者亦朝服也彭氏汝礪曰君沐浴朝服重世嗣也存疑鄭氏康成曰凡子生皆就側室陸氏佃曰不言三月之末嫌緩不言執其右手咳而名之嫌慢皆非所以言世子故也上下比義可知案賈誼新書曰帝見世子朝服升自阼階上西鄉妃抱世子自房出帝執禮稱辭命世子曰授太祖太宗與社稷於子者三其命也妃曰不敢者再於三命曰謹受命拜而退大史以告大祝大祝以告太祖太宗與社稷大史出以告大宰大宰以告州伯州伯命蔵之州府凡諸貴以下至於百姓男女無敢與世子同名記有國君世子生無天子世子生亦録之以補其闕又案君世子見於君之路寢庶子見於側室則君之子非妾出者見於君之適寢可知又此篇文重在適庶之辨不特妾子名庶子即同適出而非長亦謂之適子庶子而其禮不得同於適矣以適有繼世之責故特命之曰欽有帥若執右手則示之事咳之則示之愛人無不有事子無不愛者不嫌同也賈誼言天子之妃見世子亦親抱而諸侯世子乃世婦抱者避天子也大夫不世無嫌故妻親抱之非特以不抱尊夫人也若服則孔疏展衣為是既見子而入御易褖衣何難孔知其非而不駁疏例不駁注也適子庶子見於外寝撫其首咳而名之禮帥初無辭適丁厯反下同正義鄭氏康成曰外寝君燕寝也案后六寢在内王六寢在外諸侯寢在外夫人寢在内此云外者對夫人之寢言非對側室言也若専就王寢言則又燕寢内路寢外無辭辭者謂欽有帥記有成也孔氏穎達曰見適子庶子威儀依循初世子之法但無戒敕之辭彭氏汝礪曰適子庶子者適夫人所生次子適子親弟也専言適子者君夫人所生適長子専言庶子者妾所生撫首謂以手撫循其頭也通論方氏慤曰適子庶子止見於外寢則世子見於路寢可知存異鄭氏康成曰此適子謂世子弟庶子妾子也孔氏穎達曰適子見於外寢庶子則見於側室但撫首咳名無辭之事同故連文云見於外寢其實庶子見於側室也妾之見子不得與夫人同當與卿大夫之妻見適子同案見子之禮世子於路寝適庶子於燕寝庶子於内寢升降秩然又此經䝉上文妻生子而來其為夫人之子可知鄭氏謂此適子為世子弟是矣謂庻子為妾子非也蓋連言適者異之乎妾子也又言庶者異之乎世子也若曰適之庶子云耳若此庶子果為妾子則下公庶子一條為重出矣孔氏謂撫首咳名無辭之事同因連文云見於外寢以斡旋鄭注然有君賜名之衆子使有司名之即咳名之事亦不得從同也凡名子不以日月不以國不以隠疾大夫士之子不敢與世子同名正義鄭氏康成曰不以日月不以國終使易諱不敢與世子同名尊世子也先世子生亦勿為改孔疏春秋衛襄公名惡其大夫有齊惡齊惡先衛侯生與衛侯同名故鄭知先生者不改也杜氏預曰隠疾隠痛疾患不名避不祥也通論馬氏睎孟曰臣先世子生名不改君子不奪人名不奪人親之所名重其所從來也為臣而與君同名則特稱字而巳陸氏佃曰名子不以日月不以國不以隠疾正也其又致曲則不以山川曲禮是也其又加詳焉則不以官不以畜牲不以噐幣春秋是也凡所謂不以名子者國君之禮也故春秋𫝊曰以官則廢職以山川則廢主以畜牲則廢祀以噐幣則廢禮晉以僖侯廢司徒宋以武公廢司空先君獻武廢二山存疑鄭氏康成曰隠疾諱衣中之疾難為醫也妾將生子及月辰夫使人日一問之子生三月之末潄澣夙齊見於内寢禮之如始入室君已食徹焉使之特餕遂入御齊側皆反正義鄭氏康成曰内寝適妻寝也禮謂已見子夫食而使獨餕也孔疏尋常夫食之後衆妾共餕今以其生子故使之特餕也如始入室始來嫁時妾餕夫婦之餘亦如之孔疏昏禮夫婦同牢之後媵餕夫餘御餕婦餘若妾初嫁來夫婦共食此妾特餕今亦如之也既見子可以御此謂大夫士之妾也凡妾稱夫曰君孔疏妾賤故謂夫為君孔氏穎達曰此論大夫妾生子之禮異於適子之法也宫室之制前有路寝次有君燕寝次夫人正寝卿大夫以下前有適室次有燕寝次有適妻之寝以其稱内故知是適妻寝也妻見子遂適夫寝未即進御後夫入食如養禮乃進御此云見子遂入御言其異正妻也輔氏廣曰妾生子而禮之如始入室特餕以寵之然其分不可得而易也彭氏汝礪曰日一問不及妻之再問也潄澣夙齊敬其事也通論陸氏佃曰此言潄澣夙齊下言沐浴朝服相備也案妻寢曰内寝則上外寝為夫寢可知妾所常居在適妻寢房側室故於生子不容復言側室且曰見於内寝明乎所居之非寢不與妻同也又案潄澣夙齊經不言何人以下公庶子準之則其妾也公庶子生就側室三月之末其母沐浴朝服見於君擯者以其子見君所有賜君名之衆子則使有司名之正義鄭氏康成曰擯者傅姆之屬也有司臣有事者也孔氏穎達曰此明君庶子生及三月見父異於世子之禮陸氏佃曰庶子言就側室則世子不就側室可知其母沐浴朝服則君不沐浴朝服可知存疑鄭氏康成曰人君尊雖妾不抱子有賜於君有恩恵也孔疏君偏所愛幸則君自名其子存異孔氏穎達曰前文巳云適子庶子見於外寢異於世子今此更重出者以前文庶子與適子連文恐事事皆同適子故以此經特見庶子之法案前注云凡子生皆就側室今特云庶子就側室者舉庶子則世子可知案就側室妾常居側室故就而見之與及月辰居側室者異也大夫之庶子猶見於内寢公庶子幷不得於内寝而於側室者大夫卑適庶子猶相近君尊適庶子相去逺也諸侯庶子父在生母無服大夫父在為母大功義亦如此又案天子之妃曰后其世子親抱之帝曰授太祖太宗社稷於子諸侯世子見君不言授社稷於子諸侯社稷聽命於王非所敢専則夫人不親抱世子避王也大夫士妻抱子卑無嫌也鄭謂諸侯尊雖妾不抱子不教之驕惰歟又内官不過九御其秩賜有常如外官五命賜則六命賜官之例四命以下未賜故有賜不賜之異而孔釋為君偏愛幸不且以滛破義以私亂法乎恐不可訓庶人無側室者及月辰夫出居羣室其問之也與子見父之禮無以異也正義鄭氏康成曰夫雖辟之至問妻及見子之禮同也庶人或無妾孔氏穎達曰此論庶人之禮庶人無側室故夫出辟之若有側室則妻在側室夫自居正寢凡父在孫見於祖祖亦名之禮如子見父無辭正義鄭氏康成曰見子於祖家統於尊也父在則無辭有適子者無適孫與見庶子同也孔疏適子既在其孫猶為庶孫無所傳重故與見庶子同父卒而有適孫則有辭與見冢子同孔疏所生適子其父既卒則適孫與長子相似當有辭也父雖卒而庶孫猶無辭也孔氏穎達曰此論孫見祖之禮卿大夫以下之事父之於子有傳重之事故有告戒之辭今孫見於祖而隔於父故無辭也應氏鏞曰辭者夫婦所以相授受也祖尊故有其禮而無其辭食子者三年而出見於公宫則劬大夫之子有食母士之妻自養其子食音嗣下食母同正義鄭氏康成曰士妻大夫之妾食國君之子三年出歸其家劬勞也君有以勞賜之大夫之子食母選於傅御之中喪服所謂乳母也士之妻賤不敢使人孔氏穎達曰此論國君以下及大夫士適妻養子之人尊卑有別陳氏澔曰子三年則免懐抱故食者出還其家見於公宫而告辭由命士以上及大夫之子旬而見冢子未食而見必執其右手適子庶子巳食而見必循其首上時掌反適丁厯反正義鄭氏康成曰巳食未食急正緩庶之義也朱子曰旬謂十日也別記異聞或不待三月也張氏怡曰未朝食而見冢子重之也執其右手示將授以事也適庶子則朝食後見示稍後也不執手但拊循其首而巳存異鄭氏康成曰旬當為均聲之誤也有時適妾同時生子子均而見者以生先後見之孔疏雖見有先後同是未食之前故云均而見既見乃食辟人君也天子諸侯尊別世子雖同母禮則異矣孔疏知冢子以下為天子諸侯禮者以上文適庶均見是大夫士禮此有食前食後之不同故知是天子諸侯也未與后夫人禮食先見冢子是急既禮食乃見適子庶子是緩其禮異陸氏佃曰言子既見之後凡旬一見也應氏鏞曰子固以禮見於父父則欲時時見之又不可瀆故毎旬而一見之若庶人則簡畧易通故不必以旬而見彭氏汝礪曰三月名子自諸侯及庶人之所同三日接子諸侯之所獨蓋諸侯備禮而易行士與大夫禮未必備則或待旬焉辨正朱子曰此説疑鄭失之承記大夫禮而又別其冢適庶子之異同冢子之禮仍與前章同唯適子庶子為異耳案此一節通論命士大夫之見子及冢子適庶之別以補前義本文明言自命士以上不應冢子以下忽及天子諸侯也鄭謂適庶子同見以生先後見之則庶子先生反先適子而見矣同見無別先後倒置聖人適庶之辨必不然也朱子謂見子或早不待三月彭氏謂接子或遲不及三日則接與見二禮本文言見不言接彭恐非也陸應之說益𤨏而拘矣子能食食教以右手能言男唯女俞男鞶革女鞶絲食食上如字下音嗣唯於癸反鞶歩干反正義鄭氏康成曰俞然也孔氏穎達曰此論男女自㓜少教之之事方氏慤曰教以右手取其強男女所同彭氏汝礪曰同於言而唯直俞婉同於帶而革勁絲柔則男女之異也存異鄭氏康成曰鞶小囊盛帨巾者男用韋女用繒有飾縁之則是鞶裂與孔疏言男女鞶囊之外更有繒帛之物縁而飾之疑而未定故稱與詩云垂帶而厲紀子帛名裂繻字異意同辨正陳氏祥道曰古者革帶大帶皆謂之鞶内則所謂男鞶革帶也春秋傳所謂鞶厲大帶也易言鞶帶揚子言鞶帨以至許慎服䖍杜預皆以鞶為帶特鄭氏以男鞶革為盛帨之囊誤也詩言垂帶而厲毛萇杜預皆以厲為帶之垂者特鄭氏以而厲為如裂亦誤總論王氏圻曰自此至篇末總言教子之禮以見古人男女莫不有教且其教之常預而有漸如此六年教之數與方名七年男女不同席不共食八年出入門戶及卽席飲食必後長者始教之讓九年教之數日十年出就外傅居宿於外學書計衣不帛襦袴禮帥初朝夕學㓜儀請肄簡諒後胡豆反數去聲數日之數上聲襦又作儒袴苦故反肄以二反正義鄭氏康成曰方名東西也案數謂十百千萬方謂上下前後南北東西凡物皆有名於身耳目手足於人父母兄弟以及噐用鳥獸草木皆是不同席共食蚤其別也教之讓示以亷恥也數日朔望與六甲也外傅教學之師也不用帛為襦袴為太温傷隂氣也陳氏選曰亦以防奢也禮帥初遵習先日所為也孔疏行禮動作皆帥循初日所為肄習諒信也請習簡謂所書篇數請習信謂應對之言方氏慤曰必請乃習不敢專也孔氏穎達曰自此至尚左手論教男子從㓜及長居官至致事之事學㓜儀者從朝至夕學㓜少奉侍長者之儀方氏慤曰書周官保氏六書案周官保氏鄭注象形㑹意轉注處事假借諧聲計即九數案周官注九數者方田粟米差分少廣商功均輸贏不足方程旁要今有重差夕桀句股也以數必計多寡故又謂之計焉通論方氏慤曰經曰父之齒隨行兄之齒鴈行行之出入固欲其讓也曰衽席之上讓而坐下觴酒豆肉讓而受惡則坐與飲食又欲其讓由是推之則無所往而不讓矣出就外傅曽子問所謂古者男子外有傅是矣自學書計而下皆就外傅所學之事朝夕學㓜儀者至此乃可責以事長之禮若昧爽而朝日入而夕之類陸氏佃曰十年以後有學無教馬氏睎孟曰以奇乘耦剛柔雜比以相成曰文以始一二而生之至無窮故曰字以可以記事故曰書文言其形字言其法書言其用輔氏廣曰襦袴下服不用帛然則上服猶用帛也禮帥初者前已教之遜讓禮之端也朝夕學㓜儀者則至是不容有暇也有暇則又請習簡諒矣案尚書大傳言年十三入小學白虎通義言八嵗入小學此言十年就外傅貴賤異與傳聞異與或原有不必拘者與十有三年學樂誦詩舞勺成童舞象學射御二十而冠始學禮可以衣裘帛舞大夏惇行孝弟博學不教内而不出冠古亂反衣於既反行如字又丁孟反弟音悌正義鄭氏康成曰先學勺後學象文武之次也熊氏安生曰勺用籥文舞之小者象用干戈武舞之小者武案朱子言勺即酌也酌之詩言於鑠王師似勺為矣先儒謂惟清之詩為象似象為文矣禮言下管象左𫝊言象箾南籥象吹以管而舞以籥則勺之為武未可定而象之非武斷可知也成童十五以上孔疏以年尚㓜故習小舞大夏樂之文武備者孔疏大夏禹樂禪代之後干戈之前故文武備内而不出謂為人謀慮也孔氏頴達曰二十成人血氣强盛無慮傷損故可以衣裘帛博學不教者謂廣博學問不可為師教人内而不出者藴畜其徳在内而不得出言為人謀慮程氏復心曰射有五案周官注五射者白矢參連剡注襄尺井儀御有五案周官注五御者鳴和鸞逐水曲過君表舞交衢逐禽左程子曰舞中節射中鵠御中度皆誠也童而習之不特精其藝亦可以養其誠張子曰古者教童子先以舞者欲柔其體也心下則氣和氣和則體柔教胄子必以樂欲其體和也學者志則欲立體則欲和方氏慤曰惇行孝弟前之教讓學㓜儀孝弟之道已知之至此惇而行之期於熟也通論程子曰古者家有塾黨有庠遂有序故未嘗有不入學者八歳入小學十五擇其秀者入大學不可教者歸之於農三老坐於里門出入察其長㓜進退揖讓之序至於閭里鄉黨之閒如三百五篇之類人人諷誦要之莫非止於禮義之言十三又使之舞象然則雖未能深知義理興起於詩其心固已善矣案禮有六吉凶軍賓嘉而不别言之者冠昏喪祭鄉相見士皆有之即宗廟會同願為小相未嘗不可習其禮軍亦於田獵習之也前已言始教之讓禮帥初學㓜儀而此云始學禮者既成人乃有事於鄉國之通禮也樂兼聲容歌詩習舞皆於平日講究至於臨用則必因其時地而後施之故無荒謬僭越之患大夏為六樂之一文武具備於既冠後所宜學者非必朱干玉戚而後可舞也三十而有室始理男事博學無方孫友視志四十始仕方物出謀發慮道合則服從不可則去五十命為大夫服官政七十致事凡男拜尚左手孫音遜去如字正義鄭氏康成曰室猶妻也男事受田給政役也孔疏三十丁壯受其田土供給征役韓詩說三十受兵方猶常也無方言學無常在志所好也孫順於友視其所志也物猶事也方物言常事也服官政統一官之政也七十致其事於君而告老左手陽也孔氏穎達曰四十壯而仕言年壯仕官行其常事無所謙遜出其謀計發其思慮以為國也張子曰博學無方猶知類通達朱子曰方物出謀則謀不過物方物發慮則慮不過物方猶對也比方以窮理方氏慤曰有室則有父道焉理男事者父道也孫有自卑之意書曰惟學遜志所取之友有賢否則所存之志有逺近故以遜友而視其志也事人之道有合則有否故有從必有去合否在彼有命存焉從去在我有義存焉輔氏廣曰博學不教内而不出獨善而已博學無方孫友視志則善足以及人矣王氏圻曰四十始仕為士以事人治官府之小事也五十為大夫以長人與聞邦國之大事也四十而始仕不躁進也七十必致仕不固位也中間三十年盡力於王事不負所學也餘論程子曰古之為士者自十五入學至四十始仕中閒二十五年有事於學又無利可趨則其志可知此所以成徳故古之人必四十乃仕然後志定業成後世立法自童稚即有汲汲利禄之誘何由向善案三十而博學無方先王育才之深使之久而成四十始仕先王用才之嚴不使躁於進女子十年不出姆教婉娩聽從執麻枲治絲繭織紝組紃學女事以共衣服觀於祭祀納酒漿籩豆菹醢禮相助奠婉紆晚反娩音晚又音萬枲思里反繭古典反紝女金反紃音廵共音恭相息亮反正義鄭氏康成曰不出恒居内也婉謂言語也娩之言媚也媚謂容貌也孔疏案九嬪注婦徳貞順婦言辭令婦容婉娩婦功絲枲則婉娩合為婦容鄭以此上下備其四徳以婉為婦言娩為婦容聽從為婦順執麻枲以為婦功案鄭注周禮以婉娩為婦容此又分婉為婦言祭義言婉容婉非言也能言教之俞婦言已在其前矣則周禮注為當存此以備一義可也紃絛也孔疏紝為繒帛組紃俱絛也薄闊為組似繩者為紃觀於祭祀以下當及女時而知孔疏未嫁之前於廟外觀納酒漿六者於神坐故云及女時孔氏穎達曰自此至右手論女子自㓜及嫁為女事之禮方氏慤曰聽則有所受從則無所違皆女徳也執麻枲績事也治絲繭蠶事也織以機紝以箴組綬屬凡此皆學女事以共衣服之用也觀於祭祀則欲其習熟是事故也十有五年而筓二十而嫁有故二十三年而嫁聘則為妻奔則為妾凡女拜尚右手正義鄭氏康成曰十五而筓謂應年許嫁者女子許嫁筓而字之其未許嫁二十則筓有故謂父母之喪聘問也妻之言齊也以禮聘問則得與夫敵體妾之言接也聞彼有禮走而往焉以得接見於君子也奔或為衒右手隂也方氏慤曰筓者婦人首飾蓋成人之服也夫男子冠則有成人之禮女子筓則當許嫁之時矣聘言由彼而問此奔言自此而趨彼案有故不特女遭父母喪也男親迎有吉日而舅姑死致命女氏女氏許諾而弗敢嫁亦二十三而嫁也通論方氏慤曰嫁止於二十娶必止於三十者隂以少為羙陽以壯為強故也然經亦舉其大畧耳故王氏謂二十而不嫁則非禮男子三十而娶四十而仕推此可知黄氏震曰朱子周禮九拜辨惟稽首頓首為手引頭至地三曰空首則頭至手不至地矣九曰肅拜最輕但俯下手軍中拜及婦人拜也案古者席地而坐以手引頭屈伏向地即為拜其勢易也是古之拜與今之拜不同軍中有介胄婦人有首飾皆不可俯伏故但俯手謂之肅拜總論張氏怡曰男教之陽徳服男事女教之隂徳習女儀盡天下男女夫婦而曲成之此先王所以降徳於兆民也欽定禮記義疏卷四十
