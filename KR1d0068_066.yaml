body:
  text: 中庸第三十一之一陸氏德明曰鄭云以其記中和之為用也庸用也孔子之孫子思作之以昭明聖祖之德也孔氏穎達曰案鄭目録云名曰中庸者以其記中和之為用也庸用也孔子之孫子思伋作之以昭明聖祖之德此於别録屬通論朱子曰中者不偏不倚無過不及之名庸平常也子程子曰不偏之謂中不易之謂庸中者天下之正道庸者天下之定理此篇乃孔門𫝊授心法子思恐其久而差也故筆之於書以授孟子其書始言一理中散為萬事末復合為一理放之則彌六合卷之則退藏於密其味無窮皆實學也善讀者玩索而有得焉則終身用之有不能盡者矣案戴記四十九篇其四十七篇並用正義等六條編纂之例獨大學中庸二篇不拘諸例但全録注疏於前編次朱注於後者一以示不遺古本之源一以示特尊朱子之義全録注疏古本方識鄭孔羽翼聖籍之功方見朱子之精心邃密而注疏之是非得失讀者自一目瞭然故不拘諸例天命之謂性率性之謂道修道之謂教釋文率所律反鄭氏康成曰天命謂天所命生人者也是謂性命木神則仁金神則義火神則禮水神則信土神則知孝經說曰性者生之質命人所禀受度也率循也循性行之之謂道修治也治而廣之人放效之是曰教孔疏天命謂天所命生人者也是謂性命案易乾彖云乾道變化各正性命是也云木神則仁者皇氏云東方春春主施生仁亦主施生云金神則義者秋為金金主嚴殺義亦果敢斷決也云火神則禮者夏為火火主照物而有分别禮亦主分别云水神則信冬主閉藏充實不虛水有內明不欺於物信亦不虛詐也云土神則知者金木水火土無所不載土所含義者多知亦所含者衆故云土神則知云孝經說曰性者生之質命人所禀受度也不云命者鄭以通解性命為一故不復言命但性情之義說者不通亦略言之賀瑒云性之與情猶波之與水靜時是水動則是波靜時是性動則是情左傳云天有六氣降而生五行至於含生之類皆感五行生矣惟人獨稟秀氣故禮運云人者五行之秀氣被色而生既有五常仁義禮知信因五常而有六情則性之與情似金與鐶印鐶印之用非金亦因金而有鐶印情之所用非性亦因性而有情則性者靜情者動故樂記云人生而靜天之性也感於物而動性之欲也故詩序云情動於中是也但感五行在人為五常得其清氣備者則為聖人得其濁氣簡者則為愚人降聖以下愚人以上所稟或多或少不可言一故分為九等孔子云唯上智與下愚不移二者之外逐物移矣故論語云性相近習相遠也亦據中人七等也孔氏穎達曰天命至育焉此節明中庸之德必修道而行謂子思欲明中庸先本於道天命之謂性者天本無體亦無言語之命但人感自然而生有賢愚吉凶若天之付命遣使之然故云天命老子云道本無名强名之曰道但人自然感生有剛柔好惡或仁或義或禮或知或信是天命自然故云之謂性率性之謂道率循也道者通物之名言依循性之所感而行不令違越是之曰道感仁行仁感義行義之屬不失其常合於道理使得通逹是率性之謂道修道之謂教謂人君在上修行此道以教於下是修道之謂教也朱子曰命猶令也性即理也天以隂陽五行化生萬物氣以成形而理亦賦焉猶命令也於是人物之生因各得其所賦之理以為健順五常之德所謂性也率循也道猶路也人物各循其性之自然則其日用事物之閒莫不各有當行之路是則所謂道也修品節之也性道雖同而氣稟或異故不能無過不及之差聖人因人物之所當行者而品節之以為法於天下則謂之教若禮樂刑政之屬是也蓋人知己之有性而不知其出於天知事之有道而不知其由於性知聖人之有教而不知其因吾之所固有者裁之也故子思於此首發明之而董子所謂道之大原出於天亦此意也道也者不可須臾離也可離非道也釋文離力智反作案朱本合下節一節割篇內大文有鄭本數節而朱本合作一節者不使裂朱注分貼大文其上節注語同見下節大文之下大學倣此鄭氏康成曰道猶道路也出入動作由之離之惡乎從也孔氏穎達曰道也者不可須臾離也者此謂聖人修行仁義禮知信以為教化道猶道路也道者開通性命猶如道路開通於人人行於道路不可須臾離也若離道則礙難不通猶善道須臾離棄則身有患害而生也可離非道也者若荒梗塞澀之處是可離棄以非道路之所由猶如凶惡邪僻之行是可離棄以亦非善道之行故云可離非道也是故君子戒慎乎其所不睹恐懼乎其所不聞釋文睹丁古反恐匡勇反同案篇內朱本釋音與陸本多異同其者概不重出大學倣此鄭氏康成曰小人閒居為不善無所不至也君子則不然雖視之無人聽之無聲猶戒慎恐懼自修正是其不須臾離道孔氏穎達曰是故君子戒慎乎其所不睹者言君子行道先慮其微若微能先慮則必合於道故君子恆常戒於其所不睹之處人雖目不睹之處猶戒慎況其惡事睹見而肯犯乎故君子恆常戒慎之恐懼乎其所不聞者言君子恆恐迫畏懼於所不聞之處言雖耳所不聞恆懷恐懼之不睹不聞猶須慎懼況睹聞之處恐懼可知也朱子曰道者日用事物當行之理皆性之德而具於心無物不有無時不然所以不可須臾離也若其可離則豈率性之謂哉是以君子之心常存敬畏雖不見聞亦不敢忽所以存天理之本然而不使離於須臾之頃也莫見乎隱莫顯乎微故君子慎其獨也釋文見賢遍反一音如字朱注見音現鄭氏康成曰慎獨者慎其閒居之所為小人於隱者動作言語自以為不見睹不見聞則必肆盡其情也若有覘聼之者是為顯見甚於衆人之中為之孔氏穎達曰莫見乎隱莫顯乎微者莫無也言凡在衆人之中猶知所畏及至幽隱之處謂人不見便即恣情人皆覘聽察見罪狀甚於衆人之中所以恆須慎懼如此以罪過愆失無見於幽隱之處無顯露於細微之所也故君子慎其獨也者以其隱微之處恐其罪惡彰顯故君子之人恆慎其獨居言雖曰獨居能謹慎守道也朱子曰隱暗處也微細事也獨者人所不知而己所獨知之地也言幽暗之中細微之事跡雖未形而幾則已動人雖不知而已獨知之則是天下之事無有著見明顯而過於此者是以君子既常戒懼而於此尤加謹焉所以遏人欲於將萌而不使其潛滋暗長於隱微之中以至離道之遠也喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之逹道也釋文樂音洛中節之中丁仲反鄭氏康成曰中為大本者以其含喜怒哀樂禮之所由生政教自此出也孔氏穎逹曰喜怒哀樂之未發謂之中者言喜怒哀樂緣事而生未發之時淡然虛靜心無所慮而當於理故謂之中發而皆中節謂之和者不能寂靜而有喜怒哀樂之情雖復動發皆中節限猶如鹽梅相得性行和諧故云謂之和中也者天下之大本也者言情欲未發是人性初本故曰天下之大本也和也者天下之達道也者言情欲雖發而能和合道理可通達流行故曰天下之逹道也朱子曰喜怒哀樂情也其未發則性也無所偏倚故謂之中發皆中節情之正也無所乖戾故謂之和大本者天命之性天下之理皆由此出道之體也逹道者循性之謂天下古今之所共由道之用也此言性情之德以明道不可離之意致中和天地位焉萬物育焉鄭氏康成曰致行之至也位猶正也育生也長也孔氏穎達曰致中和天地位焉萬物育焉者致至也位正也育生長也言人君所能致極中和使隂陽不錯則天地得其正位焉生成得理故萬物其養育焉朱子曰致推而極之也位者安其所也育者遂其生也自戒懼而約之以至於至靜之中無少偏倚而其守不失則極其中而天地位矣自謹獨而精之以至於應物之處無少差謬而無適不然則極其和而萬物育矣蓋天地萬物本吾一體吾之心正則天地之心亦正矣吾之氣順則天地之氣亦順矣故其效驗至於如此此學問之極功聖人之能事初非有待於外而修道之教亦在其中矣是其一體一用雖有動靜之殊然必其體立而後用有以行則其實亦非有兩事也故於此合而言之以結上文之意右第一章子思述所傳之意以立言首明道之本原出於天而不可易其實體備於己而不可離次言存養省察之要終言聖神功化之極蓋欲學者於此反求諸身而自得之以去夫外誘之私而充其本然之善楊氏所謂一篇之體要是也其下十章蓋子思引夫子之言以終此章之義仲尼曰君子中庸小人反中庸君子之中庸也君子而時中小人之中庸也小人而無忌憚也釋文小人之中庸也王肅本作小人之反中庸也憚徒旦反朱注王肅本作小人之反中庸也程子亦以為然今從之案朱本分小人反中庸節小人而無忌憚也節作二節者篇內大文有鄭本一節而朱子分作二節或數節朱本各節注語同見一處仍於各節注末空一字界斷以存朱子分節之意大學倣此鄭氏康成曰庸常也用中為常道也反中庸者所行非中庸然亦自以為中庸也君子而時中者其容貌君子而又時節其中也小人而無忌憚其容貌小人又以無畏難為常行是其反中庸也孔疏反中庸者所行非中庸者言用非中以為常是反中庸故云所行非中庸然亦自以為中庸也解經小人之中庸雖行惡事亦自謂為中庸云其容貌君子而又時節其中也解經君子而時中云其容貌小人又以無畏難為常行者解經小人而無忌憚則不時節其中庸也孔氏穎達曰仲尼至矣夫此一節是子思引仲尼之言廣明中庸之行賢者過之不肖者不及也中庸之道鮮能行之君子中庸者庸常也君子之人用中以為常故云君子中庸小人反中庸者小人則不用中為常是反中庸也君子之中庸也君子而時中者此覆說君子中庸之事言君子之為中庸容貌為君子心行而時節其中謂喜怒不過節也故云君子而時中小人之中庸也小人而無忌憚也者此覆說小人反中庸之事言小人為中庸形貌為小人而心行無所忌憚故云小人而無忌憚也小人將此以為常亦以為中庸故云小人之中庸也朱子曰中庸者不偏不倚無過不及而平常之理乃天命所當然精微之極致也唯君子為能體之小人反是君子之所以為中庸者以其有君子之德而又能隨時以處中也小人之所以反中庸者以其有小人之心而又無所忌憚也蓋中無定體隨時而在是乃平常之理也君子知其在我故能戒謹不睹恐懼不聞而無時不中小人不知有此則肆欲妄行而無所忌憚矣右第二章此下十章皆論中庸以釋首章之義文雖不屬而意實相承也變和言庸者游氏曰以性情言之則曰中和以德行言之則曰中庸是也然中庸之中實兼中和之義子曰中庸其至矣乎民鮮能久矣釋文中庸其至矣乎一本作中庸之為德其至矣乎鮮息淺反下同鄭氏康成曰鮮罕也言中庸為道至美顧人罕能久行孔氏穎逹曰子曰中庸其至矣乎前既言君子小人不同此又歎中庸之美人寡能久行其中庸之德至極美乎民鮮能久矣者但寡能長久而行鮮罕也言中庸為至美故人罕能久行之朱子曰過則失中不及則未至故惟中庸之德為至然亦人所同得初無難事但世教衰民不興行故鮮能之今已久矣論語無能字右第三章子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也人莫不飲食也鮮能知味也釋文肖音笑朱注知者之知去聲案朱本分不肖者不及也節鮮能知味也節作二節鄭氏康成曰罕知其味謂愚者所以不及也過與不及使道不行唯禮能為之中孔氏穎逹曰子曰道之不行也我知之矣者此覆說人寡能行中庸之事道之所以不行者言我知其道之不行所由故曰我知之矣知者過之愚者不及也以輕於道故過之以遠於道故不及道之不明也我知之矣者言道之所以不顯明我亦知其所由也賢者過之不肖者不及也言道之不行為易故知者過之愚者不及道之不明為難故云賢者過之不肖者不及是以變知稱賢變愚稱不肖是賢勝於知不肖勝於愚也人莫不飲食也鮮能知味也者言飲食易也知味難也猶言人莫不行中庸但鮮能久行之言知之者易行之者難所謂愚者不能及中庸也案異義云張華辨鮓師曠别薪苻朗為青州刺史善能知味食雞知棲半露食鵝知其黑白此皆晉書文也朱子曰道者天理之當然中而已矣知愚賢不肖之過不及則生禀之異而失其中也知者知之過既以道為不足行愚者不及知又不知所以行此道之所以常不行也賢者行之過既以道為不足知不肖者不及行又不求所以知此道之所以常不明也道不可離人自不察是以有過不及之弊右第四章子曰道其不行矣夫釋文夫音扶鄭氏康成曰憫無明君教之孔氏穎達曰道其不行矣夫者夫子既傷道之不行又哀憫傷之云時無明君其道不復行也朱子曰由不明故不行右第五章此章承上章而舉其不行之端以起下章之意子曰舜其大知也與舜好問而好察邇言隱惡而揚善執其兩端用其中於民其斯以為舜乎釋文與音餘下强與皆同好呼報反朱注知去聲鄭氏康成曰邇近也近言而善易以進又察而行之也兩端過與不及也用其中於民賢與不肖皆能行之也斯此也其德如此乃號為舜舜之言充也孔疏案諡法云受禪成功曰舜又云仁義盛明曰舜皆是道德充滿之意故言舜為充也孔氏穎達曰子曰至舜乎此一經明舜能行中庸之行先察近言而後至於中庸也舜其大知也與者既能包於大道又能察於近言即是大知也執其兩端用其中於民者端謂頭緒謂知者過之愚者不及言舜能執持愚知兩端用其中道於民使愚知俱能行之其斯以為舜乎者斯此也以其德化如此故號之為舜朱子曰舜之所以為大知者以其不自用而取諸人也邇言者淺近之言猶必察焉其無遺善可知然於其言之未善者則隱而不宣其善者則播而不匿其廣大光明又如此則人孰不樂告以善哉兩端謂衆論不同之極致蓋凡物皆有兩端如小大厚薄之類於善之中又執其兩端而量度以取中然後用之則其擇之審而行之至矣然非在我之權度精切不差何以與此此知之所以無過不及而道之所以行也右第六章子曰人皆曰豫知驅而納諸罟擭陷阱之中而莫之知辟也人皆曰豫知擇乎中庸而不能期月守也釋文罟音古網之總名擭胡化反尚書傳云捕獸機檻陷陷沒之陷阱才性反本或作穽同阱穿地陷獸也辟音避期音基朱注豫知之知去聲鄭氏康成曰豫我也言凡人自謂有知人使之入罟不知辟也自謂擇中庸而為之亦不能久行言其實愚又無恆孔氏穎達曰子曰至守也此一經明無知之人行中庸之事豫我也世之愚人皆自謂言我有知驅而納諸罟擭陷阱之中而莫之知辟也者此為無知之人設譬也罟網也擭謂柞㮙也陷阱謂坑也穿地為坎豎鋒刃於中以陷獸也言禽獸被人所驅納於罟網擭陷阱之中而不知違辟似無知之人為嗜欲所驅入罪禍之中而不知辟即下文是也擇乎中庸而不能期月守也者鄭云自謂擇中庸而為之亦不能久行言其實愚又無恆也小人自謂選擇中庸而心行亦非中庸假令偶有中庸亦不能期匝一月而守之如入陷阱也朱子曰罟網也擭機檻也陷阱坑坎也皆所以掩取禽獸者也擇乎中庸辨别衆理以求所謂中庸即上章好問用中之事也期月匝一月也言知禍而不知辟以况能擇而不能守皆不得為知也右第七章承上章大知而言又舉不明之端以起下章也子曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣釋文拳音權又起阮反徐羌權反膺徐音應又於陵反鄭氏康成曰拳拳奉持之貌孔氏穎逹曰子曰至能也此一節是夫子明顏回能行中庸言中庸之難也得一善則拳拳服膺而弗失之矣者言顔回選擇中庸而行得一善事則形貌拳拳然奉持之膺謂胸膺言奉持守於善道弗敢棄失朱子曰回孔子弟子顔淵名拳拳奉持之貌服猶著也膺胸也奉持而著之心胸之閒言能守也顔子蓋真知之故能擇能守如此此行之所以無過不及而道之所以明也右第八章子曰天下國家可均也爵祿可辭也白刃可蹈也中庸不可能也釋文蹈音悼又徒報反鄭氏康成曰言中庸難為之難孔氏穎達曰子曰天下國家可均也天下謂天子國謂諸侯家謂卿大夫也白刃可蹈也者言白刃雖利尚可履蹈而行之中庸不可能也言在上諸事雖難猶可為之唯中庸之道不可能也為知者過之愚者不及言中庸難為之難也朱子曰均平治也三者亦知仁勇之事天下之至難也然皆倚於一偏故資之近而力能勉者皆足以能之至於中庸雖若易能然非義精仁熟而無一毫人欲之私者不能及也三者難而易中庸易而難此民之所以鮮能也右第九章亦承上章以起下章子路問强釋文强其良反鄭氏康成曰强勇者所好也孔氏穎逹曰子路至哉矯此一節明中庸之道亦兼中國之强子路聞孔子美顔回能擇中庸言己有强故問之問强中亦兼有中庸否庾氏云問强中之中庸者然此問之亦如論語云子謂顔淵曰用之則行舍之則藏唯我與爾有是夫子路曰子行三軍則誰與之類是也朱子曰子路孔子弟子仲由也子路好勇故問强子曰南方之强與北方之强與抑而强與朱注與平聲鄭氏康成曰言三者所以為强者異也抑辭也而之言女也謂中國也孔氏穎達曰子曰南方之强與北方之强與抑而强與者抑語助也而之言女也女子路也夫子將答子路之問且先反問子路言强有多種女今所問問何者之强為南方為北方為中國女所能之强也子路之强行中國之强也朱子曰抑語辭而女也寬柔以教不報無道南方之强也君子居之鄭氏康成曰南方以舒緩為强不報無道謂犯而不校也孔氏穎達曰寬柔以教不報無道南方之强也君子居之者反問既竟夫子遂為厯解之南方謂荆揚之南其地多陽陽氣舒散人情寬緩和柔假令人有無道加己己亦不報和柔為君子之道故云君子居之朱子曰寬柔以教謂含容㢲順以誨人之不及也不報無道謂橫逆之來直受之而不報也南方風氣柔弱故以含忍之力勝人為强君子之道也祍金革死而不厭北方之强也而强者居之釋文祍而審反又而鴆反厭於艷反鄭氏康成曰祍猶席也北方以剛猛為强孔氏穎達曰祍金革死而不厭北方之强也而强者居之者祍卧席也金革謂軍戎器械也北方沙漠之地其地多隂隂氣堅急故人生剛猛恆好鬭爭故以甲鎧為席寢宿於中至死不厭非君子所處而强梁者居之然唯云南北不云東西者鄭沖云是必南北互舉蓋與東西俗同故不言也朱子曰祍席也金戈兵之屬革甲胄之屬北方風氣剛徑故以果敢之力勝人為强强者之事也故君子和而不流强哉矯中立而不倚强哉矯國有道不變塞焉强哉矯國無道至死不變强哉矯釋文矯居表反倚依彼反徐其蟻反鄭氏康成曰此抑女之强也流猶移也塞猶實也國有道不變以趨時國無道不變以辟害有道無道一也矯强貌塞或為色孔疏此抑女之强也何以知之上文既說三種之强又見南方之强又見北方之强唯抑而之强未見故知此經所云者是抑女之强也云流移也者以其性和同必流移隨物合和而不移亦中庸之德也云國有道不變以趨時者國雖有道不能隨逐物以求榮利今不改變己志以趨㑹於時也云矯强貌者矯是壯大之形故云强貌也孔氏穎達曰故君子和而不流强哉矯此以下皆述中國之强也流移也矯亦强貌也不為南北之强故性行和合而不流移心行强哉形貌矯然中立而不倚强哉矯者中正獨立而不偏倚志意强哉形貌矯然國有道不變塞焉强哉矯者若國有道守直不變德行充實志意强哉形貌矯然國無道至死不變强哉矯者若國之無道守善至死性不改變志意强哉形貌矯然朱子曰此四者汝之所當强也矯强貌詩曰矯矯虎臣是也倚偏著也塞未逹也國有道不變未逹之所守國無道不變平生之所守也此則所謂中庸之不可能者非有以自勝其人欲之私不能擇而守也君子之强孰大於是夫子以是告子路者所以抑其血氣之剛而進之以德義之勇也右第十章子曰素隱行怪後世有述焉吾弗為之矣鄭氏康成曰素讀如攻城攻其所傃之傃孔疏司馬法文傃猶鄉也言方鄉辟害隱身而行佹譎以作後世名也孔疏言身隱而行佹譎以作後世之名若許由洗耳之屬是也弗為之矣恥之也孔氏穎逹曰子曰至天地此一節論夫子雖隱遁之世亦行中庸又明中庸之道初則起於匹夫匹婦終則遍於天地素隱行怪後世有述焉者素鄉也謂無道之世身鄉幽隱之處應須靜默若行怪異之事求立功名使後世有所述焉吾弗為之矣者恥之也如此之事我不能為之以其身雖隱遁而名欲彰也朱子曰素案漢書當作索蓋字之誤也索隱行怪言深求隱僻之理而過為詭異之行也然以其足以欺世而盜名故後世或有稱述之者此知之過而不擇乎善行之過而不用其中不當强而强者也聖人豈為之哉君子遵道而行半塗而廢吾弗能已矣鄭氏康成曰廢猶罷止也弗能已矣汲汲行道不為時人之隱行孔疏謂作佹譎求名是也君子以隱終始行道不能止也孔氏穎達曰君子遵道而行半塗而廢者言君子之人初既遵循道德而行當須行之終竟今不能終竟猶如人行於道路半塗而自休廢廢猶罷止也吾弗能已矣已猶止也吾弗能如時人半塗而休止言汲汲行道無休已也朱子曰遵道而行則能擇乎善矣半塗而廢則力之不足也此其知雖足以及之而行有不逮當强而不强者也已止也聖人於此非勉焉而不敢廢蓋至誠無息自有所不能止也君子依乎中庸遁世不見知而不悔唯聖者能之釋文遁本又作遁同徒頓反鄭氏康成曰言隱者當如此也唯舜為能如此孔疏知者史記云舜耕於歷山漁於雷澤陶於河濵是不見知而不悔孔氏穎達曰言君子依行中庸之德若值時無道隱遁於世雖有才德不為時人所知而無悔恨之心如此者非凡人所能唯聖者能然若不能依行中庸者雖隱遁於世不為人所知則有悔恨之心也朱子曰不為索隱行怪則依乎中庸而已不能半塗而廢是以遁世不見知而不悔也此中庸之成德知之盡仁之至不賴勇而裕如者正吾夫子之事而猶不自居也故曰唯聖者能之而已右第十一章子思所引夫子之言以明首章之義者止此蓋此篇大㫖以知仁勇三逹德為入道之門故於篇首即以大舜顔淵子路之事明之舜知也顔淵仁也子路勇也三者廢其一則無以造道而成德矣餘見第二十章君子之道費而隱釋文費本又作拂同扶弗反徐音弗朱注費符未反鄭氏康成曰言可隱之節也費猶佹也道不費則仕孔氏穎達曰君子之道費而隱注云言可隱之節費猶佹也言君子之人遭值亂世道德違費則隱而不仕若道之不費則當仕也朱子曰費用之廣也隱體之微也夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉釋文與音預作案朱本合下二節一節鄭氏康成曰與讀為贊者皆與之與言匹夫匹婦愚耳亦可以其與有所知可以其能有所行者以其知行之極也聖人有不能如此舜好察邇言由此故與孔疏士冠禮文其饗冠者贊者皆與謂干與也云舜好察邇言由此故與者即愚夫愚婦有所識知故也與語助也孔氏穎達曰夫婦之愚可以與知焉者言天下之事千端萬緒或細小之事雖夫婦之愚偶然與知其善惡若芻蕘之言有可聽用故云與知及其至也雖聖人亦有所不知焉者言道之至極如造化之理雖聖人不知其所由故云及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉以行之至極故也前文據其知此文據其行以其知行有異故别起其文但知之易行之難知之易故上文云夫婦之愚行之難故此經云夫婦之不肖不肖勝於愚也及其至也雖聖人亦有所不能焉者知之與行之皆是至極既是至極故聖人有不能也天地之大也人猶有所憾釋文憾本又作感胡暗反鄭氏康成曰憾恨也天地至大無不覆載人尚有所恨焉况於聖人能盡備之乎孔氏穎逹曰天地之大也人猶有所憾者憾恨也言天地至大無物不養無物不覆載如冬寒夏暑人猶有怨恨之猶如聖人之德無善不包人猶怨之是不可備也中庸之道於理為難大小兼包始可以備也故君子語大天下莫能載焉語小天下莫能破焉鄭氏康成曰語猶說也所說大事謂先王之道也所說小事謂若愚不肖夫婦之知行也聖人盡兼行孔疏謂兼行大小之事小事則愚夫愚婦所知行大事則先王之道前文云雖聖人有所不知不能此云大事聖人兼行之者前云有所不知不能謂於小事不勝匹夫匹婦耳非謂大事不能也故此云盡兼行之孔氏穎達曰故君子語大天下莫能載焉者語說也大謂先王之道言君子語說先王之道其事既大天下之人無能勝載之者語小天下莫能破焉者若說細碎小事謂愚不肖事既纎細天下之人無能分破之者言事似秋毫不可分破也朱子曰君子之道近自夫婦居室之閒遠而至於聖人天地之所不能盡其大無外其小無內可謂費矣然其理之所以然則隱而莫之見也蓋可知可能者道中之一事及其至而聖人不知不能則舉全體而言聖人固有所不能盡也侯氏曰聖人所不知如孔子問禮問官之類所不能如孔子不得位堯舜病博施之類愚謂人所憾於天地如覆載生成之偏及寒暑災祥之不得其正者詩云鳶飛戾天魚躍于淵言其上下察也釋文鳶悅專反戾力計呂結二反躍羊灼反鄭氏康成曰察猶著也言聖人之德至於天則鳶飛戾天至於地則魚躍于淵是其著明於天地也孔氏穎逹曰鳶飛戾天魚躍于淵言其上下察也者此大雅旱麓之篇美文王之詩引之者言聖人之德上至於天則鳶飛戾天是翺翔得所聖人之德下至於地則魚躍于淵是游泳得所言聖人之德上下明察詩本文云鳶飛戾天喻惡人遠云魚躍于淵喻善人得所此引斷章故與詩義有異也朱子曰詩大雅旱麓之篇鳶鴟類戾至也察著也子思引此詩以明化育流行上下昭著莫非此理之用所謂費也然其所以然者則非見聞所及所謂隱也故程子曰此一節子思喫緊為人處活潑潑地讀者其致思焉君子之道造端乎夫婦及其至也察乎天地釋文造在老反鄭氏康成曰夫婦謂匹夫匹婦之所知所行孔氏穎逹曰君子之道造端乎夫婦者言君子行道初始造立端緒起於匹夫匹婦之所知所行者及其至也察乎天地者言雖起於匹夫匹婦所知所行及其至極之時明察於上下天地也朱子曰結上文右第十二章子思之言蓋以申明首章道不可離之意也其下八章雜引孔子之言以明之子曰道不遠人人之為道而遠人不可以為道鄭氏康成曰言道即不遠於人人不能行也孔氏穎逹曰子曰道不遠人至險以僥幸此一節明中庸之道去人不遠但行於己則外能及物道不遠人者言中庸之道不遠離於人身但人能行之於己則是中庸也人之為道而遠人不可以為道言人為中庸之道當附近於人謂人所能行則己所行可以為道若違理離遠則不可施於已又不可行於人則非道也故云人之為道而遠人不可以為道也朱子曰道者率性而已固衆人之所能知能行者也故常不遠於人若為道者厭其卑近以為不足為而反務為髙遠難行之事則非所以為道矣詩云伐柯伐柯其則不遠執柯以伐柯睨而視之猶以為遠釋文柯古何反睨徐音詣睥睨也案朱本合下節作一節鄭氏康成曰則法也言持柯以伐木將以為柯近以柯為尺寸之法此法不遠人人尚遠之明為道不可以遠孔氏穎逹曰詩云伐柯伐柯其則不遠執柯以伐柯睨而視之猶以為遠此豳風伐柯之篇美周公之詩柯斧柄也周禮云柯長三尺博三寸則法也言伐柯斫也柯柄長短其法不遠也但執柯睨而視之猶以為遠言欲行其道於人其法亦不遠但近取法於身何異持柯以伐柯人猶以為遠明為道之法亦不可以遠即所不願於上無以交於下所不願於下無以事上况是在身外於他人之處欲以為道何可得乎明行道在於身而求道也故君子以人治人改而止鄭氏康成曰言人有罪過君子以人道治之其人改則止赦之不責以人所不能孔氏穎逹曰故君子以人治人改而止者以道去人不遠言人有過君子當以人道治此有過之人改而止若人自改而休止不須更責不能之事若人所不能則已亦不能是行道在於已身也朱子曰詩豳風伐柯之篇柯斧柄則法也睨邪視也言人執柯伐木以為柯者彼柯長短之法在此柯耳然猶有彼此之别故伐者視之猶以為遠也若以人治人則所以為人之道各在當人之身初無彼此之别故君子之治人也即以其人之道還治其人之身其人能改即止不治蓋責之以其所能知能行非欲其遠人以為道也張子所謂以衆人望人則易從是也忠恕違道不遠施諸已而不願亦勿施於人鄭氏康成曰違猶去也孔氏穎逹曰忠恕違道不遠者忠者內盡於心恕者外不欺物恕忖也忖度其義於人違去也言身行忠恕則去道不遠也施諸已而不願亦勿施於人者諸於也他人有一不善之事施之於已已所不願亦勿施於人人亦不願故也朱子曰盡已之心為忠推已及人為恕違去也如春秋傳齊師違榖七里之違言自此至彼相去不遠非背而去之之謂也道即其不遠人者是也施諸已而不願亦勿施於人忠恕之事也以已之心度人之心未嘗不同則道之不遠於人者可見故已之所不欲則勿以施之於人亦不遠人以為道之事張子所謂以愛已之心愛人則盡仁是也君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也案朱本合下二節作一節鄭氏康成曰聖人而曰我未能明人當勉之無已孔氏穎逹曰所求乎子以事父未能也言此四者欲明求之於他人必先行之於已欲求其子以孝道事已已須以孝道事父母故云所求乎子以事父未能也恐人未能行之夫子聖人聖人猶曰我未能行凡人當勉之無已所求乎臣以事君未能也譬如已是諸侯欲求於臣以忠事已已當先行忠於天子及廟中事尸是全臣道也所求乎朋友先施之未能也欲求朋友以恩惠施已則已當先施恩惠於朋友也庸德之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言釋文行行皆下孟反或一讀皆如字鄭氏康成曰庸猶常也言德常行也言常謹也聖人之行實過於人有餘不敢盡常為人法從禮也孔氏穎達曰庸德之行庸言之謹庸常也謂自修已身常以德而行常以言而謹也有所不足不敢不勉謂已之才行有所不足之處不敢不勉而行之有餘不敢盡謂已之才行有餘於人常持謙退不敢盡其才行以過於人言顧行者使言不過行恆顧視於行行顧言者使行副於言謂恆顧視於言也君子胡不慥慥爾釋文慥七到反鄭氏康成曰君子謂衆賢也慥慥守實言行相應之貌孔氏穎達曰君子胡不慥慥爾慥慥守實言行相應之貌胡猶何也既顧言行相副君子何得不慥慥然守實言行相應之道也朱子曰求猶責也道不遠人凡已之所以責人者皆道之所當然也故反之以自責而自修焉庸平常也行者踐其實謹者擇其可德不足而勉則行益力言有餘而訒則謹益至謹之至則言顧行矣行之力則行顧言矣慥慥篤實貌言君子之言行如此豈不慥慥乎贊美之也凡此皆不遠人以為道之事張子所謂以責人之心責已則盡道是也右第十三章道不遠人者夫婦所能丘未能一者聖人所不能皆費也而其所以然者則至隱存焉下章放此君子素其位而行不願乎其外素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難君子無入而不自得焉釋文難乃旦反入案朱本分不願乎其外節君子無而不自得焉節作二節鄭氏康成曰素皆讀為傃不願乎其外謂思不出其位也自得謂所鄉不失其道孔氏穎逹曰君子素其位而行不願乎其外至行乎患難素鄉也鄉其所居之位而行其所行之事不願行在位外之事論語云君子思不出其位也鄉富貴之中行道於富貴謂不驕不淫也鄉貧賤之中則行道於貧賤謂不諂不懾也鄉夷狄之中行道於夷狄夷狄雖陋亦隨其俗而守道不改鄉患難之中行道於患難而臨危不傾守死於善道也君子無入而不自得焉者言君子所入之處皆守善道朱子曰素猶見在也言君子但因見在所居之位而為其所當為無慕乎其外之心也此言素其位而行也案此句注素富貴節特篇內朱注數節中有渾圇一語莫辨何屬者注明此句注某節大學倣此在上位不陵下在下位不援上釋文援音園一案朱本合下節作節鄭氏康成曰援謂牽持之也孔氏穎達曰在上位不陵下此素富貴行富貴也若身處富貴依我常正之性不使富貴以陵人若以富貴陵人是不行富貴之道在下位不援上者此素貧賤行貧賤也援牽持也若身處貧賤則安之宜令自樂不得援牽富貴若以援牽富貴是不行貧賤之道正已而不求於人則無怨上不怨天下不尤人釋文已音紀怨於願反又於元反鄭氏康成曰無怨人無怨之者也論語曰君子求諸已小人求諸人孔氏穎達曰正已而不求於人則無怨此素夷狄行夷狄也若身入夷狄夷狄無禮義當自正已而行不得求於彼人則彼人無怨已者論語云言忠信行篤敬雖之夷狄不可棄上不怨天下不尤人此素患難行患難也尤過也責也苟皆應之患難則亦甘為不得上怨天下尤人故論語云不怨天不尤人是也朱子曰此言不願乎其外也故君子居易以俟命小人行險以徼幸釋文易以豉反徼古堯反案徼朱本從僥鄭氏康成曰易猶平安也俟命聼天任命也險謂傾危之道孔氏穎逹曰故君子居易以俟命者易謂平安也言君子以道自處恆居平安之中以聼待天命也小人行險以徼幸小人以惡自居恆行險難傾危之事以徼求榮幸之道論語曰不仁者不可以久處約是也朱子曰易平地也居易素位而行也俟命不願乎外也徼求也幸謂所不當得而得者子曰射有似乎君子失諸正鵠反求諸其身釋文正音征鵠古毒反正鵠皆鳥名也一曰正正也鵠直也大射則張皮侯而棲鵠賔射張布侯而設正也鄭氏康成曰反求於其身不以怨人畫布曰正棲皮曰鵠孔氏穎達曰子曰至妻帑以上言行道在於已身故此一節覆明行道在身之事以射譬之射有似乎君子者言凡人之射有似乎君子之道失諸正鵠反求諸其身者諸於也求責也正謂賔射之侯鵠謂大射之侯言射者失於正鵠謂失不中正鵠不責他人反鄉自責其身言君子之人失道於外亦反自責於已朱子曰畫布曰正棲皮曰鵠皆侯之中射之的也子思引此孔子之言以結上文之意右第十四章子思之言也凡章首無子曰字者放此君子之道辟如行遠必自邇辟如登高必自卑釋文辟音譬邇音爾卑音婢又如字鄭氏康成曰自從也邇近也行之以近者卑者始以漸致之高遠孔氏穎達曰君子行道辟如行遠必自邇辟如登高必自卑者自從也邇近也卑下也行之以遠者近之始升之以高者卑之始言以漸至高遠不云近者遠始卑者高始但勤行其道於身然後能被於物而可謂之高遠耳詩曰妻子好合如鼓瑟琴兄弟既翕和樂且耽宜爾室家樂爾妻帑釋文好呼報反翕許急反樂音洛下同耽丁南反帑音奴子孫也本又作孥同尚書傳毛詩箋並云子也杜預注左傳云妻子也朱注耽詩作湛亦音耽鄭氏康成曰琴瑟聲相應和也翕合也耽亦樂也古者謂子孫曰帑此詩言和室家之道自近者始孔氏穎達曰詩云妻子好合如鼓瑟琴兄弟既翕和樂且耽此小雅棠棣之篇美文王之詩記人引此者言行道之法自近始猶如詩人之所云欲和遠人先和其妻子兄弟故云妻子好合情意相得如似鼓彈瑟與琴音聲相和也兄弟盡皆翕合情意和樂且復耽之耽之者是相好之甚也宜爾室家樂爾妻帑者宜善爾之室家愛樂爾之妻帑帑子也古者謂子孫為帑故甘誓云豫則帑戮汝於人則妻子為帑於鳥則鳥尾為帑左傳云以害鳥帑是也朱子曰詩小雅棠棣之篇鼓瑟琴和也翕亦合也耽亦樂也帑子孫也子曰父母其順矣乎鄭氏康成曰謂其教令行使室家順孔氏穎達曰因上和於遠人先和室家故此一節次之父母其順矣乎謂父母能以教令行乎室家其和順矣乎言中庸之道先使室家和順乃能和順於外即上云道不遠施諸已朱子曰夫子誦此詩而贊之曰人能和於妻子宜於兄弟如此則父母其安樂之矣子思引詩及此語以明行遠自邇登高自卑之意右第十五章子曰鬼神之為德其盛矣乎視之而弗見聼之而弗聞體物而不可遺案朱本分其盛矣乎節體物而不可遺節作二節鄭氏康成曰體猶生也可猶所也不有所遺言萬物無不以鬼神之氣生也孔氏穎達曰子曰至此夫此一節明鬼神之道無形而能顯著誠信中庸之道與鬼神之道相似亦從微至著不言而自誠也體物而不可遺者體猶生也可猶所也言萬物生而有形體故云體物而不可遺者言鬼神之道生養萬物無不周遍而不有所遺言萬物無不以鬼神之氣生也朱子曰程子曰鬼神天地之功用而造化之迹也張子曰鬼神者二氣之良能也愚謂以二氣言則鬼者隂之靈也神者陽之靈也以一氣言則至而伸者為神反而歸者為鬼其實一物而已為德猶言性情功效鬼神無形與聲然物之終始莫非隂陽合散之所為是其為物之體而物所不能遺也其言體物猶易所謂幹事使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右釋文齊側皆反本亦作齊洋音羊鄭氏康成曰明猶潔也洋洋人想思其傍僾之貌孔氏穎達曰使天下之人齊明盛服以承祭祀者明猶潔也言鬼神能生養萬物故天下之人齊戒明潔盛飾衣服以承祭祀洋洋乎如在其上如在其左右者言鬼神之形狀人想像之如在人之上如在人之左右想見其形也朱子曰齊之為言齊也所以齊不齊而致其齊也明猶潔也洋洋流動充滿之意能使人畏敬奉承而發見昭著如此乃其體物而不可遺之驗也孔子曰其氣發揚於上為昭明焄蒿悽愴此百物之精也神之著也正謂此爾詩曰神之格思不可度思矧可射思釋文格古百反度待洛反矧詩忍反射音亦朱注射詩作斁鄭氏康成曰格來也矧况也射厭也思皆聲之助言神之來其形象不可億度而知事之盡敬而已况可厭倦乎孔氏穎達曰神之格思不可度思矧可射思者格來也思辭也矧況也射厭也此大雅抑之篇刺厲王之詩詩人刺時人祭祀懈倦故云神之來至以其無形不可度知恆須恭敬況於祭祀之末可厭倦之乎言不可厭倦也記者引詩明鬼神之所尊敬也朱子曰詩大雅抑之篇格來也矧況也射厭也言厭怠而不敬也思語辭夫微之顯誠之不可掩如此夫釋文掩音掩於檢反夫音扶鄭氏康成曰言神無形而著不言而誠孔氏穎達曰夫微之顯者言鬼神之狀微昧不見而精靈與人為吉凶是從微之顯也誠之不可掩者言鬼神誠信不可掩蔽善者必降之以福惡者必降之以禍如此夫者此詩人所云何可厭倦夫語助也此鬼神即與易繫辭云是故知鬼神之情狀與天地相似以能生萬物也案彼注木火之神生物金水之鬼終物彼以春夏對秋冬故以春夏生物秋冬終物其實鬼神皆能生物終物也故此云體物而不可遺此雖說隂陽鬼神人之鬼神亦附隂陽之鬼神故此云齊明盛服以承祭祀是兼人之鬼神也朱子曰誠者真實無妄之謂隂陽合散無非實者故其發見之不可掩如此右第十六章不見不聞隱也體物如在則亦費矣此前三章以其費之小者而言此後三章以其費之大者而言此一章兼費隱包小大而言子曰舜其大孝也與德為聖人尊為天子富有四海之內宗廟饗之子孫保之釋文與音餘鄭氏康成曰保安也孔氏穎逹曰子曰至受命此一節明中庸之德故能富有天下受天之命也子孫保之者師說云舜禪與禹何言保者此子孫承保祭祀故云保周時陳國是舜之後朱子曰子孫謂虞思陳胡公之屬故大德必得其位必得其祿必得其名必得其壽鄭氏康成曰名令聞也孔氏穎達曰故大德必得其位者以其德大能覆養天下故必得其位如孔子有大德而無其位以不應土録雖有大德而無其位也案援神契云丘為制法主黑緑不代蒼黃言孔子黑龍之精不合代周家木德之蒼也孔演圖又云聖人不空生必有所制以顯天心丘為木鐸制天下法是也必得其壽者據舜言之而夫子不長壽以勤憂故也朱子曰舜年百有十歲故天之生物必因其材而篤焉案朱本合下節作一節鄭氏康成曰材謂其質性也篤厚也言善者天厚其福惡者天厚其毒皆由其本而為之孔氏穎逹曰故天之生物必因其材而篤焉材謂質性也篤厚也言天之所生隨物質性而厚之善者因厚其福舜禹是也惡者因厚其毒桀紂是也故四凶黜而舜受禪也故栽者培之傾者覆之釋文栽依注音災將才反植也培蒲回反覆芳伏反鄭氏康成曰栽讀如文王初載之載栽猶殖也培益也今時人名草木之植曰栽築牆立版亦曰栽栽或為兹覆敗也孔疏栽讀如文王初載之載者案詩大明云文王初載天作之合彼注云載識也言文王生適有所識天為之生配謂生大姒此載為栽殖者載容兩義亦得為識亦得為殖此對傾者覆之故以為殖云築牆立版亦曰栽者案莊二十九年左傳云水昏正而栽謂立版築也孔氏穎達曰故栽者培之者栽殖也培益也言道德自能豐殖則天因而培益之傾者覆之者若無德自取傾危者天亦因而覆敗之也朱子曰材質也篤厚也栽植也氣至而滋息為培氣反而游散則覆詩曰嘉樂君子憲憲令德宜民宜人受祿于天保佑命之自天申之故大德者必受命釋文嘉戶嫁反詩本作假音同假嘉也皇音加善也憲音顯一音如字佑音祐二案朱本分自天申之節必受命節作節鄭氏康成曰憲憲興盛之貌保安也佑助也孔氏穎達曰嘉樂君子憲憲令德此大雅嘉樂之篇美成王之詩嘉善也憲憲興盛之貌詩人言善樂君子此成王憲憲然有令善之德案詩本文憲憲為顯顯與此不同者齊魯韓詩與毛詩不同故也宜民宜人受祿于天保佑命之自天申之故大德者必受命者宜民謂宜養萬民宜人謂宜官人其德如此故受福于天佑助也保安也天乃保安佑助命之為天子又申重福之作記者引證大德必受命之義則舜之為也朱子曰詩大雅假樂之篇假當依此作嘉憲當依詩作顯申重也受命者受天命為天子也右第十七章此由庸行之常推之以極其至見道之用廣也而其所以然者則為體微矣後二章亦此意子曰無憂者其唯文王乎以王季為父以武王為子父作之子述之案唯朱本從惟鄭氏康成曰聖人以立法度為大事子能述成之則何憂乎堯舜之父子則有凶頑禹湯之父子則寡令聞父子相成唯有文王孔氏穎逹曰子曰至一也此一節明夫子論文王武王聖德相承王有天下上能追尊大王王季因明天子以下及士庶人葬祭祀之禮各隨文解之以王季為父以武王為子父作之子述之者言文王以王季為父則王季能制作禮樂文王奉而行之文王以武王為子武王又能述成文王之道故無憂也朱子曰此言文王之事書言王季其勤王家蓋其所作亦積功纍仁之事也武王纘大王王季文王之緒一戎衣而有天下身不失天下之顯名尊為天子富有四海之內宗廟饗之子孫保之釋文纘徐音纂哉管反大音泰下大王同一戎衣依注衣作殷於巾反謂一用兵伐殷也尚書依字讀為一著戎衣而天下大定鄭氏康成曰纘繼也緒業也戎兵也衣讀如殷聲之誤也齊人言殷聲如衣虞夏商周氏者多矣今姓有衣者殷之胄與一戎殷者一用兵伐殷也孔疏案尚書武成云一戎衣謂一著戎衣而滅殷此云一者以經武王繼大王王季文王三人之業一用滅殷對三人之業為一耳由三人之業故一身滅之鄭必以衣為殷者以十一年觀兵于孟津十三年滅紂是再著戎服不得稱一戎衣故以衣為殷故注云齊人言殷聲如衣孔氏穎達曰武王纘大王王季文王之緒者纘繼也緒業也言武王能纘繼父祖之業以王天下也一戎衣而有天下者戎兵也言一用兵伐殷而勝之也朱子曰此言武王之事纘繼也大王王季之父也書云大王肇基王迹詩云至于大王實始翦商緒業也戎衣甲胄之屬一戎衣武成文言一著戎衣以伐紂也武王末受命周公成文武之德追王大王王季上祀先公以天子之禮斯禮也逹乎諸侯大夫及士庶人父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫期之喪逹乎大夫三年之喪逹乎天子父母之喪無貴賤一也釋文末亡遏反追王于況反期音基鄭氏康成曰末猶老也追王大王王季者以王迹起焉先公組紺以上至后稷也斯禮逹於諸侯大夫士庶人者謂葬之從死者之爵祭之用生者之祿也言大夫葬以大夫士葬以士則追王者改葬之矣期之喪逹於大夫者謂旁親所降在大功者其正統之期天子諸侯猶不降也大夫所降天子諸侯絶之不為服所不臣乃服之也承葬祭說期三年之喪者明子事父以孝不用其尊卑變孔疏末猶老也者謂文王受命十一年武王觀兵于孟津白魚入王舟是老而受命受命後七年而崩故鄭注洛誥文王受赤雀武王俯取白魚皆七年是也云追王大王王季者以王迹起焉案詩頌閟宮云大王居岐之陽實始翦商是王迹起也云先公組紺以上至后稷也者組紺大王之父一名諸盩周本紀云亞圉卒子大公叔穎立太公卒子古公亶父立又世本云亞圉雲生大公組紺諸盩則叔穎組紺諸盩是一人也此又云追王大王王季上祀先公則先公之中包后稷也故云組紺以上至后稷也案司服云享先王則衮冕先公則鷩冕以后稷為周之始祖祫祭于廟當同先王用衮則先公無后稷也故鄭注司服云先公不窋至諸盩若四時常祀雖后稷及大王王季之等不得廣及先公故天保云禴祠蒸嘗于公先王是四時常祀但有后稷諸盩以下故鄭注天保云先公謂后稷至諸盩此皆盡望經上下釋義故不同或有至字誤也云則追王者改葬之矣者以大王王季身為諸侯葬從死者之爵則大王王季祗得為諸侯葬禮不得言追王從天子法故知追王之時而更改葬用天子禮案大傳云武王追王大王亶父王季歷此云周公追王不同者武王既伐紂追王布告天下周公追而改葬故不同也云期之喪逹乎大夫者謂旁親所降在大功者熊氏云此對天子諸侯故云期之喪逹乎大夫其實大夫為大功之喪得降小功小功之喪得降緦麻是大功小功皆逹乎大夫熊氏又云天子為正統之喪適婦大功適孫之婦小功義或然但無正文耳云所不臣乃服之也者喪服傳云始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟但不臣者皆以本服服也案雖后稷及大王王季之等雖疑當作唯孔氏穎達曰武王末受命此美周公之德也末猶老也謂武王年老而受命平定天下也斯禮也逹乎諸侯大夫及士庶人者斯此也言周公追崇先公之禮非直天子所行乃下逹於諸侯大夫士庶人等無問尊卑皆得上尊祖父以己之祿祭其先人猶若周公以成王天子之禮祀其先公也父為大夫子為士葬以大夫祭以士者謂父既為大夫祭以士禮貶其先人而云尊之者欲明以己之祿祀其先人也期之喪逹乎大夫者欲見大夫之尊猶有期喪為旁親所降在大功者得為期喪還著大功之服故云逹乎大夫若天子諸侯旁期之喪則不為服也三年之喪逹乎天子者謂正統在三年之喪父母及嫡子并妻也逹乎天子者言天子皆服之不云父母而云三年者包嫡子也天子為后服期以三年包之者以后卒必待三年然後娶所以逹子之志故通在三年之中是以昭十五年左傳云穆后崩太子壽卒叔向云王一歲而有三年之喪二焉是包后為三年也直云逹乎天子不云諸侯者諸侯旁親尊同則不降故喪服大功章云諸侯為姑姊妹嫁於國君者是也父母之喪無貴賤一也唯父母之喪無問天子及士庶人其服並同故云無貴賤一也朱子曰此言周公之事末猶老也追王蓋推文武之意以及乎王迹之所起也先公組紺以上至后稷也上祀先公以天子之禮又推大王王季之意以及於無窮也制為禮法以及天下使葬用死者之爵祭用生者之祿喪服自期以下諸侯絶大夫降而父母之喪上下同之推已以及人也右第十八章子曰武王周公其達孝矣乎夫孝者善繼人之志善述人之事者也春秋修其祖廟陳其宗器設其裳衣薦其時食案朱本分其逹孝矣乎節善述人之事者也節薦其時食節作三節鄭氏康成曰修謂掃糞也宗器祭器也裳衣先祖之遺衣服也設之當以授尸也時食四時祭也孔氏穎達曰子曰至掌乎以前經論文王武王聖德相承此論武王周公上成先祖修其宗廟行郊社之禮所以能治國如置物掌中也各隨文解之夫孝者善繼人之志者人謂先人若文王有志伐紂武王能繼而承之尚書武成曰豫小子其承厥志是善繼人之志也善述人之事者也言文王有文德為王基而周公制禮以贊述之故洛誥云考朕昭子刑乃單文祖德是善述人之事也此是武王周公逹孝之事朱子曰達通也承上章而言武王周公之孝乃天下之人通謂之孝猶孟子之言逹尊也上章言武王纘大王王季文王之緒以有天下而周公成文武之德以追崇其先祖此繼志述事之大者也下文又以其所制祭祀之禮通於上下者言之祖廟天子七諸侯五大夫三適士二官師一宗器先世所藏之重器若周之赤刀大訓天球河圖之屬也裳衣先祖之遺衣服祭則設之以授尸也時食四時之食各有其物如春行羔豚膳膏香之類是也宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也旅酬下為上所以逮賤也燕毛所以序齒也釋文昭常遙反穆又作繆音同逮本又作遝同音代燕於見反朱注為去聲鄭氏康成曰序猶次也爵謂公卿大夫士也事謂薦羞也以辨賢者以其事别所能也若司徒奉牛宗伯共雞牲矣文王世子曰宗廟之中以爵為位崇德也宗人授事以官尊賢也旅酬下為上者謂若特牲饋食之禮賔弟子兄弟之子各舉觶於其長也逮賤者宗廟之中以有事為榮也燕謂既祭而燕也燕以髮色為坐祭時尊尊也至燕親親也齒亦年也孔氏穎逹曰宗廟之禮所以序昭穆也者若昭與昭齒穆與穆齒是也序爵所以辨貴賤也者序謂序次爵謂公卿大夫士也謂祭祀之時公卿大夫各以其爵位齒列而助祭祀是辨貴賤也故文王世子云宗廟之中以爵為位崇德也宗人授事以官尊賢也是也序事所以辨賢也者事謂薦羞也序謂次序所供祭祀之事若司徒奉牛司馬奉羊宗伯共雞是分别賢能堪任其官也旅酬下為上所以逮賤也者旅衆也逮及也謂祭末飲酒之時使一人舉觶之後至旅酬之時使卑者二人各舉觶於其長者卑下者先飲是下者為上賤者在先是恩義先及於賤者故云所以逮賤也案特牲饋食之禮主人洗爵獻長兄弟獻衆兄弟之後衆賔弟子於西階兄弟弟子於東階各舉觶於其長也弟子等皆是下賤而得舉觶是有事於宗廟之中是其榮也又制受爵是逮賤也燕毛所以序齒也者言祭末燕時以毛髮為次序是所以序年齒也故注云燕謂既祭而燕也燕以髮色為坐祭時尊尊也至燕親親也朱子曰宗廟之次左為昭右為穆而子孫亦以為序有事於大廟則子姓兄弟羣昭羣穆咸在而不失其倫焉爵公侯卿大夫也事宗祝有司之職事也旅衆也酬導飲也旅酬之禮賔弟子兄弟之子各舉觶於其長而衆相酬蓋宗廟之中以有事為榮故逮及賤者使亦得以申其敬也燕毛祭畢而燕則以毛髮之色别長幼為坐次也齒年數也踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也鄭氏康成曰踐猶升也其者其先祖也踐或為纘孔氏穎達曰踐其位行其禮者踐升也謂孝子升其先祖之位行祭祀之禮也朱子曰踐猶履也其指先王也所尊所親先王之祖考子孫臣庶也始死謂之死既葬則曰反而亡焉皆指先王也此結上文兩節皆繼志述事之意也郊社之禮所以事上帝也宗廟之禮所以祀乎其先也案朱本合下節作一節鄭氏康成曰社祭地神不言后土者省文明乎郊社之禮禘嘗之義治國其如示諸掌乎釋文示依注音置之䜴反鄭氏康成曰示讀如置諸河干之置置置也物而在掌中易為知力者也序爵辨賢尊尊親親治國之要孔氏穎達曰治國其如示諸掌乎注云示讀如置諸河干之置置置也者若能明此序爵辨賢尊親則治理其國其事為易猶如置物於掌中也朱子曰郊祭天社祭地不言后土者省文也禘天子宗廟之大祭追祭大祖之所自出於大廟而以大祖配之也嘗秋祭也四時皆祭舉其一耳禮必有義對舉之互文也示與視同視諸掌言易見也此與論語文意大同小異記有詳略耳右第十九章欽定禮記義疏卷六十六
