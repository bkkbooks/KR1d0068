body:
  text: 曲禮下第二之三為人臣之禮不顯諫三諫而不聽則逃之子之事親也三諫而不聽則號泣而隨之號户刀反正義鄭氏康成曰不顯諌為奪美也孔疏奪君美也顯眀也謂眀言其君惡不幾微也逃去也君臣有義則合無義則離子於親至親無去志在感動之孔氏頴達曰君臣有離合之義則待放而去父子天然理不可逃雖不聽則當號泣而隨之冀有悟而改也不云幾諫者略耳方氏慤曰仁之於父子義之於君臣義有所不為仁有所不忍臣之於君三諫不聽尚復留是固位也固位者義所不為子之於親三諫不聽苟遂絶則傷恩矣傷恩者仁所不為逃之以全其身義之盡也隨之以感其心仁之至也通論孔氏頴達曰案莊二十四年曹羈出奔陳公羊傳云戎將侵曹曹羈諫曰戎衆以無義君請勿自敵也曹伯不可三諫不從遂去之何休云諫有五一曰諷諫孔子是也案定十二年公羊傳云孔子以季氏之強謂季孫曰家不藏甲邑無百雉之城季孫聞之墮費邑二曰順諫曹羈是也案此即上諫曹君無以敵戎事三曰直諫子家駒是也案昭二十五年公羊傳云昭公將弒季氏子家駒諫曰諸侯僭於天子大夫僭於諸侯久矣是不辟君僭而言之四曰爭諫子反請歸是也案宣十五年公羊傳云楚莊王圍宋子反華元乘堙相對語華元謂子反云易子而食之析骸而炊之子反謂華元吾軍有七日之糧子反勸楚王赦宋而歸頻諫不聽乃引師去楚王亦歸五曰戇諫百里子蹇叔子是也案僖三十三年公羊傳云秦穆公將襲鄭百里子與蹇叔子諌穆公不從百里子蹇叔子從其子而哭之凡諫諷諫為上戇諫為下又曰檀弓云事君有犯故此論其微事親無犯故此論其犯亦互言耳餘論陳氏祥道曰諫不至於三而去則為屑去過三而不逃則為屑就然孔子之於魯百里奚之於虞未嘗諫而去龍逢之於夏比干之於殷則死於諫而不去何也蓋事有輕重勢有可否君子以禮為守以義為衡迹雖不同其道一也存異李氏格非曰為人臣之禮無顯諫而泄冶以諫死故書曰陳殺其大夫泄冶稱陳國以殺有罪也泄冶之罪何顯諫也三諫不聽則逃之可也案此一節記君親有過臣子處之之異朱子綱目於死諫者例書爵與之以泄冶為有罪而書殺非春秋之旨微子懿親無可去之道其去以存宗祀亦不可據以為三諫而去正法也君有疾飲藥臣先嘗之親有疾飲藥子先嘗之醫不三世不服其藥正義鄭氏康成曰嘗度其所堪不服其藥慎物齊也孔氏頴達曰父子相承至三世是慎物調齊矣通論呂氏大臨曰孔子之所慎齊戰疾疾者危事也危而不謹取禍之道也况君親之疾乎藥不瞑眩厥疾弗瘳則攻疾之藥未嘗無毒好惡或失其性齊量或失其宜寒熱補㵼或反其用小則益病甚則至於喪身為人臣子者不嘗試而用之不忠不孝莫大焉此許世子止以不嘗藥被弒君之名也醫至三世治人多矣用物熟矣功已試而無疑然後服之亦謹疾之道也方氏慤曰君於平居無事之時其膳也膳夫品嘗之太子親視之亦曰致其謹而已則於有疾之時尤所不可忽也醫之為術苟非祖父子孫傳業則術無自而精術之不精可服其藥乎周官司徒以世事教能者良以此也雖然經之所言亦道其常而已若失非傳業而或自得於心者未及三世固在所取也故周官醫師以十全為上或傳之非其人雖三世亦所不取也故孔子言無恆之人不可以作巫醫擬人必於其倫擬魚起反正義鄭氏康成曰擬猶比也倫猶類也比大夫當於大夫比士當於士不以其類則有所褻通論方氏慤曰禹稷顔回時不同矣孔子俱以為賢者為其道之倫而擬之也夷惠伊尹迹不同矣孟子俱以為聖者為其心之倫而擬之也子夏以有若似孔子徒擬之以貌而已不知聖賢之德不倫也公孫丑以管仲比孟子徒擬之以位而已不知王霸之業不倫也問天子之年對曰聞之始服衣若干尺矣問國君之年長曰能從宗廟社稷之事矣幼曰未能從宗廟社稷之事也問大夫之子長曰能御矣幼曰未能御也問士之子長曰能典謁矣幼曰未能典謁也問庶人之子長曰能負薪矣幼曰未能負薪也正義鄭氏康成曰天子既不敢言年又不敢斥至尊所能孔疏齒路馬有誅而至尊體貴故臣不可輕言君年及形長短與才技所堪故依違而對但云聞之謙不敢言見也國君以下皆言其能則長幼可知謁請也謂能擯贊出入以事請告也禮四十強而仕五十命為大夫孔疏引此釋所以不問大夫士庶人之身而問其子之義孔氏頴達曰逺方異域人來不知王年大小問朝廷之臣答之必有禮法古者謂數為若干故儀禮數射算云若干純若如也干求也言事不定常如此求之也國君幼少新立而他人問其臣不言聞之及衣辟天子也國保宗廟社稷故以所保答之問大夫之子者亦他國人問於大夫之臣也天子諸侯繼世象賢其年不定故問其年大夫五十乃爵故不問大夫而問其子舉其所能則長幼可知問士之子問士之屬吏也士賤無臣但以子自典告也案天子元士受地當亦有臣儀禮特牲家有司是也此云無臣蓋指未受地者言庶人謂府史之屬熊氏安生曰庶人年無長幼亦問其子者順上大夫士言之陳氏澔曰若如也干字從一從十凡數未定者或如一或如十顔注食貨志干箇也當如此箇數意亦近之又曰御謂御車也御者六藝之一幼則未能通論呂氏大臨曰少儀問國君之子幼則曰能御未能御此章則以能御未能御為大夫之子長幼蓋射御之學無貴賤之異也少儀問大夫之子長幼長則曰能從樂人之事矣幼則曰能正於樂人未能正於樂人此章言御不言樂者樂舞射御皆在所學少儀以國君之子言御故於大夫之子言樂互文也士有隸子弟則士之子將命典謁其職也方氏慤曰若干者干猶數也數其多少故曰干約其數故曰若則與投壺所言同義自國君而下貴賤雖各不同莫不有為以用事此重輕尊卑勞逸之别也陳氏祥道曰社稷之事德也御才也典謁事也負薪力也德不足則至於才才不足則至於事事不足則又至於力上下之勢然也叔孫穆子問庚宗婦人之姓對曰余子長矣能奉雉而從我矣然則於庶人之子對之以力亦若此也胡氏銓曰春秋傳曰會於沙隨之嵗寡君以生亦是問君之年存疑鄭氏康成曰御猶主也書曰越乃御事謂主事者孔疏官有世功子學父業故有御事之因孔氏頴達曰少儀云問士之子長幼長曰能耕幼曰未能負薪謂士祿薄子以農事為業與此不同者亦有田無田之異此所言是有田者故言典謁案記者各據所見聞故彼此互異不必強為之説也葉氏夢得曰國君之有土地人民其道主於忠孝故以宗廟社稷為對大夫非有土地人民而其職則帥人而尊上故以能御為對士則無往而不事人故言主典謁庶人則無時而不為人役故言主負薪此禮意存於稱謂之間也存異孔氏頴達曰人君十五而養子是十五以上為長十四以下為幼大夫子卑長幼以二十為限案鄭訓御事為主事陳氏澔訓御六藝之一駁陳者謂御雖藝之一而執役尢卑士子且典謁而大夫子但執御乎且少儀問國君之子長幼長曰能從社稷之事幼曰能御未能御豈國君之子乃執御乎駁鄭者又謂君為政臣從政從猶隨人主則專斷豈長則能從事幼則能主事耶蓋君之車惟御最親君不在車不敢曠左則御居君位而式晉公路常以卿大夫適子為之後世凡君所近用皆謂之御則君子之能御大約是可副二於君大夫子之能御大約是可任用於君也禮王及羣后之子皆入學其教不外六德六行六藝可謂國君之子不當執御耶况據駁鄭者説少儀幼者能御理不當以主事言則陳説是也鄭説附存以備一義問國君之富數地以對山澤之所出問大夫之富曰有宰食力祭器衣服不假問士之富以車數對問庶人之富數畜以對數地數畜之數色主反正義鄭氏康成曰皆在其所制以多少對宰邑士也食力謂民之賦稅孔氏頴達曰問謂問其臣也云富者非問其多金帛問最所優饒者也不問天子率土之物莫非王有也諸侯止一國故問之數地謂數土地廣狹山澤所出謂魚鹽蜃蛤金銀錫石之屬隨有而對也有宰眀有采地食力謂食下民租稅之力祭器衣服不假謂四命大夫也衣服祭服也四命大夫得自造祭器衣服若三命以下有田者造而不備士有地不多亦無邑宰故以車數對畜謂雞豚之屬閭師云凡庶民不畜者祭無牲通論應氏鏞曰天子富有四海固不必問其富國君受封於上有常制取賦於下有常奉亦不必言惟山澤所産無常其寶藏興廢原乎天其封殖浚導資乎人故數其所出以對既見其寶藏不窮且示其不求多於常賦之外也大夫有家臣受采地曰有宰則見其不親猥務曰食力則見其不爭民利祭器衣服不假則見其不侈於奉已而厚於奉先也士以車數見其命賜之厚庶人數畜見其畜牧之勤君子不苟於求富故財不妄取不驕於居富故財不濫用問對之間蓋有深意寓焉遊氏桂曰書五福二曰富後世學者以為五福不言貴貴非福也不知先王之制貴者必富賤者必貧富貴貧賤離而為四後世不能制祿之失也古者制公侯伯子男之爵則有公侯伯子男之地之富制大夫之爵則有大夫之地之富制士之爵則有士之車馬之數之富庶人無爵而有田則有雞豚狗彘之富所謂因爵以制其祿以馭其富也後世不然有封君之富而無一級之爵有公侯之貴而或乘牛車者皆失所以制祿之説也此經或受國則以地對或受官則以官對或受器則以器對或有車則以車對有田則以畜對若此者各視其爵以知其祿視其祿以知其富視其富以知其禮古人所以家天下正一統者用此道也存疑孔氏頴達曰上士三命得賜車馬副車隨命中士乘棧車無副車案副車隨命説不見所據巾車職雖有士乘棧車説而無中士眀文又彼疏謂士無二車與此疏同然據儀禮既夕記云二車白狗攝服是士有二車之眀證也彼疏謂在喪故用之而未能眀其所以用之之故或自為曲護之辭也天子祭天地祭四方祭山川祭五祀嵗遍諸侯方祀祭山川祭五祀嵗遍大夫祭五祀嵗遍士祭其先正義鄭氏康成曰祭四方謂祭五官之神於四郊也勾芒在東祝融后土在南蓐收在西玄冥在北詩云來方禋祀孔疏引詩論成王年豐報祭招來四方之神禋潔祭祀證四方之義也方祀者各祭其方之官而已五祀户竈中霤門行也孔氏頴達曰自此至告於宗子論天子以下祭祀尊卑不同并神有廢置之事天地有覆載大功天子主有四海故得總祭天地以報其功呂氏大臨曰自天子達於庶人皆得祭其先惟於士言者舉輕以眀重且言士有不得祭者也案此統言祭祀之禮上可以該乎下下不可以僭乎上也天子自天地至其先無不祭也諸侯則不敢祭天地并四方山川亦不全惟其方與國之山川大夫不及山川士則五祀并有不全者矣通論孔氏頴達曰祭山川者周禮兆五帝於四郊四望四類亦如之也祭五祀者春祭户夏祭竈季夏祭中霤秋祭門冬祭行也諸侯既不得祭天地又不總祭五方之神惟祀當方故云方祀祭山川者王制云在其地則祭之亡其地則不祭是也大夫不得方祀及山川直祭五祀而已五祀見月令大宗伯五祀以為五官者以其在五嶽之上此五祀在山川之下又與大夫同祭故知是户竈等士祭其先不言嵗遍者以士祭先祖嵗有四時更無餘神故也陳氏祥道曰先王之禮尊者事尊卑者事卑宜大者與宜小者别則曲禮天子祭天地至於士祭其先王制天子祭天地至於大夫祭五祀皆所以適其尊卑小大之宜也四方周禮所謂以羽舞舞四方之祭祀以疈辜祭四方百物是也山川周禮所謂以血祭祭五嶽以貍沈祭山林川澤王制所謂名山大川是也諸侯方祀春秋傳所謂三代命祀祭不越望是也山川王制所謂名山大川在其竟內是也於天子言天地則日月星辰司中司命風師雨師之類舉矣於天子言四方諸侯言方祀則社稷之類舉矣言山川則林澤丘陵墳衍之類舉矣於士言祭先則天子之先王諸侯之先公大夫之先祖舉矣儀禮言士禱五祀則士祭五祀矣此不言者以大夫主於五祀士主於祭先故也方氏慤曰天子言祭天地則知諸侯之祭社稷天子言祭四方則知諸侯之方祀為一方天子言祭山川於四方之下則知四方之山川也諸侯言祭山川於方祀之下則亦一方之山川而已大夫言祭五祀則不及山川可知士言祭其先則又不及於五祀可知祭天地則天下之事故於天子言之方祀則一國之事故於諸侯言之五祀則一家之事故於大夫言之祭先則一身之事故於士言之蓋德有隆殺故所祭之神有大小業有廣狹故所祭之神有逺近也存疑鄭氏康成曰此蓋殷時制也祭法曰天子立七祀諸侯立五祀大夫立三祀士立二祀謂周制也孔疏天子諸侯大夫同云祭五祀既無等差故疑殷制王制大夫祭五祀既有尊卑等級疑是周禮故引祭法五祀解之與此不同是有地大夫祭五祀無地大夫祭三祀也應氏鏞曰他書論五祀之禮自天子至士大略皆同獨祭法謂天子增至於七而大夫止於二故儒者疑焉然此篇亦謂士祭其先而不及五祀要之當時之士有上中下亦未可槩言由中以及乎上其力可為則禮必備士喪禮之所禱是也在下而未及乎中其力未裕而其禮或闕曲禮與祭法之所言是也其曰士祭其先與王制之所謂庶人祭於寢者等耳亦自天子之至貴等而下之以至下士之至微者歟存疑孔氏頴達曰天神有六祭之一嵗有九昊天上帝冬至祭之一也蒼帝靈威仰立春之日祭之於東郊二也赤帝赤熛怒立夏祭之於南郊三也黃帝含樞紐季夏六月土王祭之於南郊四也白帝白招拒立秋祭之於西郊五也黑帝汁光紀立冬祭之於北郊六也王者各稟五帝之精氣而王天下於夏正之月祭於南郊七也四月龍星見而雩總祭五帝於南郊八也季秋大饗五帝於眀堂九也四時迎氣祭五天帝於四郊各以當方人帝配之月令春曰其帝太昊夏曰其帝炎帝季夏曰其帝黃帝秋曰其帝少昊冬曰其帝顓頊眀為配天及告朔而言之其雩祭亦然故月令孟夏云大雩帝命祀百辟卿士既云祀百辟卿士則五方人帝天子亦雩祀之其夏正郊感生之帝周以后稷配之其於眀堂總享五帝以文王武王配之此謂祭天配以人帝也地神有二嵗有二祭夏至之日祭崑崙之神於方澤一也夏正之月祭神州地祗於北郊二也案括地象云地中央曰崑崙其東南方五千里曰神州以此言之崑崙在西北别統四方九州其神州者是崑崙東南一州耳於神州中更分為九州則禹貢九州是也其配地之神孝經緯既云后稷為天地之主則后稷配天南郊又配地北郊則周人以嚳配圓丘亦當配方澤也嵗遍者謂五方之帝迎氣雩祀眀堂及郊雖有重者諸神總也辨正程子曰六天之説起於讖書帝者氣之主也豈有上帝而别有五帝之理此因周禮言祀昊天上帝而後又言祀五帝亦如之故諸儒附此諸説正與今人説六子乾坤之外甚底是六子譬如人之四肢只是一體耳學者大惑也楊氏復曰天帝一也以一字言則祀天饗帝之類以二字言則格於皇天殷薦上帝之類以四字言則惟皇上帝昊天上帝之類以氣之所主言則隨時隨方而立名如青帝赤帝黃帝白帝黑帝之類其實則一天也前乎鄭康成如鄭衆如孔安國注書並無六天之説鄭康成後出分為六天又皆以星象名之謂昊天上帝者北辰也謂五帝者大微宫五帝座是也夫在天成象在地成形草木非地則星象非天天固不可以象求也以象求天是何異於知人之有形色貌象而不知有心君之尊也况又附以緯書如北辰曜魄寶之類尤為不經且鄭注周禮昊天上帝謂即天皇大帝又析月令皇天為北辰曜魄寶上帝為大微五帝前後乖違是以王肅羣儒引經傳以排之然以五人帝為五帝則非也夫有天地則有五行四時有五行四時則有五帝帝者氣之主也易所謂帝出乎震是也果以五人帝為五帝則五人帝之前其無司四時者乎鄭則失矣王亦未為得也夫祀天祀五帝皆聖人制禮之條目非分而為六也天猶性也帝猶心也五帝猶仁義禮智信之心隨感而應者也其實則一天也又曰四方注疏此一條謂五官之神祭法一條謂山林川谷丘陵之神舞師一條謂四望之神大宗伯一條謂蠟祭四方百物之神月令一條謂四方五行之神大司馬一條謂祭四方之神詳考諸説惟舞師帥而舞四方之祭祀謂四望也其説為近蓋四方即四望而又有不同四望者郊之屬是也四方者四時山川之祀而望祭之如左氏曰望郊之屬是也四方者四時各望祭於其方如天子祭四方嵗遍是也通而言之則同時合祭四方謂之望如舜即位同時告祭曰望於山川嵗二月東巡狩亦曰望秩於山川是也諸侯方祀亦云嵗遍何也諸侯之國雖居一方然國內又各有東西南北亦隨四時望祭於其方也望祭四方則五官之神五行之神山林川澤之神皆在其中矣固不可又分而為四也大宗伯以疈辜祭四方百物亦謂之四方何耶案以血祭祭五嶽以疈辜祭四方百物禮固不同所謂祭四方百物言祭四方之內百物之神耳鼓人鼓兵舞帗舞疏云百物之小神是也非祭四方也案祭天有九冬至南郊季秋大饗眀堂二者大祭南郊古制眀堂古亦有之但神農曰天府黃帝曰合宫以合祀天神其在季秋宗祀文王以配上帝則周公以義起耳孟春祈榖仲夏雩祀孟冬祈年及即位而類出征而類巡狩而柴大故而旅皆因事而舉非常祭也南郊北郊天地分祭即位出征巡狩天地合祭蓋王者之事天地與事父母同父母殯宮異尸異几忌日亦分祭廟祭則同尸同几天地以覆載生成論則分故圜丘方澤牲玉皆異以天統地地承天而論則合故凡告祭則同其從祀則南郊主日配月北郊主社配稷祈年祈榖及風雨星辰大社及五嶽四瀆山川王社止圻內山川大饗大旅止及五帝不及地祗其配位則圜丘虞夏以黃帝配殷以帝嚳配周初亦以嚳配周公定禮乃定以始祖配祈榖祈年以后稷配也祭地有五北郊亦通名社以祭全載之地當祭之時主社配稷而社不置稷大社祭九州之地王社祭畿內之地皆置稷以為民祈報也祭地大祭一北郊方澤也變祭一大災類社稷也此皆與稷同祭若大封而告於大社出征宜於社歸獻俘於社大會同宜於社反釋奠於社日食伐鼓於社不及稷矣巡狩出征與天同告又告社載社主以行大蠟祈禳兼大社王社耕藉止及王社以諸侯亦耕助及其國社也方祀有六迎春東郊迎夏南郊夏季祀中央土迎秋西郊迎冬北郊五者皆分祭秋祭四方報成萬物則合祭也大會同而祀方眀則非常祭矣迎氣之祭祭天太暤等五帝而以伏羲配木神農配火軒轅配土金天配金髙陽配水祭天勾芒五神而以重配勾芒黎配祝融勾龍配后土該配蓐收修與熙配玄冥諸侯迎氣則止及五神五臣不及天帝也鄭氏分南北郊與圜丘方澤為二不如王肅南郊即圜丘北郊即方澤之説為確而祖緯書多立之名宜後儒訾其繆妄然如王子雍有五人帝五人臣無天五帝五神亦非篤論蓋有日月即有日月之神有山川即有山川之神烏得謂四時五行獨無四時五行之神乎楊氏謂社即地並無北郊亦不確蓋中國九州固地而全舉之則九州之外皆地此茫茫大地非王者主其祭而誰主之析言之則大社王社固地而州社里社亦地蓋天尊地親父尊母親父為後之子止一人而庶子亦母其母天非天子不敢祭地則里社里正亦得率里人祀之也注疏五帝及崑崙神州諸説先儒辨之詳矣此疏皆本鄭氏周禮注説言之於大雩眀堂諸祭盡舍昊天而祀五帝又造為帝嚳配圜丘武王配眀堂之説俱於古制不符至感生帝之説兩漢以前未聞有此自周禮注創為此説六朝而下歷世遵行祀法大壞聶崇義號稱知禮猶以宋符火德當祀赤帝為説其他又無論矣凡祭有其廢之莫敢舉也有其舉之莫敢廢也非其所祭而祭之名曰淫祀淫祀無福正義鄭氏康成曰為其瀆神也廢舉謂若殷廢農祀棄後不可復廢棄祀農也後有德者繼之不嫌也孔疏農即柱也有農功故曰農棄即后稷也為稷官故曰稷淫祀無福謂妄祭神不饗孔氏頴達曰此眀祭有常典不可輒擅廢興通論方氏慤曰可以廢而廢之可以舉而舉之者存乎義因所廢而莫敢舉因所舉而莫敢廢者存乎禮蓋禮有經義有權故也孔子曰非其鬼而祭之諂也在人則為諂於禮則為淫葉氏夢得曰舉廢皆當於法後固不可改使有不當其可姑仍其失而不之正乎農之功必有不若棄者則農固不得不廢若柱之為社世未有能過之者則雖欲遷而不可故湯特為之作夏社以曉天下此禮所以言有其舉之有其廢之者謂各有名而非苟作者也不然如魯人之祀爰居躋僖公何以書於春秋使後有作者能以禮正之孔子豈不許乎呂氏祖謙曰淫祀不止叢祠及祀典非正者凡非所當祀如諸侯祭天季氏旅泰山之類皆淫祀也古人初不以福自嫌自後世有徼福之心者多故看得福為可徼耳呂氏大臨曰廢之莫敢舉如已毁之宗廟已變置之社稷不可復祀也舉之莫敢廢如已修之墠壇而輒毁已正之昭穆而輒變也非其所祭而祭之如法不得祭與不當祭而祭之者也魯立武宮立煬宫是舉其廢也躋僖公是廢其舉也魯之郊禘與祀文王祀爰居祭非其所祭也淫過也以過事神神弗享也故無福福者百順之名也餘論陳氏祥道曰周官大宰祭祀以馭其神大祝禁督逆祀命者禮記山川神祗有不舉者為不敬不敬者君削以地宗廟有不順者為不孝不孝者君絀以爵夫逆祀命而有所舉則在所禁逆祀命而有所廢則在所督不敬者在所削不孝者在所絀此人臣所以謹常祀而無瀆禮也春秋傳曰不可以間成王周公之命祀蓋以此也案有舉有廢乃先聖王釐正祀典其去取為萬不可易之法故不敢妄為舉廢兩有字中有經制一定之義非漫然廢舉之謂天子以犧牛諸侯以肥牛大夫以索牛士以羊豕索所百反正義鄭氏康成曰犧純毛也肥養於滌也索求得而用之通論孔氏頴達曰此皆上兼下下不得僭上左傳云聖王致力於神奉牲曰博碩肥腯是天子得以肥也又公羊帝牲必在滌三月稷牛惟具稷牛有災故臨時得别求之是天子諸侯得有索牛也此大夫士謂天子大夫士也若諸侯大夫即用少牢士則用特牲其喪祭大天亦得用牛士亦用羊豕故雜記云上大夫之虞也少牢卒哭成事祔皆大牢下大夫之虞也特牲卒哭成事祔皆少牢是也據此諸侯不得用犧牛祭義云天子諸侯有養獸之官犧牷祭牲必於是取之蓋諸侯對卿大夫亦得云犧若對天子則稱肥耳其大夫牲體完全亦有犧牲之稱故上云大夫犧賦為次但不毛色純耳案楚語觀射父云大者牛羊必在滌三月小者犬豕不過十日此大夫索牛士羊豕既不在滌三月當十日以上但不知其日數耳方氏慤曰天子以犧牛則雖肥而或傷案傷則諸侯亦不用疑當作厖亦在所不用矣諸侯但取其肥而已不必犧也大夫但取其具而已又不必肥也至於士雖索牛亦不得用惟羊豕可也祭義言天子諸侯必有養獸之官故得有犧肥之牛也於大夫言索者以無養獸之官必索而後得之故也案天子諸侯大牢禮牛羊豕具大夫少牢禮有羊兼有豕士特牲禮則惟豕耳然天子亦有止用一牛者郊特牲及犆礿也諸侯亦有時止用少牢者易所謂東鄰殺牛不如西鄰之禴祭實受其福也支子不祭祭必告於宗子正義鄭氏康成曰不敢自專謂宗子有故支子當攝而祭者也五宗皆然孔氏頴達曰支子庶子也祖禰廟在適子之家而庶子賤不敢輒祭之若濫祭亦是淫祀支子雖不得祭若宗子有疾則庶子代攝可也猶宜告宗子然後祭通論吕氏大臨曰古者有大宗有小宗别子為祖繼别為宗百世不遷者大宗也繼禰繼祖繼曾祖繼髙祖五世則遷者小宗也宗子上繼於祖禰族人兄弟皆宗之其所以主祭祀治宗事如有國有家之重冠笄取妻必告死必赴况於祭乎所宗乎宗子者皆支子也支子不敢祭如諸侯不敢祖天子大夫不敢祖諸侯尊者之祭非卑者所敢尸也故宗子為士庶子為大夫以上牲祭於宗子之家祝曰孝子某為介子某薦其常事則支子雖貴可以用其祿而不敢專其事也宗子去在他國則支子攝主以祭其禮有殺焉不厭祭不旅不假之類是也其辭曰孝子某使介子某執其常事此所謂必告於宗子言告而後敢行事也程子曰古所謂支子不祭者惟使宗子立廟主之而已支子雖不祭至於齊戒致其誠意則與主祭者不異可與則以身執事不可與則以物助但不别立廟為位行事而已後世如欲立宗子當從此義雖不祭情亦可安若不立宗子徒欲廢祭適足長惰慢之志不若使之祭猶愈於已也存疑吕氏大臨曰宗子既祭其祖禰則支子不得别祭所以嚴宗廟合族屬故曰庶子不祭祖與禰眀其宗也若已為宗子而弟有子其子欲祭其父必從祖祔食祭於宗子之家乎將就其宫而祭使其子自主之乎從祖祔食祭於宗子之家止謂殤與無後見曾子問及小記蓋殤與無後必宗子主之則是子有不得事其父矣傳曰子不私其父則不成為子故兄弟生而異宫所以盡人子之私養及其沒也反不得主其祭於義可乎蓋異宫者必祭於其宫使其子主祭其祭必告於宗子而後行不得而專亦所以眀其宗也宗子有祭必先與焉卒祭而後祭其父故曰支子不祭祭必告於宗子方氏慤曰言支則知宗之為本言宗則知支之為庶支子不祭公祭也祭必告於宗子私祭也謂祭其先也凡此所以眀其宗重其本而已案宗法之正本乎廟廟禮之正視其祭五宗既立族衆屬之一尊支子而祭則宗亂矣故禮首禁之既云不祭矣而又有祭必告於宗子之説故鄭以為攝爾方吕私祭之説非不深體人子至情不知宗子之弟即别子其適子即别子之宗所謂繼禰者為小宗而其兄弟宗之也并於繼祖之宗有不必告矣若髙曾祖則自有繼髙之宗繼曾之宗繼禰之宗豈有宗子存而妄為私祭者况祭有常期物有常品宗子因時告孝牲醴有制支子助祭其旁亦足申其愛慕朱子云支子私祭上及髙曾非所以嚴大宗之正凡祭宗廟之禮牛曰一元大武豕曰剛鬛豚曰腯肥羊曰柔毛雞曰翰音犬曰羮獻雉曰疏趾兔曰眀視脯曰尹祭稿魚曰商祭鮮魚曰脡祭水曰清滌酒曰清酌黍曰薌合粱曰薌萁稷曰眀粢稻曰嘉蔬韭曰豐本鹽曰鹹鹺玉曰嘉玉幣曰量幣鬛力輒反腯徒忽反翰户旦反稿苦老反脡肥頂反薌音香萁音姬韭音久鹹音咸鹺才何反正義鄭氏康成曰號牲物者異於人用也元頭也武迹也腯亦肥也春秋傳作腯腯充貌也翰長聲也尹正也商猶量也脡直也稻菰蔬之屬也豐茂也大鹹曰鹺今河東云幣帛也孔氏頴達曰此論祭廟牲幣告神之法凡祭謂貴賤悉然牛肥則腳迹䀶大豕肥則毛鬛剛大羊肥則毛細而柔弱雞肥則其鳴聲長雉肥則兩足開張趾相去疏也兔肥則目開而視眀也自牛至兔八物惟牛云一頭豕以下不云數者皆從其所用而言並宜云若干也尹祭者裁截方正而用之一云正謂自作之論語云市脯不食言不正也稿乾也商量也乾魚商度燥濕得中而用之脡直也鮮魚煮熟則脡直若餒則敗碎不直也清滌者古祭用水謂之玄酒言其甚清皎潔也清酌者此酒甚清可斟酌也榖秫者曰黍秫既軟而相合氣息又香故曰薌合薌萁者粱謂白粱黃粱眀粢者稷粟也眀白也此等諸號若一祭並有則舉其大者牲牢酒齊而言不應諸事皆道故少牢禮稱敢用柔毛剛鬛嘉薦普淖是也或惟雞犬或惟魚兔及水酒韭鹽之祭則各舉其美號故士虞禮祝辭云尹祭也成氏伯璵曰尊鬼神之用故異其名陳氏祥道曰凡祭宗廟之禮鼎俎籩豆簠簋所薦必美其名者謂聖人襲祖先之遺芳體天地之大德作為政教以和隂陽用正性命萬物各遂其生享其豐厚不敢忘本是以祭祀之禮物美其名以昭盛德犬曰羮獻者犬博則湇膏可以充鉶以為獻也粱曰薌萁者白粱黃粱非獨米之香烈可以充君薦神至於萁梗亦有芳薌也嘉蔬者畦畛而種待水以生者皆曰蔬而稻惟其善也量幣者幣帛以將其誠不敢過也不敢不及也胡氏銓曰古者蔥韭皆曰本漢使曰百本薤五十本蔥量度量項氏安世曰牛豕豚羊雞雉兔皆以其形聲之美者為號獨犬曰羮獻者其形聲不足言也羮之而獻其味耳薌合以其實之升於量者言薌萁以其稈之登於場者言嘉蔬以其苖之植於地者言眀粢以其飯之盛於器者言然古本無稷曰眀粢一句或與黍同號耳顆大者言其實顆細者言其穗各取其盛者言之脯曰尹祭左胊右末橫陳之也稿魚曰商祭稿者不必佳必擇而用之也鮮魚曰脡祭濡魚進尾右鰭左腴陳之也易氏祓曰易其常名以為美稱其致美於牲齍乃所以致敬於鬼神示也存疑鄭氏康成曰羮獻食人之餘也萁語辭孔氏頴達曰羮獻者人將所食羮餘以與犬食之肥則可獻祭鬼神也吕氏大臨曰醴酒皆有清有糟糟未泲者也既泲為清酒之精者也謂之酌案周禮春官大祝辨六號曰神號曰鬼號曰示號曰牲號曰齍號曰幣號牲齍幣與鬼神示之號並列則其號重矣雞必振翼乃鳴故曰翰音易翰音登於天是也凡飛鳥趾間皆無冪故棲於樹雉不樹宿而趾特疏故名之黍稷皆今小米黍粒圓而大色黃性最黏故曰薌合稷似黍差小性硬色白鑿之潔白故曰眀粢粱幹高於黍味最美氣最香故曰薌萁粱陸稻稻水稻蔬疏也稻之行列宜疏以透風也犬食人之餘不可謂之美名萁為語辭説亦未當天子死曰崩諸侯曰薨大夫曰卒士曰不祿庶人曰死在牀曰尸在棺曰柩正義鄭氏康成曰異死名者為人褻其無知若猶不同然也自上顛壞曰崩薨顛壞之聲卒終也不祿不終其祿死之言澌也精神澌盡也尸陳也言形體在也柩之言究也孔氏穎達曰自此至短折不祿一節論死後稱謂尊卑不同之事生時尊卑著見可識死蔭為野土嫌若輕褻故為制尊卑之名眀其猶有貴賤之異也崩者譬若天形墜壓四海必覩王者登假率土咸知故曰崩薨者崩之餘聲聲逺劣於形壓諸侯之死知者亦局也卒畢竟也大夫是有德之位仕能至此亦是畢了平生故曰卒也士祿以代耕而今遂死是不終其祿澌是消盡無餘之目庶人生無令譽死絶餘芳精氣一去身名俱盡故曰死凡人初生在地病困而氣未絶之時下置於地復其初生冀脫死重生若其氣絶更還牀上既未殯斂陳列在牀故曰尸白虎通云失氣亡神形體獨陳是也三日不生斂之在棺死事究竟於此故曰柩劉氏彝曰崩如天之崩則萬物失其所覆也薨陷也如地之陷則一國失其所載也卒終也施德立義由此而終也祿所以崇道而育德而身既亡是不祿也死者澌也如冰之消而復為水如雲之盡而復為氣無窮已也人則亡矣其為德猶存也故立等降以稱其靈則事亡猶事存也吕氏大臨曰柩久也比化者無使土親膚故在棺欲其久也通論胡氏銓曰春秋書天子諸侯大夫之死曰崩薨卒舜陟方乃死天子亦曰死吕氏大臨曰尊卑之死其名不可以無别敬之至也天子居崇髙之位如山如陵故曰崩詩云山冢崒崩卒終也君子曰終者全而歸之之義也大夫君子也故曰卒不祿傷其不幸之辭也至庶人則窮矣不可有異名曰死自諸侯至於士皆其臣民之稱者若諸侯之薨訃於他國則曰寡君不祿自卑之辭也書於他國之史則曰某侯某卒內外異辭也大夫死訃於同國他國之大夫士皆曰死亦尊卑內外異辭也尸者未大斂柩者已大斂之稱也故喪禮未殯奠於尸已殯奠於柩書名亦曰某之柩所以别也陳氏祥道曰書於堯舜禹湯曰殂曰落曰死曰沒而已至周乃曰崩則崩薨卒之稱周制也大夫謂之卒而春秋外諸侯亦謂之卒者略於外故也士云不祿而禮諸侯薨訃於諸侯亦謂之不祿者謙於外故也夫有始則有終此性命自然之理也君子曰終與卒同義一草木之稿曰死一禽獸之斃亦曰死小人曰死則與萬物同類而已羽鳥曰降四足曰漬死寇曰兵降户江反漬辭賜反正義鄭氏康成曰降落也漬謂相瀸汙而死異於人也春秋傳曰大災者何大漬也死寇異於凡人當饗祿其後孔氏頴達曰羽鳥飛翔之物今云降落是死也四足牛馬之屬若一箇死則餘者更相染漬而死故曰漬此鳥獸死異名也死寇曰兵謂父祖死君之寇而子孫為名也兵器仗之名言其為器仗之用也故君恆祿恤其子孫春饗孤子是也通論吕氏大臨曰兵者死於寇難之稱也有兵死而可褒者如童汪踦能執干戈以衛社稷勇於死難者也有兵死而可貶者如冢人凡死於兵者不入兆域戰陳無勇者也祭王父曰皇祖考王母曰皇祖妣父曰皇考母曰皇妣夫曰皇辟妣必履反辟婢亦反正義鄭氏康成曰更設稱號尊神異於人也皇君也考成也言其德行之成也妣之言嫓也嫓於考也辟法也妻所取法也孔氏頴達曰王父祖父也王母祖母也案吕氏大臨曰宗廟祭祀尊而神之有君道焉故皆曰皇也君亦曰辟則臣之所取法也通論陳氏祥道曰詩曰皇皇后帝又曰皇王維辟天王祔而臣子加之以帝尊之與天同也祖父死而子孫加之以皇夫死而妻加之以辟尊之與君同也周官大祝所謂鬼號此也喪禮未卒哭則以生事之既卒哭則以鬼事之則其稱皇祖考皇祖妣以至曰妣曰嬪皆卒哭之禮也生曰父曰母曰妻死曰考曰妣曰嬪壽考曰卒短折曰不祿正義鄭氏康成曰嬪婦人有法度者之稱也曰卒曰不祿謂有德行可任為大夫士而不為者老而死從大夫之稱少而死從士之稱通論鄭氏康成曰周禮九嬪掌婦學之法教九御婦德婦言婦容婦功孔氏頴達曰父母妻生時所稱不言祖及夫者以生時無别稱也考妣嬪謂非祭時所稱也前言宗廟之祭加其尊稱故父母並曰皇也此生死異稱出爾雅文言其别於生時若通而言之亦通也尚書云大傷厥考心又云聰聽祖考之彝訓倉頡篇云考妣延年又云嬪於虞詩云曰嬪於京周禮九嬪並非生死異稱矣張子曰妣者比也所以配先考之德妻死曰嬪夫死曰辟嬪者婦人之美稱不特施之祭祀而已陳氏祥道曰生曰父曰母曰妻親之也死曰考曰妣曰嬪敬之也生則主親死則主敬生而敬之以考妣嬪之稱亦不害其為親之也吕氏大臨曰壽考曰卒短折曰不祿與大夫曰卒士曰不祿之文異者彼論其爵此論其德也方氏慤曰壽言數之有所延考言德之有所成蚤死謂之短中絶謂之折天子視不上於夾不下於帶國君綏視大夫衡視士視五步凡視上於面則敖下於帶則憂傾則姦上時掌反綏依注音妥他果反敖五報反正義鄭氏康成曰夾交領也天子至尊臣視之目不過此綏讀為妥妥視謂視上於夾視國君彌髙也衡平也平視謂視面視大夫又彌髙也士視得旁遊目五步之中也視大夫以上上下遊目不得旁也凡視敖則仰憂則低傾或為側辟頭旁視心不正也孔氏頴達曰此論天子以下其臣視君尊卑有異之事夾謂朝祭服之曲領臣視天子過夾則慢供奉至尊須承候顔色又不得下過於帶國君諸侯也臣視君不得平看於面當視面下夾上也若大夫之臣視大夫平看其面也士之屬吏視士亦不得髙面下帶而得旁視左右五步也傾欹側也若視尊者而欹側旁視流目東西則似有姦惡之意也庾氏曰國君綏視妥頺下之貌前執器以心為平故以下為妥此視以面為平故妥下於面則上於夾也案張子曰視有髙下視髙則氣亢視下則心柔柔其心則聽言敬且信劉氏彝曰臣之事君敬盡其心則五事罔有弗正然於視瞻苟無等降在禮為愆矣故視於天子諸侯大夫士各不同焉朱氏申曰敖者陽之所作憂者陰之所伏姦者邪之所生通論孔氏頴達曰凡視過髙則敖定十五年邾子執玉髙其容仰高仰驕也視過下則似有憂定十五年魯公受玉卑其容俯卑俯替也吕氏大臨曰執器有上衡平衡蓋奉者主於當心故以當心為衡視者主於視面故以視面為衡執器以髙為敬故卑者彌下視以下為敬故尊者彌下義各有所當也士相見禮凡與大人言始視面中視抱卒視面無改此衡視也大人即大夫若父則遊目毋上於面毋下於帶事親主愛察其色不純以敬故異於君也上於面者其氣驕知其不能以下人矣下於帶者其神奪知其憂在乎心矣視流則容側必有不正之心存於胸中矣此君子之所以謹也存疑陸氏佃曰不敢言視天子恭也國君大夫放此綏視以所視綏之逺近為節衡視以所視衡之逺近為節綏視遊目逺於夾矣衡視遊目又逺於綏矣直言士視五步耳與上相備也然則天子國君大夫遊目亦不過此案先儒俱以人視天子視國君為説但不知視天子者諸侯耶大夫耶士庶耶豈視君者臣民貴賤一節耶玩本文先以天子視國君視大夫視士視分言之後以凡視總言之疑謂天子之視端凝平正上不上於人之夾下不下於人之帶妥下也國君稍俯下於天子止及心之上大夫又俯上止及心士更俯上及心之下所見之地亦止五步俯仰雖殊而總之不上於面不下於帶則一也蓋夾之髙及耳又上則上於面而敖矣視五步極俯更下則下於帶而憂矣君命大夫與士肄在官言官在府言府在庫言庫在朝言朝肄以二反正義鄭氏康成曰肄習也君有命大夫則與士展習其事謂欲有所發為也官謂版圓文書之處府謂寶藏貨賄之處庫謂車馬兵甲之處朝謂君臣謀政事之處惟君命所在就展習之也孔氏頴達曰自此至以禮一節論臣事君所在皆當謹習其事君命謂君有教命有所營為也言猶議也吕氏大臨曰先時豫慮思不出其位皆所以虔君命也居是位也不敢以侵他事治是事也不敢以有他慮此所以志無所分政無不舉也存異劉氏彝曰凡君有命將興作於大事也則大夫與士豫習其所宜以俟旨任期不辱命也故在官者豫治其官言緝版圖文書以待興作也在府者豫治其府言考寶藏賄貨以待匪頒也在庫者豫治其庫言治車馬兵甲以待徵令也在朝者豫慮於朝言極其謨謀政要也經曰處其位而不履其事則亂也故君使其臣得志則慎慮而從之否則孰慮而從之陳氏祥道曰官者聽治之所在府庫者財器之所藏朝者政事之所出周禮大府泉府玉府之屬皆言府特大府曰萬民之貢以充府庫蓋以藏其文書財物則謂之府以其貯車械則謂之庫故天文東壁為文府西奎為武庫此府與庫之辨也案官者卿大夫日治事之所在路門外兩旁所謂外有九室九卿朝焉者是也六官之政大率於此行之而劉氏專以緝版圖文書供興作言之固矣府庫藏物之所在庫門內兩旁周禮有大府玉府內府外府之職而無庫名本篇六府不言庫月令言審五庫之量不言司庫何官是府即庫府以藏物為名庫即其藏之之地也大府掌九貢九賦九功之二以受其入則何所不入頒財以法式授之則何所不出玉府掌王金玉玩好兵器內府掌受貨賄良兵良器凡好賜豫則共之外府掌邦布之出入以供財用之幣齎賜豫之財用是文武之器用未嘗分貯且記文亦止據現在者言而劉謂在府豫治其寶藏貨賄以待匪頒在庫豫治其車馬甲兵以待徵令陳氏謂府藏文書財物為文庫貯車械為武又固矣蓋在官謂治事之時則大臣為要在府謂計其出入會要之時在庫則入其物出其物之時乃有司之職非大臣之事也在朝則復逆之時謨謀匡弼皆於是乎在大約在治朝及內朝居多若外朝則間一舉耳朝言不及犬馬輟朝而顧不有異事必有異慮故輟朝而顧君子謂之固在朝言禮問禮對以禮輟竹劣反正義鄭氏康成曰輟猶止也輟朝而顧心不正志不在君也固謂不達於禮也在朝言禮問禮對以禮謂於朝廷言無所不用禮孔氏頴達曰異事非常也臣於朝矜莊嚴恪視不流目若忽止朝回顧此非見異事則心有異慮也若無異事異慮忽止朝而顧君子謂此為固陋不達禮也吕氏大臨曰非所治者皆異事也非所謀者皆異慮也二者非姦則野也故君子謂之固固野陋也君子不逆人以姦也沈氏煥曰朝廷之上不言功名之大小則問官爵之崇卑利祿之厚薄此何等風俗哉今公卿大夫在朝之士所言者皆禮問者以是對者亦以是可見禮樂眀於上風俗厚矣吳氏澄曰謂在朝議禮問此一禮則對以此一禮也案人臣宜守禮以昭在朝之節在朝所言道揆法守皆是言犬馬則失之鄙鄙非禮也天威不違顔咫尺安敢他顧他顧亦非禮也為言為問為答一以禮為歸則無非禮之失矣大饗不問卜不饒富正義鄭氏康成曰富之言備也備而已勿多於禮也孔氏頴達曰禮數有常不得豐饒使之過禮方氏慤曰大饗謂王饗諸侯通論陳氏祥道曰饗之禮有小大春秋之饗孤子諸侯之饗聘卿與大夫士之相饗非大饗也眀堂之饗帝宗廟之享先王王饗諸侯兩君相見然後謂之大饗先王之於帝也親之與祖考同故均謂之大饗其於賔也敬之與人鬼同故亦謂之饗饗賔之禮所乘則齊車所即則宗廟所用則祭器不蠲則除之凶服則禁之祼以鬱鬯尚以玄酒設以庭燎樂則肆夏牲則房蒸故大司樂之大饗不入牲其他皆如祭禮春秋傳曰魯有禘樂賔祭用之則饗賔謂之大饗宜矣周官大宰祀五帝祀大神示享先王皆前期十日而卜日又大宗伯凡祀大神享大鬼祭大示帥執事而卜日春秋書卜郊卜牛而記曰君召牛納而視之擇其毛而卜之又曰眀王祀天地之神眀無非卜筮之用則祭祀無不用卜矣然則不問卜者特饗賔之禮也考之大射燕覲之禮前期有戒而已則饗不問卜可知饗禮几設而不倚爵盈而不飲殽乾而不得食凡以訓恭儉而已則不饒富可知然則饗之為儀其他皆如祭祀之禮而不問卜者如祭祀享日之事也不問卜前期之事也享之備物至於昌􅩃形鹽莫不具焉謂之不饒富者非不富也不饒而已方氏慤曰大饗經之所言者凡十有一而其别則有五遍祭五帝一也祫祭先王二也天子饗諸侯三也兩君相見四也凡饗賔客五也若月令季秋言大饗帝禮器郊特牲言大享腥所謂遍祭五帝之大饗也禮器又言大饗其王事大饗之禮不足以大旅所謂祫祭先王之大饗也郊特牲又言大饗尚腵修所謂天子饗諸侯之大饗也郊特牲又言大饗君三重席而酢仲尼燕居言大饗有四坊記言大饗廢夫人之禮所謂兩君之大饗也雜記言大饗卷三牲之俎所謂凡饗賔客之大饗也此所言大饗不問卜即天子饗諸侯之大饗而已蓋先王之於祭祀無所不問卜在天者則卜日在人者則卜尸在物者則卜牲且謂以人交神幽眀異道非致一以通之則或吉或凶無自而知矣若夫以人交人何卜之有天子饗諸侯不問卜則兩君相見之大饗與凡饗賔客之大饗從可知矣陸氏佃曰問卜謂若嘗之日涖卜來嵗之芟社之日涖卜來嵗之稼存異鄭氏康成曰祭五帝於眀堂莫適卜也孔氏頴達曰此大饗總祭五帝其神非一若一一卜其牲日恐吉凶不同總一卜而已若祫之大饗則周禮宗伯享大鬼皆卜不得云不問卜故鄭知祭五帝於眀堂與月令季秋大享帝同也然雩總祭五帝問卜者以雩為百榖求雨非一帝之功故每帝適卜也至於大饗之時嵗功總畢配以文武祭報其功不須每帝皆卜故惟一卜吕氏大臨曰大饗冬日至祀天夏日至祭地也因天地隂陽之至日月素定故不問卜若季秋大饗既無素定之日如冬夏至之比又不問卜是以私褻事上帝不敬莫大焉至敬不壇掃地而祭牲用犢酌用陶匏席用藳秸視天下之物無以稱其德以少為貴焉故不饒富案陳以此大饗為兩君相饗方氏謂王享諸侯則得之鄭以此大饗為祀五帝吕氏改為冬至祭天夏至祭地皆非也考之周禮天地名禋祀五帝名大旅孔子言大饗不足以大旅大旅不足以饗帝眀分為三等祭五帝大旅也饗帝祭天地也則鄭以大旅為大饗吕以饗帝為大饗其誤眀矣周禮大例天神曰祀地示曰祭人鬼曰饗故祠禴蒸嘗皆曰以享先王四時之間祀追享朝享皆宗廟之名也餘惟季秋宗祀文王於眀堂以配上帝曰大饗蓋以其祀於眀堂之大廟故被以宗廟之名王饗諸侯諸侯相饗皆於大廟皆用祭器故亦被以宗廟之名然惟禮重而物備始名大饗郊以特牲物不備矣所貴在誠故曰惟聖人為能饗帝易曰聖人亨以饗上帝而大亨以養聖賢故祭天可名饗不可名大饗也若聘禮之饗養老之饗孤子之饗則對燕禮食禮而言與此更相去逺矣凡摯天子鬯諸侯圭卿羔大夫鴈士雉庶人之摯匹童子委摯而退野外軍中無摯以纓拾矢可也婦人之摯椇榛脯修棗栗鬯敕亮反匹依注作鶩音木鴨也椇俱羽反正義鄭氏康成曰摯之言至也天子無客禮以鬯為摯者惟用告神為至也童子委摯而退不與成人為禮也説者以匹為鶩野外軍中非為禮之處用時物相禮而已纓馬繁纓也拾謂射韝婦人無外事見以羞物也椇榛木名椇枳也有實今邳郯之東食之案羅氏願曰崔豹古今注云枳椇子一名樹蜜一名木餳實形卷曲核在實外人君燕食庶羞有椇語云枳椇來巢言其味甘故飛鳥慕而巢之又以其形鈎曲故四代之俎商以椇一作枸詩云南山有枸對下楰是苦楸則枸是甘果也榛實似栗而小孔氏頴達曰鬯者釀黑黍為酒其氣芬芳調暢故因謂為鬯也天子弔臨適諸侯必舍其祖廟以鬯禮於廟神以表天子之至故鄭注鬯人亦然也諸侯謂公侯伯也公侯伯用圭子男則用璧以朝王及相朝聘表於至也不言璧略也羔小羊取其羣而不黨鴈取其候時而行飛有行列雉取性耿介惟敵是赴羔鴈生執雉則死持亦表見危致命也士摯冬雉夏腒也野鴨曰鳧家鴨曰鶩鶩不能飛騰如庶人但守耕稼而已童子見先生或尋朋友既未成人不敢與主人相授受拜伉之儀但奠委其摯於地而自退辟之然童子摯悉用束修故論語云自行束修以上謂童子也凡用牲為摯主人皆食之故司士云膳其摯不直云軍中而云野外者若軍在都邑宜依舊禮若非軍中而在野外亦申時物或纓或拾或矢隨所有也舉一隅耳土地無正幣則時物皆可也婦人惟初嫁有摯以見舅姑椇即今之白石李形如珊瑚味甜美脯摶肉無骨而曝之修取肉煆治而加薑桂乾之如脯所以用此六物者椇法也榛至也脯始也修治也棗早也栗肅也婦人有法始至修身蚤起肅敬也故后夫人以下皆以棗栗為摯取其蚤起戰栗自正也通論孔氏頴達曰白虎通云雉取其不可誘之以食撓之以威死不可畜士行威介守節死義不當移案莊二十四年左傳云女摯榛栗棗修以告虔是榛為虔義又案昏禮婦見舅以棗栗見姑以腵修其榛椇所用無文案吕氏大臨曰賤當事貴少當事長不肖當事賢事之必有養贄用禽者所以致其養也孤執皮帛諸侯執圭璧孤與諸侯臣之貴者摯亦以禽則逼於下矣皮帛可制以為衣裘圭璧則寶貨因以比德焉所以異於諸侯而為之等也天子惟告於鬼神用鬯以為摯詩云秬鬯一卣告於文人是也宗伯以玉作六瑞以等邦國虞書輯五瑞此諸侯之摯獨云用圭者言其略也圭璧既受必反之貴德而賤貨也書云頒瑞於羣后是也宗伯以禽作六摯以等諸臣虞書亦云三帛二生一死摯此孤卿大夫士庶人之摯也羔鴈雉鶩雖皆可膳之物然先王因之以寓其義卿委蛇委蛇退食自公羔羊之義也大夫陳力就列道合則從不可則去鴈之義也羔鴈以生者卿大夫以道去就不若士死以服事也士執雉者耿介不回以死服事者也陳氏祥道曰禮云無辭不相接也無禮不相見也欲民之無相褻也又云君子於其所尊不敢質也故貴至於邦君賤至於庶人以至婦人童子相見不依摰不足以為禮摰而不稱德不足以為義此玉帛禽獸榛栗棗修之用所以不一也儀禮士於士無辭贄有還贄大夫於士無還贄終辭贄君於其臣則受之於外臣則使擯還之大夫於嘗為臣者亦然士贄授受於庭貴者授受於堂大夫士於君壻於舅則奠贄士嘗臣於大夫亦奠贄童子於所奠則委贄此禮之殺也周官膳夫祭祀致福者受而膳之以贄見者亦如之則受之所以納其德也膳之所以用其德也若玉帛則非膳夫所受聘禮賔見主君以圭璋不以贄訝者訝賔不以贄及賔即館訝將公命乃見之以其贄賔既將公事復見訝以其贄又曰天子無客禮於天下而有贄禮於鬼神周禮鬯人凡王弔臨共介鬯則天子之鬯以介致之而已天子宗廟之灌以圭瓚巡守之灌以大璋中璋邊璋其執鎮圭以朝日猶諸侯執圭璧以朝君皆贄瑞也士相見禮下大夫相見以鴈飾之以布上大夫相見以羔飾之以布先儒謂飾以繢天子之卿大夫飾以布諸侯之卿大夫昔魯侯會晉師於瓦范宣子執羔趙簡子中行文子皆執鴈魯於是始尚羔蓋魯禮之失至此乃復正也士相見冬用雉夏用腒雉不飾以布以士卑也不維以索以用死也用死與士死制同意夏用腒與夏宜腒鱐同意周禮庶人執鶩工商執雞此言庶人匹鶩之為物有馴擾而無散遷謂之匹可也士相見禮庶人見於君不為容進退走孟子曰庶人不傳贄為臣則庶人見君無贄鶩之為贄特施於下其君者也工商亦然士冠然後奠贄於君遂以贄見於鄉大夫鄉先生是未冠不預乎禮也然或賢與多聞不可不進以成人之事故又有童子之贄焉其制與成人同所以優其德其委與成人異所以卑其年周官掌客在野在外殺禮君子之為禮不以在野在軍而或廢亦不以物不足而求備故以纓拾矢各適其宜而已然不若備物之為善故曰以纓拾矢可也昏禮婦見舅姑執笲棗栗蓋棗取其赤心榛栗取其堅實脯修取其正治士昏禮不言椇榛特牲少牢大夫士之祭亦棗栗而已特籩人有棗栗又有榛實蓋具椇榛棗栗者盛禮也葉氏夢得曰玉有璧有圭圭則鋭而象天用璧則圓而象天體子男亦君人者也有君之體而不足於用故執璧公侯則德位盛大非不足於用也故執圭羔鴈則物而已矣不可以無飾故飾之以繢布布言其道有以被人而繢言居位之有文章也雉則文眀之物故無所用飾庶人質野則無所事於文也童子則始學者也束修以見師長委摰而退野外軍中無贄則無所行也纓拾矢而相見不謂之簡委之而退辟與成人為禮也不謂之簡禮以趨時為大也若夫婦人則其道主於事人其職專於中饋故摰以椇榛脯修棗栗納女於天子曰備百姓於國君曰備酒漿於大夫曰備掃灑正義鄭氏康成曰姓之言生也天子皇后以下百二十人廣子姓也酒漿掃灑賤婦人之職孔氏頴達曰言備王之后妃以下生廣子姓故云百姓也致女於諸侯為辭轉卑詩云惟酒食是議是也掃灑不敢同諸侯彌賤也惟及大夫不及士士卑故也馬氏睎孟曰納女者嫁女之家謙辭也備百姓者以嗣續為重備酒漿者以祭祀為重備掃灑者以賔客為重通論吕氏大臨曰納女之辭女氏昏辭也不敢以伉儷自期備妾媵之數而已自卑之義也古者因生以賜姓凡賜姓者皆天子之别子其族貴盛堯典所謂平章百姓郊特牲云大廟之命戒百姓是也皆所以廣繼嗣此納女於天子所以謂之備百姓也周官酒人漿人之屬有女酒三十人女漿十有五人吕公納女於髙祖曰臣有息女願為箕帚妾古之遺語也方氏慤曰酒漿者奉祭祀之物不如是不足以配國君故曰備酒漿掃灑者有家之事不如是不足以配大夫故曰備掃灑凡此皆主人之謙辭耳故每言備備者所以備其乏也陸氏佃曰備百姓則百斯男太姒之事也曰備酒漿諸侯宜有禮樂之事焉曰備掃灑下於夫人有事人之道而已存疑鄭氏康成曰納女致女也壻不親迎則女之家遣人致之此其辭也孔氏頴達曰壻不親迎則女之家三月廟見使人致之案昏禮之正皆以男下女故六禮一曰納采二曰問名必先納其采擇之禮而後問女為誰氏出及其長幼將以加諸卜筮也主人對曰吾子有命且以備數而擇之某不敢辭於天子則曰備百姓之數於國君則曰備酒漿之數於大夫則曰備掃灑之數此主人答問名之辭而鄭孔以為既嫁三月之致女説未確欽定禮記義疏卷八
