body:
  text: 月令第六之二仲春之月日在奎昏􅋃中旦建星中奎苦圭反􅋃音胡日在奎淮南子作招搖指卯正義鄭氏康成曰仲中也仲春日月會於降婁孔疏從奎五度至胃六度在戍總曰降婁婁斂也萬物降落而收斂而斗建卯之辰也高氏誘曰奎西方宿魯之分野在輿鬼南􅋃九星近井建六星在斗上皇氏侃曰􅋃當井之十六度建當斗之十度孔氏頴達曰二月建卯卯冒也律厯志冒茆於卯昏旦中星皆舉二十八宿此云􅋃建以􅋃近井建近斗井三十三度斗二十六度不可的指故舉􅋃建以定昏旦之中也三統厯二月節日在奎五度昏井二十二度中春分日在婁四度昏桞五度中元嘉厯二月節日在壁一度昏井十度中春分日在奎七度昏井三十度中案此謂驚蟄後三十日也奎西方木宿十六星形如破鞋廣十六度月建卯而日在戍卯與戍合也􅋃矢九星形如弓矢在井西建六星如舟在斗東唐月令二月節日在營室昏東井中曉箕中斗建卯位之初二月中氣日在奎昏東井中曉南斗中斗建卯位之中通書驚蟄日在室八度春分日在壁五度今時憲書驚蟄日在危十四度春分日在室九度降婁古法初奎五度終胃六度今法初室十度終奎十度其日甲乙其帝大皞其神句芒其蟲鱗其音角律中夾鍾案其音角以上凡説見孟月者兹不復載下並倣此正義鄭氏康成曰夾鍾者夷則之所生三分益一律長七寸二千一百八十七分寸之千七十五仲春氣至則夾鍾之律應周語曰夾鍾出四隙之細韋昭曰四隙四時之間氣微細者春為陽中萬物始生四時之氣皆始於春春發而出之三時奉而成之孔疏謂黃鍾大吕大蔟夾鍾助出四隙之微氣令不滯伏於下漢志曰言隂夾助夾蔟宣四方之氣而出種物也韋氏昭曰二月夾鍾坤六五也夾助陽聚萬物高氏誘曰萬物去陽夾隂而生朱子曰夾鍾七寸四分三釐七毫三絲陳氏祥道曰夾鍾建卯之律也陽生於子終於午則卯為陽之中矣故曰夾鍾張氏虙曰夾鍾又謂之圜鍾以春主規言之也其數八其味酸其臭羶其祀户祭先脾始雨水桃始華倉庚鳴鷹化為鳩夏小正二月初俊羔助厥母粥榮堇昆小蟲榮藝桃始華埤雅作小桃華吕覽作桃李華倉庚鳴夏小正作有鳴倉庚鷹化為鳩小正作鷹則為鳩而見於正月正義鄭氏康成曰皆記時候也倉庚驪黃也漢始以雨水為二月節孔疏漢初驚蟄為正月中雨水為二月節至後人事稍變故律厯志雨水為正月中驚蟄為二月節由氣有參差故也孔氏頴逹曰爾雅釋鳥倉庚商庚郭景純云即鵹黃也李巡云一名楚雀方言云齊人謂之摶黍秦人謂之黃離幽冀謂之黃鳥化者反歸舊形之謂若為則不復本形矣高氏誘曰鷹化為鳩其喙正直不復鷙擊馬氏睎孟曰始雨水隂陽交而成和也朱氏申曰鷹以秋殺仲春仁氣盛故化為鳩盧氏翰曰桃五木之精能伏邪氣亦有多品其曰花者小於衆桃花多實小不堪啖唯堪取仁此正始華之桃埤雅作小桃華是也存異鄭氏康成曰鳩摶榖也孔氏頴達曰爾雅鳩鴶鵴郭云今之布榖此鳥鳴則布種其榖案陸佃埤雅云鷹鷙鳥也一名鷞鳩左傳曰鷞鳩氏司冦蓋鷹鷙故為司冦鷹為鷞鳩金眼鉤觜鐵爪劍翮感秋氣則喙鉤善摶攫應陽而變則喙柔仁而不鷙矣天子居青陽大廟乘鸞路駕倉龍載青旗衣青衣服倉玉食麥與羊其器疏以達正義鄭氏康成曰青陽大廟東堂當大室張氏虙曰當卯上二月位也仲月所居在左右之中不謂之中而謂之廟方氏云以或享神於此尊之曰大天子不敢以為己居此吕氏之制也通論陸氏佃曰爾雅云室有東西廂曰廟所謂青陽眀堂總章玄堂大廟以其居正有左右廂故也若中央大廟無左右廂故曰大廟大室且以著青陽等皆大廟也案青者木之色陽始於東故謂之青陽高誘曰青陽東向當大廟中央室是月也安萌芽養幼少存諸孤少詩召反諸孤淮南子作孤獨正義鄭氏康成曰皆助生氣也馬氏睎孟曰凡植物始茁為萌浸長為芽動物始生為幼未壯為少植物欲無踐履故曰安動物欲無殄滅故曰養諸孤天民之窮者欲無夭絶故曰存方氏慤曰窮民有四止及孤者以為人後存之助陽氣尤大也無父何怙有亡之道故以存言之案安萌芽承前禁止伐木而言正月木未萌芽禁止斬伐而已至此則生意動而萌芽見焉故貴安之使漸長也養幼少專指人對後養壯佼養衰老而言春養其幼夏養其壯秋養其衰順時令也諸孤尤幼少中之宜恤者禮春饗孤子養幼少之實也父死王事者其孤則春饗之其餘諸孤則存問以安養之而已擇元日命民社正義鄭氏康成曰社后土也使民祀焉神其農業也祀社日用甲方氏慤曰祭法云大夫以下成羣立社曰置社則民固有社矣然非天子命之無敢祭焉故擇元日而命之也社土示也方春土發生之時祭之以祈土事之無不善而已凡祭社而稷必從之止言社舉重以明輕爾通論孔氏頴逹曰后土謂五官之后土句龍為配社之人又為后土之官與左傳君履后土别郊特牲云日用甲用日之始也召誥戊午乃社于新邑用戊者周公告營洛位成非常祭也餘論丘氏光庭曰唐月令注元日近春分前後戊日與鄭不同以社祭土土畏木甲屬木故不用而用戊日土也存疑馬氏睎孟曰日始於甲而社用之地以形成物而肇地事者氣也物成於辛而郊用之天以氣始物而終天事者形也萬物資氣於天故郊於孟春資生於地故社於仲春應氏鏞曰元日祈於上帝所以祀天也命民社所以祀地也故皆以元日乾始坤生事之如一也載芟之詩曰春藉田而祈社稷則藉田固已祈矣此復命民社蓋藉田所祈王自為立之王社也此命民社王所為羣姓立之大社也案社有對郊而言者北郊方澤之祭與南郊圜丘之祭同此禋祀之禮禮之最尊者不置稷也有與廟對舉者庫門之內左宗廟右社稷祭法所云王為羣姓立社曰王社諸侯為百姓立社曰國社藉田之中王自為立社曰王社諸侯自為立社曰侯社此血祭之禮禮之稍輕者皆置稷也置稷則社配句龍名曰后土稷配棄名曰后稷后亦司也尊之故曰后耳至北郊則曰皇地祇不可名后土矣天之祭惟天子有之諸侯以下不得與焉地之祭不特諸侯有之而并使大夫以下成羣立社曰置社者蓋天父道也地母道也父為後之子惟一人母則庶妾之子亦得母之也北郊之社盡載物之地而祭之天子大社盡中國九州之地而祭之王社盡畿內之地而祭之諸侯國社祭一國之地侯社祭一國自食之地下而州社祭一州之地里社祭一里之地而已此所謂命民社乃一里之社其祭亦里宰主之但民皆得與於此所謂唯為社事單出里也舉下而上之春祈皆可知又案郊特牲言日用甲用日之始也蓋敬其事則命以始耳周武王𥘉行郊禮以辛未日故後祈穀之祭用辛若南效則斷用冬至所謂迎長日之至也馬氏以形成氣始訓辛甲其意似鑿又案羣姓統侯國言之大社尊於王社非民所得與矣應説亦誤命有司省囹圄去桎梏毋肆掠止獄訟省悉井切囹音零圄音語掠音亮正義鄭氏康成曰省減也囹圄所以禁守繫者桎梏械也掠謂捶治人皆順陽寬也蔡氏雍曰囹牢也圄止也所以止出入皆罪人所舍也焦氏喬曰夏曰均臺殷曰羑里周曰圜土秦曰囹圄漢曰若盧魏曰司空案均平也刑欲其平羑善也猶言福堂欲其遷善以致福或謂羑里乃地名未知孰是方氏慤曰囹圄不可去故曰省以察之桎梏可脫故曰去以除之肆掠行於吏故曰毋以禁之訟獄作乎下故曰止以息之凡此皆所以消隂事而已馬氏睎孟曰天地作解之時人應之為解之事應氏鏞曰肆縱也肆掠任意笞箠雖輕刑不可縱也黃氏震曰助生氣禁其逆生氣者存異鄭氏康成曰肆死刑暴尸也周禮曰肆之三日辨正應氏鏞曰桎梏且欲去之况敢暴尸乎且陳尸與掠治並言亦輕重不倫矣是月也玄鳥至至之日以大牢祠于高禖天子親往后妃率九嬪御乃禮天子所御帶以弓韣授以弓矢于高禖之前禖音媒韣大木反夏小正作來降燕乃睇正義鄭氏康成曰玄鳥燕也燕以施生時來巢人堂宇而字乳娶嫁之象也媒氏之官以為候變媒言禖者神之也御謂從往侍祠天子所御謂今有娠者於祠大祝酌酒飲於高禖之庭以神惠顯之也帶以弓韣授以弓矢求男之祥也王居明堂禮帶以弓韣禮之禖下其子必得天材案玄鳥一名鷾鴯一名天女自呼曰乙故名鳦徐氏師曾曰此言祈嗣之禮存疑鄭氏康成曰天子所御有夫人有嬪有世婦有女御獨云帥九嬪舉中也方氏慤曰九嬪御九嬪與九御也女御八十一人每九人屬一嬪故謂之九御言九嬪則包三夫人言九御則􅊶世婦矣存異鄭氏康成曰高辛之世玄鳥遺卵有娀簡狄吞之而生契後王以為媒官嘉祥而立其祠孔氏頴逹曰蔡雍以為媒神自古有之高者尊也毛詩傳薑嫄從帝祠於郊禖簡狄從帝祈於郊禖是簡狄前已有禖神矣鄭志焦喬云先契之時自有媒氏祓除之祀位在南郊後以簡狄之祥立高辛為媒神古昔先禖則廢之矣又案世本伏羲制伉儷及嫁娶之禮則古先禖當是伏羲也朱氏申曰后稷生於薑嫄故周人祀之為媒神辨正張氏虙曰商頌言天命玄鳥降而生商史記因謂簡狄行浴見玄鳥墮其卵取吞之而生契其言遂流於誕孔氏詩疏引此謂玄鳥春分而至氣候之常詩記其祈福之時耳孔子垂教怪神不語凡經所言為農有祈為兵有祈與凡水旱有祈皆正也周禮六祈獨不見媒官嘉祥之事然則高禖之祥豈容億度禮有舊典後王確守其禮可已是月也日夜分雷乃發聲始電蟄蟲咸動啓户始出夏小正正月啓蟄雉震詬正義馬氏融曰日夜分晝五十刻夜五十刻鄭氏康成曰又記時候發猶出也高氏誘曰日夜分晝夜鈞也冬隂閉固陽伏於下是月陽升震氣為雷激氣為電蟄伏之蟲始感陽而蘇開户以出也孔氏頴達曰雷是陽氣之聲將上與隂相衝蔡雍云季冬雷在地下則雉應而雊孟春動於地之上則蟄蟲應而振出至此升而動於天之下其聲發揚雷出有漸故云乃發聲電是陽光陽微則光不見此月陽氣漸盛以擊於隂其光乃見故云始電户謂穴也蟄蟲早者孟春已出晚者二月始出故云咸動明正月未皆動也庾蔚之云先記時候以應節後記時候以應二分二至故重記之通論方氏慤曰春秋之分隂陽適中而日夜無長短之差故言日夜分然春分以陽為主故繼言雷乃發聲秋分以隂為主故繼言雷始收聲乃者繼事之辭始者肇事之辭終則有始故也案馬融説日夜分據日出日入為限於分字甚明若如蔡雍據星見為夜日入後三刻日出前三刻皆為晝則不可言日夜分矣又古法子午時皆十刻餘皆八刻故百刻今時憲書時皆八刻故晝夜共九十六刻要之二分之日夜分二至冬之日短夏之日長原未嘗不同也先雷三日奮木鐸以令兆民曰雷將發聲有不戒其容止者生子不備必有凶災先去聲正義鄭氏康成曰主戒婦人有娠者也容止猶動靜高氏誘曰鐸木鈴也金口木舌曰木鐸金口金舌曰金鐸所以振告兆民者陳氏澔曰不戒容止謂房室之事褻瀆天威也生子不備謂形體有損缺凶災謂父母方氏慤曰凡此皆奮鐸所令之言其奮之人亦遒人小宰類與彭氏廉夫曰春分後六日其候曰雷乃發聲則有司之令其春分後四日與案天子既禮所御於高禖又奮木鐸以令娠婦誠以嗣續所關綦重貴賤一也隂陽值二分則中中則當葆其和二至則極極則當防其絶而雷電交作尤隂陽昧雜故不可不慎日夜分則同度量鈞衡石角斗甬正權概度音杜量音亮甬音勇概古代反淮南子下有令官市字正義鄭氏康成曰因晝夜等而平所當平也同角正皆謂平之也丈尺曰度斗斛曰量三十斤曰鈞稱上曰衡百二十斤曰石甬今斛也稱錘曰權概平斗斛者孔氏頴達曰律厯志黑秬一黍為一分十分為一寸十寸為一尺十尺為一丈十丈為一引五度審矣黃鍾之管長九寸圍九分其實一籥容千二百黍合籥為合十合為升十升為斗十斗為斛五量嘉矣黃鍾之籥重十二銖兩之為兩二十四銖十六兩為斤三十斤為鈞百二十斤為石五權正矣又云權與物均而生衡衡運生規規圓生矩矩方生繩繩直生準案律厯志分者自三微而成著可分别也寸者忖也尺者蒦也丈者張也引者信也夫度者别於分忖於寸蒦於尺張於丈信於引引者信天下也籥者黃鍾律之實也躍動微氣而生物也合者合籥之量也升者登合之量也斗者聚升之量也斛者角斗平多少之量也夫量者躍於籥合於合登於升聚於斗角於斛也以井水準其概銖者物由忽微始著至於成著可殊異也兩者兩黃鍾之重也二十四銖而成兩者二十四氣之象也斤者明也三百八十四銖易二篇之爻隂陽交動之象也十六兩成斤者四時乘四方之象也鈞者均也陽施其氣隂化其物皆得其成就平均也權與物均重萬一千五百二十銖當萬物之象也四百八十兩者六旬行八節之象也三十斤成鈞者一月之象也石者大也權之大者也始於銖兩於兩明於斤均於鈞終於石物終石大也四鈞為石者四時之象也重百二十斤者十二月之象也終於十二辰而復於子黃鍾之象也千九百二十兩者隂陽之數也三百八十四爻五行之象也四萬六千八十銖者萬一千五百二十物歷四時之象也馬氏睎孟曰鈞石出於衡斗甬出於量權者衡之用概者量之用也通論馬氏睎孟曰王者觀象於天然後稽器於人上承天之所為下以正其所為同度量權衡蓋自舜以來有是法也陳氏祥道曰栗氏以釜為量法止於三則升豆釜是也律歷志以斛為量法備於五則籥合升斗斛也法止於三自升而上登之以四則升四而豆豆四而釜故釜六斗四升法備於五自合而上登之以十則合十為升升十為斗斗十為斛故斛十斗然釜深尺內方尺而圜其外其重一鈞斛亦方尺而圜其外其重二鈞輕重不同何也周禮璧羡之度從十寸橫八寸皆為度則外深尺者十寸之尺也內方尺者八寸之尺也自方八寸而八之則方六十四寸漢無八寸之尺斛之內方皆十寸也故言方尺而不言深尺自方十寸十之則為方百寸故不同也釜之制旁為升臀為斗腹為釜斛之制左耳為升右耳為合籥臀為斗腹為斛蓋內方所以處數外圜所以利用耳高而小臀卑而博因其小者為升合因其博者為斗豆制器尚象豈偶然哉存疑吳氏澄曰鈞謂均平之與同角正一義非三十斤之鈞也案左傳異義云北魏及齊斗稱於古二而為一北周及隋斗稱於古三而為一又唐六典內外官司皆因隋制大史大常大醫用古制故當時有大斗小斗大兩小兩之名歐公集古録得漢銅甬銘曰容十斗重四十斤以今較之容三斗重十五斤是斗則三而有餘斤則三而不足又王莽布長二寸五分今一寸六分有竒廣一寸今六分半是後之大於古量為最權又次之度又次之又沈括云秦漢六斗當今一斗七升九合三斤當今十三兩是宋之權量大於唐元史云宋一石當今七斗是元斗斛又大於宋是月也耕者少舍乃修闔扇寢廟畢備毋作大事以妨農之事闔户臘反夏小正二月往耰黍正義鄭氏康成曰用木曰闔孔疏左傳晉州綽以枚數闔闔是齊城門知用木也用竹葦曰扇孔疏庶人蓽門故知竹葦與闔為對文也畢猶皆也凡廟前曰廟後曰寢孔疏廟接神尊故在前寢藏衣冠對廟為卑故在後但廟制有東西廂有序牆寢制惟有室而已高氏誘曰耕者少舍言耕皆出在野少有在都邑者也尚書曰厥民析散布在野傳曰震雷出滯土不備墾辟在司冦闔扇門扇也民所由出故治之寢以安身廟以事祖大事兵戈征伐也案鄭以廟之寢言高以人之寢室言二説相兼乃備存疑鄭氏康成曰舍猶止也因蟄蟲啓户耕事少間而治門户也陸氏佃曰細言闔扇大言寢廟以著其餘莫或不修也此之謂畢備張氏虙曰當寒之時塞向墐户修之者去其向之塞闔其户之墐古人慮農事之或妨也謂農之闔扇可乘間而修之若國之寢廟既以畢備不必作此大事以妨農之事蓋寢廟告成無有虧闕不必修也案詩言四之日舉趾仲春耕作方殷安得謂耕者至此稍休乎恐不若高説之確也闔扇兼城郭宫室諸門寢廟舉其重者寢廟畢備則他或不求備矣陸謂無不修張謂寢廟不必修恐皆未允也大事如築城郭造宫室皆是不止兵戈也是月也毋竭川澤毋漉陂池毋焚山林漉音鹿陂彼冝反正義鄭氏康成曰順陽養物也畜水曰陂穿地通水曰池高氏誘曰為盡天物也方氏慤曰川澤之物非竭其水不能盡取若陂池則漉以網罟可盡之矣二者主漁者言之毋焚山林主田者言之凡此皆以遂生物之理而已張氏虙曰周禮春搜火弊獻禽因焚萊除草也然惟搜時為然常時固有禁案流曰川瀦曰澤皆水之自然者堰曰陂鑿曰池皆水之人為者涸澤焚林逆生氣為甚故禁之天子乃鮮羔開冰先薦寢廟鮮讀獻夏小正頒冰在三月正義鄭氏康成曰鮮當為獻聲之誤也孔疏據詩獻羔祭韭知鮮當為獻也獻羔謂祭司寒也孔疏以下有薦寢廟恐人疑是獻羔寢廟故言祭司寒也司寒玄冥水神也祭司寒而出冰孔疏以傳云祭寒而藏之知出亦祭司寒薦於宗廟乃後賦之孔疏乃賦之謂孟夏凌人職夏頒冰春秋傳曰古者日在北陸而藏冰孔疏北陸虛也十二月日在虛西陸朝覿而出之孔疏西陸昴也四月日在昴畢朝見東方其藏冰也深山窮谷固隂沍寒於是乎取之孔疏杜預云沍閉也其出之也朝之祿位賓食喪祭於是乎用之孔疏祿位謂命夫命婦賓謂接迎賓客食謂尋常飲食喪謂死喪祭謂祭祀其藏之也黑牡秬黍以饗司寒其出之也桃􅋃棘矢以除其災孔疏桃去不祥棘刺禦惡其出入也時食肉之祿冰皆與焉大夫命婦喪浴用冰祭寒而藏之獻羔而啓之公始用之火出而畢賦孔疏左傳火出於夏為三月於商為四月於周為五月畢賦應得冰之人無論尊卑盡賦與之自命夫命婦至於老疾無不受冰高氏誘曰春薦韭卵取冰以祭通論孔氏頴達曰此開冰在卯月左傳火出為辰月周禮夏頒冰乃巳月不同者建辰火星始見建巳火星漸高早則三月之末晚則四月之初又三月內得有四月節也月令季冬藏冰詩三之日納于凌隂鄭云豳地晚寒所以校遲一月也方氏慤曰古者鑿冰於建丑之月以重隂方固而達陽氣也藏於寅以少陽尚栗而間隂氣也開於卯以陽方中而順中氣也頒於己以陽方盛而禦暑氣也既曰廟又曰寢何也王者於祖禰以人道事之則有寢以神道事之則有廟王者七廟而周官𨽻僕止掌五寢以二祧將毁先除其寢去事有漸故也葉氏曰周官外饔之膳羞必以鑑酒人漿人之酒醴亦以鑑是飲食不可無冰也祭祀共冰賓客共冰大喪共夷槃是賓客喪祭不可無冰也凌人正歲十有二月令斬冰二月將開冰始治鑑夏頒冰秋刷冰室是四時皆治冰政也蓋隂陽二氣流行一氣未至則閉而為災一氣或過則乖而為疾故方隂盛而陽微也則鑿冰以達陽而備暑方陽盛而隂消也則出冰以助隂而禦暑董氏應㿩曰冬藏冰以節地下陽氣之盛此開冰以節地上陽氣之盛存疑陳氏祥道曰先儒謂廟藏神主祭以四時寢藏衣冠祭以新物然國語曰大寒取名魚祭川禽嘗之寢廟月令四時新物皆先薦寢廟蓋有寢者薦於寢無寢者薦於廟非謂薦止於廟後之寢也方氏慤曰開冰陽事也用羊為火畜也不以羊而以羔者方少陽用事而又品物少故也先薦寢廟所以重時物不敢以人之餘奉神也案適士以上乃有廟庶人無廟祭於寢禮有田則祭無田則薦先王以孝治天下知人子之心無窮而分則有限其有限者以祭定之其無窮者以薦伸之故於四時之物先薦寢廟見薦者以生人之道事之三年之喪主未入在廟而在寢可薦即無廟而祭於寢者亦可薦也若謂藏衣冠之寢則薦亦以享神也不於主而於衣冠何哉又案羊為火畜本鄭氏説其實開冰非重祭故不用牛司寒天神不可過卑故不用特豚耳存異陸氏佃曰鮮如字擊牲曰鮮言鮮者以下祀言不用犧牲嫌於不殺見小祀用牲唯開冰也上丁命樂正習舞釋菜天子乃帥三公九卿諸侯大夫親往視之仲丁又命樂正入學習樂菜吕氏春秋作采正義鄭氏康成曰樂正樂官之長也命習舞順萬物始出地鼓舞也將舞必釋菜於先師以禮之夏小正曰丁亥萬用入學親往視之順時達物也習樂習歌與八音為季春將合樂也高氏誘曰上旬丁日命樂官正率卿大夫之子入學習舞也舍猶置也樂謂六代之樂中旬丁日又入學習樂樂所以移風易俗協和民人也馬氏睎孟曰親往視之為道之存故也用丁為文明故也董氏應㿩曰仲丁不往視上丁巳視之也黃氏震曰月令皆用呂氏月紀此以采為菜傳寫誤爾通論孔氏頴達曰孟春習舞仲春又習皆以春陽既動萬物出地王者習舞所以應之大胥春合舞秋合聲自是春秋之常事孟春習舞及仲春習舞仲丁習樂并季春合樂皆在大學但仲春習舞季春合樂皆天子親往餘則否孟春習合禮樂為將飲酎事稍輕天子不親往故但命樂師飲酎在朝天子親往而不云樂正文不備也仲夏樂師修鞀鞞為大雩預習之其事亦輕若雩時用盛樂天子親往亦命樂正也季秋習吹為將享帝亦樂師習之春夏重舞秋冬重吹故各舉重言之其實春亦有吹秋亦有舞也孟冬大飲蒸亦在大學天子親往與飲酎同季冬王與族人燕在大寢其事亦輕故大合吹亦命樂師方氏慤曰此先習舞後釋菜以春陽動舞以應之以習舞為主也大胥先釋菜後合舞以入學教人必禮先師以舍菜為主也二者不同先儒合之誤矣陸氏佃曰凡春習舞皆月習之至此乃釋菜爾張氏虙曰習樂於樂無所不習不特舞也古人作樂所以導和於天下乃時之常事豈必有所為乃一習之哉存疑高氏誘曰初入學官必禮先師置采帛於前以贄神也周禮春入學舍采合舞秋頒學合聲此之謂也案君子禮樂不可斯須去身然而習之亦各有所專所謂時教必有正業也春樂秋禮豈春不用禮秋不用樂哉以隂陽大分言之也而就樂言則又以舞鼓動為陽吹寧靜為隂春習舞秋習吹此又隂陽之小分也習禮樂非專為祭與飲而祭與飲必用之君子無適非禮樂况事之大者哉鄭於習禮習吹必云為某事固近於拘若夫工瞽舞人於將有事而預習之亦其敬事之道則然必謂不待此時始習亦過也又案鄭注菜如字高氏則菜為采高氏蓋依呂氏本也然儀禮只有釋幣而無釋采之文高以釋采即釋幣是屈儀禮以從呂也惟是月令原本呂氏説故尚可存之若謂他經釋菜皆可作采亦並為釋幣之説則未可信也是月也祀不用犧牲用圭璧更皮幣祀蔡雍作祈唐月令有是月也祀日於東郊正義鄭氏康成曰為季春將選而合騰之也更猶易也蔡氏雍曰祈者求之祭也預説水旱疾疫諸事必用圭璧但以皮幣更犧牲左傳所謂祈以幣更也高氏誘曰時尚生育故不用犧牲孔氏頴逹曰此謂祈禱小祀若大祀自依常法存疑鄭氏康成曰當祀者古以玉帛而已孔氏頴達曰應祀之時用圭璧更易此犧牲非但用圭璧更易又用皮幣更之馬氏睎孟曰古之制器者尚其象故圭鋭而璧圜其備物也致其義故皮致其文幣致其實其用不同用圭璧更皮幣非古也案諸本皆作祀而鄭孔説謂用圭璧皮幣以更犧牲陸馬諸説謂用圭璧以更皮幣揆之文義俱未安恐不若蔡本作祈而其説亦明白有據也詩靡神不舉靡愛斯牲圭璧既卒蓋祈亦用犧牲用圭璧此尚生育故但用圭璧而以皮幣更犧牲蓋以用獸之皮如用牲也不用犧牲用圭璧為句更皮幣三字申上不用犧牲仲春行秋令則其國大水寒氣總至寇戎來征行冬令則陽氣不勝麥乃不熟民多相掠行夏令則國乃大旱暖氣早來蟲螟為害掠音亮淮南子下有二月官倉其樹杏正義鄭氏康成曰行秋令則酉氣乘之行冬令則子氣乘之行夏令則午氣乘之也八月宿值昴畢畢好雨故大水寇戎來征金氣動也畢又為邉兵孔疏元命包云畢七星十六度主邉兵十一月為大隂故陽不勝民多相掠隂姦衆也蟲螟暑氣所生為災害高氏誘曰仲春陽中也陽氣長養而行殺戮故寒氣猥至而寇害之兵來伐其國也冬隂縮殺而行其令隂氣乘陽陽氣不勝故麥不熟而民飢民飢故相掠夏氣炎陽而行其令火氣勝故旱暖極陽生隂故蟲螟作害方氏慤曰水之氣寒故寒氣總至麥以秋稼夏乃穡仲春向於成矣而陽不勝故不熟螟食心夏德在火而心屬焉其害亦以類而已陳氏澔曰行秋令為酉金所傷冬令為子水所淫夏令為午火所泄也張氏虙曰麥為寒氣所害故不熟朱氏申曰麥火穀陽不勝故不熟季春之月日在胃昏七星中旦牽牛中胃音謂日在胃淮南子作招搖指辰夏小正三月參則伏正義鄭氏康成曰季少也季春日月會於大梁案疏謂在胃七度蓋自胃七度至畢十一度也而斗建辰之辰也高氏誘曰胃西方宿趙之分野孔氏頴達曰三月建辰辰振也律歷志振美於辰三統厯三月節日在胃七度昏張二度中旦斗二十六度中清明日在昴八度昏翼四度中旦女三度中元嘉厯三月節日在婁六度昏栁十二度中旦斗十四度中三月中日在胃九度昏七星初度中旦牽牛初度中徐氏師曾曰七星星也其星亦七故曰七星案此謂清明後三十日也胃西方土宿三星鼎足廣十五度月建辰而日在酉辰與酉合也七星南方陽宿七星如鉤其廣七度牽牛河鼓也牛北方金宿六星二角三腹一尾其廣亦七度河鼓三星直建牛上若牽之者故曰牽牛不言牛而言牽牛牛星稍細牽牛明大易見也唐月令三月節日在婁昏栁中曉南斗中斗建辰位之初三月中氣日在胃昏張中曉南斗中斗建辰位之中通書清明日在奎十二度穀雨日在婁十度今時憲書清明日在璧八度穀雨日在奎九度大梁古法初胃七度終畢十一度今法初奎十度終昴三度其日甲乙其帝大暤其神句芒其蟲鱗其音角律中姑洗洗蘇典反正義鄭氏康成曰姑洗者南吕之所生三分益一律長七寸九分寸之一季春氣至則姑洗之律應周語曰姑洗所以修潔百物考神納賓案國語注是月之物修潔故用之宗廟致神納賓漢志曰洗潔也陽氣洗物辜潔之也班氏固曰洗鮮也萬物去故莫不鮮潔也高氏誘曰姑故洗新也是月陽氣養生物皆去故就新也朱子曰姑洗之律長七寸一分存疑王氏喬桂曰姑洗長七寸二分自夾鍾益九分其數八其味酸其臭羶其祀户祭先脾桐始華田鼠化為鴽虹始見蓱始生鴽音如虹音紅見賢遍反蓱步丁反夏小正有委楊䍷羊􅕪則鳴桐始華作拂桐芭吕氏春秋淮南子唐月令蓱作萍正義鄭氏康成曰皆記時候也鴽鴾母孔疏爾雅釋鳥文郭氏曰謂䳺也螮蝀謂之虹孔疏爾雅釋天文郭云雌曰霓雄曰虹虹明盛者霓暗微者蓱萍也其大者曰蘋孔疏爾雅釋草文郭云蓱水中浮萍高氏誘曰桐梧桐也是月始葉鴽青州謂之鴹周雒謂之鴽幽州謂之鵲孔氏頴逹曰虹者隂陽交會之氣純隂純陽則虹不見若雲薄漏日日照雨滴則虹生陸氏佃曰蔡雍云桐木之後華者也稚之故曰始馬氏睎孟曰田鼠化為鴽隂類之慝遷乎陽而性和也蓱始生隂氣之浮以承陽者也方氏慤曰虹者天地訌潰之氣仲春陽方中隂莫能干焉至於辰則過中矣故隂干之而虹見且氣以有所干而交無所干而辨故孟冬隂陽極辨則虹藏朱子曰虹隨日所映故朝西而莫東虹者天地之淫氣也盧氏翰曰蓱無根而浮與水常平故謂之萍楊花入於流水則不生於止水則生一夕生九子江東謂之薸案桐有四種一白桐一青桐一荏桐一岡桐蓋木之隂者隂為陽所散故白乳盡乃華爾雅榮木曰桐蓋華而不實者其實者謂之梧田鼠嗛鼠夜行貪殘鴽一名䳺鶉夜則羣飛晝則草伏隂為陽所化故走化而飛貪化而善猶有隂焉未離其類故夜飛也日與雨交倐然成質為虹蓋雨者隂陽之和而日復以陽姦之故謂之淫氣其雄者竟天而明則截雨雌者長丈謂之霓反能致雨故曰大旱之望雲霓又莫虹則旱若日出即虹則雨隨至故曰朝隮于西崇朝其雨蓋隂陽之交氣隨其所勝而雨不雨分也蓱有三種大者曰蘋圓徑寸餘小者曰萍小如豆三月桞絮入水則化為萍隂弱從陽浮故無根也其一種大而有叉缺根長繫水底名荇菜又名接余天子居青陽右個乘鸞路駕倉龍載青旗衣青衣服倉玉食麥與羊其器疏以達正義鄭氏康成曰青陽右個東堂南偏張氏虙曰當辰上三月位也朱氏申曰右個以其介於右也是月也天子乃薦鞠衣于先帝鞠居六反又去六反正義鄭氏康成曰為將蠶求福祥之助也鞠衣黃桑之服孔疏色黃如鞠塵象桑葉始生與桑同色又當桑生時故知桑服先帝大暤之屬孔疏以不云上故知非天以春祭大暤故知大暤以蠶功大當非一人故云之屬孔氏頴逹曰據禮祭五帝自服大裘今薦鞠衣與桑同色故知為蠶求福王權賀㻛熊氏並以為祭之在明堂以大暤祭在明堂也通論陳氏祥道曰將耕也祈穀於上帝所以祈有秋將蠶也薦鞠衣於先帝所以祈有春蓋王與后常相資以成者也案黃帝之妃西陵氏始蠶後世祀為先蠶或天子先告黃帝而后乃祀西陵與又案王后六服有鞠衣服以躬桑則鄭訓為蠶求福祥非無據也但夲文言先帝不言上帝五帝安見非指宗廟乎禮夫人蠶繅以共衣服則后之服鞠衣以蠶正以供宗廟之祭服也天子先薦鞠衣於先帝以告將蠶亦其冝矣天子南北郊亦服后躬桑之服天尊祖親后不與於郊且婦人之事近於褻故不敢告天也若胡氏謂后妃事非天子當與則不然耕助以供粢盛天子諸侯事也而后夫人主穜稑之種則王與后相資以成必矣命舟牧覆舟五覆五反乃告舟備具于天子焉天子始乘舟薦鮪于寢廟乃為麥祈實覆芳服反音福鮪于軌反夏小正祭鮪見二月正義鄭氏康成曰舟牧主舟之官也覆反舟者備傾側也薦鮪進時美物也為麥祈實於含秀求其成也不言所祈承寢廟可知高氏誘曰天子將乘舟始漁恐有穿漏反覆視之至於五慎之至也鮪似鯉而大詩曰鱣鮪潑潑進此魚於寢廟禱祈宗祖求麥實也孔氏頴逹曰鮪似鱣而長鼻口在頷下體無鱗甲大者為王鮪小者為鮛鮪方氏慤曰覆以視其表反以視其裏必至於五至尊所乘不敢不慎之至也禮有告具告備具則苟具而已備則無所不備焉見精粗無不至也必乘舟而後薦鮪示親漁也先王之饗親牲必親牽殺必親射凡以致其敬而已薦必以鮪為其特大也農將登麥故祈其實慮稼穡之卒癢也存疑董氏應㿩曰薦鮪以薦新也非為麥祈而祈麥則因薦鮪而舉存異張氏虙曰天子於是乘舟其春遊與惟天子不以無事出因薦鮪於寢廟案言始乘舟不言始漁季冬已命漁師始漁矣此繼事故不言始也季冬親往視之而不乘舟則乘舟於是始故特言始乘舟危事也不敢不慎故重其詞也夏小正祭鮪在二月祈麥實在三月則兩事也董説有據矣周頌有潛以薦魚也禮食麥以魚魚者麥之配故薦魚以祈麥禮亦重矣而張氏以乘舟為春遊因薦鮪於寢廟且謂天子不以無事出故因薦鮪是薦鮪乃為春逰藉端而垂之為典何以示訓與是月也生氣方盛陽氣發泄句者畢出萌者盡達不可以內句古侯反音鉤內入聲正義鄭氏康成曰時可宣出不可收斂也句屈生者芒而直曰萌孔氏頴達曰當順天散物不可積聚納之在內方氏慤曰辰月以前句者亦出而未畢萌者亦達而未盡至此乃畢出盡達矣有終謂之畢無餘謂之盡春主發散冝出秋主揫斂宜內當此而可以內乎下布德行惠皆其事也朱氏申曰發動而有所至泄出而有所續天地之化方宣而外達人之政事顧可內之使內入乎彭氏亷夫曰布於萬物曰生氣原於造化曰陽氣陳氏澔曰不可以內言當施散恩惠以順生道之宣泄不可吝嗇閉藏也天子布德行惠命有司發倉廪賜貧窮振乏絶開府庫出幣帛周天下勉諸侯聘名士禮賢者廩吕氏春秋作窖正義鄭氏康成曰振猶救也勉猶勸也聘問也名士不仕者高氏誘曰方者為倉穿地曰窖無財曰貧鰥寡孤獨曰窮行而無資曰乏居而無食曰絶府庫幣帛之所藏有名德之士大賢之人聘而禮之將與興化致理也孔氏頴達曰無財曰貧無親曰窮暫無曰乏不續曰絶皇云長無謂之貧窮暫無謂之乏絶謂王者勉勸諸侯令聘問有名之士禮接德行之賢者也方氏慤曰發倉廩所以賜貧窮振乏絶而已開府庫而出幣帛將以聘名士禮賢者故也周天下言聘名士禮賢者之廣勉諸侯則又欲諸侯之致力焉名士有實之稱賢者有德之稱聘以問之禮以體之賢不止於名禮不止於問此輕重之别也吳氏澄曰天子既自有所聘所禮已而在諸侯境者又勉諸侯聘禮之欲周於天下而一無所遺也陳氏澔曰在內則命有司奉行在外則勉諸侯奉行凡此皆天子之德惠徐氏師曾曰凡此皆不內之謂也通論陳氏祥道曰孟春生氣未盛故命相布德施惠而已至此生氣方盛故天子布德行惠焉馬氏睎孟曰周禮以鄉師賙萬民之艱厄以司門養死政之老孤其天患民病則又以司救施惠之邦之委積遺人掌之野之鋤粟屋粟旅師聚之則春省耕而補不足所以待貧窮乏絶者此其時矣然古飬士以學馭臣以柄後世不能一於學然後以私恩聘名士不能用其柄然後以私敬禮賢者是其秦風乎存疑鄭氏康成曰周謂給不足也孔氏頴達曰蔡云穀藏曰倉米藏曰廩案周禮廩人職亦言九穀似未確又云名士謂德行貞絶道術通明王者不得而臣者賢者名士之次故於名士加束帛以優之賢則禮之而已案文義命有司領起發倉廩開府庫對舉惟方説最為分明若如鄭説則天下之不足者多矣府庫之幣帛有幾能盡天下而周之乎孔謂賢次於名方謂賢不止於名亦方説較勝但名士人所共推如謝安殷浩之類未必盡有其實賢則確見其實矣故聘之以其名禮之以其實也是月也命司空曰時雨將降下水上騰循行國邑周視原野修利隄防道達溝瀆開通道路毋有障塞上上聲行如字隄丁兮反道去聲塞入聲淮南子塞下有自國始至竟止正義鄭氏康成曰廣平曰原孔疏爾雅釋地文國也邑也平野也孔疏國邑原野各一物故歷數之溝瀆與道路不得不通所以除水潦便民事也孔疏不云隄防隄防非可通之物古者溝上有路孔疏周禮溝上有畛川上有路此通言之與彼别方氏慤曰司空掌土之官方春物生應時而雨謂之時雨然或過淫則趨下之水反騰上而為災故命以豫備之術也循行行之有序周視視之無遺修而利之使無害道而達之使無壅開而通之使無阻皆無有障顯以為隱塞虛以為實凡此皆豫備水災之術也朱氏申曰隄防以捍水者溝瀆以行水者道路人所往來案隄以蓄水防以障水溝以通水瀆以受水而溝上之路亦田甽之水所由以入溝者內而國邑外而原野皆疏通之無有障塞所以備潦而於疏通之中寓瀦蓄之法夏小正言越有小旱則所以備旱亦不外此矣田獵罝罘羅網畢翳餧獸之藥毋出九門罝音嗟子斜反罘音浮翳於計反音曀餧音委又去聲於偽反九門吕氏春秋唐月令並作國門正義鄭氏康成曰為鳥獸方字乳傷之逆天時也獸罟曰罝罘孔疏爾雅兔罟謂之罝郭云罝遮也罘罦通孫炎云兩轅網廣雅云罘兔罟也鳥罟曰羅孔疏爾雅文網小而柄長謂之畢孔疏似天上畢星翳射者所以自隱也凡諸罟及毒藥禁其出九門明其常有時不得用耳陸氏佃曰王城面各三門南北九經東西九緯毋出九門謂毋出此門也吳氏澄曰南三門王之正門平日此等之物皆不得出餘門則出此月則皆禁之徐氏師曾曰此仁及鳥獸之禁也存疑鄭氏康成曰九門路門應門雉門庫門皋門城門近郊門逺郊門關門孔氏頴達曰路門內有者不得出路門應門內有者不得出應門以此雖宫室所在亦有林苑及空間處得有羅網及毒藥所施案田獵之人豈有由天子路門出者孔氏亦知其非故附會為路應門內容有苑囿間地可弋獵但不得出此門由其説推之則郊門關門之內皆可弋獵特不可出郊關門耳是以地立禁非以時立禁也若謂季春九門內亦不得弋獵則但曰是月也禁弋獵足矣又何必言毋出九門乎是月也命野虞毋伐桑柘鳴鳩拂其羽戴勝降于桑具曲植籧筐后妃齊戒親東鄉躬桑禁婦女毋觀省婦使以勸蠶事蠶事既登分繭稱絲效功以共郊廟之服毋有敢惰柘之夜反植音治直吏反籧筥同君吕反或作蘧誤筐邱狂反齊齋同鄉觀並去聲省生上聲繭古典反共供同吕氏春秋戴勝作載任曲植作挾曲籧作蒙正義鄭氏康成曰野虞主田及山林之官毋伐桑柘愛蠶食也鳴鳩飛且翼相擊孔疏爾雅釋鳥鶌鳩鶻鵃郭云似山鵲而小青黑色多聲孫云一名鳴鳩戴勝織紝之鳥孔疏郭云頭上戴勝李巡云一名鴟鳩孫炎云即鳴鳩自關而東謂之戴鵀非也是時恆在桑言降者若時始自天來重之也此蠶將生之候也曲薄也孔疏方言云宋魏陳江淮間謂之曲或曰麴自關而西謂之薄植槌也孔疏懸蠶薄柱宋魏陳楚江淮間謂之植自關而西謂之槌齊謂之牂皆所以養蠶器也后妃親采桑示帥先天下也東鄉鄉時氣也明其不常留養蠶也孔疏暫示法而已若常留則東西南北無定面留養者所卜夫人與世婦孔疏據祭義文婦謂世婦及諸臣之妻也孔疏知不兼三夫人九嬪者以尊不當在禁限也內宰職曰仲春詔后帥外內命婦治蠶於北郊孔疏此在季春者仲春浴種此又浴也熊云蠶為龍精二月值大火始浴女外內子女也孔疏外子女甥之女內子女同姓女周禮稱內宗外宗未嫁者不與夏小正曰妾子始蠶執養宫事孔疏執操養長也謂內外子女執養蠶之事毋觀去容飾也孔疏志在養蠶無暇容飾婦使縫線組紃之事孔疏事專在蠶登成也敕往蠶者蠶畢轉課功以勸戒之高氏誘曰鳴鳩班鳩是月直刺上飛高數十丈乃復戴勝鶠鳩爾雅云鶠鳩部生於桑是月其子強飛自桑空中來下故曰戴任降于桑也曲三輔謂之栚案栚讀朕關東謂之棏案棏讀摘青徐謂之曲圓底曰蒙方底曰筐皆受桑器王親耕故后妃親桑以為天下先勸衆民也案栚棏橫者植直者加曲於上以受蠶非曲異名也方氏慤曰齋戒以神明其事東鄉以迎時氣也曲而織故曰曲直而立故曰植籧席之粗者筐筥之方者皆蠶具也省婦使不煩以他役使得一意於蠶以勸其事也蠶畢而登其數乃分繭使之繅稱絲使之織效其功之多少以供祭服特言郊廟外祭莫重於郊內祭莫重於廟也此言共孟夏言給者以后妃所躬蠶者致其恭合貴賤之繭稅則無不足也張氏虙曰野虞如周禮山虞澤虞朱氏申曰鳴鳩拂羽則人當效其儀戴勝織絍之鳥所以示婦功降桑則人當務其本曲薄也所以藉蠶植柱也所以承曲室謂之籧以宿蠶器謂之筐以求葉徐氏師曾曰命野虞以下將蠶之事后妃以下方蠶之事既登以下蠶畢之事是月也命工師令百工審五庫之量金鐡皮革筋角齒羽箭幹脂膠丹漆母或不良百工咸理監工日號母悖于時母或作為淫巧以蕩上心監號並平聲正義鄭氏康成曰工師司空之屬官孔疏以司空掌工巧此稱工巧師長知之也五庫藏此諸物之舍孔疏熊氏云金鐵一庫皮革筋一庫角齒一庫羽箭幹一庫脂膠丹漆一庫各以類相從也量謂物善惡之舊法孔疏依舊法審察之幹器之木也孔疏周禮弓人析幹此不但弓幹但器之材朴皆是凡揉幹有當用脂良善也咸皆也於百工皆理治其事之時工師則監之日號令之戒之以此二事也悖猶逆也百工作器物各有時逆之則不善時若弓人春液角孔疏春時先浸其角預令和濡夏治筋孔疏筋柔於角故於夏暑濕之時始治之秋合三材孔疏角在內筋在外幹在中秋時隂陽氣調用膠漆絲合三材冬奠體之屬也孔疏體往來之體冬氣凝寒物皆牢實內弓檠中使之堅強用時非一物故云之屬淫巧謂偽飾不如法也蕩謂動之使生奢泰也今月令無於時作為作詐偽孔氏頴達曰言造作器物當依時序悖時則物不堅牢又當依舊法過巧則使上生奢泰之心胡氏銓曰脂以柔皮革方氏慤曰工師百工之師故命之令百工五庫以五材而得名金鐵之類皆不離五材也先儒别而為五拘矣不謂之材而謂之量以材各有所受也咸理使之各治其事日號恐或惰於事也工固有巧然過巧則淫故此因其作而戒之孟冬又因其成重戒之張氏虙曰咸理不特一工為然日號不特一日為然朱氏申曰淫巧蕩上心玩物足以喪志也彭氏亷夫曰古者工執藝事以諫敢為淫巧以蕩上心乎通論丘氏濬曰虞廷九官共工居一蓋事雖小而君心之斂蕩係焉天下安危生民休戚皆係君心心一蕩則宫室服用必費財勞民而人有不堪矣然是心也斂之則難蕩之則易其始未嘗不起於微細而終於莫救此箕子於紂之象箸而知其不至於瑶臺璇室而不已也古人防未然之欲而謹其微者豈不深哉存異陸氏佃曰五庫五兵之庫此言兵器後言祭器案五庫有四説前二説皆可通陸謂五兵之庫恐不然是月之末擇吉日大合樂天子乃帥三公九卿諸侯大夫親往視之正義鄭氏康成曰大合樂所以助陽達物風化天下也其禮亡今天子以大射郡國以鄉射禮代之黃氏乾行曰前既習舞習樂此又大合之則聲容皆備歌舞相成因陽氣之盛以風天下不特國子民俊已也馬氏睎孟曰凡聲陽也春陽之中也大合樂必待陽中之末中聲之所止也蓋中聲以降非和平君子弗聽矣通論方氏慤曰於大合吹不率公卿諸侯大夫以不若合樂之備也於釋菜亦率之謹其行禮之始也存疑陸氏佃曰季冬所謂大合吹即此所謂大合樂或言吹或言樂相備也案陸説與方説相反而方為正蓋以文論則統言樂必有吹可知單言吹未見其必備樂也以義論則冬之氣尚閉藏不若春之氣皆和暢也是月也乃合纍牛騰馬遊牝于牧犧牲駒犢舉書其數纍上聲讀縲讀㹎皆非正義鄭氏康成曰纍騰皆乘匹之名是月所合牛馬謂繫在廄者其牝欲遊則就牧之牡而合之書其數明出時無他故至秋當録內且以知生息之多少也高氏誘曰纍牛父牛騰馬父馬皆將羣遊從牝於牧之野風合之孔氏頴達曰在廄牡馬須擬乘用者則不放之案乘者皆用牡馬故詩言四牡今刻本皆作牝誤也方氏慤曰合而遊於牧所以順隂陽之性且欲其孳生之蕃也牧蓄養之地存疑陸氏佃曰言遊牝則牡雖在牧不得遊也嗜欲不制則雖有龍牡猶將耗矣案纍負而上騰躍而起牛遲重故云纍馬驃疾故云騰皆牡欲就牝之形陳謂繫纍之牛非也言遊牝遊之者牡也周禮所謂中春通淫也若謂牡不得遊駒犢何自生乎但既遊之後必檢柙之使有節耳駒馬新生犢牛新生者犧牲體全而色純者駒犢統所生息者而言亦可供他用先言犧牲舉重也命國難九門磔攘以畢春氣難乃多反儺同磔竹柏反攘如羊反正義鄭氏康成曰此難難隂氣也隂氣至此不止害將及人所以及人者隂氣右行此月之中日行歷昴孔疏天氣左轉故斗建左行謂之陽氣日月右行日月比天為隂故云隂氣月初至中日從胃歷昴昴有大陵積尸之氣孔疏石氏星經大陵八星在胃北主死喪氣佚則厲鬼隨而出行命方相氏帥百𨽻索室驅疫以逐之又磔牲以攘於四郊之神所以畢止其災也王居明堂禮季春出疫於郊以攘春氣高氏誘曰南西北九門嫌非王氣所在故磔犬羊以禳使木氣盡達吳氏澄曰難者聚衆戲劇以盛其喜樂之氣使人之和氣充盈則足以勝天地之乖氣此亦先王燮理之一事而微其機使百姓由之而不知也案難者蒙熊皮黃金四目執戈驅逐有似於戲耳未嘗聚衆戲劇若後世魚龍曼衍之為也張氏虙曰聖人順隂陽之理惟恐邪之足以干正春氣發生有不正者干之則發生之功不遂於是難之以畢春氣逐其不正使春氣得以成功也通論方氏慤曰難以除隂慝以狂夫為之狂疾陽有餘惟陽有餘足以勝隂慝也裂牲謂之磔除禍謂之禳於九門欲隂慝之出也冬旁磔不止九門也畢春氣畢其功於前達秋氣達其道於外送寒氣隂積而成寒一嵗隂慝之盛未有甚於此者也故其難特大嵗將往矣故以送言之所難而歐者邪氣也畢之達之送之者正氣也惟夏不難陽盛之時隂慝不能作也春曰命國秋曰天子冬曰命有司何也天子之難為國而已非自為之命有司而已此言之序且互相備也陸氏佃曰言國則九門不在郊之外可知季春行冬令則寒氣時發草木皆肅國有大恐行夏令則民多疾疫時雨不降山陵不收行秋令則天多沈隂淫雨蚤降兵革並起淮南子下有三月官鄉其樹李正義鄭氏康成曰行冬令則丑氣乘之行夏令則未氣乘之行秋令則戍氣乘之也肅謂枝葉縮栗大恐水訛相驚孔疏冬氣來乘水欲至季春屬土水不來六月宿直鬼鬼為天尸時又有暑故多疫山陵不收高者暵於熱也隂淫霖也雨三日以上曰霖孔疏左傳文今月令曰衆雨高氏誘曰春行冬寒殺之令故寒氣早發草木上竦曰肅木不曲直也氣不和故國大惶恐行夏炎陽之令火干木故多疾疫雨澤不降故山陵所殖不收行秋金之令金者水之母故多沈隂為淫雨又金為兵故並起陳氏澔曰行冬令為丑土所應夏令未土所應秋令戍土所應也欽定禮記義疏卷二十一
