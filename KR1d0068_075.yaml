body:
  text: 鄉飲酒義第四十五正義孔氏穎逹曰案鄭目録云名曰鄉飲酒義者以其記鄉大夫飲賓於庠序之禮尊賢養老之義此於别録屬吉事儀禮有其事此記釋其義也但此篇有四事一則三年賓興賢能二則鄉大夫飲國中賢者三則州長習射飲酒四則黨正蜡祭飲酒知合有四事者以鄭注鄉人為鄉大夫士為州長黨正又云君子謂鄉大夫飲國中賢者下又云六十者坐五十者立侍亦是黨正飲酒之事下又云合諸鄉射亦是州長習射之禮鄉則三年一飲州則一年再飲黨則一年一飲所以然者天子六鄉諸侯三鄉各有鄉大夫而鄉有鄉學取致仕在鄉之大夫為父師致仕之士為少師在學中名為鄉先生使之教鄉中之人每年入學三年業成必升於君若天子之鄉則升學士於天子若諸侯之鄉則升學士於諸侯凡升之必用正月將升之時必先為鄉飲酒之禮鄉大夫與鄉先生謀事擇學士最賢者使為賓次者為介又次者為衆賓鄉大夫為主人與之飲酒而後升之故周禮鄉大夫職云三年則大比攷其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆以禮禮賓之若州一年再飲者是春秋習射因而飲之以州長為主人也若黨一年一飲者是歲十二月國於大蜡祭而黨中於學飲酒子貢觀蜡是也此則黨正為主人也此鄉飲酒之義說儀禮諸侯之鄉大夫三年賓賢能之禮鄭知諸侯之鄉大夫者以鄉飲酒禮云磬階閒縮霤注云大夫而特縣方賓鄉人之賢者從士禮也若天子之大夫特縣則鐘磬並有也若諸侯之州長則士也故儀禮鄉射是諸侯州長經稱鹿中記云士則鹿中也吕氏大臨曰鄉飲酒者鄉人以時㑹聚飲酒之禮也因飲酒而射焉則謂之鄉射此篇凡六章初言尊讓絜敬所以免人禍也次言學術道者將以得身次言先禮後財則民敬讓次言尊長敬老而孝弟之行立次言五行者足以正身安國次言古之制禮法象天地皆所以推明聖人制作之意也通論劉氏彞曰鄉飲酒之禮歲則一行於黨再行於州三年一行於鄉所以行其三物充乎五品以礪其德行以觀其賢能以采其髦俊以不盡性於中和為媿為恥為邦閭之指笑也此鄉飲酒之禮所以為王道之範圍風俗之砥礪也餘論陳氏祥道曰酒者人之所以養陽而人情無節則亂故先王有禮以制之書云有正有事無彛酒則非時而飲皆禁也又曰羣飲汝勿佚盡執拘以歸於周則不特非時而羣飲者又戒也葢酒之於人始乎治常卒乎亂始乎安常卒乎危不能節之則養之適所以害之故節之以其時節之以其禮而鄉飲之所由作矣存疑吕氏大臨曰鄉人凡有聚㑹當行此禮恐不特四事也論語鄉人飲酒杖者出斯出矣亦指鄉人而言之鄉飲酒之義主人拜迎賓于庠門之外入三揖而后至階三讓而后升所以致尊讓也盥洗揚觶所以致絜也拜至拜洗拜受拜送拜既所以致敬也盥音管觶之豉反絜與潔通正義鄭氏康成曰庠鄉學也州黨曰序掦舉也今禮皆作騰拜至謂始升時拜拜賓至孔氏穎逹曰迎賓庠門之外者謂鄉大夫若州長黨正則於序門外也主人將獻賓以水盥手而洗爵揚觶既獻後舉觶酬賓之時亦盥洗所以致其絜敬之意也賓與主人升堂後主人於阼階上北面再拜是拜至也拜至訖洗爵而升賓於西階上北面再拜拜主人洗也拜受者賓於西階上拜受爵也拜送者主人於阼階上拜送爵也拜既者賓飲酒既盡而拜也皆所以致其恭敬之心也吕氏大臨曰以謹遜之道尊賓始見於拜迎庠門之外三揖三讓而後升以潔清之道接賓則見於盥洗揚觶之際極其所致賓主之敬則見於拜至拜洗拜受拜送拜旣之節陳氏祥道曰進而禮之以致其尊退而禮之以致其讓而三揖至於階三辭以升堂則進退之節也盥洗則在人者絜也揚觶則在器者絜也夫是之謂致絜拜至而後拜送此主也拜洗而後拜受此賓也至於受而飲飲而盡則為拜旣而其禮盖亦賓而已盖拜者屈之而使卑在我者卑則於人為尊而無侮矣夫是之謂致敬也馬氏睎孟曰入三揖而後至階主所以致尊於賓三讓而後升賓所以致讓於主彭氏曰三揖者將進揖一也當陳揖案陳謂堂塗二也當碑揖三也三讓如曲禮主人與客讓登主人先登客從之是皆致尊讓也餘論孔氏穎逹曰案州長職云春秋射於州序黨正云屬民飲酒於序是州黨曰序有室謂之庠無室謂之序郷學為庠州黨為序學記云黨有庠者謂郷人在州黨但於郷之庠學不别立也則州黨曰序必是無室但有虞氏之庠周以為郷學夏后氏之序周以為州黨之學明夏時之序則有室周時州黨之學則無室也序名雖同其制則别又郷學雖為序亦有東西墻謂之序故郷飲酒或云序東西州學雖為序據其序内亦有堂稱故郷射或云堂東堂西也方氏慤曰學所以明人倫而人倫之序成於相齒故鄉飲之禮必行之於學行之於學而此止言庠門者以養賢敬老為主故也王制言耆老皆朝於庠非謂是乎案孟子言鄉黨莫如齒王制言習鄉尚齒則惟三年大比其為賓者必賢能也或賢能中亦以齒未可知禮曰朝廷同爵則尚齒義可推耳尊讓絜敬也者君子之所以相接也君子尊讓則不爭絜敬則不慢不慢不爭則逺於鬭辨矣不鬭辨則無暴亂之禍矣斯君子所以免於人禍也故聖人制之以道逺于萬反正義鄭氏康成曰道指此禮孔氏穎逹曰君子之相接尊讓絜敬如此其至雖有爭慢之心無從而生而尊讓絜敬之俗成矣禮行而至於成俗則天下之人皆將逺於鬭辨而免於人禍又曰先王之制禮也有道非茍為繁文飾貌升降之末者也陳氏祥道曰夫有所尊有所讓則相從以義而不敢爭有所絜有所敬則相推以誠而不敢慢粲然而文之以接懽然而恩之以愛不期於鬬而已無暴不期於辨而已無亂方氏慤曰鬭者力相攻之謂辨者言相敵之謂不鬭則無暴之禍不辨則無亂之禍且暴人者人恒暴之亂人者人恒亂之惟君子無暴亂之行所以免於人禍也案尊讓絜敬道也爭慢鬭辨暴亂人禍非道也聖人制此郷飲酒禮以尊讓絜敬之道故無非道之禍焉下賓主共之至象四時皆道也郷人士君子尊於房戸之間賓主共之也尊有𤣥酒貴其質也羞出自東房主人共之也洗當東榮主人之所以自絜而以事賓也上共字如字下共音恭正義鄭氏康成曰卿大夫士飲國中賢者亦用此禮也共尊者人臣卑不敢専大恵羞燕私可以自専也絜猶清也孔氏穎逹曰郷大夫等設酒尊於東房之西室户之東在賓主之間示賓主之共有此酒也酒雖主人所設賓亦以此酢主人故云賓主共之北面設尊𤣥酒在左謂在酒尊之西地道尊右貴其質素故也羞出自東房謂主人供於賓也榮屋翼也設洗於庭當屋之東翼示主人自絜以事賓也吕氏大臨曰𤣥酒水也飲之始也飲始於水極味於酒凡酒之設皆尚𤣥酒質之為貴不忘本也羞出自東房主人致味以養賓故曰主人共之而不以與賓共也洗當東榮主人自絜以事賓賓雖亦就此洗不曰賓主共之者明所以敬人者各自盡也陳氏祥道曰東者主人位而主所獻者為主共西者賓之位而賓所酬者為賓共惟夫賓與主和獻酬而皆有共也此尊所以間於房戸之中以見意與存疑鄭氏康成曰郷人郷大夫也士州長黨正也君子謂卿大夫士陸氏佃曰郷人士君子郷人之中有士君子之行者也周官所謂賢能是與孔氏穎達曰郷大夫等惟有東房方氏慤曰𤣥酒者以黑黍和於水而為之其為色則幽其為味則淡貴其質也案不如水之説確賈氏公彥曰榮即今之摶風屋翼榮者與屋為榮飾翼者與屋為翅翼也案郷人所該甚廣士則郷人之秀而君子則有徳有位之通稱注謂士為州長黨正以指侯國則可若王朝則郷大夫為上大夫卿州長為中大夫黨正為下大夫不得謂州長黨正為士也其謂主人為郷大夫者亦専本郷法而言若州射黨祭則又州長黨正為主人恐不得拘也其在侯國則郷大夫者郷人也有飲國中賢能之禮州長者士也有習射郷飲之禮黨正者亦士也有蜡祭郷飲之禮郷大夫者有賔興賢能郷飲之禮總謂之郷飲飲有獻酬拜洗拜受拜送拜旣之禮故曰賓主共之羞則宰夫授之而已故曰主人共之又案聘禮記云卿館於大夫大夫館於士而聘禮君使臣還玉於館賓退負右房則大夫士亦有右房不唯有東房也郷飲酒時賓席牖前南面三賓席在賓西皆南面若但有東房無右房則一室中賓已坐於西北三賓之席直無地可容矣故郷大夫不唯有東房不得舎經從疏也賓主象天地也介僎象陰陽也三賓象三光也讓之三也象月之三日而成魄也四面之坐象四時也僎一作全鄭讀遵今如字正義鄭氏康成曰隂陽助天地養成萬物之氣也三賓象天三光者繫於天也三光三大辰也天之政教出於大辰焉孔疏公羊云大辰者何大火也伐為大辰北辰亦為大辰故爾雅云大辰房心尾也大火謂之大辰北極為之北辰是三大辰也何休云大火與伐天子所以示民時之早晚天下取以為正故謂之大辰辰時也天之政教出於大辰孔氏穎逹曰此明賓主介僎坐位之義三賓衆賓也四面之坐主人東南象夏始賓西北象冬始僎東北象春始介西南象秋始其四時不離天地隂陽之内而坐即是賓主介僎之所象也吕氏大臨曰三賓者衆賓之長者也其所以輔賓猶三光之輔天也方氏慤曰天地者隂陽之體隂陽者天地之用故賓主象天地介僎象隂陽也三賓衆賓之所觀法而瞻仰者故象三光也後言介僎象日月則此言隂陽盖主日月耳介僎之輔賓主猶日月之運隂陽以成天地之光也故取象於日月隂陽之義三讓而後成禮猶月三日而後成魄也夫魄隂也而禮由隂作故以况之且陽道饒而主進隂道乏而主退則讓亦隂事也四面之坐則賓主介僎各坐於一方之面也夫有天地以為之體必有隂陽以為之用有隂陽之用然後三光之象垂三光之象垂然後有盈虧之理月有盈虧之理然後四時之序成故取象之序如此陸氏佃曰成魄謂望後三日且月以生明為進生魄為退退讓之事也餘論陳氏澔曰或謂介有剛辨之義僎有巽入之義各從其類義或然也存疑鄭氏康成曰古文禮僎皆作遵孔氏穎逹曰三日成魄者謂月盡之後三日乃成魄此謂月明盡之後而生魄非必月三日也魄謂明生旁有微光也初以前月大則月二日生魄前月小則月三日乃生魄方氏慤曰三光日月星也旣象日月又象三光者盖介僎兩而三賓三以象參兩之數辨正朱子曰魄者月之有體而無光處也故書言哉生明旁死魄皆謂月三日月初生時也凡言既生魄即謂月十六日月始闕時也今此篇兩言月三日而成魄疏知其謬而曲徇之故其説相戾之甚案儀禮賓若有遵者席於賓東一人舉觶乃入賓介皆降揖讓升是遵乃賓之尊非主之輔鄭以僎為遵大誤盖天子不以公為賓而以卿為賓諸侯不以卿為賓而以大夫為賓為近則有嫌降一等則無嫌也既不以為賓故後入本尊於賓故席於賓東郷飲酒禮亦然必其爵齒皆尊於賓因不為正賓故後入也若僎則卑於主介以輔賓必不可無僎以輔主則可有可無但有之則備故又謂之全耳三賓為衆賓之長席舉三賓者因衆賓無算主人獻衆賓衆賓之長升拜受者三人故特表此三賓以識敬或以賓介僎為三賓尢誤也三光注疏作三大辰為是方氏指日月星為三光則既曰設介僎以象日月又曰立三賓以象三光不贅而複乎三日成魄惟陸氏佃得之盖日君象月臣象惟望日去日最逺故盈望後三日稍近故已成魄至晦朔全近日則純魄晦後三日始稍逺故哉生明也此正謂三賓近賓而禮殺猶三卿近君而禮殺皆如月之讓日耳天地嚴凝之氣始於西南而盛於西北此天地之尊嚴氣也此天地之義氣也天地温厚之氣始於東北而盛於東南此天地之盛徳氣也此天地之仁氣也主人者尊賓故坐賓於西北而坐介於西南以輔賓賓者接人以義者也故坐於西北主人者接人以仁以徳厚者也故坐於東南而坐僎於東北以輔主人也正義鄭氏康成曰凝猶成也賓者接人以義言賓來以成人之徳孔氏穎逹曰賓在西北天地嚴凝之氣著主在東南天地温厚之氣著介在西南象隂之微氣僎在東北象陽之微氣張子曰坐有位者禮主於尊賢而已若賓主正對則兼主於敬主故賓主不相對坐以見尊賢之義雖四時之坐皆有義其實欲明其尊賢也吕氏大臨曰東北至於東南生氣也生氣温厚而主仁故自孟春至於孟夏生氣之所生萬物之所以發生天地之盛徳氣也主坐於東南僎坐於東北仁之序也西南至於西北殺氣也殺氣嚴凝而主義故自孟秋至於孟冬殺氣之所行萬物之所以収歛天地之尊嚴氣也賓坐於西北介坐於西南義之序也飲酒之義所以致主之養而尊賓也方氏慤曰秋斂冬藏義也故嚴凝為義春作夏長仁也故温厚為仁介僎者所以輔賓主而接人者也接人則賓主之先故坐於隂陽所始之地賓主則坐於隂陽之盛地焉主人必三揖仁之至也賓必三讓義之盡也以接人以仁為盛徳温厚則接人以義為嚴凝尊嚴可知葉氏夢得曰主人以仁接賓故在東南若賓則主人所尊其位則主人所擇而居也故先言坐賓於西北而後言接人以義若介先賓以通其意於主僎先主人以通其意於賓隂陽輔天地而天地以成功介僎輔賓主而賓主以成禮其居始生之地不亦宜乎案設席之次賓在牖前南面主席阼階上西面介在西階上東面僎在主人北亦西面若衆賓則在賓西有遵則在賓東皆南面後世賓東南面主西北面皆側席相向謬矣仁義接賓主有事俎豆有數曰聖聖立而将之以敬曰禮禮以體長㓜曰徳徳也者得於身也故曰古之學術道者将以得身也是故聖人務焉正義鄭氏康成曰聖通也所以通賓主之意也将猶奉也術猶藝也得身者謂成已令名免於刑罰也言學術道則此説賓賢能之禮方氏慤曰賓主之際其精至於仁義相接其粗至於俎豆有數非知禮之精者莫之能興故曰聖也聖之事既立然非将之以敬則亦怠而廢禮矣故聖立而将之以敬曰禮禮者天地之序郷飲主於序齒故曰禮以體長㓜曰徳各得其體豈他求哉故曰徳也者得於身也學術道者将以得身也馬氏睎孟曰因事以見聖即聖以行禮因禮以成徳此始終之序學術道者所以窮理得身者所以盡性禮足以窮理盡性故聖人務焉案有事主以仁為事賓以義為事也有數俎豆有爵者各以命數無爵則如下六十三豆七十四豆也聖通明也既立賓主以象天地而俎豆多寡又以爵以齒則義益通貫而顯明故曰聖又敬以行則有本有文而禮成矣郷飲之禮如黨正屬民固以齒而賓興養老之時爵同則尚齒賢同亦尚齒是皆體長㓜也術道行道之方制此禮使人由之皆使人得其性之固有也朱子謂此節牽附迂滯不足深究而諸儒之説愈支故就經姑申其説而餘盡汰之祭薦祭酒敬禮也嚌肺嘗禮也啐酒成禮也於席末言是席之正非専為飲食也為行禮也此所以貴禮而賤財也卒觶致實於西階上言是席之上非専為飲食也此先禮而後財之義也先禮而後財則民作敬讓而不争矣薦亦作􅏪同嚌才細反啐七内反為于偽反正義鄭氏康成曰非専為飲食言主於相敬以禮也致實謂盡酒也酒為觴實祭薦祭酒嚌肺於席中惟啐酒席末也孔氏穎逹曰祭薦者主人獻賓賓即席祭所薦脯醢也祭酒者既祭薦又祭酒也此是賓敬重主人之禮嚌肺者祭酒後興取俎上之肺嚌齒之嘗主人之禮也啐酒者飲主人酒而入口成主人之禮也席末謂席西頭也郷飲酒禮云祭脯醢奠爵右取肺郤左手右絶末以祭尚左手嚌之興加於俎坐捝手遂祭酒嚌肺在前祭酒在後此先云祭酒者嚌是嘗嚌之名祭酒是未飲之稱故祭酒與祭薦相連表其敬禮之事言此席之設本不為飲食盖主人敬重於賓故設席耳祭薦祭酒嚌肺敬主人之物故在席中啐酒則入於己故在席末於席上祭薦祭酒是貴禮席末啐酒是賤財也卒觶主人酬賓賓卒立以據觶也致實謂致盡其所實之酒於西階上不就席啐纔始入口故猶在席末卒觶則盡爵故逺在西階上前文方論設席之禮故言是席之正此覆説前席故變文言席之上上亦正也卒觶論其将欲卒觶之時致實論其盡酒之體先禮則貴後財則賤亦互相通方氏慤曰祭薦祭酒必祭其先而後飲食之也肺者據周人所貴祭薦祭酒則神之也故曰敬禮嚌肺則味之矣故曰嘗禮啐酒則飲之矣故曰成禮啐酒獻賓之觴卒觶則酬賓之時也主獻賓賓酢主主酬賓三事既備則獻酒之禮畢矣故曰卒觶西階則賓所有事之階也席之正則有别於席之末席之上則有别於席之下西階上即席之下也先禮則敬讓後財則不争葉氏夢得曰啐酒於席末既為賤財則祭脯醢以敬禮嚌肺以嘗禮皆居席之正是為貴禮也賓辭於西階上既為後財則羞出東房洗出東榮雖非席之上猶為先禮也盖郷飲酒之禮非専為飲食而已其啐爵也其卒觶也皆避其席亦所以防酒禍也貴禮而先之則民敬讓賤財而後之則無酒禍而民不争聖人所務盖如此案敬禮嘗禮成禮皆是賓敬主人而主人之所以敬賓者即此可見又案祭獨嚌肺者以周禮重肺祭必先肺嚌肺則徧嘗可知郷飲酒之禮六十者坐五十者立侍以聽政役所以明尊長也六十者三豆七十者四豆八十者五豆九十者六豆所以明養老也民知尊長養老而后乃能入孝弟民入孝弟出尊長養老而后成教成教而后國可安也君子之所謂孝者非家至而日見之也合諸郷射敎之郷飲酒之禮而孝弟之行立矣弟音悌下同行下孟反所謂孝之孝當作敎正義鄭氏康成曰此説郷飲酒謂黨正國索鬼神而祭祀則以禮屬民而飲酒於序以正齒位之禮也其郷射則州長春秋以禮㑹民而射於州序之禮也謂之郷者州黨乃郷之屬也或則郷之所居州黨郷大夫親為主人焉如今郡國下令長孔疏郡治之下及王侯有國治之下滿萬戸以上之令不滿萬戸之長於郷射飲酒從太守相臨之禮也孔疏令長似州長黨正太守似郷大夫孔氏穎逹曰郷飲酒禮賓賢能則用處士為賓其次為介其次為衆賓皆以年少者為之此正齒位之禮其賓介等皆用年老者為之其餘為衆賓賓内年六十以上者於堂上賓席之西南面坐若不盡則於介席之北東面北上坐其五十者則立於西階下東面北上示有陪侍之義非即在六十者旁同南面立也所以立於階下者示其聼受六十以上之政事役使以明尊敬長老也三豆至六豆者以十年加一豆非正禮故不得為籩豆偶也其五十者二豆而已故郷飲酒禮衆賓立於堂下者皆二豆其賓介之豆無正文當依衆賓之年而加之也豆是供飬之物故云明養老立侍是陪侍之儀故云明尊長入門而能行孝弟出門而能尊長養老也合諸郷射者謂春秋二時聚合其民於州長敎之以郷射之禮也敎之郷飲酒之禮者謂十月黨正飲酒敎之以郷飲酒之禮也案本文義謂郷飲固行飲禮即郷射亦行飲禮故曰合諸郷射教之郷飲酒之禮疏分兩句為兩時兩事誤儀禮郷飲酒篇無正齒位之禮今云六十者坐五十者立侍故知是黨正正齒位之禮此謂初飲酒之時正齒位及其末皆以醉為度雜記云一國之人皆若狂是也州長黨正射飲而並謂之郷者以州黨屬郷故云郷之屬也郷之所居州黨行飲酒射之禮則郷大夫代此州長黨正為主人故得稱郷射郷飲酒也若郷之州黨郷所不居則郷大夫不得為主人亦不得稱郷射郷飲酒但謂之州射黨正飲酒可也方氏慤曰六十者坐則七十以上亦坐可知五十者立則四十以下亦立可知聽政者聽上之人有所正聽役者聽上之有所使也必五十以下則立六十以上則坐者盖五十曰艾艾則服官政之時固宜立侍以聽政役六十曰耆耆則指使之時固宜坐以加政役於人也尊長在儀養老在物故坐立之不同所以明尊長豆數之不一所以明養老也民知尊長則能入弟民知養老則能入孝民入而孝弟於其家出而尊長養老於其國則敎成矣國豈有危疑之禍乎射義曰卿大夫之射也必先行郷飲酒之禮故云合諸郷射也吕氏大臨曰飲酒之禮老者加豆有至於六也案正薦之豆以明禮故有定數加豆以優老故以年為差此加字甚明陳氏祥道曰籩桃梅之屬地産也豆麋鹿之屬天産也地產所以養其隂則天產所以養其陽而老者隂也養隂必以陽故言豆而不及籩存疑陳氏祥道曰射所以觀徳飲所以尚齒王制曰耆老皆朝於庠元日習射尚功習郷尚齒是郷有習射尚齒矣而鄭以黨主飲州主射而郷大夫親為主者不已誤耶盖莫非飲也有飲於郷而正齒位者有飲於黨而正齒位者莫非射也有射於郷以觀徳者有射於州以觀徳者以黨不若州之衆故雖有飲而無射州不若郷之大故雖有射而無飲而有齒者亦未必有其徳此黨正言國索鬼神而祭祀則以禮屬民而飲酒於序以正齒位而州長言春秋以禮㑹民射於序也郷則有射有飲而兩全焉而記之所言者皆郷而已胡氏銓曰郷黨篇云郷人飲酒杖者出斯出矣杖者亦謂五十六十者而此經下亦云少長以齒則郷飲豈無正齒位之禮乎竊謂此是郷大夫非黨正也然則郷射亦不得謂之州長射矣若寔州黨則謂之州射黨正飲酒可也何得謂之郷乎趙恭父問此篇自郷飲酒之義而下先儒以為記郷大夫飲賓於庠序之禮自郷飲酒之禮而下先儒以為記黨正飲酒於庠序以正齒序之位今詳考其文前有古之學術道者将以得身云云固足以見賓興之意後有六十者坐五十者立侍以聽政役亦足以證序齒之事但某竊疑儀禮所載郷飲只是郷大夫興其賢能而以禮賓之不知説禮何取於黨飲而記為是義朱子曰此無他義只是作記者並舉之耳陳氏澔曰坐者坐於堂上立者立於堂下豆當從偶數今但十年而加一豆非正禮也方氏慤曰唯六十非肉不飽故六十以上始有豆數也前言俎豆有數而此不及俎者以俎大而豆小由其禮之小故止舉器之小者以明之也案鄭専以六十者坐節為黨正蜡祭屬民飲酒正齒位之禮遂疑賓賢能正齒位二禮迥異又以卿大夫之射必先行郷飲酒之禮遂疑郷飲郷射二禮必合殊不知王制言命郷簡不率教元日習射尚功習郷尚齒則簡不肖亦行郷飲矣何必専賓賢能乎賓賢能而賢同則以齒能同則以齒何必賓賢能不尚齒乎卿大夫射必先行飲禮豈士射不先行飲禮如孔子射於矍枂有揚觶以尊賢能非無飲禮也若飲有不射者以投壺代之或并無投壺如陳敬仲飲桓公酒之類是飲射二禮可分可合也但以飲而射則飲重以射而飲則射重儀禮可徴也而飲亦有重有輕士君子行之則重郷人無爵徳則假是禮行之而儀文不備其禮稍輕如正飲必有正豆加豆假是禮行者則有正豆無加豆惟六十以上乃有三豆四豆之加亦其一端也又案疏據六十者三豆推言五十者二豆是二豆乃五十以下之正豆六十以上乃有加豆五十以下有正豆無加豆也所謂正豆者郷飲酒禮賓介於設折俎之先薦脯醢衆賓辯有脯醢是也所謂加豆者徹俎後説屨升坐乃羞是也儀禮乃羞疏引此三豆至六豆以證之賓介有俎有豆有加豆衆賓則有豆無俎故謂六十以上始有加豆則可謂六十非肉不飽始有豆數則不可且郷飲以賓賢能習射正齒位皆禮之大者烏得謂俎大豆小目為禮之小止舉器之小者以明之如方氏説乎孔子曰吾觀於郷而知王道之易易也易以䜴反正義鄭氏康成曰郷郷飲酒也易易謂教化之本尊賢尚齒而已孔氏穎逹曰王者以尊賢尚齒為教化之本易取簡易之義重言易易猶言蕩蕩平平取語順也吕氏大臨曰禮之所尊尊其義也其文則擯相習之其義則君子知之脩其文逹其義然後可以化民成俗也貴賤明隆殺辨和樂而不流弟長而無遺安燕而不亂此五者皆見於飲酒之禮而可以化民成俗故曰吾觀於郷而知王道之易易也易謂易行主人親速賓及介而衆賓自從之至於門外主人拜賓及介而衆賓自入貴賤之義别矣别彼列反正義鄭氏康成曰速謂即家召之别猶明也孔氏穎達曰主人親自速賓並徃速介而衆賓不湏徃速自從賓介而來賓介至門主人拜賓及介而衆賓不湏拜自入門是賓介貴於衆賓也方氏慤曰賓三賓也三賓貴於衆賓而介則輔三賓者也故主人或親速之或不親而使之自從或不拜而使之自入故曰貴賤之義别矣三揖至于階三讓以賓升拜至獻酬辭讓之節繁及介省矣至于衆賓升受坐祭立飲不酢而降隆殺之義辨矣省所領反殺色戒反正義鄭氏康成曰繁猶盛也小減曰省辨猶别也尊者禮隆卑者禮殺尊卑别也孔氏穎達曰主人於賓三揖三讓拜其來至又酌酒獻賓賓酢主人主人又酌而自飲以酬賓是辭讓之節其數繁多也介酢主人則止主人不酬介是及介省矣主人獻衆賓於西階上受爵坐祭立飲不酢主人而降西階東面是於賓禮隆衆賓禮殺也吕氏大臨曰介之升也不三揖三讓不拜洗主人不之阼階拜送不嚌肺不啐酒不告㫖不自酌酢授主人爵主人不舉酬省於賓可知及衆賓則升受坐祭立飲不酢其拜受者衆賓之長三人餘則不拜省於介可知於一等之中寖有省焉此所以辨隆殺也方氏慤曰主酌賓為獻賓答主為酢主又答賓為酬是禮也三賓則備之至於介則省酬焉至於衆則又省酢矣升而受爵之時惟祭酒得坐及飲酒則立盖飲酒所以養己以其卑不敢坐而當其養故也前言貴賤之義此言隆殺之義貴賤指其人隆殺指其禮因其人之貴則禮為之隆因其人之賤則禮為之殺故其義先貴賤而後隆殺也工入升歌三終主人獻之笙入三終主人獻之間歌三終合樂三終工告樂備遂出一人揚觶乃立司正焉知其能和樂而不流也間間厠之間正義鄭氏康成曰工謂樂正也樂正既告備而降言遂出者自此至去不復升也流猶失禮也立司正以正禮則禮不失可知孔氏穎逹曰工入升歌鹿鳴四牡皇皇者華每一篇而一終主人獻之獻工也吹笙之人入於堂下奏南陔白華華黍每一篇一終主人獻之謂獻笙人也間代也笙歌已竟而堂上與堂下更代而作也堂上人歌魚麗則堂下笙由庚為一終堂上歌南有嘉魚則堂下笙崇丘為二終堂上歌南山有臺則堂下笙由儀為三終魚麗言太平年豐物多此采其物多酒㫖所以優賓南有嘉魚言太平君子有酒樂與賢者共之此采其能以禮下賢者與之燕樂南山有臺言太平之治以賢者為本此采其愛友賢者為邦家之基由庚崇丘由儀今亡其義未聞合樂三終者謂堂上下歌瑟及笙並作也若工歌闗睢則笙吹鵲巢合之歌葛覃則笙吹采蘩合之歌卷耳則笙吹采蘋合之故郷飲酒云乃合樂周南闗睢葛覃卷耳召南鵲巢采蘩采蘋也周南召南王后國君夫人房中之樂歌闗睢言后妃之徳葛覃言后妃之職卷耳言后妃之志鵲巢言國君夫人之徳采蘩言國君夫人之不失職采蘋言卿大夫妻能循法度工告樂備遂出者謂樂工先告樂正樂正告賓以樂備乃降立西階東北面自此遂出也一人謂主人之吏舉觶示將行旅酬也将㽞賓旅酬恐有懈惰故主人使相禮者一人為司正以監之陳氏祥道曰升歌堂上之樂笙入堂下之樂記曰歌者在上匏竹在下貴人聲也歌之者一篇為一終鹿鳴燕嘉賓歌之以示事四牡勞使臣之來歌之以示勸賓既至而無禮樂以文之則亦不足以示情此皇皇者華所以繼作也送之以禮樂言逺而有光華者乃其意也南陔相戒以養也白華孝子之潔白也白華以示其徳南陔以示其行外有行而内有徳不得其時而飲之亦不足以行禮此華黍所以繼作也其詩曰時和嵗豐宜黍宜稷者乃其意也示事示勸示情主人之所以事人示徳示行示禮主人之所以成已故主人獻之若夫相代而為間歌相同而為合樂則無所獻矣以其不特於主人故也魚麗作於上以見物多而禮能備禮能備則其道得矣故下有由庚以繼之詩曰由庚萬物得由其道是也南有嘉魚作於上以見至誠而樂相與則其功大矣故下有崇丘以繼之詩曰崇丘萬物得極其髙大是也南山有臺作於上以見得賢也自況能立太平之基則天下宜矣故下有由儀以繼之詩曰由儀萬物之生各得其宜是也二南者王化之本正始之道也用之郷人焉使郷大夫以之教其民用之邦國焉使諸侯以之教其臣又曰升歌笙入皆繼之以主人獻之以禮節樂於其始也間歌合樂必繼之以一人揚觶乃立司正以禮節樂於其終也作樂以行禮由禮以節樂賓主之情斯和樂而不流矣案儀禮郷飲酒卒歌主人獻工注一人工之長者也凡工賤不為之洗又曰大師則為之洗大射禮燕禮皆然又案燕禮合樂遂歌郷樂周南闗雎葛覃卷耳召南鵲巢采蘩采蘋是六詩皆歌也孔疏謂笙吹召南三詩未聞所據但合樂三終乃堂上下歌瑟及笙並作笙詩自小雅六詩而外不知合樂時吹笙又是何詩況笙詩有聲無辭鵲巢三篇則有辭矣姑仍疏以存其説可也賓酬主人主人酬介介酬衆賓少長以齒終於沃洗者焉知其能弟長而無遺矣少詩召反弟音悌正義鄭氏康成曰遺猶脱也忘也孔氏穎逹曰旅酬之時賓主人之黨各以少長為齒以次相旅至於執掌罍洗之人以水沃盥洗爵者皆豫酬酒之限是弟長無遺也主人酬介介酬衆賓雖據旅酬之時少長以齒終於沃洗因遂連言無算爵見無不周徧郷飲酒記主人之贊者西面北上不與無算爵然後與是也馬氏睎孟曰終於沃洗逮賤之謂也少長以齒能弟長也終於沃洗能無遺也朱子曰弟長而無遺弟悌也敬順之意言能使少者皆承順以事長者而無所遺棄也降説屨升坐脩爵無數飲酒之節朝不廢朝莫不廢夕賓出主人拜送節文終遂焉知其能安燕而不亂也下朝字直遥反莫音暮説脱同正義鄭氏康成曰朝夕朝莫聽事也不廢之者既朝乃飲先席則罷其正也終遂猶充備也孔氏穎逹曰無算爵前皆立而行禮未徹俎故未説屨至此徹俎之後乃説屨升堂坐也脩爵無數謂無算爵也朝後乃行飲酒之禮禮畢乃治私家之事是朝不廢朝莫不廢夕此謂郷飲酒禮若黨正飲酒一國若狂無不醉也飲畢主備禮拜而送賓節制文章終竟申遂不有闕少故知安燕而不亂貴賤明隆殺辨和樂而不流弟長而無遺安燕而不亂此五行者足以正身安國矣彼國安而天下安故曰吾觀於郷而知王道之易易也正義孔氏穎逹曰此總結上五種之事方氏慤曰五行行之於一身則身正而無邪施之於一國則國安而無危天下之本在國故曰國安而天下安天下安則王道成矣胡氏銓曰前言正席次言司正正禮此言正身盖席正然後禮正禮正然後身正身正則國正國正則天下安矣故繼之以國安而天下安也郷飲酒之義立賓以象天立主以象地設介僎以象日月立三賓以象三光古之制禮也經之以天地紀之以日月參之以三光政敎之本也正義鄭氏康成曰日出於東僎所在也月生於西介所在也孔氏穎逹曰此覆説郷飲酒禮之義有所法象之事前文天地共言此則析言之賓者主之所尊敬故以賓象天主供物以養賓故以主象地前經介僎象隂陽據其氣此云日月言其體僎在東北象日出介在西南象月出吕氏大臨曰飲酒之禮莫先於賓主立賓象天立主象地禮之經也其次立介僎以輔之輔之者紀也其次立三賓以陪之陪之者參也政教之立必有經有紀有參然後可行也其或言立或言設也立則本於創始之時設則見於既陳之後因賓而後用介因主而後用僎則是立賓立主於前乃設介設僎於後也禮之所制如此故用之於事則足以為政之本體之於道則足以為教之本亨狗於東方祖陽氣之發於東方也洗之在阼其水在洗東祖天地之左海也尊有𤣥酒教民不忘本也亨普萌反正義鄭氏康成曰祖猶法也狗所以養賓陽氣主養萬物海水之委也太古無酒用水而已孔氏穎逹曰烹狗東方覆説前文羞出自東房也洗之在阼水在洗東覆説洗當東榮也尊有𤣥酒亦覆上文吕氏大臨曰天地之間海居於東東則左也故洗在阼水在東有左海之義陳氏祥道曰牲用狗者狗之為物有所守而善擇人者也非其人則在所去故古之人於燕饗飲食皆用之方氏慤曰凡植物皆地產足以養人之隂凡動物皆天產足以養人之陽天產不特狗也而特烹狗者陽之辰窮於戍至陽之畜也東方者得陽之中烹至陽之畜於陽中之方又得其宜矣水則盛之於罍者盖酌之於罍而滌之於洗故其水在洗東洗既在東水又在洗之東者凡以祖天地之左海也左亦東也以方言之則曰東以體言之則曰左賓必南郷東方者春春之為言蠢也產萬物者聖也南方者夏夏之為言假也養之長之假之仁也西方者秋秋之為言愁也愁之以時察守義者也北方者冬冬之為言中也中者藏也是以天子之立也左聖鄉仁右義偝藏也郷許亮反下同偝音佩正義鄭氏康成曰春猶蠢也蠢動生之貌也聖之言生也假大也愁讀為揫揫斂也察猶察察嚴殺之貌也南郷郷仁貴長大萬物也察或為殺孔氏穎達曰聖之言生也東方產育萬物故為春為聖養育萬物長之使大亦為仁五行春為仁夏為禮今春為聖夏為仁者春夏皆是生長俱有仁恩之義中者藏也北方主智亦為信以五行言之則為信以生長斂藏言之則萬物所歸藏也吕氏大臨曰天子南面而立左則東方東方聖也左之則尊之也郷則南方南方仁也郷之則宗之也右則西方西方義也右之則用之也偝則北方北方藏也偝之則違之也天子之立如是而坐賓亦南郷者尊賓之至也馬氏睎孟曰春木為仁而夏曰仁何也天地之仁至乎夏而盡矣天地之義至乎冬而極矣故樂記曰春作夏長仁也秋斂冬藏義也長者大之而已秋者斂也萬物至秋而斂則其成體可察也義者仁之節秋者春夏之節也故曰守義中者萬物復歸其根也蔵者不露其形也以秋為揫斂則知春夏為發散也以冬為中藏則知春夏為外發也項氏安世曰聖管萬善故象春仁濟萬善故象夏義制萬事故象秋中藏萬理故象冬聖以徳言未及於用也故左之義以事言天下之大用也故右之郷仁以應物偝藏以反身也凡道備於身為聖施於物為仁形於事為義存於心為中名雖有四其實一也考其次序固人道之當然推其方位亦天理之自然也案此節有脱誤若移下主人必居東方三十一字置產萬物者聖也上賓必南郷四字屬南方者夏上則明順矣聖知本藏於冬而發於春仁育本見於春而大於夏言各有當也介必東郷介賓主也主人必居東方東方者春春之為言蠢也產萬物者也主人者造之產萬物者也正義鄭氏康成曰獻酬之禮主人將西賓將南介覸其間也主人者造之禮之所共由主人出也孔氏穎逹曰介賓主者主人獻賓將西行就賓賓又南行將就主人介在西階之上以介覵隔賓主之間也主人造之產萬物者釋所以主人居東方之意東方產育萬物主人供客所湏故造為產萬物之象存異方氏慤曰言賓必南郷以見主之北郷言介必東郷以見僎之西郷陸氏佃曰介必東郷介賓主也據此坐鄉東北明矣然則主人面西北賓面東南僎面西南皆可知案上文云坐賓於西北而坐介於西南主人坐於東南而坐僎於東北言其方也此又云賓必南郷介必東郷主人坐於東方言其郷也後世遂沿為側坐相向則誤矣觀儀禮獻賓時云賓升席自西方記云主人介升席自北方降自南方則其席之正而賓南鄉介東鄉主人西鄉皆可得而推之矣鄭注儀禮云賓席牖前南面主人席阼階上西面介席西階上東面衆賓席於賓席之西是四面之坐禮經甚明月者三日則成魄三月則成時是以禮有三讓建國必立三卿三賓者政教之本禮之大參也正義鄭氏康成曰禮者陰也大數取象法於月也孔氏穎達曰樂既為陽故禮為陰月是陰精故禮之數取法於月也鄉飲酒立三賓亦象國立三卿故曰政教之本吕氏大臨曰一生二二生三三生萬物三者物之所由致是故禮有三讓賓有三賓國有三卿上法於月則三日成魄三月成時政教所本禮之所以法也馬氏睎孟曰大國三卿周官所謂設其參是也射義第四十六正義孔氏穎達曰案鄭目錄云名射義者以其記燕射大射之禮觀德取士之義此於别錄屬吉事案此篇中有鄉射又云不失正鵠正則賓射然則鄉射賓射俱有之目録惟云燕射大射者此篇廣説天子諸侯大射燕射之義不專於鄉射賓射也射起自黄帝易繫辭云古者弦木為弧剡木為矢弧矢之利以威天下是弓矢起於黄帝虞書云侯以明之是射侯見於堯舜至周則具矣通論孔氏穎達曰禮射有三一大射是將祭擇士之射二賓射諸侯來朝天子或諸侯相朝而與之射三燕射謂息燕而與之射天子諸侯大夫三射皆具士無大射士無臣祭無所擇也射人云士射豻侯二正是士有賓射鄉射記云士布侯畫以鹿豕是士有燕射也其侯司裘職云王大射則共虎侯熊侯豹侯畿内諸侯大射止張熊侯豹侯若畿外諸侯大射亦張三侯逺尊得伸也一曰大侯天子以熊皮飾之二曰糝侯豹鵠而麋飾三曰豻侯胡犬皮飾侯若畿内卿大夫則麋侯也畿外卿大夫射侯無文葢降君一等則糝侯豻侯其鵠三分侯中而居其一以虎熊豹麋之皮飾其側又方制之以為謂之鵠鵠者取名於鳱鵠小鳥而難中故以中之為雋其侯道虎九十弓熊七十弓豹麋五十弓列國之諸侯大射大侯亦九十糝七十豻五十逺尊得伸可同耳其天子以下賓射王射三侯五正諸侯二侯三正卿大夫一侯三正士豻侯二正鄭云五正者中朱次白次蒼次黄𤣥居外三正損𤣥黄二正或以朱綠二侯者三正一侯者二正而已天子賓射用五正三正二正之侯諸侯賓射用三正之侯卿大夫用二正之侯士亦用二正之侯畿外諸侯以下賓射其侯無文約大射禮文之意諸侯既同天子張三侯則賓射亦同天子用五正三正二正其卿大夫射亦三正二正之侯士射二正之侯天子以下燕射則尊卑皆用一侯天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕其耦射人云王六耦諸侯四耦卿大夫士三耦謂畿内也若畿外諸侯以下則皆三耦也天子大射則在廟賓射則在朝諸侯亦在朝天子燕射則在寢諸侯亦在寢惟諸侯大射不顯畿内畿外之異鄭云大射於太學其諸侯賓射若在國則亦在朝與天子同若在國外相㑹則在境此三射之外又有鄉射謂卿大夫貢賢能之後行鄉射之禮而詢衆庶是也又有州長射於州序之禮又有主皮之射凡主皮之射有二一是卿大夫從君田獵無侯張獸皮而射之二是庶人無侯亦張皮而射之是也又有習武之射故司弓矢云弧弓以授射甲革椹質者是也吕氏大臨曰射者男子所有事也天下無事則用之於禮義故有大射鄉射之禮所以習容習藝觀德而選士天下有事則用之於戰勝故主皮呈力所以禦侮克敵也古者諸侯之射也必先行燕禮卿大夫士之射也必先行鄉飲酒之禮故燕禮者所以明君臣之義也鄉飲酒之禮者所以明長㓜之序也長丁丈反正義鄭氏康成曰言别尊卑老穉然後可以觀徳行也孔氏穎逹曰儀禮大射在未旅前具牲狗及設折俎行一獻此等皆燕法故云先行燕禮明君臣之義者謂臣於堂下再拜稽首升成拜君答拜以臣盡竭其力致敬於君君施恵以報之也明長㓜之序者黨正飲酒六十者坐五十者立侍是也吕氏大臨曰諸侯之射必先行燕禮者大射也卿大夫之射必先行郷飲酒之禮者郷射也射者男子之事必飾之以禮樂者所以養人之徳使之周旋中禮也盖燕與郷飲酒皆燕也因燕以娛賓不可以無禮故有大射郷射之禮禮不可無義故明君臣之義長㓜之序焉故射者進退周旋必中禮内志正外體直然後持弓矢審固持弓矢審固然後可以言中此可以觀徳行矣中行並去聲正義鄭氏康成曰内正外直習於禮樂有徳行者也正鵠之名出自此也孔氏穎逹曰此言射者内志審正則射能中故見其外射則可以觀其内徳射的謂之正欲明射者内志湏正也謂之鵠者鵠直也欲使射者外體之直吕氏大臨曰禮射必先比耦故一耦皆有上射下射皆執弓而挟矢其進也當階及階當物及物皆揖其退也亦如之其行有左右其升降有先後其射皆拾發其取矢於楅也始進揖當楅揖取矢揖旣搢挟矢揖退與將進者揖其取矢也有横弓郤手兼弣順羽拾取之節焉卒射而飲勝者袒決遂執張弓不勝者襲説決拾加弛弓升飲相揖如初則進退周旋必中禮可見矣夫先王制禮豈苟為繁文末節使人難行哉亦曰以善養人而已盖君子之於天下必無所不中節然後成徳也射一藝也容比於禮節比於樂發而不失正鵠是必有樂於義理乆於恭敬用志不分之心然後可以得之則其所以得之者其徳可知矣故曰可以觀徳行矣方氏慤曰進退者升降之節周旋者揖讓之容能中禮者以其先行禮故也内志正然後持弓矢審外體直然後持弓矢固惟固也故其力能至惟審也故其巧能中馬氏睎孟曰凡此所謂其容體比於禮也其節天子以騶虞為節諸侯以貍首為節卿大夫以采蘋為節士以采蘩為節騶虞者樂官備也貍首者樂㑹時也采蘋者樂循法也采蘩者樂不失職也是故天子以備官為節諸侯以時㑹天子為節卿大夫以循法為節士以不失職為節故明乎其節之志以不失其事則功成而徳行立徳行立則無暴亂之禍矣功成則國安故曰射者所以觀盛徳也貍力之反樂音洛行去聲正義鄭氏康成曰騶虞采蘋采蘩今詩篇名貍首逸下云曾孫侯氏是也孔疏儀禮鄭注貍之言不來也射諸侯首不朝者故以是名篇樂官備者謂騶虞曰壹發五豝喻得賢者多也吁嗟乎騶虞歎仁人也孔疏壹發而得五豝若君一求而得五賢㫁章取義樂㑹時者謂貍首曰小大莫處御於君所樂循法者謂采蘋曰于以采蘋南澗之濱循澗以采蘋喻循法度以成君事也樂不失職者謂采蘩曰被之僮僮夙夜在公孔氏穎逹曰射人云騶虞九節貍首七節采蘋采蘩皆五節鄉射注云五節歌五終四節四拾其一節先以聼也若然則九節者五節先以聽七節者三節先以聽皆以四節應乘矢拾發也陳氏祥道曰大射奏貍首閒若一郷射奏騶虞閒若一王之五節先以聽諸侯三節先以聽尊者先以聽則多卑者先以聽則寡盖所以優尊者欲其先知之審也然則王射以騶虞大夫士之郷射亦以騶虞者郷射之詢衆庶亦欲官備於天子也方氏慤曰節者樂歌之節也王氏謂天子以騶虞為節者樂仁而殺以時諸侯以貍首為節者樂御而射以禮盖射所以習武雖先王所不敢忘亦所不敢黷也習而不已其弊必至於黷焉亦在乎有以節之而已設官分職天子之事也故以備官為節制節謹度諸侯之事也故以時㑹天子為節服法服道法言卿大夫之事也故以循法為節保禄位守祭祀士之事也故以不失職為節馬氏睎孟曰騶虞為節以至不失職為節所謂其節比於樂也吕氏大臨曰貍首田之所獲物之至薄者也自曾孫侯氏而下言諸侯以燕射㑹其士大夫物薄誠至君臣相與習禮而天子之徳莫大於好生好生繼天者也諸侯之徳莫大於奉朝事奉朝事事君者也卿大夫之事莫大於法先王法先王守道者也士之徳莫大於敬事敬事死命者也先王制禮作樂以養人所以薰沐漸漬日遷於善而不自知也是故古者天子以射選諸侯卿大夫士射者男子之事也因而飾之以禮樂也故事之盡禮樂而可數為以立徳行者莫若射故聖王務焉數色角反下同行去聲正義鄭氏康成曰選士者先考徳行乃後決之以射男子生而有射事長學禮樂以飾之孔氏穎逹曰諸侯繼世而立卿大夫有功乃升非専以射而選但旣為諸侯卿大夫更以射辨其才藝髙下非謂直以射選補而用之也男子生有懸弧之義因為射事更飾以禮樂則容體比於禮其節比於樂是也凡事之中能窮盡禮樂而可數為之以興立人之徳行者莫如射故聖王務重焉方氏慤曰或先行燕禮或先行郷飲酒禮所謂飾之以禮或以騶虞為節或以貍首為節所謂飾之以樂是故古者天子之制諸侯嵗獻貢士於天子天子試之於射宫其容體比於禮其節比於樂而中多者得與於祭其容體不比於禮其節不比於樂而中少者不得與於祭數與於祭而君有慶數不與於祭而君有讓數有慶而益地數有讓則削地故曰射者射為諸侯也是以諸侯君臣盡志於射以習禮樂夫君臣習禮樂而以流亡者未之有也比毗志反下同中丁仲反與音預正義鄭氏康成曰嵗獻獻國事之書及計偕物也孔疏漢時謂郡國送文書之使為計吏其貢獻之物與計吏俱來故謂計偕物也三嵗而貢士舊説云大國三人次國二人小國一人流猶放也書曰舜流共工于幽州陸氏佃曰流亡即孟子流連荒亡孔氏穎逹曰中多者得與於祭此謂大射也案書傳云古者諸侯之於天子也三年一貢士一適謂之好徳再適謂之好善三適謂之有功有功者天子賜以衣服弓矢再賜以秬鬯三賜以虎賁百人號曰命諸侯一不適謂之過再不適謂之敖三不適謂之誣一絀以爵再絀以地三絀而地畢注云凡十五年鄭以此知三嵗而貢士也方氏慤曰助祭者助天子行禮樂之事也比謂禮樂相比而不失必曰比於禮樂而後曰中多則知不比於禮樂而偶中者亦不可以言中矣存疑胡氏銓曰三嵗一貢士盖書傳之説竊案經意止謂嵗獻即貢士爾故詩曰曾孫侯氏四正具舉大夫君子凡以庶士小大莫處御于君所以燕以射則燕則譽言君臣相與盡志於射以習禮樂則安則譽也是以天子制之而諸侯務焉此天子之所以養諸侯而兵不用諸侯自為正之具也正義鄭氏康成曰此曾孫之詩諸侯之射節也四正正爵四行也四行者獻賓獻公獻卿獻大夫乃後樂作而射也孔疏此大射禮若燕射則説屨升堂坐後乃射莫處無安居其官次者也御猶侍也以燕以射先行燕禮乃射也則燕則譽言國安則有名譽吕氏大臨曰國家閒暇諸侯與其卿大夫盡志於射以習禮樂是諸侯以禮樂養其羣臣也諸侯貢士於天子試之以射以中之多寡為賞罰則諸侯皆勉習禮樂以事天子是天子以禮樂養諸侯也方氏慤曰天子制射禮於上諸侯務之於下以使之習聽禮樂則所以養之也養之以禮則不爭養之以樂則無怨不争無怨則兵不用矣諸侯自為正之具者以射求正諸已故也存異陸氏佃曰四正盖天子諸侯大夫士之正據射人王以六耦射三侯五正諸侯以四耦射三侯三正孤卿大夫以三耦射一侯二正士以三耦射豻侯二正案如陸説則具舉字難觧且兼天子大夫士則上曾孫侯氏句亦難觧孔子射於矍相之圃盖觀者如堵牆射至於司馬使子路執弓矢出延射曰賁軍之將亡國之大夫與為人後者不入其餘皆入盖去者半入者半又使公罔之裘序㸃揚觶而語公罔之裘揚觶而語曰㓜壯孝弟耆耋好禮不從流俗脩身以俟死者不在此位也盖去者半處者半序㸃又掦觶而語曰好學不倦好禮不變旄期稱道不亂者不在此位也盖㢙有存者矍俱縳反相息亮反賁讀僨将子匠反與音預觶之䜴反弟音悌好呼報反下同俟死絶句者不二字一句下同不陸讀否吕如字屬下句㢙音僅正義鄭氏康成曰矍相地名先行飲酒禮将射乃以司正為司馬子路執弓矢出延射則為司射也延進也出進觀者欲射者也賁讀為僨猶覆敗也亡國亡君之國者也與為人後者與猶竒也後人者一人而已既有為者而徃奇之是貪財也子路陳此三者而觀者畏其義則或去也公罔之裘之發聲也射畢又使此二人舉觶者古者於旅也語謂説義理也三十曰壯耆耋皆老也流俗失俗也處猶㽞也八十九十曰旄百年曰期頤稱猶言也行也者不言有此行不可以在此賓位也孔氏穎逹曰孔子使子路為司射之官出門而延進觀者及欲射之人敗軍之將無勇亡國之大夫不忠且無知公罔氏也裘名也序氏也點名也至將旅時使二人舉觶誓衆不在此位者問衆人有此諸行不若有則可在此賓位也此記所陳惟約鄉射禮案郷射司射比衆耦於堂西此出延者盖觀者既多庭中不容故出延之入乃比耦也以初觀者在門外未有賓主之禮故誓惡者令不入以郷飲酒禮差之射禮畢旅酬之時乃是二人舉觶故郷射禮畢司馬反為司正樂正升堂復位賓取俎西之觶酬主人主人酬大夫自相旅畢君使二人舉觶於賓與大夫則當此公罔之裘序㸃二人舉觶之節也但衆賓射事旣了皆在賓位主人以禮接之不復斥言其惡但簡其善者耳旄期之老不復能射而得在位此老人本觀禮雖不能射與在賓中故知旅酬之時其人猶在也吕氏大臨曰郷射之禮先行郷飲酒至於将射以司正為司馬故曰射至於司馬也記云既旅士不入明未旅士猶可入而與射故子路執弓延射有入不入及去者入者之辭也卒射司馬反為司正然後行旅酬卒旅然後使二人舉觶於賓與大夫射事旣卒則衆賓皆在賓位故公罔之裘與序點舉觶以衆賓皆在賓位故有不在此位及去者處者存者之辭也賓在門外則司馬誓之使惡者不入賓在賓位則二人舉觶而語不復斥惡但使善者處耳方氏慤曰如堵牆言其周圍而固宻也司正以治禮名之司馬以治兵名之燕禮事也射兵事也方燕之時則名之為司正及射之時則名之為司馬亦各從其類也以将射也故執弓矢以延之以将旅也故揚觶而語焉又各以其類也不謂有如此者否則發問之辭也言能如此然後可以在此位也旄與耄同孟子曰反其旄倪馬氏睎孟曰敗軍之將亡國之大夫二者可以死而不死則非忠也捨巳之親而與為人之後者則非孝也去與入半言圃之外者去與處半言圃之内者㢙者僅也盖公罔之裘語之以畧序點語之以詳畧故責之以輕而處者半詳故責之以重而存者少劉氏敞曰與為人後者庶子而奪其宗則簒其祖也嫡子而後其族則輕其親也諸父諸兄諸弟而後其子兄弟則亂昭穆也異姓而後於人則背其姓也周衰此等盖多此仲氏之所惡也存疑鄭氏康成曰延或為誓序點或為徐㸃壯或為將旄期或為旄勤今禮揚皆作騰存異陸氏佃曰揚觶將以飲不勝者郷射云不勝者進北面坐取豐上之觶立卒觶是也公罔之裘揚觶以待初射之用序點又揚觶以待再射之用郷射曰設豐實觶如施之此當實序㸃所揚之觶也夫禮必再射以求幸中故序㸃所言又進於公罔之裘一等案鄭謂揚觶是於旅也語則射畢而合語時也故欲求好學好禮之人陸謂是罰爵似誤射之為言者繹也或曰舍也繹者各繹已之志也故心平體正持弓矢審固持弓矢審固則射中矣故曰為人父者以為父鵠為人子者以為子鵠為人君者以為君鵠為人臣者以為臣鵠故射者各射已之鵠故天子之大射謂之射侯射侯者射為諸侯也射中則得為諸侯射不中則不得為諸侯舍音捨中去聲正義鄭氏康成曰大射將祭擇士之射也以為某鵠者將射還視侯中之時意曰此鵠乃為某之鵠吾中之則成人不中之則不成人也得為諸侯謂有慶不得為諸侯謂有讓也孔氏穎逹曰鵠則上下俱同無復君臣父子之别而言以為父鵠者是升射之時既身為人父則念云所射之鵠是為人父之鵠中則任為人父不中則不任為人父故為人父者以為父鵠為人子以及君臣皆放此吕氏大臨曰射之為藝不専心致志則不得也所以父子君臣各以已為之鵠射者各射已之鵠故雖諸侯之射亦以中則得為諸侯不中則不得也故謂之射侯古之射者志於中也其専如是豈特志於中鵠中侯已哉中父之鵠則反求所以中為人父之道中子之鵠則反求所以中為人子之道是乃所以充其類繹其志也方氏慤曰繹若抽繹之繹言其繹於内而明於外舍若趨舍之舍言其舎於此而之於彼詩不云乎舍矢旣均又曰舍拔則獲射固有舎意餘論朱子曰射中則為諸侯不中則不得為諸侯此等語皆難信書謂庶頑讒説侯以明之然中間若有羿之能又如何以此分别恐大意畧以射審定非専以此去取也天子将祭必先習射於澤澤者所以擇士也已射於澤而後射於射宫射中者得與於祭不中者不得與於祭不得與於祭者有讓削以地得與於祭者有慶益以地進爵絀地是也與音預正義鄭氏康成曰澤宫名也士謂諸侯朝者諸臣及所貢士也皆先令習射於澤已乃射於射宫課中否也諸侯有慶者先進爵有讓者先削地孔氏穎達曰澤者盖於寛閒之處近水澤而為之也非惟祭而擇士餘射亦在其中故書𫝊論主皮射云嚮之取也於圃中勇力之取也今之取也於澤宫揖讓之取也是主皮之射亦近於澤也司弓矢云澤共射椹質之弓矢有慶者先進爵有讓者先絀地進則爵輕於地故先進爵而後益地也退則地輕於爵故先削地而後絀爵也故男子生桑弧蓬矢六以射天地四方天地四方者男子之所有事也故必先有志於其所有事然後敢用榖也飯食之謂也飯扶晚反食音嗣正義鄭氏康成曰男子生則設弧於門左三日負之人為之射乃卜食子也孔氏穎逹曰男子生而有為射之志故長大重之桑弧蓬矢取其質也所以用六者射天地四方也禮射惟四矢象禦四方之亂三日射罷而後用榖以食子也方氏慤曰天地四方謂之六合以上與下為合東與西為合南與北為合故也以射六合故以六矢射之射之則以射人代之而已六合男子之所有事也生而必射以示其有事之志射而後食以示其受禄之道陳氏澔曰宇宙内事皆已分内事皆男子之志也射者仁之道也求正諸己巳正而後發發而不中則不怨勝已者反求諸已而已矣孔子曰君子無所争必也射乎揖讓而升下而飲其爭也君子正義鄭氏康成曰諸猶於也必也射乎言君子至於射則有爭也下降也飲射爵者亦揖讓而升降勝者袒決遂執張弓不勝者襲説決拾郤左手右加弛弓於其上而升飲君子恥之是以射則争中孔氏穎逹曰儀禮大射云耦進上射在左並行當階北面揖及階揖升堂揖皆當其物北面揖及物揖射畢北面揖揖如升射是射時升降揖讓也經文揖讓而升謂飲射爵時揖讓非射時也方氏慤曰勝飲不勝則材養不材之意也材養不材仁之道也君子當仁不讓於此安得不爭乎陳氏澔曰為仁由已射之中否亦由已非他人所能與也故不怨勝已而反求諸身孔子曰射者何以射何以聽循聲而發發而不失正鵠者其唯賢者乎若夫不肖之人則彼將安能以中詩云發彼有的以祈爾爵祈求也求中以辭爵也酒者所以養老也所以養病也求中以辭爵者辭養也正音征夫音扶正義鄭氏康成曰何以言其難也聲謂樂節也畫布曰正棲皮曰鵠正之言正也鵠之言梏也梏直也言人正直乃能中也發或為射發猶射也的謂所射之識也言射的必欲中之者以求不飲女爵也辭養讓見養也孔氏穎逹曰何以射者言人之射何以能使射中與樂節相應也何以聽者言何以能聽此樂節使與射中相合也言射中樂節兩相應㑹作何法以為之至極難矣循聲而發謂射者依循樂聲而發矢不失正鵠言中也射中與樂節相㑹唯賢者乃能詩小雅賓之初筵之詩鄭注聲謂樂節騶虞九節之屬畫布曰正則賓射也棲皮曰鵠則大射也所射之識謂記識之處即正鵠之中也吕氏大臨曰君子責己重而責人輕我之不中則反求諸已曰非病也不能也必心平體正持弓矢審固循聲而發發而不大正鵠者惟賢者能之非不肖者所能也此責己之重也彼之不中則曰非不能也病也老也酒者所以養老與病也揖讓而升以禮相下以飲其不勝者此責人之輕也欽定禮記義疏卷七十五
