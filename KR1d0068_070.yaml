body:
  text: 奔喪第三十四正義孔氏頴達曰案鄭目録云名曰奔喪者以其居他國聞喪奔赴之禮此於別録屬喪服寔逸曲禮之正篇也奔䘮禮屬凶禮鄭氏云逸禮者六藝論云漢興髙堂生得禮十七篇藝文志云後於魯淹中案即孔子壁中得古文五十七篇其十七篇與今儀禮正同是則奔喪禮在十七篇外故謂之逸禮兼天子諸侯然以士為主故鄭下文注云未成服者素委貌是士之服也案古人期功皆棄官奔䘮漢安帝初以長吏多避事去官乃令非父母喪不得去職然如韋義楊仁以兄憂去譙元弟憂去賈逵祖憂去原未甞不奔也但去職必待君命或請之而君許或請之而君不許則外従公事退而私喪之如其倫耳奔喪之禮始聞親喪以哭答使者盡哀問故又哭盡哀遂行日行百里不以夜行正義鄭氏康成曰親父母也以哭答使者驚怛之哀無辭也問故問親䘮所由也雖非父母聞䘮而哭其禮亦然孔疏以下別曰唯父母知此兼五服不以夜行雖有哀戚猶辟害也晝夜之分别於昏眀哭則遂行者不為位也案行百里者痛親之變窮日之力也總論孔氏穎達曰此篇總眀奔五服之䘮此論初聞之節巳下論奔䘮在路至其國竟奔赴之節唯父母之喪見星而行見星而舍若未得行則成服而后行過國至竟哭盡哀而止哭辟市朝望其國竟哭舍音赦竟音境下同辟音避正義鄭氏康成曰侵晨冒昏彌益促言唯著異也未得行謂以君命有為者也成喪服得行則行至竟哭感此念親孔疏聘禮行至他國竟上誓衆使次介假道是行禮之處去時親在今返親亡故哭盡哀辟市朝為驚衆也望其國竟哭斬衰者也孔疏以下別言望鄉望門知之若母之齊衰期亦同也自是哭且遂行孔氏穎達曰奉君命而使使事未了不可以私喪廢公事故成服以俟君命有人代己則可行也案見星不夜行慎守其身不敢以先父母之遺體行殆且親未𦵏亦毁不滅性之義也通論孔氏頴達曰凡聞喪若聞父母之喪其哭之不離聞䘮之處不得為位即奔之也若有君命不得奔喪者聞䘮而哭又為位更哭也餘論黄氏乾行曰人子遭父母之䘮無私恩非孝子也無公義非忠臣也君子不以私害公不以家事辭王事故親之生也勞於王事則有不遑将父母之懐及其死也殉於王事則有未得奔喪之禮其成服而行也有感而哭則有不勝哀慕之情忠孝兩盡此人道所以為至也後世此義不行親存則絶裾以赴功名之㑹如温嵪之於晉親亡則徘徊而不去布置姦人盤踞左右以圗起復如史嵩之之於宋者君亦何頼也吁可歎哉至於家入門左升自西階殯東西靣坐哭盡哀括髮袒降堂東即位西鄉哭成踊襲絰於序東絞帶反位拜賔成踊送賔反位有賓後至者則拜之成踊送賔皆如初郷許亮反踴音勇絞古卯反正義鄭氏康成曰括髮袒者去飾也未成服者孔疏下云三日成服知此未成也素委貌深衣孔疏大夫巳上素弁此據士庶也以女人趨䘮縞總布深衣知男亦深衣巳成服者固自喪服矣已殯者位在下孔疏士䘮禮小斂訖降自西階即位知殯畢位在下但小斂之後未殯之前雖降仍升既殯則長在阼階之下也襲服衣也不於又哭乃絰者發喪巳踰日節於是可也孔䟽士喪禮小斂訖奉尸侇於堂降成踊襲絰於序東在家之小斂當奔䘮之又哭則宜又哭乃絰今不於又哭以已踰日莭也其未小斂而至與在家同耳孔䟽言威儀節度與在家同若帶絰等自用其奔䘮日數也不散帶者不見尸柩孔疏士䘮禮既小斂帶絰散麻三日乃絞垂此奔䘮初至即絞與在家異也以既殯不見尸柩故也凡拜賓者就其位既拜反位哭踊孔氏穎達曰此已下眀父母之喪奔至於家哭及袒踊成服之節升自西階者曲禮云為人子者升降不由阼階今父母新死未忍異於生也括髮袒者䘮巳經日不筓纚故也若尋常在家親始䘮則筓纚至眀日小斂畢乃括髮素委貌者小記云逺𦵏者比反哭者皆冠及郊而後免眀知在路皆冠也下云奔喪者非主人則主人為之拜賓此既親拜賔知是主人也襲絰序東者謂在堂下當序墻之東非謂堂上之序東也前送賔畢而反位後送賔畢而反位故云皆如初陳氏澔曰序東者在堂下而當堂上序牆之東也凡拜賔皆就賔之位而拜之拜竟則反已先所即之位而哭踊也存疑陸氏佃曰拜至拜送禮也不言拜送文畧也送盖於門内而已案士䘮禮賔出主人送于門外則門内之說非也陳氏澔曰襲絰者掩其袒而加要絰也案禮成服乃絞垂雜記異居兄弟猶始麻散帶至三日成服乃絞豈有奔父母之喪不散帶而遽絞垂者考儀禮士喪記既馮尸主人袒括髮絞帶在襲絰前注絞帶象革帶者此奔喪無馮尸禮故襲加首絰乃繫絞帶而加要絰之散垂於其上變於在家也陳謂加要絰尤誤若巳加要帶則象革帶者可加於大帶之外乎衆主人兄弟皆出門出門哭止闔門相者告就次闔戸臘反相息亮反正義鄭氏康成曰次倚廬也彭氏絲曰衆主人謂諸子兄弟謂衆兄弟案士喪禮主人送賔不言入下遂言主人揖衆主人乃就次則主人出送賔不復入也故此亦止言衆主人而不言主人存異陸氏佃曰據不得奔䘮賓出主人拜送於門外相者告就次次所次之處鄭氏謂為倚廬則齊衰以下亦曰告就次何也案斬衰者居倚廬齊衰者居堊室在倚廬南皆次也惟父不次於子兄不次於弟耳此為父自當居廬非誤於又哭括髮袒成踊於三哭猶括髮袒成踊三日成服拜賔送賓皆如初正義鄭氏康成曰又哭至眀日朝也三哭又其眀日朝也皆升堂括髮袒如始至孔疏皆升堂者約士䘮禮小斂大斂主人皆升堂也必又哭三哭者象小斂大斂時也雜記曰士三踊其夕哭従朝夕哭不括髮不袒不踊不以為數案夕哭不踊故不數此云三哭彼云三踊也小記并夕哭不踊數之則云五哭三袒三日三哭之眀日也既哭成其喪服杖於序東孔氏穎達曰括髮袒皆在堂上殯東西靣成踊則在堂下之東西靣位也皆如初者謂於堂下之東拜賔成踊送賔反位皆如初也通論陸氏佃曰喪大記云小斂主人袒說髦括髮以麻奉尸夷於堂主人襲帶絰士喪禮亦云此奔喪禮始至之日既襲絰絞帶可謂成服矣今曰三日成服則以眀日括髮袒又明日猶括髮袒始成服也奔䘮者非主人則主人為之拜賓送賔為於偽反正義彭氏絲曰非主人謂齊衰以下之喪者非䘮主也如父在奔母喪若奔祖父母喪父為主己不得為主人也則拜賔送賔皆父主之故云主人為之拜賓送賓陳氏澔曰非主人其餘或親或疏之屬也故下云齊衰以下案喪無二主即衆子奔父母之喪亦必適子為之拜賓送賔奔䘮者自齊衰巳下入門左中庭北靣哭盡哀免麻於序東即位袒與主人哭成踊於又哭三哭皆免袒有賔則主人拜賔送賓丈夫婦人之待之也皆如朝夕哭位無變也齊音咨衰音摧免音問下俱同正義鄭氏康成曰不升堂哭者非父母之喪統於主人也孔疏主人惟饋奠有事乃升堂尋常無事在堂下麻亦絰帶也於此言麻者眀所奔喪雖有輕者不至喪所無改服也孔疏父母之喪至䘮所乃改服齊衰恐是輕䘮在路已改故稱麻見必至家乃改服也凡袒者於位襲於序東袒襲不相因位孔疏麻即襲也序東在位北隱映於序此麻乃袒變於為父母也孔疏上父母之喪先袒括髮乃襲絰又哭三哭亦入門左中庭北靣如始至時也待奔喪者無變嫌賔客之也於賓客以哀變為敬此骨肉哀則自哀矣孔疏禮以變為敬若有客則拜賓與之成踊敬賔故變也此骨肉則哀矣不須為變也於此乃言待之眀奔喪者至三哭猶不以序入也孔疏平常五屬入哭與主人為次重者前輕者後今奔䘮者急哀但獨入哭不俟主人為次不係之初哭者見三哭猶然也孔氏穎達曰此眀奔喪齊衰巳下之喪主人待之之事陳氏澔曰齊衰以下入自門左而不升階但於中庭北靣而哭免麻謂加免於首加絰於要凡袒與襲不同位也待之謂待此奔喪者以其非賔客故不變所哭之位也通論孔氏穎達曰此謂男子奔喪故待之無變若婦人奔䘮則待之異於男子與賔客同故下文婦人奔喪東髽即位與主人拾踊拾更也主人與之更踊賓客之是待婦人為賓客禮以婦人外成適他族故也雖以賓客待之亦為異於賓客之禮故雜記云婦人奔喪入自闈門升自側階異於女賔若女賔則喪大記篇云寄公夫人入自大門今此入闈門以婦人雖是外成以奔夫屬不得全同女賓是也奔母之喪西靣哭盡哀括髮袒降堂東即位西鄉哭成踊襲免絰于序東拜賔送賔皆如奔父之禮於又哭不括髮鄉許亮反正義鄭氏康成曰為母於又哭而免輕於父也其他則同孔氏穎達曰此謂適子故經云拜賓送賔皆如奔父之禮若庶子則亦主人為之拜賔送賔彭氏絲曰此雖謂適子禮亦謂父歿奔母喪者若父在奔母喪則父主之通論孔氏穎達曰此文又哭不括髮與喪服小記篇又哭而免其理雖同其日則異小記據在家小斂之後又哭之時不括髮而免也此則従外奔喪至内於又哭不括髮而免也案奔䘮眀日又哭象小斂母喪在家小斂而免故奔喪又哭而免也上文奔父䘮有由入而升升而坐哭坐哭而降之節此言降則入升坐哭可知上言襲絰於序東對下帶而言則首絰也此言襲免絰於序東對免而言則要絰也婦人奔喪升自東階殯東西靣坐哭盡哀東髽即位與主人拾踊髽側瓜反拾其劫反正義鄭氏康成曰婦人謂姑姊妹女子子也東階東靣階也孔疏雜記升自側階婦人入者由闈門孔疏闈門東邊之門諸侯夫人奔䘮入自闈門眀卿大夫已下婦人皆從闈門入東髽髽於東序不髽於房變於在室者也孔疏士䘮禮婦人髽於室既殯之後室是神之所處故髽於東房此婦人来奔䘮故髽於東序變也去纚大紒曰髽拾更也主人與之更踊賔客之孔氏穎達曰男子之免在東序故知婦人亦髽於東序就掩映之處在堂上也男子則堂下也奔䘮者不及殯先之墓北靣坐哭盡哀主人之待之也即位於墓左婦人墓右成踊盡哀括髮東即主人位絰絞帶哭成踊拜賓反位成踊相者告事畢相息亮反正義鄭氏康成曰主人之待之謂在家者也孔疏在家者非適子此奔䘮者親拜賔為主人也哭於墓為父母則袒孔疏已下除䘮後歸為父母袒眀𦵏後歸為父母袒告事畢者於此後無事也孔疏於此墓所更無事孔氏穎達曰此論既𦵏之後奔父母之喪禮此奔喪者身是適子故經云拜賔反位成踊若非適子則不得拜賓也案𦵏至壙袒為下棺變也此之墓不袒不見尸柩也下入門袒於墓不見猶可也至入門弗見也升堂又弗見也曾不得一親奉尸柩也故必袒以致其意遂冠歸入門左北靣哭盡哀括髮袒成踊東即位拜賔成踊賓出主人拜送有賔後至者則拜之成踊送賓如初衆主人兄弟皆出門出門哭止相者告就次於又哭括髮成踊於三哭猶括髮成踊三日成服於五哭相者告事畢相息亮反正義鄭氏康成曰又哭三哭不袒者哀戚巳久殺之也孔疏但云括髮不云袒逸奔䘮禮說不及殯日於又哭猶括髪即位不袒告事畢者五哭而不復哭也成服之朝為四哭孔疏眀日之朝為五哭五哭之後不復哭此謂既期乃後歸至者也其未期猶朝夕哭不止於五哭孔氏穎達曰三日成服謂來奔䘮後三日通奔日則為四日初至象始死為一哭明日象小斂為二哭又眀日象大斂為三哭又明日成服之日為四哭成服明日為五哭皆數朝哭不數夕哭故為五也既期已後朔望朝哭而己未期猶朝夕哭不止五哭也陳氏澔曰哭雖五而括髮成踊則止於三下文免成踊亦同通論陸氏佃曰春秋傳曰歸父使於晉還自晉至檉聞君薨家遣墠帷哭君成踊何休謂臣為君本服斬衰故成踊比二日朝莫哭踊三日朝哭踊莫不復哭踊去事之殺也然則三日成服拜賔送賔皆如初亦事畢也而不言則喪尚新未忍言也存疑陸氏佃曰於五哭告事畢者成服前兩日朝暮哭成服之朝又一哭凡五哭奔喪成服奔䘮之事畢也案暮哭不數陸說非為母所以異於父者壹括髮其餘免以終事他如奔父之禮為於偽反正義鄭氏康成曰壹括髮謂歸入門哭時也於此乃言為母異於父者眀及殯不及殯其異者同孔氏穎達曰鄭恐壹括髮是墓所故眀入門時也及殯壹括髮不及殯亦壹括髮是異於父者其事同也齊衰巳下不及殯先之墓西靣哭盡哀免麻於東方即位與主人哭成踊襲有賔則主人拜賔送賓賔有後至者拜之如初相者告事畢遂冠歸入門左北靣哭盡哀免袒成踊東即位拜賔成踊賔出主人拜送於又哭免袒成踊於三哭猶免袒成踊三日成服於五哭相者告事畢正義鄭氏康成曰不北靣者亦統於主人上為父於又哭括髮而不袒此又哭三哭皆言袒衍字也孔疏父喪重不袒齊衰已下䘮輕乃更袒非其宜故知袒字衍孔氏穎達曰此眀既𦵏之後奔齊衰已下喪禮齊衰巳下有大功小功緦麻日月多少不同若奔在𦵏後而三月之外大功已上則有免麻東方三日成服若小功緦麻之䘮則不得有三日成服小功已下不稅無追服之理若𦵏後通葬前未滿五月小功則亦三日成服其緦麻之喪止臨䘮莭而来亦得三日成服也東即位謂奔喪者於東方就哭位拜賔謂主人代之拜賔成踊謂奔䘮者於主人拜賓之時而成踊案此襲字當是衍字上子奔父母喪在墓不袒不應齊衰已下有袒也通論方氏慤曰奔父母之䘮之墓而哭則北靣齊衰已下則西靣者盖北靣哀之隆西靣哀之殺陸氏佃曰齊衰奔䘮上言袒不言襲此言襲不言袒相備也相備而先言袒後言襲亦言之法且上言袒先成踊袒在成踊之前此言襲後成踊襲在成踊之後言與主人哭成踊則随主人踊不拾主人之踊存疑鄭氏康成曰不言袒言襲者容齊衰親者或袒可也孔疏經文直言免麻於東方即位不稱袒而下云成踊襲下既稱襲則有袒理經若言袒恐齊衰巳下皆袒故不得縂言袒也經稱襲者容有齊衰重為之得襲故言襲陸氏佃曰於齊衰言袒則父喪袒可知於父喪又哭不言袒上下比義可知案禮有逓殺上子奔父母䘮括髮袒又哭三哭亦如之齊衰以下則免袒又哭三哭亦如之此及殯者也若不及殯而之墓則括髮不袒注謂為父母袒歸入門括髮袒又哭三哭則括髮而巳是不及殯者殺於及殯齊衰以下又殺於其子在墓又殺於在家也此齊衰以下本殺於子不及殯則又殺矣故哭於墓則免麻而不袒惟歸入門則括髮袒而已餘則不當袒而記乃兩言袒則豈有親䘮不袒而齊衰以下反袒者鄭以袒為衍文其說是也陸泥於記文遂憑意以駁鄭曷不取上下記文而一究其逓殺之節耶聞喪不得奔䘮哭盡哀問故又哭盡哀乃為位括髮袒成踊襲絰絞帶即位拜賔反位成踊賔出主人拜送於門外反位若有賓後至者拜之成踊送賓如初於又哭括髮袒成踊於三哭猶括髮袒成踊三日成服於五哭拜賔送賔如初正義鄭氏康成曰聞父母喪而不得奔謂以君命有事不然者不得為位孔疏當須速奔也位有酇列之處如於家朝夕哭位矣不於又哭乃絰者喪至此踰日莭於是可也孔疏士喪禮小歛乃絰此亦當於眀日又哭乃絰今於聞喪日之又哭即絰者以赴者已踰其日莭也不言就次者當従其事不可以喪服廢公職也其在官亦告就次孔疏官府館舎賔之所専亦可作廬故禮畢亦告就次言五哭者以廹公事五日哀殺亦可以止孔氏穎達曰此眀聞喪不得奔於所聞之處𤼵喪成服之禮聞䘮之日覆哭踊畢􅊞所袒之衣著首絰絞帶之垂即東方之位於此有賔来即拜迎之去即送之又哭謂當日之中對初聞喪之哭乃為又哭於此哭後乃絰絞帶與眀日又哭別也於五哭不云告事畢禮文畧也陸氏佃曰乃為位乃者難辭也著為位於此不得已也陳氏澔曰篇首言若未得行則成服而後行此乃詳言其莭次若除喪而后歸則之墓哭成踊東括髮袒絰拜賔成踊送賔反位又哭盡哀遂除於家不哭主人之待之也無變於服與之哭不踊正義鄭氏康成曰東東即主人位孔疏東方是主人之位如不及殯者也孔疏上言不及殯先之墓遂除除於墓而歸孔疏鄭恐来家乃除故眀之無變於服自若時服也亦即位於墓左婦人墓右孔氏穎達曰此眀除服之後奔父母喪之節亦謂主人適子初在墓南北靣哭成踊乃来就主人之位括髮袒如不及殯之時也主人亦謂在家者著平常吉服服除哀殺故不踊也方氏慤曰喪者之墓雖哭於家則不哭主人之待之也雖哭於墓而不踊且無變於服時已過禮亦為之殺也陳氏澔曰袒絰者袒而襲襲而加絰也案此獨袒於墓者以除於墓而歸至家無所用袒故於墓一袒少伸其哀也歸者踊始見親墓也主人不踊䘮禮巳終也除喪而後歸此又變禮中之變者即云君命有奉使之事聞變即達達即奔䘮君子愛其親亦不奪人之親也其或行人被拘金革未息至萬萬不得巳者通其變使民不窮不可使忘親者以除喪後歸之禮為口實自齊衰已下所以異者免麻正義孔氏穎達曰此眀齊衰已下除服後奔喪唯著免麻不括髮墓所哭罷即除案為父括髮為母一括髮為齊衰已下不括髮皆以漸而殺之義髮膚受之父母自當僅為父母用之耳凡為位非親喪齊衰已下皆即位哭盡哀而東免絰即位袒成踊襲拜賓反位哭成踊送賓反位相者告就次三日五哭卒主人出送賓衆主人兄弟皆出門哭止相者告事畢成服拜賔相息亮反正義鄭氏康成曰謂無君事又無故可得奔䘮而以己私未奔者也唯父母之喪則不為位其哭之不離聞䘮之處齊衰已下更為位而哭皆可行乃行卒猶止也三日五哭者始聞喪訖夕為位乃出就次一哭也與眀日又眀日之朝夕而五哭不五朝哭而數朝夕備五哭而止亦為急奔喪孔氏穎達曰前云三日成服於五哭皆數朝哭此數夕哭為五哭者謂急欲奔䘮以己之私事須營蚤了故三日五哭而止也陳氏澔曰此言非親䘮而自齊衰以下亦得為位者必非奉君命以出而為私事未奔者也主人出送賔者謂既奔䘮至家則䘮家之主人為之出送賔也所謂奔䘮者非主人則主人為之出送賔也存疑鄭氏康成曰己私事當畢亦眀日乃成服凡云五哭者其後有賔亦與之哭而拜之陸氏佃曰事畢之後容成服矣而後賔至亦拜亦送也案此節末成服拜賔四字疑是脫簡或有闕文當是三日五哭卒遂歸成服主人拜出送賔故鄭云急奔䘮也對下至家成服觀之可見若所為位家逺則成服而徃正義鄭氏康成曰所當奔者外喪也外䘮緩而道逺成服乃行容待齎也孔氏穎達曰以外䘮恩輕哀情緩道路又逺容待齎持賵贈之物故成服乃去案若字作轉語則上節乃就家近而無俟於成服者言之齊衰望鄉而哭大功望門而哭小功至門而哭緦麻即位而哭正義鄭氏康成曰奔喪哭親疏逺近之差也孔氏穎達曰此眀奔䘮所至之處哭泣之禮案此因父母䘮望國竟哭而推言之服重者哀深故哭早服輕者哀淺故哭遲也通論孔氐穎達曰雜記云大功望鄉而哭此云望門者雜記謂本齊衰者降服大功案雜記兄弟之䘮大功巳上見䘮者之鄉而哭蓋以上則該齊衰而見又較近於望彼約畧之辭哭父之黨於廟母妻之黨於寢師於廟門外朋友於寢門外所識於野張帷或曰母之黨於廟案末句今本逸正義鄭氏康成曰此因五服聞䘮而哭列人恩諸所當哭者也黨謂族類無服者也逸奔䘮禮曰哭父族與母黨於廟妻之黨於寢朋友於寢門外一哭而已不踊言一哭而巳則不為位矣孔疏此本無服故但哭不為位朋友欲奔其䘮故先一哭若已乆則聞朋友䘮不哭孔氏穎達曰此眀無服之親聞喪所哭之處通論孔氏穎達曰檀弓云師吾哭諸寢與此異熊氏云檀弓殷禮此周法也此哭父黨於廟而檀弓云有殯聞逺兄弟之䘮哭於側室與此不同亦異代禮也此母黨在寢逸奔喪禮母黨在廟者皇氏云母存則哭於寢母亡則哭於廟熊氏云哭於廟者是親母黨哭於寢者是慈母繼母之黨未知孰是故兩存之方氏慤曰廟者神之所居有尊之道故哭父之黨於廟寢者人之所居有親之道故哭母妻之黨於寢師以道之尊而有别於父故於廟門外朋友以徳之親而有别於母妻故於寢門外所識則非親特與之相識而巳故於野以示其逺焉存疑孔氏穎達曰沈氏云事由父者哭之廟事由己者則哭之寢此師於廟門外者是父之友與為師同故哭之廟亦通也凡為位不奠正義鄭氏康成曰以其精神不在乎是張子曰為位者哭位也然亦有神位不奠者奠則乆奠也若在他所難為乆奠䘮禮則於殯常奠䘮不剥奠為其乆設也脯醢之奠則易之又曰為位不奠謂之不祭則不可但恐不如䘮奠以新易舊如此乆設也哭天子九諸侯七卿大夫五士三正義鄭氏康成曰此謂臣聞君䘮而未奔為位而哭尊卑日數之差也士亦有屬吏賤不得君臣之名存疑陸氏佃曰凡喪親始死哭不以數則士眀日朝莫哭又眀日成服之朝哭所謂三哭者此與大夫眀日又眀日朝莫哭又眀日朝哭凡五哭諸侯朝莫哭如大夫又三日朝哭凡七哭於是殯天子朝莫哭如諸侯又四日朝哭凡九哭於是殯陳氏澔曰九哭者九日餘倣此案始死哭踊襲小斂大斂哭踊凡四士襲無踊則三凡夕哭皆不踊不數朝哭無踊亦不數天子七日而殯始死襲斂加二日三日四日五日六日朝哭踊凡九也諸侯五日而殯始死襲斂加二日三日四日朝哭踊凡七也大夫三日而殯始死襲斂加二日朝哭踊為五若臣留滯他國聞䘮不得奔䘮為位而哭數亦象之陸不數始死襲斂而數朝莫哭陳不數莫哭惟數朝哭謂九哭九日似與初聞䘮象始死眀日又哭象小斂義違大夫哭諸侯不敢拜賔存疑鄭氏康成曰哭其舊君不敢拜賓避為主也案此疑是大夫在家聞君䘮即哭有来弔者不敢拜之避嗣君也哭問故即趨䘮矣或諸侯以朝㑹出薨於他國世子國卿必出迎䘮而諸臣次於公宫以哭異國有聘臣或過賔来唁亦不拜賔避嗣君也注謂舊君疑未必然也諸臣在他國為位而哭不敢拜賔正義鄭氏康成曰謂大夫士使於列國案聘禮赴者未至哭於巷不為位也衰於館未可以凶服出也赴者至則衰而出於時可以為位矣而猶不敢拜賓避為主也與諸侯為兄弟亦為位而哭正義鄭氏康成曰族親婚姻在異國者孔氏穎達曰此謂與諸侯異姓之婚姻又在他國不與諸侯為臣身又無服故暫為位而哭也案鄭釋兄弟為婚姻似未盡盖或有兄弟之在他國而未仕者所謂與諸侯為兄弟服斬者也若在他國巳仕則如舊君餘論孔氏穎達曰若與諸侯同姓皆服斬小記云與諸侯為兄弟者服斬是也若君姑姊妹之女来嫁國中者則有服雜記諸侯之外宗猶内宗是有服也凡為位者壹袒正義鄭氏康成曰謂於禮止可為位而哭也始聞喪哭而袒其眀日則否父母之䘮自若三袒也孔疏此謂斬衰已下之䘮初聞䘮應為位者初哭一袒而已又哭三哭則不袒若為父母之喪則又哭三哭皆袒前文所云者是也陸氏佃曰凡為位者一袒所謂凡為位即位袒成踊是也所識者弔先哭于家而後之墓皆為之成踊從主人北靣而踊為於偽反正義鄭氏康成曰従主人而踊拾踊也北靣自外来便也主人墓左西靣孔氏穎達曰此論哭所識者與死者相識雖相識輕亦為之成踊皆賔主拾之主人在墓左西嚮賔従外来而北靣踊主人先踊賔従之陳氏澔曰所識巳𦵏矣而弔之必先哭於其家者情雖由於死者而禮則施於生者故也賔主雖拾踊然必主人先而賓従之故曰従主人也言皆者必於家於墓皆踊也凡喪父在父為主父歿兄弟同居各主其喪親同長者主之不同親者主之正義鄭氏康成曰與賓客為禮宜使尊者各主其䘮各為其妻子之䘮為主也父母沒親同如昆弟之䘮宗子主之不同従父昆弟之䘮孔氏穎達曰此論同居主喪之事父為主者言子有妻子喪則其父為主祔則宗子主之父母䘮推長子為主若昆弟䘮亦推長者為主不同謂従父昆弟親近自主之也案同居凡䘮父主之統於尊也兄弟之妻子各主其喪不相統也親同長者主之亦統於尊也不同皆親者主之亦不相統也聞逺兄弟之喪既除䘮而后聞喪免袒成踊拜賔則尚左手正義鄭氏康成曰小功緦麻不稅者也雖不服猶免袒孔䟽以本是五服之親為之變也尚左手吉拜也逸奔喪禮曰凡拜吉喪皆尚左手孔氏穎達曰此論小功已下之䘮既除喪後而始聞䘮之節無服而為位者唯嫂叔及婦人降而無服者麻正義鄭氏康成曰雖無服猶弔服加麻孔疏此論哭無服而為位及弔服加麻也袒免為位哭也正言嫂叔尊嫂也兄公於弟之妻則不能孔䟽爾雅婦人謂夫之兄為兄公兄公於弟妻不服不為位卑逺之也弟妻於兄公不服尊絶之也婦人降而無服族姑姊妹嫁者也孔䟽族姑姊妹元是緦麻既嫁兩無服逸奔喪禮曰無服袒免為位者唯嫂與叔凡為其男子服孔䟽族伯叔父族兄弟之等皆服緦其婦人降而無服者麻孔氏穎達曰降而無服亦當為位哭之既無服又云麻故知弔服加麻也麻謂緦之絰也凡奔䘮有大夫至袒拜之成踊而后襲於士襲而后拜之正義鄭氏康成曰主人袒降哭而大夫至因拜之不敢成巳禮乃禮尊者孔氏穎達曰此論奔喪大夫士来弔待之莭大夫来弔奔喪者先袒拜之成踊之後然後襲衣尊大夫故先拜而後襲士来弔奔喪者初亦袒襲衣後始拜之士卑故先襲而後拜此主人謂奔喪者身是士也問喪第三十五正義孔氏穎達曰案鄭目録云名曰問䘮者以其記善問居䘮之禮所由也此於別錄屬喪服吳氏澄曰此篇前論孝子悲哀痛疾之意後問喪禮斂袒免杖之義服問三年問是専問一事故問字皆在下此篇設五或問問䘮事故問字在上親始死雞斯徒跣扱上衽交手哭惻怛之心痛疾之意傷腎乾肝焦肺水漿不入口三日不舉火故鄰里為之糜粥以飲食之夫悲哀在中故形變於外也痛疾在心故口不甘味身不安羙也雞斯依注為筓纚筓古兮反纚色買反又所綺反跣悉典反扱初洽反衽而鴆反怛都達反腎市軫反糜武皮反粥之六反飲音䕃食音嗣夫音扶正義鄭氏康成曰親父母也孔疏凡親包五服此悲哀之甚故知父母之親也雞斯當為筓纚聲之誤也孔疏筓謂骨筓纚謂韜髮之繒親始死去冠孔疏猶存筓纚二日乃去筓纚括髮也孔䟽小斂乃括髮今時始喪者邪巾貊頭筓纚之存象也徒猶空也孔䟽無履而空跣也上衽深衣之裳前孔䟽衽小要屬裳處當旁而云前者扱深衣前衽于帶以妨號踊踐履於前故云前其實扱處當衽也五藏者腎在下肝在中肺在上舉三者之焦傷而心脾在其中矣案腎主哀哀甚則腎簜故無以滋木而肝乾且涸金而肺焦也五家為鄰五鄰為里悲哀在中變形於外言人情中外相應也孔氏穎達曰此眀初死三日以来居䘮哭踊悲哀疾痛之意交手謂交手拊心而為哭也不舉火者哀痛之甚情不在食也故鄰里為糜粥以飲食之糜厚而粥薄薄者以飲之厚者以食之陸氏佃曰扱上衽則以有辟踊之端焉交手哭捧心而哭𤼵胸擊心在斂之後惻怛痛疾而精先傷魂次之魄又次之故曰傷腎乾肝焦肺傷傷而巳乾為甚乾猶可也焦又甚矣存疑孔氏穎達曰旁親以下食不可廢故飲食之案孔以孝子三日勺水不入口故以旁親言其實鄰里之飲食為孝子恐其以毁滅性故檀弓言歠主人主婦室老為其病也君命食之也詩云凡民有䘮匍匐救之此鄰里之義三日而斂在牀曰尸在棺曰柩動尸舉柩哭踊無數惻怛之心痛疾之意悲哀志懣氣盛故袒而踊之所以動體安心下氣也婦人不宜袒故𤼵胸擊心爵踊殷殷田田如壊牆然悲哀痛疾之至也故曰辟踊哭泣哀以送之送形而徃迎精而反也其徃送也望望然汲汲然如有追而弗及也其反哭也皇皇然若有求而弗得也故其徃送也如慕其反也如疑求而無所得之也入門而弗見也上堂又弗見也入室又弗見也亡矣喪矣不可復見巳矣故哭泣辟踊盡哀而止矣心悵焉愴焉惚焉愾焉心絶志悲而巳矣斂力艶反柩其又反懣亡本反殷音隠壊音怪辟婢尺反下同上時掌反復扶又反下同悵敕亮反愴初亮反正義鄭氏康成曰故袒而踊之言聖人制法故使之然也爵踊足不絶地辟拊心也孔疏爾雅釋訓文哀以送之謂𦵏時也迎其精神而反謂反哭及日中而虞也望望瞻望之貌慕者以其親之在前疑者不知神之来否說反哭之義也孔氏穎達曰爵踊似爵之跳其足不離於地如壊墻言将欲崩倒也汲汲促急之情皇皇意徬徨也喪亦亡也重言之者丁寜之意若人之逃不復来也以其不可復見故反哭之時哭泣辟踊盡哀而休止也朱氏申曰無數者哀戚之至無節奏也婦人不宜袒嫌其䙝也故𤼵胸而擊其心此眀反哭之義入門不見上堂不見入室不見皆皇皇意吳氏澄曰此言既斂至𦵏三日以後之哀動尸謂初死至斂時舉柩謂啓殯至𦵏時動親之尸舉親之柩孝子哀甚故哭踊無數懣與悶同心煩鬱也氣盛氣滿塞也袒而踊以運動其身體體動庶㡬可以安靜其心使不煩鬱降下其氣使不滿塞也男踊足起而髙女踊足不離地殷殷田田牆崩倒之聲存異陸氏佃曰殷殷踊也田田懇惻也朱氏申曰殷殷言其色之黯田田言其心之野彭氏絲曰殷殷田田皆謂女子案哭踊當有莭而始死無數未可以節也至迎賔不哭成踊三者三則有莭矣祭之宗廟以鬼饗之徼幸復反也成壙而歸不敢入處室居於倚廬哀親之在外也寢苫枕塊哀親之在土也故哭泣無時服勤三年思慕之心孝子之志也人情之實也徼古堯反壙古晃反苫始占反草也枕之䕃反塊苦對反正義鄭氏康成曰宗廟享之說虞之義成壙居廬言親在外在土孝子不忍反室自安也入處室或為入宫勤謂憂勞孔氏穎達曰反哭之後虞祭於殯宫神之所在故稱宗廟以鬼享之尊而禮之冀其神魂復反也𦵏後猶居倚廬寢苫枕塊不敢入處室也哭泣服勤眀終䘮思慕之志非詐偽為之是人情悲慕之實也陸氏佃曰祭之宗廟所謂生事畢而鬼事始也哭泣無時若三哭五哭先王為之節耳吴氏澄曰心悵恨愴悽恍惚嘆愾皆失志無奈何之貎知其不可復見心已絶望但志愈悲哀而已於是虞祭以安之方氏慤曰哀親之在外故不忍居於内哀親之在土故不忍寢於牀或問曰死三日而后斂者何也曰孝子親死悲哀志懣故匍匐而哭之若将復生然安可得奪而斂之也故曰三日而后斂者以俟其生也三日而不生亦不生矣孝子之心亦益衰矣家室之計衣服之具亦可以成矣親戚之逺者亦可以至矣是故聖人為之斷决以三日為之禮制也匍音蒲匐蒲北反又音服衰色追反為於偽反斷丁段反正義鄭氏康成曰問者怪其遲也孔疏記者假設問三日而后斂之意匍匐猶顛蹷或作扶服孔氏穎達曰三日斂者以士言之則大斂也大夫以上則小斂也方氏慤曰始死而未忍斂之者孝子之心存乎仁也三日而必斂之者聖人之禮制以義也案家室之計謂稱家有無而為之計有毋過禮無亦不以巳儉其親也或問曰冠者不肉袒何也曰冠至尊也不居肉袒之體也故為之免以代之也免音問下同正義鄭氏康成曰言身無飾者不敢冠冠為褻尊服肉袒則著免免状如冠而廣一寸孔氏穎達曰此眀冠必不袒袒必不冠之意心既悲哀肉袒形䙝故不可䙝其尊服而冠也方氏慤曰露肉體而袒衣為肉袒通論孔氏穎達曰若有吉事而内心肅敬則雖袒而著冠也故郊特牲云君袒而割牲是也黄氏震曰袒而割牲蓋袒衣而非肉袒肉袒者露肉陸氏佃曰眀堂位曰君肉袒迎牲於門今其言若此何哉曰凡臣子為尊者使令則袒雖冠不嫌也然則秃者不免傴者不袒跛者不踊非不悲也身有錮疾不可以備禮也故曰䘮禮唯哀為主矣女子哭泣悲哀擊胸傷心男子哭泣悲哀稽顙觸地無容哀之至也秃吐禄反傴於縷反一音紆跛補火反錮音固稽音唘正義鄭氏康成曰將踊先袒將袒先免此三疾俱不踊不袒不免顧其所以否者各為一耳擊胸傷心稽顙觸地不踊者若此而可或曰男女哭踊或問曰免者以何為也曰不冠者之所服也禮曰童子不緦惟當室緦緦者其免也當室則免而杖矣為於偽反正義鄭氏康成曰不冠者猶未冠也當室謂無父兄而主家者也童子不杖不杖者不免當室則杖而免免冠之細别以次成人也緦者其免也言免乃有緦服也孔氏穎達曰童子不緦此䘮服正經之文引之言不為族人著緦服也惟當室之童内為父母著免乃有族人緦服是緦服由於著免也當室則免而杖者又眀童子得免所由若童子不當室則不得免及杖也方氏慤曰童子以幼故不服族人之緦至當室雖未冠亦責以成人之備禮矣劉氏曰巳冠者為䘮變而去冠雖去冠猶嫌於不冠故加免也童子初未冠則雖為喪亦不免以其原未冠故不嫌於不冠也唯當室童子則否案童子居父母喪未冠則不免不杖惟十六嵗以上不忍以未成人䘮其親乃有因䘮而冠者故曰以䘮冠者唯三年之䘮可也若武王既𦵏而冠成王則在三年喪限中已與因䘮而冠即免而杖異矣或問曰杖者何也曰竹桐一也故為父苴杖苴杖竹也為母削杖削杖桐也苴七須反正義鄭氏康成曰問杖者何怪其義各異也答言所以杖者義一也顧所用異可孔氏穎達曰父是尊極故言苴惡之物以為杖自然苴惡之色唯有竹也母屈於父不同自然苴惡之色故用削杖其杖雖削情同於父桐為同父之義故不用餘木也或解云竹節在外外陽之象故為父桐節在内内隂之類故為母陳氏澔曰苴杖圓以象天削杖方以象地或曰杖者以何為也曰孝子䘮親哭泣無數服勤三年身病體羸以杖扶病也羸力垂反正義鄭氏康成曰言得杖乃能起也數或為時則父在不敢杖矣尊者在故也堂上不杖辟尊者之處也堂上不趨示不遽也此孝子之志也人情之實也禮義之經也非從天降也非從地出也人情而已矣辟音避正義鄭氏康成曰父在不杖謂為母喪也尊者在不杖避尊者之處孔疏堂上是父所在尊者之處者方氏慤曰不敢以扶病之具感尊之情也不杖有事不趨皆為其感動使之憂戚也孔疏不以促遽感動父情使之憂戚冀不悲哀於父也陸氏佃曰父在不敢杖此非故隆父殺母是人情之實禮義之經也野人曰父母何算焉隆母如父是之謂野案儀禮論杖尚有爵與擔主二義此未之及見䘮服四制篇服問第三十六正義孔氏穎達曰案鄭目録云名服問者以其善問以知有服而遭䘮所變易之節此於别録屬喪服陸氏佃曰退問在下著服多㣲辭奥㫖問有不盡也據問喪在上吴氏澄曰此篇與䘮服小記篇内喪服一章相類傳曰有従輕而重公子之妻為其皇姑為於偽反下皆同正義鄭氏康成曰皇君也孔疏此妾既賤若惟云姑則有嫡女君之嫌今曰皇眀係此婦所尊則案父死稱皇考母死稱皇妣夫死稱皇辟皇者死後所加之尊稱諸侯妾子之妻為其君姑齊衰與為小君同舅不厭婦也孔氏穎達曰此四條眀従服輕重之異𫝊曰者舊有成𫝊記者引之公子謂諸侯之妾子也皇姑即公子之母也諸侯在尊厭妾子使為母練冠諸侯沒妾子得為母大功而妾子妻不辨諸侯存沒為夫之母期也其夫練冠是輕也而妻為期是重故云有従輕而重陸氏佃曰謂之皇姑著死而後稱姑避小君也先儒謂春秋之義妾母稱夫人若小君在上堂稱妾下堂稱夫人朱氏申曰姑庶子所生母也據其妻所稱故曰姑尊之故曰皇有從重而輕為妻之父母正義鄭氏康成曰妻齊衰而夫從緦麻不降一等非服差有從無服而有服公子之妻為公子之外兄弟正義孔氏頴達曰經惟云公子外兄弟知非公子姑之子者以䘮服小記云夫之所為兄弟服妻皆降一等夫為姑之子緦麻妻則無服今公子之妻為之有服盖凡小功者謂為兄弟若同宗直稱兄弟以外族故稱外兄弟也陸氏佃曰婦之黨為昏兄弟壻之黨為姻兄弟又各謂其外家之黨為外兄弟喪服𫝊曰何如則可謂之兄弟小功以下為兄弟小功以下親不足言也謂之兄弟可故曰四海之内皆兄弟也存疑鄭氏康成曰謂為公子之外祖父母従母緦麻孔氏穎達曰公子被厭不服己母之外家是無服也妻猶從公子而服公子外祖父母從母緦麻是從無服而有服也案舅之子曰内兄弟姑之子曰外兄弟對本族言亦通曰外也禮為外祖父母從母皆小功為舅及舅之子従母之子皆緦妻之從服無眀文此豈以公子被厭無服而妻之從服猶服故眀著之與鄭以為外祖父母從母似未安有從有服而無服公子為其妻之父母正義鄭氏康成曰凡公子厭於君降其私親女君之子不降也孔氏穎達曰雖為公子之妻猶為父母期是有服公子被厭不從妻服父母是從有服而無服也陸氏佃曰公子不服其母故為其妻之父母無服喪服𫝊公子為其母練冠麻衣縓縁總論馬氏睎孟曰大傳従服有六而此言其四皆禮之可以變易者則服亦從而隆殺之有従輕而重有從無服而有服者以其人情無所嫌而伸之也有從重而輕有從有服而無服者以其人情有所嫌而屈之也先王制服人情而已然而服術之六從服為末而從服之中有至無服則雖禮之㣲者不可不辨傳曰母出則為繼母之黨服母死則為其母之黨服為其母之黨服則不為繼母之黨服正義鄭氏康成曰雖外親亦無二統孔氏穎達曰此眀繼母之黨亦是舊傳之辭吴氏澄曰母出謂己母被出而父再娶己母義絶子雖不絶母服而母黨之恩則絶矣故加服繼母之黨與己母之黨同也母死謂己母死而父再娶己母祔廟是父之初配雖有繼母而子仍服死母之黨其服繼母之身雖同己母而繼母之黨則不同於己母之黨故不服也存異陳氏澔曰母死謂繼母死也其母謂出母也案䘮服𫝊出妻之子為母期則為外祖母無服所謂施報是也則豈有繼母死而服出母之黨者陳說殊舛三年之喪既練矣有期之喪既𦵏矣則帶其故葛帶絰期之絰服其功衰正義鄭氏康成曰帶其故葛帶者三年既練期既𦵏差相似也孔䟽三年既練要之葛帶四寸百二十五分寸之七十六期䘮既𦵏其帶亦然但父帶為重故帶其故葛帶絰期之葛絰三年既練首絰除矣孔疏男子首空故絰期之葛絰若婦人則首絰練之故葛絰腰帶期之麻帶也為父既練衰七升孔疏閒𫝊稱斬衰三升既虞卒哭受以成布六升則知既練衰七升也母既𦵏衰八升孔疏注誤當云七升閒𫝊云為母疏衰四升受以成布七升是既𦵏受時為母衰七升也凡齊衰既𦵏衰或八升或九升服其功衰服麤衰也孔疏父之既練母之既𦵏衰皆七升其八升者是正服九升者是義服也功即麤也麤者謂七升父之衰也孔氏穎達曰此三年練祭之後又當期喪既𦵏之節案此節文義謂三年之喪既練則首絰除身服功衰而要帶之葛亦自五寸八分弱而殺為四寸五分強矣於此遇齊衰期之喪則有本之麻得變三年之葛而齊衰之麻帶五寸八分弱亦大於此則易三年之葛帶而帶期之麻帶若既𦵏而易葛又所殺之數與此正同則帶三年之故葛帶服三年之功衰惟首無絰則初服絰期七寸二分受服五寸八分之絰耳通論孔氏穎達曰皇氏云此三年未練之前初有期喪未𦵏為前三年之喪為練祭至期既𦵏乃帶其故葛帶絰期之絰也知期䘮未𦵏以前得為三年練祭者雜記云三年之喪既顈其練祥皆行彼謂後喪亦三年既顈之後得行前三年之喪練祭則知後喪期年未顈之前得為三年之喪而後練也又曰經稱三年之喪則父為長子及父卒為母皆是三年故不特言父衰也若母䘮既練雖衰八升與正服既𦵏齊衰同以母服為重亦服母之齊衰也張子曰三年既練期既𦵏服功衰大功䘮亦如之謂若三年既練期大功既𦵏止當服其既練功衰不可便受以小功布也以此三年無受小功之節練衰除則自當服以小功練衣必是煆煉大功之布以為衣故言功衰功衰上之衣也以其著衰於上故通謂之功衰必著受服之上稱受者以此得名盖以受始喪斬疏之衰而著之變服其意以䘮乆變輕不欲摧割之心亟忘於内也練衣當既𦵏之後受以大功之喪及既練也煆煉其衰而巳或既練則以大功之布而為衰或衰而加煅煉此則繫其有無也知既練猶謂之功衰者以下文云練冠又三年之喪禮不當弔而雜記又云雖功衰不以弔又曰云服其功衰者盖謂當練而服後喪之衰即用七八升則前喪易忘故反七八升之衰也又雜記云有父母之喪尚功衰此云尚功衰盖未祥之前尚衣絰練之功衰爾黄氏幹曰大功之布有三等七升八升九升而降服七升為最重斬衰既練而服功衰是受以大功七升布為衰裳也故喪服斬衰章賈氏疏云斬衰初服麤至𦵏後練後大祥後漸細加飾斬衰裳三升冠六升既𦵏後以其冠為受衰裳六升冠七升小祥又以其冠為受衰裳七升冠八升又案閒傳小祥練冠孔氏疏云至小祥以卒哭後冠受其衰而以練易其冠横渠張子曰練衣取成服之初衰長六寸博四寸綴於當心者著之於功衰之上是功衰雖漸輕而長六寸博四寸之衰猶在不欲哀心之遽忘也案男子無葛首絰之時惟婦人斬衰既𦵏首絰易葛七寸二分練又受以五寸七分零此非言婦人安得有葛絰必誤衍無疑也又本文言三年之喪謂父母也期之䘮謂諸父兄弟也即鄭注亦未甞言三年之喪専指父此期之喪謂父雖死母猶降期也注言及母者謂母是齊衰三年與諸父兄弟之齊衰期者受服粗細不同未甞謂此期之絰専指母也孔賈同時而䘮服賈疏謂父䘮未終而母死猶期謂此期之絰指母誤矣雜記有父之喪如未歿喪而母死其除父之喪也服其除服卒事反母之喪服則母得申三年眀矣又婦出父母之喪未練則三年是服未除即可申也然則母喪未除而父卒即得申三年矣又案三年喪中遭喪變服之節其畧有三閒傳曰輕者包重者特在三年之喪既𦵏而遭期之初喪則以期之麻帶易三年之葛帶以其時首尚服三年之麻絰而期之麻帶又與三年之葛帶粗細正同雖易新麻亦正以包舊葛故易之耳此變服之一節也雜記云有三年之練冠則以大功之麻易之以此而推三年喪既練而遭期之初喪則直以新麻易之可知此變服之又一節也葛帶之粗細雖同而以父葛為重今三年之喪既練而期喪值既𦵏之時亦當易麻帶為葛帶矣此時既不得以期之新葛厭三年之舊葛又不得以期葛之小者包三年葛之大者故前此雖皆變三年之服今仍反服三年之故葛帶而惟絰期之麻絰以服其功衰也此變服之又一節也變服雖多端然即此可推類而通之矣有大功之喪亦如之正義鄭氏康成曰大功之麻變三年之練葛期既𦵏之葛帯小於練之葛帶孔疏大功既𦵏葛帶三寸有餘三年練之葛帶四寸有餘是大功既𦵏之葛帶小於練之葛帶故反服練之故葛帶也又當有絰亦反服其故葛帶絰期之絰差之宜也案鄭意謂大功不變期絰是差次之宜孔疏誤此雖變麻服葛大小同爾孔疏大功初喪首絰五寸餘應減四寸餘今雖變葛而首絰仍五寸是小大同也亦服其功衰孔疏大功初喪衰七升八升九升𦵏有十升今仍父之七升也三年之喪既練始遭齊衰大功之喪絰帶皆麻孔疏閒傳云斬衰既𦵏遭大功之喪重麻知遭齊衰亦重麻孔氏穎達曰三年之喪練後有大功之喪既𦵏者亦如期之帶其故葛帶絰期之絰也此注亦指男子言崔氏靈恩曰此承前經言有三年之練又有期喪既𦵏而合大功存異孔氏穎達曰大功既𦵏者首絰四寸有餘若要服練之葛帶首服大功既𦵏之葛絰既麤細相似不得為五分去一為帶之差故首絰同期之絰五寸有餘進與期之既𦵏同也案三年既練首絰巳除則遇大功之喪自可絰大功之絰而鄭言絰期之絰者謂上巳兼二服之麻葛設三年之喪既練期之喪既𦵏而又有大功之喪則帶三年之葛帶服三年之功衰所不待言而首不便絰大功之絰者期既𦵏受服之絰與大功成服之絰皆四寸六分而齊重於大功則仍絰期之絰亦不以輕變重之意也崔說甚眀孔因後鄭注閒𫝊引期之絰之誤謂要帶必殺於首絰五分之一今要帶既仍四寸六分若大功既𦵏首絰亦受四寸六分非要帶殺於首絰之例必進加期之絰乃可則下緦小功之絰更小而云因其初葛帶何説乎大功可進絰期之絰則期可進絰三年之絰小功可進大功之絰而五服皆亂矣小功無變也正義鄭氏康成曰無所變於大功齊斬之服不用輕累重也孔疏先有大功以上喪服今遭小功之喪無變於前服不以輕減重也彭氏曰此言三年練後遭小功喪則冠衰帶俱不變也案不言緦無變者以小功推之可知至疏謂有大功以上之服而遭小功之喪彭氏又謂三年練後遭之者於疏義尤相足也麻之有本者變三年之葛正義鄭氏康成曰有本謂大功以上也小功以下澡麻斷本孔氏穎達曰大功以上為帶者麻之根本并留之合糾為帶如此者得變三年之練葛若小功以下其絰澡麻斷本是麻之無本不得變三年之葛也案此連下既練為義故孔疏即以練葛言之然不以既練冠其上而於中連言之者齊衰之麻既𦵏即得變三年之葛不待既練也通論孔氏穎達曰言變三年葛舉其重者其實期之葛有本者亦得變之案論服則斬齊重不可以大功變然麻重於葛故亦可以大功之麻變斬齊之葛而麻又有重輕有本之麻重無本之麻輕總之重可以變輕輕不可以變重也既練遇麻斷本者於免絰之既免去絰每可以絰必絰既絰則去之免音問去上聲正義鄭氏康成曰雖無變縁練無首絰於有事則免絰如其倫孔疏如平常有服之倫免無不絰孔疏免時必著絰則大斂小斂之節衆主人必加絰也絰有不免孔疏既𦵏後虞及卒哭之節但著絰不有免以服成故也其無事則自若練服也孔氏穎達曰斬衰既練之後遭小功之喪雖不變服得為之加絰也麻之斷本者小功之喪也於免絰之者以練無首絰於小功喪有事於免之時則為之加小功之絰也既免去絰者謂小功以下之䘮斂殯事竟既免之後則脫其絰也每可以絰必絰者謂小功以下之喪當殯斂之節可絰之時必為之加麻也既絰則去之者謂不應絰之時則去其絰自若練服也陸氏佃曰喪服小記曰下殤小功帶澡麻不絶本故不言小功而言斷本也案上麻之有本節乃申上文大功亦如之之義此節又申上文小功以下無變之義小功不易喪之練冠如免則絰其緦小功之絰因其初葛帶緦之麻不變小功之葛小功之麻不變大功之葛以有本為稅免音問稅吐外反正義鄭氏康成曰稅亦變易也小功以下之麻雖與上葛同猶不變也此要其麻有本者乃變上耳雜記曰有三年之練冠則以大功之麻易之惟杖屨不易也孔氏穎達曰小功以下之喪不合變易三年喪之練冠如當緦小功著免之節則首絰其緦與小功之絰所以為後喪緦絰者以前喪練冠首絰巳除故也上云小功下兼言緦者恐免絰不及緦也前但云絰不云練冠恐小功以下不得改前喪練冠故重言如免則絰也因其初葛帶者言小功以下之喪要中所著仍因其初喪練葛帶也不云故而云初者以期初喪之時變練之葛帶為麻期既𦵏之後還反服練之故葛帶也緦之麻不變小功之葛小功之麻不變大功之葛者謂輕喪之麻本服既輕雖初喪之麻不改前重喪之葛也所以緦之麻不變小功者以緦與小功麻絰既無本不合稅變前喪惟大功以上麻絰有夲者得稅變前喪也又曰麻絰有夲為重下服乃變上服大功得變期期得變三年也鄭引雜記之言眀大功之麻非但得易期喪之葛亦得易三年練冠之葛也案此乃記禮者恐人因上免絰之條誤以練冠為可易故言虞卒哭當冠而絰則即練冠加絰斂殯當免而絰則暫釋練冠加絰於免事畢仍練冠總以眀練冠之不易也且不惟練冠不易即葛帶亦因其初也是雖緦於小功小功於大功其夲服輕者且亦不相為變况緦小功之麻而得變三年之葛哉以有本為稅即上文麻之有夲者變三年之葛之義有本乃稅益見斷夲者之無變矣殤長中變三年之葛終殤之月算而反三年之葛是非重麻為其無卒哭之稅下殤則否長竹丈反重直勇反正義鄭氏康成曰謂大功之親為殤在緦小功者也可以變三年之葛正親親也孔疏本大功之親故重其殤也三年之葛大功變既練孔疏雜記三年之練冠則以大功之麻易之是也齊衰變既虞卒哭孔䟽閒𫝊斬衰之䘮既虞卒哭遭齊衰之喪輕者包重者特是也凡喪卒哭受麻以葛殤以麻終喪之月數非重之而不變為殤未成人文不縟耳孔䟽縟禮文繁數也成人以上禮文繁數故變麻服葛今殤是未成人無文飾之繁故不變也下殤則否言賤也男子為大功之殤中従上服小功婦人為之中従下服緦麻孔䟽喪服𫝊文孔氏穎達曰殤長中者謂本服大功之喪今乃降在長中殤男子則為之小功婦人為長殤小功中殤則緦麻如此者得變三年之葛也終殤之月算如小功則五月緦麻則三月著麻月滿還反服三年之葛也下殤則否者以大功以下之殤男子婦人俱為之緦麻其情既輕則不得變三年之葛也案上文麻之有本者得變三年之葛則齊衰下殤雖是小功亦是麻之有本故小記云下殤小功帶澡麻不絶本存疑孔氏穎達曰齊衰下殤乃變三年之葛今大功長殤麻既無本得變三年之葛者以其殤服質畧無虞卒哭之稅故得變之若成人小功緦麻麻既無本故不得變也案大功麻有本齊衰下殤降而在小功者猶不絶本惟正小功以下無本耳此云大功長殤麻無夲可疑君為天子三年夫人如外宗之為君也為於偽反正義鄭氏康成曰外宗君外親之婦也其夫與諸侯為兄弟服斬妻従服期諸侯為天子服斬夫人亦從服期喪大記曰外宗房中南靣孔氏穎達曰君為天子三年者謂列國諸侯之君為天子三年也諸侯夫人為天子如諸侯外宗之婦為君也者諸侯外宗之婦為君期則夫人為天子亦期也外宗者其夫既是君之外姓其婦即外宗也夫與諸侯為兄弟之親在於他國諸侯既死来為之服當尊諸侯不繼本服之親故皆服斬其妻従服期也通論熊氏安生曰凡外宗有三案周禮外宗之女有爵通卿大夫之妻一也雜記云外宗為君夫人猶内宗是君之姑姊妹之女舅之女従母之女皆為諸侯服斬為夫人服期二也此文外宗若姑之子婦從母之子婦其夫是君之外親為君服斬其婦亦名外宗為君服期三也内宗有二案周禮云内女之有爵謂同姓之女一也雜記云内宗者是君五屬之内女二也注引喪大記證外宗之義案内宗外宗之女未嫁從本服嫁於本國卿大夫為君為夫人皆期嫁於庶人則齊衰三月皆従夫也自此節至徃則服之出則否記上下内外相為之服諸侯為天子斬以義制也世子不為天子服為於偽反正義鄭氏康成曰逺嫌也不服與畿内之民同也孔氏穎達曰諸侯世子有繼世之道所以逺嫌不為天子服也君所主夫人妻大子適婦大音泰正義鄭氏康成曰言妻見大夫以下亦為此三人為喪主也孔氏穎達曰夫人妻大子適婦此三人既正雖國君之尊猶主其喪非此則不主也存疑陸氏佃曰曲禮曰公侯有夫人有世婦有妻妾案夫人者君之適妻故云夫人妻陸以為世婦下之妻妄矣大子即世子其妻為適婦大夫以下同而特言君嫌君尊或有異禮也大夫之適子為君夫人大子如士服正義鄭氏康成曰大夫不世子不嫌也士為國君斬小君期大子君服斬臣從服期孔氏穎達曰大夫無繼世之道其子無嫌得為君與夫人及君之大子著服如士服也君之母非夫人則羣臣無服唯近臣及僕驂乗從服唯君所服服也驂七南反乗音剰正義鄭氏康成曰妾先君所不服也禮庶子為後為其母緦言唯君所服伸君也孔氏穎達曰君母是適夫人則羣臣為服期今非夫人君為之服緦則羣臣為之無服也近臣謂閽寺之屬僕御車者驂車右也君之母非夫人貴臣乃不服而此諸臣賤者隨君之服也君服緦則此等之人亦服緦又曰天子諸侯為妾無服唯大夫為貴妾服緦故知妾先君所不服君既服緦近臣得從君服是禮之正法也通論鄭氏康成曰春秋之義有以小君服之者時若小君在則益不可孔氏穎達曰春秋之時不依正禮有以為小君之服服其妾母者文公四年夫人風氏薨是僖公之母成風也昭十一年夫人歸氏薨是昭公之母齊歸也皆亂世之法非正禮也案異義云妾子立為君得尊其母立為夫人否今春秋公羊說妾子立為君母得稱夫人故上堂稱妾屈於適也下堂稱夫人尊於國也云子不得爵命父妾子為君得爵命其母者以妾在奉授於尊者有所因縁故也榖梁傳云魯僖公立妾母成風為夫人是子爵乎母以妾為妻非禮也故左氏說成風妾得立為夫人母以子貴禮也鄭從榖梁說存異孔氏穎達曰案喪服緦麻章云庶子為父後者為其母緦若不為後則為母無服故喪服記云公子為其母練冠麻衣縓縁今以為君得著緦麻服是伸君之尊也案注所謂唯君所服伸君者盖以近臣之從服所以伸君之尊非以君服緦為伸也據䘮服庶子為父後者為其母緦𫝊言與尊者為一體不敢服其私親也然則何以服緦也有死於宫中者則為之三月不舉祭因是以服緦也蓋以古者有喪服則不祭故先王恒慎於制服彼庶子為父後為母本無服以禮死於宫中者有三月不舉祭之法因以不舉祭之期為服三月之服庶子道伸而祭亦不至於廢非謂為父後始得伸三月之服也且據彼注云君卒庶子為母大功大夫卒為母三年此皆庶子之不為父後者若父在則厭於父而不得伸疏所引公子練冠之說是也至為父後則不敢服其私親故所服唯緦也孔誤以唯為後始得服緦不為後則為母無服豈其未攷儀禮耶公為卿大夫錫衰以居出亦如之當事則弁絰大夫相為亦然為其妻徃則服之出則否錫思歴反為於蒍反正義鄭氏康成曰弁絰如爵弁而素加絰也不當事則皮弁出謂以他事不至喪所孔氏穎達曰君為卿大夫之喪成服之後著錫衰以居若以他事而出不至喪所亦著錫衰其首則服皮弁君行徃弔卿大夫當大斂及殯并將𦵏啟殯之事則首著弁絰身衣錫衰若於士雖當事首服皮弁大夫相為亦如君於卿大夫不當事則皮弁當事則弁絰為其妻者謂公於卿大夫之妻及卿大夫相為其妻徃臨其喪則服錫衰不恒著之以居若餘事之出則不服其當殯殮之事亦弁絰也陸氏佃曰當事則弁絰者據此王為三公六卿錫衰大夫士疑衰其首服盖當事而後弁絰也大夫相為亦然者雜記曰大夫哭大夫弁絰與殯亦弁絰為其妻徃則弔也弔而服之弔而出則除之喪服𫝊曰大夫弔於命婦錫衰命婦弔於大夫亦錫衰彭氏曰錫衰謂無事其縷有事其布治其布使之滑易也陳氏澔曰弁絰制如爵弁素為之加環絰其上餘論朱子曰古人君臣之際如君臨臣䘮坐撫當心要絰而踊今日之事至於死生之際恝然不相闗不啻如路人所謂君臣之義安在祖宗時於舊執政亦甞親臨自渡江以来一向廢此看古禮君於大夫小斂徃焉於士既殯徃焉何其誠愛之至今乃恝然古之君臣所以事事做得成縁是親愛一體凡見人無免絰雖朝於君無免絰唯公門有稅齊衰傳曰君子不奪人之喪亦不可奪喪也免如字朝直遥反稅吐活反正義鄭氏康成曰見人謂行求見人也無免絰絰重也稅猶免也齊衰謂不杖齊衰也孔氏穎達曰己有齊衰之喪無免去絰重故也以絰重縱徃朝君亦無免脫於絰也唯至公門己有不杖齊衰則脫去其衰絰猶不去也若杖齊衰及斬衰雖入公門衰亦不稅也君子以己恕物不可奪人喪禮故君所以許臣著絰亦不可自奪喪所以巳有重喪猶絰以見君申喪禮也通論鄭氏康成曰於公門有免齊衰則大功有免絰也孔氏穎達曰其大功非但稅衰又免去絰也盖絰重於齊衰不杖齊衰雖脫亦不免絰以差次約之則大功非但脫衰亦免去其絰也存異陸氏佃曰絰重也以禮該之下云唯公門稅齊衰凡所謂稅皆暫釋喪服反吉服若康王麻冕黼裳是也案去衰猶不去絰何言吉服傳曰罪多而刑五喪多而服五上附下附列也列音例本亦作例正義鄭氏康成曰列等比也孔氏穎達曰罪之與喪其數雖多其限同五其等列相似故云列也陸氏佃曰列若今例矣吴氏澄曰罪多如墨辟千劓辟千剕辟五百宫辟三百大辟二百之類喪多如儀禮喪服篇斬衰章為某人等齊衰章為某人等之類言罪雖多而皆不出乎墨劓剕宮大辟五者之刑喪雖多而皆不出乎斬衰齊衰大功小功緦麻五者之服其或刑書禮書所載不盡者以例通之由輕而加重則附於在上之例由重而減輕則附於在下之例通此二例則雖至多之罪至多之喪而刑書中之五刑禮書中之五服足以該之而無不足矣陳氏㵆曰罪重者附於上刑罪輕者附於下刑此五刑之上附下附也大功以上附於親小功以下附於疏此五服之上附下附也等列相似故云列也通論馬氏睎孟曰法者所以齊天下之過失然民之過失浩繁而不勝齊也故法不可以不省禮者所以辨天下之親疏然人之親疏輕重之不易辨也故禮不可以不簡是故制為五刑以斷其罪而罪多者有非五刑所屬則随時而参酌之列為五服以定其喪而喪多而服五上附下附列也故有從輕従重有服無服之別焉盖先王之制必以五數舉其大者而畧言之五典五禮五色五味五行日用不可闕一焉易曰天數五地數五王者之政天地而巳欽定禮記義疏卷七十
