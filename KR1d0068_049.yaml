body:
  text: 學記第十八正義孔氏穎達曰案鄭目録云名曰學記者以其記人學教之義此于別録屬通論程子曰禮記除中庸大學惟學記最近道朱子曰此言古者學校教人傳道授受之序與其得失興廢之由兼大小學言之芮氏城曰此篇記學非記禮然禮固在焉家孰黨庠州序國學立學之禮皮辨祭菜小雅肄三入學之禮詔於天子無北面尊師之禮案此篇家有孰至九年大成詳言先王學制大學始教至記問之學不足以為人師皆教者之法察於三者有志于學察於四者有志于本皆學者之法至言大道至道言敬道信道言辨志先志言敬業孫業無非所教所學之事而石梁王氏謂此篇不詳言先王學制與教者學者之法亦近誣矣發慮憲求善良足以謏聞不足以動衆就賢體逺足以動衆未足以化民君子如欲化民成俗其必由學乎謏思了反聞音問正義鄭氏康成曰憲法也言發計慮當擬度於法式也孔疏發謂起發慮謂謀慮憲謂法式求謂招來也謏之言小也就謂躬下之體猶親也所學者聖人之道在方策孔氏穎達曰舉動能擬度於法式又能招求善良之士以自輔故小有聲聞賢謂德行賢良屈下從就之足以動衆者以恩被於外未足以化民者識見猶淺仁義未備也學則博識多聞知古知今既身有善行示民軌儀故可以化民成俗也周氏諝曰學者一道德之源道德一然後可以化民成俗陸氏佃曰就賢進於求善體逺進於發慮朱子曰動衆謂聳動衆聽蓋守常法用中材其效不足以致大譽逺謂疏逺之士下賢親逺足以聳動衆聽使知貴德而尊士然未有開導誘掖之方也故未足以化民唯教學可以化民使成美俗陳氏澔曰此學乃大學之道明德新民之事也存疑孔氏穎達曰逺謂才藝廣逺心意能親愛之又曰天子諸侯及卿大夫欲教化其民成其美俗非學不可戴氏溪曰求賢以自輔足以資人君多聞之益屈已以下賢足以興起天下為善之心然學校不立教養闕然天下之人雖欲為善而無所考德問業故化民成俗必由學校其所及者廣所傳者逺也存異鄭氏康成曰動衆謂師役之事孔氏穎達曰君子君謂君於上位子謂子愛下民案就賢親之也其疏逺之士則疑於不能親矣而又重之以一體之義則跡雖疏而情自洽衆之所以動也才藝廣逺說終不若朱子疏逺義於就字體字及動衆字尤有關㑹耳戴氏主學校言雖亦化原之所在然古人有身為表儀而風俗自登者則不如諸家說之周致也又案君子有德有位之通稱孔氏專以天子諸侯卿大夫言已不免於拘墟至分訓君與子之義則鑿矣玉不琢不成器人不學不知道是故古之王者建國君民教學為先兌命曰念終始典于學其此之謂乎琢丁角反兌依注作說音悅正義鄭氏康成曰教學謂內則設師保以教使國子學焉外則有大學庠序之官典經也言學之不舍業也兌當為說字之誤髙宗夢傅說求而得之作說命三篇在尚書今亡孔疏鄭不見古文尚書孔氏穎達曰此論喻學之為美故先立學之事王者建立其國君長其民內設師保外設庠序以教之記者明教學事重不可暫廢故引兌命以證也吳氏澄曰說命所言謂人之為學自始及終當有常而不閒斷此引之謂君之教民為學亦當終始有常而不暫廢也案此篇分章宜從朱子右一章言教學之重一篇之綱領也雖有嘉肴弗食不知其㫖也雖有至道弗學不知其善也是故學然後知不足教然後知困知不足然後能自反也知困然後能自强也故曰教學相長也兌命曰學學半其此之謂乎肴户交反强其文反又其良反長丁兩反學學上胡孝反下如字正義鄭氏康成曰旨美也學則睹已行之所短孔疏不學之時不知已身何長何短若學則知已之所短有不足之處也教則見已道之所未達孔疏不教之時謂已諸事皆通若其教人則知已有未通而有困弊自反求諸己也孔疏既知不足然後能自反嚮身而求諸己之困故反學矣自强修業不敢倦也孔疏既知困弊然後能自强學其身不復解怠也學學半言學人乃益已之學半孔疏上學為教音斆下學者謂學習也言教人乃是益已學也孔氏穎達曰此明教學相益教學相長者教之時然後知已困而乃强學之是教能長學也學則道業成就於教益善是學能長教也張子曰困者益之基也學者之病正在於不知困自以為知而問之不能答用之不能行者多矣案上章言教必由於學此言教亦所以為學上以本末之序言此以內外之合言也古之教者家有孰黨有庠術有序國有學孰音熟正義鄭氏康成曰古者仕焉而巳者歸教於閭里朝夕坐於門孔疏書傳大夫七十而致仕退老歸其鄉里大夫為父師士為少師新榖已入餘子皆入學距冬至四十五日始出學上老平明坐於右孰庶老坐於左孰餘子畢出然後皆歸夕亦如之門側之堂謂之孰孔疏爾雅釋宮文孔氏穎達曰自此至謂乎明國家立庠序上下之殊并明入學年嵗之差周禮百里之內二十五家為閭同共一巷巷首有門門邊有孰謂民在家之時朝夕出入恆受教於孰故云家有孰白虎通云里中之老有道德者為里右師其次為左師教里中之子弟以道藝孝弟仁義也於黨中立庠教閭中所升者國謂天子所都及諸侯國中周禮天子立四代學以教世子羣后之子及鄉中俊選所升之士諸侯於國但立時王之學故云國有學陳氏祥道曰家孰黨庠術序所謂鄉學也國有學大學也以義求之孰者孰也言習孰乎灑掃應對進退之事將由末以致本者也庠者養也言養人材而成之非特口體而已序者射也言以射別行能而進非特主皮而已學則本天人之道而覺之非特為利而已陳氏澔曰術當為州州之學曰序周禮鄉大夫春秋以禮會民而射於州序是也案鄉大夫當作州長通論陸氏佃曰周官州長言射于州序則序者州亦有之黨正言飲酒于序則黨又有序矣王制曰耆老皆朝於庠鄉飲酒曰迎賓於庠門之外則庠者鄉亦有之春秋傳曰子産不毁鄉校則鄉亦有校矣存疑鄭氏康成曰術當為遂聲之誤也孔疏以與黨連文故知誤案或曰遂術二字古通用春秋秦伯使術來聘公羊傳漢書五行志並作遂管子里十為術術十為州術音遂術字從行遂字從辵皆人所經行之地又曰周禮五百家為黨萬二千五百家為遂黨屬於鄉遂在逺郊之外孔疏周禮六鄉之內五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉六遂之內五家為鄰五鄰為里四里為酇五酇為鄙五鄙為縣五縣為遂此于六鄉舉黨六遂舉遂則閭里以上皆有學可知故鄭云歸教於閭里孔氏穎達曰於遂中立序教黨學所升者李氏格非曰縣遂同於州鄉酇鄙同於族黨鄰里同於比閭此經於六遂言序以見鄉之黨於六鄉言黨以見遂之鄙於縣遂之學言遂於族黨之學言黨舉大以兼小於比閭鄰里之學言家舉小以見大案陳說本周禮經文以斷術之為州其說可據至術之作遂於古雖有明徴而遂之有序於經實無可考自孔氏言之則竟以黨屬之遂矣是當並以疑存之比年入學中年考挍一年視離經辨志三年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知類通達强立而不反謂之大成夫然後足以化民易俗近者說服而逺者懷之此大學之道也記曰蛾子時術之其此之謂乎比毗志反中丁仲反樂五孝反說音悅蛾魚起反本或作蟻案漢以前多書蟻作蛾左傳蛾析列子禽獸蟲蛾元帝紀白蛾羣飛長楊賦扶服蛾伏皆為蟻字之省正義鄭氏康成曰比年入學學者每歲來入也中猶閒也孔疏閒年謂下一年三年五年七年鄉遂大夫閒嵗則考學者之德行道藝孔疏計學者多少之閒嵗非鄉遂大夫閒嵗乃入學周禮三嵗大比乃考焉孔疏鄭引周禮則此中年考挍非周禮也皇氏謂此亦周禮此中年考挍為鄉遂一年視離經以下為國學非也但應入大學者國家考校之未入大學者鄉遂大夫考挍之耳離經斷句絶也辨志謂別其心意所趣鄉也知類知事義之比也强立臨事不惑也不反不違失師道也懷來也安也蛾蚍蜉也蚍蜉之子微蟲耳時術蚍蜉之所為其功乃復成大垤孔氏穎達曰敬業謂藝業長者敬而親之樂羣謂羣居朋友善者願而樂之博習謂廣博學習親師謂親愛其師論學謂學問嚮成論說學之是非取友謂選擇好人取之為友小成比六年以前其業稍成也知類通達謂知義理事類通達無疑强立謂專强獨立不有疑滯記云蛾子時術之者引舊記言蚍蜉之子時時術學銜土之事而成大垤猶如學者時時學問而成大道矣周氏諝曰能離經然後知業之為可敬能敬業然後所習者博習博然後能講學能講學然後知類通達凡此皆視其學問者也內辨其志然後外樂其羣樂羣然後上能親師親師然後下能取友取友然後能强立不反凡此皆視其德性者也又曰辨志者自能分別其心所趨向如為善為利為君子為小人也敬業者專心致志以事其業也樂羣者樂於取益以輔其仁也博習者積纍精專次第而遍也親師者道同德合愛敬兼盡也論學者知言而能論學之是非取友者知人而能識人之賢否也知類通達聞一知十能觸類而貫通也强立不反知止有定而物不能移也蓋考挍之法逐節之中先觀其學業之淺深徐察其德行之虛實讀者宜深味之乃見進學之驗吕氏祖謙曰五年方可博習未至此則非聖人之書不敢觀前此非不從師至此方能親師七年見得的當方可議論是非決擇賢否存異陳氏祥道曰三年大比此中年必三年也吳氏澄曰七年以上皆小學之事九年則十五入大學之次年自始入小學之年而通數之為九年也案此章詳言教學之事中年考挍非三年大比孔疏本明一年謂入大學之後一年吳氏合小學在內非也入大學二年而即望其大成不太欲速乎大學始教皮辨祭菜示敬道也宵雅肄三官其始也入學鼓篋孫其業也夏楚二物收其威也未卜禘不視學遊其志也時觀而弗語存其心也幼者聽而弗問學不躐等也此七者教之大倫也記曰凡學官先事士先志其此之謂乎宵讀小肄以二反篋古協反孫音遜下同夏檟同古雅反禘大計反語魚庶反學如字躐里輒反正義鄭氏康成曰皮辨天子之朝服也祭菜禮先聖先師孔疏據文王世子凡學春官釋奠于先師秋冬亦如之惟始立學乃祭先聖菜謂芹藻之屬宵之言小也肄習也習小雅之三謂鹿鳴四牡皇皇者華也孔疏鄉飲酒禮燕禮皆歌此三詩左傳襄四年穆叔如晉亦歌此三詩此皆君臣燕樂相勞苦之詩為始學者習之所以勸之以官且取上下相和厚鼓篋擊鼓警衆孔疏文王世子天子視學大昕鼓徴凡常入學用樂及祭祀用樂皆以鼓徴召學士乃發篋出所治經業也孫猶恭順也夏槄也孔疏郭景純云今之山楸楚荆也陳氏澔曰夏檟也檟形圓楚形方二者所以撲撻犯禮者收謂收斂整齊之威威儀也禘大祭也孔疏大祭在於夏今案不當大祭之年亦必待夏時祭之後天子諸侯既祭乃視學考挍以游暇學者之志意時觀而弗語使之悱憤然後啓發也倫理也自大學始教至此其義七也官居官者也士學士也孔氏穎達曰此明天子諸侯教學大理凡有七種始立學時天子使有司服皮辨祭先聖先師以蘋藻之菜示敬道者崔氏云著皮辨祭菜蔬並是質素示學者以謙敬之道矣當祭菜時取小雅三篇為學者歌之欲使學者得為官與君臣相燕樂各自勸勵也入學之時大胥之官先擊鼓以召之學者既至發其筐篋以出其書欲使學者恭順其所持經業也學者不勤其業師則以夏楚二物笞撻之欲令學者畏之收斂其威儀也未卜禘不視學者謂優游縱暇學者之志不欲急切之也時觀謂教者時時觀之而不丁寧告語使學者心憤口悱然後啓之也學有疑滯未曉必推長者咨問幼者但聽長者解說不推長者而輒問則與長者抗行故教此學者令其謙退不敢踰越等差也又曰此視學謂考試學者經業或君親往或使有司為之非天子大禮視學也若大禮仲春入學舍菜合舞仲秋頒樂合聲於是時也天子則視學焉月令季春大合樂天子率三公九卿而視學焉與此別也視學既在夏祭之後則天子春秋視學亦應在春秋時祭之後可知方氏慤曰皮辨無經緯之文織絍之功祭菜無犧牲之味黍稷之實宵雅肄習必至於三欲孰故也習必以雅欲其正也止以小雅欲其有漸也以其始教故曰官其始也官者主治之謂也輔氏廣曰示敬道所以使之立為學之誠官其始所以使之知教者之意學者之誠立教者之意明然後可以教故孫其業使之有受道之質然又慮其怠也則又收其威使之有勉强之意又慮教者之亟而不俟夫學者之自得也故又五年一視學使學者之志優游而無迫急之患時觀而弗語使學者之心常存而有憤悱之誠上無迫切之教下有憤悱之誠則不患乎人之不自得已夫教者固不可亟而學者亦不可以有亟心也故又終之以學不躐等焉此其倫序也七者皆所以正士之志士而正其志則官而能其事矣通論陳氏祥道曰學者之於先聖先師大有釋奠小有釋菜釋奠以飲為主而其禮隆釋菜以食為主而其禮薄故大學始教皮辨祭菜所以示敬而已矣古之教世子必以禮樂教學士亦必以禮樂皮辨祭菜而示之使敬教以禮也小雅肄三而誘之使勸教以樂也存疑吕氏祖謙曰舊說以宵為小大抵經書字不當改古人采詩夜誦使夜閒肄習三章之雅非獨舊說所謂鹿鳴四牡皇皇者華也但取雅之三章諷誦吟咏此心遂有所據所謂官其始也存疑鄭氏康成曰學不躐等學教也教之長稚張子曰鼓篋謂入學先搜索所藏防其挾異端邪說以亂學者也辨正郝氏敬曰學不躐等鄭改學為教恐非案此章歷數大學之教法而明其義見教者所當先也禘祭王制祭統並云夏郊特牲祭義並云春以諸經考之似夏禘為正此言卜禘視學者大約在每年夏祭之後天子視學亦使有司考挍之也孔疏以為五年大禘陳氏祥道以為三年吉禘吳氏澄以為周前春祭名禘或云祠字之誤恐皆非大學之教也時教必有正業退息必有居學正義孔氏穎達曰正業謂先王正典非諸子百家故教必用之陸氏佃曰正業言時教之所教居學言退息之所學朱子曰時教如春夏禮樂秋冬詩書之類居學如易之言居業蓋常習所習如下文操縵博依興藝息逰之類存異鄭氏康成曰有居有常居也孔氏穎達曰大學之教也時言教學之道當以時習之退息必有居者謂學者疲倦而暫休息必有常居之處各與其友閒居得相咨决不可雜濫也辨正朱子曰鄭注孔疏讀時字居字句絶而學字自為一句恐非文意當以也字學字為句絶總論孔氏穎達曰自此至謂乎論教學之道必當優柔寬緩不假急速遊息孫順其學乃成不學操縵不能安弦不學博依不能安詩不學雜服不能安禮不興其藝不能樂學操七刀反縵末怛反依於豈反興虛應反又許金反樂五孝反正義鄭氏康成曰操縵雜弄博依廣譬喻也依或為衣雜服冕服皮辨之屬雜或為雅興之言喜也歆也藝謂禮樂射御書數孔氏穎達曰此以下並正業積漸之事也學操縵教樂也弦琴瑟之屬將學琴瑟若不先學調弦雜弄則手指不便不能安正其弦黃氏震曰安者習孰無辛苦之意學博依教詩法也博廣也依謂依倚譬喻也若欲學詩不學廣博譬喻則不能安善其詩學雜服教禮法也雜服自衮而下至皮辨朝服𤣥端之屬禮經正體在於服章以表貴賤若欲學禮而不能明雜衣服則心不能安善於禮也不興其藝不能樂學此總結上三事並先從小起義也藝謂操縵博依六藝之等若欲學詩書正典意不歆喜其雜藝則不能耽玩樂於所學之正道方氏慤曰操之而急縱之而緩者操縵之謂也弦之理亦若是而已依則依物之理以為言焉多識於鳥獸草木之名則博依之謂也詩之理亦若是而已張子曰藝禮樂之文如琴瑟笙磬古人皆能之以中制節射御亦合禮樂如不失其馳舍矢如破騶虞和鸞動必相應書數之用雖小然莫不出於學故人有倦時又用此以遊其志所以使之樂學也朱子曰古人服各有等降若理㑹得雜服則於禮亦思過半矣且如冕服是天子祭服皮辨是天子朝服諸侯助祭於天子則服冕服自祭於其廟則服𤣥冕大夫助祭於諸侯則服𤣥冕自祭於其廟則服皮辨又如天子常朝則服皮辨朔旦則服𤣥冕諸侯常朝則服𤣥端朔旦則服皮辨大夫私朝亦服𤣥端夕深衣士則𤣥端以祭上士𤣥裳中士黃裳下士雜裳庶人深衣此所謂雜服也陳氏澔曰詩人比興之辭多依託於物理而物理至博也學者不能於退息之際廣求物理之所依附者則無以驗其實而於詩之辭必有疑殆而不能安者矣存疑張子曰服事也雜服灑掃應對投壺沃盥細碎之事吳氏澄曰縵亦絲樂之屬蓋燕樂也周官鍾師磬師皆掌縵樂故君子之於學也藏焉修焉息焉遊焉夫然故安其學而親其師樂其友而信其道是以雖離師輔而不反也兌命曰敬孫務時敏厥修乃來其此之謂乎正義鄭氏康成曰藏謂懷抱之修習也息謂作勞休止之息遊謂閒暇無事之逰敬孫敬道孫業也敏疾也學者務及時而疾其所修之業乃來孔氏穎達曰言君子於學無時暫替乃能安其所學業學業既深必知此由本師故親師師既獲親而同志之友亦被於樂重親師樂友已道深明心自說信不復虛妄輔即友也友主輔已違離師友獨在一處而講說不違反于師友昔日之意旨此則强立不反也乃來所學得成也張子曰遜其志於仁則得仁遜其志於義則得義惟其敏而已吳氏澄曰藏謂入學受業時修謂治其正業息謂退息私居時遊者玩物適情之謂學操縵等藝是也今之教者呻其占畢多其訊言及於數進而不顧其安使人不由其誠教人不盡其材其施之也悖其求之也佛夫然故隱其學而疾其師苦其難而不知其益也雖終其業其去之必速教之不刑其此之由乎呻音申占敕沾反訊字又作誶音信數吳音朔鄭以言及於數為句吳以及於數進為句今從吳佛本又作拂扶弗反正義鄭氏康成曰呻吟也占視也簡謂之畢訊猶問也言今之師自不曉經之義但吟誦其所視簡之文多其難問也呻或為慕訊或為訾不顧其安謂務其所誦多不惟其未曉也不由其誠謂使學者誦之而為之說不用其誠也不盡其材謂師有所隱也朱子曰隱其學謂以其學幽隱而難知如曰二三子以我為隱之意施之也悖求之也佛謂教者言非則學者失問也速疾也學不心解則忘之易刑猶成也孔氏頴達曰此論教者違法學者所以不成多其訊者不曉義理而外不肯默假作問難也進謂務欲前進誦習使多而不魯反顧其義理之安誠忠誠也使學者誦文而已為之說義心皆不曉是不用己之忠誠也教人不盡其材謂凡有所知又隱惜不盡其道也教者有上五者之短故施教於人違背其理其學者求之則又違戾師教既悖受者又違故弟子不荷師教之德乃隱沒其師之學而憎疾其師也輔氏廣曰材者可為之資施與求皆為師之事施謂施己之教求謂求學者之益刑謂儀刑教之不刑猶言教不足為人之儀刑也吳氏澄曰數進謂數進之學者未可以進而又進之也實知此一理而後使之别窮一理是謂由其誠能行此一事而後教之別為一事是謂盡其材否則是使之不由其實教之不盡其能也不觀其已知己能而進之以未知未能是其施教於人者先後失宜故曰悖不俟其自知自能而强之以必知必能是其求責於人者淺深莫辨故曰佛存疑鄭氏康成曰言及於數謂發言出說不首其義動云有所法象而已隱不稱揚也不知其益若無益然朱子曰數謂刑名度數言及於數欲以是窮學者之未知非求其本也注疏法象之說恐非材道也輔氏廣曰隱不安之意案此章言教貴使人得其安也誠在我材在人由其誠所謂誨人不倦無行不與也盡其材因人而施或成德或達材也又案鄭以言及於數為句據吳氏以數進言之則以多其訊言為句及於數進而不顧其安為句也其說明妥視鄭說為勝輔氏不安說文義雖順究非隱字正訓附存之大學之法禁於未發之謂豫當其可之謂時不陵節而施之謂孫相觀而善之謂摩此四者教之所由興也禁居鴆反當孫並去聲摩莫波反正義鄭氏康成曰不陵節謂不教長者才者以小教幼者鈍者以大也施猶教也孫順也孔疏陵猶越也節謂年才所堪教人之法當隨其年才年長而聰明者則教以大事而多與之若年幼又頑鈍者當教以小事又與之少是不越其節分而教之所謂孫順也興起也孔氏頴達曰此論教之得理則教興也陳氏祥道曰禁於未發之謂豫所以救失於未發之前當其可之謂時所以長善於可教之際戴氏溪曰孫有優游㢲入之意摩有切磋動蕩之意吳氏澄曰此四者三屬於師一屬於友存疑鄭氏康成曰未發情欲未生謂年十五時可謂年二十成人時不並問則教者思專也摩相切磋也辨正朱子曰禁於未發但謂豫為之防其事不一不必皆謂十五時也當其可謂適當其可告之時亦不必以年為斷相觀而善但謂觀人之能而於己有益如以兩物相摩而各得其助也發然後禁則扞格而不勝時過然後學則勤苦而難成雜施而不孫則壞亂而不修獨學而無友則孤陋而寡聞燕朋逆其師燕辟廢其學此六者教之所由廢也扞胡半反格胡客反又戶隔反勝音升又升證反壞音怪辟鄭讀譬朱子讀僻今從朱正義鄭氏康成曰格讀如凍􅏖之􅏖扞堅不可入之貌孔疏格謂堅强扞拒扞也時過然後學則思放也孔疏時過則心情放蕩雖追悔欲學而精明已散勤苦難成雜施不孫小者不達大者難識學者所惑也孔疏教雜亂無次則大才輕其小業小才苦其大業並是壞亂之法獨學無友不相觀也孔疏有疑無可咨問則寡所聞廢弛也孔氏穎達曰此論學不依理教之廢棄戴氏溪曰施之不得其統猶不施也自學而無其友猶不學也燕朋謂昵於朋比則人自為學不顧其師燕辟謂昵於敖辟則自以為是不力於學存疑鄭氏康成曰扞格不勝謂教不能勝其情欲燕猶䙝也燕朋䙝其朋友燕辟䙝師之譬喻辨正朱子曰燕朋是私䙝之友所謂損者三友之類注說非也燕辟但謂私䙝之談無益於學而反有所害也君子既知教之所由興又知教之所由廢然後可以為人師也故君子之教喻也道而弗牽强而弗抑開而弗達道而弗牽則和强而弗抑則易開而弗達則思和易以思可謂善喻矣道音𨗳强其良反又其兩反易以豉反下同正義鄭氏康成曰道示之以道塗也抑猶推也開謂發頭角思而得之則深孔氏穎達曰此明君子教人方便善誘之事道而弗牽但廣開道示語學理而已人茍不曉亦不逼急牽令速曉也强而弗抑謂微勸學者使神識堅强隨才而與之不甚推抑其義而教也開而弗達謂開發事端但為學者開發大義頭角而已亦不事事使之通達也此下三句釋上三事之所由但示正道寬柔教之則彼心和而意乃覺悟也但勸强其神識而不抑之令曉則受者和易亦易成也但開發義理而不為通達使學者用意思念也陳氏祥道曰道而使之和則所從者樂强而使之易則所進者鋭開而使之思則所得者深案此章言教必知興廢之由而後能啓其志防其邪也學者有四失教者必知之人之學也或失則多或失則寡或失則易或失則止此四者心之莫同也知其心然後能救其失也教也者長善而救其失者也長丁丈反正義鄭氏康成曰失於多謂才少者孔疏假或有人才識淺小而所學貪多則終無所成是失於多也失於寡謂才多者孔疏或有人才識深大而所學務少徒有器調而終成狹局是失於寡少也失於易謂好問不識者孔疏至道深逺非凡淺所識而人不知思求唯好泛濫外問此是學而不思則罔失於止謂好思不問者孔疏心未曉知而不肯咨問惟但止住而自思之終不能達其實理此是思而不學則殆救其失者多與易則抑之寡與止則進之孔氏穎達曰此明教者識學者之心而救其失也四失由人心之異師能隨失而救之使學者和易以思是長善使學者無此四者之失是救失惟善教者能為之張子曰為人則多好髙則寡不察則易苦難則止方氏慤曰失雖見乎外而所存本乎心故知其心於內然後可救其失於外陳氏祥道曰多者約之以禮寡者博之以文易者抑之以自反止者勉之以自强此長善救失之道也案此章言教當因人而施也善歌者使人繼其聲善教者使人繼其志其言也約而達微而臧罕譬而喻可謂繼志矣正義鄭氏康成曰言為之善者則後人樂倣效師說之明則弟子好述之其言少而解臧善也孔氏穎達曰善歌謂聲音和美感動人心能使聽者繼續其聲善教者使後人繼其志如今人傳繼周孔也下又釋所以可繼之事言善為教者出言寡約而顯達易解義理微妙而說之精善其譬罕少而聽者皆曉為教如此則可使後人繼其志也朱子曰繼聲繼志者皆謂微發其端而不究其說使人有所玩索而自得之也約而達微而臧罕譬而喻三者皆不務多言而使人自得之意吳氏澄曰教者之言雖至約不繁而能使人通之雖至微不顯而能使人善之雖少有所譬而能使人曉之約微罕譬教者之不盡言也達臧喻學之能自得也如此可謂能使人繼其志者矣通論黃氏裳曰學之序能辨志然後能遜志能遜志然後能繼志辨志求道之時也遜志從道之時也繼志會道之時也案此章言教當使人有自得之妙朱子合上為一章總以上五章皆言大學教人之法倫則有所持循安則無所乖忤善喻則誘其心知失則當其病繼志則使自得之皆教之善也其法進而愈微然非出於躬行心得之餘亦無以為教也故善教必由於善學君子知至學之難易而知其美惡然後能博喻能博喻然後能為師能為師然後能為長能為長然後能為君故師也者所以學為君也是故擇師不可不慎也記曰三王四代唯其師此之謂乎正義鄭氏康成曰長達官之長弟子學於師學為君也師善則善四代虞夏商周孔氏穎達曰博喻廣曉也若知四事為主觸類長之後乃得為廣有曉解也前能廣解後乃可為人作師為師是學優學優宜仕故能為一官之長既能治一官之長有功能為一國之君也師既有君德則弟子就師可學為君之德故前云君子如欲化民成俗其必由學乎即是學能為君也三王四代雖皆聖人而無不擇師為慎故云唯其師張子曰知學者至於學之難易及知其資質才性之美惡知至學之難易知德也知其美惡知人也知其人且知德故能教人使入德陳氏澔曰至學至於學也鈍者至之難敏者至之易質美者向道不美者叛道知乎此然後能博喻謂循循善誘不拘一塗也吳氏澄曰知其難易美惡故能隨其淺深髙下而喻之各有攸當不局於一塗所謂博喻也教人能各得其宜則治人亦各得其宜故能為教人之師者小而一官之長大而一國之君皆能為之也存疑鄭氏康成曰美惡說之是非也孔氏穎達曰隨器與之是至學之易隨失而救之是至學之難罕譬而喻言約而達是為美反此則為惡也案天佑下民作之君師大君者天下之師邦君者一國之師下至黨正族師其為民長者亦無非師故必能為師然後能為長為君是言其理之一必判作三項人則滯而難通矣難易美惡注疏亦未確當以張子及陳氏說為正凡學之道嚴師為難師嚴然後道尊道尊然後民知敬學是故君之所不臣於其臣者二當其為尸則弗臣也當其為師則弗臣也大學之禮雖詔於天子無北面所以尊師也正義鄭氏康成曰嚴尊敬也尸主也為祭主也尊師重道不使處臣位也武王踐阼召師尚父而問焉曰昔黃帝顓頊之道存乎孔疏今大戴本無黃字或鄭見古本意亦忽不可得見與師尚父曰在丹書王欲聞之則齊矣王齊三日端冕孔疏案大戴無此文鄭所加師尚父亦端冕奉書而入負屏而立王下堂南面而立師尚父曰先王之道不北面王行西折而南東面而立師尚父西面道書之言孔疏此皆大戴禮武王踐阼篇文皇氏云王在賓位師尚父主位此王庭之位若尋常師弟則師東面弟子西面其書之言曰敬勝怠者强怠勝敬者亡孔氏穎達曰此論師德既善雖天子以下必須尊師也方氏慤曰師所以傳道故師嚴然後道尊學所以為道故道尊然後民知敬學餘論戴氏溪曰大抵古人行禮有教化存焉嚴師固所以尊道尊道則民知敬學率天下之人而皆知敬學天下豈不大治是故先王養老尊賢之義非特為其人也皆所以令衆庶見也夫君之尊天也而君之於臣有答拜之禮臣之卑地也而臣之於君有無北面之義然則古人於君臣之際亦淵乎其有意矣案此章言師道所繫之重以申上章建國君民教學為先之意善學者師逸而功倍又從而庸之不善學者師勤而功半又從而怨之善問者如攻堅木先其易者後其節目及其久也相說以解不善問者反此善待問者如撞鐘叩之以小者則小鳴叩之以大者則大鳴待其從容然後盡其聲不善答問者反此此皆進學之道也說音悅撞文江反叩音口從讀為舂正義鄭氏康成曰從隨也庸功也功之受其道有功於已先易後難以漸入也從讀如富父舂戈之舂孔疏左傳文十一年富父終甥以戈舂長狄喉而殺之舂容謂重撞擊也孔疏撞擊以為聲之形容鐘之為體必待其擊每以一舂而為一容始者一聲而已學者既開其端意進而復問乃極說之如撞鐘之成聲矣孔氏穎達曰此明善學及善問并善答不善答之事受者聰明易入是為學之善故師體逸豫而弟子所解又倍於他人恆言師特加功於我也劣者已既暗鈍故師體勤苦而功裁半於他人又不自責已不明乃反怨師獨不盡意於我也問謂論難善問之人如匠善攻治堅木先斫治其易處然後及於節目問者順理答者分明及其經久師徒共相愛說以解義理不善問者先問其難心且不解則答問之人不相喜說義又不通也善能答問難者如鐘之應撞隨彼所問事之大小而答之待其一問然後一答乃後盡說理義不善答問者或問小而答大或問大而答小或暫問而說盡此皆無益於所問也張子曰問學亦須發端不發端則無以起論議蓋道若大路如不因端則指何者為先須是攻堅而不入有疑而未判者如此發問乃有得也善待問者如撞鐘洪鐘未嘗有聲由叩乃有聲聖人未嘗有知由問而有知答問者必知問之所由故所答從所問言各有所當也大鳴小鳴因所叩也不必數數告語待其來問至當皆實見處故易以喻所謂待其從容然後盡其聲朱子曰善問者如攻堅木先其易者後其節目非特善問讀書求義理之法皆然置其難處先理㑹其易處易處通則堅節自迎刃而解矣若先其難者則刃頓斧傷而木終不可攻縱使能攻而費工竭力無自然說而解之之效終亦無益於事也方氏慤曰節則木理之剛者說卦所謂堅多節是矣目則木理之精者弓人所謂斫目必荼是矣皆其至堅難攻之處也案朱子曰相說而解說只當如字而解音胡買切蓋義理相說之久其難處自然觸發解散也又曰從容注說非是正謂聲之餘韻從容而將盡者也言必答盡所問之意然後止也此又一義也並存之記問之學不足以為人師必也其聽語乎力不能問然後語之語之而不知雖舍之可也語魚據反舍音捨正義鄭氏康成曰記問謂豫誦雜難雜說至講時為學者論之此或時師不心解或學者所未能問也聽語謂必待其問乃說之舍之須後孔氏穎達曰此論教者不可為記問之學聽語謂聽受其所問之語然後依問為說也若受業者才力苟不能見問待憤悱之間師然後語之語之不能知且舍住待後別更語之可也方氏慤曰聽所問而語之者教者之義也力不能問而語之者教者之仁也輔氏廣曰記問之學據已所有者以告人聽語者因人之所疑以啓之孟子所謂知言是矣此非心與道一而尺度權衡之在我者不足以與此也彼有質朴而訥於言雖欲問而力不能發者必有以知其情不待其問而語之若夫雖欲語之而彼無以受之則止而不以告非謂其既語而彼亦不知乃已也吳氏澄曰因上文善答問不善答問而又言此存疑輔氏廣曰不待其問而語之如孔子曰吾道一以貫之是也案此章言教學皆貴有心得之機以申前教學相長之意又案力不能問孔疏以憤悱言是所謂憤而啓悱而發也一貫之傳是大成事不應舉以為證良冶之子必學為裘良弓之子必學為箕始駕馬者反之車在馬前君子察於此三者可以有志於學矣冶音也箕音基正義鄭氏康成曰良冶之子仍見其家錮補穿鑿之器也補器者其金柔乃合有似於為裘孔疏善冶之家見父兄世業陶鑄金鐵使之柔合以補治破器皆令全好故此子弟仍能學為袍裘補續獸皮以至完全也良弓之子仍見其家撓角幹也撓角幹者其材宜調調乃三體相勝有似於為楊柳之箕孔疏善為弓之家使角幹撓屈調和成其弓故其子弟亦覩其父兄世業仍學取柳和軟撓之成箕也以言仍見則貫即事易也仍讀先王之道則為來事不惑孔氏穎達曰馬子始學駕車之時大馬本駕在車前今將馬子繫隨車後日見車行其駒慣習而後駕之不復驚也三事皆積習所成君子察此則可有志於學矣存疑應氏鏞曰冶鑄難精而裘軟易紉弓徑難調而箕曲易製車重難駕而馬反則易馴皆自易以至於難自粗而至於精習之有漸而不可驟進學之以類而不可泛求是之謂有志矣王氏應麟曰列子云古詩言良弓之子必先為箕良冶之子必先為裘張湛注云學者必先攻其所易然後能成其所難案此章言學必有漸乃底於成以申前小成大成之意鄭氏冶弓之說謂易者生於所習與始駕在前習見一例如應說則未為冶先為裘使自易以至難則古未有攻皮之工進而為攻金之工者也古之學者比物醜類鼓無當於五聲五聲弗得不和水無當於五色五色弗得不章學無當於五官五官弗得不治師無當於五服五服弗得不親當丁浪反正義鄭氏康成曰比物醜類以事相况而為之醜猶比也醜或為計當猶主也五服斬衰至緦麻之親孔氏穎達曰此論弟子當親師之事物事也言古之學者以同類之事相比方則事學乃易成下四事皆比物醜類也鼓之為聲不宮不商而五聲不得鼓則無諧和之節鼓是聲類也清水無色而五色畫繢不得水則不明故五色須水亦其類也學先王之道本求博聞强識非主於一官而五官不得學則不能治官是學之類也五服斬衰齊衰大功小功緦麻也師於弟子不當五服之一而弟子若無師教誨則五服之情不相和親是師情有在三之義故亦與親為類戴氏溪曰天下之理固有不相為而實相用者如鼓之於五聲水之於五色是也學何有於五官然視聽言貌思非學則不得其正師何與於五服然五服隆殺非師則恩義不篤學者苟知五聲非得鼓則聲不和五色非得水則色不章將以治五官安得不從事於學將以親五服安得不有賴於師耶存疑孔氏穎達曰五官金木水火土之官案此章極言教學之重以申大學始教五章之意孔疏以水火金木土之官為五官張子從之然不若戴氏視聽言貌思之說為長君子曰大德不官大道不器大信不約大時不齊察於此四者可以有志於本矣三王之祭川也皆先河而後海或源也或委也此之謂務本齊如字源本作原正義鄭氏康成曰大道不器謂聖人之道不如器施於一物孔疏器謂物堪用者器各施其用而聖人之道𢎞大無所不施論語君子不器本立而道生以學為本則其德於民無不化於俗無不成源泉所出也委流所聚也始出一勺卒成不測孔氏穎達曰此論學為衆事之本大德聖人之德聖人在上垂拱無為不治一官而為諸官之本大道聖人之道𢎞大無所不施不器而為諸器之本也大信聖人之信孔子曰豫欲無言天何言哉四時行焉不言而信是大信也大信本不為細言約誓不約而為諸約之本也若能察此在上四者之事則人當志學為本也三王祭百川之時皆先祭河後祭海河為海本源為委本也存疑鄭氏康成曰大德不官謂君也大信不約謂若胥命于蒲無盟約大時不齊謂或時以生或時以死孔氏穎達曰大時謂天時也天生殺不共在一時不齊而為諸齊之本也辨正朱子曰注說非是大德者不但能專一官之事若荀子所謂精於道者兼物物也大信不約謂如天地四時不言而信者也案此章言學者務本以終一篇之意大時不齊謂如孔子仕止久速各當其時與上三句一類恐不應獨以天時言欽定禮記義疏卷四十九
