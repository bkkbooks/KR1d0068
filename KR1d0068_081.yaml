body:
  text: 案五音生於黄鍾黄鍾為宫而管九寸九之則其數八十一三分宫去一而下生徵其數五十四三分徵益一而上生商其數七十二三分商去一而下生羽其數四十八三分羽益一而上生角其數六十四司馬氏遷云以上生下皆三生二以下生上皆三生四數多者濁數少者清聲濁者大聲清者細大不踰宫細不踰羽其别重敏經迭柳宫音重商音敏角音經徵音迭羽音柳其配土火木金水其象君臣民事物民臣與物為不變變者君與事而已故五音無變商角羽而有變宫徵也案禮記禮運曰五聲六律十二管還相為宫周禮太師掌六律六同以合隂陽之聲子月建黄鍾而辰在星紀丑月建大吕而辰在𤣥􅑎寅月建大簇而辰在娵訾亥月建應鍾而辰在析木辰月建姑洗而辰在大梁酉月建南呂而辰在夀星午月建蕤賓而辰在鶉首未月建林鍾而辰在鶉火申月建夷則而辰在鶉尾巳月建中吕而辰在實沈戌月建無射而辰在大火卯月建夹鐘而辰在降婁辰與建交錯貿處如表裏然是其合也其相生則以隂陽六體為之黄鍾初九下生林鍾之初六林鍾又上生大簇之九二大簇又下生南吕之六二南吕又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生蕤賓之九四蕤賓又上生大吕之六四大吕又下生夷則之九五夷則又上生夹鍾之六五夹鍾又下生無射之上九無射又上生中吕之上六同位者象夫妻異位者象子母所謂律取妻而呂生子也凡下生者三分去一上生者三分益一五下六上乃一終矣十二律惟黄鍾九寸林鍾六寸大簇八寸皆全寸而無餘分此三統之道也陳氏祥道曰黄鍾至大簇陽之陽也林鍾至應鍾隂之隂也陽之陽隂之隂則陽息隂消之時陽常下生而有餘隂常上生而不足蕤賓至無射則隂之陽也大呂至中呂則陽之隂也隂之陽陽之隂則陽消隂息之時陽常上生而不足隂常下生而有餘然則自子午以左皆上生子午以右皆下生矣案禮記禮運曰夫禮之初始諸飲食蕢桴土鼓猶若可以致其敬於鬼神明堂位曰土鼓蕢桴葦籥伊耆氏之樂也周禮籥章春秋擊土鼓吹豳詩以逆暑迎寒祈年吹豳雅擊土鼓以樂田畯祭蜡吹豳頌擊土鼓以息老物盖樂之作本於籥始於土鼓而周家王業之興本於豳逆暑迎寒祈年皆本始民事蜡息老物則使之反本而已故所擊者土鼓而擊之者蕢桴也土鼓築土為之也杜子春曰土鼓以瓦為皋陶以革為面然禮運土鼓起於未合土之前與壺涿氏炮土之鼓異矣蕢或作蒯盖結草以為桴也鄭氏改蕢為凷非也案書曰合止柷敔詩曰鼗磬柷圉周禮小師掌教柷敔禮記樂記曰聖人作為椌楬明堂位有揩擊盖柷敔以椌楬為體椌楬以戛揩擊為用故椌楬戛揩擊先儒皆謂之柷敔也爾雅云所以鼓柷謂之止郭氏璞注云柷如漆桶方二尺四寸深一尺八寸中有椎柄連底挏之令左右擊止者椎名鄭氏康成曰合樂之時投椎其中而撞之聶氏崇義從鄭説今太常樂亦人執其椎投而擊之盖柷以合樂也鼓柷謂之止欲戒止於其早也柷方二尺四寸為隂樂作於陽故以隂數成之案爾雅云所以鼓敔謂之籈郭氏璞注云敔如伏虎背上有二十七齟齬刻以木長尺櫟之籈者其名也唐制則用竹長二尺四寸破為十莖於敔背横櫟之又鄭注云敔木虎也背有刻所以鼓之以止樂盖鼓敔謂之籈欲脩潔於其後也敔二十七齟齬為陽樂止為隂故以陽數成之案明堂位有曰夏后氏之龍簨虡鄭注曰簨虡所以縣鐘磬也横曰簨飾之以鱗屬植曰虡飾之以臝屬羽屬孔疏曰龍簨虡謂簨虡之上以龍飾之也案考工記鱗飾筍臝與羽飾虡則筍飾以龍此經并云虡者盖夏時簨與虡皆飾之以鱗至周乃别故云龍簨虡或可因簨連言虡也案禮記樂記云鍾聲鏗鏗以立號號以立横横以立武周官鍾師掌金奏考工記鳧氏為鍾兩欒謂之銑銑閒謂之于于上謂之鼓鼓上謂之鉦鉦上謂之舞舞上謂之甬甬上謂之衡鍾縣謂之旋旋蟲謂之幹鍾帶謂之篆篆閒謂之枚枚謂之景于上之攠謂之隧十分其銑去二以為鉦以其鉦謂之銑閒去二分以為鼓閒以其鼓閒謂之舞脩去二分以為舞廣以其鉦之長為之甬長以其甬長為之圍三分其圍去一以為衡圍大鍾十分其鼓間以其一為之厚小鍾十分其鉦間以其一為之厚六分其厚以其一為之深而圜之盖銑也于也鉦也鼓也舞也鍾之體也甬與衡鍾之柄也國語單穆公曰先王之制鍾也大不出鈞重不過石律度量衡於是乎生樂器待律然後制而律度又待鍾然後生故有十二辰之鍾以應十二月之律十二月之鍾大鍾也大鍾特縣詩書爾雅所謂鏞是也非十二辰之鍾則為編鍾十六枚周禮所謂編鍾是也梓人職云厚唇弇口出目短耳大胷燿後大體短脰若是者謂之臝屬恒有力而不能走其聲大而宏有力而不能走則於任重宜大聲而宏則於鍾宜若是者以為鍾虡是故擊其所縣而由其虡鳴鄭氏康成曰横者曰簨飾之以鱗屬植者曰虡飾之以臝屬案禮記樂記曰石聲磬磬以立辨辨以致死考工記磬氏為磬倨句一矩有半其博為一股為二鼓為三三分其股博去一以為鼓博三分其鼓博以其一為之厚已上則摩其旁已下則摩其耑鄭氏注曰先度一矩為句一矩為股而求其絃既而以一矩有半觸其絃則磬之倨句也磬有大小此假矩以定倨句非用其度也盖鍾圓中規磬方中矩則倨句一矩有半觸其絃也其博為一疑一律也股為二後長二律也鼓為三前長三律也股非所擊也短而博鼓其所擊也長而狭鄭司農云股磬之上大者鼓其下小者康成曰股與鼓小大長短雖殊而其厚均也大戴禮曰懸一磬而尚拊則堂上有特懸磬矣小胥職云凡縣鍾磬半為堵全為肆注云鍾磬編縣之二八十六枚而在一虡謂之堵鍾一堵磬一堵謂之肆梓人云鋭喙决吻數目顅脰小體騫腹若是者謂之羽屬恒無力而輕則於任重宜其聲清揚而逺聞則於磬宜若是者以為磬虡故擊其所縣而由其簴鳴小首而長摶身而鴻若是者謂之鱗屬以為筍凡磬在東曰笙磬在西曰頌磬案禮記樂記曰絲聲哀哀以立㢘亷以立志又曰舜作五絃之琴以歌南風明堂位曰大琴大瑟中琴小瑟四代之樂器也琴操曰伏羲作琴世本曰神農作琴白虎通曰琴者禁也禁邪以正人心也廣雅曰琴長三尺六寸六分象三百六十六日廣六寸象六合又風俗通曰七絃法七星舊圗云舜作五絃周文王武王加二絃曰少宮少商又有九絃者蔡邕所加也盖絃大者為君而居中央商居右旁其餘大小相次不失其序則君臣之位正矣又案琴徽稱琴體為之當徽取汎聲則有聲不當徽則無聲也自臨岳之龍齦折半立第七徽又各折半立第四徽十徽又再折半立一徽十三徽又度臨岳至龍齦三分之立第五徽九徽又六分之立第二徽第十二徽又度臨岳至龍齦五分之立第三徽六徽八徽十一徽此琴徽之定位也案禮記樂記曰清廟之瑟朱絃而疏越有遺音者矣鄉飲酒禮燕禮皆有人左何瑟尚書大𫝊曰大瑟朱絃達越盖越瑟底孔也疏達通之也朱絃練而朱之也絲不練則勁而聲清練則熟而聲濁孔小則聲急大則聲遲故歌清廟之詩所彈之瑟疏越以遲其聲然後不至於太急練絲以濁其聲然後不失之太清也世本曰庖犧作瑟五十絃黄帝使素女鼓之哀不自勝乃破為二十五絃具二均聲爾雅曰大瑟謂之灑舊圖云瑟長八尺一寸廣一尺八寸二十三絃其常用者十九絃其餘四絃謂之番番贏也頌瑟則長七尺二寸廣尺八寸二十五絃盡用之案禮記樂記曰鼓聲讙讙以立動動以進衆周禮鼓人掌敎六鼓之音聲以雷鼓鼓神祀以靈鼓鼓社祭以路鼓鼓鬼亨以鼖鼓鼓軍事以鼛鼓鼓役事以晉鼓鼓金奏考工記韗人為皋陶長六尺有六寸左右端廣六寸中尺厚三寸穹者三之一上三正鼓長八尺鼓四尺中圍加三之一謂之鼖鼓為皋鼓長尋有四尺鼓四尺倨句磬折凡冒鼓必以啓蟄之日鼓大而短則其聲疾而短聞鼓小而長則其聲舒而逺聞注皋陶鼓木也中尺中央廣尺也上三正者三讀為参正直也参直者穹上一直兩端又直各居二尺二寸不弧曲也鼓四尺謂革所蒙者廣四尺也此鼓之制也風俗通曰鼓者郭也春分之音萬物皆鼓甲而出故謂之鼓此鼓之義也爾雅大鼓謂之鼖小鼓謂之應詩云應田縣鼓此鼓之别也又案詩大雅及周頌虡業必合鼓言之又明堂位言周鼓縣則鼓有簨虡可知但考工記梓人筍虡第言鍾磬而不及鼓惟明堂位言龍簨虡而不言所縣之器豈即鼓之簨與然注固以鍾磬言也闕之案禮記月令曰脩鞀鞞儀禮大射鼗倚於頌磬西紘周官小師掌教鼓鼗瞽矇掌播鼗眂瞭掌教播鼗書曰下管鼗鼓其制鄭氏以為如鼓而小持其柄摇之旁耳還自擊是也案小鼓有柄曰鞀大鞀曰鞞則鞀也鞞也鼗也大小有殊而其制一也案陳氏祥道曰周禮小師大祭祀下管擊應鼓小祭祀小樂事鼓朄詩曰應田縣鼓先儒以詩之田為朄朄小鼓應應鼙也爾雅曰大鼓謂之鼖小者謂之應然則大祭祀皆鼓朄擊應大射有朔鼙應鼙詩又以應配朄則朔鼙乃朄鼓也以其引鼓故曰朄以其始鼓故曰朔是以儀禮有朔無朄周禮有朄無朔猶儀禮之𤣥酒周禮之明水其實一也鄭氏以應與朄及朔為三鼓恐不然也朔作而應應之朔在西應在東則凡樂之奏常先西矣又杜氏佑曰小鼓有柄曰鞀大鞀曰鼙但鼙不聞有柄且亦小鼓視鼗未必甚大也案明堂位夏后氏之鼓足殷楹鼓鄭注足謂四足楹柱貫中上出也春秋時楚伯棼射王鼓跗是兵車之鼓亦有足與周禮大僕建路鼓于大寢之門外儀禮大射建鼓在阼階西南鼓彼其所建非即楹鼓也哉案禮記樂記曰㑹守拊鼓明堂位謂之拊摶書則謂之搏拊盖以其或搏或拊莫適先後也陳氏祥道曰拊之為物以韋為之狀若鼓然書𫝊所謂以韋為鼓是也實之以糠白虎通所謂拊革著以糠是也其設則堂上尚書所謂搏拊是也其用則先歌周禮所謂登歌合奏擊拊是也玩經文㑹守之義則拊也者殆衆樂待之而動者與案禮記樂記曰治亂以相鄭注相即拊也以節樂孔疏云亂理也言理奏樂之時擊拊而輔相於樂也案樂記既云㑹守拊鼓又曰治亂以相則相非拊也鄭氏以相為拊之説誤矣案禮記樂記曰訊疾以雅孔疏曰舞者訊疾奏此雅器以應之陳氏祥道曰樂者正也賓出而舂雅欲其醉而不失正也工舞而奏雅欲其迅疾而不失正也賔出之奏雅有祴樂則工舞之奏雅各以其舞之曲與聶氏崇義曰先鄭謂雅狀如漆筩而弇口大二圍長五尺六寸以羊韋輓之有兩紐疏畫案禮記明堂位下管象樂記曰從以簫管前此虞書曰下管周禮小師掌敎管笙師掌吹管大司樂有孤竹孫竹隂竹之管燕禮大射禮皆下管新宮盖匏竹在下故於堂下吹管以播之也鄭司農曰管如箎六孔説文亦曰管六孔十二月之音鄭氏康成曰管如笛而小併兩而吹之今大予樂有焉廣雅云管象簫長尺圍寸八孔無底夫併兩吹之則象簫之説信矣而八孔之説則未確也且管或作琯則古者之管殆有以玉為之者乎又案管六孔諸圖俱止五孔殆併上出之吹孔而為六與案禮記月令仲夏之月均管簫樂記曰從以簫管周禮小師掌敎簫笙師掌吹簫詩簫管備舉爾雅云大簫謂之言小者謂之筊舊圗云雅簫長尺四寸二十四彄頌簫長尺二寸十彄博雅云簫大者二十四管無底小者十六管有底蔡邕曰簫編竹有底長則濁短則清以審窒其底而増損之則和盖皆述其所𫝊然也風俗通云舜作竹簫以象鳳翼則簫之来也久矣案禮記明堂位葦籥伊耆氏之樂也周禮笙師掌敎籥籥師掌敎國子吹籥籥章掌龡豳籥孔疏葦籥者謂截葦為籥盖籥三孔主中聲而上下之律吕於是乎生命之曰籥以黍籥之法在是也羽舞皆執籥吹籥而舞以聲音之本在是也爾雅曰大籥謂之産其中謂之仲其小謂之箹案鄭氏康成郭氏璞皆云籥三孔而廣雅乃謂七孔毛萇乃謂六孔以黍籥之法為聲音之本推之則鄭郭之説為是案禮記樂記曰聖人作為壎箎周禮小師掌敎塤注云塤燒土為之大如鴈卵謂之雅塤郭璞爾雅注云大如鵝子鋭上平底形如稱錘小者如雞子謂之頌塤凡六孔上一前三後二世本云暴辛公作塤圍五寸半長三寸四分又案白虎通曰壎坎音也壎在十一月陽氣於黄泉之下薰蒸而萌唐樂志曰壎曛也立秋之音萬物將曛黄也然壎土也土位於坤而時立秋則唐志之説是而白虎通之説非矣案周禮笙師掌敎龡篪爾雅大篪謂之沂孫炎曰沂悲也郭氏璞曰篪以竹為之長尺四寸圍三寸一孔上出寸三分名曰翹横吹之小者尺二寸聶氏崇義曰先鄭云七孔賈疏云九孔皆誤惟廣雅云八孔為是案禮記月令仲夏調竽笙周禮笙師掌敎龡竽先鄭云竽三十六簧賈疏竽長四尺二寸鄭康成云竽管類用竹為之形参差象鳥翼韓非曰竽者五聲之長故竽先則鐘瑟皆隨竽唱則諸樂皆和盖後世之樂然也竽三十三管宫管在中央案禮記明堂位女媧之笙簧詩小雅曰吹笙鼓簧爾雅云大笙謂之巢小者謂之和郭氏璞注列管匏中施簧管端大者十九簧小者十三簧舊圖云笙長四尺謂管参差有如鳥翼至簧為笙中之舌或者離笙簧為二物誤矣案舞盖以鳥羽之長者插於柄上執而舞之其羽或用鷺或用翟皆見於詩前人作圖用細毛為數節如節之形懸於柄柄作牛首龍首形皆非也案樂記有羽旄干戚周官舞師掌教六舞有旄舞旄舞以毛牛尾為之所謂以旄牛尾注於旗竿之首者此也案陳氏祥道曰古之舞者或以干配戚或以干配戈案司兵職授舞者兵注以干戚言又據文王世子春夏學干戈陳説本此盾以革為之其背曰瓦案左𫝊中其盾曰瓦則背當隆起其瓦設錫而有鼻朱干朱質而繪以龍龍之外又繪以雜羽其繫之以繡韋案夏書胤征每嵗孟春遒人以木鐸徇于路周禮大司徒鄉師以木鐸徇于市朝明堂位振木鐸於朝天子之政也許慎鄭康成皆曰鐸大鈴也陳氏祥道曰鐸有金鐸有木鐸金鐸舌以金木鐸舌以木金鐸振武事若司馬之振鐸摝鐸是也木鐸振文事若書禮所言徇以木鐸是也案禮記樂記曰武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子先儒謂立四表於郊丘廟庭舞人以次就舞位而復綴云欽定禮記義疏卷八十一
