body:
  text: 檀弓上第三之二曾子之喪浴於爨室爨七亂反正義鄭氏康成曰禮死浴於適室孔疏士喪禮死於適室下云甸人掘坎於階間為垼於西牆下新盆槃瓶造於西階下乃浴於適室也存疑鄭氏康成曰曽子見曽元之辭易簀矯之以謙儉也孔疏於爨室是謙無掘坎為垼之事是儉案上反席未安而沒焉得有浴爨室遺語然反席之前足可有言記文不備耳曽子逹禮之人應浴正寢今乃浴於爨室明知意有所為故鄭云矯之也孔氏頴逹曰此論曽子故為非禮以正其子也辨正王氏安石曰此自元申失禮於記曽子無遺言鄭何以知其矯之以謙儉也陳氏澔曰士喪禮浴於適室無浴於爨室之文舊説曽子以曽元辭易簀矯之以謙儉然反席未安而沒未必有言及此使果曽子之命為人子者亦豈忍從非禮而賤其親乎此難以臆説斷之當闕之以俟知者大功廢業或曰大功誦可也正義鄭氏康成曰誦許其口習也孔氏穎逹曰此論遭喪廢業之事業謂所學習業則身有外營思慮他事恐其忘哀故廢業也誦則在身所為其事稍靜不慮忘哀故許其口習或曰者以其事疑然亦恐有或人之言也陳氏澔曰業者身所習如學舞學射學琴瑟之類廢之者恐其忘哀也誦者口所習稍暫為之亦可然稱或曰亦未定之辭也通論陳氏祥道曰大功廢業而誦可則大功而上不特廢業而誦亦不可大功而下不特誦可而業亦不廢也康誥於父子則不戒之以弗念天顯於弟則戒之以其天性之厚者無待於戒天性之將薄者不可不戒也禮不曰衰期廢業而曰大功廢業其意如此而已遊氏桂曰古謂習樂者為業春秋寧武子曰臣以為肄業及之晉屠蒯曰辰在子卯君徹宴樂學人舍業皆以歌詩言古者國子教以歌舞歌者雅頌之詩舞者因歌而舞之也少而習業於此故謂之業舍業者舍歌舞之業以為哀也或曰徒可口誦其詩而已子張病召申祥而語之曰君子曰終小人曰死吾今日其庶幾乎語魚據反正義鄭氏康成曰申祥子張子太史公傳曰子張姓顓孫今曰申祥周秦之聲二者相近未聞孰是孔疏二國人言申與顓相近故曰未聞孰是案或曰顓孫合聲為申死之言澌也事卒為終消盡為澌孔氏頴逹曰此論子張將終戒朂其子之事庶幸也言平生以善自修今日將死庶幾為君子陳氏澔曰君子行成德立有始有卒故曰終小人與羣物同朽腐故曰死疾沒世而名不稱謂是也子張至此亦自信其近於君子也通論陳氏祥道曰曲禮大夫曰卒士曰不祿庶人曰死與此同意書於舜言死春秋於無道之大夫皆曰卒者蓋以君子對小人則小人為死通而言之雖君子謂之死可也存異鄭氏康成曰子張欲使申祥執喪成己志也辨正陳氏祥道曰子張自以庶幾於君子之終而不為小人之死蓋使申祥觀其行以自勵而已孰謂欲使執喪成己志哉曾子曰始死之奠其餘閣也與奠田練反正義鄭氏康成曰不容改新也閣庋藏食物孔疏閣架橙之屬人老及病飲食不離寢恐忽須無常故並將近置室裏閣上也若死仍用閣之餘奠者為時切促急令奠酹不容方始改新也孔氏頴逹曰此論始死奠之所用鬼神所依於飲食故必有祭酹但始死未容改異故以生時庋閣上脯醢以為奠也士喪禮復魄畢以脯醢升自阼階奠於尸東此之謂也案記即牀而奠當腢用吉器鄭氏曰腢肩頭也孔氏曰就尸牀而設之尸南首則在牀東當尸肩頭也未忍異於生故用吉器至小斂奠則用毼豆之等為變矣方氏慤曰人之始死以禮則未暇從其新以情則未忍易其舊故其奠也以閣之餘物存異陸氏佃曰閣其餘者幸其更生若有待焉耳大夫七十而後有閣如舊説則死而無閣者何物奠之案分言之則大夫曰閣士曰坫通言之則凡庋飲食之板皆謂之閣土坫之上未嘗不用一板也曾子曰小功不為位也者是委巷之禮也子思之哭嫂也為位婦人倡踊申祥之哭言思也亦然嫂悉早反倡昌尚反踊音勇正義鄭氏康成曰委巷猶街里委曲所為譏之也為位以親疏敘列哭也稱子思為位善之也禮嫂叔無服有服者娣姒婦小功孔疏鄭注喪服小功章娣姒婦者兄弟之妻相名也長婦謂稚婦為娣婦娣婦謂長婦為姒婦謂據婦年之長幼則不據夫年之大小成十一年左傳云聲伯之母不聘穆薑曰吾不以妾為姒穆薑魯宣公夫人聲伯之母魯宣公弟叔肹之妻是弟妻為姒又昭二十八年左傳子容之母走謁諸姑曰長叔姒生男子容之母伯華之妻也長叔姒是伯華之弟叔肹之妻亦謂弟妻為姒皆不係夫身長幼也倡先也説者云言思子遊之子申祥妻之昆弟亦無服過此以往獨哭不為位孔氏頴達曰此論無服為位哭之禮時有不為位者既言其失乃引得禮之人以證之子思婦與子思之嫂為娣姒有小功之服故子思之婦先踊子思乃隨之而哭陸氏佃曰婦人倡之而後踊逺嫌張子曰小功情疏疏則容為位而後哭情重者始聞喪而哭不暇為位哀甚也通論馬氏睎孟曰無服而為位者惟嫂叔蓋無服者所以逺男女近似之嫌而為位者所以篤兄弟內喪之親子思之哭嫂也為位婦人倡踊以婦人相為娣姒之義而不敢以己之無服先之也至於申祥之哭言思亦如子思者蓋非禮矣嫂為內喪故可以正哭位婦人有相為娣姒之道故可以倡踊妻之兄弟外喪也而既無服則不可為哭位之主矣記曰妻之昆弟為父後者死哭之適室子為主由是言之則哭妻之昆弟以子為主異於叔嫂之喪也以子為主則婦人不當倡踊矣存疑孔氏頴逹曰此子思哭嫂是孔子之孫以兄先死故有嫂也皇氏以為原憲字子思若然鄭無容不注鄭既不注皇氏非也孔氏連叢云一子相承以至九世史記所説亦同或其兄早死故得有嫂且雜説不與經合不一也古者冠縮縫今也衡縫故喪冠之反吉非古也縮所六反縫音逢又扶用反衡注音橫華彭反正義鄭氏康成曰縮從也今禮制衡讀為橫今冠橫縫辟積多也反吉非古者解時人之惑也喪冠縮縫古冠耳孔氏頴逹曰殷質吉凶冠皆直縫辟積褶少周吉冠文多積褶而橫縫之若喪冠猶疏辟而直縫是與吉冠相反時人因謂古喪冠與吉冠反故記者釋云非古也周世如此耳古者吉凶冠同從縫陳氏祥道曰一幅之材順經為辟積則少而質順緯為辟積則多而文順經為縮縫順緯為橫縫存疑黃氏敏求曰作記之人謂喪冠直縫吉冠橫縫為周公之古禮而衰世喪冠亦皆橫縫失禮無別故嘆曰喪冠之反吉非古注義反患喪冠與吉冠異製誤也案縮縫橫縫此泛舉冠制耳古冠質喪吉皆縮縫周制文吉冠多辟積橫縫故喪冠反吉縮縫以別之非古制如此也鄭孔之説本無弊黃氏以此節専論喪冠而謂反吉為復古似與經文語氣不合曽子謂子思曰伋吾執親之喪也水漿不入於口者七日子思曰先王之制禮也過之者俯而就之不至焉者跂而及之故君子之執親之喪也水漿不入於口者三日杖而后能起伋音急俯音甫跂邱豉反正義鄭氏康成曰子思以曽子為難繼故以禮抑之孔氏頴達曰言先王制禮使後人依而行之三日尚以杖扶而起則曽子之言後人難為繼也陳氏澔曰三日中制也七日則幾於滅性矣有扶而起者有杖而起者有面垢而已者秦氏繼宗曰曽子篤實純孝不自覺其過中子思弟也事師無隱故以正對之存疑鄭氏康成曰曽子言己以疾時禮之不如孔疏誇已居喪能行禮以疾時人不如己也疾案曽子自述居喪己事語子思耳未見其夸己以人之不如也鄭孔於此似深文矣通論陳氏祥道曰先王制為喪親之禮其服衰止於三年其哭泣止於三月其水漿不入口止於三日使過之者俯而就之不至者跂而及之也若夫以親之恩為罔極吾之情為無窮徇其情而不節之以禮則在已者不可傳在人者不可繼是戕賊天下之人而禍於孝此曽子所以不為子思取也曾子曰小功不稅則是逺兄弟終無服也而可乎稅他外反正義鄭氏康成曰據禮而言也日月已過乃聞喪而服曰稅大功以上則然小功輕不服逺兄弟謂相離逺者聞之恆晚終無服而可乎以己恩怪之孔氏頴逹曰此論曽子疑禮小功不著稅服之事曽子仁厚禮雖如此猶以為薄故怪之此據正服小功也故喪服小記云降而在緦小功者則稅之鄭義若限內聞喪則追全服王肅祇服殘日非也存疑韓氏愈曰曾子稱小功不稅則是逺兄弟終無服也而可乎鄭注云以情責情今之士人遂引此不追服小功小功服最多親則叔父之下殤與適孫之下殤與昆弟之下殤尊則外祖父母常服則從祖祖父母禮洽人情其不可不服也眀矣古之人行役不踰時各相與處一國其不追服雖不可猶至少也今之人男出仕女出嫁或千里之外家貧訃告不及時則是不服小功者恆多而服小功者恆鮮矣君子之於骨肉死則悲哀而為之服者豈牽於外哉聞其死則悲哀豈有間於新故死哉今特以訃告不及時聞死出其月數則不服其可乎愈常怪此近出弔人見其顔色戚戚類有喪者而其服則吉問之則云小功不稅者也禮文殘闕師道不傳不識禮之所謂不稅果不追服乎無乃別有所指而傳注者失其宗乎辨正劉氏敞曰至親之恩以期斷其殺止於大功兄弟之恩以小功止其殺止於緦外親之服以緦窮其殺止於袒免聖人之制禮豈苟言情哉亦著其文而已矣大功稅小功不稅其文止於是也兄弟之服不過小功外親之服不過緦其情止於是也因其情而為之文親疏之殺見矣故禮大功以上不謂之兄弟兄弟有加而大功無加無加者親親也有加者報之也親親者稅不親親者不稅是亦其情也且禮専為情乎抑為文乎如専為情也則至親不可以期斷小功不可以不稅如為文也則至親之期斷小功之不稅一也曽子韓子隆於情而不及文失禮之指而疑其説雖然韓子疑之是也小功雖不稅亦不吉服而已矣記曰聞逺兄弟之喪既除喪而後聞之則袒免哭之成踊夫若是奚其吉哉然則袒免成踊其已矣乎降而無服者麻不稅是亦降而無服矣哀之以其麻哭之以其情逾月然後已其亦愈乎吉也伯髙之喪孔氏之使者未至冉子攝束帛乘馬而將之孔子曰異哉徒使我不誠於伯髙使色吏反乘繩證反正義鄭氏康成曰伯髙死時在衛未聞何國人使者謂賻賵者冉子孔子弟子冉有攝猶貸也項氏安世曰孔氏之賻賵未至冉有為之代出束帛乘馬也徒猶空也禮所以副忠信也忠信而無禮何傅乎孔疏何傅言不可傅行也忠信在心禮在外貌內無忠信禮何所施一案傅作傳孔氏頴達曰此論禮所以副忠信之事代弔非孔子本意是虛有弔禮也若重遣人更弔彌為不可故嘆之陸氏德眀曰四馬曰乘陳氏澔曰十箇為束每束五兩以四十尺帛從兩頭各卷至中每卷二丈為一箇束帛是十箇二丈今之五匹也伯髙不知何人意必與孔子厚者冉子知以財行禮不知聖人之心則於誠不於物也雖若自責之心而實則深責冉子矣伯髙死於衛赴於孔子孔子曰吾惡乎哭諸兄弟吾哭諸廟父之友吾哭諸廟門之外師吾哭諸寢朋友吾哭諸寢門之外所知吾哭諸野於野則已疏於寢則已重夫由賜也見我吾哭諸賜氏遂命子貢為之主曰為爾哭也來者拜之知伯髙而來者勿拜也赴訃同惡音烏夫音扶皇如字為於偽反正義鄭氏康成曰赴告也方氏慤曰凡有所赴者必疾趨之告喪不可緩也故亦謂之赴凡有舊恩者則使人告之惡乎哭以其交會尚新也哭兄弟父友不同處別親疏也孔疏兄弟親父友疏兄弟是先祖子孫故哭諸廟父之友與父同志非先祖之親故在門外也哭師友所知不同處別輕重也孔疏師友為重所知為輕寢已之所居師成就已故哭之在此已猶太也哭於子貢寢門之外本於恩也命子貢為主眀恩所由也知伯髙者勿拜異於正主也孔疏凡喪之正主知生知死來者悉拜今於伯髙相知而來者不拜故云異於正主陳氏祥道曰禮生於人情之所安義起於禮之所未有君子制義以稱情隆禮以循義則先王於禮之所未有者皆可適於人情而制之也伯髙見由賜故哭諸賜氏為子貢而來知生者也為伯髙而來知死者也知生者弔而不傷故拜之知死者傷而不弔故勿拜之哭於賜氏義也教子貢之拜不拜禮也通論孔氏頴逹曰哭兄弟於廟哭師於寢此殷禮若周禮則雜記云有殯聞逺兄弟之喪哭諸側室若無殯當哭諸正寢奔喪之師哭諸廟門外是也所知哭諸野依禮而哭也若不依此禮則不可故下云惡野哭者以違禮為野哭也馬氏睎孟曰兄弟出於祖內所親者故哭之廟父友聨於父外所親者故哭之廟門外師以成己之德其親視父故哭諸寢友以輔仁親視兄弟故哭諸寢門之外至於所知非朋友之比志不必同方道不必同術故有相趨者有相揖者有相問者有相見者凡此皆泛愛以交之者也故哭諸野君子行禮其審詳於哭泣之位如此者是其所以表微者與餘論吳氏澄曰兄弟之喪周之禮哭諸寢而此云哭諸廟師之喪周之禮哭諸廟門外而此云哭諸寢蓋孔子所定也孔疏皆指為殷禮孔子惡野哭者而此云所知哭諸野彼之野蓋謂國門外之郊野此之野蓋謂稍逺於寢門外空間之地無室屋處非郊野之野也曾子曰喪有疾食肉飲酒必有草木之滋焉以為薑桂之謂也滋音咨薑居良反正義鄭氏康成曰草木之滋謂增以香味為其疾不嗜食也孔氏頴達曰此論居喪有疾飲食之事方氏慤曰薑者草之滋桂者木之滋酒肉之外又有草木之滋亦慮其不勝喪而已存疑鄭氏康成曰以為薑桂之謂者為記者正曽子所云草木滋者謂薑桂也陳氏澔曰以為薑桂之謂一句乃記者釋草木之滋亦或曽子稱禮書之言而自釋之與案末句鄭陳二氏各自為説並存疑以備𠫭案周官膳夫疏云加薑桂煆治者為修不加薑桂以鹽乾之為脯是肉原有不加薑桂者此為有疾而設子夏喪其子而喪其眀曽子弔之曰吾聞之也朋友喪眀則哭之曽子哭子夏亦哭曰天乎豫之無罪也曽子怒曰商女何無罪也吾與女事夫子於洙泗之間退而老於西河之上使西河之民疑女於夫子爾罪一也喪爾親使民未有聞焉爾罪二也喪爾子喪爾明爾罪三也而曰爾何無罪與子夏投其杖而拜曰吾過矣吾過矣吾離羣而索居亦已久矣而喪息浪反下喪明喪爾明同女音汝下同洙音殊泗音四正義鄭氏康成曰眀目精也朋友喪眀則哭之痛之也子夏曰天乎怨天罰無罪也洙泗魯二水名西河龍門至華隂之地也爾罪一言其有師而不稱師罪二言居親喪無異稱罪三言隆於妻子也吾過矣謝之且服罪也羣謂同門朋友也索猶散也孔氏頴逹曰此論子夏恩隆於子之事子夏喪子曽子已弔今為喪眀往弔故曽子先哭子夏始哭云疑女於夫子者既不稱其師自為談説辨慧聰睿絶異於人使西河之民疑女道德與夫子相似也子夏魏人故居西河之上通論張子曰子夏喪眀必是親喪之時尚強壯其子之喪血氣漸衰故喪眀然曽子之責安得辭也遊氏桂曰古之人所以多君子者以教法之備而內外交修之也其居室則父兄教之其居學則師教之而平居則朋友教之惟其教之備也故其人寡過而德易以成曽子之責子夏稱其名女其人若父師焉曽子不以為嫌子夏安受其責蓋曽子正己以律人愛人以德而不以姑息君子之道固如此也姚氏舜牧曰子夏喪眀曽子責之事之有無未可知但據曽子直辭以正過子夏傾心以受責猶是古意蓋今世之所無者案王充論衡已辨子夏無失明事而鍾惺亦謂辭氣絶不似子輿大抵此篇多屬傳聞其事原不甚確夫晝居於內問其疾可也夜居於外弔之可也是故君子非有大故不宿於外非致齊也非疾也不晝夜居於內晝如又反齊側皆反正義鄭氏康成曰晝居內似有疾夜居外似有喪大故謂喪憂也孔疏兼言憂者周禮每云國有大故故皆據寇戎災禍故兼言憂既憂禍難或與臣下在外圖謀亦不暇入內也內正寢之中孔疏知非燕寢者經云非致齊不居於內致齊在正寢疾容或在內寢若危篤亦在正寢孔氏頴逹曰此論君子居處當合於禮禮斬衰及期喪喪皆中門外為廬是有喪居門外也尋常無事之時晝或入內夜或出外惟致齊與疾無問晝夜恆居於內也此齊在內祭統云君致齊於外夫人致齊於內者對夫人之寢為外內耳晝居於內問其疾不問其齊者齊是為祭之事衆所共知不須問也方氏慤曰晝為陽夜為隂君子順陽而動故晝出而接物於外順隂而靜故夜入而安身於內此禮之常晝有時居內者則以齊疾致慎而於物不敢接故也夜有時居外者則以大故致憂而於身不敢安故也通論李氏格非曰春秋傳曰君子朝以聽政晝以訪問夕以修令夜以安身夜宿於外非所以入燕息也晝居於內非所以自強也案君子動靜有常有故則反常如大故及齊疾雖非常猶之常耳非此則問且弔矣可不謹哉髙子皋之執親之喪也泣血三年未嘗見齒君子以為難見賢遍反正義鄭氏康成曰子皋孔子弟子名柴案史記弟子傳髙柴鄭人泣血言泣無聲如血出孔疏凡人涕淚必因悲聲而出若血出則不由聲今子皋悲無聲其涕亦出故云泣血有吳氏澄曰子皋雖不當哭時默思其親目亦淚如血之出也未嘗見齒言笑之微孔疏凡大笑則露齒本中笑則露齒微笑則不見齒既云泣血三年得有微笑者凡人之情有哀有樂哀至則泣血樂至則微笑也君子以為難言人不能然也通論方氏慤曰經於喪有曰居有曰執有曰為何也蓋以身言之則曰居以禮言之則曰執以事言之則曰為其實一也存疑孔氏頴逹曰此論子皋居喪過禮之事方氏慤曰君子於此固不以為是然亦不可以為非特以為難而已吳氏澄曰未嘗見齒言其未嘗微笑也衰與其不當物也寧無衰齊衰不以邊坐大功不以服勤衰七雷反下同當丁浪反正義鄭氏康成曰不當物謂精粗廣狹不應法制惡其亂禮也不邊坐服勤為褻喪服邊偏倚也孔氏頴逹曰此論衰裳升數形制必須依禮及著服不得為褻之事衰不當物此語通於五服衰喪服也當猶應也衰以表情若失禮不如無也喪服宜敬坐起必正不可著衰而偏倚也言齊衰則斬衰可知大功雖輕然亦不可著衰服為勤勞之事也齊衰不邊坐大功可也大功不勤則齊衰固不可而小功可也通論陸氏佃曰物若周書所謂朝服八十物七十物是已據此布之精粗非獨升數之不同縷數亦不同矣故曰與其不當物也寧無衰黃氏幹曰服齊衰而心貌無哀戚之實寧如不服也左傳載晉平公有卿佐之喪而奏樂飲宴膳夫屠蒯入諫曰服以將禮禮以行事事有其物物有其容今君之容非其物也以此驗之哀戚者喪禮之實也齊衰制度者外飾之容也若但有制度法則於身而無哀戚豈得合禮而為孝哉存疑張子曰齊衰不以邊坐有喪者専席而坐也案張子以専席坐解不邊之義理似可通考雜記齊衰皆居堊室三年之喪廬堊室之中不與人坐喪大記既練居堊室不與人居注云居即坐也據此齊衰無與人共坐之理鄭義似穩先王制服升之多少幅之廣狹制之長短皆有法度此云不當物似非但言其心也孔氏云衰以表情黃説亦在其中如舊解固兩義兼到也孔子之衛遇舊館人之喪入而哭之哀出使子貢説驂而賻之子貢曰於門人之喪未有所説驂説驂於舊館無乃巳重乎夫子曰豫鄉者入而哭之遇於一哀而出涕子惡夫涕之無從也小子行之説音脫驂七南反鄉許亮反涕音體正義鄭氏康成曰舊館人前日君所使舍己者孔疏知非舊所經過主人者左傳云東道主又云昔吾主於趙氏當云舊主人此云館人是君所使置館舍於己者賻助喪用也騑馬曰驂孔疏説文驂旁馬也在服馬之旁言説驂太重比於門人恩為偏頗也遇見也言舊館人恩雖輕我入哭見主人為我盡一哀是以厚恩待我我為出涕恩重宜有施惠小子行之者客行無他物可易使遂以往也孔氏頴達曰此論孔子示人行禮副忠信之事通論孔氏頴逹曰王度記云天子駕六馬諸侯四大夫三士二古毛詩云天子至大夫皆駕四孔子既為大夫若依王度記則有一驂馬若依毛詩説則有二驂馬顔淵死子哭之慟比出涕為甚而説驂於舊館惜車於顔淵者顔淵之死必嘗以物豫之顔路無厭故却之耳輔氏廣曰義之所可則説驂以贈舊館人而不吝義所不可則顔路請車而不從於此可見聖人處事之權衡餘論張子曰夫子於舊館人之喪遇主人哀而出涕於司徒敬子之喪主人不哀而哭不盡聲為生者哭也哭固有勉強者喪事不敢不勉哀甚不賻則幾於吝此夫子稱情之事可以為後世法孔子在衛有送葬者而夫子觀之曰善哉為喪乎足以為法矣小子識之子貢曰夫子何善爾也曰其往也如慕其反也如疑子貢曰豈若速反而虞乎子曰小子識之我未之能行也識式志反正義鄭氏康成曰慕謂小兒隨父母啼呼疑者哀親之在彼如不欲還然速疾也哀戚本也祭祀末也孔氏頴達曰此論喪禮以哀戚為本之事父母在前嬰兒在後恐不及之故常啼呼而隨之今親喪在前孝子在後亦恐不及故如嬰兒之慕也凡人意有所疑則倣徨不進今孝子哀親在外不知神之來否故如不欲還然故如疑也子貢之意葬既已竟神靈須安豈如速反虞祭安神乎但哀親在彼是痛切之本情反而安神是祭祀之末禮故夫子不許黃氏震曰我未能行抑已以實彼之可法也胡氏銓曰善其哀慕虞祭雖遲不害也陳氏澔曰往如慕反如疑孝子不死其親之至情也子貢以為如疑則反遲不若速反而行虞祭之禮是知其禮之常而不察其情之至矣夫子申言小子識之且曰我未之能行則此豈易言哉顔淵之喪饋祥肉孔子出受之入彈琴而后食之饋其位反正義鄭氏康成曰饋遺也彈琴以散哀也陳氏澔曰彈琴而後食者蓋以和平之聲散感傷之情也存疑程子曰受祥肉彈琴殆非聖人舉動使其哀未忘則子於是日哭則不歌不飲酒食肉以全哀况彈琴乎使其哀巳忘何必彈琴吳氏澄曰顔淵之死已兩期孔氏彈琴其常事此彈琴適在受此祥肉之後故記者云然而鄭氏以散哀釋之其實孔子不為散哀而彈琴也案鄭氏士虞禮小祥注引此文似此是期之小祥考禮經小祥祝辭曰薦此常事大祥則曰祥事是十三月不得正謂之祥故以小言之凡禮於小祥無單言祥者然以孔子之於顔淵不論大祥小祥而此祭肉來饋便覺可感彈琴散哀未為非也程子説似拘孔子與門人立拱而尚右二三子亦皆尚右孔子曰二三子之嗜學也我則有姊之喪故也二三子皆尚左拱恭勇反嗜市志反正義鄭氏康成曰二三子亦皆尚右效孔子也嗜貪也尚左復正也喪尚右右隂也吉尚左左陽也孔疏案特牲少牢吉祭皆載右胖者地道尊右士虞凶祭載左胖者反吉也孔氏頴達曰此論拱手之禮張子曰拱而尚右以右手在上也姊喪俄頃不忘以是知聖人之能敬陸氏佃曰二三子纎悉務學聖人如此蓋有不應學而學之者未有應學而不學者也存疑張子曰此禮恐非三代所有直孔子自為之案鄭氏常引古奔喪凡拜凶喪尚右手吉喪則尚左手注凶喪大功以上吉喪小功以下禮姊妹在室期既嫁降服大功則孔子之尚右禮之正也張子失考耳孔子蚤作負手曳杖消搖於門歌曰泰山其頽乎梁木其壞乎哲人其萎乎既歌而入當户而坐子貢聞之曰泰山其頽則吾將安仰梁木其壞哲人其萎則吾將安放夫子殆將病也遂趨而入夫子曰賜爾來何遲也夏后氏殯於東階之上則猶在阼也殷人殯於兩楹之間則與賔主夾之也周人殯於西階之上則猶賔之也而丘也殷人也豫疇昔之夜夢坐奠於兩楹之間夫明王不興而天下其孰能宗豫豫殆將死也蓋寢疾七日而沒蚤音早曳羊世反一作抴消搖又作逍遙頽徒回反萎與委同紆危反放方兩反阼才故反楹音盈夾又作俠古洽反則謝氏枋得云劉尚書美家藏禮記梁木其壞下有吾將安仗五字今案家語及髙麗本皆有此五字應從之正義鄭氏康成曰作起也泰山衆山所仰梁木衆木所放孔疏衆木榱桷之屬依放橫梁乃能存立放依也哲人亦衆人所仰放也以上二句喻之陳氏祥道曰泰山比德梁木比材萎病也詩云無木不萎子貢覺孔子歌意遂趨而入子言賜來何遲蓋坐則望之也又以三王之禮占已夢疇發聲昔猶前也陸氏佃曰疇昔猶言誰昔爾雅云誰昔昔也兩楹之間南面鄉眀人君聽治正坐之處孔疏覲禮天子負斧依南面顧命云牖間南鄉是天子兩楹治事之處也每日視朝雖在路門外退坐當路寢兩楹也諸侯視朝亦南面知者諸侯一國之尊論語云雍也可使南面夢坐兩楹之間而見饋食是我殷家奠殯之象以此自知將死聖人知命也孔氏頴達曰此孔子自言將死之意狀夏與周並言猶者死既無所知識孝子不忍猶以生禮待之尚在阼而為主在西階而為賔也庾蔚云東階西階平生所行禮之處故云猶兩楹間無此禮故不云猶然禮賔主敵者授受於兩楹之間兩楹又是南面聽朝之處庾云生無此禮於義疑也蓋夫子夢在兩楹饋食因無南面聽朝之事不得云則猶尊之也以有賔主二事故云與賔主夾之而已時夫子不夢凶奠但奠禮既死未葬柩仍在地未立尸主惟奠停飲食故云奠也陳氏澔曰孔子湯後故自謂殷人殷禮殯兩楹間孔子以殷人而享殷禮故知將死也自今觀之萬世王祀亦其應矣通論孔氏頴達曰莊子言聖人無夢聖人異人者神明同人者五情五情既同焉得無夢敵文王有九齡之夢武王有夢協之言存疑鄭氏康成曰負手曳杖消搖欲人之怪已也孔疏曳杖於後示不復用消搖寬縱示不能以禮自持皆是特異尋常早坐急見人也孔疏君子尋常不自當户歌而入即當户坐故云蚤坐坐不在隱處是急欲見人宗尊也今無眀王誰能尊我為人君辨正胡氏銓曰孔子傷時無眀王而道不行以死也孰能宗豫謂孰能宗師其道夫子云無臣而有臣為欺天豈肯自謂尊我以為君也吳氏澄曰聖人德容至死不變今負手曳杖消搖於門周旋中禮者當不如是聖人樂天知命視死生如晝夜豈自為歌辭以悲其死且以哲人為稱泰山梁木為比自稱若是聖人清明在躬志氣如神生死固所自知又豈待占夢而後知將死蓋是周末七十子以後之人將以尊聖人而不知適以卑之也案孔子嘗以不夢周公卜其衰此以夢卜其死亦事之容有者禮賔主敵者授受兩楹間據此則宗夫子者自是宗師其道如武王東面而立師尚父西鄉道書之言耳若如鄭氏但分土為一國之君則與賔主之禮不相應何宗之有此記雜出傳聞誠難盡信天生德文在茲聖人當危疑死生之交未嘗不舉以自任若此歌辭似淺露與聖人不類負手曳杖消搖亦非終始以禮自持之正道考曲禮君子之居恆當户鄭氏以為急欲見人故改坐於此則亦誤也孔子之喪門人疑所服子貢曰昔者夫子之喪顔淵若喪子而無服喪子路亦然請喪夫子若喪父而無服正義鄭氏康成曰疑所服者以無喪師之禮也無服不為衰也弔服加麻心喪三年孔疏喪服朋友麻知師亦麻也麻謂首絰腰帶皆以麻為之異案弔服詳小記諸侯弔國條孔氏頴達曰此論弟子為師喪制之禮依禮喪師無服然夫子聖人與凡師不等當特加喪禮故疑所服也通論丘氏濬曰若喪父而無服所謂心喪三年也心喪者身無衰麻之服心有哀戚之忱三年之間不飲酒不食肉不御內時至而哀哀至而哭充充瞿瞿至慨然廓然無以異於倚廬之下几筵之側也案此章及前章心喪三年似師無服矣下又云孔子之喪二三子皆絰而出既絰而出何云無服鄭義既主無服又恐礙絰出之文指為弔服加麻而疏家遂有弔服不得稱服之説以求合前章無服之義但天子弔服三等錫衰緦衰疑衰緦衰即緦麻也大夫以上無緦服服止於四士以緦為一服而服五賈氏喪服朋友麻疏云雜記君於卿大夫比葬不食肉比卒哭不舉樂是知未吉則凡弔服亦當依氣節而除與士緦麻三月同則大夫以上弔服即為無服而士弔服加麻三月即為有服也或云師當齊衰三月齊衰分之尊三月友之例孔子之喪公西赤為志焉飾棺牆置翣設披周也設崇殷也綢練設旐夏也置知吏反翣所甲反披彼義反綢吐刀反又直留反旐直小反正義鄭氏康成曰公西赤孔子弟子字子華志謂章識牆栁衣也牆之障柩猶垣牆障家翣以布衣木如褶與孔疏翣漢禮以木為筐廣三尺髙二尺四寸方兩角髙衣以白布畫雲氣柄長五尺如扇漢謂扇為褶也披柩行夾引棺者孔疏喪大記國君纁披鄭云設之於旁所以備傾虧也崇牙旌旗飾也孔疏旌旗之旁刻繪為崇牙殷湯以武受命恆以牙為飾也綢練以練綢旌之杠此旌葬乘車所建也孔疏既夕禮陳車門內右北面乘車載旜道車載朝服稿車載簑笠故知此旌乘車所建也凡送葬之旌經文不具既夕士禮有二旌一是銘旌初死書名於上曰某氏某之柩葬則入壙二是乘車之旌則既夕禮乘車載旜亦在柩前至柩入壙乃斂乘車之旌及道車稿車之服載於柩車而還言送形而往迎精而返也天子三旌一銘旌司常云大喪共銘旌與士禮同一廞車之旌止則建於遣車之上行則執之以從遣車至壙從眀器納之壙中案士禮既有乘車載旜則天子亦當有乘車載太常至壙仍載之而歸但禮文不具耳此其三旌也諸侯大夫無文熊氏以為大夫以上有遣車即有廞旌並有三旌也旌之旒緇布廣充幅長尋曰旐孔疏古代尚質有虞但注旄竿首未有繒帛夏漸文素錦綢杠又垂八尺之旐周文物大備旗有九等垂之以縿繫之以旃爾雅説旌旗曰素錦綢杠夫子雖殷人兼用三王禮以尊之孔氏頴達曰此論孔子之喪送葬以素為褚褚外加牆車邊置翣恐柩車傾虧而以繩左右維持之此皆周之法也其送葬乘車所建旌旗刻繒為崇牙之飾此則殷法又韜盛旌旗之竿以素錦於杠首設長尋之旐此則夏禮也蓋兼用三代之飾也通論孔氏頴達曰夫子聖人弟子尊之故葬兼三代之禮案士喪禮既非聖人亦用夏祝商祝者彼謂祝習夏禮商禮總是周禮也與夫子用三代之禮其義不同夫子用三代之禮不為僭者用其大夫之禮耳必用三代者聖人德備三代文物故也陳氏祥道曰門人以孔子有人所不可及之道故報之以人所不可行之禮是雖禮兼三代蓋亦稱情以為文而已故子貢六年於其墓孟子不以為非門人三代之厚葬君子不以為過案喪大記大夫有畫帷畫荒素錦褚纁紐玄紐黻翣畫翣披士喪禮既夕記云乘車載旜則此飾棺三者大夫士皆用之曰夏殷周者特記者推其制所自出以見其制之合古非必以此示其盛也鄭云用三王者謂用三王時所制之禮非謂用三代王者之禮也孔謂用三代大夫之禮亦想當然耳子張之喪公明儀為志焉褚幕丹質蟻結於四隅殷士也褚張呂反幕音莫蟻魚綺反正義鄭氏康成曰以丹布幕為褚葬覆棺不牆不翣畫褚之四角其文如蟻行往來相交錯蟻蚍蜉也殷之蟻結似今蛇文畫子張學於孔子效殷禮孔氏頴逹曰此論孔子弟子送葬車飾學孔子行殷禮之事公明儀子張弟子亦為曽子弟子褚覆棺之物大夫以上其形似幄士則無褚今公明儀尊敬其師故特為褚但以幕形而以丹質之布為之所以不牆不翣者用殷禮也畫蟻者殷士葬之飾也公眀儀雖尊其師祇用殷法不牆不翣特加褚幕而已通論陳氏祥道曰殷禮質周禮文質則厚文則薄子張之時既甚文矣故門人從質以救其弊此易小過用過乎儉孔子欲從先進之意也記曰掘中霤而浴毁竈以綴足及葬毁宗躐行殷道也學者行之則喪禮從殷孔門之所尚也子夏問於孔子曰居父母之仇如之何夫子曰寢苫枕干不仕弗與共天下也遇諸市朝不反兵而鬭曰請問居昆弟之仇如之何曰仕弗與共國銜君命而使雖遇之不鬭曰請問居從父昆弟之仇如之何曰不為魁主人能則執兵而陪其後仇音求苫始占反枕之鴆反朝直遙反銜音咸使色吏反從如字又才用反魁苦回反陪步回反正義鄭氏康成曰居父母之仇雖除喪居處猶若喪也干盾也弗與共天下不可與並生也不反兵謂雖適市朝不釋兵也昆弟之仇銜君命則不鬪為負而廢君命也魁猶首也天文北斗魁為首杓為末執兵陪其後為其負當成之孔疏負謂鬪而不勝孔氏頴達曰此論親疏報仇之法通論孔氏頴達曰兵器不入公門今得持兵者閽人掌中門之禁兵器但不得入中門耳其大詢衆庶在皋門之內則得入也設朝或在野外或在縣鄙鄉遂但有公事之處皆謂之朝兵者亦謂佩刀以上不必要是矛戟也曲禮云兄弟之仇不反兵此父母之仇云不反兵者父母與兄弟之仇皆不反兵此兄弟之仇據身仕為君命出使不鬪二文相互乃足從父昆弟既不為報仇魁首若主人能自報之則執兵陪助其後也方氏慤曰市朝非戰鬪之處猶不反兵則無所往而不執兵矣銜君命而使遇之不鬪則不敢以私仇妨公事曲禮言交遊之仇而不及從父昆弟此言從父昆弟之仇而不及交遊者蓋交遊之仇猶不同國則從父昆弟可知矣於從父昆弟且不為魁則於交遊不為魁可知其言互相備也案栁氏宗元駁復仇議云所謂仇者寃抑沈痛而號無告也非所謂抵罪觸法陷於大戮而曰彼殺之我乃殺之不議曲直暴寡脅弱而已周禮調人掌司萬人之仇凡殺人而義者令勿讐讐之則死有反殺者邦國交仇之春秋公羊傳曰父不受誅子復仇可也父受誅子復仇此推刃之道復仇不除害若取此以斷兩下相殺則合於禮矣此議正與經相足孔子之喪二三子皆絰而出羣居則絰出則否正義鄭氏康成曰尊師也羣謂七十二弟子相為朋友服子夏曰吾離羣而索居出謂有所之適然則凡弔服加麻者出則變服姚氏舜牧曰皆絰而出是初喪孔子時所服羣居則絰出則否是初喪以後時所服陳氏澔曰弔服加麻者出則變之今出外而不免絰所以隆師也羣者諸弟子相為朋友之服也儀禮注云朋友雖無親有同道之恩相為服緦之絰帶亦弔服也故出則免之存疑陸氏佃曰二三子蓋謂七十子知師之深者也孔子之徒三千不在七十子之列羣者也張子曰羣居則絰出則否喪常師之禮也絰而出特厚於孔子也案家語子夏曰入宜絰而居出則不絰子遊曰吾聞諸夫子朋友居則絰出則否喪所尊則絰而出可也文尤眀備則羣謂朋友鄭注甚眀吳澄謂羣字斷句未安失考耳易墓非古也易以豉反正義鄭氏康成曰易謂芟治草木孔氏頴達曰此論墓內不合芟治之事墓謂冢旁之地易謂芟草木不使荒穢不易者使有草木如丘陵然古者殷以前墓而不墳是不易治也存異姚氏舜牧曰易墓移易其墓之謂古人立墓惟求安親之體魄後世惑於堪輿家之説有思移易其墓者故記禮者特嚴為之防耳案易修治也即古不修墓之意姚疑惑於堪輿之説戒其遷徙則古從無遷墓者杜氏之葬在季氏寢階下猶不敢遷堪輿家言始於晉郭璞之葬經不特周人無此事漢人亦不知有此語也子路曰吾聞諸夫子喪禮與其哀不足而禮有餘也不若禮不足而哀有餘也祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也正義鄭氏康成曰喪主哀祭主敬孔氏頴逹曰喪禮有餘謂明器衣衾之屬多也祭禮有餘謂爼豆牲牢之屬多也陳氏澔曰有其禮而無其財則禮或有所不足哀敬則可自盡也此夫子反本之論亦寧儉寧戚之意吳氏澄曰哀敬言其心禮之本也禮言其物禮之文也禮有本有文本固為重然謂之與其謂之不若此矯世救弊之辭爾曾子弔於負夏主人既祖填池推柩而反之降婦人而后行禮從者曰禮與曾子曰夫祖者且也且胡為其不可以反宿也從者又問諸子遊曰禮與子遊曰飯於牖下小斂於戶內大斂於阼殯於客位祖於庭葬於墓所以即逺也故喪事有進而無退曾子聞之曰多矣乎豫出祖者推昌隹反又吐回反柩其久反從才用反與音餘夫音扶飯煩晚反牖旱久反斂力驗反阼才故反填池依注作奠徹正義鄭氏康成曰負夏衛地祖謂移柩車去載處為行始也推柩而返於載處榮曽子弔欲更始也填池當為奠徹聲之誤也奠徹謂徹遣奠設祖奠禮既祖而婦人降今既反柩婦人辟之復升堂矣孔疏既夕禮文以既祖柩車南出階間既空故婦人得降立階間今柩車反還階間故婦人辟之升堂婦人既已升堂柩車未回南出則婦人未合降也今乃降之者以曾子賢人欲矜誇賔於此婦人也柩無反而反之而又降婦人蓋欲矜賔於此婦人皆非也從者怪之且未定之辭孔氏頴達曰此論負夏氏葬禮所失之事案既夕禮啓殯之後柩遷於祖重先奠從柩從升自西階正柩於兩楹間鄭注云是時柩北首設奠於柩西此奠謂啓殯之奠也質眀徹去啓奠乃設遷祖之奠於柩西至日側乃卻下柩載於階間乘蜃車載訖降下遷祖之奠設於柩車西當前束時柩猶北首乃飾柩設披屬引徹去遷祖之奠遷柩嚮外而為行始謂之祖也婦人降即位於階間乃設祖奠於柩西至厥眀徹祖奠又設遣奠於柩車之西然後徹之苞牲取下體以載之遂行此是啓殯之後至柩車出之節也曽子因主人榮已不欲指其錯失既聞子遊之答自知已説之非故善服子遊多猶勝也言子遊所説出祖之事勝於我所説也方氏慤曰殯以攢於外祖以祭於行葬以藏於野自飯至葬漸而愈逺以義斷恩故有進而無退負夏之喪既祖而填池矣以曽子之弔遂推柩而反之降婦人而後行禮此從者所以疑其非禮也夫祖固有且意以祭於行始方來有繼故耳而曽子遂以為可以反宿則非也自飯於牖下至葬於墓與坊記所言皆同陳氏澔曰從者疑曽子之言故又請問於子遊也飯於牖下者尸沐浴之後以米及貝實尸之口中也時尸在室中牖下南首也士喪禮小斂衣十九稱大斂三十稱斂者包裹斂藏之也小斂在戶之內大斂出在東階未忍離其為主之位也主人奉尸斂於棺則在西階矣掘肂於西階之上肂陳也謂陳尸於坎也置棺於肂中而塗之謂之殯及啓而將葬則設祖奠於祖廟之中庭而後行自牖下而戶內而阼而客位而庭而墓皆一節逺於一節此謂有進而往無退而還也豈可推柩而反之乎多猶勝也曽子聞之方悟已説之非乃言子遊所説出祖之事勝於我之所説出祖也存異孔氏頴達曰曽子來弔正當主人祖祭之眀旦既徹祖奠設遣奠之時主人榮曽子之來乃徹去遣奠更設祖奠推柩少退而反之嚮北又遣婦人升堂至眀旦婦人從堂更降而後行遣車禮案遣車無所謂禮行遣車禮車字疑奠之訛胡氏銓曰池以竹為之衣以青布喪行之飾所謂池視重霤是也填與縣同魚以實之謂將行也鄭改填池為奠徹未詳陸氏佃曰池殯坎也既祖則填之故曰主人既填池孔叢子曰埋柩謂之肂肂坎謂之池是也案注又降婦人説本承上婦人復升堂言之謂柩反階間婦人避之升堂而主人又令之降耳孔氏前後説俱眀此獨判升降為二時又誤以曽子行弔禮為遣車禮不但非鄭注義且與降婦人説悖矣又諸經無以殯肂為池者此在既祖之後尤不應言填池也陸氏好為異説此亦其一耳又飾柩一池在祖奠前胡氏移之既祖後亦非且填亦不可訓為縣也曾子襲裘而弔子遊裼裘而弔曽子指子遊而示人曰夫夫也為習於禮者如之何其裼裘而弔也主人既小斂袒括髮子遊趨而出襲裘帶絰而入曽子曰我過矣我過矣夫夫是也裼星歷反夫夫上音扶下如字袒徒旱反括古活反正義鄭氏康成曰曽子蓋知臨喪無飾夫夫猶言此丈夫也子遊於時名為習禮故曽子疑之子遊於主人變乃變曽子遂服是善子遊言孔氏頴達曰此論弔禮得失之事凡弔喪之禮主人未變之前弔者吉服又袒去上服以露裼衣此裼衣而弔是也主人既變雖著朝服而加武以絰又掩其上服若朋友又加帶則此襲裘帶絰而入是也武吉冠之卷也加武者眀不改冠但加絰於武方氏慤曰掩而襲衣謂之襲裘露而裼衣謂之裼裘以裘在二衣之內故皆曰裘也餘論張子曰曽子子遊同弔異服必是去有先後各守所聞而往竊疑曽子子遊分契與常人殊一人失禮必面相告豈有私指示人而不告之者曽子有子言遊輩一時行禮猶有不同蓋時已禮壞樂崩故至後世文獻不足尤難行也存疑孔氏頴達曰弔者吉服羔裘玄冠緇衣素裳又袒上服以露裼衣案鄭注謂士弔服疑衰素裳當事亦辨絰庶人弔服素委貌或曰士弔素委貌加朝服鄭非之曰羔裘玄冠不以弔何朝服之有而孔言羔裘玄冠緇衣何邪子夏既除喪而見豫之琴和之而不和彈之而不成聲作而曰哀未忘也先王制禮而弗敢過也子張既除喪而見豫之琴和之而和彈之而成聲作而曰先王制禮不敢不至焉見賢遍反豫羊汝反和音禾或胡卧反忘音亡正義鄭氏康成曰見謂見於孔子作起也樂由人心二者雖情異善其俱順禮也孔氏頴逹曰此言子夏子張除喪順禮之事吳氏澄曰和之謂調弦樂由人心琴者樂事也聖人之禮以中為度二子各能損益其情而順於禮善矣通論方氏慤曰四制曰祥之日鼓素琴示民有終也先王制禮如此故二三子除喪而見孔子各子之琴胡氏銓曰孟獻子禫縣而不樂夫子善之又夫子既祥五日彈琴而不成聲則除喪如子夏可也存疑孔氏頴逹曰案家語及詩傳皆言子夏喪畢夫子與琴援琴而弦衎衎而樂閔子騫喪畢夫子與琴援琴而弦切切而哀與此不同疑彼為正蓋子夏喪親無異聞閔子騫至孝孔子善之也案子夏篤信其情摯子張務外其情浮此記於二賢頗肖至閔子切切而哀理固有之若子夏則當以此記為正喪爾親使民未有聞之説不可據也司寇惠子之喪子遊為之麻衰牡麻絰文子辭曰子辱與彌牟之弟遊又辱為之服敢辭子遊曰禮也文子退反哭子遊趨而就諸臣之位文子又辭曰子辱與彌牟之弟遊又辱為之服又辱臨其喪敢辭子遊曰固以請文子退扶適子南面而立曰子辱與彌牟之弟遊又辱為之服又辱臨其喪虎也敢不復位子遊趨而就客位為並于蒍反正義鄭氏康成曰惠子衛將軍文子彌牟之弟惠叔蘭也生虎者孔疏世本靈公生昭子郢郢生文子木及惠叔蘭蘭生虎為司寇氏彌牟木之字也惠子廢適立庶子遊為之重服以譏之孔疏子遊麻衰乃吉服十五升輕於弔服而云重服以譏之者據牡麻絰為重也弔服辨絰大如緦之絰一股而環之今用牡麻絞絰與齊衰絰同也麻衰以吉服之布為衰也孔疏詩云麻衣如雪又間傳云大祥素縞麻衣皆吉服之布也案弔服錫衰十五升去其半疑衰十四升今子遊麻衰乃吉服十五升也陸氏佃曰錫衰加麻師之服麻衰加麻朋友之服也文子辭曰辱與弟遊謝其存時也敢辭止之服也子遊名習禮文子亦以為當然未覺其所譏子遊趨就臣位深譏之也大夫之家臣位在賔後孔疏大夫之賔位在門東近北大夫之家臣位亦在門東而南近門並皆北鄉故鄭注謂在賔後也文子又辭止之在臣位也子遊再不從命文子方覺所譏親扶適子虎而辭敬子遊也南面而立則諸臣位在門內北面眀矣子遊趨就客位所譏行也孔氏頴逹曰此論子遊譏司寇惠子廢適立庶得行之事方氏慤曰牡麻即雄麻所謂枲也將軍文子之喪既除喪而后越人來弔主人深衣練冠待于廟垂涕洟子遊觀之曰將軍文氏之子其庶幾乎亡於禮者之禮也其動也中涕他計反洟音夷中竹仲反正義鄭氏康成曰主人文子之子簡子瑕也深衣練冠凶服變也待于廟受弔不迎賔也孔疏以死者遷入于廟今待弔于廟就死者案士喪禮始死為君命出小斂以後為大夫出是受弔迎賔也今以除服受弔故不迎或曰此非己君之命以敵禮待之故不迎也中禮之變陸氏德眀曰自目曰涕自鼻曰洟孔氏頴逹曰此論居喪得中禮之變越人逺國之人深衣是既祥之麻衣制如深衣練冠未祥之練冠不用既祥之縞冠以始來弔也始死至練祥來弔是有文之禮祥後來弔是無文之禮子遊言文氏之子庶幾能行無文之禮其舉動中於禮之變節也陳氏祥道曰文子於其非喪非無喪之時能處之以非喪非無喪之禮中乎有於禮者之禮未足以為善中乎亡於禮者之禮則善矣陳氏澔曰將軍文子即彌牟也主人文子之子也禮無弔人於除喪之後者亦無除喪後受人之弔者深衣吉凶可以通用小祥練服之冠不純吉亦不純凶廟者神主之所在待而不迎受弔之禮也不哭而垂涕哭之時已過而哀之情未忘也庶幾近也子遊善其處禮之變故曰文氏之子其近於禮乎雖無此禮而為之禮其舉動皆中節矣通論孔氏頴達曰緣之以布曰麻衣緣之以素曰長衣緣之以采曰深衣雜記云既祥雖不當縞者必縞然後反服注云有以喪事贈賵來者雖不及時猶變服祥祭之服以受之重其禮也此謂曽來弔祥後為喪事更來者故縞冠衛將軍文子之子則於始來者故練冠也姚氏舜牧曰夫禮雖先王未之有可以義起識得亡於禮者之禮便知有於禮者有時乎其不必拘故曰非禮之禮非義之義大人弗為幼名冠字五十以伯仲死諡周道也絰也者實也掘中霤而浴毁竈以綴足及葬毁宗躐行出于大門殷道也學者行之冠古亂反掘求月反又求勿反霤力救反綴竹力反又竹衛反躐良徹反正義鄭氏康成曰絰所以表哀戚掘中霤毁竈毁宗眀不復有事於此周人浴不掘中霤葬不毁宗躐行毁宗毁廟門之西而出行神之位在廟門之外學於孔子者行之效殷禮也孔氏頴達曰此論殷周禮異之事人始生三月而加名故云幼名年二十有為人父之道同等不可復呼其名故冠而加字年至五十耆艾轉尊又舍其二十之字直以伯仲别之至死而加諡士冠禮已有伯某甫仲叔季者彼時雖云伯仲皆配某甫而言至五十直呼伯仲爾此皆周道殷以上生號仍為死稱更無別諡堯舜禹湯是也中霤室中也死而掘室中之地作坎一則言此室於死者無用二則以牀架坎上尸於牀上浴令水入坎中也毁竈綴足者一則示死無復飲食二則恐死人冷強足辟戾不可著屨故用毁竈之甓連綴其足令直可著屨也毁宗毁廟也殷人殯於廟至葬出毁廟門西邊墻而出於大門所以然者一則眀此廟於死者無事故毁之方氏慤曰示不復祭享於此二則行神之位在廟門西邊當所毁宗之外若生時出行則為壇幣告行神告竟車躐行壇上而出使道中安穩今柩行向毁宗處出仍得躐此行壇如生時也方氏慤曰絰之所用男子重首婦人重腰皆用其所重非徒為虛名而已故曰絰也者實也通論葉氏夢得曰子生三月父名之至冠字而不名所以尊名也五十為大夫有位於朝但曰伯仲而不字所以尊字也禮固有次第士冠禮既冠而字曰伯某甫仲叔季惟其所當伯仲皆在上所以為字者在下如伯牛仲弓叔肸季友之類是也至於五十為大夫但言伯仲而冠之以氏伯仲皆在下如召伯南仲榮叔南季之類是也孔子諸弟子相字未有以伯仲在下者蓋皆不為大夫也孔子雖為大夫但稱仲尼哀公誄之曰尼父仲山甫尹吉甫皆周之卿士而山甫吉甫猶通稱或者亦以為重與陸氏佃曰內則曰五十命為大夫服官政五十以伯仲宜為大夫矣故此以大夫之法記之大夫死諡周道也存疑方氏慤曰生以文為尚故名字之制學禮者行周道死以質為尚故喪葬之制學禮者行殷道存異賈氏公彥曰殷質二十為字之時兼伯仲叔季呼之周文二十為字之時未呼伯仲至五十乃加而呼之故檀弓云五十以伯仲周道也是呼伯仲之時兼二十為字而言若孔子生於周代從周禮呼尼父至五十去甫以尼配仲而呼之曰仲尼是也若二十以後死雖未滿五十即呼伯仲如慶父乃莊公之弟桓六年莊公生閔二年慶父死時未五十號曰共仲是死時雖未五十得呼仲叔季也辨正朱子曰古者初冠而字便曰伯某父仲某父五十稱伯仲除下兩字猶今人不敢斥尊者呼為幾丈之類今看儀禮賈公彥疏却云既冠之時權以此三字加之實未嘗稱到五十方始稱此三字某初疑其不然取禮記看孔疏中正如前説疑孔疏是子栁之母死子碩請具子栁曰何以哉子碩曰請粥庶弟之母子栁曰如之何其粥人之母以葬其母也不可既葬子碩欲以賻布之餘具祭器子栁曰不可吾聞之也君子不家於喪請班諸兄弟之貧者碩音石粥又作鬻音育正義鄭氏康成曰具葬之器用也何以哉言無其財也粥謂嫁之妾賤取之曰買子栁不從忠恕也賻布謂古者以錢為泉布所以通布貨財孔疏言其流通如水泉不家於喪惡因死者以為利也班諸貧者以分死者所矜也祿多則與鄰里鄉黨孔氏頴達曰此論不粥人之母及因死為利之事陳氏澔曰不粥庶弟之母者義也班兄弟之貧者仁也夫粥庶母以治喪則乏財可知而不家於喪之言確然不易古人之安貧守禮蓋如此通論方氏慤曰無財不可以為恱豈宜粥人之母以葬其親乎無田祿者不設祭器豈宜以賻布之餘具之乎此子栁所以不從子碩之請也存疑鄭氏康成曰子栁魯叔仲皮之子子碩兄孔疏下叔仲皮之子子栁故知子栁是叔仲皮之子子碩請粥庶弟之母故知子碩兄也案此注與疏不確子栁是其字後叔仲皮學子栁非皮之子名栁也君子曰謀人之軍師敗則死之謀人之邦邑危則亡之正義陳氏祥道曰主危臣辱主辱臣死故謀人之軍師敗則死之社稷存則與存社稷亡則與亡故謀人之邦邑危則亡之思其敗之死則無輕軍師思其危之亡則無輕邦邑應氏鏞曰衆死而義不忍獨生焉得而不死國危而身不可獨存焉得而不亡存疑鄭氏康成曰利已亡衆非忠也言亡之者雖辟賢非義退也吳氏澄曰亡去也謂去其位也國亡則臣身當與俱亡今方危則他人固有能安之者去位足矣案則死則亡語意責重人臣非以尚可亡去開人偷生幸免法也朱子曰君子見危授命仕危邦者無可去之義則謀人之邦邑而至於危可以一避位塞責邪公叔文子升於瑕丘蘧伯玉從文子曰樂哉斯丘也死則我欲葬焉蘧伯玉曰吾子樂之則瑗請前蘧又作璩其魚反從才用反又如字樂音洛下同瑗于卷反又于願反正義鄭氏康成曰二子衛大夫文子獻公之孫名拔孔疏案世本獻公生成子當當生文子拔拔生术為公叔氏瑗伯玉名請前刺其欲害人良田也方氏慤曰葬之為禮蓋生者之所送終非死者之所豫擇擇之且不可又況徇己之樂而忘人之害乎此蘧伯玉有請前之譏也存疑吳氏澄曰前猶云豫先也請前請為豫定其所若徇其意實譏非之所謂巽與之言也辨人有其母死而孺子泣者孔子曰哀則哀矣而難為繼也夫禮為可傳也為可繼也故哭踊有節辨皮彥反孺而注反傳直専反正義鄭氏康成曰孺子泣言聲無節陳氏澔曰其聲無長短髙下之節作案言當有難繼失禮中也孔疏謂此哀之深後人無能繼學之者陳氏澔曰辨地名案即魯之卞邑通論孔氏頴達曰雜記曽申問於曽子曰哭父母有常聲乎曰中路嬰兒失其母何常聲之有與此違者曽子所言是始死之時悲哀志悶未可為節此之所言在襲斂之後可以禮制也案孺慕發於心而先王必以禮節之者恐毁不勝喪比於不慈不孝耳學者守禮仍有惻怛肫摯之意寓於其間則善矣叔孫武叔之母死既小斂舉者出戶句出戶袒且投其冠括髮子遊曰知禮古本兩出户陳澔從馮氏改上戶為尸非是正義鄭氏康成曰武叔公子牙之六世孫名州仇孔疏世本桓公生僖叔牙牙生戴伯茲茲生莊叔得臣臣生穆叔豹豹生昭子婼婼生成子不敢敢生武叔州仇是公子牙六世孫也毁孔子者尸出戶乃變服失哀節孔疏士喪禮卒斂徹帷主人西面馮尸踊無算括髮袒下云士舉男女奉尸侇于堂喪大記亦云卒小斂主人袒説髦括髮以麻下云奉尸侇于堂是小斂在括髮之後奉尸侇于堂之前主人為欲奉尸故袒而括髮今武叔於奉尸侇之後乃投冠括髮故云失哀節冠素委貌孔疏雜記云小斂環絰公大夫士一也注云士素委貌大夫以上素爵辨而加此絰焉武叔是諸侯大夫當天子之士故云冠素委貌子遊曰知禮嗤之也孔疏子遊是習禮之人見武叔失禮反謂之知禮故知嗤之也案上出戶謂舉尸者下出戶謂武叔袒括髮以奉尸也斂者舉尸出戶而武叔猶冠隨以出戶急思括髮乃投其冠匆遽失節之甚武叔平日好臧否人故子遊反言以嗤之扶君卜人師扶右射人師扶左君薨以是舉卜依注音僕正義鄭氏康成曰扶君謂君疾時也孔疏知君疾時者以下言君薨以是舉故知也卜當為僕聲之誤也孔疏知當為僕者以卜人無正君之事案周禮大僕職掌正王之服位射人職掌國之三公孤卿大夫之位及王舉動悉隨王故知也僕人射人皆平生時贊正君服位者薨以是舉不忍變也周禮射人大喪與僕人遷尸孔氏頴達曰此論君薨遷尸之人陸氏德眀曰師長也謂大僕也或無師字者非也方氏慤曰扶君舉尸固非二人之所能而二官各以下大夫二人為之且有小臣上下之士非一故以師言之通論遊氏桂曰傳曰男子不死于婦人之手春秋書人君不薨于路寢則為死不以道故君之疾也以在寢在朝之正服位而從君者扶持之薨則外廷之人共治其喪疾則外廷之人共治其疾所以防微杜漸致謹於疾病之際以正其死道也然此非一日之故蓋古者之制婦官序於內而人君哀樂之事得其節僕人射人舉職於外而人君起居之節得其宜故九嬪世婦之屬掌以時御敘於王所宫中之治總以大宰參以六卿人君出入起居常從事於禮故疾病死喪內之人不得與焉此非承先王禮教之隆有不能然者餘論朱子曰後世僕射官名用此義也或以射音夜誤存疑應氏鏞曰王前巫後史卜筮皆在左右則卜人師扶右乃其切近之職所當然似不必改案卜筮雖在左右而周禮遷尸只有僕人射人當以周禮為是士喪禮云士舉男女奉尸侇于堂則舉者不獨二人陸氏以師為長方氏以師為衆君薨必長執其事而衆助之若大夫以下則長但涖之而衆執其事也從母之夫舅之妻二夫人相為服君子未之言也或曰同爨緦從才用反夫人之夫音扶爨七亂反正義吳氏澄曰禮為從母服小功五月而從母之夫則無服為舅服緦麻三月而舅之妻則無服時有妻之姊妹之子依從母家同居者又有夫之甥依舅家同居者念其鞠育之恩故一為從母之夫服一為舅之妻服二夫人謂妻之姊妹之子與從母之夫也謂夫之甥與舅之妻也見其二家有此二人者相為服然禮之所無故曰君子未之言也又記或人之言以為有同居而食之恩則雖禮之所無而可以義起此服也陳氏澔曰有喪而無文可據於是為同爨緦之説以處之亦原其情之不可已而極禮之變焉耳存異鄭氏康成曰二夫人猶言此二人也時有此二人同居孔疏知同居者以下云同爨緦死相為服者孔疏此相為服何胤以為弔服加麻如朋友然非也凡弔服不得稱服故上云喪夫子若喪父而無服此據緦麻正衰非弔服也甥居外家而非之孔疏以言從母及舅皆是外甥稱謂之辭故知甥也來居在外姓舅氏之家見有此事而非之辨正張子曰甥自幼居從母之家或舅之家孤稚恩養直如父母不可無服所以為此服也非是從母之夫與舅之妻相對乃甥為二人者服也案不言從母之夫與從母姊妹之子舅之妻與舅女兄弟之子避文冗也相為服報服也禮舅之妻從母之夫皆無服唐貞觀中加舅服小功開元中又加舅妻服緦堂姨舅袒免五代又加姨舅大功宋又加甥婦緦報朱子曰姊妹於兄弟未嫁期嫁大功姊妹雖嫁不降故從母重於舅又曰外祖父母止小功則舅與從母宜緦魏徴反加舅服過矣案父黨之服由父而推故伯叔重於姑母黨之服由母而推故從母重於舅各有義焉無可加損也喪事欲其縱縱爾吉事欲其折折爾故喪事雖遽不陵節吉事雖止不怠故騷騷爾則野鼎鼎爾則小人君子蓋猶猶爾縱依注音總折大兮反騷素刀反正義鄭氏康成曰縱讀如總領之總總總趨事貌折折安舒貌詩云好人提提陵躐也止立俟事時也怠惰也騷騷謂大疾鼎鼎謂大舒猶猶疾舒之中孔氏頴達曰此論吉凶趨容之事凶事欲疾吉事欲舒但喪事雖促遽亦當有常不得陵越喪禮之節吉事雖有止住之時然不當怠惰寬慢故喪事騷騷過為急疾則如田野之人急切無禮吉事鼎鼎不自嚴敬則如小人形體寬慢君子之人於喪事得疾之中於吉事得舒之中蓋行禮之時眀間法則志意猶猶然猶猶曉達之貌存疑胡氏銓曰縱縱不修飾貌有遽意折折爾雅詳貌有止意存異黃氏震曰縱縱戒其遽而放之舒也折折懲其緩而約之疾也案喪事迫易至陵節吉事舒故易怠緩縱縱則直而密折折則曲而當猶猶則隨其緩急而無不與事物相肖也喪具君子恥具一日二日而可為也者君子弗為也正義鄭氏康成曰喪具棺衣之屬恥具辟不懷也孔疏宣八年左傳云卜葬先逺日辟不懷也懷思也謂不思念其親今送死百物未即辦具是辟不思親之事也一二日可為謂絞襟衾冒孔氏頴逹曰此論孝子備喪具之事喪具棺則預造衣亦漸制但不一時頓具故王制云六十嵗制七十時制八十月制九十日修唯絞襟衾冒死而後制是也陳氏澔曰恥於早為之而畢具嫌其不以久生期其親也喪服兄弟之子猶子也蓋引而進之也嫂叔之無服也蓋推而逺之也姑姊妹之薄也蓋有受我而厚之者也逺于萬反正義鄭氏康成曰或引或推重親逺別也姑姊妹大功夫為妻期欲其一心於厚之者秦氏繼宗曰婦人既嫁從夫無二乃心亦是此義何氏晏曰男女相為服不有骨肉之親則有尊卑之異也叔嫂親非骨肉不異尊卑恐有混交之失故推使無服也孔氏頴逹曰兄弟之子期姑姊妹出適大功皆喪服經文嫂叔無服喪服傳文己子服期兄弟之子當降服大功今乃服期蓋牽引進之同於己子也昆弟相為服期其妻應降服大功今乃無服是推使疏逺之也姑姊妹未嫁時為之厚出嫁後為之薄者蓋有夫壻受我之厚而重親之也存疑魏氏徴曰制服緣恩之厚薄也或有長年之嫂遇孩童之叔劬勞鞠養情若所生譬同居之繼父方他人之同爨情義之深淺寧可同日語哉當其生也愛之同於骨肉及其死也則推而逺之求之本源深所未諭生而共居死同行路重其生而輕其死厚其始而薄其終稱情立文其義安在議請小功五月彭氏絲曰魏氏所舉正與韓愈自幼育於嫂相合程子曰嫂叔古之所以無服者只為無屬其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也故叔母伯母之服與叔父伯父同兄弟之子之婦服與兄弟之子同若兄弟則己之屬也難以妻道屬其嫂此古者所以無服以義理推不去也今之有服亦是豈有同居之親而無服者朱子曰守禮經固好然亦有禮之權處蓋言推而逺之便是宜有服因婦道母道無可安排故推而逺之若果鞠育於嫂他心自不能已如何無服得吳氏澄曰人有嫂之喪者其父母為之服大功小功其妻為之服小功其子為之服齊衰不杖期豈有己身立於父母妻子之間而獨同於無喪之人者哉雖曰無服亦如弟子為師若喪父而無服孔子為顔淵若喪子而無服爾又如父在為母雖期而釋服猶申心喪至於再期嫂叔無屬不制服當弔服加麻不飲酒不食肉不處內如弟子為師父在為母之例其父母妻子之服既除然後吉服如無喪之人也推而逺之者文雖殺而情未嘗不隆魏鄭公所議不眀古聖人情文隆殺之深意程子以為無屬是矣而又謂同居豈可無服則亦未免於徇俗也薄猶輕也厚猶重也姑姊妹未嫁皆服齊衰不杖期既嫁則降服大功蓋以既嫁有夫則彼夫為妻齊衰杖期與父在為母之服同是厚之也既有厚之者則在我骨肉之恩可以減殺故薄輕其服而降為大功也案儀禮正經無叔嫂服其記言夫之所為兄弟服妻降一等是古報服大功矣宋初增嫂叔為大功後復降小功黃氏幹修儀禮通纂則併儀禮記刪之欽定禮記義疏卷十
