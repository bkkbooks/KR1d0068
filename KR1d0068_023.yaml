body:
  text: 月令第六之四季夏之月日在柳昏火中旦奎中夏小正六月初昏斗柄正在上日在柳淮南子作招搖指未火吕氏春秋淮南子作心正義鄭氏康成曰季夏者日月㑹於鶉火孔疏鶉火午次之號而斗建未之辰也髙氏誘曰柳南方宿周之分野孔氏頴達曰六月建未未昧也昧曖于未三統厯六月節日在柳九度昏尾七度中旦婁八度中六月中日在張三度昏箕三度中旦胃十四度中元嘉厯六月節日在井三十二度昏房四度中旦東壁八度中六月中日在栁十二度昏尾八度中旦奎十二度中案此謂小暑後三十日也栁南方土宿八星廣十四度月建未而日在午未與午合也火大火心星也東方隂宿在天為大辰三星中星髙起為帝座左一星為太子右一星為庶子皆稍卑明堂之位也奎見仲春唐月令六月節日在東井昏氐中暁東壁中斗建未位之初六月中日在栁昏尾中暁奎中斗建未位之中通書小暑日在井十六度大暑日在鬼一度今時憲書小暑日在井十二度大暑日在井二十七度古法鶉火初栁九度終張十六度今法初井二十八度終星六度其日丙丁其帝炎帝其神祝融其蟲羽其音徴律中林鍾淮南子作百鍾正義鄭氏康成曰林鍾者黄鍾之所生三分去一律長六寸季夏氣至則林鍾之律應周語曰林鍾和展百事俾莫不任肅純恪孔疏肅速純大恪敬言時務和審百事無有詭詐使莫不任其職事速其功而大敬其職漢志林君也隂氣受任助蕤賓君主種物使長大楙盛也班氏固曰林衆鍾種也萬物成熟種類多也髙氏誘曰林大鍾聚也萬物大聚又曰林盛也陽始衰而猶盛隂繼起長養萬物衆聚而成之韋氏昭曰六月林鍾坤初六也管長六寸于正聲為徴陳氏祥道曰林鍾建未之律萬物之茂止于此矣故曰林鍾朱子曰林鍾正律六寸變律五寸八分二釐四毫一絲一忽三初存疑王氏喬桂曰五月當午之中于卦為姤陽之極也陽歸漸損故六月林鍾八寸四分陽尚隆也故止降六分其數七其味苦其臭焦其祀竈祭先肺溫風始至蟋蟀居壁鷹乃學習腐草為螢蟋音悉蟀音率螢釋文作熒户扃反又吕氏春秋作凉風始至蟋蟀居宇腐草為蚈夏小正五月鳩化為鷹六月鷹始鷙正義鄭氏康成曰皆記時候也鷹學習謂攫搏也夏小正曰六月鷹始摯案本亦作鷙螢飛蟲螢火也髙氏誘曰夏至後四十六日立秋故曰凉風始至蟋蟀蜻􅖹爾雅謂之蛬隂氣應故居宇鳴以促織秋節將至故鷹順殺氣自習肄為將搏擊也蚈馬蚿也幽州謂之秦渠亦曰螢火李氏廵曰螢火夜飛腹下有光如火故又名即照孔氏頴達曰蟋蟀蛬也生於土中季夏羽翼稍成未能逺飛但居其壁郭以為促織蔡以為斯螽皆非于時二陰既起鷹感隂氣乃有殺心腐草得暑濕之氣故為螢不稱化者螢不復為腐草也馬氏睎孟曰温風至天地之仁氣極矣薰然其和也蟋蟀居壁隂始矣而猶未動乎外也鷹乃學習則隂浸長而始鷙矣其學習也亦其性所有也腐草為螢木氣之餘乗火而化也方氏慤曰效彼為之之謂學因性所有之謂習應氏鏞曰殺氣未肅而鷙猛之鳥已習於擊迎殺氣之㣲也凉風未至而鳴隂之物已居於壁迎凉風之微也通論方氏慤曰天地温厚之氣始於東北而盛於東南故季夏溫風始至也八風坐八方以應八節月令所言特記時而已故略也東風即條風温風即景風盲風即閶闔風然景風至以夏至而此言於季夏陽饒之意也天子居明堂右个乗朱輅駕赤駵載赤旂衣朱衣服赤玉食菽與雞其器髙以粗正義鄭氏康成曰明堂右个南堂西偏也張氏虙曰當未上六月位也命漁師伐蛟取鼉登龜取黿唐月令屬季秋正義鄭氏康成曰四者甲類秋乃堅成孔疏明不獨季夏取案蛟本鱗蟲言甲者從其多者言之也周禮曰秋獻龜魚孔疏䱷人職文又曰凡取龜用秋時孔疏龜人職文此夏之秋也作月令者以為此秋據周之時似誤孔疏作記之人謂此禮是周之八月當夏之六月故誤書于此言記之者非也蛟言伐以其有兵衛也龜言登尊之也黿鼉言取羞物賤也鼉皮又可以冒鼓今月令漁師為榜人髙氏誘曰漁師掌魚官鼉皮可冒鼓詩鼉鼓韸韸黿可為羮傳曰鄭靈公不與公子家黿羮皆不􅊣人易得故言取蛟有鱗甲能害人難得故言伐龜神可決吉凶入宗廟尊之故言登也方氏慤曰命漁師于季夏欲以盛暑之氣煖其皮甲可耐久也陸氏佃曰君子退隂而進陽言于此抑殺氣焉存疑孔氏頴達曰不言是月煩細之事且非止一月所為也命澤人納材葦葦于鬼反正義鄭氏康成曰蒲葦之屬此時柔韌可取作噐物也髙氏誘曰澤人掌澤之官方氏慤曰葦荻之小者可緯以為薄必擇其材者故以材言之是月也命四監大合百縣之秩芻以養犧牲令民無不咸出其力以共皇天上帝名山大川四方之神以祠宗廟社稷之靈以為民祈福共音供為于蒍反正義鄭氏康成曰四監主山林川澤之官孔疏周禮有山虞澤虞林衡川衡秩芻出于山林百縣鄉遂之屬地有山林川澤者也孔疏知非諸侯者取芻養牲不可太逺也秩常也百縣給國養犧牲之芻多少有常民皆當出力為艾之今月令四為田孔疏令田監大合秩芻牲以供祀神靈為民求福明使民艾芻是不虚取也孔疏民皆蒙福是不虚役民力方氏慤曰神降而為靈言神尊之言靈親之天帝山川四方外事故言神宗廟社稷内事故言靈馬氏睎孟曰四監四郊各以監受其入也百縣甸服之内所使納總銍秸服者也既卜而芻謂之牲将殺而告謂之犧祭祀非獨共也謂民力之普存也民神之主也先成民而後致力於神豈私福哉凡以為民也存異髙氏誘曰周制天子畿内方千里分為百縣有四郡郡各一大夫監之故春秋傳曰上大夫受縣下大夫受郡至秦始皇兼天下初置三十六郡乃以郡統縣此四監監四郡之大夫也徐氏師曾曰此亦秦制周人郊廟大祭祀不言祈案周禮惟甸師以薪蒸役事委人供薪芻則秩芻非虞衡所供鄭云今月令為田蓋甸即田也以為民祈福言王者之心無不為民耳非必有祈禱之文也徐説未確髙説則又近于誣矣是月也命婦官染采黼黻文章必以法故無或差貸黒黄蒼赤莫不質良毋敢詐偽以給郊廟祭祀之服以為旗章以别貴賤等給之度貸音二又他得反等給吕氏春秋作等級正義鄭氏康成曰婦官染人也孔疏周禮婦官有典婦功典絲枲染人等此據染采故知染人采五色孔疏未用為采已用為色散文則通質正也良善也所用染者當得眞采正善也旗章旌旗及章識也孔疏周禮司常九旗是也章識周禮司常官府象其事州里象其名家象其號是也孔氏頴達曰白與黑謂之黼黑與青謂之黻青與赤謂之文赤與白謂之章以此月染之者以其盛暑濕染帛為宜也此是秦法若周則於夏豫浸治染纁𤣥之石至秋乃總染五色上云黼黻文章下云黑黄蒼赤互相備也旗章詩織文鳥章是也方氏慤曰有所守謂之法有所因謂之故差兩相雜貸兩相代五色不及白以所受者為本也等給各隨宜而度之故言度若天子龍衮諸侯黼所以别衣服貴賤等給之度也王建大常諸侯建旂所以别旌旗等給之度也凡此順文明之時故染文明之色陸氏佃曰此時繅之既畢於是命之染采祭義所云遂朱綠𤣥黄之是也凡質美則無所用僞用僞則質不良矣張氏虙曰黼黻文章見於冕服其事為重法古人所創故古人所用一或差貸則為不衷之服矣黑黄蒼赤泛言五采又非冕服比質取其實良取其善一有詐偽則邪慝之物也且不特用之于服也以為旗章而貴賤等給皆從此定可不謹哉徐氏師曽曰祭服旗章之等皆以此别之所以防僭亂也存疑方氏慤曰衣服旌旗貴者從隆賤者從殺故言等隆非有餘殺非不足故言給陸氏佃曰婦官若九嬪世婦案注以婦官為染人蓋本周官太宰言之陸説未當案染采乃染絲非染帛也染其絲而以兩色間織之則為黼黻文章象四隅也以一色專織之則為黑黄蒼赤象五方也間織則恐其過巧故必以法故而無或差貸專織則恐其飾美故必以質良而無敢詐偽祭服皆用專色為旗章四正亦用正色四隅則用雜色為多如東之南則青多於赤南之東則赤多於青也等給當依吕氏作等級方説巧而曲是月也樹木方盛乃命虞人入山行木毋有斬伐行下孟反正義鄭氏康成曰為其未堅韌也髙氏誘曰虞人掌山林之官行察也廵視山川禁民不得斬伐方氏慤曰斬則絶之伐則傷之也毋有斬伐慮傷方盛之氣也案毋斬伐順長養也又凡木春夏斬者多蠧不可以興土功不可以合諸侯不可以起兵動衆毋舉大事以搖養氣毋𤼵令而待以妨神農之事也水潦盛昌神農将持功舉大事則有天殃待吕氏春秋作干時神農将持功吕氏春秋作命神農将廵功正義鄭氏康成曰不可以興土功土将用事氣欲静也孔疏土雖寄王四時而夏火秋金之間土專用事以相生大事興徭役以有為𤼵令而待謂出徭役之令以預驚民也民驚則心動是􅊣土神之氣土神稱曰神農者以其主于稼穡孔疏神農土神也土能吐生萬物成其農事故曰神農若于此時逆令召民民心驚動是妨土神之氣事土以受天雨澤安静養物為功動之則致􅊣也孔疏非惟神農罪之天亦殃罰之髙氏誘曰土功築臺穿池合諸侯造盟會也不舉兵衆息封疆也大事征伐也無發干時之令畜聚人功以妨􅊣神農耘耨之事昔炎帝神農能殖嘉穀神而化之號為神農後世因名其官為神農因水潦盛昌命神農於此修行堰畝脩治之功於此時或舉大事妨􅊣農事天殃之矣孔氏頴達曰蔡邕云神農則炎帝非鄭義也六月主未未値東井故水潦盛昌地功由天若動地則致干災􅊣方氏慤曰興土功合諸侯興兵動衆皆大事也舉大事則人不安且并春生而夏養之氣振蕩之矣神農者農之神興農功而用之於明者人持農功而主之於幽者神水潦盛昌則百穀被其澤而向于成是神農将守其成也苟舉大事以妨之則是違神逆天而天之災適當之矣徐氏師曾曰神者天之功用違神則違天矣案蔡以神農為炎帝鄭以神農為土神髙以神農為農官義皆可通而皆不甚確今細玩其文但謂不可以大事妨農事耳不曰農事而曰神農之事重之故神之天生民而穀以養之稼穡之事非天事乎人君知此則敬民重農皆天鑒之不敢輕用民力以獲罪于天矣是月也土潤溽暑大雨時行燒薙行水利以殺草如以熱湯可以糞田疇可以美土疆溽或作辱音同薙他計反正義鄭氏康成曰潤溽謂塗濕也薙謂廹地芟草也案廹地本俱作廹也非此謂欲稼莱地先薙其草草乾燒之至此月大雨流水潦畜其中則草死不復生而地美可稼也薙氏掌殺草其職曰夏日至而薙之又曰如欲其化也則以水火變之孔疏周禮薙氏職春始生而萌之夏日至而夷之秋繩而芟之冬日至而耜之注萌耕反其萌芽也夷以鈎䥥迫地芟之也含實曰繩芟其繩則實不熟耜以耜測凍土剗之也水火變之先以火焚其草後以浸漬之變此塉地為肥土潤溽膏澤易行也糞美互文耳土疆强㯺之地孔疏强是不軟㯺是㙤闕髙氏誘曰夏至後三十日大暑至疆界畔也孔氏頴達曰六月建未未値井井主水土既潤溽又大雨應時而行五月夏至先芟草暴之至六月合燒之又於所燒田中壅遏蓄水漬之即草根爛死是時日暴水熱沫沸如湯也蔡云穀田曰田麻田曰疇言爛草可以糞田使肥也方氏慤曰土為火所蒸故潤潤則水勝火火反溽焉糞田疇美土疆甚言殺草之利也陸氏佃曰糞言能厚其力美言能善其性吳氏澄曰田疇謂熟耕而其田有界域者土疆謂耕難而其土磽确者季夏行春令則穀實鮮落國多風欬民乃遷徙行秋令則丘隰水潦禾稼不熟乃多女災行冬令則風寒不時鷹隼蚤鷙四鄙入保欬苦代反隼息允反鷙音至又淮南子下有六月官少内其樹梓正義鄭氏康成曰行春令則辰氣乘之行秋令則戌氣乗之行冬令則丑氣乘之也未屬㢲孔疏易林云震主庚子午㢲主辛丑未坎主戊寅申離主己卯酉艮主丙辰戌兌主丁已亥是未屬㢲也辰又在㢲位二氣相亂為􅊣故多風遷徙象風轉移物也九月宿直奎奎為溝瀆與此月大雨并而髙下皆水禾稼不登傷于水也女災含妊之類敗也鷹隼蚤鷙得疾厲之氣入保象鳥雀之走竄也都邑之城曰保髙氏誘曰春木性墮落故穀落民病多欬土氣勝也多遷徙陽布散也髙下水潦象金氣也故殺禾稼使不成熟金干火故多女災生子不育也冬隂閉故風寒不節鷹隼早鷙象冬氣殺戮四界之民畏宼賊之来故入城郭自保守也方氏慤曰自下升上曰遷自此適彼曰徙張氏虙曰夏季穀垂成矣今行春令氣不足以成之所以鮮而落非衰而落也肺受風故欬春主發散人情亦然故遷徙水潦金生水也朱氏申曰鮮而落生氣過盛也女災隂氣過盛反傷之也風寒感隆冬之氣也陳氏澔曰行春令為辰土之氣所應行秋令為戍土之氣所應行冬令為丑土之氣所應也中央土正義鄭氏康成曰火休而盛徳在土也孔氏頴達曰四時五行同是天地所生而四時是氣五行是物氣是輕虚所以麗天物體質礙所以屬地四時係天春夏秋冬各分居九十日木配春火配夏秋配金冬配水土則毎時寄王十八日而其位本在未于季夏之末火金之間故在此陳之土所以在中央者以其包載四行含養萬物為萬物之主也方氏慤曰木生火火生土土生金金生水其序適居中央若周人兆黄帝于南郊迎土氣于季夏亦以是爾厯于立秋前言土王用事即其事也張子曰土固多于四者然其運行則均同耳寄王之説未安也以易言之八卦之位坤在西南致養之地在離火兌金之間是以在季夏之末彭氏廉夫曰土為木火金水之主無乎不在三百六十日無日不然亦猶冢宰列六卿中實為六卿之長無所不統也案自天而言則地在天中即土也自地而言則木火金水皆載其上地道之所以承天不可以一方一月言也自天干而言則戊已居中且在火金之間以遞相生也自地支而言則辰戌丑未居四方之隅木火金水無不歸於土此即代終之義而寄王之説所自起不妨以方舉以日計也五行之説多途要其理原一致爾其日戊已正義鄭氏康成曰戊之言茂也已之言起也日之行四時之間從黄道月為之佐至此萬物皆枝葉茂盛其含秀者抑屈而起故因以為日名焉孔氏頴達曰律歴志云戊茂已理也豐茂于戊理紀于已陳氏祥道曰戊數五已數九同于為土為信張氏虙曰五行播于四時戊己屬中央其帝黄帝其神后土正義鄭氏康成曰此黄精之君土官之神自古以来著徳立功者也黄帝軒轅氏也髙氏誘曰黄帝少典之子以土徳王天下號軒轅氏死為中央之帝后土官名共工氏子句龍能平九土死為后土之神孔氏頴達曰左傳云顓頊氏有子曰黎為祝融共工氏有子曰句龍為后土張氏虙曰相傳中央之神黄帝乘坤艮執繩司下土黄者中央之色也五行獨土神稱后后君也位居中領四方故稱君也存疑鄭氏康成曰后土亦顓頊氏之子曰黎兼為土官孔氏頴達曰后土為土官而鄭知非句龍者以句龍後轉為社則后土官闕黎則兼之也案黄帝天土徳之帝后土天土氣之神軒轅句龍則人帝人官之配食於此者也其蟲倮倮力果反吕氏春秋作螺正義孔氏頴達曰大戴禮云倮蟲三百六十聖人為之長朱氏申曰中央則中而信故倮蟲屬焉以其質順也吳氏澄曰倮人類也人類之貴於羽毛鱗介猶土之尊于木火金水故以蟲之倮者屬焉存異鄭氏康成曰象物露見不隠藏虎豹之屬恆淺毛方氏慤曰蛙螾之屬案傳曰毛羽之蟲陽氣所生鱗介之蟲隂氣所生惟人受天地之中以生故倮而為萬物之靈也倮蟲三百六十若雕題交趾比肩竒肱之國皆是若鄭謂虎豹則虎豹乃毛蟲不可謂之倮方氏謂蛙螾之屬則又太微而不足為倮蟲之長矣其音宫律中黄鍾之宫正義鄭氏康成曰聲始于宫宫數八十一屬土者以其最濁君之象也季夏之氣和則宫聲調樂記曰宫亂則荒其君驕黄鍾之宫最長也十二律轉相生五聲俱終于六十焉季夏之氣至則黄鍾之宫應禮運曰五聲六律十二管還相為宫孔氏頴達曰律厯志五聲始於宫陽數極於九九九相乗故八十一而數最多聲最尊黄鍾之宫於諸宫最長與中央土聲相應賀瑒云黄鍾十一月管何緣復應此月正以土義居中故虚設律于其月實不用候氣也四時之律皆取氣應而土王之律獨取聲應者一欲與四時為互一原從四時之管不别候也蔡氏熊氏以此為黄鍾少宫半黄鍾之律亦用以侯氣則六月之律林鍾六寸七月之律夷則五寸三分有餘何以四寸五分之律于此候之乎黄鍾之調均則下生林鍾為徴上生大蔟為商下生南吕為羽上生姑洗為角凡十二律各有五聲總之則六十聲也漢志曰宫中也居中央暢四方唱始施生為四方綱也髙氏誘曰宫土也位在中央為五音主朱子曰管子云凡聽宫如牛鳴窌中大史公云宫動脾而和正聖聞宫聲使人温舒而廣大又曰律中黄鍾之宫詹卿以為陽生于子至午而盡到未又生出一黄鍾某思量得不是恁地如京房律準十三絃中一絃為黄鍾不動十二絃便拄起應十二月又曰京房律準乃是先做下一箇母子調得正了後来只依此為準國語謂之均梁武帝謂之通其制十三絃一絃是全律底黄鍾只是散聲又是黄鍾起至應鍾有十二絃要取甚聲用柱子来逐絃分寸上柱定取聲案熊氏候氣之説斷非也六月方用六寸之林鍾又用四寸五分之黄鍾何所適從乎若謂後十八日氣降而四寸五分不應七月又升而五寸三分也至聲之所中則九寸者髙宫三寸九分者低宫又未嘗不可兼該耳朱子以此為京房律準十三絃中一絃不動之黄鍾是也其數五其味甘其臭香正義鄭氏康成曰土生數五成數十但言五者土以生為本甘香土之臭味也凡甘香者皆屬之髙氏誘曰五行之數土第五也馬氐睎孟曰中央以隂陽之中氣生土土之成形而可以稼穡稼穡作甘者所以養萬物也土主四時而分王故五味以甘為主五氣以香為主方氏慤曰土可稼穡故其味甘物以土化則其氣香甘味之主香氣之主中氣之為用如此而已朱氏申曰天五生土地十成之四時皆指成數獨土主生數者土分王四時以成物則不嫌于不能成也稼穡作甘土之味也稼穡之氣其香始升故其臭香彭氏㢘夫曰土言生數土為生之本而君四時且洛書無十取五以為中也甘為五味之主香亦為五氣之主其祀中霤祭先心霤力又反正義鄭氏康成曰中霤猶中室也土主中央而神在室古者複穴是以名室為霤孔疏古者窟居隨地而造若平地則不鑿但累土為之謂之復若髙地則鑿為坎謂之穴其形皆如陶竈故詩言陶復陶穴也復穴皆開其上以取眀故雨霤之謂之霤後世開牖象之則不當棟而在室之中央因名室為中霤也祀之先祭心者五藏之次心次肺至此心為尊也祀中霤之禮設主于牖下乃制心及肺肝為爼其祭肉心肺肝各一他皆如祀户之禮髙氏誘曰霤室中之祭祭后土也祭先心火也用所由生也一曰心土自用其藏也孔氏頴達曰土五行之主神在室之中故家主中霤而國主社社神亦中霤神也因牖象霤故設主牖南之下而北向存異張氏虙曰心當作腎土所勝也天子居大廟大室乗大路駕黄駵載黄旂衣黄衣服黄玉食稷與牛其器圜以閎圜于權反閎音宏吕氏春秋作髙以揜又淮南子有中宫御女其兵劔朝于中宫正義鄭氏康成曰大廟大室中央室也大路殷路也車如殷路之制而飾之以黄孔疏四時用鸞路此用大路者以土五行之主故取尊大之名又尚質之義也稷五榖之長牛土畜也孔疏易坤為牛又五行傳思之不睿則有牛禍器圜者象土周布于四時閎讀如紘謂中寛象土含物髙氏誘曰南向中央室曰大廟又處其中央故曰大室孔氏頴達曰案考工記云周人明堂東西九筵南北七筵凡室二筵是五室皆二筵無大小也中央獨稱大者土為五行主尊之故大之然夏世室四旁之室皆南北三歩東西三歩三尺中央土室南北四歩東西四歩四尺則周之明堂亦應中央大于四室但文不具耳案此大室四仲皆居之閉其西南北之户則為青陽大廟之大室閉其東西北之户則為明堂大廟之大室仲秋冬各閉其三户亦然若季夏則自居明堂右个不于此矣而屬之此者以中央土屬之也又孔氏疑中央應大于四室而文不具考蔡邕言大廟方三十六丈丈乃尺字之訛蓋室中二筵而室外前後左右各得一筵以為重檐所覆則其廣四筵而此四筵外又各虚一筵以為大廟之庭與四周之四廟八室相接也存疑李氏謐曰考工記得之於五室而謬於堂之脩廣何者五室合於五帝各居一室之義且四時之祀各居其方之正又聽朔布令咸居其月之辰也鄭康成乃謂土居中木火金水各居四維交以用事可謂攻乎異端疑誤後學者矣記云東西九筵南北七筵毎室二筵則五室復居六筵之地而室壁之外纔有四尺五寸之堂且二筵之室為四尺之户户之兩頰纔各七尺全置八尺之斧依且不容矧户牖之間哉盛徳篇九室三十六户七十二牖上員下方東西九仞南北七筵堂髙三尺得之户牖失之九室以論五帝事既不合施之時令又失其辰左右之个重置一隅義無所據也且堂之修廣纔六十三尺假使四尺五寸為外之基其中五十四尺便是五室之地一室僅可一丈户牖于何容之蔡伯喈假其法象因偽飾辭亦可歎矣袁氏翻曰考工眀堂同是五室其九室著自戴記漢氏因之自欲為一代之制鄭王亦云周是五室於今不同張衡東京賦云乃營三宫布教班常複廟重屋八達九房此眀堂之文也而薛綜注乃云房室也謂堂後有九室不叵異乎晉人穿鑿謂之一屋更屬不經辨正朱子曰論眀堂之制非一竊意當有九室如井田之制東之中為青陽大廟東之南為青陽右个東之北為青陽左个南之中為眀堂大廟南之東即東之南為眀堂左个南之西即西之南為眀堂右个西之中為總章大廟西之南即南之西為總章左个西之北即北之西為總章右个北之中為𤣥堂大廟北之東即東之北為𤣥堂右个北之西即西之北為𤣥堂左个中為大廟大室凡四方之大廟異方所其左右个則青陽之左个即𤣥堂之右个青陽之右个即眀堂之左个眀堂之右个即總章之左个總章之右个乃𤣥堂之左个也但隨其時之方位開門耳大廟大室則毎季十八日天子居正歟古人制事多用井田遺意此恐然也孟秋之月日在翼昏建星中旦畢中夏小正七月漢案户初昏織女正東鄉斗柄縣在下則旦日在翼淮南子作招搖在申正義鄭氏康成曰孟秋者日月會於鶉尾孔疏鶉尾已次之號而斗建申之辰也髙氏誘曰翼南方之宿楚之分野孔氏頴達曰秋揫也收也七月建申申堅也律厯志申堅於申三統厯七月節日在張十八度昏斗四度中旦畢八度中七月中日在翼十五度昏斗十六度中旦井初度中元嘉厯七月節日在張五度昏箕二度中旦胃二度中七月中日在翼十度昏斗三度中旦昴七度中案此謂立秋後三十日也月建申而日在已申與已合也唐月令七月之節日在張昏尾中暁婁中斗建申位之初七月中氣日在張昏箕中暁昴中斗建申位之中通書立秋日在星一度處暑日在張八度今時憲書立秋日在柳七度處暑日在星六度古法鶉尾初張十八度終軫十一度今法初星七度終翼九度其日庚辛淮南子上有其位西方正義鄭氏康成曰庚之言更也辛之言新也日之行秋西從白道成熟萬物月為之佐萬物皆肅然改更秀實新成人因以為日名焉孔氏頴達曰律厯志改更於庚悉新於辛陳氏祥道曰庚數八辛數七同於為金為義張氏虙曰庚辛屬秋以秋盛徳在金也其帝少暤其神蓐收蓐音辱正義鄭氏康成曰此白精之君金官之臣自古以来著徳立功者也少皞金天氏蓐收少皞氏之子曰該為金官孔氏頴達曰金天氏與少皞金位相當左傳蔡墨云少皞氏之子該又云該為蓐収是為金神佐少皞於秋蓐收者言秋時萬物摧蓐而収斂張氏虙曰相傳西方之神少皞乗兑執矩而司秋元氣廣大謂之皞春為太皞則秋為少皞存疑髙氏誘曰少皞帝嚳之子摯兄也案左傳郯子云我祖少昊摯之立也是少昊名摯又案少皞天金徳之帝蓐收天金氣之神金天與該則人帝人官之配食於此者也其蟲毛正義戴氏徳曰毛蟲三百六十麟為之長鄭氏康成曰象物應凉氣而備寒狐貉之屬生旃毛也朱氏申曰秋則右而義毛蟲屬焉以其力强也吳氏澄曰西方奎婁胃昴畢觜參七宿有虎之象故凡物之毛者皆屬金盧氏翰曰西方白虎七宿金屬其類為毛故秋則其蟲毛其音商律中夷則正義鄭氏康成曰三分徴音益一以生商商數七十二屬金者以其濁次宫臣之象也秋氣和則商聲調樂記云商亂則陂其臣壊孔疏徴數五十四三分之為十八者三又益一十八得七十二數次多故次濁孟秋氣至則夷則之律應夷則者大吕之所生也三分去一律長五寸七百二十九分寸之四百五十一孔疏大吕長八寸不及半三分之為二十八有零者三去其一得此數周語曰夷則所以詠歌九則平民無貳孔疏夷平則法也言法度平故可詠歌九功之法平民使不忒髙氏誘曰太陽氣衰太隂氣𤼵萬物肅然應法成性故曰夷則班氏固曰夷傷也萬物始傷被刑法也漢志曰商章也物成熟可章度也商為金聲金稍重其數稍多故為臣則法也陽氣正法度而傷使隂氣當傷之物也韋氏昭曰九月夷則乾九五也管長五寸六分夷平則法也萬物既成可法則也歐陽氏修曰商傷也物過老而悲傷夷僇也物過盛而當殺陳氏祥道曰夷則建申之律人至申而氣夷物至申而有成朱子曰管子云凡聽商如離羣羊大史公云商動肺而和正義聞商聲使人方正而好義又云夷則之律長五寸五分五釐一毫存疑王氏喬桂曰自是而後已向於秋矣故夷則長七寸五分自林鍾降九分其數九其味辛其臭腥其數九下唐月令有其性義其事言正義鄭氏康成曰金生數四成數九但言九亦舉成數也辛腥金之臭味也凡辛腥者皆屬焉孔疏易地四生金於西天九成金於西但言九以成為功也皇氏云金數四得土五而成故九秋味辛臭腥者金之氣味金在氣則腥在口則辛也孔氏頴達曰金所以在西者西方半隂半陽但物既成就體性堅剛雖可改革猶湏火柔之馬氏睎孟曰秋以隂中生金金之形成而從革從革作辛故味辛物以金化則其氣為腥故臭腥方氏慤曰腥隂臭也秋為隂中故其臭腥其祀門祭先肝正義鄭氏康成曰秋隂氣出祀之於門外隂也祀之先祭肝者秋為隂中於臟值肝肝為尊也祀門之禮北面設主於門左樞乃制肝及肺心為俎奠於主南又設盛於俎東其他皆如祭竈之禮髙氏誘曰孟秋始内由門而入故祀門肝木也祭先之用其所勝孔氏頴達曰隂氣始於五月終於十月故秋為隂中陽氣始於十一月終於四月故春為陽中然隂中有陽陽中有隂亦是隂陽之中也五臟肺最前心次之肝次之脾次之腎為後肝在中脾不當中而鄭云秋為隂中於臟値肝春為陽中於臟值脾者由秋不得繼夏隔於土脾不得繼肺隔於心也張氏虙曰塞向墐户至春而出户祀其出也萬寳告成至秋而入門祀其入也人自右手以命脉為主於是為脾為肺乃入左手為心為肝為腎而春脾夏肺中央心秋肝冬腎之祭定矣黄氏震曰肝屬木金克木故祭先肝以養金凉風至白露降寒蟬鳴鷹乃祭鳥用始行戮夏小正有莠雚葦狸子肇肆湟潦生苹爽死苹莠時有零雨灌荼正義鄭氏康成曰皆記時候也寒蟬寒蜩謂蜺也孔疏寒螀也似蟬而小青赤方氏曰黒而赤者謂之蜺鷹祭鳥者将食之示有先也孔疏以人君行戮眀鷹之殺髙氏誘曰凉風坤卦之風為損降也寒蟬得寒氣鼓翼而鳴是月鷹摯殺鳥於大澤之中四面陳之世謂之祭鳥方氏慤曰凉未至於寒也特為寒之微而已春露生秋露殺以殺故言白以白為金之正也戮盖殺之也馬氏睎孟曰凉風至則天地之仁氣散案散疑當作斂矣白露降則隂乗陽而其候交矣寒蟬鳴則物之生於暑者其聲變矣鷹祭鳥則時主殺而物之司殺者應是而動也鷹至不仁猶祭然後食而況於人乎陸氏佃曰西風謂之凉風猶東風謂之温風溫凉言其氣也彭氏亷夫曰凉風八風之一西南風也盧氏翰曰凉薄也寒也未至於寒特為寒之漸爾嚴凝之始也隂生於午而嚴凝之氣及申方始隂極於亥而嚴凝之氣至丑方終主秋冬而以收藏為事也天地之氣陽盛則散為雨露隂盛則凝為霜雪白露露感秋金而變色猶未凝也張氏虙曰鷹祭與豺獺祭小異祭時猶生祭後始殺之故云用始行戮存異陳氏澔曰用始行戮順時令也辨正徐氏師曾曰此記時候不言政事陳説非也案夏小正傳曰寒蟬者蝭􅧽也蟬啞蟬也青赤色與仲夏之蟬異種前此瘖啞此時得風露乃鳴葢隂類也天子居總章左个乘戎路駕白駱載白旂衣白衣服白玉食麻與犬其器亷以深駱音洛淮南子有西宫御女撞白鐘其兵戈正義鄭氏康成曰總章左个大寢西堂南偏戎路兵車也制如周革路而飾之以白白馬黑鬛曰駱麻實有文理屬金犬金畜也器亷以深象金傷害物入藏髙氏誘曰總章向西堂西方總成萬物章眀之也左个南頭室也白順金也亷利也象金斷割深象隂閉藏也張氏虙曰秋為白藏不言白而言章赤白為章白在其中矣四時惟秋繼夏為尅我赤白不相離故以總章名秋所居此當申上七月之位也秋所乘路宜尚白而言戎路以用言之若詩元戎小戎重兵也但兵車鞔之以革而漆之無他飾此飾以白耳麻木榖金王之時恐其或過取物之竊我者以殺之犬金畜金王之時恐其或悖取物之同類者以調之食得其調則疾不生亦所以安性古人之食惟取其冝而已不以珍異進也亷稜也以春對觀圜則深廣亷則方嚴達則顯深則隠案麻木榖而位西方秋食之從其方也犬艮畜艮隂盛於下而陽日消亦秋之象器外亷象秋之嚴内深象隂之斂是月也以立秋先立秋三日太史謁之天子曰某日立秋盛徳在金天子乃齊立秋之日天子親帥三公九卿諸侯大夫以迎秋於西郊還反賞軍帥武人於朝正義鄭氏康成曰軍帥諸將也武人謂環人之屬有勇力者髙氏誘曰迎秋於西九里之郊金氣用事治兵討罪非帥不整非武不威故賞軍帥武人於朝與衆共之也徐氏師曾曰賞帥武人順時令将振武也天子乃命将帥選士厲兵簡練桀俊專任有功以征不義詰誅暴慢以眀好惡順彼逺方将好惡竝去聲正義鄭氏康成曰征之言正也伐也詰謂問其罪窮治之順猶服也方氏慤曰才足以将物而勝之謂之将知足以帥人而先之謂之帥選士則人無不能厲兵則器無不利簡之則無不擇練之則無不熟然苟非已試之效則勝負猶未可知故必任有功而或置疑貳於其間則知者不能盡其謀能者不能竭其力故任之又欲其專也凡此皆欲以征不義而已無以覆下之謂暴不能敬上之謂慢詰以問其罪誅以戮其人征不義言其道詰誅暴慢言其事義人所好不義人所惡好惡得其眀則合天下之所願而無違矣朱氏申曰萬二千五百人為軍軍将皆命卿二千五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫案周禮夏官丈董氏應暘曰命将所以征不義傑俊即士詰誅即征暴慢即不義也眀所惡即以見所好順聲教四訖之意徐氏師曾曰士言其人兵言其器簡擇士中之俊桀者而以兵器練習之如此則兵可用矣於是任有功之将以征不義之國不置疑不中制而暴慢之不義者或問其罪或戮其人此非窮兵黷武正以眀吾所好在義所惡在不義耳夫所好明則人知慕義而来所惡眀則彼知畏威而化乃順彼逺方之道也通論劉氏恕曰天地方以義正萬民而可令不義之人横行天下乎則用兵以征不義扶生人之義理即助天地之義氣也彭氏亷夫曰此説雖善然亦以天地肅殺之義著此令耳非拘泥以為出師必此時也觀者無以辭害意是月也命有司脩法制繕囹圄具桎梏禁止姦慎罪邪務搏執命理瞻傷察創視折審斷句決獄訟必端平戮有罪嚴斷刑天地始肅不可以贏繕市戰反搏音博創平聲折音舌舊音哲非審斷之斷音段嚴斷之斷音鍜舊以斷決為句非正義鄭氏康成曰順秋氣政尚嚴也理治獄官有虞氏曰士夏曰大理周曰大司宼創之淺者曰傷端猶正也肅嚴急之言也贏猶解也蔡氏邕曰皮曰傷肉曰創骨曰折骨肉皆絶曰斷陸氏佃曰傷瞻之而已創然後察也折視之而已斷然後審也非直以傷創折斷正其罪之輕重亦所以療之療之而愈則罪又有末減者矣方氏慤曰法制古所有故曰脩囹圄禁人之地故曰繕桎梏禁人之器故曰具姦存乎心故止之邪見乎行故罪之搏以戮之執以拘之端言無偏頗之異平言無輕重之差先命有司以脩法制非理之所專故也既務搏執矣又命理如此用心之仁可知矣秋者隂之始冬者隂之終故於孟秋言天地始肅陽道常饒則有餘而贏隂道常乏則不足而縮為此者天地而君實輔相之故曰天地始肅不可以贏朱氏申曰贊化者不可使隂氣之贏也張氏虙曰此章反覆用刑之道謂秋主肅殺天之道不可以不順然天道好生聖人之刑将以教民非以虐民又未嘗不寓其惻隠之仁也徐氏師曾曰用刑而致有傷創折斷所以致其義恤刑而命瞻察視審所以致其仁存異方氏慤曰審斷決故獄訟必端平張氏虙曰斷決囚欲如片言折獄然不可不審徐氏師曾曰天地始肅當因時致刑不可使陽道常贏案注疏於審斷句無訓蔡氏以審斷為句吳氏纂言從之方氏以審斷決為句陳氏集説從之而按之文義蔡氏為確不可以贏贏字鄭訓解髙訓驕謂有罪之人不可解縱徐謂陽道不可使太過方謂隂道不可使有餘則方氏為長又傷創折斷陸氏以民之相鬭言徐氏以官之用刑言則二説可兼葢既傷創折斷皆所當恤也是月也農乃登榖天子嘗新先薦寢廟唐月令是月也下有築場圃三字正義髙氏誘曰先薦寢廟不忘親也孔氏頴達曰不云牲記文畧也方氏慤曰榖謂稷也孟夏之麥仲秋之麻季秋之稻皆榖獨於稷言榖以稷為五榖之長也稼穡之官謂之后稷土榖之神謂之社稷皆以此爾存疑鄭氏康成曰黍稷之屬於是始熟朱氏申曰不言所配以萬物新成不可偏主一物也案鄭氏不知此榖之專指稷而以為黍稷之屬反疑前此之薦黍為舊黍則麻與稻皆穀也可指為舊麻舊稻乎命百官始收斂完隄坊謹壅塞以備水潦脩宫室坏垣牆補城郭坏音培正義鄭氏康成曰收斂物順秋氣也備備八月也以八月宿値畢畢好雨也脩宫室坏垣牆補城郭皆象秋收斂物當藏也髙氏誘曰坏猶培也方氏慤曰隄坊大故欲完壅塞小故欲謹凡以備水潦而已張氏虙曰宫室當脩垣牆當坏城郭當補此治國之常經葢治國猶治家也藩籬衰敗則盗生心棟宇傾欹則人肆侮國體所係豈止禦災捍患己哉通論方氏慤曰陽為出故春主𤼵散隂為入故秋主收斂天之示人有收斂之道人之奉天即有收斂之事應氏鏞曰夏氣舒𤼵則脩利隄坊無有壅塞秋氣收斂則完而謹之葢水在天地間最為流通不可壅之物而其盛衰消長亦因乎時夏潦不可隄也秋潦則可隄矣一通一障其為民禦患一也胡氏銓曰春秋城築皆取定星中此非土功時也是月也毋以封諸侯立大官毋以割地行大使出大幣使去聲正義髙氏誘曰封侯裂土封之大官上公九命割地以地賜人大幣金帛之幣大使使命也方金氣之收藏所以皆不冝行張氏虙曰封諸侯始建國者割地則有功而加地也又曰雖與祭統不合然亦不相悖也方氏慤曰使者使於四方故言行幣藏於府庫而以賜人故言出皆非收斂之事故止之其曰大官大使大幣則小者容或可矣存疑鄭氏康成曰古者於嘗出田邑此其月也而禁封諸侯失其義矣孔氏頴達曰鄭云毋封侯割地為失義則毋立大官行大使出大幣為得禮陸氏佃曰言以著封割雖封割可也特毋以是月務行之耳陳氏澔曰記者但知賞以春夏刑以秋冬故言如此孟秋行冬令則隂氣大勝介蟲敗穀戎兵乃来行春令則其國乃旱陽氣復還五穀無實行夏令則國多火災寒熱不節民多瘧疾淮南子下有七月官庫其樹棟正義鄭氏康成曰行冬令則亥氣乗之行春令則寅氣乗之行夏令則己氣乗之介甲也甲蟲屬冬敗榖稻蟹之屬孔疏越語王孫雄曰今吳稻蟹不遺種謂蟹食稻也戎兵十月宿直營室營室主武事旱雲雨以風除也無實陽氣能生而不能成也瘧疾寒熱所為者今月令瘧作厲髙氏誘曰冬水王故隂氣大勝介蟲冬𤣥武之屬金水相并則戎兵来侵春陽亢燥故旱是月凉風用事而春燠乗之故穀更生而不實夏火王故多火災金寒火熱金火相干故不節而使民病瘧朱氏申曰戎兵乃来隂氣大勝而主殺也以三隂之時行三陽之令故陽氣復還以秋成之時行春生之令故五榖無實熱極生寒故不節陳氏澔曰行冬令為亥水之氣所泄行春令為寅木之氣所損行夏令為己火之氣所克也通論張氏虙曰陽氣復還宜萬物之所喜而反不能成實則出之無時非徒無益也黄氏曰癘疾之作或感四時之邪氣或自養之失宜素問曰夏傷暑其病在秋為痎瘧秋傷濕其病在冬為咳𠻳此自養之失行夏令民多瘧疾此感時之邪先王於時氣不能使之無邪而有以裁成之不能使萬民無癘疾而有以養之為之疾瘍之醫所以養萬民之疾為之禮義之政所以裁成其時氣而又為之膳膏齊和使嘗放焉所以維持其五臟六腑仁民之政也案三隂之時行六隂之令則隂大勝矣兵戎亥中北落師門主非常兵寇也隂中之時行陽中之令則陽亢矣故旱也欽定禮記義疏卷二十三
