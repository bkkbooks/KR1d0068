body:
  text: 禮器第十之一正義孔氏穎達曰案鄭目録云名為禮器者以其記禮使人成器之義也此於别録屬制度通論張子曰禮運云者語其達也禮器云者語其成也又曰禮器則大矣修性而非小成也運則化矣達順而樂亦至焉爾方氏慤曰形而上者謂之道形而下者謂之器道運而無名器運而有迹則禮運言道之運禮器言器之用而已道散而為器故繼禮運而後有禮器焉陳氏澔曰器有二義一是學禮者成德器之美一是行禮者明用器之制芮氏城曰器易立成器以為天下利之器禮器是故大備大備盛德也禮釋回増美質措則正施則行其在人也如竹箭之有筠也如松柏之有心也二者居天下之大端矣故貫四時而不改柯易葉故君子有禮則外諧而内無怨故物無不懷仁鬼神饗德措七路反又作厝箭節見反筠于貧反貫古亂反柯古何反正義鄭氏康成曰禮器言禮使人成噐如耒耜之為用也人情以為田修禮以耕之是也大備自耕至於食之而肥釋猶去也回邪僻也質猶牲也措置也箭篠也端本也竹箭松柏四物於天下最得氣之本或柔韌於外或和澤於内用此不變易也人之得禮亦猶然也外諧内無怨人協服也懷歸也孔氏頴達曰此一節論禮能使人成器則於外物無不備既得成器又能備足是盛德也釋回以下用禮為器以耕人情之事筠是竹外青皮人之備德由於有禮如竹箭四時葱翠由外有筠也人經夷險不變其德如松柏陵寒鬱茂由其内心貞和也貫經也外諧内無怨者言君子内外俱美故能與一切物相諧與人無怨也鬼神聰明正直依人而行物既懷仁故神亦饗德也張子曰禮器言禮大體完備若成器然措則正者言不動思慮放下無事時亦不失於正謂未行者皆正也施則行是利用也必大備乃利用釋回増美質此閑邪而存其誠也方氏慤曰人禀五行之秀氣則其質未始不美也然或不美者蔽於回邪以損之爾故釋回然後可以增美質也然禮之於人豈能予之以其所無哉亦因其所有以増之耳陳氏澔曰以禮為治身之器故能大備其成人之行案器者各適其用之意言先王制禮於身則飲食言語服飾威儀於人則父子君臣夫婦兄弟賓客於事則冠昏喪祭射御朝聘於地則闈闥鄉黨宗廟朝廷其厚薄崇卑内外大小莫不各適其用成器如是則大備矣此聖人盡性以盡人性盡物性之盛德也美質謂忠信天之生人有善無惡故質無不美者惟物欲之回邪日蒙其上而性之質以漓禮也者所以釋去其回邪而又使之無過不及以增其美質故措之身則身正如松柏之有心禮即其心也施之事則事行如竹箭之有筠禮又其筠也禮之備美如此故君子有禮外則國可治内則家可齊明而物懷其仁幽而神饗其德學禮如是則聖人之盛德亦庶幾之矣先王之立禮也有本有文忠信禮之本也義理禮之文也無本不立無文不行正義鄭氏康成曰言必外内具也孔氏穎達曰忠者内盡於心信者外不欺於物内盡於心故與物無怨外不欺物故與物相諧禮雖用忠信為本而又須義理為飾得理合宜是其文也通論陳氏祥道曰下曰甘受和白受采忠信之人可以學禮此忠信所以為禮之本孔子去麻冕以從衆則適於義從拜下以違衆則歸於理此義理所以為禮之文也案此一節總提其綱忠信本也松柏之心也所謂美質也義理之文竹箭之筠也以増美質而釋回不待言矣禮也者合於天時設於地財順於鬼神合於人心理萬物者也是故天時有生也地理有宜也人官有能也物曲有利也故天不生地不養君子不以為禮鬼神弗饗也居山以魚鼈為禮居澤以鹿豕為禮君子謂之不知禮正義鄭氏康成曰鬼神所祀事有德也孔疏鬼神是有德之人死乃祀為鬼神禮合人心故得順鬼神天時地利人官物曲言皆有異天不生謂非其時物也孔疏若寒瓜夏橘及李梅冬實之屬地不養謂非此地所生孔疏若山之魚鼈澤之鹿豕不順其鄉之所有謂之不知禮也孔氏穎達曰忠信為本易見而義理為文難覩故此以下廣説義理為文之事合天時即依於四時及豐儉隨時也財物也所設用物為禮各是其土地之物也鬼神助天地為化祀之必順不濫逆也合天㑹地順於鬼神又與人心符合其禮乃行天之四時各有所生若春薦韭卵夏薦麥魚是也地之分理各有所宜若高田宜黍稷下田宜稻麥是也人官有能若司徒奉牛司馬奉羊及庖人治庖祝治尊俎是也物曲有利若麴糵利為酒醴絲竹利為琴瑟言皆有異也方氏慤曰以陽生於子故祀天於冬之日至以陰生於午故祀地於夏之日至以飲養陽氣故饗禘於春以食養陰氣故食嘗於秋此禮所合於天時者也黍稷之馨足以為簠簋之實水土之品足以為籩豆之薦貨無常以示逺物之致幣無方以别土地之宜此禮所設於地財者也天高故燔柴於壇地深故瘞埋於坎魂歸于天故焫蕭以求陽魄歸于地故祼鬯以求陰此禮所順於鬼神者也以人莫不有男女之别故制為冠昏之禮莫不有君臣之分故制為朝覲之禮莫不有追逺之心故制為喪祭之禮莫不有合歡之情故制為燕饗之禮此則合於人心者也火田不於昆蟲未蟄之時罻羅必在鳩化為鷹之後獺祭魚然後虞人入澤梁豺祭獸然後田獵此則理萬物者也徐氏師曾曰以天所不生地所不養之物而行禮則逆天時反地財君子不以為禮而鬼神亦不饗之矣如魚鼈水物也而居山者用之鹿豕山物也而居澤者用之此則地所不養而用之者非所謂設於地財矣故君子謂之不知禮鬼神豈肯饗之乎言地財則天與人物可知案此承上義理之文言禮必用物而所用之物必因天所生地所養乃合於人心順於鬼神而萬物各得其理也此曷故哉蓋天時之有生地理之有宜與人官之有能物曲之有利俱有一定而不能相通者故必因天所生地所養之物乃合人心而君子以為知禮亦順鬼神而鬼神饗之也不然用非其物則君子直謂之不知禮矣通論劉氏彛曰禮以致其敬為本不求物之難得也故順天時之所生宜地理之所養從風土之所能隨物曲之所利汙尊匏爵凷桴土鼔苟竭其誠上帝可饗也故必舉其定國之數以為禮之大經禮之大倫以地廣狹禮之薄厚與年之上下是故年雖大殺衆不匡懼則上之制禮也節矣狹音洽上下之上時掌反殺色戒反徐所例反匡音恇又丘往反正義鄭氏康成曰定國之數謂地物所出多少大倫謂貢賦之常差薄厚用年之豐凶也殺謂穀不熟匡猶恐也節言用之有節也孔氏穎達曰經法也倫猶例也制禮先書其國内所生物多少定數以為大法又宜隨地廣狹為貢賦之差又須隨時省歛衆之不恐並由君上制禮有節故也通論陳氏祥道曰舉其定國之數以為禮之大經則王制所謂必於歳之杪五穀皆入然後制國用者是也禮之大倫以地廣狹則王制所謂用地小大是也禮之薄厚與年之上下則王制所謂視年之豐耗是也方氏慤曰王制以三十年之通制國用量入以為出雖有凶旱水溢民無菜色正謂是也應氏鏞曰定國猶立國也總千七百國之所出而受其九貢九賦之所入此其一定之數所以為天下之大計而禮之大經亦定矣天秩五禮其常而不變者皆經也至於大國貢重列國貢輕損用二簋萃用大牲其廣狹隨地所出厚薄隨天所生則有不定者焉所謂倫也年有上有下此在天之天也年雖大殺而衆不匡懼此在我之天也上謹於制節則所約者一己所裕者一國矣禮時為大順次之體次之宜次之稱次之堯授舜舜授禹湯放桀武王伐紂時也詩云匪革其猶聿追來孝天地之祭宗廟之事父子之道君臣之義倫也社稷山川之事鬼神之祭體也喪祭之用賔客之交義也羔豚而祭百官皆足大牢而祭不必有餘此之謂稱也稱尺證反後皆同革紀力反正義鄭氏康成曰言聖人制禮所先後也時言受命改制度也革急也猶道也聿述也孔疏並爾雅釋言釋詁文言文王改作者非欲急行己之道乃追述先祖之業來居此為孝也倫之言順也體天地人之别體也孔疏神是天之别體社稷山川是地之别體鬼是人之别體兼云天者社稷山川雖形屬地精靈上通於天也義之言宜人道之宜也足猶得也稱稱牲體之大小而為俎官指助祭者而言百喻衆也孔疏大夫士無田則薦以羔豚無田則無助祭者故曰喻衆孔氏穎達曰因上制禮得節故以下諸事皆由禮洽天時也揖讓干戈於禮中最大故云時為大雖合天時又須順序既時且順又須小大各有體别雖有體别又須行之各當其宜稱猶足也行禮須各自稱足也下又釋上文堯舜授人湯武救民皆時使之然也詩大雅文王有聲之篇言文王改作豐邑亦時使之然也今詩本革作棘猶作欲聿作遹葉氏適曰聖人於天下之所未嘗有者獨以身先或授受或誅伐皆能措斯人於安治所謂時也天未明地未察宗廟未嚴父子未親君臣未從待禮而定所謂倫也其於社稷山川鬼神也有所則象而報事焉專為門霤廣為蜡臘無不在矣所謂體也喪祭用焉賔客交焉所謂義也寡不必不足多不必有餘諸侯大夫各守其分所謂稱也方氏慤曰天之運之謂時人之倫之謂順形之辨之謂體事之義之謂宜物之平之謂稱案時變動而不居非後天奉天者不能及故時為大順體宜稱則循理守法者可能故遞次之堯舜禪讓湯武征誅皆以奉天而引聿追來孝之詩者王者為天之子所謂事天如事親也郊社禘嘗孝慈仁敬先後有自然之序故曰倫社稷山川諸鬼神尊卑有定故曰體䘮凶祭吉各有其用大賔小客各有其交必當於義故曰宜羔豚舉其小大牢舉其大即祭之用牲以明各有所稱下又推廣言之以明禮之無往非稱也諸侯以龜為寳以圭為瑞家不寳龜不藏圭不臺門言有稱也正義鄭氏康成曰瑞信也諸侯執瑞孤卿以下執摯闍者謂之臺孔疏兩邊築闍為基基上起屋曰臺門闍者謂之臺爾雅釋宫文案臺門門兩旁築土為臺其中闕然故謂之闕臺上懸象以觀示人巍然而高故謂之象魏又謂之兩觀孔氏穎達曰此還明上經稱次之事也諸侯有保土之重須占詳吉凶故得以龜為寳圭五等玉也諸侯受封於天子天子與之玉為瑞書云輯五瑞又云班瑞於羣后是也家卿大夫也大夫卑輕不得寳龜故臧文仲居蔡為僭卿大夫不得執玉故不得藏圭諸侯有保捍之重故為臺門而大夫輕故不得也言有稱者結上得不得各有所稱也存疑鄭氏康成曰古者貨貝寳龜大夫以下有貨耳易曰十朋之龜孔疏古者貨貝以貝為貨若今之用錢為貨也貝有五種案食貨志王莽作金銀龜貝錢布之品名曰寳貨大貝四寸八分以上一朋直二百十六文壯貝三寸六分以上朋直五十文幺貝二寸四分以上朋直三十文小貝一寸二分以上直十文各以二枚為一朋不盈寸二分漏度不得為朋枚直三文是為貨貝五品又以龜為寳易損六五云或益之十朋之龜鄭注引爾雅云一曰神龜四靈之一二曰靈龜天龜也三曰攝龜地與四方之龜也四曰寳龜所謂青黑縁者五曰文龜六曰筮龜七曰山龜八曰澤龜九曰水龜十曰火龜食貨志云元龜尺二寸直比大貝十朋公龜九寸以上比壯貝十朋侯龜七寸以上比幺貝十朋子龜五寸以上比小貝十朋案此則文龜諸侯得用之大夫即卜亦用筮龜以下耳孔氏穎達曰此云家不寳龜案三正記白虎通天子之龜尺二寸諸侯一尺大夫八寸者彼謂卜龜士亦有龜故士喪禮卜宅是也案大夫不能無卜而藏龜則僭故屈原卜居往就大卜鄭詹尹而所用之龜亦非寳龜也大夫如此士更可知龜亦可以為幣故旅幣無方龜為前列非寳龜外又有幣龜也案申言義理有此五者而末於稱重言之見稱之尤不可少以起下章禮有以多為貴者天子七廟諸侯五大夫三士一天子之豆二十有六諸公十有六諸侯十有二上大夫八下大夫六諸侯七介七牢大夫五介五牢天子之席五重諸侯之席三重大夫再重天子崩七月而葬五重八翣諸侯五月而葬三重六翣大夫三月而葬再重四翣此以多為貴也介音戒後皆同俗讀古賀反非重直龍反下同翣所甲反正義鄭氏康成曰豆之數謂天子朔食諸侯相食及食大夫孔疏以下大夫六豆上大夫八豆皆是食饗大禮明天子諸侯亦是大禮故云朔食及相食也公食大夫禮曰宰夫自東房薦豆六設於醬東此食下大夫而豆六則其餘著矣孔疏下大夫六豆設於堂上則天子公侯之豆亦設於堂上可知聘禮致饔餼於上大夫堂上八豆設於户西則凡致饔餼堂上之豆數亦如此孔疏此證上大夫八豆公食大夫禮亦有八豆之文必引聘禮者以聘禮是致饔餼禮欲見食與饔餼堂上豆數同周禮公之豆四十其東西夾各十有二侯伯之豆三十有二其東西夾各十子男之豆二十有四其東西夾各六孔疏皆周禮掌客文其陳於堂上及東西夾此鄭以意量之也陳氏祥道曰禮器之豆數用數也掌客之豆數陳數也諸侯七介七牢者周之侯伯也大夫五介五牢者侯伯之卿使聘者也周禮上公九介九牢侯伯七介七牢子男五介五牢孔疏今言七舉中言之聘義所云上公七介侯伯五介子男三介乃謂其使者也孔疏大行人凡卿大夫士之禮各下其君二等侯伯七介七牢故卿大夫五介五牢亦舉中言之也其介數得各下其君二等君牢則以爵等五等之卿同牢今言五牢者惟據侯伯之卿降君二等其餘牢禮則否天子葬五重者謂抗木與茵也葬者抗木在上茵在下孔疏古者椁累木於其四邊上下不周致茵於椁下所以藉棺從上下棺之後又置抗木於椁之上所以抗載於土棺案儀禮言器方陳時茵在後若用則先茵以藉既下棺乃於上加抗木加席皆以覆棺也士喪禮下篇陳器曰抗木横三縮二加抗席三加茵用疏布緇翦有幅亦縮二横三此士禮之一重者孔疏證此經葬重之義也下棺之後先加折於壙上以承抗席折猶屐也方鑿連木為之蓋如牀縮者三横者五無簣於上加抗木抗木之上加抗席三此為一重茵者藉棺外下縟用淺色緇布為之每將一幅輒合縫為囊將茅莠及香草著其中如今有絮縟也而縮二横三毎為一重也以此差之上公四重孔疏豆數及棺之重數上公與諸侯不同今諸侯既三明上公四重也孔氏穎達曰天子誠深孝篤故立廟以多世為稱諸侯大夫德轉薄故廟少為稱士一廟據下士為言若適士則二廟也天子豆二十有六者尊者宜備味也皇氏曰天子庶羞百二十品籩豆各六十此云二十六堂上數也堂下東西夾各十七諸公上公也諸侯侯伯子男也十六十二謂更相朝時堂上之豆數上下大夫或八或六皆謂主國食使臣堂上之豆數介副也牢大牢也諸侯朝天子天子以大牢禮賜之也介及牢不云天子者天子無介牢禮無等及為賔客之事也諸侯之席三重者謂相朝時賓主皆然也尊者須溫厚故多重乃稱也葬五重者尊者宜堅固故多重也八翣者尊宜多鄣蔽以稱之也三重六翣者五等同也卑於王故鄣蔽少再重四翣者大夫又卑故從而少飾也此以多為貴者結上文也陳氏祥道曰多少者禮之數大小高下者禮之度文素者禮之容是雖所設之不同皆縁情以制宜隨宜以為貴以求其稱而已其言以多為貴則先之以廟而繼之豆介牢席者先神後人之序也由豆介牢席而繼之以葬者養生送死之序也方氏慤曰諸侯牢介謂朝天子之禮卿大夫牢介謂諸侯使聘天子之禮止言諸侯之席三重則通五等可知言大夫再重則兼卿可知凡此尊者多而卑者少故曰以多為貴許氏曰廟祧之設非特以誠深孝篤獨隆於天子也蓋以天下有王尊祖親禰之道當如是也堂上正羞非以備味多品獨宜於天子也不如是無以極九州之美備四時之和也牢介異數席重異宜與葬月之或七或五抗茵柳翣之數五與三八與六天子諸侯之儀其間不能以寸聖人乃惓惓致意焉蓋以為明嫌表微舍是無以自見也通論陸氏佃曰天子朝踐八豆饋食八豆又加豆八羞豆二所謂二十有六者此與自公以下雖有加豆羞豆不數方隆天子以多為貴故也亦其加豆羞豆有降殺春秋傳曰楚子入饗於鄭加籩豆六品是也又聘禮云凡致禮皆用其饗之加籩豆則籩豆非饗蓋少諸公倍上大夫朝事八饋食八諸侯倍下大夫朝事六饋食六上大夫八朝事之豆也下大夫六去茆菹麋臡公食大夫宰夫自東房薦豆六韭菹醯醢昌本麋臡菁菹鹿臡是也以差次推之饋食之豆四既夕禮脾析蠯醢葵菹蠃醢是也下士饋食之豆二冠禮喪禮特牲饋食葵菹蠃醢士籩有栗脯而已餘論許氏曰死生終始之際聖人嚴焉况至尊至貴而可忽於此乎七日而殯七月而葬必誠必信而庸有悔焉質之周制含襚幣玉小宰受之鄉遂紼引司徒治之大喪殯葬必以大臣涖之者所以示天下之嚴且重也矧夫未殯之始復之用衣裳也薌之用鬯也寒之用槃冰也枕之用角枕楔之用角柶也歛之用圭璋琥璜璧琮也必七日而殯焉及其葬也水兕之周於杝梓也菆龍之加於椁幬也竁之用窆器也葬之用鸞車象輅也必七月而葬焉蓋欲誠信乎此也辨正孔氏頴達曰禮有正羞庶羞故公食大夫禮設韭菹醯醢六豆設於醬東是正羞也將食正羞庶羞設於稻南膷臐膮牛炙之等十六豆謂之庶羞又掌客云公豆四十又云食四十則豆盛正羞食謂庶羞也是庶羞與正羞别此上大夫八豆下大夫六豆皆為正羞而天子二十六豆亦為正羞故熊氏以為正羞醯醢百二十罋之等但不知堂夾若為陳列皇氏以為庶羞其義非也儀禮之例一種席皆稱重故燕禮注云重席重蒲筵是也若餘經雖異席亦稱重則此經是也凡席有兩則稱二重有一則稱一重與棺重別也陸氏佃曰天子之席五重書曰敷重篾席敷重筍席則凡王席重設行葦傳曰設席重席也周官司几筵設莞筵紛純加繅席畫純加次席黼純席皆重設是以謂之五重凡禮對文則别散文則通筵或謂之席席亦或謂之筵也又天子五重諸侯三重筵皆單設席則重也大夫再重有筵則席亦單設無加席則筵蓋重爾公食大夫禮曰蒲席常緇布純加萑席尋𤣥帛純萑席盖亦單設大射儀曰司宮兼卷重席設於賓左此筵亦重設也是以謂之重席謂之重席則無異席可知而鄭氏謂公食大夫孤為賓則莞筵紛純加繅席為畫純是不知司几筵加繅席重設主諸侯三重席言之公食大夫加萑席主大夫再重言之萑席單設而已蓋如是而知諸侯之席三重大夫再重也又曰凡翣天子戴璧諸侯戴圭蓋首戴玉非大夫以下事也有以少為貴者天子無介祭天特牲天子適諸侯諸侯膳以犢諸侯相朝灌用鬱鬯無籩豆之薦大夫聘禮以脯醢天子一食諸侯再大夫士三食力無數大路繁纓一就次路繁纓七就圭璋特琥璜爵鬼神之祭單席諸侯視朝大夫特士旅之此以少為貴也犢音獨本亦作特朝直遙反下同灌古亂反鬯丑亮反脯音甫醢音海繁步干反琥音虎璜音黄單音丹正義鄭氏康成曰天子無介無客禮也孔疏為賓用介天子以天下為家既不為賓客故無介也灌獻也一食再食三食謂告飽也食力謂農工商也大路繁纓一就殷祭天之車也孔疏殷猶質以木為車乗以祭天謂之大路周禮王之五路玉路繁纓十有二就金路九就象路七就革路五就木路翦繁鵠纓圭璋特朝聘以為瑞無幣帛也孔疏聘禮曰聘君以圭夫人以璋典瑞云公執桓圭侯執信圭伯執躬圭諸侯相見及朝天子亦無束帛是朝聘以為瑞無幣帛也琥璜爵者天子酬諸侯諸侯相酬以此玉將幣也孔疏琥璜非爵名故知是送爵案聘禮禮賓之幣束帛乗馬又致饗以酬幣又致食以侑幣則諸侯於聘賓惟用束帛乗馬皆不用玉今琥璜送爵故知是天子酬諸侯諸侯自相酬也大夫特士旅之謂君揖之孔氏穎達曰祭天特牲者天神尊貴質故祭止一特牲也諸侯事天子如天子事天故天子廵狩諸侯奉膳亦止用牛而已諸侯相朝謂五等諸侯自相朝也天子祭天不用鬰鬯諸侯膳天子亦無鬱鬯而自相朝朝享禮畢未饗食之前主君酌鬱鬯之酒以獻賓示相接以芬芳之德不在殽味也案司儀職云凡諸公相為賓將幣畢云儐亦如之鄭云儐謂以鬱鬯禮賓也大夫聘禮以脯醢者大夫出使行聘禮畢主國禮之酌以酒而又有脯醢是須味稍多也天子一食者食湌也尊者以德為飽不在食味故每一湌輒告飽待勸之乃更湌諸侯再食而告飽大夫士德轉少告轉疏故少牢特牲皆三飯告飽也食力者代耕力作以得食以飽為度不須告勸故湌無數也繁馬腹帶纓鞅也染絲而織之曰罽五色一帀曰就就成也言五色帀則一成大路車既朴素故馬亦少飾止一就也次路殷之第三路供卑用故就多也然郊特牲云大路一就先路三就次路五就而此云次路七就鄭注郊特牲以此云七為誤圭璋玉中之貴也特謂不用他物媲之表德特達不加物也琥璜是玉劣於圭璋者也不特達附爵乃通鬼神單席神道異人不假多重自溫故也諸侯視朝謂日出視諸臣之朝也大夫則君人人揖之士則不問多少共一揖之也凡此尊者少而卑者多故曰以少為貴也陳氏祥道曰大夫之德尊而士之德卑德尊者寡故特揖德卑者衆故旅揖而巳通論陸氏佃曰天地之祭各兩牲有降之者有祀之者燔柴於泰壇瘞埋於泰折實牲體焉所以降之在始祭之時也掃地而祭羞牲體焉所以祀之在正祭之時也故牛人曰凡祭祀共其享牛求牛享牛祀神之牛求牛降神之牛也降神之牛於天則騂犢於地則黝牲各從其類也祀神之牛於天用蒼地用黄各象其功也此經特牲盖言享牛而巳灌以為禮而已未有籩豆之薦故周官籩人掌四籩自朝事而下餘論孔氏頴達曰天子無介其實餘事亦有介故鬯人共介鬯是天子臨鬼神使介執鬯也案大行人云上公三禮再祼而酢則諸侯朝天子天子灌用鬱鬯此特云諸侯相朝者據以少為貴諸侯於天子無鬱鬯諸侯相朝則設鬱鬯欲見卑者禮多故也案儀禮特牲有九飯少牢十一飯鄭云諸侯十三飯天子十五飯此云一飯再飯與彼不同此據食畢更加飯之數也大夫士之下惟有工商農故知食力是工商農也若對文言之則庶人食力故晉語云士食田庶人食力工商食官也周氏諝曰饗至於酬爵則禮成矣圭璋春夏迎氣之玉有生物之意琥璜秋冬迎氣之玉有成物之意有生物之意故不待禮成而特達於天子有成物之意故必待禮成然後附爵而通夫天地之大德曰生故聘義曰圭璋特達德也辨正方氏慤曰殷尚質故就之少者為大多者為次周則以多為貴焉故玉路十有再就然郊特牲言先路三就次路五就彼所謂五就指繼先路之次路也此所謂七就指繼次路而又次者也顧命於革路象路通謂之次路且自上而下降殺以兩由一以至三三以至五五以至七固其理也以周路之有五則殷路固不止於三矣徐氏師曽曰圭璋瑑圭璋也長八寸圭以享王璋以享后二王之後所用雖曰圭以馬璋以皮然皮馬不上堂是獨用也陳可大以圭璋為朝王后之玉不知諸侯朝用命圭享天子用璧享后用琮皆非圭璋也琥璜玉之卑者爵酒器也子男享諸侯用琥璜必待送酬爵之時獻繡若黼而將之不特達也鬼神異於人不假多重以為溫煖故單席黄叔暘乃謂此王席非鬼神而引周禮以證之然周禮王席三重祀先王酢席亦如之則非單席明矣案周禮求牛或以為求得即用即索牛也或以為繹祭之牛舊説郊特牲謂祭天一牛以半燔柴以半正祭陸謂用兩牛夫牛人凡祭祀三字所包者廣廟祭則以求牛為繹祭之牛可也若郊祭則以享牛為正祭之牛此特牲是也求牛為燔柴所實牲體之牛求牛用而不卜享牛卜而後用必無一牛而可兩半用者舊説未確陸説自明有以大為貴者宫室之量器皿之度棺椁之厚丘封之大此以大為貴也量音亮皿命景反正義方氏慤曰周官典命宫室以命數為節自上公至子男或以九或以五各有差此宫室以大為貴也天子之路弓斗房皆謂之大此器皿以大為貴也尊者之棺四重卑者止於一重椁則周於棺此棺椁以大為貴也周官冢人以爵等為丘封之度此丘封以大為貴也量言所容度言所至互相備也車旂之屬謂之器不可謂之皿籩豆之屬謂之皿亦可謂之器積土言之曰丘度土言之曰封丘必高封則不必高也案今本此節注疏皆闕伏生大傳天子之堂廣九雉公侯七雉伯子男五雉皆三分其廣以二為内考工記言明堂度九尺之筵東西九筵南北七筵宗廟路寢同制則宫室之量可知器皿則未聞棺椁丘封詳喪記月令有以小為貴者宗廟之祭貴者獻以爵賤者獻以散尊者舉觶卑者舉角五獻之尊門外缶門内壺君尊瓦甒此以小為貴也散悉旦反觶支豉反缶方有反甒音武正義鄭氏康成曰凡觴一升曰爵二升曰觚三升曰觶四升曰角五升曰散孔疏皆韓詩説文五獻子男之饗禮也孔疏凡王饗臣及其自相饗行禮獻數各隨其命子男五命故知五獻是子男壺大一石瓦甒五斗孔疏漢禮器制度文也此瓦甒即燕禮公尊瓦大也缶大小未聞也易曰尊酒簋貳用缶孔疏今以小為貴近者小則逺者大缶在門外則大於壺矣易坎卦六四爻辭孔氏頴達曰案特牲云主人獻尸用角佐食洗散以獻尸是尊者小卑者大天子諸侯及大夫皆獻尸以爵無賤者獻以散之文禮文散亡略不具也特牲主人獻尸用角下大夫也崔氏云特牲少牢禮尸入舉奠觶是尊者舉觶特牲主人受尸酢受角飲是卑者舉角此是士禮天子諸侯祭禮亡文不具也凡饗有酒其列尊之法缶盛酒在門外壺在門内君尊謂子男尊也瓦甒云君尊則壺缶但飲諸臣也不云内外則陳之於堂人君面尊專惠也方氏慤曰獻謂獻之於尸也舉謂自舉而飲也貴賤以位言尊卑以體言獻爵者主人獻散者佐食主人之與佐食則有貴賤之别焉故以位言之舉觶者皇尸舉角者主人皇尸之與主人特有尊卑之别爾故以體言之通論孔氏穎達曰今韓詩説爵盡也足也觚寡也飲當寡少觶適也飲當自適也角觸也不能自適觸罪過也散訕也飲不能自節為人所謗訕也總名曰爵其實曰觴觴者餉也觥亦五升所以罰不敬觥廓也所以著明之貌君子有過廓然明著非以餉不得名觴陸氏佃曰燕禮司宫尊於東楹之西兩方壺豈所謂門内壺者邪公尊瓦大在尊南南上豈所謂尊瓦甒者邪士旅食於門而兩圜壺豈所謂門外缶者邪圜壺雖非缶其陳設之序則然辨正陸氏佃曰貴者獻以爵賤者獻以散所謂尸飲五君洗玉爵獻卿尸飲九以散爵獻士尊者舉觶卑者舉角者凡妥尸天子舉斚諸侯舉角則卿舉觶大夫舉角與若特牲饋食酳尸以角旅酬更以觶與此不同者盖卑者以大為貴然則此經所言盖天子諸侯之儀也有以高為貴者天子之堂九尺諸侯七尺大夫五尺士三尺天子諸侯臺門此以高為貴也正義方氏慤曰天子堂階之高其尺以九為節自是而下降殺以兩或以七或以五或以三焉凡此皆以高為貴也存疑周氏諝曰天子之堂九尺非周制也周之上公以九為節則天子堂以十二為節也天子諸侯皆臺門而天子門以五諸侯門以三乃其別也辨正孔氏頴達曰天子堂九尺此周法也案考工記殷人重屋堂崇三尺鄭差之云夏髙一尺故知此九尺者周法也案階以一尺為一級孔疏足正周氏之違臺門惟在雉門但天子外闕兩觀諸侯内闕一觀為别耳有以下為貴者至敬不壇埽地而祭天子諸侯之尊廢禁大夫士棜禁此以下為貴也壇大丹反棜於據反正義鄭氏康成曰廢猶去也棜斯禁也謂之棜者無足有似於棜或因名耳孔疏棜是舉名既夕禮云設棜於東堂下注棜今之轝也制如今大木轝上有四周下無足今大夫斯禁亦無足似木轝之棜周公制禮或因名此斯禁為棜耳故少牢司宫尊兩甒於房户之間同棜是周公時已名斯禁為棜也大夫用斯禁士用禁禁如今方案隋長局足高三寸孔氏頴達曰初則燔柴於泰壇燔柴訖於壇下埽地而設正祭此周法也棜長四尺廣二尺四寸深五寸無足赤中畫青雲氣菱苕華為飾禁長四尺廣二尺四寸通局足髙三寸漆赤中畫青雲氣菱苕華為飾刻其足為褰帷之形也又曰廢禁者廢去其禁司尊彛鬱鬯之尊用舟以承之其犧象等六尊皆無用舟又燕禮諸侯之法瓦大兩有豐是無禁也方氏慤曰有足為禁無足為棜有足則髙無足則下此主以下為貴於大夫用棜至廢禁則又下矣故天子諸侯之尊如此通論孔氏穎達曰案玊藻云大夫側尊用棜則斯禁也案鄉飲酒兩壺斯禁是大夫用斯禁也玉藻云士用禁又士冠禮士昏禮承尊皆用禁是士用禁也案鄉射是士禮而用斯禁者以禮樂賢從大夫也特牲是亦士禮而云棜禁在東序者鄭注云祭尚厭飫故得與大夫同也方氏慤曰祭天之禮謂之至敬下言至敬無文是也壇待人為髙非體之自然也故埽除其地以致其潔也郊特牲所謂埽地而祭於其質也是矣陳氏祥道曰棜雖差異於禁而鄉飲酒禮亦謂之斯禁盖天子諸侯之尊有罍有舟謂雷動以時則有鼓物之利否則有害物之災舟善操之則有載濟之利否則有覆溺之患所以為戒也大夫士之尊命之禁所以禁之也德尊者有戒而無禁德卑者戒而又禁之此天下所以無彛酒之過矣存疑孔氏穎達曰至敬不壇埽地而祭者此謂祭五方之天辨正陳氏祥道曰周官小宗伯之職言兆五帝四望四類又言兆山川丘陵墳衍不言兆昊天盖有兆域則有壇無兆域則不壇不壇於外所以示其至敬於内也禮有以文為貴者天子龍衮諸侯黼大夫黻士𤣥衣纁裳天子之冕朱緑藻十有二旒諸侯九上大夫七下大夫五士三此以文為貴也黼音甫黻音弗纁許云反藻本又作璪正義鄭氏康成曰此祭冕服也孔氏穎達曰人君因天之文章以表於德德多則文備故天子龍衮諸侯以下文稍少也十二謂旒數也陳氏祥道曰此經主以文為貴故於天子不言大裘曰龍衮而巳諸侯德貴乎能斷故言黼卿大夫德貴乎能辨故舉黻士之服止於𤣥衣纁裳則質而已衣正色天子至士皆𤣥衣裳閒色天子至士皆纁裳所異者特繡繢之功或多或寡或有或無而巳存疑孔氏頴達曰周家旒數隨命數士但爵弁無旒此亦似夏殷禮辨正熊氏安生曰周諸侯九章七章其中有黼孤希冕而下其中有黻詩采菽篇云𤣥衮及黼終南篇云黻衣繡裳特言黼黻即周法無嫌方氏慤曰言朱緑與言君朱緑帶同義案天子上士𤣥冕則三旒孔謂士爵弁無旒未然有以素為貴者至敬無文父黨無容大圭不琢大羹不和大路素而越席犧尊疏布鼏樿杓此以素為貴也琢字又作瑑大轉反大羹之大音泰和胡卧反越音活犧鄭素何反今如字鼏莫歴反樿章善反又市戰反杓市約反正義鄭氏康成曰大圭長三尺杼上終葵首琢當為篆字之誤也明堂位曰大路殷路也鼏或作幕樿木白理也孔氏頴達曰至敬謂敬之至極祭天服用大裘是無文也父黨謂父之族黨事之無有折旋揖讓之容大圭天子朝日月之圭尚質故無琢桓蒲之文大羹肉汁也不和無鹽梅也大古初變腥但煮肉而飲其汁未知調和後人祭既重古但盛肉汁謂之大羹大路殷祭天車也越席蒲席也祭天質素故素車蒲席疏麤也鼏覆也冪人云祭祀以疏布巾冪八尊以疏布天地之神尚質也貴素故用白理木為杓陸氏佃曰凡木不飾為樿樿櫛樿杓是也若龍勺疏勺蒲勺則於杓加飾矣陳氏祥道曰至敬無文篤於誠也父黨無容篤於愛也以不琢而謂之大圭則羹不和謂之大羹路不飾謂之大路以其道之所寓而非功之所致也八尊所以祭天地故尚質六彛所以祭家廟故尚文則疏布之所冪唯尊而已陳氏澔曰大羹大古之羹後王存古禮故設之亦尚𤣥酒之意存疑孔氏頴達曰犧尊先儒云刻尊為犧牛之形鄭云畫尊為鳳羽婆娑然樿杓鄭注周禮祭天爵用白木不用玉也陳氏澔曰杓沃盥之具案周禮冪人祭祀以疏布巾冪八尊以畫布巾冪六彛疏云祭天無祼惟有五齊三酒實於八尊是祭天惟用八尊故惟疏布冪賈疏祭天亦有秬鬯之彛以疏布冪宗廟亦有八尊以畫布冪是辨文素但在冪也郊特牲云器用陶匏者盖尊用陶爵用匏也彛尊皆盛酒器灌取彛中鬱鬯之酒實之於瓚而灌之若王用圭瓚后用璋瓚是已獻取尊中五齊之酒實之於爵若王用玉爵后用瑤爵是已其於祭天而盛以瓦尊獻以匏爵又何疑焉犧尊之制惟聶崇義畫牛尊腹之圖近之先鄭云飾以翠羽後鄭讀莎畫為鳳羽王氏肅云刻為獸形阮諶圖畫為牛象南史盜發齊景公墓得二犧尊分其首以受酒合之為全牛此皆未足據者也樿杓孔疏不用玉爵是以樿為爵非杓矣且與匏爵有違陳謂沃盥之具與上不類惟陸説近之孔子曰禮不可不省也禮不同不豐不殺此之謂也盖言稱也殺所戒反又所例反下而殺同稱尺證反下並同正義鄭氏康成曰省察也不同言異也孔氏穎達曰引孔子語證上諸事禮既所趣不同不察則禮道無由可知不豐者應少不可多不殺者應多不可少也陳氏澔曰禮各有當然之則豐則踰殺則不及惟稱之為善案此一章承上禮之稱而詳言之盖能稱則歸於順合於體協於宜雖未及時之化而亦不背於時矣禮之以多為貴者以其外心者也德發揚詡萬物大理物博如此則得不以多為貴乎故君子樂其發也禮之以少為貴者以其内心者也德產之致也精微觀天下之物無可以稱其德者如此則得不以少為貴乎是故君子慎其獨也詡况矩反樂五孝反致直置反正義鄭氏康成曰外心用心於外其德在表也詡猶普也徧也發猶見也樂多其外見也内心用心於内其德在内也致致密也萬物皆天所生孰可奉薦以稱其德少其牲物致誠慤也孔氏穎達曰外心謂起自朝廷廣及九州四海德發揚詡萬物以下解心在外義言宜發揚其德普徧萬物也大理物博者言理萬物之事廣博如此故樂得其禮迹發見於外也内心謂不使外迹章著也德產之致也精微以下解心在内義既無物可稱則宜少外多内也是其外迹豈得不貴少乎方氏慤曰心一而巳以示禮於外故有外心體禮於内故有内心馬氏睎孟曰言貴多則曰大曰高曰文在其中言貴少則曰小曰下曰素在其中樂其發者樂其德之發於外也慎其獨者身致其誠而巳存疑孔氏穎達曰王者居四海之上宜為四海所畏服故禮須自厚顯德於外亦以接物君子則天子也一云識禮道者案外心心見乎外所謂英華發外也内心心主乎中所謂美在其中也天地之德發揚於外生物之理盛大有以鼓動萬物而物之生者博所謂顯諸仁然其所以致此則甚精微而不可見所謂藏諸用也君子知不備物不足以稱天地發揚之德即備物亦不足稱天地精微之德故樂其發則禮之周流洋溢與天地之發揚同用慎其獨則禮之収斂謹密與天地之精微同體是其一體一用雖有内外之殊而總之一心所以或用多或用少歸於稱而巳或謂貴多是季秋大饗貴少是冬至圜丘或謂貴多是制禮主於備物貴少是行禮主於存誠季秋冬至分多少無據且豈有制之者豐而行之者嗇乎盖此心字固屬君子之心然推而上之即可見天地之心鄭氏以德字屬天地此正度越諸儒處特以内心為祭天少其牲物於義不該然亦舉其禮之最大者以見義耳不當舉此為詬厲也至孔氏以外心專屬王者豈王者以備物自厚遂能使四海畏服乎義尤謬矣古之聖人内之為尊外之為樂少之為貴多之為美是故先王之制禮也不可多也不可寡也唯其稱也樂音洛正義孔氏穎達曰内之為尊者解内心内極敬慎而至理為尊也外之為樂者解外心接物須廣大故外極繁富而事可樂也極心於内故内以少為貴極禮迹於表故外以多為美也是故先王制禮多少乃異而以有稱為禮也陳氏澔曰尊如尊德牲之尊恭敬奉持之意案聖人與天地合其德故内外多少自合其宜所謂聲為律身為度也由此制禮以理萬物其多少皆可為萬世則而人曰此先王之禮不可多不可寡矣是故君子大牢而祭謂之禮匹士大牢而祭謂之攘大音泰匹士王本作匹熊本作正攘如羊反正義鄭氏康成曰君子謂大夫以上孔氏穎達曰此一節説禮既須稱中則得禮僭則盗竊諸侯大夫常祭少牢遣奠及卒哭祔用大牢案少牢此諸侯之大夫禮若天子之大夫常祭亦大牢匹士士也庾氏曰士微賤不得特使為介乃行故謂之匹白虎通云匹偶也與其妻偶故云匹夫匹婦士常祭特豚遣奠卒哭祔加一等少牢馬氏睎孟曰天子諸侯卿大夫位尊其禮可以致隆故曰天子以犧牛諸侯以肥牛大夫以索牛此大牢而祭謂之禮也攘者非其有而取之也陳氏澔曰謂之禮稱也謂之攘不稱也管仲鏤簋朱紘山節藻棁君子以為濫矣鏤力豆反簋音軌紘音宏棁章悦反依字當作掇正義鄭氏康成曰濫亦盗竊也鏤簋謂刻而飾之大夫刻為龜耳孔疏案少牢敦皆南首鄭注云敦有首者尊者器飾也飾器象龜周之禮飾器各以其類龜有上下甲也龜簋聲相近故知刻為龜也諸侯飾以象孔疏燕禮有象觚天子飾以玉孔疏案周禮九嬪云贊玉齍玉府云共王之服玉朱紘天子冕之紘也諸侯青組紘孔疏此祭義文大夫士當緇組紘纁邊孔疏案士冠禮緇組紘纁邊是士也天子諸侯用純大夫當雜故宜與士同也栭謂之節梁上楹謂之棁孔疏此釋宫文宫室之飾士首本大夫達棱孔疏此禮緯含文嘉文達棱謂斲為四棱以達兩端首本斲去木之首本令細與屋頭相應諸侯斲而礱之天子加密石焉孔疏莊二十四年穀梁傳文云大夫斲之士斲本與此小異大意畧同無畫山藻之禮也孔氏穎達曰此明奢而失禮之事簋黍稷器也紘用組為之從下屈而上屬之於兩旁垂餘為纓鏤簋朱紘是天子之飾而管仲僭為之山節刻柱頭為斗栱形如山也藻棁者謂畫梁上侏儒柱為藻文也此天子廟飾而管仲僭為之也方氏慤曰濫者溢而無所制之謂也雜記所謂難為上者以此晏平仲祀其先人豚肩不揜豆澣衣濯冠以朝君子以為隘矣澣又作浣户管反濯直角反朝直遙反隘本又作阨於賣反正義鄭氏康成曰隘猶狹陋也祀不以少牢與無田者同孔疏與無田之士同無田大夫猶用羔羊也不盈禮也大夫士有田則祭無田則薦澣衣濯冠儉不務新言二大夫皆非也孔氏穎達曰此論儉而不中禮非稱之事大夫祭用少牢士用特豚而平仲今用豚豚又過小必言肩者周人貴肩也肩在俎今云豆喻其小假豆言之也方氏慤曰隘者陋而無所容之謂雜記所謂難為下者以此通論陳氏澔曰上言不豐不殺此舉管晏之事以明之管仲豐而不稱晏子殺而不稱者也是故君子之行禮也不可不慎也衆之紀也紀散而衆亂孔子曰我戰則克祭則受福盖得其道矣正義鄭氏康成曰紀絲縷之數有紀我我知禮者也孔疏知非孔子自我者君子務在謙光故也克勝也孔氏穎達曰戰克祭受福者又引郊特牲語結稱也盖得其道者不多不少隨而稱當解所以戰勝而祭受福也方氏慤曰紀一定則衆目各有條理故紀散而衆亂此君子之行禮所以不可不慎也祭義曰致物用以立民紀是矣順以使衆故戰則克誠以事神故祭則受福通論孔氏穎達曰此無戰事而言戰者以郊特牲二句相連故合引之也且彼因祭之田獵而教戰選兵祭有戰事案君子樂其發而分未當不嚴故多不濫君子慎其獨而禮未嘗不盡故少不隘若管仲之濫不免於攘即平仲之隘亦未合於禮夫禮之多少大小高下文質皆以示民有常上失其義理則禮無文而不行矣何以使外諧而内無怨哉家語我戰則克與上不豐不殺相屬又有故曰字鄭孔以為非孔子自我是也君子曰祭祀不祈不麾蚤不樂葆大不善嘉事牲不及肥大薦不美多品麾毁皮反蚤音早葆音保又保毛反本又作保正義鄭氏康成曰祈求也祭祀不為求福也詩云自求多福福由己耳麾之言快也祭有時不以先之為快也齊人所善曰麾葆大謂器幣葆之言褒也嘉事之祭致夫人是也孔疏案桓三年齊侯使仲年來聘致夫人於時公取文姜三月廟見故也禮宜告見於先祖耳不善之而祭孔疏人年二十成人自宜冠三十嗣世自宜昏若無親者昏三月祭以告廟冠畢埽地而祭禰並是有為而然非謂善之而設祭不貴肥大美多品禮之義有以小少為貴也孔氏頴達曰此論祭祀之事依禮而行不樂華美也祭以存親耳非謂就親祈福報周禮六祈非禮之常也蚤謂先時也孝子感霜露應心而思親思親而宜祭不以霜露未至而先時早設為快也案不祈不麾蚤凡祭皆然不專指宗廟葆者褒也褒崇髙之稱也祭之器幣大小長短自有常宜幣通文八尺豆盛四升不以貴者貪髙大為之也嘉事冠昏也郊牛繭栗宗廟角握社稷尺各有所宜不必須並及肥大也薦祭品味宜有其定不以多為美故郊特牲而社稷大牢多也通論方氏慤曰祭祀不祈無私禱也有所祈凡以為民而已若噫嘻之祈上帝載芟之祈社稷不麾蚤者不先時也周官言前期十日帥執事而卜日遂戒祭義言孝子將祭慮事不可以不豫非不先時也盖慮事具物不可以不先時及其行事則貴其時而已故經言祭則觀其敬而時也左傳言奉牲以告曰博碩肥腯曲禮言犧牛肥牛則牲非不肥大也為其禮苟不至徒及肥大則儀不及物故也祭統言苟可薦者莫不咸在郊特牲言不敢用常䙝味而貴多品則薦非無多品也為其誠苟不至而美多品則以美沒禮故也餘論孔氏頴達曰案鄭發墨守云孝子祭祀雖致其誠信與其忠敬而祝尸嘏主人曰皇尸命工祝承致多福無疆于女孝孫來女孝孫使女受禄于天宜稼于田眉壽萬年勿替引之若此則祭祀内盡己心外亦有祈福之義也孔子曰臧文仲安知禮夏父弗綦逆祀而弗止也燔柴於奥夫奥者老婦之祭也盛於盆尊於瓶父音甫綦左傳作忌燔音煩又芳云反奥依鄭作爨七亂反盛音成瓶歩丁反正義鄭氏康成曰文仲魯公子彄之曾孫臧孫辰也莊文之間為大夫於時為賢是以非之不正禮也文二年八月丁卯大事於大廟躋僖公始逆祀是夏父弗綦為宗人之為也奥當為爨字之誤也或作竈禮尸卒食而祭饎爨饔爨也時人以為祭火神乃燔柴老婦先炊者也盆瓶炊器也明此祭先炊非祭火神燔柴失之矣孔氏穎達曰閔公僖公俱是莊公之子閔嫡而小僖庶而大莊公死而立閔為君僖時為臣閔少而死後乃立僖僖死子文公立時弗綦為宗伯典禮佞文公云吾見新鬼大故鬼小以閔置僖下是臣在君上為逆亂昭穆文仲不能諫止故為不知禮祭爨神言其有功於人人得飲食故祭報之弗綦謂是火神燔柴祭之文仲又不能諫止又為不知禮爨者是老婦之祭其祭卑惟盛食於盆盛酒於瓶卑賤若此何得燔柴祭之故鄭注謂奥當為爨也祝融并奥及爨三者不同祝融乃古火官之長五祀之神祀於郊奥者正是竈之神常祀在夏以老婦配之有俎及籩豆設於竈陘又延尸入奥㸑者宗廟祭後直祭先炊老婦之神在於爨竈案疏所辨三者甚明或以先炊為古之燧皇如神農之為先嗇則更尊於祝融矣何得卑之或謂婦人主中饋故婦之老者主竈之祭則古未有使婦人主祭者亦非周氏諝曰先炊之有祭猶牧之有先牧嗇之有先嗇也存疑方氏慤曰祀竈於奥配以先炊故謂之老婦之祭胡氏銓曰祭竈先薦於奥有主有尸周時特牲迎尸如宗廟之儀但無燔柴耳鄭以為爨誤矣案家語奥字作竈字方氏胡氏奥讀如字而謂祭竈於奥則一字當讀竈又讀奥恐無是理又考祀竈禮無盛於盆尊於瓶之儀而儀禮饎爨饔爨之祭但用黍肉無籩豆俎則於此經正合未可據以駁鄭也至應氏謂僖公死未久既升僖公之祀於上又即其所居之奥而焚牲以祭則是於僖公之寢奥燔柴祭僖公也尤為臆造無據盖此章承禮之稱不可過不可不及而過之失尤甚於不及君子所云皆當禮而止不求過也若文仲以新鬼大而躋之祭廟爨而燔柴皆求媚而失禮甚矣欽定禮記義疏卷三十四
