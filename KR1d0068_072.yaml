body:
  text: 深衣第三十九正義孔氏穎達曰案鄭目録云名曰深衣者以其記深衣之制此於別録屬制度吕氏大臨曰古者衣裳殊制所以別上下也惟深衣之制衣連裳而不殊盖私燕之服尚簡便也雖曰簡便不可以無法故有五法之象方氏慤曰有虞氏深衣而養老𫝊曰庶人服短褐深衣則自天子至庶人皆服之也通論鄭氏康成曰深衣連衣裳而純之以采者素純曰長衣有表則謂之中衣大夫以上祭服之中衣用素士祭以朝服中衣以布明矣孔疏天子大夫四命爵弁自祭故中衣用素天子之士諸侯之大夫亦士也祭以朝服諸侯之士𤣥端亦衣朝服而裳異朝服用布故中衣亦布孔氏穎達曰長衣中衣及深衣其制度同玉藻云長中繼揜尺若深衣則緣而已緣廣寸半凡深衣皆諸侯大夫士夕時所著之服庶人吉服亦深衣皆著之在表也朝服祭服有中衣喪服亦有中衣檀弓練衣黄裏注云練中衣以黄為内但不得繼揜尺耳喪服儀云帶緣各視其冠注云緣如深衣之緣下云具父母大父母衣純以繢以青之屬唯孤子深衣純以素但以緣而巳其吉服中衣亦以采緣諸侯得綃黼為領丹朱為緣大夫士不用綃黼丹朱但用采純而已其長衣若以采緣則與吉服中衣同故知以素緣也若以布緣則曰麻衣其喪服之中衣其純用布視冠布之麤細至𦵏可以用素緣也練則用縓也詩之麻衣則與此別彼謂吉服之衣也所以此稱深衣者以餘服則上衣下裳不相連此深衣衣裳相連被體深邃故謂之深衣陳氏澔曰朝服祭服喪服皆衣與裳殊惟深衣不殊則其被於體也深邃故名深衣制同而名異者有四焉純之以采曰深衣純之以素曰長衣純之以布曰麻衣著在朝服祭服之内曰中衣古者深衣盖有制度以應規矩繩權衡短毋見膚長毋被土續衽鉤邊要縫半下毋音無見同現衽而審反又而鴆反要一遥反正義鄭氏康成曰聖人制事必有法度毋見膚者衣取蔽形孔疏若見膚肉則褻也毋被土為汙辱也續猶屬也衽在裳旁者也屬連之不殊裳前後也孔疏若喪服裳前三幅後四幅各自為之不相連今深衣裳一旁則連之相著一旁有曲裾連之與相連無異鉤邊若今曲裾也續或為裕三分要中減一以益下下宜寛也要或為優孔疏凡布廣二尺二寸以四寸為縫一尺八寸三分之為六寸減六寸以益下上二幅一尺二寸下二幅二尺四寸孔氏穎達曰作記之時深衣無復制度故稱古者言盖疑辭衽謂深衣之裳以下闊上狹謂之衽接續此衽而鉤其旁邊要縫謂要中之縫下畔一丈四尺四寸要縫半之七尺二寸容舉足而行故宜寛也方氏慤曰玉藻謂縫齊倍要以縫齊為倍則要縫為半矣此所以互言之楊氏簡曰深衣屬裳則當續衣之衽使之長與裳齊也吕氏大臨曰衣之旁幅下殺裳之旁幅上殺上下之衽相續而中曲楊氏曰既合縫了又再覆縫合縫為續衽覆為鉤邊案深衣之異於禮服者在衣惟一領耳朝祭諸服其領直故左右二衽皆摺而掩於内以露裼衣至襲則出其左衽而右揜而裘與裼衣皆不見深衣則其領方交於兩衽之上先掩左衽於内次掩右衽於外故曰衽當旁也若裳則與朝祭大異朝祭之裳十二幅襞積而旁無殺縫深衣止六幅裁為十二幅故此篇於裳言之最詳盖朝祭之衣與裳別故衣有垂下之衽以蔽裳而裳之長短不必言深衣衣與裳連則衣垂下之衽無所用之故先言短長之無定而即言續衽言裳與衣相續在垂衽之處故孔氏直言此衽指裳前後左右皆有衽也既以六幅解為十二幅則每幅半有邊半無邉無邉則其縷易散而縫之亦不固故必以有邊者與無邉者相合先以無邊者緝之後以有邊者掩其外而再緝之謂之鉤邉故鄭氏曰衽謂裳幅所交裂也惟後中二片則必以有邊者相合與衣背縫一直而下皆削幅故曰負繩其名衽謂小要者衣之上與袖相屬裳之齊又倍要唯當要處最小也故禮衣有垂下之衽朝祭之衽無考而鄭言若今曲裾孔言朝服曲裾似朝祭下垂之衽亦上殺下廣惟喪服上廣下殺以變於吉若深衣則無此衽而有當旁之衽玉藻云衽當旁正指深衣之衽本篇續衽則眀所以衽當旁之故見此續處即禮服之垂衽處此䖏不用衽故衽當旁耳而鄭孔多􅈬續處言之諸儒多以朝祭之衽喪服之衽汩之則成棼手矣袼之髙下可以運肘袂之長短反詘之及肘帶下毋厭髀上毋厭脅當無骨者袼音各亦作胳詘邱勿反厭於甲反髀畢婢反當丁浪反正義鄭氏康成曰袼衣袂當腋之縫也肘不能不出入袂屬幅於衣詘而至肘當臂中為節臂骨上下各尺二寸則袂肘以前尺二寸肘或為腕帶當骨緩急難為中也孔氏穎達曰袼謂當臂之䖏袂中髙下宜稍寛大可以運動其肘袂二尺二寸肘尺二寸是容運肘也袂長二尺二寸并緣寸半為長二尺三寸半除去縫之所殺各一寸餘有二尺一寸半在従肩至手二尺四寸今二尺一寸半之袂得反詘及肘者以袂屬於衣幅廣二尺二寸身脊至肩但尺一寸也從肩覆臂又尺一寸是衣幅之畔覆臂將盡今又屬袂於衣又二尺一寸半故反詘其袂得及於肘也帶若當骨則緩急難中故當無骨之䖏此深衣帶下於朝祭服之帶也朝祭之帶則近上故玉藻云三分帶下紳居二焉是自帶而下四尺五寸也馬氏睎孟曰服身之章身服之準故視肘以為袂肘尺二寸袂二尺二寸殺袂以為袪三袪以為要袪尺二寸倍為二尺四寸三之七尺二寸倍要以縫齊長一丈四尺四寸也案凡衣視身之長短有衽有邊有要有下有袼有袂有帶而短長適均纎曲各當此深衣之所以應規矩繩權衡也制十有二幅以應十有二月袂圜以應規曲袷如矩以應方負繩及踝以應直下齊如權衡以應平圜圓同袷音劫踝華上聲齊音咨正義鄭氏康成曰裳六幅幅分之以為上下之殺袂圜應規謂胡下也司馬氏光曰牛領下垂者謂之胡從袖口至袖下裁令勢圓如牛胡也口案袖根二尺二寸袂尺二寸故須裁袷交領也古者方領孔疏以漢時領皆向下交垂故云古者方領似今擁咽如今小兒衣領孔疏方折之也司馬氏光曰漢時小兒衣不可見今小兒曡方幅繫頸下謂之涎衣繩謂裻司馬氏光曰裻音督衣之背縫謂之裻與後幅相當之縫也踝跟也齊緝也孔氏穎達曰每幅交解為二是十二幅也負繩謂衣之背縫及裳之背縫上下相當如繩之直非謂實負繩也陳氏祥道曰十二月者天之數規而圜者天之體矩應方者地之象直與平者人之道吕氏大臨曰衣袂之制有三有侈者自服而侈之袷至袪而侈之朝服以上是也有端者自袷至袪方正而製之𤣥端素端是也有圜者内殺於袷外殺於袪中則胡下深衣是也欲使行者舉手以為容儀如規之圜也案自服之服恐誤或疑是腋字通論敖氏繼公曰十二幅謂衣六幅裳六幅是也盖衣身二幅左右袂各二幅是謂衣之六幅裳以六幅布交裂裁之為十二片其實止六幅也衣裳各六幅象一嵗之六隂六陽也存疑司馬氏光曰鄭注周禮袷狀如著案此字疑誤横銜之繣潔於項顔師古注漢書繣結礙也潔繞也盖為結紐而繞項也今朝服有方心曲領以白羅為之方二寸許綴於圓領之上以繫於頸後結之或袷之遺象與而曲禮鄭注袷交領也則領之交㑹自方疑更無他物且從之以就簡易葉氏夢得曰袂圜以應規不云領曲以應矩而云曲袷如矩以應方則袷與領非一物也張華注朱勃事引漢書音義頸下施衿正方儒者之服則領之外盖別有袷方折之加於領上此正古深衣之制若為交領則當在背何抱之云乎曲禮視不上於袷鄭氏亦以袷為交領袷當在帶之上所以尊天子若為交領無乃太髙乎案曲袷交領也以右襟之末斜交於左脅以左襟之末斜交於右脅則領不直垂而方矣温公及葉氏之疑似與注不符故規者行舉手以為容負繩抱方者以直其政方其義也故易曰坤六二之動直以方也下齊如權衡者以安志而平心也正義鄭氏康成曰行舉手謂揖讓也引易言深衣之直方應易之文也政或為正心平志安行乃正或低或卬則心有異志者與孔氏穎達曰所以袂圜中規者欲使行者舉手揖讓以為容儀如規也負繩背之縫也抱方領之方也以直其正解負繩欲使人直其政敎以方其義解抱方欲使義事方正記者既眀方直之義故引坤卦之六二直方以證之裳下之齊如權之衡低卬平也方氏慤曰規矩者方圜之體方圜者規矩之用自曲袷如矩以應方而下皆上言體下言用惟袂則上言用下言體盖袂之圜非其體然及舉手以為容則圜爾乃其用然也上言如矩而後言負繩以衣先後為序下言負繩而後言抱方以易直方為序且應十有二月仰觀於天也直其政方其義俯察於地也可以運肘近取諸身也應規矩繩權衡逺取諸物也案易下言君子敬以直内義以方外則上自當作直其敬也方其義也此作直其政乃敬字譌其半今易作直其正又以政字之譌而去其半耳五法巳施故聖人服之故規矩取其無私繩取其直權衡取其平故先王貴之故可以為文可以為武可以擯相可以治軍旅完且弗費善衣之次也相息亮反正義鄭氏康成曰五法已施聖人服之言非法不服也貴之貴此衣也完且弗費言可苦衣而易有也孔疏以其完牢可苦事衣著以白布為之不須黼黻錦繡是弗費而易有深衣者用十五升布孔疏與朝服相類知十五升布鍜濯灰治孔疏打洗鍜濯用灰治理使和熟也純之以采善衣朝祭之服也自士以上深衣為之次孔疏玉藻諸侯朝朝服夕深衣大夫朝𤣥端夕深衣是朝祭之次服庶人吉服深衣而已孔疏吉服自深衣以下更無餘服故知庶人同之喪服衰裳上下無差亦知庶人吉服乃深衣也陳氏祥道曰文事有爵弁服武事有韋弁服先儒以善衣為朝祭之服盖舉一端眀之也深衣異於餘服者不特衣裳連餘服幅前三後四深衣則十二幅矣餘服之帶三分帶下紳居二焉深衣之帶則當無骨者矣方氏慤曰五法皆公必以規矩言無私者方圓有天地之象其無私尤足道也聖人以徳言先王以位言有徳足以稱之故服之有位足以作之故貴之端冕則有敬色所以為文介胄則有不可辱之色所以為武然端冕不可以為武介胄不可以為文兼之者惟深衣而已然文非若端冕可以視朝臨祭也特可以賛禮而為擯相而已武非若介胄可以臨難折衝也特可以運籌而治軍旅而已制有五法故曰完案此訓完字與鄭注相備其實則布其色則白故弗費通論吕氏大臨曰深衣之用上下不嫌同名吉凶不嫌同制男女不嫌同服諸侯大夫士夕深衣庶人吉服深衣此上下同也有虞氏深衣而養老將軍文子除喪而受越人弔練冠深衣親迎女在塗壻之父母死深衣縞總以趨喪此吉凶男女同也具父母大父母衣純以繢具父母衣純以青如孤子衣純以素純袂緣純邊廣各寸半大音泰緣悦絹反廣古曠反純音準正義鄭氏康成曰尊者存以多飾為孝繢畫文也三十以下無父稱孤純謂緣之也緣袂謂其口也孔疏綠其袂口非口外別有緣緣緆也孔疏既夕鄭注在幅曰綼在下曰緆此謂深衣下緣緣邉衣裳之側孔疏深衣外衿之邉有緣裳外邉曲裾掩處亦有緣廣各寸半則表裏共三寸矣惟袷廣二寸陸氏朗曰大父母祖父母也孔氏穎達曰具父母父母俱在也大父母具亦然若其不具一存一亡不必純以繢也有父母而無祖父母故飾少而純以青若無父母惟祖父母在亦當然也吕氏大臨曰三十以下無父可以稱孤三十以上有為人父之道不言孤也陳氏祥道曰具父母大父母純以繢備五采以為樂也具父母純以青體少陽以致敬也孤子純以素存凶飾以致哀也小祥純以縓則大祥緣以布吉時夕服緣以采方氏慤曰褏口謂之袂裳下謂之緣衣側謂之邉其純皆寸半三五之數也總論朱子曰深衣裁用細白布度用指尺中指中節為寸衣二幅不裁其長過脇下屬於裳用布二幅中屈而下垂之如今之直領衫但不裁破腋下每幅之下屬裳三幅裳交解十二幅上屬於衣其長及踝用布六幅每幅裁為二幅一頭廣一頭狹狹頭當廣頭之半以狹頭向上而聨其縫以屬於衣每三幅屬衣一幅圓袂用布二幅各中屈之如衣之長屬於衣之左右而縫合其下以為袂其本之廣如衣之長而漸圓殺之以至袂口則其徑一尺二寸方領兩襟相掩衽在腋下則兩領之㑹自方曲裾用布一幅如裳之長交解裁之曡兩廣頭並令向上布邉不動但稍裁其内旁大半之下令漸如魚腹末如鳥喙内向而緝之相㳫綴於裳上之右旁以掩裳際右幅在下左幅在上布邉在外裁處在内案朱子晚嵗所著深衣去舊説曲裾之制而不用兹姑存之以備考耳衣裳皆緣緣用黑繒具父母以青大父母以繢領表裏各二寸裳下及邊表裏各一寸半皆就布緣袂口表裏亦一寸半布外接出大帶帶用白繒廣四寸夾縫之其長圍要而結於前再繚之而為兩耳及垂其餘為紳下與裳齊以繒緣其紳之兩旁及下表裏各半寸如緣之色復以五綵縧廣二寸約其相結處長與紳齊投壺第四十正義孔氏穎達曰案鄭目録云名曰投壺者以其記主人與客燕飲講論才藝之禮也此於別録屬吉禮亦實曲禮之正篇是投壺與射為類此於五禮宜屬嘉禮也或云宜屬賓禮司馬氏光曰投壺細事聖人取之以為禮用諸鄉黨用諸邦國其故何哉鄭康成曰投壺射之細也君子射以觀徳為其心平體正端一審固然後能中故也夫審度於此而取中於彼仁道存焉疑畏則疎惰慢則失義方象焉左右前却過分則差中庸著焉得一失二成功盡棄戒懼眀焉是故投壺可以治心可以脩身可以為國可以觀人古者壺矢之制揖讓之容今雖闕焉然其遺風餘象猶可彷彿也吕氏大臨曰燕飲有射以樂賓且以習容以講藝也庭之脩廣或不足以張侯置鵠賔客之衆或不足以備官比耦則弧矢之事不能行而比禮比樂志正體直所以觀徳者猶在此先王所以不廢也應氏鏞曰壺之為器所以實酒而置之席間者也春秋曰尊以魯壺周官曰其朝獻用兩壺禮器曰五獻之尊門内缶門外壺其始必於燕飲之閒謀以樂賔或病於不能射也舉席閒之器以寄射節焉投壺以為樂猶擊缶以為樂也以所飲之壺寓所投之矢制禮者因為之節文且用樂以宣達其情此投壺所由興也陳氏澔曰此為大夫士投壺之禮然左𫝊載晉侯與齊侯燕投壺則諸侯亦有之投壺之禮主人奉矢司射奉中使人執壺奉上聲正義鄭氏康成曰矢所以投者也中士則鹿中也孔疏鄉射記云大夫兕中士鹿中中之形刻木為之狀如兕鹿而伏背上立圜圈以盛算鄭不云兕中畧之也於陳氏祥道曰投壺禮輕射故但用中之下而已射人奉之者投壺射之類也其奉之西階上北面孔疏皆在西階上欲就賔處也孔氏穎達曰主人阼階之上西面奉持其矢中謂受算之器鄉射禮司射升自西階階上北面此奉中亦然使人執壺於司射之西北面惟云使人不言官者以賤畧之也知是大夫士禮者以經云主人請賔是平敵之辭若諸侯則燕禮大射每事云請於公不云主人請賔也非諸侯禮而經云奏貍首者別取燕飲之義其諸侯相燕亦有投壺故左𫝊云晉侯與齊侯燕投壺然則天子亦有之但古禮亡無以知也方氏慤曰矢將以授賔故主人奉之中將以待𫉬故司射奉之壺將以待投故使人執之而已曰使人不必有攸司夫人而為之可也中必象獸形者以服猛為義因而為隆殺猶侯用虎豹之屬爾必謂之中者以中為善故也奉之使司射所投謂之矢皆以是而已存疑孔氏穎達曰執壺之人賤於司射故在司射之西以凡行禮統於主人雖俱在西階而當尊東故燕禮大射宰夫代公為主人與賔俱升西階而主人在東也案主人在阼司射等當自西階東從主人於尊東安得云俱在西階且西階亦不得云當尊東總論孔氏穎達曰自此至曰辟論燕禮説屨升堂之後主賔請投辭受之節主人請曰某有枉矢哨壺請以樂賔賓曰子有㫖酒嘉殽某既賜矣又重以樂敢辭主人曰枉矢哨壺不足辭也敢固以請賓曰某既賜矣又重以樂敢固辭主人曰枉矢哨壺不足辭也敢固以請賔曰某固辭不得命敢不敬從賓再拜受主人般還曰辟主人阼階上拜送賓般還曰辟哨七笑反樂音洛般盤同還旋同辟避同大戴上無某既賜矣句下作某賜㫖酒嘉殽正義鄭氏康成曰燕飲酒既説屨升坐孔疏燕禮取爼以出卿大夫皆降賔反入及卿大夫皆説屨升席羞庶羞之後乃云若射知此亦然也若鄉射則在飲酒未旅前以詢衆庶禮重故早也主人乃請投壺也否則或射所謂燕射也枉哨不正貌為謙辭孔疏枉謂曲而不直哨謂哨峻不正固之言如故也言如故辭者重辭也不得命不以命見許也賔再拜受拜受矢也主人既辟進授矢兩楹之間也拜送送矢也辟亦於其階上孔氏穎達曰賔既許主人投壺賔乃於西階上北面再拜遙受矢也主人見賔拜乃般還曲折還謂賓曰今辟而不敢受言此者欲止賓之拜也於是賓及主人皆来兩楹之間相就俱南面主人在東授矢與賔主人復歸阼階上北面拜送矢賔亦歸西階上般還而告主人曰今辟而不敢受亦以止主人拜也鄉飲酒鄉射拜受爵送爵皆北面知此亦當北面吕氏大臨曰投壺禮有加於射禮者不敢以禮殺而紓吾敬也燕樂而不淫禮殺而敬不衰此徳所以脩交所以久也存疑熊氏安生曰拜時般還或可東西面相拜曰辟者是賛者来辭告主人及賔言曰辟案鄉射有司請射賔對曰某不能為二三子許諾有司授弓矢無主賔授受拜辟諸文者盖弓矢主賔自取不必授受也又射禮賈氏公彦疏云投壺因燕而為之此為衆習禮不専為已也盖鄉射公事投壺情好也君子不以情好而為狎故其辭彌恭其節彌謹右請投已拜受矢進即兩楹閒退反位揖賔就筵正義鄭氏康成曰主人既拜送矢又自受矢進即兩楹閒者言將有事於此也退乃揖賔即席欲與偕進眀為偶也賔席主人席皆南鄉間相去如射物孔疏物謂射者所立之處物長三尺闊一尺二寸兩物東西相去容一弓故郷射記云物長如笴其間容弓距随長武注云笴長三尺距随者物横畫也孔氏穎達曰此眀賔主受矢就筵之節主人拜送矢之後主人賛者持矢授主人主人於阼階受矢既受矢之後来就兩楹間看投壺處所乃却退反阼階之位西面揖賔令就投壺之筵相對為位而共投壺也右就筵司射進度壺間以二矢半反位設中東面執八算興請賓曰順投為入比投不釋勝飲不勝者正爵既行請為勝者立馬一馬從二馬三馬既立請慶多馬請主人亦如之度徒洛反比毗志反飲去聲大戴無以二矢半四字首作請於賔曰投壺之令曰正義鄭氏康成曰度壺度其所設之處也壺去坐二矢半則堂上去賔席主人席邪行各七尺也反位西階上位也設中東面既設中亦實八算於中横委其餘於中西執算而立以請賔俟投請猶告也順投矢本入也比投不拾也勝飲不勝言以能養不能也正爵所以正禮之爵也或以罰或以慶馬勝算也謂之馬者若云技藝如此任為將帥乗馬也射投壺皆所以習武因為樂孔氏穎達曰此眀度壺設算告賔之法進度壺者司射於西階上執壺之人處受壺乃東向来賔主筵前進量度其壺置於賔主筵南也投壺日中於室日晚於堂大晚於庭各随光眀故也矢有長短随地廣狹而度壺皆使去賔主之席二矢半也室中去席五尺堂上去席七尺庭中去席九尺司射度壺既畢更還西階上位取中稍進東面而設中也於中西東面手執八算而興起其中裏亦實八算矢有本末投矢於壺以矢本入者乃名為入為之釋算若矢以末入則不名為入不為之釋算比頻也賔主投壺要更遞而投不得以既入喜悦而己頻投頻投雖入亦不為之釋算也正爵此謂罰爵然慶罰皆正禮也既行謂正爵竟也立馬謂取算以為馬表勝數也每一勝輒立一馬禮以三為成但勝偶未必得三得二即徹取劣偶之一以足勝偶之二為三故云一馬從二馬定本無此一句三馬既立請慶多馬者其勝已成又酌酒慶賀多馬之偶也云亦如之者司射請賔之黨每事必應曰諾既竟則司射又悉以告主人主人應諾亦悉如賔也吕氏大臨曰矢本入則本末之序正左右拾投則賔主之儀答不如是不釋算所以責審固詳節文所以觀人之徳不尚於茍中也方氏慤曰凡射人各四矢四矢則四算投壺亦如之賔與主則八算矣故此言執八算也數成於三故三馬既立請慶多馬通論孔氏穎達曰案鄉射禮三耦先射賔主乃射以射禮重也此投壺不立三耦以投壺禮輕故也案射禮主人為下射賔為上射然則此亦賔黨為上投主黨為下投矣存異陸氏佃曰比投引手就壺使入後世投壺坐欲四縣恐其比入也案比投與拾投相反陸說非方氏慤曰算與馬一也方其執之謂之算以計多少為義及其釋之謂之馬以勝敵為義姚氏舜牧曰投壺與射皆三番而止每番勝則立一馬若將所執八算立一馬則止七算在手立二馬則止六算在手萬一賔主皆中止釋六算乎愚以算自是算馬自是馬案算言釋馬言立下言馬各直其算則算非馬可知特無以考其形制之詳耳漢人格法有功馬散馬皆刻馬象而植之晉人掘地得玉馬或以為此即投壺所立之馬也若姚氏慮以算為馬將不足於釋則更誤儀禮鄉射記箭籌八十注籌算也八十畧以十耦為正也故一耦射則實八算於中是算之全數有八十臨射則計耦而供之如四耦則供三十二算三耦則供二十四算也豈止八算而已乎右請賓案此投壺定法而司射以告賓主之辭吳氏澄分設壺設中為一節請賓請主為一節命弦者曰請奏貍首間若一大師曰諾間閒厠之間又去聲大音泰正義鄭氏康成曰弦鼓瑟者孔疏鄭知鼓瑟者約鄉射禮用瑟也案下有魯鼓薛鼓節亦有鼓以弦為重故特云命弦者貍首詩篇名今逸射義所云曾孫侯氏是也案射義貍首詩曰曽孫侯氏四正具舉大夫君子凡以庶士小大莫處御于君所以燕以射則燕則譽閒若一者投壺當以為志取節焉孔疏閒若一謂前後樂節中閒疏數如一也投壺者當聽之以為志取投合於樂節也孔氏穎達曰此眀司射命工作樂節投壺之儀諾承領之辭吕氏大臨曰貍首之詩言賔主以禮相㑹也猶瓠葉兎首不敢以微薄廢禮而忘驩也賔主之驩於是乎交非特諸侯之事故卿大夫士亦得用也方氏慤曰以弦歌貍首故命弦者奏之閒者樂之節欲其終始相協故曰若一通論孔氏穎達曰案鄉射三番初一番耦射不釋算第二番釋算未作樂第三番乃用樂今投壺發初即用樂者以投壺禮輕主於歡樂故也非諸侯投壺而奏貍首者義取燕飲之儀猶鄉射奏騶虞不計人之尊卑也陸氏佃曰鄭氏謂弦鼓瑟者也鄉飲酒記曰工四人二人瑟瑟先鄉射盖亦命弦者變言大師重鄉射也存疑陸氏佃曰閒若一言或間亦或一也間若間歌一歌一奏閒一無閒焉以為樂也非以為節也案閒字作中閒之閒孔疏甚眀陸氏解為閒歌之間非也投壺或於室或於堂於庭時有堂上堂下異樂乎亦迂矣右作樂案此亦司射命樂工之辭朱子以後魯鼓薛鼓繫此下故云然其歌與鼓以為投節也左右告矢具請拾投有入者則司射坐而釋一算焉賔黨於右主黨於左拾音渉正義鄭氏康成曰拾更也告矢具請更投者司射也司射東面立釋算則坐以南為右北為左也孔疏右謂司射之前稍南左謂司射之前稍北已投者退各反其位孔疏反位謂主黨於東賔黨於西也鄉射禮射畢各反其位則知投壺畢亦各反其位辟後来也孔氏穎達曰此論投壺中者釋算之儀左謂主人右謂賔客司射告主與賔以矢具也請拾投者司射又請賔主更遞而投也若矢入壺則司射乃坐釋一算於地方氏慤曰拾者更也與曲禮言拾級喪禮言拾踊同義賔黨於右主黨於左者主人尊賔故也凡言左右以右為尊陳氏澔曰主賔席皆南鄉主居左賔居右案此一節正投之事賔主投畢則賔主之黨繼投其釋算亦各從其黨或謂算釋於中孔云釋於地誤攷鄉射禮釋𫉬者執中一人執算從之釋獲者坐設中受算坐實八算於中横委其餘於中西南射中則釋一算於地賔主射畢有餘算則反委之仍於中西南又改實八算於中以待繼射者是算先實於中後釋於地孔不誤也卒投司射執算曰左右卒投請數二算為純一純以取一算為竒遂以奇算告曰某賢於某若干純奇則曰奇鈞則曰左右鈞數色主反純音全奇居衣反大戴作有勝則司射以其算告正義鄭氏康成曰卒已也賔主之黨畢已投司射又請數其所釋左右算如數射算一純以取實於左手十純則縮而委之每委異之有餘則横諸純下一算為奇奇則縮諸純下兼斂左算實於左手一純以委十則異之其他如右獲畢則司射執奇算以告於賔與主人也孔疏皆鄉射禮文若告云某賢於某者未斥主黨勝與賔黨勝與以勝為賢尚技藝也鈞猶等也等則左右手各執一算以告孔氏穎達曰此眀投壺算數之儀司射於壺西東面執算請也純全也二算合為一全一純則別而取之一算謂不滿純者奇隻也遂以奇算告者奇餘也謂左右數鈞等之餘算或左或右不定故稱某賢賢為勝者也勝者若有雙數則云若干純假令十算則云五純也鈞猶等也等則左右各執一算以告司射東面則東西為縮每十雙則東西縮為一委每有十雙更別委之故曰每委異之有餘謂不滿十雙或八雙九雙以下則横於十純之西南北置之若惟有一算則縮之零純之下在零純之西東西置之此數右算之法若數左算則總斂地之算實於左手每一純取以委地滿十則異之謂滿十純則總為一委其他所縱所横如右𫉬也方氏慤曰干猶枚也與服衣若干尺之干同存疑孔氏穎達曰若有奇數則曰奇假令九數則曰九竒也辨正朱子曰孔疏勝於儀禮賈疏然恐是九算則曰四純一奇右請投視算案吳氏澄分拾投釋算為一節卒投數算為一節命酌曰請行觴酌者曰諾當飲者皆跪奉觴曰賜灌勝者跪曰敬養奉芳勇反養羊尚反大戴首作司射舉手曰勝者之弟子為不勝者酌諾下有已酌皆請舉酒六字正義鄭氏康成曰司射又請於賔與主人以行正爵酌者勝黨之弟子升酌奠於豐上不勝者坐取乃退而跪飲之孔疏據鄉射禮文灌猶飲也言賜灌者服而為尊敬辭也周禮曰以灌賔客賜灌敬養各與其偶於西階上如飲射爵孔氏穎達曰此眀飲不勝之儀司射命此酌酒者曰敬以請賔與主人行觴謂罰爵之事賔主已許汝當酌之勝黨弟子受領許酌乃於西階上南面設豐洗觶升酌坐奠於豐上勝者與不勝者俱升西階勝者在東不勝者跪取豐上之爵手奉其觴曰䝉賜灌勝者跪執之曰敬以此觴而養不能也鄉射禮弟子奉豐升設於西楹之西勝者之弟子洗觶升酌南面坐奠於豐上是也吕氏大臨曰勝飲不勝者以能養不能也君使士射不能則辭以疾射者男子之事故以不能者為病病必有養當飲者跪奉觴曰賜灌勝者跪曰敬養酒者所以養病也能者不敢以勝驕人爭求勝而辭養也不能者知不勝為已病不敢以已有病而辭養也馬氏睎孟曰奉觴曰賜灌受之以禮而不怨勝者跪曰敬養獻之以禮而不矜右卒投飲不勝者正爵既行請立馬馬各直其算一馬從二馬以慶慶禮曰三馬既備請慶多馬賔主皆曰諾正爵既行請徹馬大戴首有司正曰三字又請下有為勝者三字正義鄭氏康成曰飲不勝者畢司射又請為勝者立馬當其所釋算時也三立馬者投壺如射亦三而止也三者一黨不得三勝其一勝者并其馬於再勝者以慶之眀一勝不得慶也飲慶爵者偶親酌不使弟子無豐孔疏飲不勝之時賤其無能故不親酌今既尊賢當須親酌手自授之也請徹馬投壺禮畢可以去其勝算也既徹馬無算爵乃行孔氏穎達曰此眀立馬以表賢能之事正爵謂正禮罰酒之爵既行飲畢之後司射請為勝者樹標其馬直當也謂所立之馬各當其初釋算之前所釋之算當中之西也賔主或兩勝或一勝即以少足益於多助勝者為榮以慶賀多馬馬氏睎孟曰立馬以表其勝徹馬以掩其不勝則投壺一用而禮義為備也應氏鏞曰勝者豈能全勝將有缺而不足之算不勝者間有所得必有棄而不録之算取不勝者不用之馬而補勝黨未足之算則零算不遺而勝算有助所以成人之羙所以遜已之能以與人也通論孔氏穎達曰案鄉射禮初番三耦射但唱𫉬而已未釋算亦未飲不勝者第二番耦射畢賔主之黨皆射畢乃釋算飲不勝者第三番三耦及賔主等皆射中鼓節乃釋算飲卒觶今投壺初則不立三耦惟賔主三番而止案三番左右鈞則皆無立馬行爵者然適鈞者最少故不言且禮以樂賔或即行相慶禮也右三投慶多馬案吳氏澄以上罰爵為一節此分立馬慶爵徹馬為三節以上投壺禮之正經算多少視其坐籌室中五扶堂上七扶庭中九扶算長尺二寸壺頸脩七寸腹脩五寸口徑二寸半容斗五升壺中實小豆焉為其矢之躍而出也壺去席二矢半矢以柘若棘毋去其皮大戴其坐下有既算周則復始句其皮下有大七分三字正義鄭氏康成曰算用當視坐投壺者之衆寡為數也投壺者人四矢亦人四算籌矢也鋪四指曰扶一指案寸春秋𫝊曰膚寸而合孔疏引公羊𫝊文證膚與扶同投壺者或於室或於堂或於庭其禮䙝随晏早之宜無常處算長尺二寸其節三扶可也或曰算長尺有握握數也脩長也實以小豆取其滑且堅矢以柘棘取其堅且重也舊説矢大七分或以棘取無節孔氏穎達曰此眀算及矢長短多少并壺之大小及矢之所用以儀禮準之此亦正篇之意算之多少視其所坐之人每人四矢四算也吕氏大臨曰五扶七扶九扶其多少之數以廣狹為之差皆陽數也壺頸脩七寸腹脩五寸口徑二寸半容斗五升壺去席二矢半亦陽數也算長尺二寸天數也君子之所法象必本諸天求諸陽因節文而託其義雖小事有所不廢也方氏慤曰謂之籌者以計多少為義謂之矢者以觀中否為義算長尺二寸者欲其有别於矢故加二寸焉通論陳氏祥道曰先王制禮未嘗無所因焉故室中必用几而因几以度室堂上必用筵而因筵以度堂野外必用歩而因歩以度野投壺用指而已故因指以度籌存疑鄭氏康成曰腹容斗五升三分益一則為二斗孔疏以斗五升故加三分益一從整數計之得圜囷之象積三百二十四寸也以腹脩五寸約之所得求其圜周圜周二尺七寸有奇是為腹徑九寸有餘也辨正朱子曰經言所容止於斗有五升而注乃以二斗釋之經言圜壺之實數注乃借方體言之算法所謂虚加之數也盖壺為圜形斗五升為奇數皆繁曲而難計故算者之術必先借方形虚加整數以定其法然後四分去一以得圜形之實此鄭氏所以舎斗五升之經文而直以二斗為説也然其言知借而不知還知加而不知減乃於下文遂并方體之所虚加以為實數又皆必取全寸不計分釐定為圜壺腹徑九寸而圍二尺七寸則為失之疏家雖知其失而依違其間是以讀者不能無疑今以算法求之此言二斗之量者計其積實當為三百二十四寸而以其髙五寸者分之則每髙一寸為廣六十四寸八分此六十四寸者為正方又取其八分者割裂而加於正方之外則四面各得二釐五毫之數乃復合此六十四寸八分者五為一方壺則其髙五寸其廣八寸五釐而外方三尺二寸二分中受二斗如注之初説矣然此方形者算術所借以為虚加之數爾若欲得圜壺之實數則當就此方形規而圜之去其四角虛加之數四分之一使六十四寸八分者但為四十八寸六分三百二十四寸者但為二百四十三寸則壺腹之髙雖不減於五寸其廣雖不減於八寸五釐而其圍則僅為二尺四寸一分五釐其中所受僅為斗有五升如經之云無不諧會矣魯令弟子辭曰毋幠毋敖毋偝立毋踰言偝立踰言有常爵薛令弟子辭曰毋幠毋敖毋偝立毋踰言若是者浮幠音呼敖去聲幠大戴作荒正義鄭氏康成曰弟子賔黨主黨年穉者也為其立堂下相䙝慢司射戒令之謂魯薛者禮衰乖異不知孰是也幠敖慢也偝立不正向前也踰言逺談語也常爵常所以罰人之爵也浮亦謂是也晏子春秋曰酌者奉觴而進曰君令浮晏子時以罰梁丘據孔疏引以證浮是罰爵之義小爾雅云浮罰也浮或作匏或作符踰或為遙孔氏穎達曰此一篇是周公正經而有魯薛之事者記者以周衰之後魯與薛有當時投壺號令弟子之異未知孰是故因以記之浮罰之爵薛令弟子異於魯其意則同吕氏大臨曰飲晏之間易狎童子之心易流令之所以飭其敬不令而責之敬則近於暴故令之而後浮方氏慤曰前曰正爵此曰常爵何也以禮言則曰正以法言則曰常前兼於慶故以禮言之此主於罰故以法言之存疑陸氏佃曰魯同姓之親也薛異姓之親也記魯令著所以待同姓之禮如此故曰有常爵記薛令著所以待異姓之禮如此故曰若是者浮盖曰若是者浮則辭有不婉矣案大戴禮投壺篇與此篇小異不知孰為周初本文盖記者各以意脩潤也司射庭長及冠士立者皆屬賓黨樂人及使者童子皆屬主黨大戴上有堂下司正四字下有降揖句見後注疏此節在盡用之為射禮下今從陳氏澔本正義鄭氏康成曰庭長司正也孔疏案鄉飲酒將旅之時使相為司正察飲酒不如儀者故知庭長司正也使者主人所使薦羞者樂人國子能為樂者孔疏以國子習樂故云國子能為樂者眀此樂人非瞽矇眡瞭之徒以其能與主人之黨而觀禮也此皆與於投壺孔氏穎達曰冠士者謂外人来觀投壺成人加冠之士尊之故令屬賔黨若童子賤則屬主黨也陳氏祥道曰主人以仁接賔則樂人樂賔者也使者及童子事人者也故屬主黨司射作人者也庭長正人者也冠士行禮者也立者觀禮者也故屬賔黨壺以授矢致樂者也故主黨執之中以盛算取勝者也故賔黨奉之然黨雖有賔主之辨而主黨之樂人必位於西階之上使人執壺亦立於司射之側凡皆所以就賔又曰侍射則約矢侍投則擁矢是投壺與射禮無異特繁簡不同爾鼓吳澄本作半吳澄本少一一魯鼓半薛鼓取半以下為投壺禮盡用之為射禮魯鼓半大戴禮下尚有一一朱子從之薛鼔半正義鄭氏康成曰此魯薛擊鼓之節兩家之異故前後兼列之圜者擊鼙方者擊鼓古者舉事鼔各有節聞其節則知其事矣投壺之鼓半射節者投壺射之細也射謂燕射孔氏頴達曰每一圜㸃則一擊鼙每一方㸃則一擊鼓頻有圜㸃則頻擊鼙頻有方㸃則頻擊鼔此射與投壺相對用半鼓節為投壺用全鼓節為射禮投壺在室在堂是燕樂之事故知此射亦謂燕射非謂大射及鄉射也方氏慤曰魯薛之鼓既異而𫝊之者又異故記者兩存之陳氏祥道曰魯薛所令之辭所制之鼓雖見於經其詳不可得知也觀春秋齊晉之君以此行燕禮為會同之主於其中否以卜興衰其重投壺之禮如此則魯薛之詳亦不是過也存疑陸氏佃曰魯投壺之鼔多薛投壺之鼓少亦所以待同姓異姓之別也詩曰在宗載考有是哉案魯薛鼔各有二者前為初投之節後為再投三投之節也鼓以君樂五聲不得不和升歌下管閒歌合樂無不用鼓者故魯鼓薛鼓總以鼓名之也案以上投壺禮之記朱子分五節各次本經下大戴記降揖其阼階及樂作皆與射同節少儀記侍投則擁矢勝則洗而以請客亦如之不角不擢馬朱子并採入記故附存之儒行第四十一行下孟反正義孔氏穎達曰案鄭目録云名曰儒行者以其記有道徳者所行也此於別録屬通論又曰孔子説儒凡十七條上十五條皆言賢人之儒第十六條眀聖人之儒十七條之儒是夫子自謂也吕氏大臨曰儒者之行一出於義理皆吾性分所當為非以自多求勝於天下也此篇之説有矜大勝人之氣少雍容深厚之風有道者不為也謂孔子言之殊可疑然其言不合於理義者殊寡學者果踐其言亦不愧於為儒矣此先儒所以存於篇也與魯哀公問於孔子曰夫子之服其儒服與孔子對曰丘少居魯衣逢掖之衣長居宋冠章甫之冠丘聞之也君子之學也博其服也鄉丘不知儒服與平聲少詩照反上衣去聲長丁丈反上冠去聲正義鄭氏康成曰哀公館孔子見其服與士大夫異又與庶人不同疑為儒服而問之逢猶大也孔疏詩維柞之枝其葉逢逢盛大貌大掖之衣孔疏大掖肘掖之寛大袂襌衣也此君子有道藝者所衣也孔子生魯長而之宋而冠焉宋其祖所出也衣少所居之服冠長所居之冠是之謂鄉言不知儒服非哀公意不在於儒乃今問其服孔疏末言不敢以儒為戲是此時意欲戲孔子庶人襌衣袂二尺二寸袪尺二寸吕氏大臨曰少居魯則衣魯衣長居宋則冠宋冠因其俗而巳故曰其服也鄉又曰古衣服之制上下皆有等差末世僣亂上下無别儒者獨守法度故人以儒服目之方氏慤曰逢掖之衣王肅以為深衣是矣公西赤掌孔子之喪用章甫之冠則孔子之冠衣固如是也君子之學也博無狹其所居也其服也鄉不忘其所本也晏氏光曰君子恥服其服而無其行能博學則有其徳以成徳為行然後可稱其服也通論孔氏穎達曰案曲禮云去國三世惟興之日從新國之法孔子曾祖防叔防叔生木金木金生伯夏伯夏生梁紇梁紇生孔子防叔奔魯至孔子五世應從魯冠而猶著殷章甫冠者以立為制法之主故孔子於人所行之事多殷禮不與尋常同也存疑孔氏穎達曰大夫以上侈袂袂三尺三寸袪尺八寸朝祭之服表裏不襌庶人無朝祭事故襌今孔子襌與庶人同袂大與庶人異故公怪之案大掖之衣是宋國之制如此如疏説似孔子有心以示異矣大夫侈袂説本周官注然不見所據哀公曰敢問儒行孔子對曰遽數之不能終其物悉數之乃留更僕未可終也哀公命席孔子侍行去聲篇内並同數色主反正義鄭氏康成曰物事也僕太僕君燕朝則正位掌擯相更之者為久將倦使之相代命席為孔子布席於堂與之坐也君適其臣升自阼階所在如主案君適其臣語似公就孔子者據疏云時孔子自衛新還哀公館之故鄭説如此孔氏穎達曰言儒行深逺急説則不能盡其事若細説則太久僕侍疲倦宜更代之未可盡也晏氏光曰以禮嚴分則君坐而臣立以道忘分則坐而論道哀公與孔子論儒行是坐而論道故命席而孔子侍坐焉曰儒有席上之珍以待聘夙夜强學以待問懐忠信以待舉力行以待取其自立有如此者正義鄭氏康成曰懐忠信之徳以待見舉用也取進取位也孔疏進取榮位之案取謂上取之我自立其徳而君自来聘問之舉之取之所謂待賈者也孔氏穎達曰此論儒者脩己立身之事盧氏植云儒是坐席之珍可重晏氏曰君子比徳於玉故稱珍焉徐氏師曽曰席珍喻詞言人身之有徳猶席上之有珍也吕氏大臨曰席上之珍自貴而待賈者也徳之可貴人必禮之學之博者人必問之忠信可任人必舉之力行可使人必取之陸氏佃曰席上之珍若伊尹樂堯舜之道於畎畝之中是已方氏慤曰忠信非由外鑠也故言懐忠信力行在我之事舉取在彼之事也晏氏光曰蔵器於身則玉韞於匵中及其待時而動則珍陳於席上夙在日出之前於此而學是先衆人而有作夜在日入之後於此而學是後衆人而未息也席上之珍其徳可貴夙夜强學其道可尊二者有師道焉故曰待聘待問懐忠信其言有物力行其行有常二者有臣道焉故云待舉待取君子未嘗屈道以伸身必待彼之聘問舉取然後徐起而應之存疑鄭氏康成曰席陳也孔疏猶鋪陳也珍善也鋪陳往古堯舜之善道以待聘召案鋪陳待聘似有衒玉求售之意鄭説未協儒有衣冠中動作慎其大讓如慢小讓如偽大則如威小則如愧其難進而易退也粥粥若無能也其容貌有如此者易以豉反下同粥音燭正義鄭氏康成曰中中間謂不嚴厲也孔疏在常人中不自異也猶張子曰中去聲謂中於禮下陳氏澔曰中正也案三説皆通並與吕氏説相足如慢如偽言之不愊怛也孔疏愊怛急切之意如威如愧如有所畏孔氏穎達曰此眀儒者容貌之事人以大物與己己讓此大物辭貌寛緩如傲慢然讓小物如似詐偽亦謂寛緩不急切言儒不以利動也行大事時形貌似有畏懼行小事時如有慙愧皆謂重慎自貶損粥粥是柔弱専愚之貌張子曰大讓如讓國讓天下誠心而讓其貌若不屑也若夫飲食辭辟之間是小讓也如偽為之以為儀爾吕氏大臨曰辭其大者若自尊然非自尊也尊道也辭其小者若矯飾然非矯飾也欲由禮也由尊道而不屈於世若有所威由禮而不犯非禮若有所愧此儒者所以貴於天下也衣冠中不異於衆不流於俗而已動作慎非禮勿履而已方氏慤曰三揖而後進故曰難進一辭而遂退故曰易退粥粥者柔弱之狀若無能也是皆禮之所脩道之所與也存疑陸氏佃曰大則小則猶言大讓小讓讀如敬慎威儀唯民之則之則吳氏澄曰則謂守法不踰閑也於事之大者如有所畏而不敢為於事之小者如有所恥而不肯為案容貌徳之符故從衣冠動作間想其辭讓中節處而平日審取舎守義命之學問在其中儒有居處齊難其坐起恭敬言必先信行必中正道塗不爭險易之利冬夏不爭隂陽之和愛其死以有待也養其身以有為也其備豫有如此者齊側皆反難乃旦反行去聲先信家語作誠信正義鄭氏康成曰齊難齊荘可畏難也行不爭道止不選處所以逺鬬訟孔氏穎達曰塗路也君子行道路不與人爭平易之地而避險阻以利已冬温夏涼是隂陽之和處此世人所競唯儒者讓而不爭也愛死非解不爭也愛死以待眀時養身為行道徳張子曰難者恭慎也書其難其慎言必先信思可信然後言陸氏佃曰難猶戒也洗心曰齊防患曰難方氏慤曰居處齊難則人斯齊難之坐起恭敬則人斯恭敬之言先信則人斯取信矣行中正則人斯中正矣以至不爭其利故人資其利不爭其和故人飲其和愛其死故足以有待養其身故足以有為若是則非有待物之備先物之豫固不足以致此通論吕氏大臨曰仲弓問仁孔子敎以敬恕此居處四句敬也道塗二句恕也唯敬與恕則忿懲慾窒身立徳充可以當天下之變而不避任天下之重而不辭儒有不寶金玉而忠信以為寶不祈土地立義以為土地不祈多積多文以為富難得而易禄也易禄而難畜也非時不見不亦難得乎非義不合不亦難畜乎先勞而後禄不亦易禄乎其近人有如此者積子賜反易以豉反畜許六反見賢徧反立義家語作仁義近人下有情字正義鄭氏康成曰祈求也立義以為土地以義自居也難畜難以非義久㽞也勞猶事也積或為貨孔氏穎達曰此眀儒者懐忠信與義之事儒懐忠信而與人交不貪金玉而與人競人則親而近之積積聚財物也非道之世則不仕是難得也先事後食是易禄也無義則去是難畜也非時謂非眀時其親近於人如此吕氏大臨曰志非不欲行也時止則止時行則行不可必其見也道非不欲合也非其義也一介不以取諸人不可必其合也難得難畜主於義以自貴然時而行義而合勞而食未始逺於人而自異也彭氏曰難得指未仕時易禄難畜指既仕時黄氏乾行曰寶忠信存心也立義行己也多文學問也案得難則禄之必難而禄養之又易祿易則畜之必易而久畜之又難觀其難得難畜似逺人而觀其易禄正自近人孔子有見行可之仕際可之仕公養之仕又嘗曰吾非斯人之徒與而誰與則其難得難畜亦原非逺人故曰近人有如此者儒有委之以貨財淹之以樂好見利不虧其義劫之以衆沮之以兵見死不更其守鷙蟲攫搏不程勇者引重鼎不程其力往者不悔来者不豫過言不再流言不極不斷其威不習其謀其特立有如此者淹衣亷反樂五孝反好呼報反沮在吕反更平聲鷙音至攫俱縳反斷直卵反勇者家語作其勇正義鄭氏康成曰淹謂浸漬之劫劫脅也沮謂恐怖之鷙蟲猛鳥猛獸也字從鳥鷙省聲也孔疏蟲鳥獸通名獸摯字從執下著手鳥鷙字從執下著鳥今一鷙字而包兩義故曰省聲以脚取謂之攫以翼擊謂之搏程猶量也重鼎大鼎也不再猶不更也不極不問所從出也不斷其威常可畏也不習其謀口及則言不豫其説而順也孔氏穎達曰此眀特立不羣之事人或以貨財委之以愛樂玩好浸漬之儒者雖見此利不虧損己之義事茍且而愛也人或脅之以軍衆沮之以兵刃儒者雖見劫見沮以致於死終不改其所守之志而茍從之免死也有愆過之言不再為之聞流𫝊之言不窮其根本聞之則解也斷絶也不絶其威嚴容止常可畏也逢事則謀不豫習也吕氏大臨曰鷙蟲攫搏不程其勇者自反而縮千萬人吾往也引重鼎不程其力者仁之為器重舉者莫能勝也其自任也不知其力之不足也過言不再知之未嘗復行也方氏慤曰不程勇以況儒者勇足以犯難而無所顧也不程其力以況儒者材足以任事而有所勝也往者不悔非有所吝而不改也為其動足以當理而未嘗悔来者不豫非有所忽而不防也為其機足以應變而不必豫爾過言不免乎出一之為甚矧可貳乎流言不免乎聞止之以知詎可窮乎姚氏舜牧曰委是出入之恣淹是浸灌之深存疑鄭氏康成曰搏猛引重不量勇力堪之與否當之則往也孔疏攫搏引鼎喻艱難之事不豫度量而往此實暴虎之事而得為儒者如孔子夾谷之㑹却莱兵斬侏儒也雖有負者後不悔也所未見者亦不豫備平行自若也晏氏光曰搏鷙蟲引重鼎者人皆以為勇力吾不與之程計胡氏銓曰彼雖有勇力然不敢與儒者程量吕氏大臨曰往者不悔幾於所過者化来者不豫㡬於所存者神流言不極不倡游言也不斷其威将至於儼然可畏不習其謀將至於不思而得張子曰流言不極不更深思極慮也案鷙蟲二句喻其進道之勇重鼎二句喻其任道之力往者不悔不以前之不合而以道徇人来者不豫不以後之可成而豫為迎合如鄭説則上四句為北宫黝之必勝次二句為孟施舎之無懼矣諸説都認定在勇力上滯矣過言不再兩言字似一例疑過言是當面數責我流言是暗布䜛沮我不再不極所謂止謗莫若自脩我増脩其徳而彼言自止也儒有可親而不可劫也可近而不可迫也可殺而不可辱也其居處不淫其飲食不溽其過失可微辨而不可面數也其剛毅有如此者數所具反正義鄭氏康成曰淫謂傾邪也恣滋味為溽溽之言欲也孔氏穎達曰儒者性既剛毅故居䖏不傾邪飲食常質不濃厚也吕氏大臨曰儒者之立立於義理而已以義交者雖疏逺必親非義加之雖强禦不畏故有可親可近可殺之理而不可劫迫辱也淫侈溢也溽濃厚也侈其居䖏厚其飲食欲勝之也欲勝則義不得立不淫不溽所以立義也方氏慤曰徳雖可親而不可劫之以力迹雖可近而不可迫之以勢身雖可殺而不可辱之以威不以四支之安而過其行不以口腹之養而汚其身微辨者諷諭之面數者指斥之凡此皆體剛而用毅也淫於居䖏溽於飲食皆人之慾也孔子曰棖也慾焉得剛存疑吕氏大臨曰其過失可微辨而不可面數一句乃尚氣好勝之言於義理未合成湯改過不吝子路聞過則喜推是心也茍有過失雖怨詈且将受之況面數乎姚氏舜牧曰彼以美情来若将親我者然而其意實主於劫彼以好禮来若将近我者然而其意實主於迫唯儒者堅持道義而潜燭其情於親近之中故彼雖以親我近我来我但自守不因而與親與近何至受其劫與迫如孔子之䖏陽貨者是也儒有忠信以為甲胄禮義以為干櫓戴仁而行抱義而處雖有暴政不更其所其自立有如此者處上聲更平聲自立家語作自守正義鄭氏康成曰甲鎧也胄兠鍪也干櫓小楯大楯也孔氏穎達曰甲胄干櫓所以禦患難儒者之忠信禮義亦以禦患難謂有忠信禮義則人不敢侵侮也戴仁而行仁之盛抱義而處義不離身雖有暴政不改其志操迥然自成立也吕氏大臨曰忠信則不欺不欺者人亦莫之欺也有禮者敬人敬人者人亦莫之侮也忠信禮義所以禦人之欺侮猶甲胄干櫓可以捍患也行則尊仁居則守義所以自信也篤雖暴政加之有所不變也自立之至者也葉氏夢得曰甲胄者自防之器忠有諸中信有諸己亦以自防也干櫓敵人之器禮以區别義以裁制亦所以敵人也仁為天下之表故戴而行義為天下之制故抱而䖏暴政者時也不更其所守者己也己之自立者乃所以應時晏氏光曰仁主於愛常患乎䁥而不尊戴仁者所以尊之義主於斷常患乎嚴而不親抱義者所以親之通論孔氏穎達曰初言自立謂强學力行而自脩此言自立謂獨懐仁義忠信吕氏大臨曰首章言自立論其所學所行足以待天下之用而不窮此章言自立論其所信所守足以更天下之變而不易二者皆自立也有本末先後之差焉馬氏曰待聘至待取亦言自立何也所待者在人所以待者在已故言自立而此防身逺害之道亦自立也胡氏銓曰前言忠信以為寶立義以為土地乃平居時此言忠信以為甲胄禮義以為干櫓則行乎患難時儒有一畝之宫環堵之室篳門圭窬蓬户甕牖易衣而出幷日而食上答之不敢以疑上不答不敢以諂其仕有如此者堵音覩篳音畢窬音豆又音㬰甕烏貢反牖音酉正義鄭氏康成曰言貧窮屈道仕為小官也宫謂牆垣也項氏安世曰宫以基言室以屋言環堵面一堵也五版為堵五堵為雉篳門荆竹織門也孔疏柴門也圭窬門旁窬也穿牆為之如圭矣并日而食二日用一日食也上答之謂君應答而用其言孔氏穎達曰此眀儒者仕宦能自執其操也徑一歩長百歩為畝若折而方之則東西南北各十歩為宅也牆方六丈故云一畝之宫環謂周迴也東西南北唯一堵蓬户謂編蓬為户又以蓬塞門謂之蓬户甕牖牕圓如甕口又云以敗甕口為牖易衣合家共一衣出則更著之也并日而食謂不日日得食君應答而用其言己則竭力不敢猜疑有言而君不用則靜黙不敢諂媚求進吕氏大臨曰儒者之仕將以事道也然有時乎為貧辭尊居卑辭富居貧居之至陋養之至不足儒者不悔也上之禮答不答繫乎知不知雖窮如是上茍知之則必以是道自期不疑乎上之未信而有所屈盖事道不為貧也上茍不知則我之以力事人求其食以免死而已若君不問而自告其謀枉尋直尺强聒而不舎人謂之不諂不信也盖為貧者非事道也二者儒者仕之大分不可亂也方氏慤曰不敢以疑者自信之篤不敢以諂者懐忠之深陳氏澔曰道合則就即信之而不疑無患失之心也不合則去即安之而不諂無患得之心也儒有今人與居古人與稽今世行之後世以為楷適弗逢世上弗援下弗推讒諂之民有比黨而危之者身可危也而志不可奪也雖危起居竟信其志猶将不忘百姓之病也其憂思有如此者稽古奚反楷苦駭反讒仕咸反比毗志反信依注讀伸正義鄭氏康成曰稽猶合也古人與合則不合於今人也援猶引也取也推猶進也舉也危欲毁害之也起居猶舉事動作信讀如屈伸之伸孔氏穎達曰此眀儒者雖身不居明代猶能憂思愛及於人之事也楷法式也上弗援不為上所引取也下弗推不為下所薦舉也雖比黨之民共危之而行事舉動終能伸己之志謀不變易也吕氏大臨曰人有知不知吾所恃者尚論古之人而有合也時有遇不遇吾所守者不喪乎本心也志有行不行吾所存者不敢忘天下也三者義理之所在至於窮不悔達不變自信之篤者也方氏慤曰與今人並行於世與古人稽合於道也今世行之後世以為楷者中庸所謂行而世為天下法是也援則自上而引下推則自下而進上私相與而為比暗相結而為黨雖危起居以其身可危也竟信其志以其志不可奪不忘百姓之病者孟子所謂天下有饑溺猶己饑溺之也葉氏夢得曰適弗逢世天也比黨危之者人也起居雖危而竟信其志天與人莫之奪也存疑鄭氏康成曰猶圖也孔疏其所圖謀不忘百姓之憂病儒有博學而不窮篤行而不倦幽居而不淫上通而不困禮之以和為貴忠信之美優游之法慕賢而容衆毁方而瓦合其寛裕有如此者行下孟反上時掌反家語無幽居二句正義鄭氏康成曰不窮不止也幽居謂獨處時也上通謂仕道達於君也既仕則不困於道徳不足也忠信之美美忠信者也優游之法法和柔者也毁方而瓦合去己之大圭角孔疏方謂物之方正有圭角鋒鋩也下與衆人小合也孔疏瓦合瓦器破而相合言儒者毁屈己之方正下同凡衆如破去圭角與瓦器相合必瓦合者亦君子為道不逺人孔氏穎達曰不淫雖復隐處常自脩整不傾邪也不困謂身通達於君既在其位必行其政使徳位相稱不為困敝也禮以體別為理人用之常患於貴賤有隔尊卑不親儒者用之則貴賤有禮而無間隔故云以和為貴見人忠信則美之見人和柔則法之見賢思齊是慕賢也汎愛一切是容衆也葉氏夢得曰博學有以貫之故不窮篤行有以至之故不倦幽居而能樂天故不淫上通而能知命故不困忠信之美充實於内優游之法遜接於外充實於内故尊賢而慕之優游於外故愛衆而容之慕賢則能毁方而為圓也容衆則能瓦合而為同也陳氏澔曰博學不窮温故知新之益也篤行不倦賢人可久之徳也幽居不淫窮不失義也上通不困達不離道也禮之體嚴而用貴於和忠信禮之質也故以忠信為美優游用之和也故以優游為法賢雖在所當慕衆亦不可不容汎愛衆而親仁亦是意也徐氏師曽曰博學二句以脩已言幽居二句以處世言禮之以和三句以立體言慕賢二句以待人言此儒者寛大長裕之行也案忠信優游鄭孔以待人言葉陳徐三家以己身言然必己有之而後能美人之美法人之法其説盖相備也儒有内稱不辟親外舉不辟怨程功積事推賢而進達之不望其報君得其志茍利國家不求富貴其舉賢援能有如此者辟同避家語程功積事下有不求厚禄句君得其志下有民賴其徳句正義鄭氏康成曰君得其志者君所欲為賢臣成之孔氏穎達曰稱舉也不辟親若祁奚舉其子午不辟怨若祁奚舉其讐解狐儒者欲舉人必程効其功積累其事知其賢乃推而進達之不求望其報也輔助其君使君得其志意所欲此推賢達士惟茍在利益國家不自求富貴也方氏慤曰不以一身之小嫌妨天下之真才故雖親也亦在所稱不以一心之私忿害天下之公義故雖怨也亦在所舉徐氏師曽曰唯程算其平日之功積累其平日之善推以為賢而進達之於上也又能下不望報於所舉之人而忘其徳我上不求利於所事之君而但欲利國夫舉賢援能始終一於至公如此非區區薦人者所可及也儒有聞善以相告也見善以相示也爵位相先也患難相死也久相待也逺相致也其任舉有如此者難乃旦反家語無此節正義鄭氏康成曰相先猶相讓也久相待謂其友久在下位不升己則待之乃進也逺相致者謂已得明君而仕友在小國不得志則相致逺也孔氏穎達曰此明儒者任舉同類前經謂疏逺者此經謂親近者逺相致逺相招致也吕氏大臨曰此任舉朋友加重於天下之士者義有厚薄故也徐氏師曽曰聞善相告見善相示欲其進徳脩業以為任舉之地居常有爵位相先之義處變有患難相死之心以堅任舉之節儒有澡身而浴徳陳言而伏靜而正之上弗知也麤而翹之又不急為也不臨深而為高不加少而為多世治不輕世亂不沮同弗與異弗非也其特立獨行有如此者澡音早麤七奴反行下孟反又如字正義鄭氏康成曰不臨深而為髙臨衆不以己位尊自振貴也不加少而為多謀事不以己少勝自矜大也世治不輕不以賢者並衆不自重愛也世亂不沮不以道衰廢壊已志也孔氏穎達曰澡潔其身不染濁也沐浴於徳以自清也位雖同而行不善則不與親合彼雖與己疏異所為是善則不非毁之身所特立獨有此行故曰特立獨行吕氏大臨曰唯大人為能格君心之非然在己者未正未有能正人者也故澡身浴徳者所以正己也陳言而伏者入告嘉謨嘉猷于内爾乃順之于外也方氏慤曰靜而正之者隠進之也麤而翹之者明告之也與其所可與不必同乎己非其所可非不必異乎已若同而與之則讒諂面諛之人至矣異而非之則直諒多聞之友去矣葉氏夢得曰雖能其事不臨深而為高惡自高也雖有其功不加少而為多惡自大也世治而士貴矣其行不輕世亂而士賤矣其志不沮馬氏睎孟曰自立者對人言之特立者對衆言之姚氏舜牧曰靜而正所謂唯大人格君心之非也故上弗知麤而翹所謂務引其君於當道者故又不急為恥自高烏用臨深不貴多安事加少世治可進而或自輕焉其誰重之世亂可退而或自沮焉其誰與易人皆附同然其中有不可茍合者弗與也人皆惡異然其中有未可輕訾者弗非也是皆非俗儒所能也晏氏光曰世治則人皆務進而求利吾則未嘗妄動故曰不輕世亂則人皆自屈以辟害吾則未嘗變節故曰不沮應氏鏞曰非但處而特立於一身亦出而獨行於一世通論徐氏師曽曰前言特立自守之義居多此加獨行達道之義居多存疑吕氏大臨曰麤而翹之者其事君也以其事之麤者微𤼵其端而為之兆兆足以行則進而無已不足以行則去之孔子所以未嘗終三年淹故曰不急為也所以事其君者先其未𤼵而止其為惡先為之兆以嘗其為善此衆人所未識也案此説近理但一句作兩截講亦未安葉氏夢得曰同於已者或鄉愿也公而弗與異於已者或行怪也惡而弗非徐氏師曽曰世治則徳常見重而人不我輕世亂則徳周於身而邪不能沮也案此以不輕不沮屬人不如晏説存異鄭氏康成曰麤猶疏也微也君不知已有善言正行則觀色縁事而微翹發其意使知之又必舒而脱脱焉巳為之疾則君納之速君納之速怪妒所由生也孔疏上不知我當伺候君上顔色因緣有事微疏而起發之使上得知又不可急速儒有上不臣天子下不事諸侯慎靜而尚寛强毅以與人博學以知服近文章砥厲亷隅雖分國如錙銖不臣不仕其規為有如此者近去聲錙側其反家語砥厲亷隅句在强毅上正義鄭氏康成曰强毅以與人不茍屈以順之也君分國以禄之視之輕如錙銖矣八兩曰錙孔疏案算法十黍為絫十絫為銖二十四銖為兩八兩為錙孔氏穎達曰此明儒者志操規為之事上不臣天子伯夷叔齊是也下不事諸侯長沮桀溺是也既慎而靜所尚寛緩也不與人為臣不求仕宦但自規度所為之事而行故曰其規為如此吕氏大臨曰慎靜而尚寛有度也强毅以與人有守也砥厲亷隅有節也是則所以事道者無歉也非其義也非其道也禄之以天下弗顧也故雖分國而授之視之如錙銖之輕晏氏光曰上不臣天子下不事諸侯者易所謂不事王侯高尚其志也慎靜而寛者以仁而盡性强毅以與人者以義而制事博學以知服者以知而窮理近文章者外有備成之文砥厲亷隅者内有脩潔之行存疑鄭氏康成曰博學以知服不用已之知勝於先世賢知之所言也孔疏廣博學問猶知服畏先代賢人不以已之博學凌夸前賢也孔氏穎達曰近習文章以自砥厲成己㢘隅吕氏大臨曰不臣者不𫝊贄為臣周之則受賜之則不受也博學以知則有本也服近文章則有文也陳氏澔曰知服知力行之要也博學知服即博文約禮之謂案慎靜者戒慎操持尚寛者包含廣大此所規所為之大略也意量寛廣而又强毅以與人操持慎靜而又博學以知服服事也謂知所當行之事博學則能文章而文章乃近之强毅則有廉隅而廉隅又砥厲此所規所為之密行也分國授我視如錙銖非湯武之君不出也儒有合志同方營道同術並立則樂相下不厭久不相見聞流言不信其行本方立義同而進不同而退其交友有如此者樂音洛下行並去聲家語無其行本方立五字正義鄭氏康成曰同方同術等志行也聞流言不信不信其友所行如毁謗也吳氏澄曰韓文其行屬上句謂雖流言毀其行而己不以其行為信也孔疏庾氏云其行所本必方正所立必存義則以其行屬下句孔氏穎達曰此明儒者與人交友之事方猶法也言儒者與友合齊志意而同於法則也經營道藝同齊於術同術則同方也但合志同方據所懐志意營道同術據所習道藝也雖朋友久不相見聞流謗之言而己不信也其行所本必方正所立必存義朋友所為與己同則進而從之不與己同則退而避之吕氏大臨曰君子之道或出或處或黙或語凡所謂同者理也義也出於人心之所同然賢者能存而勿喪之故不患乎不同也合志同方則志同好矣營道同術則學同道矣並立則樂相下不厭好同則同體矣久不相見聞流言不信學同則信其行矣行同則學同進退同則好同交友之分至於無一不同者學一於理而不惑也方氏慤曰並立則樂以其無忌心相下不厭以其有孫志久不相見聞流言不信以其久要不忘而相信之篤馬氏曰方者道之所也志在於道唯合志故同方術者所資以適道唯營道故同術晏氏光曰方言趨向之地術言脩為之業論語曰士志於道是志必在於道道不外於志也故始焉合志而趨向者不殊終焉營道而脩為者一致有朋自逺方来不亦樂乎故並立則樂以能問於不能以多問於寡故相下不厭同方同術者講習之友並立相下者相成之友不信流言同而進者同徳之友故曰其交友如此吳氏澄曰義所以方外以方為本而立其義朋友以義合者也存疑孔氏穎達曰並立則樂者謂與友同仕則樂相下不厭者遞相卑下不厭賤也陳氏澔曰並立爵位相等也相下以尊位相讓而己處其下也案並立相下都在志道上説孔陳以爵位言淺矣總論孔氏穎達曰自此以上凡十五儒所陳之事亦有前後乖異者此上經云不臣不仕而第一儒云席上之珍以待聘夙夜强學以待問懐忠信以待舉力行以待取則有仕宦之志也第十儒云寛裕第六儒曰剛毅與寛裕亦别也第三儒云愛其死養其身備豫禍患而第五儒云劫之以衆沮之以兵見死不更其守亦不同也所以如此不同者儒包百行事非一揆量事制宜随機而發當其剛毅之莭則守死不移論其營養之道則寛而容衆逢有道之世則進而事君遇無道之時則退而不仕且賢有優劣儒有大小大儒則理包百行小儒則偏守一邉所以尚書皋陶九徳徳多則為天子諸侯徳少則為大夫卿士茍達於此儒行亦然雖或不同無所怪也温良者仁之本也敬慎者仁之地也寛裕者仁之作也孫接者仁之能也禮節者仁之貌也言談者仁之文也歌樂者仁之和也分散者仁之施也儒者兼此而有之猶且不敢言仁也其尊讓有如此者孫與遜同施去聲案儒者今文作儒皆正義鄭氏康成曰此兼上十有五儒盖聖人之儒行也孔子嫌若斥己假仁以為説仁聖之次也孔氏穎達曰此眀聖人之儒兼上十五儒之行仁者之儒先從温良而起故云仁之本以敬慎為地地所以居止萬物儒者之動作必以寛裕孫辭接物是仁儒之技能禮儀撙節是仁儒之外貌言語談説是仁儒之文章歌舞喜樂是仁儒之和悦散蓄積而賑貧窮是仁儒之恩施也儒者既兼有此行猶不敢自謂己任其尊敬於物卑讓於人有此行也此謂聖人之儒但聖人理極不可為名仁亞於聖故假仁言之吕氏大臨曰質之温良者可與為仁故曰本行之敬慎者可與行仁故曰地其規模寛裕則稱仁之動作其與人遜接則習仁之能事威儀中節敬於仁者也故為貌出言有章仁之見於外者也故為文詠歌之不足不知手之舞之足之蹈之安於仁而至於和者也貨不為己則利與人同與人為善則善與人同凡以分散與物共而不私則仁術之施不吝也八者儒必兼而有之然後可以盡儒行之實猶且不敢言仁則聖人之志存焉有聖人之志存則可與入聖人之域矣方氏慤曰仁無本不立故首以仁之本有本然後可行故繼以仁之地有行則有所事故繼以仁之作有作則見其所能故繼以仁之能有所能則形之於外故繼以仁之貌形於貌則必有所飾故繼以仁之文有其文則無乖於物故繼以仁之和有所和則其餘足以利物故繼以仁之施通論陳氏祥道曰儒行十五而以仁與禮樂終焉則成人之道盡於此矣孔子未嘗與門人以仁與禮樂所與特顔子一人而已然則顔子之去聖人其出入亦不逺矣合之則禮樂皆本於仁離之則仁近於樂義近於禮孔子以孝悌為仁之本孟子以事親為仁之實從兄為義之實其致一也儒有不隕穫於貧賤不充詘於富貴不慁君王不累長上不閔有司故曰儒今衆人之命儒也妄常以儒相詬病孔子至舎哀公館之聞此言也言加信行加義終没吾世不敢以儒為戲隕于敏反穫户郭反詘求勿反慁胡困反長丁丈反詬呼候反行去聲家語行加義下有曰字正義鄭氏康成曰隕穫困迫失志之貌也充詘歡喜失節之貌慁猶辱也累猶繫也孔疏案孔子世家在魯哀公不用在齊犂鉏所毁入楚子西所譛適晋趙鞅欲害伐樹於宋削跡於衛畏於匡厄於陳蔡被辱累多矣閔病也言不為天子諸侯卿大夫羣吏所困迫而違道孔子自謂也妄之言無也言今世名儒無有常人遭人名為儒而以儒靳故相戲此哀公輕儒之所由也詬病猶恥辱也儒行之作盖孔子自衛初反魯時也孔子歸至其舎哀公進而禮館之吕氏大臨曰小人之儒也為人君子之儒也為己小人之儒也以文君子之儒也以實以文對實以為人對為己則小人觀美而近名君子闇然而難知且將以逺大為迂闊以高眀為無實以逺勢利為詐以守禮義為簡指白為墨誣善為惡此所以以儒相詬病也如識乎君子之儒者且將矜式之不暇又何敢戲乎方氏慤曰無儒者之行而為儒者之服無儒者之實而盗儒者之名故曰今衆人之名儒也妄以其妄故常為人相詬以言相病以行也言加信則不以儒相詬矣行加義則不以儒相病矣存疑鄭氏康成曰充或為統閔或為文吳氏澄曰妄常猶曰妄庸言今世衆人不識凡名之為儒者皆妄人常人耳故為人所輕賤茍名之曰儒是以此名詬病之也欽定禮記義疏巻七十二
