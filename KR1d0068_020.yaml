body:
  text: 月令第六之一正義陸氏德明曰此本吕氏春秋後人刪合為此記蔡雍王肅云周公所作孔氏穎達曰鄭目録云名月令者以紀十二月政之所行也本吕氏春秋十二月紀之首章禮家好事抄合之其中官名時事多不合周法此於别録屬明堂隂陽今案吕氏春秋與此文同是一證也又周無大尉秦官有之而此月令云乃命大尉秦以建亥為歲首此於戍月云來歲受朔日又周郊天迎氣用大裘乘玉輅建大常而此服飾車旗並依時色此皆不合周法之證也或謂不韋死十五年秦并天下然後以十月為嵗首不韋焉得以十月為正又周書先有月令何得云不韋造又秦并天下立郡何得云諸侯又秦好兵毒害何能布德施惠而鄭必謂不韋作者不韋集諸儒為一代大典亦采擇舊章成之但秦自不能行耳秦自文公獲黑龍以為水瑞焉知不早以十月為嵗首乎栁氏宗元曰吕氏春秋十二月紀漢儒措諸經以為大法然而政令有必俟時而行者若孟春修封疆端徑術季春利隄防達溝瀆備蠶器合牛馬孟夏勸農仲夏班馬政聚百藥季夏行水殺草孟秋納材葦案聚百藥在孟夏此曰仲夏納材葦在季夏此曰孟秋並誤或桞所見本有不同與仲秋勸種麥季秋休百工孟冬築城郭修囷倉仲冬伐木季冬講武出種計耕等事必俟時而行所以敬授人時也其餘郊廟百祀亦古之遺典不可以廢若布德和令聘士禮賢行爵出祿選士厲兵任有功誅暴慢易關市來商旅正貴戚近習罷官之無事去器之無用皆不必俟時而行者也變天道絶地理亂人紀舍孟春即可乎作淫巧蕩上心舍季春即可乎張子曰月令大率秦法然采三代之文而為之不無古意又曰月令儘有美意未易可破栁子厚論亦未安若春行賞秋行刑上舉大綱如此如云冬日則飲湯夏日則飲水豈曰冬日不得飲水夏日不得飲湯也陳氏祥道曰天人之道雖殊而象類之理則一聖人將有行將有為也仰觀日月星辰霜露之變俯察蟲魚草木鳥獸之化不先時而起不後時而縮以之授民事而無不順因物性而無不適馬氏睎孟曰厯象日月星辰以授民時自堯以來未之有改也舜齊七政周用五紀其究一也蓋日月星辰之往來不窮進退相代終始相循天以是命萬物而人奉之以為令亦因是也夏之政典先時與不及時其罪至於殺蓋欲百官萬民謹其令而順承之也月令之書亦後儒祖先王之餘而傅會成之黃氏震曰中雖多雜秦制然以修人事以授民時庶幾唐虞欽若之遺意故君子有取焉至其以五行配五帝則本鄒衍五運之説而推衍之天子南面有常位而月異其處五輅各有用而時拘其色以至五穀六畜日用飲食之常亦隨時而變不太拘哉且五氣運而四時行天地間無乎不在苟拘於一則緘機不運何名造化大抵秦漢諸書多以先王遺説為本而雜以後世煩碎為博亦不特月令一書然也若其文辭與吕氏春秋異者則大約本文多是而月令傳寫為訛間亦有是者當參考以定之案帝王因時布政之大略昉於唐堯之命羲和故曰月者天之運令者君之政王者之政其道莫大於因天嗣後夏有小正商有王居明堂禮周有時訓有月令至秦而有吕氏春秋漢有淮南時則訓唐亦有唐月令遞相祖述而損益更變之今惟王居明堂禮不存而諸書具在取以相質則小正時訓文字與此迥異而吕氏春秋與此大同則此取之吕氏春秋無可疑者淮南時訓則取此而稍變之唐月令則取此而并參以鄭説更其前後今取吕氏本文及四書互相參考以通其説云孟春之月日在營室昏參中旦尾中參所林反或讀驂又日在營室淮南子作招搖指寅昏參中夏小正作鞠則見初昏參中斗柄縣在下正義鄭氏康成曰孟長也日月之行一嵗十二會聖王因其會而分之以為大數焉觀斗所建命其四時孔疏北斗循天而轉行建一月一辰辰三十度九十六分度之四十二正月建寅二月建卯三月建辰四月建巳五月建午六月建未七月建申八月建酉九月建戌十月建亥十一月建子十二月建丑此云孟春者日月會於娵訾孔疏娵訾亥次之號營室號娵訾而斗建寅之辰也凡記昏明中星者為人君南面而聽天下視時候以授民事髙氏誘曰營室北方宿衛之分野孔氏穎達曰春蠢也物蠢生也秦以十月為嵗首不用秦正而用夏時者以夏數得天故用之也周禮田獵祭祀亦用夏正夏正正月建寅寅引也律厯志引達於寅三統厯立春日在危十六度昏畢十度中正月中日在室十四度昏井二度中元嘉厯立春日在危三度昏昴九度中正月中日在室一度昏觜觿一度中月令昏明中星不與厯正同但一月之內有中者即得載之其二十八宿體有廣狹星有明暗見有早晚明者早見晚沒暗者晚見早沒此但舉大略耳餘月可知書緯考靈曜云主春者鳥星昏中可以種稷主夏者心星昏中可以種黍主秋者虛星昏中可以種麥主冬者昴星昏中入山可以斬伐具器械王者南面而坐視四星之中而知民之緩急急則不賦力役敬民事也陳氏祥道曰不特如孔氏引書緯所言龍見而雩火流而授衣天根見而成梁水昏正而栽日至而畢凡所以奉天順人莫不視乎此方氏慤曰日在營室日月會於營室之辰也會在營室則知月之建寅中謂中於南方先昏而後旦順隂陽之義也案書言分至之所中此言昏旦之所中彼以時為主此以月為主故詳略不同通論方氏慤曰日與月會而此獨稱日者陽以成嵗為事而隂特從之故以日為主與書言出日納日而不及月同意二十八宿分布於四方晝夜運而嵗一周焉每月之內或見乎昏而中或見乎旦而中昏參中旦尾中則知此月之為孟春而餘月可知已自角至箕東方七宿其形象龍謂之蒼龍角二星龍角也亢喉也總攝奏事聽訟有出納之象氐邸也人所托宿為王者之後宮房為東方之中星而日乘焉於時為闢户之卯心火星心藏屬火尾為後宮之場箕有簸揚之形自斗至壁北方七宿其形象龜蛇謂之玄武斗主挹注牛主犧牲女主嫁娶虛主邑居危為屋蓋其形髙危室為營宮室之候壁主圖書之府自奎至參西方七宿其形象虎謂之白虎奎主溝瀆婁為聚衆胃為五穀之府昴為西方之中星而日乘焉於時為闔户之酉畢主弋獵觜主收斂參以三相參又主殺伐故謂之參伐自井至軫南方七宿其形象鳥謂之朱鳥井主水衡鬼為積尸柳主草木星數有七謂之七星二十八宿皆星獨此謂之星者居南之中得陽之正故也張主張施翼為羽翼主逺客軫主任載月令不及東方之箕西方之昴南方之鬼與張以非日之所在又非昏旦之所中故也弧與建非二十八宿而仲春昏旦舉之者弧近井建近斗斗井度寬非是莫適指也弧有張弧之形建有建旗之義故名之其間考之厯法不無小差要以記時而已案此謂立春後三十日也營室北方火宿二星上有離宮六星繞之其廣十度此星昏而正中可以營建宮室故謂之營室月建寅而日在亥寅與亥合也參西方水宿七星三心二肩二足其廣十度乃白虎之身其前有觜即虎之口古法先觜後參今法先參後觜以觜今無度故轉以參度屬觜蓋每方七宿以七政木金土日月火水為序則今當云參火觜水其實不異也尾東方火宿九星如鈎乃蒼龍之尾唐月令正月之節日在虛昏昴中曉心中斗建寅位之初正月中氣日在危昏畢中曉尾中斗建寅位之中通書立春日在虛二度雨水日在危九度今時憲書立春日在女六度雨水日在虛九度古法娵訾初危十六度終奎四度今法初危初度終室九度蓋二十八宿雖曰經星不動其實亦動故動而漸東大約三百餘年乃見其東行一度也其日甲乙句上淮南子有其位東方句正義鄭氏康成曰甲孚甲乙之言軋也日之行東從青道發生萬物月為之佐孔疏緯云月有九道青道二出黃道東赤道二出黃道南白道二出黃道西黑道二出黃道北并黃道而九也春時星辰西遊黃道近西日體不移依舊而行當青道上月亦從青道上隂佐於陽故也時萬物皆解孚甲自抽軋而出因以為日名焉孔疏孚甲在前抽軋在後而相去不逺早生者即孟春孚甲而抽軋晚生者即季春孚甲而抽軋因其抽軋以為日功之名乙不為月名者君統臣功也孔疏月既佐日同有甲乙之功獨以甲乙為日名不以乙為月名日統月之功猶君統臣之功孔氏頴達曰律厯志云出甲於甲奮軋於乙陳氏祥道曰甲數九乙數八同於為木為仁彭氏亷夫曰十日名十幹又名十干謂十日出乎天若木之有幹支應十二月若本之有支也張氏虙曰天有十日以應五行播於四時故十日各有所屬甲乙屬春以春盛德在木也通論陳氏祥道曰日以辰為子辰以日為母母為幹子為支幹為陽故二五而十支為隂故二六而十二古人事在仁義則以甲庚斷之若易所稱先甲後甲先庚後庚是也日在甲庚則以其物象之若春秋傳稱神降之日亦其物之類是也月令言日不言辰以辰統於日故也馬氏睎孟曰甲丙戊庚壬陽也乙丁巳辛癸隂也一隂一陽每相為用十日分麗於五行用事者王此王則彼竭矣故曰五行之動迭相竭也案十干出於河圖動而圓故戊巳土居中象五十也十二支出於洛書靜而方故丑辰未戍土居隅象二四六八也十干陽日剛隂日柔凡外事用剛日內事用柔日其帝大皞其神句芒大音泰皞昊通句音鉤芒音亡正義鄭氏康成曰此蒼精之君木官之臣自古以來著德立功者也大皞宓戲氏句芒少皞氏之子曰重為木官孔氏穎達曰元氣廣大謂之皞東方生養元氣盛大西方收斂元氣便小故東方之帝謂之大皞西方之帝謂之少皞伏羲德能同天故亦稱大皞初出於震未有所因故位在東而主春木初生時句屈而有芒角左傳少皞氏有四叔重為句芒楚語重為南正司天重人號雖子孫皆號曰重故楚世家言髙辛誅重非此重猶羿為堯時射官夏后相時猶有羿也服虔云少皞以上天子之號以德百官之號以徴顓頊以來天子之號以地百官之號以事然顓頊堯舜兼有德號大皞立德句芒立功故春祀之大皞句芒相去懸逺以皆有生木之功故取以相配焉句芒為臣大皞亦神言帝言神互相通也王氏曰其帝即易帝出乎震之帝盧氏翰曰皞者大起萬物擾也句者物之始生芒之言萌也陳氏祥道曰五帝以德五神以功德則究其所乘之𫝑而本之功則推其所職之重而歸之也馬氏睎孟曰天地以五行成萬物必有以尸之則生而有功德於民者沒而祀之以主時事不亦宜乎通論馬氏端臨曰五帝之祀見於周禮五帝之義見於家語程子謂以形體謂之天以主宰謂之帝如此則曰帝可矣何必列於五且於祀上帝之外别立祀五帝之禮乎蓋五帝為五行之主而在天猶五嶽為五行之鎮而在地五帝不出天之外而謂五帝即天不可五嶽不出地之外而謂五嶽即地不可案天有五行則有五行之帝亦有五行之神帝者氣之主宰神者氣之流行大皞炎帝黃帝少皞顓頊在天五行之帝伏羲神農軒轅金天髙陽則人帝之配食於此者句芒祝融后土蓐收玄冥在天五行之神重黎句龍該修熙則人官之配食於此者古稱大皞乘震執規而司春炎帝乘離執衡而司夏黃帝乘坤執繩而司下土少皞乘兑執矩而司秋顓頊乘坎執權而司冬豈伏羲五人帝之謂哉自康成過信緯書曰木德之帝名靈威仰火德之帝名赤熛怒土德之帝名含樞紐金德之帝名白招拒水德之帝名汁光紀於是不得不以大皞炎黃專屬之人帝王子雍起而力矯之遂謂止有五人帝並無五天帝又矯枉而過其正矣孔氏東方元氣盛大謂之大皞木生句屈芒角謂之句芒其義甚明而於鄭不駁疏家之體有申説無駁論也其蟲鱗正義戴氏德曰鱗蟲三百六十龍為之長鄭氏康成曰鱗龍蛇之屬象物孚甲將解也髙氏誘曰東方少陽物去太隂甲散為鱗魚屬也盧氏翰曰東方蒼龍七宿木屬其類為鱗故春則其蟲鱗朱氏申曰春則左而仁鱗蟲屬焉吳氏澄曰東方角亢氐房心尾箕七宿有龍之象故凡動物之有鱗者屬木案鱗蟲能潛能躍隂中陽也其音角律中大蔟大音泰中去聲後放此蔟七豆反正義鄭氏康成曰音謂樂器之聲三分羽益一生角角數六十四屬木者以其清濁中民象也春氣和則角聲調樂記曰角亂則憂其民怨凡聲尊卑取象五行數多者濁數少者清大不過宮細不過羽律候氣之管以銅為之中猶應也孟春氣至則大蔟之律應謂吹灰也孔疏律厯志云黃帝使伶倫取嶰谷之竹斷兩節間吹之制十二筒以聽鳯凰之鳴雄為六律雌為六呂凡律空圍九分孔疏律之長短有差其圍皆以九分為限周語曰大蔟所以金奏贊陽出滯蔡氏雍曰大蔟鍾名正月之律清濁與大蔟鍾聲相應髙氏誘曰角木也位在東方大蔟太隂氣衰少陽氣發萬物動生蔟地而出竹管與大蔟音和韋氏昭曰正月大蔟乾九二也管長八寸陽氣大蔟達於上孔氏穎達曰角觸也觸地而出戴芒角也角木聲木之聲清於土金濁於水火角之數少於宮商多於徴羽尊者濁卑者清角為民則卑於君臣尊於事物也計大蔟之管數倍而更半鑄為大蔟之鍾陽管為律律法也言陽氣與隂為法又律述也述氣之管也隂管為呂呂助也言助宣陽氣又呂拒也言與陽相承更迭而至又隂律稱同言與陽同亦稱間言與陽相間總而言之隂陽皆稱律也孟康云林鍾長六寸圍六分圍之大小逐管長短此與鄭異蔟奏也言陽氣大奏地而逹物也位於寅在正月朱子曰管子云凡聽角如雉登木以鳴音疾以清以鳴下六字疑衍太史公云角動肝而和正仁聞角音使人惻隱而愛人又曰十二律之名必有深指然國語漢志所言如此支離附合恐非本真今姑存之不足深究通論陳氏祥道曰周官太師掌六律六同以合隂陽之聲陽聲始之以黃鍾順而敘之以生之序進之也隂聲始之以大呂逆而序之以成之序退之也陽六為律隂六為呂合而言之皆以述氣故統謂之十二律焉傳曰聲生於日律生於辰聲非十二律不能發律非五聲不能節五聲非變不能盡故一律之中莫不具五聲五聲之中又有二變也存疑王氏喬桂曰大蔟長五寸四分自大吕益九分也向於春陽日隆也案蔡謂律以竹鄭謂律以銅則蔡得之蓋嶰谷之竹出於天地之自然而截竹不可以久故範之以銅是竹先而銅後也蔡謂律出於鍾鄭謂鍾出於律則鄭得之蓋有十二律然後鑄十二鍾每奏一律之樂則先擊此律之鍾故曰金以聲之若先有鍾以為諸樂器之綱紀則諸器受法於鍾足矣又安用此截竹者為鄭謂律之空圍皆九分而長短殊孟謂律之空圍各如其長短亦鄭得之蓋樂之聲陽也陽之數極於九故必圍以九乃由九而九之以為黃鍾之長而三分損益之法有所用猶樂之舞隂也隂之數極於八故必佾用八人乃由八而八之以為舞列之全而六佾四佾之次有所降譬之權度必先有一定者以為法而後有無定者以為宜未有無一定之經而但以緯相緯者也若候氣之説則終有疑焉蓋氣之升降必有漸若如舊説則黃鍾最長大呂稍短大蔟又稍短短至十月應鍾而極十一月忽極長短有漸而長無漸不知何以候氣也竊疑王氏喬桂之説有理而未敢決姑列之存疑又每月所中之律亦指中氣一日而言如厯法之舉中星也其實星度無日不遷移中聲無日不升降舉其中而前後之升降推移舉可定耳其數八其味酸其臭羶羶式連切又其數八下唐月令有其性仁其事貌正義鄭氏康成曰數者五行佐天地生物成物之次也易曰天一地二天三地四天五地六天七地八天九地十而五行自水始火次之木次之金次之土為後木生數三成數八但言八者舉其成數也酸木之味羶木之臭凡酸羶者皆屬焉孔疏白虎通云行欲為天行氣也水準也水在黃泉養物均平有準則也火化也陽氣用事萬物變化也木觸也陽氣動躍觸地而出也金禁也秋時萬物隂氣所禁令也土吐也言土居中總吐萬物也陽為氣氣則渾沌為一且日體無盈虧之異故其數奇隂為形形有彼此之殊且月有晦朔之别故其數偶水體微故一火著見故二木有體質故三金體堅剛故四土體廣大故五也木數三得土數五而成故八為成數也孔氏穎達曰木所以在東者東半隂半陽木作曲直以隂陽俱有體質尚柔故可曲可直也易天三生木於東地八成木於東但言八以成數為功也通於鼻者謂之臭在於口者謂之味木實酸凡草木所生其氣羶也馬氏睎孟曰味生於形臭生於氣故形成而後有味氣化而後有臭春以陽中生木木之成形有曲直曲直作酸故其味酸物以木化則其臭羶方氏慤曰凡味隂也羶陽臭也春為陽中故其臭羶其祀戶祭先脾正義鄭氏康成曰春陽氣出祀之於户內陽也祀之先祭脾者春為陽中於臟直脾脾為尊凡祭五祀於廟用特牲有主有尸皆先設席於奧祀户之禮南面設主於户內之西北向乃制脾及腎為俎奠於主北又設盛於俎西祭黍稷祭肉祭醴皆三祭肉脾一腎再既祭徹之更陳鼎俎設饌於筵前迎尸略如祭宗廟之儀孔疏春陽氣出户在內從外向內户又在內故曰內陽也牲位南首肺最在前而當夏腎最在後而當冬從冬稍前而當春從腎稍前而當脾故春位當脾從肺稍却而當心故中央主心從心稍却而當肝故秋位主肝故曰於臟直脾也凡祭五祀下中霤禮文此謂殷禮者若周則總在宮內也主北面故奠於主北當時未有迎尸皆祝官祭脾尊故一祭腎卑故再祭筵前設於奧者其時主巳移於筵上主人出户迎尸尸入即筵而坐但宗廟之祭尸入始祭籩豆及黍稷醴此於西已祭尸入應坐而饌食不更祭黍稷及肉醴故曰略如祭宗廟之儀廟案鄭言設席於奧疏以為廟門之奧者蓋廟之奧主在焉必不可設神席後寢之奧衣冠藏焉恐亦非是古中霤禮於祀竈言席於門之奧其諸皆門堂之奧與髙氏誘曰蟄伏之類始動生出由户故祀户脾屬土陳俎豆脾在前春木勝土先之食所勝也方氏慤曰户奇而在內陽自內出之象也春生為陽出之時故祀之户者所祀之神脾者所祭之物脾土藏也五祀之祭必有牲焉特各以其藏為之先爾彭氏亷夫曰户者人所出入有功於人則祀之陳氏祥道曰周官以司命從天神而祀以槱燎以五祀從地祗而祀以血祭則司命非門竈之列餘論馬氏睎孟曰五祀七祀不言所祭之地然惟司命泰厲未悉耳祭法王及諸侯言國門國行大夫士言門行則有國者祀此二神於國門大夫以下在家門而已中霤户竈則凡居室皆有之皆可祀於其所也隋唐以來祀之太廟皆本鄭注然孔疏言殷於廟周於宮竊意於宮為當蓋太廟以奉祖宗不當雜祭他神於其地如門中霤廟亦有之若司命竈行於廟何與且泰厲乃古帝王無後者祀之於廟非我族類得毋曰相奪豫享乎又曰木在臟為肝在志為怒故怒傷肝火在臟為心在志為喜故喜傷心土在臟為脾在志為思故思傷脾金在臟為肺在志為憂故憂傷肺水在臟為腎在志為恐故恐傷腎皆甚則自傷也木尅土故怒勝思金尅木故憂勝怒火尅金故喜勝憂水尅火故恐勝喜土尅水故思勝恐此五行自然之理五行勝者則王所遇勝者死先王各於其時養所遇勝者也故春祭先脾為其木勝而養土也夏祭先肺為其火勝而養金也秋祭先肝為其金勝而養木也凡五行動而與物交則彼勝矣而此養焉至其靜而辨於物於道為復於時為藏各反其本矣冬祭先腎為是故也土於氣為中而主五行心於形為中而主五官中央之祭先心為是故也存疑孔氏穎達曰此祭五祀謂殷禮也周則加司命與厲為七祀陸氏佃曰古周禮説云黎為祝融祀以為竈馬融王肅宗之以為户竈中霤門行之祭以句芒五官配焉左傳句芒五官生為貴神謂之五祀或曰句龍后土為社矣更於中霤祭之何也曰句龍於國則配社於家則配中霤不以相廢猶后稷於郊則配天於社則配稷也或曰鄭謂竈祭於竈陘祝融火官之長祭於竈陘不已陋乎曰先祭於其所以降神也五官實不在焉於奧迎尸始以祝融等配之何陋之有案鄭注謂祭五祀用特牲孔疏此特牲是特牛考儀禮士用特牲下大夫少牢禮一等安得謂特牲是特牛乎記言郊特牲而社稷大牢郊之特牲是騂犢又安得謂五祀於郊同特牲邪白虎通云天子諸侯用牛大夫用羊則當直謂之特牛不當名曰特牲也又云户以羊竈以雞門以犬井以豕中霤以豚或曰天子諸侯中霤用牛大夫士豚井皆以魚考五祀次於社稷諸侯社稷且少牢無五祀反以牛之理當天子大牢諸侯少牢大夫特牲則鄭所云或據大夫禮與士二祀門以犬行以豚庶士庶人立一祀則竈以雞井以魚亦可也又案周有七祀又有五祀儀禮既夕篇是也孔謂周加有七祀而五祀為殷禮誤也又案五祀當以蔡雍劉安門户竈井中霤為正蓋户主出木也竈火也中霤土也門主斂金也井水也若行則祖道之祭耳司命天神泰厲人鬼當為别祀至五官貴為上公古者祭各以其等大夫祭五祀則不得及上公可知也且所祭者即所降之神神無主不止故以配者為之主耳更不得謂門户竈井之神卑而配之者乃上公之尊也周祭五祀於宮故祭廟時不祭竈而祭爨所謂爨者老婦之祭也然則五祀當祭於宮矣東風解凍蟄蟲始振魚上冰獺祭魚鴻鴈來淮南子振下有蘇字上下有負字鴻鴈來夏小正作鴈北鄉呂氏春秋及淮南子皆作候鴈北唐月令作鴻鴈歸正義鄭氏康成曰皆記時候也振動也夏小正正月啓蟄魚陟負冰漢始亦以驚蟄為正月中此時魚肥美獺將食之先以祭也鴈自南方來將北反其居今月令鴻皆為候孔疏今月令即呂氏春秋入禮記為古不入禮記為今孔氏穎達曰此明天氣時候早晚每月皆記候惟二分二至再記之者以二至是隂陽之始終二分是隂陽之交會也凡先言者氣候在前後言者氣候在後蟄蟲得陽氣初始振動二月乃大驚而出對二月故云始振也魚當盛寒伏於水下逐其溫暖及正月陽氣既上故魚遊水上而近於冰漢初以驚蟄為正月中雨水為二月節劉歆作三統厯改之又古厯榖雨在清眀前今厯案通卦驗改榖雨在清明後凡二十四氣氣十五日有餘每中分之為四十八箭三分之為七十二候馬氏睎孟曰厯有數所以正時也月之氣二十四嵗之候七十二所以記時物也先王因其時物以授民時此民之聽所以不惑而易知也方氏慤曰凍結於重隂東風發散之後能解之凍解則物之藏於密者起而振潛於深者躍而上故蟄始振魚上冰也朱子曰唐月令作立春之日東風解凍後五日蟄蟲始振後五日魚上冰雨水之日獺祭魚後五日鴻鴈歸後五日草木萌動後分六候放此徐氏師曽曰五日為候月有六候而此篇有止紀五候者有不足五候者不知何謂大統厯取草木萌動足之天子居青陽左個乘鸞路駕倉龍載青旗衣青衣服倉玉食麥與羊其器疏以達倉蒼通載如字陳澔讀戴上衣去聲下衣如字後並放此又淮南子有東宮御女鼓琴瑟其兵矛正義鄭氏康成曰皆所以順時氣也青陽左個大寢東堂北偏孔疏此是明堂北偏而云大寢者欲明明堂與太廟大寢制同於明堂聽朔竟次還太廟次還大寢也言東堂者知聽朔皆堂不於五角之室中也鸞路有虞氏之車有鸞和之節而飾之以青取其名耳春言鸞冬夏言色互文馬八尺以上為龍凡所服玉謂冠飾孔疏冕之旒及笄也及所佩者之衡璜也孔疏古之佩玉上有蔥衡橫置於上以貫珠之繩三條懸衡上垂之而下以雙璜懸於兩畔繩之下端又以身懸於中繩之下端使前後觸璜以為聲衡之下璜之上皆貫蠙珠也麥實有孚甲屬木羊火畜也時尚寒食之以安性也孔疏食火畜以助之勝寒氣器疏者刻鏤之象物當貫土而出也又玉藻曰天子龍衮以祭玄端而朝日皮辨以日視朝與此皆殊孔疏周禮朝乘象路祀乘玉路戎乘革路獵乘木路是各以事殊朝皮辨服祀六冕服戎韋辨服田冠辨服龍衮玄衣纁裳皮辨白布衣四時皆然是不隨時而變孔氏穎達曰此明天子每時居處及所乘車馬所建旌旗所服衣玉所食牲榖及器物之屬春言鸞則夏秋冬並鸞也夏云朱冬云玄則春青秋白可知倉亦青也逺望則倉旗與衣欲見人功所為故以近色言之尚書五行傳視之不明則有羊禍注羊畜之逺視者屬視故羊為火疏以達刻鏤為文使文理粗疏直而通達方氏慤曰青陽者少陽之稱春為少陽故所居之室名之中有大廟左右個處其兩傍謂之大廟以其常饗帝於此也古者非特眀堂中有大廟而大廟亦謂之眀堂左氏所謂不登於眀堂是也以饗神故謂之廟以聽政故謂之堂故天子聽朔於明堂而諸侯聽朔於大廟個即左傳所謂置饋於個也曰龍者以少陽之時龍方用事也旗人君以是率衆玉君子於是比德食麥與羊以麥火榖羊火畜皆時所生也夫以所生者所以相繼以所勝者所以相合以其類者所以相合故能使四時之氣不戾五臟之疾不生焉項氏安世曰麥自苖至實皆在春時故春食麥易大壯卦二月夬卦三月皆取羊象意羊本春類而成於兑邪陸氏佃曰鸞青鳳故青路曰鸞路張氏虙曰載建之車上周禮交龍為旗旗必有鈴朱氏申曰左個以其介於左也案説文無個字書秦誓一介臣大學作一個臣徐鉉謂即介字之誤蓋左右個即左右夾室也黃氏震曰器則疏鏤通達象陽氣之射出案麥金榖故火王而死其位東方羊兑畜兑陽長而隂消食之順陽義也存疑鄭氏康成曰凡此車馬衣服皆所取於殷時而有變焉非周制也孔疏虞夏有日月星辰十二章周朝祀戎獵各有殊故知殷制而殷木輅此鸞路故知有變焉周禮朝祀戎獵車服各以其事不以四時為異徐氏師曽曰麥金王而生火王而死當為金榖而鄭曰木兑為羊當屬金而鄭曰火蓋本洪範五行言之或隂陽多塗不可一定也存異張氏虙曰近世夏休辨六服之色以衮如蓘青草也鷩赤毳黃布白玄黑皆然案周禮司服注謂六服皆玄張説不知何據且如其説則春必服衮冕夏必服鷩冕矣不可為訓辨正胡氏銓曰鄭言車馬衣服取於殷時案明堂位言鸞車有虞氏之車則車非殷檀弓殷人乘翰翰白馬則馬非殷周詩言鸞聲噦噦庾人職馬八尺以上曰龍則猶周制也總論孔氏穎達曰自孟春迄其曰甲乙眀天道此下至鴻鴈來明聖人奉天時及萬物節候也先建春以奉天奉天然後立帝立帝然後言佐言佐然後列昆蟲之别物有形可見然後聲音可聞故陳音有音然後清濁可聽故言鍾律音聲可以章故陳酸羶羣品以著五行為用於人然後宗而祀之故陳五祀東風以下效初氣之序也二者既立然後人君承天時行庶政故言帝者居處之宜衣服之制布政之節焉是月也以立春先立春三日大史謁之天子曰某日立春盛德在木天子乃齊立春之日天子親帥三公九卿諸侯大夫以迎春於東郊還反賞公卿諸侯大夫於朝先去聲齊音齋帥入聲篇內並同還與旋同正義鄭氏康成曰大史禮官之屬掌正嵗年以序事謁告也王居眀堂禮曰出十五里迎嵗周近郊五十里賞謂有功德者有以顯賜之也朝大寢門外孔疏以賞賜公卿大夫宜在治事之朝故也孔氏頴達曰此論立春天子迎春及行賞之事凡言是月謂是月之節氣不謂是月之日也以下有不言是月者或事細小或通他月或事相連接或詞有詳略若别事更端則更言是月也周法四時迎氣皆前期十日散齊七日致齊三日秦法簡易止散齊二日致齊一日天以覆蓋生民為德春則為生天之生育盛德在於木位四時各有盛時也四時所賞不同者春陽氣始著故賞朝臣及諸侯夏陽氣尤盛故慶賜轉廣秋隂氣始凝故賞軍帥武人冬隂氣尤盛故賞死事及其妻子皆順時氣也通論方氏慤曰立之日其氣始至迎之於郊導其氣之至也木居東火居南金居西水居北各以其方迎之不迎土者土居中非自外至也古者於寒曰迎客隂也於暑曰逆主陽也合而言之則氣皆自外至故通謂之迎焉還言自郊主彼也反言於朝主此也春夏非不刑特順陽義以賞為主秋冬非不賞特順隂義以刑為主四立喜其氣之至故皆行賞焉馬氏睎孟曰五行四時還相為本而各以其時王焉王則相我者生生我者廢勝我者囚我所勝者死其盛在我矣故於四立之日告盛德所在焉五行之序不同曰水火木金土天地生五行之序也曰木火土金水相生之序也曰水火金木土相尅之序也天地之生五行也以數其相生也以氣其相尅也以刑陸氏佃曰木仁德之盛金義德之盛君子體之方以仁為恩則盛德在木方以義為理則盛德在金他放此張氏虙曰天地之大德固難形容至分而為四時則各有所在凡見於萬物之生者皆木之德也迎之郊重其至示敬也存異鄭氏康成曰迎春祭蒼帝靈威仰於東郊之兆也孔氏頴達曰案賈馬蔡雍皆謂祭大皞及句芒鄭獨以為靈威仰者據春秋文耀鉤禮器云饗帝於郊而風雨節寒暑時人帝何能使風雨節寒暑時邪周禮祀昊天上帝服大裘而冕祀五帝亦如之人帝何得與天帝同服乎盛德靈威仰之盛德也張氏虙曰迎其氣非有神矣辨正陳氏祥道曰迎青帝配以大皞從以句芒迎赤帝配以炎帝從以祝融以至中央秋冬之禮亦然案鄭據春秋緯以靈威仰赤熛怒實五帝之名固妄而王子雍謂有五人帝無五天帝亦拘張謂迎氣非有神則更謬矣夫鬼神二氣之靈也有其氣則有其神而祭是神則有是配神無主不止也安得謂有其氣反無其神有人帝反無天帝乎特不當如鄭説妄為之名耳又案鄭引明堂禮出十五里迎春漢郊祀志注引月令章句云東郊去邑八里因木數也南郊七里因火數也中郊五里因土數也西郊九里因金數也北郊六里因水數也則但迎之於其郊而不必於郊之門可知通典云其壇位各於當方之郊為兆位於中築方壇而祭之禮七獻舞當代之樂命相布德和令行慶施惠下及兆民慶賜遂行毋有不當相當並去聲正義鄭氏康成曰相謂三公相王之事也德謂善教也令謂時禁也慶謂休其善也惠謂恤其不足也天子曰兆民遂猶達也言使當得者皆得得者無非其人孔疏非其人謂無功無德之徒方氏慤曰德令慶惠出於君而布和行施以下及者相也德主於宣利故曰布令貴於無乖故曰和慶則必致用故曰行惠則必有與故曰施慶主禮賜主物上言行慶則禮而已下言慶賜又及於物也行欲其無壅又惡夫妄豫以傷費焉餘論孔氏頴達曰公羊傳云三公者何天子之相至六國時一人知事者謂之相故史記稱穰侯范雎蔡澤皆為秦相後又為丞相案德布為令令以行德和調也行而適宜使民各得其所所謂敷政優優不競不絿也慶賜遂行者不使膏屯而不下究毋有不當厚薄多寡得其宜乃命大史守典奉法司天日月星辰之行宿離不貸毋失經紀以初為常離鄭讀儷又如字貸忒同正義鄭氏康成曰典六典法八法也孔疏六典者周禮天官治典地官教典春官禮典夏官政典秋官刑典冬官事典八法者一曰官屬二曰官職三曰官聯四曰官常五曰官成六曰官法七曰官刑八曰官計經紀謂天文進退度數蔡氏雍曰宿日所在離月所歷案日躔每日一度故曰在月每日經十三度故曰歷方氏慤曰周官大史之職掌建邦之六典以逆邦國之治掌八法以逆官府之治所謂守典奉法也正年嵗以序事頒之於官府及都鄙所謂司天日月星辰之行也在人之六典八法在天之日月星辰莫不存乎書故以命之大史焉大而有常之謂典故曰守詳而有變之謂法故曰奉日月星辰之理所以成變化而行鬼神者非聖人不能與有司特司其定數而已故以司言之日循星以進退月應日以死生星日所舍辰星所次日月星辰或宿於此或離於彼皆有定數焉大史司之不可忒也吳氏澄曰宿居離麗也謂日月所居所麗在何辰何星之第幾度不可差忒徐氏師曽曰宿謂守其次離謂去其次陸氏佃曰厯象以初為常而已其測驗與時盈縮有變存焉存異鄭氏康成曰離讀如儷偶之儷宿儷謂其屬馮相氏保章氏掌天文者相與宿偶當審候伺不得過差也辨正丘氏光庭曰星謂二十八宿辰謂日月之舍宿留止離經歷言命大史厯候日月星辰即所留止經歷為祥為災無令差貸疏謂馮相保章同宿配偶是其不顧經文妄為穿鑿胡氏銓曰天文志填星居宿其國福厚又云五星所聚宿其國正所謂宿也案此節與季冬共飭國典論時令以待來嵗之宜相首尾守典奉法國典之事日月星辰之行時令之事嵗終天子與公卿大夫飭之論之以待來嵗嵗始乃命大史守之奉之而不忒也俗詁以典法専指天文非是又案離有二義來則儷之去則違之猶祝字訓屬亦訓斷也此文與宿字相對似以去其次為確是月也天子乃以元日祈榖于上帝乃擇元辰天子親載耒耜措之于參保介之御間帥三公九卿諸侯大夫躬耕帝籍天子三推三公五推卿諸侯九推反執爵于大寢三公九卿諸侯大夫皆御命曰勞酒參音驂帥入聲推吐回切勞去聲正義鄭氏康成曰謂以上辛郊祭天也春秋傳曰夫郊祀后稷以祈農事是故啓蟄而郊郊而後耕孔疏左傳襄公七年文元辰蓋郊後吉亥也耒耜之上曲也保介車右也置耒於車右與御者之間明已勸農非農者也孔疏於時天子在左御者在中車右在右置耒於參御之間明已勸農出不當王前明王身實非農人也人君之車必使勇士衣甲居右而參乘備非常也帝籍為天神借民力所治之田既耕而宴飲以勞羣臣也大寢路寢御侍也孔氏穎達曰此論迎春既反春事已起當祈榖親耕燕勞之事甲乙丙丁等謂之日郊用辛故云元日子丑寅卯等謂之辰耕用亥日故云元辰知用亥者正月亥為天倉也盧植蔡雍並云郊天是陽故用日耕籍是隂故用辰皇氏云正月建寅日月會辰在亥故耕用亥未知然否饗禮在廟燕禮在寢此於大寢故知燕也爵賞公事與衆共之故在正廟燕勞私禮主於歡心故在路寢方氏慤曰元善也求其信善無凶荒也後言擇元日命民社此言以元日擇日有司之事以日天子之事凡日皆擇而後以之此以尊卑序且互相偹也推執耒而進之以三以五以九以貴賤差勞逸也耕陽事故用數之奇不及大夫以其卑不必預拘其數也朱子曰保介蓋農官之副陸氏佃曰參參乘保介車右也保君而甲者也陳氏澔曰車右及御人皆參乘天子在左御者居中車右在右以三人故曰參也置此耕器於參乘保介及御者之間案保介朱子以為農官之副則不得為車右矣或者以祈榖為農官所有事而偶得參車右與故以朱説與注並存之存疑鄭氏康成曰保猶衣也使勇士衣甲居右胡氏銓曰臣瓚云藉蹈藉也本以躬藉為義不得以假借為稱又案躬耕帝王盛典則謂藉為典籍可也推其至當瓚説為優又曰鄭謂此即郊案特牲云郊之用辛此云元日則不必辛又云迎長日之至注引易説謂春分日漸長則此未春分又云大報天此云上帝不可以包天易説云三王之郊一用夏正孟獻子云啓蟄而郊此未啓蟄又云郊祀后稷此不祀后稷而祀帝足眀此但祈榖非郊天郊可兼祈榖祈榖不可兼郊張氏虙曰應劭云千畝之田必有籍以紀之曰帝籍則與民之公田異矣周禮甸師帥其屬而耕耨王藉帝籍即王藉也案冬至大郊與祈榖為二祭然祈榖亦於郊則謂祈榖為郊無礙也至於迎長日之至當指冬至書所謂日短星昴本篇所謂日短至短極而始長故迎之未必指春分也書言昊天上帝多矣安見上帝不可指天乎謂啓蟄而郊則上文已明言蟄蟲始振矣謂獻子言郊祀后稷此言上帝不祀后稷則郊祀上帝配以后稷言上帝而后稷可知蓋冬至之北郊配以后稷取萬物本乎天人本乎祖之義祈榖配以后稷為農祈也所配同而所以配之義異若是者俱不足以難鄭惟鄭謂此上帝乃大微之帝孔謂殷祭汁光紀周祭靈威仰則緯書之説所宜刪正是月也天氣下降地氣上騰天地和同草木萌動上時掌反又唐月令無此節陳澔連下節今分正義鄭氏康成曰此陽氣蒸達可耕之候也農書曰土長冒橛陳根可拔耕者急發孔疏農書九家百十四篇神農二十篇野老十七宰氏十七董安國十六尹都尉十四趙氏五泛勝之十八王氏六蔡癸一篇此所引先師謂泛勝之書也泛音泛成帝時為侍郎教田三輔先置橛以候土土長冒橛則陳根朽爛可拔而去之耕者急速開發其地也孔氏穎達曰此論少陽之月務其始生故既耕之後當勸農事也天地之氣謂之隂陽一年之中或升或降聖人作為六爻以象之陽氣之升從十一月為始至四月六陽皆升六隂皆伏五月一隂初升至十月六隂皆升六陽皆伏今正月三陽生乾體在坤體下天居地下故曰天氣下降其實於時陽從地中上升十月純隂用事寒氣逼地六陽從上退盡無復用事似若陽歸於天者故曰天氣上騰其實十月陽氣反歸地下也方氏慤曰天氣下降則天道下濟地氣上騰則地道上行和言相濟而無乖同言相合而無異惟在上者下降在下者上騰故天地之氣和同而草木所以萌動也吳氏澄曰天在上而其氣降下地在下而其氣騰上是天地交而泰故草木發生於其時案此言可耕之候夏小正農緯厥耒初嵗祭耒王命布農事命田舍東郊皆修封疆審端徑術善相丘陵阪險原隰土地所宜五榖所殖以教道民必躬親之田事既飭先定準直農乃不惑術遂司相去聲阪音反又蒲版反隰音習道去聲正義鄭氏康成曰田謂田畯主農之官也舍東郊順時氣而居以命其事也封疆田首之分職孔疏九夫為井四井為邑各有封境界域部分職掌術周禮作遂孔疏學記術有序正同夫間有遂遂上有徑遂小溝也孔疏遂深二尺廣二尺徑容牛馬今尚書曰分命羲仲宅嵎夷孔疏證田畯舍東郊之事今尚書鼂錯所受伏生二十九篇相視之也田事以下説所以命田舍東郊之意準直謂封疆徑遂也夏小正曰農率均田孔疏夏小正大戴禮篇農率田畯也均田審端徑遂也孔氏穎達曰耕作嵗時之氣起於東方故命田畯舍東郊以命其事其諸侯都邑田畯亦各舍國邑之東郊也準謂輕重均平直謂繩墨得中封疆有界限徑遂有廣狹皆先平均正直之農乃不有疑惑方氏慤曰度土而積謂之封界畫以守謂之疆封疆久則壞故曰修髙曰丘平而可陵曰陵陂而不平曰阪水所行曰險廣平曰原下濕曰隰所宜若山林宜皂川澤宜膏所殖若黍宜髙燥稌宜下濕教之使能其事道之使達其理然弗躬弗親庶民弗信故又必躬親之焉以人言之曰農以地言之曰田人事興然後地事成故先言布農事後言田事既飭馬氏睎孟曰自我所行之謂躬與彼有事之謂親各適其平之謂準各得其正之謂直張氏虙曰既盡也朱氏申曰言農事之所以飭者由準直之先定民無所惑而一於耕也存異胡氏迥曰鄭以田為田畯非也但謂凡趨田者爾案田即古后土后稷之官重其事故統名之若謂凡趨田者則教道民者誰是月也命樂正入學習舞淮南子無此節正義髙氏誘曰樂正樂官之長入學教國子講習羽籥之舞周禮大胥掌學士之版以六樂之會正舞位也胡氏銓曰以春陽動舞動容也夏小正萬用入學朱子曰萬者舞之總名武用干戚文用羽籥或曰禹以萬人治水故稱萬何休云湯武以萬人得天下故干舞稱萬徐氏師曽曰周禮大司樂教國子以習舞之事舞雲門大卷大咸大磬大夏大濩大武又樂師教小舞有帗羽皇旄干人六舞大胥正舞位序舞者小胥巡舞列而撻其怠慢者旄人掌教舞散樂夷樂籥師掌教舞羽籥司干掌舞器舞師掌教兵帗羽皇四舞以供山川社稷四方旱暵之祭凡野舞皆教之此獨舉樂正總其綱也通論陳氏祥道曰先王之時典樂有常職教學有常時周官大胥以春貌之時合舞以秋言之時合聲文王世子以秋冬學羽籥春夏學干戈其事皆有以循天之理合人之情而月令季春大合樂孟夏習合禮樂仲夏修樂器蓋秦制也存疑鄭氏康成曰習舞為仲春將釋菜案菜呂氏作采説見仲春案樂正即周禮大司樂掌以樂舞教國子序樂者夏小正言萬用入學是以教舞為主也故有以教樂習舞而釋菜者義主於樂也有以釋菜而用舞者義主於祭也如鄉飲酒亦射鄉射禮亦飲然義各有所主也文王世子云釋菜不舞則習舞非為釋菜可知乃修祭典命祀山林川澤犧牲毋用牝牝頻忍反正義鄭氏康成曰修祭典重祭禮嵗始省録也毋用牝為傷妊生之類也髙氏誘曰山林川澤百物所生又能興雲以殖嘉苖故祀之毋用牝尚蠲潔也案大祀皆不用牝以牝有産育之事不蠲潔也此山林川澤亦不用則以鄭傷妊生為確孔氏穎達曰春為四時之首故當修祭典天地宗廟尊皆不用牝山林川澤卑故可用牝惟正月禁之以方妊也方氏慤曰祭典古所有因嵗始故特修之言山林川澤者以天地宗廟非春亦禁用牝也馬氏睎孟曰命祀山林川澤以百物所自生也彭氏亷夫曰牛羊曰犧將用曰牲徐氏師曽曰修祭典凡一年所當祭者皆舉而列之禁止伐木正義鄭氏康成曰盛德所在也髙氏誘曰春木王尚長養也孔氏穎達曰木在山中或禁障之處十月許人採取至此禁之故王制云草木零落然後斧斤入山林若國家所須雖非冬月亦得採取周禮山虞仲夏斬隂木仲冬斬陽木又云春秋之斬木不入禁若正月則皆禁之毋覆巢毋殺孩蟲胎夭飛鳥毋麛毋卵覆音福夭烏老切麛音迷卵力管反正義鄭氏康成曰為傷萌幼之類髙氏誘曰蕃庶物也孔氏穎達曰周禮硩蔟氏掌覆夭鳥之巢此月亦禁之胎謂在腹中未出者夭謂生而已出者飛鳥謂初飛之鳥麛卵四時皆禁但於此月尤甚若須薦獻亦得取之故王制云韭以卵庖人秋行犢麛方氏慤曰孩蟲蟲未成者張氏虙曰凡此皆方春物生遂其性也毋聚大衆毋置城郭正義鄭氏康成曰為妨農之始也張氏虙曰毋聚大衆不集大師徒毋置城郭不興大力役掩骼埋胔骼江百反胔才賜反陳澔連上二節今分正義鄭氏康成曰骨枯曰骼肉腐曰胔髙氏誘曰掩埋者覆藏之順木德而尚仁恩者也孔氏穎達曰周禮蠟氏掌除胔司農云胔骨之尚有肉者及禽獸之骨皆是此作胔故康成改訓掩埋互文也存疑鄭氏康成曰為死氣逆生也案原先王澤及枯骨之心本以仁厚死者即喪死無憾之意鄭以為死氣逆生失其旨矣周禮蠟氏除胔猶左傳毋穢虐士耳除不蠲亦其次義也是月也不可以稱兵稱兵必天殃兵戎不起不可從我始正義鄭氏康成曰有天殃為逆生氣也兵戎為客不利主人則可孔疏起兵伐人者謂之客敵來禦捍者謂之主髙氏誘曰春當行仁非興兵征伐時也孔氏穎達曰我不先起兵彼來伐我我不得不應毋變天之道毋絶地之理毋亂人之紀陳澔連上節今分正義鄭氏康成曰變天道謂以隂政犯陽絶地理謂易剛柔之宜亂人紀謂仁之時而舉義事孔疏易説卦云立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義孔氏穎達曰天云道地云理人云紀互辭也方氏慤曰道有常故曰毋變理可通故曰毋絶紀欲定故曰毋亂此古今所同也孟春一嵗之首故於此特言之胡氏銓曰天道若上司天日月星辰之類地理若上土地所宜之類人紀若上布農事之類彭氏亷夫曰天道即上文春氣時令之類當奉若而不違地理即上文農田土地之類當經理而無失人紀即上文禮樂當賜之類當循行而無悖此三句總結上文孟春行夏令則雨水不時草木蚤落國時有恐行秋令則其民大疫猋風暴雨總至藜莠蓬蒿並興行冬令則水潦為敗雪霜大摯首種不入猋音標莠音有摯音至種上聲又雨水呂氏春秋作風雨大摯淮南子作大雹下有正月官司空其樹楊陳澔分三節今合正義鄭氏康成曰行夏令則已氣乘之行秋令則申氣乘之行冬令則亥氣乘之孔疏同為孟仲季情氣相通迭相乘也四月於消息為乾孔疏陽生為息隂死為消十一月至四月為息言萬物得陽氣蕃息五月至十月為消言萬物得隂氣消盡往案陽消則隂息天地之大分陽主息隂主消而其來又各有消息也草木蚤落生日促也國時有恐以火訛相驚也孔疏巳來乘寅已為火寅為天漢之津火欲來而畏水故終不至但訛言耳七月始殺故疫回風為猋正月宿直尾箕箕好風其氣逆也孔疏鄭注洪範中央土氣為風東方木氣為雨西方金氣為隂箕東方木木克土土為妃尚妃所好故好風畢西方金金克木木為妃尚妃所好故好雨申來逆寅寅為風風被逆故為猋寅往破申申為雨雨被逆故為暴藜莠蓬蒿並興生氣亂惡物茂也首種謂稷孔疏百榖之內稷先種髙氏誘曰春木也夏火也木德用事法當寬仁而行火令火性炎上故草木稿落不待秋天氣不和國人惶恐也木仁也金殺也而行其令氣不和故民疫病金生水與水相干故風雨數至而荒穢滋生春陽也冬隂也而行其令隂乘陽故水潦為敗雪霜大摯傷害五榖春為嵗始稼穡應之不成熟也故曰首種不入孔氏穎達曰上論當月施令之事施之順時則氣序調釋若施令失所則災害繁興故自此以下論失政致災之事上既云毋變天道絶地理亂人紀天地與人共相感動故施令一失三才俱應雨水不時天也草木蚤落地也國時有恐人也三才中或先天或先民或先地大抵害重者先言之害輕者後言之亦有惟二才用者隨應則書不為義例也不時雨少不得應時爾雅扶搖謂之猋蔡雍云首種宿麥也案五榖惟稷最尊又最先種則以為稷良是而北地解凍後亦種春麥則以為春初所種不専一物亦可也朱子曰人行此令則召天之災方氏慤曰十有二月之令行乎天地之間人君奉之以成位乎中也苟人當此月之中行彼三時之令則變天道絶地理亂人紀矣故三者之災以類應焉吳氏澄曰亥屬水亥氣乘隂故水潦為敗冬隂勝春陽故雪霜大至春寒傷稷種故不收成陳氏澔曰行夏令為己火之氣所泄秋令為申金所傷冬令為亥水所淫也存疑馬氏睎孟曰洪範咎徴謂君之五事象天之五行狂失之蕩若常雨僭失之亢若常暘咎作於上驗見於下故曰徴焉儒者讀此誤而曰人事失而天必以類應故指物辨類曰方春而行夏秋冬令則必以此為害三時亦然嗚呼其果可必乎以未可必而必之此人君所以聞而不信也後人藉此而為五行災異之説亦欲警戒人君而卒不可必於是人君始厭説者之迂怪矣亦何輔於警戒之實乎夫洪範以五事為敬用庶徴為念用則所以警戒之者已至矣所謂君子之言信而有徴者哉案此有以天之時令錯行為説者有以君之政令失時為説者總之天人一理消息一機天道錯而人事應君道失而天氣亦應然而裁成天地之道輔相天地之宜者必君也書曰作善降之百祥作不善降之百殃祥有百殃亦有百不必舉其一以實之曰此為某應為某徴也夫君亦畏天命敬人事而已矣欽定禮記義疏卷二十
