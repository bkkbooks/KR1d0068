body:
  text: 大學第四十二陸氏德明曰鄭云大學者以其記博學可以為政也孔氏穎達曰案鄭目録云名曰大學者以其記博學可以為政也此於别録屬通論此大學之篇論學成之事能治其國章明其德於天下卻本明德所由先從誠意為始朱子曰子程子曰大學孔氏之遺書而初學入德之門也於今可見古人為學次第者獨賴此篇之存而論孟次之學者必由是而學焉則庶乎其不差矣案大學一篇亦不用正義存疑等六條同中庸例其案語已詳中庸卷首暨卷末大學之道在明明德在親民在止於至善知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得物有本末事有終始知所先後則近道矣釋文大舊音泰劉直帶反近附近之近朱注程子曰親當作新后後同後放此案朱本分在止於至善節慮而后能得節則近道矣節作三節界其注語于各節末仍空一字斷同中庸例鄭氏康成曰明明德謂在明其至德也止猶自處也得謂得事之宜也孔氏穎達曰大學至道矣此經大學之道在於明明德在於親民在止於至善積德而行則近於道也在明明德者言大學之道在於章明已之光明之德謂身有明德而更章顯之此其一也在親民者言大學之道在於親愛於民是其二也在止於至善者言大學之道在止處於至善之行此其三也言大學之道在於此三事矣知止而后有定者更覆說止於至善之事既知止於至善而后心能有定不有差二也定而后能靜者心定無欲故能靜不躁求也靜而后能安者以靜故情性安和也安而后能慮者情既安和能思慮於事也慮而后能得者既能思慮然後於事得宜也物有本末事有終始者若於事得宜而天下萬物有本有末經營百事有終有始也知所先後者既能如此天下百事萬物皆識知其先後也則近道矣者若能行此諸事則附近於大道矣朱子曰大學者大人之學也明明之也明德者人之所得乎天而虛靈不昧以具衆理而應萬事者也但為氣禀所拘人欲所蔽則有時而昏然其本體之明則有未嘗息者故學者當因其所發而遂明之以復其初也新者革其舊之謂也言既自明其明德又當推以及人使之亦有以去其舊染之汚也止者必至於是而不遷之意至善則事理當然之極也言明明德新民皆當止於至善之地而不遷蓋必其有以盡夫天理之極而無一毫人欲之私也此三者大學之綱領也止者所當止之地即至善之所在也知之則志有定向靜謂心不妄動安謂所處而安慮謂處事精詳得謂得其所止明德為本新民為末知止為始能得為終本始所先末終所後此結上文兩節之意古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知朱注治平聲釋文其知如字徐音智下致知同見案朱本合下致知在格物句作一節其注語總下截大文之末同中庸例鄭氏康成曰知謂知善惡吉凶之所終始也孔氏穎達曰古之欲明明德於天下者前章言大學之道在明德親民止善覆說止善之事既畢故此經說明明德之理先治其國者此以積學能為明德盛極之事以漸到今本其初故言欲章明已之明德使遍於天下者先須能治其國欲治其國者先齊其家也欲齊其家者先修其身言若欲齊家先須修身也欲修其身者先正其心言若欲修身必先正其心也欲正其心者先誠其意者總包萬慮謂之心為情所意念謂之意若欲正其心使無傾邪必須先至誠在於意念也若能誠實其意則心不傾邪也欲誠其意者先致其知者言欲精誠其已意先須招致其所知之事言初始必須習學然後能有所知曉其成敗故云先致其知也致知在格物釋文格古百反鄭氏康成曰格來也物猶事也其知於善深則來善物其知於惡深則來惡物言事緣人所好來也此致或為至孔氏穎達曰致知在格物此經明初以致知積漸而大至明德前經從盛以本初此經從初以至盛上下相結也致知在格物者言若能學習招致所知格來也已有所知則能在於來物若知善深則來善物知惡深則來惡物言善事隨人行善而來應之惡事隨人行惡亦來應之言善惡之來緣人所好也朱子曰明明德於天下者使天下之人皆有以明其明德也心者身之所主也誠實也意者心之所發也實其心之所發欲其必自慊而無自欺也致推極也知猶識也推極吾之知識欲其所知無不盡也格至也物猶事也窮至事物之理欲其極處無不到也此八者大學之條目也物格而后知至知至而后意誠意誠而后心正心正而后身修身修而后家齊家齊而后國治國治而后天下平自天子以至於庶人一是皆以修身為本其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也此謂知本此謂知之至也釋文治直吏反重案朱注釋音同釋文者概不出同中庸例節朱本分國治而后天下平節一是皆以修身為本末之有也節作三節末二句朱本移在聽訟章後為𫝊之第五章此謂知本程子曰衍文也此謂知之至也朱注云此句之上别有闕文此特其結語耳鄭氏康成曰一是專行是也孔氏穎達曰物格而后知至者物既來則知其善惡所至善事來則知其至於善若惡事來則知其至於惡既能知至則行善不行惡也知至而后意誠既能知至則意念精誠也意誠而后心正者意能精誠故能心正也國治而后天下平者則上明明德於天下是以自天子至庶人皆然也一是皆以修身為本者言上從天子下至庶人貴賤雖異所行此者專一以修身為本上言誠意正心齊家治國今此獨云修身為本者細别雖異其大略皆是修身也其本亂而末治者否矣本亂謂身不修也末治謂國家治也言巳身既不修而望家國治者否矣否不也言不有此事也其所厚者薄而其所薄者厚未之有也者此覆說本亂而末治者否矣之事也譬若與人交接應須敦厚以加於人今所厚之處乃以輕薄謂以輕薄待彼人也其所薄者厚謂已既與彼輕薄欲望所薄之處以厚重報已未有此事也言已以厚施人人亦厚以報已也若已輕薄施人人亦輕薄報已言事厚之與薄皆以身為本也此謂知本此謂知之至也者本謂身也既以身為本若能自知其身是知本也是知之至極也朱子曰物格者物理之極處無不到也知至者吾心之所知無不盡也知既盡則意可得而實矣意既實則心可得而正矣修身以上明明德之事也齊家以下新民之事也物格知至則知所止矣意誠以下則皆得所止之序也一是一切也正心以上皆所以修身也齊家以下則舉此而錯之耳本謂身也所厚謂家也此兩節結上文兩節之意右經一章蓋孔子之言而曾子述之凡二百五字其傳十章則曾子之意而門人記之也舊本頗有錯簡今因程子所定而更考經文别為序次如左凡千五百四十六字凡傳文雜引經傳若無統紀然文理接續血脉貫通深淺始終至為精密熟讀詳味久當見之今不盡釋也案朱子章句序次於聖經後移康誥曰克明德至自明也分作四節為傳之首章釋明明德移湯之盤銘曰至無所不用其極分作四節為傳之第二章釋新民移詩云邦畿千里至止於信分作三節在詩云瞻彼淇澳至沒世不忘也二節前共五節為𫝊之第三章釋止於至善移子曰聽訟吾猶人至此謂知本合作一節為傳之第四章釋本末移此謂知本此謂知之至也二句為傳之第五章取程子之意以補之釋格物致知移所謂誠其意者至君子必誠其意分作四節為傳之第六章釋誠意以所謂修身在正其心者至在正其心分作三節為傳之第七章釋正心修身以所謂齊其家至不可以齊其家分作三節為傳之第八章釋修身齊家以所謂治國至此謂治國在齊其家作九節為傳之第九章釋齊家治國以所謂平天下至以義為利也作二十三節為傳之第十章釋治國平天下篇內節次悉依注疏舊本所録朱注亦從鄭本大文逐次分貼兹特總揭朱子章句序次俾讀者一覽而識其同異焉所謂誠其意者毋自欺也如惡惡臭如好好色此之謂自謙故君子必慎其獨也小人閒居為不善無所不至見君子而后厭然掩其不善而著其善人之視已如見其肺肝然則何益矣此謂誠於中形於外故君子必慎其獨也釋文毋音無惡惡上烏路反下如字臭昌救反好好上呼報反下如字謙依注讀為慊徐若簟反閒音間厭讀黶烏斬反又烏簟反掩於檢反著張慮反肺芳廢反肝音干案朱本分上君子必慎其獨也節下君子必慎其獨也節作二節鄭氏康成曰謙讀為慊慊之言厭也厭讀為黶黶閉藏貌也孔疏謙讀為慊以經義之理言作謙退之字既無謙退之事故讀為慊慊不滿之貌故又讀為厭厭自安靜也云厭讀為黶黶為黑色如為閉藏貌也孔氏穎達曰所謂誠其意者自此以下至此謂知本廣明誠意之事此一節明誠意之本先須慎其獨也毋自欺也言欲精誠其意無自欺誑於身言於身必須誠實也如惡惡臭者謂臭穢之氣謂見此惡事而嫌惡之如人嫌臭穢之氣心實嫌之口不可道矣如好好色者謂見此善事而愛好之如似人好色心實好之口不可道矣言誠其意者見彼好事惡事當須實好惡之不言而自見不可外貌詐作好惡而內心實不好惡也皆須誠實矣此之謂自謙者謙讀如慊慊然安靜之貌心雖好惡而口不言應自然安靜也見君子而后厭然掩其不善而著其善者謂小人獨居無所不為見君子而後乃厭然閉藏其不善之事宣著所行善事也人之視巳如見其肺肝然則何益矣者言小人為惡外人視之昭然明察矣如見肺肝雖消沮閉藏言何益矣此謂誠於中形於外者言此小人既懷詐實惡事於中心必形見於外不可掩藏朱子曰誠其意者自修之首也毋者禁止之辭自欺云者知為善以去惡而心之所發有未實也謙快也足也獨者人所不知而已所獨知之地也言欲自修者知為善以去其惡則當實用其力而禁止其自欺使其惡惡則如惡惡臭好善則如好好色皆務决去而求必得之以自快足於已不可徒茍且以狥外而為人也然其實與不實蓋有他人所不及知而巳獨知之者故必謹之於此以審其幾焉閒居獨處也厭然消沮閉藏之貌此言小人隂為不善而陽欲掩之則是非不知善之當為與惡之當去也但不能實用其力以至此耳然欲掩其惡而卒不可掩欲詐為善而卒不可詐則亦何益之有哉此君子所以重以為戒而必謹其獨也曾子曰十目所視十手所指其嚴乎富潤屋德潤身心廣體胖故君子必誠其意釋文胖步丹反子案朱本分其嚴乎節故君必誠其意節作二節鄭氏康成曰嚴乎言可畏敬也胖猶大也三者言有實於內顯見於外孔氏穎達曰曾子曰十目所視者此經明君子修身外人所視不可不誠其意作記之人引曾子之言以證之十目所視十手所指者言所指視者衆也十目謂十人之目十手謂十人之手也其嚴乎者既視者及指者皆衆其所畏敬可嚴憚乎富潤屋德潤身者言此二句為喻也言家若富則能潤其屋有金玉又華飾見於外也德潤身者謂德能霑潤其身使身有光榮見於外也心廣體胖者言內心寬廣則外體胖大言為之於中必形見於外也故君子必誠其意者以有內見於外必須精誠其意在內心不可虛也朱子曰引此以明上文之意言雖幽獨之中而其善惡之不可掩如此可畏之甚也胖安舒也言富則能潤屋矣德則能潤身矣故心無愧怍則廣大寬平而體常舒泰德之潤身者然也蓋善之實於中而形於外者如此故又言此以結之右傳之六章釋誠意經曰欲誠其意先致其知又曰知至而后意誠蓋心體之明有所未盡則其所發必有不能實用其力而茍焉以自欺者然或已明而不謹乎此則其所眀又非己有而無以為進德之基故此章之指必承上章而通考之然後有以見其用力之始終其序不可亂而功不可闕如此云詩云瞻彼淇澳菉竹猗猗有斐君子如切如磋如琢如磨瑟兮僩兮赫兮喧兮有斐君子終不可喧兮如切如磋者道學也如琢如磨者自修也瑟兮僩兮者恂栗也赫兮喧兮者威儀也有斐君子終不可喧兮者道盛德至善民之不能忘也釋文淇音其澳本亦作奧於六反本又作隩一音烏報反菉音緑猗於宜反斐芳尾反一音匪文章貌磋七何反琢丁角反爾雅云骨曰切象曰磋玉曰琢石曰磨僩下板反又胡板反赫許百反喧本亦作咺况晚反喧許袁反詩作諼或作喧音同恂依注音峻思俊反一音思旬反栗利悉反朱注菉詩作緑猗叶韻音阿信案朱本移此節並下節在詩云邦畿千里章止於後為傳之三章後二節鄭氏康成曰此心廣體胖之詩也澳隈崖也菉竹猗猗喻美盛斐有文章貌也喧忘也道猶言也恂字或作峻讀如嚴峻之峻言其容貌嚴栗也民不能忘以其意誠而德著也孔疏喧忘也釋訓文也云道猶言也謂經中道盛德至善恐為道德之道故云道猶言也云恂字或作峻讀為嚴峻之峻者以經之恂字他本或作峻字故讀為嚴峻之峻詩箋云還為恂也此記為赫兮喧兮詩經云赫兮咺兮本不同也云以其意誠而德著也以武公用意精誠德著於人人不忘也以經廣明誠意之事故鄭云意誠而德著也孔氏穎達曰詩云瞻彼淇澳者此一經廣明誠意之事故引詩言學問自新顔色威儀之事以證誠意之道也瞻彼淇澳菉竹猗猗者此詩衛風淇澳之篇衛人美武公之德也奧隈也菉王芻也竹扁竹也視彼淇水之隈曲之內生此菉之與竹猗猗然而茂盛以淇水浸潤故也言視彼衛朝之內上有武公之身道德茂盛亦本康叔之餘烈故也引之者證誠意之道有斐君子者有斐然文章之君子學問之盛矣如切如磋者如骨之切如角之磋又能自修也如琢如磨者如玉之琢如石之磨也瑟兮僩兮赫兮喧兮有斐君子終不可喧兮者又瑟然顔色矜莊僩然性行寬大赫然顔色盛美喧然威儀宣美斐然文章之君子民皆愛念之終久不可忘也喧忘也自此以上詩之本文也自此以下記者引爾雅而釋之如切如磋者道學也者論道其學矣如琢如磨者自修也者謂自修飾矣言初習謂之學重習謂之修亦謂詩本文互而相通也瑟兮僩兮者恂栗也者恂讀為峻言顔色嚴峻戰栗也道盛德至善民之不能忘也謂善稱也有斐君子終不可喧兮論道武公盛德至極美善人之愛念不能忘也朱子曰詩衛風淇澳之篇淇水名澳隈也猗猗美盛貌興也斐文貌切以刀鋸琢以椎鑿皆裁物使成形質也磋以鑢錫磨以沙石皆治物使其滑澤也治骨角者既切而復磋之治玉石者既琢而復磨之皆言其治之有緒而益致其精也瑟嚴密之貌僩武毅之貌赫喧宣著盛大之貌喧忘也道言也學謂講習討論之事自修者省察克治之功恂栗戰懼也威可畏也儀可象也引詩而釋之以眀眀眀德者之止於至善道學自修言其所以得之之由恂栗威儀言其德容表裏之盛卒乃指其實而歎美之也詩云於戲前王不忘君子賢其賢而親其親小人樂其樂而利其利此以沒世不忘也釋文於音烏下於緝熙同戲好胡反徐范音羲樂其樂並音嶽又音洛鄭氏康成曰聖人既有親賢之德其政又有樂利於民君子小人各有以思之孔氏穎達曰於戲前王不忘者此一經廣明誠意之事此周頌烈文之篇美武王之詩於戲猶言嗚呼矣以文王武王意誠於天下故詩人歎美之云此前世之王其德不可忘也君子賢其賢而親其親者言後世貴重之言君子皆美此前王能賢其賢人而親其族親也小人樂其樂而利其利者言後世卑賤小人美此前王能愛樂其所樂謂民之所樂者前王亦愛樂之利其利者能利益其人之所利民為利者前王亦利益之言前王施為政教下順人情不奪人之所樂利之事故云小人樂其樂而利其利也此以沒世不忘也由前王意能精誠垂於後世故君子小人皆所美念以此之故終沒於世其德不忘也朱子曰詩周頌烈文之篇於戲歎辭前王謂文武也君子謂其後賢後王小人謂後民也此言前王所以新民者止於至善能使天下後世無一物不得其所所以既沒世而人思慕之愈久而不忘也此兩節咏歎淫泆其味深長當熟玩之右傳之三章釋止於至善案朱本於釐正錯簡處仍識章末此依舊本概不復存康誥曰克明德大甲曰顧諟天之明命帝典曰克明峻德皆自明也釋文誥古報反大音泰顧諟上音故下音是峻徐音俊又私俊反朱注諟古是字峻書作俊克案朱本分克明德節顧諟天之明命節明峻德節皆自明也節作四節鄭氏康成曰皆自明明德也孔疏明明德必先誠其意此經誠意之章由初誠意也故人先能明己之明德也克能也顧念也諟猶正也帝典堯典亦尚書篇名也峻大也諟或為題孔氏穎達曰康誥曰克明德者此一經廣明意誠則能明己之德周公封康叔而作康誥戒康叔能明用有德此記之意言周公戒康叔以自明其德與尚書異也大甲曰顧諟天之明命者顧念也諟正也伊尹戒大甲云爾為君當顧念奉正天之顯明之命不邪僻也帝典曰克明峻德者帝典謂堯典之篇峻大也尚書之意言堯能明用賢俊之德此記之意言堯能自明大德也皆自明也此經所云康誥大甲帝典等之文皆是人君自明其德也故云皆自明也朱子曰康誥周書克能也大甲商書顧謂常目在之也諟猶此也或曰審也天之明命即天之所以與我而我之所以為德者也常目在之則無時不明矣帝典堯典虞書峻大也結所引書皆言自明己德之意右傳之首章釋明明德湯之盤銘曰茍日新日日新又日新康誥曰作新民詩云周雖舊邦其命惟新是故君子無所不用其極釋文盤步干反銘徐音冥亡丁反無案朱本分又日新節作新民節其命維新節君子所不用其極節作四節云作曰惟作維鄭氏康成曰盤銘刻戒於盤也極猶盡也君子日新其德常盡心力不有餘也孔氏穎達曰湯之盤銘此一經廣明誠意之事湯之盤銘者湯沐浴之盤而刻銘為戒必於沐浴之者戒之甚也茍日新者此盤銘辭也非唯洗沐自新茍誠也誠使道德日益新也日日新者言非唯一日之新當使日日益新又日新者言非唯日日益新又須恆常日新皆是丁寧之辭也此謂精誠其意修德無已也康誥曰作新民者成王既伐管叔蔡叔以殷餘民封康叔誥言殷人化紂惡俗使之變改為新人此記之意自念其德為新民也詩曰周雖舊邦其命維新者此大雅文王之篇其詩之本意言周雖舊是諸侯之邦其受天之命唯為天子而更新也此記之意其所施教命唯能念德而自新也是故君子無所不用其極者極盡也言君子欲日新其德無處不用其心盡力也言自新之道唯在盡其心力更無餘行也朱子曰盤沐浴之盤也銘名其器以自警之辭也茍誠也湯以人之洗濯其心以去惡如沐浴其身以去垢故銘其盤言誠能一日有以滌其舊染之汚而自新則當因其已新者而日日新之又日新之不可略有間斷也鼓之舞之之謂作言振起其自新之民也詩大雅文王之篇言周國雖舊至於文王能新其德以及於民而始受天命也自新新民皆欲止於至善也右傳之二章釋新民詩云邦畿千里惟民所止詩云緡蠻黃鳥止于丘隅子曰於止知其所止可以人而不如鳥乎釋文畿音祈又音幾音同緡蠻音綿一音亡巾反毛詩作綿傳云綿蠻小鳥貌下案朱本分惟民所止節可以人而不如鳥乎節並文王節俱移在瞻彼淇澳二節前為傳之第三章前三節鄭氏康成曰於止言鳥之所止也就而觀之知其所止知鳥擇岑蔚安閒而止處之耳孔疏岑謂巖險蔚謂草木蓊蔚言鳥之所止必擇靜密之處也言人亦當擇禮義樂土而自止處也論語曰里仁為美擇不處仁焉得知孔氏穎達曰詩云邦畿千里惟民所止此一經廣明誠意之事言誠意在於所止故上云大學之道在於至善此商頌𤣥鳥之篇言殷之邦畿方千里唯人所居止此記斷章喻其民人而擇所止言人君賢則來也詩云緡蠻黃鳥止于丘隅者此詩小雅緡蠻之篇刺幽王之詩言緡蠻然微小之黃鳥止在於岑蔚丘隅之處得其所止以言微小之臣依託大臣亦得其所也子曰於止知其所止者孔子見其詩文而論之云是觀於鳥之所止則人亦知其所止鳥之知在岑蔚安閒之處則知人亦擇禮義樂土之處而居止也可以人而不如鳥乎者豈可以人不擇止處不如鳥乎言不可不如鳥也故論語云里仁為美擇不處仁焉得知是也朱子曰詩商頌𤣥鳥之篇邦畿王者之都也止居也言物各有所當止之處也詩小雅緡蠻之篇緡蠻鳥聲丘隅岑蔚之處子曰以下孔子說詩之辭言人當知所當止之處也詩云穆穆文王於緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信釋文緝七入反熙許其反朱注於緝之於音烏鄭氏康成曰緝熙光明也此美文王之德光明敬其所以自止處孔氏穎達曰詩云穆穆文王於緝熙敬止者此大雅文王之篇美文王之詩緝熙謂光明也止辭也詩之本意云文王見此光明之人則恭敬之此記之意於緝熙言嗚呼文王之德緝熙光明又能敬其所止以自居處也朱子曰詩文王之篇穆穆深逺之意於歎美辭緝繼續也熙光明也敬止言其無不敬而安所止也引此而言聖人之止無非至善五者乃其目之大者也學者於此究其精微之藴而又推類以盡其餘則於天下之事皆有以知其所止而無疑矣子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志釋文訟似用反句案朱本合下此謂知本作一節鄭氏康成曰情猶實也無實者多虛誕之辭聖人之聽訟與人同耳必使民無實者不敢盡其辭大畏其心志使誠其意不敢訟孔氏穎達曰子曰至利也此一經廣明誠意之事言聽訟者惟自誠己意亦服民使誠意也孔子稱斷獄猶如常人無異也言吾與常人同也必也使無訟者必使無理之人不敢爭訟也無情者不得盡其辭者情實也言無實虛誕之人無道理者不得盡竭其虛僞之辭也大畏民志者大能畏脅民人之志言人有虛誕之志者皆畏懼不敢言民亦誠實其意也聽訟吾猶人也必也使無訟乎者斷獄之辭無情者不得盡其辭大畏民志者能自誠而使民誠意自然能使無訟則是異於人也而云吾猶人者斷獄者俱備兩造吾聽與人無殊故云吾猶人也能服民使誠意不敢爭所以使無訟也此謂知本鄭氏康成曰本謂誠其意也孔氏穎達曰此謂知本者此從上所謂誠其意者至此章大畏民志以上皆是誠意之事意為行身之本能自知其身是知其本故云此謂知本也朱子曰猶人不異於人也情實也引夫子之言而言聖人能使無實之人不敢盡其虛誕之辭蓋我之明德既明自然有以畏服民之心志故訟不待聽而自無也觀於此言可以知本末之先後矣右傳之四章釋本末案朱本移前此謂知本此謂知之至也在傳之四章後以別有闕文為之補其義曰右傳之五章蓋釋格物致知之義而今亡矣間嘗竊取程子之意以補之曰所謂致知在格物者言欲致吾之知在即物而窮其理也蓋人心之靈莫不有知而天下之物莫不有理惟於理有未窮故其知有不盡也是以大學始教必使學者即凡天下之物莫不因其已知之理而益窮之以求至乎其極至於用力之久而一旦豁然貫通焉則衆物之表裏精粗無不到而吾心之全體大用無不明矣此謂物格此謂知之至也所謂修身在正其心者身有所忿􅓰則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正心不在焉視而不見聽而不聞食而不知其味此謂修身在正其心釋文忿弗粉反􅓰敕值反范音稚徐丁四反又音勩恐邱勇反好呼報反下故好而知同樂徐五孝反一音嶽朱注程子曰身有之身當作心案朱本分有所憂患則不得其正節食而不知其味節在正其心節作三節鄭氏康成曰􅓰怒貌也或作懫或作疐孔氏穎達曰所謂修身者此覆明前經正心修身之事身有所忿懥則不得其正者懥謂怒貌也有所忿懥則不得其正言因怒而違於正也所以然者或不察而不當於理則失於正也有所恐懼則不得其正者言因恐懼而違於正也心不在焉視而不見聽而不聞食而不知其味者此言修身之本必在正心若心之不正身亦不修若心之不在視聽與食不覺知也是心為身本修身必在於正心也朱子曰忿懥怒也蓋是四者皆心之用而人所不能無者然一有之而不能察則欲動情勝而其用之所行或不能不失其正矣心有不存則無以檢其身是以君子必察乎此而敬以直之然後此心常存而身無不修也右傳之七章釋正心修身此亦承上章以起下章蓋意誠則真無惡而實有善矣所以能存是心以檢其身然或但知誠意而不能密察此心之存否則又無以直內而修身也所謂齊其家在修其身者人之其所親愛而辟焉之其所賤惡而辟焉之其所畏敬而辟焉之其所哀矜而辟焉之其所敖惰而辟焉故好而知其惡惡而知其美者天下鮮矣故諺有之曰人莫知其子之惡莫知其苖之碩此謂身不修不可以齊其家辟音譬謂譬喻也賤惡烏路反下惡而知同敖五報反惰徒卧反鮮仙善反諺魚變反俗語也朱注辟讀為僻碩叶韻時若反案朱本分天下鮮矣節莫知其苖之碩節不可以齊其家節作三節鄭氏康成曰之適也譬猶喻也言適彼而以心度之曰吾何以親愛此人非以其有德美與吾何以敖惰此人非以其志行薄與反以喻己則身修與否可自知也鮮罕也人莫知其子之惡猶案猶疑當作由愛而不察碩大也孔疏之適也釋詁文云反以喻己者謂見他人所親愛被賤惡以人類己他人之事反來自辟己身也云則修身與否可自知也者謂彼人不修則被賤惡敖惰己若不以修身事亦然也若彼修身則被親愛敬畏己若修身亦當然也故云修身與否可自知也云碩大也釋詁文孔氏穎達曰所謂齊其家在修其身者此經重明前經齊家修身之事人之其所親愛而辟焉者之猶適也此言修身之譬也設我適彼人見彼有德則為我所親愛當反自譬喻於我也以彼有德故為我所親愛則我若自修身有德必然亦能使衆人親愛於我也之其所賤惡而辟焉者又言我往之彼而賤惡彼人者必是彼人無德故也亦當回以譬我我若無德則人亦賤惡我也之其所畏敬而辟焉者又我往之彼而畏敬彼人必是彼人莊嚴故也亦回以譬我我亦當莊嚴則人亦必畏敬我之其所哀矜而辟焉者又我往之彼而哀矜彼人必是彼人有慈善柔弱之德故也亦回譬我我有慈善而或柔弱則亦為人所哀矜也之其所敖惰而辟焉者又我往之彼而敖惰彼人必是彼人邪僻故也亦回譬我我若邪僻則人亦敖惰於我也故好而知其惡惡而知其美者天下鮮矣者知識也鮮少也人心多偏若心愛好之而多不知其惡若嫌惡之而多不知其美今雖愛好知彼有惡事雖憎惡知彼有美善天下之內如此者少矣故諺有之曰人莫知其子之惡莫知其苖之碩者碩猶大也言人之愛子其意至甚子雖有惡不自覺知猶好而不知其惡也農夫種田恆欲其盛苖雖碩大猶嫌其惡以貪心過甚故不知其苖之碩若能以己子而方他子己苖而匹他苗則好惡可知皆以己而待他物也此謂身不修不可以齊其家者此不知子惡不知苗碩之人不修其身身既不修不能以己辟人故不可以齊整其家朱子曰人謂衆人之猶於也辟猶偏也五者在人本有當然之則然常人之情惟其所向而不加察焉則必陷於一偏而身不修矣諺俗語也溺愛者不明貪得者無厭是則偏之為害而家之所以不齊也右傳之八章釋修身齊家所謂治國必先齊其家者其家不可教而能教人者無之故君子不出家而成教於國孝者所以事君也弟者所以事長也慈者所以使衆也康誥曰如保赤子心誠求之雖不中不遠矣未有學養子而后嫁者也釋文弟音悌長竹杖反中丁仲反子案朱本分慈者所以使衆也節未有學養而后嫁者也節作二節鄭氏康成曰養子者推心為之而中於赤子之嗜欲也孔氏穎達曰所謂至其家此一節覆明前經治國齊家之事康誥曰如保赤子者此成王命康叔之辭赤子謂心所愛之子言治民之時如保愛赤子愛之甚也心誠求之雖不中不遠矣者言愛此赤子內心精誠求赤子之嗜欲雖不能正中其所欲去其所嗜欲亦不甚遠言近其赤子之嗜欲為治人之道亦當如此也未有學養子而后嫁者也言母之養子自然而愛中當赤子之嗜欲非由學習而來故云未有學養子而后嫁者此皆本心而為之言皆喻人君也朱子曰身修則家可教矣孝弟慈所以修身而教於家者也然而國之所以事君事長使衆之道不外乎此此所以家齊於上而教成於下也此引書而釋之又明立教之本不假強為在識其端而推廣之耳一家仁一國興仁一家讓一國興讓一人貪戾一國作亂其機如此此謂一言僨事一人定國釋文戾力計反朱注僨音奮鄭氏康成曰一家一人謂人君也戾之言利也機發動所由也僨猶覆敗也春秋傳曰登戾之又曰鄭伯之車僨於濟戾或為吝僨或為奔孔疏一家一人謂人君也者以經言治家故知是人君也若文王刑于寡妻至于兄弟以御于家邦是也云春秋傳曰登戾之者此隱五年公羊𫝊文案彼傳文公觀魚于棠何以書譏何譏爾遠也公曷為遠而觀魚登來之也彼注意謂以思得而來之齊人語謂登來謂得來也聲有緩急得為登謂隱公觀魚于棠得此百金之魚而來觀之公羊傳為登來鄭所引公羊本為登戾之以來為戾與公羊本不同也鄭意以戾為貪戾故引以證經之貪戾也云又曰鄭伯之車僨于濟隱公三年左𫝊文孔氏穎達曰一家仁一國興仁一家讓一國興讓者言人君行善於家則外人化之故一家一國皆仁讓也一人貪戾一國作亂者謂人君一人貪戾惡事則一國學之作亂其機如此者機謂關機也動於近成於遠善惡之事亦發於身而及於一國也此謂一言僨事一人定國者僨猶覆敗也謂人君一言覆敗其事謂惡言也一人定國謂由人君一人能定其國謂善政也古有此言今記者引所為之事以結之上云一人貪戾一國作亂是一言僨事也又云一家仁讓則一國仁讓是知一人定國也一家則一人也皆謂人君是一人之身先治一家乃後治一國朱子曰一人謂君也機發動所由也僨覆敗也此言教成於國之效堯舜率天下以仁而民從之桀紂率天下以㬥而民從之其所令反其所好而民不從釋文好呼報反未案朱本自此節合下之有也作一節率作帥鄭氏康成曰言民化君行也君若好貨而禁民淫於財利不能正也孔氏穎達曰其所令反其所好而民不從者令謂君所號令之事若各隨其行之所好則人從之其所好者是惡所令者是善則所令之事反其所好雖欲以令禁人人不從也是故君子有諸己而后求諸人無諸己而后非諸人所藏乎身不恕而能喻諸人者未之有也故治國在齊其家案朱本分末句另作一節鄭氏康成曰有於己謂有仁讓也無於己謂無貪戾也孔氏穎達曰是故君子有諸己而后求諸人者諸於也謂君子有善行於己而后可以求於人使行善行也謂於己有仁讓而后可求於人之仁讓也無諸己而后非諸人者謂無惡行於己而后可以非責於人為惡行也謂無貪戾之事於己而后非責於人也所藏乎身不恕而能喻諸人者未之有也者謂所藏積於身既不恕實而能曉喻於人使從己者未之有也言無善行於身欲曉喻於人為善行不可得也朱子曰此又承上文一人定國而言有善於己然後可以責人之善無惡於己然後可以正人之惡皆推己以及人所謂恕也不如是則所令反其所好而民不從矣喻曉也通結上文案此句注故治國節渾篇內朱注數節中有圗一語莫辨何屬者特為注明同中庸例詩云桃之夭夭其葉蓁蓁之子于歸宜其家人宜其家人而后可以教國人詩云宜兄宜弟宜兄宜弟而后可以教國人詩云其儀不忒正是四國其為父子兄弟足法而后民法之也此謂治國在齊其家釋文夭於驕反蓁音臻忒他得反弟案朱本分宜其家人而後可以教國人節宜兄宜而后可以教國人節而后民法之也節在齊其家節作四節鄭氏康成曰夭夭蓁蓁美盛貌之子者是子也孔氏穎達曰詩云桃之夭夭其葉蓁蓁者此周南桃夭之篇論昏姻及時之事言桃之夭夭少好其葉蓁蓁茂盛喻婦人形體少壯顏色茂盛之時似桃之夭夭也之子于歸宜其家人者之子者是子也歸嫁也宜可以為夫家之人引之者取宜其家人之事宜其家人而后可以教國人者言人既家得宜則可以教國人也詩云宜兄宜弟者此小雅蓼蕭之篇美成王之詩詩之本文言成王有德宜為人兄宜為人弟此記之意宜兄宜弟謂自與兄弟相善相宜也既為兄弟相宜而可兄弟之意而后可以教國人也詩云其儀不忒正是四國者此曹風鳲鳩之篇忒差也正長也言在位之君子威儀不有差忒可以正長是四方之國言可法則也其為父子兄弟足法而后民法之也者此謂治國在齊其家謂其修德於家在室家之內使父子兄弟足可以方法而后民法之也是先齊其家而后能治其國也朱子曰詩周南桃夭之篇夭夭少好貌蓁蓁美盛貌興也之子猶言是子此指女子之嫁者而言也婦人謂嫁曰歸宜猶善也詩小雅蓼蕭篇詩曹風鳲鳩篇忒差也此三引詩皆以咏歎上文之事而又結之如此其味深長最宜潛玩右傳之九章釋齊家治國所謂平天下在治其國者上老老而民興孝上長長而民興弟上恤孤而民不倍是以君子有潔矩之道也釋文長竹杖反弟音悌倍音佩潔音結朱注倍與背同潔胡結反鄭氏康成曰老老長長謂尊老敬長也恤憂也民不倍不相倍棄也潔猶結也挈也矩法也君子有挈法之道謂常執而行之動作不失之倍或作偝矩或作巨孔氏穎達曰自此以下至終篇覆明上文平天下先治其國之事但欲平天下先須治國治國事多於平天下非一義可了故廣而明之言欲平天下先須修身修身之事由近至遠自內至外故初明潔矩之道次明散財於民其又次明用善人遠惡人此皆治國治天下之綱故特詳悉畢舉今各隨文解之上恤孤而民不倍者孤弱之子人所易棄是上君長若能憂恤孤弱不遺則下民學之不相棄倍也是以君子有潔矩之道也者潔猶結也矩法也言君子於天下持矩法之道動而無失以此加物物皆從之也朱子曰老老所謂老吾老也興謂有所感發而興起也孤者幼而無父之稱潔度也矩所以為方也言此三者上行下效捷於影響所謂家齊而國治也亦可以見人心之所同而不可使有一夫之不獲矣是以君子必當因其所同推以度物使彼我之間各得分願則上下四旁均齊方正而天下平矣所惡於上毋以使下所惡於下毋以事上所惡於前毋以先後所惡於後毋以從前所惡於右毋以交於左所惡於左毋以交於右此之謂潔矩之道釋文惡烏路反毋音無朱注先去聲鄭氏康成曰潔矩之道善持其所有以恕於人耳治國之要盡於此孔氏穎達曰所惡於上毋以使下者此以下皆是潔矩之道也譬諸侯有天子在於上有不善之事加己己惡之則不可回持此惡事使己下者為之也所惡於下毋以事上者言臣下不善事己己所有惡則己不可持此惡事回以事己之君上也所惡於前毋以先後者前謂在己之前不以善事施己己所憎惡則無以持此惡事施於後人也所惡於後毋以從前者後謂在己之後不以善事施己己則無以惡事施於前行之人也所惡於右毋以交於左者謂與己平敵或在己右或在己左若右以惡加己己所憎惡則無以此惡事施於左人舉此一隅餘可知也此之謂潔矩之道者上經云君子有潔矩之道也其潔矩之義未明故此經申說能持其所有以待於人恕己接物即潔矩之道也朱子曰此覆解上文潔矩二字之義如不欲上之無禮於我則必以此度下之心而亦不敢以此無禮使之不欲下之不忠於我則必以此度上之心而亦不敢以此不忠事之至於前後左右無不皆然則身之所處上下四旁長短廣狹彼此如一而無不方矣彼同有是心而興起焉者又豈有一夫之不獲哉所操者約而所及者廣此平天下之要道也故章內之意皆自此而推之詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父母釋文只音紙好好皆呼報反朱注樂音洛惡去聲下同鄭氏康成曰言治民之道無他取於己而已孔氏穎達曰詩云樂只君子民之父母此記者引之又申明潔矩之道若能以己化民從民所欲則可謂民之父母此小雅南山有臺之篇美成王之詩也只辭也言能以己化民從民所欲則可為民父母矣民之所好好之者謂善政恩惠是民之願好己亦好之以施於民若發倉廩賜貧窮賑乏絶是也民之所惡惡之者謂苛政重賦是人之所惡己亦惡之而不行也朱子曰詩小雅南山有臺之篇只語助辭言能潔矩而以民心為己心則是愛民如子而民愛之如父母矣詩云節彼南山維石巖巖赫赫師尹民具爾瞻有國者不可以不慎辟則為天下僇矣釋文節前切反又音如字巖五銜反辟匹亦反又必益反與僻同僇力竹反與戮同孔氏穎達曰詩云節彼南山者上經說恕己待民此經明己須戒慎也詩云節彼南山維石巖巖此小雅節南山之篇刺幽王之詩言幽王所任大臣非其賢人也節然高峻者是彼南山維積纍其石巖巖然高大喻幽王大臣師尹之尊嚴赫赫師尹民具爾瞻者赫赫顯盛貌是太師與人為則者具俱也爾汝也在下之民俱於汝而瞻視之言皆視師尹而為法此記之意以喻人君在上民皆則之不可不慎有國者不可以不慎者有國謂天子諸侯言民皆視上所行而則之不可不慎其德乎宜慎之也辟則為天下僇矣者僇謂刑戮也君若邪辟則為天下之民共所誅討若桀紂是也朱子曰詩小雅節南山之篇節截然高大貌師尹周太師尹氏也具俱也辟偏也言在上者人所瞻仰不可不謹若不能潔矩而好惡徇於一己之偏則身弒國亡為天下之大僇矣詩云殷之未喪師克配上帝儀監于殷峻命不易道得衆則得國失衆則失國是故君子先慎乎德有德此有人有人此有土有土此有財有財此有用德者本也財者末也外本內末爭民施奪是故財聚則民散財散則民聚是故言悖而出者亦悖而入貨悖而入者亦悖而出釋文喪息浪反峻恤俊反易以䜴反爭爭鬭之爭施如字悖布內反朱注儀詩作宜峻詩作駿案朱本分失衆則失國節有財此有用節財者末也節爭民施奪節財散則民聚節亦悖而出節作六節鄭氏康成曰師衆也克能也峻大也言殷王帝乙以上未失其民之時德亦有能配天者謂天享其祭祀也及紂為惡而民怨神怒以失天下監視殷時之事天之大命持之誠不易也道猶言也用謂國用也施奪施其劫奪之情也悖猶逆也言君有逆命則民有逆辭也上貪於利則下人侵畔老子曰多藏必厚亡孔疏師衆也峻大也皆釋詁文爾雅峻字馬旁為之與此同也克能也釋言文也云君有逆命則民有逆辭也者君有逆命解經言悖而出也民有逆辭解經亦悖而入謂人有逆君之辭以拒君也云老子曰多藏必厚亡者言積聚藏之既多必厚重而散亡也引之者證貨悖而入亦悖而出孔氏穎達曰詩云殷之未喪師克配上帝此一經明治國之道在貴德賤財此大雅文王之篇美文王之詩因以戒成王也克能也師衆也言殷自紂父帝乙之前未喪師衆之時所行政教皆能配上天而行也儀監于殷峻命不易者儀宜也監視也今成王宜監視于殷之存亡峻大也奉此天之大命誠為不易言其難也道得衆則得國失衆則失國者道猶言也詩所云者言帝乙以上得衆則得國言殷紂失衆則失國也有德此有人者有德之人人之所附從故有德此有人也有人此有土者有人則境土寬大故有土也有土此有財者言有土則生植萬物故有財也有財此有用者為國用有案有疑作由財豐以此而有供國用也德者本也財者末也者德能致財財由德有故德為本財為末也外本內末爭民施奪者外疏也內親也施奪謂施其劫奪之情也君若親財而疏德則爭利之人皆施劫奪之情也是故財聚則民散財散則民聚者事不兩興財由民立君若重財而輕民則民散也若財散而賙恤於民則民咸歸聚也是故言悖而出者亦悖而入者悖逆也若人君政教之言悖逆人心而出行者則民悖逆君上而入以報答也謂拒違君命也貨悖而入者亦悖而出者若人君厚斂財貨悖逆民心而入積聚者不能久如人畔於上財亦悖逆君心而散出也言衆畔親離財散非君有也朱子曰詩文王篇師衆也配對也配上帝言其為天下君而對乎上帝也監視也峻大也不易言難保也道言也引詩而言此以結上文兩節之意有天下者能存此心而不失則所以潔矩而與民同欲者自不能已矣先愼乎德承上文不可不謹而言德即所謂明德有人謂得衆有土謂得國有國則不患無財用矣本上文而言案此句注德者本也節人君以德為外以財為內則是爭鬭其民而施之以劫奪之教也蓋財者人之所同欲不能潔矩而欲專之則民亦起而爭奪矣外本內末故財聚爭民施奪故民散反是則有德而有人矣悖逆也此以言之出入明貨之出入也自先愼乎德以下至此又因財貨以明能潔矩與不能者之得失也康誥曰惟命不于常道善則得之不善則失之矣鄭氏康成曰于於也天命不於常言不專祐一家也孔氏穎達曰康誥曰惟命不于常者謂天之命不於是常住在一家也道善則得之不善則失之矣書之本意言道為善則得之不善則失之是不常在一家也朱子曰道言也因上文引文王詩之意而申言之其丁寧反覆之意益深切矣楚書曰楚國無以為寶惟善以為寶鄭氏康成曰楚書楚昭王時書也言以善人為寶時謂觀射父昭奚恤也孔疏鄭知是楚昭王時書者案楚語云楚昭王使王孫圉聘于晉定公饗之趙簡子鳴玉以相問于王孫圉曰楚之白珩猶在乎其為寶幾何矣王孫圉對曰未嘗為寶楚之所寶者曰觀射父能作訓辭以行事於諸侯使無以寡君為口實又新序云秦欲伐楚使者觀楚之寶器楚王召昭奚恤而問焉對曰寶器在賢臣王遂使昭奚恤應焉昭奚恤發精兵三百人陳于西門之內為東面之壇一南面之壇四西面之壇一秦使者至昭奚恤曰君客也請就上居東面之壇令尹子西南面太宗子敖次之葉公子高次之司馬子發次之昭奚恤自居西面之壇稱曰客欲觀楚之寶器乎楚之所寶者即賢人也唯大國之所觀秦使無以對也使歸告秦王曰楚多賢臣無可以圖之何知有觀射父昭奚恤者案戰國義云楚王築壇昭奚恤等立于壇上楚王指之謂秦使曰此寡人之寶故知有昭奚恤等也謂賢為寶者案史記云理百姓實府庫使黎氓得所者有令尹子西而能也執法令奉圭璋使諸侯不怨兵車不起者有太宗子牧能也守封疆固城郭使鄰國不侵亦不侵鄰國者有葉公子髙能也整師旅治兵戈使蹈白刃赴湯蹈火萬死不顧一生者有司馬子發能也坐籌帷幄之中决勝千里之外懷霸王之業揆理亂之風有大夫昭奚恤能也是皆為寶也引之者證為君長能保愛善人以為寶也朱子曰楚書楚語言不寶金玉而寶善人也舅犯曰亡人無以為寶仁親以為寶鄭氏康成曰舅犯晉文公之舅狐偃也亡人謂文公也時辟驪姬之讒亡在翟而獻公薨秦穆公使子顯弔因勸之復國舅犯為之對此辭也仁親猶言親愛仁道也明不因喪規利也孔疏舅犯晉文公之舅狐偃者左傳文也云時避驪姬之讒亡在翟而獻公薨秦穆公使子顯弔之因勸之復國舅犯為之對此辭也檀弓篇文孔氏穎達曰舅犯曰亡人無以為寶仁親以為寶者此舅犯勸重耳之辭於時重耳逃亡在翟秦穆公欲納之反國而勸重耳不受秦命對秦使云奔亡之人無以貨財為寶唯親愛仁道以為寶也朱子曰舅犯晉文公舅狐偃字子犯亡人文公時為公子出亡在外也仁愛也事見檀弓此兩節又明不外本而內末之意秦誓曰若有一個臣斷斷兮無他技其心休休焉其如有容焉人之有技若已有之人之彥聖其心好之不啻若自其口出實能容之以能保我子孫黎民尚亦有利哉人之有技娟疾以惡之人之彥聖而違之俾不通實不能容以不能保我子孫黎民亦曰殆哉釋文一個古賀反尚書作介臣音界此所引與尚書文小異斷丁辭反技其綺反休休許虯反尚書傳曰樂善也鄭注休休云寬容貌何休注公羊云美大之貌好呼報反啻音試詩豉反娟莫報反尚書作冒音同謂覆蔽也惡烏路反下能惡人同俾本又作卑必爾反案實朱本作實鄭氏康成曰秦誓周書尚書篇名也秦穆公伐鄭為晉所敗於殽還誓其羣臣故作此篇也斷斷誠一之貌也他技異端之技也有技才藝之士也若已有之不啻若自其口出皆樂人有善之甚也美士曰彥黎衆也尚庶幾也娟妬也違猶戾也俾使也拂戾賢人所為使功不通於君也殆危也彥或作盤孔疏秦穆公伐鄭為晉所敗於殽還誓其羣臣而作此篇也者案尚書序秦穆公伐鄭晉襄公帥師敗諸殽還歸作秦誓又左傳僖三十三年秦穆公興師伐鄭蹇叔等諫之公不從為晉人與姜戎要而擊之敗諸殽是其事也云美士為彥者爾雅釋訓文黎衆也俾使也皆釋詁文尚庶幾者釋言文爾雅庶幾尚也是尚為庶幾矣云娟妬也者說文云娟大妬婦是娟為妬也孔氏穎達曰秦誓曰者此一經明君臣進賢絀惡之事秦誓尚書篇名秦穆公伐鄭為晉敗於殽還歸誓羣臣而作此篇是秦穆公悔過自誓之辭記者引之以明好賢去惡也若有一介臣斷斷兮者此秦穆公誓辭云羣臣若有一耿介之臣斷斷然誠實專一謹慤兮是語辭古文尚書兮為猗言有一介之臣其心斷斷猗然專一與此本異無他技其心休休焉其如有容焉者言此專一之臣無他竒異之技惟其心休休然寬容形貌似有包容如此之人我當任用也人之有技若已有之者謂見人有技藝欲得親愛之如己自有也人之彥聖其心好之不啻若自其口出者謂見人有才彥美通聖其心中愛樂不啻如自其口出心愛此彥聖之美多於口說言其愛樂之甚也實能容之以能保我子孫黎民尚亦有利哉者實是也若能好賢如此是能有所包容則我國家得安保我後之子孫黎衆也尚庶幾也非直子孫安其下衆人皆庶幾亦有利益哉也人之有技媢疾以惡之者上明進賢之善此論蔽賢之惡也媢妬也見人有技藝則掩藏媢妬疾以憎惡之也人之彥聖而違之俾不通者見他人之彥聖而違抑退之俾使也使其善功不通達於君尚書通為達字也實不能容以不能保我子孫黎民亦曰殆哉者若此蔽賢之人是不能容納家國將亡不能保我子孫非唯如此衆人亦曰殆危哉朱子曰秦誓周書斷斷誠一之貌彥美士也聖通明也尚庶幾也媢忌也違拂戾也殆危也唯仁人放流之逬諸四夷不與同中國此謂唯仁人為能愛人能惡人釋文迸比孟反又逼諍反諍音爭鬭之爭皇云迸猶屏也朱注逬讀為屏古字通用鄭氏康成曰放去惡人媢嫉之類者獨仁人能之如舜放四罪而天下咸服孔氏穎達曰唯仁人放流之逬諸四夷不與同中國者言惟仁人之君能放流此蔽善之人使逬遠在四夷不與同在中國若舜流四凶而天下咸服是也此謂唯仁人為能愛人能惡人者既放此蔽賢之人逺在四夷是仁人能愛善人惡不善之人朱子曰逬猶逐也言有此媢疾之人妨賢而病國則仁人必深惡而痛絶之以其至公無私故能得好惡之正如此也見賢而不能舉舉而不能先命也見不善而不能退退而不能遠過也釋文命依注音慢武諫反遠于萬反朱注命鄭氏云當作慢程子云當作怠未詳孰是鄭氏康成曰命讀為慢聲之誤也舉賢而不能使君以先已是輕慢於舉人也孔氏穎達曰見賢而不能舉舉而不能先命也者此謂凡庸小人見此賢人而不能舉進於君假設舉之又不能使在其已之先是為慢也謂輕慢於舉人也見不善而不能退退而不能遠過也者此謂小人見不善之人而不能抑退之假令抑退之而不能使遠退之過者言是愆過之人也朱子曰若此者知所愛惡矣而未能盡愛惡之道蓋君子而未仁者也好人之所惡惡人之所好是謂拂人之性菑必逮夫身釋文好呼報反下皆同惡烏路反拂扶弗反菑音哉逮音代一音大計反夫音扶朱注菑古灾字鄭氏康成曰拂猶佹也逮及也孔氏穎達曰好人之所惡者人謂君子君子所惡者凶惡之事今乃愛好凶惡是好人之所惡也惡人之所好者君子所好仁義善道今乃惡此仁義善道是惡人之所好也是謂拂人之性者若如此者是謂拂戾善人之性菑必逮夫身者逮及也如此菑必及夫身矣朱子曰拂逆也好善而惡惡人之性也至於拂人之性則不仁之甚者也自秦誓至此又皆以申言好惡公私之極以明上文所引南山有臺節南山之意是故君子有大道必忠信以得之驕泰以失之鄭氏康成曰道行所由孔氏穎達曰是故君子有大道者大道謂所由行孝悌仁義之大道也必忠信以得之驕泰以失之者言此孝悌仁義必由行忠信以得之由身驕泰以失之也朱子曰君子以位言之道謂居其位而修已治人之術發已自盡為忠循物無違謂信驕者矜高泰者侈肆此因上所引文王康誥之意而言章內三言得失而語益加切蓋至此而天理存亡之幾決矣生財有大道生之者衆食之者寡為之者疾用之者舒則財恆足矣朱注恆胡登反鄭氏康成曰是不務祿不肖而勉民以農也孔氏穎達曰生財有大道者此一經明人君當先行仁義愛省國用以豐足財物上文大道謂孝悌仁義之道此言人君生殖其財有大道之理則下之所云者是也生之者衆者謂為農桑多也食之者寡者謂減省無用之費也為之者疾者謂百姓急營農桑事業也用之者舒者謂君上緩於營造費用也則財恆足矣者言人君能如此則國用恆足朱子曰呂氏曰國無遊民則生者衆矣朝無幸位則食者寡矣不奪農時則為之疾矣量入為出則用之舒矣愚案此因有土有財而言以明足國之道在乎務本而節用非必外本內末而後財可聚也自此以至終篇皆一意也仁者以財發身不仁者以身發財鄭氏康成曰發起也言仁人有財則務於施與以起身成其令名不仁之人有身貪於聚斂以起財務成富孔氏穎達曰仁者以財發身者謂仁德之君以財散施發起身之令名也不仁者以身發財者言不仁之人唯在吝嗇務於積聚勞役其身發起其財此言治家治國天下之科皆謂人君也朱子曰發猶起也仁者散財以得民不仁者亡身以殖貨未有上好仁而下不好義者也未有好義其事不終者也未有府庫財非其財者也鄭氏康成曰言君行仁道則其臣必義以義舉事無不成者其為誠然如已府庫之財為已有也孔疏言君行仁道則臣必為義臣既行義事必終成蓋至誠相感必有實報如已有府庫之財為己所有也其為信實而然言不虗也孔氏穎達曰未有上好仁而下不好義者也言在上人君好以仁道接下其下感君仁恩無有不愛好於義使事皆得其宜也未有好義其事不終者也者臣下悉皆好義百事盡能終成故云未有好義其事不終者言皆能終成也未有府庫財非其財者也又為人君作譬言君若行仁民必報義義必終事譬如人君有府庫之財必其為所用也故云未有府庫財非其財者也朱子曰上好仁以愛其下則下好義以忠其上所以事必有終而府庫之財無悖出之患也孟獻子曰畜馬乘不察於雞豚伐冰之家不畜牛羊百乘之家不畜聚斂之臣與其有聚斂之臣寧有盜臣此謂國不以利為利以義為利也釋文畜許六反乘徐繩證反朱注斂去聲鄭氏康成曰孟獻子魯大夫仲孫蔑也畜馬乘謂以士初試為大夫也伐冰之家卿大夫以上喪祭用冰百乘之家有采地者也雞豚牛羊民之所畜養以為財利者也國家利義不利財盜臣損財耳聚斂之臣乃損義論語曰季氏富於周公而求也為之聚斂非吾徒也小子鳴鼓而攻之可也孔疏孟獻子魯大夫仲孫蔑者此據左傳文也云畜馬乘謂以士初試為大夫者案書傳士飾車駢馬詩云四牡騑騑大夫以上乃得乘四馬今下云伐冰之家百乘之家家至為大夫今别云畜馬乘者不察雞豚故知士初試為大夫者也伐冰之家卿大夫者案昭四年左傳云大夫命婦喪浴用冰喪大記注云士不用冰故知卿大夫也上若恩賜及食而得用亦有冰也但非其常故士喪禮賜冰則夷槃可也左傳又云食肉冰皆與焉是也云百乘之家有采地者也此謂卿也故論語云百乘之家鄭云采地一同之度輪是也孔氏穎達曰孟獻子曰畜馬乘不察於雞豚者此一經明治國家不可務於積財若務於積財即是小人之行非君上之道言察於雞豚之所利為畜養馬乘士初試為大夫不窺察於雞豚之小利伐冰之家不畜牛羊者謂卿大夫喪祭用冰從固陰之處伐擊其冰以供喪祭故云伐冰也謂卿大夫為伐冰之家不畜牛羊為財利以食祿不與人爭利也百乘之家不畜聚斂之臣者百乘謂卿大夫有采地者也以地方百里故云百乘之家言卿大夫之家不畜聚斂之臣使賦稅什一之外徵求采邑之物也故論語云百乘之家是也與其有聚斂之臣寧有盜臣者覆解不畜聚斂之臣也經意若其有聚斂之臣寧可有盜竊之臣以盜臣但害財聚斂之臣則害義也此謂國不以利為利以義為利也者言若能如上所言是國家之利但以義事為國家利益也朱子曰孟獻子魯之賢大夫仲孫蔑也畜馬乘士初試為大夫者也伐冰之家卿大夫以上喪祭用冰者也百乘之家有采地者也君子寧亡己之財而不忍傷民之力故寧有盜臣而不畜聚斂之臣此謂以下釋獻子之言也長國家而務財用者必自小人矣釋文長竹杖反作案朱本合下二節一節鄭氏康成曰言務聚財為己用者必忘義是小人所為也孔氏穎達曰長國家而務財用者必自小人矣者言為人君長於國家而務積聚財以為己財者必自為小人之行也彼為善之小人之使為國家菑害並至雖有善者亦無如之何矣鄭氏康成曰彼君也君將欲以仁義善其政而使小人治其國家之事患難猥至雖云有善不能救之以其惡之己著也孔氏穎達曰彼為至利也前經明遠財重義是不以利為利以義為利此經明為君治國棄遠小人亦是不以利為利以義為利也彼為善之者謂君也君欲為仁義之道善其政教之語辭故云彼為善之小人之使為國家菑害並至者言君欲為善反令小人使為治國家之事毒害於下故菑害患難則並皆來至也雖有善者亦無如之何矣者既使小人治國則其君雖有善政之施亦無能奈此患難之何言不能止之以其聚斂者惡之已著故也此謂國不以利為利以義為利也朱注彼為善之此句上下疑有闕文朱子曰自由也言由小人導之也此一節深明以利為利之害而重言以結之其丁寧之意切矣右傳之十章釋治國平天下此章之義務在與民同好惡而不專其利皆推廣潔矩之意也能如是則親賢樂利各得其所而天下平矣凡傳十章前四章統論綱領指趣後六章細論條目工夫其第五章乃明善之要第六章乃誠身之本在初學尤為當務之急讀者不可以其近而忽之也案戴記中學庸二書以古本參之今本其節次每有異同而大學尤多前後互易之處考其源流先是程子移克明德至止於信於古之欲明明德於天下節之前移聽訟節於節彼南山節之後至伊川程子乃定為今本朱子自云因程子所定者是也顧經與傳未經區別而此謂知本二句猶莫知所屬逮朱子章句分經一章傳十章又於誠意章前補完格物致知一傳而以此謂知之至也為其結語其此謂知本句則明其為衍文朱子所云更考經文別為序次者是也自是而今本遂別于古本矣要之朱子原未嘗以自出之新裁削相沿之舊籍也如傳之首章第三章第四章各於章末識云此章舊本誤在某處而於傳之第七章仍識云自此以下俱以舊文為正夫屛沿習之見以抉經籍之藴者善會前聖之精也創獨有之論而亦不廢先儒之云者留質後賢之意也今之學者執朱子之簡編而竟忘朱子之本意夫豈朱子之所待于將來者哉茲當釐定三禮於二書之斷節分章解經釋注悉從古本而朱子集注次於其後惟於每章每節之分合各殊前後互異者仍以今本之節次附識焉俾學者有以溯其源流徵其同異不特注疏羽翼之功得垂於不朽即朱子當日涵泳聖言參伍衆說其折衷之虛懷百世而下猶將見焉若乃以朱子補傳為未安而歸正經文知止以下至則近道矣於聽訟吾猶人也之右為傳第四章以釋致知格物謂大學原無闕文此則董氏槐葉氏夢鼎王氏相之說也而車氏清臣方氏正學咸是之又或為良知之解以攻集注若王氏陽明則竄入于異學矣諸如此類概置之不論不議焉而已惟注疏暨朱子章句則一字不遺亦仍今本留識舊簡之意也夫欽定禮記義疏卷七十三
