body:
  text: 坊記第三十坊音防徐扶訪反正義孔氏穎達曰案鄭目録云名曰坊記者以其記六藝之義所以坊人之失者也此於别録屬通論此篇凡三十九章體例不一或數經共論一事或一經惟說一事或每事引詩書結之或不引詩書無義例也程子曰坊記不知何人所作觀其引論語曰則不可以為孔子之言漢儒如賈誼董仲舒所言蓋得此篇之意或者其所記與子言之君子之道辟則坊與坊民之所不足者也大為之坊民猶踰之故君子禮以坊德刑以坊淫命以坊欲辟讀譬坊防古字通用與平聲正義鄭氏康成曰民所不足謂仁義之道也失道則放辟邪侈也嚴其禁尚不能止況不禁乎命謂教令孔氏穎達曰此節發端總明所坊之事此篇悉言子云唯此一章稱子言之者以是一篇之總要也君子之道坊民之過辟如坊之礙水坊民者為民行仁義不足故也人君設禮以坊民德之失制刑以坊民之淫邪設法令以坊民之貪欲方氏慤曰君子有禮以坊德有刑以坊淫有命以坊欲其為坊也大矣然或失於德而犯禮或溺於淫而犯刑或徇於欲而犯命故曰大為之坊民猶踰之若失於德溺於淫徇於欲者則所謂辟也馬氏睎孟曰禮所以制中故禮以坊德刑所以禁過故刑以坊淫命所以知分而安之故命以坊欲應氏鏞曰性之善為德禮以坊之而飬其源性之蕩為淫刑以坊之而遏其流出於禮則入於刑然人之欲無窮非坊間所能盡聖人於是有命之說焉命出於天各有分限截然不可踰也天命至嚴人力莫施以是坊之則覬覦者塞羡慕者止而欲不得以肆矣案此一篇之大指坊有二義一蓄水不使不足一障水不使有餘坊德是蓄其在內者坊淫坊欲是障其在外者坊民理之不足兼制民欲之有餘又案命字鄭孔只以法令言然如應氏說亦周密故兩存之此君子是古先聖王制禮立教者不單是人君治民子云小人貧斯約富斯驕約斯盜驕斯亂禮者因人之情而為之節文以為民坊者也故聖人之制富貴也使民富不足以驕貧不至於約貴不慊於上故亂益亡慊口簟反亡讀無正義鄭氏康成曰約猶窮也此節文者謂農有田里之差士有爵命之級慊恨不滿之貌也孔氏穎達曰此明小人貧富皆失於道故聖人制禮而為之節文制富者居室丈尺爼豆衣服之事須有法度不至驕也為貧者制農田百畝桑麻自贍比閭相賙不令至於約也貴謂卿士之屬制其祿秩隨功爵而施則貴臣無慊恨君祿爵之薄也益漸也亡無也為亂之道漸無也不言賤者從可知也劉氏彝曰約謂愧恥其不足愧恥之極斯為盜矣驕謂踰違於禮法踰違之極則為亂矣聖人差其度數定其等降上下既分民志一定而僭逼不興於其心故亂益亡禮之制也存異陳氏澔曰伐氷之家不畜牛羊所以制貴而不使之慊也案鄭訓慊為恨少如陳說則為快足矣從鄭為正案坊民之道有德有刑有命而此後惟言禮者生民有欲惟禮可以制之刑者聖人之不得已而命者亦聖人所罕言則言禮而刑與命在其中矣子云貧而好樂富而好禮衆而以寧者天下其幾矣詩云民之貪亂寧為荼毒故制國不過千乘都城不過百雉家富不過百乘以此坊民諸侯猶有畔者好呼報反樂音洛據論語好樂好字衍文荼音徒乘繩證反正義鄭氏康成曰天下幾矣言如此者寡也寧安也大族衆家恆多為亂詩言民之貪為亂者安其荼毒之行惡之也古者方十里其中六十四井出兵車一乘此兵賦之法也孔疏皇氏曰案司馬法成方十里出革車一乘又云甸方八里出長轂一乘鄭云通溝洫之地則為十里若除溝洫之地則為八里案司馬法與周禮不同皇氏此說較鄭氏旁加一里之說為勝成國之賦千乘孔疏案千乘之賦地方三百一十六里有畸周禮公五百里侯四百里則是過千乘云不過千乘者其地雖過其兵賦唯千乘故論語注云雖大國之賦亦不是過焉其兵賦之法王畿之內六鄉之法家出一人萬二千五百家為鄉是一鄉出一軍天子六軍出於六鄉鄉為正遂為副則遂之出軍與鄉同公邑出軍亦與鄉同其公卿大夫采地既為井田殊於鄉遂則出軍亦異於鄉遂鄭注小司徒井十為通士一人徒二人通十為成革車一乘十成為終十終為同革車百乘士千人徒二千人此謂公鄉大夫采地出軍之制也諸侯大國三軍次國二軍小國一軍皆出鄉遂故費誓云三郊三遂又異義云天子萬乘諸侯千乘大夫百乘此大判言之尊卑相十之義故魯頌云公車千乘謂大總計地出軍也公徒三萬謂鄉遂兵數也案六鄉六遂田亦宜井謂采邑則井公邑則不井說恐未確雉度名也髙一丈長三丈為雉百雉為長三百丈方五百步孔疏六尺為步五六三十故三百丈為五百步據此注子男五里則侯伯七里公九里天子十二里鄭駁異義又云天子城九里公城七里侯伯城五里子男城三里與此異也子男之城方五里孔疏周禮典命云子男五命其國家宮室以五為節國家謂城方也是子男城方五里也百雉者所謂大都三國之一孔疏子男五里積千五百步左傳云大都參分國之一子男大都三分國城而居其一是大都五百步為百雉孔氏穎達曰此明上下制度有限防其奢僭畔逆之事詩大雅桑柔篇時卿大夫亦有畔而獨言諸侯舉其重也家富不過百乘者諸侯之卿采地方氏慤曰千乘百乘皆以所出之賦言之葉氏夢得曰先王辨貴賤之分而諸侯大夫等差如此者蓋坊民為主其弊也諸侯倍畔以相篡所謂後義而先利不奪不饜者此也陳氏澔曰貪猶欲也荼苦菜也毒螫蟲也存疑孔氏穎達曰左傳云唯卿備百邑地方百里也直云為卿百邑未知天子諸侯公卿大夫采地大小案鄭注小司徒云百里之國凡四都五十里之國凡四縣二十五里之國凡四甸又云采地食者皆四之一說者據以為公食百里卿食五十里大夫食二十五里其諸侯則公之孤侯伯之卿與天子三公同俱方百里公之卿與侯伯之大夫俱方五十里公之大夫與侯伯之下大夫俱方二十五里其子男之地唯方二百里以下其卿之采地不得復方百里易訟卦注云小國之下大夫采地方一成其定稅三百家鄭注論語云伯氏駢邑三百家云齊下大夫之制似公侯伯下大夫唯三百家不與禮同也案論語曰貧而樂此曰貧而好樂樂則自得好樂則荒好樂無荒詩所戒也一字之訛謬以千里石梁王氏之疑不為無見子云夫禮者所以章疑别微以為民坊者也故貴賤有等衣服有别朝廷有位則民有所讓别彼列反朝直遙反正義鄭氏康成曰位朝位也孔氏穎達曰疑謂是非不决當用禮以章明之微謂幽隱不著當用禮以分别之葉氏夢得曰貴賤以爵列也爵以詔德觀其貴賤則知德有厚薄衣服以功賜也服以顯庸觀其衣服則知功有小大至於朝廷有位則爵命衣服所自居也民之視其位則知其定分而行遜避矣故曰朝廷有位則民有所讓通論方氏慤曰君在廟門外則疑於君故不迎尸於門外以明其疑士唯說齊衰於公門以表其微葉氏夢得曰章疑異於决疑疑者似同而異章言其顯也决言其成也别微異於明微微者似有而無别言其有辨也明言其既著也總論孔氏穎達曰自此至犯君一節明章疑别嫌恐尊卑相僭使人疑惑之事案以下分兩大支一言辨上下一言别內外皆以夫禮句提起子云天無二日土無二王家無二主尊無二上示民有君臣之别也春秋不稱楚越之王喪禮君不稱天大夫不稱君恐民之惑也詩云相彼盍旦尚猶患之相息亮切盍音曷正義鄭氏康成曰楚越之君僭號稱王不稱其喪謂不書葬也春秋傳曰吳楚之君不書葬辟其僭號也孔疏書葬則當稱葬楚越某王辟王之名故不書葬臣者天君孔疏言臣尊君如天稱天子為天王稱諸侯不言天公辟王也大夫有臣者稱之曰主不言君辟諸侯也孔疏周禮云主友之讐是臣下自稱巳大夫之君稱主不稱君若泛例言之大夫有采地者亦稱君喪服傳為其君布帶繩屨是也大夫自相命亦稱主左傳晉士丐曰事吳敢不如事主是也稱大夫妻亦曰主魯語季孫問文伯之母曰主亦有以語肥也是也此皆為使民疑惑不知孰者尊也盍旦夜鳴求旦之鳥也求不可得人猶惡其反晝夜而亂晦明况於臣之僭君求不可得之類亂上下惑衆也方氏慤曰日者人君之象在天者既無二日有土者故無二王大而有土者既無二王小而有家者故無二主凡此皆以尊無二上故也故曰示民有君臣之别君臣之别晝夜之象也其可亂之乎故引逸詩以况之案家無二主妻統於夫庶統於適皆是尊無二上官有冢宰㑹有主盟師有元帥席有長賓皆是春秋之法諸侯請諡於王則以諡係爵如葬蔡桓侯不請諡於王則但從其臣子之辭若齊桓公晉文公不係爵見非王命也又案越至昭公始見經定十四年允常卒勾踐立敗殺吳闔廬于檇李允常卒不書未赴也越通中國最晚勾踐之卒又在春秋後何緣得書越喪楚越並稱不考之失子云君不與同姓同車與異姓同車不同服示民不嫌也以此坊民民猶得同姓以弒其君正義鄭氏康成曰同姓者謂先王先公子孫有繼及之道者也其非此則無嫌也孔疏謂非此先王先公子孫不有相承繼之勢則無所嫌疑得同車也僕右恆朝服孔疏僕及車右身衣朝服故曲禮云乘路馬必朝服是也其朝服之內則有虎裘狼裘故玉藻云君之右虎裘厥左狼裘是也君則各以時事唯在軍同服孔疏左傳云均服振振取虢之旗又鞍之戰公羊傳云逢丑父為齊頃公車右衣服與頃公相似是在軍同服馬氏睎孟曰王祭賓客有旅賁服王之服而趨節服氏服王服以維王太常其在軍陳則射人命有爵者乘王之倅車而皆無與王同車者餘論陳氏澔曰不同車以逺害也篡弒之禍常起於同姓故與異姓同車則不嫌黃氏乾行曰魯桓公如齊齊襄公使公子彭生乘桓公公薨於車則弒君於車不必同姓也羽父使賊弒隱公於寪氏則同姓之弒不必在車也嗚呼人君鑒此亦謹於微而巳矣案周道親親合之以食而弗殊親親也君不與同姓同車以防篡弒有是理乎若同姓能弒君於車豈異姓不能弒君於車乎人人而坊之直無同車者而可矣今不與同姓而與異姓以為示民不嫌何哉陳恆夏徵舒異姓也叔向曰國將亡其宗族枝葉先落則公從之為此言者亡國敗家之言也傳曰親不在外羈不在內親以在外為嫌巳當春秋末造又荆楚蠻方之所為非文武周公大封同姓意矣如又以同車為嫌是為君之同姓者在內亦嫌在外亦嫌也不抗剄之與盡逐而去之不止矣此可以為訓耶吾意春秋多猜暴之君如晉獻公之屬斬刈骨肉誅鋤斥逐之餘閒有存者亦視若芒刺而務疏之又嬴秦刻薄既得天下而子弟為匹夫懼其崩離觖望胡越起於輦下於是有同姓不同車之令凡此二端理或有之作書者不知裁擇且妄託為夫子之言謬之謬者也黃氏之說未盡故引而伸之其曰謹於微自平允子云君子辭貴不辭賤辭富不辭貧則亂益亡故君子與其使食浮於人也寧使人浮於食正義鄭氏康成曰亡無也食謂祿也在上曰浮祿勝巳則近貪巳勝祿則近亷方氏慤曰賤不貪貴貧不慕富則無爭奪之禍矣故亂益亡熊氏安生曰貴賤謂爵之尊卑貧富謂祿之厚薄子云觴酒豆肉讓而受惡民猶犯齒衽席之上讓而坐下民猶犯貴朝廷之位讓而就賤民猶犯君詩云民之無良相怨一方受爵不讓至于巳斯亡衽而審反上時掌反正義鄭氏康成曰犯猶僭也齒年也禮六十以上籩豆有加貴秩異者良善也言無善之人善遙相怨貪爵祿好得無讓以至亡巳孔氏穎達曰詩小雅角弓篇引之證上每事須讓也方氏慤曰禮六十以上籩豆有加故觴豆以犯齒言三命不齒席於尊東故衽席以犯貴言族人不得以其戚戚君故朝廷以犯君言存異陳氏澔曰爵酒器也嚴氏云兄弟有因杯酒得罪而怨者此為持平之論以解之言人之相怨各執一偏而不參彼已之曲直故但知怨其上而不思巳過然其端甚微或止因受爵失辭遜之節而或至於亡其身亦可念矣案古人謹禮於微皆所以豫逺不敬也受爵不讓則犯齒犯貴犯君矣此詩主不令兄弟言之朱子詩傳兄弟相怨相讒以取爵位若晉之奚齊齊之荼皆至於巳斯亡者也豈杯酒之謂子云君子貴人而賤巳先人而後巳則民作讓故稱人之君曰君自稱其君曰寡君先後並去聲一二章並同正義鄭氏康成曰寡君猶言少德之君言之謙方氏慤曰貴人而賤巳則不驕先人而後巳則不爭故民作讓書曰汝唯不矜天下莫與汝爭能汝唯不伐天下莫與汝爭功楊子曰自後者人先之自下者人髙之皆謂是矣案莫尊於君而巳之君猶為之謙則在巳者無所不讓可知子云利祿先死者而後生者則民不偝先亡者而後存者則民可以託詩云先君之思以畜寡人以此坊民民猶偝死而號無告偝音佩畜詩作朂號平聲正義鄭氏康成曰言不偷於死亡則於生存信偝死而號無告言死者見偝其家之老弱號呼稱寃無所告理也孔氏穎達曰此明坊人偝死嚮生之事利祿之事假令死之與生並宜俱得則先與死者而後生者則民皆不偝於死者也亡謂身為國事亡在外者先與在外亡者而後與國內存者則民皆仁厚可以大事相付託也詩邶風燕燕之篇方氏慤曰死謂為國家死其事者亡謂為國家亡而在外者利祿之所施不必及其身也録其人之功以及其親族若周官以其財飬死政之老與其孤禮言去國三世爵祿有列於朝之類是也以死者君心猶所不忘則民勤於孝思矣故曰民不偝以亡者君心猶所不絶則民勉於忠義矣故曰民可以託存疑鄭氏康成曰此䘙夫人定姜之詩定姜無子立庶子衎是為獻公畜孝也獻公無禮於定姜定姜作詩言獻公當思先君定公以孝於寡人孔疏所引詩衛莊姜送歸妾也鄭與詩注不同者後得毛傳故也孔氏穎逹曰詩言歸妾戴媯念先君莊公以婦道朂勉寡人寡人莊姜自謂姚氏舜牧曰畜飬也謂思及先君畜飬寡人以證利祿先死者而後生者之意案此詩有逺送于野之語則作戴媯大歸為是畜當依毛詩作朂又案詩意謂戴媯以思先君勉莊姜非謂戴媯思先君故以婦道勉莊姜也疏未安子云有國家者貴人而賤祿則民興讓尚技而賤車則民興藝故君子約言小人先言正義鄭氏康成曰人君貴尚賢者能者而不吝於頒祿賜車服則讓道興賢者能者人所服也技猶藝也人尚德不尚言約與先互言耳君子約則小人多矣小人先則君子後矣易曰君子多識前言往行以畜其德孔氏穎達曰此明尚賢能重言行之事約謂省約方氏慤曰貴人而賤祿尚技而賤車皆謂任賢使能錫豫之無所吝也上之所化如此不徒事空言而巳必有以踐其言焉故繼之以君子約言小人先言案論定後官位定後祿虞書敷奏以言明試以功而後車服以庸古帝王愼重爵祿如此又可賤乎賤祿賤車亦記禮者過也注云貴有德尚有能而不吝於班祿賜車斯得之子云上酌民言則下天上施上不酌民言則犯也下不天上施則亂也故君子信讓以涖百姓則民之報禮重詩云先民有言詢于芻蕘施去聲正義鄭氏康成曰酌猶取也取衆民之言以為政教則得民心得民心則恩澤所加民愛之如天矣言其尊也涖臨也報禮重者猶言能死其難先民謂上古之君也詢謀也芻蕘下民之事也言古之人君將有政教必謀之於庶民乃施之孔氏穎達曰詩大雅板之篇引之證上酌民言之事陸氏佃曰酌之於民還以治民我無為也順民而巳豈有犯哉方氏慤曰不酌民言則事或妄行故曰犯輔氏廣曰上酌民言則上敬其下下天上施則下尊其上古人惟民是畏信則使民之可信讓則制行不以巳故民尊君如天盡敬事之誠存疑孔氏穎達曰在上不取民言違戾於下則民怨怒以犯於上若不仰君如天雖有君恩而在下不領則禍亂之事起也案此為人君自用者坊也酌民言不欺於民而信不驕於民而讓也天天之也王心虛公協於克一即是天道故民從而天之犯屬上亂屬下上犯則下亂孔氏合犯與亂為一文義不順子云善則稱人過則稱巳則民不爭善則稱人過則稱巳則怨益亡詩云爾卜爾筮履無咎言履作體正義方氏慤曰巳不矜伐故民不爭且能無巳故怨益亡陳氏澔曰詩衛風氓之篇履當依詩作體謂卜之於龜筮之於蓍其卦兆之體皆無凶咎之辭也以無咎明不爭不怨之意存疑鄭氏康成曰爾汝也履禮也言女鄉卜筮然後與我為禮則無咎惡之言矣言惡在已彼過淺也子云善則稱人過則稱巳則民讓善詩云考卜惟王度是鎬京惟龜正之武王成之度音鐸詩作宅正義鄭氏康成曰度謀也鎬京鎬宫也言武王卜而謀居此鎬邑龜則出吉兆正之武王築成之此臣歸美於君也案記不言君所引武王成之詩則以稱君為稱人之證也存疑陳氏澔曰詩文王有聲之篇謀度鎬京之居武王之志巳先定矣及以吉凶取正於龜而遂以為正是武王不自以為功而讓之龜卜也案讓之龜卜與記文稱人意不合子云善則稱君過則稱巳則民作忠君陳曰爾有嘉謀嘉猷入告爾君于內女乃順之于外曰此謀此猷惟我君之德於乎是惟良顯哉女讀汝於乎音嗚呼正義鄭氏康成曰君陳篇名在尚書今亡孔疏言今亡者鄭不見古文尚書故也嘉善也猷道也順行之也陸氏佃曰臣良君顯以良故顯也存疑鄭氏康成曰君陳蓋周公之子孔疏書云周公既沒命君陳分正東郊作蔡仲之命皆是父卒命子故知周公之子伯禽弟也惟良顯哉美君之德孔疏既歸德於君又歎美君德曰於乎是君德良善顯明哉辨正林氏之竒曰君陳漢孔氏但曰臣名鄭康成注禮記坊記曰君陳蓋周公之子伯禽弟也蘇氏陳少南俱以為非而陳少南為詳明謂周公命康叔成王命蔡仲見於告戒之辭如是之審况周公叔父有大勳勞於成王今命其子以繼父事何無懿親之語若言他人然決無是理也子云善則稱親過則稱巳則民作孝大誓曰豫克紂非豫武惟朕文考無罪紂克豫非朕文考有罪惟豫小子無良大音泰正義鄭氏康成曰大誓尚書篇名克勝也非豫武非我武功也文考文王也無罪則言有德也無良無功善也此武王誓衆以伐紂之辭陳氏澔曰引以證善則稱親之義子云君子弛其親之過而敬其美論語曰三年無改於父之道可謂孝矣髙宗云三年其惟不言言乃歡正義鄭氏康成曰弛猶棄忘也孝子不藏記父母之過無改不以巳善駁親之過髙宗殷王武丁也名篇在尚書孔疏案其惟不言在尚書說命篇言乃歡在無逸篇鄭不見古文尚書見尚書序有髙宗之訓謂有此語也三年不言有父小乙喪之時歡當為歡其既言天下皆歡喜樂其政教也通論葉氏夢得曰書言乃雍雍則和之至此言乃歡歡則樂之至也案弛其過為善以蓋前愆則親之過忘此易幹蠱之義不僅子為父隱也敬其美有善繼善述意不僅善則稱親也引書以證三年無改蓋髙宗之父小乙在商為中主其事必多可改髙宗三年之內絶不言及三年外乃言改之故人樂其能改又嘉其不遽改也子云從命不忿微諫不倦勞而不怨可謂孝矣詩云孝子不匱正義鄭氏康成曰微諫不倦者子於父母尚和順不用鄂鄂論語曰事父母幾諫見志不從又敬不違內則曰父母有過下氣怡色柔聲以諌諫若不入起敬起孝悅則復諫此所謂不倦匱乏也孝子無乏止之時孔氏穎達曰詩大雅既醉篇美成王告太平之詩餘論葉氏夢得曰雖從命而有所謂不從命故曰從義不從命雖微諫而有所謂不微諫故當不義則諍之雖無怨而有所謂可怨故號泣於旻天於父母事親至於可怨則在巳者已盡故次之以不匱陳氏澔曰從命不忿謂承受父母命令之時不可有忿戾之色蓋或以他事致忿而其色未平也一說忿當作怠案忿作怠為是親命當從則從之而不敢怠所謂敬其美也或不可從則幾諫以望其改所謂弛其過也子云睦於父母之黨可謂孝矣故君子因睦以合族詩云此令兄弟綽綽有裕不令兄弟交相為愈正義鄭氏康成曰睦厚也黨猶親也合族謂與族人燕與族人食令善也綽綽寬容貌交猶更愈病也孔氏穎達曰君子因親睦之道以㑹聚宗族為燕食之禮詩小雅角弓篇刺幽王不親九族之詩言此有德者善於兄弟故綽綽然而有寬裕無德者不善兄弟交相為病害方氏慤曰於父母之黨猶且睦之况父母乎馬氏曰附而相顧者睦也秦康公送晉文公至於渭陽親之至也贈之以車乘惠之至也繼之以瓊瑰玉佩言其愛之無巳也此為睦於父母之黨案父之黨四母之黨三皆父母之所愛也睦之則父母之心悅故可為孝子云於父之執可以乘其車不可以衣其衣君子以廣孝也上衣去聲正義鄭氏康成曰父之執與父執志同者也可以乘其車車於身差逺也謂與己位等孔氏穎達曰衣在身車比衣稍逺故可以乘其車若尊卑懸絶不可傳通車服故知與巳位等但是父之執故不可衣其衣也方氏慤曰衣於身最密前經言君與異姓同車不同服亦以是而已夫孝所以事父也於父之執猶且如此則孝之所及廣矣故曰君子以廣孝也陳氏澔曰廣孝謂敬之同於父亦錫類之義也黃氏乾行曰此上兩章皆承前章孝子不匱而言由父母推之而睦於其黨又推之而敬於其執然則君子安往而不為孝哉子云小人皆能飬其親君子不敬何以辨飬羊尚反正義鄭氏康成曰辨别也輔氏廣曰飬而不敬有之矣未有敬而不飬者也子云父子不同位以厚敬也書云厥辟不辟忝厥祖辟音壁正義鄭氏康成曰同位尊卑等為其相褻辟君也忝辱也為君不君與臣子相褻則辱先祖矣君父之道宜尊嚴孔氏穎達曰尚書太甲三篇伊尹戒太甲之辭陳氏澔曰言君不君而與臣相褻則辱其先祖以喻父不自尊而與卑者同位亦為忝祖也案不同位謂受爵於君不敢與父同列與三賜不及車馬同義辟法也尊也或謂父亦可稱辟易所謂嚴君也此蓋斷章取義耳然終不若陳氏澔以君喻父之說為確也鄭注先以書之本義言之而後並言君父其義可知矣子云父母在不稱老言孝不言慈閨門之內戲而不歎君子以此坊民民猶薄於孝而厚於慈正義鄭氏康成曰孝上施言慈則嫌下流也戲謂孺子言笑者也孟子曰舜年五十而不失其孺子之心歎謂有憂戚之聲也方氏慤曰父母在不稱老與曲禮恆言不稱老同義孝所以愛親慈所以愛子言孝不言慈者慮其厚於子而薄於親故也閨門之內欲其和而巳故戲而不歎陳氏澔曰閨門之內謂父母之側戲而不歎非事於戲也謂為孺子之容止或足以娛親云耳總論葉氏夢得曰自君子約言至惟良顯哉皆君臣之事自善則稱親至戲而不歎皆父子之事子云長民者朝廷敬老則民作孝長竹丈反正義鄭氏康成曰長民謂天子諸侯也葉氏夢得曰老近於親者也近者猶敬於上則親者民必知孝於下矣存疑張氏曰朝廷二字疑衍案公事之地皆謂之朝廷如入學鄉飲鄉射皆是非衍也子云祭祀之有尸也宗廟之有主也示民有事也修宗廟敬祀事教民追孝也以此坊民民猶忘其親正義鄭氏康成曰有事有所事也孔疏言所以祭祀有尸宗廟有主者示民有所尊事故也孔氏穎達曰人君修立宗廟恭敬祀事者教民追孝於親也方氏慤曰尸用於祭祀之時主藏於宗廟之內為尸以象其生為主以寓其存事死如事生事亡如事存此所以言示民有事也追孝與祭統追飬繼孝同義子云敬則用祭器故君子不以菲廢禮不以美沒禮故食禮主人親饋則客祭主人不親饋則客不祭故君子苟無禮雖美不食焉易曰東鄰殺牛不如西鄰之禴祭實受其福詩云既醉以酒既飽以德以此示民民猶爭利而忘義食禮之食音似正義鄭氏康成曰祭器籩豆簋鉶之屬也有敬事於賓客則用之謂饗食也盤盂之屬為燕器君子不可以其薄不及禮而不行禮亦不可以其美過禮而去禮禮主敬廢滅之是不敬易辭在既濟孔疏九五爻辭既濟離下坎上離為牛坎為豕東鄰謂紂西鄰謂文王言殺牛而凶不如禴祭殺豕受福喻奢而慢不如儉而敬也孔疏此據一國風俗奢儉不得以天子諸侯俱用太牢為妨春秋傳曰黍稷非馨明德惟馨信矣引詩者言君子饗燕非專為酒殽亦以觀威儀講德也孔氏穎達曰前經坊民以為孝之道此經教民以為敬行義之事菲薄也沒過也君子不以貧窶菲薄廢禮不行不以財物豐多華美其事沒過於禮易言奢而慢禮不如儉而恭敬實為神所福祐也詩大雅既醉篇言成王祭祀合於禮儀既盡也言君臣盡醉以酒至於祭之末觀十倫之義盡飽以德也葉氏夢得曰祭器所以事神非同於所安也致敬於賔客則用之亦所以神事之也少之為貴以其內心也故不以菲廢禮多之為貴以其外心也故不以美沒禮惟其不必美也故饋而後食既醉而飽以德唯其不必菲也故殺牛而祭不如夏禴蓋君子無意於菲美者示其逺利有志於飽德者示其恩義民之反此乃至於爭利而忘義故不言坊者以其事示之而巳矣子云七日戒三日齊承一人焉以為尸過之者趨走以教敬也醴酒在室醍酒在堂澄酒在下示民不淫也尸飲三衆賓飲一示民有上下也因其酒肉聚其宗族以教民睦也故堂上觀乎室堂下觀乎上詩云禮儀卒度笑語卒獲齊側皆反醍音體度如字正義鄭氏康成曰戒謂散齊也承猶事也淫猶貪也澄酒清酒也孔疏澄酒澄齊也以其清於醴齊醍齊故云清酒三酒尚質不尚味案此醴酒即禮運醴盞此醍酒即禮運粢醍此實三齊而言酒通名耳非昔酒事酒之三酒也據孔疏云三酒味厚以示民不淫故知非彼三酒也禮運有𤣥酒在室故云醴盞在户此云在室户之內即室也上下猶尊卑也主人主婦上賓獻尸乃後主人降洗爵獻賓也孔疏皆儀禮特牲文祭有酒肉羣昭羣穆皆至而獻酬之咸有薦爼也堂上堂下言祭時肅敬之威儀也卒盡也獲得也言在廟中者不失其禮儀皆歡喜得其節也孔氏穎達曰此明祭祀恭敬之義使禮儀各得其所醴齊醍齊澄酒味薄者在上味厚者在下貴薄賤厚示民不貪淫於味也尸飲三衆賓飲一尊上者得酒多卑下者得酒少是示民有上下也因祭祀之酒肉於祭祀之末聚其宗族昭穆相獻酬教民相親睦也祭祀之時在堂上者觀在室之人以取法在堂下之人觀堂上之人以為則上下內外更相倣法也詩小雅楚茨篇言祭之禮儀盡合其法度笑語盡得其節制也方氏慤曰為君尸者大夫士見之則下之君知所以為尸者則自下之故云過之趨走子云賓禮每進以讓喪禮每加以逺浴于中霤飯于牖下小斂于户內大斂于阼殯于客位祖于庭葬于墓所以示逺也殷人弔于壙周人弔于家示民不偝也子云死民之卒事也吾從周以此坊民諸侯猶有薨而不葬者飯音反正義鄭氏康成曰逺之所以崇敬也阼或為堂既葬哀而哭踊於是弔之從周周於送死尤備也孔氏穎達曰此明送喪漸逺弔哭有節示民不偝之事鄉飲酒禮主人迎賓至門三辭至階三讓皆主人先入先登是每進以讓也殷人即壙上而弔於送死太簡周人孝子反哭至家乃始弔於送死殷勤是情理備至故云吾從周也葉氏夢得曰賓禮所以接人欲其有文則每進以讓喪禮所以送神欲其至敬則每加以逺惟其進以讓故三辭三讓而至不然則巳蹙惟其加以逺故事鬼神而逺之也殷人練而祔之逺也故近而弔於壙周人卒哭而祔之近也故逺而弔於家孟子曰飬生不足以當大事周人尚文而送死尤備故從周存異徐氏師曾曰子云死民之卒事以下應各為一章蓋孔子從周者以喪禮大備於周也不止謂上文弔於家一事案喪禮孔子從殷者多矣此斷指反哭一事詳見檀弓子云升自客階受弔于賓位教民追孝也未沒喪不稱君示民不爭也故魯春秋記晉喪曰殺其君之子奚齊及其君卓以此坊民子猶有弒其父者正義鄭氏康成曰升自客階受弔賓位謂反哭時也孔疏以承上文葬於墓故知為反哭時也既葬矣猶不由阼階不忍即父位也沒終也春秋傳曰諸侯於其封內三年稱子孔疏文九年公羊傳文至其臣子踰年則謂之君矣孔疏是史之䇿書臣子稱君也奚齊與卓子皆獻公之子也獻公卒其年奚齊殺明年而卓子殺矣孔疏僖九年秋九月晉侯詭諸卒冬晉里克殺其君之子奚齊十年里克弒其君卓是踰年稱君也弒父不子之甚孔氏穎逹曰此明民追孝於親諸侯未終喪不得稱君示民不爭之事既葬反哭之時孝子升自客階受弔於堂上西方賓位之處不敢在東方以即父位示民追孝之心也未終三年之喪嗣子不合稱君所以然者示民不令父子相爭也葉氏夢得曰升客階不敢代父也受弔於賓位不敢為主也不敢代父而為主者不忘親也故曰追孝古者君薨百官總巳以聽冢宰三年則是君不言而冡宰攝之也以其不言故未終喪止稱曰子案未葬稱子尸柩猶在也葬即稱君臣子之辭國不可一日無君也在國史則明年正月必書即位不論未葬已葬正一君之始也在嗣君則於封內三年稱子孝子之心不忍君也孔子春秋三年內弒書君正名分明君臣之義也㑹盟則稱子存惻隱明父子之仁也此言未沒喪不稱君似指孝子三年稱子而引奚齊卓子又似指未葬稱子巳葬稱君豈互舉見義歟子云孝以事君弟以事長示民不二也故君子有君不謀仕惟卜之日稱二君喪父三年喪君三年示民不疑也父母在不敢有其身不敢私其財示民有上下也故天子四海之內無客禮莫敢為主焉故君適其臣升自阼階即位于堂示民不敢有其室也父母在饋獻不及車馬示民不敢專也以此坊民民猶忘其親而二其君弟與悌同長竹丈反饋又作餽音同正義鄭氏康成曰不二不自二於尊者也自二謂若鄭叔段者也君子有君謂君之子父在者也不謀仕嫌遲為政也卜之日謂君有故而為之卜也二當為二惟卜之時辭得曰君之二某爾晉惠公獲於秦命其大夫歸擇立君曰其卜二圉也不疑不疑於君之尊也父母在身及財皆當統於父母者也有猶專也臣亦統於君車馬家物之重者孔氏穎達曰此明事君父之道君無骨肉之親若不為重服民則疑君不尊今喪君三年與喪父同示民不疑於君之尊也方氏慤曰孝以事君者推事父之道以事君也弟以事長者推事兄之道以事長也若是則臣不敢二於其君幼不敢二於其長矣故曰示民不二也不敢有其身傳所謂為人子者無以有已是也不敢私其財者經所謂不有私財是也若是則上之勢不分於下故曰示民有上下也曲禮曰為人子者三賜不及車馬君之所賜且不敢受況專之以授人乎故曰示民不敢專也葉氏夢得曰忠孝弟順其本一也以其本一故有君不謀仕而其喪君亦如為父三年君統臣者也故天子無客禮君適於臣則為主父統子者也故父在子不敢有其身私其財以為饋獻輔氏廣曰子不敢有其身臣不敢有其室一心也二其君者不以事親者事其君也案或謂君子既有此君不可謀仕他國唯筮仕之日則可舉兩國之君以卜之耳豈既仕有君而可二心乎此與注異存之以備一說子云禮之先幣帛也欲民之先事而後祿也先財而後禮則民利無辭而行情則民爭故君子於有饋者弗能見則不視其饋易曰不耕穫不葘畬凶以此坊民民猶貴祿而賤行先後並去聲葘音緇畬音余賤行之行去聲正義鄭氏康成曰禮謂所執之贄以見者也既相見乃奉幣帛以修好也或云禮之先辭而後幣帛財幣帛也利猶貪也辭辭讓也情主利欲也饋遺也不能見謂有疾也不視猶不內也易言必先種之乃得穫若先葘乃得畬也安有無事而取利者乎行猶事也言務得其祿不務其事孔氏穎達曰此明坊民使輕財重禮貴行賤祿之事先行相見之禮是先事乃後用幣帛是後祿也先用財而後行禮民則化之貪於利也與人相見無辭讓之禮直行已情則有利欲故民爭君子於人之饋已者已若疾病不能見其所饋之人則不納其所饋之物也易無妄六二爻辭六二居中得位合事九五被六三所隔不得往仕是道之不行雖食其祿猶不耕而穫割不葘而畬田無功得物是其凶也引之者證貪財之事方氏慤曰禮之先幣帛言物以禮為先也孟子謂恭敬者幣之未將是矣禮者事之象幣帛者祿之象故曰欲民之先事而後祿也先財而後禮則徇利而忘義故曰則民利無辭與表記無辭不相接也之無辭同行情則檀弓所謂直情而徑行是也無辭則失取與之名行情則失利欲之節是非廉讓之道也故曰則民爭辭必相見而後伸故主人有故而弗能見饋者則不視其饋慮其無名故也蓋凡納物者必視其多寡是否而後納之故貴祿而賤行者不以行事為先也案鄭注云或作禮之先辭而後幣帛今以下文考之甚是蓋辭者行禮之辭如辭曰餽贐辭曰聞戒有所處則禮也若無辭而以幣帛來是貨之也弗能見不可見而以疾辭也今易作不耕穫不葘畬則利有攸往此直言凶以義斷之也存疑鄭氏康成曰田一歲曰葘二歲曰畬三歲曰新田辨正孔氏穎達曰爾雅作二歲曰新田三歲曰畬孫炎云葘始殺草木新田新成柔田畬舒緩也此注誤子云君子不盡利以遺民詩云彼有遺秉此有不斂穧伊寡婦之利故君子仕則不稼田則不漁食時不力珍大夫不坐羊士不坐犬詩云采葑采菲無以下體德音莫違及爾同死以此坊民民猶忘義而爭利以亡其身穧音劑葑芳容反菲芳尾反正義鄭氏康成曰謂不與民爭利也詩言穫者之遺餘捃拾所以為利食時謂食四時之膳也力猶務也天子諸侯有秩膳古者殺牲食其肉坐其皮不坐犬羊是無故不殺之葑蔓菁也陳宋閒謂之葑菲䔰類也下體謂其根也采葑菲之菜者采其葉而可食無以其根美則并取之苦則棄之并取之是盡利也案朱子曰葑菲根莖皆可食根有時而美惡故孔疏云根善無并取其根不盡利也根惡無并棄其葉不求備也詩有二義此只重不盡利孔氏穎達曰此明貴義輕利以坊民之事言君子不盡竭其利當以餘利遺與民也詩小雅大田之詩刺幽王無道矜寡不能自存故陳明王之時田稼既多有遺秉與寡婦捃拾以為利引證以利遺民者也人君食四時之膳不更用力求珍羞大夫無故不得殺羊坐其皮士無故不得殺犬坐其皮皆謂不貪其利以厚己也詩邶風谷風篇記者斷章云采此葑菲之菜但采其葉無得並采其下體之根莖則是不盡取其利也王氏安石曰於物有所遺則為不盡利於事有所遺則為不盡察貴者之道也陳氏澔曰谷風詩意與此所引之意不同此引以為不盡利之喻存疑鄭氏康成曰此詩乃故親今疏者言人之交當如采葑采菲取一善而已君子不求備於一人能如此則德美之音不離令名我願與女同死矣辨正孔氏穎達曰記引詩本明無盡利之事當云上無盡利於民則道德之音無有乖違己可及君同至於死鄭注記時未見毛傳乃别生一義以為交友相於故云故親子云夫禮坊民所淫章民之别使民無嫌以為民紀者也故男女無媒不交無幣不相見恐男女之無别也以此坊民民猶有自獻其身詩云伐柯如之何匪斧不克取妻如之何匪媒不得藝麻如之何橫從其畝取妻如之何必告父母别並必列反取七樹反從子容反告音谷陳氏澔曰以此坊民以下十一字舊本在詩云之上今以類推之當在所引詩下正義鄭氏康成曰淫猶貪也章明也嫌嫌疑也重男女之㑹所以遠别之於禽獸也有幣者必有媒有媒者不必有幣仲春之月會男女之時不必待幣也獻猶進也孔疏自進其身以求男伐柯伐木以為柯也克能也藝猶樹也言取妻之法必有媒如伐柯之必須斧也取妻之道必告父母如樹麻當先易治其田孔氏穎達曰詩齊風南山篇刺齊襄公與妹文姜通淫之事案今齊風作析薪如之何伐柯在豳風或引者誤存疑鄭氏康成曰橫從橫行治其田也案從直也詩東南其畝南其畝為從東其畝為橫總論孔氏穎達曰自此至篇末總坊男女淫奔之事夫婦重慎之義子云取妻不取同姓以厚別也故買妾不知其姓則卜之以此坊民魯春秋猶去夫人之姓曰吳其死曰孟子卒取七樹反去起呂反正義鄭氏康成曰厚猶遠也妾言買者賤之也士庶之妾多有不知其姓者吳太伯之後魯同姓也昭公取焉去姬曰吳而已至其死亦略云孟子卒不書夫人某氏薨孟子蓋其且字孔疏既筓而字當云伯姬季姬今云孟子故知且字之案且者聊苟意姑為此字孔氏穎達曰此坊民取同姓為妻之事妾賤不知其所生本姓但卜其姓吉乃取之依春秋例此吳女當云夫人姬氏至自吳薨當云夫人姬氏薨以諱取同姓故不稱夫人之姓而但曰吳又沒其薨也子云禮非祭男女不交爵以此坊民陽侯猶殺繆侯而竊其夫人故大饗廢夫人之禮繆與穆通正義鄭氏康成曰交爵謂相獻酢陽侯繆侯其國未聞大饗饗諸侯來朝者也夫人之禮使人攝孔疏王饗諸侯及諸侯自相饗同姓后夫人親獻異姓則使人攝孔氏穎達曰此坊男女非因祭祀不得相聚會也唯祭時男女乃得交爵故特牲饋食禮云主婦獻尸尸酢主婦是交爵也陽侯繆侯是兩君之諡案陽一作煬諡法好內違禮曰煬名與實爽曰繆未聞是何國君大饗之時夫人與君同饗賓繆侯及夫人共出饗賓陽侯見繆侯夫人之美乃殺繆侯而取其夫人故大饗廢此禮不使夫人得與也以此言之則陽侯以前大饗夫人出饗鄰國之君得男女交爵此云非祭男女不交爵者謂侯伯子男及卿大夫士祭乃交爵若王於上公及上公相饗時后與夫人亦男女交爵與祼同也故大行人云上公之禮王禮再祼而酢是也存疑鄭氏康成曰陽侯繆侯同姓也以貪夫人之色至殺君而立孔疏謂篡其君而自立也案陽侯殺繆侯而竊其夫人但辨其同姓與否猶膚末也此直小說家不經語耳陽之與繆為當饗時殺之與殺其君竊其夫人繆之臣民安然聽之一國之衆不敵一夫非情也如異時而殺之必先滅其國然後君可得而殺夫人可得而取若楚成滅息以息媯歸是矣此又非饗之罪也且大饗有二焉兩君相見男女雜沓古有是禮乎無也豈謂懲陽繆哉至廟中大饗古未有同為國君而來朝助祭者設或有是必其強弱大小萬萬不敵而後屈體事之殺與竊惡乎敢萬一果殺與竊矣廟中之禮夫婦同之所以備外內之官孝子所以饗親也馬或僨車而駕車者不廢馬因陽繆而廢夫人之禮是懲噎而廢食也可乎哉大抵春秋而後戰國及秦禮失而祭愈弛饗廢夫人由怠於祭祀致之作書者不考本末附會不經又使若出於夫子之言其勇於誣聖明矣此數者不可以不辨子云寡婦之子不有見焉則弗友也君子以辟遠也故朋友之交主人不在不有大故則不入其門以此坊民民猶以色厚于德見賢遍反辟讀避遠於萬反正義鄭氏康成曰有見謂睹其材藝也同志為友大故喪病也徐氏師曾曰以避遠者以避嫌故遠之也朋友之交以下謂凡朋友皆然不止謂寡婦之子也總論孔氏穎達曰自此至於族一節更申明男女相遠又坊人同姓淫泆之事子云好德如好色諸侯不下漁色故君子遠色以為民紀故男女授受不親御婦人則進左手姑姊妹女子子已嫁而反男子不與同席而坐寡婦不夜哭婦人疾問之不問其疾以此坊民民猶淫佚而亂于族好下並去聲佚音逸遠去聲正義鄭氏康成曰好德如好色此句似不足論語曰未見好德如好色疾時人厚於色之甚而薄於德也不下漁色謂不內取於國中也內取國中為下漁色昏禮始納采謂采擇其可者國君而內取象捕魚然中網取之是無所擇也不親者不以手相與也內則曰非祭非喪不相授器其相授則女受以篚其無篚則皆坐奠之而後取之御者在右前左手則身微偝之也女子十年不出嫁及成人可以出矣猶不與男子共席而坐遠别也案此男子謂父及兄弟兄弟之子也反謂歸寧時不夜哭嫌思人道也不問其疾嫌媚略之也問增損而已亂族犯非妃匹也子云昏禮壻親迎見于舅姑舅姑承子以授壻恐事之違也以此坊民婦猶有不至者迎魚敬反見音現正義鄭氏康成曰舅姑妻之父母也妻之父為外舅妻之母為外姑父戒女曰夙夜毋違命母戒女曰毋違宮事不至不親夫以孝舅姑也春秋成公九年春二月伯姬歸於宋夏五月季孫行父如宋致女是時宋共公不親迎恐其有違而致之也孔氏穎達曰恐事之違恐此女於昏事乖違成氏伯璵曰婦人謂夫之父母曰舅姑男子謂妻之父母亦曰舅姑但加外字耳此即假借其名非正也案恐事之違重父母敬恭順命以示教上與男家幣必誠辭無不腆告之以直信同義鄭單舉戒辭孔謂恐女與昏事乖違似未盡此上六章皆記男女之坊也坊記而以男女之道終歸本造端之義也欽定禮記義疏卷六十五
