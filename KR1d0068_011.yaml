body:
  text: 檀弓上第三之三食於有喪者之側未嘗飽也應氏鏞曰食字上疑脫孔子二字正義鄭氏康成曰助哀戚也通論遊氏桂曰子食於有喪者之側未嘗飽也蓋古禮有是而夫子能行之耳所謂車中不內顧不疾言不親指子於是日哭則不歌皆禮之常非聖人創為之也曾子與客立於門側其徒趨而出曾子曰爾將何之曰吾父死將出哭於巷曰反哭於爾次曾子北面而弔焉正義鄭氏康成曰徒謂客之旅以為不可發凶於人之館故出哭於巷次舍也陳氏澔曰謂其人所寓之館舍也禮館人使專之若其自有然通論孔氏穎逹曰此論館客使如其已有之事禮喪主西面今曾子北面弔者案士喪禮主人西面其賔亦在門東北面此謂同國之賔也今曾子既許其反哭於次舍之處故以同國賔禮北面弔焉存疑陳氏澔曰徒門弟子也案徒當從注出哭者以館舍統於尊者不敢以已喪驚也爾次徒之室不於客之正室客非喪主亦避尊也孔子曰之死而致死之不仁而不可為也之死而致生之不知而不可為也是故竹不成用瓦不成味木不成斫琴瑟張而不平竽笙備而不和有鐘磬而無簨虡其曰明器神明之也知音智味依注音沫亡曷反斫陟角反竽音于和胡卧反簨息允反虡音巨正義鄭氏康成曰之往也死之生之謂無知與有知也為猶行也成猶善也胡氏銓曰謂完備也竹不可善用謂邊無縢孔疏謂竹器邊無縢緣也味當作沫沫靧也孔疏靧靧面證沫有光澤瓦不善沫瓦器無光澤也不平不和謂無宫商之調無簨虡不縣之也孔疏不用格縣挂之橫曰簨直曰虡神明之者言神明死者也神明者非人所知故其器如此何氏胤曰不仁不知之間聖人之所難言若全無知則不應用若全有知則亦不應不成故有器不成付之不測之境也孔氏穎逹曰此論生人於死者不可致死致生之事聖人為教使人子不死於亡者不便謂無知不生於死者不便謂有知故制明器以神明求之器用並不精善也劉氏曰之往也之死謂以禮往送於死者也往於死者而極以死者之禮待之是無愛親之心為不仁故不可行也往於死者而極以生者之禮待之是無燭理之眀為不知故亦不可行也此所以先王為明器以送死者竹器則無縢緣而不成其用瓦器則粗質而不成其黑光之沫木器則朴而不成其雕斫之文琴瑟則雖張絃而不平不可彈也竽笙雖備具而不和不可吹也雖有鐘磬而無縣挂之簨虡不可擊也凡此皆不致死亦不致生而以有知無知之間待死者故備物而不可用也備物則不致死不可用則亦不致生其謂之明器者蓋以神明之道待之也通論陳氏祥道曰不曰神明之器特曰明器者以神之幽不可不明故也周官凡施於神者皆曰明故水曰明水火曰明火以至明齍明燭明竁者皆神明之也蓋其有竹瓦木之所用琴瑟竽笙鐘磬之所樂者明之也所用非所用所樂非所樂神之也宋襄公葬其夫人醯醢百甕豈知此哉案事死如事生者人子之至情也而神道或異於人道始死之奠猶近於人之及葬則近於神之故凡所以事死皆在人與神之間又以致敬而不敢褻也有子問於曾子曰問喪於夫子乎曰聞之矣喪欲速貧死欲速朽有子曰是非君子之言也曾子曰參也聞諸夫子也有子又曰是非君子之言也曾子曰參也與子遊聞之有子曰然然則夫子有為言之也曾子以斯言告於子遊子遊曰甚哉有子之言似夫子也昔者夫子居於宋見桓司馬自為石椁三年而不成夫子曰若是其靡也死不如速朽之愈也死之欲速朽為桓司馬言之也南宫敬叔反必載寶而朝夫子曰若是其貨也喪不如速貧之愈也喪之欲速貧為敬叔言之也曾子以子遊之言告於有子有子曰然吾固曰非夫子之言也曽子曰子何以知之有子曰夫子制於中都四寸之棺五寸之椁以斯知不欲速朽也昔者夫子失魯司寇將之荆蓋先之以子夏又申之以冉有以斯知不欲速貧也問喪問或作聞喪息浪反朽許久反為于偽反朝直遙反正義鄭氏康成曰有子孔子弟子有若也夫子卒後問此庶有異聞也喪謂仕失位魯昭公孫於齊曰喪人其何稱孔疏引公羊證失位者稱喪也昭公孫於齊次於陽州齊侯唁公於野井昭公曰喪人其何稱有子以貧朽非人所欲故以曽子所答為非君子之言桓司馬宋向戌之孫名魋孔疏世夲戌生東鄰叔子超超生左師眇眇即向巢也魋是巢之弟故云向戌孫也靡侈也敬叔魯孟僖子之子仲孫閲蓋嘗失位去魯得反載其寶來朝於君案家語敬叔以富得罪於定公奔衛衛侯請復之載其寶以朝夫子曰若是其貨也喪不如速貧之愈富而不好禮殃也敬叔以富喪矣而又弗改吾懼其有後患也敬叔聞之驚懼謝過循禮施散中都魯邑名案中都地後入於齊名平陸孔子嘗為之宰為民作制孔子由中都宰為司空由司空為司寇將之荆將應聘於楚先之以子夏申之以冉有言汲汲於仕也孔氏穎逹曰此論喪不欲速貧死不欲速朽之事有子唯問喪不問死曽子以喪死俱為惡事貧朽又事類相似故遂言之陳氏澔曰將適楚而先使二子繼往者蓋欲觀楚之可仕與否也辨正孔氏穎逹曰孔子世家定公九年孔子年五十為中都宰由中都宰為司空由司空為司寇定公十年會於夾谷攝行相事此云司寇者崔靈恩云諸侯三卿司徒兼冡宰司馬兼宗伯司空兼司寇三卿之下則五小卿為五大夫司徒之下立二人小宰小司徒司馬之下以其事省立一人為小司馬兼宗伯之事司空之下立二人小司寇小司空今夫子為司空乃小司空從小司空為小司寇也案魯有孟叔季三卿為政又有臧氏為司寇似崔解可依也世家魯定公十四年齊人歸女樂孔子去魯適衛從衛之陳又反於衛過曹適宋適鄭適陳又適衛不見用將西見趙簡子至河又反於衛復行如陳時哀公三年孔子年六十明年自陳遷於蔡楚使人聘孔子陳蔡圍之絶糧於是使子貢至楚楚昭王興師迎孔子將封之子西諫而止是嵗昭王卒孔子自楚反於衛年六十三時哀公六年以此言之失司寇距之楚嵗月甚逺非謂失司寇之年即之荆謂失司寇之後將往之荆爾方氏孝孺曰仕非欲富為行道也棺椁非欲不朽為廣孝也何氏孟春曰孔子欲仕為行道若謂欲富而瞰且趨焉以求利於蠻夷之國非孔子所為檀弓所載亦傳聞之繆案南宫敬叔載寶事未必確然如家語所載一聞聖言驚懼謝過循禮施散正可見古人改過之勇徙義之力陳莊子死赴於魯魯人欲勿哭繆公召縣子而問焉縣子曰古之大夫束修之問不出竟雖欲哭之安得而哭之今之大夫交政於中國雖欲勿哭焉得而弗哭且臣聞之哭有二道有愛而哭之有畏而哭之公曰然然則如之何而可縣子曰請哭諸異姓之廟於是與哭諸縣氏繆音木竟音境焉於虔反正義鄭氏康成曰君無哭鄰國大夫之禮陳莊子齊大夫陳恆之孫名伯孔疏世夲成子當生襄子班班生莊子伯安得哭之以其不外交也時君弱臣強政在大夫専盟會以交接不得不哭言哭有二道以權微勸之也哭諸異姓之廟明不當哭孔氏頴逹曰此論哭鄰國臣之法陳氏澔曰大夫訃於他國之君曰君之外臣寡大夫某死齊強魯弱不容略其赴縣子名知禮故召問之修脯也十脡為束問遺也為人臣者無外交不敢二君也故雖束修微禮亦不以出竟交政於中國言當時大夫専盟會之事以與國君相交接也此變禮之由也愛之哭出於不能已畏之哭出於不得已方氏慤曰哭諸異姓之廟者以哭其非所當哭之人故哭於非所當哭之廟也必哭諸縣氏以其禮之所由起故耳通論陳氏澔曰哭伯髙於賜氏義之所在也哭莊子於縣氏𫝑之所迫也仲憲言於曽子曰夏后氏用明器示民無知也殷人用祭器示民有知也周人兼用之示民疑也曽子曰其不然乎其不然乎夫明器鬼器也祭器人器也夫古之人胡為而死其親乎正義鄭氏康成曰仲憲孔子弟子原憲案原憲名憲字思古無加仲於名者或仲氏而名憲與示民無知所謂致死之有知所謂致生之兼用言使民疑於無知與有知曽子連言其不然乎非其説之非也蓋仲憲之言三者皆非此或用鬼器或用人器孔氏頴逹曰此論不可致意於死人為死為生之事殷不别作明器而即用祭祀之器曾子謂夏代文以鬼與人異故純用鬼器非為無知殷世質以鬼雖與人異亦應恭敬故用祭器貯食送之非為有知周家極文故兼用之然周惟大夫以上兼用士惟用鬼器不用人器也又言古人雖質何容死其親乎若示無知則是死之義也憲言三事皆非而曽子獨譏無知者以夏代尤古譏其一則餘從可知也陳氏澔曰為其無知故以不堪用之器送之為其有知故以祭器之可用者送之疑者不以為有知亦不以為無知也然周禮惟大夫以上得兼用二器士惟用鬼器也曽子以明器祭器固是人鬼之不同夏殷所用不同者各是時王之制文質之變耳非謂有知無知也若如憲言則夏后氏何為而忍以無知待其親乎王氏曰仲憲之言皆非曽子非之末獨譏其説夏后明器蓋舉其失之甚者也存疑張子曰明器而兼用祭器周之末禮也周禮惟言廞方氏慤曰明器祭器三代之所兼用蓋處以死生之間而已案周禮惟言廞先鄭訓陳後鄭訓藏夫器必先陳之後藏之張子據以為周初不用祭器何也至三代皆兼二器方説更無據公叔木有同母異父之昆弟死問於子遊子遊曰其大功乎狄儀有同母異父之昆弟死問於子夏子夏曰我未之前聞也魯人則為之齊衰狄儀行齊衰今之齊衰狄儀之問也木依注作朱月案古本齊衰下有三二字正義鄭氏康成曰木當為朱春秋作戌衛公叔文子之子定公十四年奔魯孔疏世夲衛獻公生成子當當生文子拔拔生朱故知木當為朱也其大功乎疑所服也孔氏頴逹曰此論為同母異父昆弟死者著服得失之事為同母異父昆弟之服喪服無文乎疑辭也不云自狄儀始者庾蔚云狄儀之前魯人先已行之存疑鄭氏康成曰親者屬大功是孔氏頴逹曰同父同母服期今但同母宜降一等服大功王肅乃云其子降繼父齊衰一等故服大功是以繼父齊衰為期服也張子曰同母異父之昆弟狄儀服之齊衰是與親兄弟之服同如此則無分别無分别則禽獸之道也是知母而不知父齊衰三月髙曽正服無緣加之異姓或以為大功者亦似太過以小功服之可也案家語邾人有同母異父之昆弟死因顔克問於孔子子曰同居繼父則從為之服不同居繼父且無服况其子乎是聖人固有定論矣何遊夏不聞而各以臆説耶魏髙堂崇曰聖人制禮外親不過緦殊異內外之明理也外祖父母以尊加從母以名加皆小功舅緦而已同母異父之昆弟異族無屬於禮不當有服即同居亦當從同爨緦之例無緣大功乃重於外祖父母也鄭謂親者屬王肅難之言親屬謂出母之身不謂其子極當然王肅謂繼父服齊衰子降一等故大功又非也馬昭駁王言繼父昆弟恩由於母不由繼父張融駁王言繼父同居有子為齊衰三月乃為其子大功非服之差合此數説觀之則以孔子言無服為正子思之母死於衛栁若謂子思曰子聖人之後也四方於子乎觀禮子蓋慎諸子思曰吾何愼哉吾聞之有其禮無其財君子弗行也有其禮有其財無其時君子弗行也吾何慎哉正義鄭氏康成曰子思孔子孫伯魚之子伯魚卒其妻嫁於衛栁若衛人也見子思欲為嫁母服恐其失禮戒之嫁母齊衰期孔疏嫁母之服喪服無文案喪服杖期章云父卒繼母嫁從為之服報則親母可知故鄭約云齊衰期也有禮無財謂時可行而財不足以備禮有禮有財無時謂財足以備禮而時不得行者子思謂時所止則止時所行則行無所疑也喪之禮如子贈禭之屬不踰主人孔疏若嫁母之家主人貧乏雖有財不得過於主人故鄭謂贈禭不踰主人也孔氏穎逹曰此論為出母之喪行禮之事譙周袁準並云父卒母嫁非父所絶適子雖主祭猶宜服期而喪服為出母期嫁母與出母俱是絶族故知與出母同也通論姚氏舜牧曰喪母有其禮矣致喪有其財矣然時乎出嫁則與從父而終者異矣此雖有禮與財而亦有不可行者他日子上之母死子思曰為伋也妻者是為白也母不為伋也妻者是不為白也母則此之所謂有其禮有其財無其時君子弗行也其意斷可識矣存疑遊氏桂曰為嫁母服此後世之禮非先王之正也古之君子嚴於父母男女之别以為禽犢懷母不懷父君子惡之故父在為母期以厭降於父母出嫁而其禮之行有所不備以為母絶於天其尊統於父所以致謹於父之尊也若厚於嫁母而於父不親此禽犢之道謹於禮者之所畏也案嫁母亦有出於不得已而再適者則嫁母之罪不重於出母為出母期禮有明文矣遊氏持論亦似太過辨正吳氏澄曰禮父在為嫁母齊衰期父沒為父後者則不服其時子思父伯魚久沒祖仲尼亦沒而其已嫁之母死於衛子思將為之服栁若戒以慎禮毋或厚於情而踰於禮時母嫁之家蓋貧子思雖欲備禮而不可踰喪主故其心歉然謂吾方恨其不及於禮何事須慎防其過於禮乎馬氏胡氏皆不曉栁若與子思所言慎字之意縣子瑣曰吾聞之古者不降上下各以其親滕伯文為孟虎齊衰其叔父也為孟皮齊衰其叔父也瑣息果反滕徒登反為于偽反正義鄭氏康成曰古謂殷時也上不降逺下不降卑伯文殷時滕君也爵為伯名文孔氏頴逹曰此論古者著服不降之義瑣縣子名據所聞而言也周禮以貴降賤以嫡降庶唯不降正耳而殷世以上雖貴不降賤上謂旁親族曽祖從祖及伯叔之班下謂從子從孫之流彼雖賤不以已尊降之猶各隨夲屬之親輕重而服之孟虎乃滕伯之叔父而滕伯又孟皮之叔父言滕伯上為叔父下為兄弟之子皆著齊衰是上不降逺下不降卑也庾氏蔚之曰上下猶尊卑正尊周禮猶不降則知所明者常尊也鄭恐尊名亂於正尊故變文言逺也通論朱子曰夏殷而上大概只是親親長長之意到得周來又添得許多貴貴底禮數如始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟期之喪天子諸侯絶大夫降然諸侯大夫尊同則亦不絶不降姊妹嫁諸侯者則亦不絶不降此皆天下之大經前世所未備到得周公搜剔出來立為定制更不可易案略爵而專稱孟虎孟皮者明非諸侯大夫尊同者也殷道重親故通逺與卑均服之記兩舉上下以盡其義馬氏睎孟謂滕伯為二孟叔父吳氏澄謂二孟為滕伯叔父各執一邊古者不降二句都無著落后木曰喪吾聞諸縣子曰夫喪不可不深長思也買棺外內易我死則亦然易以豉反正義鄭氏康成曰后木魯孝公子惠伯鞏之後孔疏世夲孝公生惠伯革其後為厚氏世夲云革此云鞏世夲云厚此云后其字異耳但惠伯子孫無名木者故注直云其後買棺外內易此孝子之事非所託孔疏此是孝子所為之事非是父母豫所屬託譏后木也孔氏頴逹曰此論屬子以死事非禮之事孝子居喪必深長慮買棺之時當令精好斫削內外使之平易后木述縣子之言以語其子馮氏曰此條重在不可不深長思一句買棺之時內外皆要精好此是孝子當為之事非是父母豫所屬託而曰我死則亦然記禮者譏失言也方氏慤曰子思曰喪三日而殯凡附於身者必誠必信勿之有悔焉耳矣三月而葬凡附於棺者必誠必信勿之有悔焉耳矣此喪所以不可不深長思也買棺外內易亦其一端耳曽子曰尸未設飾故帷堂小斂而徹帷仲梁子曰夫婦方亂故帷堂小斂而徹帷帷意悲反正義鄭氏康成曰斂者動搖尸帷堂為人褻之言方亂非也仲梁子魯人孔疏左傳定公五年魯有仲梁懷故知魯人孔氏穎逹曰自此至末失也論小斂失禮之事陳氏澔曰始死去死衣用斂衾覆之以俟浴既復之後楔齒綴足畢具脯醢之奠事雖小定然尸猶未襲斂也故曰未設飾於是設帷於堂者不欲人褻之也故小斂畢乃徹帷仲梁子謂夫婦方亂者以哭位未定也二子各言禮意言方亂非也方氏慤曰人死斯惡之矣以未設飾故帷堂蓋以防人之所惡也小斂則既設飾矣故徹帷焉若是則帷堂之禮為死者爾豈為生者哉而仲梁子以為夫婦方亂故帷堂則失禮之意逺矣小斂之奠子遊曰於東方曽子曰於西方斂斯席矣小斂之奠在西方魯禮之末失也正義鄭氏康成曰曽子以俗説非又大斂奠於堂孔疏大斂之奠設於室今鄭云堂傳寫誤乃有席末失謂末世失禮之為也孔氏穎逹曰案士喪禮小斂之奠設於尸東無席魯之衰末小斂之奠設於西方又有席曽子見時如此將謂為禮故云小斂於西方其斂之時於此席上而設奠矣故記者正之云是魯人行禮末世失其法也方氏慤曰小斂之奠於東方則孝子未忍死其親之意也案小斂畢奉尸侇於堂乃奠於尸東當尸右手如其能食也將大斂徹小斂奠設於序西南當西榮如設於堂不忍使親須臾無所憑然於西漸神之也大斂既殯乃設席於奧而奠彌神之也曽子謂於西方而又言斂斯席謂此小斂即設席於西皆因末俗之失也秦繼宗謂斂斯席矣是記者語未然縣子曰綌衰繐裳非古也綌去逆反繐音歲正義鄭氏康成曰非時尚輕涼慢禮孔氏穎逹曰綌葛也繐布疏者時有喪者不服粗衰但以疏葛為衰繐布為裳故云非古古謂周初制禮時也陸氏德明曰綌粗葛布細而疏曰繐方氏慤曰古之五服自斬至緦一以麻而各有升數若以綌為衰以繐為裳則取其輕涼而已故曰非古也案儀禮喪服布衰裳牡麻絰即葛五月又既葬即除之服有繐衰裳繐布細而疏五服不用小功雖輕必待三月變麻始改衰而就葛絰帶而五月今概用綌繐則非禮甚矣子蒲卒哭者呼滅子皋曰若是野哉哭者改之正義鄭氏康成曰滅蓋子蒲名惟復呼名孔疏冀其聞名而反子皋孔子弟子髙柴野哉非之也孔氏穎逹曰此論哭者呼名非禮之事野不逹禮也哭則敬鬼神不復呼名此家哭呼名子皋非之乃改也杜橋之母之喪宫中無相以為沽也相息亮反沽音古正義鄭氏康成曰沽猶略也孔氏頴逹曰此論喪須立相導之事禮孝子喪親悲迷不復自知禮節事儀皆須人相導而杜橋家母死宫中不立相侍故時人謂其於禮為粗略夫子曰始死羔裘玄冠者易之而已羔裘玄冠夫子不以弔易音亦正義鄭氏康成曰不以吉服弔喪孔氏頴逹曰此論始死易服小斂後不得吉服弔之事蓋養疾者朝服羔裘玄冠即朝服也始死則易去朝服著深衣記時有不易者又有小斂後羔裘弔者記人引孔子身行之禮以譏當時多失禮也方氏慤曰吉服可以養疾而不可以居喪故始死則易之不特喪者易之弔者亦不服也存疑馬氏睎孟曰弔者在小斂之前猶當服羔裘玄冠以主人未成服弔者麻絰不敢先也故子遊裼裘而弔小斂乃襲裘帶絰而入若夫子之羔裘玄冠不以弔者是言小斂之後也案家語季桓子死魯大夫朝服而弔子遊問而夫子答之雖始死主人未成服而曰易之則必非羔裘玄冠也子遊問喪具夫子曰稱家之有亡子遊曰有亡惡乎齊夫子曰有毋過禮苟亡矣斂首足形還葬縣棺而封人豈有非之者哉稱尺證反亡音無惡音烏毋音無斂力驗反還音旋縣音元封依注作窆正義鄭氏康成曰惡乎齊問豐省之比也形體也還葬還之言便也言已斂即葬不待三月縣棺謂不設碑繂不備禮也封當為窆窆下棺也春秋傳作塴人豈有非之不責於人所不能也孔氏穎逹曰此論送終所須當辦具也稱猶隨也亡無也夫子言各隨其家計豐薄有無蓋禮有節限設若富家有正禮可依不得過之貧家既無財但使衣衾斂於首足形體不令露見而已斂竟便葬但手縣棺而下之同於庶人也陳氏澔曰喪具送終之儀物也惡乎齊言何以為厚薄之劑量也毋過禮不可以富而踰禮厚葬也還葬謂斂畢即葬不待日月之期不設碑繂人不非之者以無財則不可備禮也姚氏舜牧曰稱便是中道便是禮存疑王氏安石曰凡禮言封者復土以閉瘞之名爾何用改為窆乎王制庶人不封不樹易以不封不樹為古則周有封樹之制不必下逮庶人案古封字有從之土會意即窆字也有圭從土丰諧聲亦作乃訓髙也後混為一鄭氏始改讀窆以别之孔子葬於防封之崇四尺門人葬孔子三斬板而已封彼封指築墳言古葬者不封謂不築土也周文故有封樹此言縣棺則封自當作窆指下棺言王説非也司士賁告於子遊曰請襲於牀子遊曰諾縣子聞之曰汰哉叔氏專以禮許人賁音奔人名汰又作大音泰正義鄭氏康成曰時失之也子遊當言禮然言諾非也叔氏子遊氏孔氏頴逹曰此論不可以禮許人之事襲皆在牀當時失禮襲在於地故司士賁告子遊子遊不據禮答之專輒許諾如禮出於己故縣子譏之汰自矜大也陳氏祥道曰君子之於言必則古昔稱先王則古昔所以夲其時稱先王所以本其人如此則有所受無所專也司士問襲牀之禮而子遊諾之以其不知有所受無所專也陳氏澔曰禮始死廢牀而置尸於地及復而不生則尸復登牀襲者斂之以衣也沐浴之後商祝襲祭服褖衣蓋布於牀上也飯含之後遷尸於襲上而衣之襲於牀者禮也後世禮失而襲於地則褻矣司士知禮而請於子遊子遊不稱禮而答之以諾所以起縣子之譏也汰矜大也言凡有咨問禮事者當據禮答之子遊專輒許諾則如禮自已出矣是自矜大也馬氏睎孟曰魂氣歸於天體魄歸於地人之所以死也故始死廢牀欲其近於地不復然後襲於牀案楊復儀禮圗云喪大記有疾病廢牀之文儀禮則無然夲記云乃卒主人啼兄弟哭設牀笫當牖夫既設牀笫於乃卒之後則知疾病時廢牀與喪大記合然據檀弓曽子易簀反席而殁則不廢牀也記所謂設牀即喪大記所謂含一牀襲一牀與小斂牀笫等皆非常寢之牀也古謂廢牀寢地冀其受氣以生夫人將死斷無藉地氣復生之理且地氣沁侵速之斃耳喪大記所云古即有之亦不可用宋襄公葬其夫人醯醢百甕曽子曰既曰明器矣而又實之醯呼兮反醢音海甕烏弄反正義鄭氏康成曰言名之為明器而與祭器皆實之是亂鬼器與人器陳氏澔曰夏專用明器而實其半虛其半殷人全用祭器亦實其半周人兼用二器則實人器而虗鬼器通論孔氏穎逹曰此論宋襄公失禮之事案春秋宋襄公卒在僖公二十三年至文公十六年猶有襄夫人在今得云宋襄葬其夫人者蓋襄公初取夫人爾既曰神明之器則當虗也案既夕禮陳明器後云無祭器鄭云士禮略大夫以上兼用鬼器與人器人鬼兼用則空鬼而實人士既無人器則亦實明器故既夕禮云甕三醯醢屑又云甒二醴酒也若夏后氏專用明器則分半以實之殷人全用祭器則亦分半以虗之周人兼用則亦實人而空鬼也存疑馬氏睎孟曰此譏其多於禮可也以為明器而不當實之則非矣豈曽子言殷人之禮有祭器而不必實明器與案既夕士禮此為諸侯禮有祭器又有明器孔氏實人空鬼之説自不可易襄公百甕當是既實祭器并明器俱實故曽子譏之馬氏非之過矣且殷人全用祭器何明器之可言孟獻子之喪司徒旅歸四布夫子曰可也正義鄭氏康成曰獻子魯大夫仲孫蔑旅下士也司徒使下士歸四方之賻布時人皆貪夫子善其能廉孔氏頴逹曰此論喪不貪利之事孟氏家臣司徒敬子稟承主人之意使旅下士歸還四方賻布之餘蓋四方賻泉布本助喪用今既有餘故歸還之熊氏謂此司徒獻子家臣左傳叔孫氏之司馬鬷戾是家臣亦有司徒司馬也存疑吳氏澄曰家臣之賤應無稱司徒司馬者熊氏説非皇氏謂歸之君而君使司徒歸之者亦非但如鄭注云旅下士也司徒使下士歸四方之賻布是矣案周官諸大夫之喪宰夫使其旅帥有司而治之宰夫者冢宰之下大夫也季孫魯國上卿實兼冢宰之職司徒乃季孫之下大夫故其旅得為孟獻子之家治喪也案少牢大夫禮也而有司馬刲羊之文則大夫家有司徒司馬可知吳氏論官制固允而謂季孫之下大夫為孟孫治喪則未必然讀賵曽子曰非古也是再告也正義鄭氏康成曰喪禮祖而讀賵賔致命將行主人之史又讀賵所以存録之曽子言非禮吳氏澄曰案丑喪禮下篇祖奠畢公賵賔賵其時賵者已致命於柩凡所賵之物書之於方及次日遣奠畢包牲行器之後主人之史讀賵若欲使人一一知之前既致命今又讀之是再告於神也蓋古者但有賵時致命之禮無後來再讀之理故曽子以為非古陳氏澔曰車馬曰賵所以助主人之送葬也既受則書其人名與其物於方版葬時柩將行主人之史請讀此方版所書之賵蓋於柩東當前東西面而讀之古者奠之而不讀周則既奠而又讀焉故曽子以為再告也成子髙寢疾慶遺入請曰子之病革矣如至乎大病則如之何子髙曰吾聞之也生有益於人死不害於人吾縱生無益於人吾可以死害於人乎哉我死則擇不食之地而葬我焉遺於季反又如字革紀力反正義鄭氏康成曰成子髙齊大夫國成伯髙父也孔疏齊有國子世夲懿伯生貞孟貞孟生成伯髙父慶遺入請觀其意也革急也遺慶封之族不食謂不墾耕秦氏繼宗曰謂地不可種五穀以供民食也孔氏頴逹曰此論臨死不忘儉之事國氏也齊有國子髙吳氏澄曰入請入卧內請其遺命也子髙自謂生不能利澤於人是無益於人也若死而葬人所耕墾之地以妨五榖是有害於人矣故擇不可耕墾之地而葬焉其意慊然不自足其言依於謙儉可謂賢矣陳氏澔曰子髙諡成革亟也大病死也諱之之辭通論方氏慤曰子髙之愛人可知矣觀公叔文子樂瑕丘而欲葬則子髙之所得不亦多乎子夏問諸夫子曰居君之母與妻之喪居處言語飲食衎爾衎苦旦反存疑鄭氏康成曰衎爾自得貌為小君惻隱不能至孔氏穎逹曰此論臣服小君儀容之事居處以下是夫子答辭不云子曰者記人略也陳氏澔曰君母君妻雖皆小君皆服齊衰不杖期然恩義則淺矣故居其喪則自處如此衎爾和適之貌存異陸氏佃曰喪雖輕惻隱不至則有之未有居之而樂者也子夏失問夫子是以不答案家語居處上有如之何子曰五字衎爾下有在喪所則稱其服而已九字文義甚明當從之賔客至無所館夫子曰生於我乎館死於我乎殯正義鄭氏康成曰仁者不厄人方氏慤曰此言賔客論語言朋友互相備也應氏鏞曰朋友以義合謂之賔客者自逺方而至也案家語至無所館下有死無所殯四字此亦闕文記者約計夫子生平言他國客至有無所館者則夫子曰於我乎館有死無所殯者則夫子曰於我乎殯不忍其無歸覆載生成之心也或曰其至為夫子至也生既館之死亦殯之國子髙曰葬也者藏也藏也者欲人之弗得見也是故衣足以飾身棺周於衣椁周於棺土周於椁反壤樹之哉壤而丈反正義鄭氏康成曰言皆所以為深邃人難發見之也國子髙成子髙也成諡也反覆也怪不如太古孔疏唐虞以上謂之太古易繫辭曰古之葬者厚衣之以薪不封不樹今既封樹故曰怪不如太古而反封樹之意在於儉非周禮也孔氏頴逹曰此論重古非今之事子髙之意人死可惡故備以衣衾棺椁欲其深邃不使人知今乃反更封壤為墳而種樹以標之哉言不當封壤種樹也方氏慤曰壤言封土以為墳樹言種樹以為表通論馬氏睎孟曰古於死者衣之以薪葬諸中野而後世聖人特嚴慎終之禮故瓦棺堲周為不足易之以棺椁無使土侵膚被之以栁翣無使人惡於死凡此皆藏之弗得見者也周官冡人以爵等為之丘封之度與其樹數使知位秩之髙下命數之多寡所以遺後世子孫之識非以為觀美者也封之崇四尺孔子之所不廢而國子髙非之亦異於禮矣案子髙自葬不食之地而其言葬也又苐以藏為説視周末文勝之習逺矣或子髙懲當時有石椁三年醯醢百甕大害於禮者故作此語與死欲速朽同意與孔子之喪有自燕來觀者舍於子夏氏子夏曰聖人之葬人與人之葬聖人也子何觀焉昔者夫子言之曰吾見封之若堂者矣見若坊者矣見若覆夏屋者矣見若斧者矣從若斧者焉馬鬛封之謂也今一日而三斬板而已封尚行夫子之志乎哉燕烏田反與鄭如字今作平聲坊音防鬛力輒反正義鄭氏康成曰封築土為壟堂形四方而髙坊形旁殺平上而長覆謂茨瓦也夏屋今之門廡孔疏夏家之屋唯兩下而已無四阿如漢之門廡其形旁廣而卑斧形旁殺刃上而長孔子以為刃上難登狹又易為功故從若斧者焉馬鬛俗間名孔疏恐燕人不識故舉俗稱以語之馬騣鬛之上其肉薄封形似之板蓋廣二尺長六尺斬板謂斷其縮也三斷止之孔疏築墳之法安板側於兩邊用繩約板令立納土板中築之令土與板平斬所約繩更置於見築土上又載土其中三遍如此其墳乃成旁殺蓋髙四尺其廣袤未聞也詩云縮板以載尚庶幾也王氏肅曰言若聖人葬人與則人庶有異聞得來觀者若人之葬聖人與凡人何異而子何觀之有故下備述夫子所言四封之異以慰燕人逺觀之心使以為法也孔氏頴逹曰此一節論葬夫子封墳之法舍住也燕國人來住子夏家也子夏歷述孔子之言又引今會古言今孔子墳止用一日之功儉約如此者是庶幾慕行於孔子平生所志也孫育云孔子墓魯城北門外西墳四方前髙後下形似卧斧髙八九尺記似誤者孫所見或後人增益不與原葬同與陳氏澔曰延陵季子之葬其子夫子尚往觀之今孔子之葬燕人來觀亦其宜也然子夏之意以為聖人葬人則事皆合禮人之葬聖人則未必皆合禮也故語之曰子以為聖人之葬人乎乃人之葬聖人也又何觀焉蓋謙辭也馬氏睎孟曰古之人封之若堂者四方而髙難為功而易為虧故變之為若坊易為功矣然上平猶不免於虧故變之為若覆夏屋旁廣而卑則難虧矣然必從若斧者功愈易而虧愈難此所貴於儉者也丘封以爵等為度而如此異者不失髙下之制而已矣通論陳氏祥道曰孔子以時人之封過泰也故欲從其殺者而已門人以夫子之志於儉也故一日三斬板以行夫子之志而已門人於封則儉於披崇練旐則不儉者儉則行夫子之志不儉則行門人之志行夫子之志所以救時行門人之志所以尊師也存疑鄭氏康成曰與及也孔氏頴逹曰子夏謂燕人云若聖人葬人及人葬聖人皆用一禮而子逺來何所觀乎案與當如王説作平聲鄭注不合語意婦人不葛帶正義鄭氏康成曰婦人質不變重者至期除之卒哭變絰而已孔疏絰首絰也婦人輕首重要故也孔氏頴逹曰此論齊斬婦人帶要絰也葬後卒哭變麻易葛婦人重要不變所重故不葛帶至期除之卒哭直變絰而已大功以下輕至卒哭並變為葛與男子同陳氏澔曰禮婦人之帶牡麻結本卒哭丈夫去麻帶服葛帶而首絰不變婦人以葛為首絰易去首之麻絰而麻帶不變所謂不葛帶也既練則男子除絰婦人除帶有薦新如朔奠正義鄭氏康成曰重新物為之殷奠孔氏穎逹曰薦新謂未葬中間得新味而薦亡者如朔奠者謂未葬前月朔大奠於殯宫大奠則牲饌豐也朔禮視大斂士則特豚三鼎今若有新物及五榖始熟薦於亡者則其禮牲物如朔之奠也大夫以上則朔望大奠士但朔而不望應氏鏞曰薦新於廟死者已逺則感傷或淺薦新於殯其痛尚新則感傷必重朔祭謂之大奠其禮視大斂薦新亦如之存疑應氏鏞曰如者謂男女各即位內外各從事而奠哭之儀如一也是禮之同非其物之同注謂殷奠恐未然蓋經曰如朔奠非為之也案士喪禮既殯有朝夕奠有朔奠及月半奠朝夕奠脯醢朔奠用特豚三鼎視朝夕奠為盛故曰殷朔望有定期薦新無定期薦新事若微然月令按候載之蓋孝子因時怵愴之懷恃此以申故重其禮如此注説未可輕議也况據士喪朝夕奠敘主賔男女之位甚詳朔奠不及哭位其如朝夕哭位可知若苐以如朔奠為男女之位等則朝夕奠亦然何必曰如朔奠既葬各以其服除正義鄭氏康成曰卒哭當變衰麻者變之孔疏重親各隨所受而變服或有除者不視主人孔疏若三月之親至三月數滿應除者葬竟各自除不待主人卒哭之變也哭陳氏澔曰葬而虞虞而卒孔氏穎逹曰既葬謂三月葬竟後至卒哭案此既葬統天子諸侯大夫士庶非必大夫三月而葬也除謂變除之節蓋受服亦必去前服故統曰除也鄭注夲該孔疏特舉其一耳餘論張子曰今人多歷年所而葬者亦當以改葬之服除蓋古者未葬則主人不除今既除之矣則猶當從改葬服禮改葬服緦久不葬者似難為虞祭以其無几筵也三日而省墓可也池視重􅋼重直容反正義鄭氏康成曰如屋之有承􅋼也承霤以木為之用行水孔疏屋􅋼入此术中又從木中而􅋼於地故此木為重􅋼亦宫之飾也栁宫象也孔疏生時既屋有重􅋼以行水死時栁車亦象宫室以竹為池衣以青布孔疏於車覆鱉甲之下牆帷之上織竹為之形如籠衣以青布以承鱉甲縣銅魚焉今宫中有承􅋼以銅為之孔氏穎逹曰池者栁車之池也重􅋼屋承􅋼也天子則四注四面皆有重霤諸侯去後餘三大夫唯餘前後二士則唯一在前名之為池以象重􅋼方面之數各視生時重􅋼案孝子不忍死其親故喪器以生時之具奉之帷荒既象屋故必設池以象重􅋼君即位而為椑嵗一漆之藏焉椑蒲歷反正義鄭氏康成曰椑謂杝棺親尸者椑堅著之言也孔疏謂漆之堅強甓甓然也天子椑內又有水兕革棺嵗一漆之若未成然藏焉虗之不令陸氏德明曰令本又作合孔氏穎逹曰此論人君尊即位得為棺之事君諸侯也言諸侯則王可知人君無少長體尊備物故即位而造棺每年一漆示如未成也不欲令人見故藏焉存疑孔氏頴逹曰鄭注不令一作不合令善也言虗之則不善故藏物於其中一作不合謂不以蓋合覆其上案言棺之藏但虗之不合不以蓋合覆其上非謂必藏物棺中也作令字非復楔齒綴足飯設飾帷堂並作父兄命赴者楔悉節反綴竹劣反又竹衛反飯煩晚反正義鄭氏康成曰設飾謂遷尸又加新衣孔氏穎逹曰此論始死之事復招魂也楔柱也招魂後用角柶柱亡人之齒令開使含時不閉也綴足者用燕几綴亡人之足令直使著屨時不辟戾也飯含也設飾謂襲斂遷尸之時又加著新衣也作起為也自復以下諸事並起也赴亦復後之事死者生時有親識之人今死則其家宜使人往相赴告也陳氏澔曰帷堂堂上設帷也六事一時並起故曰並作也存異鄭氏康成曰父兄命赴謂大夫以上也士主人親命之孔疏士喪禮孝子自命赴者孔氏頴逹曰帷堂謂小斂時也案士喪禮曰乃赴於君主人西階東南面命赴者拜送此赴君之禮也餘無主人命赴之文蓋始死時孝子悲痛迷瞀故諸父諸兄代為命赴君尊故親命而拜送之也鄭誤以士喪禮命赴為凡赴皆然而因以為士大夫尊卑之别非也又案士喪禮始死設奠即曰帷堂不待小斂君復於小寢大寢小祖大祖庫門四郊正義鄭氏康成曰尊者求之備也亦他日所嘗有事孔氏穎逹曰此明人君禮備復處多也君王侯也周禮夏采以冕服復於太廟其小廟則祭僕復之小寢大寢則隸僕復之四郊夏采復之諸侯則小臣復馬氏睎孟曰寢所居處之地祖所有事之地門所出入之地郊所嘗至之地君復必於此者蓋魂氣之往亦未離生時熟習之地也觀此則死生之説可知矣陳氏澔曰天子之郭門曰皋門明堂位言魯之庫門即天子皋門是庫門者郭門也存疑孔氏頴逹曰前曰廟後曰寢爾雅云室有東西廂曰廟無東西廂而有室曰寢小寢謂髙祖以下之寢大寢謂天子始祖諸侯大祖之寢也案寢君寢也春秋公薨於小寢周官六寢注云王之大寢一小寢六宫寢為人君居處之地故復始於此士喪禮所謂復者升自東榮中屋是也由宫寢至於廟由廟至於門由門至於郊先近後逺其序如此鄭注周禮隸僕掌五寢掃除糞灑誤為廟寢此疏本其説言之豈有舍其現在居處之六寢於廟又先寢後廟之理當以馬氏説為是喪不剝奠也與祭肉也與剝邦角反與音餘正義鄭氏康成曰剝猶倮也有牲肉則巾之孔疏士喪禮小斂陳一鼎既斂奠於尸東祝受巾巾之是牲肉巾之也為其久設塵埃加也脯醢之奠不巾孔疏始死脯醢醴酒奠於尸東無巾又殯後朝夕乃奠醴酒脯醢如初設不巾是脯醢不巾也孔氏頴逹曰此論祭肉不可露見之事與是語辭謂喪不倮露奠者為有祭肉也無祭肉即得倮露案或云剝者徹之疾也祭肉之徹以疾為敬故詩曰諸宰君婦廢徹不遲惟喪之奠則藉以依神故朝奠至夕乃徹夕奠至朝乃徹言此喪之不徹奠者孝子不死其親如待其食而猶未食之至情也與寧比以神道事者之祭肉以疾徹為敬也與玩文似當如此解其説與注别存之以備一義既殯旬而布材與明器正義鄭氏康成曰木工宜乾臘且豫成材椁材也孔氏頴逹曰此論葬禮須豫暴之事布班也殯後十日班布告下覓椁材及送葬明器之材士喪禮筮宅吉左還椁獻明器之材於殯門外是也王氏安石曰布陳也陳氏澔曰布者分列而暴乾之也案士喪禮有獻材獻素獻成三節在筮宅後以已成者言此殯後十日則庀材之始布字三説不同然亦彼此相足蓋惟告下覓材乃能陳布暴乾之也朝奠日出夕奠逮日逮音代或大計反正義鄭氏康成曰隂陽交接庶幾遇之吳氏澄曰隂暗陽明出者由暗而明隂交接陽也及日將入由明而暗陽交接隂也奠者所以聚死者之神死而神混於天地隂陽之中故於天地隂陽交接之際求之方氏慤曰逮日者及日也於日未沒之時為及日矣朝奠以象朝時之食夕奠以象夕時之食孝子事死如事生也案此二語當在喪不剝奠上士喪禮朝哭先徹宿奠乃設朝奠設奠時有燭者以奠設室中雖日出猶暗也父母之喪哭無時使必知其反也正義鄭氏康成曰使謂既練反必有祭孔氏頴逹曰禮哭無時有三種一是初喪未殯之前哭不絶聲二是殯後除朝夕哭之外廬中思憶則哭三是小祥之後哀至而哭或一日二日而無復朝夕之時也此謂小祥後君使之還家當必設祭告親之神令知其反亦出必告反必面之義也存疑鄭氏康成曰或時為君服金革之事辨正孔氏頴逹曰禮運云三年之喪期不使則期外可使也而曽子問云卒哭服金革之事無辟此魯侯有為為之也卒哭而使非正禮也練練衣黃裏縓緣葛要絰繩屨無絇角瑱鹿裘衡長袪袪裼之可也縓元絹反緣悅絹反要一遙反絰大結反絇其俱反瑱吐練反衡依注作橫華彭反袪起魚反一音丘據反正義鄭氏康成曰黃之色卑於纁縓纁之類明外除也瑱充耳也吉時以玉人君有瑱衡當為橫字之誤也袪謂褎緣袂口也練而為裘橫廣之又長之又為袪則先時狹短無袪可知裼表裘也有袪而裼之備飾也吉時麛裘玉藻曰麛裘青犴褎絞衣以裼之鹿裘亦用絞乎孔氏頴逹曰練小祥也小祥而著練冠練中衣故曰練也練衣者練為中衣黃裏者黃為中衣裏也正服不可變中衣非正服但承衰而已故小祥而為之黃夾裏也縓緣者縓為淺絳色纁是赤色其色華美黃雖是正色質卑於纁爾雅一染謂之縓三染謂之纁故鄭言纁類也緣謂中衣領及褎緣也裏用黃而領緣用縓者領緣外也明其外除故飾見外也葛要絰者小祥男子去首絰唯餘要葛也繩屨者父母喪菅屨卒哭受齊衰蒯藨屨至小祥受大功繩麻屨也絇屨頭飾也吉有喪無角瑱者初喪無瑱小祥微飾以角為之冬時吉凶衣裏皆有裘吉時則貴賤有異喪時則同用大鹿皮為之小祥之前裘狹而短袂又無袪小祥稍飾故更橫廣又長之且為袪如此三法也裼謂裘上又加衣也為吉轉文故加裼之可也明小祥時外有衰衰內有練中衣中衣內有裼衣裼衣內有鹿裘鹿裘內自有常著襦衣也通論呂氏大臨曰斬疏繐大功小功緦錫皆曰衰喪正服也練麻皆曰衣喪變服也至親以期斷加隆而三年故加隆之服者正服當除有所不忍故為之變服以至於再期也斬衰之冠鍛而勿灰錫則緦而加灰錫則事布而不事縷服雖輕而衰在內竊意練衣之升當如功衰加灰事布當如錫有緣與裏當如衣衰則無緣與裏故比功衰則輕功衰卒哭所受比麻衣則重大祥麻衣麻衣吉服也情文之殺義當然也諸侯之喪慈母公子為其母皆無服使不可純凶而占筮除喪不當受弔昔之人皆變用練冠以從事則練冠者非正服明矣惟鄭氏功衰為既練之後功衰自是卒哭所受六升之服正服大功七升則六升成布所可為功不可皆為練服案大功降服七升正八升義九升為父既練衰七升故曰功衰若葬卒哭止受以成布六升不得名功衰首絰除矣七升之冠六升之衰皆易而練矣屨而繩矣所不變者要絰與杖而已蓋天地已易四時已變哀亦不可無節故從而多變也馬氏睎孟曰哀痛至甚則耳無聞目無見也而哀殺則能有聞矣故又為角瑱以充之餘論朱子曰菅屨疏屨今不可考今略以輕重推之斬衰用今草鞋齊衰用麻鞋可也麻鞋今卒伍所著者吳氏澄曰衣自肩上直垂至下為從袖自衣側旁逹左右為橫居喪之裘其橫袖短則左右盡處不露見於外練後漸文則橫長其袖與吉裘同前裘雖有裼但裼衣之正身而不至袖練後則裼衣掩至袖口可也案裘以輕為美鹿大麑小是鹿裘粗而麑裘精也雖居喪冬必鹿裘禦寒以保身也至練就此稍加飾焉有殯聞逺兄弟之喪雖緦必往非兄弟雖鄰不往所識其兄弟不同居者皆弔正義鄭氏康成曰雖緦必往親骨肉也雖鄰不往疏無親也就其家弔之成恩舊也皇氏侃曰所識其兄弟不同居者皆弔此别更起文不連有殯之事孔氏頴逹曰此論哭弔之事所識謂非兄弟又非疏外平生知識往來今若身死其兄弟雖不同居亦就往弔之以死者與我有恩舊也兄弟不同居尚往弔之則死者子孫就弔可知舉疏以見親也方氏慤曰緦最服之輕者服之輕猶必往况其重者乎同姓之恩隆也鄰最居之近者居之近猶不往况其逺者乎異姓之恩殺也存異皇氏侃曰所識者謂識其死者之兄弟是小功以下之親既識兄弟雖不同居者皆一一就弔之案三年之喪不弔正謂不弔鄉鄰非兄弟之喪亦不往也雜記三年之喪雖功衰不弔如有服而將往哭之則服其服而往此經云雖緦必往正謂服其緦而往也又子張死曽子有母之喪齊衰而往哭之曰我弔也與哉蓋謂哭死而非弔生也則有殯不可弔所識之喪矣當以皇氏不連有殯為是至所識當指死者皇氏謂識死者之兄弟則未然天子之棺四重水兕革棺被之其厚三寸杝棺一梓棺二四者皆周棺束縮二衡三衽每束一柏棺以端長六尺重直龍反被皮寄反厚胡豆反杝羊支反梓音子衽而審反正義鄭氏康成曰尚深邃也諸公三重諸侯再重大夫一重士不重孔疏天子四重上公三重去水牛餘兕杝屬大棺侯伯子男再重又去兕餘杝屬大棺大夫一重又去杝餘屬大也棺也士不重又去屬惟單用大棺水兕革棺謂以水牛兕牛之革為棺被革各厚三寸孔疏水兕二皮並不能厚三寸故合被之令厚三寸合六寸也此為一重杝棺所謂椑棺也爾雅曰椴杝也孔疏此為二重梓棺二謂屬與大棺也孔疏屬三重大棺四重凡五物周匝也凡棺用能濕之物衡亦當為橫衽今小要衽或作漆或作髹孔疏小要其形兩頭廣中央小陳氏澔曰如今之銀則子不言何物其亦木乎以端題湊其方蓋一尺孔疏天子椁材每段長六尺而方一尺天子以下庶人以上鄭注喪大記具之知其方一尺者以庶人四寸之棺五寸之椁椁厚於棺一寸君大棺八寸君謂諸侯則天子之棺或當九寸其椁厚一尺也椁材並皆從下壘至上始為題湊湊鄉也言木之頭相鄉而作四阿也孔氏頴逹曰此論天子以下棺椁厚薄長短之事天子大棺厚八寸屬六寸椑四寸又二皮六寸合二尺四寸上公去水牛之三寸合二尺一寸諸侯又去兕牛之三寸合一尺八寸列國上卿又除椑之四寸合一尺四寸大夫大棺六寸屬四寸合一尺士則不重但大棺六寸故庶人四寸矣二皮能濕故最在裏近尸杝亦能濕故次皮諸侯無革則杝親尸杝棺之外又有屬棺屬棺之外又有大棺大棺與屬棺並用梓故云梓棺二也四者皆周者謂四重之棺上下四方皆周匝也惟椁不周下有茵上有抗席故也古棺木無釘故用皮束合之縱束者用二行橫束者三行衽每束一者棺不用釘先鑿棺邊及兩頭合際處作坎形以小要連之令固棺束並相對每束之處以一行之衽連之若豎束之處則豎著其衽以連棺蓋及底木使與棺頭尾之材相固也天子椁用柏諸侯松大夫柏士雜木鄭注方相職云天子椁柏黃腸為裏胡氏銓曰以柏木黃心纍於棺外謂之黃腸而表以石焉端猶頭也積柏材作椁並葺材頭故曰以端陳氏澔曰衣之縫合處曰衽以小要連合棺與蓋之際故亦名衽陸氏佃曰此不數椁故曰四重案椁材天子大夫同而諸侯異者於近别嫌也天子之哭諸侯也爵辨絰䊷衣或曰使有司哭之為之不以樂食䊷一作緇一作純同側其反正義鄭氏康成曰天子服士之祭服以哭之明為變也胡氏銓曰諸侯薨在國天子遙哭之故服士服周禮王弔諸侯辨絰緦衰天子至尊不見尸柩不弔服麻不加於采此言絰衍字也時人間有辨絰因云之爾使有司哭之非也哀戚之事不可虛不以樂食蓋在殯斂之間孔疏鄭以意斷不用樂之期也孔氏頴逹曰此論天子哭諸侯之事遙哭之故不服緦衰而服爵辨䊷衣為之不以樂食此是記者之言非復或人之説也天子食有樂今哭諸侯故食不復奏樂陳氏澔曰諸侯薨而赴於天子天子哭之方氏慤曰爵辨其色如爵䊷衣音緇以其色如之通論陸氏佃曰禮記無韋辨周官無爵辨韋辨即爵辨也周官無綦辨尚書無皮辨綦辨即皮辨也綦辨爵辨言色韋辨皮辨言物案春官司服天子為諸侯緦服此記以為爵辨䊷衣先儒皆以遙哭言之豈臨喪則弔服遙哭不弔服邪五服之國天子多不能臨喪則為諸侯緦衰服於何時乎蓋純絲也緦言細如絲則䊷服即緦衰也服問公為卿大夫錫衰以居出亦如之則天子為諸侯緦衰以居出亦如之矣特當事辨絰不當事但辨而不絰耳春秋王室卑則時且有辨而哭者故記者因記之又春官司服疏君為臣弔服既葬除之諸侯五月而葬王使人會葬則未葬以前皆不以樂食也春秋諸侯之葬或渴或慢則葬期未可必故鄭注殯斂之間言蓋以疑之孔謂鄭以意斷則未確可知已天子之殯也菆塗龍輴以椁加斧於椁上畢塗屋天子之禮也菆才官反輴勑倫反正義鄭氏康成曰菆木以周龍輴如椁而塗之天子殯以輴車畫轅為龍斧謂之黼白黑文也以刺繡於縿幕加椁以覆棺已乃屋其上盡塗之孔氏頴逹曰此論菆塗為古天子殯法也菆叢也謂用木叢棺而四面塗之故云菆塗龍輴殯時用輴車載柩而畫轅為龍也以椁者題湊菆木象椁之形也斧謂繡覆棺之衣為斧文也先菆四面為椁使上與棺齊而上猶開也以棺衣從椁上入覆於棺故云加斧於椁上也畢盡也斧覆既竟又四注為屋以覆於上而下四面盡塗之陳氏澔曰案菆塗龍輴是輴車亦在殯中非脫去輴車而殯棺也吳氏澄曰菆木以周龍輴即所謂椁也鄭氏謂之如椁者釋此椁字所以名為椁之義蓋椁猶郭也外城周於內城者為郭故外棺周於內棺者亦名為椁其義如外城之郭也案此節以菆塗龍輴以椁為句以如也葬時有椁此殯時叢木亦如之下又詳其法言四旁叢木與椁平乃於棺上加斧幬覆於棺上叢木皆題湊中髙四周卑如此既畢而後塗之則成屋之四注矣唯天子之喪有别姓而哭别彼列反正義鄭氏康成曰使諸侯同姓異姓庶姓相從而為位别於朝覲來時朝覲爵同同位孔疏朝覲爵同同位則不分别同姓異姓然覲禮諸侯受舍於廟同姓西面異姓東面者覲禮先公而後侯先侯而後伯是亦爵同同位但就同姓之中先爵尊爾孔氏頴逹曰此論哭天子之事鄭注周禮云異姓謂王昏姻甥舅庶姓謂與王無親者案周之宗盟異姓為後故哭同姓先異姓後庶姓則尤後也若諸侯則子入卿大夫序入而哭不分同異姓矣魯哀公誄孔丘曰天不遺耆老莫相豫位焉嗚呼哀哉尼父誄力軌反耆巨支反相息亮反父音甫正義鄭氏康成曰誄其行以為諡也莫無也相佐也言孔子死無佐助我處位者孔氏頴逹曰此論哀公誄孔子之事孔子以哀公十六年夏四月己丑卒天不遺耆老以下誄辭也遺置也耆老謂孔子也嗚呼哀哉傷痛之辭也父字也丈夫之美稱也陸氏佃曰據左傳所録公誄之曰旻天不弔不憖遺一老俾屏余一人以在位不修春秋之辭也今記修之如此朱子曰誄者哀死而述其行之辭陳氏澔曰稱孔丘者君臣之辭姚氏舜牧曰生不能宗其道於其死也誄之其亦所謂虛辭也與存疑鄭氏康成曰尼父因其字以為之諡孔氏頴逹曰尼諡也案説見戰乘丘且諡法無尼國亡大縣邑公卿大夫士皆厭冠哭於大廟三日君不舉或曰君舉而哭於后土厭于葉反大音泰正義鄭氏康成曰軍敗失地以喪歸也厭冠今喪冠其服未聞后土社也孔氏頴逹曰此論人君為國致憂之事公孤也國既失地是諸侯無德所招故諸臣皆著喪冠而哭於君之太廟三日失地為先祖所哀故在廟也臣既於廟三日哭故君亦三日不舉樂又有或者言亦舉樂而自於社中哭之社主土故也庾氏蔚之曰舉謂舉饌周禮膳夫王日一舉案王制云天子食日舉以樂辨正應氏鏞曰哭於大廟者傷祖宗基業之虧損哭於后土者傷土地封疆之朘削也不舉自貶損也曰君舉者非也案周禮大司馬若師不功則厭而奉主車鄭注厭喪冠也左傳秦伯素服郊次鄉師而哭則哭之服其素服與孔子惡野哭者惡烏路反正義鄭氏康成曰為其變衆周禮銜枚氏掌禁􅑧呼歎嗚於國中者行歌哭於國中之道者張子曰有服者之喪不哭諸家而哭於野是惡凶事也所知自當哭於野又若奔喪者安得不哭於道存異孔氏頴逹曰哭非其地謂之野方氏慤曰子蒲卒哭者呼滅子皋曰若是野哉孔子之所惡者以其如此故家語之文連言之辨正陳氏澔曰哭所知於野必設位而帷之以成禮此或郊野之際道路之間哭非其地又且倉卒行之使人疑駭故惡之也孔氏方氏説恐未然未仕者不敢稅人如稅人則以父兄之命稅始鋭反又吐外反正義鄭氏康成曰不專家財也稅謂遺於人孔氏頴逹曰此論人子之法稅人謂已仕者也雖得遺人亦必當稱父兄以將之陳氏澔曰未仕者身未尊顯故內則不可專家財外則不可私恩惠也或有情義之所不得已而當遺者則稱尊者之命而行之案孔陳二説對舉乃備故並存之士備入而后朝夕踊正義鄭氏康成曰備猶盡也國君之喪嫌主人哭入則踊孔氏頴逹曰此論君喪羣臣朝夕哭踊之事嗣君雖先入即位哭必待諸臣皆入列位畢後乃俱踊也士卑最後故舉士入為畢也所入有前後孝子哀深故前入踊必相視以為節故俟齊也案士喪禮朝夕哭門外主人後即位而先入門哭然後賔以次入其踊則又以徹者奠者之升降為節是士入後然後徹與奠以為踊節也祥而縞是月禫徙月樂縞古老反禫大感反樂音嶽正義鄭氏康成曰縞冠素紕也徙月樂言禫明月可以用樂孔氏頴逹曰祥大祥也縞冠素紕大祥日著之故小記云除成喪者其祭朝服縞冠既禫徙月而樂作禮之正也方氏慤曰玊藻縞冠素紕既祥之冠是月禫徙月樂者魯人朝祥而莫歌孔子以為踰月則其善者以此君於士有賜帟帟音亦正義鄭氏康成曰帟幕之小者所以承塵賜之則張於殯上大夫以上幕人職供焉孔氏頴逹曰賜恩賜也士惟有君恩賜之乃得有帟也案天官幕人大喪共帷幕幄帟綬鄭謂在旁曰帷在上曰幕帟在幕及幄中坐上承塵幄帟皆以繒為之大喪王禮故帷幕帟具供若士則苐有帷喪大記所謂塗上帷之是也帟則惟賜而後有之蓋與夷槃賜冰同欽定禮記義疏卷十一
