body:
  text: 禮器第十之二禮也者猶體也體不備君子謂之不成人設之不當猶不備也禮有大有小有顯有微大者不可損小者不可益顯者不可掩微者不可大也故經禮三百曲禮三千其致一也未有入室而不由户者當丁浪反正義鄭氏康成曰禮猶體謂若人身體致之言至也一謂誠也孔氏穎達曰此論因上禮之有稱故此以下廣明三代之禮皆由誠信乃合也人之身體髮膚骨肉筋脈備足乃謂成人若不備便不為成人也禮有大者謂有大及多為貴也有小者謂有小及少為貴也有顯者謂有髙及文為貴也有微者謂有素及下為貴也大小顯微各隨其體而設禮不得不當也行禮皆須至誠猶入室須由戶室猶禮戶猶誠也馬氏睎孟曰經禮者曲禮之總曲禮者經禮之别陳氏澔曰體人身也先王經制大備如人體之全具矣若行禮者設施或有不當亦與不備同也大者損之小者益之掩其顯著其微是不當也存疑鄭氏康成曰經禮謂周禮周禮六篇其官有三百六十曲猶事也事禮謂今禮禮篇多亡本數未聞辨正朱子曰禮儀三百便是儀禮中士冠諸侯冠天子冠禮之類此是大節有三百條如始加再加三加又如坐如尸立如齊之類皆是其中小目吕與叔云經便是常行底緯便是變底恐不然經中自有常有變緯中亦自有常有變君子之於禮也有所竭情盡慎致其敬而誠若有美而文而誠若正義鄭氏康成曰竭情盡慎謂以少小下素為貴也美而文謂以多大髙文為貴也存疑鄭氏康成曰若順也辨正陳氏澔曰若語辭案有美而文則所易於不足者誠耳上句兼言敬此句専言誠重禮本也蓋非慎其獨何以能樂其發非有忠信禮之本何以能行義理禮之文哉故此篇似廣言義理禮之文而意實注重忠信禮之本也君子之於禮也有直而行也有曲而殺也有經而等也有順而討也有摲而播也有推而進也有放而文也有放而不致也有順而托也殺去聲摲所監反又所覽反芟也放方往反下有放必放同不致本或作不至托之石反正義鄭氏康成曰直而行若始死哭踊無節也孔疏直順己之天性而行敬方氏慤曰若凶事不詔至無文皆是曲而殺若父在為母期也方氏曰若君燕不以卿為賓亦是經而等若天子下至士庶人為父母三年孔疏經常也天子至士庶尊卑有異而服其父母貴賤同一方氏曰男昏女嫁亦是討猶去也順而討若天子以十二公以九侯伯以七子男以五為節孔疏順序而稍去之摲之言芟也謂芟殺有所與也摲而播若祭者貴賤皆有所得不使虛也孔疏謂君祭而臣助祭下至胞翟悉有所得推而進若王者之後得用天子之禮方氏曰若兄弟之子猶子亦是放而文若天子之服象日月以至黼黻放而不致若諸侯自山龍以下孔疏放法而不至極順而托若君沐粱大夫沐稷士沐粱孔疏士卑不嫌是拾君之禮而用之孔氏親達曰此經廣明禮意不同播布也放法也存異項氏安世曰此章凡九條皆以反對為文獨經而等無反對者則外八條皆變而不同即此一條之反對也順而討自與順而托為對討去也托取也順而去謂自下而上每等減去以去為順此以多為貴者也順而取謂自上而下每等取加以加為順此以少為貴者也三代之禮一也民共由之或素或青夏造殷因正義鄭氏康成曰一也者俱趨誠也言所尚雖異禮則相因耳孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也孔氏穎達曰此廣明三代損益不同方氏慤曰三代之禮所異者迹所同者道故曰民共由之迹之相變雖或有異道之相因未始不同故其言如此存疑鄭氏康成曰素謂殷尚白青謂夏尚黑秦趙髙變亂名實以青為黑黑為黃今語猶存王氏肅曰舜尚青方氏慤曰青言文素言質天地之文始於春質始於秋周坐尸詔侑武方其禮亦然其道一也夏立尸而卒祭殷坐尸周旅酬六尸曾子曰周禮其猶醵與侑音又鄭云或作囿陸云或作宥武鄭讀無醵其庶反又其約反與音餘正義鄭氏康成曰武當為無聲之誤也方猶常也告尸行節勸尸飲食無常若孝子就養無方孔疏宗廟之中禮主於孝若子事父母此亦周所因於殷也夏禮尸有事乃坐殷無事猶坐周旅酬使之相酌也后稷之尸發爵不受旅合錢飲酒為醵孔疏曽子引世事證周禮旅酬旅酬相酌似之也孔疏凡斂錢飲酒必令平遍與次序旅酬相似王居明堂禮仲秋乃命國醵孔氏穎達曰此論三代尸禮不同殷人坐尸周因坐之詔告也侑勸也其禮亦然者謂周禮坐尸及詔侑無方之禮皆因於殷禮故云亦然其用至誠之道一也夏禮質言尸是人人不可久坐神坐故惟飲食時暫坐非飲食則尸倚立以至祭竟也殷因夏禮而損其不坐之禮益為常坐之法周又因殷而益之更相次序以酬也旅酬六尸謂祫祭時聚羣廟之主於大祖后稷廟中次序以酬也大祫多主惟云六尸者毁廟無尸但有主也存疑孔氏穎達曰據特牲少牢詔侑皆祝謂人有方自確據周禮大祝下大夫二人上士四人小祝中士八人下士十六人謂凡祝皆得詔侑不定一人陸氏佃曰案周九廟而旅酬六尸則旅酬蓋言成康之世而文武親未盡猶在七廟之數蓋以時祭何必大祫案無方言詔侑之無有定所非謂勸侑之人不定一人也又案書言七世之廟可以觀德禮王制言天子七廟祭法言王立七廟諸經無言九廟者蓋大祖廟一居中其昭穆功德廟二親廟四親廟遞遷惟功德二廟不毁故曰七世之廟可以觀德不聞曰七廟之外可以觀德如劉歆九廟之說也又鄭氏述逸禘祫禮云禘祫昭穆各用一尸蓋時祫大祖不與旅酬故惟旅酬六尸即大禘祫羣祧咸在而羣祧總統於文武之二尸則亦惟旅酬六尸是六尸時祫大祫一也趙匡謂大禘四親廟尸不與加所自出一尸則當四尸牛𢎞謂大祫加先公二尸先王二尸則十一尸於經皆無據君子曰禮之近人情者非其至者也郊血大饗腥三獻爓一獻孰爓似廉反正義鄭氏康成曰近人情者䙝而逺之者敬郊祭天也一獻祭羣小祀也孔疏大宗伯祭羣小祀則𤣥冕宜一獻也爓沈肉於湯也血腥爓孰逺近備古今也孔疏血為逺腥次之爓稍近孰最近逺者為古近者為今一祭之中兼有此事故云備古今也尊者先逺差降而下至小祀孰而已孔氏穎達曰此論禮以尊逺為敬近人情為䙝近人情者若一獻孰飲食也既近人情非是敬之至極血於人最逺故郊薦血以為極敬也腥生肉去人情稍近爓更漸近孰最䙝近矣通論皇氏侃曰此據設之先後郊則先設血後設腥與爓孰其祭天皆然大饗之時血與腥同時俱薦當朝事迎尸於户外薦血腥也其宗廟之祭皆然三獻之祭血腥與爓一時同薦凡薦爓之時皆在薦腥之後但社稷五祀初祭降神之時已埋血宗伯之文是也至正祭薦爓之時又薦血此文是也若羣小祀之屬唯有薦孰無血腥爓也以其神卑故耳先薦者設之在前後進者設之居後孔氏穎達曰凡郊與大饗三獻之屬正祭之時皆有血有腥有爓有孰此云郊血是郊有血也宗伯云以血祭祭社稷五祀是三獻有血也楚語云禘郊則有全蒸是祭天有孰也有孰則有腥可知也宗伯云以肆獻祼饗先王是大饗有腥有孰也此云三獻爓宗伯云以血祭祭社稷五祀既有血有爓明有腥有孰可知也沈氏括曰腥爓以鬼道接之饋食以人道接之餘論黃氏裳曰君子事其尊而逺者以意為主事其卑而近者以物為主以禋祀祀昊天上帝以我之意達之物之形氣不足與焉以實柴祀日月星辰以槱燎祀司中司命飌師雨師以血祭祭社稷五祀五嶽則以物之氣達之以貍沈祭山林川澤以疈辜祭四方百物則以物之形達之形氣之中先王誠意之所寓故足以致焉然則自孰至血其去人情逺矣泰壇之設羔羊之裘未孕之牲陶匏之器無文也無情也無味也用血而已豈禮之至哉以寄其敬而已故必定之以七日之戒齊之以三日之宿不御色不聼樂不飲酒不茹葷眂滌濯涖玉鬯省牲鑊奉玉齍贊幣爵告時告備告純告潔以誠其意而乃可交於神也存疑鄭氏康成曰大饗祫祭先王也孔疏案宗伯以肆獻祼饗先王以下宗廟之祭凡有六饗此云大饗饗中最大故為祫也此大饗之文在郊血之下故知非大饗帝也祭社稷五祀者以冕服差之司服祀四望山川則毳冕毳冕子男之服子男五獻以下差之也祭社稷五祀則希冕宜三獻也案周禮追饗禘也朝饗祫也禘重於祫鄭云祫大禘小非也又三獻當作祭山林川澤如貍沈之祭是也若社稷五祀與五嶽同為血祭則不止於三獻矣注謂三獻為祭社稷五祀亦非是故君子之於禮也非作而致其情也此有由始也是故七介以相見也不然則已慤三辭三讓而至不然則已蹙故魯人將有事於上帝必先有事於頖宫晉人將有事於河必先有事於惡池齊人將有事於泰山必先有事於配林三月繫七日戒三日宿慎之至也故禮有擯詔樂有相步溫之至也蹙本又作戚字子六反又音促頖或作泮音判鄭云或作郊宫惡音呼惡池即滹沱秦或作大相息亮反溫紆運反正義鄭氏康成曰作猶起也已猶甚也慤蹙願貌大願則辭不見情無由至也上帝周所郊祀之帝也魯以周公之故得郊祀上帝與周同先有事於頖宫告后稷也孔疏魯人無后稷之廟今將祭天先於頖宫告后稷也告之者將以配天先仁也孔疏謂將欲以后稷配天先以仁恩存偶之也頖宫郊之學也詩所謂頖宫也字或為郊宫孔疏周人立大學於東郊則天子魯侯立大學於公宫東也小學在郊詩云思樂泮水薄采其藻則魯以小學為頖宫頖宫在郊惡當為呼聲之誤也呼池嘔夷並州川孔疏此夏官職方之文由案在今山西繁畤縣東直𨽻入海配林林名案在今山東萊蕪縣繫繫牲於牢也孔疏充人云祀五帝則繫於牢芻之三月戒散齊也宿致齊也孔疏祭義曰散齊七日致齊三日鄭注儀禮云宿是又戒宿之言肅肅敬之義也將有祭祀之事必先敬慎如此不敢切也擯詔告道賓主者也詔或為紹孔氏穎達曰君子行禮非私意専輒徒起而致己情皆法天地之道陳七介以相見申賓主之情也司儀賓至大門外陳擯介交擯三辭畢君迎賓拜辱至大門三揖三讓入大門主君每門讓賓三辭是三辭三讓若不為此則大急蹙情無由達也方氏慤曰賓主相接而後禮行瞽相相資而後樂作則緩而不迫和而無乖故曰溫之至也黃氏震曰慤謂大質蹙謂太遽徐氏師曾曰相見始於介至廟始於辭讓祭始於先牲始於繫是即所謂由始云者非如舊說由始於古後世守而行之也案禮不貴近人情則行禮者可以為我情在於斯遂起而直致之乎蓋禮之始本於天制於聖原與人之俗情相逺如賓主相見必有介以道之又辭讓而後進不然則過慤而野過蹙而躁而情反無以致矣惡池配林河岱之從祀也擯以道儀詔以達意相以治亂歌之終步以見方舞之始祭不直告所祭而先告其所配此慎之至溫如柔色以溫之之溫擯詔有左右之勤相步協始終之節此溫之至總未有直致其情者存疑鄭氏康成曰相步扶工也案相謂治亂以相步謂三步見方注似未確存異鄭氏康成曰敬非己情也所以下彼有由始有所法也案禮出於人心自有之敬鄭謂敬非己情非是禮也者反本修古不忘其初者也故凶事不詔朝事以樂醴酒之用𤣥酒之尚割刀之用鸞刀之貴莞簟之安而槀鞂之設是故先王之制禮也必有主也故可述而多學也鸞力端反莞音官一音九簟徒㸃反槀亦作藁古老反鞂秸同正義鄭氏康成曰哭泣由中非由人也孔疏孝子親喪痛由心發故啼號哭泣不待外告而哀自至是反其孝性之本心也朝廷養賢以樂樂之也孔疏朝廷是養老之地為賢所樂故臣入門必縣興奏樂之事是反其樂朝廷之本心也二者反本也穗去實曰鞂禹貢三百里納鞂服𤣥酒三者修古也主謂本與古述而多學以本與古求之而已孔氏穎達曰此節論禮之所設反本反其本性修古修習於古由其反本修古故不忘其初本謂心也醴酒五齊第二酒也𤣥酒水也割刀今之刀鸞刀古刀也陳氏澔曰鸞鈴也刀鐶有鈴故名鸞刀割肉欲中其音節郊特牲云聲和而後斷也今刀便利古刀遲緩莞簟今之席詩云下莞上簟乃安斯寢言其精細可以安人槀鞂除穗粒取稈槀為郊席四時祭祀有醴酒之美而陳尊在𤣥酒之下宗廟不用今刀而用古刀郊祭不用莞簟之可安而設稿鞂之粗席是皆修古也方氏慤曰逐末之流而不知其所反從今之便而不能有所修則先王之禮意亡矣本者末之初古者今之初反之修之則不忘之故也本末一物欲追還之故曰反古今異時必有損益故曰修夫少則得多則惑以其有主則雖多不惑故可述而多學也案檀弓之記凶事言相者多而此云不詔何蓋孝子之哀痛迫切原發於至性也此一章兼內外統古今見禮有其初不可忘也君子曰無節於內者觀物弗之察矣欲察物而不由禮弗之得矣故作事不以禮弗之敬矣出言不以禮弗之信矣故曰禮也者物之致也正義鄭氏康成曰致之言至也極也孔氏穎達曰此明作事云為非禮不可內猶心也察分辨也方氏慤曰節者即物自然而為之制者也用是以觀物則萬物之情可見矣苟無節於內則所存乎已者未定何恃而觀彼哉禮者體物以致節者也由禮乃能得物之情陳氏澔曰無節於內言胸中不能通達禮之節文也觀物弗之察言雖見行禮之事不能審其得失也劉氏曰致謂極至也萬物由之各遂其性各正其命之謂也存疑鄭氏康成曰節猶驗也孔疏外欲觀察萬物必先內有識驗之明心內無明則外不能分辨而心不由禮則察物不能得也案天地惟有精微之德故能發揚以詡萬物外心由內心出也禮也者聖人以大中至正之心體天地盈虛消息之理而有以曲成萬物者也故察物必以禮察之乃能得不然不能察物則作事不合物理之宜而人不敬出言不合物理之宜而人不信故曰禮者物理之極致君子先慎其獨心乃有節於內而觀物察鄭賈以驗訓節未確是故昔先王之制禮也因其財物而致其義焉爾故作大事必順天時為朝夕必放於日月為髙必因丘陵為下必因川澤是故天時雨澤君子達亹亹焉朝音潮放上聲亹亹亡非反徐音尾勉勉貌正義鄭氏康成曰大事祭祀也孔疏左𫝊國之大事在祀與戎春秋𫝊曰啓蟄而郊孔疏建寅之月蟄蟲啓户郊祭天也龍見而雩孔疏建己之月龍星昏見雩祭天求雨也始殺而嘗孔疏建酉之月隂氣始殺嘗祭宗廟閉蟄而蒸孔疏建亥之月蒸祭宗廟日出東方孔疏為朝謂天子春分之日朝日於東門之外月生西方孔疏為夕謂秋分之夕夕月於西門之外冬至祭天於圜丘夏至祭地於方澤君子愛物見天雨澤皆勉勉勸樂孔疏天地感祭而降雨澤天子樂之所以與天地合德亹亹勉勉也應氏鏞曰大事不止於祀若動大衆興大役必順寒暑之時而為之節為朝夕若日出而作日夕而息必因其有晝夜之經而為之限為髙若築臺觀為下若蓄陂池必因其有高下之勢而始用其力天時雨澤蓋陽和融液仁德流行出於天運之自然而不容止也君子感之仁孝愛敬之心發於中而達於外者亦勉勉而不容己焉感之而敬天則雷出地奮必達其殷薦之誠感之而思親則雨露既濡必達其怵惕之心以至經綸於雲雷之屯宴樂於雲天之需財成輔相於天地交泰之時赦過宥罪於雷雨作解之日皆所以達其亹亹也存疑鄭氏康成曰達猶皆也孔氏穎達曰為髙冬至祭皇天大帝於圜丘之上為下夏至祭崑崙之神於方澤之中案物各適用之謂材孟子有達財者財與材同禮為物之致故先王制禮必因所用之物而推極其義得物理之宜而後行之故凡作大事必順天道之本然與時宜之適然如為朝夕必因日月出沒之時為高下必因山澤崇卑之勢二句舉以例其餘凡府事之修和皆在其內鄭専以祭祀言應氏又推而廣之二者必相兼乃備也又注疏天降雨澤說是矣或云君子由禮故其事之所達如時雨之化物之生長亹亹不已焉其說亦得備一義附存之至皇天大帝及崑崙之神本緯書之言諸儒咸非之前卷已詳又案此一節即天時有生地理有宜之意惟察物乃能用物也是故昔先王尚有德尊有道任有能舉賢而置之聚衆而誓之正義鄭氏康成曰古者將有大事必選賢誓衆重事也孔氏穎達曰先王貴尚有德之人尊崇有道之士任使有能之衆至將祭之時選舉賢能置之祭位則射以擇士是也又聚集其衆而誓戒之其有不恭則服大刑是也朱氏申曰賢謂有德有道者置用也衆謂有能者誓戒也案上節以作事明因物之道此又以用人明因物之道德如知仁聖義中和道如孝友睦姻任恤能如禮樂射御書數平時既尊禮而信任及將祭又舉此賢者而置之助祭之列又聚衆執事而誓之人官有能此亦其一耳是故因天事天因地事地因名山升中於天因吉土以饗帝於郊升中於天而鳯凰降龜龍假饗帝於郊而風雨節寒暑時是故聖人南面而立而天下大治假音格至也治直吏反正義鄭氏康成曰天髙因髙者以事地下因下者以事也名猶大也升上也中猶成也謂巡狩至於方嶽燔柴祭天告以諸侯之成功也馬氏睎孟曰升中心之誠於天案王者以安天下為心諸侯之功即王者安民之心也吉土王者所卜而居之土也饗帝於郊以四時所兆祭於四郊者也鳯凰降龜龍假者功成而太平隂陽和而致象物風雨節寒暑時者五帝主五行五行之氣和而庶徴得其序也孔疏尚書八曰庶徵庶衆也徴驗也五行之氣各有所主得失皆有其驗南面立者視朝熊氏安生曰自其自然而言謂之天自其主宰而言謂之帝唯聖人為能祀天享帝所謂先天而天弗違後天而奉天時於此概見彭氏絲曰鳯凰飛故言降龜龍潛故言假風雨不可過故言節寒暑不可忒故言時存異鄭氏康成曰升中孝經說曰封乎泰山考績燔燎禪乎梁甫刻石紀號孔氏穎達曰因天事天因地事地是圜丘方澤前不言感應者以未太平之時未能感應此太平之後致祥瑞可知名山謂封禪也太平乃封禪未太平時巡守而已又曰升中唯泰山為之餘嶽則否五行木為雨金為暘火為燠水為寒土為風辨正陳氏澔曰舜典柴岱宗即其禮後世封禪之說皆鄭氏祖緯書誤之案孔氏第見言封禪者動以泰山梁甫為說故謂唯泰山為之不知虞書巡守之禮自柴望而下東西南朔皆同也又洪範以水火木金土為序而配以雨𤾉燠寒風此乃以木金火水土配五庶徴蓋五行家悖經之說不足訓也天道至教聖人至德廟堂之上罍尊在阼犧尊在西廟堂之下縣鼓在西應鼓在東君在阼夫人在房大明生於東月生於西此隂陽之分夫婦之位也君西酌犧象夫人東酌罍尊禮交動乎上樂交應乎下和之至也罍音雷犧舊素何反今如字下同縣音元應應對之應分抉問反正義鄭氏康成曰首二句目下事也犧尊縣鼓俱在西禮樂之器尊西也孔疏犧尊貴於罍尊縣鼓大於應鼓而皆在西是尊西也小鼓謂之應犧周禮作獻君在阼人君尊東也天子諸侯有左右房孔疏知天子諸侯有左右房者以士喪禮主婦髽於室在主人西喪大記君之喪婦人髽帶麻於房中亦當在男子之西故彼注亦云則西房也又顧命云天子有左右房此云夫人在房又云夫人東酌罍尊是西房也故云有左右房大明日也西酌犧象象日出東方而西行也東酌罍尊象月出西方而東行案月出當作月生比字誤也周禮曰春祠夏禴祼用雞彞鳥彞皆有舟其朝踐用兩獻尊其再獻用兩象尊皆有罍諸臣之所酢孔疏引此見王禮與此夫人東酌罍尊不同和之至言禮樂交乃和也孔氏穎達曰此明天道用教以示人聖人則放之以為德故君立於阼以象日夫人在西房以象月天垂日月示人以至極而為之教聖人法天之至極而為德大射稱建鼓案建者以木貫鼓而樹之跗此云縣鼓案縣者懸於虡業大射應鼓在大鼓之旁案在旁以擊之便此與大鼓别縣謂祭與射别也罍尊夫人所酌此謂諸侯時祭所用之禮若天子之祭則罍尊在堂下故禮運云澄酒在下司尊彞云皆有罍諸臣之所酢則君不酌罍也禮交動乎上者謂君與夫人酌獻之禮交相動於堂上也樂交應乎下者謂縣鼓應鼓相應在於堂下堂之上下禮樂交相應會和諧之至極也方氏慤曰日月皆有明日本明月受日而明本明則大也月生於西揚雄所謂載魄於西是也犧象謂犧尊象尊也前言尊而不言象後言象而不言尊互相備也案月生於西謂三日哉生明月正在西嗣後每日昏見漸轉而東至望乃正東也存疑孔氏穎達曰卿大夫以下唯有東房故鄉飲酒鄉射尊於房戶間賔主夾之無西房也辨正朱子曰案聘禮賔館于大夫士君使卿還玉于館也賔退負右房則大夫士亦有右房右房西房也禮也者反其所自生樂也者樂其所自成是故先王之制禮也以節事修樂以道志故觀其禮樂而治亂可知也蘧伯玉曰君子之人達故觀其器而知其工之巧觀其發而知其人之知故曰君子慎其所以與人者道音導蘧其居反知音智正義鄭氏康成曰自由也制禮者本已所由得民心也孔疏若舜元由紹堯之功得民心制禮之時還本得民心之事而制禮也作樂者緣民所樂於己之功也舜之民樂其紹堯而作大韶湯武之民樂其濩伐而作濩武制禮以節事動反本也孔疏動皆反本修古而以禮接之修樂以道志勸之善也觀其禮樂則知治亂亂者必禮慢而樂淫也蘧伯玉衛大夫名瑗觀器而巧可知觀發而人可知禮樂亦猶是也慎所以與人將以是觀治亂也孔氏穎達曰前經明禮樂相交此經更論先王制禮樂以節事道志化民治下也禮據王業之初故云所自生樂據王業之末故云所自成初用此禮以得民心故用民心之義以節事宜用此樂以成王業故修正其樂以勸道已志使行之不倦若能以禮節事以樂道志則國治不爾則國亂故治亂可知也下又譬喻之觀器善則知工巧器惡則知工拙觀人發而皆中則知有知發而不中則知無知禮樂猶是也禮正而樂和則知其國治禮慢而樂淫則知其國亂也禮樂者與人相接之具君子治國謹慎其所以與人相接者將以是觀也馬氏睎孟曰禮所以約人之外故以節事樂所以和人之內故以道志然禮未嘗不在內記曰禮節民心樂未嘗不在外記曰樂和民聲合而言之則禮樂之情同也陳氏澔曰萬物本乎天人本乎祖禮主於報本反始不忘其所由生也王者功成治定然後作樂以文德定天下者樂文德之成以武功定天下者樂武功之成節事為人事之儀則也道志宣其湮鬱也君子致慎以其所關者大也故曰蓋古有是言而記者稱之耳方氏慤曰治亂生於志而發於事禮者事之所寓樂者志之所寓故觀其禮樂而治亂可知君子之人達言達於道也以道觀物故知其工之巧以道觀人故知其人之知通論張子曰禮别異不忘本而後能推本為之節文樂統同樂吾分而已案一代之禮樂各有所自生各有所自成其始也皆人心之自然與補救之當然然其後又不能無弊弊則亂生君子慎之酌其中以補偏救弊使有治無亂而已鄭孔於其字說甚分明大廟之內敬矣君親牽牲大夫贊幣而從君親制祭夫人薦盎君親割牲夫人薦酒卿大夫從君命婦從夫人洞洞乎其敬也屬屬乎其忠也勿勿乎其欲其饗之也納牲詔於庭血毛詔於室羮定詔於堂三詔皆不同位蓋道求而未之得也設祭於堂為祊乎外故曰於彼乎於此乎大音泰從去聲盎烏浪反洞音慟屬音竹祊百彭反正義鄭氏康成曰納牲於庭時也當用幣告神而殺牲故君牽牲大夫以幣從也親制祭謂朝事進血膋時孔疏郊特牲取膟膋燔燎升首報陽也又祭義取膟膋之後又爓祭祭腥則膟膋所用在腥爓之前故知血膋是朝事時也所制者制肝以祭於室及主孔疏郊特牲云詔祝於室是也親割謂進牲孰體時勿勿猶勉勉也肉謂之羮孔疏爾雅釋器文道猶言也設祭之饌於堂人君禮焉孔疏特牲少牢皆設在奧此言在堂故知人君禮也為祊乎外明日之繹祭也謂之祊者於廟門之旁因名焉孔疏釋宮文廟門謂之祊其祭之禮既設祭於室而事尸於堂孝子求神非一處也周禮曰夏后氏世室門堂三之二室三之一孔疏引周禮證廟門之旁有室有堂詩頌絲衣曰自堂徂基孔疏引詩證繹祭在堂事尸也於彼於此不知神之所在也孔氏穎達曰此一節論侯伯子男祭宗廟之事祼鬯既訖君出廟迎牲牽牲而納於庭大夫則贊佐執幣而從也殺牲既畢進血腥之時君斷制牲肝祭神於室夫人薦盎齊以獻之卿大夫從君謂制祭割牲之時命婦從夫人謂薦盎酒時洞洞質慤貌屬屬専一貌中心勉勉乎欲望神之歆饗也詔告也牲入在庭以幣告神於庭殺牲取血及毛入以告神於室羮肉湇也定孰肉也謂羮肉既孰將迎尸主入室乃先以俎盛之告神於堂是薦敦未食之前也三詔不同位者蓋求而未得故於三處告之也設祭謂薦腥爓之時設此所薦於堂繹祭在廟門外之西於彼乎於此乎古語有此記者引以結之方氏慤曰朝事以神事之故制祭以腥而薦以齊饋食以人事之故割牲以孰而薦以酒然君以盎齊饋食而夫人用之於朝踐君以酒獻尸而夫人用之於饋食者禮殺於君故也牲自外至故詔於庭血毛告幽全故詔於室室比庭為幽也羮定則事以人道神明之堂比室為明也未之得特疑其如此而已設祭於堂言正祭時為祊乎外言索祭時謂之祊者祝祭求神以此為所在之方故也馬氏睎孟曰祭必夫婦親之所以備外內之官也官備則具備是故牽牲至薦酒皆夫婦身親涖之存疑孔氏穎達曰侯伯子男朝踐君不獻故夫人薦盎親割牲謂薦孰時君亦不獻故夫人薦酒案孔氏因記言夫人不言君故以君不獻言之據祭統尸飲五疏謂侯伯七獻朝踐饋食各一獻食畢酳尸三獻合二灌而七子男五獻惟二灌及酳尸三獻此記兩言夫人適合侯伯一獻之數故疏為此說此無論一獻之說於經無據即使禮應一獻亦止當君獻而夫人不獻豈有君不獻而夫人獨獻之理况記特大概言之又何所據而斷為侯伯且據彼疏子男并無朝踐饋食之獻烏得合侯伯子男為說耶存異周氏諝曰先王制禮莫詳於别嫌祭祀賔客之事而君與夫人共行事於羣執事之中可乎周官之法后不與事則宗伯攝行此篇所謂君在阼夫人在房君制祭夫人薦盎之類豈非攝行者乎案事神備外內之官則君與夫人致祭禮也周初去古風俗人心尚淳故祭不嫌然王后有三夫人世婦以下以備內官夫人亦有世婦以下以備內官非卿大夫為后夫人執事也至後世而諸侯相饗廢夫人之禮矣然廟祭未嘗廢夫人之禮也周官所云攝后夫人有故耳一獻質三獻文五獻察七獻神正義方氏慤曰傳曰名位不同禮亦異數禮有隆殺故數有多寡此獻所以有一三五七之異也四望山川地道故言察先公人道故言神惡其䙝故也存疑鄭氏康成曰一獻祭羣小祀也三獻祭社稷五祀也五獻祭四望山川也七獻祭先公也孔氏穎達曰羣小祀最卑其禮質略社稷五祀稍尊比羣小祀禮儀為文飾四望山川其神既尊神靈明察先公之廟禮又轉尊神靈尊重也案周禮司服職𤣥冕一章祭羣小祀希冕三章祭社稷五祀毳冕五章祀四望山川鷩冕七章享先公故鄭知獻數亦然也陳氏祥道曰社稷之所主止於利人故服粉米以稱之辨正陳氏祥道曰周禮大祀次祀小祀見於肆師大祭中祭小祭見於酒正大宗伯所辨天地五帝先王之類大祀也社稷五祀五嶽之類中祀也四方百物之類小祀也大祀獻多小祀獻寡則社稷所獻宜加於山川也先王祭服各有象數則希冕三章以祭社稷者非卑之於山川以獻數不繫於服章也賔客之禮士一獻卿大夫三獻子男五獻侯伯七獻上公九獻而王饗諸侯自子男五獻以至諸侯長十有再獻皆服鷩冕七章而巳孰謂獻數必繫於服章哉鄭氏以三獻為祭社稷五祀五獻為祭四望山川誤矣一獻孰則於人情為近故曰質三獻爓知於人情漸遠故曰文三獻爓則五獻其血乎禮所謂血祭社稷是也案此節總以起下大饗其所謂獻數亦泛舉之耳鄭必求其神以實之鑿矣中庸言上祀先公以天子之禮無緣於先公止七獻也五嶽視三公安知非九獻四瀆視諸侯安知非七獻而必曰四望山川五獻與獻數之不繫於章服陳氏之辨晰焉而社稷五祀之為五獻於禮雖無明文以大宗伯地示之祭考之則社稷五祀與五嶽同為血祭其不止於三獻可知辨正巳見前一獻孰節又案司服職衮冕九章鷩冕七章毳冕五章以饗先王先公及四望山川差次而下皆自文而漸趨於質也社稷為土榖之神則彌近質矣故祭社稷以希冕三章陳氏謂其所主止於利人故服粉米以稱之殊未確大饗其王事與三牲魚臘四海九州之美味也籩豆之薦四時之和氣也內金示和也束帛加璧尊德也龜為前列先知也金次之見情也丹漆絲纊竹箭與衆共財也其餘無常貨各以其國之所有則致逺物也其出也肆夏而送之蓋重禮也事與之與音餘臘音昔內音納見賢遍反纊音曠綿也肆注作陔古來反今如字正義鄭氏康成曰三牲魚臘籩豆之薦此諸侯所獻內金內之庭實先設之金從革性和荆揚二州貢金三品孔疏金三品禹貢文束帛加璧貢享所執致命者君子於玉比德焉孔疏鄭知行享之時所執覲禮文也龜知事情者陳於庭在前荆州納錫大龜又荆州貢金金照物故云見情金有兩義先入後設孔疏內金示和是先入陳在龜後是後設故鄭云兩義也丹漆絲纊竹箭萬民皆有此物荆州貢丹兖州貢漆絲豫州貢纊揚州貢篠簜孔疏荆州四句皆禹貢文其餘謂九州之外夷服鎮服蕃服之國周禮九州之外謂蕃國世一見各以其所貴寶為贄其出也謂諸侯之賔禮畢而出作樂以節之肆夏當為陔夏孔疏大司樂之文大饗諸侯則諸侯出入奏肆夏此經是助祭之後無算爵禮畢客醉而出宜奏陔夏故燕禮大射賔出奏陔夏明不失禮也孔氏穎達曰此明天子大饗諸侯各貢其方物奉助祭之禮諸侯雖有夾祭不可致九州之物唯王者乃然故云其王事與周氏諝曰備四海九州之美味者示其得四海九州之歡心也薦四時之和氣者示其能贊於天地也方氏慤曰司服以九章之衮冕享先王則大饗為九獻矣三牲牛羊豕也魚臘薧魚也三牲魚臘天産也天産所以作隂德故曰美味蓋味為隂也籩豆之薦地産也地産所以作陽德故曰和氣蓋氣為陽也陳氏祥道曰帛隂物也君子所以示財璧陽物也君子所以比德定天下之吉凶成天下之亹亹莫大乎蓍龜此龜為前列其先知者也柔而能順溫而能和者金也此金次之所以見情也存疑鄭氏康成曰大饗謂盛其饌與貢祫祭先王也孔疏以有三牲魚臘則非祭天以內金和庭實又非饗賔享賔時無此庭實故也知非朝而貢者以朝而貢物不名大饗孝經云四海之內各以其職來祭故知是祫也案說見前大饗腥下案此所重在合萬國之歡故惟舉賔出言也祀帝於郊敬之至也宗廟之祭仁之至也喪禮忠之至也備服器仁之至也賔客之用幣義之至也故君子欲觀仁義之道禮其本也正義鄭氏康成曰祀帝於郊就而祭之不敢致也仁恩也父子主恩也喪禮謂泣踊袒襲備服器謂小斂大斂之衣服葬之明器欲觀仁義之道禮其本者言禮有節於內可以觀也孔氏穎達曰此總明祭祀喪賔客之等天尊彌逺祭之宜極盡於敬宗廟主親祭之必極盡於仁愛君子欲觀其人行仁義之道必須用禮為其本若行合於禮則有仁義也不言忠敬者舉仁義則忠敬可知也方氏慤曰君子無所不用其敬然祭莫重於天故為敬之至無所不用其仁然孝莫大於寧神故為仁之至馬氏睎孟曰喪主乎哀先王為之禮而盡心於死者三日而斂凡附於身者必誠必信三月而葬凡附於棺者必誠必信故曰忠之至也賔客之交必以幣表記所謂無辭不相接無禮不相見皆禮之所宜故為義之至禮生於仁義而曰欲觀仁義之道禮其本者宗廟之祭禮也仁在其中賔客之用幣亦禮也義在其中陳氏澔曰祭天之禮簡素至敬無文所以為敬之至仁之實事親是也事亡如事存所以為仁之至朝聘燕享幣有常用故幣帛篚筐將其厚意義之至也存異鄭氏康成曰用幣謂來賻賵彭氏絲曰備服與器凡祭皆然不獨喪禮案首二句言祭禮次二句言喪禮末句言賔禮彭氏絲以備服器總承郊廟喪則郊用陶匏器有不備不如鄭注指喪為當而鄭以用幣亦粘喪禮則又不如馬氏陳氏泛以賔禮言為允也此章廣言用物之宜以盡義理禮之文之說而末一節則欲人由禮之文以深探其本也君子曰甘受和白受采忠信之人可以學禮苟無忠信之人則禮不虛道是以得其人之為貴也和户卧反正義鄭氏康成曰道猶由也從也孔氏穎達曰前言觀仁義之道禮為其本此明學禮之人須有忠信甘為衆味之本不偏主一味故得受五味之和白是五色之本不偏主一色故得受五色之采舉此二物喻忠信之人可以學禮也蓋質素為本不有雜行故可以學禮其人即忠信之人也陳氏澔曰人無忠信則每事虛僞禮不可以虛僞行案前既廣言義理禮之文此一章復歸本忠信見必本立而文乃行也孔子曰誦詩三百不足以一獻一獻之禮不足以大饗大饗之禮不足以大旅大旅具矣不足以饗帝毋輕議禮正義鄭氏康成曰誦詩三百喻習多言而不學禮也大旅祭五帝饗帝祭天毋輕議禮謂若誦詩者不可以强言禮孔氏穎達曰一獻祭羣小祀不學禮則不能行大旅是總祭五帝天人道隔其禮轉難大旅又不如郊為祭天之備典瑞云四圭有邸祀天旅上帝是祀天重於旅帝徐氏師曾曰周禮國有大故則旅上帝及四望是旅以祈取衆之義不若南郊饗帝之専也存疑孔氏頴達曰大饗謂祫祭宗廟其禮又繁案一獻質三獻文至大饗王事極文之至然足以大饗不足以大旅至大旅具文質之中然猶不足以饗帝而饗帝則又用質也文為貴乎質為貴乎議禮者可輕乎引此以深明義理禮之文忠信禮之本缺一不可而自微而巨必盡義理之文反本歸源尤重忠信之本也或謂鄭注樂記一獻士飲酒禮孔引大行人謂獻數依命數天子諸侯之士同一獻又昏義舅姑饗婦以一獻之禮又左傳鄭伯享趙孟趙孟欲一獻則一獻不専羣小祀仲尼燕居曰大饗有四其下所陳兩君相見禮則大饗不専祫祭先王書曰荆岐既旅蔡蒙旅平九山刊旅論語季氏旅於泰山皆祭山川則旅非祭五帝以相難然本篇前有一獻質至大饗其王事之文此下與饗帝相接則此獻饗斷以祭祀言不當以賔禮汨而亂之也又書論語言旅不言大此亦分大饗與饗帝為二則又安得以旅混大旅以大饗混饗帝乎子路為季氏宰季氏祭逮暗而祭日不足繼之以燭雖有強力之容肅敬之心皆倦怠矣有司跛倚以臨祭其為不敬大矣他日祭子路與室事交乎戶堂事交乎階質明而始行事晏朝而退孔子聞之曰誰謂由也而不知禮乎跛彼義反與音預朝音潮正義鄭氏康成曰宰治邑吏也案此當是家臣之長季氏祭謂舊時也倦怠以其久也偏任為跛依物為倚室事祭時堂事儐尸孔氏穎達曰前經既明禮之為重故記者引子路能行禮之事逮及也室事謂正祭之時事尸在室外人將饌至户內人於户受饌設於尸前相交承接在於户也堂事正祭後儐尸之時事尸於堂堂下之人送饌至階堂上之人於階受取是交乎階也質正也晏晚也正明始行事朝正向晚禮畢而退言敬而能速也許其知禮者禮從宜寧略而敬不可煩而怠也陳氏澔曰暗昧爽以前也方氏慤曰子路雖不必合於先王之文然知禮之意且能救時之弊孔子所以善之存異方氏慤曰室事若毛血詔於室之類堂事若羮定詔於堂之類執事者內外異位乃以內而交乎外上下異等乃以上而交乎下則尤易為力矣宜乎質明而行晏朝而退也案大夫正祭惟事尸於室至儐尸乃於堂故凡禮所云坐尸於堂設祭於堂羮定詔於堂皆人君正祭禮而方氏乃援以釋此堂事交乎階混甚宋元諸儒說禮多類此故存其說而辨之案子路忠信人也故以此結之通篇以大備盛德起以子路知禮終見所貴乎禮者以義理禮之文足以釋去回邪而增益其忠信之美質耳非以繁文喪其忠信之質更以僭濫入於回邪也用意深逺欽定禮記義疏卷三十五
