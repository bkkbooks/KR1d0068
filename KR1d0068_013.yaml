body:
  text: 檀弓下第四之二穆公問於子思曰為舊君反服古與子思曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若將加諸膝退人若將隊諸淵毋為戎首不亦善乎又何反服之禮之有為舊君於偽反與音餘膝音悉隊又作墜直愧反正義鄭氏康成曰為舊君反服謂仕焉而已者穆公魯哀公之曾孫孔疏世本哀公生悼公寧寧生元公嘉嘉生穆公不衍案穆公名顯蓋不衍即顯字二合聲也子思言放逐之臣不服舊君也為兵主來攻伐曰戎首孔氏頴逹曰此論不為舊君著服之事反服實亦兼三諫未絶及有故出在他國者故下子思云古之君子進人以禮退人以禮是也通論孔氏穎逹曰案喪服齊衰三月章為舊君凡三條其一云為舊君及君之母妻傳曰仕焉而已者也注云謂老若有廢疾而致仕者兼服其母妻其二大夫在外其妻及長子為舊國君注云在外待放巳去者傳云妻言與民同也長子言未去也此則大夫不為服惟妻與長子為舊君耳其三為舊君注云大夫待放未去者傳曰大夫去君掃其宗廟言其以道去君而猶未絶也注云以道去君謂三諌不從者言爵祿尚有列於朝出入有詔於國若已絶則不服也鄭注此言仕焉而已者止取喪服第一條為正耳然則去仕他國已絶之後不服舊君而雜記違諸侯之大夫不反服則違諸侯之諸侯得為舊君服者蓋謂不便其居或辟寇讐不得在國者如孟子對齊宣王為舊君反服正與雜記同也鄭注放逐之臣放則宣元年晉放其大夫胥甲父於衛是也逐者春秋諸侯大夫言出奔是也陳氏祥道曰義起於情之所及而不起於情之所不及禮生於義之所加而不生於義之所不加故因情以為義而義所以行情因義以為禮而禮所以行義人臣之去國有為舊君之服者有不為舊君之服者凡視情與義何如耳姚氏舜牧曰戎首寇讐之意子思孟子皆有激乎言之欲其君之反悟也君使臣以禮進退之間誠不可不盡其道案儀禮喪服為舊君齊衰三月此疏所引以道去君而未絶説即子夏傳也曰以道去曰未絶則此外原有不為之服者但非為臣者所可藉口也悼公之喪季昭子問於孟敬子曰為君何食敬子曰食粥天下之逹禮也吾三臣者之不能居公室也四方莫不聞矣勉而為瘠則吾能毋乃使人疑夫不以情居瘠者乎哉我則食食瘠在益反夫音扶食食上如字下音嗣正義鄭氏康成曰昭子康子曾孫名強敬子武伯之子名捷敬子言鄰國皆知吾等不能居公室以臣禮事君也三臣謂仲孫叔孫季孫氏存時不盡忠喪又不盡禮非也孔子曰喪事不敢不勉胡氏銓曰勉而為瘠言中心無哀戚之實而外貌勉強為毁瘠也情實也陳氏澔曰敬子言我三家不能居公室以臣禮事君四方皆知之矣勉強食粥為毁瘠之貌我雖能之然豈不使人疑我非以哀戚之真情而處此瘠乎不若違禮而食食也吳氏澄曰禮父母之喪三日後食粥卒哭始疏食事君方喪三年蓋嘗與喪父母同故曰食粥天下之逹禮也食食不食粥非也禮小祥則飯素食案敬子此語似深憤季氏平日之不臣而其言之悖抑甚矣宜曾子以出辭氣斯逺鄙倍深戒之哉衛司徒敬子死子夏弔焉主人未小斂絰而往子遊弔焉主人既小斂子遊出絰反哭子夏曰聞之也與曰聞諸夫子主人未改服則不絰正義鄭氏康成曰司徒官氏案官氏以官為氏也公子許之後皆以朋友之禮往而二人異孔氏穎逹曰此論朋友相弔必候主人改服乃絰之事知是朋友者凡弔者主人成服則客乃服弔絰今主人始小斂未成服而已便出著絰故知有緦之恩隨主人變如五服親又與前子遊裼裘弔朋友同也凡弔笄絰環絰之屬此雖不云帶凡單云絰則知有帶也如為師二三子皆絰而出及朋友羣居則絰皆是包帶之文陳氏澔曰主人未小斂則弔者未改服子夏絰而往非也子遊則中於禮矣案士喪禮小斂奉尸侇於堂主人即位踊襲絰於序東是小斂改服也弔者以之為節曾子曰晏子可謂知禮也已恭敬之有焉有若曰晏子一狐裘三十年遣車一乘及墓而反國君七個遣車七乘大夫五個遣車五乘晏子焉知禮曾子曰國無道君子恥盈禮焉國奢則示之以儉國儉則示之以禮遣棄戰反乘繩證反個古賀反焉知焉於虔反正義鄭氏康成曰禮者敬而已矣有若以其大儉逼下非之及墓而反言其既窆則歸孔疏知既窆者晏子雖為儉約不應柩未入壙則歸故云既窆也不留賔客有事也孔疏既夕禮乃窆主人哭踊無算襲贈用製幣拜稽顙踊如𥘉卒袒拜賔賔出則拜送藏器加見藏以苞筲加抗席抗木實土主人拜鄉人乃反哭今晏子既窆贈幣拜稽顙踊訖則還不復拜賔及送賔之事此皆是儉失禮人臣賜車馬者乃得有遣車孔疏案士喪禮無遣車諸侯之士一命而曲禮云三賜不及車馬故諸侯之士無遣車個謂所􅊶遣奠牲體之數也雜記曰遣車視牢具曾子言時齊方奢矯之是也孔氏穎逹曰此論晏子故為非禮以矯齊之事狐裘貴在輕新而晏子一裘三十年其父晏桓子是大夫諸侯之大夫雖未三命以其位尊得有遣車五乘而晏子止以一乘葬其父有子更舉國君大夫正禮以證之七個五個謂以牲體折為七段五段以七乘五乘遣車載之也葉氏夢得曰君子言行應乎時猶權衡之應物也齊之奢久矣晏子示以儉蓋應時也吳氏澄曰大夫遣車五乘者所藏多費時久實土晚則反哭遲今晏子止用遣車一乘及墓藏之其禮簡費時不多實土早則反哭早也又曰曾子言禮之本故以其恭敬而謂之知禮有子言禮之文故以其儉不中禮而謂之焉知禮二子之言皆是也然曾子前云恭敬則許其知禮後云示儉則不許其為禮曾子之言未嘗偏也陳氏澔曰曾子以禮以恭敬為本有若以狐裘三十年儉於己也遣車一乘儉其親也禮窆後有拜賔送賔等禮窆訖即歸儉於賔也三者皆儉而失禮大夫以上皆大牢士少牢個􅊶也凡􅊶牲皆取下體每一牲取三體前脛折取臂臑後脛折取骼少牢二牲則六體分為三個大牢三牲則九體大夫九體分為十五段三段為一􅊶凡五􅊶諸侯分為二十一段凡七􅊶天子分為二十七段凡九􅊶每遣車一乘則載一􅊶也案孔疏謂諸侯七􅊶每􅊶七個以九體分四十九假大夫五􅊶每􅊶五個以九體分二十一假與此説異但據本文七個七乘五個五乘似陳即以􅊶為個得之或􅊶中分假如孔説耳曾子主權有子主經是以二端之論不合存疑鄭氏康成曰遣車之差大夫五諸侯七則天子九諸侯不以命數喪數略也孔氏頴逹曰案大行人上公九乘侯伯七乘子男五乘今總云五乘故云喪數略案遣車之數服虔云天子十二上公九侯伯七子男五各如命數鄭云喪禮質略不以命數天子九諸侯七大夫五士三諸侯之大夫士與天子之太夫士同案喪禮復之人襲之衣皆以命數且雜記明言遣車視牢具周禮餼饔牢腥牢飪牢皆以命數遣車視此非以命數而何國昭子之母死問於子張曰葬及墓男子婦人安位子張曰司徒敬子之喪夫子相男子西鄉婦人東鄉曰噫毋曰我喪也斯沾爾專之賔為賔焉主為主焉婦人從男子皆西鄉相息亮反鄉許亮反噫一作意同于其反毋音無斯音賜沾依注音覘敕亷反正義鄭氏康成曰國昭子齊大夫夫子孔子也西鄉東鄉夾羡道為位也噫不寤之聲毋禁止辭孔疏昭子不悟禮意禁止子張斯盡也沾讀曰覘視也國昭子自謂齊之大家有事人盡視之孔疏昭子言當更别為禮欲人觀之法其所為也専猶同也案専訓同雖不若陳説之自然亦得備一義並存之時子張相同西鄉非也孔氏穎逹曰此論葬之在壙男女面位之事方氏慤曰禮之辨異尤重於男女之際雖喪紀憂遽之中亦莫不各正其位焉故自始死以至於葬男子則西鄉而位乎東婦人則東鄉而位乎西司徒敬子之喪夫子為相固嘗行之矣而國昭子徒為賔主之辨曾無男女之别則其失禮也不已甚乎陳氏澔曰昭子葬其母以子張相禮故問之禮主人男子皆西鄉婦人皆東鄉而男賔在衆主人之南女賔在衆婦之南禮也昭子聞子張之言歎息而止之言我為大夫齊之顯家今行喪禮人必盡來覘視當有所更改以示人豈宜一循舊禮爾當専主其事使賔自為賔主自為主可也於是昭子家婦人既與男子同居主位而西鄉而女賔亦與男賔同居賔位而東鄉矣此記禮之變穆伯之喪敬薑晝哭文伯之喪晝夜哭孔子曰知禮矣文伯之喪敬薑據其牀而不哭曰昔者吾有斯子也吾以將為賢人也吾未嘗以就公室今及其死也朋友諸臣未有出涕者而內人皆行哭失聲斯子也必多曠於禮矣夫夫音扶正義鄭氏康成曰喪夫不夜哭嫌私情勝也以為賢人蓋見其有才藝也未嘗就公室言未嘗與到公室觀其行也季氏魯之宗卿敬薑有會見之禮內人妻妾也孔氏頴達曰此論喪夫不夜哭并母知子賢愚之事曠猶疏薄也言此子平生必疏薄於朋友賔客故未有感戀出涕者上云晝夜哭此不哭者謂暫時也家語云文伯歜卒其妻妾皆行哭失聲敬薑戒之曰吾聞好外者士死之好內者女死之今吾子早夭吾惡其以好內聞也二三婦供祭祀者無加服孔子聞之曰女智莫若婦公父氏之婦知禮矣方氏慤曰經曰寡婦不夜哭遠嫌之道不得不然曠言虛其道而不行行哭者行哭泣之時也陳氏澔曰哭夫以禮哭子以情皆中節矣故孔子美之季康子之母死陳褻衣敬薑曰婦人不飾不敢見舅姑將有四方之賔來褻衣何為陳於斯命徹之正義鄭氏康成曰褻衣非上服陳之將以斂也敬薑言四方之賔嚴於舅姑敬薑者康子從祖母孔疏案世本悼子紇生平子意如意如生桓子斯斯生康子肥世本又云悼子紇生穆伯靖靖與意如是親兄弟意如是康子祖穆伯是康子祖之兄弟敬薑是穆伯之妻故云康子從祖母也秦氏繼宗曰陳褻衣蓋未襲斂之時不飾謂衣褻衣也婦人生時必飾而後見舅姑今喪則有四方之賔來安可以褻衣見故命徹之案士喪襲斂陳衣褖衣散衣俱非上服此褻衣當在褖衣散衣之外禮所不當陳者故敬薑斥之耳有子與子遊立見孺子慕者有子謂子遊曰豫一不知夫喪之踊也豫欲去之久矣情在於斯其是也夫子遊曰禮有微情者有以故興物者有直情而徑行者戎狄之道也禮道則不然人喜則斯陶陶斯咏咏斯猶猶斯舞舞斯愠愠斯戚戚斯歎歎斯辟辟斯踊矣品節斯斯之謂禮人死斯惡之矣無能也斯倍之矣是故制絞衾設蔞翣為使人勿惡也始死脯醢之奠將行遣而行之既葬而食之未有見其饗之者也自上世以來未之有舍也為使人勿倍也故子之所刺於禮者亦非禮之訾也去羌呂反徑古定反陶徒刀反咏音詠猶依注作搖音遙愠紆運反辟婢亦反惡烏路反倍音佩絞户交反衾音欽蔞音栁翣所甲反食音嗣舍音捨訾似斯反正義鄭氏康成曰喪之踊猶孺子之號慕也微情謂節哭踊以故興物謂衰絰之制直情徑行謂哭踊無節衣服無制也禮道與夷狄異陶鬱陶也案鬱陶憂之甚而氣不得伸此注誤蓋陶和樂之貌詩君子陶陶咏謳也猶當為搖謂身動搖秦人猶搖聲相近舞謂手舞之愠猶怒也戚憤恚也歎吟息也辟拊心踊躍也舞踊皆有節乃成禮無能謂心之無所復能也絞衾尸之飾蔞翣棺之飾周禮蔞作柳將行將葬也葬有遣奠食反虞之祭也舍猶廢也訾病也孔氏穎逹曰此子遊言制禮有節之事有子言我專一不知夫喪之踊也欲去此踊節直似孺子慕者足矣言孝子之情於此即是何須用哭踊之節微情者微殺也言賢者喪親必致滅性故制使三日而食哭踊有數以殺其內情使之俯就也以故興物者興起也不肖者無哀情故為衰絰使其覩服思哀起情企及也若直肆已情而徑行之無哭踊節制乃是夷狄之道中國禮道不如是也人喜則斯陶以下極言哀樂之本外境會心之謂喜斯語助也陶心初悅而未暢之意情暢則口歌咏之歌咏不足漸至搖動身體乃至起舞足蹈手揚樂之極也外境違心之謂愠愠斯戚者怒來觸心故憤恚起也憤恚轉深因發吟息歎息不泄故至撫心撫心不泄乃至跳踊奮擊哀之極也今若品節此二塗使踊舞有數則能久長故云此之謂禮品階格也節制斷也上明辟踊之節此眀飾喪及奠祭之事人身既死形體腐敗以其恐惡之故制絞衾設蔞翣以飾之欲使人勿惡也以其恐倍之故始死設脯醢之奠至於葬將行又設遣奠而送之既葬反哭設虞祭以食之未曽見死者饗食之然自上世以來未有舍此而不為者為使人勿倍其親故也故子之所譏刺於禮有踊節者亦非禮之病害也𥘉有若止譏踊節子遊既言生者節哀遂説死者加飾備言禮之節制與夷狄不同也吳氏澄曰孺子慕與前之孺子泣同謂真情而無節文也有子以人之哭踊皆其哀慕之真如其情可也有子質厚而禮學疏子遊精於禮學故詳言聖人制禮之意以告之過而不為之限節以減殺之俾直伸其情則或甚哀而至毁滅不及而不示之形迹以興起之俾徑捷而行則或全不哀而反歡嬉此乃戎狄之道也聖人制禮之道則不如此陳氏澔曰一猶常也有子言喪禮之有踊我常不知其何為而然我久欲除去之矣今見孺子之號慕若此則哀情之在於此踊亦如此孺子之慕也夫先王制禮使賢者俯而就之不肖者企而及之慮賢者之過於情也故立為哭踊之節所以殺其情故曰禮有微情者微猶殺也慮不肖者之不及情也故為之興起衰絰之物使之睹服思哀故曰有以故興物者此二者皆制禮者酌人情而為之也若直肆已情徑率行之或哀或不哀漫無制節則是戎狄之道矣中國禮義之道則不如是也太古無禮或以其死而惡之以其無能而倍之聖人制禮之初意止為使人勿惡勿倍而已絞衾以飾其體蔞翣以飾其棺則不見死者之可惡矣始死即為脯醢之奠將葬則有􅊶裹牲體之遣既葬則有虞祭之食何嘗見死者享之然報本反始之思自不能已豈復有倍之之意乎先王制禮深意如此秦氏繼宗曰有子之言乃賢者過之之事子遊則禮之中也存疑孔氏穎逹曰如鄭此禮本凡有九句首末各四正眀哀樂相對中央舞斯愠一句是哀樂相生若舞無節形疲厭倦事與心違所以怒生故曲禮云樂不可極夫喜而不節自陶至舞俄頃而愠生怒而不節從戚至踊踊極則笑故夷狄無禮朝殯夕歌童子任情倐啼歘笑而鄭諸本亦有無舞斯愠一句者鄭又一本云舞斯蹈蹈斯愠凡十句盧本亦有舞斯愠句王本又云人喜則斯循循斯陶與盧鄭不同陸氏德明曰舞斯愠一句并注皆衍文劉氏敞曰案人舞宜樂不宜更愠又不當漸至辟踊此中間有遺文矣蓋本曰人喜則斯陶陶斯咏咏斯猶猶斯舞舞斯蹈矣人悲則斯愠愠斯戚戚斯歎歎斯辟辟斯踊矣自喜而下五變而至蹈自悲而下亦五變而至踊也胡氏銓曰猶若所謂君子蓋猶猶之謂辨正陳氏澔曰舞斯愠一句終是可疑今且據疏劉氏欲於猶斯舞之下增一矣字而刪舞斯愠三字今亦未敢從案本文是論喪之宜有踊而以喜之舞蹈形之斷以悲喜兩開為是舞斯愠句中脫蹈矣人悲則五字耳况鄭他本又有舞斯蹈無舞斯愠為據乎若謂中間一句哀樂相生則此孺子之慕豈因舞蹈之過而來下言絞衾蔞翣豈歌舞羽籥之變必用此邪孔疏添踊則笑相對更支吳侵陳斬祀殺厲師還出竟陳大宰嚭使於師夫差謂行人儀曰是夫也多言盍嘗問焉師必有名人之稱斯師也者則謂之何大宰嚭曰古之侵伐者不斬祀不殺厲不獲二毛今斯師也殺厲與其不謂之殺厲之師與曰反爾地歸爾子則謂之何曰君王討敝邑之罪又矜而赦之師與有無名乎還音旋竟音境大音泰嚭普彼反使色吏反夫差夫音扶差初佳反盍戶臘反與音餘人案洪氏説則兩大宰嚭當作行人儀行儀當作大宰嚭正義鄭氏康成曰吳侵陳以魯哀元年秋孔疏左傳吳子光伐楚使召陳懷公逢滑曰楚未可棄吳未可從懷公不從吳召哀公元年吳克越乃修先君之怨祀神位有屋樹者厲疫病也大宰行人官名也孔疏周禮有大宰卿一人又有大小行人國案春秋吳宋有大宰他無夫差吳子光之子盍何不也嘗猶試也夫差修舊怨庶幾其師有善名也獲謂繫虜之二毛鬢髮班白欲微切之孔疏謂譏切斬祀殺厲故其言似若不審然止言殺厲重人也孔疏若不殺但拘囚之則輕子謂所獲民臣矜而赦之又微勸之終其意孔疏微切之欲吳哀矜又言反地歸子豈無有善名乎是終竟其欲哀矜之意也吳楚僭號稱王吳氏澄曰夫差內行惡事而外欲得善名故令大宰嚭問陳行人謂衆人稱我此行之師其名謂何名之以殺厲之師者欲吳人耻其名之惡而改悔也吳大宰果有反地歸子之言則陳行人乘其好名之心而甘言誘勸之也陳氏澔曰陳善於辭令故能救敗亡之禍存疑孔氏頴逹曰此太宰嚭與吳太宰嚭名號同而人異也辨正洪氏邁曰案嚭乃吳夫差之宰陳遣使者正用行人則儀乃陳臣也記禮者簡䇿差互故更錯其名當云陳行人儀使於師夫差使大宰嚭問之乃善忠宣公作春秋詩引斯事亦嘗辨正云顔丁善居喪始死皇皇焉如有求而弗得及殯望望焉如有從而弗及既葬慨焉如不及其反而息正義鄭氏康成曰顔丁魯人從隨也慨憊貌孔氏穎逹曰此論孝子居喪哀殺有漸之事皇皇猶倣徨如所求物不得上檀弓云始死充充如有窮謂形貌窮屈亦倣徨求而不得之心彼此各舉其一殯後容貌望望焉如有從逐人後行而不及之上檀弓云既殯瞿瞿如有求而不得與此亦同但始死據內心所求殯後據外貌所求也既葬慨焉如不及其反而息者上殯後云從而不及似有可及之理此謂既葬之後中心悲慨如不復可及所以文異也上檀弓云既葬皇皇如有望而不至此謂既葬慨焉如不及亦同也始死皇皇者是皇皇之甚故云如有求而弗得既葬皇皇是輕故云望而不至此既葬則止上檀弓葬後更説練祥故云練而慨然祥而廓然但親之死亡哀悼在心初則為甚已後漸輕皆有求而不得望而不及但所據有淺深耳殯後雖據外貌亦由哀在內心但稍輕耳故鄭注上檀弓云皆哀悼在心之貌方氏慤曰皇皇言心無所依望望言身無所企此淺深之别也反而息言葬反而亡於是為甚心與形俱息也陳氏澔曰始死形可見也既殯柩可見也葬則無所見矣如有從而弗及似有可及之處也葬後則不復如有所從矣故但言如不及其反又云而息者息猶待也不忍決忘其親猶且行且止以待其親之反也蓋葬者往而不反然孝子於迎精而反之時猶如有所疑也彭氏絲曰望望則舒於皇皇慨焉又舒於望望案如不及其反而息似當作一句讀謂既葬而歸在途猶如望親之偕反不及其反而欲息以待之所謂其反也如疑之意子張問曰書云髙宗三年不言言乃歡有諸仲尼曰胡為其不然也古者天子崩王世子聼於冡宰三年正義鄭氏康成曰時人君無行三年之喪禮者子張問有此與怪之也歡喜悅也言乃喜悅則民臣望其長久冢宰天官卿二王事者三年之喪使之聼朝孔氏穎逹曰此論世子遭喪冢宰聼政之事無逸作言乃雍雍歡字相近義得兩通方氏慤曰天子之適子曰太子於天子亦稱世子者則以世天下言之耳故稱王以别之陳氏澔曰言乃歡者命令所布人心喜悅也知悼子卒未葬平公飲酒師曠李調侍鼓鐘杜蕢自外來聞鐘聲曰安在曰在寢杜蕢入寢厯階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之降趨而出平公呼而進之曰蕢曩者爾心或開豫是以不與爾言爾飲曠何也曰子卯不樂知悼子在堂斯其為子卯也大矣曠也大師也不以詔是以飲之也爾飲調何也曰調也君之褻臣也為一飲一食忘君之疾是以飲之也爾飲何也曰蕢也宰夫也非刀匕是共又敢與知防是以飲之也平公曰寡人亦有過焉酌而飲寡人杜蕢洗而揚觶公謂侍者曰如我死則必毋廢斯爵也至于今既畢獻斯揚觶謂之杜舉知音智李調左傳作外嬖嬖叔調如字蕢苦怪反飲於鴆反曩乃黨反樂如宇為於偽反匕必季反共音供與音預防音房觶之豉反字林音支正義鄭氏康成曰悼子晉大夫荀盈案陳澔集説作荀罃誤罃知武子非悼子也魯昭公九年卒平公晉侯彪也侍與君飲也鼓鐘樂作也杜蕢或作屠蒯安在怪之也杜蕢三酌皆罰紂以甲子死桀以乙卯亡孔疏尚書云甲子昧爽至於殷郊又史記云兵敗紂自焚死是紂甲子死也左傳昭十八年二月乙卯周毛得殺毛伯過而代之萇𢎞曰毛得必亡是昆吾稔之日也詩云韋顧既伐昆吾夏桀二者同誅昆吾既乙卯亡明桀亦乙卯被放也案亡亡國也陳澔以為死亦非也王者謂之疾日不以舉樂為吉事所以自戒懼雜記曰君於卿大夫比葬不食肉比卒哭不舉樂是人臣喪重於疾日大師典奏樂詔告也近臣當規君疾憂為一飲一食言調貪飲食褻嬖也防禁放溢也平公聞義則服揚觶舉爵於君也毋廢斯爵欲後世以為戒此爵遂因杜蕢為名皇氏侃曰非刀匕是共非不也杜蕢言各憂其事宰夫不以刀匕是共乃又敢與諫爭越官侵職是以飲也至于今為記之時孔氏頴逹曰此論君有大臣之喪不得有作樂飲酒之事鼓猶奏也調是嬖褻之臣唯貪求一飲一食忘君違禮之疾而不諫是以飲之也謂之杜舉表明此爵實杜蕢所舉也案左傳昭公九年文與此小異聶氏崇義曰三升曰觶陳氏澔曰桀紂異代之君悼子同體之臣故以為大於子卯詔告也罰其不告之罪也至今晉國行燕禮之終必舉此觶秦氏繼宗曰坐跪也通論陳氏祥道曰先王制為喪臣之禮於服則衰絰於膳則不舉於樂則弛縣以至與斂往弔莫不盡禮是以叔弓之卒隱公不與斂仲遂之卒宣公猶繹而萬入君子非之然則悼子之未葬平公飲酒至於鼓鐘其可乎此杜蕢所以升酌而譏之也非杜蕢不能改平公之過於羣臣不言之際非平公不能彰杜蕢之善於後世皆禮之所與也存異鄭氏康成曰飲酒與羣臣飲也燕禮記曰請旅侍臣燕禮賔入門奏肆夏既獻而樂闋獻君亦如之在寢謂燕於寢孔疏賔初入門奏肆夏也燕禮記云燕朝服於寢故知燕於寢禮揚作媵揚舉也媵送也揚近得之孔疏燕禮獻君之後行酬之𥘉媵爵者洗象觶升實之序進坐奠於薦南是舉爵於君也揚媵義得兩通畢獻獻君與賔也案此特偶然飲酒注疏以燕禮言非也燕飲羣臣無二人獨侍之理燕禮賓主獻酢後小臣請媵爵者公命長小臣作下大夫二人媵爵此燕禮之正非因杜蕢揚觶而後有此只晉國君常燕之終耳不必以燕禮附合公叔文子卒其子戌請諡於君曰日月有時將葬矣請所以易其名者君曰昔者衛國凶飢夫子為粥與國之餓者是不亦惠乎昔者衛國有難夫子以其死衛寡人不亦貞乎夫子聼衛國之政修其班制以與四鄰交衛國之社稷不辱不亦文乎故謂夫子貞惠文子粥音祝難乃旦反正義鄭氏康成曰文子衛獻公之孫名拔或作發案世本衛獻公生成子當當生文子拔左傳作公叔發拔字音之似今論語注作公孫枝又拔字之訛也諡者行之迹有時猶言有數也大夫士三月而葬君靈公也衛國有難謂魯昭公二十年盜殺衛侯之兄縶也時齊豹作亂公如死鳥班制謂尊卑之差也後不言貞惠者文足以兼之孔氏穎達曰此論請君誄臣之諡法生存之日君呼其名今死將葬故請所以誄行為之作諡易代其名者按諡法愛民好與曰惠外內用情曰貞道德博聞曰文既有道德則能惠能貞故鄭云文足以兼之方氏慤曰修其班制以與四鄰交非博聞者不能故曰不亦文乎班制者班言上下之序制言多寡之節修其班制故可以與四鄰交衛之社稷得以不辱班制古所有也文子特因其壞而修之耳陳氏澔曰據先後則惠在前論大小則貞為重故不曰惠貞而曰貞惠秦氏繼宗曰修其班制修內之政也與四鄰交修外之政也社稷不辱總承上二項班者列國往來盟會尊卑之班次也以侯國之爵言制者列國用物行禮多寡之數也以朝聘之幣言修班制何等國體燦然交四鄰何等儀則詳明皆由他心中經緯發出來故曰文餘論胡氏銓曰春秋書歸粟譏人臣私惠作福文子不佐其君賑窮而私為粥不可也以死衛君於經傳不見據史鰌勸文子執臣禮則文子嘗不臣矣文子欲葬瑕丘恐不能修班制案古無二諡論語公叔文子子言可以為文未嘗諡貞惠春秋左傳無以二字諡者戰國時周乃有威烈王愼靚王楚有頃襄王秦有孝文王莊襄王一字不足加以二字周之末失也不應此時有以三字諡者又考公子荆字南楚死鳥之難荆衛公以肩受矢後諡曰貞或易名同一時而記者得之傳聞并以屬之文子與文子實無以死衛君事也石駘仲卒無適子有庶子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉石祁子兆衛人以龜為有知也駘大來反適丁厯反正義鄭氏康成曰駘仲衛大夫石碏之族六人莫適立故卜為後者沐浴佩玉則兆言齊潔則得吉兆孔疏掌卜之人謂之也石祁子心正且知禮案祁子衛懿公時人左傳公與石祁子玦曰以此贊國諡法治典不殺曰祁孔氏頴逹曰此論兆龜知賢知之事所以有卜者昭公二十六年左傳云年鈞以德德鈞以卜王不立愛公卿無私居親之喪必衰絰憔悴安有沐浴佩玉者乎言不可方氏慤曰曲禮曰居喪之禮頭有創則沐身有瘍則浴是非有創瘍不可沐浴玉藻曰凡帶必有佩玉惟喪否是非去喪不可佩玉矣沐浴佩玉是忘親忘禮也惟石祁子不忍為之卜者以求吉為主故經以兆言吉也陳氏祥道曰五人者有意於得而不兆祁子無意於得而兆故衛人以龜為有知陳子車死於衛其妻與其家大夫謀以殉葬定而后陳子亢至以告曰夫子疾莫飬於下請以殉葬子亢曰以殉葬非禮也雖然則彼疾當飬者孰若妻與宰得已則吾欲已不得已則吾欲以二子者之為之也於是弗果用亢音剛又苦浪反養羊尚反正義鄭氏康成曰子車齊大夫孔疏左傳昭二十六年及齊師戰於炊鼻魯人將擊子車子亢子車弟孔子弟子下謂地下子亢度諫之不能止以斯言拒之已猶止也果決也孔氏穎逹曰此論殉葬非禮之事子亢既云殉葬非禮也又云妻宰最親當須侍養若得休己不須侍飬吾意欲休己若必須為殉葬則吾欲以妻與宰二子為之陳氏澔曰宰即家大夫也但言非禮未必能止之今以當飬者為當殉則不期止而自止矣方氏慤曰以生者而從之於死則不仁於死者而飬之以生則不知非君子之所當為也子亢以義拒之不亦宜乎子路曰傷哉貧也生無以為飬死無以為禮也孔子曰啜菽飲水盡其歡斯之謂孝斂首足形還葬而無椁稱其財斯之謂禮啜昌劣反斂力檢反還音旋稱尺證反正義鄭氏康成曰還猶疾也謂不及其日月孔氏穎逹曰此論孝子事親稱家有無之事啜菽以菽為粥而啜之吳氏澄曰至貧之家以菽一掬米一二十粒煮湯一盂謂之啜菽飲水更無餘物也速葬無椁材但以衣冠斂首及足形體不露此之謂禮陳氏祥道曰君子之於親飬在志不在體葬在誠不在物苟飬在體不在志則雖三牲不足以為孝在物不在誠則雖醯醢百甕不足以為禮方氏慤曰子路於生曰養於死曰禮則知所謂禮者喪葬之禮孔子變飬言孝主盡其歡言之也盡其歡者存乎情故以孝言稱其財者存乎物故以禮言衛獻公出奔反於衛及郊將班邑於從者而後入栁莊曰如皆守社稷則孰執羈靮而從如皆從則孰守社稷君反其國而有私也毋乃不可乎弗果班從才用反羈音基靮丁厯反正義鄭氏康成曰獻公以魯襄公十四年出奔齊二十六年復歸於衛孔疏事並見左傳欲賞從者以懼居者栁莊言從守若一有私則生怨靮紖也孔疏左傳云獻公使人責太叔儀故鄭知以懼居者孔氏穎逹曰此論衛君歸國不合私賞從者之事方氏慤曰羈以絡馬靮以控馬從君而奔故以執羈靮言之通論陳氏祥道曰楚昭王賞從亡而及於屠羊説晉文公賞從亡而辭見守藏者衛獻公厚從亡而及郊將班邑是皆徇於私而不知公蔽於邇而不知逺也蓋居者守君之社稷行者執君之羈靮勞逸雖殊而功之所施則一其可厚此而薄彼哉此柳莊所以諫獻公也衛有大史曰柳莊寢疾公曰若疾革雖當祭必告公再拜稽首請於尸曰有臣栁莊也者非寡人之臣社稷之臣也聞之死請往不釋服而往遂以襚之與之邑裘氏與縣潘氏書而納諸棺曰世世萬子孫毋變也革本又作急居力反禭音遂縣音元潘普干反正義鄭氏康成曰革急也請於尸急弔賢者也脫祭服以襚臣親賢也所以以此襚之者以其不用襲也孔疏士喪禮君禭衣不用襲為近尸事褻也凡襚以斂孔疏庶禭以小斂君禭以大斂與之邑與縣所以厚賢也裘縣潘邑名孔疏裘氏及縣潘氏二邑也孔氏頴達曰此論君急弔臣之事栁莊寢疾其家以告公報之曰若疾急雖當我祭必須告也其後栁莊果當公祭之時卒而來告公祭事雖了與尸為禮未畢故再拜稽首請於尸也按禮君入廟門全為臣請尸得言寡人者是作記者之言也按士喪禮君使人襚不云祭服今得以祭服襚者諸侯玄冕祭於廟大夫自玄冕以下以俱是玄冕故得襚也黃氏震曰當祭而告疾急則失之遽不釋服而往襚則近乎褻獻公為之君子不以為非者恕其有尊賢之心也餘論吳氏澄曰桞莊惟有諫班邑於從者一事可取他無事實不見其賢否何如其為獻公所親厚安知非以從亡之私愛而然與陳氏澔曰此雖見國君尊賢之意然棄祭事而不終以諸侯之命服而襚大夫書封邑之劵而納諸棺皆非禮矣案曾子問大夫之祭廢者九外喪自齊衰以下皆行以凖君禮則臣既無服其視外喪齊衰何如乃廢祭而往乎據孔疏云祭事已了與尸為禮未畢則繹祭也正祭後又有繹祭繹而賔尸則專與尸為禮孔云祭事已了豈繹祭畢而賔尸故稱寡人且可徹之而往乎陳乾昔寢疾屬其兄弟而命其子尊己曰如我死則必大為我棺使吾二婢子夾我陳乾昔死其子曰以殉葬非禮也况又同棺乎弗果殺乾音干屬之玊反夾古浹反正義鄭氏康成曰婢子妾也尊已不陷父於不義記者善之孔氏穎逹曰此論人病時失禮也尊己乾昔子名兄弟言屬子云命輕重之義也通論陳氏祥道曰成子髙寢疾擇不食之地以自葬孟僖子將死明仲尼之道以教子曾子將死稱君子之道以教人皆治命也魏顆之病欲以妾為殉陳乾昔之病欲以婢夾已此亂命也乾昔之子終不從其亂命過秦康公逺矣仲遂卒于垂壬午猶繹萬入去籥仲尼曰非禮也卿卒不繹繹音亦去羌呂反籥羊灼反正義鄭氏康成曰春秋在宣八年仲遂魯莊公之子東門襄仲先日辛巳有事於大廟而仲遂卒明日而繹非也萬入去籥傳曰去其有聲者廢其無聲者孔疏去其籥舞以吹籥有聲也廢置也留萬舞而不去以萬舞無聲也鄭引宣八年公羊傳文左氏傳曰有事於大廟襄仲卒而繹非禮也其公羊傳曰繹者祭之明日也其言萬入去籥何存心焉爾知其不可而為之猶者何通可以已也孔氏頴逹曰此論卿卒重於繹祭之事吕氏祖謙曰萬舞文武二舞之總名籥舞文舞之别名文舞又謂之羽舞蓋文舞吹籥秉翟也萬入去籥者文武二舞俱入於二舞中去吹籥者方氏慤曰正祭之明日又祭謂之繹繹者如繹絲不絶故也祭禮為吉卿卒為凶正祭不可廢故卿卒不繹而已陳氏澔曰垂齊地名周謂之繹殷謂之肜言壬午則正祭辛巳日也通論陳氏祥道曰春秋之法當祭而卿卒則祭之日不可以用樂祭之明日不可以繹故叔弓之卒昭公去樂卒事君子以為禮仲遂之卒宣公猶繹而萬入去籥君子以為非禮李氏亷曰遂之生不當賜氏而賜氏遂之卒不當繹而繹或進或退一則謹世臣之始一則重大臣之終並行不悖也存異鄭氏康成曰萬干舞也籥籥舞也辨正朱子曰萬者舞之總名武用干戚文用羽籥案左傳考仲子之宮將萬先儒謂婦人之廟不宜獨用武舞是萬兼文武矣左傳楚子元欲蠱文夫人振萬夫人泣曰先君以是舞習戎備也則萬舞又似專為武舞者按諸經言萬惟楚言振萬或楚去羽用干惟有發揚蹈厲之意故加振字以别之而文夫人亦以戎偹為説乎據簡兮詩言萬舞言執籥秉翟則萬舞兼文舞可知季康子之母死公輸若方小斂般請以機封將從之公肩假曰不可夫魯有初公室視豐碑三家視桓楹般爾以人之母嘗巧則豈不得以其母以嘗巧者乎則病者乎噫弗果從般音班封彼驗反碑被皮反噫於其反以鄭作已陳如字其毋鄭讀無吳陳如字又鄭以字句絶吳得字句絶陳通為一句正義鄭氏康成曰公輸若匠師方小言年尚幼未知禮也斂謂下棺於椁般若之族多技巧者見若掌斂事而年尚幼請代之而欲嘗其技巧也時人服般之巧魯有初初謂故事也豐碑斫大木為之形如石碑於椁前後四角樹之孔疏四碑於椁前後及兩旁樹之角落相望非在椁四角也穿中間為鹿盧孔疏鑿木使空中著鹿盧下棺以繞繂孔疏繂即紼也以一頭繫棺緘一頭繞鹿盧訖人各背碑負紼末頭聼鼓聲以漸却行而下棺天子六繂四碑孔疏周禮大喪屬其六引喪大記君四繂二碑故知天子六繂四碑前後各重鹿盧也孔疏以六繂四碑知有一碑兩紼必上下重加鹿盧知惟前後以南北豎長前後用力深也言視豐碑者時公室僭天子也三家前僭諸侯諸侯下天子斫之形如大楹耳孔疏不似碑形故云如大楹通而言亦謂之碑故喪大記云諸侯大夫二碑也四植謂之桓孔疏説文桓亭郵表木今橋旁表柱也諸侯二碑兩柱為一碑而施鹿盧又雙植謂之桓諸侯四繂二碑碑如桓矣大夫二繂二碑士二繂無碑以與已字本同孔疏以已二字本同故得假借而用後世二字之義始異毋無也噫不寤之聲孔疏歎般不曉禮意孔氏穎逹曰此論非禮嘗巧不從之事公輸若之族人公輸般請為轉動機關窆而下棺人將從之時公肩假止而不許曰魯有初始舊禮凡言視者不正相當比擬之辭王制視公侯視伯視子男是也豐大也按禮廟庭有碑故祭義云牲入麗於碑儀禮每云當碑揖按春秋天子有隧以羡道下棺所以用碑者凡天子之葬掘地以為方壙漢書謂之方中先纍椁於其方中南畔為羡道龍輴從羡道而入至方中乃屬紼於棺之緘從上而下棺入於椁之中於此之時用碑繂也嘗試也言般欲以人母嘗試己巧事誰有強逼於汝而為此乎豈不得休己者哉又語之曰其毋以人母嘗試己巧則於汝病者乎言不得嘗巧豈於汝有病公肩假乃更噫而傷歎於是衆人遂止皇氏云僭濫之事於禮猶有所似作機巧非也存疑吳氏澄曰得字句絶上二句責般謂爾以人之母試巧則爾工人之心豈不快足而自得下二句憫季孫謂其母以試爾之巧者彼孝子之心其亦有虧歉而病者矣二者字下俱有乎字疑惑之辭而不質言也案吳説得字斷其母起得下以字無著陳氏澔曰一説則豈不得以其母以嘗巧者乎作一句言爾以他人母試巧而廢其當用之禮則亦豈不得自以己母試巧而不用禮乎則於爾心亦有所病而不安乎蓋使之反諸心以己度人而知其不可也案墨子及國䇿則般乃戰國時人不應康子時已能機封大約此亦傳聞之辭也或曰豐碑文王廟碑桓楹桓宮廟柱戰于郎公叔禺人遇負杖入保者息曰使之雖病也任之雖重也君子不能為謀也士弗能死也不可我則既言矣與其鄰重汪踦往皆死焉魯人欲勿殤重汪踦問於仲尼仲尼曰能執干戈以衛社稷雖欲勿殤也不亦可乎禺音遇又音務重皆當作童字誤也汪烏黃反踦魚綺反正義鄭氏康成曰郎魯近邑哀十一年齊國書帥師伐我是也禺人昭公之子春秋傳曰公叔務人孔疏公叔務人即公為遇見也保縣邑小城見走辟齊師將入保罷倦加其杖頸上兩手掖之休息者使謂時徭役任謂時賦稅君子謂卿大夫魯政既惡復無謀臣士又不能死難禺人耻之欲敵齊師踐其言鄰鄰里也重皆當為童未冠者之稱姓汪名踦鄰或為談案左傳作嬖僮此談字疑有訛春秋傳曰童汪踦魯人見其死君事有士行欲以成人之喪治之言魯人者死君事國為斂葬仲尼善之孔氏頴逹曰此論童子死難之事公叔禺人逢國人走辟齊師困而止息禺人言以徭役使人病困以賦稅責民煩重若上能竭心盡力憂恤在下猶無以負愧今卿大夫不能為謀士又不能致死是自全其身不愛民庶於理不可禺人欲自為致死之事我則既言之矣乃踐其言與鄰之童子汪踦往赴齊師而死依禮童子為殤魯人見其死寇欲勿殤以成人之喪治之意以為疑問於仲尼仲尼報之言其可不為殤也陳氏澔曰禺人遇魯人之辟齊師而入保城邑者疲倦之餘負其杖而息於塗禺人乃歎之曰徭役之煩雖不能堪也稅斂之數雖過於厚也若上之人協心以禦寇難猶可塞責也令卿大夫不能畫謀䇿士不能捐身以死難豈人臣事君之道哉甚不可也我既出此言矣可不思踐吾言乎於是與其鄰之童子汪踦者皆往鬬而死於敵魯人以踦有成人之行欲以成人之喪禮葬之而孔子善其權禮之當也通論陳氏祥道曰使之病任之重則無以安民君子不能為謀士不能死則無以禦敵此公叔禺人所以歎息而言之也君子之於人視其人不視其年年雖壯而無成處之以童可也鄭忽之狡童昭公之童心是也年雖稚而有成處之以成人可也汪踦之勿殤是也案哀公時政在季氏二子離心冉有一子守二子從公之議已不行逮冉子帥師孟氏佐之似乎一室敵車優矣然踰溝者樊遲用矛者冉有執干戈衛社稷者公為及踦而三家之徒無與焉者公為之死殉國也汪踦之死亦以衛社稷也而或謂踦無干戈之責輕身赴敵論過刻矣考左傳戰於郊非郎也孔疏戰郊戰郎為一事是郊頭郎邑也子路去魯謂顔淵曰何以贈我曰吾聞之也去國則哭于墓而後行反其國不哭展墓而入謂子路曰何以處我子路曰吾聞之也過墓則式過祀則下正義鄭氏康成曰贈送也無君事主於孝哭哀去也展省視之處猶安也居者主於敬孔氏穎逹曰此論禮敬祀墓之事過墓謂他家墳壟祀謂神位有屋樹者居無事主於恭敬故或式或下也他墓且式則已墓當下方氏慤曰去則哭墓反則展墓所以存乎愛行者之禮過墓則式過祀則下所以存乎敬居者之禮行故曰贈居故曰處陳氏澔曰哭墓哀墓之無主也不忍丘壟之無主則必有返國之期故為行者言之墓與祀人所易忽也而能加之敬則無往而不用吾敬故為居者言之秦氏繼宗曰所哭之墓謂祖考之墓也所過之墓祀則謂古帝王聖賢忠臣孝子之墓祀及國家之正祀耳古人重别其以孝敬相勉也如此工尹商陽與陳棄疾追吳師及之陳棄疾謂工尹商陽曰王事也子手弓而可手弓子射諸射之斃一人韔弓又及謂之又斃二人每斃一人掩其目止其御曰朝不坐燕不與殺三人亦足以反命矣孔子曰殺人之中又有禮焉射食亦反斃亦作弊婢世反韔勑亮反朝直遙反與音預正義鄭氏康成曰工尹楚官名孔疏楚皆以尹為官名棄疾楚公子棄疾也孔疏楚共王之子後立為平王魯昭八年帥師滅陳縣之楚人善之因號焉孔疏左傳晉叔向云棄疾君陳蔡苦慝不作人皆善之因號為陳棄疾至十二年楚子狩於州來使蕩侯潘子司馬督囂尹午陵尹喜圍徐以懼吳於時有吳師陳或作陵楚人聲也商陽仁不忍殺人棄疾以王事勸之斃仆也韔韜也韔弓不忍復射也掩其目不忍視之也不坐不與然則商陽與御者皆士也兵車參乘射者在左戈盾在右御在中央曰有禮善之也孔氏頴逹曰此論殺人有禮之事陳氏澔曰子手弓而可使之執弓也手弓商陽之弓在手也謂之再告之也掩目而不忍視止御而不忍驅有惻隱之心焉商陽自言位卑禮薄如此亦可以稱塞矣孔子謂其有禮以敗北之師本易窮追而商陽乃能節制其縱殺之心也案事載家語後尚有子路怫然進曰人臣之節當君大事惟力所及死而後已夫子何善此乎孔子曰吾取其有不忍殺人之心而已視此較眀通論孔氏頴逹曰鄭注射者在左戈盾在右御在中央此謂凡戰士也若是元帥則在中央鼓下御者在左戈盾亦在右若天子諸侯親將亦居鼓下故戎右云贊王鼓成二年齊侯親鼓之是也若非元帥則皆在左御者在中若非兵車參乘則尊者在左故曲禮乘君之乘車不敢曠左鄭注云君存惡空其位又月令載耒耜於御與車右之間君在左也陳氏祥道曰大夫於朝則坐於燕則與故其責重士於朝則立於燕則不與故其責輕商陽所殺止於三人者姑以成禮而已存疑鄭氏康成曰朝燕於寢大夫坐於上士立於下孔疏朝之與燕皆在乎寢若路門外正朝則大夫以下皆立若其燕朝在於路寢則大夫坐於上如孔子攝齊升堂是也升堂則坐矣燕亦在寢故燕禮云燕朝服於寢又燕禮獻卿大夫之後西階上獻士無升堂之文是士立於下也案朝雖大夫無坐理周官三朝之儀可考而知也惟三公有坐論之理故商陽言之鄭氏第以朝為燕孔氏又以孔子升堂為坐亦曲説諸侯伐秦曹桓公卒于會諸侯請含使之襲襄公朝于荆康王卒荆人曰必請襲魯人曰非禮也荆人強之巫先拂柩荆人悔之桓依注作宣含胡暗反強其丈反拂芳勿反柩其久反正義鄭氏康成曰魯成十三年曹伯廬卒於師廬諡宣言桓聲之誤也請含以朋友有相啖食之道使之襲非也襲賤者之事朝荆在魯襄公二十八年康王楚子昭也楚言荆者州言之荆請襲欲使襄公衣之荆人欲尊康王故強之巫祝桃茢君臨臣喪之禮孔氏頴逹曰此論諸侯失禮之事荆楚之本號魯莊之世告命皆稱荆至僖元年始稱楚故杜預云荆始改號曰楚吳氏澄曰其時晉霸厲公主兵使諸侯行襲事蓋出於霸令也悔者悔以臣禮強魯君使襲遂致魯君以君禮臨其喪荆自尊而卑魯魯亦自尊而卑荆以報之荆耻於為魯所卑故悔其召辱由己也陳氏祥道曰荆人以人臣之事待襄公襄公則以人君之事臨荆人豈非自尊而卑人者人必卑之自貴而賤人者人必賤之邪秦王屈趙王以缶而有鼓瑟之辱夫差屈句踐於會稽而有姑蘇之恥亦其類也存疑胡氏銓曰春秋書楚子此稱王記禮者誤也又曲禮云夷狄雖大曰子此乃稱王首尾矛盾案禮記非一人所作其矛盾甚多況此篇尤屬傳聞人曰康王則記康王而已左傳自楚武王以後無不稱王者述事與書法原不同也案士喪禮將大斂棺始入此襲時有柩或疑君禮之異非也古人既葬來弔尚請含請襚蓋此時楚子已大斂入棺楚人以襲禮最賤故使魯君行襲禮非真尚未襲而使魯君襲遂疑君禮之有異也滕成公之喪使子叔敬叔弔進書子服惠伯為介及郊為懿伯之忌不入惠伯曰政也不可以叔父之私不將公事遂入介音界正義鄭氏康成曰成公喪在魯昭三年子叔敬叔魯宣公弟叔肸之曾孫叔弓也孔疏世本叔肸生聲伯嬰齊嬰齊生叔老叔老生叔弓進書奉君弔書也惠伯慶父玄孫之子名椒孔疏世本慶父生穆伯敖敖生文伯榖榖生獻子蔑子案蔑為慶父曾孫惠伯是蔑之孫是慶父玄孫之也蔑生莊子速及懿伯别為子服氏疑惠伯椒莊子速之子介副也郊滕之近郊懿伯惠伯之叔父春秋傳曰敬叔不入政君命所為故惠伯強之乃入敬叔於昭穆以懿伯為叔父孔疏此後人傳寫鄭注之誤當云以惠伯為叔父敬叔是桓公七世孫惠伯是桓公六世孫則敬叔呼惠伯為叔父呼懿伯為五從祖孔氏穎逹曰此論不可以私廢公之事存疑鄭氏康成曰忌怨也敬叔有怨於懿伯難惠伯也孔疏敬叔殺懿伯被懿伯家所怨恐惠伯殺已故難惠伯不敢入也然同在君朝今奉使滕國相隨在路不相畏難入滕始難雖有怨讐恆為防備今入滕國是由主人防備不復在已故難之惠伯知其難已遂開釋之今既君命政令奉使滕國不可以叔父私怨遂欲報仇不行公事也孔氏穎逹曰叔是氏子者男子通稱故以子冠叔也方氏慤曰昔孔子對子夏問居昆弟之仇則曰銜君命而使雖遇之不鬭夫叔父之親與昆弟等耳惠伯處之以此豈不宜哉辨正劉氏敞曰左傳注云忌怨也敬叔先有怨於懿伯故不欲入滕以惠伯之言而入傳言叔弓之有禮按左傳云及郊遇懿伯之忌先言及郊而後言忌可見是及郊方遇忌也忌字只是忌日懿伯是敬叔從祖適及滕郊而遇此日故欲緩至次日乃入故惠伯以禮曉之曰公事有公利無私忌乃先入而叔弓亦遂入焉案自鄭以忌為怨亦止言敬叔有怨於懿伯未嘗言殺也孔疏竟言敬叔殺懿伯何所據乎故斷以劉氏忌日之説為確欽定禮記義疏卷十三
