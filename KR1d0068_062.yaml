body:
  text: 祭統第二十五正義孔氏穎達曰鄭目録云名曰祭統者以其記祭祀之本也統猶本也此於别録屬祭祀陳氏祥道曰綱舉而萬紀皆張統先而衆目必振祭統所以始於心怵而終於觀政方氏慤曰祭法非不及義然以法為主祭義非不及法然以義為主祭統則統而論之案統者無所不包無所不貫之義政教之本皆在于祭而祭之道不過心怵而奉之以禮一言盡之誠信忠敬皆心怵之目奉之以物道之以禮安之以樂參之以時皆奉之以禮之目也又遡其前言養言喪見所謂心怵者非僅一時霜露之感言求助言躬耕躬桑及養牲言齊戒見誠信忠敬非一朝一夕之積至祭而三重將之十倫備焉而廟中一天下之象矣所謂無不包無不貫者如此凡治人之道莫急於禮禮有五經莫重於祭夫祭者非物自外至者也自中出生於心也心怵而奉之以禮是故唯賢者能盡祭之義怵敕律反正義鄭氏康成曰禮有五經謂吉禮凶禮賔禮軍禮嘉禮也莫重於祭謂以吉禮為首也大宗伯職曰以吉禮事邦國之鬼神示怵感念親之貌也怵或為述孔氏頴達曰此明祭祀於禮中最重唯賢者能盡祭義凡祭為禮之本禮為人之本將明禮本故先説治人經常也案大宗伯吉禮之别十有二案吉禮祭禮也周禮以禋祀祀上帝實柴祀日月星辰槱燎祀司中司命風師雨師血祭祭社稷五祀五嶽貍沈祭山林川澤疈辜祭四方百物肆獻祼饋食春祠夏禴秋嘗冬烝六者皆享先王凶禮之别五案喪禮哀死亡荒禮哀凶札弔禮哀禍烖禬禮哀圍敗恤禮哀㓂亂賔禮之别八案春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰㑹殷見曰同時聘曰問殷頫曰視軍禮之别五案大師用衆大均恤衆大田簡衆大役任衆大封合衆嘉禮之别六案飲食親宗族冠昏成男女賔射親故舊朋友饗燕親賔客脤膰親兄弟之國慶賀親異姓之國五禮之别總三十有六自猶從也言孝子祭親非假他物從外至於身使巳為之從孝子身中出生於孝子之心也孝子感時心中怵惕故奉親以祭祀之禮若非賢者不能盡怵惕之義也方氏慤曰奉之以禮者見乎物盡之以義者存乎心徇其物而忘其心者衆人也發於心而形於物者君子也故曰唯賢者能盡祭之義陳氏澔曰心怵即前篇君子履之必有怵惕之心謂心有感動也案物猶事也軍賔諸禮有事從外至而我應之敬雖在我而所由生則因乎物若祭則吾心自怵不因物至賢者之祭也必受其福非世所謂福也福者備也備者百順之名也無所不順者之謂備言内盡於已而外順於道也忠臣以事其君孝子以事其親其本一也上則順於鬼神外則順於君長内則以孝於親如此之謂備唯賢者能備能備然後能祭是故賢者之祭也致其誠信與其忠敬奉之以物道之以禮安之以樂參之以時明薦之而巳矣不求其為此孝子之心也長竹丈反下所長同道音導其為於偽反正義鄭氏康成曰世所謂福者謂受鬼神之祐助也其本一者言忠孝俱由順出也明猶潔也為謂福祐為巳之報孔氏頴達曰此明祭祀受福是百順之理世人謂福為壽考吉祥祐助於身若賢者受福身外萬事皆順於道理故云非世所謂福也内盡於巳外順於道釋百順之義謂心既内盡外又行善無違於道理也上則順於鬼神又廣大其順也鬼神尊故言上出則事公卿故言外不求其為者言孝子但内盡孝敬以奉祭祀不求其福祥為巳之報案少牢嘏辭云皇尸命工祝承致多福無疆於女孝孫使女受禄於天宜稼于田此云不求者謂孝子之心無所求也但神自致福故有受禄于天之言若水旱災荒禱祭百神則有求也故大祝有六祈之義大司徒有荒政索鬼神之禮方氏慤曰致其誠則無偽行致其信則無疑慮致其忠則無欺心致其敬則無怠志四者祭之本所謂物者奉乎此所謂禮者道乎此樂者安乎此時者參乎此而巳蓋物以將其意故曰奉禮以行其義故曰道樂以樂其來故曰安時以節其中故曰參葉氏夢得曰孝子之心所以自盡者如此豈有求而為哉輔氏廣曰養在事孝在心應氏鏞曰誠信忠敬所謂忠信禮之本禮樂時物所謂義理禮之文理則無所不順有致福之道也心則不求其為無幸福之心也存疑鄭氏康成曰賢者之所謂福者謂受大順之顯名也辨正輔氏廣曰必受其福以理必之世所謂福則不可必也名猶名言之名猶言備者百順之謂而巳内盡於巳外順於道則仰不愧天俯不愧人内不愧心心安體胖是賢者之所謂福也祭者所以追養繼孝也孝者畜也順於道不逆於倫是之謂畜是故孝子之事親也有三道焉生則養沒則喪喪畢則祭養則觀其順也喪則觀其哀也祭則觀其敬而時也盡此三道者孝子之行也養羊尚反畜許六反盡子忍反行下孟反正義鄭氏康成曰畜謂順於徳教沒終也孔氏頴達曰追養繼孝者養是生時養親孝是生時事親親今既沒設禮祭之追生時之養繼生時之孝畜謂孝子順於德教不逆倫理可以畜養其親故釋孝為畜葉氏夢得曰生可得而養死不可得而養則孝幾於絶矣故祭則追養以繼孝孝則致其樂而此觀其順者順為樂之形也喪則致其哀而此觀其哀者哀為喪之本也祭則致其嚴而此觀其敬者敬為嚴之體也蓋孝子之行不過此三者而誠信忠敬皆在内者故曰孝子之心也輔氏廣曰數與疏皆非時也既内自盡又外求助昏禮是也故國君取夫人之辭曰請君之玉女與寡人共有敝邑事宗廟社稷此求助之本也夫祭也者必夫婦親之所以備外内之官也官備則具備水草之菹陸產之醢小物備矣三牲之俎八簋之實美物備矣昆蟲之異草木之實隂陽之物備矣凡天之所生地之所長苟可薦者莫不咸在示盡物也外則盡物内則盡志此祭之心也取七註反長竹丈反正義鄭氏康成曰言玉女者美言之也君子於玉比德焉具謂所共衆物也水草之菹芹茆之屬孔疏案醢人加豆之實芹菹朝事之豆茆菹又有昌本深蒲菭筍是水草故鄭云之屬陸產之醢蚳蝝之屬孔疏醢人饋食之豆有蜃蚳蝝即蚳之類加豆之實有兔醢醯醢皆是陸產故云之屬天子之祭八簋孔疏明堂位云周之八簋昆蟲謂溫生寒死之蟲也内則可食之物有蜩范孔疏蜩蟬也范蜂也此昆蟲之屬草木之實蔆芡榛栗之屬孔疏籩人加豆之實有蔆芡饋食之籩有棗栗榛實是草木故云之屬咸皆也方氏慤曰既内自盡於巳也又外求助於人求助之道莫大乎夫婦之際以夫婦而行祭祀之道則足以盡隂陽之義以夫婦而共祭祀之事則足以備外内之官故國君取夫人之辭以事宗廟社稷為言也必曰玉女者言其有貞潔之徳也婦之助夫固不特在祭祀而以祭祀為本故曰此求助之本也夫婦親之若君制祭夫人薦盎君割牲夫人薦酒卿大夫相君命婦相夫人此外内之官也官所以執事事所以具物故曰官備則具備七菹有葵菹不必皆水草七醢有蟲醢魚醢不必皆陸產俎者三牲八簋者五榖俎所薦者天產故其數竒簋所盛者地產故其數耦於昆蟲草木言隂陽之物者以用隂陽之物至於是為備故也輔氏廣曰自盡實難事親若曾子可也心盡而誠行則内外之官不容不備内外之官備則凡祭之事物不容不備小物備矣美物或未備也美物備矣隂陽之物或未備也至於隂陽之物備則至矣盡矣無遺矣又云凡天之所生地之所長苟可薦者莫不咸在蓋其至誠無有窮巳之意故云此祭之心也孝子祭親之心何有窮盡但拘於禮束於財不得自盡其心焉耳矣總論孔氏頴逹曰自此至祭之道也一節言孝子事親先能自盡又外求伉儷供粢盛之事是故天子親耕於南郊以共齊盛王后蠶於北郊以共純服諸侯耕於東郊亦以共齊盛夫人蠶於北郊以共冕服天子諸侯非莫耕也王后夫人非莫蠶也身致其誠信誠信之謂盡盡之謂敬敬盡然後可以事神明此祭之道也共供同齊本亦作齍與粢同盛音成純鄭讀緇今如字正義鄭氏康成曰純服亦冕服也互言之爾冕以著祭服東郊少陽諸侯象也孔疏天子太陽故南郊諸侯少陽故東郊然藉田並在東南故王言南諸侯言東夫人不蠶於西郊婦人禮少變也孔疏后太隂故北郊夫人少隂合西郊然亦北者婦人質少變故與后同也齊或為粢孔氏頴達曰此結上求助之事方氏慤曰天子諸侯非莫與之耕王后夫人非莫與之蠶然且親耕親蠶焉則以身致其誠信而巳以神明之所饗者在誠不在物故也存疑鄭氏康成曰純以見繒色孔疏䊷古緇字書文相亂䊷並作純鄭註於絲理可知色不明者皆讀緇論語今也純及此案絲由蠶出則純服斷為絲服讀如字何疑若著明服色則朱綠𤣥黄詳於祭義何必畫添緇字及時將祭君子乃齊齊之為言齊也齊不齊以致齊者也是故君子非有大事也非有恭敬也則不齊不齊則於物無防也耆欲無止也及其將齊也防其邪物訖其耆欲耳不聽樂故記曰齊者不樂言不敢散其志也心不苟慮必依於道手足不苟動必依於禮是故君子之齊也專致其精明之德也故散齊七日以定之致齊三日以齊之定之之謂齊齊者精明之至也然後可以交於神明也言齊及齊不齊皆如字以齊之同餘側皆反耆市志反正義鄭氏康成曰訖猶止也定者定其志意孔氏頴達曰及時將祭謂四時應祭之前未旬時也方將接神先宜整身心故齊也未齊之時心慮散蕩心所嗜欲有不齊整及其齊也止此不齊之事以致極齊戒之道方氏慤曰物自外入故曰防嗜欲由中故曰止前言止而後言訖者止之而後訖故也齊固不止於耳不聽樂然樂者人之所樂故又引記以為言焉不為物所貳故其德精不為物所蔽故其徳明致者致其至而巳散齊即祭義所謂散齊於外是也致齊即祭義所謂致齊於内是也以齊於内故又謂之宿禮器所謂三日宿者以此以齊於外故又謂之戒禮器所謂七日戒者以此若心不苟慮與訖其嗜欲之類則所以齊其内也若手足不苟動與防其邪物之類則所以齊其外也夫散者集之則一歸乎定故散齊七日以定之致其至焉則未始不齊故致齊三日以齊之定言定於外齊言齊其内葉氏夢得曰心依於道道無形也手足依於禮禮有體也輔氏廣曰依於道志以道寜也依於禮非禮不動也精明我之神明也神明神之精明也極其致則我與神非貳也故曰微之顯誠之不可揜如此夫通論劉氏基曰君子之所以為德恭敬而巳矣恭敬也者不可須臾離也大雅述文王曰於緝熙敬止又曰不顯亦臨無射亦保聖人無一息之不恭且敬何待於齊齊所以篤其恭敬猶恐其有未至而致之聖人不自滿假之心也謂之非有大事不齊猶可謂之非有恭敬則不齊大不可也總論孔氏頴達曰自此至夫婦親之一節明祭齋戒之義并明君與夫人皆致齊㑹於大廟夫婦交親行祭之義是故先期旬有一日宫宰宿夫人夫人亦散齊七日致齊三日君致齊於外夫人致齊於内然後㑹於大廟君純冕立於阼夫人副禕立於東房君執圭瓚祼尸大宗執璋瓚亞祼及迎牲君執紖卿大夫從士執芻宗婦執盎從夫人薦涗水君執鸞刀羞嚌夫人薦豆此之謂夫婦親之先悉薦反大音泰禕音輝瓚才旦反祼古亂反紖直忍反從才用反下皆同芻初俱反盎烏浪反從夫人絶句一讀以從字絶句涗舒銳反嚌本亦作齊才細反正義鄭氏康成曰宫宰守宫官也宿讀為肅肅猶戒也戒輕肅重大廟始祖廟也圭瓚璋瓚祼器也以圭璋為柄酌鬱鬯曰祼大宗亞祼容夫人有故攝焉紖所以牽牲也周禮作絼芻謂藳也殺牲時用薦之周禮封人祭祀飾牲共其水藁涗盎齊也盎齊涗酌也凡尊有明水因兼云水爾孔疏盎齊涗酌周禮司尊彝文盎齊差清和以清酒涕之謂之涗酌此薦涗即盎齊也夫人薦盎不薦明水以盎齊加明水故連水言之嚌嚌肺祭肺之屬也孔疏少牢特牲薦熟之時俎有祭肺及舉肺二肺皆嚌之君以鸞刀割制之天子諸侯之祭禮先有祼尸之事乃後迎牲孔疏以少牢特牲無此禮故知此是天子諸侯禮芻或為䅳孔氏頴達曰外謂君之路寢内謂夫人正寢是致齊並於正寢散齊亦然但此文對㑹於大廟故云然耳祭日君與夫人俱至大廟之中悉用𤣥冕而祭侯伯夫人揄狄子男夫人闕狄並立東房以俟行事夫人有故故大宗伯代夫人行禮下云夫人薦涗水薦豆顯夫人親行也各有所明不可一揆紖牛鼻繩君自執之入繫於碑卿大夫從驅之及殺與幣告皆從於君士執芻者以其殺牲用芻藳藉之也宗婦執盎從謂同宗之婦執盎從夫人而來奠盎齊於位夫人乃就盎齊之尊酌此涗齊而薦之上言夫人副禕則此是上公之祭宜有醴齊盎齊但言盎略耳亦容侯伯子男之祭但有盎齊也嚌有二時一是朝踐之時取肝以膋貫之入室燎於爐炭出薦之主前二謂饋孰之時君以鸞刀割制所羞嚌肺横切之使不絶亦奠於俎上尸並嚌之羞進也謂君用鸞刀制此嚌肉以進之方氏慤曰齊於内外所以辨其位㑹於大廟所以聨其事六冕皆麻而曰純者孔子稱今也純當孔子時固有純冕矣副禕蓋天子王后之服上公夫人宜服之周官追師掌首飾有副有編有次副為首飾之上故以之配三狄編為首飾之中故以之配鞠展次為首飾之下故以之配禒衣而巳謂之副則夫人之所同謂之禕則后及上公夫人之所獨三狄雖同用副然以配禕衣為正故經未有言副揄闕者止曰副禕而巳夫人奠盎此言宗婦執盎者宗婦執之夫人奠之故也嚌者尸所嚌之肺也以尸之所嚌故君執鸞刀而羞之尸必嚌之君必羞之者以周人所貴故也上言祭必夫婦親之故此結言此之謂夫婦親之也周氏諝曰圭者象天用而半圭為璋示其君之於天用則全之而夫人則半之而巳存疑孔氏頴達曰非二王後及周公廟則悉用𤣥冕而祭副及禕后之上服案上公夫人得服之魯及二王之後夫人得服之存異陸氏佃曰亞祼非獨容夫人有故攝焉亦容宗伯亞夫人祼蓋二王之後三祼君一夫人一大宗一通論陳氏祥道曰殷人尊神而交神於明故先樂而求諸陽周人尊禮而辨神於幽故先祼而求諸隂書曰王入大室祼祭統曰君執圭瓚祼尸則尸入大室以圭瓚酌鬱鬯祼之后又以璋瓚酌鬱鬯亞祼其祼尸也如祼賔客則王與后自灌之矣鄭氏釋小宰謂王酌鬱鬯以獻尸尸受祭之啐之奠之然尸神象也神受而自灌非禮意也案求非一求而巳故求諸陽者有燎求諸隂者有再祼陸氏二王之後三祼則天子必三祼矣於禮何據乎孔氏云夫人親在而又云大宗記者亂陳之不可一揆其說甚明不必鑿為三祼以亂禮也及入舞君執干戚就舞位君為東上冕而總干率其羣臣以樂皇尸是故天子之祭也與天下樂之諸侯之祭也與竟内樂之冕而總干率其羣臣以樂皇尸此與竟内樂之之義也樂音洛竟音境正義鄭氏康成曰君為東上近主位也皇君也言君尸者尊之孔氏頴達曰此明祭時天子諸侯親在舞位以樂皇尸也方氏慤曰舞位則綴兆也君於東上則以君為祭主故也干戚武舞所執也羽籥文舞所執也上言干戚而不言冕下言總干而不言戚互相備也稱皇尸與詩楚茨所稱同義詩鳧鷖又稱公尸兼神示祖考而言之曰公尸言衆之所共也楚茨指宗廟之祖考而言之也諸侯之尸亦稱皇者尊神而巳陳氏祥道曰廟中在天子則天下之象也在諸侯則竟内之象也故天子冕而總干以樂皇尸非徒樂之所以與天下樂之也諸侯冕而總干亦與竟内樂之古者人君之於廟饗藉則親耕牲則親殺酒則親獻然則樂之親舞不為過矣應氏鏞曰比干仗鉞乃武王臨陣之容朱干玉戚為大武象成之樂祭而用之於宗廟既以顯先王之功舞而象其形容又欲使子孫知締剙之艱難而毋忘於持守也以君之尊躬執其事非徒樂皇尸所以說祖考也然食三老五更於大學亦必冕而總干者祭先聖先師而用之猶祭之因以樂皇尸也魯之有是舞以周公佐武王伐紂周旋軍旅之閒因以歆其神靈也皇大也皇尸猶皇考也存疑陳氏祥道曰尸則親迎案君迎牲而不迎尸以尸在外則嫌於臣也夫祭有三重焉獻之屬莫重於祼聲莫重於升歌舞莫重於武宿夜此周道也凡三道者所以假於外而以增君子之志也故與志進退志輕則亦輕志重則亦重輕其志而求外之重也雖聖人弗能得也是故君子之祭也必身自盡也所以明重也道之以禮以奉三重而薦諸皇尸此聖人之道也正義鄭氏康成曰武宿夜武曲名也周道猶周之禮孔氏頴達曰此并明祭祀之禮有三種可重之事假借外物而以增益君子内志祼則假於鬱鬯歌則假於聲音舞則假於干戚皆是假於外物故與志同進同退若内志輕畧則此等亦輕畧内志殷重此等亦殷重矣皇氏曰師說書傳云武王伐紂至於商郊停止宿夜士卒皆歡樂歌舞以待旦因名焉熊氏曰宿夜即大武之樂也方氏慤曰周人先求諸隂而尚臭故重祼經言升歌清廟清廟者文王之詩故重升歌大武者武王之舞也故重武宿夜陳氏祥道曰獻之屬有九而莫重於祼是以降神者為重凡獻卿大夫及羣有司皆其輕者也聲莫重於升歌是以貴人聲者為重凡見於下管象武之器皆其輕者也舞莫重於武宿夜是以當時為重凡見於前代者皆其輕者也君子之志資諸巳而在内者也德盛者其志重德薄者其志輕志重於内凡假於外者安得不重志輕於内凡假於外者安得不輕邪周氏諝曰君子之於祭也内則盡志外則盡物物雖可以增其志然其輕重亦在志而已矣故君子以自盡為主夫祭有餕餕者祭之末也不可不知也是故古之人有言曰善終者如始餕其是巳是故古之君子曰尸亦餕鬼神之餘也惠術也可以觀政矣是故尸謖君與卿四人餕君起大夫六人餕臣餕君之餘也大夫起士八人餕賤餕貴之餘也士起各執其具以出陳於堂下百官進徹之下餕上之餘也餕音俊謖所六反百官進依注作餕正義鄭氏康成曰術猶法也為政尚施惠盡美能知能惠詩云惟此惠君民人所瞻進當為餕聲之誤也百官謂有事於君祭者也既餕乃徹之而去所謂自卑至賤進徹或俱為餕孔氏頴達曰靡不有初鮮克有終而祭之有餕即是克有終故引古人之言證餕為美也餕其是巳巳語辭也又引古君子之言證餕義餕者人餕尸之餘也然王侯初薦毛血燔燎是薦於鬼神至薦孰時尸乃食之故曰尸亦餕鬼神之餘也若大夫士饗神亦是先薦鬼神而後尸乃食也惠術也言尸餕是施恩惠之術法能施恩惠者即其政善故云可以觀政君於廟中事尸如君則君為臣禮君食尸餘是臣食君餘與大夫食君餘相似故云臣餕君之餘也諸侯之國有五大夫此云六者兼有采地助祭也以下漸徧及下示溥恩惠也士廟中餕訖而起所司各執其饌具以出廟戸陳於堂下百官餕訖各徹其器而去之方氏慤曰百官謂中下之士以及於百執事者也爾雅曰謖興起也謖者不疾而速尸神象也故特以謖言之特牲饋食少牢饋食士虞禮有司篇皆言尸謖者以此總論孔氏頴逹曰自此至觀政矣一節明祭末餕餘之禮自求多福恩澤廣被之事凡餕之道每變以衆所以别貴賤之等而興施惠之象也是故以四簋黍見其脩於廟中也廟中者竟内之象也祭者澤之大者也是故上有大澤則惠必及下顧上先下後耳非上積重而下有凍餒之民也是故上有大澤則民夫人待於下流知惠之必將至也由餕見之矣故曰可以觀政矣别彼列反見賢遍反脩一本作徧重直龍反餒乃罪反夫音扶正義鄭氏康成曰鬼神之惠徧廟中如國君之惠徧竟内也鬼神有祭不獨饗之使人餕之恩澤之大者也國君有蓄積不獨食之亦以施惠於竟内也孔氏頴達曰興起也初餕貴而少後餕賤而多皆先上而後下施惠之道亦當然也故云興施惠之象餕之時君與三卿用四簋之黍欲見其恩惠脩整普徧於廟中也祭有六簋今云四簋以二簋留為改設之祭案饋食大合樂後延主入奥王入室事主為饗神出闔戸如食閒再迎尸入為接祭告利成後尸出徹二簋黍于室為改設簋有黍稷特云黍者見其美舉黍則稷可知以四簋而徧於廟中如君之恩惠徧於竟内也上先下後謂君上先餕臣下後餕非上有財物積重不以施惠使在下有凍餒之民也由餕見之言民所以知上有財物恩重及於下者祗由祭祀之餕見其恩逮於下之理方氏慤曰夫施惠之道不止於餕特由餕見之而巳故曰象見乃謂之象也諸侯廟中為竟内之象則天子廟中為天下之象可知夫祭之為物大矣其興物備矣順以備者也其教之本與是故君子之教也外則教之以尊其君長内則教之以孝於其親是故明君在上則諸臣服從崇祀宗廟社稷則子孫順孝盡其道端其義而教生焉是故君子之事君也必身行之所不安於上則不以使下所惡於下則不以事上非諸人行諸已非教之道也是故君子之教也必由其本順之至也祭其是與故曰祭者教之本也巳與音餘長竹丈反下長㓜皆同惡烏路反正義鄭氏康成曰為物猶為禮也興物謂薦百品崇猶尊也必身行之言恕已乃行之祭者教之本教由孝順生也孔氏頴達曰此明祭祀禮備具内外俱兼脩之於巳然後及物是為政之本也祭之為物物謂事物所行皆依禮故為大興物謂興造庶羞百品皆足祭必依禮是順也百品皆足是備也聖人設教惟以順以備故曰教之本與祭既順備可為教故人君因為教焉外教尊君長故諸臣服從内教孝其親故子孫順孝人君身自行之盡其事上之道又端正君臣上下之義則政教由此生焉上所施於巳巳所不安則不得施於下下所施於巳巳所憎惡則不得以事於上非諸人諸於也謂他人行此惡事加於巳巳以為非是非於人已乃行此惡事而施人是行於巳也若如此非政教之道言為政必由於巳乃能及物故下云必由其本順之至也劉氏彝曰上經以祭明人君為政之道此經以祭明人君為教之法葉氏夢得曰祭於親而順以備教之本也廣其順而因諸巳以施諸人教之道也本言其所自道言其所成應氏鏞曰為物指其事興物指其具存疑孔氏頴達曰外教謂郊天内教謂祭宗廟案此節順以備與首無所不順之謂備相應外内二句亦與首外則順於君長内則以孝於其親二句相應言君子祗自盡而所以為教亦即在於是明其義之所統者多不應此處又增出郊天也夫祭有十倫焉見事鬼神之道焉見君臣之義焉見父子之倫焉見貴賤之等焉見親疏之殺焉見爵賞之施焉見夫婦之别焉見政事之均焉見長㓜之序焉見上下之際焉此之謂十倫見賢徧反殺色界反正義鄭氏康成曰倫猶義也案廣韻倫等也増韻倫次序也蓋條理各當之謂孔氏頴達曰從上雖云祭其事隐此廣陳祭含十義以顯教之本陳氏祥道曰祭所以交神於無而寓理於有致禮於幽而興物於明故其為名則一而其為倫則十此其以神道設教也由其父子之倫則有親疏之殺由其貴賤之等則有爵賞之施由其親疏之殺則有夫婦之别而終之以長㓜之序由其爵賞之施則有政事之均而終之以上下之際鬼神父子親疏夫婦長㓜五者皆内之倫也君臣貴賤爵賞政事上下五者皆外之倫也内之倫則主於仁外之倫則主於義仁必推而逹乎義義必反而濟乎仁此所以内外交著而後相成之美盡矣葉氏夢得曰祭祀以祭鬼神為主故先言事鬼神之道道言其洋洋在上妙而不可體也鬼神無形而立尸以祭者安之也尸在廟中則全於君在外則全於臣故次之以君臣之義義言其有權也所為尸者子行也以父而事子則不嫌於自卑故次之以父子之倫倫言其理之所在也入以明父子則足以致親致親不可以無尊卑故次之以貴賤之等等言其有節文也貴賤有等而昭穆不可以不辨故次之以親疏之殺殺言其恩之有降也親疏有殺不可以不知其所自出故凡出命者就於大廟則次之以爵賞之施施言恩之廣也自交鬼神之道至於爵賞之施則愛敬以備而所以事鬼神者必夫婦親之故次之以夫婦之别别言其獻異位也薦獻至於進則祭將畢矣必及於賜爵故族姓以昭穆為齒則次以長㓜之序序言其先後有次也賜爵雖及於族姓而惠未廣逹其惠至於賤吏皆得餕而食則上下交矣故次之以上下之際鋪筵設同几為依神也詔祝於室而出於祊此交神明之道也鋪普胡反筵羊然反為於偽反祊伯更反正義鄭氏康成曰同之言詷也孔疏字林詷共也漢魏時字義如此祭者以其妃配亦不特几也孔疏以某妃配儀禮少牢文謂祭夫祝辭不但不特設辭亦不特設其几祝辭與几皆同於夫也故鄭注司几筵云祭於廟同几精氣合也席亦共之詔祝告事於尸也孔疏詔告也祝祝也謂灌鬯饋熟酳尸之等祝官以祝辭告事於尸其事廣也以總論事神故廣言之知非朝踐之時血毛詔於室者以朝踐尸主皆在戸外暫時之事非終始事神之道也出於祊謂索祭也孔疏郊特牲云索祭祝於祊孔氏頴達曰此明第一倫交鬼神之道存疑孔氏頴達曰祊謂明日繹祭而出廟門旁廣求神於門外之祊案出於祊即郊特牲索祭祝於祊皆指正祭本日而言孔疏非也君迎牲而不迎尸别嫌也尸在廟門外則疑於臣在廟中則全於君君在廟門外則疑於君入廟門則全於臣全於子是故不出者明君臣之義也正義鄭氏康成曰不迎尸者欲全其尊也尸神象也鬼神之尊在廟中人君之尊出廟門則伸孔氏頴達曰此明第二倫君臣之義尸本是臣在廟則尊耳若未入廟其尊未伸君若出迎則疑尸有還為臣之道故云疑於臣尸若在廟則君父道全也不云全父此本明君臣故畧於全父也君以臣子自處不敢出廟門恐尸尊不極欲示天下咸知君臣之義君臣由義而合故云義也方氏慤曰廟門之外以人道為尚廟門之内以神道為尚夫祭之道孫為王父尸所使為尸者於祭者子行也父北面而事之所以明子事父之道也此父子之倫也行戸剛反正義鄭氏康成曰子行猶子列也祭祖則用孫列皆取於同姓之適孫也天子諸侯之祭朝事延尸於戸外是以有北面事尸之禮孔疏少牢特牲禮尸皆在室之奥主人西面事之無北面事尸之禮故知是天子諸侯也鄭知朝事者以郊特牲詔祝於室當朝事之節故知坐尸當朝事也牲案亞祼畢王出迎牲祝延尸出后薦朝事豆籩入王射牲取血毛告神于室乃北面事尸于堂孔氏頴逹曰此明第三倫父子之理主人為欲孝敬已父故北面而事子行之尸則凡為子者豈得不自尊其父乎是見子事父之道也程子曰人之魂氣既散孝子求神而祭無尸則不饗無主則不依魂氣必求其類而依之人與人既為類骨肉又為一家之類已與尸各既巳潔齊至誠相通以此求神宜其饗之後世不知此道限以尊卑之勢遂不肯行耳葉氏夢得曰尸所以象神取於異姓則嫌於不親取於巳子則疑於無别故為尸者子行也雖以父事之不疑於父不疑則人倫明矣案曲禮祭祀不為尸謂父在者則為尸者必無父者也故曰子行尸飲五君洗玉爵獻卿尸飲七以瑶爵獻大夫尸飲九以散爵獻士及羣有司皆以齒明尊卑之等也瑶音遥散悉但反正義鄭氏康成曰尸飲五謂酳尸五獻也案尸飯畢而獻謂之酳五獻據尸所飲言之若連二灌實七獻矣大夫士祭三獻而獻賔孔氏頴達曰此明第四倫尊卑差等也獻卿大夫士及有司等其爵雖同皆長者在先故云以齒此據上公九獻之禮凡祭二祼用鬱鬯尸祭奠而不飲朝踐二獻饋食二獻及食畢主人酳尸故云尸飲五於此時獻卿獻卿之後主婦酳尸賔長獻尸是尸飲七也及瑶爵獻大夫是正九獻禮畢但初二祼不飲故云尸飲七自此以後長賔長兄弟更為加爵尸又飲二是并前尸飲九主人乃以散爵獻士及羣有司也若侯伯七獻朝踐饋食時各一獻食訖酳尸但尸飲三也子男五獻食訖酳尸尸飲一鄭注大夫士祭三獻而獻賔此特牲禮文明與諸侯獻賔時節不同也方氏慤曰君必獻臣者以賔禮隆助祭之人故也尸飲之後獻則閒之者隆殺之别也閒之以五以七以九者飲陽事故用數之竒焉凡觴皆謂之爵此言玉爵瑶爵正謂一升之爵爾言散爵即五升之散也徐氏師曾曰夫獻一也而由卿而大夫而士而羣有司是先尊而後卑也爵一也而以玉以瑶以散是重尊而輕卑也皆以明尊卑之等也前言貴賤此言尊卑無二義也存疑孔氏頴逹曰有司徹下大夫不賔尸與士同亦三獻而獻賔其上大夫别行賔尸之禮與此異也案少牢下篇以賔尸為正禮不賔尸乃禮之變故另起言若不儐尸正如冠禮言若孤子若庶子若不醴若殺士昏禮言若舅姑既沒記云若不親迎一例皆言其禮之變者若以賔尸不賔尸分上下大夫則經文無可考孔賈二疏之訛耳夫祭有昭穆昭穆者所以别父子逺近長㓜親疏之序而無亂也是故有事於大廟則羣昭羣穆咸在而不失其倫此之謂親疏之殺也長竹丈反大音泰下同昭止遥反正義鄭氏康成曰昭穆咸在同宗父子皆來孔疏祭太廟則衆廟尸主及助祭之人同宗父子皆至故羣昭羣穆咸在若餘廟惟尸主及所出之廟子孫來耳各以昭穆列在廟是不失倫類也孔氏頴達曰此明第五倫親疏之殺昭穆謂尸主行列於廟中親者近疏者逺各有次序是無亂也方氏慤曰王制三昭三穆神之昭穆也此羣昭羣穆人之昭穆也首言祭有昭穆則兼神人而言之然昭穆以神為主故人於廟中乃稱之存疑孔氏頴逹曰廟中父南面子北面案三時皆祫三昭三穆之主皆聚大廟則羣昭羣穆之子孫亦皆聚大廟若春犆則各於其廟亦惟當廟子孫入耳又案大廟序昭穆惟就始封之祖序之如泰伯虞仲大王之昭列第一行虢仲虢叔王季之穆列第二行管蔡十六國文之昭列第三行邘晉應韓武之穆列第四行則親疏瞭然可見若就今子孫昭穆為行則親疏全無辨矣又祭時在室俱西面在堂俱北面安有父南面之理古者明君爵有德而祿有功必賜爵禄於大廟示不敢專也故祭之日一獻君降立於阼階之南南鄉所命北面史由君右執䇿命之再拜稽首受書以歸而舍奠於其廟此爵賞之施也鄉許亮反舍音釋正義鄭氏康成曰一獻一酳尸也孔疏鄭知一獻非初祼及朝踐饋食之一獻必為一酳尸者以一酳尸之前皆為祭事承奉鬼神未暇䇿命尸食巳畢始可行爵賞也此一獻則上尸飲五君獻卿之時也舍當為釋非時而祭曰奠孔氏頴逹曰此明第六倫爵賞之施爵表德禄賞功卿大夫等既受䇿書歸而釋奠於家廟告以受君之命也君尊尚爵賞於廟不自專故民知施必由尊也方氏慤曰史掌書者䇿則書其所命之事也上言執䇿下言受書互相備也史由君右重命也周氏諝曰君雖在廟中亦必南嚮者示其向明而聼天下為不可易也陸氏佃曰史由君右執䇿命之所謂詔辭自右應氏鏞曰一獻始命者以祭為先也不俟獻終而命者以賞為重也存疑孔氏頴逹曰若天子命羣臣則不因常祭特假於廟故大宗伯云王命諸侯則儐是也陸氏佃曰一獻謂始獻爾始獻即𤼵爵賜禄不嫌蚤者重䇿命也郝氏敬曰王者爵禄羣臣必告祖廟行一獻之禮祭之日即䇿命之日案洛誥告周公留後在烝祭之日所謂烝祭嵗文王騂牛一武王騂牛一惟告周公其後是也傳以騂牛為特加之牲疏謂太牢之外所特加是因時祭而命之與嘗祭𤼵爵賜服之義同但洛誥告後始云王入太室祼此記則一獻後乃降立而命之其次少别耳據注以一獻為酳尸則猶是常祭之節視洛誥之因烝而祭一耳孔因鄭注大宗伯王命諸侯有特假祖廟語故以特假為不因常祭不知因祭而命者祭為常而命為特亦祭為正而命為假况因祭而告洛誥本有明文若謂羣臣常職與周公特命不同可不因祭故假廟命之則無據不敢信也陸郝說亦因疏說而小變之然皆憑臆之見也君卷冕立於阼夫人副禕立於東房夫人薦豆執校執醴授之執鐙尸酢夫人執柄夫人授尸執足夫婦相授受不相襲處酢必易爵明夫婦之别也卷古本反校戸教反鐙音登正義鄭氏康成曰校豆中央直者也執醴授醴之人授夫人以豆孔疏謂夫人獻尸以醴齊此人酌醴以授夫人至夫人薦豆又執豆以授夫人獻與薦皆此人所掌故也則執鐙鐙豆下跗也孔氏頴達曰此明第七倫也此謂上公夫人故副禕其餘夫人不副禕也爵為雀形以尾為柄尸酢夫人則執爵尾夫人受酢則執爵足襲因也其執之物不相因故處交相致爵不能執故處以明男女有别主人受主婦之酢必易換其爵特牲更爵酢鄭注更爵自酢男子不承婦人爵是也凡為俎者以骨為主骨有貴賤殷人貴髀周人貴肩凡前貴於後俎者所以明祭之必有惠也是故貴者取貴骨賤者取賤骨貴者不重賤者不虛示均也惠均則政行政行則事成事成則功立功之所以立者不可不知也俎者所以明惠之必均也善為政者如此故曰見政事之均焉髀必氏反重直龍反正義鄭氏康成曰殷人貴髀為其厚也孔疏殷質貴髀之厚賤肩之薄周人貴肩為其顯也孔疏周文貴肩之顯賤髀之隐凡前貴於後謂脊脅臂臑之屬孔疏前體臂臑為貴後體膊胳為賤就脊脅之中亦有貴賤正脊在前為貴脡脊横脊在後為賤脅則正脅在前為貴短脅為賤故鄭總云之屬以包之鄭不云肩者以周人所貴故略之孔氏頴達曰此經明第八倫凡前貴於後據周貴肩言之助祭者賜之俎貴者不特多而重賤者不虛而無分俎多少隨其貴賤示均平也功立由於分俎其事既重人君不可不知人君欲為政教必須如分俎均平也陳氏祥道曰貴者取貴骨賤者取賤骨則有所别而足以為義貴者不重賤者不虛則有所均而可以為仁行於上者政也通於下者事也政必有事而事不必有政故事成本於政行凡賜爵昭為一穆為一昭與昭齒穆與穆齒凡羣有司皆以齒此之謂長㓜有序正義鄭氏康成曰昭穆猶特牲少牢饋食之禮衆兄弟也羣有司猶衆賔下及執事者君賜之爵謂若酬之孔疏鄭知賜爵為酬者以獻時不以昭穆為次此云昭穆故知為酬也賈氏公彥曰賜爵謂祭末旅酬無算爵時孔氏頴達曰此明第九倫祭祀旅酬時賜助祭者酒爵君衆兄弟子孫昭為一列穆為一列各自相旅尊者在前卑者在後同班列則長者在前少者在後是昭與昭齒穆與穆齒陳氏祥道曰宗廟之中授事則以爵而賜爵則以齒蓋授事主義而行於旅酬之前賜爵主恩而行於旅酬之後賜以主恩故昭與昭齒穆與穆齒凡羣有司皆以齒長㓜之序也方氏慤曰司士所謂祭祀賜爵呼昭穆而進之是矣案特牲少牢注疏云大夫尊避君士卑無嫌故天子諸侯禮推特牲而可知特牲禮主人獻賔自酢獻衆賔畢乃酬賔此時本未舉旅行酬也獻衆賔在酬賔前獻長兄弟衆兄弟在酬賔後均是正獻原非旅酬至一人舉觶纔舉旅行酬二人舉觶始行無算爵此特牲禮節次之大畧也據此而推則前經所謂尸飲五君獻卿飲七獻大夫飲九獻士及羣有司亦猶特牲之獻衆賔在酬賔前也但大夫士祭三獻而獻賔與君不同耳酬賔後君獻長兄弟衆兄弟少牢所云兄弟之長升拜受爵蓋謂衆兄弟無不獻其升拜受爵惟長兄弟一人亦猶獻工之禮衆工無不獻惟工長一人拜受耳非以長兄弟之升拜而謂衆兄弟不悉獻也此時尚未旅酬及賜爵司士呼昭穆而進之纔舉旅行酬旅酬主人不與無用攝主司士所呼合宗人授事之有爵有官班在昭穆者而呼之非以司士掌士之戒令而專呼士也此時不唯昭穆以齒并衆賔及執事之同爵者亦以齒所以明長㓜之序夫祭有畀煇胞翟閽者惠下之道也惟有德之君為能行此明足以見之仁足以與之畀之為言與也能以其餘畀其下者也煇者甲吏之賤者也胞者肉吏之賤者也翟者樂吏之賤者也閽者守門之賤者也古者不使刑人守門此四守者吏之至賤者也尸又至尊以至尊既祭之末而不忘至賤而以其餘畀之是故明君在上則竟内之民無凍餒者矣此之謂上下之際畀必利反煇依注作韗況萬反又音運胞歩交反翟音狄閽音昏見賢遍反正義鄭氏康成曰明足以見之見此卑者也仁足以與之與此卑者也煇周禮作韗謂韗磔皮革之官也孔疏考工記韗人掌作鼔木張皮兩頭鞔之以為鼓故注云韗磔皮革之官也翟謂教羽舞者也不使刑人守門謂夏殷時孔疏作記之人見周刑人守門又何恩賜與之故明之陸氏徳明曰胞肉吏也孔氏頴達曰此明第十倫畀與也煇胞翟閽四者皆是賤官祭末與以恩賜是施惠之道也云古者不使刑人守門雖是賤人得恩賜也際接也謂至尊與賤者其道接也陳氏祥道曰夫知及其大而不周其小不足以為明愛及其貴而不周其賤不足以為仁惟有德之君於煇胞翟閽之吏其明足以見之而無所遺其仁足以與之而無不徧則惠下之道斯盡而竟内之民所以無凍餒也方氏慤曰祭之有俎固已見惠均矣然未足以盡惠下之道以至尊之尸而畀至賤之吏然後見惠下也明足以見而無仁以與之則惠或失於不行仁足以與而無明以見之則惠或失於無辨德者得也惟有德之君乃能兩得故曰為能行此葉氏夢得曰助祭則羣有司賤於族姓而煇胞翟閽又賤於羣有司明足以知其賤而用之仁足以惠其賤而畀之則上下至矣案十者之序首設几筵然後迎尸故第二第三次之尸入則獻而獻卿大夫士賔兄弟命爵出禄皆九獻中禮故第四第五第六次之既獻而後夫婦致爵故第七次之凡受獻則薦俎設於其位故第八次之祭畢旅酬故第九次之自上及下皆有薦脀内羞故廣言至薦以見惠之均為第十此下宜接以夫祭有餕至故曰祭者教之本也巳五節疑錯簡凡祭有四時春祭曰礿夏祭曰禘秋祭曰嘗冬祭曰烝礿禘陽義也嘗烝隂義也禘者陽之盛也嘗者隂之盛也故曰莫重於禘嘗古者於禘也發爵賜服順陽義也於嘗也出田邑發秋政順隂義也故記曰嘗之日發公室示賞也草艾則墨未發秋政則民弗敢草也礿羊灼反字又作禴夏戸嫁反艾音刈正義鄭氏康成曰謂夏殷時禮夏者尊卑著而秋萬物成爵命屬陽國地屬隂發公室出賞物也草艾謂艾取草也秋草木成可芟艾給爨亨時則始行小刑也孔氏頴達曰禘祭在夏夏為炎暑故為陽盛嘗祭在秋隂功成就故為隂盛冬雖嚴寒以物於秋成故不得以冬烝對夏禘記者又引前記之文云嘗之日發出公室貨財以示賞也案左傳云賞以春夏刑以秋冬此以賞對刑為文其實四時之間皆有賞也葉氏夢得曰其盛止及於禘嘗而不及礿烝者蓋陽逹於春物方蠢動隂終於冬物已退藏故古之君子其言郊社則以禘嘗對之亦舉其盛者爾案秋有賞而春夏無刑者蓋天地之大德曰生董子所謂隂常居大冬而積於空虛不用之處也總論孔氏頴逹曰自此至為民父母一節明祭祀之重故曰禘嘗之義大矣治國之本也不可不知也明其義者君也能其事者臣也不明其義君人不全不能其事為臣不全夫義者所以濟志也諸德之發也是故其德盛者其志厚其志厚者其義章其義章者其祭也敬祭敬則竟内之子孫莫敢不敬矣是故君子之祭也必身親涖之有故則使人可也雖使人也君不失其義者君明其義故也其德薄者其志輕疑於其義而求祭使之必敬也弗可得已祭而不敬何以為民父母矣正義鄭氏康成曰全猶具也濟成也發謂機發也涖臨也君不失其義者言君雖不自親祭祭禮無闕於君德不損也孔氏頴達曰人君德盛則念親志意深厚念親深厚則祭祀之義章明顯著其志恭敬民之子孫皆化於上無不恭敬其親矣雖君有故使人攝之君能恭敬則不喪失其義也若人君志意既輕疑惑於祭祀之義欲求祭使之必敬不可得巳方氏慤曰君以道揆禮故曰明其義臣以法守禮故曰能其事義寓乎禮志存乎心苟有是心而無是禮亦不可以徒行故義所以濟志也禮因所以為義而義又可以起禮有故則使人以義之所可故也大宗伯若王不與祭祀則攝位代之雖在乎人使之則出乎君代之雖行其事使之則本乎義故曰雖使人也君不失其義者明其義故也郝氏敬曰義謂隂陽之義明其義者内盡心也能其事者外備物也君人不全道不備也濟志謂成其志之所欲為也諸德謂衆德𤼵謂顯於事案義即篇首祭之義也祭之義隂陽鬼神而巳志孝子之志也必通乎隂陽知所以合鬼與神者乃能格祖考而足以濟其報本追逺之志諸德即篇首事君事長事親事鬼神其所發雖殊而其本則一也君子平日無所不順根本盛大故其祭也致其誠信與其忠敬而志厚志厚故道之以禮安之以樂所謂明有禮樂幽有鬼神實有通幽明之故即此參之以時而順陽義順隂義者亦無徃不順於鬼神義無不明故敬無不格竟内之民總此為人子為人孫者得其心之所同然不惟惠足以及之而德亦實足以化之此之謂民之父母夫鼎有銘銘者自名也自名以稱揚其先祖之美而明著之後世者也為先祖者莫不有美焉莫不有惡焉銘之義稱美而不稱惡此孝子孝孫之心也唯賢者能之銘者論譔其先祖之有德善功烈勲勞慶賞聲名列於天下而酌之祭器自成其名焉以祀其先祖者也顯揚先祖所以崇孝也身比焉順也明示後世教也譔音撰比毗志反正義鄭氏康成曰銘謂書之刻之以識事者也自名謂稱揚其先祖之德著巳名於下也烈業也王功曰勲事功曰勞酌之祭器言斟酌其美傅著於鍾鼎也身比焉謂自著名於下也順謂著名以稱揚先祖之德孝順之行也教所以教後世孔氏頴達曰論謂論說譔謂譔録言子孫為銘論說譔録其先祖功業勲勞慶賞聲名著於天下者也祭器鍾鼎也顯楊先祖以下釋所以必銘義也方氏慤曰自名於祭器故曰自成其名上足以揚先祖之徳下足以成巳之名故曰上下皆得周氏諝曰德善其成已者也功烈勲勞其成人者也慶賞聲名成已成人所終始者也通論周氏諝曰名之曰幽厲者天下之公義也故孝子慈孫雖欲改之不可得也自名先祖之美而不稱其惡者一人之私恩也故孝子慈孫為之可也存疑孔氏頴達曰以祀其先祖謂預君祫祭也禮功臣既得銘鼎則得預君大祫令先祖被銘預祫是尊其先祖也案祭器如作召公考之類不必是君之鼎鍾若君之鼎鍾則君自銘之何容自名祀其先祖亦自祀其先然耳若預君祫則君之恩非其子之孝也夫銘者壹稱而上下皆得焉耳矣是故君子之觀於銘也既美其所稱又美其所為為之者明足以見之仁足以與之知足以利之可謂賢矣賢而勿伐可謂恭矣正義鄭氏康成曰美其所為美此人為此銘明足以見之見其先祖之美也仁足以與之與其先祖之銘也孔氏頴達曰造銘惟壹稱先祖之善上下皆得謂上光揚先祖下成已順行又垂教來世也所稱謂先祖也君子有德之士觀銘必見此二事之美也為之者謂為銘之人葉氏夢得曰美其所稱者以其不遺祖考之善也美其所為者以其不誣祖考之實也有善而弗知不明也故言明足以見之知而不傳不仁也故言仁足以與之案此蓋惟仁愛其先故能致此銘以與之也知之而能傳又誣其實則亦不知也故言知足以利之知既利之而欲伐其善則必喪其善故雖銘而其辭敬者亦所謂賢而勿伐也案見之者見先祖之善也與之者與先祖以傳名也利之者稱美而不誣則不害先祖之實行矣存疑鄭氏康成曰仁足與之者非有仁恩君不使與之也知足以利之利巳名得比於先祖案仁恩說混又利者物之遂名之成稱美而誣則人必指謫之名不成反揚先祖之惡矣故衛孔悝之鼎銘曰六月丁亥公假於大廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難於漢陽即宫於宗周奔走無射啓右獻公獻公乃命成叔纂乃祖服乃考文叔興舊嗜欲作率慶士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叔舅予汝銘若纂乃考服悝拜稽首曰對揚以辟之勤大命施於烝彝鼎此衛孔悝之鼎銘也古之君子論譔其先祖之美而明著之後世者也以此其身以重其國家如此子孫之守宗廟社稷者其先祖無美而稱之是誣也有善而弗知不明也知而弗傳不仁也此三者君子之所恥也悝口囘反假加百反左音佐右音又下啓右同難乃旦反奔本又作犇射音亦纂子管反耆市志反解古賣反休許虯反予羊許反女同汝辟必亦反彝以支反正義鄭氏康成曰孔悝衛大夫也公衛莊公蒯聵也德孔悝之立巳孔疏案哀十五年傳蒯聵舍孔氏之外圃適伯姬氏廹孔悝於厠強盟之遂劫以登臺於是得國是德孔悝之立己也依禮襃之以靜國人自固也假至也至大廟謂以夏之孟夏禘祭孔疏夏之孟月是周之六月也諸侯命臣在於祭日故鄭注至於太廟謂禘之祭也公曰叔舅者公為䇿書尊呼孔悝而命之也乃猶女也莊叔悝七世之祖衛大夫孔逹也隨難者謂成公為晉文公所伐出奔楚命莊叔從焉孔疏成公為晉文公所伐及殺叔武並見僖二十八年左傳無孔逹事傳文不具也漢楚之川也即宫於宗周後反得國坐殺弟叔武晉人執而歸之於京師寘之深室也射厭也言莊叔當奔走至勞苦而不厭倦也孔疏言孔逹隨難漢陽及成公即宫於宗周常奔走無厭倦也周既去鎬京猶名王城為宗周也方氏慤曰前之宗周西周也其地則豐鎬也宗廟所在故謂之宗周成周東周也其地則洛邑也以王道成於此故謂之成周豐謂之宗周以文王廟在焉故也鎬謂之宗周以武王廟在焉故也召公所卜者洛之上都周公所卜者洛之下都皆東周爾謂之成周者特下都也前則頑民之所遷後則敬王之所遷者是矣而上都則謂之王城焉前則九鼎之所遷後則平王之所遷者是矣自敬王遷都之後止以成周為東周而西周為成周蓋成周在瀍水東王城在瀍水西故也衛之所宫者王城而此謂之宗周者自平王遷於此至莊公時宗廟亦在焉故也獻公衛侯衎成公曾孫也亦失國得反孔疏襄十四年左傳衛侯出奔齊是獻公亦失國也言莊叔之功流於後世啓右獻公使得反國也成叔莊叔之孫成子烝鉏也右助也纂繼也服事也獻公反國命成子繼女祖莊叔之事欲其忠如孔達也文叔者成叔之曾孫文子圉即悝父也作起也若乃猶女也公命悝予女先祖以銘以尊顯之女繼女父之事欲其忠如文子也成公獻公莊公皆失國得反言孔氏世有功焉寵之也施猶著也刻著於烝祭之彝鼎彝尊也周禮大約劑書於宗彜此衛孔悝之鼎銘者言銘之類衆多畧取此一以言之也以重其國家如此言如莊公命孔悝之為也莊公孔悝惟無令德以終其事於禮是行之非也孔氏頴逹曰案哀公十五年冬蒯聵得國十六年六月衛侯飲悝酒而逐之此云六月命之者蓋命後即逐之也公曰至休哉是孔悝父祖鼎銘之辭孔悝是異姓大夫年㓜故稱叔舅王氏炎曰悝乃蒯聵姊子而稱舅者周禮同姓臣曰伯叔父異姓臣曰伯叔舅歟興舊嗜欲言孔悝之父圉能興行先祖舊徳所欲為也休哉言功徳休美悝拜至彝鼎明孔悝拜受君恩言已光揚先祖之徳君之勤大命著於彝鼎也但休哉以上是稱其先祖公曰叔舅以下至彞鼎是自著其名於下是以身比焉比先祖也方氏慤曰叔舅蓋莊公尊孔悝而稱之與曲禮天子稱異姓之牧曰叔舅同啓右者非特左右以助之而又啓道之也纂乃祖服者繼汝祖事也施於烝彝鼎者施其銘於烝祭之二器也必於烝祭之器與司勲凡有功者祭於大烝同義彝亦有銘止曰鼎銘者舉重以該之也無美而稱之則不足以取信於人故曰是誣也有善而弗知則其明不足以見之也知而弗傳則其仁不足以與之也為人之子孫不明不仁而且誣焉則辱莫甚矣應氏鏞曰嗜欲者心志之所存其先世之忠皆以愛君憂國為嗜欲慕尚而能興起之也先世纂乃祖服今有纂乃考服者世濟其美也存疑鄭氏康成曰率循也慶善也士之言事也言文叔興起先祖之舊徳而循其善事對遂也辟明也言遂揚君命以明我先祖之徳勤大命謂我將行君之命也方氏慤曰辟蓋辭遜之也對揚吾君之休美而不敢自當故辟之辨正應氏鏞曰古慶卿同音同用慶雲謂之卿雲作率卿士謂奮起而倡率之案詩王命卿士書周公以蔡仲為已卿士是不特天子有卿士即諸侯亦有卿士也朱子曰卿士位卑而權重陸氏佃曰辟君也勤大命言命大且勤對掦以君之勤大命猶言對揚天子之休命案詩對揚王休朱注對答揚稱也又詩恩斯勤斯朱注勤篤厚也王氏應麟曰案通鑑外紀目録是年六月丁未朔則無丁亥當闕疑案記者聞古鼎有銘稱先祖之美為孝子孝孫之心而所見惟孔悝一銘故録其辭以存銘式而悝之非其人記者亦知之故慨懐古之君子以無美而稱為誣而可恥下又述周公事見必如周公而後能重其國家然則自名豈易言哉或責記者以君子稱悝是與爭亂造端恐未審其立言之意也昔者周公旦有勲勞於天下周公既沒成王康王追念周公之所以勲勞者而欲尊魯故賜之以重祭外祭則郊社是也内祭則大嘗禘是也夫大嘗禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之樂也康周公故以賜魯也子孫纂之至於今不廢所以明周公之徳而又以重其國也佾音逸正義鄭氏康成曰言此者王室所銘若周公之功也清廟頌文王之詩也佾猶列也大夏禹樂文舞也執羽籥文武之舞皆八列互言之耳康猶襃大也易晉卦曰康侯用錫馬不廢不廢其禮樂也重猶尊也孔氏頴逹曰此因上說鼎銘明先祖之善故此明周公之勲子孫纂之特重於餘國亦光掦之事諸侯常祭惟社稷以下魯之祭社與郊連文則用天子之禮也用天子禮則升歌清廟及舞大武大夏之屬所以為大嘗禘也經云八佾以舞大夏舞大武不顯佾數則知亦八佾故鄭云互言之至今謂作記時也陳氏祥道曰禮以祭祀為先樂以歌舞為備郊社天子外祭之重者大嘗禘天子内祭之重者天子秋嘗以享先王謂之大嘗夏禘以享先王謂之大禘案天子時祭未聞稱大陳氏蓋依記文為說耳則諸侯嘗禘不得謂之大矣周公之廟得用天子之禮雖祭祀以之可也大武武王之樂也朱干玉戚以舞之所以象征誅大夏姒禹之樂也八佾以舞之所以象揖遜周公之廟得用天子之樂雖歌舞以之可也大嘗禘用天子禮樂如此則郊社可知矣周公封於魯而不之魯魯之子孫纂之於今不廢用之周公廟足以明周公之徳用之魯公廟雖欲尊魯以重其國未免為僭矣孔子曰魯之郊禘非禮也周公其衰矣方氏慤曰郊社所以祭天地故曰外嘗禘所以祭祖宗故曰内禘為五年之祭故謂之大嘗為四時之祭亦謂之大者以天子所賜禮樂比諸侯尤隆也舞所以節八音而行八風所以應八卦故每佾又用八人合而為六十四焉則重卦之象也自諸侯而下則取降殺以兩而已言舞大夏如此則大武可知曲禮曰外事用剛日然不謂郊内事用柔日然不謂社而此以郊社為外祭何也以天地為大故郊對社不可以内外言其事以神人為别故嘗禘對郊社或可以内外言其祭焉存疑鄭氏康成曰管象吹管而舞武象之藥也朱干赤盾戚斧也此武象之舞所執也孔氏頴達曰祫祭在秋大嘗禘在夏陳氏祥道曰維清奏文王象武之事案維清是象詩武則大武六章也陳氏以為奏文王象武之事誤案本文四句升歌與下管對大武與大夏對鄭合象武為一誤矣象有但吹以管者此下管象是也有舞以籥者左傳象箾南籥是也象舞以羽籥是文舞武舞以干戚是武舞不可合為一且燕禮鄉飲禮升歌鹿鳴三詩下管南陔三詩吹者未必舞也禘有時祫而秋祭曰嘗疏乃謂祫在秋而嘗禘在夏又誤辨正郝氏敬曰子孫能揚先美謂之至孝聖人所以教天下後世象賢也其辭莫詳於詩書雅頌訓誥皆對揚祖徳足為後世法蒯聵父子相夷孔悝之勲衛之羞也魯僭禮樂周公之衰也記者特引二國之事繫之祭統之末倘夫子刪詩繫魯頌之意歟不然則記者之無識耳案禘祫年月先儒論說紛紜當以張子横渠及張純之說為正五年一禘三年一大祫舊說相沿巳久獨張子謂禘祫每嵗舉行據周官大司樂追享為禘朝享為祫總名閒祀張純云禘以四月閒於春夏祫以十月閒於秋冬十月之祫乃合已毁廟之主享於太廟是為大祫與夏秋冬三時所云礿禴祫嘗祫烝但合未毁廟主享於大廟者不同疏言禘在夏猶可通連大嘗則謬至云祫祭在秋尤誤欽定禮記義疏巻六十二
