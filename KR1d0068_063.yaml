body:
  text: 經解第二十六正義孔氏穎達曰案鄭目録云名曰經解者以其記六藝政教之得失也此於别録屬通論皇氏侃曰解者分析之名此篇分析六經體教不同故云經解六經其教雖異總以禮為本故記者録入於禮案古無六經名春秋未經筆削則魯一國之史與晉乘楚檮杌等耳不得謂之經晉韓起聘魯見易象春秋曰周禮盡在魯矣是易春秋可統名禮也周禮大司樂為宗伯之屬是樂亦禮也漢儒因孔子所贊修刪定者始名之曰六經而又託為孔子常有此言亦近誣矣首一節家語則與間居天有四時節相屬此與天子者與天地參相屬又後儒各以其意掇拾補綴更不足深辨也孔子曰入其國其教可知也其為人也溫柔敦厚詩教也疏通知逺書教也廣博易良樂教也潔靜精微易教也恭儉莊敬禮教也屬辭比事春秋教也故詩之失愚書之失誣樂之失奢易之失賊禮之失煩春秋之失亂易良之易以豉反屬音燭比毗志反正義鄭氏康成曰觀其風俗則知其所以教屬猶合也春秋多記諸侯朝聘會同有相接之辭罪辨之事失謂不能節其教者詩敦厚近愚書知逺近誣春秋習戰爭之事近亂孔氏穎達曰入國而其教可知者言人君以六經之道各隨其民教之民從上教各從六經之性觀民風俗則知其教也溫謂顔色溫潤柔謂情性和柔詩依違諷諫不指切事情書録帝王言誥舉其大綱事非繁密是疏通上知帝皇之世是知逺樂以和通為體無所不用是廣博使人從化是易良易之於人正則獲吉邪則獲凶不為淫濫是潔靜窮理盡性言入秋毫是精微禮以恭遜節儉齊莊敬慎為本若人能恭敬節儉是禮之教也比近也春秋比次褒貶之事是比事也凡人君行此六經之教以化於下在下染習其教還有六經之性故云詩教書教之等人君用之教下不能可否相濟節制合宜所以致失也方氏慤曰詩言其志書言其事樂言其情易言其道禮言其體春秋言其法莊子曰詩以道志書以道事禮以道行樂以道和易以道隂陽春秋以道名分其義正與此合蔽於溫柔敦厚而不知通之以權所以為愚蔽於疏通知逺而不知疑而闕之所以為誣蔽於廣博易良而不知禮以節之所以為奢蔽於潔靜精微而不知有以顯之則失之賊蔽於恭儉莊敬而不知有以神之則失之煩蔽於屬辭比事而不知有以謹之階其僭上之患則失之亂也陸氏佃曰詩之事近易之事深故詩之失愚易之失賊不言失之而言之失者六經無失也學者之失而巳書之失誣如孟子所謂以至仁伐至不仁何其血之流杵也詩敦厚近愚樂廣博近奢禮恭敬近煩春秋撥亂多權宜故其失亂葉氏夢得曰教者上所以勉下經者所以助成其教也詩之規刺嘉美要使人歸於善而巳仁之事也故其教則溫柔敦厚書之紀述治亂要使人考古驗今而巳智之事也故其教則疏通知逺樂能和同天人之際其教也動蕩血脈流通精神故廣博易良易能順性命之理其教也吉凶與民同患而退藏於密故潔靜精微禮節民心其教也使人飾貌以正其行故恭儉莊敬春秋言約而意隱其教也使人美不過實貶不損美故屬辭比事蓋詩書以政教之本而為序樂與易以道德之妙而為序禮與春秋以治人修身之事而為序也六者之失蓋不深求其理故也易曰唯深也故能通天下之志餘論孔氏穎達曰詩為樂章詩樂是一而教别者若以聲音干戚教人是樂教也若以美刺諷諭教人是詩教也此為政以教民故有六經若教國子弟於庠序之內則唯用四術故王制云春秋教以禮樂冬夏教以詩書是也聖眀之君為民之父母者則能恩惠下及於民則詩有好惡之情禮有政治之體樂有諧和性情者能與民至極民同上情故孔子間居云志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉是也其書易春秋非是恩情相感與民至極者故孔子間居無書易及春秋也應氏鏞曰樂正崇四術以訓士則先王之詩書禮樂設教固久易雖用於卜筮而精微之理非初學所可語春秋雖本其紀載而策書亦非民庶所得窺故易象春秋韓宣子適魯始得見之則諸國之教未必盡備六者存疑鄭氏康成曰易精微愛惡相攻逺近相取則不能容人近於傷害孔氏穎達曰易理微密相責褊切不能含容人不與己同浪被傷害是失於賊也案此猶孟子云惡其鑿是有害於理不是害人又曰聚合會同之辭是屬辭案辭是載事之文所謂其文則史也不止是會同之辭案詩以理情性書以道政事樂以養德性易以道隂陽禮以謹節文春秋以辨是非皆足以為教學者過而失中皆不能無弊習於淳厚而不察人之情偽則失之愚博於傳聞而不能知人論世則失之誣好樂而雜以鄭衛則淫心蕩志而入於奢窮幽極渺而惑於術數則違叛正道而入於賊迂拘曲謹而不知禮之用和為貴則煩抑揚豫奪而是非頗謬於聖人則亂後世經學如書傳謂文王稱王九年周公踐天子位七年皆是誣李尋京房之説易穿鑿破碎亦是賊説春秋者謂孔子許祭仲之廢君大衛輒之拒父直是亂其為人也溫柔敦厚而不愚則深於詩者也疏通知逺而不誣則深於書者也廣博易良而不奢則深於樂者也潔靜精微而不賊則深於易者也恭儉莊敬而不煩則深於禮者也屬辭比事而不亂則深於春秋者也正義鄭氏康成曰言深者既能以教又防其失孔氏穎達曰此言以詩化民雖用敦厚能以義節之欲使民雖敦厚不至於愚則是在上深達於詩之義理能以詩教民也故曰深於詩餘放此陳氏祥道曰大樂必易廣博易良而不奢深於樂教者也大禮必簡恭儉莊敬而不煩深於禮教者也然奢者樂之失煩者禮之失極其深救其失則禮樂之教常興而不廢然則入其國其教有不知之邪天子者與天地參故德配天地兼利萬物與日月並眀眀照四海而不遺微小其在朝廷則道仁聖禮義之序燕處則聽雅頌之音行步則有環佩之聲升車則有鸞和之音居處有禮進退有度百官得其宜萬事得其序詩云淑人君子其儀不忒其儀不忒正是四國此之謂也正義鄭氏康成曰道言也環佩佩環佩玉也所以為行節也玉藻曰進則揖之退則揚之然後玉鏘鳴也環取其無窮止玉則比德焉孔子佩象環五寸人君之環其制未聞也鸞和皆鈴也所以為車行節也韓詩內傳曰鸞在衡和在軾前升車則馬動馬動則鸞鳴鸞鳴則和應居處朝廷與燕處也進退行步與升車也孔氏穎達曰天地生養萬物天子之功與天地相參此鸞和所在謂朝祀所乘之車田車鸞在鑣故詩秦風云輶車鸞鑣箋云置鸞於鑣異於乘車是乘車鸞在衡也詩曹風鳲鳩之篇言善人君子用心均平威儀不有差忒故能正此四方之國詩之所云正聖人有禮之謂也陳氏祥道曰與天地參言其體敵也德配天地言其道同也兼利萬物言其化溥也與日月並眀眀照四海而不遺微小言其政術也方氏慤曰三而成之謂之參兩而合之謂之配配言德而參不言位者曰天子固知其為位矣與天地參故能德配天地兼利萬物日月並眀故能眀照四海不遺微小言其理則曰微言其形則曰小吳氏澄曰聖者生知之智無所不通者也在朝廷臨涖羣臣議論政事口之所道無非四德則無龎雜之言序謂言之有次第也天子與天地合德日月合眀蓋以大德敦化者言天子之一靜一動其庸言庸行無不合道以至用人處事無一不當蓋以小德川流者言自其在朝廷以下皆言盛德之威儀不差忒故能正四方諸侯之國而為天子也總論孔氏穎達曰自此至則不成一節盛明天子霸王唯有禮為霸王之器言禮之重也案聖通眀也通眀知也乾之四德以仁禮義知為序孟子四德以仁義禮知為序與此不同發號出令而民説謂之和上下相親謂之仁民不求其所欲而得之謂之信除去天地之害謂之義義與信和與仁霸王之器也有治民之意而無其器則不成正義鄭氏康成曰器謂所操以作事者義信和仁皆存乎禮孔氏穎達曰眀君在上民不須營求所欲之物自然得之是在上覆養也尚書傳稱民擊壤而歌鑿井而飲耕田而食帝力何有是不求其所欲也天不言而四時行是信天地之害謂水旱疾疫之屬及凡惡事害人者是也欲作事物必先利其器霸王必須義信和仁也方氏慤曰除去天地之害若禦大葘捍大患曰除又曰去者人除之而後其害去也馬氏睎孟曰號令之出適當人心而可否有以相濟和之至也親親者仁之始上下相親者仁之終上有恩以恤下下有力以衛上歡然相愛故謂之仁不求其所欲而得之者有以興其利也利興而其害不可以不去則又革之以除去天地之害謂之義吳氏澄曰和仁信義皆謂施於有政如器之可操持茍徒有治民之意而無此器則是雖有不忍人之心而無不忍人之政也不成謂不完成也然四者之器又須有禮故雖有政必有禮以齊之故下文遂推説禮之功用禮之於正國也猶衡之於輕重也繩墨之於曲直也規矩之於方圜也故衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圜君子審禮不可誣以姦詐圜音圓縣音元正義鄭氏康成曰衡稱也縣謂錘也陳設謂彈畫也誠猶審也或作成孔氏穎達曰此贊眀禮事之重治國之急若稱衡詳審縣錘則輕重必正繩墨審能陳設則曲直必當規所以正圜矩所以正方若詳審置設則方圜必得故皆云不可欺君子能詳審於禮則姦詐自露不可誣罔也方氏慤曰姦者不正詐者不誠禮所以止邪去偽故不可誣以姦詐馬氏睎孟曰衡也繩墨也規矩也所以喻乎禮輕重也曲直也方圜也所以喻人情為國必以禮則民有格心而事無失當猶衡之於輕重繩墨之於曲直規矩之於方圜皆無失其當也君子審禮則有節於內而觀萬物之變則賢不肖之别其能廋乎哉案正者不過使萬事各得其理而巳姦詐乃竊禮之似而亂之審者察理之精而直探其至正之本原也源頭從知言窮理來是故隆禮由禮謂之有方之士不隆禮不由禮謂之無方之民敬讓之道也故以奉宗廟則敬以入朝廷則貴賤有位以處室家則父子親兄弟和以處鄉里則長幼有序孔子曰安上治民莫善於禮此之謂也長竹丈反下同正義鄭氏康成曰隆禮謂盛行禮也方猶道也春秋傳曰教之以義方孔疏隱公三年傳文孔氏穎達曰敬讓之道為下文而起劉氏彞曰隆禮者尊重之以為民表也由禮者踐迪之以為民範也方者法也可以法者曰士無以法者曰民則敬與讓者所以使民表而範之之道與方氏慤曰隆禮所以立本由禮所以趨時立本趨時雖若不同要之不離於道而巳道無方體之於禮則有方士志於道故於有方曰士民無常心故於無方曰民吳氏澄曰禮者敬讓之道也人皆由禮則凡奉宗廟者皆敬先入朝者皆敬貴處室家者皆讓父兄處鄉里者皆讓長老敬讓之道達於宗廟朝廷室家鄉里故上不危而民不亂皆由有禮而然故曰莫善於禮存異孔氏穎達曰從篇首至此皆是孔子之辭記者乃引孔子孝經之辭以結之案首節雖未必果孔子語然記者猶必有所受之天子者以下皆記者語故一引詩一引孝經以結之敬讓之道句上當有禮者二字闕文故朝覲之禮所以眀君臣之義也聘問之禮所以使諸侯相尊敬也喪祭之禮所以眀臣子之恩也鄉飲酒之禮所以眀長幼之序也昏姻之禮所以眀男女之别也夫禮禁亂之所由生猶坊止水之所自來也故以舊坊為無所用而壞之者必有水敗以舊禮為無所用而去之者必有亂患别彼列反坊音房本又作防瓌音怪正義鄭氏康成曰春見曰朝小聘曰問其篇今亡昏姻謂嫁娶也壻曰昏妻曰姻孔疏爾雅釋親云壻之父為姻婦之父為昏據男女父母鄭注據男女之身壻昏時而迎婦則因而隨之也自亦由也孔氏穎達曰此經眀禮之所用各有所主又眀舊禮不可不用之意自此以下記者廣眀安上治民之義非復孔子之言禮於亂生之處則豫禁之若深宫固門閽寺守之諸侯夫人父母沒不得歸寧之類是也坊謂堤坊於水從來之處則豫坊障之坊壞則水必來敗乎産業也禮本防亂若謂舊禮無用而壞去之必有亂患馬氏睎孟曰春曰朝秋曰覲天子與諸侯嫌於無分諸侯朝覲以述職然後君臣之義眀大曰聘小曰問諸侯相屬以禮上有以字於下下有以承於上則不相侵陵而相尊敬也臣子之於君親無所不盡其恩尤見於喪祭之禮為其死者人之所惡而為喪禮以終之足以見其不倍逺者人之所略而為祭禮以鬼饗之足以見其不忘故曰所以眀臣子之恩也鄉飲所以尚齒故席則有上下豆則有多寡皆所以眀長幼之序也昏姻所以重禮故執贄而後見敬慎重正而後相親皆所以眀别也故昏姻之禮廢則夫婦之道苦而淫辟之罪多矣鄉飲酒之禮廢則長幼之序失而爭鬭之獄繁矣喪祭之禮廢則臣子之恩薄而倍死忘生者衆矣聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣行下孟反正義鄭氏康成曰苦謂不至不答之屬孔疏不至謂夫親迎而婦不至若詩陳風云昏以為期明星煌煌是也不苔謂夫不答於婦若邶風日月莊薑傷已不見答於先君是也孔氏穎達曰此眀禮之不可廢也鄉飲酒禮明上下長幼共相敬讓今若廢而不行則尊卑無序故爭鬬之獄繁矣喪祭之禮所以敦勗臣子恩情使死者不見背違生者常相存念若廢不行故臣子恩薄而死者見背生者被遺忘者衆矣倍畔謂據倍天子侵陵謂侵陵鄰國上經尊重者在前卑輕者在後故先朝覲後昏姻又殊别君臣故先朝後聘此經據人倫切急者在前故先昏姻後聘覲而聘覲合言者以聘覲禮廢則君臣位失倍畔侵陵其惡相通也葉氏夢得曰朝覲聘問在上者之事而民不與焉故言禁亂則始於朝覲者以安上者為序也昏姻雖在上者制之而民得與焉故言廢禮則始於昏姻者以治民者為序也故禮之教化也微其止邪也於未形使人日徙善逺罪而不自知也是以先王隆之也易曰君子慎始差若豪氂繆以千里此之謂也逺于萬反正義鄭氏康成曰隆謂尊盛之也始謂其微時也孔氏穎達曰引易繫辭文案今易無此文孔謂易繫辭是唐初猶見其文也程迥則謂易緯通卦驗文言事之初始差錯若豪氂之至小後廣大錯謬以至千里之大證禮當防於初也方氏慤曰以其微故能止邪於未形以其止邪於未形故使人日徙善逺罪而不自知吳氏澄曰禮之導人為善每在善幾方動之初其禁人為惡亦在惡幾未見之時非若其他法令刑罪之屬待其顯見而後勸率懲遏之也倘不於其始慎之至於見顯而後教之止之則其差雖若豪氂而其謬乃千里矣案易稱非一朝一夕之故其所由來者漸矣由辨之不早辨也禮别嫌眀微每從至微處早辨而豫防之使淫心佚志莫敢竊萌自然日遷善逺罪而不知易曰童牛之牿元吉學記曰禁於未發之謂豫此之謂也哀公問第二十七正義孔氏穎達曰案鄭目録云名曰哀公問者善其問禮此於别録屬通論所問二事一者問禮二者問政案大戴分問禮大昏二篇家語亦二篇小戴以俱哀公所問故合之哀公問於孔子曰大禮何如君子之言禮何其尊也孔子曰丘也小人不足以知禮君曰否吾子言之也孔子曰丘聞之民之所由生禮為大非禮無以節事天地之神也非禮無以辨君臣上下長幼之位也非禮無以别男女父子兄弟之親昏姻疏數之交也君子以此之為尊敬然長竹丈反别彼列反數色角反正義鄭氏康成曰不足以知禮孔子謙不答也以此之為尊敬言君子以此故尊禮孔氏穎達曰以禮之所用廣大故曰大禮哀公曰否止其謙讓也方氏慤曰民之所由生禮為大自事天地而下皆有生者所用之禮記曰節故祀天祭地故於事天地之神則以節言之君臣有貴賤之位上下有尊卑之位長幼有先後之位故以位言之男女父子兄弟皆門內之治故以親言之昏姻則二姓之所合疏數則朋友之所會故以交言之吳氏澄曰分之嚴者外自君臣始非君臣則有上下非上下則有長幼其位雖異而異之中有同焉所當辨也情之厚者內自男女始因男女而有父子因父子而有兄弟其親雖同而同之中有異焉所當别也昏姻自家內之兄弟而推以及異姓之兄弟也間見曰疏亟見曰數自逺外之長幼而推以及遊從之長幼也其交亦有别焉於神之大祭則舉二以包其餘於人之大倫則衍五而至於八謂君子以此禮之敬事大神辨别大倫故尊敬之如此所以答哀公禮何其尊之問也然後以其所能教百姓不廢其會節正義王氏肅曰會謂禮之所聚而不可遺處節謂分之所限而不可過處孔氏穎達曰人君既知所生由禮故尊而學之既能則以教百姓方氏慤曰以其所能教百姓者所謂以身教者也不廢其會故能觀其會通而於禮有所行不廢其節故能為之節文而於禮有所守葉氏夢得曰禮者中庸而巳中庸則不以所不能者病人其教人皆其所能也輔氏廣曰會節言禮之大分存疑孔氏穎達曰會猶期也期節謂天地君臣男女之期節陳氏澔曰期節如葬祭有葬祭之時冠昏有冠昏之時馬氏睎孟曰庶人遽於事而不可以致詳則不廢而巳吳氏澄曰禮不下庶人不求其備案君子尊禮則君子之身皆禮矣然後推之以教百姓而此禮者民所由生亦民之所能也其間有自天子至庶人心之所同然者謂之會有自天子至庶人分之所各得者謂之莭君子皆因其自然而不廢此制禮之原也鄭孔以會莭為期節不如王氏之該而馬氏吳氏以不廢為不求詳備恐亦非聖人盡人性之意有成事然後治其雕鏤文章黼黻以嗣雕本亦作雕鏤力豆反黼音甫黻音弗又以嗣家語作以别尊卑上下之等正義鄭氏康成曰上事行於民有成功乃後續以治文飾以為尊卑之差孔氏穎達曰上三事有成功然後聖人治理其雕畫刻鏤文章黼黻以嗣續其事使每事有尊卑上下文采之異吳氏澄曰君子以禮教民民從其教於禮之事既無毁缺然後制儀等之飾以示民而繼續所教猶孟子言既竭目力而繼之以規矩既竭耳力而繼之以六律也案君子內度之已外度之人得其願之同又得其分之異舉而措之使各得其分願則事成矣然心思既竭而制度品莭未詳則猶不足以垂於久逺故又為器用服物之等使繼續於無窮此禮之成也鄭孔尊卑上下即據家語以釋此而吳氏取孟子繼字訓嗣字尤極分眀存疑陳氏澔曰有成事謂諏日而得卜筮之吉事可成也其順之然後言其喪算備其鼎俎設其豕臘修其宗廟歲時以敬祭祀以序宗族即安其居節醜其衣服卑其宫室車不雕幾器不刻鏤食不二味以與民同利昔之君子之行禮者如此臘音昔幾音祈又大戴即作則節作處正義鄭氏康成曰言語也算數也即就也幾附纒之也君子既尊禮民以為順乃後語以喪祭之禮就安其居處正其衣服教之莭儉與之同利者上下俱足也孔氏穎達曰卑其宫室者制使有度不峻宇雕牆也車不雕幾使有圻鄂也常用之器不用采飾食不副二肴膳非唯教民如此而君亦不奢飾與民同其利潤古昔君子行禮如此上事刺哀公今不然方氏慤曰喪算檀弓曰劈踊哀之至也有算為之莭文也鼎俎祭器也豕臘祭物也宗廟祭所也物不止於豕臘器不止於鼎俎亦各舉其一端以互眀之爾歲時以敬祭祀即孝經所謂春秋祭祀以時思之是也以序宗族即祭統所謂昭與昭齒穆與穆齒是也自即安其居至食不二味皆言其以儉為德也儉者不奪人故能與民同其利葉氏夢得曰君子嚴於事鬼神而儉於奉己禹之克勤克儉而致美乎黻冕致孝乎鬼神盡力乎溝洫蓋此意也存疑輔氏廣曰即安其居猶艮之言止其所也安於其所止然後以人君之尊國家之富而自奉養者有莭如下所云也鄭氏康成曰醜類也孔氏穎達曰設其豕臘謂喪中之奠修其宗廟謂除服之後為之宗廟以鬼享之以序宗族謂祭末留同姓燕飲即安其居即就也隨其山川溪谷之異而安之不使山者居川渚者居中原莭醜其衣服莭正也正民衣服使各得其類衣服異宜器械異制是也陸氏佃曰宗族即安句言如上所謂而後宗族即安也其居節句言君子所以自安養之節吳氏澄曰言喪祭乃及安其居者先之以哀死而終以樂生洪範八政三曰祀四曰司空司空居民之官也案其順之七句言以禮道民即安其居節七句言躬行節儉以率民君子制禮非以強民故民順之鼎俎豕臘統吉凶諸祭言言豕臘舉下也以民所得用者也大戴禮作則安其居處則此當以即安其居莭為句孔陸斷句皆非喪算有三年至三月之殊鼎俎有六牲至無牲之異宗廟有七廟至祭寢之差宗族有百世不遷五世則遷之别而後節事辨位别親交者無不繼續於無窮然因雕鏤文章黼黻而欲窮工極麗則反縱欲而失會莭之本然故君子於己之居處服食器用無不從儉以留不盡之利於民此又行禮之善也公曰今之君子胡莫之行也孔子曰今之君子好實無厭淫德不倦荒怠敖慢固民是盡午其衆以伐有道求得當欲不以其所昔之用民者由前今之用民者由後今之君子莫為禮也好呼報反敖五報反午五故反當丁浪反正義鄭氏康成曰實猶富也淫放也固猶故也午其衆逆其族類也當猶稱也所猶道也由前用上所言由後用下所言孔氏穎達曰實謂財貨充實言今之君子性行貪婪好貨不知厭足使人財力於是盡竭專意自縱不順衆心是逆忤族類也守道者被害是伐有道也求其所得必須稱己所欲不用其道葉氏夢得曰莫非好也從於無厭亦謂之好莫非德也淫色不倦亦謂之德故好有邪正德有吉凶方氏慤曰好實無厭言貪而不知足淫德不倦言過而不能改荒於事故其心怠敖於物故其心慢固民是盡謂其或盡民之力而不計其勞或盡民之財而不計其費也衆者人之所順而反午之有道者人之所尊而反伐之求其得而巳不顧於義也當所欲而巳不循於理也若是則動皆失其所矣故曰不以其所也用民即君子也以其有君國子民之位故以用民言之陳氏澔曰固如固獲之固言取之力也盡竭其所有也通論黃氏乾行曰哀公用田賦是好實無厭固民是盡也多嬖寵是淫德不倦荒怠傲慢也伐邾伐齊是午其衆以伐人止求當欲不以其道宜鼷鼠食郊牛角桓僖宫災而莫為禮也孔子侍坐於哀公哀公曰敢問人道誰為大孔子愀然作色而對曰君之及此言也百姓之德也固臣敢無辭而對人道政為大愀七小反又音秋又子了反又家語德作惠正義鄭氏康成曰愀然變動貌作變也德猶福也辭讓也方氏慤曰中庸曰人道敏政故人道政為大陳氏澔曰敢無辭猶言豈敢無辭總論孔氏穎達曰自此至國家順矣明哀公問政之事自此至終篇皆侍坐而言也公曰敢問何謂為政孔子對曰政者正也君為正則百姓從政矣君之所為百姓之所從也君所不為百姓何從正義鄭氏康成曰君為正言君當務於正周氏諝曰君之所為則好也既好矣雖罰之民不從也君所不為則惡也既惡矣雖賞之民不從也故曰君為正則百姓從政矣公曰敢問為政如之何孔子對曰夫婦别父子親君臣嚴三者正則庶物從之矣别彼列反正義鄭氏康成曰庶物猶衆事也吳氏澄曰三綱人倫之大者庶物庶事之小者大綱先正則小者莫不正矣公曰寡人雖無似也願聞所以行三言之道可得聞乎孔子對曰古之為政愛人為大所以治愛人禮為大所以治禮敬為大敬之至矣大昏為大大昏至矣大昏既至冕而親迎親之也親之也者親之也是故君子興敬以為親舍敬是遺親也弗愛不親弗敬不正愛與敬其政之本與迎逆敬反舍音捨與音餘下並同正義鄭氏康成曰無似猶言不肖大昏國君娶禮也至言至大也興敬為親言相敬則親孔氏穎達曰公謙言已愚蔽無能似類賢人也人有禮則生所以治愛人非禮不可禮以敬為主故治禮則先敬敬有大小若敬之至極之中天子諸侯之大昏又為大也君子冕而親迎興起敬心為欲相親若舍敬心是遺棄相親之道也不敬於婦則室家之道不正矣親愛則仁也尊敬則義也仁義政教之本也方氏慤曰迎必冕所以致其敬迎必親所以致其親故曰親之也者親之也冕而親迎可謂敬矣故曰興敬為親舍敬是遺親也弗愛則無以相合而其親疏弗敬則無以相别而其情褻愛敬之道其始雖本之閨門之內夫婦之間及乎廣而充之其愛至於不敢惡於人其敬至於不敢慢於人而德教加於百姓刑於四海故曰愛與敬其政之本與存疑孔氏穎達曰冕服自迎欲親此婦人所以親此婦人欲使婦人亦親己也辨正輔氏廣曰冕而親迎躬親之也躬親之者所以致其親愛之意也是興敬所以為親也彼以褻為親者未要其終也唯敬以為親則愛得其正故能愛興敬則夫婦别父子親君臣嚴矣而大昏又其總也案哀公十一年孔子自衛反魯時公年十四大昏未成其後立公子荆之母為夫人而以荆為太子國人惡之又患三桓之侈欲以越伐魯而去之因遜於邾遂如越然則哀公之所以失國者非庶物也三綱不正而已易曰有夫婦然後有父子有君臣是庶物以三者為綱而三綱又以夫婦為本夫婦全在正始上閨門王化之始也古今至理要不外是公曰寡人願有言然冕而親迎不巳重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂巳重乎正義輔氏廣曰願有言然疑似之意不敢以為是也鄭氏康成曰巳猶大也怪親迎乃服祭服孔疏冕則祭服也天子則衮冕諸侯以下各用助祭之服故士昏禮主人爵辨服是也先聖周公也孔疏以答哀公所問故解先聖為周公存疑孔氏穎達曰昏禮親迎二傳不同春秋公羊説自天子至庶人皆親迎左氏説天子至尊無敵故無親迎之禮諸侯有故若疾病則使上卿迎上公臨之許氏謹案髙祖時皇太子納妃叔孫通制禮以為天子無親迎從左氏義也鄭駁之云太姒之家在渭之涘文王親迎于渭即天子親迎眀文也引禮記冕而親迎繼先聖之後以為天地宗廟社稷之主非天子則誰乎如鄭此言從公羊義也又詩説文王親迎于渭時猶為西伯左氏義為長鄭駁未定方氏慤曰夏后氏迎於庭殷人迎於堂周人迎於户周氏諝曰三年之喪人道之終故自天子達於庶人特其葬有遲速之别耳親迎者人道之始亦必自天子達於庶人特其地有逺近之别耳詩曰文王親迎於渭之陽以王禮追美之而言其近也韓侯迎止于蹶之里以侯禮而言其逺也及後世或俟于堂而詩人言之或其臣為之逆而春秋書之皆失也存異孔氏穎達曰魯得郊天故云天地社稷之主馬氏睎孟曰蓋因魯言之辨正朱子曰天地蓋通天子而言胡氏安國曰娶妻必親迎禮之正也天子不親迎使卿迎公監之禮也案桓公八年逆王后于紀傳若夫邦君以爵則有尊卑以國則有大小以道途則有逺邇或迎之於其國或迎之於境上或迎之於所館禮之莭也紀侯於魯以小大言則親之者也而使履緰來魯侯於齊以逺邇言則親之者也而使公子翬往是不重大昏之禮而失其莭矣故書案桓三年公子翬如齊迎女傳案親迎之説惟胡氏最酌其中天子不親迎於其國不可與諸侯為賔也二王之後則迎之於境其餘則迎之於館迎之於境迎之於館則亦親迎矣推此而言則天子之迎后其禮可想矣公曰寡人固不固焉得聞此言也寡人欲問不得其辭請少進孔子曰天地不合萬物不生大昏萬世之嗣也君何謂巳重焉孔子遂言曰內以治宗廟之禮足以配天地之神眀出以治直言之禮足以立上下之敬物恥足以振之國恥足以興之為政先禮禮其政之本與焉於虔反正義鄭氏康成曰固不固言吾由鄙固故也皇氏侃曰上固言己之固陋下固言若不鄙固則不問焉得聞此言哉請少進欲其為言以曉已宗廟之禮祭宗廟也夫婦配天地有日月之象焉禮器曰君在阼夫人在房大明生於東月生於西此隂陽之分夫婦之位也直猶正也正言謂出政教也昏義曰天子聽外治后聽內職外內和順國家理治是也物猶事也事恥臣恥也振猶救也國恥君恥也君臣之行有可恥者禮足以救之足以興復之方氏慤曰請少進猶言請益也馬氏睎孟曰物恥恥之小國恥恥之大昔弛而今起謂之振昔廢而今舉謂之興胡氏銓曰易於咸恆眀昏姻夫婦之義於咸曰天地感而萬物化生於恆曰天地之道是配天地之神眀於咸男下女上於恆男上女下是立上下之敬物人物也人恥卿大夫辱也國恥君辱也存疑朱子曰孔子遂言曰至禮其政之本與當在上其政之本與下陳氏澔曰直言或云當作朝廷字孔子遂言曰昔三代眀玉之政必敬其妻子也有道妻也者親之主也敢不敬與子也者親之後也敢不敬與君子無不敬也敬身為大身也者親之枝也敢不敬與不能敬其身是傷其親傷其親是傷其本傷其本枝從而亡三者百姓之象也身以及身子以及子妃以及妃君行此三者則愾乎天下矣大王之道也如此則國家順矣妃芳菲反愾許乞反又許氣反大音泰正義鄭氏康成曰愾猶至也大王居豳為狄所伐乃曰土地所以養人也君子不以其所養害所養孔疏此取莊子及吕氏春秋文乃去之岐是言百姓之身猶吾身也百姓之妻子猶吾妻子也不忍以土地之故而害之去之岐而王迹興焉王氏肅曰大王愛薑女國無鰥民是愛己之身及己之妻子推而愛民之身及民之妻子也孔氏穎達曰上經孔子答哀公以問政之事此遂廣言三代眀王為政之道敬其妻子及其身乃可施政教於天下有道者謂三代敬其妻子必有道理妻所以共粢盛祭祀與親為主故云親之主也前泛言故云妻此論人君治國政故云妃也人君行此三事從近而能廣至於天下矣惟大王能然故云大王之道也劉氏彞曰大雅云古公亶父來朝走馬率西水滸至于岐下爰及薑女聿來胥宇此大王所以敬大薑而興其國恥者也又曰文定厥祥親迎于渭造舟為梁不顯其光此文王所以敬大姒而敬先聖也君子所以敬其身非謂我自尊也身雖在我其氣與性則受之於親傳之於祖非已得以輕而辱之也故曰不敬其身是傷其親也猶傷其根本者枝幹必從之而亡敢不敬慎而培之以禮乎三者非獨君然百姓亦然也故其身也妻也子也莫不肖象於我也案愾字從心從氣有志氣充足無間意我敬其身使人各敬其身我敬其妻子使人各敬其妻子則志氣之所至直充塞乎天地矣公曰敢問何謂敬身孔子對曰君子過言則民作辭過動則民作則君子言不過辭動不過則百姓不命而敬恭如是則能敬其身能敬其身則能成其親矣正義鄭氏康成曰則法也民者化君者也君之言雖過民猶稱其辭君之行雖過民猶以為法孔氏穎達曰哀公因上言敬身故此問敬身之事孔子對以敬身之理馬氏睎孟曰言動者敬身之所宜慎也擬之而後言則無過言議之而後動則無過動過言而民作辭過動而民作則以貴者賤者之所矜式也上者人之所視效也言而世為天下法動而世為天下則不命而民敬恭能敬身之效也能敬其身則能立其身能揚其名以顯父母故能敬其身則能成其親公曰敢問何謂成親孔子對曰君子也者人之成名也百姓歸之名謂之君子之子是使其親為君子也是為成其親之名也巳孔子遂言曰古之為政愛人為大不能愛人不能有其身不能有其身不能安土不能安土不能樂天不能樂天不能成其身樂音洛正義鄭氏康成曰有猶保也不能保身者言人將害之也孔疏人害之故不能保有其身不能安土動移失業也孔疏避其禍害流移失業是不能安土不能樂天不知己過而怨天也孔氏穎達曰此答哀公成親之問遂廣眀成身之理己能成則百姓歸己善名謂之君子之子是已之修身使其親有君子之名是成親也朱子曰不能有其身謂不能持守其身而陷於非僻安土謂安其所處之位樂天謂樂循天理張子曰愛人然後保其身能保其身則不擇地而安不擇地而安則所樂者天矣夫達於天則成性而成身矣愛人至於成身亦無先後之分造道大原闕一不可仁義忠恕學一而天理具在王氏安石曰所遇於地者不擇而安之謂之安土所受於天者不怨而樂之謂之樂天治民至於樂治之至也修身至於樂修之至也吳氏澄曰愛人者天下之人與我同一氣故均愛之有其身謂吾身所受於天者能全所付而有之也能全所付則隨其所處之地而能安故曰安土能安土則此身常在天理中及爾出王及爾遊衍無入而不自得故曰樂天夫如是盡性踐形者也全體大用於身無一虧缺故曰成身公曰敢問何謂成身孔子對曰不過乎物正義鄭氏康成曰物猶事也孔氏穎達曰成身之道但萬事得中不有過誤則諸行並善所以成身也葉氏夢得曰詩曰天生蒸民有物有則孟子曰萬物皆備於我子思曰不誠無物所謂物者凡吾身所具有者也應氏鏞曰性分之內萬物皆備即物而觀其理尤實即其身之所履皆在義理之內而不過焉猶大學所謂止於仁止於孝也違則過之止則不過矣夫物有定理理有定體雖聖賢豈能加毫末於此哉亦循循然而不過耳辨正朱子曰家語作夫其行已不過乎物謂之成身不過乎物是天道也以上下文推之當從家語公曰敢問君子何貴乎天道也孔子對曰貴其不巳如日月東西相從而不巳也是天道也不閉其久是天道也無為而物成是天道也已成而眀是天道也正義鄭氏康成曰巳止也是天道者言人君法之當如是也王氏肅曰不閉言能通其久言無極孔氏頴達曰孔子又答貴天道之事無為而成言春生夏長不見天之所為而萬物得成巳成而眀言天之生物成就而功眀著人君皆當法之也劉氏彝曰天道至誠無息所謂唯天之命於穆不巳也君子貴之純亦不巳焉然其不巳者一動一靜互為其根如日往則月來月往則日來是以不窮其久無私無營而萬物自然各得其成及其既成皆粲然可見也蓋其機緘密運而不巳者雖若難名而成功則昭著也無為而成者不見其為之之迹而但見有成也此唯天為大唯堯則之蕩蕩乎民無能名焉巍巍乎其有成功也煥乎其有文章之謂也陳氏澔曰日月相從不巳繼眀照於四方也不閉其久窮則變變則通也無為而成不言而信不怒而威也巳成而眀為法於天下可傳於後世也存異鄭氏康成曰日月相從君臣相朝會也不閉其久通其教政不可以倦也辨正朱子曰不閉其久家語作不閉而能久當從家語案不閉者誠於中必形於外所謂徴也能久者存於中者不息則久其徴於外亦悠久無疆也無為而物成者悠久所以成物漸仁摩義久道化成也巳成而眀成物之功光被四表格于上下也公曰寡人憃愚冥煩子志之心也憃如容反志音識正義鄭氏康成曰志讀為識識知也冥煩者言不能眀理此事子之心所知也欲其要言使易行孔氏穎達曰此公欲孔子陳所行何事能如天不巳方氏慤曰憃言迷而無覺愚言昧而不靈冥則不辨於事煩則不當於物孔子蹴然辟席而對曰仁人不過乎物孝子不過乎物是故仁人之事親也如事天事天如事親是故孝子成身蹴子六反辟音避正義鄭氏康成曰蹴然敬貌物猶事也事親事天孝敬同也孝經曰事父孝故事天眀舉無過事以孝事親是所以成身孔氏穎達曰仁人於事無過失孝子事親亦於事無過也仁人事親以敬如事天相似事天以孝愛如事親相似據其泛愛則稱仁人據其事親則稱孝子沈氏清臣曰舉天地萬物之理備於我者皆物也是物也各有則焉人皆有是物則不可過也過則非天理也真氏德秀曰先儒張氏作西銘即事親以眀事天之道大略謂天之豫我以是理也莫非至善而我悖之即天之不才子也具人之形而盡人之性即天之克肖子也禍福吉凶之來當順其正天之福澤我者非私我也豫之以為善之資乃所以厚其責譬之事親則父母愛之喜而不忘也天之憂戚我者非厄我也將以拂亂其心思而增其所不能譬之事親則父母惡之懼而不怨也即此推之親即天也天即親也其所以事之者豈容有二哉夫事親如天孝子事也而孔子以為仁人蓋孝之至則仁矣張氏之論極其精詳當即全書而熟復之又曰慶雲甘露天之喜也迅雷烈風天之怒也善事天者必於此焉察之父母者子之天也察之可不謹乎案對天則為仁人對親則為孝子其實事天此物事親亦此物孝子仁人一不過乎物盡之因物賦物是身所由來隨物體物是身所由成公曰寡人既聞此言也無如後罪何孔子對曰君之及此言也是臣之福也正義鄭氏康成曰此公聞言欲勤行之也後罪謙辭此言善言也欽定禮記義疏卷六十三
