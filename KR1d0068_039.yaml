body:
  text: 内則第十二之一正義孔氏頴達曰案鄭目録云名曰内則以其記男女居室事父母舅姑之法此於别録屬子法以閨門之内軌儀可則故曰内則朱子曰此古學校教民之書葢古經也案中有曾子語疑曾子之徒所記通論張氏怡曰此篇專主教家者言故名内則然非在人上者命官垂訓下民何能知而由之故首冠以王命冢宰降徳案司徒掌邦教而内則命冡宰布之者冡宰掌王后之内治凡王之膳悉屬焉文王為世子於食上食下皆親在視武王帥而行之則子婦孝敬之事皆王為世子時率妃行之而世為則者也故凡民之家禮亦使布焉王政重飬老而孟子曰導其妻子使飬其老故篇中言生子教子飬老事似各殊而意只一貫后王命冢宰降徳于衆兆民正義鄭氏康成曰后君也孔疏君謂諸侯王謂天子不先言王辟天子妃后之嫌也經據諸侯而言王互明天子也徳猶教也萬億曰兆孔疏億之數有大小二法其小數以十為等十萬為億十億為兆也其大數以萬為等萬至萬是萬萬為億又従億而數至萬億曰兆億億曰秭兆在億秭之間是大數之法鄭以此據天子天下之民故以其大數言之天子曰兆民諸侯曰萬民孔疏閔元年左傳文孔氏頴達曰此論子事父母由后王之教使之然故先云施教之法降下也餘論吕氏大臨曰内則一篇首言后王命冡宰降徳于衆兆民葢三代所以教天下者皆以是自秦漢以来外風俗而論政事不復以人家事為問矣存疑鄭氏康成曰周禮冢宰掌飲食司徒掌十二教此據諸侯孔疏篇中有飲食有教令諸侯三卿司徒兼冢宰故知據諸侯也辨正朱子曰注䟽言諸侯司徒兼冢宰是也但此上言后王之命則冢宰寔天子之冡宰耳葢周禮大宰掌建邦之六典而二曰教典則教民雖司徒之分職而冡宰無所不綂故以其重者言之其在諸侯則亦天子之宰施典於邦國而諸侯承之以教其民自不害於冡宰為司徒之兼官也子事父母雞初鳴咸盥漱櫛縰笄總拂髦冠緌纓端韠紳搢笏左右佩用左佩紛帨刀礪小觽金燧右佩玦捍管遰大觽木燧偪屨著綦盥古玩反漱所救反徐素遘反下同櫛側乙反縰所綺反笄古兮反總子孔反髦音毛緌耳隹反韠音必紳音申搢音晉又音薦笏音忽紛芳云反或作帉帨始鋭反觽許規反本或作鑴燧音遂捍户旦反遰時世反徐作滯偪本又作幅彼力反屨九具反綦其記反下同正義鄭氏康成曰咸皆也縰韜髮者也孔䟽士冠禮云緇纚長六尺鄭云纚一幅長六尺足以韜髮而結之盧云所為以裹髻承冠以全幅叠而用之未知孰是案盧説優總束髮也垂後為飾孔疏裂繒為之束髪之本垂餘于髻後以為飾拂髦振去塵著之髦用髮為之象㓜時鬌其制未聞項氏安世曰髪作偽髻垂兩眉上陳氏澔曰象㓜時翦髮為鬌之形孔䟽明事親恒有孺子之義緌纓之飾也孔疏結纓頷下以固冠結之餘者散而下垂謂之緌端𤣥端士服也孔疏特牲禮士祭服𤣥端庶人深衣孔疏深衣服之最下者庶人賤故服之紳大帶所以自紳約也搢猶扱也扱笏於紳笏所以記事也左右佩用自佩也必佩者偹尊者使令也紛帨拭物之佩巾也今齊人有言紛者刀礪小刀及礪礱也小觿觧小結也觿貎如錐以象骨為之金燧可取火於日陸氏徳明曰燧火鏡捍謂拾也言可以捍弦也孔䟽拾歛也郷射大射将射謂之遂射罷謂之拾管筆彄也遰刀鞞也木燧鑚火也孔疏皇氏侃云晴則以金燧取火於日隂則以木燧鑚火也偪行縢綦屨繋也孔䟽皇氏云屨頭施繋以為行戒或云著屨時屨自有繋以結于足也屨案皇氏所云即絇在屨首孔氏所云綦在跟孔氏頴達曰自此以下至不敢私祭以上縂論在内法則子事父母婦事舅姑男女出入之禮長㓜相事之法此論子事父母之法也盥謂洗手漱謂漱口縰笄以縰韜髮作髻既訖横施此笄於髻中以固髻非固冠之笄故文在冠上此經所陳皆依事先後櫛訖加縰縰訖加笄笄訖加縂然後加髦著冠冠畢然後服𤣥端著韠又加大帶也皇氏侃曰左旁用力不便故佩小物右廂用力為便故佩大物劉氏彝曰子生三月翦其胎髮為鬌帯之於首男左女右迨其笄冠也則綵飾之加於冠謂之髦者不忘父母生育之恩也父母喪則徹之詩云髧彼兩髦寔維我儀是也右佩玦者䕶巨指以開弦也捍者著左臂以遂矢也方氏慤曰左右皆事佩也故言用與徳佩異矣徳欲純而有常故珩璜琚瑀同其質事則雜而應變故金石竹木異其材陳氏祥道曰偪漢謂之行縢凡有行皆有偪諸侯朝天子子事父母皆有之婦人不用故婦事舅姑無偪朱子曰綦鞋口帯也古人皆旋繋今人只従簡易綴之於上如假帯然彭氏汝礪曰大觿觧大結當亦用象骨或用鹿骨木燧榆棗桑柞槐之類婦事舅姑如事父母雞初鳴咸盥漱櫛縰笄縂衣紳左佩紛帨刀礪小觿金燧右佩箴管線纊施縏袠大觿木燧衿纓綦屨衣紳如字又於既反箴之林反線本又作綫息賤反纊音曠縏又作槃歩干反袠陳乙反又作帙衿本又作紟其鴆反正義鄭氏康成曰筓今簪也孔䟽婦人之笄異於上男子笄縰故鄭於此注始云今簪也與士冠禮爵弁笄皮弁笄同故鄭注冠禮亦云笄今之簪也喪服女子吉笄尺二寸朱子曰婦人不冠則所謂笄即為固髻之用亦名為簪而非如二弁之簪矣案上節笄縂熊氏云此安髻之筓士喪所謂用桑長四寸纋中者而孔氏亦言在冠上知非固冠之筓矣於此又言與冠弁笄同長尺二寸朱子辨之葢男婦之笄皆有二種其短者皆以固髻其長者男子以固冠婦人以固被詩所謂副笄六珈者長笄也鄭孔因本文男子言冠婦人不言被故并舉言之明婦人有二笄耳衣紳衣而著紳孔䟽謂加𤣥端綃衣而後著紳帯陳氏澔曰士妻之服縏小囊也縏袠言施明為箴管線纊有之孔疏熊氏云袠刺也以針刺袠而為縏囊餘物皆不言施獨於箴管線纊之下而言施縏袠明為四物而旌以案箴必貯以管而後納之縏二而一也若線則所紉者纊乃絲綿縂之為四物衿猶結也孔氏頴達曰此論女事父母婦事舅姑所服之衣所佩之物異於男子存疑鄭氏康成曰婦人有纓示繋屬也辨正陳氏祥道曰男女事父母婦事舅姑皆有纓以佩容臭與女子許嫁之纓不同許嫁之纓既嫁夫脱之無所復用此事舅姑之纓非許嫁之纓也案本文衿纓在設左右佩之下則以為容臭之纓是矣而謂許嫁之纓無所復用則亦不然説文嬰兒乳常近母之纓故曰嬰兒葢纓者以五采聨貝上繋於項下當心胸明有繫屬故許嫁即繋之嫁則夫親脱之此事舅姑之纓則兒乳所近之纓也以適父母舅姑之所及所下氣怡聲問衣燠寒疾痛苛癢而敬抑搔之出入則或先或後而敬扶持之進盥少者奉槃長者奉水請沃盥盥卒授巾問所欲而敬進之柔色以温之饘酏酒醴芼羮菽麥蕡稲黍粱秫惟所欲棗栗飴蜜以甘之堇荁枌榆免薧滫瀡以滑之脂膏以膏之父母舅姑必嘗之而後退燠本又作奥同於六反苛音何癢以想反搔素刀反少詩召反奉芳勇反長竹杖反後皆同溫本又作藴同於運反饘之然反酏羊皮反芼毛報反蕡字又作黂扶云反秫音述飴羊之反堇音謹荁音丸枌扶云反免音問薧苦老反滫思酒反瀡音髓滑胡八反以膏古報反正義鄭氏康成曰適之也怡説也苛疥也孔䟽以其苛與癢共文故知苛疥也抑按搔摩也先後之随時便也槃承盥水者巾以帨手温藉也承尊者必和顔色孔䟽言子事父母當和柔顔色承藉父母若藻藉承玉然酏粥也孔䟽酏旣為粥粥是薄者則饘為厚者故左傳注云饘粥也爾稚釋言云餬饘也郭景純謂糜也芼菜也孔䟽公食大夫禮三牲皆有芼牛藿羊苦豕薇也是芼乃為菜用菜雜肉為羮也蕡熬枲實孔疏此中菽豆以下供尊者所食悉皆湏熟或煮或熬荁堇類也冬用堇夏用荁孔䟽士虞禮記夏用葵冬用荁鄭注乾則滑夏秋用生葵冬春用乾荁與此不同者此經堇荁對士虞禮葵與荁相對所對不同故注有異榆白曰枌孔疏釋木云榆白枌郭景純曰枌榆先生葉却著莢皮色白免新生者薧乾也孔疏疱人供鱻薧之物鱻薧相對此經以免對薧故知免為新生方氏慤曰堇荁枌榆常用而不常有故有免有薧秦人溲曰滫齊人滑曰瀡必嘗之而後退者敬也孔氏頴達曰此論子事父母婦事舅姑至其處所奉扶沃盥之儀奉進酒醴膳羞之事以甘之者謂以棗栗飴蜜以和甘飲食以滑之者謂用堇荁枌榆相和滫瀡之令柔滑以膏之者凝者為脂釋者為膏沃之使香美此等縂謂和飲食也陳氏澔曰蕡大麻子滫説文乆泔也瀡滑也滫瀡滫之滑者也又曰此篇所記飲食珍羞諸物古今異制風土異宜不能盡暁然亦可見古人察物之精用物之詳也通論方氏慤曰於尊者則惟所欲者以血氣既衰飬之不可不順也於孺子亦惟所欲者以血氣未充飬之亦不可不順也葢飬老慈㓜之道不得不然存疑孔氏頴逹曰此免薧於周禮據肉為言熊氏皇氏皆云文承堇荁枌榆之下據堇荁等為免薧義或為然案所陳皆飬口體之事而飬志自在其中饘酏而下皆問所𣣔而敬進之之節目曰唯所欲曰必嘗之則其於父母舅姑之志可知矣方氏分下氣而下為飬志饘酏而下為飬口體非也男女未冠笄者雞初鳴咸盥漱櫛縰拂髦縂角衿纓皆佩容臭昧爽而朝問何食飲矣若巳食則退若未食則佐長者視具冠古亂反朝直遥反下而朝同正義鄭氏康成曰總角収髪結之容臭香物也以纓佩之為廹尊者朱子曰恐身有穢氣觸尊者故佩香物給小使也昧爽而朝後成人也具饌也孔氏頴達曰此論未冠笄者事親之禮臭謂芬芳方氏曰若蘭茝之物庾氏蔚之曰臭物可以修飾形容故謂之容臭以纓佩之者謂纓上著香物也方氏慤曰男角女覊此止曰角舉男以該之也不佩用而止佩臭示未能即事也㓜者於視膳之事未能專之特佐長者而已陳氏澔曰昧晦也爽明也昧爽𣣔明未明之時通論張氏怡曰未冠笄未任飬老之責然問視已習孝飬之道迨其任事不患不中矣凡内外雞初鳴咸盥漱衣服斂枕簟灑掃室堂及庭布席各從其事孺子早寝晏起唯所𣣔食無時衣如字又於既反簟徒㸃反灑又作洒所買反又所賣反埽素報反孺如樹反正義鄭氏康成曰斂枕簟不欲人見己褻者簟席之親身也孺子小子又後未成人者孔氏頴達曰此縂論子婦之外卑賤及僕𨽻之等方氏慤曰必斂枕簟則晝夜異用也灑用水掃斂塵而去之室堂及庭自内以及外也布席以待尊者之行事各従其事若女服事於内男服事於外蚤寝未與日入之夕晏起未與昧爽之朝唯所𣣔食無時以弱而未勝其制節且飬之不可不偹也由命士以上父子皆異宫昧爽而朝慈以旨甘日出而退各従其事日入而夕慈以㫖甘以上或作巳上上時掌反後放此朝直遥反正義鄭氏康成曰異宫崇敬也慈愛敬進之孔氏頴達曰此論命士以上事親異扵命士以下之禮程子曰父子異宫為命士以上愈貴則愈嚴故異宫方氏慤曰尊卑之際辨則敬同則䙝故居必異宫所以致敬也然貴者禮詳賤者禮畧故由命士以上然後父子異宫朝見曰朝夕見曰夕昧爽而朝晨省之禮日入而夕昏定之禮又曰周禮典命子男之士不命則士固有不命者陳氏澔曰慈以旨甘者謂敬愛其親以㫖甘之味致其愛也存疑鄭氏康成曰日出従事食禄不荒農也父母舅姑將坐奉席請何郷将祍長者奉席請何趾少者執牀與坐御者舉几斂席與簟縣衾篋枕斂簟而襡之奉芳勇反郷許亮反祍而鴆反又而甚反縣音元箧口協反襡音獨正義鄭氏康成曰将祍謂更臥處襡韜也湏臥乃敷之也孔氏頴達曰此論父母舅姑將坐将臥奉席等禮早旦親起侍御之人奉舉其几以進尊者使慿之斂此所臥在下大席與上襯身之簟又縣其所臥之衾以箧貯所臥之枕簟既襯身恐其穢汚故以襡韜之席則否劉氏彛曰侍父母舅姑行遊所至将坐則長者奉席而前請𣣔何郷将憩而臥於他所則長者奉席而前請祍欲何趾所以安老而優尊也請必長者長㓜之禮然坐而起寝而興几席之徹衾枕之斂則賤者尸之不必子婦也陳氏澔曰牀説文曰安身之几坐非今之臥牀也陸氏佃曰恭坐則席案坐陽故請向臥隂故請趾此偶憩之時若居主奥則向東君子之寝恒東首則趾西不必請矣長者請而少者即如其命以設之若少者力不勝牀則亦御者設之坐定然後授几臥起然後斂席言長少御者人之序言奉執舉斂事之序也父母舅姑之衣衾簟席枕几不傳杖屨祗敬之勿敢近敦牟卮匜非餕莫敢用與恒食飲非餕莫之敢飲食傳丈專反敦音對又丁雷反牟木侯反卮音支匜羊支反一音以氏反餕音俊正義鄭氏康成曰傳移也牟讀曰堥孔䟽隠義曰堥土釜今以木為噐象土釜形卮匜酒漿器孔䟽卮酒器匜盛水漿噐左傳僖二十三年懐嬴奉匜沃盥敦牟黍稷器孔疏周禮有玉敦今杯盂餕乃用之恒常也旦夕之常食餕乃食之案古者五十異粻孔氏頴達曰此論父母舅姑所服用之物子婦不得輒用所恒飲食之饌不得輒食衣衾簟席枕几侍御之人停貯常處子婦不得輒傳移嚮他處杖屨是尊者服御之重彌湏恭敬故弗敢偪近與及也接上敦牟之文非但不敢用及父母常食飲食非因餕時莫敢飲食父母在朝夕恒食子婦佐餕既食恒餕父没母存冡子御食羣子婦佐餕如初㫖甘柔滑孺子餕正義鄭氏康成曰婦皆與夫餕也每食餕而盡之末有原也孔䟽原再也佐餕者以父母食不能盡故子婦食之使盡勿使有餘而再設也御侍也謂長子侍母食也侍食者不餕其婦猶皆餕也孔氏頴達曰此論父母之食子婦餕餘之禮子婦者長子及長子之婦羣子婦謂冢子之弟及衆弟婦也如初者如上父母在子婦佐餕之禮陳氏澔曰佐餕者勸勉之使食而後餕其餘也方氏慤曰旨甘柔滑老㓜之所宜食故父母食之孺子餕之輔氏廣曰父没母存食則獨矣恐母心之傷也故冡子御食焉案婦無專制既嫁従夫故食必同牢夫死從子故冢子御食即一食不敢專也在父母舅姑之所有命之應唯敬對進退周旋慎齊升降出入揖逰不敢噦噫嚏咳欠伸跛倚睇視不敢唾洟寒不敢襲癢不敢搔不有敬事不敢袒裼不渉不撅褻衣衾不見裏父母唾洟不見冠帶垢和灰請漱衣裳垢和灰請澣衣裳綻裂紉箴請補綴五日則燂湯請浴三日具沐其閒靣垢燂潘請靧足垢燂湯請洗少事長賤事貴共帥時唯于癸反齊側皆反噦於月反噫於界反嚏音帝咳苦愛反欠邱劍反伸音申跛彼義反睇大計反唾吐臥反涕吐細反洟他計反與涕同袒音但裼思歴反撅居衛反見賢遍反垢古口反漱素侯反澣户管反綻字或作䘺直莧反紉女陳反箴之林反綴丁劣反又丁衛反燂詳亷反潘芳煩反靧音悔正義鄭氏康成曰齊荘也睇傾視也易曰明夷睇于左股案今易作夷于左股襲謂重衣撅揭衣也不見裏為其可穢父母唾洟不見輒刷去之手曰漱足曰澣孔䟽此對文若散文則諸母不漱裳詩薄澣我衣皆通也和漬也綻猶觧也潘米瀾也帥循也時是也共猶皆也禮皆如此也孔氏頴達曰此論事父母舅姑在尊者之所畏敬之法并論漱澣沐浴并明少事長賤事貴如事父母舅姑冠帯尊故以手漱之用力淺也衣裳卑故以足澣之用力深也吳氏澄曰有命之謂或呼之或問之也呼之則應唯而不敢諾問之則對敬而不敢慢或進而趨尊者之前或退而去長者之側其周迥旋轉容顔皆謹慎而不肆齊一而不二堂階或升或降室户或出或入舉手為容曰揖舉足行歩曰逰當此六者之時皆不敢有噦噫等類不恭之事陳氏澔曰噦嘔逆之聲也氣乏則欠體疲則伸偏任為跛依物為倚洟自鼻出者方氏慤曰噦噫嚏咳則聲不恭欠伸跛倚睇視則貌不恭唾洟則聲貌俱不恭故不敢為也寒不敢襲癢不敢搔不敢適己之便故也辨正朱子曰敬事如習射之類射而袒裼乃為敬若以勞倦袒裼則是不敬唯渉水而後撅若不渉而撅則是不敬言若非敬事雖勞不敢袒若非渉水雖盛暑不敢褰裳也男不言内女不言外非祭非喪不相授器其相授則女受以篚其無篚則皆坐奠之而后取之外内不共井不共湢浴不通寝席不通乞假男女不通衣裳内言不出外言不入男子入内不嘯不指夜行以燭無燭則止女子出門必擁蔽其靣夜行以燭無燭則止道路男子由右女子由左篚非尾反湢彼力反本又作偪嘯注作叱尺失反今如字正義鄭氏康成曰男不言内女不言外謂事業之次序授噐祭嚴喪遽不嫌也孔疏祭是嚴敬之處喪是促遽之所於此之時不嫌男女有滛邪之意故特相授受尸案祭得相授受者如執醴執鐙授夫人薦豆執校酢夫人執柄夫人授尸執足喪得相授受者如管人汲授御者御者入浴母喪則内御者受之而浴是也奠停地也陳氏澔曰非喪祭二者女必執篚使授者置篚中而受之無篚則授者跪而奠諸地受者亦跪就地以取之湢浴室也擁猶障也男子由右地道尊右也劉氏彜曰不共井嫌同汲也不共湢浴嫌相䙝也不通寝席嫌相親也不通乞假嫌往来也不通衣裳惡淆雜也内言不出悪交於外外言不入惡交於内也入内嘯歌則渉乎邪指則渉乎覘也輔氏廣曰井湢一定故言不共寝席衣衾可移易故言不通無燭則止自防者至矣存疑鄭氏康成曰嘯讀為叱叱嫌有隠使也辨正陳氏澔曰不嘯不指謂聲容有異駭人視聽也舊讀嘯為叱如見非禮舉動安得不叱以儆之乎讀如本字為是子婦孝者敬者父母舅姑之命勿逆勿怠若飲食之雖不耆必嘗而待加之衣服雖不欲必服而待加之事人代之已雖弗𣣔姑與之而姑使之而后復之飲於鴆反食音嗣耆市志反正義鄭氏康成曰勿逆勿怠恐恃其孝敬之愛或時違觧也嘗而待待後命而去服而待待後命釋蔵也已弗欲謂難其妨已之業也孔䟽業欲成于已不欲他人代已致妨巳業姑且也而后復之遠懟怨於勞事也案鄭意謂此勞事而使人代巳恐人怨親愛巳而移苦于彼故復之孔氏頴達曰此論子婦事父母舅姑受飲食衣服之事應氏鏞曰此非故為矯情葢委曲以行其意必如是而後無所拂于親也案姑使之勿敢逆也后復之勿敢怠也子婦有勤勞之事雖甚愛之姑縦之而寕數休之子婦未孝未敬勿庸疾怨姑教之若不可教而后怒之不可怒子放婦出而不表禮焉縦本又作從並用反數色角反正義鄭氏康成曰寜數休之不可愛此而移苦於彼也孔疏不可移此于他不愛之子婦也庸之言用也怒譴責也表猶明也猶為之隠不明其犯禮之過也孔氏頴達曰此論尊者接待卑者之禮不可怒謂教之不從雖怒責之而猶不從命者子被放逐婦被出棄然猶為之隐也通論輔氏廣曰子曰愛之能勿勞乎勤勞之事若遽止之是姑息之愛也子婦未孝未敬勿庸疾怨敷教在寛也子婦放逐不得已也不表禮焉是猶有不忍之心也應氏鏞曰自子婦孝者敬者而下勉子婦之孝於父母舅姑自子婦有勤勞之事而下勉父母舅姑之慈於子婦父母有過下氣怡色柔聲以諫諫若不入起敬起孝説則復諫不説與其得罪於鄉黨州閭寜孰諫父母怒不説而撻之流血不敢疾怨起敬起孝説音悦下同撻吐逹反正義鄭氏康成曰子事父母有隠無犯起猶更也子從父之令不可謂孝周禮曰二十五家為閭四閭為族五族為黨五黨為州五州為郷撻擊也孔氏頴達曰此論父母有過子諫諍之禮犯顔而諫使父母不説其罪輕畏懼不諫使父母得罪於郷黨州閭其罪重二者之間寜可孰諫謂純孰殷勤而諫若物之成孰然也呉氏澄曰謂父母有過則當下其氣怡其色柔其聲以諫欲其婉順不廹以異父母之悦而從己如此以諫而父母不從則又益加孝敬以感動之俟其説而再諫若其不説則将不諫乎葢不可也與其不諫而使父母得罪於郷黨州閭之人寜孰諫而使已取怒於父母也復諫者再諫也孰諫者至三至四而猶未己如火之孰物必期變化若父母怒已之言其心不説而施箠撻於己雖甚而至於流血亦不敢有疾怨於父母惟當益加孝敬以感動之而圖孰諫也通論馬氏睎孟曰孟子云親之過大而不怨是愈䟽也親之過小而怨是不可磯也愈䟽不孝也不可磯亦不孝也荀子曰可以從而不從是不子也未可以從而從是不𠂻也不子不孝也不衷亦不孝也夫眀乎從不從之義而以恭行之然後可以諫眀乎怨不怨之理而以愛守之然後可以怨父母有婢子若庶子庶孫甚愛之雖父母没沒身敬之不衰子有二妾父母愛一人焉子愛一人焉由衣服飲食由執事毋敢視父母所愛雖父母沒不衰子甚宜其妻父母不説出子不宜其妻父母曰是善事我子行夫婦之禮焉沒身不衰説音悦正義鄭氏康成曰婢子所通賤人之子由自也宜猶善也應氏鏞曰婢子賤㣲而可遺庶孽賤㣲而可忽然父母有所鍾愛焉非特加愛而又當加敬至妻妾之切近吾身者而亦唯父母是聼知有親而不知有已也父母沒而不衰蓋雖沒而念之愈深則其敬與愛宜其不衰也陳氏澔曰没身終身也父母之所愛亦愛之至於犬馬盡然而况於人乎存異黄氏震曰婢子古説謂婢之子則與下文庶子意重合如曲禮之婢子直言婢耳案婢子婢所生鄭説是也若左傳州吁嬖人之子庶子則妾所生凡左右媵之子皆是婢子賤庶子貴先賤于貴者為加愛敬于是尤難也父母雖沒将為善思貽父母令名必果将為不善思貽父母羞辱必不果貽以之反正義鄭氏康成曰貽遺也果决也方氏慤曰將者萌其始之謂果者成其終之謂善不善亦在乎思不思果不果之間而已易曰君子以果行育徳通論輔氏廣曰檀弓曰喪三年以為極亡則弗之忘矣於此可見也曾子曰五者不遂烖及其親敢不敬乎又曰父母既沒謹行其身不遺父母惡名可謂能終矣舅沒則姑老冡婦所祭祀賔客每事必請於姑介婦請於冢婦舅姑使冢婦毋怠不友無禮於介婦舅姑若使介婦毋敢敵耦於冢婦不敢並行不敢並命不敢並坐友依注如字正義鄭氏康成曰姑老謂傳家事於冢婦也必請於姑者婦雖受傳猶不敢專行也介婦衆婦也請於冢婦以其代姑之事母怠者雖有勤勞不敢觧倦也善兄弟為友娣姒猶兄弟也毋敢敵耦雖有勤勞不敢掉磬孔疏崔氏云北海人謂相激之事為掉磬隠義云齊人謂相絞訐為掉磬命為使令皆下冢婦也孔氏頴逹曰此論婦事舅姑之禮并眀冡婦介婦相與之節輔氏廣曰舅没則姑老有婦可以傳家事矣然祭祀賔客禮之大者亦必請命於姑然後從事夫然後婦姑各得其宜介婦不敢敵耦於冡婦必如是而後冢婦之志行而家事宜方氏慤曰冢子之妻謂之冢婦毋怠者不以居長而敢自怠也兩相抗為敵两相合為耦言事之勞逸介婦不敢與冡婦均不敢並行並坐亦毋敢敵耦之事也陳氏澔曰介婦與冢婦分有尊卑非惟任事毋敢敵耦且不敢比肩而行不敢並受命於尊者不敢並出命於卑者葢介婦當請命於冢婦也坐次亦必異列徐氏師曾曰介婦不請於姑而但請於冡婦眀有綂且懼凟尊也通論張氏怡曰年老傳家事於冢婦姑之道也每事必請於姑毋怠不友無禮於介婦冢婦之道也毋敢敵耦於冢婦介婦之道也婦性多妬閨門之内婦孝姑慈冢介相得則家無不理矣存疑孔氏頴逹曰舅姑年七十以上傳家事於長子其婦亦從夫知家事若舅沒姑未老則其婦不得專知家事王氏曰友當作敢存異鄭氏康成曰不友無禮衆婦無禮冢婦不友之孔疏不友之者以其無禮故也辨正朱子曰註説恐未然項氏安世曰舅姑使冢婦毋怠不友無禮於介婦言舅姑若任使冢婦冢婦毋得以尊自怠而凌辱衆婦令其代已也不友謂煩虐之無禮謂麾叱之怠也不友也無禮也三者皆當以毋字統之下文云舅姑若使介婦毋敢敵耦於冢婦不敢並行不敢並命不敢並坐亦謂得恃舅姑之使令而傲冢婦也兩節皆主使令言之輔氏廣曰舅沒則姑老不以年計案禮夫死從子祭祀賔客子主之則子之婦為内主矣孔疏顯與經違凡婦不命適私室不敢退婦將有事大小必請於舅姑子婦無私貨無私畜無私噐不敢私假不敢私與婦或賜之飲食衣服布帛佩帨茝蘭則受而獻諸舅姑舅姑受之則喜如新受賜若反賜之則辭不得命如更受賜蔵以待乏婦若有私親兄弟将與之則必復請其故賜而后與之畜許六反茝昌改反又作芷醜止反復扶右反正義鄭氏康成曰不命不敢退婦侍舅姑者也事必請於舅姑不敢專行也無私家事統於尊也或賜之者謂私親兄弟孔䟽以下文云若有私親兄弟故知此或賜為私親兄弟賜也藏以待乏待舅姑之乏也不得命者不見許也孔氏頴逹曰若舅姑不乏而私親兄弟旣貧将𣣔以物與之不敢别請其財必於舅姑處復請其故賜所藏之物舅姑既許然後取而與之方氏慤曰私室即婦室視舅姑之室若公所故也舅沒冢婦惟祭祀賔客之事則請於姑獻諸舅姑不敢私受也請其故賜而後與之不敢私與也吳氏澄曰貨謂所儲資財之物畜謂所飬畜牲之物噐謂飲食等所用之物假謂以物借人與謂以物與人也佩謂雜佩帨謂帨巾茝一作芷即香白芷也蘭似澤蘭二物皆香草乾燥則囊而佩之於身取其芳馨也既以獻諸舅姑舅姑雖不受不敢視為已物也惟飲食不可㽞其餘可留之物亦不敢私用藏之以待舅姑乏而欲有所用之時則将此物與舅姑用之也案私假謂假物於人與下與字對猶言取與也故賜陳氏謂即前所獻之物而舅姑不受者與孔疏義同但凢平日舅姑所賜而婦以蔵之私室者皆得以請不請而與不可耳適子庶子祗事宗子宗婦雖富貴不敢以富貴入宗子之家雖衆車徒舍於外以寡約入子弟猶歸噐衣服裘衾車馬則必獻其上而后敢服用其次也若非所獻則不敢以入於宗子之門不敢以貴富加於父兄宗族若富則具二牲獻其賢者於宗子夫婦皆齊而宗敬焉終事而后敢私祭適丁歴反齊側皆反正義鄭氏康成曰祗敬也宗大宗以寡約入謂入宗子家猶若也子弟若有功徳以物見饋賜案賜謂君賜當以善者與宗子非所獻謂非宗子之爵所當服也加猶高也獻其賢者賢猶善也孔疏富具二牲獻善者于宗子使祭其不善者用以自祭文案不言貴省也夫婦皆齊當助祭於宗子之家也私祭祭其祖禰孔疏大宗祭竟而後敢私祭祭案若身為繼禰之宗則待繼祖之宗竟而後自祭禰身為繼祖之宗則待繼髙曽之宗祭竟而後自祭祖禰上至大宗亦然孔氏頴逹曰此論族人敬事宗子之禮適子謂父及祖之適子是小宗也庶子謂適子之弟宗子謂大宗子宗婦謂大宗子之婦也言小宗子及庶子等敬事大宗子及宗婦也方氏慤曰父兄宗族彼賤而我貴彼貧而我富而我以貴富服御入其門則是以貴富而加賤貧也終事而後敢私祭者蓋宗之親為正統已之親為旁出也正統之有祭公義也旁出之有祭私㤙也則是不以旁出先正綂不以私恩勝公義也通論輔氏廣曰不以貴富入宗子家此不專為宗子於父兄宗族皆不可也孔氏頴逹曰此文雖主事大宗子其大宗之外事小宗子者亦然張子曰祭祖為公祭對祖而言則祭父為私祭其他推此皆然案對大宗言則四小宗亦為私祭呂氏大臨曰庶子不祭祖與禰眀其宗也傳曰子不私其父則不成為子故兄弟生而異宫所以盡子之私飬及其没也必祭於其宫而其子主祭其祭也必告於宗子而後行不得而專亦所以眀其宗也宗子有祭必先與焉卒祭而後祭其父故曰支子不祭祭必告扵宗子餘論朱子答李晦叔曰兄弟異居廟初不異只合兄祭而弟與執事或以物助之為宜有相去逺者則兄設主弟不立主只於祭時旋設位以紙榜標記逐位祭畢焚之如此似亦得禮之變陳氏祥道曰荀卿曰大夫士有常宗左傳曰大夫有貳宗蓋由士以上莫不知尊祖禰知尊祖禰則尊者常宗當其為宗則宗子統族人於外主婦統族婦於内賢者不敢干其任貴者不敢擅其祭衆車徒不敢以入其門凡以尊正綂而一人之情也飯黍稷稲粱白黍黄粱稰穛膳膷臐膮醢牛炙醢牛胾醢牛膾羊炙羊胾醢豕炙醢豕胾芥醤魚膾雉兎鶉鷃稰思吕反穛側角反膷音香臐許云反膮許堯反炙章夜反胾側吏反膾古外反芥姬邁反鶉順倫反鷃音晏正義鄭氏康成曰飯目諸飯也黍黄黍也孔疏下言白黍則上黍是黄黍下言黄粱則上粱是白粱熟穫曰稰生穫曰穛孔疏穛是斂縮之名明以生穫故其物縮斂也稰既對穛故為熟穫説陸氏佃曰穛若今早稲食之而已稰晚稲耐収故文云稰晚粱穛早熟穀也案方氏慤曰飯者食之本制造當及其生熟之宜二説頗異今江南早稲名秈六十日即可穫但収少性剛食之令人有力宜於少者晚稲名稉柔美宜於老人一名糯更柔味美然使人少力膳目諸膳也孔疏豆上所盛美膳謂羮與胾醢之屬此上大夫禮庶羞二十豆也以公食大夫禮饌校之則膮牛炙閒不得有醢醢衍字孔疏公食大夫禮二十豆者膷一牛臛也臐二羊臛也膮三豕臛也牛炙四炙牛肉也四物為一行最在於北従西為始醢五肉醤也牛胾六謂切牛肉醢七牛膾八四物為第二行陳之従東為始羊炙九羊胾十醢十一豕炙十二四物為第三行陳之従西為始醢十三豕胾十四芥醤十五魚膾十六四物為第四行陳之從東為始以上十六豆是下大夫禮雉十七十八鶉十九鷃二十此四物為第五行陳之従西為始是上大夫所加二十豆又以鷃為鴽孔疏釋鳥云鴽鴾母郭氏云謂䳺皇氏賀氏云鴽蝙蝠其義未聞孔氏頴逹曰自此至薑桂一節縂論飯飲膳羞調和之宜又眀四時膳食所用并眀善惡治擇之等又顯貴賤所食之别案玉藻諸侯朔食四簋黍稷稲粱天子則加以苽麥為六種但記文不載耳案本文謂諸侯所食飯有此六者黍粱黄白或用其一則仍四簋耳或疑其自戾非也方氏慤曰飯自黍稷而下皆言其材也牛曰膷薌也土畜羊曰臐熏也火畜豕曰膮水畜皆以其氣臭名之通論陸氏佃曰飲與酒以飬陽氣名之食與飯以飬隂氣名之存疑熊氏安生曰此經醢文承牛羊之下則是牛肉羊肉之醢以其庶羞故得用三牲為醢若其正羞則不得用三牲故醢人職無三牲之醢也陸氏佃曰醢目諸醢也脯羮雞羮從麥食不貴非食也牛炙醢醢所以食炙牛胾醢醢所以食胾牛膾不言醢蒙上醢也羊炙羊胾同醢下於牛也豕炙豕胾中醢變於羊也魚膾上芥醤變於豕也案熊陸二説並可通然不若鄭據公食大夫禮為可信飲重醴稲醴清糟黍醴清糟粱醴清糟或以酏為醴黍酏漿水醷濫酒清白羞糗餌粉酏重直龍反糟子曹反酏自私反醷於紀反徐於力反濫力暫反糗起九反餌音二下同酏依注為􅊡又作餰之然反又之善反正義鄭氏康成曰飲目諸飲也重陪也糟醇也清泲也致飲有醇者有泲者陪設之也孔疏清糟相配重設也周禮漿人共王之六飲水漿醴凉醫酏不云糟也夫人致飲於賔客清醴醫酏糟三物皆偹清糟不體王得偹之也后致飲賔客醫醴糟不清與王同體屈也下陸氏佃曰有清有糟諸侯禮天子清大夫以糟以酏為醴釀粥為醴也案酏粥之薄者不釀曰酏下黍酏是也釀之則為醴一而二矣黍酏粥也漿酢胾水清醴醷梅漿濫以諸和水也陸氏徳明曰乾桃乾梅皆曰諸以周禮六飲校之則濫涼也紀莒之閒名諸為濫孔疏周禮漿人掌王六飲水漿醴涼醫酏此經水漿二者同醴即重醴但用清耳涼此濫醫此以酏為醴酏此黍酏也除六飲外此經别有醷鄭司農合醷與醫為一物謂即以酏為醴者非康成義也康成知醷為梅漿者下有食之以醢若醯醷獸用梅醷是醯類故知梅漿也酒正辨四飲之物清醫漿酏無水涼鄭謂無厚薄之齊不必辨也又鄭云涼寒粥又名濫者以諸雜糗飯和水也案明齋王氏謂涼字従冰旁即冰水也濫者飲之别名葢濫雜也雜以五味皆可飲若今飴湯薑湯鹽湯故列之末非必雜以糗飯也酒目諸酒也白事酒昔酒也孔疏清謂清酒也事酒昔酒皆白故以一白標之配清酒則三酒矣不言五齊以祭祀獻神所飲非人常用故也案周禮注事酒酌有事者今醳酒昔酒舊醳者清酒冬釀夏成羞目諸羞也周禮羞籩之實糗餌粉餈孔疏鄭注云合蒸曰餌餅之曰餈皆粉稲黍米為之擣粉熬大豆為餌餈之粘著故以粉糗擣之羞豆之實酏食糁食糗擣熬榖以為粉餌與餈此記似脱孔疏據周禮粉下有餈今無知脱更以酏益之酏當為􅊡孔疏黍酏非膳羞所用酏食與糁食連文知必糝類以稻米與狼臅膏為􅊡是也陸氏佃曰糗餌籩人所謂糗餌言糗餌則餈可知粉酏醢人所謂酏食言粉酏則糁可知四者謂之羞則以甚美故也存疑陳氏澔曰周禮羞籩之實糗餌粉餈此酏字當讀為餈記者誤耳食蝸醢而苽食雉羮麥食脯羮雞羮折稌犬羮兔羮和糝不蓼濡豚包苦實蓼濡雞醢醤實蓼濡魚卵醤實蓼濡鼈醢醤實蓼腵脩蚳醢脯羮醢麋膚魚醢魚膾芥醤麋腥醢醤桃諸梅諸卵鹽食音嗣下苽食麥食食齊皆同徐如字蝸刀戈反苽音孤字又作菰同雉羹絶句脯羮雞羮絶句折之列反稌音杜和胡臥反糁三敢反蓼音了濡音而下同包伯交反醢音海一本作醯呼兮反卵醤之卵依注音鯤古門反腵丁亂反蚳直其反卵鹽之卵力管反正義鄭氏康成曰食目人君燕食所用也苽彫胡也稌稲也脯謂析乾牛羊肉也凡羮齊宜五味之和米屑之糁蓼則不矣凡濡謂烹之以汁和也孔䟽烹煑以其汁調和苦苦荼也以包豚殺其氣卵讀為鯤鯤魚子或作􅫙陸氏徳眀曰本又作捫孔疏鳥卵非為醬之物今卵醤承濡魚之下宜是魚類故讀為鯤也腵脩捶脯施薑桂也蚳蚍蜉子也膚或為胖切肉也孔疏以正膚在俎故知切肉卵鹽大鹽也孔疏以其鹽形似鳥卵自蝸醢至此二十六物吴氏澄曰食物三羮物五濡物四醢物四醤物二腵脩麋脯魚膾麋腥桃諸梅諸卵鹽七物各一共二十六物脯羮再出醢醤三出醢醤即肉醤也與卵醤芥醤為類似皆人君燕所食也孔疏周禮掌客諸侯相食皆鼎簋十有二其正饌與此不同公食大夫禮與此又異故疑是人君燕食也或徐氏師曾曰諸侯食無苽麥天子與其饌則亂孔疏上陳庶羞依牲大小先後此則不依牲之次第是上下雜亂也孔氏頴逹曰以蝸為醢以苽米為飯以雉為羮三者味相宜以麥為飯析脯為羮又以雞為羮三者亦味相宜細折稻米為飯以大為羮三者亦味相宜此等之羮宜以五味調和米屑為羮不湏加蓼也濡豚之時包裹豚肉以苦菜殺其惡氣濡雞加之以醢及醤濡魚以魚子為醤濡鼈加醢醤四者皆破開其腹實蓼於其中又更縫而合之以煮也食腵脯之時以蚳醢配之食析脯為羮以醢配之食麋膚以魚醢配之食麋生肉之時還以麋醢配之食桃諸梅諸之時以卵鹽和之諸菹也即今之藏桃藏梅也欲蔵之時必先稍乾之故周禮謂之乾䕩陳氏澔曰食之則和以卵鹽方氏慤曰蝸蝸牛即螔蝓也其殻咼而首有角其肉可以為醢故周官鼈人共之以授醢人苽即周官六榖之苽也和糝不蓼謂既和之以糝則不加蓼也蓼味辛或用或否以其性味各有所宜故也濡豚猶曲禮所謂濡肉蓋和之以湇者陸氏佃曰腵鍜煉之使精脩脩節之使雅通論劉氏彛曰士庶不偹物其有者如此法制之以敬祭祀則鬼神享以奉燕飲則賔客樂以饌尊親則衰病宜之其在教也為婦功焉聖人所以致子婦於孝敬惜衰老於充肥者其道如是也凡食齊視春時羮齊視夏時醤齊視秋時飲齊視冬時凡和春多酸夏多苦秋多辛冬多鹹調以滑甘牛宜稌羊宜黍豕宜稷犬宜粱鴈宜麥魚宜苽齊去聲正義鄭氏康成曰飯宜温羮宜熱醤宜凉飲宜寒多酸多苦多辛多鹹多其時味以飬氣也孔疏經方春不用酸夏不用苦謂壮者减其味以殺盛氣此恐虚羸故多其時味以飬氣也案食醫注云尚其時味而甘以成之猶水火金木之載于土牛宜稌已下言其氣味相成孔疏上以犬羮配折稌人君燕食以滋味為美此一節皆周禮食醫文乃正食也方氏慤曰氣之溫涼寒熱異宜味之酸苦辛鹹異等因時適宜以辨其等未始不齊也故謂之齊食齊黍稷稌粱之類羮齊雉兎雞犬之類醤齊醯醢韲菹之類飲齊水漿醴涼之類可否相濟謂之和酸以飬骨苦以飬氣辛以飬筋鹹以飬脉甘以飬肉肉則肌膚之所包而欲其緩滑以飬竅竅則内外之所通而𣣔其利故調以滑甘而利其竅緩其肉焉黄氏裳曰天有四氣人有五臟一氣不偹物受其病五臟亦然四齊相廢則或飬其一臟而遺其四害不淺矣四味一多慮其不通滑以調之慮其不和甘以調之四時之氣各欲其强而運四味之所飬分於四臟者脾也載四行之所用均於四時者土也調甘滑以飬脾而後脾能運四味以行焉四齊所視不失其時四和所多不失其節矣牛羊豕犬鴈魚天産也以為膳飬人之精稌黍稷粱麥苽地産也以為食飬人之形精不足於飬則氣衰形不足於飬則氣殆膳食之飬不可廢膳食之宜不可失則又會其所宜致其所飬焉通論劉氏彛曰周官食醫掌和王之六食六飲六膳百羞百醤八珍之齊而曰凡君子之食恒放焉此大司徒得以施諸教人子皆視此以飬親也春宜羔豚膳膏薌夏宜腒鱐膳膏臊秋宜犢麛膳膏腥冬宜鮮羽膳膏羶薌音香腒其居反鱐本又作䐹所求反臊素刀反麛音迷腥音星羶升然反正義鄭氏康成曰腒乾雉也孔疏士相見禮云冬執雉夏執腒故知腒為乾雉鱐乾魚案庖人疏云腒鱐同是夏用之腒既是乾雉明鱐是乾魚鮮生魚也孔疏鱐既為乾魚故鮮為生魚月令季冬獻魚王制獺祭魚然後虞人入澤梁是冬魚成也羽鴈也孔疏羽族既多而冬來可食者唯鴈此八物四時肥美也孔疏羔豚物生而肥犢麛物成而充腒鱐暵熱而乾魚鴈水涸而性定為其大盛煎以休廢之膏節其氣也牛膏薌犬膏臊雞膏腥羊膏羶孔疏牛土春木王則廢犬金夏火王則廢雞木秋金王則廢羊火冬水王則廢又曰此一經周禮庖人文方氏慤曰牛之土助飬脾犬之金助飬肺雞之木助飬肝羊之火助飬心也案鄭謂膳以節物氣之大盛方謂膳以助臟氣之時衰二義相足賈氏公彦曰煎和之謂膳案周禮庖人言行此言宜行者用也宜者當也惟宜故行其説互相偹耳牛脩鹿脯田豕脯麋脯麕脯麋鹿田豕麕皆有軒雉皆有芼爵鷃蜩范芝栭蔆椇棗栗榛柿瓜桃李梅杏楂梨薑桂麕九倫反本又作麇又作麏下同軒依注作憲蜩音條栭音而本又作檽蔆音陵椇音矩榛側巾反柿音俟楂側皆反正義鄭氏康成曰脯皆析乾其肉也軒讀為憲憲謂藿葉切也芼謂菜釀也軒或為胖蜩蟬也范蜂也蔆芰也牛脩至薑桂三十一物皆人君燕食所加庶羞也孔疏大夫燕食有膾無脯故知此是人君燕食周禮籩人醢人正羞唯棗栗榛桃無以外雜物故知所加庶羞周禮天子羞用百有二十品記者不能次録孔䟽庶羞既多不能依次條録但録諸侯燕食而已亦不能依次也孔氏頴達曰麋鹿田豕麕非但為脯又可腥食食時皆以藿葉起之而不細切故云皆有軒不云牛者牛唯可細切為膾不宜大切為軒雉羮羮皆有芼菜以和之芝栭者庾蔚云無華葉而生曰芝栭盧氏曰芝木芝也王肅云無華而實者名栭皆芝屬則芝栭是一物賀氏云芝木椹栭軟棗以芝栭為二物非也彭氏汝礪曰麕麞也通論劉氏彝曰四時之和氣可以脯可以乾可以鹹可以藏以偹乎老者之所欲也士庶之力雖不得畢偹有則儲之亦子婦所以盡於敬孝也存疑鄭氏樵曰爾雅注栭茅栗郭云江東呼栭栗陳氏澔曰江淮呼小栗為栭栗椇形似珊瑚味甘美一名白石李吳氏澄曰所記蓋三十二物牛脩至范十五物飛走之味芝至棃十五物草木之味其末薑桂二物則調和者也案鹿山獸能補陽麋澤獸能補隂月令仲夏鹿角觧仲冬麋角觧二獸迥别而趙氏岐云麋鹿之大者則混而一之芝生於地為地耳小曰卷耳通謂之芝生於木為木耳有黒有白通謂之栭若賀所云軟棗鄭樵所云栭栗則皆果屬非芝類矣山查小如指棃大如拳亦有頗小而味酸澁似查者謂之查棃縂之品物或古今異名南北異産不可勝竆况鄭言天子庶羞百二十品記者不能次録則三十一物固已而吴氏三十二物説亦得偹一義也大夫燕食有膾無脯有脯無膾士不貳羮胾庶人耆老不徒食正義鄭氏康成曰尊卑差也孔氏頴逹曰鄭志曰脯非食殽此燕得食脯者謂食不專用脯若有餘饌則兼有脯士不貳羮胾者謂士燕食也黄氏裳曰膾脯是食之珍味而大夫燕居常食不得兼之羮胾為食之本而士燕居常食亦不得兼之降及庶人唯耆老乃不徒食謂七十者無故可食肉矣故云庶人無故不食珍也存異孔氏頴逹曰此接上人君燕食因眀大夫士庶人燕食不同若朝夕常食則下云羮食自諸侯已下至於庶人無等案上經所陳既非諸侯所食又非公食大夫禮特人君燕食所加庶羞也不應此燕食忽指正燕禮食禮也此節文義趨重末句言大夫士雖貴亦有所不兼唯老則庶人亦不徒食以優老也起下文飬老之意耳膾春用蔥秋用芥豚春用韭秋用蓼脂用蔥膏用薤三牲用藙和用醯獸用梅鶉羮雞羮鴽釀之蓼魴鱮烝雛燒雉薌無蓼薤户界反一本作䪥藙魚氣反魴音房鱮音叙烝皇絶句賀讀烝雛為句雛仕俱反皇讀雉薌為句正義鄭氏康成曰芥芥醤也孔疏上謂魚膾芥醤則謂秋時用芥芥辛於秋宜也脂肥凝者釋者曰膏藙煎茱萸也漢律會稽獻焉爾雅謂之榝孔疏賀氏云今蜀郡作之九月九日取枝連實長四五寸一升實可和十升膏能陸氏德眀曰似茱萸而實赤小茱方氏慤曰用之殺虫案本草藙一作艾此食萸非吳茱萸也故曰茱萸類和用醯者畜與家物自相和也獸用梅者亦野物自相和也釀謂切雜之鴽在羮下烝之不羮也燒烟於火中也薌蘇荏之屬也此皆言調和菜醸之所宜也孔氏頴逹曰此論調和飲食之宜鶉羮雞羮者用鶉用雞為羮鴽唯烝煮之而已不以為羮釀謂切雜和之言鶉羮雞羮及烝之者皆釀之以蓼魴鱮二魚皆烝熟之雛鳥之小者火中燒之然後調和雉或燒或烝或可為羮其用無定故直云雉也魴鱮烝及雛燒并雉等三者調和唯以蘇荏之屬無用蓼也案或曰釀者用諸酒薌者羮用蘇言鶉雞可羮鴽可釀三者皆用蓼魴鱮可烝雛可燒雉用薌三者皆無蓼也此别為一義方氏慤曰蔥以氣逹為悤於春物生為宜芥以味辛為介於秋物成為宜故膾用二物以和之韭性温而生能乆春所宜蓼性辛而氣能散秋所宜故豚用二物以和之三牲肉體之大者氣之所聚不能無毒故用藙之辛以散其毒焉和用醯謂三牲也書曰若作和羮爾惟鹽梅醯與梅皆酸也和之以収其味而巳不食雛鼈狼去腸狗去腎狸去正脊去凥狐去首豚去腦魚去乙鼈去醜去起呂反下竝同凥苦刀反腦如老反正義鄭氏康成曰皆為不利人也雛鼈伏乳者醜謂鼈竅也孔氏頴逹曰自此至攅之論治擇肉物惡者及果實之屬陸氏佃曰狼腸直故去腸狗腎熱故去腎狸脊上一道如界凥有九孔豕俯聚精在腦醫方云豕腦食之昏人精神故去腦方氏慤曰狐首丘故狐去首爾雅魚腸謂之乙餒自腸始故魚去乙存疑鄭氏康成曰乙魚體中害人者名也今東海鰫魚有骨名乙在目旁状如篆乙食之鯁人不可出陳氏澔曰或云醜頸下骨能毒人案魚去乙方訓典而確此皆常有之物何必東海鰫魚不言去腸避文複也醜訓鄭得之肉曰脱之魚曰作之棗曰新之栗曰撰之桃曰膽之柤棃曰攅之膽丁敢反攅再官反本又作鑚正義鄭氏康成曰皆治擇之名也皇氏侃曰脱之除其筋膜取好處爾雅注李巡云去其骨郭璞云剝其皮作之者取魚摇動之視其鮮餒餒者不食郭云今本作斮謂削鱗也孔氏頴逹曰棗易有塵埃恒治拭之使新栗多蟲數数布揀撰省視之桃多毛拭治去毛令色青滑如膽柤棃恐有蟲故一一攅㸔其蟲孔通論方氏慤曰爾雅瓜曰華之桃曰膽之棗李曰疐之樝棃曰鑚之與此大同小異存疑孔氏頴逹曰或曰桃有苦如膽者去之牛夜鳴則庮羊泠毛而毳羶狗赤股而躁臊鳥皫色而沙鳴鬰豕望視而交睫腥馬黑脊而般臂漏雛尾不盈握弗食舒鴈翠鵠鴞胖舒鳧翠雞肝鴈腎鴇奥鹿胃庮音由泠音零結毛如氊也毳昌鋭反躁早報反皫劉普保反徐芳表反又普表反沙如字又所嫁反睫音接腥依注作星般音班臂本又作擘必避反徐芳避反漏依注作螻音樓鵠胡篤反鴇音保奥於六反胃音謂正義鄭氏康成曰亦皆為不利人也庮惡臭也春秋傳曰一薰一庮泠毛毳毛别聚於不觧者也孔疏泠謂毛本稀毳謂毛頭結赤股股裏無毛也皫色毛變色也孔疏色不潤澤沙猶嘶也鬱腐臭也案鬰周官作狸望視遠視也方氏慤曰豕俯首以食病則首昂荘子所謂豕之亢鼻也案周禮作盲視鄭注以望為正腥當為星聲之誤也星肉中如米者陸氏徳明曰説文云腥星見食豕令肉内生小息肉也般臂前脛般般然也漏當為螻如螻蛄臭也舒鴈鵞也翠尾肉也鵠鴞胖謂脇側薄肉也舒鳧鶩也孔疏爾雅釋鳥文李巡云野曰鴈家曰鵝野曰鳧家曰鶩謂方氏慤曰為人所畜飛不疾而舒故之舒鴇奥脾肶也鵠或為鴇也孔氏頴逹曰此論臊腥羶臭及諸物不可食者躁謂舉動急躁交睫謂目睫毛交牛夜鳴至般臂漏皆與周禮内饔職文同雛謂小鳥尾盈一握然後堪食若其過小未盈握不堪食也自此以下因廣言不堪食之物奥謂脾肶藏之深奥處吳氏澄曰夜鳴至般臂言其形之病庮羶臊鬱腥漏言其臭之惡有此病形必有惡臭其肉皆不宜食也陳氏澔曰此雛下九物亦不可食肉腥細者為膾大者為軒或曰麋鹿魚為菹麕為辟雞野豕為軒為宛脾切蔥若薤實諸醯以柔之麕九倫反辟必益反徐芳益反宛于晚反脾婢支反醯呼兮反本或作䤈正義鄭氏康成曰為膾為軒言大切細切異名也孔疏凡大切若全物為菹細切者為齏膾者必先軒之所謂聶而切之此軒辟雞宛脾皆菹類也孔疏其牲體大者菹之其牲體小者齏之故麋鹿魚野豕為菹為軒是菹也麕為辟雞為宛脾是齏也釀菜孔疏菜謂蔥薤而柔之以醯殺腥肉及其氣菹軒聶而不切辟雞宛脾聶而切之孔疏皆少儀文聶則䐑也聲相近耳軒或為胖宛或作鬰孔氏頴逹曰此眀齏菹之異用肉不同言或曰者作記之時無其制舊有此言也少儀不言魚此言魚者記異聞是魚之大者也切蔥若薤或用蔥或用薤肉與蔥薤置諸醋中悉皆濡孰故云柔之羮食自諸侯以下至於庶人無等大夫無秩膳大夫七十而有閣天子之閣左逹五右逹五公侯伯於房中五大夫於閣三士於坫一食音嗣坫丁念反正義鄭氏康成曰羮食食之主也孔疏凡人所食羮飯為主助以雜物醤是衆食所湏故曲禮云醯醤處内公食大夫禮公設醯醤注以其為饌本也又牲與黍亦諸食之本故掌客云鼎簋十有二注合言之以俱食主也庶羞乃異耳孔疏公食大夫禮下大夫十六豆上大夫二十豆又周禮掌客云上公食四十侯伯食三十二子男食二十四食謂庶羞美可食者此庶羞乃異也秩常也無秩膳謂五十始命未甚老也七十有閣有秩膳也孔疏六十者比五十有常肉比七十則有無肉時案䟽合下宿肉句觧閣以版為之庋食物也逹夾室大夫言於閣與天子同處天子二五倍諸侯也孔疏天子尊庖厨遠故左右夾室各五閣諸侯稍卑庖厨宜近故殺於天子大夫卑無嫌故亦於夾室諸案䟽意謂庖厨遠則取之難故多置閣以偹所需侯庖厨近則取之易故偹者少五者三牲之肉及魚腊崔氏靈恩曰宮室之制中央為正室左右為房房外有序序外有夾室孔氏頴逹曰食謂飯也此謂每日常食若非依常禮食之外或别有牛羊豕之肉隨時得為羮也其黍稷稻粱依禮正食之外别有稼穡収穫皆得為飯故云羮食無等方氏慤曰食為主羮為配人所日用者也惟稱有無隨其所宜不制豐殺而預為之等焉雖然此特自諸侯以下而已若王則周官膳夫王日一舉鼎十有二物皆有爼則固有等矣張氏怡曰上言大夫士庶燕食有無以肉食言也此言無等以羮食二者言也閣木為之而高坫土為之而卑此其别也存疑陸氏佃曰堂上為逹公侯伯於房中下天子也左逹左夾室前堂右逹右夾室前堂大夫言於閣三則蒙上房中可知吳氏澄曰士言於坫一疑亦在房中或北堂之角也案鄭謂逹夾室崔氏言序外有夾室其制甚眀陸乃謂逹夾室前堂夫堂前無牆故顯室有牆故隠豈有堂室混為一者呉謂士坫在北堂之角案東房有北階無北牆故北以半曰北堂恐亦非置坫之所欽定禮記義疏卷三十九
