body:
  text: 禮運第九之一正義孔氏頴達曰案鄭目録云名禮運者以其記五帝三王相變易隂陽轉運之道此於别録屬通論張子曰禮運本是一片段文字混混然一大意湏是據大體而觀之乃能見若字字句句細碎求之必不能得如天降膏露地出醴泉即堯舜之世實求此物安得也但言其至和可致此耳朱子曰胡明仲云禮運是子游作陳氏澔曰疑子游門人所記篇首大同小康説則非夫子之言黃氏震曰篇首意匠微近老子然終篇混混為一極多精語如論造化謂天秉陽垂日星地秉隂竅於山川論治謂聖人能以天下為一家中國為一人論人謂天地之心又謂天地之徳隂陽之交鬼神之會五行之秀氣論禮謂固人肌膚之會筋骸之束皆千古名言黃氏乾行曰運謂氣運氣運在人則為帝王禮樂之因革在天則為隂陽造化之流通然天時人事相為符應禮樂隂陽相為表裏故其始也法隂陽而作禮樂其終也以禮樂而贊隂陽芮氏城曰以運會言則自唐虞而三代大同而小康其衰也為杞宋為幽厲為幽國疵國僭君脅君汙隆升降皆時會為之也以運行言則自分天地轉隂陽變四時播五行垂而為日星竅而為山川明有制度幽有鬼神變化流行皆大一為之也一篇前後義兼兩端案通篇極言禮之重獨篇首小康之説乃老氏禮起於忠信之衰道徳之薄之意與通篇殊不相應考之家語皆無之惟有禮之所生與天地並不由禮而在位則以為殃句與下言偃如此乎禮之急緊相接則此為小戴所攙入竊老莊之説以為高而不知其繆也辨此一莭之繆則通篇粹然無疵昔者仲尼與於蜡賓事畢出遊於觀之上喟然而歎仲尼之歎蓋歎魯也言偃在側曰君子何歎孔子曰大道之行也與三代之英丘未之逮也而有志焉與觀皆去聲下與如字喟去媿反又苦怪反太息也逮音代一音代計反正義鄭氏康成曰蜡者索也嵗十二月合聚萬物而索饗之孔疏郊特牲文據周言之夏則十月殷則十一月建亥之月也以萬物功成報之亦祭宗廟孔疏月令臘先祖五祀總言之皆曰蜡析言之祭百神曰蜡祭宗廟曰息民時孔子仕魯在助祭之中孔疏助祭臣而稱賔者以祭祀欲以賔客為榮也觀闕也孔疏爾雅觀謂之闕縣法象魏使民觀之故名觀亦名象魏魏巍也巍巍高大也何休云天子兩觀外闕諸侯臺門不得有闕象有之用天子禮也孔子出廟門徃雉門登游於觀之上孔子見魯君於祭禮有不備於此又覩象魏舊章之處故感而歎之言偃孔子弟子子游大道謂五帝時也英俊選之尤者逮及也言不及見不言魯事為其太切故廣言之孔疏廣言五帝以下及三王之事孔氏頴達曰此明孔子為禮不行而發歎遂論五帝三王道徳優劣之事夏曰清祀殷曰嘉平周曰蜡喟然而歎一感魯君之失禮一感舊章之廢棄也英即禹湯文武三代中之俊異者方氏慤曰以其無名無迹故以道稱之以其代廢代興故以代數之言三代之為英見五帝之為質也朱氏申曰言不及見帝王之盛而有志焉孔子有帝王之徳而不得其位故但有志而已黃氏乾行曰道有升降政由俗革雖聖人不能不與時推移若欲回情文兼備之風反太古無為之治亦非人情但人亡政息故不能不惓惓於魯爾存異鄭氏康成曰志謂識古文孔疏孔子自序雖不及見前代而有記志之書披覽可知周禮云外史掌四方之志春秋云其善志徐氏師曾曰英謂三代賢臣案志者心之所之有志乃吾其為東周之意鄭謂識古文孔謂記志之書非也三代之英即下由此其選也意有禹湯文武之君即有皋益伊周之臣徐單指臣亦偏大道之行也天下為公選賢與能講信修睦故人不獨親其親不獨子其子使老有所終壯有所用幼有所長矜寡孤獨廢疾者皆有所飬男有分女有歸貨惡其棄於地也不必藏於己力惡其不出於身也不必為己是故謀閉而不興盗竊亂賊而不作故外戸而不閉是謂大同長竹丈反矜讀鰥分音問惡烏路反為己之為去聲正義鄭氏康成曰公共也禪位授聖不家之睦親也不獨親獨子孝慈之道廣也有所飬無匱乏也分猶職也有歸皆得良奥之家勞事不憚施無吝心仁厚之教也謀不興盗不作尚辭讓之故也外戸不閉禦風氣而已同猶和也平也孔氏穎達曰此先明五帝時也天下為公不私傳子孫即廢朱均而用舜禹是也選賢與能不世諸侯若黜四凶而舉十六相是也講信脩睦談説輒有信行習皆親睦也不獨親己親不獨子己子使天下之老者皆得贍飬終其餘年年齒盛壯者不愛其力以奉老幼天下之幼者皆獲長養以成人無告及有疾者皆獲恤養也男有分者無才者畊有能者仕各當其職無失分也女謂嫁為歸君上有道嫁無失時也財貨不收録則物壊世窮無所資用故收而藏之正是惡其棄地耳非是藏之為己有乏者即與也為事用力不憚劬勞正是惡其相欺惜不出於身耳非是欲自營贍也謀之所起本為鄙詐今天下一心故圖謀之事閉塞而不起有乏必與竊盗焉施有能必位亂賊何作故扉從外闔盖重門擊柝本禦暴客既無盗竊亂賊則戸無所捍拒故從外而閉也率土皆終故曰大同劉氏彝曰五帝之治世質民純人人内盡其情而情不生外無其已而善益勸故君不自尊而天下共尊之臣不自賢而天下共賢之一徳安於上而兆民莫不化之一善出於人而四海莫不師之是以選賢與能講信脩睦不必自於朝廷而族黨人人推讓不敢以為己私也君盡其性於上民盡其性於下不曰大道之行乎方氏慤曰天生其利人乃不取是以人逆天也故貨棄於地為可惡人犯其勞我享其效是因人成事也故力不出於身為可惡取非其有謂之盗伺間而發謂之竊絶理謂之亂毁則謂之賊朱氏申曰不獨親其親孝其親以及人之親也不獨子其子慈其子以及人之子也使老有所終以將化而欲善其終也壯有所用以方剛而欲致其用也幼有所長以尚少而欲趨於長也天之窮民與廢民發政施仁宜有以養之謀閉而不興以力不必為己而同乎無知盗竊亂賊而不作以貨不必藏於己而同於無欲也今大道既隠天下為家各親其親各子其子貨力為己大人世及以為禮城郭溝池以為固禮義以為紀以正君臣以篤父子以睦兄弟以和夫婦以設制度以立田里以賢勇知以功為己故謀用是作而兵由此起禹湯文武成王周公由此其選也此六君子者未有不謹於禮者也以著其義以考其信著有過刑仁講讓示民有常如有不由此者在埶者去衆以為殃是謂小康知音智埶音世亦作勢去起呂反上案故謀用是作十字當在貨力為己下大人世及此錯簡耳家語無禮義至兵由此起五十四字及以著其義以下三十七字止有禮之所與與天地並如有不由禮而在位者則以為殃二十一字正義鄭氏康成曰隠猶去也天下為家傳位於子也貨力為己俗狹嗇也大人諸侯也亂賊繁多為城郭溝池以服之也謀作兵起以違大道敦樸之本也教令之稠其弊則然老子曰法令滋章盜賊多有由用也用禮義以為治也考成也刑猶則也埶埶位也去罪退之也殃猶禍惡康安也言小安者失之則賊亂將作矣孔氏頴達曰此明三代俊英之事孔子生及三代之未故稱今也天下為家父傳天位與子也君以天位為家故四海各親其親而子其子父子曰世兄弟曰及諸侯亦傳位自與家也姦詐之謀用是貨力為己而興作戰爭之兵由此貨力為己而發起既私位獨財則更相争奪所以為城郭溝池以自衞固也賢猶崇重也既盗賊並作故湏勇更相欺妄故湏知勇知之士皆被崇重也以功為己立功起事不為他人也禹湯文武成王周公以其時謀作兵起遞相争戰能以禮義成治故為三王中之英選君臣諸事有失故並用禮義以為之紀君臣義合故曰正父子天然故曰篤兄弟同氣故言睦夫妻異姓故言和又用禮義設為宮室衣服車旗飲食上下貴賤有多少之制度田種穀稼之所里居宅之地貴賤皆異品也著其義以下皆謹禮之事民有失宜用禮裁之民有相欺用禮成之民有罪者用禮以照明之民有仁者用禮賞之以為則民有争者用禮講説之使推讓行上五徳皆示民為常法也若為君而不用此謹禮五事雖在富貴之埶位衆必以為禍惡共以罪黜退之矣張子曰大道之行由禮義行者也禮義為紀行禮義者也紀對綱而細規規然詳於小不見其大也若夫大道之行禮義沛然夫何為哉恭己正南面而已矣又曰使堯舜承桀紂之後亦當禮義以為紀六君子生堯舜之時是亦大同聖人成性一之以禮義六君子謹禮所以達其大欲至於大同也胡氏銓曰下言禹湯由此則大人謂天子馬氏睎孟曰傳子傳賢皆天之所與非人之所為也五帝三王何與焉老有所終至廢疾有養三王未嘗不同也以正君臣至以立田里五帝之時亦莫不行也孔子傷時之弊欲復歸於至徳之盛故言如此通論陸氏佃曰與賢與子其義一也不足為時之厚薄然後世一不與子則争亂隨之是亦天也雖以為時之厚薄可也存疑鄭氏康成曰大道之人以禮於忠信為薄案此三節為第一段孔子答子游之問以遡帝王之治而歸於禮也自石梁王氏指為非孔子語後儒皆因之然考其所以致訾有二昔王子雍謂禮記所述孔子之言皆家語文後人見其已見禮記遂於家語除其本文而亦有以已意増改者今考家語無謀作兵起等語則為後人竄入無疑夫天高地下萬物散殊禮已行乎其閒特大同之世民風沕穆日行禮而不知至三代乃覺其以禮為敎耳以唐虞視羲農則唐虞已覺其文以夏殷視成周則夏殷猶存其樸此皆天地風氣日開人心機智日生之故聖人之治與時為宜正不得高五帝而卑三王也但孔子謂韶盡善武未盡善孟子謂堯舜性之湯武反之聖人分上有不同則徳化淺深亦自有異老莊不知此義謂禮為忠信之薄全不識天秩天叙本原記者見本文有大同字増小康字作對殊失聖人本㫖又改去與天地並句與通篇全不照管此記者増改之繆也而細攷注疏則今文又有錯簡孔疏謀作兵起緊承貨力為己文義甚明今文錯簡似禮義為紀乃所以兆謀致兵者則六君子如何又必謹於禮文義并難通矣此又今文錯脱之繆也言偃復問曰如此乎禮之急也孔子曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相鼠有體人而無禮人而無禮胡不遄死是故夫禮必本於天殽於地列於鬼神達於䘮祭射御冠昏朝聘故聖人以禮示之故天下國家可得而正也復扶又反下復問同治平聲相去聲殽户教反冠古亂反朝音潮正義鄭氏康成曰相視也遄疾也言鼠之有身體如人而無禮者矣人之無禮可憎賤如鼠不如疾死之愈也孔疏引詩鄘風言鼠有形體人亦有形體鼠無禮故賤人有禮故貴若人而無禮何異於鼠不如速死無所侵害也而朱子曰言相鼠猶有體可以人無禮乎聖人則天之明因地之利取法度於鬼神以制禮下敎令也旣又祀之盡其敬也教民嚴上也孔疏謂法天地鬼神以制禮既畢下此禮之教令以教民又祀此等之神教民嚴上鬼者精魂所歸孔疏精魂歸藏不知其所神者引物而出孔疏宗廟能引出仁義山川能引出興作五祀能引出制度又俱能引出福慶謂祖廟山川五祀之屬也民知嚴上則此禮達於下也孔疏䘮是哀篤君親祭是享祀君親射御是防衛供御尊者冠有著代之義昏有代親之感朝是君之敬上聘是臣之事君民既知嚴上於此八者之禮無教不從民知禮則易敎孔氏頴達曰言承天則承地可知失禮則死若桀紂也得禮則生若禹湯也殽效也天遠故言本地近故言效聖王旣法天地鬼神以制禮而敎民且祀天禋地享宗廟祭山川一則報其禮所從來之功一則敎民嚴上之義張子曰禮必本於天殽於地列於鬼神此屬自然而言也天自然有禮如天尊地卑是也殽於地明於地也如山川有大小草木有長短皆天生而見於地也列於鬼神遍於鬼神也如社有土功稷有養人之功五嶽為一方之鎭皆是也達於喪祭射御冠昏朝聘此屬人道而言亦莫非天理也又曰天無形固有無體之禮禮有形則明於地明於地則有山川宗廟五祀皆布列於地上者也禮無不在天所自有人特節文之耳達於䘮祭射御冠昏朝聘是見於迹也劉氏彜曰先王正心誠意動必如禮者欲盛厥徳以配天地承天之道也禮有定制執民兩端不敢太過不敢不及治人之情也人失禮則行悖於中刑禍之道不曰死乎得禮則動協於極安吉之道不曰生乎禮也者能使三才各安其位而不失其宜者也故天得其禮則隂陽和地得其禮則剛柔順鬼神得其禮則生歛時至於䘮祭射御冠昏朝聘得其禮則君臣父子兄弟夫婦朋友各得其分而不失其常苟無禮則性命不可得而正矣陳氏祥道曰本於天者禮之道殽於地者禮之體列於鬼神者禮之情達於䘮祭射御冠昏朝聘者禮之度數禮之為道則尊而其體則卑其情則幽而其度數則顯方氏慤曰天地鬼神禮之所以立也䘮祭八者禮之所以行也喪凶禮祭吉禮射御軍禮冠昏嘉禮朝聘賓禮經禮三百曲禮三千大體不過是五者應氏鏞曰上數語明禮之功用以明人生死所由繫下四語總禮之體用以明天下國家治亂所由别禮之大原出於天故推其自出而本之效法之謂地故因其成法而效之列於鬼神充塞乾坤昭布森列而不可紊達於喪祭至朝聘人道交際周流上下而無不通法於天地鬼神者理所以承天之道達於天下國家者事所以治人之情理與事一而二二而一者也吳氏澄曰言制禮者必根本乎天效放乎地徧取法於一切鬼神而達為人所通行之禮也陳氏澔曰本於天者天理之莭文也䘮祭八者人事之儀則也徐氏師曾曰天秩有禮禮以承之者禮之體人情易縱禮以治之者禮之用夫禮以下又詳言之禮無過不及之差是本天之莭文有上下之等是效地之高卑有變通之妙是列鬼神之變化三者理也所謂承天之道也達於喪祭以篤父子達於射御以和長幼達於冠昏以明男女達於朝聘以正君臣八者事也所謂治人之情者也理與事二而一也案此一莭為第二段子游即禮發問而子約言禮之始終本末以答之也言偃復問曰夫子之極言禮也可得而聞與孔子曰我欲觀夏道是故之杞而不足徵也吾得夏時焉我欲觀殷道是故之宋而不足徵也吾得坤乾焉坤乾之義夏時之等吾以是觀之與音餘正義鄭氏康成曰子游欲知禮終始所成子言欲行其禮觀其所成也杞夏后氏之後宋殷人之後徵成也無賢君不足與成也得夏四時之書其書存者有小正得殷隂陽之書其書存者有歸藏孔疏熊氏云殷易以坤為首故先坤後乾觀觀於二書之意孔氏頴達曰此明禮之所起因得二書知上代以來至於今世時代運轉之變通即下禮之初以下是也朱子曰徵證也蔣氏君實曰三代聖人損益不同制作殊事皆本隂陽之義而發之夏之所建以寅為正則尚忠尚黑之制皆自此出也商之序易以坤為首則尚質尚白之制皆自此出也聖人不能考杞宋之餘備見夏商之盛制而能因四時隂陽之書詳識夏商之本㫖此聖人之觀禮所以異乎人之觀之也應氏鏞曰上天下澤所以為禮而坤乾之書以坤為首有其義也隂陽循環更相為始而夏時以寅為首有其等也玩坤乾之自下而上則知禮之交際無不通且有卑法之意玩四時之自始而終則知禮之秩序不可紊且有無窮之象焉沈氏煥曰義是禮之變等是禮之常於坤乾觀變於夏時觀常非聖人孰能觀之顧氏元常曰上文言三代謹禮故此從夏殷言之下言古今禮之大意至我觀周道以後乃歎魯之本㫖也通論張子曰殷尚質故以所先見者言之乾必因坤而著故先坤猶言形神人必因形乃見神若不因形神何附著方氏慤曰論語言其畧則文獻皆不足徵此言其詳則文猶有得焉耳周官大卜掌三易之法一連山二歸藏三周易連山首艮位在東北之間則向乎人之時夏用人正故其書以之孔子稱曰夏時者以人時得其正故也歸藏則首乎坤各歸其根密藏其用合乎地之時殷用地正故其書以之孔子稱曰坤乾者以資生於丑地為主於下故也周易則首乎乾周而復始剛柔相摩合乎天之時周用天正故其書以之孔子序以乾坤者以資始於子天為主於上故也然孔子以夏殷之易觀禮者易之所見者象禮之所形者器器由象出也天地有上下之位四時有先後之序禮之道如斯而已周監二代故六官備天地四時之名也天地之理為妙故以義言達於内也四時之迹為顯故以等言辨於外也案夏時坤乾當時必實有其書鄭注其書存者有小正歸藏舉二書以見其梗概未嘗謂即此二書也馬氏謂歸藏漢志無之連山隋志無之鄭氏非漢人乎歸藏其所親見不得執漢志而謂漢志無歸藏也至連山為劉炫偽作則北史明言之然連山之名見於周禮亦不得謂古無是書也若王石梁謂小正歸藏何足徵禮則觀易象春秋何言周禮在魯也説詩必此詩不太拘乎夫禮之初始諸飲食其燔黍捭豚汙尊而抔飲蕢桴而土鼓猶若可以致其敬於鬼神燔音煩捭音蘗汙音蛙抔音陪蕢鄭讀凷又如字桴音浮正義鄭氏康成曰言其物雖質畧有齊敬之心則亦可以薦羞於鬼神鬼神饗徳不饗味也中古未有釜甑釋米捭肉加於燒石之上而食之耳孔疏燔黍以水洮釋黍水加於燒石之上以燔之捭豚捭析豚肉加於燒石之上而熟之今北狄猶然汙尊鑿地為尊也抔飲手掬之也蕢讀為由聲之誤也孔疏蕢是草名不可為桴凷亦土類故知當作凷凷堛也謂摶土為桴也土鼓築土為鼓也孔疏盖築地以為鼓莭杜注周禮籥章云以瓦為匡盖周代極文不湏築地或曰桴即搏拊也摶土為搏拊以手擊之孔氏頴達曰從此以下至禮之大成皆二書所見之事此一莭言上代物雖質畧以其齊敬可致祭神明也方氏慤曰觀二書足以知夏殷之禮觀夏殷足以知上古之禮故此言禮之初焉自燔黍而下皆始諸飲食之事也方是時地産有黍然未有釜甑也故燔之天産有豚然未有刀匕也故捭之未能鑿木故汙尊未知用爵故抔飲鬼神幽而難格菲薄之禮疑不足致敬者故以猶若言之徐氏師曾曰此下六莭原古始以明聖人制作之功而此以養生言之也聖人制作有鼎飪以為食尊罍以為飲聲樂以為莭其莭如此然其始燔黍捭豚而已汙尊抔飲而已蕢桴土鼓而已簡陋如此而其真實無偽可交於神明況於人乎後聖得其意而制禮以飾之此禮之所以始於飲食也通論張子曰從本言之自微者始從末言之自近者始其始必甚質而漸至於文如言禮之初始於拜起亦此類也陳氏祥道曰樂以中聲為本土位中央其氣為中氣而籥之為器又以通中聲伊耆氏之樂始於土鼓中聲作焉中於蕢桴中聲發焉終於葦籥中聲通焉樂之所始必本於中聲如此周官籥章中春晝擊土鼓龡豳詩以逆暑中秋夜迎寒亦如之凡國祈年於田祖龡豳雅擊土鼓以樂田畯國祭蜡則龡豳頌擊土鼓以息老物皆有報本反始之義故猶若可以致其敬於鬼神彭氏廉夫曰蕢與蒯同桴鼓槌也以蒯杖為槌而擊土鼓及其死也升屋而號告曰皋某復然後飯腥而苴孰故天望而地藏也體魄則降知氣在上故死者北首生者南鄉皆從其初號平聲飯扶晚反孰熟通首鄉並去聲正義鄭氏康成曰升屋而號招之於天也飯以稻米上古未有火化也苴孰遣奠有火利也苴或為俎孔疏含飯以生米用上古未有火化之法遣奠包熟肉以送尸法中古脩火之利地藏謂葬北首隂也南鄉陽也從其初謂今行之然也孔氏頴達曰上言古代質素此言後世漸文謂五帝以下至於三王時也皋引聲之言某謂死者名復令其反復魄也天望謂望天而招魂地藏謂穴地以藏尸所以地藏由體魄則降故所以天望由知氣在上故體魄降入於地為隂故死者北首歸隂之義死者既歸隂則生者南鄉歸陽也皆從其初言非是今時始為此事皆取法於上古中古而來方氏慤曰飯必以腥慮致生之不知也苴必以孰慮致死之不仁也後世於喪有奠始於飯腥而已於葬有遣始於苴孰而已體有所附魄有所營皆重濁而為隂故降而在下知無不周氣無不之皆輕清而為陽故升而在上死者仆故言首生者興故言鄉凡是禮也後世雖增其文而不能損禮之實或異其迹而不易禮之意故曰皆從其初陳氏祥道曰體魄有滅而無存故不言下知氣感動而常在故言在上北為隂幽物之所終始故死首之南為陽明物之所相見故生鄉之蔣氏君實曰死生異域疑若恩棄義絶而不相求乃升屋之號皋某之告飯腥苴孰以繼其孝養之事天望地藏以發其悽愴之思蓋雖禮教未備而天理之發露於人心者自然如此至於後世棺椁衣衾之備美賵賻贈含之畢陳而一念不居事亦末矣故曰皆從其初徐氏師曾曰飯含也腥生也生米亦有腥氣苴包也孰熟肉此以送死言之見後世送死之禮非後聖以私意制之皆從古初人心自有之哀戚爾昔者先王未有宫室冬則居營窟夏則居橧巢未有火化食草木之實鳥獸之肉飲其血茹其毛未有麻絲衣其羽皮窟苦忽反橧音曾則登反茹音汝衣去聲正義鄭氏康成曰未有宮室寒則累土暑則聚薪柴居其上也未有火化食腥也此皆上古之時孔氏頴達曰此更論上古之事未有宮室則是五帝以前未有火化則惟伏羲以前以中古神農有火也營窟者地高則穴於地地下則營累其上而為窟橧巢橧聚其薪以為巢徐氏師曾曰鳥曰羽獸曰皮通論方氏慤曰人稟隂陽而生則陽故順陽而居冬陽燠於下故居營窟夏陽燠於上故居橧巢存疑孔氏頴達曰茹其毛者雖食鳥獸之肉不能飽幷茹其毛以助飽若漢蘇武以雪雜羊毛食之也辨正陳氏澔曰未有火化故去毛不盡而幷食之也案此説勝孔氏後聖有作然後脩火之利范金合土以為臺榭宫室牖戸以炮以燔以亨以炙以為醴酪治其麻絲以為布帛以養生送死以事鬼神上帝皆從其朔范範通炮薄交反燔音煩亨烹通酪音洛治平聲養去聲正義鄭氏康成曰作起也脩火之利謂孰冶萬物孔疏孰謂亨煑冶謂陶鑄范金謂鑄作器用孔疏謂為形范以鑄金器合土謂瓦瓴甓及甒大孔疏檀弓云有虞氏之瓦棺釋器云瓴甗謂之甓郭注塶塼也禮器云君尊瓦甒又明堂位云泰有虞氏之尊此等皆燒土為之榭器之所藏也孔疏公羊傳宣榭火樂器藏焉爾炮裹燒之也燔加於火上亨煑之鑊也炙貫之加於火上醴酪烝釀之也酪酢酨朔亦初也亦謂今行之然孔氏頴達曰此論中古神農及五帝三王之事世本云燧人出火是火利先有用之簡少至神農更脩益使多以為臺榭以下皆五帝時效法上古故曰皆從其朔劉氏彝曰火無形而潛於木燧人鑽木出火然後木火始為民利金得火以鎔而金亦為民利土和以水鈞以木而化以火以為器而土為民利遂與稼穡均五行之利以養民而禮因五物以興生則養之死則祭之報本反始之心生而禮由之弗敢忘乎其本初也陳氏祥道曰營窟橧巢而易之以宫室茹毛飲血而易之以烹炙衣羽皮而易之以布帛此所謂通其變使民不倦者也開端之始謂之初繼終有始謂之朔王氏安石曰初一始而不可變朔則終而復始也吳氏澄曰營窟土處以避寒橧巢木處以避暑饑則食鳥獸之肉寒則衣其羽皮此太樸陋不可從也下乃言中古可從之禮脩火之利總下三事范金合土一也烹炮燔炙二也治絲麻三也以養生二句結上文董氏應𤾉曰宮室代上古之巢窟烹炙代上古之毛血麻絲代上古之羽皮皆脩火之利通論蔣氏君實曰事之已備聖人不能計其後事之未備聖人不能秘其智聖人開物成務以教天下而使之相安相養於利用出入之閒使變其燔捭汙抔而止於籩豆簠簋犧象山罍變其蕢桴土鼓而止於笙鏞管象椌楬壎箎何病於聖故聖人視夏商以前為禮之大意使知養生送死事鬼神之大常皆從其朔民未厭神未瀆也黃氏震曰此原古始以明聖人制作之功蓋易取十三卦之義故𤣥酒在室醴醆在戸粢醍在堂澄酒在下陳其犧牲備其鼎俎列其琴瑟管磬鐘鼓脩其祝嘏以降上神與其先祖以正君臣以篤父子以睦兄弟以齊上下夫婦有所是謂承天之祜醆側眼反秶依注為齊才細反醍音體嘏音古本或作假古稚反祜音戸正義鄭氏康成曰此言今禮饌具所因於古及其事義也孔疏今禮今世祭祀之禮醴醆犧牲之屬是饌具用古𤣥酒醴醆是所因於古從𤣥酒至先祖以上是事以正君臣以下是義粢讀為齊聲之誤也孔疏粢稷也作酒用黍不用稷故知誤周禮五齊一曰泛齊孔疏周禮鄭注成而滓泛泛然二曰醴齊孔疏醴猶體也成而汁滓相將三曰盎齊孔疏盎猶翁也成而翁翁然葱白色四曰緹齊孔疏緹成而紅赤五曰沈齊孔疏沈成而滓沈字雖異醆與盎澄與沈蓋同物也孔疏以周禮酒正文醴緹之閒有盎此醴醍之聞有醆周禮緹齊之下有沈此醍齊之下有澄知之也奠之不同處重古畧近也祝祝為主人饗神辭也嘏祝為尸致福於主人之辭也祜福也福之言備也孔氏頴達曰𤣥酒水也以其色黑謂之𤣥太古無酒以水當酒今雖有五齊三酒貴重古物故陳設室内而近北也醴謂醴齊醆謂盎齊後世所為賤之陳列稍南近戸也其泛齊當在𤣥酒南醴齊非粢醍謂醍齊卑之故在堂澄謂沈齊酒謂事酒昔酒清酒三者又卑之故陳堂下也陳其犧牲者案特牲禮陳鼎於門外北面獸在鼎南東首牲在獸西西上北首也備其鼎俎者牲煑於鑊鑊在廟門外鼎隨鑊設在鑊之西取牲體實鼎舉鼎而入設阼階下南陳俎鼎西以次載於俎案少牢云鼎入陳於東方當序西面北上也琴瑟堂上之樂管磬鐘鼓堂下之樂上神即先祖指其精氣謂之上神指其亡親謂之先祖皇熊皆謂上神天神也正君臣下詳見祭統行上事得所則特受天之祜福也方氏慤曰以室對戸室者戸之内戸者室之外也以堂對下堂者階之上階者堂之下也致於味者於道為逺寡於味者於道為近故禮器曰禮之近人情者非其至也明後世之禮雖漸致其文亦未嘗不貴其本周氏諝曰有齊酒犧牲鐘鼓祝嘏固足以降上神與先祖然必待正君臣五者而後可以承天之祜者以備物盡禮猶不足以承天所可承天者脩人事而已張子曰順理則承天之祜陸氏佃曰此猶未祭也易曰盥而不薦有孚顒若正當此時吳氏澄曰此祭之初事君臣父子指尸與君也兄弟同姓之臣上下異姓之臣夫婦君與夫人各有其禮各有其事各有其位故云正篤睦齊及有所也通論孔氏頴達曰崔氏云祭之日王衮冕入尸亦衮冕入王不迎尸尸入室樂作九變乃灌尸祭之啐之奠之為一獻王出迎牲后從灌為二獻迎牲入詔於庭王親執鸞刀啓毛告於室昭共一牢穆共一牢行朝踐之事尸出於室太祖之尸戸西南面其主在右昭在東穆在西相對坐主各在其右祝取膟膋燎於爐詔神於室出奠於主前王乃洗肝於鬯而燔之為制祭次乃升牲首於室置北墉下后薦朝事之豆籩乃薦腥於尸主前謂之朝踐王以玉爵酌著尊泛齊獻尸三獻也后以玉尊酌著尊醴齊亞獻四獻也退而合烹設饌於堂延主入室太祖東面昭南面穆北面徙饌室内坐前祝酌斝奠於饌南取脂焫蕭合馨薌大合樂自此以前謂之接祭迎尸入室舉奠斝主人拜妥尸后薦饌獻之豆籩王以玉爵酌壺尊盎齊獻尸五獻也后以玉爵酌壺尊醴齊獻尸六獻也尸十五飯訖王以玉爵因朝踐之尊泛齊酳尸七獻也后薦加豆籩尸酌酢主人主人受嘏王獻諸侯后以瑤爵因酌饋食壺尊醍齊酳尸八獻也王乃以瑤爵獻卿賔以瑤爵壺尊醴齊獻尸九獻也九獻之後謂之加爵用璧角璧散士三加天子諸侯不止三也侯伯無朝踐饋獻二獻止七子男無薦腥饋孰二獻酳尸君一獻止五此皆崔氏説今案子男饋孰以前君與夫人並無獻食後行三獻通二灌為五也陳氏祥道曰濁莫如五齊清莫如三酒祭用五齊以神事之也三酒以人養之也酒正共五齊三酒以實八尊皆陳而弗酌所以致事養之意也故曰惟齊酒不貳非此八尊所實則皆有貳大祭所酌度用一尊則以三尊副之中祭以二尊副之小祭以一尊副之所以致事養之用也司尊彝朝踐用兩犧尊再獻用兩象尊皆有罍犧象所實泛與醴也罍尊所實盎以下也朝用醴饋用盎諸臣自酢用凡酒醴以上君所酌盎以下夫人所酌酒正凡祭祀以五齊三酒實八尊似天地宗廟皆備五齊而無四齊二齊之别然經有言一齊者禮器祭義夫人奠盎是也有言二齊者醴齊縮酌盎齊涗酌是也有言三齊者坊記粢醍在堂澄酒在下是也有言四齊者此經𤣥酒醴醆粢醍澄酒是也有言五齊者酒正五齊實八尊是也蓋二齊者天子之時祭一齊者諸侯之時祭宗廟之小祭也三齊者宗廟之祫祭四齊者宗廟之禘祭也此人鬼而已其上有神示焉則五齊天地社稷之事也且天子祭天地諸侯祭社稷而已天子禘始祖所自出諸侯則太祖而已天子祫羣廟主大夫士及高祖而已則時祭一齊祫二齊禘祫三齊社稷四齊可類推也存疑孔氏頴達曰崔氏云周禮大祫於大廟則備五齊三酒朝踐王酌泛齊后酌醴齊饋食王酌盎齊后酌醍齊朝獻王酌泛齊因朝踐之尊再獻后酌醍齊因饋食之尊諸侯為賔酌沈齊尸酢王與后皆還用所獻之齊賔長酳尸酢用清酒加爵亦用三酒大禘則用四齊三酒不用泛齊朝踐王酌醴齊后酌盎齊饋食王酌醍齊后酌沈齊朝獻王酌醴齊再獻后還酌沈齊亦尊相因也諸侯為賔亦酌沈齊及三酒之法如祫禮四時之祭惟醴盎二齊及三酒朝踐王酌醴齊后亦酌醴齊饋食王酌盎齊后亦酌盎齊朝獻王還用醴齊再獻后還用盎齊亦尊相因也諸侯為賔亦酌盎齊三酒同於祫盖三酒本以供飲尊卑有常不得降也魯及王者之後大祫所用與王禘同若禘與王四時同侯伯子男禘用醴盎朝踐君夫人酌醴齊饋食君夫人酌盎齊朝獻君還酌醴齊再獻夫人還酌盎齊諸臣為賔酌盎齊尸酢君夫人用昔酒酢諸臣用事酒加爵皆清酒時祭止盎齊朝踐君制祭夫人薦盎進孰君割牲夫人薦酒朝獻君酌盎齊酳尸再獻夫人還酌酒以終祭賓獻皆酒加爵如禘祫之禮卿大夫祭酌奠惟用酒也祫祭既備五齊三酒以實八尊泛醴以著尊盛之盎醍沈以壺尊盛之凡五又各有明水之尊凡十三酒各加𤣥酒又六通斝彝盛明水黃彝盛鬱鬯又二故崔云大祫凡十八尊也其禘祭所用四齊醴盎盛以犧尊醍沈盛以象尊無降神之樂熊謂亦有之時祭春夏用犧尊盛醍齊象尊盛沈齊秋冬用著尊盛醴齊壺尊盛盎齊魯及二王後皆九獻與天子同陳氏祥道曰祫備五齊禘備四齊時祭備二齊又曰記所云君西酌犧象夫人東酌罍尊罍尊在阼犧象在西皆所酌而非所設此𤣥酒在室至澄酒在下則所設而非所酌也案崔鄭皆謂祫大禘小故為等差如此其實禘追所自出祫不追所自出安得禘反小於祫禮不王不禘安得諸侯亦有禘祫大禘在夏大烝在冬安得禘祫並用秋冬之著尊壺尊杞宋脩其禮物作賔王家其所脩者夏殷天子之禮安得據周禮之五齊三酒八尊而謂二王後與周天子同耶但周天子諸侯祭禮散逸姑存其説以為餼羊之供耳陳氏謂禘大祫小視崔鄭為優而陳者不酌酌者不陳則酌者置之何所疑正尊不酌酌者即其所貳大祭人衆酌獻亦多故必三貳小祭人寡酌獻亦少故一貳而已足也作其祝號𤣥酒以祭薦其血毛腥其俎孰其殽與其越席疏布以冪衣其澣帛醴醆以獻薦其燔炙君與夫人交獻以嘉魂魄是謂合莫祝之六反又之右反孰熟通殽本或作肴戸交反越音活冪音密又作鼏同衣去聲澣音緩莫漠通正義鄭氏康成曰此謂薦上古中古之食也周禮祝號有六一曰神號孔疏若皇天上帝二曰鬼號孔疏若皇祖伯某三曰祇號孔疏若后土皇祇四曰牲號孔疏若牛曰一元大武五曰齍號孔疏若稷曰明粢六曰幣號孔疏若幣曰量幣號者所以尊神顯物也孔疏神號鬼號祗號以尊神牲號齍號幣號以顯物腥其俎謂豚解而腥之孔疏豚解兩髀兩肩兩胉幷脊凡七及血毛皆所以法於太古也孰其殽謂體解而爓之孔疏肩一臂二臑三肫四胳五正脊六橫脊七長脅八短脅九此特牲九體少牢則加脡脊代脅為十一體以湯爓之不全熟也此以下所法於中古也越席翦蒲席也冪覆尊也澣帛練染以為祭服嘉樂也莫虛無也孝經説曰上通無莫孔疏孝經緯文言人之精靈上通於虛無寂寞孔氏穎達曰朝踐之時設此𤣥酒於五齊以上此重古設之其實不用以祭延尸在堂祝以血毛告於室又以俎盛肉進於尸前此皆用上古法以所爓骨體進於尸前下皆用中古法也周禮越席疏布是祭天物此云君與夫人交獻則宗廟禮蓋雜陳夏殷諸侯法也朝踐用醴饋食用醆主人獻尸賔長以肝從主婦獻尸賔長以燔從君一獻夫人二獻君三獻夫人四獻是交錯而獻也死者之精神已虛無寂寞得生者嘉善而神來歆饗是生者和合於寂寞也因魯之失禮故廣陳天子諸侯之事及五帝三王之道所言者不可以一代定其法制不可以一槩正其先後方氏慤曰上言祝嘏未見所以為號言𤣥酒醴醆未見所以為用上言犧牲鼎俎而亦未列其詳故此申言之而又廣及於所設所冪所衣也血以告幽毛以告全腥事之以神孰事之以人合古今之異質文之變而又合君夫人之獻則隂陽之義備矣魂陽也魄隂也酒陽食隂腥陽孰隂氣陽味隂馬氏睎孟曰魄者魂之體魂者魄之用體用合之則生離之則散故合鬼與神以祭於宗廟之中所以嘉其魂魄而合之於冥漠之中也周氏諝曰君陽以嘉魂夫人隂以嘉魄合二者以定之莫定也吳氏澄曰此祭之中事然後退而合亨體其犬豕牛羊實其簠簋籩豆鉶羹祝以孝告嘏以慈告是謂大祥此禮之大成也鉶音刑盛和羮器羮音庚正義鄭氏康成曰此謂薦今世之食也體其犬豕牛羊謂分别骨肉之貴賤以為衆俎也孔疏知非尸前正俎者以所陳多祭末之事不云合莫而云大祥也祝以孝告嘏以慈告各首其義也孔疏少牢祝曰孝孫某敢用柔毛剛鬛嘉薦普淖用薦嵗事于皇祖伯某以某妃配某氏尚饗少牢嘏曰皇尸命工祝承致多福無疆于女孝孫來女孝孫使女孝孫受禄于天宜稼于田眉夀萬年勿替引之孝子告神以孝為首神告孝子以慈為首各本祝嘏之義也祥善也今世之食於人道為善大成者解子游以禮所成也孔氏頴達曰前薦爓未孰今至饋食乃退取爓肉更合烹令孰擬更薦尸又尸俎唯載右體其餘不載者及左體亦合烹之烹之既孰乃體别骨之貴賤以為衆俎供尸及待賔客兄弟等簠簋籩豆鉶羹皆事尸所供設其籩豆亦兼據賔客及兄弟之等也方氏慤曰以稻梁實簠以黍稷實簋以水土之品實籩豆五味之和實鉶鼎祖禰所望於子孫莫大於孝子孫所頼於祖宗莫大乎慈故祝嘏以是告陸氏佃曰祥吉之先見者也上言合莫鬼事也亦哀事也此言大祥人事也亦吉事也陳氏祥道曰飲食宮室布帛之用具則養生送死之禮成犧牲酒醴鼓鐘祝嘏之用具則事神之禮成正君臣篤父子之倫具則教人之禮成總論蔣氏君實曰合莫以上朝踐之莭大祥以上饋食之莭朝踐禮之始饋食禮之終始貴乎嚴終極其備血毛腥爓越席疏布猶有貴於古也是曰合莫謂本是精神以求神於冥漠之間也合烹體籩豆祝嘏是後世之所備也乃曰大祥謂由是備禮而極其祥善之義也方其合莫也物味薄而誠敬在禮文簡而誠意通及其致詳也品物具而神祇樂誠意散而詞説行矣吳氏澄曰此言祭之末事自初至中末祭禮大備故曰大成徐氏師曾曰奉上世之禮物而不及後世則無文奉後世之禮物而不及上世則無本故文質備而大成此以上言禮之得者以申謹禮之意禮莫重於祭故特言之其所言多宗廟之祭而越席疏布則非廟祭之物以降上神亦不專先祖之靈蓋亦錯舉而互見之要其為禮之意則一也欽定禮記義疏卷三十
