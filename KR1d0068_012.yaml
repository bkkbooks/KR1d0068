body:
  text: 檀弓下第四之一君之適長殤車三乘公之庶長殤車一乘大夫之適長殤車一乘適丁歷反長竹丈反殤式羊反乘繩證反正義鄭氏康成曰皆下成人也自上而下降殺以兩成人遣車五乘長殤三乘下殤一乘尊卑以此差之庶子言公卑逺之孔疏君對臣之名有地大夫皆有君號公則五等之上又同三公就尊號以卑逺於庶子也公案適長君之正體故特言君庶長皆子故泛言公傳曰大功之殤中從上案禮年十九至十六為長殤十五至十二為中殤十一至八嵗為下殤大功中從上小功中從下孔氏頴逹曰此論諸侯及卿大夫之子送葬遣車之數遣車之形甚小葬柩朝廟畢將行設遣奠竟取所奠牲體臂臑折之為段用此車載之以遣送亡者使人以次舉之如墓置於椁中之四隅雜記云遣車視牢具置於四隅但遣車之數貴賤不同若生有爵命車馬之賜則死有遣車送之諸侯七乘大夫五乘後有明文鄭謂降殺宜兩則天子九乘士三乘也殤未成人未有爵命車馬之賜而得遣車者言其父有之得與子也天子九乘若適子成人則應七乘在長殤而死則五乘中殤從上亦五乘下殤三乘也若庶子成人則應五乘長殤中殤三乘下殤一乘也諸侯七乘則適子成人五乘長殤三乘中殤從上下殤則一乘也公亦諸侯也適長殤既三乘庶子成人乃三乘長殤則一乘中殤亦從上若下殤則無大夫五乘適子成人三乘長殤降兩故一乘中殤從上亦一乘若下殤及庶殤皆無也存疑孔氏穎達曰案下注云人臣賜車馬乃有遣車三命始賜車馬諸侯大夫再命不合有遣車今大夫適子長殤得有遣車一乘以其身為大夫德位既重雖未三命得有遣車鄭注雜記云士無遣車禮天子上士三命得有車馬之賜而云士無遣車者謂諸侯之士及天子中士下士也但喪禮質略天子之臣與諸侯之臣命數雖殊喪禮不異故鄭云大夫已上乃有遣車文主天子大夫其實兼諸侯大夫也鄭以士無遣車者文主諸侯之士其實亦兼天子中士下士也熊氏云人臣得車馬賜者遣車得及子不得車馬賜者遣車不得及子非也案鄭氏周官注謂士無二車而儀禮士喪明云二車鄭又以喪禮攝盛為解引雜記注士無遣車蓋因士喪禮不言遣車為說此疏云天子上士有遣車則不得謂士無遣車矣又云以諸侯之士言之則又非天子之臣與諸侯之臣命數雖殊喪禮不異矣又引雜記遣車視牢具周禮大行人牢禮之數非以命數而何且天子之大夫士與諸侯之大夫士命數逈殊而謂喪禮質略諸侯之臣不異天子之臣不可信也公之喪諸逹官之長杖長上聲正義鄭氏康成曰逹官謂君所命雖有官職不逹於君則不服斬孔疏不逹於君謂府史之屬不服斬衰但服齊衰三月若近臣閽寺之屬雖無爵命但嗣君服斬則亦服斬案喪服傳不以杖即位孔氏穎達曰此論臣為君杖法公者五等諸侯也諸者非一之辭達官謂國之卿大夫士被君命者也此對不達者故云長若遭君喪則備服衰杖不云衰從可知也若大夫之臣得為大夫君服斬與杖衆臣降其帶屨所謂衆臣為其君布帶繩屨也君於大夫將葬弔於宫及出命引之三步則止如是者三君退朝亦如之哀次亦如之朝直遙反正義鄭氏康成曰宮殯宮也出謂柩巳在路三命引之凡移九步朝喪朝廟也次他日賓客所受大門外舍也孝子至此而哀陳氏澔曰或出大門至平日待賓客次舍之處孝子哀而暫停柩車則亦如之孔氏穎達曰此論君弔臣之禮君於大夫之喪將至葬時必親往弔孝子於殯宫及其柩出殯宫之門君命遣引之引者三步則止君又命引之引者三步又止君又命引之引者又三步而止君又命引之柩車遂行君乃退去君或來弔參差早晚不必皆在殯宮或朝廟當發之時或柩巳出大門至平生待賓次舍之處君命引之使行如上來之事姚氏舜牧曰命引之三步則止者君念大夫平日效勞國家一旦捐館舍出不可不為之助力故於柩行命引之以致其隆重之禮而猶不忍其行之遽也姑三步則止如是者三焉以致其不忍之情是則君之所以禮大夫者耳案禮弔於葬者必執引君尊不親執故命人代為之以三為度此又君禮之别也存疑鄭氏康成曰以義奪孝子也三步則止不忍頓奪孝子之情也五十無車者不越疆而弔人疆居良反正義鄭氏康成曰氣力始衰孔氏穎達曰此論衰老不許徒行遠弔之事越疆則道路遙遠弔人又悲感哀戚恐增衰憊也方氏慤曰五十始衰而老者不以筋力為禮也案此指庶人之五十者言若仕則已為大夫當有車也季武子寢疾蟜固不說齊衰而入見曰斯道也將亡矣士唯公門說齊衰武子曰不亦善乎君子表微及其喪也曽㸃倚其門而歌蟜居表反說他活反一作稅見賢遍反㸃一作蒧多忝反正義鄭氏康成曰季武子魯大夫季孫夙案一作宿也強且專政國人事之如君蟜固能守禮不畏之矯失俗也道猶禮也武子無如之何佯若善之表猶明也㸃字晳曽參父倚門而歌明已不與也孔疏明已不與武子故無哀戚也孔氏頴逹曰此論季武子強僭蟜固正之之事時人畏武子入其門皆說衰蟜固不說齊衰入見且謂之曰著衰入大夫之門其道將亡絶矣將亡者未絶之辭蓋其時嚮餘大夫之門猶有著齊衰者武子謂失禮顯者凡人皆知今說衰失禮之微唯汝君子之人乃能表明之也陳氏澔曰武子寢疾之時蟜固適有齊衰之服遂衣凶服而問疾武子執政人所尊畏固之為此欲以易時人之觀瞻據禮而行武子雖憾不得而罪之也若倚門而歌則非矣記者蓋善蟜固之存禮譏曾點之廢禮也案季氏僭禮至於說衰私門其橫極矣蟜固當其疾時以齊衰見之以東匯陳氏說為確長樂陳氏謂示之凶而欲其死豈無服而故為此服以來乎孔疏以微為失禮之微正見夙之橫處考武子卒在昭公七年孔子方十七歲曾晳少於子路時止六七齡耳未必有倚門而歌事此亦出於傳聞陳氏譏其廢禮亦據記文言之耳又案三家專魯祿去公室自季武子始作軍城費取卞自封襄公欲適諸侯以避其害其平日作為一一皆無君之事而容一蟜固以示不敢自同於公門吾誰欺欺天乎有王者作夙也不勝誅矣杜氏墓地攘為己宮又許葬命哭明已之不惑於妖祥而待人忠厚記中所載二事其為狙詐如此世所稱姦人之尤者其夙也夫大夫弔當事而至則辭焉正義鄭氏康成曰辭猶告也擯者以主人有事告也主人無事則為大夫出通論孔氏穎達曰此以下論弔哭之禮大夫尊來弔士則孝子應出下堂迎之若當主人有大小斂殯之事則遣人辭告之以有事不得出也出謂出於庭若未斂以前唯君命出不為大夫出始喪哀戚甚也若正當小斂而大夫來弔則辭之以有事斂畢當踊之時延大夫入絶踊而拜之若當斂後踊時來則亦絶踊而拜之尊大夫不待事己也大夫退則出送於門外若士來弔雖當斂不告以有事事畢踊後而引士入然後拜之案士喪禮大夫有視斂之禮記所謂大夫升自西階階東北面東上是也此云辭者彼大夫先事而至者已曾出拜位在階下升視斂此則當事而至不及視斂故辭之事畢乃入士喪禮既殯乃拜大夫之後至者蓋兼有當事至者在也弔於人是日不樂日人一反樂音嶽又音洛正義鄭氏康成曰君子哀樂不同日子於是日哭則不歌案是日終竟一日也既弔不樂哀則不樂也未弔不樂樂則不弔也故曰哀樂不同日婦人不越疆而弔人正義鄭氏康成曰不通於外孔氏頴逹曰婦人無外事也陳氏祥道曰婦人見兄弟可以及閾而不可以踰閾送迎可以及門而不可以出門弔人可以出門而不可以越疆許穆夫人歸唁於衛而不可得則越疆而弔人如之何而可行弔之日不飲酒食肉焉正義鄭氏康成曰以全哀也弔於葬者必執引若從柩及壙皆執紼引音胤壙苦晃反又音曠紼音弗正義鄭氏康成曰示助之以力車曰引孔疏引長遠之名車行遠也棺曰紼孔疏紼撥舉之義棺帷撥舉不長遠也從柩贏者孔疏贏餘也謂數外之人孔氏穎達曰弔葬本為助執事故必相助引柩車也執引用人貴賤有數何東山云天子千人諸侯五百人大夫三百人士五十人案雜記諸侯執紼五百人周禮大司徒疏謂王喪大司徒帥六卿之衆取千人屬其六引其三百人已下不見所據亦降殺然與若其數足贏餘之人皆散行從柩至壙下棺窆時則不限人數皆悉執紼也方氏慤曰引在前屬之於車以道柩也紼在旁屬之於棺以弼柩也道柩者唯在路用之而已弼柩者至下棺亦用焉故雖不執引而或從柩及壙亦皆執紼也喪公弔之必有拜者雖朋友州里舍人可也弔曰寡君承事主人曰臨臨如字徐音力鴆反正義鄭氏康成曰拜者往謝之也雖朋友州里舍人謂無主後者承言亦為執事來陳氏澔曰寡君承事言來承助喪事此君語擯者傳命以入之辭臨言君辱臨其喪也孔氏穎達曰諸侯臣之喪公來親弔或遣人來弔喪家雖無主後必以次疏親往拜以謝其恩疏親亦無雖死者朋友及同州同里及喪家典舍之人往拜亦可也若有主後則主人自當親拜是以既夕禮云主人乘惡車鄭注云拜君命也弔曰寡君承事是君來語擯者使傳命之辭弔為助事故雖君尊亦曰承事也稱寡君應是弔他國之臣承公弔之下則已國之臣以欲供喪事謙也曰臨者主人辭謝之語言君屈辱降臨某之喪若弔士則直稱君故士喪禮君使某弔如何不淑是也案喪大記有無後無無主則弔必有拜者明矣拜當合弔時及往拜謝言注特指其一耳君遇柩於路必使人弔之正義鄭氏康成曰君於臣民有父母之恩孔氏穎達曰君於其臣當特弔於家故喪大記於大夫及士皆親弔之又禮譏蕢尚受弔及杞梁之妻不受野弔是也其或卑小之臣及庶人之等君不豫知其喪造次遇柩於路必使人弔也胡氏銓曰遇柩於路必使人弔之若齊侯哭敝無存之類大夫之喪庶子不受弔正義鄭氏康成曰不以賤者為有爵者主孔氏頴逹曰不受弔不為主人也適子主喪受弔拜賔若適子或有他故不在則雖庶子不敢受弔明已卑避適也士之庶子得受弔案無適子則庶子之長者受弔適子不在雖同母之弟亦不受弔知生者弔或有與庶子相識而弔之者亦不敢受使人辭之妻之昆弟為父後者死哭之適室子為主袒免哭踊夫入門右使人立於門外告來者狎則入哭父在哭於妻之室非為父後者哭諸異室免音問正義鄭氏康成曰哭之適室以其正也子為主親者主之也夫入門右北面辟正主也狎相習知者父在哭於妻之室不以私喪干尊也孔氏穎達曰此下論哭無服者之事適室正寢也禮女子適人者為昆弟為父後者不降以其正故也故姊妹之夫為之哭於適室之中庭子為主者甥服舅緦故命已子為主受弔拜賓也冠尊不居肉袒之上必先去冠而加免故凡哭哀則踊踊必先袒袒必先免故袒免哭踊也夫入門右者夫謂此子之父即哭妻兄弟者也據妻之為喪故言夫子既為主位東階之下西嚮父入門右近南而北嚮哭也父不為主若又西嚮便似二主入門右北面示辟為主之處據申詳之哭言思婦人倡踊則夫入門右亦哭踊也門內有哭則鄉里聞之必來相弔故使人立於門外告語來弔者述所哭之由明為主在子不關已也若弔者與此亡者曾經相識狎習則當入與共哭此夫若父在則適室由父故但於妻室之前哭之奔喪禮妻之黨哭諸寢蓋寢是大名適室及妻室異室總皆曰寢吳氏澄曰其夫為妻之兄弟雖無服然亦為之哭已無服故不為主而使子有服者為主也陳氏澔曰此聞妻兄弟之喪而未往哭時禮也父在已之父也為父後妻之父也方氏慤曰哭諸異室者以其别於適也有殯聞逺兄弟之喪哭於側室無側室哭於門內之右同國則往哭之正義鄭氏康成曰哭於側室嫌哭殯也哭於門內之右近南者為之變位孔疏以其尋常為主當在阼階東西面今稱門內之右故知近南為之變位猶西面也同國往哭喪無外事也孔氏頴逹曰哭於門內之右謂庶人無側室者逺兄弟謂異國也若同國則往哭之異國則否以已有喪殯不得嚮他國也通論陳氏澔曰側室者燕寢之旁室也門內大門之內也上言有殯聞逺兄弟之喪雖緦必往其亦謂同國與子張死曽子有母之喪齊衰而往哭之或曰齊衰不以弔曽子曰我弔也與哉正義鄭氏康成曰或人以其無服非之曾子言於朋友哀痛甚而往哭之非若凡弔陳氏澔曰以母喪之服而哭朋友之喪踰禮已甚故或人止之曾子之意但以友義隆厚不容不往哭之又不可釋服而往但往哭而不行弔禮耳故曰我弔也與哉辨正黃氏震曰齊衰者曾子為母服非為弔子張而服也往哭者友朋哀痛之情特就因其服而往非以此服行弔禮也諸家乃以曾子為文過夫曾子豈文過者哉案門人於孔子若喪父孔子於顏回若喪子曾子於子張宜若兄弟不容不往哭而又不可釋服而往故即以母服往哭之然哭以傷之非弔也禮知生者弔知死者傷故曾子曰我弔也與哉使察其意耳孔氏以曾子為失禮過矣有若之喪悼公弔焉子遊擯由左悼音道正義鄭氏康成曰悼公魯哀公之子存疑鄭氏康成曰擯相侑喪禮者喪禮廢亡時人以為此儀當如詔辭而皆由右相是善子游正之孝經說曰以身擯侑孔氏穎達曰此論擯相之法在主人曰擯在客曰介大宗伯注云出接賓曰擯入詔禮曰相少儀曰詔辭自右鄭云為君出命也立者尊右傳君之詔辭為尊則宜處右若於喪事則惟賓主居右而已自居左子游如此是知禮也方氏慤曰吉事尚左凶事尚右子游為擯而由左則尚右故也案此是君弔於臣之禮君弔於臣升降皆自阼階臣不敢有其室也擯為主人導君以入也由左自阼階也鄭以贊幣自左詔辭自右推之已誤孔以賓主論之云賓主居右而已自居左更誤有氏可以君為賓乎衛湜本改云推賓居右而已自居左則子游自居於主推悼公為賓更繆方氏吉尚左凶尚右之說尤無涉豈吉事之擯皆由右乎齊穀王姬之喪魯莊公為之大功或曰由魯嫁故為之服姊妹之服或曰外祖母也故為之服榖音告又古毒反正義鄭氏康成曰榖當為告聲之誤也王姬周女齊襄公之夫人春秋周女由魯嫁卒則服之如內女服姊妹是也天子為之無服孔疏天子無服以尊卑不敵故也嫁於王者之後乃服之莊公齊襄公女弟文姜之子當為舅之妻非外祖母也外祖母又小功也孔氏頴逹曰此論諸侯為王姬著服之事案莊二年齊王姬卒榖梁傳云為之主者卒之案元年秋築王姬館於外下云王姬歸於齊是由魯嫁也君為姑姊妹女子嫁於國君者著大功之服王姬既比之內女故服大功也晉獻公之喪秦穆公使人弔公子重耳且曰寡人聞之亡國恆於斯得國恆於斯雖吾子儼然在憂服之中喪亦不可久也時亦不可失也孺子其圖之以告舅犯舅犯曰孺子其辭焉喪人無寶仁親以為寶父死之謂何又因以為利而天下其孰能說之孺子其辭焉公子重耳對客曰君惠弔亡臣重耳身喪父死不得與於哭泣之哀以為君憂父死之謂何或敢有他志以辱君義稽顙而不拜哭而起起而不私子顯以致命於穆公穆公曰仁夫公子重耳夫稽顙而不拜則未為後也故不成拜哭而起則愛父也起而不私則逺利也重直龍反儼魚檢反喪息浪反孺如樹反與音預稽音啓顙桑黨反顯依注作韅呼遍反夫音扶下同逺于萬反正義鄭氏康成曰獻公殺其世子申生重耳辟難出奔是時在翟秦穆公使人就弔之於斯謂在喪代之際也喪謂亡失位孺稚也勸其反國意欲納之舅犯重耳之舅狐偃字子犯寶謂善道可守者又因以為利謂欲反國求為後是利父死也說猶解也他志謂利心子顯使者公子縶也盧氏云古者名字相配顯當作韅孔氏頴逹曰此論公子重耳不因父喪以取國之事使者弔重耳既畢又致穆公之命以勸重耳故言且曰者非特弔兼有餘事也得國失國其機恆在喪禍交代之際求之則得不求則失雖儼然端靜在憂戚喪服之中然身喪在外不可久得國之時亦不可失欲重耳圖之重耳入告舅犯舅犯言父死是何等事豈得又因以為己利天下聞之其誰解說我以為無罪公子重耳出而對客既叙其弔意謝其欲納之恩又道不可之意言豈復敢於悲哀之外别有他志以辱君之義也穆公本勸重耳反國重耳若欲為後則當拜謝其恩今不受其勸故不拜穆公以其不拜故云未為後也所以稽顙者自為父喪哀號也凡喪禮先稽顙而後拜乃成今直稽顙而不拜故云不成拜也既聞父死勸其反國哀慟而起是其愛父也既起而不私與使者言必無心反國是遠利也陳氏澔曰公子既聞使者之言入以告之子犯犯言當辭而不受可也父死是凶禍大事豈可因此以為反國之利所以不當受其相勉反國之命也為後者成拜所以謝弔禮之重今公子以未為後故不成拜也愛父猶言哀痛其父也愛父遠利皆仁者之事故稱之曰仁夫公子重耳存異鄭氏康成曰仁親親行仁義案大學鄭注亦云親愛仁道不如朱子訓仁愛其親為正帷殯非古也自敬姜之哭穆伯始也正義鄭氏康成曰穆伯魯大夫季悼子之子公甫靖也敬姜穆伯妻文伯歜之母也禮朝夕哭不帷張氏逸曰敬姜早寡晝哭以辟嫌帷殯或亦辟嫌表夫之遠色也孔氏穎達曰此論哭殯不合帷殯之事孝子思念其親朝夕哭時褰徹其帷今敬姜之哭穆伯以辟嫌之故遂朝夕哭不徹帷下文云穆伯之喪敬姜晝哭與此同也陳氏澔曰敬姜辟嫌而不褰帷自此已後人皆效之故記者曰非古喪禮哀戚之至也節哀順變也君子念始之者也正義鄭氏康成曰始猶生也念父母生已不欲傷其性孔氏穎達曰此下總論孝子遭喪所為哭踊復魄飯含重主殯葬反哭虞祔等事居父母喪是哀戚之至極也既為至極恐其傷性故辟踊有節以裁節其哀欲順孝子悲哀使之漸變所以然君子思念父母之生已恐其傷生也案節減也減與除異減從重而輕除從有而無將變有為無先變重為輕斯其變也順而易如三月變食粥為疏食變四升三升為六升之受服期年又變為菜果為功衰大祥而食鹽醬服纖縞如是而後復常三月而變小祥而又變至於三年而除則所待除者無多故亦勉而為之故曰順變謂順其性而遞變之亦若漸積引導使之不自覺者先王制禮不敢不及亦不敢過節使之然也哀本於天性先王即以天性制之故曰君子念始之者是也曰順變則非奪其情可知復盡愛之道也有禱祠之心焉望反諸幽求諸鬼神之道也北面求諸幽之義也正義鄭氏康成曰復謂招魂鬼神處幽暗望其從鬼神所來北面鄉其所從來也禮復者升屋北面孔氏穎達曰始死招魂復魄盡此孝子愛親之道也方氏慤曰孝子之事親固有愛之道及其死也猶復以冀其復生故曰盡愛之道也冀其復生所以有禱祠之心幽者鬼神之道望其魂氣自幽而反故曰望反諸幽北為隂有幽之義故曰北面求諸幽也存異鄭氏康成曰分禱五祀庶幾其精氣之反案行禱五祀在未卒前與復無與鄭合言之誤也拜稽顙哀戚之至隱也稽顙隱之甚也正義鄭氏康成曰隱痛也稽顙者觸地無容孔氏穎達曰孝子拜賓之時先稽顙而後拜者哀戚之至痛也就拜與稽顙二事之中稽顙尤為痛之甚也案三年之喪稽顙而後拜稽顙者因賓之來弔而痛已親也拜者因痛已親而感賓之來弔也拜與稽顙皆哀戚之至哀謂哀聲戚謂憂容所以聲容之戚且哀者以其心之愴痛也拜也稽顙也莫不痛心而稽顙之痛較拜為尤甚焉惟喪有稽顙常行見君惟稽首平敵惟頓首耳飯用米貝弗忍虛也不以食道用美焉爾飯扶晚反正義鄭氏康成曰尊之也食道䙝米貝美孔疏食道謂飲食之道飲食人所造作為䙝米貝天性自然為美陳氏澔曰實米與貝於死者口中不忍其口之虛也此不是用飲食之道但用此美潔之物以實之焉爾通論孔氏穎達曰貝水物古以為貨天子飯用黍諸侯以粱大夫以稷士以稻天子之士亦以粱其含周禮典瑞大喪共飯玉含玉注含玉如璧形而小是天子用璧又飯玉碎玉以雜米也雜記含者執璧將命是諸侯以璧卿大夫無文成十七年公孫嬰齊夢贈瓊塊注云食珠玉含象則卿大夫用珠也士喪禮貝三依雜記則大夫當五諸侯七天子九何休注公羊云天子以珠諸侯以玉大夫以璧士以貝存疑孔氏穎達曰士喪禮飯用沐米案士喪禮祝淅米於堂南面用盆管人受潘煮於垼用重鬲此沐米也又曰祝盛米於敦奠於貝北此飯米也孔氏謂飯用沐米誤銘明旌也以死者為不可别已故以其旗識之愛之斯録之矣敬之斯盡其道焉耳銘音名旌音精别彼列反識式至反正義鄭氏康成曰明旌神明之旌也不可别謂形貌不見愛之敬之謂重與奠孔氏穎達曰孝子思念其親追愛之道故為重以存録其神又設奠以盡其孝養之道然亦得總為明旌之義方氏慤曰凡銘皆所以為名明旌謂之銘故男子書名焉夫愛之則不忍忘故為旌以録死者之名敬之則不敢遺送死之道所以為盡也彭氏曰明旌者神明之也有旌則可識可識則可别故曰以死者為不可别已故以其旌識之陳氏澔曰士喪禮銘曰某氏某之柩初置於簷下西階上及為重畢則置於重殯而卒塗始樹於肂坎之東通論孔氏穎達曰士喪禮為銘各以其物又司常云大喪共銘旌注王建大常諸侯建旗孤卿建旜大夫士建物則銘旌亦然但以尺寸易之士喪禮士長三尺大夫五尺諸侯七尺天子九尺陳氏澔曰不命之士則以緇長半幅赬末長終幅廣三寸半幅一尺也終幅二尺也是總長三尺案鄭以愛敬為重與奠孔意屬上明旌蓋此二語實承上起下明旌録之而重亦録之明旌有敬道而奠尤盡其道也重主道也殷主綴重焉周主重徹焉重直容反綴竹劣反又竹衛反正義鄭氏康成曰始死未作主以重主其神既虞而埋之乃後作主春秋傳曰虞主用桑練主用栗綴猶聯也殷人作主而聯其重以縣諸廟去顯考乃埋之周人作主徹重埋之孔疏殷人始殯置重於廟庭作虞主訖則綴重縣於新死者之廟顯考謂高祖也死者世世遞遷至為顯考其重恆在離顯考乃埋其重以既遷無廟也周人作主則埋重既夕禮注埋重於門外道左是也若虞主既練亦埋於祖廟門外之道左孔氏穎達曰人始死作重猶若木主主者吉祭所以依神在喪重亦所以依神故曰重主道也方氏慤曰重設於始死之時主立於既虞之後重非主也有主之道爾殷雖作主矣猶綴重亦縣於廟不忍棄之也周既作主矣重遂徹而埋於土不敢瀆之也夫重與主皆所以依神而已或曰重或曰主何也始死而未葬則有柩矣有柩而又設重所以為重也既有廟矣有廟而必立主是為主也通論馬氏睎孟曰主一而已不可二也然則所謂重者安所用哉始死之際未有主以神明為不可一日無所依故作重見人子求神之至焉殷綴之於廟必待親盡廟祧而除之蓋有所不忍然不若周主重徹焉作主則埋之孔子謂殷已慤吾從周此皆慤而不文也奠以素器以生者有哀素之心也惟祭杞之禮主人自盡焉爾豈知神之所饗亦以主人有齊敬之心也齊側皆反正義鄭氏康成曰哀素言哀痛無飾也凡物無飾曰素哀則以素敬則以飾禮由人心而已孔氏穎達曰奠謂始死至葬之祭名以其時無尸置奠於地故謂之奠悉用素器所以表主人有哀素之心也遂論虞及卒哭練祥之祭哀則以素謂葬前敬則以飾謂虞後故士虞禮不用素器云此等祭祀之禮既見親終主人自盡致孝養之道焉爾豈知神之所饗須設此祭所以設之者亦以主人有齊敬之心也馬氏睎孟曰素器若士喪禮有素俎士虞禮有素几也哀素者哀而不文存疑吳氏澄曰虞以前親喪未久奠而不謂之祭其哀特甚無心於飾故用素器虞以後親喪漸久卒祔練祥雖猶在喪制之中然已是祭祀之禮敬心加隆非如初喪之素器也其盡禮而漸文豈謂死者真能來饗而然亦自盡其禮以致敬親之心焉爾案豈知二字正不敢自必而盡其齊敬十六字當作一句讀所謂以其恍惚與神明交庶或饗之庶或饗之也若以神未必果饗釋之疏矣辟踊哀之至也有算為之節文也辟婢亦反踊音勇算桑亂反正義鄭氏康成曰算數也孔氏穎達曰撫心為辟跳躍為踊孝子喪親哀慕至悶男踊女辟是哀痛之極至也若不裁限恐傷其性故辟踊有算為凖節文章每一踊三跳三踊九跳為一節士三日而殯凡有三踊初死日襲襲而踊明日小斂踊又明日大斂踊凡三日為三踊也大夫四日而殯初死日一踊明日襲又一踊至三日小斂朝一踊小斂時又一踊至四日大斂朝不踊當大斂時又一踊凡四日為五踊諸侯六日而殯初死日一明日襲一至三日小斂朝一當小斂時又一四日無事一五日一至六日朝不踊當大斂時又一凡六日七踊周禮王八日而殯死日一明日襲一其閒二日為二至五日小斂為二其閒二日又二至八日大斂朝不踊大斂時又一凡八日九踊故云為之節文也故雜記云公七踊大夫五踊士三踊鄭注云士小斂之朝不踊君大夫大斂之朝乃不踊是也方氏慤曰有算則有節有節則文無節則質故謂之節文案哀之至者不自知其哀之至而辟踊先王於不可算者而為之算要以示哀之有度而無庸過焉耳非欲孝子且辟且記且踊且數亦非令相者祝者為之握算而推之抑之也袒括髮變也愠哀之變也去飾去美也袒括髮去飾之甚也有所袒有所襲哀之節也括觀濶反愠紆運反去羌吕反正義孔氏穎達曰袒衣括髮孝子形貌之變悲哀慍恚孝子哀情之變去其吉時服飾是去其華美也去飾雖有多塗袒括髮最為甚也孝子悲哀理應常袒何以有所袒有所襲時者表明哀之限節也哀甚則袒哀輕則襲方氏慤曰袒則去其衣括髮則投其冠故曰袒括髮變也發於聲音見於衣服而生於隂者此哀之常也及有感而慍而至於辟踊者陽作之也此其變與故曰慍哀之變也吳氏澄曰此條是釋辟踊及袒括髮之義以哀之至釋辟踊以變釋袒括髮慍又申釋辟踊哀之變則轉釋慍之義也去飾又申釋袒括髮去美則轉釋去飾之義也有算言辟踊之節有所袒有所襲言袒括髮之節辟踊之節言之於始袒括髮之節言之於末者錯亂以為文也辨絰葛而葬與神交之道也有敬心焉周人辨而葬殷人冔而葬冔况甫反正義鄭氏康成曰接神之道不可以純凶天子諸侯變服而葬冠素辨以葛為環絰既虞卒哭乃服受服也雜記曰凡辨絰其衰侈袂踰時哀衰而敬生敬則服有飾大夫士三月而葬未踰時周辨殷冔俱象祭冠而素禮同也孔疏居喪著喪冠麻絰身服衰裳是純凶也尋常辨絰以麻為環絰今葬素辨環絰用葛不以麻接神不可純凶也鄭知天子諸侯者以下云有敬心焉日月踰時敬心乃生也素辨謂素帛為辨以葛與辨絰連文故云葛環絰然則要帶仍用麻也天子諸侯既虞大夫士卒哭乃受服蓋大夫已上卒哭與虞其月不同士虞與卒哭同在一月也引雜記者證既服辨絰其衰亦改喪服袂二尺三寸袪尺二寸則葬時既制其衰袂三尺三寸袪尺八寸是改喪服之衰也王制云夏后氏收而祭殷人冔而祭周人辨而祭故鄭知俱象祭冠也士冠禮周辨殷冔夏收通論方氏慤曰與神交之道則心主乎敬夫厭冠麻絰居喪之禮也至於葬則以辨易冠以葛易麻者示敬故也子游曰飯於牖下小斂於户內大斂於阼殯於客位祖於庭葬於墓所以即逺也比至於葬則即遠之至矣故以神道交之存異陸氏佃曰辨絰葛在下則葛帶也絰仍用麻辨絰葛而葬卿大夫已上禮知然者以下周人辨而葬殷人冔而葬知之也喪致哀而已葬則有敬心焉辨而葬冔而葬則其敬心益隆陳氏澔曰敬山川之神不敢以純凶之服交神也案上記葛要絰疏云小祥男子去首絰惟餘要葛是變必由首絰始此辨絰葛當如孔說首絰用葛而要帶仍用麻陸謂易要帶而首絰不易非也鄭以天子七月而葬已踰兩時諸侯五月而葬亦踰一時故曰哀衰而敬生若大夫三月士踰月則哀心方重故士喪無辨絰葛之文陸改為卿大夫已上禮似大夫亦然矣又此敬字鄭正從哀字推出謂非其忘哀也與神交謂吾父母未葬奠而不祭以人道待之至葬日虞乃以神道待之耳陳氏謂山川之神大繆下有司釋奠於道左主人已先歸矣孝子何嘗以辨絰葛祭山川之神啜主人主婦室老為其病也君命食之也啜昌悅反又常悅反為於僞反正義鄭氏康成曰尊者奪人易也啜啜粥也孔氏穎達曰此論尊者奪孝子情之法啜者親喪三日之後啜粥之時主人亡者之子主婦亡者之妻室老家之長相此三人並是大夫之家貴者為其啜粥病困故君命食疏食喪大記主婦食疏食謂既殯之後此主婦啜者謂未殯前通論陸氏佃曰謂親喪三日之後君命以粥啜焉故曰為其病也君命食之也據問喪云鄰里為之糜粥以飲食之案士喪君不命故鄰里食之此言君命食之謂大夫已上反哭升堂反諸其所作也主婦入於室反諸其所飬也養羊尚反正義鄭氏康成曰堂親所行禮之處室親所饋食之處孔氏穎達曰葬窆訖反哭於廟升堂是親平生祭祀行禮之地主婦入於室是於親所饋食供養之處也此謂在廟也下始云遂適殯宮故知初反哭在廟也反哭之弔也哀之至也反而亡焉失之矣於是為甚殷既封而弔周反哭而弔孔子曰殷已慤吾從周封依注音窆窆彼驗反慤苦角反正義鄭氏康成曰哀痛甚也封當為窆窆下棺慤者得哀之始未見其甚也孔氏穎達曰在廟思想其親而不見故悲哀為甚壙者非親存所在之處今柩至此弔者於此而來哀情質慤故云慤也方氏慤曰人之始死也則哀其死既葬也則哀其亡其亡則哀為甚矣故反哭之時有弔禮焉問喪曰入門而弗見也上堂又弗見也入室又弗見也亡矣喪矣不可復見已矣故哭泣辟踊盡哀而止矣既封而弔者受弔於壙也反哭而弔者受弔於家也夫弔也者所以弔其哀而已窆雖為哀然不若反哭之哀為甚此孔子所以謂殷為己慤周人弔於家示民不偝也子曰死民之卒事也吾從周其言蓋本諸此陳氏澔曰賓之弔者升自西階曰如之何主人拜稽顙當此之時亡矣失矣不可復見吾親矣哀痛於是為甚也親之在土固為可哀不若求親於平生居止之所而不得其哀為尤甚也故弔於墓者不如弔於家者之情文為兼盡故欲從周也葬於北方北首三代之逹禮也之幽之故也首手又反正義鄭氏康成曰北方國北也孔氏穎達曰之幽言葬於國北及北首者鬼神尚幽暗往詣幽冥故也殯時仍南首者孝子猶若其生不忍以神待之方氏慤曰三代之禮雖有文質之變至於葬之北方北首則通而行之者皆所以順死者之反乎幽故也既封主人贈而祝宿虞尸封讀窆正義鄭氏康成曰贈以幣送死者於壙也虞喪祭也孔氏穎達曰既封謂葬已下棺主人以幣贈之時祝先歸宿戒虞尸案既夕禮主人贈用制幣𤣥纁束帛也士虞禮記云男男尸女女尸是虞有尸也方氏慤曰宿亦戒也以事戒之曰戒以期戒之曰宿祭統言宫宰宿夫人與此言宿同義吳氏澄曰此條言葬後虞祭之事虞不筮尸擇可為尸者宿之陳氏澔曰柩行至城門公使宰夫贈𤣥纁束既窆則用此𤣥纁贈死者於墓虞猶安也葬畢迎精而反日中祭之於殯宫以安之也尸之為言主也不見親之形容心無所依故立尸而使著死者之服所以使孝子之心主於此也禫祭已前男女異尸異几祭於廟則無女尸而几亦同矣少牢禮云某妃配是男女共尸案虞禮注骨肉歸土魂氣無所不之孝子謂其倣徨三祭以安之葬矣亡矣魂氣之倣徨者杳不可即矣祭以安之使神依乎主而儼然在上斯離者不離矣既反哭主人與有司視虞牲有司以几筵舍奠於墓左反日中而虞舍音釋正義鄭氏康成曰視虞牲謂日中將虞省其牲也舍奠墓左以父母形體在此禮其神也周禮冢人凡祭墓為尸孔氏穎達曰此既窆之後事有司修虞之有司也舍釋也奠置也墓道向南以東為左孝子先反修虞故有司以几筵及祭饌置於墓左以禮地神也反謂所使奠墓左有司歸也必用日中者是日時之正也士虞禮注云君子舉事必用辰正再虞三虞皆用質明蓋周人尚赤大事用日出故朝葬也吳氏澄曰既實土則主人迎精而反反哭於廟及殯宮反哭送賓畢主人沐浴畢與有司同省視虞祭所用之牲墓所之有司當主人迎精而反之後代為主人舍奠於墓左以禮地神禮畢乃歸未葬已前每日朝夕哭有奠無祭雖殷奠有盛饌亦不謂之祭也及葬後而虞則有司始謂之祭也陳氏澔曰士之禮虞牲特豕几所以依神筵坐神之席也席敷陳曰筵案本文兩言有司或佐主人視牲或為主人釋奠各有所司未必待釋奠之有司反而後虞當是謂主人之反因日中而虞必用是日之正故也日中以辰正之說為確故曰是日不出此葬之日或有故如日食之待變者與葬日虞弗忍一日離也離力智反正義鄭氏康成曰弗忍其無所歸也方氏慤曰弗忍一日離其親故不待明日而後虞也是日也以虞易奠卒哭曰成事易音亦正義鄭氏康成曰虞後卒哭而祭其辭蓋曰哀薦成事孔疏士虞禮無文稱蓋以疑之成祭事也祭以吉為成孔氏穎達曰虞祭尚凶祭禮未成今既卒無時之哭惟有朝夕二哭漸就於吉故云成事其虞與卒哭尊卑不同雜記士三月而葬五月而卒哭大夫三月而葬五月而卒哭諸侯五月而葬七月而卒哭約此天子七月而葬九月而卒哭雜記又云諸侯七虞大夫五士三則天子九也虞皆用柔日隂取其靜最後一虞用剛日陽取其動謂動而將祔也故士虞禮云三虞卒哭他用剛日士三虞卒哭同在一月假令丁日葬葬日而虞則已日二虞後虞改用剛則庚日三虞也三虞與卒哭相接則壬日卒哭也士之三虞用四日則大夫五虞當八日諸侯七虞當十二日天子九虞當十六日大夫已上卒哭去虞校兩月則虞祭既終不得與卒哭相接其虞後卒哭之前剛日雖多不須設祭以正禮既成故也陳氏澔曰始死小斂大斂朝夕月朔朝祖賵遣之類皆喪奠也此日以虞祭代去喪奠故曰以虞易奠敖氏繼公曰卒哭卒殯宫之哭也蓋未葬朝夕哭皆於殯宫卒哭之後雖存朝夕之節然於次而不於宫故曰卒殯宫之哭也案士虞禮别無卒哭之文雜記云士三月而葬是月也卒哭故先儒疑卒哭即三虞也然雜記上大夫虞用少牢卒哭用大牢是異牲異祭且異月也士三月而葬是月卒哭士三虞止四日孔疏明言士三虞卒哭同在一月又云士虞與卒哭相接如庚日三虞壬日卒哭則卒哭之去末虞中閒越一日安得以三虞即為卒哭乎儀禮記虞卒哭他用剛日鄭謂自三虞至卒哭中閒有他祭亦用剛日謂之他者假設言之其義甚明鄭又言他謂不及時而葬者蓋以不及時而葬中閒更不止越日有祭總謂之他耳非以不及時釋他字義也或疑卒虞後至祔每剛日必祭則太數祔前兩月不祭又太疏不知中有月朔月半及薦新之奠皆所謂他也是日也以吉祭易喪祭明日祔於祖父祔音附正義鄭氏康成曰卒哭吉祭也祔于祖父祭告於其祖之廟也孔氏穎達曰士虞禮云卒哭之明日祔于祖父司馬氏光曰始虞祝辭云適爾皇祖某甫告之以適皇祖所以安之故置祔於卒哭之來日胡氏銓曰既夕禮曰卒哭明日以其班祔蓋周禮也祔猶屬也屬昭穆之次吳氏澄曰是日卒哭之日虞祭猶是喪祭卒哭始是吉祭故曰是日以吉祭易喪祭明日卒哭之次日祖父謂死者之祖考孫祔於祖昭穆同也陳氏澔曰祔之為言附也祔祭者告其祖父以當遷他廟而告新死者以當入此廟也卒哭時告於新主曰哀子某來日隮祔爾於爾皇祖某甫及時則奉新主入祖之廟而並告之曰適爾皇祖某甫以隮祔爾孫某甫孫必祔祖者所謂以其班也畢事虞主復於寢三年喪畢遇四時之吉祭而後奉新主入廟也虞祭閒一日而卒哭與祔則不閒日案是日之祭為吉祭非復前此之喪祭也初虞以漸趨吉至三虞則全吉矣吉祭重敬不似喪祭倉卒簡略一任悲哀己也三虞之明日祔於祖父有所祔斯有所歸必三虞而後祔者初虞再虞尚惝恍無憑至三虞則魂氣已安故用剛日以成之也孫必祔於祖方氏謂或祔於祖或祔於父誤通論程子曰喪須三年而祔若卒哭而祔則三年都無事禮卒哭猶存朝夕哭若祭於殯宫則哭於何處古者君薨三年喪畢吉禘然後祔因其祫祧主藏於夾室新主遂自殯宫入於廟國語言日祭月享禮中豈有日祭之禮此正謂在三年之中不徹几筵故有日祭朝夕之饋猶定省之禮如其親之存也至於祔祭須是三年喪終乃可祔也其變而之吉祭也比至於祔必於是日也接不忍一日末有所歸也比必利反正義鄭氏康成曰末無也日有所用接之李氏格非曰以生者之情則不忍一日離窮死者之理則不忍一日末有所歸虞祭所以安神也故以一日離言之接祭所以致情也故以不忍一日末有所歸言之存疑孔氏穎達曰上虞卒哭及祔皆據得正禮者耳其變而之吉祭者謂不得正禮變常禮也所以有變者或時有迫促故事有忌諱未及葬期死而即葬者即喪服小記所云赴葬者赴虞者三月而后卒哭彼據士禮而言速葬速虞之後卒哭之前其日尚賒不可無祭謂之為變也之往也謂既虞往至吉祭也比至於祔必於是日接者謂三虞卒哭之間剛日則連接其祭蓋以孝子不忍親一日無所依歸也此經亦據士若大夫已上赴葬赴虞之後為接祭至當葬之月終虞之祭日乃止其祝亦稱哀薦成事虞禮他用剛日此經謂之變者虞禮謂之他其義一也鄭注虞禮云他謂不及時而葬者辨正吳氏澄曰變亦易也接相連不閒也變而之吉即上文所謂以吉祭易喪祭也比至於祔必於是日也接即上文所謂明日祔於祖父也言喪祭變而趨吉祭自卒哭始相比逮及祔祭必於此卒哭之日相連接而不閒斷者不忍使親之神一日無所歸也蓋卒哭之末有餞禮送神適祖廟矣翼早急宜就祖廟迎奉其神若用虞祭之例相隔一日而始祔祭則卒哭後祔祭前此一日親之神無所依歸孝子不忍故祔祭必與卒哭之日相連接而不閒日也蓋以神魂離殯宫適祖廟不可使之一日無歸也注疏以變為非常禮之祭謂速葬速虞者於卒哭前再有非常之祭考之經傳未見明據敖氏繼公曰他者變易之辭不用柔日而别用剛日故曰他殷練而祔周卒哭而祔孔子善殷正義鄭氏康成曰孔子善殷蓋期而神之人情也吳氏澄曰殷練而祔者練之次日乃祔於祖廟周人雖於卒哭之後祔祖然祔後練前有朝夕哭仍就殯宫蓋朝夕哭者孝子哀親之不存而哭非謂其神之在此而哭也陳氏澔曰孝經曰為之宗廟以鬼享之孔子善殷之祔者以不急於鬼其親也存疑呂氏大臨曰禮之祔祭各以昭穆之班祔於其祖既除喪而後主遷於新廟故謂之祔左氏傳云君薨祔而作主特祀於主蒸嘗禘於廟周人未葬奠於殯虞則立尸有几筵卒哭而祔祔始作主至除喪然後主遷新廟以時而蒸嘗禘焉不立主者其祔亦然士虞禮及雜記所載祔祭皆是殷人練而祔則未練已前猶祭於寢有未忍遽改之心此孔子所以善殷辨正朱子曰孔子之言萬世不可易矣况期而神之之意揆之人情亦為允愜但其節文次第今不可考而儀禮之書自始死以至祥禫其節文度數詳焉故溫公書儀亦從之鄭氏說凡祔已反於寢練而後遷廟左氏亦有特祀於主之文則古人之祔固非遂徹几筵也開元禮高氏既非之然如其自為說大祥徹靈座明日祔廟中閒一夕既無所歸矣恐不若且從儀禮也又曰穀梁但言壞舊廟不言遷新主安知非練遷舊主三年納新主耶又曰必先遷高祖之主於夾室然後可改釁其廟而納祖主必遷祖之主於高廟然後可改釁其廟而納新祔主案殷周之禮當以孔子所善為主漢唐諸說當以朱子所論為宗今由夫子所論而參之諸經通之諸說記言喪者不祭左氏言特祀於主蒸嘗禘於廟周禮言王有大故則宗伯攝祭王制言犆礿祫禘祫嘗祫蒸蓋三年喪殯宫之祭王自主之故言特祀於主宗廟三祫皆宗伯攝之故言蒸嘗禘於廟及喪者不祭且春不祫則無從遷廟猶特祀於主必至蒸嘗禘之祫乃遷故蒸嘗禘乃言於廟也穀梁言練而壞廟是王小祥奉新主祔於祖祔祭竟仍還殯宫宗伯於後第一祫告當遷於羣祖因留髙祖之主於夾室既遷壞高祖廟復新之以待祖主之入第二祫因遷祖之主入於高廟既遷壞祖廟復新之以待新主之入若諸侯則夏禘一犆一祫其年止二祫耳至三年喪畢乃奉新主入於禰廟然亦必因夏之大禘冬之大蒸始與羣祖合食蓋主之必遷者義之公故臨之以大祖而行之以攝祭之宗伯祔者仁之道故祔於祖而行之以嗣位之孝王且因祫而遷則昭穆主皆入大祖之室而因留當遷之高祖隨諸祧主入於夾室則遷之有禮而無迫促之嫌而後壞廟新廟以次遞遷皆有節文而無急猝之失新主既入廟乃除靈座自不至一日末有所歸故服䖍云三年已前不得遷廟三年喪畢則遭蒸嘗行祭而遷廟也若三年喪畢而當春犆則新主未可遽入俟夏祫始行之則靈座雖禫未可除故徐邈云三時皆可祫而服終無常喪畢則隨蒸嘗禘之時以祫而杜預遂以為祫禘為遷主之祭范寧謂三年喪畢致新死之主於廟曰禘許愼謂三年喪畢則禘於大廟以致新死者杜佑謂禫祭後乃祫來年禘於羣廟諸說所自來也夫祔之節次如此則練而祔正得其中而周人之卒哭而祔太早矣孔子善殷其從殷哉如此則虞祭不用適爾皇祖之文必至練祭乃用之也君臨臣喪以巫祝桃茢執戈惡之也所以異於生也喪有死之道焉先王之所難言也茢音列又音例惡烏路反正義鄭氏康成曰桃鬼所惡茢萑苕可掃不祥為有凶邪之氣也生人則無凶邪孔氏穎達曰此論君臨臣喪之禮君臨臣喪則以巫執桃祝執茢又使小臣執戈若往臨生者但有執戈無巫祝桃茢之事故云異於生也案喪大記大夫之喪將大斂君往巫止於門外祝先入又士喪禮大斂而往巫止於廟門外祝代之小臣二人執戈先二人後此皆大斂之時小斂及殯更無文明與大斂同也直言巫止無桃茢之文則去桃茢可知也喪大記雖記諸侯禮明天子亦然然人之喪有死散之道人之所惡故難言也又曰天子臨臣喪未襲巫祝桃茢執戈三者具諸侯臨臣喪未襲巫止祝執茢小臣執戈既襲之後斂殯以來天子諸侯同巫止祝代之無桃茢士未襲以前君不親弔大斂君來亦止巫去桃茢陳氏澔曰君使臣以禮死而惡之豈禮也哉然人死斯惡之矣故喪禮實有惡死之道焉先王之所不忍言也存疑劉氏敞曰君臨臣喪以桃茢先非禮也周之末造也事之斯為臣焉使之斯為君焉君臣之義非虛加之也寄社稷宗廟人民焉爾故君有慶臣亦有慶君有戚臣亦有戚君於其臣亦然故臣疾君親問之臣死君親哭之所以致忠愛也若生而用死而棄生而厚死而薄生而愛死而惡是教之背死也苟背死而忘生則不足託六尺之孤寄百里之命施之於人者不變於存亡然後人之視其亡猶存矣則夫桃茢胡為乎諸臣之廟哉辨正姚氏舜牧曰死與生自不同惡生於所畏故為之祓除案人死斯惡之非惡此死者惡其凶穢之氣也姚氏惡生於所畏一語甚精桃茢執戈正釋人疑畏之心而使君得盡愛盡禮於臣也喪之朝也順死者之孝心也其哀離其室也故至於祖考之廟而后行殷朝而殯於祖周朝而遂葬朝直遙反正義鄭氏康成曰朝謂遷柩於廟孔氏穎達曰此論殷周死者朝廟之事喪之朝也謂將葬以柩朝廟也夫為人子之禮出必告反必面今將葬以車載柩而朝於廟是順死者之孝心也又死者神靈悲哀棄離其室故至於祖考之廟辭而後行通論孔氏穎達曰殷人尚質敬鬼神而遠之死則為神故朝而殯於祖廟周則尚文親雖亡殁猶若存在不忍便以神事之故殯於路寢及朝遂葬案殷殯於廟故未殯先朝周殯於寢故朝而後葬此神道人道之别孔子謂為明器者知喪道矣備物而不可用也哀哉死者而用生者之器也不殆於用殉乎哉殉辭俊反正義鄭氏康成曰神與人異道則不相傷殺人以衛死者曰殉殆幾也用其器者漸幾於用人也孔氏頴逹曰此録孔子善古非殷周之事謂夏為明器知死喪之道焉以孝子之事親不可闕故備其器物若似生存鬼神異於人故物不可用孔子既論夏家之是又言殷代之非謂用生者之祭器而供死者近於用生人而殉死人也方氏慤曰喪之為道所以致之於死生之間明器者若前經所謂竹不成用瓦不成味之類是已其曰明器神明之也塗車芻靈自古有之明器之道也孔子謂為芻靈者善謂為俑者不仁不殆於用人乎哉芻𥘉拘反俑音勇正義鄭氏康成曰明器所以神明死者異於生人也芻靈束茅為人馬謂之靈者神之類俑偶人也有面目機發有似於生人孔子善古而非周孔氏穎達曰既言殷代又將言周用偶人非禮故先言塗車芻靈自古帝王制而有之此不可為用故云明器之道也重言孔子前言用殉是已死之人形貌不動與器物相似故言用殉此言用人謂生人入壙今俑者形貌發動有類生人故云用人周初即用偶人故冢人職言鸞車象人司農注云象人謂以芻為人鄭注引此謂為俑者不仁是象人即俑人也王氏安石曰生者之器用器非祭器也黃氏震曰明器備而不可用芻靈似而不為人後世明器改而用生者之器芻靈改而用木偶之人故流而至於用生人殉死者之葬孔子推其漸而哀之孫氏奭曰埤蒼云木人送葬設關而能踊跳故名之曰俑象人而用故後有秦穆以子車氏三子為殉陳氏澔曰塗車以泥為車也案孔謂殷用生器周用俑亦無據觀鄭司農注冢人職象人猶以芻靈釋之可見欽定禮記義疏卷十二
