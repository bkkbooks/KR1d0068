body:
  text: 王制第五之二天子百里之内以共官千里之内以為御共供同正義鄭氏康成曰謂此地之田税所給也孔氏穎達曰此論畿内千里之地田税所供給之事百里之内謂去王城百里四面相距則二百里千里之内謂四面相距為千里去王城四面五百里二者相互也葉氏夢得曰官者天子宗廟社稷賓客燕享有司所共也御者乘輿服膳匪頒賜予王所用也君子廉於奉己嚴於事神人猶家造以祭器為先犧賦為次養器為後以奉己為非急也方氏慤曰以近者與人欲其易給而無勞以逺者奉己欲其難致而有節百里之内非不共御也以共官為主爾千里之内非不共官也以共御為主爾又曰御者以卑御尊之稱故凡天子所用之物皆謂之御存疑鄭氏康成曰官謂其文書財用也御謂衣食孔氏穎達曰言田稅知非口率出泉案周禮關市之賦以待王膳服邦中之賦以待賓客四郊以待稍秣家削以待匪頒邦甸以待工事邦縣以待幣帛邦都以待祭祀山澤以待䘮紀幣餘以待賜予是口率出泉各有所用官府所需卑䙝故用近物進御衣食所須尊重故用遠物此殷法也陳氏祥道曰周官太府頒財或以地之所便或以地之所宜或以類之所從豈以近者共官逺者爲御乎又太宰之制國用必合王府之財為之調度乃可豈官府之所共止於百里膳服之御必千里乎劉氏彜曰官謂王國所祿之士大夫言百里之内專以養鄉遂之民而教以三物㧞其賢能以共王官用起政教以倡天下者也御謂王之卿掌政教以御天下之諸侯言千里之内專以養天下之大賢大能用為公卿上大夫以典其六卿之治以御八州之諸侯也案古止有田賦未嘗有口率出泉鄭説非也又古人簡質不以簿書為事安見百官所司止文書財用乎亦不若葉氏之正當也劉氏謂教成鄉遂之民可爲王官養大賢為公卿以御諸侯義亦迂曲千里之外設方伯五國以爲屬屬有長十國以為連連有帥三十國以爲卒卒有正二百一十國以爲州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下以為左右曰二伯長上聲帥色類反卒鄭訓聚讀萃孔讀卒伍之卒陳訓禦卒然之變讀猝從鄭為長正義鄭氏康成曰屬連卒州猶聚也孔疏屬是繫屬連是連接卒是卒伍州是聚居皆有聚意伯帥正亦長也孔疏但異其名凡長皆因賢侯爲之殷之州長曰伯虞夏及周皆曰牧孔疏虞書日覲四岳羣牧左傳夏貢金九牧周禮太宰建其牧老謂上公周禮曰九命作伯春秋傳曰自陜以東周公主之自陜以西召公主之孔氏穎達曰此論畿外設方伯連帥卒正兼二伯之事長諸侯者非賢不可故因其州内賢侯爲之非州外别取賢牧也鄭答張逸云畿内之州不置伯有鄉遂之吏主之伯即牧也故周禮大宰云施典於邦國建其牧立其監是畿外邦國有牧畿内不置牧有八伯也彭氏汝礪曰千里之外已下以國之體統言八州已下以國之名數言伯即取諸正正即取諸帥帥即取諸長之中八伯各有所統而又上屬於天子之老老謂二伯此先王盛時上下相維而可以長治久安也劉氏孟冶曰五官之長自稱於諸侯曰天子之老既取其德又取其年通論陳氏祥道曰古之官有常名有異名内而爲比長閭師族師黨正州長鄉大夫此常名也及任以師田之事則爲軍將師帥旅帥卒長兩司馬公司馬此異名也外而爲公侯伯子男此常名也及寓以連屬之法則爲屬長連帥卒正州伯此異名也王者建萬國以分其土親諸侯以合其人不分其土則守不專不合其人則勢不一上文千八百國分其土也此繼以方伯連帥合其人也古者什伍之法於州鄉則聨其民於師田則聨其徒於宿衛則聨其官故能以中國爲一人而無内患為屬連卒州以聨其國為長帥正伯以聨其人故能以天下為一家而無外虞伯皆稱牧者自内言之則屈於二伯故稱牧曲禮九州之長入天子之國曰牧是也自外言之則伸於諸侯故稱伯王制謂方伯之國是也徐氏自明曰先王舉天下以封建諸侯苟無紀綱於其間則强弱有以相吞而大小無以相維故方伯連帥之設所以維諸侯之存亡也文王嘗為殷西伯矣至周盛時諸侯千八百國周召為東西伯分陜而主之太公封於齊亦受五侯九伯專征之命書顧命畢公太保率東西諸侯以入至於蔡仲管叔監牧荆豫案荆州牧蔡仲豫州牧管叔君陳畢公迭居東郊則大為二伯小為八伯咸出於天子之命以統天下之諸侯方伯連帥設於下而禮樂征伐出於上此先王封建之大權也宣王中興此制未冺韓侯在韓申伯在荆布在諸侯以統萬國復古之業於是乎在延及平王牧伯弛職東遷之變唯晉鄭二國是依向使平王因是二國以振牧伯之任則諸侯尚可爲也奈何以文侯之賢而歸之於國以鄭伯之賢而乃奪之政則周之事權於是去矣自是轉相吞滅莫能統紀春秋之際可得而考者百有七十餘國而已春秋之初齊僖衛宣未嘗見其受命而齊僖自以為東伯黎之臣子亦以方伯連帥之職責衛宣蒲之役二國又自相推許而春秋亦記曰胥命蓋是時諸侯莫適所主而望大國之安靖已周室不以為意齊侯自見爲牧伯之後竊取方伯連帥之權而因以爲利耳未幾齊桓晉文踵其餘迹而牧伯不出於王命强大得專行於弱小矣然王使召伯賜齊侯以侯伯之命是猶有待於王命也晉文致天王於踐土而䇿命晉侯爲侯伯君子以爲何異於要而取之况二公之身其親所屠滅者甚衆方之古牧伯比小事大之義果何如哉又其甚者郤犨為公族大夫以主東諸侯將以帥諸侯而使其大夫主之安在其為宗諸侯也案公羊傳曰天子三公者何天子之相也天子之相何以三自陜而東周公主之自陜而西召公主之一相處乎内鄭氏引周召以釋二伯眉山孫氏駁之謂三公自三公二伯自二伯一相處内之説不足信古制有以二伯兼三公者有以三公兼二伯者公羊亦謂三公三人一專治内二分治外耳非謂實指二人一治内一治外也千里之内曰甸千里之外曰采曰流采音菜正義鄭氏康成曰曰甸服治田出穀税孔疏禹貢五百里曰甸服百里賦納總二百里納銍及秸粟米皆治田事曰采九州之内地取其羙物以當穀稅曰流謂九州之外夷狄流移或貢或不禹貢荒服之外三百里蠻二百里流孔氏安國曰采事也百里之内供王事不一孔氏穎逹曰此總論畿内外九州治田及采取羙物幷九州之外或貢或不之事存異孔氏穎達曰殷制中國方三千里面去王城千五百里五百里為畿内千里外采取羙物曰采周制則王畿外面各三千里采取羙物大行人侯服其貢祀物甸服貢嬪物男服貢器物采服貢服物衛服貢材物要服貢貨物殷千五百里為流周則三千五百里為流蔡氏沈曰禹貢侯服百里采卿大夫采邑所在辨正陳氏祥道曰采禹貢所謂侯服百里采流禹貢所謂荒服二百里流方氏慤曰千里外莫近於侯服而采又侯服之最近者莫逺於荒服而流又荒服之最逺者舉此則綏要之服在其中案此節本禹貢而約言之孔氏據禹貢以釋甸之義又不據禹貢以釋采流何邪後人多據蔡氏書傳以駁鄭氏采取羙物之説則公卿大夫王子弟食邑在王畿千里之内未有在畿外者恐蔡亦未為得也今考禹貢侯服百里采二百里男邦三百里諸侯孔注謂采事也男任也百里供王事不一二百里猶任内事至三百里乃專斥候於外似優於蔡至流為流放罪人之地則蔡説可與鄭並存至孔氏所論殷周疆域尤不確若劉敞謂采當作要服二百里蔡之蔡則二百里蔡之文可據百里采之文亦可據而又必改字以為之説何邪天子三公九卿二十七大夫八十一元士正義孔氏穎逹曰此論天子設公卿大夫元士之數方氏慤曰三公取陽數也卿倍公而三之大夫又三之元士又三之位尊者其事約而總位卑者其事詳而分故官之法位愈卑而數愈倍焉以周官言之大宰上士八人中士十有六人下士三十有二人則中下之士互相倍可知而此不言者陽數窮於九九故以八十一元士終焉存異鄭氏康成曰此夏制也明堂位曰夏后氏官百舉成數也陸氏佃曰周官三百六十則夏殷冝二百四十唐虞宜百二十百二十者唐虞三代所不變自餘皆稱事為之非其正也辨正胡氏銓曰明堂位夏后氏之官百比此為少書夏商官倍是為二百比此為多鄭以為夏何據也彭氏汝礪曰此實漢博士斟酌建官之法欲以為定制耳案三公大師大傅大保也九卿三孤少師少傅少保及六官冢宰司徒宗伯司馬司寇司空也周法三公三孤多六卿兼之實六卿耳三公九卿尚非實數况大夫士以下能一一覈之乎而必求其為夏為殷彌鑿矣大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君下大夫五人上士二十七人小國二卿皆命於其君下大夫五人上士二十七人正義鄭氏康成曰命於天子者天子𨕖用之如今詔書除吏是矣小國亦三卿一卿命於天子二卿命於其君此文似誤脱耳或者欲見畿内之國二卿與孔氏穎逹曰此論天子命諸侯之國卿大夫及士之數崔氏靈恩曰大國三卿者周制立司徒兼冢宰司馬兼宗伯司空兼司寇之事故左傳云季孫為司徒叔孫為司馬孟孫為司空也三卿命於天子則大夫以下皆其君自命之下大夫五人者取小卿為言司徒之下置小卿二人一小宰一小司徒司空之下一小司冦一小司空司馬之下惟置一小卿小司馬也陳氏祥道曰三等之國卿數不同大夫士之數則同者卿則合治大夫士則分職故卿數與禄以國之大小為差大夫士之數與禄則同焉而已於大夫言下大夫則知卿之為上大夫也於士言上士則知其有中下也通論李氏曰周官大宰職施典於邦國設其參傅其伍陳其殷施則於都鄙立其兩參即三卿也伍大夫也殷上士也兩貳卿也司馬職曰凡制軍大國三軍次國二軍小國一軍皆命卿為之則知雖畿外之小國猶一卿命於天子也二卿皆命於其君者畿内之國也畿外舉大國次國以見小國畿内舉公卿以見大夫彭氏汝礪曰小國二卿則一人兼三官之事大國欲其權不侔上故三卿皆命於天子小國欲其權足制下故二卿皆命於其君方氏慤曰受命於天子為隆受命於其君者為殺通論徐氏自明曰内諸侯祿外諸侯嗣非有輕重而又更出迭入為之諸侯不得久其權也列國之卿命於天子王臣布在諸侯之國而諸侯每嵗貢士於天子諸侯不得私其人也大國三卿命於天子小國二卿命於其君命其大不命其小聖人控制大邦優假小國之意深矣自周之東上失其柄惟陳女叔魯單伯鄭祭仲説者以為命大夫齊管仲謂天子之二守國髙在是天子所命之卿外私自立者相環也至晉爲伯主多置羣官而天子之命卿其名僅存耳卿以軍將為名而三軍之制一軍有二卿邲之戰實備六卿至於司馬司空反位大夫之列不復卿官矣漢初藩國二千石以上皆漢為置而國事皆隸於傅相文帝之世淮南厲王逐漢所置二千石請自置七國之叛衡山淮南之亂大抵皆私自置官也唐節度留後皆得辟置其賢者既歸之而怙强負固者又得以私姦黨而終成藩鎮之亂亦不識内外之勢矣天子使其大夫為三監監於方伯之國國三人上監古暫反下監古銜反卷末同正義鄭氏康成曰使佐方伯領諸侯孔氏穎達曰此論天子遣大夫往監方伯之事每一州三人三八二十四人崔氏云殷之方伯皆有三人輔之監所領之諸侯馬氏曰周官乃施典於邦國而建其牧立其監牧之下又立監所謂三監者是也存疑陸氏佃曰武王立武庚於邶以管叔蔡叔監之周官曰建其牧立其監然則武庚二王後其牧與鄭謂二王之後不為牧不知何據應氏鏞曰監之詳無所考先儒以三公之孤四命者當之要亦一人耳大國三卿其二命於天子孤者王朝所遣二卿大國所置而亦命於王朝是所以為三人與書梓材曰王啟監厥亂為民又曰自古王若兹監所從來古矣司寇王朝之臣也而命以監臨則為諸侯之長則為監者不必專遣大夫諸侯既為監則他國亦必聽命而方伯連帥又不必特制與案三監監方伯之國疑只是漢置諸侯守相之法而作王制者見其如此因刺諸書取武王命管叔監殷事以實之因管蔡與霍叔三人故曰三監又曰天子使其大夫為三監云云則真漢時法如曹參為齊相而蘇意為楚相等是也後儒信為實然遂欲以三公之孤四命者當之無論止是一人與國三人文不合抑於使其大夫之旨不更繆乎至黄帝二監亦後世增附之言與武庚為牧説等耳未足為據應氏又引梓材王啟監厥亂為民謂為監者不必專遣大夫穿鑿曲傅尤甚天子之縣内諸侯祿也外諸侯嗣也正義鄭氏康成曰縣内選賢置之於位其國之禄如諸侯不得世位外有功乃封之使之世也冠禮記云繼世以立諸侯象賢也孔氏穎逹曰此論畿内食采邑諸侯不得繼世及外諸侯父死嗣位之事畿内公卿大夫之子父死得食父之采邑不得繼父為公卿大夫故直云禄有罪乃奪之公羊穀梁説云卿大夫世則權幷一姓妨塞賢路經譏尹氏崔氏是也畿内諸侯父死視元士若有賢德乃復父位若畿外諸侯父死未賜爵亦視元士除服則襲父位馬氏睎孟曰内諸侯禄而有德者亦可以使之出為諸侯外諸侯嗣而有功者可以使之入而為公卿若鄭武公之類是也黄氏震曰内諸侯使其有地則權移於下而人主孤外諸侯不使專其國則藩屛無助而人主亦孤李氏曰古者生財有道用財有禮故仕者世禄而有餘然未嘗不教之以盡其材使見於事業惟其有禄也所以異於棄賢者之類絶功臣之世惟其有放黜也所以異於官人以世者也通論葉氏夢得曰内之公卿大夫受田視公侯伯子男故通稱為諸侯案此勝於鄭周禮注内諸侯惟三公及王子弟之説案古之外諸侯皆自唐虞以來歴千餘年世守其國世有其民其新朝所封不過數十國耳周初蒲姑滅而後齊封奄滅而後魯封唐滅而後晉封其滅者其有罪者也不然舊國無罪而亡先王且有興滅繼絶之典何嘗利其土地人民而奪之乎若外無可封之地即文之四友武之十亂亦止於畿内授之采邑周之周召畢榮皆畿内也其後周公封魯召公封燕别建國而采邑猶世畢公封魏康叔封衛外世國而采邑不世凡祭芮榮外無國而其邑則世皆度其功而差次之其世采邑者賢德才能任以公卿大夫之位大則如康叔為司寇聃季為司空小則如滕叔為卜正毛叔郕叔以親世邑而無官至毛伯有刺厲王詩則又賢而任職矣若宰周公師尹凡以官舉皆任職者也若仍叔之子武氏之子未嘗任職無官可稱有使令之事則亦及之胡傳譏為世官施及童稚誤也蓋畿内九十餘國皆為世禄而任職者止六卿二十七大夫耳豈必人人而官之乎至上士以下則幷不世禄者諸侯之卿大夫雖不世然如齊之髙國則皆受邑於王世其禄亦世其職魯之季氏受費臧氏受防亦世有其邑而季文子之父無逸臧文仲之父伯瓶皆未嘗為大夫則世其禄而不世官亦與天子之世禄法等也其後魯三家晉六卿由世禄而變為世官周之末失使然非古矣存疑孔氏穎達曰畿内不世爵而畿外得世者以畿内公卿大夫輔佐於王非賢不可故不世也畿外諸侯常有大功報其勞効又在外少事故得世也此父死子禄者不在九十三國之數雖論夏法殷周亦然案此即畿内九十三國中其世禄者亦以其祖父有功報其勞効而卿大夫任職輔王故祿可世而官不可世畿外世爵亦以國有卿大夫任職輔君非謂侯國少事非賢亦可以為夏法無據也制三公一命卷若有加則賜也不過九命次國之君不過七命小國之君不過五命卷音衮古本反正義鄭氏康成曰卷通曰衮三公八命矣復加一命則服龍衮孔疏三公八命身著鷩冕加一命則為上公著衮冕與王者之後同多於此則賜非命服也孔疏制不合加出君特賜非禮法之常謂之褒衣孔氏穎逹曰此論三公以下次國小國之君爵命之數此篇皆王者之制於此特言制者以三公位尊又加一命其事極重故也朱子曰天子之龍一升一降上公但有降龍以龍首卷然故謂之卷方氏慤曰王之三公在朝則八命而服七章之鷩冕及其出封加一等乃賜之以九章之衮冕衮雖三公可服非有加則不賜故曰不過九命典命所謂以九為節者也彭氏汝礪曰次國之君謂侯伯卿在内六命出爲侯伯則賜鷩冕七章之服典命所謂以七爲節也小國之君謂子男大夫在内四命出為子男則賜毳冕五章之服典命所謂以五為節也存疑鄭氏康成曰虞夏之制天子服有日月星辰周禮曰諸公之服自衮冕而下如王之服孔疏虞夏之制天子服有日月星辰者皋陶謨云予欲觀古人之象日月星辰山龍華蟲作㑹宗彛藻火粉米黼黻絺繡是也日一月二星辰三山四龍五華蟲六此六者皆畫於衣宗彛七藻八火九粉米十黼十一黻十二此六者皆繡於裳至周豋龍於山取其神登火於宗彞取其明尊神明也而冕服九章一曰龍二曰山三曰華蟲四曰火五曰宗彞皆畫以為繢六曰藻七曰粉米八曰黼九曰黻皆絺以為繡則衮之衣五章裳四章凡九也鷩之衣三章裳四章凡七也毳之衣三章裳二章凡五也希之衣一章裳二章凡三也𤣥者衣無文裳刺黻而已是以謂之𤣥焉衣法天故章數竒裳法地故章數耦周禮司服王祀昊天上帝則服大裘而冕祀五帝亦如之享先王則衮冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則𤣥冕鄭引此者證三公一命衮謂周制也周以前則山在衮上不得云一命衮辨正鄭氏鍔曰周禮言公自衮冕而下如王之服則知自衮冕而上王自有服章無疑衮冕上之章服非日月星辰而何則王服十二章明矣楊氏曰詳玩司服經文則知有虞作服十二章周亦十二章甚明享先王則衮冕衮冕者繪衮龍於服而冕也享先公饗射鷩冕者繪華蟲於服而冕也蓋服有六而冕則一先鄭謂六服同冕是也祀昊天上帝之服備十二章則繪三辰於服而冕可知也賈公彦云鄭氏九章此無正文鄭竝以意解之則疏家已知其非而不之信矣林氏之竒曰鄭氏所據不過左氏三辰旂旗之文左氏謂旗有三辰何嘗謂衣無三辰邪况又謂上公九章而王服亦九章將何所别郊特牲云祭之日王被衮以象天則十二章備鄭氏謂有日月星辰之象此魯禮也豈有周制以九魯乃加以十二之禮乎葉氏夢得曰在内嫌於逼天子故其命以八以六以四從隂之數在外有人君之道故其命以九以七以五從陽之數大國之卿不過三命下卿再命小國之卿與下大夫一命正義鄭氏康成曰不著次國之卿者以大國之下互眀之孔疏大國之卿不過三命則知次國之卿不過再命大國下卿再命則知下國次卿一命此卿命則異孔疏大國上卿三命下卿再命次國上卿再命下卿一命小國上下卿竝皆一命故云卿命則異大夫皆同孔疏大夫則大國次國小國皆同一命以大國下卿再命差之眀大夫一命又小國大夫一命則次國亦可知矣是大夫皆同也周禮公侯伯之卿三命其大夫再命子男之卿再命其大夫一命孔氏穎達曰此論大小國卿大夫命數不同之事通論孔氏穎達曰此夏殷制案周禮公國之孤四命與餘卿不同則知此大國之卿不過三命亦謂孤也大國下卿再命者謂除孤以外之卿就再命之中分為中卿下卿也故前文云次國之上卿位當大國之中是也次國之卿再命亦謂上卿執政者若魯之季孫下卿一命亦分為中下二等故前文云中當其下下當其上大夫是也小國之卿雖同一命亦分為三等故前文云小國之上卿位當大國之下卿中當其上大夫下當其下大夫其大國次國小國大夫雖同一命當皆分為上下二等文已具於上今總云下大夫者對卿言之陸氏佃曰周官子男之卿再命今此云小國之卿與下大夫一命者蓋言畿内小國之卿如此與上小國之卿皆命於君同義案本文無次國鄭推之當降大國一等而周禮典命侯伯之卿大夫與公同子男之卿再命大夫一命故孔以為此夏殷制其實漢博士約為此制非周亦非夏殷也凡官民材必先論之論辨然後使之任事然後爵之位定然後祿之正義鄭氏康成曰論謂考其徳行道藝辨謂考問得其定也爵謂正其秩次禄與之以常食孔氏穎達曰此論擇賢材任以爵禄之事官其人必先論量考問事已分辨得其定實故云辨雖考問知其實未眀其幹能故任以事事又幹了然後正其秩次除授位定然後與之以禄陳氏祥道曰任事然後爵之者能者也任官然後爵之者賢者也馬氏睎孟曰司馬辨論官材論國中之士也凡官民材者兼乎萬民而言之也論國中之士其法詳故考校於中年論萬民之士其法畧故三年然後論之爵人於朝與士共之刑人於市與衆棄之是故公家不畜刑人大夫弗養士遇之塗弗與言也屛之四方唯其所之不及以政示弗故生也朝音潮屛上聲正義鄭氏康成曰必共之者所以審慎之也書曰克眀徳慎罰屛猶放去也已施刑則放之棄之役賦不與亦不授之以田困乏又無賙餼也虞書曰五流有宅五宅三居是也周則墨者使守門劓者使守關宫者使守内刖者使守囿髠者使守積吴氏澄曰屛之四方者常法也周特擇其雖受刑而情差輕者使之豈人人使之守門關囿積也哉大概記禮者之言各有所據或有異同當以意通之孔氏穎達曰此論爵人刑人之事皆殷法也周則天子特假祖廟而拜授之洛誥册命周公是也諸侯爵人因嘗祭之日祭統云一獻君降立於阼階之南南鄉所命北面是也周則有爵者刑於甸師氏周氏諝曰衆不足以知人可以知人者士而已故爵人則與士共之刑人則與衆棄之孟子言國人殺之而不言國人用之以此葉氏夢得曰公家不畜者示不以國藏惡也大夫弗養者示不以家私惡也士遇而弗與之言者示不以身親惡也餘論陳氏祥道曰爵人於朝周官鄉老及鄉大夫羣吏獻賢能之書於王王再拜受之登於天府内史貳之是也刑人於市周官鄉士遂士所謂肆之三日是也命之於廟未嘗不論於朝親者在所隱不可慮之於國人凡此皆周制也案此因上民材而言卿大夫尊故爵於廟刑於甸師民材卑故爵於朝刑於市若秀士執技至下大夫則亦不刑於市禮所謂刑不上大夫賈子所云造請室而請罪聞命而自裁也天子諸侯亦不近刑人故春秋以閽殺吴子著戒此三代通法正不必辨其為殷為周也諸侯之於天子也比年一小聘三年一大聘五年一朝朝音潮正義鄭氏康成曰比年每嵗也小聘使大夫大聘使卿孔疏聘禮記曰小聘曰問三介大聘使卿為介有五人其小聘惟三介故鄭知小聘使大夫也朝則君自行然此大聘與朝晉文霸時所制也孔疏昭三年左傳鄭子大叔曰文襄之霸也其務不煩諸侯令三嵗而聘五嵗而朝虞夏之制諸侯嵗朝孔疏尚書五載一廵狩鄭注廵狩之年諸侯朝於方嶽之下其間四年諸侯分來朝於京師徧其聘問無文可知周之制侯甸男采衛要服六者各以其服數來朝也孔疏周禮大行人侯服嵗一見甸服二歲一見男服三嵗一見采服四嵗一見衛服五嵗一見要服六嵗一見孔氏穎達曰此論諸侯遣卿大夫聘問及自親朝之事陳氏祥道曰朝覲宗遇㑹同君之禮也存頫省聘問臣之禮也諸侯之於天子聘以通好朝以述職通好不欲疎故比年一小聘述職不欲數故五年一朝書與周官先言朝而後言廵守朝於京師者也舜典先言廵守而後言朝朝於方嶽是也存疑王氏安石曰五年一朝疑即方嶽之朝胡氏銓曰五年一朝鄭據左氏為解不知子大叔之言乃諸侯朝霸主之法非朝天子也文襄不朝京師豈能令諸侯朝天子乎夫襄王狩於河陽晉文帥諸侯朝於王所而已不朝於周也鄭注誤矣存異黃氏震曰聘者相往來之名非諸侯於天子之禮案疏謂此録王制者記文襄事非虞夏亦非殷而引古孝經注諸侯五年一朝天子天子亦五年一廵守朱子注朝聘以時亦用此説則或古通禮而晉用之耳虞書五載一廵守羣后四朝馬融謂四方朝於方嶽之下鄭改之謂唐虞嵗朝四方以四季月朝京師恐唐虞未必勤諸侯若此蔡又改為廵守之明年東諸侯朝又眀年南諸侯朝又明年西諸侯朝又眀年北諸侯朝亦無的據周禮大行人六服皆言見不言朝而大宗伯春曰朝夏曰宗秋曰覲冬曰遇鄭謂朝禮和宗禮盛覲禮肅遇禮簡孔謂近東者朝春近南者宗夏近西者覲秋近北者遇冬韓侯是北方諸侯近西故曰韓侯入覲不知先王何以寛於東嚴於西盛於南簡於北疏又言侯服朝者東方以秋西方以春南方以冬北方以夏則又變其説矣公羊異義言諸侯四時見天子皆曰朝以朝時行禮也猝而相逢於路曰遇萬斯大謂凡諸侯來受摯於朝皆曰朝受享於廟皆曰覲而覲禮有前朝皆受舍於朝之文似覲未甞不朝諸侯覲於天子為宫方三百歩四門壇十有二尋深四尺似覲又不於廟則疑朝者四時四方諸侯來見之通名而覲宗遇則因事異名朝而為壇以盟曰覲旅而見曰宗其禮隆猝而見曰遇其禮簡也周禮所謂一嵗二嵗自廵守之眀年起數與嵗徧存三嵗徧頫例同謂廵守之眀嵗侯服見二嵗甸服見三嵗男服見四嵗采服見五嵗衛服見所謂五年一朝也六嵗當要服見而要服為夷王者所不治故周官篇首雖言六服承徳而後惟言六年五服一朝不云六服畢朝也其君朝之眀年大夫小聘又眀年卿来大聘又眀年大夫聘又眀年卿大聘又眀年大夫聘又眀年君再朝如此則十二年中君親朝二卿大夫聘四大夫小聘六中庸所謂朝聘以時蓋如此至公羊説謂天子無下聘之義則周禮眀言時聘以結諸侯之好黃氏謂諸侯於天子有朝無聘則周禮明言時聘曰問皆非確論也天子五年一廵守守一作狩手又反下同正義鄭氏康成曰天子以海内為家時一廵省之五年者虞夏之制也周則十二嵗一廵守孔氏穎達曰白虎通云所以廵守者何廵者循也守者牧也為天子廵行守土牧民恐逺近不同化幽隱不得其所者故必親自行之謙敬重民之至也所以不嵗廵守何為太煩過五年為太疎因天道三嵗一閏天道小備五嵗再閏天道大備故五年一廵守周十二嵗者象嵗星一周也朱子曰天子諸侯雖有尊卑然一往一來禮無不答故四方諸侯分四年入覲則天子一廵守以答之又曰若一嵗間行不徧則去一方近處㑹一方之諸侯使來朝也吕氏祖謙曰天下非一人所能獨治故衆建而為君而諸侯又不能保其常治故又廵其所守不然嵗月易流人心易懈法度易弛上下易隔作新之治豈能久而不變哉方氏慤曰諸侯非徒守天子之土亦所以守天子之法天子廵之將以脩其法而已存疑孔氏穎達曰夏與殷依鄭志當六年一廵守六年者取半一嵗之律吕也案夏殷廵守之年諸書無考鄭氏不知何據而孔氏又從而為之辭嵗二月東廵守至于岱宗柴而望祀山川覲諸侯問百年者就見之命大師陳詩以觀民風命市納賈以觀民之所好惡志淫好辟命典禮考時月定日同律禮樂制度衣服正之柴仕佳反依字作柴大音泰賈價同好去聲辟僻同匹亦反正義鄭氏康成曰岱宗東嶽也柴祭天告至也覲見也老人百年則就見之陳詩謂采其詩而視之市典市者賈謂物貴賤厚薄也質則用物貴淫則侈物貴民之志淫邪則所好者不正孔氏穎逹曰嵗二月者皆以夏之仲月律厯當其中也二月八月又晝夜分五月十一月隂陽終故取四仲月也岱者言萬物相代於東方宗尊也岱為五嶽之首故為尊也既告至之後為宫加方明於壇天子出宫東門外拜日反祀方明祀方明之後乃以㑹同之禮見諸侯王升立於壇上南面諸公中階之前北面諸侯東階之東西面諸伯西階之西東面諸子門東北面諸男門西北面玉降階南面而見之三揖既升壇使諸侯升公拜於上等侯伯於中等子男於下等見諸侯之後問百年者就見之若未至方嶽於道路有百年者王亦先見之也大師掌樂之官令各陳其國風之詩以觀君政之善惡命典市之官進納物賈之書以觀民之好惡若民志淫邪愛好邪辟之物由在上教之不正此陳詩納賈所以觀民風俗是欲知君上善惡也典禮之官於周則大史也考校四時及十二月之大小時有節氣早晚月有弦望晦朔考之使各當其節又正定甲乙之日隂管之同陽管之律玉帛之禮鼓鐘之樂及制度衣服各有等差當正之使正堯典云恊時月正日同律度量衡文小異而意同也方氏慤曰春而東廵守夏南秋西冬北所以順天時也必居方嶽之下使諸侯知所趨故也天髙故燔柴以上達山川逺故望而祀之就見百年以乞老者之言也詩所以志詩言之哀樂足以見民風之厚薄民風之厚薄足以知上政之得失故命大師陳詩焉民之所志所好不必皆淫僻觀之蓋所以防其淫僻也王者必頒厯以一天下正朔故廵守則考時月定日考之慮其不一定之欲其無差也律有隂陽禮有隆殺樂有清濁制有大小度有長短衣服有文質未甞同也此所謂同欲其同出於天子則正於一也陳氏祥道曰柴望先於覲諸侯尊神也見百年先於陳詩納賈貴老也尊神而後貴老貴老而後觀民事之序也陳詩納賈所以觀在下者之所尚考時月至於制度衣服所以觀在上者之所行考時月定日所以和天道同律禮樂制度衣服正之所以齊人道也言禮樂制度則衣服舉矣又言衣服者蓋民徳之不一僭亂之所起常在於衣服之間故也蔡氏沈曰時日之差由於積日故其序先粗後精凡百制度受法於律故其序先本後末存疑金氏履祥曰既類而出四嶽又四祭焉數而凟矣本文言柴而望祀於山川蓋柴即望祀所用欲其氣之旁達也鄭氏康成曰同隂律也存異陸氏佃曰東廵守至於岱句宗讀如宗祀文王於眀堂之宗天一而尊故曰宗柴山川卑而衆故曰望秩宗在柴上尊也秩在望下卑也於柴言宗故於望亦言秩若但言類言禋則亦但言望而已案周禮大師執同律以聴軍聲則隂律曰同固有據但此文法冝以考時月句定日句同律禮樂制度衣服句與虞書協時月正日同律度量衡一例而以正之二字總結上文言考之定之同之總歸於正也山川神祗有不舉者為不敬不敬者君削以地宗廟有不順者為不孝不孝者君絀以爵變禮易樂者為不從不從者君流革制度衣服者為畔畔者君討有功徳於民者加地進律絀丑律反正義鄭氏康成曰舉猶祭也不順者謂若逆昭穆孔疏如魯逆祀躋僖公流放也討誅也律法也孔疏釋詁文法謂法度諸事皆是即大行人上公九命繅藉九寸冕服九章建常九斿之等是也孔氏穎達曰山川是外神故云不舉不舉不敬也山川在其國境故削以地宗廟是内神故云不順不順不孝也宗廟可以表眀爵等故絀以爵禮樂雖為大事非是切急所須故以為不從君惟流放制度衣服便是政治之急故以為畔君須誅討此四罪先輕後重陳氏祥道曰不敬則無禮不孝則不仁不從與畔則不道無禮未至於不仁不孝未至於不道此所以削地而後絀爵絀爵而後流討也削絀流討而繼之以加地進律者退不肖然後可以進賢故也馬氏睎孟曰進律者進以爵也若子男以五為節則進之以七侯伯以七為節則進之以九也通論應氏鏞曰四廵之禮與舜典所載無甚相逺也然帝舜脩五禮輯五瑞復五器上下交際之儀温温乎其可挹也王制以削絀流討之罰警於先以加地進律之賞誘於後賞罰黜陟之政凜凜乎其甚嚴也夫舜豈全無黜陟哉特其徳勝而不深特乎法焉耳世之淳漓治之煩簡徳之盛衰於此可觀矣李氏曰先王之政已亡其餘澤已熄鄭人來歸祊而泰山之祀不舉魯躋僖公而宗廟不順杞用夷禮作淫樂而禮樂變易作丘賦聚鷸冠而制度革祭祀不舉而不能削其地宗廟不順而不能絀其爵變禮易樂而不能流革制度而不能討此春秋之所以作也五月南廵守至于南嶽如東廵守之禮八月西廵守至于西嶽如南廵守之禮十有一月北廵守至于北嶽如西廵守之禮歸假于祖禰用特假音格禰乃禮反正義鄭氏康成曰假至也特特牛也祖下及禰皆一牛孔氏穎達曰案爾雅釋山云泰山為東嶽郭注在奉高縣西北霍山為南嶽郭注在衡陽湘南縣南今在廬江潛縣西漢武帝以衡山遼曠因讖緯皆以霍山為南嶽故移其神於此其土人皆呼為南嶽華山為西嶽郭注在𢎞農華隂縣西南恒山為北嶽郭注在恒山上曲陽縣西北方氏慤曰天子之出必造乎禰及其歸也必假於祖禰出而造之所以象生時之必告也歸而假之所以象生時之必面也特一牛也用特以見約焉則廵守之不為煩費可知黄氏震曰此刺虞書而為之通論馬氏端臨曰古者帝王廵守以省方觀民初非遊適然舜必五載周必十二載又以四嶽為戻止之地蓋雖本憂民之心尚有煩民之事故出必有期止必有方李氏格非曰田僕職曰以田以鄙則王之於都鄙未嘗無廵守而止言四嶽之諸侯者蓋先王之於畿内諸侯也有祭祀以馭其神則山川無不舉祭祀無不順有禮俗以馭其民則禮不得變樂不得易制度衣服不得革矣蓋聖人治之畧則考之詳治之詳則考之畧所以致四海於一堂之上也餘論胡氏安國曰其宮室道塗可以預脩故民不勞供給調度可以預備故物不費自秦而後廵逰無度至長吏以不辦被誅民庶以煩勞自厭而廵守之義亡矣故春秋書公朝于王所以所非其所為貶正本之義也案十一月北廵守傳言周雖改正廵狩烝享皆自夏焉則周亦以夏正子月北廵守矣而孔子贊易於復言后不省方何邪豈周之廵守自以周正故子月不出而傳者妄與天子將出類乎上帝宜乎社造乎禰諸侯將出宜乎社造乎禰類陸徳明作禷造七報反下同正義鄭氏康成曰類宜造皆祭名其禮亡孔疏古尚書説非時祭天謂之類鄭注雖非常祭類正禮而為之歐陽説以事類為之若舜攝位及廵守及征伐各以事類也小宗伯凡天地之大災類社稷宗廟爾雅起大事動大衆必先有事於社而後出謂之宜大祝一曰類二曰造是三者皆祭名皇氏侃曰行必有主無則主命載於齊車書云用命賞于祖是也今出辭别先從卑起最後至祖取遷主則行若還則先祖後禰不復告天白虎通云天道無内外也孔氏穎達曰此論天子廵守之禮知此是廵守者以下别云出征也類乎上帝祭告天也宜乎社者廵行方事誅殺封割應載社主云宜者令誅伐得宜社主地又為隂誅殺亦隂也造至也謂至祖父之廟也白虎通云獨言禰何辭從卑不敢留尊者之命至禰不嫌不至祖也諸侯將出謂朝王及自相朝盟㑹征伐之事不得告天故從社始亦載社主也造乎禰者亦告祖及載主也周氏諝曰類者言雖有事而祈亦類於常禮宜者求其無所不宜故孫炎以宜為求見福佑也造求其有所至也帝者逺人而尊故以禮言之社者近人而卑故以福佑言之禰則親之而已故以所至言之方氏慤曰前言廵守之歸而不言出此言出而不言歸互相備也馬氏睎孟曰類禮則畧於祭天宜禮則畧於祭地通論陳氏祥道曰書曰類于上帝詩曰是類是禡周禮小宗伯兆五帝於四郊四望四類亦如之凡天地之大災類社稷宗廟則為位肆師類造上帝則為位大祝六祈一曰類二曰造類上帝大㑹同造於廟詛祝掌類造之祝號禮記曰天子將出類于上帝造于禰則類者類其神而祭之也造者即而祭之也類之所施或于上帝或于日月星辰或于社稷或于宗廟類之所因或以廵守或以大師或以大災造則或于上帝或于宗廟凡此皆有所祈也不若大旅之有所告而已故大祝六祈有類造而無旅焉鄭康成以宗伯之四類為日月星辰蓋以四類在四郊四望之下而知之也爾雅以詩之是類是禡為師祭蓋以大祝大師類上帝而知之也社稷宗廟非大烖則無類祭上帝非廵守之所至則無造祭廵守於其將出則類上帝於其所至則造上帝大師於其將出亦類上帝於其所至特禡於所征之地而已昔武王伐紂既事而退柴于上帝成王營洛位成之後用牲于郊牛二此蓋類禮也何則書於舜之既受命則類乎上帝湯之既受命則告于上天是既事則必祭祭必以類禮也於舜之既受命言類則湯之既受命而類可知既受命而類則師之既事邑之既成又可知也類造之禮其詳不可得而知要之劣於正祭與旅也觀祀天旅上帝而大宗伯掌之類造上帝小宗伯肆師掌之則禮之隆殺著矣四類日月星辰于四郊則類上帝蓋南郊乎又曰帝非不可以言造以類為主社禰非不可以言類以造為主存疑張子曰類者與旅相似言既祭東方帝則東方山川百神皆從而至祭所謂類者以一類祭也若非時有事於一方則止以其方之百神從祭於一方之上帝故亦言類彭氏廉夫曰宜于社載社主以行造于禰或亦載父主案張子謂若有事於一方則止祭其方之帝之神理或有之而廵守周歴四方則將出必不先類一方也若彭氏載父主之説則㫁不然七廟無虚主載祧主不載禰主文王世子在軍守于公禰以在外親之也非真禰主史記武王載木主號為文王或因公禰之名而誤耳天子無事與諸侯相見曰朝考禮正刑一徳以尊于天子朝直遥反正義鄭氏康成曰事謂征伐孔疏知非䘮者天子七月而葬同軌畢至孔氏穎達曰朝謂常朝雖四時而來朝朝是總名也諸侯相與朝王之時考校禮儀正定刑法專一道徳以尊崇天子不言樂者禮中兼之方氏慤曰考天子之禮則禮樂自天子出矣正天子之刑則征伐自天子出矣禮樂征伐皆自天子出則諸侯莫有異心故能一徳以尊於天子也存疑陸氏佃曰相見主言天子見不見在天子也案古諸侯朝天子天子無不見者陸氏説恐非或曰尊于天子見尊於天子也天子賜諸侯樂則以柷將之賜伯子男樂則以鼗將之諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓚然後為鬯未賜圭瓚則資鬯於天子柷昌六反鼗音桃鈇音斧鉞音越圭一作珪瓚音贊鬯音暢正義鄭氏康成曰柷鼗皆所以節樂將謂執以致命圭瓚鬯爵鬯秬酒也得其器乃敢為其事孔氏穎達曰凡與人之物置其所與大者於地執其小以致命於人將行也謂執以行命柷以節一曲之始其事寛故以將諸侯之命鼗以節一唱之終其事狹故以將伯子男之命也賜弓矢謂八命作牧者宗伯注侯伯有功徳者加命得專征伐當州之内若九命為二伯則得專征一方五侯九伯也若七命以下不得弓矢之賜則尚書大傳所謂以兵屬于得專征伐者此弓矢則尚書彤弓一彤矢百盧弓一盧矢千案尚書今本作盧弓一盧矢百左傳作旅弓矢千於周禮則唐弓大弓合七而成規者賜鈇鉞謂上公九命者賜鈇鉞然後得専討晉文公雖賜弓矢未賜鈇鉞不得專殺故執衛侯歸于京師圭瓚以大圭為柄黃金勺青金外而朱其中鼻寸衡四寸瓚槃大五升口徑八寸下有槃口徑一尺鼻勺為龍口有流前注賜圭瓚亦謂上公九命者若未賜圭瓚則用璋瓚鬯者釀秬黍為酒和以鬱金之草謂之鬱鬯不以鬱和則直謂之鬯而已馬氏睎孟曰征與殺以致天討弓矢鈇鉞所以致天討之器諸侯必俟天子之賜者臣無有作威所用惟君之所賜而已周氏諝曰禮獨以鬯為言者僭莫僭於祭鬯者九獻之首芬芳下達於淵泉諸侯道足以首出一國徳足以下達然後賜圭瓚使自為鬯不爾則資鬯於天子示其所以事神明者不足於己而有待於上也通論孔氏穎達曰魯無弓矢之賜陳恒弑君孔子請討簒逆當征也若鄰國無罪而輒征之則不可案諸侯能和民人則賜樂能征不服則賜弓矢能殺有罪則賜鈇鉞能脩孝道則賜鬱鬯孔謂此賜樂非九錫之樂故伯子男能受之夫古諸侯有是善則賜是物豈必拘於九哉書云搏拊琴瑟以詠堂上之樂也下管鼗鼔堂下之樂也合止柷敔堂上堂下合樂也合樂盛故以賜諸侯堂下卑故以賜伯子男搏拊不賜升歌堂上最尊也天子命之教然後為學小學在公宮南之左大學在郊天子曰辟雍諸侯曰頖宮辟璧同頖泮同正義鄭氏康成曰學所以斆士之宮辟眀雍和也所以眀和天下孔疏謂於此學中習學道藝欲使天下之人悉皆眀達諧和頖之言班也孔疏頖是分判之義所以班政教尊卑異名也孔氏穎達曰以經文承上諸侯之下故直云天子命之教不云命諸侯案詩注云築土壅水之外圓如璧注又云頖之言半也南通水北無也二注不同者此注解其義詩注解其形也案朱子詩傳亦以形名則詩注為確存疑鄭氏康成曰尚書傳曰百里之國二十里之郊七十里之國九里之郊五十里之國三里之郊孔疏此伏生多士傳文國城居中四面各半如百里之國則面有五十里以十分之四為郊面五十里則郊二十里若周則司馬法云百里郊天子方千里以百里為郊則諸侯之郊皆計竟大小故鄭注聘禮云逺郊上公五十里侯伯三十里子男十里近郊各半之也此小學大學殷之制孔疏以殷人養國老於右學養庶老於左學知左學小而右學大也若周則大學在國小學在郊亦具下文故知非周也朱氏申曰小學以教未成人者言在左則大學在右可知大學以教成人者言在郊則小學在國可知辨正張子曰此小學是教國子胄子之幼小者未能入大學則其學在宮之左右天子諸侯所視之大學必在國中無在郊之理此大學即郊學對小學而言大耳非國子胄子俊造所居但國之設學校必均故於四郊為之立學學者之就學無甚逺之差也郊學則鄉遂大夫教之國中大學則天子諸侯所自視者也郊學雖非俊造國胄之所居亦有時而往如行禮於其間使不帥教者觀之王氏安石曰天下不可一日無教學不可一日廢於天下王制所謂命之教然後為學者何也曰教不可不資之天子資之天子道徳所以一也立諸侯未有不命之教者古之立國也必資禮於天子所謂命之教矣案伏生所述猶為近古孔因鄭此殷制之説又引司馬法辨周異於殷夫殷之諸侯大半因夏之舊周之諸侯大半因殷之舊其城郭郊野皆定久矣安見周之郊必異殷之郊且周止據司馬法百里郊一句推之亦初無眀據也大學小學詳辨下文天子將出征類乎上帝宜乎社造乎禰禡於所征之地受命於祖受成於學出征執有罪反釋奠於學以訊馘告禡音罵又音伯詩既伯既禱訊又作誶音信馘古獲反正義鄭氏康成曰禡師祭也為兵禱其禮亦亡孔疏禡祭始造軍法者蓋蚩尤或曰黄帝熊氏以為祭地非也受命于祖告祖也受成于學定兵謀也釋奠禮先師也訊馘所生獲㫁耳者孔疏訊是生獲而可言問者馘是已死而截耳者詩曰執訊獲醜孔疏小雅出車篇又曰在頖獻馘孔疏魯頌泮水篇馘或為國孔氏穎達曰此論天子出征所祭之事受命於祖謂出時不敢自專有所禀承祖禰皆告以祖為尊故特言祖即前文造乎禰也但前據告行此據以征伐之事故云受命然則受命於祖在造乎禰之前但前文類帝宜社禡於所征之地總説出行之時然後本初時受命受成之事所以文倒也受成於學謂在學謀論兵事好惡可否其謀成定受此成定之謀於學也出師征伐執此有罪之人還反而歸釋菜奠幣於學以訊馘告先聖先師也直云先師文不具耳通論周氏諝曰受命非不於禰也以禀於尊者為主受成非不於朝也以謀於衆者為主訊馘之所告非不及廟社也以受成者為主存疑鄭氏康成曰釋奠釋菜奠幣孔氏穎達曰釋菜奠幣案大胥職云春入學舍采合舞文王世子亦云釋菜鄭注禮輕惟釋蘋藻無牲牢無幣帛文王世子又云興器用幣注云以器成告徒用幣無菜亦無牲牢又始立學者釋奠於先聖先師及行事必以幣是釋奠有牲牢有幣帛無用菜之文此以釋菜解經釋字奠幣解經奠字似以訊馘告但有菜幣無牲牢也於事有疑辨正黄氏震曰釋奠即舎采周禮春入學舎采呂覽仲春上丁命樂正習舞舎采文王世子春官釋奠於先師秋冬亦如之用之視學釋奠之禮一也又曰凡始立學必釋奠於先聖先師及行事必以幣用之始立學釋奠之禮二也此出征反釋奠於學三也其所行之禮皆以采而非菜也蓋贄見必先用幣故事神亦先用幣釋置采帛而奠安神位之前此禮之最重者若菜則菹也物之薄而禮之末故惟士子始入學用之學記曰大學始教皮弁祭菜是也文王世子曰既興器用幣然後釋菜亦謂立學既已興器用幣世子入學亦用菜人無生而貴者耳釋奠與釋菜全不相干鄭氏因月令誤以采為菜遂以士始入學之禮釋此且分釋與奠為二誤益甚矣天子諸侯無事則嵗三田一為乾豆二為賓客三為充君之庖乾音干庖歩交反正義鄭氏康成曰三田者夏不田蓋夏時也孔疏夏禹以仁讓得天下又避其夏名故不田此取春秋緯運斗樞文周禮春曰蒐夏曰苖秋曰獮冬曰狩乾豆謂腊之以為祭祀豆實也庖今之厨也孔氏穎達曰自此至覆巢一節論天子以下田獵之事無事謂無征伐出行䘮凶之事獵在田中又為田除害故稱田也鄭釋廢疾曰嵗三田謂以下乾豆三事為田也非脯而云乾者謂作醢及臡先乾其肉故云乾豆是上殺者也二為賓客中殺者也三充君庖下殺者也案穀梁桓四年范寗云上殺中心死速乾之以為豆實次殺射髀骼死差遲故為賓客下殺中腸汙泡死最遲故充庖厨又車攻毛傳云自左膘而射之達於右腢為上殺逹右耳本次之射左髀達於右䯚為下殺是亦有三等之殺先宗廟次賓客尊神敬賓之義方氏慤曰事謂䘮荒之類天子諸侯於無事之嵗然後田則其田也可謂有節矣春蒐夏苖秋獮冬狩則田所行之時也乾豆賓客充君之庖則田所為之事也所行之時有四所為之事有三故曰嵗三田也與易言田獲三品同義公羊氏以夏不田誤矣夫乾豆所以奉神賓客所以奉人充庖所以奉己先神而後人先人而後己故其序如此無事而不田曰不敬田不以禮曰暴天物正義鄭氏康成曰不敬者簡祭祀畧賓客孔氏穎達曰暴天物者田獵不以禮殺傷過多是暴害天所生之物以禮田者則下文天子不合圍以下至不覆巢皆是也馬氏睎孟曰田者所以供祖廟可田而不田故曰不敬田雖以殺為上而殺之中又有禮焉故曰不以禮黄氏震曰天地生萬物聖人贊之以禮所以輔相天地而交萬物有道也天子不合圍諸侯不掩羣天子殺則下大綏諸侯殺則下小綏大夫殺則止佐車佐車止則百姓田獵綏鄭讀緌今如字正義鄭氏康成曰合圍掩羣為盡物也綏當為緌有虞氏之旌旗也下謂弊之孔疏於地仆佐車驅逆之車孔疏驅驅出禽獸使趨田者逆逆要不得令走孔氏穎達曰天子四時田獵皆得圍但圍而不合若諸侯惟春田不得圍其夏秋冬皆得圍圍亦不合故下曲禮云國君春田不圍澤此諸侯不掩羣者是畿内諸侯為天子大夫故下曲禮云大夫不掩羣此並熊氏説若皇氏則以此為夏殷禮下曲禮為周禮也綏旌旗無斿者周謂之大麾於周則春夏田用綏故鄭答趙商云春夏用大麾秋冬用大常詩傳天子發抗大綏諸侯發抗小綏此抗綏以表天子諸侯之獲也大夫殺則止佐車則天子諸侯殺未止佐車也云佐車止則百姓田獵以此推之則天子殺然後諸侯殺諸侯殺然後大夫殺方氏慤曰佐車止則百姓田獵者蓋尊卑先後之序也馬氏睎孟曰此田以禮之事也示其有愛物之仁也餘論李氏覯曰兵者不祥之器若無故而習是習殺人也故因田而教焉鳥獸亦含血氣若無故而殺是暴天物也故因祭而行焉以彰事神之禮即以作不虞之備案鄭諸經改字朱子亦多從本字獨此訾鄭誤而以為正立執綏之綏則不然御車之法御者先升執綏以授乘車者乘車者升則御者釋之而執轡以驅豈有常抗此綏以立者且驅馳之節在轡不在綏也詩韓奕言淑旂綏章注云綏章染鳥羽或旄牛尾注於旂竿之首為表章詩傳天子發抗大綏諸侯發抗小綏是綏即指旌旗言之抗者舉之極髙猶詩言孑孑干旄孑孑干旌言旌可言旄言旂言綏亦可抗即孑孑之貌不必定改為緌耳蓋綏當殺時抗之則殺竟自當下之也獵時車上所建者大綏小綏獵竟獻禽虞人所立者虞旗虞旌兩不相礙孔氏誤以大綏小綏亦以表獲因致胡氏謂旗當立不當仆駁之此以誤致誤若謂夏殷所用周不得用則眀堂位所陳四代服器孰非當時所兼用乎獺祭魚然後虞人入澤梁豺祭獸然後田獵鳩化為鷹然後設罻羅草木零落然後入山林昆蟲未蟄不以火田不麛不卵不殺胎不殀夭不覆巢獺他逹反又他瞎反豺音柴罻音尉麛又作麑音迷卵力管反殀子表反天烏老反覆音福正義鄭氏康成曰取物必順時候也梁絶水取魚者罻小網也昆眀也眀蟲者得陽而生得陰而藏麛卵胎夭未成物重傷之也殀㫁殺也少長曰夭覆敗也孔氏穎達曰月令正月獺祭魚孝經緯云獸蟄伏獺祭魚則十月中也是獺一嵗再祭魚此謂十月時正月雖獺祭魚虞人不得入澤梁也月令九月豺乃祭獸夏小正十月豺祭獸則是九月末十月初也鳩化有漸月令季夏鷹乃學習孟秋鷹乃祭鳥其鳩化為鷹則八月時也罻捕鳥網也又爾雅云鳥罟謂之羅草木零落謂十月時月令季秋草木黄落其零落則十月時也故毛詩傳云草木不折不操斧斤不入山林此謂官民總取材木若依時取者則山虞云仲冬斬陽木仲夏斬陰木不在零落時也昆蟲未蟄不以火田謂未十月時也從十月以後至仲春皆得火田故司馬職云春火弊也不麛不卵國語云獸長麛夭鳥翼鷇卵是春尤甚此注云重傷未成物則四時皆然也夭與麛相連故鄭云少長曰夭彭氏翼夫曰麛鹿子亦凡獸子之通稱不覆巢惡傷其字乳又盡物而取之也通論陳氏祥道曰昆蟲未蟄不以火田以火伏而後蟄者畢故也然孟春啟蟄而周禮仲春之田有火弊者焚圃草以田可也焚山林以田不可也月令仲春禁焚禮也郊特牲季春出火為焚非禮也春秋時楚子田使齊侯載燧此火田之所用者與存疑方氏慤曰獺祭魚蓋孟春之月也豺祭獸蓋季秋之月也魚陰物也其性随陽而上春為陽中魚於是時則易取故獺祭魚而入澤梁者因以為取魚之候也獸陽物也其質乘陰而成秋為陰中獸於是時則可取故豺祭獸而田獵者因以為取獸之候也案方氏獺祭魚據月令似較據孝經緯為確然月令於季春言天子始乘舟薦鮪于寢廟以鮪先至而薦之則是春未必聴民漁也蓋魚春而孕夏乃别孕若春而聴民漁與不卵不殺胎異矣故以孔疏為確冢宰制國用必於嵗之杪五穀皆入然後制國用用地小大視年之豐耗以三十年之通制國用量入以為出杪音眇量音亮正義鄭氏康成曰制國用如今度支經用杪末也小大豐耗謂小國大國豐凶之年各以嵗之収入制其用多少多不過禮少有所殺也通三十年之率當有九年之蓄出謂所當給為孔疏給謂給百官賓客及民人為謂為造國家器服也孔氏穎達曰自此至以樂一節論冡宰制國用及年之豐耗幷䘮祭及所蓄積之法凡制國用多少必計地大小又視年之豐耗若地大年豐則制用多地小年耗則制用少先以三十年通融之法留九年蓄外計見在之物以制國用每年所入分為四分一分擬為儲積三分為當年所用二年又留一分三年又留一分是三年總得三分為一年之蓄通三十年之率當有十年之蓄也此云當有九年之蓄者崔靈恩云三十年之間大畧有閏月十三足為一年故惟有九年之蓄王肅以為二十七年有九年之蓄而言三十者舉成數也未知孰是通論劉氏彛曰用地大小者欲知萬民多寡之實也視年豐耗者以裁國家費用之宜也通以三十年所入之數則豐耗在其中矣即其通數以為禮制則三十年之内雖有凶荒國用亦不匱又有九年之蓄在外所以防大凶災保育其民者也馬氏睎孟曰嵗之杪萬物皆成九賦皆入故周官以九式均節財用必在於九賦之後也國之用在於財財之所出在於地地之所生本於天時地之所出有多寡而天時之所成亦有多寡故曰用地小大視年之豐耗蓋禮之大倫以地之廣狹而為常禮之厚薄以年之上下而為變也案冡宰掌六典統百官均四海於職無所不統而獨言制國用者承平之世府庫盈餘君心易侈心侈則用奢用奢則斂厚斂厚則民貧民貧則亂作古之冡宰節以九式凡君所用大府司㑹職幣職嵗皆得據式以争君莫之違也後世乃取惟王不㑹一言以縱欲國服為息四字以朘民是惡知制用足國之道哉祭用數之仂䘮三年不祭惟祭天地社稷為越紼而行事䘮用三年之仂䘮祭用不足曰暴有餘曰浩祭豐年不奢凶年不儉仂音勒又音力正義鄭氏康成曰仂算今年一嵗經用之數而用其什一也越紼行事不敢以卑廢尊越猶躐也紼輴車索也孔疏未葬之前屬紼於輴以備火災今祭天地社稷須越躐此紼而往祭所䘮大事故用三嵗之什一暴猶耗也孔疏物被殘暴則虚耗浩猶饒也陳氏澔曰暴殘敗之義言不齊整浩汎濫之義所謂以羙没禮也孔氏穎達曰私䘮者是其卑天地社稷是其尊今雖遭私䘮既殯以後若有天地社稷之祭即行之馬氏睎孟曰國用不止於䘮祭而言䘮祭舉重也䘮用三年之仂祭則用數之仂何也祭有常典而䘮出非常之變也出於非常之變故䘮三年不祭非特哀有所隆而祭亦有所不暇也禮之厚薄與年之上下豐年則用豐年之仂凶年則用凶年之仂豐年而加於仂之外則謂之奢凶年而畧於仂之内則謂之儉乃所以與年之上下也黄氏震曰不奢不使過於數之仂不儉不使不及於數之仂也通論孔氏穎達曰天地社稷故有越紼之禮六宗及山川之等卑於天地社稷待䘮終乃祭其宫中五祀在䘮内則亦祭之故曽子問曰君薨五祀之祭不行既殯而祭之自啟殯至於反哭五祀之祭不行既葬而祭之但祭時須人既少衆官不皆使盡去不為越紼也天地社稷之祭預卜時日今忽有䘮故既殯越紼行事若遭䘮之後當天地郊社常祭之日其啟殯至於反哭則避此郊社祭日而為之案禮卒哭而祔練而禘於廟此等為新死者而為之則非常祭也其常祭必待三年䘮畢也其春秋之時未至三年而為吉祭者皆非禮也程子曰越紼則是猶在殯宫於時無由致齊又安能脱䘮服衣祭服此皆難行縱天地之祀不可廢則止可使冢宰攝耳張子曰惟天地社稷越紼而行事則是未葬則如何祭是時雖欲祭之不可得也若居䘮未祭則因禮有緦不祭之文方䘮之初雖功緦如何可祭又豈可三年廢祖先之祭久而哀殺可齊則便可祭以人情酌之三年之䘮期可祭期之䘮既葬可祭緦功之䘮踰月可祭祭各以其盛服祭罷反䘮服吕氏大臨曰䘮不貳事則祭雖至重亦有所不可行盖祭而誠至則忘哀祭而誠不至不如不祭之為愈也後人哀死不如古人之隆故多疑於此案周禮大宗伯王不與祭則攝位而天官亦有宰祭之文注謂有故則王不祭冡宰宗伯皆可攝之夫故孰有大於王䘮方在殯者參以程子之論則未葬以前天地社稷之祭使冡宰或宗伯攝既葬則親往耳越紼與大輅越席之越同謂輅車之索不用絲而用苧麻也存疑方氏慤曰易歸竒於扐以象閏扐者指間也揲蓍而四分之竒歸之指間此所謂扐方四分之一耳數之仂一年所用四分之一也三年之仂三年所用四分之一也辨正孔氏穎達曰仂是分散之名考工記以其圍之阞謂三分之一此知為什一者以民税一嵗之十一謂祭所用亦謂什一也國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂溢音亦正義鄭氏康成曰菜色食菜之色民無食菜之饑色天子乃日舉以樂侑食通論孔氏穎達曰積貯滿九年之後則腐壊當隨時給用李氏格非曰魯荘公冬大無麥禾臧孫告糴於齊傳曰古者税什一豐年備敗不外求而上下皆足也雖累凶年民弗病也一年不艾而百姓饑君子非之又曰先王之治田蕩之以溝均之以遂足以禦凶旱舍之以列瀉之以澮足以禦水溢而猶恃九年之蓄者待天災之盡也先王備水旱者具矣而猶有水旱之患盖天時不可知雖先王之備法猶有不免也陳氏祥道曰古者天子大䘮大荒大札則不舉天地有烖邦有大故則不舉至於荒政則蕃樂大凶則弛縣然則以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂豈不冝哉應氏鏞曰此非謂旱乾水溢亦不廢樂也謂既有三十年通制之規模雖凶災而民不病則常時可以日舉樂耳盖雖一飯之頃而不忘乎民也若夫偶值凶年則雖有備而亦豈敢用樂乎案三十年之通則是蓄有十年之食故雖有水旱而民無菜色文傳解云有十年之積者王無一年之積者亡正與此相表裏或曰九年之蓄非直謂蓄有九年之食盖指九年耕之所蓄則食僅支三年國無三年之食故曰不足無六年所耕之蓄則是國無二年之食故曰急無三年所耕之蓄則國且無一年之食故曰國非其國也不然有九年六年不具論猶有三年之食而曰國非其國不已甚乎欽定禮記義疏卷十六
