body:
  text: 曲禮下第二之一正義孔氏穎達曰案義與前篇同簡䇿重多分為上下凡奉者當心提者當帶奉本亦作捧同芳勇反提徒兮反正義鄭氏康成曰高下之節孔氏穎達曰自此至則襲一節論臣所奉持及俯仰裼襲之節物有宜奉持者有宜提挈者奉者仰手當心提者屈臂當帶帶有二朝服之帶髙於心深衣之帶下於脅此謂深衣之帶以古人恆著深衣故也吕氏大臨曰奉者承之以兩手提者挈之以一手通論馬氏睎孟曰古人以一威儀之肅慢為利害之所召一執玉之俯仰為禍福之所係則凡見於奉提操執行立屈伸之末者其可忽哉邾子執玉髙其容仰子貢以為驕執天子之器則上衡君子以為禮者執主器以髙為貴執己器以下為敬也詩曰奉璋峩峩是奉者必髙故言當心禮曰長者與之提攜是提者必下故言當帶執天子之器則上衡國君則平衡大夫則綏之士則提之綏依注音妥正義鄭氏康成曰衡謂與心平上衡謂髙於心彌敬也綏讀曰妥妥之謂下於心孔氏穎達曰此又明臣為君上提奉之禮執持也上髙也衡平也凡衡有二大夫衡視則面為衡此衡謂心也人之拱手當心天子至尊器不宜下故臣為擎奉皆髙於心國君降於天子故臣為奉持器與心齊大夫又降於諸侯故其臣奉器下於心士卑故提之又在綏之下即上提者當帶方氏慤曰器因人而為貴賤自天子至於士貴賤各有等差故人愈貴而執器者愈恭焉存疑孔氏穎達曰凡常提物尚得當帶今為士提物更在帶下者士卑故厭降在下也存異陸氏佃曰衡髙七尺七寸中人八尺則所謂平衡與眉齊矣上衡又少髙焉若今奉御食器上眉是也案衡平也心與手齊之謂朱子以上如揖下如授為平衡則衡之以心為準明矣陸以眉言未確鄭謂綏下於心則提下於綏當帶也孔謂更下於當帶亦未確凡執主器執輕如不克執主器操幣圭璧則尚左手行不舉足車輪曳踵正義鄭氏康成曰主君也克勝也如不克重慎之也操幣圭璧尤重慎之尚左手尊左也車輪謂行不絶地孔氏穎達曰此明奉持及手足之儀禮大夫稱主此言主上通天子諸侯下含大夫為君者士則不然尊者之器其臣執之宜謹器雖輕小恆如重而不勝故孔子執圭如不勝上介執玉如重是也圭璧瑞玉也尚上也謂執持君器及幣玉則右手在下左手在上曳拽也踵腳後也執器行時不得舉足但起前拽後使踵如車輪曳地行也通論方氏慤曰玉藻曰執龜玉舉前曳踵士相見禮曰執玉者則唯舒武舉前曳踵與此同意存異方氏慤曰左手不如右强尚左手則下右手可知尚左手所以為容下右手所以致力吕氏大臨曰人手利於用右以利用者在下防失墜也車輪曳地行步之慎也案吉事尚左手凶事尚右手操幣圭璧皆吉事故尚左如方吕說則當言必用右手非正義也立則磬折垂佩主佩倚則臣佩垂主佩垂則臣佩委正義鄭氏康成曰君臣俯仰之節倚謂附於身小俯則垂大俯則委於地孔氏穎達曰此明授受時禮立倚也佩玉佩也帶佩於兩邊臣身宜僂折如磬之背故云磬折也身既僂折則所帶之佩從兩邊出懸垂於前也君若直立而佩倚於身則臣宜曲折故佩垂於前君若折身而佩垂則臣身當彌曲故佩委於地然必待君僂而後臣曲者亦授立不跪之義也吕氏大臨曰凡授受者尊卑皆磬折故垂佩也然臣當加恭於君故有佩倚佩垂佩委之差通論馬氏睎孟曰玉藻曰足容重手容恭立容德又曰立容辨卑毋讇曲禮曰立如齊則自奉者當心以至尚左手者手容恭也行不舉足車輪曳踵者足容重也磬折垂佩者立容德而辨卑如齊也案手容恭足容重者君子之常此則尤重慎之立容德亦君子之常此又視君以為節所謂立容辨也馬說微混執玉其有藉者則裼無藉者則襲藉在夜反裼星歷反正義鄭氏康成曰裼襲文質相變耳圭璋特而襲璧琮加束帛而裼孔疏熊云圭璋特以下明賔主各自為裼襲謂朝時用圭璋特賔主俱襲行享時用璧琮加束帛賔主俱裼孔氏穎達曰凡衣近體有袍襗之屬其外有裘夏則衣葛其上有裼衣裼衣上有襲衣襲衣之上有常著之服則皮辨服之屬也掩而不開謂之襲若開此皮辨服及中衣左袒出其裼衣謂之裼賈氏公彥曰凡服四時不同冬襯身襌衫又有襦袴襦之上有裘裘有裼衣裼衣之上又有上服皮辨祭服之等見裼衣者謂袒襟前上服見裼衣也劉氏彝曰此直謂朝聘時耳圭璋璧琮琥璜皆玉也執璧琮琥璜則與帛錦繡黼同升所謂有藉則裼禮差輕尚文也執圭璋則特達所謂無藉則襲禮方敬尚質也陸氏佃曰藉若璧藉以帛琮藉以錦云爾非繅藉也大行人曰公繅藉九寸侯伯繅藉七寸若此者繅藉也小行人曰璧以帛琮以錦琥以繡璜以黼若此者藉也存疑鄭氏康成曰藉藻也有藻為文裼見美亦文無藻為質襲充美亦質孔氏穎達曰凡執玉時必有其藻以承於玉若見美之時必垂藻兩端執玉之人去體上外服以見在內裼衣充美之時承玉之藻不使下垂屈而在手執玉之人掩其上服襲蓋裼衣又曰上公享王圭以馬享后璋以皮皮馬不上堂惟特有圭璋圭璋是寶物不可露見必以物覆襲之故云圭璋特而襲侯伯子男享天子璧以帛享后琮以錦既有帛錦承玉上唯用輕細之物蒙覆以裼之故云璧琮加束帛而裼云亦是者非但人有裼襲玉亦有裼襲之義此皇氏說藉玉之藻鄭注覲禮以韋衣木廣袤如其玉之大小天子以五采畫之諸侯三采子男二采其卿大夫亦二采既畫韋衣於板上又有五采組繩以為繫其組上𤣥為天下黃為地長尺無事但繫玉有事則垂之以為飾若板之藻藉則常有今言無者據垂之也其垂藻之時則須裼屈藻之時則須襲又曰凡享時其玉皆無藉藻故崔靈恩曰初享圭璋特故有藻餘則束帛加璧既有束帛不須藻辨正朱子曰鄭說兩義詞太簡略指不分明疏家所引皇氏熊氏說始以屈垂言之但所云今言無者據垂之也乃與經文及所說上下文俱相反疑據字下脫一不字至於圭璋璧琮之義則皇氏為失又所引崔靈恩云璧琮既有束帛則不須藻似亦抵牾疑璧琮雖有藻而屈之當為無藉特以加於束帛故從有藉之列而執者裼耳其陸氏但取注後說亦似有理案有藉無藉之說有三圭璋特束帛加璧一也屈繅垂繅二也以物覆襲三也圭璋特之說又有二朝聘天子以圭后以璋一也享時六幣圭以馬璋以皮二也以物覆襲之非朱子已詳之矣據朱子以璧琮屈繅為無藉因加帛而從有藉之列是仍不計繅之垂屈而計帛之有無也況據聘禮賈人取圭授宰宰取圭授上介使者執圭反命俱曰垂繅而不聞其裼宰執圭授使者上介受圭出授賈人執圭授賓執璋反命俱曰屈繅而不聞其襲若以上介不襲注盛禮不在已之說解之則使者反命垂繅不裼豈亦得委之盛禮不在已耶故陸氏取鄭後說朱子是之至朝聘及享用圭璋者則當襲享用璧琮者則當裼以聘禮準之自明也又裼襲之說孔謂裼衣上有襲衣襲衣上有皮辨服之類賈謂裼衣上有皮辨服之類疑賈得之蓋辨服祭服皆直領領之內有左右二衽各屈其衽於內則露裼衣為見美衽左右交則不見裼衣為充美耳若另有一襲衣則由裼而襲必先釋禮衣加一襲衣復加禮衣由襲而裼亦必先釋禮衣去此襲衣仍反禮衣設一更衣之次乃可而禮無文也國君不名卿老世婦大夫不名世臣姪娣士不名家相長妾姪丈節反字林丈一反娣大計反相息亮反長丁丈反正義鄭氏康成曰雖貴於其國家猶有所尊也卿老上卿也世臣父時老臣孔氏穎達曰此一節總明稱謂之事世婦謂兩媵次於夫人而貴於諸妾諸侯雖貴猶宜有所敬不得呼卿老世婦之名姪妻之兄女娣妻之妹從妻來為妾也大夫不得呼世臣及貴妾名也家相謂助知家事者長妾妾之有子者士不得呼此二等人名也熊氏安生曰士有一妻二妾言長妾者當謂娣也應氏鏞曰古者立國必有世家大族且有世臣大老人君常寵異而尊禮之所以存忠厚養恭敬也國之卿老家之世臣士之家相尊卑不同而輔贊則一敬之而不名所以示外之有所統也若夫內助之賢而舊者如世婦姪娣長妾雖其分不敵於女君其貴實隆於諸御敬之而不名所以示內之有所統也內外有所敬而不名則受其所敬者莫不竭其忠而盡心覩其可敬者莫不知所畏而禀命然後國政家事有所統一而緩急有所倚重矣通論吕氏大臨曰古者幼名男子冠而字女子笄而字所以别長幼也君之於臣妾雖冠笄亦名惟臣妾之長者不名所以别貴賤也卿老世臣家相皆其貴臣也世婦姪娣長妾皆其貴妾也均臣妾也特異其貴者以禮敬之不敢慢也卿老者即上大夫卿也自天子至於士其臣之貴者皆稱老記曰五官之長曰伯其擯於天子也曰天子之吏自稱於諸侯曰天子之老列國之大夫使於諸侯自稱曰寡君之老又諸侯使卿弔於他國辭曰一介老某相執綍此天子諸侯之臣稱老者也餘論孔氏穎逹曰大夫不世爵此有世臣者子賢襲父爵者也君大夫之子不敢自稱曰余小子大夫士之子不敢自稱曰嗣子某不敢與世子同名正義鄭氏康成曰君大夫天子大夫有土地者不敢稱曰余小子辟天子之子未除喪之名大夫士之子亦辟其君之子未除喪之名吕氏大臨曰君大夫為天子大夫有土地者其說雖不經見然此章立文之意義當然也蓋辟嗣天子者必天子大夫之子辟嗣諸侯者必諸侯大夫之子也不與世子同名辟僭效也其先之生則亦不改孔疏案榖梁昭七年傳云何為君臣同名君子不奪人親之所名重其所由來也是臣先名君後名同之臣不改也又案雜記云與君之諱同則稱字若先生與世子同名亦當然孔氏穎達曰此已下明孝子在喪擯者接對賓客之辭大夫士之子諸侯之大夫士之子也世子謂諸侯之適子也通論馬氏睎孟曰詩曰嗟豫小子書曰眇眇豫末小子皆天子未除喪之稱也蓋天子域中之大故必謙以小子諸侯有繼世之禮故必命以嗣此在下者所以必辟之也禮諸侯在凶服曰適子孤春秋傳曰在喪公侯曰子儀禮士喪服曰哀子某是國君與士之所自稱者如比而已然則春秋之例踰年稱公何耶蓋以臣民之心不可一日無君故踰年稱公以孝子之心三年不忍當故三年稱子衛宣公未葬而嗣子稱侯非禮也晉有小子侯僭禮也存疑孔氏穎達曰焦氏問案春秋君在稱世子君薨稱子某既葬稱子無言嗣子某者又大夫之子當何稱張逸答曰此避子某耳大夫之子稱未聞案稱嗣子某或殷禮也案殷禮稱嗣子某未確王氏安石曰君大夫之子國君及大夫之子也君使士射不能則辭以疾言曰某有負薪之憂正義鄭氏康成曰射者所以觀德惟有疾可以辭也孔疏士既升朝必宜有德若不能則是素餐之辱兼辱君不知人誤用已也使士射謂以備耦也孔疏大射君與賓耦卿大夫自相耦又有士御於大夫又司射誓耦卑者與尊者為耦不異侯是士得備預為耦憂或為疾孔氏穎逹曰某有負薪之憂此稱疾之辭也某士名也負擔也大樵曰薪詩云析薪如之何匪斧不克庶人子負薪今士云者謙辭黃氏震曰憂言有疾而憂無力擔薪通論吕氏大臨曰男子生桑弧蓬矢以射天地四方言射者男子之所有事也故不能射者男子恥之可以疾為辭而不可以不能辭也馬氏睎孟曰先王之時相尚以射如此庸詎有士不能乎所謂不能者非不能也不善於此而已案大射比耦告之命之皆由司射士耦於大夫亦司射命之其得與於比即君使之也侍於君子不顧望而對非禮也正義鄭氏康成曰禮尚謙也不顧望若子路率爾而對孔氏穎達曰謂多人侍而君子有問若指問一人則一人直對若問多人則侍者當先顧望坐中或有勝已者宜前而已不得率爾先對也吕氏大臨曰不顧望而對則如恐人之先已若有所爭然方氏慤曰顧於後有所省望於前有所瞻應氏鏞曰顧望者從容詳審有察言觀色之意言不輕發必當其可非但謙遜而已案不顧望而對則未見顔色而言矣疑所重在君子而同侍者次之君子行禮不求變俗祭祀之禮居喪之服哭泣之位皆如其國之故謹修其法而審行之正義鄭氏康成曰求猶務也不務變其故俗重本也謂去先祖之國居他國者其法謂其先祖之制度孔氏穎達曰此一節論臣去本國行禮之事俗者本國禮法所行不務變之從新也張子曰行禮不求變俗於新國舊俗之法雖未盡善不遽矯變之也蓋懷舊君之恩義不變父母邦之舊法也通論熊氏曰王制云修其教不易其俗又左傳定四年封魯因商奄之民封康叔於殷墟啓以商政封唐叔於夏墟啓以夏政皆因其舊俗也蓋人君務在化民因其舊俗往之新國不須改也孔氏穎達曰祭祀之禮不變即夏立尸殷坐尸周旅酬六尸及先求隂陽犧牲騂黑之屬也居喪之服如殷雖尊貴猶服旁親周則以尊降服哭泣之位如殷不重適以班髙處上周世貴正嗣孫居其首皆如其國之故謂故俗也舉此三條餘冠昏之屬從可知馬氏睎孟曰從俗禮也變俗亦禮也求變俗非禮也君子之於俗可則從否則變宜從而變則為亂常宜變而從則為泥俗周禮本俗六以安萬民易在革則去故在鼎則取新豈故拂民以求變俗哉凡因彼而已君子之不求變俗多矣特言祭祀居喪哭泣之位者以人情於此尤不忍變故也案不求變俗矣又曰謹修而審行則其不忘本國中仍自有道處之與生今反古者不同夫是之謂君子去國三世爵祿有列於朝出入有詔於國若兄弟宗族猶存則反告於宗後去國三世爵祿無列於朝出入無詔於國唯興之日從新國之法正義鄭氏康成曰三世自祖至孫踰久可以忘故俗而猶不變者爵祿有列於朝君不絶其祖祀復立其族若臧紇奔邾立臧為矣詔告也謂與卿大夫吉凶往來相赴告也若兄弟宗族猶存謂無列無詔者反告亦謂吉凶也宗後宗子也興謂起為卿大夫從新國之法謂故國與己無恩孔氏穎達曰此以下明在他國而得變俗者去國謂被黜兄弟宗族謂本國之親宗後大宗之後也已於本國無列無詔然未仕新國宗族猶存兄弟尚在已有吉凶當反還告宗適不忘本也若本國無列無詔而今始仕新國者所行禮悉改從新也方氏慤曰以傳統而為後故謂之宗後夫於朝猶有列於國猶有詔於家猶有宗與族則彼所以待我者恩好猶未絶也如之何其遽絶之反告之宜矣存疑孔氏穎達曰故國猶有列詔者雖仕新國猶行故俗若無列無詔而不仕新國者猶不得從新矣方氏慤曰無列無詔則宗族待我亦可知矣如之何其反告之哉游氏桂曰古之為天下者以家道為之天子有其宗族以保天下諸侯有其宗族以保其國卿大夫士有其宗族以保其家故其禮皆以宗族之存亡為之輕重也若爵祿無列於朝則君無恩於己矣出入無詔於國則宗族無恩於己矣若此者當變猶不遽變也於其興起為卿大夫之日然後從新國之法焉皆所以重其本之道也案孔子相衛司徒敬子之喪用殷禮子游問曰君子行禮不求變俗夫子變俗乎子曰非也喪事吾從其質而已則此上二句似謂君子適他國而行禮固不變他國之俗如所謂禮從宜使從俗禹袒而入裸國者然喪祭之禮猶必修故國之法而特審以行之不敢忘本亦不敢與彼國大戾也鄭孔以為本國之故俗熊以為彼國之舊俗似熊得之至孔謂故國有列詔雖仕新國猶行故俗恐既起家為彼卿大夫而不從彼國之禮法於君臣之義有未安又案無列無詔而兄弟宗族猶存則猶反告於族禮未盡變也若興則從新不以兄弟宗族猶存而泥舊法矣此中有輕重差等之分焉總以明君子去國之禮厚之至也若吳氏澄於出入有詔於國下入謹修其法而審行之句於出入無詔於國下補若兄弟宗族猶存則反告於宗後句方謂無列無詔即併無宗族游氏以出入無詔為宗族薄己恐皆未然君子已孤不更名已孤暴貴不為父作諡為于僞反諡音示正義鄭氏康成曰不更名亦重本暴貴不為父作諡子事父無貴賤孔氏穎達曰名是父所作父死作新名似遺棄其父也諡者列平生德行而為作美號若父昔賤已今暴貴忽為造諡似鄙薄父賤不宜為貴人之父也通論吕氏大臨曰已孤不更名有所不忍也已孤暴貴不為父作諡有所不敢也不忍愛也不敢敬也愛敬盡於事親而已古者子生三月妻以子見而父名之斯名也父之所命也親存而有所禀命猶可更也已孤更之輕廢父命孝子之所不忍也父之爵卑不當諡而已之爵當諡以己當諡而作其父諡是以己爵加其父欲尊其親而反卑之非所以敬親也然則周之追王大王王季何也周之王迹基於大王王季文王世世修德至武王而有天下武王周公追述其功義起斯禮非後世追王之比也存疑孔氏穎達曰暴貴謂非一等之位若本為士庶今起為諸侯者也馬氏睎孟曰名雖不可更以字行可也今律有所避忌則行字者聽是也諡雖不可作德盛者可也武王周公追諡大王王季文王是也居喪未葬讀喪禮既葬讀祭禮喪復常讀樂章正義鄭氏康成曰為禮各於其時孔氏穎達曰居喪居父母之喪也喪禮謂朝夕奠下室朔望奠殯宫及葬等禮也祭禮謂虞卒哭祔小祥大祥之禮也復常謂大祥除服之後也樂章樂書之篇章謂詩也此上三節事須預習故皆許讀之通論張子曰禮在平日豈不常學如祭禮樂章豈必喪終乃學此言者蓋為切於用故至其時又復講求居喪者他書不可觀惟喪祭禮可讀若觀他書却似都忘陳氏祥道曰非喪而讀喪禮則非人子之情居喪而不讀喪禮不失之過則失之不及未葬而讀祭禮則非孝子之情既葬而不讀祭禮不失之黷則失之怠喪未除而讀樂章則哀不足喪復常而不讀樂章則樂必崩宰豫欲短喪孔子以為不仁閔子騫子夏援琴而哀樂各異孔子皆以為君子則喪復常讀樂章先王之中制也居喪不言樂祭祀不言凶公庭不言婦女正義鄭氏康成曰非其時也通論馬氏睎孟曰斬衰之喪唯而不對齊衰之喪對而不言大功之喪言而不及議小功之喪議而不及樂夫小功之喪議而不及樂況大於此而可言樂乎古者易服而葬周官蠟氏凡大祭祀禁凶服祭義郊之祭喪者不敢哭以為交於神明者不可以凶也又況祭祀可言凶乎男正位乎外女正位乎內內言不出外言不入凡欲無相瀆而已又況公庭可言婦女乎振書端書於君前有誅倒策側龜於君前有誅正義鄭氏康成曰臣不豫事不敬也振去塵也端正也倒顛倒也側反側也皆謂甫省視之孔疏甫者始也不豫整理今於君前始正之孔氏穎達曰此明臣當豫事書簿領也不豫拂整龜策君之卜筮所須也不豫周正皆宜誅責也方氏慤曰策有本末故曰倒龜有背靣故曰側倒策側龜與振書其過非大然皆有誅蓋以羣臣之衆而奉一人之尊不可不謹也抑所以防其漸歟龜策几杖席蓋重素袗絺綌不入公門苞屨扱衽厭冠不入公門書方衰凶器不以告不入公門重直龍反袗之忍反苞白表反扱初洽反衽而審反厭於涉反衰七雷反正義鄭氏康成曰龜策嫌問國家吉凶几杖嫌自長老孔疏若尸乘以几至廟門及八十杖於朝則几杖得入公門也席蓋載喪車也孔疏喪車蓋也臣有死於公宫可許將柩出門不得將喪車凶物入也車比棺為緩宜停外雜記曰士輤葦席以為屋蒲席以為裳帷孔疏舉士為例卿大夫喪車亦不得入重素衣裳皆素喪服也孔疏臣待放則重素既待放自不得入此謂其私服袗單也孔子當暑袗絺綌必表而出之為其形䙝也孔疏上無衣表則肉露見為不敬苞藨也齊衰藨蒯之菲也問喪曰親始死扱上衽厭猶伏也喪冠厭伏孔疏厭帖無梁纚為五服喪所著也苞或為菲此皆凶服也孔疏服問唯公門有稅齊衰鄭注此不杖齊衰五服入公門與否各有差降熊氏云父之喪唯扱上衽不入冠絰衰屨皆得入杖齊衰則屨不得入不杖齊衰衰又不得入大功絰又不得入小功冠又不得入此厭冠謂小功以下之冠大功已上宜得入也方板也士喪禮曰書賵於方若九若七若五孔疏送死者之物通曰賵若九若七等書板行列之數多則九行少則七行五行也凶器明器也此謂喪在內不得不入當先告君耳孔氏穎達曰此以下明臣物不得入公門者書謂條録送死物件數目多少百字以上用方板書之故云書方衰孝子喪服也凶器棺材及棺中服器也臣在公宫而死君許其在內殯及將葬之禮故有明器書方須告乃入吕氏大臨曰几所以馮杖所以扶袗絺綌所以袣袢暑皆燕安之具入公門而用之近不恭也君子不奪人之喪雖入公門無所辟也臣子之義嫌於不祥故舉其重而辟之衰五服之衰也書方衰凶器三者皆為臣妾有死於宫者君亦許之殯而成喪然必告君乃得入也為君使而死公館復私館不復公館者公宫與公所異也明死於公宫者得成喪也通論馬氏睎孟曰先王之時掌蓍龜有官賜几杖有等周官若有祭事則龜人奉龜凡國事筮人共筮龜筮非君命而入公門則是掌策龜者可以擅卜筮也几杖非尸與七十者而入公門則是人臣可以自長老也周官閽人掌王宫中門之禁喪服凶器不入宫蟜固曰士唯公門說齊衰與此同義然閽人潛服賊器不入宫竒服怪民不入宫少儀曰太白兵車不入廟門玉藻曰非列采不入公門表裘不入公門襲裘不入公門則公門之禁多矣曲禮之所言特其大略而已胡氏銓曰龜策嫌有異謀若南蒯將叛枚筮是也存異吕氏大臨曰席所以坐蓋所以禦日與雨陸氏佃曰先儒謂扱衽於劈踴為妨則扱衽蓋成服之服案鄭說席蓋與重素為類是也吕分為二則路門外九室為卿大夫治事之所豈能不席而坐郭門以內雨日皆不蔽乎凡親始死因無衰故扱上衽成服則齊斬矣如陸說豈扱齊斬之衽乎公事不私議正義鄭氏康成曰嫌若姦也餘論馬氏睎孟曰公事而私議則是弼違者可以後言也然季孫使冉有訪田賦於仲尼仲尼不對而私於冉有何也聖人之於人可與言未嘗不言不可與言未嘗失言季孫之用田賦固非孔子之所能正其私於冉有豈得已哉案公事私議若季氏専魯國政不與同列議於公朝而與家臣謀於私室耳若君大夫來訪則直告之非私議也君子將營宫室宗廟為先廏庫為次居室為後凡家造祭器為先犧賦為次養器為後無田祿者不設祭器有田祿者先為祭服君子雖貧不粥祭器雖寒不衣祭服為宫室不斬於丘木廏九又反犧許宜反粥音育衣於計反正義鄭氏康成曰宗廟為先廏庫為次重先祖及國之用大夫稱家謂家始造事犧賦以稅出牲祭器可假祭服宜自有孔疏人形參差衣服有大小不可假借故先造而祭器之品量同官同可以共有故在後粥賣也丘壟也不粥不衣不斬廣敬也孔氏穎達曰崇敬祖禰故祭器為先諸侯大夫少牢此言犧謂牛即是天子之大夫祭祀賦斂邑民供出牲牢故曰犧賦養器供養人之飲食器也自贍為私宜後造然諸侯言宗廟大夫言祭器諸侯言廏庫居室大夫言犧賦養器者互言也無田祿者但為祭服有地大夫祭器祭服俱造則先造祭服乃造祭器上言祭器為先者對犧賦養器為先其實在祭服後也通論孔氏穎達曰大夫及士有田祿者乃得造器猶不具唯天子大夫四命以上者得備具若諸侯大夫非四命無田祿則不得造故禮運云大夫祭器不假聲樂皆具非禮也據諸侯大夫言之也熊氏以禮運據天子大夫得造不得具非存疑馬氏睎孟曰大王之遷豳也作廟翼翼然後百堵皆興宣王之考室也嗣續妣祖然後築室百堵見古人之營宫室豈嘗不先宗廟哉檀弓曰喪不慮居為無廟也記以士之臣為家相則士亦可稱家周官載師有士田則士之有田祿者亦可以設祭器也胡氏銓曰家謂人家鄭云大夫稱家非也若止謂大夫造祭器則下祭器不踰竟何以兼士乎犧牛也鄭云天子之大夫祭祀賦斂邑民共牲牢故曰犧賦然據禮及孟子惟諸侯得有犧牲大夫豈得有乎禮言諸侯大夫少牢亦不言天子大夫大牢也要之犧賦總言牲耳案詩言以我犧羊是羊亦可言犧案宗廟祭器之先後自天子至士當無不然蓋適士二廟官師一廟有廟則得祭而祭器可造矣鄭注以國君及大夫分之孔疏又以互言為說馬氏增士則備矣胡謂人家非也惟士無田則亦不祭即庶士無廟亦不祭也安得盡人造祭器乎又據此記大夫以索牛儀禮大夫止少牢禮則鄭謂用牛者天子之大夫止用羊者諸侯之大夫亦是也大夫士去國祭器不踰竟大夫寓祭器於大夫士寓祭器於士正義鄭氏康成曰此用君祿所作取以出竟恐辱親也寓寄也與得用者言寄覬已復還孔氏穎達曰此以下明人臣去國之禮踰越也既放出故祭器不得自隨越竟無德而出若猶濫用其器是辱親也物不被用則生蟲蠧既不將去故寄於同僚令彼得用不使毁敗冀還復用大夫士義皆然也方氏慤曰祭器不踰竟不敢以君祿所造之器用之他人之國也又不欲使為無用之物故各寄於得用之家通論馬氏睎孟曰君之於臣也在竟則有賜環之禮在他國則有幣召之禮故孔子在陳未嘗不思歸魯孟子去齊未嘗不思反豫夫豈悻悻然若小丈夫示其必不復哉此祭器所以寓也昔微子去殷抱祭器而之周者抱君之祭器也抱已之祭器不可也抱已之祭器猶不可況春秋之時有載祏而行者有載寶而歸者甚至有以已邑自隨者此君子之所疾也𫝊曰臣之祿君實有之義合則進否則奉身而退若孔悝南宫敬叔孫林父之徒豈知此哉大夫士去國踰竟為壇位鄉國而哭素衣素裳素冠徹緣鞮屨素簚乘髦馬不蚤鬋不祭食不說人以無罪婦人不當御三月而復服鄉許亮反鞮都兮反簚本又作幭莫歷反髦音毛蚤音爪鬋子淺反正義鄭氏康成曰言以喪禮自處也臣無君猶無天也壇位除地為位也案書三壇同墠禮去壇為墠是築土為壇除地為墠二者異也但檀字擅字俱諧聲是亶字原有二音鄭訓除地即壇與墠通徐氏壇音善以此徹猶去也鞮屨無絇之菲也簚覆笭也髦馬不鬄落也蚤讀為爪鬋鬋鬢也不自說於人以無罪嫌惡其君也御接見也三月一時天氣變可以遂去也簚或為冪孔氏穎達曰此大夫士三諫不從出在竟上大夫則待放三年豫環則還豫玦便去士則不待放臨去皆行此禮又曰去父母之邦有桑梓之戀故為壇位鄉國而哭衣裳冠皆素為凶飾也緣中衣緣也吉時用采緣凶喪故徹緣而純素屨以絇為飾凶故無絇也屨又隨裳色今素裳則屨白色也素簚白狗皮為簚也吉則翦剔馬尾為飾凶則不翦而乘之蚤治手足爪也鬋剔治鬚髮也吉則治鬋為飾凶故不翦也祭祭先也食盛饌則祭食之先喪凶故不祭也不說人以無罪者善則稱君過則稱已今雖放逐猶不得向人說已無罪也吉時婦人以次侍御今喪禮自貶故不御也自貶三月然後事事反還如吉禮而遂去也三月為一時天氣一變則人情亦宜易也王度記云大夫俟放於郊三年此云三月不同者得玦之後從郊至竟三月之內行此禮也吕氏大臨曰大夫士去其墳墓拚其宗廟無祿以祭故必以喪禮處也大夫以道去而猶未絶者皆服齊衰三月言與民同也今去其君雖非喪也然重絶君臣之義故以心喪自處而期以三月故曰三月而復服也通論游氏桂曰古之以凶禮自處者三而喪事不與焉戰勝以喪禮處之凶災以喪禮處之去國以喪禮處之戰勝以喪禮重用兵也凶災以喪禮重天災也去國以喪禮重去本也且非特以喪禮自處也人將以喪禮弔之焉去國則弔之凶災則弔之故去國古人之所大患也棄其君者棄其位棄其宗廟棄其父母之邦此其可悲也明矣馬氏睎孟曰凡此特自貶而已又不必純之以凶禮也古之去國者其仁至於嚮國而哭其義至於不說人以無罪子鮮之去衛不嚮衛而坐非所謂仁元咺之奔晉則訟其君以求勝非所謂義也案元咺可非子鮮未可貶存疑王氏安石曰孔氏云大夫三年待放竟上士不待放恐無此禮孔子屢仕屢去豈常行待放之禮乎案三年待放說本公羊似不可駁大夫士見於國君君若勞之則還辟再拜稽首君若迎拜則還辟不敢答拜勞力報反辟婢亦反正義鄭氏康成曰謂見君既拜矣而後見勞也聘禮曰君勞使者及介君皆答拜迎拜謂君迎而先拜之還辟不敢答拜嫌與君亢賓主之禮聘禮曰大夫入門再拜君拜其辱孔氏穎達曰還辟逡巡也聘禮行聘享私覿禮畢賓出主君送至大門內主君問聘君問大夫竟公勞賓賓再拜稽首公答拜勞介介再拜稽首公答拜蓋勞者主君又别慰勞已在道路之勤故逡巡而退避也聘禮無還辟之文者文不備也君若迎拜謂聘賓初至大門外主君迎而拜之賓是使臣不敢當禮則逡巡不敢答主君之拜故聘禮云賓入門左公再拜賓避不答拜是也大聘使卿大夫為介小聘大夫為賓士為介此大夫中含卿也吕氏大臨曰還辟再拜稽首以君臣之禮見他國之君也迎拜則還辟他國之君以賓主之禮接已而已不敢亢也吳氏澄曰還辟謂身旋轉而開闢以遜避也通論馬氏睎孟曰禮莫盛於再拜拜莫重於稽首儀禮周官凡賓主君臣之接也皆以再拜為節特鄉飲禮則主人三拜衆賓一拜而已士相見聘禮至於禮之殺者亦一拜而已再拜所以為盛禮也周官九拜先稽首記曰稽首服之甚孟武伯曰非天子寡君無所稽首知武子曰天子在而君辱稽首寡君懼矣此稽首所以為禮之重也所謂大夫者聘禮之賓也所謂士者聘禮之介也總而言之皆謂之客故周官司儀君勞客客再拜稽首是也然聘禮賓之受几受幣私覿郊勞與歸饔餼皆稽首則記所言稽首一端而已聘禮卿勞賓於郊賓再拜勞者不答拜歸饔餼賓再拜大夫不答拜記所言不答拜亦一端而已大夫士相見雖貴賤不敵主人敬客則先拜客客敬主人則先拜主人正義鄭氏康成曰尊賢也孔氏穎達曰惟賢是敬不計賓主貴賤雖為大夫而德劣亦先拜有德之士也通論馬氏睎孟曰相見貴於相下相下貴於相先士相見禮若先生異爵者請見之則辭辭不得命則先見之然則拜之禮蓋亦若此故主人敬客則先拜客客敬主人則先拜主人也燕禮賓升自西階主人先拜至聘禮賓入大門主君先拜迎則先拜之禮不特大夫士而已記之所言亦一端也案先儒以聘燕之禮言究則凡相見之禮當無不然者朱子采入士相見禮存疑孔氏穎達曰此謂使臣行禮受勞巳竟次見彼國卿大夫也異國則是同國則否辨正朱子曰此未有以見同國異國之辨更詳之下放此凡非弔喪非見國君無不答拜者大夫見於國君國君拜其辱士見於大夫大夫拜其辱同國始相見主人拜其辱君於士不答拜也非其臣則答拜之大夫於其臣雖賤必答拜之男女相答拜也正義鄭氏康成曰禮尚往來喪賓不答拜不自賓客也國君見士不答其拜士賤也自外來而拜拜見也自內來而拜拜辱也非其臣則答拜不臣人之臣也大夫答其臣之拜辟正君也男女嫌逺别不相答拜故以明之孔氏穎達曰此論君臣男女相答拜之法禮尚往來已雖賢德而必皆相答拜凡拜而不答拜者唯弔喪與士見已君二條耳弔賓本來助執喪事非行賓主之禮士喪禮有賓則拜之賓不答拜是也君不答士拜謂士見巳君君尊不答也聘禮士介四人君皆答拜者以其他國之士故也大夫見於國君謂見他國君也故聘禮云公在門左拜是拜其辱也士見於大夫大夫拜其辱者聘禮賓朝服問卿卿迎於廟門外再拜是也同國始相見主人拜其辱者前是異國此明同國則主人必先拜辱也大夫為君宜辟正君故不辨巳臣貴賤皆答拜也男女宜别或嫌其不相答故明雖别必宜答也通論吕氏大臨曰弔喪者主人拜賓賓不答少儀曰適有喪者曰比童子曰聽事適公卿之喪曰聽役於司徒諸侯使人相弔辭云寡君有宗廟之事不得承事則凡弔者非以賓客來獨主拜賓之辱而已賓不敢申其敬也存異胡氏詮曰左傳哀十二年仲尼弔季孫放絰而拜則喪賓亦拜矣案孔子以季孫當服臣為小君之服故以禮往弔季氏既不服喪孔子亦從主釋服去絰而拜明已非喪賓也胡氏喪賓亦拜非也國君春田不圍澤大夫不掩羣士不取麛卵麛音迷卵力管反正義鄭氏康成曰生乳之時重傷其類孔氏穎達曰此明貴賤田獵不同國君諸侯也春時萬物産孕不欲多傷殺故不合圍繞取也夏亦當然不掩羣者羣謂禽獸共聚也羣聚則多不可掩取之麛鹿子凡獸子亦得通稱卵鳥卵也春方乳長故不得取劉氏彝曰春夏蟄蟲孳生雛稚未成雖保息之禮必行而恤物之心猶在方氏慤曰用大者取愈廣位卑者禁愈嚴圍澤掩羣固四時之田所同禁特以春言之者方孕乳之時尤在所禁故也以其從天子故稱諸侯而已以與其臣故稱國君焉通論馬氏睎孟曰王制曰禽獸不中殺不粥於市榖梁曰不成禽不獻則士不取麛卵可知矣王制又曰天子不合圍諸侯不掩羣與此不同何也蓋諸侯在國則南靣以全君道而與天子同來朝則北靣以存臣道而與天子異則天子不合圍諸侯不掩羣諸侯㑹王田獵之禮也國君不合圍大夫不掩羣諸侯在國田獵之禮也李氏格非曰君子之於物也愛之而弗仁故春田不圍澤不麛不卵是故物得其養故春搜有一發五豵之多冬狩有辰牡孔碩之美而人得以盡其奉上之誠於悉率左右之際先王之田蓋如此也陳氏祥道曰春秋傳曰惟君用鮮衆給而已是天子諸侯有四時田獵之禮大夫士不與焉故鄭豐卷將祭請田而子産止之也歲凶年榖不登君膳不祭肺馬不食榖馳道不除祭事不縣大夫不食粱士飲酒不樂正義鄭氏康成曰登成也君大夫士皆自為貶損憂民也禮食殺牲則祭先有虞氏以首夏后氏以心殷人以肝周人以肺不祭肺則不殺也天子食日少牢朔月大牢孔疏周禮膳夫王日一舉大牢鄭惟據玉藻言日少牢者以此言君兼諸侯也諸侯食日特牲朔月少牢除治也不治道為妨民取蔬食也縣樂器鐘磬之屬粱加食也不樂去琴瑟孔氏穎達曰此一節明凶荒人君憂民自貶退禮也嵗凶水旱災害也盛食必祭周人重肺故食必祭肺嵗凶饑不殺牲也年豐則馬食榖馳道如今御路君馳走車馬之處不除謂不治其草萊也凶年雖祭而不作樂樂有縣鐘磬因曰縣也公食大夫禮設正饌後乃設稻粱是以粱為加故凶年去之士平常飲酒奏樂今凶年猶許飲酒但不奏樂也君大夫士各舉一邊而言其實互而相通君尊舉大者而言大夫士卑舉小者言耳通論孔氏穎達曰榖梁傳曰一榖不升謂之嗛二榖不升為饑三榖不升為饉四榖不升為糠五榖不升為大祲君食不兼味臺榭不塗弛侯廷道不除百官布而不列鬼神禱而不祀此歲凶大祲也不祭肺食不兼味也不縣禱而不祀也白虎通一榖不升徹鶉鷃二榖不升徹鳧雁三榖不升徹雉四榖不升損囿獸五榖不升不備三牲馬氏睎孟曰大司徒於荒政言弛力眚禮蕃樂則馳道不除弛力也膳不祭肺馬不食榖大夫不食粱眚禮也祭事不縣士飲酒不樂蕃樂也大司樂大凶令弛縣則不縣不特祭事而已於祭事言不縣則膳可知也雜記凶年祀以下牲則祭不特不縣而已言縣則牲可知也司服言大荒則素服玉藻言年不順成君衣布則君不特不祭肺而已言膳則衣可知也大夫以粱為加食君膳不祭肺故大夫不敢食粱士無故不去琴瑟君弛縣故士不敢飲酒以樂凡此皆去備也先王之於凶荒也有珍圭以恤之有委積以待之於關市則無征於刑貶則有慮大至於移民通財糾守小至於舍禁多昏殺禮猶以為未也故膳不祭肺不食粱不樂而損於自養馬不食榖馳道不除而損於自奉凡欲與民同患而已司徒荒政索鬼神大祝天烖彌祀社稷禱祠祭法雩禜祭水旱詩之雲漢靡神不舉則歲凶莫不祭也司巫大旱則舞雩女巫大烖歌哭而請則祭莫不有樂也然祭則有禱而無祀樂則有歌舞而無縣有禱而無祀郊特牲所謂年不順成八蠟不通榖梁所謂禱而不祀是也有歌舞而無縣曲禮所謂祭事不縣大司樂所謂凡國之大憂令弛縣是也蓋樂雖所以薦鬼神亦所以崇已德凶年不祭失德之效也安取於樂乎記曰五榖時熟然後賞之以樂君無故玉不去身大夫無故不徹縣士無故不徹琴瑟正義鄭氏康成曰憂樂不相干也故謂災患喪病孔氏穎達曰此明無災者也君謂諸侯也玉謂佩也君子於玉比德故恆佩玉徹去也無災變則不去樂也此士謂不命之士若命士則特縣也自士以上皆有玉佩上云君無故不去玉則知下通於士也下言士不徹琴瑟亦上通於君也但比德為重故以君上明之又大夫言縣士言琴瑟亦互言耳但縣勝故大夫言之通論吕氏大臨曰君子致禮以治躬致樂以治心養其血氣志慮無所不在於和使放心邪氣不得接焉此樂所以無故而不舍也災患喪病方在所憂故不可參以樂古之君子必佩玉右徴角左宫羽趨以采齊行以肆夏故不去身非特為飾亦有玉聲鏘鳴中於五音近於樂也方氏慤曰公侯山𤣥大夫水蒼士瓀玫則玉固上下之所通佩也諸侯軒縣大夫判縣士特縣則縣亦上下之所通用也詩言我有嘉賓鼓瑟鼓琴又言琴瑟擊鼓以御田祖則琴瑟亦上下之所通御也經之所言亦隨其輕重而繫之耳士有獻於國君他日君問之曰安取彼再拜稽首而后對正義鄭氏康成曰再拜稽首起敬也孔氏穎達曰此一節論大夫士饋獻之事有獻者謂士有物奉貢於君他日别日也安取彼問何處得前所獻之物士卑德薄嫌其無有也不即問而俟他日者士有貢獻乃自致於外而不敢見恐君答已拜故别日乃見君君得問之也對謂對得物所由也吕氏大臨曰君之於臣雖名位有等而所以上下相交不閒於貴賤故雖士亦有獻於君焉皆所以達臣子之誠心而不可却也陳氏祥道曰尊者之賜卑者不敢問問則失於不恭卑者之獻尊者不可不問不問則恐其取之不義大夫私行出疆必請反必有獻士私行出疆必請反必告君勞之則拜問其行拜而后對正義鄭氏康成曰必請必告臣不敢自専也私行謂以己事也士言告者不必有獻也告反而已君勞問必拜亦起敬也問行謂道中無恙及所經過孔氏穎達曰大夫私行謂非為君行也疆界也既非公事故宜必請也然大夫無外交而此有私行出界或是新來大夫姻婭猶在本國故有私行往來但不得執交於外耳大夫有德必能招人餽遺故還必有獻士德劣故不必有獻但告反而已行還而君若慰勞己之勞苦則已拜之若問其行拜竟而起對大夫士通如此先拜後答急謝見問之恩也方氏慤曰臣之事君猶子之事親子之事親出必告反必靣故臣之事君出必請反必告焉陳氏祥道曰古之為臣也無私行出疆之禮告於君而後可也案大夫私行出疆若季友如陳葬原仲亦是通論陳氏祥道曰聘禮使者歸若有獻則告曰某君之賜也則大夫有獻不特施於私行而已聘禮君使宰賜使者幣則君於大夫之獻不特受之而已聘禮君答拜此不言者君於大夫無所不答拜於士為介則答拜於行則不答國君去其國止之曰奈何去社稷也大夫曰奈何去宗廟也士曰奈何去墳墓也國君死社稷大夫死衆士死制正義鄭氏康成曰奈何去社稷宗廟墳墓皆臣民殷勤之言國君死其所受於天子謂見侵伐也春秋傳曰國滅君死之正也大夫士死其所受於君衆謂軍師制謂君教令所使為之熊氏安生曰大夫士不言死宗廟墳墓以宗廟墳墓已私有之為臣事君不可為私事死也君死社稷則其死宗廟墳墓可知但社稷受於天子故特舉焉孔氏穎達曰奈何猶言如何也大夫士去國皆謂三諫不從及以罪見黜者大夫無社稷故云宗廟士雖無臣民而屬吏止之也士亦有廟辟大夫故言墳墓亦與大夫互言也國君以社稷為主若有寇難則以死衛之大夫當國有寇難必率衆禦之以死為度士雖不得率師若君命使之則唯致死吕氏大臨曰臣民各止其君使勿去忠厚之至也以社稷宗廟墳墓為言者皆指其所本也先王之建國必為之置社稷使其君守之為土地人民之主此有國者所以以社稷為言也大夫之有宗廟士之保其墳墓義亦猶是大夫士則有以道去其君諸侯有國受之於天子有死而無去也然此去者國滅君死正也苟社稷無隕先君有後則雖有不安其國致位而去特一身去就而已是亦有可去之義禮所以有寄公也人臣受命於君有死無二而已君之有社稷受命於天子者也大夫之衆士之制受命於其君者也故人臣敬君莫先於敬命棄命不死不敬莫大焉方氏慤曰止其去者存乎私情死其事者存乎公義宗廟墳墓身之所自出特在乎私情而已獨國君一以社稷為言者以有國之尊無適而不以公故也通論孔氏穎達曰禮運云君死社稷無去國之義孝經云士守其祭祀今不云祭祀者明雖去此之彼猶得祭祀但墳墓不隨耳陳氏祥道曰孟子謂滕文公效死勿去此重去社稷之義也春秋傳曰凡諸侯之大夫違告於諸侯曰某氏之守臣某去宗廟此重去宗廟之義也去國則哭於墓而後行此重去墳墓之義也去則以私止之仁也死則以公責之義也存異孔氏頴達曰大王遷邠知君亦有去國之義案去豳者遷國以圖存非去國也若死社稷者窮於無可遷不得不以身徇之不得據大王遂謂君有去國之義君天下曰天子朝諸侯分職授政任功曰豫一人正義鄭氏康成曰天子豫一人皆擯者辭也天下謂外及四海也覲禮曰伯父實來豫一人嘉之孔氏穎達曰此論天子稱謂之事天下謂七千里外也擯者稱天子以四海難伏宜尊名以威臨之也父天母地是上天之子又為天所命子養下民此尊名也授政謂授所縣象魏之法於諸侯也任功謂使人専掌委任之功若五侯九伯女實征之也不假威稱但自謂豫一人言我是人中之一人自謙損也臣下謂之一人所以尊王者也以天下之大四海之內所共尊者一人耳吕氏大臨曰一人之身而名有異者內外尊卑人神死生之際不可以無别也君天下曰天子言天下者外薄四海兼夷狄之稱也天子者繼天而王者也豫一人猶言孤與寡人也書所稱豫一人大抵皆告諸侯之言分職授政任功則凡所以命諸侯命諸臣者莫不然也劉氏彝曰蠻夷之君朝貢於王而擯者稱天子以對之以其不知禮義之所尊而戴者獨天耳朝諸侯謂分土為九州以封五等之國四時各以其職來朝於王六年而後遍也分職謂設六官以法天地四時各専其職以考天下之教而黜陟幽明也授政謂分禮樂之成法致中和於庶民也任功謂建邦之六典以任天下之才而興功立事也凡此三者天子所以役中國之賢才措生民於皇極者也乃尊尚其德而謙抑自卑是以自稱曰豫一人也方氏慤曰職欲各有所尊故曰分政欲一其所出故曰授功欲能有所勝故曰任分職然後可以授政授政然後可以任功故其序如此蓋所以朝諸侯之事不過是而已通論鄭氏康成曰今漢於蠻夷稱天子於王侯稱皇帝崔氏靈恩曰夷狄不識王化故不稱王不識尊極故不稱皇唯知畏天故舉天子威之孔氏頴達曰孟京易說周人五號帝大稱一也王美稱二也天子爵號三也大君典盛行異四也大人聖人德備五也許慎左傳說施於夷狄稱天子於諸夏稱天王於京師稱王杜預謂天子王者之通稱魯成公八年天子使召伯來錫公命莊公元年王使榮叔來錫桓公命無義例吕氏大臨曰古者於中國稱天王於夷狄稱天子夷狄非王法所能治故不稱天王案王者父天母地故謂之天子天子者天之子也詩曰天位殷適書曰有王雖小元子哉諸子皆子而父為後之子惟一人天子者天之元子適子惟此一人故自稱亦曰豫一人也孝經曰事父孝故事天明事母孝故事地察告哀公曰事親如事天事天如事親然則君天下而曰天子其量𢎞其意逺矣豈區區以威臨四裔之謂哉踐阼臨祭祀內事曰孝王某外事曰嗣王某臨諸侯畛於鬼神曰有天王某甫畛之忍反正義鄭氏康成曰皆祝辭也唯宗廟稱孝畛致也鬼神謂百辟卿士也祝告致於鬼神辭也曰有天王某甫某甫且字也不名者不親往也周禮大㑹同過山川則大祝用事焉畛或為祗孔氏穎達曰踐履也阼主人階也天子祭祀升阼階內事宗廟是事親事親宜言孝故祝辭云孝王某某為天子名也外事郊社也天地尊逺不敢同親云孝故云嗣王某言此王繼嗣前王而立也至若巡狩遍於方嶽臨視諸侯凡所過山川悉不親往使祝致辭故不稱名而曰某甫云某是天子之字甫是男子美稱猶尼父類也吕氏大臨曰畛於鬼神者接於鬼神也畛畦畛之相接然與交際之際同義也又曰鬼神之在諸侯境內者天子不親祀也曰有天王某甫有司不敢名君而告神又不可以無字也案父在子不由阼階居喪之禮升降不由阼階故三年喪畢乃曰踐阼天下所歸往謂之王典禮命討皆奉天故曰天王以此稱於侯國之鬼神見幽明無所不統也內事王必稱孝者孝經云愛親者不敢惡於人敬親者不敢慢於人愛敬盡於事親而德教加於百姓刑於四海故惟孝乃成其為王也稱孝王不稱孝子者天下重器王者大統奉始祖以臨之不敢私其父且繼世而王者不必皆子也故曰考廟曰王考廟曰皇考廟曰顯考廟不曰父祖曽髙廟其所繼者不必皆父祖曽髙也若祖父在殯宫則虞以前稱哀子哀孫卒哭而祔稱孝子孝孫専祭其廟則亦可曰孝子詩曰綏豫孝子是也存異鄭氏康成曰天地社稷祭之郊內而曰嗣王不敢同外內也孔氏穎達曰鄭謂不敢同外內者若宗廟內事祭辭稱孝山川嶽瀆祭之在外而辭稱嗣今天地社稷既尊祭之在內而用外辭不敢同外內之常例也辨正吳氏澄曰宗廟所祭者一家之親內神也故曰內事郊社及山川之屬所祭者天下一國之神皆外神也故曰外事鄭氏以祭於郊內者為內事祭於郊外者為外事非也崩曰天王崩復曰天子復矣告喪曰天王登假措之廟立之主曰帝假音遐措七故反正義鄭氏康成曰天王崩史書策辭也天子復矣始死時呼魂辭也不呼名臣不名君也諸侯呼字告赴也登上也立主曰帝同之天神孔疏天神曰帝今號此主同於天神若文帝武帝之類也孔氏頴達曰自天墜下曰崩王者死如從天墜下故曰崩也復招魂復魄也精氣為魂身形為魄人命終畢精氣離形臣子罔極猶望更生故使人升屋北靣招呼死者之魂令還復身中故曰復也男子呼名婦人呼字令魂識知其名字而還王者不呼名字者一則臣子不可名君二則普天率土一人而已故止呼天子復也告喪謂天王崩遣使報天下萬國王葬後卒哭竟祔於廟立主使神依之也五經異義云主狀正方穿中央達四方天子長尺二寸諸侯長尺崔氏靈恩曰古者帝王生死同稱生稱帝者死亦稱帝生稱王者死亦稱王今廟主曰帝蓋是為記時有主入廟稱帝之義記者録以為法也方氏慤曰天王崩者史之所書而以尊大稱之胡氏詮曰遐逺也竹書紀年帝王沒皆曰陟陟亦登也吳氏澄曰尊之不敢言其死但言其升陟於遐逺之處猶言其登天也存異鄭氏康成曰假已也上已者若仙去云耳案三王無帝名司馬遷作夏商本紀俱加帝字惟周本紀不言帝謂後世貶之其說不經吕氏謂遷據世本世本亦從帝乙之名而傅㑹二代未嘗盡稱帝也此言帝者崔氏謂始於作記之時其說誠然登假假讀遐為是上仙乃異氏語非典訓也天子未除喪曰豫小子生名之死亦名之正義鄭氏康成曰謙未敢稱一人生名之曰小子王死亦曰小子王孔疏嗣王既呼為小子若於喪中而死亦諡為小子王喪質故不變其稱也孔氏穎達曰適嗣於初喪未忍即受天王之稱云豫小子者言我德狹小也通論鄭氏康成曰春秋傳曰以諸侯之踰年即位亦知天子之踰年即位以天子三年然後稱王亦知諸侯於其封內三年稱子也孔疏鄭引春秋文九年公羊傳文證天子三年之內稱豫小子也晉有小子侯是僭取於天子號也吳氏澄曰春秋景王崩悼王未踰年入於王城不稱天王而稱王猛所謂生名之也死不稱天王崩而稱王子猛卒所謂死亦名之也存異吕氏大臨曰天子未除喪而沒則其祔也不曰帝而曰小子如晉有小子侯之類蓋其喪當稱子故也豫衍文也詩書所載豫小子之稱不必未除喪之稱此又承措廟立主曰帝之文而言也則非自稱之辭故知無豫字也生死皆名之曰小子王不稱帝不立諡未成為君也欽定禮記義疏卷六
