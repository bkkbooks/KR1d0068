body:
  text: 喪服小記二第十五之二虞杖不入於室祔杖不升於堂正義鄭氏康成曰哀益殺敬彌多也虞於寢孔疏士虞禮文祔於祖廟孔疏檀弓文孔氏頴達曰此論殺哀去杖之節方氏慤曰喪禮先虞而後祔虞杖特不入於室而已至於祔杖則雖堂亦不升焉室內而堂外故於室曰入堂髙而陛卑故於堂曰升案此皆謂喪主也若衆主人則無入室升堂之事士虞禮注主人將入室倚之西序乃入則祔杖倚之西階之下歟主人之杖不入室不升堂則衆主人不以杖即位可知未葬前主人位在堂下故杖至虞乃有饗神酳獻諸禮不以杖入辟之祭主於敬也至祔則祭及所祔之祖敬彌多辟彌遠矣此與父在子不以杖即位意略同鄭言哀益殺自虞至祔為日無多哀殺有限至練乃彌殺也士虞禮注虞杖不入室祔杖不升堂則練杖不入門為君母後者君母卒則不為君母之黨服不為於僞反正義鄭氏康成曰徒從也所從亡則已孔氏頴達曰為君母後謂無適立庶為後也妾子於君母之黨若君母卒則不服今為後者嫌同於適服君母之黨故特明之謂與不為後同也敖氏繼公曰庶子從君母之服唯止於外祖父母從母及舅不及舅之子從母之子異於因母也若為父後則服之其禮當與為人後同通論黃氏震曰適為屬從母歿亦服母之黨案為君母後若衛莊姜以戴媯之子為己子也婦人無子出惟后夫人不出得以庶子為己子或謂為君母後則即為父後而與尊者為體矣禮庶子為父後者為其外祖父母從母舅無服以與尊者為體則不得服私親也則不為君母之黨服而何服乎疑此有闕文當作為君母後者君母卒為君母之黨服不為君母後君母卒則不為君母之黨服蓋妾子於君母之黨本非親其從而服以君母故也故曰徒從者所從亡則已今既為君母後則於君母為屬從所謂屬從者所從雖歿也服絰殺五分而去一杖大如絰殺去聲去起呂反絰大結反正義鄭氏康成曰如要絰也孔疏知然者以其同在下之物故也孔氏頴達曰喪服傳首絰大搹左本在下去五分一以為帶首尊而要卑卑宜小故五分而去一象服數有五也朱子曰首絰大一扼只是母指與第二指一圍吳氏澄曰喪禮經傳記中絰帶並言則以首絰為絰而要絰為帶亦有以要絰為絰而絞帶為帶者若單言絰則或謂首絰或謂要絰各隨所指此記絰殺蓋兼首要二絰而言謂絰之殺五分首絰之大而去其一以為要絰也如絰則專指要絰案喪服疏斬衰首絰大搹去五分之一存七寸二分以為要絰齊衰首絰如之又五分去一以為齊衰要絰大功首絰如之又五分去一以為大功要絰小功首絰如之又五分去一以為小功要絰緦首絰如之又五分去一以為緦要絰杖大如絰以斬齊言之存疑賈氏公彥曰首絰大搹搹是扼物之稱據中人一扼而言大者據大母指與大巨指扼之故言大也案大者量度大小之謂賈以母指巨指言鑿矣敖氏繼公曰二杖皆如其首絰之度案本經所云則杖如其五分殺一之絰孔說是敖說非妾為君之長子與女君同正義鄭氏康成曰不敢以恩輕輕服服君之正統孔氏頴達曰此論妾從女君服女君為長子三年妾亦為女君長子三年案喪服傳妾為君之黨服得與女君同此其一也喪服記妾為女君之長子惡笄有首布總不言髽是三年與女君同不髽與女君微異也此君長子上下同之若君衆子則諸侯之妾無服大夫之妾大功除喪者先重者易服者易輕者正義鄭氏康成曰除先重謂練男子除乎首婦人除乎帶易服謂大喪既虞卒哭而遭小喪也其易喪服男子易乎帶婦人易乎首孔氏頴達曰此論喪服輕重及除脫之義男重首女重要凡所重者有除無變所以卒哭不受以輕服至小祥各除其重也易謂先遭重喪後遭輕喪變先輕者則謂男子要婦人首也先遭斬服虞卒哭已變葛絰大小如齊衰之麻若又遭齊衰之喪齊衰要首皆牡麻牡麻則重於葛服宜從重而男不變首女不易要以其所重故也但以麻易男要女首是所輕故也若未虞卒哭則後喪不能變也案此與間傳文同鄭彼注云婦人重帶帶在下體之上婦人重之其帶猶五分去一也其卒哭不受以輕服專指婦人要帶若男子首絰則亦變葛矣無事不辟廟門哭皆於其次辟婢亦反正義鄭氏康成曰鬼神尚幽暗也廟殯宫哭皆於次無時哭也孔疏無事謂葬前晝夜無時之哭有事則入即位孔疏有事謂朝夕哭及適子受弔孔氏頴達曰此論在殯無事之時辟開也朝夕入門內即位哭則暫開之無事則不開也次謂倚廬徐氏師曾曰倚廬在中門之外復與書銘自天子達於士其辭一也男子稱名婦人書姓與伯仲如不知姓則書氏正義鄭氏康成曰周之禮天子崩復曰皋天子復諸侯薨曰皋某甫復其餘及書銘則同孔氏頴達曰書名謂書亡人名字於旌旗也天子書名於太常諸侯已下則各書於旌旗其辭一也謂士與天子同也婦人復則稱字此云書姓及伯仲是書銘也姓謂如魯姬齊姜伯仲隨其次也氏如孟孫三家之屬陳氏澔曰檀弓疏云士喪禮為銘各以其物士長三尺大夫五尺諸侯七尺天子九尺若不命之士以緇長半幅長一尺赬末長終幅長二尺總長三尺存疑鄭氏康成曰此謂殷禮也殷質不重名復則臣得名君孔氏頴達曰殷質故男子復及銘皆名周尚文臣不名君也婦人已下亦殷禮周之文未必有伯仲當云夫人也殷無世繫六世而昏故婦人有不知姓者周則有宗伯掌定世繫百世昏姻不通故必知姓也若妾有不知姓者當稱氏矣陸氏佃曰男子稱名所謂皋某復是也先儒謂周禮天子復曰皋天子復諸侯復曰皋某復此讀復曰天子復矣之誤也復曰天子復矣是告人以天子復非復天子之辭案此復與書銘禮宜如是孔云婦人當云夫人亦指復時耳若銘則當著其姓與伯仲卿大夫已下則復婦人亦當稱姓氏夫惟荒古人皆無姓黃帝之子十二姓皆以德命也唐堯之時五臣有大功德乃賜姓禹錫土姓乃使生其地者各以土為姓而姓始繁矣有姓則有别殷六世而昏之說未足據也又案天子自名不過對鬼神之辭曲禮孝王某嗣王某是也若臨侯邦之鬼神則稱字曲禮天王某甫是也其他未聞稱名者此乃云天子達於士其辭一又云男子書名二說不同故鄭臆為殷禮與周法不同但於古不見所據存疑可也陸氏謂男子皆當稱名以曲禮天子復矣為告人以天子復之辭則古經從未聞復竟告人之節亦非可據也斬衰之葛與齊衰之麻同齊衰之葛與大功之麻同麻葛皆兼服之正義鄭氏康成曰斬衰之葛齊衰之麻其絰之大俱七寸五分寸之一帶五寸二十五分寸之十九孔疏就首絰九寸之中五分去一以五分分之去一分故七寸五分寸之一其帶又五分去一故帶五寸二十五分寸之十九齊衰之葛大功之麻其絰之大俱五寸二十五分寸之十九帶四寸百二十五分寸之七十六孔疏就五寸二十五分寸之十九去其一分故餘有四寸百二十五分寸之七十六皆者皆上二事孔疏皆上斬衰齊衰大功麻葛之事服之謂服麻又服葛也男子則絰上服之葛帶下服之麻婦人則絰下服之麻同自帶其故帶也所謂易服易輕者也兼服之文主於男子孔疏婦人上下皆麻故曰主於男子孔氏頴達曰斬衰既虞受服之葛首絰與齊衰初喪麻絰帶同齊衰受服之葛與大功初死之麻同皆兼服之者斬衰既虞遭齊衰新喪男子則要服齊衰之麻帶首服斬衰之葛絰婦人則首服齊衰之麻絰要仍服斬衰之麻帶通論孔氏頴達曰此明前遭重喪後遭輕喪麻葛兼服之義案喪服傳云苴絰大搹去五分一以為帶謂初喪之絰帶至既虞變葛之時絰帶漸細降初喪一等存異陸氏佃曰謂若斬衰卒哭男子變要絰以葛若又遭齊衰之喪則以齊衰之麻易葛帶其首絰猶是斬衰之麻女子更首絰以葛若又遭齊衰之喪則以齊衰之麻易葛絰其要絰猶是斬衰之麻是之謂兼服是何也斬衰之葛與齊衰之麻同故也下文倣此鄭氏謂服麻又服葛誤矣故曰兼服之服重者則易輕者也案兼服者謂齊衰之麻與斬衰之葛並繫於要非去此易彼之謂閒傳云輕者包若以麻易葛則非包矣包亦通謂之易者包者在內自外視之則已易也又案士虞禮言丈夫說絰帶於廟門外婦人說首絰不說帶疏云男子既葬首絰要帶俱變者據閒傳斬衰三升既虞卒哭受以成布六升冠七升為母疏衰四升受以成布七升冠八升去麻服葛葛帶三重則士虞丈夫俱變者以變斬衰三升而受齊衰六升冠受七升則冠服仍麻絰帶則去麻服葛而葛帶三重故此記云斬衰之葛與齊衰之麻同也閒傳又云斬衰之喪既虞卒哭遭齊衰之喪輕者包重者特謂輕者可施於卑重者宜主於尊卑可兩施尊不可二則居前喪遭後喪男子要服齊衰之麻帶以包斬衰之葛帶首特服斬衰之葛絰婦人說絰不說帶則首服齊衰之麻絰以包斬衰之葛絰要仍特服斬衰之麻帶如此則男子首麻帶葛婦人上下皆麻而麻葛兼服專指男子無疑而士虞閒傳及小記彼此互參自合陸氏說未可據報葬者報虞三月而后卒哭報依注芳付反正義鄭氏康成曰報讀為赴疾之赴謂不及期而葬也既葬即虞虞安神也卒哭之祭待哀殺也孔氏穎達曰此論不得依常葬之禮貧者或因事故死而即葬不待三月葬竟而即設虞安神宜急也卒哭猶待三月者奪於哀痛不忍急也徐氏師曾曰士三月而葬既葬而虞既虞卒哭禮也疾葬者亦疾虞若卒哭必俟三月禮雖有變哀則同也案卒哭乃有受服變除不可急也父母之喪偕先葬者不虞祔待後事其葬服斬衰正義鄭氏康成曰偕俱也謂同月若同日死也先葬者母也曾子問曰葬先輕而後重又曰反葬奠而後辭於殯遂修葬事其虞也先重而後輕待後事謂如此也其葬服斬衰者喪之隆哀宜從重假令父死在前月而同月葬孔疏謂母死前之月或一月或二月或三月但未葬之前皆是前月未必惟母死之前一月也猶服斬衰不葬不變服也孔疏雖葬母亦服斬衰葬之以父未葬不得變服也言其葬服斬衰則虞祔各以其服矣及練祥皆然卒事反服重孔疏卒事之後還服父服孔氏穎達曰此論並遭父母喪虞祔及衣服之制先輕後重先葬母也葬母竟不即虞祔更修葬父之禮以虞祔稍飾父喪在殯未忍為也後事謂葬父也待葬父竟先虞父乃虞母祭先重而後輕也大夫降其庶子其孫不降其父正義鄭氏康成曰大夫為庶子大功案喪服自期以下諸侯絶大夫降故大夫為庶子降服大功若庶子亦為大夫則不降孫不降其父祖不厭孫也孔氏穎達曰嫌既降其子亦厭其孫故此明雖降庶子而不厭降其孫庶子之子不降其父猶為三年也案凡厭皆謂死者為尊所厭則本服或絶或降而不得伸大夫降庶子大功已尊所厭也兄弟亦為之大功從父所厭也大夫降庶子適子降庶昆弟庶昆弟又相為降嫌其子亦有降法故明之天子諸侯於庶子無服庶子之子為父三年父母之喪無貴賤一也鄭注祖不厭孫則厭為之服者又别一義又子固不厭其父即昆弟之子亦不降世叔父之庶者尊厭止及於子於孫否大夫不主士之喪正義鄭氏康成曰士之喪雖無主不敢攝大夫以為主孔氏穎達曰謂士死無主後其親屬有為大夫者尊不得主之案此句當在士不攝大夫上謂族人無主後者故不以尊主卑若其子則適子雖士父必主之庶子則使其子主之為慈母之父母無服為於僞反下為舅姑同正義鄭氏康成曰恩不能及孔氏穎達曰此即是喪服中慈母父雖命為母子本非骨肉故慈母之子不為慈母之父母服徐氏師曾曰儀禮慈母如母齊衰三年記者恐人泥此文而并服其黨故明言之案喪服傳曰妾之無子者妾子之無母者父命妾曰女以為子命子曰女以為母若是則生養之終其身慈母死則喪之如母貴父之命也父在大夫妾子為母大功士妾子期父歿皆申三年然本非骨肉故子於慈母之父母無服夫為人後者其妻為舅姑大功正義鄭氏康成曰以不二降陸云降一作隆徐氏師曾曰舅姑指夫所自生者而言蓋恩隆於所後自不得不殺於所生也存異賀氏瑒曰此謂子出時已昏故此婦還為本舅姑大功若子出時未昏至所為後家方昏者不服本舅姑以婦本是路人來又恩義不相接猶臣從君而服不從而稅人生不相及之徒而皆不責非時之恩也辨正孔氏穎達曰夫為本生父母期故其妻降一等服大功是從夫而服不論識前舅姑與否假令夫之伯叔在他國而死其婦雖不識豈不從夫服也熊氏云然賀義未善士祔於大夫則易牲正義鄭氏康成曰不敢以卑牲祭尊也大夫少牢孔氏穎達曰謂祖為大夫孫為士孫死祔祖則易大夫牲不敢用士牲祭於尊者之前也陳氏澔曰此與葬以大夫祭以士者不同存異孔氏頴達曰祭殤與無後者不云易牲而此易牲者前是宗子家為祭不得同如宗子之禮故殤及無後者依主人之貴賤禮供之此是士卑許進用大夫牲故曰易牲又此下云賤不祔貴而此士祔於大夫者謂無士可祔也若先祖兄弟有為士者當祔於士不得祔於大夫案此是初祔於祖與後從祖祔食不同孔以殤與無後相較並論反屬支混又天子諸侯皆君道其貴絶族故諸侯不得祔於天子大夫不得祔於諸侯若大夫與士皆臣道貴不絶族故士可祔於大夫孔說亦固也繼父不同居也者必嘗同居皆無主後同財而祭其祖禰為同居有主後者為異居正義鄭氏康成曰録恩服深淺也見同財則期同居異財故同居今異居及繼父有子亦為異居則三月未嘗同居則不服孔氏穎達曰此解喪服經中繼父同居不同居之文繼父謂母後嫁之夫也若母嫁子不隨則無繼父名故自無服此謂夫死妻稚子幼無大功之親隨母適後夫後夫亦無大功之親復以其貨財為此子築宫廟四時使之祭祀同其財計如此則是繼父同居故為服期有主後為異居謂繼父更有子也異居其别有三一者昔同今異二者今雖共居其財計各别三者繼父更有子則服齊衰三月而已存疑孔氏穎達曰既云皆無主後為同居則此子有子亦為異居也案父歿而母改適謂他人父子心安乎不從斯路人已不得已而從母以往且以母故而父之而彼亦長之育之視之如子能無報乎此齊衰三月所為制也齊衰以名加也三月以同爨也若兩無主後而且與之同財為之築宫廟以祀其祖禰則其先人血食久賴之矣而彼淹然不復血食心能安乎則齊衰期而别祀之亦義之所不容己故鄭止言繼父有子為異居不言此子生子亦為異居也而孔乃推之謂此子若有子即為異居過矣彼為之娶婦使之先人有後則薄之彼不為之娶使之終無後乃厚之乎或曰為父後者為出母無服喪者不祭故也今為繼父期則此期之內將廢祖父之祭乎曰不廢禮所謂所祭者於死者無服則祭也然則臣妾死於宫中三月不祭何也曰為同宫吉凶異道也繼父為之築宫廟則異宫矣然則為父後之子於出母不服何也曰母之恩天性也為父後者即不服亦心喪之矣而又服焉則哀重哀重於母則於祭父為不誠不敢不一其誠於父故并不服也若夫祭則母改適之家有夫若子主之矣然則子從母嫁其服如之何曰禮父卒繼母嫁從為之齊衰杖期傳曰何以期貴終也繼母如此生母更可知王氏肅曰庶子服為父後者不服然則此子從母時無主後則今為父後可知而繼父死無主後則嫁母死無主後可知如此亦服之祭之否乎曰服之祭之禮繼父無主後為之齊衰期則母從繼父之服而祭於繼父之宫特不杖以示降可也哭朋友者於門外之右南面正義鄭氏康成曰變於有親者也門外寢門外孔疏檀弓朋友吾哭諸寢門之外孔氏穎達曰右西邊也南面嚮南為主以對答弔賓祔葬者不筮宅正義鄭氏康成曰宅葬地也祔葬不筮前人葬既筮之士大夫不得祔於諸侯祔於諸祖父之為士大夫者其妻祔於諸祖姑妾祔於妾祖姑亡則中一以上而祔祔必以其昭穆諸侯不得祔於天子天子諸侯大夫可以祔於士亡如字又音無正義鄭氏康成曰士大夫謂公子公孫為士大夫者不得祔於諸侯卑别也既卒哭各就其先君為祖者兄弟之廟而祔之中猶閒也可祔於士人莫敢卑其祖也孔疏若不祔之則是自尊欲卑其祖也孔氏穎達曰禮孫死祔祖今祖為諸侯孫為士大夫而死則不得祔祖謂祖貴宜自卑遠也諸祖祖之兄弟也既不祔祖當祔祖之兄弟為大夫士者夫既不得祔祖妻亦不得祔於祖姑而可祔於諸祖姑也諸祖姑是夫之諸祖父兄弟為士大夫者之妻也若祖無兄弟亦祔疏族不為諸侯者妾死亦祔夫祖之妾亡無也中閒也夫祖無妾則又閒曾祖而祔髙祖之妾也祔必昭穆同曾祖非夫同列故祔髙祖也妾無廟為壇祔之耳諸侯不祔於天子亦謂祔祭卑孫不可祔於尊祖也天子諸侯大夫可以祔於士者祖賤孫貴祔之不嫌也若不祔之則是自尊卑於祖也徐氏師曽曰孫可以祔祖子不可以祔父欲使昭常為昭穆常為穆故必閒而祔也通論孔氏穎達曰上云士易牲祔於大夫而大夫不得易牲祔於諸侯者諸侯之貴絶宗故大夫士不得輕親也馬氏睎孟曰士之與大夫皆人臣也雖貴賤殊而勢有可幾之道進而祔之可也天子諸侯君也進而祔之則君臣亂矣苟無所祔則祔於諸祖父之為士大夫者而不敢祔於諸侯所以明君臣之義也存疑徐氏師曾曰案後章言妾母不世祭則必無祔廟之禮且大夫己上已不為庶母服矣况祔廟乎故妾祔一句當為疑經不必謂為壇以祔之如孔氏附會之說也張氏曰亡則中一以上而祔指上三者舊說專指妾言者非案别子為祖為祖則特立廟不祔於人故本文言諸侯不得祔於天子不言祔於諸祖父之為諸侯者大夫以諸侯之别子為祖得立廟者禮亦宜然而經言不得祔於諸侯祔於諸祖父之為大夫士者蓋大夫士未命未成其為别子則尚不得立廟不得立廟則就其所宗者之廟而祔之所謂無宗亦莫之宗公子之公為其士大夫之庶者宗其士大夫之適者不必以廟不在己為疑也又案此言妾祔於妾祖姑下又言庶母不世祭夫祔以為祭也將從其昭穆之次故先祔之妾母不世祭則妾祖姑已不祭矣祔之何為雜記云主妾之喪自祔至練祥使其子主之則不可謂妾母無祔食之禮也榖梁傳云禮庶子為君為其母築宫使公子主其祭於子祭於孫止韋公肅云隱公母聲子不入魯惠公廟妾也胡氏安國云孟子已入惠公廟仲子祭享無所故别立一宫祀之隱公不為己母聲子立廟明己特攝耳非君也桓公未立而為其母仲子立廟明將為君也是諸侯得為其生母立廟矣春秋書初獻六羽是妾母雖立廟其祭視適母降一等其言不世祭者非必子立之而孫遂毁之或薦而不祭至親盡乃遷乎若大夫士則斷無立妾廟之理蓋祔有二有初以班祔至新主入廟而所祔之主已遷上一廟者如三昭三穆之遞遷也有祔之而即隨之食者如殤與無後之從祖祔食也妾子非君安得為妾母立廟則此祔妾祖姑者有廟即於其廟祔食無廟則為壇祔之而祭於次寢祔食與為母之君母母卒則不服為於僞反下同正義鄭氏康成曰母之君母外祖適母徒從也孔疏此親於子為輕己母若在母為之服己則服之所從亡則已孔氏穎達曰此論不責恩所不及之事君母謂母之適母也徐氏師曾曰母之適母非母所自出故殺於母之母也宗子母在為妻禫正義鄭氏康成曰宗子之妻尊也孔氏穎達曰此論宗子妻尊得為妻伸禫之事宗子為百世不遷之宗也賀氏瑒云父在適子為妻不杖不杖則不禫若父歿母存則為妻得杖又得禫凡適子皆然嫌宗子尊厭其妻故特云宗子母在為妻禫徐氏師曾曰宗子尊則其妻亦尊故母在得為之禫重宗婦也然則非宗子而母在者不禫矣案此宗子兼大小宗而言凡適子即繼父之宗也父尊厭正服故父在適子為妻不杖而禫賀循言母尊微厭餘服故為妻杖期而不禫若宗子之妻則已代姑為主婦而主祭故并餘服不能厭而禫通論張子曰喪之有禫何也所以致厚也三年之喪其禫者所以欲占及三年也齊衰之喪禫者所以欲占及二年也宗子母在為妻禫則庶子母在不為妻禫以其不承重不敢致厚於妻子也庶子在父之宫則為其母不禫以厭降也宗子而為其妻禫以承其重所以敬宗也自命士以上父子皆異宫適士其庶子異宫皆為其母禫矣為慈母後者為庶母可也為祖庶母可也上為如字下二為去聲正義鄭氏康成曰謂父命之為子母者也緣為慈母後之義父之妾無子者亦可命已庶子為後孔疏不言命後己妾唯言後父妾者己妾既可為慈母亦可為庶母後易見不言自顯但以己子後父妾於文難明故特言之孔氏穎達曰喪服有慈母如母傳曰妾之無子者妾子之無母者父命為子母而子服此慈母三年此即為慈母後之義也記者見喪服既有妾子為慈母後之例觸類言之謂妾經有子而子已死者餘他妾多子則父命他妾之子為無子之妾立後與為慈母後同也故云為庶母後可也又觸類言之謂己父之妾亦經有子子死故己命己之妾子與父妾為後故呼己父之妾為祖庶母亦服之三年王氏曰既是妾子此三母皆妾皆可以妾生之子為後徐氏師曾曰凡妾之有子者稱庶母祖庶母其無子者則稱父妾祖妾而已存疑鄭氏康成曰即庶子為後此皆子也傳重而已不先命之與適妻使為母子也孔氏穎達曰必知妾經有子者若無子則不得立後故也陸氏佃曰為庶母為祖庶母為讀去聲言為後慈母者為庶母服為祖庶母服可也喪服傳云士為庶母緦大夫已上為庶母無服存異賀氏瑒曰服於慈庶母三年而猶為己母不異異於後大宗而降本也案喪服傳為人後條為人後者孰後後大宗也大宗收族者也不可以絶則知庶子無後可從祖祔食不必為之置後矣庶子且不必置後豈有以庶妾而為之置後者與慈母如母條傳曰妾之無子者妾子之無母者父命妾曰女以為子命子曰女以為母則生養之終身死喪之三年貴命也是為此子無母則無以生故命此妾養之既養之則有母道故執子禮以終其恩非為此妾無子而為之置後也且妾母不世祭則祖庶母有孫亦在不世祭之例又安有無孫而為之立孫以世其祭者與要知此特主其生養死葬之事與嗣子傳重不同注疏並誤又案陸說亦有見但與注疏正義不符又或者云記意蓋謂父命無子之妾母之喪之如母則或父命有子之庶母母之或祖命其妾母之皆可喪之如母以終其恩耳此亦本陸說而小變之並存參又案喪服傳明言妾子之無母者則此時己無母矣何時又為己母服賀說亦非也為父母妻長子禫正義鄭氏康成曰目所為禫者也徐氏師曾曰言當禫之喪有此四者子為父母父母為長子皆三年而禫父在為母父母不在為妻皆期而禫通論孔氏穎達曰慈母亦宜禫也而下有庶子在父之室為其母不禫則在父室為慈母亦不禫也故不言之妻為夫亦禫但記文不具案主禫者子也不則其父也妻不主祭故不言案禫者除服之名父母之喪中月而禫宜矣妻與長子何居蓋禫者皆三年者也所為三年者三綱也君也父也夫也母之三年以匹於父也長子三年以繼父之宗也而父在為母期夫為妻綱父在則母不得不屈身在則妻不得不屈其屈義也然子之於母其愛同身之與妻其體敵可不有以伸之乎故子父在為母十一月小祥十三月大祥十五月禫心喪三年伸之也為妻適子禫庶子母在不禫伸之而不盡不敢與母同也夫必三年而後娶伸之也故服降於外者義之方哀久於內者仁之篤若自期以下則有為三年喪者主之矣我不主之而焉得自我除之慈母與妾母不世祭也正義鄭氏康成曰以其非正春秋傳曰於子祭於孫止孔疏穀梁傳隱五年考仲子之宫仲子是魯孝公之妾惠公之母案此與左傳仲子惠公之妾桓公之母異孔氏穎達曰此論禮有不合世祭之事妾母謂庶子自為其母也存疑孔氏穎達曰慈母即所謂承庶母祖庶母後者也應氏鏞曰慈母一時之恩易世可以無祭若妾母為所生則子孫皆其所自出而不世祭之可乎以上文為庶母為祖庶母之後觀之或者妾母若此之類然此更當隨宜精審未易以一槩言也彭氏汝礪曰案春秋隱五年穀梁傳曰禮庶子為君為其母築宫使公子主其祭也於子祭於孫止此謂世子為君者為己母如此蓋謂己既為君後當奉宗廟不得自主己私祭也然亦未嘗不使公子主之若己於慈母庶母既為之後或為所生子則非特子當祭孫亦當祭以意逆之或是己於庶母慈己者有恩及庶兄庶弟之母是父之妾有子者皆當祔祭之易世之後則不世祭與質之儀禮喪服傳有君子子於庶母慈己者義服小功衆子為庶母有子者義服緦麻此二母於己祭之不世祭可案庶母祖庶母萬無為置後之理孔氏前所推論己誤此并謂祭慈母即承庶母祖庶母後者更不可解彭氏又以慈母與庶母慈己者混看且謂庶母慈己庶母有子皆已祭之尤無此祭法至於妾母則此子之生母其子有為諸侯子大夫子士庶人子之殊又有為父後不為父後之辨曾子問古者天子練冠以燕居鄭云庶子王為其母無服諸侯之庶子為父後則承宗廟之重為生母緦以君之尊厭降也若不為父後而厭降則父在為母練冠麻衣縓緣既葬除之君卒得為母大功先君餘尊之所厭稍申不得過大功也喪服庶子為父後者為其母緦大夫庶子為父後父在無服父歿緦不為父後者父在為母大功父卒為母三年全申也士適庶子皆父在為母期父卒三年與庶人同士卑無所厭也大夫己上為庶母無服士為庶母緦庶人無庶母服之文或與士同也丈夫冠而不為殤婦人笄而不為殤為殤後者以其服服之冠古亂反正義鄭氏康成曰冠笄言成人也婦人許嫁而笄未許嫁與丈夫同言為殤後者據承之也殤無為人父之道孔疏既不與殤為子則不應云為後今言為後據已承其處為言也以本親之服服之孔疏既不以父服服殤而今來後其宗事事如子為彼殤服依其班秩本列也為人後者若子於無後之宗既為殤者父作子則應服以兄弟之服孔氏穎達曰此論宗子殤死族人不得以父道為後之事為殤後者謂大宗子在殤中而死族人為後大宗而不得後此殤者為子也以父無殤義故也陳氏澔曰已冠之子不可以殤禮處之其女子已笄而死則亦依在室之服服之吳氏澄曰此為為殤後者言又言婦人者與上句相對立文非有所明也彭氏汝礪曰冠笄男女成人之服成人而死無可殤者故皆不為殤經云為殤後疏意若族人為宗子殤後實後殤者之位非後殤者為子故為殤者止從兄弟本服徐氏師曾曰殤本服謂昆弟之長殤中殤大功下殤小功案兄弟為後不盡是同父昆弟但既為其父後則與此殤為親兄弟故以親昆弟之服服之存疑孔氏穎達曰以本親之服服之者當在未後之前不復追服不責人以非時之恩故推此時本親兄弟亡在未後之前者亦宜終其本服之日月惟為後及所後如有母亡而猶在三年之內則宜接其餘服不可以吉居凶若出三年則不追服矣陳氏澔曰以其服服之者子為父之服也案孔氏謂日月已過又援喪服傳為所後者之祖父母妻妻之父母昆弟昆弟之子若子云如其母亡在三年內接其餘服在三年外則不追服以證其說不知本經言為殤後者以其服服之何據而知日月已過乎久而不葬者惟主喪者不除其餘以麻終月數者除喪則已正義鄭氏康成曰其餘謂旁親也以麻終月數不葬者喪不變也孔氏穎達曰此論久而不葬不變服之事久而不葬謂有事礙則三年服皆不得祥除今云惟主喪者廣說子為父妻為夫臣為君適孫為祖得為喪主悉不除也其餘謂期以下至緦也主人既未葬諸親不得變葛仍猶服麻案未葬不虞祔無受服之節故皆不得變服各至服限竟而除不待主人葬除也然此皆藏之雖緦亦藏至葬則反服其服是也盧氏植曰其下子孫皆不除也案期則孫當除孫非主喪也通論庾氏蔚之曰服問云君所主夫人妻太子適婦此以尊主卑不得同以卑主尊無緣以卑之未葬使尊者長服之衰絰也是知主喪不除惟承重者為其祖曾若子為父臣為君妻為夫也劉氏世明曰注謂旁親不指言衆子當除也子之於親體同服等雖不承適猶非旁親也然則未葬而除自謂旁親得以麻終者耳箭笄終喪三年案此脫簡當在首章齊衰惡笄終喪上正義鄭氏康成曰亦於喪所以自卷持者有除無變孔疏言亦者亦齊衰之惡笄帶也孔氏穎達曰此論婦人箭笄終喪之事前云惡笄終喪女子為母也此云箭笄女在室為父也徐氏師曾曰箭笄以箭竹為之長尺妻為夫妾為君女子子在室為父皆斬衰而箭笄卷髮以終三年此婦人之重服也惡笄次之存異方氏慤曰在室者服父以箭笄則出嫁者服篠笄矣前言惡笄以為母言之故知其為榛耳服母則一以榛服父則有箭篠之辨案喪服記女子女適人者為其父母惡笄有首以髽卒哭子折笄首以笄此女子子出嫁之笄制也方氏篠笄之說何自而來又據喪服注以箭笄為篠賈公彥謂箭笄篠為之也則安得分箭篠為二笄齊衰三月與大功同者繩屨正義鄭氏康成曰雖尊卑異於恩有可同也孔氏穎達曰大功以上同名重服與齊衰三月可同繩屨謂以麻繩為屨齊衰為尊大功為卑而三月為恩輕九月恩稍重所以衰服殊而為恩情處為淺深所以同其屨也黃氏幹曰至親以期斷父母加隆三年祖父母以尊加期則上殺應曾祖父母大功髙祖父母小功而俱齊衰三月傳曰重其衰尊尊也減其月恩殺也不敢以大功小功之服加至尊也徐氏師曾曰齊衰三月與大功九月其日月之久近衰布之疏密固不同矣然三月者分尊而恩輕九月者分卑而恩稍重是以先王為之酌淺深之宜而制為繩屨則同也不同者以義制其同者以恩制練筮日筮尸視濯皆要絰杖繩屨有司告具而后去杖筮日筮尸有司告事畢而后杖拜送賓大祥吉服而筮尸濯丈角反正義鄭氏康成曰臨事去杖敬也濯謂溉祭器也凡變除者必服其吉服以即祭事不以凶臨吉也孔疏下云大祥朝服縞冠是祥祭時惟著朝服此筮尸又在祥祭前已著朝服閒傳曰大祥素縞麻衣孔疏以大祥之後著素縞麻衣此云吉服則非祥後之服是朝服也故引以證之孔氏穎達曰此論練祥筮日筮尸視濯之時所著衣服也練為小祥也筮日謂筮小祥之日筮尸亦筮小祥之尸視濯謂視洗濯小祥之祭器喪至小祥男子除首絰惟有要絰而病尚深故猶有杖屨是末服又變為繩麻將欲小祥豫著小祥之服臨此筮日筮尸視濯三事祭欲吉故豫服也不言衰與冠者亦同小祥矣有司謂執事者嚮者變服猶杖今有司既告三事辦具將欲臨事故孝子去杖有司告事畢而後杖拜送賓者筮日與尸二事皆有賓來嚮當臨事時去杖今筮占事畢則孝子更執杖以拜送賓視濯輕而無賓故不言也吉服朝服也大祥之日縞冠朝服亦豫服以臨筮史不言日及濯從小祥可知大祥則并去絰杖屨故不云絰杖屨案去杖而筮敬其事也仍杖以拜送賓哀未忘也通論朱子曰古者喪服始死至終喪漸漸變去不似今人服滿頓除便衣華采庶子在父之室則為其母不禫庶子不以杖即位父不主庶子之喪則孫以杖即位可也父在庶子為妻以杖即位可也為于僞反正義鄭氏康成曰庶子為母不禫妾子父在厭也不以杖即位下適子也孔疏謂適庶有父母之喪適子得執杖進阼階哭位庶子至中門外而去之也蓋案或疑庶子不以杖即位亦承上在父室為母言妾殯不當在父之室今子無私室而殯於父之室者位朝夕哭位也孫以杖即位祖不厭孫孫得伸也孔疏父主適子喪有杖適子子以祖為其父主故避尊不敢俱以杖即位今此父不主庶子喪故庶子子得杖即位祖雖尊貴不厭孫也父在庶子為妻以杖即位舅不主庶婦之喪子得伸也孔疏舅主適婦則適子不得杖舅不主庶婦故庶子為妻可以杖即位也父主妻喪故主適婦父不主妾喪故不主庶婦孔氏穎達曰此論庶子父在應杖不應杖之節庶子在父之室為其母不禫者謂不命之士父子同宫者也若異宫則禫之案父於庶子之母緦耳庶子曰不禫則固有練祥矣練祥重不可廢也禫為服外可省也以避適母也又曰若妻次子既非冢嗣亦同妾子也案此與妾子異者其母有禫祭但適子主之則亦與庶子不為禫等耳諸侯弔於異國之臣則其君為主諸侯弔必皮辨錫衰所弔雖已葬主人必免主人未喪服則君亦不錫衰衰音摧免音問正義鄭氏康成曰君為之主弔臣恩為己也子不敢當主中庭北面哭不拜孔疏案士喪禮君弔主人中庭拜稽顙成踊彼主人為主故中庭拜今鄰國君弔君為之主拜賓則主人不拜曾子問稱季桓子之喪衛君來弔魯君為主季康子拜而稽顙故譏其喪有二主必免者尊人君為之變也未喪服未成服也孔疏以經云未喪服嫌謂未括髮未散麻帶絰之屬故云未成服既殯成服孔疏士喪禮既殯三日成服孔氏穎達曰此明諸侯弔喪衣服之節君無弔他臣之禮若來此國遇主國之臣喪為彼君而弔故主君代其臣之子為主主人必免者諸侯來弔主人必為之重禮凡五服大功已上為重重服自始死至葬為免案士喪禮衆主人免在小斂訖後此兩始死當是小斂之誤卒哭後乃不復免也小功已下為輕輕服自始死至殯為免後不復免至葬啓殯後而免以至卒哭如始死今若人君來弔雖非服免時必為免以尊人君故也此云必免謂大功已上故下云親者皆免鄭注云大功已上也皮辨錫衰此因前而發謂弔異國臣也故鄭注云他國之臣皮辨陸氏佃曰據此凡諸侯弔皆皮辨錫衰言必者著諸侯弔無內外皆當如此通論孔氏頴達曰若自弔己臣則素辨環絰錫衰也故鄭注國君於其臣辨絰一云自弔己臣而未當事則皮辨錫衰至當事乃辨絰耳案此本司服言之但彼是天子禮又此記明言弔必皮辨錫衰則又似兼弔己臣言存此以備參陸氏佃曰天子重絰諸侯重衰天子弔服皮辨加環絰諸侯弔服皮辨錫衰司服職曰眂朝皮辨服凡甸冠辨服凡凶事服辨服凡弔事辨絰服蒙上皮辨則皆素積冠辨言冠不言服服辨言服不言冠相備也然則凡弔主人服而後弔弔而後為之服若王弔三公六卿主人成服王皮辨服加環絰以弔及其為之服也皮辨緦衰以居出亦如之當事則辨絰養有疾者不喪服遂以主其喪非養者入主人之喪則不易己之喪服養尊者必易服養卑者否養羊尚反正義鄭氏康成曰不喪服求生主吉惡其凶也遂以主其喪謂養者有親也死則當為之主孔疏已先有喪服養此親屬有疾者則不著喪服疾者既死無主後此養者為之主其為主之服如素無喪服孔疏養時既去其服今疾者身死已為之主還與素無服同也入主人之喪入猶來也謂養者無親於死者不得為主孔疏謂親族不得養其病朋友養之者於此病者無親故不得為主喪案疏又云疾者死無主後者此養者主其喪又據服云朋友皆在他邦袒免歸則已注云謂服無親者為之主則死者别無主喪之親則無親者亦得主喪此注時以常法言耳其有親來為主者素有喪服而來為主與素無服者異孔疏謂若來為喪主者身本吉無喪服既來為主則為此死者服始死之服若本有喪服今來為喪主仍以先喪之服主之故云異也所以然者已既前不養不經變服故今為死者不易己之喪服素無服素有服為今死者當服則皆三日成也孔疏謂己身本有服及本無服與死者有親則皆至三日成服皆為死者服其服也若人有服重而新死者輕則為一成服而反前服也若新死重則仍服死者新服也若身本吉而來為主則計今親而依限服之也養尊者謂父兄卑謂子弟之屬孔氏頴達曰非養者謂死者之親屬當死者病時不得來為養而死時來為主養尊者必易服養卑者否此廣結前文養有疾者不喪服之文前不分尊卑故此明之案此所養亦五服之旁親所謂己喪亦期大功已下既葬卒哭斬衰既練而後故得為旁親養若未練未葬則使人養而已不親養也己所服之喪或疾者之所不服或疾者有服而已除故養者釋服而養之若所養者與己同有服或彼别有服皆不必釋也所養者死而為之服其服視己本有之服或輕或同或重重則服其服同而己服已變則受亦服其服若同而已服未變或輕於己服則於後死者初成服及當事拜客服其服故曰主其喪不當事拜客仍服己服故曰不易己服也若本有之服輕於新服或已變殺則常服後死之服惟當己喪變除時服己喪之服若與死者無服而來主其喪則未成服白布深衣成服為之袒免弔服加麻所謂朋友麻也妾無妾祖姑者易牲而祔於女君可也正義鄭氏康成曰易牲而祔則凡妾下女君一等孔疏妾與女君牲牢無文既云易牲故云下女君一等若女君少牢妾則特牲若女君特牲妾則特豚也孔氏穎達曰此明祔祭之法妾當祔於妾祖姑若無妾祖姑當祔於髙祖妾祖姑故前文云亡則中一而上今又無髙祖妾祖姑則當易妾之牲用女君之牲祔於女君可也存疑鄭氏康成曰女君適祖姑也方氏慤曰妾祔嫌於隆故易牲而祭以示其殺焉案喪服女君俱指適妻言祖姑及髙祖姑俱無妾可祔則遂於適妻祔之生既相依死亦相祔禮之變也鄭以適祖姑言之誤矣妾牲當下女君一等今祔於女君故易女君牲猶士祔於大夫而易大夫牲也方謂易牲示殺其說未明婦之喪虞卒哭其夫若子主之祔則舅主之正義鄭氏康成曰婦謂凡適婦庶婦也虞卒哭祭婦非舅事也祔於祖廟尊者宜主焉孔氏頴達曰虞與卒哭在寢故其夫或子得主之婦之所祔者舅之母也故舅主之士不攝大夫士攝大夫唯宗子正義陸氏佃曰若應大夫主喪雖無大夫士不得攝存疑鄭氏康成曰士之喪雖無主不敢攝大夫以為主宗子尊可以攝之孔疏士喪不敢使大夫攝為主若宗子為士而無主後可使大夫攝主之辨正吳氏澄曰陸說於文為順此蓋言大夫死無主後其親屬有為士而無為大夫者士之位卑不可攝大夫唯宗子為士雖是位卑而宗子分尊故可以士而攝主大夫之喪也上言大夫不可主士之喪此則言士不可主大夫之喪注疏說與上文大夫不主士之喪義重非是宗子謂主喪之人非謂已死之人也案此當與大夫不主士之喪相屬大夫死無主後必使大夫主之士不主不以卑主尊也主人未除喪有兄弟自他國至則主人不免而為主正義鄭氏康成曰不免而為主親質不崇敬也孔氏穎達曰在國之人喪服未除有五屬之親從遠歸奔者免必有時若葬後唯君來弔雖非時亦免崇敬欲新其事故也若兄弟非時而奔則主人不須免也陳器之道多陳之而省納之可也省陳之而盡納之可也省所領反正義鄭氏康成曰多陳之謂賓客之就器也以多為榮孔疏鄭注既夕禮云就猶善也以其可用也贈無常唯玩好所有總而言之亦曰明器故宰夫云凡弔與其幣器注器所致明器也方氏慤曰就器亦明器也以賓客就喪家陳之因謂之就器省陳之謂主人之明器也孔疏檀弓竹不成用瓦不成味之屬是也以禮為節孔氏穎達曰此論以明器送葬之事朋友賓客贈遺明器多陳之以為榮而不可盡納壙中少納之以納有常數故也主人所作明器依禮有限省陳既少盡納於壙可也案陳謂柩朝廟時陳於廟門內之東及葬則陳於壙前之道東存疑陸氏佃曰陳器之道如其陳之數而納之正也即雖多陳之少納之省陳之盡納之禮亦不禁是之謂可案陸說非不是但非古人戒厚葬之義奔兄弟之喪先之墓而后之家為位而哭所知之喪則哭於宫而后之墓正義鄭氏康成曰兄弟先之墓骨肉之親不由主人也宫故殯宫也孔氏穎達曰所知由主人乃致哀戚故先哭於宫也陳氏澔曰兄弟天倫也所知人情也係於天者情急於禮由於人者禮勝於情徐氏師曾曰此皆謂既葬而至者也父不為衆子次於外為于僞反下同正義鄭氏康成曰於庶子略自若居寢孔氏穎達曰次謂中門外次也長子則次於外為喪次也案父子之恩根於天性庶之降也束於禮也鄭曰自若非無哀戚也謂仍若平日之居寢耳與諸侯為兄弟者服斬正義鄭氏康成曰謂卿大夫以下也孔疏若俱為諸侯則各依本服與尊者為親不敢以輕服服之熊氏安生曰諸侯死凡與諸侯有五服之親者皆服斬陸氏佃曰禮臣為君斬衰雖兄弟不得以其屬通如是而後君臣之分嚴故期之喪達乎大夫喪服傳曰始封之君不臣諸父昆弟此與諸侯為兄弟者也雖如此猶服斬所臣兄弟可知兄弟如此諸父可知陳氏澔曰此記者恐疑服本親兄弟之服故特明之存疑鄭氏康成曰言諸侯者明雖在異國孔疏不言與君為兄弟而言與諸侯為兄弟故知容在異國也猶來為三年也案諸父兄弟不從初封者之國自無服斬之禮若從初封者之國則君雖不臣之而諸父兄弟必以臣自處而服斬各盡其道也繼世以後則諸父兄弟盡臣之矣記所謂服斬當兼二者言之陸氏特舉其一耳至適他國而為臣則不服斬嫌二君也為舊君服齊衰三月而已若如疏說謂今來他國未仕則反奔君之喪而服斬可也鄭說尚混下殤小功帶澡麻不絶本詘而反以報之澡又作藻音早正義鄭氏康成曰報猶合也孔疏謂合糾為繩下殤小功本齊衰之類案儀禮喪服篇小功布衰裳澡麻帶絰五月者叔父之下殤適孫之下殤昆弟之下殤大夫庶子為適昆弟之下殤為姑姊妹女子子之下殤昆弟之子女子子之下殤此數者本皆齊衰之親為下殤故降而從小功其絰帶澡率治麻為之孔疏謂戛率其麻使潔白也帶不絶其本屈而上至要孔疏不絶不斷本也其帶本垂今乃屈上至要中合而糾之孔疏屈所垂散麻嚮上然後中分麻為而股合而糾之以垂嚮下故云報也明親重也孔疏小功澡麻為絰帶而斷麻根本示輕也若本期親在下殤降小功者則但首絰無根而要帶猶有根示重故也凡殤散帶垂孔疏凡殤謂成人大功已下之殤其殤既輕唯散麻帶垂而下不屈而上糾之異於下殤小功也案小功澡麻斷本下殤之小功澡麻不斷本異於正小功也婦祔於祖姑祖姑有三人則祔於親者正義鄭氏康成曰祖姑三人謂舅之母死而又有繼母二人也親者謂舅所生存疑張子曰祔葬祔祭只合祔一人夫婦之道當其初昏未嘗約再配是夫只合一娶婦只合一嫁今婦人夫死不可再嫁如天地之大義夫豈得再娶然以重者計之養親承家祭祀繼續不可無也故有再娶之理然其葬其祔雖為同穴同筵几然譬之人情一室中豈容二妻以義斷之須祔以首妻繼室别為一所可也辨正朱子曰程氏祭儀謂凡配止用正妻一人或奉祀之人是再娶所生即以所生配謂凡配止用正妻一人是也若再娶者無子或祔祭别位亦可也若奉祀者是再娶之子乃許用所生配而正妻無子遂不得配祭可乎程先生此說恐誤唐會要中有論凡是適母無先後皆當並祔合祭與古者諸侯之禮不同夫婦之義如乾大坤至自有差等故方其生存夫得有妻有妾而妻之所天不容有二况於死而配祔又非生存之比橫渠之說似亦推之有太過也只合從唐人所議為允况又有前妻無子後妻有子之礙其勢將有所杌隍而不安者唯葬則今人夫婦未必皆合葬繼室别營兆域宜亦可矣黃氏幹曰案記云婦祔於祖姑祖姑有三人則祔於親者祖姑有三人皆得祔於廟則其中必有再娶者則再娶之妻自可祔廟程子張子特考之不詳耳朱先生所辨正合禮經也其妻為大夫而卒而后其夫不為大夫而祔於其妻則不易牲妻卒而后夫為大夫而祔於其妻則以大夫牲正義鄭氏康成曰此謂始來仕無廟者孔疏死當祔於祖今夫死祔於其妻故知是無廟者無廟者不祔宗子去國乃以廟從孔疏以廟從則祔於祖矣不易牲以士牲也孔疏謂夫既不為大夫則但依夫今所得用之牲不得易用昔大夫時牲孔氏穎達曰其妻為大夫而卒者謂夫為大夫時而妻死者也而后其夫不為大夫者謂妻死後夫或黜退不復為大夫而死也夫既不為大夫死若祔祭此妻但依夫今所得用之牲不得易用昔大夫時牲也妻死後夫乃得為大夫今既祔祭其妻則用大夫牲妻從夫之禮故也方氏慤曰婦人以從人為事故貴賤從夫而不在己也存疑應氏鏞曰經據妻之生死同夫榮辱而立文注以祔於其妻則為始仕而未有廟亦未必然正使新徙他國而為大夫亦必有廟既不立祖廟豈敢為妻立廟乎案君子營宫室宗廟為先則諸侯始封必立五廟大夫始命必立三廟適士始命必立二廟矣然有廟立而無主者如伯禽封魯不祖天子則不得祀文王而周公尚存則五廟皆虛也周公薨不得祔王季之廟王季已追王諸侯不得祖天子則當入魯大廟所謂别子為祖蓋為孫則必隨祖以食於廟故必祔於祖以别子為祖則無可祔假設其夫人先死亦不得祔於王季之妃而自入魯大廟矣由是推之則諸侯庶子始命為大夫而立三廟大夫庶子别仕他國其祖父之廟本國宗子主之不得以主行則新國所立之三廟亦無主故鄭氏謂始來仕無廟非不立廟以無主在廟可祔故直謂之無廟也既立廟其妻死主不入廟乎後夫死而主入廟即祔於其妻矣鄭孔之說析理甚精不可謂夫存先為妻立廟之必無其事也為父後者為出母無服無服也者喪者不祭故也為出母之為于蒍反正義鄭氏康成曰適子正體於上當祭祀也應氏鏞曰祭吉禮也喪凶事也凶服不可以行吉禮子無絶母之理而為父後則有祭祀之責以宗廟為重故寧奪母慈而不敢廢祖父之祀也朱子曰出母為父後者無服此尊祖敬宗家無二主之義先王制作精微不苟蓋如此吳氏澄曰此條重出前但述其禮此則釋其義也徐氏師曾曰雖無服猶以心喪自居婦人不為主而杖者姑在為夫杖母為長子削杖女子子在室為父母其主喪者不杖則子一人杖正義鄭氏康成曰姑在為夫杖姑不厭婦也母為長子削杖嫌服男子當杖竹也母為長子服不可以重於子為己也女子子在室亦童子也無男昆弟使同姓為攝主不杖則子一人杖謂長女也許嫁及二十而笄笄為成人成人正杖也孔氏穎達曰此論婦人應杖之節婦人為夫與長子雖不為主亦杖但夫是移天之重而云姑在者舅主適婦喪則厭適子使不杖今有姑主子喪恐姑為主則亦厭婦故明之也童子婦人不能為父母杖也今由主喪者不杖則此童女一人杖若主喪者杖則此童女不杖方氏慤曰桐杖非所以服男然母為長子則杖之者以其所以服我者而報之也通論孔氏穎達曰既云女子子在室是童女可知若其成人出嫁為主皆杖喪服傳妻為夫杖小記母為長子杖也陸氏佃曰婦人不杖為主而杖猶童子當室杖也今雖不為主為夫杖情至且能病也緦小功虞卒哭則免既葬而不報虞則雖主人皆冠及虞則皆免為兄弟既除喪己及其葬也反服其服報虞卒哭則免如不報虞則除之遠葬者比反哭者皆冠及郊而後免反哭免音問下並同報音赴為于僞反比必利反正義鄭氏康成曰緦小功虞卒哭棺柩已藏嫌恩輕可以不免也孔疏棺柩在時則當著免今至虞卒哭之時棺柩雖藏已久亦著免也言則免者則既殯先啓之閒雖有事不免孔疏以虞卒哭則免明未虞之前則不免也虞前有葬葬是喪之大事柩棺既啓著免可知嫌虞與卒哭棺柩既掩不復著免故特明之不報虞謂有故不得疾虞雖主人皆冠不可久無飾也皆免自主人至緦麻也孔疏承上文緦小功之下故知主人及緦麻也為兄弟不報虞則除之謂小功已下遠葬墓在四郊之外孔氏穎達曰自此至皆免論著免之節緦小功之喪葬在遠處郊野之外不可無飾故葬訖反哭之時皆著冠至郊而後去冠著免反哭於廟存疑陸氏佃曰既葬而不報虞此言過期而葬也蓋葬日虞如期而葬則如期而虞也不及時而葬渴葬也過時而葬慢葬也故禮使後其虞以責子道案檀弓葬日虞弗忍一日離則報葬必報虞禮也今不報虞義當從鄭注乃陸氏云使後其虞以責子道豈不報虞亦禮乎禮有先葬母待父虞者然待父虞則服父之新喪不得云主人皆冠故不報虞為有故禮之變也為兄弟不報虞則除之除免也亦主人皆冠意君弔雖不當免時也主人必免不散麻雖異國之君免也親者皆免案注云異國之君免或為弔正義鄭氏康成曰不散麻者自若絞垂為人君變貶於大斂之前既啓之後也孔疏凡大斂之前著免大功已上散麻大斂以後著冠不散麻糾其垂也至將葬啓殯之後己葬之前亦免大功已上亦散麻若君弔雖不當免時必為之著免不散麻帶貶於大斂以前及既啓之後也親者大功已上也孔疏以經不散麻謂大功已上今云親者皆免明據合應散麻之人孔氏頴達曰己君之來其免如此雖他國君來與己國君同也大功已上親者皆從主人之免敬異國君也己君來弔親者亦免可知徐氏師曾曰主人必免尊君也然糾其要絰不使散垂殺也凡帶未斂而垂既斂則絞既啓而又垂葬畢而又絞主人免親皆從而免致親親之情也除殤之喪者其祭也必𤣥除成喪者其祭也朝服縞冠正義鄭氏康成曰殤無變孔疏無虞卒哭及練之變服也文不縟孔疏成人喪服初除著朝服禫祭始從𤣥端今除殤之喪即禫服是文不繁縟成成人也縞冠未純吉祭服也孔疏𤣥冠朝服是純吉之祭服今用縞冠是未純吉之祭服也既祥祭乃素縞麻衣孔氏穎達曰成喪謂成人之喪其祥祭也衣朝服而縞冠通論徐氏師曾曰儀禮傳喪成人者其文縟喪未成人者其文不縟存疑鄭氏康成曰𤣥冠𤣥端黃裳而祭不朝服未純吉也於成人為釋禫之服孔疏謂除長殤中殤下殤之喪其祭服必𤣥冠𤣥端黃裳異於成人之喪也若其素裳則與朝服純吉同若𤣥裳即與上士吉服𤣥端同非釋禫服也辨正陸氏佃曰言必𤣥則裳亦𤣥可知鄭氏謂𤣥端黃裳蓋非是奔父之喪括髮於堂上袒降踊襲絰於東方奔母之喪不括髮袒於堂上降踊襲免於東方絰即位成踊出門哭止三日而五哭三袒正義鄭氏康成曰凡奔喪謂道遠已殯乃來也為母不括髮以至成服一而已貶於父也即位以下於父母同也孔疏約奔喪禮文故知同也三日五哭者始至訖夕反位哭乃出就次一哭也與明日又明日之朝夕而五哭三袒者始至袒與明日又明日之朝而三也孔氏穎達曰括髮於堂上殯宫堂上也不笄纚者奔喪異於初死也袒謂堂上去衣降堂阼階東而踊為踊故袒既畢襲絰於東方襲謂掩所袒之衣帶絰東方謂既踊畢襲帶絰於東序東奔母之喪初時括髮至又哭以後至成服不括髮袒於堂上降踊與父同父則括髮而加絰母則不括髮而加免此是異於父也著免加絰已後即位於阼階之東而更踊故云成踊其即位成踊父母同於此之時賓來弔者則拜之奔喪禮所謂反位拜賓成踊是也出殯宫之門就於廬故哭者止初死在家之時哭踊無節今聞喪已久奔喪禮殺故三日五哭異於在家也陸氏佃曰上言絰於東方絰首絰也今此言免於東方絰為要絰爾通論孔氏穎達曰若未殯而來與在家同不得減殺也適婦不為舅後者則姑為之小功案舅字下一本有姑字正義鄭氏康成曰謂夫有廢疾他故若死而無子不受重者小功庶婦之服也凡父母於子舅姑於婦將不傳重於適孔疏如廢疾他故死而無子之屬是也及將所傳重者非適孔疏無適子以庶子傳重及以他子為後者服之皆如衆子庶婦也孔氏穎達曰適子正服期則適婦宜大功庶婦故小功也徐氏師曾曰此言姑服適婦之變禮言姑則舅可知欽定禮記義疏卷四十六
